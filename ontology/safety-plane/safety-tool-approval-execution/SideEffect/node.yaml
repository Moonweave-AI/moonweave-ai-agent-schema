schema: moonweave.ai/ontology-node/v1
id: SideEffect
kind: concept
status: accepted
labels:
  zh: 外部副作用
  en: Side Effect
  ja: 外部状態変更
semantics:
  short_definition:
    zh: 一次已完成或已尝试的外部状态变更的项目本地记录。
    en: A project-local record of a completed or attempted external state change.
    ja: 完了または試行された外部状態変更を表すプロジェクト固有の記録。
  definition:
    zh: SideEffect 是针对通过工具、服务、文件系统或外部系统尝试的具体变更的项目本地记录。它将本地已批准的待审批工具调用与后续结果证据关联起来。它不是 MCP Tool Result、意图、策略决定，也不是仅描述验证错误而未改变状态的工具结果。
    en: SideEffect is a project-local record of a concrete change attempted through a tool, service, filesystem, or external system. It links a locally approved Pending Tool Call to later result evidence. It is not an MCP Tool Result, an intent, a policy decision, or a tool result that merely describes a validation error without changing state.
    ja: SideEffect は、ツール、サービス、ファイルシステム、または外部システムを通じて試行された具体的な変更を表すプロジェクト固有の記録です。ローカルで承認された承認待ちツール呼び出しを、後続の結果証拠に結び付けます。MCP Tool Result、意図、ポリシー決定、または状態を変更せず検証エラーだけを記述するツール結果ではありません。
  why_needed:
    zh: 将实际副作用与请求分离，可防止系统在外部系统确认变更之前就宣称成功。
    en: Separating an actual effect from a request prevents systems from claiming success before an external system confirms the change.
    ja: 実際の副作用を要求から分離することで、外部システムが変更を確認する前に成功を主張することを防げます。
  includes:
    - zh: 改变状态的工具操作及其外部目标。
      en: State-changing tool operations and their external targets.
      ja: 状態を変更するツール操作とその外部対象。
  excludes:
    - zh: 只读观察、计划动作和格式变更。
      en: Read-only observations, planned actions, and formatting changes.
      ja: 読み取り専用の観測、計画済みの操作、書式変更。
  semantic_kind: event
  aliases:
    - side-effect-record
    - external-effect
    - state-change
engineering:
  explanation:
    zh: 在批准和强制执行后调用工具，并将其结果与提议操作分开记录。MCP 工具执行返回带有 content 和 isError 指示器的结果；该结果可提供已尝试副作用的证据，但不得从待处理请求推断出该副作用。
    en: After approval and enforcement, invoke the tool and record its result separately from the proposal. MCP tool execution returns a result with content and an isError indicator; that result can provide evidence of the attempted effect but must not be inferred from a pending request.
    ja: 承認と強制の後にツールを呼び出し、その結果を提案から分けて記録します。MCP のツール実行は content と isError 指示子を持つ結果を返します。この結果は試行された副作用の証拠になり得ますが、保留中の要求から副作用を推論してはなりません。
  typical_input:
    - description:
        zh: 已放行的工具调用
        en: Released tool call
        ja: 解放済みのツール呼び出し
      format: '{"name":"cancel_order","arguments":{"order_id":17}}'
      source_claims:
        - claim-mcp-tool-call-and-result
  typical_output:
    - description:
        zh: 工具结果证据
        en: Tool result evidence
        ja: ツール結果の証拠
      format: '{"content":[{"type":"text","text":"Order cancelled"}],"isError":false}'
      source_claims:
        - claim-mcp-tool-call-and-result
  reference_implementations:
    - name: MCP Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines tool results and execution errors.
structure:
  identity_keys:
    - effect_id
  fields:
    - id: effect_id
      labels:
        zh: 副作用标识
        en: Effect ID
        ja: 副作用ID
      definitions:
        zh: 一次已尝试外部状态变更的稳定标识。
        en: Stable identifier for an attempted external state change.
        ja: 試行された外部状態変更の安定した識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ^[a-z0-9-]+$
      example_value: effect-42
      allowed_values: []
      source_claims:
        - claim-mcp-tool-result
    - id: effect_target
      labels:
        zh: 副作用目标
        en: Effect target
        ja: 副作用の対象
      definitions:
        zh: 此操作尝试改变其状态的资源或系统。
        en: Resource or system whose state the operation attempted to change.
        ja: この操作が状態変更を試みたリソースまたはシステム。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: order/17
      allowed_values: []
      source_claims:
        - claim-mcp-tool-result
    - id: pending_tool_call_ref
      labels:
        zh: 待审批工具调用引用
        en: Pending tool call reference
        ja: 承認待ちツール呼び出し参照
      definitions:
        zh: 释放此副作用的已审查待审批工具调用标识。
        en: Identity of the reviewed PendingToolCall that released this effect attempt.
        ja: この副作用の試行を解放したレビュー済み PendingToolCall の識別子。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: PendingToolCall:pending-call-42
      allowed_values: []
      source_claims:
        - claim-mcp-tool-result
    - id: tool_call_id
      labels:
        zh: 工具调用标识
        en: Tool call ID
        ja: ツール呼び出し ID
      definitions:
        zh: 实际执行时使用的工具调用标识，必须能与已批准请求对应。
        en: Identifier of the tool call actually attempted, which must correspond to the approved request.
        ja: 実行を試みたツール呼び出しの識別子。承認済み要求と対応しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ^[A-Za-z0-9._:-]{3,128}$
      example_value: call-cancel-order-42
      allowed_values: []
      source_claims:
        - claim-mcp-tool-result
    - id: execution_state
      labels:
        zh: 执行状态
        en: Execution state
        ja: 実行状態
      definitions:
        zh: 此次外部状态变更尝试的可审计终态或等待态。
        en: Auditable terminal or pending state of this external change attempt.
        ja: この外部変更試行の監査可能な終端状態または保留状態。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: succeeded
      allowed_values:
        - attempted
        - succeeded
        - failed
        - timed_out
      source_claims:
        - claim-mcp-tool-result
    - id: started_at
      labels:
        zh: 开始时间
        en: Started at
        ja: 開始時刻
      definitions:
        zh: 该工具调用实际开始执行的 UTC 时间戳。
        en: UTC timestamp at which this tool call began execution.
        ja: このツール呼び出しの実行開始 UTC 時刻。
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: '2026-07-18T14:02:00Z'
      allowed_values: []
      source_claims:
        - claim-mcp-tool-result
  constraints:
    - id: side-effect-needs-outcome-evidence
      severity: error
      expression_language: plain
      expression: A SideEffect must reference a ToolResultRecord or an explicit execution error outcome.
      explanations:
        zh: 单独一项请求不足以证明外部状态已经改变。
        en: A request alone is insufficient evidence that the external state changed.
        ja: 要求だけでは、外部状態が変更された十分な証拠になりません。
      explanation:
        zh: 单独一项请求不足以证明外部状态已经改变。
        en: A request alone is insufficient evidence that the external state changed.
        ja: 要求だけでは、外部状態が変更された十分な証拠になりません。
      source_claims:
        - claim-mcp-tool-result
    - id: side-effect-binds-approved-call
      severity: error
      expression_language: plain
      expression: A SideEffect may be attempted only for the exact PendingToolCall and tool_call_id released by its ToolApprovalGate; a changed target or arguments requires a new pending tool call and approval decision.
      explanations:
        zh: 副作用必须保留与已审查调用相同的请求和调用标识，不能借用一次批准执行不同操作。
        en: The effect must preserve the reviewed request and call identity instead of reusing approval for a different operation.
        ja: 副作用はレビュー済みの要求と呼び出し ID を保持し、別操作に承認を流用してはならない。
      explanation:
        zh: 副作用必须保留与已审查调用相同的请求和调用标识，不能借用一次批准执行不同操作。
        en: The effect must preserve the reviewed request and call identity instead of reusing approval for a different operation.
        ja: 副作用はレビュー済みの要求と呼び出し ID を保持し、別操作に承認を流用してはならない。
      source_claims:
        - claim-mcp-tool-result
  required_relations: []
examples:
  - id: side-effect-openai_hitl
    labels:
      zh: 外部副作用 - OpenAI Agents SDK 人工审批
      en: Side Effect - OpenAI Agents SDK human approval
      ja: 外部状態変更 - OpenAI Agents SDK 人手承認
    descriptions: {zh: "外部副作用(SideEffect) [SideEffect]: 一次已完成或已尝试的外部状态变更的项目本地记录。. OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。 Fields: execution_state, pending_tool_call_ref, effect_id.", en: "Side Effect (SideEffect) [SideEffect]: A project-local record of a completed or attempted external state change.. OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/). Fields include execution_state, pending_tool_call_ref, effect_id.", ja: "外部状態変更(SideEffect) [SideEffect]: 完了または試行された外部状態変更を表すプロジェクト固有の記録。. OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。 Fields: execution_state, pending_tool_call_ref, effect_id."}
    field_values:
      effect_id: effect-42
      effect_target: order/17
      execution_state: succeeded
      pending_tool_call_ref: "PendingToolCall:pending-call-42"
      started_at: "'2026-07-18T14:02:00Z'"
      tool_call_id: call-cancel-order-42
    related_node_ids:
      - SideEffect
    related_relation_ids: []
    example_source: OpenAI Agents SDK HITL
    source_claims:
      - claim-mcp-tool-result
  - id: side-effect-langgraph_interrupt
    labels:
      zh: 外部副作用 - LangGraph 人工中断
      en: Side Effect - LangGraph human interrupt
      ja: 外部状態変更 - LangGraph 人手 interrupt
    descriptions: {zh: "外部副作用(SideEffect) [SideEffect]: 一次已完成或已尝试的外部状态变更的项目本地记录。. LangGraph interrupt() 暂停图执行供人工审查；Command(resume=...) 在 approve/edit/reject 后继续。 Fields: execution_state, pending_tool_call_ref, effect_id.", en: "Side Effect (SideEffect) [SideEffect]: A project-local record of a completed or attempted external state change.. LangGraph interrupt() pauses graph execution for human review; Command(resume=...) continues after approve/edit/reject (docs.langchain.com/langgraph/interrupts). Fields include execution_state, pending_tool_call_ref, effect_id.", ja: "外部状態変更(SideEffect) [SideEffect]: 完了または試行された外部状態変更を表すプロジェクト固有の記録。. LangGraph interrupt() は human review のため graph を pause し Command(resume=...) で再開する。 Fields: execution_state, pending_tool_call_ref, effect_id."}
    field_values:
      effect_id: effect-42
      effect_target: order/17
      execution_state: succeeded
      pending_tool_call_ref: "PendingToolCall:pending-call-42"
      started_at: "'2026-07-18T14:02:00Z'"
      tool_call_id: call-cancel-order-42
    related_node_ids:
      - SideEffect
    related_relation_ids: []
    example_source: LangGraph interrupt
    source_claims:
      - claim-mcp-tool-result
  - id: side-effect-echoleak
    labels:
      zh: 外部副作用 - EchoLeak Copilot 邮件注入
      en: Side Effect - EchoLeak Copilot email injection
      ja: 外部状態変更 - EchoLeak Copilot メール注入
    descriptions: {zh: "外部副作用(SideEffect) [SideEffect]: 一次已完成或已尝试的外部状态变更的项目本地记录。. EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。 Fields: execution_state, pending_tool_call_ref, effect_id.", en: "Side Effect (SideEffect) [SideEffect]: A project-local record of a completed or attempted external state change.. EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025). Fields include execution_state, pending_tool_call_ref, effect_id.", ja: "外部状態変更(SideEffect) [SideEffect]: 完了または試行された外部状態変更を表すプロジェクト固有の記録。. EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。 Fields: execution_state, pending_tool_call_ref, effect_id."}
    field_values:
      effect_id: effect-42
      effect_target: order/17
      execution_state: succeeded
      pending_tool_call_ref: "PendingToolCall:pending-call-42"
      started_at: "'2026-07-18T14:02:00Z'"
      tool_call_id: call-cancel-order-42
    related_node_ids:
      - SideEffect
    related_relation_ids: []
    example_source: EchoLeak CVE-2025-32711
    source_claims:
      - claim-mcp-tool-result
  - id: side-effect-greshake_bing
    labels:
      zh: 外部副作用 - Greshake Bing Chat 间接注入
      en: Side Effect - Greshake Bing Chat indirect injection
      ja: 外部状態変更 - Greshake Bing Chat 間接注入
    descriptions: {zh: "外部副作用(SideEffect) [SideEffect]: 一次已完成或已尝试的外部状态变更的项目本地记录。. Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。 Fields: execution_state, pending_tool_call_ref, effect_id.", en: "Side Effect (SideEffect) [SideEffect]: A project-local record of a completed or attempted external state change.. Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page. Fields include execution_state, pending_tool_call_ref, effect_id.", ja: "外部状態変更(SideEffect) [SideEffect]: 完了または試行された外部状態変更を表すプロジェクト固有の記録。. Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。 Fields: execution_state, pending_tool_call_ref, effect_id."}
    field_values:
      effect_id: effect-42
      effect_target: order/17
      execution_state: succeeded
      pending_tool_call_ref: "PendingToolCall:pending-call-42"
      started_at: "'2026-07-18T14:02:00Z'"
      tool_call_id: call-cancel-order-42
    related_node_ids:
      - SideEffect
    related_relation_ids: []
    example_source: Greshake ACM CCS 2023
    source_claims:
      - claim-mcp-tool-result
parent_relation: null
relations: []
sources:
  - id: mcp-tool-results
    title: MCP Tools 2025-11-25
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-spec
    relevance: Defines tool result content and execution-error signaling.
source_claims:
  - id: claim-mcp-tool-result
    source: mcp-tool-results
    supports: This ontology defines SideEffect as a project-local record that binds an approved request, target, execution state, and timestamps to later tool-result evidence; these fields are not MCP Tool Result fields.
    locator: Local ontology design boundary; informed by Tools > Calling Tools; Tool Result
    evidence_kind: design-inference
    confidence: high
  - id: claim-mcp-tool-call-and-result
    source: mcp-tool-results
    supports: MCP tools/call requests provide a tool name and arguments, and tool results contain content, may include structuredContent, and can signal execution errors with isError.
    locator: Tools > Calling Tools; Tool Result; Error Handling
    evidence_kind: normative
    confidence: high
