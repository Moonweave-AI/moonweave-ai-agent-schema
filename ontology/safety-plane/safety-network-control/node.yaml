        en: The network-side candidates NetworkPolicy, NetworkRoute, and NetworkEndpoint are identified by a network-rule revision, effective transport path, and addressable destination respectively; isolation candidates are identified by locally visible resources and process capabilities. Both controls may constrain one call, but no accepted endpoint-matching cross-domain edge exists.
