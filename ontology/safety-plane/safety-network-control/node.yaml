    - id: safety-network-control-cq-denied-call-v3
      semantic_key: safety-network-control.denied-call
      primary_owner_module_id: safety-network-control
      related_module_ids: []
      questions:
        zh: 一次网络调用为何未完成：它在解析、策略、路由、代理、连接、重定向还是响应验证阶段被拒绝或失败，依据哪个生效策略和证据？
        en: "Why did a network call not complete: was it denied or failed at resolution, policy, routing, proxy, connection, redirect, or response-validation stage, under which effective policy and evidence?"
        ja: network call は resolution・policy・routing・proxy・connection・redirect・response validation のどこで denied/failed しどの effective policy/evidence に基づきますか。
      query: From the initiating request, inspect call status, denial stage and reason, then follow governed_by to the exact evaluated policy revision.
      expected_assertion: The answer distinguishes policy denial from transport failure, names the stage and evidence, and never creates a DeniedNetworkCall subtype.
      evidence_binding:
        applicability: owner-only
        owner_concept_ids:
          - OutboundRequest
          - NetworkCall
          - NetworkPolicy
        related_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 拒绝阶段、调用状态、理由与实际加载的网络策略均由本模块拥有；内部解析沿 initiates 与 governed_by 复核事实。TraceRecord 只可能记录该结论，PolicyDecision 则属于另一类业务授权，均不是回答本 CQ 所必需的跨模块边。
          en: Denial stage, call status, reason, and the actually loaded network policy are all owned here; internal resolution checks initiates and governed_by. A TraceRecord may observe the conclusion and a PolicyDecision represents separate business authorization, but neither is a cross-module edge required to answer this CQ.
          ja: 拒否段階、呼出し状態、理由、実際に読み込まれたネットワークポリシーはすべて本モジュールが所有し、内部解析では initiates と governed_by を確認します。TraceRecord は結果を記録し得ますが、PolicyDecision は別種の業務認可であり、どちらも本 CQ の回答に必要なモジュール間辺ではありません。
