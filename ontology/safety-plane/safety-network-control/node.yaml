    title: MCP Specification — Transports (2025-06-18)
    url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/transports/
    source_type: official-spec
    relevance: stdio, SSE, HTTP transport network boundaries for MCP servers.
  - id: k8s-network-policy
    title: Kubernetes NetworkPolicy
    url: https://kubernetes.io/docs/concepts/services-networking/network-policies/
    source_type: official-doc
    relevance: Selector-scoped ingress/egress isolation, peers, ports, protocols.
  - id: rfc9110-http
    title: RFC 9110 HTTP Semantics
    url: https://www.rfc-editor.org/rfc/rfc9110.html
    source_type: standard
    relevance: Request/response messages, authority, redirects, correlation.
  - id: cloudflare-gateway-dns
    title: Cloudflare Gateway DNS Policies
    url: https://developers.cloudflare.com/cloudflare-one/policies/gateway/dns-policies/
    source_type: official-doc
    relevance: DNS-based filtering and destination control.
  - id: nist-sp-800-207
    title: NIST SP 800-207 Zero Trust Architecture
    url: https://csrc.nist.gov/pubs/sp/800/207/final
    source_type: standard
    relevance: Policy enforcement points and communication path enablement.
  - id: safety-network-design
    title: Moonweave safety-network-control module boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: NetworkCall, NetworkPolicy, route, endpoint, and response provenance separation.
source_claims:
  - id: claim-safety-network-mcp-boundary
    source: mcp-transports-2025-06-18
    supports: MCP stdio transport has no network egress while SSE/HTTP servers have bind addresses and outbound calls mappable to NetworkCall with egress NetworkPolicy.
    locator: MCP transports > stdio vs HTTP/SSE
    evidence_kind: official
    confidence: high
  - id: claim-safety-network-k8s-netpol
    source: k8s-network-policy
    supports: Kubernetes NetworkPolicy defines selector-scoped egress with peers, ports, and protocols requiring both source egress and destination ingress allowance, generalizable to NetworkPolicy rules.
    locator: Kubernetes docs > NetworkPolicy resource
    evidence_kind: official
    confidence: high
  - id: claim-safety-network-dns-filter
    source: cloudflare-gateway-dns
    supports: DNS policies can block or override resolution results before connection establishment, supporting denial_stage=resolution distinct from transport failure.
    locator: Cloudflare Gateway > DNS policies
    evidence_kind: official
    confidence: high
