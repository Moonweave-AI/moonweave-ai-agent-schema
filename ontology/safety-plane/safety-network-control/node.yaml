              zh: 问题按请求、解析候选、最终端点、有效路由和生效策略逐步求值，不以名称或配置共现替代。
              en: The question evaluates request, resolution candidates, final endpoint, effective route, and governing policy step by step without substituting name or configuration co-occurrence.
              ja: request・candidate・final endpoint・effective route・policy を順に evaluate し name/config co-occurrence で代替しません。
