schema: moonweave.ai/ontology-node/v1
id: safety-network-control
kind: module
labels:
  zh: 网络通信控制
  en: Network communication control
  ja: ネットワーク通信制御
semantics:
  short_definition:
    zh: 网络通信控制描述出站请求如何在策略下解析目标、选择路由、形成调用并关联响应。
    en: Network communication control describes how outbound requests resolve targets under policy, select routes, become network calls, and correlate responses.
    ja: ネットワーク通信制御は、送信要求がポリシー下で宛先解決・経路選択・呼出し形成・応答相関する過程を記述します。
  definition:
    zh: 本模块拥有 NetworkEndpoint、NetworkRoute/ProxyRoute、NetworkPolicy、OutboundRequest、NetworkCall、InboundResponse 及一次 NetworkInteraction 内的解析、跳点、TLS 验证与拒绝阶段证据。它映射 MCP server 部署中的网络边界（stdio 无网络、SSE/HTTP 出站限制、server 监听地址隔离）；Kubernetes NetworkPolicy 的 ingress/egress selector、端口与协议约束；DNS-based filtering（如 Split Horizon DNS、RPZ、Cloudflare Gateway DNS policies）对域名解析结果的控制；以及 egress firewall/proxy 策略（显式代理、CONNECT 隧道、deny-by-default 允许列表）。NetworkPolicy 是 safety-permission-policy 中 PolicySpecification 的网络专门化（NetworkPolicy-is_a-PolicySpecification），表达通信规则而非业务 AuthorizationGrant。原始 InboundResponse 可被工具域引用，但 ToolResult 归 tool-invocation-execution。
    en: "This module owns NetworkEndpoint, NetworkRoute/ProxyRoute, NetworkPolicy, OutboundRequest, NetworkCall, InboundResponse, and resolution, hop, TLS verification, and denial-stage evidence within one NetworkInteraction. It maps MCP server deployment network boundaries (stdio without network, SSE/HTTP egress limits, server bind-address isolation); Kubernetes NetworkPolicy ingress/egress selectors with ports and protocols; DNS-based filtering (split-horizon DNS, RPZ, Cloudflare Gateway DNS policies) controlling resolution results; and egress firewall or proxy policies (explicit proxy, CONNECT tunnel, deny-by-default allowlists). NetworkPolicy is the network specialization of PolicySpecification in safety-permission-policy (NetworkPolicy-is_a-PolicySpecification), expressing communication rules rather than business AuthorizationGrant. Raw InboundResponse may be referenced by the tool domain, but ToolResult belongs to tool-invocation-execution."
    ja: 本モジュールは NetworkEndpoint、NetworkRoute/ProxyRoute、NetworkPolicy、OutboundRequest、NetworkCall、InboundResponse と NetworkInteraction 内 resolution/hop/TLS verification/denial stage evidence を所有します。MCP server deployment network boundary（stdio 無 network、SSE/HTTP egress limit、server bind-address isolation）、Kubernetes NetworkPolicy ingress/egress selector/port/protocol、DNS-based filtering（split-horizon DNS/RPZ/Cloudflare Gateway DNS policy）、egress firewall/proxy policy（explicit proxy/CONNECT tunnel/deny-by-default allowlist）を写像。NetworkPolicy は safety-permission-policy PolicySpecification の network 専門化（NetworkPolicy-is_a-PolicySpecification）で business AuthorizationGrant ではなく通信 rule を表現。raw InboundResponse は tool domain から参照可だが ToolResult は tool-invocation-execution。
  why_needed:
    zh: 若没有网络控制链，Agent 跟随 302 到 169.254.169.254 会泄露云元数据，MCP server 会任意出网 exfiltrate，或把 TCP 超时误报为策略拒绝，且并发请求下无法把响应唯一关联到原 OutboundRequest。
    en: Without a network control chain, agents follow 302 redirects to 169.254.169.254 and leak cloud metadata, MCP servers exfiltrate via unrestricted egress, TCP timeouts are misreported as policy denials, and concurrent requests cannot uniquely correlate responses to the original OutboundRequest.
    ja: network control chain がなければ 302 で 169.254.169.254 へ follow して cloud metadata leak、MCP server 無制限 egress exfiltrate、TCP timeout を policy deny と誤報、並行 request で response を OutboundRequest に一意 correlate できません。
  includes:
    - zh: 经验证的 NetworkEndpoint/Proxy、NetworkRoute、版本化 NetworkPolicy（方向、端点 selector、协议、端口）。
      en: Verified NetworkEndpoint/Proxy, NetworkRoute, and versioned NetworkPolicy (direction, endpoint selector, protocol, port).
      ja: 検証済み NetworkEndpoint/Proxy、NetworkRoute、版管理 NetworkPolicy（方向、endpoint selector、protocol、port）。
    - zh: OutboundRequest、NetworkCall、governed_by 策略、targets 最终端点、receives InboundResponse 及协议关联 ID。
      en: OutboundRequest, NetworkCall, governed_by policy, targets final endpoint, receives InboundResponse, and protocol correlation IDs.
      ja: OutboundRequest、NetworkCall、governed_by policy、targets final endpoint、receives InboundResponse、protocol correlation ID。
    - zh: DNS 解析结果、egress allowlist/denylist 与 MCP server 绑定地址作为解析/策略输入证据。
      en: DNS resolution results, egress allowlist/denylist, and MCP server bind addresses as resolution or policy input evidence.
      ja: DNS resolution result、egress allowlist/denylist、MCP server bind address を resolution/policy 入力 evidence。
  excludes:
    - zh: Socket/ProcessHandle 归 runtime-system；FilesystemPolicy/Sandbox 归 safety-sandbox-network。
      en: Socket/ProcessHandle belongs to runtime-system; FilesystemPolicy/Sandbox belongs to safety-sandbox-network.
      ja: Socket/ProcessHandle は runtime-system；FilesystemPolicy/Sandbox は safety-sandbox-network。
    - zh: AuthorizationGrant/PolicyDecision（业务授权）归 safety-permission-policy；NetworkPolicy 不自行授予业务权限。
      en: AuthorizationGrant/PolicyDecision (business authorization) belongs to safety-permission-policy; NetworkPolicy does not grant business authority by itself.
      ja: AuthorizationGrant/PolicyDecision（業務認可）は safety-permission-policy；NetworkPolicy 単独では business authority を付与しません。
    - zh: 解析后的 ToolResult 归 tool-invocation-execution；本模块保留 raw protocol 事实。
      en: Parsed ToolResult belongs to tool-invocation-execution; this module retains raw protocol facts.
      ja: 解析後 ToolResult は tool-invocation-execution；本モジュールは raw protocol fact を保持。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: "集成时应把 MCP server transport 绑定（127.0.0.1:port vs 0.0.0.0）与 egress NetworkPolicy 联立；Kubernetes NetworkPolicy egress to: namespaceSelector/ipBlock 映射为 NetworkPolicy rule；DNS RPZ 或 Cloudflare Gateway 的 blocked resolve 映射为 denial_stage=resolution；企业 egress proxy 的 CONNECT 与 ordered hop 映射为 ProxyRoute。HTTP 302 到新 authority 必须产生新 OutboundRequest/NetworkCall 链，不得继承原 allow。响应关联必须依赖 stream ID、request ID 或 connection tuple，不能仅凭 Host 共现。"
    en: "Integrations should jointly model MCP server transport bind (127.0.0.1:port vs 0.0.0.0) with egress NetworkPolicy; Kubernetes NetworkPolicy egress to namespaceSelector/ipBlock as NetworkPolicy rules; DNS RPZ or Cloudflare Gateway blocked resolves as denial_stage=resolution; enterprise egress proxy CONNECT and ordered hops as ProxyRoute. HTTP 302 to a new authority must create a new OutboundRequest/NetworkCall chain without inheriting the original allow. Response correlation must use stream ID, request ID, or connection tuple—not Host co-occurrence alone."
    ja: MCP server transport bind と egress NetworkPolicy を連立；K8s NetworkPolicy egress rule、DNS RPZ/Cloudflare Gateway blocked resolve（denial_stage=resolution）、enterprise egress proxy CONNECT/hop（ProxyRoute）を写像。HTTP 302 新 authority は新 OutboundRequest/NetworkCall chain 必須で原 allow 継承不可。response correlate は stream ID/request ID/connection tuple 必須で Host 共起のみ不可。
  typical_input:
    - description: MCP HTTP server with restricted bind and egress allowlist.
      format: |
        mcp_server:
          transport: sse
          bind: 127.0.0.1:8080
        egress_policy: egress-agent-tools@9
        allowed_destinations:
          - https://api.example.com/*
          - https://registry.npmjs.org/*
      source_claims: [claim-safety-network-mcp-boundary]
    - description: Kubernetes NetworkPolicy egress restriction.
      format: |
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        spec:
          podSelector: {matchLabels: {app: agent-runner}}
          policyTypes: [Egress]
          egress:
            - to: [{ipBlock: {cidr: 203.0.113.0/24}}]
              ports: [{protocol: TCP, port: 443}]
      source_claims: [claim-safety-network-k8s-netpol]
    - description: DNS-based filtering blocking metadata endpoint resolution.
      format: |
        dns_policy: block-metadata-endpoints
        query: 169.254.169.254
        result: NXDOMAIN
        => denial_stage: resolution (before TCP connect)
      source_claims: [claim-safety-network-dns-filter]
  typical_output:
    - description: Allow via approved proxy with verified final endpoint.
      format: |
        request_id: out-req-884
        network_policy_ref: egress-agent-tools@9
        route_id: route-884
        ordered_hops: [proxy-egress-2, endpoint-api-v4-42]
        final_endpoint: 203.0.113.42:443
        tls_verification_ref: tls-san-api-example-20260716
        call_status: completed
      source_claims: [claim-safety-network-design]
    - description: Redirect requires new authorization chain.
      format: |
        original_authority: api.example.com
        redirect_location: http://169.254.169.254/latest/meta-data/
        new_request_id: null
        authorization_chain_complete: false
        action: reject-inherit-allow
      source_claims: [claim-safety-network-design]
  reference_implementations:
    - name: MCP Specification — Transports
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/transports/
      description: stdio, SSE, streamable HTTP transport network boundaries.
    - name: Kubernetes NetworkPolicy
      url: https://kubernetes.io/docs/concepts/services-networking/network-policies/
      description: Selector-scoped ingress/egress rules, peers, ports, protocols.
    - name: RFC 9110 HTTP Semantics
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      description: Request/response messages, redirects, authority, correlation.
    - name: Cloudflare Gateway DNS policies
      url: https://developers.cloudflare.com/cloudflare-one/policies/gateway/dns-policies/
      description: DNS-based filtering and destination control.
    - name: NIST SP 800-207 Zero Trust
      url: https://csrc.nist.gov/pubs/sp/800/207/final
      description: Policy enforcement points and communication path control.
structure:
  identity_keys: [request_id, network_call_id]
  fields:
    - id: request_id
      labels: {zh: 出站请求标识, en: Outbound request identifier, ja: 送信要求識別子}
      definitions:
        zh: 一次 OutboundRequest 的唯一 ID；redirect 目标必须产生新 request_id。
        en: Unique ID of one OutboundRequest; redirect targets must produce a new request_id.
        ja: 一回 OutboundRequest の一意 ID。redirect 先は新 request_id 必須。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^out-req-[A-Za-z0-9._-]+$'
      example_value: out-req-884
      allowed_values: []
      source_claims: [claim-safety-network-design]
    - id: network_policy_ref
      labels: {zh: 网络策略版本引用, en: Network policy revision reference, ja: ネットワークポリシー版参照}
      definitions:
        zh: NetworkCall-governed_by 实际评估的 NetworkPolicy 版本。
        en: NetworkPolicy revision actually evaluated per NetworkCall-governed_by.
        ja: NetworkCall-governed_by で実際 evaluate された NetworkPolicy revision。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: egress-agent-tools@9
      allowed_values: []
      source_claims: [claim-safety-network-k8s-netpol]
    - id: call_status
      labels: {zh: 调用状态, en: Call status, ja: 呼出し状態}
      definitions:
        zh: completed、denied、failed 等；须与 denial_stage/failure_stage 及 policy 结果联合解释。
        en: completed, denied, failed, etc.; must be read with denial_stage/failure_stage and policy result.
        ja: completed/denied/failed 等。denial_stage/failure_stage と policy result と併読必須。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: denied
      allowed_values: [completed, denied, failed]
      source_claims: [claim-safety-network-design]
  constraints:
    - id: network-redirect-new-chain
      severity: error
      expression_language: plain
      expression: When final authority differs from the original OutboundRequest after redirect, a new OutboundRequest, NetworkCall, policy evaluation, and route fact chain is required; inherited allow is invalid.
      explanation:
        zh: 最终目标变化后，原解析、端点身份和策略决定均不再充分。
        en: After target changes, original resolution, endpoint identity, and policy decision are no longer sufficient.
        ja: 宛先変更後は原 resolution/endpoint identity/policy decision では不十分です。
      source_claims: [claim-safety-network-design]
    - id: network-policy-vs-transport-failure
      severity: error
      expression_language: plain
      expression: call_status=failed with failure_stage=connection and network_policy_result=allow must not be reported as policy denial; denial_stage=policy requires explicit policy mismatch evidence.
      explanation:
        zh: 策略结果与运输失败是不同事实。
        en: Policy outcome and transport failure are distinct facts.
        ja: policy outcome と transport failure は別 fact です。
      source_claims: [claim-safety-network-design]
    - id: network-response-correlation-required
      severity: error
      expression_language: plain
      expression: InboundResponse responds_to OutboundRequest requires protocol correlation (stream ID, request ID, or connection tuple); Host header and status code alone are insufficient under concurrent calls.
      explanation:
        zh: 主机共现无法在并发请求间建立唯一溯源。
        en: Host co-occurrence cannot establish unique provenance across concurrent requests.
        ja: Host 共起は並行 request 間の unique provenance を確立できません。
      source_claims: [claim-safety-network-design]
  required_relations:
    - id: request-initiates-call
      direction: outgoing
      predicate: initiates
      target_concept_id: NetworkCall
      cardinality: {min: 1, max: 1}
      explanations:
        zh: OutboundRequest 通过 initiates 启动恰好一次 NetworkCall。
        en: OutboundRequest initiates exactly one NetworkCall.
        ja: OutboundRequest は exactly 一 NetworkCall を initiates します。
      source_claims: [claim-safety-network-design]
    - id: call-governed-by-policy
      direction: outgoing
      predicate: governed_by
      target_concept_id: NetworkPolicy
      cardinality: {min: 1, max: 1}
      explanations:
        zh: NetworkCall 必须 governed_by 一条实际评估的 NetworkPolicy 版本。
        en: NetworkCall must be governed_by one actually evaluated NetworkPolicy revision.
        ja: NetworkCall は actually evaluated NetworkPolicy revision 一つに governed_by 必須。
      source_claims: [claim-safety-network-design]
examples:
  - id: safety-network-control-example-proxy-route-allow
    labels:
      zh: 经批准代理的 HTTPS 出站
      en: HTTPS egress via approved proxy
      ja: 承認 proxy 経由 HTTPS egress
    descriptions:
      zh: out-req-884 请求 api.example.com；egress-agent-tools@9 要求经 proxy-egress-2，route-884 验证最终端点 203.0.113.42:443（TLS SAN 匹配），call_status=completed，in-resp-884 以 HTTP/2 stream 17 关联原请求。
      en: out-req-884 targets api.example.com; egress-agent-tools@9 requires proxy-egress-2, route-884 verifies final endpoint 203.0.113.42:443 with matching TLS SAN, call_status=completed, and in-resp-884 correlates via HTTP/2 stream 17.
      ja: out-req-884 が api.example.com を要求。egress-agent-tools@9 が proxy-egress-2 を要求、route-884 が 203.0.113.42:443（TLS SAN 一致）を検証、call_status=completed、in-resp-884 が HTTP/2 stream 17 で correlate。
    example_source:
      product: Moonweave design / RFC 9110
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      version: HTTP proxy routing and response correlation
    field_values:
      request_id: out-req-884
      network_policy_ref: egress-agent-tools@9
      route_id: route-884
      final_endpoint: 203.0.113.42:443
      call_status: completed
    related_node_ids:
      - OutboundRequest
      - NetworkCall
      - NetworkRoute
      - NetworkPolicy
      - InboundResponse
    related_relation_ids:
      - OutboundRequest-initiates-NetworkCall
      - NetworkCall-governed_by-NetworkPolicy
      - NetworkCall-routed_by-NetworkRoute
    source_claims:
      - claim-safety-network-design
  - id: safety-network-control-example-metadata-redirect-block
    labels:
      zh: 阻止 302 到元数据端点
      en: Block 302 redirect to metadata endpoint
      ja: metadata endpoint への 302 block
    descriptions:
      zh: 原调用获准访问 api.example.com 却收到 302 指向 169.254.169.254；实现若直接跟随而未建 new_request_id 与 policy 链，NetworkControl 必须拒绝并报告 authorization_chain_complete=false。
      en: An allowed call for api.example.com receives 302 to 169.254.169.254; if implementation follows without a new request_id and policy chain, network control must reject and report authorization_chain_complete=false.
      ja: api.example.com 許可 call が 169.254.169.254 へ 302 を受信。new_request_id/policy chain なし follow なら network control reject、authorization_chain_complete=false。
    example_source:
      product: OWASP / cloud security practice
      url: https://owasp.org/www-community/attacks/Server_Side_Request_Forgery
      version: SSRF via redirect to metadata IP
    field_values:
      original_authority: api.example.com
      redirect_location: http://169.254.169.254/latest/meta-data/
      authorization_chain_complete: false
    related_node_ids:
      - InboundResponse
      - OutboundRequest
      - NetworkCall
    related_relation_ids: []
    source_claims:
      - claim-safety-network-design
  - id: safety-network-control-example-k8s-egress-deny
    labels:
      zh: Kubernetes NetworkPolicy 拒绝未列目的地
      en: Kubernetes NetworkPolicy denies unlisted destination
      ja: Kubernetes NetworkPolicy が未登録 destination を deny
    descriptions:
      zh: out-req-885 目标 updates.unapproved.example；net-call-885 加载 egress-agent-tools@9 后匹配 deny-unlisted-destination@9，denial_stage=policy，transport_connection_started=false。
      en: out-req-885 targets updates.unapproved.example; net-call-885 loads egress-agent-tools@9, matches deny-unlisted-destination@9, denial_stage=policy, transport_connection_started=false.
      ja: out-req-885 が updates.unapproved.example を target。net-call-885 が egress-agent-tools@9 load 後 deny-unlisted-destination@9 に一致、denial_stage=policy、transport_connection_started=false。
    example_source:
      product: Kubernetes
      url: https://kubernetes.io/docs/concepts/services-networking/network-policies/
      version: NetworkPolicy egress rules
    field_values:
      request_id: out-req-885
      network_policy_ref: egress-agent-tools@9
      call_status: denied
      denial_stage: policy
      denial_reason: destination-not-allowlisted
    related_node_ids:
      - NetworkCall
      - NetworkPolicy
    related_relation_ids:
      - NetworkCall-governed_by-NetworkPolicy
    source_claims:
      - claim-safety-network-k8s-netpol
  - id: safety-network-control-example-dns-resolution-deny
    labels:
      zh: DNS 过滤在解析阶段拒绝
      en: DNS filtering denies at resolution stage
      ja: DNS filter が resolution 段階で deny
    descriptions:
      zh: Agent 请求 exfil.attacker.example；Split Horizon DNS 返回 NXDOMAIN；NetworkCall net-call-dns-12 记录 denial_stage=resolution、failure_stage 未进入 connection，区别于 TCP 超时。
      en: The agent requests exfil.attacker.example; split-horizon DNS returns NXDOMAIN; NetworkCall net-call-dns-12 records denial_stage=resolution without entering connection failure_stage, distinct from TCP timeout.
      ja: Agent が exfil.attacker.example を要求。Split Horizon DNS が NXDOMAIN。NetworkCall net-call-dns-12 が denial_stage=resolution を記録し connection failure_stage 未进入—TCP timeout と区別。
    example_source:
      product: Cloudflare Gateway DNS
      url: https://developers.cloudflare.com/cloudflare-one/policies/gateway/dns-policies/
      version: DNS-based destination filtering
    field_values:
      requested_host: exfil.attacker.example
      dns_result: NXDOMAIN
      denial_stage: resolution
      call_status: denied
    related_node_ids:
      - NetworkCall
      - NetworkPolicy
    related_relation_ids: []
    source_claims:
      - claim-safety-network-dns-filter
  - id: safety-network-control-example-mcp-server-egress
    labels:
      zh: MCP server 出站边界与 allowlist
      en: MCP server egress boundary and allowlist
      ja: MCP server egress boundary と allowlist
    descriptions:
      zh: HTTP MCP server 绑定 127.0.0.1:8080，tools/call 触发出站到 registry.npmjs.org（允许）与 internal.corp（拒绝）；每次出站独立 NetworkCall 与 governed_by egress-mcp-tools@4，stdio transport MCP server 则无 NetworkCall 记录。
      en: An HTTP MCP server binds 127.0.0.1:8080; tools/call triggers egress to registry.npmjs.org (allowed) and internal.corp (denied); each egress is a separate NetworkCall governed_by egress-mcp-tools@4, while stdio transport MCP servers record no NetworkCall.
      ja: HTTP MCP server が 127.0.0.1:8080 bind。tools/call が registry.npmjs.org（allow）と internal.corp（deny）へ egress。各 egress は独立 NetworkCall/governed_by egress-mcp-tools@4。stdio transport MCP server は NetworkCall 記録なし。
    example_source:
      product: MCP
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/transports/
      version: stdio vs HTTP/SSE network boundaries
    field_values:
      transport: sse
      bind_address: 127.0.0.1:8080
      allowed_host: registry.npmjs.org
      denied_host: internal.corp
      network_policy_ref: egress-mcp-tools@4
    related_node_ids:
      - NetworkCall
      - NetworkPolicy
      - NetworkEndpoint
    related_relation_ids: []
    source_claims:
      - claim-safety-network-mcp-boundary
parent_relation: null
relations: []
sources:
