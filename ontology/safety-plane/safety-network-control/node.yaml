    ja: network interaction
  owns_when:
    zh: 当对象必须由网络协议发生、经验证地址、原始请求/响应、一次有效传输路径或网络策略修订来识别时，由本模块拥有。
    en: Own an object when it must be identified by a network-protocol occurrence, verified address, raw request or response, one effective transport path, or a network-policy revision.
    ja: ネットワークプロトコル上の発生、検証済みアドレス、生の要求・応答、一つの有効な伝送経路、またはネットワークポリシー版によって識別される対象を所有します。
  references_when:
    zh: 网络交互引用发起主体和运行环境、适用授权、信任边界与本地隔离；能力调用或协议会话引用原始网络事实时，不复制端点、路由或消息身份。
    en: A network interaction references its initiating actor and runtime environment, applicable authorization, trust boundary, and local isolation. Capability invocations or protocol sessions referencing raw network facts do not copy endpoint, route, or message identities.
    ja: ネットワーク対話は、開始主体と実行環境、適用認可、信頼境界、ローカル隔離を参照します。能力呼び出しやプロトコルセッションが生のネットワーク事実を参照しても、端点、経路、メッセージの同一性は複製しません。
