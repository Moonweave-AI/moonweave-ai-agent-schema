module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: OutboundRequest 通过 initiates 为 NetworkCall 提供协议请求输入。
          en: OutboundRequest supplies protocol request input to NetworkCall through initiates.
          ja: OutboundRequest は initiates で NetworkCall に protocol request input を与えます。
        family_concept_ids:
          - OutboundRequest
          - NetworkCall
        relation_ids:
          - OutboundRequest-initiates-NetworkCall
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: NetworkCall 接收 InboundResponse，并由响应关联原请求。
          en: NetworkCall receives InboundResponse, which is correlated to the original request.
          ja: NetworkCall は InboundResponse を receive し response は original request に correlate します。
        family_concept_ids:
          - NetworkCall
          - InboundResponse
          - OutboundRequest
        relation_ids:
          - NetworkCall-receives-InboundResponse
          - InboundResponse-responds_to-OutboundRequest
        not_applicable_reason: null
      failure:
        applicable: true
        description:
          zh: 调用状态、拒绝阶段和 governed_by 策略版本共同记录拒绝或失败。
          en: Call status, denial stage, and governed_by policy revision jointly record denial or failure.
          ja: call status・denial stage・governed_by policy revision が denial/failure を記録します。
        family_concept_ids:
          - NetworkCall
          - NetworkPolicy
        relation_ids:
          - NetworkCall-governed_by-NetworkPolicy
        not_applicable_reason: null
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 本域记录新请求、重试或重定向的新事实链，但恢复计划和补偿执行由运行时或反馈域拥有。
          en: This domain records a new fact chain for request, retry, or redirect, while runtime or feedback owns recovery plans and compensation execution.
          ja: new request/retry/redirect fact chain は記録しますが recovery plan/compensation execution は runtime/feedback が所有します。
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-network-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 2026-07-16 逐节点、逐关系复核后，以调用实际交换的消息、目标端点和有效路由把四类事实连接成一条可审计骨架，并将拒绝状态、Socket 实现和泛化资源移出。
            en: After node-by-node and relation-by-relation review on 2026-07-16, the call's exchanged messages, target endpoint, and effective route connect the four fact families into one auditable backbone; denial state, Socket implementation, and generic resources were removed.
            ja: 2026-07-16 の node/relation review 後、call が交換する message・target endpoint・effective route で四 fact family を一つの auditable backbone に接続し、denial state・Socket implementation・generic resource を除外しました。
        - reviewer_id: moonweave-network-ontology-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 确认消息、端点和路由不能伪装为 NetworkInteraction 子类，但可以通过经过来源核验的 exchanges、targets 与 routed_by 事实成为同一显示骨架。
            en: Confirmed that messages, endpoints, and routes are not NetworkInteraction subtypes, while source-checked exchanges, targets, and routed_by facts can connect them within one display backbone.
            ja: message・endpoint・route は NetworkInteraction subtype ではない一方、source review 済み exchanges・targets・routed_by fact で一つの display backbone に接続できることを確認しました。
  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - NetworkInteraction
    allowed_backbone_predicates:
      - exchanges
      - is_a
      - routed_by
    flat_root_exception_concept_ids:
      - NetworkEndpoint
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-network-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项确认 NetworkInteraction → NetworkCall 后，调用通过 exchanges 与 routed_by 连接本次交互的消息和路由。NetworkEndpoint 是可在调用之前登记、由多次解析或调用复用并继续展开 Proxy 的可寻址实体，因此作为独立入口；targets 只记录某次调用最终采用哪个端点。
            en: Point-by-point review confirms that NetworkInteraction leads to NetworkCall and a call connects its messages and route through exchanges and routed_by. NetworkEndpoint is an addressable entity that can be registered before a call, reused by many resolutions or calls, and further specialized as Proxy, so it is an independent entry; targets only records the endpoint finally adopted by one call.
            ja: NetworkInteraction → NetworkCall を項目別確認し、call は exchanges / routed_by で当該 interaction の message と route を接続します。NetworkEndpoint は call 前に登録でき複数 resolution/call で再利用され Proxy を展開する addressable entity なので独立 entry とし、targets は一 call が最終採用した endpoint だけを記録します。
        - reviewer_id: moonweave-network-ontology-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 本体复核确认父边不能由一次可选 targets 事实替代稳定身份层级。NetworkEndpoint 保持独立实体入口并通过 is_a 展开 Proxy；NetworkCall targets NetworkEndpoint 保留 canonical 方向、最终采用与身份验证条件，但改为 cross-link，不参与社区骨架。
            en: Ontology review confirms that a stable identity hierarchy cannot be replaced by one optional targets fact. NetworkEndpoint remains an independent entity entry and expands to Proxy through is_a. NetworkCall targets NetworkEndpoint retains its canonical direction, final-adoption condition, and identity-verification requirement but becomes a cross-link outside the community backbone.
            ja: 本体審査は安定 identity hierarchy を一回の optional targets fact で代替できないと確認します。NetworkEndpoint は独立 entity entry とし is_a で Proxy を展開します。NetworkCall targets NetworkEndpoint は canonical 方向・final adoption・identity verification 条件を保持しつつ community backbone 外の cross-link とします。
  competency_questions:
