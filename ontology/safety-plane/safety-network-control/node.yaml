schema: moonweave.ai/ontology-node/v1
id: safety-network-control
kind: module
status: accepted
labels:
  zh: 网络通信控制
  en: Network communication control
  ja: ネットワーク通信制御
semantics:
  short_definition:
    zh: 网络通信控制描述一条出站请求如何在版本化网络策略下解析并验证目标端点、选择实际路由或代理、形成网络调用，并用协议相关标识接收对应响应。它拥有网络地址、路径、原始网络消息和通信策略事实，不拥有本地进程隔离、业务授权或解析后的工具结果。
    en: Network communication control describes how an outbound request resolves and verifies its destination under a versioned network policy, selects an effective route or proxy, becomes a network call, and receives the correlated response. It owns network-address, path, raw-message, and communication-policy facts, not local process isolation, business authorization, or parsed tool results.
    ja: ネットワーク通信制御は、送信要求が版管理されたネットワークポリシーの下で宛先を解決・検証し、実際の経路またはプロキシを選び、ネットワーク呼び出しとなり、プロトコル上対応する応答を受ける過程を記述します。ネットワークアドレス、経路、生の通信メッセージ、通信ポリシーの事実を所有し、ローカルプロセス隔離、業務認可、解析後のツール結果は所有しません。
  definition:
    zh: 网络通信控制描述一条出站请求如何在版本化网络策略下解析并验证目标端点、选择实际路由或代理、形成网络调用，并用协议相关标识接收对应响应。它拥有网络地址、路径、原始网络消息和通信策略事实，不拥有本地进程隔离、业务授权或解析后的工具结果。
    en: Network communication control describes how an outbound request resolves and verifies its destination under a versioned network policy, selects an effective route or proxy, becomes a network call, and receives the correlated response. It owns network-address, path, raw-message, and communication-policy facts, not local process isolation, business authorization, or parsed tool results.
    ja: ネットワーク通信制御は、送信要求が版管理されたネットワークポリシーの下で宛先を解決・検証し、実際の経路またはプロキシを選び、ネットワーク呼び出しとなり、プロトコル上対応する応答を受ける過程を記述します。ネットワークアドレス、経路、生の通信メッセージ、通信ポリシーの事実を所有し、ローカルプロセス隔離、業務認可、解析後のツール結果は所有しません。
  why_needed:
    zh: 让每次网络通信都能回答最终去了哪里、经过哪条路径、适用哪版网络规则、在哪一步失败以及响应来自哪里。
    en: Make every network communication answer its final destination, effective path, applicable policy revision, failure stage, and response origin.
    ja: 各ネットワーク通信について、最終宛先、実際の経路、適用ポリシー版、失敗段階、応答元を説明できるようにします。
  includes:
    - zh: 经验证的网络端点与代理、实际生效的路由与代理路由，以及按方向、端点、协议和端口约束通信的版本化网络策略。
      en: Verified network endpoints and proxies, effective routes and proxy routes, and versioned network policies that constrain communication by direction, endpoint, protocol, and port.
      ja: 検証済みネットワーク端点とプロキシ、実際に有効な経路とプロキシ経路、方向・端点・プロトコル・ポートで通信を制約する版管理されたネットワークポリシーを含みます。
    - zh: 一次 NetworkInteraction 中的 OutboundRequest、NetworkCall、所用策略和路由、最终端点，以及与原请求相关的 InboundResponse。
      en: Within one NetworkInteraction, the OutboundRequest, NetworkCall, applied policy and route, final endpoint, and InboundResponse correlated to the original request.
      ja: 一回の NetworkInteraction における OutboundRequest、NetworkCall、適用ポリシーと経路、最終端点、元要求に対応する InboundResponse を含みます。
  excludes:
    - zh: Socket/DomainSocket 等运行句柄属于运行时；文件、进程、挂载和命名空间隔离属于执行环境隔离。
      en: Runtime handles such as Socket and DomainSocket belong to Runtime; filesystem, process, mount, and namespace isolation belong to execution-environment isolation.
      ja: Socket や DomainSocket などの実行時ハンドルは実行時領域に、ファイル、プロセス、マウント、名前空間の隔離は実行環境隔離に属します。
    - zh: 业务 AuthorizationGrant 与 PolicyDecision 属于授权与策略决策；NetworkPolicy 只表达网络通信规则，不能自行授予业务权限。
      en: Business AuthorizationGrant and PolicyDecision belong to authorization and policy decisions; NetworkPolicy expresses network communication rules and cannot itself grant business authority.
      ja: 業務上の AuthorizationGrant と PolicyDecision は認可とポリシー判断に属します。NetworkPolicy は通信規則を表すだけで、業務権限を付与できません。
    - zh: 原始网络响应可以被能力调用引用，但解析、扫描和裁剪后的 ToolResult 归能力调用与结果；框架名和来源文档只是节点信息。
      en: A raw network response may be referenced by capability invocation, but the parsed, scanned, and trimmed ToolResult belongs to capability invocation and outcomes; framework names and source documents remain node information.
      ja: 生のネットワーク応答は能力呼び出しから参照できますが、解析・検査・切詰め後の ToolResult は能力呼び出しと結果に属します。フレームワーク名と出典文書はノード情報です。
  semantic_kind: null
  aliases: []
purpose:
  zh: 为网络请求、实际路径、目标端点、通信策略和对应响应建立完整的可复核链路。
  en: Establish a complete, reviewable chain connecting a network request, effective path, destination endpoint, communication policy, and correlated response.
  ja: ネットワーク要求、実際の経路、宛先端点、通信ポリシー、対応応答を結ぶ完全で検証可能な連鎖を確立します。
