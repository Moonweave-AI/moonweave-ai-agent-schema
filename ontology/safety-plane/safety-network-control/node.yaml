              zh: 拒绝与失败由调用状态、阶段和实际策略共同判定，不按状态新建子类。
              en: Denial and failure are decided from call state, stage, and actual policy without creating state-based subclasses.
              ja: denial/failure は call state・stage・actual policy で判定し state-based subtype を作りません。
