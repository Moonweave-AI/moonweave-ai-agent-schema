source_claims:
  - id: claim-safety-network-control-001
    source: eng-network-nist-zero-trust
    supports: NIST SP 800-207 distinguishes an access request, per-resource policy decision, policy administrator, policy enforcement point, and the communication path that is enabled, monitored, and terminated; Moonweave uses those distinctions to separate policy, interaction occurrence, endpoint, and effective route evidence.
    locator: NIST SP 800-207 Sections 2.1-2.2 and 3.2, policy engine, policy administrator, and policy enforcement point
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-safety-network-control-002
    source: eng-network-kubernetes-network-policy
    supports: Kubernetes NetworkPolicy defines selector-scoped ingress and egress isolation with peers, ports, and protocols, and requires source egress and destination ingress allowance for a connection; Moonweave generalizes only the policy-specification distinction.
    locator: "Kubernetes Network Policies: The two sorts of pod isolation; The NetworkPolicy resource; Behavior of to and from selectors"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-safety-network-control-003
    source: eng-proto-rfc9110-http-semantics
    supports: RFC 9110 distinguishes HTTP request and response messages, target resources and authorities, origin servers, proxy intermediaries, direct versus proxy routing, redirects, and response status; Moonweave places these protocol facts under broader network concepts.
    locator: RFC 9110 Sections 3.1-3.7, 4.2-4.3, 6, 7.1-7.4, 10.2, and 15.4
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-safety-network-control-004
    source: eng-proto-rfc1928-socks5
    supports: RFC 1928 defines SOCKS client-to-server negotiation, authentication selection, CONNECT/BIND/UDP ASSOCIATE commands, IPv4/domain/IPv6 addressing, relay establishment, and denial replies; Moonweave treats SOCKSProxy as a protocol-specific Proxy subtype.
    locator: RFC 1928 Sections 3-7, TCP client procedure, requests, addressing, replies, and UDP client procedure
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-safety-network-control-005
    source: eng-network-nist-zero-trust
    supports: NIST SP 800-207 separates resources, access requests, policy decisions, policy enforcement points, trust zones, monitoring, and termination. Moonweave uses that distinction to link an optional disclosure record to a concrete boundary crossing instead of classifying visible content as a trust boundary.
    locator: NIST SP 800-207 Sections 2.1-2.2 and 3.2, trust zones and policy enforcement points
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-safety-network-control-006
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry defines traces as causally related spans with context propagation and timing. Those stable trace constructs support specializing FrameworkMapping for framework-emitted observability records while keeping checkpoints and business state outside the subtype.
    locator: Specification overview > Signals > Traces, spans, and context propagation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-network-control-007
    source: eng-fw-openai-guardrails
    supports: OpenAI Guardrails runs configurable validation over input and output data and returns guardrail results or triggers a blocking tripwire when a violation is detected. This supports distinguishing the object being transported from the later safety judgment produced by content validation; assigning raw response identity to network control and InjectionScanResult identity to injection defense is a reviewed Moonweave boundary inference.
    locator: OpenAI Guardrails Python > Why Guardrails; How It Works > Validate and Handle; Tripwires > How Tripwires Work
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-safety-network-control-008
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends constraining and sandboxing tool execution in addition to network and access controls. This supports independent IsolationSpecification, FilesystemPolicy, ProcessPolicy, and Sandbox identities instead of treating them as network policy or route objects. The guidance does not define a direct edge between these Moonweave classes, so the comparison remains N/A.
    locator: Recommendations > Constrain and sandbox tool execution and Design for boundaries (pp. 10-12)
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
