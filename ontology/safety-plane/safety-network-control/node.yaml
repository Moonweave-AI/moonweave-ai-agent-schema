      semantic_key: safety-network-control.route-authorization
      primary_owner_module_id: safety-network-control
      related_module_ids: []
      questions:
        zh: 一次出站请求的原始目标解析成哪些候选端点，实际采用哪个最终端点与路由，哪个网络策略版本据此允许或拒绝？
        en: Which candidate endpoints did an outbound request's original target resolve to, which final endpoint and route were actually adopted, and which network-policy revision allowed or denied them?
        ja: outbound request original target はどの candidate endpoint に resolve し actual final endpoint/route は何でどの network-policy revision が allow/deny しましたか。
      query: Follow the request to its call, list resolution candidates, inspect the final target and effective route, and identify the exact policy revision evaluated for that call.
      expected_assertion: The answer preserves original authority, candidate endpoints, final verified endpoint, ordered route, and effective policy version; redirects require a new call chain.
      evidence_binding:
        applicability: owner-only
        owner_concept_ids:
          - OutboundRequest
          - NetworkCall
          - NetworkEndpoint
          - NetworkRoute
          - NetworkPolicy
        related_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该问题只解析本模块拥有的请求、调用、候选端点、最终端点、有效路由与网络策略版本；内部查询仍逐条核实 initiates、resolves_to、targets、routed_by 与 governed_by，但 owner-only 证据绑定不重复列模块内关系。
          en: This question resolves only the request, call, candidate and final endpoints, effective route, and network-policy revision owned here. Internal evaluation still verifies initiates, resolves_to, targets, routed_by, and governed_by, while an owner-only evidence binding does not repeat intra-module relations.
          ja: この問いは本モジュールが所有する要求、呼出し、候補・最終エンドポイント、有効ルート、ネットワークポリシー版だけを解決します。内部評価では initiates、resolves_to、targets、routed_by、governed_by を確認しますが、owner-only 証拠束縛にはモジュール内関係を重複記載しません。
