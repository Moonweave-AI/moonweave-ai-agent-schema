      - NetworkPolicy
      - NetworkPolicy-is_a-PolicySpecification
      - PolicySpecification
    example_source: Envoy ext_authz
    source_claims:
      - claim-network-policy-001
  - id: network-policy-e2b
    labels:
      zh: 网络策略 - E2B 沙箱 VM
