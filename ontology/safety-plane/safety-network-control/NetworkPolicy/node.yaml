    descriptions: {zh: "网络策略(NetworkPolicy) [NetworkPolicy]: 按主体、方向、端点、协议与端口决定网络通信的版本化策略规范。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — 网络隔离、文件系统隔离与资源限制。 Fields: action, direction.", en: "network policy (NetworkPolicy) [NetworkPolicy]: A versioned policy specification deciding network communication by subject, direction, endpoint, protocol, and port.. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network isolation, filesystem isolation, and resource limits (e2b.dev/docs). Fields include action, direction.", ja: "network policy(NetworkPolicy) [NetworkPolicy]: subject・direction・endpoint・protocol・port で network communication を決定する versioned policy specification。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network/filesystem isolation と resource limit。 Fields: action, direction."}
    field_values:
