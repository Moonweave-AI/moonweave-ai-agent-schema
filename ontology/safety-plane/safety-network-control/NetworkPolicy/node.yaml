schema: moonweave.ai/ontology-node/v1
id: NetworkPolicy
kind: concept
labels:
  zh: 网络策略
  en: network policy
  ja: ネットワークポリシー
semantics:
  short_definition:
    zh: 按主体、方向、端点、协议与端口决定网络通信的版本化策略规范。
    en: A versioned policy specification deciding network communication by subject, direction, endpoint, protocol, and port.
    ja: subject/direction/endpoint/protocol/port で network communication を決定する versioned policy specification。
  definition:
    zh: NetworkPolicy 是 safety-permission-policy 中 PolicySpecification 的网络专门化（NetworkPolicy-is_a-PolicySpecification），继承 policy_id 与 version，以 ingress/egress 方向、podSelector/workload selector、ipBlock/namespaceSelector 端点约束、协议端口与 allow/deny 动作为种差。它映射 Kubernetes NetworkPolicy、Docker network isolation 与 MCP server egress allowlist；治理 NetworkCall 但不等同于 PolicyDecision 或已建立连接。
    en: "NetworkPolicy is the network specialization of PolicySpecification in safety-permission-policy (NetworkPolicy-is_a-PolicySpecification), inheriting policy_id and version with ingress/egress direction, podSelector or workload selector, ipBlock or namespaceSelector endpoint constraints, protocol-port rules, and allow or deny action as differentia. It maps Kubernetes NetworkPolicy, Docker network isolation, and MCP server egress allowlists; it governs NetworkCall but is not a PolicyDecision or established connection."
    ja: NetworkPolicy は safety-permission-policy PolicySpecification の network 専門化（NetworkPolicy-is_a-PolicySpecification）で policy_id/version を継承し ingress/egress direction/podSelector/ipBlock/namespaceSelector/protocol-port/allow/deny action を種差とする。Kubernetes NetworkPolicy/Docker network isolation/MCP server egress allowlist を写像。NetworkCall を govern するが PolicyDecision/established connection ではない。
  why_needed:
    zh: 网络专属选择器需要复用 PolicySpecification 生命周期，并与业务 AuthorizationGrant、本地 Sandbox 约束保持边界；否则 Agent 会把 TCP 超时误报为策略拒绝。
    en: Network-specific selectors need PolicySpecification lifecycle reuse and boundaries from business AuthorizationGrant and local Sandbox constraints; otherwise agents misreport TCP timeouts as policy denials.
    ja: network-specific selector は PolicySpecification lifecycle reuse と business AuthorizationGrant/local Sandbox constraint 境界が必要。否则 TCP timeout を policy deny と誤報。
  includes:
    - zh: 出口目标白名单、入口来源限制、协议/端口规则、代理强制与 default-deny 网络策略。
      en: Egress destination allowlists, ingress source restrictions, protocol or port rules, proxy requirements, and default-deny network policies.
      ja: egress destination allowlist/ingress source restriction/protocol/port rule/proxy requirement/default-deny network policy。
  excludes:
    - zh: 业务 AuthorizationGrant、FilesystemPolicy/Sandbox、具体 NetworkRoute 记录、一次 allow/deny 决定。
      en: Business AuthorizationGrant, FilesystemPolicy or Sandbox, concrete NetworkRoute records, one allow or deny decision.
      ja: business AuthorizationGrant/FilesystemPolicy/Sandbox/concrete NetworkRoute record/一 allow/deny decision。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: "集成：K8s NetworkPolicy egress to ipBlock → egress-agent-tools@9；MCP HTTP server allowlist registry.npmjs.org → egress-mcp-tools@4；Docker --network none → deny-all egress policy。NetworkCall 必须 governed_by 实际评估的 policy revision。"
    en: "Integration: K8s NetworkPolicy egress to ipBlock → egress-agent-tools@9; MCP HTTP server allowlist registry.npmjs.org → egress-mcp-tools@4; Docker --network none → deny-all egress policy. NetworkCall must be governed_by actually evaluated policy revision."
    ja: 統合：K8s NetworkPolicy egress ipBlock → egress-agent-tools@9；MCP allowlist registry.npmjs.org → egress-mcp-tools@4；Docker --network none → deny-all egress。NetworkCall は actually evaluated policy revision に governed_by 必須。
  typical_input:
    - description: Kubernetes NetworkPolicy egress rule.
      format: |
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        spec:
          podSelector: {matchLabels: {app: agent-runner}}
          policyTypes: [Egress]
          egress:
            - to: [{ipBlock: {cidr: 203.0.113.0/24}}]
              ports: [{protocol: TCP, port: 443}]
      source_claims:
        - claim-network-policy-k8s
  typical_output:
    - description: Policy reference on NetworkCall evaluation.
      format: |
        network_policy_ref: egress-agent-tools@9
        call_status: denied
        denial_stage: policy
      source_claims:
        - claim-network-policy-design
  reference_implementations:
    - name: Kubernetes NetworkPolicy
      url: https://kubernetes.io/docs/concepts/services-networking/network-policies/
      description: Selector-scoped ingress/egress rules, peers, ports, protocols.
    - name: Docker network isolation
      url: https://docs.docker.com/network/
      description: Container network modes and isolation boundaries.
    - name: MCP Specification — Transports
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/transports/
      description: stdio vs HTTP/SSE egress boundaries for MCP servers.
structure:
  identity_keys:
    - policy_id
    - version
  fields:
    - id: direction
      labels:
        zh: 适用方向
        en: applicable direction
        ja: 適用 direction
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 策略适用于 ingress、egress 或 both。
        en: Policy applies to ingress, egress, or both.
        ja: policy が ingress/egress/both に apply。
      allowed_values:
        - ingress
        - egress
        - both
      pattern: null
      example_value: egress
      source_claims:
        - claim-network-policy-k8s
    - id: subject_selector
      labels:
        zh: 主体选择器
        en: subject selector
        ja: subject selector
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 选择受策略治理的 agent、workload、session 或 runtime identity。
        en: Selects agent, workload, session, or runtime identity governed by the policy.
        ja: policy が govern する agent/workload/session/runtime identity を select。
      allowed_values: []
      pattern: null
      example_value:
        workload: agent-runner
      source_claims:
        - claim-network-policy-k8s
    - id: endpoint_selector
      labels:
        zh: 端点选择器
        en: endpoint selector
        ja: endpoint selector
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 允许或拒绝的 destination/source 选择器，如 ipBlock、namespaceSelector、domain allowlist。
        en: Allowed or denied destination or source selector such as ipBlock, namespaceSelector, domain allowlist.
        ja: ipBlock/namespaceSelector/domain allowlist 等 allow/deny destination/source selector。
      allowed_values: []
      pattern: null
      example_value:
        allowed_hosts:
          - registry.npmjs.org
          - api.example.com
      source_claims:
        - claim-network-policy-mcp
  constraints: []
  required_relation_constraints: []
examples:
  - id: NetworkPolicy-k8s-egress-allow
    labels:
      zh: Kubernetes 出口白名单
      en: Kubernetes egress allowlist
      ja: Kubernetes egress allowlist
    descriptions:
      zh: egress-agent-tools@9 限制 agent-runner pod 仅 egress 到 203.0.113.0/24:443；未列目的地 denial_stage=policy。
      en: egress-agent-tools@9 restricts agent-runner pods to egress 203.0.113.0/24:443 only; unlisted destinations get denial_stage=policy.
      ja: egress-agent-tools@9 が agent-runner pod を 203.0.113.0/24:443 egress のみに制限。未登録 destination は denial_stage=policy。
    example_source:
      product: Kubernetes
      url: https://kubernetes.io/docs/concepts/services-networking/network-policies/
      version: NetworkPolicy egress
    field_values:
      network_policy_ref: egress-agent-tools@9
      direction: egress
    related_node_ids:
      - NetworkPolicy
      - NetworkCall
    related_relation_ids:
      - NetworkCall-governed_by-NetworkPolicy
    source_claims:
      - claim-network-policy-k8s
  - id: NetworkPolicy-mcp-allowlist
    labels:
      zh: MCP 出站允许列表
      en: MCP egress allowlist
      ja: MCP egress allowlist
    descriptions:
      zh: egress-mcp-tools@4 允许 HTTP MCP server tools/call 触发出站到 registry.npmjs.org，拒绝 internal.corp。
      en: egress-mcp-tools@4 allows HTTP MCP server tools/call egress to registry.npmjs.org and denies internal.corp.
      ja: egress-mcp-tools@4 が HTTP MCP server tools/call egress を registry.npmjs.org allow/internal.corp deny。
    example_source:
      product: MCP
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/transports/
      version: HTTP egress boundaries
    field_values:
      network_policy_ref: egress-mcp-tools@4
      allowed_host: registry.npmjs.org
      denied_host: internal.corp
    related_node_ids:
      - NetworkPolicy
      - NetworkEndpoint
    related_relation_ids: []
    source_claims:
      - claim-network-policy-mcp
  - id: NetworkPolicy-docker-none
    labels:
      zh: Docker 无网络隔离
      en: Docker none network isolation
      ja: Docker none network isolation
    descriptions:
      zh: "--network none 容器无 egress NetworkCall；stdio MCP transport 同样无 NetworkCall 记录。"
      en: Containers with --network none have no egress NetworkCall; stdio MCP transport likewise records no NetworkCall.
      ja: --network none container は egress NetworkCall なし。stdio MCP transport も NetworkCall 記録なし。
    example_source:
      product: Docker
      url: https://docs.docker.com/network/
      version: none network mode
    field_values:
      network_mode: none
      egress_allowed: false
    related_node_ids:
      - NetworkPolicy
      - NetworkCall
    related_relation_ids: []
    source_claims:
      - claim-network-policy-docker
  - id: NetworkPolicy-transport-failure-boundary
    labels:
      zh: 运输失败非策略拒绝
      en: Transport failure is not policy denial
      ja: transport failure は policy deny ではない
    descriptions:
      zh: call_status=failed failure_stage=connection 且 network_policy_result=allow 不得报告为 policy denial。
      en: call_status=failed with failure_stage=connection and network_policy_result=allow must not be reported as policy denial.
      ja: call_status=failed/failure_stage=connection/network_policy_result=allow を policy denial と報告不可。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: policy vs transport failure
    field_values:
      denial_stage: null
      call_status: failed
    related_node_ids:
      - NetworkPolicy
      - NetworkCall
    related_relation_ids: []
    source_claims:
      - claim-network-policy-design
parent_relation: null
relations:
  - id: NetworkPolicy-is_a-PolicySpecification
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是一种策略规范
      en: is a policy specification
      ja: PolicySpecification の一種
    definitions:
      zh: 每个 NetworkPolicy 都是 PolicySpecification，以网络方向、端点 selector、协议端口与 allow/deny 为种差。
      en: Every NetworkPolicy is a PolicySpecification distinguished by network direction, endpoint selectors, protocol-port rules, and allow or deny action.
      ja: すべての NetworkPolicy は PolicySpecification で network direction/endpoint selector/protocol-port/allow/deny action が種差。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 分类继承不使用实例关系基数。
      en: Taxonomic inheritance does not use instance-relation cardinality.
      ja: 分類継承にはインスタンス関係の基数を用いません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 有下位类型
        en: has subtype
        ja: 下位型を持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-network-policy-design
    distinct_fact_rationale:
      zh: NetworkPolicy 继承 PolicySpecification 生命周期而非业务 AuthorizationGrant。
      en: NetworkPolicy inherits PolicySpecification lifecycle, not business AuthorizationGrant.
      ja: NetworkPolicy は business AuthorizationGrant ではなく PolicySpecification lifecycle を継承。
    layout_role: secondary-backbone
    target: concept:PolicySpecification
sources:
  - id: k8s-network-policy
    title: Kubernetes NetworkPolicy
    url: https://kubernetes.io/docs/concepts/services-networking/network-policies/
    source_type: official-doc
    relevance: Selector-scoped ingress/egress isolation, peers, ports, protocols.
  - id: docker-network
    title: Docker network documentation
    url: https://docs.docker.com/network/
    source_type: official-doc
    relevance: Container network isolation modes including none.
  - id: mcp-transports-2025-06-18
    title: MCP Specification — Transports
    url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/transports/
    source_type: official-spec
    relevance: MCP server egress allowlist and transport boundaries.
  - id: safety-network-design
    title: Moonweave safety-network-control module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: NetworkPolicy as network PolicySpecification governing NetworkCall.
source_claims:
  - id: claim-network-policy-k8s
    source: k8s-network-policy
    supports: Kubernetes NetworkPolicy defines selector-scoped egress with peers, ports, and protocols generalizable to NetworkPolicy rules.
    locator: NetworkPolicy resource
    evidence_kind: official
    confidence: high
  - id: claim-network-policy-mcp
    source: mcp-transports-2025-06-18
    supports: MCP HTTP/SSE servers have bind addresses and outbound calls mappable to egress NetworkPolicy allowlists.
    locator: MCP transports
    evidence_kind: official
    confidence: high
  - id: claim-network-policy-docker
    source: docker-network
    supports: Docker none network mode provides deny-all egress analogous to restrictive NetworkPolicy.
    locator: Network modes
    evidence_kind: official
    confidence: high
  - id: claim-network-policy-design
    source: safety-network-design
    supports: Moonweave separates NetworkPolicy specification from NetworkCall governed_by evaluation and transport failures.
    locator: NetworkPolicy boundary
    evidence_kind: design-inference
    confidence: high
