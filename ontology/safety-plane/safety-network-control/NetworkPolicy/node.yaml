schema: moonweave.ai/ontology-node/v1
id: NetworkPolicy
kind: concept
status: accepted
labels:
  zh: 网络策略
  en: network policy
  ja: network policy
semantics:
  short_definition:
    zh: 按主体、方向、端点、协议与端口决定网络通信的版本化策略规范。
    en: A versioned policy specification deciding network communication by subject, direction, endpoint, protocol, and port.
    ja: subject・direction・endpoint・protocol・port で network communication を決定する versioned policy specification。
  definition:
    zh: 网络策略是一种 PolicySpecification，继承 policy_id 与 version 作为唯一的版本化策略身份；入站或出站方向、主体和端点选择器、协议端口约束及动作是网络治理种差。它治理 NetworkCall，但不等同于一次 PolicyDecision、操作系统隔离规范、代理路由或已建立连接。
    en: A NetworkPolicy is a versioned PolicySpecification and inherits policy_id and version as its sole policy identity. Direction, subject and endpoint selectors, protocol-port constraints, and action are network-governance differentia. It governs NetworkCall but is not one PolicyDecision, an operating-system isolation specification, a proxy route, or an established connection.
    ja: NetworkPolicy は PolicySpecification の一種で、唯一の版管理された方針同一性として policy_id と version を継承します。direction、subject・endpoint selector、protocol-port constraint、action がネットワーク統制の種差です。PolicyDecision、OS isolation、proxy route、established connection ではありません。
  why_needed:
    zh: 网络专属选择器与协议约束需要复用通用 PolicySpecification 生命周期，同时与本地沙箱约束和业务资源授权保持边界。
    en: Network-specific selectors and protocol constraints reuse the general PolicySpecification lifecycle while remaining separate from local sandbox constraints and business-resource authorization.
    ja: network-specific selector/protocol constraint は general PolicySpecification lifecycle を reuse し local sandbox constraint/business-resource authorization と分離します。
  includes:
    - zh: 出口目标白名单、入口来源限制、协议/端口规则、代理强制要求和默认拒绝网络策略。
      en: Egress destination allowlists, ingress source restrictions, protocol/port rules, proxy requirements, and default-deny network policies.
      ja: egress destination allowlist・ingress source restriction・protocol/port rule・proxy requirement・default-deny network policy。
  excludes:
    - zh: 主体对业务对象的 AuthorizationGrant、文件与进程隔离、具体路由记录、一次允许/拒绝决定和防火墙设备本身。
      en: AuthorizationGrant over a business object, filesystem and process isolation, concrete route records, one allow/deny decision, and firewall devices themselves.
      ja: business object AuthorizationGrant・filesystem/process isolation・concrete route record・一 allow/deny decision・firewall device。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: direction
      labels:
        zh: 适用方向
        en: applicable direction
        ja: applicable direction
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明策略适用于入站、出站或两者。
        en: States whether the policy applies to ingress, egress, or both.
        ja: policy が ingress・egress・both のどれに apply するか。
      allowed_values: []
      pattern: null
      example_value: egress
      source_claims:
        - claim-network-policy-002
    - id: subject_selector
      labels:
        zh: 主体选择器
        en: subject selector
        ja: subject selector
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 选择受策略治理的代理、工作负载、会话或运行身份。
        en: Selects the agent, workload, session, or runtime identity governed by the policy.
        ja: policy が govern する agent・workload・session・runtime identity を select します。
      allowed_values: []
      pattern: null
      example_value:
        workload: agent-code
      source_claims:
        - claim-network-policy-001
        - claim-network-policy-002
    - id: endpoint_selector
      labels:
        zh: 端点选择器
        en: endpoint selector
        ja: endpoint selector
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按主机、IP/CIDR、服务身份、信任区或代理端点选择网络目标或来源。
        en: Selects network destinations or sources by host, IP/CIDR, service identity, trust zone, or proxy endpoint.
        ja: host・IP/CIDR・service identity・trust zone・proxy endpoint で destination/source を select します。
      allowed_values: []
      pattern: null
      example_value:
        host: api.example.com
        trust_zone: zone-external-api
      source_claims:
        - claim-network-policy-001
        - claim-network-policy-002
    - id: protocol_port_constraints
      labels:
        zh: 协议与端口约束
        en: protocol and port constraints
        ja: protocol and port constraints
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定允许或拒绝的协议、端口及必要的代理或 TLS 条件。
        en: Constrains allowed or denied protocols, ports, and required proxy or TLS conditions.
        ja: allow/deny protocol・port・required proxy/TLS condition。
      allowed_values: []
      pattern: null
      example_value:
        protocol: TCP
        port: 443
        require_proxy: true
      source_claims:
        - claim-network-policy-002
        - claim-network-policy-003
    - id: action
      labels:
        zh: 策略动作
        en: policy action
        ja: policy action
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明匹配时允许、拒绝或要求提升审批的动作。
        en: Declares allow, deny, or require-escalation action on a match.
        ja: match 時の allow・deny・require-escalation action。
      allowed_values: []
      pattern: null
      example_value: allow
      source_claims:
        - claim-network-policy-001
        - claim-network-policy-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: NetworkPolicy-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 仅经代理访问 HTTPS API
      en: HTTPS API only through proxy
      ja: proxy 経由 HTTPS API のみ
    scenario_id: null
    descriptions:
      zh: egress-agent-tools@9 适用于 agent-code 出站流量，只允许 api.example.com:443，要求 proxy-egress-2 与 TLS 身份验证，其他目标默认拒绝。
      en: egress-agent-tools@9 governs agent-code egress, allows only api.example.com:443 through proxy-egress-2 with TLS identity verification, and denies other destinations by default.
      ja: egress-agent-tools@9 は agent-code egress を govern し api.example.com:443 を proxy-egress-2/TLS verification 条件でのみ allow、他を default deny します。
    field_values:
      policy_id: egress-agent-tools
      issuer_ref: security-policy-service
      effective_from: 2026-07-16T00:00:00Z
      applicability:
        workload: agent-code
        direction: egress
      version: "9"
      direction: egress
      subject_selector:
        workload: agent-code
      endpoint_selector:
        host: api.example.com
      protocol_port_constraints:
        protocol: TCP
        port: 443
        require_proxy: true
      action: allow
    related_node_ids:
      - NetworkPolicy
      - PolicySpecification
      - NetworkCall
    related_relation_ids:
      - NetworkPolicy-is_a-PolicySpecification
      - NetworkCall-governed_by-NetworkPolicy
    expected_result:
      zh: 建立可版本化网络策略并用于判断具体 NetworkCall。
      en: Create a versioned NetworkPolicy usable to evaluate a concrete NetworkCall.
      ja: versioned NetworkPolicy を作成し concrete NetworkCall 評価に使用します。
    why_valid_or_invalid:
      zh: 主体、方向、端点、协议端口与动作均可判定且版本固定。
      en: Subject, direction, endpoint, protocol/port, and action are decidable and fixed by version.
      ja: subject・direction・endpoint・protocol/port・action が decidable で version 固定です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-network-policy-001
      - claim-network-policy-002
      - claim-network-policy-003
  - id: NetworkPolicy-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 沙箱文件系统只读规则
      en: Sandbox read-only filesystem rule
      ja: sandbox readonly filesystem rule
    scenario_id: network-review-networkpolicy-boundary
    descriptions:
      zh: 规则将 /workspace 设为只读并屏蔽 /secrets，但不选择网络主体、方向、端点、协议或端口。
      en: A rule makes /workspace read-only and masks /secrets but selects no network subject, direction, endpoint, protocol, or port.
      ja: rule は /workspace readonly・/secrets mask を設定しますが network subject・direction・endpoint・protocol・port を選択しません。
    field_values: {}
    related_node_ids:
      - FilesystemPolicy
      - IsolationSpecification
      - PolicySpecification
    related_relation_ids: []
    expected_result:
      zh: 归执行隔离的 FilesystemPolicy，不归 NetworkPolicy。
      en: Classify it as execution-isolation FilesystemPolicy, not NetworkPolicy.
      ja: execution-isolation FilesystemPolicy とし NetworkPolicy にはしません。
    why_valid_or_invalid:
      zh: 本地路径执行约束和网络通信选择器回答不同问题。
      en: Local path enforcement and network-communication selectors answer different questions.
      ja: local path enforcement と network communication selector は異なる question に答えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-network-policy-002
      - claim-network-policy-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: NetworkPolicy-is_a-PolicySpecification
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是一种
      en: is a
      ja: is a
    definitions:
      zh: NetworkPolicy 是 PolicySpecification 的子类：它具有稳定策略标识、不可变版本和可执行动作，并增加网络主体、入站/出站方向、端点选择器、协议和端口约束等种差。
      en: "NetworkPolicy is a subtype of PolicySpecification: it has stable policy identity, immutable version, and executable action, and adds network-subject, ingress or egress direction, endpoint selector, protocol, and port differentia."
      ja: NetworkPolicy は PolicySpecification subtype で stable policy ID・immutable version・executable action に network subject・ingress/egress direction・endpoint selector・protocol・port differentia を追加します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 分类继承描述概念包含，不使用实例关系基数。
      en: Taxonomic inheritance describes concept inclusion and does not use instance-relation cardinality.
      ja: taxonomic inheritance は concept inclusion を表し instance relation cardinality を使いません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 以 网络策略 为子类
        en: has subtype 网络策略
        ja: 网络策略 を subtype に持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: NetworkPolicy-is_a-PolicySpecification-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 版本化出口策略
          en: Versioned egress policy
          ja: versioned egress policy
        scenario_id: network-relation-networkpolicy-is_a-policyspecification-positive
        descriptions:
          zh: egress-agent-tools@9 固定主体选择器、出站方向、api.example.com:443、代理要求和 allow 动作。
          en: egress-agent-tools@9 fixes subject selector, egress direction, api.example.com:443, proxy requirement, and allow action.
          ja: egress-agent-tools@9 は subject selector・egress・api.example.com:443・proxy requirement・allow action を固定します。
        field_values: {}
        related_node_ids:
          - NetworkPolicy
          - PolicySpecification
        related_relation_ids:
          - NetworkPolicy-is_a-PolicySpecification
        expected_result:
          zh: 断言 NetworkPolicy is_a PolicySpecification。
          en: Assert NetworkPolicy is_a PolicySpecification.
          ja: NetworkPolicy is_a PolicySpecification を主張します。
        why_valid_or_invalid:
          zh: 该对象满足版本化策略身份并增加网络选择种差。
          en: The object satisfies versioned-policy identity and adds network-selection differentia.
          ja: versioned-policy identity を満たし network-selection differentia を追加します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-network-policy-001
          - claim-network-policy-002
      - id: NetworkPolicy-is_a-PolicySpecification-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 一次允许决定不是策略规范
          en: One allow decision is not policy specification
          ja: 一 allow decision は policy specification ではない
        scenario_id: network-relation-networkpolicy-is_a-policyspecification-boundary
        descriptions:
          zh: policy-decision-884 记录某次调用 allow、时间和理由，但没有稳定策略 ID、版本或规则集合。
          en: policy-decision-884 records allow, time, and rationale for one call but has no stable policy ID, version, or rule set.
          ja: policy-decision-884 は一 call の allow・time・rationale を記録しますが stable policy ID・version・rule set がありません。
        field_values: {}
        related_node_ids:
          - NetworkPolicy
          - PolicySpecification
          - PolicyDecision
        related_relation_ids:
          - NetworkPolicy-is_a-PolicySpecification
        expected_result:
          zh: 归类为 PolicyDecision，不归 NetworkPolicy。
          en: Classify it as PolicyDecision, not NetworkPolicy.
          ja: PolicyDecision とし NetworkPolicy にはしません。
        why_valid_or_invalid:
          zh: 一次判断和可复用版本化规范具有不同生命周期。
          en: One decision and a reusable versioned specification have different lifecycles.
          ja: 一 decision と reusable versioned specification は lifecycle が異なります。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-network-policy-001
    source_claims:
      - claim-network-policy-001
      - claim-network-policy-002
    distinct_fact_rationale:
      zh: NetworkPolicy 满足 PolicySpecification 的全部身份条件并增加不可替换的种差。
      en: NetworkPolicy satisfies every identity condition of PolicySpecification and adds a non-substitutable differentia.
      ja: NetworkPolicy は PolicySpecification の全 identity condition を満たし non-substitutable differentia を追加します。
    layout_role: secondary-backbone
    review_status: accepted
    target: concept:PolicySpecification
