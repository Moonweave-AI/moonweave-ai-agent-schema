      - NetworkPolicy
      - PolicySpecification
    related_relation_ids:
      - claim-network-policy-001
      - claim-network-policy-002
      - claim-network-policy-003
      - FilesystemPolicy
      - IsolationSpecification
      - NetworkCall
      - NetworkCall-governed_by-NetworkPolicy
      - NetworkPolicy
      - NetworkPolicy-is_a-PolicySpecification
      - PolicySpecification
    example_source: Kubernetes NetworkPolicy
    source_claims:
      - claim-network-policy-001
  - id: network-policy-docker_network_none
    labels:
      zh: 网络策略 - Docker 网络隔离
      en: network policy - Docker network isolation
      ja: network policy - Docker ネットワーク分離
    descriptions: {zh: "网络策略(NetworkPolicy) [NetworkPolicy]: 按主体、方向、端点、协议与端口决定网络通信的版本化策略规范。. Docker run --network=none 为容器分配 lo 以外的无网络接口，agent 代码无法发起出站 TCP/UDP 连接（docs.docker.com/network/none/）。 Fields: action, direction.", en: "network policy (NetworkPolicy) [NetworkPolicy]: A versioned policy specification deciding network communication by subject, direction, endpoint, protocol, and port.. Docker run --network=none gives a container only the loopback interface so agent code cannot make outbound TCP/UDP connections (docs.docker.com/network/none/). Fields include action, direction.", ja: "network policy(NetworkPolicy) [NetworkPolicy]: subject・direction・endpoint・protocol・port で network communication を決定する versioned policy specification。. Docker run --network=none は loopback のみの container を作り outbound TCP/UDP を阻止する。 Fields: action, direction."}
    field_values:
      action: allow
      direction: egress
    related_node_ids:
      - FilesystemPolicy
      - IsolationSpecification
      - NetworkCall
      - NetworkPolicy
      - PolicySpecification
    related_relation_ids:
      - claim-network-policy-001
      - claim-network-policy-002
      - claim-network-policy-003
      - FilesystemPolicy
      - IsolationSpecification
      - NetworkCall
      - NetworkCall-governed_by-NetworkPolicy
      - NetworkPolicy
      - NetworkPolicy-is_a-PolicySpecification
      - PolicySpecification
    example_source: Docker network none
    source_claims:
      - claim-network-policy-001
  - id: network-policy-envoy_ext_auth
    labels:
      zh: 网络策略 - Envoy ext_authz PEP
      en: network policy - Envoy ext_authz PEP
      ja: network policy - Envoy ext_authz PEP
    descriptions: {zh: "网络策略(NetworkPolicy) [NetworkPolicy]: 按主体、方向、端点、协议与端口决定网络通信的版本化策略规范。. Envoy ext_authz 过滤器在上游请求前调用授权服务。 Fields: action, direction.", en: "network policy (NetworkPolicy) [NetworkPolicy]: A versioned policy specification deciding network communication by subject, direction, endpoint, protocol, and port.. Envoy ext_authz filter calls an authorization service before allowing upstream requests (envoyproxy.io ext_authz documentation). Fields include action, direction.", ja: "network policy(NetworkPolicy) [NetworkPolicy]: subject・direction・endpoint・protocol・port で network communication を決定する versioned policy specification。. Envoy ext_authz filter は upstream request 前に authorization service を呼ぶ。 Fields: action, direction."}
    field_values:
