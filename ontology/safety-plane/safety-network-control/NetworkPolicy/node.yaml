schema: moonweave.ai/ontology-node/v1
id: NetworkPolicy
kind: concept
status: accepted
labels:
  zh: 网络策略
  en: network policy
  ja: network policy
semantics:
  short_definition:
    zh: 按主体、方向、端点、协议与端口决定网络通信的版本化策略规范。
    en: A versioned policy specification deciding network communication by subject, direction, endpoint, protocol, and port.
    ja: subject・direction・endpoint・protocol・port で network communication を決定する versioned policy specification。
  definition:
    zh: 网络策略是一种 PolicySpecification，继承 policy_id 与 version 作为唯一的版本化策略身份；入站或出站方向、主体和端点选择器、协议端口约束及动作是网络治理种差。它治理 NetworkCall，但不等同于一次 PolicyDecision、操作系统隔离规范、代理路由或已建立连接。
    en: A NetworkPolicy is a versioned PolicySpecification and inherits policy_id and version as its sole policy identity. Direction, subject and endpoint selectors, protocol-port constraints, and action are network-governance differentia. It governs NetworkCall but is not one PolicyDecision, an operating-system isolation specification, a proxy route, or an established connection.
    ja: NetworkPolicy は PolicySpecification の一種で、唯一の版管理された方針同一性として policy_id と version を継承します。direction、subject・endpoint selector、protocol-port constraint、action がネットワーク統制の種差です。PolicyDecision、OS isolation、proxy route、established connection ではありません。
  why_needed:
    zh: 网络专属选择器与协议约束需要复用通用 PolicySpecification 生命周期，同时与本地沙箱约束和业务资源授权保持边界。
    en: Network-specific selectors and protocol constraints reuse the general PolicySpecification lifecycle while remaining separate from local sandbox constraints and business-resource authorization.
    ja: network-specific selector/protocol constraint は general PolicySpecification lifecycle を reuse し local sandbox constraint/business-resource authorization と分離します。
  includes:
    - zh: 出口目标白名单、入口来源限制、协议/端口规则、代理强制要求和默认拒绝网络策略。
      en: Egress destination allowlists, ingress source restrictions, protocol/port rules, proxy requirements, and default-deny network policies.
      ja: egress destination allowlist・ingress source restriction・protocol/port rule・proxy requirement・default-deny network policy。
  excludes:
    - zh: 主体对业务对象的 AuthorizationGrant、文件与进程隔离、具体路由记录、一次允许/拒绝决定和防火墙设备本身。
      en: AuthorizationGrant over a business object, filesystem and process isolation, concrete route records, one allow/deny decision, and firewall devices themselves.
      ja: business object AuthorizationGrant・filesystem/process isolation・concrete route record・一 allow/deny decision・firewall device。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: direction
      labels:
        zh: 适用方向
        en: applicable direction
        ja: applicable direction
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明策略适用于入站、出站或两者。
        en: States whether the policy applies to ingress, egress, or both.
        ja: policy が ingress・egress・both のどれに apply するか。
      allowed_values: []
      pattern: null
      example_value: egress
      source_claims:
        - claim-network-policy-002
    - id: subject_selector
      labels:
        zh: 主体选择器
        en: subject selector
        ja: subject selector
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 选择受策略治理的代理、工作负载、会话或运行身份。
        en: Selects the agent, workload, session, or runtime identity governed by the policy.
        ja: policy が govern する agent・workload・session・runtime identity を select します。
      allowed_values: []
      pattern: null
      example_value:
        workload: agent-code
      source_claims:
        - claim-network-policy-001
        - claim-network-policy-002
    - id: endpoint_selector
      labels:
        zh: 端点选择器
        en: endpoint selector
        ja: endpoint selector
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按主机、IP/CIDR、服务身份、信任区或代理端点选择网络目标或来源。
        en: Selects network destinations or sources by host, IP/CIDR, service identity, trust zone, or proxy endpoint.
        ja: host・IP/CIDR・service identity・trust zone・proxy endpoint で destination/source を select します。
      allowed_values: []
      pattern: null
      example_value:
        host: api.example.com
        trust_zone: zone-external-api
      source_claims:
        - claim-network-policy-001
        - claim-network-policy-002
    - id: protocol_port_constraints
      labels:
        zh: 协议与端口约束
        en: protocol and port constraints
        ja: protocol and port constraints
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 限定允许或拒绝的协议、端口及必要的代理或 TLS 条件。
        en: Constrains allowed or denied protocols, ports, and required proxy or TLS conditions.
        ja: allow/deny protocol・port・required proxy/TLS condition。
      allowed_values: []
      pattern: null
      example_value:
        protocol: TCP
        port: 443
        require_proxy: true
      source_claims:
        - claim-network-policy-002
        - claim-network-policy-003
    - id: action
      labels:
        zh: 策略动作
        en: policy action
        ja: policy action
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明匹配时允许、拒绝或要求提升审批的动作。
        en: Declares allow, deny, or require-escalation action on a match.
        ja: match 時の allow・deny・require-escalation action。
      allowed_values: []
      pattern: null
      example_value: allow
      source_claims:
        - claim-network-policy-001
        - claim-network-policy-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: network-policy-k8s_netpol
    labels:
      zh: 网络策略 - Kubernetes NetworkPolicy
      en: network policy - Kubernetes NetworkPolicy
      ja: network policy - Kubernetes NetworkPolicy
    descriptions: {zh: "网络策略(NetworkPolicy) [NetworkPolicy]: 按主体、方向、端点、协议与端口决定网络通信的版本化策略规范。. Kubernetes NetworkPolicy 出站 ipBlock except 169.254.169.254/32 阻断云元数据 SSRF。 Fields: action, direction.", en: "network policy (NetworkPolicy) [NetworkPolicy]: A versioned policy specification deciding network communication by subject, direction, endpoint, protocol, and port.. Kubernetes NetworkPolicy egress with ipBlock except 169.254.169.254/32 blocks cloud metadata SSRF (kubernetes.io/docs/concepts/services-networking/network-policies/). Fields include action, direction.", ja: "network policy(NetworkPolicy) [NetworkPolicy]: subject・direction・endpoint・protocol・port で network communication を決定する versioned policy specification。. Kubernetes NetworkPolicy egress の except 169.254.169.254/32 は cloud metadata SSRF を block する。 Fields: action, direction."}
    field_values:
      action: allow
      direction: egress
    related_node_ids:
      - FilesystemPolicy
      - IsolationSpecification
