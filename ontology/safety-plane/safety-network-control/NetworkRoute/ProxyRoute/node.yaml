schema: moonweave.ai/ontology-node/v1
id: ProxyRoute
kind: concept
status: accepted
labels:
  zh: 经代理网络路由记录
  en: Proxied Network Route Record
  ja: プロキシ経由ネットワーク経路記録
semantics:
  short_definition:
    zh: "在到达目标前经过一个已识别代理中介的网络路由记录。"
    en: "A network-route record that passes through one identified proxy intermediary before reaching its target."
    ja: "対象へ到達する前に一つの識別済みプロキシ中継者を通るネットワーク経路記録。"
  definition:
    zh: "ProxyRoute 是 NetworkRoute 的特化，记录一次调用经由某个 Proxy 端点到达目的端点的实际路径。它保留路由快照的目标和时间，并增加代理端点引用及代理协议上下文；它不是 Proxy 实体、代理配置文本、HTTP CONNECT 或 SOCKS 消息本身，也不是网络策略。"
    en: "ProxyRoute is a specialization of NetworkRoute that records the actual path by which one call reaches a destination endpoint through a Proxy endpoint. It retains the route snapshot’s target and time and adds proxy-endpoint reference and protocol context; it is not the Proxy entity, proxy configuration text, an HTTP CONNECT or SOCKS message itself, or network policy."
    ja: "ProxyRoute は NetworkRoute の特化であり、一回の呼出しが Proxy エンドポイントを経由して宛先エンドポイントへ到達する実際の経路を記録する。経路スナップショットの対象と時刻を保持し、プロキシエンドポイント参照とプロトコル文脈を追加する。Proxy 実体、プロキシ設定テキスト、HTTP CONNECT または SOCKS メッセージ自体、ネットワークポリシーではない。"
  why_needed:
    zh: "安全审计必须回答一次数据发送实际经过了哪个中介，而不仅仅知道环境配置了一个代理。独立的 ProxyRoute 能将调用级路径与可复用 Proxy 实体分开，并在代理切换、重试或代理绕行时保留正确证据。"
    en: "Security audit must answer which intermediary a data send actually traversed, not merely that an environment configured a proxy. An independent ProxyRoute separates call-level paths from reusable Proxy entities and preserves correct evidence when proxies switch, retries occur, or proxy bypass is attempted."
    ja: "セキュリティ監査は、環境がプロキシを設定していたことだけでなく、データ送信が実際にどの中継者を通過したかに答える必要がある。独立した ProxyRoute は呼出しレベルの経路を再利用可能な Proxy 実体から分け、プロキシ切替、再試行、プロキシ迂回の試行時にも正しい証拠を保持する。"
  includes:
    - zh: "代理端点引用、目的端点引用、代理协议上下文和调用级时间快照。"
      en: "Proxy-endpoint reference, destination-endpoint reference, proxy protocol context, and call-level time snapshot."
      ja: "プロキシエンドポイント参照、宛先エンドポイント参照、プロキシプロトコル文脈、呼出しレベルの時刻スナップショット。"
    - zh: "通过 HTTP 正向代理或 SOCKS5 代理的已选路径。"
      en: "A selected path through an HTTP forward proxy or SOCKS5 proxy."
      ja: "HTTP フォワードプロキシまたは SOCKS5 プロキシを通る選択済み経路。"
  excludes:
    - zh: "代理服务器的长期资产记录、代理监听端的配置，或实际发送的协议消息。"
      en: "A long-lived asset record of the proxy server, proxy-listener configuration, or the protocol message actually sent."
      ja: "プロキシサーバーの長期資産記録、プロキシリスナー設定、または実際に送られたプロトコルメッセージ。"
    - zh: "没有代理中介的直连路径或抽象允许规则。"
      en: "A direct path with no proxy intermediary or an abstract allow rule."
      ja: "プロキシ中継者のない直結経路、または抽象的な許可規則。"
  semantic_kind: entity
  aliases: [proxy-mediated-route, proxy-hop-record]
engineering:
  explanation:
    zh: "当调用选择 HTTP 或 SOCKS 代理时，执行器创建 ProxyRoute，将目标 NetworkEndpoint 和实际 Proxy 端点分别引用。HTTP CONNECT 的 authority 或 SOCKS 的 DST.ADDR/DST.PORT 是路径输入；ProxyRoute 记录的是选择后的路径，不能直接复制原始请求头或凭据。"
    en: "When a call selects an HTTP or SOCKS proxy, the executor creates ProxyRoute and references the destination NetworkEndpoint and actual Proxy endpoint separately. HTTP CONNECT authority or SOCKS DST.ADDR and DST.PORT are path inputs; ProxyRoute records the selected path and must not directly copy raw request headers or credentials."
    ja: "呼出しが HTTP または SOCKS プロキシを選択すると、実行器は ProxyRoute を作り、宛先 NetworkEndpoint と実際の Proxy エンドポイントを別々に参照する。HTTP CONNECT の authority、または SOCKS の DST.ADDR と DST.PORT は経路入力である。ProxyRoute は選択済み経路を記録し、生の要求ヘッダーや資格情報を直接複製してはならない。"
  typical_input:
    - description:
        zh: "已批准目标和实际代理监听端的引用。"
        en: "References to an approved target and actual proxy listener."
        ja: "承認済み対象と実際のプロキシリスナーへの参照。"
      format: |
        {"destination_endpoint_id":"endpoint-api-example-443","proxy_endpoint_id":"endpoint-proxy-corp-3128","proxy_protocol":"http"}
      source_claims: [claim-envoy-proxy-route]
  typical_output:
    - description:
        zh: "可由一个 NetworkCall 使用的经代理路径快照。"
        en: "A proxied-path snapshot usable by one NetworkCall."
        ja: "一つの NetworkCall が使用できるプロキシ経由パススナップショット。"
      format: |
        {"network_route_id":"proxy-route-801","route_mode":"proxy","destination_endpoint_id":"endpoint-api-example-443","selected_at":"2026-07-19T06:42:00Z","proxy_route_id":"proxy-route-801","proxy_endpoint_id":"endpoint-proxy-corp-3128","proxy_protocol":"http"}
      source_claims: [claim-envoy-proxy-route]
  reference_implementations:
    - name: Envoy dynamic forward proxy
      url: https://www.envoyproxy.io/docs/envoy/latest/configuration/http/http_filters/dynamic_forward_proxy_filter
      description: Documents HTTP forwarding through a dynamic proxy using resolved target hosts.
    - name: Envoy Gateway HTTP CONNECT tunnels
      url: https://gateway.envoyproxy.io/docs/tasks/traffic/http-connect-tunnels/
      description: Documents tunneling through an HTTP proxy server to a destination server.
structure:
  identity_keys: [network_route_id, proxy_route_id]
  fields:
    - id: network_route_id
      labels:
        zh: 继承的网络路由标识
        en: Inherited network route ID
        ja: 継承されたネットワーク経路 ID
      definitions:
        zh: "此 ProxyRoute 作为 NetworkRoute 的稳定标识；对同一路径快照，它与 proxy_route_id 表示同一实体。"
        en: "Stable identifier for this ProxyRoute as a NetworkRoute; for the same path snapshot it denotes the same entity as proxy_route_id."
        ja: "この ProxyRoute が NetworkRoute として持つ安定した識別子。同じ経路スナップショットでは proxy_route_id と同じ実体を指す。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: proxy-route-801
      allowed_values: []
      source_claims: [claim-envoy-proxy-route]
    - id: route_mode
      labels:
        zh: 继承的路由模式
        en: Inherited route mode
        ja: 継承された経路モード
      definitions:
        zh: "NetworkRoute 的传输模式；ProxyRoute 必须固定为 proxy。"
        en: "Transport mode inherited from NetworkRoute; ProxyRoute fixes it to proxy."
        ja: "NetworkRoute から継承する転送モード。ProxyRoute では proxy に固定される。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: proxy
      allowed_values: [direct, proxy]
      source_claims: [claim-envoy-proxy-route]
    - id: destination_endpoint_id
      labels:
        zh: 继承的目的端点标识
        en: Inherited destination endpoint ID
        ja: 継承された宛先エンドポイント ID
      definitions:
        zh: "该路径最终试图到达的 NetworkEndpoint 标识，继承自 NetworkRoute。"
        en: "NetworkEndpoint identifier that this path ultimately attempts to reach, inherited from NetworkRoute."
        ja: "この経路が最終的に到達しようとする NetworkEndpoint 識別子。NetworkRoute から継承する。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: endpoint-api-example-443
      allowed_values: []
      source_claims: [claim-envoy-proxy-route]
    - id: selected_at
      labels:
        zh: 继承的路由选定时间
        en: Inherited route selected at
        ja: 継承された経路選定時刻
      definitions:
        zh: "此经代理路径快照被一次调用选定的时间，继承自 NetworkRoute。"
        en: "Time at which this proxied-path snapshot was selected for a call, inherited from NetworkRoute."
        ja: "このプロキシ経由パススナップショットが呼出し用に選定された時刻。NetworkRoute から継承する。"
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '2026-07-19T06:42:00Z'
      allowed_values: []
      source_claims: [claim-envoy-proxy-route]
    - id: proxy_route_id
      labels:
        zh: 经代理路由标识
        en: Proxied route ID
        ja: プロキシ経由経路 ID
      definitions:
        zh: "一次经代理实际路径快照的稳定标识。"
        en: "Stable identifier for one actual proxied-path snapshot."
        ja: "一つの実際のプロキシ経由パススナップショットの安定した識別子。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: proxy-route-801
      allowed_values: []
      source_claims: [claim-envoy-proxy-route]
    - id: proxy_endpoint_id
      labels:
        zh: 代理端点标识
        en: Proxy endpoint ID
        ja: プロキシエンドポイント ID
      definitions:
        zh: "此路径实际经过的 Proxy 的 NetworkEndpoint 标识。"
        en: "NetworkEndpoint identifier of the Proxy actually traversed by this path."
        ja: "この経路が実際に通過する Proxy の NetworkEndpoint 識別子。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: endpoint-proxy-corp-3128
      allowed_values: []
      source_claims: [claim-envoy-proxy-route]
    - id: proxy_protocol
      labels:
        zh: 代理协议
        en: Proxy protocol
        ja: プロキシプロトコル
      definitions:
        zh: "本次路径在代理跳点使用的协议语义。"
        en: "Protocol semantics used at the proxy hop for this path."
        ja: "この経路のプロキシホップで用いるプロトコル意味論。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: http
      allowed_values: [http, socks5]
      source_claims: [claim-envoy-proxy-route]
  constraints:
    - id: proxy-route-proxy-reference
      severity: error
      expression_language: plain
      expression: "A ProxyRoute must retain one network_route_id, route_mode proxy, destination_endpoint_id, and selected_at; network_route_id must denote the same snapshot as proxy_route_id. It must reference one Proxy endpoint through proxy_endpoint_id and use a proxy_protocol compatible with that Proxy subtype."
      explanation:
        zh: "经代理路径必须先保留路由目标和选定时间，再记录可核验的实际中介；不能只从环境变量推断。"
        en: "A proxied path must first retain route target and selection time, then record a verifiable actual intermediary; it cannot be inferred only from an environment variable."
        ja: "プロキシ経由経路はまず経路の対象と選定時刻を保持し、その上で検証可能な実際の中継者を記録しなければならない。環境変数だけから推測してはならない。"
      source_claims: [claim-envoy-proxy-route]
  required_relations: []
examples:
  - id: proxy-route-envoy_ext_auth
    labels:
      zh: 经代理网络路由记录 - Envoy ext_authz PEP
      en: Proxied Network Route Record - Envoy ext_authz PEP
      ja: プロキシ経由ネットワーク経路記録 - Envoy ext_authz PEP
    descriptions: {zh: "经代理网络路由记录(ProxyRoute) [ProxyRoute]: 在到达目标前经过一个已识别代理中介的网络路由记录。. Envoy ext_authz 过滤器在上游请求前调用授权服务。 Fields: route_mode, destination_endpoint_id, proxy_protocol.", en: "Proxied Network Route Record (ProxyRoute) [ProxyRoute]: A network-route record that passes through one identified proxy intermediary before reaching its target.. Envoy ext_authz filter calls an authorization service before allowing upstream requests (envoyproxy.io ext_authz documentation). Fields include route_mode, destination_endpoint_id, proxy_protocol.", ja: "プロキシ経由ネットワーク経路記録(ProxyRoute) [ProxyRoute]: 対象へ到達する前に一つの識別済みプロキシ中継者を通るネットワーク経路記録。. Envoy ext_authz filter は upstream request 前に authorization service を呼ぶ。 Fields: route_mode, destination_endpoint_id, proxy_protocol."}
    field_values:
      destination_endpoint_id: endpoint-api-example-443
      network_route_id: proxy-route-801
      proxy_endpoint_id: endpoint-proxy-corp-3128
      proxy_protocol: http
      proxy_route_id: proxy-route-801
      route_mode: proxy
      selected_at: "'2026-07-19T06:42:00Z'"
    related_node_ids:
      - ProxyRoute
    related_relation_ids: []
    example_source: Envoy ext_authz
    source_claims:
      - claim-envoy-proxy-route
  - id: proxy-route-k8s_netpol
    labels:
      zh: 经代理网络路由记录 - Kubernetes NetworkPolicy
      en: Proxied Network Route Record - Kubernetes NetworkPolicy
      ja: プロキシ経由ネットワーク経路記録 - Kubernetes NetworkPolicy
    descriptions: {zh: "经代理网络路由记录(ProxyRoute) [ProxyRoute]: 在到达目标前经过一个已识别代理中介的网络路由记录。. Kubernetes NetworkPolicy 出站 ipBlock except 169.254.169.254/32 阻断云元数据 SSRF。 Fields: route_mode, destination_endpoint_id, proxy_protocol.", en: "Proxied Network Route Record (ProxyRoute) [ProxyRoute]: A network-route record that passes through one identified proxy intermediary before reaching its target.. Kubernetes NetworkPolicy egress with ipBlock except 169.254.169.254/32 blocks cloud metadata SSRF (kubernetes.io/docs/concepts/services-networking/network-policies/). Fields include route_mode, destination_endpoint_id, proxy_protocol.", ja: "プロキシ経由ネットワーク経路記録(ProxyRoute) [ProxyRoute]: 対象へ到達する前に一つの識別済みプロキシ中継者を通るネットワーク経路記録。. Kubernetes NetworkPolicy egress の except 169.254.169.254/32 は cloud metadata SSRF を block する。 Fields: route_mode, destination_endpoint_id, proxy_protocol."}
    field_values:
      destination_endpoint_id: endpoint-api-example-443
      network_route_id: proxy-route-801
      proxy_endpoint_id: endpoint-proxy-corp-3128
      proxy_protocol: http
      proxy_route_id: proxy-route-801
      route_mode: proxy
      selected_at: "'2026-07-19T06:42:00Z'"
    related_node_ids:
      - ProxyRoute
    related_relation_ids: []
    example_source: Kubernetes NetworkPolicy
    source_claims:
      - claim-envoy-proxy-route
  - id: proxy-route-e2b
    labels:
      zh: 经代理网络路由记录 - E2B 沙箱 VM
      en: Proxied Network Route Record - E2B sandbox VM
      ja: プロキシ経由ネットワーク経路記録 - E2B サンドボックス VM
    descriptions: {zh: "经代理网络路由记录(ProxyRoute) [ProxyRoute]: 在到达目标前经过一个已识别代理中介的网络路由记录。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — 网络隔离、文件系统隔离与资源限制。 Fields: route_mode, destination_endpoint_id, proxy_protocol.", en: "Proxied Network Route Record (ProxyRoute) [ProxyRoute]: A network-route record that passes through one identified proxy intermediary before reaching its target.. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network isolation, filesystem isolation, and resource limits (e2b.dev/docs). Fields include route_mode, destination_endpoint_id, proxy_protocol.", ja: "プロキシ経由ネットワーク経路記録(ProxyRoute) [ProxyRoute]: 対象へ到達する前に一つの識別済みプロキシ中継者を通るネットワーク経路記録。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network/filesystem isolation と resource limit。 Fields: route_mode, destination_endpoint_id, proxy_protocol."}
    field_values:
      destination_endpoint_id: endpoint-api-example-443
      network_route_id: proxy-route-801
      proxy_endpoint_id: endpoint-proxy-corp-3128
      proxy_protocol: http
      proxy_route_id: proxy-route-801
      route_mode: proxy
      selected_at: "'2026-07-19T06:42:00Z'"
    related_node_ids:
      - ProxyRoute
    related_relation_ids: []
    example_source: E2B Sandbox API
    source_claims:
      - claim-envoy-proxy-route
  - id: proxy-route-opa
    labels:
      zh: 经代理网络路由记录 - OPA Rego 策略评估
      en: Proxied Network Route Record - OPA Rego policy evaluation
      ja: プロキシ経由ネットワーク経路記録 - OPA Rego ポリシー評価
    descriptions: {zh: "经代理网络路由记录(ProxyRoute) [ProxyRoute]: 在到达目标前经过一个已识别代理中介的网络路由记录。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" }。 Fields: route_mode, destination_endpoint_id, proxy_protocol.", en: "Proxied Network Route Record (ProxyRoute) [ProxyRoute]: A network-route record that passes through one identified proxy intermediary before reaching its target.. OPA Rego: package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" } (openpolicyagent.org/docs/policy-language). Fields include route_mode, destination_endpoint_id, proxy_protocol.", ja: "プロキシ経由ネットワーク経路記録(ProxyRoute) [ProxyRoute]: 対象へ到達する前に一つの識別済みプロキシ中継者を通るネットワーク経路記録。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }；editor+read も allow。 Fields: route_mode, destination_endpoint_id, proxy_protocol."}
    field_values:
      destination_endpoint_id: endpoint-api-example-443
      network_route_id: proxy-route-801
      proxy_endpoint_id: endpoint-proxy-corp-3128
      proxy_protocol: http
      proxy_route_id: proxy-route-801
      route_mode: proxy
      selected_at: "'2026-07-19T06:42:00Z'"
    related_node_ids:
      - ProxyRoute
    related_relation_ids: []
    example_source: Open Policy Agent
    source_claims:
      - claim-envoy-proxy-route
parent_relation:
  id: ProxyRoute-is_a-NetworkRoute
  predicate: is_a
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: "ProxyRoute 是包含代理中介引用的 NetworkRoute。"
    en: "ProxyRoute is a NetworkRoute containing a proxy-intermediary reference."
    ja: "ProxyRoute はプロキシ中継者参照を含む NetworkRoute である。"
  cardinality:
    source: {min: 0, max: null}
    target: {min: 1, max: 1}
  conditions:
    - id: proxy-route-parent-mode
      severity: error
      expression_language: plain
      expression: "A ProxyRoute must retain NetworkRoute destination and selection time, set route_mode to proxy, and add one Proxy intermediary reference."
      explanation:
        zh: "子类增加真实中介，而不把代理实体或请求消息吸收到路径中。"
        en: "The subtype adds a real intermediary without absorbing the proxy entity or request message into the path."
        ja: "下位型は、プロキシ実体や要求メッセージを経路へ吸収せず、実際の中継者を追加する。"
      source_claims: [claim-envoy-proxy-route]
  temporal_scope: execution-time
  constraints: []
  source_claims: [claim-envoy-proxy-route]
relations:
  - id: ProxyRoute-via-Proxy
    predicate: via
    relation_kind: association
    target: concept:Proxy
    labels:
      zh: 经由代理
      en: via proxy
      ja: プロキシを経由する
    definitions:
      zh: "ProxyRoute 关联此路径实际经过的 Proxy 实体。"
      en: "ProxyRoute associates with the Proxy entity actually traversed by this path."
      ja: "ProxyRoute は、この経路が実際に通過する Proxy 実体と関連付く。"
    cardinality:
      source: {min: 1, max: 1}
      target: {min: 0, max: null}
    inverse_reading: {predicate: carries_proxy_route}
    conditions:
      - id: proxy-route-endpoint-match
        severity: error
        expression_language: plain
        expression: "proxy_endpoint_id must identify the NetworkEndpoint of the linked Proxy and proxy_protocol must be compatible with its protocol-specific subtype."
        explanation:
          zh: "关系、字段和协议上下文必须描述同一个中介，避免审计记录自相矛盾。"
          en: "Relation, field, and protocol context must describe the same intermediary so the audit record cannot contradict itself."
          ja: "関係、フィールド、プロトコル文脈は同じ中継者を記述し、監査記録が自己矛盾しないようにする。"
        source_claims: [claim-envoy-proxy-route]
    temporal_scope: execution-time
    constraints: []
    source_claims: [claim-envoy-proxy-route]
sources:
  - id: envoy-dynamic-forward-proxy
    title: Envoy dynamic forward proxy
    url: https://www.envoyproxy.io/docs/envoy/latest/configuration/http/http_filters/dynamic_forward_proxy_filter
    source_type: official-open-source-documentation
    relevance: "Documents HTTP forwarding through a dynamic proxy after DNS resolution of a target host."
  - id: envoy-gateway-connect
    title: Envoy Gateway HTTP CONNECT Tunnels
    url: https://gateway.envoyproxy.io/docs/tasks/traffic/http-connect-tunnels/
    source_type: official-open-source-documentation
    relevance: "Documents proxy-mediated tunnels from a client to a destination server."
source_claims:
  - id: claim-envoy-proxy-route
    source: envoy-dynamic-forward-proxy
    supports: "Envoy documents a forward proxy that resolves a target host and forwards a request to an upstream. Moonweave represents the per-call selected intermediary path as ProxyRoute rather than as the reusable Proxy entity."
    locator: "Dynamic Forward Proxy overview"
    evidence_kind: official-documentation
    confidence: high
