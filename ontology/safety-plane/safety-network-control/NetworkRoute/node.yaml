schema: moonweave.ai/ontology-node/v1
id: NetworkRoute
kind: concept
status: accepted
labels:
  zh: 网络路由记录
  en: Network Route Record
  ja: ネットワーク経路記録
semantics:
  short_definition:
    zh: "描述一次网络调用实际选择的直连或中介转发路径的实体记录。"
    en: "An entity record describing the direct or intermediary forwarding path actually selected for one network call."
    ja: "一つのネットワーク呼出しで実際に選択された直結または中継転送経路を記述する実体記録。"
  definition:
    zh: "NetworkRoute 是为一次 NetworkCall 选定并可审计的传输路径记录，包含路径标识、传输模式、目标端点引用以及必要时的中介跳点。它可由 NetworkCall 使用并指向 NetworkEndpoint；它不是静态路由表配置、代理设备本身、网络策略、DNS 记录或连接活动。"
    en: "NetworkRoute is an auditable transport-path record selected for one NetworkCall, containing route identity, transport mode, destination endpoint reference, and when needed intermediary hops. It can be used by NetworkCall and targets NetworkEndpoint; it is not a static route-table configuration, the proxy device itself, network policy, a DNS record, or a connection activity."
    ja: "NetworkRoute は、一つの NetworkCall に選択され監査可能な転送経路記録であり、経路 ID、転送モード、宛先エンドポイント参照、必要なら中継ホップを含む。NetworkCall に使用され、NetworkEndpoint を対象とできる。静的ルートテーブル設定、プロキシ機器そのもの、ネットワークポリシー、DNS 記録、接続活動ではない。"
  why_needed:
    zh: "同一目标可经不同代理、不同地址族或不同重试路径到达，且这些差异影响审计和安全边界。把“怎样到达”建模为独立路由记录，既能保留每次调用的真实路径，也不会把基础设施代理或政策规则错误地当成路径的组成部分。"
    en: "The same target can be reached through different proxies, address families, or retry paths, and those differences affect audit and security boundaries. Modeling “how it was reached” as an independent route record preserves the real path of every call without mistakenly treating the infrastructure proxy or policy rule as a component of that path."
    ja: "同じ対象でも、異なるプロキシ、アドレス族、再試行経路を通って到達することがあり、その違いは監査とセキュリティ境界に影響する。「どのように到達したか」を独立した経路記録としてモデル化することで、インフラプロキシやポリシー規則を経路の構成要素と誤って扱わずに、各呼出しの実際のパスを保持できる。"
  includes:
    - zh: "直连或代理传输模式、目的端点引用、选定时间和可选中介跳点。"
      en: "Direct or proxy transport mode, destination endpoint reference, selection time, and optional intermediary hops."
      ja: "直結またはプロキシ転送モード、宛先エンドポイント参照、選択時刻、任意の中継ホップ。"
    - zh: "一次 NetworkCall 可使用的、经规范化后的实际路径事实。"
      en: "A normalized actual-path fact that one NetworkCall can use."
      ja: "一つの NetworkCall が使用できる、正規化済みの実際の経路事実。"
  excludes:
    - zh: "Envoy 路由表、Kubernetes 网络策略或操作系统路由表等可复用配置。"
      en: "Reusable configuration such as an Envoy route table, Kubernetes NetworkPolicy, or operating-system routing table."
      ja: "Envoy ルートテーブル、Kubernetes NetworkPolicy、オペレーティングシステムのルーティングテーブルなど、再利用可能な設定。"
    - zh: "代理监听端、目标业务资源、请求消息或实际执行调用。"
      en: "A proxy listener, target business resource, request message, or actual execution call."
      ja: "プロキシリスナー、対象業務リソース、要求メッセージ、または実際の実行呼出し。"
  semantic_kind: entity
  aliases: [selected-route, transport-path-record]
engineering:
  explanation:
    zh: "路由选择在策略允许目标后产生一个不可变快照：直接模式引用目标端点，代理模式额外引用代理端点。Envoy Router 依据配置路由表转发，但本节点记录的是某次调用实际采用的结果；它不复制路由表，也不把代理端点嵌为活动的目录子项。"
    en: "Route selection produces an immutable snapshot after policy permits a target: direct mode references the destination endpoint, while proxy mode additionally references a proxy endpoint. Envoy Router forwards according to configured route tables, but this node records the result actually used by one call; it does not copy the route table or embed a proxy endpoint as a directory child of an activity."
    ja: "経路選択は、ポリシーが対象を許可した後に不変スナップショットを作る。直結モードは宛先エンドポイントを参照し、プロキシモードはさらにプロキシエンドポイントを参照する。Envoy Router は設定済みルートテーブルに従って転送するが、このノードは一回の呼出しで実際に使った結果を記録する。ルートテーブルを複製したり、プロキシエンドポイントを活動のディレクトリ子として埋め込んだりしない。"
  typical_input:
    - description:
        zh: "策略已接受的目标端点与传输模式。"
        en: "A policy-accepted target endpoint and transport mode."
        ja: "ポリシーが受け入れた宛先エンドポイントと転送モード。"
      format: |
        {"destination_endpoint_id":"endpoint-api-example-443","route_mode":"proxy","proxy_endpoint_id":"endpoint-proxy-corp-3128"}
      source_claims: [claim-envoy-router-selection]
  typical_output:
    - description:
        zh: "可被一次 NetworkCall 使用的已选路由快照。"
        en: "A selected-route snapshot that one NetworkCall can use."
        ja: "一つの NetworkCall が使用できる選択済み経路スナップショット。"
      format: |
        {"network_route_id":"route-801","route_mode":"proxy","destination_endpoint_id":"endpoint-api-example-443","selected_at":"2026-07-19T06:42:00Z"}
      source_claims: [claim-envoy-router-selection]
  reference_implementations:
    - name: Envoy router filter
      url: https://www.envoyproxy.io/docs/envoy/latest/configuration/http/http_filters/router_filter
      description: Implements HTTP forwarding based on configured route-table instructions and reports egress-request behavior.
    - name: Envoy dynamic forward proxy
      url: https://www.envoyproxy.io/docs/envoy/latest/configuration/http/http_filters/dynamic_forward_proxy_filter
      description: Resolves dynamic target hosts and forwards toward selected upstreams.
structure:
  identity_keys: [network_route_id]
  fields:
    - id: network_route_id
      labels:
        zh: 网络路由标识
        en: Network route ID
        ja: ネットワーク経路 ID
      definitions:
        zh: "一次实际传输路径快照的稳定标识。"
        en: "Stable identifier for one actual transport-path snapshot."
        ja: "一つの実際の転送経路スナップショットの安定した識別子。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: route-801
      allowed_values: []
      source_claims: [claim-envoy-router-selection]
    - id: route_mode
      labels:
        zh: 路由模式
        en: Route mode
        ja: 経路モード
      definitions:
        zh: "该路径使用直连还是代理中介。"
        en: "Whether this path uses direct connection or proxy mediation."
        ja: "この経路が直結接続を使うか、プロキシ中継を使うか。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: proxy
      allowed_values: [direct, proxy]
      source_claims: [claim-envoy-router-selection]
    - id: destination_endpoint_id
      labels:
        zh: 目的端点标识
        en: Destination endpoint ID
        ja: 宛先エンドポイント ID
      definitions:
        zh: "该路径最终试图到达的 NetworkEndpoint 标识。"
        en: "NetworkEndpoint identifier that this route ultimately attempts to reach."
        ja: "この経路が最終的に到達しようとする NetworkEndpoint 識別子。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: endpoint-api-example-443
      allowed_values: []
      source_claims: [claim-envoy-router-selection]
    - id: selected_at
      labels:
        zh: 路由选定时间
        en: Route selected at
        ja: 経路選定時刻
      definitions:
        zh: "此路径快照被选定用于调用的时间。"
        en: "Time at which this route snapshot was selected for a call."
        ja: "この経路スナップショットが呼出し用に選定された時刻。"
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '2026-07-19T06:42:00Z'
      allowed_values: []
      source_claims: [claim-envoy-router-selection]
  constraints:
    - id: network-route-target-and-mode
      severity: error
      expression_language: plain
      expression: "A NetworkRoute must identify one destination_endpoint_id and one route_mode; proxy mode requires the ProxyRoute subtype and direct mode must not assert a proxy hop."
      explanation:
        zh: "路径模式决定是否需要中介记录，不能把直接与代理路径混为一谈。"
        en: "Route mode determines whether intermediary evidence is required, so direct and proxied paths cannot be conflated."
        ja: "経路モードは中継証拠が必要かを決めるため、直結経路とプロキシ経由経路を混同できない。"
      source_claims: [claim-envoy-router-selection]
  required_relations: []
examples:
  - id: network-route-k8s_netpol
    labels:
      zh: 网络路由记录 - Kubernetes NetworkPolicy
      en: Network Route Record - Kubernetes NetworkPolicy
      ja: ネットワーク経路記録 - Kubernetes NetworkPolicy
    descriptions: {zh: "网络路由记录(NetworkRoute) [NetworkRoute]: 描述一次网络调用实际选择的直连或中介转发路径的实体记录。. Kubernetes NetworkPolicy 出站 ipBlock except 169.254.169.254/32 阻断云元数据 SSRF。 Fields: destination_endpoint_id, route_mode, selected_at.", en: "Network Route Record (NetworkRoute) [NetworkRoute]: An entity record describing the direct or intermediary forwarding path actually selected for one network call.. Kubernetes NetworkPolicy egress with ipBlock except 169.254.169.254/32 blocks cloud metadata SSRF (kubernetes.io/docs/concepts/services-networking/network-policies/). Fields include destination_endpoint_id, route_mode, selected_at.", ja: "ネットワーク経路記録(NetworkRoute) [NetworkRoute]: 一つのネットワーク呼出しで実際に選択された直結または中継転送経路を記述する実体記録。. Kubernetes NetworkPolicy egress の except 169.254.169.254/32 は cloud metadata SSRF を block する。 Fields: destination_endpoint_id, route_mode, selected_at."}
    field_values:
      destination_endpoint_id: endpoint-api-example-443
      network_route_id: route-801
      route_mode: proxy
      selected_at: "'2026-07-19T06:42:00Z'"
    related_node_ids:
      - NetworkRoute
    related_relation_ids: []
    example_source: Kubernetes NetworkPolicy
    source_claims:
      - claim-envoy-router-selection
  - id: network-route-envoy_ext_auth
    labels:
      zh: 网络路由记录 - Envoy ext_authz PEP
      en: Network Route Record - Envoy ext_authz PEP
      ja: ネットワーク経路記録 - Envoy ext_authz PEP
    descriptions: {zh: "网络路由记录(NetworkRoute) [NetworkRoute]: 描述一次网络调用实际选择的直连或中介转发路径的实体记录。. Envoy ext_authz 过滤器在上游请求前调用授权服务。 Fields: destination_endpoint_id, route_mode, selected_at.", en: "Network Route Record (NetworkRoute) [NetworkRoute]: An entity record describing the direct or intermediary forwarding path actually selected for one network call.. Envoy ext_authz filter calls an authorization service before allowing upstream requests (envoyproxy.io ext_authz documentation). Fields include destination_endpoint_id, route_mode, selected_at.", ja: "ネットワーク経路記録(NetworkRoute) [NetworkRoute]: 一つのネットワーク呼出しで実際に選択された直結または中継転送経路を記述する実体記録。. Envoy ext_authz filter は upstream request 前に authorization service を呼ぶ。 Fields: destination_endpoint_id, route_mode, selected_at."}
    field_values:
      destination_endpoint_id: endpoint-api-example-443
      network_route_id: route-801
      route_mode: proxy
      selected_at: "'2026-07-19T06:42:00Z'"
    related_node_ids:
      - NetworkRoute
    related_relation_ids: []
    example_source: Envoy ext_authz
    source_claims:
      - claim-envoy-router-selection
  - id: network-route-e2b
    labels:
      zh: 网络路由记录 - E2B 沙箱 VM
      en: Network Route Record - E2B sandbox VM
      ja: ネットワーク経路記録 - E2B サンドボックス VM
    descriptions: {zh: "网络路由记录(NetworkRoute) [NetworkRoute]: 描述一次网络调用实际选择的直连或中介转发路径的实体记录。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — 网络隔离、文件系统隔离与资源限制。 Fields: destination_endpoint_id, route_mode, selected_at.", en: "Network Route Record (NetworkRoute) [NetworkRoute]: An entity record describing the direct or intermediary forwarding path actually selected for one network call.. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network isolation, filesystem isolation, and resource limits (e2b.dev/docs). Fields include destination_endpoint_id, route_mode, selected_at.", ja: "ネットワーク経路記録(NetworkRoute) [NetworkRoute]: 一つのネットワーク呼出しで実際に選択された直結または中継転送経路を記述する実体記録。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network/filesystem isolation と resource limit。 Fields: destination_endpoint_id, route_mode, selected_at."}
    field_values:
      destination_endpoint_id: endpoint-api-example-443
      network_route_id: route-801
      route_mode: proxy
      selected_at: "'2026-07-19T06:42:00Z'"
    related_node_ids:
      - NetworkRoute
    related_relation_ids: []
    example_source: E2B Sandbox API
    source_claims:
      - claim-envoy-router-selection
  - id: network-route-docker_network_none
    labels:
      zh: 网络路由记录 - Docker 网络隔离
      en: Network Route Record - Docker network isolation
      ja: ネットワーク経路記録 - Docker ネットワーク分離
    descriptions: {zh: "网络路由记录(NetworkRoute) [NetworkRoute]: 描述一次网络调用实际选择的直连或中介转发路径的实体记录。. Docker run --network=none 为容器分配 lo 以外的无网络接口，agent 代码无法发起出站 TCP/UDP 连接（docs.docker.com/network/none/）。 Fields: destination_endpoint_id, route_mode, selected_at.", en: "Network Route Record (NetworkRoute) [NetworkRoute]: An entity record describing the direct or intermediary forwarding path actually selected for one network call.. Docker run --network=none gives a container only the loopback interface so agent code cannot make outbound TCP/UDP connections (docs.docker.com/network/none/). Fields include destination_endpoint_id, route_mode, selected_at.", ja: "ネットワーク経路記録(NetworkRoute) [NetworkRoute]: 一つのネットワーク呼出しで実際に選択された直結または中継転送経路を記述する実体記録。. Docker run --network=none は loopback のみの container を作り outbound TCP/UDP を阻止する。 Fields: destination_endpoint_id, route_mode, selected_at."}
    field_values:
      destination_endpoint_id: endpoint-api-example-443
      network_route_id: route-801
      route_mode: proxy
      selected_at: "'2026-07-19T06:42:00Z'"
    related_node_ids:
      - NetworkRoute
    related_relation_ids: []
    example_source: Docker network none
    source_claims:
      - claim-envoy-router-selection
parent_relation: null
relations:
  - id: NetworkRoute-targets-NetworkEndpoint
    predicate: targets
    relation_kind: association
    target: concept:NetworkEndpoint
    labels:
      zh: 指向端点
      en: targets endpoint
      ja: エンドポイントを対象とする
    definitions:
      zh: "NetworkRoute 关联它最终到达的 NetworkEndpoint。"
      en: "NetworkRoute associates with the NetworkEndpoint it ultimately reaches."
      ja: "NetworkRoute は最終的に到達する NetworkEndpoint と関連付く。"
    cardinality:
      source: {min: 1, max: 1}
      target: {min: 0, max: null}
    inverse_reading: {predicate: targeted_by_route}
    conditions:
      - id: route-destination-reference-match
        severity: error
        expression_language: plain
        expression: "destination_endpoint_id must identify the NetworkEndpoint targeted by this relation and must remain compatible with the route transport mode."
        explanation:
          zh: "字段与关系必须指向同一个目的端，避免路径事实自相矛盾。"
          en: "The field and relation must name the same destination end so the path fact cannot contradict itself."
          ja: "フィールドと関係は同じ宛先端を示し、経路事実が自己矛盾しないようにする。"
        source_claims: [claim-envoy-router-selection]
    temporal_scope: execution-time
    constraints: []
    source_claims: [claim-envoy-router-selection]
sources:
  - id: envoy-router
    title: Envoy router filter
    url: https://www.envoyproxy.io/docs/envoy/latest/configuration/http/http_filters/router_filter
    source_type: official-open-source-documentation
    relevance: "Documents HTTP forwarding that follows configured route-table instructions and produces egress routing behavior."
  - id: envoy-dynamic-forward-proxy
    title: Envoy dynamic forward proxy
    url: https://www.envoyproxy.io/docs/envoy/latest/configuration/http/http_filters/dynamic_forward_proxy_filter
    source_type: official-open-source-documentation
    relevance: "Documents dynamic DNS target resolution and forwarding toward selected upstream hosts."
source_claims:
  - id: claim-envoy-router-selection
    source: envoy-router
    supports: "Envoy documents that the router filter forwards according to configured route-table instructions. Moonweave treats the configuration as distinct from the selected per-call NetworkRoute record."
    locator: "Router overview"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-envoy-dynamic-route
    source: envoy-dynamic-forward-proxy
    supports: "Envoy documents dynamic forward-proxy DNS resolution and selection of a target host for forwarding. Moonweave records the selected path after resolution rather than treating a DNS cache as the route."
    locator: "Dynamic Forward Proxy overview"
    evidence_kind: official-documentation
    confidence: high
