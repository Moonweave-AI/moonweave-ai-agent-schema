    labels:
      zh: 网络端点 - Docker 网络隔离
      en: network endpoint - Docker network isolation
      ja: network endpoint - Docker ネットワーク分離
    descriptions: {zh: "网络端点(NetworkEndpoint) [NetworkEndpoint]: 由协议、地址、端口与验证身份共同确定的可寻址通信实体。. Docker run --network=none 为容器分配 lo 以外的无网络接口，agent 代码无法发起出站 TCP/UDP 连接（docs.docker.com/network/none/）。 Fields: scheme_or_transport, host_or_address, identity_verification_ref.", en: "network endpoint (NetworkEndpoint) [NetworkEndpoint]: An addressable communication Entity determined by protocol, address, port, and verified identity.. Docker run --network=none gives a container only the loopback interface so agent code cannot make outbound TCP/UDP connections (docs.docker.com/network/none/). Fields include scheme_or_transport, host_or_address, identity_verification_ref.", ja: "network endpoint(NetworkEndpoint) [NetworkEndpoint]: protocol・address・port・verified identity で定まる addressable communication Entity。. Docker run --network=none は loopback のみの container を作り outbound TCP/UDP を阻止する。 Fields: scheme_or_transport, host_or_address, identity_verification_ref."}
    field_values:
