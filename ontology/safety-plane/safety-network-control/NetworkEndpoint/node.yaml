schema: moonweave.ai/ontology-node/v1
id: NetworkEndpoint
kind: concept
status: review
labels:
  zh: 网络端点
  en: network endpoint
  ja: network endpoint
semantics:
  short_definition:
    zh: 由协议、地址、端口与验证身份共同确定的可寻址通信实体。
    en: An addressable communication Entity determined by protocol, address, port, and verified identity.
    ja: protocol・address・port・verified identity で定まる addressable communication Entity。
  definition:
    zh: 网络端点是一种实体，以端点标识、scheme 或 transport、主机或地址、端口、信任区和身份验证证据为身份，表示通信路径可连接或转发到的具体逻辑端。它不是 URI 指向的业务资源、一次连接事件、操作系统 Socket 句柄或策略允许项。
    en: A NetworkEndpoint is an Entity identified by endpoint ID, scheme or transport, host or address, port, trust zone, and identity-verification evidence, representing a concrete logical end to which a communication path connects or forwards. It is not the business resource named by a URI, a connection event, an operating-system Socket handle, or a policy allowance.
    ja: NetworkEndpoint は endpoint ID・scheme/transport・host/address・port・trust zone・identity-verification evidence で識別する Entity で communication path が connect/forward する concrete logical end です。URI business resource・connection event・OS Socket handle・policy allowance ではありません。
  why_needed:
    zh: 端点身份将请求 authority、DNS 候选和经过 TLS 或服务身份验证的最终目标分开，使策略判断能绑定实际目的地。
    en: Endpoint identity separates requested authority, resolution candidates, and the TLS- or service-verified final target so policy decisions bind the actual destination.
    ja: endpoint identity が requested authority・resolution candidate・TLS/service-verified final target を分離し policy decision を actual destination に結びます。
  includes:
    - zh: 源站服务端点、API 网关端点、HTTP/SOCKS 代理端点，以及带验证证据的 IP/端口目标。
      en: Origin-service endpoints, API-gateway endpoints, HTTP/SOCKS proxy endpoints, and IP/port targets with verification evidence.
      ja: origin service endpoint・API gateway endpoint・HTTP/SOCKS proxy endpoint・verification evidence 付き IP/port target。
  excludes:
    - zh: 本地文件、业务资源正文、DNS 解析记录、调用事件、Socket 文件描述符和仅声明允许目的地的规则。
      en: Local files, business-resource content, DNS resolution records, call events, Socket file descriptors, and rules that merely allow a destination.
      ja: local file・business resource content・DNS resolution record・call event・Socket file descriptor・destination allow rule。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - endpoint_id
    - scheme_or_transport
  fields:
    - id: endpoint_id
      labels:
        zh: 端点标识
        en: endpoint ID
        ja: endpoint ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个逻辑通信端。
        en: Stable identifier for one logical communication end.
        ja: 一 logical communication end の stable identifier。
      allowed_values: []
      pattern: null
      example_value: endpoint-api-example-443
      source_claims:
        - claim-network-endpoint-001
        - claim-network-endpoint-002
    - id: scheme_or_transport
      labels:
        zh: scheme 或 transport
        en: scheme or transport
        ja: scheme or transport
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明解释地址和安全要求所需的协议 scheme 或传输族。
        en: States the protocol scheme or transport family needed to interpret address and security requirements.
        ja: address/security requirement 解釈に必要な protocol scheme/transport family。
      allowed_values: []
      pattern: null
      example_value: https
      source_claims:
        - claim-network-endpoint-002
        - claim-network-endpoint-003
    - id: host_or_address
      labels:
        zh: 主机或地址
        en: host or address
        ja: host or address
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录规范化主机名、IPv4、IPv6 或代理可寻址名称。
        en: Records a normalized host name, IPv4, IPv6, or proxy-addressable name.
        ja: normalized hostname・IPv4・IPv6・proxy-addressable name。
      allowed_values: []
      pattern: null
      example_value: 203.0.113.42
      source_claims:
        - claim-network-endpoint-002
        - claim-network-endpoint-003
    - id: port
      labels:
        zh: 端口
        en: port
        ja: port
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录运输或应用端点端口。
        en: Records the transport or application endpoint port.
        ja: transport/application endpoint port。
      allowed_values: []
      pattern: null
      example_value: 443
      source_claims:
        - claim-network-endpoint-002
        - claim-network-endpoint-003
    - id: trust_zone_ref
      labels:
        zh: 信任区引用
        en: trust-zone reference
        ja: trust-zone reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向拥有或承载端点的安全区域，不以网络位置自动授予信任。
        en: References the security zone owning or hosting the endpoint without granting trust from location alone.
        ja: endpoint を own/host する security zone を参照し location のみで trust を与えません。
      allowed_values: []
      pattern: null
      example_value: zone-external-api
      source_claims:
        - claim-network-endpoint-001
    - id: identity_verification_ref
      labels:
        zh: 身份验证证据引用
        en: identity-verification evidence reference
        ja: identity-verification evidence reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向证书、服务身份或其他将地址绑定到预期端点的证据。
        en: References certificate, service identity, or other evidence binding the address to the intended endpoint.
        ja: address を intended endpoint に bind する certificate/service identity/evidence を参照します。
      allowed_values: []
      pattern: null
      example_value: tls-verification-884
      source_claims:
        - claim-network-endpoint-001
        - claim-network-endpoint-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: NetworkEndpoint-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 经 TLS 验证的 API 端点
      en: TLS-verified API endpoint
      ja: TLS-verified API endpoint
    scenario_id: null
    descriptions:
      zh: endpoint-api-example-443 记录 HTTPS、203.0.113.42:443、外部 API 区和证书验证证据，证书身份匹配 api.example.com。
      en: endpoint-api-example-443 records HTTPS, 203.0.113.42:443, the external API zone, and certificate evidence matching api.example.com.
      ja: endpoint-api-example-443 は HTTPS・203.0.113.42:443・external API zone・api.example.com と一致する certificate evidence を記録します。
    field_values:
      endpoint_id: endpoint-api-example-443
      scheme_or_transport: https
      host_or_address: 203.0.113.42
      port: 443
      trust_zone_ref: zone-external-api
      identity_verification_ref: tls-verification-884
    related_node_ids:
      - NetworkEndpoint
    related_relation_ids: []
    expected_result:
      zh: 建立可被调用和路由共同引用的端点实体。
      en: Create an endpoint Entity that calls and routes can reference consistently.
      ja: call/route が一貫して参照できる endpoint Entity を作成します。
    why_valid_or_invalid:
      zh: 地址、端口、协议和验证身份共同给出端点同一性。
      en: Address, port, protocol, and verified identity jointly establish endpoint identity.
      ja: address・port・protocol・verified identity が共同で endpoint identity を確立します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-network-endpoint-001
      - claim-network-endpoint-002
  - id: NetworkEndpoint-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 未验证的 DNS 候选
      en: Unverified DNS candidate
      ja: unverified DNS candidate
    scenario_id: network-review-networkendpoint-boundary
    descriptions:
      zh: 解析 api.example.com 得到 203.0.113.42，但尚未连接或验证证书，且该地址可能在下一次解析变化。
      en: Resolution yields 203.0.113.42 for api.example.com, but no connection or certificate verification occurred and the address may change on the next resolution.
      ja: api.example.com の resolution は 203.0.113.42 を返しましたが connection/certificate verification はなく次回変化し得ます。
    field_values: {}
    related_node_ids:
      - NetworkCall
      - NetworkEndpoint
    related_relation_ids:
      - NetworkCall-resolves_to-NetworkEndpoint
    expected_result:
      zh: 可记录为解析候选关系，但不得把它当成已验证最终端点。
      en: It may be recorded as a resolution candidate but not treated as the verified final endpoint.
      ja: resolution candidate として記録できても verified final endpoint として扱いません。
    why_valid_or_invalid:
      zh: 名称解析只提供候选地址，尚缺少最终 authority 与身份绑定。
      en: Name resolution supplies a candidate address but lacks final authority and identity binding.
      ja: name resolution は candidate address のみで final authority/identity binding を欠きます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-network-endpoint-002
external_mappings: []
