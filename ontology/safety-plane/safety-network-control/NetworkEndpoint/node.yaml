schema: moonweave.ai/ontology-node/v1
id: NetworkEndpoint
kind: concept
labels:
  zh: 网络端点
  en: network endpoint
  ja: ネットワークエンドポイント
semantics:
  short_definition:
    zh: 可解析、可验证的通信目标或监听地址身份。
    en: A resolvable, verifiable communication target or bind-address identity.
    ja: 解決・検証可能な通信 target または bind address identity。
  definition:
    zh: NetworkEndpoint 标识一次网络交互中的 authority、host:port、URL 或 MCP server endpoint（如 https://mcp.example.com/sse、127.0.0.1:8080）。它映射 allowed domains list 条目、TLS SAN 验证后的最终端点与 DNS 解析结果；不是 NetworkCall、Proxy 或 NetworkRoute，但 NetworkRoute targets NetworkEndpoint。
    en: "NetworkEndpoint identifies authority, host:port, URL, or MCP server endpoint (e.g., https://mcp.example.com/sse, 127.0.0.1:8080) in one network interaction. It maps allowed domains list entries, TLS-SAN-verified final endpoints, and DNS resolution results; it is not NetworkCall, Proxy, or NetworkRoute, but NetworkRoute targets NetworkEndpoint."
    ja: NetworkEndpoint は network interaction 内 authority/host:port/URL/MCP server endpoint（https://mcp.example.com/sse、127.0.0.1:8080 等）を識別。allowed domains list 条目/TLS SAN 検証後 final endpoint/DNS resolution result を写像。NetworkCall/Proxy/NetworkRoute ではないが NetworkRoute は NetworkEndpoint を targets。
  why_needed:
    zh: 端点身份与调用分离后，系统才能在 302  redirect、DNS 覆写或 proxy CONNECT 后证明最终连接目标，并把 allowlist 精确到 authority 而非仅 Host 共现。
    en: Separating endpoint identity from calls lets the system prove the final connection target after 302 redirects, DNS overrides, or proxy CONNECT and bind allowlists to authority rather than Host co-occurrence.
    ja: endpoint identity/call 分離後、302 redirect/DNS override/proxy CONNECT 後の final connection target を証明し allowlist を Host 共起ではなく authority に bind できます。
  includes:
    - zh: 含 host、port、scheme、resolved IP、TLS SAN 匹配结果与 MCP server URL。
      en: Includes host, port, scheme, resolved IP, TLS SAN match result, and MCP server URL.
      ja: host/port/scheme/resolved IP/TLS SAN match result/MCP server URL を含む。
  excludes:
    - zh: 不包含 NetworkCall 状态、NetworkPolicy 规则全文、Socket handle 或 ToolResult。
      en: Excludes NetworkCall status, full NetworkPolicy rule text, Socket handle, or ToolResult.
      ja: NetworkCall status/NetworkPolicy rule 全文/Socket handle/ToolResult は含まない。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: "集成：MCP server bind 127.0.0.1:8080 → listen endpoint；egress allowlist https://api.example.com/* → destination endpoint；TLS 验证后 203.0.113.42:443 → verified final endpoint。redirect 新 authority 必须新 endpoint 身份。"
    en: "Integration: MCP server bind 127.0.0.1:8080 → listen endpoint; egress allowlist https://api.example.com/* → destination endpoint; after TLS verification 203.0.113.42:443 → verified final endpoint. Redirect new authority requires new endpoint identity."
    ja: 統合：MCP bind 127.0.0.1:8080 → listen endpoint；egress allowlist https://api.example.com/* → destination endpoint；TLS 後 203.0.113.42:443 → verified final endpoint。redirect 新 authority は新 endpoint identity 必須。
  typical_input:
    - description: MCP server SSE endpoint URL.
      format: |
        endpoint_id: mcp-local-sse
        url: http://127.0.0.1:8080/sse
        transport: sse
      source_claims:
        - claim-network-endpoint-mcp
  typical_output:
    - description: Verified final endpoint after resolution and TLS.
      format: |
        endpoint_id: endpoint-api-v4-42
        final_address: 203.0.113.42:443
        tls_san_match: api.example.com
      source_claims:
        - claim-network-endpoint-design
  reference_implementations:
    - name: MCP Specification — Transports
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/transports/
      description: MCP server endpoint URLs and bind addresses.
    - name: RFC 9110 HTTP Semantics
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      description: Authority, host, port, and redirect target semantics.
    - name: Kubernetes NetworkPolicy
      url: https://kubernetes.io/docs/concepts/services-networking/network-policies/
      description: ipBlock and namespaceSelector as endpoint selectors.
structure:
  identity_keys:
    - endpoint_id
  fields:
    - id: endpoint_id
      labels:
        zh: 端点标识
        en: endpoint ID
        ja: エンドポイント ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个 NetworkEndpoint 身份（含解析/验证版本）。
        en: Stably identifies one NetworkEndpoint identity including resolution or verification version.
        ja: 一 NetworkEndpoint identity（resolution/verification version 含む）を安定識別。
      allowed_values: []
      pattern: null
      example_value: endpoint-api-v4-42
      source_claims:
        - claim-network-endpoint-design
    - id: authority
      labels:
        zh: 权威主机名
        en: authority host
        ja: authority host
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: HTTP authority 或 logical host name，用于 allowlist 与 TLS SAN 匹配。
        en: HTTP authority or logical host name for allowlist and TLS SAN matching.
        ja: allowlist/TLS SAN match 用 HTTP authority または logical host name。
      allowed_values: []
      pattern: null
      example_value: api.example.com
      source_claims:
        - claim-network-endpoint-design
    - id: port
      labels:
        zh: 端口
        en: port
        ja: port
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: TCP/UDP 端口；HTTPS 默认 443 可省略但解析后应记录。
        en: TCP or UDP port; HTTPS default 443 may be omitted but should be recorded after resolution.
        ja: TCP/UDP port。HTTPS default 443 は省略可だが resolution 後記録推奨。
      allowed_values: []
      pattern: null
      example_value: 443
      source_claims:
        - claim-network-endpoint-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: NetworkEndpoint-mcp-sse-bind
    labels:
      zh: MCP SSE 监听端点
      en: MCP SSE bind endpoint
      ja: MCP SSE bind endpoint
    descriptions:
      zh: HTTP MCP server 绑定 127.0.0.1:8080/sse；listen endpoint 隔离于 0.0.0.0 暴露。
      en: HTTP MCP server binds 127.0.0.1:8080/sse; listen endpoint isolated from 0.0.0.0 exposure.
      ja: HTTP MCP server が 127.0.0.1:8080/sse bind。listen endpoint は 0.0.0.0 暴露から分離。
    example_source:
      product: MCP
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/transports/
      version: SSE transport
    field_values:
      endpoint_id: mcp-local-sse
      authority: 127.0.0.1
      port: 8080
    related_node_ids:
      - NetworkEndpoint
      - NetworkPolicy
    related_relation_ids: []
    source_claims:
      - claim-network-endpoint-mcp
  - id: NetworkEndpoint-allowlist-api
    labels:
      zh: 允许列表 API 端点
      en: Allowlisted API endpoint
      ja: allowlist API endpoint
    descriptions:
      zh: egress-agent-tools@9 允许 api.example.com:443；route-884 验证最终 203.0.113.42:443 TLS SAN 匹配。
      en: egress-agent-tools@9 allows api.example.com:443; route-884 verifies final 203.0.113.42:443 with matching TLS SAN.
      ja: egress-agent-tools@9 が api.example.com:443 allow。route-884 が final 203.0.113.42:443 TLS SAN match 検証。
    example_source:
      product: Moonweave design / RFC 9110
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      version: HTTP authority
    field_values:
      endpoint_id: endpoint-api-v4-42
      authority: api.example.com
      final_address: 203.0.113.42:443
    related_node_ids:
      - NetworkEndpoint
      - NetworkRoute
    related_relation_ids:
      - NetworkRoute-targets-NetworkEndpoint
    source_claims:
      - claim-network-endpoint-design
  - id: NetworkEndpoint-metadata-blocked
    labels:
      zh: 元数据端点被阻
      en: Metadata endpoint blocked
      ja: metadata endpoint block
    descriptions:
      zh: 169.254.169.254 在 allowlist 外；DNS 或 policy 在 resolution 阶段拒绝，不建立到 metadata endpoint 的连接。
      en: 169.254.169.254 is outside allowlist; DNS or policy denies at resolution stage without connecting to metadata endpoint.
      ja: 169.254.169.254 は allowlist 外。DNS/policy が resolution 段階 deny、metadata endpoint へ接続なし。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: SSRF metadata protection
    field_values:
      authority: 169.254.169.254
      allowed: false
    related_node_ids:
      - NetworkEndpoint
      - NetworkPolicy
    related_relation_ids: []
    source_claims:
      - claim-network-endpoint-design
  - id: NetworkEndpoint-stdio-no-endpoint
    labels:
      zh: stdio 无网络端点
      en: stdio has no network endpoint
      ja: stdio は network endpoint なし
    descriptions:
      zh: MCP stdio transport 无 HTTP endpoint；不应创建 egress NetworkEndpoint 或 NetworkCall。
      en: MCP stdio transport has no HTTP endpoint; egress NetworkEndpoint or NetworkCall must not be created.
      ja: MCP stdio transport に HTTP endpoint なし。egress NetworkEndpoint/NetworkCall 作成不可。
    example_source:
      product: MCP
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/transports/
      version: stdio transport
    field_values:
      transport: stdio
      network_endpoint_created: false
    related_node_ids:
      - NetworkEndpoint
    related_relation_ids: []
    source_claims:
      - claim-network-endpoint-mcp
parent_relation: null
relations: []
sources:
  - id: mcp-transports-2025-06-18
    title: MCP Specification — Transports
    url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/transports/
    source_type: official-spec
    relevance: MCP server endpoint URLs and bind addresses.
  - id: rfc9110-http
    title: RFC 9110 HTTP Semantics
    url: https://www.rfc-editor.org/rfc/rfc9110.html
    source_type: standard
    relevance: Authority, host, port, redirect targets.
  - id: k8s-network-policy
    title: Kubernetes NetworkPolicy
    url: https://kubernetes.io/docs/concepts/services-networking/network-policies/
    source_type: official-doc
    relevance: ipBlock endpoint selectors in allowlists.
  - id: safety-network-design
    title: Moonweave safety-network-control module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: NetworkEndpoint identity separate from NetworkCall and routes.
source_claims:
  - id: claim-network-endpoint-mcp
    source: mcp-transports-2025-06-18
    supports: MCP HTTP/SSE servers expose endpoint URLs and bind addresses mappable to NetworkEndpoint; stdio has none.
    locator: MCP transports
    evidence_kind: official
    confidence: high
  - id: claim-network-endpoint-design
    source: safety-network-design
    supports: Moonweave models resolvable verified NetworkEndpoint identity for allowlist and TLS SAN matching after redirects.
    locator: NetworkEndpoint boundary
    evidence_kind: design-inference
    confidence: high
