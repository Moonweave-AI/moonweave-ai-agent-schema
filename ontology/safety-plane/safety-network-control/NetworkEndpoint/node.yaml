      zh: 网络端点 - E2B 沙箱 VM
      en: network endpoint - E2B sandbox VM
      ja: network endpoint - E2B サンドボックス VM
    descriptions: {zh: "网络端点(NetworkEndpoint) [NetworkEndpoint]: 由协议、地址、端口与验证身份共同确定的可寻址通信实体。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — 网络隔离、文件系统隔离与资源限制。 Fields: scheme_or_transport, host_or_address, identity_verification_ref.", en: "network endpoint (NetworkEndpoint) [NetworkEndpoint]: An addressable communication Entity determined by protocol, address, port, and verified identity.. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network isolation, filesystem isolation, and resource limits (e2b.dev/docs). Fields include scheme_or_transport, host_or_address, identity_verification_ref.", ja: "network endpoint(NetworkEndpoint) [NetworkEndpoint]: protocol・address・port・verified identity で定まる addressable communication Entity。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network/filesystem isolation と resource limit。 Fields: scheme_or_transport, host_or_address, identity_verification_ref."}
    field_values:
