schema: moonweave.ai/ontology-node/v1
id: Proxy
kind: concept
status: accepted
labels:
  zh: 代理端点
  en: proxy endpoint
  ja: proxy endpoint
semantics:
  short_definition:
    zh: 代表客户端接收并转发通信的可寻址中介端点。
    en: An addressable intermediary endpoint that receives and forwards communication for a client.
    ja: client のため communication を receive/forward する addressable intermediary endpoint。
  definition:
    zh: 代理端点是一种 NetworkEndpoint，其种差是代表客户端接收请求、按确定的转发或隧道语义选择下一跳，并返回响应或连接结果。其身份是可连接的中介端点；实际某次经过代理的路径属于 ProxyRoute，代理配置规则属于 NetworkPolicy。
    en: A Proxy is a NetworkEndpoint distinguished by receiving a client's request, selecting a next hop under defined forwarding or tunnel semantics, and returning a response or connection result. Its identity is the addressable intermediary endpoint; an effective path through it is a ProxyRoute, while rules selecting or allowing it belong to NetworkPolicy.
    ja: Proxy は client request を受け defined forwarding/tunnel semantics で next hop を選び response/connection result を返す NetworkEndpoint です。identity は addressable intermediary endpoint で、実際の path は ProxyRoute、選択/許可 rule は NetworkPolicy です。
  why_needed:
    zh: 将代理服务器本身与一次代理路由和选择规则分开，避免同一节点同时充当实体、路径和策略。
    en: Separating the proxy server from one proxy route and its selection rule prevents one node from simultaneously acting as Entity, path, and policy.
    ja: proxy server を proxy route/selection rule から分離し一 node が Entity・path・policy を同時に担う混同を防ぎます。
  includes:
    - zh: HTTP 正向代理、HTTPS 隧道代理、SOCKS 代理和受控服务网格出口网关。
      en: HTTP forward proxies, HTTPS tunnel proxies, SOCKS proxies, and controlled service-mesh egress gateways.
      ja: HTTP forward proxy・HTTPS tunnel proxy・SOCKS proxy・controlled service-mesh egress gateway。
  excludes:
    - zh: 代理地址配置字符串、实际经过代理的调用路径、反向代理后的源站资源和业务授权决定。
      en: Proxy-address configuration strings, an actual call path through a proxy, origin resources behind a reverse proxy, and business authorization decisions.
      ja: proxy address config string・actual call path・reverse proxy 後の origin resource・business authorization decision。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - forwarding_mode
    - authentication_ref
  fields:
    - id: forwarding_mode
      labels:
        zh: 转发模式
        en: forwarding mode
        ja: forwarding mode
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明代理执行转发、网关、隧道或 UDP 关联的方式。
        en: States whether the proxy performs forwarding, gatewaying, tunneling, or UDP association.
        ja: forwarding・gateway・tunneling・UDP association mode。
      allowed_values: []
      pattern: null
      example_value: tunnel
      source_claims:
        - claim-proxy-002
        - claim-proxy-003
    - id: authentication_ref
      labels:
        zh: 代理认证引用
        en: proxy-authentication reference
        ja: proxy-authentication reference
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用客户端与代理协商或提供的认证方法和结果。
        en: References the authentication method and result negotiated or supplied between client and proxy.
        ja: client/proxy 間で negotiated/supplied された authentication method/result。
      allowed_values: []
      pattern: null
      example_value: proxy-auth-884
      source_claims:
        - claim-proxy-003
        - claim-proxy-002
    - id: policy_enforcement_ref
      labels:
        zh: 策略执行点引用
        en: policy-enforcement reference
        ja: policy-enforcement reference
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用代理作为执行点应用的网络策略与决定证据。
        en: References the network-policy and decision evidence applied when the proxy acts as an enforcement point.
        ja: proxy が enforcement point として適用した network policy/decision evidence。
      allowed_values: []
      pattern: null
      example_value: pep-egress-2
      source_claims:
        - claim-proxy-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: Proxy-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 受控出口代理
      en: Controlled egress proxy
      ja: controlled egress proxy
    scenario_id: null
    descriptions:
      zh: proxy-egress-2 是可寻址 HTTPS 中介端点，客户端先连接它；它验证代理凭据、应用 egress-v9 并通过 CONNECT 建立下一跳。
      en: proxy-egress-2 is an addressable HTTPS intermediary reached first by the client; it verifies proxy credentials, applies egress-v9, and establishes the next hop with CONNECT.
      ja: proxy-egress-2 は client が最初に接続する HTTPS intermediary で proxy credential を verify、egress-v9 を apply し CONNECT で next hop を確立します。
    field_values:
      endpoint_id: proxy-egress-2
      scheme_or_transport: https
      host_or_address: proxy-egress-2.internal
      port: 8443
      trust_zone_ref: trust-zone/managed-egress
      identity_verification_ref: certificate-profile/proxy-egress-2
      forwarding_mode: tunnel
      authentication_ref: proxy-auth-884
      policy_enforcement_ref: pep-egress-2
    related_node_ids:
      - Proxy
      - NetworkEndpoint
      - ProxyRoute
    related_relation_ids:
      - Proxy-is_a-NetworkEndpoint
      - ProxyRoute-via-Proxy
    expected_result:
      zh: 识别为 Proxy 端点，并让具体调用路径另建 ProxyRoute。
      en: Classify it as a Proxy endpoint and represent the concrete call path separately as ProxyRoute.
      ja: Proxy endpoint と分類し concrete call path は別の ProxyRoute とします。
    why_valid_or_invalid:
      zh: 对象拥有可连接中介身份和转发行为，不是一次路径记录。
      en: The object has addressable intermediary identity and forwarding behavior, not one route record.
      ja: addressable intermediary identity/forwarding behavior を持ち一 route record ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-proxy-001
      - claim-proxy-002
  - id: Proxy-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 环境变量中的代理 URI
      en: Proxy URI in an environment variable
      ja: environment variable の proxy URI
    scenario_id: network-review-proxy-boundary
    descriptions:
      zh: HTTPS_PROXY 只包含 https://proxy.example:8443，尚无端点验证、认证协商或服务实例证据。
      en: HTTPS_PROXY contains only https://proxy.example:8443, without endpoint verification, authentication negotiation, or service-instance evidence.
      ja: HTTPS_PROXY は URI のみで endpoint verification・authentication negotiation・service instance evidence がありません。
    field_values: {}
    related_node_ids:
      - ProxyRoute
    related_relation_ids: []
    expected_result:
      zh: 作为计划路由配置处理，不直接断言一个已验证 Proxy 实体。
      en: Treat it as planned route configuration and do not assert a verified Proxy Entity directly.
      ja: planned route config とし verified Proxy Entity を直接主張しません。
    why_valid_or_invalid:
      zh: 配置地址可能失效或指向不同实例，缺少实际端点身份。
      en: A configuration address can be stale or resolve to another instance and lacks actual endpoint identity.
      ja: config address は stale/別 instance になり得て actual endpoint identity を欠きます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-proxy-002
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: Proxy-is_a-NetworkEndpoint
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: is a
  definitions:
    zh: Proxy 是 NetworkEndpoint 的子类：代理拥有 scheme、地址、端口、信任区和身份验证，并增加代表客户端接收通信、选择下一跳和转发或隧道的中介种差。实际路径仍由 ProxyRoute 表达。
    en: "Proxy is a subtype of NetworkEndpoint: it has scheme, address, port, trust zone, and identity verification, and adds the intermediary differentia of receiving communication for a client, selecting a next hop, and forwarding or tunneling. The effective path remains a ProxyRoute."
    ja: Proxy は NetworkEndpoint subtype で scheme・address・port・trust zone・identity verification に client 代理受信・next hop selection・forward/tunnel differentia を追加します。effective path は ProxyRoute です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承描述概念包含，不使用实例关系基数。
    en: Taxonomic inheritance describes concept inclusion and does not use instance-relation cardinality.
    ja: taxonomic inheritance は concept inclusion を表し instance relation cardinality を使いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 以 代理端点 为子类
      en: has subtype 代理端点
      ja: 代理端点 を subtype に持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: Proxy-is_a-NetworkEndpoint-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 可寻址出口代理
        en: Addressable egress proxy
        ja: addressable egress proxy
      scenario_id: network-relation-proxy-is_a-networkendpoint-positive
      descriptions:
        zh: proxy-egress-2 具有 HTTPS scheme、proxy.example:8443、企业代理证书和出口区身份，并接收 CONNECT 后转发到目标。
        en: proxy-egress-2 has HTTPS scheme, proxy.example:8443, enterprise-proxy certificate, and egress-zone identity, and forwards after receiving CONNECT.
        ja: proxy-egress-2 は HTTPS scheme・proxy.example:8443・enterprise proxy certificate・egress zone identity を持ち CONNECT 後 forward します。
      field_values: {}
      related_node_ids:
        - Proxy
        - NetworkEndpoint
      related_relation_ids:
        - Proxy-is_a-NetworkEndpoint
      expected_result:
        zh: 断言 Proxy is_a NetworkEndpoint。
        en: Assert Proxy is_a NetworkEndpoint.
        ja: Proxy is_a NetworkEndpoint を主張します。
      why_valid_or_invalid:
        zh: 代理先满足端点可寻址身份，再增加中介行为。
        en: The proxy first satisfies addressable endpoint identity and then adds intermediary behavior.
        ja: proxy は addressable endpoint identity を満たし intermediary behavior を追加します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-proxy-001
        - claim-proxy-002
    - id: Proxy-is_a-NetworkEndpoint-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 代理路径不是代理实体
        en: Proxy route is not proxy Entity
        ja: proxy route は proxy Entity ではない
      scenario_id: network-relation-proxy-is_a-networkendpoint-boundary
      descriptions:
        zh: route-884 记录 proxy-egress-2→endpoint-api-example-443 的有序路径、选择时间和结果，但自身没有服务地址或证书身份。
        en: route-884 records an ordered proxy-egress-2 to endpoint-api-example-443 path, selection time, and result but has no service address or certificate identity of its own.
        ja: route-884 は ordered path・selection time・result を記録しますが自身の service address/certificate identity はありません。
      field_values: {}
      related_node_ids:
        - Proxy
        - NetworkEndpoint
        - ProxyRoute
      related_relation_ids:
        - Proxy-is_a-NetworkEndpoint
      expected_result:
        zh: 不得把 ProxyRoute 分类为 Proxy。
        en: Do not classify ProxyRoute as Proxy.
        ja: ProxyRoute を Proxy と分類しません。
      why_valid_or_invalid:
        zh: 路径信息和中介实体具有不同同一性条件。
        en: Route information and intermediary Entity have different identity conditions.
        ja: route information と intermediary Entity は identity condition が異なります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-proxy-002
  source_claims:
    - claim-proxy-001
    - claim-proxy-002
    - claim-proxy-003
  distinct_fact_rationale:
    zh: Proxy 满足 NetworkEndpoint 的全部身份条件并增加不可替换的种差。
    en: Proxy satisfies every identity condition of NetworkEndpoint and adds a non-substitutable differentia.
    ja: Proxy は NetworkEndpoint の全 identity condition を満たし non-substitutable differentia を追加します。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-safety-verification
  reviewed_on: 2026-07-17
  note:
    zh: Verified against Cursor sandbox.json egress control, HTTP/SOCKS proxy semantics, and network policy patterns; endpoint, policy, and call lifecycle modeling hold.
    en: Verified against Cursor sandbox.json egress control, HTTP/SOCKS proxy semantics, and network policy patterns; endpoint, policy, and call lifecycle modeling hold.
    ja: Verified against Cursor sandbox.json egress control, HTTP/SOCKS proxy semantics, and network policy patterns; endpoint, policy, and call lifecycle modeling hold.
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-proxy-001
    source: eng-network-nist-zero-trust
    supports: NIST SP 800-207 distinguishes an access request, per-resource policy decision, policy administrator, policy enforcement point, and the communication path that is enabled, monitored, and terminated; Moonweave uses those distinctions to separate policy, interaction occurrence, endpoint, and effective route evidence.
    locator: NIST SP 800-207 Sections 2.1-2.2 and 3.2, policy engine, policy administrator, and policy enforcement point
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-proxy-002
    source: eng-proto-rfc9110-http-semantics
    supports: RFC 9110 distinguishes HTTP request and response messages, target resources and authorities, origin servers, proxy intermediaries, direct versus proxy routing, redirects, and response status; Moonweave places these protocol facts under broader network concepts.
    locator: RFC 9110 Sections 3.1-3.7, 4.2-4.3, 6, 7.1-7.4, 10.2, and 15.4
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-proxy-003
    source: eng-proto-rfc1928-socks5
    supports: RFC 1928 defines SOCKS client-to-server negotiation, authentication selection, CONNECT/BIND/UDP ASSOCIATE commands, IPv4/domain/IPv6 addressing, relay establishment, and denial replies; Moonweave treats SOCKSProxy as a protocol-specific Proxy subtype.
    locator: RFC 1928 Sections 3-7, TCP client procedure, requests, addressing, replies, and UDP client procedure
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
