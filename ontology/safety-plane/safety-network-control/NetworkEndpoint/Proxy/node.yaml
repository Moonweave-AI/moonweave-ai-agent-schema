schema: moonweave.ai/ontology-node/v1
id: Proxy
kind: concept
status: accepted
labels:
  zh: 代理端点
  en: proxy endpoint
  ja: proxy endpoint
semantics:
  short_definition:
    zh: 代表客户端接收并转发通信的可寻址中介端点。
    en: An addressable intermediary endpoint that receives and forwards communication for a client.
    ja: client のため communication を receive/forward する addressable intermediary endpoint。
  definition:
    zh: 代理端点是一种 NetworkEndpoint，其种差是代表客户端接收请求、按确定的转发或隧道语义选择下一跳，并返回响应或连接结果。其身份是可连接的中介端点；实际某次经过代理的路径属于 ProxyRoute，代理配置规则属于 NetworkPolicy。
    en: A Proxy is a NetworkEndpoint distinguished by receiving a client's request, selecting a next hop under defined forwarding or tunnel semantics, and returning a response or connection result. Its identity is the addressable intermediary endpoint; an effective path through it is a ProxyRoute, while rules selecting or allowing it belong to NetworkPolicy.
    ja: Proxy は client request を受け defined forwarding/tunnel semantics で next hop を選び response/connection result を返す NetworkEndpoint です。identity は addressable intermediary endpoint で、実際の path は ProxyRoute、選択/許可 rule は NetworkPolicy です。
  why_needed:
    zh: 将代理服务器本身与一次代理路由和选择规则分开，避免同一节点同时充当实体、路径和策略。
    en: Separating the proxy server from one proxy route and its selection rule prevents one node from simultaneously acting as Entity, path, and policy.
    ja: proxy server を proxy route/selection rule から分離し一 node が Entity・path・policy を同時に担う混同を防ぎます。
  includes:
    - zh: HTTP 正向代理、HTTPS 隧道代理、SOCKS 代理和受控服务网格出口网关。
      en: HTTP forward proxies, HTTPS tunnel proxies, SOCKS proxies, and controlled service-mesh egress gateways.
      ja: HTTP forward proxy・HTTPS tunnel proxy・SOCKS proxy・controlled service-mesh egress gateway。
  excludes:
    - zh: 代理地址配置字符串、实际经过代理的调用路径、反向代理后的源站资源和业务授权决定。
      en: Proxy-address configuration strings, an actual call path through a proxy, origin resources behind a reverse proxy, and business authorization decisions.
      ja: proxy address config string・actual call path・reverse proxy 後の origin resource・business authorization decision。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - forwarding_mode
    - authentication_ref
  fields:
    - id: forwarding_mode
      labels:
        zh: 转发模式
        en: forwarding mode
        ja: forwarding mode
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明代理执行转发、网关、隧道或 UDP 关联的方式。
        en: States whether the proxy performs forwarding, gatewaying, tunneling, or UDP association.
        ja: forwarding・gateway・tunneling・UDP association mode。
      allowed_values: []
      pattern: null
      example_value: tunnel
      source_claims:
        - claim-proxy-002
        - claim-proxy-003
    - id: authentication_ref
      labels:
        zh: 代理认证引用
        en: proxy-authentication reference
        ja: proxy-authentication reference
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用客户端与代理协商或提供的认证方法和结果。
        en: References the authentication method and result negotiated or supplied between client and proxy.
        ja: client/proxy 間で negotiated/supplied された authentication method/result。
      allowed_values: []
      pattern: null
      example_value: proxy-auth-884
      source_claims:
        - claim-proxy-003
        - claim-proxy-002
    - id: policy_enforcement_ref
      labels:
        zh: 策略执行点引用
        en: policy-enforcement reference
        ja: policy-enforcement reference
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用代理作为执行点应用的网络策略与决定证据。
        en: References the network-policy and decision evidence applied when the proxy acts as an enforcement point.
        ja: proxy が enforcement point として適用した network policy/decision evidence。
      allowed_values: []
      pattern: null
      example_value: pep-egress-2
      source_claims:
        - claim-proxy-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: proxy-envoy_ext_auth
    labels:
      zh: 代理端点 - Envoy ext_authz PEP
      en: proxy endpoint - Envoy ext_authz PEP
      ja: proxy endpoint - Envoy ext_authz PEP
    descriptions: {zh: "代理端点(Proxy) [Proxy]: 代表客户端接收并转发通信的可寻址中介端点。. Envoy ext_authz 过滤器在上游请求前调用授权服务。 Fields: forwarding_mode, authentication_ref, policy_enforcement_ref.", en: "proxy endpoint (Proxy) [Proxy]: An addressable intermediary endpoint that receives and forwards communication for a client.. Envoy ext_authz filter calls an authorization service before allowing upstream requests (envoyproxy.io ext_authz documentation). Fields include forwarding_mode, authentication_ref, policy_enforcement_ref.", ja: "proxy endpoint(Proxy) [Proxy]: client のため communication を receive/forward する addressable intermediary endpoint。. Envoy ext_authz filter は upstream request 前に authorization service を呼ぶ。 Fields: forwarding_mode, authentication_ref, policy_enforcement_ref."}
    field_values:
      authentication_ref: proxy-auth-884
      forwarding_mode: tunnel
      policy_enforcement_ref: pep-egress-2
    related_node_ids:
      - NetworkEndpoint
      - Proxy
      - ProxyRoute
    related_relation_ids:
      - claim-proxy-001
      - claim-proxy-002
      - NetworkEndpoint
      - Proxy
      - Proxy-is_a-NetworkEndpoint
      - ProxyRoute
      - ProxyRoute-via-Proxy
    example_source: Envoy ext_authz
    source_claims:
      - claim-proxy-001
  - id: proxy-k8s_netpol
    labels:
      zh: 代理端点 - Kubernetes NetworkPolicy
      en: proxy endpoint - Kubernetes NetworkPolicy
      ja: proxy endpoint - Kubernetes NetworkPolicy
    descriptions: {zh: "代理端点(Proxy) [Proxy]: 代表客户端接收并转发通信的可寻址中介端点。. Kubernetes NetworkPolicy 出站 ipBlock except 169.254.169.254/32 阻断云元数据 SSRF。 Fields: forwarding_mode, authentication_ref, policy_enforcement_ref.", en: "proxy endpoint (Proxy) [Proxy]: An addressable intermediary endpoint that receives and forwards communication for a client.. Kubernetes NetworkPolicy egress with ipBlock except 169.254.169.254/32 blocks cloud metadata SSRF (kubernetes.io/docs/concepts/services-networking/network-policies/). Fields include forwarding_mode, authentication_ref, policy_enforcement_ref.", ja: "proxy endpoint(Proxy) [Proxy]: client のため communication を receive/forward する addressable intermediary endpoint。. Kubernetes NetworkPolicy egress の except 169.254.169.254/32 は cloud metadata SSRF を block する。 Fields: forwarding_mode, authentication_ref, policy_enforcement_ref."}
    field_values:
      authentication_ref: proxy-auth-884
      forwarding_mode: tunnel
      policy_enforcement_ref: pep-egress-2
    related_node_ids:
      - NetworkEndpoint
      - Proxy
      - ProxyRoute
    related_relation_ids:
      - claim-proxy-001
      - claim-proxy-002
      - NetworkEndpoint
      - Proxy
      - Proxy-is_a-NetworkEndpoint
      - ProxyRoute
      - ProxyRoute-via-Proxy
    example_source: Kubernetes NetworkPolicy
    source_claims:
      - claim-proxy-001
  - id: proxy-e2b
    labels:
      zh: 代理端点 - E2B 沙箱 VM
      en: proxy endpoint - E2B sandbox VM
      ja: proxy endpoint - E2B サンドボックス VM
    descriptions: {zh: "代理端点(Proxy) [Proxy]: 代表客户端接收并转发通信的可寻址中介端点。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — 网络隔离、文件系统隔离与资源限制。 Fields: forwarding_mode, authentication_ref, policy_enforcement_ref.", en: "proxy endpoint (Proxy) [Proxy]: An addressable intermediary endpoint that receives and forwards communication for a client.. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network isolation, filesystem isolation, and resource limits (e2b.dev/docs). Fields include forwarding_mode, authentication_ref, policy_enforcement_ref.", ja: "proxy endpoint(Proxy) [Proxy]: client のため communication を receive/forward する addressable intermediary endpoint。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network/filesystem isolation と resource limit。 Fields: forwarding_mode, authentication_ref, policy_enforcement_ref."}
    field_values:
      authentication_ref: proxy-auth-884
      forwarding_mode: tunnel
      policy_enforcement_ref: pep-egress-2
    related_node_ids:
      - NetworkEndpoint
      - Proxy
      - ProxyRoute
    related_relation_ids:
      - claim-proxy-001
      - claim-proxy-002
      - NetworkEndpoint
      - Proxy
      - Proxy-is_a-NetworkEndpoint
      - ProxyRoute
      - ProxyRoute-via-Proxy
    example_source: E2B Sandbox API
    source_claims:
      - claim-proxy-001
  - id: proxy-docker_network_none
    labels:
      zh: 代理端点 - Docker 网络隔离
      en: proxy endpoint - Docker network isolation
      ja: proxy endpoint - Docker ネットワーク分離
    descriptions: {zh: "代理端点(Proxy) [Proxy]: 代表客户端接收并转发通信的可寻址中介端点。. Docker run --network=none 为容器分配 lo 以外的无网络接口，agent 代码无法发起出站 TCP/UDP 连接（docs.docker.com/network/none/）。 Fields: forwarding_mode, authentication_ref, policy_enforcement_ref.", en: "proxy endpoint (Proxy) [Proxy]: An addressable intermediary endpoint that receives and forwards communication for a client.. Docker run --network=none gives a container only the loopback interface so agent code cannot make outbound TCP/UDP connections (docs.docker.com/network/none/). Fields include forwarding_mode, authentication_ref, policy_enforcement_ref.", ja: "proxy endpoint(Proxy) [Proxy]: client のため communication を receive/forward する addressable intermediary endpoint。. Docker run --network=none は loopback のみの container を作り outbound TCP/UDP を阻止する。 Fields: forwarding_mode, authentication_ref, policy_enforcement_ref."}
    field_values:
      authentication_ref: proxy-auth-884
      forwarding_mode: tunnel
      policy_enforcement_ref: pep-egress-2
    related_node_ids:
      - NetworkEndpoint
      - Proxy
      - ProxyRoute
    related_relation_ids:
      - claim-proxy-001
      - claim-proxy-002
      - NetworkEndpoint
      - Proxy
      - Proxy-is_a-NetworkEndpoint
      - ProxyRoute
      - ProxyRoute-via-Proxy
    example_source: Docker network none
    source_claims:
      - claim-proxy-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: Proxy-is_a-NetworkEndpoint
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: is a
  definitions:
    zh: Proxy 是 NetworkEndpoint 的子类：代理拥有 scheme、地址、端口、信任区和身份验证，并增加代表客户端接收通信、选择下一跳和转发或隧道的中介种差。实际路径仍由 ProxyRoute 表达。
    en: "Proxy is a subtype of NetworkEndpoint: it has scheme, address, port, trust zone, and identity verification, and adds the intermediary differentia of receiving communication for a client, selecting a next hop, and forwarding or tunneling. The effective path remains a ProxyRoute."
    ja: Proxy は NetworkEndpoint subtype で scheme・address・port・trust zone・identity verification に client 代理受信・next hop selection・forward/tunnel differentia を追加します。effective path は ProxyRoute です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承描述概念包含，不使用实例关系基数。
    en: Taxonomic inheritance describes concept inclusion and does not use instance-relation cardinality.
    ja: taxonomic inheritance は concept inclusion を表し instance relation cardinality を使いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 以 代理端点 为子类
      en: has subtype 代理端点
      ja: 代理端点 を subtype に持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: Proxy-is_a-NetworkEndpoint-example-positive-manual-20260716
      labels:
        zh: 可寻址出口代理
        en: Addressable egress proxy
        ja: addressable egress proxy
      descriptions:
        zh: proxy-egress-2 具有 HTTPS scheme、proxy.example:8443、企业代理证书和出口区身份，并接收 CONNECT 后转发到目标。
        en: proxy-egress-2 has HTTPS scheme, proxy.example:8443, enterprise-proxy certificate, and egress-zone identity, and forwards after receiving CONNECT.
        ja: proxy-egress-2 は HTTPS scheme・proxy.example:8443・enterprise proxy certificate・egress zone identity を持ち CONNECT 後 forward します。
      field_values: {}
      related_node_ids:
        - Proxy
        - NetworkEndpoint
      related_relation_ids:
        - Proxy-is_a-NetworkEndpoint

        en: Assert Proxy is_a NetworkEndpoint.
        ja: Proxy is_a NetworkEndpoint を主張します。

        en: The proxy first satisfies addressable endpoint identity and then adds intermediary behavior.
        ja: proxy は addressable endpoint identity を満たし intermediary behavior を追加します。
      source_claims:
        - claim-proxy-001
        - claim-proxy-002
    - id: Proxy-is_a-NetworkEndpoint-example-boundary-manual-20260716
      labels:
        zh: 代理路径不是代理实体
        en: Proxy route is not proxy Entity
        ja: proxy route は proxy Entity ではない
      descriptions:
        zh: route-884 记录 proxy-egress-2→endpoint-api-example-443 的有序路径、选择时间和结果，但自身没有服务地址或证书身份。
        en: route-884 records an ordered proxy-egress-2 to endpoint-api-example-443 path, selection time, and result but has no service address or certificate identity of its own.
        ja: route-884 は ordered path・selection time・result を記録しますが自身の service address/certificate identity はありません。
      field_values: {}
      related_node_ids:
        - Proxy
        - NetworkEndpoint
        - ProxyRoute
      related_relation_ids:
        - Proxy-is_a-NetworkEndpoint

        en: Do not classify ProxyRoute as Proxy.
        ja: ProxyRoute を Proxy と分類しません。

        en: Route information and intermediary Entity have different identity conditions.
        ja: route information と intermediary Entity は identity condition が異なります。
      source_claims:
        - claim-proxy-002
  source_claims:
    - claim-proxy-001
    - claim-proxy-002
    - claim-proxy-003
  distinct_fact_rationale:
    zh: Proxy 满足 NetworkEndpoint 的全部身份条件并增加不可替换的种差。
    en: Proxy satisfies every identity condition of NetworkEndpoint and adds a non-substitutable differentia.
    ja: Proxy は NetworkEndpoint の全 identity condition を満たし non-substitutable differentia を追加します。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
