schema: moonweave.ai/ontology-node/v1
id: Proxy
kind: concept
labels:
  zh: 网络代理
  en: network proxy
  ja: ネットワークプロキシ
semantics:
  short_definition:
    zh: 作为中间跳点转发或隧道化出站/入站流量的 NetworkEndpoint 特化。
    en: A NetworkEndpoint specialization that forwards or tunnels outbound or inbound traffic as an intermediary hop.
    ja: 中間 hop として outbound/inbound traffic を forward/tunnel する NetworkEndpoint 特化。
  definition:
    zh: Proxy 是 NetworkEndpoint 的代理种差，标识企业 egress proxy、HTTP CONNECT 网关或 SOCKS5 隧道入口。它映射 HTTP CONNECT proxy 与 SOCKS5 tunneling 配置；不是 NetworkRoute 本身，但 ProxyRoute via Proxy。代理必须经 NetworkPolicy 批准方可出现在 ordered_hops 中。
    en: "Proxy is a proxy differentia of NetworkEndpoint identifying enterprise egress proxies, HTTP CONNECT gateways, or SOCKS5 tunnel entry points. It maps HTTP CONNECT proxy and SOCKS5 tunneling configurations; it is not NetworkRoute itself, but ProxyRoute goes via Proxy. Proxies must be NetworkPolicy-approved to appear in ordered_hops."
    ja: Proxy は NetworkEndpoint の proxy 種差で enterprise egress proxy/HTTP CONNECT gateway/SOCKS5 tunnel entry を識別。HTTP CONNECT proxy/SOCKS5 tunneling 設定を写像。NetworkRoute 自体ではないが ProxyRoute は Proxy via。Proxy は NetworkPolicy 承認後 ordered_hops に出現可。
  why_needed:
    zh: 代理跳点与最终目的地分离后，才能审计 egress 经哪台 proxy-egress-2 到达 api.example.com，并区分 direct 连接与 CONNECT 隧道。
    en: Separating proxy hops from final destinations audits which proxy-egress-2 carried traffic to api.example.com and distinguishes direct connections from CONNECT tunnels.
    ja: proxy hop/final destination 分離後、どの proxy-egress-2 経由で api.example.com へ到達したか監査し direct connection/CONNECT tunnel を区別できます。
  includes:
    - zh: 含 HTTP 代理、SOCKS 代理、CONNECT 能力与认证要求。
      en: Includes HTTP proxy, SOCKS proxy, CONNECT capability, and authentication requirements.
      ja: HTTP proxy/SOCKS proxy/CONNECT capability/認証要求を含む。
  excludes:
    - zh: 不包含最终 origin server、DNS resolver、NetworkCall 或未经批准的透明中间人。
      en: Excludes final origin server, DNS resolver, NetworkCall, or unapproved transparent intermediary.
      ja: final origin server/DNS resolver/NetworkCall/未承認 transparent MITM は含まない。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成：enterprise egress `proxy-egress-2:8080` HTTP CONNECT → Proxy；`socks5://127.0.0.1:1080` → SOCKSProxy；NetworkPolicy 要求经批准代理时 route ordered_hops 必须包含 proxy hop。
    en: "Integration: enterprise egress proxy-egress-2:8080 HTTP CONNECT → Proxy; socks5://127.0.0.1:1080 → SOCKSProxy; when NetworkPolicy requires approved proxy, route ordered_hops must include proxy hop."
    ja: 統合：enterprise proxy-egress-2:8080 HTTP CONNECT → Proxy；socks5://127.0.0.1:1080 → SOCKSProxy。NetworkPolicy が approved proxy 要求時 route ordered_hops に proxy hop 必須。
  typical_input:
    - description: Enterprise HTTP CONNECT proxy config.
      format: |
        proxy_id: proxy-egress-2
        host: proxy.corp.example
        port: 8080
        method: CONNECT
      source_claims:
        - claim-network-proxy-design
  typical_output:
    - description: Proxy hop in route chain.
      format: |
        ordered_hops: [proxy-egress-2, endpoint-api-v4-42]
      source_claims:
        - claim-network-proxy-design
  reference_implementations:
    - name: RFC 9110 HTTP CONNECT
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      description: HTTP CONNECT method for tunneling through proxies.
    - name: SOCKS Protocol Version 5
      url: https://datatracker.ietf.org/doc/html/rfc1928
      description: SOCKS5 tunneling for TCP connections.
structure:
  identity_keys:
    - proxy_id
  fields:
    - id: proxy_id
      labels:
        zh: 代理标识
        en: proxy ID
        ja: プロキシ ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个 Proxy 实例或配置引用。
        en: Stably identifies one Proxy instance or configuration reference.
        ja: 一 Proxy instance/configuration reference を安定識別。
      allowed_values: []
      pattern: null
      example_value: proxy-egress-2
      source_claims:
        - claim-network-proxy-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: Proxy-http-connect-egress
    labels:
      zh: HTTP CONNECT 出口代理
      en: HTTP CONNECT egress proxy
      ja: HTTP CONNECT egress proxy
    descriptions:
      zh: out-req-884 经 proxy-egress-2 HTTP CONNECT 隧道到达 api.example.com；ordered_hops 含 proxy 与 verified final endpoint。
      en: out-req-884 reaches api.example.com via proxy-egress-2 HTTP CONNECT tunnel; ordered_hops include proxy and verified final endpoint.
      ja: out-req-884 が proxy-egress-2 HTTP CONNECT tunnel 経由 api.example.com 到達。ordered_hops に proxy/verified final endpoint。
    example_source:
      product: RFC 9110
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      version: CONNECT method
    field_values:
      proxy_id: proxy-egress-2
      method: CONNECT
    related_node_ids:
      - Proxy
      - HTTPProxy
      - ProxyRoute
    related_relation_ids:
      - ProxyRoute-via-Proxy
    source_claims:
      - claim-network-proxy-design
  - id: Proxy-socks5-tunnel
    labels:
      zh: SOCKS5 隧道代理
      en: SOCKS5 tunnel proxy
      ja: SOCKS5 tunnel proxy
    descriptions:
      zh: Agent 经 socks5://127.0.0.1:1080 隧道出站；ProxyRoute via SOCKSProxy 记录 BIND/CONNECT 跳点。
      en: Agent egresses via socks5://127.0.0.1:1080 tunnel; ProxyRoute via SOCKSProxy records BIND or CONNECT hop.
      ja: Agent が socks5://127.0.0.1:1080 tunnel で egress。ProxyRoute via SOCKSProxy が BIND/CONNECT hop 記録。
    example_source:
      product: RFC 1928
      url: https://datatracker.ietf.org/doc/html/rfc1928
      version: SOCKS5
    field_values:
      proxy_id: socks-local-1080
    related_node_ids:
      - Proxy
      - SOCKSProxy
    related_relation_ids: []
    source_claims:
      - claim-network-proxy-design
  - id: Proxy-unapproved-boundary
    labels:
      zh: 未批准代理不可用
      en: Unapproved proxy unavailable
      ja: 未承認 proxy 使用不可
    descriptions:
      zh: egress policy 要求 approved proxy 但实现直连 api.example.com；NetworkControl 必须拒绝并报告 authorization_chain_complete=false。
      en: Egress policy requires approved proxy but implementation connects directly to api.example.com; network control must reject and report authorization_chain_complete=false.
      ja: egress policy が approved proxy 要求だが direct api.example.com 接続。network control reject、authorization_chain_complete=false。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: proxy policy enforcement
    field_values:
      authorization_chain_complete: false
    related_node_ids:
      - Proxy
      - NetworkPolicy
    related_relation_ids: []
    source_claims:
      - claim-network-proxy-design
  - id: Proxy-not-origin-boundary
    labels:
      zh: 代理非源站
      en: Proxy is not origin
      ja: proxy は origin ではない
    descriptions:
      zh: api.example.com 是最终 NetworkEndpoint 不是 Proxy；混淆会导致 TLS SAN 验证与 allowlist 错误。
      en: api.example.com is final NetworkEndpoint not Proxy; conflating them breaks TLS SAN verification and allowlist checks.
      ja: api.example.com は final NetworkEndpoint で Proxy ではない。混同は TLS SAN/allowlist 検証破壊。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: endpoint vs proxy
    field_values:
      accepted: false
    related_node_ids:
      - Proxy
      - NetworkEndpoint
    related_relation_ids: []
    source_claims:
      - claim-network-proxy-design
parent_relation:
  id: Proxy-is_a-NetworkEndpoint
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种网络端点
    en: is a network endpoint
    ja: ネットワークエンドポイントの一種
  definitions:
    zh: 每个 Proxy 都是 NetworkEndpoint，种差是中间转发或隧道跳点而非最终 origin。
    en: Every Proxy is a NetworkEndpoint distinguished as intermediary forward or tunnel hop rather than final origin.
    ja: すべての Proxy は NetworkEndpoint で中間 forward/tunnel hop（final origin ではない）が種差。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-network-proxy-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: rfc9110-http
    title: RFC 9110 HTTP Semantics
    url: https://www.rfc-editor.org/rfc/rfc9110.html
    source_type: standard
    relevance: HTTP CONNECT proxy tunneling.
  - id: rfc1928-socks5
    title: SOCKS Protocol Version 5
    url: https://datatracker.ietf.org/doc/html/rfc1928
    source_type: standard
    relevance: SOCKS5 tunneling proxy semantics.
  - id: safety-network-design
    title: Moonweave safety-network-control module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Proxy as NetworkEndpoint hop in egress routes.
source_claims:
  - id: claim-network-proxy-design
    source: safety-network-design
    supports: Moonweave models Proxy as approved intermediary hop in ordered_hops separate from final NetworkEndpoint.
    locator: Proxy boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-network-proxy-design
    source: rfc1928-socks5
    supports: SOCKS5 provides tunnel entry points mappable to Proxy and SOCKSProxy subtypes.
    locator: RFC 1928
    evidence_kind: official
    confidence: high
