schema: moonweave.ai/ontology-node/v1
id: SOCKSProxy
kind: concept
labels:
  zh: SOCKS 代理
  en: SOCKS proxy
  ja: SOCKS プロキシ
semantics:
  short_definition:
    zh: 使用 SOCKS4/5 协议隧道化 TCP 连接的 Proxy 特化。
    en: A Proxy specialization tunneling TCP connections via SOCKS4 or SOCKS5 protocol.
    ja: SOCKS4/5 协议で TCP connection を tunnel する Proxy 特化。
  definition:
    zh: SOCKSProxy 是 Proxy 的 SOCKS 种差，标识 SOCKS5 握手、用户名/密码认证与 BIND/CONNECT 命令的中间节点。它映射 socks5://127.0.0.1:1080 等隧道入口；不是 HTTPProxy（无 CONNECT HTTP 语义）或最终 destination server。
    en: "SOCKSProxy is the SOCKS differentia of Proxy identifying intermediaries with SOCKS5 handshake, username/password auth, and BIND or CONNECT commands. It maps tunnel entry points such as socks5://127.0.0.1:1080; it is not HTTPProxy (no CONNECT HTTP semantics) or the final destination server."
    ja: SOCKSProxy は Proxy の SOCKS 種差で SOCKS5 handshake/username/password auth/BIND/CONNECT command を持つ中間 node を識別。socks5://127.0.0.1:1080 等 tunnel entry を写像。HTTPProxy（CONNECT HTTP 语义なし）/final destination server ではない。
  why_needed:
    zh: SOCKS 与 HTTP 代理的握手、认证与命令语义不同，必须独立建模才能正确记录 ProxyRoute via SOCKSProxy 与 denial_stage。
    en: SOCKS and HTTP proxies differ in handshake, auth, and command semantics; separate modeling is required to record ProxyRoute via SOCKSProxy and denial_stage correctly.
    ja: SOCKS/HTTP proxy は handshake/auth/command 语义が異なり、ProxyRoute via SOCKSProxy/denial_stage 正確記録には独立モデル化が必要。
  includes:
    - zh: 含 SOCKS5 CONNECT、BIND、GSSAPI/用户名密码认证与 socks URL 配置。
      en: Includes SOCKS5 CONNECT, BIND, GSSAPI or username/password auth, and socks URL configuration.
      ja: SOCKS5 CONNECT/BIND/GSSAPI/username-password auth/socks URL configuration を含む。
  excludes:
    - zh: 不包含 HTTP CONNECT、HTTPS 正向 proxy URL、DNS-over-HTTPS resolver。
      en: Excludes HTTP CONNECT, HTTPS forward proxy URL, DNS-over-HTTPS resolver.
      ja: HTTP CONNECT/HTTPS forward proxy URL/DNS-over-HTTPS resolver は含まない。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成：客户端 SOCKS5 CONNECT api.example.com:443 → SOCKSProxy hop → origin TLS；记录 socks_version、auth_method 与 reply_code。与 HTTPProxy 不可互换出现在同一 policy 强制路径 unless explicitly allowed。
    en: "Integration: client SOCKS5 CONNECT api.example.com:443 → SOCKSProxy hop → origin TLS; record socks_version, auth_method, reply_code. Not interchangeable with HTTPProxy on same policy-mandated path unless explicitly allowed."
    ja: 統合：client SOCKS5 CONNECT api.example.com:443 → SOCKSProxy hop → origin TLS。socks_version/auth_method/reply_code 記録。明示許可なし同一 policy 強制 path で HTTPProxy と互换不可。
  typical_input:
    - description: SOCKS5 CONNECT request.
      format: |
        socks5://127.0.0.1:1080
        CONNECT api.example.com:443
        auth: username/password
      source_claims:
        - claim-socks-proxy-rfc1928
  typical_output:
    - description: SOCKS5 tunnel hop established.
      format: |
        proxy_id: socks-local-1080
        reply_code: succeeded
        bound_address: api.example.com:443
      source_claims:
        - claim-socks-proxy-design
  reference_implementations:
    - name: SOCKS Protocol Version 5
      url: https://datatracker.ietf.org/doc/html/rfc1928
      description: SOCKS5 handshake, authentication, CONNECT and BIND commands.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: SOCKSProxy-connect-success
    labels:
      zh: SOCKS5 CONNECT 成功
      en: SOCKS5 CONNECT success
      ja: SOCKS5 CONNECT 成功
    descriptions:
      zh: Agent 经 socks-local-1080 SOCKS5 CONNECT api.example.com:443 成功，ProxyRoute ordered_hops 含 SOCKSProxy 跳点。
      en: Agent succeeds SOCKS5 CONNECT api.example.com:443 via socks-local-1080; ProxyRoute ordered_hops include SOCKSProxy hop.
      ja: Agent が socks-local-1080 経由 SOCKS5 CONNECT api.example.com:443 成功。ProxyRoute ordered_hops に SOCKSProxy hop。
    example_source:
      product: RFC 1928
      url: https://datatracker.ietf.org/doc/html/rfc1928
      version: SOCKS5 CONNECT
    field_values:
      proxy_id: socks-local-1080
      reply_code: succeeded
    related_node_ids:
      - SOCKSProxy
      - ProxyRoute
    related_relation_ids:
      - ProxyRoute-via-Proxy
    source_claims:
      - claim-socks-proxy-rfc1928
  - id: SOCKSProxy-auth-failure
    labels:
      zh: SOCKS 认证失败
      en: SOCKS authentication failure
      ja: SOCKS 認証失敗
    descriptions:
      zh: 错误 credentials 导致 SOCKS5 auth failure；NetworkCall denial_stage=proxy_auth 未进入 origin 连接。
      en: Wrong credentials cause SOCKS5 auth failure; NetworkCall denial_stage=proxy_auth without origin connection.
      ja: 誤 credentials で SOCKS5 auth failure。NetworkCall denial_stage=proxy_auth、origin 接続未进入。
    example_source:
      product: RFC 1928
      url: https://datatracker.ietf.org/doc/html/rfc1928
      version: authentication methods
    field_values:
      reply_code: auth_failure
      denial_stage: proxy_auth
    related_node_ids:
      - SOCKSProxy
      - NetworkCall
    related_relation_ids: []
    source_claims:
      - claim-socks-proxy-rfc1928
  - id: SOCKSProxy-http-boundary
    labels:
      zh: HTTP CONNECT 非 SOCKS
      en: HTTP CONNECT is not SOCKS
      ja: HTTP CONNECT は SOCKS ではない
    descriptions:
      zh: proxy-egress-2 HTTP CONNECT 是 HTTPProxy 不是 SOCKSProxy；命令语义与握手不同。
      en: proxy-egress-2 HTTP CONNECT is HTTPProxy not SOCKSProxy; command semantics and handshake differ.
      ja: proxy-egress-2 HTTP CONNECT は HTTPProxy で SOCKSProxy ではない。command/handshake 異なる。
    example_source:
      product: RFC 9110
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      version: CONNECT
    field_values:
      accepted: false
    related_node_ids:
      - SOCKSProxy
      - HTTPProxy
    related_relation_ids: []
    source_claims:
      - claim-socks-proxy-design
  - id: SOCKSProxy-bind-mode
    labels:
      zh: SOCKS BIND 模式
      en: SOCKS BIND mode
      ja: SOCKS BIND mode
    descriptions:
      zh: SOCKS5 BIND 用于 inbound 监听场景；记录 bound_address 与 associate 生命周期，区别于 CONNECT egress。
      en: SOCKS5 BIND used for inbound listen scenarios; records bound_address and associate lifecycle, distinct from CONNECT egress.
      ja: SOCKS5 BIND は inbound listen 场景。bound_address/associate lifecycle 記録。CONNECT egress と区別。
    example_source:
      product: RFC 1928
      url: https://datatracker.ietf.org/doc/html/rfc1928
      version: BIND command
    field_values:
      command: BIND
    related_node_ids:
      - SOCKSProxy
    related_relation_ids: []
    source_claims:
      - claim-socks-proxy-rfc1928
