      ja: SOCKS proxy - E2B サンドボックス VM
    descriptions: {zh: "SOCKS 代理(SOCKSProxy) [SOCKSProxy]: 按 SOCKS 协商、命令与地址类型中介连接的代理端点。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — 网络隔离、文件系统隔离与资源限制。 Fields: socks_version.", en: "SOCKS proxy (SOCKSProxy) [SOCKSProxy]: A proxy endpoint mediating connections through SOCKS negotiation, commands, and address types.. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network isolation, filesystem isolation, and resource limits (e2b.dev/docs). Fields include socks_version.", ja: "SOCKS proxy(SOCKSProxy) [SOCKSProxy]: SOCKS negotiation・command・address type で connection を mediate する proxy endpoint。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network/filesystem isolation と resource limit。 Fields: socks_version."}
    field_values:
