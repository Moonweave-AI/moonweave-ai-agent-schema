schema: moonweave.ai/ontology-node/v1
id: SOCKSProxy
kind: concept
status: review
labels:
  zh: SOCKS 代理
  en: SOCKS proxy
  ja: SOCKS proxy
semantics:
  short_definition:
    zh: 按 SOCKS 协商、命令与地址类型中介连接的代理端点。
    en: A proxy endpoint mediating connections through SOCKS negotiation, commands, and address types.
    ja: SOCKS negotiation・command・address type で connection を mediate する proxy endpoint。
  definition:
    zh: SOCKS 代理是一种 Proxy，以版本协商、认证方法选择、CONNECT/BIND/UDP ASSOCIATE 命令、地址类型和 SOCKS 回复码为种差。它中介运输连接而不要求 HTTP 消息语义；它不是 HTTPProxy、某次 ProxyRoute 或任意防火墙设备。
    en: A SOCKSProxy is a Proxy distinguished by version negotiation, authentication-method selection, CONNECT/BIND/UDP ASSOCIATE commands, address types, and SOCKS reply codes. It mediates transport connections without requiring HTTP message semantics; it is not an HTTPProxy, one ProxyRoute, or an arbitrary firewall device.
    ja: SOCKSProxy は version negotiation・authentication method selection・CONNECT/BIND/UDP ASSOCIATE command・address type・SOCKS reply code で区別する Proxy です。HTTP message semantics を要求せず transport connection を mediate し HTTPProxy・一 ProxyRoute・任意 firewall device ではありません。
  why_needed:
    zh: 将 SOCKS 的运输级代理语义作为 Proxy 的明确子类，防止用 HTTP 字段错误解释 SOCKS 地址、认证与拒绝。
    en: Making SOCKS transport-level mediation an explicit Proxy subtype prevents HTTP fields from misinterpreting SOCKS addressing, authentication, and denial.
    ja: SOCKS transport-level mediation を Proxy subtype とし HTTP field による SOCKS address/auth/denial の誤解釈を防ぎます。
  includes:
    - zh: SOCKS5 TCP CONNECT、BIND 和 UDP ASSOCIATE 服务端点，以及保留协商证据的兼容 SOCKS 服务。
      en: SOCKS5 TCP CONNECT, BIND, and UDP ASSOCIATE service endpoints and compatible SOCKS services retaining negotiation evidence.
      ja: SOCKS5 TCP CONNECT・BIND・UDP ASSOCIATE endpoint と negotiation evidence を保持する compatible SOCKS service。
  excludes:
    - zh: HTTP CONNECT 代理、普通 NAT、仅按 IP 过滤的防火墙以及某次已选择路径。
      en: HTTP CONNECT proxies, ordinary NAT, IP-only firewalls, and one selected route occurrence.
      ja: HTTP CONNECT proxy・ordinary NAT・IP-only firewall・一 selected route occurrence。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - socks_version
    - supported_commands
  fields:
    - id: socks_version
      labels:
        zh: SOCKS 版本
        en: SOCKS version
        ja: SOCKS version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录握手实际协商的 SOCKS 协议版本。
        en: Records the SOCKS protocol version actually negotiated.
        ja: handshake で実際に negotiated された SOCKS version。
      allowed_values: []
      pattern: null
      example_value: "5"
      source_claims:
        - claim-socks-proxy-001
    - id: supported_commands
      labels:
        zh: 支持命令
        en: supported commands
        ja: supported commands
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出服务端点支持的 CONNECT、BIND 或 UDP ASSOCIATE 命令。
        en: Lists CONNECT, BIND, or UDP ASSOCIATE commands supported by the endpoint.
        ja: endpoint が support する CONNECT・BIND・UDP ASSOCIATE command。
      allowed_values: []
      pattern: null
      example_value:
        - CONNECT
        - UDP_ASSOCIATE
      source_claims:
        - claim-socks-proxy-001
    - id: address_types
      labels:
        zh: 地址类型
        en: address types
        ja: address types
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出可接受的 IPv4、域名或 IPv6 目标地址形式。
        en: Lists accepted IPv4, domain-name, or IPv6 destination address forms.
        ja: accepted IPv4・domain-name・IPv6 destination address form。
      allowed_values: []
      pattern: null
      example_value:
        - IPv4
        - DOMAINNAME
        - IPv6
      source_claims:
        - claim-socks-proxy-001
    - id: authentication_methods
      labels:
        zh: 认证方法
        en: authentication methods
        ja: authentication methods
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出协商可选的 SOCKS 认证方法，并与本次选择结果分开。
        en: Lists negotiable SOCKS authentication methods separately from the method selected for a call.
        ja: negotiable SOCKS authentication method を call で selected された method と分けて列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - NO_AUTH
        - USERNAME_PASSWORD
      source_claims:
        - claim-socks-proxy-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: SOCKSProxy-example-positive-manual-20260716
    kind: positive
    labels:
      zh: SOCKS5 双栈代理
      en: Dual-stack SOCKS5 proxy
      ja: dual-stack SOCKS5 proxy
    scenario_id: null
    descriptions:
      zh: socks.example:1080 协商版本 5，支持 CONNECT 与 UDP ASSOCIATE、IPv4/域名/IPv6，并选择用户名密码认证。
      en: socks.example:1080 negotiates version 5, supports CONNECT and UDP ASSOCIATE with IPv4/domain/IPv6, and selects username-password authentication.
      ja: socks.example:1080 は version 5・CONNECT/UDP ASSOCIATE・IPv4/domain/IPv6 を support し username-password auth を選択します。
    field_values:
      endpoint_id: socks-egress-example-1080
      scheme_or_transport: socks5
      host_or_address: socks.example
      port: 1080
      trust_zone_ref: trust-zone/managed-egress
      identity_verification_ref: proxy-credential/socks-example
      forwarding_mode: tunnel
      socks_version: "5"
      supported_commands:
        - CONNECT
        - UDP_ASSOCIATE
      address_types:
        - IPv4
        - DOMAINNAME
        - IPv6
      authentication_methods:
        - NO_AUTH
        - USERNAME_PASSWORD
    related_node_ids:
      - SOCKSProxy
      - Proxy
    related_relation_ids:
      - SOCKSProxy-is_a-Proxy
    expected_result:
      zh: 建立 SOCKSProxy 子类实例并保留协议能力。
      en: Create a SOCKSProxy subtype instance retaining protocol capabilities.
      ja: protocol capability を保持する SOCKSProxy subtype instance を作成します。
    why_valid_or_invalid:
      zh: 版本、命令、地址类型和认证协商共同构成 SOCKS 种差。
      en: Version, commands, address types, and authentication negotiation jointly provide the SOCKS differentia.
      ja: version・command・address type・auth negotiation が SOCKS differentia を構成します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-socks-proxy-001
  - id: SOCKSProxy-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 只做 IP 转发的 NAT
      en: IP-forwarding NAT only
      ja: IP forwarding NAT のみ
    scenario_id: network-review-socksproxy-boundary
    descriptions:
      zh: 设备改写源地址和端口，但客户端没有 SOCKS 版本协商、命令请求、地址类型或回复码。
      en: A device rewrites source addresses and ports, but the client performs no SOCKS version negotiation, command request, address type, or reply-code exchange.
      ja: device は source address/port を rewrite しますが client は SOCKS version negotiation・command request・address type・reply code exchange を行いません。
    field_values: {}
    related_node_ids:
      - NetworkEndpoint
    related_relation_ids: []
    expected_result:
      zh: 不分类为 SOCKSProxy；必要时作为外部网络基础设施引用。
      en: Do not classify it as SOCKSProxy; reference it as external network infrastructure if needed.
      ja: SOCKSProxy とせず必要なら external network infrastructure として参照します。
    why_valid_or_invalid:
      zh: 转发功能本身不足以满足 SOCKS 协议种差。
      en: Forwarding alone does not satisfy the SOCKS protocol differentia.
      ja: forwarding のみでは SOCKS protocol differentia を満たしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-socks-proxy-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: HTTPProxy
    shared_parent_concept_id: Proxy
    differentia:
      zh: SOCKSProxy 按 SOCKS 握手、命令和回复中介运输连接；HTTPProxy 按 HTTP 请求与响应中介。
      en: SOCKSProxy mediates transport connections through SOCKS handshake, commands, and replies; HTTPProxy mediates HTTP requests and responses.
      ja: SOCKSProxy は SOCKS handshake/command/reply、HTTPProxy は HTTP request/response で mediation します。
    source_claims:
      - claim-socks-proxy-001
      - claim-socks-proxy-002
parent_relation:
  id: SOCKSProxy-is_a-Proxy
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: is a
  definitions:
    zh: SOCKSProxy 是 Proxy 的子类：它满足中介端点条件，并以 SOCKS 版本与认证协商、CONNECT/BIND/UDP ASSOCIATE 命令、地址类型和回复码限定行为。
    en: "SOCKSProxy is a subtype of Proxy: it satisfies intermediary-endpoint conditions and constrains behavior through SOCKS version and authentication negotiation, CONNECT/BIND/UDP ASSOCIATE commands, address types, and reply codes."
    ja: SOCKSProxy は Proxy subtype で intermediary endpoint condition を満たし SOCKS version/auth negotiation・CONNECT/BIND/UDP ASSOCIATE・address type・reply code で behavior を限定します。
