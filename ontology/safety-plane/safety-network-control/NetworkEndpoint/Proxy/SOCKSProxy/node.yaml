    en: Every SOCKSProxy is a Proxy distinguished by SOCKS5 handshake and CONNECT or BIND commands.
    ja: すべての SOCKSProxy は Proxy で SOCKS5 handshake/CONNECT/BIND command が種差。
  cardinality: null
  cardinality_not_applicable_reason:
