schema: moonweave.ai/ontology-node/v1
id: HTTPProxy
kind: concept
labels:
  zh: HTTP 代理
  en: HTTP proxy
  ja: HTTP プロキシ
semantics:
  short_definition:
    zh: 使用 HTTP CONNECT 或正向代理语义隧道化流量的 Proxy 特化。
    en: A Proxy specialization tunneling traffic via HTTP CONNECT or forward-proxy semantics.
    ja: HTTP CONNECT または forward-proxy 语义で traffic を tunnel する Proxy 特化。
  definition:
    zh: HTTPProxy 是 Proxy 的 HTTP 种差，标识支持 CONNECT 方法、Proxy-Authorization 与 explicit proxy URL（如 http://proxy.corp:8080）的中间节点。它映射企业 egress HTTP CONNECT proxy 与 RFC 9110 CONNECT 隧道；不是 SOCKSProxy 或最终 HTTPS origin。
    en: "HTTPProxy is the HTTP differentia of Proxy identifying intermediaries supporting CONNECT method, Proxy-Authorization, and explicit proxy URLs (e.g., http://proxy.corp:8080). It maps enterprise egress HTTP CONNECT proxies and RFC 9110 CONNECT tunnels; it is neither SOCKSProxy nor the final HTTPS origin."
    ja: HTTPProxy は Proxy の HTTP 種差で CONNECT method/Proxy-Authorization/explicit proxy URL（http://proxy.corp:8080 等）を支持する中間 node を識別。enterprise egress HTTP CONNECT proxy/RFC 9110 CONNECT tunnel を写像。SOCKSProxy/final HTTPS origin ではない。
  why_needed:
    zh: HTTP 与 SOCKS 代理语义不同，混淆会导致 CONNECT 请求记录、认证头与 hop 顺序错误，无法正确审计 egress 路径。
    en: HTTP and SOCKS proxy semantics differ; conflating them breaks CONNECT request logging, auth headers, and hop ordering for egress path audit.
    ja: HTTP/SOCKS proxy 语义は異なり、混同は CONNECT request log/auth header/hop order を壊し egress path 監査不可。
  includes:
    - zh: 含 CONNECT 隧道、正向 HTTP proxy、Proxy-Authorization 与 explicit proxy configuration。
      en: Includes CONNECT tunnel, forward HTTP proxy, Proxy-Authorization, and explicit proxy configuration.
      ja: CONNECT tunnel/forward HTTP proxy/Proxy-Authorization/explicit proxy configuration を含む。
  excludes:
    - zh: 不包含 SOCKS5 BIND/CONNECT、透明 DNS proxy、最终 TLS 终端 server。
      en: Excludes SOCKS5 BIND or CONNECT, transparent DNS proxy, final TLS terminator server.
      ja: SOCKS5 BIND/CONNECT/transparent DNS proxy/final TLS terminator server は含まない。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成：`CONNECT api.example.com:443 HTTP/1.1` via proxy-egress-2 → HTTPProxy hop；记录 Proxy-Authorization、200 Connection established 与后续 TLS 到 origin。NetworkPolicy 强制 HTTPProxy 时 direct TLS 必须 deny。
    en: "Integration: CONNECT api.example.com:443 HTTP/1.1 via proxy-egress-2 → HTTPProxy hop; log Proxy-Authorization, 200 Connection established, and subsequent TLS to origin. When NetworkPolicy mandates HTTPProxy, direct TLS must deny."
    ja: 統合：CONNECT api.example.com:443 via proxy-egress-2 → HTTPProxy hop。Proxy-Authorization/200 Connection established/続く origin TLS を log。NetworkPolicy が HTTPProxy 強制時 direct TLS deny 必須。
  typical_input:
    - description: HTTP CONNECT through corporate proxy.
      format: |
        CONNECT api.example.com:443 HTTP/1.1
        Host: api.example.com:443
        Proxy-Authorization: Basic ...
      source_claims:
        - claim-http-proxy-rfc9110
  typical_output:
    - description: Established tunnel hop record.
      format: |
        proxy_id: proxy-egress-2
        connect_status: 200
        tunneled_authority: api.example.com:443
      source_claims:
        - claim-http-proxy-design
  reference_implementations:
    - name: RFC 9110 HTTP CONNECT
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      description: CONNECT method tunnel establishment through HTTP proxies.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: HTTPProxy-connect-tunnel
    labels:
      zh: CONNECT 隧道建立
      en: CONNECT tunnel establishment
      ja: CONNECT tunnel 確立
    descriptions:
      zh: proxy-egress-2 返回 200 Connection established 后 TLS 握手到 api.example.com；HTTPProxy hop 记录在 ordered_hops[0]。
      en: After proxy-egress-2 returns 200 Connection established, TLS handshake proceeds to api.example.com; HTTPProxy hop recorded at ordered_hops[0].
      ja: proxy-egress-2 が 200 Connection established 後 TLS handshake api.example.com へ。HTTPProxy hop ordered_hops[0] 記録。
    example_source:
      product: RFC 9110
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      version: CONNECT
    field_values:
      proxy_id: proxy-egress-2
      connect_status: 200
    related_node_ids:
      - HTTPProxy
      - ProxyRoute
    related_relation_ids: []
    source_claims:
      - claim-http-proxy-rfc9110
  - id: HTTPProxy-auth-required
    labels:
      zh: 代理认证要求
      en: Proxy authentication required
      ja: proxy 認証要求
    descriptions:
      zh: 无 Proxy-Authorization 时 proxy 返回 407；NetworkCall denial_stage=proxy_auth 而非 origin 403。
      en: Without Proxy-Authorization proxy returns 407; NetworkCall denial_stage=proxy_auth not origin 403.
      ja: Proxy-Authorization なしで proxy 407。NetworkCall denial_stage=proxy_auth（origin 403 ではない）。
    example_source:
      product: RFC 9110
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      version: proxy authentication
    field_values:
      connect_status: 407
      denial_stage: proxy_auth
    related_node_ids:
      - HTTPProxy
      - NetworkCall
    related_relation_ids: []
    source_claims:
      - claim-http-proxy-rfc9110
  - id: HTTPProxy-socks-boundary
    labels:
      zh: SOCKS 非 HTTP 代理
      en: SOCKS is not HTTP proxy
      ja: SOCKS は HTTP proxy ではない
    descriptions:
      zh: socks5://127.0.0.1:1080 隧道是 SOCKSProxy 不是 HTTPProxy；CONNECT 语义不适用。
      en: socks5://127.0.0.1:1080 tunnel is SOCKSProxy not HTTPProxy; CONNECT semantics do not apply.
      ja: socks5://127.0.0.1:1080 tunnel は SOCKSProxy で HTTPProxy ではない。CONNECT 语义不適用。
    example_source:
      product: RFC 1928
      url: https://datatracker.ietf.org/doc/html/rfc1928
      version: SOCKS5
    field_values:
      accepted: false
    related_node_ids:
      - HTTPProxy
      - SOCKSProxy
    related_relation_ids: []
    source_claims:
      - claim-http-proxy-design
  - id: HTTPProxy-direct-bypass-deny
    labels:
      zh: 禁止绕过 HTTP 代理
      en: Direct bypass of HTTP proxy denied
      ja: HTTP proxy bypass 禁止
    descriptions:
      zh: policy 要求 proxy-egress-2 但实现直连 203.0.113.42:443；必须 deny 并缺少 HTTPProxy hop 证据。
      en: Policy requires proxy-egress-2 but implementation connects directly to 203.0.113.42:443; must deny lacking HTTPProxy hop evidence.
      ja: policy が proxy-egress-2 要求だが direct 203.0.113.42:443 接続。deny、HTTPProxy hop evidence 欠如。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: mandatory proxy route
    field_values:
      authorization_chain_complete: false
    related_node_ids:
      - HTTPProxy
      - NetworkPolicy
    related_relation_ids: []
    source_claims:
      - claim-http-proxy-design
parent_relation:
  id: HTTPProxy-is_a-Proxy
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种代理
    en: is a proxy
    ja: プロキシの一種
  definitions:
    zh: 每个 HTTPProxy 都是 Proxy，种差是 HTTP CONNECT 或 forward-proxy 隧道语义。
    en: Every HTTPProxy is a Proxy distinguished by HTTP CONNECT or forward-proxy tunnel semantics.
    ja: すべての HTTPProxy は Proxy で HTTP CONNECT/forward-proxy tunnel 语义が種差。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-http-proxy-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
