schema: moonweave.ai/ontology-node/v1
id: HTTPProxy
kind: concept
status: review
labels:
  zh: HTTP 代理
  en: HTTP proxy
  ja: HTTP proxy
semantics:
  short_definition:
    zh: 按 HTTP 转发或 CONNECT 隧道语义中介请求的代理端点。
    en: A proxy endpoint mediating requests through HTTP forwarding or CONNECT tunneling semantics.
    ja: HTTP forwarding/CONNECT tunneling semantics で request を mediate する proxy endpoint。
  definition:
    zh: HTTP 代理是一种 Proxy，以 HTTP absolute-form 转发、authority 处理、CONNECT 隧道以及 HTTP 响应语义为种差。它可以转发或隧道请求，但不是 SOCKS 命令代理，也不是一条已选择的 ProxyRoute 或服务器端反向代理业务资源。
    en: An HTTPProxy is a Proxy distinguished by HTTP absolute-form forwarding, authority handling, CONNECT tunneling, and HTTP response semantics. It may forward or tunnel a request, but it is not a SOCKS command proxy, a selected ProxyRoute, or the business resource served behind a reverse proxy.
    ja: HTTPProxy は HTTP absolute-form forwarding・authority handling・CONNECT tunneling・HTTP response semantics で区別する Proxy です。request を forward/tunnel できますが SOCKS command proxy・selected ProxyRoute・reverse proxy 背後の business resource ではありません。
  why_needed:
    zh: HTTP 专属能力需要在 Proxy 之下表达，既保留协议差异又不把整个网络控制框架绑定为 HTTP。
    en: HTTP-specific capabilities belong below Proxy, preserving protocol differences without binding the whole network-control model to HTTP.
    ja: HTTP-specific capability を Proxy 下に置き protocol difference を保ちながら network-control model 全体を HTTP に固定しません。
  includes:
    - zh: 正向 HTTP/HTTPS 代理、支持 CONNECT 的企业出口代理和明确按 HTTP 语义工作的中介。
      en: Forward HTTP/HTTPS proxies, enterprise egress proxies supporting CONNECT, and intermediaries explicitly operating under HTTP semantics.
      ja: forward HTTP/HTTPS proxy・CONNECT 対応 enterprise egress proxy・HTTP semantics の intermediary。
  excludes:
    - zh: SOCKS5 代理、透明的非 HTTP 转发器、反向代理背后的源站以及仅有代理 URI 的配置。
      en: SOCKS5 proxies, transparent non-HTTP forwarders, origins behind reverse proxies, and configuration containing only a proxy URI.
      ja: SOCKS5 proxy・transparent non-HTTP forwarder・reverse proxy 背後の origin・proxy URI のみの config。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - proxy_uri
    - supported_http_versions
  fields:
    - id: proxy_uri
      labels:
        zh: 代理 URI
        en: proxy URI
        ja: proxy URI
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录客户端连接 HTTP 代理所用的规范化 URI。
        en: Records the normalized URI used by the client to reach the HTTP proxy.
        ja: client が HTTP proxy へ到達する normalized URI。
      allowed_values: []
      pattern: null
      example_value: https://proxy.example:8443
      source_claims:
        - claim-http-proxy-001
    - id: supported_http_versions
      labels:
        zh: 支持的 HTTP 版本
        en: supported HTTP versions
        ja: supported HTTP versions
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出代理实际支持的 HTTP 版本及其协商证据。
        en: Lists HTTP versions actually supported by the proxy with negotiation evidence.
        ja: proxy が実際に support する HTTP version と negotiation evidence。
      allowed_values: []
      pattern: null
      example_value:
        - HTTP/1.1
        - HTTP/2
      source_claims:
        - claim-http-proxy-001
    - id: tunnel_support
      labels:
        zh: 隧道支持
        en: tunnel support
        ja: tunnel support
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明是否支持 CONNECT 或等效 HTTP 隧道语义。
        en: States whether CONNECT or equivalent HTTP tunnel semantics are supported.
        ja: CONNECT または equivalent HTTP tunnel semantics の support。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims:
        - claim-http-proxy-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: HTTPProxy-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 支持 CONNECT 的 HTTPS 代理
      en: HTTPS proxy supporting CONNECT
      ja: CONNECT 対応 HTTPS proxy
    scenario_id: null
    descriptions:
      zh: proxy.example:8443 接受 HTTP/1.1 CONNECT api.example.com:443，并返回成功隧道响应；端点证书与企业代理身份匹配。
      en: proxy.example:8443 accepts HTTP/1.1 CONNECT api.example.com:443 and returns a successful tunnel response; its certificate matches the enterprise proxy identity.
      ja: proxy.example:8443 は HTTP/1.1 CONNECT を受け successful tunnel response を返し certificate は enterprise proxy identity と一致します。
    field_values:
      endpoint_id: proxy-egress-example-8443
      scheme_or_transport: https
      host_or_address: proxy.example
      port: 8443
      trust_zone_ref: trust-zone/managed-egress
      identity_verification_ref: certificate-pin/proxy.example
      forwarding_mode: connect-tunnel
      proxy_uri: https://proxy.example:8443
      supported_http_versions:
        - HTTP/1.1
        - HTTP/2
      tunnel_support: true
    related_node_ids:
      - HTTPProxy
      - Proxy
    related_relation_ids:
      - HTTPProxy-is_a-Proxy
    expected_result:
      zh: 分类为 HTTPProxy，并继承 Proxy 与 NetworkEndpoint 语义。
      en: Classify it as HTTPProxy inheriting Proxy and NetworkEndpoint semantics.
      ja: HTTPProxy と分類し Proxy/NetworkEndpoint semantics を継承します。
    why_valid_or_invalid:
      zh: 转发与隧道行为由 HTTP authority 和 CONNECT 语义明确区分。
      en: HTTP authority and CONNECT semantics explicitly distinguish its forwarding and tunneling behavior.
      ja: HTTP authority/CONNECT semantics が forwarding/tunneling behavior を明示します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-http-proxy-001
  - id: HTTPProxy-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: SOCKS5 CONNECT 命令
      en: SOCKS5 CONNECT command
      ja: SOCKS5 CONNECT command
    scenario_id: network-review-httpproxy-boundary
    descriptions:
      zh: 客户端先协商 SOCKS5 认证，再发送 ATYP、DST.ADDR 与 DST.PORT；没有 HTTP 请求行、authority 或 HTTP 响应。
      en: The client negotiates SOCKS5 authentication and sends ATYP, DST.ADDR, and DST.PORT, with no HTTP request line, authority, or HTTP response.
      ja: client は SOCKS5 auth を negotiate し ATYP/DST.ADDR/DST.PORT を送り HTTP request line/authority/response はありません。
    field_values: {}
    related_node_ids:
      - SOCKSProxy
      - Proxy
    related_relation_ids:
      - SOCKSProxy-is_a-Proxy
    expected_result:
      zh: 分类为 SOCKSProxy，不分类为 HTTPProxy。
      en: Classify it as SOCKSProxy, not HTTPProxy.
      ja: SOCKSProxy と分類し HTTPProxy にはしません。
    why_valid_or_invalid:
      zh: 二者共享代理上位类，但协议握手、地址和应答语义不同。
      en: They share Proxy as a genus but differ in negotiation, address, and reply semantics.
      ja: Proxy genus は共有しても negotiation・address・reply semantics が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-http-proxy-001
      - claim-http-proxy-002
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: SOCKSProxy
    shared_parent_concept_id: Proxy
    differentia:
      zh: HTTPProxy 使用 HTTP 请求、authority 与 CONNECT；SOCKSProxy 使用 SOCKS 协商、命令与地址类型。
      en: HTTPProxy uses HTTP requests, authority, and CONNECT; SOCKSProxy uses SOCKS negotiation, commands, and address types.
      ja: HTTPProxy は HTTP request/authority/CONNECT、SOCKSProxy は SOCKS negotiation/command/address type を使います。
    source_claims:
      - claim-http-proxy-001
      - claim-http-proxy-002
parent_relation:
  id: HTTPProxy-is_a-Proxy
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: is a
  definitions:
    zh: HTTPProxy 是 Proxy 的子类：它满足可寻址中介与下一跳转发条件，并以 HTTP absolute-form、authority、响应和 CONNECT 隧道语义限定其代理行为。
    en: "HTTPProxy is a subtype of Proxy: it satisfies addressable intermediary and next-hop forwarding conditions and constrains mediation through HTTP absolute-form, authority, response, and CONNECT tunnel semantics."
    ja: HTTPProxy は Proxy subtype で addressable intermediary/next-hop forwarding condition を満たし HTTP absolute-form・authority・response・CONNECT tunnel semantics で mediation を限定します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承描述概念包含，不使用实例关系基数。
    en: Taxonomic inheritance describes concept inclusion and does not use instance-relation cardinality.
    ja: taxonomic inheritance は concept inclusion を表し instance relation cardinality を使いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 以 HTTP 代理 为子类
      en: has subtype HTTP 代理
      ja: HTTP 代理 を subtype に持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: HTTPProxy-is_a-Proxy-example-positive-manual-20260716
      kind: positive
      labels:
        zh: HTTP CONNECT 中介
        en: HTTP CONNECT intermediary
        ja: HTTP CONNECT intermediary
      scenario_id: network-relation-httpproxy-is_a-proxy-positive
      descriptions:
        zh: proxy.example:8443 接收 CONNECT api.example.com:443，以 HTTP 状态回应并建立隧道。
        en: proxy.example:8443 receives CONNECT api.example.com:443, responds with HTTP status, and establishes a tunnel.
        ja: proxy.example:8443 は CONNECT を受け HTTP status で応答し tunnel を確立します。
      field_values: {}
      related_node_ids:
        - HTTPProxy
        - Proxy
      related_relation_ids:
        - HTTPProxy-is_a-Proxy
      expected_result:
        zh: 断言 HTTPProxy is_a Proxy。
        en: Assert HTTPProxy is_a Proxy.
        ja: HTTPProxy is_a Proxy を主張します。
      why_valid_or_invalid:
        zh: 该端点拥有代理中介行为和 HTTP 专属种差。
        en: The endpoint has proxy intermediary behavior and HTTP-specific differentia.
        ja: endpoint は proxy intermediary behavior/HTTP-specific differentia を持ちます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-http-proxy-001
    - id: HTTPProxy-is_a-Proxy-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: SOCKS 回复不属于 HTTP
        en: SOCKS reply is not HTTP
        ja: SOCKS reply は HTTP ではない
      scenario_id: network-relation-httpproxy-is_a-proxy-boundary
      descriptions:
        zh: 代理使用 SOCKS5 方法协商、ATYP 地址和 REP 回复码，没有 HTTP 请求或状态。
        en: The proxy uses SOCKS5 method negotiation, ATYP addressing, and REP reply codes with no HTTP request or status.
        ja: proxy は SOCKS5 negotiation・ATYP・REP code を使い HTTP request/status はありません。
      field_values: {}
      related_node_ids:
        - HTTPProxy
        - Proxy
        - SOCKSProxy
      related_relation_ids:
        - HTTPProxy-is_a-Proxy
      expected_result:
        zh: 只分类为 SOCKSProxy，不建立 HTTPProxy 成员关系。
        en: Classify only as SOCKSProxy and do not assert HTTPProxy membership.
        ja: SOCKSProxy のみとし HTTPProxy membership を主張しません。
      why_valid_or_invalid:
        zh: 共享代理上位类不消除 HTTP 转发语义这一协议种差。
        en: A shared Proxy genus does not erase protocol differentia.
        ja: shared Proxy genus は protocol differentia を消しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-http-proxy-001
        - claim-http-proxy-002
  source_claims:
    - claim-http-proxy-001
  distinct_fact_rationale:
    zh: HTTPProxy 满足 Proxy 的全部身份条件并增加不可替换的种差。
    en: HTTPProxy satisfies every identity condition of Proxy and adds a non-substitutable differentia.
    ja: HTTPProxy は Proxy の全 identity condition を満たし non-substitutable differentia を追加します。
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
