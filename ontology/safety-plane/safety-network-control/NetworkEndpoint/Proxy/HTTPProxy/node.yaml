sources:
  - id: rfc9110-http
    title: RFC 9110 HTTP Semantics
    url: https://www.rfc-editor.org/rfc/rfc9110.html
    source_type: standard
    relevance: HTTP CONNECT and proxy authentication semantics.
  - id: safety-network-design
    title: Moonweave safety-network-control module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: HTTPProxy as CONNECT tunnel hop subtype of Proxy.
source_claims:
  - id: claim-http-proxy-rfc9110
    source: rfc9110-http
    supports: RFC 9110 CONNECT method defines HTTP proxy tunnel establishment mappable to HTTPProxy hops.
    locator: CONNECT method
    evidence_kind: official
    confidence: high
  - id: claim-http-proxy-design
    source: safety-network-design
    supports: Moonweave distinguishes HTTPProxy CONNECT hops from SOCKSProxy and final origin endpoints in route audit.
    locator: HTTPProxy boundary
    evidence_kind: design-inference
    confidence: high
