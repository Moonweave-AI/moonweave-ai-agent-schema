schema: moonweave.ai/ontology-node/v1
id: HTTPProxy
kind: concept
status: accepted
labels:
  zh: HTTP 代理
  en: HTTP proxy
  ja: HTTP proxy
semantics:
  short_definition:
    zh: 按 HTTP 转发或 CONNECT 隧道语义中介请求的代理端点。
    en: A proxy endpoint mediating requests through HTTP forwarding or CONNECT tunneling semantics.
    ja: HTTP forwarding/CONNECT tunneling semantics で request を mediate する proxy endpoint。
  definition:
    zh: HTTP 代理是一种 Proxy，以 HTTP absolute-form 转发、authority 处理、CONNECT 隧道以及 HTTP 响应语义为种差。它可以转发或隧道请求，但不是 SOCKS 命令代理，也不是一条已选择的 ProxyRoute 或服务器端反向代理业务资源。
    en: An HTTPProxy is a Proxy distinguished by HTTP absolute-form forwarding, authority handling, CONNECT tunneling, and HTTP response semantics. It may forward or tunnel a request, but it is not a SOCKS command proxy, a selected ProxyRoute, or the business resource served behind a reverse proxy.
    ja: HTTPProxy は HTTP absolute-form forwarding・authority handling・CONNECT tunneling・HTTP response semantics で区別する Proxy です。request を forward/tunnel できますが SOCKS command proxy・selected ProxyRoute・reverse proxy 背後の business resource ではありません。
  why_needed:
    zh: HTTP 专属能力需要在 Proxy 之下表达，既保留协议差异又不把整个网络控制框架绑定为 HTTP。
    en: HTTP-specific capabilities belong below Proxy, preserving protocol differences without binding the whole network-control model to HTTP.
    ja: HTTP-specific capability を Proxy 下に置き protocol difference を保ちながら network-control model 全体を HTTP に固定しません。
  includes:
    - zh: 正向 HTTP/HTTPS 代理、支持 CONNECT 的企业出口代理和明确按 HTTP 语义工作的中介。
      en: Forward HTTP/HTTPS proxies, enterprise egress proxies supporting CONNECT, and intermediaries explicitly operating under HTTP semantics.
      ja: forward HTTP/HTTPS proxy・CONNECT 対応 enterprise egress proxy・HTTP semantics の intermediary。
  excludes:
    - zh: SOCKS5 代理、透明的非 HTTP 转发器、反向代理背后的源站以及仅有代理 URI 的配置。
      en: SOCKS5 proxies, transparent non-HTTP forwarders, origins behind reverse proxies, and configuration containing only a proxy URI.
      ja: SOCKS5 proxy・transparent non-HTTP forwarder・reverse proxy 背後の origin・proxy URI のみの config。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - proxy_uri
    - supported_http_versions
  fields:
    - id: proxy_uri
      labels:
        zh: 代理 URI
        en: proxy URI
        ja: proxy URI
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录客户端连接 HTTP 代理所用的规范化 URI。
        en: Records the normalized URI used by the client to reach the HTTP proxy.
        ja: client が HTTP proxy へ到達する normalized URI。
      allowed_values: []
      pattern: null
      example_value: https://proxy.example:8443
      source_claims:
        - claim-http-proxy-001
    - id: supported_http_versions
      labels:
        zh: 支持的 HTTP 版本
        en: supported HTTP versions
        ja: supported HTTP versions
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出代理实际支持的 HTTP 版本及其协商证据。
        en: Lists HTTP versions actually supported by the proxy with negotiation evidence.
        ja: proxy が実際に support する HTTP version と negotiation evidence。
      allowed_values: []
      pattern: null
      example_value:
        - HTTP/1.1
        - HTTP/2
      source_claims:
        - claim-http-proxy-001
    - id: tunnel_support
      labels:
        zh: 隧道支持
        en: tunnel support
        ja: tunnel support
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明是否支持 CONNECT 或等效 HTTP 隧道语义。
        en: States whether CONNECT or equivalent HTTP tunnel semantics are supported.
        ja: CONNECT または equivalent HTTP tunnel semantics の support。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims:
        - claim-http-proxy-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: httpproxy-envoy_ext_auth
    labels:
      zh: HTTP 代理 - Envoy ext_authz PEP
      en: HTTP proxy - Envoy ext_authz PEP
      ja: HTTP proxy - Envoy ext_authz PEP
    descriptions: {zh: "HTTP 代理(HTTPProxy) [HTTPProxy]: 按 HTTP 转发或 CONNECT 隧道语义中介请求的代理端点。. Envoy ext_authz 过滤器在上游请求前调用授权服务。 Fields: tunnel_support, proxy_uri.", en: "HTTP proxy (HTTPProxy) [HTTPProxy]: A proxy endpoint mediating requests through HTTP forwarding or CONNECT tunneling semantics.. Envoy ext_authz filter calls an authorization service before allowing upstream requests (envoyproxy.io ext_authz documentation). Fields include tunnel_support, proxy_uri.", ja: "HTTP proxy(HTTPProxy) [HTTPProxy]: HTTP forwarding/CONNECT tunneling semantics で request を mediate する proxy endpoint。. Envoy ext_authz filter は upstream request 前に authorization service を呼ぶ。 Fields: tunnel_support, proxy_uri."}
    field_values:
      proxy_uri: "https://proxy.example:8443"
      tunnel_support: true
    related_node_ids:
      - HTTPProxy
      - Proxy
      - SOCKSProxy
    related_relation_ids:
      - claim-http-proxy-001
      - claim-http-proxy-002
      - HTTPProxy
      - HTTPProxy-is_a-Proxy
      - Proxy
      - SOCKSProxy
      - SOCKSProxy-is_a-Proxy
    example_source: Envoy ext_authz
    source_claims:
      - claim-http-proxy-001
  - id: httpproxy-k8s_netpol
    labels:
      zh: HTTP 代理 - Kubernetes NetworkPolicy
      en: HTTP proxy - Kubernetes NetworkPolicy
      ja: HTTP proxy - Kubernetes NetworkPolicy
    descriptions: {zh: "HTTP 代理(HTTPProxy) [HTTPProxy]: 按 HTTP 转发或 CONNECT 隧道语义中介请求的代理端点。. Kubernetes NetworkPolicy 出站 ipBlock except 169.254.169.254/32 阻断云元数据 SSRF。 Fields: tunnel_support, proxy_uri.", en: "HTTP proxy (HTTPProxy) [HTTPProxy]: A proxy endpoint mediating requests through HTTP forwarding or CONNECT tunneling semantics.. Kubernetes NetworkPolicy egress with ipBlock except 169.254.169.254/32 blocks cloud metadata SSRF (kubernetes.io/docs/concepts/services-networking/network-policies/). Fields include tunnel_support, proxy_uri.", ja: "HTTP proxy(HTTPProxy) [HTTPProxy]: HTTP forwarding/CONNECT tunneling semantics で request を mediate する proxy endpoint。. Kubernetes NetworkPolicy egress の except 169.254.169.254/32 は cloud metadata SSRF を block する。 Fields: tunnel_support, proxy_uri."}
    field_values:
      proxy_uri: "https://proxy.example:8443"
      tunnel_support: true
    related_node_ids:
      - HTTPProxy
      - Proxy
      - SOCKSProxy
    related_relation_ids:
      - claim-http-proxy-001
      - claim-http-proxy-002
      - HTTPProxy
      - HTTPProxy-is_a-Proxy
      - Proxy
      - SOCKSProxy
      - SOCKSProxy-is_a-Proxy
    example_source: Kubernetes NetworkPolicy
    source_claims:
      - claim-http-proxy-001
  - id: httpproxy-e2b
    labels:
      zh: HTTP 代理 - E2B 沙箱 VM
      en: HTTP proxy - E2B sandbox VM
      ja: HTTP proxy - E2B サンドボックス VM
    descriptions: {zh: "HTTP 代理(HTTPProxy) [HTTPProxy]: 按 HTTP 转发或 CONNECT 隧道语义中介请求的代理端点。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — 网络隔离、文件系统隔离与资源限制。 Fields: tunnel_support, proxy_uri.", en: "HTTP proxy (HTTPProxy) [HTTPProxy]: A proxy endpoint mediating requests through HTTP forwarding or CONNECT tunneling semantics.. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network isolation, filesystem isolation, and resource limits (e2b.dev/docs). Fields include tunnel_support, proxy_uri.", ja: "HTTP proxy(HTTPProxy) [HTTPProxy]: HTTP forwarding/CONNECT tunneling semantics で request を mediate する proxy endpoint。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network/filesystem isolation と resource limit。 Fields: tunnel_support, proxy_uri."}
    field_values:
      proxy_uri: "https://proxy.example:8443"
      tunnel_support: true
    related_node_ids:
      - HTTPProxy
      - Proxy
      - SOCKSProxy
    related_relation_ids:
      - claim-http-proxy-001
      - claim-http-proxy-002
      - HTTPProxy
      - HTTPProxy-is_a-Proxy
      - Proxy
      - SOCKSProxy
      - SOCKSProxy-is_a-Proxy
    example_source: E2B Sandbox API
    source_claims:
      - claim-http-proxy-001
  - id: httpproxy-opa
    labels:
      zh: HTTP 代理 - OPA Rego 策略评估
      en: HTTP proxy - OPA Rego policy evaluation
      ja: HTTP proxy - OPA Rego ポリシー評価
    descriptions: {zh: "HTTP 代理(HTTPProxy) [HTTPProxy]: 按 HTTP 转发或 CONNECT 隧道语义中介请求的代理端点。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" }。 Fields: tunnel_support, proxy_uri.", en: "HTTP proxy (HTTPProxy) [HTTPProxy]: A proxy endpoint mediating requests through HTTP forwarding or CONNECT tunneling semantics.. OPA Rego: package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" } (openpolicyagent.org/docs/policy-language). Fields include tunnel_support, proxy_uri.", ja: "HTTP proxy(HTTPProxy) [HTTPProxy]: HTTP forwarding/CONNECT tunneling semantics で request を mediate する proxy endpoint。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }；editor+read も allow。 Fields: tunnel_support, proxy_uri."}
    field_values:
      proxy_uri: "https://proxy.example:8443"
      tunnel_support: true
    related_node_ids:
      - HTTPProxy
      - Proxy
      - SOCKSProxy
    related_relation_ids:
      - claim-http-proxy-001
      - claim-http-proxy-002
      - HTTPProxy
      - HTTPProxy-is_a-Proxy
      - Proxy
      - SOCKSProxy
      - SOCKSProxy-is_a-Proxy
    example_source: Open Policy Agent
    source_claims:
      - claim-http-proxy-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: SOCKSProxy
    shared_parent_concept_id: Proxy
    differentia:
      zh: HTTPProxy 使用 HTTP 请求、authority 与 CONNECT；SOCKSProxy 使用 SOCKS 协商、命令与地址类型。
      en: HTTPProxy uses HTTP requests, authority, and CONNECT; SOCKSProxy uses SOCKS negotiation, commands, and address types.
      ja: HTTPProxy は HTTP request/authority/CONNECT、SOCKSProxy は SOCKS negotiation/command/address type を使います。
    source_claims:
      - claim-http-proxy-001
      - claim-http-proxy-002
parent_relation:
  id: HTTPProxy-is_a-Proxy
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: is a
  definitions:
    zh: HTTPProxy 是 Proxy 的子类：它满足可寻址中介与下一跳转发条件，并以 HTTP absolute-form、authority、响应和 CONNECT 隧道语义限定其代理行为。
    en: "HTTPProxy is a subtype of Proxy: it satisfies addressable intermediary and next-hop forwarding conditions and constrains mediation through HTTP absolute-form, authority, response, and CONNECT tunnel semantics."
    ja: HTTPProxy は Proxy subtype で addressable intermediary/next-hop forwarding condition を満たし HTTP absolute-form・authority・response・CONNECT tunnel semantics で mediation を限定します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承描述概念包含，不使用实例关系基数。
    en: Taxonomic inheritance describes concept inclusion and does not use instance-relation cardinality.
    ja: taxonomic inheritance は concept inclusion を表し instance relation cardinality を使いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 以 HTTP 代理 为子类
      en: has subtype HTTP 代理
      ja: HTTP 代理 を subtype に持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: HTTPProxy-is_a-Proxy-example-positive-manual-20260716
      labels:
        zh: HTTP CONNECT 中介
        en: HTTP CONNECT intermediary
        ja: HTTP CONNECT intermediary
      descriptions:
        zh: proxy.example:8443 接收 CONNECT api.example.com:443，以 HTTP 状态回应并建立隧道。
        en: proxy.example:8443 receives CONNECT api.example.com:443, responds with HTTP status, and establishes a tunnel.
        ja: proxy.example:8443 は CONNECT を受け HTTP status で応答し tunnel を確立します。
      field_values: {}
      related_node_ids:
        - HTTPProxy
        - Proxy
      related_relation_ids:
        - HTTPProxy-is_a-Proxy

        en: Assert HTTPProxy is_a Proxy.
        ja: HTTPProxy is_a Proxy を主張します。

        en: The endpoint has proxy intermediary behavior and HTTP-specific differentia.
        ja: endpoint は proxy intermediary behavior/HTTP-specific differentia を持ちます。
      source_claims:
        - claim-http-proxy-001
    - id: HTTPProxy-is_a-Proxy-example-boundary-manual-20260716
      labels:
        zh: SOCKS 回复不属于 HTTP
        en: SOCKS reply is not HTTP
        ja: SOCKS reply は HTTP ではない
      descriptions:
        zh: 代理使用 SOCKS5 方法协商、ATYP 地址和 REP 回复码，没有 HTTP 请求或状态。
        en: The proxy uses SOCKS5 method negotiation, ATYP addressing, and REP reply codes with no HTTP request or status.
        ja: proxy は SOCKS5 negotiation・ATYP・REP code を使い HTTP request/status はありません。
      field_values: {}
      related_node_ids:
        - HTTPProxy
        - Proxy
        - SOCKSProxy
      related_relation_ids:
        - HTTPProxy-is_a-Proxy

        en: Classify only as SOCKSProxy and do not assert HTTPProxy membership.
        ja: SOCKSProxy のみとし HTTPProxy membership を主張しません。

        en: A shared Proxy genus does not erase protocol differentia.
        ja: shared Proxy genus は protocol differentia を消しません。
      source_claims:
        - claim-http-proxy-001
        - claim-http-proxy-002
  source_claims:
    - claim-http-proxy-001
  distinct_fact_rationale:
    zh: HTTPProxy 满足 Proxy 的全部身份条件并增加不可替换的种差。
    en: HTTPProxy satisfies every identity condition of Proxy and adds a non-substitutable differentia.
    ja: HTTPProxy は Proxy の全 identity condition を満たし non-substitutable differentia を追加します。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
