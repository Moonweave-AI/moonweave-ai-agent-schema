schema: moonweave.ai/ontology-node/v1
id: NetworkMessage
kind: concept
status: accepted
labels:
  zh: 网络消息记录
  en: Network Message Record
  ja: ネットワークメッセージ記録
semantics:
  short_definition:
    zh: "保存一次网络协议消息的不可变记录。"
    en: "An immutable record preserving one network-protocol message."
    ja: "一つのネットワークプロトコルメッセージを保存する不変の記録。"
  definition:
    zh: "NetworkMessage 是一次已观察或拟发送的网络协议消息的实体记录，包含消息标识、方向、协议和时间。OutboundRequest 与 InboundResponse 是其特化；它可被 NetworkCall 使用，或在活动构造、发送或观察协议数据后由活动创建为记录，但并不构成 NetworkCall 的生命周期组成部分。它不是连接活动、端点、路由、策略决策或任意日志行。"
    en: "NetworkMessage is an entity record of one observed or intended network-protocol message, containing message identity, direction, protocol, and time. OutboundRequest and InboundResponse specialize it; it can be used by a NetworkCall or created by the activity as a record after it constructs, sends, or observes protocol data, but is not a lifecycle component of NetworkCall. It is not a connection activity, endpoint, route, policy decision, or arbitrary log line."
    ja: "NetworkMessage は、一つの観測済みまたは送信予定のネットワークプロトコルメッセージの実体記録であり、メッセージ ID、方向、プロトコル、時刻を含む。OutboundRequest と InboundResponse はその特化である。NetworkCall に使用されるか、活動がプロトコルデータを構築、送信、観測した後に記録として作成され得るが、NetworkCall のライフサイクル構成要素ではない。接続活動、エンドポイント、経路、ポリシー判断、任意のログ行ではない。"
  why_needed:
    zh: "请求和响应常需在活动结束后继续保留，以支持取证、重放和最小化披露。将它们建模为独立实体能让同一消息被调用、审计和测试引用，同时不错误地宣称消息随活动删除或每个失败都必然创建响应记录。"
    en: "Requests and responses often must remain after an activity ends for forensics, replay, and minimised disclosure. Modeling them as independent entities lets a call, audit, and test reference the same message without falsely claiming that the message is deleted with the activity or that every failure necessarily creates a response record."
    ja: "要求と応答は、フォレンジック、再現、最小限の開示のため、活動終了後も保持する必要があることが多い。独立した実体としてモデル化することで、呼出し、監査、テストが同じメッセージを参照でき、メッセージが活動とともに削除されることや、すべての失敗が必ず応答記録を作成することを誤って主張しない。"
  includes:
    - zh: "协议方向、时间、关联标识以及经过脱敏的消息元数据或正文引用。"
      en: "Protocol direction, time, correlation identity, and redacted message metadata or body reference."
      ja: "プロトコル方向、時刻、相関 ID、マスキング済みメッセージメタデータまたは本文参照。"
    - zh: "请求、响应或协议规定的其他可审计消息形状。"
      en: "Request, response, or another auditable message shape defined by the protocol."
      ja: "要求、応答、またはプロトコルが定義する別の監査可能なメッセージ形状。"
  excludes:
    - zh: "TCP 连接、套接字句柄、完整路由或发送该消息的 NetworkCall 活动。"
      en: "A TCP connection, socket handle, complete route, or the NetworkCall activity that sends it."
      ja: "TCP 接続、ソケットハンドル、完全な経路、またはそれを送る NetworkCall 活動。"
    - zh: "未结构化调试输出或不具备消息边界的字节流片段。"
      en: "Unstructured debug output or a byte-stream fragment lacking message boundaries."
      ja: "構造化されていないデバッグ出力、またはメッセージ境界を持たないバイトストリーム断片。"
  semantic_kind: entity
  aliases: [protocol-message, message-record]
engineering:
  explanation:
    zh: "HTTP 连接管理器会把原始字节转换为 headers、body 和 trailers 等消息事件。记录层应生成稳定消息 ID，保留协议、方向和关联引用，并把正文存为受访问控制的脱敏引用；活动追踪只链接该记录，不负责拥有或复制原始消息。"
    en: "An HTTP connection manager translates raw bytes into message events such as headers, body data, and trailers. A recording layer should create a stable message ID, retain protocol, direction, and correlation reference, and store a body as an access-controlled redacted reference; activity tracing only links the record and does not own or duplicate the original message."
    ja: "HTTP 接続マネージャーは生バイトをヘッダー、本文データ、トレーラーなどのメッセージイベントへ変換する。記録層は安定したメッセージ ID を作り、プロトコル、方向、相関参照を保持し、本文はアクセス制御されたマスキング済み参照として保存すべきである。活動トレーシングは記録をリンクするだけで、原メッセージを所有または複製しない。"
  typical_input:
    - description:
        zh: "HTTP 连接管理器解析出的请求头事件。"
        en: "A request-header event parsed by an HTTP connection manager."
        ja: "HTTP 接続マネージャーが解析した要求ヘッダーイベント。"
      format: |
        {"protocol":"http","direction":"outbound","headers":{"method":"GET","authority":"api.example"},"observed_at":"2026-07-19T06:40:00Z"}
      source_claims: [claim-envoy-http-message-events]
  typical_output:
    - description:
        zh: "包含独立关联标识的消息记录，不内嵌进调用活动。"
        en: "A message record with an independent correlation identity, not embedded into a call activity."
        ja: "呼出し活動に埋め込まれず、独立した相関 ID を持つメッセージ記録。"
      format: |
        {"network_message_id":"msg-801-request","protocol":"http","message_direction":"outbound","correlation_id":"request-801"}
      source_claims: [claim-rfc9110-http-messages]
  reference_implementations:
    - name: Envoy HTTP connection manager
      url: https://www.envoyproxy.io/docs/envoy/latest/intro/arch_overview/http/http_connection_management
      description: Documents translation of raw bytes into HTTP headers, body-data, and trailer message events.
    - name: RFC 9110 HTTP Semantics
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      description: Defines HTTP request and response messages and their independent semantics.
structure:
  identity_keys: [network_message_id]
  fields:
    - id: network_message_id
      labels:
        zh: 网络消息标识
        en: Network message ID
        ja: ネットワークメッセージ ID
      definitions:
        zh: "一条保留网络消息记录的稳定标识。"
        en: "Stable identifier for one retained network-message record."
        ja: "一つの保持されたネットワークメッセージ記録の安定した識別子。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: msg-801-request
      allowed_values: []
      source_claims: [claim-rfc9110-http-messages]
    - id: protocol
      labels:
        zh: 消息协议
        en: Message protocol
        ja: メッセージプロトコル
      definitions:
        zh: "定义消息线格式和语义的协议。"
        en: "Protocol defining the message wire format and semantics."
        ja: "メッセージのワイヤ形式と意味論を定義するプロトコル。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: http
      allowed_values: [http, socks5]
      source_claims: [claim-rfc9110-http-messages]
    - id: message_direction
      labels:
        zh: 消息方向
        en: Message direction
        ja: メッセージ方向
      definitions:
        zh: "相对于受控客户端或代理观察到的消息方向。"
        en: "Message direction observed relative to the controlled client or proxy."
        ja: "制御対象クライアントまたはプロキシから見たメッセージ方向。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: outbound
      allowed_values: [outbound, inbound]
      source_claims: [claim-rfc9110-http-messages]
    - id: correlation_id
      labels:
        zh: 消息关联标识
        en: Message correlation ID
        ja: メッセージ相関 ID
      definitions:
        zh: "用于把请求、响应和相关尝试记录关联起来的可选标识。"
        en: "Optional identifier used to correlate request, response, and related attempt records."
        ja: "要求、応答、関連する試行記録を相関させるための任意の識別子。"
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: request-801
      allowed_values: []
      source_claims: [claim-rfc9110-http-messages]
  constraints:
    - id: network-message-protocol-direction
      severity: error
      expression_language: plain
      expression: "A NetworkMessage must declare one protocol and one message_direction; an OutboundRequest must be outbound and an InboundResponse must be inbound, while a message body is retained only through a redacted or access-controlled reference."
      explanation:
        zh: "方向与协议让消息可被正确解释，同时避免把敏感正文无约束地复制到本体记录中。"
        en: "Direction and protocol make a message interpretable while avoiding unconstrained copying of sensitive bodies into ontology records."
        ja: "方向とプロトコルによりメッセージを正しく解釈でき、同時に機密本文を制約なくオントロジー記録へ複製することを避ける。"
      source_claims: [claim-rfc9110-http-messages]
  required_relations: []
examples:
  - id: network-message-greshake_bing
    labels:
      zh: 网络消息记录 - Greshake Bing Chat 间接注入
      en: Network Message Record - Greshake Bing Chat indirect injection
      ja: ネットワークメッセージ記録 - Greshake Bing Chat 間接注入
    descriptions: {zh: "网络消息记录(NetworkMessage) [NetworkMessage]: 保存一次网络协议消息的不可变记录。. Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。 Fields: protocol, network_message_id, message_direction.", en: "Network Message Record (NetworkMessage) [NetworkMessage]: An immutable record preserving one network-protocol message.. Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page. Fields include protocol, network_message_id, message_direction.", ja: "ネットワークメッセージ記録(NetworkMessage) [NetworkMessage]: 一つのネットワークプロトコルメッセージを保存する不変の記録。. Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。 Fields: protocol, network_message_id, message_direction."}
    field_values:
      correlation_id: request-801
      message_direction: outbound
      network_message_id: msg-801-request
      protocol: http
    related_node_ids:
      - NetworkMessage
    related_relation_ids: []
    example_source: Greshake ACM CCS 2023
    source_claims:
      - claim-rfc9110-http-messages
  - id: network-message-k8s_netpol
    labels:
      zh: 网络消息记录 - Kubernetes NetworkPolicy
      en: Network Message Record - Kubernetes NetworkPolicy
      ja: ネットワークメッセージ記録 - Kubernetes NetworkPolicy
    descriptions: {zh: "网络消息记录(NetworkMessage) [NetworkMessage]: 保存一次网络协议消息的不可变记录。. Kubernetes NetworkPolicy 出站 ipBlock except 169.254.169.254/32 阻断云元数据 SSRF。 Fields: protocol, network_message_id, message_direction.", en: "Network Message Record (NetworkMessage) [NetworkMessage]: An immutable record preserving one network-protocol message.. Kubernetes NetworkPolicy egress with ipBlock except 169.254.169.254/32 blocks cloud metadata SSRF (kubernetes.io/docs/concepts/services-networking/network-policies/). Fields include protocol, network_message_id, message_direction.", ja: "ネットワークメッセージ記録(NetworkMessage) [NetworkMessage]: 一つのネットワークプロトコルメッセージを保存する不変の記録。. Kubernetes NetworkPolicy egress の except 169.254.169.254/32 は cloud metadata SSRF を block する。 Fields: protocol, network_message_id, message_direction."}
    field_values:
      correlation_id: request-801
      message_direction: outbound
      network_message_id: msg-801-request
      protocol: http
    related_node_ids:
      - NetworkMessage
    related_relation_ids: []
    example_source: Kubernetes NetworkPolicy
    source_claims:
      - claim-rfc9110-http-messages
  - id: network-message-envoy_ext_auth
    labels:
      zh: 网络消息记录 - Envoy ext_authz PEP
      en: Network Message Record - Envoy ext_authz PEP
      ja: ネットワークメッセージ記録 - Envoy ext_authz PEP
    descriptions: {zh: "网络消息记录(NetworkMessage) [NetworkMessage]: 保存一次网络协议消息的不可变记录。. Envoy ext_authz 过滤器在上游请求前调用授权服务。 Fields: protocol, network_message_id, message_direction.", en: "Network Message Record (NetworkMessage) [NetworkMessage]: An immutable record preserving one network-protocol message.. Envoy ext_authz filter calls an authorization service before allowing upstream requests (envoyproxy.io ext_authz documentation). Fields include protocol, network_message_id, message_direction.", ja: "ネットワークメッセージ記録(NetworkMessage) [NetworkMessage]: 一つのネットワークプロトコルメッセージを保存する不変の記録。. Envoy ext_authz filter は upstream request 前に authorization service を呼ぶ。 Fields: protocol, network_message_id, message_direction."}
    field_values:
      correlation_id: request-801
      message_direction: outbound
      network_message_id: msg-801-request
      protocol: http
    related_node_ids:
      - NetworkMessage
    related_relation_ids: []
    example_source: Envoy ext_authz
    source_claims:
      - claim-rfc9110-http-messages
  - id: network-message-cve_email_assistant
    labels:
      zh: 网络消息记录 - CVE-2024-5184 邮件助手
      en: Network Message Record - CVE-2024-5184 email assistant
      ja: ネットワークメッセージ記録 - CVE-2024-5184 メール assistant
    descriptions: {zh: "网络消息记录(NetworkMessage) [NetworkMessage]: 保存一次网络协议消息的不可变记录。. OWASP LLM01 场景 #5 引用 CVE-2024-5184：LLM 邮件助手允许注入提示访问敏感邮件内容。 Fields: protocol, network_message_id, message_direction.", en: "Network Message Record (NetworkMessage) [NetworkMessage]: An immutable record preserving one network-protocol message.. OWASP LLM01 Scenario #5 cites CVE-2024-5184: an LLM-powered email assistant allowed injected prompts to access sensitive mail content. Fields include protocol, network_message_id, message_direction.", ja: "ネットワークメッセージ記録(NetworkMessage) [NetworkMessage]: 一つのネットワークプロトコルメッセージを保存する不変の記録。. OWASP LLM01 シナリオ #5 は CVE-2024-5184：LLM email assistant が injected prompt で sensitive mail にアクセスした。 Fields: protocol, network_message_id, message_direction."}
    field_values:
      correlation_id: request-801
      message_direction: outbound
      network_message_id: msg-801-request
      protocol: http
    related_node_ids:
      - NetworkMessage
    related_relation_ids: []
    example_source: CVE-2024-5184
    source_claims:
      - claim-rfc9110-http-messages
parent_relation: null
relations: []
sources:
  - id: rfc9110
    title: RFC 9110 HTTP Semantics
    url: https://www.rfc-editor.org/rfc/rfc9110.html
    source_type: standard
    relevance: "Defines HTTP request and response messages and their semantics across connections."
  - id: envoy-http-connection-manager
    title: Envoy HTTP connection management
    url: https://www.envoyproxy.io/docs/envoy/latest/intro/arch_overview/http/http_connection_management
    source_type: official-open-source-documentation
    relevance: "Documents conversion of raw bytes into HTTP message events and message-level access logging."
  - id: prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: "Defines Entity and Activity provenance directions used to keep message records separate from execution activities."
source_claims:
  - id: claim-rfc9110-http-messages
    source: rfc9110
    supports: "RFC 9110 defines HTTP as a request-response protocol with message semantics independent of a particular connection sequence. Moonweave uses it for the NetworkMessage record boundary."
    locator: "Sections 1 and 3.3"
    evidence_kind: standard
    confidence: high
  - id: claim-envoy-http-message-events
    source: envoy-http-connection-manager
    supports: "Envoy documents an HTTP connection manager that translates raw bytes into headers, body-data, and trailer events and supports message-level access logging."
    locator: "HTTP connection management overview"
    evidence_kind: official-documentation
    confidence: high
  - id: claim-prov-entity-activity
    source: prov-o
    supports: "PROV-O distinguishes Entity from Activity and defines that an Activity uses an Entity while an Entity can be generated by an Activity. Moonweave uses that distinction instead of directory-implied composition."
    locator: "Classes prov:Entity and prov:Activity; properties prov:used and prov:wasGeneratedBy"
    evidence_kind: standard
    confidence: high
