schema: moonweave.ai/ontology-node/v1
id: OutboundRequest
kind: concept
status: accepted
labels:
  zh: 出站请求记录
  en: Outbound Request Record
  ja: 送信要求記録
semantics:
  short_definition:
    zh: "受控客户端计划向网络目标发送的请求消息记录。"
    en: "A request-message record that a controlled client plans to send to a network target."
    ja: "制御対象クライアントがネットワーク宛先へ送ることを計画する要求メッセージ記録。"
  definition:
    zh: "OutboundRequest 是 NetworkMessage 的特化，表示从受控客户端或出口代理向外发送的、具有请求目标和操作语义的协议消息记录。它为 NetworkCall 提供待执行输入，并可关联之后的 InboundResponse；它不是执行活动、已获批准的连接、网络策略，或仅有目的 URI 的文本。"
    en: "OutboundRequest is a specialization of NetworkMessage representing a protocol message sent outward from a controlled client or egress proxy with request-target and operation semantics. It supplies execution input to NetworkCall and can correlate with a later InboundResponse; it is not an execution activity, an already-approved connection, a network policy, or a text containing only a destination URI."
    ja: "OutboundRequest は NetworkMessage の特化であり、制御対象クライアントまたは送信プロキシから外向きに送られ、要求対象と操作意味論を持つプロトコルメッセージを表す。NetworkCall に実行入力を提供し、後の InboundResponse と相関できる。実行活動、既に承認された接続、ネットワークポリシー、宛先 URI だけを含むテキストではない。"
  why_needed:
    zh: "出口规则应审查实际要发送的目标、操作和受控正文引用，而不是从活动名称或提示词中猜测。将请求保留为实体记录使同一请求可被重试调用引用，并能在拒绝前保留审计证据而不制造虚假的远端响应。"
    en: "Egress rules should inspect the actual target, operation, and controlled body reference to be sent rather than infer them from an activity name or prompt. Retaining the request as an entity lets retry calls reference the same request and preserves audit evidence before denial without manufacturing a false remote response."
    ja: "送信規則は、活動名やプロンプトから推測するのではなく、実際に送る対象、操作、制御された本文参照を検査すべきである。要求を実体として保持することで、再試行呼出しが同じ要求を参照でき、拒否前の監査証拠を保持しつつ、偽のリモート応答を作らない。"
  includes:
    - zh: "目标 URI 或协议目标、操作、消息关联标识和脱敏正文引用。"
      en: "Target URI or protocol target, operation, message correlation identity, and redacted body reference."
      ja: "対象 URI またはプロトコル対象、操作、メッセージ相関 ID、マスキング済み本文参照。"
    - zh: "HTTP 请求或作为 SOCKS 协商输入的、具有可验证目标的请求记录。"
      en: "An HTTP request or a request record with a verifiable target used as SOCKS negotiation input."
      ja: "HTTP 要求、または SOCKS ネゴシエーション入力として使う検証可能な対象を持つ要求記録。"
  excludes:
    - zh: "已经发生的连接、请求的远端响应、本地策略结果或一个不含操作的 URL 字符串。"
      en: "A connection that already occurred, the request’s remote response, a local policy result, or a URL string without an operation."
      ja: "既に発生した接続、要求のリモート応答、ローカルポリシー結果、操作を含まない URL 文字列。"
    - zh: "业务资源授权或可复用的 NetworkEndpoint 定义。"
      en: "Business-resource authorization or a reusable NetworkEndpoint definition."
      ja: "業務リソースの認可、または再利用可能な NetworkEndpoint 定義。"
  semantic_kind: entity
  aliases: [egress-request, request-record]
engineering:
  explanation:
    zh: "请求构建器应先解析 HTTP method 与 URI，或解析 SOCKS 目标字段，再生成该记录。安全层只保存经脱敏的 headers/body 引用，随后由 NetworkCall 使用该记录完成策略检查、目标规范化与连接；请求一旦被拒绝，记录仍存在，但没有 InboundResponse。"
    en: "A request builder parses HTTP method and URI or SOCKS target fields before creating this record. The security layer stores only redacted header or body references, then NetworkCall uses the record for policy checking, target normalization, and connection; if the request is denied, the record still exists but has no InboundResponse."
    ja: "要求ビルダーは、この記録を作る前に HTTP メソッドと URI、または SOCKS 対象フィールドを解析する。セキュリティ層はマスキング済みヘッダーまたは本文参照だけを保存し、NetworkCall が記録を使ってポリシー検査、対象正規化、接続を行う。要求が拒否されても記録は存在するが、InboundResponse はない。"
  typical_input:
    - description:
        zh: "在记录层脱敏前由 HTTP 客户端发出的 RFC 9110 POST 请求。"
        en: "An RFC 9110 POST request emitted by an HTTP client before the recording layer redacts it."
        ja: "記録層がマスキングする前に HTTP クライアントが発行する RFC 9110 POST 要求。"
      format: |
        POST /v1/events HTTP/1.1
        Host: api.example
        Content-Type: application/json
        Content-Length: 21

        {"event":"telemetry"}
      source_claims: [claim-rfc9110-request]
  typical_output:
    - description:
        zh: "用于策略与调用关联的出站请求实体。"
        en: "An outbound-request entity for policy and call association."
        ja: "ポリシーと呼出しの関連に使う送信要求実体。"
      format: |
        {"network_message_id":"req-801","protocol":"http","message_direction":"outbound","outbound_request_id":"req-801","request_operation":"POST","request_target_uri":"https://api.example/v1/events","correlation_id":"request-801"}
      source_claims: [claim-rfc9110-request]
  reference_implementations:
    - name: RFC 9110 HTTP Semantics
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      description: Defines client request messages, methods, and request-target semantics.
    - name: Envoy HTTP connection manager
      url: https://www.envoyproxy.io/docs/envoy/latest/intro/arch_overview/http/http_connection_management
      description: Documents parsing HTTP requests into message-level headers and body events.
structure:
  identity_keys: [network_message_id, outbound_request_id]
  fields:
    - id: network_message_id
      labels:
        zh: 继承的网络消息标识
        en: Inherited network message ID
        ja: 継承されたネットワークメッセージ ID
      definitions:
        zh: "此 OutboundRequest 作为 NetworkMessage 的稳定标识；对同一消息记录，它与 outbound_request_id 表示同一实体。"
        en: "Stable identifier for this OutboundRequest as a NetworkMessage; for the same message record it denotes the same entity as outbound_request_id."
        ja: "この OutboundRequest が NetworkMessage として持つ安定した識別子。同じメッセージ記録では outbound_request_id と同じ実体を指す。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: req-801
      allowed_values: []
      source_claims: [claim-rfc9110-request]
    - id: protocol
      labels:
        zh: 继承的消息协议
        en: Inherited message protocol
        ja: 継承されたメッセージプロトコル
      definitions:
        zh: "定义此请求消息线格式和操作语义的协议；HTTP 或 SOCKS5 请求保留相应协议值。"
        en: "Protocol defining this request’s wire format and operation semantics; HTTP and SOCKS5 requests retain their respective values."
        ja: "この要求のワイヤ形式と操作意味論を定義するプロトコル。HTTP と SOCKS5 の要求はそれぞれの値を保持する。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: http
      allowed_values: [http, socks5]
      source_claims: [claim-rfc9110-request, claim-rfc1928-request]
    - id: message_direction
      labels:
        zh: 继承的消息方向
        en: Inherited message direction
        ja: 継承されたメッセージ方向
      definitions:
        zh: "NetworkMessage 的方向；OutboundRequest 必须固定为 outbound。"
        en: "Direction inherited from NetworkMessage; OutboundRequest fixes it to outbound."
        ja: "NetworkMessage から継承する方向。OutboundRequest では outbound に固定される。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: outbound
      allowed_values: [outbound, inbound]
      source_claims: [claim-rfc9110-request]
    - id: outbound_request_id
      labels:
        zh: 出站请求标识
        en: Outbound request ID
        ja: 送信要求 ID
      definitions:
        zh: "一条待发送出站请求记录的稳定标识。"
        en: "Stable identifier for one outbound request record awaiting transmission."
        ja: "送信待ちの一つの送信要求記録の安定した識別子。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: req-801
      allowed_values: []
      source_claims: [claim-rfc9110-request]
    - id: request_operation
      labels:
        zh: 请求操作
        en: Request operation
        ja: 要求操作
      definitions:
        zh: "协议定义的请求操作，例如 HTTP method 或 SOCKS 命令。"
        en: "Protocol-defined request operation, such as an HTTP method or SOCKS command."
        ja: "HTTP メソッドまたは SOCKS コマンドなど、プロトコルが定義する要求操作。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Z_]+$'
      example_value: POST
      allowed_values: []
      source_claims: [claim-rfc9110-request, claim-rfc1928-request]
    - id: request_target_uri
      labels:
        zh: 请求目标 URI
        en: Request target URI
        ja: 要求対象 URI
      definitions:
        zh: "请求试图访问的规范化 URI；对于 SOCKS 可由其目标字段转换而来。"
        en: "Normalized URI that the request attempts to access; for SOCKS it can be derived from destination fields."
        ja: "要求がアクセスを試みる正規化 URI。SOCKS では宛先フィールドから導出できる。"
      datatype: uri
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^([a-z][a-z0-9+.-]*):.+'
      example_value: https://api.example/v1/events
      allowed_values: []
      source_claims: [claim-rfc9110-request]
    - id: body_reference
      labels:
        zh: 脱敏正文引用
        en: Redacted body reference
        ja: マスキング済み本文参照
      definitions:
        zh: "指向受访问控制且已按披露规则处理的请求正文的可选引用。"
        en: "Optional reference to a request body that is access-controlled and processed under disclosure rules."
        ja: "アクセス制御され、開示規則に従って処理された要求本文への任意の参照。"
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: '^redacted:.+$'
      example_value: redacted:payload-801
      allowed_values: []
      source_claims: [claim-rfc9110-request]
  constraints:
    - id: outbound-request-target-and-operation
      severity: error
      expression_language: plain
      expression: "An OutboundRequest must retain one network_message_id, protocol, and message_direction outbound; network_message_id must denote the same record as outbound_request_id. It must also contain one request_operation and one credential-free request_target_uri before a NetworkCall can use it; body_reference, when present, must be redacted and access-controlled."
      explanation:
        zh: "请求必须先保留消息身份、协议和出站方向；出口控制还需要操作与目标，而不只是模糊 URL 或未受控秘密正文。"
        en: "A request must first retain message identity, protocol, and outbound direction; egress control also needs an operation and target, not merely an ambiguous URL or an uncontrolled secret body."
        ja: "要求はまずメッセージ ID、プロトコル、送信方向を保持しなければならない。送信制御には、曖昧な URL や制御されていない秘密本文だけではなく、操作と対象も必要である。"
      source_claims: [claim-rfc9110-request]
  required_relations: []
examples:
  - id: outbound-request-k8s_netpol
    labels:
      zh: 出站请求记录 - Kubernetes NetworkPolicy
      en: Outbound Request Record - Kubernetes NetworkPolicy
      ja: 送信要求記録 - Kubernetes NetworkPolicy
    descriptions: {zh: "出站请求记录(OutboundRequest) [OutboundRequest]: 受控客户端计划向网络目标发送的请求消息记录。. Kubernetes NetworkPolicy 出站 ipBlock except 169.254.169.254/32 阻断云元数据 SSRF。 Fields: message_direction, outbound_request_id, network_message_id.", en: "Outbound Request Record (OutboundRequest) [OutboundRequest]: A request-message record that a controlled client plans to send to a network target.. Kubernetes NetworkPolicy egress with ipBlock except 169.254.169.254/32 blocks cloud metadata SSRF (kubernetes.io/docs/concepts/services-networking/network-policies/). Fields include message_direction, outbound_request_id, network_message_id.", ja: "送信要求記録(OutboundRequest) [OutboundRequest]: 制御対象クライアントがネットワーク宛先へ送ることを計画する要求メッセージ記録。. Kubernetes NetworkPolicy egress の except 169.254.169.254/32 は cloud metadata SSRF を block する。 Fields: message_direction, outbound_request_id, network_message_id."}
    field_values:
      body_reference: "redacted:payload-801"
      message_direction: outbound
      network_message_id: req-801
      outbound_request_id: req-801
      protocol: http
      request_operation: POST
      request_target_uri: "https://api.example/v1/events"
    related_node_ids:
      - OutboundRequest
    related_relation_ids: []
    example_source: Kubernetes NetworkPolicy
    source_claims:
      - claim-rfc9110-request
  - id: outbound-request-envoy_ext_auth
    labels:
      zh: 出站请求记录 - Envoy ext_authz PEP
      en: Outbound Request Record - Envoy ext_authz PEP
      ja: 送信要求記録 - Envoy ext_authz PEP
    descriptions: {zh: "出站请求记录(OutboundRequest) [OutboundRequest]: 受控客户端计划向网络目标发送的请求消息记录。. Envoy ext_authz 过滤器在上游请求前调用授权服务。 Fields: message_direction, outbound_request_id, network_message_id.", en: "Outbound Request Record (OutboundRequest) [OutboundRequest]: A request-message record that a controlled client plans to send to a network target.. Envoy ext_authz filter calls an authorization service before allowing upstream requests (envoyproxy.io ext_authz documentation). Fields include message_direction, outbound_request_id, network_message_id.", ja: "送信要求記録(OutboundRequest) [OutboundRequest]: 制御対象クライアントがネットワーク宛先へ送ることを計画する要求メッセージ記録。. Envoy ext_authz filter は upstream request 前に authorization service を呼ぶ。 Fields: message_direction, outbound_request_id, network_message_id."}
    field_values:
      body_reference: "redacted:payload-801"
      message_direction: outbound
      network_message_id: req-801
      outbound_request_id: req-801
      protocol: http
      request_operation: POST
      request_target_uri: "https://api.example/v1/events"
    related_node_ids:
      - OutboundRequest
    related_relation_ids: []
    example_source: Envoy ext_authz
    source_claims:
      - claim-rfc9110-request
  - id: outbound-request-e2b
    labels:
      zh: 出站请求记录 - E2B 沙箱 VM
      en: Outbound Request Record - E2B sandbox VM
      ja: 送信要求記録 - E2B サンドボックス VM
    descriptions: {zh: "出站请求记录(OutboundRequest) [OutboundRequest]: 受控客户端计划向网络目标发送的请求消息记录。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — 网络隔离、文件系统隔离与资源限制。 Fields: message_direction, outbound_request_id, network_message_id.", en: "Outbound Request Record (OutboundRequest) [OutboundRequest]: A request-message record that a controlled client plans to send to a network target.. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network isolation, filesystem isolation, and resource limits (e2b.dev/docs). Fields include message_direction, outbound_request_id, network_message_id.", ja: "送信要求記録(OutboundRequest) [OutboundRequest]: 制御対象クライアントがネットワーク宛先へ送ることを計画する要求メッセージ記録。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network/filesystem isolation と resource limit。 Fields: message_direction, outbound_request_id, network_message_id."}
    field_values:
      body_reference: "redacted:payload-801"
      message_direction: outbound
      network_message_id: req-801
      outbound_request_id: req-801
      protocol: http
      request_operation: POST
      request_target_uri: "https://api.example/v1/events"
    related_node_ids:
      - OutboundRequest
    related_relation_ids: []
    example_source: E2B Sandbox API
    source_claims:
      - claim-rfc9110-request
  - id: outbound-request-greshake_bing
    labels:
      zh: 出站请求记录 - Greshake Bing Chat 间接注入
      en: Outbound Request Record - Greshake Bing Chat indirect injection
      ja: 送信要求記録 - Greshake Bing Chat 間接注入
    descriptions: {zh: "出站请求记录(OutboundRequest) [OutboundRequest]: 受控客户端计划向网络目标发送的请求消息记录。. Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。 Fields: message_direction, outbound_request_id, network_message_id.", en: "Outbound Request Record (OutboundRequest) [OutboundRequest]: A request-message record that a controlled client plans to send to a network target.. Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page. Fields include message_direction, outbound_request_id, network_message_id.", ja: "送信要求記録(OutboundRequest) [OutboundRequest]: 制御対象クライアントがネットワーク宛先へ送ることを計画する要求メッセージ記録。. Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。 Fields: message_direction, outbound_request_id, network_message_id."}
    field_values:
      body_reference: "redacted:payload-801"
      message_direction: outbound
      network_message_id: req-801
      outbound_request_id: req-801
      protocol: http
      request_operation: POST
      request_target_uri: "https://api.example/v1/events"
    related_node_ids:
      - OutboundRequest
    related_relation_ids: []
    example_source: Greshake ACM CCS 2023
    source_claims:
      - claim-rfc9110-request
parent_relation:
  id: OutboundRequest-is_a-NetworkMessage
  predicate: is_a
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: "OutboundRequest 是带操作和目标语义的出站 NetworkMessage。"
    en: "OutboundRequest is an outbound NetworkMessage with operation and target semantics."
    ja: "OutboundRequest は操作と対象意味論を持つ送信 NetworkMessage である。"
  cardinality:
    source: {min: 0, max: null}
    target: {min: 1, max: 1}
  conditions:
    - id: outbound-request-parent-direction
      severity: error
      expression_language: plain
      expression: "An OutboundRequest must retain NetworkMessage identity, set message_direction to outbound, and declare a request operation and target URI."
      explanation:
        zh: "子类通过方向与操作目标把一般消息收窄为待发送请求。"
        en: "The subtype narrows a general message to a pending request through direction, operation, and target."
        ja: "下位型は方向、操作、対象によって一般メッセージを送信待ち要求へ限定する。"
      source_claims: [claim-rfc9110-request]
  temporal_scope: valid-time
  constraints: []
  source_claims: [claim-rfc9110-request]
relations: []
sources:
  - id: rfc9110
    title: RFC 9110 HTTP Semantics
    url: https://www.rfc-editor.org/rfc/rfc9110.html
    source_type: standard
    relevance: "Defines client request messages, methods, and request-target semantics."
  - id: rfc1928
    title: RFC 1928 SOCKS Protocol Version 5
    url: https://www.rfc-editor.org/rfc/rfc1928.html
    source_type: standard
    relevance: "Defines SOCKS5 command requests with destination address and destination port fields."
source_claims:
  - id: claim-rfc9110-request
    source: rfc9110
    supports: "RFC 9110 defines a client request message with method and request target. Moonweave represents a controlled outbound request as an entity used by a later call activity."
    locator: "Sections 3.3, 5, and 9"
    evidence_kind: standard
    confidence: high
  - id: claim-rfc1928-request
    source: rfc1928
    supports: "RFC 1928 defines SOCKS5 command requests carrying command, destination address type, destination address, and destination port. Moonweave uses this as a protocol-specific request input boundary."
    locator: "Sections 4 and 5"
    evidence_kind: standard
    confidence: high
