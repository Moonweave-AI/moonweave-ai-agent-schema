schema: moonweave.ai/ontology-node/v1
id: NetworkRoute
kind: concept
status: accepted
labels:
  zh: 网络路由记录
  en: network route record
  ja: network route record
semantics:
  short_definition:
    zh: 一次调用实际选择并验证的有序网络跳点路径记录。
    en: The ordered, selected, and verified hop path actually used or attempted by one network call.
    ja: 一 network call が実際に selected/verified した ordered hop path record。
  definition:
    zh: 网络路由记录是一种信息，以路由标识、选择时间、有序跳点、最终端点和路由决定证据为身份，描述某次 NetworkCall 实际使用或尝试使用的路径。它可以是直连或代理路径；它不是静态路由规则、Proxy 端点、DNS 候选集合或抽象网络拓扑。
    en: A NetworkRoute is information identified by route ID, selection time, ordered hops, final endpoint, and route-decision evidence, describing the path actually used or attempted by one NetworkCall. It may be direct or proxied; it is not a static routing rule, Proxy endpoint, DNS candidate set, or abstract network topology.
    ja: NetworkRoute は route ID・selection time・ordered hop・final endpoint・route-decision evidence で識別する information で一 NetworkCall が実際に used/attempted した path を表します。direct/proxied のいずれでもよく static routing rule・Proxy endpoint・DNS candidate set・abstract topology ではありません。
  why_needed:
    zh: 把有效路径从代理实体和路由策略中独立出来，才能审计调用到底经过哪里，而不是只知道配置声称应经过哪里。
    en: Separating effective path from proxy Entity and route policy enables audit of where a call actually went rather than where configuration said it should go.
    ja: effective path を proxy Entity/route policy から分離し config 上の予定でなく call が実際に通った場所を audit できます。
  includes:
    - zh: 直连源站路径、经 HTTP 或 SOCKS 代理的路径，以及包含重定向后最终端点的路径记录。
      en: Direct origin paths, paths through HTTP or SOCKS proxies, and route records containing a post-redirect final endpoint.
      ja: direct origin path・HTTP/SOCKS proxy path・post-redirect final endpoint を含む route record。
  excludes:
    - zh: 代理服务器实体、环境变量、网络策略、DNS 查询本身和未被任何调用选择的候选路径。
      en: Proxy-server Entities, environment variables, network policies, DNS queries themselves, and candidate paths selected by no call.
      ja: proxy server Entity・environment variable・network policy・DNS query・call に selected されない candidate path。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - route_id
    - selected_at
  fields:
    - id: route_id
      labels:
        zh: 路由标识
        en: route ID
        ja: route ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次调用的有效路径记录。
        en: Stable identifier for one call's effective-route record.
        ja: 一 call の effective route record の stable identifier。
      allowed_values: []
      pattern: null
      example_value: route-884
      source_claims:
        - claim-network-route-001
        - claim-network-route-002
    - id: selected_at
      labels:
        zh: 选择时间
        en: selected at
        ja: selected at
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该路径被调用选择或确认的时间。
        en: Records when the call selected or confirmed the path.
        ja: call が path を selected/confirmed した時刻。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T02:31:04Z
      source_claims:
        - claim-network-route-001
    - id: hop_sequence
      labels:
        zh: 跳点序列
        en: hop sequence
        ja: hop sequence
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按实际顺序记录代理、网关或最终端点引用。
        en: Records proxy, gateway, or final endpoint references in actual order.
        ja: proxy・gateway・final endpoint ref を actual order で記録します。
      allowed_values: []
      pattern: null
      example_value:
        - proxy-egress-2
        - endpoint-api-example-443
      source_claims:
        - claim-network-route-001
        - claim-network-route-003
    - id: final_endpoint_ref
      labels:
        zh: 最终端点引用
        en: final-endpoint reference
        ja: final-endpoint reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用连接或转发完成后实际验证的目的端点。
        en: References the destination endpoint actually verified after connection or forwarding.
        ja: connection/forwarding 後に実際に verified された destination endpoint。
      allowed_values: []
      pattern: null
      example_value: endpoint-api-example-443
      source_claims:
        - claim-network-route-001
        - claim-network-route-002
    - id: route_decision_evidence_ref
      labels:
        zh: 路由决定证据引用
        en: route-decision evidence reference
        ja: route-decision evidence reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用代理选择、直连判断、重定向处理和策略检查证据。
        en: References proxy selection, direct-route decision, redirect handling, and policy-check evidence.
        ja: proxy selection・direct route decision・redirect handling・policy check evidence。
      allowed_values: []
      pattern: null
      example_value: route-decision-884
      source_claims:
        - claim-network-route-001
        - claim-network-route-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: network-route-k8s_netpol
    labels:
      zh: 网络路由记录 - Kubernetes NetworkPolicy
      en: network route record - Kubernetes NetworkPolicy
      ja: network route record - Kubernetes NetworkPolicy
    descriptions: {zh: "网络路由记录(NetworkRoute) [NetworkRoute]: 一次调用实际选择并验证的有序网络跳点路径记录。. Kubernetes NetworkPolicy 出站 ipBlock except 169.254.169.254/32 阻断云元数据 SSRF。 Fields: route_id, final_endpoint_ref, selected_at.", en: "network route record (NetworkRoute) [NetworkRoute]: The ordered, selected, and verified hop path actually used or attempted by one network call.. Kubernetes NetworkPolicy egress with ipBlock except 169.254.169.254/32 blocks cloud metadata SSRF (kubernetes.io/docs/concepts/services-networking/network-policies/). Fields include route_id, final_endpoint_ref, selected_at.", ja: "network route record(NetworkRoute) [NetworkRoute]: 一 network call が実際に selected/verified した ordered hop path record。. Kubernetes NetworkPolicy egress の except 169.254.169.254/32 は cloud metadata SSRF を block する。 Fields: route_id, final_endpoint_ref, selected_at."}
    field_values:
      final_endpoint_ref: endpoint-api-example-443
      route_decision_evidence_ref: route-decision-884
      route_id: route-884
      selected_at: "2026-07-16T02:31:04Z"
    related_node_ids:
      - NetworkCall
      - NetworkEndpoint
      - NetworkRoute
      - Proxy
    related_relation_ids:
      - claim-network-route-001
      - claim-network-route-002
      - NetworkCall
      - NetworkCall-routed_by-NetworkRoute
      - NetworkEndpoint
      - NetworkRoute
      - NetworkRoute-targets-NetworkEndpoint
      - Proxy
    example_source: Kubernetes NetworkPolicy
    source_claims:
      - claim-network-route-001
  - id: network-route-envoy_ext_auth
    labels:
      zh: 网络路由记录 - Envoy ext_authz PEP
      en: network route record - Envoy ext_authz PEP
      ja: network route record - Envoy ext_authz PEP
    descriptions: {zh: "网络路由记录(NetworkRoute) [NetworkRoute]: 一次调用实际选择并验证的有序网络跳点路径记录。. Envoy ext_authz 过滤器在上游请求前调用授权服务。 Fields: route_id, final_endpoint_ref, selected_at.", en: "network route record (NetworkRoute) [NetworkRoute]: The ordered, selected, and verified hop path actually used or attempted by one network call.. Envoy ext_authz filter calls an authorization service before allowing upstream requests (envoyproxy.io ext_authz documentation). Fields include route_id, final_endpoint_ref, selected_at.", ja: "network route record(NetworkRoute) [NetworkRoute]: 一 network call が実際に selected/verified した ordered hop path record。. Envoy ext_authz filter は upstream request 前に authorization service を呼ぶ。 Fields: route_id, final_endpoint_ref, selected_at."}
    field_values:
      final_endpoint_ref: endpoint-api-example-443
      route_decision_evidence_ref: route-decision-884
      route_id: route-884
      selected_at: "2026-07-16T02:31:04Z"
    related_node_ids:
      - NetworkCall
      - NetworkEndpoint
      - NetworkRoute
      - Proxy
    related_relation_ids:
      - claim-network-route-001
      - claim-network-route-002
      - NetworkCall
      - NetworkCall-routed_by-NetworkRoute
      - NetworkEndpoint
      - NetworkRoute
      - NetworkRoute-targets-NetworkEndpoint
      - Proxy
    example_source: Envoy ext_authz
    source_claims:
      - claim-network-route-001
  - id: network-route-e2b
    labels:
      zh: 网络路由记录 - E2B 沙箱 VM
      en: network route record - E2B sandbox VM
      ja: network route record - E2B サンドボックス VM
    descriptions: {zh: "网络路由记录(NetworkRoute) [NetworkRoute]: 一次调用实际选择并验证的有序网络跳点路径记录。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — 网络隔离、文件系统隔离与资源限制。 Fields: route_id, final_endpoint_ref, selected_at.", en: "network route record (NetworkRoute) [NetworkRoute]: The ordered, selected, and verified hop path actually used or attempted by one network call.. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network isolation, filesystem isolation, and resource limits (e2b.dev/docs). Fields include route_id, final_endpoint_ref, selected_at.", ja: "network route record(NetworkRoute) [NetworkRoute]: 一 network call が実際に selected/verified した ordered hop path record。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network/filesystem isolation と resource limit。 Fields: route_id, final_endpoint_ref, selected_at."}
    field_values:
      final_endpoint_ref: endpoint-api-example-443
      route_decision_evidence_ref: route-decision-884
      route_id: route-884
      selected_at: "2026-07-16T02:31:04Z"
    related_node_ids:
      - NetworkCall
      - NetworkEndpoint
      - NetworkRoute
      - Proxy
    related_relation_ids:
      - claim-network-route-001
      - claim-network-route-002
      - NetworkCall
      - NetworkCall-routed_by-NetworkRoute
      - NetworkEndpoint
      - NetworkRoute
      - NetworkRoute-targets-NetworkEndpoint
      - Proxy
    example_source: E2B Sandbox API
    source_claims:
      - claim-network-route-001
  - id: network-route-docker_network_none
    labels:
      zh: 网络路由记录 - Docker 网络隔离
      en: network route record - Docker network isolation
      ja: network route record - Docker ネットワーク分離
    descriptions: {zh: "网络路由记录(NetworkRoute) [NetworkRoute]: 一次调用实际选择并验证的有序网络跳点路径记录。. Docker run --network=none 为容器分配 lo 以外的无网络接口，agent 代码无法发起出站 TCP/UDP 连接（docs.docker.com/network/none/）。 Fields: route_id, final_endpoint_ref, selected_at.", en: "network route record (NetworkRoute) [NetworkRoute]: The ordered, selected, and verified hop path actually used or attempted by one network call.. Docker run --network=none gives a container only the loopback interface so agent code cannot make outbound TCP/UDP connections (docs.docker.com/network/none/). Fields include route_id, final_endpoint_ref, selected_at.", ja: "network route record(NetworkRoute) [NetworkRoute]: 一 network call が実際に selected/verified した ordered hop path record。. Docker run --network=none は loopback のみの container を作り outbound TCP/UDP を阻止する。 Fields: route_id, final_endpoint_ref, selected_at."}
    field_values:
      final_endpoint_ref: endpoint-api-example-443
      route_decision_evidence_ref: route-decision-884
      route_id: route-884
      selected_at: "2026-07-16T02:31:04Z"
    related_node_ids:
