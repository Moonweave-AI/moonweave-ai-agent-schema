schema: moonweave.ai/ontology-node/v1
id: NetworkRoute
kind: concept
labels:
  zh: 网络路由记录
  en: network route record
  ja: ネットワークルート記録
semantics:
  short_definition:
    zh: 一次 NetworkCall 实际选择并验证的有序跳点路径记录。
    en: The ordered hop path actually selected and verified by one NetworkCall.
    ja: 一回 NetworkCall が実際に selected/verified した ordered hop path record。
  definition:
    zh: NetworkRoute 是 NetworkCall 内的路径 genus，以 route_id、selected_at、hop_sequence、final_endpoint_ref 与 route_decision_evidence_ref 为身份，记录直连或经 Proxy 的实际有效路径。它映射 HTTP CONNECT 隧道、SOCKS5 relay 与直连 TLS 的 audit 跳点序列；不是静态 PAC 候选、Proxy 实体或 NetworkPolicy 规则。
    en: "NetworkRoute is the route genus within NetworkCall identified by route_id, selected_at, hop_sequence, final_endpoint_ref, and route_decision_evidence_ref, recording the actual effective path whether direct or via Proxy. It maps audit hop sequences for HTTP CONNECT tunnels, SOCKS5 relays, and direct TLS; it is not static PAC candidates, Proxy Entity, or NetworkPolicy rules."
    ja: NetworkRoute は NetworkCall 内 route genus で route_id/selected_at/hop_sequence/final_endpoint_ref/route_decision_evidence_ref を identity とし direct/Proxy 経由 actual effective path を記録。HTTP CONNECT tunnel/SOCKS5 relay/direct TLS audit hop sequence を写像。static PAC candidate/Proxy Entity/NetworkPolicy rule ではない。
  why_needed:
    zh: 有效路径从代理实体与策略配置独立后，才能审计调用实际经过 proxy-egress-2 还是直连，而不是只看配置声称应走哪条路径。
    en: Separating effective path from Proxy Entity and policy configuration audits where a call actually went through proxy-egress-2 versus direct, not merely where configuration claimed it should go.
    ja: effective path を Proxy Entity/policy config から分離後 call が proxy-egress-2 経由か direct か actual audit 可。config 上の予定だけではない。
  includes:
    - zh: 含直连源站路径、HTTP CONNECT/SOCKS relay 代理路径与 redirect 后最终端点。
      en: Includes direct origin paths, HTTP CONNECT or SOCKS relay proxy paths, and post-redirect final endpoints.
      ja: direct origin path/HTTP CONNECT/SOCKS relay proxy path/redirect 後 final endpoint を含む。
  excludes:
    - zh: 不包含 Proxy 服务实体、环境变量、NetworkPolicy 规范、DNS 查询或未被任何 call 选择的 PAC 候选。
      en: Excludes Proxy service Entity, environment variables, NetworkPolicy specification, DNS queries, or PAC candidates not selected by any call.
      ja: Proxy service Entity/environment variable/NetworkPolicy spec/DNS query/call 未選択 PAC candidate は含まない。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成：net-call-884 routed_by route-884；hop_sequence [proxy-egress-2, endpoint-api-example-443]；CONNECT 2xx 后 route_result=established；PAC 返回 proxy-a 但 health check 失败改直连时 hop_sequence 不含 proxy-a。
    en: "Integration: net-call-884 routed_by route-884; hop_sequence [proxy-egress-2, endpoint-api-example-443]; CONNECT 2xx then route_result=established; when PAC returns proxy-a but health check fails to direct connect, hop_sequence excludes proxy-a."
    ja: 統合：net-call-884 routed_by route-884。hop_sequence [proxy-egress-2, endpoint-api-example-443]。CONNECT 2xx 後 route_result=established。PAC proxy-a 返却も health check failure で direct 時 hop_sequence proxy-a 除外。
  typical_input:
    - description: Route selection after proxy CONNECT success.
      format: |
        route_id: route-884
        hop_sequence:
          - proxy-egress-2
          - endpoint-api-example-443
        route_decision_evidence_ref: route-decision-884
      source_claims:
        - claim-network-route-design
  typical_output:
    - description: Route targeting verified final endpoint.
      format: |
        final_endpoint_ref: endpoint-api-example-443
        route_result: established
      source_claims:
        - claim-network-route-design
  reference_implementations:
    - name: RFC 9110 HTTP Semantics
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      description: HTTP proxy intermediaries, CONNECT tunnel, direct versus proxy routing.
    - name: RFC 1928 SOCKS Protocol Version 5
      url: https://www.rfc-editor.org/rfc/rfc1928.html
      description: SOCKS CONNECT relay hop establishment.
structure:
  identity_keys:
    - route_id
    - selected_at
  fields:
    - id: route_id
      labels:
        zh: 路由标识
        en: route ID
        ja: route ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次调用的有效路径记录。
        en: Stable identifier for one call's effective-route record.
        ja: 一 call effective route record の stable identifier。
      allowed_values: []
      pattern: null
      example_value: route-884
      source_claims:
        - claim-network-route-design
    - id: selected_at
      labels:
        zh: 选择时间
        en: selected at
        ja: selected at
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 路径被调用选择或确认的时间。
        en: When the call selected or confirmed the path.
        ja: call が path を selected/confirmed した時刻。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T02:31:04Z
      source_claims:
        - claim-network-route-design
    - id: hop_sequence
      labels:
        zh: 跳点序列
        en: hop sequence
        ja: hop sequence
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按实际顺序记录 Proxy、网关或最终 NetworkEndpoint 引用。
        en: Records Proxy, gateway, or final NetworkEndpoint references in actual order.
        ja: actual order で Proxy/gateway/final NetworkEndpoint ref を記録。
      allowed_values: []
      pattern: null
      example_value:
        - proxy-egress-2
        - endpoint-api-example-443
      source_claims:
        - claim-network-route-rfc9110
    - id: final_endpoint_ref
      labels:
        zh: 最终端点引用
        en: final-endpoint reference
        ja: final-endpoint reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 连接或转发完成后实际验证的目的 NetworkEndpoint。
        en: Destination NetworkEndpoint actually verified after connection or forwarding.
        ja: connection/forwarding 後 actually verified destination NetworkEndpoint。
      allowed_values: []
      pattern: null
      example_value: endpoint-api-example-443
      source_claims:
        - claim-network-route-design
    - id: route_decision_evidence_ref
      labels:
        zh: 路由决定证据引用
        en: route-decision evidence reference
        ja: route-decision evidence reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用代理选择、直连判断、redirect 处理与 policy 检查证据。
        en: References proxy selection, direct-route decision, redirect handling, and policy-check evidence.
        ja: proxy selection/direct route decision/redirect handling/policy check evidence を参照。
      allowed_values: []
      pattern: null
      example_value: route-decision-884
      source_claims:
        - claim-network-route-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: NetworkRoute-proxy-connect
    labels:
      zh: 经出口代理的实际路径
      en: Actual path through egress proxy
      ja: egress proxy 経由 actual path
    descriptions:
      zh: route-884 02:31:04 选择 proxy-egress-2 再 TLS 验证 endpoint-api-example-443；证据含 CONNECT 2xx 与 policy 决定。
      en: route-884 at 02:31:04 selects proxy-egress-2 then TLS-verifies endpoint-api-example-443; evidence includes CONNECT 2xx and policy decision.
      ja: route-884 02:31:04 proxy-egress-2 選択後 endpoint-api-example-443 TLS verify。CONNECT 2xx/policy decision evidence 含む。
    example_source:
      product: RFC 9110
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      version: HTTP CONNECT proxy
    field_values:
      route_id: route-884
      hop_sequence:
        - proxy-egress-2
        - endpoint-api-example-443
    related_node_ids:
      - NetworkRoute
      - NetworkCall
      - NetworkEndpoint
      - ProxyRoute
    related_relation_ids:
      - NetworkRoute-targets-NetworkEndpoint
    source_claims:
      - claim-network-route-rfc9110
  - id: NetworkRoute-pac-candidate-boundary
    labels:
      zh: PAC 候选非有效路由
      en: PAC candidate is not effective route
      ja: PAC candidate は effective route ではない
    descriptions:
      zh: 配置提供 proxy-a/proxy-b 候选但无 call 选择、连接顺序或 final endpoint 证据；不创建 NetworkRoute。
      en: Configuration offers proxy-a and proxy-b but no call selection, connection order, or final endpoint evidence; do not create NetworkRoute.
      ja: config proxy-a/proxy-b 候補提供も call selection/connection order/final endpoint evidence なし。NetworkRoute 作成不可。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: route evidence boundary
    field_values:
      accepted: false
    related_node_ids:
      - NetworkRoute
      - Proxy
    related_relation_ids: []
    source_claims:
      - claim-network-route-design
  - id: NetworkRoute-direct-origin
    labels:
      zh: 直连源站路由
      en: Direct origin route
      ja: direct origin route
    descriptions:
      zh: route-885 hop_sequence 仅 endpoint-api-example-443；无 Proxy 握手；分类为 NetworkRoute 非 ProxyRoute。
      en: route-885 hop_sequence only endpoint-api-example-443; no Proxy handshake; classify as NetworkRoute not ProxyRoute.
      ja: route-885 hop_sequence endpoint-api-example-443 のみ。Proxy handshake なし。NetworkRoute 分類、ProxyRoute ではない。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: direct route
    field_values:
      route_id: route-885
      hop_sequence:
        - endpoint-api-example-443
    related_node_ids:
      - NetworkRoute
      - NetworkEndpoint
    related_relation_ids:
      - NetworkRoute-targets-NetworkEndpoint
    source_claims:
      - claim-network-route-design
  - id: NetworkRoute-proxy-not-final-target
    labels:
      zh: 代理非最终目标
      en: Proxy is not final target
      ja: proxy は final target ではない
    descriptions:
      zh: route-884 连接 proxy-egress-2 仅为 CONNECT 隧道；targets 指向 api.example.com 源站而非 proxy。
      en: route-884 connects to proxy-egress-2 only for CONNECT tunnel; targets points to api.example.com origin not the proxy.
      ja: route-884 proxy-egress-2 connect は CONNECT tunnel のみ。targets api.example.com origin を指し proxy ではない。
    example_source:
      product: RFC 9110
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      version: proxy intermediary
    field_values:
      final_endpoint_ref: endpoint-api-example-443
    related_node_ids:
      - NetworkRoute
      - Proxy
      - NetworkEndpoint
    related_relation_ids:
      - NetworkRoute-targets-NetworkEndpoint
    source_claims:
      - claim-network-route-rfc9110
parent_relation:
  id: NetworkRoute-part_of-NetworkCall
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 属于网络调用路由
    en: part of network call routing
    ja: ネットワーク呼出しルーティングの一部
  definitions:
    zh: NetworkRoute 是 NetworkCall 实际选择并有证据的有效路径组成部分；一次 call 至多一条最终有效路径。
    en: NetworkRoute is the evidenced effective-path component of NetworkCall; one call has at most one final effective route.
    ja: NetworkRoute は NetworkCall actual selected/evidenced effective path 構成部分。一 call 最大一 final effective route。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一次 call 至多一条最终有效路径记录。
    en: One call has at most one final effective-route record.
    ja: 一 call 最大一 final effective route record。
  inverse_reading:
    predicate: contains
    labels:
      zh: 包含网络路由
      en: contains network route
      ja: ネットワークルートを含む
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  source_claims:
    - claim-network-route-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: NetworkRoute-targets-NetworkEndpoint
    predicate: targets
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 以最终端点为目标
      en: targets final route endpoint
      ja: final route endpoint を target
    definitions:
      zh: NetworkRoute targets 有序跳点完成后实际到达并验证的最终 NetworkEndpoint；中间 Proxy 在 hop_sequence 或 ProxyRoute-via-Proxy 表达。
      en: NetworkRoute targets the final NetworkEndpoint actually reached and verified after ordered hops; intermediate Proxy values appear in hop_sequence or ProxyRoute-via-Proxy.
      ja: NetworkRoute は ordered hop 後 actually reached/verified final NetworkEndpoint を targets。intermediate Proxy は hop_sequence/ProxyRoute-via-Proxy で表現。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 每条有效路由指向一个最终验证端点。
      en: Each effective route points to one final verified endpoint.
      ja: 各 effective route は一 final verified endpoint を指す。
    inverse_reading:
      predicate: is_targets_of
      labels:
        zh: 被路由目标
        en: is targets of
        ja: targets 対象
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-network-route-design
    distinct_fact_rationale:
      zh: 路由目标解释路径终点，与 NetworkCall targets 解释调用采用对象可同端点但语义不同。
      en: Route target explains path termination; NetworkCall targets explains call adoption—they may share an endpoint with different semantics.
      ja: route target は path termination 説明。NetworkCall targets は call adoption 説明。同 endpoint でも semantics 異なる。
    layout_role: cross-link
    target: concept:NetworkEndpoint
sources:
  - id: rfc9110-http
    title: RFC 9110 HTTP Semantics
    url: https://www.rfc-editor.org/rfc/rfc9110.html
    source_type: standard
    relevance: HTTP proxy intermediaries, CONNECT tunnels, direct versus proxy routing.
  - id: rfc1928-socks5
    title: RFC 1928 SOCKS Protocol Version 5
    url: https://www.rfc-editor.org/rfc/rfc1928.html
    source_type: standard
    relevance: SOCKS relay hop sequences in proxied routes.
  - id: safety-network-design
    title: Moonweave safety-network-control module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: NetworkRoute as evidenced effective path within NetworkCall.
source_claims:
  - id: claim-network-route-rfc9110
    source: rfc9110-http
    supports: RFC 9110 proxy intermediaries and CONNECT tunnels map to ordered hop_sequence in NetworkRoute.
    locator: HTTP proxy and CONNECT
    evidence_kind: official
    confidence: high
  - id: claim-network-route-socks5
    source: rfc1928-socks5
    supports: RFC 1928 SOCKS CONNECT relay establishment maps to proxied hop sequences in NetworkRoute.
    locator: SOCKS CONNECT
    evidence_kind: official
    confidence: high
  - id: claim-network-route-design
    source: safety-network-design
    supports: Moonweave requires evidenced hop_sequence and final_endpoint_ref separate from static PAC candidates and Proxy Entity.
    locator: NetworkRoute boundary
    evidence_kind: design-inference
    confidence: high
