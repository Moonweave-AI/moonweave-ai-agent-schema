external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: NetworkCall-routed_by-NetworkRoute
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 采用有效路由
    en: routed by effective route
    ja: effective route で routed
  definitions:
    zh: NetworkCall 通过 routed_by 指向其实际选择并有证据的 NetworkRoute，无论直连还是代理路径；计划配置、候选代理和静态策略不建立该边，一次调用至多有一条最终有效路径记录。
    en: NetworkCall points through routed_by to the evidenced NetworkRoute it actually selected, whether direct or proxied. Planned configuration, candidate proxies, and static policy do not establish this edge, and one call has at most one final effective-route record.
    ja: NetworkCall は direct/proxied を問わず actual selected/evidenced NetworkRoute を routed_by で指します。planned config・candidate proxy・static policy は edge を成立させず一 call は最大一 final effective route を持ちます。
  cardinality:
    source:
      min: 1
      max: 1
    target:
      min: 0
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向读取 routed_by
      en: is routed_by of
      ja: routed_by の inverse
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: NetworkCall-routed_by-NetworkRoute-example-positive-manual-20260716
      labels:
        zh: 调用采用代理路径
        en: Call adopts proxy route
        ja: call が proxy route を採用
      descriptions:
        zh: net-call-884 的连接审计引用 route-884，顺序为 proxy-egress-2 后 endpoint-api-example-443，并有 CONNECT 结果。
        en: net-call-884's connection audit references route-884 with proxy-egress-2 followed by endpoint-api-example-443 and a CONNECT result.
        ja: net-call-884 connection audit は route-884 の proxy→endpoint sequence/CONNECT result を参照します。
      field_values: {}
      related_node_ids:
        - NetworkCall
        - NetworkRoute
      related_relation_ids:
        - NetworkCall-routed_by-NetworkRoute

        en: Assert net-call-884 routed_by route-884.
        ja: net-call-884 routed_by route-884 を主張します。

        en: Call and route share selection time, endpoint, and connection evidence.
        ja: call/route は selection time・endpoint・connection evidence を共有します。
      source_claims:
        - claim-network-route-001
        - claim-network-route-002
    - id: NetworkCall-routed_by-NetworkRoute-example-boundary-manual-20260716
      labels:
        zh: 未采用的 PAC 候选
        en: Unused PAC candidate
        ja: 未採用 PAC candidate
      descriptions:
        zh: PAC 返回 proxy-a，但健康检查失败后调用直接连接；proxy-a 从未出现在有效 hop_sequence。
        en: PAC returns proxy-a, but after health-check failure the call connects directly; proxy-a never appears in the effective hop sequence.
        ja: PAC は proxy-a を返しますが health check failure 後 call は direct connect し proxy-a は effective hop sequence にありません。
      field_values: {}
      related_node_ids:
        - NetworkCall
        - NetworkRoute
        - Proxy
      related_relation_ids:
        - NetworkCall-routed_by-NetworkRoute

        en: Link the call to the direct NetworkRoute, not the candidate proxy path.
        ja: call は direct NetworkRoute に link し candidate proxy path にはしません。

        en: Configuration candidacy is not an actual effective route.
        ja: config candidacy は actual effective route ではありません。
      source_claims:
        - claim-network-route-001
  source_claims:
    - claim-network-route-001
    - claim-network-route-002
  distinct_fact_rationale:
    zh: 关系目标提升到 NetworkRoute，使直连和代理路由共享统一事实；ProxyRoute 只作为有代理种差的子类。
    en: Targeting NetworkRoute unifies direct and proxied facts; ProxyRoute remains the subtype with proxy-hop differentia.
    ja: NetworkRoute target により direct/proxied fact を統一し ProxyRoute は proxy-hop differentia subtype とします。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations:
  - id: NetworkRoute-targets-NetworkEndpoint
    predicate: targets
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 以最终端点为目标
      en: targets final route endpoint
      ja: final route endpoint を target
    definitions:
      zh: NetworkRoute targets 其有序跳点完成后实际到达并验证的最终 NetworkEndpoint；中间 Proxy 通过 hop_sequence 或 ProxyRoute-via-Proxy 表达，候选解析地址和重定向前端点不充当最终目标。
      en: NetworkRoute targets the final NetworkEndpoint actually reached and verified after its ordered hops. Intermediate Proxy values belong in hop_sequence or ProxyRoute-via-Proxy, while resolution candidates and pre-redirect endpoints are not the final route target.
      ja: NetworkRoute は ordered hop 後に actually reached/verified された final NetworkEndpoint を targets します。intermediate Proxy は hop_sequence/via で表し resolution candidate/pre-redirect endpoint は final target ではありません。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: 1
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_targets_of
      labels:
        zh: 反向读取 targets
        en: is targets of
        ja: targets の inverse
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: NetworkRoute-targets-NetworkEndpoint-example-positive-manual-20260716
        labels:
          zh: 代理后最终源站
          en: Final origin after proxy
          ja: proxy 後 final origin
        descriptions:
          zh: route-884 先经过 proxy-egress-2，随后 TLS 验证 endpoint-api-example-443，final_endpoint_ref 与该端点一致。
          en: route-884 first traverses proxy-egress-2 and then TLS-verifies endpoint-api-example-443, matching its final_endpoint_ref.
          ja: route-884 は proxy-egress-2 後 endpoint-api-example-443 を TLS verify し final_endpoint_ref と一致します。
        field_values: {}
        related_node_ids:
          - NetworkRoute
          - NetworkEndpoint
        related_relation_ids:
          - NetworkRoute-targets-NetworkEndpoint

          en: Assert route-884 targets endpoint-api-example-443.
          ja: route-884 targets endpoint-api-example-443 を主張します。

          en: Final hop and verification evidence jointly establish the route target.
          ja: final hop/verification evidence が route target を確立します。
        source_claims:
          - claim-network-route-001
          - claim-network-route-002
      - id: NetworkRoute-targets-NetworkEndpoint-example-boundary-manual-20260716
        labels:
          zh: 代理不是最终目标
          en: Proxy is not final target
          ja: proxy は final target ではない
        descriptions:
          zh: route-884 连接 proxy-egress-2 只是为 CONNECT 隧道，业务请求最终 authority 与 TLS 身份是 api.example.com。
          en: route-884 connects to proxy-egress-2 only for a CONNECT tunnel; the business request's final authority and TLS identity are api.example.com.
          ja: route-884 は CONNECT tunnel のため proxy に connect しますが business request final authority/TLS identity は api.example.com です。
        field_values: {}
        related_node_ids:
          - NetworkRoute
          - Proxy
          - NetworkEndpoint
        related_relation_ids:
          - NetworkRoute-targets-NetworkEndpoint

          en: Record Proxy as an intermediate hop and targets the origin endpoint.
          ja: Proxy は intermediate hop とし targets は origin endpoint を指します。

          en: The first connected intermediary is not necessarily the final target of communication intent.
          ja: first connected intermediary は communication intent final target とは限りません。
        source_claims:
          - claim-network-route-001
    source_claims:
      - claim-network-route-001
      - claim-network-route-002
    distinct_fact_rationale:
      zh: 路由目标与调用目标可指向同一端点，但前者解释路径终点，后者解释调用采用对象。
      en: Route target and call target may share an endpoint but explain path termination and call adoption respectively.
      ja: route target/call target は同 endpoint でも path termination/call adoption を別々に説明します。
    layout_role: cross-link
    review_status: accepted
    target: concept:NetworkEndpoint
