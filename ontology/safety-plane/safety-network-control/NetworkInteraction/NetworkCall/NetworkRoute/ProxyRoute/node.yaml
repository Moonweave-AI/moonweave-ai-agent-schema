schema: moonweave.ai/ontology-node/v1
id: ProxyRoute
kind: concept
status: accepted
labels:
  zh: 代理路由记录
  en: proxy route record
  ja: proxy route record
semantics:
  short_definition:
    zh: 至少经过一个已验证代理端点的有效网络路由记录。
    en: An effective network-route record traversing at least one verified proxy endpoint.
    ja: 少なくとも一 verified proxy endpoint を通る effective network route record。
  definition:
    zh: 代理路由记录是一种 NetworkRoute，其种差是 hop_sequence 至少包含一个通过 via 关系引用的 Proxy，并记录代理端点、目标端点、转发或隧道模式、实际协商认证和路由结果。它是一次调用的有效路径，不是 Proxy 实体或静态 proxy URL。
    en: A ProxyRoute is a NetworkRoute distinguished by a hop_sequence containing at least one Proxy referenced through via, plus proxy endpoint, target endpoint, forwarding or tunnel mode, negotiated authentication, and route result. It is one call's effective path, not the Proxy Entity or a static proxy URL.
    ja: ProxyRoute は hop_sequence に via で参照する少なくとも一 Proxy を含み proxy endpoint・target endpoint・forward/tunnel mode・negotiated auth・route result を記録する NetworkRoute です。一 call の effective path で Proxy Entity/static proxy URL ではありません。
  why_needed:
    zh: 把代理作为路径种差后，直连路由和代理路由可共享统一上位模型，同时保留代理协商与失败证据。
    en: Making proxy traversal the differentia lets direct and proxied routes share one route model while retaining negotiation and failure evidence.
    ja: proxy traversal を differentia とし direct/proxied route が一 route model を共有し negotiation/failure evidence を保ちます。
  includes:
    - zh: HTTP 转发路径、CONNECT 隧道路由、SOCKS CONNECT/BIND/UDP 路径和多代理链。
      en: HTTP forwarding paths, CONNECT tunnel routes, SOCKS CONNECT/BIND/UDP paths, and multi-proxy chains.
      ja: HTTP forwarding path・CONNECT tunnel route・SOCKS CONNECT/BIND/UDP path・multi-proxy chain。
  excludes:
    - zh: 直连路由、代理服务本身、代理配置字符串和未被调用采用的 PAC 结果。
      en: Direct routes, proxy services themselves, proxy configuration strings, and PAC results not adopted by a call.
      ja: direct route・proxy service・proxy config string・call 未採用の PAC result。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - proxy_endpoint_ref
    - target_endpoint_ref
  fields:
    - id: proxy_endpoint_ref
      labels:
        zh: 代理端点引用
        en: proxy-endpoint reference
        ja: proxy-endpoint reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用调用实际首先连接或经过的 Proxy。
        en: References the Proxy actually reached first or traversed by the call.
        ja: call が実際に first reached/traversed した Proxy。
      allowed_values: []
      pattern: null
      example_value: proxy-egress-2
      source_claims:
        - claim-proxy-route-001
        - claim-proxy-route-002
    - id: target_endpoint_ref
      labels:
        zh: 目标端点引用
        en: target-endpoint reference
        ja: target-endpoint reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用代理被要求连接或转发到的验证目标端点。
        en: References the verified target endpoint the proxy was asked to connect or forward to.
        ja: proxy が connect/forward を要求された verified target endpoint。
      allowed_values: []
      pattern: null
      example_value: endpoint-api-example-443
      source_claims:
        - claim-proxy-route-001
        - claim-proxy-route-002
    - id: tunnel_or_forward_mode
      labels:
        zh: 隧道或转发模式
        en: tunnel or forward mode
        ja: tunnel or forward mode
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录本次路由使用的转发、CONNECT 隧道、SOCKS relay 或 UDP 关联模式。
        en: Records forwarding, CONNECT tunnel, SOCKS relay, or UDP association mode used by this route.
        ja: route が使用した forwarding・CONNECT tunnel・SOCKS relay・UDP association mode。
      allowed_values: []
      pattern: null
      example_value: connect-tunnel
      source_claims:
        - claim-proxy-route-001
        - claim-proxy-route-002
    - id: negotiated_authentication
      labels:
        zh: 已协商认证
        en: negotiated authentication
        ja: negotiated authentication
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录该次代理会话实际选择的认证方法和结果。
        en: Records the authentication method and result actually selected for this proxy session.
        ja: proxy session で実際に selected された authentication method/result。
      allowed_values: []
      pattern: null
      example_value: mutual-tls
      source_claims:
        - claim-proxy-route-002
        - claim-proxy-route-003
    - id: route_result
      labels:
        zh: 路由结果
        en: route result
        ja: route result
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录代理路径建立、拒绝或失败及其协议级证据。
        en: Records establishment, denial, or failure of the proxy route with protocol-level evidence.
        ja: proxy route の establishment・denial・failure と protocol-level evidence。
      allowed_values: []
      pattern: null
      example_value: established
      source_claims:
        - claim-proxy-route-001
        - claim-proxy-route-002
  constraints: []
  required_relation_constraints: []
