    source_claims:
      - claim-proxy-route-001
  - id: proxy-route-k8s_netpol
    labels:
      zh: 代理路由记录 - Kubernetes NetworkPolicy
      en: proxy route record - Kubernetes NetworkPolicy
      ja: proxy route record - Kubernetes NetworkPolicy
    descriptions: {zh: "代理路由记录(ProxyRoute) [ProxyRoute]: 至少经过一个已验证代理端点的有效网络路由记录。. Kubernetes NetworkPolicy 出站 ipBlock except 169.254.169.254/32 阻断云元数据 SSRF。 Fields: proxy_endpoint_ref, tunnel_or_forward_mode, route_result.", en: "proxy route record (ProxyRoute) [ProxyRoute]: An effective network-route record traversing at least one verified proxy endpoint.. Kubernetes NetworkPolicy egress with ipBlock except 169.254.169.254/32 blocks cloud metadata SSRF (kubernetes.io/docs/concepts/services-networking/network-policies/). Fields include proxy_endpoint_ref, tunnel_or_forward_mode, route_result.", ja: "proxy route record(ProxyRoute) [ProxyRoute]: 少なくとも一 verified proxy endpoint を通る effective network route record。. Kubernetes NetworkPolicy egress の except 169.254.169.254/32 は cloud metadata SSRF を block する。 Fields: proxy_endpoint_ref, tunnel_or_forward_mode, route_result."}
    field_values:
      negotiated_authentication: mutual-tls
      proxy_endpoint_ref: proxy-egress-2
      route_result: established
      target_endpoint_ref: endpoint-api-example-443
      tunnel_or_forward_mode: connect-tunnel
    related_node_ids:
      - NetworkEndpoint
      - NetworkRoute
      - Proxy
      - ProxyRoute
    related_relation_ids:
      - claim-proxy-route-001
      - claim-proxy-route-003
      - NetworkEndpoint
      - NetworkRoute
      - NetworkRoute-targets-NetworkEndpoint
      - Proxy
      - ProxyRoute
      - ProxyRoute-is_a-NetworkRoute
      - ProxyRoute-via-Proxy
    example_source: Kubernetes NetworkPolicy
    source_claims:
      - claim-proxy-route-001
  - id: proxy-route-e2b
    labels:
      zh: 代理路由记录 - E2B 沙箱 VM
      en: proxy route record - E2B sandbox VM
      ja: proxy route record - E2B サンドボックス VM
    descriptions: {zh: "代理路由记录(ProxyRoute) [ProxyRoute]: 至少经过一个已验证代理端点的有效网络路由记录。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — 网络隔离、文件系统隔离与资源限制。 Fields: proxy_endpoint_ref, tunnel_or_forward_mode, route_result.", en: "proxy route record (ProxyRoute) [ProxyRoute]: An effective network-route record traversing at least one verified proxy endpoint.. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network isolation, filesystem isolation, and resource limits (e2b.dev/docs). Fields include proxy_endpoint_ref, tunnel_or_forward_mode, route_result.", ja: "proxy route record(ProxyRoute) [ProxyRoute]: 少なくとも一 verified proxy endpoint を通る effective network route record。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network/filesystem isolation と resource limit。 Fields: proxy_endpoint_ref, tunnel_or_forward_mode, route_result."}
    field_values:
