schema: moonweave.ai/ontology-node/v1
id: ProxyRoute
kind: concept
labels:
  zh: 代理路由记录
  en: proxy route record
  ja: プロキシルート記録
semantics:
  short_definition:
    zh: hop_sequence 至少经过一个已验证 Proxy 的 NetworkRoute 特化。
    en: A NetworkRoute specialization whose hop_sequence traverses at least one verified Proxy.
    ja: hop_sequence が少なくとも一 verified Proxy を通る NetworkRoute 特化。
  definition:
    zh: ProxyRoute 是 NetworkRoute 的代理特化，种差是 hop_sequence 至少包含一个通过 via 引用的 Proxy，并记录 proxy_endpoint_ref、target_endpoint_ref、tunnel_or_forward_mode、negotiated_authentication 与 route_result。它映射 HTTP CONNECT 隧道与 SOCKS5 CONNECT/BIND/UDP relay 的实际代理路径；不是 Proxy 实体或静态 proxy URL。
    en: "ProxyRoute is the proxy specialization of NetworkRoute distinguished by hop_sequence containing at least one Proxy referenced via via, plus proxy_endpoint_ref, target_endpoint_ref, tunnel_or_forward_mode, negotiated_authentication, and route_result. It maps actual proxy paths for HTTP CONNECT tunnels and SOCKS5 CONNECT, BIND, or UDP relays; it is not the Proxy Entity or a static proxy URL."
    ja: ProxyRoute は NetworkRoute proxy 特化で hop_sequence に via 参照 Proxy 少なくとも一含み proxy_endpoint_ref/target_endpoint_ref/tunnel_or_forward_mode/negotiated_authentication/route_result を種差とする。HTTP CONNECT tunnel/SOCKS5 CONNECT/BIND/UDP relay actual proxy path を写像。Proxy Entity/static proxy URL ではない。
  why_needed:
    zh: 代理作为路径种差后，直连与代理路由共享 NetworkRoute 模型，同时保留 CONNECT 协商、SOCKS 认证与失败证据。
    en: Proxy traversal as differentia lets direct and proxied routes share the NetworkRoute model while retaining CONNECT negotiation, SOCKS authentication, and failure evidence.
    ja: proxy traversal を種差とし direct/proxied route が NetworkRoute model 共有し CONNECT negotiation/SOCKS auth/failure evidence 保持。
  includes:
    - zh: 含 HTTP CONNECT 隧道路由、SOCKS5 relay 路径与多代理链 hop_sequence。
      en: Includes HTTP CONNECT tunnel routes, SOCKS5 relay paths, and multi-proxy hop_sequence chains.
      ja: HTTP CONNECT tunnel route/SOCKS5 relay path/multi-proxy hop_sequence chain を含む。
  excludes:
    - zh: 不包含直连 NetworkRoute、Proxy 服务实体、PAC 未采用结果或仅配置中的 proxy URL。
      en: Excludes direct NetworkRoute, Proxy service Entity, unadopted PAC results, or proxy URLs in configuration only.
      ja: direct NetworkRoute/Proxy service Entity/未採用 PAC result/config のみ proxy URL は含まない。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成：route-884 ProxyRoute via proxy-egress-2；CONNECT api.example.com:443 tunnel_or_forward_mode=connect-tunnel；SOCKS5 proxy-socks-1 CONNECT endpoint-api-example-443 route_result=established；PAC proxy-a health check 失败时 via 仅 proxy-b。
    en: "Integration: route-884 ProxyRoute via proxy-egress-2; CONNECT api.example.com:443 tunnel_or_forward_mode=connect-tunnel; SOCKS5 proxy-socks-1 CONNECT endpoint-api-example-443 route_result=established; when PAC proxy-a health check fails, via only proxy-b."
    ja: 統合：route-884 ProxyRoute via proxy-egress-2。CONNECT api.example.com:443 tunnel_or_forward_mode=connect-tunnel。SOCKS5 proxy-socks-1 CONNECT endpoint-api-example-443 route_result=established。PAC proxy-a health check failure 時 via proxy-b のみ。
  typical_input:
    - description: HTTP CONNECT proxy route establishment.
      format: |
        proxy_endpoint_ref: proxy-egress-2
        target_endpoint_ref: endpoint-api-example-443
        tunnel_or_forward_mode: connect-tunnel
        route_result: established
      source_claims:
        - claim-proxy-route-rfc9110
  typical_output:
    - description: ProxyRoute via relation to Proxy Entity.
      format: |
        route_id: route-884
        via: proxy-egress-2
        negotiated_authentication: mutual-tls
      source_claims:
        - claim-proxy-route-design
  reference_implementations:
    - name: RFC 9110 HTTP Semantics
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      description: HTTP CONNECT tunnel proxy routing.
    - name: RFC 1928 SOCKS Protocol Version 5
      url: https://www.rfc-editor.org/rfc/rfc1928.html
      description: SOCKS5 CONNECT, BIND, UDP ASSOCIATE relay modes.
structure:
  identity_keys:
    - proxy_endpoint_ref
    - target_endpoint_ref
  fields:
    - id: proxy_endpoint_ref
      labels:
        zh: 代理端点引用
        en: proxy-endpoint reference
        ja: proxy-endpoint reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 调用实际首先连接或经过的 Proxy 引用。
        en: Reference to the Proxy actually reached first or traversed by the call.
        ja: call が first reached/traversed した Proxy reference。
      allowed_values: []
      pattern: null
      example_value: proxy-egress-2
      source_claims:
        - claim-proxy-route-design
    - id: target_endpoint_ref
      labels:
        zh: 目标端点引用
        en: target-endpoint reference
        ja: target-endpoint reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 代理被要求连接或转发到的验证目标 NetworkEndpoint。
        en: Verified target NetworkEndpoint the proxy was asked to connect or forward to.
        ja: proxy が connect/forward 要求された verified target NetworkEndpoint。
      allowed_values: []
      pattern: null
      example_value: endpoint-api-example-443
      source_claims:
        - claim-proxy-route-design
    - id: tunnel_or_forward_mode
      labels:
        zh: 隧道或转发模式
        en: tunnel or forward mode
        ja: tunnel or forward mode
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: forwarding、CONNECT 隧道、SOCKS relay 或 UDP 关联模式。
        en: Forwarding, CONNECT tunnel, SOCKS relay, or UDP association mode.
        ja: forwarding/CONNECT tunnel/SOCKS relay/UDP association mode。
      allowed_values: []
      pattern: null
      example_value: connect-tunnel
      source_claims:
        - claim-proxy-route-rfc9110
    - id: negotiated_authentication
      labels:
        zh: 已协商认证
        en: negotiated authentication
        ja: negotiated authentication
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 该次代理会话实际选择的认证方法与结果。
        en: Authentication method and result actually selected for this proxy session.
        ja: 本 proxy session で actually selected authentication method/result。
      allowed_values: []
      pattern: null
      example_value: mutual-tls
      source_claims:
        - claim-proxy-route-socks5
    - id: route_result
      labels:
        zh: 路由结果
        en: route result
        ja: route result
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 代理路径建立、拒绝或失败及其协议级证据。
        en: Establishment, denial, or failure of the proxy route with protocol-level evidence.
        ja: proxy route establishment/denial/failure と protocol-level evidence。
      allowed_values: []
      pattern: null
      example_value: established
      source_claims:
        - claim-proxy-route-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: ProxyRoute-http-connect
    labels:
      zh: HTTP CONNECT 代理路由
      en: HTTP CONNECT proxy route
      ja: HTTP CONNECT proxy route
    descriptions:
      zh: route-884 经 proxy-egress-2 CONNECT endpoint-api-example-443；协商 mTLS；2xx 后 route_result=established。
      en: route-884 sends CONNECT through proxy-egress-2 to endpoint-api-example-443; negotiates mTLS; route_result=established after 2xx.
      ja: route-884 proxy-egress-2 経由 CONNECT endpoint-api-example-443。mTLS negotiate。2xx 後 route_result=established。
    example_source:
      product: RFC 9110
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      version: HTTP CONNECT
    field_values:
      route_id: route-884
      proxy_endpoint_ref: proxy-egress-2
      tunnel_or_forward_mode: connect-tunnel
      route_result: established
    related_node_ids:
      - ProxyRoute
      - NetworkRoute
      - Proxy
    related_relation_ids:
      - ProxyRoute-via-Proxy
    source_claims:
      - claim-proxy-route-rfc9110
  - id: ProxyRoute-socks5-relay
    labels:
      zh: SOCKS5 relay 代理路由
      en: SOCKS5 relay proxy route
      ja: SOCKS5 relay proxy route
    descriptions:
      zh: proxy-socks-1 SOCKS5 CONNECT endpoint-api-example-443；negotiated_authentication=userpass；route_result=established。
      en: proxy-socks-1 SOCKS5 CONNECT endpoint-api-example-443; negotiated_authentication=userpass; route_result=established.
      ja: proxy-socks-1 SOCKS5 CONNECT endpoint-api-example-443。negotiated_authentication=userpass。route_result=established。
    example_source:
      product: RFC 1928
      url: https://www.rfc-editor.org/rfc/rfc1928.html
      version: SOCKS5 CONNECT
    field_values:
      proxy_endpoint_ref: proxy-socks-1
      tunnel_or_forward_mode: socks-connect
      route_result: established
    related_node_ids:
      - ProxyRoute
      - SOCKSProxy
    related_relation_ids:
      - ProxyRoute-via-Proxy
    source_claims:
      - claim-proxy-route-socks5
  - id: ProxyRoute-direct-boundary
    labels:
      zh: 直连路由非代理路由
      en: Direct route is not proxy route
      ja: direct route は proxy route ではない
    descriptions:
      zh: route-885 hop_sequence 仅最终端点；无 Proxy 握手或 via；分类 NetworkRoute 非 ProxyRoute。
      en: route-885 hop_sequence only final endpoint; no Proxy handshake or via; classify NetworkRoute not ProxyRoute.
      ja: route-885 hop_sequence final endpoint のみ。Proxy handshake/via なし。NetworkRoute 分類、ProxyRoute ではない。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: ProxyRoute differentia
    field_values:
      accepted: false
    related_node_ids:
      - ProxyRoute
      - NetworkRoute
    related_relation_ids: []
    source_claims:
      - claim-proxy-route-design
  - id: ProxyRoute-failed-candidate
    labels:
      zh: 健康检查失败候选代理
      en: Candidate proxy failing health check
      ja: health check failure candidate proxy
    descriptions:
      zh: PAC 选 proxy-a 但 health check 失败改 proxy-b；via 仅 proxy-b；proxy-a 保留为失败候选证据。
      en: PAC selects proxy-a but health check fails to proxy-b; via only proxy-b; proxy-a retained as failed-candidate evidence.
      ja: PAC proxy-a 選択も health check failure で proxy-b へ。via proxy-b のみ。proxy-a failed candidate evidence 保持。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: via evidence boundary
    field_values:
      via_proxy: proxy-b
      failed_candidate: proxy-a
    related_node_ids:
      - ProxyRoute
      - Proxy
    related_relation_ids:
      - ProxyRoute-via-Proxy
    source_claims:
      - claim-proxy-route-design
parent_relation:
  id: ProxyRoute-is_a-NetworkRoute
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种网络路由记录
    en: is a network route record
    ja: ネットワークルート記録の一種
  definitions:
    zh: 每个 ProxyRoute 都是 NetworkRoute，种差是至少一个 Proxy 跳点与代理会话证据。
    en: Every ProxyRoute is a NetworkRoute distinguished by at least one Proxy hop and proxy session evidence.
    ja: すべて ProxyRoute は NetworkRoute で少なくとも一 Proxy hop/proxy session evidence が種差。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-proxy-route-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: ProxyRoute-via-Proxy
    predicate: via
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 经过代理端点
      en: via proxy endpoint
      ja: proxy endpoint 経由
    definitions:
      zh: ProxyRoute via 指向实际经过且有连接或协商证据的 Proxy；静态配置或未连接候选不建立此边；多代理链按 hop_sequence 顺序分别关联。
      en: ProxyRoute via points to a Proxy actually traversed with connection or negotiation evidence; static configuration or unreached candidates do not establish this edge; multi-proxy chains associate each hop in hop_sequence order.
      ja: ProxyRoute via は actual traversal/connection/negotiation evidence ある Proxy を指す。static config/未接続 candidate は edge 不可。multi-proxy chain hop_sequence order で各 hop associate。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一条代理路由可经一个或多个 Proxy 跳点。
      en: One proxy route may traverse one or more Proxy hops.
      ja: 一 proxy route は一以上 Proxy hop 可。
    inverse_reading:
      predicate: is_via_of
      labels:
        zh: 被路由经过
        en: is via of
        ja: via 対象
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-proxy-route-design
    distinct_fact_rationale:
      zh: via 连接路径记录与 Proxy 实体，避免把 ProxyRoute 误分类为 Proxy。
      en: via links route record to Proxy Entity and prevents misclassifying ProxyRoute as Proxy.
      ja: via は route record/Proxy Entity を結び ProxyRoute を Proxy と誤分類防止。
    layout_role: cross-link
    target: concept:Proxy
sources:
  - id: rfc9110-http
    title: RFC 9110 HTTP Semantics
    url: https://www.rfc-editor.org/rfc/rfc9110.html
    source_type: standard
    relevance: HTTP CONNECT tunnel proxy routing and authentication.
  - id: rfc1928-socks5
    title: RFC 1928 SOCKS Protocol Version 5
    url: https://www.rfc-editor.org/rfc/rfc1928.html
    source_type: standard
    relevance: SOCKS5 CONNECT, BIND, UDP relay and authentication negotiation.
  - id: safety-network-design
    title: Moonweave safety-network-control module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: ProxyRoute as NetworkRoute subtype with via-Proxy evidence.
source_claims:
  - id: claim-proxy-route-rfc9110
    source: rfc9110-http
    supports: RFC 9110 HTTP CONNECT tunnels map to ProxyRoute with connect-tunnel mode and via Proxy hop.
    locator: HTTP CONNECT
    evidence_kind: official
    confidence: high
  - id: claim-proxy-route-socks5
    source: rfc1928-socks5
    supports: RFC 1928 SOCKS5 CONNECT relay maps to ProxyRoute with socks-connect mode and negotiated authentication.
    locator: SOCKS CONNECT
    evidence_kind: official
    confidence: high
  - id: claim-proxy-route-design
    source: safety-network-design
    supports: Moonweave requires via-Proxy evidence separate from static PAC candidates and distinguishes ProxyRoute from direct NetworkRoute.
    locator: ProxyRoute boundary
    evidence_kind: design-inference
    confidence: high
