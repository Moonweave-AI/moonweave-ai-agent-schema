relations:
  - id: ProxyRoute-via-Proxy
    predicate: via
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 经过代理端点
      en: via proxy endpoint
      ja: proxy endpoint 経由
    definitions:
      zh: ProxyRoute 通过 via 指向其实际经过且有连接或协商证据的 Proxy；静态代理配置、失败前未连接候选和仅出现在策略中的代理不建立此边，多代理链按 hop_sequence 顺序分别关联。
      en: ProxyRoute points through via to a Proxy it actually traversed with connection or negotiation evidence. Static proxy configuration, candidates never reached before failure, and proxies appearing only in policy do not establish this edge; multi-proxy chains associate each hop in hop_sequence order.
      ja: ProxyRoute は actual traversal と connection/negotiation evidence がある Proxy を via で指します。static config・未接続 candidate・policy のみの proxy は edge を作らず multi-proxy chain は hop_sequence order で各 hop を関連付けます。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_via_of
      labels:
        zh: 反向读取 via
        en: is via of
        ja: via の inverse
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: ProxyRoute-via-Proxy-example-positive-manual-20260716
        kind: positive
        labels:
          zh: CONNECT 经过企业代理
          en: CONNECT traverses enterprise proxy
          ja: CONNECT が enterprise proxy を traversal
        scenario_id: network-relation-proxyroute-via-proxy-positive
        descriptions:
          zh: route-884 的 socket/TLS 审计先连接 proxy-egress-2，发送 CONNECT 并收到 2xx，再建立到源站的隧道。
          en: route-884's socket and TLS audit first connects to proxy-egress-2, sends CONNECT, receives 2xx, and then establishes the origin tunnel.
          ja: route-884 audit は proxy-egress-2 に first connect、CONNECT/2xx 後 origin tunnel を確立します。
        field_values: {}
        related_node_ids:
          - ProxyRoute
          - Proxy
        related_relation_ids:
          - ProxyRoute-via-Proxy
        expected_result:
          zh: 建立 route-884 via proxy-egress-2。
          en: Assert route-884 via proxy-egress-2.
          ja: route-884 via proxy-egress-2 を主張します。
        why_valid_or_invalid:
          zh: 实际连接与协议协商证明代理跳点被采用。
          en: Actual connection and protocol negotiation prove that the proxy hop was adopted.
          ja: actual connection/protocol negotiation が proxy hop adoption を証明します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-proxy-route-001
          - claim-proxy-route-003
      - id: ProxyRoute-via-Proxy-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 健康检查失败的候选代理
          en: Candidate proxy failing health check
          ja: health check failure candidate proxy
        scenario_id: network-relation-proxyroute-via-proxy-boundary
        descriptions:
          zh: PAC 选择 proxy-a，但在建立任何代理会话前健康检查失败，调用改用 proxy-b；有效路由只包含 proxy-b。
          en: PAC selects proxy-a, but its health check fails before any proxy session and the call switches to proxy-b; the effective route contains only proxy-b.
          ja: PAC は proxy-a を選びますが session 前 health check failure、call は proxy-b に切替え effective route は proxy-b のみです。
        field_values: {}
        related_node_ids:
          - ProxyRoute
          - Proxy
        related_relation_ids:
          - ProxyRoute-via-Proxy
        expected_result:
          zh: 只为 proxy-b 建立 via；proxy-a 保留为失败候选证据。
          en: Assert via only for proxy-b and retain proxy-a as failed-candidate evidence.
          ja: proxy-b のみに via を主張し proxy-a は failed candidate evidence とします。
        why_valid_or_invalid:
          zh: 配置中选择代理不等于该网络调用的实际路径已经经过代理。
          en: Configuration selection is not actual path traversal.
          ja: config selection は actual path traversal ではありません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-proxy-route-001
    source_claims:
      - claim-proxy-route-001
      - claim-proxy-route-002
      - claim-proxy-route-003
    distinct_fact_rationale:
      zh: via 连接一次路径记录与代理实体，避免把 ProxyRoute 本身错误建成 Proxy。
      en: via links one route record to the Proxy Entity and prevents treating ProxyRoute itself as Proxy.
      ja: via は route record と Proxy Entity を結び ProxyRoute 自体を Proxy とする誤分類を防ぎます。
    layout_role: cross-link
    review_status: accepted
    target: concept:Proxy
