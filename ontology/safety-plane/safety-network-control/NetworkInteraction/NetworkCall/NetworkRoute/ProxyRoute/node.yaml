sibling_differentiation: []
parent_relation:
  id: ProxyRoute-is_a-NetworkRoute
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: is a
  definitions:
    zh: ProxyRoute 是 NetworkRoute 的子类：它拥有路由标识、选择时间、有序跳点、最终端点和决定证据，并增加至少一个 Proxy 跳点、转发或隧道模式、协商认证和代理结果。
    en: "ProxyRoute is a subtype of NetworkRoute: it has route ID, selection time, ordered hops, final endpoint, and decision evidence, and adds at least one Proxy hop, forwarding or tunnel mode, negotiated authentication, and proxy result."
    ja: ProxyRoute は NetworkRoute subtype で route ID・selection time・ordered hop・final endpoint・decision evidence に少なくとも一 Proxy hop・forward/tunnel mode・negotiated auth・proxy result を追加します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承描述概念包含，不使用实例关系基数。
    en: Taxonomic inheritance describes concept inclusion and does not use instance-relation cardinality.
    ja: taxonomic inheritance は concept inclusion を表し instance relation cardinality を使いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 以 代理路由记录 为子类
      en: has subtype 代理路由记录
      ja: 代理路由记录 を subtype に持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ProxyRoute-is_a-NetworkRoute-example-positive-manual-20260716
      labels:
        zh: 经代理的有效路由
        en: Effective proxied route
        ja: effective proxied route
      descriptions:
        zh: route-884 记录选择时间、proxy-egress-2→endpoint-api-example-443、有证据的 CONNECT 隧道和 established 结果。
        en: route-884 records selection time, proxy-egress-2 to endpoint-api-example-443, an evidenced CONNECT tunnel, and established result.
        ja: route-884 は selection time・proxy→endpoint・CONNECT tunnel evidence・established result を記録します。
      field_values: {}
      related_node_ids:
        - ProxyRoute
        - NetworkRoute
      related_relation_ids:
        - ProxyRoute-is_a-NetworkRoute

        en: Assert ProxyRoute is_a NetworkRoute.
        ja: ProxyRoute is_a NetworkRoute を主張します。

        en: The record satisfies general effective-route identity and adds a proxy hop.
        ja: general effective-route identity を満たし proxy hop を追加します。
      source_claims:
        - claim-proxy-route-001
        - claim-proxy-route-003
    - id: ProxyRoute-is_a-NetworkRoute-example-boundary-manual-20260716
      labels:
        zh: 直连路由不是代理路由
        en: Direct route is not proxied
        ja: direct route は proxy route ではない
      descriptions:
        zh: route-885 只有最终端点一个跳点，直接 TLS 连接，没有 Proxy、via、代理认证或隧道协商。
        en: route-885 has only the final endpoint as a hop and a direct TLS connection, with no Proxy, via, proxy authentication, or tunnel negotiation.
        ja: route-885 は final endpoint 一 hop/direct TLS のみで Proxy・via・proxy auth・tunnel negotiation がありません。
      field_values: {}
      related_node_ids:
        - NetworkRoute
        - ProxyRoute
      related_relation_ids:
        - ProxyRoute-is_a-NetworkRoute

        en: Retain it as NetworkRoute without ProxyRoute subtype membership.
        ja: NetworkRoute として保持し ProxyRoute subtype membership を主張しません。

        en: A general route does not automatically satisfy proxy-hop differentia.
        ja: general route は proxy-hop differentia を自動で満たしません。
      source_claims:
        - claim-proxy-route-001
  source_claims:
    - claim-proxy-route-001
    - claim-proxy-route-002
    - claim-proxy-route-003
  distinct_fact_rationale:
    zh: ProxyRoute 满足 NetworkRoute 的全部身份条件并增加不可替换的种差。
    en: ProxyRoute satisfies every identity condition of NetworkRoute and adds a non-substitutable differentia.
    ja: ProxyRoute は NetworkRoute の全 identity condition を満たし non-substitutable differentia を追加します。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: ProxyRoute-via-Proxy
    predicate: via
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 经过代理端点
      en: via proxy endpoint
      ja: proxy endpoint 経由
    definitions:
      zh: ProxyRoute 通过 via 指向其实际经过且有连接或协商证据的 Proxy；静态代理配置、失败前未连接候选和仅出现在策略中的代理不建立此边，多代理链按 hop_sequence 顺序分别关联。
      en: ProxyRoute points through via to a Proxy it actually traversed with connection or negotiation evidence. Static proxy configuration, candidates never reached before failure, and proxies appearing only in policy do not establish this edge; multi-proxy chains associate each hop in hop_sequence order.
      ja: ProxyRoute は actual traversal と connection/negotiation evidence がある Proxy を via で指します。static config・未接続 candidate・policy のみの proxy は edge を作らず multi-proxy chain は hop_sequence order で各 hop を関連付けます。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_via_of
      labels:
        zh: 反向读取 via
        en: is via of
        ja: via の inverse
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: ProxyRoute-via-Proxy-example-positive-manual-20260716
        labels:
          zh: CONNECT 经过企业代理
          en: CONNECT traverses enterprise proxy
          ja: CONNECT が enterprise proxy を traversal
        descriptions:
          zh: route-884 的 socket/TLS 审计先连接 proxy-egress-2，发送 CONNECT 并收到 2xx，再建立到源站的隧道。
          en: route-884's socket and TLS audit first connects to proxy-egress-2, sends CONNECT, receives 2xx, and then establishes the origin tunnel.
          ja: route-884 audit は proxy-egress-2 に first connect、CONNECT/2xx 後 origin tunnel を確立します。
        field_values: {}
        related_node_ids:
          - ProxyRoute
          - Proxy
        related_relation_ids:
          - ProxyRoute-via-Proxy

          en: Assert route-884 via proxy-egress-2.
          ja: route-884 via proxy-egress-2 を主張します。

          en: Actual connection and protocol negotiation prove that the proxy hop was adopted.
          ja: actual connection/protocol negotiation が proxy hop adoption を証明します。
        source_claims:
          - claim-proxy-route-001
          - claim-proxy-route-003
      - id: ProxyRoute-via-Proxy-example-boundary-manual-20260716
        labels:
          zh: 健康检查失败的候选代理
          en: Candidate proxy failing health check
          ja: health check failure candidate proxy
        descriptions:
          zh: PAC 选择 proxy-a，但在建立任何代理会话前健康检查失败，调用改用 proxy-b；有效路由只包含 proxy-b。
          en: PAC selects proxy-a, but its health check fails before any proxy session and the call switches to proxy-b; the effective route contains only proxy-b.
          ja: PAC は proxy-a を選びますが session 前 health check failure、call は proxy-b に切替え effective route は proxy-b のみです。
        field_values: {}
        related_node_ids:
          - ProxyRoute
          - Proxy
        related_relation_ids:
          - ProxyRoute-via-Proxy

          en: Assert via only for proxy-b and retain proxy-a as failed-candidate evidence.
          ja: proxy-b のみに via を主張し proxy-a は failed candidate evidence とします。

          en: Configuration selection is not actual path traversal.
          ja: config selection は actual path traversal ではありません。
        source_claims:
          - claim-proxy-route-001
    source_claims:
      - claim-proxy-route-001
      - claim-proxy-route-002
      - claim-proxy-route-003
    distinct_fact_rationale:
      zh: via 连接一次路径记录与代理实体，避免把 ProxyRoute 本身错误建成 Proxy。
      en: via links one route record to the Proxy Entity and prevents treating ProxyRoute itself as Proxy.
      ja: via は route record と Proxy Entity を結び ProxyRoute 自体を Proxy とする誤分類を防ぎます。
    layout_role: cross-link
    review_status: accepted
    target: concept:Proxy
