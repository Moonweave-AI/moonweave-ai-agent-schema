schema: moonweave.ai/ontology-node/v1
id: ProxyRoute
kind: concept
status: accepted
labels:
  zh: 代理路由记录
  en: proxy route record
  ja: proxy route record
semantics:
  short_definition:
    zh: 至少经过一个已验证代理端点的有效网络路由记录。
    en: An effective network-route record traversing at least one verified proxy endpoint.
    ja: 少なくとも一 verified proxy endpoint を通る effective network route record。
  definition:
    zh: 代理路由记录是一种 NetworkRoute，其种差是 hop_sequence 至少包含一个通过 via 关系引用的 Proxy，并记录代理端点、目标端点、转发或隧道模式、实际协商认证和路由结果。它是一次调用的有效路径，不是 Proxy 实体或静态 proxy URL。
    en: A ProxyRoute is a NetworkRoute distinguished by a hop_sequence containing at least one Proxy referenced through via, plus proxy endpoint, target endpoint, forwarding or tunnel mode, negotiated authentication, and route result. It is one call's effective path, not the Proxy Entity or a static proxy URL.
    ja: ProxyRoute は hop_sequence に via で参照する少なくとも一 Proxy を含み proxy endpoint・target endpoint・forward/tunnel mode・negotiated auth・route result を記録する NetworkRoute です。一 call の effective path で Proxy Entity/static proxy URL ではありません。
  why_needed:
    zh: 把代理作为路径种差后，直连路由和代理路由可共享统一上位模型，同时保留代理协商与失败证据。
    en: Making proxy traversal the differentia lets direct and proxied routes share one route model while retaining negotiation and failure evidence.
    ja: proxy traversal を differentia とし direct/proxied route が一 route model を共有し negotiation/failure evidence を保ちます。
  includes:
    - zh: HTTP 转发路径、CONNECT 隧道路由、SOCKS CONNECT/BIND/UDP 路径和多代理链。
      en: HTTP forwarding paths, CONNECT tunnel routes, SOCKS CONNECT/BIND/UDP paths, and multi-proxy chains.
      ja: HTTP forwarding path・CONNECT tunnel route・SOCKS CONNECT/BIND/UDP path・multi-proxy chain。
  excludes:
    - zh: 直连路由、代理服务本身、代理配置字符串和未被调用采用的 PAC 结果。
      en: Direct routes, proxy services themselves, proxy configuration strings, and PAC results not adopted by a call.
      ja: direct route・proxy service・proxy config string・call 未採用の PAC result。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - proxy_endpoint_ref
    - target_endpoint_ref
  fields:
    - id: proxy_endpoint_ref
      labels:
        zh: 代理端点引用
        en: proxy-endpoint reference
        ja: proxy-endpoint reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用调用实际首先连接或经过的 Proxy。
        en: References the Proxy actually reached first or traversed by the call.
        ja: call が実際に first reached/traversed した Proxy。
      allowed_values: []
      pattern: null
      example_value: proxy-egress-2
      source_claims:
        - claim-proxy-route-001
        - claim-proxy-route-002
    - id: target_endpoint_ref
      labels:
        zh: 目标端点引用
        en: target-endpoint reference
        ja: target-endpoint reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用代理被要求连接或转发到的验证目标端点。
        en: References the verified target endpoint the proxy was asked to connect or forward to.
        ja: proxy が connect/forward を要求された verified target endpoint。
      allowed_values: []
      pattern: null
      example_value: endpoint-api-example-443
      source_claims:
        - claim-proxy-route-001
        - claim-proxy-route-002
    - id: tunnel_or_forward_mode
      labels:
        zh: 隧道或转发模式
        en: tunnel or forward mode
        ja: tunnel or forward mode
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录本次路由使用的转发、CONNECT 隧道、SOCKS relay 或 UDP 关联模式。
        en: Records forwarding, CONNECT tunnel, SOCKS relay, or UDP association mode used by this route.
        ja: route が使用した forwarding・CONNECT tunnel・SOCKS relay・UDP association mode。
      allowed_values: []
      pattern: null
      example_value: connect-tunnel
      source_claims:
        - claim-proxy-route-001
        - claim-proxy-route-002
    - id: negotiated_authentication
      labels:
        zh: 已协商认证
        en: negotiated authentication
        ja: negotiated authentication
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录该次代理会话实际选择的认证方法和结果。
        en: Records the authentication method and result actually selected for this proxy session.
        ja: proxy session で実際に selected された authentication method/result。
      allowed_values: []
      pattern: null
      example_value: mutual-tls
      source_claims:
        - claim-proxy-route-002
        - claim-proxy-route-003
    - id: route_result
      labels:
        zh: 路由结果
        en: route result
        ja: route result
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录代理路径建立、拒绝或失败及其协议级证据。
        en: Records establishment, denial, or failure of the proxy route with protocol-level evidence.
        ja: proxy route の establishment・denial・failure と protocol-level evidence。
      allowed_values: []
      pattern: null
      example_value: established
      source_claims:
        - claim-proxy-route-001
        - claim-proxy-route-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: ProxyRoute-example-positive-manual-20260716
    kind: positive
    labels:
      zh: HTTP CONNECT 代理路由
      en: HTTP CONNECT proxy route
      ja: HTTP CONNECT proxy route
    scenario_id: null
    descriptions:
      zh: route-884 通过 proxy-egress-2 向 endpoint-api-example-443 发起 CONNECT，协商 mTLS，收到 2xx 后建立隧道。
      en: route-884 sends CONNECT through proxy-egress-2 to endpoint-api-example-443, negotiates mTLS, and establishes the tunnel after a 2xx response.
      ja: route-884 は proxy-egress-2 経由で CONNECT、mTLS negotiate、2xx 後 tunnel established となります。
    field_values:
      route_id: route-884
      selected_at: 2026-07-16T02:31:04Z
      hop_sequence:
        - proxy-egress-2
        - endpoint-api-example-443
      final_endpoint_ref: endpoint-api-example-443
      route_decision_evidence_ref: policy-evaluation/egress-v9/call-884
      proxy_endpoint_ref: proxy-egress-2
      target_endpoint_ref: endpoint-api-example-443
      tunnel_or_forward_mode: connect-tunnel
      negotiated_authentication: mutual-tls
      route_result: established
    related_node_ids:
      - ProxyRoute
      - NetworkRoute
      - Proxy
    related_relation_ids:
      - ProxyRoute-is_a-NetworkRoute
      - ProxyRoute-via-Proxy
    expected_result:
      zh: 建立 ProxyRoute 并指向实际 Proxy，保留协商和结果。
      en: Create ProxyRoute pointing to the actual Proxy while retaining negotiation and result.
      ja: actual Proxy を指す ProxyRoute を作り negotiation/result を保持します。
    why_valid_or_invalid:
      zh: 路径包含实际代理跳点和会话证据，满足代理路由种差。
      en: The path contains an actual proxy hop and session evidence, satisfying the ProxyRoute differentia.
      ja: actual proxy hop/session evidence が ProxyRoute differentia を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-proxy-route-001
      - claim-proxy-route-003
  - id: ProxyRoute-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 直连源站路由
      en: Direct origin route
      ja: direct origin route
    scenario_id: network-review-proxyroute-boundary
    descriptions:
      zh: 客户端直接连接 endpoint-api-example-443，hop_sequence 只有最终端点，没有代理握手、via 关系或代理认证。
      en: The client connects directly to endpoint-api-example-443; hop_sequence contains only the final endpoint with no proxy handshake, via relation, or proxy authentication.
      ja: client は endpoint-api-example-443 へ direct connect し proxy handshake・via relation・proxy auth がありません。
    field_values: {}
    related_node_ids:
      - NetworkRoute
      - NetworkEndpoint
    related_relation_ids:
      - NetworkRoute-targets-NetworkEndpoint
    expected_result:
      zh: 分类为 NetworkRoute，不分类为 ProxyRoute。
      en: Classify it as NetworkRoute, not ProxyRoute.
      ja: NetworkRoute と分類し ProxyRoute にはしません。
    why_valid_or_invalid:
      zh: 没有代理跳点就不满足 ProxyRoute 的严格种差。
      en: Without a proxy hop the strict ProxyRoute differentia is not satisfied.
      ja: proxy hop がなく ProxyRoute strict differentia を満たしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-proxy-route-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ProxyRoute-is_a-NetworkRoute
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: is a
  definitions:
    zh: ProxyRoute 是 NetworkRoute 的子类：它拥有路由标识、选择时间、有序跳点、最终端点和决定证据，并增加至少一个 Proxy 跳点、转发或隧道模式、协商认证和代理结果。
    en: "ProxyRoute is a subtype of NetworkRoute: it has route ID, selection time, ordered hops, final endpoint, and decision evidence, and adds at least one Proxy hop, forwarding or tunnel mode, negotiated authentication, and proxy result."
    ja: ProxyRoute は NetworkRoute subtype で route ID・selection time・ordered hop・final endpoint・decision evidence に少なくとも一 Proxy hop・forward/tunnel mode・negotiated auth・proxy result を追加します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承描述概念包含，不使用实例关系基数。
    en: Taxonomic inheritance describes concept inclusion and does not use instance-relation cardinality.
    ja: taxonomic inheritance は concept inclusion を表し instance relation cardinality を使いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 以 代理路由记录 为子类
      en: has subtype 代理路由记录
      ja: 代理路由记录 を subtype に持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ProxyRoute-is_a-NetworkRoute-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 经代理的有效路由
        en: Effective proxied route
        ja: effective proxied route
      scenario_id: network-relation-proxyroute-is_a-networkroute-positive
      descriptions:
        zh: route-884 记录选择时间、proxy-egress-2→endpoint-api-example-443、有证据的 CONNECT 隧道和 established 结果。
        en: route-884 records selection time, proxy-egress-2 to endpoint-api-example-443, an evidenced CONNECT tunnel, and established result.
        ja: route-884 は selection time・proxy→endpoint・CONNECT tunnel evidence・established result を記録します。
      field_values: {}
      related_node_ids:
        - ProxyRoute
        - NetworkRoute
      related_relation_ids:
        - ProxyRoute-is_a-NetworkRoute
      expected_result:
        zh: 断言 ProxyRoute is_a NetworkRoute。
        en: Assert ProxyRoute is_a NetworkRoute.
        ja: ProxyRoute is_a NetworkRoute を主張します。
      why_valid_or_invalid:
        zh: 记录满足一般有效路径身份并增加代理跳点。
        en: The record satisfies general effective-route identity and adds a proxy hop.
        ja: general effective-route identity を満たし proxy hop を追加します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-proxy-route-001
        - claim-proxy-route-003
    - id: ProxyRoute-is_a-NetworkRoute-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 直连路由不是代理路由
        en: Direct route is not proxied
        ja: direct route は proxy route ではない
      scenario_id: network-relation-proxyroute-is_a-networkroute-boundary
      descriptions:
        zh: route-885 只有最终端点一个跳点，直接 TLS 连接，没有 Proxy、via、代理认证或隧道协商。
        en: route-885 has only the final endpoint as a hop and a direct TLS connection, with no Proxy, via, proxy authentication, or tunnel negotiation.
        ja: route-885 は final endpoint 一 hop/direct TLS のみで Proxy・via・proxy auth・tunnel negotiation がありません。
      field_values: {}
      related_node_ids:
