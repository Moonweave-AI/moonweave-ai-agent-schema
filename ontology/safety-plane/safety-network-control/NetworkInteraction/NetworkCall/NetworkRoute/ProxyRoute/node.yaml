  - id: proxy-route-envoy_ext_auth
    labels:
      zh: 代理路由记录 - Envoy ext_authz PEP
      en: proxy route record - Envoy ext_authz PEP
      ja: proxy route record - Envoy ext_authz PEP
    descriptions: {zh: "代理路由记录(ProxyRoute) [ProxyRoute]: 至少经过一个已验证代理端点的有效网络路由记录。. Envoy ext_authz 过滤器在上游请求前调用授权服务。 Fields: proxy_endpoint_ref, tunnel_or_forward_mode, route_result.", en: "proxy route record (ProxyRoute) [ProxyRoute]: An effective network-route record traversing at least one verified proxy endpoint.. Envoy ext_authz filter calls an authorization service before allowing upstream requests (envoyproxy.io ext_authz documentation). Fields include proxy_endpoint_ref, tunnel_or_forward_mode, route_result.", ja: "proxy route record(ProxyRoute) [ProxyRoute]: 少なくとも一 verified proxy endpoint を通る effective network route record。. Envoy ext_authz filter は upstream request 前に authorization service を呼ぶ。 Fields: proxy_endpoint_ref, tunnel_or_forward_mode, route_result."}
    field_values:
