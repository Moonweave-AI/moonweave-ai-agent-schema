    en: ProxyRoute satisfies every identity condition of NetworkRoute and adds a non-substitutable differentia.
    ja: ProxyRoute は NetworkRoute の全 identity condition を満たし non-substitutable differentia を追加します。
  layout_role: primary-backbone
  review_status: accepted
