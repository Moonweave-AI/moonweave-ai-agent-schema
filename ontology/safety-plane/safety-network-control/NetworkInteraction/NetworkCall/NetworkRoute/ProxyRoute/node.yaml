    descriptions: {zh: "代理路由记录(ProxyRoute) [ProxyRoute]: 至少经过一个已验证代理端点的有效网络路由记录。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" }。 Fields: proxy_endpoint_ref, tunnel_or_forward_mode, route_result.", en: "proxy route record (ProxyRoute) [ProxyRoute]: An effective network-route record traversing at least one verified proxy endpoint.. OPA Rego: package authz; default allow := false; allow if { input.user.role == \"admin\" }; allow if { input.user.role == \"editor\"; input.action == \"read\" } (openpolicyagent.org/docs/policy-language). Fields include proxy_endpoint_ref, tunnel_or_forward_mode, route_result.", ja: "proxy route record(ProxyRoute) [ProxyRoute]: 少なくとも一 verified proxy endpoint を通る effective network route record。. OPA Rego：package authz; default allow := false; allow if { input.user.role == \"admin\" }；editor+read も allow。 Fields: proxy_endpoint_ref, tunnel_or_forward_mode, route_result."}
    field_values:
