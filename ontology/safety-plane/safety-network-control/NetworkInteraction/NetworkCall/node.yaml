schema: moonweave.ai/ontology-node/v1
id: NetworkCall
kind: concept
labels:
  zh: 网络调用
  en: network call
  ja: ネットワーク呼出し
semantics:
  short_definition:
    zh: 由 OutboundRequest 发起、受 NetworkPolicy 治理的一次网络执行实例。
    en: One network execution instance initiated by OutboundRequest and governed by NetworkPolicy.
    ja: OutboundRequest により開始され NetworkPolicy により governed される一回の network 実行 instance。
  definition:
    zh: NetworkCall 是 NetworkInteraction 内的执行节点，记录 network_call_id、governed_by NetworkPolicy 版本、targets 最终 NetworkEndpoint、routed_by NetworkRoute、call_status 与 denial_stage/failure_stage。它映射 egress HTTP 调用的 audit logging 执行步；不是 OutboundRequest 意图、InboundResponse 内容或 ToolResult。
    en: "NetworkCall is the execution node within NetworkInteraction recording network_call_id, governed_by NetworkPolicy revision, targets final NetworkEndpoint, routed_by NetworkRoute, call_status, and denial_stage or failure_stage. It maps the audit-logged execution step of egress HTTP calls; it is not OutboundRequest intent, InboundResponse content, or ToolResult."
    ja: NetworkCall は NetworkInteraction 内 execution node で network_call_id/governed_by NetworkPolicy revision/targets final NetworkEndpoint/routed_by NetworkRoute/call_status/denial_stage/failure_stage を記録。egress HTTP call audit logging 実行 step を写像。OutboundRequest 意図/InboundResponse content/ToolResult ではない。
  why_needed:
    zh: 将策略评估与传输执行绑定到同一 call 实例，才能区分 denial_stage=policy 与 failure_stage=connection，并证明 governed_by 哪版 egress-agent-tools@9。
    en: Binding policy evaluation and transport execution to one call instance separates denial_stage=policy from failure_stage=connection and proves which egress-agent-tools@9 revision governed the call.
    ja: policy evaluation/transport execution を同一 call instance に bind すると denial_stage=policy/failure_stage=connection を分離しどの egress-agent-tools@9 revision が governed したか証明できます。
  includes:
    - zh: 含 policy 评估结果、路由跳点、TLS 验证引用、连接/完成/拒绝状态。
      en: Includes policy evaluation result, route hops, TLS verification reference, and connection, completion, or denial status.
      ja: policy evaluation result/route hop/TLS verification reference/connection/completion/deny status を含む。
  excludes:
    - zh: 不包含 HTTP body 业务语义、AuthorizationGrant、SideEffect 或 DNS 缓存配置。
      en: Excludes HTTP body business semantics, AuthorizationGrant, SideEffect, or DNS cache configuration.
      ja: HTTP body business semantics/AuthorizationGrant/SideEffect/DNS cache configuration は含まない。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: 集成：OutboundRequest initiates NetworkCall；NetworkCall governed_by egress-agent-tools@9；deny 时 denial_stage=policy 且 transport_connection_started=false；completed 时关联 InboundResponse 与 audit log entry。
    en: "Integration: OutboundRequest initiates NetworkCall; NetworkCall governed_by egress-agent-tools@9; on deny denial_stage=policy and transport_connection_started=false; on completed correlate InboundResponse and audit log entry."
    ja: 統合：OutboundRequest initiates NetworkCall。NetworkCall governed_by egress-agent-tools@9。deny 時 denial_stage=policy/transport_connection_started=false。completed 時 InboundResponse/audit log entry correlate。
  typical_input:
    - description: Outbound request starting network call.
      format: |
        network_call_id: net-call-884
        request_id: out-req-884
        network_policy_ref: egress-agent-tools@9
      source_claims:
        - claim-network-call-design
  typical_output:
    - description: Completed call with route and endpoint evidence.
      format: |
        call_status: completed
        route_id: route-884
        final_endpoint: 203.0.113.42:443
      source_claims:
        - claim-network-call-design
  reference_implementations:
    - name: Kubernetes NetworkPolicy
      url: https://kubernetes.io/docs/concepts/services-networking/network-policies/
      description: Policy-governed pod egress calls.
    - name: MCP Specification
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/server/tools/
      description: MCP server outbound calls from tools/call.
structure:
  identity_keys:
    - network_call_id
  fields:
    - id: network_call_id
      labels:
        zh: 网络调用标识
        en: network call ID
        ja: ネットワーク呼出し ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次 NetworkCall 执行实例。
        en: Stably identifies one NetworkCall execution instance.
        ja: 一回 NetworkCall 実行 instance を安定識別。
      allowed_values: []
      pattern: null
      example_value: net-call-884
      source_claims:
        - claim-network-call-design
    - id: call_status
      labels:
        zh: 调用状态
        en: call status
        ja: 呼出し status
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: completed、denied 或 failed；须与 denial_stage/failure_stage 联合解释。
        en: completed, denied, or failed; must be read with denial_stage or failure_stage.
        ja: completed/denied/failed。denial_stage/failure_stage と併読必須。
      allowed_values:
        - completed
        - denied
        - failed
      pattern: null
      example_value: completed
      source_claims:
        - claim-network-call-design
    - id: denial_stage
      labels:
        zh: 拒绝阶段
        en: denial stage
        ja: deny stage
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: resolution、policy、proxy_auth 等；denied 时必须 present。
        en: resolution, policy, proxy_auth, etc.; required when denied.
        ja: resolution/policy/proxy_auth 等。denied 時 present 必須。
      allowed_values: []
      pattern: null
      example_value: policy
      source_claims:
        - claim-network-call-k8s
  constraints:
    - id: network-policy-vs-transport-failure
      severity: error
      expression_language: plain
      expression: call_status=failed with failure_stage=connection and network_policy_result=allow MUST NOT be reported as policy denial
      explanations:
        zh: 策略结果与运输失败是不同事实。
        en: Policy outcome and transport failure are distinct facts.
        ja: policy outcome/transport failure は別 fact。
      source_claims:
        - claim-network-call-design
  required_relation_constraints: []
examples:
  - id: NetworkCall-proxy-route-complete
    labels:
      zh: 经代理完成调用
      en: Completed call via proxy
      ja: proxy 経由完了 call
    descriptions:
      zh: net-call-884 governed_by egress-agent-tools@9，route-884 经 proxy-egress-2 到 203.0.113.42:443，call_status=completed。
      en: net-call-884 governed_by egress-agent-tools@9, route-884 via proxy-egress-2 to 203.0.113.42:443, call_status=completed.
      ja: net-call-884 governed_by egress-agent-tools@9。route-884 proxy-egress-2 経由 203.0.113.42:443。call_status=completed。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: proxy route allow
    field_values:
      network_call_id: net-call-884
      call_status: completed
    related_node_ids:
      - NetworkCall
      - NetworkPolicy
      - NetworkRoute
      - OutboundRequest
    related_relation_ids:
      - NetworkCall-governed_by-NetworkPolicy
      - OutboundRequest-initiates-NetworkCall
    source_claims:
      - claim-network-call-design
  - id: NetworkCall-k8s-policy-deny
    labels:
      zh: K8s 策略拒绝调用
      en: K8s policy denied call
      ja: K8s policy deny call
    descriptions:
      zh: net-call-885 目标 updates.unapproved.example；egress-agent-tools@9 deny，denial_stage=policy。
      en: net-call-885 targets updates.unapproved.example; egress-agent-tools@9 denies with denial_stage=policy.
      ja: net-call-885 が updates.unapproved.example target。egress-agent-tools@9 deny、denial_stage=policy。
    example_source:
      product: Kubernetes
      url: https://kubernetes.io/docs/concepts/services-networking/network-policies/
      version: egress deny
    field_values:
      network_call_id: net-call-885
      call_status: denied
      denial_stage: policy
    related_node_ids:
      - NetworkCall
      - NetworkPolicy
    related_relation_ids:
      - NetworkCall-governed_by-NetworkPolicy
    source_claims:
      - claim-network-call-k8s
  - id: NetworkCall-dns-resolution-deny
    labels:
      zh: DNS 解析阶段拒绝
      en: DNS resolution stage deny
      ja: DNS resolution stage deny
    descriptions:
      zh: exfil.attacker.example 返回 NXDOMAIN；net-call-dns-12 denial_stage=resolution，未进入 connection。
      en: exfil.attacker.example returns NXDOMAIN; net-call-dns-12 denial_stage=resolution without entering connection.
      ja: exfil.attacker.example NXDOMAIN。net-call-dns-12 denial_stage=resolution、connection 未进入。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: resolution vs connection
    field_values:
      denial_stage: resolution
      call_status: denied
    related_node_ids:
      - NetworkCall
    related_relation_ids: []
    source_claims:
      - claim-network-call-design
  - id: NetworkCall-timeout-not-policy
    labels:
      zh: 超时非策略拒绝
      en: Timeout is not policy denial
      ja: timeout は policy deny ではない
    descriptions:
      zh: policy allow 但 TCP timeout；call_status=failed failure_stage=connection，不得报 denial_stage=policy。
      en: Policy allows but TCP times out; call_status=failed failure_stage=connection, must not report denial_stage=policy.
      ja: policy allow だが TCP timeout。call_status=failed/failure_stage=connection。denial_stage=policy 報告不可。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: transport vs policy
    field_values:
      call_status: failed
      failure_stage: connection
    related_node_ids:
      - NetworkCall
      - NetworkPolicy
    related_relation_ids: []
    source_claims:
      - claim-network-call-design
parent_relation:
  id: NetworkCall-part_of-NetworkInteraction
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 属于网络交互
    en: part of network interaction
    ja: ネットワーク相互作用の一部
  definitions:
    zh: NetworkCall 是 NetworkInteraction 内的执行组成部分。
    en: NetworkCall is the execution component within NetworkInteraction.
    ja: NetworkCall は NetworkInteraction 内 execution 構成部分。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一次交互通常含一次主 NetworkCall；redirect 可能追加。
    en: One interaction usually has one primary NetworkCall; redirects may add more.
    ja: 一 interaction は通常一 primary NetworkCall。redirect で追加可。
  inverse_reading:
    predicate: contains
    labels:
      zh: 包含网络调用
      en: contains network call
      ja: ネットワーク呼出しを含む
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-network-call-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: NetworkCall-governed_by-NetworkPolicy
    predicate: governed_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 受网络策略治理
      en: governed by network policy
      ja: ネットワークポリシーにより governed
    definitions:
      zh: NetworkCall 必须 governed_by 一条实际评估的 NetworkPolicy 版本。
      en: NetworkCall must be governed_by one actually evaluated NetworkPolicy revision.
      ja: NetworkCall は actually evaluated NetworkPolicy revision 一つに governed_by 必須。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 每次 call 评估一条 policy revision。
      en: Each call evaluates one policy revision.
      ja: 各 call は一 policy revision evaluate。
    inverse_reading:
      predicate: governs
      labels:
        zh: 治理网络调用
        en: governs network call
        ja: ネットワーク呼出しを govern
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-network-call-k8s
    distinct_fact_rationale:
      zh: NetworkCall 存在不能推出哪版 policy 被评估。
      en: NetworkCall existence alone cannot imply which policy revision was evaluated.
      ja: NetworkCall 存在だけでは evaluate された policy revision は分からない。
    layout_role: cross-link
    target: concept:NetworkPolicy
sources:
  - id: k8s-network-policy
    title: Kubernetes NetworkPolicy
    url: https://kubernetes.io/docs/concepts/services-networking/network-policies/
    source_type: official-doc
    relevance: Policy-governed egress NetworkCall evaluation.
  - id: mcp-transports-2025-06-18
    title: MCP Specification — Transports
    url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/transports/
    source_type: official-spec
    relevance: MCP server outbound NetworkCall from tools/call.
  - id: safety-network-design
    title: Moonweave safety-network-control module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: NetworkCall as governed execution step with denial and failure stages.
source_claims:
  - id: claim-network-call-k8s
    source: k8s-network-policy
    supports: Kubernetes NetworkPolicy evaluation maps to NetworkCall governed_by with policy-stage denial before connection.
    locator: NetworkPolicy egress
    evidence_kind: official
    confidence: high
  - id: claim-network-call-design
    source: safety-network-design
    supports: Moonweave binds NetworkCall to policy revision, route, endpoint, and distinct denial vs transport failure stages.
    locator: NetworkCall boundary
    evidence_kind: design-inference
    confidence: high
