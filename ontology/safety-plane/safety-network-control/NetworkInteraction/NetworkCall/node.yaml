schema: moonweave.ai/ontology-node/v1
id: NetworkCall
kind: concept
status: accepted
labels:
  zh: 网络调用
  en: network call
  ja: network call
semantics:
  short_definition:
    zh: 携带一项协议操作并形成明确端点结果的网络交互。
    en: A network interaction carrying one protocol operation to an evaluated endpoint outcome.
    ja: 一 protocol operation を evaluated endpoint outcome へ運ぶ network interaction。
  definition:
    zh: 网络调用是一种 NetworkInteraction，完整继承 interaction_id 与 initiator_ref 组成的交互发生身份；协议、操作、请求权限、开始时间和状态只描述该同一交互的网络调用种差，不形成第二套调用身份。它记录从协议级请求到解析、策略判断、路由、连接及响应或拒绝的单次尝试。
    en: A NetworkCall is a NetworkInteraction and inherits the interaction occurrence identity composed of interaction_id and initiator_ref. Protocol, operation, requested authority, start time, and status are differentia of that same interaction rather than a second call identity. It records one attempt from protocol-level request through resolution, policy evaluation, routing, connection, and response or denial.
    ja: NetworkCall は NetworkInteraction の一種で、interaction_id と initiator_ref からなる発生同一性を継承します。protocol、operation、requested authority、開始時刻、status は同じ interaction の種差で、別の call 同一性ではありません。protocol request から応答または拒否までの一 attempt を記録します。
  why_needed:
    zh: 用一个生命周期对象承载授权与失败阶段，消除 DeniedNetworkCall 之类按状态漏级的伪分类，并保留全过程可追溯性。
    en: One lifecycle object carries authorization and failure stages, removing status-based pseudo-taxonomies such as DeniedNetworkCall while preserving end-to-end traceability.
    ja: 一 lifecycle object で authorization/failure stage を表し DeniedNetworkCall の status-based pseudo-taxonomy を除き end-to-end traceability を保ちます。
  includes:
    - zh: HTTP 请求尝试、SOCKS 连接请求、协议级 RPC 网络尝试，以及策略拒绝或连接失败的同一调用记录。
      en: HTTP request attempts, SOCKS connection requests, protocol-level RPC network attempts, and the same call record when policy denies or connection fails.
      ja: HTTP request attempt・SOCKS connection request・protocol-level RPC network attempt・policy denial/connection failure を持つ同一 call record。
  excludes:
    - zh: 仅有请求正文、仅有端点、网络策略版本、所选路由、响应消息和本地工具调用。
      en: A request body alone, an endpoint alone, a network-policy revision, selected route, response message, and local tool invocation.
      ja: request body のみ・endpoint のみ・network-policy revision・selected route・response message・local tool invocation。
  semantic_kind: event
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: protocol
      labels:
        zh: 协议
        en: protocol
        ja: protocol
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明本次调用实际使用或尝试使用的网络或应用协议。
        en: States the network or application protocol actually used or attempted.
        ja: 実際に使用または試行した network/application protocol。
      allowed_values: []
      pattern: null
      example_value: https
      source_claims:
        - claim-network-call-002
        - claim-network-call-003
    - id: method_or_operation
      labels:
        zh: 方法或操作
        en: method or operation
        ja: method or operation
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识协议内执行的请求方法、命令或操作。
        en: Identifies the request method, command, or operation within the protocol.
        ja: protocol 内の request method・command・operation。
      allowed_values: []
      pattern: null
      example_value: GET
      source_claims:
        - claim-network-call-002
        - claim-network-call-003
    - id: requested_authority
      labels:
        zh: 请求 authority
        en: requested authority
        ja: requested authority
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保留调用方请求的主机、端口或协议 authority，区别于解析后的候选和最终验证端点。
        en: Preserves the host, port, or protocol authority requested by the caller, distinct from resolved candidates and the verified final endpoint.
        ja: caller が要求した host・port・protocol authority を保持し resolved candidate/final verified endpoint と区別します。
      allowed_values: []
      pattern: null
      example_value: api.example.com:443
      source_claims:
        - claim-network-call-002
        - claim-network-call-003
    - id: status
      labels:
        zh: 调用状态
        en: call status
        ja: call status
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 requested、authorized、denied、connecting、completed 或 failed 等生命周期状态。
        en: Records lifecycle state such as requested, authorized, denied, connecting, completed, or failed.
        ja: requested・authorized・denied・connecting・completed・failed 等の lifecycle state。
      allowed_values: []
      pattern: null
      example_value: denied
      source_claims:
        - claim-network-call-001
        - claim-network-call-003
    - id: denial_stage
      labels:
        zh: 拒绝阶段
        en: denial stage
        ja: denial stage
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 若被拒绝，指出发生在解析、策略、路由、代理、连接、重定向或响应验证的哪一阶段。
        en: When denied, identifies whether resolution, policy, routing, proxy, connection, redirect, or response validation rejected it.
        ja: denied 時に resolution・policy・routing・proxy・connection・redirect・response validation のどの stage かを示します。
      allowed_values: []
      pattern: null
      example_value: policy
      source_claims:
        - claim-network-call-001
        - claim-network-call-002
        - claim-network-call-003
    - id: denial_reason
      labels:
        zh: 拒绝原因
        en: denial reason
        ja: denial reason
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录可复核的规则、错误码或端点验证证据，而不是只写失败。
        en: Records the reviewable rule, error code, or endpoint-verification evidence rather than a bare failure label.
        ja: bare failure label ではなく reviewable rule・error code・endpoint verification evidence を記録します。
      allowed_values: []
      pattern: null
      example_value: destination-not-allowlisted
      source_claims:
        - claim-network-call-001
        - claim-network-call-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: NetworkCall-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 策略阶段拒绝的调用
      en: Call denied at policy stage
      ja: policy stage denied call
    scenario_id: null
    descriptions:
      zh: net-call-884 请求 GET https://169.254.169.254/latest，解析后命中禁止元数据端点规则，状态为 denied、阶段为 policy，并记录规则版本。
      en: net-call-884 requests GET https://169.254.169.254/latest; after resolution it matches a forbidden metadata-endpoint rule, records status denied and stage policy, and retains the rule revision.
      ja: net-call-884 は metadata endpoint への GET を要求し resolution 後 forbidden rule に一致、status=denied・stage=policy と rule revision を記録します。
    field_values:
      interaction_id: network-interaction/net-call-884
      initiator_ref: workload/agent-code
      direction: egress
      outcome: denied
      protocol: https
      method_or_operation: GET
      requested_authority: 169.254.169.254:443
      started_at: 2026-07-16T02:31:04Z
      status: denied
      denial_stage: policy
      denial_reason: destination-not-allowlisted
    related_node_ids:
      - NetworkCall
      - NetworkInteraction
      - NetworkPolicy
    related_relation_ids:
      - NetworkCall-is_a-NetworkInteraction
      - NetworkCall-governed_by-NetworkPolicy
    expected_result:
      zh: 保留为状态为 denied 的 NetworkCall，而非新建 DeniedNetworkCall。
      en: Retain one NetworkCall with denied state rather than instantiate DeniedNetworkCall.
      ja: DeniedNetworkCall を作らず denied state の一 NetworkCall として保持します。
    why_valid_or_invalid:
      zh: 记录有完整调用身份和拒绝阶段；拒绝只是该发生的结果。
      en: The record has full call identity and denial stage; denial is the occurrence outcome.
      ja: full call identity/denial stage があり denial は occurrence outcome です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-network-call-001
      - claim-network-call-002
  - id: NetworkCall-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 只有 HTTP 请求消息
      en: HTTP request message only
      ja: HTTP request message のみ
    scenario_id: network-review-networkcall-boundary
    descriptions:
      zh: 日志只保存 GET /v1/models 与 Host 头，没有调用标识、策略决定、路由、连接或结果。
      en: A log stores only GET /v1/models and a Host header, with no call ID, policy decision, route, connection, or outcome.
      ja: log は GET /v1/models/Host header のみで call ID・policy decision・route・connection・outcome がありません。
    field_values: {}
    related_node_ids:
      - OutboundRequest
    related_relation_ids: []
    expected_result:
      zh: 分类为 OutboundRequest 信息，不断言 NetworkCall 已发生。
      en: Classify it as OutboundRequest information and do not assert that a NetworkCall occurred.
      ja: OutboundRequest information とし NetworkCall occurrence を主張しません。
    why_valid_or_invalid:
      zh: 协议消息可以在发送前构造，缺少发生证据。
      en: A protocol message can be constructed before transmission and lacks occurrence evidence here.
      ja: protocol message は transmission 前に構成でき occurrence evidence を欠きます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-network-call-002
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: NetworkCall-is_a-NetworkInteraction
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: is a
  definitions:
    zh: NetworkCall 是 NetworkInteraction 的子类：每个调用都具有交互发起方、时间、方向和结果，并增加协议操作、请求 authority、解析、路由、策略与响应阶段。拒绝和失败仍是该子类实例的状态。
    en: "NetworkCall is a subtype of NetworkInteraction: every call has interaction initiator, time, direction, and outcome, and adds protocol operation, requested authority, resolution, routing, policy, and response stages. Denial and failure remain states of an instance of this subtype."
    ja: NetworkCall は NetworkInteraction subtype で、initiator・time・direction・outcome を持ち protocol operation・requested authority・resolution・routing・policy・response stage を追加します。denial/failure はこの subtype instance の state です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承描述概念包含，不使用实例关系基数。
    en: Taxonomic inheritance describes concept inclusion and does not use instance-relation cardinality.
    ja: taxonomic inheritance は concept inclusion を表し instance relation cardinality を使いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 以 网络调用 为子类
      en: has subtype 网络调用
      ja: 网络调用 を subtype に持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: NetworkCall-is_a-NetworkInteraction-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 完整调用继承交互身份
        en: Complete call inherits interaction identity
        ja: complete call が interaction identity を継承
      scenario_id: network-relation-networkcall-is_a-networkinteraction-positive
      descriptions:
        zh: net-call-884 具有 initiator、started_at、outbound direction 和 denied outcome，并进一步记录 HTTPS GET、请求 authority 与 policy 阶段拒绝。
        en: net-call-884 has initiator, started_at, outbound direction, and denied outcome, and additionally records HTTPS GET, requested authority, and policy-stage denial.
        ja: net-call-884 は initiator・started_at・outbound direction・denied outcome に加え HTTPS GET・requested authority・policy-stage denial を記録します。
      field_values: {}
      related_node_ids:
        - NetworkCall
        - NetworkInteraction
      related_relation_ids:
        - NetworkCall-is_a-NetworkInteraction
      expected_result:
        zh: 断言 NetworkCall is_a NetworkInteraction。
        en: Assert NetworkCall is_a NetworkInteraction.
        ja: NetworkCall is_a NetworkInteraction を主張します。
      why_valid_or_invalid:
        zh: 调用满足交互全部身份条件并增加协议调用种差。
        en: The call satisfies all interaction identity conditions and adds protocol-call differentia.
        ja: call は interaction identity condition を全て満たし protocol-call differentia を追加します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-network-call-001
        - claim-network-call-002
    - id: NetworkCall-is_a-NetworkInteraction-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 请求消息不是交互
        en: Request message is not an interaction
        ja: request message は interaction ではない
      scenario_id: network-relation-networkcall-is_a-networkinteraction-boundary
      descriptions:
        zh: out-req-884 仅有方法、目标和载荷引用，尚未产生发起方时间与网络发生结果。
        en: out-req-884 has method, target, and payload reference but no occurrence time, initiator evidence, or network outcome.
        ja: out-req-884 は method・target・payload ref のみで occurrence time・initiator evidence・network outcome がありません。
      field_values: {}
      related_node_ids:
        - NetworkCall
        - OutboundRequest
        - NetworkInteraction
      related_relation_ids:
        - NetworkCall-is_a-NetworkInteraction
      expected_result:
        zh: 不得以该关系把 OutboundRequest 分类为 NetworkInteraction。
        en: Do not use this relation to classify OutboundRequest as NetworkInteraction.
        ja: OutboundRequest を NetworkInteraction と分類しません。
      why_valid_or_invalid:
        zh: 孤立的消息信息缺少一次网络交互事件所需的执行同一性。
        en: Message information lacks interaction-event identity.
        ja: message information は interaction-event identity を欠きます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-network-call-002
  source_claims:
    - claim-network-call-001
    - claim-network-call-002
  distinct_fact_rationale:
    zh: NetworkCall 满足 NetworkInteraction 的全部身份条件并增加不可替换的种差。
    en: NetworkCall satisfies every identity condition of NetworkInteraction and adds a non-substitutable differentia.
    ja: NetworkCall は NetworkInteraction の全 identity condition を満たし non-substitutable differentia を追加します。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: NetworkCall-governed_by-NetworkPolicy
    predicate: governed_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 受网络策略治理
      en: governed by network policy
      ja: network policy に governed
    definitions:
      zh: NetworkCall 通过 governed_by 记录在其解析、路由或连接决定中实际应用的 NetworkPolicy 版本；仅适用但未求值的策略不建立此边，具体 allow/deny 结果仍由调用状态和决定证据保存。
      en: NetworkCall uses governed_by for the exact NetworkPolicy revision actually applied during resolution, routing, or connection decision. A merely applicable but unevaluated policy does not establish this edge, while the concrete allow or deny result remains in call state and decision evidence.
      ja: NetworkCall は resolution・routing・connection decision で実際に applied した exact NetworkPolicy revision を governed_by で記録します。applicable だが unevaluated policy は edge を作らず allow/deny result は call state/decision evidence に保持します。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_governed_by_of
      labels:
        zh: 反向读取 governed_by
        en: is governed_by of
        ja: governed_by の inverse
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: NetworkCall-governed_by-NetworkPolicy-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 记录生效策略版本
          en: Record effective policy revision
          ja: effective policy revision を記録
        scenario_id: network-relation-networkcall-governed_by-networkpolicy-positive
        descriptions:
          zh: net-call-884 的 policy 阶段审计加载 egress-agent-tools@9，主体和目标选择器匹配后返回 deny。
          en: net-call-884's policy-stage audit loads egress-agent-tools@9, matches subject and endpoint selectors, and returns deny.
          ja: net-call-884 policy audit は egress-agent-tools@9 を load、subject/endpoint selector match 後 deny を返します。
        field_values: {}
        related_node_ids:
          - NetworkCall
          - NetworkPolicy
        related_relation_ids:
          - NetworkCall-governed_by-NetworkPolicy
        expected_result:
          zh: 建立 call governed_by policy@9，并把 deny 记录在调用字段。
          en: Assert call governed_by policy@9 and record deny in call fields.
          ja: call governed_by policy@9 を主張し deny を call field に記録します。
        why_valid_or_invalid:
          zh: 审计证明具体版本被求值并影响本次调用。
          en: Audit proves the exact revision was evaluated and affected this call.
          ja: audit が exact revision evaluation/call impact を証明します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-network-call-001
          - claim-network-call-004
      - id: NetworkCall-governed_by-NetworkPolicy-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 仓库中未加载的策略
          en: Policy present but not loaded
          ja: 存在するが未 load policy
        scenario_id: network-relation-networkcall-governed_by-networkpolicy-boundary
        descriptions:
          zh: egress-agent-tools@10 已提交到仓库，但运行时仍加载 @9；调用证据不包含 @10 摘要。
          en: egress-agent-tools@10 is committed to the repository, but runtime still loads @9 and call evidence contains no @10 digest.
          ja: egress-agent-tools@10 は repo にありますが runtime は @9 を load し call evidence に @10 digest はありません。
        field_values: {}
        related_node_ids:
          - NetworkCall
          - NetworkPolicy
        related_relation_ids:
          - NetworkCall-governed_by-NetworkPolicy
        expected_result:
          zh: 只关联 @9，不关联 @10。
          en: Link only @9 and not @10.
          ja: "@9 のみ link し @10 にはしません。"
        why_valid_or_invalid:
          zh: 配置可用性不等于该版本实际治理调用。
          en: Configuration availability is not actual governance by that revision.
          ja: config availability は revision の actual governance ではありません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-network-call-001
    source_claims:
      - claim-network-call-001
      - claim-network-call-004
    distinct_fact_rationale:
      zh: governed_by 记录生效规范版本；一次 PolicyDecision 或状态字段是另一个事实。
      en: governed_by records the effective specification revision; one PolicyDecision or state field is a separate fact.
      ja: governed_by は effective specification revision を記録し一 PolicyDecision/state field は別 fact です。
    layout_role: cross-link
    review_status: accepted
    target: concept:NetworkPolicy
  - id: NetworkCall-receives-InboundResponse
    predicate: receives
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 接收入站响应
      en: receives inbound response
      ja: inbound response を receive
    definitions:
      zh: NetworkCall 在协议关联标识、连接上下文和接收时间证明某个 InboundResponse 属于该调用时 receives 它；调用不是响应的生产者，超时、连接拒绝或无响应失败不要求此边。
      en: NetworkCall receives an InboundResponse when protocol correlation identity, connection context, and receive time prove that the response belongs to the call. The call is not the response's producer, and timeout, connection refusal, or no-response failure requires no such edge.
      ja: NetworkCall は protocol correlation ID・connection context・receive time が response 所属を証明する場合 InboundResponse を receives します。call は response producer ではなく timeout・connection refusal・no-response failure には edge を要求しません。
    cardinality:
      source:
        min: 1
        max: 1
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_receives_of
      labels:
        zh: 反向读取 receives
        en: is receives of
        ja: receives の inverse
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: NetworkCall-receives-InboundResponse-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 调用接收重定向响应
          en: Call receives redirect response
          ja: call が redirect response を receive
        scenario_id: network-relation-networkcall-receives-inboundresponse-positive
        descriptions:
          zh: in-resp-884 的 HTTP stream、request correlation 和接收时间都指向 net-call-884，并携带 302 状态。
          en: in-resp-884's HTTP stream, request correlation, and receive time all identify net-call-884 and carry status 302.
          ja: in-resp-884 の HTTP stream・request correlation・receive time は net-call-884 を示し 302 を持ちます。
        field_values: {}
        related_node_ids:
          - NetworkCall
          - InboundResponse
        related_relation_ids:
          - NetworkCall-receives-InboundResponse
        expected_result:
          zh: 建立 net-call-884 receives in-resp-884。
          en: Assert net-call-884 receives in-resp-884.
          ja: net-call-884 receives in-resp-884 を主張します。
        why_valid_or_invalid:
          zh: 协议和连接关联明确证明响应归属。
          en: Protocol and connection correlation clearly prove response membership.
          ja: protocol/connection correlation が response membership を証明します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-network-call-002
      - id: NetworkCall-receives-InboundResponse-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 旁路抓包响应
          en: Uncorrelated packet capture
          ja: uncorrelated packet capture
        scenario_id: network-relation-networkcall-receives-inboundresponse-boundary
        descriptions:
          zh: 抓包看见同一主机的 HTTP 200，但缺少 stream ID、请求标识和连接四元组，可能属于另一并发调用。
          en: A packet capture sees HTTP 200 from the same host but lacks stream ID, request identity, and connection tuple and may belong to another concurrent call.
          ja: packet capture は same host HTTP 200 を示しますが stream ID・request ID・connection tuple がなく別 concurrent call の可能性があります。
        field_values: {}
