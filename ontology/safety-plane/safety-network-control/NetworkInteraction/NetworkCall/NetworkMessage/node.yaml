schema: moonweave.ai/ontology-node/v1
id: NetworkMessage
kind: concept
labels:
  zh: 网络消息
  en: network message
  ja: ネットワークメッセージ
semantics:
  short_definition:
    zh: 一次 NetworkCall 中的协议层请求或响应消息单元。
    en: A protocol-layer request or response message unit within one NetworkCall.
    ja: 一回 NetworkCall 内の protocol-layer request/response message 単位。
  definition:
    zh: NetworkMessage 是 NetworkCall 内的消息 genus，分为 OutboundRequest 与 InboundResponse 子类。它保留 HTTP 方法、authority、headers 摘要、status code 与 protocol correlation ID（stream ID、request ID）；不是 ToolResult 解析结果或 SideEffect 证据。
    en: "NetworkMessage is the message genus within NetworkCall with OutboundRequest and InboundResponse subtypes. It retains HTTP method, authority, header digests, status code, and protocol correlation IDs (stream ID, request ID); it is not parsed ToolResult or SideEffect evidence."
    ja: NetworkMessage は NetworkCall 内 message genus で OutboundRequest/InboundResponse subtype を持つ。HTTP method/authority/header digest/status code/protocol correlation ID（stream ID/request ID）を保持。parsed ToolResult/SideEffect evidence ではない。
  why_needed:
    zh: 消息层与调用层分离后，才能在 HTTP/2 并发流上把 InboundResponse 精确 responds_to OutboundRequest，而不只凭 Host 共现。
    en: Separating message layer from call layer precisely correlates InboundResponse responds_to OutboundRequest on HTTP/2 concurrent streams rather than Host co-occurrence alone.
    ja: message layer/call layer 分離後 HTTP/2 並行 stream で InboundResponse responds_to OutboundRequest を Host 共起だけでなく precise correlate できます。
  includes:
    - zh: 含 OutboundRequest、InboundResponse、protocol correlation ID 与 header/body digest（非明文敏感 body）。
      en: Includes OutboundRequest, InboundResponse, protocol correlation IDs, and header or body digests without plaintext sensitive body.
      ja: OutboundRequest/InboundResponse/protocol correlation ID/header/body digest（plaintext sensitive body なし）を含む。
  excludes:
    - zh: 不包含 ToolResult、NetworkPolicy 规则、TLS 证书 store 或 DNS 缓存条目。
      en: Excludes ToolResult, NetworkPolicy rules, TLS certificate store, or DNS cache entries.
      ja: ToolResult/NetworkPolicy rule/TLS certificate store/DNS cache entry は含まない。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成：每个 OutboundRequest 与 InboundResponse 是 NetworkMessage 实例；audit log 记录 method、URL authority、status、correlation_id；body 仅存 digest 除非 policy 允许。
    en: "Integration: each OutboundRequest and InboundResponse is a NetworkMessage instance; audit logs record method, URL authority, status, correlation_id; store body digest only unless policy allows."
    ja: 統合：各 OutboundRequest/InboundResponse は NetworkMessage instance。audit log が method/URL authority/status/correlation_id 記録。policy 許可時以外 body は digest のみ。
  typical_input:
    - description: HTTP request message at egress boundary.
      format: |
        method: GET
        authority: api.example.com
        path: /v1/resources
      source_claims:
        - claim-network-message-rfc9110
  typical_output:
    - description: Correlated response message.
      format: |
        status: 200
        correlation_id: stream-17
        responds_to: out-req-884
      source_claims:
        - claim-network-message-design
  reference_implementations:
    - name: RFC 9110 HTTP Semantics
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      description: HTTP request and response message structure.
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: NetworkMessage-http-pair
    labels:
      zh: HTTP 请求响应对
      en: HTTP request-response pair
      ja: HTTP request-response pair
    descriptions:
      zh: out-req-884 GET api.example.com 与 in-resp-884 200 通过 HTTP/2 stream 17 关联。
      en: out-req-884 GET api.example.com and in-resp-884 200 correlated via HTTP/2 stream 17.
      ja: out-req-884 GET api.example.com と in-resp-884 200 が HTTP/2 stream 17 で correlate。
    example_source:
      product: RFC 9110
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      version: HTTP messages
    field_values:
      correlation_id: stream-17
    related_node_ids:
      - NetworkMessage
      - OutboundRequest
      - InboundResponse
    related_relation_ids:
      - InboundResponse-responds_to-OutboundRequest
    source_claims:
      - claim-network-message-rfc9110
  - id: NetworkMessage-redirect-response
    labels:
      zh: 重定向响应消息
      en: Redirect response message
      ja: redirect response message
    descriptions:
      zh: "in-resp-302 含 Location http://169.254.169.254/；触发新 OutboundRequest 链而非继承 allow。"
      en: in-resp-302 includes Location http://169.254.169.254/; triggers new OutboundRequest chain without inheriting allow.
      ja: in-resp-302 Location http://169.254.169.254/ 含む。新 OutboundRequest chain trigger、allow 継承なし。
    example_source:
      product: OWASP SSRF
      url: https://owasp.org/www-community/attacks/Server_Side_Request_Forgery
      version: redirect SSRF
    field_values:
      status: 302
    related_node_ids:
      - NetworkMessage
      - InboundResponse
      - OutboundRequest
    related_relation_ids: []
    source_claims:
      - claim-network-message-design
  - id: NetworkMessage-toolresult-boundary
    labels:
      zh: ToolResult 非网络消息
      en: ToolResult is not network message
      ja: ToolResult は network message ではない
    descriptions:
      zh: 解析后的 MCP Tool Result 是 tool-invocation-execution 事实，不是 NetworkMessage。
      en: Parsed MCP Tool Result is a tool-invocation-execution fact, not NetworkMessage.
      ja: 解析後 MCP Tool Result は tool-invocation-execution fact で NetworkMessage ではない。
    example_source:
      product: MCP
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/server/tools/
      version: Tool Result
    field_values:
      accepted: false
    related_node_ids:
      - NetworkMessage
    related_relation_ids: []
    source_claims:
      - claim-network-message-mcp
  - id: NetworkMessage-concurrent-correlation
    labels:
      zh: 并发关联要求
      en: Concurrent correlation requirement
      ja: 並行 correlate 要求
    descriptions:
      zh: 两并发 GET api.example.com 不能仅因 Host 相同关联响应；必须 stream ID 或 request ID。
      en: Two concurrent GET api.example.com cannot correlate responses by Host alone; stream ID or request ID required.
      ja: 並行 GET api.example.com 二件は Host だけで response correlate 不可。stream ID/request ID 必須。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: response correlation
    field_values:
      host_co_occurrence_sufficient: false
    related_node_ids:
      - NetworkMessage
      - OutboundRequest
      - InboundResponse
    related_relation_ids: []
    source_claims:
      - claim-network-message-design
