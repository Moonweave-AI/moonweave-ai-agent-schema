    ja: ネットワーク呼出しの一部
  definitions:
    zh: NetworkMessage 是 NetworkCall 内的协议消息组成部分。
    en: NetworkMessage is the protocol message component within NetworkCall.
    ja: NetworkMessage は NetworkCall 内 protocol message 構成部分。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一次 call 可有多条 message（redirect、retry）。
    en: One call may have multiple messages from redirects or retries.
    ja: 一 call に redirect/retry 由来複数 message 可。
  inverse_reading:
    predicate: contains
    labels:
      zh: 包含网络消息
      en: contains network message
      ja: ネットワークメッセージを含む
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-network-message-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
