schema: moonweave.ai/ontology-node/v1
id: NetworkMessage
kind: concept
status: accepted
labels:
  zh: 网络消息
  en: network message
  ja: network message
semantics:
  short_definition:
    zh: 在网络交互中按协议传送的请求或响应信息。
    en: Protocol-structured request or response information carried in a network interaction.
    ja: network interaction で運ばれる protocol-structured request/response information。
  definition:
    zh: 网络消息是一种信息，以消息标识、发生时间、协议、头或元数据、正文引用和敏感级别为身份，表示可在网络交互中编码和传送的请求或响应。它不是通信发生本身、对端实体、连接路径或会话中的自然语言 Message。
    en: A NetworkMessage is information identified by message ID, occurrence time, protocol, headers or metadata, body reference, and sensitivity classification, representing a request or response encodable and transferable in a network interaction. It is not the communication occurrence itself, a peer Entity, a connection route, or a conversational natural-language Message.
    ja: NetworkMessage は message ID・occurrence time・protocol・header/metadata・body reference・sensitivity classification で識別する information で network interaction 内で encode/transfer 可能な request/response を表します。communication occurrence・peer Entity・connection route・conversational Message ではありません。
  why_needed:
    zh: 为出站请求和入站响应提供真正共同上位类，同时避免把协议载荷混成调用事件或会话消息。
    en: It supplies a genuine common genus for outbound requests and inbound responses without collapsing protocol payloads into call events or conversational messages.
    ja: outbound request/inbound response の genuine common genus を与え protocol payload を call event/conversational message と混同しません。
  includes:
    - zh: HTTP 请求与响应、网络 RPC 请求与结果信封，以及带协议元数据的代理应答。
      en: HTTP requests and responses, network-RPC request and result envelopes, and proxy replies carrying protocol metadata.
      ja: HTTP request/response・network-RPC request/result envelope・protocol metadata 付き proxy reply。
  excludes:
    - zh: 连接事件、网络端点、路由选择、策略决定、对话中的用户消息和未发送的业务对象。
      en: Connection events, network endpoints, route selections, policy decisions, conversational user messages, and unsent business objects.
      ja: connection event・network endpoint・route selection・policy decision・conversational user message・unsent business object。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - message_id
    - occurred_at
  fields:
    - id: message_id
      labels:
        zh: 消息标识
        en: message ID
        ja: message ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一份协议级请求或响应消息。
        en: Stable identifier for one protocol-level request or response message.
        ja: 一 protocol-level request/response message の stable identifier。
      allowed_values: []
      pattern: null
      example_value: net-msg-884
      source_claims:
        - claim-network-message-001
        - claim-network-message-003
    - id: occurred_at
      labels:
        zh: 消息时间
        en: message time
        ja: message time
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录消息被构造、接收或确认的事件时间。
        en: Records when the message was constructed, received, or acknowledged.
        ja: message が constructed・received・acknowledged された時刻。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T02:31:04Z
      source_claims:
        - claim-network-message-001
    - id: protocol
      labels:
        zh: 协议
        en: protocol
        ja: protocol
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明解释消息结构与语义的协议。
        en: States the protocol that defines the message structure and semantics.
        ja: message structure/semantics を定義する protocol。
      allowed_values: []
      pattern: null
      example_value: HTTP/2
      source_claims:
        - claim-network-message-001
        - claim-network-message-003
    - id: headers_or_metadata
      labels:
        zh: 头或元数据
        en: headers or metadata
        ja: headers or metadata
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 保存不属于正文的控制字段、头、状态或协议元数据。
        en: Stores control fields, headers, status, or protocol metadata outside the body.
        ja: body 外の control field・header・status・protocol metadata。
      allowed_values: []
      pattern: null
      example_value:
        :method: GET
        :authority: api.example.com
      source_claims:
        - claim-network-message-001
        - claim-network-message-003
    - id: body_reference
      labels:
        zh: 正文引用
        en: body reference
        ja: body reference
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用消息内容而不在图节点中复制潜在敏感正文。
        en: References message content without copying potentially sensitive body data into the graph node.
        ja: potentially sensitive body data を graph node に複製せず参照します。
      allowed_values: []
      pattern: null
      example_value: artifact-body-884
      source_claims:
        - claim-network-message-001
    - id: sensitive_data_classification
      labels:
        zh: 敏感级别
        en: sensitive-data classification
        ja: sensitive-data classification
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录传输与披露控制所需的数据分类。
        en: Records the data classification needed for transport and disclosure control.
        ja: transport/disclosure control に必要な data classification。
      allowed_values: []
      pattern: null
      example_value: internal
      source_claims:
        - claim-network-message-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: NetworkMessage-example-positive-manual-20260716
    kind: positive
    labels:
      zh: HTTP 请求消息
      en: HTTP request message
      ja: HTTP request message
    scenario_id: null
    descriptions:
      zh: net-msg-884 保存 HTTP/2 :method=GET、:authority=api.example.com、正文引用为空和 internal 分类，随后作为 OutboundRequest 发起调用。
      en: net-msg-884 stores HTTP/2 :method=GET, :authority=api.example.com, no body, and internal classification before acting as the OutboundRequest for a call.
      ja: net-msg-884 は HTTP/2 :method=GET・:authority・body 無し・internal classification を保持し OutboundRequest として call を開始します。
    field_values:
      message_id: net-msg-884
      occurred_at: 2026-07-16T02:31:04Z
      protocol: HTTP/2
      headers_or_metadata:
        :method: GET
        :authority: api.example.com
      body_reference: null
      sensitive_data_classification: internal
    related_node_ids:
      - NetworkMessage
      - OutboundRequest
    related_relation_ids:
      - OutboundRequest-is_a-NetworkMessage
    expected_result:
      zh: 建立 NetworkMessage，并由 OutboundRequest 添加方向种差。
      en: Create a NetworkMessage specialized by OutboundRequest's direction differentia.
      ja: NetworkMessage を作り OutboundRequest direction differentia で specialize します。
    why_valid_or_invalid:
      zh: 记录具有可编码协议结构和消息身份，而不是连接发生身份。
      en: The record has encodable protocol structure and message identity rather than connection-occurrence identity.
      ja: encodable protocol structure/message identity を持ち connection occurrence identity ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-network-message-001
  - id: NetworkMessage-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 已验证的服务端点
      en: Verified service endpoint
      ja: verified service endpoint
    scenario_id: network-review-networkmessage-boundary
    descriptions:
      zh: api.example.com:443 具有 TLS 身份和信任区，但没有请求、响应、控制字段或正文。
      en: api.example.com:443 has TLS identity and a trust zone but no request, response, control fields, or body.
      ja: api.example.com:443 は TLS identity/trust zone を持ちますが request・response・control field・body がありません。
    field_values: {}
    related_node_ids:
      - NetworkEndpoint
    related_relation_ids: []
    expected_result:
      zh: 分类为 NetworkEndpoint，不分类为 NetworkMessage。
      en: Classify it as NetworkEndpoint, not NetworkMessage.
      ja: NetworkEndpoint と分類し NetworkMessage にはしません。
    why_valid_or_invalid:
      zh: 可寻址实体不是在交互中传送的信息。
      en: An addressable Entity is not information transferred in an interaction.
      ja: addressable Entity は interaction で transferred される information ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-network-message-002
      - claim-network-message-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: NetworkCall-exchanges-NetworkMessage
  predicate: exchanges
  direction: source-to-target
  relation_kind: information
  labels:
    zh: 交换网络消息
    en: exchanges network message
    ja: network message を交換
  definitions:
    zh: NetworkCall 交换 NetworkMessage，表示该调用的协议执行实际发送、接收或按协议关联了具有独立 message_id 的请求或响应记录；只有消息身份、方向、发生时间和调用关联均可核对时才建立此事实。
    en: A NetworkCall exchanges a NetworkMessage when that call's protocol execution actually sends, receives, or protocol-correlates a request or response with an independent message ID. The fact requires verifiable message identity, direction, occurrence time, and call association.
    ja: NetworkCall exchanges NetworkMessage は call の protocol execution が独立 message ID を持つ request/response を実際に send・receive・protocol-correlate した事実です。message identity・direction・occurrence time・call association を検証できる場合だけ成立します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一个调用可交换一个或多个协议消息，流式、多阶段和重定向协议的数量不同，因此类级本体不强加统一最大基数。
    en: A call may exchange one or many protocol messages, and streaming, multi-stage, and redirect protocols differ in count, so the class-level ontology imposes no universal maximum.
    ja: 一 call が交換する protocol message 数は streaming・multi-stage・redirect protocol で異なるため class-level ontology は universal maximum を課しません。
  inverse_reading:
    predicate: is_exchanged_by
    labels:
      zh: 由网络调用交换
      en: is exchanged by network call
      ja: network call により交換
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: NetworkCall-exchanges-NetworkMessage-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 同一调用中的请求与响应
        en: Request and response in one call
        ja: 同一 call の request/response
      scenario_id: network-relation-call-exchanges-message-positive
      descriptions:
        zh: net-call-884 的协议轨迹记录发送 out-req-884，并在同一相关标识下接收 in-res-884；两条记录都有 message_id、方向、发生时间和 HTTP 元数据。
        en: The protocol trace for net-call-884 records sending out-req-884 and receiving in-res-884 under the same correlation identity; both records have a message ID, direction, occurrence time, and HTTP metadata.
        ja: net-call-884 の protocol trace は out-req-884 の送信と同一 correlation identity での in-res-884 受信を記録し、両 record に message ID・direction・occurrence time・HTTP metadata があります。
      field_values: {}
      related_node_ids:
        - NetworkCall
        - NetworkMessage
        - OutboundRequest
        - InboundResponse
      related_relation_ids:
        - NetworkCall-exchanges-NetworkMessage
        - OutboundRequest-initiates-NetworkCall
        - NetworkCall-receives-InboundResponse
        - InboundResponse-responds_to-OutboundRequest
      expected_result:
        zh: 分别建立 net-call-884 exchanges out-req-884 与 net-call-884 exchanges in-res-884，并保留请求和响应的独立消息身份。
        en: Assert net-call-884 exchanges out-req-884 and net-call-884 exchanges in-res-884 separately while preserving the independent identity of each message.
        ja: net-call-884 exchanges out-req-884 と net-call-884 exchanges in-res-884 を別々に主張し、各 message の独立 identity を保持します。
      why_valid_or_invalid:
        zh: 发送与接收轨迹把两条消息的标识、方向和时间绑定到同一调用，而不是仅凭日志中共同出现或相同 URL 推断关系。
        en: Send and receive traces bind each message's identity, direction, and time to the same call rather than inferring the edge from log co-occurrence or a shared URL.
        ja: send/receive trace が各 message の identity・direction・time を同一 call に bind し、log 共起や同一 URL だけから edge を推論していません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-network-message-004
    - id: NetworkCall-exchanges-NetworkMessage-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 未发送的序列化正文
        en: Serialized but unsent body
        ja: serialize 済み未送信 body
      scenario_id: network-relation-call-exchanges-message-boundary
      descriptions:
        zh: 退款 JSON 已序列化并写入调试 Artifact，但用户在网络调用开始前取消；记录中没有 message_id、发送方向、发生时间或 NetworkCall 关联。
        en: A refund JSON body is serialized into a debugging Artifact, but the user cancels before any network call starts; no message ID, send direction, occurrence time, or NetworkCall association exists.
        ja: refund JSON body は debugging Artifact に serialize されましたが network call 開始前に user cancel され、message ID・send direction・occurrence time・NetworkCall association がありません。
      field_values: {}
      related_node_ids:
        - NetworkCall
        - NetworkMessage
      related_relation_ids:
        - NetworkCall-exchanges-NetworkMessage
      expected_result:
        zh: 保留该 JSON 为调试制品或请求草稿，但不得建立任何 NetworkCall exchanges NetworkMessage 实例事实。
        en: Retain the JSON as a debugging artifact or request draft, but assert no NetworkCall exchanges NetworkMessage instance fact.
        ja: JSON を debugging artifact または request draft として保持しても NetworkCall exchanges NetworkMessage instance fact は主張しません。
      why_valid_or_invalid:
        zh: 可序列化内容并不等于已经交换的协议消息；缺少发生时间、方向、消息身份与调用轨迹，无法证明网络交换。
        en: Serializable content is not an exchanged protocol message; without occurrence time, direction, message identity, and a call trace, no network exchange is evidenced.
        ja: serializable content は exchanged protocol message ではなく、occurrence time・direction・message identity・call trace がないため network exchange を証明できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-network-message-005
  source_claims:
    - claim-network-message-006
    - claim-network-message-007
  distinct_fact_rationale:
    zh: NetworkMessage 是带独立身份的信息，NetworkCall 是发生事件；exchanges 在不把二者伪装成同类的前提下记录消息确实属于该调用的协议轨迹。
    en: NetworkMessage is independently identified information and NetworkCall is an occurrence; exchanges records protocol-trace membership without pretending that the two are the same kind of thing.
    ja: NetworkMessage は独立 identity を持つ information、NetworkCall は occurrence であり、exchanges は両者を同種と偽らず protocol trace membership を記録します。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-safety-verification
  reviewed_on: 2026-07-17
  note:
    zh: Verified against Cursor sandbox.json egress control, HTTP/SOCKS proxy semantics, and network policy patterns; endpoint, policy, and call lifecycle modeling hold.
    en: Verified against Cursor sandbox.json egress control, HTTP/SOCKS proxy semantics, and network policy patterns; endpoint, policy, and call lifecycle modeling hold.
    ja: Verified against Cursor sandbox.json egress control, HTTP/SOCKS proxy semantics, and network policy patterns; endpoint, policy, and call lifecycle modeling hold.
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-network-message-001
    source: eng-proto-rfc9110-http-semantics
    supports: RFC 9110 distinguishes HTTP request and response messages, target resources and authorities, origin servers, proxy intermediaries, direct versus proxy routing, redirects, and response status; Moonweave places these protocol facts under broader network concepts.
    locator: RFC 9110 Sections 3.1-3.7, 4.2-4.3, 6, 7.1-7.4, 10.2, and 15.4
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-network-message-002
    source: eng-network-nist-zero-trust
    supports: NIST SP 800-207 distinguishes an access request, per-resource policy decision, policy administrator, policy enforcement point, and the communication path that is enabled, monitored, and terminated; Moonweave uses those distinctions to separate policy, interaction occurrence, endpoint, and effective route evidence.
    locator: NIST SP 800-207 Sections 2.1-2.2 and 3.2, policy engine, policy administrator, and policy enforcement point
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-network-message-003
    source: eng-proto-rfc1928-socks5
    supports: RFC 1928 defines SOCKS client-to-server negotiation, authentication selection, CONNECT/BIND/UDP ASSOCIATE commands, IPv4/domain/IPv6 addressing, relay establishment, and denial replies; Moonweave treats SOCKSProxy as a protocol-specific Proxy subtype.
    locator: RFC 1928 Sections 3-7, TCP client procedure, requests, addressing, replies, and UDP client procedure
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-network-message-004
    source: eng-proto-rfc9110-http-semantics
    supports: RFC 9110 distinguishes request and response messages, their control data and content, message routing, request correlation, and response semantics; Moonweave uses those protocol distinctions to bind independently identified network messages to the call that exchanged them.
    locator: RFC 9110 Sections 6, 7.1-7.4, and 10, message abstraction, routing, correlation, and context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-network-message-005
    source: eng-proto-rfc9110-http-semantics
    supports: RFC 9110 defines HTTP messages as request or response messages with control data, headers, content, and processing context; Moonweave therefore excludes an unsent serialized body that never acquired message occurrence and call-correlation evidence.
    locator: RFC 9110 Section 6, Message Abstraction, especially message framing, control data, header fields, and content
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-network-message-006
    source: eng-proto-rfc9110-http-semantics
    supports: RFC 9110 defines request and response messages and the routing and correlation context in which they are exchanged; Moonweave represents the occurrence-level association between a NetworkCall and each independently identified NetworkMessage as exchanges.
    locator: RFC 9110 Sections 6, 7.1-7.4, and 10, message abstraction, routing, correlation, and context
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-network-message-007
    source: eng-network-nist-zero-trust
    supports: NIST SP 800-207 separates an access request, the communication path enabled by policy enforcement, and continuous monitoring; Moonweave keeps message information distinct from the call occurrence while connecting both through an auditable exchange fact.
    locator: NIST SP 800-207 Sections 2.1-2.2 and 3.2, access request, policy enforcement point, and communication path
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
