    source: rfc9110-http
    supports: RFC 9110 defines HTTP request/response messages mappable to NetworkMessage with authority and status.
    locator: HTTP messages
    evidence_kind: official
    confidence: high
  - id: claim-network-message-mcp
    source: mcp-tools-2025-06-18
    supports: MCP Tool Result is parsed separately from raw protocol NetworkMessage facts.
    locator: Tool Result
    evidence_kind: official
    confidence: high
  - id: claim-network-message-design
    source: safety-network-design
    supports: Moonweave requires protocol correlation IDs for InboundResponse responds_to OutboundRequest under concurrency.
    locator: NetworkMessage correlation
    evidence_kind: design-inference
    confidence: high
