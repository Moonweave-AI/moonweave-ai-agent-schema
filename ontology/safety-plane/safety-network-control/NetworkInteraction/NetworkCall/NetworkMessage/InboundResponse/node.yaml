schema: moonweave.ai/ontology-node/v1
id: InboundResponse
kind: concept
status: accepted
labels:
  zh: 入站响应
  en: inbound response
  ja: inbound response
semantics:
  short_definition:
    zh: 从经识别远端返回并对应既有出站请求的响应消息。
    en: A response message returned from an identified remote endpoint for an existing outbound request.
    ja: identified remote endpoint から existing outbound request に返る response message。
  definition:
    zh: 入站响应是一种 NetworkMessage，其种差是从远端或代理方向进入受控主体，带状态或结果码、响应端点引用、内容引用、接收时间及可选重定向位置，并通过 responds_to 对应一个 OutboundRequest。它不是调用事件、远端端点或已经通过内容安全审查的 ToolResult。
    en: An InboundResponse is a NetworkMessage distinguished by arrival from a remote or proxy direction with status or result code, responding-endpoint reference, content reference, receive time, optional redirect location, and a responds_to link to one OutboundRequest. It is not the call event, remote endpoint, or a ToolResult whose content has already passed safety review.
    ja: InboundResponse は remote/proxy 方向から controlled subject へ到着し status/result code・responding endpoint ref・content ref・receive time・optional redirect location と一 OutboundRequest への responds_to を持つ NetworkMessage です。call event・remote endpoint・content safety review 済み ToolResult ではありません。
  why_needed:
    zh: 明确响应与请求、调用和端点的关系后，才能验证来源、重定向链和内容处理，而不把远端输入直接当作可信工具结果。
    en: Relating response explicitly to request, call, and endpoint enables provenance, redirect-chain, and content handling checks without treating remote input as a trusted tool result.
    ja: response を request/call/endpoint に明示接続し remote input を trusted tool result とせず provenance・redirect chain・content handling を検査できます。
  includes:
    - zh: HTTP 响应、SOCKS 回复和远程协议的结果消息，包括拒绝与重定向响应。
      en: HTTP responses, SOCKS replies, and result messages from remote protocols, including denial and redirect responses.
      ja: HTTP response・SOCKS reply・remote protocol result message（denial/redirect を含む）。
  excludes:
    - zh: NetworkCall 事件、NetworkEndpoint 实体、输出给模型的 ToolResult 和没有请求关联的抓包片段。
      en: NetworkCall events, NetworkEndpoint Entities, ToolResult exposed to a model, and packet fragments with no request correlation.
      ja: NetworkCall event・NetworkEndpoint Entity・model 向け ToolResult・request correlation のない packet fragment。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - status_or_result_code
    - responding_endpoint_ref
  fields:
    - id: status_or_result_code
      labels:
        zh: 状态或结果码
        en: status or result code
        ja: status or result code
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录协议定义的响应状态、回复码或结果类别。
        en: Records the protocol-defined response status, reply code, or result class.
        ja: protocol-defined response status・reply code・result class。
      allowed_values: []
      pattern: null
      example_value: "302"
      source_claims:
        - claim-inbound-response-001
        - claim-inbound-response-002
    - id: responding_endpoint_ref
      labels:
        zh: 响应端点引用
        en: responding-endpoint reference
        ja: responding-endpoint reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际返回响应且完成身份验证的端点。
        en: References the verified endpoint that actually returned the response.
        ja: 実際に response を返し identity verification 済みの endpoint。
      allowed_values: []
      pattern: null
      example_value: endpoint-api-example-443
      source_claims:
        - claim-inbound-response-001
        - claim-inbound-response-003
    - id: content_reference
      labels:
        zh: 内容引用
        en: content reference
        ja: content reference
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用响应正文，不在关系图中复制不可信内容。
        en: References response content without copying untrusted body data into the relation graph.
        ja: untrusted body data を relation graph にコピーせず参照します。
      allowed_values: []
      pattern: null
      example_value: artifact-response-884
      source_claims:
        - claim-inbound-response-001
    - id: received_at
      labels:
        zh: 接收时间
        en: received at
        ja: received at
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录受控边界接收响应的时间。
        en: Records when the controlled boundary received the response.
        ja: controlled boundary が response を受信した時刻。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T02:31:05Z
      source_claims:
        - claim-inbound-response-001
    - id: redirect_location
      labels:
        zh: 重定向位置
        en: redirect location
        ja: redirect location
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 若响应要求重定向，保存未经自动信任的新目标引用以供重新解析和授权。
        en: For a redirect response, preserves the new target reference without automatically trusting it, so it can be resolved and authorized again.
        ja: redirect response の new target ref を自動 trust せず保存し再 resolution/authorization します。
      allowed_values: []
      pattern: null
      example_value: https://cdn.example.net/job/884
      source_claims:
        - claim-inbound-response-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: InboundResponse-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 需重新授权的重定向响应
      en: Redirect requiring reauthorization
      ja: reauthorization 必須 redirect
    scenario_id: null
    descriptions:
      zh: in-resp-884 从已验证 api.example.com 端点返回 302 与 Location=https://cdn.example.net/job/884，并通过 responds_to 关联 out-req-884；新 authority 尚未获准。
      en: in-resp-884 returns 302 from verified api.example.com with Location=https://cdn.example.net/job/884 and responds_to out-req-884; the new authority is not yet authorized.
      ja: in-resp-884 は verified api.example.com から 302/Location を返し out-req-884 に responds_to しますが new authority は未 authorization です。
    field_values:
      message_id: in-resp-884
      occurred_at: 2026-07-16T02:31:05Z
      protocol: https
      status_or_result_code: "302"
      responding_endpoint_ref: endpoint-api-example-443
      content_reference: artifact-response-884
      received_at: 2026-07-16T02:31:05Z
      redirect_location: https://cdn.example.net/job/884
    related_node_ids:
      - InboundResponse
      - OutboundRequest
      - NetworkEndpoint
      - NetworkMessage
    related_relation_ids:
      - InboundResponse-is_a-NetworkMessage
      - InboundResponse-responds_to-OutboundRequest
    expected_result:
      zh: 记录响应和重定向目标，并要求新调用重新解析与策略判断。
      en: Record the response and redirect target and require a new call to resolve and evaluate policy again.
      ja: response/redirect target を記録し new call で再 resolution/policy evaluation を要求します。
    why_valid_or_invalid:
      zh: 响应来源和原请求均明确，但重定向 authority 不继承原端点许可。
      en: Response source and original request are explicit, while redirect authority does not inherit the original endpoint allowance.
      ja: response source/original request は明確でも redirect authority は original endpoint allowance を継承しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-inbound-response-001
      - claim-inbound-response-003
  - id: InboundResponse-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 模型可见的工具结果
      en: Model-visible tool result
      ja: model-visible tool result
    scenario_id: network-review-inboundresponse-boundary
    descriptions:
      zh: 系统已解析、扫描并裁剪远端响应，转换成带成功标志的 ToolResult 供模型消费；原始网络状态码和端点证据另行保留。
      en: The system parsed, scanned, and trimmed a remote response into a success-flagged ToolResult for model consumption, while raw status and endpoint evidence remain separate.
      ja: system は remote response を parse/scan/trim し model 向け ToolResult に変換、raw status/endpoint evidence は別保持します。
    field_values: {}
    related_node_ids:
      - ToolResult
      - InboundResponse
    related_relation_ids: []
    expected_result:
      zh: ToolResult 与 InboundResponse 保持两个节点并以处理关系连接。
      en: Keep ToolResult and InboundResponse as two nodes connected by processing provenance.
      ja: ToolResult/InboundResponse を二 node とし processing provenance で接続します。
    why_valid_or_invalid:
      zh: 协议输入与经安全处理的工具输出具有不同内容和信任边界。
      en: Protocol input and safety-processed tool output have different content and trust boundaries.
      ja: protocol input と safety-processed tool output は content/trust boundary が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-inbound-response-001
      - claim-inbound-response-003
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: OutboundRequest
    shared_parent_concept_id: NetworkMessage
    differentia:
      zh: InboundResponse 从远端返回状态与内容并对应请求；OutboundRequest 从受控主体发向目标。
      en: InboundResponse returns status and content from a remote endpoint for a request; OutboundRequest travels from the controlled subject toward a target.
      ja: InboundResponse は remote から request への status/content、OutboundRequest は controlled subject から target への message です。
    source_claims:
      - claim-inbound-response-001
parent_relation:
  id: InboundResponse-is_a-NetworkMessage
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: is a
  definitions:
    zh: InboundResponse 是 NetworkMessage 的子类：它保留协议消息身份，并增加从远端返回的状态或结果、响应端点、接收时间、内容及可选重定向位置等入站种差。
    en: "InboundResponse is a subtype of NetworkMessage: it retains protocol-message identity and adds inbound differentia of remote status or result, responding endpoint, receive time, content, and optional redirect location."
    ja: InboundResponse は NetworkMessage subtype で protocol message identity を保持し remote status/result・responding endpoint・receive time・content・optional redirect location の inbound differentia を追加します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承描述概念包含，不使用实例关系基数。
    en: Taxonomic inheritance describes concept inclusion and does not use instance-relation cardinality.
    ja: taxonomic inheritance は concept inclusion を表し instance relation cardinality を使いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 以 入站响应 为子类
      en: has subtype 入站响应
      ja: 入站响应 を subtype に持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: InboundResponse-is_a-NetworkMessage-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 入站重定向响应
        en: Inbound redirect response
        ja: inbound redirect response
      scenario_id: network-relation-inboundresponse-is_a-networkmessage-positive
      descriptions:
        zh: in-resp-884 带 message_id、HTTP/2、302 状态、响应端点、接收时间和 Location 字段。
        en: in-resp-884 carries message_id, HTTP/2, status 302, responding endpoint, receive time, and Location field.
        ja: in-resp-884 は message_id・HTTP/2・302・responding endpoint・receive time・Location を持ちます。
      field_values: {}
      related_node_ids:
        - InboundResponse
        - NetworkMessage
      related_relation_ids:
        - InboundResponse-is_a-NetworkMessage
      expected_result:
        zh: 断言 InboundResponse is_a NetworkMessage。
        en: Assert InboundResponse is_a NetworkMessage.
        ja: InboundResponse is_a NetworkMessage を主張します。
      why_valid_or_invalid:
        zh: 响应满足消息身份并具有远端返回的入站种差。
        en: The response satisfies message identity and has remote-return inbound differentia.
        ja: response は message identity/remote-return inbound differentia を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-inbound-response-001
    - id: InboundResponse-is_a-NetworkMessage-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 远端端点不是响应
        en: Remote endpoint is not response
        ja: remote endpoint は response ではない
      scenario_id: network-relation-inboundresponse-is_a-networkmessage-boundary
      descriptions:
        zh: endpoint-api-example-443 有地址、端口和证书身份，但没有状态、正文、接收时间或对应请求。
        en: endpoint-api-example-443 has address, port, and certificate identity but no status, body, receive time, or corresponding request.
        ja: endpoint-api-example-443 は address・port・certificate identity を持ちますが status・body・receive time・request がありません。
      field_values: {}
      related_node_ids:
        - InboundResponse
        - NetworkMessage
        - NetworkEndpoint
      related_relation_ids:
        - InboundResponse-is_a-NetworkMessage
      expected_result:
        zh: 不得把 NetworkEndpoint 分类为 InboundResponse。
        en: Do not classify NetworkEndpoint as InboundResponse.
        ja: NetworkEndpoint を InboundResponse と分類しません。
      why_valid_or_invalid:
        zh: 实体端点和传输消息属于不同类别。
        en: Endpoint Entity and transferred message are different categories.
        ja: endpoint Entity と transferred message は category が異なります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-inbound-response-001
        - claim-inbound-response-003
  source_claims:
    - claim-inbound-response-001
    - claim-inbound-response-002
  distinct_fact_rationale:
    zh: InboundResponse 满足 NetworkMessage 的全部身份条件并增加不可替换的种差。
    en: InboundResponse satisfies every identity condition of NetworkMessage and adds a non-substitutable differentia.
    ja: InboundResponse は NetworkMessage の全 identity condition を満たし non-substitutable differentia を追加します。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: InboundResponse-responds_to-OutboundRequest
    predicate: responds_to
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 回应出站请求
      en: responds to outbound request
      ja: outbound request に responds
    definitions:
      zh: InboundResponse 通过 responds_to 指向协议相关标识、流或调用链证明其所回应的 OutboundRequest；重定向响应仍回应原请求，新目标需要新请求，不得仅按主机相同建立关联。
      en: InboundResponse points through responds_to to the OutboundRequest proven by protocol correlation ID, stream, or call chain. A redirect response still answers the original request and its new target requires a new request; host equality alone cannot establish the relation.
      ja: InboundResponse は protocol correlation ID・stream・call chain で証明された OutboundRequest を responds_to で指します。redirect response も original request への response で new target は new request を要し host equality のみでは成立しません。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: 1
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_responds_to_of
      labels:
        zh: 反向读取 responds_to
        en: is responds_to of
        ja: responds_to の inverse
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: InboundResponse-responds_to-OutboundRequest-example-positive-manual-20260716
        kind: positive
        labels:
          zh: HTTP/2 流关联
          en: HTTP/2 stream correlation
          ja: HTTP/2 stream correlation
        scenario_id: network-relation-inboundresponse-responds_to-outboundrequest-positive
        descriptions:
          zh: in-resp-884 与 out-req-884 共享 HTTP/2 stream 17 和请求 correlation ID，响应在该流结束。
          en: in-resp-884 and out-req-884 share HTTP/2 stream 17 and request correlation ID, and the response closes that stream.
          ja: in-resp-884/out-req-884 は HTTP/2 stream 17/correlation ID を共有し response が stream を close します。
        field_values: {}
        related_node_ids:
          - InboundResponse
          - OutboundRequest
        related_relation_ids:
          - InboundResponse-responds_to-OutboundRequest
        expected_result:
          zh: 建立 in-resp-884 responds_to out-req-884。
          en: Assert in-resp-884 responds_to out-req-884.
          ja: in-resp-884 responds_to out-req-884 を主張します。
        why_valid_or_invalid:
          zh: 协议关联和流生命周期唯一确定请求—响应对应。
          en: Protocol correlation and stream lifecycle uniquely determine request-response correspondence.
          ja: protocol correlation/stream lifecycle が request-response correspondence を一意にします。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-inbound-response-001
      - id: InboundResponse-responds_to-OutboundRequest-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 同主机并发响应
          en: Concurrent response from same host
          ja: same host concurrent response
        scenario_id: network-relation-inboundresponse-responds_to-outboundrequest-boundary
        descriptions:
          zh: 两个并发 GET 指向同一 authority，某响应只有 Host 信息而没有 stream、请求 ID 或调用关联。
          en: Two concurrent GETs target the same authority, while one response has only Host information and no stream, request ID, or call correlation.
          ja: 二 concurrent GET が same authority を target し response は Host のみで stream/request ID/call correlation がありません。
        field_values: {}
        related_node_ids:
          - InboundResponse
          - OutboundRequest
        related_relation_ids:
          - InboundResponse-responds_to-OutboundRequest
        expected_result:
          zh: 保持未关联，不猜测 responds_to。
          en: Keep it uncorrelated and do not guess responds_to.
          ja: uncorrelated のまま responds_to を推測しません。
        why_valid_or_invalid:
          zh: 同一 authority 无法区分并发请求。
          en: The same authority cannot distinguish concurrent requests.
          ja: same authority では concurrent request を区別できません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-inbound-response-001
    source_claims:
      - claim-inbound-response-001
    distinct_fact_rationale:
      zh: 该边连接两份消息身份，与调用 receives 事件关联互补而不重复。
      en: This edge correlates two message identities and complements, rather than duplicates, the call's receives occurrence fact.
      ja: 二 message identity を correlate し call receives occurrence fact と相補的で重複しません。
    layout_role: cross-link
    review_status: accepted
    target: concept:OutboundRequest
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-safety-verification
  reviewed_on: 2026-07-17
  note:
    zh: Verified against Cursor sandbox.json egress control, HTTP/SOCKS proxy semantics, and network policy patterns; endpoint, policy, and call lifecycle modeling hold.
    en: Verified against Cursor sandbox.json egress control, HTTP/SOCKS proxy semantics, and network policy patterns; endpoint, policy, and call lifecycle modeling hold.
    ja: Verified against Cursor sandbox.json egress control, HTTP/SOCKS proxy semantics, and network policy patterns; endpoint, policy, and call lifecycle modeling hold.
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-inbound-response-001
    source: eng-proto-rfc9110-http-semantics
    supports: RFC 9110 distinguishes HTTP request and response messages, target resources and authorities, origin servers, proxy intermediaries, direct versus proxy routing, redirects, and response status; Moonweave places these protocol facts under broader network concepts.
    locator: RFC 9110 Sections 3.1-3.7, 4.2-4.3, 6, 7.1-7.4, 10.2, and 15.4
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-inbound-response-002
    source: eng-proto-rfc1928-socks5
    supports: RFC 1928 defines SOCKS client-to-server negotiation, authentication selection, CONNECT/BIND/UDP ASSOCIATE commands, IPv4/domain/IPv6 addressing, relay establishment, and denial replies; Moonweave treats SOCKSProxy as a protocol-specific Proxy subtype.
    locator: RFC 1928 Sections 3-7, TCP client procedure, requests, addressing, replies, and UDP client procedure
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-inbound-response-003
    source: eng-network-nist-zero-trust
    supports: NIST SP 800-207 distinguishes an access request, per-resource policy decision, policy administrator, policy enforcement point, and the communication path that is enabled, monitored, and terminated; Moonweave uses those distinctions to separate policy, interaction occurrence, endpoint, and effective route evidence.
    locator: NIST SP 800-207 Sections 2.1-2.2 and 3.2, policy engine, policy administrator, and policy enforcement point
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
