schema: moonweave.ai/ontology-node/v1
id: InboundResponse
kind: concept
labels:
  zh: 入站响应
  en: inbound response
  ja: 受信応答
semantics:
  short_definition:
    zh: 与特定 OutboundRequest 协议关联的入站响应消息。
    en: An inbound response message protocol-correlated to a specific OutboundRequest.
    ja: 特定 OutboundRequest と protocol correlate する inbound response message。
  definition:
    zh: InboundResponse 是 NetworkMessage 的入站特化，拥有 response_id、status code、header digest、correlation_id 与 responds_to OutboundRequest 引用。它保留 raw protocol 事实供 tool 域引用，但 ToolResult 归 tool-invocation-execution。302 redirect 响应触发新 OutboundRequest 链，不得继承原 allow。
    en: "InboundResponse is the inbound specialization of NetworkMessage with response_id, status code, header digest, correlation_id, and responds_to OutboundRequest reference. It retains raw protocol facts for tool-domain reference but ToolResult belongs to tool-invocation-execution. A 302 redirect response triggers a new OutboundRequest chain without inheriting the original allow."
    ja: InboundResponse は NetworkMessage の inbound 特化で response_id/status code/header digest/correlation_id/responds_to OutboundRequest reference を持つ。raw protocol fact を tool domain 参照用保持するが ToolResult は tool-invocation-execution。302 redirect response は新 OutboundRequest chain trigger、原 allow 継承不可。
  why_needed:
    zh: 响应与请求精确关联后，才能在并发 HTTP/2 流上证明 in-resp-884 回答 out-req-884，并检测 302 到 metadata endpoint 的 SSRF 风险。
    en: Precise response-to-request correlation proves in-resp-884 answers out-req-884 on concurrent HTTP/2 streams and detects SSRF risk from 302 to metadata endpoints.
    ja: response/request precise correlate 後 HTTP/2 並行 stream で in-resp-884 が out-req-884 応答を証明し 302 metadata endpoint SSRF risk 検出可。
  includes:
    - zh: 含 status、correlation_id、responds_to、Location header（redirect）与 body digest。
      en: Includes status, correlation_id, responds_to, Location header for redirects, and body digest.
      ja: status/correlation_id/responds_to/Location header（redirect）/body digest を含む。
  excludes:
    - zh: 不包含 ToolResult 解析、SideEffect 事件、NetworkPolicy 或 OutboundRequest 发起记录。
      en: Excludes ToolResult parsing, SideEffect event, NetworkPolicy, or OutboundRequest initiation record.
      ja: ToolResult parse/SideEffect event/NetworkPolicy/OutboundRequest initiation record は含まない。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成：HTTP/2 stream 17 in-resp-884 status=200 responds_to out-req-884；302 in-resp-302 Location metadata IP 触发 authorization_chain_complete=false；MCP 工具域可引用 raw InboundResponse 再解析为 ToolResult。
    en: "Integration: HTTP/2 stream 17 in-resp-884 status=200 responds_to out-req-884; 302 in-resp-302 Location metadata IP triggers authorization_chain_complete=false; MCP tool domain may reference raw InboundResponse before parsing ToolResult."
    ja: 統合：HTTP/2 stream 17 in-resp-884 status=200 responds_to out-req-884。302 in-resp-302 Location metadata IP authorization_chain_complete=false。MCP tool domain raw InboundResponse 参照後 ToolResult parse 可。
  typical_input:
    - description: HTTP response correlated to outbound request.
      format: |
        response_id: in-resp-884
        status: 200
        correlation_id: stream-17
        responds_to: out-req-884
      source_claims:
        - claim-inbound-response-design
  typical_output:
    - description: Redirect requiring new authorization chain.
      format: |
        status: 302
        location: http://169.254.169.254/latest/meta-data/
        authorization_chain_complete: false
      source_claims:
        - claim-inbound-response-design
  reference_implementations:
    - name: RFC 9110 HTTP Semantics
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      description: HTTP response status, headers, and redirect Location.
    - name: MCP Specification — Tools
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/server/tools/
      description: Raw response before ToolResult parsing.
structure:
  identity_keys:
    - response_id
  fields:
    - id: response_id
      labels:
        zh: 响应标识
        en: response ID
        ja: 応答 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 一次 InboundResponse 的唯一 ID。
        en: Unique ID of one InboundResponse.
        ja: 一回 InboundResponse の一意 ID。
      allowed_values: []
      pattern: null
      example_value: in-resp-884
      source_claims:
        - claim-inbound-response-design
    - id: status
      labels:
        zh: 状态码
        en: status code
        ja: status code
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: HTTP 或其他协议响应状态码。
        en: HTTP or other protocol response status code.
        ja: HTTP 等 protocol response status code。
      allowed_values: []
      pattern: null
      example_value: 200
      source_claims:
        - claim-inbound-response-rfc9110
    - id: correlation_id
      labels:
        zh: 协议关联标识
        en: protocol correlation ID
        ja: protocol correlation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: HTTP/2 stream ID、request ID 或 connection tuple 等并发关联键。
        en: Concurrent correlation key such as HTTP/2 stream ID, request ID, or connection tuple.
        ja: HTTP/2 stream ID/request ID/connection tuple 等並行 correlate key。
      allowed_values: []
      pattern: null
      example_value: stream-17
      source_claims:
        - claim-inbound-response-design
  constraints:
    - id: network-response-correlation-required
      severity: error
      expression_language: plain
      expression: InboundResponse responds_to OutboundRequest requires protocol correlation; Host and status alone insufficient under concurrent calls
      explanations:
        zh: 主机共现无法在并发请求间建立唯一溯源。
        en: Host co-occurrence cannot establish unique provenance across concurrent requests.
        ja: Host 共起は並行 request 間 unique provenance 確立不可。
      source_claims:
        - claim-inbound-response-design
  required_relation_constraints: []
examples:
  - id: InboundResponse-http2-correlated
    labels:
      zh: HTTP/2 关联响应
      en: HTTP/2 correlated response
      ja: HTTP/2 correlate response
    descriptions:
      zh: in-resp-884 status=200 HTTP/2 stream 17 responds_to out-req-884；call_status=completed。
      en: in-resp-884 status=200 HTTP/2 stream 17 responds_to out-req-884; call_status=completed.
      ja: in-resp-884 status=200 HTTP/2 stream 17 responds_to out-req-884。call_status=completed。
    example_source:
      product: RFC 9110
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      version: HTTP/2 correlation
    field_values:
      response_id: in-resp-884
      status: 200
      correlation_id: stream-17
    related_node_ids:
      - InboundResponse
      - OutboundRequest
      - NetworkCall
    related_relation_ids:
      - InboundResponse-responds_to-OutboundRequest
    source_claims:
      - claim-inbound-response-rfc9110
  - id: InboundResponse-metadata-redirect
    labels:
      zh: 元数据端点重定向响应
      en: Metadata endpoint redirect response
      ja: metadata endpoint redirect response
    descriptions:
      zh: api.example.com 返回 302 Location 169.254.169.254；authorization_chain_complete=false，不得跟随 inherit allow。
      en: api.example.com returns 302 Location 169.254.169.254; authorization_chain_complete=false, must not follow inheriting allow.
      ja: api.example.com 302 Location 169.254.169.254。authorization_chain_complete=false、allow 継承 follow 不可。
    example_source:
      product: OWASP SSRF
      url: https://owasp.org/www-community/attacks/Server_Side_Request_Forgery
      version: redirect SSRF
    field_values:
      status: 302
      location: http://169.254.169.254/latest/meta-data/
    related_node_ids:
      - InboundResponse
      - OutboundRequest
    related_relation_ids: []
    source_claims:
      - claim-inbound-response-design
  - id: InboundResponse-toolresult-boundary
    labels:
      zh: ToolResult 非入站响应
      en: ToolResult is not inbound response
      ja: ToolResult は inbound response ではない
    descriptions:
      zh: 解析后的 MCP Tool Result 是独立事实；InboundResponse 保留 raw protocol 供引用。
      en: Parsed MCP Tool Result is a separate fact; InboundResponse retains raw protocol for reference.
      ja: 解析後 MCP Tool Result は独立 fact。InboundResponse raw protocol 保持参照用。
    example_source:
      product: MCP
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/server/tools/
      version: Tool Result
    field_values:
      accepted: false
    related_node_ids:
      - InboundResponse
    related_relation_ids: []
    source_claims:
      - claim-inbound-response-mcp
  - id: InboundResponse-host-cooccurrence-boundary
    labels:
      zh: Host 共现不足以关联
      en: Host co-occurrence insufficient
      ja: Host 共起不十分
    descriptions:
      zh: 两并发 GET api.example.com 仅 Host 相同不能建立 responds_to；必须 correlation_id。
      en: Two concurrent GET api.example.com cannot establish responds_to by Host alone; correlation_id required.
      ja: 並行 GET api.example.com 二件 Host 一致だけ responds_to 不可。correlation_id 必須。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: response correlation
    field_values:
      host_co_occurrence_sufficient: false
    related_node_ids:
      - InboundResponse
      - OutboundRequest
    related_relation_ids: []
    source_claims:
      - claim-inbound-response-design
parent_relation:
  id: InboundResponse-is_a-NetworkMessage
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种网络消息
    en: is a network message
    ja: ネットワークメッセージの一種
  definitions:
    zh: 每个 InboundResponse 都是 NetworkMessage，种差是入站方向与 responds_to 关联。
    en: Every InboundResponse is a NetworkMessage distinguished by inbound direction and responds_to correlation.
    ja: すべての InboundResponse は NetworkMessage で inbound direction/responds_to correlate が種差。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-inbound-response-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: InboundResponse-responds_to-OutboundRequest
    predicate: responds_to
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 响应出站请求
      en: responds to outbound request
      ja: 送信要求に応答
    definitions:
      zh: InboundResponse responds_to OutboundRequest 当且仅当 protocol correlation 匹配同一交换；Host 共现不足。
      en: InboundResponse responds_to OutboundRequest only when protocol correlation matches the same exchange; Host co-occurrence is insufficient.
      ja: InboundResponse responds_to OutboundRequest は protocol correlation が同一 exchange に match 時のみ。Host 共起不十分。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一次请求通常对应零或一主响应（redirect 可能多个）。
      en: One request usually has zero or one primary response; redirects may have multiple.
      ja: 一 request 通常零または一 primary response。redirect で複数可。
    inverse_reading:
      predicate: receives_response
      labels:
        zh: 接收响应
        en: receives response
        ja: 応答を受信
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-inbound-response-design
    distinct_fact_rationale:
      zh: NetworkCall completed 不能 alone 推出 responds_to 哪一请求。
      en: NetworkCall completed alone cannot imply which request responds_to holds.
      ja: NetworkCall completed だけでは responds_to 対象 request は導けない。
    layout_role: cross-link
    target: concept:OutboundRequest
sources:
  - id: rfc9110-http
    title: RFC 9110 HTTP Semantics
    url: https://www.rfc-editor.org/rfc/rfc9110.html
    source_type: standard
    relevance: HTTP response status, headers, redirects, and correlation.
  - id: mcp-tools-2025-06-18
    title: MCP Specification — Tools
    url: https://spec.modelcontextprotocol.io/specification/2025-06-18/server/tools/
    source_type: official-spec
    relevance: Raw InboundResponse separate from ToolResult.
  - id: safety-network-design
    title: Moonweave safety-network-control module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: InboundResponse protocol correlation and redirect re-authorization rules.
source_claims:
  - id: claim-inbound-response-rfc9110
    source: rfc9110-http
    supports: RFC 9110 HTTP responses map to InboundResponse with status and redirect Location headers.
    locator: HTTP responses
    evidence_kind: official
    confidence: high
  - id: claim-inbound-response-mcp
    source: mcp-tools-2025-06-18
    supports: MCP tool domain references raw InboundResponse before ToolResult parsing.
    locator: Tool Result separation
    evidence_kind: official
    confidence: high
  - id: claim-inbound-response-design
    source: safety-network-design
    supports: Moonweave requires protocol correlation for responds_to and rejects redirect allow inheritance.
    locator: InboundResponse boundary
    evidence_kind: design-inference
    confidence: high
