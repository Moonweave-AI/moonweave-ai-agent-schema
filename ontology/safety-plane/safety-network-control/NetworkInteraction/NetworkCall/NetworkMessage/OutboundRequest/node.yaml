  - id: outbound-request-greshake_bing
    labels:
      zh: 出站请求 - Greshake Bing Chat 间接注入
      en: outbound request - Greshake Bing Chat indirect injection
      ja: outbound request - Greshake Bing Chat 間接注入
    descriptions: {zh: "出站请求(OutboundRequest) [OutboundRequest]: 由受控主体面向网络目标构造并准备发送的请求消息。. Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。 Fields: credential_scope_ref, target_uri_or_authority, method_or_operation.", en: "outbound request (OutboundRequest) [OutboundRequest]: A request message constructed by a controlled subject for transmission to a network target.. Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page. Fields include credential_scope_ref, target_uri_or_authority, method_or_operation.", ja: "outbound request(OutboundRequest) [OutboundRequest]: controlled subject が network target へ送信するため構成した request message。. Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。 Fields: credential_scope_ref, target_uri_or_authority, method_or_operation."}
    field_values:
      credential_scope_ref: cred-scope-api-read
      method_or_operation: POST
      payload_reference: artifact-payload-884
      target_uri_or_authority: "https://api.example.com/v1/jobs"
    related_node_ids:
