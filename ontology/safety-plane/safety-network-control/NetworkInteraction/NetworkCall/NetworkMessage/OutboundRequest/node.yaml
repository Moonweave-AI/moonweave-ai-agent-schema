schema: moonweave.ai/ontology-node/v1
id: OutboundRequest
kind: concept
labels:
  zh: 出站请求
  en: outbound request
  ja: 送信要求
semantics:
  short_definition:
    zh: 一次 egress HTTP/协议调用的出站请求消息，含审计日志身份。
    en: An outbound request message for one egress HTTP or protocol call with audit-log identity.
    ja: 一回 egress HTTP/protocol call の outbound request message（audit log identity 付き）。
  definition:
    zh: OutboundRequest 是 NetworkMessage 的出站特化，拥有 request_id、method、authority、path、header digest、发起时间与 audit logging 引用。它映射 Agent 或 MCP server tools/call 触发的 egress HTTP call；通过 initiates 启动 NetworkCall。302 到新 authority 必须产生新 request_id，不得继承原 allow。
    en: "OutboundRequest is the outbound specialization of NetworkMessage with request_id, method, authority, path, header digest, initiation time, and audit logging reference. It maps egress HTTP calls triggered by agent or MCP server tools/call; it initiates NetworkCall via initiates. A 302 to a new authority must produce a new request_id without inheriting the original allow."
    ja: OutboundRequest は NetworkMessage の outbound 特化で request_id/method/authority/path/header digest/開始時刻/audit logging reference を持つ。Agent/MCP server tools/call 由来 egress HTTP call を写像。initiates で NetworkCall 開始。新 authority へ 302 は新 request_id 必須、原 allow 継承不可。
  why_needed:
    zh: 出站请求身份与响应分离后，才能在并发 egress 审计中唯一关联 InboundResponse，并记录每次 allowlisted 调用的完整 audit trail。
    en: Separating outbound request identity from responses uniquely correlates InboundResponse under concurrent egress audit and records a full audit trail for each allowlisted call.
    ja: outbound request identity/response 分離後、並行 egress audit で InboundResponse を一意 correlate し各 allowlisted call の full audit trail 記録可。
  includes:
    - zh: 含 request_id、HTTP method、target authority、audit log ref 与 NetworkCall initiates 边。
      en: Includes request_id, HTTP method, target authority, audit log ref, and NetworkCall initiates edge.
      ja: request_id/HTTP method/target authority/audit log ref/NetworkCall initiates edge を含む。
  excludes:
    - zh: 不包含 InboundResponse body、SideEffect、ToolResult 或 NetworkPolicy 规范全文。
      en: Excludes InboundResponse body, SideEffect, ToolResult, or full NetworkPolicy specification text.
      ja: InboundResponse body/SideEffect/ToolResult/NetworkPolicy spec 全文は含まない。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 集成：MCP tools/call fetch npm registry → OutboundRequest out-req-mcp-7 GET registry.npmjs.org；audit log 记录 request_id、timestamp、actor_ref、governed_by policy ref。redirect 必须新 OutboundRequest/NetworkCall/policy 链。
    en: "Integration: MCP tools/call fetch npm registry → OutboundRequest out-req-mcp-7 GET registry.npmjs.org; audit log records request_id, timestamp, actor_ref, governed_by policy ref. Redirect requires new OutboundRequest, NetworkCall, and policy chain."
    ja: 統合：MCP tools/call npm registry fetch → OutboundRequest out-req-mcp-7 GET registry.npmjs.org。audit log が request_id/timestamp/actor_ref/governed_by policy ref 記録。redirect は新 OutboundRequest/NetworkCall/policy chain 必須。
  typical_input:
    - description: Egress HTTP call with audit logging.
      format: |
        request_id: out-req-884
        method: GET
        authority: api.example.com
        audit_log_ref: audit-egress-884
      source_claims:
        - claim-outbound-request-design
  typical_output:
    - description: Initiated NetworkCall reference.
      format: |
        network_call_id: net-call-884
        call_status: completed
      source_claims:
        - claim-outbound-request-design
  reference_implementations:
    - name: MCP Specification — Tools
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/server/tools/
      description: tools/call triggering outbound HTTP from MCP servers.
    - name: RFC 9110 HTTP Semantics
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      description: HTTP request message fields and redirect semantics.
structure:
  identity_keys:
    - request_id
  fields:
    - id: request_id
      labels:
        zh: 出站请求标识
        en: outbound request ID
        ja: 送信要求 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 一次 OutboundRequest 的唯一 ID；redirect 目标必须新 request_id。
        en: Unique ID of one OutboundRequest; redirect targets must use a new request_id.
        ja: 一回 OutboundRequest の一意 ID。redirect 先は新 request_id 必須。
      allowed_values: []
      pattern: null
      example_value: out-req-884
      source_claims:
        - claim-outbound-request-design
    - id: method
      labels:
        zh: HTTP 方法
        en: HTTP method
        ja: HTTP method
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: GET、POST、PUT 等 HTTP 方法。
        en: HTTP method such as GET, POST, or PUT.
        ja: GET/POST/PUT 等 HTTP method。
      allowed_values: []
      pattern: null
      example_value: GET
      source_claims:
        - claim-outbound-request-rfc9110
    - id: authority
      labels:
        zh: 目标权威
        en: target authority
        ja: target authority
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: HTTP authority 或 host，用于 allowlist 匹配。
        en: HTTP authority or host for allowlist matching.
        ja: allowlist match 用 HTTP authority/host。
      allowed_values: []
      pattern: null
      example_value: api.example.com
      source_claims:
        - claim-outbound-request-design
    - id: audit_log_ref
      labels:
        zh: 审计日志引用
        en: audit log reference
        ja: 監査 log 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该出站请求在 egress audit log 中的稳定条目。
        en: References the stable egress audit log entry for this outbound request.
        ja: 本 outbound request の egress audit log 安定 entry を参照。
      allowed_values: []
      pattern: null
      example_value: audit-egress-884
      source_claims:
        - claim-outbound-request-design
  constraints:
    - id: network-redirect-new-request
      severity: error
      expression_language: plain
      expression: When final authority differs after redirect, a new OutboundRequest with new request_id and policy chain is required
      explanations:
        zh: 重定向到新 authority 必须新 request_id 与策略链。
        en: Redirect to new authority requires new request_id and policy chain.
        ja: 新 authority へ redirect は新 request_id/policy chain 必須。
      source_claims:
        - claim-outbound-request-design
  required_relation_constraints: []
examples:
  - id: OutboundRequest-mcp-registry
    labels:
      zh: MCP registry 出站请求
      en: MCP registry outbound request
      ja: MCP registry outbound request
    descriptions:
      zh: HTTP MCP server tools/call 触发 GET registry.npmjs.org；out-req-mcp-7 写入 egress audit log，governed_by egress-mcp-tools@4。
      en: HTTP MCP server tools/call triggers GET registry.npmjs.org; out-req-mcp-7 written to egress audit log, governed_by egress-mcp-tools@4.
      ja: HTTP MCP server tools/call が GET registry.npmjs.org trigger。out-req-mcp-7 egress audit log 記録、governed_by egress-mcp-tools@4。
    example_source:
      product: MCP
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/server/tools/
      version: tools/call egress
    field_values:
      request_id: out-req-mcp-7
      method: GET
      authority: registry.npmjs.org
    related_node_ids:
      - OutboundRequest
      - NetworkCall
      - NetworkPolicy
    related_relation_ids:
      - OutboundRequest-initiates-NetworkCall
    source_claims:
      - claim-outbound-request-mcp
  - id: OutboundRequest-proxy-egress
    labels:
      zh: 经代理的出站请求
      en: Outbound request via proxy
      ja: proxy 経由 outbound request
    descriptions:
      zh: out-req-884 GET api.example.com；audit log 记录 ordered_hops 含 proxy-egress-2 与 audit-egress-884。
      en: out-req-884 GET api.example.com; audit log records ordered_hops including proxy-egress-2 and audit-egress-884.
      ja: out-req-884 GET api.example.com。audit log ordered_hops proxy-egress-2/audit-egress-884 記録。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: egress audit logging
    field_values:
      request_id: out-req-884
      audit_log_ref: audit-egress-884
    related_node_ids:
      - OutboundRequest
      - NetworkRoute
    related_relation_ids: []
    source_claims:
      - claim-outbound-request-design
  - id: OutboundRequest-denied-before-send
    labels:
      zh: 策略拒绝未发送请求
      en: Policy denied before send
      ja: policy deny 未送信 request
    descriptions:
      zh: out-req-885 目标 updates.unapproved.example；policy deny 后无实际 wire send，但 OutboundRequest 与 audit 意图仍记录。
      en: out-req-885 targets updates.unapproved.example; after policy deny no wire send but OutboundRequest and audit intent still recorded.
      ja: out-req-885 updates.unapproved.example target。policy deny 後 wire send なし。OutboundRequest/audit intent は記録。
    example_source:
      product: Kubernetes
      url: https://kubernetes.io/docs/concepts/services-networking/network-policies/
      version: egress deny
    field_values:
      request_id: out-req-885
      call_status: denied
    related_node_ids:
      - OutboundRequest
      - NetworkCall
    related_relation_ids: []
    source_claims:
      - claim-outbound-request-k8s
  - id: OutboundRequest-redirect-new-id
    labels:
      zh: 重定向需新请求 ID
      en: Redirect requires new request ID
      ja: redirect は新 request ID 必要
    descriptions:
      zh: 302 Location 169.254.169.254 不得复用 out-req-884；必须 null new_request_id 直至新 policy 链完成。
      en: 302 Location 169.254.169.254 must not reuse out-req-884; new_request_id null until new policy chain completes.
      ja: 302 Location 169.254.169.254 out-req-884 再利用不可。新 policy chain 完了まで new_request_id null。
    example_source:
      product: OWASP SSRF
      url: https://owasp.org/www-community/attacks/Server_Side_Request_Forgery
      version: redirect SSRF
    field_values:
      original_request_id: out-req-884
      new_request_id: null
    related_node_ids:
      - OutboundRequest
      - InboundResponse
    related_relation_ids: []
    source_claims:
      - claim-outbound-request-design
parent_relation:
  id: OutboundRequest-is_a-NetworkMessage
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种网络消息
    en: is a network message
    ja: ネットワークメッセージの一種
  definitions:
    zh: 每个 OutboundRequest 都是 NetworkMessage，种差是 egress 方向与 audit-logged 发起身份。
    en: Every OutboundRequest is a NetworkMessage distinguished by egress direction and audit-logged initiation identity.
    ja: すべての OutboundRequest は NetworkMessage で egress direction/audit-logged initiation identity が種差。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-outbound-request-design
  distinct_fact_rationale: null
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations:
  - id: OutboundRequest-initiates-NetworkCall
    predicate: initiates
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 发起网络调用
      en: initiates network call
      ja: ネットワーク呼出しを開始
    definitions:
      zh: OutboundRequest 通过 initiates 启动恰好一次 NetworkCall。
      en: OutboundRequest initiates exactly one NetworkCall via initiates.
      ja: OutboundRequest は initiates で exactly 一 NetworkCall を開始。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一次出站请求启动一次主 NetworkCall。
      en: One outbound request initiates one primary NetworkCall.
      ja: 一 outbound request は一 primary NetworkCall 開始。
    inverse_reading:
      predicate: initiated_by
      labels:
        zh: 由出站请求发起
        en: initiated by outbound request
        ja: 送信要求により開始
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-outbound-request-design
    distinct_fact_rationale:
      zh: 请求存在不能推出 NetworkCall 已 completed。
      en: Request existence cannot imply NetworkCall completed.
      ja: request 存在だけでは NetworkCall completed は導けない。
    layout_role: cross-link
    target: concept:NetworkCall
sources:
  - id: mcp-tools-2025-06-18
