schema: moonweave.ai/ontology-node/v1
id: OutboundRequest
kind: concept
status: review
labels:
  zh: 出站请求
  en: outbound request
  ja: outbound request
semantics:
  short_definition:
    zh: 由受控主体面向网络目标构造并准备发送的请求消息。
    en: A request message constructed by a controlled subject for transmission to a network target.
    ja: controlled subject が network target へ送信するため構成した request message。
  definition:
    zh: 出站请求是一种 NetworkMessage，其种差是由受控主体构造、以目标 URI 或 authority、方法或操作、凭据范围和载荷引用表达意图，并可发起 NetworkCall。它可以在调用前存在，因此不证明连接已经建立，也不是授权请求或路由记录。
    en: An OutboundRequest is a NetworkMessage distinguished by construction by a controlled subject and by target URI or authority, method or operation, credential scope, and payload reference; it may initiate a NetworkCall. It can exist before a call, so it does not prove a connection was established and is not an authorization request or route record.
    ja: OutboundRequest は controlled subject が構成し target URI/authority・method/operation・credential scope・payload reference で intent を表して NetworkCall を initiate できる NetworkMessage です。call 前にも存在でき connection establishment を証明せず authorization request/route record ではありません。
  why_needed:
    zh: 将调用意图和协议载荷从发生事件中分离，使未发送、被策略拒绝和已发送请求都能保持同一消息身份。
    en: Separating call intent and protocol payload from the occurrence event preserves one message identity across unsent, policy-denied, and transmitted states.
    ja: call intent/protocol payload を occurrence event から分け unsent・policy-denied・transmitted state を通じ同一 message identity を保ちます。
  includes:
    - zh: HTTP 请求、SOCKS relay 请求和面向远程 API 的协议请求信封。
      en: HTTP requests, SOCKS relay requests, and protocol request envelopes targeting remote APIs.
      ja: HTTP request・SOCKS relay request・remote API 向け protocol request envelope。
  excludes:
    - zh: 安全域的 AuthorizationRequest、实际 NetworkCall、代理路由和远程响应。
      en: Safety-domain AuthorizationRequest, actual NetworkCall occurrence, proxy route, and remote response.
      ja: safety-domain AuthorizationRequest・actual NetworkCall・proxy route・remote response。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - method_or_operation
    - target_uri_or_authority
  fields:
    - id: method_or_operation
      labels:
        zh: 方法或操作
        en: method or operation
        ja: method or operation
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录请求要求对目标执行的协议动作。
        en: Records the protocol action requested of the target.
        ja: target に要求する protocol action。
      allowed_values: []
      pattern: null
      example_value: POST
      source_claims:
        - claim-outbound-request-001
        - claim-outbound-request-002
    - id: target_uri_or_authority
      labels:
        zh: 目标 URI 或 authority
        en: target URI or authority
        ja: target URI or authority
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录调用方声明的原始目标，保留重定向或解析前值。
        en: Records the caller-declared original target before redirect or resolution.
        ja: redirect/resolution 前の caller-declared original target。
      allowed_values: []
      pattern: null
      example_value: https://api.example.com/v1/jobs
      source_claims:
        - claim-outbound-request-001
        - claim-outbound-request-002
    - id: credential_scope_ref
      labels:
        zh: 凭据范围引用
        en: credential-scope reference
        ja: credential-scope reference
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用请求允许携带的凭据范围，不复制秘密值。
        en: References the credential scope permitted for the request without copying secret values.
        ja: secret value をコピーせず request に許可された credential scope を参照します。
      allowed_values: []
      pattern: null
      example_value: cred-scope-api-read
      source_claims:
        - claim-outbound-request-003
        - claim-outbound-request-001
    - id: payload_reference
      labels:
        zh: 载荷引用
        en: payload reference
        ja: payload reference
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用待传输正文或参数工件。
        en: References the body or argument artifact to be transmitted.
        ja: transmit する body/argument artifact を参照します。
      allowed_values: []
      pattern: null
      example_value: artifact-payload-884
      source_claims:
        - claim-outbound-request-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: OutboundRequest-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 准备发送的 API 请求
      en: Prepared API request
      ja: prepared API request
    scenario_id: null
    descriptions:
      zh: out-req-884 保存 POST、原始目标 https://api.example.com/v1/jobs、read-write 凭据范围和载荷引用，随后通过 initiates 关联 net-call-884。
      en: out-req-884 stores POST, original target https://api.example.com/v1/jobs, a read-write credential scope, and a payload reference, then initiates net-call-884.
      ja: out-req-884 は POST・original target・read-write credential scope・payload reference を保持し net-call-884 を initiate します。
    field_values:
      message_id: out-req-884
      occurred_at: 2026-07-16T02:31:04Z
      protocol: https
      method_or_operation: POST
      target_uri_or_authority: https://api.example.com/v1/jobs
      credential_scope_ref: cred-scope-api-write
      payload_reference: artifact-payload-884
    related_node_ids:
      - OutboundRequest
      - NetworkMessage
      - NetworkCall
    related_relation_ids:
      - OutboundRequest-is_a-NetworkMessage
      - OutboundRequest-initiates-NetworkCall
    expected_result:
      zh: 保留一份请求消息并连接到其发起的调用事件。
      en: Retain one request message and connect it to the call occurrence it initiates.
      ja: 一 request message を保持し initiate する call occurrence へ接続します。
    why_valid_or_invalid:
      zh: 消息意图字段完整，调用发生由另一关系和事件提供。
      en: Message-intent fields are complete while a separate relation and event supply occurrence evidence.
      ja: message intent field は完全で occurrence evidence は別 relation/event が提供します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-outbound-request-001
      - claim-outbound-request-003
  - id: OutboundRequest-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 权限审批请求
      en: Permission approval request
      ja: permission approval request
    scenario_id: network-review-outboundrequest-boundary
    descriptions:
      zh: 记录询问用户是否允许工具访问外部 API，包含主体、资源、操作和审批上下文，但没有网络协议方法或目标 authority。
      en: A record asks whether a user permits a tool to access an external API and contains subject, resource, operation, and approval context but no network method or target authority.
      ja: user に external API access 許可を尋ね subject/resource/operation/approval context はありますが network method/target authority はありません。
    field_values: {}
    related_node_ids:
      - AuthorizationRequest
    related_relation_ids: []
    expected_result:
      zh: 归安全权限域的 AuthorizationRequest，不归 OutboundRequest。
      en: Classify it as the permission-domain AuthorizationRequest, not OutboundRequest.
      ja: permission-domain AuthorizationRequest とし OutboundRequest にはしません。
    why_valid_or_invalid:
      zh: 审批意图和协议传输消息具有不同身份与生命周期。
      en: Approval intent and a protocol-transmission message have different identity and lifecycle.
      ja: approval intent と protocol-transmission message は identity/lifecycle が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-outbound-request-003
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: InboundResponse
    shared_parent_concept_id: NetworkMessage
    differentia:
      zh: OutboundRequest 由受控主体面向目标表达操作意图；InboundResponse 是对既有请求返回的状态与内容。
      en: OutboundRequest expresses an operation toward a target from the controlled subject; InboundResponse returns status and content for an existing request.
      ja: OutboundRequest は controlled subject から target への operation、InboundResponse は既存 request への status/content を表します。
    source_claims:
      - claim-outbound-request-001
parent_relation:
  id: OutboundRequest-is_a-NetworkMessage
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: is a
  definitions:
    zh: OutboundRequest 是 NetworkMessage 的子类：它具有协议消息身份、元数据和正文引用，并增加由受控主体面向目标表达方法、authority、凭据范围和载荷意图的出站种差。
    en: "OutboundRequest is a subtype of NetworkMessage: it has protocol-message identity, metadata, and body reference and adds the outbound differentia of expressing method, authority, credential scope, and payload intent from a controlled subject toward a target."
    ja: OutboundRequest は NetworkMessage subtype で protocol message identity・metadata・body ref に controlled subject から target への method・authority・credential scope・payload intent differentia を追加します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承描述概念包含，不使用实例关系基数。
    en: Taxonomic inheritance describes concept inclusion and does not use instance-relation cardinality.
    ja: taxonomic inheritance は concept inclusion を表し instance relation cardinality を使いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 以 出站请求 为子类
      en: has subtype 出站请求
      ja: 出站请求 を subtype に持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: OutboundRequest-is_a-NetworkMessage-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 出站 HTTP 请求
        en: Outbound HTTP request
        ja: outbound HTTP request
      scenario_id: network-relation-outboundrequest-is_a-networkmessage-positive
      descriptions:
        zh: out-req-884 带 message_id、HTTP/2 元数据、POST、原始目标和载荷引用，并从 agent-code 发出。
        en: out-req-884 carries message_id, HTTP/2 metadata, POST, original target, and payload reference and originates from agent-code.
        ja: out-req-884 は message_id・HTTP/2 metadata・POST・original target・payload ref を持ち agent-code から発します。
      field_values: {}
      related_node_ids:
        - OutboundRequest
        - NetworkMessage
      related_relation_ids:
        - OutboundRequest-is_a-NetworkMessage
      expected_result:
        zh: 断言 OutboundRequest is_a NetworkMessage。
        en: Assert OutboundRequest is_a NetworkMessage.
        ja: OutboundRequest is_a NetworkMessage を主張します。
      why_valid_or_invalid:
        zh: 请求满足消息身份并具有明确出站方向种差。
        en: The request satisfies message identity and has explicit outbound-direction differentia.
        ja: request は message identity/outbound direction differentia を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-outbound-request-001
    - id: OutboundRequest-is_a-NetworkMessage-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 授权审批不是网络消息
        en: Approval is not a network message
        ja: approval は network message ではない
      scenario_id: network-relation-outboundrequest-is_a-networkmessage-boundary
      descriptions:
        zh: AuthorizationRequest 询问是否允许访问某资源，但没有传输协议、消息头、正文引用或网络目标 authority。
        en: AuthorizationRequest asks whether resource access is allowed but has no transport protocol, message metadata, body reference, or network target authority.
        ja: AuthorizationRequest は resource access 許可を問いますが transport protocol・message metadata・body ref・network authority がありません。
      field_values: {}
      related_node_ids:
        - OutboundRequest
        - AuthorizationRequest
        - NetworkMessage
      related_relation_ids:
        - OutboundRequest-is_a-NetworkMessage
      expected_result:
        zh: 不得把审批对象分类为 OutboundRequest。
        en: Do not classify the approval object as OutboundRequest.
        ja: approval object を OutboundRequest と分類しません。
      why_valid_or_invalid:
        zh: 治理请求和网络协议消息的身份不同。
        en: A governance request and a network protocol message have different identities.
        ja: governance request と network protocol message は identity が異なります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-outbound-request-003
  source_claims:
    - claim-outbound-request-001
    - claim-outbound-request-003
  distinct_fact_rationale:
    zh: OutboundRequest 满足 NetworkMessage 的全部身份条件并增加不可替换的种差。
    en: OutboundRequest satisfies every identity condition of NetworkMessage and adds a non-substitutable differentia.
    ja: OutboundRequest は NetworkMessage の全 identity condition を満たし non-substitutable differentia を追加します。
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
relations:
  - id: OutboundRequest-initiates-NetworkCall
    predicate: initiates
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 发起调用
      en: initiates call
      ja: call を initiate
    definitions:
      zh: OutboundRequest 仅在其消息身份、原始目标和载荷被某个 NetworkCall 采用为起始输入时发起该调用；未发送草稿不建立此边，一个重试产生的新调用需有新的关联事实。
      en: OutboundRequest initiates a NetworkCall only when that call adopts the request's message identity, original target, and payload as its starting input. An unsent draft has no such edge, and a retry creating a new call requires a new association fact.
      ja: OutboundRequest は NetworkCall が message identity・original target・payload を starting input として採用した場合のみ initiate します。unsent draft には edge がなく retry new call は新 association fact を要します。
    cardinality:
      source:
        min: 1
        max: 1
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_initiates_of
      labels:
        zh: 反向读取 initiates
        en: is initiates of
        ja: initiates の inverse
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: OutboundRequest-initiates-NetworkCall-example-positive-manual-20260716
        kind: positive
        labels:
          zh: 请求被调用采用
          en: Request adopted by call
          ja: request が call に採用
        scenario_id: network-relation-outboundrequest-initiates-networkcall-positive
        descriptions:
          zh: net-call-884 的起始审计记录引用 out-req-884 的 message_id、目标、方法和载荷摘要，时间紧随请求冻结。
          en: net-call-884's start audit references out-req-884's message ID, target, method, and payload digest immediately after the request was frozen.
          ja: net-call-884 start audit は out-req-884 の message ID・target・method・payload digest を request freeze 直後に参照します。
        field_values: {}
        related_node_ids:
          - OutboundRequest
          - NetworkCall
        related_relation_ids:
          - OutboundRequest-initiates-NetworkCall
        expected_result:
          zh: 建立 out-req-884 initiates net-call-884。
          en: Assert out-req-884 initiates net-call-884.
          ja: out-req-884 initiates net-call-884 を主張します。
        why_valid_or_invalid:
          zh: 调用的起始输入与请求身份及内容摘要一致。
          en: The call's starting input matches the request identity and content digest.
          ja: call starting input が request identity/content digest と一致します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-outbound-request-001
          - claim-outbound-request-003
      - id: OutboundRequest-initiates-NetworkCall-example-boundary-manual-20260716
        kind: boundary
        labels:
          zh: 未发送草稿
          en: Unsent draft
          ja: unsent draft
        scenario_id: network-relation-outboundrequest-initiates-networkcall-boundary
        descriptions:
          zh: out-req-draft 通过校验但用户取消，之后没有网络交互标识、解析、策略判断或连接记录。
          en: out-req-draft passes validation but the user cancels; no network interaction ID, resolution, policy evaluation, or connection record follows.
          ja: out-req-draft は validation pass 後 user cancel され network interaction ID・resolution・policy evaluation・connection record がありません。
        field_values: {}
        related_node_ids:
          - OutboundRequest
          - NetworkCall
        related_relation_ids:
          - OutboundRequest-initiates-NetworkCall
        expected_result:
          zh: 保留请求草稿，不建立 initiates 边。
          en: Retain the request draft and do not assert initiates.
          ja: request draft を保持し initiates edge を主張しません。
        why_valid_or_invalid:
          zh: 消息存在不等于调用生命周期已开始。
          en: Message existence does not mean a call lifecycle began.
          ja: message existence は call lifecycle start を意味しません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-outbound-request-001
    source_claims:
      - claim-outbound-request-001
      - claim-outbound-request-003
    distinct_fact_rationale:
      zh: 该边连接消息意图与发生事件，不等同于 is_a 或响应关联。
      en: This edge links message intent to an occurrence event and is distinct from taxonomy or response correlation.
      ja: message intent と occurrence event を結び taxonomy/response correlation と異なります。
    layout_role: cross-link
    review_status: pending
    target: concept:NetworkCall
