      - NetworkCall
      - NetworkMessage
      - OutboundRequest
    related_relation_ids:
      - AuthorizationRequest
      - claim-outbound-request-001
      - claim-outbound-request-003
      - NetworkCall
      - NetworkMessage
      - OutboundRequest
      - OutboundRequest-initiates-NetworkCall
      - OutboundRequest-is_a-NetworkMessage
    example_source: Kubernetes NetworkPolicy
    source_claims:
      - claim-outbound-request-001
  - id: outbound-request-envoy_ext_auth
    labels:
      zh: 出站请求 - Envoy ext_authz PEP
      en: outbound request - Envoy ext_authz PEP
      ja: outbound request - Envoy ext_authz PEP
    descriptions: {zh: "出站请求(OutboundRequest) [OutboundRequest]: 由受控主体面向网络目标构造并准备发送的请求消息。. Envoy ext_authz 过滤器在上游请求前调用授权服务。 Fields: credential_scope_ref, target_uri_or_authority, method_or_operation.", en: "outbound request (OutboundRequest) [OutboundRequest]: A request message constructed by a controlled subject for transmission to a network target.. Envoy ext_authz filter calls an authorization service before allowing upstream requests (envoyproxy.io ext_authz documentation). Fields include credential_scope_ref, target_uri_or_authority, method_or_operation.", ja: "outbound request(OutboundRequest) [OutboundRequest]: controlled subject が network target へ送信するため構成した request message。. Envoy ext_authz filter は upstream request 前に authorization service を呼ぶ。 Fields: credential_scope_ref, target_uri_or_authority, method_or_operation."}
    field_values:
      credential_scope_ref: cred-scope-api-read
      method_or_operation: POST
      payload_reference: artifact-payload-884
      target_uri_or_authority: "https://api.example.com/v1/jobs"
    related_node_ids:
      - AuthorizationRequest
      - NetworkCall
      - NetworkMessage
      - OutboundRequest
    related_relation_ids:
      - AuthorizationRequest
      - claim-outbound-request-001
      - claim-outbound-request-003
      - NetworkCall
      - NetworkMessage
      - OutboundRequest
      - OutboundRequest-initiates-NetworkCall
      - OutboundRequest-is_a-NetworkMessage
    example_source: Envoy ext_authz
    source_claims:
      - claim-outbound-request-001
  - id: outbound-request-e2b
    labels:
      zh: 出站请求 - E2B 沙箱 VM
      en: outbound request - E2B sandbox VM
      ja: outbound request - E2B サンドボックス VM
    descriptions: {zh: "出站请求(OutboundRequest) [OutboundRequest]: 由受控主体面向网络目标构造并准备发送的请求消息。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — 网络隔离、文件系统隔离与资源限制。 Fields: credential_scope_ref, target_uri_or_authority, method_or_operation.", en: "outbound request (OutboundRequest) [OutboundRequest]: A request message constructed by a controlled subject for transmission to a network target.. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network isolation, filesystem isolation, and resource limits (e2b.dev/docs). Fields include credential_scope_ref, target_uri_or_authority, method_or_operation.", ja: "outbound request(OutboundRequest) [OutboundRequest]: controlled subject が network target へ送信するため構成した request message。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network/filesystem isolation と resource limit。 Fields: credential_scope_ref, target_uri_or_authority, method_or_operation."}
    field_values:
      credential_scope_ref: cred-scope-api-read
      method_or_operation: POST
      payload_reference: artifact-payload-884
      target_uri_or_authority: "https://api.example.com/v1/jobs"
    related_node_ids:
      - AuthorizationRequest
