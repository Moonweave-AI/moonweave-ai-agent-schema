    url: https://spec.modelcontextprotocol.io/specification/2025-06-18/server/tools/
    source_type: official-spec
    relevance: tools/call triggering outbound HTTP with audit trail.
  - id: rfc9110-http
    title: RFC 9110 HTTP Semantics
    url: https://www.rfc-editor.org/rfc/rfc9110.html
    source_type: standard
    relevance: HTTP request fields and redirect authority changes.
  - id: k8s-network-policy
    title: Kubernetes NetworkPolicy
    url: https://kubernetes.io/docs/concepts/services-networking/network-policies/
    source_type: official-doc
    relevance: Policy-denied outbound requests before wire send.
  - id: safety-network-design
    title: Moonweave safety-network-control module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: OutboundRequest as audit-logged egress message initiating NetworkCall.
source_claims:
  - id: claim-outbound-request-mcp
    source: mcp-tools-2025-06-18
    supports: MCP tools/call triggers outbound HTTP mappable to OutboundRequest with audit logging.
    locator: tools/call
    evidence_kind: official
    confidence: high
  - id: claim-outbound-request-rfc9110
    source: rfc9110-http
    supports: RFC 9110 HTTP request message fields map to OutboundRequest method and authority.
    locator: HTTP requests
    evidence_kind: official
    confidence: high
  - id: claim-outbound-request-k8s
    source: k8s-network-policy
    supports: Policy-denied egress records OutboundRequest intent even when wire send does not occur.
    locator: NetworkPolicy egress
    evidence_kind: official
    confidence: high
  - id: claim-outbound-request-design
    source: safety-network-design
    supports: Moonweave requires OutboundRequest audit identity, initiates NetworkCall, and new request_id on redirect.
    locator: OutboundRequest boundary
    evidence_kind: design-inference
    confidence: high
