    descriptions: {zh: "网络交互(NetworkInteraction) [NetworkInteraction]: 一次具名主体与网络端点之间可观测的通信发生。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — 网络隔离、文件系统隔离与资源限制。 Fields: direction, interaction_id, initiator_ref.", en: "network interaction (NetworkInteraction) [NetworkInteraction]: An observable communication occurrence between a named initiator and a network endpoint.. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network isolation, filesystem isolation, and resource limits (e2b.dev/docs). Fields include direction, interaction_id, initiator_ref.", ja: "network interaction(NetworkInteraction) [NetworkInteraction]: named initiator と network endpoint 間の observable communication occurrence。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network/filesystem isolation と resource limit。 Fields: direction, interaction_id, initiator_ref."}
