schema: moonweave.ai/ontology-node/v1
id: NetworkInteraction
kind: concept
status: review
labels:
  zh: 网络交互
  en: network interaction
  ja: network interaction
semantics:
  short_definition:
    zh: 一次具名主体与网络端点之间可观测的通信发生。
    en: An observable communication occurrence between a named initiator and a network endpoint.
    ja: named initiator と network endpoint 間の observable communication occurrence。
  definition:
    zh: 网络交互是一种事件，以交互标识、发起方、开始时间、方向和结果为身份，记录主体试图建立、实际建立或结束一条网络通信路径。它概括成功、拒绝和失败的发生，但不等同于其承载的请求/响应消息、可寻址端点、所选路由或治理策略。
    en: A NetworkInteraction is an event identified by interaction ID, initiator, start time, direction, and outcome, recording an attempt to establish, the establishment of, or the termination of a network communication path. It generalizes successful, denied, and failed occurrences but is not the request or response message it carries, an addressable endpoint, a selected route, or its governing policy.
    ja: NetworkInteraction は interaction ID・initiator・start time・direction・outcome で識別する event で、network communication path の確立試行・確立・終了を記録します。success・denial・failure occurrence を包含しますが request/response message・addressable endpoint・selected route・governing policy ではありません。
  why_needed:
    zh: 把通信发生与消息、地址、路径和规则分开，才能追踪一次调用从请求到决定、连接和响应的完整事实链。
    en: Separating communication occurrence from message, address, route, and rule lets one trace a call from request through decision and connection to response without collapsing categories.
    ja: communication occurrence を message・address・route・rule から分けることで request から decision・connection・response までを category 混同なく追跡できます。
  includes:
    - zh: 具名发起方对端点的连接尝试、已建立通信和以拒绝或失败结束的网络发生。
      en: Connection attempts by a named initiator, established communication, and network occurrences ending in denial or failure.
      ja: named initiator による connection attempt・established communication・denial/failure で終了する network occurrence。
  excludes:
    - zh: 请求或响应消息、主机或代理端点、DNS 候选、路由记录、网络策略文档和本地进程句柄。
      en: Request or response messages, host or proxy endpoints, DNS candidates, route records, network-policy documents, and local process handles.
      ja: request/response message・host/proxy endpoint・DNS candidate・route record・network-policy document・local process handle。
  semantic_kind: event
  aliases: []
structure:
  identity_keys:
    - interaction_id
    - initiator_ref
  fields:
    - id: interaction_id
      labels:
        zh: 交互标识
        en: interaction ID
        ja: interaction ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次网络通信发生。
        en: Stable identifier for one network communication occurrence.
        ja: 一 network communication occurrence の stable identifier。
      allowed_values: []
      pattern: null
      example_value: net-int-884
      source_claims:
        - claim-network-interaction-001
    - id: initiator_ref
      labels:
        zh: 发起方引用
        en: initiator reference
        ja: initiator reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向请求建立通信路径的主体或运行尝试。
        en: References the subject or run attempt requesting the communication path.
        ja: communication path を要求した subject/run attempt を参照します。
      allowed_values: []
      pattern: null
      example_value: run-attempt-884
      source_claims:
        - claim-network-interaction-001
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: started at
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录交互尝试开始的时间。
        en: Records when the interaction attempt began.
        ja: interaction attempt の開始時刻。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T02:31:04Z
      source_claims:
        - claim-network-interaction-001
    - id: direction
      labels:
        zh: 方向
        en: direction
        ja: direction
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 从受控主体观察的入站或出站方向。
        en: Inbound or outbound direction from the controlled subject's viewpoint.
        ja: controlled subject 視点の inbound/outbound direction。
      allowed_values: []
      pattern: null
      example_value: outbound
      source_claims:
        - claim-network-interaction-003
    - id: outcome
      labels:
        zh: 交互结果
        en: interaction outcome
        ja: interaction outcome
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录已授权、已拒绝、已建立、已完成或失败的最终发生结果。
        en: Records the final authorized, denied, established, completed, or failed occurrence outcome.
        ja: authorized・denied・established・completed・failed の final occurrence outcome。
      allowed_values: []
      pattern: null
      example_value: completed
      source_claims:
        - claim-network-interaction-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: NetworkInteraction-example-positive-manual-20260716
    kind: positive
    labels:
      zh: 经策略允许的 HTTPS 交互
      en: Policy-allowed HTTPS interaction
      ja: policy-allowed HTTPS interaction
    scenario_id: null
    descriptions:
      zh: run-attempt-884 在 02:31:04 请求出站 HTTPS 路径，策略决定允许，TLS 端点验证成功，交互 net-int-884 最终完成。
      en: run-attempt-884 requested an outbound HTTPS path at 02:31:04, policy allowed it, TLS endpoint verification succeeded, and interaction net-int-884 completed.
      ja: run-attempt-884 は 02:31:04 に outbound HTTPS path を要求し policy allow・TLS endpoint verification success 後 net-int-884 が completed になりました。
    field_values:
      interaction_id: net-int-884
      initiator_ref: run-attempt-884
      started_at: 2026-07-16T02:31:04Z
      direction: outbound
      outcome: completed
    related_node_ids:
      - NetworkInteraction
      - NetworkCall
    related_relation_ids:
      - NetworkCall-is_a-NetworkInteraction
    expected_result:
      zh: 建立一条可独立查询的网络交互事件。
      en: Create one independently queryable NetworkInteraction event.
      ja: 独立 query 可能な NetworkInteraction event を作成します。
    why_valid_or_invalid:
      zh: 记录具备唯一发生身份、发起方、方向、时间与结果，而不把请求正文或策略当成事件。
      en: The record has occurrence identity, initiator, direction, time, and outcome without treating request content or policy as the event.
      ja: occurrence identity・initiator・direction・time・outcome を備え request content/policy を event としません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-network-interaction-001
      - claim-network-interaction-002
  - id: NetworkInteraction-example-boundary-manual-20260716
    kind: boundary
    labels:
      zh: 只有计划中的端点配置
      en: Endpoint configuration only
      ja: endpoint config のみ
    scenario_id: network-review-networkinteraction-boundary
    descriptions:
      zh: 配置文件列出 api.example.com:443 与出站允许项，但没有发起方、时间或任何连接尝试证据。
      en: A configuration lists api.example.com:443 and an egress allowance but has no initiator, time, or evidence of a connection attempt.
      ja: config は api.example.com:443/egress allow を列挙しますが initiator・time・connection attempt evidence がありません。
    field_values: {}
    related_node_ids:
      - NetworkEndpoint
      - NetworkPolicy
    related_relation_ids: []
    expected_result:
      zh: 保留端点和策略，不创建 NetworkInteraction。
      en: Retain the endpoint and policy but do not create a NetworkInteraction.
      ja: endpoint/policy を保持し NetworkInteraction は作成しません。
    why_valid_or_invalid:
      zh: 可能的通信路径不等于已经发生的通信事件。
      en: A possible communication path is not an occurred communication event.
      ja: possible communication path は occurred communication event ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-network-interaction-001
external_mappings: []
