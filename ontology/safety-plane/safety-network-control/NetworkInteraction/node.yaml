    descriptions: {zh: "网络交互(NetworkInteraction) [NetworkInteraction]: 一次具名主体与网络端点之间可观测的通信发生。. Docker run --network=none 为容器分配 lo 以外的无网络接口，agent 代码无法发起出站 TCP/UDP 连接（docs.docker.com/network/none/）。 Fields: direction, interaction_id, initiator_ref.", en: "network interaction (NetworkInteraction) [NetworkInteraction]: An observable communication occurrence between a named initiator and a network endpoint.. Docker run --network=none gives a container only the loopback interface so agent code cannot make outbound TCP/UDP connections (docs.docker.com/network/none/). Fields include direction, interaction_id, initiator_ref.", ja: "network interaction(NetworkInteraction) [NetworkInteraction]: named initiator と network endpoint 間の observable communication occurrence。. Docker run --network=none は loopback のみの container を作り outbound TCP/UDP を阻止する。 Fields: direction, interaction_id, initiator_ref."}
