schema: moonweave.ai/ontology-node/v1
id: NetworkInteraction
kind: concept
labels:
  zh: 网络交互
  en: network interaction
  ja: ネットワーク相互作用
semantics:
  short_definition:
    zh: 一次完整网络交换的上位容器，含解析、调用与响应关联阶段。
    en: A genus container for one complete network exchange including resolution, call, and response correlation stages.
    ja: 解決・呼出し・応答相関段階を含む一回完結 network exchange の上位 container。
  definition:
    zh: NetworkInteraction 是 safety-network-control 的交换上位概念，拥有 NetworkCall、OutboundRequest、InboundResponse、NetworkRoute 及 resolution、hop、TLS 验证与 denial 阶段证据。一次 MCP tools/call 触发的 HTTPS egress 或 Agent 并发多请求各形成独立 NetworkInteraction；它不是 ToolResult 或 SideEffect。
    en: "NetworkInteraction is the exchange genus in safety-network-control owning NetworkCall, OutboundRequest, InboundResponse, NetworkRoute, and resolution, hop, TLS verification, and denial-stage evidence. One HTTPS egress from MCP tools/call or each concurrent agent request forms a separate NetworkInteraction; it is not ToolResult or SideEffect."
    ja: NetworkInteraction は safety-network-control の exchange 上位概念で NetworkCall/OutboundRequest/InboundResponse/NetworkRoute と resolution/hop/TLS verification/denial stage evidence を所有。MCP tools/call 由来 HTTPS egress または並行 agent request 各々が独立 NetworkInteraction。ToolResult/SideEffect ではない。
  why_needed:
    zh: 将一次交换的阶段证据置于同一容器，才能在并发请求下把 InboundResponse 唯一关联到 OutboundRequest，并区分 resolution deny 与 connection timeout。
    en: Placing stage evidence of one exchange in one container uniquely correlates InboundResponse to OutboundRequest under concurrent requests and separates resolution deny from connection timeout.
    ja: 一回 exchange の stage evidence を同一 container に置くと並行 request 下 InboundResponse を OutboundRequest に一意 correlate し resolution deny/connection timeout を分離できます。
  includes:
    - zh: 含 outbound 请求、策略评估、路由跳点、TLS 验证、响应关联与 denial/failure 阶段。
      en: Includes outbound request, policy evaluation, route hops, TLS verification, response correlation, and denial or failure stages.
      ja: outbound request/policy evaluation/route hop/TLS verification/response correlation/denial/failure stage を含む。
  excludes:
    - zh: 不包含 ToolResult 解析、业务 AuthorizationGrant、Socket handle 或 Sandbox filesystem policy。
      en: Excludes ToolResult parsing, business AuthorizationGrant, Socket handle, or Sandbox filesystem policy.
      ja: ToolResult parse/business AuthorizationGrant/Socket handle/Sandbox filesystem policy は含まない。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: 集成：每次 OutboundRequest initiates NetworkCall 开启 NetworkInteraction；InboundResponse responds_to 同一 request_id；302 redirect 产生新 NetworkInteraction 链。并发下必须用 stream ID/request ID/connection tuple 关联。
    en: "Integration: each OutboundRequest initiates NetworkCall opening NetworkInteraction; InboundResponse responds_to same request_id; 302 redirect creates new NetworkInteraction chain. Under concurrency use stream ID, request ID, or connection tuple for correlation."
    ja: 統合：各 OutboundRequest initiates NetworkCall で NetworkInteraction 開始。InboundResponse responds_to 同一 request_id。302 redirect は新 NetworkInteraction chain。並行時 stream ID/request ID/connection tuple で correlate 必須。
  typical_input:
    - description: MCP tool-triggered egress exchange.
      format: |
        interaction_id: net-int-884
        trigger: tools/call registry fetch
      source_claims:
        - claim-network-interaction-mcp
  typical_output:
    - description: Completed interaction with correlated response.
      format: |
        interaction_id: net-int-884
        call_status: completed
        response_id: in-resp-884
      source_claims:
        - claim-network-interaction-design
  reference_implementations:
    - name: MCP Specification — Tools
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/server/tools/
      description: tools/call triggering outbound network from MCP servers.
    - name: RFC 9110 HTTP Semantics
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      description: Request/response exchange and redirect semantics.
structure:
  identity_keys:
    - interaction_id
  fields:
    - id: interaction_id
      labels:
        zh: 交互标识
        en: interaction ID
        ja: 相互作用 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次完整 NetworkInteraction 交换。
        en: Stably identifies one complete NetworkInteraction exchange.
        ja: 一回完結 NetworkInteraction exchange を安定識別。
      allowed_values: []
      pattern: null
      example_value: net-int-884
      source_claims:
        - claim-network-interaction-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: NetworkInteraction-https-complete
    labels:
      zh: 完整 HTTPS 交换
      en: Complete HTTPS exchange
      ja: 完結 HTTPS exchange
    descriptions:
      zh: net-int-884 含 out-req-884、route-884、in-resp-884；call_status=completed，HTTP/2 stream 17 关联。
      en: net-int-884 includes out-req-884, route-884, in-resp-884; call_status=completed with HTTP/2 stream 17 correlation.
      ja: net-int-884 が out-req-884/route-884/in-resp-884 含む。call_status=completed、HTTP/2 stream 17 correlate。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: network interaction chain
    field_values:
      interaction_id: net-int-884
      call_status: completed
    related_node_ids:
      - NetworkInteraction
      - OutboundRequest
      - InboundResponse
      - NetworkCall
    related_relation_ids:
      - OutboundRequest-initiates-NetworkCall
      - InboundResponse-responds_to-OutboundRequest
    source_claims:
      - claim-network-interaction-design
  - id: NetworkInteraction-policy-deny
    labels:
      zh: 策略拒绝交换
      en: Policy-denied exchange
      ja: policy deny exchange
    descriptions:
      zh: net-int-885 在 policy 阶段 deny，无 InboundResponse；denial_stage=policy，transport_connection_started=false。
      en: net-int-885 denied at policy stage with no InboundResponse; denial_stage=policy, transport_connection_started=false.
      ja: net-int-885 policy 段階 deny、InboundResponse なし。denial_stage=policy、transport_connection_started=false。
    example_source:
      product: Kubernetes
      url: https://kubernetes.io/docs/concepts/services-networking/network-policies/
      version: egress deny
    field_values:
      interaction_id: net-int-885
      call_status: denied
    related_node_ids:
      - NetworkInteraction
      - NetworkCall
      - NetworkPolicy
    related_relation_ids: []
    source_claims:
      - claim-network-interaction-k8s
  - id: NetworkInteraction-redirect-new-chain
    labels:
      zh: 重定向新交换链
      en: Redirect new exchange chain
      ja: redirect 新 exchange chain
    descriptions:
      zh: 302 到 169.254.169.254 必须新 NetworkInteraction；原 allow 不可继承，authorization_chain_complete=false。
      en: 302 to 169.254.169.254 requires new NetworkInteraction; original allow cannot inherit, authorization_chain_complete=false.
      ja: 169.254.169.254 へ 302 は新 NetworkInteraction 必須。原 allow 継承不可、authorization_chain_complete=false。
    example_source:
      product: OWASP SSRF guidance
      url: https://owasp.org/www-community/attacks/Server_Side_Request_Forgery
      version: redirect SSRF
    field_values:
      authorization_chain_complete: false
    related_node_ids:
      - NetworkInteraction
      - InboundResponse
      - OutboundRequest
    related_relation_ids: []
    source_claims:
      - claim-network-interaction-design
  - id: NetworkInteraction-stdio-no-interaction
    labels:
      zh: stdio 无网络交互
      en: stdio has no network interaction
      ja: stdio は network interaction なし
    descriptions:
      zh: MCP stdio transport 不产生 NetworkInteraction；HTTP MCP server 出站才记录。
      en: MCP stdio transport produces no NetworkInteraction; HTTP MCP server egress records one.
      ja: MCP stdio transport は NetworkInteraction 生成せず。HTTP MCP server egress のみ記録。
    example_source:
      product: MCP
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/basic/transports/
      version: stdio vs HTTP
    field_values:
      network_interaction_created: false
    related_node_ids:
      - NetworkInteraction
    related_relation_ids: []
    source_claims:
      - claim-network-interaction-mcp
parent_relation: null
relations: []
