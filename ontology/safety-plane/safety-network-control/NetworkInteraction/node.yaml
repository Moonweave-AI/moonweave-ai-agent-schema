    source_type: standard
    relevance: Request/response exchange and redirect chains.
  - id: k8s-network-policy
    title: Kubernetes NetworkPolicy
    url: https://kubernetes.io/docs/concepts/services-networking/network-policies/
    source_type: official-doc
    relevance: Policy denial stages in network interactions.
  - id: safety-network-design
    title: Moonweave safety-network-control module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: NetworkInteraction as exchange container for call, route, and response provenance.
source_claims:
  - id: claim-network-interaction-mcp
    source: mcp-transports-2025-06-18
    supports: MCP HTTP/SSE server egress forms NetworkInteraction; stdio transport does not.
    locator: MCP transports
    evidence_kind: official
    confidence: high
  - id: claim-network-interaction-k8s
    source: k8s-network-policy
    supports: Kubernetes NetworkPolicy denial before connection maps to NetworkInteraction policy stage deny.
    locator: NetworkPolicy egress
    evidence_kind: official
    confidence: high
  - id: claim-network-interaction-design
    source: safety-network-design
    supports: Moonweave containers resolution, call, route, TLS, and response correlation in NetworkInteraction with redirect re-authorization rules.
    locator: NetworkInteraction boundary
    evidence_kind: design-inference
    confidence: high
