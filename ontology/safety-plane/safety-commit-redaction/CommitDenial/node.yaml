    source_type: official-doc
    relevance: Verified secret hits causing pre-commit/CI deny.
  - id: github-secret-scanning
    title: GitHub Secret Scanning and Push Protection
    url: https://docs.github.com/en/code-security/secret-scanning
    source_type: official-doc
    relevance: Push protection block as remote CommitDenial.
  - id: safety-commit-design
    title: Moonweave safety-commit-redaction module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: CommitDenial as call-scoped deny GateOutcome before SideEffect.
source_claims:
  - id: claim-commit-denial-git-secrets
    source: git-secrets-awslabs
    supports: git-secrets non-zero exit on prohibited patterns maps to CommitDenial before SideEffect.
    locator: git-secrets commit hooks
    evidence_kind: official
    confidence: high
  - id: claim-commit-denial-trufflehog
    source: trufflehog-docs
    supports: TruffleHog verified secret detection in pre-commit/CI yields CommitDenial with auditable denial_reason.
    locator: TruffleHog verified secrets
    evidence_kind: official
    confidence: high
  - id: claim-commit-denial-github
    source: github-secret-scanning
    supports: GitHub push protection block events map to CommitDenial without remote SideEffect.
    locator: Push protection
    evidence_kind: official
    confidence: high
  - id: claim-commit-denial-design
    source: safety-commit-design
    supports: Moonweave requires CommitDenial to precede SideEffect and bind frozen CommitRequest with reason and policy basis.
    locator: CommitDenial temporal boundary
    evidence_kind: design-inference
    confidence: high
