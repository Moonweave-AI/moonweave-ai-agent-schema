schema: moonweave.ai/ontology-node/v1
id: CommitDenial
kind: concept
labels:
  zh: 提交拒绝
  en: commit denial
  ja: コミット拒否
semantics:
  short_definition:
    zh: CommitGate 对一次冻结 CommitRequest 给出的 deny 门控结果（非零 exit code）。
    en: A deny gate outcome from CommitGate over one frozen CommitRequest (non-zero exit code).
    ja: 凍結 CommitRequest に対する CommitGate の deny ゲート結果（非零 exit code）。
  definition:
    zh: CommitDenial 是 GateOutcome 的 deny 特化：必须具有 result=deny、gate_outcome_id、gate_ref、证据引用与产生时间，并绑定尚未执行的具体 CommitRequest、call ID、拒绝主体、policy_basis_refs 与 denial_reason。git-secrets 非零退出、TruffleHog verified secret、GitHub push protection block 或人工 state.reject 均可作为证据；结果本身不是执行失败，也不在没有 CommitGate 求值时冒充 DenyDecision。
    en: "CommitDenial is the deny specialization of GateOutcome: it requires result=deny, gate_outcome_id, gate_ref, evidence references, and production time, binding one unexecuted CommitRequest, call ID, denying authority, policy_basis_refs, and denial_reason. Non-zero git-secrets exit, TruffleHog verified secret, GitHub push protection block, or human state.reject may be evidence; the outcome is neither execution failure nor DenyDecision without CommitGate evaluation."
    ja: CommitDenial は GateOutcome の deny 特化で result=deny、gate_outcome_id、gate_ref、証拠参照、生成時刻を必須とし、未実行 CommitRequest/call ID/拒否主体/policy_basis_refs/denial_reason に束縛。git-secrets 非零 exit、TruffleHog verified secret、GitHub push protection block、human state.reject は evidence になり得ますが、実行失敗でも CommitGate 評価なし DenyDecision でもありません。
  why_needed:
    zh: 明确的调用级拒绝让恢复逻辑返回可审计拒绝而不执行动作，并区分 git-secrets 阻断、TruffleHog 命中与执行后的网络超时。
    en: An explicit call-scoped denial lets resume logic return an auditable rejection without executing the action and keeps git-secrets blocks, TruffleHog hits, and post-execution network timeouts distinct.
    ja: call 単位明示 deny により resume logic は動作実行せず監査可能 reject を返し、git-secrets block/TruffleHog hit/実行後 network timeout を区別できます。
  includes:
    - zh: 绑定具体 call ID、请求摘要、拒绝主体、策略依据与可呈现理由的程序化或人工 deny 记录。
      en: Programmatic or human deny records bound to a concrete call ID, request digest, rejecting authority, policy basis, and presentable reason.
      ja: 具体 call ID、request digest、拒否主体、policy 根拠、提示可能 reason に bind した programmatic/human deny record。
  excludes:
    - zh: 工具运行后的失败/超时、无 CommitGate 求值的全局 DenyDecision、仅表示非推荐的风险提示。
      en: Post-execution failure or timeout, global DenyDecision without CommitGate evaluation, risk warning that merely advises against execution.
      ja: 実行後 failure/timeout、CommitGate 評価なし global DenyDecision、単なる非推奨 risk warning。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 映射：git-secrets `[ERROR] prohibited pattern` exit 1 → CommitDenial；TruffleHog `--only-verified` 命中 → CommitDenial + denial_reason=verified_secret；GitHub push protection → CommitDenial denial_stage=remote。拒绝必须 precede SideEffect；执行已开始后的故障不是 CommitDenial。
    en: "Mapping: git-secrets [ERROR] prohibited pattern exit 1 → CommitDenial; TruffleHog --only-verified hit → CommitDenial with denial_reason=verified_secret; GitHub push protection → CommitDenial denial_stage=remote. Denial must precede SideEffect; faults after execution starts are not CommitDenial."
    ja: mapping：git-secrets prohibited pattern exit 1 → CommitDenial；TruffleHog verified hit → CommitDenial/denial_reason=verified_secret；GitHub push protection → CommitDenial/denial_stage=remote。deny は SideEffect 前必須。実行開始後 fault は CommitDenial ではありません。
  typical_input:
    - description: git-secrets blocks staged AWS key.
      format: |
        .env:12:aws_secret_key detected
        [ERROR] git-secrets: prohibited pattern found
        exit 1
      source_claims:
        - claim-commit-denial-git-secrets
    - description: TruffleHog verified secret in pre-commit.
      format: |
        Found verified result: AWS credential in config/.env
        exit 1 => CommitDenial
      source_claims:
        - claim-commit-denial-trufflehog
  typical_output:
    - description: CommitDenial with policy basis and no SideEffect.
      format: |
        gate_outcome_id: commit-gate-outcome-deny-19
        gate_ref: cg_19
        result: deny
        denial_reason: path outside approved repository scope
        side_effect_created: false
      source_claims:
        - claim-commit-denial-design
  reference_implementations:
    - name: git-secrets (AWS Labs)
      url: https://github.com/awslabs/git-secrets
      description: Non-zero exit when prohibited patterns match staged content.
    - name: TruffleHog
      url: https://github.com/trufflesecurity/trufflehog
      description: Verified secret detection causing CI/pre-commit failure.
    - name: GitHub Secret Scanning and Push Protection
      url: https://docs.github.com/en/code-security/secret-scanning
      description: Server-side push block events as remote CommitDenial.
structure:
  identity_keys:
    - gate_outcome_id
  fields:
    - id: gate_outcome_id
      labels:
        zh: 门控结果标识
        en: gate outcome ID
        ja: ゲート結果 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识这一次 CommitGate deny 结果的稳定唯一值。
        en: Stable unique identifier for this CommitGate deny result.
        ja: 一回の CommitGate deny 結果を識別する安定一意値。
      allowed_values: []
      pattern: null
      example_value: commit-gate-outcome-deny-19
      source_claims:
        - claim-commit-denial-design
    - id: commit_request_ref
      labels:
        zh: 提交请求引用
        en: commit request reference
        ja: 確定要求参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 被本次门控求值拒绝的冻结 CommitRequest 引用。
        en: Reference to the frozen CommitRequest denied by this gate evaluation.
        ja: 本 gate 評価が拒否した凍結 CommitRequest への参照。
      allowed_values: []
      pattern: null
      example_value: cr_19
      source_claims:
        - claim-commit-denial-design
    - id: denial_reason
      labels:
        zh: 拒绝理由
        en: denial reason
        ja: 拒否理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 解释为何所绑定 CommitRequest 未通过本次门控求值的可审计理由。
        en: Auditable reason why the bound CommitRequest did not pass this gate evaluation.
        ja: bind CommitRequest が本 gate 評価を通過しなかった監査可能 reason。
      allowed_values: []
      pattern: null
      example_value: verified AWS credential detected in staged .env
      source_claims:
        - claim-commit-denial-trufflehog
    - id: hook_exit_code
      labels:
        zh: 钩子退出码
        en: hook exit code
        ja: hook 終了コード
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: pre-commit hook 非零退出码作为 deny 证据；0 不得映射为 CommitDenial。
        en: Non-zero pre-commit hook exit code as deny evidence; 0 must not map to CommitDenial.
        ja: pre-commit hook 非零 exit code を deny evidence とし、0 は CommitDenial に写像不可。
      allowed_values: []
      pattern: null
      example_value: 1
      source_claims:
        - claim-commit-denial-git-secrets
  constraints:
    - id: commit-denial-pre-execution
      severity: error
      expression_language: plain
      expression: CommitDenial MUST precede SideEffect execution; post-execution failures MUST NOT be classified as CommitDenial
      explanations:
        zh: 拒绝决定必须先于被阻断动作。
        en: A denial must precede the action it blocks.
        ja: deny 判断は阻止対象 action より前でなければなりません。
      source_claims:
        - claim-commit-denial-design
  required_relation_constraints: []
examples:
  - id: CommitDenial-git-secrets-scope
    labels:
      zh: git-secrets 外域路径拒绝
      en: git-secrets out-of-scope path denial
      ja: git-secrets 範囲外 path 拒否
    descriptions:
      zh: 审核员拒绝 call_19 的 apply_patch，因 D:/shared/secrets.env 位于获批仓库外；git-secrets 或人工 reject 产生 CommitDenial，命令未执行。
      en: call_19 apply_patch is denied because D:/shared/secrets.env lies outside the approved repository; git-secrets or human reject produces CommitDenial and the command does not execute.
      ja: call_19 apply_patch が D:/shared/secrets.env が承認 repo 外のため拒否。git-secrets または human reject が CommitDenial を生成し command 未実行。
    example_source:
      product: git-secrets
      url: https://github.com/awslabs/git-secrets
      version: prohibited patterns
    field_values:
      gate_outcome_id: commit-gate-outcome-deny-19
      gate_ref: cg_19
      denial_reason: path outside approved repository scope
      hook_exit_code: 1
    related_node_ids:
      - CommitDenial
      - CommitGate
      - CommitRequest
    related_relation_ids:
      - CommitDenial-denies-CommitRequest
    source_claims:
      - claim-commit-denial-git-secrets
  - id: CommitDenial-trufflehog-verified
    labels:
      zh: TruffleHog verified 密钥拒绝
      en: TruffleHog verified secret denial
      ja: TruffleHog verified secret 拒否
    descriptions:
      zh: CI 运行 TruffleHog `--only-verified` 在 PR 发现 Slack webhook；CommitGate deny 阻止 merge SideEffect，denial_reason 引用 verified secret 类型。
      en: CI runs TruffleHog --only-verified on a PR and finds a Slack webhook; CommitGate deny blocks merge SideEffect with denial_reason citing verified secret type.
      ja: CI が PR で TruffleHog --only-verified を実行し Slack webhook 検出。CommitGate deny で merge SideEffect block、denial_reason に verified secret type。
    example_source:
      product: TruffleHog
      url: https://github.com/trufflesecurity/trufflehog
      version: verified detection
    field_values:
      gate_outcome_id: commit-gate-outcome-deny-truffle-7
      denial_reason: verified slack_webhook in config/.env
    related_node_ids:
      - CommitDenial
      - CommitGate
    related_relation_ids: []
    source_claims:
      - claim-commit-denial-trufflehog
  - id: CommitDenial-execution-timeout-boundary
    labels:
      zh: 执行超时非拒绝
      en: Execution timeout is not denial
      ja: 実行 timeout は拒否ではない
    descriptions:
      zh: call_19 已获批准并开始执行，远端服务三十秒后超时；该记录是执行失败，不能倒推为 CommitDenial。
      en: call_19 was approved and began execution but the remote service timed out after thirty seconds; this is execution failure, not CommitDenial.
      ja: call_19 は承認後実行開始、remote service が 30 秒 timeout。実行失敗であり CommitDenial へ遡及分類不可。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: pre-execution denial boundary
    field_values:
      accepted_as_commit_denial: false
    related_node_ids:
      - CommitDenial
      - CommitApproval
      - SideEffect
    related_relation_ids: []
    source_claims:
      - claim-commit-denial-design
  - id: CommitDenial-github-push-block
    labels:
      zh: GitHub push protection 拒绝
      en: GitHub push protection denial
      ja: GitHub push protection 拒否
    descriptions:
      zh: push 含 exposed token；GitHub secret scanning push protection 返回 block，映射 CommitDenial cd-push-4，remote SideEffect 未发生。
      en: Push contains an exposed token; GitHub secret scanning push protection returns block mapped to CommitDenial cd-push-4; remote SideEffect did not occur.
      ja: push に exposed token。GitHub push protection block を CommitDenial cd-push-4 に写像。remote SideEffect 未発生。
    example_source:
      product: GitHub
      url: https://docs.github.com/en/code-security/secret-scanning
      version: push protection
    field_values:
      gate_outcome_id: commit-gate-outcome-deny-push-4
      denial_reason: push blocked by secret scanning push protection
    related_node_ids:
      - CommitDenial
      - CommitGate
    related_relation_ids: []
    source_claims:
      - claim-commit-denial-github
parent_relation: null
relations:
  - id: CommitDenial-is_a-GateOutcome
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是一种门控结果
      en: is a GateOutcome
      ja: GateOutcome の一種
    definitions:
      zh: 每个 CommitDenial 都是 GateOutcome，以 result=deny 与具体 CommitRequest、call ID、拒绝主体、策略依据和拒绝理由为种差。
      en: Every CommitDenial is a GateOutcome distinguished by result=deny and binding one CommitRequest, call ID, denying authority, policy basis, and denial reason.
      ja: すべての CommitDenial は GateOutcome で result=deny と具体 CommitRequest/call ID/拒否主体/policy 根拠/拒否理由が種差。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 分类继承不使用实例关系基数。
      en: Taxonomic inheritance does not use instance-relation cardinality.
      ja: 分類継承にはインスタンス関係の基数を用いません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 有下位类型
        en: has subtype
        ja: 下位型を持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-commit-denial-design
    distinct_fact_rationale:
      zh: 需要已完成 CommitGate 求值，不是策略评估结果。
      en: Requires a completed CommitGate evaluation, not a policy-evaluation result.
      ja: 完了 CommitGate 評価を要求し policy evaluation 結果ではありません。
    layout_role: secondary-backbone
    target: concept:GateOutcome
  - id: CommitDenial-denies-CommitRequest
    predicate: denies
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 拒绝具体提交请求
      en: denies commit request
      ja: 具体的確定要求を拒否
    definitions:
      zh: CommitDenial 拒绝由 call_id、参数摘要与目标确定的 CommitRequest，并记录拒绝主体与理由。
      en: CommitDenial denies one CommitRequest identified by call ID, argument digest, and target and records rejecting subject and reason.
      ja: CommitDenial は call ID/argument digest/対象で同定される CommitRequest を拒否し拒否主体と reason を記録。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 类级事实不替代实例级决定范围校验。
      en: Class-level fact does not replace instance-level decision-scope validation.
      ja: class-level fact は instance-level 判断 scope 検証を置換しません。
    inverse_reading:
      predicate: denied_by
      labels:
        zh: 由提交拒绝决定
        en: denied by commit denial
        ja: 確定拒否により拒否済み
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-commit-denial-design
    distinct_fact_rationale:
      zh: 闸门可能产生拒绝不足以回答哪个请求被拒绝。
      en: A gate's ability to produce denial does not identify which request was denied.
      ja: gate が拒否生成可能でもどの request が拒否されたかは分かりません。
    layout_role: cross-link
    target: concept:CommitRequest
  - id: CommitDenial-blocks-SideEffect
    predicate: blocks
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 阻断副作用
      en: blocks side effect
      ja: 副作用を阻止
    definitions:
      zh: CommitDenial 阻止其绑定的 SideEffect 进入执行；不是执行失败，也不取消无关请求。
      en: CommitDenial prevents its bound SideEffect from entering execution; it is not execution failure and does not cancel unrelated requests.
      ja: CommitDenial は bind SideEffect の実行開始を阻止。実行失敗ではなく無関係 request は取消しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: blocks 是治理决定的执行前效果。
      en: blocks is the pre-execution effect of governance.
      ja: blocks は governance の実行前効果です。
    inverse_reading:
      predicate: blocked_by
      labels:
        zh: 被阻断
        en: blocked by
        ja: 阻止される
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-commit-denial-design
    distinct_fact_rationale:
      zh: DenyDecision 分类不能说明哪个 SideEffect 被阻断。
      en: DenyDecision taxonomy cannot identify the blocked SideEffect.
      ja: DenyDecision 分類は blocked SideEffect を示せません。
    layout_role: cross-link
    target: concept:SideEffect
