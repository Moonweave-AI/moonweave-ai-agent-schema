        descriptions:
          zh: call_19 已被允许并开始执行，随后远端服务超时；该诊断没有事前 result=deny 的门控求值，因而不是 CommitDenial。
          en: call_19 was allowed and began execution before a remote timeout; the diagnostic has no pre-execution gate evaluation with result=deny and is not CommitDenial.
          ja: call_19 は許可され実行開始後に remote timeout となり、診断には事前 result=deny の gate 評価がないため CommitDenial ではありません。
