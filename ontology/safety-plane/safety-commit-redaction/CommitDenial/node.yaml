  - id: CommitDenial-denies-CommitRequest
    predicate: denies
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 拒绝具体提交请求
      en: denies commit request
      ja: 具体的な確定要求を拒否
    definitions:
      zh: 一个 CommitDenial 拒绝一个由 call_id、参数摘要与目标共同确定的 CommitRequest，并记录拒绝主体与理由；它阻断该请求，但不证明没有发生其他请求的副作用。
      en: A CommitDenial denies one CommitRequest identified by call ID, argument digest, and target and records the rejecting subject and reason. It blocks that request but does not prove that no side effect from another request occurred.
      ja: CommitDenial は call ID・引数 digest・対象で同定される一件の CommitRequest を拒否し、拒否主体と理由を記録します。当該要求を阻止しますが別要求の副作用不存在までは証明しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 类级事实不替代实例级决定范围校验。
      en: The class-level fact does not replace instance-level decision-scope validation.
      ja: class-level 事実は instance-level 判断 scope 検証を置換しません。
    inverse_reading:
      predicate: denied_by
      labels:
        zh: 由提交拒绝决定拒绝
        en: denied by commit denial
        ja: 確定拒否により拒否済み
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: CommitDenial-denies-CommitRequest-example-positive-001
        labels:
          zh: 同一调用拒绝
          en: Same-call denial
          ja: 同一 call の拒否
        descriptions:
          zh: denial den_91 引用 cr_91 的 call_91 与参数摘要，并因目标账户不在授权范围内拒绝退款。
          en: Denial den_91 references cr_91's call_91 and argument digest and rejects the refund because the target account is outside authorized scope.
          ja: denial den_91 は cr_91 の call_91 と引数 digest を参照し、対象口座が認可範囲外のため返金を拒否します。
        field_values: {}
        related_node_ids:
          - CommitDenial
          - CommitRequest
        related_relation_ids:
          - CommitDenial-denies-CommitRequest

          en: Assert den_91 denies cr_91 and prevent that frozen refund request from producing a SideEffect; the conclusion does not extend to other calls.
          ja: den_91 denies cr_91 を主張して当該固定返金要求による SideEffect を阻止し、この結論を他の call へ拡張しません。

          en: The denial explicitly references call_91, the same argument digest, and the out-of-scope account and records a reason, giving the decision a verifiable one-request scope.
          ja: denial は call_91・同一引数 digest・scope 外口座を明示して理由を記録するため、判断と拒否要求の一要求単位 scope を検証できます。
        source_claims:
          - claim-commit-denial-015
      - id: CommitDenial-denies-CommitRequest-example-boundary-001
        labels:
          zh: 工具级禁用边界
          en: Tool-disable boundary
          ja: tool 無効化境界
        descriptions:
          zh: 管理员从注册表停用 refund 工具，但没有针对 cr_91 产生带 call_id 的拒绝记录；工具状态本身不是 CommitDenial-denies-CommitRequest。
          en: An administrator disables the refund tool in the registry without producing a call-scoped denial record for cr_91; tool status alone is not CommitDenial-denies-CommitRequest.
          ja: 管理者が registry で refund tool を無効化しても cr_91 の call-scoped 拒否記録がなければ、この関係は成立しません。
        field_values: {}
        related_node_ids:
          - CommitDenial
          - CommitRequest
        related_relation_ids:
          - CommitDenial-denies-CommitRequest

          en: Record only that the refund tool is unavailable in the registry; do not assert den_91 denies cr_91 or infer that a particular pending call was human-rejected.
          ja: registry 上の refund tool 不可用だけを記録し、den_91 denies cr_91 を主張せず、特定 pending call の人手拒否も推論しません。

          en: Tool-level disablement creates no denial decision referencing cr_91 and supplies no matching call ID, argument digest, or rejection reason, so identity and scope evidence for a request-level denies edge is absent.
          ja: tool-level 無効化には cr_91 を参照する拒否判断、同一 call ID、引数 digest、拒否理由がなく、要求単位 denies edge の identity/scope 証拠がありません。
        source_claims:
          - claim-commit-denial-016
    source_claims:
      - claim-commit-denial-017
    distinct_fact_rationale:
      zh: 闸门可能产生拒绝，不足以回答某个拒绝针对哪个冻结请求。
      en: A gate's ability to produce denial does not identify which frozen request a particular denial decided.
      ja: gate が拒否を生成可能であるだけでは特定拒否の対象要求を識別できません。
    layout_role: cross-link
    review_status: accepted
    target: concept:CommitRequest
