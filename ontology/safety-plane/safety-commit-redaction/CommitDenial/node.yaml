schema: moonweave.ai/ontology-node/v1
id: CommitDenial
kind: concept
status: accepted
labels:
  en: commit denial
  zh: 提交拒绝
  ja: コミット拒否
semantics:
  short_definition:
    zh: 记录 CommitGate 对某次有界副作用给出的 result=deny 门控结果。
    en: A result=deny GateOutcome from one CommitGate evaluation over a bounded side-effect request.
    ja: 有界な副作用要求に対する CommitGate の一回評価から生じる result=deny の GateOutcome。
  definition:
    zh: CommitDenial 是 CommitGate 一次求值产生的 GateOutcome 特化，必须具有 result=deny、gate_outcome_id、gate_ref、证据引用与产生时间，并把结果绑定到尚未执行的具体 CommitRequest、call ID、拒绝主体、策略依据和理由。人工拒绝可以是证据，但该结果本身不是执行失败，也不在缺少 PolicyEvaluation 事实时冒充 DenyDecision。
    en: CommitDenial is a GateOutcome specialization produced by one CommitGate evaluation. It requires result=deny, gate_outcome_id, gate_ref, evidence references, and production time, and binds the outcome to one unexecuted CommitRequest, call ID, denying authority, policy basis, and reason. A human rejection may be evidence, but the outcome is neither an execution failure nor a DenyDecision without separate PolicyEvaluation facts.
    ja: CommitDenial は一回の CommitGate 評価で生じる GateOutcome の特殊化です。result=deny、gate_outcome_id、gate_ref、証拠参照、生成時刻を必須とし、未実行の具体的 CommitRequest・call ID・拒否主体・policy 根拠・理由へ結果を束縛します。人間拒否は証拠になり得ますが、結果自体は実行失敗でも、別 PolicyEvaluation 事実なしの DenyDecision でもありません。
  why_needed:
    zh: 明确的调用级拒绝让恢复逻辑能够返回可审计的拒绝结果而不执行动作，也避免把权限不足、人工否决与执行后的网络错误混为一类。
    en: An explicit call-scoped denial lets resume logic return an auditable rejection without executing the action and keeps missing authority or human rejection distinct from a post-execution network failure.
    ja: 呼出し単位の明示的拒否により、再開処理は動作を実行せず監査可能な拒否結果を返せ、権限不足や人手拒否を実行後のネットワーク障害と区別できます。
  includes:
    - zh: 绑定具体 call ID、请求参数摘要、拒绝主体、政策依据和可呈现理由的人工或程序化拒绝。
      en: Human or programmatic rejections bound to a concrete call ID, request digest, rejecting authority, policy basis, and presentable reason.
      ja: 具体的 call ID、要求要約、拒否主体、ポリシー根拠、提示可能な理由に結び付く人手またはプログラムによる拒否。
  excludes:
    - zh: 工具运行后的失败、超时或错误诊断；没有实际 CommitGate 求值标识、证据和时间的全局 DenyDecision；以及只表示不推荐的风险提示。
      en: A post-execution failure, timeout, or diagnostic; a global DenyDecision with no actual CommitGate evaluation ID, evidence, or time; and a risk warning that merely advises against execution.
      ja: tool 実行後の失敗・timeout・診断、実際の CommitGate 評価 ID・証拠・時刻を欠く全体 DenyDecision、単なる非推奨 risk warning。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - gate_outcome_id
  fields:
    - id: gate_outcome_id
      labels:
        zh: 门控结果标识
        en: gate outcome ID
        ja: ゲート結果 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识这一次 CommitGate 拒绝结果的稳定唯一值，并继承 GateOutcome 的身份条件。
        en: Stable unique identifier for this deny result of one CommitGate evaluation, inheriting GateOutcome identity.
        ja: 一回の CommitGate 評価による deny 結果を識別し GateOutcome 同一性を継承する安定一意値です。
      allowed_values: []
      pattern: null
      example_value: commit-gate-outcome-deny-19
      source_claims:
        - claim-commit-denial-002
    - id: commit_request_ref
      labels:
        zh: 提交请求引用
        en: commit request reference
        ja: 確定要求参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 被本次门控求值拒绝的冻结 CommitRequest 引用。
        en: Reference to the frozen CommitRequest denied by this gate evaluation.
        ja: この gate 評価が拒否した凍結 CommitRequest への参照です。
      allowed_values: []
      pattern: null
      example_value: cr_19
      source_claims:
        - claim-commit-denial-003
    - id: call_id
      labels:
        zh: 调用标识
        en: call ID
        ja: 呼出し ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 被拒绝且因此不得执行的具体工具调用标识。
        en: Identifier of the concrete tool call denied and therefore not released.
        ja: 拒否され解放されない具体的 tool call の識別子です。
      allowed_values: []
      pattern: null
      example_value: call_19
      source_claims:
        - claim-commit-denial-004
    - id: denying_authority_ref
      labels:
        zh: 拒绝主体引用
        en: denying authority reference
        ja: 拒否主体参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对门控证据给出有效拒绝回答的人或程序化主体。
        en: Human or programmatic authority whose valid answer supports the gate's deny result.
        ja: gate の deny 結果を支える有効回答を出した人間またはプログラム主体です。
      allowed_values: []
      pattern: null
      example_value: operator_7
      source_claims:
        - claim-commit-denial-005
    - id: policy_basis_refs
      labels:
        zh: 策略依据引用
        en: policy basis references
        ja: policy 根拠参照
      datatype: array<string>
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 拒绝主体在门控求值中采用的策略、范围或安全约束引用集合。
        en: Policy, scope, or safety-constraint references used by the denying authority during gate evaluation.
        ja: gate 評価で拒否主体が用いた policy・scope・security constraint の参照集合です。
      allowed_values: []
      pattern: null
      example_value:
        - repository-scope-policy@3
      source_claims:
        - claim-commit-denial-006
    - id: denial_reason
      labels:
        zh: 拒绝理由
        en: denial reason
        ja: 拒否理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 解释为何所绑定 CommitRequest 未通过本次门控求值的可审计理由。
        en: Auditable reason why the bound CommitRequest did not pass this gate evaluation.
        ja: 束縛 CommitRequest がこの gate 評価を通過しなかった監査可能な理由です。
      allowed_values: []
      pattern: null
      example_value: target path is outside the approved repository scope
      source_claims:
        - claim-commit-denial-007
  constraints: []
  required_relation_constraints: []
examples:
  - id: CommitDenial-example-positive-001
    kind: positive
    labels:
      zh: 外域写入拒绝
      en: Out-of-scope write denial
      ja: 範囲外書込み拒否
    scenario_id: null
    descriptions:
      zh: 审核员拒绝 call_19 的 apply_patch，因为目标 D:/shared/secrets.env 位于获批仓库之外；拒绝记录指明 repository-scope-policy@3，且命令未执行。
      en: A reviewer rejects call_19 for apply_patch because D:/shared/secrets.env lies outside the approved repository; the denial cites repository-scope-policy@3 and the command does not execute.
      ja: 審査者は対象 D:/shared/secrets.env が承認済みリポジトリ外にあるため call_19 の apply_patch を拒否します。拒否は repository-scope-policy@3 を示し、コマンドは実行されません。
    field_values:
      gate_outcome_id: commit-gate-outcome-deny-19
      gate_ref: cg_19
      result: deny
      evidence_refs:
        - permission-response-19
        - cr_19
        - repository-scope-policy@3
      produced_at: 2026-07-14T10:20:00Z
      commit_request_ref: cr_19
      call_id: call_19
      denying_authority_ref: operator_7
      policy_basis_refs:
        - repository-scope-policy@3
      denial_reason: requested commit contains a path outside the approved repository scope
    related_node_ids:
      - CommitDenial
      - SideEffect
      - GateOutcome
      - CommitGate
    related_relation_ids:
      - CommitDenial-is_a-GateOutcome
      - CommitDenial-blocks-SideEffect
    expected_result:
      zh: call_19 保持未执行，运行获得带策略依据的拒绝结果，可由调用方改写请求后重新申请。
      en: call_19 remains unexecuted and the run receives a policy-grounded rejection that permits a revised request to seek new approval.
      ja: call_19 は未実行のまま、実行はポリシー根拠付き拒否結果を受け取り、修正要求で再申請できます。
    why_valid_or_invalid:
      zh: 拒绝绑定单个调用、明确主体和政策理由，并发生在潜在写入之前，因而是提交拒绝而非执行错误。
      en: The rejection binds one call, authority, and policy reason and occurs before the potential write, making it a commit denial rather than an execution error.
      ja: 単一呼出し、拒否主体、ポリシー理由に結び付き、書込み前に発生するため、実行エラーではなく確定拒否です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-commit-denial-008
  - id: CommitDenial-example-boundary-001
    kind: boundary
    labels:
      zh: 执行超时边界
      en: Execution timeout boundary
      ja: 実行タイムアウトの境界
    scenario_id: null
    descriptions:
      zh: call_19 已获批准并开始执行，但远端服务在三十秒后超时；该记录描述执行失败，不能倒推为 CommitDenial。
      en: call_19 was approved and began execution, but the remote service timed out after thirty seconds; this record describes execution failure and cannot be reclassified as CommitDenial.
      ja: call_19 は承認され実行開始後、遠隔サービスが 30 秒でタイムアウトしました。この記録は実行失敗であり CommitDenial へ遡及分類できません。
    field_values: {}
    related_node_ids:
      - CommitDenial
      - CommitApproval
      - SideEffect
      - GateOutcome
      - DenyDecision
    related_relation_ids: []
    expected_result:
      zh: 系统保留批准记录并生成执行诊断；不得伪造一个事前拒绝决定。
      en: The system retains the approval and emits an execution diagnostic; it must not invent a pre-execution denial.
      ja: システムは承認を保持して実行診断を生成し、事前拒否を捏造しません。
    why_valid_or_invalid:
      zh: 拒绝决定必须先于被阻断动作；动作已开始时出现的故障属于执行结果而非授权判断。
      en: A denial must precede the action it blocks; a fault after execution starts is an execution outcome, not an authorization decision.
      ja: 拒否判断は阻止対象動作より前でなければならず、実行開始後の障害は認可判断ではなく実行結果です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-commit-denial-009
  - id: CommitDenial-example-instance-001
    kind: instance
    labels:
      zh: 调用级拒绝记录
      en: Call-scoped denial record
      ja: 呼出し単位拒否記録
    scenario_id: null
    descriptions:
      zh: 门控结果 gate_outcome_id=commit-gate-outcome-deny-19 记录 CommitGate cg_19 对 CommitRequest cr_19 的 result=deny；它把 call_19、拒绝主体 operator_7、策略依据 repository-scope-policy@3 与仓库外路径理由绑定为同一可审计结果。
      en: Gate outcome commit-gate-outcome-deny-19 records result=deny from CommitGate cg_19 over CommitRequest cr_19. It binds call_19, denying authority operator_7, policy basis repository-scope-policy@3, and the out-of-repository path rationale into one auditable outcome.
      ja: Gate outcome commit-gate-outcome-deny-19 は CommitGate cg_19 が CommitRequest cr_19 に出した result=deny を記録します。call_19・拒否主体 operator_7・policy 根拠 repository-scope-policy@3・repository 外 path の理由を一つの監査可能な結果に束縛します。
    field_values:
      gate_outcome_id: commit-gate-outcome-deny-19
      gate_ref: cg_19
      result: deny
      evidence_refs:
        - permission-response-19
        - cr_19
        - repository-scope-policy@3
      produced_at: 2026-07-14T10:20:00Z
      commit_request_ref: cr_19
      call_id: call_19
      denying_authority_ref: operator_7
      policy_basis_refs:
        - repository-scope-policy@3
      denial_reason: requested commit contains a path outside the approved repository scope
    related_node_ids:
      - CommitDenial
      - GateOutcome
      - CommitGate
      - CommitRequest
    related_relation_ids:
      - CommitDenial-is_a-GateOutcome
      - CommitDenial-denies-CommitRequest
    expected_result:
      zh: 恢复运行时 call_19 返回一致的拒绝消息；新 call ID 必须重新评估。
      en: On resume, call_19 returns the same rejection message; a new call ID requires a new evaluation.
      ja: 再開時に call_19 は同じ拒否メッセージを返し、新しい call ID は再評価されます。
    why_valid_or_invalid:
      zh: 记录具有稳定身份、被拒调用、拒绝主体、理由和时间，足以支撑调用级审计。
      en: The record has stable identity, rejected call, authority, reason, and time, sufficient for call-level audit.
      ja: 安定した同一性、拒否対象呼出し、主体、理由、時刻を持ち、呼出し単位の監査に十分です。
    synthetic: false
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-commit-denial-010
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: CommitDenial-blocks-SideEffect
    predicate: blocks
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 阻断副作用
      en: blocks side effect
      ja: 副作用を阻止
    definitions:
      zh: 一个 CommitDenial 阻止其明确绑定的 SideEffect 进入执行，保留拒绝主体、原因与范围；它不是执行失败，也不取消其他未绑定请求。
      en: A CommitDenial prevents its explicitly bound SideEffect from entering execution and retains rejecting authority, reason, and scope; it is not execution failure and does not cancel unrelated requests.
      ja: CommitDenial は明示的に結び付く SideEffect の実行開始を阻止し、拒否主体、理由、範囲を保持します。実行失敗ではなく、無関係要求を取消しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: blocked_by
      labels:
        zh: 反向：blocks
        en: blocked by
        ja: 逆方向：blocks
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: CommitDenial-blocks-SideEffect-example-positive-001
        kind: positive
        labels:
          zh: 越界写入阻断
          en: Out-of-scope write block
          ja: 範囲外書込み阻止
        scenario_id: null
        descriptions:
          zh: den_19 拒绝写入仓库外 secrets.env，gate 在命令启动前把该副作用标为 blocked。
          en: den_19 rejects writing secrets.env outside the repository, and the gate marks the side effect blocked before command start.
          ja: den_19 は repository 外 secrets.env 書込みを拒否し、gate は command 開始前に副作用を blocked とします。
        field_values: {}
        related_node_ids:
          - CommitDenial
          - SideEffect
        related_relation_ids:
          - CommitDenial-blocks-SideEffect
        expected_result:
          zh: 目标文件保持不变，拒绝原因可追溯到 den_19。
          en: The target file remains unchanged and the rejection reason traces to den_19.
          ja: 対象 file は不変で、拒否理由を den_19 へ追跡できます。
        why_valid_or_invalid:
          zh: 拒绝与具体待执行写入绑定并先于执行，形成有效阻断事实。
          en: The denial binds the concrete pending write and precedes execution, forming a valid block.
          ja: 拒否は具体的保留書込みに結び付き実行前なので、有効な阻止事実です。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-commit-denial-011
      - id: CommitDenial-blocks-SideEffect-example-boundary-001
        kind: boundary
        labels:
          zh: 执行错误边界
          en: Execution-error boundary
          ja: 実行 error の境界
        scenario_id: null
        descriptions:
          zh: 命令已启动后因磁盘故障失败；该故障没有 CommitDenial，也不能建立 blocks 关系。
          en: A command fails from a disk fault after starting; the fault has no CommitDenial and cannot establish blocks.
          ja: command は開始後 disk fault で失敗しましたが CommitDenial はなく blocks 関係を成立させません。
        field_values: {}
        related_node_ids:
          - CommitDenial
          - SideEffect
        related_relation_ids:
          - CommitDenial-blocks-SideEffect
        expected_result:
          zh: 系统记录执行错误而非事前拒绝，必要时进入恢复流程。
          en: The system records execution error rather than pre-execution denial and may enter recovery.
          ja: システムは事前拒否でなく実行 error を記録し、必要なら回復へ進みます。
        why_valid_or_invalid:
          zh: blocks 是治理决定的执行前效果，运行故障属于不同时间与因果链。
          en: blocks is the pre-execution effect of governance; runtime failure belongs to a different temporal and causal chain.
          ja: blocks は governance の実行前効果で、runtime failure は別の時間・因果 chain です。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-commit-denial-011
    source_claims:
      - claim-commit-denial-011
    distinct_fact_rationale:
      zh: DenyDecision 分类不能说明哪个具体副作用被阻断；需要独立调用级治理事实。
      en: DenyDecision taxonomy cannot identify the concrete blocked side effect; a separate call-scoped governance fact is required.
      ja: DenyDecision 分類は具体的阻止副作用を示せず、別の call 単位 governance 事実が必要です。
    layout_role: cross-link
    review_status: accepted
    target: concept:SideEffect
  - id: CommitDenial-is_a-GateOutcome
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是一种门控结果
      en: is a GateOutcome
      ja: GateOutcome の一種である
    definitions:
      zh: 每个 CommitDenial 都是 GateOutcome，并以 result=deny、一个具体 CommitRequest、调用标识、拒绝主体、策略依据和拒绝理由作为种差。
      en: Every CommitDenial is a GateOutcome, distinguished by result=deny and binding one concrete CommitRequest, call ID, denying authority, policy basis, and denial reason.
      ja: すべての CommitDenial は GateOutcome であり、result=deny と具体的 CommitRequest・call ID・拒否主体・policy 根拠・拒否理由への束縛を種差とします。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 分类继承不使用实例关系基数。
      en: Taxonomic inheritance does not use instance-relation cardinality.
      ja: 分類継承にはインスタンス関係の基数を用いません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 反向：有下位类型
        en: has subtype
        ja: 逆方向：下位型を持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: CommitDenial-is_a-GateOutcome-example-positive-001
        kind: positive
        labels:
          zh: 调用级拒绝结果
          en: Call-scoped deny outcome
          ja: call 単位 deny 結果
        scenario_id: null
        descriptions:
          zh: commit-gate-outcome-deny-19 引用 cg_19，记录 result=deny、审查响应、范围策略与请求证据及产生时间，并只阻断 cr_19/call_19。
          en: commit-gate-outcome-deny-19 references cg_19, records result=deny, review response, scope-policy and request evidence, and production time, and blocks only cr_19/call_19.
          ja: commit-gate-outcome-deny-19 は cg_19 を参照し、result=deny・審査応答・scope policy と要求証拠・生成時刻を記録し cr_19/call_19 だけを阻止します。
        field_values: {}
        related_node_ids:
          - CommitDenial
          - GateOutcome
          - CommitGate
          - CommitRequest
        related_relation_ids:
          - CommitDenial-is_a-GateOutcome
        expected_result:
          zh: 分类器继承 GateOutcome 的结果身份，并保留调用级拒绝种差。
          en: Classification inherits GateOutcome identity while preserving the call-scoped deny differentia.
          ja: 分類は GateOutcome 同一性を継承し call 単位 deny 種差を保持します。
        why_valid_or_invalid:
          zh: 记录同时满足一次门控求值的标识、门引用、结果、证据和时间，不只是一个人工回答或策略拒绝。
          en: The record satisfies outcome ID, gate reference, result, evidence, and time for one gate evaluation rather than merely storing a human answer or policy denial.
