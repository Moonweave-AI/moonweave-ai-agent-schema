          en: The record satisfies outcome ID, gate reference, result, evidence, and time for one gate evaluation rather than merely storing a human answer or policy denial.
          ja: 一回 gate 評価の outcome ID・gate ref・result・evidence・time を満たし、人間回答や policy 拒否だけではありません。
