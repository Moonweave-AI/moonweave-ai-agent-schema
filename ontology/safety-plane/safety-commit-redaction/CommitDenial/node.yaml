relations:
  - id: CommitDenial-blocks-SideEffect
    predicate: blocks
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 阻断副作用
      en: blocks side effect
      ja: 副作用を阻止
    definitions:
      zh: 一个 CommitDenial 阻止其明确绑定的 SideEffect 进入执行，保留拒绝主体、原因与范围；它不是执行失败，也不取消其他未绑定请求。
      en: A CommitDenial prevents its explicitly bound SideEffect from entering execution and retains rejecting authority, reason, and scope; it is not execution failure and does not cancel unrelated requests.
      ja: CommitDenial は明示的に結び付く SideEffect の実行開始を阻止し、拒否主体、理由、範囲を保持します。実行失敗ではなく、無関係要求を取消しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: blocked_by
      labels:
        zh: 反向：blocks
        en: blocked by
        ja: 逆方向：blocks
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: CommitDenial-blocks-SideEffect-example-positive-001
        labels:
          zh: 越界写入阻断
          en: Out-of-scope write block
          ja: 範囲外書込み阻止
        descriptions:
          zh: den_19 拒绝写入仓库外 secrets.env，gate 在命令启动前把该副作用标为 blocked。
          en: den_19 rejects writing secrets.env outside the repository, and the gate marks the side effect blocked before command start.
          ja: den_19 は repository 外 secrets.env 書込みを拒否し、gate は command 開始前に副作用を blocked とします。
        field_values: {}
        related_node_ids:
          - CommitDenial
          - SideEffect
        related_relation_ids:
          - CommitDenial-blocks-SideEffect

          en: The target file remains unchanged and the rejection reason traces to den_19.
          ja: 対象 file は不変で、拒否理由を den_19 へ追跡できます。

          en: The denial binds the concrete pending write and precedes execution, forming a valid block.
          ja: 拒否は具体的保留書込みに結び付き実行前なので、有効な阻止事実です。
        source_claims:
          - claim-commit-denial-011
      - id: CommitDenial-blocks-SideEffect-example-boundary-001
        labels:
          zh: 执行错误边界
          en: Execution-error boundary
          ja: 実行 error の境界
        descriptions:
          zh: 命令已启动后因磁盘故障失败；该故障没有 CommitDenial，也不能建立 blocks 关系。
          en: A command fails from a disk fault after starting; the fault has no CommitDenial and cannot establish blocks.
          ja: command は開始後 disk fault で失敗しましたが CommitDenial はなく blocks 関係を成立させません。
        field_values: {}
        related_node_ids:
          - CommitDenial
          - SideEffect
        related_relation_ids:
          - CommitDenial-blocks-SideEffect

          en: The system records execution error rather than pre-execution denial and may enter recovery.
          ja: システムは事前拒否でなく実行 error を記録し、必要なら回復へ進みます。

          en: blocks is the pre-execution effect of governance; runtime failure belongs to a different temporal and causal chain.
          ja: blocks は governance の実行前効果で、runtime failure は別の時間・因果 chain です。
        source_claims:
          - claim-commit-denial-011
    source_claims:
      - claim-commit-denial-011
    distinct_fact_rationale:
      zh: DenyDecision 分类不能说明哪个具体副作用被阻断；需要独立调用级治理事实。
      en: DenyDecision taxonomy cannot identify the concrete blocked side effect; a separate call-scoped governance fact is required.
      ja: DenyDecision 分類は具体的阻止副作用を示せず、別の call 単位 governance 事実が必要です。
    layout_role: cross-link
    review_status: accepted
    target: concept:SideEffect
  - id: CommitDenial-is_a-GateOutcome
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是一种门控结果
      en: is a GateOutcome
      ja: GateOutcome の一種である
    definitions:
      zh: 每个 CommitDenial 都是 GateOutcome，并以 result=deny、一个具体 CommitRequest、调用标识、拒绝主体、策略依据和拒绝理由作为种差。
      en: Every CommitDenial is a GateOutcome, distinguished by result=deny and binding one concrete CommitRequest, call ID, denying authority, policy basis, and denial reason.
      ja: すべての CommitDenial は GateOutcome であり、result=deny と具体的 CommitRequest・call ID・拒否主体・policy 根拠・拒否理由への束縛を種差とします。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 分类继承不使用实例关系基数。
      en: Taxonomic inheritance does not use instance-relation cardinality.
      ja: 分類継承にはインスタンス関係の基数を用いません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 反向：有下位类型
        en: has subtype
        ja: 逆方向：下位型を持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: CommitDenial-is_a-GateOutcome-example-positive-001
        labels:
          zh: 调用级拒绝结果
          en: Call-scoped deny outcome
          ja: call 単位 deny 結果
        descriptions:
          zh: commit-gate-outcome-deny-19 引用 cg_19，记录 result=deny、审查响应、范围策略与请求证据及产生时间，并只阻断 cr_19/call_19。
          en: commit-gate-outcome-deny-19 references cg_19, records result=deny, review response, scope-policy and request evidence, and production time, and blocks only cr_19/call_19.
          ja: commit-gate-outcome-deny-19 は cg_19 を参照し、result=deny・審査応答・scope policy と要求証拠・生成時刻を記録し cr_19/call_19 だけを阻止します。
        field_values: {}
        related_node_ids:
          - CommitDenial
          - GateOutcome
          - CommitGate
          - CommitRequest
        related_relation_ids:
          - CommitDenial-is_a-GateOutcome

          en: Classification inherits GateOutcome identity while preserving the call-scoped deny differentia.
