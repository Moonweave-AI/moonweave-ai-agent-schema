source_claims:
  - id: claim-safety-commit-git-secrets
    source: git-secrets-awslabs
    supports: git-secrets hooks scan staged and committed content for prohibited AWS and custom patterns before git objects are created, supporting CommitGate deny before remote SideEffect.
    locator: git-secrets README > Installation and commit hooks
    evidence_kind: official
    confidence: high
  - id: claim-safety-commit-trufflehog
    source: trufflehog-docs
    supports: TruffleHog detects verified and unverified secrets in git history and filesystem scans suitable as CommitGate scanner evidence blocking push SideEffects.
    locator: TruffleHog docs > Verified secrets and git scanning
    evidence_kind: official
    confidence: high
  - id: claim-safety-commit-design
    source: safety-commit-design
    supports: Moonweave separates planned commit request, gate decision, actual SideEffect, and EffectReceipt with idempotency and approval-request matching rules.
    locator: safety-commit-redaction module boundary
    evidence_kind: design-inference
    confidence: high
