schema: moonweave.ai/ontology-node/v1
id: safety-commit-redaction
kind: module
status: accepted
labels:
  zh: 副作用提交控制
  en: Side-effect commit control
  ja: 副作用コミット制御
semantics:
  short_definition:
    zh: 副作用提交控制描述一项拟议的外部状态变更如何在生效前被明确请求、审查和允许或拒绝，以及生效后如何用效果回执、补偿或回滚加以核验。它控制具体变更的提交边界，不替代通用授权策略，也不把普通工具返回误当成已经发生的副作用。
    en: Side-effect commit control describes how a proposed external state change is explicitly requested, reviewed, and allowed or denied before taking effect, and how it is verified afterward through an effect receipt, compensation, or rollback. It controls the commit boundary of a concrete change without replacing general authorization policy or treating an ordinary tool return as proof that a side effect occurred.
    ja: 副作用コミット制御は、外部状態の変更案が効力を持つ前に明示的に要求・審査され、許可または拒否される過程と、実行後に効果の受領記録、補償、ロールバックで検証される過程を記述します。具体的変更の確定境界を制御しますが、一般的な認可ポリシーを置き換えず、通常のツール返却を副作用発生の証明とはみなしません。
  definition:
    zh: 副作用提交控制描述一项拟议的外部状态变更如何在生效前被明确请求、审查和允许或拒绝，以及生效后如何用效果回执、补偿或回滚加以核验。它控制具体变更的提交边界，不替代通用授权策略，也不把普通工具返回误当成已经发生的副作用。
    en: Side-effect commit control describes how a proposed external state change is explicitly requested, reviewed, and allowed or denied before taking effect, and how it is verified afterward through an effect receipt, compensation, or rollback. It controls the commit boundary of a concrete change without replacing general authorization policy or treating an ordinary tool return as proof that a side effect occurred.
    ja: 副作用コミット制御は、外部状態の変更案が効力を持つ前に明示的に要求・審査され、許可または拒否される過程と、実行後に効果の受領記録、補償、ロールバックで検証される過程を記述します。具体的変更の確定境界を制御しますが、一般的な認可ポリシーを置き換えず、通常のツール返却を副作用発生の証明とはみなしません。
  why_needed:
    zh: 区分“计划改变”“获准改变”“已经改变”和“改变已被撤销”，避免把授权、调用结果与真实外部效果混为一谈。
    en: Distinguish a planned change, an approved change, an effected change, and a reverted change so authorization, invocation results, and real external effects are not conflated.
    ja: 「変更予定」「変更許可」「変更済み」「変更取消済み」を区別し、認可、呼び出し結果、実際の外部効果を混同しないようにします。
  includes:
    - zh: 针对一项明确外部变更的提交请求、提交闸门、允许或拒绝结果、批准范围与幂等标识。
      en: A commit request for one explicit external change, its commit gate, allow or deny outcome, approved scope, and idempotency identifier.
      ja: 明確な一つの外部変更に対する確定要求、確定ゲート、許可・拒否結果、承認範囲、冪等識別子を含みます。
    - zh: 已发生副作用、效果回执、效果核验，以及针对该副作用的补偿或回滚活动和结果。
      en: An effected side effect, its receipt and verification, and compensation or rollback activities and outcomes tied to that side effect.
      ja: 発生した副作用、その受領記録と検証、およびその副作用に結び付く補償・ロールバック活動と結果を含みます。
  excludes:
    - zh: “提交”在此只指让外部副作用生效，不指 Git 提交、数据库事务类型或代码版本产物；这些词的技术实现只是节点信息或其他域事实。
      en: Commit here means making an external side effect effective, not a Git commit, database transaction type, or code-version artifact; those implementation terms remain node information or facts owned elsewhere.
      ja: ここでの「確定」は外部副作用を発効させることだけを指し、Git コミット、データベース取引型、コード版成果物を指しません。それらの実装用語はノード情報または他領域の事実です。
    - zh: 通用 PolicyDecision、AuthorizationGrant、HumanApproval 和审批规则归授权与策略决策；本模块引用其证据，只裁决这一次具体变更是否可提交。
      en: General PolicyDecision, AuthorizationGrant, HumanApproval, and approval rules belong to authorization and policy decisions; this module references that evidence and decides only whether this concrete change may be committed.
      ja: 一般的な PolicyDecision、AuthorizationGrant、HumanApproval、承認規則は認可とポリシー判断に属します。本モジュールはその証拠を参照し、この具体的変更を確定できるかだけを裁定します。
    - zh: 调用返回、调用效果陈述和预览不证明外部状态已经改变；只有可核验的 SideEffect 与 EffectReceipt 属于提交后的事实。
      en: An invocation return, claimed invocation effect, or preview does not prove that external state changed; only a verifiable SideEffect and EffectReceipt are post-commit facts here.
      ja: 呼び出しの返却、効果の申告、プレビューだけでは外部状態の変更を証明できません。検証可能な SideEffect と EffectReceipt だけが確定後の事実です。
  semantic_kind: null
  aliases: []
purpose:
  zh: 为每项外部状态变更保留请求、门控、实际效果、核验与补偿的完整证据链。
  en: Preserve a complete evidence chain of request, gate, actual effect, verification, and compensation for every external state change.
  ja: 各外部状態変更について、要求、ゲート、実際の効果、検証、補償の完全な証拠連鎖を保持します。
