    zh: 当对象必须绑定一项具体外部变更的提交请求、门控结果、已发生效果、效果回执或补偿/回滚生命周期才能识别时，由本模块拥有。
    en: Own an object when it can be identified only by binding it to the commit request, gate outcome, effected change, effect receipt, or compensation/rollback lifecycle of one concrete external change.
    ja: 一つの具体的な外部変更について、確定要求、ゲート結果、発生済み効果、効果受領記録、補償・ロールバックのライフサイクルに結び付けて初めて識別できる対象を所有します。
