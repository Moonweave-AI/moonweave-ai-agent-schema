schema: moonweave.ai/ontology-node/v1
id: safety-commit-redaction
kind: module
status: review
labels:
  zh: 副作用提交控制
  en: Side-effect commit control
  ja: 副作用コミット制御
semantics:
  short_definition:
    zh: 副作用提交控制描述一项拟议的外部状态变更如何在生效前被明确请求、审查和允许或拒绝，以及生效后如何用效果回执、补偿或回滚加以核验。它控制具体变更的提交边界，不替代通用授权策略，也不把普通工具返回误当成已经发生的副作用。
    en: Side-effect commit control describes how a proposed external state change is explicitly requested, reviewed, and allowed or denied before taking effect, and how it is verified afterward through an effect receipt, compensation, or rollback. It controls the commit boundary of a concrete change without replacing general authorization policy or treating an ordinary tool return as proof that a side effect occurred.
    ja: 副作用コミット制御は、外部状態の変更案が効力を持つ前に明示的に要求・審査され、許可または拒否される過程と、実行後に効果の受領記録、補償、ロールバックで検証される過程を記述します。具体的変更の確定境界を制御しますが、一般的な認可ポリシーを置き換えず、通常のツール返却を副作用発生の証明とはみなしません。
  definition:
    zh: 副作用提交控制描述一项拟议的外部状态变更如何在生效前被明确请求、审查和允许或拒绝，以及生效后如何用效果回执、补偿或回滚加以核验。它控制具体变更的提交边界，不替代通用授权策略，也不把普通工具返回误当成已经发生的副作用。
    en: Side-effect commit control describes how a proposed external state change is explicitly requested, reviewed, and allowed or denied before taking effect, and how it is verified afterward through an effect receipt, compensation, or rollback. It controls the commit boundary of a concrete change without replacing general authorization policy or treating an ordinary tool return as proof that a side effect occurred.
    ja: 副作用コミット制御は、外部状態の変更案が効力を持つ前に明示的に要求・審査され、許可または拒否される過程と、実行後に効果の受領記録、補償、ロールバックで検証される過程を記述します。具体的変更の確定境界を制御しますが、一般的な認可ポリシーを置き換えず、通常のツール返却を副作用発生の証明とはみなしません。
  why_needed:
    zh: 区分“计划改变”“获准改变”“已经改变”和“改变已被撤销”，避免把授权、调用结果与真实外部效果混为一谈。
    en: Distinguish a planned change, an approved change, an effected change, and a reverted change so authorization, invocation results, and real external effects are not conflated.
    ja: 「変更予定」「変更許可」「変更済み」「変更取消済み」を区別し、認可、呼び出し結果、実際の外部効果を混同しないようにします。
  includes:
    - zh: 针对一项明确外部变更的提交请求、提交闸门、允许或拒绝结果、批准范围与幂等标识。
      en: A commit request for one explicit external change, its commit gate, allow or deny outcome, approved scope, and idempotency identifier.
      ja: 明確な一つの外部変更に対する確定要求、確定ゲート、許可・拒否結果、承認範囲、冪等識別子を含みます。
    - zh: 已发生副作用、效果回执、效果核验，以及针对该副作用的补偿或回滚活动和结果。
      en: An effected side effect, its receipt and verification, and compensation or rollback activities and outcomes tied to that side effect.
      ja: 発生した副作用、その受領記録と検証、およびその副作用に結び付く補償・ロールバック活動と結果を含みます。
  excludes:
    - zh: “提交”在此只指让外部副作用生效，不指 Git 提交、数据库事务类型或代码版本产物；这些词的技术实现只是节点信息或其他域事实。
      en: Commit here means making an external side effect effective, not a Git commit, database transaction type, or code-version artifact; those implementation terms remain node information or facts owned elsewhere.
      ja: ここでの「確定」は外部副作用を発効させることだけを指し、Git コミット、データベース取引型、コード版成果物を指しません。それらの実装用語はノード情報または他領域の事実です。
    - zh: 通用 PolicyDecision、AuthorizationGrant、HumanApproval 和审批规则归授权与策略决策；本模块引用其证据，只裁决这一次具体变更是否可提交。
      en: General PolicyDecision, AuthorizationGrant, HumanApproval, and approval rules belong to authorization and policy decisions; this module references that evidence and decides only whether this concrete change may be committed.
      ja: 一般的な PolicyDecision、AuthorizationGrant、HumanApproval、承認規則は認可とポリシー判断に属します。本モジュールはその証拠を参照し、この具体的変更を確定できるかだけを裁定します。
    - zh: 调用返回、调用效果陈述和预览不证明外部状态已经改变；只有可核验的 SideEffect 与 EffectReceipt 属于提交后的事实。
      en: An invocation return, claimed invocation effect, or preview does not prove that external state changed; only a verifiable SideEffect and EffectReceipt are post-commit facts here.
      ja: 呼び出しの返却、効果の申告、プレビューだけでは外部状態の変更を証明できません。検証可能な SideEffect と EffectReceipt だけが確定後の事実です。
  semantic_kind: null
  aliases: []
purpose:
  zh: 为每项外部状态变更保留请求、门控、实际效果、核验与补偿的完整证据链。
  en: Preserve a complete evidence chain of request, gate, actual effect, verification, and compensation for every external state change.
  ja: 各外部状態変更について、要求、ゲート、実際の効果、検証、補償の完全な証拠連鎖を保持します。
structure: null
examples:
  - id: safety-commit-redaction-cq-gate-decision-v3-example-positive
    kind: positive
    labels:
      zh: 某项副作用请求是否获得所需授权、审批和预览证据，提交门为何允许或拒绝？：正例
      en: "Did a side-effect request obtain required authority, approval, and preview evidence, and why did the commit gate allow or deny it?: positive case"
      ja: side-effect request は required authority・approval・preview evidence を得て、CommitGate はなぜ allow/deny しましたか。：正例
    scenario_id: null
    descriptions:
      zh: 退款请求 cr_82 请求对 order:913 执行不超过 100 美元的退款；cg_44 核对 operator_7 的有效授权、参数摘要 sha256:91ab 与预览 pv_82 后，产生 ca_82 并明确批准同一冻结请求。
      en: Refund request cr_82 asks to refund at most USD 100 on order:913. Gate cg_44 verifies operator_7's effective grant, argument digest sha256:91ab, and preview pv_82, then emits ca_82 approving that same frozen request.
      ja: 返金要求 cr_82 は order:913 に最大 100 USD の返金を求めます。gate cg_44 は operator_7 の有効な grant、引数 digest sha256:91ab、preview pv_82 を照合し、同じ固定要求を承認する ca_82 を生成します。
    field_values:
      commit_request_id: cr_82
      gate_id: cg_44
      approval_id: ca_82
      policy_decision_id: pd_82
      authority_ref: operator_7
      approved_scope: order:913/refund<=100USD
      argument_digest: sha256:91ab
      preview_evidence_ref: pv_82
      gate_result: allow
    related_node_ids:
      - CommitGate
      - CommitRequest
      - CommitApproval
      - CommitDenial
      - PolicyDecision
    related_relation_ids:
      - CommitRequest-evaluated_by-CommitGate
      - CommitApproval-approves-CommitRequest
      - CommitDenial-denies-CommitRequest
      - commit_gate_emits_policy_decision
    expected_result:
      zh: 返回 allow，并同时给出 cr_82→cg_44、ca_82→cr_82 与 cg_44→pd_82 的证据；批准范围和参数摘要必须与请求完全一致。
      en: Return allow with evidence for cr_82→cg_44, ca_82→cr_82, and cg_44→pd_82; the approved scope and argument digest must exactly match the request.
      ja: allow を返し、cr_82→cg_44、ca_82→cr_82、cg_44→pd_82 の証拠を示します。承認 scope と引数 digest は要求と完全一致しなければなりません。
    why_valid_or_invalid:
      zh: 该实例把授权依据、预览、请求摘要和门结果绑定到同一个请求版本，没有用相邻节点替代审批事实。
      en: The instance binds authority, preview, request digest, and gate outcome to one request version instead of treating nearby nodes as approval evidence.
      ja: 認可根拠、preview、要求 digest、gate outcome を同一要求版に結び付け、隣接 node を承認証拠として代用していません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-commit-redaction-003
      - claim-safety-commit-redaction-004
  - id: safety-commit-redaction-cq-gate-decision-v3-example-counter
    kind: counterexample
    labels:
      zh: 某项副作用请求是否获得所需授权、审批和预览证据，提交门为何允许或拒绝？：反例
      en: "Did a side-effect request obtain required authority, approval, and preview evidence, and why did the commit gate allow or deny it?: counterexample"
      ja: side-effect request は required authority・approval・preview evidence を得て、CommitGate はなぜ allow/deny しましたか。：反例
    scenario_id: null
    descriptions:
      zh: 退款请求 cr_83 要求 160 美元，但 ca_82 只批准 cr_82 的 100 美元范围，且 pv_82 的参数摘要与 cr_83 不同；即使 cg_44、ca_82 和 pd_82 出现在同一追踪中，也不能把 ca_82 用作 cr_83 的批准。
      en: Refund request cr_83 asks for USD 160, while ca_82 approves only cr_82's USD 100 scope and pv_82 has a different argument digest. Co-occurrence of cg_44, ca_82, and pd_82 in one trace does not approve cr_83.
      ja: 返金要求 cr_83 は 160 USD を求めますが、ca_82 は cr_82 の 100 USD scope だけを承認し、pv_82 の引数 digest も cr_83 と異なります。同一 trace 内の cg_44・ca_82・pd_82 の共起は cr_83 の承認になりません。
    field_values:
      commit_request_id: cr_83
      candidate_approval_id: ca_82
      requested_scope: order:913/refund=160USD
      candidate_approved_scope: order:913/refund<=100USD
      request_argument_digest: sha256:b723
      preview_argument_digest: sha256:91ab
      approval_request_ref: cr_82
      gate_result: reject-candidate
    related_node_ids:
      - CommitGate
      - PolicyDecision
    related_relation_ids:
      - commit_gate_emits_policy_decision
    expected_result:
      zh: 拒绝把 ca_82 解释为 cr_83 的批准，并指出请求引用、金额范围与参数摘要三项均不匹配；结果应为 deny 或 defer。
      en: Reject ca_82 as approval for cr_83, identify the request-reference, amount-scope, and argument-digest mismatches, and return deny or defer.
      ja: ca_82 を cr_83 の承認として拒否し、要求参照・金額 scope・引数 digest の三不一致を示して deny または defer を返します。
    why_valid_or_invalid:
      zh: CommitApproval 只批准其明确指向且摘要一致的 CommitRequest；追踪邻接不能扩大批准范围或改写端点。
      en: A CommitApproval authorizes only the explicitly referenced CommitRequest with matching digest; trace adjacency cannot widen its scope or substitute an endpoint.
      ja: CommitApproval は明示参照され digest が一致する CommitRequest だけを承認し、trace の隣接で scope 拡大や endpoint 置換はできません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-commit-redaction-003
      - claim-safety-commit-redaction-004
  - id: safety-commit-redaction-cq-effect-idempotency-v3-example-positive
    kind: positive
    labels:
      zh: 同一幂等键的请求是否只产生一次 SideEffect，重复调用如何被识别和处理？：正例
      en: "Did requests sharing an idempotency key produce only one SideEffect, and how were duplicates identified and handled?: positive case"
      ja: 同じ idempotency key の request は一 SideEffect だけを生成し、duplicate invocation はどう処理されましたか。：正例
    scenario_id: null
    descriptions:
      zh: ToolCall tc_77 以幂等键 refund:913:1 发起 cr_77；SideEffect se_77 实现该请求，er_77 记录效果摘要 sha256:4e98。重试 tc_78 使用相同键和参数摘要，只返回 er_77，没有产生第二个 SideEffect。
      en: ToolCall tc_77 creates cr_77 with idempotency key refund:913:1. SideEffect se_77 realizes that request and er_77 records effect digest sha256:4e98. Retry tc_78 uses the same key and argument digest, returns er_77, and creates no second SideEffect.
      ja: ToolCall tc_77 は冪等 key refund:913:1 で cr_77 を作成し、SideEffect se_77 が要求を実現、er_77 が effect digest sha256:4e98 を記録します。同一 key・引数 digest の再試行 tc_78 は er_77 を返し、二つ目の SideEffect を生成しません。
    field_values:
      commit_request_id: cr_77
      original_tool_call_id: tc_77
      retry_tool_call_id: tc_78
      idempotency_key: refund:913:1
      authority_scope: order:913/refund<=100USD
      argument_digest: sha256:91ab
      side_effect_id: se_77
      effect_receipt_id: er_77
      effect_digest: sha256:4e98
      committed_effect_count: 1
    related_node_ids:
      - CommitRequest
      - SideEffect
      - EffectReceipt
      - ToolCall
    related_relation_ids:
      - SideEffect-realizes-CommitRequest
      - EffectReceipt-evidences-SideEffect
      - side_effect_produced_by_tool_call
    expected_result:
      zh: 在键 refund:913:1、相同授权范围和参数摘要下只返回 se_77 与 er_77；tc_78 标记为重复调用。
      en: Return only se_77 and er_77 for key refund:913:1 under the same authority scope and argument digest, and classify tc_78 as a duplicate invocation.
      ja: key refund:913:1、同一 authority scope・引数 digest に対して se_77 と er_77 だけを返し、tc_78 を重複呼出しとして分類します。
    why_valid_or_invalid:
      zh: 请求、实际效果、效果回执和两个 ToolCall 的身份均明确，重复调用复用原回执而未制造第二个外部效果。
      en: The request, enacted effect, receipt, and both ToolCalls are identified explicitly; the retry reuses the original receipt without creating a second external effect.
      ja: 要求、実行済み効果、receipt、二つの ToolCall を明示し、再試行は元 receipt を再利用して二つ目の外部効果を作っていません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-commit-redaction-005
      - claim-safety-commit-redaction-006
  - id: safety-commit-redaction-cq-effect-idempotency-v3-example-counter
    kind: counterexample
    labels:
      zh: 同一幂等键的请求是否只产生一次 SideEffect，重复调用如何被识别和处理？：反例
      en: "Did requests sharing an idempotency key produce only one SideEffect, and how were duplicates identified and handled?: counterexample"
      ja: 同じ idempotency key の request は一 SideEffect だけを生成し、duplicate invocation はどう処理されましたか。：反例
    scenario_id: null
    descriptions:
      zh: tc_77 与 tc_78 使用同一幂等键 refund:913:1，却分别产生 se_77 和 se_78；er_77 与 er_78 的效果摘要不同，说明退款被执行两次。
      en: tc_77 and tc_78 use the same idempotency key refund:913:1 but produce se_77 and se_78 respectively. Receipts er_77 and er_78 carry different effect digests, showing that the refund was executed twice.
      ja: tc_77 と tc_78 は同じ冪等 key refund:913:1 を使いますが、それぞれ se_77 と se_78 を生成し、er_77 と er_78 の effect digest も異なるため返金が二回実行されています。
    field_values:
      idempotency_key: refund:913:1
      tool_call_ids:
        - tc_77
        - tc_78
      side_effect_ids:
        - se_77
        - se_78
      effect_receipt_ids:
        - er_77
        - er_78
      effect_digests:
        - sha256:4e98
        - sha256:77c1
      committed_effect_count: 2
    related_node_ids:
      - SideEffect
      - ToolCall
    related_relation_ids:
      - side_effect_produced_by_tool_call
    expected_result:
      zh: 返回幂等性违规，列出两个 SideEffect 和两个不一致回执，不得把共同 ToolCall 类型或共同键误当作同一效果。
      en: Return an idempotency violation with both SideEffects and inconsistent receipts; a shared ToolCall type or key must not be mistaken for effect identity.
      ja: 二つの SideEffect と不一致 receipt を列挙して冪等性違反を返し、共通 ToolCall 型や key を同一効果と誤認しません。
    why_valid_or_invalid:
      zh: 同一幂等键和作用域最多对应一个已生效效果；两个不同效果摘要证明系统没有把重试折叠到原回执。
      en: One key and scope may identify at most one enacted effect; two distinct effect digests prove that the retry was not collapsed to the original receipt.
      ja: 同一 key・scope は最大一つの実行済み効果を識別すべきで、異なる二つの effect digest は再試行が元 receipt に統合されなかったことを示します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-commit-redaction-005
      - claim-safety-commit-redaction-006
  - id: safety-commit-redaction-cq-rollback-verification-v3-example-positive
    kind: positive
    labels:
      zh: 副作用失败后执行了什么补偿或 Rollback，外部状态是否恢复到可验证目标？：正例
      en: "Which compensation or Rollback ran after side-effect failure, and did external state return to a verifiable target?: positive case"
      ja: SideEffect failure 後にどの Compensation/Rollback が実行され、external state は verifiable target へ戻りましたか。：正例
    scenario_id: null
    descriptions:
      zh: SideEffect se_55 在更新远端工单后返回失败，关系 side_effect_has_rollback_action 指向 rb_55。rb_55 执行后，检查点 cp_54 的目标摘要 sha256:before55 与观测事件 oe_56 的实际摘要一致，回执 er_56 记录 verified=true。
      en: SideEffect se_55 fails after updating a remote ticket and side_effect_has_rollback_action points to rb_55. After rb_55 runs, checkpoint cp_54's target digest sha256:before55 matches the actual digest in observability event oe_56, and receipt er_56 records verified=true.
      ja: SideEffect se_55 は remote ticket 更新後に失敗し、side_effect_has_rollback_action は rb_55 を指します。rb_55 実行後、checkpoint cp_54 の target digest sha256:before55 と observability event oe_56 の実測 digest が一致し、receipt er_56 は verified=true を記録します。
    field_values:
      side_effect_id: se_55
      rollback_action_id: rb_55
      rollback_started_at: 2026-07-14T11:31:04Z
      rollback_completed_at: 2026-07-14T11:31:09Z
      checkpoint_ref: cp_54
      target_state_digest: sha256:before55
      observability_event_ref: oe_56
      observed_state_digest: sha256:before55
      effect_receipt_id: er_56
      verified: true
    related_node_ids:
      - SideEffect
      - RollbackAction
      - EffectReceipt
      - ObservabilityEvent
      - CheckpointActivity
    related_relation_ids:
      - side_effect_has_rollback_action
    expected_result:
      zh: 返回 rb_55 为已验证回滚，并同时给出 se_55→rb_55、目标摘要、实际摘要及 er_56；不得仅凭 rollback 请求状态判定成功。
      en: Return rb_55 as a verified rollback with se_55→rb_55, target digest, observed digest, and er_56; a requested rollback state alone is insufficient.
      ja: rb_55 を検証済み rollback として返し、se_55→rb_55、target digest、observed digest、er_56 を示します。rollback requested 状態だけでは成功としません。
    why_valid_or_invalid:
      zh: 本地关系明确指出失败效果的回滚动作，跨模块观测与检查点只提供状态验证证据，没有被误建模为安全域概念。
      en: The local relation identifies the rollback action for the failed effect, while cross-module observation and checkpoint records supply verification evidence without being re-owned by safety.
      ja: local relation が失敗効果の rollback action を特定し、module 横断の observation と checkpoint は状態検証証拠だけを提供して safety 所有へ変更されません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-commit-redaction-007
      - claim-safety-commit-redaction-008
  - id: safety-commit-redaction-cq-rollback-verification-v3-example-counter
    kind: counterexample
    labels:
      zh: 副作用失败后执行了什么补偿或 Rollback，外部状态是否恢复到可验证目标？：反例
      en: "Which compensation or Rollback ran after side-effect failure, and did external state return to a verifiable target?: counterexample"
      ja: SideEffect failure 後にどの Compensation/Rollback が実行され、external state は verifiable target へ戻りましたか。：反例
    scenario_id: null
    descriptions:
      zh: SideEffect se_56 指向 rb_56，但 rb_56 只有 requested_at；oe_57 的实际摘要 sha256:after56 与 cp_55 的目标摘要 sha256:before56 不同，也没有验证回执。
      en: SideEffect se_56 points to rb_56, but rb_56 has only requested_at. Observability event oe_57 reports sha256:after56, which differs from checkpoint cp_55's target sha256:before56, and no verification receipt exists.
      ja: SideEffect se_56 は rb_56 を指しますが、rb_56 には requested_at しかありません。observability event oe_57 の sha256:after56 は checkpoint cp_55 の target sha256:before56 と異なり、検証 receipt もありません。
    field_values:
