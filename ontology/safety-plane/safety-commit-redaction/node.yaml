        zh: ToolCall 可为纯读取且无需提交，也可先产生 effect preview；只有 Gate 允许后的提交事实表示外部状态实际改变。 本条仅记录 EffectReceipt、SideEffect；其 canonical owner 是副作用提交控制（safety-commit-redaction），因此 safety-commit-redaction 在此拥有这些概念。
        en: A ToolCall can be read-only and require no commit, or first produce an effect preview; only the post-Gate commit fact means external state changed. This record is limited to EffectReceipt, SideEffect; their canonical owner is Side-effect commit control (safety-commit-redaction), so safety-commit-redaction owns these concepts here.
        ja: ToolCall は read-only で commit 不要の場合や effect preview を先に生成する場合があり、Gate 後 commit fact だけが external state change を意味します。 この記録は EffectReceipt、SideEffect だけを対象とし、canonical owner は副作用コミット制御（safety-commit-redaction）です。したがって safety-commit-redaction はここでこれらを所有します。
