module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 副作用提交控制的输入概念族为提交请求、策略决策；责任交接由已接受事实 提交请求 —evaluated_by→ 副作用提交闸门 (CommitRequest-evaluated_by-CommitGate)；副作用提交闸门 —commit_gate_emits_policy_decision→ 策略决策 (commit_gate_emits_policy_decision) 明确给出。
          en: The input families for Side-effect commit control are commit request, policy decision; the accepted facts commit request —evaluated_by→ side-effect commit gate (CommitRequest-evaluated_by-CommitGate); side-effect commit gate —commit_gate_emits_policy_decision→ policy decision (commit_gate_emits_policy_decision) make the responsibility handoff explicit.
          ja: 副作用コミット制御の入力概念族はコミット要求、ポリシー判断です。責任の受け渡しは承認済み事実 コミット要求 —evaluated_by→ 副作用コミットゲート (CommitRequest-evaluated_by-CommitGate)；副作用コミットゲート —commit_gate_emits_policy_decision→ ポリシー判断 (commit_gate_emits_policy_decision) により明示されます。
        family_concept_ids:
          - CommitRequest
          - PolicyDecision
        relation_ids:
          - CommitRequest-evaluated_by-CommitGate
          - commit_gate_emits_policy_decision
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 副作用提交控制的输出概念族为提交批准、提交拒绝；责任交接由已接受事实 副作用提交闸门 —may_produce→ 提交批准 (CommitGate-may_produce-CommitApproval)；副作用提交闸门 —may_produce→ 提交拒绝 (CommitGate-may_produce-CommitDenial) 明确给出。 共享关系在本面的职责：在输出面，该事实以 CommitDenial 端点标明提交门产生的可审计否决记录；否决记录本身仍是信息对象。
          en: "The output families for Side-effect commit control are commit approval, commit denial; the accepted facts side-effect commit gate —may_produce→ commit approval (CommitGate-may_produce-CommitApproval); side-effect commit gate —may_produce→ commit denial (CommitGate-may_produce-CommitDenial) make the responsibility handoff explicit. Facet-specific role of shared facts: On the output facet, this fact uses the CommitDenial endpoint to identify the auditable denial record produced by the commit gate; the record remains an information object."
          ja: 副作用コミット制御の出力概念族はコミット承認、コミット拒否です。責任の受け渡しは承認済み事実 副作用コミットゲート —may_produce→ コミット承認 (CommitGate-may_produce-CommitApproval)；副作用コミットゲート —may_produce→ コミット拒否 (CommitGate-may_produce-CommitDenial) により明示されます。 共有関係のこの面での役割：出力面では、この事実の CommitDenial 端点がコミットゲートの監査可能な拒否記録を示し、記録自体は情報対象のままです。
        family_concept_ids:
          - CommitApproval
          - CommitDenial
        relation_ids:
          - CommitGate-may_produce-CommitApproval
          - CommitGate-may_produce-CommitDenial
        not_applicable_reason: null
      failure:
        applicable: true
        description:
          zh: 副作用提交控制的失败概念族为提交拒绝、副作用；责任交接由已接受事实 副作用提交闸门 —may_produce→ 提交拒绝 (CommitGate-may_produce-CommitDenial)；提交拒绝 —blocks→ 副作用 (CommitDenial-blocks-SideEffect) 明确给出。 共享关系在本面的职责：在失败面，同一事实确认阻断依据确由 CommitGate 产生；随后由 CommitDenial-blocks-SideEffect 明确其对外部效果的阻断作用。
          en: "The failure families for Side-effect commit control are commit denial, side effect; the accepted facts side-effect commit gate —may_produce→ commit denial (CommitGate-may_produce-CommitDenial); commit denial —blocks→ side effect (CommitDenial-blocks-SideEffect) make the responsibility handoff explicit. Facet-specific role of shared facts: On the failure facet, the same fact confirms that the blocking decision was produced by CommitGate; CommitDenial-blocks-SideEffect then states its blocking effect on the external side effect."
          ja: 副作用コミット制御の失敗概念族はコミット拒否、副作用です。責任の受け渡しは承認済み事実 副作用コミットゲート —may_produce→ コミット拒否 (CommitGate-may_produce-CommitDenial)；コミット拒否 —blocks→ 副作用 (CommitDenial-blocks-SideEffect) により明示されます。 共有関係のこの面での役割：失敗面では、同じ事実が阻断判断を CommitGate が生成したことを確認し、CommitDenial-blocks-SideEffect が外部効果への阻断作用を明示します。
        family_concept_ids:
          - CommitDenial
          - SideEffect
        relation_ids:
          - CommitGate-may_produce-CommitDenial
          - CommitDenial-blocks-SideEffect
        not_applicable_reason: null
      recovery:
        applicable: true
        description:
          zh: 副作用提交控制的恢复概念族为回滚动作；责任交接由已接受事实 副作用 —side_effect_has_rollback_action→ 回滚动作 (side_effect_has_rollback_action) 明确给出。
          en: The recovery families for Side-effect commit control are rollback action; the accepted facts side effect —side_effect_has_rollback_action→ rollback action (side_effect_has_rollback_action) make the responsibility handoff explicit.
          ja: 副作用コミット制御の回復概念族はロールバックアクションです。責任の受け渡しは承認済み事実 副作用 —side_effect_has_rollback_action→ ロールバックアクション (side_effect_has_rollback_action) により明示されます。
        family_concept_ids:
          - RollbackAction
        relation_ids:
          - side_effect_has_rollback_action
        not_applicable_reason: null
