            en: Ontology review confirms CommitGate as the module's control entry. CommitRequest joins it through evaluated_by, and EffectReceipt joins an occurred SideEffect through evidences. SideEffect realizes CommitRequest remains a causal cross-link because a request may fail validation and produce no side effect, so this optional fact cannot be a visual parent edge; every relation retains its original semantics rather than being disguised as is_a.
