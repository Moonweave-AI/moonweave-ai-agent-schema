schema: moonweave.ai/ontology-node/v1
id: safety-commit-redaction
kind: module
labels:
  zh: 副作用提交控制
  en: Side-effect commit control
  ja: 副作用コミット制御
semantics:
  short_definition:
    zh: 副作用提交控制描述外部状态变更在生效前如何被请求、审查与批准或拒绝，以及生效后如何用回执与补偿核验。
    en: Side-effect commit control describes how external state changes are requested, reviewed, and allowed or denied before taking effect, and verified afterward through receipts and compensation.
    ja: 副作用コミット制御は、外部状態変更が効力前に要求・審査・許可/拒否され、実行後に receipt/compensation で検証される過程を記述します。
  definition:
    zh: 本模块拥有 CommitRequest、CommitGate、CommitApproval/CommitDenial、SideEffect、EffectReceipt、EffectVerification 及补偿/回滚活动。它映射 git-secrets 与 AWS Labs git-secrets 钩子在 commit 前扫描 AWS/私钥模式；TruffleHog 与 TruffleHog OSS 在 CI/pre-commit 中对 verified/unverified 密钥的发现；GitHub push protection 与 secret scanning 在 push/PR 时的服务端拦截；以及通用 pre-commit hook 框架（`.pre-commit-config.yaml`）对密钥、大文件与 lint 的 staged 变更_gate。Moonweave 中“commit”指让外部副作用生效，不是 Git commit 本身——但 Git 密钥泄露场景是 CommitGate 拒绝向远程仓库产生 SideEffect 的典型工程实例。通用 PolicyDecision 与 HumanApproval 由 safety-permission-policy 拥有；本模块引用其证据并裁决这一次具体变更是否可提交。ToolResult 或调用返回不证明外部状态已改变。
    en: "This module owns CommitRequest, CommitGate, CommitApproval/CommitDenial, SideEffect, EffectReceipt, EffectVerification, and compensation or rollback activities. It maps git-secrets and AWS Labs git-secrets hooks scanning AWS/private-key patterns before commit; TruffleHog and TruffleHog OSS discovering verified/unverified secrets in CI or pre-commit; GitHub push protection and secret scanning blocking server-side on push or PR; and the generic pre-commit hook framework (.pre-commit-config.yaml) gating staged changes for secrets, large files, and lint. In Moonweave, commit means making an external side effect effective, not a Git commit itself—but Git secret leakage is a canonical engineering instance where CommitGate denies creating a SideEffect on the remote repository. General PolicyDecision and HumanApproval belong to safety-permission-policy; this module references that evidence and adjudicates whether this concrete change may be committed. ToolResult or invocation returns do not prove external state changed."
    ja: 本モジュールは CommitRequest、CommitGate、CommitApproval/CommitDenial、SideEffect、EffectReceipt、EffectVerification、compensation/rollback activity を所有します。git-secrets/AWS Labs git-secrets hook の commit 前 AWS/秘密鍵 scan、TruffleHog/TruffleHog OSS の CI/pre-commit verified/unverified secret 検出、GitHub push protection/secret scanning の push/PR server-side block、pre-commit framework（.pre-commit-config.yaml）による staged change gate を写像します。Moonweave の commit は外部副作用発効を意味し Git commit 自体ではありませんが、Git secret leak は CommitGate が remote repository SideEffect 生成を deny する典型 instance です。一般 PolicyDecision/HumanApproval は safety-permission-policy が所有し、本モジュールは evidence を参照して具体変更の commit 可否を裁定。ToolResult/invocation return は外部状態変更の証明にはなりません。
  why_needed:
    zh: 若没有提交闸门，Agent 会把“模型说已完成”或 ToolResult 成功误判为退款已到账、文件已删除或密钥已推送到 GitHub；也无法用幂等键识别重复调用产生的双重 SideEffect。
    en: Without a commit gate, agents treat 'the model said done' or a successful ToolResult as proof that a refund posted, a file was deleted, or secrets were pushed to GitHub; idempotency keys cannot identify duplicate SideEffects from retries.
    ja: commit gate がなければ、モデルの「完了」発言や ToolResult 成功を返金/post/secret push 済みと誤認し、retry による duplicate SideEffect も idempotency key で識別できません。
  includes:
    - zh: CommitRequest、CommitGate、CommitApproval/CommitDenial、批准范围、幂等键与 argument digest。
      en: CommitRequest, CommitGate, CommitApproval/CommitDenial, approved scope, idempotency key, and argument digest.
      ja: CommitRequest、CommitGate、CommitApproval/CommitDenial、approved scope、idempotency key、argument digest。
    - zh: SideEffect、EffectReceipt、EffectVerification，及针对该副作用的 CompensationActivity/RollbackActivity。
      en: SideEffect, EffectReceipt, EffectVerification, and CompensationActivity or RollbackActivity tied to that side effect.
      ja: SideEffect、EffectReceipt、EffectVerification、当該副作用への Compensation/Rollback activity。
    - zh: pre-commit/CI 密钥扫描作为 CommitGate 输入证据（git-secrets、TruffleHog、GitHub secret scanning alerts）。
      en: Pre-commit or CI secret scans as CommitGate input evidence (git-secrets, TruffleHog, GitHub secret scanning alerts).
      ja: pre-commit/CI secret scan を CommitGate 入力 evidence（git-secrets、TruffleHog、GitHub secret scanning alert）。
  excludes:
    - zh: Git commit 对象、数据库事务类型、代码版本产物只是实现信息或其他域事实。
      en: Git commit objects, database transaction types, and code-version artifacts are implementation information or facts owned elsewhere.
      ja: Git commit object、DB transaction type、code version artifact は実装情報または他 domain fact。
    - zh: 通用 PolicyDecision、AuthorizationGrant 归 safety-permission-policy；获准不等于已提交。
      en: General PolicyDecision and AuthorizationGrant belong to safety-permission-policy; authorization does not equal committed.
      ja: 一般 PolicyDecision/AuthorizationGrant は safety-permission-policy；許可は commit 済みではありません。
    - zh: 输出脱敏与 SensitiveSpan 归 safety-disclosure-redaction；提交控制关注外部状态是否改变。
      en: Output redaction and SensitiveSpan belong to safety-disclosure-redaction; commit control concerns whether external state changed.
      ja: 出力墨消し/SensitiveSpan は safety-disclosure-redaction；commit control は外部状態変更の有無を扱います。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 集成时应把 git-secrets `--commit` hook、TruffleHog `trufflehog git file://.` pre-commit、GitHub push protection block 事件映射为 CommitGate 的 deny 证据；业务副作用（退款、删文件、发邮件）映射为 CommitRequest + SideEffect + EffectReceipt 链。CommitApproval 必须指向完全匹配的 CommitRequest（scope、argument digest、idempotency key）；TruffleHog verified secret 在 push 前应产生 CommitDenial 且无 SideEffect。幂等重试应返回同一 EffectReceipt 而非第二个 SideEffect。
    en: "Integrations should map git-secrets --commit hooks, TruffleHog trufflehog git file://. pre-commit, and GitHub push protection block events to CommitGate deny evidence; business side effects (refund, delete file, send email) to CommitRequest plus SideEffect plus EffectReceipt chains. CommitApproval must target a fully matching CommitRequest (scope, argument digest, idempotency key); TruffleHog verified secrets before push should yield CommitDenial with no SideEffect. Idempotent retries should return the same EffectReceipt, not a second SideEffect."
    ja: git-secrets --commit hook、TruffleHog pre-commit、GitHub push protection block を CommitGate deny evidence に、business side effect を CommitRequest+SideEffect+EffectReceipt chain に写像。CommitApproval は完全 match CommitRequest を指し、push 前 TruffleHog verified secret は CommitDenial/no SideEffect。idempotent retry は同一 EffectReceipt を返し二つ目 SideEffect を作りません。
  typical_input:
    - description: git-secrets pre-commit hook blocking staged AWS key.
      format: |
        $ git commit -m "add config"
        .env:12:aws_secret_key detected
        [ERROR] git-secrets: prohibited pattern found
        => CommitGate deny before git object created
      source_claims: [claim-safety-commit-git-secrets]
    - description: TruffleHog scanning staged changes in pre-commit.
      format: |
        trufflehog filesystem --directory=. --only-verified
        Found verified result: AWS credential in config/.env
        => CommitDenial; no SideEffect on remote
      source_claims: [claim-safety-commit-trufflehog]
    - description: Business CommitRequest with idempotency key before refund API.
      format: |
        commit_request_id: cr_77
        effect_target: payment-gateway/refund
        idempotency_key: refund:913:1
        argument_digest: sha256:91ab
        prerequisite_grant: grant-42
      source_claims: [claim-safety-commit-design]
  typical_output:
    - description: Approved commit with effect receipt matching request scope.
      format: |
        commit_gate_id: cg_44
        commit_approval_id: ca_82
        side_effect_id: se_77
        effect_receipt_id: er_77
        effect_digest: sha256:4e98
        external_state_changed: true
      source_claims: [claim-safety-commit-design]
    - description: Idempotent retry returns existing receipt without new SideEffect.
      format: |
        retry_tool_call_id: tc_78
        idempotency_key: refund:913:1
        side_effect_count: 1
        returned_receipt: er_77
      source_claims: [claim-safety-commit-design]
  reference_implementations:
    - name: git-secrets (AWS Labs)
      url: https://github.com/awslabs/git-secrets
      description: Pre-commit/commit-msg hooks blocking AWS and custom secret patterns.
    - name: TruffleHog
      url: https://github.com/trufflesecurity/trufflehog
      description: Verified and unverified secret scanning in git, filesystem, and CI.
    - name: GitHub Secret Scanning and Push Protection
      url: https://docs.github.com/en/code-security/secret-scanning
      description: Server-side detection and push blocking for exposed secrets.
    - name: pre-commit framework
      url: https://pre-commit.com/
      description: Staged-change hook orchestration for secrets, lint, and custom gates.
structure:
  identity_keys: [commit_request_id, idempotency_key]
  fields:
    - id: commit_request_id
      labels: {zh: 提交请求标识, en: Commit request identifier, ja: コミット要求識別子}
      definitions:
        zh: 一次拟议外部变更的 CommitRequest 唯一 ID。
        en: Unique ID of one proposed external change CommitRequest.
        ja: 一回の proposed external change CommitRequest の一意 ID。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^cr_[A-Za-z0-9._-]+$'
      example_value: cr_82
      allowed_values: []
      source_claims: [claim-safety-commit-design]
    - id: idempotency_key
      labels: {zh: 幂等键, en: Idempotency key, ja: 冪等鍵}
      definitions:
        zh: 同一外部效果目标的稳定键；重试必须匹配才返回已有 EffectReceipt。
        en: Stable key for the same external effect target; retries must match to return an existing EffectReceipt.
        ja: 同一 external effect target の安定 key。retry は一致時のみ existing EffectReceipt を返します。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: refund:913:1
      allowed_values: []
      source_claims: [claim-safety-commit-design]
    - id: gate_result
      labels: {zh: 闸门结果, en: Gate result, ja: ゲート結果}
      definitions:
        zh: allow、deny 或 defer；CommitGate 必须引用 PolicyDecision 与扫描/预览证据。
        en: allow, deny, or defer; CommitGate must cite PolicyDecision and scan or preview evidence.
        ja: allow/deny/defer。CommitGate は PolicyDecision と scan/preview evidence を引用する必要があります。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: allow
      allowed_values: [allow, deny, defer]
      source_claims: [claim-safety-commit-design]
  constraints:
    - id: commit-approval-matches-request
      severity: error
      expression_language: plain
      expression: CommitApproval must reference exactly one CommitRequest with matching approved scope and argument digest; trace co-occurrence cannot substitute for approves edge identity.
      explanation:
        zh: CommitApproval 只批准其明确指向且摘要一致的 CommitRequest。
        en: CommitApproval authorizes only the explicitly referenced CommitRequest with matching digest.
        ja: CommitApproval は明示参照かつ digest 一致 CommitRequest のみ承認します。
      source_claims: [claim-safety-commit-design]
    - id: commit-toolresult-not-sideeffect
      severity: error
      expression_language: plain
      expression: A successful ToolResult or invocation return must not be recorded as SideEffect or EffectReceipt without verifiable external state change evidence.
      explanation:
        zh: 调用返回不证明外部状态已经改变。
        en: An invocation return does not prove external state changed.
        ja: invocation return は外部状態変更を証明しません。
      source_claims: [claim-safety-commit-design]
    - id: commit-idempotency-single-effect
      severity: error
      expression_language: plain
      expression: Requests sharing the same idempotency key and matching argument digest must produce at most one SideEffect; retries return the same EffectReceipt.
      explanation:
        zh: 幂等键防止重复调用产生双重外部效果。
        en: Idempotency keys prevent duplicate external effects from retries.
        ja: idempotency key は retry による duplicate external effect を防ぎます。
      source_claims: [claim-safety-commit-design]
  required_relations:
    - id: request-evaluated-by-gate
      direction: outgoing
      predicate: evaluated_by
      target_concept_id: CommitGate
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每个 CommitRequest 必须经 CommitGate 求值。
        en: Each CommitRequest must be evaluated by a CommitGate.
        ja: 各 CommitRequest は CommitGate により evaluate される必要があります。
      source_claims: [claim-safety-commit-design]
examples:
  - id: safety-commit-redaction-example-git-secrets-block
    labels:
      zh: git-secrets 预提交阻断 AWS 密钥
      en: git-secrets pre-commit blocks AWS key
      ja: git-secrets pre-commit が AWS key を block
    descriptions:
      zh: 开发者 staged `.env` 含 AWS 访问密钥；git-secrets commit hook 在创建 git object 前失败。CommitGate cg-secrets-1 产生 CommitDenial，无 SideEffect 到达 GitHub remote；若启用 push protection 则形成第二道防线。
      en: A developer stages `.env` containing an AWS access key; the git-secrets commit hook fails before creating a git object. CommitGate cg-secrets-1 emits CommitDenial with no SideEffect reaching the GitHub remote; push protection forms a second line if enabled.
      ja: 開発者が AWS access key を含む `.env` を stage。git-secrets commit hook が git object 作成前に fail。CommitGate cg-secrets-1 が CommitDenial を出し GitHub remote へ SideEffect なし。push protection 有効なら二段目防御。
    example_source:
      product: git-secrets
      url: https://github.com/awslabs/git-secrets
      version: commit hook prohibited patterns
    field_values:
      scanner: git-secrets
      blocked_file: .env
      gate_result: deny
      side_effect_created: false
    related_node_ids:
      - CommitGate
      - CommitDenial
    related_relation_ids: []
    source_claims:
      - claim-safety-commit-git-secrets
  - id: safety-commit-redaction-example-trufflehog-ci
    labels:
      zh: TruffleHog CI 扫描 verified 密钥
      en: TruffleHog CI scan finds verified secret
      ja: TruffleHog CI scan が verified secret を検出
    descriptions:
      zh: CI 运行 `trufflehog git file://. --only-verified` 在 PR 分支发现 Slack webhook；CommitGate 标记 deny 并阻止 merge SideEffect；GitHub secret scanning alert 与 TruffleHog 结果交叉引用为扫描证据。
      en: CI runs `trufflehog git file://. --only-verified` on a PR branch and finds a Slack webhook; CommitGate marks deny and blocks the merge SideEffect; GitHub secret scanning alert cross-references TruffleHog output as scan evidence.
      ja: CI が PR branch で `trufflehog git file://. --only-verified` を実行し Slack webhook を検出。CommitGate deny で merge SideEffect block。GitHub secret scanning alert が TruffleHog output と cross-reference。
    example_source:
      product: TruffleHog
      url: https://github.com/trufflesecurity/trufflehog
      version: verified secret detection
    field_values:
      scanner: trufflehog
      verified: true
      secret_type: slack_webhook
      gate_result: deny
    related_node_ids:
      - CommitGate
      - CommitDenial
    related_relation_ids: []
    source_claims:
      - claim-safety-commit-trufflehog
  - id: safety-commit-redaction-example-refund-gate-allow
    labels:
      zh: 退款 CommitGate 批准链
      en: Refund CommitGate approval chain
      ja: 返金 CommitGate 承認 chain
    descriptions:
      zh: cr_82 请求对 order:913 退款不超过 100 USD；cg_44 核对 operator_7 有效 grant、argument digest sha256:91ab 与 preview pv_82 后产生 ca_82 allow；随后 SideEffect se_82 与 EffectReceipt er_82 证明支付网关状态变更。
      en: cr_82 requests at most USD 100 refund on order:913; cg_44 verifies operator_7's effective grant, argument digest sha256:91ab, and preview pv_82, then emits ca_82 allow; SideEffect se_82 and EffectReceipt er_82 prove payment-gateway state change.
      ja: cr_82 が order:913 へ最大 100 USD 返金を要求。cg_44 が operator_7 grant、digest sha256:91ab、preview pv_82 を照合し ca_82 allow。SideEffect se_82/EffectReceipt er_82 が payment gateway 状態変更を証明。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: business side-effect commit gate
    field_values:
      commit_request_id: cr_82
      gate_id: cg_44
      gate_result: allow
      approved_scope: order:913/refund<=100USD
      side_effect_id: se_82
    related_node_ids:
      - CommitRequest
      - CommitGate
      - CommitApproval
      - SideEffect
      - EffectReceipt
    related_relation_ids:
      - CommitRequest-evaluated_by-CommitGate
      - CommitApproval-approves-CommitRequest
    source_claims:
      - claim-safety-commit-design
  - id: safety-commit-redaction-example-idempotency-retry
    labels:
      zh: 幂等重试返回同一回执
      en: Idempotent retry returns same receipt
      ja: 冪等 retry が同一 receipt を返す
    descriptions:
      zh: tc_77 以 idempotency_key refund:913:1 创建 cr_77 并产生 se_77/er_77；重试 tc_78 相同键与 digest 只返回 er_77，side_effect_count 仍为 1。
      en: tc_77 creates cr_77 with idempotency_key refund:913:1 producing se_77/er_77; retry tc_78 with the same key and digest returns er_77 only and side_effect_count remains 1.
      ja: tc_77 が idempotency_key refund:913:1 で cr_77/se_77/er_77 を生成。retry tc_78 は同一 key/digest で er_77 のみ返し side_effect_count=1 維持。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: idempotent side-effect commit
    field_values:
      idempotency_key: refund:913:1
      original_tool_call_id: tc_77
      retry_tool_call_id: tc_78
      side_effect_count: 1
      effect_receipt_id: er_77
    related_node_ids:
      - CommitRequest
      - SideEffect
      - EffectReceipt
    related_relation_ids: []
    source_claims:
      - claim-safety-commit-design
  - id: safety-commit-redaction-example-stale-approval-reject
    labels:
      zh: 拒绝将旧批准用于新请求
      en: Reject stale approval for new request
      ja: 新 request への旧 approval 適用を拒否
    descriptions:
      zh: cr_83 要求 160 USD 退款但 ca_82 只批准 cr_82 的 100 USD 范围且 preview digest 不同；即使 cg_44 与 pd_82 共现于同一 trace，也不能把 ca_82 用作 cr_83 的批准。
      en: cr_83 requests USD 160 refund while ca_82 approves only cr_82's USD 100 scope with a different preview digest; co-occurrence of cg_44 and pd_82 in one trace cannot approve cr_83 with ca_82.
      ja: cr_83 が 160 USD 返金を要求するが ca_82 は cr_82 の 100 USD scope のみ承認し preview digest も異なる。同一 trace 内 cg_44/pd_82 共起でも ca_82 を cr_83 承認に使えません。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: commit approval request matching
    field_values:
      commit_request_id: cr_83
      candidate_approval_id: ca_82
      requested_scope: order:913/refund=160USD
      gate_result: deny
    related_node_ids:
      - CommitGate
      - CommitApproval
      - CommitRequest
    related_relation_ids: []
    source_claims:
      - claim-safety-commit-design
parent_relation: null
