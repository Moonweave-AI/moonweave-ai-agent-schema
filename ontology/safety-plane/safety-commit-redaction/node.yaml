    en: This module references the invocation proposing the change and the applicable authorization decision and approval evidence. Tool, file, network, or optimization flows reference the gate outcome and effect receipt around the actual external change.
    ja: 本モジュールは変更を提案した呼び出しと、適用される認可判断・承認証拠を参照します。ツール、ファイル、ネットワーク、最適化の各処理は、実際の外部変更の前後でゲート結果と効果受領記録を参照します。
