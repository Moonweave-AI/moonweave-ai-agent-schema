              en: Domain review confirms that commit_gate_emits_policy_decision precisely states that one CommitGate emits a generic PolicyDecision; concrete CommitApproval or CommitDenial records are subsequent commit outcomes rather than endpoints of this boundary.
              ja: domain review は commit_gate_emits_policy_decision が一 CommitGate による generic PolicyDecision の生成を正確に表し、具体 CommitApproval/CommitDenial は後続 commit outcome record で境界 endpoint ではないことを確認しました。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 结构复核确认 subject 仅含 accepted 边的提交侧端点 CommitGate，避免把上位 PolicyDecision 与其下位结果类型并列。
              en: Ontology review confirms that the subject contains only the accepted edge's commit-side endpoint CommitGate, avoiding a flat list of PolicyDecision and its specialized outcome types.
              ja: ontology review は subject が accepted edge の commit 側 endpoint CommitGate のみで、PolicyDecision と specialized outcome type の平級化を避けることを確認しました。
