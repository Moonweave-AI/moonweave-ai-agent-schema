  overlap_checks:
    - other_module_id: safety-permission-policy
      semantic_area:
        zh: 操作授权与副作用生效
        en: Operation authorization versus side-effect commitment
        ja: 操作認可と副作用確定
      candidate_concept_ids:
        - CommitApproval
        - CommitDenial
      overlap_reason:
        zh: 两者都可允许或拒绝，但策略判断主体是否有权，提交门还核对具体效果范围、预览、幂等性和回滚准备。 本条仅记录 CommitApproval、CommitDenial；其 canonical owner 是副作用提交控制（safety-commit-redaction），因此 safety-commit-redaction 在此拥有这些概念。
        en: Both may allow or deny, but policy decides whether an actor is authorized while the commit gate also checks concrete effect scope, preview, idempotency, and rollback readiness. This record is limited to CommitApproval, CommitDenial; their canonical owner is Side-effect commit control (safety-commit-redaction), so safety-commit-redaction owns these concepts here.
        ja: どちらも許可・拒否しますが、方針は主体権限、確定ゲートはさらに具体効果範囲、preview、冪等性、rollback 準備を確認します。 この記録は CommitApproval、CommitDenial だけを対象とし、canonical owner は副作用コミット制御（safety-commit-redaction）です。したがって safety-commit-redaction はここでこれらを所有します。
      disambiguation_test:
        zh: 若决定可在不知道实际外部效果的情况下作出，则归授权与策略决策；若身份绑定具体变更与效果凭证，则归副作用提交控制。
        en: If a decision can be made without knowing the actual external effect, it belongs to authorization and policy decisions; if identity is tied to a concrete change and effect receipt, it belongs to side-effect commit control.
        ja: 実際の外部効果を知らず判断できるなら認可とポリシー判断、同一性が具体変更と効果受領に結び付くなら副作用コミット制御に属します。
