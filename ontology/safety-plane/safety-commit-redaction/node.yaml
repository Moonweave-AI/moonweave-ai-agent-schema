        en: "CommitGate is the sole commit-control endpoint: it gates one concrete side-effect request. The generic PolicyDecision it emits is owned by the policy domain. CommitApproval and CommitDenial are internal commit-domain specializations of allow or deny outcomes, not endpoints of this accepted boundary fact."
        ja: commit-control 側の実 endpoint は CommitGate のみで、一具体 side-effect request を gate します。生成される generic PolicyDecision は policy 域が所有します。CommitApproval/CommitDenial は allow/deny outcome の commit 域内 specialization で、この accepted 境界 fact の endpoint ではありません。
