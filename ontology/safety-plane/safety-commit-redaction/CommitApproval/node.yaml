          en: Approval apr_82 references cr_82's call_82 and the same argument digest, explicitly allowing that USD 40 refund.
          ja: approval apr_82 は cr_82 の call_82 と同じ引数 digest を参照し、40 USD の返金を明示的に許可します。
        field_values: {}
        related_node_ids:
          - CommitApproval
