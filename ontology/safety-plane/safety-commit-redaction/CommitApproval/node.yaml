          ja: 引数変更境界
        scenario_id: null
        descriptions:
          zh: apr_82 批准 40 美元退款，随后请求金额变为 400 美元；旧批准不再 approves 新请求。
          en: apr_82 approves a USD 40 refund, after which the requested amount changes to USD 400; the old approval does not approve the new request.
          ja: apr_82 は 40 USD 返金を承認しましたが要求額が 400 USD へ変わったため、旧承認は新要求を承認しません。
