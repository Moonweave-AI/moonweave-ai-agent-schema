          en: Do not connect apr_82 to the amount-changed request; freeze a new CommitRequest and obtain a fresh decision for its new argument digest.
          ja: apr_82 を金額変更後の要求へ接続せず、新しい CommitRequest を固定して新たな引数 digest に対する判断を取得します。
        why_valid_or_invalid:
