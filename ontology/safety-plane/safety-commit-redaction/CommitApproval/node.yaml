source_claims:
  - id: claim-commit-approval-001
    source: eng-fw-openai-hitl
    supports: OpenAI specifies a per-tool-call approve operation that resolves a paused sensitive call before execution. Moonweave reifies that resolved, evidence-bearing result as a GateOutcome subtype and keeps it distinct from a PolicyEvaluation-produced AllowDecision.
    locator: Human-in-the-loop > How the approval flow works, steps 1–5
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-commit-approval-002
    source: eng-fw-openai-hitl
    supports: OpenAI resolves approvals per pending tool-call item and preserves the resolved state; Moonweave assigns the resulting gate outcome a stable identifier for audit.
    locator: Human-in-the-loop > How the approval flow works, steps 1–5
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-commit-approval-003
    source: eng-fw-openai-hitl
    supports: OpenAI exposes each pending sensitive tool call as a distinct approval item with its call identity and arguments; Moonweave binds that item to CommitRequest.
    locator: Human-in-the-loop > How the approval flow works, steps 1–5
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-commit-approval-004
    source: eng-fw-openai-hitl
    supports: OpenAI's HITL decision applies to a specific pending tool call rather than an unbound future action.
    locator: Human-in-the-loop > How the approval flow works, steps 1–5
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-commit-approval-005
    source: eng-fw-openai-hitl
    supports: OpenAI routes a pending approval item to an external reviewer and resumes with that review response; Moonweave records the responsible authority reference.
    locator: Human-in-the-loop > How the approval flow works, steps 1–5
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-commit-approval-006
    source: eng-fw-openai-hitl
    supports: OpenAI presents the concrete tool name and arguments for review; Moonweave records their permitted boundary as approved_scope.
    locator: Human-in-the-loop > How the approval flow works, steps 1–5
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-commit-approval-007
    source: eng-fw-openai-hitl
    supports: OpenAI's reviewer sees and may edit pending tool arguments before approval; Moonweave uses a digest to bind the outcome to the reviewed snapshot.
    locator: Human-in-the-loop > How the approval flow works, steps 1–5
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-commit-approval-008
    source: eng-fw-openai-hitl
    supports: OpenAI persists resolved approval state; Moonweave adds a validity limit so a resumed run cannot reuse stale authority indefinitely.
    locator: Human-in-the-loop > How the approval flow works, steps 1–5
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-commit-approval-009
    source: eng-fw-openai-hitl
    supports: OpenAI documents that sensitive tool calls pause as per-call interruptions and continue only after state.approve; Moonweave applies that call-scoped decision to this bounded refund approval.
    locator: Human-in-the-loop > How the approval flow works, steps 1–5
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-commit-approval-010
    source: eng-fw-openai-hitl
    supports: The OpenAI approval state is scoped to a specific tool call ID unless an explicit persistent choice is made; Moonweave therefore rejects a broad read allowance as approval for a separate mutation.
    locator: Human-in-the-loop > How the approval flow works, steps 1–5
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-commit-approval-011
    source: eng-fw-openai-hitl
    supports: OpenAI stores resolved per-call approvals in RunState and preserves sticky decisions across state serialization; the concrete record fields are Moonweave's auditable representation of that behavior.
    locator: Human-in-the-loop > How the approval flow works, steps 1–5
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-commit-approval-012
    source: eng-fw-openai-hitl
    supports: OpenAI specifies that an approved pending tool call may resume execution. Moonweave represents that call-scoped permission as CommitApproval authorizes the bounded SideEffect.
    locator: Human-in-the-loop > How the approval flow works, steps 1–5
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-commit-approval-013
    source: eng-fw-openai-hitl
    supports: OpenAI resolves one pending sensitive tool call with an approve decision before resuming execution; Moonweave models the resolved, evidence-bearing result as CommitApproval under GateOutcome.
    locator: Human-in-the-loop > How the approval flow works, steps 1–5
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-commit-approval-014
    source: eng-fw-openai-hitl
