    source: eng-fw-openai-hitl
    supports: OpenAI passes parsed parameters and call ID to needs_approval and stores per-call decisions; Moonweave therefore rejects reusing a decision after the request arguments change.
    locator: Human-in-the-loop > Marking tools that need approval; How the approval flow works
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
