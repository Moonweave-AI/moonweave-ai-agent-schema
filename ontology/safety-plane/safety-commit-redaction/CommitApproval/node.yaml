schema: moonweave.ai/ontology-node/v1
id: CommitApproval
kind: concept
labels:
  zh: 提交批准
  en: commit approval
  ja: コミット承認
semantics:
  short_definition:
    zh: CommitGate 对一次冻结 CommitRequest 给出的 allow 门控结果（exit code 0）。
    en: An allow gate outcome from CommitGate over one frozen CommitRequest (exit code 0).
    ja: 凍結 CommitRequest に対する CommitGate の allow ゲート結果（exit code 0）。
  definition:
    zh: CommitApproval 是 GateOutcome 的 allow 特化：必须具有 result=allow、gate_outcome_id、gate_ref、证据引用与产生时间，并绑定尚未执行的具体 CommitRequest、call ID、批准主体、argument digest、approved scope 与 valid_until。pre-commit hook exit code 0、人工 state.approve 或策略 allow 均可作为证据，但结果本身不是 HumanApproval 事件，也不在没有 CommitGate 求值时冒充 AllowDecision。批准表示允许释放调用，不表示 SideEffect 已发生。
    en: "CommitApproval is the allow specialization of GateOutcome: it requires result=allow, gate_outcome_id, gate_ref, evidence references, and production time, binding one unexecuted CommitRequest, call ID, approving authority, argument digest, approved scope, and valid_until. Pre-commit hook exit code 0, human state.approve, or policy allow may be evidence, but the outcome is neither a HumanApproval event nor an AllowDecision without CommitGate evaluation. Approval permits releasing the call; it does not state SideEffect occurred."
    ja: CommitApproval は GateOutcome の allow 特化で、result=allow、gate_outcome_id、gate_ref、証拠参照、生成時刻を必須とし、未実行 CommitRequest/call ID/承認主体/argument digest/approved scope/valid_until に束縛。pre-commit hook exit 0、human state.approve、policy allow は evidence になり得ますが、HumanApproval でも CommitGate 評価なし AllowDecision でもありません。承認は call 解放を許可し SideEffect 発生を示しません。
  why_needed:
    zh: 批准与执行分离后，系统才能在 git-secrets 通过、TruffleHog 无命中或人工审批后准确记录哪次调用被允许，并避免把宽泛策略许可或 EffectReceipt 误当成这次提交的授权。
    en: Separating approval from execution lets the system record which call was allowed after git-secrets pass, TruffleHog clean scan, or human review, without mistaking broad policy allowance or EffectReceipt for this commit authorization.
    ja: 承認と実行を分離すると、git-secrets pass/TruffleHog clean/human review 後にどの call が許可されたか正確に記録でき、broad policy allowance や EffectReceipt を今回 commit 認可と誤認しません。
  includes:
    - zh: 绑定具体 call ID、目标资源、参数摘要、批准者、允许范围与失效条件的程序化或人工 allow 记录。
      en: Programmatic or human allow records bound to a concrete call ID, target resource, argument digest, approver, allowed scope, and expiry.
      ja: 具体 call ID、対象 resource、argument digest、承認者、許可 scope、失効条件に bind した programmatic/human allow record。
  excludes:
    - zh: 无 CommitGate 求值的通用 AllowDecision、仅风险分建议、执行后的 EffectReceipt、未绑定 CommitRequest 的人工回答。
      en: General AllowDecision without CommitGate evaluation, risk-score suggestion only, post-execution EffectReceipt, human answer not bound to CommitRequest.
      ja: CommitGate 評価なし general AllowDecision、risk score 提案のみ、実行後 EffectReceipt、CommitRequest 未 bind human answer。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 映射：pre-commit hook exit 0 → CommitApproval；OpenAI HITL state.approve → CommitApproval 绑定 ToolApprovalItem call_id；业务退款 gate allow → ca_82 引用 cr_82 与 digest。集成必须保留 gate_outcome_id 与 commit_request_ref 供审计重放。
    en: "Mapping: pre-commit hook exit 0 → CommitApproval; OpenAI HITL state.approve → CommitApproval bound to ToolApprovalItem call_id; business refund gate allow → ca_82 referencing cr_82 and digest. Integrations must retain gate_outcome_id and commit_request_ref for audit replay."
    ja: mapping：pre-commit hook exit 0 → CommitApproval；OpenAI HITL state.approve → ToolApprovalItem call_id bind CommitApproval；business refund allow → ca_82 が cr_82/digest 参照。gate_outcome_id/commit_request_ref を audit replay 用に保持必須。
  typical_input:
    - description: git-secrets hook passes with exit 0.
      format: |
        git-secrets --commit
        exit 0 => CommitApproval evidence for staged commit
      source_claims:
        - claim-commit-approval-git-secrets
    - description: Human approve on pending refund call.
      format: |
        state.approve(call_82)
        approved_scope: order:913/refund<=100
        argument_digest: sha256:91ab
      source_claims:
        - claim-commit-approval-design
  typical_output:
    - description: CommitApproval record ready for SideEffect release.
      format: |
        gate_outcome_id: commit-gate-outcome-allow-82
        gate_ref: cg_44
        result: allow
        commit_request_ref: cr_82
        valid_until: 2026-07-14T10:10:00Z
      source_claims:
        - claim-commit-approval-design
  reference_implementations:
    - name: git-secrets (AWS Labs)
      url: https://github.com/awslabs/git-secrets
      description: Exit code 0 on clean staged content before commit.
    - name: pre-commit framework
      url: https://pre-commit.com/
      description: Aggregates hook exit codes for staged changes.
    - name: GitHub push rules
      url: https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/managing-rulesets
      description: Branch and push rules allowing vetted changes.
structure:
  identity_keys:
    - gate_outcome_id
  fields:
    - id: gate_outcome_id
      labels:
        zh: 门控结果标识
        en: gate outcome ID
        ja: ゲート結果 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识这一次 CommitGate allow 结果的稳定唯一值。
        en: Stable unique identifier for this CommitGate allow result.
        ja: 一回の CommitGate allow 結果を識別する安定一意値。
      allowed_values: []
      pattern: null
      example_value: commit-gate-outcome-allow-82
      source_claims:
        - claim-commit-approval-design
    - id: commit_request_ref
      labels:
        zh: 提交请求引用
        en: commit request reference
        ja: 確定要求参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 被本次门控求值允许的冻结 CommitRequest 引用。
        en: Reference to the frozen CommitRequest allowed by this gate evaluation.
        ja: 本 gate 評価が許可した凍結 CommitRequest への参照。
      allowed_values: []
      pattern: null
      example_value: cr_82
      source_claims:
        - claim-commit-approval-design
    - id: approved_scope
      labels:
        zh: 批准范围
        en: approved scope
        ja: 承認範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 允许结果覆盖的目标资源、动作和参数边界。
        en: Resource, action, and argument boundary covered by the allow result.
        ja: allow 結果が覆う resource、action、argument 境界。
      allowed_values: []
      pattern: null
      example_value: order:913/refund<=100
      source_claims:
        - claim-commit-approval-design
    - id: argument_digest
      labels:
        zh: 参数摘要
        en: argument digest
        ja: 引数 digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 批准时冻结参数规范化表示的完整性摘要。
        en: Integrity digest of normalized arguments frozen at approval time.
        ja: 承認時に凍結した正規化引数の integrity digest。
      allowed_values: []
      pattern: null
      example_value: sha256:91ab
      source_claims:
        - claim-commit-approval-design
  constraints:
    - id: commit-approval-matches-request
      severity: error
      expression_language: plain
      expression: CommitApproval MUST reference exactly one CommitRequest with matching approved scope and argument digest
      explanations:
        zh: 批准只授权其明确指向且摘要一致的 CommitRequest。
        en: Approval authorizes only the explicitly referenced CommitRequest with matching digest.
        ja: 承認は明示参照かつ digest 一致 CommitRequest のみを認可します。
      source_claims:
        - claim-commit-approval-design
  required_relation_constraints: []
examples:
  - id: CommitApproval-refund-allow
    labels:
      zh: 退款调用批准
      en: Approved refund call
      ja: 返金呼出し承認
    descriptions:
      zh: 审核员批准 call_82 执行 refund_order(order_id=913, amount=100)，范围限定订单 913 最高 100 元；支付系统尚未调用。
      en: A reviewer approves call_82 for refund_order(order_id=913, amount=100) scoped to order 913 at most 100 units; payment system not yet called.
      ja: 審査者が call_82 の refund_order(order_id=913, amount=100) を注文 913 上限 100 に限定承認。決済未呼出し。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: business commit approval
    field_values:
      gate_outcome_id: commit-gate-outcome-allow-82
      gate_ref: cg_44
      commit_request_ref: cr_82
      approved_scope: order:913/refund<=100
      argument_digest: sha256:91ab
    related_node_ids:
      - CommitApproval
      - CommitGate
      - CommitRequest
    related_relation_ids:
      - CommitApproval-approves-CommitRequest
    source_claims:
      - claim-commit-approval-design
  - id: CommitApproval-git-secrets-pass
    labels:
      zh: git-secrets 通过允许提交
      en: git-secrets pass allows commit
      ja: git-secrets pass で commit 許可
    descriptions:
      zh: staged 变更经 git-secrets 扫描无 prohibited pattern，hook exit 0；CommitGate 产生 CommitApproval，允许本地 git commit SideEffect 继续（remote 仍可能受 push protection 约束）。
      en: Staged changes pass git-secrets with no prohibited pattern, hook exit 0; CommitGate emits CommitApproval allowing local git commit SideEffect to proceed (remote may still be constrained by push protection).
      ja: staged change が git-secrets を pass し hook exit 0。CommitGate が CommitApproval を出力し local git commit SideEffect 継続を許可（remote は push protection 制約可）。
    example_source:
      product: git-secrets
      url: https://github.com/awslabs/git-secrets
      version: commit hook exit 0
    field_values:
      gate_outcome_id: commit-gate-outcome-allow-secrets-3
      hook_exit_code: 0
      gate_ref: cg-precommit-3
    related_node_ids:
      - CommitApproval
      - CommitGate
    related_relation_ids:
      - CommitGate-may_produce-CommitApproval
    source_claims:
      - claim-commit-approval-git-secrets
  - id: CommitApproval-broad-policy-boundary
    labels:
      zh: 通用读取许可非批准
      en: General read allowance is not approval
      ja: 一般 read 許可は承認ではない
    descriptions:
      zh: 策略允许读取公开目录但未点名 call_82、退款资源或金额；这是 AllowDecision 不是 CommitApproval。
      en: Policy allows reading a public catalog but names neither call_82, refund resource, nor amount; this is AllowDecision not CommitApproval.
      ja: policy が public catalog read を許可するが call_82/返金 resource/金額を指定しない。AllowDecision で CommitApproval ではない。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: call-scoped approval boundary
    field_values:
      accepted: false
    related_node_ids:
      - CommitApproval
      - CommitRequest
    related_relation_ids: []
    source_claims:
      - claim-commit-approval-design
  - id: CommitApproval-stale-scope-reject
    labels:
      zh: 拒绝旧批准用于新请求
      en: Reject stale approval for new request
      ja: 新 request への旧 approval 拒否
    descriptions:
      zh: ca_82 只批准 cr_82 的 100 USD 范围；cr_83 请求 160 USD 时不得复用 ca_82，即使同一 trace 中共现 cg_44。
      en: ca_82 approves only cr_82's USD 100 scope; cr_83 requesting USD 160 must not reuse ca_82 even if cg_44 co-occurs in the same trace.
      ja: ca_82 は cr_82 の 100 USD scope のみ承認。cr_83 が 160 USD 要求時 ca_82 再利用不可。同一 trace 内 cg_44 共起でも不可。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: approval-request matching
    field_values:
      candidate_approval_id: ca_82
      commit_request_id: cr_83
      gate_result: deny
    related_node_ids:
      - CommitApproval
      - CommitRequest
    related_relation_ids: []
    source_claims:
      - claim-commit-approval-design
parent_relation: null
relations:
  - id: CommitApproval-is_a-GateOutcome
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是一种门控结果
      en: is a GateOutcome
      ja: GateOutcome の一種
    definitions:
      zh: 每个 CommitApproval 都是 GateOutcome，以 result=allow 与具体 CommitRequest、call ID、批准主体、参数摘要、允许范围和有效期为种差。
      en: Every CommitApproval is a GateOutcome distinguished by result=allow and binding one CommitRequest, call ID, approving authority, argument digest, allowed scope, and validity limit.
      ja: すべての CommitApproval は GateOutcome で result=allow と具体 CommitRequest/call ID/承認主体/argument digest/許可 scope/有効期限が種差。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 分类继承不使用实例关系基数。
      en: Taxonomic inheritance does not use instance-relation cardinality.
      ja: 分類継承にはインスタンス関係の基数を用いません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 有下位类型
        en: has subtype
        ja: 下位型を持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-commit-approval-design
    distinct_fact_rationale:
      zh: 需要已完成 CommitGate 求值，不是策略评估结果。
      en: Requires a completed CommitGate evaluation, not a policy-evaluation result.
      ja: 完了 CommitGate 評価を要求し policy evaluation 結果ではありません。
    layout_role: secondary-backbone
    target: concept:GateOutcome
  - id: CommitApproval-approves-CommitRequest
    predicate: approves
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 批准具体提交请求
      en: approves commit request
      ja: 具体的確定要求を承認
    definitions:
      zh: CommitApproval 批准参数、目标与 call 身份均已冻结的 CommitRequest；仅当 call_id 与 argument digest 完全匹配时成立。
      en: CommitApproval approves one CommitRequest whose arguments, target, and call identity are frozen; holds only when call ID and argument digest match exactly.
      ja: CommitApproval は引数・対象・call identity が凍結された CommitRequest を承認。call ID と argument digest 完全一致時のみ成立。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 类级关系不替代实例一对一完整性约束。
      en: Class-level fact does not replace instance one-to-one integrity.
      ja: class-level fact は instance 一対一整合性を置換しません。
    inverse_reading:
      predicate: approved_by
      labels:
        zh: 由提交批准决定
        en: approved by commit approval
        ja: 確定承認により承認済み
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-commit-approval-design
    distinct_fact_rationale:
      zh: 闸门能产生批准不足以回答哪个请求被批准。
      en: A gate's ability to produce approvals does not identify which request was approved.
      ja: gate が承認生成可能でもどの request が承認されたかは分かりません。
    layout_role: cross-link
    target: concept:CommitRequest
  - id: CommitApproval-authorizes-SideEffect
    predicate: authorizes
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 授权副作用
      en: authorizes side effect
      ja: 副作用を認可
    definitions:
      zh: CommitApproval 允许其绑定的 SideEffect 在记录范围内继续；授权不表示副作用已发生。
      en: CommitApproval permits its bound SideEffect to proceed within recorded scope; authorization does not state the effect occurred.
      ja: CommitApproval は bind SideEffect を記録 scope 内で進行許可。認可は副作用発生を示しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 授权是调用与范围绑定的治理事实。
      en: Authorization is a call- and scope-bound governance fact.
      ja: 認可は call/scope bind governance fact です。
    inverse_reading:
      predicate: authorized_by
      labels:
        zh: 由批准授权
        en: authorized by
        ja: 承認により認可
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-commit-approval-design
    distinct_fact_rationale:
      zh: AllowDecision 分类不能单独推出授权哪个 SideEffect。
      en: AllowDecision classification alone cannot determine which SideEffect is authorized.
      ja: AllowDecision 分類だけではどの SideEffect が認可されるか決まりません。
    layout_role: cross-link
    target: concept:SideEffect
sources:
  - id: git-secrets-awslabs
    title: git-secrets (AWS Labs)
    url: https://github.com/awslabs/git-secrets
    source_type: official-doc
    relevance: Exit code 0 as allow evidence before commit SideEffect.
  - id: pre-commit-framework
    title: pre-commit framework
    url: https://pre-commit.com/
    source_type: official-doc
    relevance: Hook exit code aggregation for staged-change approval.
  - id: github-push-rules
    title: GitHub repository rulesets
    url: https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/managing-rulesets
    source_type: official-doc
    relevance: Push rules as server-side allow/deny context.
  - id: safety-commit-design
    title: Moonweave safety-commit-redaction module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: CommitApproval as call-scoped allow GateOutcome.
source_claims:
  - id: claim-commit-approval-git-secrets
    source: git-secrets-awslabs
    supports: git-secrets exit code 0 on clean scans supports CommitApproval before commit SideEffect proceeds.
    locator: git-secrets commit hooks
    evidence_kind: official
    confidence: high
  - id: claim-commit-approval-design
    source: safety-commit-design
    supports: Moonweave binds CommitApproval to frozen CommitRequest with scope, digest, and validity for audit replay.
    locator: CommitApproval identity
    evidence_kind: design-inference
    confidence: high
