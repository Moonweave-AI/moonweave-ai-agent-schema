        related_relation_ids:
          - CommitApproval-approves-CommitRequest
        expected_result:
          zh: 仅建立 apr_82 approves cr_82，并只允许该冻结请求进入提交执行；其他退款请求仍须分别决策。
          en: Assert apr_82 approves cr_82 and release only that frozen request for commit execution; every other refund request still requires its own decision.
          ja: apr_82 approves cr_82 のみを主張して当該固定要求だけを commit execution へ解放し、他の返金要求は個別判断を必要とします。
        why_valid_or_invalid:
          zh: 批准记录与请求共享同一 call_82、退款目标和参数摘要，因此该决定的主体、对象与冻结范围能够逐项对应。
          en: The approval record and request share call_82, the refund target, and the argument digest, so the decision subject, object, and frozen scope correspond item by item.
          ja: approval record と request は call_82・返金対象・引数 digest を共有し、判断主体・対象・固定 scope が項目ごとに対応します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
