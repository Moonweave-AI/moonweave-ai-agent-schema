    supports: OpenAI scopes approval decisions to a specific tool call ID and resumes the stored RunState after state.approve; Moonweave records that exact decision-to-request fact as approves.
    locator: Human-in-the-loop > How the approval flow works, steps 1–5
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
