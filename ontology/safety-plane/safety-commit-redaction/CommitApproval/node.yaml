schema: moonweave.ai/ontology-node/v1
id: CommitApproval
kind: concept
status: accepted
labels:
  en: commit approval
  zh: 提交批准
  ja: コミット承認
semantics:
  short_definition:
    zh: 记录 CommitGate 对某次有界副作用给出的 result=allow 门控结果。
    en: A result=allow GateOutcome from one CommitGate evaluation over a bounded side-effect request.
    ja: 有界な副作用要求に対する CommitGate の一回評価から生じる result=allow の GateOutcome。
  definition:
    zh: CommitApproval 是 CommitGate 一次求值产生的 GateOutcome 特化，必须具有 result=allow、gate_outcome_id、gate_ref、证据引用与产生时间，并把结果绑定到尚未执行的具体 CommitRequest、call ID、批准主体、参数摘要、允许范围和有效期。人工回答可以是证据，但该结果本身不是 HumanApproval 事件，也不在缺少 PolicyEvaluation 事实时冒充 AllowDecision。
    en: CommitApproval is a GateOutcome specialization produced by one CommitGate evaluation. It requires result=allow, gate_outcome_id, gate_ref, evidence references, and production time, and binds the outcome to one unexecuted CommitRequest, call ID, approving authority, argument digest, allowed scope, and validity limit. A human answer may be evidence, but the outcome is neither the HumanApproval event nor an AllowDecision without separate PolicyEvaluation facts.
    ja: CommitApproval は一回の CommitGate 評価で生じる GateOutcome の特殊化です。result=allow、gate_outcome_id、gate_ref、証拠参照、生成時刻を必須とし、未実行の具体的 CommitRequest・call ID・承認主体・引数 digest・許可範囲・有効期限へ結果を束縛します。人間回答は証拠になり得ますが、結果自体は HumanApproval event でも、別の PolicyEvaluation 事実なしの AllowDecision でもありません。
  why_needed:
    zh: 批准与实际执行分离后，系统才能在恢复运行、并发审批和审计时判断哪个调用被谁以何种边界允许，并避免把宽泛策略许可或事后成功回执误当成这次提交的授权。
    en: Separating approval from execution lets resumed runs, concurrent reviewers, and audits determine which exact call was allowed by whom and under what boundary, without mistaking a broad policy allowance or a post-execution receipt for this commit authorization.
    ja: 承認と実行を分離すると、再開実行、並行審査、監査で、どの呼出しが誰によりどの境界で許可されたかを判定でき、一般的なポリシー許可や実行後の受領証を今回の確定承認と誤認しません。
  includes:
    - zh: 一つの call ID、対象资源、参数摘要、批准者或策略主体、允许范围和失效条件均可追溯的人工或程序化批准记录。
      en: Human or programmatic approval records traceable to one call ID, target resource, argument digest, approving authority, allowed scope, and expiry conditions.
      ja: 一つの call ID、対象資源、引数要約、承認主体、許可範囲、有効期限へ追跡できる人手またはプログラムによる承認記録。
  excludes:
    - zh: 没有实际 CommitGate 求值标识、证据和时间的通用 AllowDecision，只有风险分的建议，执行后的 EffectReceipt，以及未绑定 CommitRequest 的人工回答。
      en: A general AllowDecision with no actual CommitGate evaluation ID, evidence, or time; a risk-score suggestion; a post-execution EffectReceipt; and a human answer not bound to CommitRequest.
      ja: 実際の CommitGate 評価 ID・証拠・時刻を欠く一般 AllowDecision、risk score 提案、実行後 EffectReceipt、CommitRequest に束縛されない人間回答。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - gate_outcome_id
  fields:
    - id: gate_outcome_id
      labels:
        zh: 门控结果标识
        en: gate outcome ID
        ja: ゲート結果 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识这一次 CommitGate 允许结果的稳定唯一值，并继承 GateOutcome 的身份条件。
        en: Stable unique identifier for this allow result of one CommitGate evaluation, inheriting GateOutcome identity.
        ja: 一回の CommitGate 評価による allow 結果を識別し GateOutcome 同一性を継承する安定一意値です。
      allowed_values: []
      pattern: null
      example_value: commit-gate-outcome-allow-82
      source_claims:
        - claim-commit-approval-002
    - id: commit_request_ref
      labels:
        zh: 提交请求引用
        en: commit request reference
        ja: 確定要求参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 被本次门控求值允许的冻结 CommitRequest 引用。
        en: Reference to the frozen CommitRequest allowed by this gate evaluation.
        ja: この gate 評価が許可した凍結 CommitRequest への参照です。
      allowed_values: []
      pattern: null
      example_value: cr_82
      source_claims:
        - claim-commit-approval-003
    - id: call_id
      labels:
        zh: 调用标识
        en: call ID
        ja: 呼出し ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 被批准且仍未执行的具体工具调用标识。
        en: Identifier of the concrete, still-unexecuted tool call approved by the outcome.
        ja: 結果が承認した具体的な未実行 tool call の識別子です。
      allowed_values: []
      pattern: null
      example_value: call_82
      source_claims:
        - claim-commit-approval-004
    - id: approving_authority_ref
      labels:
        zh: 批准主体引用
        en: approving authority reference
        ja: 承認主体参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对门控证据给出有效允许回答的人或程序化主体。
        en: Human or programmatic authority whose valid answer supports the gate's allow result.
        ja: gate の allow 結果を支える有効回答を出した人間またはプログラム主体です。
      allowed_values: []
      pattern: null
      example_value: operator_7
      source_claims:
        - claim-commit-approval-005
    - id: approved_scope
      labels:
        zh: 批准范围
        en: approved scope
        ja: 承認範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 允许结果覆盖的目标资源、动作和参数边界。
        en: Resource, action, and argument boundary covered by the allow result.
        ja: allow 結果が覆う resource・action・argument の境界です。
      allowed_values: []
      pattern: null
      example_value: order:913/refund<=100
      source_claims:
        - claim-commit-approval-006
    - id: argument_digest
      labels:
        zh: 参数摘要
        en: argument digest
        ja: 引数 digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 批准时冻结参数规范化表示的完整性摘要。
        en: Integrity digest of the normalized arguments frozen at approval time.
        ja: 承認時に凍結した正規化引数の integrity digest です。
      allowed_values: []
      pattern: null
      example_value: sha256:91ab
      source_claims:
        - claim-commit-approval-007
    - id: valid_until
      labels:
        zh: 有效截止时间
        en: valid until
        ja: 有効期限
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 此允许结果可用于释放所绑定调用的最晚时间。
        en: Latest time at which this allow result may release the bound call.
        ja: この allow 結果が束縛 call を解放できる最終時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T10:10:00Z
      source_claims:
        - claim-commit-approval-008
  constraints: []
  required_relation_constraints: []
examples:
  - id: CommitApproval-example-positive-001
    kind: positive
    labels:
      zh: 退款调用批准
      en: Approved refund call
      ja: 返金呼出しの承認
    scenario_id: null
    descriptions:
      zh: 审核员批准 call_82 执行 refund_order(order_id=913, amount=100)，范围限定为订单 913、最高 100 元且十分钟内有效；此时尚未调用支付系统。
      en: A reviewer approves call_82 for refund_order(order_id=913, amount=100), limited to order 913, at most 100 units, and ten minutes of validity; the payment system has not yet been called.
      ja: 審査者は call_82 の refund_order(order_id=913, amount=100) を、注文 913、上限 100、10 分間に限定して承認します。この時点では決済システムはまだ呼ばれていません。
    field_values:
      gate_outcome_id: commit-gate-outcome-allow-82
      gate_ref: cg_44
      result: allow
      evidence_refs:
        - permission-response-82
        - cr_82
      produced_at: 2026-07-14T10:00:00Z
      commit_request_ref: cr_82
      call_id: call_82
      approving_authority_ref: operator_7
      approved_scope: order:913/refund<=100
      argument_digest: sha256:91ab
      valid_until: 2026-07-14T10:10:00Z
    related_node_ids:
      - CommitApproval
      - SideEffect
      - GateOutcome
      - CommitGate
    related_relation_ids:
      - CommitApproval-is_a-GateOutcome
      - CommitApproval-authorizes-SideEffect
    expected_result:
      zh: 运行状态只解除 call_82 的闸门，并保留金额、订单与期限限制；其他退款调用仍需独立决定。
      en: The run state releases only call_82 under its amount, order, and expiry limits; other refund calls still require separate decisions.
      ja: 実行状態は金額、注文、有効期限の制限下で call_82 だけを解除し、他の返金呼出しには別の判断を要求します。
    why_valid_or_invalid:
      zh: 记录同时具备具体调用、批准主体和可执行边界，并明确执行尚未发生，因此满足提交批准而非效果回执的判定条件。
      en: The record has a concrete call, approving authority, and executable boundary while explicitly preceding execution, so it is a commit approval rather than an effect receipt.
      ja: 具体的呼出し、承認主体、実行境界を持ち、実行前であることが明確なため、効果受領証ではなく確定承認です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-commit-approval-009
  - id: CommitApproval-example-boundary-001
    kind: boundary
    labels:
      zh: 通用读取许可边界
      en: General read allowance boundary
      ja: 一般読取許可の境界
    scenario_id: null
    descriptions:
      zh: 策略允许支持智能体读取公开产品目录，但没有点名 call_82、退款资源或金额；这是一项通用读取许可，不能授权退款副作用。
      en: A policy allows the support agent to read the public product catalog but names neither call_82, a refund resource, nor an amount; it is a general read allowance and cannot authorize the refund side effect.
      ja: ポリシーはサポートエージェントの公開製品カタログ読取を許可しますが、call_82、返金資源、金額を指定しません。これは一般的な読取許可であり、返金の副作用を承認できません。
    field_values: {}
    related_node_ids:
      - CommitApproval
      - GateOutcome
      - AllowDecision
      - CommitRequest
    related_relation_ids: []
    expected_result:
      zh: 验证器保留该记录为 AllowDecision，并让退款请求继续处于待审批状态。
      en: Validation keeps the record as an AllowDecision and leaves the refund request pending approval.
      ja: 検証器はこの記録を AllowDecision のまま保持し、返金要求を承認待ちにします。
    why_valid_or_invalid:
      zh: 缺少具体调用、目标副作用与批准范围，不能满足 CommitApproval 的调用级种差。
      en: The missing concrete call, target side effect, and approval scope fail CommitApproval's call-level differentia.
      ja: 具体的呼出し、対象副作用、承認範囲がないため、CommitApproval の呼出し単位の種差を満たしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-commit-approval-010
  - id: CommitApproval-example-instance-001
    kind: instance
    labels:
      zh: 单次提交批准记录
      en: Single-call commit approval record
      ja: 単一呼出し確定承認記録
    scenario_id: null
    descriptions:
      zh: 门控结果 gate_outcome_id=commit-gate-outcome-allow-82 记录 CommitGate cg_44 对 CommitRequest cr_82 的 result=allow；它把 call_82、批准主体 operator_7、范围 order:913/refund<=100、参数摘要 sha256:91ab 与有效期 2026-07-14T10:10:00Z 绑定为同一可审计结果。
      en: Gate outcome commit-gate-outcome-allow-82 records result=allow from CommitGate cg_44 over CommitRequest cr_82. It binds call_82, approving authority operator_7, scope order:913/refund<=100, argument digest sha256:91ab, and validity limit 2026-07-14T10:10:00Z into one auditable outcome.
      ja: Gate outcome commit-gate-outcome-allow-82 は CommitGate cg_44 が CommitRequest cr_82 に出した result=allow を記録します。call_82・承認主体 operator_7・範囲 order:913/refund<=100・引数 digest sha256:91ab・有効期限 2026-07-14T10:10:00Z を一つの監査可能な結果に束縛します。
    field_values:
      gate_outcome_id: commit-gate-outcome-allow-82
      gate_ref: cg_44
      result: allow
      evidence_refs:
        - permission-response-82
        - cr_82
      produced_at: 2026-07-14T10:00:00Z
      commit_request_ref: cr_82
      call_id: call_82
      approving_authority_ref: operator_7
      approved_scope: order:913/refund<=100
      argument_digest: sha256:91ab
      valid_until: 2026-07-14T10:10:00Z
    related_node_ids:
      - CommitApproval
      - GateOutcome
      - CommitGate
      - CommitRequest
    related_relation_ids:
      - CommitApproval-is_a-GateOutcome
      - CommitApproval-approves-CommitRequest
    expected_result:
      zh: 恢复同一运行时可重放该批准，但参数摘要或 call ID 改变时不得复用。
      en: The same run may replay this approval, but a changed argument digest or call ID cannot reuse it.
      ja: 同じ実行の再開時には承認を再利用できますが、引数要約または call ID が変われば再利用できません。
    why_valid_or_invalid:
      zh: 实例给出了批准记录的身份、授权主体、范围、期限和被批准调用，可直接用于去歧义与审计。
      en: The instance supplies identity, authority, scope, expiry, and approved call, making it usable for disambiguation and audit.
      ja: 記録の同一性、承認主体、範囲、期限、承認対象呼出しが揃い、曖昧性解消と監査に利用できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-commit-approval-011
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: CommitApproval-authorizes-SideEffect
    predicate: authorizes
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 授权副作用
      en: authorizes side effect
      ja: 副作用を認可
    definitions:
      zh: 一个 CommitApproval 允许其明确绑定的 SideEffect 在记录的资源、参数、期限与权限范围内继续；授权不表示副作用已经发生。
      en: A CommitApproval permits its explicitly bound SideEffect to proceed within the recorded resource, arguments, time, and authority scope; authorization does not state that the effect occurred.
      ja: CommitApproval は明示的に結び付く SideEffect を、記録された資源、引数、期限、権限範囲内で進めることを許可します。認可は副作用発生を示しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: authorized_by
      labels:
        zh: 反向：authorizes
        en: authorized by
        ja: 逆方向：authorizes
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: CommitApproval-authorizes-SideEffect-example-positive-001
        kind: positive
        labels:
          zh: 限定退款授权
          en: Scoped refund authorization
          ja: 限定返金認可
        scenario_id: null
        descriptions:
          zh: apr_82 授权订单 913 的一次 100 元退款副作用，参数摘要与 call_82 一致且尚在有效期。
          en: apr_82 authorizes one 100-unit refund side effect for order 913, with arguments matching call_82 and within expiry.
          ja: apr_82 は注文 913 の一回 100 返金副作用を認可し、引数は call_82 と一致し期限内です。
        field_values: {}
        related_node_ids:
          - CommitApproval
          - SideEffect
        related_relation_ids:
          - CommitApproval-authorizes-SideEffect
        expected_result:
          zh: 只有该范围内的退款可执行；更大金额或其他订单需要新批准。
          en: Only that scoped refund may execute; a larger amount or another order needs new approval.
          ja: その範囲の返金だけ実行でき、増額や別注文には新承認が必要です。
        why_valid_or_invalid:
          zh: 批准与目标副作用在身份、范围和参数上完全匹配。
          en: Approval and target side effect match in identity, scope, and arguments.
          ja: 承認と対象副作用が ID、範囲、引数で完全一致します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-commit-approval-012
      - id: CommitApproval-authorizes-SideEffect-example-boundary-001
        kind: boundary
        labels:
          zh: 范围不匹配边界
          en: Scope-mismatch boundary
          ja: 範囲不一致の境界
        scenario_id: null
        descriptions:
          zh: apr_82 只允许订单 913 退款 100，但执行请求改为订单 914 退款 300；批准不能授权该副作用。
          en: apr_82 permits only a 100-unit refund for order 913, but execution changes to 300 for order 914; the approval cannot authorize that side effect.
          ja: apr_82 は注文 913 の 100 返金だけを許可しますが、実行要求は注文 914 の 300 へ変わり、この副作用を認可できません。
        field_values: {}
        related_node_ids:
          - CommitApproval
          - SideEffect
        related_relation_ids:
          - CommitApproval-authorizes-SideEffect
        expected_result:
          zh: 闸门拒绝复用 apr_82 并创建新的 CommitRequest。
          en: The gate rejects reuse of apr_82 and creates a new CommitRequest.
          ja: gate は apr_82 の再利用を拒否し、新しい CommitRequest を作成します。
        why_valid_or_invalid:
          zh: 授权是调用与范围绑定的治理事实，不能按概念共现或相似工具名泛化。
          en: Authorization is a call- and scope-bound governance fact, not generalized by co-occurrence or similar tool name.
          ja: 認可は call・範囲に結び付く governance 事実で、共起や類似 tool 名から一般化できません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-commit-approval-012
    source_claims:
      - claim-commit-approval-012
    distinct_fact_rationale:
      zh: 批准的 AllowDecision 分类不能单独推出它授权哪个具体副作用。
      en: CommitApproval's AllowDecision classification alone cannot determine which concrete side effect it authorizes.
      ja: CommitApproval の AllowDecision 分類だけでは、どの具体副作用を認可するか決まりません。
    layout_role: cross-link
    review_status: accepted
    target: concept:SideEffect
  - id: CommitApproval-is_a-GateOutcome
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是一种门控结果
      en: is a GateOutcome
      ja: GateOutcome の一種である
    definitions:
      zh: 每个 CommitApproval 都是 GateOutcome，并以 result=allow、一个具体 CommitRequest、调用标识、批准主体、参数摘要、允许范围和有效期作为种差。
      en: Every CommitApproval is a GateOutcome, distinguished by result=allow and binding one concrete CommitRequest, call ID, approving authority, argument digest, allowed scope, and validity limit.
      ja: すべての CommitApproval は GateOutcome であり、result=allow と具体的 CommitRequest・call ID・承認主体・引数 digest・許可範囲・有効期限への束縛を種差とします。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 分类继承不使用实例关系基数。
      en: Taxonomic inheritance does not use instance-relation cardinality.
      ja: 分類継承にはインスタンス関係の基数を用いません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 反向：有下位类型
        en: has subtype
        ja: 逆方向：下位型を持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: CommitApproval-is_a-GateOutcome-example-positive-001
        kind: positive
        labels:
          zh: 调用级允许结果
          en: Call-scoped allow outcome
          ja: call 単位 allow 結果
        scenario_id: null
        descriptions:
