  - id: CommitApproval-approves-CommitRequest
    predicate: approves
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 批准具体提交请求
      en: approves commit request
      ja: 具体的な確定要求を承認
    definitions:
      zh: 一个 CommitApproval 批准一个参数、目标和调用身份均已冻结的 CommitRequest；只有决定所引用的 call_id 与参数摘要完全匹配时该关系成立，不能把工具级长期许可自动套到不同请求。
      en: A CommitApproval approves one CommitRequest whose arguments, target, and call identity are frozen. The fact holds only when the decision references the same call ID and argument digest; a tool-wide standing permission cannot be silently attached to a different request.
      ja: CommitApproval は引数・対象・call ID が固定された一件の CommitRequest を承認します。決定が同じ call ID と引数 digest を参照する場合だけ成立し、tool-wide 継続許可を別要求へ暗黙適用できません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 类级关系不替代运行实例对决定与请求的一对一完整性约束。
      en: The class-level fact does not replace instance-level one-to-one integrity between a decision and request.
      ja: class-level 事実は decision と request の instance-level 一対一整合性を置換しません。
    inverse_reading:
      predicate: approved_by
      labels:
        zh: 由提交批准决定批准
        en: approved by commit approval
        ja: 確定承認により承認済み
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
