schema: moonweave.ai/ontology-node/v1
id: SideEffect
kind: concept
status: accepted
labels:
  en: side effect
  zh: 副作用
  ja: 副作用
semantics:
  short_definition:
    zh: 由智能体动作引起、改变外部可观察状态的事件。
    en: An event in which an agent action changes externally observable state.
    ja: エージェント動作により外部から観測可能な状態が変化するイベント。
  definition:
    zh: 副作用是一种独立事件，其种差是工具调用、命令或网络操作使智能体内部推理之外的状态发生可观察变化，例如写文件、提交代码、发送消息、退款或修改远端资源；它不是变更请求、执行许可、返回文本或效果回执。
    en: SideEffect is an independent event distinguished by a tool call, command, or network operation producing an observable state change outside the agent's internal reasoning, such as writing a file, committing code, sending a message, issuing a refund, or changing a remote resource; it is not the request, permission, returned text, or receipt.
    ja: SideEffect は独立イベントであり、ツール呼出し、コマンド、ネットワーク操作がエージェント内部推論の外で、ファイル書込み、コード確定、送信、返金、遠隔資源変更などの可観測状態変化を生じる点で区別されます。要求、許可、返却テキスト、受領証ではありません。
  why_needed:
    zh: 将真实状态变化单独建模，系统才能判断审批保护的是哪一种风险、哪些结果需要对账或补偿，并避免把工具输出或请求意图误报为已经发生的外部效果。
    en: Modeling the actual state change separately identifies what risk approval protects, which outcomes need reconciliation or compensation, and prevents tool output or request intent from being mistaken for an effect that occurred.
    ja: 実際の状態変化を分離して表すことで、承認対象リスク、照合・補償対象を特定し、ツール出力や要求意図を発生済み外部効果と誤認しません。
  includes:
    - zh: 文件系统、仓库、数据库、外部 API、消息通道、支付系统或远端资源中由一次智能体操作实际造成的可观察创建、更新、删除或发送事件。
      en: Observable creation, update, deletion, or sending events actually caused by an agent operation in a filesystem, repository, database, external API, messaging channel, payment system, or remote resource.
      ja: ファイルシステム、repository、database、外部 API、message channel、決済、遠隔資源でエージェント操作が実際に生じさせた作成、更新、削除、送信イベント。
  excludes:
    - zh: 只读查询、候选 CommitRequest、CommitApproval 或 CommitDenial、没有落地的模型计划、以及描述结果的 EffectReceipt。
      en: Read-only queries, candidate CommitRequest records, CommitApproval or CommitDenial, unrealized model plans, and EffectReceipt records describing results.
      ja: 読取専用照会、候補 CommitRequest、CommitApproval/CommitDenial、未実現モデル計画、結果を記述する EffectReceipt。
  semantic_kind: event
  aliases: []
structure:
  identity_keys:
    - side_effect_id
  fields:
    - id: side_effect_id
      labels:
        zh: 副作用事件标识
        en: side-effect event ID
        ja: side-effect event ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次已经实现且可外部观察的状态变化事件；重试造成的新变化必须有新标识。
        en: Stably identifies one realized, externally observable state-change event; a retry causing another change receives another ID.
        ja: 実現済みで externally observable な state-change event を安定識別し、retry が別 change を生じた場合は別 ID を持ちます。
      allowed_values: []
      pattern: null
      example_value: side-effect:refund-re_77
      source_claims:
        - claim-side-effect-002
    - id: operation_ref
      labels:
        zh: 致因操作引用
        en: causal operation reference
        ja: 原因 operation 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用直接造成该变化的确切工具调用、命令或网络操作发生，不引用可复用工具定义或审批记录。
        en: References the exact tool-call, command, or network-operation occurrence that directly caused the change, not a reusable tool definition or approval.
        ja: change を直接生じさせた exact tool-call、command、network-operation occurrence を参照し reusable tool definition や approval は参照しません。
      allowed_values: []
      pattern: null
      example_value: tool-call:refund_order#order-913
      source_claims:
        - claim-side-effect-003
    - id: effect_kind
      labels:
        zh: 外部变化种类
        en: external change kind
        ja: external change kind
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按外部系统最终可观察的变化把事件分类为创建、更新、删除、发送或事务；分类不依据工具名称猜测。
        en: Classifies the event by its finally observable external change as create, update, delete, send, or transaction; it is never guessed from the tool name.
        ja: 最終的に observable な external change により create、update、delete、send、transaction に分類し tool name から推測しません。
      allowed_values:
        - id: SideEffectKindCreate
          value: create
          labels:
            zh: 创建资源
            en: create
            ja: create
          definitions:
            zh: 创建资源；该分类描述已实现的外部变化，而非工具结果文本。
            en: The operation creates a previously absent external resource with a stable resulting reference.
            ja: 操作が以前存在しなかった external resource を作成し stable resulting reference を持ちます。
          status: accepted
          source_claims:
            - claim-side-effect-004
        - id: SideEffectKindUpdate
          value: update
          labels:
            zh: 更新资源
            en: update
            ja: update
          definitions:
            zh: 更新资源；该分类描述已实现的外部变化，而非工具结果文本。
            en: The operation changes observable state on an existing external resource without replacing its identity.
            ja: 操作が既存 external resource の identity を保ったまま observable state を変更します。
          status: accepted
          source_claims:
            - claim-side-effect-004
        - id: SideEffectKindDelete
          value: delete
          labels:
            zh: 删除资源
            en: delete
            ja: delete
          definitions:
            zh: 删除资源；该分类描述已实现的外部变化，而非工具结果文本。
            en: The operation makes an existing external resource unavailable or invalid under the external system's semantics.
            ja: 操作が既存 external resource を外部 system の semantics に従って unavailable または invalid にします。
          status: accepted
          source_claims:
            - claim-side-effect-004
        - id: SideEffectKindSend
          value: send
          labels:
            zh: 发送或发布
            en: send
            ja: send
          definitions:
            zh: 发送或发布；该分类描述已实现的外部变化，而非工具结果文本。
            en: The operation delivers or publishes information to an external recipient or channel.
            ja: 操作が information を external recipient または channel へ送信・公開します。
          status: accepted
          source_claims:
            - claim-side-effect-004
        - id: SideEffectKindTransaction
          value: transaction
          labels:
            zh: 外部事务
            en: transaction
            ja: transaction
          definitions:
            zh: 外部事务；该分类描述已实现的外部变化，而非工具结果文本。
            en: One externally committed operation causes a jointly auditable set of resource creations or updates, such as creating a refund and changing a balance.
            ja: 一つの externally committed operation が refund 作成と balance 変更のような jointly auditable resource changes を生じます。
          status: accepted
          source_claims:
            - claim-side-effect-004
      pattern: null
      example_value: transaction
      source_claims:
        - claim-side-effect-005
    - id: affected_resource_refs
      labels:
        zh: 受影响资源引用
        en: affected resource references
        ja: affected resource 参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出变化完成后可在外部系统解析的全部受影响资源；复合事务不得只记录其中一个资源。
        en: Lists every affected resource resolvable in the external system after the change; a compound transaction cannot omit one of its changed resources.
        ja: change 後に external system で解決できる全 affected resources を列挙し compound transaction の一部を省略しません。
      allowed_values: []
      pattern: null
      example_value:
        - payment-refund:re_77
        - order:913#refundable-balance
      source_claims:
        - claim-side-effect-006
    - id: observed_change
      labels:
        zh: 已观测状态变化
        en: observed state change
        ja: observed state change
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存证明外部状态确已改变的最小结构化事实，例如新资源标识、字段前后值或数值增量；只含 success=true 的返回文本不足。
        en: Preserves minimal structured facts proving external state changed, such as a new resource ID, before/after field value, or numeric delta. Returned text containing only success=true is insufficient.
        ja: new resource ID、before/after value、numeric delta など external state change を証明する最小 structured facts を保持し success=true だけの result text は不十分です。
      allowed_values: []
      pattern: null
      example_value:
        refund_created: re_77
        refundable_balance_delta: -100
        currency: USD
      source_claims:
        - claim-side-effect-007
    - id: occurred_at
      labels:
        zh: 副作用发生时间
        en: side-effect occurrence time
        ja: side-effect occurrence time
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录外部系统确认变化生效的有效时间，不使用请求发送时间或模型生成时间替代。
        en: Records the valid time when the external system confirmed the change took effect, not request-send or model-generation time.
        ja: external system が change effective を確認した valid time を記録し request-send time や model-generation time で代用しません。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:15:32Z
      source_claims:
        - claim-side-effect-008
  constraints:
    - id: side-effect-requires-observable-resource-change
      severity: error
      expression_language: plain
      expression: affected_resource_refs IS NON-EMPTY AND observed_change contains at least one created identifier, before/after value, or non-zero delta attributable to operation_ref
      explanations:
        zh: 只有当至少一个外部资源存在可归因于该操作的实际变化证据时，记录才能分类为 SideEffect。
        en: A record is a SideEffect only when at least one external resource has actual change evidence attributable to the operation.
        ja: 少なくとも一つの external resource に operation attributable な actual change evidence がある場合のみ SideEffect とします。
      source_claims:
        - claim-side-effect-009
  required_relation_constraints: []
examples:
  - id: SideEffect-example-positive-001
    kind: positive
    labels:
      zh: 外部退款事件
      en: External refund event
      ja: 外部返金イベント
    scenario_id: null
    descriptions:
      zh: refund_order 成功使支付提供方创建 refund re_77 并把订单 913 的可退余额减少 100；这是外部可观察状态变化。
      en: refund_order causes the payment provider to create refund re_77 and reduce order 913's refundable balance by 100; this is an externally observable state change.
      ja: refund_order により決済 provider が refund re_77 を作成し、注文 913 の返金可能残高を 100 減らしました。これは外部から観測可能な状態変化です。
    field_values:
      side_effect_id: side-effect:refund-re_77
      operation_ref: tool-call:refund_order#order-913
      effect_kind: transaction
      affected_resource_refs:
        - payment-refund:re_77
        - order:913#refundable-balance
      observed_change:
        refund_created: re_77
        refundable_balance_delta: -100
        currency: USD
      occurred_at: 2026-07-16T10:15:32Z
    related_node_ids:
      - SideEffect
      - EffectReceipt
    related_relation_ids:
      - EffectReceipt-evidences-SideEffect
    expected_result:
      zh: 系统记录一项 SideEffect，并让回执与补偿逻辑引用该事件。
      en: The system records one SideEffect that receipts and compensation logic may reference.
      ja: システムは一件の SideEffect を記録し、受領証と補償ロジックが参照できます。
    why_valid_or_invalid:
      zh: 提供方资源和余额实际改变，满足外部可观察变化的事件条件，而不只是工具返回字符串。
      en: The provider resource and balance actually changed, satisfying the external-observable-change event condition rather than merely returning text.
      ja: provider 資源と残高が実際に変化し、単なる返却文字列ではなく外部可観測変更イベントです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-side-effect-010
  - id: SideEffect-example-boundary-001
    kind: boundary
    labels:
      zh: 候选命令边界
      en: Proposed-command boundary
      ja: 提案コマンドの境界
    scenario_id: null
    descriptions:
      zh: 模型提出 rm temp.log，但命令仍在 CommitGate 等待批准，文件尚未删除；计划文本不是 SideEffect。
      en: The model proposes rm temp.log, but the command is waiting at CommitGate and the file still exists; the plan text is not a SideEffect.
      ja: モデルは rm temp.log を提案しましたが、コマンドは CommitGate で承認待ちでファイルは存在します。計画テキストは SideEffect ではありません。
    field_values: {}
    related_node_ids:
      - SideEffect
      - CommitRequest
      - CommitGate
    related_relation_ids: []
    expected_result:
      zh: 系统只记录 CommitRequest；只有命令执行并改变文件系统后才产生 SideEffect。
      en: The system records only CommitRequest; SideEffect arises only after execution changes the filesystem.
      ja: システムは CommitRequest だけを記録し、実行がファイルシステムを変更した後に SideEffect が生じます。
    why_valid_or_invalid:
      zh: 意图、批准和实际变化处于不同时间阶段；未发生的变化不能作为事件实例。
      en: Intent, approval, and actual change occupy different temporal phases; an unrealized change cannot instantiate the event.
      ja: 意図、承認、実変化は異なる時間段階にあり、未発生の変化はイベント事例になりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-side-effect-011
  - id: SideEffect-example-instance-001
    kind: instance
    labels:
      zh: 文件变更事件记录
      en: File-mutation event record
      ja: ファイル変更イベント記録
    scenario_id: null
    descriptions:
      zh: effect se_204 记录 operation=file_write、resource=/repo/schema.json、before_digest=sha256:11、after_digest=sha256:22、occurred_at=2026-07-14T12:04:03Z。
      en: Effect se_204 records operation=file_write, resource=/repo/schema.json, before_digest=sha256:11, after_digest=sha256:22, and occurred_at=2026-07-14T12:04:03Z.
      ja: effect se_204 は operation=file_write、resource=/repo/schema.json、before_digest=sha256:11、after_digest=sha256:22、occurred_at=2026-07-14T12:04:03Z を記録します。
    field_values: {}
    related_node_ids:
      - SideEffect
    related_relation_ids: []
    expected_result:
      zh: 审计可通过前后摘要验证资源确实改变，并把 se_204 关联到执行调用与回执。
      en: Audit can verify the resource changed from the before and after digests and link se_204 to its invocation and receipt.
      ja: 監査は前後要約から資源変更を検証し、se_204 を実行呼出しと受領証へ結び付けられます。
    why_valid_or_invalid:
      zh: 事件记录具有受影响资源、变化前后证据和发生时间，足以区别于请求或描述性日志。
      en: The event has affected resource, before-and-after evidence, and occurrence time, distinguishing it from a request or descriptive log.
      ja: 影響資源、変更前後の証拠、発生時刻を持ち、要求や記述ログと区別できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-side-effect-012
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: SideEffect-realizes-CommitRequest
    predicate: realizes
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 实现提交请求
      en: realizes commit request
      ja: 確定要求を実現
    definitions:
      zh: 一个 SideEffect realizes 一个 CommitRequest，当且仅当该已发生外部状态变化由该请求的同一调用、目标、冻结参数与幂等键实际执行产生；批准只表示允许，验证失败或未开始执行的请求不具有该关系。
      en: A SideEffect realizes a CommitRequest only when the occurred external state change was produced by executing that request's same call, target, frozen arguments, and idempotency key. Approval merely permits execution; a validation failure or request whose execution never began has no such fact.
      ja: SideEffect が CommitRequest を realizes するのは、発生した外部状態変更が同じ call・対象・固定引数・冪等キーの実行で生じた場合だけです。承認は許可にすぎず、検証失敗や未実行要求には成立しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 幂等性与失败模型可能使请求没有效果或多条证据记录，实例约束由请求键和回执校验。
      en: Idempotency and failure models may leave a request without an effect or with multiple evidence records; instance integrity is checked through request keys and receipts.
      ja: 冪等性と失敗 model により要求に効果がない場合や複数証拠があり、instance 整合性は要求キーと受領証で検証します。
    inverse_reading:
      predicate: realized_by_side_effect
      labels:
        zh: 由副作用实现
        en: realized by side effect
        ja: 副作用により実現
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: SideEffect-realizes-CommitRequest-example-positive-001
        kind: positive
        labels:
          zh: 退款请求实际实现
          en: Refund request realized
          ja: 返金要求の実現
        scenario_id: null
        descriptions:
          zh: cr_82 以 idempotency_key=refund:913:1 请求退款；提供方创建 refund re_77，余额变化事件 se_77 记录相同请求键与参数摘要。
          en: cr_82 requests a refund with idempotency_key=refund:913:1; the provider creates refund re_77 and balance-change event se_77 records the same request key and argument digest.
          ja: cr_82 は idempotency_key=refund:913:1 で返金を要求し、provider が refund re_77 を作成、残高変更 event se_77 が同じ要求キーと引数 digest を記録します。
        field_values: {}
        related_node_ids:
          - SideEffect
          - CommitRequest
          - EffectReceipt
        related_relation_ids:
          - SideEffect-realizes-CommitRequest
          - EffectReceipt-evidences-SideEffect
        expected_result:
          zh: 查询从 cr_82 唯一追踪到 se_77 及其回执。
          en: The query traces uniquely from cr_82 to se_77 and its receipt.
          ja: 照会は cr_82 から se_77 と受領証へ一意に追跡します。
        why_valid_or_invalid:
          zh: 请求键、目标、参数与外部结果一致。
          en: Request key, target, arguments, and external result agree.
          ja: 要求キー・対象・引数・外部結果が一致します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-side-effect-013
      - id: SideEffect-realizes-CommitRequest-example-boundary-001
        kind: boundary
        labels:
          zh: 验证失败无效果边界
          en: Validation-failure boundary
          ja: 検証失敗境界
        scenario_id: null
        descriptions:
          zh: cr_90 因参数校验失败而未进入端点执行；虽然请求存在，也没有 SideEffect realizes cr_90。
          en: cr_90 fails argument validation before endpoint execution begins; although the request exists, no SideEffect realizes cr_90.
          ja: cr_90 は endpoint 実行前の引数検証に失敗し、要求は存在しても realizes する SideEffect はありません。
        field_values: {}
        related_node_ids:
          - SideEffect
          - CommitRequest
        related_relation_ids:
          - SideEffect-realizes-CommitRequest
        expected_result:
          zh: 记录失败但不补造外部状态变化。
          en: Record the failure without inventing an external state change.
          ja: 失敗を記録し外部状態変更を捏造しません。
        why_valid_or_invalid:
          zh: 执行未开始，关系的发生条件不成立。
          en: Execution never began, so the occurrence condition is false.
          ja: 実行未開始のため成立条件を満たしません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-side-effect-014
    source_claims:
      - claim-side-effect-015
    distinct_fact_rationale:
      zh: 批准、工具返回文本和实际外部状态变化是不同事实，必须用请求键与执行证据显式绑定。
      en: Approval, tool-result text, and an actual external state change are different facts and require explicit binding through request key and execution evidence.
      ja: 承認・tool result text・実際の外部状態変更は別事実で、要求キーと実行証拠による明示結合が必要です。
    layout_role: cross-link
    review_status: accepted
    target: concept:CommitRequest
  - id: side_effect_produced_by_network_call
    predicate: side_effect_produced_by_network_call
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 由网络调用产生
      en: produced by network call
      ja: network call により発生
    definitions:
      zh: 一个 SideEffect 在其外部状态变化由特定 NetworkCall 的成功处理造成时指向该调用；普通读取、被拒请求或仅接收响应不自动建立此因果边。
      en: A SideEffect points to a specific NetworkCall when successful handling of that call caused the external state change; ordinary reads, denied requests, or merely receiving a response do not establish the causal edge.
