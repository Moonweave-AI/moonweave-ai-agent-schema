source_claims:
  - id: claim-side-effect-001
    source: eng-security-mcp-nsa-2026
    supports: NSA treats MCP-enabled tool execution as capable of consequential system and data changes and recommends validation, isolation, and logging. Moonweave models the realized external change, separate from request and result records, as SideEffect.
    locator: MCP Security Design Considerations > Security controls for tool execution, validation, logging, and isolation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-side-effect-002
    source: eng-proto-mcp-2025-spec
    supports: MCP exposes individual tools/call requests and separate results. Moonweave gives each externally realized mutation occurrence a stable identity.
    locator: MCP 2025-06-18 > Tools > Calling Tools
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-side-effect-003
    source: eng-proto-mcp-2025-spec
    supports: The MCP protocol represents a concrete tools/call request independently from tool metadata and its result. Moonweave links an external effect to that concrete operation occurrence.
    locator: MCP 2025-06-18 > Tools > tools/call request
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-side-effect-004
    source: eng-proto-mcp-2025-spec
    supports: The MCP Tools specification separates a tools/call invocation from its structured or unstructured Tool Result. Moonweave infers an external mutation classification from the realized system change, never from result text alone.
    locator: MCP 2025-06-18 > Server features > Tools > Calling Tools and Tool Result
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-side-effect-005
    source: eng-proto-mcp-2025-spec
    supports: MCP tools can perform actions while Tool Results report content. Moonweave classifies the realized action by external resource change, which is a domain design inference.
    locator: MCP 2025-06-18 > Server features > Tools and Tool Result
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-side-effect-006
    source: eng-proto-mcp-2025-spec
    supports: A Tool Result may contain structured resource identifiers, but the effect is the external change itself. Moonweave records the external resources independently from returned content.
    locator: MCP 2025-06-18 > Tool Result structuredContent
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-side-effect-007
    source: eng-proto-mcp-2025-spec
    supports: MCP Tool Results can be structured or unstructured and may report errors. Moonweave requires external change evidence instead of equating a successful result string with a SideEffect.
    locator: MCP 2025-06-18 > Tool Result and isError
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-side-effect-008
    source: eng-proto-mcp-2025-spec
    supports: MCP separates request and result messages. Moonweave timestamps the realized external effect independently from request transmission.
    locator: MCP 2025-06-18 > Tools message flow
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-side-effect-009
    source: eng-proto-mcp-2025-spec
    supports: MCP distinguishes invoking a tool from the Tool Result it returns. Moonweave requires proof of realized resource change before asserting SideEffect.
    locator: MCP 2025-06-18 > Calling Tools and Tool Result
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-side-effect-010
    source: eng-proto-mcp-2025-spec
    supports: The MCP Tools specification defines tool invocation and structured or unstructured results; Moonweave distinguishes an externally realized mutation from the result content and models it as SideEffect.
    locator: MCP 2025-06-18 specification > Server features > Tools > Tool and Tool Result
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-side-effect-011
    source: eng-fw-openai-hitl
    supports: OpenAI's approval flow pauses a sensitive tool call before execution, grounding the distinction between a pending request and an effect that has occurred.
    locator: Human-in-the-loop > How the approval flow works, steps 1–5
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-side-effect-012
    source: eng-security-mcp-nsa-2026
    supports: NSA guidance recommends validating tool actions, containing execution, and retaining security logs; the concrete before-and-after event record is Moonweave's auditable representation of an external tool effect.
    locator: MCP Security Design Considerations > Security controls for tool execution, validation, logging, and isolation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-side-effect-013
    source: eng-api-stripe-idempotency
    supports: Stripe saves the first executed mutation result for an idempotency key and replays it for matching retries. Moonweave uses the matching key and arguments to bind the realized effect to its request.
    locator: API Reference > Idempotent requests > saved result, parameter comparison, and execution boundary
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-side-effect-014
    source: eng-api-stripe-idempotency
    supports: Stripe does not save an idempotent result when parameter validation fails or an execution conflict prevents the endpoint from beginning; Moonweave therefore records no realized effect in this boundary case.
    locator: API Reference > Idempotent requests > results saved only after endpoint execution begins
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-side-effect-015
    source: eng-api-stripe-idempotency
    supports: Stripe binds an idempotency key to the first executed mutation result, compares retry parameters, and saves no result before endpoint execution begins; Moonweave makes the request-to-realized-effect fact explicit.
    locator: API Reference > Idempotent requests > saved result, parameter comparison, and execution boundary
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-side-effect-016
    source: eng-security-mcp-nsa-2026
    supports: NSA treats network-connected MCP tool actions as consequential and recommends validating and monitoring them. Moonweave records a network call as the cause of a realized SideEffect only when external state changes.
    locator: MCP Security Design Considerations > Recommendations for validation, least privilege, isolation, logging, and recovery
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-side-effect-017
    source: eng-std-posix-shell-2024
    supports: POSIX.1-2024 defines shell command execution, redirection, environment effects, and exit status. Attribution of a separately observed SideEffect to one InvocationAttempt by identity, time, and before/after evidence is Moonweave's provenance contract.
    locator: POSIX.1-2024 Shell Command Language > command execution environment, redirection, and exit status
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-side-effect-018
    source: eng-proto-mcp-tools-2025-06-18
    supports: The MCP Tools specification distinguishes a tools/call request from its Tool Result and error path. Moonweave adds attempt identity and effect-receipt evidence so an external SideEffect is attributed to a concrete execution attempt.
    locator: MCP 2025-06-18 > Server Features > Tools > Calling Tools, Tool Result, and Error Handling
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-side-effect-019
    source: eng-security-mcp-nsa-2026
    supports: NSA MCP security guidance calls for constrained and auditable consequential tool actions. Moonweave applies that guidance by retaining attempt-level cause and receipt evidence for each realized side effect.
    locator: MCP Security Design Considerations > least privilege, isolation, logging, and consequential tool actions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
