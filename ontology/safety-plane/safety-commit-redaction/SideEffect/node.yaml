schema: moonweave.ai/ontology-node/v1
id: SideEffect
kind: concept
labels:
  zh: 副作用
  en: side effect
  ja: 副作用
semantics:
  short_definition:
    zh: 智能体动作已造成、在外部系统可观察到的不可逆状态变更事件。
    en: An irreversible, externally observable state-change event already caused by an agent action.
    ja: エージェント動作が既に引き起こした、外部 system で観測可能な不可逆状態変更イベント。
  definition:
    zh: SideEffect 是独立事件，种差是文件写入、API 调用、邮件发送、支付退款或 remote push 等操作使智能体推理之外的状态发生可观察变化。它不是 CommitRequest、CommitApproval/CommitDenial、ToolResult 文本或 EffectReceipt；MCP tools/call 返回 success 也不证明 SideEffect 已发生，必须有 affected_resource_refs 与 observed_change 证据。
    en: "SideEffect is an independent event distinguished by file writes, API calls, email sends, payment refunds, or remote pushes producing observable state change outside agent reasoning. It is not CommitRequest, CommitApproval/CommitDenial, ToolResult text, or EffectReceipt; MCP tools/call success does not prove SideEffect occurred without affected_resource_refs and observed_change evidence."
    ja: SideEffect は独立 event で、file write/API call/email send/payment refund/remote push 等が agent reasoning 外で observable state change を生じる点が種差。CommitRequest/CommitApproval/CommitDenial/ToolResult text/EffectReceipt ではなく MCP tools/call success だけでは affected_resource_refs/observed_change なしに SideEffect を証明できません。
  why_needed:
    zh: 单独建模真实状态变化，系统才能判断审批保护的是哪种风险、哪些结果需要对账或补偿，并避免把“模型说已完成”或 ToolResult 误报为已发生的文件删除、退款或密钥 push。
    en: Modeling actual state change separately identifies what risk approval protects, which outcomes need reconciliation or compensation, and prevents "model said done" or ToolResult from being mistaken for file deletion, refund, or secret push that occurred.
    ja: 実状態変更を分離モデル化すると承認が保護する risk、照合/補償対象を特定でき、「モデル完了発言」や ToolResult を file delete/refund/secret push 済みと誤認しません。
  includes:
    - zh: 文件系统、仓库、数据库、外部 API、消息通道、支付系统中由一次智能体操作实际造成的创建、更新、删除或发送事件。
      en: Create, update, delete, or send events actually caused by one agent operation in filesystem, repository, database, external API, messaging channel, or payment system.
      ja: filesystem/repository/database/external API/messaging/payment system で agent operation が実際に生じさせた create/update/delete/send event。
  excludes:
    - zh: 只读查询、候选 CommitRequest、CommitApproval/CommitDenial、未落地模型计划、EffectReceipt 描述记录。
      en: Read-only queries, candidate CommitRequest, CommitApproval/CommitDenial, unrealized model plans, EffectReceipt descriptive records.
      ja: read-only query、candidate CommitRequest、CommitApproval/CommitDenial、未実現 model plan、EffectReceipt 記述 record。
  semantic_kind: event
  aliases: []
engineering:
  explanation:
    zh: 映射：file_write 改变 digest → SideEffect effect_kind=update；POST /refunds 创建 re_77 → SideEffect effect_kind=transaction；send_email SMTP accept → SideEffect effect_kind=send；git push 到达 remote → SideEffect on repository ref。集成必须保留 operation_ref、observed_change 与 occurred_at，并与 EffectReceipt 交叉引用。
    en: "Mapping: file_write changing digest → SideEffect effect_kind=update; POST /refunds creating re_77 → SideEffect effect_kind=transaction; send_email SMTP accept → SideEffect effect_kind=send; git push reaching remote → SideEffect on repository ref. Integrations must retain operation_ref, observed_change, and occurred_at cross-referenced with EffectReceipt."
    ja: mapping：file_write digest 変更 → SideEffect effect_kind=update；POST /refunds re_77 作成 → transaction；send_email SMTP accept → send；git push remote 到達 → repository ref SideEffect。operation_ref/observed_change/occurred_at を EffectReceipt と cross-reference 保持必須。
  typical_input:
    - description: Approved tool call executes external mutation.
      format: |
        side_effect_id: se_77
        operation_ref: tool-call:refund_order#order-913
        effect_kind: transaction
      source_claims:
        - claim-side-effect-design
    - description: Blocked commit produces no SideEffect.
      format: |
        commit_denial_id: cd-secrets-1
        side_effect_count: 0
      source_claims:
        - claim-side-effect-git-secrets
  typical_output:
    - description: SideEffect with observable change evidence.
      format: |
        affected_resource_refs: [payment-refund:re_77, order:913#refundable-balance]
        observed_change: {refundable_balance_delta: -100}
        occurred_at: 2026-07-16T10:15:32Z
      source_claims:
        - claim-side-effect-design
  reference_implementations:
    - name: MCP Specification — Tools
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/server/tools/
      description: tools/call requests separate from Tool Result and external mutations.
    - name: git-secrets (AWS Labs)
      url: https://github.com/awslabs/git-secrets
      description: Deny path produces no remote push SideEffect.
    - name: Stripe Idempotent Requests
      url: https://docs.stripe.com/api/idempotent_requests
      description: External mutation evidence for payment SideEffects.
structure:
  identity_keys:
    - side_effect_id
  fields:
    - id: side_effect_id
      labels:
        zh: 副作用事件标识
        en: side-effect event ID
        ja: side-effect event ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次已经实现且可外部观察的状态变化事件。
        en: Stably identifies one realized, externally observable state-change event.
        ja: 実現済み externally observable state-change event を安定識別。
      allowed_values: []
      pattern: null
      example_value: se_77
      source_claims:
        - claim-side-effect-design
    - id: operation_ref
      labels:
        zh: 致因操作引用
        en: causal operation reference
        ja: 原因 operation 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用直接造成该变化的确切工具调用、命令或网络操作发生。
        en: References the exact tool-call, command, or network-operation occurrence that directly caused the change.
        ja: change を直接生じさせた exact tool-call/command/network-operation occurrence を参照。
      allowed_values: []
      pattern: null
      example_value: tool-call:refund_order#order-913
      source_claims:
        - claim-side-effect-design
    - id: effect_kind
      labels:
        zh: 外部变化种类
        en: external change kind
        ja: external change kind
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按外部系统最终可观察变化分类为 create、update、delete、send 或 transaction。
        en: Classifies by finally observable external change as create, update, delete, send, or transaction.
        ja: 最終 observable external change により create/update/delete/send/transaction に分類。
      allowed_values:
        - create
        - update
        - delete
        - send
        - transaction
      pattern: null
      example_value: transaction
      source_claims:
        - claim-side-effect-design
    - id: observed_change
      labels:
        zh: 已观测状态变化
        en: observed state change
        ja: observed state change
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 证明外部状态确已改变的最小结构化事实；仅 success=true 返回文本不足。
        en: Minimal structured facts proving external state changed; returned text with only success=true is insufficient.
        ja: external state change を証明する最小 structured facts。success=true のみ text は不十分。
      allowed_values: []
      pattern: null
      example_value:
        refund_created: re_77
        refundable_balance_delta: -100
      source_claims:
        - claim-side-effect-design
    - id: occurred_at
      labels:
        zh: 副作用发生时间
        en: side-effect occurrence time
        ja: side-effect occurrence time
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 外部系统确认变化生效的有效时间，不用请求发送或模型生成时间替代。
        en: Valid time when the external system confirmed the change took effect, not request-send or model-generation time.
        ja: external system が change effective を確認した valid time。request-send/model-generation time で代用不可。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:15:32Z
      source_claims:
        - claim-side-effect-design
  constraints:
    - id: side-effect-requires-observable-change
      severity: error
      expression_language: plain
      expression: affected_resource_refs IS NON-EMPTY AND observed_change contains attributable change evidence; ToolResult success alone is invalid
      explanations:
        zh: 只有存在可归因的实际变化证据时才能分类为 SideEffect。
        en: SideEffect requires attributable actual change evidence, not ToolResult success alone.
        ja: SideEffect には ToolResult success だけでなく attributable actual change evidence が必要。
      source_claims:
        - claim-side-effect-design
  required_relation_constraints: []
examples:
  - id: SideEffect-refund-transaction
    labels:
      zh: 外部退款事件
      en: External refund event
      ja: 外部返金イベント
    descriptions:
      zh: refund_order 使支付提供方创建 refund re_77 并把订单 913 可退余额减少 100；外部可观察状态变化，不是 ToolResult 字符串。
      en: refund_order causes payment provider to create refund re_77 and reduce order 913 refundable balance by 100; externally observable change, not ToolResult string alone.
      ja: refund_order が refund re_77 作成し order 913 返金可能残高を 100 減少。ToolResult 文字列だけではない externally observable change。
    example_source:
      product: Stripe API
      url: https://docs.stripe.com/api/idempotent_requests
      version: idempotent refunds
    field_values:
      side_effect_id: se_77
      effect_kind: transaction
      observed_change:
        refund_created: re_77
        refundable_balance_delta: -100
    related_node_ids:
      - SideEffect
      - EffectReceipt
      - CommitRequest
    related_relation_ids:
      - SideEffect-realizes-CommitRequest
    source_claims:
      - claim-side-effect-design
  - id: SideEffect-file-write
    labels:
      zh: 文件写入副作用
      en: File write side effect
      ja: ファイル書込み副作用
    descriptions:
      zh: file_write 更新 /repo/schema.json，before_digest=sha256:11、after_digest=sha256:22；不可逆文件系统变更。
      en: file_write updates /repo/schema.json with before_digest=sha256:11 and after_digest=sha256:22; irreversible filesystem change.
      ja: file_write が /repo/schema.json を更新。before_digest sha256:11、after_digest sha256:22。不可逆 filesystem change。
    example_source:
      product: MCP tools
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/server/tools/
      version: tools/call mutations
    field_values:
      side_effect_id: se_204
      effect_kind: update
      occurred_at: 2026-07-14T12:04:03Z
    related_node_ids:
      - SideEffect
    related_relation_ids: []
    source_claims:
      - claim-side-effect-mcp
  - id: SideEffect-pending-commit-boundary
    labels:
      zh: 待批准命令非副作用
      en: Pending command is not side effect
      ja: 承認待ち command は副作用ではない
    descriptions:
      zh: 模型提出 rm temp.log 但命令仍在 CommitGate 等待批准，文件未删除；计划文本不是 SideEffect。
      en: Model proposes rm temp.log but command waits at CommitGate and file still exists; plan text is not SideEffect.
      ja: rm temp.log 提案だが CommitGate 承認待ちで file 存在。plan text は SideEffect ではない。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: pre-execution boundary
    field_values:
      accepted: false
    related_node_ids:
      - SideEffect
      - CommitRequest
      - CommitGate
    related_relation_ids: []
    source_claims:
      - claim-side-effect-design
  - id: SideEffect-secrets-deny-no-effect
    labels:
      zh: git-secrets 拒绝无远程副作用
      en: git-secrets deny has no remote side effect
      ja: git-secrets deny は remote 副作用なし
    descriptions:
      zh: git-secrets CommitDenial 阻止含 AWS key 的 push SideEffect；remote repository 状态不变，side_effect_count=0。
      en: git-secrets CommitDenial blocks push SideEffect containing AWS key; remote repository state unchanged, side_effect_count=0.
      ja: git-secrets CommitDenial が AWS key 含む push SideEffect block。remote repository 状態不変、side_effect_count=0。
    example_source:
      product: git-secrets
      url: https://github.com/awslabs/git-secrets
      version: commit hook deny
    field_values:
      side_effect_count: 0
    related_node_ids:
      - SideEffect
      - CommitDenial
    related_relation_ids: []
    source_claims:
      - claim-side-effect-git-secrets
parent_relation: null
relations:
  - id: SideEffect-realizes-CommitRequest
    predicate: realizes
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 实现提交请求
      en: realizes commit request
      ja: 確定要求を実現
    definitions:
      zh: SideEffect realizes CommitRequest 当且仅当外部状态变化由该请求同一 call、目标、冻结参数与幂等键执行产生；批准只表示允许。
      en: SideEffect realizes CommitRequest only when external state change was produced by executing that request's same call, target, frozen arguments, and idempotency key; approval merely permits.
      ja: SideEffect が CommitRequest を realizes するのは同一 call/対象/固定引数/冪等キー実行で external state change が生じた場合のみ。承認は許可にすぎない。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 幂等重试可能返回已有 SideEffect 证据而非第二个事件。
      en: Idempotent retries may return existing SideEffect evidence rather than a second event.
      ja: 冪等 retry は第二 event ではなく existing SideEffect evidence を返し得る。
    inverse_reading:
      predicate: realized_by_side_effect
      labels:
        zh: 由副作用实现
        en: realized by side effect
        ja: 副作用により実現
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-side-effect-design
    distinct_fact_rationale:
      zh: 批准、ToolResult 与实际外部变化是不同事实。
      en: Approval, ToolResult, and actual external change are different facts.
      ja: 承認/ToolResult/実 external change は別 fact。
    layout_role: cross-link
    target: concept:CommitRequest
  - id: side_effect_produced_by_network_call
    predicate: side_effect_produced_by_network_call
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 由网络调用产生
      en: produced by network call
      ja: network call により発生
    definitions:
      zh: SideEffect 在其外部状态变化由特定 NetworkCall 成功处理造成时指向该调用；只读 GET 不建立此边。
      en: SideEffect points to a NetworkCall when successful handling caused the external state change; read-only GET does not establish this edge.
      ja: SideEffect は NetworkCall 成功処理が external state change を生じた時その call を指す。read-only GET では辺を作らない。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 因果边仅在已发生 SideEffect 时记录。
      en: Causal edge is recorded only for a realized SideEffect.
      ja: causal edge は realized SideEffect のみ記録。
    inverse_reading:
      predicate: produces_side_effect
      labels:
        zh: 产生副作用
        en: produces side effect
        ja: 副作用を生成
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-side-effect-design
    distinct_fact_rationale:
      zh: NetworkCall 类型不说明是否改变状态。
      en: NetworkCall type does not state whether state changed.
      ja: NetworkCall 型は状態変更を示さない。
    layout_role: cross-link
    target: concept:NetworkCall
sources:
  - id: mcp-tools-2025-06-18
    title: MCP Specification — Tools
    url: https://spec.modelcontextprotocol.io/specification/2025-06-18/server/tools/
    source_type: official-spec
    relevance: Separates tools/call from Tool Result and external mutations.
  - id: git-secrets-awslabs
    title: git-secrets (AWS Labs)
    url: https://github.com/awslabs/git-secrets
    source_type: official-doc
    relevance: Deny path produces no push SideEffect.
  - id: stripe-idempotency
    title: Stripe Idempotent Requests
    url: https://docs.stripe.com/api/idempotent_requests
    source_type: official-doc
    relevance: External payment mutation evidence.
  - id: safety-commit-design
    title: Moonweave safety-commit-redaction module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: SideEffect as realized external change separate from request and receipt.
source_claims:
  - id: claim-side-effect-mcp
    source: mcp-tools-2025-06-18
    supports: MCP separates tool invocation from Tool Result; Moonweave requires observed external change for SideEffect.
    locator: tools/call and Tool Result
    evidence_kind: official
    confidence: high
  - id: claim-side-effect-git-secrets
    source: git-secrets-awslabs
    supports: git-secrets CommitDenial prevents remote push SideEffect when secrets are detected.
    locator: commit hooks
    evidence_kind: official
    confidence: high
  - id: claim-side-effect-design
    source: safety-commit-design
    supports: Moonweave models SideEffect as irreversible external state change with operation_ref and observed_change evidence.
    locator: SideEffect event boundary
    evidence_kind: design-inference
    confidence: high
