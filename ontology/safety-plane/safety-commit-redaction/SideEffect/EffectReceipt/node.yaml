schema: moonweave.ai/ontology-node/v1
id: EffectReceipt
kind: concept
status: accepted
labels:
  zh: 外部效果回执
  en: External effect receipt
  ja: 外部効果受領証
semantics:
  short_definition:
    zh: 把已处理的变更请求绑定到其可核验外部结果的效果回执。
    en: An effect receipt binding a processed mutation request to its verifiable external result.
    ja: 処理済み変更要求を検証可能な外部結果へ結び付ける効果受領証。
  definition:
    zh: 效果回执是一种独立信息记录，在副作用执行尝试之后，把请求或幂等键绑定到提供方响应、外部对象标识、状态、完成时间与效果摘要，使调用方能够判断该变更是否已经被处理；它是证据而非授权，也不等同于 SideEffect 事件本身。
    en: EffectReceipt is an independent information record created after a side-effect attempt that binds a request or idempotency key to the provider response, external object identifier, status, completion time, and effect digest so a caller can determine whether the mutation was processed; it is evidence, not authorization or the SideEffect event itself.
    ja: EffectReceipt は独立した情報記録であり、副作用試行後に request または冪等キーを provider response、外部 object ID、status、完了時刻、effect digest へ結び付け、変更が処理済みか判断できるようにします。認可でも SideEffect イベント自体でもありません。
  why_needed:
    zh: 网络中断或重试时，审批记录无法证明外部系统是否已经改变；效果回执为去重、对账、恢复与补偿提供可寻址证据，并防止因未知结果重复执行变更。
    en: After a network interruption or retry, approval cannot prove whether the external system changed. An effect receipt supplies addressable evidence for deduplication, reconciliation, recovery, and compensation, reducing duplicate mutations after an unknown result.
    ja: ネットワーク中断や再試行時、承認だけでは外部変更を証明できません。効果受領証は重複排除、照合、回復、補償の証拠となり、不明結果後の重複変更を防ぎます。
  includes:
    - zh: 由外部 API、工具执行器或事务协调器返回并持久化的结果记录，包含请求或幂等键、提供方响应或对象 ID、完成状态、时间与可核验效果摘要。
      en: Persisted result records returned by an external API, tool executor, or transaction coordinator with request or idempotency key, provider response or object ID, completion status, time, and verifiable effect digest.
      ja: 外部 API、ツール実行器、トランザクション調整器が返し永続化する、request/冪等キー、provider response/object ID、完了状態、時刻、検証可能な効果要約を持つ結果記録。
  excludes:
    - zh: 仅表示允许执行的 CommitApproval、待执行 CommitRequest、没有外部结果绑定的日志消息，以及实际发生的 SideEffect 事件。
      en: CommitApproval that only permits execution, a pending CommitRequest, a log line without external-result binding, and the actual SideEffect event.
      ja: 実行許可だけを示す CommitApproval、保留中 CommitRequest、外部結果への結合を欠くログ、実際の SideEffect イベント。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - receipt_id
  fields:
    - id: receipt_id
      labels:
        zh: 回执标识
        en: receipt ID
        ja: 受領証 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 外部效果回执的稳定唯一标识。
        en: Stable unique identifier of the external-effect receipt.
        ja: 外部効果受領証の安定一意識別子です。
      allowed_values: []
      pattern: null
      example_value: effect-receipt-7f3a
      source_claims:
        - claim-effect-receipt-002
    - id: idempotency_key
      labels:
        zh: 幂等键
        en: idempotency key
        ja: 冪等キー
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在授权作用域内防止重复提交同一外部效果的键。
        en: Key preventing duplicate commit of the same external effect within an authority scope.
        ja: 権限範囲内で同じ外部効果の重複確定を防ぐキーです。
      allowed_values: []
      pattern: null
      example_value: commit:invoice:8842
      source_claims:
        - claim-effect-receipt-003
    - id: effect_digest
      labels:
        zh: 效果摘要
        en: effect digest
        ja: 効果要約
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 已确认外部效果规范化表示的摘要。
        en: Digest of the normalized representation of the confirmed external effect.
        ja: 確認済み外部効果の正規化表現要約です。
      allowed_values: []
      pattern: null
      example_value: sha256:4e98...
      source_claims:
        - claim-effect-receipt-004
  constraints: []
  required_relation_constraints: []
