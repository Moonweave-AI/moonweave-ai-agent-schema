        en: Authorization and execution evidence answer different questions; absent external-result binding, this relation does not hold.
        ja: 認可と実行証拠は別問題で、外部結果結合がなければ関係は成立しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
