source_claims:
  - id: claim-effect-receipt-001
    source: eng-api-stripe-idempotency
    supports: Stripe documents that the first executed request's status code and body are saved under an idempotency key and replayed on matching retries. Moonweave infers EffectReceipt as the ontology record that binds such mutation evidence; Stripe does not define this class.
    locator: API Reference > Idempotent requests > saved result and same-key retries
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-effect-receipt-002
    source: eng-api-stripe-idempotency
    supports: Stripe saves and later returns a mutation result under an idempotency key. A stable receipt_id is Moonweave's design inference for addressing that recorded result.
    locator: API Reference > Idempotent requests > saved status code and response body
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-effect-receipt-003
    source: eng-api-stripe-idempotency
    supports: Stripe requires a unique idempotency key to recognize retries of the same mutation and return the saved result.
    locator: API Reference > Idempotent requests > saved result and same-key retries
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-effect-receipt-004
    source: eng-api-stripe-idempotency
    supports: Stripe compares retry parameters and returns the first saved response; Moonweave uses effect_digest as a compact integrity reference to the confirmed effect, a design inference not named by Stripe.
    locator: API Reference > Idempotent requests > saved result and same-key retries
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-effect-receipt-005
    source: eng-api-stripe-idempotency
    supports: Stripe documents saving the first request's status code and body and returning the same result for later requests with the same idempotency key; Moonweave represents the saved result as EffectReceipt.
    locator: API Reference > Idempotent requests > saved result and same-key retries
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-effect-receipt-006
    source: eng-api-stripe-idempotency
    supports: Stripe stores an idempotent result only after endpoint execution begins; pre-validation or pre-execution state has no saved result, grounding the boundary from approval.
    locator: API Reference > Idempotent requests > saved result and same-key retries
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-effect-receipt-007
    source: eng-api-stripe-idempotency
    supports: Stripe's saved result and idempotency-key replay behavior grounds this concrete reconciliation record; receipt_id and effect_digest are explicit Moonweave design inferences.
    locator: API Reference > Idempotent requests > saved result and same-key retries
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-effect-receipt-008
    source: eng-api-stripe-idempotency
    supports: Stripe saves the first executed mutation's status code and response body and replays it for matching idempotency-key retries. Moonweave uses that saved result as evidence for the realized SideEffect.
    locator: API Reference > Idempotent requests > saved result and same-key retries
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
