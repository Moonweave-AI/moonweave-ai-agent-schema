      kind: positive
      labels:
        zh: 退款结果证据
        en: Refund-result evidence
        ja: 返金結果証拠
      scenario_id: null
      descriptions:
        zh: er_77 记录 idempotency_key=refund:913:1、refund_id=re_77 与成功响应摘要，并指向订单余额减少的 SideEffect se_77。
        en: er_77 records idempotency_key=refund:913:1, refund_id=re_77, and a success-response digest and points to SideEffect se_77 that reduced the order balance.
        ja: er_77 は idempotency_key=refund:913:1、refund_id=re_77、成功 response digest を記録し、注文残高を減らした SideEffect se_77 を指します。
      field_values: {}
      related_node_ids:
        - EffectReceipt
        - SideEffect
      related_relation_ids:
        - EffectReceipt-evidences-SideEffect
      expected_result:
        zh: 对账可由 er_77 验证 se_77 已处理，并避免重复退款。
        en: Reconciliation can verify from er_77 that se_77 was processed and avoid duplicate refund.
        ja: 照合は er_77 から se_77 の処理を確認し重複返金を防げます。
