  predicate: evidences
  direction: source-to-target
  relation_kind: information
  labels:
    zh: 为副作用提供证据
    en: evidences side effect
    ja: 副作用を証拠化
  definitions:
    zh: 一个 EffectReceipt 通过请求或幂等键、提供方对象、状态、时间与结果摘要为特定 SideEffect 提供执行后证据；回执不造成也不授权该事件。
    en: An EffectReceipt evidences a specific SideEffect through request or idempotency key, provider object, status, time, and result digest; the receipt neither causes nor authorizes the event.
    ja: EffectReceipt は request/冪等キー、provider object、status、time、result digest により特定 SideEffect を証拠化し、イベントを発生・認可しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该语义事实不对所有运行实例施加统一基数。
    en: This semantic fact does not impose one universal cardinality on every runtime instance.
    ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
