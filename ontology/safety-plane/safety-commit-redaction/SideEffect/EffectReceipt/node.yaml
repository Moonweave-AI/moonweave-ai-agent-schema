schema: moonweave.ai/ontology-node/v1
id: EffectReceipt
kind: concept
labels:
  zh: 外部效果回执
  en: external effect receipt
  ja: 外部効果受領証
semantics:
  short_definition:
    zh: 把已处理变更请求绑定到可核验外部结果的执行后审计回执。
    en: A post-execution audit receipt binding a processed mutation request to a verifiable external result.
    ja: 処理済み変更要求を検証可能な外部結果へ結び付ける実行後監査 receipt。
  definition:
    zh: EffectReceipt 是独立信息记录，在 SideEffect 尝试之后把 request 或 idempotency_key 绑定到提供方响应、外部对象 ID、完成状态、completed_at 与 effect_digest，使调用方判断变更是否已被处理。它是审计日志中的执行证据，不是 CommitApproval 授权，也不等同于 SideEffect 事件本身；Stripe idempotent replay 与 MCP 服务端 receipt 是典型映射。
    en: "EffectReceipt is an independent information record after a SideEffect attempt binding request or idempotency_key to provider response, external object ID, completion status, completed_at, and effect_digest so callers determine whether the mutation was processed. It is execution evidence in audit logs, not CommitApproval authorization nor the SideEffect event itself; Stripe idempotent replay and MCP server receipts are canonical mappings."
    ja: EffectReceipt は SideEffect 試行後に request/idempotency_key を provider response/external object ID/completion status/completed_at/effect_digest に bind し mutation 処理済みか判断可能にする独立情報 record。監査 log の実行 evidence で CommitApproval 認可でも SideEffect event 自体でもない。Stripe idempotent replay/MCP server receipt が典型 mapping。
  why_needed:
    zh: 网络中断或重试时，批准无法证明外部系统是否已改变；EffectReceipt 为去重、对账、恢复与补偿提供可寻址证据，防止未知结果后重复执行不可逆变更。
    en: After network interruption or retry, approval cannot prove whether the external system changed. EffectReceipt supplies addressable evidence for deduplication, reconciliation, recovery, and compensation, preventing duplicate irreversible mutations after unknown results.
    ja: network 中断/retry 時、承認だけでは external system 変更を証明できない。EffectReceipt は dedupe/reconcile/recover/compensate の addressable evidence を供し、不明結果後の duplicate 不可逆 mutation を防ぐ。
  includes:
    - zh: 外部 API、工具执行器或事务协调器返回并持久化的结果记录，含 request/幂等键、提供方对象 ID、完成状态、时间与效果摘要。
      en: Persisted result records from external API, tool executor, or transaction coordinator with request or idempotency key, provider object ID, completion status, time, and effect digest.
      ja: external API/tool executor/transaction coordinator が返し persist した request/冪等キー/provider object ID/completion status/time/effect digest 付き result record。
  excludes:
    - zh: 仅允许执行的 CommitApproval、待执行 CommitRequest、无外部结果绑定的日志、实际 SideEffect 事件。
      en: CommitApproval permitting execution only, pending CommitRequest, logs without external-result binding, actual SideEffect event.
      ja: 実行許可のみ CommitApproval、pending CommitRequest、external result bind なし log、actual SideEffect event。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 映射：Stripe `Idempotency-Key` 首次响应 → EffectReceipt；支付 refund_id=re_77 → provider_object_ref；git push 成功 remote ref → EffectReceipt effect_digest=sha256:...；幂等重试相同键返回同一 er_77 而非第二 SideEffect。集成保留 receipt_id、idempotency_key、effect_digest 与 side_effect_ref。
    en: "Mapping: Stripe Idempotency-Key first response → EffectReceipt; payment refund_id=re_77 → provider_object_ref; successful git push remote ref → EffectReceipt effect_digest=sha256:...; idempotent retry with same key returns same er_77 not a second SideEffect. Integrations retain receipt_id, idempotency_key, effect_digest, and side_effect_ref."
    ja: mapping：Stripe Idempotency-Key 初回 response → EffectReceipt；refund_id=re_77 → provider_object_ref；git push remote ref 成功 → effect_digest；同一 key retry は er_77 返却で第二 SideEffect なし。receipt_id/idempotency_key/effect_digest/side_effect_ref 保持必須。
  typical_input:
    - description: Payment API success after approved refund.
      format: |
        idempotency_key: refund:913:1
        provider_status: 200
        refund_id: re_77
      source_claims:
        - claim-effect-receipt-stripe
    - description: Retry with same idempotency key.
      format: |
        retry_tool_call_id: tc_78
        idempotency_key: refund:913:1
        returned_receipt: er_77
      source_claims:
        - claim-effect-receipt-design
  typical_output:
    - description: Persisted EffectReceipt for reconciliation.
      format: |
        receipt_id: er_77
        idempotency_key: refund:913:1
        effect_digest: sha256:4e98
        completed_at: 2026-07-14T11:11:09Z
      source_claims:
        - claim-effect-receipt-design
  reference_implementations:
    - name: Stripe Idempotent Requests
      url: https://docs.stripe.com/api/idempotent_requests
      description: Saves and replays first executed mutation result under idempotency key.
    - name: MCP Specification — Tools
      url: https://spec.modelcontextprotocol.io/specification/2025-06-18/server/tools/
      description: Structured Tool Result as execution evidence separate from SideEffect.
    - name: git-secrets (AWS Labs)
      url: https://github.com/awslabs/git-secrets
      description: Deny path yields no EffectReceipt because no external mutation occurred.
structure:
  identity_keys:
    - receipt_id
  fields:
    - id: receipt_id
      labels:
        zh: 回执标识
        en: receipt ID
        ja: 受領証 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 外部效果回执的稳定唯一标识。
        en: Stable unique identifier of the external-effect receipt.
        ja: 外部効果受領証の安定一意識別子。
      allowed_values: []
      pattern: null
      example_value: er_77
      source_claims:
        - claim-effect-receipt-design
    - id: idempotency_key
      labels:
        zh: 幂等键
        en: idempotency key
        ja: 冪等キー
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在授权作用域内防止重复提交同一外部效果的键。
        en: Key preventing duplicate commit of the same external effect within authority scope.
        ja: 権限 scope 内で同一 external effect 重複 commit を防ぐ key。
      allowed_values: []
      pattern: null
      example_value: refund:913:1
      source_claims:
        - claim-effect-receipt-stripe
    - id: effect_digest
      labels:
        zh: 效果摘要
        en: effect digest
        ja: 効果 digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 已确认外部效果规范化表示的摘要，用于对账与重试匹配。
        en: Digest of normalized confirmed external effect for reconciliation and retry matching.
        ja: 確認済み external effect 正規化表現 digest。reconcile/retry match 用。
      allowed_values: []
      pattern: null
      example_value: sha256:4e98
      source_claims:
        - claim-effect-receipt-design
    - id: provider_object_ref
      labels:
        zh: 提供方对象引用
        en: provider object reference
        ja: provider object 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 外部系统在响应中返回的可解析对象标识，如 refund_id 或 remote commit SHA。
        en: Resolvable object identifier returned by external system, such as refund_id or remote commit SHA.
        ja: external system response の resolvable object ID（refund_id/remote commit SHA 等）。
      allowed_values: []
      pattern: null
      example_value: payment-refund:re_77
      source_claims:
        - claim-effect-receipt-stripe
  constraints:
    - id: effect-receipt-post-execution-only
      severity: error
      expression_language: plain
      expression: EffectReceipt MUST NOT exist without post-execution external result binding; CommitApproval alone is insufficient
      explanations:
        zh: 回执必须绑定执行后外部结果；批准不能充当回执。
        en: Receipt must bind post-execution external result; approval cannot substitute.
        ja: receipt は実行後 external result bind 必須。approval は代替不可。
      source_claims:
        - claim-effect-receipt-design
  required_relation_constraints: []
examples:
  - id: EffectReceipt-idempotent-refund
    labels:
      zh: 幂等退款回执
      en: Idempotent refund receipt
      ja: 冪等返金 receipt
    descriptions:
      zh: 退款 idempotency_key=refund:913:1，支付 API 返回 status=200、refund_id=re_77；持久化 er_77 与 effect_digest=sha256:4e98。
      en: Refund uses idempotency_key=refund:913:1; payment API returns status=200 and refund_id=re_77; system persists er_77 with effect_digest=sha256:4e98.
      ja: 返金 idempotency_key=refund:913:1。payment API status=200/refund_id=re_77。er_77/effect_digest sha256:4e98 を persist。
    example_source:
      product: Stripe
      url: https://docs.stripe.com/api/idempotent_requests
      version: idempotent requests
    field_values:
      receipt_id: er_77
      idempotency_key: refund:913:1
      effect_digest: sha256:4e98
      provider_object_ref: payment-refund:re_77
    related_node_ids:
      - EffectReceipt
      - SideEffect
    related_relation_ids:
      - EffectReceipt-evidences-SideEffect
    source_claims:
      - claim-effect-receipt-stripe
  - id: EffectReceipt-retry-same-receipt
    labels:
      zh: 重试返回同一回执
      en: Retry returns same receipt
      ja: retry が同一 receipt 返却
    descriptions:
      zh: tc_77 产生 se_77/er_77；重试 tc_78 相同 idempotency_key 与 digest 只返回 er_77，side_effect_count 仍为 1。
      en: tc_77 produces se_77/er_77; retry tc_78 with same idempotency_key and digest returns er_77 only and side_effect_count remains 1.
      ja: tc_77 が se_77/er_77 生成。retry tc_78 は同一 idempotency_key/digest で er_77 のみ返却、side_effect_count=1 維持。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: idempotent commit
    field_values:
      idempotency_key: refund:913:1
      side_effect_count: 1
      effect_receipt_id: er_77
    related_node_ids:
      - EffectReceipt
      - SideEffect
      - CommitRequest
    related_relation_ids: []
    source_claims:
      - claim-effect-receipt-design
  - id: EffectReceipt-approval-boundary
    labels:
      zh: 批准非回执
      en: Approval is not receipt
      ja: 承認は receipt ではない
    descriptions:
      zh: 审核员批准 refund:913:1 但支付 API 尚未调用；无 provider status 或 refund_id，CommitApproval 不能充当 EffectReceipt。
      en: Reviewer approves refund:913:1 but payment API not called; no provider status or refund_id; CommitApproval cannot serve as EffectReceipt.
      ja: 審査者が refund:913:1 承認するが payment API 未呼出し。provider status/refund_id なし。CommitApproval は EffectReceipt になれない。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: approval vs receipt
    field_values:
      accepted: false
    related_node_ids:
      - EffectReceipt
      - CommitApproval
    related_relation_ids: []
    source_claims:
      - claim-effect-receipt-design
  - id: EffectReceipt-deny-no-receipt
    labels:
      zh: 拒绝无回执
      en: Denial yields no receipt
      ja: deny では receipt なし
    descriptions:
      zh: git-secrets CommitDenial 阻止 push；无外部 mutation，不应创建 EffectReceipt 或 SideEffect。
      en: git-secrets CommitDenial blocks push; no external mutation; EffectReceipt and SideEffect must not be created.
      ja: git-secrets CommitDenial が push block。external mutation なし。EffectReceipt/SideEffect 作成不可。
    example_source:
      product: git-secrets
      url: https://github.com/awslabs/git-secrets
      version: deny before SideEffect
    field_values:
      effect_receipt_created: false
    related_node_ids:
      - EffectReceipt
      - CommitDenial
    related_relation_ids: []
    source_claims:
      - claim-effect-receipt-git-secrets
parent_relation:
  id: EffectReceipt-evidences-SideEffect
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 为副作用提供证据
    en: evidences side effect
    ja: 副作用を証拠化
  definitions:
    zh: EffectReceipt 通过 request/幂等键、提供方对象、状态、时间与结果摘要为特定 SideEffect 提供执行后证据；回执不造成也不授权该事件。
    en: EffectReceipt evidences a specific SideEffect through request or idempotency key, provider object, status, time, and result digest; the receipt neither causes nor authorizes the event.
    ja: EffectReceipt は request/冪等キー/provider object/status/time/result digest で特定 SideEffect を証拠化。receipt は event を発生・認可しない。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一次 SideEffect 可有多个证据来源，但回执身份独立。
    en: One SideEffect may have multiple evidence sources but receipt identity remains independent.
    ja: 一 SideEffect に複数 evidence source 可だが receipt identity は独立。
  inverse_reading:
    predicate: evidenced_by
    labels:
      zh: 由回执证明
      en: evidenced by receipt
      ja: receipt により証明
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-effect-receipt-design
  distinct_fact_rationale:
    zh: SideEffect 发生不能从批准或 ToolResult 直接推出，需要回执证据。
    en: SideEffect occurrence cannot be inferred from approval or ToolResult alone; receipt evidence is required.
    ja: SideEffect 発生は approval/ToolResult だけから導けず receipt evidence 必要。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: stripe-idempotency
    title: Stripe Idempotent Requests
    url: https://docs.stripe.com/api/idempotent_requests
    source_type: official-doc
    relevance: Saved mutation result replay under idempotency key.
  - id: mcp-tools-2025-06-18
    title: MCP Specification — Tools
    url: https://spec.modelcontextprotocol.io/specification/2025-06-18/server/tools/
    source_type: official-spec
    relevance: Tool Result as execution evidence separate from authorization.
  - id: git-secrets-awslabs
    title: git-secrets (AWS Labs)
    url: https://github.com/awslabs/git-secrets
    source_type: official-doc
    relevance: Deny path produces no external mutation receipt.
  - id: safety-commit-design
    title: Moonweave safety-commit-redaction module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: EffectReceipt as post-execution audit evidence for SideEffect.
source_claims:
  - id: claim-effect-receipt-stripe
    source: stripe-idempotency
    supports: Stripe saves first executed mutation status and body under idempotency key for replay, mapping to EffectReceipt.
    locator: Idempotent requests API
    evidence_kind: official
    confidence: high
  - id: claim-effect-receipt-git-secrets
    source: git-secrets-awslabs
    supports: CommitDenial before push produces no EffectReceipt because no external mutation occurred.
    locator: commit hooks deny path
    evidence_kind: official
    confidence: high
  - id: claim-effect-receipt-design
    source: safety-commit-design
    supports: Moonweave binds EffectReceipt to idempotency key and effect digest for deduplication and SideEffect evidence.
    locator: EffectReceipt audit boundary
    evidence_kind: design-inference
    confidence: high
