schema: moonweave.ai/ontology-node/v1
id: EffectReceipt
kind: concept
status: accepted
labels:
  zh: 外部效果回执
  en: External effect receipt
  ja: 外部効果受領証
semantics:
  short_definition:
    zh: 把已处理的变更请求绑定到其可核验外部结果的效果回执。
    en: An effect receipt binding a processed mutation request to its verifiable external result.
    ja: 処理済み変更要求を検証可能な外部結果へ結び付ける効果受領証。
  definition:
    zh: 效果回执是一种独立信息记录，在副作用执行尝试之后，把请求或幂等键绑定到提供方响应、外部对象标识、状态、完成时间与效果摘要，使调用方能够判断该变更是否已经被处理；它是证据而非授权，也不等同于 SideEffect 事件本身。
    en: EffectReceipt is an independent information record created after a side-effect attempt that binds a request or idempotency key to the provider response, external object identifier, status, completion time, and effect digest so a caller can determine whether the mutation was processed; it is evidence, not authorization or the SideEffect event itself.
    ja: EffectReceipt は独立した情報記録であり、副作用試行後に request または冪等キーを provider response、外部 object ID、status、完了時刻、effect digest へ結び付け、変更が処理済みか判断できるようにします。認可でも SideEffect イベント自体でもありません。
  why_needed:
    zh: 网络中断或重试时，审批记录无法证明外部系统是否已经改变；效果回执为去重、对账、恢复与补偿提供可寻址证据，并防止因未知结果重复执行变更。
    en: After a network interruption or retry, approval cannot prove whether the external system changed. An effect receipt supplies addressable evidence for deduplication, reconciliation, recovery, and compensation, reducing duplicate mutations after an unknown result.
    ja: ネットワーク中断や再試行時、承認だけでは外部変更を証明できません。効果受領証は重複排除、照合、回復、補償の証拠となり、不明結果後の重複変更を防ぎます。
  includes:
    - zh: 由外部 API、工具执行器或事务协调器返回并持久化的结果记录，包含请求或幂等键、提供方响应或对象 ID、完成状态、时间与可核验效果摘要。
      en: Persisted result records returned by an external API, tool executor, or transaction coordinator with request or idempotency key, provider response or object ID, completion status, time, and verifiable effect digest.
      ja: 外部 API、ツール実行器、トランザクション調整器が返し永続化する、request/冪等キー、provider response/object ID、完了状態、時刻、検証可能な効果要約を持つ結果記録。
  excludes:
    - zh: 仅表示允许执行的 CommitApproval、待执行 CommitRequest、没有外部结果绑定的日志消息，以及实际发生的 SideEffect 事件。
      en: CommitApproval that only permits execution, a pending CommitRequest, a log line without external-result binding, and the actual SideEffect event.
      ja: 実行許可だけを示す CommitApproval、保留中 CommitRequest、外部結果への結合を欠くログ、実際の SideEffect イベント。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - receipt_id
  fields:
    - id: receipt_id
      labels:
        zh: 回执标识
        en: receipt ID
        ja: 受領証 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 外部效果回执的稳定唯一标识。
        en: Stable unique identifier of the external-effect receipt.
        ja: 外部効果受領証の安定一意識別子です。
      allowed_values: []
      pattern: null
      example_value: effect-receipt-7f3a
      source_claims:
        - claim-effect-receipt-002
    - id: idempotency_key
      labels:
        zh: 幂等键
        en: idempotency key
        ja: 冪等キー
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在授权作用域内防止重复提交同一外部效果的键。
        en: Key preventing duplicate commit of the same external effect within an authority scope.
        ja: 権限範囲内で同じ外部効果の重複確定を防ぐキーです。
      allowed_values: []
      pattern: null
      example_value: commit:invoice:8842
      source_claims:
        - claim-effect-receipt-003
    - id: effect_digest
      labels:
        zh: 效果摘要
        en: effect digest
        ja: 効果要約
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 已确认外部效果规范化表示的摘要。
        en: Digest of the normalized representation of the confirmed external effect.
        ja: 確認済み外部効果の正規化表現要約です。
      allowed_values: []
      pattern: null
      example_value: sha256:4e98...
      source_claims:
        - claim-effect-receipt-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: EffectReceipt-example-positive-001
    kind: positive
    labels:
      zh: 幂等退款回执
      en: Idempotent refund receipt
      ja: 冪等返金受領証
    scenario_id: null
    descriptions:
      zh: 退款请求使用 idempotency_key=refund:913:1，支付 API 返回 status=200、refund_id=re_77；系统持久化 receipt_id=er_77 与 response_digest=sha256:4e98。
      en: A refund request uses idempotency_key=refund:913:1 and the payment API returns status=200 with refund_id=re_77; the system persists receipt_id=er_77 and response_digest=sha256:4e98.
      ja: 返金要求は idempotency_key=refund:913:1 を使用し、決済 API は status=200 と refund_id=re_77 を返します。システムは receipt_id=er_77 と response_digest=sha256:4e98 を永続化します。
    field_values:
      receipt_id: er_77
      idempotency_key: refund:913:1
      effect_digest: sha256:4e98
    related_node_ids:
      - EffectReceipt
      - SideEffect
    related_relation_ids:
      - EffectReceipt-evidences-SideEffect
    expected_result:
      zh: 同一参数与幂等键的重试关联到 er_77，而不是创建第二笔退款。
      en: A retry with the same parameters and idempotency key resolves to er_77 instead of creating a second refund.
      ja: 同じ引数と冪等キーの再試行は第二の返金を作らず er_77 へ解決されます。
    why_valid_or_invalid:
      zh: 记录把请求键、提供方对象、状态和结果摘要绑定在一起，可核验外部变更的处理结果。
      en: The record binds request key, provider object, status, and result digest, making the processed external mutation verifiable.
      ja: 要求キー、provider object、状態、結果要約を結び付け、外部変更の処理結果を検証可能にします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-effect-receipt-005
  - id: EffectReceipt-example-boundary-001
    kind: boundary
    labels:
      zh: 批准记录边界
      en: Approval-record boundary
      ja: 承認記録の境界
    scenario_id: null
    descriptions:
      zh: 审核员批准 refund:913:1，但支付 API 尚未调用，因此没有 provider status、refund_id 或响应摘要；批准记录不能充当效果回执。
      en: A reviewer approves refund:913:1, but the payment API has not been called, so there is no provider status, refund_id, or response digest; the approval record cannot serve as an effect receipt.
      ja: 審査者は refund:913:1 を承認しましたが決済 API は未呼出しで、provider status、refund_id、response digest がありません。承認記録は効果受領証になりません。
    field_values: {}
    related_node_ids:
      - EffectReceipt
      - CommitApproval
    related_relation_ids: []
    expected_result:
      zh: 系统保留 CommitApproval 并等待执行结果；EffectReceipt 仍不存在。
      en: The system retains CommitApproval and awaits execution results; no EffectReceipt exists yet.
      ja: システムは CommitApproval を保持して実行結果を待ち、EffectReceipt はまだ存在しません。
    why_valid_or_invalid:
      zh: 授权回答是否可以执行，回执回答外部系统处理了什么；缺少执行后结果绑定即不满足回执边界。
      en: Authorization answers whether execution may occur; a receipt answers what the external system processed. Without post-execution result binding, the receipt boundary is unmet.
      ja: 認可は実行可否、受領証は外部システムの処理結果を答えます。実行後結果への結合がなければ受領証ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-effect-receipt-006
  - id: EffectReceipt-example-instance-001
    kind: instance
    labels:
      zh: 外部变更回执记录
      en: External-mutation receipt record
      ja: 外部変更受領証記録
    scenario_id: null
    descriptions:
      zh: er_77 保存 receipt_id=er_77、idempotency_key=refund:913:1、effect_digest=sha256:4e98，并另行引用 provider_object=re_77、completed_at=2026-07-14T11:11:09Z。
      en: er_77 stores receipt_id=er_77, idempotency_key=refund:913:1, effect_digest=sha256:4e98, plus provider_object=re_77 and completed_at=2026-07-14T11:11:09Z.
      ja: er_77 は receipt_id=er_77、idempotency_key=refund:913:1、effect_digest=sha256:4e98 に加え provider_object=re_77 と completed_at=2026-07-14T11:11:09Z を保存します。
    field_values:
      receipt_id: er_77
      idempotency_key: refund:913:1
      effect_digest: sha256:4e98
    related_node_ids:
      - EffectReceipt
    related_relation_ids: []
    expected_result:
      zh: 恢复任务可依据幂等键查得 er_77，并通过摘要与提供方对象完成对账。
      en: A resumed task can find er_77 by idempotency key and reconcile it with the digest and provider object.
      ja: 再開タスクは冪等キーで er_77 を検索し、要約と provider object で照合できます。
    why_valid_or_invalid:
      zh: 实例给出稳定回执身份、去重键、效果摘要、外部对象和完成时间，具备操作恢复所需证据。
      en: The instance supplies stable receipt identity, deduplication key, effect digest, external object, and completion time, providing recovery evidence.
      ja: 安定した受領証 ID、重複排除キー、効果要約、外部 object、完了時刻を持ち、回復に必要な証拠を提供します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-effect-receipt-007
external_mappings: []
applicability:
  - core
sibling_differentiation: []
