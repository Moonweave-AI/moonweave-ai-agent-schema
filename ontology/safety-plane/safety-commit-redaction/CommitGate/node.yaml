        labels:
          zh: 审批闸门分类
          en: Approval-gate classification
          ja: 承認 gate 分類
        descriptions:
          zh: cg_44 暂停 refund_order，等待审核决定后恢复，因此是具有提交种差的 Gate。
          en: cg_44 pauses refund_order and resumes after review, so it is a Gate with commit-specific differentia.
          ja: cg_44 は refund_order を停止し審査後に再開するため、確定固有種差を持つ Gate です。
        field_values: {}
        related_node_ids:
          - CommitGate
          - Gate
        related_relation_ids:
          - CommitGate-is_a-Gate

          en: The graph places cg_44 under Gate while retaining commit-request relations.
          ja: graph は cg_44 を Gate の下に置き、確定要求関係を保持します。

          en: Pause, decision, and conditional release satisfy Gate capability, specialized for side-effect commit.
          ja: 停止、判断、条件付き解放が Gate 能力を満たし、副作用確定へ特殊化されます。
        source_claims:
          - claim-commit-gate-006
      - id: CommitGate-is_a-Gate-example-boundary-001
        labels:
          zh: 普通路由边界
          en: Ordinary routing boundary
          ja: 通常 routing の境界
        descriptions:
          zh: router 仅按工具名称选择处理器，不暂停调用、不取得批准也不控制外部副作用；它不是 CommitGate。
          en: A router selects a handler by tool name without pausing, approval, or external-side-effect control; it is not CommitGate.
          ja: router は tool 名で handler を選ぶだけで停止、承認、外部副作用制御がなく CommitGate ではありません。
        field_values: {}
        related_node_ids:
          - CommitGate
          - Gate
        related_relation_ids:
          - CommitGate-is_a-Gate

          en: The component remains a routing capability and does not enter CommitGate.
          ja: 構成要素は routing capability のまま CommitGate に入りません。

          en: CommitGate requires pre-effect conditional blocking and resume, absent from ordinary selection.
          ja: CommitGate には副作用前の条件阻止と再開が必要で、通常選択にはありません。
        source_claims:
          - claim-commit-gate-006
    source_claims:
      - claim-commit-gate-006
    distinct_fact_rationale:
      zh: CommitGate 的暂停和条件释放能力满足跨模块 Gate genus，故该边承担 taxonomy 父链。
      en: CommitGate's pause and conditional release satisfy the cross-module Gate genus, so this edge carries taxonomy parentage.
      ja: CommitGate の停止・条件解放能力はモジュール横断 Gate genus を満たし、この辺が taxonomy 親を担います。
    layout_role: secondary-backbone
    review_status: accepted
    target: concept:Gate
  - id: CommitGate-may_produce-CommitApproval
    predicate: may_produce
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 可能产生提交批准
      en: may produce commit approval
      ja: CommitApproval を生成し得る
    definitions:
      zh: CommitGate 在一个请求满足策略或人工审批条件时可能产生 CommitApproval；待定、拒绝或错误状态下不会产生批准。
      en: CommitGate may produce CommitApproval when one request satisfies policy or human-review conditions; pending, denied, or error states do not produce approval.
      ja: CommitGate は一件の要求が policy または人手審査条件を満たす時 CommitApproval を生成し得ます。pending、denied、error 状態では承認を生成しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_may_produce
      labels:
        zh: 反向：may produce
        en: is target of may produce
        ja: 逆方向：may produce
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: CommitGate-may_produce-CommitApproval-example-positive-001
        labels:
          zh: 批准结果分支
          en: Approval-outcome branch
          ja: 承認結果分岐
        descriptions:
          zh: 审核员对 call_82 调用 state.approve，cg_44 生成 apr_82 并恢复该调用。
          en: A reviewer invokes state.approve for call_82; cg_44 emits apr_82 and resumes that call.
          ja: 審査者が call_82 に state.approve を行い、cg_44 は apr_82 を生成して呼出しを再開します。
        field_values: {}
        related_node_ids:
          - CommitGate
          - CommitApproval
        related_relation_ids:
          - CommitGate-may_produce-CommitApproval

          en: One approval bound to call_82 is produced without changing other pending calls.
          ja: call_82 に結び付く一件の承認を生成し、他の pending call は変えません。

          en: Approval is a possible independently identified gate outcome, matching may_produce.
          ja: 承認は独立 ID を持つ gate 評価の可能結果で may_produce に一致します。
        source_claims:
          - claim-commit-gate-007
      - id: CommitGate-may_produce-CommitApproval-example-boundary-001
        labels:
          zh: 仍待审批边界
          en: Still-pending boundary
          ja: 承認待ちの境界
        descriptions:
          zh: cg_44 已暂停 call_82，但审核员尚未决定；中断状态不是 CommitApproval。
          en: cg_44 has paused call_82, but no reviewer has decided; interruption state is not CommitApproval.
          ja: cg_44 は call_82 を停止しましたが審査者未判断で、interrupt state は CommitApproval ではありません。
        field_values: {}
        related_node_ids:
          - CommitGate
          - CommitApproval
        related_relation_ids:
          - CommitGate-may_produce-CommitApproval

          en: The relation does not exist until an approval decision appears.
          ja: 承認判断が現れるまで関係は存在しません。

          en: A possible outcome is not a guaranteed outcome; pending state cannot precreate it.
          ja: 可能結果は必然結果ではなく pending 状態で先に辺を作れません。
        source_claims:
          - claim-commit-gate-007
    source_claims:
      - claim-commit-gate-007
    distinct_fact_rationale:
      zh: Gate 的 genus 或请求评估关系不能推出具体批准结果，需要独立因果边。
