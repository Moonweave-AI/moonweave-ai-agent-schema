schema: moonweave.ai/ontology-node/v1
id: CommitGate
kind: concept
labels:
  zh: 副作用提交闸门
  en: side-effect commit gate
  ja: 副作用コミットゲート
semantics:
  short_definition:
    zh: 在外部副作用生效前对 CommitRequest 执行扫描、策略与审批的控制能力。
    en: A control capability that scans, applies policy, and adjudicates a CommitRequest before an external side effect takes effect.
    ja: 外部副作用発効前に CommitRequest へ scan・policy・承認を実行する制御 capability。
  definition:
    zh: CommitGate 是 safety-commit-redaction 的执行能力节点：在不可逆变更发生前识别冻结的 CommitRequest，运行 git-secrets `--commit`、TruffleHog `trufflehog filesystem`、pre-commit hook 框架或 GitHub push protection 等输入检查，并产出 exit code 0 的 CommitApproval 或非零的 CommitDenial。Moonweave 中 commit 指让外部副作用生效，不是 Git object 创建本身，但密钥扫描阻断远程 push SideEffect 是典型工程映射。CommitGate 不是 CommitRequest、GateOutcome 或 SideEffect；它是执行求值的 capability。
    en: "CommitGate is the execution capability in safety-commit-redaction: it identifies a frozen CommitRequest before irreversible change, runs input checks such as git-secrets --commit, TruffleHog trufflehog filesystem, the pre-commit hook framework, or GitHub push protection, and emits CommitApproval on exit code 0 or CommitDenial on non-zero exit. In Moonweave, commit means making an external side effect effective, not creating a Git object itself, but secret-scan blocks before remote push SideEffect are canonical mappings. CommitGate is neither CommitRequest, GateOutcome, nor SideEffect; it is the capability that performs evaluation."
    ja: CommitGate は safety-commit-redaction の実行 capability で、不可逆変更前に凍結 CommitRequest を識別し git-secrets --commit、TruffleHog filesystem scan、pre-commit hook、GitHub push protection 等を実行、exit code 0 で CommitApproval、非零で CommitDenial を出力します。Moonweave の commit は外部副作用発効を意味し Git object 作成自体ではありませんが、secret scan による remote push SideEffect block は典型 mapping です。CommitRequest/GateOutcome/SideEffect ではなく評価を実行する capability です。
  why_needed:
    zh: 若只记录批准或拒绝结果而不建模闸门能力，集成方无法区分“扫描器存在”与“某次 pre-commit 实际运行”，也无法在 git-secrets 与 TruffleHog 串联时追溯哪版 hook 处理了哪份 staged 变更。
    en: Without modeling the gate capability separately from outcomes, integrators cannot distinguish scanner presence from an actual pre-commit run or trace which hook version processed which staged change across git-secrets and TruffleHog chains.
    ja: 結果だけを記録し gate capability をモデル化しないと、scanner 存在と actual pre-commit run の区別や git-secrets/TruffleHog chain でどの hook 版がどの staged change を処理したか追跡できません。
  includes:
    - zh: 对文件写入、退款、邮件发送、仓库 push 等候选副作用在执行前暂停、扫描、策略求值并恢复或阻断的运行时闸门。
      en: Runtime gates that pause, scan, evaluate policy, and resume or block candidate side effects such as file writes, refunds, email sends, or repository pushes before execution.
      ja: ファイル書込み、返金、メール送信、repository push 等の候補副作用を実行前に pause/scan/policy evaluate/resume/block する runtime gate。
  excludes:
    - zh: 仅输出风险分数的扫描器配置、执行后的 DisclosureFilter、CommitApproval/CommitDenial 结果记录，以及实际产生 SideEffect 的工具执行器。
      en: Scanner configuration that only scores risk, post-execution DisclosureFilter, CommitApproval or CommitDenial outcome records, and the tool executor that actually produces SideEffect.
      ja: risk score のみの scanner 設定、実行後 DisclosureFilter、CommitApproval/CommitDenial outcome record、実際に SideEffect を生む tool executor。
  semantic_kind: capability
  aliases: []
engineering:
  explanation:
    zh: 集成映射：`.pre-commit-config.yaml` 中 git-secrets 与 TruffleHog repo → CommitGate cg-precommit；GitHub push protection block 事件 → 服务端 CommitGate；Agent HITL needs_approval → 人工 CommitGate。每次求值保留 gate_id、scanner_refs、evaluated_at 与 commit_request_ref；exit code 0 → CommitApproval，非零 → CommitDenial，且无 SideEffect。
    en: "Integration mapping: git-secrets and TruffleHog repos in .pre-commit-config.yaml → CommitGate cg-precommit; GitHub push protection block events → server-side CommitGate; Agent HITL needs_approval → human CommitGate. Each evaluation retains gate_id, scanner_refs, evaluated_at, and commit_request_ref; exit code 0 → CommitApproval, non-zero → CommitDenial with no SideEffect."
    ja: 統合 mapping：.pre-commit-config.yaml の git-secrets/TruffleHog → CommitGate cg-precommit；GitHub push protection block → server-side CommitGate；Agent HITL needs_approval → human CommitGate。各評価で gate_id/scanner_refs/evaluated_at/commit_request_ref を保持；exit code 0 → CommitApproval、非零 → CommitDenial/no SideEffect。
  typical_input:
    - description: git-secrets pre-commit hook on staged AWS key pattern.
      format: |
        $ git commit -m "add config"
        .env:12:aws_secret_key detected
        [ERROR] git-secrets: prohibited pattern found
        exit 1 => CommitDenial before git object
      source_claims:
        - claim-commit-gate-git-secrets
    - description: TruffleHog verified secret in CI pre-commit.
      format: |
        trufflehog filesystem --directory=. --only-verified
        Found verified result: slack_webhook in config/.env
        exit 1 => CommitDenial; no remote SideEffect
      source_claims:
        - claim-commit-gate-trufflehog
    - description: Business CommitRequest before refund API.
      format: |
        commit_request_id: cr_82
        effect_target: payment-gateway/refund
        idempotency_key: refund:913:1
        argument_digest: sha256:91ab
      source_claims:
        - claim-commit-gate-design
  typical_output:
    - description: Allow after scans and approval evidence.
      format: |
        gate_id: cg_44
        gate_result: allow
        commit_approval_id: ca_82
        side_effect_created: false
      source_claims:
        - claim-commit-gate-design
    - description: Deny from hook non-zero exit before SideEffect.
      format: |
        gate_id: cg-secrets-1
        gate_result: deny
        commit_denial_id: cd-secrets-1
        hook_exit_code: 1
        side_effect_created: false
      source_claims:
        - claim-commit-gate-git-secrets
  reference_implementations:
    - name: git-secrets (AWS Labs)
      url: https://github.com/awslabs/git-secrets
      description: Pre-commit and commit-msg hooks blocking AWS and custom secret patterns.
    - name: TruffleHog
      url: https://github.com/trufflesecurity/trufflehog
      description: Verified and unverified secret scanning in git, filesystem, and CI.
    - name: GitHub Secret Scanning and Push Protection
      url: https://docs.github.com/en/code-security/secret-scanning
      description: Server-side detection and push blocking for exposed secrets.
    - name: pre-commit framework
      url: https://pre-commit.com/
      description: Staged-change hook orchestration for secrets, lint, and custom gates.
structure:
  identity_keys:
    - gate_id
  fields:
    - id: gate_id
      labels:
        zh: 闸门标识
        en: gate ID
        ja: ゲート ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次 CommitGate 求值运行或配置的闸门实例。
        en: Stably identifies one CommitGate evaluation run or configured gate instance.
        ja: 一回の CommitGate 評価 run または設定済み gate instance を安定識別します。
      allowed_values: []
      pattern: null
      example_value: cg_44
      source_claims:
        - claim-commit-gate-design
    - id: scanner_refs
      labels:
        zh: 扫描器引用
        en: scanner references
        ja: スキャナ参照
      datatype: array<string>
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 本次求值实际调用的 git-secrets、TruffleHog 或其他 pre-commit hook 版本引用。
        en: References to git-secrets, TruffleHog, or other pre-commit hooks actually invoked in this evaluation.
        ja: 本評価で実際 invoke した git-secrets、TruffleHog、その他 pre-commit hook 版への参照。
      allowed_values: []
      pattern: null
      example_value:
        - git-secrets@1.3.0
        - trufflehog@3.63
      source_claims:
        - claim-commit-gate-trufflehog
    - id: hook_exit_code
      labels:
        zh: 钩子退出码
        en: hook exit code
        ja: hook 終了コード
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: pre-commit 或 commit-msg hook 的进程退出码；0 映射 allow，非零映射 deny。
        en: Process exit code from pre-commit or commit-msg hook; 0 maps to allow, non-zero to deny.
        ja: pre-commit/commit-msg hook の process exit code。0 は allow、非零は deny に写像。
      allowed_values: []
      pattern: null
      example_value: 1
      source_claims:
        - claim-commit-gate-git-secrets
  constraints:
    - id: commit-gate-exit-code-outcome
      severity: error
      expression_language: plain
      expression: hook_exit_code = 0 MUST produce CommitApproval; hook_exit_code != 0 MUST produce CommitDenial and MUST NOT create SideEffect
      explanations:
        zh: 钩子退出码与门控结果必须一致；拒绝时不得产生外部副作用。
        en: Hook exit code must align with gate outcome; denial must not create an external side effect.
        ja: hook exit code と gate outcome は一致し、deny 時に SideEffect を作ってはなりません。
      source_claims:
        - claim-commit-gate-git-secrets
  required_relation_constraints: []
examples:
  - id: CommitGate-git-secrets-deny
    labels:
      zh: git-secrets 预提交拒绝
      en: git-secrets pre-commit deny
      ja: git-secrets pre-commit deny
    descriptions:
      zh: 开发者 staged `.env` 含 AWS 密钥；git-secrets commit hook exit 1，CommitGate cg-secrets-1 产生 CommitDenial，无 SideEffect 到达 GitHub remote。
      en: A developer stages `.env` with an AWS key; git-secrets commit hook exits 1, CommitGate cg-secrets-1 emits CommitDenial with no SideEffect reaching the GitHub remote.
      ja: 開発者が AWS key を含む `.env` を stage。git-secrets commit hook exit 1、CommitGate cg-secrets-1 が CommitDenial を出力し GitHub remote へ SideEffect なし。
    example_source:
      product: git-secrets
      url: https://github.com/awslabs/git-secrets
      version: commit hook
    field_values:
      gate_id: cg-secrets-1
      hook_exit_code: 1
      gate_result: deny
    related_node_ids:
      - CommitGate
      - CommitDenial
      - CommitRequest
    related_relation_ids:
      - CommitRequest-evaluated_by-CommitGate
    source_claims:
      - claim-commit-gate-git-secrets
  - id: CommitGate-trufflehog-ci
    labels:
      zh: TruffleHog CI 扫描拒绝
      en: TruffleHog CI scan deny
      ja: TruffleHog CI scan deny
    descriptions:
      zh: CI 运行 `trufflehog git file://. --only-verified` 在 PR 分支发现 verified Slack webhook；CommitGate 标记 deny 并阻止 merge SideEffect。
      en: CI runs `trufflehog git file://. --only-verified` on a PR branch and finds a verified Slack webhook; CommitGate marks deny and blocks the merge SideEffect.
      ja: CI が PR branch で trufflehog verified scan を実行し Slack webhook を検出。CommitGate deny で merge SideEffect block。
    example_source:
      product: TruffleHog
      url: https://github.com/trufflesecurity/trufflehog
      version: verified detection
    field_values:
      gate_id: cg-trufflehog-pr-12
      scanner_refs:
        - trufflehog@3.63
      gate_result: deny
    related_node_ids:
      - CommitGate
      - CommitDenial
    related_relation_ids: []
    source_claims:
      - claim-commit-gate-trufflehog
  - id: CommitGate-refund-allow
    labels:
      zh: 退款 CommitGate 批准
      en: Refund CommitGate allow
      ja: 返金 CommitGate allow
    descriptions:
      zh: cr_82 请求 order:913 退款 100 USD；cg_44 核对 grant、argument digest 与 preview 后 hook_exit_code=0 等价 allow，产生 ca_82；支付 API 尚未调用。
      en: cr_82 requests a USD 100 refund on order:913; cg_44 verifies grant, argument digest, and preview then emits allow equivalent to exit 0 as ca_82; payment API not yet called.
      ja: cr_82 が order:913 へ 100 USD 返金を要求。cg_44 が grant/digest/preview を照合し allow（exit 0 相当）で ca_82 を生成。payment API 未呼出し。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: business commit gate
    field_values:
      gate_id: cg_44
      gate_result: allow
      commit_request_ref: cr_82
    related_node_ids:
      - CommitGate
      - CommitApproval
      - CommitRequest
    related_relation_ids:
      - CommitGate-may_produce-CommitApproval
    source_claims:
      - claim-commit-gate-design
  - id: CommitGate-github-push-protection
    labels:
      zh: GitHub push protection 服务端闸门
      en: GitHub push protection server gate
      ja: GitHub push protection server gate
    descriptions:
      zh: push 含 verified GitHub token pattern；GitHub secret scanning push protection 在 remote 拒绝并返回 block 事件，映射为 CommitGate cg-push-9 的 CommitDenial，本地 commit object 可能已存在但 remote SideEffect 未发生。
      en: A push contains a verified GitHub token pattern; GitHub secret scanning push protection rejects at remote and returns a block event mapped to CommitGate cg-push-9 CommitDenial; local commit object may exist but remote SideEffect did not occur.
      ja: push に verified GitHub token pattern。GitHub push protection が remote で reject/block し CommitGate cg-push-9 CommitDenial に写像。local commit object は存在可だが remote SideEffect なし。
    example_source:
      product: GitHub
      url: https://docs.github.com/en/code-security/secret-scanning
      version: push protection
    field_values:
      gate_id: cg-push-9
      gate_result: deny
      side_effect_created: false
    related_node_ids:
      - CommitGate
      - CommitDenial
    related_relation_ids: []
    source_claims:
      - claim-commit-gate-github
parent_relation: null
relations:
  - id: CommitGate-is_a-Gate
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是一种控制闸门
      en: is a kind of gate
      ja: 制御 Gate の一種
    definitions:
      zh: 每个 CommitGate 都是 Gate，种差是在外部副作用执行前持有 CommitRequest、运行扫描与策略并产出 allow/deny 结果。
      en: Every CommitGate is a Gate distinguished by holding CommitRequest before external side-effect execution, running scans and policy, and producing allow or deny outcomes.
      ja: すべての CommitGate は Gate で、外部副作用実行前に CommitRequest を保持し scan/policy を実行して allow/deny outcome を出力する点が種差です。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 分类继承不使用实例关系基数。
      en: Taxonomic inheritance does not use instance-relation cardinality.
      ja: 分類継承にはインスタンス関係の基数を用いません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 有下位类型
        en: has subtype
        ja: 下位型を持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    source_claims:
      - claim-commit-gate-design
    distinct_fact_rationale:
      zh: CommitGate 的暂停与条件释放满足跨模块 Gate genus。
      en: CommitGate pause and conditional release satisfy the cross-module Gate genus.
      ja: CommitGate の pause/conditional release は cross-module Gate genus を満たします。
    layout_role: secondary-backbone
    target: concept:Gate
  - id: CommitGate-may_produce-CommitApproval
    predicate: may_produce
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 可能产生提交批准
      en: may produce commit approval
      ja: CommitApproval を生成し得る
    definitions:
      zh: CommitGate 在 hook exit code 0 或策略/人工审批通过时可能产生 CommitApproval；pending 或 deny 状态不产生批准。
      en: CommitGate may produce CommitApproval when hook exit code is 0 or policy or human review passes; pending or deny states do not produce approval.
      ja: hook exit code 0 または policy/human review 通過時 CommitGate は CommitApproval を生成し得ます。pending/deny では生成しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 可能产出不等于必然产出。
      en: A possible outcome is not a guaranteed outcome.
      ja: 可能 outcome は必然 outcome ではありません。
    inverse_reading:
      predicate: produced_by
      labels:
        zh: 由闸门产生
        en: produced by gate
        ja: ゲートにより生成
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-commit-gate-git-secrets
    distinct_fact_rationale:
      zh: Gate capability 不能单独推出具体批准记录。
      en: Gate capability alone cannot imply a concrete approval record.
      ja: Gate capability だけでは具体 approval record は導けません。
    layout_role: cross-link
    target: concept:CommitApproval
  - id: CommitGate-may_produce-CommitDenial
    predicate: may_produce
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 可能产生提交拒绝
      en: may produce commit denial
      ja: CommitDenial を生成し得る
    definitions:
      zh: CommitGate 在 hook 非零退出码、TruffleHog verified secret、GitHub push protection 或策略/人工拒绝时可能产生 CommitDenial。
      en: CommitGate may produce CommitDenial on non-zero hook exit, TruffleHog verified secret, GitHub push protection, or policy or human rejection.
      ja: hook 非零 exit、TruffleHog verified secret、GitHub push protection、policy/human reject 時 CommitGate は CommitDenial を生成し得ます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 可能产出不等于必然产出。
      en: A possible outcome is not a guaranteed outcome.
      ja: 可能 outcome は必然 outcome ではありません。
    inverse_reading:
      predicate: produced_by
      labels:
        zh: 由闸门产生
        en: produced by gate
        ja: ゲートにより生成
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    source_claims:
      - claim-commit-gate-trufflehog
    distinct_fact_rationale:
      zh: 具体拒绝结果需要独立因果事实。
      en: A concrete denial requires a separate causal fact.
      ja: 具体 denial には別 causal fact が必要です。
    layout_role: cross-link
    target: concept:CommitDenial
sources:
  - id: git-secrets-awslabs
    title: git-secrets (AWS Labs)
    url: https://github.com/awslabs/git-secrets
    source_type: official-doc
    relevance: Pre-commit hooks blocking secret patterns with non-zero exit on match.
  - id: trufflehog-docs
    title: TruffleHog Secret Scanning
    url: https://github.com/trufflesecurity/trufflehog
    source_type: official-doc
    relevance: Verified secret detection in git, filesystem, and CI pre-commit.
  - id: github-secret-scanning
    title: GitHub Secret Scanning and Push Protection
    url: https://docs.github.com/en/code-security/secret-scanning
    source_type: official-doc
    relevance: Server-side push blocking as commit gate evidence.
  - id: pre-commit-framework
    title: pre-commit framework
    url: https://pre-commit.com/
    source_type: official-doc
    relevance: Orchestrates git-secrets, TruffleHog, and custom staged-change gates.
  - id: safety-commit-design
    title: Moonweave safety-commit-redaction module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: CommitGate as capability separating request, outcome, and SideEffect.
source_claims:
  - id: claim-commit-gate-git-secrets
    source: git-secrets-awslabs
    supports: git-secrets hooks exit non-zero when prohibited patterns are found, mapping to CommitGate deny before SideEffect.
    locator: git-secrets README > commit hooks
    evidence_kind: official
    confidence: high
  - id: claim-commit-gate-trufflehog
    source: trufflehog-docs
    supports: TruffleHog verified secret scans in pre-commit/CI provide CommitGate scanner evidence blocking push SideEffects.
    locator: TruffleHog docs > verified secrets
    evidence_kind: official
    confidence: high
  - id: claim-commit-gate-github
    source: github-secret-scanning
    supports: GitHub push protection blocks server-side pushes with exposed secrets, forming a second CommitGate line.
    locator: Push protection documentation
    evidence_kind: official
    confidence: high
  - id: claim-commit-gate-design
    source: safety-commit-design
    supports: Moonweave models CommitGate as the capability evaluating CommitRequest before SideEffect with hook exit code semantics.
    locator: safety-commit-redaction module boundary
    evidence_kind: design-inference
    confidence: high
