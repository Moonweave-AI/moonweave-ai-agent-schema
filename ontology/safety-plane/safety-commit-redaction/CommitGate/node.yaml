    source: eng-fw-openai-hitl
    supports: OpenAI's HITL flow pauses sensitive tool calls before execution and resumes them after an approval decision. Moonweave specializes the broader Gate concept for this side-effect commit responsibility.
    locator: Human-in-the-loop > How the approval flow works, steps 1–5
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-commit-gate-002
    source: eng-fw-openai-hitl
    supports: OpenAI documents needs_approval, ToolApprovalItem interruptions, RunState serialization, approve or reject, and resumption of the original run.
    locator: Human-in-the-loop > How the approval flow works, steps 1–5
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-commit-gate-003
    source: eng-fw-openai-guardrails
    supports: OpenAI distinguishes input tool guardrails that run immediately before execution from output tool guardrails that run after execution, grounding this temporal boundary.
    locator: Guardrails > Tool guardrails > input and output tool guardrails
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-commit-gate-004
    source: eng-fw-openai-hitl
