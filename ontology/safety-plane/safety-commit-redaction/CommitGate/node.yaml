          en: The request remains pending and no policy decision is invented from the risk signal.
          ja: 要求は保留中のまま、risk signal から policy 判断を捏造しません。
        why_valid_or_invalid:
          zh: 输入证据与裁决结果是不同信息对象；只有完成评估才建立该边。
          en: Input evidence and adjudication outcome are different information objects; the edge exists only after evaluation completes.
          ja: 入力証拠と裁定結果は異なる情報 object で、評価完了後だけこの辺が成立します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-commit-gate-005
    source_claims:
