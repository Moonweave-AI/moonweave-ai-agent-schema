    source: eng-fw-openai-hitl
    supports: OpenAI's approval flow turns one pending tool interruption into an approve or reject decision before resumption; Moonweave records the gate's emitted PolicyDecision as a causal outcome.
    locator: Human-in-the-loop > How the approval flow works, steps 1–5
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
