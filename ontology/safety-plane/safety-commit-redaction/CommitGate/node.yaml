      en: Every CommitGate is a Gate, distinguished by holding a CommitRequest before external side-effect execution, obtaining an allow or deny decision, and resuming the original run.
      ja: すべての CommitGate は Gate であり、外部副作用実行前に CommitRequest を保持し、allow/deny 判断を得て元実行を再開する点を種差とします。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 分类继承不使用实例关系基数。
      en: Taxonomic inheritance does not use instance-relation cardinality.
      ja: 分類継承にはインスタンス関係の基数を用いません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 反向：是一种
        en: has subtype
        ja: 逆方向：の一種である
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
