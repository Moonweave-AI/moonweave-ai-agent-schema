schema: moonweave.ai/ontology-node/v1
id: CommitGate
kind: concept
status: review
labels:
  zh: 副作用提交闸门
  en: side-effect commit gate
  ja: 副作用コミットゲート
semantics:
  short_definition:
    zh: 在外部副作用执行前暂停并裁决提交请求的控制闸门。
    en: A control gate that pauses and decides a commit request before an external side effect executes.
    ja: 外部副作用の実行前に確定要求を停止し判断する制御ゲート。
  definition:
    zh: 副作用提交闸门是一种 Gate 能力，其种差是在潜在外部变更发生前识别具体 CommitRequest，执行适用的输入检查与授权流程，并只在获得 CommitApproval 时释放调用，或在 CommitDenial 时阻断调用；它不是请求、决定或执行后的验证器。
    en: CommitGate is a Gate capability distinguished by identifying a concrete CommitRequest before a potential external mutation, running applicable input checks and authorization, and releasing the call only on CommitApproval or blocking it on CommitDenial; it is neither the request, the decision, nor a post-execution verifier.
    ja: CommitGate は Gate 能力の一種であり、外部変更の前に具体的 CommitRequest を識別し、適用される入力検査と認可を行い、CommitApproval の場合だけ呼出しを解放し、CommitDenial なら阻止します。要求、判断、実行後検証器ではありません。
  why_needed:
    zh: 把闸门建模为能力而非决定，可明确谁执行暂停、检查与恢复协议，并让请求、裁决和真实效果在时间与责任上保持分离。
    en: Modeling the gate as a capability rather than a decision identifies what performs pause, checks, and resume, while keeping request, adjudication, and actual effect separate in time and responsibility.
    ja: ゲートを判断ではなく能力として表すことで、停止、検査、再開を担うものを明確にし、要求、裁定、実効果を時間と責任で分離できます。
  includes:
    - zh: 针对文件写入、退款、发送邮件、仓库提交或其他可观察变更，在执行前触发并持有运行状态的人工审批或策略闸门。
      en: Human-approval or policy gates that trigger before file writes, refunds, emails, repository commits, or other observable mutations and retain resumable run state.
      ja: ファイル書込み、返金、メール送信、リポジトリ確定などの可観測変更前に発火し、再開可能な実行状態を保持する人手承認またはポリシーゲート。
  excludes:
    - zh: 只产生风险分数的扫描器、执行后的输出 guardrail、CommitApproval/CommitDenial 决定记录，以及真正执行副作用的工具。
      en: A scanner that only scores risk, a post-execution output guardrail, CommitApproval or CommitDenial records, and the tool that actually performs the side effect.
      ja: リスク点だけを出すスキャナ、実行後の出力 guardrail、CommitApproval/CommitDenial 記録、副作用を実行するツール。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: CommitGate-example-positive-001
    kind: positive
    labels:
      zh: 邮件发送闸门
      en: Email-send gate
      ja: メール送信ゲート
    scenario_id: null
    descriptions:
      zh: send_email 调用被标记 needs_approval；运行器在发送前产生 ToolApprovalItem 并序列化 RunState，直到审核员批准或拒绝。
      en: A send_email call marked needs_approval causes the runner to emit a ToolApprovalItem and serialize RunState before sending, waiting for a reviewer to approve or reject.
      ja: needs_approval の send_email 呼出しに対し、runner は送信前に ToolApprovalItem を生成して RunState を直列化し、審査者の承認または拒否を待ちます。
    field_values:
      gate_id: commit-gate-send-email
      gate_kind: human-approval-before-side-effect
      decision_function_ref: commit-approval-policy/send-email@1
      version: "1"
    related_node_ids:
      - CommitGate
      - CommitRequest
      - CommitApproval
      - CommitDenial
    related_relation_ids:
      - CommitRequest-evaluated_by-CommitGate
      - CommitGate-may_produce-CommitApproval
      - CommitGate-may_produce-CommitDenial
    expected_result:
      zh: 邮件工具在批准前不运行；决定写入原运行状态后从中断点继续。
      en: The email tool does not run before approval; after the decision enters the original run state, execution resumes from the interruption.
      ja: 承認前にメールツールは実行されず、判断を元の実行状態へ記録した後、中断点から再開します。
    why_valid_or_invalid:
      zh: 该能力同时具备执行前暂停、请求识别、决策分支和状态恢复，符合提交闸门而非单独 guardrail。
      en: The capability combines pre-execution pause, request identity, decision branching, and state resume, satisfying a commit gate rather than a standalone guardrail.
      ja: 実行前停止、要求識別、判断分岐、状態再開を備え、単独 guardrail ではなく確定ゲートです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-commit-gate-002
  - id: CommitGate-example-boundary-001
    kind: boundary
    labels:
      zh: 输出检查边界
      en: Output-check boundary
      ja: 出力検査の境界
    scenario_id: null
    descriptions:
      zh: 工具已经返回内容后，输出 guardrail 发现凭据并替换结果；它保护披露，但没有在副作用执行前暂停 CommitRequest。
      en: After a tool returns content, an output guardrail detects credentials and replaces the result; it protects disclosure but did not pause a CommitRequest before a side effect executed.
      ja: ツール返却後に出力 guardrail が資格情報を検出して結果を置換します。開示は保護しますが、副作用実行前の CommitRequest を停止していません。
    field_values: {}
    related_node_ids:
      - CommitGate
      - DisclosureControlActivity
      - Gate
    related_relation_ids: []
    expected_result:
      zh: 该组件保留为输出控制活动，不归类为 CommitGate。
      en: The component remains an output-control activity and is not classified as CommitGate.
      ja: この構成要素は出力制御活動のままで CommitGate に分類されません。
    why_valid_or_invalid:
      zh: 提交闸门的必要时间边界是副作用执行前；事后输出检查回答的是不同控制问题。
      en: A commit gate necessarily acts before side-effect execution; post-hoc output checking answers a different control question.
      ja: 確定ゲートは副作用実行前に作用する必要があり、事後出力検査は別の制御問題です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-commit-gate-003
  - id: CommitGate-example-instance-001
    kind: instance
    labels:
      zh: 可恢复提交闸门状态
      en: Resumable commit-gate state
      ja: 再開可能な確定ゲート状態
    scenario_id: null
    descriptions:
      zh: gate_state=cg_44 保存 run_id=run_12、call_id=call_82、phase=pending_approval、policy=refund-policy@4 和 interruption_version=3。
      en: gate_state=cg_44 stores run_id=run_12, call_id=call_82, phase=pending_approval, policy=refund-policy@4, and interruption_version=3.
      ja: gate_state=cg_44 は run_id=run_12、call_id=call_82、phase=pending_approval、policy=refund-policy@4、interruption_version=3 を保存します。
    field_values: {}
    related_node_ids:
      - CommitGate
    related_relation_ids: []
    expected_result:
      zh: 恢复 run_12 时继续等待 call_82 的决定，而不是重新执行或创建第二个调用。
      en: Resuming run_12 continues waiting for call_82's decision rather than executing or creating a duplicate call.
      ja: run_12 の再開時は call_82 の判断待ちを継続し、実行や重複呼出しを行いません。
    why_valid_or_invalid:
      zh: 实例记录闸门身份、被闸调用、阶段、适用策略和版本，可安全恢复控制流程。
      en: The instance records gate identity, gated call, phase, policy, and version, enabling safe control-flow resumption.
      ja: ゲート同一性、対象呼出し、段階、ポリシー、版を記録し、安全な制御フロー再開を可能にします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-commit-gate-004
