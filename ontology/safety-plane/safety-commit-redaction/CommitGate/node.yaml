relations:
  - id: commit_gate_emits_policy_decision
    predicate: commit_gate_emits_policy_decision
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 生成策略决定
      en: emits policy decision
      ja: policy 判断を生成
    definitions:
      zh: 副作用提交闸门完成对一个提交请求的评估后生成相应 PolicyDecision；决定是评估结果，不是闸门的组成部分或上位类。
      en: After CommitGate evaluates one commit request, it emits the corresponding PolicyDecision; the decision is an outcome of evaluation, not a component or superclass of the gate.
      ja: CommitGate が一件の確定要求を評価した後、対応する PolicyDecision を生成します。判断は評価結果であり、ゲートの構成要素や上位概念ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_commit_gate_emits_policy_decision
      labels:
        zh: 反向：commit gate emits policy decision
        en: is target of commit gate emits policy decision
        ja: 逆方向：commit gate emits policy decision
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: commit_gate_emits_policy_decision-example-positive-001
        kind: positive
        labels:
          zh: 退款审批决定
          en: Refund approval decision
          ja: 返金承認判断
        scenario_id: null
        descriptions:
          zh: gate cg_44 评估 call_82 后生成 allow decision pd_82，并把其范围限制为订单 913 与金额 100。
          en: After evaluating call_82, gate cg_44 emits allow decision pd_82 scoped to order 913 and amount 100.
          ja: gate cg_44 は call_82 評価後、注文 913・金額 100 に限定した allow decision pd_82 を生成します。
        field_values: {}
        related_node_ids:
          - CommitGate
          - PolicyDecision
        related_relation_ids:
          - commit_gate_emits_policy_decision
        expected_result:
          zh: pd_82 成为该请求的唯一当前策略决定，闸门仍保持 capability 类型。
          en: pd_82 becomes the request's current policy decision while the gate remains a capability.
          ja: pd_82 は要求の現在 policy 判断となり、gate は capability のままです。
        why_valid_or_invalid:
          zh: 决定在评估之后产生并具有独立身份，符合由闸门产生结果的因果方向。
          en: The decision arises after evaluation with independent identity, matching the gate-to-result causal direction.
          ja: 判断は評価後に独立 ID で生じ、gate から結果への因果方向に一致します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-commit-gate-005
      - id: commit_gate_emits_policy_decision-example-boundary-001
        kind: boundary
        labels:
          zh: 风险信号边界
          en: Risk-signal boundary
          ja: risk signal の境界
        scenario_id: null
        descriptions:
          zh: 扫描器给 call_82 标记 risk=high，但闸门尚未应用策略或作出 allow/deny；风险信号不是已生成的 PolicyDecision。
          en: A scanner marks call_82 risk=high, but the gate has not applied policy or decided allow or deny; the risk signal is not an emitted PolicyDecision.
          ja: scanner は call_82 を risk=high としますが、gate は policy 適用や allow/deny 判断をしていません。risk signal は生成済み PolicyDecision ではありません。
        field_values: {}
        related_node_ids:
          - CommitGate
          - PolicyDecision
        related_relation_ids:
          - commit_gate_emits_policy_decision
        expected_result:
