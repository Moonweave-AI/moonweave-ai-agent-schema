schema: moonweave.ai/ontology-node/v1
id: CommitRequest
kind: concept
status: accepted
labels:
  en: commit request
  zh: 提交请求
  ja: コミット要求
semantics:
  short_definition:
    zh: 描述一个尚未执行、可能产生外部副作用的提交候选请求。
    en: An information record describing one not-yet-executed candidate external side effect.
    ja: 未実行で外部副作用を生じ得る一件の確定候補要求を記述する情報記録。
  definition:
    zh: 提交请求是一种独立的信息记录，封装拟执行的变更动作、具体参数、目标资源、调用或请求标识、请求主体、风险上下文与可选幂等键，使 CommitGate 能在动作发生前评估它；它不是 ToolCall 活动本身，也不是批准、拒绝或实际效果。
    en: CommitRequest is an independent information record that packages a proposed mutation, concrete arguments, target resource, call or request identifier, requesting subject, risk context, and optional idempotency key for CommitGate evaluation before execution; it is not the ToolCall activity, an approval or denial, or the actual effect.
    ja: CommitRequest は独立した情報記録であり、提案変更、具体引数、対象資源、call/request ID、要求主体、リスク文脈、任意の冪等キーをまとめ、実行前に CommitGate が評価できるようにします。ToolCall 活動、承認、拒否、実効果ではありません。
  why_needed:
    zh: 将候选变更保存为可寻址请求，审批者才能看到将要执行的确切对象和参数，闸门才能在暂停与恢复之间保持同一请求，并防止批准被错误套用到修改后的调用。
    en: Making the candidate mutation an addressable request lets reviewers see the exact target and arguments, preserves identity across pause and resume, and prevents approval from being applied to a modified call.
    ja: 候補変更をアドレス可能な要求として保存することで、審査者は対象と引数を確認でき、停止と再開の間で同一性を維持し、変更後の呼出しへの承認誤用を防げます。
  includes:
    - zh: 具有稳定请求或 call ID，并完整描述拟议文件写入、外部 API 变更、网络配置、消息发送、记忆写入或披露释放的待判定记录。
      en: Pending records with a stable request or call ID that fully describe a proposed file write, external API mutation, network change, message send, memory write, or disclosure release.
      ja: 安定した request/call ID を持ち、提案されたファイル書込み、外部 API 変更、ネットワーク変更、送信、メモリ書込み、開示を完全に記述する保留記録。
  excludes:
    - zh: 只读查询、已经开始的 ToolCall 活动、策略规则、审批决定、工具结果以及已发生的 SideEffect。
      en: Read-only queries, a ToolCall activity already underway, policy rules, approval decisions, tool results, and an already-occurred SideEffect.
      ja: 読取専用照会、開始済み ToolCall 活動、ポリシー規則、承認判断、ツール結果、発生済み SideEffect。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - commit_request_id
  fields:
    - id: commit_request_id
      labels:
        zh: 提交请求标识
        en: commit-request ID
        ja: 確定要求 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定且唯一地标识一份参数已冻结、尚未执行的提交请求快照；目标或参数改变时必须使用新标识。
        en: Stable unique identifier for one frozen, not-yet-executed commit-request snapshot; a target or argument change requires a new identifier.
        ja: 対象または引数変更時に新しい ID を要する、凍結済み未実行の確定要求スナップショットの安定一意 ID です。
      allowed_values: []
      pattern: null
      example_value: commit-request-cr-57
      source_claims:
        - claim-commit-request-002
    - id: call_id
      labels:
        zh: 调用标识
        en: tool-call ID
        ja: tool call ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 审批规则所针对且仍未执行的具体工具调用标识。
        en: Identifier of the concrete, still-unexecuted tool call subject to approval.
        ja: 承認対象となる、まだ実行されていない具体的 tool call の ID です。
      allowed_values: []
      pattern: null
      example_value: call_57
      source_claims:
        - claim-commit-request-003
    - id: operation
      labels:
        zh: 候选操作
        en: proposed operation
        ja: 候補操作
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 若获允许将执行的确切工具操作或外部变更动作。
        en: Exact tool operation or external mutation that would execute if allowed.
        ja: 許可された場合に実行される正確な tool operation または外部変更です。
      allowed_values: []
      pattern: null
      example_value: git_commit
      source_claims:
        - claim-commit-request-004
    - id: target_ref
      labels:
        zh: 目标资源引用
        en: target-resource reference
        ja: 対象 resource 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 候选副作用将修改、发送到或释放到的具体资源版本或端点。
        en: Concrete resource revision or endpoint that the proposed side effect would modify, send to, or release to.
        ja: 候補副作用が変更・送信・開示する具体的 resource revision または endpoint です。
      allowed_values: []
      pattern: null
      example_value: repo:moonweave/branch:review/safety-boundary
      source_claims:
        - claim-commit-request-005
    - id: arguments
      labels:
        zh: 规范化参数
        en: normalized arguments
        ja: 正規化引数
      datatype: json
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 提交请求形成时冻结的完整、规范化工具参数对象。
        en: Complete normalized tool-argument object frozen when the commit request is formed.
        ja: 確定要求形成時に凍結された完全な正規化 tool argument object です。
      allowed_values: []
      pattern: null
      example_value:
        files:
          - ontology/safety-plane/safety-commit-redaction/CommitGate/node.yaml
          - ontology/safety-plane/safety-commit-redaction/CommitGate/CommitRequest/node.yaml
          - ontology/safety-plane/safety-commit-redaction/SideEffect/node.yaml
        message: clarify commit-gate boundary
      source_claims:
        - claim-commit-request-006
    - id: argument_digest
      labels:
        zh: 参数摘要
        en: argument digest
        ja: 引数 digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规范化参数对象的完整性摘要，用于核对审批与执行前快照一致。
        en: Integrity digest of the normalized argument object used to match the reviewed and pre-execution snapshots.
        ja: 審査時と実行前のスナップショット一致を照合する正規化引数の integrity digest です。
      allowed_values: []
      pattern: null
      example_value: sha256:aa71
      source_claims:
        - claim-commit-request-007
    - id: requesting_actor_ref
      labels:
        zh: 请求主体引用
        en: requesting-actor reference
        ja: 要求主体参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 产生或代表该候选提交请求的认证主体。
        en: Authenticated actor that produced or is represented by the proposed commit request.
        ja: 候補確定要求を生成した、またはそれにより代表される認証済み actor です。
      allowed_values: []
      pattern: null
      example_value: actor_4
      source_claims:
        - claim-commit-request-008
    - id: prepared_at
      labels:
        zh: 准备时间
        en: prepared at
        ja: 準備時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 候选操作及其参数被冻结并进入提交门处理的 UTC 时间。
        en: UTC instant when the proposed operation and arguments were frozen for commit-gate processing.
        ja: 候補操作と引数が凍結され commit gate 処理へ入った UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T09:55:00Z
      source_claims:
        - claim-commit-request-009
    - id: risk_context_ref
      labels:
        zh: 风险上下文引用
        en: risk-context reference
        ja: risk context 参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 解释该调用为何进入提交门的风险评估、策略上下文或发现引用。
        en: Reference to the risk assessment, policy context, or finding that explains why the call entered a commit gate.
        ja: call が commit gate に入った理由を説明する risk assessment・policy context・finding 参照です。
      allowed_values: []
      pattern: null
      example_value: risk-context/repository-write
      source_claims:
        - claim-commit-request-010
    - id: idempotency_key
      labels:
        zh: 幂等键
        en: idempotency key
        ja: 冪等 key
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 用于识别同一候选变更重试并防止重复外部效果的可选键。
        en: Optional key used to recognize retries of the same proposed mutation and prevent duplicate external effects.
        ja: 同じ候補変更の retry を識別し重複外部効果を防ぐ任意 key です。
      allowed_values: []
      pattern: null
      example_value: commit:57
      source_claims:
        - claim-commit-request-011
  constraints:
    - id: commit-request-frozen-payload
      severity: error
      expression_language: plain
      expression: operation, target_ref, arguments, and argument_digest are immutable for commit_request_id; any change creates a new commit_request_id
      explanations:
        zh: 同一提交请求标识不得在审批后换用其他操作、目标或参数；变化必须形成新请求。
        en: One commit-request ID cannot be rebound to another operation, target, or argument set after review; a change forms a new request.
        ja: 同一 commit-request ID を審査後に別操作・対象・引数へ再束縛せず、変更時は新要求を作ります。
      source_claims:
        - claim-commit-request-012
    - id: commit-request-pre-execution-boundary
      severity: error
      expression_language: plain
      expression: CommitRequest records a proposed mutation before execution and MUST NOT contain a realized-effect or success assertion
      explanations:
        zh: 提交请求只描述执行前候选变更；已发生效果属于 SideEffect，批准或拒绝属于门控结果。
        en: CommitRequest describes only a pre-execution candidate; an occurred effect is SideEffect and an approval or denial is a gate outcome.
        ja: CommitRequest は実行前候補のみを表し、発生済み効果は SideEffect、承認・拒否は gate outcome です。
      source_claims:
        - claim-commit-request-013
  required_relation_constraints:
    - id: commit-request-evaluated-by-commit-gate
      direction: outgoing
      predicate: evaluated_by
      target_concept_id: CommitGate
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 每份提交请求必须由至少一个提交门按冻结参数处理；多门串联时保留每次处理事实。
        en: Each CommitRequest must be processed by at least one CommitGate against its frozen arguments; multiple sequential gates retain separate processing facts.
        ja: 各 CommitRequest は凍結引数に対して少なくとも一つの CommitGate で処理し、複数 gate の各事実を保持します。
      source_claims:
        - claim-commit-request-014
examples:
  - id: CommitRequest-example-positive-001
    kind: positive
    labels:
      zh: 仓库提交请求
      en: Repository commit request
      ja: リポジトリ確定要求
    scenario_id: null
    descriptions:
      zh: request cr_57 提议把三处已列明的 YAML 节点变更提交到 review/safety-boundary 分支，记录 diff 摘要、仓库路径、提交消息、主体 actor_4 与幂等键 commit:57；尚未调用 git commit。
      en: Request cr_57 proposes committing three enumerated YAML-node changes to branch review/safety-boundary and records the diff digest, repository path, commit message, subject actor_4, and idempotency key commit:57; git commit has not run.
      ja: request cr_57 は列挙した三つの YAML node 変更を branch review/safety-boundary へ確定する提案で、diff 要約、repository path、commit message、主体 actor_4、冪等キー commit:57 を記録します。git commit は未実行です。
    field_values:
      commit_request_id: commit-request-cr-57
      call_id: call_57
      operation: git_commit
      target_ref: repo:moonweave/branch:review/safety-boundary
      arguments:
        files:
          - ontology/safety-plane/safety-commit-redaction/CommitGate/node.yaml
          - ontology/safety-plane/safety-commit-redaction/CommitGate/CommitRequest/node.yaml
          - ontology/safety-plane/safety-commit-redaction/SideEffect/node.yaml
        message: clarify commit-gate boundary
      argument_digest: sha256:aa71
      requesting_actor_ref: actor_4
      prepared_at: 2026-07-14T09:55:00Z
      risk_context_ref: risk-context/repository-write
      idempotency_key: commit:57
    related_node_ids:
      - CommitRequest
      - CommitGate
      - SideEffect
    related_relation_ids:
      - CommitRequest-evaluated_by-CommitGate
    expected_result:
      zh: 闸门可以按 cr_57 的冻结参数生成批准或拒绝，参数变更则形成新的请求版本。
      en: The gate can decide the frozen parameters of cr_57; changed parameters create a new request version.
      ja: ゲートは cr_57 の凍結引数を判断でき、引数変更時は新しい要求版を作成します。
    why_valid_or_invalid:
      zh: 记录具有候选动作、精确目标、参数摘要、主体和执行前状态，满足可评估提交请求的边界。
      en: The record has a proposed action, exact target, argument digest, subject, and pre-execution status, satisfying the evaluable request boundary.
      ja: 候補動作、正確な対象、引数要約、主体、実行前状態を持ち、評価可能な確定要求の境界を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-commit-request-015
  - id: CommitRequest-example-boundary-001
    kind: boundary
    labels:
      zh: 只读检索边界
      en: Read-only retrieval boundary
      ja: 読取専用検索の境界
    scenario_id: null
    descriptions:
      zh: search_documents(query="refund policy") 只读取已授权索引且没有写入、发送或外部状态变更；普通调用记录不自动成为 CommitRequest。
      en: search_documents(query="refund policy") reads an authorized index without writing, sending, or changing external state; an ordinary call record does not automatically become CommitRequest.
      ja: search_documents(query="refund policy") は承認済み索引を読むだけで、書込み、送信、外部状態変更がありません。通常の呼出し記録は自動的に CommitRequest になりません。
    field_values: {}
    related_node_ids:
      - CommitRequest
      - ToolCall
    related_relation_ids: []
    expected_result:
      zh: 该调用沿普通执行路径处理，除非具体部署另有需要审批的风险策略。
      en: The call follows the ordinary execution path unless deployment policy separately requires approval for its risk.
      ja: この呼出しは、配備ポリシーが別途承認を要求しない限り通常経路で処理されます。
    why_valid_or_invalid:
      zh: 提交请求以候选副作用为必要条件；只有工具调用身份而没有外部变更意图不足以归类。
      en: A proposed side effect is necessary for CommitRequest; tool-call identity without mutation intent is insufficient.
      ja: 候補副作用が CommitRequest の必要条件であり、変更意図のないツール呼出しだけでは不足です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-commit-request-016
  - id: CommitRequest-example-instance-001
    kind: instance
    labels:
      zh: 冻结参数请求记录
      en: Frozen-argument request record
      ja: 凍結引数要求記録
    scenario_id: null
    descriptions:
      zh: cr_57 保存 call_id=call_57、operation=git_commit、target=repo:moonweave/branch:review/safety-boundary、args_digest=sha256:aa71、subject=actor_4、idempotency_key=commit:57。
      en: cr_57 stores call_id=call_57, operation=git_commit, target=repo:moonweave/branch:review/safety-boundary, args_digest=sha256:aa71, subject=actor_4, and idempotency_key=commit:57.
      ja: cr_57 は call_id=call_57、operation=git_commit、target=repo:moonweave/branch:review/safety-boundary、args_digest=sha256:aa71、subject=actor_4、idempotency_key=commit:57 を保存します。
    field_values:
      commit_request_id: commit-request-cr-57
      call_id: call_57
      operation: git_commit
      target_ref: repo:moonweave/branch:review/safety-boundary
      arguments:
        files:
          - ontology/safety-plane/safety-commit-redaction/CommitGate/node.yaml
          - ontology/safety-plane/safety-commit-redaction/CommitGate/CommitRequest/node.yaml
          - ontology/safety-plane/safety-commit-redaction/SideEffect/node.yaml
        message: clarify commit-gate boundary
      argument_digest: sha256:aa71
      requesting_actor_ref: actor_4
      prepared_at: 2026-07-14T09:55:00Z
      risk_context_ref: risk-context/repository-write
      idempotency_key: commit:57
    related_node_ids:
      - CommitRequest
    related_relation_ids: []
    expected_result:
      zh: 批准必须引用 cr_57 或 call_57 并匹配 args_digest；不匹配时闸门重新请求决定。
      en: Approval must reference cr_57 or call_57 and match args_digest; a mismatch asks the gate for a new decision.
      ja: 承認は cr_57 または call_57 を参照し args_digest と一致し、不一致ならゲートが再判断を要求します。
    why_valid_or_invalid:
      zh: 稳定身份和冻结参数使请求可在异步审批、持久化与恢复中保持同一。
      en: Stable identity and frozen arguments preserve the request across asynchronous review, persistence, and resume.
      ja: 安定した同一性と凍結引数により、非同期審査、永続化、再開を通じて要求を同一に保てます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-commit-request-017
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: CommitRequest-evaluated_by-CommitGate
  predicate: evaluated_by
  direction: source-to-target
  relation_kind: governance
  labels:
    zh: 由提交闸门评估
    en: evaluated by commit gate
    ja: CommitGate により評価
  definitions:
    zh: 一个 CommitRequest 被指定 CommitGate 读取并按当时策略、授权上下文与风险证据评估；该处理关系不表示请求是闸门的组成部分或子类。
    en: A CommitRequest is read and evaluated by a designated CommitGate under current policy, authority context, and risk evidence; this processing relation does not make the request a component or subtype of the gate.
    ja: CommitRequest は指定 CommitGate により現在 policy、権限文脈、risk 証拠の下で読取・評価されます。この処理関係は要求を gate の構成要素や下位概念にしません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
    en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
    ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: evaluates_commit_request
    labels:
      zh: 评估提交请求
      en: evaluates commit request
      ja: コミット要求を評価する
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: CommitRequest-evaluated_by-CommitGate-example-positive-001
      kind: positive
      labels:
        zh: 退款请求评估
        en: Refund-request evaluation
        ja: 返金要求評価
      scenario_id: null
      descriptions:
        zh: cr_82 将 call_82、订单、金额与参数摘要交给 cg_44；cg_44 应用 refund-policy@4 并请求人工批准。
        en: cr_82 gives call_82, order, amount, and argument digest to cg_44, which applies refund-policy@4 and requests human approval.
        ja: cr_82 は call_82、注文、金額、引数要約を cg_44 へ渡し、cg_44 は refund-policy@4 を適用し人手承認を求めます。
      field_values: {}
      related_node_ids:
        - CommitRequest
        - CommitGate
      related_relation_ids:
        - CommitRequest-evaluated_by-CommitGate
      expected_result:
        zh: 评估保留 cr_82 身份并产生独立决定，不改写请求内容。
        en: Evaluation preserves cr_82 identity and produces a separate decision without rewriting the request.
        ja: 評価は cr_82 の同一性を保持し、要求内容を書き換えず別判断を生成します。
      why_valid_or_invalid:
        zh: 请求作为输入，闸门作为处理 capability，方向和角色清楚。
        en: The request is input and the gate is processing capability, with clear direction and roles.
        ja: 要求が入力、gate が処理 capability で方向と役割が明確です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-commit-request-018
    - id: CommitRequest-evaluated_by-CommitGate-example-boundary-001
      kind: boundary
      labels:
        zh: 分类父链边界
        en: Taxonomy-parent boundary
        ja: 分類親の境界
      scenario_id: null
      descriptions:
        zh: cr_82 被 cg_44 评估不意味着 CommitRequest 是 CommitGate；两者 semantic kind 分别为 information 与 capability。
        en: cr_82 being evaluated by cg_44 does not make CommitRequest a CommitGate; their semantic kinds are information and capability.
        ja: cr_82 が cg_44 に評価されても CommitRequest は CommitGate ではなく、semantic kind は information と capability です。
      field_values: {}
      related_node_ids:
        - CommitRequest
        - CommitGate
      related_relation_ids:
