schema: moonweave.ai/ontology-node/v1
id: CommitRequest
kind: concept
labels:
  zh: 提交请求
  en: commit request
  ja: コミット要求
semantics:
  short_definition:
    zh: 描述一次尚未执行、可能产生外部副作用的冻结候选变更。
    en: A frozen candidate mutation not yet executed that may produce an external side effect.
    ja: 未実行で外部副作用を生じ得る凍結候補変更の記述。
  definition:
    zh: CommitRequest 是独立信息记录，封装拟执行操作、具体参数、目标资源、call/request 标识、请求主体、风险上下文与可选 idempotency_key，供 CommitGate 在 git-secrets/TruffleHog 扫描或人工审批前评估。它不是 ToolCall 活动、CommitApproval/CommitDenial 或 SideEffect；ToolResult 成功也不证明外部状态已改变。
    en: "CommitRequest is an independent information record packaging a proposed operation, concrete arguments, target resource, call or request identifier, requesting subject, risk context, and optional idempotency_key for CommitGate evaluation before git-secrets/TruffleHog scans or human review. It is not a ToolCall activity, CommitApproval/CommitDenial, or SideEffect; a successful ToolResult does not prove external state changed."
    ja: CommitRequest は独立情報 record で、提案 operation/具体引数/対象 resource/call/request ID/要求主体/risk context/任意 idempotency_key を封装し git-secrets/TruffleHog scan または human review 前に CommitGate が評価。ToolCall 活動、CommitApproval/CommitDenial、SideEffect ではなく ToolResult 成功は外部状態変更を証明しません。
  why_needed:
    zh: 将候选变更保存为可寻址请求，pre-commit 扫描与审批者才能看到将要执行的确切对象，并在暂停与恢复之间保持同一 identity，防止批准套用到修改后的调用。
    en: Making the candidate mutation addressable lets pre-commit scans and reviewers see the exact target and preserves identity across pause and resume, preventing approval from applying to a modified call.
    ja: 候補変更を addressable request として保存すると pre-commit scan/審査者が exact target を確認でき pause/resume 間で identity を保持し、変更後 call への承認誤用を防げます。
  includes:
    - zh: 具有稳定 request/call ID，完整描述拟议文件写入、外部 API 变更、邮件发送、仓库 push 或退款的待判定记录。
      en: Pending records with stable request or call ID fully describing proposed file write, external API mutation, email send, repository push, or refund.
      ja: 安定 request/call ID を持ち proposed file write/external API mutation/email send/repository push/refund を完全記述する pending record。
  excludes:
    - zh: 只读查询、已开始 ToolCall、策略规则、审批决定、ToolResult 与已发生 SideEffect。
      en: Read-only queries, started ToolCall, policy rules, approval decisions, ToolResult, and occurred SideEffect.
      ja: read-only query、開始済み ToolCall、policy rule、approval decision、ToolResult、発生済み SideEffect。
  semantic_kind: information
  aliases: []
engineering:
  explanation:
    zh: 映射：Agent needs_approval 暂停的 ToolApprovalItem → CommitRequest；staged git commit 含 files[] 与 message → CommitRequest operation=git_commit；退款 API 调用前 → CommitRequest effect_target=payment-gateway/refund。参数变更必须新 commit_request_id 与 argument_digest。
    en: "Mapping: Agent needs_approval ToolApprovalItem → CommitRequest; staged git commit with files[] and message → CommitRequest operation=git_commit; before refund API → CommitRequest effect_target=payment-gateway/refund. Argument changes require new commit_request_id and argument_digest."
    ja: mapping：Agent needs_approval ToolApprovalItem → CommitRequest；staged git commit files[]/message → CommitRequest operation=git_commit；refund API 前 → CommitRequest effect_target=payment-gateway/refund。引数変更は新 commit_request_id/argument_digest 必須。
  typical_input:
    - description: Staged repository commit candidate.
      format: |
        commit_request_id: cr_57
        operation: git_commit
        target_ref: repo:moonweave/branch:review/safety-boundary
        argument_digest: sha256:aa71
      source_claims:
        - claim-commit-request-design
    - description: Refund mutation before payment gateway call.
      format: |
        commit_request_id: cr_82
        operation: refund_order
        idempotency_key: refund:913:1
        argument_digest: sha256:91ab
      source_claims:
        - claim-commit-request-design
  typical_output:
    - description: CommitRequest evaluated by CommitGate.
      format: |
        commit_request_id: cr_82
        evaluated_by: cg_44
        gate_result: pending_approval
      source_claims:
        - claim-commit-request-design
  reference_implementations:
    - name: git-secrets (AWS Labs)
      url: https://github.com/awslabs/git-secrets
      description: Pre-commit evaluation target for staged secret patterns.
    - name: TruffleHog
      url: https://github.com/trufflesecurity/trufflehog
      description: Filesystem/git scan input for staged changes.
    - name: pre-commit framework
      url: https://pre-commit.com/
      description: Staged-change gate orchestration before commit SideEffect.
structure:
  identity_keys:
    - commit_request_id
  fields:
    - id: commit_request_id
      labels:
        zh: 提交请求标识
        en: commit-request ID
        ja: 確定要求 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定唯一标识一份参数已冻结、尚未执行的提交请求快照。
        en: Stable unique identifier for one frozen, not-yet-executed commit-request snapshot.
        ja: 凍結済み未実行 commit-request snapshot の安定一意 ID。
      allowed_values: []
      pattern: null
      example_value: cr_57
      source_claims:
        - claim-commit-request-design
    - id: call_id
      labels:
        zh: 调用标识
        en: tool-call ID
        ja: tool call ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 审批规则所针对且仍未执行的具体工具调用标识。
        en: Identifier of the concrete, still-unexecuted tool call subject to approval.
        ja: 承認対象の未実行具体 tool call ID。
      allowed_values: []
      pattern: null
      example_value: call_57
      source_claims:
        - claim-commit-request-design
    - id: operation
      labels:
        zh: 候选操作
        en: proposed operation
        ja: 候補操作
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 若获允许将执行的确切工具操作或外部变更动作。
        en: Exact tool operation or external mutation that would execute if allowed.
        ja: 許可時に実行される exact tool operation または external mutation。
      allowed_values: []
      pattern: null
      example_value: git_commit
      source_claims:
        - claim-commit-request-design
    - id: argument_digest
      labels:
        zh: 参数摘要
        en: argument digest
        ja: 引数 digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 提交请求形成时冻结参数规范化表示的完整性摘要。
        en: Integrity digest of normalized arguments frozen when the commit request is formed.
        ja: commit request 形成時に凍結した正規化引数の integrity digest。
      allowed_values: []
      pattern: null
      example_value: sha256:aa71
      source_claims:
        - claim-commit-request-design
    - id: idempotency_key
      labels:
        zh: 幂等键
        en: idempotency key
        ja: 冪等キー
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 识别同一候选变更重试并防止重复外部效果的可选键。
        en: Optional key recognizing retries of the same proposed mutation and preventing duplicate external effects.
        ja: 同一候補変更 retry を識別し duplicate external effect を防ぐ任意 key。
      allowed_values: []
      pattern: null
      example_value: refund:913:1
      source_claims:
        - claim-commit-request-design
  constraints:
    - id: commit-request-frozen-payload
      severity: error
      expression_language: plain
      expression: operation, target_ref, arguments, and argument_digest are immutable for commit_request_id; any change creates a new commit_request_id
      explanations:
        zh: 同一提交请求标识不得在审批后换用其他操作、目标或参数。
        en: One commit-request ID cannot be rebound to another operation, target, or argument set after review.
        ja: 同一 commit-request ID を審査後に別 operation/target/argument へ再束縛不可。
      source_claims:
        - claim-commit-request-design
  required_relation_constraints: []
examples:
  - id: CommitRequest-repo-commit
    labels:
      zh: 仓库提交请求
      en: Repository commit request
      ja: リポジトリ確定要求
    descriptions:
      zh: cr_57 提议把三处 YAML 变更提交到 review/safety-boundary 分支，记录 diff 摘要与 idempotency_key commit:57；git commit 尚未执行。
      en: cr_57 proposes committing three YAML changes to branch review/safety-boundary with diff digest and idempotency_key commit:57; git commit has not run.
      ja: cr_57 が三 YAML 変更を branch review/safety-boundary へ確定提案。diff digest/idempotency_key commit:57 記録。git commit 未実行。
    example_source:
      product: pre-commit + git
      url: https://pre-commit.com/
      version: staged commit gate
    field_values:
      commit_request_id: cr_57
      call_id: call_57
      operation: git_commit
      argument_digest: sha256:aa71
      idempotency_key: commit:57
    related_node_ids:
      - CommitRequest
      - CommitGate
    related_relation_ids:
      - CommitRequest-evaluated_by-CommitGate
    source_claims:
      - claim-commit-request-design
  - id: CommitRequest-refund-pending
    labels:
      zh: 退款提交请求
      en: Refund commit request
      ja: 返金確定要求
    descriptions:
      zh: cr_82 请求 order:913 退款不超过 100 USD，idempotency_key refund:913:1；CommitGate cg_44 评估中，支付网关未调用。
      en: cr_82 requests at most USD 100 refund on order:913 with idempotency_key refund:913:1; CommitGate cg_44 is evaluating; payment gateway not called.
      ja: cr_82 が order:913 へ最大 100 USD 返金要求。idempotency_key refund:913:1。CommitGate cg_44 評価中。payment gateway 未呼出し。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: business commit request
    field_values:
      commit_request_id: cr_82
      operation: refund_order
      idempotency_key: refund:913:1
    related_node_ids:
      - CommitRequest
      - CommitGate
    related_relation_ids: []
    source_claims:
      - claim-commit-request-design
  - id: CommitRequest-read-only-boundary
    labels:
      zh: 只读检索非提交请求
      en: Read-only query is not CommitRequest
      ja: 読取専用 query は CommitRequest ではない
    descriptions:
      zh: search_documents(query="refund policy") 只读索引无写入；普通 ToolCall 记录不自动成为 CommitRequest。
      en: search_documents(query="refund policy") reads an index without writing; an ordinary ToolCall record does not automatically become CommitRequest.
      ja: search_documents は index 読取のみ。通常 ToolCall record は自動的に CommitRequest にならない。
    example_source:
      product: Moonweave design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: side-effect boundary
    field_values:
      accepted: false
    related_node_ids:
      - CommitRequest
    related_relation_ids: []
    source_claims:
      - claim-commit-request-design
  - id: CommitRequest-secrets-staged
    labels:
      zh: 含密钥的 staged 提交请求
      en: Staged commit request with secrets
      ja: secret 含む staged commit request
    descriptions:
      zh: cr-secrets-1 含 staged `.env` AWS key；CommitRequest 进入 CommitGate，git-secrets 扫描后可能 CommitDenial，请求本身不表示密钥已 push。
      en: cr-secrets-1 includes staged `.env` AWS key; CommitRequest enters CommitGate and git-secrets scan may yield CommitDenial; the request itself does not mean the key was pushed.
      ja: cr-secrets-1 が staged `.env` AWS key を含む。CommitGate へ進み git-secrets scan で CommitDenial 可。request 自体は key push 済みを意味しない。
    example_source:
      product: git-secrets
      url: https://github.com/awslabs/git-secrets
      version: staged scan
    field_values:
      commit_request_id: cr-secrets-1
      operation: git_commit
    related_node_ids:
      - CommitRequest
      - CommitGate
      - CommitDenial
    related_relation_ids: []
    source_claims:
      - claim-commit-request-git-secrets
parent_relation:
  id: CommitRequest-evaluated_by-CommitGate
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 由提交闸门评估
    en: evaluated by commit gate
    ja: CommitGate により評価
  definitions:
    zh: CommitRequest 被指定 CommitGate 读取并按当时策略、扫描证据与风险上下文评估；该处理关系不表示请求是闸门的组成部分。
    en: CommitRequest is read and evaluated by a designated CommitGate under current policy, scan evidence, and risk context; this processing relation does not make the request a component of the gate.
    ja: CommitRequest は指定 CommitGate により policy/scan evidence/risk context 下で読取・評価。処理関係は request を gate 構成要素にしません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 一次请求可由多个串联闸门处理，保留每次处理事实。
    en: One request may pass through multiple sequential gates, retaining each processing fact.
    ja: 一 request は複数 serial gate を通り各処理 fact を保持。
  inverse_reading:
    predicate: evaluates
    labels:
      zh: 评估提交请求
      en: evaluates commit request
      ja: 確定要求を評価
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  source_claims:
    - claim-commit-request-design
  distinct_fact_rationale:
    zh: 请求 information identity 与 gate capability identity 不能合并。
    en: Request information identity and gate capability identity cannot merge.
    ja: request information identity と gate capability identity は統合不可。
  layout_role: primary-backbone
  endpoint_order: child-to-parent
relations: []
sources:
  - id: git-secrets-awslabs
    title: git-secrets (AWS Labs)
    url: https://github.com/awslabs/git-secrets
    source_type: official-doc
    relevance: Staged content evaluated before commit SideEffect.
  - id: trufflehog-docs
    title: TruffleHog Secret Scanning
    url: https://github.com/trufflesecurity/trufflehog
    source_type: official-doc
    relevance: Pre-commit scan input for CommitRequest evaluation.
  - id: pre-commit-framework
    title: pre-commit framework
    url: https://pre-commit.com/
    source_type: official-doc
    relevance: Staged-change gate before irreversible commit.
  - id: safety-commit-design
    title: Moonweave safety-commit-redaction module boundary
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: CommitRequest as frozen pre-execution mutation record.
source_claims:
  - id: claim-commit-request-git-secrets
    source: git-secrets-awslabs
    supports: Staged changes with secrets form CommitRequest evaluated by CommitGate before push SideEffect.
    locator: git-secrets commit hooks
    evidence_kind: official
    confidence: high
  - id: claim-commit-request-design
    source: safety-commit-design
    supports: Moonweave separates frozen CommitRequest from gate outcomes and realized SideEffect with idempotency and digest binding.
    locator: CommitRequest identity
    evidence_kind: design-inference
    confidence: high
