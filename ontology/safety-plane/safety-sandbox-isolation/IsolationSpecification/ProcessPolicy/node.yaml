source_claims:
  - id: claim-process-openai-capabilities
    source: openai-agents-sdk-sandbox-guide
    supports: Shell adds exec_command and, where PTY is supported, write_stdin; Filesystem adds file tools, and passing an explicit SandboxAgent capabilities list replaces the default list.
    locator: Concepts — Built-in capabilities
    evidence_kind: official-doc
    confidence: high
  - id: claim-process-oci-controls
    source: oci-runtime-spec-config
    supports: OCI process supports rlimits, Linux capabilities, and noNewPrivileges; true noNewPrivileges prevents a process from gaining additional privileges.
    locator: Configuration — POSIX process and Linux process
    evidence_kind: normative
    confidence: high
  - id: claim-process-docker-privilege
    source: docker-container-run-reference
    supports: Docker exposes --pids-limit and capability controls, while --privileged enables broad host-facing privileges and is not a securely sandboxed process.
    locator: docker container run — options and Escalate container privileges (--privileged)
    evidence_kind: official-doc
    confidence: high
  - id: claim-process-kubernetes-escalation
    source: kubernetes-security-context
    supports: Kubernetes securityContext controls capabilities and allowPrivilegeEscalation, which controls the no_new_privs flag; readOnlyRootFilesystem is a separate filesystem setting.
    locator: Configure a Security Context — security context settings and Set capabilities for a Container
    evidence_kind: official-doc
    confidence: high
  - id: claim-process-local-projection
    source: moonweave-ontology-design
    supports: process_policy_id, execution_surface, local source references, and separation of process policy from filesystem policy and live execution are Moonweave-local design inferences retaining native process semantics.
    locator: ontology/safety-plane/safety-sandbox-isolation/IsolationSpecification/ProcessPolicy/node.yaml — local process-policy projection
    evidence_kind: design-inference
