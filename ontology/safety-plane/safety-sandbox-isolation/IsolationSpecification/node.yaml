schema: moonweave.ai/ontology-node/v1
id: IsolationSpecification
kind: concept
status: accepted
labels:
  zh: 隔离规范
  en: Isolation Specification
  ja: 隔離仕様
semantics:
  short_definition:
    zh: 将一次受限执行应采用的工作区、文件系统和进程约束汇成可验证的静态契约。
    en: A reviewable static contract that assembles the workspace, filesystem, and process limits for constrained execution.
    ja: 制約された execution に用いる workspace、filesystem、process の制限をまとめる検証可能な静的 contract。
  definition:
    zh: IsolationSpecification 是 Moonweave 的本地 specification record；它引用原生 Manifest、OCI config、Docker run 配置或 Kubernetes Pod 配置，并将 FilesystemPolicy 与 ProcessPolicy 组织为同一份隔离契约。它描述新会话应从什么工作区和限制开始，但不是已经启动的 Sandbox、实时 session、用户授权、网络目的地决定或工具调用。
    en: IsolationSpecification is a Moonweave-local specification record that cites native Manifest, OCI config, Docker run, or Kubernetes Pod configuration and organizes a FilesystemPolicy and ProcessPolicy into one containment contract. It describes the workspace and limits with which a fresh execution should begin; it is not a started Sandbox, live session, user authorization, network-destination decision, or tool call.
    ja: IsolationSpecification は native Manifest、OCI config、Docker run、Kubernetes Pod configuration を参照し、FilesystemPolicy と ProcessPolicy を一つの containment contract にまとめる Moonweave-local specification record である。fresh execution が開始する workspace と制限を記述するが、起動済みの Sandbox、live session、user authorization、network destination decision、tool call ではない。
  why_needed:
    zh: 同样名为“沙箱”的对象可能是新会话的文件布局、容器运行时配置或已经运行的会话。把静态契约单独建模，才能审计哪些限制被声明，并在运行时检查是否被实现，而不把配置文本误当作隔离已经生效。
    en: Objects called “sandbox” can mean a fresh-session file layout, a container runtime configuration, or an already-running session. Modeling the static contract separately makes declared limits auditable and lets runtime realization be checked without mistaking configuration text for active isolation.
    ja: 「sandbox」と呼ばれる object は fresh-session の file layout、container runtime configuration、既に動作中の session を意味し得る。静的 contract を分けて model 化することで、宣言された制限を監査し、configuration text を active isolation と誤認せずに runtime realization を検査できる。
  includes:
    - zh: 来源运行时对象的引用，以及文件系统和进程政策的明确引用。
      en: References to native runtime objects and explicit references to filesystem and process policies.
      ja: native runtime object への参照と、filesystem policy および process policy への明示的な参照。
    - zh: 仅适用于 fresh session 的工作区起点说明和本地契约标识。
      en: Fresh-session workspace-start information and a local contract identifier.
      ja: fresh session にだけ適用する workspace-start information と local contract identifier。
  excludes:
    - zh: SandboxRunConfig 选出的 live session、已保存的 session state、快照内容和运行期间产生的文件变更。
      en: The live session selected by SandboxRunConfig, saved session state, snapshot contents, and files changed during a run.
      ja: SandboxRunConfig が選ぶ live session、保存済み session state、snapshot の内容、run 中に変更された file。
    - zh: 用户审批、凭证、工具执行、调用结果以及网络目的地允许或拒绝决定。
      en: User approval, credentials, tool execution, call results, and allow-or-deny decisions for network destinations.
      ja: user approval、credential、tool execution、call result、network destination の allow-or-deny decision。
  semantic_kind: specification
  aliases: [containment-contract, sandbox-configuration-record]
engineering:
  explanation:
    zh: 集成器保留每个来源对象的原生 schema。OpenAI Manifest 只描述 fresh sandbox workspace；OCI 的 root、mounts 与 process 是不同字段；Docker 和 Kubernetes 也有自己的声明位置。本节点只建立本地契约和引用，绝不把任何来源字段复制成假定通用的沙箱 API，也不以模型输出扩张配置。
    en: Integrations retain each source object's native schema. An OpenAI Manifest describes only a fresh sandbox workspace, OCI keeps root, mounts, and process in distinct fields, and Docker and Kubernetes have their own declaration sites. This node creates only a local contract and references; it neither copies source fields into a presumed universal sandbox API nor expands configuration from model output.
    ja: integration は各 source object の native schema を保持する。OpenAI Manifest は fresh sandbox workspace だけを記述し、OCI は root、mounts、process を別 field に保ち、Docker と Kubernetes には独自の declaration site がある。この node は local contract と reference だけを作り、source field を万能 sandbox API として複製せず、model output から configuration を拡張しない。
  typical_input:
    - description:
        zh: OpenAI 新会话工作区契约
        en: OpenAI fresh-session workspace contract
        ja: OpenAI fresh-session workspace contract
      format: |-
        Manifest(entries={"repo": LocalDir(src="./repo"), "output": Dir()}, extra_path_grants=(SandboxPathGrant(path="/opt/toolchain", read_only=True),))
      source_claims: [claim-isolation-openai-fresh-workspace]
    - description:
        zh: OCI 根、挂载与进程配置
        en: OCI root, mount, and process configuration
        ja: OCI root、mount、process configuration
      format: |-
        {"root":{"path":"rootfs","readonly":true},"mounts":[{"destination":"/tmp","type":"tmpfs","source":"tmpfs","options":["nosuid","mode=755"]}],"process":{"args":["/bin/sh"],"cwd":"/","noNewPrivileges":true}}
      source_claims: [claim-isolation-oci-separation]
  typical_output:
    - description:
        zh: 带来源引用的本地隔离契约
        en: Local isolation contract with source references
        ja: source reference を持つ local isolation contract
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"isolation_specification","isolation_spec_id":"iso-17","source_object_refs":["openai:manifest/17","oci:bundle/config.json"],"filesystem_policy_ref":"fs-policy:17","process_policy_ref":"proc-policy:17","fresh_workspace_contract_ref":"openai:manifest/17"}
      source_claims: [claim-isolation-local-contract]
  reference_implementations:
    - name: OpenAI Agents SDK Sandbox concepts
      url: https://openai.github.io/openai-agents-python/sandbox/guide/
      description: Distinguishes Manifest fresh-session workspace contracts from live sandbox sessions and SandboxRunConfig choices.
    - name: OCI Runtime Specification configuration
      url: https://github.com/opencontainers/runtime-spec/blob/main/config.md
      description: Defines root filesystem, mounts, and process configuration as separate native fields.
    - name: Docker container run reference
      url: https://docs.docker.com/reference/cli/docker/container/run/
      description: Documents Docker's own read-only root, mount, PID, and privilege options.
    - name: Kubernetes security context
      url: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
      description: Documents Pod and container security-context privilege, capability, and root-filesystem settings.
structure:
  identity_keys: [isolation_spec_id]
  fields:
    - id: isolation_spec_id
      labels: {zh: 隔离契约标识, en: Isolation-contract ID, ja: isolation contract ID}
      definitions:
        zh: 稳定标识一份可审计的本地隔离契约；它不是 Docker container ID、Pod UID 或 live sandbox session ID。
        en: Stably identifies one auditable local containment contract; it is not a Docker container ID, Pod UID, or live sandbox-session ID.
        ja: 監査可能な local containment contract を安定して識別する。Docker container ID、Pod UID、live sandbox-session ID ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: ^[a-z0-9-]+$
      example_value: iso-17
      source_claims: [claim-isolation-local-contract]
    - id: source_object_refs
      labels: {zh: 原生配置引用, en: Native configuration references, ja: native configuration 参照}
      definitions:
        zh: 指向用于形成契约的实际 Manifest、OCI config、Docker run 参数或 Kubernetes Pod 规范，供各自的原生 schema 验证。
        en: Points to the actual Manifest, OCI config, Docker run arguments, or Kubernetes Pod specification used to form the contract, for validation under each native schema.
        ja: contract の形成に用いた実際の Manifest、OCI config、Docker run argument、Kubernetes Pod specification を指し、それぞれの native schema で validation する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: oci:bundle/config.json
      source_claims: [claim-isolation-openai-fresh-workspace, claim-isolation-oci-separation, claim-isolation-docker-surface, claim-isolation-kubernetes-context]
    - id: filesystem_policy_ref
      labels: {zh: 文件系统政策引用, en: Filesystem-policy reference, ja: filesystem policy 参照}
      definitions:
        zh: 指向定义工作区路径、根文件系统模式、挂载和额外路径授权边界的 FilesystemPolicy。
        en: Points to the FilesystemPolicy that defines workspace paths, root-filesystem mode, mounts, and extra-path-grant boundaries.
        ja: workspace path、root-filesystem mode、mount、extra-path-grant の境界を定義する FilesystemPolicy を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: fs-policy:17
      source_claims: [claim-isolation-local-contract]
    - id: process_policy_ref
      labels: {zh: 进程政策引用, en: Process-policy reference, ja: process policy 参照}
      definitions:
        zh: 指向定义 shell 面、能力、禁止提权和资源限制边界的 ProcessPolicy。
        en: Points to the ProcessPolicy that defines shell surface, capabilities, no-escalation, and resource-limit boundaries.
        ja: shell surface、capability、no-escalation、resource-limit の境界を定義する ProcessPolicy を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: proc-policy:17
      source_claims: [claim-isolation-local-contract]
    - id: fresh_workspace_contract_ref
      labels: {zh: 新会话工作区契约引用, en: Fresh-workspace contract reference, ja: fresh-workspace contract 参照}
      definitions:
        zh: 可选地指向仅在创建 fresh sandbox session 时生效的 Manifest；恢复或注入 live session 时它不覆盖已存在的工作区状态。
        en: Optionally points to a Manifest that applies only when creating a fresh sandbox session; it does not override existing workspace state for a resumed or injected live session.
        ja: fresh sandbox session の作成時だけに適用する Manifest を任意で指す。resume または inject された live session では既存 workspace state を上書きしない。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: openai:manifest/17
      source_claims: [claim-isolation-openai-fresh-workspace]
  constraints:
    - id: isolation-spec-retains-native-evidence
      severity: error
      language: plain
      expression: An IsolationSpecification must retain source_object_refs plus exactly one filesystem_policy_ref and process_policy_ref; a local summary may not claim source-native fields it cannot point back to.
      explanation:
        zh: 本地契约用于汇集和审计，不替代 Manifest、OCI config、Docker 命令或 Pod spec 的真实字段与验证规则。
        en: The local contract assembles and audits; it does not replace the real fields or validation rules of a Manifest, OCI config, Docker command, or Pod spec.
        ja: local contract は集約と監査のためのものであり、Manifest、OCI config、Docker command、Pod spec の実際の field と validation rule を置き換えない。
      source_claims: [claim-isolation-openai-fresh-workspace, claim-isolation-oci-separation, claim-isolation-docker-surface, claim-isolation-kubernetes-context, claim-isolation-local-contract]
    - id: isolation-spec-is-not-live-sandbox
      severity: error
      language: plain
      expression: IsolationSpecification must not contain sandbox_session_id, snapshot payload, changed-file list, tool_call, tool_result, approval, credential, or network-destination decision fields.
      explanation:
        zh: 规范描述预期边界；Sandbox 才表示 live environment，其他安全和执行模块拥有授权、网络和调用事实。
        en: A specification describes expected bounds; Sandbox represents the live environment, while other safety and execution modules own authorization, network, and invocation facts.
        ja: specification は期待される境界を記述する。Sandbox は live environment を表し、authorization、network、invocation の fact は別の safety と execution module が所有する。
      source_claims: [claim-isolation-openai-fresh-workspace, claim-isolation-local-contract]
    - id: isolation-spec-fresh-manifest-scope
      severity: error
      language: plain
      expression: A fresh_workspace_contract_ref may describe a fresh session only; a resumed, injected, or snapshot-seeded Sandbox must record its actual session source separately rather than treating the Manifest as the full live-workspace state.
      explanation:
        zh: Agents SDK 区分 fresh Manifest 与 session、session state 和 snapshot，混淆它们会掩盖运行时实际状态。
        en: The Agents SDK distinguishes a fresh Manifest from a session, session state, and snapshot; conflating them hides actual runtime state.
        ja: Agents SDK は fresh Manifest を session、session state、snapshot と区別する。これらを混同すると実際の runtime state が隠れる。
      source_claims: [claim-isolation-openai-fresh-workspace]
  required_relations: []
examples:
  - id: isolation-specification-e2b
    labels:
      zh: 隔离规范 - E2B 沙箱 VM
      en: Isolation Specification - E2B sandbox VM
      ja: 隔離仕様 - E2B サンドボックス VM
    descriptions: {zh: "隔离规范(IsolationSpecification) [IsolationSpecification]: 将一次受限执行应采用的工作区、文件系统和进程约束汇成可验证的静态契约。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — 网络隔离、文件系统隔离与资源限制。 Fields: fresh_workspace_contract_ref, filesystem_policy_ref, process_policy_ref.", en: "Isolation Specification (IsolationSpecification) [IsolationSpecification]: A reviewable static contract that assembles the workspace, filesystem, and process limits for constrained execution.. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network isolation, filesystem isolation, and resource limits (e2b.dev/docs). Fields include fresh_workspace_contract_ref, filesystem_policy_ref, process_policy_ref.", ja: "隔離仕様(IsolationSpecification) [IsolationSpecification]: 制約された execution に用いる workspace、filesystem、process の制限をまとめる検証可能な静的 contract。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network/filesystem isolation と resource limit。 Fields: fresh_workspace_contract_ref, filesystem_policy_ref, process_policy_ref."}
    field_values:
      filesystem_policy_ref: "fs-policy:17"
      fresh_workspace_contract_ref: "openai:manifest/17"
      isolation_spec_id: iso-17
      process_policy_ref: "proc-policy:17"
      source_object_refs: "oci:bundle/config.json"
    related_node_ids:
      - IsolationSpecification
    related_relation_ids: []
    example_source: E2B Sandbox API
    source_claims:
      - claim-isolation-openai-fresh-workspace
  - id: isolation-specification-firecracker
    labels:
      zh: 隔离规范 - Firecracker microVM 隔离
      en: Isolation Specification - Firecracker microVM isolation
      ja: 隔離仕様 - Firecracker microVM 分離
    descriptions: {zh: "隔离规范(IsolationSpecification) [IsolationSpecification]: 将一次受限执行应采用的工作区、文件系统和进程约束汇成可验证的静态契约。. AWS Firecracker microVM 以最小开销隔离 Lambda 与 Fargate 工作负载。 Fields: fresh_workspace_contract_ref, filesystem_policy_ref, process_policy_ref.", en: "Isolation Specification (IsolationSpecification) [IsolationSpecification]: A reviewable static contract that assembles the workspace, filesystem, and process limits for constrained execution.. AWS Firecracker microVMs isolate Lambda and Fargate workloads with minimal overhead (firecracker-microvm.github.io). Fields include fresh_workspace_contract_ref, filesystem_policy_ref, process_policy_ref.", ja: "隔離仕様(IsolationSpecification) [IsolationSpecification]: 制約された execution に用いる workspace、filesystem、process の制限をまとめる検証可能な静的 contract。. AWS Firecracker microVM は Lambda/Fargate workload を minimal overhead で isolate する。 Fields: fresh_workspace_contract_ref, filesystem_policy_ref, process_policy_ref."}
    field_values:
      filesystem_policy_ref: "fs-policy:17"
      fresh_workspace_contract_ref: "openai:manifest/17"
      isolation_spec_id: iso-17
      process_policy_ref: "proc-policy:17"
      source_object_refs: "oci:bundle/config.json"
    related_node_ids:
      - IsolationSpecification
    related_relation_ids: []
    example_source: AWS Firecracker
    source_claims:
      - claim-isolation-openai-fresh-workspace
  - id: isolation-specification-gvisor_runsc
    labels:
      zh: 隔离规范 - gVisor runsc 内核沙箱
      en: Isolation Specification - gVisor runsc kernel sandbox
      ja: 隔離仕様 - gVisor runsc カーネル sandbox
    descriptions: {zh: "隔离规范(IsolationSpecification) [IsolationSpecification]: 将一次受限执行应采用的工作区、文件系统和进程约束汇成可验证的静态契约。. gVisor runsc 通过 user-space kernel Sentry 拦截 syscall，Docker/Kubernetes 可用 runtime=runsc 运行容器，限制内核攻击面（gvisor.dev/docs）。 Fields: fresh_workspace_contract_ref, filesystem_policy_ref, process_policy_ref.", en: "Isolation Specification (IsolationSpecification) [IsolationSpecification]: A reviewable static contract that assembles the workspace, filesystem, and process limits for constrained execution.. gVisor runsc intercepts syscalls via user-space kernel Sentry; Docker/Kubernetes can run containers with runtime=runsc to limit kernel attack surface (gvisor.dev/docs). Fields include fresh_workspace_contract_ref, filesystem_policy_ref, process_policy_ref.", ja: "隔離仕様(IsolationSpecification) [IsolationSpecification]: 制約された execution に用いる workspace、filesystem、process の制限をまとめる検証可能な静的 contract。. gVisor runsc は user-space kernel Sentry で syscall を intercept し runtime=runsc で kernel 攻撃面を制限する。 Fields: fresh_workspace_contract_ref, filesystem_policy_ref, process_policy_ref."}
    field_values:
      filesystem_policy_ref: "fs-policy:17"
      fresh_workspace_contract_ref: "openai:manifest/17"
      isolation_spec_id: iso-17
      process_policy_ref: "proc-policy:17"
      source_object_refs: "oci:bundle/config.json"
    related_node_ids:
      - IsolationSpecification
    related_relation_ids: []
    example_source: gVisor runsc
    source_claims:
      - claim-isolation-openai-fresh-workspace
  - id: isolation-specification-docker_network_none
    labels:
      zh: 隔离规范 - Docker 网络隔离
      en: Isolation Specification - Docker network isolation
      ja: 隔離仕様 - Docker ネットワーク分離
    descriptions: {zh: "隔离规范(IsolationSpecification) [IsolationSpecification]: 将一次受限执行应采用的工作区、文件系统和进程约束汇成可验证的静态契约。. Docker run --network=none 为容器分配 lo 以外的无网络接口，agent 代码无法发起出站 TCP/UDP 连接（docs.docker.com/network/none/）。 Fields: fresh_workspace_contract_ref, filesystem_policy_ref, process_policy_ref.", en: "Isolation Specification (IsolationSpecification) [IsolationSpecification]: A reviewable static contract that assembles the workspace, filesystem, and process limits for constrained execution.. Docker run --network=none gives a container only the loopback interface so agent code cannot make outbound TCP/UDP connections (docs.docker.com/network/none/). Fields include fresh_workspace_contract_ref, filesystem_policy_ref, process_policy_ref.", ja: "隔離仕様(IsolationSpecification) [IsolationSpecification]: 制約された execution に用いる workspace、filesystem、process の制限をまとめる検証可能な静的 contract。. Docker run --network=none は loopback のみの container を作り outbound TCP/UDP を阻止する。 Fields: fresh_workspace_contract_ref, filesystem_policy_ref, process_policy_ref."}
    field_values:
      filesystem_policy_ref: "fs-policy:17"
      fresh_workspace_contract_ref: "openai:manifest/17"
      isolation_spec_id: iso-17
      process_policy_ref: "proc-policy:17"
      source_object_refs: "oci:bundle/config.json"
    related_node_ids:
      - IsolationSpecification
    related_relation_ids: []
    example_source: Docker network none
    source_claims:
      - claim-isolation-openai-fresh-workspace
parent_relation: null
relations: []
sources:
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    accessed_on: 2026-07-19
    source_type: design-inference
    relevance: Defines the local assembly of filesystem and process policies into one containment contract without asserting a universal native runtime schema.
  - id: openai-agents-sdk-sandbox-guide
    title: OpenAI Agents SDK — Sandbox concepts
    url: https://openai.github.io/openai-agents-python/sandbox/guide/
    source_type: official-doc
    relevance: Distinguishes fresh-session Manifest contracts, live sandbox sessions, and SandboxRunConfig session sources.
  - id: oci-runtime-spec-config
    title: OCI Runtime Specification — configuration
    url: https://github.com/opencontainers/runtime-spec/blob/main/config.md
    source_type: official-spec
    relevance: Defines root filesystem, mount, and process configuration as separate OCI structures.
  - id: docker-container-run-reference
    title: Docker Docs — docker container run
    url: https://docs.docker.com/reference/cli/docker/container/run/
    source_type: official-doc
    relevance: Defines Docker-specific root, mount, PID, capability, and privilege switches.
  - id: kubernetes-security-context
    title: Kubernetes — Configure a Security Context
    url: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
    source_type: official-doc
    relevance: Defines Pod and container security-context settings for privilege, capabilities, escalation, and root filesystem mode.
source_claims:
  - id: claim-isolation-openai-fresh-workspace
    source: openai-agents-sdk-sandbox-guide
    supports: Manifest describes a fresh sandbox workspace, while a live sandbox session is selected or created by SandboxRunConfig; resumed sessions, session state, and snapshots can provide the effective live workspace instead.
    locator: Concepts — core pieces, Manifest, and SandboxRunConfig options
    evidence_kind: official-doc
    confidence: high
  - id: claim-isolation-oci-separation
    source: oci-runtime-spec-config
    supports: OCI config defines root filesystem, additional mounts, and process configuration in separate structures, including root readonly and process noNewPrivileges fields.
    locator: Configuration — Root, Mounts, and Process
    evidence_kind: normative
    confidence: high
  - id: claim-isolation-docker-surface
    source: docker-container-run-reference
    supports: Docker exposes read-only roots, mount controls, PID limits, capability controls, and privileged mode through Docker-specific container-run options.
    locator: docker container run — options, mounts, and runtime privilege
    evidence_kind: official-doc
    confidence: high
  - id: claim-isolation-kubernetes-context
    source: kubernetes-security-context
    supports: Kubernetes securityContext supplies privilege and access-control settings including capabilities, allowPrivilegeEscalation, and readOnlyRootFilesystem.
    locator: Configure a Security Context — security context settings
    evidence_kind: official-doc
    confidence: high
  - id: claim-isolation-local-contract
    source: moonweave-ontology-design
    supports: isolation_spec_id, source-object references, policy references, and their separation from live Sandbox state are Moonweave-local design inferences that retain source-runtime boundaries.
    locator: ontology/safety-plane/safety-sandbox-isolation/IsolationSpecification/node.yaml — local contract assembly
    evidence_kind: design-inference
    confidence: high
