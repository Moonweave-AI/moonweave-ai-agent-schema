schema: moonweave.ai/ontology-node/v1
id: Sandbox
kind: concept
status: accepted
labels:
  zh: 沙箱运行环境
  en: Sandbox
  ja: サンドボックス実行環境
semantics:
  short_definition:
    zh: 承载命令和文件变更、并以引用的隔离规范为目标边界的实时受限环境或会话。
    en: A live constrained environment or session where commands and file changes occur, with a referenced isolation specification as its intended boundary.
    ja: command と file change が行われ、参照された isolation specification を意図する境界とする live constrained environment または session。
  definition:
    zh: Sandbox 表示实际可连接、注入、恢复或新建的 live sandbox session，而非 Manifest 文本或 IsolationSpecification。它引用实现目标限制的 specification、获得 session 的来源、sandbox client 以及有效工作区的来源；在 OpenAI Agents SDK 中，SandboxRunConfig 可注入 live session、从序列化 state 恢复或由 client 创建 session。它不自动证明所有限制已执行、不授予用户权限、不决定网络目的地，也不是工具调用或调用结果。
    en: Sandbox represents an actual live sandbox session that can be connected, injected, resumed, or created, not Manifest text or an IsolationSpecification. It references the specification whose limits it intends to realize, the source by which it got a session, its sandbox client, and the source of its effective workspace; in the OpenAI Agents SDK, SandboxRunConfig can inject a live session, resume from serialized state, or create one through a client. It does not automatically prove every limit is enforced, grant user permission, decide network destinations, or constitute a tool call or result.
    ja: Sandbox は Manifest text や IsolationSpecification ではなく、接続、inject、resume、create できる実際の live sandbox session を表す。実現を意図する specification、session を得た source、sandbox client、effective workspace の source を参照する。OpenAI Agents SDK では SandboxRunConfig が live session を inject し、serialized state から resume し、client 経由で作成できる。すべての limit が強制されたことを自動的に証明せず、user permission を与えず、network destination を決めず、tool call または result でもない。
  why_needed:
    zh: 新会话的 Manifest、已恢复的 session state 和 snapshot 可能产生不同的实际工作区。把 live Sandbox 单独建模，可以追踪一次执行实际在哪里运行，并验证它是否实现既定契约，而不会误称静态规范已经等同于运行时隔离。
    en: A fresh Manifest, resumed session state, and a snapshot can produce different effective workspaces. Modeling the live Sandbox separately traces where an execution actually runs and lets it be checked against the intended contract without claiming a static specification is already runtime isolation.
    ja: fresh Manifest、resume された session state、snapshot は異なる effective workspace を作り得る。live Sandbox を別に model 化することで、execution が実際にどこで動くかを追跡し、静的 specification が既に runtime isolation であると主張せずに意図した contract と照合できる。
  includes:
    - zh: live session 的本地标识、session 来源、sandbox client 引用和有效工作区来源引用。
      en: A local live-session identifier, session source, sandbox-client reference, and effective-workspace source references.
      ja: local live-session identifier、session source、sandbox-client reference、effective-workspace source reference。
    - zh: 指向它计划实现的 IsolationSpecification 的关联。
      en: An association to the IsolationSpecification it intends to realize.
      ja: 実現を意図する IsolationSpecification への association。
  excludes:
    - zh: 规范本身、策略文档、实际命令列表、工具调用结果、用户审批和网络目的地规则。
      en: The specification itself, policy documents, actual command lists, tool-call results, user approvals, and network-destination rules.
      ja: specification 自体、policy document、実際の command list、tool-call result、user approval、network-destination rule。
    - zh: 将 Docker 容器名或 Kubernetes Pod 名作为已安全隔离的证明。
      en: Treating a Docker container name or Kubernetes Pod name as proof of secure isolation.
      ja: Docker container name または Kubernetes Pod name を secure isolation の証明として扱うこと。
  semantic_kind: environment
  aliases: [sandbox-session, live-isolated-runtime]
engineering:
  explanation:
    zh: 先确定 session 真实从哪里来：fresh client、注入 session、serialized session state 或 snapshot。Manifest 只在 fresh session 时提供工作区起点；恢复或注入时，已有 session state 取代它。客户端选择也应保留来源：Agents SDK 在 macOS/Linux 可用 UnixLocalSandboxClient，在 Windows 或需要容器隔离/镜像一致性时使用 DockerSandboxClient 或托管 provider。Sandbox 记录这些事实和规范关联，但不替代来源运行时的实际强制检查。
    en: "Determine where the session actually comes from first: a fresh client, an injected session, serialized session state, or a snapshot. Manifest supplies a workspace start only for a fresh session; existing session state wins when a session is resumed or injected. Retain client choice as evidence too: the Agents SDK supports UnixLocalSandboxClient for local macOS/Linux development and DockerSandboxClient or a hosted provider on Windows or when container isolation/image parity is needed. Sandbox records those facts and its specification association but does not replace the source runtime's enforcement checks."
    ja: 最初に session が実際にどこから来るかを決める。fresh client、injected session、serialized session state、snapshot のいずれかである。Manifest は fresh session の workspace start だけを供給し、session が resume または inject されると既存 session state が優先される。client choice も evidence として保持する。Agents SDK は local macOS/Linux development には UnixLocalSandboxClient を、Windows または container isolation/image parity が必要な場合には DockerSandboxClient または hosted provider をサポートする。Sandbox はこれらの fact と specification association を記録するが、source runtime の enforcement check を置き換えない。
  typical_input:
    - description:
        zh: 由客户端新建的 SandboxRunConfig
        en: SandboxRunConfig creating a session through a client
        ja: client を通じて session を作る SandboxRunConfig
      format: |-
        RunConfig(sandbox=SandboxRunConfig(client=DockerSandboxClient()))
      source_claims: [claim-sandbox-openai-session]
    - description:
        zh: 恢复现有 sandbox session 的运行配置
        en: Run configuration resuming an existing sandbox session
        ja: 既存 sandbox session を resume する run configuration
      format: |-
        RunConfig(sandbox=SandboxRunConfig(session_state=serialized_sandbox_state))
      source_claims: [claim-sandbox-openai-session]
  typical_output:
    - description:
        zh: 有来源的实时 Sandbox 记录
        en: Live Sandbox record with provenance
        ja: provenance を持つ live Sandbox record
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"sandbox","sandbox_id":"sandbox-17","isolation_spec_ref":"iso:17","session_source":"fresh_client","sandbox_client_ref":"openai:client/docker-17","effective_workspace_source_refs":["openai:manifest/17","openai:client/docker-17"]}
      source_claims: [claim-sandbox-local-realization]
  reference_implementations:
    - name: OpenAI Agents SDK Sandbox concepts
      url: https://openai.github.io/openai-agents-python/sandbox/guide/
      description: Defines live sandbox sessions, SandboxRunConfig sources, manifests, client choices, and saved session state.
    - name: Docker container run reference
      url: https://docs.docker.com/reference/cli/docker/container/run/
      description: Documents container runtime configuration that remains distinct from the higher-level Agents SDK sandbox client.
structure:
  identity_keys: [sandbox_id]
  fields:
    - id: sandbox_id
      labels: {zh: 沙箱标识, en: Sandbox ID, ja: sandbox ID}
      definitions:
        zh: 本地标识一个 live sandbox environment/session；它不是 IsolationSpecification ID、Manifest ID、Docker image 名或 Pod 名。
        en: Locally identifies one live sandbox environment/session; it is not an IsolationSpecification ID, Manifest ID, Docker image name, or Pod name.
        ja: 一つの live sandbox environment/session を local に識別する。IsolationSpecification ID、Manifest ID、Docker image name、Pod name ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: ^[a-z0-9-]+$
      example_value: sandbox-17
      source_claims: [claim-sandbox-local-realization]
    - id: isolation_spec_ref
      labels: {zh: 隔离规范引用, en: Isolation-specification reference, ja: isolation specification 参照}
      definitions:
        zh: 指向 Sandbox 打算实现的 IsolationSpecification；实际环境应可与该规范的文件和进程政策进行比较。
        en: Points to the IsolationSpecification the Sandbox intends to realize; the actual environment can be compared with that specification's filesystem and process policies.
        ja: Sandbox が実現を意図する IsolationSpecification を指す。実際の environment はその specification の filesystem と process policy と比較できる。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: iso:17
      source_claims: [claim-sandbox-local-realization]
    - id: session_source
      labels: {zh: 会话来源, en: Session source, ja: session source}
      definitions:
        zh: 表示 live session 是由 client 新建、直接注入、从 serialized state 恢复还是由 snapshot 创建；不是会话健康状态。
        en: States whether the live session was created through a client, injected directly, resumed from serialized state, or created from a snapshot; it is not a session health state.
        ja: live session が client で作成されたか、直接 inject されたか、serialized state から resume されたか、snapshot から作成されたかを示す。session health state ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [fresh_client, injected_session, serialized_session_state, snapshot]
      pattern: null
      example_value: fresh_client
      source_claims: [claim-sandbox-openai-session]
    - id: sandbox_client_ref
      labels: {zh: 沙箱客户端引用, en: Sandbox-client reference, ja: sandbox client 参照}
      definitions:
        zh: 指向创建、连接或恢复该环境的实际 sandbox client；客户端种类不是本地隔离强度声明。
        en: Points to the actual sandbox client that created, connected, or resumed the environment; client kind is not a local assertion of isolation strength.
        ja: environment を create、connect、resume した実際の sandbox client を指す。client kind は local isolation strength の assertion ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: openai:client/docker-17
      source_claims: [claim-sandbox-openai-session]
    - id: effective_workspace_source_refs
      labels: {zh: 有效工作区来源引用, en: Effective-workspace source references, ja: effective-workspace source 参照}
      definitions:
        zh: 指向实际决定本次 live workspace 的 Manifest、注入 session、serialized state 或 snapshot；不得仅凭 fresh Manifest 推断恢复环境的内容。
        en: Points to the Manifest, injected session, serialized state, or snapshot that actually determined this live workspace; a resumed environment's contents must not be inferred solely from a fresh Manifest.
        ja: この live workspace を実際に決めた Manifest、injected session、serialized state、snapshot を指す。resume された environment の内容を fresh Manifest だけから推論してはならない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: openai:manifest/17
      source_claims: [claim-sandbox-openai-session]
  constraints:
    - id: sandbox-session-source-controls-workspace
      severity: error
      language: plain
      expression: session_source fresh_client requires a fresh workspace source such as a Manifest or snapshot; injected_session and serialized_session_state require their actual session-state reference and must not claim the default Manifest fully describes the live workspace.
      explanation:
        zh: 运行时 session 来源决定有效工作区，Manifest 不能覆盖恢复或注入会话的实际状态。
        en: The runtime session source determines the effective workspace; a Manifest cannot override the actual state of a resumed or injected session.
        ja: runtime session source が effective workspace を決める。Manifest は resume または inject された session の実際の state を上書きできない。
      source_claims: [claim-sandbox-openai-session]
    - id: sandbox-realization-stays-within-spec
      severity: error
      language: plain
      expression: A Sandbox must reference one IsolationSpecification and retain evidence sufficient to compare its effective workspace and process surface with that specification; a missing reference or broadened source configuration is not proof of containment.
      explanation:
        zh: Sandbox 是规范的运行时实现目标，不是规范的组成部分；比较需要真实来源证据。
        en: A Sandbox is a runtime realization target of a specification, not a component of it; comparison requires actual source evidence.
        ja: Sandbox は specification の runtime realization target であり、その component ではない。比較には実際の source evidence が必要である。
      source_claims: [claim-sandbox-local-realization]
    - id: sandbox-does-not-grant-or-execute
      severity: error
      language: plain
      expression: Sandbox must not contain user_authorization, approval_granted, credential, network_destination_decision, tool_call, or tool_result fields; command and file changes are environment facts that remain separate from approval and invocation records.
      explanation:
        zh: SDK 明确将外层审批和运行簿记与 sandbox session 的命令、文件和环境隔离职责分开。
        en: The SDK explicitly separates outer approvals and run bookkeeping from the sandbox session's responsibility for commands, files, and environment isolation.
        ja: SDK は outer approval と run bookkeeping を、sandbox session が担う command、file、environment isolation から明確に分ける。
      source_claims: [claim-sandbox-openai-session, claim-sandbox-local-realization]
  required_relations: [Sandbox-realizes-IsolationSpecification]
examples:
  - id: sandbox-e2b
    labels:
      zh: 沙箱运行环境 - E2B 沙箱 VM
      en: Sandbox - E2B sandbox VM
      ja: サンドボックス実行環境 - E2B サンドボックス VM
    descriptions: {zh: "沙箱运行环境(Sandbox) [Sandbox]: 承载命令和文件变更、并以引用的隔离规范为目标边界的实时受限环境或会话。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — 网络隔离、文件系统隔离与资源限制。 Fields: sandbox_id, session_source, isolation_spec_ref.", en: "Sandbox (Sandbox) [Sandbox]: A live constrained environment or session where commands and file changes occur, with a referenced isolation specification as its intended boundary.. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network isolation, filesystem isolation, and resource limits (e2b.dev/docs). Fields include sandbox_id, session_source, isolation_spec_ref.", ja: "サンドボックス実行環境(Sandbox) [Sandbox]: command と file change が行われ、参照された isolation specification を意図する境界とする live constrained environment または session。. E2B sandbox = Sandbox(); execution = sandbox.run_code(\"print('hello')\") — network/filesystem isolation と resource limit。 Fields: sandbox_id, session_source, isolation_spec_ref."}
    field_values:
      effective_workspace_source_refs: "openai:manifest/17"
      isolation_spec_ref: "iso:17"
      sandbox_client_ref: "openai:client/docker-17"
      sandbox_id: sandbox-17
      session_source: fresh_client
    related_node_ids:
      - Sandbox
    related_relation_ids: []
    example_source: E2B Sandbox API
    source_claims:
      - claim-sandbox-openai-session
  - id: sandbox-firecracker
    labels:
      zh: 沙箱运行环境 - Firecracker microVM 隔离
      en: Sandbox - Firecracker microVM isolation
      ja: サンドボックス実行環境 - Firecracker microVM 分離
    descriptions: {zh: "沙箱运行环境(Sandbox) [Sandbox]: 承载命令和文件变更、并以引用的隔离规范为目标边界的实时受限环境或会话。. AWS Firecracker microVM 以最小开销隔离 Lambda 与 Fargate 工作负载。 Fields: sandbox_id, session_source, isolation_spec_ref.", en: "Sandbox (Sandbox) [Sandbox]: A live constrained environment or session where commands and file changes occur, with a referenced isolation specification as its intended boundary.. AWS Firecracker microVMs isolate Lambda and Fargate workloads with minimal overhead (firecracker-microvm.github.io). Fields include sandbox_id, session_source, isolation_spec_ref.", ja: "サンドボックス実行環境(Sandbox) [Sandbox]: command と file change が行われ、参照された isolation specification を意図する境界とする live constrained environment または session。. AWS Firecracker microVM は Lambda/Fargate workload を minimal overhead で isolate する。 Fields: sandbox_id, session_source, isolation_spec_ref."}
    field_values:
      effective_workspace_source_refs: "openai:manifest/17"
      isolation_spec_ref: "iso:17"
      sandbox_client_ref: "openai:client/docker-17"
      sandbox_id: sandbox-17
      session_source: fresh_client
    related_node_ids:
      - Sandbox
    related_relation_ids: []
    example_source: AWS Firecracker
    source_claims:
      - claim-sandbox-openai-session
  - id: sandbox-gvisor_runsc
    labels:
      zh: 沙箱运行环境 - gVisor runsc 内核沙箱
      en: Sandbox - gVisor runsc kernel sandbox
      ja: サンドボックス実行環境 - gVisor runsc カーネル sandbox
    descriptions: {zh: "沙箱运行环境(Sandbox) [Sandbox]: 承载命令和文件变更、并以引用的隔离规范为目标边界的实时受限环境或会话。. gVisor runsc 通过 user-space kernel Sentry 拦截 syscall，Docker/Kubernetes 可用 runtime=runsc 运行容器，限制内核攻击面（gvisor.dev/docs）。 Fields: sandbox_id, session_source, isolation_spec_ref.", en: "Sandbox (Sandbox) [Sandbox]: A live constrained environment or session where commands and file changes occur, with a referenced isolation specification as its intended boundary.. gVisor runsc intercepts syscalls via user-space kernel Sentry; Docker/Kubernetes can run containers with runtime=runsc to limit kernel attack surface (gvisor.dev/docs). Fields include sandbox_id, session_source, isolation_spec_ref.", ja: "サンドボックス実行環境(Sandbox) [Sandbox]: command と file change が行われ、参照された isolation specification を意図する境界とする live constrained environment または session。. gVisor runsc は user-space kernel Sentry で syscall を intercept し runtime=runsc で kernel 攻撃面を制限する。 Fields: sandbox_id, session_source, isolation_spec_ref."}
    field_values:
      effective_workspace_source_refs: "openai:manifest/17"
      isolation_spec_ref: "iso:17"
      sandbox_client_ref: "openai:client/docker-17"
      sandbox_id: sandbox-17
      session_source: fresh_client
    related_node_ids:
      - Sandbox
    related_relation_ids: []
    example_source: gVisor runsc
    source_claims:
      - claim-sandbox-openai-session
  - id: sandbox-docker_network_none
    labels:
      zh: 沙箱运行环境 - Docker 网络隔离
      en: Sandbox - Docker network isolation
      ja: サンドボックス実行環境 - Docker ネットワーク分離
    descriptions: {zh: "沙箱运行环境(Sandbox) [Sandbox]: 承载命令和文件变更、并以引用的隔离规范为目标边界的实时受限环境或会话。. Docker run --network=none 为容器分配 lo 以外的无网络接口，agent 代码无法发起出站 TCP/UDP 连接（docs.docker.com/network/none/）。 Fields: sandbox_id, session_source, isolation_spec_ref.", en: "Sandbox (Sandbox) [Sandbox]: A live constrained environment or session where commands and file changes occur, with a referenced isolation specification as its intended boundary.. Docker run --network=none gives a container only the loopback interface so agent code cannot make outbound TCP/UDP connections (docs.docker.com/network/none/). Fields include sandbox_id, session_source, isolation_spec_ref.", ja: "サンドボックス実行環境(Sandbox) [Sandbox]: command と file change が行われ、参照された isolation specification を意図する境界とする live constrained environment または session。. Docker run --network=none は loopback のみの container を作り outbound TCP/UDP を阻止する。 Fields: sandbox_id, session_source, isolation_spec_ref."}
    field_values:
      effective_workspace_source_refs: "openai:manifest/17"
      isolation_spec_ref: "iso:17"
      sandbox_client_ref: "openai:client/docker-17"
      sandbox_id: sandbox-17
      session_source: fresh_client
    related_node_ids:
      - Sandbox
    related_relation_ids: []
    example_source: Docker network none
    source_claims:
      - claim-sandbox-openai-session
parent_relation: null
relations:
  - id: Sandbox-realizes-IsolationSpecification
    predicate: realizes
    target: concept:IsolationSpecification
    direction: source-to-target
    relation_kind: association
    labels: {zh: 实现隔离规范, en: realizes isolation specification, ja: isolation specification を実現する}
    definitions:
      zh: 当 live Sandbox 的有效工作区、文件系统和进程证据可与指定的静态契约比较时，Sandbox 实现该 IsolationSpecification；这不是 Sandbox 属于 specification 的组成关系。
      en: Sandbox realizes IsolationSpecification when its effective workspace, filesystem, and process evidence can be compared with the designated static contract; this is not a composition in which Sandbox is part of the specification.
      ja: live Sandbox の effective workspace、filesystem、process evidence を指定された静的 contract と比較できるとき、Sandbox は IsolationSpecification を実現する。Sandbox が specification の一部である composition ではない。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_realized_by
      labels: {zh: 由沙箱实现, en: is realized by sandbox, ja: sandbox により実現される}
    conditions:
      - id: sandbox-realization-evidence-condition
        severity: error
        expression: Assert realizes only when isolation_spec_ref, effective_workspace_source_refs, and process/filesystem evidence are retained; a named container or session ID alone is insufficient.
        explanations:
          zh: 实现关系需要规范与运行时证据之间可审计的比较，而不是名称匹配。
          en: "The realization relation requires an auditable comparison between contract and runtime evidence, not a name match."
          ja: realization relation には contract と runtime evidence の監査可能な比較が必要であり、name match だけでは足りない。
        source_claims: [claim-sandbox-openai-session, claim-sandbox-local-realization]
    temporal_scope: valid-time
    boundary_context: Sandbox is a live environment associated with a static specification; it is neither the specification text nor an authorization or invocation record.
    constraints: []
    examples: []
    source_claims: [claim-sandbox-local-realization]
    distinct_fact_rationale:
      zh: 关联关系保留静态契约与实时环境的不同身份，避免把它们误画成同一层级的组成对象。
      en: The association preserves the distinct identities of static contract and live environment instead of drawing them as composition at one layer.
      ja: association は static contract と live environment の異なる identity を保持し、同じ layer の composition として描かない。
    layout_role: cross-link
sources:
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    accessed_on: 2026-07-19
    source_type: design-inference
    relevance: Defines the project-local live-sandbox record and its realization association to an intended containment contract.
  - id: openai-agents-sdk-sandbox-guide
    title: OpenAI Agents SDK — Sandbox concepts
    url: https://openai.github.io/openai-agents-python/sandbox/guide/
    source_type: official-doc
    relevance: Defines live sandbox sessions, session sources, effective-workspace behavior, and client choices.
  - id: docker-container-run-reference
    title: Docker Docs — docker container run
    url: https://docs.docker.com/reference/cli/docker/container/run/
    source_type: official-doc
    relevance: Documents Docker container runtime options that remain separate from an SDK-level sandbox session record.
source_claims:
  - id: claim-sandbox-openai-session
    source: openai-agents-sdk-sandbox-guide
    supports: A sandbox session is the live isolated environment where commands run and files change; SandboxRunConfig can inject a session, resume from session state, or create one through a client, and a Manifest is only a fresh-session workspace contract.
    locator: Concepts — core pieces, How a sandbox run is prepared, and Choose a sandbox client
    evidence_kind: official-doc
    confidence: high
