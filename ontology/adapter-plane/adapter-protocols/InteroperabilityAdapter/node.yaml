source_claims:
  - id: claim-interoperability-adapter-001
    source: eng-proto-a2a-spec
    supports: "InteroperabilityAdapter abstracts the executable conversion responsibility illustrated by A2A 1.0: a shared canonical data model is mapped to multiple protocol bindings under functional-equivalence and explicit version rules. The broader capability name and its placement under Adapter are Moonweave ontology decisions."
    locator: A2A 1.0 sections 1.3 Specification Structure, 3.6 Versioning, and 5.1 Functional Equivalence
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-interoperability-adapter-002
    source: eng-proto-fipa-acl
    supports: "InteroperabilityAdapter also abstracts the separation required by FIPA SC00061G: the Standard fixes an abstract message parameter model but delegates concrete encodings, so an implementation must perform an explicit, version-aware conversion rather than equate source objects with ontology concepts."
    locator: SC00061G section 2 FIPA ACL Message Structure and encoding separation
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-interoperability-adapter-003
    source: eng-proto-a2a-spec
    supports: "InteroperabilityAdapter-example-positive-001 uses A2A 1.0's versioned interoperability contract: bindings must preserve functional equivalence for the canonical data model and clients must request an explicit Major.Minor protocol version."
    locator: A2A 1.0 sections 3.6 Versioning and 5.1 Functional Equivalence Requirements
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-interoperability-adapter-004
    source: eng-proto-fipa-acl
    supports: InteroperabilityAdapter-example-positive-001 keeps external constructs and their encodings outside the core ontology, matching SC00061G's separation between the abstract ACL message structure and encoding-specific specifications.
    locator: SC00061G section 2, paragraphs 108-114 on abstract parameters and encodings
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-interoperability-adapter-005
    source: eng-proto-a2a-spec
    supports: InteroperabilityAdapter-example-boundary-001 derives the need for executable binding conformance from A2A 1.0, which requires concrete bindings to map abstract operations and data with functional equivalence; the capability/specification distinction is Moonweave's ontology decision.
    locator: A2A 1.0 sections 1.3 Specification Structure and 5.1 Functional Equivalence
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-interoperability-adapter-006
    source: eng-proto-fipa-acl
    supports: InteroperabilityAdapter-example-boundary-001 is consistent with SC00061G's distinction between the abstract message-parameter specification and concrete representation specifications, showing why a specification is not itself an executing adapter.
    locator: SC00061G section 2, paragraphs 108-114 on message structure versus encoding
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-interoperability-adapter-007
    source: eng-proto-a2a-spec
    supports: InteroperabilityAdapter-example-instance-001 keeps the external A2A version separate because A2A 1.0 treats Major.Minor as a negotiated protocol property, not as the local adapter implementation version.
    locator: A2A 1.0 section 3.6 Versioning and A2A-Version semantics
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-interoperability-adapter-008
    source: eng-proto-fipa-acl
    supports: InteroperabilityAdapter-example-instance-001 follows the same separation shown by FIPA SC00061G between an abstract external message contract and implementation-specific encoding or adapter machinery.
    locator: SC00061G section 2, abstract ACL message structure and encoding references
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-interoperability-adapter-009
    source: eng-proto-a2a-spec
    supports: A2A's stated purpose is communication and interoperability among independent, potentially opaque agent systems, with capability discovery, collaborative tasks, messages, artifacts, and security metadata. That evidence supports the InteroperabilityAdapter endpoint. It does not define benchmark scenarios or scoring, and the shared Adapter parent is Moonweave's classification.
