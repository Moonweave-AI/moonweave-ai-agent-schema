schema: moonweave.ai/ontology-node/v1
id: InteroperabilityAdapter
kind: concept
status: review
labels:
  zh: 互操作适配器
  en: interoperability adapter
  ja: 相互運用アダプター
semantics:
  short_definition:
    zh: 在独立系统的通信、任务、能力、身份或信任模型之间执行版本化方向映射的适配能力。
    en: An adapter capability that performs versioned directional mappings among independent systems' communication, task, capability, identity, or trust models.
    ja: 独立システム間の通信・タスク・能力・識別・信頼モデルを、版付きかつ方向付きで写像する適応能力です。
  definition:
    zh: 互操作适配器是一种 Adapter 能力，执行两个或更多独立系统之间的版本化、方向性语义转换，并把来源/目标版本、适用范围、身份保持、语义损失和一致性证据作为配置的一部分。协议适配器是其下位类型；仅把本体导出为 Schema、生成报告或导入基准数据的适配器不属于该类。
    en: An InteroperabilityAdapter is an Adapter capability that executes versioned, directional semantic conversion between two or more independent systems and records source/target versions, applicability scope, identity preservation, semantic loss, and conformance evidence in its configuration. ProtocolAdapter is a subtype; adapters that only export ontology schema, generate reports, or import benchmark data are outside this class.
    ja: 相互運用アダプターは、二つ以上の独立システム間で版付き・方向付きの意味変換を実行し、出典／対象版、適用範囲、識別保持、意味損失、適合証拠を設定として記録する Adapter 能力です。ProtocolAdapter はその下位型です。本体の Schema 出力、報告生成、ベンチマークデータ取込だけを行うアダプターはこの型に含みません。
  why_needed:
    zh: 不同协议和平台即使都使用 Message、Task 或 capability 一词，其版本、身份与状态语义仍可能不同。该上位能力把所有互操作适配器共同需要的方向、版本、损失与验证责任集中起来，防止把协议规则、转换结果和外部对象塞进同一层。
    en: Protocols and platforms may all use words such as Message, Task, or capability while assigning different version, identity, and lifecycle semantics. This superclass centralizes direction, version, loss, and validation duties shared by executable interoperability adapters, keeping mapping rules, conversion evidence, and external objects out of the capability layer.
    ja: 異なるプロトコルや基盤が Message、Task、capability という語を共用しても、版・識別・ライフサイクル意味は異なり得ます。この上位能力は実行可能な相互運用アダプターに共通する方向・版・損失・検証責任を集約し、写像規則、変換証拠、外部オブジェクトを能力層へ混在させません。
  includes:
    - zh: 纳入拥有稳定适配器标识和实现版本、引用已审查 MappingRule 集、固定外部系统版本、声明转换方向和损失策略，并以测试结果或覆盖报告支持其互操作范围的可执行适配配置。
      en: Includes executable adapter configurations with stable identity and implementation version, a reviewed MappingRule set, pinned external-system versions, declared conversion direction and loss policy, and test or coverage evidence for their interoperability scope.
      ja: 安定したアダプター識別子と実装版、審査済み MappingRule 集、固定した外部システム版、宣言済み変換方向と損失方針、相互運用範囲を裏付けるテストまたは網羅率証拠を持つ実行可能な設定を含みます。
  excludes:
    - zh: 不纳入 MappingRule 或 ProtocolMapping 规范、MappingTestResult/CoverageReport 等证据、一次转换运行、外部消息或任务对象；BenchmarkAdapter、SchemaAdapter 和 ExportAdapter 若不承担独立系统间语义互操作，也不属于本类。
      en: Excludes MappingRule or ProtocolMapping specifications, evidence such as MappingTestResult or CoverageReport, individual conversion runs, and external message or task objects. BenchmarkAdapter, SchemaAdapter, and ExportAdapter are excluded unless they actually perform semantic interoperability between independent systems.
      ja: MappingRule／ProtocolMapping 仕様、MappingTestResult／CoverageReport などの証拠、個々の変換実行、外部メッセージ・タスクオブジェクトは含みません。BenchmarkAdapter、SchemaAdapter、ExportAdapter も、独立システム間の意味相互運用を実行しない限り対象外です。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: InteroperabilityAdapter-example-positive-001
    kind: positive
    labels:
      zh: 互操作适配器正例
      en: Positive example of interoperability adapter
      ja: 相互運用アダプターの正例
    scenario_id: null
    descriptions:
      zh: adapter-a2a-1-0 以 A2A 1.0 为来源系统、Moonweave 2.0.0 为目标系统，按 source-to-target 方向转换任务、消息与信任声明；配置引用逐构造映射和测试结果，并对 A2A 扩展与不透明内部状态声明损失。因为它在两个独立模型之间执行映射，所以既是 A2AAdapter，也是 InteroperabilityAdapter。
      en: adapter-a2a-1-0 converts task, message, and trust declarations from A2A 1.0 to Moonweave 2.0.0 in the source-to-target direction. It references construct-level rules and test results and declares loss for A2A extensions and opaque internal state. Because it executes mappings between two independent models, it is both an A2AAdapter and an InteroperabilityAdapter.
      ja: adapter-a2a-1-0 は A2A 1.0 を出典、Moonweave 2.0.0 を対象として、task・message・trust 宣言を source-to-target 方向で変換します。構成単位の規則とテスト結果を参照し、A2A 拡張と不透明な内部状態の損失を宣言します。二つの独立モデル間で写像を実行するため、A2AAdapter であると同時に InteroperabilityAdapter です。
    field_values:
      adapter_id: adapter-a2a
      adapter_version: 2.0.0
      scope:
        - task
        - message
        - trust
      status: supported
    related_node_ids:
      - InteroperabilityAdapter
      - Adapter
    related_relation_ids:
      - InteroperabilityAdapter-is_a-Adapter
    expected_result:
      zh: 分类器沿 A2AAdapter → ProtocolAdapter → InteroperabilityAdapter → Adapter 的真实 is_a 链继承能力语义，同时把各 MappingRule 与测试证据保留为独立节点信息。
      en: Classification follows the real A2AAdapter → ProtocolAdapter → InteroperabilityAdapter → Adapter is_a chain, while MappingRule and test evidence remain separate node information.
      ja: 分類は A2AAdapter → ProtocolAdapter → InteroperabilityAdapter → Adapter の実在する is_a 連鎖に従い、MappingRule とテスト証拠は別ノード情報として保持します。
    why_valid_or_invalid:
      zh: 该配置具备互操作能力的完整判据：两个独立模型、固定版本、明确方向、逐构造规则、损失声明与一致性证据，而不是只贴了一个系统名称。
      en: "The configuration satisfies the full interoperability criterion: two independent models, pinned versions, explicit direction, construct-level rules, loss declarations, and conformance evidence rather than a system-name label alone."
      ja: 二つの独立モデル、固定版、明示方向、構成単位規則、損失宣言、適合証拠を備えており、単なるシステム名ラベルではないため、相互運用能力の完全な判定条件を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-interoperability-adapter-003
      - claim-interoperability-adapter-004
  - id: InteroperabilityAdapter-example-boundary-001
    kind: boundary
    labels:
      zh: 互操作适配器边界例
      en: Boundary case for interoperability adapter
      ja: 相互運用アダプターの境界例
    scenario_id: null
    descriptions:
      zh: ProtocolMapping 记录“把 A2A TaskState 映射到 Moonweave Task.status”的版本、方向与损失，但它只是可审查规范；在没有加载规则、执行转换和产出证据的适配器配置时，ProtocolMapping 不能被归类为 InteroperabilityAdapter。
      en: A ProtocolMapping may specify the version, direction, and loss for mapping A2A TaskState to Moonweave Task.status, but it is only a reviewable specification. Without an adapter configuration that loads the rule, executes conversion, and emits evidence, ProtocolMapping is not an InteroperabilityAdapter.
      ja: ProtocolMapping は A2A TaskState から Moonweave Task.status への写像版・方向・損失を規定できますが、審査可能な仕様にすぎません。規則を読み込み、変換を実行し、証拠を出力する設定がなければ、ProtocolMapping は InteroperabilityAdapter ではありません。
    field_values: {}
    related_node_ids:
      - InteroperabilityAdapter
      - Adapter
      - ProtocolMapping
    related_relation_ids:
      - InteroperabilityAdapter-is_a-Adapter
    expected_result:
      zh: ProtocolMapping 保持 specification 语义；执行能力、规则规范与转换证据分别归入各自层级。
      en: ProtocolMapping retains specification semantics; executable capability, mapping specification, and conversion evidence remain in separate layers.
      ja: ProtocolMapping は specification 意味を維持し、実行能力、写像仕様、変換証拠はそれぞれ別の層に属します。
    why_valid_or_invalid:
      zh: “说明怎么映射”与“有能力执行映射”具有不同身份条件；将两者合并会再次把规则、框架和运行结果混入一个社区。
      en: Specifying how to map and having the capability to execute that mapping have different identity conditions. Merging them would again mix rules, capabilities, and runtime evidence in one structural community.
      ja: 「どう写像するかを規定すること」と「写像を実行できること」は異なる同一性条件を持ちます。統合すると規則、能力、実行証拠が再び一つの構造コミュニティに混在します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-interoperability-adapter-005
      - claim-interoperability-adapter-006
  - id: InteroperabilityAdapter-example-instance-001
    kind: instance
    labels:
      zh: 互操作适配器结构化实例
      en: Structured instance of interoperability adapter
      ja: 相互運用アダプターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: 节点内配置 adapter_id=adapter-a2a、adapter_version=2.0.0，作用域为 task/message/trust，状态为 supported；来源 A2A 1.0 与目标 Moonweave 2.0.0、规则版本和损失类别由关联的 ProtocolMapping 承载。
      en: The inline configuration records adapter_id=adapter-a2a, adapter_version=2.0.0, task/message/trust scope, and supported status. The A2A 1.0 source, Moonweave 2.0.0 target, rule version, and loss kind remain on associated ProtocolMapping records.
      ja: ノード内設定は adapter_id=adapter-a2a、adapter_version=2.0.0、task/message/trust の範囲、supported 状態を記録します。出典 A2A 1.0、対象 Moonweave 2.0.0、規則版、損失種別は関連する ProtocolMapping が保持します。
    field_values:
      adapter_id: adapter-a2a
      adapter_version: 2.0.0
      scope:
        - task
        - message
        - trust
      status: supported
    related_node_ids:
      - InteroperabilityAdapter
    related_relation_ids: []
    expected_result:
      zh: 能力配置通过 Adapter 继承字段校验，同时不复制 ProtocolMapping 的规范字段。
      en: The capability configuration validates against inherited Adapter fields without duplicating ProtocolMapping specification fields.
      ja: 能力設定は継承した Adapter 項目で検証され、ProtocolMapping の仕様項目を複製しません。
    why_valid_or_invalid:
      zh: 实例只记录能力自身的身份、实现版本、范围与状态；外部版本和语义转换细节继续由规则规范承担，避免字段和来源重复。
      en: The instance records only capability identity, implementation version, scope, and status. External versions and semantic conversion detail remain the responsibility of mapping specifications, avoiding duplicate fields and evidence.
      ja: インスタンスは能力自身の識別子、実装版、範囲、状態だけを記録します。外部版と意味変換の詳細は写像仕様が引き続き担い、項目と証拠の重複を避けます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-interoperability-adapter-007
      - claim-interoperability-adapter-008
external_mappings: []
applicability:
  - adapter
sibling_differentiation:
  - sibling_concept_id: BenchmarkAdapter
    shared_parent_concept_id: Adapter
    differentia:
      zh: InteroperabilityAdapter 的输出用于两个独立系统之间的通信、能力、任务、身份或信任交换；BenchmarkAdapter 的输出用于把基准场景、评分与观察接入评估。前者以互通正确性为目标，后者以测量可比性为目标。
      en: InteroperabilityAdapter enables communication, capability, task, identity, or trust exchange between independent systems. BenchmarkAdapter imports benchmark scenarios, scoring, and observations into evaluation. The former targets interoperable behavior; the latter targets comparable measurement.
      ja: InteroperabilityAdapter は独立システム間の通信・能力・Task・識別・信頼交換、BenchmarkAdapter は評価用のシナリオ・採点・観測取込みを担います。前者は相互運用、後者は測定比較が目的です。
    source_claims:
      - claim-interoperability-adapter-009
      - claim-interoperability-adapter-010
parent_relation: null
relations:
  - id: InteroperabilityAdapter-is_a-Adapter
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是一种
      en: is a
      ja: の一種である
    definitions:
      zh: 互操作适配器 是一种 适配器。区分特征：MCP、A2A 与 FIPA 三套独立规范分别定义跨系统能力、任务和消息互操作，证明该中间上位概念具有真实共同区分特征。
      en: "interoperability adapter is a kind of adapter. Reviewed differentia: MCP, A2A, and FIPA independently define cross-system capability, task, and message interoperability, evidencing a genuine shared differentiating feature for this intermediate parent."
      ja: 相互運用アダプター は アダプター の一種です。審査済みの種差：MCP・A2A・FIPA の独立仕様はそれぞれシステム横断能力・タスク・メッセージ相互運用を定義し、本中間親の真正な共通差異を裏付けます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 分类继承不使用实例关系基数。
      en: Taxonomic inheritance does not use instance-relation cardinality.
      ja: 分類継承にはインスタンス関係の基数を用いません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 反向：是一种
        en: has subtype
        ja: 逆方向：の一種である
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: InteroperabilityAdapter-is_a-Adapter-example-positive-manual-001
        kind: positive
        labels:
          zh: 是一种人工正例
          en: Reviewed positive case for is a
          ja: の一種であるの審査済み正例
        scenario_id: null
        descriptions:
          zh: "`remote-agent-interoperability@1.0` 在 JSON-RPC 与 gRPC 绑定间保持 SendMessage、GetTask、取消、错误与鉴权语义，并通过跨实现合同测试。"
          en: "`remote-agent-interoperability@1.0` preserves SendMessage, GetTask, cancellation, error, and authorization semantics across JSON-RPC and gRPC bindings and passes cross-implementation contract tests."
          ja: "`remote-agent-interoperability@1.0` は JSON-RPC と gRPC binding 間で SendMessage、GetTask、cancel、error、authorization 意味を保持し、実装横断契約試験に合格します。"
        field_values: {}
        related_node_ids:
          - InteroperabilityAdapter
          - Adapter
        related_relation_ids:
          - InteroperabilityAdapter-is_a-Adapter
        expected_result:
          zh: 该能力应归为 InteroperabilityAdapter，并通过上位链成为 Adapter。
          en: The capability is classified as InteroperabilityAdapter and therefore as Adapter.
          ja: この能力は InteroperabilityAdapter、したがって Adapter に分類されます。
        why_valid_or_invalid:
          zh: 它验证不同实现和传输间的功能等价，而不只是序列化一种格式。
          en: It verifies functional equivalence across implementations and transports rather than merely serializing one format.
          ja: 一形式の serialization ではなく、実装・transport 間の機能同値を検証するためです。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-interoperability-adapter-011
      - id: InteroperabilityAdapter-is_a-Adapter-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 是一种人工边界例
          en: Reviewed boundary case for is a
          ja: の一種であるの審査済み境界例
        scenario_id: null
        descriptions:
          zh: 一个 JSON 编码器只把内部对象转成字节，不处理方法、生命周期、错误或鉴权等价；它是序列化组件。
          en: A JSON encoder only converts an internal object to bytes and preserves no method, lifecycle, error, or authorization equivalence; it is a serialization component.
          ja: JSON encoder が内部 object を byte にするだけで method、lifecycle、error、authorization 同値を扱わない場合は serialization component です。
        field_values: {}
        related_node_ids:
          - InteroperabilityAdapter
          - Adapter
        related_relation_ids:
          - InteroperabilityAdapter-is_a-Adapter
        expected_result:
          zh: 不得把该编码器归入 InteroperabilityAdapter。
          en: The encoder is excluded from InteroperabilityAdapter.
          ja: この encoder を InteroperabilityAdapter に分類しません。
        why_valid_or_invalid:
          zh: 语法转换不足以证明独立系统间的行为互操作。
          en: Syntactic conversion is insufficient to establish behavioral interoperability between independent systems.
          ja: 構文変換だけでは独立 system 間の行動相互運用を証明できません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-interoperability-adapter-011
    source_claims:
