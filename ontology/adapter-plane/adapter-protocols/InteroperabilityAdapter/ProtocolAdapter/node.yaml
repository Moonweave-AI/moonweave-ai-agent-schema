      en: Maps MCP 2025-11-25 client/server sessions, transports, tools, resources, prompts, and authorization constructs to the corresponding canonical Concepts.
      ja: MCP 2025-11-25 のクライアント／サーバーセッション、トランスポート、ツール、リソース、プロンプト、認可構成を対応する canonical Concept へ写像します。
    direction: bidirectional
    loss_notes:
      zh: 能力协商、扩展字段、分页游标、SDK 对象身份与实现专属传输细节保持为 MCP 原生信息；canonical Tool 不自动保证 MCP 服务端可导出性。
      en: Capability negotiation, extension fields, pagination cursors, SDK object identity, and implementation-specific transport details remain MCP-native; a canonical Tool is not automatically exportable as an MCP server tool.
      ja: 能力ネゴシエーション、拡張項目、ページングカーソル、SDK オブジェクト同一性、実装固有トランスポート詳細は MCP 側に保持し、canonical Tool が自動的に MCP サーバーツールとして出力可能になるわけではありません。
    conversion_note:
      zh: 导入与导出均按 2025-11-25 规范逐构造验证；版本外的草案能力必须作为显式扩展处理。
      en: Import and export validate each construct against the 2025-11-25 specification; draft capabilities outside that revision must be explicit extensions.
      ja: インポートとエクスポートは各構成を 2025-11-25 仕様に照らして検証し、その版に含まれないドラフト能力は明示的な拡張として扱います。
    conformance:
