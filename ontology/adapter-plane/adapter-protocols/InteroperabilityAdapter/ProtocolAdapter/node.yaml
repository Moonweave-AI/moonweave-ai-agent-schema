        en: Validates the MCP 2025-11-25 revision, direction, target resolvability, registered source, scope, and known loss.
        ja: MCP 2025-11-25 の版、方向、対象解決性、登録出典、範囲、既知の損失を検証します。
    status: accepted
    source_claims:
      - claim-protocol-adapter-019
      - claim-protocol-adapter-020
