schema: moonweave.ai/ontology-node/v1
id: ProtocolAdapter
kind: concept
status: accepted
labels:
  zh: 协议适配器
  en: protocol adapter
  ja: プロトコルアダプター
semantics:
  short_definition:
    zh: 协议适配器是按明确协议版本与绑定执行协议构造和 Moonweave 概念之间转换的互操作能力。
    en: A protocol adapter is an interoperability capability that executes conversions between versioned protocol constructs and Moonweave concepts.
    ja: プロトコルアダプターは、版とバインディングを明示したプロトコル構成と Moonweave Concept 間の変換を実行する相互運用能力です。
  definition:
    zh: 协议适配器是一类互操作适配器；其种差是受一个具名协议、明确版本与传输或编码绑定约束，执行一个或多个 ProtocolMapping，把协议原生的消息、任务、能力和信任构造有方向地转换为 Moonweave 概念，并保存无法无损表达的协议字段。它是可配置、可测试的转换能力，不是协议规范本身、映射规则文本、网络连接、协议包或对端参与者。
    en: A ProtocolAdapter is an InteroperabilityAdapter whose differentia is being constrained by a named protocol, explicit revision, and transport or encoding binding. It executes one or more ProtocolMappings to convert native message, task, capability, and trust constructs directionally into Moonweave concepts while retaining fields that cannot be represented losslessly. It is a configurable, testable conversion capability—not the protocol specification, mapping rule text, network connection, protocol packet, or remote participant.
    ja: ProtocolAdapter は InteroperabilityAdapter の一種で、名称付きプロトコル、明示版、トランスポートまたは符号化バインディングに制約され、一つ以上の ProtocolMapping を実行して、固有のメッセージ・Task・能力・信頼構成を Moonweave Concept へ方向付きで変換し、無損失で表せない項目を保持する点が種差です。設定・試験可能な変換能力であり、プロトコル仕様、写像規則文書、ネットワーク接続、パケット、相手参加者ではありません。
  why_needed:
    zh: 该层把“协议说明了什么”“映射规则规定什么”和“运行时由什么能力执行转换”分开，使 A2A、MCP、FIPA 与 KQML 能共享适配器契约，却不会把彼此不相容的版本、任务语义或安全字段塞进核心。
    en: This layer separates what a protocol specifies, what a mapping rule prescribes, and which runtime capability performs the conversion. A2A, MCP, FIPA, and KQML can share an adapter contract without pushing incompatible revisions, task semantics, or security fields into core.
    ja: この層は、プロトコルが規定する内容、写像規則が定める内容、実行時に変換する能力を分離します。A2A、MCP、FIPA、KQML は共通契約を持ちながら、非互換な版・Task 意味・セキュリティ項目をコアへ混入しません。
  includes:
    - zh: 纳入同时声明协议名称与外部版本、支持的传输/编码、转换方向、适用的 ProtocolMapping、已知损失及一致性测试的可执行适配器；至少应能区分协议对象、Moonweave 目标和适配器自身版本。
      en: Includes executable adapters that declare protocol name and external revision, supported transport or encoding, conversion direction, applicable ProtocolMappings, known loss, and conformance tests, and that distinguish protocol objects, Moonweave targets, and the adapter's own version.
      ja: プロトコル名・外部版、対応トランスポート／符号化、変換方向、適用 ProtocolMapping、既知損失、適合試験を宣言し、プロトコル対象、Moonweave 対象、アダプター自身の版を区別する実行可能アダプターを含みます。
  excludes:
    - zh: 不纳入未绑定协议的通用互操作桥、ProtocolMapping 规则、协议 Schema/规范、一次转换运行、网络会话、协议消息或任务实例；仅仅引用协议名称或成为映射目标，也不足以成为协议适配器。
      en: Excludes protocol-agnostic interoperability bridges, ProtocolMapping rules, protocol schemas or specifications, individual conversion runs, network sessions, and message or task instances. Merely naming a protocol or being a mapping target is insufficient.
      ja: プロトコル非依存の相互運用橋、ProtocolMapping 規則、仕様／Schema、個別変換実行、ネットワークセッション、メッセージ／Task 実体は含みません。プロトコル名の参照や写像対象であることだけでは不十分です。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: protocol_name
      labels:
        zh: 协议名称
        en: protocol name
        ja: プロトコル名
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识该适配能力实际实现的外部通信协议；它不得用 SDK 名、传输名或 Moonweave 旧版本名替代。
        en: Identifies the external communication protocol actually implemented by the adapter; an SDK name, transport name, or retired Moonweave version is not a substitute.
        ja: Adapter が実装する外部通信 protocol を識別し、SDK 名、transport 名、旧 Moonweave 版で代用しません。
      allowed_values: []
      pattern: null
      example_value: A2A
      source_claims:
        - claim-protocol-adapter-001
        - claim-protocol-adapter-002
    - id: protocol_version
      labels:
        zh: 协议版本
        en: protocol version
        ja: プロトコル版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定外部协议语义所依据的发布版本或不可变规范快照，并与适配器实现版本分开记录。
        en: Pins the released protocol revision or immutable specification snapshot that defines external semantics, separately from the adapter implementation version.
        ja: 外部意味を定める公開 protocol 版または不変仕様 snapshot を固定し、Adapter 実装版とは分けて記録します。
      allowed_values: []
      pattern: null
      example_value: A2A-1.0
      source_claims:
        - claim-protocol-adapter-007
    - id: binding
      labels:
        zh: 协议绑定
        en: protocol binding
        ja: プロトコル束縛
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出该适配器实际支持、且经独立验证的传输或编码绑定；抽象消息结构与具体线路绑定不得混写。
        en: Lists independently verified transport or encoding bindings actually supported by the adapter; an abstract message structure and a concrete wire binding remain distinct.
        ja: Adapter が実際に対応し個別検証した transport／encoding binding を列挙し、抽象 message 構造と具体 wire binding を混同しません。
      allowed_values: []
      pattern: null
      example_value:
        - HTTP+JSON
      source_claims:
        - claim-protocol-adapter-001
        - claim-protocol-adapter-004
        - claim-protocol-adapter-008
  constraints:
    - id: protocol-adapter-version-and-binding-explicit
      severity: error
      expression_language: plain
      expression: protocol_name, protocol_version, and at least one independently verified binding are declared separately from adapter_version
      explanations:
        zh: 协议名称、协议版本和至少一个经验证绑定必须与适配器实现版本分开声明。
        en: Protocol name, protocol version, and at least one verified binding are declared separately from the adapter implementation version.
        ja: protocol 名、protocol 版、少なくとも一つの検証済み binding を Adapter 実装版とは分けて宣言します。
      source_claims:
        - claim-protocol-adapter-001
        - claim-protocol-adapter-002
  required_relation_constraints: []
examples:
  - id: ProtocolAdapter-example-positive-001
    kind: positive
    labels:
      zh: 协议适配器正例
      en: Positive example of protocol adapter
      ja: プロトコルアダプターの正例
    scenario_id: null
    descriptions:
      zh: adapter-a2a-1-0 固定 A2A 1.0 与 HTTP+JSON 绑定，加载分别面向 Message、Task 和安全要求的 ProtocolMapping，并记录 Artifact 部分无法直接落入 Message 的保留策略；同一配置还保存适配器实现版本 2.0.0 和协议一致性测试结果。
      en: adapter-a2a-1-0 pins A2A 1.0 with its HTTP+JSON binding, loads separate ProtocolMappings for Messages, Tasks, and security requirements, and records a preservation policy for Artifact parts that cannot be collapsed into Message. The same configuration stores adapter implementation version 2.0.0 and protocol conformance results.
      ja: adapter-a2a-1-0 は A2A 1.0 と HTTP+JSON バインディングを固定し、Message・Task・セキュリティ要件用の別々の ProtocolMapping を読み込み、Message に畳み込めない Artifact part の保持方針を記録します。同じ設定に実装版 2.0.0 と適合試験結果も保存します。
    field_values:
      adapter_id: adapter-a2a-1-0
      adapter_version: 2.0.0
      protocol_name: A2A
      protocol_version: A2A-1.0
      binding:
        - HTTP+JSON
      scope:
        - task
        - message
        - trust
      status: supported
    related_node_ids:
      - ProtocolAdapter
      - ProtocolMapping
    related_relation_ids:
      - ProtocolMapping-applies_to_adapter-ProtocolAdapter
    expected_result:
      zh: 该配置被归为 ProtocolAdapter；三条映射规则仍是独立的 ProtocolMapping 规范，Artifact 保留策略作为已知损失附着于配置。
      en: The configuration is classified as ProtocolAdapter. Its three rules remain independent ProtocolMapping specifications, and the Artifact preservation policy remains attached as known loss.
      ja: 設定は ProtocolAdapter と分類され、三つの規則は独立した ProtocolMapping 仕様のまま、Artifact 保持方針は既知損失として設定に付着します。
    why_valid_or_invalid:
      zh: 它具备协议名、版本、绑定、多个适用规则、损失策略和一致性测试，因而表达可执行适配能力；没有把 A2A Task 或 AgentCard 本身当作 Adapter。
      en: It supplies protocol name, revision, binding, applicable rules, a loss policy, and conformance tests, so it denotes executable adaptation capability without treating an A2A Task or AgentCard as the Adapter.
      ja: 名称、版、バインディング、適用規則、損失方針、適合試験を備えるため実行能力を表し、A2A Task や AgentCard 自体を Adapter としていません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-protocol-adapter-003
      - claim-protocol-adapter-004
  - id: ProtocolAdapter-example-boundary-001
    kind: boundary
    labels:
      zh: 协议适配器边界例
      en: Boundary case for protocol adapter
      ja: プロトコルアダプターの境界例
    scenario_id: null
    descriptions:
      zh: 一份“把 A2A TaskState 映射到 Moonweave Task.status”的 ProtocolMapping 只规定源构造、目标构造、方向和损失；即使它 applies_to_adapter 某个 ProtocolAdapter，这份规则仍不是能够建立连接、协商版本并执行转换的适配器。
      en: A ProtocolMapping from A2A TaskState to Moonweave Task.status specifies source and target constructs, direction, and loss. Even when it applies_to_adapter a ProtocolAdapter, the rule is not the capability that establishes a connection, negotiates a revision, and executes conversion.
      ja: A2A TaskState を Moonweave Task.status へ写像する ProtocolMapping は、源・対象・方向・損失を規定するだけです。ProtocolAdapter に applies_to_adapter しても、接続、版協商、変換実行を行う能力そのものにはなりません。
    field_values: {}
    related_node_ids:
      - ProtocolAdapter
      - ProtocolMapping
      - InteroperabilityAdapter
    related_relation_ids:
      - ProtocolMapping-applies_to_adapter-ProtocolAdapter
    expected_result:
      zh: ProtocolMapping 保持 specification 类型，ProtocolAdapter 保持 capability 类型；applies_to_adapter 只表达规则适用范围，不表达 is_a。
      en: ProtocolMapping remains a specification and ProtocolAdapter remains a capability; applies_to_adapter expresses rule applicability, not is_a membership.
      ja: ProtocolMapping は specification、ProtocolAdapter は capability のままで、applies_to_adapter は規則の適用範囲を表し、is_a を表しません。
    why_valid_or_invalid:
      zh: 规则与执行者拥有不同身份、生命周期和验证责任；适用关系是横向关联，不能承担分类层级。
      en: The rule and its executor have different identities, lifecycles, and validation duties. Applicability is a cross-link and cannot serve as a taxonomic parent relation.
      ja: 規則と実行者は識別・ライフサイクル・検証責任が異なり、適用関係は横断リンクで分類階層にはなりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-protocol-adapter-005
      - claim-protocol-adapter-006
  - id: ProtocolAdapter-example-instance-001
    kind: instance
    labels:
      zh: 协议适配器结构化实例
      en: Structured instance of protocol adapter
      ja: プロトコルアダプターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: adapter-a2a-1-0 的节点内实例记录实现版本 2.0.0、外部版本 A2A 1.0、HTTP+JSON 绑定、task/message/trust 范围以及支持状态；映射规则 ID 和一致性结果作为配置说明保留。
      en: The inline adapter-a2a-1-0 record stores implementation version 2.0.0, external revision A2A 1.0, HTTP+JSON binding, task/message/trust scope, and supported status, with mapping-rule IDs and conformance results retained as configuration detail.
      ja: adapter-a2a-1-0 のノード内記録は、実装版 2.0.0、外部版 A2A 1.0、HTTP+JSON、task/message/trust 範囲、supported 状態を持ち、規則 ID と適合結果を設定情報として保持します。
    field_values:
      adapter_id: adapter-a2a-1-0
      adapter_version: 2.0.0
      protocol_name: A2A
      protocol_version: A2A-1.0
      binding:
        - HTTP+JSON
      scope:
        - task
        - message
        - trust
      status: supported
    related_node_ids:
      - ProtocolAdapter
    related_relation_ids: []
    expected_result:
      zh: 继承字段验证通过，并且实现版本与 A2A 外部版本不共用一个字段；该实例只在 ProtocolAdapter 节点详情中说明配置。
      en: Inherited fields validate, implementation and A2A revisions do not share a field, and the instance remains explanatory configuration on the ProtocolAdapter node.
      ja: 継承項目を検証し、実装版と A2A 外部版を同一項目にせず、実体は ProtocolAdapter ノード詳細の設定説明として保持します。
    why_valid_or_invalid:
      zh: adapter_id 指向转换能力，scope 是能力覆盖范围；二者都没有拿协议 Task、Message 或映射规则的身份代替适配器身份。
      en: adapter_id identifies the conversion capability and scope identifies its coverage; neither substitutes a protocol Task, Message, or mapping-rule identity for the adapter identity.
      ja: adapter_id は変換能力、scope は能力範囲を示し、プロトコル Task・Message・写像規則の識別をアダプター識別へ代入しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-protocol-adapter-007
      - claim-protocol-adapter-008
external_mappings:
  - id: A2AAdapter-external-mapping
    system: A2A
    external_identifier: A2A
    external_version: "1.0"
    canonical_target_ids:
      - AgentActor
      - RemoteAgentReference
      - Task
      - Message
      - Artifact
      - TrustBoundary
      - AgentTranscript
    mapping_kind: related
    scope:
      zh: 映射 A2A v1.0 的 Agent Card、远程智能体身份、任务生命周期、消息、产物与安全方案到对应 canonical 概念。
      en: Maps A2A v1.0 Agent Cards, remote-agent identity, task lifecycle, messages, artifacts, and security schemes to the corresponding canonical Concepts.
      ja: A2A v1.0 の Agent Card、リモートエージェント識別、タスクライフサイクル、メッセージ、成果物、セキュリティ方式を対応する canonical Concept へ写像します。
    direction: bidirectional
    loss_notes:
      zh: 协议扩展、传输绑定、SDK 对象身份及未标准化字段保持为 A2A 原生信息；canonical Artifact 不等同于任意 SDK 内部对象。
      en: Protocol extensions, transport bindings, SDK object identity, and non-standard fields remain A2A-native; canonical Artifact is not equivalent to every SDK-internal object.
      ja: プロトコル拡張、トランスポート束縛、SDK オブジェクト同一性、非標準項目は A2A 側に保持し、canonical Artifact は任意の SDK 内部オブジェクトと同値ではありません。
    conversion_note:
      zh: A2A v1.0 导入时分别解析 Agent Card、Task、Message 与 Artifact；导出仅在目标字段可由 canonical 信息无歧义构造时执行。
      en: A2A v1.0 import resolves Agent Card, Task, Message, and Artifact separately; export is allowed only when target fields can be constructed unambiguously from canonical information.
      ja: A2A v1.0 のインポートでは Agent Card、Task、Message、Artifact を個別に解決し、エクスポートは canonical 情報から対象項目を曖昧なく構成できる場合に限ります。
    conformance:
      status: contract-tested
      test_id: A2AAdapter-external-mapping-contract-test
      method:
        zh: 验证 A2A v1.0 版本、方向、目标可解析性、来源登记、范围与已知损失。
        en: Validates the A2A v1.0 version, direction, target resolvability, registered source, scope, and known loss.
        ja: A2A v1.0 の版、方向、対象解決性、登録出典、範囲、既知の損失を検証します。
    status: accepted
    source_claims:
      - claim-protocol-adapter-011
      - claim-protocol-adapter-012
  - id: FIPAAdapter-external-mapping
    system: FIPA ACL
    external_identifier: FIPA-ACL
    external_version: "2002"
    canonical_target_ids:
      - Message
      - Conversation
      - Intent
    mapping_kind: related
    scope:
      zh: 把 SC00061G 的 ACL 包络、参与者、内容描述与会话控制映射为 Message/Conversation 信息，并把 SC00037J 的交际行为种类映射为带来源的 Intent 语义。
      en: Maps SC00061G ACL envelopes, participants, content descriptors, and conversation controls to Message/Conversation information, and SC00037J communicative-act kinds to sourced Intent semantics.
      ja: SC00061G の ACL 包絡、参加者、内容記述、会話制御を Message/Conversation 情報へ、SC00037J のコミュニケーション行為種別を出典付き Intent 意味へ写像します。
    direction: bidirectional
    loss_notes:
      zh: content 的命题语义必须由 language 与 ontology 对应的独立内容映射处理；通用 Intent 字段不能完整表达交际行为的可行性前提和理性效果，SC00061G 也不决定传输编码。
      en: Propositional content requires a separate mapping for the declared language and ontology. A generic Intent field cannot preserve every act's feasibility preconditions and rational effect, and SC00061G does not determine a transport encoding.
      ja: 命題 content は宣言された language と ontology に対応する別の内容写像が必要です。一般的な Intent 項目では行為の実行可能性前提と合理的効果を完全には保持できず、SC00061G は転送符号化を決定しません。
    conversion_note:
      zh: FIPA ACL 2002 版导入时逐项保存 performative 与适用的标准参数；导出仅在 performative、参与者、content 的 language/ontology 及 interaction protocol 均可确定时生成 FIPA ACL，否则产生有损转换告警。
      en: For FIPA ACL version 2002, import preserves the performative and each applicable standard parameter. Export emits FIPA ACL only when performative, participants, content language/ontology, and the interaction protocol are all determined; otherwise it produces a lossy-conversion warning.
      ja: FIPA ACL 2002 版のインポートでは performative と該当する標準引数を個別に保存します。エクスポートは performative、参加者、content の language/ontology、相互作用プロトコルをすべて確定できる場合に限り FIPA ACL を生成し、それ以外は損失変換警告を出します。
    conformance:
      status: contract-tested
      test_id: FIPAAdapter-mapping-contract-test
      method:
        zh: 验证外部版本、映射范围、方向、已知损失、唯一所有者、来源登记以及所有 canonical 目标 ID 的可解析性。
        en: Validates the external version, scope, direction, known loss, unique owner, registered source, and resolvability of every canonical target ID.
        ja: 外部版、範囲、方向、既知の損失、一意な所有者、登録出典、および全 canonical 対象 ID の解決可能性を検証します。
    status: accepted
    source_claims:
      - claim-protocol-adapter-015
      - claim-protocol-adapter-016
  - id: KQMLAdapter-external-mapping
    system: KQML
    external_identifier: KQML
    external_version: "1994"
    canonical_target_ids:
      - Message
      - Conversation
      - Intent
    mapping_kind: related
    scope:
      zh: 映射 1994 KQML 的 performative、实际发送方/接收方、回复关联以及 content/language/ontology 元数据；只在有明确规则时把 performative 投影为 Intent。
      en: Maps 1994 KQML performatives, actual sender/receiver, reply correlation, and content/language/ontology metadata; a performative projects to Intent only through an explicit rule.
      ja: 1994 KQML の performative、実送信者／受信者、応答対応、content/language/ontology メタデータを写像し、performative は明示規則がある場合に限り Intent へ投影します。
    direction: bidirectional
    loss_notes:
      zh: 领域内容必须由声明的 language 与 ontology 单独解释；虚拟知识库、发送方态度和 :force 的全部语用含义不能由通用消息字段无损表达，传输与安全机制也不在该规范中。
      en: Domain content requires separate interpretation under its declared language and ontology. Generic message fields cannot losslessly preserve virtual-knowledge-base, sender-attitude, and :force pragmatics, and the specification does not define transport or security mechanisms.
      ja: 領域内容は宣言された language と ontology に基づく別解釈が必要です。一般 Message 項目では仮想知識ベース、送信者態度、:force の語用を無損失に保持できず、仕様は転送・セキュリティ機構を定義しません。
    conversion_note:
      zh: KQML 1994 版导入保留原 performative 名称和参数；导出仅在目标 performative、允许参数、默认值以及 content 的 language/ontology 均有规则时执行，扩展 performative 必须附精确定义。
      en: For KQML version 1994, import preserves original performative names and parameters. Export is allowed only when the target performative, permitted parameters, defaults, and content language/ontology are rule-backed; extension performatives require precise definitions.
      ja: KQML 1994 版のインポートは元の performative 名と引数を保持します。エクスポートは対象 performative、許可引数、既定値、content の language/ontology が規則で裏付けられる場合に限り、拡張 performative には厳密な定義を要求します。
    conformance:
      status: contract-tested
      test_id: KQMLAdapter-mapping-contract-test
      method:
        zh: 验证外部版本、映射范围、方向、已知损失、唯一所有者、来源登记以及所有 canonical 目标 ID 的可解析性。
        en: Validates the external version, scope, direction, known loss, unique owner, registered source, and resolvability of every canonical target ID.
        ja: 外部版、範囲、方向、既知の損失、一意な所有者、登録出典、および全 canonical 対象 ID の解決可能性を検証します。
