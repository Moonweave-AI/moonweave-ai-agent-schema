source_claims:
  - id: claim-protocol-adapter-001
    source: eng-proto-a2a-spec
    supports: ProtocolAdapter is grounded in A2A 1.0.0's layered separation of canonical data model, abstract operations, and protocol bindings. Moonweave infers a configurable capability that executes mappings across those boundaries; A2A does not define the ProtocolAdapter class or its parent.
    locator: A2A Specification 1.0.0 > Architecture > Data model, operations, and protocol bindings
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-adapter-002
    source: eng-proto-fipa-acl
    supports: ProtocolAdapter also reflects FIPA ACL's separation between an abstract message with performative and parameters and transport-specific encodings. Treating a versioned implementation of those conversions as a capability is a Moonweave design inference.
    locator: FIPA ACL Message Structure Specification SC00061G > Abstract message structure, parameters, and encodings
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-adapter-003
    source: eng-proto-a2a-spec
    supports: ProtocolAdapter-example-positive-001 uses A2A 1.0's separation of Message, Task, Artifact, AgentCard security, and protocol bindings to justify distinct mapping rules inside one executable adapter configuration.
    locator: A2A Specification 1.0.0 > Core data model and Protocol bindings
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-adapter-004
    source: eng-proto-fipa-acl
    supports: ProtocolAdapter-example-positive-001 treats protocol structure and concrete encoding as adapter bindings rather than core fields, consistent with FIPA ACL's distinction between its abstract message structure and concrete encodings.
    locator: FIPA ACL Message Structure Specification SC00061G > Abstract syntax and concrete encodings
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-adapter-005
    source: eng-proto-a2a-spec
    supports: ProtocolAdapter-example-boundary-001 uses A2A TaskState-to-canonical-status as a concrete rule example; A2A defines the external states but does not identify the mapping specification as an executable adapter.
    locator: A2A Specification 1.0.0 > Task > TaskState and lifecycle
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-adapter-006
    source: eng-proto-fipa-acl
    supports: "ProtocolAdapter-example-boundary-001 is reinforced by FIPA's separate normative message structure and encoding specifications: a specification constrains an implementation but is not itself the component that exchanges or converts messages."
    locator: FIPA ACL Message Structure Specification SC00061G > Scope, conformance, and encodings
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-adapter-007
    source: eng-proto-a2a-spec
    supports: ProtocolAdapter-example-instance-001 pins the external revision to A2A 1.0.0 because A2A uses revisioned protocol bindings and version headers; adapter_version remains a separate implementation attribute.
    locator: A2A Specification 1.0.0 > Protocol versioning and A2A-Version header
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-adapter-008
    source: eng-proto-fipa-acl
    supports: ProtocolAdapter-example-instance-001 keeps encoding and semantic scope explicit because FIPA ACL makes message parameters and content interpretation dependent on declared language, ontology, protocol, and encoding metadata.
    locator: FIPA ACL Message Structure Specification SC00061G > Message parameters language, ontology, protocol, and encoding
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-adapter-009
    source: eng-proto-kqml-spec
    supports: KQML specifies performatives, sender and receiver parameters, content metadata, reply correlation, and routing/facilitation constructs. It corroborates only the KQML side of the frozen FIPA-KQML family coverage; the legacy identifier, hash, canonical targets, and migration boundary are internal Moonweave provenance.
    locator: KQML Specification > Reserved Performative Parameters; Reserved Performative Names
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-adapter-010
    source: eng-proto-fipa-acl
    supports: FIPA ACL defines communicative-act, participant, content-description, and conversation-control parameters for ACL messages. It corroborates the FIPA side of the legacy aggregate but does not assert equivalence with KQML or Moonweave concepts. Concrete child mappings remain responsible for field-level semantics and loss.
    locator: FIPA ACL Message Structure Specification > 2 ACL Message Structure; 2.1 Message Parameters and Table 1
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-adapter-011
    source: eng-proto-a2a-docs
    supports: A2A v1.0 defines Agent Cards for remote identity, interfaces, capabilities, skills, and security plus distinct Message, Task, Part, and Artifact objects. These are the external endpoints covered by the mapping. Each listed canonical target and the bidirectional/loss classification remain Moonweave correspondence judgments.
    locator: A2A Specification v1.0 > 3.6 Versioning; 4 Protocol Data Model > Core Objects; AgentCard; Security Objects
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-adapter-012
    source: eng-proto-a2a-js
    supports: The official JavaScript SDK demonstrates discovery from an Agent Card, sending a Message, receiving a stateful Task, publishing status updates, and attaching Artifacts. It validates that these are executable SDK constructs, while also showing why SDK object identity and event-bus details cannot be assumed equivalent to canonical ontology objects.
    locator: "a2aproject/a2a-js README > Agent Card discovery; A2A Task Support > Server: Creating a Task; Client: Receiving a Task"
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-adapter-013
    source: eng-proto-a2a-docs
    supports: The current A2A specification confirms that Agent Card, Task, Message, and Artifact are real protocol constructs. It does not know the frozen Moonweave v1 record, its hash, or its historical canonical target list. This claim therefore corroborates family identity only; the adjacent A2A v1.0 mapping carries actual protocol semantics.
    locator: A2A Specification v1.0 > 1.3 Specification Structure; 4 Protocol Data Model
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-adapter-014
    source: eng-proto-a2a-js
    supports: The official JavaScript SDK operationalizes A2A Messages, Tasks, status events, and Artifacts, confirming the external family named by the legacy record. It does not support the legacy coverage hash or claim that ToolResult is an A2A Artifact. Those historical correspondences remain migration metadata and require the reviewed v1.0 mapping for semantics.
    locator: a2aproject/a2a-js README > Quickstart; A2A Task Support
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-adapter-015
    source: eng-proto-fipa-acl
    supports: FIPAAdapter-external-mapping covers the SC00061G parameter groups for communicative-act type, participants, content, content description, and conversation control. Its conditional export rule follows the warning that omitted parameters can prevent interoperability.
    locator: SC00061G section 2 and Table 1; parameter omission notes in paragraphs 108-112
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-adapter-016
    source: eng-proto-fipa-act
    supports: FIPAAdapter-external-mapping treats communicative acts as versioned semantic inputs because SC00037J makes each implemented library act conform to its normative definition and distinguishes feasibility preconditions from rational effect.
    locator: SC00037J section 2.1 and Annex A sections 5.3-5.4
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-adapter-017
    source: eng-proto-kqml-spec
    supports: KQMLAdapter-external-mapping covers the original reserved parameter contract, including participant, reply, content, language, ontology, and force semantics, and requires extensions to define permitted parameters and defaults precisely.
    locator: KQML Specification sections 3.6 Reserved Parameters and 3.7 Reserved Performative Names
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-adapter-018
    source: lit-proto-kqml
    supports: KQMLAdapter-external-mapping preserves the original layered boundary between communication performatives and separately encoded domain content instead of flattening both into one message type.
    locator: KQML as an Agent Communication Language, language and content-layer architecture
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-adapter-019
    source: eng-proto-mcp-2025-spec
    supports: MCPAdapter-external-mapping takes the 2025-11-25 architecture, lifecycle, transports, and distinct tools/resources/prompts surfaces as the external side of the mapping; each listed canonical target is a Moonweave correspondence rather than a name imported from MCP.
    locator: MCP Specification 2025-11-25 > Architecture, Lifecycle, Transports, and Server features
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-protocol-adapter-020
    source: eng-proto-mcp-auth
    supports: MCPAdapter-external-mapping includes MCPAuthorization and TrustBoundary because the HTTP authorization profile defines protected-resource metadata, authorization-server discovery, scopes, and resource indicators; their consolidation into canonical security concepts remains lossy.
    locator: Authorization specification > Protected-resource metadata, authorization server discovery, scopes, and resource indicators
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-protocol-adapter-021
    source: eng-proto-mcp-2025-spec
    supports: MCPAdapter-external-family-mapping preserves the frozen-v1 coverage only; MCP 2025-11-25 corroborates that tools and resources are real MCP feature families, while the legacy hash and migration scope are internal Moonweave provenance.
    locator: MCP Specification 2025-11-25 > Server features > Tools and Resources
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-protocol-adapter-022
    source: eng-proto-mcp-auth
    supports: MCPAdapter-external-family-mapping retains the legacy security targets PermissionPrompt and TrustBoundary only as broad coverage; the MCP authorization specification supplies the protocol-security context, not evidence that those canonical concepts are equivalent field by field.
    locator: Authorization specification > Authorization flow and protected-resource metadata
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-protocol-adapter-023
    source: eng-proto-mcp-spec
    supports: MCP separates base JSON-RPC messages, initialization and capability negotiation, authorization, client features, and server features. This stable protocol contract supports ProtocolAdapter as an InteroperabilityAdapter specialized for a named protocol version and feature set.
    locator: MCP 2025-11-25 > Base Protocol, Lifecycle, and Capability Negotiation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
