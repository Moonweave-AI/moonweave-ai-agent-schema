        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不负责启动恢复流程。本体只表达协议语义到 canonical 概念的对应；投影执行、映射应用及其失败恢复由“模式导出”和“映射规则与验证”承接。
          en: This ontology does not initiate a recovery workflow. This ontology only states correspondences from protocol semantics to canonical concepts; schema export and mapping validation own projection execution, mapping application, failures, and recovery.
          ja: このオントロジーは回復ワークフローを開始しません。このオントロジーはプロトコル意味論から canonical 概念への対応だけを表します。投影実行、写像適用、失敗、回復は「スキーマ出力」と「写像規則・検証」が担います。
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-adapter-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 协议映射与MCP 交互按唯一 owner 和可判定问题分界。
            en: Protocol mappings and MCP interactions are separated by unique ownership and answerable questions.
            ja: プロトコル写像とMCP インタラクションは一意の所有者と判定可能な問いで分離されます。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
