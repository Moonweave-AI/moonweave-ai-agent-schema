schema: moonweave.ai/ontology-node/v1
id: adapter-protocols
kind: module
status: accepted
labels:
  zh: 协议映射
  en: Protocol mappings
  ja: プロトコル写像
semantics:
  short_definition:
    zh: 协议映射描述独立系统使用具名协议互操作时，协议参与者、能力、消息、任务、身份和信任构造如何有方向地对应到规范本体。它拥有依赖协议名称与版本的 ProtocolAdapter 和 ProtocolMapping；协议规范是证据，在线会话与消息是运行事实，均不复制进协议映射层级。
    en: Protocol mappings describes how protocol participants, capabilities, messages, tasks, identity, and trust constructs correspond directionally to the canonical ontology when independent systems interoperate through a named protocol. It owns ProtocolAdapters and ProtocolMappings dependent on protocol name and version; the protocol specification is evidence, while live sessions and messages are runtime facts, and neither is copied into the protocol-mapping hierarchy.
    ja: プロトコル写像は、独立システムが名称付きプロトコルで相互運用するとき、参加者、能力、メッセージ、タスク、同一性、信頼の構造を規範本体へ有向に対応付ける方法を記述します。プロトコル名と版に依存する ProtocolAdapter と ProtocolMapping を所有します。仕様は証拠、実セッションとメッセージは実行事実であり、どちらも写像階層へ複製しません。
  definition:
    zh: 协议映射描述独立系统使用具名协议互操作时，协议参与者、能力、消息、任务、身份和信任构造如何有方向地对应到规范本体。它拥有依赖协议名称与版本的 ProtocolAdapter 和 ProtocolMapping；协议规范是证据，在线会话与消息是运行事实，均不复制进协议映射层级。
    en: Protocol mappings describes how protocol participants, capabilities, messages, tasks, identity, and trust constructs correspond directionally to the canonical ontology when independent systems interoperate through a named protocol. It owns ProtocolAdapters and ProtocolMappings dependent on protocol name and version; the protocol specification is evidence, while live sessions and messages are runtime facts, and neither is copied into the protocol-mapping hierarchy.
    ja: プロトコル写像は、独立システムが名称付きプロトコルで相互運用するとき、参加者、能力、メッセージ、タスク、同一性、信頼の構造を規範本体へ有向に対応付ける方法を記述します。プロトコル名と版に依存する ProtocolAdapter と ProtocolMapping を所有します。仕様は証拠、実セッションとメッセージは実行事実であり、どちらも写像階層へ複製しません。
  why_needed:
    zh: 让不同协议的外部构造在保留其版本、方向和语义差异的同时，可以被核心本体一致解释。
    en: Make constructs from different protocols consistently interpretable by the core ontology while preserving protocol version, direction, and semantic differences.
    ja: 異なるプロトコルの外部構造を、版、方向、意味差を保持しながら中核本体で一貫して解釈できるようにします。
  includes:
    - zh: 绑定具名协议与版本的 InteroperabilityAdapter/ProtocolAdapter，以及协议构造到 Actor、Message、Task、Capability 和 Trust 等核心语义的有向对应。
      en: InteroperabilityAdapters and ProtocolAdapters bound to a named protocol and version, plus directional correspondences from protocol constructs to core Actor, Message, Task, Capability, and Trust semantics.
      ja: 名称付きプロトコルと版に束縛された InteroperabilityAdapter／ProtocolAdapter と、プロトコル構造から中核 Actor、Message、Task、Capability、Trust への有向対応を含みます。
    - zh: 协议字段、消息行为、任务生命周期、兼容范围和无法无损转换的语义缺口，包括映射方向与适用版本。
      en: Protocol-field, message-behavior, task-lifecycle, compatibility-range, and non-lossless semantic gaps, including mapping direction and applicable versions.
      ja: プロトコル項目、メッセージ動作、タスクのライフサイクル、互換範囲、無損変換できない意味差と、写像方向・適用版を含みます。
  excludes:
    - zh: 在线 MCP 会话、请求、响应、通知、传输和订阅归 MCP 会话与协议交互；A2A 的真实任务、消息和远程参与者也归各自业务或运行域。
      en: Live MCP sessions, requests, responses, notifications, transports, and subscriptions belong to MCP sessions and protocol interaction; actual A2A tasks, messages, and remote participants likewise remain in their business or Runtime domains.
      ja: 実 MCP セッション、要求、応答、通知、トランスポート、購読は MCP セッションとプロトコル対話に属し、実際の A2A タスク、メッセージ、遠隔参加者も各業務・実行時領域に属します。
    - zh: 协议规范、来源文档和协议名称是映射证据或节点信息，不是业务概念；通用 MappingRule、覆盖计算和验证执行归映射基础。
      en: Protocol specifications, source documents, and protocol names are mapping evidence or node information, not business concepts; generic MappingRules, coverage computation, and validation runs belong to mapping foundations.
      ja: プロトコル仕様、出典文書、プロトコル名は写像証拠またはノード情報であり業務概念ではありません。共通 MappingRule、網羅計算、検証実行は写像基盤に属します。
  semantic_kind: null
  aliases: []
purpose:
  zh: 为外部协议构造建立版本化、有方向、显式记录损失且不复制运行事实的核心语义对应。
  en: Establish versioned, directional core-semantic correspondences for external protocol constructs with explicit loss and without copying runtime facts.
  ja: 外部プロトコル構造に対し、版管理され有向で、損失を明示し、実行事実を複製しない中核意味対応を確立します。
structure: null
examples:
  - id: adapter-protocols-cq-versioned-construct-mapping-v3-example-positive
    kind: positive
    labels:
      zh: MCP 2025-11-25 请求构造映射（正例）
      en: Mapping an MCP 2025-11-25 request construct — accepted case
      ja: MCP 2025-11-25 request 構造の写像（正例）
    scenario_id: null
    descriptions:
      zh: 适配记录固定 protocolVersion=2025-11-25，将 JSON-RPC Request 的 id、method、params 对应到 MCPMessage，并把初始化阶段与 capability negotiation 保留为版本适用条件。
      en: The adapter pins protocolVersion 2025-11-25, maps JSON-RPC Request fields id, method, and params to MCPMessage, and retains initialization phase and capability negotiation as version applicability conditions.
      ja: adapter は protocolVersion 2025-11-25 を固定し、JSON-RPC Request の id・method・params を MCPMessage に対応させ、initialization phase と capability negotiation を版適用条件として保持します。
    field_values:
      protocol: MCP
      requested_version: 2025-11-25
      source_construct: JSON-RPC Request
      required_fields:
        - id
        - method
        - params
      core_endpoint: MCPMessage
      compatibility_interval:
        - 2025-11-25
        - 2025-11-25
      required_capability: tools
    related_node_ids:
      - ProtocolMapping
      - ProtocolAdapter
      - MCPMessage
      - MCPClient
    related_relation_ids: []
    expected_result:
      zh: 返回一个覆盖请求版本的 ProtocolMapping，并明确 3 个字段端点、1 个 capability 条件与闭合版本区间。
      en: Return one ProtocolMapping covering the request version, with three field endpoints, one capability condition, and a closed version interval.
      ja: 要求版を含む ProtocolMapping を一つ返し、3 field endpoint、1 capability 条件、閉区間の版範囲を示します。
    why_valid_or_invalid:
      zh: 版本、构造和适用条件均来自同一 MCP 修订，未把协议版本建成类层级。
      en: Version, construct, and applicability conditions come from one MCP revision, and protocol versions are not modeled as a class hierarchy.
      ja: 版・構造・適用条件が同一 MCP revision に由来し、protocol version を class hierarchy にしていません。
    synthetic: true
    verified_version: MCP specification 2025-11-25
    source_claims:
      - claim-adapter-protocols-003
      - claim-adapter-protocols-004
  - id: adapter-protocols-cq-versioned-construct-mapping-v3-example-counter
    kind: counterexample
    labels:
      zh: 跨修订套用 MCP 字段（反例）
      en: Applying MCP fields across revisions without review — rejected case
      ja: 審査なしの MCP revision 横断適用（反例）
    scenario_id: null
    descriptions:
      zh: 请求声明 2025-06-18，却直接使用仅审校到 2025-11-25 的映射，并把新修订 capability 字段当成旧版必需字段，未给兼容区间。
      en: The request declares 2025-06-18 but applies a mapping reviewed only for 2025-11-25, treats a later capability field as required in the older revision, and supplies no compatibility interval.
      ja: request は 2025-06-18 なのに 2025-11-25 のみ審査した mapping を適用し、後版 capability field を旧版必須とし、互換区間もありません。
    field_values:
      protocol: MCP
      requested_version: 2025-06-18
      mapping_reviewed_version: 2025-11-25
      compatibility_interval: null
      assumed_required_field: capabilities.tasks
    related_node_ids:
      - ProtocolMapping
      - ProtocolAdapter
      - MCPMessage
    related_relation_ids: []
    expected_result:
      zh: 拒绝该映射，直到 2025-06-18 与 2025-11-25 的字段差异被逐项审校。
      en: Reject the mapping until field differences between 2025-06-18 and 2025-11-25 are reviewed item by item.
      ja: 2025-06-18 と 2025-11-25 の field 差異を項目別審査するまで拒否します。
    why_valid_or_invalid:
      zh: 仅协议名相同不足以证明版本兼容，且缺少区间会使查询返回不适用规则。
      en: A shared protocol name does not establish version compatibility, and a missing interval lets the query return an inapplicable rule.
      ja: 同一 protocol 名だけでは版互換を証明できず、区間欠落で不適用 rule が返ります。
    synthetic: true
    verified_version: MCP specifications reviewed 2026-07-16
    source_claims:
      - claim-adapter-protocols-003
      - claim-adapter-protocols-004
  - id: adapter-protocols-cq-message-behavior-gap-v3-example-positive
    kind: positive
    labels:
      zh: A2A Message 与 Artifact 行为分离（正例）
      en: Separating A2A Message and Artifact behavior — accepted case
      ja: A2A Message と Artifact 動作の分離（正例）
    scenario_id: null
    descriptions:
      zh: 消息 m-17 含 ROLE_USER、1 个文本 Part、contextId ctx-8 与 taskId task-4；这些通信字段映射到 Message，而“任务输出必须用 Artifact”保留为协议行为约束。
      en: Message m-17 carries ROLE_USER, one text Part, contextId ctx-8, and taskId task-4; these communication fields map to Message, while the rule that task outputs use Artifact remains a protocol behavior constraint.
      ja: message m-17 は ROLE_USER、1 text Part、contextId ctx-8、taskId task-4 を持ち、通信 field は Message に写像し、task output を Artifact にする規則は protocol behavior constraint として残します。
    field_values:
      protocol: A2A
      protocol_version: "1.0"
      message_id: m-17
      role: ROLE_USER
      part_count: 1
      context_id: ctx-8
      task_id: task-4
      preserved_behaviors:
        - sender role
        - ordered parts
        - task/context association
      explicit_gaps:
        - Artifact output separation
    related_node_ids:
      - ProtocolMessageMapping
      - Message
    related_relation_ids:
      - ProtocolMessageMapping-maps_to-Message
    expected_result:
      zh: 3 项消息行为映射到 Message，1 项 A2A 输出规则作为显式差异保留。
      en: Three message behaviors map to Message and one A2A output rule remains an explicit gap.
      ja: 3 件の message behavior を Message に写像し、1 件の A2A output rule を明示差異として保持します。
    why_valid_or_invalid:
      zh: 映射只覆盖通信语义，没有把 Artifact 输出偷换为 Message 内容。
      en: The mapping covers communication semantics only and does not replace Artifact output with Message content.
      ja: 通信意味だけを写像し、Artifact output を Message content に置換していません。
    synthetic: true
    verified_version: A2A specification 1.0
    source_claims:
      - claim-adapter-protocols-005
      - claim-adapter-protocols-006
  - id: adapter-protocols-cq-message-behavior-gap-v3-example-counter
    kind: counterexample
    labels:
      zh: 把 A2A Artifact 压入 Message（反例）
      en: Flattening an A2A Artifact into Message — rejected case
      ja: A2A Artifact を Message に平坦化（反例）
    scenario_id: null
    descriptions:
      zh: 候选把 artifactId report-9、两个 Parts 和 lastChunk=true 塞入一条普通 Message，删除 TaskArtifactUpdateEvent 及 append/lastChunk 行为。
      en: The candidate packs artifactId report-9, two Parts, and lastChunk=true into an ordinary Message and deletes TaskArtifactUpdateEvent plus append/lastChunk behavior.
      ja: 候補は artifactId report-9、2 Parts、lastChunk=true を通常 Message に詰め、TaskArtifactUpdateEvent と append/lastChunk 動作を削除します。
    field_values:
      protocol: A2A
      protocol_version: "1.0"
      artifact_id: report-9
      part_count: 2
      last_chunk: true
      mapped_as: Message
      lost_behaviors:
        - TaskArtifactUpdateEvent
        - append
        - lastChunk
    related_node_ids:
      - ProtocolMessageMapping
      - Message
    related_relation_ids:
      - ProtocolMessageMapping-maps_to-Message
    expected_result:
      zh: 拒绝：至少 3 项规范行为被静默删除，不能声称无损 Message 映射。
      en: Reject because at least three normative behaviors are silently removed; the mapping cannot be called lossless.
      ja: 少なくとも 3 件の規範動作を黙って削除しており、無損 Message mapping と呼べません。
    why_valid_or_invalid:
      zh: A2A 明确区分通信 Message 与任务输出 Artifact；该候选改变了对象职责和流式基数。
      en: A2A explicitly separates communication Messages from task-output Artifacts; the candidate changes object responsibility and streaming cardinality.
      ja: A2A は通信 Message と task-output Artifact を明確に分け、候補は object 責務と streaming cardinality を変更します。
    synthetic: true
    verified_version: A2A specification 1.0
    source_claims:
      - claim-adapter-protocols-005
      - claim-adapter-protocols-006
  - id: adapter-protocols-cq-participant-role-separation-v3-example-positive
    kind: positive
    labels:
      zh: ROLE_USER 作为一次交互绑定（正例）
      en: ROLE_USER as an interaction-scoped binding — accepted case
      ja: ROLE_USER を interaction-scoped binding とする（正例）
    scenario_id: null
    descriptions:
      zh: 消息 m-17 的 ROLE_USER 只在 task-4、ctx-8 与 10:03–10:04 时间窗内绑定 actor-ref client-22；actor 本身仍是运行主体，协议角色不成为其永久类型。
      en: ROLE_USER on message m-17 binds actor-ref client-22 only within task-4, ctx-8, and 10:03–10:04; the actor remains a runtime participant and the protocol role is not its permanent type.
      ja: message m-17 の ROLE_USER は task-4・ctx-8・10:03–10:04 の範囲だけ actor-ref client-22 に binding され、actor は runtime participant のままで protocol role は恒久型になりません。
    field_values:
      protocol: A2A
      protocol_version: "1.0"
      message_id: m-17
      role_value: ROLE_USER
      actor_reference: client-22
      task_id: task-4
      context_id: ctx-8
      valid_from: 2026-07-16T10:03:00Z
      valid_to: 2026-07-16T10:04:00Z
    related_node_ids:
      - ProtocolMapping
      - ProtocolAdapter
      - ActorBinding
      - ActorRoleBinding
    related_relation_ids: []
    expected_result:
      zh: 返回 1 个有任务、上下文和有效期的 ActorRoleBinding；Actor 子类数保持 0。
      en: Return one ActorRoleBinding with task, context, and validity interval; the number of new Actor subclasses remains zero.
      ja: task・context・有効期間を持つ ActorRoleBinding を一つ返し、新規 Actor subclass 数を 0 に保ちます。
    why_valid_or_invalid:
      zh: A2A Role 是消息发送方取值，绑定记录精确表达其时效而不改变 actor 身份。
      en: A2A Role is a message-sender value; the binding captures its duration without changing actor identity.
      ja: A2A Role は message sender value で、binding が期間を表し actor identity を変更しません。
    synthetic: true
    verified_version: A2A specification 1.0
    source_claims:
      - claim-adapter-protocols-007
      - claim-adapter-protocols-008
  - id: adapter-protocols-cq-participant-role-separation-v3-example-counter
    kind: counterexample
    labels:
      zh: 把 ROLE_AGENT 建成 Actor 下位类（反例）
      en: Making ROLE_AGENT an Actor subclass — rejected case
      ja: ROLE_AGENT を Actor 下位 class にする（反例）
    scenario_id: null
    descriptions:
      zh: 候选新增 ROLE_AGENT-is_a-AgentActor，并把 server-7 永久归类为 ROLE_AGENT，即使同一主体稍后在另一个协议中充当 client。
      en: The candidate adds ROLE_AGENT-is_a-AgentActor and permanently types server-7 as ROLE_AGENT even when that participant later acts as a client in another protocol.
      ja: 候補は ROLE_AGENT-is_a-AgentActor を追加し、server-7 が別 protocol で client になっても永久に ROLE_AGENT と型付けします。
    field_values:
      protocol: A2A
      actor_reference: server-7
      proposed_subclass: ROLE_AGENT
      validity_interval: null
      other_interaction_role: client
    related_node_ids:
      - ProtocolMapping
      - ProtocolAdapter
      - ActorBinding
      - ActorRoleBinding
    related_relation_ids: []
    expected_result:
      zh: 拒绝永久分类；改为每条 Message 或 Task 作用域内的 ActorRoleBinding。
      en: Reject the permanent classification and use an ActorRoleBinding scoped to each Message or Task.
      ja: 恒久分類を拒否し、各 Message／Task scope の ActorRoleBinding を使います。
    why_valid_or_invalid:
      zh: 协议方向角色会随交互改变，建成 Actor 子类会制造跨会话矛盾。
      en: Protocol-direction roles change by interaction, so making one an Actor subclass creates cross-session contradictions.
      ja: protocol 方向 role は interaction ごとに変わり、Actor subclass 化は session 間矛盾を作ります。
    synthetic: true
    verified_version: A2A specification 1.0
    source_claims:
      - claim-adapter-protocols-007
      - claim-adapter-protocols-008
parent_relation: null
relations: []
module_contract:
  interaction_contract:
    applicability: descriptive
    facets:
      input:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不接收独立的运行输入。本体只表达协议语义到 canonical 概念的对应；投影执行、映射应用及其失败恢复由“模式导出”和“映射规则与验证”承接。
          en: This ontology does not receive an independent runtime input. This ontology only states correspondences from protocol semantics to canonical concepts; schema export and mapping validation own projection execution, mapping application, failures, and recovery.
          ja: このオントロジーは独立した実行入力を受け取りません。このオントロジーはプロトコル意味論から canonical 概念への対応だけを表します。投影実行、写像適用、失敗、回復は「スキーマ出力」と「写像規則・検証」が担います。
      output:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不产生独立的运行输出。本体只表达协议语义到 canonical 概念的对应；投影执行、映射应用及其失败恢复由“模式导出”和“映射规则与验证”承接。
          en: This ontology does not produce an independent runtime output. This ontology only states correspondences from protocol semantics to canonical concepts; schema export and mapping validation own projection execution, mapping application, failures, and recovery.
          ja: このオントロジーは独立した実行出力を生成しません。このオントロジーはプロトコル意味論から canonical 概念への対応だけを表します。投影実行、写像適用、失敗、回復は「スキーマ出力」と「写像規則・検証」が担います。
      failure:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不负责判定运行失败。本体只表达协议语义到 canonical 概念的对应；投影执行、映射应用及其失败恢复由“模式导出”和“映射规则与验证”承接。
          en: This ontology does not own runtime-failure adjudication. This ontology only states correspondences from protocol semantics to canonical concepts; schema export and mapping validation own projection execution, mapping application, failures, and recovery.
          ja: このオントロジーは実行失敗の判定を所有しません。このオントロジーはプロトコル意味論から canonical 概念への対応だけを表します。投影実行、写像適用、失敗、回復は「スキーマ出力」と「写像規則・検証」が担います。
      recovery:
        applicable: false
