  taxonomy_contract:
    applicability: specialization
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - InteroperabilityAdapter
    allowed_backbone_predicates:
      - is_a
    flat_root_exception_concept_ids: []
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-adapter-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项复核确认本模块拥有互操作转换能力与协议特定映射，不拥有协议规范、传输会话或消息实例。ProtocolAdapter 沿能力链归入 InteroperabilityAdapter，ProtocolMapping 沿规范链归入 MappingRule；两者之间的 applies_to_adapter 仅表达适用性。
            en: Point-by-point review confirms that this module owns interoperability conversion capabilities and protocol-specific mappings, not protocol specifications, transport sessions, or message instances. ProtocolAdapter follows the capability chain to InteroperabilityAdapter, while ProtocolMapping follows the specification chain to MappingRule; applies_to_adapter expresses only applicability between them.
            ja: 個別審査により、本 module は interoperability conversion capability と protocol-specific mapping を所有し、protocol specification・transport session・message instance は所有しません。ProtocolAdapter は capability chain で InteroperabilityAdapter に、ProtocolMapping は specification chain で MappingRule に帰属し、applies_to_adapter は両者間の適用性だけを表します。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 结构复核保留两条真实分类链：InteroperabilityAdapter → ProtocolAdapter 是能力 is_a 链，MappingRule → ProtocolMapping 是规范 is_a 链。ProtocolMapping-applies_to_adapter-ProtocolAdapter 保持 cross-link，不再因一次适用事实把不同语义种类并入同一层级。
            en: "Structural review retains two genuine taxonomy chains: InteroperabilityAdapter → ProtocolAdapter is the capability is_a chain, and MappingRule → ProtocolMapping is the specification is_a chain. ProtocolMapping-applies_to_adapter-ProtocolAdapter remains a cross-link and no longer merges different semantic kinds through an applicability fact."
            ja: 構造審査は二つの真正 taxonomy chain を保持します。InteroperabilityAdapter → ProtocolAdapter は capability の is_a chain、MappingRule → ProtocolMapping は specification の is_a chain です。ProtocolMapping-applies_to_adapter-ProtocolAdapter は cross-link に留め、適用事実で異種概念を同じ階層へ統合しません。
  competency_questions:
    - id: adapter-protocols-cq-versioned-construct-mapping-v3
      semantic_key: adapter-protocols.versioned-construct-mapping
      primary_owner_module_id: adapter-protocols
      related_module_ids:
        - tool-mcp-transport
      questions:
        zh: 某协议版本中的一个构造对应哪些核心概念和关系，兼容范围到哪一版？
        en: Which core concepts and relations correspond to a construct in a given protocol version, and through which versions is that mapping valid?
        ja: あるプロトコル版の構造はどのコア概念・関係に対応し、その写像はどの版まで有効ですか。
      query: Resolve the protocol adapter by protocol and version, then select mappings whose source construct and compatibility interval contain the request.
      expected_assertion: The result identifies explicit core endpoints and a compatibility interval containing the requested version.
      evidence_binding:
        applicability: boundary-comparison-only
        owner_concept_ids:
          - ProtocolMapping
          - ProtocolAdapter
        related_concept_ids:
          - MCPMessage
          - MCPClient
        relation_ids: []
        not_applicable_reason:
          zh: MCP revision、字段与 capability 条件是 ProtocolAdapter.external_mappings 的版本化信息；canonical 图没有接受 ProtocolMapping 到 MCPMessage 或 MCPClient 的直接关系。
          en: MCP revisions, fields, and capability conditions are versioned information in ProtocolAdapter.external_mappings; the canonical graph has no accepted direct relation from ProtocolMapping to MCPMessage or MCPClient.
          ja: MCP revision・field・capability 条件は ProtocolAdapter.external_mappings の版付き情報で、ProtocolMapping から MCPMessage／MCPClient への承認済み直接関係はありません。
      positive_example_ids:
        - adapter-protocols-cq-versioned-construct-mapping-v3-example-positive
      counterexample_ids:
        - adapter-protocols-cq-versioned-construct-mapping-v3-example-counter
      source_claims:
        - claim-adapter-protocols-003
        - claim-adapter-protocols-004
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-adapter-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 协议构造必须在请求版本与兼容区间内逐字段解析。
              en: Protocol constructs must be resolved field by field within the requested version and compatibility interval.
              ja: protocol construct は要求版と互換区間内で field ごとに解決します。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 版本不建类层级，跨模块对应留在 external_mappings。
              en: Versions do not form a class hierarchy; cross-module correspondences remain in external_mappings.
              ja: version は class hierarchy にせず、cross-module 対応は external_mappings に置きます。
    - id: adapter-protocols-cq-message-behavior-gap-v3
      semantic_key: adapter-protocols.message-behavior-gap
      primary_owner_module_id: adapter-protocols
      related_module_ids:
        - info-messages-instructions
      questions:
        zh: 协议消息行为映射到核心 Message 时，哪些必需行为被保留，哪些只能记录为差异？
        en: When protocol message behavior maps to core Message, which required behaviors are preserved and which remain explicit gaps?
        ja: プロトコルのメッセージ動作をコア Message に写像するとき、どの必須動作が保持され、どれが明示的差異として残りますか。
      query: Compare normative source behaviors with mapped core predicates and collect unmapped or cardinality-changing behaviors as protocol gaps.
      expected_assertion: Every normative behavior is either mapped to a core predicate with compatible cardinality or listed as an explicit gap.
      evidence_binding:
        applicability: relation-backed
        owner_concept_ids:
          - ProtocolMessageMapping
        related_concept_ids:
          - Message
        relation_ids:
          - ProtocolMessageMapping-maps_to-Message
        not_applicable_reason: null
      positive_example_ids:
        - adapter-protocols-cq-message-behavior-gap-v3-example-positive
      counterexample_ids:
        - adapter-protocols-cq-message-behavior-gap-v3-example-counter
      source_claims:
        - claim-adapter-protocols-005
        - claim-adapter-protocols-006
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-adapter-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 逐项比较 Message 的 role、parts、task/context 与 Artifact 分离规则。
              en: Compare Message role, parts, task/context association, and Artifact separation item by item.
              ja: Message role・parts・task/context・Artifact 分離を項目別比較します。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 只用 ProtocolMessageMapping-maps_to-Message 支持核心通信对应，有损行为另列。
              en: Only ProtocolMessageMapping-maps_to-Message supports the core communication mapping; losses are listed separately.
              ja: core 通信対応は ProtocolMessageMapping-maps_to-Message のみで支え、損失を別記します。
    - id: adapter-protocols-cq-participant-role-separation-v3
      semantic_key: adapter-protocols.participant-role-separation
      primary_owner_module_id: adapter-protocols
      related_module_ids:
        - runtime-actors
      questions:
        zh: 协议参与者如何对应运行主体，而不会把协议角色直接定义成永久 Actor 类型？
        en: How does a protocol participant correspond to a runtime actor without turning a protocol role into a permanent Actor subtype?
        ja: プロトコル参加者を、プロトコル役割を恒久的な Actor 下位型にせず実行主体へどう対応付けますか。
      query: Return participant-to-actor mappings and inspect whether role semantics are represented by bindings rather than cross-kind is_a edges.
      expected_assertion: Every participant mapping identifies a runtime actor or reference plus a role binding; no protocol role is asserted as an Actor subtype.
      evidence_binding:
        applicability: boundary-comparison-only
        owner_concept_ids:
          - ProtocolMapping
          - ProtocolAdapter
        related_concept_ids:
          - ActorBinding
          - ActorRoleBinding
        relation_ids: []
        not_applicable_reason:
          zh: A2A Role 是单条 Message 的发送方字段，运行主体和有时效的角色绑定由 runtime-actors 拥有；当前图没有把 ProtocolMapping 直接连接到 ActorBinding 或 ActorRoleBinding 的已接受关系。
          en: A2A Role is a sender field on one Message, while runtime-actors owns participants and time-bounded role bindings; no accepted relation directly connects ProtocolMapping to ActorBinding or ActorRoleBinding.
          ja: A2A Role は一 Message の sender field で、runtime participant と time-bounded role binding は runtime-actors が所有します。ProtocolMapping から ActorBinding／ActorRoleBinding への承認済み直接関係はありません。
      positive_example_ids:
        - adapter-protocols-cq-participant-role-separation-v3-example-positive
      counterexample_ids:
        - adapter-protocols-cq-participant-role-separation-v3-example-counter
      source_claims:
        - claim-adapter-protocols-007
        - claim-adapter-protocols-008
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-adapter-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 角色回答必须带 message/task scope、actor reference 与有效期。
              en: Role answers must include message/task scope, actor reference, and validity interval.
              ja: role 回答は message/task scope・actor reference・有効期間を含めます。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 拒绝 ROLE_USER/ROLE_AGENT 作为 Actor 子类。
              en: Reject ROLE_USER or ROLE_AGENT as Actor subclasses.
              ja: ROLE_USER／ROLE_AGENT の Actor subclass 化を拒否します。
