relations:
  - id: ProtocolCapabilityMapping-maps_to-ToolCapability
    predicate: maps_to
    direction: source-to-target
    relation_kind: mapping
    labels:
      zh: 映射到
      en: maps to
      ja: 写像する
    definitions:
      zh: 协议能力声明映射到规范 ToolCapability；它只表示某类工具操作在协议会话中可用，不创建任何具体 Tool 或 ToolDefinition，也不授予调用权限。
      en: A protocol capability declaration maps to canonical ToolCapability; it says that a family of tool operations is available in the protocol session, creates no individual Tool or ToolDefinition, and grants no invocation authority.
      ja: プロトコル能力宣言は標準 ToolCapability へ写像され、session で tool 操作群が利用可能であることだけを示します。個別 Tool／ToolDefinition を作らず、呼出権限も付与しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: mapped_from
      labels:
        zh: 反向：映射到
        en: mapped from
        ja: 逆方向：写像する
    conditions: []
    temporal_scope: timeless
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: ProtocolCapabilityMapping 仍由适配域拥有，ToolCapability 仍由工具域拥有；该映射只建立语义对应，不转移规范所有权。运行时授权必须另由 PolicyDecision、AuthorizationGrant 和适用协议会话证明。
        en: ProtocolCapabilityMapping remains owned by the adapter plane and ToolCapability by the tool plane; this mapping establishes semantic correspondence without transferring canonical ownership. Runtime authority requires separate PolicyDecision, AuthorizationGrant, and applicable protocol-session evidence.
        ja: ProtocolCapabilityMapping は adapter plane、ToolCapability は tool plane が所有し続けます。この写像は正規所有権を移さず意味対応だけを示し、実行権限には別の PolicyDecision、AuthorizationGrant、protocol session 証拠が必要です。
      protocol_or_resource_context:
        zh: 查询沿 ProtocolCapabilityMapping → ToolCapability 的规范 ID 与该关系自身的来源主张执行；协议版本、声明方、子能力与协商条件保留在映射信息中。
        en: Queries follow the canonical ProtocolCapabilityMapping → ToolCapability assertion and this relation's source claims; protocol version, declarer, sub-capabilities, and negotiation conditions remain in mapping information.
        ja: 問い合わせは ProtocolCapabilityMapping → ToolCapability の正規 ID と関係固有の出典主張に従い、protocol 版、宣言者、下位能力、協商条件は写像情報に保持します。
    constraints: []
    examples:
      - id: ProtocolCapabilityMapping-maps_to-ToolCapability-example-positive-manual-001
        kind: positive
        labels:
          zh: 映射到人工正例
          en: Reviewed positive case for maps to
          ja: 写像するの審査済み正例
        scenario_id: null
        descriptions:
          zh: MCP 服务器在初始化结果中声明 `capabilities.tools.listChanged=true`；映射将工具操作族的可用性对齐到 ToolCapability，并把 listChanged 保留为协议子能力，不生成具体工具。
          en: An MCP server declares `capabilities.tools.listChanged=true` in its initialization result; the mapping aligns availability of the tool-operation family with ToolCapability and preserves listChanged as a protocol sub-capability without creating an individual tool.
          ja: MCP server が initialize result で `capabilities.tools.listChanged=true` を宣言し、写像は tool 操作群の利用可能性を ToolCapability へ対応付け、listChanged を protocol 下位能力として保持し個別 tool を生成しません。
        field_values: {}
        related_node_ids:
          - ProtocolCapabilityMapping
          - ToolCapability
        related_relation_ids:
          - ProtocolCapabilityMapping-maps_to-ToolCapability
        expected_result:
          zh: ProtocolCapabilityMapping 应指向可解析的 ToolCapability，而不是 Tool 或 ToolDefinition。
          en: ProtocolCapabilityMapping resolves to ToolCapability, not an individual Tool or ToolDefinition.
          ja: ProtocolCapabilityMapping は個別 Tool／ToolDefinition ではなく ToolCapability へ解決します。
        why_valid_or_invalid:
          zh: 该事实来自初始化阶段的能力协商，保留了声明方、方向和子能力，同时没有把能力可用性误写成工具实例或授权。
