schema: moonweave.ai/ontology-node/v1
id: ProtocolCapabilityMapping
kind: concept
status: accepted
labels:
  zh: 协议能力映射
  en: protocol capability mapping
  ja: プロトコル能力写像
semantics:
  short_definition:
    zh: 协议能力映射是把版本化协议中的能力声明转换为规范能力概念的协议映射。
    en: A protocol capability mapping converts a capability declaration in a versioned protocol into a canonical capability concept.
    ja: プロトコル能力写像は、版付きプロトコルの能力宣言を canonical 能力 Concept へ変換する ProtocolMapping です。
  definition:
    zh: 协议能力映射是一类 ProtocolMapping；其种差是源构造为协议生命周期、发现文档或参与者描述中的能力声明，目标为 ToolCapability 等规范能力，并明确声明者、方向、可用操作、子能力和协商前提。它映射“能否以及如何提供某类操作”，而不把某个 ToolDefinition、调用结果、消息内容、授权令牌或参与者身份当作能力声明。
    en: A ProtocolCapabilityMapping is a ProtocolMapping whose source is a capability declaration in a protocol lifecycle, discovery document, or participant description and whose target is a canonical capability such as ToolCapability. It records declarer, direction, enabled operations, sub-capabilities, and negotiation preconditions. It maps whether and how an operation family is available; it does not treat an individual ToolDefinition, call result, message payload, authorization token, or participant identity as the declaration.
    ja: ProtocolCapabilityMapping は ProtocolMapping の一種で、ライフサイクル、発見文書、参加者記述内の能力宣言を源とし、ToolCapability などを対象に、宣言者、方向、利用可能操作、下位能力、協商前提を記録する点が種差です。個別 ToolDefinition、呼出し結果、メッセージ内容、認可トークン、参加者識別を能力宣言とは見なしません。
  why_needed:
    zh: 能力声明通常只表示某一操作族可用，并不列出每个对象，也不等于授权。单独建模可以保留 MCP 初始化中客户端/服务器能力的方向和子能力，防止从 tools=true 直接推断任意工具、权限或执行结果。
    en: A capability declaration usually says an operation family is available; it neither enumerates every object nor grants authorization. Separate modeling preserves the direction and sub-capabilities of MCP client/server negotiation and prevents tools=true from implying arbitrary tools, permissions, or results.
    ja: 能力宣言は通常、操作群の利用可能性を示すだけで、全対象の列挙や認可ではありません。独立化により MCP のクライアント／サーバー能力方向と下位能力を保持し、tools=true から任意ツール・権限・結果を推論する誤りを防ぎます。
  includes:
    - zh: 纳入 MCP initialize 中 tools/resources/prompts/roots/sampling/elicitation 声明或 A2A AgentCard capabilities/skills 等版本化声明到对应规范能力的规则，前提是分别写明声明方、操作方向、子能力和损失。
      en: Includes versioned rules from MCP initialize declarations such as tools/resources/prompts/roots/sampling/elicitation or A2A AgentCard capabilities and skills to matching canonical capabilities, provided declarer, operation direction, sub-capabilities, and loss are explicit.
      ja: MCP initialize の tools/resources/prompts/roots/sampling/elicitation や A2A AgentCard capabilities/skills から対応能力への規則を、宣言者・方向・下位能力・損失を明示して含みます。
  excludes:
    - zh: 不纳入 tools/list 返回的具体工具定义、某次 tools/call、资源内容、提示实例、消息包络、任务状态或 OAuth scope/令牌；可发现对象、可执行调用和被授权操作分别需要对象、运行与信任映射。
      en: Excludes individual tool definitions returned by tools/list, a tools/call invocation, resource contents, prompt instances, message envelopes, task states, and OAuth scopes or tokens. Discoverable objects, executions, and authorized operations require object, run, and trust mappings respectively.
      ja: tools/list の個別ツール定義、tools/call、リソース内容、プロンプト実体、メッセージ包絡、Task 状態、OAuth scope／token は含みません。発見対象、実行、認可操作は別の対象・実行・信頼写像を要します。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ProtocolCapabilityMapping-example-positive-001
    kind: positive
    labels:
      zh: 协议能力映射正例
      en: Positive example of protocol capability mapping
      ja: プロトコル能力写像の正例
    scenario_id: null
    descriptions:
      zh: mapping-mcp-2025-tools-capability 把 MCP 2025-11-25 initialize result 中服务器声明的 capabilities.tools 映射为 ToolCapability。基础声明表示服务器支持 tools/list 与 tools/call；listChanged 子能力另行保留，因为单一规范能力字段不能无损表示通知支持。
      en: mapping-mcp-2025-tools-capability maps the server's capabilities.tools declaration in the MCP 2025-11-25 initialize result to ToolCapability. The base declaration means the server supports tools/list and tools/call; the listChanged sub-capability is preserved separately because one canonical capability field cannot represent notification support losslessly.
      ja: mapping-mcp-2025-tools-capability は MCP 2025-11-25 initialize result のサーバー capabilities.tools を ToolCapability へ写像します。基本宣言は tools/list と tools/call 対応を示し、listChanged 通知対応は単一項目で無損失に表せないため別に保持します。
    field_values:
      mapping_rule_id: mapping-rule-mcp-tools-capability
      version: "3"
      source_construct: mcp:InitializeResult.capabilities.tools
      target_construct: moonweave:ToolCapability
      direction: source-to-target
      mapping_kind: lossy
      valid_from: 2026-07-13T06:00:00.000Z
      mapping_id: mapping-mcp-2025-tools-capability
      external_version: MCP-2025-11-25
      loss_kind: lossy
    related_node_ids:
      - ProtocolCapabilityMapping
      - ToolCapability
    related_relation_ids:
      - maps_protocol_capability_to_canonical_capability
    expected_result:
      zh: 规则归入 ProtocolCapabilityMapping 并指向 ToolCapability；listChanged 保存在协议扩展信息中，且不会从能力声明凭空生成具体 Tool。
      en: The rule is a ProtocolCapabilityMapping to ToolCapability; listChanged remains protocol extension detail, and no individual Tool is fabricated from the declaration.
      ja: 規則は ToolCapability への ProtocolCapabilityMapping となり、listChanged は拡張情報に保持し、宣言から個別 Tool を生成しません。
    why_valid_or_invalid:
      zh: 该例明确声明者是服务器、操作方向是客户端调用服务器、能力对象是操作族而非工具实例，并对 listChanged 的不可逆差异诚实标记 lossy。
      en: The example names the server as declarer, client-to-server operation direction, an operation family rather than a tool instance, and honestly marks listChanged loss as lossy.
      ja: 宣言者をサーバー、操作方向をクライアントからサーバー、対象を個別ツールでなく操作群とし、listChanged の差を lossy と明記します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-protocol-capability-mapping-003
      - claim-protocol-capability-mapping-004
  - id: ProtocolCapabilityMapping-example-boundary-001
    kind: boundary
    labels:
      zh: 协议能力映射边界例
      en: Boundary case for protocol capability mapping
      ja: プロトコル能力写像の境界例
    scenario_id: null
    descriptions:
      zh: tools/list 返回名为 search 的 ToolDefinition，包含 description 和 inputSchema。它证明某个工具可发现，却不是 initialize 阶段的 capabilities.tools 声明；工具定义必须保留为 ToolDefinition，不能因服务器具备 tools 能力就把二者合并。
      en: tools/list returns a ToolDefinition named search with description and inputSchema. It proves one tool is discoverable but is not the initialize-time capabilities.tools declaration. The definition remains ToolDefinition and is not merged with server capability.
      ja: tools/list が description と inputSchema を持つ search ToolDefinition を返します。これは個別ツールの発見可能性であり initialize 時の capabilities.tools 宣言ではないため、ToolDefinition と能力を統合しません。
    field_values: {}
    related_node_ids:
      - ProtocolCapabilityMapping
      - ToolCapability
      - ToolDefinition
    related_relation_ids:
      - maps_protocol_capability_to_canonical_capability
    expected_result:
      zh: ToolDefinition 保持可发现对象身份；只有声明操作族及其协商前提的规则归入 ProtocolCapabilityMapping。
      en: ToolDefinition retains discoverable-object identity; only the rule mapping the operation-family declaration and negotiation preconditions is a ProtocolCapabilityMapping.
      ja: ToolDefinition は発見対象の識別を保ち、操作群宣言と協商前提を写像する規則だけが ProtocolCapabilityMapping です。
    why_valid_or_invalid:
      zh: 能力声明回答“可使用哪类协议操作”，工具定义回答“可调用哪个具名工具”；前者不蕴含后者的清单、参数或授权。
      en: A capability declaration answers which protocol operation family is available; a tool definition answers which named tool can be invoked. The former does not entail the latter's inventory, schema, or authorization.
      ja: 能力宣言は利用可能な操作群、ツール定義は呼出せる具体名を答え、前者は後者の一覧・schema・認可を含意しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-protocol-capability-mapping-005
      - claim-protocol-capability-mapping-006
  - id: ProtocolCapabilityMapping-example-instance-001
    kind: instance
    labels:
      zh: 协议能力映射结构化实例
      en: Structured instance of protocol capability mapping
      ja: プロトコル能力写像の構造化インスタンス
    scenario_id: null
    descriptions:
      zh: mapping-mcp-2025-tools-capability 的节点内记录给出 MCP-2025-11-25、InitializeResult.capabilities.tools、ToolCapability、source-to-target 与 lossy，并注明 listChanged 子能力需保留。
      en: The inline mapping-mcp-2025-tools-capability record specifies MCP-2025-11-25, InitializeResult.capabilities.tools, ToolCapability, source-to-target, lossy, and preservation of the listChanged sub-capability.
      ja: mapping-mcp-2025-tools-capability のノード内記録は MCP-2025-11-25、InitializeResult.capabilities.tools、ToolCapability、source-to-target、lossy、listChanged 保持を示します。
    field_values:
      mapping_rule_id: mapping-rule-mcp-tools-capability
      version: "3"
      source_construct: mcp:InitializeResult.capabilities.tools
      target_construct: moonweave:ToolCapability
      direction: source-to-target
      mapping_kind: lossy
      valid_from: 2026-07-13T06:00:00.000Z
      mapping_id: mapping-mcp-2025-tools-capability
      external_version: MCP-2025-11-25
      loss_kind: lossy
    related_node_ids:
      - ProtocolCapabilityMapping
    related_relation_ids: []
    expected_result:
      zh: 记录通过映射规则字段约束，且版本、声明路径、规范能力和损失结论彼此对应。
      en: The record satisfies mapping-rule fields, with revision, declaration path, canonical capability, and loss conclusion mutually consistent.
      ja: 記録は規則項目を満たし、版・宣言パス・canonical 能力・損失判定が整合します。
    why_valid_or_invalid:
      zh: source_construct 精确指向协商声明而非 tools/list 对象；lossy 与 listChanged 的保留要求一致。
      en: source_construct points to the negotiated declaration rather than a tools/list object, and lossy matches the listChanged preservation requirement.
      ja: source_construct は tools/list 対象でなく協商宣言を指し、lossy は listChanged 保持要件と一致します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-protocol-capability-mapping-007
      - claim-protocol-capability-mapping-008
