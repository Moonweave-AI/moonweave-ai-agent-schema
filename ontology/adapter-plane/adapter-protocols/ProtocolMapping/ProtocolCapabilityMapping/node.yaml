source_claims:
  - id: claim-protocol-capability-mapping-001
    source: eng-proto-mcp-2025-spec
    supports: ProtocolCapabilityMapping is grounded in MCP 2025-11-25's explicit client/server capability negotiation and distinct feature directions. The canonical ToolCapability target and specialization under ProtocolMapping are Moonweave ontology decisions.
    locator: MCP Specification 2025-11-25 > Basic > Lifecycle > Capability negotiation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-capability-mapping-002
    source: eng-proto-mcp-2025-spec
    supports: ProtocolCapabilityMapping keeps negotiated capability declarations separate from objects returned by tools/list, resources/list, and prompts/list, following MCP's separation of lifecycle negotiation from server feature operations.
    locator: MCP Specification 2025-11-25 > Lifecycle and Server features > Tools, Resources, and Prompts
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-capability-mapping-003
    source: eng-proto-mcp-2025-spec
    supports: ProtocolCapabilityMapping-example-positive-001 uses the MCP 2025-11-25 initialize result's server capabilities.tools declaration and its listChanged sub-capability as the exact external source of the rule.
    locator: MCP Specification 2025-11-25 > Basic > Lifecycle > Server capabilities in InitializeResult
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-capability-mapping-004
    source: eng-proto-mcp-2025-spec
    supports: ProtocolCapabilityMapping-example-positive-001 preserves direction because MCP declares tools as a server capability and sampling, roots, and elicitation as client capabilities; negotiation does not make them symmetric.
    locator: MCP Specification 2025-11-25 > Basic > Lifecycle > Client and server capability tables
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-capability-mapping-005
    source: eng-proto-mcp-2025-spec
    supports: ProtocolCapabilityMapping-example-boundary-001 distinguishes capabilities.tools from results of tools/list because MCP specifies the former in initialization and the latter as named Tool definitions returned by a server operation.
    locator: MCP Specification 2025-11-25 > Lifecycle capabilities and Server features > Tools > Listing tools
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-capability-mapping-006
    source: eng-proto-mcp-2025-spec
    supports: ProtocolCapabilityMapping-example-boundary-001 does not infer authorization from capability negotiation because the MCP architecture leaves host policy and consent enforcement outside a server's feature advertisement.
    locator: MCP Specification 2025-11-25 > Architecture > Host responsibilities and security boundaries
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-capability-mapping-007
    source: eng-proto-mcp-2025-spec
    supports: ProtocolCapabilityMapping-example-instance-001 pins its source path to InitializeResult.capabilities.tools in MCP revision 2025-11-25 rather than to a tool instance or invocation.
    locator: MCP Specification 2025-11-25 > Basic > Lifecycle > InitializeResult schema
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-capability-mapping-008
    source: eng-proto-mcp-2025-spec
    supports: ProtocolCapabilityMapping-example-instance-001 marks listChanged preservation as loss because the tools capability object carries more detail than a generic ToolCapability assertion.
    locator: MCP Specification 2025-11-25 > Server features > Tools > Capabilities and listChanged notifications
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-capability-mapping-009
    source: eng-proto-a2a-spec
    supports: A2A places advertised capabilities and skills in the Agent Card, while Message is a separate core object carrying one turn of user or agent content. The specification therefore supports a capability-declaration endpoint distinct from a message-envelope endpoint. Moonweave defines their ProtocolMapping subclasses and canonical targets.
    locator: Specification > Core concepts, Agent Card, Message, Task, and Artifact
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-capability-mapping-010
    source: eng-proto-a2a-spec
    supports: A2A's Agent Card advertises capabilities and skills before interaction, whereas Task is a stateful work object with identity, status, artifacts, and history. Advertising task-related capability does not instantiate a Task. The sibling split and mapping names are Moonweave interpretations of that protocol distinction.
    locator: Specification > Core concepts, Agent Card, Message, Task, and Artifact
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-capability-mapping-011
    source: eng-proto-mcp-spec
    supports: MCP negotiates client and server capabilities during initialization and then exposes optional tools, resources, and prompts according to those declarations. This supports ProtocolCapabilityMapping as the ProtocolMapping subtype for capability declarations and feature availability.
    locator: MCP 2025-11-25 > Initialization capability negotiation and Server Features
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-capability-mapping-012
    source: eng-proto-mcp-spec
    supports: MCP distinguishes the initialization-time server `tools` capability from the Tool definitions later returned by `tools/list`; this supports mapping the negotiated operation-family declaration to ToolCapability while keeping concrete ToolDefinition inventory separate. The canonical target remains a Moonweave design decision.
    locator: MCP 2025-11-25 > Base Protocol > Lifecycle > Capability Negotiation; Server Features > Tools > Capabilities and Listing Tools
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
