applicability:
  - adapter
sibling_differentiation:
  - sibling_concept_id: ProtocolMessageMapping
    shared_parent_concept_id: ProtocolMapping
    differentia:
      zh: ProtocolCapabilityMapping 映射生命周期或发现文档中的“可用操作族”声明；ProtocolMessageMapping 映射一次完整消息包络及其参与者、内容和关联字段。能力声明不是消息，消息出现也不证明某一能力已协商。
      en: ProtocolCapabilityMapping maps an available operation-family declaration from lifecycle or discovery metadata. ProtocolMessageMapping maps a complete message envelope with participants, content, and correlation. A capability declaration is not a message, and message occurrence does not prove capability negotiation.
      ja: ProtocolCapabilityMapping は操作群の能力宣言、ProtocolMessageMapping は参加者・内容・相関を持つ完全包絡を写像します。能力宣言はメッセージではなく、メッセージ発生も能力協商を証明しません。
    source_claims:
      - claim-protocol-capability-mapping-009
  - sibling_concept_id: ProtocolTaskMapping
    shared_parent_concept_id: ProtocolMapping
    differentia:
      zh: ProtocolCapabilityMapping 说明端点是否支持某类操作；ProtocolTaskMapping 说明具有稳定任务身份的工作单元如何跨状态、取消、输入请求和结果生命周期转换。支持 tasks 或 tools 不等于已经存在一个 Task。
      en: ProtocolCapabilityMapping says whether an endpoint supports an operation family. ProtocolTaskMapping converts a work unit with stable identity through states, cancellation, input requests, and results. Supporting tasks or tools does not mean a Task already exists.
      ja: ProtocolCapabilityMapping は操作対応可否、ProtocolTaskMapping は安定識別を持つ作業単位の状態・取消し・入力要求・結果を扱います。tasks／tools 対応は Task 存在を意味しません。
    source_claims:
      - claim-protocol-capability-mapping-010
