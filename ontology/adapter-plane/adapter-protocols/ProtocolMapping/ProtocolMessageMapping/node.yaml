schema: moonweave.ai/ontology-node/v1
id: ProtocolMessageMapping
kind: concept
status: accepted
labels:
  zh: 协议消息映射
  en: protocol message mapping
  ja: プロトコルメッセージ写像
semantics:
  short_definition:
    zh: 协议消息映射是把版本化协议的消息包络转换为规范 Message，同时保留协议专属语用和关联元数据的协议映射。
    en: A protocol message mapping converts a versioned protocol envelope to canonical Message while preserving protocol-specific pragmatics and correlation metadata.
    ja: プロトコルメッセージ写像は、版付き包絡を canonical Message へ変換し、固有の語用・相関メタデータを保持する ProtocolMapping です。
  definition:
    zh: 协议消息映射是一类 ProtocolMapping；其种差是源构造为协议规定的完整消息或包络，并把发送者、接收者、内容载体、会话/回复关联和语用标记映射到 Message 及相关规范概念。无法规范化的 performative、content-language、ontology、Artifact 部件或扩展字段必须作为协议元数据保留。它不解释内容为真，不把能力声明、任务状态或信任凭据当作消息，也不是某条消息实例。
    en: A ProtocolMessageMapping is a ProtocolMapping whose source is a complete protocol-defined message or envelope and which maps sender, receiver, content carrier, conversation/reply correlation, and pragmatic marker to Message and related canonical concepts. Unnormalized performatives, content language, ontology, Artifact parts, or extension fields remain protocol metadata. It does not assert payload truth, treat capability declarations, task states, or trust credentials as messages, or become an individual message instance.
    ja: ProtocolMessageMapping は ProtocolMapping の一種で、完全なプロトコルメッセージ／包絡を源とし、送信者、受信者、内容媒体、会話／返信相関、語用標識を Message と関連 Concept へ写像する点が種差です。正規化不能な performative、content-language、ontology、Artifact part、拡張項目は固有メタデータに保持します。内容の真を断定せず、能力宣言・Task 状態・信頼資格をメッセージとせず、個別メッセージ実体でもありません。
  why_needed:
    zh: 消息协议把通信行为、内容语言和会话控制压在同一包络里，而规范 Message 不能假装完整拥有这些语义。单独建模能在保留通信结构的同时，明确哪些字段只能旁挂、哪些推论绝对不能从包络直接得到。
    en: Message protocols place communicative act, content language, and conversation control in one envelope, while canonical Message cannot pretend to own all of those semantics. Separate mapping preserves communication structure and states which fields remain attached and which inferences are forbidden.
    ja: メッセージプロトコルは通信行為、内容言語、会話制御を一包絡に収めますが、canonical Message が全意味を所有するとは限りません。独立写像により保持項目と禁止推論を明示できます。
  includes:
    - zh: 纳入 FIPA ACL/KQML 包络或 A2A Message 到 Message 的版本化规则，要求逐项处理参与者、内容、语言/模态、ontology、conversation-id、reply correlation、performative/role 与协议扩展。
      en: Includes versioned FIPA ACL/KQML envelope or A2A Message rules to Message that explicitly handle participants, content, language or modality, ontology, conversation ID, reply correlation, performative or role, and protocol extensions.
      ja: FIPA ACL／KQML 包絡または A2A Message から Message への版付き規則を、参加者、内容、言語／モダリティ、ontology、conversation-id、返信相関、performative／role、拡張の処理を明示して含みます。
  excludes:
    - zh: 不纳入消息内的命题真值、某个 performative 的规范语义、Task/Artifact 的独立身份、能力协商、授权声明或实际 Message 实例；内容与包络相关不等于它们属于同一概念。
      en: Excludes payload truth, the normative semantics of a performative itself, independent Task or Artifact identity, capability negotiation, authorization declarations, and actual Message instances. Being carried by one envelope does not make these one concept.
      ja: 内容命題の真、performative 自体の規範意味、独立 Task／Artifact、能力協商、認可宣言、実際の Message 実体は含みません。同一包絡内でも同一概念ではありません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ProtocolMessageMapping-example-positive-001
    kind: positive
    labels:
      zh: 协议消息映射正例
      en: Positive example of protocol message mapping
      ja: プロトコルメッセージ写像の正例
    scenario_id: null
    descriptions:
      zh: mapping-fipa-2002-acl-message 将 SC00061G 的 ACLMessage 映射到 Message：sender/receiver 对齐参与者，content 保留为内容载体，conversation-id、reply-with 与 in-reply-to 保留关联；performative、language、ontology 和 protocol 作为 FIPA 元数据保留，因此整体为 lossy。
      en: "mapping-fipa-2002-acl-message maps the SC00061G ACLMessage to Message: sender/receiver align participants, content remains a content carrier, and conversation-id, reply-with, and in-reply-to preserve correlation. performative, language, ontology, and protocol remain FIPA metadata, so the mapping is lossy."
      ja: mapping-fipa-2002-acl-message は SC00061G ACLMessage を Message へ写像し、sender/receiver を参加者、content を内容媒体、conversation-id・reply-with・in-reply-to を相関として扱います。performative・language・ontology・protocol は FIPA メタデータに保持するため lossy です。
    field_values:
      mapping_rule_id: mapping-rule-fipa-acl-message
      version: "3"
      source_construct: fipa:ACLMessage
      target_construct: moonweave:Message
      direction: source-to-target
      mapping_kind: lossy
      valid_from: 2026-07-13T06:00:00.000Z
      mapping_id: mapping-fipa-2002-acl-message
      external_version: FIPA-SC00061G-2002
      loss_kind: lossy
    related_node_ids:
      - ProtocolMessageMapping
      - Message
    related_relation_ids:
      - ProtocolMessageMapping-maps_to-Message
    expected_result:
      zh: 规则归入 ProtocolMessageMapping 并映射到 Message；FIPA 语用和内容解释字段仍可追溯，不被伪装成规范 Message 的固有字段。
      en: The rule is a ProtocolMessageMapping to Message; FIPA pragmatic and content-interpretation fields remain traceable rather than masquerading as intrinsic Message fields.
      ja: 規則は Message への ProtocolMessageMapping となり、FIPA の語用・内容解釈項目は追跡可能なままで Message 固有項目と偽りません。
    why_valid_or_invalid:
      zh: 该例逐项区分包络结构、会话关联与内容解释，并承认规范 Message 无法完整承载 FIPA communicative-act 语义。
      en: The case separates envelope structure, conversation correlation, and content interpretation, and acknowledges that canonical Message cannot fully carry FIPA communicative-act semantics.
      ja: 包絡構造、会話相関、内容解釈を分離し、canonical Message が FIPA communicative-act 意味を完全には保持できないと認めます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-protocol-message-mapping-003
      - claim-protocol-message-mapping-004
  - id: ProtocolMessageMapping-example-boundary-001
    kind: boundary
    labels:
      zh: 协议消息映射边界例
      en: Boundary case for protocol message mapping
      ja: プロトコルメッセージ写像の境界例
    scenario_id: null
    descriptions:
      zh: 一条 FIPA inform 消息的 content 写着“库存为 12”。消息映射只能保存发送行为、包络和内容表达，不能因为 performative=inform 就直接在规范知识层断言“库存为 12”为真；那需要独立的来源、信念或事实验证。
      en: A FIPA inform message carries content saying 'inventory is 12'. The message mapping preserves the sending act, envelope, and expression, but performative=inform cannot directly assert that proposition as a canonical fact; provenance, belief, or fact verification is separate.
      ja: FIPA inform の content が「在庫は 12」と述べても、写像は送信行為・包絡・表現を保持するだけで、performative=inform から canonical 事実を直接断定しません。出典・信念・事実検証は別です。
    field_values: {}
    related_node_ids:
      - ProtocolMessageMapping
      - Message
    related_relation_ids:
      - ProtocolMessageMapping-maps_to-Message
    expected_result:
      zh: 生成一个 Message 及其 FIPA 元数据，但不生成已验证事实；content 的命题地位保持未决。
      en: A Message plus FIPA metadata is produced, but no verified fact is created; the payload proposition remains epistemically unresolved.
      ja: Message と FIPA メタデータは生成しますが検証済み事実は生成せず、content の命題的地位は未決のままです。
    why_valid_or_invalid:
      zh: FIPA communicative act 规定发送者的意图与合理效果，而非自动证明 content；将消息接收等同于事实采纳会跨越本映射的认识论边界。
      en: A FIPA communicative act specifies sender intention and rational effect, not automatic proof of content; equating receipt with fact adoption crosses the mapping's epistemic boundary.
      ja: FIPA communicative act は送信者意図と合理的効果を規定し、content の自動証明ではありません。受信を事実採用と同一視するのは認識論境界を越えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-protocol-message-mapping-005
      - claim-protocol-message-mapping-006
  - id: ProtocolMessageMapping-example-instance-001
    kind: instance
    labels:
      zh: 协议消息映射结构化实例
      en: Structured instance of protocol message mapping
      ja: プロトコルメッセージ写像の構造化インスタンス
    scenario_id: null
    descriptions:
      zh: mapping-fipa-2002-acl-message 的节点内记录给出 SC00061G-2002、fipa:ACLMessage、moonweave:Message、source-to-target 和 lossy，并列明 performative/language/ontology/protocol 的旁挂策略。
      en: The inline mapping-fipa-2002-acl-message record specifies SC00061G-2002, fipa:ACLMessage, moonweave:Message, source-to-target, lossy, and the attachment policy for performative/language/ontology/protocol.
      ja: mapping-fipa-2002-acl-message のノード内記録は SC00061G-2002、fipa:ACLMessage、moonweave:Message、source-to-target、lossy、performative/language/ontology/protocol の保持方針を示します。
    field_values:
      mapping_rule_id: mapping-rule-fipa-acl-message
      version: "3"
      source_construct: fipa:ACLMessage
      target_construct: moonweave:Message
      direction: source-to-target
      mapping_kind: lossy
      valid_from: 2026-07-13T06:00:00.000Z
      mapping_id: mapping-fipa-2002-acl-message
      external_version: FIPA-SC00061G-2002
      loss_kind: lossy
    related_node_ids:
      - ProtocolMessageMapping
    related_relation_ids: []
    expected_result:
      zh: 记录通过映射字段约束，且源为消息包络、目标为 Message、损失说明与版本相互一致。
      en: The record satisfies mapping fields, with a message envelope source, Message target, loss account, and revision in agreement.
      ja: 記録は規則項目を満たし、包絡源、Message 対象、損失説明、版が整合します。
    why_valid_or_invalid:
      zh: 规则没有沿用 A2A Task 占位字段，也没有把 FIPA ACL 与规范 Message 虚报为 exact。
      en: The rule contains no A2A Task placeholder fields and does not overstate FIPA ACL and canonical Message as exact equivalents.
      ja: A2A Task の仮項目を残さず、FIPA ACL と canonical Message を exact 同値と誇張しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-protocol-message-mapping-007
      - claim-protocol-message-mapping-008
external_mappings: []
applicability:
  - adapter
sibling_differentiation:
  - sibling_concept_id: ProtocolTaskMapping
    shared_parent_concept_id: ProtocolMapping
    differentia:
      zh: ProtocolMessageMapping 处理一次通信包络及回复/会话关联；ProtocolTaskMapping 处理跨多次交互持续存在的工作身份、状态机和结果。Task 可以包含消息历史，但包含关系不会把 Message 映射提升为 Task 映射。
      en: ProtocolMessageMapping handles one communication envelope and reply or conversation correlation. ProtocolTaskMapping handles persistent work identity, state machine, and results across interactions. A Task may contain message history, but containment does not turn a message mapping into a task mapping.
      ja: ProtocolMessageMapping は一包絡と返信／会話相関、ProtocolTaskMapping は複数対話に続く作業識別・状態機械・結果を扱います。Task の message history は両写像を同一にしません。
    source_claims:
      - claim-protocol-message-mapping-009
  - sibling_concept_id: ProtocolTrustMapping
    shared_parent_concept_id: ProtocolMapping
    differentia:
      zh: ProtocolMessageMapping 保存谁向谁发送了什么；ProtocolTrustMapping 判断跨哪个受保护资源边界、在何种认证和 scope 下允许什么。消息含有身份或安全字段，不意味着消息映射本身作出授权结论。
      en: ProtocolMessageMapping preserves who sent what to whom. ProtocolTrustMapping determines which protected-resource boundary is crossed and what is allowed under which authentication and scope. Security fields in a message do not make the message mapping an authorization decision.
      ja: ProtocolMessageMapping は送信者・受信者・内容、ProtocolTrustMapping は保護 resource 境界と認証／scope 下の許可を扱います。安全項目を持つメッセージでも認可写像にはなりません。
    source_claims:
      - claim-protocol-message-mapping-010
