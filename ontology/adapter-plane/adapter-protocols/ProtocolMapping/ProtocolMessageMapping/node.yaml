source_claims:
  - id: claim-protocol-message-mapping-001
    source: eng-proto-a2a-spec
    supports: ProtocolMessageMapping also accounts for A2A's explicit distinction between Message and Artifact and its role-tagged, part-based message model. Mapping both to one Message without preservation would be semantically lossy; the rule class itself is a Moonweave design decision.
    locator: A2A Specification 1.0.0 > Core data model > Message, Part, and Artifact
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-message-mapping-002
    source: eng-proto-fipa-acl
    supports: ProtocolMessageMapping is directly grounded in FIPA SC00061G's abstract ACL message, mandatory performative, named parameters, content interpretation, and separate concrete encodings. Its canonical target and parent placement are Moonweave ontology decisions.
    locator: FIPA ACL Message Structure Specification SC00061G > Abstract message, parameters, semantics, and encodings
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-message-mapping-003
    source: eng-proto-fipa-acl
    supports: ProtocolMessageMapping-example-positive-001 takes the mandatory performative and optional sender, receiver, content, language, ontology, protocol, conversation-id, reply-with, and in-reply-to parameters from FIPA SC00061G.
    locator: FIPA ACL Message Structure Specification SC00061G > ACL message parameters
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-message-mapping-004
    source: eng-proto-fipa-acl
    supports: ProtocolMessageMapping-example-positive-001 retains language and ontology because FIPA states that content interpretation depends on the named content language and ontology, while protocol and correlation parameters control conversation context.
    locator: FIPA ACL Message Structure Specification SC00061G > content, language, ontology, protocol, and conversation parameters
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-message-mapping-005
    source: eng-proto-fipa-act
    supports: "ProtocolMessageMapping-example-boundary-001 follows the FIPA Communicative Act Library's formal semantics: inform has feasibility preconditions and rational effects, not a blanket rule that receiving its content proves the proposition true."
    locator: FIPA Communicative Act Library SC00037J > inform act > feasibility preconditions and rational effect
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-message-mapping-006
    source: eng-proto-fipa-acl
    supports: ProtocolMessageMapping-example-boundary-001 keeps content as an encoded expression because SC00061G says its meaning is interpreted under the declared language and ontology rather than by the envelope alone.
    locator: FIPA ACL Message Structure Specification SC00061G > Semantics of content, language, and ontology parameters
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-message-mapping-007
    source: eng-proto-fipa-acl
    supports: ProtocolMessageMapping-example-instance-001 pins the external source to the 2002 SC00061G ACL message structure and records a whole message envelope rather than a Task placeholder.
    locator: FIPA ACL Message Structure Specification SC00061G > Status of specification and message grammar
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-message-mapping-008
    source: eng-proto-fipa-acl
    supports: ProtocolMessageMapping-example-instance-001 marks the mapping lossy because canonical Message does not natively reproduce every FIPA performative and content-interpretation parameter.
    locator: FIPA ACL Message Structure Specification SC00061G > performative and parameter set
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-message-mapping-009
    source: eng-proto-a2a-spec
    supports: A2A explicitly separates Message, a single communication turn with role and Parts, from Task, a stateful unit with stable ID, status, artifacts, and history. Task history may contain Messages without collapsing the two identities. That distinction supports separate message and task mappings; canonical targets are Moonweave decisions.
    locator: Specification > Core concepts, Agent Card, Message, Task, and Artifact
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-message-mapping-010
    source: eng-proto-a2a-spec
    supports: A2A models Message content and role separately from Agent Card security schemes, per-interface security requirements, and out-of-band credentials. A message can cross a protected endpoint without becoming an authorization decision. This supports distinct message-envelope and trust-boundary mappings; Moonweave defines their class hierarchy.
    locator: Specification > Core concepts, Agent Card, Message, Task, and Artifact
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-message-mapping-011
    source: eng-proto-a2a-spec
    supports: A2A defines Message as a role-bearing communication record composed of Parts and distinguished from Tasks and Artifacts. This supports ProtocolMessageMapping as the ProtocolMapping subtype for message envelopes, roles, content parts, identifiers, and correlation.
    locator: A2A v1.0 §3.7 Messages and Artifacts and §4.1.4 Message
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-message-mapping-012
    source: eng-proto-a2a-spec
    supports: A2A Message has messageId, contextId, role, Parts, metadata, and extension fields. These documented components support mapping to Moonweave Message when identity, speaker role, ordered content, and conversation correlation are preserved.
    locator: A2A v1.0 §4.1.4 Message, §4.1.5 Role, and §4.1.6 Part
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
