source_claims:
  - id: claim-protocol-mapping-001
    source: eng-proto-a2a-spec
    supports: ProtocolMapping is grounded in A2A's versioned definitions of Message, Task, TaskState, Artifact, AgentCard, and protocol bindings. The reusable MappingRule identity, its specialization under MappingRule, and its applies_to_adapter link are Moonweave ontology decisions.
    locator: A2A Specification 1.0.0 > Core data model, operations, bindings, and versioning
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-protocol-mapping-002
    source: eng-proto-fipa-acl
    supports: "ProtocolMapping also covers message-oriented protocols: FIPA ACL fixes a performative plus named message parameters and separates abstract structure from encoding, providing the external constructs that a versioned mapping rule must reference precisely."
    locator: FIPA ACL Message Structure Specification SC00061G > Message structure, parameters, and encodings
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-protocol-mapping-003
    source: eng-proto-a2a-spec
    supports: A2A requires clients to send the Major.Minor protocol version and servers to process the requested semantics or return VersionNotSupportedError. This directly justifies pinning an A2A mapping to a protocol revision. external_version's representation and cardinality are Moonweave design.
    locator: A2A Specification > 3.6 Versioning > Client Responsibilities; Server Responsibilities
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-protocol-mapping-004
    source: eng-proto-fipa-acl
    supports: FIPA SC00061 is a specific standard release with normative parameter names and requirements. A mapping reviewed against that document must record which revision supplied the semantics. The external_version field is Moonweave provenance; it is not an ACL message parameter.
    locator: FIPA ACL Message Structure Specification SC00061G > Document control; 2 ACL Message Structure
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-protocol-mapping-005
    source: eng-proto-a2a-spec
    supports: A2A requires protocol bindings to provide functionally equivalent representations of its data model while permitting extensions and opaque implementation details. A canonical mapping can therefore preserve, approximate, or fail to represent source semantics. The exact/lossy/unsupported labels are Moonweave's explicit assessment vocabulary.
    locator: A2A Specification > 4 Protocol Data Model; 5 Protocol Binding Requirements and Interoperability; 7 Extensions
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-protocol-mapping-006
    source: eng-proto-fipa-acl
    supports: FIPA ACL separates the envelope's communicative act, participants, content, content description, and conversation control and warns that omitted parameters can impair interoperability. A generic canonical message may not preserve every field or pragmatic effect. Moonweave records that gap through loss_kind.
    locator: FIPA ACL Message Structure Specification > 2.1 Message Parameters and Table 1; parameter omission guidance
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-protocol-mapping-007
    source: eng-proto-a2a-spec
    supports: A2A makes behavior version-specific and imposes binding-equivalence and interoperability requirements. A mapping cannot be accepted merely because field names look similar; it must bind both versions and demonstrate its declared conversion direction. The particular MappingTestResult gate is Moonweave conformance policy.
    locator: A2A Specification > 3.6 Versioning; 5 Protocol Binding Requirements and Interoperability
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-protocol-mapping-008
    source: eng-proto-fipa-acl
    supports: FIPA ACL defines normative message structure and notes interoperability consequences when required information is unavailable. That makes versioned, behavior-level tests necessary for an adapter mapping. FIPA does not prescribe Moonweave's test artifact or bidirectional acceptance rule.
    locator: FIPA ACL Message Structure Specification > 2 ACL Message Structure; 2.1 Message Parameters; Conformance
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-protocol-mapping-009
    source: eng-proto-a2a-spec
    supports: A2A defines protocol semantics that must be implemented by a client or server surface. Moonweave represents the translating implementation as ProtocolAdapter and links each versioned ProtocolMapping to that adapter. The applies_to_adapter predicate and exactly-one cardinality are not A2A objects; they are ownership invariants.
    locator: A2A Specification > 2 Terminology; 3 Protocol Operations; 5 Protocol Binding Requirements and Interoperability
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-protocol-mapping-010
    source: eng-proto-fipa-acl
    supports: FIPA's normative ACL parameter contract is meaningful only when an implementation interprets and emits those parameters consistently. This supports assigning the mapping rule to a protocol-specific adapter. FIPA does not define Moonweave's adapter class or relation cardinality.
    locator: FIPA ACL Message Structure Specification > 2 ACL Message Structure; Conformance requirements
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-protocol-mapping-011
    source: eng-proto-a2a-spec
    supports: A2A defines Task as a stateful unit with id, contextId, TaskStatus, history, and Artifacts; this case maps those runtime properties to Execution and records the Moonweave split as design inference.
    locator: A2A Protocol specification > Core Concepts > Task lifecycle, status, history, and artifacts
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-protocol-mapping-012
    source: eng-proto-a2a-spec
    supports: A2A's Task data model supplies runtime lifecycle data; the distinction between that instance and a reusable Moonweave mapping rule is an explicit adapter boundary.
    locator: A2A Protocol specification > Core Concepts > Task lifecycle, status, history, and artifacts
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-protocol-mapping-013
    source: eng-proto-a2a-spec
    supports: A2A provides the source-side lifecycle fields; the inline target, direction, and loss classification document Moonweave adapter design.
    locator: A2A Protocol specification > Core Concepts > Task lifecycle, status, history, and artifacts
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-protocol-mapping-014
    source: eng-proto-a2a-spec
    supports: A2A defines a wire-facing protocol data model, operations, version negotiation, bindings, and interoperability requirements. Those revision- and binding-sensitive constructs support the ProtocolMapping endpoint, not an in-process framework API mapping. The shared MappingRule parent is Moonweave's ontology organization.
    locator: Specification > Core concepts, Agent Card, Message, Task, and Artifact
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-protocol-mapping-015
    source: eng-fw-langgraph-docs
    supports: LangGraph describes an orchestration framework and runtime for durable, stateful agents, with graph APIs, streaming, human-in-the-loop, and persistence. Those are SDK/runtime constructs and support the FrameworkMapping endpoint rather than a communication-protocol binding. Moonweave defines the sibling boundary.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-protocol-mapping-016
    source: eng-proto-a2a-spec
    supports: A2A requires clients and servers to declare and validate protocol versions and bindings. This evidence supports applying a ProtocolMapping only to ProtocolAdapter profiles whose protocol identifier, version range, binding, and extensions satisfy the mapping preconditions.
    locator: A2A v1.0 §3.6 Versioning and §5 Protocol Binding Requirements
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-protocol-mapping-017
    source: eng-proto-a2a-spec
    supports: A2A defines functional-equivalence requirements and explicit method mappings across protocol bindings. Those requirements support ProtocolMapping as a MappingRule subtype that binds versioned protocol constructs to canonical targets with direction and loss.
    locator: A2A v1.0 §5.1 Functional Equivalence and §5.3 Method Mapping Reference
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
