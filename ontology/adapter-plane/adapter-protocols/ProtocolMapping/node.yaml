schema: moonweave.ai/ontology-node/v1
id: ProtocolMapping
kind: concept
status: review
labels:
  zh: 协议映射规则
  en: protocol mapping
  ja: プロトコル写像規則
semantics:
  short_definition:
    zh: 协议映射是规定某一版本协议构造与 Moonweave 概念之间对应、方向和语义损失的映射规则。
    en: A protocol mapping is a MappingRule that specifies correspondence, direction, and semantic loss between a versioned protocol construct and a Moonweave concept.
    ja: プロトコル写像は、版付きプロトコル構成と Moonweave Concept 間の対応・方向・意味損失を規定する MappingRule です。
  definition:
    zh: 协议映射是一类 MappingRule；其种差是源端或目标端至少一侧属于具名且版本固定的通信协议，并针对能力、消息、任务或信任构造，明确外部路径、规范目标、转换方向、前后条件、值级变换和 exact/lossy/unsupported 结论。它由 ProtocolAdapter 应用，却不是适配器、协议对象、转换运行或测试结果；每次协议版本变化都必须重新验证规则是否仍成立。
    en: A ProtocolMapping is a MappingRule whose differentia is that at least one side belongs to a named, pinned communication-protocol revision and that it addresses a capability, message, task, or trust construct with an external path, canonical target, direction, pre/postconditions, value transformation, and exact/lossy/unsupported conclusion. A ProtocolAdapter applies it, but it is not the adapter, protocol object, conversion run, or test result. Every protocol revision change requires renewed validation.
    ja: ProtocolMapping は MappingRule の一種で、少なくとも一方が名称と版を固定した通信プロトコルに属し、能力・メッセージ・Task・信頼構成について、外部パス、canonical 対象、方向、事前事後条件、値変換、exact/lossy/unsupported 判定を明示する点が種差です。ProtocolAdapter が適用しますが、アダプター、プロトコル対象、変換実行、試験結果ではありません。版変更ごとに再検証が必要です。
  why_needed:
    zh: 该规范层把外部协议含义与执行代码解耦：审查者可以逐条判断“映了什么、为何有损、哪个版本有效”，同一适配器也能组合多条小而清楚的规则，而不是把能力、消息、任务和授权揉成一个不可审计转换。
    en: This specification layer decouples protocol meaning from executable code. Reviewers can inspect what is mapped, why it is lossy, and for which revision it holds, while one adapter composes small rules instead of blending capability, message, task, and authorization semantics into an unauditable transform.
    ja: この仕様層は外部意味を実行コードから分離し、何を写像し、なぜ損失があり、どの版で有効かを個別審査できます。一つのアダプターは能力・メッセージ・Task・認可を混ぜず、小さな規則を組み合わせられます。
  includes:
    - zh: 纳入以继承的 mapping_rule_id 与 version 稳定标识，并声明协议版本、外部构造路径、规范目标、方向、变换、损失分类、适用适配器和正反一致性样例的规则；unsupported 也必须说明无法映射的具体语义。
      en: Includes rules stably identified by inherited mapping_rule_id and version and declaring protocol revision, external construct path, canonical target, direction, transformation, loss classification, applicable adapter, and positive and negative conformance cases; unsupported must name the specific unrepresentable semantics.
      ja: 継承した mapping_rule_id と version で安定識別され、プロトコル版、外部構成パス、canonical 対象、方向、変換、損失分類、適用アダプター、正負適合例を持つ規則を含みます。unsupported も表現不能な意味を特定します。
  excludes:
    - zh: 不纳入协议适配器实现、协议消息/任务/能力实例、一次转换活动、生成的映射产物或框架 SDK 对象映射；未固定外部协议版本、没有方向或只写“相关”的记录也不是可接受的 ProtocolMapping。
      en: Excludes adapter implementations, protocol message/task/capability instances, individual conversion activities, generated mapping artifacts, and framework SDK-object mappings. A record with no pinned protocol revision, no direction, or only 'related' is not an acceptable ProtocolMapping.
      ja: アダプター実装、プロトコルのメッセージ／Task／能力実体、個別変換活動、生成写像成果物、フレームワーク SDK 対象写像は含みません。版固定・方向がなく「関連」のみの記録も不可です。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: external_version
      labels:
        zh: 外部协议版本
        en: external protocol version
        ja: 外部プロトコルバージョン
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定映射来源端所依据的协议版本。
        en: Pins the source protocol version to which the mapping applies.
        ja: マッピング元に適用されるプロトコルバージョンを固定します。
      allowed_values: []
      pattern: null
      example_value: A2A-1.0.0
      source_claims:
        - claim-protocol-mapping-003
        - claim-protocol-mapping-004
    - id: loss_kind
      labels:
        zh: 损失类别
        en: loss kind
        ja: 損失種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明映射为精确、有损或不支持。
        en: Whether the mapping is exact, lossy, or unsupported.
        ja: マッピングが exact、lossy、unsupported のいずれかを示します。
      allowed_values: []
      pattern: null
      example_value: exact
      source_claims:
        - claim-protocol-mapping-005
        - claim-protocol-mapping-006
  constraints:
    - id: protocol-mapping-versioned-test
      severity: error
      expression_language: plain
      expression: an accepted mapping names both construct versions and has a conformance test for its declared direction
      explanations:
        zh: 已接受协议映射必须注明两端版本并具备对应方向的一致性测试。
        en: An accepted protocol mapping names both construct versions and has a conformance test for its declared direction.
        ja: 受理済みプロトコルマッピングは両端のバージョンを示し、宣言方向の適合性テストを持ちます。
      source_claims:
        - claim-protocol-mapping-007
        - claim-protocol-mapping-008
  required_relation_constraints:
    - id: protocol-mapping-governs-adapter
      direction: outgoing
      predicate: applies_to_adapter
      target_concept_id: ProtocolAdapter
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 协议映射必须指向使用该映射的协议适配器。
        en: A protocol mapping points to the protocol adapter that applies it.
        ja: プロトコルマッピングはそれを適用するプロトコルアダプターを指します。
      source_claims:
        - claim-protocol-mapping-009
        - claim-protocol-mapping-010
examples:
  - id: ProtocolMapping-example-positive-001
    kind: positive
    labels:
      zh: 协议映射规则正例
      en: Positive example of protocol mapping
      ja: プロトコル写像規則の正例
    scenario_id: null
    descriptions:
      zh: mapping-a2a-1-0-task-lifecycle 规定 A2A 1.0 Task 到 Moonweave Execution 的 source-to-target 转换：id 保存协议运行身份，contextId 关联 RuntimeSession，status 与 history 投影为执行生命周期和可观察记录，Artifact 保持产物谱系；只有携带明确 task_specification_id 时才生成 Execution-realizes-Task。rejected 与 auth-required 原值通过 ConversionWarning 保留，因此映射为 lossy。
      en: "mapping-a2a-1-0-task-lifecycle specifies a source-to-target conversion from A2A 1.0 Task to Moonweave Execution: id preserves protocol-run identity, contextId links RuntimeSession, status and history project to execution lifecycle and observability records, and Artifacts retain product lineage. Execution-realizes-Task is emitted only when an explicit task_specification_id is present. rejected and auth-required values are retained with ConversionWarnings, so the mapping is lossy."
      ja: mapping-a2a-1-0-task-lifecycle は A2A 1.0 Task から Moonweave Execution への変換を定め、id をプロトコル実行識別子、contextId を RuntimeSession 関連、status と history を実行ライフサイクル・観測記録、Artifact を成果物系譜へ写像します。明示的 task_specification_id がある場合だけ Execution-realizes-Task を生成し、rejected と auth-required は ConversionWarning と原値を保持するため lossy です。
    field_values:
      mapping_rule_id: mapping-rule-a2a-task-lifecycle
      version: "4"
      source_construct: a2a:Task
      target_construct: moonweave:Execution
      direction: source-to-target
      mapping_kind: lossy
      valid_from: 2026-07-15T00:00:00.000Z
      external_version: A2A-1.0.0
      loss_kind: lossy
    related_node_ids:
      - ProtocolMapping
      - ProtocolAdapter
    related_relation_ids:
      - ProtocolMapping-applies_to_adapter-ProtocolAdapter
    expected_result:
      zh: 该规则可把有状态 A2A Task 转换为 Execution，同时不污染可复用 Task 规范。
      en: The rule converts a stateful A2A Task into Execution without contaminating the reusable Task specification.
      ja: 状態付き A2A Task を Execution へ変換し、再利用 Task 仕様を汚染しません。
    why_valid_or_invalid:
      zh: 映射逐项说明生命周期、关联信息、产物谱系和规范链接的生成条件，并显式记录无法无损转换的状态值。
      en: The mapping accounts separately for lifecycle, linked information, artifact lineage, and the condition for a specification link and explicitly records state values that cannot round-trip losslessly.
      ja: ライフサイクル、関連情報、成果物系譜、仕様リンク生成条件を個別に説明し、無損失往復できない状態値を明示するためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-protocol-mapping-011
  - id: ProtocolMapping-example-boundary-001
    kind: boundary
    labels:
      zh: 协议映射规则边界例
      en: Boundary case for protocol mapping
      ja: プロトコル写像規則の境界例
    scenario_id: null
    descriptions:
      zh: 收到的 A2A Task 实例含 working 状态、Artifact 和消息历史；它是协议运行数据。即使映射规则能够转换它，该实例也不会成为 ProtocolMapping，更不会因名称含 Task 就成为 Moonweave Task 规范。
      en: An incoming A2A Task instance carries working state, an Artifact, and message history; it is protocol runtime data. Even when a mapping rule can convert it, the instance is not ProtocolMapping and does not become a Moonweave Task specification merely because its protocol name contains Task.
      ja: 受信した A2A Task 実体は working 状態、Artifact、メッセージ履歴を持つプロトコル実行データです。規則で変換できても ProtocolMapping にはならず、名称に Task があるだけで Moonweave Task 仕様にもなりません。
    field_values: {}
    related_node_ids:
      - ProtocolMapping
      - ProtocolAdapter
      - Task
    related_relation_ids:
      - ProtocolMapping-applies_to_adapter-ProtocolAdapter
    expected_result:
      zh: 实例进入适配器运行并生成 Execution；映射规则仍是独立规范对象。
      en: The instance enters an adapter run and produces Execution while the mapping rule remains a separate specification.
      ja: 実体はアダプタ実行に入り Execution を生成し、写像規則は別の仕様対象として残ります。
    why_valid_or_invalid:
      zh: 规则描述可重复转换，协议实例记录一次运行；二者身份由规范与发生事实分别决定。
      en: A rule describes repeatable conversion while the protocol instance records one runtime object; specification and occurrence determine their identities separately.
      ja: 規則は反復可能な変換、プロトコル実体は一回の実行対象を表し、仕様と発生事実で同一性が別々に決まるためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-protocol-mapping-012
  - id: ProtocolMapping-example-instance-001
    kind: instance
    labels:
      zh: 协议映射规则结构化实例
      en: Structured instance of protocol mapping
      ja: プロトコル写像規則の構造化インスタンス
    scenario_id: null
    descriptions:
      zh: 节点内 mapping-a2a-1-0-task-lifecycle 记录 A2A-1.0.0、a2a:Task、moonweave:Execution、source-to-target 与 lossy，并说明生命周期、Artifact、history 和可选规范链接的处理。
      en: The inline mapping-a2a-1-0-task-lifecycle record states A2A-1.0.0, a2a:Task, moonweave:Execution, source-to-target, and lossy and documents handling of lifecycle, Artifacts, history, and the optional specification link.
      ja: ノード内 mapping-a2a-1-0-task-lifecycle は A2A-1.0.0、a2a:Task、moonweave:Execution、source-to-target、lossy と、ライフサイクル・Artifact・history・任意仕様リンクの処理を記録します。
    field_values:
      mapping_rule_id: mapping-rule-a2a-task-lifecycle
      version: "4"
      source_construct: a2a:Task
      target_construct: moonweave:Execution
      direction: source-to-target
      mapping_kind: lossy
      valid_from: 2026-07-15T00:00:00.000Z
      external_version: A2A-1.0.0
      loss_kind: lossy
    related_node_ids:
      - ProtocolMapping
    related_relation_ids: []
    expected_result:
      zh: 规则字段通过 MappingRule 与 ProtocolMapping 约束，且外部版本与内部规则版本清楚分开。
      en: Rule fields satisfy MappingRule and ProtocolMapping constraints, with external protocol revision clearly separated from internal rule version.
      ja: 規則項目は MappingRule と ProtocolMapping の制約を満たし、外部版と内部規則版を明確に分離します。
    why_valid_or_invalid:
      zh: mapping_kind 与 loss_kind 都标为 lossy，与值域差异一致；没有沿用旧草案版本或把状态映射虚报为 exact。
      en: Both mapping_kind and loss_kind are lossy, matching the value-domain difference; the record retains no obsolete draft revision and does not overstate the mapping as exact.
      ja: mapping_kind と loss_kind は値域差に合わせて lossy とし、旧ドラフト版を残さず exact と誇張しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-protocol-mapping-013
external_mappings: []
applicability:
  - adapter
sibling_differentiation:
  - sibling_concept_id: FrameworkMapping
    shared_parent_concept_id: MappingRule
    differentia:
      zh: ProtocolMapping 的外部一侧是 A2A、MCP、FIPA 或 KQML 等通信协议构造，并受协议版本、绑定和互操作语义约束；FrameworkMapping 的外部一侧是 LangGraph 等 SDK/运行时对象，并受框架版本与对象 API 约束。协议线格式与框架内存对象不能共用一条规则。
      en: ProtocolMapping has an A2A, MCP, FIPA, or KQML communication construct on one side and is constrained by protocol revision, binding, and interoperability semantics. FrameworkMapping has an SDK/runtime object such as LangGraph on one side and is constrained by framework version and object API. Wire constructs and in-memory framework objects cannot share one rule.
      ja: ProtocolMapping は A2A・MCP・FIPA・KQML の通信構成と版・binding・相互運用意味、FrameworkMapping は LangGraph 等 SDK／runtime 対象と API 版に制約されます。wire 構成とメモリ内対象は同一規則を共有できません。
    source_claims:
      - claim-protocol-mapping-014
      - claim-protocol-mapping-015
parent_relation: null
relations:
  - id: ProtocolMapping-applies_to_adapter-ProtocolAdapter
    predicate: applies_to_adapter
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: applies to adapter
      en: applies to adapter
      ja: applies to adapter
    definitions:
      zh: 每条协议映射明确绑定实施它的协议适配器，避免把协议规范、映射规则与运行适配能力混成一个节点。
      en: Each protocol mapping binds to the protocol adapter that applies it, preventing protocol specifications, mapping rules, and runtime adapter capability from being conflated.
      ja: 各プロトコル写像はそれを適用するプロトコルアダプターへ結び、プロトコル仕様・写像規則・実行時適応能力の混同を防ぎます。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: 1
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_target_of_applies_to_adapter
      labels:
        zh: 反向：applies to adapter
        en: is target of applies to adapter
        ja: 逆方向：applies to adapter
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: ProtocolMapping-applies_to_adapter-ProtocolAdapter-example-positive-manual-001
        kind: positive
        labels:
          zh: applies to adapter人工正例
          en: Reviewed positive case for applies to adapter
          ja: applies to adapterの審査済み正例
        scenario_id: null
        descriptions:
          zh: "`a2a-task-v1` 声明 A2A 1.x 与 JSON-RPC/HTTP 绑定；`a2a-profile@1.0` 的标识、版本和绑定全部匹配，且没有未声明扩展。"
          en: "`a2a-task-v1` declares A2A 1.x with the JSON-RPC over HTTP binding; `a2a-profile@1.0` matches protocol identity, version, and binding and has no undeclared extension."
          ja: "`a2a-task-v1` は A2A 1.x と JSON-RPC/HTTP binding を宣言し、`a2a-profile@1.0` は識別、版、binding が一致し未宣言 extension もありません。"
        field_values: {}
        related_node_ids:
          - ProtocolMapping
          - ProtocolAdapter
        related_relation_ids:
          - ProtocolMapping-applies_to_adapter-ProtocolAdapter
        expected_result:
          zh: 映射解析应确认它适用于该 ProtocolAdapter 版本。
          en: Mapping resolution confirms applicability to that ProtocolAdapter version.
          ja: 写像解決はその ProtocolAdapter 版への適用を確認します。
        why_valid_or_invalid:
          zh: 协议身份、版本、绑定和扩展前置条件都得到显式验证。
          en: Protocol identity, version, binding, and extension preconditions are all explicitly validated.
          ja: protocol 識別、版、binding、extension 前提が明示検証されるためです。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-protocol-mapping-016
      - id: ProtocolMapping-applies_to_adapter-ProtocolAdapter-example-boundary-manual-001
        kind: boundary
        labels:
          zh: applies to adapter人工边界例
          en: Reviewed boundary case for applies to adapter
          ja: applies to adapterの審査済み境界例
        scenario_id: null
        descriptions:
          zh: 同名 A2A 适配配置使用旧版字段和未声明扩展，超出 `a2a-task-v1` 的兼容范围。
          en: A similarly named A2A adapter configuration uses legacy fields and an undeclared extension outside the `a2a-task-v1` compatibility range.
          ja: 同名 A2A adapter 設定が旧項目と未宣言 extension を使い `a2a-task-v1` の互換範囲外です。
        field_values: {}
        related_node_ids:
          - ProtocolMapping
          - ProtocolAdapter
        related_relation_ids:
          - ProtocolMapping-applies_to_adapter-ProtocolAdapter
        expected_result:
          zh: 不得仅凭协议名称建立 applies_to_adapter 关系。
          en: Protocol name alone must not establish applies_to_adapter.
          ja: protocol 名だけで applies_to_adapter 関係を作りません。
        why_valid_or_invalid:
          zh: 协议映射的适用性由完整版本与绑定合同决定。
          en: Protocol-mapping applicability is determined by the complete version and binding contract.
          ja: ProtocolMapping の適用は完全な版・binding 契約で決まります。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-protocol-mapping-016
    source_claims:
      - claim-protocol-mapping-016
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: pending
    target: concept:ProtocolAdapter
  - id: ProtocolMapping-is_a-MappingRule
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是一种
      en: is a
      ja: の一種である
    definitions:
      zh: 协议映射规则 是一种 映射规则。区分特征：三套协议对能力、任务与消息构造使用不同表示且需显式版本互操作，因此映射必须是可审计规则而非无信息边。
      en: "protocol mapping is a kind of mapping rule. Reviewed differentia: The three protocols use distinct representations for capabilities, tasks, and messages and require version-explicit interoperability, so mappings must be auditable rules rather than information-free edges."
      ja: プロトコル写像規則 は 写像規則 の一種です。審査済みの種差：三プロトコルは能力・タスク・メッセージに異なる表現を用い版明示の相互運用を要するため、写像は情報のない辺ではなく監査可能な規則でなければなりません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 分类继承不使用实例关系基数。
      en: Taxonomic inheritance does not use instance-relation cardinality.
      ja: 分類継承にはインスタンス関係の基数を用いません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 反向：是一种
        en: has subtype
        ja: 逆方向：の一種である
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: ProtocolMapping-is_a-MappingRule-example-positive-manual-001
        kind: positive
        labels:
          zh: 是一种人工正例
          en: Reviewed positive case for is a
          ja: の一種であるの審査済み正例
        scenario_id: null
        descriptions:
