source_claims:
  - id: claim-protocol-trust-mapping-001
    source: eng-proto-a2a-spec
    supports: ProtocolTrustMapping also covers A2A AgentCard securitySchemes and securityRequirements, which describe how a peer is secured but do not themselves establish local trust. The canonical TrustBoundary and parent placement are Moonweave decisions.
    locator: A2A Specification 1.0.0 > AgentCard > securitySchemes and securityRequirements
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-trust-mapping-002
    source: eng-proto-mcp-auth
    supports: ProtocolTrustMapping is grounded in MCP authorization's protected-resource metadata, authorization-server discovery, scopes, and resource indicators. Translating a crossed security boundary into TrustBoundary, an issued subject-resource authorization into AuthorizationGrant, and its action-resource extent into PermissionScope while excluding credential values is a Moonweave ontology mapping.
    locator: Authorization specification > Protected resources, authorization servers, scopes, and resource indicators
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-trust-mapping-003
    source: eng-proto-mcp-auth
    supports: ProtocolTrustMapping-example-positive-001 uses MCP protected-resource metadata to bind the protected resource URI to authorization-server metadata rather than trusting an arbitrary issuer string.
    locator: Authorization specification > Protected resource metadata and authorization server discovery
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-trust-mapping-004
    source: eng-proto-mcp-auth
    supports: ProtocolTrustMapping-example-positive-001 requires an OAuth resource indicator and records scopes because MCP authorization is resource-bound; token or secret values are deliberately excluded from ontology data.
    locator: Authorization specification > Resource indicators, access tokens, and scope handling
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-trust-mapping-005
    source: eng-proto-mcp-2025-spec
    supports: ProtocolTrustMapping-example-boundary-001 distinguishes an MCP server's tools capability declaration from authorization because capability negotiation only advertises supported protocol features.
    locator: MCP Specification 2025-11-25 > Basic > Lifecycle > Capability negotiation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-trust-mapping-006
    source: eng-proto-mcp-auth
    supports: ProtocolTrustMapping-example-boundary-001 requires separate protected-resource metadata, token audience/resource, scope, and host policy before an authorized trust crossing can be asserted.
    locator: Authorization specification > Authorization flow, protected-resource metadata, and resource indicators
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-trust-mapping-007
    source: eng-proto-mcp-auth
    supports: ProtocolTrustMapping-example-instance-001 pins source_construct to protected-resource metadata and external_version to MCP-2025-11-25 rather than retaining an unrelated A2A Task placeholder.
    locator: Authorization specification > Protected-resource metadata document
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-trust-mapping-008
    source: eng-proto-mcp-auth
    supports: ProtocolTrustMapping-example-instance-001 marks the mapping lossy because protocol metadata cannot encode the full local consent, least-privilege, credential-storage, and revocation policy of a Moonweave TrustBoundary.
    locator: Authorization specification > Security considerations and implementation requirements
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-trust-mapping-009
    source: eng-proto-a2a-spec
    supports: A2A Agent Cards list operational capabilities and skills independently from securitySchemes and security requirements. Discovering that an endpoint supports streaming or a skill does not authorize a caller, and successful authentication does not create that capability. This protocol separation supports distinct capability and trust mappings.
    locator: Specification > Core concepts, Agent Card, Message, Task, and Artifact
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-trust-mapping-010
    source: eng-proto-a2a-spec
    supports: A2A defines security schemes, authentication responsibilities, server identity verification, and authorization scoping. Those constructs support ProtocolTrustMapping as the ProtocolMapping subtype for protocol identities, credentials, security schemes, and authority boundaries.
    locator: A2A v1.0 §4.5 Security Objects and §7 Authentication and Authorization
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-protocol-trust-mapping-011
    source: eng-proto-a2a-spec
    supports: A2A requires clients to verify server identity, use authenticated transports, and apply authorization to requested resources. These requirements support mapping a protocol trust profile to a TrustBoundary separating independently administered participants.
    locator: A2A v1.0 §7.1 Protocol Security and §7.2 Server Identity Verification
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
