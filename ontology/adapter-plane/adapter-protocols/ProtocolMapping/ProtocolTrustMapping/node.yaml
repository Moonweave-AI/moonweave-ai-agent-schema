schema: moonweave.ai/ontology-node/v1
id: ProtocolTrustMapping
kind: concept
status: accepted
labels:
  zh: 协议信任映射
  en: protocol trust mapping
  ja: プロトコル信頼写像
semantics:
  short_definition:
    zh: 协议信任映射是把协议认证、授权和安全边界元数据转换为 TrustBoundary 等规范安全概念的协议映射。
    en: A protocol trust mapping converts protocol authentication, authorization, and security-boundary metadata into canonical security concepts such as TrustBoundary.
    ja: プロトコル信頼写像は、認証・認可・安全境界メタデータを TrustBoundary などの canonical セキュリティ Concept へ変換する ProtocolMapping です。
  definition:
    zh: 协议信任映射是一类 ProtocolMapping；其种差是解释协议中的身份主体、认证方式、授权服务器或受保护资源元数据、令牌受众、scope、安全要求及不透明对端边界，并把这些构造有条件地对齐到 TrustBoundary、AuthorizationGrant 与 PermissionScope。TrustBoundary 表示跨越的安全边界，AuthorizationGrant 表示向特定主体、资源与有效期签发的授权事实，PermissionScope 表示被允许或被要求的操作—资源范围。规则必须区分身份、认证、能力和授权，记录发行者、受众、资源、凭据来源及本地策略未覆盖之处；它不保存秘密或令牌值，也不从能力声明、名称字符串或网络连通性推断信任。
    en: A ProtocolTrustMapping is a ProtocolMapping distinguished by interpreting protocol identity principals, authentication methods, authorization-server or protected-resource metadata, token audiences, scopes, security requirements, and opaque-peer boundaries, then conditionally aligning those constructs with TrustBoundary, AuthorizationGrant, and PermissionScope. TrustBoundary identifies the crossed security boundary; AuthorizationGrant records authorization issued for a particular subject, resource, and validity interval; PermissionScope identifies the permitted or required action-resource range. The mapping distinguishes identity, authentication, capability, and authorization and records issuer, audience, resource, credential source, and gaps left to local policy. It stores no secret or token value and infers no trust from a capability declaration, name string, or network reachability.
    ja: ProtocolTrustMapping は ProtocolMapping の一種で、プロトコル上の主体、認証方式、認可サーバーまたは保護リソースの metadata、token audience、scope、安全要件、不透明な対端境界を解釈し、それらを TrustBoundary、AuthorizationGrant、PermissionScope に条件付きで対応付ける点が種差である。TrustBoundary は越える安全境界、AuthorizationGrant は特定の主体・resource・有効期間に対して発行された認可事実、PermissionScope は許可または要求される操作と resource の範囲を表す。識別・認証・能力・認可を区別し、issuer、audience、resource、資格情報源、ローカル方針の空白を記録する。秘密や token 値は保存せず、能力宣言・名称・到達可能性から信頼を推論しない。
  why_needed:
    zh: 协议里“能做什么”和“被允许做什么”经常同时出现却绝不等价。该层强制保存资源受众、scope、发行者与本地策略边界，避免因发现了服务器、工具或智能体卡片就默认建立信任。
    en: What an endpoint can do and what it is authorized to do often coexist in protocol metadata but are never equivalent. This layer preserves resource audience, scope, issuer, and local-policy boundaries so discovering a server, tool, or AgentCard does not silently establish trust.
    ja: 「できること」と「許可されたこと」は併存しても同値ではありません。この層で resource audience、scope、issuer、ローカル方針境界を保持し、サーバー・ツール・AgentCard 発見から信頼を自動生成しません。
  includes:
    - zh: 纳入 MCP HTTP 授权的 protected resource metadata、authorization server、resource indicator 与 scope，或 A2A AgentCard securitySchemes/securityRequirements 到规范安全边界的版本化规则；必须声明传输和本地策略前提。
      en: Includes versioned rules from MCP HTTP authorization protected-resource metadata, authorization servers, resource indicators, and scopes, or A2A AgentCard securitySchemes/securityRequirements, to canonical security boundaries, with transport and local-policy preconditions explicit.
      ja: MCP HTTP 認可の protected resource metadata、authorization server、resource indicator、scope、または A2A AgentCard securitySchemes/securityRequirements から安全境界への版付き規則を、transport とローカル方針前提を明示して含みます。
  excludes:
    - zh: 不纳入明文凭据、访问令牌或密钥值、单纯 Actor 名称、AgentCard URL、tools 能力声明、网络会话或一次授权活动；认证成功、能力存在和授权范围必须分别建模。
      en: Excludes plaintext credentials, access-token or key values, bare Actor names, AgentCard URLs, tools capability declarations, network sessions, and individual authorization activities. Successful authentication, capability availability, and authorization scope remain distinct.
      ja: 平文資格情報、access token／key 値、Actor 名、AgentCard URL、tools 能力宣言、ネットワークセッション、個別認可活動は含みません。認証成功、能力存在、認可範囲を分離します。
  semantic_kind: specification
  aliases: []
