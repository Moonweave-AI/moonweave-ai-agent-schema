sibling_differentiation:
  - sibling_concept_id: ProtocolCapabilityMapping
    shared_parent_concept_id: ProtocolMapping
    differentia:
      zh: ProtocolTrustMapping 说明谁在什么受众、资源与 scope 条件下被允许跨越边界；ProtocolCapabilityMapping 说明端点声明支持什么操作。capabilities.tools 可以存在而未授权任何调用，认证成功也不自动创造工具能力。
      en: ProtocolTrustMapping states who may cross a boundary under which audience, resource, and scope. ProtocolCapabilityMapping states which operations an endpoint advertises. capabilities.tools can exist without authorizing any call, and successful authentication does not create tool capability.
      ja: ProtocolTrustMapping は audience・resource・scope 下の境界許可、ProtocolCapabilityMapping は宣言操作を扱います。capabilities.tools は呼出し認可なしでも存在し、認証成功もツール能力を生成しません。
    source_claims:
      - claim-protocol-trust-mapping-009
