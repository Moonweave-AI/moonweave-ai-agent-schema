  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ProtocolTrustMapping-example-positive-001
    kind: positive
    labels:
      zh: 协议信任映射正例
      en: Positive example of protocol trust mapping
      ja: プロトコル信頼写像の正例
    scenario_id: null
    descriptions:
      zh: mapping-mcp-2025-protected-resource 将 MCP HTTP protected resource metadata 中的 resource URI、authorization_servers 与 scopes_supported 映射到 TrustBoundary 和 PermissionScope 细节；客户端 token 还必须带正确的 resource indicator，才能进一步核验相应 AuthorizationGrant。令牌值不入图，本地同意与最小权限策略仍由主机决定，因此规则为 lossy。
      en: mapping-mcp-2025-protected-resource maps the MCP HTTP protected-resource metadata resource URI, authorization_servers, and scopes_supported to TrustBoundary and PermissionScope detail; the client's token must also carry the correct resource indicator before a corresponding AuthorizationGrant can be validated. Token values never enter the graph, and host consent and least-privilege policy remain local, so the rule is lossy.
      ja: mapping-mcp-2025-protected-resource は MCP HTTP protected resource metadata の resource URI、authorization_servers、scopes_supported を TrustBoundary と PermissionScope の詳細へ写像する。対応する AuthorizationGrant を検証するには、client token が正しい resource indicator を持たなければならない。token 値は格納せず、同意と最小権限は host 方針に残るため、この規則は lossy である。
    field_values:
      mapping_rule_id: mapping-rule-mcp-protected-resource
      version: "3"
      source_construct: mcp:ProtectedResourceMetadata
      target_construct: moonweave:TrustBoundary
      direction: source-to-target
      mapping_kind: lossy
      valid_from: 2026-07-13T06:00:00.000Z
      mapping_id: mapping-mcp-2025-protected-resource
      external_version: MCP-2025-11-25
      loss_kind: lossy
    related_node_ids:
      - ProtocolTrustMapping
      - TrustBoundary
      - PermissionScope
      - AuthorizationGrant
    related_relation_ids:
      - ProtocolTrustMapping-maps_to-TrustBoundary
    expected_result:
      zh: 规则归入 ProtocolTrustMapping 并指向 TrustBoundary；资源、发行方与 scope 可审计，秘密和令牌值不被复制，主机策略缺口明确保留。
      en: The rule is a ProtocolTrustMapping to TrustBoundary; resource, issuer, and scope are auditable, secrets and token values are not copied, and host-policy gaps remain explicit.
      ja: 規則は TrustBoundary への ProtocolTrustMapping となり、resource・issuer・scope を監査可能にし、秘密／token 値を複製せずホスト方針の空白を明示します。
    why_valid_or_invalid:
      zh: 该例同时约束受保护资源、授权服务器、scope、令牌受众和本地策略，且严格排除凭据值；这才是安全边界映射，而不是简单复制一个身份字符串。
      en: The case jointly constrains protected resource, authorization server, scope, token audience, and local policy while strictly excluding credential values; this is a security-boundary mapping, not identity-string copying.
      ja: 保護 resource、認可サーバー、scope、token audience、ローカル方針を共同制約し、資格値を除外するため、安全境界写像であり識別文字列の複製ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-protocol-trust-mapping-003
      - claim-protocol-trust-mapping-004
  - id: ProtocolTrustMapping-example-boundary-001
    kind: boundary
    labels:
      zh: 协议信任映射边界例
      en: Boundary case for protocol trust mapping
      ja: プロトコル信頼写像の境界例
    scenario_id: null
    descriptions:
      zh: MCP 服务器在 initialize 中声明 capabilities.tools，随后 tools/list 可列出工具。该声明只证明协议操作可用；在没有受保护资源元数据、有效 token audience/scope、主机同意与本地策略决定时，不能据此建立 TrustBoundary 或授权调用。
      en: An MCP server declares capabilities.tools during initialize and later exposes tools/list. This proves protocol operations are available; without protected-resource metadata, valid token audience and scope, host consent, and local policy, it establishes neither TrustBoundary nor authorization to call.
      ja: MCP サーバーの capabilities.tools と tools/list は操作可用性を示すだけです。protected-resource metadata、正しい token audience／scope、ホスト同意、ローカル方針なしに TrustBoundary や呼出し認可を成立させません。
    field_values: {}
    related_node_ids:
      - ProtocolTrustMapping
      - TrustBoundary
      - ProtocolCapabilityMapping
    related_relation_ids:
      - ProtocolTrustMapping-maps_to-TrustBoundary
    expected_result:
      zh: tools 声明保持 ProtocolCapabilityMapping 语义，不生成 TrustBoundary、AuthorizationGrant、PermissionScope 或授权结论。
      en: The tools declaration remains ProtocolCapabilityMapping semantics and produces no TrustBoundary, AuthorizationGrant, PermissionScope, or authorization conclusion.
      ja: tools 宣言は ProtocolCapabilityMapping の意味を保ち、TrustBoundary、AuthorizationGrant、PermissionScope、認可結論を生成しない。
    why_valid_or_invalid:
      zh: 能力、认证和授权是三个不同判据：可调用接口不证明请求者身份，身份验证也不自动授予目标资源的 scope。
      en: "Capability, authentication, and authorization are distinct criteria: an available interface does not prove requester identity, and authenticated identity does not automatically grant scope on the target resource."
      ja: 能力・認証・認可は別基準であり、利用可能 interface は要求者識別を証明せず、認証済み識別も対象 resource の scope を自動付与しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-protocol-trust-mapping-005
      - claim-protocol-trust-mapping-006
  - id: ProtocolTrustMapping-example-instance-001
    kind: instance
    labels:
      zh: 协议信任映射结构化实例
      en: Structured instance of protocol trust mapping
      ja: プロトコル信頼写像の構造化インスタンス
    scenario_id: null
    descriptions:
      zh: mapping-mcp-2025-protected-resource 的节点内记录给出 MCP-2025-11-25、ProtectedResourceMetadata、TrustBoundary、source-to-target 与 lossy，并声明不保存 token/secret 值。
      en: The inline mapping-mcp-2025-protected-resource record specifies MCP-2025-11-25, ProtectedResourceMetadata, TrustBoundary, source-to-target, lossy, and a prohibition on storing token or secret values.
      ja: mapping-mcp-2025-protected-resource のノード内記録は MCP-2025-11-25、ProtectedResourceMetadata、TrustBoundary、source-to-target、lossy、token／secret 値非保存を示します。
    field_values:
      mapping_rule_id: mapping-rule-mcp-protected-resource
      version: "3"
      source_construct: mcp:ProtectedResourceMetadata
      target_construct: moonweave:TrustBoundary
      direction: source-to-target
      mapping_kind: lossy
      valid_from: 2026-07-13T06:00:00.000Z
      mapping_id: mapping-mcp-2025-protected-resource
      external_version: MCP-2025-11-25
      loss_kind: lossy
    related_node_ids:
      - ProtocolTrustMapping
    related_relation_ids: []
    expected_result:
      zh: 记录通过映射字段约束，源/目标、版本、方向与损失均指向授权边界而非任务占位。
      en: The record satisfies mapping fields, and source/target, revision, direction, and loss all concern authorization boundaries rather than task placeholders.
      ja: 記録は規則項目を満たし、源／対象、版、方向、損失が Task 仮値でなく認可境界を指します。
    why_valid_or_invalid:
      zh: 字段不含任何凭据值，lossy 对应本地同意/策略无法从协议元数据完整恢复。
      en: No field contains a credential value, and lossy reflects that local consent and policy cannot be reconstructed fully from protocol metadata.
      ja: 資格値を含まず、lossy はローカル同意／方針をメタデータから完全復元できないことに対応します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-protocol-trust-mapping-007
      - claim-protocol-trust-mapping-008
