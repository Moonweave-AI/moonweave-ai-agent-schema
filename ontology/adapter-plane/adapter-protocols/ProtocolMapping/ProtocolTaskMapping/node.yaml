    en: "protocol task mapping is a kind of protocol mapping. Reviewed differentia: ProtocolTaskMapping specializes ProtocolMapping by aligning protocol task state, artifacts, and completion/failure semantics."
    ja: プロトコルタスク写像 は プロトコル写像規則 の一種です。審査済みの種差：ProtocolTaskMapping はプロトコルのタスク状態・成果物・完了／失敗意味を整合する ProtocolMapping です。
