          zh: 拒绝该规则作为完整协议任务映射，并报告生命周期语义丢失。
          en: Reject the rule as a complete protocol-task mapping and report lost lifecycle semantics.
          ja: 完全なプロトコルタスク写像として拒否し、ライフサイクル意味の損失を報告します。
        why_valid_or_invalid:
