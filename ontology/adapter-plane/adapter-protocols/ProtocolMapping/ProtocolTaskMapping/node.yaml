relations:
  - id: ProtocolTaskMapping-maps_to-Execution
    predicate: maps_to
    direction: source-to-target
    relation_kind: mapping
    labels:
      zh: 映射到执行
      en: maps to execution
      ja: 実行へ写像する
    definitions:
      zh: ProtocolTaskMapping —maps_to→ Execution 表示该协议规则把一个有状态任务生命周期的身份、状态、上下文、历史和产物谱系转换为运行活动及其关联记录；它不把协议 Task 直接认作结果导向规范 Task。
      en: ProtocolTaskMapping —maps_to→ Execution means that the protocol rule converts a stateful task lifecycle's identity, status, context, history, and artifact lineage into a runtime activity and linked records; it does not identify the protocol Task directly with the outcome-oriented specification Task.
      ja: ProtocolTaskMapping —maps_to→ Execution は、状態付きタスク・ライフサイクルの識別子・状態・context・履歴・成果物系譜を実行活動と関連記録へ変換し、プロトコル Task を結果指向仕様 Task と直接同一視しないことを示します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_execution_target_of_protocol_task_mapping
      labels:
        zh: 是协议任务映射的执行目标
        en: is execution target of protocol task mapping
        ja: プロトコルタスク写像の実行対象である
    conditions: []
    temporal_scope: timeless
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: ProtocolTaskMapping 仍由 adapter-plane 拥有，Task 仍由 orchestration-plane 拥有；该 mapping 事实只建立跨域依赖，不转移规范所有权。运行时授权必须由具体 PolicyDecision、AuthorizationGrant 或协议会话证明。
        en: ProtocolTaskMapping remains owned by adapter-plane and Task by orchestration-plane; this mapping fact establishes a cross-Domain dependency without transferring canonical ownership. Runtime authority must be evidenced by a concrete PolicyDecision, AuthorizationGrant, or protocol session.
        ja: ProtocolTaskMapping は adapter-plane、Task は orchestration-plane に引き続き所有されます。この mapping 事実は正規所有権を移さずドメイン横断依存だけを表し、実行時権限には具体的な PolicyDecision、AuthorizationGrant、またはプロトコルセッションの証拠が必要です。
      protocol_or_resource_context:
        zh: 查询必须沿 ProtocolTaskMapping → Task 的 canonical ID 与该关系自身的来源主张执行；协议版本、资源标识和信任判定保留在两端节点的信息合同中。
        en: Queries follow the canonical ProtocolTaskMapping → Task assertion and this relation's own source claims; protocol version, resource identity, and trust decisions remain in the endpoint information contracts.
        ja: 問い合わせは ProtocolTaskMapping → Task の canonical ID と当該関係固有の出典主張に従います。プロトコル版、資源識別、信頼判断は両端ノードの情報契約に保持されます。
    constraints: []
    examples:
