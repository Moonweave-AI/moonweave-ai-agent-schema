          en: Boundary for protocol-task-to-execution mapping
          ja: プロトコルタスクから実行への写像境界例
        scenario_id: null
        descriptions:
          zh: 规则只把 A2A id 复制到 task_specification_id，并丢弃 status、history、contextId 与 Artifact。
          en: A rule merely copies A2A id into task_specification_id and drops status, history, contextId, and Artifacts.
          ja: 規則が A2A id を task_specification_id へ複製するだけで、status・history・contextId・Artifact を捨てます。
        field_values: {}
