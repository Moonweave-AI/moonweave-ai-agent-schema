          en: The protocol id identifies one stateful work unit, not an execution-independent Task specification, and the remaining lifecycle fields cannot be silently discarded.
          ja: プロトコル id は一つの状態付き作業単位を識別し、実行独立 Task 仕様 ID ではなく、残りのライフサイクル項目も黙って破棄できないためです。
