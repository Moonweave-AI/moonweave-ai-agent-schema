schema: moonweave.ai/ontology-node/v1
id: ProtocolTaskMapping
kind: concept
status: accepted
labels:
  zh: 协议任务映射
  en: protocol task mapping
  ja: プロトコルタスク写像
semantics:
  short_definition:
    zh: 协议任务映射把有状态协议工作单元转换为 Execution 及其运行关联信息。
    en: A protocol task mapping converts a stateful protocol work unit into Execution and linked runtime information.
    ja: プロトコルタスク写像は、状態付きプロトコル作業単位を Execution と関連実行情報へ変換します。
  definition:
    zh: ProtocolTaskMapping 是一种 ProtocolMapping，其种差是源构造具有协议任务 ID、生命周期状态、上下文关联、输入请求、取消、结果/Artifact 与历史，并把这组运行身份映射到 Execution、RuntimeSession、RunOutcome、Message、Artifact 与可观察记录。它只有在协议扩展或外部绑定提供明确 task_specification_id 时，才另建 Execution-realizes-Task；它不把 A2A 的有状态 Task 直接归类为 Moonweave 的结果导向 Task 规范，也不假定 MCP 实验性请求 Task 与 A2A 对等智能体 Task 共享同一映射。
    en: A ProtocolTaskMapping is a ProtocolMapping whose source has protocol task ID, lifecycle state, context correlation, input requests, cancellation, results or Artifacts, and history and maps that runtime identity to Execution, RuntimeSession, RunOutcome, Message, Artifact, and observability records. It creates Execution-realizes-Task only when a protocol extension or external binding supplies an explicit task_specification_id. It does not classify A2A's stateful Task directly as Moonweave's outcome-oriented Task specification, nor presume that MCP's experimental request Task and A2A's peer-agent Task share one mapping.
    ja: ProtocolTaskMapping は、プロトコル Task ID、ライフサイクル状態、context 相関、入力要求、取消し、結果／Artifact、履歴を持つ源構造を Execution、RuntimeSession、RunOutcome、Message、Artifact、観測記録へ写像する ProtocolMapping です。プロトコル拡張または外部束縛が明示的 task_specification_id を与える場合だけ Execution-realizes-Task を作ります。A2A の状態付き Task を Moonweave の結果指向 Task 仕様へ直接分類せず、MCP の実験的要求 Task と A2A の対等エージェント Task が同一写像を共有するとも仮定しません。
  why_needed:
    zh: 该边界避免把协议运行状态写入核心任务规范，同时仍完整保留远端任务的生命周期、产物和可选规范谱系。
    en: This boundary prevents protocol runtime state from entering the core Task specification while retaining the remote work unit's lifecycle, artifacts, and optional specification lineage.
    ja: この境界により、プロトコル実行状態をコア Task 仕様へ混入させず、遠隔作業単位のライフサイクル・成果物・任意仕様系譜を保持します。
  includes:
    - zh: 任务 ID、contextId、TaskStatus、history、输入请求、取消、Part 与 Artifact 的逐字段转换，以及 task_specification_id 存在时的规范链接规则。
      en: Field-level conversion for task ID, contextId, TaskStatus, history, input requests, cancellation, Parts, and Artifacts plus the specification-link rule when task_specification_id exists.
      ja: Task ID、contextId、TaskStatus、history、入力要求、取消し、Part、Artifact の項目変換と、task_specification_id がある場合の仕様リンク規則を含みます。
  excludes:
    - zh: 协议 Message 映射、工具调用映射、能力广告、一次适配器转换活动，以及把状态/历史/Artifact 字段塞入 Moonweave Task 的直接同一化。
      en: Protocol Message mapping, tool-call mapping, capability advertisement, one adapter conversion activity, and direct identity mapping that places state, history, or Artifact fields on Moonweave Task.
      ja: プロトコル Message 写像、ツール呼出し写像、能力広告、一回のアダプタ変換活動、状態・履歴・Artifact を Moonweave Task へ入れる直接同一化を除外します。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ProtocolTaskMapping-example-positive-manual-001
    kind: positive
    labels:
      zh: 协议任务生命周期映射正例
      en: Positive protocol-task lifecycle mapping
      ja: プロトコルタスク・ライフサイクル写像の正例
    scenario_id: null
    descriptions:
      zh: mapping-a2a-1-0-task-lifecycle 把 A2A Task 的 id、contextId、status、history 和 Artifacts 转换为 Execution 及其 RuntimeSession、可观察记录和 Artifact 谱系；输入扩展还给出 task_specification_id，因此额外建立 Execution-realizes-Task。
      en: mapping-a2a-1-0-task-lifecycle converts A2A Task id, contextId, status, history, and Artifacts into Execution with its RuntimeSession, observability records, and Artifact lineage. The input extension also supplies task_specification_id, so Execution-realizes-Task is additionally created.
      ja: mapping-a2a-1-0-task-lifecycle は A2A Task の id、contextId、status、history、Artifacts を Execution と RuntimeSession・観測記録・Artifact 系譜へ変換します。入力拡張に task_specification_id もあるため Execution-realizes-Task を追加作成します。
    field_values:
      mapping_rule_id: mapping-rule-a2a-task-lifecycle
      version: "4"
      source_construct: a2a:Task
      target_construct: moonweave:Execution
      direction: source-to-target
      mapping_kind: lossy
      valid_from: 2026-07-15T00:00:00.000Z
      mapping_id: mapping-a2a-1-0-task-lifecycle
      external_version: A2A-1.0.0
      loss_kind: lossy
    related_node_ids:
      - ProtocolTaskMapping
      - Execution
      - Task
    related_relation_ids:
      - ProtocolTaskMapping-maps_to-Execution
      - Execution-realizes-Task
    expected_result:
      zh: 主映射目标为 Execution；Task 只通过可验证的规范标识被单独引用。
      en: The primary mapping target is Execution; Task is referenced separately only through a verifiable specification identifier.
      ja: 主写像対象は Execution で、Task は検証可能な仕様識別子により別途参照されます。
    why_valid_or_invalid:
      zh: 生命周期字段、历史和产物属于一次远端运行，而显式 task_specification_id 足以建立独立规范谱系。
      en: Lifecycle fields, history, and artifacts belong to one remote runtime object, while explicit task_specification_id is sufficient to establish separate specification lineage.
      ja: ライフサイクル項目・履歴・成果物は一つの遠隔実行対象に属し、明示的 task_specification_id が独立仕様系譜を成立させるためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-protocol-task-mapping-002
  - id: ProtocolTaskMapping-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 协议任务生命周期映射边界例
      en: Boundary for protocol-task lifecycle mapping
      ja: プロトコルタスク・ライフサイクル写像の境界例
    scenario_id: null
    descriptions:
      zh: MCP 2025-11-25 实验性 Task 为 tools/call 请求增加 taskId、轮询、取消和结果提取；它属于请求方/接收方的持久请求语义，不能仅凭 Task 名称套用 A2A 对等智能体的 history、Artifact 与 contextId 转换。
      en: The experimental MCP 2025-11-25 Task adds taskId, polling, cancellation, and result retrieval to a tools/call request. It belongs to durable requestor/receiver semantics and cannot inherit A2A peer-agent history, Artifact, and contextId conversion merely from the name Task.
      ja: MCP 2025-11-25 の実験的 Task は tools/call 要求へ taskId・polling・取消し・結果取得を追加する持続要求意味であり、Task という名称だけで A2A 対等エージェントの history・Artifact・contextId 変換を適用できません。
    field_values: {}
    related_node_ids:
      - ProtocolTaskMapping
      - Execution
    related_relation_ids:
      - ProtocolTaskMapping-maps_to-Execution
    expected_result:
      zh: 为 MCP Task 建立独立版本化映射；不得复用 A2A 映射条件。
      en: Create a separately versioned mapping for MCP Task and do not reuse A2A mapping conditions.
      ja: MCP Task 用に別版管理写像を作り、A2A 写像条件を再利用しません。
    why_valid_or_invalid:
      zh: 两种协议任务的参与者模型、父请求、状态语义和产物模型不同，名称相同不足以证明结构同一。
      en: The two protocol tasks differ in participant model, parent request, lifecycle semantics, and product model; a shared name does not establish structural identity.
      ja: 二つのプロトコル Task は参加者モデル・親要求・ライフサイクル意味・成果物モデルが異なり、同名だけで構造同一性を証明できないためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-protocol-task-mapping-003
external_mappings: []
applicability:
  - adapter
sibling_differentiation:
  - sibling_concept_id: ProtocolTrustMapping
    shared_parent_concept_id: ProtocolMapping
    differentia:
      zh: ProtocolTaskMapping 处理任务身份、状态转换、取消和结果；ProtocolTrustMapping 处理主体、受保护资源、发行者、受众、scope 与本地策略。auth-required 是任务状态，但其出现只触发安全流程，不等于已经完成信任映射。
      en: ProtocolTaskMapping handles task identity, transitions, cancellation, and results. ProtocolTrustMapping handles principal, protected resource, issuer, audience, scope, and local policy. auth-required is a task state that triggers security handling; it does not mean trust mapping is complete.
      ja: ProtocolTaskMapping は Task 識別・遷移・取消し・結果、ProtocolTrustMapping は主体・保護 resource・issuer・audience・scope・方針を扱います。auth-required は安全処理を促す状態で、信頼写像完了ではありません。
    source_claims:
      - claim-protocol-task-mapping-004
