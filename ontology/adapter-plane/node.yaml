schema: moonweave.ai/ontology-node/v1
id: adapter-plane
kind: domain
status: accepted
labels:
  en: Interoperability & Adapter Domain
  zh: 互操作适配域
  ja: 相互運用とアダプタドメイン
semantics:
  short_definition:
    en: Interoperability & Adapter Domain is an operational concern domain that acts as the adapter membrane for external protocols, frameworks, benchmarks, statecharts, schema profiles, semantic exports, language profiles, Graph IR, and frontend views. It records directional mappings between external constructs and canonical ontology terms, preserves source and version provenance, surfaces conversion loss or unsupported semantics, and prevents adapter-specific fields from redefining ontology core.
    zh: 互操作适配域是八个运行关注域之一，承担外部协议、框架、基准、状态图、模式剖面、语义导出、语言剖面、图谱中间表示和前端视图进入规范本体前的适配膜职责。它记录外部构造与规范术语之间的映射方向，保留来源和版本溯源，暴露转换损失或不支持语义，并防止适配器专属字段重定义核心本体。
    ja: 相互運用とアダプタドメインは八つの運用関心領域の一つであり、外部プロトコル、フレームワーク、ベンチマーク、状態図、スキーマプロファイル、意味論的エクスポート、言語プロファイル、グラフ中間表現、フロントエンドビューを標準オントロジーへ入れる前のアダプタ膜として働きます。外部構成と標準用語の写像方向、出典と版の来歴、変換損失や未対応意味を記録し、アダプタ固有フィールドがコア本体を再定義しないようにします。
  definition:
    en: Interoperability & Adapter Domain is an operational concern domain that acts as the adapter membrane for external protocols, frameworks, benchmarks, statecharts, schema profiles, semantic exports, language profiles, Graph IR, and frontend views. It records directional mappings between external constructs and canonical ontology terms, preserves source and version provenance, surfaces conversion loss or unsupported semantics, and prevents adapter-specific fields from redefining ontology core.
    zh: 互操作适配域是八个运行关注域之一，承担外部协议、框架、基准、状态图、模式剖面、语义导出、语言剖面、图谱中间表示和前端视图进入规范本体前的适配膜职责。它记录外部构造与规范术语之间的映射方向，保留来源和版本溯源，暴露转换损失或不支持语义，并防止适配器专属字段重定义核心本体。
    ja: 相互運用とアダプタドメインは八つの運用関心領域の一つであり、外部プロトコル、フレームワーク、ベンチマーク、状態図、スキーマプロファイル、意味論的エクスポート、言語プロファイル、グラフ中間表現、フロントエンドビューを標準オントロジーへ入れる前のアダプタ膜として働きます。外部構成と標準用語の写像方向、出典と版の来歴、変換損失や未対応意味を記録し、アダプタ固有フィールドがコア本体を再定義しないようにします。
  why_needed:
    zh: 把外部协议、框架、基准、状态图和模式投影到同一核心语义。
    en: Projects external protocols, frameworks, benchmarks, statecharts, and schemas onto one core semantics.
    ja: 外部プロトコル、フレームワーク、ベンチマーク、状態図、スキーマを一つの中核意味へ投影します。
  includes:
    - zh: "适配域负责映射规则与验证（owner: adapter-mapping-infrastructure）以及协议映射（owner: adapter-protocols），显式记录外部标识、方向、损失和一致性检查如何对应核心本体。"
      en: "Adapter owns Mapping rules and validation (owner: adapter-mapping-infrastructure) and Protocol mappings (owner: adapter-protocols), explicitly recording how external identifiers, direction, loss, and conformance checks correspond to the core ontology."
      ja: "適配ドメインは写像規則と検証（owner: adapter-mapping-infrastructure）およびプロトコル写像（owner: adapter-protocols）を所有し、外部識別子・方向・損失・適合性検査と中核本体の対応を明示します。"
    - zh: "适配域还负责模式导出（owner: adapter-schema-export），把已审查的核心概念、字段与约束投影为目标模式产物，并明确无法无损表达的部分。"
      en: "Adapter also owns Schema exports (owner: adapter-schema-export), projecting reviewed core concepts, fields, and constraints into target-schema artifacts while declaring what cannot be represented without loss."
      ja: "適配ドメインはスキーマ出力（owner: adapter-schema-export）も所有し、審査済みの中核概念・フィールド・制約を対象スキーマ成果物へ投影し、無損失で表現できない部分を明示します。"
  excludes:
    - zh: "运行环境与会话（owner: runtime-system）属于运行域，因为它描述真实执行容器与会话身份；适配域可以映射这些对象的外部表示，但不创建或管理运行会话。"
      en: "Runtime environments and sessions (owner: runtime-system) belongs to Runtime because it describes real execution containers and session identity; Adapter may map their external representation but does not create or manage runtime sessions."
      ja: "実行環境とセッション（owner: runtime-system）は実在する実行コンテナとセッション同一性を記述するため実行ドメインに属します。適配は外部表現を写像できますがセッションを生成・管理しません。"
    - zh: "评估与测量（owner: feedback-metrics-evaluation）属于反馈域，因为它拥有评价目标、测量值和通过阈值；适配域只映射外部基准或结果格式，不改变评价语义。"
      en: "The evaluation and measurement module (owner: feedback-metrics-evaluation) belongs to Feedback because it owns evaluation targets, measurement values, and pass thresholds; Adapter maps external benchmarks or result formats without changing evaluation semantics."
      ja: "評価と測定（owner: feedback-metrics-evaluation）は評価対象・測定値・合格閾値を所有するためフィードバックドメインに属します。適配は外部ベンチマークや結果形式を写像しますが評価意味を変更しません。"
  semantic_kind: null
  aliases: []
purpose:
  zh: 把外部协议、框架、基准、状态图和模式投影到同一核心语义。
  en: Projects external protocols, frameworks, benchmarks, statecharts, and schemas onto one core semantics.
  ja: 外部プロトコル、フレームワーク、ベンチマーク、状態図、スキーマを一つの中核意味へ投影します。
structure: null
examples:
  - id: adapter-plane-example-positive-001
    kind: positive
    labels:
      zh: A2A 任务映射到规范执行语义
      en: An A2A Task maps to canonical execution semantics
      ja: A2A Task を canonical execution semantics へ写像
    scenario_id: null
    descriptions:
      zh: A2A v0.3 的 Agent Card 声明 capability `invoice.lookup`，随后收到 task-a2a-778，状态从 submitted 变为 working 并返回 artifact-a2a-44。A2AAdapter@0.3 把 Agent Card 能力映射到 CapabilityDefinition，把有状态 A2A Task 映射到 Execution，把 Artifact 映射到运行产物；`input-required` 状态没有规范等价物，因此生成 conversion-warning-91，而不创建新的核心类。
      en: An A2A v0.3 Agent Card declares capability invoice.lookup, then task-a2a-778 moves from submitted to working and returns artifact-a2a-44. A2AAdapter@0.3 maps the card capability to CapabilityDefinition, the stateful A2A Task to Execution, and Artifact to a runtime artifact. Because input-required has no exact canonical equivalent, it emits conversion-warning-91 instead of inventing a core class.
      ja: A2A v0.3 Agent Card が invoice.lookup capability を宣言し、task-a2a-778 が submitted から working へ移り artifact-a2a-44 を返します。A2AAdapter@0.3 は card capability を CapabilityDefinition、有状態 A2A Task を Execution、Artifact を runtime artifact へ写像します。input-required に完全同等語がないため core class を作らず conversion-warning-91 を出します。
    field_values:
      adapter_profile: A2AAdapter@0.3
      external_agent_card_id: billing-agent-card@0.3
      external_task_id: task-a2a-778
      external_artifact_id: artifact-a2a-44
      canonical_targets:
        - CapabilityDefinition
        - Execution
        - Artifact
      unmapped_external_state: input-required
      conversion_warning_id: conversion-warning-91
    related_node_ids:
      - adapter-plane
    related_relation_ids: []
    expected_result:
      zh: 导入结果保留外部版本、标识与映射方向，规范图只出现已有核心概念；无法等价转换的状态以明确警告保留，不静默丢失也不污染核心层级。
      en: The import preserves external version, identifiers, and mapping direction. The canonical graph uses existing core concepts, while a non-equivalent state remains an explicit warning rather than being silently dropped or promoted into the core hierarchy.
      ja: import は外部 version・identifier・mapping direction を保持し、canonical graph は既存 core concept のみを使います。同等でない state は明示 warning として残し、黙って失わず core hierarchy に昇格させません。
    why_valid_or_invalid:
      zh: 对象的关键问题是外部协议构造如何对应规范语义、版本差异在哪里以及转换损失如何暴露；它不重新定义 CapabilityDefinition、Execution 或 Artifact 的核心身份。
      en: The governing questions are how external protocol constructs correspond to canonical semantics, which version applies, and where conversion loses meaning. It does not redefine core CapabilityDefinition, Execution, or Artifact identity.
      ja: 中心問題は外部 protocol construct と canonical semantics の対応、適用 version、意味損失の位置であり、CapabilityDefinition・Execution・Artifact の core identity を再定義しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-adapter-plane-003
  - id: adapter-plane-example-boundary-20260717
    kind: boundary
    labels:
      zh: 内部工具定义不是适配器映射
      en: An internal tool definition is not an adapter mapping
      ja: 内部 tool definition は adapter mapping ではない
    scenario_id: null
    descriptions:
      zh: 团队直接在规范注册表中创建 capability-def-tax-rate@2 与 tool-tax-rate@2，输入输出 Schema、权限需求和版本都使用 Moonweave 规范字段；记录没有外部协议、框架、基准或导出剖面，也没有映射或转换损失。
      en: The team creates capability-def-tax-rate@2 and tool-tax-rate@2 directly in the canonical registry using Moonweave input/output schemas, authority requirements, and version fields. No external protocol, framework, benchmark, export profile, mapping, or conversion loss is involved.
      ja: チームは canonical registry に capability-def-tax-rate@2 と tool-tax-rate@2 を Moonweave の入出力 schema・authority requirement・version field で直接作成します。外部 protocol・framework・benchmark・export profile・mapping・conversion loss はありません。
    field_values:
      capability_definition_id: capability-def-tax-rate@2
      tool_id: tool-tax-rate@2
      definition_origin: canonical
      external_mapping_count: 0
      conversion_warning_count: 0
    related_node_ids:
      - adapter-plane
      - tool-plane
    related_relation_ids: []
    expected_result:
      zh: 把能力定义、工具及注册表成员关系归入工具域；除非后来出现外部构造与其之间的版本化映射，否则不创建适配器事实。
      en: Assign the capability definition, tool, and registry membership to Tool; create no adapter fact unless a later versioned mapping to an external construct exists.
      ja: capability definition・tool・registry membership は Tool に置き、後で外部 construct との versioned mapping が生じない限り adapter fact を作りません。
    why_valid_or_invalid:
      zh: “可被外部系统使用”不等于“源自外部语义”；适配域的身份必须包含明确的外部端点、映射版本与方向。
      en: Being usable by an external system does not mean originating in external semantics. Adapter identity requires an explicit external endpoint, mapping version, and direction.
      ja: 外部 system から利用可能であることは外部 semantics 由来を意味しません。Adapter identity には明示 external endpoint・mapping version・direction が必要です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-adapter-plane-004
