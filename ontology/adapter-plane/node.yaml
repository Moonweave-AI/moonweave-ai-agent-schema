source_claims:
  - id: claim-adapter-plane-001
    source: eng-proto-a2a-docs
    supports: A2A Core Concepts defines an external protocol vocabulary with Agent Card, Task, Message, Part, Artifact, actors, and interaction mechanisms, each with its own wire semantics and lifecycle. This directly justifies treating protocol constructs as an external profile that must be mapped rather than silently merged into ontology core. A2A does not define Moonweave adapters for frameworks, benchmarks, statecharts, semantic exports, Graph IR, or frontend views; those wider adapter-plane responsibilities are design inferences.
    locator: A2A Documentation > Core Concepts > Core Actors; Fundamental Communication Elements; Interaction Mechanisms; Agent Cards; Messages and Parts; Artifacts
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-adapter-plane-002
    source: eng-proto-a2a-spec
    supports: The A2A specification defines an external interoperability contract around Agent Cards, Messages, Tasks, Parts, Artifacts, task states, and protocol bindings. These protocol-owned identities and lifecycles justify explicit, directional mappings into canonical ontology terms instead of treating an A2A payload as ontology core. A2A does not define Moonweave's general framework adapters, mapping-loss records, schema exports, Graph IR, or frontend projections; those broader adapter-plane responsibilities are reviewed design inferences.
    locator: Specification > Core Concepts; Agent Card; Message, Part, Task, and Artifact; Protocol Bindings
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-adapter-plane-003
    source: eng-proto-a2a-spec
    supports: The A2A specification defines Agent Cards, Messages, stateful Tasks, task states, and Artifacts. Those versioned external constructs ground explicit mappings and loss reporting without becoming Moonweave core classes.
    locator: Specification > Core concepts > Agent Card, Message, Task lifecycle, and Artifact
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-adapter-plane-004
    source: eng-proto-a2a-docs
    supports: A2A documentation presents protocol-specific actors and communication elements. Their absence is evidence that a native canonical tool definition is not itself an A2A mapping.
    locator: A2A Documentation > Core Concepts > Core actors and communication elements
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
