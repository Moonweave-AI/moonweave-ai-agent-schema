schema: moonweave.ai/ontology-node/v1
id: adapter-frameworks
kind: module
status: review
labels:
  zh: 框架映射
  en: Framework mappings
  ja: フレームワーク写像
semantics:
  short_definition:
    zh: 框架映射描述具名智能体开发框架的某一版本如何把角色、节点、任务、交接、运行和追踪构造对应到规范本体。它拥有依赖特定框架语义的适配能力与映射规则；框架产品名、版本和构造路径保存在节点信息与证据中，不复制成框架产品分类树，也不接管映射后的核心业务事实。
    en: Framework mappings describes how constructs for roles, nodes, tasks, handoffs, runs, and traces in a named version of an agent framework correspond to the canonical ontology. It owns adapters and mapping rules whose meaning depends on that framework; product names, versions, and construct paths remain node information and evidence rather than a copied product taxonomy, and mapped core business facts retain their original owners.
    ja: フレームワーク写像は、特定版のエージェント開発フレームワークにおける役割、ノード、タスク、引継ぎ、実行、トレースの構造を規範本体へ対応付ける方法を記述します。そのフレームワーク意味に依存するアダプターと写像規則を所有しますが、製品名、版、構造経路はノード情報と証拠として保持し、製品分類木を複製せず、写像後の中核業務事実も接管しません。
  definition:
    zh: 框架映射描述具名智能体开发框架的某一版本如何把角色、节点、任务、交接、运行和追踪构造对应到规范本体。它拥有依赖特定框架语义的适配能力与映射规则；框架产品名、版本和构造路径保存在节点信息与证据中，不复制成框架产品分类树，也不接管映射后的核心业务事实。
    en: Framework mappings describes how constructs for roles, nodes, tasks, handoffs, runs, and traces in a named version of an agent framework correspond to the canonical ontology. It owns adapters and mapping rules whose meaning depends on that framework; product names, versions, and construct paths remain node information and evidence rather than a copied product taxonomy, and mapped core business facts retain their original owners.
    ja: フレームワーク写像は、特定版のエージェント開発フレームワークにおける役割、ノード、タスク、引継ぎ、実行、トレースの構造を規範本体へ対応付ける方法を記述します。そのフレームワーク意味に依存するアダプターと写像規則を所有しますが、製品名、版、構造経路はノード情報と証拠として保持し、製品分類木を複製せず、写像後の中核業務事実も接管しません。
  why_needed:
    zh: 在不污染核心层级的前提下，保留框架构造的来源版本、对应方向、适用条件和语义差异。
    en: Preserve source version, mapping direction, applicability conditions, and semantic differences for framework constructs without polluting the core hierarchy.
    ja: 中核階層を汚染せず、フレームワーク構造の出所版、写像方向、適用条件、意味差を保持します。
  includes:
    - zh: 绑定具名框架及版本的 FrameworkAdapter，以及从公开框架构造到核心概念的有向 FrameworkMapping。
      en: FrameworkAdapters bound to a named framework and version, and directional FrameworkMappings from public framework constructs to core concepts.
      ja: 名称付きフレームワークと版に束縛された FrameworkAdapter、および公開構造から中核概念への有向 FrameworkMapping を含みます。
    - zh: 框架特有字段、生命周期、组合、控制交接和追踪语义与核心 Role、Task、Run、Handoff、Trace 之间的等价、近似或缺失记录。
      en: Equivalence, approximation, or gap records between framework-specific fields, lifecycles, composition, control handoffs, and tracing semantics and core Role, Task, Run, Handoff, and Trace concepts.
      ja: フレームワーク固有の項目、ライフサイクル、構成、制御引継ぎ、追跡意味と、中核 Role、Task、Run、Handoff、Trace の等価・近似・欠落記録を含みます。
  excludes:
    - zh: 框架完整类树、私有实现、源码文件和运行实例不在此重建；产品名称、官方文档和版本只是适配器信息与证据。
      en: Complete framework class trees, private implementations, source files, and runtime instances are not reconstructed; product names, official documents, and versions are adapter information and evidence.
      ja: 完全なクラス木、非公開実装、ソースファイル、実行インスタンスは再構築しません。製品名、公式文書、版はアダプター情報と証拠です。
    - zh: 不依赖具体框架即可复用的 Adapter、MappingRule、覆盖率和损失验证归映射基础；映射后的业务对象仍归编排、运行或可观测性域。
      en: Framework-independent Adapter, MappingRule, coverage, and loss validation belong to mapping foundations; mapped business objects remain in Orchestration, Runtime, or Observability.
      ja: 特定フレームワークに依存しない Adapter、MappingRule、網羅率・損失検証は写像基盤に属し、写像後の業務対象は編成、実行、可観測性の各領域に残ります。
  semantic_kind: null
  aliases: []
purpose:
  zh: 以版本化、可解释且不污染核心本体的方式解释外部智能体框架构造。
  en: Interpret external agent-framework constructs in a versioned, explainable way without polluting the canonical ontology.
  ja: 外部エージェントフレームワークの構造を、版管理され説明可能で、中核本体を汚染しない形で解釈します。
structure: null
examples:
  - id: adapter-frameworks-cq-construct-equivalence-v3-example-positive
    kind: positive
    labels:
      zh: LangGraph 节点的版本化组合对应（正例）
      en: Versioned composition mapping for a LangGraph node — accepted case
      ja: LangGraph node の版付き構成写像（正例）
    scenario_id: null
    descriptions:
      zh: 记录固定 docs-reviewed-2026-06-30，把 research_node 的工作流成员语义对应到 CompositionPart；函数签名、State reducer 与 Command 路由保留为框架残差。
      en: The record pins docs-reviewed-2026-06-30 and maps only research_node's workflow-membership facet to CompositionPart; its callable signature, State reducer, and Command routing remain framework residuals.
      ja: docs-reviewed-2026-06-30 を固定し、research_node の workflow membership だけを CompositionPart に対応させ、callable signature・State reducer・Command routing を framework 残差にします。
    field_values:
      framework: LangGraph
      framework_version: docs-reviewed-2026-06-30
      source_construct: node:research_node
      core_endpoint: CompositionPart
      mapped_facets:
        - workflow membership
      residual_facets:
        - callable signature
        - state reducer
        - Command routing
    related_node_ids:
      - FrameworkMapping
      - FrameworkAdapter
      - CompositionPart
    related_relation_ids: []
    expected_result:
      zh: 返回一个版本化 FrameworkMapping：覆盖 1 个语义面并列出 3 个残差。
      en: Return one versioned FrameworkMapping covering one semantic facet and listing three residuals.
      ja: 1 個の意味面を対応させ 3 個の残差を列挙する版付き FrameworkMapping を返します。
    why_valid_or_invalid:
      zh: 外部构造、版本、端点与残差可分别审计，且没有 LangGraphNode-is_a-CompositionPart 断言。
      en: Construct, version, endpoint, and residuals are independently auditable, with no LangGraphNode-is_a-CompositionPart assertion.
      ja: 構造・版・endpoint・残差を個別監査でき、LangGraphNode-is_a-CompositionPart 断言がありません。
    synthetic: true
    verified_version: LangGraph docs reviewed 2026-06-30
    source_claims:
      - claim-adapter-frameworks-003
      - claim-adapter-frameworks-004
  - id: adapter-frameworks-cq-construct-equivalence-v3-example-counter
    kind: counterexample
    labels:
      zh: 缺少版本与残差的 Crew 等同（反例）
      en: Crew equivalence without version or residuals — rejected case
      ja: 版と残差を欠く Crew 同一視（反例）
    scenario_id: null
    descriptions:
      zh: 候选只写“Crew 等于 AggregationActivity”，既未给 CrewAI 版本，也未区分 Crew、Process、Agent，并遗漏 delegation、callback 与执行策略。
      en: The candidate states only “Crew equals AggregationActivity,” supplies no CrewAI version, fails to distinguish Crew, Process, and Agent, and omits delegation, callbacks, and execution policy.
      ja: 候補は「Crew equals AggregationActivity」とだけ記し、CrewAI 版、Crew・Process・Agent の区別、delegation・callback・実行方針がありません。
    field_values:
      framework: CrewAI
      framework_version: null
      source_construct: Crew
      core_endpoint: AggregationActivity
      residual_facets: []
    related_node_ids:
      - FrameworkMapping
      - FrameworkAdapter
      - AggregationActivity
    related_relation_ids: []
    expected_result:
      zh: 拒绝：版本、精确构造与残差清单三项均缺失。
      en: Reject because version, exact construct, and residual list are all missing.
      ja: 版・正確な構造・残差一覧が欠けるため拒否します。
    why_valid_or_invalid:
      zh: 无版本等同会把外部词汇误写为核心类同一性，不能回答指定版本的对应。
      en: Unversioned equality turns an external term into core class identity and cannot answer a version-specific mapping.
      ja: 版なしの等値は外部用語を core class 同一性に変え、版別写像を回答できません。
    synthetic: true
    verified_version: CrewAI docs reviewed 2026-07-16
    source_claims:
      - claim-adapter-frameworks-005
      - claim-adapter-frameworks-006
  - id: adapter-frameworks-cq-lifecycle-difference-v3-example-positive
    kind: positive
    labels:
      zh: Thread、checkpoint 与会话生命周期分离（正例）
      en: Separating thread, checkpoint, and session lifecycle — accepted case
      ja: thread・checkpoint・session lifecycle の分離（正例）
    scenario_id: null
    descriptions:
      zh: thread customer-42 于 09:00 创建，super-step 6 生成 cp-006，09:17 从 cp-004 fork；thread 与 RuntimeSession 比较，checkpoint 保留为状态记录，fork 标为未覆盖差异。
      en: Thread customer-42 starts at 09:00, emits cp-006 at super-step 6, and forks from cp-004 at 09:17; the thread is compared with RuntimeSession, checkpoints remain state records, and fork is an explicit gap.
      ja: thread customer-42 は 09:00 に開始し、super-step 6 で cp-006 を生成、09:17 に cp-004 から fork します。thread を RuntimeSession と比較し、checkpoint は状態記録、fork は未対応差異にします。
    field_values:
      framework: LangGraph
      thread_id: customer-42
      started_at: 2026-07-16T09:00:00Z
      checkpoint_id: cp-006
      super_step: 6
      forked_from: cp-004
      forked_at: 2026-07-16T09:17:00Z
      unmapped_behaviors:
        - checkpoint fork
    related_node_ids:
      - FrameworkTraceMapping
      - FrameworkMapping
      - RuntimeSession
      - SessionStartEvent
    related_relation_ids: []
    expected_result:
      zh: 返回 1 个会话生命周期、按序 checkpoint 与 1 项 fork 差异；不生成 checkpoint-is_a-RuntimeSession。
      en: Return one session lifetime, ordered checkpoints, and one fork gap; do not emit checkpoint-is_a-RuntimeSession.
      ja: 1 個の session lifetime、順序付き checkpoint、1 件の fork 差異を返し、checkpoint-is_a-RuntimeSession は生成しません。
    why_valid_or_invalid:
      zh: 状态持久化与会话生命周期保持分离，时间和 fork 来源均可核验。
      en: State persistence remains separate from session lifecycle, and time and fork provenance are verifiable.
      ja: 状態永続化と session lifecycle を分離し、時間と fork 来歴を検証できます。
    synthetic: true
    verified_version: LangGraph persistence reviewed 2026-07-16
    source_claims:
      - claim-adapter-frameworks-007
      - claim-adapter-frameworks-008
  - id: adapter-frameworks-cq-lifecycle-difference-v3-example-counter
    kind: counterexample
    labels:
      zh: 把 checkpoint 当成新会话（反例）
      en: Treating every checkpoint as a new session — rejected case
      ja: checkpoint を新 session とする誤写像（反例）
    scenario_id: null
    descriptions:
      zh: 候选把 cp-004、cp-005、cp-006 各计为 RuntimeSession，并把 replay 写成三次 SessionStartEvent，使一个 thread 虚增为三个会话。
      en: The candidate maps cp-004, cp-005, and cp-006 to three RuntimeSession values and records replay as three SessionStartEvent values, inflating one thread into three sessions.
      ja: 候補は cp-004、cp-005、cp-006 を三つの RuntimeSession とし、replay を三回の SessionStartEvent として、一つの thread を三 session に水増しします。
    field_values:
      framework: LangGraph
      thread_id: customer-42
      checkpoint_ids:
        - cp-004
        - cp-005
        - cp-006
      reported_session_count: 3
      actual_thread_count: 1
    related_node_ids:
      - FrameworkTraceMapping
      - RuntimeSession
      - SessionStartEvent
    related_relation_ids: []
    expected_result:
      zh: 拒绝：同一 thread 的 checkpoint 不得自动创建 RuntimeSession 或 SessionStartEvent。
      en: "Reject: checkpoints in one thread must not automatically create RuntimeSession or SessionStartEvent values."
      ja: 拒否：同一 thread の checkpoint から RuntimeSession や SessionStartEvent を自動生成できません。
    why_valid_or_invalid:
      zh: 该记录混淆持久化状态与生命周期，并破坏 replay/fork 来源。
      en: The record conflates persisted state with lifecycle and destroys replay/fork provenance.
      ja: 永続状態と lifecycle を混同し replay/fork 来歴を破壊します。
    synthetic: true
    verified_version: LangGraph persistence reviewed 2026-07-16
    source_claims:
      - claim-adapter-frameworks-007
      - claim-adapter-frameworks-008
  - id: adapter-frameworks-cq-no-shadow-taxonomy-v3-example-positive
    kind: positive
    labels:
      zh: CrewAI 构造保留为外部映射（正例）
      en: Keeping CrewAI constructs as external mappings — accepted case
      ja: CrewAI 構造を外部写像に保持（正例）
    scenario_id: null
    descriptions:
      zh: Agent、Task、Crew、Flow、Process 五个外部构造全部由版本化 FrameworkMapping 指向既有端点；canonical 图只新增 0 个 vendor 类。
      en: All five external constructs—Agent, Task, Crew, Flow, and Process—reach existing endpoints through versioned FrameworkMapping records; the canonical graph adds zero vendor classes.
      ja: Agent・Task・Crew・Flow・Process の五構造は版付き FrameworkMapping で既存 endpoint を参照し、canonical graph の vendor class 追加数は 0 です。
    field_values:
      framework: CrewAI
      framework_version: docs-reviewed-2026-06-30
      external_construct_count: 5
      new_accepted_vendor_classes: 0
    related_node_ids:
      - FrameworkMapping
      - FrameworkTraceMapping
      - FrameworkAdapter
      - MappingRule
    related_relation_ids:
      - FrameworkMapping-is_a-MappingRule
      - FrameworkMapping-applies_to_adapter-FrameworkAdapter
    expected_result:
      zh: 5/5 外部构造具有映射；vendor 核心类数为 0。
      en: All 5 of 5 external constructs have mappings; the vendor core-class count is zero.
      ja: 5/5 の外部構造に写像があり、vendor core-class 数は 0 です。
    why_valid_or_invalid:
      zh: 映射规则归 MappingRule 并作用于 FrameworkAdapter，外部词汇不争夺核心 owner。
      en: The mapping is a MappingRule applied to FrameworkAdapter, so external vocabulary does not compete for core ownership.
      ja: 写像は FrameworkAdapter に適用される MappingRule で、外部用語は core owner と競合しません。
    synthetic: true
    verified_version: CrewAI docs reviewed 2026-07-16
    source_claims:
      - claim-adapter-frameworks-005
      - claim-adapter-frameworks-006
  - id: adapter-frameworks-cq-no-shadow-taxonomy-v3-example-counter
    kind: counterexample
    labels:
      zh: 复制 LangGraph 类型树（反例）
      en: Copying a LangGraph type tree — rejected case
      ja: LangGraph 型木の複製（反例）
    scenario_id: null
    descriptions:
      zh: 候选拟接受 LangGraphNode、LangGraphState、LangGraphCommand 三类并挂到核心树下，却没有 FrameworkMapping 与外部版本。
      en: The proposal accepts LangGraphNode, LangGraphState, and LangGraphCommand under core classes without a FrameworkMapping or external version.
      ja: 候補は FrameworkMapping と外部版なしに LangGraphNode・LangGraphState・LangGraphCommand を core tree 下で受理しようとします。
    field_values:
      framework: LangGraph
      framework_version: null
      proposed_vendor_classes:
        - LangGraphNode
        - LangGraphState
        - LangGraphCommand
      mapping_rule_present: false
    related_node_ids:
      - FrameworkMapping
      - FrameworkAdapter
      - MappingRule
    related_relation_ids:
      - FrameworkMapping-is_a-MappingRule
      - FrameworkMapping-applies_to_adapter-FrameworkAdapter
    expected_result:
      zh: 拒绝三个类，改为 external_mappings 中的逐版本构造记录。
      en: Reject all three classes and use versioned construct records in external_mappings.
      ja: 三 class を拒否し、external_mappings の版別構造記録に置換します。
    why_valid_or_invalid:
      zh: 缺少 MappingRule 身份和 adapter 作用关系，说明这是外部分级复制而非映射。
      en: Missing MappingRule identity and adapter application show that this is taxonomy copying, not mapping.
      ja: MappingRule 同一性と adapter 適用がなく、写像ではなく外部分類の複製です。
    synthetic: true
    verified_version: LangGraph Graph API reviewed 2026-07-16
    source_claims:
      - claim-adapter-frameworks-003
      - claim-adapter-frameworks-004
