          zh: 该本体不负责启动恢复流程。本体只表达框架语义到 canonical 概念的对应；投影执行、映射应用及其失败恢复由“模式导出”和“映射规则与验证”承接。
          en: This ontology does not initiate a recovery workflow. This ontology only states correspondences from framework semantics to canonical concepts; schema export and mapping validation own projection execution, mapping application, failures, and recovery.
          ja: このオントロジーは回復ワークフローを開始しません。このオントロジーはフレームワーク意味論から canonical 概念への対応だけを表します。投影実行、写像適用、失敗、回復は「スキーマ出力」と「写像規則・検証」が担います。
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-adapter-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项领域复核确认 FrameworkAdapter 只表示版本化转换能力；框架的 Agent、Team、Node、Run 或 Trace 对象仍由其外部规范定义，只有其对应关系、损失和验证证据归本模块。
            en: Point-by-point domain review confirms that FrameworkAdapter denotes only a versioned conversion capability. Framework Agent, Team, Node, Run, or Trace objects remain defined by their external specifications; only correspondences, loss, and validation evidence belong here.
            ja: 個別領域審査は FrameworkAdapter が版付き変換能力だけを表すと確認しました。framework の Agent・Team・Node・Run・Trace object は外部仕様に残し、対応・損失・検証証拠だけを本モジュールが所有します。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 结构复核保留 FrameworkAdapter 一个局部能力根；FrameworkMapping 沿全局 MappingRule 主干展开，并通过 applies_to_adapter 指向适用能力。不存在来源、框架名称或文档节点作为额外根。
            en: Structural review retains one local capability root, FrameworkAdapter. FrameworkMapping expands under the global MappingRule backbone and points to the applicable capability through applies_to_adapter. No source, framework-name, or document node remains as an additional root.
            ja: 構造審査は FrameworkAdapter 一つをローカル能力ルートとして保持しました。FrameworkMapping はグローバル MappingRule backbone 配下で展開し、applies_to_adapter で適用能力を指します。出典・framework 名・文書 node を追加 root にしません。
  taxonomy_contract:
    applicability: specialization
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - FrameworkAdapter
    allowed_backbone_predicates:
      - is_a
    flat_root_exception_concept_ids: []
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-adapter-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 框架映射规则由 adapter-frameworks 唯一拥有。FrameworkAdapter 沿能力分类归入 Adapter，FrameworkMapping 沿规范分类归入 MappingRule；applies_to_adapter 只说明某条规则适用于哪个框架适配器，不参与种属层级。
            en: Framework mapping rules are uniquely owned by adapter-frameworks. FrameworkAdapter follows the capability taxonomy to Adapter, while FrameworkMapping follows the specification taxonomy to MappingRule; applies_to_adapter states rule applicability and does not participate in the genus hierarchy.
            ja: framework mapping rule は adapter-frameworks が一意に所有します。FrameworkAdapter は capability taxonomy で Adapter に、FrameworkMapping は specification taxonomy で MappingRule に帰属し、applies_to_adapter は規則の適用先だけを表して種属階層には参加しません。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 结构裁决保留两条彼此独立的真实分类链：FrameworkAdapter-is_a-Adapter 与 FrameworkMapping-is_a-MappingRule 均为主骨架；FrameworkMapping-applies_to_adapter-FrameworkAdapter 保持 canonical 方向并作为跨链适用事实，不再制造“规则位于能力之下”的伪层级。
            en: "Structural adjudication retains two independent genuine taxonomy chains: FrameworkAdapter-is_a-Adapter and FrameworkMapping-is_a-MappingRule are primary backbone edges. FrameworkMapping-applies_to_adapter-FrameworkAdapter keeps its canonical direction as a cross-chain applicability fact and no longer fabricates a rule-below-capability hierarchy."
            ja: 構造裁定は二つの独立した真正 taxonomy chain、FrameworkAdapter-is_a-Adapter と FrameworkMapping-is_a-MappingRule を primary backbone として保持します。FrameworkMapping-applies_to_adapter-FrameworkAdapter は canonical 方向の cross-chain applicability fact とし、rule を capability 配下に置く偽階層を作りません。
  competency_questions:
    - id: adapter-frameworks-cq-construct-equivalence-v3
      semantic_key: adapter-frameworks.construct-equivalence
      primary_owner_module_id: adapter-frameworks
      related_module_ids:
        - orchestration-composition
      questions:
        zh: 给定框架版本中的节点或团队构造，它对应哪个核心组合、角色或任务概念？
        en: For a node or team construct in a given framework version, which core composition, role, or task concept does it correspond to?
        ja: 特定フレームワーク版のノードまたはチーム構造は、どのコア構成、役割、タスク概念に対応しますか。
      query: Select a framework adapter by name and version, then resolve the exact source construct to one or more typed core endpoints.
      expected_assertion: The result names the framework construct, version, typed core endpoint, and any non-equivalent residual semantics.
      evidence_binding:
        applicability: boundary-comparison-only
        owner_concept_ids:
          - FrameworkMapping
          - FrameworkAdapter
        related_concept_ids:
          - CompositionPart
          - AggregationActivity
        relation_ids: []
        not_applicable_reason:
          zh: 外部 Node、Crew 等构造的版本、端点与残差只保存在 FrameworkAdapter.external_mappings；canonical 图没有接受 FrameworkMapping 到 CompositionPart 或 AggregationActivity 的直接关系。
          en: Versions, endpoints, and residuals for external Node or Crew constructs exist only in FrameworkAdapter.external_mappings; the canonical graph has no accepted direct relation from FrameworkMapping to CompositionPart or AggregationActivity.
          ja: 外部 Node／Crew 構造の版・endpoint・残差は FrameworkAdapter.external_mappings のみにあり、FrameworkMapping から CompositionPart／AggregationActivity への承認済み直接関係はありません。
