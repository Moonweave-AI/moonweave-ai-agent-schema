              en: Audit thread lifetime, checkpoints, and replay/fork gaps separately.
              ja: thread lifetime・checkpoint・replay/fork gap を別々に監査します。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 禁止 checkpoint-is_a-RuntimeSession 及其反向关系。
              en: Forbid checkpoint-is_a-RuntimeSession and its reverse.
              ja: checkpoint-is_a-RuntimeSession と逆関係を禁止します。
