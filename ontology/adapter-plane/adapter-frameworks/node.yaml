relations: []
module_contract:
  interaction_contract:
    applicability: descriptive
    facets:
      input:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不接收独立的运行输入。本体只表达框架语义到 canonical 概念的对应；投影执行、映射应用及其失败恢复由“模式导出”和“映射规则与验证”承接。
          en: This ontology does not receive an independent runtime input. This ontology only states correspondences from framework semantics to canonical concepts; schema export and mapping validation own projection execution, mapping application, failures, and recovery.
          ja: このオントロジーは独立した実行入力を受け取りません。このオントロジーはフレームワーク意味論から canonical 概念への対応だけを表します。投影実行、写像適用、失敗、回復は「スキーマ出力」と「写像規則・検証」が担います。
      output:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不产生独立的运行输出。本体只表达框架语义到 canonical 概念的对应；投影执行、映射应用及其失败恢复由“模式导出”和“映射规则与验证”承接。
          en: This ontology does not produce an independent runtime output. This ontology only states correspondences from framework semantics to canonical concepts; schema export and mapping validation own projection execution, mapping application, failures, and recovery.
          ja: このオントロジーは独立した実行出力を生成しません。このオントロジーはフレームワーク意味論から canonical 概念への対応だけを表します。投影実行、写像適用、失敗、回復は「スキーマ出力」と「写像規則・検証」が担います。
      failure:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不负责判定运行失败。本体只表达框架语义到 canonical 概念的对应；投影执行、映射应用及其失败恢复由“模式导出”和“映射规则与验证”承接。
          en: This ontology does not own runtime-failure adjudication. This ontology only states correspondences from framework semantics to canonical concepts; schema export and mapping validation own projection execution, mapping application, failures, and recovery.
          ja: このオントロジーは実行失敗の判定を所有しません。このオントロジーはフレームワーク意味論から canonical 概念への対応だけを表します。投影実行、写像適用、失敗、回復は「スキーマ出力」と「写像規則・検証」が担います。
