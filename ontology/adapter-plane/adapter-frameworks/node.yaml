            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 框架专名只作为外部端点，可复用语义仍归核心域。
              en: Framework names remain external endpoints; reusable semantics stay in core domains.
              ja: framework 固有名は外部 endpoint に留め、再利用意味は core domain が所有します。
