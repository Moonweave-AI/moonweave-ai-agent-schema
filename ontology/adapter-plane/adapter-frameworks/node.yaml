        - claim-adapter-frameworks-004
        - claim-adapter-frameworks-005
        - claim-adapter-frameworks-006
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-adapter-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 逐个外部构造回答版本、端点与残差，不做无版本等同。
              en: Answer version, endpoint, and residuals per external construct; no unversioned equality.
              ja: 外部構造ごとに版・endpoint・残差を回答し、版なし等値を行いません。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 对应是 external mapping 信息而非 canonical 边。
              en: The correspondence is external-mapping information, not a canonical edge.
              ja: 対応は external mapping 情報で canonical edge ではありません。
    - id: adapter-frameworks-cq-lifecycle-difference-v3
      semantic_key: adapter-frameworks.lifecycle-difference
      primary_owner_module_id: adapter-frameworks
      related_module_ids:
        - runtime-system
      questions:
        zh: 框架运行对象的生命周期与核心 RuntimeSession 有哪些状态对应和不可映射差异？
        en: Which states of a framework run object correspond to core RuntimeSession states, and which differences cannot be mapped?
        ja: フレームワーク実行オブジェクトのライフサイクル状態はコア RuntimeSession のどれに対応し、写像不能な差異は何ですか。
      query: Compare the framework lifecycle state set and transitions with RuntimeSession state and event mappings for the selected version.
      expected_assertion: Each source state is mapped or explicitly marked unmapped, and transition direction is preserved.
      evidence_binding:
        applicability: boundary-comparison-only
        owner_concept_ids:
          - FrameworkTraceMapping
          - FrameworkMapping
        related_concept_ids:
          - SessionStartEvent
          - RuntimeSession
        relation_ids: []
        not_applicable_reason:
          zh: thread、checkpoint、super-step 是框架持久化词汇；RuntimeSession 与 SessionStartEvent 是运行事实。现有图没有把 checkpoint 等同为会话或启动事件的关系。
          en: Threads, checkpoints, and super-steps are framework persistence terms; RuntimeSession and SessionStartEvent are runtime facts. No accepted relation equates a checkpoint with a session or start event.
          ja: thread・checkpoint・super-step は framework persistence 用語で、RuntimeSession と SessionStartEvent は runtime fact です。checkpoint を session／start event と同一視する承認済み関係はありません。
