        ja: フレームワーク写像は必要な端点だけを保持し、コア概念と競合する影の分類木を複製していませんか。
      query: List framework-owned concepts and flag any accepted concept lacking either an external construct identity or an explicit mapping role.
      expected_assertion: Every framework-owned concept identifies an external construct or adapter role; no duplicate core taxonomy appears.
