schema: moonweave.ai/ontology-node/v1
id: FrameworkMapping
kind: concept
status: accepted
labels:
  zh: 框架映射规则
  en: framework mapping
  ja: フレームワーク写像規則
semantics:
  short_definition:
    zh: 框架映射规则把具名框架版本的公开构造映射到本体概念，并标明方向、转换条件和语义损失。
    en: FrameworkMapping maps a public construct from a named framework version to an ontology concept with direction, transformation conditions, and semantic-loss classification.
    ja: FrameworkMapping は特定基盤版の公開構成を、方向・変換条件・意味損失を明示して本体概念へ対応付けます。
  definition:
    zh: FrameworkMapping 是 MappingRule 的专门化，完整继承 mapping_rule_id 与 version 的规则身份；framework_version 只限定该同一规则适用的具名框架版本或兼容范围，并不构成第二套身份。规则声明 source-to-target 方向、前置条件与变换，并用 exact、lossy 或 unsupported 记录等价程度；测试证据验证转换，未覆盖语义作为显式残差保留。
    en: FrameworkMapping specializes MappingRule and keeps its inherited mapping_rule_id and version as the sole rule identity. framework_version narrows the named framework revision or compatibility range to which that same rule applies; it is not a second identifier. The rule declares source-to-target direction, preconditions, transformation, and exact, lossy, or unsupported equivalence, with tests preserving uncovered semantics as explicit residuals.
    ja: FrameworkMapping は MappingRule の特殊化であり、mapping_rule_id と version を唯一の規則同一性として継承します。framework_version は同じ規則が適用される基盤版または互換範囲を限定する種差で、別の識別子ではありません。方向、前提条件、変換、exact・lossy・unsupported の等価性を明示し、未対応意味は差分として保持します。
  why_needed:
    zh: 框架发布会改变字段、默认值和组合语义，同名构造也可能只部分等价。把映射作为可版本化、可测试的规范后，适配器升级可以精确报告受影响规则与语义损失，并与通信协议的消息一致性映射保持边界。
    en: Framework releases change fields, defaults, and composition semantics, and same-named constructs may be only partially equivalent. Making each mapping a versioned, testable specification lets adapter upgrades report affected rules and semantic loss precisely while remaining distinct from message-conformance mappings for communication protocols.
    ja: 基盤の更新は項目、既定値、合成意味を変え、同名構成も部分等価に留まります。写像を版付き・試験可能な仕様とすることで、適配更新時に影響規則と意味損失を正確に報告し、通信プロトコルのメッセージ適合写像と区別できます。
  includes:
    - zh: 纳入以继承的 mapping_rule_id 与 version 标识，并声明框架版本、源构造、目标概念、方向、转换条件、loss_kind 和验证证据的框架专属映射规范。
      en: Includes framework-specific mapping specifications identified by inherited mapping_rule_id and version and declaring framework revision, source construct, target concept, direction, transformation conditions, loss_kind, and validation evidence.
      ja: 継承した mapping_rule_id と version で識別され、基盤版、元構成、写像先概念、方向、変換条件、loss_kind、検証証拠を宣言する基盤固有写像仕様を含みます。
  excludes:
    - zh: 不包含 A2A、MCP、FIPA 等通信协议消息或能力声明的 ProtocolMapping，不包含已执行转换的 MappingArtifact，也不包含框架对象、运行实例或仅表明适配器支持范围的 Adapter 能力。
      en: Excludes ProtocolMappings for A2A, MCP, FIPA, or other communication messages and capability declarations, MappingArtifacts produced by executing a conversion, framework objects or run instances, and Adapter capabilities that only state supported scope.
      ja: A2A・MCP・FIPA 等の通信メッセージや能力宣言を扱う ProtocolMapping、変換実行が生成した MappingArtifact、基盤オブジェクト・実行インスタンス、対応範囲だけを示す Adapter 能力は含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: framework_version
      labels:
        zh: 框架版本
        en: framework version
        ja: フレームワークバージョン
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定映射适用的外部框架版本。
        en: Pins the external framework version to which the mapping applies.
        ja: マッピングが適用される外部フレームワークバージョンを固定します。
      allowed_values: []
      pattern: null
      example_value: "1.0"
      source_claims:
        - claim-framework-mapping-003
        - claim-framework-mapping-004
    - id: loss_kind
      labels:
        zh: 损失类别
        en: loss kind
        ja: 損失種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明映射精确、有损或不支持，并驱动警告。
        en: Declares exact, lossy, or unsupported mapping and drives warnings.
        ja: exact、lossy、unsupported の種別を宣言し、警告を駆動します。
      allowed_values: []
      pattern: null
      example_value: lossy
      source_claims:
        - claim-framework-mapping-005
        - claim-framework-mapping-006
  constraints:
    - id: framework-mapping-unsupported-explicit
      severity: error
      expression_language: plain
      expression: unsupported framework semantics are recorded explicitly and never silently coerced into a core Concept
      explanations:
        zh: 不支持的框架语义必须显式记录，不得静默强制映射到核心概念。
        en: Unsupported framework semantics are recorded explicitly and never silently coerced into a core Concept.
        ja: 未対応のフレームワーク意味は明示的に記録し、core Concept へ暗黙変換してはなりません。
      source_claims:
        - claim-framework-mapping-007
        - claim-framework-mapping-008
  required_relation_constraints:
    - id: framework-mapping-applies-adapter
      direction: outgoing
      predicate: applies_to_adapter
      target_concept_id: FrameworkAdapter
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 框架映射必须指向使用它的框架适配器。
        en: A framework mapping points to the framework adapter that applies it.
        ja: フレームワークマッピングはそれを適用するフレームワークアダプターを指します。
      source_claims:
        - claim-framework-mapping-009
        - claim-framework-mapping-010
examples:
  - id: FrameworkMapping-example-positive-001
    kind: positive
    labels:
      zh: 框架映射规则正例
      en: Positive example of framework mapping
      ja: フレームワーク写像規則の正例
    scenario_id: null
    descriptions:
      zh: 规则 `mapping-langgraph-state-snapshot` 针对 LangGraph 1.2.5，把检查点读取时的 `StateSnapshot` 映射到 Moonweave Checkpoint：values 对应状态快照，next 对应待执行节点，config 与 metadata 对应恢复定位信息；tasks 中框架特有的中断与错误细节作为有损残差保留。
      en: "Rule `mapping-langgraph-state-snapshot` targets LangGraph 1.2.5 and maps a checkpoint `StateSnapshot` to Moonweave Checkpoint: values becomes the state snapshot, next identifies pending nodes, and config plus metadata provide resume location; framework-specific interrupt and error details in tasks remain lossy residuals."
      ja: "`mapping-langgraph-state-snapshot` は LangGraph 1.2.5 のチェックポイント `StateSnapshot` を Moonweave Checkpoint へ写像します。values は状態スナップショット、next は次のノード、config と metadata は再開位置となり、tasks 内の固有割り込み・エラー詳細は損失差分として保持します。"
    field_values:
      mapping_rule_id: rule-langgraph-state-snapshot
      version: "1"
      source_construct: langgraph:StateSnapshot
      target_construct: moonweave:Checkpoint
      direction: source-to-target
      mapping_kind: conditional
      valid_from: 2026-07-13T06:00:00.000Z
      framework_version: 1.2.5
      loss_kind: lossy
    related_node_ids:
      - FrameworkMapping
      - FrameworkAdapter
    related_relation_ids:
      - FrameworkMapping-applies_to_adapter-FrameworkAdapter
    expected_result:
      zh: 该运行可查询 FrameworkMapping 以及方向保持不变的事实 FrameworkMapping-applies_to_adapter-FrameworkAdapter。
      en: The run can query FrameworkMapping together with direction-preserving fact FrameworkMapping-applies_to_adapter-FrameworkAdapter.
      ja: この実行では FrameworkMapping と方向を保持した事実 FrameworkMapping-applies_to_adapter-FrameworkAdapter を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、FrameworkMapping-applies_to_adapter-FrameworkAdapter 的 canonical 方向、概念定义和可用字段值。
      en: This is a valid framework mapping because the exact LangGraph release and source fields are pinned, each checkpoint field has an explicit target meaning, and interrupt/error details that do not survive the projection are declared as lossy residuals.
      ja: このシナリオは実際の運用文脈、FrameworkMapping-applies_to_adapter-FrameworkAdapter の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-framework-mapping-011
      - claim-framework-mapping-012
  - id: FrameworkMapping-example-boundary-001
    kind: boundary
    labels:
      zh: 框架映射规则边界例
      en: Boundary case for framework mapping
      ja: フレームワーク写像規則の境界例
    scenario_id: null
    descriptions:
      zh: 规则把 A2A v1.0 的 `Message`、`Task` 与 `AgentCard` 字段映射到消息、任务和能力概念，并验证线上 JSON 负载的一致性；它面向通信协议而非某个智能体开发框架，因此应为 ProtocolMapping。
      en: A rule maps A2A v1.0 Message, Task, and AgentCard fields to message, task, and capability concepts and validates wire-format conformance. Its source is a communication protocol rather than an agent-development framework, so it is a ProtocolMapping.
      ja: A2A v1.0 の Message、Task、AgentCard 項目をメッセージ、タスク、能力概念へ写像し wire 形式適合を検証する規則は、開発基盤ではなく通信プロトコルを元とするため ProtocolMapping です。
    field_values: {}
    related_node_ids:
      - FrameworkMapping
      - FrameworkAdapter
      - ProtocolMapping
    related_relation_ids:
      - FrameworkMapping-applies_to_adapter-FrameworkAdapter
    expected_result:
      zh: ProtocolMapping 保持其原有类型，验证器不得凭关系共现把它提升为 FrameworkMapping。
      en: ProtocolMapping retains its own type; validation must not promote it to FrameworkMapping from relation co-occurrence.
      ja: ProtocolMapping は元の型を維持し、関係の共起だけで FrameworkMapping へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 FrameworkMapping-applies_to_adapter-FrameworkAdapter 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: The boundary names an actual contrast node and preserves the direction of FrameworkMapping-applies_to_adapter-FrameworkAdapter; only an explicit is_a fact or the complete differentia supports membership.
      ja: 境界例は実在する対照ノードを示し、FrameworkMapping-applies_to_adapter-FrameworkAdapter の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-framework-mapping-013
      - claim-framework-mapping-014
  - id: FrameworkMapping-example-instance-001
    kind: instance
    labels:
      zh: 框架映射规则结构化实例
      en: Structured instance of framework mapping
      ja: フレームワーク写像規則の構造化インスタンス
    scenario_id: null
    descriptions:
      zh: 节点内规则实例完整给出继承的 MappingRule 身份与基础字段，以及 FrameworkMapping 的 framework_version 和 loss_kind，表示一条可验证的 LangGraph StateSnapshot 映射规范，而不是检查点运行数据。
      en: The inline rule instance supplies the inherited MappingRule identity and base fields plus FrameworkMapping framework_version and loss_kind for a verifiable LangGraph StateSnapshot mapping specification, not checkpoint runtime data.
      ja: ノード内規則例は継承した MappingRule の同一性と基礎項目、および FrameworkMapping の framework_version・loss_kind を備え、チェックポイント実行データではなく検証可能な StateSnapshot 写像仕様を表します。
    field_values:
      mapping_rule_id: rule-langgraph-state-snapshot
      version: "1"
      source_construct: langgraph:StateSnapshot
      target_construct: moonweave:Checkpoint
      direction: source-to-target
      mapping_kind: conditional
      valid_from: 2026-07-13T06:00:00.000Z
      framework_version: 1.2.5
      loss_kind: lossy
    related_node_ids:
      - FrameworkMapping
    related_relation_ids: []
    expected_result:
      zh: 字段值通过该 Concept 的结构与约束验证，且实例仅作为节点内说明信息显示。
      en: Field values satisfy the Concept structure contract, and the instance remains explanatory information on the node.
      ja: フィールド値は Concept の構造契約を満たし、インスタンスはノード内の説明情報として保持されます。
    why_valid_or_invalid:
      zh: 每个字段键与节点字段 ID 完全一致；单值直接取经审查样例，可重复字段按其基数组装为数组。
      en: Every field key exactly matches a node field ID; scalar values come from reviewed examples and repeatable fields are assembled as arrays according to cardinality.
      ja: 各フィールドキーはノードのフィールド ID と一致し、単一値はレビュー済み例から取得し、反復可能フィールドは基数に従って配列化します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-framework-mapping-015
      - claim-framework-mapping-016
external_mappings: []
applicability:
  - adapter
sibling_differentiation:
  - sibling_concept_id: ProtocolMapping
    shared_parent_concept_id: MappingRule
    differentia:
      zh: 端点特定对照：父节点 MappingRule：FrameworkMapping（semantic kind=specification，骨架 FrameworkMapping-is_a-MappingRule）；ProtocolMapping（semantic kind=specification，骨架 ProtocolMapping-is_a-MappingRule）。双端条件：FrameworkMapping 条件：“框架映射规则属于映射规则，区别于其他同类对象的条件是：它是一种 MappingRule，针对明确框架与版本，把其 agent、task、tool、handoff、state、memory、guardrail、result 或 trace 构造映射到统一概念，记录源路径、目标 ID、方向、变换、缺失语义、unsupported 情况和测试证据；框架对象本身不复制到核心类树”；ProtocolMapping 条件：“协议映射规则属于映射规则，区别于其他同类对象的条件是：它是一种 MappingRule，源端或目标端至少一侧属于明确版本的通信协议，并以消息、任务、能力、身份或信任构造为映射对象；它记录外部 QName/路径、canonical 目标、方向、变换、前后条件、exact/lossy/unsupported 分类和一致性测试”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent MappingRule: FrameworkMapping (semantic kind=specification, backbone FrameworkMapping-is_a-MappingRule); ProtocolMapping (semantic kind=specification, backbone ProtocolMapping-is_a-MappingRule). Endpoint conditions: FrameworkMapping condition: “Framework mapping is a mapping rule whose defining condition is that it is a MappingRule for a stated framework and version that maps its agent, task, tool, handoff, state, memory, guardrail, result, or trace constructs to canonical concepts”; ProtocolMapping condition: “Protocol mapping is a mapping rule whose defining condition is that it is a MappingRule whose source or target belongs to a stated version of a communication protocol and whose subject is a message, task, capability, identity, or trust construct”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 MappingRule：FrameworkMapping（semantic kind=specification、バックボーン FrameworkMapping-is_a-MappingRule）；ProtocolMapping（semantic kind=specification、バックボーン ProtocolMapping-is_a-MappingRule）。両端条件：FrameworkMapping の条件：「フレームワーク写像規則は写像規則のうち、次の事実を定義条件とする対象です：FrameworkMapping は明示フレームワーク・版について agent・task・tool・handoff・state・memory・guardrail・result・trace 構成を標準概念へ写像する MappingRule で、出典パス・対象 ID・方向・変換・欠落意味・unsupported・試験証拠を記録し、フレームワーク対象を核心クラス木へ複製しません」；ProtocolMapping の条件：「プロトコル写像規則は写像規則のうち、次の事実を定義条件とする対象です：ProtocolMapping は出典または対象の少なくとも一方が明示版の通信プロトコルに属し、メッセージ・タスク・能力・識別・信頼構成を対象とする MappingRule で、外部 QName／パス・canonical 対象・方向・変換・事前事後条件・exact/lossy/unsupported 分類・適合試験を記録します」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-framework-mapping-017
      - claim-framework-mapping-018
parent_relation: null
relations:
  - id: FrameworkMapping-applies_to_adapter-FrameworkAdapter
    predicate: applies_to_adapter
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: applies to adapter
      en: applies to adapter
      ja: applies to adapter
    definitions:
      zh: 每条框架映射明确指向执行该映射的框架适配器，使映射规则、适配能力和版本责任可独立追踪。
      en: Each framework mapping identifies the framework adapter that applies it, keeping mapping rules, adapter capability, and version accountability independently traceable.
      ja: 各フレームワーク写像はそれを適用するフレームワークアダプターを明示し、写像規則・適応能力・版責任を独立して追跡可能にします。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: 1
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_target_of_applies_to_adapter
      labels:
        zh: 反向：applies to adapter
        en: is target of applies to adapter
        ja: 逆方向：applies to adapter
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: FrameworkMapping-applies_to_adapter-FrameworkAdapter-example-positive-manual-001
        kind: positive
        labels:
          zh: applies to adapter人工正例
          en: Reviewed positive case for applies to adapter
          ja: applies to adapterの審査済み正例
        scenario_id: null
        descriptions:
          zh: "`openai-span-v2` 声明兼容 `openai-agents-python >=0.2,<0.3`，且 `openai-agents-profile@0.2.4` 的版本和 tracing 功能满足前置条件，因此该规则适用于此适配器。"
          en: "`openai-span-v2` declares compatibility with `openai-agents-python >=0.2,<0.3`; `openai-agents-profile@0.2.4` satisfies the version and tracing preconditions, so the mapping applies to that adapter."
          ja: "`openai-span-v2` は `openai-agents-python >=0.2,<0.3` 互換を宣言し、`openai-agents-profile@0.2.4` が版と tracing 前提を満たすため、その Adapter に適用されます。"
        field_values: {}
        related_node_ids:
          - FrameworkMapping
          - FrameworkAdapter
        related_relation_ids:
          - FrameworkMapping-applies_to_adapter-FrameworkAdapter
        expected_result:
          zh: 规则解析应返回该 FrameworkAdapter，并保留适用版本区间。
          en: Rule resolution returns that FrameworkAdapter and retains the compatible version interval.
          ja: 規則解決は該当 FrameworkAdapter と互換版範囲を返します。
        why_valid_or_invalid:
          zh: 适用关系由框架标识、版本范围和必需功能共同满足，而不是名称相似。
          en: Applicability is established by framework identity, version range, and required features, not name similarity.
          ja: 適用は framework 識別、版範囲、必須機能の共同充足で成立し、名称類似ではありません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-framework-mapping-019
      - id: FrameworkMapping-applies_to_adapter-FrameworkAdapter-example-boundary-manual-001
        kind: boundary
        labels:
          zh: applies to adapter人工边界例
          en: Reviewed boundary case for applies to adapter
          ja: applies to adapterの審査済み境界例
        scenario_id: null
        descriptions:
          zh: 同一规则被配置给 `openai-agents-profile@0.3.1`，但 0.3 的 span 字段已超出声明兼容范围且未通过回归测试。
          en: The same rule is configured for `openai-agents-profile@0.3.1`, but its span fields are outside the declared range and no regression test covers that version.
          ja: 同じ規則を `openai-agents-profile@0.3.1` に設定しても、span 項目が宣言範囲外で回帰試験もない場合は適用できません。
        field_values: {}
        related_node_ids:
          - FrameworkMapping
          - FrameworkAdapter
        related_relation_ids:
          - FrameworkMapping-applies_to_adapter-FrameworkAdapter
        expected_result:
          zh: 解析器必须拒绝 applies_to_adapter 断言并要求新规则版本。
          en: Resolution rejects the applies_to_adapter assertion and requires a new rule version.
          ja: 解決器は applies_to_adapter 断言を拒否し、新しい規則版を要求します。
        why_valid_or_invalid:
          zh: 框架名相同不能覆盖版本不兼容；映射规则的有效范围是关系成立条件。
          en: The same framework name cannot override version incompatibility; the mapping rule's validity range is a relation condition.
          ja: 同じ framework 名でも版非互換を上書きできず、規則の有効範囲が関係成立条件です。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-framework-mapping-019
    source_claims:
      - claim-framework-mapping-019
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:FrameworkAdapter
  - id: FrameworkMapping-is_a-MappingRule
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是一种
      en: is a
      ja: の一種である
