source_claims:
  - id: claim-framework-mapping-001
    source: eng-fw-langgraph-docs
    supports: FrameworkMapping can map LangGraph's documented State, Node, Edge, and checkpoint constructs only when a framework version and construct path are retained; FrameworkMapping itself is Moonweave's mapping specification.
    locator: Graph API overview > State, Nodes, and Edges; Persistence > Checkpoints
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-mapping-002
    source: eng-fw-openai-python-docs
    supports: FrameworkMapping also covers OpenAI Agents SDK Agent, Tool, Handoff, Guardrail, Session, and tracing constructs as separate versioned rules rather than assuming product-wide equivalence.
    locator: Agents SDK documentation > Agents; Tools; Handoffs; Guardrails; Sessions; Tracing
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-mapping-003
    source: eng-fw-langgraph-docs
    supports: LangGraph is an independently released framework whose documented graph, persistence, streaming, and subgraph interfaces can evolve. Recording the applicable framework version prevents a mapping from silently spanning incompatible releases; the required framework_version field and exact cardinality are Moonweave design choices, not LangGraph requirements.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-mapping-004
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK documentation describes a concrete SDK surface—Agent, Runner, handoffs, sessions, and tracing—rather than a timeless protocol vocabulary. Version-pinning a mapping is therefore needed for reproducibility, but the framework_version property and one-value constraint are Moonweave inferences rather than SDK schema fields.
    locator: OpenAI Agents SDK > Agents; Running agents; Handoffs; Sessions; Tracing
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-mapping-005
    source: eng-fw-langgraph-docs
    supports: LangGraph's graph state, durable execution, memory, human-interrupt, and subgraph semantics are not automatically equivalent to canonical ontology concepts. That mismatch motivates an explicit mapping-quality classification. LangGraph does not define the exact, lossy, or unsupported values; loss_kind and warning behavior are Moonweave design inferences.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-mapping-006
    source: eng-fw-openai-python-docs
    supports: OpenAI's Agent, Handoff, Session, Trace, and Span have SDK-specific runtime semantics; a canonical target may preserve all, some, or none of those semantics. The documentation supports the need to compare distinct constructs, but it does not publish Moonweave's exact/lossy/unsupported taxonomy. The loss_kind enumeration is therefore an explicit ontology-mapping policy.
    locator: OpenAI Agents SDK > Agents; Handoffs; Sessions; Tracing > Traces and spans
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-mapping-007
    source: eng-fw-langgraph-docs
    supports: LangGraph documents semantics such as durable execution, interrupts, memory, and subgraphs as separate capabilities. Their distinct behavior is evidence against assuming that every construct has an exact canonical counterpart. The prohibition on silent coercion and the requirement to record unsupported semantics are Moonweave validation policy.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-mapping-008
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK assigns concrete behavior to handoffs, sessions, guardrails, results, traces, and spans. Preserving those distinctions requires an adapter to declare when no canonical construct is adequate. The SDK does not mandate Moonweave's no-silent-coercion rule; that rule is a conservative mapping constraint derived from the source's non-equivalent primitives.
    locator: OpenAI Agents SDK > Agents; Handoffs; Sessions; Results; Tracing
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-mapping-009
    source: eng-fw-langgraph-docs
    supports: A LangGraph mapping is meaningful only with the LangGraph construct family that supplies graph, state, persistence, subgraph, and execution semantics. This supports linking the mapping to a framework-specific adapter. The applies_to_adapter predicate and exactly-one cardinality are Moonweave normalization choices.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-mapping-010
    source: eng-fw-openai-python-docs
    supports: OpenAI SDK constructs such as Agent, Runner, Handoff, Session, Trace, and Span belong to the SDK runtime and must be interpreted through an OpenAI-specific adapter rather than as protocol-neutral core terms. The documentation does not prescribe Moonweave's applies_to_adapter edge or its one-to-one cardinality; both are ontology design inferences.
    locator: OpenAI Agents SDK > Agents; Running agents; Handoffs; Sessions; Tracing
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-mapping-011
    source: eng-fw-langgraph-docs
    supports: LangGraph documents persisted state and checkpoint snapshots for durable execution; those source fields are mapped explicitly in FrameworkMapping-example-positive-001.
    locator: Persistence > Checkpoints and StateSnapshot fields
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-mapping-012
    source: eng-fw-langgraph-repo
    supports: The official LangGraph repository release metadata pins version 1.2.5 for FrameworkMapping-example-positive-001; Moonweave defines the target concept and loss classification.
    locator: Releases > langgraph==1.2.5
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-mapping-013
    source: eng-fw-langgraph-docs
    supports: LangGraph's State, Node, Edge, and checkpoint constructs are framework/runtime APIs; they establish the included framework side of FrameworkMapping-example-boundary-001.
    locator: Graph API overview > State, Nodes, and Edges
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-mapping-014
    source: eng-proto-a2a-spec
    supports: The A2A specification defines interoperable AgentCard, Message, and Task wire objects; those protocol constructs form the excluded ProtocolMapping side of FrameworkMapping-example-boundary-001.
    locator: A2A specification > Agent Card; Message; Task objects
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-mapping-015
    source: eng-fw-langgraph-docs
    supports: FrameworkMapping-example-instance-001 uses the documented LangGraph checkpoint snapshot field families; Moonweave assigns the inherited MappingRule identity (mapping_rule_id plus version), target Checkpoint, and lossy classification without creating a shadow mapping_id.
    locator: Persistence > Checkpoints and StateSnapshot fields
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-mapping-016
    source: eng-fw-langgraph-repo
    supports: The official repository release metadata anchors the framework_version value 1.2.5 used by FrameworkMapping-example-instance-001.
    locator: Releases > langgraph==1.2.5
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-mapping-017
    source: eng-fw-langgraph-docs
    supports: LangGraph's graph, state, persistence, interrupt, memory, and subgraph constructs are framework/runtime APIs. They support the FrameworkMapping endpoint, whose identity depends on the named framework and release; they do not establish a wire-protocol message or interoperability binding. Treating this endpoint as a MappingRule sibling of ProtocolMapping is a Moonweave inference.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-mapping-018
    source: eng-proto-a2a-spec
    supports: The A2A specification defines a versioned protocol data model and binding requirements for Agent Cards, Messages, Tasks, and Artifacts, including interoperability expectations. That evidence supports the ProtocolMapping endpoint and not a framework runtime mapping. The shared MappingRule parent and the exact sibling boundary remain Moonweave design choices.
    locator: A2A Specification > 4 Protocol Data Model; 5 Protocol Binding Requirements and Interoperability
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-mapping-019
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK exposes versioned Agent, tool, handoff, session, and trace constructs whose mappings must be bound to an SDK profile. This supports an explicit applies-to relation between a FrameworkMapping rule and the FrameworkAdapter version that can execute it.
    locator: Agents SDK documentation > Agents, tools, handoffs, sessions, and tracing
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-mapping-020
    source: eng-std-opentelemetry-schemas
    supports: OpenTelemetry Telemetry Schemas requires identifiable schema versions and explicit transformations between versions. That evidence supports FrameworkMapping's inherited MappingRule requirements for source, target, direction, validity, and loss; the framework-specific subtype is Moonweave's design inference.
    locator: Telemetry Schemas > Schema URL, version number, and schema transformations
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
