        zh: FrameworkTraceMapping 仍由 adapter-plane 拥有，TraceRecord 仍由 runtime-plane 拥有；该 mapping 事实只建立跨域依赖，不转移规范所有权。运行时授权必须由具体 PolicyDecision、AuthorizationGrant 或协议会话证明。
        en: FrameworkTraceMapping remains owned by adapter-plane and TraceRecord by runtime-plane; this mapping fact establishes a cross-Domain dependency without transferring canonical ownership. Runtime authority must be evidenced by a concrete PolicyDecision, AuthorizationGrant, or protocol session.
        ja: FrameworkTraceMapping は adapter-plane、TraceRecord は runtime-plane に引き続き所有されます。この mapping 事実は正規所有権を移さずドメイン横断依存だけを表し、実行時権限には具体的な PolicyDecision、AuthorizationGrant、またはプロトコルセッションの証拠が必要です。
