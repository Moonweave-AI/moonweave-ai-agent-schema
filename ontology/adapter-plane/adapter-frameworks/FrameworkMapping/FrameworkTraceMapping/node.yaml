source_claims:
  - id: claim-framework-trace-mapping-001
    source: eng-fw-openai-tracing
    supports: FrameworkTraceMapping maps the Agents SDK trace hierarchy, span parentage and timing, and typed default spans to Moonweave observability concepts while preserving privacy omissions and custom attributes as residuals.
    locator: Tracing > Traces and spans; Default tracing
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-trace-mapping-002
    source: eng-fw-openai-python-docs
    supports: FrameworkTraceMapping remains separate from execution control because the Agents SDK documents tracing as observation of Runner, agent, generation, tool, guardrail, and handoff operations rather than the operations themselves.
    locator: Agents SDK documentation > Tracing and observability
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-trace-mapping-003
    source: eng-fw-openai-tracing
    supports: OpenAI Agents documents Trace fields, parented Span timing, and typed default spans; these are the source fields mapped by FrameworkTraceMapping-example-positive-001.
    locator: Tracing > Traces and spans; Default tracing
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-trace-mapping-004
    source: eng-fw-openai-agents-release
    supports: The official v0.17.3 release anchors the SDK version for FrameworkTraceMapping-example-positive-001; Moonweave defines the ontology targets and residual classification.
    locator: Releases > v0.17.3 release notes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-trace-mapping-005
    source: eng-fw-openai-tracing
    supports: The tracing guide describes handoff_span as an observed span type, establishing the telemetry side of FrameworkTraceMapping-example-boundary-001.
    locator: Tracing > Default tracing > handoff_span
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-trace-mapping-006
    source: eng-fw-openai-handoffs
    supports: The handoffs guide assigns target selection and input filtering to Handoff, establishing the excluded control-transfer side of FrameworkTraceMapping-example-boundary-001.
    locator: Handoffs > Creating a handoff and Input filters
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-trace-mapping-007
    source: eng-fw-openai-tracing
    supports: FrameworkTraceMapping-example-instance-001 uses the documented trace and span field families; Moonweave supplies mapping IDs, target types, and loss classification.
    locator: Tracing > Traces and spans
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-trace-mapping-008
    source: eng-fw-openai-agents-release
    supports: The v0.17.3 release record anchors the source version used in FrameworkTraceMapping-example-instance-001 and does not assert Moonweave's mapping target.
    locator: Releases > v0.17.3 release notes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-trace-mapping-009
    source: eng-fw-langgraph-docs
    supports: LangGraph distinguishes composition through subgraphs from durable and inspectable execution state. This makes control delegation and recorded execution two separable adapter concerns, but the documentation does not name Moonweave classes for either. Classifying handoff mappings by transferred control/context and trace mappings by trace/span/streaming telemetry evidence is a Moonweave semantic distinction.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-trace-mapping-010
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry defines traces as causally related spans with context propagation and timing. Those stable trace constructs support specializing FrameworkMapping for framework-emitted observability records while keeping checkpoints and business state outside the subtype.
    locator: Specification overview > Signals > Traces, spans, and context propagation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-trace-mapping-011
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry specifies trace identifiers, span identifiers, parent relationships, attributes, events, and timing. These fields support mapping a framework trace representation to TraceRecord when causal hierarchy and timestamps are preserved.
    locator: Specification overview > Distributed traces and span relationships
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
