schema: moonweave.ai/ontology-node/v1
id: FrameworkTraceMapping
kind: concept
status: accepted
labels:
  zh: 框架轨迹映射
  en: framework trace mapping
  ja: フレームワークトレース写像
semantics:
  short_definition:
    zh: 框架轨迹映射是把框架产生的端到端追踪、父子跨度及其带时间事件对齐到规范追踪记录的有向框架映射规则；检查点、恢复状态和控制流不属于该类。
    en: A FrameworkTraceMapping is a directional framework rule that aligns framework-emitted end-to-end traces, parented spans, and their timed events with canonical trace records; checkpoints, recoverable state, and control flow are outside this class.
    ja: FrameworkTraceMapping は、フレームワークが出力する end-to-end trace、親子 span、時刻付き event を標準 trace record へ対応付ける有向規則です。checkpoint、復元可能 state、control flow は対象外です。
  definition:
    zh: FrameworkTraceMapping 是 FrameworkMapping 的专门化，只处理框架生成的可观测性记录。它把一次端到端 trace、具有父子关系和起止时间的 span，以及 agent、generation、function、guardrail、handoff 等 span_data 映射为 Moonweave TraceRecord、TraceSpan 与 TraceEvent，并明确 trace_id、parent_id、group_id、时间、敏感数据策略和未支持的自定义属性；持久化 Checkpoint 不属于轨迹。
    en: FrameworkTraceMapping specializes FrameworkMapping for observability records emitted by a framework. It maps an end-to-end trace, parented spans with start and end times, and agent, generation, function, guardrail, or handoff span data to Moonweave TraceRecord, TraceSpan, and TraceEvent, while declaring trace_id, parent_id, group_id, timing, sensitive-data policy, and unsupported custom attributes; persisted checkpoints are not traces.
    ja: FrameworkTraceMapping は基盤が出力する可観測性記録だけを扱う FrameworkMapping の特殊化です。端到端 trace、親子関係と開始終了時刻を持つ span、agent・generation・function・guardrail・handoff の span_data を Moonweave TraceRecord・TraceSpan・TraceEvent へ写像し、trace_id、parent_id、group_id、時刻、機微データ方針、未対応属性を明示します。永続 Checkpoint はトレースではありません。
  why_needed:
    zh: 各框架的 trace/span 层级、事件类型和隐私开关不同；若直接合并，跨框架调试会把控制动作、状态快照与遥测记录混淆。专门映射能保持父子关系与来源字段，并在敏感输入输出被省略时显式标记证据缺口。
    en: Frameworks differ in trace/span hierarchy, event types, and privacy controls. Direct merging would conflate control actions, state snapshots, and telemetry. A dedicated mapping preserves parentage and source fields and explicitly marks evidence gaps when sensitive inputs or outputs are omitted.
    ja: 基盤ごとに trace/span 階層、イベント型、プライバシー設定が異なり、直接統合すると制御動作、状態スナップショット、遠隔測定が混同されます。専用写像は親子関係と元項目を保持し、機微入出力が省略された場合の証拠欠落を明示します。
  includes:
    - zh: 纳入具名框架版本的 trace、span 或遥测事件映射，且规则保留标识、父级、起止时间、事件类型、元数据、隐私/采样状态与有损字段。
      en: Includes mappings for trace, span, or telemetry events from a named framework version when the rule preserves identity, parent, timing, event type, metadata, privacy or sampling state, and lossy fields.
      ja: 特定基盤版の trace・span・遠隔測定イベントについて、識別子、親、時刻、イベント型、メタデータ、プライバシー／サンプリング状態、損失項目を保持する写像を含みます。
  excludes:
    - zh: 不包含执行控制权转移的 Handoff、用于恢复执行状态的 Checkpoint、原始日志文本或一次 TraceRecord 实例；这些分别属于交接映射、运行状态、日志信息或运行事实。
      en: Excludes Handoffs that transfer control, Checkpoints used to restore execution state, raw log text, and particular TraceRecord instances; these belong to handoff mapping, runtime state, log information, or runtime facts.
      ja: 制御を移す Handoff、実行状態を復元する Checkpoint、生ログ文字列、個別 TraceRecord インスタンスは含みません。それぞれ引継ぎ写像、実行状態、ログ情報、実行事実に属します。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: FrameworkTraceMapping-example-positive-001
    kind: positive
    labels:
      zh: 框架轨迹映射正例
      en: Positive example of framework trace mapping
      ja: フレームワークトレース写像の正例
    scenario_id: null
    descriptions:
      zh: 映射 `mapping-openai-trace` 针对 OpenAI Agents Python v0.17.3：Trace 的 workflow_name、trace_id、group_id 映射到 TraceRecord，Span 的 span_id、parent_id、started_at、ended_at 映射到 TraceSpan，具体 span_data 映射到相应 TraceEvent；自定义 processor 数据与被隐私设置省略的载荷记为残差。
      en: "Mapping `mapping-openai-trace` targets OpenAI Agents Python v0.17.3: Trace workflow_name, trace_id, and group_id map to TraceRecord; Span span_id, parent_id, started_at, and ended_at map to TraceSpan; typed span_data maps to the corresponding TraceEvent. Custom processor data and payloads omitted by privacy settings remain residuals."
      ja: "`mapping-openai-trace` は OpenAI Agents Python v0.17.3 を対象とし、Trace の workflow_name・trace_id・group_id を TraceRecord、Span の span_id・parent_id・started_at・ended_at を TraceSpan、型付き span_data を TraceEvent へ写像します。独自 processor データとプライバシー設定で省略された内容は差分です。"
    field_values:
      mapping_rule_id: rule-openai-agents-trace
      version: "1"
      source_construct: openai-agents:Trace
      target_construct: moonweave:TraceRecord
      direction: source-to-target
      mapping_kind: conditional
      valid_from: 2026-07-13T06:00:00.000Z
      mapping_id: mapping-openai-trace
      framework_version: 0.17.3
      loss_kind: lossy
    related_node_ids:
      - FrameworkTraceMapping
      - TraceRecord
    related_relation_ids:
      - FrameworkTraceMapping-maps_to-TraceRecord
    expected_result:
      zh: 该运行可查询 FrameworkTraceMapping 以及方向保持不变的事实 FrameworkTraceMapping-maps_to-TraceRecord。
      en: The run can query FrameworkTraceMapping together with direction-preserving fact FrameworkTraceMapping-maps_to-TraceRecord.
      ja: この実行では FrameworkTraceMapping と方向を保持した事実 FrameworkTraceMapping-maps_to-TraceRecord を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、FrameworkTraceMapping-maps_to-TraceRecord 的 canonical 方向、概念定义和可用字段值。
      en: This is a valid trace mapping because trace identity, parented span timing, and typed span data are mapped separately, while processor-specific and privacy-omitted payloads are retained as residuals rather than silently claimed as equivalent telemetry.
      ja: このシナリオは実際の運用文脈、FrameworkTraceMapping-maps_to-TraceRecord の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-framework-trace-mapping-003
      - claim-framework-trace-mapping-004
  - id: FrameworkTraceMapping-example-boundary-001
    kind: boundary
    labels:
      zh: 框架轨迹映射边界例
      en: Boundary case for framework trace mapping
      ja: フレームワークトレース写像の境界例
    scenario_id: null
    descriptions:
      zh: OpenAI Agents `Handoff` 对象选择目标智能体并通过工具调用转移会话控制；这是一项控制规范，不是遥测记录。只有 SDK 围绕它生成的 `handoff_span` 才进入轨迹映射，因此 Handoff 本体属于 FrameworkHandoffMapping。
      en: An OpenAI Agents Handoff selects a target Agent and transfers conversation control through a tool call; it is a control specification, not telemetry. Only the `handoff_span` emitted around it belongs to trace mapping, so Handoff itself is owned by FrameworkHandoffMapping.
      ja: OpenAI Agents の Handoff は対象 Agent を選びツール呼出しで会話制御を移す制御仕様で、遠隔測定ではありません。その周囲に出力される `handoff_span` だけがトレース写像対象で、Handoff 自体は FrameworkHandoffMapping に属します。
    field_values: {}
    related_node_ids:
      - FrameworkTraceMapping
      - TraceRecord
      - FrameworkHandoffMapping
    related_relation_ids:
      - FrameworkTraceMapping-maps_to-TraceRecord
    expected_result:
      zh: FrameworkHandoffMapping 保持其原有类型，验证器不得凭关系共现把它提升为 FrameworkTraceMapping。
      en: FrameworkHandoffMapping retains its own type; validation must not promote it to FrameworkTraceMapping from relation co-occurrence.
      ja: FrameworkHandoffMapping は元の型を維持し、関係の共起だけで FrameworkTraceMapping へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 FrameworkTraceMapping-maps_to-TraceRecord 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: The boundary names an actual contrast node and preserves the direction of FrameworkTraceMapping-maps_to-TraceRecord; only an explicit is_a fact or the complete differentia supports membership.
      ja: 境界例は実在する対照ノードを示し、FrameworkTraceMapping-maps_to-TraceRecord の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-framework-trace-mapping-005
      - claim-framework-trace-mapping-006
