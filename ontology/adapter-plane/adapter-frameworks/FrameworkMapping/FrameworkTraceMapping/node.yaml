      en: The inline rule instance uses inherited fields for a conditional, lossy OpenAI Agents Trace-to-TraceRecord mapping; framework_version 0.17.3 pins source semantics, and the instance is not an occurred Trace.
      ja: ノード内規則例は継承項目で OpenAI Agents Trace から TraceRecord への条件付き損失写像を示し、framework_version 0.17.3 で元意味を固定します。例自体は発生済み Trace ではありません。
    field_values:
      mapping_rule_id: rule-openai-agents-trace
      version: "1"
