source_claims:
  - id: claim-framework-handoff-mapping-001
    source: eng-fw-openai-handoffs
    supports: FrameworkHandoffMapping maps the OpenAI Agents Handoff target, tool trigger, optional typed input, and input filter to Moonweave transfer-of-control semantics while retaining SDK-specific callbacks as residuals.
    locator: Handoffs > Creating a handoff; Handoff inputs; Input filters
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-handoff-mapping-002
    source: eng-fw-openai-python-docs
    supports: FrameworkHandoffMapping is distinct from agents-as-tools because the Agents SDK documents handoffs as delegation of the conversation to a specialist, whereas an agent used as a tool returns control to its manager.
    locator: Agents SDK documentation > Agent orchestration and Handoffs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-handoff-mapping-003
    source: eng-fw-openai-handoffs
    supports: OpenAI Agents defines handoffs as model-visible tools targeting another Agent and documents input filtering; those mechanics are the source-side facts mapped by FrameworkHandoffMapping-example-positive-001.
    locator: Handoffs > Creating a handoff; Handoff inputs; Input filters
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-handoff-mapping-004
    source: eng-fw-openai-agents-release
    supports: The official release record pins v0.17.3 for the mapping example; the version pin is necessary because handoff filters and runtime behavior may evolve between SDK releases.
    locator: Releases > v0.17.3 release notes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-handoff-mapping-005
    source: eng-fw-openai-handoffs
    supports: The handoffs guide assigns target-agent and input-filter behavior to Handoff; this establishes the control-transfer side of FrameworkHandoffMapping-example-boundary-001.
    locator: Handoffs > Creating a handoff and Input filters
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-handoff-mapping-006
    source: eng-fw-openai-tracing
    supports: The tracing guide lists handoff spans among observed operations; a span records the event and remains distinct from the Handoff object that performs control transfer.
    locator: Tracing > Default tracing and handoff_span
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-handoff-mapping-007
    source: eng-fw-openai-handoffs
    supports: FrameworkHandoffMapping-example-instance-001 uses the documented Handoff, target Agent, tool representation, and input-filter semantics; Moonweave supplies the mapping identifiers and loss classification.
    locator: Handoffs > Creating a handoff; Customizing handoffs; Input filters
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-handoff-mapping-008
    source: eng-fw-openai-agents-release
    supports: The v0.17.3 release record is the version anchor for FrameworkHandoffMapping-example-instance-001; it does not define Moonweave's rule identifier or target concept.
    locator: Releases > v0.17.3 release notes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-handoff-mapping-009
    source: eng-fw-langgraph-docs
    supports: LangGraph documents subgraphs and durable, checkpointed execution as runtime constructs and presents LangSmith integration for inspecting execution. This establishes that control transfer between graph units and execution records are distinct external concerns, but it does not define Moonweave's FrameworkHandoffMapping or FrameworkTraceMapping classes. Their sibling split—delegated control and context versus recorded trace, span, and streaming telemetry—is a Moonweave mapping inference.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-handoff-mapping-010
    source: eng-fw-openai-handoffs
    supports: OpenAI Agents SDK documents handoffs as tools with target-agent selection, optional input types, tool-name customization, and input filtering. Those concrete source constructs support a specialized FrameworkHandoffMapping under FrameworkMapping; Moonweave defines the specialization boundary.
    locator: Handoffs > Basic usage, handoff() parameters, and input filters
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-handoff-mapping-011
    source: eng-fw-openai-handoffs
    supports: OpenAI Agents SDK states that a handoff is exposed to the model as a transfer tool and may filter the forwarded input. These operational elements support mapping a reviewed FrameworkHandoffMapping to Moonweave Handoff when actual control and responsibility transfer are preserved.
    locator: Handoffs > Handoffs as tools and handoff input filters
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
