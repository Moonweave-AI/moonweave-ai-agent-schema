    differentia:
      zh: 正向身份比较：父节点 FrameworkMapping：FrameworkHandoffMapping（semantic kind=specification，骨架 FrameworkHandoffMapping-is_a-FrameworkMapping）；FrameworkTraceMapping（semantic kind=specification，骨架 FrameworkTraceMapping-is_a-FrameworkMapping）。双端条件：FrameworkHandoffMapping 条件：“框架移交映射是一种框架映射规则；其区分条件是：框架交接映射是有方向的映射记录，用于把框架原生交接构造对齐到规范交接、责任转移、权限范围、可见上下文和结果归属术语”；FrameworkTraceMapping 条件：“作为框架映射规则，框架轨迹映射由这一事实区分：它是有方向的映射记录，用于把框架原生 trace、span 与流式遥测事件对齐到规范 TraceRecord、TraceSpan 与 TraceEvent，不包括持久化 checkpoint 或控制权转移”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent FrameworkMapping: FrameworkHandoffMapping (semantic kind=specification, backbone FrameworkHandoffMapping-is_a-FrameworkMapping); FrameworkTraceMapping (semantic kind=specification, backbone FrameworkTraceMapping-is_a-FrameworkMapping). Endpoint conditions: FrameworkHandoffMapping condition: “As a framework mapping, Framework handoff mapping is distinguished by the fact that it is a directional mapping record that aligns a framework-native handoff construct with canonical Handoff, responsibility transfer, authority scope, visible context, and result ownership terms”; FrameworkTraceMapping condition: “Framework trace mapping belongs to the framework mapping category and differs from broader members in that it is a directional mapping record that aligns framework-native trace, span, and streaming telemetry constructs with canonical TraceRecord, TraceSpan, and TraceEvent”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 FrameworkMapping：FrameworkHandoffMapping（semantic kind=specification、バックボーン FrameworkHandoffMapping-is_a-FrameworkMapping）；FrameworkTraceMapping（semantic kind=specification、バックボーン FrameworkTraceMapping-is_a-FrameworkMapping）。両端条件：FrameworkHandoffMapping の条件：「フレームワーク写像規則に属するフレームワーク引継ぎ写像は、次の事実を種差とします：フレームワーク引き継ぎ写像は方向を持つ写像記録で、フレームワーク固有の引き継ぎ構成を、標準の引き継ぎ、責任移転、権限範囲、可視文脈、結果帰属の用語へ対応付けます」；FrameworkTraceMapping の条件：「フレームワークトレース写像はフレームワーク写像規則として、次の条件により他の対象と区別されます：それは方向を持つ写像記録で、フレームワーク固有の trace、span、ストリーミング遠隔測定を標準 TraceRecord、TraceSpan、TraceEvent へ対応付け、永続 checkpoint と制御移転は対象外です」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-framework-handoff-mapping-009
