schema: moonweave.ai/ontology-node/v1
id: FrameworkHandoffMapping
kind: concept
status: accepted
labels:
  zh: 框架移交映射
  en: framework handoff mapping
  ja: フレームワーク引継ぎ写像
semantics:
  short_definition:
    zh: 框架移交映射是一种框架映射规则；其区分条件是：框架交接映射是有方向的映射记录，用于把框架原生交接构造对齐到规范交接、责任转移、权限范围、可见上下文和结果归属术语。
    en: As a framework mapping, Framework handoff mapping is distinguished by the fact that it is a directional mapping record that aligns a framework-native handoff construct with canonical Handoff, responsibility transfer, authority scope, visible context, and result ownership terms.
    ja: フレームワーク写像規則に属するフレームワーク引継ぎ写像は、次の事実を種差とします：フレームワーク引き継ぎ写像は方向を持つ写像記録で、フレームワーク固有の引き継ぎ構成を、標準の引き継ぎ、責任移転、権限範囲、可視文脈、結果帰属の用語へ対応付けます。
  definition:
    zh: 框架移交映射是 FrameworkMapping 的专门化，描述一个框架原生控制权转移构造如何对应 Moonweave Handoff。除源构造与版本外，它必须分别记录目标智能体选择、被转移任务、可见上下文过滤、权限与责任范围、返回路径以及有损语义；例如 OpenAI Agents 的 handoff 以工具形式暴露目标，并可通过 input_filter 改写转交输入。
    en: FrameworkHandoffMapping specializes FrameworkMapping for a framework-native transfer of control mapped to Moonweave Handoff. Besides source construct and version, it records target-agent selection, transferred task, visible-context filtering, authority and responsibility scope, return path, and lossy residuals; for example, an OpenAI Agents handoff is exposed as a tool and can rewrite forwarded input through an input filter.
    ja: FrameworkHandoffMapping は基盤固有の制御移転を Moonweave Handoff へ対応付ける FrameworkMapping の特殊化です。元構成と版に加え、対象エージェント選択、移転タスク、可視文脈フィルタ、権限・責任範囲、戻り経路、損失差分を記録します。例えば OpenAI Agents の handoff はツールとして公開され input filter で転送入力を変更できます。
  why_needed:
    zh: 各框架对“交接”的控制权、消息历史和返回语义并不相同。单独建模该规则可防止把 agent-as-tool、子图跳转、任务委派和真正的会话所有权转移混为一谈，并让上下文泄露与权限扩大能够被审计。
    en: Frameworks disagree on control ownership, history forwarding, and return behavior during a handoff. A dedicated rule prevents agents-as-tools, subgraph jumps, task delegation, and actual conversation ownership transfer from being conflated, and makes context leakage or authority expansion auditable.
    ja: 基盤ごとに handoff 中の制御所有、履歴転送、戻り動作が異なります。専用規則により agent-as-tool、サブグラフ遷移、タスク委派、会話所有権移転を混同せず、文脈漏洩や権限拡大を監査できます。
  includes:
    - zh: 纳入具名框架和版本中实际改变当前执行主体或会话责任方，并明确目标、转交输入、上下文过滤、权限范围和后续返回行为的映射规则。
      en: Includes mappings for a named framework version that actually change the current executor or conversation owner and specify target, forwarded input, context filtering, authority scope, and subsequent return behavior.
      ja: 特定基盤版で現在の実行主体または会話責任者を実際に変更し、対象、転送入力、文脈フィルタ、権限範囲、後続の戻り動作を指定する写像を含みます。
  excludes:
    - zh: 不包含保持原控制者的 agent-as-tool 调用、仅记录事件的 Trace/Span、同一主体内部的条件路由，也不包含一次已发生交接的运行实例；这些分别属于工具调用、轨迹映射、路由或运行事实。
      en: Excludes agent-as-tool calls that retain the manager, Trace or Span records that only observe events, conditional routing within one executor, and instances of handoffs that already occurred; these belong to tool invocation, trace mapping, routing, or runtime facts.
      ja: 管理者を保持する agent-as-tool 呼出し、観測だけを行う Trace/Span、同一主体内の条件分岐、既発生 handoff の実行インスタンスは含みません。それぞれツール呼出し、トレース写像、ルーティング、実行事実に属します。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: FrameworkHandoffMapping-example-positive-001
    kind: positive
    labels:
      zh: 框架移交映射正例
      en: Positive example of framework handoff mapping
      ja: フレームワーク引継ぎ写像の正例
    scenario_id: null
    descriptions:
      zh: 映射 `mapping-openai-handoff` 针对 OpenAI Agents Python v0.17.3：把 `Handoff` 目标智能体映射为接收者，把模型可见的 `transfer_to_<agent>` 工具调用映射为交接触发，把 input_filter 映射为可见上下文变换；工具包装与 SDK 回调细节记为有损残差。
      en: "Mapping `mapping-openai-handoff` targets OpenAI Agents Python v0.17.3: it maps the Handoff target agent to the recipient, the model-visible `transfer_to_<agent>` tool call to the handoff trigger, and input_filter to visible-context transformation; tool wrapping and SDK callback details are retained as lossy residuals."
      ja: "`mapping-openai-handoff` は OpenAI Agents Python v0.17.3 を対象とし、Handoff の対象 Agent を受領者、モデルに見える `transfer_to_<agent>` ツール呼出しを引継ぎトリガ、input_filter を可視文脈変換へ写像します。ツール包装と SDK コールバック詳細は損失差分として保持します。"
    field_values:
      mapping_rule_id: rule-openai-agents-handoff
      version: "1"
      source_construct: openai-agents:Handoff
      target_construct: moonweave:Handoff
      direction: source-to-target
      mapping_kind: conditional
      valid_from: 2026-07-13T06:00:00.000Z
      mapping_id: mapping-openai-handoff
      framework_version: 0.17.3
      loss_kind: lossy
    related_node_ids:
      - FrameworkHandoffMapping
      - Handoff
    related_relation_ids:
      - FrameworkHandoffMapping-maps_to-Handoff
    expected_result:
      zh: 该运行可查询 FrameworkHandoffMapping 以及方向保持不变的事实 FrameworkHandoffMapping-maps_to-Handoff。
      en: The run can query FrameworkHandoffMapping together with direction-preserving fact FrameworkHandoffMapping-maps_to-Handoff.
      ja: この実行では FrameworkHandoffMapping と方向を保持した事実 FrameworkHandoffMapping-maps_to-Handoff を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、FrameworkHandoffMapping-maps_to-Handoff 的 canonical 方向、概念定义和可用字段值。
      en: This is a valid handoff mapping because it separately records the receiving agent, model-visible transfer trigger, context transformation, and SDK-only residuals instead of treating an OpenAI Handoff object as identical to the ontology Handoff concept.
      ja: このシナリオは実際の運用文脈、FrameworkHandoffMapping-maps_to-Handoff の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-framework-handoff-mapping-003
      - claim-framework-handoff-mapping-004
  - id: FrameworkHandoffMapping-example-boundary-001
    kind: boundary
    labels:
      zh: 框架移交映射边界例
      en: Boundary case for framework handoff mapping
      ja: フレームワーク引継ぎ写像の境界例
    scenario_id: null
    descriptions:
      zh: OpenAI Agents 的 `handoff_span` 只记录一次交接事件的开始、结束和属性；它本身不选择接收智能体、不过滤转交输入，也不改变会话控制权。因此该构造应进入 FrameworkTraceMapping，而不能因为名称包含 handoff 就当作 FrameworkHandoffMapping。
      en: An OpenAI Agents `handoff_span` records timing and attributes for a handoff event; it does not select the receiving agent, filter forwarded input, or transfer conversation control. It belongs to FrameworkTraceMapping and is not a FrameworkHandoffMapping merely because its name contains handoff.
      ja: OpenAI Agents の `handoff_span` は引継ぎイベントの時刻と属性を記録するだけで、受領 Agent の選択、転送入力のフィルタ、会話制御の移転を行いません。名称に handoff があっても FrameworkTraceMapping の対象です。
    field_values: {}
    related_node_ids:
      - FrameworkHandoffMapping
      - Handoff
      - FrameworkTraceMapping
    related_relation_ids:
      - FrameworkHandoffMapping-maps_to-Handoff
    expected_result:
      zh: FrameworkTraceMapping 保持其原有类型，验证器不得凭关系共现把它提升为 FrameworkHandoffMapping。
      en: FrameworkTraceMapping retains its own type; validation must not promote it to FrameworkHandoffMapping from relation co-occurrence.
      ja: FrameworkTraceMapping は元の型を維持し、関係の共起だけで FrameworkHandoffMapping へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 FrameworkHandoffMapping-maps_to-Handoff 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: The boundary names an actual contrast node and preserves the direction of FrameworkHandoffMapping-maps_to-Handoff; only an explicit is_a fact or the complete differentia supports membership.
      ja: 境界例は実在する対照ノードを示し、FrameworkHandoffMapping-maps_to-Handoff の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-framework-handoff-mapping-005
      - claim-framework-handoff-mapping-006
  - id: FrameworkHandoffMapping-example-instance-001
    kind: instance
    labels:
      zh: 框架移交映射结构化实例
      en: Structured instance of framework handoff mapping
      ja: フレームワーク引継ぎ写像の構造化インスタンス
    scenario_id: null
    descriptions:
      zh: 节点内实例沿用 FrameworkMapping 与 MappingRule 字段，记录 `openai-agents:Handoff` 到 `moonweave:Handoff` 的有方向、有条件且有损映射；它是规则示例，不代表一次真实交接。
      en: The inline instance uses inherited FrameworkMapping and MappingRule fields for a directional, conditional, lossy mapping from `openai-agents:Handoff` to `moonweave:Handoff`; it illustrates a rule rather than an occurred handoff.
      ja: ノード内例は継承した FrameworkMapping・MappingRule 項目で `openai-agents:Handoff` から `moonweave:Handoff` への方向付き・条件付き・損失写像を示し、発生済み handoff ではありません。
    field_values:
      mapping_rule_id: rule-openai-agents-handoff
      version: "1"
      source_construct: openai-agents:Handoff
      target_construct: moonweave:Handoff
      direction: source-to-target
      mapping_kind: conditional
      valid_from: 2026-07-13T06:00:00.000Z
      mapping_id: mapping-openai-handoff
      framework_version: 0.17.3
      loss_kind: lossy
    related_node_ids:
      - FrameworkHandoffMapping
    related_relation_ids: []
    expected_result:
      zh: 字段值通过该 Concept 的结构与约束验证，且实例仅作为节点内说明信息显示。
      en: Field values satisfy the Concept structure contract, and the instance remains explanatory information on the node.
      ja: フィールド値は Concept の構造契約を満たし、インスタンスはノード内の説明情報として保持されます。
    why_valid_or_invalid:
      zh: 每个字段键与节点字段 ID 完全一致；单值直接取经审查样例，可重复字段按其基数组装为数组。
      en: Every field key exactly matches a node field ID; scalar values come from reviewed examples and repeatable fields are assembled as arrays according to cardinality.
      ja: 各フィールドキーはノードのフィールド ID と一致し、単一値はレビュー済み例から取得し、反復可能フィールドは基数に従って配列化します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-framework-handoff-mapping-007
      - claim-framework-handoff-mapping-008
