sibling_differentiation:
  - sibling_concept_id: BenchmarkAdapter
    shared_parent_concept_id: Adapter
    differentia:
      zh: 已审查兄弟区分：父节点 Adapter：FrameworkAdapter（semantic kind=capability，骨架 FrameworkAdapter-is_a-Adapter）；BenchmarkAdapter（semantic kind=capability，骨架 BenchmarkAdapter-is_a-Adapter）。双端条件：FrameworkAdapter 条件：“框架适配器是以如下事实为区分特征的适配器：它记录第一阶段候选框架的运行时、工作流、智能体开发包、多智能体协作、交接和追踪构造如何投影到规范本体”；BenchmarkAdapter 条件：“基准适配器是一种适配器；其区分条件是：它把基准任务、场景、环境、评分规则、指标、观察、用户模拟、产物和压力轴映射到评估剖面，同时不改变核心本体”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent Adapter: FrameworkAdapter (semantic kind=capability, backbone FrameworkAdapter-is_a-Adapter); BenchmarkAdapter (semantic kind=capability, backbone BenchmarkAdapter-is_a-Adapter). Endpoint conditions: FrameworkAdapter condition: “Framework adapter is an adapter; its differentiating condition is that it is a phase-1 seed adapter family for aligning framework-native agents, graph runtimes, crews, workflows, handoffs, traces, tools, memory, and subagent constructs to canonical ontology anchors”; BenchmarkAdapter condition: “As an adapter, Benchmark adapter is distinguished by the fact that it is an adapter family that maps benchmark tasks, scenarios, environments, scoring rubrics, metrics, observations, user simulations, artifacts, and pressure axes into evaluation profiles without changing ontology core”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 Adapter：FrameworkAdapter（semantic kind=capability、バックボーン FrameworkAdapter-is_a-Adapter）；BenchmarkAdapter（semantic kind=capability、バックボーン BenchmarkAdapter-is_a-Adapter）。両端条件：FrameworkAdapter の条件：「フレームワークアダプターはアダプターの一種であり、次の条件で区別されます：それは、第一段階の候補フレームワークにおける実行基盤、ワークフロー、エージェント開発キット、複数エージェント協調、引き継ぎ、トレース構成が標準本体へどう投影されるかを記録します」；BenchmarkAdapter の条件：「アダプターに属するベンチマークアダプターは、次の事実を種差とします：ベンチマークアダプタ族は、ベンチマークのタスク、シナリオ、環境、採点規則、指標、観測、ユーザーシミュレーション、成果物、負荷軸を評価プロファイルへ写像し、コアオントロジーを変更しません」。一方の成立は他方を証明しません。
    source_claims:
      - claim-framework-adapter-024
      - claim-framework-adapter-025
parent_relation: null
relations:
  - id: FrameworkAdapter-is_a-Adapter
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是一种
      en: is a
      ja: の一種である
    definitions:
      zh: 框架适配器 是一种 适配器。区分特征：框架适配器是把框架原生主体、任务、工具、状态和轨迹映射到统一概念的 Adapter。
      en: "framework adapter is a kind of adapter. Reviewed differentia: FrameworkAdapter is an Adapter that maps framework-native actors, tasks, tools, state, and traces to canonical concepts."
      ja: フレームワークアダプター は アダプター の一種です。審査済みの種差：FrameworkAdapter はフレームワーク固有の主体・タスク・ツール・状態・トレースを標準概念へ写像する Adapter です。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 分类继承不使用实例关系基数。
      en: Taxonomic inheritance does not use instance-relation cardinality.
      ja: 分類継承にはインスタンス関係の基数を用いません。
    inverse_reading:
      predicate: has_subtype
      labels:
        zh: 反向：是一种
        en: has subtype
        ja: 逆方向：の一種である
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: FrameworkAdapter-is_a-Adapter-example-positive-manual-001
        kind: positive
        labels:
          zh: 是一种人工正例
          en: Reviewed positive case for is a
          ja: の一種であるの審査済み正例
        scenario_id: null
        descriptions:
          zh: "`crewai-1.x-profile` 同时声明 Agent、Task、Crew、Process 和 Flow 的来源路径，将角色、任务、协作和状态分别映射，并记录未等价的回调字段，因而是框架适配能力。"
          en: "`crewai-1.x-profile` declares source paths for Agent, Task, Crew, Process, and Flow, maps role, task, collaboration, and state separately, and records non-equivalent callback fields, making it a framework-adapter capability."
          ja: "`crewai-1.x-profile` は Agent、Task、Crew、Process、Flow の元パスを宣言し、役割、タスク、協調、状態を別々に写像し、非同値 callback 項目を残すため framework-adapter 能力です。"
        field_values: {}
        related_node_ids:
          - FrameworkAdapter
          - Adapter
        related_relation_ids:
          - FrameworkAdapter-is_a-Adapter
        expected_result:
          zh: 该能力应沿 FrameworkAdapter → Adapter 的上位链分类。
          en: The capability follows the FrameworkAdapter to Adapter parent chain.
          ja: この能力は FrameworkAdapter から Adapter への親鎖で分類されます。
        why_valid_or_invalid:
          zh: 它面向具名框架版本提供可执行且经测试的构造转换，不把 CrewAI Agent 当作核心 Actor 的同义词。
          en: It provides executable, tested construct conversion for a named framework version without treating CrewAI Agent as a synonym for the core Actor.
          ja: 特定 framework 版に対する実行可能・試験済み変換を提供し、CrewAI Agent を中核 Actor の同義語にしないためです。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-framework-adapter-026
      - id: FrameworkAdapter-is_a-Adapter-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 是一种人工边界例
          en: Reviewed boundary case for is a
          ja: の一種であるの審査済み境界例
        scenario_id: null
        descriptions:
          zh: 一次运行中的 CrewAI `Agent` 对象只是外部框架对象；即使它具有 role 和 tools，也没有适配器版本、转换范围或损失清单。
          en: A CrewAI `Agent` object in one run is a framework-native object. Role and tools do not give it adapter version, conversion scope, or a loss manifest.
          ja: 一回の実行にある CrewAI `Agent` は framework 固有オブジェクトで、role と tools があっても adapter 版、変換範囲、損失一覧を持ちません。
        field_values: {}
        related_node_ids:
          - FrameworkAdapter
          - Adapter
        related_relation_ids:
          - FrameworkAdapter-is_a-Adapter
        expected_result:
          zh: 该对象不得被归为 FrameworkAdapter，只能由适配器映射。
          en: The object must not be classified as FrameworkAdapter; it can only be mapped by one.
          ja: このオブジェクトを FrameworkAdapter に分類せず、Adapter による写像対象として扱います。
        why_valid_or_invalid:
          zh: 被转换的产品对象与执行转换的能力处于不同本体范畴。
          en: A product object being converted and the capability performing conversion belong to different ontological categories.
          ja: 変換対象の製品オブジェクトと変換を行う能力は異なる本体範疇に属します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-framework-adapter-026
    source_claims:
      - claim-framework-adapter-026
