schema: moonweave.ai/ontology-node/v1
id: FrameworkAdapter
kind: concept
status: accepted
labels:
  zh: 框架适配器
  en: framework adapter
  ja: フレームワークアダプター
semantics:
  short_definition:
    zh: 框架适配器是一种适配器；其区分条件是：它把具名智能体开发框架版本中的原生智能体、图运行时、团队、工作流、交接、追踪、工具、记忆与子智能体构造对齐到规范本体锚点。
    en: Framework adapter is an adapter; its differentiating condition is that it is a phase-1 seed adapter family for aligning framework-native agents, graph runtimes, crews, workflows, handoffs, traces, tools, memory, and subagent constructs to canonical ontology anchors.
    ja: フレームワークアダプターはアダプターの一種であり、次の条件で区別されます：それは、第一段階の候補フレームワークにおける実行基盤、ワークフロー、エージェント開発キット、複数エージェント協調、引き継ぎ、トレース構成が標準本体へどう投影されるかを記録します。
  definition:
    zh: 框架适配器是一种把外部智能体开发框架的版本化构造投影到 Moonweave 核心概念的适配能力。它管理源框架标识与版本、构造级映射、方向与条件、未等价残差、覆盖报告和映射测试，使 Agent、工具、工作流、交接、状态、记忆与追踪能够被比较查询，同时不把任何产品对象复制成核心本体节点。
    en: FrameworkAdapter is an adapter capability that maps versioned constructs from an external agent-development framework to Moonweave ontology concepts. It owns framework identity and version, construct-level mappings, direction and conditions, non-equivalent residuals, coverage reports, and mapping tests so agents, tools, workflows, handoffs, state, memory, and traces can be compared without copying product objects into the core ontology.
    ja: FrameworkAdapter は外部エージェント開発基盤の版付き構成を Moonweave 本体概念へ写像する適配能力です。基盤識別子と版、構成単位の写像、方向と条件、非等価差分、網羅報告、写像試験を管理し、製品オブジェクトを中核本体へ複製せず Agent、ツール、ワークフロー、引継ぎ、状態、記憶、トレースを比較可能にします。
  why_needed:
    zh: 不同框架把相似词用于不同抽象层：CrewAI 的 Crew、LangGraph 的 Node、OpenAI Agents 的 Handoff 与 Deep Agents 的 SubAgent 都不能只靠名称归并。该概念提供共同的映射契约和版本边界，使产品差异可查、可测试、可升级，而核心本体保持稳定。
    en: "Frameworks reuse similar words at different abstraction levels: a CrewAI Crew, LangGraph Node, OpenAI Agents Handoff, and Deep Agents subagent cannot be merged by label. This concept supplies a common versioned mapping contract so product differences remain queryable, testable, and upgradable while the core ontology stays stable."
    ja: 基盤は異なる抽象段階で似た語を使います。CrewAI の Crew、LangGraph の Node、OpenAI Agents の Handoff、Deep Agents の subagent は名称だけで統合できません。この概念は共通の版付き写像契約を与え、製品差分を照会・試験・更新可能にしつつ中核本体を安定させます。
  includes:
    - zh: 纳入以某个具名智能体框架及兼容版本为源，并为其公开构造提供有类型目标、转换条件、覆盖状态和差异说明的适配能力。
      en: Includes adapter capabilities scoped to a named agent framework and compatible versions that provide typed targets, conversion conditions, coverage status, and residual explanations for its public constructs.
      ja: 特定のエージェント基盤と互換版を写像元とし、公開構成に型付き写像先、変換条件、網羅状態、差分説明を与える適配能力を含みます。
  excludes:
    - zh: 不包含评测数据集到评估剖面的 BenchmarkAdapter、协议消息到互操作概念的 ProtocolAdapter、通用 MappingRule，也不包含某次框架运行产生的 Agent 或 Trace 实例。
      en: Excludes BenchmarkAdapters that map evaluation datasets, ProtocolAdapters that map interoperability messages, reusable MappingRules, and Agent or Trace instances produced by a particular framework run.
      ja: 評価データ集合を写像する BenchmarkAdapter、相互運用メッセージを写像する ProtocolAdapter、再利用可能な MappingRule、個別基盤実行の Agent・Trace インスタンスは含みません。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: FrameworkAdapter-example-positive-001
    kind: positive
    labels:
      zh: 框架适配器正例
      en: Positive example of framework adapter
      ja: フレームワークアダプターの正例
    scenario_id: null
    descriptions:
      zh: 为 OpenAI Agents SDK 建立适配器时，记录 SDK 版本范围，并分别注册 Agent、Tool、Handoff、Guardrail、Session 与 Trace/Span 的映射条目；每条条目注明目标概念、方向、无法等价的字段和测试用例。该对象属于 FrameworkAdapter，而不是六个产品对象的集合实例。
      en: For an OpenAI Agents SDK integration, the adapter declares an SDK version range and registers separate mappings for Agent, Tool, Handoff, Guardrail, Session, and Trace/Span. Every entry names its target concept, direction, non-equivalent fields, and mapping tests; the resulting capability is a FrameworkAdapter, not an aggregate instance of the six product objects.
      ja: OpenAI Agents SDK 向け適配では SDK の版範囲を宣言し、Agent、Tool、Handoff、Guardrail、Session、Trace/Span ごとに写像を登録します。各項目は写像先、方向、非等価項目、試験を持ち、この能力が FrameworkAdapter であって六製品オブジェクトの集合実体ではありません。
    field_values:
      adapter_id: adapter-framework
      adapter_version: 2.0.0
      scope:
        - agent
        - tool
        - workflow
        - handoff
        - trace
      status: supported
    related_node_ids:
      - FrameworkAdapter
      - Adapter
      - FrameworkMapping
    related_relation_ids:
      - FrameworkAdapter-is_a-Adapter
      - FrameworkMapping-applies_to_adapter-FrameworkAdapter
    expected_result:
      zh: 该运行可查询 FrameworkAdapter 以及方向保持不变的事实 FrameworkAdapter-maps_agent_to-AgentActor。
      en: The run can query FrameworkAdapter together with direction-preserving fact FrameworkAdapter-maps_agent_to-AgentActor.
      ja: この実行では FrameworkAdapter と方向を保持した事実 FrameworkAdapter-maps_agent_to-AgentActor を共に照会できます。
    why_valid_or_invalid:
      zh: 对象满足具名框架、版本范围、构造级映射、差异记录与验证五项条件，且没有把外部类复制进本体，因此符合框架适配能力的定义。
      en: The object satisfies the named-framework, version-range, construct-mapping, residual, and validation conditions without importing external classes into the ontology, so it is a valid FrameworkAdapter.
      ja: 対象は基盤名、版範囲、構成単位写像、差分、検証の条件を満たし、外部クラスを本体へ取り込まないため FrameworkAdapter の正例です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-framework-adapter-003
      - claim-framework-adapter-004
      - claim-framework-adapter-005
  - id: FrameworkAdapter-example-boundary-001
    kind: boundary
    labels:
      zh: 框架适配器边界例
      en: Boundary case for framework adapter
      ja: フレームワークアダプターの境界例
    scenario_id: null
    descriptions:
      zh: 一个 AppWorld 导入器只把任务、应用状态、用户模拟器和状态检查评分映射到评估剖面；它不解释 AppWorld 作为智能体开发框架的 Agent、工具循环或工作流 API。该对象属于 BenchmarkAdapter，即使两者都使用 MappingRule，也不是 FrameworkAdapter。
      en: An AppWorld importer maps benchmark tasks, application state, the user simulator, and state-based checks into an evaluation profile. It does not interpret AppWorld as an agent-development framework with Agent, tool-loop, or workflow APIs, so it is a BenchmarkAdapter even though both adapter families use MappingRules.
      ja: AppWorld 取込器が評価タスク、アプリ状態、利用者シミュレータ、状態検査を評価プロファイルへ写像するだけで、Agent・ツールループ・ワークフロー API を解釈しない場合、それは BenchmarkAdapter です。MappingRule を共有しても FrameworkAdapter ではありません。
    field_values: {}
    related_node_ids:
      - FrameworkAdapter
      - AgentActor
      - BenchmarkAdapter
    related_relation_ids:
      - FrameworkAdapter-maps_agent_to-AgentActor
    expected_result:
      zh: BenchmarkAdapter 保持其原有类型，验证器不得凭关系共现把它提升为 FrameworkAdapter。
      en: BenchmarkAdapter retains its own type; validation must not promote it to FrameworkAdapter from relation co-occurrence.
      ja: BenchmarkAdapter は元の型を維持し、関係の共起だけで FrameworkAdapter へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 FrameworkAdapter-maps_agent_to-AgentActor 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: The boundary names an actual contrast node and preserves the direction of FrameworkAdapter-maps_agent_to-AgentActor; only an explicit is_a fact or the complete differentia supports membership.
      ja: 境界例は実在する対照ノードを示し、FrameworkAdapter-maps_agent_to-AgentActor の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-framework-adapter-006
      - claim-framework-adapter-007
  - id: FrameworkAdapter-example-instance-001
    kind: instance
    labels:
      zh: 框架适配器结构化实例
      en: Structured instance of framework adapter
      ja: フレームワークアダプターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: 节点内 `adapter-framework` 示例把 mapping version 2.0.0 与 agent、tool、workflow、handoff、trace 五类覆盖范围绑定，用于说明适配能力元数据；它既不是外部框架版本，也不是一次框架运行的实例。
      en: The inline `adapter-framework` example binds mapping version 2.0.0 to agent, tool, workflow, handoff, and trace coverage as adapter-capability metadata; it is neither an external framework release nor a framework-run instance.
      ja: ノード内の `adapter-framework` 例は写像版 2.0.0 と agent、tool、workflow、handoff、trace の範囲を適配能力メタデータとして結び、外部基盤版でも実行インスタンスでもありません。
    field_values:
      adapter_id: adapter-framework
      adapter_version: 2.0.0
      scope:
        - agent
        - tool
        - workflow
        - handoff
        - trace
      status: supported
    related_node_ids:
      - FrameworkAdapter
    related_relation_ids: []
    expected_result:
      zh: 字段值通过该 Concept 的结构与约束验证，且实例仅作为节点内说明信息显示。
      en: Field values satisfy the Concept structure contract, and the instance remains explanatory information on the node.
      ja: フィールド値は Concept の構造契約を満たし、インスタンスはノード内の説明情報として保持されます。
    why_valid_or_invalid:
      zh: 每个字段键与节点字段 ID 完全一致；单值直接取经审查样例，可重复字段按其基数组装为数组。
      en: Every field key exactly matches a node field ID; scalar values come from reviewed examples and repeatable fields are assembled as arrays according to cardinality.
      ja: 各フィールドキーはノードのフィールド ID と一致し、単一値はレビュー済み例から取得し、反復可能フィールドは基数に従って配列化します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-framework-adapter-008
      - claim-framework-adapter-009
external_mappings:
  - id: FrameworkAdapter-external-family-mapping
    system: Moonweave Agent Ontology v1
    external_identifier: legacy-v1:adapter-mapping:LangGraph-OpenAI-CrewAI-DeepAgents
    external_version: sha256:344b64a3cb2a2e14eefbfc499be6989f4944ec4d4757fc7e7738c1795bd2d91c
    canonical_target_ids:
      - Orchestrator
      - SubagentRole
      - Route
      - Handoff
      - TaskDistribution
      - RuntimeSession
      - TraceEvent
    mapping_kind: related
    scope:
      zh: 仅迁移冻结 v1 中框架聚合映射的概念覆盖，不主张 LangGraph、OpenAI、CrewAI 与 Deep Agents 构造彼此等价。
      en: Migrates only the Concept coverage of the frozen-v1 framework aggregate; it does not assert equivalence among LangGraph, OpenAI, CrewAI, and Deep Agents constructs.
      ja: 凍結 v1 のフレームワーク集約が持つ Concept 範囲だけを移行し、LangGraph、OpenAI、CrewAI、Deep Agents の構成が相互に同値だとは主張しません。
    direction: import-to-canonical
    loss_notes:
      zh: 族级记录不声明具体外部构造的逐字段语义；具体适配器节点的评审映射承担版本、范围与损失说明。
      en: The family-level record does not assert field-by-field semantics for concrete external constructs; reviewed concrete Adapter mappings carry version, scope, and loss details.
      ja: ファミリ単位の記録は具体的な外部構成のフィールド別意味を主張せず、版・範囲・損失は審査済み具体 Adapter 写像が担います。
    conversion_note:
      zh: 该族映射覆盖以下 canonical Concept：Orchestrator、SubagentRole、Route、Handoff、TaskDistribution、RuntimeSession、TraceEvent。具体构造仍须逐项版本审查。
      en: "This family mapping covers these canonical Concepts: Orchestrator, SubagentRole, Route, Handoff, TaskDistribution, RuntimeSession, TraceEvent. Concrete constructs still require version-specific review."
      ja: このファミリ写像は次の canonical Concept を対象とします：Orchestrator、SubagentRole、Route、Handoff、TaskDistribution、RuntimeSession、TraceEvent。具体的構成はバージョン別レビューが必要です。
    conformance:
      status: contract-tested
      test_id: FrameworkAdapter-external-family-mapping-contract-test
      method:
        zh: 验证族级映射只有一个 Adapter 所有者，且所有 canonical 目标与来源均可解析。
        en: Validates that the family mapping has one Adapter owner and that every canonical target and source resolves.
        ja: ファミリ写像が一つの Adapter 所有者を持ち、全 canonical 対象と出典を解決できることを検証します。
    status: accepted
    source_claims:
      - claim-framework-adapter-010
      - claim-framework-adapter-011
