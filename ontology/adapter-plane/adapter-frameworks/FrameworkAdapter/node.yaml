source_claims:
  - id: claim-framework-adapter-001
    source: eng-fw-crewai-docs
    supports: FrameworkAdapter is needed because CrewAI exposes several framework-native construct families whose fields and composition semantics require separate, versioned mappings to Moonweave concepts.
    locator: Build the basics > Agents; Flows; Tasks & Processes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-002
    source: eng-fw-deepagents-docs
    supports: "FrameworkAdapter also covers harness-native constructs: Deep Agents explicitly distinguishes planning, filesystem context, subagents, and memory from lower-level LangGraph runtime features."
    locator: Frameworks, runtimes, and harnesses > Agent harnesses
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-003
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK documents Agent, Tool, Handoff, Guardrail, Session, Trace, and Span as distinct public constructs. FrameworkAdapter-example-positive-001 therefore records one versioned construct-level mapping for each named SDK surface instead of claiming one framework-wide equivalence.
    locator: OpenAI Agents SDK > Agents; Tools; Handoffs; Guardrails; Sessions; Tracing > Traces and spans
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-framework-adapter-004
    source: eng-fw-crewai-docs
    supports: CrewAI's distinct Agents, Tasks, Crews, Processes, and Flows demonstrate why FrameworkAdapter-example-positive-001 requires construct-level mappings rather than one framework-wide equivalence.
    locator: Build the basics > Agents; Flows; Tasks & Processes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-005
    source: eng-fw-deepagents-docs
    supports: Deep Agents separates harness-level filesystem, planning, memory, and subagent behaviors from its LangGraph runtime; FrameworkAdapter-example-positive-001 preserves that abstraction boundary in each mapping.
    locator: Frameworks, runtimes, and harnesses > Agent harnesses
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-006
    source: eng-fw-crewai-docs
    supports: CrewAI documents framework-native Agent, Task, Crew, Process, and Flow abstractions; these illustrate the framework-construct side of FrameworkAdapter-example-boundary-001.
    locator: Build the basics > Agents; Flows; Tasks & Processes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-007
    source: eng-bench-appworld
    supports: AppWorld defines an interactive benchmark with apps, tasks, a simulated user, and state-based evaluation; those evaluation assets form the excluded BenchmarkAdapter side of FrameworkAdapter-example-boundary-001.
    locator: README > Benchmark environment, tasks, apps, and evaluation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-008
    source: eng-fw-crewai-docs
    supports: CrewAI's public Agents, Tasks, Crews, Processes, and Flows support the agent and workflow coverage families in FrameworkAdapter-example-instance-001; Moonweave assigns the adapter identifier and mapping version.
    locator: Build the basics > Agents; Flows; Tasks & Processes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-009
    source: eng-fw-deepagents-docs
    supports: Deep Agents' planning, filesystem, subagent, and interrupt surfaces show why framework-adapter coverage is multi-family and versioned in FrameworkAdapter-example-instance-001.
    locator: Configure the harness > Context management and Planning and delegation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-010
    source: eng-fw-crewai-docs
    supports: CrewAI documents a framework-specific vocabulary of Agents, Tasks, Crews, Flows, and Processes. It supports preserving the former framework-adapter family as external construct coverage under FrameworkAdapter, while showing that the frozen-v1 aggregate is not itself a CrewAI specification term. Equivalence and migration remain Moonweave compatibility decisions.
    locator: Documentation > Agents, tasks, crews, flows, and processes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-011
    source: eng-fw-deepagents-docs
    supports: Deep Agents defines its own planning, filesystem, context-management, subagent, and human-approval capabilities. This supplies a concrete framework construct surface represented through FrameworkAdapter, not a source-defined universal adapter class. Collapsing the legacy aggregate without asserting cross-framework equivalence is a Moonweave inference.
    locator: Deep Agents overview > Core capabilities; Context management; Delegation; Steering
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-012
    source: eng-fw-crewai-agents
    supports: CrewAI's Agent page defines an autonomous unit through role, goal, tools, memory, delegation, and execution controls. These source constructs support the CrewAI profile's agent and delegation correspondences; Task, Crew, Flow, and Process mappings require their respective CrewAI pages. CrewAIAdapter and all Moonweave targets are mapping choices.
    locator: Core Concepts > Agents > Overview of an Agent; Agent Attributes; Creating Agents
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-013
    source: eng-fw-crewai-docs
    supports: CrewAI's core-concepts index treats Agents, Tasks, Crews, Flows, Processes, collaboration, tools, memory, and tracing as distinct framework constructs. That separation supports a versioned CrewAI profile rather than copying CrewAI's taxonomy into the core ontology. The exact typed correspondences are Moonweave inferences.
    locator: Documentation > Agents, tasks, crews, flows, and processes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-014
    source: eng-fw-deepagents-docs
    supports: Deep Agents explicitly groups task planning, filesystem-backed context, long-term memory, subagents, tools/MCP, interrupts, and execution features. Those named capabilities are the source side of the Deep Agents profile. DeepAgentsAdapter and its typed Moonweave correspondences are not documentation terms.
    locator: Deep Agents overview > Core capabilities; Execution environment; Context management; Delegation; Steering
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-015
    source: eng-fw-deepagents-js-docs
    supports: The JavaScript Deep Agents overview documents planning, filesystem context, memory, subagents, MCP, and interrupts for the JS implementation. It supports an implementation- and version-specific external profile; it does not assert universal equivalence with the Python constructs or define Moonweave endpoint types.
    locator: Deep Agents JavaScript overview > Core capabilities; Context management; Delegation; Steering
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-016
    source: eng-fw-langchain-agents
    supports: LangChain's Agents guide defines create_agent, the model/tool loop, messages, middleware, runtime context, state, and structured output. These APIs support the source side of the LangChain profile. LangChainAdapter and the chosen Moonweave targets remain versioned mapping decisions.
    locator: LangChain Agents > Agent loop; create_agent; Middleware; Runtime context; Structured output
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-017
    source: eng-fw-langchain-repo
    supports: The LangChain repository identifies a versioned agent framework and its package and integration surface. It corroborates that LangChain construct mappings must be tied to a concrete release, while detailed message and middleware semantics come from the Agents guide. The canonical targets are not repository claims.
    locator: README > LangChain framework introduction; create_agent example; ecosystem packages
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-018
    source: eng-fw-langgraph-docs
    supports: LangGraph's overview defines durable execution, human-in-the-loop, memory, and graph-based orchestration as framework capabilities. It supports a LangGraph-specific profile and lifecycle/trace correspondences, while exact Graph, Node, state, checkpoint, and handoff mappings require API-level review and remain Moonweave inferences.
    locator: Overview > Durable execution, human-in-the-loop, memory, and subgraphs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-019
    source: eng-fw-langgraph-graph-api
    supports: The LangGraph Graph API separately specifies State, reducers, Nodes, normal and conditional Edges, Send, and Command. These terms provide concrete source identities for the LangGraph profile and prevent flattening them into one framework label. Their Moonweave targets, direction, and loss classification are mapping decisions.
    locator: Graph API overview > State; Nodes; Edges; Send; Command
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-020
    source: eng-fw-microsoft-agent-framework-current
    supports: The microsoft/agent-framework repository describes Python and .NET agents together with graph-based multi-agent workflows, executors, edges, state, checkpointing, tools, and observability. These versioned constructs support the Microsoft Agent Framework profile. Its adapter alias and canonical endpoints are Moonweave mappings.
    locator: README > What is Microsoft Agent Framework?; Core Concepts; Agents; Workflows
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-021
    source: eng-fw-microsoft-agent-framework-docs
    supports: Microsoft Learn distinguishes agent abstractions from workflow orchestration and documents workflow state and execution concepts. It corroborates the source-side semantic families represented in this profile; it does not define MicrosoftAgentFrameworkAdapter or assert one-to-one equivalence with Moonweave concepts.
    locator: Overview > Agents, workflows, state, and orchestration
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-022
    source: eng-fw-openai-handoffs
    supports: The OpenAI Agents SDK handoff guide defines handoffs as tool-represented delegation to a specific agent and specifies inputs, callbacks, enablement, and input filters. These are concrete source constructs for the handoff portion of the profile; sessions, traces, and spans require their dedicated SDK pages.
    locator: Handoffs > Creating a handoff; Handoff inputs; Input filters
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-023
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK introduction enumerates Agents, tools, handoffs, guardrails, Runner-managed execution, sessions, results, and tracing as distinct SDK primitives or features. This supports the profile's source inventory. OpenAIAgentsAdapter and the typed Moonweave correspondences are design inferences.
    locator: OpenAI Agents SDK > Why use the Agents SDK; Documentation index > Agents, Tools, Handoffs, Results, Sessions, Tracing
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-024
    source: eng-fw-crewai-docs
    supports: CrewAI separately documents Agents, Tasks, Crews, Flows, and Processes as framework-native execution and orchestration constructs. That evidence justifies treating the CrewAI-facing endpoint as a FrameworkAdapter concern; it says nothing about benchmark task worlds, scoring, or evaluation profiles. The shared Adapter parent and the formal boundary from BenchmarkAdapter are Moonweave design decisions.
    locator: Documentation > Agents, tasks, crews, flows, and processes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-025
    source: eng-bench-appworld
    supports: AppWorld's walkthrough defines task worlds, interactive API use, and agent evaluation as parts of a benchmark environment. Those sections support the BenchmarkAdapter side of the distinction, not a mapping of framework-native agent or runtime types. Making both endpoints siblings under Adapter is a Moonweave organizational inference.
    locator: README > AppWorld Walkthrough > Primer; Task Worlds; Interactive Coding and API Calls; Evaluating the Agent
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-framework-adapter-026
    source: eng-fw-crewai-agents
    supports: CrewAI documents product-native Agent roles, goals, tools, memory, delegation, and task behavior. Their product-specific field model supports the need for a versioned FrameworkAdapter conversion capability; it does not itself assert Moonweave's Adapter taxonomy.
    locator: Agents > Overview of an Agent and Agent Attributes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
