      owner_module_id: adapter-schema-export
      rationale:
        zh: 本行拥有 ProjectionAdapter、SchemaAdapter 与 SchemaProjectionRun：前者是 Adapter 的目标表示投影特化，SchemaAdapter 是其具体 schema 特化，投影运行应用跨格式 MappingRule 并可被 ConversionWarning 指向。完整边界仅含三条 accepted 关系；SchemaAdapter→Adapter 的弃用直连不再重复两段继承。
        en: This row owns ProjectionAdapter, SchemaAdapter, and SchemaProjectionRun. ProjectionAdapter is the target-representation specialization of Adapter; SchemaAdapter is its concrete schema specialization; and a projection run applies cross-format MappingRule while a ConversionWarning may point to the concrete SchemaAdapter. The complete boundary contains only the three accepted relations; the deprecated SchemaAdapter-to-Adapter shortcut no longer duplicates the two-step inheritance.
        ja: この行は ProjectionAdapter・SchemaAdapter・SchemaProjectionRun を所有します。ProjectionAdapter は Adapter の target-representation 特殊化、SchemaAdapter はその具体 schema 特殊化で、projection run は跨形式 MappingRule を適用し ConversionWarning は具体 SchemaAdapter を指せます。完全な境界は三つの承認済み関係だけで、非推奨 SchemaAdapter→Adapter 直結は二段階継承を重複しません。
