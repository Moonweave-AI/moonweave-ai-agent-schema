  key_notion:
    zh: 投影适配器
    en: Projection adapter
    ja: 投影アダプター
  owns_when:
    zh: 当对象表示的是从 canonical 本体到某个消费者表示的投影能力、目标 profile、投影运行或派生产物，并且其身份由目标表示、版本及所用规则共同决定时，由本模块拥有。
    en: Own an object when it represents a projection capability, target profile, projection run, or derived artifact from the canonical ontology to a consumer representation and its identity depends jointly on the target representation, version, and applied rules.
    ja: canonical 本体から利用者表現への投影能力、対象 profile、投影実行、派生成果物を表し、その同一性が対象表現・版・適用規則の組合せで決まる場合に本モジュールが所有します。
  references_when:
    zh: 其他模块在发布、渲染、交换或验证其 canonical 定义的派生表示时，引用相应投影 profile、运行和产物；被投影概念与关系的权威含义仍由原模块拥有。
    en: Other modules reference the relevant projection profile, run, and artifact when publishing, rendering, exchanging, or validating a derived representation of their canonical definitions; authoritative meaning of projected concepts and relations remains with the source modules.
    ja: 他モジュールが canonical 定義の派生表現を公開・描画・交換・検証するとき、対応する投影 profile・実行・成果物を参照します。投影された概念・関係の権威的意味は元モジュールが所有し続けます。
  boundary_decisions:
    - other_module_id: adapter-mapping-infrastructure
      subject_concept_ids:
