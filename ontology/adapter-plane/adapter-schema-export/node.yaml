  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - ProjectionAdapter
    allowed_backbone_predicates:
      - is_a
    flat_root_exception_concept_ids:
      - SchemaProjectionRun
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-adapter-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项复核确认本模块同时拥有可复用投影能力与一次投影运行，但两者具有不同存在条件。SchemaProjectionRun 由来源指纹、ProjectionAdapter 版本、目标方言、发生时间和结果界定，因此作为 activity 独立入口，并通过 uses cross-link 记录所用能力。
            en: Point-by-point review confirms that this module owns both reusable projection capabilities and individual projection runs, but they have different existence conditions. SchemaProjectionRun is identified by source fingerprint, ProjectionAdapter version, target dialect, occurrence time, and outcome, so it is an independent activity entry connected to the used capability by a uses cross-link.
            ja: 個別審査により、本 module は再利用可能な projection capability と個別 projection run の両方を所有しますが、存在条件は異なります。SchemaProjectionRun は source fingerprint・ProjectionAdapter version・target dialect・発生時刻・outcome で識別される独立 activity entry で、使用 capability は uses cross-link で記録します。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 结构复核将 ProjectionAdapter 保留在 Adapter 能力分类树，将 SchemaProjectionRun 保留为独立 activity 根。SchemaProjectionRun-uses-ProjectionAdapter 是一次运行引用某版本能力的事实，保持 cross-link，不承担父链。
            en: Structural review keeps ProjectionAdapter in the Adapter capability taxonomy and SchemaProjectionRun as an independent activity root. SchemaProjectionRun-uses-ProjectionAdapter records that one run used a capability version and remains a cross-link rather than parenthood.
            ja: 構造審査は ProjectionAdapter を Adapter capability taxonomy に、SchemaProjectionRun を独立 activity root に保持します。SchemaProjectionRun-uses-ProjectionAdapter は一回の run が capability version を使った事実で、親 chain ではなく cross-link とします。
  competency_questions:
    - id: adapter-schema-export-cq-constraint-projection-v3
      semantic_key: adapter-schema-export.constraint-projection
      primary_owner_module_id: adapter-schema-export
      related_module_ids:
        - adapter-mapping-infrastructure
      questions:
        zh: 某个 canonical 约束在指定目标格式中如何表达，是否存在不可表达部分？
        en: How is a canonical constraint expressed in a selected target format, and is any part inexpressible?
        ja: canonical 制約は指定した対象形式でどう表現され、表現不能な部分がありますか。
      query: Resolve the target profile and map each component of the canonical constraint to target constructs, collecting unsupported components.
      expected_assertion: Every constraint component has a target expression or an explicit inexpressible marker with a reason.
      evidence_binding:
        applicability: relation-backed
        owner_concept_ids:
          - SchemaAdapter
        related_concept_ids:
          - ConversionWarning
        relation_ids:
          - ConversionWarning-warns_about-SchemaAdapter
        not_applicable_reason: null
      positive_example_ids:
        - adapter-schema-export-cq-constraint-projection-v3-example-positive
      counterexample_ids:
        - adapter-schema-export-cq-constraint-projection-v3-example-counter
      source_claims:
        - claim-adapter-schema-export-009
        - claim-adapter-schema-export-010
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-adapter-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 每个约束组件必须有目标表达式或明确不可表达原因。
              en: Every constraint component needs a target expression or an explicit inexpressibility reason.
              ja: 各 constraint component に target expression または明示的表現不能理由を要求します。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 有损 override 通过 ConversionWarning-warns_about-SchemaAdapter 记录。
              en: Lossy overrides are recorded through ConversionWarning-warns_about-SchemaAdapter.
              ja: 有損 override は ConversionWarning-warns_about-SchemaAdapter で記録します。
    - id: adapter-schema-export-cq-round-trip-loss-v3
      semantic_key: adapter-schema-export.round-trip-loss
      primary_owner_module_id: adapter-schema-export
      related_module_ids:
        - runtime-artifacts
      questions:
        zh: 导出后再导入能否恢复原概念、关系方向、基数和受控值，损失具体在哪里？
        en: Can export followed by import restore concepts, relation direction, cardinality, and controlled values, and exactly where does loss occur?
        ja: 出力後に再取込すると概念、関係方向、基数、統制値を復元でき、損失は具体的にどこで生じますか。
      query: Compare canonical source fingerprints with the normalized round-trip graph across node identity, relation direction, cardinality, and value constraints.
      expected_assertion: The report lists exact preserved and lost semantics; a lossless result requires equality in all four dimensions.
      evidence_binding:
        applicability: relation-backed
        owner_concept_ids:
          - SchemaProjectionRun
        related_concept_ids:
          - SchemaArtifact
        relation_ids:
          - SchemaProjectionRun-produces-SchemaArtifact
        not_applicable_reason: null
      positive_example_ids:
        - adapter-schema-export-cq-round-trip-loss-v3-example-positive
      counterexample_ids:
        - adapter-schema-export-cq-round-trip-loss-v3-example-counter
      source_claims:
        - claim-adapter-schema-export-011
        - claim-adapter-schema-export-012
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-adapter-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 节点、方向、基数、受控值四维分别判定，不以节点数代替。
              en: Judge identity, direction, cardinality, and controlled values separately; node count is not a substitute.
              ja: identity・direction・cardinality・controlled value を別判定し node count で代替しません。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 只从 SchemaProjectionRun-produces-SchemaArtifact 追踪实际产物。
              en: Trace the actual artifact only through SchemaProjectionRun-produces-SchemaArtifact.
              ja: 実 artifact は SchemaProjectionRun-produces-SchemaArtifact のみで追跡します。
    - id: adapter-schema-export-cq-artifact-lineage-v3
      semantic_key: adapter-schema-export.artifact-lineage
      primary_owner_module_id: adapter-schema-export
      related_module_ids:
        - runtime-artifacts
      questions:
        zh: 一个导出文件由哪个 canonical 版本、投影配置和导出活动生成？
        en: Which canonical version, projection profile, and export activity generated an exported file?
        ja: ある出力ファイルは、どの canonical 版、投影プロファイル、出力活動から生成されましたか。
