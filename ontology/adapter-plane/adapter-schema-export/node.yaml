schema: moonweave.ai/ontology-node/v1
id: adapter-schema-export
kind: module
status: accepted
labels:
  zh: 表示投影与导出
  en: Representation projections and exports
  ja: 表現投影とエクスポート
semantics:
  short_definition:
    zh: 表示投影与导出把 canonical 本体中已经确定的概念、关系和约束转换为面向具体消费者的派生表示，包括前端视图、图中间表示、结构 Schema 与语义图导出。它拥有 ProjectionAdapter、投影规则、目标 profile、一次投影运行及其可追溯产物和语义损失；canonical 业务含义仍由原节点拥有，目标标准、方言和版本只作为投影配置与证据。
    en: Representation projections and exports transforms established canonical concepts, relations, and constraints into derived representations for specific consumers, including frontend views, graph intermediate representations, structural schemas, and semantic-graph exports. It owns ProjectionAdapters, projection rules, target profiles, individual projection runs, traceable artifacts, and recorded semantic loss; canonical business meaning remains with the source nodes, while target standards, dialects, and versions are projection configuration and evidence.
    ja: 表現投影とエクスポートは、確定済みの canonical 概念・関係・制約を、フロントエンド・ビュー、グラフ中間表現、構造 Schema、意味グラフ出力など、特定利用者向けの派生表現へ変換します。ProjectionAdapter、投影規則、対象 profile、個別投影実行、追跡可能な成果物と意味損失を所有しますが、canonical の業務意味は元ノードが所有し、対象標準・方言・版は投影設定と証拠に留めます。
  definition:
    zh: 表示投影与导出把 canonical 本体中已经确定的概念、关系和约束转换为面向具体消费者的派生表示，包括前端视图、图中间表示、结构 Schema 与语义图导出。它拥有 ProjectionAdapter、投影规则、目标 profile、一次投影运行及其可追溯产物和语义损失；canonical 业务含义仍由原节点拥有，目标标准、方言和版本只作为投影配置与证据。
    en: Representation projections and exports transforms established canonical concepts, relations, and constraints into derived representations for specific consumers, including frontend views, graph intermediate representations, structural schemas, and semantic-graph exports. It owns ProjectionAdapters, projection rules, target profiles, individual projection runs, traceable artifacts, and recorded semantic loss; canonical business meaning remains with the source nodes, while target standards, dialects, and versions are projection configuration and evidence.
    ja: 表現投影とエクスポートは、確定済みの canonical 概念・関係・制約を、フロントエンド・ビュー、グラフ中間表現、構造 Schema、意味グラフ出力など、特定利用者向けの派生表現へ変換します。ProjectionAdapter、投影規則、対象 profile、個別投影実行、追跡可能な成果物と意味損失を所有しますが、canonical の業務意味は元ノードが所有し、対象標準・方言・版は投影設定と証拠に留めます。
  why_needed:
    zh: 让同一套 canonical 语义能够稳定服务 UI、图计算、验证与代码生成，同时显式说明每种表示保留了什么、丢失了什么，以及由哪个版本的投影配置生成。
    en: Let one canonical semantics serve UI, graph processing, validation, and code generation consistently while stating what each representation preserves or loses and which versioned projection profile produced it.
    ja: 一つの canonical 意味を UI、グラフ処理、検証、コード生成へ一貫して供給し、各表現が保持・損失する内容と生成に用いた版付き投影 profile を明示します。
  includes:
    - zh: ProjectionAdapter 及其面向前端视图、Graph IR、结构 Schema、语义图等消费者表示的专门化能力，以及目标 profile、命名、类型和约束映射。
      en: ProjectionAdapter and its specialized capabilities for consumer representations such as frontend views, Graph IR, structural schemas, and semantic graphs, together with target profiles and naming, type, and constraint mappings.
      ja: ProjectionAdapter と、フロントエンド・ビュー、Graph IR、構造 Schema、意味グラフなどの利用者表現に向けた特殊化能力、および対象 profile、命名・型・制約写像を含みます。
    - zh: 使用确定适配器与规则的一次投影运行、生成产物、round-trip 验证、不可表达约束、有损投影报告和目标版本兼容性。
      en: Individual projection runs using identified adapters and rules, their generated artifacts, round-trip validation, inexpressible constraints, lossy-projection reports, and target-version compatibility.
      ja: 特定アダプターと規則を用いる個別投影実行、生成成果物、round-trip 検証、表現不能な制約、有損投影報告、対象版互換性を含みます。
  excludes:
    - zh: canonical 概念、关系、约束和实例的业务含义仍由各自 owner 维护；投影产物是派生表示，不得成为第二套权威本体或反向覆盖源节点。
      en: Business meaning of canonical concepts, relations, constraints, and instances remains with their owners; projection artifacts are derived representations and must neither become a second authoritative ontology nor overwrite source nodes.
      ja: canonical 概念・関係・制約・インスタンスの業務意味は各 owner が維持します。投影成果物は派生表現であり、第二の権威的本体になったり元ノードを上書きしたりしません。
    - zh: JSON Schema、OWL、SHACL、ShEx、Zod、Pydantic、UI 框架等目标技术的完整分类树、规范文档和版本不是业务概念；通用 Adapter、MappingRule 与映射验证仍归映射基础。
      en: Complete taxonomies, specification documents, and versions for targets such as JSON Schema, OWL, SHACL, ShEx, Zod, Pydantic, or UI frameworks are not business concepts; generic Adapter, MappingRule, and mapping validation remain in mapping foundations.
      ja: JSON Schema、OWL、SHACL、ShEx、Zod、Pydantic、UI framework など対象技術の完全な分類木・仕様文書・版は業務概念ではありません。共通 Adapter、MappingRule、写像検証は写像基盤に属します。
  semantic_kind: null
  aliases: []
purpose:
  zh: 以可追溯、版本化且不改变源语义的方式，为 UI、图处理、验证和代码消费者生成合适的派生表示。
  en: Produce suitable derived representations for UI, graph processing, validation, and code consumers in a traceable, versioned way that does not alter source semantics.
  ja: 元の意味を変更せず、追跡可能かつ版管理された方法で、UI、グラフ処理、検証、コード利用者向けの派生表現を生成します。
structure: null
examples:
  - id: adapter-schema-export-cq-constraint-projection-v3-example-positive
    kind: positive
    labels:
      zh: Zod Date 的显式有损投影（正例）
      en: Explicit lossy projection of Zod Date — accepted case
      ja: Zod Date の明示的有損投影（正例）
    scenario_id: null
    descriptions:
      zh: 投影 profile zod-to-jsonschema-2020-12 遇到 z.date()；它不声称直接等价，而是用 override 输出 type=string、format=date-time，并记录丢失 Date 对象身份与运行时校验语义的 ConversionWarning。
      en: Profile zod-to-jsonschema-2020-12 encounters z.date(); instead of claiming direct equivalence, an override emits type=string and format=date-time and a ConversionWarning records loss of Date-object identity and runtime validation semantics.
      ja: profile zod-to-jsonschema-2020-12 は z.date() に対し直接同値を主張せず、override で type=string・format=date-time を出力し、Date object identity と runtime validation 意味の損失を ConversionWarning に記録します。
    field_values:
      profile: zod-to-jsonschema-2020-12
      source_constraint: z.date()
      target_expression:
        type: string
        format: date-time
      unsupported_components:
        - Date object identity
        - runtime Date validation
      warning_id: warning-date-01
    related_node_ids:
      - SchemaAdapter
      - ConversionWarning
    related_relation_ids:
      - ConversionWarning-warns_about-SchemaAdapter
    expected_result:
      zh: 返回 1 个目标表达式和 1 个 ConversionWarning，告警列出 2 项不可恢复语义。
      en: Return one target expression and one ConversionWarning listing two unrecoverable semantics.
      ja: 1 target expression と、2 件の復元不能意味を列挙する 1 ConversionWarning を返します。
    why_valid_or_invalid:
      zh: 目标格式表达与不可表达部分都被逐项记录，没有把 override 当作无损等价。
      en: Both the target expression and inexpressible parts are recorded item by item; the override is not treated as lossless equivalence.
      ja: target expression と表現不能部分を項目別記録し、override を無損同値にしていません。
    synthetic: true
    verified_version: Zod 4 JSON Schema docs reviewed 2026-07-16
    source_claims:
      - claim-adapter-schema-export-003
      - claim-adapter-schema-export-004
  - id: adapter-schema-export-cq-constraint-projection-v3-example-counter
    kind: counterexample
    labels:
      zh: 用空 schema 静默吞掉 Date（反例）
      en: Silently replacing Date with an empty schema — rejected case
      ja: Date を空 schema で黙って置換（反例）
    scenario_id: null
    descriptions:
      zh: 候选设置 unrepresentable=any，把 z.date() 导出为 {}，却把覆盖率记为 100% 且没有 ConversionWarning。
      en: The candidate sets unrepresentable=any, exports z.date() as {}, reports 100% coverage, and emits no ConversionWarning.
      ja: 候補は unrepresentable=any で z.date() を {} に出力し、coverage 100% とし ConversionWarning を出しません。
    field_values:
      profile: zod-to-jsonschema-2020-12
      source_constraint: z.date()
      target_expression: {}
      reported_coverage: 1
      warning_count: 0
    related_node_ids:
      - SchemaAdapter
      - ConversionWarning
    related_relation_ids:
      - ConversionWarning-warns_about-SchemaAdapter
    expected_result:
      zh: 拒绝 100% 覆盖结论；空 schema 不保留 Date 约束，必须登记有损或不可表达。
      en: Reject the 100% coverage result; an empty schema preserves no Date constraint and must be marked lossy or inexpressible.
      ja: 100% coverage を拒否します。空 schema は Date 制約を保持せず、有損または表現不能として記録すべきです。
    why_valid_or_invalid:
      zh: Zod 官方文档明确 {} 等价于 unknown；候选因此扩大了接受集合。
      en: Zod documents {} as equivalent to unknown, so the candidate broadens the accepted set.
      ja: Zod docs は {} を unknown 相当とし、候補は受理集合を拡大しています。
    synthetic: true
    verified_version: Zod 4 JSON Schema docs reviewed 2026-07-16
    source_claims:
      - claim-adapter-schema-export-003
      - claim-adapter-schema-export-004
  - id: adapter-schema-export-cq-round-trip-loss-v3-example-positive
    kind: positive
    labels:
      zh: 数组约束的四维往返校验（正例）
      en: Four-dimensional round trip for array constraints — accepted case
      ja: array 制約の四次元 round trip（正例）
    scenario_id: null
    descriptions:
      zh: 源约束 minItems=1、maxItems=3、uniqueItems=true 导出为 Draft 2020-12 后再导入；源、产物与归一化结果在节点身份、关系方向、基数和受控值四维均一致。
      en: A source constraint with minItems=1, maxItems=3, and uniqueItems=true is exported to Draft 2020-12 and re-imported; source, artifact, and normalized result match in node identity, relation direction, cardinality, and controlled values.
      ja: minItems=1・maxItems=3・uniqueItems=true を Draft 2020-12 に出力し再取込した結果、node identity・relation direction・cardinality・controlled value の四次元が一致します。
    field_values:
      run_id: projection-run-204
      source_fingerprint: sha256:77c4
      artifact_fingerprint: sha256:5b1a
      roundtrip_fingerprint: sha256:77c4
      constraints:
        minItems: 1
        maxItems: 3
        uniqueItems: true
      dimension_results:
        node_identity: equal
        relation_direction: equal
        cardinality: equal
        controlled_values: equal
    related_node_ids:
      - SchemaProjectionRun
      - SchemaArtifact
    related_relation_ids:
      - SchemaProjectionRun-produces-SchemaArtifact
    expected_result:
      zh: 四个维度均为 equal，报告 loss_count=0；产物由 projection-run-204 唯一生成。
      en: All four dimensions are equal, loss_count is zero, and projection-run-204 uniquely produced the artifact.
      ja: 四次元すべて equal、loss_count=0 で、artifact は projection-run-204 が一意に生成します。
    why_valid_or_invalid:
      zh: 每项 JSON Schema 数组关键字均回到原值，且来源链通过 produces 关系可追踪。
      en: Every JSON Schema array keyword returns to its original value, and the produces relation traces the lineage.
      ja: 各 JSON Schema array keyword が元値に戻り、produces 関係で来歴を追跡できます。
    synthetic: true
    verified_version: JSON Schema Draft 2020-12
    source_claims:
      - claim-adapter-schema-export-005
      - claim-adapter-schema-export-006
  - id: adapter-schema-export-cq-round-trip-loss-v3-example-counter
    kind: counterexample
    labels:
      zh: 遗漏 uniqueItems 却声称无损（反例）
      en: Claiming lossless after dropping uniqueItems — rejected case
      ja: uniqueItems 欠落で無損と主張（反例）
    scenario_id: null
    descriptions:
      zh: 导出产物含 uniqueItems=true，但导入器只恢复 minItems 与 maxItems；报告仍以节点数相同为由给出 lossless=true。
      en: The exported artifact contains uniqueItems=true, but the importer restores only minItems and maxItems; the report still sets lossless=true because node counts match.
      ja: export artifact は uniqueItems=true を含むのに importer は minItems と maxItems だけを復元し、node count 一致だけで lossless=true とします。
    field_values:
      run_id: projection-run-205
      source_constraints:
        minItems: 1
        maxItems: 3
        uniqueItems: true
      roundtrip_constraints:
        minItems: 1
        maxItems: 3
      reported_lossless: true
      controlled_value_result: missing uniqueItems
    related_node_ids:
      - SchemaProjectionRun
      - SchemaArtifact
    related_relation_ids:
      - SchemaProjectionRun-produces-SchemaArtifact
    expected_result:
      zh: 拒绝 lossless=true；受控值维度不等，loss_count 至少为 1。
      en: Reject lossless=true; the controlled-value dimension differs and loss_count is at least one.
      ja: lossless=true を拒否し、controlled-value 次元が不等で loss_count は少なくとも 1 です。
    why_valid_or_invalid:
      zh: 相同节点数不能证明约束语义相同；uniqueItems 直接改变合法数组集合。
      en: Equal node counts do not prove equal constraint semantics; uniqueItems changes the valid array set.
      ja: 同じ node count は制約意味の同一性を証明せず、uniqueItems は valid array 集合を変えます。
    synthetic: true
    verified_version: JSON Schema Draft 2020-12
    source_claims:
      - claim-adapter-schema-export-005
      - claim-adapter-schema-export-006
  - id: adapter-schema-export-cq-artifact-lineage-v3-example-positive
    kind: positive
    labels:
      zh: 导出 schema 的完整来源链（正例）
      en: Complete lineage for an exported schema — accepted case
      ja: export schema の完全な来歴（正例）
    scenario_id: null
    descriptions:
      zh: 文件 agent-ontology.schema.json 记录生成活动 projection-run-209、profile json-schema-2020-12-strict、canonical version IRI 与源指纹 sha256:91af；产物指纹 sha256:bd20 单独保存。
      en: File agent-ontology.schema.json records generating activity projection-run-209, profile json-schema-2020-12-strict, canonical version IRI, and source fingerprint sha256:91af; artifact fingerprint sha256:bd20 is stored separately.
      ja: agent-ontology.schema.json は生成 activity projection-run-209、profile json-schema-2020-12-strict、canonical version IRI、source fingerprint sha256:91af を記録し、artifact fingerprint sha256:bd20 を別保存します。
    field_values:
      artifact_name: agent-ontology.schema.json
      export_run_id: projection-run-209
      target_profile: json-schema-2020-12-strict
      canonical_version_iri: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_fingerprint: sha256:91af
      artifact_fingerprint: sha256:bd20
    related_node_ids:
      - SchemaProjectionRun
      - SchemaArtifact
    related_relation_ids:
      - SchemaProjectionRun-produces-SchemaArtifact
    expected_result:
      zh: 恰好返回 1 条包含 run、profile、version IRI 与 source fingerprint 的来源链。
      en: Return exactly one lineage chain containing run, profile, version IRI, and source fingerprint.
      ja: run・profile・version IRI・source fingerprint を含む来歴 chain を一つだけ返します。
    why_valid_or_invalid:
      zh: 同名文件可由指纹区分，且 produces 方向从活动指向产物。
      en: Same-named files are distinguished by fingerprints, and produces points from activity to artifact.
      ja: 同名 file は fingerprint で区別され、produces は activity から artifact へ向きます。
    synthetic: true
    verified_version: JSON Schema Draft 2020-12
    source_claims:
      - claim-adapter-schema-export-007
      - claim-adapter-schema-export-008
  - id: adapter-schema-export-cq-artifact-lineage-v3-example-counter
    kind: counterexample
    labels:
      zh: 只凭文件名推断导出来源（反例）
      en: Inferring export lineage from filename alone — rejected case
      ja: file 名だけで export 来歴を推定（反例）
    scenario_id: null
    descriptions:
      zh: 仓库中有两个 agent-ontology.schema.json；候选只凭文件名选择较新的一个，未记录 ExportRun、profile、canonical version IRI 或源指纹。
      en: The repository has two files named agent-ontology.schema.json; the candidate selects the newer one by filename and records no ExportRun, profile, canonical version IRI, or source fingerprint.
      ja: repository に同名 agent-ontology.schema.json が二つあり、候補は file 名と更新時刻だけで選び、ExportRun・profile・canonical version IRI・source fingerprint を記録しません。
    field_values:
      artifact_name: agent-ontology.schema.json
      matching_files: 2
      selected_by: latest modified time
      export_run_id: null
      target_profile: null
      canonical_version_iri: null
      source_fingerprint: null
    related_node_ids:
      - SchemaProjectionRun
      - SchemaArtifact
    related_relation_ids:
      - SchemaProjectionRun-produces-SchemaArtifact
    expected_result:
      zh: 拒绝该来源链：四个必需标识全部缺失，且同名候选不唯一。
      en: Reject the lineage because all four required identifiers are missing and the same-named candidate is not unique.
      ja: 必須四識別子がなく同名候補も一意でないため来歴を拒否します。
    why_valid_or_invalid:
      zh: 文件名和修改时间不是生成关系证据，不能替代 produces 关系与指纹。
      en: Filename and modification time are not evidence of generation and cannot replace the produces relation and fingerprints.
      ja: file 名と更新時刻は生成 evidence でなく、produces 関係と fingerprint を代替できません。
    synthetic: true
    verified_version: JSON Schema Draft 2020-12
    source_claims:
      - claim-adapter-schema-export-007
      - claim-adapter-schema-export-008
parent_relation: null
relations: []
module_contract:
  interaction_contract:
    applicability: mixed
    facets:
      input:
        applicable: true
        description:
          zh: 模式导出的输入概念族为投影适配器、映射规则、工具；责任交接由已接受事实 模式投影运行 —uses→ 投影适配器 (SchemaProjectionRun-uses-ProjectionAdapter)；模式投影运行 —applies→ 映射规则 (SchemaProjectionRun-applies-MappingRule)；模式投影运行 —projects→ 工具 (SchemaProjectionRun-projects-Tool) 明确给出。
          en: The input families for Schema exports are Projection adapter, mapping rule, Tool; the accepted facts Schema projection run —uses→ Projection adapter (SchemaProjectionRun-uses-ProjectionAdapter); Schema projection run —applies→ mapping rule (SchemaProjectionRun-applies-MappingRule); Schema projection run —projects→ Tool (SchemaProjectionRun-projects-Tool) make the responsibility handoff explicit.
          ja: スキーマ出力の入力概念族は投影アダプター、写像規則、ツールです。責任の受け渡しは承認済み事実 スキーマ投影実行 —uses→ 投影アダプター (SchemaProjectionRun-uses-ProjectionAdapter)；スキーマ投影実行 —applies→ 写像規則 (SchemaProjectionRun-applies-MappingRule)；スキーマ投影実行 —projects→ ツール (SchemaProjectionRun-projects-Tool) により明示されます。
        family_concept_ids:
          - ProjectionAdapter
          - MappingRule
          - Tool
        relation_ids:
          - SchemaProjectionRun-uses-ProjectionAdapter
          - SchemaProjectionRun-applies-MappingRule
          - SchemaProjectionRun-projects-Tool
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 模式导出的输出概念族为模式产物；责任交接由已接受事实 模式投影运行 —produces→ 模式产物 (SchemaProjectionRun-produces-SchemaArtifact) 明确给出。
          en: The output families for Schema exports are schema artifact; the accepted facts Schema projection run —produces→ schema artifact (SchemaProjectionRun-produces-SchemaArtifact) make the responsibility handoff explicit.
          ja: スキーマ出力の出力概念族はスキーマ成果物です。責任の受け渡しは承認済み事実 スキーマ投影実行 —produces→ スキーマ成果物 (SchemaProjectionRun-produces-SchemaArtifact) により明示されます。
        family_concept_ids:
          - SchemaArtifact
        relation_ids:
          - SchemaProjectionRun-produces-SchemaArtifact
        not_applicable_reason: null
      failure:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不负责判定运行失败。其他范围发布或验证其 canonical 定义的机器可读投影时，引用对应导出配置和产物标识。
          en: This ontology does not own runtime-failure adjudication. Other scopes reference the relevant export profile and artifact identity when publishing or validating a machine-readable projection of their canonical definitions.
          ja: このオントロジーは実行失敗の判定を所有しません。他の範囲が canonical 定義の機械可読投影を公開・検証するとき、対応する出力プロファイルと成果物識別子を参照します。
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不负责启动恢复流程。其他范围发布或验证其 canonical 定义的机器可读投影时，引用对应导出配置和产物标识。
          en: This ontology does not initiate a recovery workflow. Other scopes reference the relevant export profile and artifact identity when publishing or validating a machine-readable projection of their canonical definitions.
          ja: このオントロジーは回復ワークフローを開始しません。他の範囲が canonical 定義の機械可読投影を公開・検証するとき、対応する出力プロファイルと成果物識別子を参照します。
    review:
