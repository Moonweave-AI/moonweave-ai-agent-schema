        - ConversionWarning
        - MappingRule
      decision: references
      owner_module_id: adapter-mapping-infrastructure
      rationale:
        zh: 本行引用映射基础设施拥有的 Adapter、ConversionWarning 与 MappingRule。它们通过三条 accepted 跨界事实分别连接 ProjectionAdapter、SchemaAdapter、SchemaProjectionRun：严格特化、格式损失警告和一次投影运行的规则应用。SchemaAdapter→Adapter 的旧直连已弃用，因为 SchemaAdapter→ProjectionAdapter→Adapter 已完整表达层级。
        en: "This row references Adapter, ConversionWarning, and MappingRule, all owned by mapping infrastructure. Three accepted cross-boundary facts connect them to ProjectionAdapter, SchemaAdapter, and SchemaProjectionRun: strict specialization, format-loss warning, and rule application by one projection run. The old direct SchemaAdapter-to-Adapter edge is deprecated because SchemaAdapter-to-ProjectionAdapter-to-Adapter already expresses the hierarchy completely."
        ja: この行は mapping infrastructure 所有の Adapter・ConversionWarning・MappingRule を参照します。三つの承認済み跨域事実が、それぞれ strict specialization・format-loss warning・一回の projection run による rule application として ProjectionAdapter・SchemaAdapter・SchemaProjectionRun へ接続します。旧 SchemaAdapter→Adapter 直結は SchemaAdapter→ProjectionAdapter→Adapter が階層を完全に表すため非推奨です。
