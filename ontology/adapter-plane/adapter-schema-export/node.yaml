            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 结构复核确认两行边界共享同一组三条 accepted 跨界边；deprecated SchemaAdapter-is_a-Adapter 只是两段继承的传递捷径，不能继续投影。
              en: Structure review confirms both boundary rows share the same three accepted cross-boundary edges. Deprecated SchemaAdapter-is_a-Adapter is only a transitive shortcut through the two-step hierarchy and cannot remain projected.
              ja: 構造審査は二つの boundary row が同じ三つの承認済み跨域辺を共有することを確認しました。非推奨 SchemaAdapter-is_a-Adapter は二段階継承の推移的 shortcut にすぎず、投影へ残せません。
