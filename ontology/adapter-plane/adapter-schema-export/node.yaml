              en: Schema export owns target-format profiles, constraint-projection rules, export activities, and round-trip loss judgments; runtime artifacts own generated file or graph identity, version, digest, and storage lineage. This record is limited to SchemaProjectionRun; their canonical owner is Schema exports (adapter-schema-export), so adapter-schema-export owns these concepts here.
