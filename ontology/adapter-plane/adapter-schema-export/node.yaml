      source_claims:
        - claim-adapter-schema-export-013
        - claim-adapter-schema-export-014
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-adapter-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 来源链必须同时给出 run、profile、version IRI 与 source fingerprint。
              en: Lineage must include run, profile, version IRI, and source fingerprint together.
              ja: lineage は run・profile・version IRI・source fingerprint を同時に含めます。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
