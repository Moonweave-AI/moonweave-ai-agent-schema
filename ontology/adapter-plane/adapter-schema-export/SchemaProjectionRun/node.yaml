schema: moonweave.ai/ontology-node/v1
id: SchemaProjectionRun
kind: concept
status: accepted
labels:
  zh: 模式投影运行
  en: Schema projection run
  ja: スキーマ投影実行
semantics:
  short_definition:
    zh: 模式投影运行是使用一个投影适配器生成一个可识别产物的一次性活动。
    en: A SchemaProjectionRun is one activity that uses a projection adapter to produce one identifiable projection artifact.
    ja: SchemaProjectionRun は一つの投影アダプターを用いて識別可能な投影成果物を生成する一回の活動である。
  definition:
    zh: 模式投影运行是具有开始、结束与结果状态的一次 activity：它绑定 canonical 来源指纹、一个 ProjectionAdapter 版本、一组实际采用的 MappingRule 和目标版本，执行投影并生成带校验摘要的 SchemaArtifact。它既不是 ProjectionAdapter 的下位类型，也不是其逻辑子项；uses、applies_rule 与 produces 分别作为 cross-link 指向本次发生涉及的能力、规则与产物。
    en: A SchemaProjectionRun is one activity with a start, finish, and outcome. It binds a canonical source fingerprint, one ProjectionAdapter version, the MappingRules actually applied, and a target version, then executes the projection and produces a SchemaArtifact with a validation summary. It is neither a subtype nor a logical child of ProjectionAdapter; uses, applies_rule, and produces remain cross-links to the capability, rules, and artifacts involved in that occurrence.
    ja: SchemaProjectionRun は開始・終了・結果を持つ一回の activity で、canonical 出典指紋、一つの ProjectionAdapter 版、実際に適用した MappingRule、対象版を固定し、検証要約付き SchemaArtifact を生成します。ProjectionAdapter の下位型でも論理子項でもなく、uses・applies_rule・produces は当該発生に関与する capability・rule・artifact への cross-link です。
  why_needed:
    zh: 记录每次运行才能回答“哪份源、哪版适配器和哪些规则生成了这个产物”，并把失败或有损结果归于一次执行而非能力定义。
    en: Recording each run answers which source, adapter version, and rules produced an artifact and assigns failure or loss to an execution rather than to the capability definition.
    ja: 各実行を記録することで、どの出典・アダプター版・規則が成果物を作ったかを説明し、失敗や損失を能力定義でなく実行へ帰属できる。
  includes:
    - zh: 纳入运行标识、源指纹、开始/完成时间、所用适配器与规则版本、目标版本、产物标识、结果状态和转换警告摘要。
      en: Includes run ID, source fingerprint, start and finish times, adapter and rule versions, target version, artifact identity, outcome status, and conversion-warning summary.
      ja: 実行 ID、出典指紋、開始・完了時刻、アダプター・規則版、対象版、成果物 ID、結果状態、変換警告要約を含む。
  excludes:
    - zh: 不纳入 ProjectionAdapter 或 MappingRule 规范、SchemaArtifact 产物、验证器能力，也不把多次重试合并成一条没有独立结果的运行。
      en: Excludes the ProjectionAdapter or MappingRule specification, the SchemaArtifact product, validator capability, and a bundle of retries lacking independently recorded outcomes.
      ja: ProjectionAdapter・MappingRule 仕様、SchemaArtifact 成果物、検証器能力、独立結果を持たない複数再試行の束は含まない。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - projection_run_id
  fields:
    - id: projection_run_id
      labels:
        zh: 投影运行标识
        en: projection run ID
        ja: 投影実行 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 一次模式投影运行的稳定唯一标识。
        en: Stable unique identifier of one schema-projection run.
        ja: 一回のスキーマ投影実行の安定一意識別子です。
      allowed_values: []
      pattern: null
      example_value: schema-projection-20260714-01
      source_claims:
        - claim-schema-projection-run-003
        - claim-schema-projection-run-004
    - id: source_fingerprint
      labels:
        zh: 源指纹
        en: source fingerprint
        ja: 出典フィンガープリント
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识本次运行实际读取的 canonical 来源状态，而不是仅记录逻辑来源名称。
        en: Identifies the exact canonical source state read by this run rather than only its logical source name.
        ja: 論理出典名だけでなく、この実行が実際に読んだ canonical source state を識別します。
      allowed_values: []
      pattern: null
      example_value: sha256:source-a
      source_claims:
        - claim-schema-projection-run-005
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 本次投影活动开始读取固定来源状态的时间。
        en: Time at which this projection activity began reading its fixed source state.
        ja: この投影活動が固定 source state の読取を開始した時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T03:00:00Z
      source_claims:
        - claim-schema-projection-run-006
    - id: finished_at
      labels:
        zh: 完成时间
        en: finished at
        ja: 完了時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 本次投影活动进入终态并固定结果摘要的时间。
        en: Time at which this projection activity reached a terminal state and fixed its result summary.
        ja: この投影活動が終端状態に達し結果要約を固定した時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T03:00:04Z
      source_claims:
        - claim-schema-projection-run-007
    - id: outcome
      labels:
        zh: 运行结果
        en: run outcome
        ja: 実行結果
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分成功、失败与取消终态，使产物要求能够按结果判断。
        en: Distinguishes succeeded, failed, and cancelled terminal states so artifact requirements can be evaluated against the outcome.
        ja: 成功・失敗・取消の終端状態を区別し、成果物要件を結果に応じて評価します。
      allowed_values:
        - id: SchemaProjectionRunOutcomeSucceeded
          value: succeeded
          labels:
            zh: 成功
            en: succeeded
            ja: 成功
          definitions:
            zh: 投影活动完成目标模式生成与既定校验，并固定成功结果摘要。
            en: The projection activity completed target-schema generation and required validation and fixed a successful result summary.
            ja: projection activity が target schema 生成と所定 validation を完了し、成功 result summary を固定した状態です。
          status: accepted
          source_claims:
            - claim-schema-projection-run-008
        - id: SchemaProjectionRunOutcomeFailed
          value: failed
          labels:
            zh: 失败
            en: failed
            ja: 失敗
          definitions:
            zh: 投影活动已终止，但生成或校验未满足成功条件，并固定失败原因。
            en: The projection activity terminated without satisfying generation or validation success conditions and fixed a failure reason.
            ja: projection activity は終了したが生成または validation の成功条件を満たさず、failure reason を固定した状態です。
          status: accepted
          source_claims:
            - claim-schema-projection-run-009
        - id: SchemaProjectionRunOutcomeCancelled
          value: cancelled
          labels:
            zh: 已取消
            en: cancelled
            ja: 取消済み
          definitions:
            zh: 投影活动在完成成功或失败判定前按取消请求终止，并记录取消原因。
            en: The projection activity terminated on a cancellation request before a success or failure determination and recorded the cancellation reason.
            ja: projection activity が成功・失敗判定前に cancellation request で終了し、取消理由を記録した状態です。
          status: accepted
          source_claims:
            - claim-schema-projection-run-010
      pattern: null
      example_value: succeeded
      source_claims:
        - claim-schema-projection-run-011
    - id: projection_adapter_version
      labels:
        zh: 投影适配器版本
        en: projection-adapter version
        ja: 投影アダプター版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次运行实际使用的 ProjectionAdapter 版本；关系给出适配器身份，本字段给出执行时版本。
        en: Pins the ProjectionAdapter version actually used by this run; the relation supplies adapter identity and this field supplies its execution-time version.
        ja: この実行が実際に用いた ProjectionAdapter 版を固定し、関係が adapter identity、本項目が実行時版を与えます。
      allowed_values: []
      pattern: null
      example_value: adapter-json-schema@2.0.0
      source_claims:
        - claim-schema-projection-run-012
    - id: target_schema_version
      labels:
        zh: 目标模式版本
        en: target schema version
        ja: 対象スキーマ版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识输出必须遵循的目标模式方言或语言版本。
        en: Identifies the target schema dialect or language version that the output must follow.
        ja: 出力が従う対象 schema dialect または言語版を識別します。
      allowed_values: []
      pattern: null
      example_value: JSON-Schema-2020-12
      source_claims:
        - claim-schema-projection-run-013
    - id: validation_summary
      labels:
        zh: 校验摘要
        en: validation summary
        ja: 検証要約
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录目标符合性检查、损失与警告计数以及验证器版本，不替代完整验证报告。
        en: Records target-conformance checks, loss and warning counts, and validator version without replacing the full validation report.
        ja: 対象適合検査、loss・warning 件数、validator 版を記録し、完全な validation report を置換しません。
      allowed_values: []
      pattern: null
      example_value:
        conforms: true
        warning_count: 1
        validator: json-schema-2020-12
      source_claims:
        - claim-schema-projection-run-014
  constraints:
    - id: schema-projection-run-terminal-order
      severity: error
      expression_language: plain
      expression: finished_at is not earlier than started_at
      explanations:
        zh: 完成时间不得早于开始时间。
        en: finished_at is not earlier than started_at.
        ja: finished_at は started_at より前であってはなりません。
      source_claims:
        - claim-schema-projection-run-015
    - id: schema-projection-run-success-produces-artifact
      severity: error
      expression_language: plain
      expression: outcome == 'succeeded' requires at least one SchemaProjectionRun-produces-SchemaArtifact fact; failed or cancelled runs do not fabricate a successful output
      explanations:
        zh: 成功运行至少产生一个 SchemaArtifact；失败或取消运行不得伪造成功产物。
        en: A succeeded run produces at least one SchemaArtifact; failed or cancelled runs do not fabricate a successful artifact.
        ja: 成功実行は少なくとも一つの SchemaArtifact を生成し、失敗・取消実行は成功成果物を捏造しません。
      source_claims:
        - claim-schema-projection-run-016
  required_relation_constraints:
    - id: schema-projection-run-uses-one-adapter
      direction: outgoing
      predicate: uses
      target_concept_id: ProjectionAdapter
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每次投影运行必须引用一个且仅一个 ProjectionAdapter 身份，并由 projection_adapter_version 固定其执行版本。
        en: Each projection run references exactly one ProjectionAdapter identity and pins its execution version through projection_adapter_version.
        ja: 各投影実行は一つの ProjectionAdapter ID を参照し、projection_adapter_version で実行版を固定します。
      source_claims:
        - claim-schema-projection-run-017
    - id: schema-projection-run-applies-rules
      direction: outgoing
      predicate: applies
      target_concept_id: MappingRule
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 每次投影运行必须列出实际采用的一个或多个版本化 MappingRule。
        en: Each projection run lists the one or more versioned MappingRules it actually applied.
        ja: 各投影実行は実際に適用した一つ以上の版付き MappingRule を列挙します。
      source_claims:
        - claim-schema-projection-run-018
    - id: schema-projection-run-produces-artifact
      direction: outgoing
      predicate: produces
      target_concept_id: SchemaArtifact
      cardinality:
        min: 0
        max: null
      explanations:
        zh: 每次成功的模式投影运行至少产生一个有身份、版本和来源指纹的 SchemaArtifact。
        en: Each successful schema-projection run produces at least one identity-bearing, versioned SchemaArtifact with a source fingerprint.
        ja: 成功した各スキーマ投影実行は同一性、版、出典指紋を持つ SchemaArtifact を少なくとも一つ生成します。
      source_claims:
        - claim-schema-projection-run-020
        - claim-schema-projection-run-021
examples:
  - id: SchemaProjectionRun-example-positive-001
    kind: positive
    labels:
      zh: 模式投影运行正例
      en: Positive example of Schema projection run
      ja: スキーマ投影実行の正例
    scenario_id: null
    descriptions:
      zh: schema-projection-20260714-01 固定源版本指纹 sha256:source-a，使用 adapter-json-schema@2.0.0，应用 MappingRule set-2020-12，把 Tool 的结构投影到 JSON-Schema-2020-12，并产生 SchemaArtifact artifact-tool-schema-01。四条关系分别记录 uses、applies、projects 与 produces。
      en: schema-projection-20260714-01 pins source fingerprint sha256:source-a, uses adapter-json-schema@2.0.0, applies MappingRule set-2020-12, projects Tool structure to JSON-Schema-2020-12, and produces SchemaArtifact artifact-tool-schema-01. Separate uses, applies, projects, and produces relations record the activity.
      ja: schema-projection-20260714-01 は出典指紋 sha256:source-a を固定し、adapter-json-schema@2.0.0 を使用し、MappingRule set-2020-12 を適用し、Tool 構造を JSON-Schema-2020-12 へ投影して SchemaArtifact artifact-tool-schema-01 を生成します。uses、applies、projects、produces の関係で活動を記録します。
    field_values:
      projection_run_id: schema-projection-20260714-01
      source_fingerprint: sha256:source-a
      started_at: 2026-07-16T03:00:00Z
      finished_at: 2026-07-16T03:00:04Z
      outcome: succeeded
      projection_adapter_version: adapter-json-schema@2.0.0
      target_schema_version: JSON-Schema-2020-12
      validation_summary:
        conforms: true
        warning_count: 1
        validator: json-schema-2020-12
    related_node_ids:
      - SchemaProjectionRun
      - MappingRule
      - ProjectionAdapter
      - Tool
      - SchemaArtifact
    related_relation_ids:
      - SchemaProjectionRun-applies-MappingRule
      - SchemaProjectionRun-uses-ProjectionAdapter
      - SchemaProjectionRun-projects-Tool
      - SchemaProjectionRun-produces-SchemaArtifact
    expected_result:
      zh: 运行可从源指纹、适配器和规则集重放，生成的 SchemaArtifact 带目标版本和回指运行的来源链。
      en: The run is reproducible from its source fingerprint, adapter, and rule set, and the generated SchemaArtifact carries the target version and provenance back to the run.
      ja: 出典指紋、アダプター、規則集合から実行を再現でき、生成 SchemaArtifact は対象版と実行への来歴を保持します。
    why_valid_or_invalid:
      zh: 它同时具备一次活动的独立身份、固定输入、使用能力、应用规则、被投影对象和输出产物，满足运行闭环而不复制适配器定义。
      en: It has an activity identity, fixed input, used capability, applied rule, projected object, and output artifact, closing the run lifecycle without duplicating the adapter definition.
      ja: 活動識別、固定入力、使用能力、適用規則、投影対象、出力成果物を持ち、アダプター定義を複製せず実行ライフサイクルを閉じます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-schema-projection-run-022
      - claim-schema-projection-run-023
  - id: SchemaProjectionRun-example-boundary-001
    kind: boundary
    labels:
      zh: 模式投影运行边界例
      en: Boundary case for Schema projection run
      ja: スキーマ投影実行の境界例
    scenario_id: null
    descriptions:
      zh: adapter-json-schema@2.0.0 只声明可复用映射能力、目标方言和损失政策；若没有 projection_run_id、固定源指纹、应用规则及产生的 SchemaArtifact，就不能把该适配器配置当作 SchemaProjectionRun。uses 关系说明运行依赖能力，不会改变两者类型。
      en: adapter-json-schema@2.0.0 declares reusable mapping capability, target dialect, and loss policy. Without a projection_run_id, pinned source fingerprint, applied rules, and produced SchemaArtifact, that adapter configuration is not a SchemaProjectionRun; uses expresses dependency without changing either type.
      ja: adapter-json-schema@2.0.0 は再利用能力、対象方言、損失方針だけを宣言します。projection_run_id、固定出典指紋、適用規則、生成 SchemaArtifact がなければ SchemaProjectionRun ではなく、uses は型変更ではなく依存を表します。
    field_values: {}
    related_node_ids:
      - SchemaProjectionRun
      - ProjectionAdapter
    related_relation_ids:
      - SchemaProjectionRun-uses-ProjectionAdapter
    expected_result:
      zh: ProjectionAdapter 保持 capability 类型；缺少运行闭环字段和 produces 关系的记录被拒绝作为 SchemaProjectionRun。
      en: ProjectionAdapter remains a capability, and a record lacking run-lifecycle data and a produces relation is rejected as a SchemaProjectionRun.
      ja: ProjectionAdapter は capability のままで、実行ライフサイクル情報と produces 関係のない記録は SchemaProjectionRun として拒否されます。
    why_valid_or_invalid:
      zh: 适配器可以被无限次复用，运行则有一次性的输入、状态和输出；uses 不能被误读为 is_a。
      en: An adapter is reusable across executions, whereas a run has one-time inputs, state, and outputs; uses must not be read as is_a.
      ja: アダプターは複数実行で再利用され、実行には一回限りの入力・状態・出力があります。uses を is_a と解釈してはなりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-schema-projection-run-024
      - claim-schema-projection-run-025
  - id: SchemaProjectionRun-example-instance-001
    kind: instance
    labels:
      zh: 模式投影运行结构化实例
      en: Structured instance of Schema projection run
      ja: スキーマ投影実行の構造化インスタンス
    scenario_id: null
    descriptions:
      zh: schema-projection-20260714-01 标识一次已完成投影，并通过 SchemaProjectionRun-produces-SchemaArtifact 指向至少一个带版本和源指纹的 SchemaArtifact。该实例只表示这次活动，适配器和产物继续拥有各自独立身份。
      en: schema-projection-20260714-01 identifies one completed projection and points through SchemaProjectionRun-produces-SchemaArtifact to at least one versioned SchemaArtifact carrying a source fingerprint. The instance denotes only this activity; adapter and artifact retain separate identities.
      ja: schema-projection-20260714-01 は一回の完了投影を識別し、SchemaProjectionRun-produces-SchemaArtifact で版と出典指紋を持つ一つ以上の SchemaArtifact を指します。インスタンスは活動だけを表し、アダプターと成果物は別の同一性を保ちます。
    field_values:
      projection_run_id: schema-projection-20260714-01
    related_node_ids:
      - SchemaProjectionRun
      - SchemaArtifact
    related_relation_ids:
      - SchemaProjectionRun-produces-SchemaArtifact
    expected_result:
      zh: 运行 ID 唯一且 produces 基数至少为 1，产物可回溯目标版本与源指纹，因此活动记录通过结构验证。
      en: The run ID is unique and produces has cardinality at least one; the artifact traces its target version and source fingerprint, so the activity record satisfies the contract.
      ja: 実行 ID は一意で produces 基数が一以上、成果物から対象版と出典指紋を追跡できるため、活動記録は契約を満たします。
    why_valid_or_invalid:
      zh: 该实例同时满足身份字段和必需输出关系，避免出现“有运行名称但没有任何结果”的悬空活动。
      en: The instance satisfies both its identity field and mandatory output relation, preventing a dangling activity with a run name but no result.
      ja: 同一性フィールドと必須出力関係の両方を満たし、実行名だけで結果のない孤立活動を防ぎます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-schema-projection-run-026
      - claim-schema-projection-run-027
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: SchemaProjectionRun-applies-MappingRule
    predicate: applies
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: applies
      en: applies
      ja: applies
    definitions:
      zh: 模式投影运行应用有版本范围和损失说明的映射规则。
      en: A schema-projection run applies mapping rules with version scope and loss declarations.
      ja: スキーマ投影実行は版範囲と損失宣言を持つ写像規則を適用します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: inverse_of_applies
      labels:
        zh: 反向 applies
        en: inverse applies
        ja: 逆 applies
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: SchemaProjectionRun-applies-MappingRule-example-positive-manual-001
        kind: positive
        labels:
          zh: applies人工正例
          en: Reviewed positive case for applies
          ja: appliesの審査済み正例
        scenario_id: null
