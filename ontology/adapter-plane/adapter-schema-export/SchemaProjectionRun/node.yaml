source_claims:
  - id: claim-schema-projection-run-001
    source: eng-ont-owl
    supports: OWL 2 distinguishes ontology structures, identified ontologies, and concrete exchange documents, motivating separate capability, activity, and artifact identities. SchemaProjectionRun's activity kind and its explanatory placement under the ProjectionAdapter it uses are Moonweave ontology decisions.
    locator: OWL 2 Overview §§2.1–2.3 and §3
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-schema-projection-run-002
    source: eng-val-jsonschema-spec
    supports: JSON Schema Core distinguishes schema resources from evaluation and output, grounding the need to model a projection execution separately from its target schema. SchemaProjectionRun's relations and activity kind are Moonweave choices.
    locator: JSON Schema Core 2020-12 §§4.3.1, 7.5, and 10
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-schema-projection-run-003
    source: eng-ont-owl
    supports: OWL 2 distinguishes ontology identity and version information from documents and tool behavior; SchemaProjectionRun therefore receives a separate Moonweave run identity rather than reusing an ontology or artifact identifier.
    locator: OWL 2 Overview §§2.1–2.3 and §3
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-schema-projection-run-004
    source: eng-val-jsonschema-spec
    supports: JSON Schema distinguishes a schema resource from each evaluation and its result; SchemaProjectionRun adopts a stable run identifier to keep one projection execution separate from its input schema and output artifact.
    locator: JSON Schema Core 2020-12 §§4.3.1, 7.5, and 10
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-schema-projection-run-005
    source: eng-ont-prov-o
    supports: PROV-O distinguishes an activity from the entities and revisions it used. Moonweave records a content fingerprint so one SchemaProjectionRun can be tied to the exact source state rather than an unversioned name.
    locator: "PROV-O > Starting Point Terms: Activity, Entity, used; Expanded Terms: Revision"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-schema-projection-run-006
    source: eng-ont-prov-o
    supports: PROV-O defines prov:startedAtTime for an Activity. SchemaProjectionRun specializes that activity boundary with one recorded start time.
    locator: PROV-O > Expanded Terms > startedAtTime
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-schema-projection-run-007
    source: eng-ont-prov-o
