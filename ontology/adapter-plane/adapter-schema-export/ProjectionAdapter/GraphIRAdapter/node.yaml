      why_valid_or_invalid:
        zh: 内部中间表示与标准化语义图语言的身份和符合性承诺不同。
        en: An internal intermediate representation and a standardized semantic-graph language have different identity and conformance commitments.
        ja: 内部中間表現と標準 semantic-graph 言語は識別・conformance 約束が異なります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-graph-ir-adapter-015
  source_claims:
