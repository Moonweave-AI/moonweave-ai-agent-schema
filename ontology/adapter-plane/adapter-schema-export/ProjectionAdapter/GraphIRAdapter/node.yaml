schema: moonweave.ai/ontology-node/v1
id: GraphIRAdapter
kind: concept
status: accepted
labels:
  zh: Graph IR 适配器
  en: Graph IR adapter
  ja: Graph IR アダプター
semantics:
  short_definition:
    zh: Graph IR 适配器把规范本体记录投影为保留身份、方向和来源的内部图中间表示。
    en: A GraphIRAdapter projects canonical ontology records into an internal graph IR that preserves identity, direction, and provenance.
    ja: GraphIRAdapter は canonical 本体記録を同一性・方向・来歴を保つ内部グラフ IR へ投影する。
  definition:
    zh: Graph IR 适配器是 ProjectionAdapter 的一种，将域、模块、概念、关系、状态和证据整理为供图算法及前端消费的内部节点—边记录。Graph IR 是可重建的中间表示：每个节点保留 canonical ID，每条边保留 source、predicate、target 与状态，证据仍附着于原对象；它不规定屏幕坐标，也不是 OWL、SHACL 或其他交换格式。
    en: "A GraphIRAdapter is a ProjectionAdapter that normalizes planes, modules, concepts, relations, status, and evidence into internal node-edge records for graph algorithms and downstream views. Graph IR is a rebuildable intermediate representation: nodes retain canonical IDs, edges retain source-predicate-target and status, and evidence remains attached to its owning object. It defines neither screen coordinates nor an OWL, SHACL, or other exchange syntax."
    ja: GraphIRAdapter は ProjectionAdapter の一種で、ドメイン、モジュール、概念、関係、状態、証拠をグラフ処理と下流表示向け内部ノード・辺記録へ正規化する。Graph IR は再構築可能な中間表現であり、canonical ID、source-predicate-target、状態、証拠所有を保持する。画面座標や OWL・SHACL 等の交換構文は定義しない。
  why_needed:
    zh: 独立的中间层使图算法无需解析各模块 JSON，同时可以逐条核对投影是否丢失节点、反转边或脱离来源。
    en: An explicit IR lets graph algorithms avoid parsing every module format while making dropped nodes, reversed edges, and detached provenance detectable.
    ja: 明示的 IR により各モジュール形式を直接解析せずにグラフ処理でき、ノード欠落、辺反転、来歴分離を検出できる。
  includes:
    - zh: 纳入 canonical 节点记录、带方向的关系记录、模块归属、审查状态、来源引用及可逆回指所需的内部字段。
      en: Includes internal records for canonical nodes, directed relations, module ownership, review status, source citations, and reversible pointers to source objects.
      ja: canonical ノード、有向関係、モジュール所有、審査状態、出典参照、元オブジェクトへの可逆ポインタを持つ内部記録を含む。
  excludes:
    - zh: 不纳入布局坐标、颜色、筛选和选中状态等 ViewModel 数据，也不把 RDF、OWL 或 SHACL 文档误称为 Moonweave Graph IR。
      en: Excludes ViewModel data such as coordinates, colors, filters, and selection state, and does not rename RDF, OWL, or SHACL documents as Moonweave Graph IR.
      ja: 座標、色、フィルタ、選択状態などの ViewModel データを含まず、RDF・OWL・SHACL 文書を Moonweave Graph IR と呼ばない。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: graph-ir-preserves-semantic-identity
      severity: error
      expression_language: plain
      expression: every Graph IR node retains its canonical id and owner; every relation record retains resolvable source, predicate, target, direction, status, and provenance; view coordinates and interaction state are excluded
      explanations:
        zh: 每个 Graph IR 节点必须保留规范 ID 与所有者，每条关系必须保留可解析的源端、谓词、目标端、方向、状态与来源；坐标和交互状态不得进入该中间表示。
        en: Every Graph IR node retains its canonical ID and owner, and every relation retains resolvable source, predicate, target, direction, status, and provenance; coordinates and interaction state are excluded.
        ja: 各 Graph IR ノードは canonical ID と所有者を保持し、各関係は解決可能な始点・述語・終点・方向・状態・来歴を保持します。座標と操作状態は中間表現から除外します。
      source_claims:
        - claim-graph-ir-adapter-003
        - claim-graph-ir-adapter-004
  required_relation_constraints: []
examples:
  - id: GraphIRAdapter-example-positive-001
    kind: positive
    labels:
      zh: Graph IR 适配器正例
      en: Positive example of Graph IR adapter
      ja: Graph IR アダプターの正例
    scenario_id: null
    descriptions:
      zh: 构建器把 GraphIRAdapter 与 ProjectionAdapter 各写成保留规范 ID 的节点，并把 GraphIRAdapter-is_a-ProjectionAdapter 写成 source=GraphIRAdapter、predicate=is_a、target=ProjectionAdapter 的有向关系记录；审查状态和两端来源声明附着在这条记录上。adapter-graph-ir@2.0.0 处理 nodes、relations、provenance 与 annotations。
      en: The builder emits GraphIRAdapter and ProjectionAdapter as nodes retaining their canonical IDs, then records GraphIRAdapter-is_a-ProjectionAdapter with source=GraphIRAdapter, predicate=is_a, and target=ProjectionAdapter. Review status and endpoint provenance stay attached to that directed record; adapter-graph-ir@2.0.0 covers nodes, relations, provenance, and annotations.
      ja: ビルダーは GraphIRAdapter と ProjectionAdapter を canonical ID を保持するノードとして出力し、GraphIRAdapter-is_a-ProjectionAdapter を source=GraphIRAdapter、predicate=is_a、target=ProjectionAdapter の有向関係として記録します。審査状態と端点の来歴はその記録に付属し、adapter-graph-ir@2.0.0 は nodes、relations、provenance、annotations を扱います。
    field_values:
      adapter_id: adapter-graph-ir
      adapter_version: 2.0.0
      scope:
        - nodes
        - relations
        - provenance
        - annotations
      status: supported
      schema_version: graph-ir@2
      loss_kind: lossy
    related_node_ids:
      - GraphIRAdapter
      - ProjectionAdapter
    related_relation_ids:
      - GraphIRAdapter-is_a-ProjectionAdapter
    expected_result:
      zh: 下游算法能够按 ID 找到两个端点并沿 is_a 的原方向遍历，同时回溯关系的审查状态与来源。
      en: Downstream algorithms resolve both endpoints by ID, traverse is_a in its original direction, and recover the relation's review status and provenance.
      ja: 下流処理は両端点を ID で解決し、is_a を元の方向にたどり、関係の審査状態と来歴を復元できます。
    why_valid_or_invalid:
      zh: 该记录完整保留身份、三元端点、方向、状态与来源，且没有混入坐标或高亮，因此满足可重建中间表示的契约。
      en: The record preserves identity, triple positions, direction, status, and provenance without importing coordinates or highlights, so it satisfies the rebuildable-IR contract.
      ja: 同一性、三項の位置、方向、状態、来歴を保持し、座標や強調表示を混入しないため、再構築可能な IR 契約を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-graph-ir-adapter-005
      - claim-graph-ir-adapter-006
  - id: GraphIRAdapter-example-boundary-001
    kind: boundary
    labels:
      zh: Graph IR 适配器边界例
      en: Boundary case for Graph IR adapter
      ja: Graph IR アダプターの境界例
    scenario_id: null
    descriptions:
      zh: 某导出记录包含 canonical_id 和关系端点，却同时写入 x、y、color、selected 与 collapsed，并试图把这些字段视为可跨构建复现的 Graph IR 语义。前四类是 FrontendViewAdapter 管理的展示状态，不能因与规范节点共存就进入 Graph IR 契约。
      en: An export record contains canonical_id and relation endpoints but also stores x, y, color, selected, and collapsed as supposedly reproducible Graph IR semantics. Those values are FrontendViewAdapter presentation state; coexisting with canonical nodes does not make them part of the Graph IR contract.
      ja: 出力記録が canonical_id と関係端点に加えて x、y、color、selected、collapsed を再現可能な Graph IR 意味として保存する場合、それは境界違反です。これらは FrontendViewAdapter の表示状態であり、canonical ノードと同居しても Graph IR 契約には入りません。
    field_values: {}
    related_node_ids:
      - GraphIRAdapter
      - ProjectionAdapter
      - FrontendViewAdapter
    related_relation_ids:
      - GraphIRAdapter-is_a-ProjectionAdapter
    expected_result:
      zh: 验证器拒绝这五个展示字段进入 Graph IR；规范 ID、端点、方向、状态和来源记录仍可正常导出。
      en: Validation rejects the five presentation fields from Graph IR while still exporting canonical IDs, endpoints, direction, status, and provenance.
      ja: 検証は五つの表示フィールドを Graph IR から排除し、canonical ID、端点、方向、状態、来歴の出力は維持します。
    why_valid_or_invalid:
      zh: 这些值由本次布局和用户交互决定，不是规范对象的身份或语义；允许它们进入 IR 会使同一本体产生不可比较的语义记录。
      en: The values depend on one layout run and user interaction rather than canonical identity or meaning; admitting them would make equivalent ontology builds produce incomparable semantic records.
      ja: 値は一回の配置計算と利用者操作に依存し、canonical な同一性や意味ではありません。IR に入れると同じオントロジーの構築結果が意味的に比較不能になります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-graph-ir-adapter-007
      - claim-graph-ir-adapter-008
  - id: GraphIRAdapter-example-instance-001
    kind: instance
    labels:
      zh: Graph IR 适配器结构化实例
      en: Structured instance of Graph IR adapter
      ja: Graph IR アダプターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: adapter-graph-ir 的 2.0.0 配置固定 graph-ir@2，并声明覆盖 nodes、relations、provenance 和 annotations。loss_kind=lossy 只表示不携带前端布局及瞬时交互状态；规范 ID、关系端点与方向不允许发生损失。
      en: The adapter-graph-ir 2.0.0 configuration pins graph-ir@2 and scopes output to nodes, relations, provenance, and annotations. loss_kind=lossy refers only to omitted frontend layout and transient interaction state; canonical IDs, relation endpoints, and direction are not permitted losses.
      ja: adapter-graph-ir 2.0.0 の設定は graph-ir@2 を固定し、nodes、relations、provenance、annotations を対象にします。loss_kind=lossy はフロントエンド配置と一時操作状態を省く意味だけで、canonical ID、関係端点、方向の欠落は許しません。
    field_values:
      adapter_id: adapter-graph-ir
      adapter_version: 2.0.0
      scope:
        - nodes
        - relations
        - provenance
        - annotations
      status: supported
      schema_version: graph-ir@2
      loss_kind: lossy
    related_node_ids:
      - GraphIRAdapter
    related_relation_ids: []
    expected_result:
      zh: 构建产物可被图算法和前端共同读取，并能逐条回指原始节点与关系；任何缺端点、反向或脱离来源的记录均失败。
      en: Graph algorithms and views can read the product and trace every record to its source node or relation; missing endpoints, reversed direction, or detached provenance fails validation.
      ja: 生成物はグラフ処理と表示の双方が読み取れ、各記録から元ノード／関係へ追跡できます。端点欠落、方向反転、来歴分離は検証失敗です。
    why_valid_or_invalid:
      zh: 版本、范围与损失说明把内部语义记录和展示状态清楚分开，同时保留了重建规范图所需的最小信息集合。
      en: Version, scope, and loss notes separate internal semantic records from presentation state while retaining the minimum information required to reconstruct the canonical graph.
      ja: 版、範囲、損失注記が内部意味記録と表示状態を分離し、canonical グラフ再構築に必要な最小情報を保持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-graph-ir-adapter-009
      - claim-graph-ir-adapter-010
external_mappings:
  - id: GraphIRAdapter-external-mapping
    system: Moonweave Graph IR
    external_identifier: graph-ir
    external_version: "2"
    canonical_target_ids:
      - GraphArtifact
      - GraphNode
      - GraphEdge
    mapping_kind: related
    scope:
      zh: 把 GraphArtifact、GraphNode 与 GraphEdge 投影为保留规范 ID、端点方向、审查状态、来源和内嵌注解的内部记录。
      en: Projects GraphArtifact, GraphNode, and GraphEdge into internal records retaining canonical IDs, endpoint direction, review status, provenance, and embedded annotations.
      ja: GraphArtifact、GraphNode、GraphEdge を canonical ID、端点方向、審査状態、来歴、埋め込み注釈を保持する内部記録へ投影します。
    direction: export-from-canonical
    loss_notes:
      zh: 渲染坐标、颜色、聚焦、筛选和瞬时选中状态被排除；规范 ID、关系端点、方向与来源不得损失。
      en: Renderer coordinates, colors, focus, filters, and transient selection are excluded; canonical IDs, relation endpoints, direction, and provenance must not be lost.
      ja: 描画座標、色、フォーカス、フィルター、一時選択を除外しますが、canonical ID、関係端点、方向、来歴の欠落は許しません。
    conversion_note:
      zh: graph-ir@2 从规范图单向、确定性生成；每条记录携带回指原对象的键，前端必须另行附加布局状态。
      en: graph-ir@2 is generated deterministically from the canonical graph, and every record carries a pointer back to its owner; frontend layout state must be attached separately.
      ja: graph-ir@2 は canonical グラフから決定的に生成され、各記録は所有元へのポインタを持ちます。フロントエンド配置状態は別途付加します。
    conformance:
      status: contract-tested
      test_id: GraphIRAdapter-mapping-contract-test
      method:
        zh: 验证外部版本、映射范围、方向、已知损失、唯一所有者、来源登记以及所有 canonical 目标 ID 的可解析性。
        en: Validates the external version, scope, direction, known loss, unique owner, registered source, and resolvability of every canonical target ID.
        ja: 外部版、範囲、方向、既知の損失、一意な所有者、登録出典、および全 canonical 対象 ID の解決可能性を検証します。
    status: accepted
    source_claims:
      - claim-graph-ir-adapter-011
      - claim-graph-ir-adapter-012
applicability:
  - adapter
sibling_differentiation:
  - sibling_concept_id: SchemaAdapter
    shared_parent_concept_id: ProjectionAdapter
    differentia:
      zh: 已审查兄弟区分：父节点 ProjectionAdapter：GraphIRAdapter（semantic kind=capability，骨架 GraphIRAdapter-is_a-ProjectionAdapter）；SchemaAdapter（semantic kind=capability，骨架 SchemaAdapter-is_a-ProjectionAdapter）。双端条件：GraphIRAdapter 条件：“Graph IR 适配器属于投影适配器，区别于其他同类对象的条件是：图谱中间表示适配器把本体域、模块、类、关系、溯源和适配映射投影到浏览器图谱中间表示，同时不改变规范本体语义”；SchemaAdapter 条件：“Schema 适配器属于投影适配器，区别于其他同类对象的条件是：模式适配器族把规范本体术语投影为结构化模式、语义图形状、语言剖面、图谱中间表示和前端视图，同时保留溯源和转换警告”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent ProjectionAdapter: GraphIRAdapter (semantic kind=capability, backbone GraphIRAdapter-is_a-ProjectionAdapter); SchemaAdapter (semantic kind=capability, backbone SchemaAdapter-is_a-ProjectionAdapter). Endpoint conditions: GraphIRAdapter condition: “Graph IR adapter is a Projection adapter whose defining condition is that it projects ontology planes, modules, classes, relations, provenance, and adapter mappings into the explorer Graph IR without changing canonical ontology semantics”; SchemaAdapter condition: “Schema adapter is a Projection adapter whose defining condition is that it is an adapter family that projects canonical ontology terms into structural schemas, semantic graph shapes, language profiles, Graph IR, and frontend views while preserving provenance and conversion warnings”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 ProjectionAdapter：GraphIRAdapter（semantic kind=capability、バックボーン GraphIRAdapter-is_a-ProjectionAdapter）；SchemaAdapter（semantic kind=capability、バックボーン SchemaAdapter-is_a-ProjectionAdapter）。両端条件：GraphIRAdapter の条件：「Graph IR アダプターは投影アダプターのうち、次の事実を定義条件とする対象です：グラフ中間表現アダプタは、オントロジーのドメイン、モジュール、クラス、関係、来歴、アダプタ写像をエクスプローラー用グラフ中間表現へ投影し、標準オントロジー意味を変更しません」；SchemaAdapter の条件：「Schema アダプターは投影アダプターのうち、次の事実を定義条件とする対象です：スキーマアダプタ族は、標準オントロジー用語を構造スキーマ、意味グラフ形状、言語プロファイル、グラフ中間表現、フロントエンド表示へ投影し、来歴と変換警告を保持します」。一方の成立は他方を証明しません。
    source_claims:
      - claim-graph-ir-adapter-013
      - claim-graph-ir-adapter-014
parent_relation:
  id: GraphIRAdapter-is_a-ProjectionAdapter
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: Graph IR 适配器是以其目标格式能力为区分特征的一种投影适配器。
    en: Graph IR adapter is a Projection adapter distinguished by its target-format capabilities.
    ja: Graph IR アダプターは対象形式能力で区別される投影アダプターです。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该语义事实不对所有运行实例施加统一基数。
    en: This semantic fact does not impose one universal cardinality on every runtime instance.
    ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: inverse_of_is_a
    labels:
      zh: 反向 is_a
      en: inverse is_a
      ja: 逆 is_a
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: GraphIRAdapter-is_a-ProjectionAdapter-example-positive-manual-001
      kind: positive
      labels:
        zh: is a人工正例
        en: Reviewed positive case for is a
        ja: is aの審査済み正例
      scenario_id: null
      descriptions:
        zh: "`graph-ir@2` 把 Concept ID、Relation predicate、source/target 方向和注释引用投影为稳定 GraphNode/GraphEdge，同时排除屏幕坐标与悬停状态。"
        en: "`graph-ir@2` projects Concept IDs, Relation predicates, source/target direction, and annotation references into stable GraphNode and GraphEdge records while excluding screen coordinates and hover state."
        ja: "`graph-ir@2` は Concept ID、Relation predicate、source/target 方向、annotation 参照を安定 GraphNode/GraphEdge へ投影し、画面座標・hover state を除外します。"
      field_values: {}
      related_node_ids:
        - GraphIRAdapter
        - ProjectionAdapter
      related_relation_ids:
        - GraphIRAdapter-is_a-ProjectionAdapter
      expected_result:
        zh: 该能力应归为 GraphIRAdapter，并继承 ProjectionAdapter 的保真与损失合同。
        en: The capability is classified as GraphIRAdapter and inherits ProjectionAdapter fidelity and loss contracts.
        ja: この能力は GraphIRAdapter に分類され ProjectionAdapter の fidelity・loss 契約を継承します。
      why_valid_or_invalid:
        zh: 其目标是供后续渲染器消费的中间图表示，而非正式外部 schema。
        en: Its target is an intermediate graph representation for downstream renderers rather than a formal external schema.
        ja: 対象が downstream renderer 用中間 graph 表現で、形式外部 schema ではないためです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-graph-ir-adapter-015
    - id: GraphIRAdapter-is_a-ProjectionAdapter-example-boundary-manual-001
      kind: boundary
      labels:
        zh: is a人工边界例
        en: Reviewed boundary case for is a
