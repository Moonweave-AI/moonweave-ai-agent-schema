      descriptions:
        zh: RDF/OWL 导出产生带 IRI 与公理语义的交换文档，并要求标准符合性；它不是内部 Graph IR。
        en: An RDF/OWL export produces an exchange document with IRI and axiom semantics and requires standards conformance; it is not internal Graph IR.
        ja: RDF/OWL export は IRI・axiom 意味を持つ交換文書と標準適合を要求し、内部 Graph IR ではありません。
      field_values: {}
      related_node_ids:
        - GraphIRAdapter
