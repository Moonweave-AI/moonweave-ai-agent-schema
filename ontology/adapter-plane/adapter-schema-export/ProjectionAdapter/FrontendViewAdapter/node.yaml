        en: "`explorer-view@2` projects canonical GraphNode and GraphEdge records into read-only labels, community colors, neighborhoods, and detail-panel references while preserving IDs and relation direction."
        ja: "`explorer-view@2` は canonical GraphNode/GraphEdge を read-only label、community color、neighborhood、detail-panel 参照へ投影し、元 ID と関係方向を保持します。"
