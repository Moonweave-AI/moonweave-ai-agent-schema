schema: moonweave.ai/ontology-node/v1
id: FrontendViewAdapter
kind: concept
status: review
labels:
  zh: 前端视图适配器
  en: frontend view adapter
  ja: フロントエンドビューアダプター
semantics:
  short_definition:
    zh: 前端视图适配器把规范图数据或 Graph IR 转成只供界面消费的视图模型。
    en: A FrontendViewAdapter turns canonical graph data or Graph IR into a presentation-only view model.
    ja: FrontendViewAdapter は canonical グラフデータまたは Graph IR を表示専用 ViewModel に変換する。
  definition:
    zh: 前端视图适配器是 ProjectionAdapter 的一种，负责从规范节点、关系及 Graph IR 派生检索项、三语标签、详情面板和可见邻域等 ViewModel 数据。它只决定展示与交互所需的信息形状；节点身份、边方向、来源声明和本体层级仍以规范图为准，布局坐标、折叠状态或高亮不能反写成新的本体事实。
    en: A FrontendViewAdapter is a ProjectionAdapter that derives search entries, localized labels, inspector records, and visible neighborhoods from canonical nodes, relations, and Graph IR. It owns the information shape needed by presentation and interaction, while node identity, edge direction, provenance, and taxonomy remain canonical; layout coordinates, collapsed state, and highlighting must never become ontology facts.
    ja: FrontendViewAdapter は ProjectionAdapter の一種で、canonical ノード・関係・Graph IR から検索項目、多言語ラベル、詳細パネル、可視近傍の ViewModel を導出する。表示と操作に必要な情報形状だけを担い、ノード同一性、辺方向、来歴、分類は canonical グラフに残す。座標、折畳み、高表示を本体事実へ逆流させない。
  why_needed:
    zh: 把展示派生物单独命名，可以审计界面是否忠实读取规范事实，也能防止筛选、布局和聚焦状态污染知识图谱。
    en: Naming this projection separately makes UI fidelity auditable and prevents filters, layout, and focus state from contaminating the knowledge graph.
    ja: 表示投影を独立させることで UI の忠実性を監査でき、フィルタ、配置、フォーカス状態による知識グラフ汚染を防げる。
  includes:
    - zh: 纳入只读图谱视图、目录条目、搜索索引条目、节点详情数据和社区图例等面向展示的派生记录。
      en: Includes read-only graph views, directory entries, search-index entries, node-detail records, and community legends derived for presentation.
      ja: 読取専用グラフ表示、ディレクトリ項目、検索索引項目、ノード詳細、コミュニティ凡例など表示用の派生記録を含む。
  excludes:
    - zh: 不纳入 Graph IR 本身、JSON Schema/OWL/SHACL/ShEx 导出、社区发现结果的知识含义，也不纳入任何新增或改写规范节点与关系的操作。
      en: Excludes Graph IR itself, JSON Schema/OWL/SHACL/ShEx exports, semantic interpretation of community detection, and any operation that creates or rewrites canonical nodes or relations.
      ja: Graph IR 自体、JSON Schema・OWL・SHACL・ShEx 出力、コミュニティ検出への意味付与、canonical ノードや関係を生成・変更する処理は含まない。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: frontend-view-no-semantic-writeback
      severity: error
      expression_language: plain
      expression: view-only coordinates, filters, selection, collapse, highlighting, and synthetic layout hubs never create, delete, retype, or redirect canonical ontology nodes or relations
      explanations:
        zh: 坐标、筛选、选中、折叠、高亮及布局辅助节点都只是视图状态，不得新增、删除、改型或改向规范本体节点与关系。
        en: Coordinates, filters, selection, collapse, highlighting, and synthetic layout hubs are view state only; they must not create, delete, retype, or redirect canonical ontology nodes or relations.
        ja: 座標、フィルター、選択、折り畳み、強調表示、配置用の補助ノードは表示状態に限り、canonical なノードや関係の生成・削除・型変更・方向変更に用いてはなりません。
      source_claims:
        - claim-frontend-view-adapter-003
        - claim-frontend-view-adapter-004
  required_relation_constraints: []
examples:
  - id: FrontendViewAdapter-example-positive-001
    kind: positive
    labels:
      zh: 前端视图适配器正例
      en: Positive example of frontend view adapter
      ja: フロントエンドビューアダプターの正例
    scenario_id: null
    descriptions:
      zh: 本体目录构建器读取 Graph IR 中的稳定节点 ID、关系方向和来源注解，生成三语标题、搜索条目、筛选项与同页检查面板；用户折叠社区或拖动节点只改变 ViewModel。该配置使用 adapter-explorer-view@2.0.0，并明确声明 explorer-view@2 是有损的展示投影。
      en: The ontology directory builder reads stable node IDs, relation directions, and provenance annotations from Graph IR, then derives localized titles, search entries, filters, and same-page inspector panels. Collapsing a community or dragging a node changes only the ViewModel; adapter-explorer-view@2.0.0 explicitly declares explorer-view@2 as a lossy presentation projection.
      ja: オントロジーディレクトリのビルダーは Graph IR の安定したノード ID、関係方向、来歴注釈を読み、翻訳済みタイトル、検索項目、フィルター、同一ページの検査パネルを生成します。コミュニティの折り畳みやノード移動は ViewModel だけを変更し、adapter-explorer-view@2.0.0 は explorer-view@2 を有損な表示投影として明示します。
    field_values:
      adapter_id: adapter-explorer-view
      adapter_version: 2.0.0
      scope:
        - localized-labels
        - filters
        - inspector-panels
      status: supported
      schema_version: explorer-view@2
      loss_kind: lossy
    related_node_ids:
      - FrontendViewAdapter
      - ProjectionAdapter
    related_relation_ids:
      - FrontendViewAdapter-is_a-ProjectionAdapter
    expected_result:
      zh: 浏览器得到可检索、可筛选的展示数据，规范节点 ID、关系方向和来源保持不变，任何交互状态都不会回写本体。
      en: The browser receives searchable and filterable presentation data while canonical node IDs, relation directions, and provenance remain unchanged; interaction state is never written back to the ontology.
      ja: ブラウザーは検索・絞り込み可能な表示データを受け取り、canonical なノード ID、関係方向、来歴は不変で、操作状態がオントロジーへ書き戻されることはありません。
    why_valid_or_invalid:
      zh: 它只派生展示所需的信息形状，并把拖拽、折叠和高亮限制在视图层，因此满足 FrontendViewAdapter 的只读投影边界。
      en: It derives only presentation information and confines drag, collapse, and highlight state to the view layer, satisfying the read-only projection boundary of FrontendViewAdapter.
      ja: 表示に必要な情報だけを派生し、移動・折り畳み・強調状態を表示層に閉じ込めるため、FrontendViewAdapter の読み取り専用投影境界を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-frontend-view-adapter-005
      - claim-frontend-view-adapter-006
  - id: FrontendViewAdapter-example-boundary-001
    kind: boundary
    labels:
      zh: 前端视图适配器边界例
      en: Boundary case for frontend view adapter
      ja: フロントエンドビューアダプターの境界例
    scenario_id: null
    descriptions:
      zh: 布局器为了让社区更易阅读，临时计算一个质心节点并给它加上紫色高亮。这个对象可以存在于浏览器内存，却不得导出为 GraphNode，也不得成为任何 is_a 或 part_of 关系的端点；否则展示辅助物会被误写成知识。
      en: To improve readability, the layout engine computes a temporary community-centroid node and highlights it in purple. That object may exist in browser memory, but it must not be exported as a GraphNode or used as an endpoint of any is_a or part_of relation; doing so would turn a presentation aid into asserted knowledge.
      ja: 配置エンジンが読みやすさのため一時的なコミュニティ重心ノードを作り紫色で強調しても、そのオブジェクトはブラウザー内に限られます。GraphNode として出力したり is_a／part_of の端点にしたりすると、表示補助が知識主張へ変わるため不適合です。
    field_values: {}
    related_node_ids:
      - FrontendViewAdapter
      - GraphIRAdapter
      - ProjectionAdapter
    related_relation_ids:
      - FrontendViewAdapter-is_a-ProjectionAdapter
    expected_result:
      zh: 质心、高亮和布局坐标留在 ViewModel 中；Graph IR 与规范本体均不出现相应节点或关系。
      en: The centroid, highlight, and coordinates remain in the ViewModel; neither Graph IR nor the canonical ontology contains a corresponding node or relation.
      ja: 重心、強調、座標は ViewModel に残り、Graph IR と canonical オントロジーのどちらにも対応するノードや関係は現れません。
    why_valid_or_invalid:
      zh: 该对象没有规范身份、来源或业务语义，只承担布局作用；将它提升为图谱节点会违反禁止语义回写的结构约束。
      en: The object has no canonical identity, provenance, or domain meaning and serves layout only; promoting it to a graph node would violate the no-semantic-writeback constraint.
      ja: このオブジェクトには canonical な同一性、来歴、業務意味がなく配置だけを担うため、グラフノードへ昇格すると意味書き戻し禁止制約に違反します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-frontend-view-adapter-007
      - claim-frontend-view-adapter-008
  - id: FrontendViewAdapter-example-instance-001
    kind: instance
    labels:
      zh: 前端视图适配器结构化实例
      en: Structured instance of frontend view adapter
      ja: フロントエンドビューアダプターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: 一个已登记的展示配置以 adapter-explorer-view 为身份，版本为 2.0.0，仅生成 localized-labels、filters 与 inspector-panels；schema_version 锁定 explorer-view@2，loss_kind=lossy 表明布局与交互状态不能反向恢复为规范事实。
      en: A registered presentation configuration is identified as adapter-explorer-view version 2.0.0 and is limited to localized-labels, filters, and inspector-panels. schema_version pins explorer-view@2, while loss_kind=lossy records that layout and interaction state cannot be reconstructed as canonical assertions.
      ja: 登録済み表示設定は adapter-explorer-view、版 2.0.0 として識別され、localized-labels、filters、inspector-panels だけを生成します。schema_version は explorer-view@2 を固定し、loss_kind=lossy は配置や操作状態を canonical な主張へ逆変換できないことを示します。
    field_values:
      adapter_id: adapter-explorer-view
      adapter_version: 2.0.0
      scope:
        - localized-labels
        - filters
        - inspector-panels
      status: supported
      schema_version: explorer-view@2
      loss_kind: lossy
    related_node_ids:
      - FrontendViewAdapter
    related_relation_ids: []
    expected_result:
      zh: 配置被识别为受支持的只读展示适配器，构建器只产出三个声明范围内的 ViewModel 部分。
      en: The record is recognized as a supported read-only presentation adapter, and the builder emits only the three declared ViewModel areas.
      ja: この記録は対応済みの読み取り専用表示アダプターとして認識され、ビルダーは宣言された三つの ViewModel 領域だけを出力します。
    why_valid_or_invalid:
      zh: 身份、版本、目标契约、范围和损失声明相互一致，且范围中没有写入、推理或修改规范图谱的能力。
      en: Identity, version, target contract, scope, and loss declaration agree, and the scope grants no capability to write, infer, or modify the canonical graph.
      ja: 同一性、版、対象契約、範囲、損失宣言が整合し、その範囲には canonical グラフを書き込み・推論・変更する能力が含まれません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-frontend-view-adapter-009
      - claim-frontend-view-adapter-010
external_mappings:
  - id: FrontendViewAdapter-external-mapping
    system: Moonweave Explorer ViewModel
    external_identifier: explorer-view
    external_version: "2"
    canonical_target_ids:
      - GraphArtifact
      - GraphNode
      - GraphEdge
    mapping_kind: related
    scope:
      zh: 从 GraphArtifact、GraphNode 与 GraphEdge 派生只读邻域、三语标签、筛选项和同页节点/关系详情。
      en: Derives read-only neighborhoods, localized labels, filters, and same-page node or relation details from GraphArtifact, GraphNode, and GraphEdge.
      ja: GraphArtifact、GraphNode、GraphEdge から読み取り専用近傍、多言語ラベル、フィルター、同一ページのノード／関係詳細を派生します。
    direction: export-from-canonical
    loss_notes:
      zh: 坐标、聚焦、折叠、高亮和筛选状态属于瞬时展示信息，不可用于重建或新增规范本体事实。
      en: Coordinates, focus, collapse, highlight, and filter state are transient presentation information and cannot reconstruct or create canonical ontology assertions.
      ja: 座標、フォーカス、折り畳み、強調、フィルター状態は一時的な表示情報であり、canonical なオントロジー主張の復元や生成には使えません。
    conversion_note:
      zh: explorer-view@2 仅从规范图及 Graph IR 单向生成；稳定 ID 与关系方向原样保留，界面状态不参与反向导入。
      en: "explorer-view@2 is generated one way from the canonical graph and Graph IR: stable IDs and relation direction are preserved, while interface state is excluded from reverse import."
      ja: explorer-view@2 は canonical グラフと Graph IR から一方向に生成され、安定 ID と関係方向を保持し、画面状態は逆取り込みから除外します。
    conformance:
      status: contract-tested
      test_id: FrontendViewAdapter-mapping-contract-test
      method:
        zh: 验证外部版本、映射范围、方向、已知损失、唯一所有者、来源登记以及所有 canonical 目标 ID 的可解析性。
        en: Validates the external version, scope, direction, known loss, unique owner, registered source, and resolvability of every canonical target ID.
        ja: 外部版、範囲、方向、既知の損失、一意な所有者、登録出典、および全 canonical 対象 ID の解決可能性を検証します。
    status: accepted
    source_claims:
      - claim-frontend-view-adapter-011
      - claim-frontend-view-adapter-012
applicability:
  - adapter
sibling_differentiation:
  - sibling_concept_id: GraphIRAdapter
    shared_parent_concept_id: ProjectionAdapter
    differentia:
      zh: 端点特定对照：父节点 ProjectionAdapter：FrontendViewAdapter（semantic kind=capability，骨架 FrontendViewAdapter-is_a-ProjectionAdapter）；GraphIRAdapter（semantic kind=capability，骨架 GraphIRAdapter-is_a-ProjectionAdapter）。双端条件：FrontendViewAdapter 条件：“前端视图适配器是一种投影适配器；其区分条件是：它把规范本体和图谱中间表示记录投影为浏览器视图、筛选、三语标签和检查面板，而不创造新的本体术语”；GraphIRAdapter 条件：“Graph IR 适配器属于投影适配器，区别于其他同类对象的条件是：图谱中间表示适配器把本体域、模块、类、关系、溯源和适配映射投影到浏览器图谱中间表示，同时不改变规范本体语义”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent ProjectionAdapter: FrontendViewAdapter (semantic kind=capability, backbone FrontendViewAdapter-is_a-ProjectionAdapter); GraphIRAdapter (semantic kind=capability, backbone GraphIRAdapter-is_a-ProjectionAdapter). Endpoint conditions: FrontendViewAdapter condition: “As a Projection adapter, Frontend view adapter is distinguished by the fact that it projects canonical ontology and Graph IR records into frontend explorer views, filters, localized labels, and inspector panels without creating new ontology terms”; GraphIRAdapter condition: “Graph IR adapter is a Projection adapter whose defining condition is that it projects ontology planes, modules, classes, relations, provenance, and adapter mappings into the explorer Graph IR without changing canonical ontology semantics”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 ProjectionAdapter：FrontendViewAdapter（semantic kind=capability、バックボーン FrontendViewAdapter-is_a-ProjectionAdapter）；GraphIRAdapter（semantic kind=capability、バックボーン GraphIRAdapter-is_a-ProjectionAdapter）。両端条件：FrontendViewAdapter の条件：「投影アダプターに属するフロントエンドビューアダプターは、次の事実を種差とします：フロントエンド表示アダプタは、標準オントロジーとグラフ中間表現の記録を、エクスプローラー表示、フィルタ、三言語ラベル、検査パネルへ投影し、新しいオントロジー用語を作りません」；GraphIRAdapter の条件：「Graph IR アダプターは投影アダプターのうち、次の事実を定義条件とする対象です：グラフ中間表現アダプタは、オントロジーのドメイン、モジュール、クラス、関係、来歴、アダプタ写像をエクスプローラー用グラフ中間表現へ投影し、標準オントロジー意味を変更しません」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-frontend-view-adapter-013
