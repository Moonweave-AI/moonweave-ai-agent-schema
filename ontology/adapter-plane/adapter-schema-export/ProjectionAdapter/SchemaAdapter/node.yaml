schema: moonweave.ai/ontology-node/v1
id: SchemaAdapter
kind: concept
status: accepted
labels:
  zh: Schema 适配器
  en: schema adapter
  ja: Schema アダプター
semantics:
  short_definition:
    zh: Schema 适配器是面向一种正式模式、本体或图形状语言的投影能力。
    en: A SchemaAdapter is a projection capability targeting a formal schema, ontology, or graph-shape language.
    ja: SchemaAdapter は形式スキーマ、本体、またはグラフ形状言語を対象とする投影能力である。
  definition:
    zh: Schema 适配器是 ProjectionAdapter 的一种，目标必须是具备明确版本、词汇和符合性规则的正式描述语言，例如 JSON Schema、OWL 2、SHACL 或 ShEx。它规定 canonical 字段、概念、关系或约束如何进入目标规范并记录不可表达语义。面向具体编程库的模型生成配置只作为 StructuralSchemaAdapter 的外部映射信息保存，不是正式语言类节点。Graph IR 是内部中间表示，Frontend View 是展示 ViewModel；两者虽然也是投影结果，但不属于 schema 导出。
    en: A SchemaAdapter is a ProjectionAdapter whose target is a formal descriptive language with an explicit version, vocabulary, and conformance rules, such as JSON Schema, OWL 2, SHACL, or ShEx. It states how canonical fields, concepts, relations, or constraints enter that specification and records inexpressible semantics. Model-generation configurations for programming libraries remain external mapping information on StructuralSchemaAdapter rather than formal-language class nodes. Graph IR is an internal intermediate representation and Frontend View is a presentation ViewModel; both are projections but neither is a schema export.
    ja: SchemaAdapter は ProjectionAdapter の一種で、明示版・語彙・適合規則を持つ形式記述言語（JSON Schema、OWL 2、SHACL、ShEx）を対象とする。canonical 項目、概念、関係、制約の写像と表現不能意味を規定する。プログラミングライブラリ向け model 生成設定は正式言語クラスではなく StructuralSchemaAdapter 上の外部写像情報に留める。Graph IR は内部中間表現、Frontend View は表示 ViewModel であり、投影ではあるが schema 出力ではない。
  why_needed:
    zh: 该类别把正式交换/验证语义与内部图数据和界面状态分开，使转换警告能够准确指向目标语言的表达能力限制。
    en: This class separates formal exchange or validation semantics from internal graph data and UI state so conversion warnings can identify limits of the actual target language.
    ja: 形式交換・検証意味を内部グラフデータと UI 状態から分離し、変換警告を対象言語の表現限界へ正確に結び付ける。
  includes:
    - zh: 纳入目标正式语言与版本、导出模式、可表达构造、命名与 IRI 规则、损失说明、符合性方法及对 canonical 所有者的回指。
      en: Includes the target formal language and version, export mode, expressible constructs, naming or IRI rules, loss notes, conformance method, and pointers to canonical owners.
      ja: 対象正式言語と版、出力モード、表現可能構成、命名・IRI 規則、損失注記、適合方法、canonical 所有者への参照を含む。
  excludes:
    - zh: 不纳入 Graph IR、Frontend ViewModel、布局坐标、社区划分、一次投影运行或生成产物；这些对象可以与 schema 导出协作，但不能因此归为 SchemaAdapter。
      en: Excludes Graph IR, frontend view models, layout coordinates, community partitions, an individual projection run, and a produced artifact; these may participate in export workflows without becoming SchemaAdapters.
      ja: Graph IR、Frontend ViewModel、配置座標、コミュニティ分割、個別投影実行、生成成果物を含まない。出力処理に関与しても SchemaAdapter にはならない。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys:
    - adapter_id
  fields: []
  constraints:
    - id: schema-adapter-no-shadow-nodes
      severity: error
      expression_language: plain
      expression: every SchemaAdapter projection targets a named formal schema, ontology, or graph-shape language, points back to its canonical owner, and records unrepresentable semantics; Graph IR and frontend ViewModels are not schema targets
      explanations:
        zh: 每个 SchemaAdapter 投影必须指向具名的形式模式、本体或图形状语言，回指规范所有者并记录不可表达语义；Graph IR 与前端 ViewModel 不是模式目标。
        en: Every SchemaAdapter projection targets a named formal schema, ontology, or graph-shape language, points back to its canonical owner, and records unrepresentable semantics; Graph IR and frontend ViewModels are not schema targets.
        ja: 各 SchemaAdapter 投影は名称付き形式スキーマ、本体、グラフ形状言語を対象とし、canonical 所有者への参照と表現不能意味を記録します。Graph IR とフロントエンド ViewModel はスキーマ対象ではありません。
      source_claims:
        - claim-schema-adapter-003
        - claim-schema-adapter-004
  required_relation_constraints: []
examples:
  - id: SchemaAdapter-example-positive-001
    kind: positive
    labels:
      zh: Schema 适配器正例
      en: Positive example of schema adapter
      ja: Schema アダプターの正例
    scenario_id: null
    descriptions:
      zh: adapter-json-schema@2.0.0 作为 SchemaAdapter 家族中的具体配置，把 AgentConfig 字段、必填性、值约束和受控值投影到 JSON-Schema-2020-12。关系端点必须存在于发布图这一跨记录规则无法由标准 JSON Schema 保证，因此生成 ConversionWarning-warns_about-SchemaAdapter，并保留未覆盖规则的来源。
      en: adapter-json-schema@2.0.0 is a concrete SchemaAdapter-family configuration projecting AgentConfig fields, requiredness, value constraints, and controlled values to JSON-Schema-2020-12. Because standard JSON Schema cannot ensure that relation endpoints exist in the released graph, it emits ConversionWarning-warns_about-SchemaAdapter and preserves the unsupported rule's provenance.
      ja: SchemaAdapter ファミリの具象設定 adapter-json-schema@2.0.0 は AgentConfig のフィールド、必須性、値制約、統制値を JSON-Schema-2020-12 へ投影します。標準 JSON Schema では公開グラフ内の関係端点存在を保証できないため ConversionWarning-warns_about-SchemaAdapter を生成し、未対応規則の来歴を保持します。
    field_values:
      adapter_id: adapter-json-schema
      adapter_version: 2.0.0
      scope:
        - fields
        - requiredness
        - constraints
        - controlled-values
      status: supported
      schema_version: JSON-Schema-2020-12
      loss_kind: lossy
    related_node_ids:
      - SchemaAdapter
      - ConversionWarning
    related_relation_ids:
      - ConversionWarning-warns_about-SchemaAdapter
    expected_result:
      zh: 结构模式成功生成，警告明确指向负责该投影的 SchemaAdapter，且可从警告追溯原始跨记录约束。
      en: The structural schema is produced, the warning points to the responsible SchemaAdapter, and the original cross-record constraint is traceable from the warning.
      ja: 構造スキーマを生成し、警告は担当 SchemaAdapter を指し、警告から元の記録間制約を追跡できます。
    why_valid_or_invalid:
      zh: 目标是有明确版本和词汇的形式模式，且不可表达语义没有被丢弃或伪造，而是通过具名警告回指适配能力。
      en: The target is a versioned formal schema vocabulary, and unrepresentable semantics are neither discarded nor fabricated; a named warning points back to the adapter capability.
      ja: 対象は版付き形式スキーマ語彙であり、表現不能意味を破棄・偽造せず、名称付き警告がアダプター能力へ戻る参照を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-schema-adapter-005
      - claim-schema-adapter-006
  - id: SchemaAdapter-example-boundary-001
    kind: boundary
    labels:
      zh: Schema 适配器边界例
      en: Boundary case for schema adapter
      ja: Schema アダプターの境界例
    scenario_id: null
    descriptions:
      zh: FrontendViewAdapter 生成三语标签、筛选项、详情面板和布局状态。即使这些 ViewModel 对象具有 JSON 结构，也没有声明形式验证方言、图形状语言或本体公理，因此不能归入 SchemaAdapter；把颜色或折叠状态包装成 JSON 并不会使其成为模式。
      en: FrontendViewAdapter produces localized labels, filters, inspector panels, and layout state. Even though those ViewModel objects have JSON structure, they declare no formal validation dialect, graph-shape language, or ontology axioms, so they are not SchemaAdapter outputs; wrapping colors or collapse state in JSON does not make them schemas.
      ja: FrontendViewAdapter は多言語ラベル、フィルター、詳細パネル、配置状態を生成します。ViewModel が JSON 構造を持っても形式検証方言、グラフ形状言語、本体公理を宣言しないため SchemaAdapter 出力ではなく、色や折り畳み状態を JSON 化してもスキーマにはなりません。
    field_values: {}
    related_node_ids:
      - SchemaAdapter
      - ConversionWarning
      - FrontendViewAdapter
    related_relation_ids:
      - ConversionWarning-warns_about-SchemaAdapter
    expected_result:
      zh: FrontendViewAdapter 继续作为展示投影能力，SchemaAdapter 的下位树只包含结构模式、语义图模式和具体格式剖面。
      en: FrontendViewAdapter remains a presentation projection, while the SchemaAdapter subtree contains only structural schemas, semantic graph schemas, and concrete format profiles.
      ja: FrontendViewAdapter は表示投影能力のままで、SchemaAdapter の下位木には構造スキーマ、意味グラフスキーマ、具象形式プロファイルだけが入ります。
    why_valid_or_invalid:
      zh: 数据结构只是载体特征；SchemaAdapter 的判别条件是投影到具名形式语言并具有可验证语义，展示 ViewModel 不满足该条件。
      en: Having a data structure is merely a carrier property; SchemaAdapter requires projection into a named formal language with validation or ontology semantics, which a presentation ViewModel lacks.
      ja: データ構造を持つことは媒体の性質にすぎず、SchemaAdapter は検証・本体意味を持つ名称付き形式言語への投影を要件とし、表示 ViewModel は満たしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-schema-adapter-007
      - claim-schema-adapter-008
  - id: SchemaAdapter-example-instance-001
    kind: instance
    labels:
      zh: Schema 适配器结构化实例
      en: Structured instance of schema adapter
      ja: Schema アダプターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: SchemaAdapter 家族中的 adapter-json-schema@2.0.0 固定 JSON-Schema-2020-12，覆盖 fields、requiredness、constraints 与 controlled-values，并以 lossy 声明图关系语义不属于该格式子集。该配置用于选择具体下位适配器，不代表一次投影运行。
      en: Within the SchemaAdapter family, adapter-json-schema@2.0.0 pins JSON-Schema-2020-12, covers fields, requiredness, constraints, and controlled-values, and declares graph-relation semantics outside this lossy subset. The record selects a concrete child adapter and is not a projection run.
      ja: SchemaAdapter ファミリ内の adapter-json-schema@2.0.0 は JSON-Schema-2020-12 を固定し、fields、requiredness、constraints、controlled-values を対象に、グラフ関係意味を有損部分集合の外と宣言します。具象子アダプターを選ぶ設定であり、投影実行ではありません。
    field_values:
      adapter_id: adapter-json-schema
      adapter_version: 2.0.0
      scope:
        - fields
        - requiredness
        - constraints
        - controlled-values
      status: supported
      schema_version: JSON-Schema-2020-12
      loss_kind: lossy
    related_node_ids:
      - SchemaAdapter
    related_relation_ids: []
    expected_result:
      zh: 注册表按 adapter_id 与 schema_version 解析到 JSONSchemaAdapter，并要求投影报告包含所有不可表达关系语义的警告。
      en: The registry resolves adapter_id and schema_version to JSONSchemaAdapter and requires the projection report to contain warnings for every unrepresentable relation semantic.
      ja: レジストリは adapter_id と schema_version から JSONSchemaAdapter を解決し、表現不能な関係意味ごとの警告を投影報告へ要求します。
    why_valid_or_invalid:
      zh: 配置有明确的形式目标、版本、结构范围和损失政策，并保留从具体投影回到规范所有者的路径。
      en: The configuration has a named formal target, version, structural scope, and loss policy and preserves a path from each projection back to its canonical owner.
      ja: 設定には名称付き形式対象、版、構造範囲、損失方針があり、各投影から canonical 所有者への戻り経路を保持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-schema-adapter-009
      - claim-schema-adapter-010
external_mappings:
  - id: SchemaAdapter-external-family-mapping
    system: Moonweave Agent Ontology v1
    external_identifier: legacy-v1:adapter-mapping:Schema
    external_version: sha256:344b64a3cb2a2e14eefbfc499be6989f4944ec4d4757fc7e7738c1795bd2d91c
    canonical_target_ids:
      - MappingRule
      - ConversionWarning
      - PolicyRule
    mapping_kind: related
    scope:
      zh: 仅迁移冻结 v1 中“Schema”适配器聚合记录的概念覆盖；具体格式语义由 JSON Schema、OWL、SHACL、ShEx、Zod 与 Pydantic 下位映射承担。
      en: Migrates only the Concept coverage of the frozen-v1 Schema aggregate; JSON Schema, OWL, SHACL, ShEx, Zod, and Pydantic child mappings carry format semantics.
      ja: 凍結 v1 の Schema 集約が持つ Concept 範囲だけを移行し、形式意味は JSON Schema、OWL、SHACL、ShEx、Zod、Pydantic の下位写像が担います。
    direction: import-to-canonical
    loss_notes:
      zh: 族级记录不声明具体外部构造的逐字段语义；具体适配器节点的评审映射承担版本、范围与损失说明。
      en: The family-level record does not assert field-by-field semantics for concrete external constructs; reviewed concrete Adapter mappings carry version, scope, and loss details.
      ja: ファミリ単位の記録は具体的な外部構成のフィールド別意味を主張せず、版・範囲・損失は審査済み具体 Adapter 写像が担います。
    conversion_note:
      zh: 该族映射覆盖以下 canonical Concept：MappingRule、ConversionWarning、PolicyRule。具体构造仍须逐项版本审查。
      en: "This family mapping covers these canonical Concepts: MappingRule, ConversionWarning, PolicyRule. Concrete constructs still require version-specific review."
      ja: このファミリ写像は次の canonical Concept を対象とします：MappingRule、ConversionWarning、PolicyRule。具体的構成はバージョン別レビューが必要です。
    conformance:
      status: contract-tested
      test_id: SchemaAdapter-external-family-mapping-contract-test
      method:
        zh: 验证族级映射只有一个 Adapter 所有者，且所有 canonical 目标与来源均可解析。
        en: Validates that the family mapping has one Adapter owner and that every canonical target and source resolves.
        ja: ファミリ写像が一つの Adapter 所有者を持ち、全 canonical 対象と出典を解決できることを検証します。
    status: accepted
    source_claims:
      - claim-schema-adapter-011
      - claim-schema-adapter-012
applicability:
  - adapter
sibling_differentiation:
  - sibling_concept_id: GraphIRAdapter
    shared_parent_concept_id: ProjectionAdapter
    differentia:
      zh: 在 ProjectionAdapter 下，SchemaAdapter 的目标是具有版本、词汇表与一致性规则的正式描述语言，其下再分结构模式与语义图；GraphIRAdapter 的目标则是可重建的内部节点—边中间记录。正式 schema 产物与内部 Graph IR 不得互相冒充。
      en: Under ProjectionAdapter, SchemaAdapter targets a formal descriptive language with a version, vocabulary, and conformance rules and then divides into structural-schema and semantic-graph branches; GraphIRAdapter targets rebuildable internal node-edge records. A formal schema artifact and internal Graph IR must not masquerade as one another.
      ja: ProjectionAdapter 配下で SchemaAdapter は版、語彙、適合規則を持つ正式記述言語を対象とし、構造スキーマ枝と semantic graph 枝へ分かれる。GraphIRAdapter は再構築可能な内部 node-edge 記録を対象とし、正式 schema artifact と内部 Graph IR を相互に偽装しない。
    source_claims:
      - claim-schema-adapter-013
