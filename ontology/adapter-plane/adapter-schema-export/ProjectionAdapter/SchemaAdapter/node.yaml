source_claims:
  - id: claim-schema-adapter-001
    source: eng-ont-owl
    supports: OWL 2 defines a formal ontology structure and exchange ecosystem, grounding one SchemaAdapter target class. SchemaAdapter's family identity, exclusion of Graph IR and ViewModels, and ProjectionAdapter parent are Moonweave decisions.
    locator: OWL 2 Overview §2 and Structural Specification §§3–5
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-schema-adapter-002
    source: eng-val-jsonschema-spec
    supports: JSON Schema Core and Validation define a formal dialect and bounded instance-assertion vocabulary, grounding the structural branch of SchemaAdapter. The Moonweave family boundary and ontology hierarchy are not asserted by JSON Schema.
    locator: JSON Schema Core 2020-12 §8.1 and Validation §§6.1–6.5
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-schema-adapter-003
    source: eng-ont-owl
    supports: OWL 2 defines a formal ontology structure with identified entities and axioms; SchemaAdapter includes such formal targets while Moonweave requires provenance pointers and excludes internal Graph IR or ViewModels.
    locator: OWL 2 Overview §2 and Structural Specification §§3–5
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
