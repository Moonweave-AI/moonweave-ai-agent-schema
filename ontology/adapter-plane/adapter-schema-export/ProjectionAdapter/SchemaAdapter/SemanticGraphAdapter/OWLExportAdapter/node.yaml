    supports: OWL 2 Overview explains open-world reasoning and ontology axioms, while the structural specification defines exact-cardinality expressions; OWLExportAdapter therefore does not promise closed-world missing-value validation.
    locator: OWL 2 Overview §2.1 and Structural Specification §8.3.2
    evidence_kind: design-inference
    confidence: medium
