schema: moonweave.ai/ontology-node/v1
id: OWLExportAdapter
kind: concept
status: review
labels:
  zh: OWL 导出适配器
  en: OWL export adapter
  ja: OWL エクスポートアダプター
semantics:
  short_definition:
    zh: OWL 导出适配器把可表达的规范概念与关系投影为 OWL 2 本体。
    en: An OWLExportAdapter projects expressible canonical concepts and relations into an OWL 2 ontology.
    ja: OWLExportAdapter は表現可能な canonical 概念と関係を OWL 2 オントロジーへ投影する。
  definition:
    zh: OWL 导出适配器是 SemanticGraphAdapter 的一种，将规范概念身份、分类关系、对象属性、数据属性和可表达的公理映射到 OWL 2 的结构模型，并选择一种明确的交换语法。映射必须保持稳定 IRI，并分别记录开放世界语义、推理含义以及 canonical 约束中无法无损表达的部分；它不把 OWL 公理误作 JSON 字段验证规则。
    en: An OWLExportAdapter is a SemanticGraphAdapter that maps canonical concept identity, taxonomy, object properties, data properties, and expressible axioms into the OWL 2 structural model and chooses an explicit exchange syntax. The mapping preserves stable IRIs and separately records open-world semantics, entailment implications, and canonical constraints that cannot be represented without loss; it never treats OWL axioms as JSON field-validation rules.
    ja: OWLExportAdapter は SemanticGraphAdapter の一種で、canonical 概念同一性、分類、オブジェクト・データプロパティ、表現可能な公理を OWL 2 構造モデルへ写像し、交換構文を明示する。安定 IRI を保持し、開世界意味、含意、無損失で表せない canonical 制約を別々に記録する。OWL 公理を JSON 項目検証規則として扱わない。
  why_needed:
    zh: 该适配器支持语义网工具交换与推理，同时把“可推导的本体语义”和“数据图是否满足形状”保持为两个不同问题。
    en: This adapter supports Semantic Web exchange and reasoning while keeping ontology entailment distinct from the question of whether a data graph satisfies a shape.
    ja: Semantic Web ツールとの交換と推論を可能にし、本体含意とデータグラフの形状適合性を別問題として保つ。
  includes:
    - zh: 纳入 ontology IRI、类与属性声明、subClassOf、domain/range、可表达的基数或等价公理及其序列化选择。
      en: Includes ontology IRIs, class and property declarations, subClassOf, domain/range, expressible cardinality or equivalence axioms, and the chosen serialization.
      ja: ontology IRI、クラス・プロパティ宣言、subClassOf、domain/range、表現可能な基数・同値公理、選択した直列化を含む。
  excludes:
    - zh: 不纳入 SHACL 或 ShEx 形状、验证报告、JSON 文档结构，也不声称每个 closed-world 必填约束都与 OWL 开放世界公理等价。
      en: Excludes SHACL or ShEx shapes, validation reports, and JSON document structure, and does not claim that every closed-world requiredness rule has an equivalent OWL axiom.
      ja: SHACL・ShEx 形状、検証報告、JSON 文書構造を含まず、閉世界の必須規則すべてに等価な OWL 公理があるとは主張しない。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: owl-export-stable-iri-and-open-world-boundary
      severity: error
      expression_language: plain
      expression: every exported entity has a stable IRI and every emitted declaration or axiom is valid OWL 2 structural syntax; closed-world requiredness and validation-result semantics are never represented as equivalent OWL entailments
      explanations:
        zh: 每个导出实体必须具有稳定 IRI，所有声明与公理必须符合 OWL 2 结构规范；封闭世界必填性和验证结果不得伪装成等价的 OWL 蕴含。
        en: Every exported entity has a stable IRI and every declaration or axiom follows OWL 2 structural syntax; closed-world requiredness and validation-result semantics must not be presented as equivalent OWL entailments.
        ja: 各出力エンティティは安定 IRI を持ち、宣言と公理は OWL 2 構造構文に従います。閉世界の必須性や検証結果を等価な OWL 含意として表してはなりません。
      source_claims:
        - claim-owl-export-adapter-002
  required_relation_constraints: []
examples:
  - id: OWLExportAdapter-example-positive-001
    kind: positive
    labels:
      zh: OWL 导出适配器正例
      en: Positive example of OWL export adapter
      ja: OWL エクスポートアダプターの正例
    scenario_id: null
    descriptions:
      zh: Moonweave 中 PlannerAgent is_a Agent，PlannerAgent hasCapability PlanningCapability。adapter-owl@2.0.0 为三个概念分配稳定 IRI，输出 Class 声明、SubClassOf(PlannerAgent Agent) 以及 ObjectPropertyAssertion(hasCapability PlannerAgent PlanningCapability)，并把目标版本固定为 OWL2。
      en: Moonweave states PlannerAgent is_a Agent and PlannerAgent hasCapability PlanningCapability. adapter-owl@2.0.0 assigns stable IRIs to the three concepts and emits Class declarations, SubClassOf(PlannerAgent Agent), and ObjectPropertyAssertion(hasCapability PlannerAgent PlanningCapability) under OWL2.
      ja: Moonweave の PlannerAgent is_a Agent と PlannerAgent hasCapability PlanningCapability に対し、adapter-owl@2.0.0 は三概念へ安定 IRI を割り当て、Class 宣言、SubClassOf(PlannerAgent Agent)、ObjectPropertyAssertion(hasCapability PlannerAgent PlanningCapability) を OWL2 で出力します。
    field_values:
      adapter_id: adapter-owl
      adapter_version: 2.0.0
      scope:
        - classes
        - object-properties
        - iris
        - axioms
      status: supported
      schema_version: OWL2
      loss_kind: lossy
    related_node_ids:
      - OWLExportAdapter
      - SemanticGraphAdapter
    related_relation_ids:
      - OWLExportAdapter-is_a-SemanticGraphAdapter
    expected_result:
      zh: OWL 2 工具能够解析实体与公理，并由 SubClassOf 推导 PlannerAgent 属于 Agent；原始关系方向和 IRI 映射可回溯。
      en: An OWL 2 tool parses the entities and axioms and can entail that PlannerAgent is an Agent from SubClassOf; original relation direction and IRI mappings remain traceable.
      ja: OWL 2 ツールはエンティティと公理を解析し、SubClassOf から PlannerAgent が Agent であると含意でき、元の関係方向と IRI 写像を追跡できます。
    why_valid_or_invalid:
      zh: 两个 Moonweave 关系都有直接的 OWL 2 结构公理表达，且实体身份通过稳定 IRI 保持，没有把 JSON 字段验证混入本体公理。
      en: Both Moonweave relations have direct OWL 2 structural-axiom representations and entity identity is preserved by stable IRIs, without importing JSON field validation into ontology axioms.
      ja: 二つの Moonweave 関係は OWL 2 構造公理で直接表現でき、安定 IRI が同一性を保持し、JSON フィールド検証を本体公理へ混入していません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-owl-export-adapter-003
  - id: OWLExportAdapter-example-boundary-001
    kind: boundary
    labels:
      zh: OWL 导出适配器边界例
      en: Boundary case for OWL export adapter
      ja: OWL エクスポートアダプターの境界例
    scenario_id: null
    descriptions:
      zh: 规范要求每个 Agent 记录在当前发布数据中恰好出现一个 owner 值。若把该封闭世界验证规则直接导出为 OWL 的 ObjectExactCardinality(1 hasOwner)，缺失 owner 的命名个体在开放世界下不必构成不一致，因为尚未知的 owner 仍可能存在。
      en: The canonical release rule requires every Agent record to contain exactly one owner value in the current data. Exporting that closed-world validation rule directly as ObjectExactCardinality(1 hasOwner) does not make a named individual with no asserted owner inconsistent under OWL's open-world semantics, because an unknown owner may still exist.
      ja: canonical 公開規則が現在データ内で各 Agent に owner を一つだけ要求しても、それを ObjectExactCardinality(1 hasOwner) へ直変換するだけでは、owner 主張のない個体が OWL の開世界意味で不整合になるとは限りません。未知の owner が存在し得るためです。
    field_values: {}
    related_node_ids:
      - OWLExportAdapter
      - SemanticGraphAdapter
      - SHACLExportAdapter
    related_relation_ids:
      - OWLExportAdapter-is_a-SemanticGraphAdapter
    expected_result:
      zh: 导出报告将该规则标为 closed-world-validation-loss，并交由 SHACLExportAdapter 表达 sh:minCount=1、sh:maxCount=1；OWL 公理只在确实需要其开放世界语义时生成。
      en: The export report marks the rule as closed-world-validation-loss and delegates sh:minCount=1 and sh:maxCount=1 to SHACLExportAdapter; an OWL axiom is emitted only when its open-world meaning is intended.
      ja: 出力報告はこの規則を closed-world-validation-loss とし、sh:minCount=1 と sh:maxCount=1 を SHACLExportAdapter に委ねます。OWL 公理は開世界意味を意図する場合だけ生成します。
    why_valid_or_invalid:
      zh: OWL 基数限制参与本体模型与推理，而“当前数据缺值即失败”属于形状验证；不区分两者会把验证通过与逻辑可满足性混为一谈。
      en: OWL cardinality restrictions participate in ontology modeling and entailment, while failure on a missing value in the current data is shape validation; conflating them confuses validation conformance with logical consistency.
      ja: OWL 基数制限は本体モデルと含意に関わり、現在データの値欠落を失敗とするのは形状検証です。両者を混同すると検証適合性と論理的一貫性を取り違えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-owl-export-adapter-004
  - id: OWLExportAdapter-example-instance-001
    kind: instance
    labels:
      zh: OWL 导出适配器结构化实例
      en: Structured instance of OWL export adapter
      ja: OWL エクスポートアダプターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: adapter-owl 版本 2.0.0 固定 OWL2，范围限定为 classes、object-properties、iris 与 axioms。loss_kind=lossy 明确表示封闭世界必填规则、界面排序和验证报告不会被声称为等价 OWL 语义。
      en: adapter-owl version 2.0.0 pins OWL2 and limits its scope to classes, object-properties, iris, and axioms. loss_kind=lossy explicitly states that closed-world requiredness, UI ordering, and validation reports are not claimed as equivalent OWL semantics.
      ja: adapter-owl 2.0.0 は OWL2 を固定し、classes、object-properties、iris、axioms に範囲を限定します。loss_kind=lossy は閉世界の必須性、画面順序、検証報告を等価な OWL 意味として扱わないことを明示します。
    field_values:
      adapter_id: adapter-owl
      adapter_version: 2.0.0
      scope:
        - classes
        - object-properties
        - iris
        - axioms
      status: supported
      schema_version: OWL2
      loss_kind: lossy
    related_node_ids:
      - OWLExportAdapter
    related_relation_ids: []
    expected_result:
      zh: 投影器只为可表达项生成 OWL 2 实体与公理，并为每个被排除的封闭世界或展示约束生成可追踪损失项。
      en: The projector emits OWL 2 entities and axioms only for expressible items and creates a traceable loss item for every excluded closed-world or presentation constraint.
      ja: 投影器は表現可能な項目だけを OWL 2 エンティティ・公理として出力し、除外した閉世界・表示制約ごとに追跡可能な損失項目を作ります。
    why_valid_or_invalid:
      zh: 身份、版本、作用范围与损失说明一致，并清楚区分 OWL 2 的本体语义和 Moonweave 的数据验证需求。
      en: Identity, version, scope, and loss declaration agree and clearly separate OWL 2 ontology semantics from Moonweave data-validation requirements.
      ja: 識別、版、範囲、損失宣言が整合し、OWL 2 の本体意味と Moonweave のデータ検証要件を明確に分離します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-owl-export-adapter-005
external_mappings:
  - id: OWLExportAdapter-external-mapping
    system: OWL
    external_identifier: OWL
    external_version: OWL2
    canonical_target_ids:
      - SchemaArtifact
      - GraphArtifact
      - MappingRule
    mapping_kind: related
    scope:
      zh: 映射稳定 IRI、类与属性声明、subClassOf、domain/range、属性断言及可表达的 OWL 2 公理。
      en: Maps stable IRIs, class and property declarations, subClassOf, domain and range, property assertions, and expressible OWL 2 axioms.
      ja: 安定 IRI、クラス・プロパティ宣言、subClassOf、domain/range、プロパティ主張、表現可能な OWL 2 公理を写像します。
    direction: bidirectional
    loss_notes:
      zh: 封闭世界必填检查、SHACL/ShEx 验证结果、JSON 文档结构和仅用于界面的顺序或布局不具有无损 OWL 2 等价项。
      en: Closed-world requiredness checks, SHACL or ShEx validation results, JSON document structure, and UI-only order or layout have no lossless OWL 2 equivalents.
      ja: 閉世界の必須検査、SHACL・ShEx 検証結果、JSON 文書構造、画面専用順序・配置には無損失の OWL 2 等価表現がありません。
    conversion_note:
      zh: OWL2（OWL 2）双向转换只覆盖已声明的结构子集；导入保留 IRI 和公理身份，导出为每项非等价规范约束生成损失记录。
      en: "OWL2 (OWL 2) bidirectional conversion covers only the declared structural subset: import preserves IRI and axiom identity, and export records every non-equivalent canonical constraint as loss."
      ja: OWL2（OWL 2）の双方向変換は宣言済み構造部分集合だけを対象とし、取り込みは IRI と公理同一性を保持し、出力は非等価な canonical 制約を損失として記録します。
    conformance:
      status: contract-tested
      test_id: OWLExportAdapter-mapping-contract-test
      method:
        zh: 验证外部版本、映射范围、方向、已知损失、唯一所有者、来源登记以及所有 canonical 目标 ID 的可解析性。
        en: Validates the external version, scope, direction, known loss, unique owner, registered source, and resolvability of every canonical target ID.
        ja: 外部版、範囲、方向、既知の損失、一意な所有者、登録出典、および全 canonical 対象 ID の解決可能性を検証します。
    status: accepted
    source_claims:
      - claim-owl-export-adapter-006
applicability:
  - adapter
sibling_differentiation:
  - sibling_concept_id: SHACLExportAdapter
    shared_parent_concept_id: SemanticGraphAdapter
    differentia:
      zh: 端点特定对照：父节点 SemanticGraphAdapter：OWLExportAdapter（semantic kind=capability，骨架 OWLExportAdapter-is_a-SemanticGraphAdapter）；SHACLExportAdapter（semantic kind=capability，骨架 SHACLExportAdapter-is_a-SemanticGraphAdapter）。双端条件：OWLExportAdapter 条件：“作为语义图适配器，OWL 导出适配器由这一事实区分：它把规范本体术语投影为 OWL/RDF 导出产物，同时保持 OWL 公理和语义推理与规范 JSON 结构契约分离”；SHACLExportAdapter 条件：“SHACL 导出适配器属于语义图适配器，区别于其他同类对象的条件是：它把规范本体术语投影为 RDF 图约束的 SHACL 形状和验证报告，并与 JSON Schema 结构验证分离”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent SemanticGraphAdapter: OWLExportAdapter (semantic kind=capability, backbone OWLExportAdapter-is_a-SemanticGraphAdapter); SHACLExportAdapter (semantic kind=capability, backbone SHACLExportAdapter-is_a-SemanticGraphAdapter). Endpoint conditions: OWLExportAdapter condition: “OWL export adapter belongs to the Semantic graph adapter category and differs from broader members in that it projects canonical ontology terms into OWL/RDF export artifacts while keeping OWL axioms and semantic reasoning separate from the canonical structural JSON schema contract”; SHACLExportAdapter condition: “SHACL export adapter is a Semantic graph adapter whose defining condition is that it projects canonical ontology terms into SHACL shapes and validation reports for RDF graph constraints, separate from JSON Schema structural validation”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 SemanticGraphAdapter：OWLExportAdapter（semantic kind=capability、バックボーン OWLExportAdapter-is_a-SemanticGraphAdapter）；SHACLExportAdapter（semantic kind=capability、バックボーン SHACLExportAdapter-is_a-SemanticGraphAdapter）。両端条件：OWLExportAdapter の条件：「OWL エクスポートアダプターは意味グラフアダプターとして、次の条件により他の対象と区別されます：それは、標準オントロジー用語を OWL/RDF エクスポート成果物へ投影し、OWL 公理と意味推論を標準 JSON 構造契約から分離します」；SHACLExportAdapter の条件：「SHACL エクスポートアダプターは意味グラフアダプターのうち、次の事実を定義条件とする対象です：それは、標準オントロジー用語を RDF グラフ制約用の SHACL 形状と検証報告へ投影し、JSON Schema 構造検証から分離します」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-owl-export-adapter-007
      - claim-owl-export-adapter-008
