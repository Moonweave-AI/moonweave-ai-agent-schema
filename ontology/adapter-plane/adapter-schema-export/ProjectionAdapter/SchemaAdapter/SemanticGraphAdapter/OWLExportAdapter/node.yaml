  - id: claim-owl-export-adapter-006
    source: eng-ont-owl
    supports: OWL 2 Structural Specification defines the IRIs, entities, declarations, class expressions, properties, and axioms covered by this mapping; Moonweave explicitly limits round trips to that structural subset.
