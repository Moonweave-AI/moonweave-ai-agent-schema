  - id: claim-owl-export-adapter-003
    source: eng-ont-owl
    supports: OWL 2 Structural Specification defines declarations, SubClassOf axioms, and object-property assertions used by the OWLExportAdapter positive case; the selected Moonweave terms remain project-specific.
    locator: OWL 2 Structural Specification §§5.2, 9.1, and 9.6
