sibling_differentiation:
  - sibling_concept_id: ShExExportAdapter
    shared_parent_concept_id: SemanticGraphAdapter
    differentia:
      zh: 端点特定对照：父节点 SemanticGraphAdapter：SHACLExportAdapter（semantic kind=capability，骨架 SHACLExportAdapter-is_a-SemanticGraphAdapter）；ShExExportAdapter（semantic kind=capability，骨架 ShExExportAdapter-is_a-SemanticGraphAdapter）。双端条件：SHACLExportAdapter 条件：“SHACL 导出适配器属于语义图适配器，区别于其他同类对象的条件是：它把规范本体术语投影为 RDF 图约束的 SHACL 形状和验证报告，并与 JSON Schema 结构验证分离”；ShExExportAdapter 条件：“ShEx 导出适配器是以如下事实为区分特征的语义图适配器：它把规范本体术语投影为 RDF 图验证的 ShEx 形状表达，并保持 ShEx 语义区别于 SHACL 与 JSON Schema 输出”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent SemanticGraphAdapter: SHACLExportAdapter (semantic kind=capability, backbone SHACLExportAdapter-is_a-SemanticGraphAdapter); ShExExportAdapter (semantic kind=capability, backbone ShExExportAdapter-is_a-SemanticGraphAdapter). Endpoint conditions: SHACLExportAdapter condition: “SHACL export adapter is a Semantic graph adapter whose defining condition is that it projects canonical ontology terms into SHACL shapes and validation reports for RDF graph constraints, separate from JSON Schema structural validation”; ShExExportAdapter condition: “ShEx export adapter is a Semantic graph adapter; its differentiating condition is that it projects canonical ontology terms into ShEx shape expressions for RDF graph validation, keeping ShEx semantics distinct from SHACL and JSON Schema outputs”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 SemanticGraphAdapter：SHACLExportAdapter（semantic kind=capability、バックボーン SHACLExportAdapter-is_a-SemanticGraphAdapter）；ShExExportAdapter（semantic kind=capability、バックボーン ShExExportAdapter-is_a-SemanticGraphAdapter）。両端条件：SHACLExportAdapter の条件：「SHACL エクスポートアダプターは意味グラフアダプターのうち、次の事実を定義条件とする対象です：それは、標準オントロジー用語を RDF グラフ制約用の SHACL 形状と検証報告へ投影し、JSON Schema 構造検証から分離します」；ShExExportAdapter の条件：「ShEx エクスポートアダプターは意味グラフアダプターの一種であり、次の条件で区別されます：それは、標準オントロジー用語を RDF グラフ検証用の ShEx 形状式へ投影し、ShEx 意味を SHACL と JSON Schema 出力から区別します」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-shacl-export-adapter-007
      - claim-shacl-export-adapter-008
