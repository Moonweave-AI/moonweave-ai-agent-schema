schema: moonweave.ai/ontology-node/v1
id: SHACLExportAdapter
kind: concept
status: review
labels:
  zh: SHACL 导出适配器
  en: SHACL export adapter
  ja: SHACL エクスポートアダプター
semantics:
  short_definition:
    zh: SHACL 导出适配器把可验证的规范图约束投影为 SHACL 形状图。
    en: A SHACLExportAdapter projects verifiable canonical graph constraints into a SHACL shapes graph.
    ja: SHACLExportAdapter は検証可能な canonical グラフ制約を SHACL shapes graph へ投影する。
  definition:
    zh: SHACL 导出适配器是 SemanticGraphAdapter 的一种，把目标选择、节点/属性形状、property path、class/datatype、minCount/maxCount、逻辑组合和 severity 等可表达约束写入 SHACL shapes graph。导出能力只生成形状及其来源回指；将 shapes graph 与 data graph 交给处理器后产生的 ValidationReport 和 ValidationResult 属于一次验证活动的结果，不是适配器或导出规范的一部分。
    en: A SHACLExportAdapter is a SemanticGraphAdapter that writes expressible target selection, node and property shapes, property paths, class/datatype constraints, minCount/maxCount, logical combinations, and severity into a SHACL shapes graph. The export capability produces shapes with provenance pointers. A ValidationReport and its ValidationResults arise only when a processor validates a data graph against that shapes graph; they are results of a validation activity, not part of the adapter or export specification.
    ja: SHACLExportAdapter は SemanticGraphAdapter の一種で、target 選択、node/property shape、property path、class/datatype、minCount/maxCount、論理結合、severity を shapes graph へ書く。出力能力は来歴参照付き形状を生成する。data graph を検証して生じる ValidationReport・ValidationResult は検証活動の結果であり、アダプターや出力仕様そのものではない。
  why_needed:
    zh: 它把 RDF 数据质量约束变成可执行形状，又避免把 OWL 的开放世界推理或一次验证报告混进形状定义。
    en: It makes RDF data-quality constraints executable while keeping OWL open-world entailment and individual validation reports out of the shape definition.
    ja: RDF データ品質制約を実行可能にしつつ、OWL 開世界含意と個別検証報告を形状定義から分離する。
  includes:
    - zh: 纳入 shapes graph、target 声明、NodeShape/PropertyShape、路径、约束组件、severity、消息模板和 canonical 来源回指。
      en: Includes the shapes graph, target declarations, NodeShape/PropertyShape, paths, constraint components, severity, message templates, and canonical provenance pointers.
      ja: shapes graph、target 宣言、NodeShape/PropertyShape、path、constraint component、severity、message、canonical 来歴参照を含む。
  excludes:
    - zh: 不纳入 data graph、实际 ValidationReport/ValidationResult、OWL 推理公理、ShEx 形状表达或 JSON Schema 的对象字段验证。
      en: Excludes the data graph, an actual ValidationReport or ValidationResult, OWL entailment axioms, ShEx shape expressions, and JSON Schema object-field validation.
      ja: data graph、実際の ValidationReport/ValidationResult、OWL 含意公理、ShEx 形状式、JSON Schema 項目検証は含まない。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: shacl-adapter-exports-shapes-not-validation-results
      severity: error
      expression_language: plain
      expression: SHACLExportAdapter emits a shapes graph containing targets, paths, and constraint components; a validation report or validation result is produced only by a separate validation activity over a data graph and is never classified as the adapter or shapes artifact
      explanations:
        zh: SHACLExportAdapter 只输出含目标、路径和约束组件的 shapes graph；ValidationReport/ValidationResult 只能由针对 data graph 的独立验证活动产生，不能归类为适配器或形状产物。
        en: SHACLExportAdapter emits a shapes graph containing targets, paths, and constraint components; a validation report or result is produced only by a separate validation activity over a data graph and is never classified as the adapter or shapes artifact.
        ja: SHACLExportAdapter は対象、パス、制約コンポーネントを含む shapes graph を出力します。ValidationReport／ValidationResult は data graph に対する別の検証活動だけが生成し、アダプターや形状成果物に分類しません。
      source_claims:
        - claim-shacl-export-adapter-002
  required_relation_constraints: []
examples:
  - id: SHACLExportAdapter-example-positive-001
    kind: positive
    labels:
      zh: SHACL 导出适配器正例
      en: Positive example of SHACL export adapter
      ja: SHACL エクスポートアダプターの正例
    scenario_id: null
    descriptions:
      zh: AgentShape 以 sh:targetClass Agent 选择焦点节点，并包含一个 sh:path hasOwner 的 property shape，要求 sh:minCount 1、sh:maxCount 1 与 sh:nodeKind sh:IRI。adapter-shacl@2.0.0 把这些目标、路径和约束写入 SHACL-1.0 shapes graph，不执行数据验证。
      en: AgentShape selects focus nodes with sh:targetClass Agent and contains a property shape for sh:path hasOwner with sh:minCount 1, sh:maxCount 1, and sh:nodeKind sh:IRI. adapter-shacl@2.0.0 writes those targets, paths, and constraints to a SHACL-1.0 shapes graph without validating data.
      ja: AgentShape は sh:targetClass Agent で焦点ノードを選び、sh:path hasOwner の property shape に sh:minCount 1、sh:maxCount 1、sh:nodeKind sh:IRI を設定します。adapter-shacl@2.0.0 はこれらを SHACL-1.0 shapes graph へ書き、データ検証は実行しません。
    field_values:
      adapter_id: adapter-shacl
      adapter_version: 2.0.0
      scope:
        - node-shapes
        - property-paths
        - cardinalities
        - constraints
      status: supported
      schema_version: SHACL-1.0
      loss_kind: lossy
    related_node_ids:
      - SHACLExportAdapter
      - SemanticGraphAdapter
    related_relation_ids:
      - SHACLExportAdapter-is_a-SemanticGraphAdapter
    expected_result:
      zh: 产物被识别为 shapes graph，目标类、属性路径、基数和节点类型均可由 SHACL 处理器解析，且没有混入 ValidationReport。
      en: The product is identified as a shapes graph whose target class, property path, cardinalities, and node kind are parseable by a SHACL processor, with no ValidationReport mixed in.
      ja: 生成物は shapes graph として識別され、対象クラス、プロパティパス、基数、ノード種別を SHACL 処理系が解析でき、ValidationReport を混入しません。
    why_valid_or_invalid:
      zh: 规范约束有直接的 SHACL target、path 和 constraint component 表达，且能力边界停在形状生成，没有把验证活动或结果冒充适配器。
      en: The canonical rule has direct SHACL target, path, and constraint-component expressions, and the capability stops at shape generation instead of masquerading validation activity or results as the adapter.
      ja: canonical 規則は SHACL の target、path、constraint component で直接表現でき、能力境界を形状生成に留め、検証活動・結果をアダプター化しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-shacl-export-adapter-003
  - id: SHACLExportAdapter-example-boundary-001
    kind: boundary
    labels:
      zh: SHACL 导出适配器边界例
      en: Boundary case for SHACL export adapter
      ja: SHACL エクスポートアダプターの境界例
    scenario_id: null
    descriptions:
      zh: SHACL 处理器用 AgentShape 验证 data graph 后生成一个 ValidationReport，其中包含 sh:conforms false 与指向缺失 hasOwner 的 ValidationResult。该报告是一次验证活动的结果，不是 SHACLExportAdapter，也不是其 shapes graph；把报告节点挂在适配器下会混淆能力、规范和运行结果。
      en: After a SHACL processor validates a data graph with AgentShape, it produces a ValidationReport containing sh:conforms false and a ValidationResult for missing hasOwner. The report is the result of one validation activity, not SHACLExportAdapter or its shapes graph; attaching report nodes under the adapter conflates capability, specification, and runtime result.
      ja: SHACL 処理系が AgentShape で data graph を検証し、sh:conforms false と hasOwner 欠落の ValidationResult を含む ValidationReport を生成しても、その報告は一回の検証活動結果であり、SHACLExportAdapter や shapes graph ではありません。
    field_values: {}
    related_node_ids:
      - SHACLExportAdapter
      - SemanticGraphAdapter
      - OWLExportAdapter
    related_relation_ids:
      - SHACLExportAdapter-is_a-SemanticGraphAdapter
    expected_result:
      zh: ValidationReport 与每个 ValidationResult 保持结果类型并回指使用的 shapes graph；适配器节点只保留可复用生成能力。
      en: ValidationReport and each ValidationResult retain result types and reference the shapes graph used; the adapter node retains only reusable generation capability.
      ja: ValidationReport と各 ValidationResult は結果型を保ち、使用した shapes graph を参照し、アダプターノードは再利用可能な生成能力だけを保持します。
    why_valid_or_invalid:
      zh: SHACL 规范明确区分 shapes graph、data graph、validation 与 report；生命周期和身份不同，不能用共同采用 SHACL 术语来合并。
      en: SHACL explicitly separates shapes graph, data graph, validation, and report; their identity and lifecycle differ and cannot be merged merely because all use SHACL terms.
      ja: SHACL は shapes graph、data graph、validation、report を明確に分離し、同一性とライフサイクルが異なるため、SHACL 用語を共有するだけで統合できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-shacl-export-adapter-004
  - id: SHACLExportAdapter-example-instance-001
    kind: instance
    labels:
      zh: SHACL 导出适配器结构化实例
      en: Structured instance of SHACL export adapter
      ja: SHACL エクスポートアダプターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: adapter-shacl 版本 2.0.0 固定 SHACL-1.0，范围为 node-shapes、property-paths、cardinalities 与 constraints。loss_kind=lossy 声明过程式运行行为、JSON 文档顺序和 OWL 蕴含不会被伪装成 SHACL shape 语义。
      en: adapter-shacl version 2.0.0 pins SHACL-1.0 for node-shapes, property-paths, cardinalities, and constraints. loss_kind=lossy states that procedural runtime behavior, JSON document order, and OWL entailment are not disguised as SHACL shape semantics.
      ja: adapter-shacl 2.0.0 は SHACL-1.0 を固定し、node-shapes、property-paths、cardinalities、constraints を対象にします。loss_kind=lossy は手続的実行挙動、JSON 文書順序、OWL 含意を SHACL shape 意味として扱わないことを示します。
    field_values:
      adapter_id: adapter-shacl
      adapter_version: 2.0.0
      scope:
        - node-shapes
        - property-paths
        - cardinalities
        - constraints
      status: supported
      schema_version: SHACL-1.0
      loss_kind: lossy
    related_node_ids:
      - SHACLExportAdapter
    related_relation_ids: []
    expected_result:
      zh: 投影器生成 shapes graph 并保留来源映射，只有后续验证活动才可产生 report。
      en: The projector emits a shapes graph with provenance mappings; only a later validation activity may produce a report.
      ja: 投影器は来歴写像付き shapes graph を生成し、後続検証活動だけが report を生成できます。
    why_valid_or_invalid:
      zh: 身份、版本、形状范围和损失政策一致，并明确排除了验证报告，因此可稳定复现同一适配能力。
      en: Identity, version, shape scope, and loss policy agree and explicitly exclude validation reports, making the adapter capability reproducible.
      ja: 識別、版、形状範囲、損失方針が整合し、検証報告を明示的に除外するため、同じ能力を再現できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-shacl-export-adapter-005
external_mappings:
  - id: SHACLExportAdapter-external-mapping
    system: SHACL
    external_identifier: SHACL
    external_version: SHACL-1.0
    canonical_target_ids:
      - SchemaArtifact
      - GraphArtifact
      - MappingRule
    mapping_kind: related
    scope:
      zh: 映射 node/property shapes、targets、property paths、基数、节点类型、数据类型与其他 SHACL 约束组件。
      en: Maps node and property shapes, targets, property paths, cardinalities, node kinds, datatypes, and other SHACL constraint components.
      ja: node／property shapes、targets、property paths、基数、node kind、datatype、その他 SHACL constraint component を写像します。
    direction: bidirectional
    loss_notes:
      zh: 过程式智能体运行、JSON 文档顺序和 OWL 开放世界蕴含不属于无损 shape 映射；ValidationReport 是后续验证结果而非导出内容。
      en: Procedural agent runtime, JSON document order, and OWL open-world entailment are not lossless shape mappings; ValidationReport is a later validation result, not export content.
      ja: 手続的エージェント実行、JSON 文書順序、OWL 開世界含意は無損失 shape 写像ではなく、ValidationReport は後続検証結果で出力内容ではありません。
    conversion_note:
      zh: SHACL-1.0 双向转换只覆盖已声明 shapes 子集；导入创建规范约束候选，导出保留目标与路径，验证报告不会反向变成适配器定义。
      en: "SHACL-1.0 bidirectional conversion covers only the declared shapes subset: import creates canonical-constraint candidates, export preserves targets and paths, and validation reports never reverse-map into adapter definitions."
      ja: SHACL-1.0 の双方向変換は宣言済み shapes 部分集合だけを対象とし、取り込みは canonical 制約候補を作り、出力は対象とパスを保持し、検証報告をアダプター定義へ逆写像しません。
    conformance:
      status: contract-tested
      test_id: SHACLExportAdapter-mapping-contract-test
      method:
        zh: 验证外部版本、映射范围、方向、已知损失、唯一所有者、来源登记以及所有 canonical 目标 ID 的可解析性。
        en: Validates the external version, scope, direction, known loss, unique owner, registered source, and resolvability of every canonical target ID.
        ja: 外部版、範囲、方向、既知の損失、一意な所有者、登録出典、および全 canonical 対象 ID の解決可能性を検証します。
    status: accepted
    source_claims:
      - claim-shacl-export-adapter-006
