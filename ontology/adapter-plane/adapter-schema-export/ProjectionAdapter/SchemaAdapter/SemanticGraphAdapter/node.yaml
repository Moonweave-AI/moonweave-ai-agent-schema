        en: Positive semantic-graph schema classification
        ja: semantic graph schema 分類の正例
      scenario_id: null
      descriptions:
        zh: 一个适配器把稳定 concept IRI、is_a 方向、属性基数和图约束映射到 OWL、SHACL 或 ShEx 的版本化正式语言，并逐项报告损失，因此它满足 SemanticGraphAdapter 的种差并归入 SchemaAdapter。
        en: An adapter maps stable concept IRIs, is_a direction, property cardinality, and graph constraints into a versioned formal OWL, SHACL, or ShEx language with itemized loss, so it satisfies the SemanticGraphAdapter differentia and belongs under SchemaAdapter.
        ja: adapter が安定 concept IRI、is_a 方向、property 基数、graph 制約を版付き正式 OWL・SHACL・ShEx 言語へ写像し損失を項目別報告するため、SemanticGraphAdapter の種差を満たし SchemaAdapter 配下になる。
      field_values: {}
