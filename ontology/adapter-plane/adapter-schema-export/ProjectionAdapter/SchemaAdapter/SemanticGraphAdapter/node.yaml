schema: moonweave.ai/ontology-node/v1
id: SemanticGraphAdapter
kind: concept
status: accepted
labels:
  zh: 语义图适配器
  en: Semantic graph adapter
  ja: 意味グラフアダプター
semantics:
  short_definition:
    zh: 语义图适配器把规范概念与关系投影到保留图语义的正式语言。
    en: A SemanticGraphAdapter projects canonical concepts and relations into a formal language that preserves graph semantics.
    ja: SemanticGraphAdapter は canonical 概念と関係をグラフ意味を保つ形式言語へ投影する。
  definition:
    zh: 语义图适配器是 SchemaAdapter 的一种，目标正式语言能够直接承载节点身份、带方向的谓词边、分类关系、公理或图形状约束。它负责 IRI/标识映射、关系方向、基数和图级约束的保真与损失声明；OWL 2 处理公理及推理语义，SHACL 与 ShEx 处理 RDF 图形状，两者不能因都使用 RDF 而混成同一验证模型。Graph IR 只是 Moonweave 内部中间表示，不属于这一正式语义 schema 导出族。
    en: A SemanticGraphAdapter is a SchemaAdapter whose formal target language can directly carry node identity, directed predicate edges, taxonomy, axioms, or graph-shape constraints. It owns IRI/identifier mapping and declarations of fidelity or loss for direction, cardinality, and graph-level constraints. OWL 2 handles axioms and entailment, whereas SHACL and ShEx describe RDF graph shapes; sharing RDF does not make them one validation model. Moonweave Graph IR is only an internal intermediate representation and is outside this formal semantic-schema export family.
    ja: SemanticGraphAdapter は SchemaAdapter の一種で、正式対象言語がノード同一性、有向述語辺、分類、公理、graph shape 制約を直接担う。IRI・識別子、方向、基数、graph-level 制約の忠実性と損失を管理する。OWL 2 は公理・含意、SHACL と ShEx は RDF shape を扱い、RDF 共用だけで同一検証モデルにはならない。Moonweave Graph IR は内部中間表現であり、この正式 semantic-schema export family の対象外である。
  why_needed:
    zh: 这一层把图语义保真责任集中起来，防止把字段级模式、推理公理、形状验证和界面图形误当作同一种“图导出”。
    en: This layer centralizes graph-semantic fidelity and prevents field schemas, entailment axioms, shape validation, and UI graphics from being treated as one kind of graph export.
    ja: グラフ意味の忠実性責任を集約し、項目スキーマ、公理含意、形状検証、UI グラフィックを同じグラフ出力と誤認しない。
  includes:
    - zh: 纳入稳定 IRI/节点标识、类与属性映射、关系方向、图路径或形状约束、基数表达以及无法保留语义的明确报告。
      en: Includes stable IRI or node identifiers, class and property mappings, relation direction, graph paths or shape constraints, cardinality expression, and explicit reports of semantic loss.
      ja: 安定 IRI・ノード ID、クラス・プロパティ写像、関係方向、グラフパス・形状制約、基数表現、意味損失報告を含む。
  excludes:
    - zh: 不纳入 JSON 对象字段模式、Graph IR、前端 ViewModel、社区颜色或布局，也不把 SHACL 验证报告当作导出适配器本身。
      en: Excludes JSON object-field schemas, Graph IR, frontend view models, community colors or layout, and a SHACL validation report considered as if it were the adapter itself.
      ja: JSON 項目スキーマ、Graph IR、Frontend ViewModel、コミュニティ色・配置を含まず、SHACL 検証報告をアダプター自体と見なさない。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: semantic-graph-preserves-identity-direction-and-language-semantics
      severity: error
      expression_language: plain
      expression: every projected graph term retains a stable canonical identity, every directed relation retains ordered endpoints, and each axiom or shape is interpreted only under its named target language; renderer state and JSON document layout are excluded
      explanations:
        zh: 每个投影图术语保留稳定规范身份，每条有向关系保留端点次序，每个公理或形状只按具名目标语言解释；渲染状态和 JSON 文档布局不属于语义图投影。
        en: Every projected graph term retains a stable canonical identity, every directed relation retains ordered endpoints, and each axiom or shape is interpreted only under its named target language; renderer state and JSON document layout are excluded.
        ja: 各投影グラフ用語は安定した canonical 同一性を保ち、有向関係は端点順序を保ち、公理・形状は名称付き対象言語だけで解釈します。描画状態と JSON 文書配置は除外します。
      source_claims:
        - claim-semantic-graph-adapter-003
        - claim-semantic-graph-adapter-004
  required_relation_constraints: []
examples:
  - id: SemanticGraphAdapter-example-positive-001
    kind: positive
    labels:
      zh: 语义图适配器正例
      en: Positive example of Semantic graph adapter
      ja: 意味グラフアダプターの正例
    scenario_id: null
    descriptions:
      zh: adapter-semantic-graph@2.0.0 将规范概念 ID、is_a 分类方向、对象关系、基数和来源投影到 semantic-graph@2 的中立契约；具体下位适配器随后选择 OWL 2 公理、SHACL shapes graph 或 ShEx shape expression。家族层不把三种语言的语义混为一个通用关键字。
      en: adapter-semantic-graph@2.0.0 projects canonical concept IDs, is_a direction, object relations, cardinality, and provenance into the neutral semantic-graph@2 contract. Concrete children then choose OWL 2 axioms, a SHACL shapes graph, or ShEx shape expressions; the family does not collapse those language semantics into one generic keyword.
      ja: adapter-semantic-graph@2.0.0 は canonical 概念 ID、is_a 方向、オブジェクト関係、基数、来歴を中立 semantic-graph@2 契約へ投影し、具象子が OWL 2 公理、SHACL shapes graph、ShEx shape expression を選びます。ファミリ層で三言語の意味を一つの汎用キーワードに統合しません。
    field_values:
      schema_version: semantic-graph@2
      adapter_id: adapter-semantic-graph
      adapter_version: 2.0.0
      scope:
        - identity
        - taxonomy
        - relations
        - graph-constraints
      status: supported
      loss_kind: lossy
    related_node_ids:
      - SemanticGraphAdapter
      - SchemaAdapter
    related_relation_ids:
      - SemanticGraphAdapter-is_a-SchemaAdapter
    expected_result:
      zh: 所有下位格式共享稳定身份、端点方向和来源基线，同时各自的开放世界、公理或形状验证语义保持独立。
      en: All child formats share stable identity, endpoint direction, and provenance baselines while their open-world, axiom, or shape-validation semantics remain distinct.
      ja: 下位形式は安定同一性、端点方向、来歴基線を共有しつつ、開世界、公理、形状検証の意味を別々に保持します。
    why_valid_or_invalid:
      zh: 家族契约只统一图身份和关系保真，不宣称 OWL、SHACL 与 ShEx 等价，因此既可复用又不抹平目标语言差异。
      en: The family contract standardizes graph identity and relation fidelity without claiming OWL, SHACL, and ShEx equivalence, preserving reuse without erasing target-language differences.
      ja: ファミリ契約はグラフ同一性と関係忠実性だけを共通化し、OWL、SHACL、ShEx の等価性を主張せず、対象言語差を保った再利用を可能にします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-semantic-graph-adapter-005
      - claim-semantic-graph-adapter-006
  - id: SemanticGraphAdapter-example-boundary-001
    kind: boundary
    labels:
      zh: 语义图适配器边界例
      en: Boundary case for Semantic graph adapter
      ja: 意味グラフアダプターの境界例
    scenario_id: null
    descriptions:
      zh: FrontendViewAdapter 为同一关系计算曲线、颜色、社区标签和选中状态。这些信息帮助人阅读，却不声明 IRI、图形状或本体公理，也不能改变关系端点方向；因此它是展示 ViewModel，不是 SemanticGraphAdapter 的图语义投影。
      en: FrontendViewAdapter computes curves, colors, community labels, and selection state for the same relation. Those values aid reading but declare no IRIs, graph shapes, or ontology axioms and cannot change endpoint direction, so the ViewModel is not a SemanticGraphAdapter projection.
      ja: FrontendViewAdapter は同じ関係へ曲線、色、コミュニティラベル、選択状態を計算しますが、IRI、グラフ形状、本体公理を宣言せず端点方向も変更できません。したがって表示 ViewModel は SemanticGraphAdapter 投影ではありません。
    field_values: {}
    related_node_ids:
      - SemanticGraphAdapter
      - SchemaAdapter
      - FrontendViewAdapter
    related_relation_ids:
      - SemanticGraphAdapter-is_a-SchemaAdapter
    expected_result:
      zh: 颜色、曲线和选中状态留在 ViewModel；语义图记录只保留稳定身份、有向端点、目标语言构造和来源。
      en: Colors, curves, and selection remain in the ViewModel; semantic graph records retain only stable identity, directed endpoints, target-language constructs, and provenance.
      ja: 色、曲線、選択状態は ViewModel に残り、意味グラフ記録は安定同一性、有向端点、対象言語構成、来歴だけを保持します。
    why_valid_or_invalid:
      zh: 展示属性没有目标语义语言的解释规则，也不参与推理或形状验证；将其纳入会污染语义图的可移植性。
      en: Presentation attributes have no interpretation rules in the target semantic language and participate in neither entailment nor shape validation; including them would damage portability.
      ja: 表示属性には対象意味言語の解釈規則がなく、含意にも形状検証にも関与しないため、含めると意味グラフの移植性を損ないます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-semantic-graph-adapter-007
      - claim-semantic-graph-adapter-008
  - id: SemanticGraphAdapter-example-instance-001
    kind: instance
    labels:
      zh: 语义图适配器结构化实例
      en: Structured instance of Semantic graph adapter
      ja: 意味グラフアダプターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: adapter-semantic-graph 版本 2.0.0 固定 semantic-graph@2，范围为 identity、taxonomy、relations 与 graph-constraints。loss_kind=lossy 表示每个具体目标必须列出其无法表示的规范语义，而不是把不同图语言强行宣称为无损等价。
      en: adapter-semantic-graph version 2.0.0 pins semantic-graph@2 for identity, taxonomy, relations, and graph-constraints. loss_kind=lossy requires each target to list unrepresentable canonical semantics rather than claiming that different graph languages are losslessly equivalent.
      ja: adapter-semantic-graph 2.0.0 は semantic-graph@2 を固定し、identity、taxonomy、relations、graph-constraints を対象にします。loss_kind=lossy は異なるグラフ言語を無損失同値とせず、各対象が表現不能な canonical 意味を列挙することを要求します。
    field_values:
      adapter_id: adapter-semantic-graph
      adapter_version: 2.0.0
      scope:
        - identity
        - taxonomy
        - relations
        - graph-constraints
      status: supported
      schema_version: semantic-graph@2
      loss_kind: lossy
    related_node_ids:
      - SemanticGraphAdapter
    related_relation_ids: []
    expected_result:
      zh: 注册表可按稳定家族契约选择 OWL、SHACL 或 ShEx 下位适配器，并要求它们保持身份、方向和来源。
      en: The registry can select an OWL, SHACL, or ShEx child under a stable family contract and requires each to preserve identity, direction, and provenance.
      ja: レジストリは安定ファミリ契約の下で OWL、SHACL、ShEx 子を選択し、同一性、方向、来歴の保持を要求できます。
    why_valid_or_invalid:
      zh: 身份、版本、范围、家族契约和损失政策相互一致，且未预先指定任何一种具体图语言的专有语义。
      en: Identity, version, scope, family contract, and loss policy agree without pre-assigning any one concrete graph language's proprietary semantics.
      ja: 識別、版、範囲、ファミリ契約、損失方針が整合し、特定グラフ言語固有意味を先取りしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-semantic-graph-adapter-009
      - claim-semantic-graph-adapter-010
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: StructuralSchemaAdapter
    shared_parent_concept_id: SchemaAdapter
    differentia:
      zh: 同属 SchemaAdapter 时，SemanticGraphAdapter 处理稳定节点身份、定向谓词、分类、公理和 RDF 图形状；StructuralSchemaAdapter 只处理一个文档或载荷内部的字段、类型、必填性与局部值约束。共享“可验证”目标不构成语义等价。
      en: Under SchemaAdapter, SemanticGraphAdapter handles stable node identity, directed predicates, taxonomy, axioms, and RDF graph shapes, while StructuralSchemaAdapter handles fields, types, requiredness, and local value constraints inside one document or payload. A shared validation goal does not make their semantics equivalent.
      ja: SchemaAdapter 配下で SemanticGraphAdapter は安定ノード同一性、方向付き述語、分類、公理、RDF graph shape を扱い、StructuralSchemaAdapter は一文書・ペイロード内部の項目、型、必須性、局所値制約を扱う。共通の検証目的は意味同値を成立させない。
    source_claims:
      - claim-semantic-graph-adapter-011
