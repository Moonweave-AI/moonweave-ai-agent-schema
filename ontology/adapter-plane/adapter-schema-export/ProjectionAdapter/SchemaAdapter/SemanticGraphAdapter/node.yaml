      expected_result:
        zh: 分类器保留一条 SemanticGraphAdapter → SchemaAdapter 的主骨架关系。
        en: Classification retains one primary-backbone relation from SemanticGraphAdapter to SchemaAdapter.
        ja: 分類器は SemanticGraphAdapter → SchemaAdapter の主 backbone 関係を一つ保持する。
      why_valid_or_invalid:
        zh: 目标是具有版本与一致性规则的正式 schema 语言，并直接承载图级语义，满足父类与种差。
        en: The target is a versioned formal schema language with conformance rules and directly carries graph-level semantics, satisfying both genus and differentia.
        ja: 対象は版と適合規則を持つ正式 schema 言語で graph-level 意味を直接担い、類と種差を満たす。
