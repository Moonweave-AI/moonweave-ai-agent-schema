      related_relation_ids:
        - SemanticGraphAdapter-is_a-SchemaAdapter
      expected_result:
        zh: GraphIRAdapter 保持 ProjectionAdapter 子类身份，不被该关系误归为 schema 适配器。
        en: GraphIRAdapter remains a ProjectionAdapter subtype and is not misclassified as a schema adapter by this relation.
        ja: GraphIRAdapter は ProjectionAdapter 下位型のままで、この関係により schema adapter へ誤分類されない。
      why_valid_or_invalid:
        zh: 正式 schema 的版本、词汇和一致性边界是必要条件，内部节点—边形状本身不足。
        en: A formal schema's version, vocabulary, and conformance boundary are necessary; internal node-edge shape alone is insufficient.
        ja: 正式 schema の版、語彙、適合境界が必要で、内部 node-edge 形だけでは不十分である。
