schema: moonweave.ai/ontology-node/v1
id: ShExExportAdapter
kind: concept
status: accepted
labels:
  zh: ShEx 导出适配器
  en: ShEx export adapter
  ja: ShEx エクスポートアダプター
semantics:
  short_definition:
    zh: ShEx 导出适配器把规范 RDF 节点结构投影为 ShEx 2.1 形状表达。
    en: A ShExExportAdapter projects canonical RDF node structure into ShEx 2.1 shape expressions.
    ja: ShExExportAdapter は canonical RDF ノード構造を ShEx 2.1 shape expression へ投影する。
  definition:
    zh: ShEx 导出适配器是 SemanticGraphAdapter 的一种，将 RDF 节点约束映射为 shape、triple constraint、谓词、值表达和基数，并声明 shape references、闭合/额外谓词策略及所用语法。ShEx 2.1 描述节点及其相邻三元组的结构；它不是 OWL 推理语言，也不能把 SHACL 的 target、severity 或 ValidationReport 原样视作 ShEx 构造。
    en: A ShExExportAdapter is a SemanticGraphAdapter that maps RDF node constraints to shapes, triple constraints, predicates, value expressions, and cardinalities and declares shape references, CLOSED/EXTRA policy, and the selected syntax. ShEx 2.1 describes a node and its surrounding triples. It is not an OWL entailment language, and SHACL targets, severity, or ValidationReport constructs cannot be assumed to have direct ShEx equivalents.
    ja: ShExExportAdapter は SemanticGraphAdapter の一種で、RDF ノード制約を shape、triple constraint、predicate、value expression、基数へ写像し、shape reference、CLOSED/EXTRA 方針、構文を宣言する。ShEx 2.1 はノードと周辺 triple を記述する。OWL 含意言語ではなく、SHACL target・severity・ValidationReport に直接同値とはしない。
  why_needed:
    zh: 独立记录 ShEx 映射能支持紧凑的 RDF 接口契约，同时如实暴露它与 SHACL 目标选择和报告模型之间的差异。
    en: A separate ShEx mapping supports compact RDF interface contracts while exposing differences from SHACL target selection and reporting semantics.
    ja: ShEx 写像を独立させ、簡潔な RDF インターフェース契約を提供しつつ SHACL の target・report 意味との差を明示する。
  includes:
    - zh: 纳入 shape label、triple constraint、值类/数据类型、基数、shape reference、组合表达以及 CLOSED/EXTRA 策略。
      en: Includes shape labels, triple constraints, value classes or datatypes, cardinalities, shape references, composition expressions, and CLOSED/EXTRA policy.
      ja: shape label、triple constraint、value class・datatype、基数、shape reference、合成式、CLOSED/EXTRA 方針を含む。
  excludes:
    - zh: 不纳入 SHACL target/severity/report、OWL 公理与推理、JSON Schema 对象关键字，也不纳入某次 ShEx 验证结果。
      en: Excludes SHACL target/severity/report constructs, OWL axioms and entailment, JSON Schema object keywords, and the result of an individual ShEx validation.
      ja: SHACL target・severity・report、OWL 公理・含意、JSON Schema object keyword、個別 ShEx 検証結果は含まない。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: shex-adapter-exports-shape-expressions
      severity: error
      expression_language: plain
      expression: ShExExportAdapter emits ShEx 2.1 shape expressions and triple constraints with explicit cardinalities; SHACL targets or severities and individual node-validation results are conversion context, not native ShEx shape constructs or adapter identity
      explanations:
        zh: ShExExportAdapter 输出带明确基数的 ShEx 2.1 shape expression 与 triple constraint；SHACL target/severity 和单个节点验证结果属于转换上下文，不是原生 ShEx 形状构造或适配器身份。
        en: ShExExportAdapter emits ShEx 2.1 shape expressions and triple constraints with explicit cardinalities; SHACL targets or severities and individual node-validation results are conversion context, not native ShEx shape constructs or adapter identity.
        ja: ShExExportAdapter は明示基数を持つ ShEx 2.1 shape expression と triple constraint を出力します。SHACL target／severity と個別ノード検証結果は変換文脈であり、ShEx 固有形状構成やアダプター同一性ではありません。
      source_claims:
        - claim-sh-ex-export-adapter-002
  required_relation_constraints: []
examples:
  - id: ShExExportAdapter-example-positive-001
    kind: positive
    labels:
      zh: ShEx 导出适配器正例
      en: Positive example of ShEx export adapter
      ja: ShEx エクスポートアダプターの正例
    scenario_id: null
    descriptions:
      zh: AgentShape 被导出为 ShEx-2.1 shape expression，其中 hasOwner 是值表达式 IRI、基数 1..1 的 triple constraint；execution_mode 使用值集合 [interactive autonomous]、基数 0..1。adapter-shex@2.0.0 保留谓词 IRI、值约束和基数，不生成 SHACL 术语。
      en: AgentShape is exported as a ShEx-2.1 shape expression with hasOwner as a triple constraint whose value expression is IRI and cardinality is 1..1; execution_mode uses value set [interactive autonomous] with cardinality 0..1. adapter-shex@2.0.0 preserves predicate IRIs, value constraints, and cardinalities without emitting SHACL terms.
      ja: AgentShape を ShEx-2.1 shape expression として出力し、hasOwner を値式 IRI、基数 1..1 の triple constraint とし、execution_mode を値集合 [interactive autonomous]、基数 0..1 とします。adapter-shex@2.0.0 は述語 IRI、値制約、基数を保持し SHACL 用語を生成しません。
    field_values:
      adapter_id: adapter-shex
      adapter_version: 2.0.0
      scope:
        - rdf-node-shapes
        - property-constraints
        - cardinalities
      status: supported
      schema_version: ShEx-2.1
      loss_kind: lossy
    related_node_ids:
      - ShExExportAdapter
      - SemanticGraphAdapter
    related_relation_ids:
      - ShExExportAdapter-is_a-SemanticGraphAdapter
    expected_result:
      zh: ShEx 处理器可解析两个 triple constraint，并据其值表达式和基数判断指定 RDF 节点是否满足 AgentShape。
      en: A ShEx processor parses both triple constraints and can determine whether a designated RDF node satisfies AgentShape from their value expressions and cardinalities.
      ja: ShEx 処理系は二つの triple constraint を解析し、値式と基数から指定 RDF ノードが AgentShape を満たすか判定できます。
    why_valid_or_invalid:
      zh: 每项规范约束都对应 ShEx shape/triple expression 的原生构造，目标版本和基数明确，没有混入另一形状语言的术语。
      en: Each canonical constraint maps to a native ShEx shape or triple-expression construct with explicit version and cardinality, without importing another shape language's terms.
      ja: 各 canonical 制約は ShEx shape／triple expression 固有構成へ写像され、版と基数が明示され、別形状言語の用語を混入しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-sh-ex-export-adapter-003
  - id: ShExExportAdapter-example-boundary-001
    kind: boundary
    labels:
      zh: ShEx 导出适配器边界例
      en: Boundary case for ShEx export adapter
      ja: ShEx エクスポートアダプターの境界例
    scenario_id: null
    descriptions:
      zh: 来源约束含 SHACL 的 sh:targetClass Agent 与 sh:severity sh:Warning。ShEx 可以表达 Agent 节点需满足哪些 triple constraint，但其 shape expression 并不原生携带 SHACL 的目标选择和严重级别语义；直接复制同名字段会制造虚假的等价关系。
      en: A source constraint includes SHACL sh:targetClass Agent and sh:severity sh:Warning. ShEx can express which triple constraints an Agent node must satisfy, but a ShEx shape expression does not natively carry SHACL target selection or severity semantics; copying similarly named fields would create false equivalence.
      ja: 元制約に SHACL の sh:targetClass Agent と sh:severity sh:Warning があっても、ShEx はノードが満たす triple constraint を表現する一方、SHACL の対象選択や severity 意味を shape expression に固有には持ちません。同名項目のコピーは偽同値を作ります。
    field_values: {}
    related_node_ids:
      - ShExExportAdapter
      - SemanticGraphAdapter
      - SHACLExportAdapter
    related_relation_ids:
      - ShExExportAdapter-is_a-SemanticGraphAdapter
    expected_result:
      zh: ShEx 产物只保留可表达的 shape/triple constraints，并为 targetClass 和 severity 生成转换警告或外部 shape map 配置。
      en: The ShEx product retains only expressible shape and triple constraints and records targetClass and severity as conversion warnings or external shape-map configuration.
      ja: ShEx 生成物は表現可能な shape／triple constraints だけを保持し、targetClass と severity を変換警告または外部 shape map 設定として記録します。
    why_valid_or_invalid:
      zh: SHACL 与 ShEx 都验证 RDF 节点并不意味着构造逐项等价；适配器必须按 ShEx 语义表达形状并显式记录缺口。
      en: SHACL and ShEx both validating RDF nodes does not make their constructs equivalent; the adapter must express the shape under ShEx semantics and record gaps explicitly.
      ja: SHACL と ShEx が共に RDF ノードを検証しても構成が逐項等価とは限らず、アダプターは ShEx 意味で形状を表し差分を明示します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-sh-ex-export-adapter-004
  - id: ShExExportAdapter-example-instance-001
    kind: instance
    labels:
      zh: ShEx 导出适配器结构化实例
      en: Structured instance of ShEx export adapter
      ja: ShEx エクスポートアダプターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: adapter-shex 版本 2.0.0 固定 ShEx-2.1，范围为 rdf-node-shapes、property-constraints 与 cardinalities。loss_kind=lossy 表明 SHACL 专属目标/严重级别、过程式运行和 JSON 文档顺序不会被宣称为 ShEx 原生语义。
      en: adapter-shex version 2.0.0 pins ShEx-2.1 for rdf-node-shapes, property-constraints, and cardinalities. loss_kind=lossy states that SHACL-specific targeting or severity, procedural runtime, and JSON document order are not claimed as native ShEx semantics.
      ja: adapter-shex 2.0.0 は ShEx-2.1 を固定し、rdf-node-shapes、property-constraints、cardinalities を対象にします。loss_kind=lossy は SHACL 固有 target／severity、手続的実行、JSON 文書順序を ShEx 固有意味としないことを示します。
    field_values:
      adapter_id: adapter-shex
      adapter_version: 2.0.0
      scope:
        - rdf-node-shapes
        - property-constraints
        - cardinalities
      status: supported
      schema_version: ShEx-2.1
      loss_kind: lossy
    related_node_ids:
      - ShExExportAdapter
    related_relation_ids: []
    expected_result:
      zh: 投影器生成版本化 shape expression，并为每个未映射的目标语言专属语义保留损失条目。
      en: The projector emits a versioned shape expression and retains a loss item for every unmapped source-language-specific semantic.
      ja: 投影器は版付き shape expression を生成し、未写像の元言語固有意味ごとに損失項目を保持します。
    why_valid_or_invalid:
      zh: 身份、版本、ShEx 构造范围和损失政策一致，且没有把一次节点验证结果当作适配器配置。
      en: Identity, version, ShEx construct scope, and loss policy agree, and no individual node-validation result is treated as adapter configuration.
      ja: 識別、版、ShEx 構成範囲、損失方針が整合し、個別ノード検証結果をアダプター設定として扱いません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-sh-ex-export-adapter-005
external_mappings:
  - id: ShExExportAdapter-external-mapping
    system: ShEx
    external_identifier: ShEx
    external_version: ShEx-2.1
    canonical_target_ids:
      - SchemaArtifact
      - GraphArtifact
      - MappingRule
    mapping_kind: related
    scope:
      zh: 在声明的 ShEx 2.1 子集内映射 shape label、triple constraint、谓词 IRI、值表达式或值集合、shape reference、基数以及 CLOSED/EXTRA 策略。
      en: Maps shape labels, triple constraints, predicate IRIs, value expressions or value sets, shape references, cardinalities, and CLOSED/EXTRA policy within the declared ShEx 2.1 subset.
      ja: 宣言した ShEx 2.1 サブセット内で shape label、triple constraint、predicate IRI、value expression／value set、shape reference、基数、CLOSED/EXTRA 方針を写像する。
    direction: bidirectional
    loss_notes:
      zh: SHACL 的 target、severity 和 ValidationReport、OWL 推理、JSON 文档顺序以及过程式运行状态都不是 ShEx 形状表达式的原生语义；转换时必须逐项报告。
      en: SHACL targets, severity, and ValidationReport, OWL entailment, JSON document order, and procedural runtime state are not native ShEx shape-expression semantics and must be reported item by item.
      ja: SHACL の target・severity・ValidationReport、OWL 含意、JSON 文書順序、手続的実行状態は ShEx shape expression 固有意味ではなく、変換時に項目別報告する。
    conversion_note:
      zh: 仅对已声明且可逆的 ShEx-2.1（ShEx 2.1）子集执行双向映射：导入先形成候选约束并等待规范 ID 对齐，导出保留谓词 IRI 与 shape reference；任何超出子集的构造都生成损失条目，不承诺通用往返等价。
      en: "Bidirectional conversion is limited to the declared reversible ShEx-2.1 (ShEx 2.1) subset: import creates candidate constraints pending canonical-ID alignment, export preserves predicate IRIs and shape references, and every construct outside the subset produces a loss item rather than a general round-trip-equivalence claim."
      ja: 双方向変換は宣言済みで可逆な ShEx-2.1（ShEx 2.1）サブセットに限定する。import は canonical ID 照合待ち候補制約を作り、export は predicate IRI と shape reference を保持し、範囲外構成は一般的往復同値を主張せず損失項目にする。
    conformance:
      status: contract-tested
      test_id: ShExExportAdapter-mapping-contract-test
      method:
        zh: 验证外部版本、映射范围、方向、已知损失、唯一所有者、来源登记以及所有 canonical 目标 ID 的可解析性。
        en: Validates the external version, scope, direction, known loss, unique owner, registered source, and resolvability of every canonical target ID.
        ja: 外部版、範囲、方向、既知の損失、一意な所有者、登録出典、および全 canonical 対象 ID の解決可能性を検証します。
    status: accepted
    source_claims:
      - claim-sh-ex-export-adapter-006
applicability:
  - adapter
sibling_differentiation:
  - sibling_concept_id: OWLExportAdapter
    shared_parent_concept_id: SemanticGraphAdapter
    differentia:
      zh: 正向身份比较：父节点 SemanticGraphAdapter：ShExExportAdapter（semantic kind=capability，骨架 ShExExportAdapter-is_a-SemanticGraphAdapter）；OWLExportAdapter（semantic kind=capability，骨架 OWLExportAdapter-is_a-SemanticGraphAdapter）。双端条件：ShExExportAdapter 条件：“ShEx 导出适配器是以如下事实为区分特征的语义图适配器：它把规范本体术语投影为 RDF 图验证的 ShEx 形状表达，并保持 ShEx 语义区别于 SHACL 与 JSON Schema 输出”；OWLExportAdapter 条件：“作为语义图适配器，OWL 导出适配器由这一事实区分：它把规范本体术语投影为 OWL/RDF 导出产物，同时保持 OWL 公理和语义推理与规范 JSON 结构契约分离”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent SemanticGraphAdapter: ShExExportAdapter (semantic kind=capability, backbone ShExExportAdapter-is_a-SemanticGraphAdapter); OWLExportAdapter (semantic kind=capability, backbone OWLExportAdapter-is_a-SemanticGraphAdapter). Endpoint conditions: ShExExportAdapter condition: “ShEx export adapter is a Semantic graph adapter; its differentiating condition is that it projects canonical ontology terms into ShEx shape expressions for RDF graph validation, keeping ShEx semantics distinct from SHACL and JSON Schema outputs”; OWLExportAdapter condition: “OWL export adapter belongs to the Semantic graph adapter category and differs from broader members in that it projects canonical ontology terms into OWL/RDF export artifacts while keeping OWL axioms and semantic reasoning separate from the canonical structural JSON schema contract”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 SemanticGraphAdapter：ShExExportAdapter（semantic kind=capability、バックボーン ShExExportAdapter-is_a-SemanticGraphAdapter）；OWLExportAdapter（semantic kind=capability、バックボーン OWLExportAdapter-is_a-SemanticGraphAdapter）。両端条件：ShExExportAdapter の条件：「ShEx エクスポートアダプターは意味グラフアダプターの一種であり、次の条件で区別されます：それは、標準オントロジー用語を RDF グラフ検証用の ShEx 形状式へ投影し、ShEx 意味を SHACL と JSON Schema 出力から区別します」；OWLExportAdapter の条件：「OWL エクスポートアダプターは意味グラフアダプターとして、次の条件により他の対象と区別されます：それは、標準オントロジー用語を OWL/RDF エクスポート成果物へ投影し、OWL 公理と意味推論を標準 JSON 構造契約から分離します」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-sh-ex-export-adapter-007
      - claim-sh-ex-export-adapter-008
