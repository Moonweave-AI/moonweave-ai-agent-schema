schema: moonweave.ai/ontology-node/v1
id: StructuralSchemaAdapter
kind: concept
status: accepted
labels:
  zh: 结构模式适配器
  en: Structural schema adapter
  ja: 構造スキーマアダプター
semantics:
  short_definition:
    zh: 结构模式适配器把记录或载荷的字段结构投影到可验证的对象模式。
    en: A StructuralSchemaAdapter projects record or payload field structure into a verifiable object schema.
    ja: StructuralSchemaAdapter は記録・ペイロードの項目構造を検証可能なオブジェクトスキーマへ投影する。
  definition:
    zh: 结构模式适配器是 SchemaAdapter 的一种，关注单个文档、消息或对象记录可观察的结构：字段名、类型、必填性、数组与对象嵌套、枚举和局部值约束。JSONSchemaAdapter 是直接输出标准模式的现行下位类；Pydantic 2 与 Zod 4 则作为该适配器节点内登记的外部映射剖面，描述库类型、生成模式和已知损失，而不是独立的现行子类。该层不负责节点间分类、RDF 路径、OWL 推理或界面布局。
    en: "A StructuralSchemaAdapter is a SchemaAdapter concerned with the observable structure of one document, message, or object record: field names, types, requiredness, nested arrays and objects, enumerations, and local value constraints. JSONSchemaAdapter is the current child class that directly emits a standard schema. Pydantic 2 and Zod 4 are instead registered as inline external-mapping profiles that describe library types, generation modes, and known loss; they are not separate current subclasses. This layer does not own inter-node taxonomy, RDF paths, OWL entailment, or UI layout."
    ja: StructuralSchemaAdapter は SchemaAdapter の一種で、一つの文書・メッセージ・オブジェクト記録の観測可能な構造、すなわち項目名、型、必須性、配列・オブジェクトの入れ子、列挙、局所値制約を扱う。JSONSchemaAdapter は標準 schema を直接出力する現行の下位クラスである。一方、Pydantic 2 と Zod 4 はライブラリ型、生成モード、既知の損失を記述するノード内 external-mapping profile として登録され、独立した現行下位クラスではない。ノード間分類、RDF path、OWL 含意、UI 配置は扱わない。
  why_needed:
    zh: 这一层为跨语言载荷兼容性提供统一边界，并阻止“字段验证成功”被误读为“本体关系语义正确”。
    en: This layer provides a common boundary for cross-language payload compatibility and prevents successful field validation from being read as correct ontology relation semantics.
    ja: 言語横断ペイロード互換の共通境界を提供し、項目検証成功を本体関係意味の正しさと誤読しない。
  includes:
    - zh: 纳入字段映射、类型/空值策略、必填性、对象与数组组合、默认值、枚举、局部约束和目标库的输入/输出模式。
      en: Includes field mapping, type and nullability policy, requiredness, object and array composition, defaults, enums, local constraints, and target-library input/output mode.
      ja: 項目写像、型・null 方針、必須性、object/array 合成、既定値、列挙、局所制約、対象ライブラリ input/output モードを含む。
  excludes:
    - zh: 不纳入 OWL 公理、SHACL/ShEx 图形状、Graph IR 节点—边记录、前端 ViewModel、运行时验证结果或 SchemaProjectionRun。
      en: Excludes OWL axioms, SHACL/ShEx graph shapes, Graph IR node-edge records, frontend view models, runtime validation results, and SchemaProjectionRun.
      ja: OWL 公理、SHACL・ShEx グラフ形状、Graph IR ノード・辺、Frontend ViewModel、実行時検証結果、SchemaProjectionRun は含まない。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: structural-schema-adapter-preserves-document-structure-boundary
      severity: error
      expression_language: plain
      expression: StructuralSchemaAdapter maps fields, types, requiredness, nesting, and local value constraints for one record or payload; inter-node taxonomy, graph paths, entailment, execution state, and view layout remain outside this capability and every unsupported source constraint produces an explicit loss item
      explanations:
        zh: StructuralSchemaAdapter 只映射单个记录或载荷的字段、类型、必填性、嵌套与局部值约束；节点间分类、图路径、推理、执行状态和视图布局均不属于该能力，任何目标语言无法表达的来源约束都必须生成明确损失项。
        en: StructuralSchemaAdapter maps fields, types, requiredness, nesting, and local value constraints for one record or payload; inter-node taxonomy, graph paths, entailment, execution state, and view layout remain outside this capability, and every unsupported source constraint produces an explicit loss item.
        ja: StructuralSchemaAdapter は一つの記録・ペイロードの項目、型、必須性、入れ子、局所値制約だけを写像する。ノード間分類、graph path、含意、実行状態、表示配置は範囲外で、対象言語が表せない元制約は明示的な損失項目にする。
      source_claims:
        - claim-structural-schema-adapter-002
  required_relation_constraints: []
examples:
  - id: StructuralSchemaAdapter-example-positive-001
    kind: positive
    labels:
      zh: 结构模式适配器正例
      en: Positive example of Structural schema adapter
      ja: 構造スキーマアダプターの正例
    scenario_id: null
    descriptions:
      zh: 一份 AgentConfig 规范记录包含必填字符串 name、枚举 execution_mode、最小值为 0 的整数 retries，以及元素为字符串的 tools 数组。StructuralSchemaAdapter 把这些字段、类型、必填性、枚举、数值下界和数组元素约束整理为中立结构契约；JSONSchemaAdapter 可将其直接输出为标准模式，Pydantic 2 或 Zod 4 的实现选择则由节点内外部映射剖面记录，并显式列出不可逆损失。
      en: An AgentConfig canonical record has required string name, enum execution_mode, integer retries with minimum 0, and a tools array whose items are strings. StructuralSchemaAdapter organizes those fields, types, requiredness, enum, numeric bound, and array-item constraint as a neutral structural contract. JSONSchemaAdapter can emit it directly as a standard schema, while a Pydantic 2 or Zod 4 implementation choice is recorded by an inline external-mapping profile with explicit irreversible loss.
      ja: AgentConfig の canonical 記録は必須 string の name、列挙 execution_mode、最小値 0 の integer retries、string 要素の tools 配列を持つ。StructuralSchemaAdapter は項目、型、必須性、列挙、数値下限、配列要素制約を中立構造契約にまとめる。JSONSchemaAdapter はそれを標準 schema として直接出力でき、Pydantic 2 または Zod 4 の実装選択はノード内 external-mapping profile に記録し、不可逆な損失を明示する。
    field_values:
      schema_version: structural-schema@2
      adapter_id: adapter-structural-schema
      adapter_version: 2.0.0
      scope:
        - fields
        - types
        - requiredness
        - value-constraints
      status: supported
      loss_kind: lossy
    related_node_ids:
      - StructuralSchemaAdapter
      - SchemaAdapter
    related_relation_ids:
      - StructuralSchemaAdapter-is_a-SchemaAdapter
    expected_result:
      zh: 中立契约明确保留四个字段的结构语义，并允许具体子适配器选择目标关键字或库构造；目标不支持的约束必须出现在损失清单中。
      en: The neutral contract retains the four fields' structural semantics and lets a concrete child adapter choose target keywords or library constructs; every unsupported constraint appears in the loss manifest.
      ja: 中立契約は四項目の構造意味を保持し、具体子アダプターが対象 keyword／ライブラリ構成を選ぶ。未対応制約は損失一覧に現れる。
    why_valid_or_invalid:
      zh: 案例只涉及单个对象记录的字段结构和局部值约束，正好落在结构模式能力边界内，并把具体语法选择留给下位适配器。
      en: The case concerns only one object record's field structure and local value constraints, exactly the structural-schema boundary, while leaving concrete syntax to child adapters.
      ja: 一つの object 記録の項目構造と局所値制約だけを扱い、構造スキーマ境界に一致し、具体構文を子アダプターへ委ねる。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-structural-schema-adapter-003
  - id: StructuralSchemaAdapter-example-boundary-001
    kind: boundary
    labels:
      zh: 结构模式适配器边界例
      en: Boundary case for Structural schema adapter
      ja: 構造スキーマアダプターの境界例
    scenario_id: null
    descriptions:
      zh: 规范事实 Agent is_a Entity 表达两个节点之间的分类关系。把它改写为 Agent 对象上的 entity_type 字符串字段虽然能通过对象校验，却丢失目标节点身份、方向和可推理的分类语义；因此该事实不得由 StructuralSchemaAdapter 宣称无损拥有。
      en: The ontology assertion Agent is_a Entity classifies one node under another. Rewriting it as an entity_type string field on an Agent object may pass object validation but loses target-node identity, direction, and inferable taxonomy, so StructuralSchemaAdapter must not claim a lossless mapping.
      ja: canonical 事実 Agent is_a Entity はノード間分類を表す。Agent object の entity_type 文字列へ書き換えると object 検証には通っても、対象ノード同一性、方向、推論可能な分類意味を失うため、StructuralSchemaAdapter は無損失写像を主張できない。
    field_values: {}
    related_node_ids:
      - StructuralSchemaAdapter
      - SchemaAdapter
      - SemanticGraphAdapter
    related_relation_ids:
      - StructuralSchemaAdapter-is_a-SchemaAdapter
    expected_result:
      zh: 投影器拒绝“无损”标记，保留原始关系作为未映射语义或把该工作移交 SemanticGraphAdapter，并记录明确损失原因。
      en: The projector rejects a lossless status, retains the original relation as unmapped semantics or delegates it to SemanticGraphAdapter, and records the exact loss reason.
      ja: projector は lossless 状態を拒否し、元関係を未写像意味として保持するか SemanticGraphAdapter へ委譲し、正確な損失理由を記録する。
    why_valid_or_invalid:
      zh: 对象字段结构不能承载完整的跨节点分类语义；明确拒绝伪等价正是 StructuralSchemaAdapter 与语义图适配器的边界。
      en: Object-field structure cannot carry the complete semantics of an inter-node classification; rejecting that false equivalence defines the boundary from semantic-graph adapters.
      ja: object 項目構造はノード間分類の完全意味を保持できず、偽同値を拒否することが semantic graph adapter との境界になる。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-structural-schema-adapter-004
      - claim-structural-schema-adapter-005
  - id: StructuralSchemaAdapter-example-instance-001
    kind: instance
    labels:
      zh: 结构模式适配器结构化实例
      en: Structured instance of Structural schema adapter
      ja: 構造スキーマアダプターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: adapter-structural-schema 版本 2.0.0 固定 structural-schema@2 中立契约，范围为 fields、types、requiredness 与 value-constraints；loss_kind=lossy 要求每个跨节点或目标语言无法表达的约束进入损失清单。
      en: adapter-structural-schema version 2.0.0 pins the neutral structural-schema@2 contract for fields, types, requiredness, and value-constraints; loss_kind=lossy requires every cross-node or target-language-inexpressible constraint to enter the loss manifest.
      ja: adapter-structural-schema 2.0.0 は fields、types、requiredness、value-constraints 用の中立 structural-schema@2 契約を固定し、loss_kind=lossy によりノード間または対象言語で表せない制約を損失一覧へ入れる。
    field_values:
      adapter_id: adapter-structural-schema
      adapter_version: 2.0.0
      scope:
        - fields
        - types
        - requiredness
        - value-constraints
      status: supported
      schema_version: structural-schema@2
      loss_kind: lossy
    related_node_ids:
      - StructuralSchemaAdapter
    related_relation_ids: []
    expected_result:
      zh: 配置选择中立结构模式能力而非具体语法，并为后续具体子适配器提供一致的输入边界与损失政策。
      en: The configuration selects the neutral structural-schema capability rather than a concrete syntax and supplies a consistent input boundary and loss policy to downstream child adapters.
      ja: 設定は具体構文でなく中立構造スキーマ能力を選び、下流子アダプターへ一貫した入力境界と損失方針を渡す。
    why_valid_or_invalid:
      zh: 身份、版本、范围与损失政策彼此一致，且配置没有冒充一次投影运行、目标产物或运行时验证结果。
      en: Identity, version, scope, and loss policy agree, and the configuration does not masquerade as a projection run, target artifact, or runtime validation result.
      ja: 識別、版、範囲、損失方針が整合し、投影実行、対象 artifact、実行時検証結果を装っていない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-structural-schema-adapter-006
external_mappings:
  - id: PydanticProfileAdapter-external-mapping
    system: Pydantic
    external_identifier: Pydantic
    external_version: Pydantic-2
    canonical_target_ids:
      - SchemaArtifact
      - MappingRule
    mapping_kind: related
    scope:
      zh: 映射 Python 载荷模型、字段类型与约束、枚举、BaseModel/TypeAdapter 模式以及 validation/serialization 模式选择。
      en: Maps Python payload models, field types and constraints, enums, BaseModel or TypeAdapter schemas, and validation or serialization mode selection.
      ja: Python ペイロードモデル、フィールド型・制約、列挙、BaseModel／TypeAdapter スキーマ、validation／serialization モード選択を写像します。
    direction: bidirectional
    loss_notes:
      zh: 图拓扑、跨记录引用、开放世界公理和时序约束需要外部检查；自定义 Python 验证器也不保证可逆为通用结构模式。
      en: Graph topology, cross-record references, open-world axioms, and temporal constraints require external checks; custom Python validators are not guaranteed to round-trip into portable structural schemas.
      ja: グラフ構造、記録間参照、開世界公理、時系列制約は外部検査が必要で、独自 Python 検証器も汎用構造スキーマへ可逆とは限りません。
    conversion_note:
      zh: Pydantic-2 双向转换仅覆盖声明的结构子集并固定模式用途；导入自定义验证器或导出图语义时必须生成不可逆损失项。
      en: Pydantic-2 bidirectional conversion covers only the declared structural subset and pinned schema purpose; custom validators on import and graph semantics on export produce explicit irreversible-loss items.
      ja: Pydantic-2 の双方向変換は宣言済み構造部分集合と固定したスキーマ用途だけを対象とし、独自検証器の取り込みやグラフ意味の出力には不可逆損失項目を生成します。
    conformance:
      status: contract-tested
      test_id: PydanticProfileAdapter-mapping-contract-test
      method:
        zh: 验证外部版本、映射范围、方向、已知损失、唯一所有者、来源登记以及所有 canonical 目标 ID 的可解析性。
        en: Validates the external version, scope, direction, known loss, unique owner, registered source, and resolvability of every canonical target ID.
        ja: 外部版、範囲、方向、既知の損失、一意な所有者、登録出典、および全 canonical 対象 ID の解決可能性を検証します。
    status: accepted
    source_claims:
      - claim-structural-schema-adapter-007
      - claim-structural-schema-adapter-008
  - id: ZodProfileAdapter-external-mapping
    system: Zod
    external_identifier: Zod
    external_version: Zod-4
    canonical_target_ids:
      - SchemaArtifact
      - MappingRule
    mapping_kind: related
    scope:
      zh: 映射 Zod 4 的 object、primitive、union、enum、array、可表达 refinement、metadata，以及 z.toJSONSchema 的 input/output 模式、目标方言与复用策略。
      en: Maps Zod 4 objects, primitives, unions, enums, arrays, expressible refinements, metadata, and z.toJSONSchema input/output mode, target dialect, and reuse policy.
      ja: Zod 4 の object、primitive、union、enum、array、表現可能 refinement、metadata、および z.toJSONSchema の input／output モード、対象 dialect、再利用方針を写像する。
    direction: bidirectional
    loss_notes:
      zh: transform、custom schema、无法标准化的 refinement、函数实现和运行时 safeParse 结果不能被宣称为 JSON Schema 原生语义；跨节点图关系同样保持在该映射之外。
      en: Transforms, custom schemas, non-standardizable refinements, function implementations, and runtime safeParse results cannot be claimed as native JSON Schema semantics; cross-node graph relations also remain outside this mapping.
      ja: transform、custom schema、標準化不能 refinement、関数実装、実行時 safeParse 結果を JSON Schema 固有意味と主張できず、ノード間 graph relation も写像外に留める。
    conversion_note:
      zh: Zod-4 双向只适用于声明的可逆子集：规范字段可生成 Zod schema，Zod schema 可提取候选结构契约；transform、custom check 或模式差异触发损失，导入结果在 canonical ID 对齐前不得视为等价。
      en: "Zod-4 bidirectionality applies only to the declared reversible subset: canonical fields can generate a Zod schema and a Zod schema can yield candidate structural constraints; transforms, custom checks, or mode differences trigger loss, and imported candidates are not equivalent until canonical IDs are aligned."
      ja: Zod-4 の双方向は宣言済み可逆サブセットだけに適用する。canonical 項目から Zod schema を生成し、Zod schema から候補構造制約を抽出できるが、transform、custom check、モード差は損失を生じ、canonical ID 照合前の import 候補を同値としない。
    conformance:
      status: contract-tested
      test_id: ZodProfileAdapter-mapping-contract-test
      method:
        zh: 验证外部版本、映射范围、方向、已知损失、唯一所有者、来源登记以及所有 canonical 目标 ID 的可解析性。
        en: Validates the external version, scope, direction, known loss, unique owner, registered source, and resolvability of every canonical target ID.
        ja: 外部版、範囲、方向、既知の損失、一意な所有者、登録出典、および全 canonical 対象 ID の解決可能性を検証します。
    status: accepted
    source_claims:
      - claim-structural-schema-adapter-009
      - claim-structural-schema-adapter-010
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: SemanticGraphAdapter
    shared_parent_concept_id: SchemaAdapter
    differentia:
      zh: 同属 SchemaAdapter 时，StructuralSchemaAdapter 只处理单个文档或载荷的字段结构、类型、必填性和局部值约束；SemanticGraphAdapter 则处理稳定节点身份、定向谓词、分类、公理或 RDF 图形状。一个对象模式能校验字段，不代表它保留了图关系语义。
      en: Under SchemaAdapter, StructuralSchemaAdapter handles one document or payload's fields, types, requiredness, and local value constraints, whereas SemanticGraphAdapter handles stable node identity, directed predicates, taxonomy, axioms, or RDF graph shapes. An object schema validating fields does not thereby preserve graph-relation semantics.
      ja: SchemaAdapter 配下で StructuralSchemaAdapter は一文書・ペイロードの項目、型、必須性、局所値制約を扱い、SemanticGraphAdapter は安定ノード同一性、方向付き述語、分類、公理、RDF graph shape を扱う。object schema の項目検証成功は graph relation 意味の保持を意味しない。
    source_claims:
      - claim-structural-schema-adapter-011
      - claim-structural-schema-adapter-012
parent_relation:
  id: StructuralSchemaAdapter-is_a-SchemaAdapter
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: StructuralSchemaAdapter 是 SchemaAdapter 的一种；它把正式 schema 目标限定为单个文档、消息或对象记录的字段、类型、必填性、嵌套和局部值约束。
    en: StructuralSchemaAdapter is a SchemaAdapter whose formal target describes fields, types, requiredness, nesting, and local value constraints of one document, message, or object record.
    ja: StructuralSchemaAdapter は SchemaAdapter の一種で、正式対象が一文書・message・object 記録の項目、型、必須性、入れ子、局所値制約を記述する。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承には instance relation 基数を用いない。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 有下位类型
      en: has subtype
      ja: 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: StructuralSchemaAdapter-is_a-SchemaAdapter-example-positive-001
      kind: positive
      labels:
        zh: 结构 schema 分类正例
        en: Positive structural-schema classification
        ja: structural schema 分類の正例
      scenario_id: null
      descriptions:
        zh: 一个版本化适配器把 AgentConfig 的字段、类型、required、enum、数组元素和数值边界映射到 JSON Schema 或 Pydantic/Zod schema profile，并报告无法表达的约束，因此它满足 StructuralSchemaAdapter 的种差并归入 SchemaAdapter。
        en: A versioned adapter maps AgentConfig fields, types, requiredness, enums, array items, and numeric bounds to JSON Schema or a Pydantic/Zod schema profile and reports inexpressible constraints, so it satisfies the StructuralSchemaAdapter differentia and belongs under SchemaAdapter.
        ja: 版付き adapter が AgentConfig の項目、型、required、enum、array item、数値境界を JSON Schema または Pydantic／Zod schema profile へ写像し表現不能制約を報告するため、StructuralSchemaAdapter の種差を満たし SchemaAdapter 配下になる。
      field_values: {}
      related_node_ids:
        - StructuralSchemaAdapter
        - SchemaAdapter
      related_relation_ids:
        - StructuralSchemaAdapter-is_a-SchemaAdapter
      expected_result:
        zh: 分类器保留一条 StructuralSchemaAdapter → SchemaAdapter 的主骨架关系。
        en: Classification retains one primary-backbone relation from StructuralSchemaAdapter to SchemaAdapter.
        ja: 分類器は StructuralSchemaAdapter → SchemaAdapter の主 backbone 関係を一つ保持する。
      why_valid_or_invalid:
        zh: 目标具有正式 schema 版本与约束词汇，且范围只涉及单个记录的结构语义，满足父类与种差。
        en: The target has a formal schema version and constraint vocabulary and concerns only one record's structural semantics, satisfying genus and differentia.
