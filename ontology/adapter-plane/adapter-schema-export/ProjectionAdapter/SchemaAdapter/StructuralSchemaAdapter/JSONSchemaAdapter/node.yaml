schema: moonweave.ai/ontology-node/v1
id: JSONSchemaAdapter
kind: concept
status: accepted
labels:
  zh: JSON Schema 适配器
  en: JSON Schema adapter
  ja: JSON Schema アダプター
semantics:
  short_definition:
    zh: JSON Schema 适配器把规范对象结构投影为指定方言的 JSON Schema 文档。
    en: A JSONSchemaAdapter projects canonical object structure into a JSON Schema document for a pinned dialect.
    ja: JSONSchemaAdapter は canonical オブジェクト構造を指定方言の JSON Schema 文書へ投影する。
  definition:
    zh: JSON Schema 适配器是 StructuralSchemaAdapter 的一种，按 JSON Schema 2020-12 的核心与验证词汇映射对象、数组、类型、必填性、枚举、数值和字符串约束，并固定 $schema 方言标识。它输出的是描述 JSON 实例结构的模式文档；本体分类、RDF 图约束及无法由该词汇表达的跨节点语义必须保留为转换警告，而不能伪装成等价关键字。
    en: A JSONSchemaAdapter is a StructuralSchemaAdapter that maps objects, arrays, types, required properties, enumerations, numeric constraints, and string constraints using the JSON Schema 2020-12 Core and Validation vocabularies and pins the $schema dialect identifier. Its product describes JSON instance structure; ontology classification, RDF graph constraints, and cross-node semantics that the vocabulary cannot express must be reported as conversion loss rather than disguised as equivalent keywords.
    ja: JSONSchemaAdapter は StructuralSchemaAdapter の一種で、JSON Schema 2020-12 Core と Validation 語彙によりオブジェクト、配列、型、必須項目、列挙、数値・文字列制約を写像し、$schema 方言を固定する。出力は JSON インスタンス構造を記述する文書であり、本体分類、RDF グラフ制約、表現不能なノード間意味は変換損失として記録する。
  why_needed:
    zh: 该边界让 API、文件和消息载荷能够用标准验证器检查，同时明确 JSON 结构验证不能替代本体或 RDF 语义验证。
    en: This boundary enables standard validation of API, file, and message payloads while making clear that JSON structural validation does not replace ontology or RDF semantics.
    ja: API・ファイル・メッセージのペイロードを標準検証器で検査でき、JSON 構造検証が本体・RDF 意味検証を代替しないことを明確にする。
  includes:
    - zh: 纳入 2020-12 方言声明、对象属性、required、$defs/$ref、数组项、组合关键字以及可表达的值约束。
      en: Includes the 2020-12 dialect declaration, object properties, required, $defs/$ref, array items, applicator keywords, and expressible value constraints.
      ja: 2020-12 方言宣言、オブジェクト属性、required、$defs/$ref、配列項目、適用キーワード、表現可能な値制約を含む。
  excludes:
    - zh: 不纳入 Pydantic 或 Zod 的运行时校验行为、OWL 公理、SHACL/ShEx 图形状、一次验证结果或一次模式投影运行。
      en: Excludes Pydantic or Zod runtime validation behavior, OWL axioms, SHACL/ShEx graph shapes, an individual validation result, and an individual projection run.
      ja: Pydantic・Zod の実行時検証、OWL 公理、SHACL・ShEx グラフ形状、個別検証結果、個別投影実行は含まない。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: json-schema-2020-12-structural-scope
      severity: error
      expression_language: plain
      expression: $schema identifies draft 2020-12; fields, requiredness, arrays, composition, and value constraints use declared vocabularies; cross-node graph semantics are reported as projection loss rather than encoded as false equivalents
      explanations:
        zh: $schema 必须标识 2020-12 方言；字段、必填性、数组、组合和值约束使用已声明词汇，跨节点图语义只能记为投影损失，不得伪造等价关键字。
        en: $schema must identify the 2020-12 dialect; fields, requiredness, arrays, composition, and value constraints use declared vocabularies, while cross-node graph semantics are recorded as projection loss rather than false keyword equivalents.
        ja: $schema は 2020-12 方言を識別し、フィールド、必須性、配列、合成、値制約には宣言済み語彙を使います。ノード間グラフ意味は偽の等価キーワードにせず投影損失として記録します。
      source_claims:
        - claim-json-schema-adapter-003
        - claim-json-schema-adapter-004
  required_relation_constraints: []
examples:
  - id: JSONSchemaAdapter-example-positive-001
    kind: positive
    labels:
      zh: JSON Schema 适配器正例
      en: Positive example of JSON Schema adapter
      ja: JSON Schema アダプターの正例
    scenario_id: null
    descriptions:
      zh: AgentConfig 的规范结构要求 name 为必填字符串、execution_mode 取值 interactive 或 autonomous、retries 为不小于 0 的整数。adapter-json-schema@2.0.0 生成带 2020-12 $schema 的 object 模式，并分别使用 properties、required、enum、type 与 minimum 表达这些约束。
      en: The canonical AgentConfig structure requires name as a string, limits execution_mode to interactive or autonomous, and makes retries a non-negative integer. adapter-json-schema@2.0.0 emits a 2020-12 object schema using properties, required, enum, type, and minimum for those constraints.
      ja: canonical な AgentConfig 構造は name を必須文字列とし、execution_mode を interactive または autonomous に限定し、retries を 0 以上の整数とします。adapter-json-schema@2.0.0 は 2020-12 の object スキーマを生成し、properties、required、enum、type、minimum で表現します。
    field_values:
      adapter_id: adapter-json-schema
      adapter_version: 2.0.0
      scope:
        - fields
        - requiredness
        - constraints
        - controlled-values
      status: supported
      schema_version: JSON-Schema-2020-12
      loss_kind: lossy
    related_node_ids:
      - JSONSchemaAdapter
      - StructuralSchemaAdapter
    related_relation_ids:
      - JSONSchemaAdapter-is_a-StructuralSchemaAdapter
    expected_result:
      zh: 标准 2020-12 验证器接受 {name:"planner", execution_mode:"autonomous", retries:2}，并拒绝缺少 name 或 retries=-1 的实例。
      en: A conforming 2020-12 validator accepts {name:"planner", execution_mode:"autonomous", retries:2} and rejects an instance missing name or using retries=-1.
      ja: 2020-12 準拠検証器は {name:"planner", execution_mode:"autonomous", retries:2} を受理し、name 欠落または retries=-1 を拒否します。
    why_valid_or_invalid:
      zh: 所有目标约束都属于 JSON 实例结构和值验证，且逐项存在 2020-12 词汇中的直接表达，没有把本体关系混入模式。
      en: Every target constraint concerns JSON instance structure or values and has a direct 2020-12 vocabulary expression; no ontology relationship is smuggled into the schema.
      ja: 対象制約はすべて JSON インスタンスの構造または値に関し、2020-12 語彙で直接表現でき、本体関係をスキーマへ混入していません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-json-schema-adapter-005
      - claim-json-schema-adapter-006
  - id: JSONSchemaAdapter-example-boundary-001
    kind: boundary
    labels:
      zh: JSON Schema 适配器边界例
      en: Boundary case for JSON Schema adapter
      ja: JSON Schema アダプターの境界例
    scenario_id: null
    descriptions:
      zh: 关系记录要求 source_id 与 target_id 必须解析为同一发布图中的真实节点，并且 is_a 不能形成环。JSON Schema 可以验证两个字段都是字符串及其格式，却不能仅靠标准词汇查询另一节点是否存在或判断整张图无环；把 required 或 $ref 当成该图约束的等价实现是不成立的。
      en: A relation record requires source_id and target_id to resolve to released graph nodes and requires is_a to remain acyclic. JSON Schema can validate the two fields' string shape, but its standard vocabularies do not query another graph record or prove whole-graph acyclicity; treating required or $ref as equivalent graph validation is invalid.
      ja: 関係記録では source_id と target_id が公開グラフ内の実在ノードへ解決し、is_a が非循環である必要があります。JSON Schema は文字列形状を検証できますが、標準語彙だけでは別グラフ記録の存在確認や全体の非循環性を証明できず、required や $ref を等価なグラフ制約とするのは不適切です。
    field_values: {}
    related_node_ids:
      - JSONSchemaAdapter
      - StructuralSchemaAdapter
      - SemanticGraphAdapter
    related_relation_ids:
      - JSONSchemaAdapter-is_a-StructuralSchemaAdapter
    expected_result:
      zh: 导出的 JSON Schema 只检查 ID 字段结构，并产生 graph-reference-resolution 与 acyclicity 未覆盖的有损警告；图验证交给语义图验证器。
      en: The exported schema validates only the ID field structure and emits loss warnings for graph-reference resolution and acyclicity; semantic graph validation remains a separate step.
      ja: 出力スキーマは ID フィールド構造だけを検証し、グラフ参照解決と非循環性を未対応損失として警告し、意味グラフ検証は別工程に残します。
    why_valid_or_invalid:
      zh: JSON Schema 的验证对象是单个 JSON 实例；节点解析和图环检测需要数据集级上下文，因此必须显式标记为超出此适配器范围。
      en: JSON Schema evaluates a JSON instance, whereas node resolution and cycle detection require dataset-level graph context, so those guarantees must be marked outside this adapter's scope.
      ja: JSON Schema は JSON インスタンスを評価しますが、ノード解決と循環検出にはデータ集合全体の文脈が必要なため、このアダプターの範囲外と明示します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-json-schema-adapter-007
      - claim-json-schema-adapter-008
  - id: JSONSchemaAdapter-example-instance-001
    kind: instance
    labels:
      zh: JSON Schema 适配器结构化实例
      en: Structured instance of JSON Schema adapter
      ja: JSON Schema アダプターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: adapter-json-schema 版本 2.0.0 固定 JSON-Schema-2020-12，覆盖 fields、requiredness、constraints 与 controlled-values。loss_kind=lossy 表明导出会保留可表达的结构约束，同时单独报告关系可达性和开放世界语义。
      en: adapter-json-schema version 2.0.0 pins JSON-Schema-2020-12 and covers fields, requiredness, constraints, and controlled-values. loss_kind=lossy means expressible structural assertions are retained while graph reachability and open-world semantics are reported separately.
      ja: adapter-json-schema 2.0.0 は JSON-Schema-2020-12 を固定し、fields、requiredness、constraints、controlled-values を扱います。loss_kind=lossy は表現可能な構造制約を保持し、グラフ到達性と開世界意味を別途報告することを示します。
    field_values:
      adapter_id: adapter-json-schema
      adapter_version: 2.0.0
      scope:
        - fields
        - requiredness
        - constraints
        - controlled-values
      status: supported
      schema_version: JSON-Schema-2020-12
      loss_kind: lossy
    related_node_ids:
      - JSONSchemaAdapter
    related_relation_ids: []
    expected_result:
      zh: 投影器选择 2020-12 核心与验证词汇生成模式，并在转换报告中列出所有未映射的图语义。
      en: The projector emits a schema using the 2020-12 Core and Validation vocabularies and lists every unmapped graph semantic in the conversion report.
      ja: 投影器は 2020-12 Core と Validation 語彙でスキーマを生成し、未写像のグラフ意味を変換報告へ列挙します。
    why_valid_or_invalid:
      zh: 适配器身份、版本、目标方言、处理范围和损失类别一致，既不会把运行时验证器当成本体节点，也不会宣称无损语义等价。
      en: Adapter identity, version, target dialect, scope, and loss class agree; the record neither models a runtime validator as an ontology node nor claims lossless semantic equivalence.
      ja: アダプター識別、版、対象方言、範囲、損失分類が整合し、実行時検証器を本体ノード化せず、無損失の意味等価も主張しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-json-schema-adapter-009
      - claim-json-schema-adapter-010
external_mappings:
  - id: JSONSchemaAdapter-external-mapping
    system: JSON Schema
    external_identifier: JSON Schema
    external_version: draft-2020-12
    canonical_target_ids:
      - SchemaArtifact
      - MappingRule
    mapping_kind: related
    scope:
      zh: 映射对象字段、必填性、类型、数组、组合、标量约束与受控值，并固定 2020-12 方言。
      en: Maps object fields, requiredness, types, arrays, composition, scalar constraints, and controlled values under the pinned 2020-12 dialect.
      ja: 2020-12 方言を固定し、オブジェクト項目、必須性、型、配列、合成、スカラー制約、統制値を写像します。
    direction: bidirectional
    loss_notes:
      zh: 跨记录节点解析、图可达性、全局无环性、OWL 开放世界公理及 SHACL 目标选择不在 JSON Schema 标准词汇内。
      en: Cross-record node resolution, graph reachability, global acyclicity, OWL open-world axioms, and SHACL target selection are outside standard JSON Schema vocabularies.
      ja: 記録間ノード解決、グラフ到達性、全体非循環性、OWL 開世界公理、SHACL 対象選択は標準 JSON Schema 語彙の範囲外です。
    conversion_note:
      zh: JSON Schema draft-2020-12 仅在声明的结构子集中可双向转换；导入只创建结构约束候选，导出对无法表达的图语义生成逐项损失报告。
      en: "JSON Schema draft-2020-12 conversion is bidirectional only for the declared structural subset: import creates structural-constraint candidates, and export emits an itemized loss report for unrepresentable graph semantics."
      ja: JSON Schema draft-2020-12 は宣言済み構造部分集合だけを双方向変換します。取り込みは構造制約候補を作り、出力は表現不能なグラフ意味を項目別損失報告へ記録します。
    conformance:
      status: contract-tested
      test_id: JSONSchemaAdapter-mapping-contract-test
      method:
        zh: 验证外部版本、映射范围、方向、已知损失、唯一所有者、来源登记以及所有 canonical 目标 ID 的可解析性。
        en: Validates the external version, scope, direction, known loss, unique owner, registered source, and resolvability of every canonical target ID.
        ja: 外部版、範囲、方向、既知の損失、一意な所有者、登録出典、および全 canonical 対象 ID の解決可能性を検証します。
    status: accepted
    source_claims:
      - claim-json-schema-adapter-011
      - claim-json-schema-adapter-012
applicability:
  - adapter
sibling_differentiation: []
