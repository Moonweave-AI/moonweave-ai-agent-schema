      kind: positive
      labels:
        zh: is a人工正例
        en: Reviewed positive case for is a
        ja: is aの審査済み正例
      scenario_id: null
      descriptions:
        zh: "`jsonschema-2020-12` 将字段类型、required、properties、items、enum 与局部数值约束写入声明方言的 schema，并报告无法表达的跨节点路径约束。"
        en: "`jsonschema-2020-12` writes field types, required, properties, items, enum, and local numeric constraints into a declared-dialect schema and reports inexpressible cross-node path constraints."
        ja: "`jsonschema-2020-12` は field type、required、properties、items、enum、局所数値制約を宣言 dialect schema へ書き、表現不能な node 間 path 制約を報告します。"
      field_values: {}
