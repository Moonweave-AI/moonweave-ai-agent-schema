source_claims:
  - id: claim-json-schema-adapter-001
    source: eng-val-jsonschema-ietf
    supports: JSON Schema Core 2020-12 defines dialects, vocabularies, schema resources, and evaluation over JSON instances that ground JSONSchemaAdapter's target contract. Its capability identity and StructuralSchemaAdapter parent are Moonweave decisions.
    locator: JSON Schema Core 2020-12 §§4.3.3, 6.1, 7.5, and 8.1
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-json-schema-adapter-002
    source: eng-val-jsonschema-spec
    supports: JSON Schema Validation 2020-12 defines assertions for types, enums, numeric values, strings, arrays, and objects that JSONSchemaAdapter can project exactly; graph-level semantics remain an explicit Moonweave loss boundary.
    locator: JSON Schema Validation 2020-12 §§6.1–6.5
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-json-schema-adapter-003
    source: eng-val-jsonschema-ietf
    supports: JSON Schema Core 2020-12 defines dialect and vocabulary identification through $schema and $vocabulary; JSONSchemaAdapter pins that processing contract before applying structural keywords.
    locator: JSON Schema Core 2020-12 §§4.3.3, 6.1, and 8.1
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-json-schema-adapter-004
    source: eng-val-jsonschema-spec
    supports: JSON Schema Validation 2020-12 specifies type, enum, numeric, string, array, and object assertions; JSONSchemaAdapter limits exact conversion to semantics defined by those vocabularies.
    locator: JSON Schema Validation 2020-12 §§6.1–6.5
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-json-schema-adapter-005
    source: eng-val-jsonschema-ietf
    supports: JSON Schema Core 2020-12 defines schema resources, dialect identification, and applicator processing; the JSONSchemaAdapter positive case pins that dialect before emitting an object schema.
    locator: JSON Schema Core 2020-12 §§4.3.3, 6.1, and 8.1
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-json-schema-adapter-006
    source: eng-val-jsonschema-spec
    supports: JSON Schema Validation 2020-12 defines type, enum, minimum, required, and object-property assertions used by the AgentConfig projection in this JSONSchemaAdapter case.
    locator: JSON Schema Validation 2020-12 §§6.1–6.5
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-json-schema-adapter-007
    source: eng-val-jsonschema-ietf
