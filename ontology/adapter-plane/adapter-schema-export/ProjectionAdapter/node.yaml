schema: moonweave.ai/ontology-node/v1
id: ProjectionAdapter
kind: concept
status: accepted
labels:
  zh: 投影适配器
  en: Projection adapter
  ja: 投影アダプター
semantics:
  short_definition:
    zh: 投影适配器是把规范本体映射到一种明确目标表示的可复用适配能力。
    en: A ProjectionAdapter is a reusable adapter capability for mapping the canonical ontology to one explicit target representation.
    ja: ProjectionAdapter は canonical オントロジーを一つの明示対象表現へ写像する再利用可能な適応能力である。
  definition:
    zh: 投影适配器是 Adapter 的一种，其种差是拥有版本化的源到目标映射契约：它说明读取哪些 canonical 对象、生成何种目标表示、如何保持身份与来源，以及哪些语义会精确保留、有损降级或完全不支持。该节点描述可重复使用的能力和配置边界，不是某次执行，也不是执行后生成的 SchemaArtifact、Graph IR 或 ViewModel。
    en: "A ProjectionAdapter is an Adapter distinguished by a versioned source-to-target mapping contract: it states which canonical objects are read, what target representation is produced, how identity and provenance are preserved, and which semantics are exact, lossy, or unsupported. The node denotes a reusable capability and configuration boundary, not an execution occurrence and not the resulting SchemaArtifact, Graph IR, or ViewModel."
    ja: ProjectionAdapter は Adapter の一種で、版管理された source-to-target 写像契約を持つ。読み取る canonical オブジェクト、生成対象、同一性・来歴保持、正確・損失・未対応の意味を規定する。再利用能力と設定境界を表し、個別実行や生成された SchemaArtifact、Graph IR、ViewModel ではない。
  why_needed:
    zh: 把能力与运行、产物分开后，同一配置可以被多次执行、版本化比较和审计，失败也不会改变适配器本身的身份。
    en: Separating capability from run and artifact allows one configuration to be executed repeatedly, version-compared, and audited without a failed run changing the adapter's identity.
    ja: 能力を実行・成果物から分けることで、同一設定を反復実行、版比較、監査でき、失敗実行がアダプター同一性を変えない。
  includes:
    - zh: 纳入目标方言与版本、选择范围、命名规则、类型与关系映射、损失分类、来源回指和一致性检查。
      en: Includes target dialect and version, selection scope, naming rules, type and relation mappings, loss classification, provenance pointers, and conformance checks.
      ja: 対象方言・版、選択範囲、命名規則、型・関係写像、損失分類、来歴ポインタ、適合性検査を含む。
  excludes:
    - zh: 不纳入某次 SchemaProjectionRun、生成的 SchemaArtifact、目标验证器、Graph IR 数据、前端视图数据或对 canonical 本体的编辑。
      en: Excludes an individual SchemaProjectionRun, the produced SchemaArtifact, a target validator, Graph IR data, frontend view data, and edits to the canonical ontology.
      ja: 個別 SchemaProjectionRun、生成 SchemaArtifact、対象検証器、Graph IR データ、フロントエンド表示データ、canonical 本体編集は含まない。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: schema_version
      labels:
        zh: 投影契约版本
        en: projection contract version
        ja: 投影契約バージョン
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定目标投影契约、方言及其版本，使图谱、结构模式与前端视图投影都可复现。
        en: Pins the target projection contract or dialect and its version so graph, structural-schema, and frontend-view projections remain reproducible.
        ja: 対象投影契約または方言とその版を固定し、グラフ・構造スキーマ・フロントエンド表示の投影を再現可能にします。
      allowed_values: []
      pattern: null
      example_value: projection-contract@2
      source_claims:
        - claim-projection-adapter-003
        - claim-projection-adapter-004
    - id: loss_kind
      labels:
        zh: 投影损失类型
        en: projection loss kind
        ja: 投影損失種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明目标表示对 canonical 概念、关系、字段、基数与约束的投影是精确、有损还是不支持。
        en: States whether the target representation projects canonical concepts, relations, fields, cardinalities, and constraints exactly, lossily, or not at all.
        ja: 対象表現が canonical な概念・関係・項目・基数・制約を正確に、有損で、または非対応として投影するかを示します。
      allowed_values: []
      pattern: null
      example_value: lossy
      source_claims:
        - claim-projection-adapter-005
        - claim-projection-adapter-006
  constraints:
    - id: projection-adapter-separates-capability-run-and-product
      severity: error
      expression_language: plain
      expression: a ProjectionAdapter record defines a reusable versioned mapping capability and its loss policy; it is neither a SchemaProjectionRun activity nor the SchemaArtifact or GraphArtifact produced by such a run
      explanations:
        zh: ProjectionAdapter 记录定义可复用、带版本的映射能力及损失策略；它既不是一次 SchemaProjectionRun 活动，也不是该运行生成的 SchemaArtifact 或 GraphArtifact。
        en: A ProjectionAdapter record defines a reusable versioned mapping capability and loss policy; it is neither a SchemaProjectionRun activity nor the SchemaArtifact or GraphArtifact produced by a run.
        ja: ProjectionAdapter 記録は再利用可能で版管理された写像能力と損失方針を定義し、SchemaProjectionRun 活動でも、その実行が生成する SchemaArtifact／GraphArtifact でもありません。
      source_claims:
        - claim-projection-adapter-007
        - claim-projection-adapter-008
  required_relation_constraints: []
examples:
  - id: ProjectionAdapter-example-positive-001
    kind: positive
    labels:
      zh: 投影适配器正例
      en: Positive example of Projection adapter
      ja: 投影アダプターの正例
    scenario_id: null
    descriptions:
      zh: adapter-projection-core@2.0.0 注册一套可复用映射契约：同一规范节点可投影到 graph-ir、structural-schema、semantic-graph 或 frontend-view，但每个具体适配器必须固定自己的目标版本并逐项声明 exact、lossy 或 unsupported。该记录只定义能力，不含某次执行的输入指纹或输出地址。
      en: adapter-projection-core@2.0.0 registers a reusable mapping contract for graph-ir, structural-schema, semantic-graph, and frontend-view targets. Each concrete adapter pins its target version and classifies every mapping as exact, lossy, or unsupported; this capability record contains no run input fingerprint or output location.
      ja: adapter-projection-core@2.0.0 は graph-ir、structural-schema、semantic-graph、frontend-view 向けの再利用可能な写像契約を登録します。各具象アダプターは対象版を固定し、各写像を exact／lossy／unsupported と分類します。この能力記録には実行入力指紋や出力場所を含めません。
    field_values:
      adapter_id: adapter-projection-core
      adapter_version: 2.0.0
      scope:
        - graph-ir
        - structural-schema
        - semantic-graph
        - frontend-view
      status: supported
      schema_version: projection-contract@2
      loss_kind: lossy
    related_node_ids:
      - ProjectionAdapter
      - Adapter
    related_relation_ids:
      - ProjectionAdapter-is_a-Adapter
    expected_result:
      zh: 注册表得到一个可由多次运行引用的 ProjectionAdapter 能力，并能按目标契约查询映射范围及损失策略。
      en: The registry receives one ProjectionAdapter capability reusable by multiple runs and can query its mapping scope and loss policy by target contract.
      ja: レジストリは複数実行から参照できる ProjectionAdapter 能力を得て、対象契約ごとに写像範囲と損失方針を照会できます。
    why_valid_or_invalid:
      zh: 配置完整定义可复用能力的身份、版本、目标族、契约版本和损失政策，却没有混入一次运行或产物的生命周期字段。
      en: The configuration defines the reusable capability's identity, version, target families, contract version, and loss policy without mixing in lifecycle fields for a run or artifact.
      ja: 設定は再利用能力の識別、版、対象群、契約版、損失方針を定義し、実行や成果物のライフサイクル項目を混入していません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-projection-adapter-009
      - claim-projection-adapter-010
  - id: ProjectionAdapter-example-boundary-001
    kind: boundary
    labels:
      zh: 投影适配器边界例
      en: Boundary case for Projection adapter
      ja: 投影アダプターの境界例
    scenario_id: null
    descriptions:
      zh: SchemaProjectionRun run-2026-07-16-001 引用 adapter-projection-core@2.0.0，绑定输入版本、规则集、开始时间和输出地址。它可以通过 SchemaProjectionRun-uses-ProjectionAdapter 使用该能力，但不能继承 ProjectionAdapter；前者是一次会结束并产生产物的活动，后者是跨运行复用的能力定义。
      en: "SchemaProjectionRun run-2026-07-16-001 references adapter-projection-core@2.0.0 and binds an input version, rule set, start time, and output location. SchemaProjectionRun-uses-ProjectionAdapter lets the activity use the capability, but the run cannot inherit ProjectionAdapter: one terminates and produces artifacts, while the other is reusable across runs."
      ja: SchemaProjectionRun run-2026-07-16-001 は adapter-projection-core@2.0.0 を参照し、入力版、規則集合、開始時刻、出力場所を束縛します。活動は SchemaProjectionRun-uses-ProjectionAdapter で能力を利用できますが、実行は終了して成果物を生み、能力は複数実行で再利用されるため継承関係にはなりません。
    field_values: {}
    related_node_ids:
      - ProjectionAdapter
      - SchemaProjectionRun
      - Adapter
    related_relation_ids:
      - SchemaProjectionRun-uses-ProjectionAdapter
    expected_result:
      zh: 运行记录保持 activity 类型并通过 uses 指向 ProjectionAdapter；适配器记录本身不获得开始时间、状态或输出位置。
      en: The run remains an activity linked to ProjectionAdapter by uses, while the adapter record receives no start time, execution status, or output location.
      ja: 実行記録は activity のまま uses で ProjectionAdapter を指し、アダプター記録には開始時刻、実行状態、出力場所を付与しません。
    why_valid_or_invalid:
      zh: uses 表示活动依赖能力，并不表示活动是能力的子类；这样才能让同一适配器被多次运行引用而不复制定义。
      en: uses expresses an activity's dependency on a capability, not subtype membership; this lets many runs reference one adapter without duplicating its definition.
      ja: uses は活動が能力へ依存することを表し、下位型関係ではありません。これにより複数実行が一つのアダプター定義を重複なく参照できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-projection-adapter-011
      - claim-projection-adapter-012
  - id: ProjectionAdapter-example-instance-001
    kind: instance
    labels:
      zh: 投影适配器结构化实例
      en: Structured instance of Projection adapter
      ja: 投影アダプターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: 一个 ProjectionAdapter 配置登记为 adapter-projection-core@2.0.0，范围为 graph-ir、structural-schema、semantic-graph 与 frontend-view，schema_version=projection-contract@2，loss_kind=lossy。该配置声明映射政策，但不记录任何一次构建结果。
      en: A ProjectionAdapter configuration is registered as adapter-projection-core@2.0.0 for graph-ir, structural-schema, semantic-graph, and frontend-view, with schema_version=projection-contract@2 and loss_kind=lossy. It declares mapping policy but records no individual build result.
      ja: ProjectionAdapter 設定は adapter-projection-core@2.0.0 として登録され、graph-ir、structural-schema、semantic-graph、frontend-view を対象に schema_version=projection-contract@2、loss_kind=lossy を宣言します。写像方針だけを定義し、個別構築結果は記録しません。
    field_values:
      adapter_id: adapter-projection-core
      adapter_version: 2.0.0
      scope:
        - graph-ir
        - structural-schema
        - semantic-graph
        - frontend-view
      status: supported
      schema_version: projection-contract@2
      loss_kind: lossy
    related_node_ids:
      - ProjectionAdapter
    related_relation_ids: []
    expected_result:
      zh: 注册表可按适配器 ID 与契约版本选择能力，并要求具体子适配器补充目标格式和逐项损失声明。
      en: The registry can select the capability by adapter ID and contract version and requires each concrete child adapter to add a target format and itemized loss declarations.
      ja: レジストリはアダプター ID と契約版で能力を選択し、具象子アダプターへ対象形式と項目別損失宣言を要求できます。
    why_valid_or_invalid:
      zh: 身份、版本、目标族、契约版本和损失类型共同构成稳定能力配置，且没有混淆运行状态或输出产物。
      en: Identity, version, target families, contract version, and loss kind form a stable capability configuration without confusing execution state or output artifacts.
      ja: 識別、版、対象群、契約版、損失種別が安定した能力設定を構成し、実行状態や出力成果物と混同していません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-projection-adapter-013
      - claim-projection-adapter-014
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: ProjectionAdapter-is_a-Adapter
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: is a
      en: is a
      ja: is a
    definitions:
      zh: 投影适配器是以目标表示和往返语义保持为区分特征的一种适配器。
      en: A projection adapter is an Adapter distinguished by target representation and round-trip semantic preservation.
      ja: 投影アダプターは対象表現と往復意味保持で区別される Adapter です。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: inverse_of_is_a
      labels:
        zh: 反向 is_a
        en: inverse is_a
        ja: 逆 is_a
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: ProjectionAdapter-is_a-Adapter-example-positive-manual-001
        kind: positive
        labels:
          zh: is a人工正例
          en: Reviewed positive case for is a
          ja: is aの審査済み正例
        scenario_id: null
        descriptions:
          zh: "`schema-projection@3` 声明 canonical 来源指纹、JSON Schema 2020-12 目标、标识保持策略和 unsupported 语义清单，并通过固定 fixtures 验证输出。"
          en: "`schema-projection@3` declares a canonical source fingerprint, JSON Schema 2020-12 target, identity-preservation policy, and unsupported-semantics list and validates output with pinned fixtures."
          ja: "`schema-projection@3` は canonical source fingerprint、JSON Schema 2020-12 対象、identity 保持方針、unsupported 意味一覧を宣言し固定 fixture で出力を検証します。"
        field_values: {}
        related_node_ids:
          - ProjectionAdapter
          - Adapter
        related_relation_ids:
          - ProjectionAdapter-is_a-Adapter
        expected_result:
          zh: 该能力应归为 ProjectionAdapter，并通过上位链成为 Adapter。
          en: The capability is classified as ProjectionAdapter and therefore Adapter.
          ja: この能力は ProjectionAdapter、したがって Adapter に分類されます。
        why_valid_or_invalid:
          zh: 其种差是从 canonical 来源生成一种声明目标表示并记录保真与损失。
          en: Its differentia is generating a declared target representation from canonical sources with fidelity and loss recorded.
          ja: 種差が canonical source から宣言対象表現を生成し fidelity・loss を記録することです。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-projection-adapter-015
      - id: ProjectionAdapter-is_a-Adapter-example-boundary-manual-001
        kind: boundary
        labels:
          zh: is a人工边界例
          en: Reviewed boundary case for is a
          ja: is aの審査済み境界例
        scenario_id: null
        descriptions:
          zh: 一个 SchemaArtifact 是投影运行产生的文件，具有 digest 和存储位置，但不会执行转换。
          en: A SchemaArtifact is a file produced by a projection run with digest and storage location but does not execute conversion.
          ja: SchemaArtifact は projection run が生成した digest・storage location 付き file で変換を実行しません。
        field_values: {}
        related_node_ids:
          - ProjectionAdapter
          - Adapter
        related_relation_ids:
          - ProjectionAdapter-is_a-Adapter
        expected_result:
          zh: 产物不得被分类为 ProjectionAdapter。
          en: The artifact must not be classified as ProjectionAdapter.
          ja: artifact を ProjectionAdapter に分類しません。
        why_valid_or_invalid:
          zh: 可复用转换能力与其一次执行产物具有不同范畴和生命周期。
          en: A reusable conversion capability and one of its output artifacts have different categories and lifecycles.
          ja: 再利用変換能力と一実行の output artifact は範疇・life cycle が異なります。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-projection-adapter-015
    source_claims:
      - claim-projection-adapter-015
    distinct_fact_rationale: null
    layout_role: secondary-backbone
    review_status: accepted
    target: concept:Adapter
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-adapter-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 GoF Adapter、Enterprise Integration Patterns、W3C OWL/SHACL/ShEx、JSON Schema 2020-12 及 A2A/MCP 协议映射逐项核验；语义、层级、关系、结构与示例均符合 adapter-plane 设计边界。
    en: Verified against GoF Adapter, Enterprise Integration Patterns, W3C OWL/SHACL/ShEx, JSON Schema 2020-12, and A2A/MCP protocol mapping patterns; semantics, hierarchy, relations, structure, and examples align with adapter-plane design boundaries.
    ja: GoF Adapter、Enterprise Integration Patterns、W3C OWL/SHACL/ShEx、JSON Schema 2020-12、A2A/MCP プロトコル写像に照らし項目別確認しました。意味、階層、関係、構造、例は adapter-plane 設計境界に整合します。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-projection-adapter-001
    source: eng-ont-owl
    supports: OWL 2 distinguishes an abstract ontology structure, profiles, and exchange syntaxes, grounding the need for explicit target-specific mapping. ProjectionAdapter, its capability kind, and ProjectionAdapter-is_a-Adapter remain Moonweave design choices.
    locator: OWL 2 Overview §§2.1–2.3 and §3
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-projection-adapter-002
    source: eng-val-jsonschema-spec
    supports: JSON Schema Core defines dialect and vocabulary identification, while Validation defines a bounded assertion vocabulary; ProjectionAdapter generalizes version pinning and explicit loss to other targets. Its Moonweave hierarchy is not specified by JSON Schema.
    locator: JSON Schema Core 2020-12 §§4.3.3, 6.1, and 8.1
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-projection-adapter-003
    source: eng-ont-owl
    supports: OWL 2 distinguishes the structural ontology model from concrete exchange syntaxes and profiles; ProjectionAdapter therefore pins the target contract and version, while projection-contract@2 itself is a Moonweave identifier.
    locator: OWL 2 Overview §§2.1–2.3 and §3
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-projection-adapter-004
    source: eng-val-jsonschema-spec
    supports: JSON Schema Core defines dialect and vocabulary identification through $schema and $vocabulary; ProjectionAdapter generalizes the need to pin a target interpretation contract across projection families.
    locator: JSON Schema Core 2020-12 §§4.3.3, 6.1, and 8.1
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-projection-adapter-005
    source: eng-ont-owl
    supports: OWL 2's ontology semantics differ from closed-world structural validation, demonstrating that not every Moonweave constraint has an equivalent OWL assertion; ProjectionAdapter records that mismatch as loss_kind.
    locator: OWL 2 Overview §§2.1–2.3 and §3
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-projection-adapter-006
    source: eng-val-jsonschema-spec
    supports: JSON Schema Validation defines a bounded set of JSON-instance assertions; ProjectionAdapter uses loss_kind when canonical graph or ontology semantics fall outside the selected target vocabulary.
    locator: JSON Schema Validation 2020-12 §§6.1–6.5
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-projection-adapter-007
    source: eng-ont-owl
    supports: OWL 2 separates an ontology's abstract structural model from documents and tool executions; ProjectionAdapter applies an analogous Moonweave separation between reusable mapping capability, run, and artifact.
    locator: OWL 2 Overview §§2.1–2.3 and §3
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-projection-adapter-008
    source: eng-val-jsonschema-spec
    supports: JSON Schema separates a schema resource from evaluation results produced by a validator; ProjectionAdapter similarly remains a capability definition rather than one projection execution or product.
    locator: JSON Schema Core 2020-12 §§4.3.1, 7.5, and 10
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-projection-adapter-009
    source: eng-ont-owl
    supports: OWL 2 distinguishes its structural ontology model, profiles, and exchange syntaxes; ProjectionAdapter generalizes versioned target mappings while Moonweave defines the adapter capability and its hierarchy.
    locator: OWL 2 Overview §§2.1–2.3 and §3
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-projection-adapter-010
    source: eng-val-jsonschema-spec
    supports: JSON Schema Core's explicit dialect and vocabulary identification motivates pinning each projection target contract; adapter-projection-core and its loss classification are Moonweave design choices.
    locator: JSON Schema Core 2020-12 §§4.3.3, 6.1, and 8.1
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-projection-adapter-011
    source: eng-ont-owl
    supports: OWL 2 documentation separates ontology structures and documents from the behavior of tools that process them; ProjectionAdapter uses that distinction to keep a mapping capability separate from an execution activity.
