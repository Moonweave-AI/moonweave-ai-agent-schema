        expected_result:
          zh: 参考链接不得产生 governs 关系。
          en: A reference link must not create a governs relation.
          ja: 参考 link から governs 関係を作ってはなりません。
        why_valid_or_invalid:
          zh: 治理意味着对实际转换有规范约束，历史引用或共现不满足该条件。
          en: Governance means normative control over actual conversion; historical citation or co-occurrence does not satisfy it.
          ja: governs は実変換への規範制約を意味し、履歴引用や共起では成立しません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-mapping-rule-027
    source_claims:
      - claim-mapping-rule-027
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: pending
    target: concept:Adapter
