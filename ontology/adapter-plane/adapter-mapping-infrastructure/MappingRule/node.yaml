source_claims:
  - id: claim-mapping-rule-001
    source: eng-std-opentelemetry-schemas
    supports: MappingRule adopts the OpenTelemetry Telemetry Schemas requirements that schema versions be identifiable, transformations be explicit, and impossible conversions be recognized as breaking rather than silently accepted. The generic ontology class and loss vocabulary are Moonweave design inferences.
    locator: Telemetry Schemas > How Schemas Work; Schema URL; What is Out of Scope
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-mapping-rule-002
    source: eng-val-jsonschema-spec
    supports: JSON Schema Draft 2020-12 separates applicator, assertion, and annotation vocabularies and identifies dialects through meta-schemas. MappingRule uses that explicit-vocabulary discipline when a schema construct is projected, while correspondence direction and loss classification remain Moonweave additions.
    locator: Draft 2020-12 Core > Vocabularies and dialect identification
    evidence_kind: design-inference
    confidence: medium
