schema: moonweave.ai/ontology-node/v1
id: MappingRule
kind: concept
status: review
labels:
  zh: 映射规则
  en: mapping rule
  ja: 写像規則
semantics:
  short_definition:
    zh: 映射规则是对一对版本化源构造与目标构造之间转换条件的有向规范。
    en: A MappingRule is a directional specification for converting between one versioned source construct and one target construct under stated conditions.
    ja: MappingRule は、版付きの一つの出典構成と対象構成の間の変換条件を定める方向付き仕様です。
  definition:
    zh: 映射规则是一种可版本化的有向规范，明确源构造、目标构造、适用版本、前置条件、字段或关系变换，以及 exact、lossy 或 unsupported 的语义结果。方向反转必须另有规则或被证明可逆；规则描述应当如何转换，不表示某次转换已经执行。
    en: A MappingRule is a versioned directional specification that identifies source and target constructs, applicable versions, preconditions, field or relation transformations, and an exact, lossy, or unsupported semantic outcome. Reverse conversion requires a separate rule or demonstrated reversibility. The rule says how conversion should occur; it is not evidence that a conversion ran.
    ja: MappingRule は、出典／対象構成、適用版、事前条件、項目または関係の変換、および exact・lossy・unsupported の意味結果を明示する版付き方向仕様です。逆変換には別規則または可逆性の証明が必要で、規則は変換方法を定めるだけで実行済み事実ではありません。
  why_needed:
    zh: 如果只记录“支持某协议”，无法判断版本差异、变换方向或丢失了什么。独立规则让每项对应可审查、可测试、可弃用，并允许同一 Adapter 针对不同构造采用不同损失策略。
    en: A generic 'supports this protocol' flag cannot expose version differences, direction, or lost meaning. Independent rules make each correspondence reviewable, testable, and deprecatable, while one Adapter can apply different loss policies to different constructs.
    ja: 単なる「対応」表示では版差・方向・失われる意味を判断できません。規則を独立させると各対応を審査・試験・廃止でき、一つの Adapter が構成ごとに異なる損失方針を採用できます。
  includes:
    - zh: 纳入具有稳定规则 ID 和版本、唯一源构造与目标构造、明确方向、变换条件、生效时间及损失分类的声明性转换规范。
      en: Includes declarative conversion specifications with a stable rule ID and version, one source and target construct, explicit direction, transformation conditions, effective time, and loss classification.
      ja: 安定した規則 ID・版、一つの出典／対象構成、明示方向、変換条件、発効時点、損失分類を持つ宣言的変換仕様を含みます。
  excludes:
    - zh: 不纳入执行规则集的 Adapter、一次转换产生的记录、没有源目标和方向的概念对照表，以及仅声称兼容却没有可检验变换条件的说明。
      en: Excludes the Adapter that executes a rule set, records produced by a conversion, undirected concept glossaries without source and target, and compatibility claims with no testable transformation conditions.
      ja: 規則集合を実行する Adapter、変換で生じた記録、出典・対象・方向のない用語対照、および検査可能な変換条件を欠く互換性声明を除外します。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - mapping_rule_id
    - version
  fields:
    - id: mapping_rule_id
      labels:
        zh: 映射规则标识
        en: mapping-rule ID
        ja: マッピング規則 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识跨版本的逻辑映射规则。
        en: Stable identifier for the logical mapping rule across versions.
        ja: 複数バージョンにまたがる論理マッピング規則を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: mapping-rule-a2a-task-lifecycle
      source_claims:
        - claim-mapping-rule-003
        - claim-mapping-rule-004
    - id: version
      labels:
        zh: 规则版本
        en: rule version
        ja: 規則バージョン
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一项不可变映射转换合同版本。
        en: Identifies one immutable version of the mapping transformation contract.
        ja: 一つの不変マッピング変換契約バージョンを識別します。
      allowed_values: []
      pattern: null
      example_value: "4"
      source_claims:
        - claim-mapping-rule-005
        - claim-mapping-rule-006
    - id: source_construct
      labels:
        zh: 来源构造
        en: source construct
        ja: 変換元構成要素
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 带命名空间和版本语境的外部或规范来源构造。
        en: External or canonical source construct with namespace and version context.
        ja: 名前空間とバージョン文脈を持つ外部または canonical の変換元構成要素です。
      allowed_values: []
      pattern: null
      example_value: a2a:Task
      source_claims:
        - claim-mapping-rule-007
        - claim-mapping-rule-008
    - id: target_construct
      labels:
        zh: 目标构造
        en: target construct
        ja: 変換先構成要素
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 带命名空间和版本语境的目标构造。
        en: Target construct with namespace and version context.
        ja: 名前空間とバージョン文脈を持つ変換先構成要素です。
      allowed_values: []
      pattern: null
      example_value: moonweave:Execution
      source_claims:
        - claim-mapping-rule-009
        - claim-mapping-rule-010
    - id: direction
      labels:
        zh: 规则方向
        en: rule direction
        ja: 規則方向
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明规则可用于源到目标、目标到源或双向转换。
        en: Whether the rule supports source-to-target, target-to-source, or bidirectional conversion.
        ja: 規則が source-to-target、target-to-source、bidirectional のいずれを支援するかを示します。
      allowed_values: []
      pattern: null
      example_value: source-to-target
      source_claims:
        - claim-mapping-rule-011
        - claim-mapping-rule-012
    - id: mapping_kind
      labels:
        zh: 映射类别
        en: mapping kind
        ja: マッピング種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明转换精确、有损、较宽、较窄、相关或不支持。
        en: Whether conversion is exact, lossy, broader, narrower, related, or unsupported.
        ja: 変換が exact、lossy、broader、narrower、related、unsupported のいずれかを示します。
      allowed_values: []
      pattern: null
      example_value: lossy
      source_claims:
        - claim-mapping-rule-013
        - claim-mapping-rule-014
    - id: valid_from
      labels:
        zh: 有效起点
        en: valid from
        ja: 有効開始
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该映射规则版本开始有效的 UTC 时间。
        en: UTC instant from which this mapping-rule version is valid.
        ja: このマッピング規則バージョンが有効となる UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-13T06:00:00.000Z
      source_claims:
        - claim-mapping-rule-015
        - claim-mapping-rule-016
  constraints:
    - id: mapping-rule-explicit-loss
      severity: error
      expression_language: plain
      expression: lossy or unsupported rules state affected semantics, remediation, and an accepted mapping test result
      explanations:
        zh: 有损或不支持规则必须说明受影响语义、补救办法和已接受测试结果。
        en: Lossy or unsupported rules state affected semantics, remediation, and an accepted mapping-test result.
        ja: lossy または unsupported の規則は影響意味、対処、受理済みマッピングテスト結果を示します。
      source_claims:
        - claim-mapping-rule-017
        - claim-mapping-rule-018
  required_relation_constraints:
    - id: mapping-rule-governs-adapter
      direction: outgoing
      predicate: governs
      target_concept_id: Adapter
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 映射规则必须指向受其约束的适配器。
        en: A mapping rule points to the adapter it governs.
        ja: マッピング規則は統制対象のアダプターを指します。
      source_claims:
        - claim-mapping-rule-019
        - claim-mapping-rule-020
examples:
  - id: MappingRule-example-positive-001
    kind: positive
    labels:
      zh: 映射规则正例
      en: Positive example of mapping rule
      ja: 写像規則の正例
    scenario_id: null
    descriptions:
      zh: 规则 `mapping-rule-a2a-task-lifecycle@4` 从 `a2a:Task` 指向 `moonweave:Execution`：A2A id 保留为协议运行标识，contextId 关联 RuntimeSession，status 与 history 映射执行生命周期，Part 与 Artifact 保留为运行信息和产物；只有存在显式 task_specification_id 时才另建 Execution-realizes-Task。无法归属的扩展元数据作为残差，因此规则标记为 lossy。
      en: "Rule `mapping-rule-a2a-task-lifecycle@4` maps `a2a:Task` to `moonweave:Execution`: A2A id is retained as protocol-run identity, contextId links RuntimeSession, status and history map the execution lifecycle, and Parts plus Artifacts remain runtime information and products. Execution-realizes-Task is created only when an explicit task_specification_id is available. Unassigned extension metadata remains residual, so the rule is lossy."
      ja: "`mapping-rule-a2a-task-lifecycle@4` は `a2a:Task` を `moonweave:Execution` へ写像し、A2A id をプロトコル実行識別子、contextId を RuntimeSession 関連、status と history を実行ライフサイクル、Part と Artifact を実行情報・成果物として保持します。明示的 task_specification_id がある場合だけ Execution-realizes-Task を作成し、未帰属拡張メタデータは残差となるため lossy です。"
    field_values:
      mapping_rule_id: mapping-rule-a2a-task-lifecycle
      version: "4"
      source_construct: a2a:Task
      target_construct: moonweave:Execution
      direction: source-to-target
      mapping_kind: lossy
      valid_from: 2026-07-13T06:00:00.000Z
    related_node_ids:
      - MappingRule
      - Adapter
    related_relation_ids:
      - MappingRule-governs-Adapter
    expected_result:
      zh: 该运行可查询 MappingRule 以及方向保持不变的事实 MappingRule-governs-Adapter。
      en: The run can query MappingRule together with direction-preserving fact MappingRule-governs-Adapter.
      ja: この実行では MappingRule と方向を保持した事実 MappingRule-governs-Adapter を共に照会できます。
    why_valid_or_invalid:
      zh: 该记录只声明一个方向，逐项说明保留和残余语义，并把无法无损往返的差异标为 lossy；这正是可审查的转换规范。
      en: The record declares one direction, accounts for preserved and residual meaning, and marks non-round-trip differences as lossy. Those are the distinguishing commitments of a reviewable conversion specification.
      ja: 一方向だけを宣言し、保持意味と残差を列挙し、往復不能差分を lossy とするため、審査可能な変換仕様です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mapping-rule-021
      - claim-mapping-rule-022
  - id: MappingRule-example-boundary-001
    kind: boundary
    labels:
      zh: 映射规则边界例
      en: Boundary case for mapping rule
      ja: 写像規則の境界例
    scenario_id: null
    descriptions:
      zh: "`adapter-a2a@2.0.0` 选择并执行多条任务、消息和信任映射，拥有范围与支持状态；但它本身没有唯一的源构造、目标构造和单一方向，所以不能当作 MappingRule。"
      en: "`adapter-a2a@2.0.0` selects and executes multiple task, message, and trust mappings and has scope plus support status. It has no single source construct, target construct, and direction, so the capability is not a MappingRule."
      ja: "`adapter-a2a@2.0.0` は複数の task・message・trust 写像を選択実行し、範囲と対応状態を持ちますが、一組の出典／対象／方向を持たないため MappingRule ではありません。"
    field_values: {}
    related_node_ids:
      - MappingRule
      - Adapter
    related_relation_ids:
      - MappingRule-governs-Adapter
    expected_result:
      zh: Adapter 保持其原有类型，验证器不得凭关系共现把它提升为 MappingRule。
      en: Adapter retains its own type; validation must not promote it to MappingRule from relation co-occurrence.
      ja: Adapter は元の型を維持し、関係の共起だけで MappingRule へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 能力可以受多条规则治理，但“执行规则”不等于“是一条规则”；只有具备单一对应、方向和变换条件的规范才归入 MappingRule。
      en: A capability may be governed by many rules, but executing rules does not make it a rule. MappingRule membership requires one correspondence, direction, and transformation conditions.
      ja: 能力は複数規則に統制され得ますが、規則を実行することと規則であることは別です。一対応・方向・変換条件を持つ仕様だけが MappingRule です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mapping-rule-023
      - claim-mapping-rule-024
  - id: MappingRule-example-instance-001
    kind: instance
    labels:
      zh: 映射规则结构化实例
      en: Structured instance of mapping rule
      ja: 写像規則の構造化インスタンス
    scenario_id: null
    descriptions:
      zh: 实例 `mapping-rule-a2a-task-lifecycle@4` 把 `a2a:Task` 的生命周期字段单向转换为 `moonweave:Execution`，并声明 lossy 分类、有效起点以及 task_specification_id 缺失时不得生成 Task 实现边。
      en: Instance `mapping-rule-a2a-task-lifecycle@4` converts lifecycle fields from `a2a:Task` to `moonweave:Execution` in one direction and declares lossy classification, validity start, and the prohibition on creating a Task-realization edge without task_specification_id.
      ja: instance `mapping-rule-a2a-task-lifecycle@4` は `a2a:Task` の lifecycle 項目を `moonweave:Execution` へ一方向変換し、lossy 分類、有効開始、task_specification_id 不在時の Task realization 辺禁止を宣言します。
    field_values:
      mapping_rule_id: mapping-rule-a2a-task-lifecycle
      version: "4"
      source_construct: a2a:Task
      target_construct: moonweave:Execution
      direction: source-to-target
      mapping_kind: lossy
      valid_from: 2026-07-13T06:00:00.000Z
    related_node_ids:
      - MappingRule
    related_relation_ids: []
    expected_result:
      zh: 结构验证应保留规则版本、来源、目标、方向、损失和有效期。
      en: Structure validation retains rule version, source, target, direction, loss, and validity interval.
      ja: 構造検証は規則版、source、target、direction、loss、有効期間を保持します。
    why_valid_or_invalid:
      zh: 字段共同构成一条可测试、不可与其他版本混用的转换合同。
      en: Together the fields form a testable conversion contract that cannot be interchanged with another version.
      ja: 項目が共同で試験可能かつ他版と交換不能な変換契約を構成するためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mapping-rule-025
      - claim-mapping-rule-026
external_mappings: []
