    examples:
      - id: MappingRule-governs-Adapter-example-positive-manual-001
        kind: positive
        labels:
          zh: governs人工正例
          en: Reviewed positive case for governs
          ja: governsの審査済み正例
        scenario_id: null
        descriptions:
          zh: "`a2a-task-lifecycle-v4` 被 `a2a-profile@1.0` 的激活规则清单引用，版本范围匹配，测试摘要为通过，因此该规则约束适配器处理 Task 状态与历史的方式。"
          en: "`a2a-task-lifecycle-v4` appears in the active rule inventory of `a2a-profile@1.0`; its version range matches and tests pass, so it governs how the adapter handles Task status and history."
          ja: "`a2a-task-lifecycle-v4` が `a2a-profile@1.0` の active rule 一覧に含まれ、版範囲一致・試験合格のため、Adapter の Task status/history 処理を統制します。"
        field_values: {}
        related_node_ids:
          - MappingRule
          - Adapter
        related_relation_ids:
          - MappingRule-governs-Adapter
        expected_result:
          zh: 查询应返回 MappingRule —governs→ Adapter，并显示激活版本。
          en: The query returns MappingRule governs Adapter with the active versions.
          ja: 照会は active 版付きで MappingRule —governs→ Adapter を返します。
        why_valid_or_invalid:
          zh: 适配器实际执行该规则，且规则前置条件和版本合同已满足。
          en: The adapter actually executes the rule and its preconditions and version contract are satisfied.
          ja: Adapter が実際に規則を実行し、前提と版契約を満たすためです。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-mapping-rule-027
      - id: MappingRule-governs-Adapter-example-boundary-manual-001
        kind: boundary
        labels:
