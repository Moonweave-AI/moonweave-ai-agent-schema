          en: Reviewed boundary case for governs
          ja: governsの審査済み境界例
        scenario_id: null
        descriptions:
          zh: 适配器文档把旧规则链接为迁移参考，但活动清单未包含它且版本已经过期。
          en: Adapter documentation links an old rule as migration reference, but the active inventory excludes it and its validity has expired.
          ja: Adapter 文書が旧規則を migration 参考として link しても active 一覧になく有効期限切れです。
        field_values: {}
        related_node_ids:
          - MappingRule
          - Adapter
        related_relation_ids:
