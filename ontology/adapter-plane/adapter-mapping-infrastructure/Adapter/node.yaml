    source: eng-proto-mcp-spec
    supports: MCP capability negotiation demonstrates why an adapter record must bind behavior to an external protocol version and declared feature scope; the concrete adapter_id remains Moonweave metadata.
    locator: Specification > Architecture, base protocol, and server features
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
