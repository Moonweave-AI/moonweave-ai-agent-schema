source_claims:
  - id: claim-adapter-001
    source: eng-proto-a2a-spec
    supports: Adapter uses the A2A specification's explicit protocol version, Agent Card capability disclosure, and separate Message, Task, and Artifact models as versioned external inputs. Treating the converter as a capability root is a Moonweave design inference.
    locator: Specification > Core concepts, Agent Card, Message, Task, and Artifact
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-002
    source: eng-proto-mcp-spec
    supports: Adapter also reflects MCP's requirement to negotiate a protocol version and client/server capabilities during initialization before using tools, resources, or prompts. The common adapter abstraction and its exact/lossy/unsupported statuses are defined by Moonweave.
    locator: Specification > Architecture, base protocol, and server features
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-003
    source: eng-proto-a2a-spec
    supports: A2A defines independent, potentially opaque agents that discover one another through Agent Cards and collaborate through a versioned Task, Message, Part, and Artifact data model. Those protocol constructs directly identify the external family covered by AdapterA2A; the Moonweave family value and its mapping scope remain registry decisions.
    locator: A2A Specification > 1 Introduction; 4 Protocol Data Model > Core Objects
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-004
    source: eng-proto-a2a-spec
    supports: A2A's Agent Card carries identity, endpoints, capabilities, security schemes, and skills, while Messages initiate or continue Tasks and Artifacts carry results. This supports the AdapterA2A coverage of discovery, delegation-facing metadata, lifecycle, exchange, and opacity boundaries; it does not prescribe Moonweave's adapter implementation.
    locator: A2A Specification > 3.7 Messages and Artifacts; 4.4 Agent Discovery and Agent Card; 8 Agent Discovery
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-005
    source: eng-fw-crewai-docs
    supports: CrewAI documents Agent and Task as framework constructs and associates agents with roles, goals, backstories, tools, delegation settings, and task execution. These are the external constructs that AdapterCrewAI must map; the adapter-family enumeration is a Moonweave registry choice.
    locator: CrewAI Documentation > Core Concepts > Agents; Tasks
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-006
    source: eng-fw-crewai-docs
    supports: CrewAI distinguishes Crews, Flows, and Processes as coordination and execution structures. Their framework-specific topology and lifecycle justify CrewAI-specific mappings for collaboration and workflow semantics, without making those constructs canonical ontology classes.
    locator: CrewAI Documentation > Core Concepts > Crews; Flows; Processes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-007
    source: eng-fw-deepagents-docs
    supports: Deep Agents presents an agent harness with built-in planning, filesystem-backed context management, specialized subagent spawning, and long-term memory. Those named capabilities define the external construct family represented by AdapterDeepAgents; Moonweave determines how each capability maps to its canonical concepts.
    locator: Deep Agents overview > Core capabilities > Planning and task decomposition; Context management; Subagent spawning; Long-term memory
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-008
    source: eng-fw-deepagents-docs
    supports: The Deep Agents overview explains pluggable filesystem backends, sandbox execution, permissions, human approval, and subagent context isolation for extended work. This substantiates the adapter's filesystem, interrupt, isolation, and long-running-task scope, but not Moonweave's exact field names or hierarchy.
    locator: Deep Agents overview > When to use Deep Agents; Core capabilities > Pluggable filesystem backends; Filesystem permissions; Human-in-the-loop
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-009
    source: eng-proto-fipa-acl
    supports: The FIPA ACL Message Structure Specification defines an ACL message envelope with communicative act and parameters for sender, receiver, content, language, encoding, ontology, protocol, conversation, and reply control. These are direct external mapping targets for the FIPA adapter family.
    locator: FIPA ACL Message Structure Specification > 2 ACL Message Structure; 2.1 Message Parameters
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-010
    source: eng-proto-fipa-agent-management
    supports: The FIPA Agent Management Specification defines the management reference model and agent-platform services used to register, locate, and manage agents. Together with ACL message evidence, it supports a FIPA family spanning communication and agent-management constructs; Moonweave supplies the adapter taxonomy.
    locator: FIPA Agent Management Specification > Agent Management Reference Model; Agent Platform Services
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-011
    source: eng-proto-kqml-spec
    supports: The KQML specification defines a message as a performative plus parameters such as content, language, ontology, sender, receiver, reply control, and routing metadata. Those protocol-native terms directly bound the KQML adapter family; Moonweave decides their canonical targets.
    locator: KQML Specification > KQML Syntax; Reserved Performative Parameters
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-012
    source: eng-proto-kqml-spec
    supports: KQML's reserved performative names specify informative, query, response, effector, networking, and facilitation speech-act families, including conversation and delivery behavior. This supports mapping performatives and routing semantics as KQML-specific constructs, not treating them as universal core vocabulary.
    locator: KQML Specification > KQML Semantics; Reserved Performative Names
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-013
    source: eng-fw-langgraph-graph-api
    supports: LangGraph's Graph API defines graph state, nodes, edges, conditional edges, reducers, runtime context, compilation, and execution. These framework-native graph constructs establish the scope of AdapterLangGraph; the adapter family value and canonical mappings are Moonweave design choices.
    locator: LangGraph Graph API > Graph definitions; State; Nodes; Edges; Compile your graph
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-014
    source: eng-fw-langgraph-graph-api
    supports: The Graph API documents state updates, command-based control flow, graph invocation, streaming, and persistence-related execution behavior. This supports a LangGraph-specific mapping scope for runtime edges, updates, checkpoints, and streams, while leaving equivalence and loss judgments to Moonweave.
    locator: LangGraph Graph API > Commands; Graph execution; Streaming; Persistence
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-015
    source: eng-proto-mcp-2025-spec
    supports: MCP defines a client-host-server architecture and a JSON-RPC data layer with lifecycle management plus server primitives for tools, resources, and prompts. Those protocol-native operations and objects directly establish the external family represented by AdapterMCP.
    locator: MCP Specification 2025-11-25 > Architecture; Base Protocol > Lifecycle; Server Features > Tools, Resources, Prompts
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-016
    source: eng-proto-mcp-2025-spec
    supports: The MCP specification includes initialization-time capability negotiation, authorization, elicitation, sampling, notifications, and task-augmented requests in addition to core server features. This supports the wider MCP adapter scope; Moonweave still defines the adapter registry and its mapping contracts.
    locator: MCP Specification 2025-11-25 > Base Protocol > Lifecycle and capability negotiation; Authorization; Client Features > Elicitation and Sampling
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-017
    source: eng-fw-openai-python-docs
    supports: The OpenAI Agents SDK defines Agent and Runner as its core runtime abstractions and documents function tools, agents-as-tools, handoffs, and guardrails. Those named SDK constructs establish the external family covered by AdapterOpenAIAgents; their canonical projections are Moonweave mappings.
    locator: OpenAI Agents SDK > Agents; Running agents; Tools; Handoffs; Guardrails
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-018
    source: eng-fw-openai-python-docs
    supports: The SDK separately documents sessions for cross-run conversation state and tracing as traces composed of typed spans for agents, generations, functions, guardrails, and handoffs. This supports session and observability mappings within the OpenAI adapter family, not a protocol-neutral core duplication.
    locator: OpenAI Agents SDK > Sessions; Tracing > Traces and spans; Default tracing
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-019
    source: eng-proto-a2a-spec
    supports: A2A is a named, versioned external protocol with its own Agent Card, Message, Task, Part, Artifact, operation, and binding constructs. It demonstrates why an adapter registry must identify the external construct family being mapped; the broader protocol/framework/benchmark/export categories are Moonweave's taxonomy.
    locator: A2A Specification > 1.3 Specification Structure; 4 Protocol Data Model
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-020
    source: eng-proto-mcp-2025-spec
    supports: MCP is a distinct external protocol family with lifecycle, capability negotiation, tools, resources, prompts, sampling, elicitation, and transport behavior. This supports recording the family boundary before mapping its constructs; adapter_family itself and its controlled enumeration are Moonweave registry design.
    locator: MCP Specification 2025-11-25 > Architecture; Base Protocol; Server Features; Client Features
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-021
    source: eng-proto-a2a-spec
    supports: A2A assigns identifiers to protocol objects such as Tasks, Messages, Artifacts, and contexts and treats protocol version separately. That separation motivates a stable identity for the logical adapter apart from its release. The A2A specification does not define Moonweave adapter_id or its cardinality.
    locator: A2A Specification > 3.6 Versioning; 4.1 Core Objects > Task, Message, Artifact
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-022
    source: eng-proto-mcp-2025-spec
    supports: MCP initialization distinguishes implementation identity from the negotiated protocol version and capabilities. This provides a precedent for keeping an adapter's logical identity separate from release-specific compatibility, but the adapter_id property is a Moonweave governance field.
    locator: MCP Specification 2025-11-25 > Base Protocol > Lifecycle > Initialization
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-023
    source: eng-proto-a2a-spec
    supports: A2A requires clients to identify the Major.Minor protocol version and servers to apply that version's semantics or return VersionNotSupportedError. This makes version-specific behavior explicit. Moonweave extends that principle to an immutable adapter implementation and mapping-contract version.
    locator: A2A Specification > 3.6 Versioning > Client Responsibilities; Server Responsibilities
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-024
    source: eng-proto-mcp-2025-spec
    supports: MCP negotiates protocolVersion during initialization and rejects unsupported versions, so compatibility is explicitly version-bounded. The specification does not define an adapter release object; adapter_version and its immutability contract are Moonweave reproducibility choices.
    locator: MCP Specification 2025-11-25 > Base Protocol > Lifecycle > Version Negotiation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-025
    source: eng-proto-a2a-spec
    supports: A2A separates its data model, operations, bindings, discovery, and extensions and lets Agent Cards declare capabilities and supported interfaces. These separable construct groups motivate an explicit adapter scope. Moonweave defines the scope field and the rule that it bounds mapping responsibility.
    locator: A2A Specification > 1.3 Specification Structure; 3 Protocol Operations; 4 Protocol Data Model; 8 Agent Discovery
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-026
    source: eng-proto-mcp-2025-spec
    supports: MCP clients and servers negotiate distinct capabilities and expose independently defined primitives such as tools, resources, and prompts. That feature partition supplies concrete scope boundaries for an adapter, while Moonweave owns the scope property and its coverage semantics.
    locator: MCP Specification 2025-11-25 > Base Protocol > Lifecycle and capability negotiation; Server Features
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-027
    source: eng-proto-a2a-spec
    supports: A2A publishes released versions, retains previous versions, and requires explicit handling when a requested version is unsupported. This supports lifecycle governance for adapters that implement those versions. The experimental/supported/deprecated/withdrawn vocabulary is Moonweave's release policy, not an A2A enum.
    locator: A2A Specification > Version selector; 3.6 Versioning > VersionNotSupportedError
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-028
    source: eng-proto-mcp-2025-spec
    supports: MCP revisions publish explicit changelogs and negotiate supported protocol versions at initialization. This motivates an independently governed adapter lifecycle. MCP does not define Moonweave's four adapter status values; those values communicate implementation support policy.
    locator: MCP Specification 2025-11-25 > Changelog; Base Protocol > Lifecycle > Version Negotiation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-029
    source: eng-proto-a2a-spec
    supports: A2A imposes normative requirements on version processing, data-model representation, binding equivalence, and interoperability. An adapter advertised as supported must therefore demonstrate those mapped requirements across its declared scope. Requiring a passing MappingTestResult for every scope is Moonweave's conformance gate.
    locator: A2A Specification > 3.6 Versioning; 4 Protocol Data Model; 5 Protocol Binding Requirements and Interoperability
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-030
    source: eng-proto-mcp-2025-spec
    supports: "MCP defines normative lifecycle, capability, primitive, and error behavior that an implementation must preserve for negotiated features. Moonweave converts that obligation into an adapter-release gate: each declared mapping scope must have passing evidence. The specification itself does not define this ontology constraint."
    locator: MCP Specification 2025-11-25 > Base Protocol > Lifecycle; Capability negotiation; Error handling; Server Features
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-031
    source: eng-proto-a2a-spec
    supports: A2A's normative definitions and binding-equivalence requirements supply source-side conditions that an adapter cannot improvise per execution. Moonweave captures each translation condition as a MappingRule and requires the adapter to be governed by at least one such rule; the governs predicate and cardinality are ontology design.
    locator: A2A Specification > 4 Protocol Data Model; 5 Protocol Binding Requirements and Interoperability
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-032
    source: eng-proto-mcp-2025-spec
    supports: MCP gives each primitive and lifecycle operation typed request, result, capability, and error semantics. A repeatable adapter must apply explicit rules to preserve or declare loss for those semantics. The required governs edge to MappingRule is Moonweave's representation of that requirement, not an MCP object.
    locator: MCP Specification 2025-11-25 > Base Protocol; Server Features > Tools, Resources, Prompts; Client Features
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
