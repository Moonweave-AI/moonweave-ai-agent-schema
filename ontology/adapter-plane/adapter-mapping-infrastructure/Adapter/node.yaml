    source: eng-proto-a2a-spec
    supports: Adapter-example-positive-001 uses A2A's published separation of Agent Card discovery, protocol version, capabilities, Message, Task, and Artifact as the external construct inventory; the adapter identity and support classification are Moonweave interoperability decisions.
    locator: Specification > Core concepts, Agent Card, Message, Task, and Artifact
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-034
    source: eng-proto-mcp-spec
    supports: MCP's initialize exchange negotiates a protocol version and client/server capabilities before feature use; Adapter-example-positive-001 follows that version-and-scope discipline without claiming MCP defines the Moonweave Adapter class.
    locator: Specification > Architecture, base protocol, and server features
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-035
    source: eng-proto-a2a-spec
    supports: A2A defines Task as a protocol data model and Agent Card as discovery metadata, not as Moonweave conversion capabilities; this external/native distinction supports the Adapter-example-boundary-001 exclusion.
    locator: Specification > Core concepts, Agent Card, Message, Task, and Artifact
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-036
    source: eng-proto-mcp-spec
    supports: MCP specifies protocol roles, messages, and negotiated features; it does not make a correspondence rule into an executable adapter. Adapter-example-boundary-001 preserves that specification-versus-capability boundary.
    locator: Specification > Architecture, base protocol, and server features
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-adapter-037
    source: eng-proto-a2a-spec
    supports: The Adapter-example-instance-001 scope values task and message correspond to named A2A protocol constructs; trust is the Moonweave scope for Agent Card security-scheme and authentication mapping.
    locator: Specification > Core concepts, Agent Card, Message, Task, and Artifact
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
