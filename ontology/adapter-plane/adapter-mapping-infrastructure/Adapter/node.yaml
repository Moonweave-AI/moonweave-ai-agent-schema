schema: moonweave.ai/ontology-node/v1
id: Adapter
kind: concept
status: accepted
labels:
  zh: 适配器
  en: adapter
  ja: アダプター
semantics:
  short_definition:
    zh: 适配器是按外部系统版本和转换范围配置的一组互操作转换能力。
    en: An Adapter is an interoperability conversion capability configured for a named external-system version and a declared construct scope.
    ja: Adapter は、特定の外部システム版と構成範囲に対して設定された相互運用変換能力です。
  definition:
    zh: 适配器是一种可版本化的互操作能力：它为具名外部协议、框架、基准或导出格式声明转换方向与构造范围，并执行适用于该范围的 MappingRule。适配器必须区分精确、有损和不支持的转换，保存测试证据；它不是外部系统本身，也不是某一条规则或某一次转换产物。
    en: An Adapter is a versioned interoperability capability for a named external protocol, framework, benchmark, or export format. It declares direction and construct scope, executes the MappingRule set applicable to that scope, and distinguishes exact, lossy, and unsupported conversion with test evidence. It is neither the external system itself, an individual rule, nor the artifact produced by one conversion.
    ja: Adapter は、特定の外部プロトコル、フレームワーク、ベンチマーク、または出力形式に対する版付き相互運用能力です。方向と構成範囲を宣言し、その範囲の MappingRule を実行して、exact・lossy・unsupported を試験証拠付きで区別します。外部システムそのもの、個別規則、変換で生じた成果物のいずれでもありません。
  why_needed:
    zh: 同一外部标准会跨版本变化，且不同实现只覆盖部分构造；把适配器单独建模，才能查询“哪个版本支持哪些范围、采用哪些规则、通过了哪些测试”，并在升级时隔离兼容性风险。
    en: External standards evolve and implementations cover different subsets. Modeling Adapter separately makes version, supported scope, governing rules, and conformance evidence queryable, so compatibility risk can be isolated during upgrades.
    ja: 外部標準は版ごとに変化し、実装ごとに対応範囲も異なります。Adapter を独立させることで、版・対応範囲・適用規則・適合証拠を照会でき、更新時の互換性リスクを分離できます。
  includes:
    - zh: 纳入具有稳定 adapter_id、不可混用的 adapter_version、明确外部系统族、转换范围和支持状态，并由版本化 MappingRule 约束的转换能力。
      en: Includes conversion capabilities with a stable adapter_id, a non-interchangeable adapter_version, a named external-system family, declared scope and support status, and versioned governing MappingRule records.
      ja: 安定した adapter_id、混同できない adapter_version、外部システム族、範囲、対応状態、および版付き MappingRule を持つ変換能力を含みます。
  excludes:
    - zh: 不纳入单条 MappingRule、转换生成的 MappingArtifact、外部协议或框架的原生对象，以及只做传输而不声明语义对应和损失处理的连接器。
      en: Excludes an individual MappingRule, a produced MappingArtifact, native objects from the external protocol or framework, and transport-only connectors that declare neither semantic correspondence nor loss handling.
      ja: 個別 MappingRule、生成された MappingArtifact、外部プロトコル／基盤の固有オブジェクト、および意味対応と損失処理を宣言しない通信専用コネクターを除外します。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys:
    - adapter_id
    - adapter_version
  fields:
    - id: adapter_family
      labels:
        zh: 适配器族
        en: Adapter family
        ja: アダプタファミリ
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 标识适配器所面向的协议、框架、基准或导出构造族。
        en: Identifies the protocol, framework, benchmark, or export construct family addressed by an Adapter.
        ja: アダプタが対象とするプロトコル、フレームワーク、ベンチマーク、またはエクスポート構成のファミリを識別します。
      allowed_values:
        - id: AdapterA2A
          value: a2a
          labels:
            zh: A2A 适配器族
            en: A2A adapter family
            ja: A2A アダプタファミリ
          definitions:
            en: enumerates the A2A adapter family for remote agent identity, task lifecycle, message exchange, artifact exchange, opacity boundaries, and delegation metadata mappings.
            zh: A2A 适配器族枚举远程智能体身份、任务生命周期、消息交换、产物交换、不透明执行边界以及委派元数据的映射系列。
            ja: A2A アダプタファミリは、遠隔エージェント識別、タスクライフサイクル、メッセージ交換、成果物交換、不透明な実行境界、委任メタデータに関する写像系列を列挙します。
          status: accepted
          source_claims:
            - claim-adapter-003
            - claim-adapter-004
        - id: AdapterCrewAI
          value: crew-ai
          labels:
            zh: CrewAI 适配器族
            en: CrewAI adapter family
            ja: CrewAI アダプタファミリ
          definitions:
            en: enumerates the CrewAI adapter family for agent roles, crews, tasks, flows, processes, tool assignments, and multi-agent collaboration mappings.
            zh: CrewAI 适配器族枚举智能体角色、团队、任务、流程、过程、工具分配和多智能体协作的映射系列。
            ja: CrewAI アダプタファミリは、エージェント役割、チーム、タスク、フロー、プロセス、ツール割り当て、複数エージェント協調に関する写像系列を列挙します。
          status: accepted
          source_claims:
            - claim-adapter-005
            - claim-adapter-006
        - id: AdapterDeepAgents
          value: deep-agents
          labels:
            zh: Deep Agents 适配器族
            en: Deep Agents adapter family
            ja: Deep Agents アダプタファミリ
          definitions:
            en: enumerates the Deep Agents adapter family for subagents, planning tools, file-system state, context quarantine, interrupts, and long-running task mappings.
            zh: Deep Agents 适配器族枚举子智能体、规划工具、文件系统状态、上下文隔离、中断和长时任务的映射系列。
            ja: Deep Agents アダプタファミリは、サブエージェント、計画ツール、ファイルシステム状態、コンテキスト隔離、中断、長時間タスクに関する写像系列を列挙します。
          status: accepted
          source_claims:
            - claim-adapter-007
            - claim-adapter-008
        - id: AdapterFIPA
          value: fipa
          labels:
            zh: FIPA 适配器族
            en: FIPA adapter family
            ja: FIPA アダプタファミリ
          definitions:
            en: enumerates the FIPA adapter family for agent communication acts, interaction protocols, agent management, message parameters, and conversation semantics mappings.
            zh: FIPA 适配器族枚举智能体通信行为、交互协议、智能体管理、消息参数和会话语义的映射系列。
            ja: FIPA アダプタファミリは、エージェント通信行為、相互作用プロトコル、エージェント管理、メッセージ引数、会話意味に関する写像系列を列挙します。
          status: accepted
          source_claims:
            - claim-adapter-009
            - claim-adapter-010
        - id: AdapterKQML
          value: kqml
          labels:
            zh: KQML 适配器族
            en: KQML adapter family
            ja: KQML アダプタファミリ
          definitions:
            en: enumerates the KQML adapter family for speech-act style message performatives, content-language metadata, sender and receiver roles, conversation control, and routing mappings.
            zh: KQML 适配器族枚举言语行为式消息类型、内容语言元数据、发送方与接收方角色、会话控制和路由的映射系列。
            ja: KQML アダプタファミリは、発話行為型メッセージ、内容言語メタデータ、送信者と受信者の役割、会話制御、経路制御に関する写像系列を列挙します。
          status: accepted
          source_claims:
            - claim-adapter-011
            - claim-adapter-012
        - id: AdapterLangGraph
          value: lang-graph
          labels:
            zh: LangGraph 适配器族
            en: LangGraph adapter family
            ja: LangGraph アダプタファミリ
          definitions:
            en: enumerates the LangGraph adapter family for graph runtime nodes, edges, durable execution, state updates, checkpoints, streams, and graph API mappings.
            zh: LangGraph 适配器族枚举图运行时节点、边、持久执行、状态更新、检查点、流式输出和图接口的映射系列。
            ja: LangGraph アダプタファミリは、グラフ実行基盤のノード、エッジ、永続実行、状態更新、チェックポイント、ストリーム、グラフ API に関する写像系列を列挙します。
          status: accepted
          source_claims:
            - claim-adapter-013
            - claim-adapter-014
        - id: AdapterMCP
          value: mcp
          labels:
            zh: MCP 适配器族
            en: MCP adapter family
            ja: MCP アダプタファミリ
          definitions:
            en: enumerates the MCP adapter family for tool, resource, prompt, discovery, authorization, elicitation, JSON-RPC message, and client-server capability exchange mappings.
            zh: MCP 适配器族枚举工具、资源、提示、发现、授权、补充信息请求、远程过程调用消息以及客户端与服务器能力交换的映射系列。
            ja: MCP アダプタファミリは、ツール、リソース、プロンプト、発見、認可、追加情報要求、遠隔手続き呼び出しメッセージ、クライアントとサーバーの能力交換に関する写像系列を列挙します。
          status: accepted
          source_claims:
            - claim-adapter-015
            - claim-adapter-016
        - id: AdapterOpenAIAgents
          value: open-aiagents
          labels:
            zh: OpenAI Agents 适配器族
            en: OpenAI Agents adapter family
            ja: OpenAI Agents アダプタファミリ
          definitions:
            en: enumerates the OpenAI Agents adapter family for agent SDK handoffs, tools, tracing spans, guardrails, sessions, and hosted tool mappings.
            zh: OpenAI Agents 适配器族枚举智能体开发包中的交接、工具、追踪跨度、护栏、会话和托管工具的映射系列。
            ja: OpenAI Agents アダプタファミリは、エージェント開発キットの引き継ぎ、ツール、トレーススパン、ガードレール、セッション、ホスト型ツールに関する写像系列を列挙します。
          status: accepted
          source_claims:
            - claim-adapter-017
            - claim-adapter-018
      pattern: null
      example_value: a2a
      source_claims:
        - claim-adapter-019
        - claim-adapter-020
    - id: adapter_id
      labels:
        zh: 适配器标识
        en: adapter ID
        ja: アダプター ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识跨版本的逻辑适配器。
        en: Stable identifier for the logical adapter across versions.
        ja: 複数バージョンにまたがる論理アダプターを安定して識別します。
      allowed_values: []
      pattern: null
      example_value: adapter-a2a
      source_claims:
        - claim-adapter-021
        - claim-adapter-022
    - id: adapter_version
      labels:
        zh: 适配器版本
        en: adapter version
        ja: アダプターバージョン
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一项不可变适配器实现和映射合同版本。
        en: Identifies one immutable adapter implementation and mapping-contract version.
        ja: 一つの不変アダプター実装とマッピング契約バージョンを識別します。
      allowed_values: []
      pattern: null
      example_value: 2.0.0
      source_claims:
        - claim-adapter-023
        - claim-adapter-024
    - id: scope
      labels:
        zh: 适用范围
        en: scope
        ja: 適用範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出该适配器负责转换的构造范围。
        en: Construct scopes for which the adapter is responsible.
        ja: アダプターが変換を担当する構成要素範囲です。
      allowed_values: []
      pattern: null
      example_value:
        - task
        - message
        - trust
      source_claims:
        - claim-adapter-025
        - claim-adapter-026
    - id: status
      labels:
        zh: 适配器状态
        en: adapter status
        ja: アダプター状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 适配器处于实验、支持、弃用或撤回状态。
        en: Experimental, supported, deprecated, or withdrawn state of the adapter.
        ja: アダプターの experimental、supported、deprecated、withdrawn 状態です。
      allowed_values: []
      pattern: null
      example_value: supported
      source_claims:
        - claim-adapter-027
        - claim-adapter-028
  constraints:
    - id: adapter-version-conformance
      severity: error
      expression_language: plain
      expression: a supported adapter version has passing mapping tests for every declared scope
      explanations:
        zh: 受支持适配器版本必须对每个声明范围具有通过的映射测试。
        en: A supported adapter version has passing mapping tests for every declared scope.
        ja: supported 状態のアダプターバージョンは宣言した各範囲の合格マッピングテストを持ちます。
      source_claims:
        - claim-adapter-029
        - claim-adapter-030
  required_relation_constraints:
    - id: adapter-governed-by-mapping-rule
      direction: incoming
      predicate: governs
      target_concept_id: MappingRule
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 适配器必须由至少一条版本化映射规则约束。
        en: An adapter is governed by at least one versioned mapping rule.
        ja: アダプターは少なくとも一つのバージョン付きマッピング規則により統制されます。
      source_claims:
        - claim-adapter-031
        - claim-adapter-032
examples:
  - id: Adapter-example-positive-001
    kind: positive
    labels:
      zh: 适配器正例
      en: Positive example of adapter
      ja: アダプターの正例
    scenario_id: null
    descriptions:
      zh: "`adapter-a2a@2.0.0` 声明只处理 A2A 的 task、message 与 trust 构造，并把每条规则绑定到其记录的 A2A 规范快照；已测试的 Task 与 Message 映射为 supported，没有经验证对应的扩展仍标记 unsupported。"
      en: "`adapter-a2a@2.0.0` declares scope only for A2A task, message, and trust constructs and binds each rule to its recorded A2A specification snapshot. Tested Task and Message mappings are supported, while extensions without a verified correspondence remain unsupported."
      ja: "`adapter-a2a@2.0.0` は A2A の task・message・trust 構成だけを範囲として宣言し、各規則を記録済み A2A 仕様スナップショットへ結び付けます。試験済み Task／Message は supported、検証対応のない拡張は unsupported とします。"
    field_values:
      adapter_id: adapter-a2a
      adapter_version: 2.0.0
      scope:
        - task
        - message
        - trust
      status: supported
    related_node_ids:
      - Adapter
      - MappingRule
    related_relation_ids:
      - MappingRule-governs-Adapter
    expected_result:
      zh: 该运行可查询 Adapter 以及方向保持不变的事实 MappingRule-governs-Adapter。
      en: The run can query Adapter together with direction-preserving fact MappingRule-governs-Adapter.
      ja: この実行では Adapter と方向を保持した事実 MappingRule-governs-Adapter を共に照会できます。
    why_valid_or_invalid:
      zh: 该记录具备适配器身份、不可混用的版本、明确范围和支持状态，并把未验证构造留在范围外；因此它描述的是一项转换能力，而不是把 A2A 原生对象复制进本体。
      en: The record has adapter identity, a non-interchangeable version, declared scope, and support status, while unverified constructs stay outside that scope. It therefore describes a conversion capability rather than importing native A2A objects into the ontology.
      ja: 識別・版・範囲・対応状態がそろい、未検証構成は範囲外に残るため、A2A 固有オブジェクトの取り込みではなく変換能力の記録です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-adapter-033
      - claim-adapter-034
  - id: Adapter-example-boundary-001
    kind: boundary
    labels:
      zh: 适配器边界例
      en: Boundary case for adapter
      ja: アダプターの境界例
    scenario_id: null
    descriptions:
      zh: "`a2a-task-lifecycle-to-execution-v4` 只规定 A2A Task 生命周期对象到 Moonweave Execution 的字段对应、关联谱系和损失分类；它没有 adapter_id、范围状态或可执行转换能力。即使 `adapter-a2a@2.0.0` 使用这条规则，规则仍是 MappingRule，不是 Adapter。"
      en: "`a2a-task-lifecycle-to-execution-v4` only specifies field correspondences, linked lineage, and loss classification from the A2A Task lifecycle object to Moonweave Execution. It has no adapter identity, scoped support status, or executable conversion capability. Use by `adapter-a2a@2.0.0` does not turn the rule into an Adapter."
      ja: "`a2a-task-lifecycle-to-execution-v4` は A2A Task ライフサイクル対象から Moonweave Execution への項目対応・関連系譜・損失分類だけを規定し、adapter_id・範囲状態・実行能力を持ちません。`adapter-a2a@2.0.0` が利用しても Adapter にはなりません。"
    field_values: {}
    related_node_ids:
      - Adapter
      - MappingRule
    related_relation_ids:
      - MappingRule-governs-Adapter
    expected_result:
      zh: MappingRule 保持其原有类型，验证器不得凭关系共现把它提升为 Adapter。
      en: MappingRule retains its own type; validation must not promote it to Adapter from relation co-occurrence.
      ja: MappingRule は元の型を維持し、関係の共起だけで Adapter へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 规则是声明性规范，适配器是执行一组规则并承诺版本化覆盖的能力；“被适配器使用”不能替代适配器身份、范围和状态。
      en: A rule is a declarative specification; an adapter is the capability that executes a rule set and commits to versioned coverage. Being used by an adapter cannot substitute for adapter identity, scope, and status.
      ja: 規則は宣言仕様、Adapter は規則集合を実行し版付き対応範囲を約束する能力です。利用関係だけでは Adapter の識別・範囲・状態を満たしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-adapter-035
      - claim-adapter-036
  - id: Adapter-example-instance-001
    kind: instance
    labels:
      zh: 适配器结构化实例
      en: Structured instance of adapter
      ja: アダプターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: 实例 `adapter-a2a@2.0.0` 固定外部规范版本，声明 task、message、trust 三个转换范围，并逐项记录 supported、lossy 或 unsupported；这些字段作为 Adapter 节点说明，不生成第二套实例图。
      en: Instance `adapter-a2a@2.0.0` pins an external specification version, declares task, message, and trust conversion scopes, and records supported, lossy, or unsupported status per scope; the fields remain information on Adapter rather than a second instance graph.
      ja: instance `adapter-a2a@2.0.0` は外部仕様版を固定し、task・message・trust の変換範囲と supported・lossy・unsupported 状態を記録します。項目は Adapter ノード情報として保持し、別 instance graph を作りません。
    field_values:
      adapter_id: adapter-a2a
      adapter_version: 2.0.0
      scope:
        - task
        - message
        - trust
      status: supported
    related_node_ids:
      - Adapter
    related_relation_ids: []
    expected_result:
      zh: 结构验证应确认适配器 ID、版本、范围和状态完整且互不矛盾。
      en: Structure validation confirms a complete, consistent adapter ID, version, scope, and support state.
      ja: 構造検証は Adapter ID、版、範囲、対応状態の完全性と整合性を確認します。
    why_valid_or_invalid:
      zh: 记录能够唯一识别一项版本化转换能力，并区分已验证范围与未支持范围。
      en: The record uniquely identifies a versioned conversion capability and separates tested from unsupported scope.
      ja: 版付き変換能力を一意に識別し、検証済み範囲と未対応範囲を分けるため有効です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-adapter-037
      - claim-adapter-038
external_mappings: []
applicability:
  - adapter
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-adapter-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 GoF Adapter、Enterprise Integration Patterns、W3C OWL/SHACL/ShEx、JSON Schema 2020-12 及 A2A/MCP 协议映射逐项核验；语义、层级、关系、结构与示例均符合 adapter-plane 设计边界。
    en: Verified against GoF Adapter, Enterprise Integration Patterns, W3C OWL/SHACL/ShEx, JSON Schema 2020-12, and A2A/MCP protocol mapping patterns; semantics, hierarchy, relations, structure, and examples align with adapter-plane design boundaries.
