      expected_result:
        zh: 验证器必须保留 MappingRule 类型，不得补造 BenchmarkAdapter 成员资格。
        en: Validation must retain the MappingRule type and must not invent BenchmarkAdapter membership.
        ja: 検証は MappingRule 型を維持し、BenchmarkAdapter 所属を作ってはなりません。
      why_valid_or_invalid:
        zh: 基准适配器是执行并验证一组映射的能力；单条字段对应缺少能力身份、覆盖范围和运行合同。
        en: A benchmark adapter is the capability that executes and validates a mapping set; one field correspondence lacks capability identity, coverage, and an execution contract.
        ja: BenchmarkAdapter は写像集合を実行・検証する能力であり、一項目の対応には能力識別、網羅範囲、実行契約がありません。
