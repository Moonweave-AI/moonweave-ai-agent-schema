applicability:
  - adapter
sibling_differentiation:
  - sibling_concept_id: FrameworkAdapter
    shared_parent_concept_id: Adapter
    differentia:
      zh: 端点特定对照：父节点 Adapter：BenchmarkAdapter（semantic kind=capability，骨架 BenchmarkAdapter-is_a-Adapter）；FrameworkAdapter（semantic kind=capability，骨架 FrameworkAdapter-is_a-Adapter）。BenchmarkAdapter 的种差是版本化解释基准任务、环境、轨迹、度量与结果；FrameworkAdapter 的种差是版本化解释框架原生智能体、工作流、交接、工具、记忆与追踪构造。两者都不复制外部产品类树，且条件不得互借。
      en: "Endpoint-specific contrast under Adapter: BenchmarkAdapter (semantic kind=capability, backbone BenchmarkAdapter-is_a-Adapter) is distinguished by versioned mappings for benchmark tasks, environments, trajectories, measurements, and outcomes. FrameworkAdapter (semantic kind=capability, backbone FrameworkAdapter-is_a-Adapter) is distinguished by versioned mappings for framework-native agents, workflows, handoffs, tools, memory, and tracing constructs. Neither copies an external product class tree, and their conditions cannot be borrowed from one another."
      ja: Adapter 配下の端点別対照です。BenchmarkAdapter（semantic kind=capability、backbone BenchmarkAdapter-is_a-Adapter）は benchmark task・environment・trajectory・measurement・outcome の版管理 mapping で区別されます。FrameworkAdapter（semantic kind=capability、backbone FrameworkAdapter-is_a-Adapter）は framework-native agent・workflow・handoff・tool・memory・trace 構成の版管理 mapping で区別されます。外部 product class tree は複製せず、両者の条件を流用しません。
    source_claims:
      - claim-benchmark-adapter-031
      - claim-benchmark-adapter-032
