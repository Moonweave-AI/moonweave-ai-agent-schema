source_claims:
  - id: claim-benchmark-adapter-001
    source: eng-bench-appworld
    supports: AppWorld supplies one concrete benchmark family with versioned tasks, application environments, API trajectories, state tests, and outcomes. Moonweave generalizes those facets into BenchmarkAdapter while keeping AppWorld-specific records in AppWorldAdapter.
    locator: AppWorld README > About; Task Worlds; Evaluating the Agent
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-002
    source: eng-bench-osworld-site
    supports: OSWorld supplies a second family with release-specific task setup, real-computer environments, recorded actions and observations, and evaluation results. The shared five-facet abstraction and its placement under Adapter are Moonweave ontology decisions.
    locator: OSWorld README > Updates; Running Experiments; Evaluation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-003
    source: eng-bench-appworld
    supports: AppWorld's walkthrough distinguishes task instructions, task-specific initial database state, API execution, experiment outputs, and evaluation programs. Those semantics vary with the released task data and evaluator, so they support recording the benchmark release that a BenchmarkAdapter interprets. The benchmark_version field and its Moonweave type are design decisions; AppWorld does not define this ontology field.
    locator: README > AppWorld Walkthrough > Primer; Task Worlds; Evaluating the Agent
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-004
    source: eng-bench-osworld-site
    supports: The OSWorld project page separates OSWorld-Verified results from earlier benchmark results and documents task attributes, trajectory-history inputs, and the local/public evaluation procedures. This makes the evaluated release part of the meaning of an OSWorld mapping and supports pinning it in benchmark_version. The Moonweave field itself remains a design inference.
    locator: Project page > OSWorld-Verified Results; Analysis; Evaluation > Local Evaluation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-005
    source: eng-bench-appworld
    supports: AppWorld exposes separate installation checks, end-to-end task verification, experiment execution, and evaluation commands. These documented checks support a conformance_status that records whether a benchmark mapping has been exercised against the selected task and evaluator release. AppWorld does not prescribe Moonweave's status vocabulary or claim that all five mapping facets passed.
    locator: README > Installation > appworld verify; Agent Experiments > Running and Evaluating Agents
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-006
    source: eng-bench-osworld-site
    supports: OSWorld documents a local evaluation interface and a separately verified public-evaluation path that requires disclosed implementation or monitoring trajectories. That distinction supports recording whether an adapter's interpretation has been verified rather than treating every declared mapping as conformant. The conformance_status enumeration is Moonweave-specific.
    locator: Project page > Evaluation > Local Evaluation; Public Evaluation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-007
    source: eng-bench-appworld
    supports: AppWorld defines a task through supervisor, instruction, and initial application state; agents act through APIs; task worlds retain logs and database states; and evaluation programs determine completion. Together these sections supply concrete task, environment, action-history, evaluation, and result semantics that a complete AppWorld adapter must account for. Requiring exactly five Moonweave facets is an ontology design constraint, not an AppWorld requirement.
    locator: README > AppWorld Walkthrough > Primer; Task Worlds; Interactive Coding and API Calls; Evaluating the Agent
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-008
    source: eng-bench-osworld-site
    supports: OSWorld evaluates open-ended tasks in real desktop environments, compares action/observation input methods, analyzes trajectory history, and reports verified outcomes. These documented dimensions justify auditing task, environment, trajectory, measure, and outcome correspondences together. The five-facet completeness rule and its enforcement are Moonweave design choices.
    locator: Project page > OSWorld-Verified Results; Analysis; Evaluation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-009
    source: eng-bench-appworld
    supports: AppWorld identifies each benchmark task by a supervisor, natural-language instruction, and initial state, and makes the instruction the objective the agent must complete. This supports requiring an explicit correspondence from the adapter's external task construct to a canonical goal representation. The relation ID, endpoint types, and required cardinality are Moonweave inferences.
    locator: README > AppWorld Walkthrough > Primer; Task Worlds
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-010
    source: eng-bench-osworld-site
    supports: OSWorld treats task attributes such as feasibility, visual requirement, and GUI complexity separately from the desktop environment and agent input method. That separation supports an explicit task-to-goal correspondence instead of conflating the task with the runtime environment. Moonweave defines the required relation and its canonical endpoints.
    locator: Project page > Analysis > task attributes and input measurements
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-011
    source: eng-bench-swebench-repo
    supports: SWE-bench defines each evaluation around a repository issue, a base environment, a predicted patch, reproducible Docker execution, and generated evaluation results. Moonweave's five-facet mapping in the example is derived from those documented records.
    locator: README > Overview; Usage; evaluation harness output
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-012
    source: eng-bench-swebench-site
    supports: The SWE-bench official site distinguishes benchmark variants and verified evaluation results. The adapter therefore records the exact variant or revision rather than treating all SWE-bench releases as one stable schema.
    locator: SWE-bench documentation > Benchmark variants and evaluation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-013
    source: eng-bench-appworld
    supports: AppWorld documents a benchmark-specific task world, API surface, and evaluation procedure. These are the kinds of versioned benchmark semantics required for BenchmarkAdapter and absent from the LangGraph-only mapping in the boundary case.
    locator: AppWorld README > Task Worlds and Evaluating the Agent
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-014
    source: eng-bench-osworld-site
    supports: OSWorld similarly ties tasks, environment setup, trajectories, and evaluation to a named benchmark release. Moonweave infers that a framework-structure mapping lacking those facets remains outside BenchmarkAdapter.
    locator: OSWorld README > Installation, Experiments, and Evaluation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-015
    source: eng-bench-appworld
    supports: AppWorld's versioned engine, task-world records, API trajectories, and evaluation interface demonstrate why a benchmark adapter must pin its source revision and state supported mapping facets.
    locator: AppWorld README > Installation; Task Worlds; Evaluating the Agent
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-016
    source: eng-bench-osworld-site
    supports: OSWorld's release-specific environment setup and evaluation outputs provide a second benchmark family showing that version and conformance belong to the adapter contract rather than a single run.
    locator: OSWorld README > Updates, Experiments, and Evaluation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-017
    source: eng-bench-appworld
    supports: AppWorld documents one concrete benchmark family with task-world, API-execution, output, and evaluation constructs. It therefore supports retaining the former benchmark-adapter family only as external coverage represented by BenchmarkAdapter, not treating the legacy aggregate as an AppWorld construct. The frozen-v1 migration correspondence is a Moonweave compatibility decision.
    locator: README > AppWorld Walkthrough > Primer; Task Worlds; Evaluating the Agent
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-018
    source: eng-bench-osworld-site
    supports: OSWorld presents a named benchmark and verified evaluation program, not a universal benchmark-adapter type. This evidence supports using BenchmarkAdapter as Moonweave's shared mapping capability while keeping OSWorld itself as external configuration. The legacy-family migration and class placement are not assertions made by OSWorld.
    locator: Project page > OSWorld-Verified Results; Analysis; Evaluation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-019
    source: eng-bench-agencybench
    supports: AgencyBench defines scenario descriptions with queries, deliverables, rubrics, a Docker sandbox, tool/action execution, saved evaluation artifacts, and meta_eval scores. Those concrete constructs support an external mapping profile for AgencyBench across task, environment, trajectory, artifact, metric, and outcome semantics. AgencyBenchAdapter remains a deprecated Moonweave alias rather than a source-defined class.
    locator: README > Why AgencyBench?; Getting Started > Run a Scenario and Outputs; Project Structure
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-020
    source: lit-bench-agencybench
    supports: The AgencyBench paper describes long-horizon scenarios, task queries and deliverables, tool-call trajectories, user-simulator feedback, sandbox execution, and rubric-based assessment. It corroborates the semantic facets captured by the AgencyBench external profile; the adapter alias and Moonweave endpoint correspondences are design inferences.
    locator: Paper > AgencyBench; abstract and method or system-architecture sections
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-021
    source: eng-bench-appworld
    supports: AppWorld's task world binds an instruction and initial application state, exposes API actions and responses, stores logs and database-state outputs, and runs task-specific evaluation programs. These constructs support the AppWorld external mapping facets. AppWorldAdapter is retained only as a deprecated Moonweave compatibility name.
    locator: README > AppWorld Walkthrough > Primer; Task Worlds; Interactive Coding and API Calls; Evaluating the Agent
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-022
    source: lit-bench-appworld
    supports: The AppWorld paper defines an executable world of applications and APIs, autonomous-agent tasks, interaction histories, and state-based evaluation. It supports the source-side constructs represented by the AppWorld mapping profile, while the deprecated alias and Moonweave target types are ontology decisions.
    locator: Paper > AppWorld; abstract and method or system-architecture sections
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-benchmark-adapter-023
    source: eng-bench-osworld-repo
    supports: The OSWorld repository separates benchmark tasks, desktop_env, multimodal agent interfaces, run logs, and evaluation examples, and documents how run.py executes the benchmark. These source constructs support an OSWorld mapping profile for task, desktop environment, action/observation trajectory, artifacts, and evaluation outcome. The adapter alias is Moonweave compatibility metadata.
    locator: README > Updates; Installation; Running Experiments; Evaluation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
