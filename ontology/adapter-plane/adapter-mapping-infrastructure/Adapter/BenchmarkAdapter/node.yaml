      kind: positive
      labels:
        zh: 是一种人工正例
        en: Reviewed positive case for is a
        ja: の一種であるの審査済み正例
      scenario_id: null
      descriptions:
        zh: "`agencybench-v2-profile` 固定 v2 场景清单，将 description.json、Docker 沙箱、meta_eval.json 和评分量表分别纳入任务、环境、运行证据与评估映射，因此它满足基准适配器的完整能力边界。"
        en: "`agencybench-v2-profile` pins the v2 scenario inventory and maps description.json, the Docker sandbox, meta_eval.json, and rubrics separately to task, environment, run evidence, and evaluation terms, so it satisfies the complete BenchmarkAdapter capability boundary."
        ja: "`agencybench-v2-profile` は v2 scenario 一覧を固定し、description.json、Docker sandbox、meta_eval.json、rubric を task、environment、実行証拠、評価へ個別に写像するため、BenchmarkAdapter の能力境界を満たします。"
      field_values: {}
      related_node_ids:
        - BenchmarkAdapter
        - Adapter
      related_relation_ids:
        - BenchmarkAdapter-is_a-Adapter
      expected_result:
        zh: 该配置应归入 BenchmarkAdapter，并通过上位链同时成为 Adapter。
        en: The configuration is classified as BenchmarkAdapter and therefore as Adapter through the reviewed parent chain.
        ja: この設定は BenchmarkAdapter に分類され、審査済み親鎖により Adapter にも分類されます。
      why_valid_or_invalid:
        zh: 它同时具有外部版本、构造范围、转换方向、损失说明和契约测试，而非只有一个基准名称。
        en: It carries external version, construct scope, conversion direction, loss declarations, and contract tests rather than merely a benchmark name.
        ja: 外部版、構成範囲、変換方向、損失宣言、契約試験を備え、単なるベンチマーク名ではないためです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-benchmark-adapter-033
    - id: BenchmarkAdapter-is_a-Adapter-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种人工边界例
        en: Reviewed boundary case for is a
        ja: の一種であるの審査済み境界例
      scenario_id: null
      descriptions:
        zh: 一条把 `meta_eval.score` 对应到 Score 的字段规则只有源字段、目标和缩放说明；它是 MappingRule 信息，不能因来自 AgencyBench 就被分类为 BenchmarkAdapter。
        en: A field rule from `meta_eval.score` to Score has only a source field, target, and scale note. It remains MappingRule information and does not become BenchmarkAdapter merely because it came from AgencyBench.
        ja: "`meta_eval.score` を Score へ対応付ける項目規則は元項目、対象、尺度注記だけを持つ MappingRule 情報であり、AgencyBench 由来だけでは BenchmarkAdapter になりません。"
      field_values: {}
      related_node_ids:
