schema: moonweave.ai/ontology-node/v1
id: BenchmarkAdapter
kind: concept
status: accepted
labels:
  zh: 基准适配器
  en: benchmark adapter
  ja: ベンチマークアダプター
semantics:
  short_definition:
    zh: 基准适配器把一个具名基准版本的任务、环境、行为证据、度量和结果翻译到共享评估语义。
    en: A benchmark adapter translates a named benchmark version's tasks, environments, behavioral evidence, measurements, and outcomes into shared evaluation semantics.
    ja: ベンチマークアダプターは、名前付き版のタスク、環境、行動証拠、測定、結果を共有評価意味へ翻訳します。
  definition:
    zh: 基准适配器是 Adapter 的一种版本化映射能力。它声明外部基准版本，并分别说明任务、环境、动作或轨迹、度量和结果如何对应到 Moonweave 概念，同时记录不可逆损失与契约验证状态。它不代表某次评测运行，也不把基准样本或评分字段提升为新的本体类。
    en: A benchmark adapter is a versioned Adapter capability. It declares an external benchmark revision and separately maps task, environment, action or trajectory, measurement, and outcome semantics to Moonweave concepts, with explicit loss notes and conformance status. It is neither an evaluation run nor a reason to promote benchmark samples or score fields into ontology classes.
    ja: ベンチマークアダプターは版付きの Adapter 能力です。外部ベンチマーク版を宣言し、タスク、環境、動作・軌跡、測定、結果の意味を個別に Moonweave 概念へ対応付け、損失と適合検証を記録します。評価実行そのものでも、サンプルや得点項目を本体クラスにするものでもありません。
  why_needed:
    zh: 不同基准对“任务完成”“动作”“得分”和“环境”采用不同记录结构；若没有版本化适配层，跨基准比较会把不可比字段误当成同一度量。该概念把翻译责任与真实运行、框架对象和通用评估定义分开。
    en: Benchmarks encode task completion, actions, scores, and environments differently. Without a versioned adapter, cross-benchmark analysis can mistake unlike fields for the same measurement. This concept separates translation responsibility from actual runs, framework objects, and reusable evaluation definitions.
    ja: ベンチマークごとに完了、動作、得点、環境の記録形式が異なります。版付き適配層がなければ、比較不能な項目を同じ測定と誤認します。この概念は翻訳責任を実行、フレームワーク構造、汎用評価定義から分離します。
  includes:
    - zh: 纳入具有明确基准版本、五类映射范围、损失说明和可验证一致性状态的适配能力。
      en: Includes adapter capabilities with a stated benchmark revision, the five mapping facets, loss notes, and verifiable conformance status.
      ja: 明記された版、五つの写像領域、損失注記、検証可能な適合状態を持つ適配能力を含みます。
  excludes:
    - zh: 不纳入一次评测的任务、轨迹、得分或环境实例；也不纳入把框架原生 Agent、工作流和交接类型映射到本体的 FrameworkAdapter。
      en: Excludes individual evaluation tasks, trajectories, scores, and environment instances, and excludes FrameworkAdapter mappings of framework-native agents, workflows, and handoff types.
      ja: 個別評価のタスク、軌跡、得点、環境インスタンス、およびフレームワーク固有の Agent、workflow、handoff を写像する FrameworkAdapter は含みません。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: benchmark_version
      labels:
        zh: 基准版本
        en: benchmark version
        ja: ベンチマークバージョン
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定任务、环境、轨迹和评分语义所依据的基准版本。
        en: Pins the benchmark version defining task, environment, trajectory, and scoring semantics.
        ja: タスク、環境、軌跡、採点意味を定義するベンチマークバージョンを固定します。
      allowed_values: []
      pattern: null
      example_value: SWE-bench Verified@reviewed-2026-06-30
      source_claims:
        - claim-benchmark-adapter-003
        - claim-benchmark-adapter-004
    - id: conformance_status
      labels:
        zh: 一致性状态
        en: conformance status
        ja: 適合状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明任务、环境、轨迹、指标和结果映射是否通过验证。
        en: Whether task, environment, trajectory, metric, and outcome mappings passed verification.
        ja: タスク、環境、軌跡、指標、結果のマッピングが検証済みかを示します。
      allowed_values: []
      pattern: null
      example_value: verified
      source_claims:
        - claim-benchmark-adapter-005
        - claim-benchmark-adapter-006
  constraints:
    - id: benchmark-adapter-five-facets
      severity: error
      expression_language: plain
      expression: the adapter covers task, environment, trajectory or action, metric, and outcome mappings
      explanations:
        zh: 基准适配器必须覆盖任务、环境、轨迹或动作、指标和结果五类映射。
        en: The adapter covers task, environment, trajectory or action, metric, and outcome mappings.
        ja: アダプターはタスク、環境、軌跡または動作、指標、結果の五種類をマッピングします。
      source_claims:
        - claim-benchmark-adapter-007
        - claim-benchmark-adapter-008
  required_relation_constraints:
    - id: benchmark-adapter-maps-task
      direction: outgoing
      predicate: maps_task_to
      target_concept_id: Task
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 基准适配器必须把外部任务语义映射到规范 Task。
        en: A benchmark adapter maps external task semantics to canonical Task.
        ja: ベンチマークアダプターは外部タスク意味を canonical Task へマッピングします。
      source_claims:
        - claim-benchmark-adapter-009
        - claim-benchmark-adapter-010
examples:
  - id: BenchmarkAdapter-example-positive-001
    kind: positive
    labels:
      zh: 基准适配器正例
      en: Positive example of benchmark adapter
      ja: ベンチマークアダプターの正例
    scenario_id: null
    descriptions:
      zh: SWE-bench Verified 适配配置锁定数据集修订版，把 issue 与基准提交映射为 Task 和代码库环境，把 model_patch 映射为 Artifact，把 Docker 测试执行映射为轨迹，并把 FAIL_TO_PASS 与 PASS_TO_PASS 判定映射为度量和结果。配置同时记录映射损失与已验证状态。
      en: A SWE-bench Verified adapter pins a dataset revision, maps the issue and base commit to a Task and repository environment, maps model_patch to an Artifact, maps Docker test execution to a trajectory, and maps FAIL_TO_PASS and PASS_TO_PASS judgments to measurements and outcomes. It also records mapping loss and verified conformance.
      ja: SWE-bench Verified 適配設定はデータセット版を固定し、issue と基準 commit を Task と repository environment、model_patch を Artifact、Docker テスト実行を軌跡、FAIL_TO_PASS と PASS_TO_PASS 判定を測定と結果へ対応付け、損失と適合状態も記録します。
    field_values:
      adapter_id: adapter-swebench
      adapter_version: 2.0.0
      scope:
        - task
        - repository-environment
        - patch-test-trajectory
        - metric
        - outcome
      status: supported
      benchmark_version: SWE-bench Verified@reviewed-2026-06-30
      conformance_status: verified
    related_node_ids:
      - BenchmarkAdapter
      - ToolCallAttempt
    related_relation_ids:
      - BenchmarkAdapter-maps_action_to-ToolCallAttempt
    expected_result:
      zh: 验证器可从同一适配记录恢复版本、五类映射、测试判定来源和任何不可逆字段损失。
      en: Validation can recover the revision, all five mapping facets, the source of the test judgment, and any irreversible field loss from one adapter record.
      ja: 検証器は一つの適配記録から版、五つの写像、テスト判定の根拠、不可逆な項目損失を回復できます。
    why_valid_or_invalid:
      zh: 该记录满足版本锁定、任务—环境—轨迹—度量—结果五面映射和一致性验证，且没有把模型补丁或测试运行误建为适配器类型。
      en: The record pins a revision, covers task, environment, trajectory, measurement, and outcome mappings, verifies conformance, and does not misclassify a patch or test run as an adapter type.
      ja: 版を固定し、タスク・環境・軌跡・測定・結果の五面を写像して適合性を検証し、patch や test run をアダプター型と誤分類しないため有効です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-benchmark-adapter-011
      - claim-benchmark-adapter-012
  - id: BenchmarkAdapter-example-boundary-001
    kind: boundary
    labels:
      zh: 基准适配器边界例
      en: Boundary case for benchmark adapter
      ja: ベンチマークアダプターの境界例
    scenario_id: null
    descriptions:
      zh: 一条 LangGraph 映射说明 StateGraph、节点、边、持久化和中断如何对应本体，却没有具名基准版本、任务样本、评分规则或结果字段。它属于 FrameworkAdapter；即使该框架可用于跑基准，也不是 BenchmarkAdapter。
      en: A LangGraph mapping explains how StateGraph, nodes, edges, persistence, and interrupts align with the ontology but declares no benchmark revision, task sample, scoring rule, or result field. It is a FrameworkAdapter even when that framework is used to run a benchmark.
      ja: LangGraph 写像は StateGraph、node、edge、永続化、interrupt の対応を説明しますが、ベンチマーク版、タスク標本、採点規則、結果項目を宣言しません。ベンチマーク実行に使えても FrameworkAdapter であり BenchmarkAdapter ではありません。
    field_values: {}
    related_node_ids:
      - BenchmarkAdapter
      - ToolCallAttempt
      - FrameworkAdapter
    related_relation_ids:
      - BenchmarkAdapter-maps_action_to-ToolCallAttempt
    expected_result:
      zh: FrameworkAdapter 保持其原有类型，验证器不得凭关系共现把它提升为 BenchmarkAdapter。
      en: FrameworkAdapter retains its own type; validation must not promote it to BenchmarkAdapter from relation co-occurrence.
      ja: FrameworkAdapter は元の型を維持し、関係の共起だけで BenchmarkAdapter へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 BenchmarkAdapter-maps_action_to-ToolCallAttempt 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: The boundary names an actual contrast node and preserves the direction of BenchmarkAdapter-maps_action_to-ToolCallAttempt; only an explicit is_a fact or the complete differentia supports membership.
      ja: 境界例は実在する対照ノードを示し、BenchmarkAdapter-maps_action_to-ToolCallAttempt の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-benchmark-adapter-013
      - claim-benchmark-adapter-014
  - id: BenchmarkAdapter-example-instance-001
    kind: instance
    labels:
      zh: 基准适配器结构化实例
      en: Structured instance of benchmark adapter
      ja: ベンチマークアダプターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: 配置 adapter-swebench 以适配器版本 2.0.0 锁定 SWE-bench Verified 版本，声明五类映射已支持并通过验证；这些值描述适配器契约，不是一次补丁预测的结果。
      en: Configuration adapter-swebench at adapter version 2.0.0 pins a SWE-bench Verified revision and declares all five mapping facets supported and verified. These values describe the adapter contract, not the outcome of one patch prediction.
      ja: adapter-swebench 設定は適配版 2.0.0 で SWE-bench Verified 版を固定し、五つの写像が対応・検証済みと宣言します。これは個別 patch 予測の結果ではなく適配契約です。
    field_values:
      adapter_id: adapter-swebench
      adapter_version: 2.0.0
      scope:
        - task
        - repository-environment
        - patch-test-trajectory
        - metric
        - outcome
      status: supported
      benchmark_version: SWE-bench Verified@reviewed-2026-06-30
      conformance_status: verified
    related_node_ids:
      - BenchmarkAdapter
    related_relation_ids: []
    expected_result:
      zh: 字段值通过该 Concept 的结构与约束验证，且实例仅作为节点内说明信息显示。
      en: Field values satisfy the Concept structure contract, and the instance remains explanatory information on the node.
      ja: フィールド値は Concept の構造契約を満たし、インスタンスはノード内の説明情報として保持されます。
    why_valid_or_invalid:
      zh: 每个字段键与节点字段 ID 完全一致；单值直接取经审查样例，可重复字段按其基数组装为数组。
      en: Every field key exactly matches a node field ID; scalar values come from reviewed examples and repeatable fields are assembled as arrays according to cardinality.
      ja: 各フィールドキーはノードのフィールド ID と一致し、単一値はレビュー済み例から取得し、反復可能フィールドは基数に従って配列化します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-benchmark-adapter-015
      - claim-benchmark-adapter-016
external_mappings:
  - id: BenchmarkAdapter-external-family-mapping
    system: Moonweave Agent Ontology v1
    external_identifier: legacy-v1:adapter-mapping:Benchmark
    external_version: sha256:344b64a3cb2a2e14eefbfc499be6989f4944ec4d4757fc7e7738c1795bd2d91c
    canonical_target_ids:
      - EvaluationRun
      - Metric
      - Task
      - RuntimeSession
      - ToolCall
      - PolicyDecision
    mapping_kind: related
    scope:
      zh: 仅迁移冻结 v1 中“Benchmark”适配器映射记录的概念覆盖，不把该聚合记录解释为外部基准规范。
      en: Migrates only the Concept coverage of the frozen-v1 Benchmark adapter-mapping record; the aggregate record is not an external benchmark specification.
      ja: 凍結 v1 の Benchmark アダプタ写像レコードが持つ Concept 範囲だけを移行し、この集約レコードを外部ベンチマーク仕様とは解釈しません。
    direction: import-to-canonical
    loss_notes:
      zh: 族级记录不声明具体外部构造的逐字段语义；具体适配器节点的评审映射承担版本、范围与损失说明。
      en: The family-level record does not assert field-by-field semantics for concrete external constructs; reviewed concrete Adapter mappings carry version, scope, and loss details.
      ja: ファミリ単位の記録は具体的な外部構成のフィールド別意味を主張せず、版・範囲・損失は審査済み具体 Adapter 写像が担います。
    conversion_note:
      zh: 该族映射覆盖以下 canonical Concept：EvaluationRun、Metric、Task、RuntimeSession、ToolCall、PolicyDecision。具体构造仍须逐项版本审查。
      en: "This family mapping covers these canonical Concepts: EvaluationRun, Metric, Task, RuntimeSession, ToolCall, PolicyDecision. Concrete constructs still require version-specific review."
      ja: このファミリ写像は次の canonical Concept を対象とします：EvaluationRun、Metric、Task、RuntimeSession、ToolCall、PolicyDecision。具体的構成はバージョン別レビューが必要です。
    conformance:
      status: contract-tested
      test_id: BenchmarkAdapter-external-family-mapping-contract-test
      method:
        zh: 验证族级映射只有一个 Adapter 所有者，且所有 canonical 目标与来源均可解析。
        en: Validates that the family mapping has one Adapter owner and that every canonical target and source resolves.
        ja: ファミリ写像が一つの Adapter 所有者を持ち、全 canonical 対象と出典を解決できることを検証します。
    status: accepted
    source_claims:
      - claim-benchmark-adapter-017
      - claim-benchmark-adapter-018
