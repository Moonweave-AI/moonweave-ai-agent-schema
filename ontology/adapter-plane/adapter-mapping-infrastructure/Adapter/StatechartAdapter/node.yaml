schema: moonweave.ai/ontology-node/v1
id: StatechartAdapter
kind: concept
status: review
labels:
  zh: 状态图适配器
  en: statechart adapter
  ja: ステートチャートアダプター
semantics:
  short_definition:
    zh: 状态图适配器是把外部状态机语言映射到规范状态、事件、守卫、动作和结果概念的能力。
    en: A StatechartAdapter maps an external state-machine language to canonical state, event, guard, action, and outcome concepts.
    ja: StatechartAdapter は外部状態機械言語を canonical state・event・guard・action・outcome 概念へ写像する能力である。
  definition:
    zh: 状态图适配器是 Adapter 的一种，以版本化映射契约连接外部 state/statechart 构造与 Moonweave 的 StateSnapshot、TraceEvent、GateCondition、Command 和 RunOutcome。它说明层级/并行状态、事件触发、守卫、动作、终态、错误与历史语义如何对应，并显式列出目标方言无法保留的部分。该节点是可复用能力，不是状态机规范本身、运行中的 actor/处理器，也不是某一时刻的 StateSnapshot。
    en: A StatechartAdapter is an Adapter with a versioned mapping contract between external state/statechart constructs and Moonweave StateSnapshot, TraceEvent, GateCondition, Command, and RunOutcome. It states how hierarchical or parallel states, event triggers, guards, actions, final states, errors, and history correspond and lists semantics the target dialect cannot preserve. The node is a reusable capability, not the machine specification itself, a running actor or processor, or a StateSnapshot at one moment.
    ja: StatechartAdapter は Adapter の一種で、外部 state/statechart 構成と Moonweave の StateSnapshot、TraceEvent、GateCondition、Command、RunOutcome を版管理写像で結ぶ。階層・並行 state、event trigger、guard、action、final、error、history の対応と損失を規定する。再利用能力であり、machine 仕様、実行 actor/processor、個別 StateSnapshot ではない。
  why_needed:
    zh: 这一层让不同状态机实现共享运行语义，又能追踪 SCXML 和 XState 在 actor、快照、可执行内容及历史状态上的不可互换之处。
    en: This layer gives different state-machine systems shared runtime semantics while tracking where SCXML and XState diverge on actors, snapshots, executable content, and history.
    ja: 異なる状態機械実装に共有 runtime 意味を与えつつ、SCXML と XState の actor、snapshot、実行内容、history の非互換を追跡する。
  includes:
    - zh: 纳入方言版本、状态/转移/事件/守卫/动作映射、层级与并行策略、终态/错误/历史处理和往返损失声明。
      en: Includes dialect version, state/transition/event/guard/action mappings, hierarchy and parallelism policy, final/error/history handling, and round-trip loss declarations.
      ja: 方言版、state/transition/event/guard/action 写像、階層・並行方針、final/error/history 処理、往復損失宣言を含む。
  excludes:
    - zh: 不纳入机器定义、正在运行的处理器或 actor、事件队列、单个状态快照、图路径测试结果或某次工作流执行。
      en: Excludes a machine definition, a running processor or actor, an event queue, an individual state snapshot, a graph-path test result, and a workflow execution.
      ja: machine 定義、実行中 processor/actor、event queue、個別 state snapshot、graph path test 結果、workflow 実行は含まない。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: dialect_version
      labels:
        zh: 方言版本
        en: dialect version
        ja: 方言バージョン
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定状态、转移、事件、守卫和动作映射所依据的方言版本。
        en: Pins the dialect version defining state, transition, event, guard, and action mappings.
        ja: 状態、遷移、イベント、ガード、動作のマッピングを定義する方言バージョンを固定します。
      allowed_values: []
      pattern: null
      example_value: statechart-contract@2
      source_claims:
        - claim-statechart-adapter-003
        - claim-statechart-adapter-004
    - id: round_trip_loss
      labels:
        zh: 往返损失
        en: round-trip loss
        ja: ラウンドトリップ損失
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 明确规范图谱与状态图往返转换无法保留的语义。
        en: Explicit semantics not preserved by canonical-to-statechart round trips.
        ja: canonical graph とステートチャートの往復変換で保持できない意味を明示します。
      allowed_values: []
      pattern: null
      example_value: dialect-specific actor, executable-content, and history semantics require child-profile loss entries
      source_claims:
        - claim-statechart-adapter-005
        - claim-statechart-adapter-006
  constraints:
    - id: statechart-adapter-core-mappings
      severity: error
      expression_language: plain
      expression: state, transition, event, guard, action, history, final, and error constructs are mapped or explicitly unsupported
      explanations:
        zh: 状态、转移、事件、守卫、动作、历史、终态和错误构造必须映射或显式标为不支持。
        en: State, transition, event, guard, action, history, final, and error constructs are mapped or explicitly unsupported.
        ja: 状態、遷移、イベント、ガード、動作、履歴、終端、エラー構成要素はマッピング済みまたは明示的に未対応です。
      source_claims:
        - claim-statechart-adapter-007
        - claim-statechart-adapter-008
  required_relation_constraints:
    - id: statechart-adapter-maps-state
      direction: outgoing
      predicate: maps_state_to
      target_concept_id: StateSnapshot
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 状态图适配器必须说明外部状态如何映射到规范状态快照。
        en: A statechart adapter states how an external state maps to canonical StateSnapshot.
        ja: ステートチャートアダプターは外部状態から canonical StateSnapshot へのマッピングを示します。
      source_claims:
        - claim-statechart-adapter-009
        - claim-statechart-adapter-010
examples:
  - id: StatechartAdapter-example-positive-001
    kind: positive
    labels:
      zh: 状态图适配器正例
      en: Positive example of statechart adapter
      ja: ステートチャートアダプターの正例
    scenario_id: null
    descriptions:
      zh: 中立状态图契约定义复合状态 ready，其子状态 idle 在 START 事件且 canStart 守卫为真时进入 running，并执行 begin 动作；STOP 进入 final 状态 done。StatechartAdapter 把 state、event、guard、action、final 与 history 分开映射，其中 begin 动作对应规范 Command。
      en: A neutral statechart contract defines compound state ready whose idle child enters running on START when guard canStart is true and executes action begin; STOP reaches final state done. StatechartAdapter maps state, event, guard, action, final, and history separately, with begin corresponding to a canonical Command.
      ja: 中立 statechart 契約は複合 state ready を定義し、子 state idle は guard canStart が真の START で running へ入り action begin を実行し、STOP で final state done へ達する。StatechartAdapter は state、event、guard、action、final、history を分けて写像し、begin は canonical Command に対応する。
    field_values:
      adapter_id: adapter-statechart-core
      adapter_version: 2.0.0
      scope:
        - states
        - transitions
        - events
        - guards
        - actions
        - history
      status: supported
      dialect_version: statechart-contract@2
      round_trip_loss: dialect-specific actor, executable-content, and history semantics require child-profile loss entries
    related_node_ids:
      - StatechartAdapter
      - Command
    related_relation_ids:
      - StatechartAdapter-maps_action_to-Command
    expected_result:
      zh: 中立契约保留层级状态、事件触发、守卫、动作与终态，具体 SCXML/XState 子适配器分别选择语法并报告不可移植语义。
      en: The neutral contract retains hierarchical states, event triggers, guard, action, and final state, while concrete SCXML and XState child adapters select syntax and report non-portable semantics.
      ja: 中立契約は階層 state、event trigger、guard、action、final state を保持し、具体 SCXML／XState 子アダプターが構文を選び非可搬意味を報告する。
    why_valid_or_invalid:
      zh: 案例逐项区分状态图构造，并通过明确关系把动作语义连接到 Command，而没有把某次执行快照当作适配器。
      en: The case distinguishes each statechart construct and connects action semantics to Command through an explicit relation without treating one execution snapshot as the adapter.
      ja: statechart 構成を項目別に区別し、明示関係で action 意味を Command へ結び、一回の execution snapshot を adapter としない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-statechart-adapter-011
      - claim-statechart-adapter-012
  - id: StatechartAdapter-example-boundary-001
    kind: boundary
    labels:
      zh: 状态图适配器边界例
      en: Boundary case for statechart adapter
      ja: ステートチャートアダプターの境界例
    scenario_id: null
    descriptions:
      zh: 一次机器执行在收到 START 后产生 StateSnapshot：value="running"、context.retries=1。该对象是某一时刻的运行观测，可作为 state 映射目标，但它不是 StatechartAdapter；后续 STOP 事件会改变快照而不会改变适配器版本或映射规则。
      en: One machine execution produces StateSnapshot value="running" with context.retries=1 after START. That object is a runtime observation and may be the target of a state mapping, but it is not StatechartAdapter; a later STOP changes the snapshot without changing adapter version or mapping rules.
      ja: 一回の machine 実行が START 後に StateSnapshot value="running"、context.retries=1 を生成する。これは実行時観測で state 写像の対象にはなれるが StatechartAdapter ではなく、後続 STOP は snapshot を変えても adapter 版や写像規則を変えない。
    field_values: {}
    related_node_ids:
      - StatechartAdapter
      - StateSnapshot
    related_relation_ids:
      - StatechartAdapter-maps_state_to-StateSnapshot
    expected_result:
      zh: 快照保留运行值和时间身份，适配器仅保留如何解释外部状态的版本化规则，两者通过 maps_state_to 关联但不合并。
      en: The snapshot retains runtime value and temporal identity, while the adapter retains only versioned rules for interpreting external states; maps_state_to relates but does not merge them.
      ja: snapshot は実行値と時間同一性を保持し、adapter は外部 state 解釈の版付き規則だけを保持する。maps_state_to は両者を関連付けるが統合しない。
    why_valid_or_invalid:
      zh: 能力配置与瞬时状态拥有不同身份和变化频率；关系映射不能把目标快照提升为适配器。
      en: A capability configuration and transient state have different identities and change rates; a mapping relation cannot promote its snapshot target into an adapter.
      ja: 能力設定と瞬時 state は同一性と変化頻度が異なり、mapping relation は対象 snapshot を adapter へ昇格させない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-statechart-adapter-013
      - claim-statechart-adapter-014
  - id: StatechartAdapter-example-instance-001
    kind: instance
    labels:
      zh: 状态图适配器结构化实例
      en: Structured instance of statechart adapter
      ja: ステートチャートアダプターの構造化インスタンス
    scenario_id: null
    descriptions:
      zh: adapter-statechart-core 版本 2.0.0 固定 statechart-contract@2，范围为 states、transitions、events、guards、actions 与 history。round_trip_loss 声明 actor、可执行内容和历史语义必须由具体方言子适配器逐项处理。
      en: adapter-statechart-core version 2.0.0 pins statechart-contract@2 for states, transitions, events, guards, actions, and history. round_trip_loss states that actor, executable-content, and history semantics require itemized handling by a concrete dialect child adapter.
      ja: adapter-statechart-core 2.0.0 は states、transitions、events、guards、actions、history 用に statechart-contract@2 を固定する。round_trip_loss は actor、executable content、history 意味を具体 dialect 子アダプターが項目別処理することを示す。
    field_values:
      adapter_id: adapter-statechart-core
      adapter_version: 2.0.0
      scope:
        - states
        - transitions
        - events
        - guards
        - actions
        - history
      status: supported
      dialect_version: statechart-contract@2
      round_trip_loss: dialect-specific actor, executable-content, and history semantics require child-profile loss entries
    related_node_ids:
      - StatechartAdapter
    related_relation_ids: []
    expected_result:
      zh: 配置为 SCXMLAdapter 与 XStateAdapter 提供同一中立输入边界，并要求两者分别声明方言专属映射与损失。
      en: The configuration gives SCXMLAdapter and XStateAdapter the same neutral input boundary and requires each to declare dialect-specific mappings and loss.
      ja: 設定は SCXMLAdapter と XStateAdapter に同じ中立入力境界を与え、各々に dialect 固有写像と損失の宣言を要求する。
    why_valid_or_invalid:
      zh: 身份、版本、范围和损失边界一致，且记录不包含机器配置、运行 actor、事件队列或单个 StateSnapshot。
      en: Identity, version, scope, and loss boundary agree, and the record contains no machine configuration, running actor, event queue, or individual StateSnapshot.
      ja: 識別、版、範囲、損失境界が整合し、machine config、実行 actor、event queue、個別 StateSnapshot を含まない。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-statechart-adapter-015
      - claim-statechart-adapter-016
external_mappings:
  - id: StatechartAdapter-external-family-mapping
    system: Moonweave Agent Ontology v1
    external_identifier: legacy-v1:adapter-mapping:Statechart
    external_version: sha256:344b64a3cb2a2e14eefbfc499be6989f4944ec4d4757fc7e7738c1795bd2d91c
    canonical_target_ids:
      - StateSnapshot
      - Checkpoint
      - TraceEvent
      - Route
      - Gate
    mapping_kind: related
    scope:
      zh: 仅迁移冻结 v1 中“Statechart”聚合记录的概念覆盖；SCXML 与 XState 的真实格式语义由各自下位映射承担。
      en: Migrates only the Concept coverage of the frozen-v1 Statechart aggregate; the child SCXML and XState mappings carry actual format semantics.
      ja: 凍結 v1 の Statechart 集約が持つ Concept 範囲だけを移行し、実際の形式意味は SCXML と XState の下位写像が担います。
    direction: import-to-canonical
    loss_notes:
      zh: 族级记录不声明具体外部构造的逐字段语义；具体适配器节点的评审映射承担版本、范围与损失说明。
      en: The family-level record does not assert field-by-field semantics for concrete external constructs; reviewed concrete Adapter mappings carry version, scope, and loss details.
      ja: ファミリ単位の記録は具体的な外部構成のフィールド別意味を主張せず、版・範囲・損失は審査済み具体 Adapter 写像が担います。
    conversion_note:
      zh: 该族映射覆盖以下 canonical Concept：StateSnapshot、Checkpoint、TraceEvent、Route、Gate。具体构造仍须逐项版本审查。
      en: "This family mapping covers these canonical Concepts: StateSnapshot, Checkpoint, TraceEvent, Route, Gate. Concrete constructs still require version-specific review."
      ja: このファミリ写像は次の canonical Concept を対象とします：StateSnapshot、Checkpoint、TraceEvent、Route、Gate。具体的構成はバージョン別レビューが必要です。
    conformance:
      status: contract-tested
      test_id: StatechartAdapter-external-family-mapping-contract-test
      method:
        zh: 验证族级映射只有一个 Adapter 所有者，且所有 canonical 目标与来源均可解析。
        en: Validates that the family mapping has one Adapter owner and that every canonical target and source resolves.
        ja: ファミリ写像が一つの Adapter 所有者を持ち、全 canonical 対象と出典を解決できることを検証します。
    status: accepted
    source_claims:
      - claim-statechart-adapter-017
      - claim-statechart-adapter-018
  - id: SCXMLAdapter-external-mapping
    system: SCXML
    external_identifier: SCXML
    external_version: SCXML-1.0
    canonical_target_ids:
      - StateSnapshot
      - GateCondition
      - DownstreamOperation
    mapping_kind: related
    scope:
      zh: 映射 SCXML 1.0 namespace/version、state/parallel/final/history、initial、transition、event descriptor、cond、onentry/onexit、datamodel、invoke 与可移植 executable content。
      en: Maps the SCXML 1.0 namespace/version, state/parallel/final/history, initial, transition, event descriptors, cond, onentry/onexit, datamodel, invoke, and portable executable content.
      ja: SCXML 1.0 namespace/version、state/parallel/final/history、initial、transition、event descriptor、cond、onentry/onexit、datamodel、invoke、可搬 executable content を写像する。
    direction: bidirectional
    loss_notes:
      zh: 宿主语言脚本、自定义 datamodel 表达式、实现专属 invoke 内容和非标准 annotation 可能无法往返；处理器的当前配置、事件队列与运行值从不作为文档映射。
      en: Host-language scripts, custom datamodel expressions, implementation-specific invoke content, and non-standard annotations may not round-trip; a processor's current configuration, event queues, and runtime values are never document mappings.
      ja: host 言語 script、custom datamodel 式、実装固有 invoke 内容、非標準 annotation は往復できない場合があり、processor の現在 configuration、event queue、runtime 値を文書写像にしない。
    conversion_note:
      zh: 双向只适用于声明的 SCXML-1.0（SCXML 1.0）可移植子集：导入形成规范状态图候选并保留 element/attribute 来源，导出固定 namespace/version；所有宿主实现语义生成逐项损失，不承诺任意处理器会话往返。
      en: "Bidirectionality is limited to the declared portable SCXML-1.0 (SCXML 1.0) subset: import creates canonical-statechart candidates with element/attribute provenance, export pins namespace/version, and all host-implementation semantics produce itemized loss rather than a promise to round-trip an arbitrary processor session."
      ja: 双方向は宣言済み可搬 SCXML-1.0（SCXML 1.0）サブセットに限定する。import は element／attribute 来歴付き canonical statechart 候補を作り、export は namespace/version を固定し、host 実装意味は任意 processor session の往復を約束せず項目別損失にする。
    conformance:
      status: contract-tested
      test_id: SCXMLAdapter-mapping-contract-test
      method:
        zh: 验证外部版本、映射范围、方向、已知损失、唯一所有者、来源登记以及所有 canonical 目标 ID 的可解析性。
        en: Validates the external version, scope, direction, known loss, unique owner, registered source, and resolvability of every canonical target ID.
        ja: 外部版、範囲、方向、既知の損失、一意な所有者、登録出典、および全 canonical 対象 ID の解決可能性を検証します。
    status: accepted
    source_claims:
      - claim-statechart-adapter-019
      - claim-statechart-adapter-020
  - id: XStateAdapter-external-mapping
    system: XState
    external_identifier: XState
    external_version: XState-5
    canonical_target_ids:
      - StateSnapshot
      - GateCondition
      - DownstreamOperation
    mapping_kind: related
    scope:
      zh: 映射 XState v5 machine config、state nodes、transitions、events、命名 guards/actions、actor logic、createActor/invoke/spawn 生命周期，以及 snapshot 的 status/value/context/output。
      en: Maps XState v5 machine configuration, state nodes, transitions, events, named guards/actions, actor logic, createActor/invoke/spawn lifecycle, and snapshot status/value/context/output.
      ja: XState v5 machine config、state node、transition、event、名前付き guard/action、actor logic、createActor/invoke/spawn lifecycle、snapshot status/value/context/output を写像する。
    direction: bidirectional
    loss_notes:
      zh: JavaScript guard/action 实现体、宿主对象引用、live actor 身份、mailbox、subscription 和时间相关 snapshot 值不能作为可移植状态图定义；跨方言转换必须逐项报告。
      en: JavaScript guard/action implementations, host-object references, live actor identity, mailboxes, subscriptions, and time-specific snapshot values are not portable statechart definitions and require itemized cross-dialect loss.
      ja: JavaScript guard/action 実装、host object 参照、生 actor 同一性、mailbox、subscription、時点依存 snapshot 値は可搬 statechart 定義でなく、dialect 間変換で項目別損失にする。
    conversion_note:
      zh: XState-5 双向只适用于声明的配置子集：导入提取 machine/actor-logic 候选与 snapshot 字段映射，导出生成带命名实现插槽的 XState v5 配置；函数体和 live actor 状态只保留外部引用与损失，不承诺运行等价。
      en: "XState-5 bidirectionality is limited to the declared configuration subset: import extracts machine/actor-logic candidates and snapshot-field mappings, export creates XState v5 configuration with named implementation slots, and function bodies or live actor state retain only external references and loss rather than a runtime-equivalence promise."
      ja: XState-5 の双方向は宣言済み設定サブセットに限定する。import は machine／actor-logic 候補と snapshot 項目写像を抽出し、export は名前付き実装 slot の XState v5 設定を作る。関数本体と live actor state は外部参照と損失だけを保持し実行等価を約束しない。
    conformance:
      status: contract-tested
      test_id: XStateAdapter-mapping-contract-test
      method:
        zh: 验证外部版本、映射范围、方向、已知损失、唯一所有者、来源登记以及所有 canonical 目标 ID 的可解析性。
        en: Validates the external version, scope, direction, known loss, unique owner, registered source, and resolvability of every canonical target ID.
        ja: 外部版、範囲、方向、既知の損失、一意な所有者、登録出典、および全 canonical 対象 ID の解決可能性を検証します。
    status: accepted
    source_claims:
      - claim-statechart-adapter-021
      - claim-statechart-adapter-022
applicability:
  - adapter
sibling_differentiation:
  - sibling_concept_id: BenchmarkAdapter
    shared_parent_concept_id: Adapter
    differentia:
      zh: 共享父节点对照：父节点 Adapter：StatechartAdapter（semantic kind=capability，骨架 StatechartAdapter-is_a-Adapter）；BenchmarkAdapter（semantic kind=capability，骨架 BenchmarkAdapter-is_a-Adapter）。双端条件：StatechartAdapter 条件：“状态图适配器是一种适配器；其区分条件是：它把状态机和状态图构造映射到运行生命周期剖面，同时保持 XState、SCXML 和形式化状态图字段在核心之外”；BenchmarkAdapter 条件：“基准适配器是一种适配器；其区分条件是：它把基准任务、场景、环境、评分规则、指标、观察、用户模拟、产物和压力轴映射到评估剖面，同时不改变核心本体”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent Adapter: StatechartAdapter (semantic kind=capability, backbone StatechartAdapter-is_a-Adapter); BenchmarkAdapter (semantic kind=capability, backbone BenchmarkAdapter-is_a-Adapter). Endpoint conditions: StatechartAdapter condition: “As an adapter, Statechart adapter is distinguished by the fact that it is an adapter family that maps state-machine and statechart constructs to runtime lifecycle profiles while keeping XState, SCXML, and formal statechart fields outside ontology core”; BenchmarkAdapter condition: “As an adapter, Benchmark adapter is distinguished by the fact that it is an adapter family that maps benchmark tasks, scenarios, environments, scoring rubrics, metrics, observations, user simulations, artifacts, and pressure axes into evaluation profiles without changing ontology core”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 Adapter：StatechartAdapter（semantic kind=capability、バックボーン StatechartAdapter-is_a-Adapter）；BenchmarkAdapter（semantic kind=capability、バックボーン BenchmarkAdapter-is_a-Adapter）。両端条件：StatechartAdapter の条件：「アダプターに属するステートチャートアダプターは、次の事実を種差とします：状態図アダプタ族は、状態機械と状態図の構成を実行ライフサイクルプロファイルへ写像し、XState、SCXML、形式的状態図のフィールドをコア外に保ちます」；BenchmarkAdapter の条件：「アダプターに属するベンチマークアダプターは、次の事実を種差とします：ベンチマークアダプタ族は、ベンチマークのタスク、シナリオ、環境、採点規則、指標、観測、ユーザーシミュレーション、成果物、負荷軸を評価プロファイルへ写像し、コアオントロジーを変更しません」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-statechart-adapter-023
      - claim-statechart-adapter-024
