            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 领域审校要求分别列出并行活动配置、浅历史、深历史和默认回退。
              en: Domain review requires separate reporting of parallel active configuration, shallow history, deep history, and default fallback.
              ja: ドメイン審査は parallel active configuration・shallow history・deep history・default fallback を別々に報告します。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 本体审校只比较能力覆盖，不把 history 状态建成 Checkpoint 子类。
              en: Ontology review compares capability coverage only and does not make history state a Checkpoint subclass.
              ja: 本体審査は capability coverage のみ比較し、history state を Checkpoint subclass にしません。
    - id: adapter-mapping-infrastructure-cq-statechart-event-instance-separation-v3
      semantic_key: adapter-mapping-infrastructure.statechart-event-instance-separation
      primary_owner_module_id: adapter-mapping-infrastructure
      related_module_ids:
        - runtime-observability
      questions:
        zh: 状态图中的事件类型与运行时实际发生的事件实例是否保持清晰区分？
        en: Are statechart event types kept distinct from event instances that actually occur at runtime?
        ja: 状態図のイベント型と実行時に実際に発生したイベントインスタンスは明確に区別されていますか。
      query: Inspect mappings from statechart Event declarations and runtime TraceEvent values, including instantiation or reference relations.
      expected_assertion: A declaration maps to event semantics, an occurrence remains a runtime event, and no cross-kind is_a edge conflates them.
      evidence_binding:
        applicability: boundary-comparison-only
        owner_concept_ids:
          - StatechartAdapter
        related_concept_ids:
          - TraceEvent
          - TraceRecord
        relation_ids: []
        not_applicable_reason:
          zh: event type 或 descriptor 是方言声明，实际收到的 event object 才是运行时发生；声明对应保存在 StatechartAdapter.external_mappings，发生事实由 runtime-observability 拥有。两者之间当前没有已接受的跨模块实例化关系。
          en: An event type or descriptor is a dialect declaration, while a received event object is a runtime occurrence. The declaration correspondence lives in StatechartAdapter.external_mappings and runtime-observability owns occurrence facts. No accepted cross-module instantiation relation currently connects them.
          ja: event type／descriptor は dialect 宣言で、受信 event object が runtime occurrence です。宣言対応は StatechartAdapter.external_mappings にあり、occurrence fact は runtime-observability が所有します。両者を結ぶ承認済み cross-module instantiation 関係はありません。
      positive_example_ids:
