              zh: 领域审校要求样本 ID、步骤序号、原始输出位置与评测结果四项同时可追溯。
              en: Domain review requires simultaneous traceability of sample ID, step order, original output location, and evaluation result.
              ja: ドメイン審査は sample ID・step order・original output location・evaluation result の同時追跡を要求します。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
