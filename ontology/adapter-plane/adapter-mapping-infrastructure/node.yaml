    - id: adapter-mapping-infrastructure-cq-benchmark-score-interpretation-v3
      semantic_key: adapter-mapping-infrastructure.benchmark-score-interpretation
      primary_owner_module_id: adapter-mapping-infrastructure
      related_module_ids:
        - feedback-metrics-evaluation
      questions:
        zh: 一个基准得分应解释为哪项 Metric 的哪次 Measurement，量纲和方向是否兼容？
        en: As which Metric and Measurement should a benchmark score be interpreted, and are its scale and direction compatible?
        ja: ベンチマーク得点はどの Metric のどの Measurement として解釈され、尺度と方向は互換ですか。
      query: Map the benchmark score field to a Metric definition, then compare unit, range, aggregation, and better-direction constraints.
      expected_assertion: A compatible mapping identifies one metric and measurement semantics; incompatible scale or direction produces an explicit conversion warning.
      evidence_binding:
        applicability: boundary-comparison-only
        owner_concept_ids:
          - BenchmarkAdapter
        related_concept_ids:
          - Metric
          - Measurement
          - Score
        relation_ids: []
        not_applicable_reason:
          zh: 外部 score 字段的名称、范围、聚合与方向由具体 benchmark 版本定义，并记录于 BenchmarkAdapter.external_mappings；canonical 图不把 BenchmarkAdapter 与 Metric、Measurement 或 Score 直接相连。
          en: External score-field names, ranges, aggregation, and direction are defined by a concrete benchmark version and recorded in BenchmarkAdapter.external_mappings; the canonical graph does not directly connect BenchmarkAdapter to Metric, Measurement, or Score.
          ja: 外部 score field の名称・範囲・aggregation・direction は具体 benchmark version が定義し BenchmarkAdapter.external_mappings に記録します。canonical graph は BenchmarkAdapter を Metric・Measurement・Score に直接接続しません。
      positive_example_ids:
        - adapter-mapping-infrastructure-cq-benchmark-score-interpretation-v3-example-positive
      counterexample_ids:
        - adapter-mapping-infrastructure-cq-benchmark-score-interpretation-v3-example-counter
      source_claims:
        - claim-adapter-mapping-infrastructure-011
        - claim-adapter-mapping-infrastructure-012
