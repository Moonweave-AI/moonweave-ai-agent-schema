        en: A generic mapping rule is identifiable without any one framework; framework mappings select and constrain such rules for framework-specific constructs. This record is limited to FrameworkAdapter, FrameworkMapping; their canonical owner is Framework mappings (adapter-frameworks), so adapter-mapping-infrastructure references these concepts here.
        ja: 共通写像規則の同一性は特定フレームワークに依存せず、フレームワーク写像は固有構造を説明するために規則を選択して制約します。 この記録は FrameworkAdapter、FrameworkMapping だけを対象とし、canonical owner はフレームワーク写像（adapter-frameworks）です。したがって adapter-mapping-infrastructure はここでこれらを参照します。
