schema: moonweave.ai/ontology-node/v1
id: adapter-mapping-infrastructure
kind: module
status: review
labels:
  zh: 映射基础与模型适配
  en: Mapping foundations and model adapters
  ja: 写像基盤とモデル適配
semantics:
  short_definition:
    zh: 映射基础与模型适配提供所有适配范围共同使用的 Adapter、MappingRule 和验证证据，并承载不属于通信协议、开发框架或输出表示的外部模型适配，例如基准任务模型与状态图模型。它区分可执行适配能力、规定对应条件的规则和证明覆盖/损失的产物，不把外部产品、样本或文档建成业务节点。
    en: Mapping foundations and model adapters provides the shared Adapter, MappingRule, and validation-evidence semantics used by every adapter scope, and owns external-model adapters that are neither communication protocols, development frameworks, nor output representations, such as benchmark-task and statechart models. It distinguishes executable adapter capability, rules governing correspondence, and artifacts evidencing coverage or loss without turning external products, samples, or documents into business nodes.
    ja: 写像基盤とモデル適配は、すべての適配範囲が共有する Adapter、MappingRule、検証証拠の意味を提供し、通信プロトコル、開発フレームワーク、出力表現のいずれにも属さない外部モデル適配、たとえばベンチマーク課題モデルや状態図モデルを所有します。実行可能な適配能力、対応条件を規定する規則、網羅率・損失を証明する成果物を区別し、外部製品、標本、文書を業務ノードにしません。
  definition:
    zh: 映射基础与模型适配提供所有适配范围共同使用的 Adapter、MappingRule 和验证证据，并承载不属于通信协议、开发框架或输出表示的外部模型适配，例如基准任务模型与状态图模型。它区分可执行适配能力、规定对应条件的规则和证明覆盖/损失的产物，不把外部产品、样本或文档建成业务节点。
    en: Mapping foundations and model adapters provides the shared Adapter, MappingRule, and validation-evidence semantics used by every adapter scope, and owns external-model adapters that are neither communication protocols, development frameworks, nor output representations, such as benchmark-task and statechart models. It distinguishes executable adapter capability, rules governing correspondence, and artifacts evidencing coverage or loss without turning external products, samples, or documents into business nodes.
    ja: 写像基盤とモデル適配は、すべての適配範囲が共有する Adapter、MappingRule、検証証拠の意味を提供し、通信プロトコル、開発フレームワーク、出力表現のいずれにも属さない外部モデル適配、たとえばベンチマーク課題モデルや状態図モデルを所有します。実行可能な適配能力、対応条件を規定する規則、網羅率・損失を証明する成果物を区別し、外部製品、標本、文書を業務ノードにしません。
  why_needed:
    zh: 让每项转换都能从所用适配能力追踪到具体规则、适用条件、测试证据、覆盖范围和语义损失。
    en: Make every conversion traceable from the adapter capability through its rules and applicability conditions to test evidence, coverage, and semantic loss.
    ja: 各変換について、使用した適配能力から具体的規則、適用条件、試験証拠、網羅範囲、意味損失まで追跡できるようにします。
  includes:
    - zh: Adapter 上位能力、可复用 MappingRule、规则适用条件，以及规则与适配能力之间的治理关系。
      en: The Adapter supertype, reusable MappingRules, rule applicability conditions, and governance relationships between rules and adapter capabilities.
      ja: Adapter 上位能力、再利用可能な MappingRule、規則の適用条件、規則と適配能力の統制関係を含みます。
    - zh: 映射测试与执行证据、覆盖报告、未映射项、规则级测试结果和有损转换告警。
      en: Mapping test and execution evidence, coverage reports, unmapped items, rule-level test results, and lossy-conversion warnings.
      ja: 写像試験・実行証拠、網羅報告、未写像項目、規則単位の試験結果、有損変換警告を含みます。
    - zh: BenchmarkAdapter 对版本化基准任务、环境、轨迹、度量和结果的对应，以及 StatechartAdapter 对状态、事件、守卫、动作、终态与历史语义的对应。
      en: BenchmarkAdapter correspondences for versioned benchmark tasks, environments, trajectories, measurements, and outcomes, and StatechartAdapter correspondences for states, events, guards, actions, final states, and history semantics.
      ja: BenchmarkAdapter による版管理された課題、環境、軌跡、測定、結果の対応と、StatechartAdapter による状態、イベント、ガード、アクション、終状態、履歴意味の対応を含みます。
  excludes:
    - zh: 依赖某个通信协议、开发框架或目标表示语言才能识别的映射，分别归协议映射、框架映射或表示投影；通用基础不重复拥有。
      en: Mappings identifiable only by a communication protocol, development framework, or target representation language belong respectively to protocol mappings, framework mappings, or representation projections; the shared foundation does not duplicate them.
      ja: 通信プロトコル、開発フレームワーク、対象表現言語に依存して識別される写像は、それぞれプロトコル写像、フレームワーク写像、表現投影に属し、共通基盤は重複所有しません。
    - zh: 基准产品名、状态图方言、样本、机器定义和字段只作为适配器的版本化信息、证据或案例，不复制成外部产品类树。
      en: Benchmark product names, statechart dialects, samples, machine definitions, and fields remain versioned adapter information, evidence, or examples rather than a copied external-product taxonomy.
      ja: ベンチマーク製品名、状態図方言、標本、機械定義、項目は版管理された適配情報・証拠・例であり、外部製品分類木を複製しません。
    - zh: 一次投影产生的文件属于表示投影产物；核心任务、度量、轨迹与运行状态仍归各业务域，均不是 MappingRule 的下位类型。
      en: Files produced by a projection belong to representation-projection artifacts; core tasks, measurements, traces, and runtime states remain in their business domains, and none are subclasses of MappingRule.
      ja: 投影で生成されたファイルは表現投影成果物に属し、中核の課題、測定、軌跡、実行状態は各業務領域に残り、いずれも MappingRule の下位型ではありません。
  semantic_kind: null
  aliases: []
purpose:
  zh: 为所有适配范围提供共同映射语义，并为基准和状态图等外部模型保留可验证、可解释的对应。
  en: Provide common mapping semantics for every adapter scope and preserve verifiable, explainable correspondences for external models such as benchmarks and statecharts.
  ja: すべての適配範囲に共通写像意味を提供し、ベンチマークや状態図など外部モデルの検証可能で説明可能な対応を保持します。
structure: null
examples:
  - id: adapter-mapping-infrastructure-cq-rule-applicability-v3-example-positive
    kind: positive
    labels:
      zh: CrewAI role 映射规则精确适用（正例）
      en: Exact applicability of a CrewAI role mapping — accepted case
      ja: CrewAI role 写像規則の正確な適用（正例）
    scenario_id: null
    descriptions:
      zh: 请求固定 CrewAI docs-reviewed-2026-06-30、源字段 Agent.role、目标 ActorRoleBinding；规则 fw-crewai-role-06 的源模式、目标模式、profile 和闭合版本区间四项全部命中。
      en: The request pins CrewAI docs-reviewed-2026-06-30, source field Agent.role, and target ActorRoleBinding; rule fw-crewai-role-06 matches source pattern, target pattern, profile, and closed version interval.
      ja: request は CrewAI docs-reviewed-2026-06-30、source field Agent.role、target ActorRoleBinding を固定し、rule fw-crewai-role-06 は source pattern・target pattern・profile・閉 version interval の四項すべてに一致します。
    field_values:
      rule_id: fw-crewai-role-06
      status: accepted
      source_system: CrewAI
      source_version: docs-reviewed-2026-06-30
      source_pattern: Agent.role
      target_profile: moonweave-v3
      target_pattern: ActorRoleBinding
      version_interval:
        - docs-reviewed-2026-06-30
        - docs-reviewed-2026-06-30
      matched_dimensions: 4
    related_node_ids:
      - MappingRule
      - MappingArtifact
      - FrameworkMapping
      - FrameworkAdapter
    related_relation_ids:
      - FrameworkMapping-is_a-MappingRule
      - FrameworkMapping-applies_to_adapter-FrameworkAdapter
    expected_result:
      zh: 只返回 fw-crewai-role-06；4/4 适用条件成立。
      en: Return only fw-crewai-role-06; all 4 of 4 applicability conditions hold.
      ja: fw-crewai-role-06 だけを返し、4/4 の適用条件が成立します。
    why_valid_or_invalid:
      zh: FrameworkMapping 是 MappingRule 且明确作用于 FrameworkAdapter；字段和版本也逐项吻合。
      en: FrameworkMapping is a MappingRule explicitly applied to FrameworkAdapter, and field and version constraints match individually.
      ja: FrameworkMapping は FrameworkAdapter に適用される MappingRule で、field と version constraint も個別一致します。
    synthetic: true
    verified_version: CrewAI docs reviewed 2026-06-30
    source_claims:
      - claim-adapter-mapping-infrastructure-003
      - claim-adapter-mapping-infrastructure-004
  - id: adapter-mapping-infrastructure-cq-rule-applicability-v3-example-counter
    kind: counterexample
    labels:
      zh: 目标与版本均不匹配的候选规则（反例）
      en: Candidate rule with target and version mismatch — rejected case
      ja: target と version が不一致の候補 rule（反例）
    scenario_id: null
    descriptions:
      zh: 候选 fw-langgraph-node-05 处理 LangGraph Node→CompositionPart，版本只覆盖 docs-reviewed-2026-05-01，却被用于 CrewAI Agent.role→ActorRoleBinding 请求。
      en: Candidate fw-langgraph-node-05 handles LangGraph Node→CompositionPart and covers only docs-reviewed-2026-05-01, yet is returned for a CrewAI Agent.role→ActorRoleBinding request.
      ja: 候補 fw-langgraph-node-05 は LangGraph Node→CompositionPart と docs-reviewed-2026-05-01 だけを対象とするのに、CrewAI Agent.role→ActorRoleBinding request に返されます。
    field_values:
      candidate_rule_id: fw-langgraph-node-05
      requested_source: CrewAI.Agent.role
      candidate_source: LangGraph.Node
      requested_target: ActorRoleBinding
      candidate_target: CompositionPart
      requested_version: docs-reviewed-2026-06-30
      candidate_max_version: docs-reviewed-2026-05-01
      matched_dimensions: 0
    related_node_ids:
      - MappingRule
      - FrameworkMapping
      - FrameworkAdapter
    related_relation_ids:
      - FrameworkMapping-is_a-MappingRule
      - FrameworkMapping-applies_to_adapter-FrameworkAdapter
    expected_result:
      zh: 拒绝候选：源、目标、系统和版本四项均不满足。
      en: Reject the candidate because source, target, system, and version all fail.
      ja: source・target・system・version の四項不一致で拒否します。
    why_valid_or_invalid:
      zh: 同属 framework mapping 不能替代逐字段与逐版本适用性证明。
      en: Belonging to the same mapping family cannot replace field- and version-specific applicability evidence.
      ja: 同じ framework mapping family でも field／version 別の適用 evidence を代替できません。
    synthetic: true
    verified_version: Framework mappings reviewed 2026-07-16
    source_claims:
      - claim-adapter-mapping-infrastructure-003
      - claim-adapter-mapping-infrastructure-004
  - id: adapter-mapping-infrastructure-cq-coverage-gap-v3-example-positive
    kind: positive
    labels:
      zh: Date 投影的未覆盖项与有损项分列（正例）
      en: Separating uncovered and lossy facets for Date projection — accepted case
      ja: Date 投影の未写像と有損の分離（正例）
    scenario_id: null
    descriptions:
      zh: projection-run-204 测试 z.date()→JSON Schema；字符串类型与 date-time 格式已覆盖，Date 对象身份完全未映射，运行时 Date 校验通过 override 有损对应，并产生 warning-date-01。
      en: Projection-run-204 tests z.date()→JSON Schema; string type and date-time format are covered, Date-object identity is wholly unmapped, and runtime Date validation is mapped lossily through an override with warning-date-01.
      ja: projection-run-204 は z.date()→JSON Schema を検証し、string type と date-time format は covered、Date object identity は未写像、runtime Date validation は override による有損対応で warning-date-01 を生成します。
    field_values:
      run_id: projection-run-204
      required_semantics:
        - string representation
        - date-time format
        - Date object identity
        - runtime Date validation
      covered_semantics:
        - string representation
        - date-time format
      unmapped_semantics:
        - Date object identity
      lossy_semantics:
        - runtime Date validation
      warning_ids:
        - warning-date-01
    related_node_ids:
      - MappingRule
      - SchemaProjectionRun
    related_relation_ids:
      - SchemaProjectionRun-applies-MappingRule
    expected_result:
      zh: 覆盖 2/4；unmapped=1、lossy=1，且有损项由 warning-date-01 支持。
      en: Coverage is 2/4; unmapped=1 and lossy=1, with warning-date-01 supporting the lossy item.
      ja: coverage 2/4、unmapped=1、lossy=1 で、lossy item は warning-date-01 が根拠です。
    why_valid_or_invalid:
      zh: 集合差与告警分别计算，未把空 schema 或 override 伪报为完整覆盖。
      en: Set difference and warnings are computed separately, so neither an empty schema nor an override is reported as complete coverage.
      ja: set difference と warning を別計算し、空 schema や override を完全 coverage としません。
    synthetic: true
    verified_version: Zod 4 JSON Schema docs reviewed 2026-07-16
    source_claims:
      - claim-adapter-mapping-infrastructure-005
      - claim-adapter-mapping-infrastructure-006
  - id: adapter-mapping-infrastructure-cq-coverage-gap-v3-example-counter
    kind: counterexample
    labels:
      zh: 把 override 当成百分百覆盖（反例）
      en: Treating an override as full coverage — rejected case
      ja: override を 100% coverage とする誤判定（反例）
    scenario_id: null
    descriptions:
      zh: 候选把 z.date() override 为 string/date-time 后直接报告 coverage=100%，没有列出 Date 身份损失，也未关联任何 ConversionWarning。
      en: After overriding z.date() to string/date-time, the candidate reports 100% coverage, lists no Date-identity loss, and links no ConversionWarning.
      ja: 候補は z.date() を string/date-time に override した後 coverage=100% とし、Date identity loss も ConversionWarning も記録しません。
    field_values:
      run_id: projection-run-205
      required_semantic_count: 4
      reported_covered_count: 4
      actual_covered_count: 2
      unmapped_semantics: []
      lossy_semantics: []
      warning_ids: []
    related_node_ids:
      - MappingRule
      - SchemaProjectionRun
    related_relation_ids:
      - SchemaProjectionRun-applies-MappingRule
    expected_result:
      zh: 拒绝报告：实际 uncovered 与 lossy 集合均非空，覆盖率不得为 100%。
      en: Reject the report because both actual uncovered and lossy sets are non-empty; coverage cannot be 100%.
      ja: 実際の uncovered と lossy が空でないため報告を拒否し、coverage=100% を認めません。
    why_valid_or_invalid:
      zh: 目标有表达式不等于源语义可逆，缺少告警会掩盖接受集合扩大。
      en: Having a target expression does not make source semantics reversible; the absent warning hides a broadened accepted set.
      ja: target expression があっても source semantics は可逆とは限らず、warning 欠落が受理集合拡大を隠します。
    synthetic: true
    verified_version: Zod 4 JSON Schema docs reviewed 2026-07-16
    source_claims:
      - claim-adapter-mapping-infrastructure-005
      - claim-adapter-mapping-infrastructure-006
