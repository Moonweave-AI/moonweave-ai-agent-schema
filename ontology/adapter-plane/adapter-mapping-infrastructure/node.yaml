          ja: task・environment・version の対応は BenchmarkAdapter.external_mappings のみにあり、BenchmarkAdapter から Task・Goal・TaskConstraint・RuntimeEnvironment への承認済み直接関係はありません。空 relation_ids により版付き対応を恒久 ontology edge にしません。
