            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 领域审校要求声明记录 machine/version，发生记录 event_id、timestamp 与 payload。
              en: Domain review requires machine and version on declarations, and event_id, timestamp, and payload on occurrences.
              ja: ドメイン審査は declaration に machine/version、occurrence に event_id/timestamp/payload を要求します。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 本体审校拒绝 event declaration-is_a-TraceEvent，避免 schema 与事实混类。
              en: Ontology review rejects event-declaration-is_a-TraceEvent to avoid mixing schema and fact.
              ja: 本体審査は schema と fact の混同を避け event-declaration-is_a-TraceEvent を拒否します。
  key_notion:
    zh: 适配器
    en: adapter
    ja: アダプター
  owns_when:
    zh: 当对象由跨模型对应规则、规则适用条件、对应关系的验证证据，或非协议/非框架/非输出表示的可复用模型适配能力来识别时，由本模块拥有。
    en: Own an object when it is identified by a cross-model correspondence rule, its applicability conditions, evidence validating that correspondence, or a reusable model adapter that is not protocol-, framework-, or output-representation-specific.
    ja: モデル間対応規則、その適用条件、対応を検証する証拠、またはプロトコル・フレームワーク・出力表現に固有でない再利用可能なモデル適配能力によって識別される対象を所有します。
  references_when:
    zh: 协议、框架和表示投影在采用共通规则时引用本模块；评估与运行域在解释外部基准或状态图数据时引用对应 Adapter，但任务、测量、轨迹和运行状态的核心身份不变。
    en: Protocol, framework, and representation-projection scopes reference this module when applying shared rules. Evaluation and Runtime reference the relevant Adapter when interpreting external benchmark or statechart data, while core task, measurement, trace, and runtime-state identities remain unchanged.
    ja: プロトコル、フレームワーク、表現投影は共通規則を使う際に本モジュールを参照します。評価と実行時領域は外部ベンチマーク・状態図データを解釈する際に該当 Adapter を参照しますが、中核の課題、測定、軌跡、実行状態の同一性は変わりません。
