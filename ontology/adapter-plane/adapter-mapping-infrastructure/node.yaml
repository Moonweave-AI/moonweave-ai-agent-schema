        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-adapter-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 领域审校要求 score field 先解析到 Metric 定义，再产生一次 Measurement，不能只对数字做换算。
              en: Domain review requires resolving a score field to a Metric definition before creating a Measurement.
              ja: ドメイン審査は score field を Metric definition に解決してから Measurement を作ることを要求します。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 本体审校保留 Metric 定义、Measurement 结果与外部字段三者身份。
              en: Ontology review preserves distinct identities for Metric definition, Measurement result, and external field.
              ja: 本体審査は Metric definition・Measurement result・外部 field の identity を分けます。
    - id: adapter-mapping-infrastructure-cq-benchmark-trajectory-provenance-v3
