      questions:
        zh: 基准轨迹映射为 Trace 后，能否保留原始样本、步骤顺序和结果的来源链？
        en: After a benchmark trajectory maps to Trace, are the original sample, step order, and outcome provenance preserved?
        ja: ベンチマーク軌跡を Trace に写像した後、元サンプル、手順順序、結果の来歴を保持できますか。
      query: Follow the trajectory mapping from benchmark sample through ordered steps to Trace and Outcome provenance references.
      expected_assertion: Every mapped trace retains one source sample reference, an order-preserving step mapping, and a provenance link to the benchmark outcome.
