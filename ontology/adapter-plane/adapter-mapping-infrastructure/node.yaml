module_contract:
  interaction_contract:
    applicability: mixed
    facets:
      input:
        applicable: true
        description:
          zh: 输入是待验证的 MappingRule。MappingTestResult-verifies-MappingRule 从结果记录指向被核验规则；输入面读取 MappingRule 端点，不把规则误写成由结果生成的产物。
          en: The input is the MappingRule under validation. MappingTestResult-verifies-MappingRule points from the result record to the verified rule; the input facet reads the MappingRule endpoint and does not claim that the result produced the rule.
          ja: 入力は検証対象の MappingRule です。MappingTestResult-verifies-MappingRule は結果記録から検証対象規則へ向かい、入力面は MappingRule 端点を読み、結果が規則を生成したとは主張しません。
        family_concept_ids:
          - MappingRule
        relation_ids:
          - MappingTestResult-verifies-MappingRule
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 输出是 MappingTestResult，即 MappingArtifact 的具体验证结果类型。共享关系在输出面读取 MappingTestResult 端点，同时保留其指向被验证 MappingRule 的证据方向。
          en: The output is MappingTestResult, the concrete validation-result subtype of MappingArtifact. On the output facet the shared fact reads the MappingTestResult endpoint while preserving its evidence direction toward the verified MappingRule.
          ja: 出力は MappingArtifact の具体的な検証結果型 MappingTestResult です。出力面では MappingTestResult 端点を読みつつ、検証対象 MappingRule への証拠方向を保持します。
        family_concept_ids:
          - MappingTestResult
        relation_ids:
          - MappingTestResult-verifies-MappingRule
        not_applicable_reason: null
      failure:
        applicable: true
        description:
          zh: 映射规则与验证的失败概念族为转换警告；责任交接由已接受事实 映射测试结果 —reports→ 转换警告 (MappingTestResult-reports-ConversionWarning) 明确给出。
          en: The failure families for Mapping rules and validation are conversion warning; the accepted facts mapping test result —reports→ conversion warning (MappingTestResult-reports-ConversionWarning) make the responsibility handoff explicit.
          ja: 写像規則と検証の失敗概念族は変換警告です。責任の受け渡しは承認済み事実 写像試験結果 —reports→ 変換警告 (MappingTestResult-reports-ConversionWarning) により明示されます。
        family_concept_ids:
          - ConversionWarning
        relation_ids:
          - MappingTestResult-reports-ConversionWarning
        not_applicable_reason: null
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不负责启动恢复流程。具体适配范围应用通用规则或报告映射执行结果时，引用这里的 Adapter、MappingRule 和验证概念。
          en: This ontology does not initiate a recovery workflow. A concrete adapter scope references Adapter, MappingRule, and validation concepts here when applying a shared rule or reporting a mapping run.
          ja: このオントロジーは回復ワークフローを開始しません。具体的な適配範囲が共通規則を適用したり写像実行結果を報告したりするとき、ここで定義した Adapter、MappingRule、検証概念を参照します。
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-adapter-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项领域复核确认 Adapter、MappingRule 与 MappingArtifact 分别回答“谁执行转换”“按什么规范转换”“有什么独立证据”；规则文本不能充当执行能力或自证制品。
            en: Point-by-point domain review confirms that Adapter, MappingRule, and MappingArtifact answer respectively who performs conversion, under which specification, and with what independent evidence. Rule text is neither an executing capability nor its own evidence artifact.
            ja: 個別領域審査は Adapter・MappingRule・MappingArtifact がそれぞれ変換実行者・変換仕様・独立証拠を答えると確認しました。規則本文は実行能力でも自己証拠成果物でもありません。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 结构复核确认 Adapter、MappingRule 与 MappingArtifact 分属能力、规范和证据信息三条独立身份轴。governs 与 evidences 保持 canonical 方向和可查询性，但均为跨轴事实；只有 Adapter 的能力下位类与 MappingArtifact 的信息下位类沿 is_a 形成层级。
            en: Structural review confirms that Adapter, MappingRule, and MappingArtifact are independent capability, specification, and evidence-information identity axes. governs and evidences retain canonical direction and queryability as cross-axis facts; only Adapter capability subtypes and MappingArtifact information subtypes form is_a hierarchies.
            ja: 構造審査は Adapter・MappingRule・MappingArtifact が capability・specification・evidence information の独立 identity axis であると確認しました。governs と evidences は canonical 方向と照会性を保つ cross-axis fact で、Adapter capability subtype と MappingArtifact information subtype だけが is_a 階層を形成します。
  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - Adapter
    allowed_backbone_predicates:
      - is_a
    flat_root_exception_concept_ids:
      - MappingArtifact
      - MappingRule
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-adapter-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: Adapter 回答谁具有转换能力，MappingRule 回答应如何转换，MappingArtifact 回答一次验证或转换留下了什么证据；三者按身份条件与唯一 owner 分界。
            en: Adapter answers who has conversion capability, MappingRule answers how conversion should occur, and MappingArtifact answers what evidence a validation or conversion produced; the three are separated by identity conditions and unique ownership.
            ja: Adapter は変換能力の主体、MappingRule は変換方法、MappingArtifact は検証または変換が残した証拠を答え、三者を identity condition と unique owner で分離します。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 分类骨架只采用真实 is_a：Adapter 展开具体能力，MappingArtifact 展开警告、测试结果和覆盖报告。MappingRule 与 MappingArtifact 是独立组合根，governs 和 evidences 只作跨根事实。
            en: "The taxonomy backbone uses only genuine is_a edges: Adapter expands concrete capabilities, while MappingArtifact expands warnings, test results, and coverage reports. MappingRule and MappingArtifact are independent composition roots; governs and evidences remain cross-root facts."
            ja: taxonomy backbone は真正な is_a だけを使います。Adapter は具体 capability、MappingArtifact は warning・test result・coverage report を展開します。MappingRule と MappingArtifact は独立 composition root で、governs と evidences は cross-root fact に留めます。
