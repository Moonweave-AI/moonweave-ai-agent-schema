        not_applicable_reason:
          zh: benchmark 样本、trajectory 字段与 output 路径是外部版本数据；它们到 TraceRecord、TraceEvent、RunOutcome 的对应只存在于 BenchmarkAdapter.external_mappings。canonical 图没有接受一条统一跨基准 provenance 边。
          en: Benchmark samples, trajectory fields, and output paths are versioned external data; their correspondences to TraceRecord, TraceEvent, and RunOutcome exist only in BenchmarkAdapter.external_mappings. The canonical graph has no accepted universal cross-benchmark provenance edge.
          ja: benchmark sample・trajectory field・output path は版付き外部データで、TraceRecord・TraceEvent・RunOutcome への対応は BenchmarkAdapter.external_mappings のみにあります。canonical graph に全 benchmark 共通 provenance edge はありません。
      positive_example_ids:
        - adapter-mapping-infrastructure-cq-benchmark-trajectory-provenance-v3-example-positive
      counterexample_ids:
