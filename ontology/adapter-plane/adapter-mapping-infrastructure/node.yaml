            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 领域审校把触发、守卫判定、路由决定与目标状态拆成四个可检验结果。
              en: Domain review separates trigger, guard evaluation, routing decision, and target state into four testable results.
              ja: ドメイン審査は trigger・guard evaluation・routing decision・target state を四つの検証可能結果に分けます。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 本体审校拒绝 Transition-is_a-StateSnapshot 等跨 kind 分类捷径。
              en: Ontology review rejects cross-kind shortcuts such as Transition-is_a-StateSnapshot.
              ja: 本体審査は Transition-is_a-StateSnapshot のような cross-kind 分類を拒否します。
    - id: adapter-mapping-infrastructure-cq-statechart-parallel-history-loss-v3
      semantic_key: adapter-mapping-infrastructure.statechart-parallel-history-loss
      primary_owner_module_id: adapter-mapping-infrastructure
      related_module_ids:
        - runtime-system
      questions:
        zh: 并行区域或历史状态映射到核心会话状态时，会丢失哪些恢复语义？
        en: When parallel regions or history states map to core session state, which recovery semantics are lost?
        ja: 並行領域または履歴状態をコアのセッション状態へ写像するとき、どの回復意味が失われますか。
      query: Compare source parallel/history semantics with mapped RuntimeSession state and checkpoint relations, then enumerate unsupported restoration behavior.
      expected_assertion: Every unsupported concurrency or restoration behavior is recorded as a mapping gap rather than silently collapsed.
      evidence_binding:
        applicability: boundary-comparison-only
        owner_concept_ids:
          - StatechartAdapter
        related_concept_ids:
          - RuntimeSession
          - StateSnapshot
          - Checkpoint
        relation_ids: []
        not_applicable_reason:
          zh: parallel 区域集合以及 shallow/deep history 是 SCXML/XState 方言语义，只能随具体版本保存在 StatechartAdapter.external_mappings；canonical 图没有声称 RuntimeSession、StateSnapshot 或 Checkpoint 完整实现这些恢复语义。
          en: Parallel-region sets and shallow/deep history are SCXML or XState dialect semantics retained with a concrete version in StatechartAdapter.external_mappings; the canonical graph does not claim that RuntimeSession, StateSnapshot, or Checkpoint fully implements them.
          ja: parallel region set と shallow/deep history は SCXML/XState dialect 意味で、具体版とともに StatechartAdapter.external_mappings に保持します。canonical graph は RuntimeSession・StateSnapshot・Checkpoint が完全実装すると主張しません。
      positive_example_ids:
        - adapter-mapping-infrastructure-cq-statechart-parallel-history-loss-v3-example-positive
      counterexample_ids:
