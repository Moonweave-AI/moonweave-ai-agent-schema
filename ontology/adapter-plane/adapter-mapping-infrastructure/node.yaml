    - id: adapter-mapping-infrastructure-cq-statechart-transition-guard-mapping-v3
      semantic_key: adapter-mapping-infrastructure.statechart-transition-guard-mapping
      primary_owner_module_id: adapter-mapping-infrastructure
      related_module_ids:
        - orchestration-routing-control
      questions:
        zh: 一条带事件和守卫的状态迁移分别对应哪些核心条件、决定与状态变化？
        en: Which core conditions, decisions, and state changes correspond to a statechart transition with an event and guard?
        ja: イベントとガードを持つ状態遷移は、どのコア条件、判断、状態変化に対応しますか。
      query: Resolve one source Transition and return separate mappings for trigger event, guard condition, control decision, and target state.
      expected_assertion: The transition is not flattened into is_a; trigger, guard, decision, and state change remain separately typed and directionally linked.
      evidence_binding:
        applicability: boundary-comparison-only
        owner_concept_ids:
          - StatechartAdapter
        related_concept_ids:
          - TraceEvent
          - GateCondition
          - RoutingDecision
          - StateSnapshot
        relation_ids: []
        not_applicable_reason:
          zh: SCXML event、cond、target 与 XState guard 属于方言版本字段，其对应记录在 StatechartAdapter.external_mappings；canonical 图没有一条把 StatechartAdapter 直接连接到 TraceEvent、GateCondition、RoutingDecision 或 StateSnapshot 的已接受关系。
          en: SCXML event, cond, and target plus XState guard are dialect-version fields whose correspondences live in StatechartAdapter.external_mappings; no accepted canonical relation directly connects StatechartAdapter to TraceEvent, GateCondition, RoutingDecision, or StateSnapshot.
          ja: SCXML event・cond・target と XState guard は dialect-version field で、対応は StatechartAdapter.external_mappings にあります。StatechartAdapter を TraceEvent・GateCondition・RoutingDecision・StateSnapshot に直接接続する承認済み canonical 関係はありません。
      positive_example_ids:
        - adapter-mapping-infrastructure-cq-statechart-transition-guard-mapping-v3-example-positive
      counterexample_ids:
        - adapter-mapping-infrastructure-cq-statechart-transition-guard-mapping-v3-example-counter
      source_claims:
        - claim-adapter-mapping-infrastructure-015
        - claim-adapter-mapping-infrastructure-016
      review:
