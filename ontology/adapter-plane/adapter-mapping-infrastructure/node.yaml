            decision_note:
              zh: 领域审校要求源模式、目标模式、profile 与版本区间四项全部匹配。
              en: Domain review requires source pattern, target pattern, profile, and version interval all to match.
              ja: ドメイン審査は source pattern・target pattern・profile・version interval の全一致を要求します。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
