schema: moonweave.ai/ontology-node/v1
id: MappingArtifact
kind: concept
status: accepted
labels:
  zh: 映射信息产物
  en: mapping artifact
  ja: 写像情報成果物
semantics:
  short_definition:
    zh: 映射信息产物是映射执行、验证或覆盖分析产生的、带来源追踪的信息记录。
    en: A MappingArtifact is a provenance-bearing information record produced by mapping execution, verification, or coverage analysis.
    ja: MappingArtifact は、写像の実行・検証・網羅分析から生じる来歴付き情報記録です。
  definition:
    zh: 映射信息产物是一类可审计的信息记录，由某个适配器版本对某条映射规则执行、验证或汇总后产生，并保留产物身份、生成时间、生产者、相关规则和证据来源。其下位类包括 ConversionWarning、MappingTestResult 与 CoverageReport；MappingRule 是先于执行存在的规范，不属于该产物层级。产物可作为节点详情显示，但其信息身份和来源不因此消失。
    en: A MappingArtifact is an auditable information record generated when an adapter version executes, verifies, or aggregates a mapping rule. It retains artifact identity, generation time, producer, related rule, and evidence provenance. ConversionWarning, MappingTestResult, and CoverageReport are subclasses. MappingRule is a pre-existing specification, not a member of this artifact hierarchy. An artifact may be rendered inside node details without losing its informational identity or provenance.
    ja: MappingArtifact は、Adapter 版が MappingRule を実行・検証・集計したときに生成される監査可能な情報記録で、成果物識別、生成時刻、生成者、関連規則、証拠来歴を保持します。ConversionWarning・MappingTestResult・CoverageReport が下位で、事前仕様である MappingRule は含みません。ノード詳細に表示しても情報としての識別と来歴は失われません。
  why_needed:
    zh: 映射是否可靠不能只看规则文本，还要追溯运行警告、单例测试结果和整体覆盖证据。统一的产物上位类让这些记录共享来源与生命周期约束，同时保持三者不同的信息粒度。
    en: Mapping reliability cannot be assessed from rule text alone; conversion warnings, case-level test results, and aggregate coverage evidence must remain traceable. A shared artifact superclass gives them common provenance and lifecycle constraints while preserving their distinct granularities.
    ja: 写像の信頼性は規則文だけでは判断できず、実行警告・事例単位の試験結果・集計網羅証拠を追跡する必要があります。共通上位により来歴とライフサイクルを共有しつつ粒度を分離できます。
  includes:
    - zh: 纳入具备产物身份、生成活动或时间、生产者、所涉 Adapter/MappingRule 以及证据来源的转换警告、映射测试结果和覆盖报告。
      en: Includes conversion warnings, mapping-test results, and coverage reports that identify the artifact, its generation activity or time, producer, related Adapter or MappingRule, and evidence provenance.
      ja: 成果物識別、生成活動または時刻、生成者、関連 Adapter／MappingRule、証拠来歴を持つ変換警告・写像試験結果・網羅率報告を含みます。
  excludes:
    - zh: 不纳入作为规范的 MappingRule、执行转换的 Adapter、转换活动本身、外部系统原生载荷，以及没有生成来源或相关规则的任意日志文本。
      en: Excludes the MappingRule specification, the executing Adapter, the conversion activity itself, native external payloads, and arbitrary log text with no generation provenance or related rule.
      ja: 仕様である MappingRule、実行能力 Adapter、変換活動そのもの、外部固有ペイロード、および生成来歴や関連規則を欠く任意ログを除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - artifact_id
  fields:
    - id: artifact_id
      labels:
        zh: 产物标识
        en: artifact ID
        ja: 成果物 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在警告、测试结果或覆盖报告的生命周期内稳定标识该信息产物。
        en: Stable identifier for this warning, test result, or coverage report throughout its lifecycle.
        ja: 警告・試験結果・網羅報告のライフサイクルを通じて当該情報成果物を安定識別します。
      allowed_values: []
      pattern: null
      example_value: mapping-test-a2a-task-018
      source_claims: []
    - id: generated_at
      labels:
        zh: 生成时间
        en: generated at
        ja: 生成時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 产生该记录的活动完成或发出该记录的 UTC 时间。
        en: UTC instant at which the producing activity completed or emitted this record.
        ja: 生成活動が完了または当該記録を発行した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-15T00:00:00.000Z
      source_claims: []
    - id: producer_id
      labels:
        zh: 生产者标识
        en: producer ID
        ja: 生成者 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 生成该信息产物的适配器版本、测试运行器或治理活动标识。
        en: Identifier of the adapter version, test runner, or governance activity that generated the artifact.
        ja: 成果物を生成した Adapter 版、試験ランナー、または統制活動の識別子です。
      allowed_values: []
      pattern: null
      example_value: adapter-a2a@2.0.0
      source_claims: []
    - id: related_rule_ids
      labels:
        zh: 相关规则标识
        en: related rule IDs
        ja: 関連規則 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 该产物诊断、验证或汇总的 MappingRule 版本标识。
        en: MappingRule version identifiers diagnosed, verified, or summarized by this artifact.
        ja: 当該成果物が診断・検証・集計する MappingRule 版の識別子です。
      allowed_values: []
      pattern: null
      example_value:
        - mapping-rule-a2a-task-lifecycle@4
      source_claims: []
    - id: evidence_uris
      labels:
        zh: 证据 URI
        en: evidence URIs
        ja: 証拠 URI
      datatype: string
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 指向可复核输入、输出、日志或报告文件的不可歧义引用。
        en: Unambiguous references to reviewable inputs, outputs, logs, or report files.
        ja: 確認可能な入力・出力・ログ・報告ファイルへの曖昧でない参照です。
      allowed_values: []
      pattern: null
      example_value:
        - urn:moonweave:evidence:mapping-test-a2a-task-018
      source_claims: []
  constraints:
    - id: mapping-artifact-provenance-complete
      severity: error
      expression_language: plain
      expression: artifact_id, generated_at, producer_id, and at least one related_rule_id are present
      explanations:
        zh: 每个映射信息产物必须可追溯到生产者、时间和至少一条相关规则。
        en: Every mapping artifact is traceable to its producer, generation time, and at least one related rule.
        ja: 各写像成果物は生成者・生成時刻・少なくとも一つの関連規則へ追跡可能でなければなりません。
      source_claims:
        - claim-mapping-artifact-003
  required_relation_constraints: []
examples:
  - id: MappingArtifact-example-positive-001
    kind: positive
    labels:
      zh: 映射信息产物正例
      en: Positive example of mapping artifact
      ja: 写像情報成果物の正例
    scenario_id: null
    descriptions:
      zh: 适配器测试运行生成 `mapping-test-a2a-task-018`，记录生产者 `adapter-a2a@2.0.0`、相关规则 `mapping-rule-a2a-task-lifecycle@4`、生成时间、输入样本摘要和证据 URI；该记录进一步归类为 MappingTestResult，因此也属于 MappingArtifact。
      en: An adapter test run generates `mapping-test-a2a-task-018` with producer `adapter-a2a@2.0.0`, related rule `mapping-rule-a2a-task-lifecycle@4`, generation time, input-sample digest, and evidence URI. The record is further classified as MappingTestResult and therefore is also a MappingArtifact.
      ja: Adapter 試験実行が `mapping-test-a2a-task-018` を生成し、生成者 `adapter-a2a@2.0.0`、関連規則 `mapping-rule-a2a-task-lifecycle@4`、生成時刻、入力要約、証拠 URI を記録します。MappingTestResult であるため MappingArtifact にも属します。
    field_values:
      artifact_id: mapping-test-a2a-task-018
      generated_at: 2026-07-15T00:00:00.000Z
      producer_id: adapter-a2a@2.0.0
      related_rule_ids:
        - mapping-rule-a2a-task-lifecycle@4
      evidence_uris:
        - urn:moonweave:evidence:mapping-test-a2a-task-018
    related_node_ids:
      - MappingArtifact
      - MappingTestResult
      - MappingRule
    related_relation_ids:
      - MappingTestResult-is_a-MappingArtifact
      - MappingTestResult-verifies-MappingRule
    expected_result:
      zh: 查询返回 MappingTestResult-is_a-MappingArtifact，并通过 MappingTestResult-verifies-MappingRule 追溯被测规则。
      en: The query returns MappingTestResult-is_a-MappingArtifact and traces the tested rule through MappingTestResult-verifies-MappingRule.
      ja: 照会は MappingTestResult-is_a-MappingArtifact を返し、MappingTestResult-verifies-MappingRule で被試験規則を追跡します。
    why_valid_or_invalid:
      zh: 它是一次可追溯活动生成的信息记录，能够回答谁在何时依据哪条规则产生了哪份证据；这满足 MappingArtifact，而具体测试语义由下位类补充。
      en: It is an information record generated by a traceable activity and answers who produced what evidence, when, and under which rule. That satisfies MappingArtifact; the subclass adds test-specific semantics.
      ja: 追跡可能な活動で生成され、誰がいつどの規則に基づき何の証拠を作ったかを示す情報記録です。試験固有意味は下位型が追加します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mapping-artifact-004
      - claim-mapping-artifact-005
  - id: MappingArtifact-example-boundary-001
    kind: boundary
    labels:
      zh: 映射信息产物边界例
      en: Boundary case for mapping artifact
      ja: 写像情報成果物の境界例
    scenario_id: null
    descriptions:
      zh: "`mapping-rule-a2a-task-lifecycle@4` 在任何测试运行之前就已发布，描述应如何转换；它没有生成活动、生成时间或运行证据。即使测试结果引用它，该规范也不是 MappingArtifact。"
      en: "`mapping-rule-a2a-task-lifecycle@4` is published before any test run and states how conversion should occur. It has no generating activity, generation time, or run evidence. Reference by a test result does not turn the specification into a MappingArtifact."
      ja: "`mapping-rule-a2a-task-lifecycle@4` は試験前に公開され変換方法を定めますが、生成活動・生成時刻・実行証拠を持ちません。試験結果から参照されても MappingArtifact にはなりません。"
    field_values: {}
    related_node_ids:
      - MappingArtifact
      - MappingRule
    related_relation_ids: []
    expected_result:
      zh: MappingRule 保持其原有类型，验证器不得凭关系共现把它提升为 MappingArtifact。
      en: MappingRule retains its own type; validation must not promote it to MappingArtifact from relation co-occurrence.
      ja: MappingRule は元の型を維持し、関係の共起だけで MappingArtifact へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 规范与其运行证据具有不同生命周期：前者可被执行和版本化，后者由执行活动生成并携带来源；引用关系不能抹去这个边界。
      en: "A specification and its run evidence have different lifecycles: the former is versioned and executed, while the latter is generated by an activity and carries provenance. A reference cannot erase that boundary."
      ja: 仕様は版管理され実行され、実行証拠は活動から生成され来歴を持つため、ライフサイクルが異なります。参照関係でこの境界は消えません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mapping-artifact-006
      - claim-mapping-artifact-007
external_mappings: []
applicability:
  - adapter
sibling_differentiation: []
parent_relation: null
relations:
  - id: MappingArtifact-evidences-MappingRule
    predicate: evidences
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 为映射规则提供证据
      en: evidences mapping rule
      ja: 写像規則の証拠となる
    definitions:
      zh: 一项 MappingArtifact 通过 evidences 指向其实际验证、限定或汇总的确定版本 MappingRule；证据可以证明规则在给定案例下成立，也可以记录语义损失、未覆盖或失败，但必须保留规则版本与生成来源。
      en: A MappingArtifact evidences the exact versioned MappingRule that it verifies, qualifies, or summarizes. The evidence may support the rule for a case or record loss, missing coverage, or failure, but it must retain rule version and generation provenance.
      ja: MappingArtifact は実際に検証・限定・集約する版付き MappingRule を evidences で指します。事例での成立だけでなく意味損失、未網羅、失敗も記録できますが、規則版と生成来歴を保持しなければなりません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 一项证据可涉及多条规则，一条规则也可由多项测试、警告与覆盖报告共同佐证。
      en: One evidence artifact may concern several rules, and one rule may be evidenced by many tests, warnings, and coverage reports.
      ja: 一つの証拠が複数規則に関係し、一規則が多数の試験・警告・網羅報告で裏付けられるため、一律基数を課しません。
    inverse_reading:
      predicate: evidenced_by_mapping_artifact
      labels:
        zh: 由映射制品佐证
        en: evidenced by mapping artifact
        ja: 写像成果物により裏付けられる
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: MappingArtifact-evidences-MappingRule-example-positive-001
        kind: positive
        labels:
          zh: 测试结果佐证具体规则版本
          en: test result evidences a specific rule version
          ja: 試験結果が特定規則版を裏付ける
        scenario_id: null
        descriptions:
          zh: result-78 固定 adapter@4.2、rule message-role@3、输入摘要、期望输出和实际输出，并记录 round-trip 失败与 warning-78。
          en: result-78 fixes adapter@4.2, rule message-role@3, input digest, expected output, and observed output, and records a failed round trip with warning-78.
          ja: result-78 は adapter@4.2、rule message-role@3、入力ダイジェスト、期待出力、実出力を固定し、round-trip 失敗と warning-78 を記録します。
        field_values: {}
        related_node_ids:
          - MappingArtifact
          - MappingRule
          - MappingTestResult
        related_relation_ids:
          - MappingArtifact-evidences-MappingRule
          - MappingTestResult-is_a-MappingArtifact
        expected_result:
          zh: 建立 result-78 evidences message-role@3，并保留证据否定完全可逆性的结论。
          en: Assert result-78 evidences message-role@3 and retain the evidence's conclusion that full reversibility failed.
          ja: result-78 evidences message-role@3 を記録し、完全可逆性が失敗したという証拠結論を保持します。
        why_valid_or_invalid:
          zh: 制品绑定确定规则版本、执行输入输出和生成时间，因此既能定位被佐证规则，也能说明证据结论。
          en: The artifact binds an exact rule version, executed input and output, and generation time, so both the evidenced rule and the evidence conclusion are identifiable.
          ja: 成果物が規則版、実行入力・出力、生成時刻を結び、対象規則と証拠結論を識別できます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-mapping-artifact-008
      - id: MappingArtifact-evidences-MappingRule-example-boundary-001
        kind: boundary
        labels:
          zh: 规则文本不能自证
          en: rule text cannot evidence itself
          ja: 規則本文は自己証明できない
        scenario_id: null
        descriptions:
          zh: rule message-role@3 声明转换为 exact，但没有执行案例、警告、覆盖分母、生成活动或外部证据记录。
          en: rule message-role@3 declares its conversion exact, but there is no executed case, warning, coverage denominator, generation activity, or external evidence record.
          ja: rule message-role@3 は変換を exact と宣言しますが、実行事例、警告、網羅分母、生成活動、外部証拠記録がありません。
        field_values: {}
        related_node_ids:
          - MappingArtifact
          - MappingRule
        related_relation_ids:
          - MappingArtifact-evidences-MappingRule
        expected_result:
          zh: 不得把 MappingRule 本身实例化为 MappingArtifact，也不得建立自证 evidences 边。
          en: Do not instantiate the MappingRule itself as a MappingArtifact and do not assert a self-evidencing edge.
          ja: MappingRule 自体を MappingArtifact として実体化せず、自己証明 evidences 辺も作成しません。
        why_valid_or_invalid:
          zh: 规范声明没有独立生成来源或观察结果，不满足 MappingArtifact 的证据身份。
          en: A specification assertion has no independent generation provenance or observed result and therefore lacks MappingArtifact identity.
          ja: 仕様宣言には独立した生成来歴も観測結果もなく、MappingArtifact の証拠同一性を欠きます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-mapping-artifact-009
    source_claims:
      - claim-mapping-artifact-010
      - claim-mapping-artifact-011
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:MappingRule
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-adapter-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 GoF Adapter、Enterprise Integration Patterns、W3C OWL/SHACL/ShEx、JSON Schema 2020-12 及 A2A/MCP 协议映射逐项核验；语义、层级、关系、结构与示例均符合 adapter-plane 设计边界。
    en: Verified against GoF Adapter, Enterprise Integration Patterns, W3C OWL/SHACL/ShEx, JSON Schema 2020-12, and A2A/MCP protocol mapping patterns; semantics, hierarchy, relations, structure, and examples align with adapter-plane design boundaries.
    ja: GoF Adapter、Enterprise Integration Patterns、W3C OWL/SHACL/ShEx、JSON Schema 2020-12、A2A/MCP プロトコル写像に照らし項目別確認しました。意味、階層、関係、構造、例は adapter-plane 設計境界に整合します。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-mapping-artifact-001
    source: eng-ont-prov-o
    supports: "MappingArtifact specializes the PROV-O Entity pattern: a record may be generated by an Activity, attributed to an Agent, and derived from prior entities. The mapping-specific superclass and its children are Moonweave design decisions."
    locator: PROV-O > Starting Point and Expanded Terms for generation, attribution, derivation
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-mapping-artifact-002
    source: eng-val-jsonschema-test-suite
    supports: The JSON Schema Test Suite provides concrete test descriptions and implementation-run results rather than treating a schema rule as its own evidence. MappingArtifact generalizes the generated evidence side for mapping governance.
    locator: README > Test structure and implementation harness results
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-mapping-artifact-003
    source: eng-ont-prov-o
    supports: PROV-O distinguishes entities, their generating activities, associated agents, and derivation; mapping-artifact-provenance-complete specializes those provenance links for audit records.
    locator: PROV-O > Starting Point and Expanded Terms for generation and attribution
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-mapping-artifact-004
    source: eng-ont-prov-o
    supports: MappingArtifact-example-positive-001 follows PROV-O's distinction between an Entity, the Activity that generated it, and the Agent associated with that generation; Moonweave specializes the entity as mapping evidence.
    locator: "PROV-O > Starting Point Terms: Entity, Activity, Agent, wasGeneratedBy"
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-mapping-artifact-005
    source: eng-val-jsonschema-test-suite
    supports: The JSON Schema Test Suite stores versioned test cases with input data and expected validity; MappingArtifact-example-positive-001 adds an execution identity and provenance so a concrete run remains auditable.
    locator: README > Test case schema and running the test suite
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-mapping-artifact-006
    source: eng-ont-prov-o
    supports: PROV-O models generation as a relation from an Entity to an Activity and distinguishes plans from generated entities. MappingArtifact-example-boundary-001 applies that lifecycle distinction to a mapping rule and its run evidence.
    locator: "PROV-O > Expanded Terms: Generation and Plan"
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-mapping-artifact-007
    source: eng-val-jsonschema-test-suite
    supports: The JSON Schema Test Suite separates test definitions from the results produced by implementations. That source supports MappingArtifact-example-boundary-001's specification-versus-generated-record distinction.
    locator: README > Writing tests; Running tests with a harness
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-mapping-artifact-008
    source: eng-val-jsonschema-test-suite
    supports: The JSON Schema Test Suite separates versioned test cases, instance data, expected validity, and implementation results. Moonweave uses the same evidence/specification separation to bind a generated MappingArtifact to the exact MappingRule version it tests.
    locator: JSON Schema Test Suite README > test case format, draft directories, and implementation harnesses
    evidence_kind: design-inference
    confidence: high
