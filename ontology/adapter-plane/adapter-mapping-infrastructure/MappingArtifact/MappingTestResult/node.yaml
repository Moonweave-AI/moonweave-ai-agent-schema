schema: moonweave.ai/ontology-node/v1
id: MappingTestResult
kind: concept
status: review
labels:
  zh: 映射测试结果
  en: mapping test result
  ja: 写像試験結果
semantics:
  short_definition:
    zh: 映射测试结果是记录一条 MappingRule 在一个版本化测试案例上实际结果的 MappingArtifact。
    en: A MappingTestResult is a MappingArtifact recording the observed outcome of one MappingRule on one versioned test case.
    ja: MappingTestResult は、一つの MappingRule を一つの版付き試験事例で実行した観測結果を記録する MappingArtifact です。
  definition:
    zh: 映射测试结果是一种案例级映射信息产物，绑定被测 MappingRule 版本、Adapter 版本、外部规范版本、固定输入、预期输出、实际输出、比较方式、通过状态和执行时间；若测试包含反向转换，还单独记录往返比较和发现的 ConversionWarning。它提供一次可复现观察，既不修改被测规则，也不等同于跨案例的 CoverageReport。
    en: "A MappingTestResult is a case-level mapping artifact bound to the tested MappingRule version, Adapter version, external-specification version, fixed input, expected output, actual output, comparison method, pass status, and execution time. If reverse conversion is exercised, it records round-trip comparison and any ConversionWarning separately. It is one reproducible observation: it neither changes the rule nor serves as a cross-case CoverageReport."
    ja: MappingTestResult は被試験 MappingRule 版、Adapter 版、外部仕様版、固定入力、期待／実出力、比較方法、合否、実行時刻に結び付く事例単位成果物です。逆変換を試す場合は往復比較と ConversionWarning を別に記録します。一回の再現可能な観測であり、規則を変更せず、複数事例の CoverageReport でもありません。
  why_needed:
    zh: 规则评审需要证据说明“在哪个版本、什么输入、得到什么输出”，否则 exact 或 lossy 只是声明。独立结果记录让失败可复现、警告可定位，并为覆盖报告提供可计数的案例证据。
    en: Rule review needs evidence of which versions and input produced which output; otherwise exact or lossy is only an assertion. Independent results make failures reproducible, warnings locatable, and coverage reports countable from case evidence.
    ja: 規則審査には「どの版と入力で何が出たか」の証拠が必要で、なければ exact／lossy は主張にすぎません。独立結果により失敗を再現し警告を特定し、網羅報告が事例証拠を数えられます。
  includes:
    - zh: 纳入绑定单条规则和单个测试案例，具有版本、输入摘要、预期/实际输出摘要、比较方式、合否、执行时间和证据引用的结果记录。
      en: Includes result records bound to one rule and one test case with versions, input digest, expected and actual output digests, comparison method, pass status, execution time, and evidence reference.
      ja: 一つの規則と試験事例に結び付き、版、入力要約、期待／実出力要約、比較方法、合否、実行時刻、証拠参照を持つ結果を含みます。
  excludes:
    - zh: 不纳入只描述异常的 ConversionWarning、跨案例聚合的 CoverageReport、尚未执行的测试用例定义、MappingRule 本身，以及没有固定输入或实际输出的人工判断。
      en: Excludes a diagnostic-only ConversionWarning, a cross-case CoverageReport, an unexecuted test-case definition, the MappingRule itself, and a human judgment with no fixed input or observed output.
      ja: 診断だけの ConversionWarning、複数事例を集計する CoverageReport、未実行の試験定義、MappingRule 自体、および固定入力や実出力のない人手判断を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: adapter_version_ref
      labels:
        zh: 适配器版本引用
        en: adapter version reference
        ja: Adapter 版参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 实际执行被测规则的 Adapter 版本。
        en: Adapter version that actually executed the tested rule.
        ja: 被試験規則を実際に実行した Adapter 版です。
      allowed_values: []
      pattern: null
      example_value: adapter-a2a@2.0.0
      source_claims: []
    - id: external_spec_version
      labels:
        zh: 外部规范版本
        en: external specification version
        ja: 外部仕様版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 测试输入所遵循的外部规范发布版或快照。
        en: External specification release or snapshot followed by the test input.
        ja: 試験入力が従う外部仕様リリースまたはスナップショットです。
      allowed_values: []
      pattern: null
      example_value: a2a-spec-snapshot-2026-07-15
      source_claims: []
    - id: test_case_id
      labels:
        zh: 测试案例标识
        en: test case ID
        ja: 試験事例 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 可重复运行的固定输入与预期结果定义标识。
        en: Identifier of the repeatable fixed-input and expected-result definition.
        ja: 再実行可能な固定入力と期待結果定義の識別子です。
      allowed_values: []
      pattern: null
      example_value: a2a-task-with-extension-018
      source_claims: []
    - id: input_digest
      labels:
        zh: 输入摘要
        en: input digest
        ja: 入力要約
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一绑定本次执行所用固定输入内容的摘要。
        en: Digest uniquely binding the fixed input used for this execution.
        ja: 本実行の固定入力内容を一意に結び付ける要約です。
      allowed_values: []
      pattern: null
      example_value: sha256:a2a-input-018
      source_claims: []
    - id: expected_output_digest
      labels:
        zh: 预期输出摘要
        en: expected output digest
        ja: 期待出力要約
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在声明比较方式下被接受的预期输出摘要。
        en: Digest of the expected output accepted under the declared comparator.
        ja: 宣言比較方法で受容される期待出力の要約です。
      allowed_values: []
      pattern: null
      example_value: sha256:moonweave-expected-018
      source_claims: []
    - id: actual_output_digest
      labels:
        zh: 实际输出摘要
        en: actual output digest
        ja: 実出力要約
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 适配器执行产生的实际输出内容摘要。
        en: Digest of the observed output produced by adapter execution.
        ja: Adapter 実行が生成した実出力内容の要約です。
      allowed_values: []
      pattern: null
      example_value: sha256:moonweave-actual-018
      source_claims: []
    - id: comparison_kind
      labels:
        zh: 比较方式
        en: comparison kind
        ja: 比較方法
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明以 exact、loss-aware 或 round-trip 条件判断结果。
        en: Declares whether the outcome is judged by exact, loss-aware, or round-trip comparison.
        ja: exact・loss-aware・round-trip のどの条件で結果を判定するかを示します。
      allowed_values: []
      pattern: null
      example_value: loss-aware
      source_claims: []
    - id: passed
      labels:
        zh: 是否通过
        en: passed
        ja: 合格
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 实际输出是否满足该案例的声明比较条件。
        en: Whether observed output satisfies the case's declared comparison conditions.
        ja: 実出力が事例の宣言比較条件を満たすかを示します。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims: []
    - id: warning_ids
      labels:
        zh: 警告标识
        en: warning IDs
        ja: 警告 ID
      datatype: string
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 本次比较预期或意外发现的 ConversionWarning 标识。
        en: ConversionWarning identifiers expected or unexpectedly found by this comparison.
        ja: 本比較で期待または予期せず検出した ConversionWarning ID です。
      allowed_values: []
      pattern: null
      example_value:
        - CW-A2A-EXT-001
      source_claims: []
  constraints:
    - id: mapping-test-result-reproducible
      severity: error
      expression_language: plain
      expression: one rule version, one adapter version, one external spec version, fixed input, expected output, actual output, comparator, pass status, and inherited generated_at are present
      explanations:
        zh: 规则版本、适配器版本、外部规范版本、固定输入、预期与实际输出、比较器、通过状态，以及从 MappingArtifact 继承的 generated_at 必须共同支持复现。
        en: Rule version, adapter version, external-specification version, fixed input, expected and actual output, comparator, pass status, and inherited MappingArtifact generated_at must jointly support reproduction.
        ja: 規則版、adapter 版、外部仕様版、固定入力、期待・実出力、比較器、合否、および MappingArtifact から継承する generated_at をそろえて再現可能にします。
      source_claims:
        - claim-mapping-test-result-003
  required_relation_constraints: []
examples:
  - id: MappingTestResult-example-positive-001
    kind: positive
    labels:
      zh: 映射测试结果正例
      en: Positive example of mapping test result
      ja: 写像試験結果の正例
    scenario_id: null
    descriptions:
      zh: 结果 `mapping-test-a2a-task-018` 针对 `mapping-rule-a2a-task-lifecycle@4` 和固定 A2A Task 输入。实际 Moonweave Execution 与预期的协议身份、RuntimeSession 关联、生命周期状态、历史和 Artifact 谱系一致；样本没有 task_specification_id，因此预期不生成 Execution-realizes-Task。扩展元数据留作残差并报告一个 warning，loss-aware 比较通过。
      en: Result `mapping-test-a2a-task-018` runs `mapping-rule-a2a-task-lifecycle@4` on a fixed A2A Task input. The observed Moonweave Execution matches expected protocol identity, RuntimeSession link, lifecycle state, history, and Artifact lineage; the sample has no task_specification_id, so no Execution-realizes-Task edge is expected. Extension metadata remains residual with one warning, and the loss-aware comparison passes.
      ja: "`mapping-test-a2a-task-018` は固定 A2A Task 入力で `mapping-rule-a2a-task-lifecycle@4` を実行します。実際の Moonweave Execution は期待するプロトコル識別子、RuntimeSession 関連、ライフサイクル状態、履歴、Artifact 系譜と一致します。サンプルに task_specification_id がないため Execution-realizes-Task は生成せず、拡張メタデータを警告一件の残差として loss-aware 比較に合格します。"
    field_values:
      artifact_id: mapping-test-a2a-task-018
      generated_at: 2026-07-15T00:00:00.000Z
      producer_id: mapping-test-runner@2
      related_rule_ids:
        - mapping-rule-a2a-task-lifecycle@4
      adapter_version_ref: adapter-a2a@2.0.0
      external_spec_version: a2a-spec-snapshot-2026-07-15
      test_case_id: a2a-task-with-extension-018
      input_digest: sha256:a2a-input-018
      expected_output_digest: sha256:moonweave-expected-018
      actual_output_digest: sha256:moonweave-actual-018
      comparison_kind: loss-aware
      passed: true
      warning_ids:
        - CW-A2A-EXT-001
    related_node_ids:
      - MappingTestResult
      - ConversionWarning
    related_relation_ids:
      - MappingTestResult-reports-ConversionWarning
    expected_result:
      zh: 该运行可查询 MappingTestResult 以及方向保持不变的事实 MappingTestResult-reports-ConversionWarning。
      en: The run can query MappingTestResult together with direction-preserving fact MappingTestResult-reports-ConversionWarning.
      ja: この実行では MappingTestResult と方向を保持した事実 MappingTestResult-reports-ConversionWarning を共に照会できます。
    why_valid_or_invalid:
      zh: 该记录绑定一个规则版本和一个固定案例，区分预期残差与意外差异，并保存实际输出和执行证据；因此通过状态可复现而不是主观评语。
      en: The record binds one rule version and one fixed case, distinguishes expected residuals from unexpected differences, and retains observed output plus execution evidence. Its pass status is reproducible rather than subjective.
      ja: 一つの規則版と固定事例に結び付き、期待残差と予期せぬ差分を区別し、実出力と実行証拠を保持するため、合否は再現可能です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mapping-test-result-004
      - claim-mapping-test-result-005
  - id: MappingTestResult-example-boundary-001
    kind: boundary
    labels:
      zh: 映射测试结果边界例
      en: Boundary case for mapping test result
      ja: 写像試験結果の境界例
    scenario_id: null
    descriptions:
      zh: "`CW-ZOD-DATE-001` 定位 `z.date()` 不可表示并给出修复建议，但没有固定测试输入、预期输出、实际输出、比较器或通过状态。它可被测试结果报告，却不能单独充当 MappingTestResult。"
      en: "`CW-ZOD-DATE-001` locates an unrepresentable `z.date()` and gives remediation, but has no fixed test input, expected output, observed output, comparator, or pass status. A test result may report it; the warning alone is not a MappingTestResult."
      ja: "`CW-ZOD-DATE-001` は `z.date()` の表現不能と修正策を示しますが、固定入力・期待／実出力・比較器・合否を持ちません。試験結果が報告できても警告単独は MappingTestResult ではありません。"
    field_values: {}
    related_node_ids:
      - MappingTestResult
      - ConversionWarning
    related_relation_ids:
      - MappingTestResult-reports-ConversionWarning
    expected_result:
      zh: ConversionWarning 保持其原有类型，验证器不得凭关系共现把它提升为 MappingTestResult。
      en: ConversionWarning retains its own type; validation must not promote it to MappingTestResult from relation co-occurrence.
      ja: ConversionWarning は元の型を維持し、関係の共起だけで MappingTestResult へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 诊断可以成为结果的一部分，但结果还必须证明一次案例执行和比较；“被结果报告”不等于“是结果”。
      en: A diagnostic can be part of a result, but a result must also evidence case execution and comparison. Being reported by a result does not make the diagnostic the result.
      ja: 診断は結果の一部になれますが、結果には事例実行と比較の証拠も必要で、「結果に報告される」ことは「結果である」ことではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mapping-test-result-006
      - claim-mapping-test-result-007
external_mappings: []
applicability:
  - adapter
sibling_differentiation:
  - sibling_concept_id: ConversionWarning
    shared_parent_concept_id: MappingArtifact
    differentia:
      zh: 正向身份比较：父节点 MappingArtifact：MappingTestResult（semantic kind=information，骨架 MappingTestResult-is_a-MappingArtifact）；ConversionWarning（semantic kind=information，骨架 ConversionWarning-is_a-MappingArtifact）。双端条件：MappingTestResult 条件：“映射测试结果是以如下事实为区分特征的映射信息产物：它是一种 MappingArtifact，记录被测规则、源/目标版本、测试输入、预期与实际输出、exact/lossy/unsupported 分类、往返比较、通过状态、执行时间和证据；它验证规则而不是替代规则”；ConversionWarning 条件：“转换警告是一种映射信息产物；其区分条件是：它是适配转换治理事件，记录映射过程中的转换损失、近似、不支持语义、歧义、非往返行为或需要人工审查的条件”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent MappingArtifact: MappingTestResult (semantic kind=information, backbone MappingTestResult-is_a-MappingArtifact); ConversionWarning (semantic kind=information, backbone ConversionWarning-is_a-MappingArtifact). Endpoint conditions: MappingTestResult condition: “Mapping test result is a mapping artifact; its differentiating condition is that it is a MappingArtifact recording the tested rule, source and target versions, test input, expected and actual output, exact/lossy/unsupported classification, round-trip comparison, pass status, execution time, and evidence”; ConversionWarning condition: “As a mapping artifact, Conversion warning is distinguished by the fact that it is a conversion governance event that records mapping loss, approximation, unsupported semantics, ambiguity, non-round-trip behavior, or review requirements during adapter conversion”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 MappingArtifact：MappingTestResult（semantic kind=information、バックボーン MappingTestResult-is_a-MappingArtifact）；ConversionWarning（semantic kind=information、バックボーン ConversionWarning-is_a-MappingArtifact）。両端条件：MappingTestResult の条件：「写像試験結果は写像情報成果物の一種であり、次の条件で区別されます：MappingTestResult は被試験規則・出典／対象版・入力・期待／実出力・exact/lossy/unsupported 分類・往復比較・合否・実行時刻・証拠を記録する MappingArtifact で、規則を検証し代替しません」；ConversionWarning の条件：「写像情報成果物に属する変換警告は、次の事実を種差とします：それはアダプタ変換のガバナンスイベントで、写像中の変換損失、近似、未対応意味、曖昧さ、非往復性、レビュー要件を記録します」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-mapping-test-result-008
      - claim-mapping-test-result-009
parent_relation:
  id: MappingTestResult-is_a-MappingArtifact
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 映射测试结果 是一种 映射信息产物。区分特征：JSON Schema 测试套件和 XState/SCXML 映射文档都要求以具体输入输出验证表示转换，支持独立测试结果产物。
    en: "mapping test result is a kind of mapping artifact. Reviewed differentia: The JSON Schema test suite and XState/SCXML mapping documentation both require representation conversion to be checked against concrete inputs and outputs, supporting a distinct test-result artifact."
    ja: 写像試験結果 は 写像情報成果物 の一種です。審査済みの種差：JSON Schema 試験群と XState/SCXML 写像文書はいずれも具体的入出力で表現変換を検証することを求め、独立試験結果成果物を支持します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MappingTestResult-is_a-MappingArtifact-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种人工正例
        en: Reviewed positive case for is a
        ja: の一種であるの審査済み正例
      scenario_id: null
      descriptions:
        zh: 结果 `test-a2a-task-17` 保存 fixture、MappingRule 版本、输入、期望 Execution 字段、实际字段、差异和 pass 状态，可独立复查。
        en: Result `test-a2a-task-17` stores the fixture, MappingRule version, input, expected Execution fields, actual fields, diff, and pass state for independent review.
        ja: result `test-a2a-task-17` は fixture、MappingRule 版、入力、期待 Execution 項目、実項目、diff、pass 状態を保存し再検証できます。
      field_values: {}
      related_node_ids:
        - MappingTestResult
        - MappingArtifact
      related_relation_ids:
        - MappingTestResult-is_a-MappingArtifact
      expected_result:
        zh: 该记录应成为 MappingTestResult，并继承 MappingArtifact 的持久信息属性。
        en: The record is classified as MappingTestResult and inherits MappingArtifact's persistent-information properties.
        ja: この記録は MappingTestResult に分類され、MappingArtifact の永続情報属性を継承します。
      why_valid_or_invalid:
        zh: 它记录一次已完成验证的输入、预期与实际证据，而不是执行该转换的活动。
        en: It records completed validation evidence—input, expected, and actual—rather than the conversion activity itself.
        ja: 完了した検証の入力・期待・実際証拠を記録し、変換活動そのものではないためです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-mapping-test-result-010
    - id: MappingTestResult-is_a-MappingArtifact-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种人工边界例
        en: Reviewed boundary case for is a
        ja: の一種であるの審査済み境界例
      scenario_id: null
      descriptions:
        zh: "`SchemaProjectionRun` 具有开始时间、结束时间和运行状态，但没有 fixture、期望值或比较结果；它是活动，不是测试结果信息。"
        en: "`SchemaProjectionRun` has start, end, and run state but no fixture, expectation, or comparison result; it is an activity, not test-result information."
