source_claims:
  - id: claim-mapping-test-result-001
    source: eng-val-shacl
    supports: "MappingTestResult's result/report separation is informed by SHACL: an individual ValidationResult records focus, path, source constraint, severity, and message, while the enclosing report carries overall conformance. Moonweave adds mapping input/output comparison."
    locator: SHACL §3.6 Validation Report and Validation Result
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-mapping-test-result-002
    source: eng-val-jsonschema-test-suite
    supports: The JSON Schema Test Suite grounds MappingTestResult's case-level expected-versus-observed discipline through schemas, input data, expected validity, and implementation harnesses. Rule identity, round-trip comparison, and conversion warnings are Moonweave extensions.
    locator: README > Test case format, optional tests, and implementation harnesses
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-mapping-test-result-003
    source: eng-val-jsonschema-test-suite
    supports: The JSON Schema Test Suite binds schemas and input data to expected validity outcomes and executes them through implementation harnesses; mapping-test-result-reproducible extends that case discipline to transformed output.
    locator: README > Test case format and implementation harnesses
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-mapping-test-result-004
    source: eng-proto-a2a-spec
    supports: MappingTestResult-example-positive-001 uses the A2A Task model's id, contextId, status, artifacts, and extension-bearing data as the fixed source input; target expectations and lossy comparison are Moonweave test design.
    locator: Specification > Data model > Task, TaskStatus, Artifact, and extension fields
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-mapping-test-result-005
    source: eng-val-jsonschema-test-suite
    supports: The JSON Schema Test Suite represents a case with schema, input data, and expected validity and runs it across implementations. MappingTestResult-example-positive-001 extends that expected-versus-observed pattern with mapping versions and output digests.
    locator: README > Test case format and running tests
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-mapping-test-result-006
    source: eng-val-shacl
    supports: SHACL distinguishes an individual ValidationResult diagnostic from the ValidationReport containing it; MappingTestResult-example-boundary-001 analogously keeps ConversionWarning distinct from the enclosing test result.
    locator: SHACL §3.6.1 Validation Report and §3.6.2 Validation Result
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-mapping-test-result-007
    source: eng-val-jsonschema-test-suite
    supports: A JSON Schema test case includes both input data and an expected validity outcome; MappingTestResult-example-boundary-001 therefore rejects a warning-only record that lacks case execution and comparison.
    locator: "README > Test case schema: data and valid fields"
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-mapping-test-result-008
    source: eng-state-xstate-scxml
    supports: XState documents importing SCXML into an executable machine and describes its SCXML compatibility boundary. Verifying such a conversion requires a fixed input and an observed machine or behavior, which supports the case-level role of MappingTestResult. XState does not define Moonweave's result schema or the separate ConversionWarning artifact.
    locator: XState SCXML documentation > Importing SCXML; SCXML compatibility
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-mapping-test-result-009
    source: eng-val-pydantic-json-schema
    supports: Pydantic documents mode-dependent JSON Schema output, generator customization, and unrepresentable types. Those are conditions where a conversion can complete with changed semantics or fail for a specific feature, supporting a diagnostic ConversionWarning rather than a pass/fail test observation. Moonweave defines the sibling hierarchy and warning payload.
    locator: Pydantic JSON Schema > Validation and serialization modes; Customizing the JSON Schema generation process; JSON schema types
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-mapping-test-result-010
    source: eng-val-jsonschema-test-suite
    supports: The JSON Schema Test Suite represents reproducible cases with schema, data, and expected validity and supports implementation result reporting. This evidence supports persistent MappingTestResult records as MappingArtifact information rather than runtime executions.
    locator: README > Test case format and implementation result reporting
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-mapping-test-result-011
    source: eng-val-jsonschema-test-suite
    supports: The JSON Schema Test Suite distinguishes expected outcomes and optional or unsupported behavior in result collection. That supports a MappingTestResult reporting the exact ConversionWarning observed while exercising one mapping fixture.
    locator: README > Expected outcomes, optional tests, and result collection
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-mapping-test-result-012
    source: eng-val-jsonschema-test-suite
    supports: The JSON Schema Test Suite makes conformance evidence reproducible by binding a schema, data instance, and expected outcome. That test-evidence model supports MappingTestResult verifying one identified MappingRule version when transformation and declared-loss assertions both pass.
    locator: README > Test case schema, expected validity, and running the suite
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
