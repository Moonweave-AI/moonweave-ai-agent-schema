      en: MappingTestResult verifies a MappingRule only when it names a determinate rule version and its fixture passes assertions for source, target, direction, transformed output, and declared loss; unrelated schema validity or another rule cannot establish this relation.
      ja: MappingTestResult は特定 MappingRule 版を指し、source、target、direction、変換出力、宣言損失の fixture 断言がすべて通る場合だけその規則を verifies します。無関係な schema validity や別規則では成立しません。
