source_claims:
  - id: claim-coverage-report-001
    source: eng-val-shacl
    supports: "CoverageReport adopts SHACL's aggregate-report pattern: a report has one conformance outcome and links every individual result. Mapping coverage classes, inventory denominator, and release-gate semantics are Moonweave specializations."
    locator: SHACL §3.6.1 Validation Report and sh:result membership
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-coverage-report-002
    source: eng-val-jsonschema-test-suite
    supports: CoverageReport also draws on the JSON Schema Test Suite's versioned and enumerable corpus organization, which makes a denominator and per-case result references possible. Exact/lossy/unsupported categories remain Moonweave design choices.
    locator: README > Suite layout, draft directories, and test case schema
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-coverage-report-003
    source: eng-val-shacl
    supports: SHACL ValidationReport links every ValidationResult and carries an overall conforms value; coverage-counts-reconcile adapts report membership and overall outcome to mapping inventory accounting.
    locator: "SHACL §3.6.1 Validation Report: conforms and result"
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-coverage-report-004
    source: eng-val-shacl
    supports: CoverageReport-example-positive-001 follows SHACL's separation of a ValidationReport aggregate from its individual ValidationResult members and its explicit conforms outcome; Moonweave adds mapping coverage categories and release gates.
    locator: "SHACL §3.6.1 Validation Report: conforms and result"
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-coverage-report-005
    source: eng-val-jsonschema-test-suite
    supports: The JSON Schema Test Suite organizes cases by draft and optional vocabulary, giving CoverageReport-example-positive-001 a precedent for a versioned, enumerable test inventory whose results can be reconciled.
    locator: README > Test suite structure, drafts, and optional tests
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-coverage-report-006
    source: eng-val-shacl
    supports: SHACL distinguishes one ValidationResult, which carries focus/path/severity, from the containing ValidationReport. CoverageReport-example-boundary-001 applies that result-versus-aggregate distinction.
    locator: SHACL §3.6.1 Validation Report and §3.6.2 Validation Result
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-coverage-report-007
    source: eng-val-jsonschema-test-suite
    supports: A single JSON Schema test case is not suite coverage; the suite's directory and draft organization support CoverageReport-example-boundary-001's requirement for an explicit inventory denominator.
    locator: README > Test case format and suite directory organization
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-coverage-report-008
    source: eng-val-jsonschema-test-suite
    supports: The JSON Schema Test Suite stores individual schemas, data instances, and expected validity outcomes and runs those cases through implementation harnesses. A MappingTestResult corresponds to one reproducible case observation; a CoverageReport aggregates which declared cases or constructs were exercised. The aggregate artifact and its exact counters are Moonweave additions.
    locator: JSON Schema Test Suite README > Test structure; Running the Test Suite; Optional tests
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-coverage-report-009
    source: eng-val-jsonschema-test-suite
    supports: The JSON Schema Test Suite organizes conformance cases by draft and feature and distinguishes optional coverage. That structure supports a persistent CoverageReport summarizing what a mapping contract has and has not exercised; Moonweave defines it as a MappingArtifact subtype.
    locator: README > Test suite structure, optional tests, and supported drafts
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-coverage-report-010
    source: eng-val-jsonschema-test-suite
    supports: The JSON Schema Test Suite groups cases by supported draft and feature so implementation results can be summarized against a defined test inventory. This supports linking CoverageReport to the exact MappingRule versions included in its denominator.
    locator: README > Running tests by draft and collecting implementation results
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
