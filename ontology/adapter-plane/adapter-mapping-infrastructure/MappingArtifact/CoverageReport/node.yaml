schema: moonweave.ai/ontology-node/v1
id: CoverageReport
kind: concept
status: accepted
labels:
  zh: 映射覆盖报告
  en: mapping coverage report
  ja: 写像網羅率報告
semantics:
  short_definition:
    zh: 映射覆盖报告是按声明构造清单汇总适配器版本映射与测试覆盖情况的 MappingArtifact。
    en: A CoverageReport is a MappingArtifact that aggregates mapping and test coverage for one adapter version against a declared construct inventory.
    ja: CoverageReport は、宣言済み構成一覧に対する一つの Adapter 版の写像・試験網羅を集計する MappingArtifact です。
  definition:
    zh: 映射覆盖报告是一种聚合型映射信息产物，固定一个 Adapter 版本、外部规范版本、本体版本和可枚举构造清单作为分母，分别统计 exact、lossy、unsupported、unmapped 与 untested 数量，并引用对应 MappingRule 和 MappingTestResult。报告必须说明生成时间和发布门禁结论；它不证明单条映射正确，也不能用百分比掩盖阻断性缺口。
    en: A CoverageReport is an aggregate mapping artifact that fixes an Adapter version, external specification version, ontology version, and enumerable construct inventory as its denominator. It counts exact, lossy, unsupported, unmapped, and untested members and references the relevant MappingRule and MappingTestResult records. It records generation time and a release-gate conclusion. It neither proves an individual mapping correct nor lets a percentage hide blocking gaps.
    ja: CoverageReport は Adapter 版・外部仕様版・本体版・列挙可能な構成一覧を分母として固定し、exact・lossy・unsupported・unmapped・untested を別々に集計し、関連 MappingRule／MappingTestResult を参照する集計成果物です。生成時刻と公開ゲート結論を持ち、割合だけで個別正当性や阻断欠落を隠しません。
  why_needed:
    zh: 没有明确分母和分类计数，“已支持”容易只覆盖常见路径。覆盖报告让发布者与使用者看到未映射、未测试和有损构造，并能从聚合数回溯到规则、测试和警告。
    en: Without an explicit denominator and categorized counts, 'supported' can mean only common paths were covered. The report exposes unmapped, untested, and lossy constructs and lets each aggregate count be traced back to rules, tests, and warnings.
    ja: 分母と分類数がなければ「対応済み」が主要経路だけを意味し得ます。報告は unmapped・untested・lossy を可視化し、集計から規則・試験・警告へ追跡可能にします。
  includes:
    - zh: 纳入固定适配器/外部规范/本体版本和构造清单分母，给出互斥覆盖分类、相关证据、已知缺口及门禁结论的版本化聚合报告。
      en: Includes versioned aggregate reports that fix adapter, external-specification, ontology versions and an inventory denominator, then provide mutually exclusive coverage classes, linked evidence, known gaps, and a gate conclusion.
      ja: Adapter・外部仕様・本体の版と一覧分母を固定し、排他的網羅分類、関連証拠、既知欠落、ゲート結論を示す版付き集計報告を含みます。
  excludes:
    - zh: 不纳入单项 ConversionWarning、单案例 MappingTestResult、只列规则而没有分母的清单、没有固定版本的仪表盘快照，以及把 lossy 与 exact 合并为“covered”的虚高指标。
      en: Excludes an individual ConversionWarning, a case-level MappingTestResult, a rule list with no denominator, an unversioned dashboard snapshot, and inflated metrics that merge lossy with exact under a single 'covered' count.
      ja: 個別 ConversionWarning、事例単位 MappingTestResult、分母のない規則一覧、版を固定しない画面スナップショット、および lossy と exact を単一 covered 数へ合算する指標を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: adapter_version_ref
      labels:
        zh: 适配器版本引用
        en: adapter version reference
        ja: Adapter 版参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 报告所评估的唯一 Adapter 版本。
        en: Single Adapter version evaluated by the report.
        ja: 報告が評価する一つの Adapter 版です。
      allowed_values: []
      pattern: null
      example_value: adapter-a2a@2.0.0
      source_claims: []
    - id: external_spec_version
      labels:
        zh: 外部规范版本
        en: external specification version
        ja: 外部仕様版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 构造清单依据的外部规范发布版或不可变快照。
        en: External specification release or immutable snapshot used for the construct inventory.
        ja: 構成一覧の根拠となる外部仕様リリースまたは不変スナップショットです。
      allowed_values: []
      pattern: null
      example_value: a2a-spec-snapshot-2026-07-15
      source_claims: []
    - id: ontology_version
      labels:
        zh: 本体版本
        en: ontology version
        ja: 本体版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 作为映射目标或来源的 Moonweave 本体版本。
        en: Moonweave ontology version used as mapping source or target.
        ja: 写像元または対象となる Moonweave 本体版です。
      allowed_values: []
      pattern: null
      example_value: 2.0.0
      source_claims: []
    - id: inventory_id
      labels:
        zh: 构造清单标识
        en: construct inventory ID
        ja: 構成一覧 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定覆盖率分母的可枚举外部构造清单。
        en: Enumerable external-construct inventory that fixes the coverage denominator.
        ja: 網羅率の分母を固定する列挙可能な外部構成一覧です。
      allowed_values: []
      pattern: null
      example_value: a2a-core-constructs-6@2026-07-15
      source_claims: []
    - id: classification_counts
      labels:
        zh: 分类计数
        en: classification counts
        ja: 分類数
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 互斥记录 exact、lossy、unsupported、unmapped 和 untested 数量。
        en: Mutually exclusive counts for exact, lossy, unsupported, unmapped, and untested members.
        ja: exact・lossy・unsupported・unmapped・untested の排他的件数です。
      allowed_values: []
      pattern: null
      example_value:
        exact: 2
        lossy: 3
        unsupported: 1
        unmapped: 0
        untested: 0
      source_claims: []
    - id: evidence_ids
      labels:
        zh: 逐项证据标识
        en: item evidence IDs
        ja: 項目証拠 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 支持各构造分类的 MappingTestResult 或 ConversionWarning 标识。
        en: MappingTestResult or ConversionWarning identifiers supporting each construct classification.
        ja: 各構成分類を裏付ける MappingTestResult または ConversionWarning ID です。
      allowed_values: []
      pattern: null
      example_value:
        - mapping-test-a2a-task-018
      source_claims: []
    - id: release_gate
      labels:
        zh: 发布门禁
        en: release gate
        ja: 公開ゲート
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 依据阻断缺口和项目阈值得出的 pass 或 fail 结论。
        en: Pass or fail conclusion derived from blocking gaps and project thresholds.
        ja: 阻断欠落とプロジェクト閾値から得る pass／fail 結論です。
      allowed_values: []
      pattern: null
      example_value: fail
      source_claims: []
  constraints:
    - id: coverage-counts-reconcile
      severity: error
      expression_language: plain
      expression: sum(classification_counts) equals the immutable inventory member count and every member has item evidence
      explanations:
        zh: 分类必须互斥完备并逐项可追溯，不能以百分比隐藏未计入构造。
        en: Categories are mutually exclusive, exhaustive, and traceable per item; a percentage cannot hide omitted constructs.
        ja: 分類は排他的・網羅的で項目ごとに追跡でき、割合で未計上構成を隠してはなりません。
      source_claims:
        - claim-coverage-report-003
  required_relation_constraints: []
examples:
  - id: CoverageReport-example-positive-001
    kind: positive
    labels:
      zh: 映射覆盖报告正例
      en: Positive example of mapping coverage report
      ja: 写像網羅率報告の正例
    scenario_id: null
    descriptions:
      zh: "`coverage-a2a-adapter-2.0.0` 固定一份六项 A2A 构造清单以及 Moonweave 2.0.0：2 项 exact、3 项 lossy、1 项 unsupported，六项均有测试结果。报告逐项引用规则和结果，并因 unsupported 项为阻断级而给出 release_gate=`fail`。"
      en: "`coverage-a2a-adapter-2.0.0` fixes a six-item A2A construct inventory and Moonweave 2.0.0: 2 exact, 3 lossy, and 1 unsupported, with test results for all six. It references every rule and result and sets release_gate=`fail` because the unsupported member is blocking."
      ja: "`coverage-a2a-adapter-2.0.0` は六項目の A2A 構成一覧と Moonweave 2.0.0 を固定し、exact 2・lossy 3・unsupported 1、全六項目に試験結果を持ちます。各規則／結果を参照し、阻断級 unsupported により release_gate=`fail` とします。"
    field_values:
      artifact_id: coverage-a2a-adapter-2.0.0
      generated_at: 2026-07-15T00:00:00.000Z
      producer_id: adapter-coverage-gate@2
      related_rule_ids:
        - mapping-rule-a2a-task-lifecycle@4
      adapter_version_ref: adapter-a2a@2.0.0
      external_spec_version: a2a-spec-snapshot-2026-07-15
      ontology_version: 2.0.0
      inventory_id: a2a-core-constructs-6@2026-07-15
      classification_counts:
        exact: 2
        lossy: 3
        unsupported: 1
        unmapped: 0
        untested: 0
      evidence_ids:
        - mapping-test-a2a-task-018
        - CW-A2A-EXT-001
      release_gate: fail
    related_node_ids:
      - CoverageReport
      - MappingRule
    related_relation_ids:
      - CoverageReport-summarizes-MappingRule
    expected_result:
      zh: 该运行可查询 CoverageReport 以及方向保持不变的事实 CoverageReport-summarizes-MappingRule。
      en: The run can query CoverageReport together with direction-preserving fact CoverageReport-summarizes-MappingRule.
      ja: この実行では CoverageReport と方向を保持した事実 CoverageReport-summarizes-MappingRule を共に照会できます。
    why_valid_or_invalid:
      zh: 分母、版本和分类互相闭合，计数可回溯到逐项证据，且门禁没有被总体测试率掩盖；因此这是可审计覆盖报告。
      en: Denominator, versions, and categories reconcile; each count traces to item-level evidence, and the gate is not hidden by the overall test rate. That makes the aggregate an auditable coverage report.
      ja: 分母・版・分類が整合し、各数値を項目証拠へ追跡でき、総試験率でゲートを隠さないため、監査可能な網羅報告です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-coverage-report-004
      - claim-coverage-report-005
  - id: CoverageReport-example-boundary-001
    kind: boundary
    labels:
      zh: 映射覆盖报告边界例
      en: Boundary case for mapping coverage report
      ja: 写像網羅率報告の境界例
    scenario_id: null
    descriptions:
      zh: "`CW-ZOD-DATE-001` 只说明一个 `z.date()` 构造不可表示，含路径、严重度和修复建议；它没有适配器版本的构造清单分母或覆盖分类计数，所以是 ConversionWarning，不是 CoverageReport。"
      en: "`CW-ZOD-DATE-001` describes one unrepresentable `z.date()` construct with path, severity, and remediation. It has no construct-inventory denominator or categorized counts for an adapter version, so it is a ConversionWarning, not a CoverageReport."
      ja: "`CW-ZOD-DATE-001` は一つの `z.date()` 表現不能をパス・重大度・修正策付きで示しますが、Adapter 版の一覧分母や分類数を持たないため ConversionWarning で、CoverageReport ではありません。"
    field_values: {}
    related_node_ids:
      - CoverageReport
      - MappingRule
      - ConversionWarning
    related_relation_ids:
      - CoverageReport-summarizes-MappingRule
    expected_result:
      zh: ConversionWarning 保持其原有类型，验证器不得凭关系共现把它提升为 CoverageReport。
      en: ConversionWarning retains its own type; validation must not promote it to CoverageReport from relation co-occurrence.
      ja: ConversionWarning は元の型を維持し、関係の共起だけで CoverageReport へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 引用单项警告不等于完成清单汇总；CoverageReport 的必要条件是固定分母、版本、互斥分类和聚合门禁。
      en: Referencing one warning is not inventory aggregation. CoverageReport requires a fixed denominator, versions, mutually exclusive categories, and an aggregate gate.
      ja: 個別警告の参照は一覧集計ではなく、CoverageReport には固定分母・版・排他的分類・集計ゲートが必要です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-coverage-report-006
      - claim-coverage-report-007
external_mappings: []
applicability:
  - adapter
sibling_differentiation:
  - sibling_concept_id: MappingTestResult
    shared_parent_concept_id: MappingArtifact
    differentia:
      zh: 正向身份比较：父节点 MappingArtifact：CoverageReport（semantic kind=information，骨架 CoverageReport-is_a-MappingArtifact）；MappingTestResult（semantic kind=information，骨架 MappingTestResult-is_a-MappingArtifact）。双端条件：CoverageReport 条件：“映射覆盖报告是一种映射信息产物；其区分条件是：它是一种 MappingArtifact，针对明确的 Adapter、外部版本和 canonical 版本，汇总构造总数、已映射数、exact/lossy/unsupported/untested 数、测试结果引用、已知空白和发布门禁；它是聚合报告，不替代单条规则或测试结果”；MappingTestResult 条件：“映射测试结果是以如下事实为区分特征的映射信息产物：它是一种 MappingArtifact，记录被测规则、源/目标版本、测试输入、预期与实际输出、exact/lossy/unsupported 分类、往返比较、通过状态、执行时间和证据；它验证规则而不是替代规则”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent MappingArtifact: CoverageReport (semantic kind=information, backbone CoverageReport-is_a-MappingArtifact); MappingTestResult (semantic kind=information, backbone MappingTestResult-is_a-MappingArtifact). Endpoint conditions: CoverageReport condition: “As a mapping artifact, Mapping coverage report is distinguished by the fact that it is a CoverageReport is a MappingArtifact for a specified Adapter, external version, and canonical version”; MappingTestResult condition: “Mapping test result is a mapping artifact; its differentiating condition is that it is a MappingArtifact recording the tested rule, source and target versions, test input, expected and actual output, exact/lossy/unsupported classification, round-trip comparison, pass status, execution time, and evidence”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 MappingArtifact：CoverageReport（semantic kind=information、バックボーン CoverageReport-is_a-MappingArtifact）；MappingTestResult（semantic kind=information、バックボーン MappingTestResult-is_a-MappingArtifact）。両端条件：CoverageReport の条件：「写像情報成果物に属する写像網羅率報告は、次の事実を種差とします：CoverageReport は特定 Adapter・外部版・canonical 版について構成総数・写像数・exact/lossy/unsupported/untested 数・試験結果参照・既知空白・公開ゲートを集計する MappingArtifact で、個別規則・試験結果を代替しません」；MappingTestResult の条件：「写像試験結果は写像情報成果物の一種であり、次の条件で区別されます：MappingTestResult は被試験規則・出典／対象版・入力・期待／実出力・exact/lossy/unsupported 分類・往復比較・合否・実行時刻・証拠を記録する MappingArtifact で、規則を検証し代替しません」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-coverage-report-008
parent_relation:
  id: CoverageReport-is_a-MappingArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 映射覆盖报告 是一种 映射信息产物。区分特征：规范测试套件和生产本体工程都需要版本化覆盖与缺口证据；该报告将其固定为可审计聚合产物。
    en: "mapping coverage report is a kind of mapping artifact. Reviewed differentia: Standards test suites and production ontology engineering both require versioned coverage and gap evidence; this report makes it an auditable aggregate artifact."
    ja: 写像網羅率報告 は 写像情報成果物 の一種です。審査済みの種差：標準試験群と本番本体工程はいずれも版付き網羅・空白証拠を要し、本報告が監査可能な集計成果物として固定します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: CoverageReport-is_a-MappingArtifact-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种人工正例
        en: Reviewed positive case for is a
        ja: の一種であるの審査済み正例
      scenario_id: null
      descriptions:
        zh: 报告 `coverage-a2a-1.0` 按 A2A Task、Message、Artifact 和 security scheme 列出 exact、lossy、unsupported 与 untested 数量，并绑定规则集和测试批次。
        en: Report `coverage-a2a-1.0` lists exact, lossy, unsupported, and untested counts for A2A Task, Message, Artifact, and security schemes and binds the rule set and test batch.
        ja: report `coverage-a2a-1.0` は A2A Task、Message、Artifact、security scheme ごとの exact・lossy・unsupported・untested 件数と規則集合・試験 batch を記録します。
      field_values: {}
      related_node_ids:
        - CoverageReport
        - MappingArtifact
      related_relation_ids:
        - CoverageReport-is_a-MappingArtifact
      expected_result:
        zh: 该文档应归为 CoverageReport，并继承 MappingArtifact 的可引用身份。
        en: The document is classified as CoverageReport and inherits MappingArtifact's referenceable identity.
        ja: この文書は CoverageReport に分類され、MappingArtifact の参照可能識別を継承します。
      why_valid_or_invalid:
        zh: 它聚合一组映射对象的覆盖状态并可独立保存，不是一次测试的布尔结果。
        en: It aggregates coverage state across mapped constructs and is independently persistent, rather than one test's boolean result.
        ja: 複数写像構成の coverage 状態を集約し独立保存でき、一試験の真偽値ではないためです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-coverage-report-009
    - id: CoverageReport-is_a-MappingArtifact-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种人工边界例
        en: Reviewed boundary case for is a
        ja: の一種であるの審査済み境界例
      scenario_id: null
      descriptions:
        zh: 单个 fixture `task-status-working` 的断言通过，只说明一条用例；没有规则全集、分母或未测试清单。
        en: One fixture assertion for `task-status-working` passes, but it has no complete rule set, denominator, or untested inventory.
        ja: 一つの fixture `task-status-working` が通っても、全規則集合、分母、未試験一覧がありません。
      field_values: {}
      related_node_ids:
        - CoverageReport
        - MappingArtifact
      related_relation_ids:
        - CoverageReport-is_a-MappingArtifact
      expected_result:
        zh: 该记录应保持 MappingTestResult，不能提升为 CoverageReport。
        en: The record remains MappingTestResult and is not promoted to CoverageReport.
        ja: この記録は MappingTestResult のままで CoverageReport に昇格しません。
      why_valid_or_invalid:
        zh: 覆盖报告回答整体覆盖范围，单测结果只回答一个期望是否满足。
        en: CoverageReport answers aggregate coverage; one test result answers whether one expectation held.
        ja: CoverageReport は全体 coverage を答え、一試験結果は一期待の成否だけを答えます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-coverage-report-009
  source_claims:
    - claim-coverage-report-009
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
