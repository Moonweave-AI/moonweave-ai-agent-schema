schema: moonweave.ai/ontology-node/v1
id: ConversionWarning
kind: concept
status: accepted
labels:
  zh: 转换警告
  en: conversion warning
  ja: 変換警告
semantics:
  short_definition:
    zh: 转换警告是记录一次适配转换中语义损失、歧义或不支持特性的诊断型 MappingArtifact。
    en: A ConversionWarning is a diagnostic MappingArtifact recording semantic loss, ambiguity, or an unsupported feature in one adapter conversion.
    ja: ConversionWarning は、一回の Adapter 変換で生じた意味損失・曖昧さ・未対応機能を記録する診断型 MappingArtifact です。
  definition:
    zh: 转换警告是一种诊断型映射信息产物，由具体的适配转换或映射测试产生，指出受影响的 MappingRule、源路径、目标路径、损失类别、严重度和可执行处置。它表达“转换完成但存在需知悉的语义差异”或“该特性无法转换”，不是异常事件本身，也不是测试是否通过的汇总结论。
    en: A ConversionWarning is a diagnostic mapping artifact produced by a concrete adapter conversion or mapping test. It identifies the affected MappingRule, source and target paths, loss category, severity, and actionable disposition. It says either that conversion completed with a material semantic difference or that a feature could not be converted. It is not the exception event itself and not the aggregate pass/fail conclusion of a test.
    ja: ConversionWarning は具体的な Adapter 変換または写像試験が生成する診断成果物で、対象 MappingRule、出典／対象パス、損失分類、重大度、対処を示します。「差分を伴い変換した」または「変換不能」を表し、例外イベントそのものでも試験全体の合否結論でもありません。
  why_needed:
    zh: 若有损和不支持语义只出现在日志文本里，发布门禁无法定位受影响规则，也无法区分可接受近似与阻断性缺失。结构化警告使人工复核、覆盖汇总和迁移决策共享同一诊断事实。
    en: If loss and unsupported semantics exist only in log prose, release gates cannot locate the affected rule or distinguish an acceptable approximation from a blocking gap. Structured warnings give review, coverage aggregation, and migration decisions one shared diagnostic fact.
    ja: 損失や未対応がログ文だけでは、公開ゲートが対象規則を特定できず、許容近似と阻断欠落も区別できません。構造化警告は審査・網羅集計・移行判断に共通診断事実を提供します。
  includes:
    - zh: 纳入绑定具体转换或测试、相关规则、诊断代码、严重度、受影响路径、损失类别和处置建议的有损、歧义、不支持或不可往返记录。
      en: Includes lossy, ambiguous, unsupported, or non-round-trip records bound to a concrete conversion or test, related rule, diagnostic code, severity, affected path, loss category, and disposition.
      ja: 具体的変換／試験、関連規則、診断コード、重大度、対象パス、損失分類、対処に結び付く lossy・ambiguous・unsupported・non-round-trip 記録を含みます。
  excludes:
    - zh: 不纳入聚合多个规则的 CoverageReport、带预期与实际输出的 MappingTestResult、抛出的 Exception/ErrorEvent、普通日志行，以及没有具体受影响语义的泛化提示。
      en: Excludes a CoverageReport aggregating many rules, a MappingTestResult with expected and actual outputs, a thrown Exception or ErrorEvent, ordinary log lines, and generic notices that identify no affected meaning.
      ja: 複数規則を集計する CoverageReport、期待／実出力を持つ MappingTestResult、Exception／ErrorEvent、通常ログ、および対象意味を特定しない一般通知を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: warning_code
      labels:
        zh: 警告代码
        en: warning code
        ja: 警告コード
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 供门禁、检索和处置规则稳定匹配的诊断代码。
        en: Stable diagnostic code used by gates, queries, and remediation rules.
        ja: ゲート・照会・対処規則が安定照合する診断コードです。
      allowed_values: []
      pattern: null
      example_value: UNREPRESENTABLE_SOURCE_TYPE
      source_claims: []
    - id: severity
      labels:
        zh: 严重度
        en: severity
        ja: 重大度
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 诊断对发布或运行的影响等级。
        en: Impact level of the diagnostic on release or execution.
        ja: 診断が公開または実行へ与える影響度です。
      allowed_values: []
      pattern: null
      example_value: error
      source_claims: []
    - id: loss_kind
      labels:
        zh: 损失类别
        en: loss kind
        ja: 損失分類
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分 lossy、ambiguous、unsupported 或 non-round-trip。
        en: Classifies the difference as lossy, ambiguous, unsupported, or non-round-trip.
        ja: 差分を lossy・ambiguous・unsupported・non-round-trip に分類します。
      allowed_values: []
      pattern: null
      example_value: unsupported
      source_claims: []
    - id: source_path
      labels:
        zh: 源路径
        en: source path
        ja: 出典パス
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 出现差异的源构造路径。
        en: Path of the source construct where the difference occurs.
        ja: 差分が生じた出典構成のパスです。
      allowed_values: []
      pattern: null
      example_value: $.properties.createdAt
      source_claims: []
    - id: target_path
      labels:
        zh: 目标路径
        en: target path
        ja: 対象パス
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 已生成或本应生成对应值的目标路径。
        en: Target path where a corresponding value was or should have been produced.
        ja: 対応値が生成された、または生成されるべき対象パスです。
      allowed_values: []
      pattern: null
      example_value: $.properties.createdAt
      source_claims: []
    - id: disposition
      labels:
        zh: 处置建议
        en: disposition
        ja: 対処
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 接受、人工复核、修改规则或阻断发布等可执行处置。
        en: Actionable disposition such as accept, review, revise the rule, or block release.
        ja: accept・review・規則修正・公開阻断など実行可能な対処です。
      allowed_values: []
      pattern: null
      example_value: replace z.date() with an ISO date-time string before projection
      source_claims: []
  constraints:
    - id: conversion-warning-actionable
      severity: error
      expression_language: plain
      expression: warning_code, severity, loss_kind, source_path, and disposition are present
      explanations:
        zh: 警告必须能定位、分类并驱动处置，不能只是自由文本。
        en: A warning must be locatable, classifiable, and actionable rather than free-form prose.
        ja: 警告は自由文だけでなく、位置特定・分類・対処可能でなければなりません。
      source_claims:
        - claim-conversion-warning-003
  required_relation_constraints: []
examples:
  - id: ConversionWarning-example-positive-001
    kind: positive
    labels:
      zh: 转换警告正例
      en: Positive example of conversion warning
      ja: 変換警告の正例
    scenario_id: null
    descriptions:
      zh: Zod 4 投影规则在 `$.properties.createdAt` 遇到 `z.date()`。记录 `CW-ZOD-DATE-001`，loss_kind=`unsupported`、severity=`error`，关联 `ZodProfileAdapter` 和具体规则，并建议改用带 `date-time` 格式的 ISO 字符串；不会静默输出宽泛空 schema。
      en: A Zod 4 projection rule encounters `z.date()` at `$.properties.createdAt`. Record `CW-ZOD-DATE-001` with loss_kind=`unsupported` and severity=`error`, link the ZodProfileAdapter and exact rule, and recommend an ISO string with `date-time` format instead of silently emitting an unconstrained schema.
      ja: Zod 4 投影規則が `$.properties.createdAt` の `z.date()` に遭遇し、`CW-ZOD-DATE-001` を loss_kind=`unsupported`、severity=`error` として記録します。ZodProfileAdapter と規則を結び、無制約 schema を黙って出さず ISO `date-time` 文字列を提案します。
    field_values:
      artifact_id: CW-ZOD-DATE-001
      generated_at: 2026-07-15T00:00:00.000Z
      producer_id: zod-profile-adapter@4
      related_rule_ids:
        - zod-date-to-jsonschema@1
      warning_code: UNREPRESENTABLE_SOURCE_TYPE
      severity: error
      loss_kind: unsupported
      source_path: $.properties.createdAt
      target_path: $.properties.createdAt
      disposition: replace z.date() with an ISO date-time string before projection
    related_node_ids:
      - ConversionWarning
      - Adapter
    related_relation_ids:
      - ConversionWarning-warns_about-Adapter
    expected_result:
      zh: 该运行可查询 ConversionWarning 以及方向保持不变的事实 ConversionWarning-warns_about-Adapter。
      en: The run can query ConversionWarning together with the direction-preserving fact ConversionWarning-warns_about-Adapter.
      ja: この実行では ConversionWarning と方向を保持した事実 ConversionWarning-warns_about-Adapter を共に照会できます。
    why_valid_or_invalid:
      zh: 该记录定位到单个不可表示类型，给出损失类别、严重度、受影响适配器和修复路径；它是可处置诊断，而不是笼统的转换失败消息。
      en: The record locates one unrepresentable type and supplies loss class, severity, affected adapter, and remediation. It is an actionable diagnostic rather than a generic conversion-failed message.
      ja: 一つの表現不能型を特定し、損失分類・重大度・対象 Adapter・修正策を示すため、一般的失敗文ではなく対処可能な診断です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-conversion-warning-004
      - claim-conversion-warning-005
  - id: ConversionWarning-example-boundary-001
    kind: boundary
    labels:
      zh: 转换警告边界例
      en: Boundary case for conversion warning
      ja: 変換警告の境界例
    scenario_id: null
    descriptions:
      zh: 报告 `coverage-zod4-2026-07` 汇总 84 个构造中 3 个 unsupported、5 个 lossy，但没有诊断代码、源路径或针对单次转换的处置。它是 CoverageReport；即使引用 `CW-ZOD-DATE-001`，也不是 ConversionWarning。
      en: Report `coverage-zod4-2026-07` aggregates 3 unsupported and 5 lossy constructs out of 84 but has no diagnostic code, source path, or disposition for one conversion. It is a CoverageReport; citing `CW-ZOD-DATE-001` does not make the aggregate a ConversionWarning.
      ja: "`coverage-zod4-2026-07` は 84 構成中 unsupported 3・lossy 5 を集計しますが、単一変換の診断コード・出典パス・対処を持ちません。警告を引用しても CoverageReport のままです。"
    field_values: {}
    related_node_ids:
      - ConversionWarning
      - Adapter
      - CoverageReport
    related_relation_ids:
      - ConversionWarning-warns_about-Adapter
    expected_result:
      zh: CoverageReport 保持其原有类型，验证器不得凭关系共现把它提升为 ConversionWarning。
      en: CoverageReport retains its own type; validation must not promote it to ConversionWarning from relation co-occurrence.
      ja: CoverageReport は元の型を維持し、関係の共起だけで ConversionWarning へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 单项诊断回答“哪个构造出了什么问题、如何处置”，覆盖报告回答“一个版本整体覆盖多少”；共同上位类不意味着二者可以互换。
      en: A diagnostic answers which construct has what problem and how to handle it; a coverage report answers how much of a version is covered. Their common superclass does not make them interchangeable.
      ja: 警告は「どの構成に何の問題がありどう対処するか」、網羅報告は「版全体をどれだけ覆うか」に答え、共通上位でも交換できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-conversion-warning-006
      - claim-conversion-warning-007
external_mappings: []
applicability:
  - adapter
sibling_differentiation:
  - sibling_concept_id: CoverageReport
    shared_parent_concept_id: MappingArtifact
    differentia:
      zh: 已审查兄弟区分：父节点 MappingArtifact：ConversionWarning（semantic kind=information，骨架 ConversionWarning-is_a-MappingArtifact）；CoverageReport（semantic kind=information，骨架 CoverageReport-is_a-MappingArtifact）。双端条件：ConversionWarning 条件：“转换警告是一种映射信息产物；其区分条件是：它是适配转换治理事件，记录映射过程中的转换损失、近似、不支持语义、歧义、非往返行为或需要人工审查的条件”；CoverageReport 条件：“映射覆盖报告是一种映射信息产物；其区分条件是：它是一种 MappingArtifact，针对明确的 Adapter、外部版本和 canonical 版本，汇总构造总数、已映射数、exact/lossy/unsupported/untested 数、测试结果引用、已知空白和发布门禁；它是聚合报告，不替代单条规则或测试结果”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent MappingArtifact: ConversionWarning (semantic kind=information, backbone ConversionWarning-is_a-MappingArtifact); CoverageReport (semantic kind=information, backbone CoverageReport-is_a-MappingArtifact). Endpoint conditions: ConversionWarning condition: “As a mapping artifact, Conversion warning is distinguished by the fact that it is a conversion governance event that records mapping loss, approximation, unsupported semantics, ambiguity, non-round-trip behavior, or review requirements during adapter conversion”; CoverageReport condition: “As a mapping artifact, Mapping coverage report is distinguished by the fact that it is a CoverageReport is a MappingArtifact for a specified Adapter, external version, and canonical version”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 MappingArtifact：ConversionWarning（semantic kind=information、バックボーン ConversionWarning-is_a-MappingArtifact）；CoverageReport（semantic kind=information、バックボーン CoverageReport-is_a-MappingArtifact）。両端条件：ConversionWarning の条件：「写像情報成果物に属する変換警告は、次の事実を種差とします：それはアダプタ変換のガバナンスイベントで、写像中の変換損失、近似、未対応意味、曖昧さ、非往復性、レビュー要件を記録します」；CoverageReport の条件：「写像情報成果物に属する写像網羅率報告は、次の事実を種差とします：CoverageReport は特定 Adapter・外部版・canonical 版について構成総数・写像数・exact/lossy/unsupported/untested 数・試験結果参照・既知空白・公開ゲートを集計する MappingArtifact で、個別規則・試験結果を代替しません」。一方の成立は他方を証明しません。
    source_claims:
      - claim-conversion-warning-008
      - claim-conversion-warning-009
parent_relation:
  id: ConversionWarning-is_a-MappingArtifact
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: 转换警告 是一种 映射信息产物。区分特征：转换警告是记录有损、歧义、不支持或不可往返语义的 MappingArtifact，不是适配器或映射活动。
    en: "conversion warning is a kind of mapping artifact. Reviewed differentia: ConversionWarning is a MappingArtifact recording lossy, ambiguous, unsupported, or non-round-trip semantics; it is neither an adapter nor a mapping activity."
    ja: 変換警告 は 写像情報成果物 の一種です。審査済みの種差：ConversionWarning は損失・曖昧・未対応・往復不能意味を記録する MappingArtifact で、アダプターや写像活動ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ConversionWarning-is_a-MappingArtifact-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种人工正例
        en: Reviewed positive case for is a
        ja: の一種であるの審査済み正例
      scenario_id: null
      descriptions:
        zh: 将自定义 Pydantic transform 投影到 JSON Schema 时，运行产生一条带 source_path、target_dialect、loss_kind 和处置建议的 ConversionWarning。
        en: Projecting a custom Pydantic transform to JSON Schema produces a ConversionWarning with source_path, target_dialect, loss_kind, and a remediation recommendation.
        ja: custom Pydantic transform を JSON Schema へ投影すると、source_path、target_dialect、loss_kind、対処提案を持つ ConversionWarning が生成されます。
      field_values: {}
      related_node_ids:
        - ConversionWarning
        - MappingArtifact
      related_relation_ids:
        - ConversionWarning-is_a-MappingArtifact
      expected_result:
        zh: 该记录应归为 ConversionWarning，并通过上位关系成为 MappingArtifact。
        en: The record is classified as ConversionWarning and therefore as MappingArtifact.
        ja: この記録は ConversionWarning、したがって MappingArtifact に分類されます。
      why_valid_or_invalid:
        zh: 它是一次映射产生且可保存、引用和审计的信息产物，并明确描述语义损失。
        en: It is persistent, referenceable, auditable information produced by mapping and explicitly describes semantic loss.
        ja: 写像が生成した保存・参照・監査可能な情報で、意味損失を明記するためです。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-conversion-warning-010
    - id: ConversionWarning-is_a-MappingArtifact-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种人工边界例
        en: Reviewed boundary case for is a
        ja: の一種であるの審査済み境界例
      scenario_id: null
      descriptions:
        zh: 控制台打印 `unsupported transform`，但没有规则 ID、来源路径、目标格式或处置状态；这只是非结构化日志行。
        en: A console line says `unsupported transform` but has no rule ID, source path, target format, or disposition; it is only an unstructured log line.
        ja: console に `unsupported transform` と出ても rule ID、source path、target format、処置状態がなければ非構造 log 行です。
      field_values: {}
      related_node_ids:
        - ConversionWarning
        - MappingArtifact
      related_relation_ids:
        - ConversionWarning-is_a-MappingArtifact
      expected_result:
        zh: 该日志不得直接归为 ConversionWarning，除非被结构化并关联映射运行。
        en: The log is not classified as ConversionWarning unless structured and linked to a mapping run.
        ja: この log は構造化され写像実行へ関連付くまで ConversionWarning に分類しません。
      why_valid_or_invalid:
        zh: 错误文字本身缺少 MappingArtifact 所需的稳定身份和可审计语境。
        en: Error text alone lacks the stable identity and auditable context required of MappingArtifact.
        ja: error 文字だけでは MappingArtifact に必要な安定識別と監査文脈がありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-conversion-warning-010
  source_claims:
    - claim-conversion-warning-010
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: ConversionWarning-warns_about-Adapter
    predicate: warns_about
    direction: source-to-target
    relation_kind: information
    labels:
      zh: warns about
      en: warns about
      ja: warns about
    definitions:
      zh: 转换警告指向实际执行该转换、并界定其版本与支持范围的具体适配器；适配器可以是协议、框架、基准、状态图或模式投影适配器。
      en: A conversion warning points to the concrete adapter whose version and declared scope governed the conversion; the adapter may target a protocol, framework, benchmark, statechart, or schema projection.
      ja: 変換警告は、その変換を支配した版と範囲を持つ具体 Adapter を指します。対象は protocol、framework、benchmark、statechart、schema projection のいずれでも構いません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_warns_about
      labels:
        zh: 反向：warns about
        en: is target of warns about
        ja: 逆方向：warns about
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: ConversionWarning-warns_about-Adapter-example-positive-manual-001
        kind: positive
        labels:
          zh: warns about人工正例
          en: Reviewed positive case for warns about
          ja: warns aboutの審査済み正例
        scenario_id: null
        descriptions:
