source_claims:
  - id: claim-conversion-warning-001
    source: eng-val-zod-json-schema
    supports: ConversionWarning captures the concrete unsupported and unrepresentable cases documented by Zod's JSON Schema conversion, while adding rule identity, severity, path, and remediation as Moonweave audit requirements.
    locator: JSON Schema > Unrepresentable types; override and unrepresentable behavior
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-conversion-warning-002
    source: eng-val-shacl
    supports: ConversionWarning's structured diagnostic shape is informed by SHACL ValidationResult, which records focus, path, source constraint, severity, and human-readable message. Mapping-loss semantics are a Moonweave specialization.
    locator: SHACL §3.6.2 Validation Result properties and §2.1.4 Severity
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-conversion-warning-003
    source: eng-val-shacl
    supports: SHACL ValidationResult records a focus, path, source component, severity, and optional message; conversion-warning-actionable adapts this structured diagnostic pattern to mapping loss.
    locator: SHACL §3.6.2 Validation Result properties
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-conversion-warning-004
    source: eng-val-zod-json-schema
    supports: ConversionWarning-example-positive-001 is grounded in Zod 4's documented list of unrepresentable JSON Schema types, including z.date(), and its default error behavior; the warning code and remediation are Moonweave governance metadata.
    locator: JSON Schema > Unrepresentable types; unrepresentable option
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-conversion-warning-005
    source: eng-val-shacl
    supports: SHACL ValidationResult demonstrates a structured diagnostic pattern with focus node, result path, source component, severity, and message. ConversionWarning-example-positive-001 adapts that pattern to mapping loss.
    locator: "SHACL §3.6.2 Validation Result: focusNode, resultPath, source, message, severity"
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-conversion-warning-006
    source: eng-val-zod-json-schema
    supports: Zod documents conversion behavior at the individual unrepresentable-type level, supporting ConversionWarning-example-boundary-001's distinction between one diagnostic and an aggregate coverage count.
    locator: JSON Schema > Unrepresentable types and conversion options
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-conversion-warning-007
    source: eng-val-shacl
    supports: SHACL keeps a ValidationReport aggregate separate from each ValidationResult. ConversionWarning-example-boundary-001 uses the analogous report-versus-diagnostic boundary.
    locator: SHACL §3.6.1 Validation Report and §3.6.2 Validation Result
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-conversion-warning-008
    source: eng-val-pydantic-json-schema
    supports: Pydantic's JSON Schema generator distinguishes validation and serialization modes, permits generator customization, and documents cases in which a type cannot be represented as JSON Schema. Those conversion-specific differences and failures motivate a case-level ConversionWarning. Pydantic does not define Moonweave's warning fields or an aggregate CoverageReport.
    locator: Pydantic JSON Schema > JSON schema generation; Validation and serialization modes; Customizing the JSON Schema generation process
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-conversion-warning-009
    source: eng-ont-fibo-repo
    supports: The FIBO repository is organized as a versioned collection of ontology modules and release artifacts, so any claim of adapter coverage against it requires a fixed ontology version and an enumerable module or construct denominator. FIBO does not prescribe Moonweave's CoverageReport counts or release gate; those are governance inferences distinct from a single conversion warning.
    locator: FIBO repository README > Repository structure; FIBO releases and ontology metadata
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-conversion-warning-010
    source: eng-val-jsonschema-spec
    supports: JSON Schema Draft 2020-12 separates vocabularies and requires implementations to recognize support boundaries. This supports a ConversionWarning artifact that records an inexpressible or unsupported construct during mapping; the artifact taxonomy is Moonweave-defined.
    locator: Draft 2020-12 Core > Vocabulary declarations and unsupported vocabularies
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-conversion-warning-011
    source: eng-val-jsonschema-spec
    supports: JSON Schema dialect and vocabulary support can vary by implementation. That documented support boundary underlies a ConversionWarning that points to the SchemaAdapter profile whose target dialect cannot express or validate a source construct.
    locator: Draft 2020-12 Core > Vocabularies, dialects, and implementation support
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
