schema: moonweave.ai/ontology-node/v1
id: tool-plane
kind: domain
status: accepted
labels:
  en: Capability & Resource Invocation Domain
  zh: 能力与资源调用域
  ja: 能力とリソース呼び出しドメイン
semantics:
  short_definition:
    en: Operational concern domain for tool and capability registries, discovery, matching, invocation, execution, MCP transport, resources, prompts, results, and observable side effects.
    zh: 能力与资源调用域是运行关注域，描述工具与能力注册、发现、匹配、调用、执行、MCP 传输、资源、提示、结果和可观测副作用。
    ja: 能力とリソース呼び出しドメインは運用関心ドメインで、ツールと能力の登録、発見、照合、呼び出し、実行、MCP転送、リソース、プロンプト、結果、観測可能な副作用を記述します。
  definition:
    en: Operational concern domain for tool and capability registries, discovery, matching, invocation, execution, MCP transport, resources, prompts, results, and observable side effects.
    zh: 能力与资源调用域是运行关注域，描述工具与能力注册、发现、匹配、调用、执行、MCP 传输、资源、提示、结果和可观测副作用。
    ja: 能力とリソース呼び出しドメインは運用関心ドメインで、ツールと能力の登録、発見、照合、呼び出し、実行、MCP転送、リソース、プロンプト、結果、観測可能な副作用を記述します。
  why_needed:
    zh: 从能力定义和发现，连续描述到调用、尝试、结果、影响与 MCP 交互。
    en: Describes the continuous path from capability definition and discovery to invocation, attempts, results, effects, and MCP interactions.
    ja: 能力定義と発見から呼び出し、試行、結果、影響、MCP インタラクションまでを連続的に記述します。
  includes:
    - zh: "工具域负责工具定义与注册（owner: tool-registry-definition）以及工具发现与选择（owner: tool-discovery-selection），从可调用能力合同一直覆盖到按约束检索和选定候选工具。"
      en: "Tool owns Tool Definition and Registration (owner: tool-registry-definition) and Tool discovery and selection (owner: tool-discovery-selection), covering the callable capability contract through constrained retrieval and candidate-tool selection."
      ja: "ツールドメインはツール定義と登録（owner: tool-registry-definition）およびツール発見と選択（owner: tool-discovery-selection）を所有し、呼出可能な能力契約から制約付き検索と候補選択までを扱います。"
    - zh: "工具域还负责调用与执行（owner: tool-invocation-execution），描述针对已选能力形成调用请求、参数绑定、工具级尝试及返回结果的语义闭环。"
      en: "Tool also owns Invocation and execution (owner: tool-invocation-execution), describing the semantic loop from a selected capability through invocation request, argument binding, tool-level attempt, and returned result."
      ja: "ツールドメインは呼び出しと実行（owner: tool-invocation-execution）も所有し、選択能力から呼出要求・引数束縛・ツール試行・返却結果までの意味的閉ループを記述します。"
  excludes:
    - zh: "委派与移交（owner: orchestration-delegation-handoff）属于编排域，因为它转移任务责任和协作所有权；把智能体当作工具调用也不会把责任移交语义并入工具合同。"
      en: "Delegation and handoff (owner: orchestration-delegation-handoff) belongs to Orchestration because it transfers task responsibility and collaboration ownership; invoking an agent as a tool does not merge handoff semantics into the tool contract."
      ja: "委任と引き継ぎ（owner: orchestration-delegation-handoff）はタスク責任と協働所有権を移転するため編成ドメインに属します。エージェントをツールとして呼んでも移交意味はツール契約へ統合されません。"
    - zh: "执行尝试与结果（owner: runtime-execution-attempts）属于运行域，因为它统一记录智能体运行层的一次实际尝试；工具域只拥有其中的工具调用与工具结果子过程。"
      en: "Execution attempts and outcomes (owner: runtime-execution-attempts) belongs to Runtime because it records an actual agent-runtime attempt as a whole; Tool owns only the tool-invocation and tool-result subprocess within it."
      ja: "実行試行と結果（owner: runtime-execution-attempts）はエージェント実行全体の実試行を記録するため実行ドメインに属します。ツールは内部のツール呼出と結果の部分過程だけを所有します。"
  semantic_kind: null
  aliases: []
purpose:
  zh: 从能力定义和发现，连续描述到调用、尝试、结果、影响与 MCP 交互。
  en: Describes the continuous path from capability definition and discovery to invocation, attempts, results, effects, and MCP interactions.
  ja: 能力定義と発見から呼び出し、試行、結果、影響、MCP インタラクションまでを連続的に記述します。
structure: null
examples:
  - id: tool-plane-example-positive-001
    kind: positive
    labels:
      zh: 从能力发现到 MCP 调用结果
      en: From capability discovery to an MCP result
      ja: 能力発見から MCP 呼出し結果まで
    scenario_id: null
    descriptions:
      zh: CapabilityCatalog catalog-finance@7 包含 invoice.lookup 定义，ToolRegistry registry-mcp-finance@3 将其绑定到 tool-invoice-lookup@5。discovery-run-88 根据输入契约和只读影响选择该工具，ToolCallPlan call-plan-88 固定参数 invoice_id=INV-204，MCPRequest req-88 通过 session-mcp-12 发出；ToolAttempt attempt-88 返回 ToolResult result-88，并记录读取 resource://invoices/INV-204，没有产生写入副作用。
      en: CapabilityCatalog catalog-finance@7 contains invoice.lookup, and ToolRegistry registry-mcp-finance@3 binds it to tool-invoice-lookup@5. discovery-run-88 selects the tool by input contract and read-only effect, ToolCallPlan call-plan-88 fixes invoice_id=INV-204, and MCPRequest req-88 is sent through session-mcp-12. ToolAttempt attempt-88 returns ToolResult result-88 and records a read of resource://invoices/INV-204 with no write side effect.
      ja: CapabilityCatalog catalog-finance@7 が invoice.lookup を含み、ToolRegistry registry-mcp-finance@3 が tool-invoice-lookup@5 に結びます。discovery-run-88 は input contract と read-only effect で選択し、ToolCallPlan call-plan-88 が invoice_id=INV-204 を固定、MCPRequest req-88 を session-mcp-12 で送ります。ToolAttempt attempt-88 は ToolResult result-88 を返し resource://invoices/INV-204 の読取と write side effect なしを記録します。
    field_values:
      capability_catalog_ref: catalog-finance@7
      tool_registry_ref: registry-mcp-finance@3
      tool_ref: tool-invoice-lookup@5
      discovery_run_id: discovery-run-88
      tool_call_plan_id: call-plan-88
      mcp_session_id: session-mcp-12
      mcp_request_id: req-88
      tool_attempt_id: attempt-88
      tool_result_id: result-88
      observed_effect: read-only
    related_node_ids:
      - tool-plane
    related_relation_ids: []
    expected_result:
      zh: 查询能连续返回能力定义、注册项、发现依据、调用计划、协议请求、执行尝试、结果和实际影响，并保持这些阶段的身份不互相替代。
      en: A query returns capability definition, registry entry, selection basis, call plan, protocol request, execution attempt, result, and observed effect as one traceable chain without collapsing their identities.
      ja: capability definition・registry entry・selection basis・call plan・protocol request・execution attempt・result・observed effect を一つの追跡可能な連鎖として返し、同一性を統合しません。
    why_valid_or_invalid:
      zh: 对象从可复用能力身份开始，经可解释选择和确定调用计划进入实际协议交互，最后产生工具结果与可观察影响，完整覆盖工具域而不把授权决定混入工具定义。
      en: The object begins with reusable capability identity, passes through explainable selection and a fixed call plan into an actual protocol interaction, and ends with a result and observable effect, covering Tool without embedding authorization decisions in the tool definition.
      ja: 再利用可能な capability identity から説明可能な selection と固定 call plan を経て protocol interaction に入り、result と observable effect に至り、authorization decision を tool definition に混入しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-plane-003
  - id: tool-plane-example-boundary-20260717
    kind: boundary
    labels:
      zh: 权限拒绝不是工具执行结果
      en: An authorization denial is not a tool execution result
      ja: 認可拒否は tool execution result ではない
    scenario_id: null
    descriptions:
      zh: call-plan-delete-9 已选择 tool-delete-file@2，但 PolicyDecision decision-9 因 scope 只允许读取而拒绝授权；系统没有创建 ToolAttempt、MCPRequest、ToolResult 或 SideEffect。
      en: call-plan-delete-9 selects tool-delete-file@2, but PolicyDecision decision-9 denies authorization because the scope permits reads only. The system creates no ToolAttempt, MCPRequest, ToolResult, or SideEffect.
      ja: call-plan-delete-9 は tool-delete-file@2 を選択しますが、scope が read-only のため PolicyDecision decision-9 が認可を拒否します。ToolAttempt・MCPRequest・ToolResult・SideEffect は作成されません。
    field_values:
      tool_call_plan_id: call-plan-delete-9
      tool_ref: tool-delete-file@2
      policy_decision_id: decision-9
      authorization_outcome: denied
      tool_attempt_created: false
      side_effect_created: false
    related_node_ids:
      - tool-plane
      - safety-plane
    related_relation_ids: []
    expected_result:
      zh: 工具域保留调用计划和被选工具，安全域拥有拒绝决定；不得伪造一次失败的 ToolAttempt 或空 ToolResult。
      en: Tool retains the call plan and selected tool, while Safety owns the denial. Do not fabricate a failed ToolAttempt or empty ToolResult.
      ja: Tool は call plan と selected tool を保持し、Safety が denial を所有します。failed ToolAttempt や empty ToolResult を捏造しません。
    why_valid_or_invalid:
      zh: “准备调用”与“已经尝试执行”是不同事实；授权闸门在执行前终止链路时，只有安全控制结果，没有工具执行结果。
      en: Preparing a call and attempting execution are different facts. When an authorization gate terminates the chain before execution, there is a safety-control outcome and no tool-execution outcome.
      ja: call preparation と execution attempt は別事実です。authorization gate が実行前に連鎖を止めた場合、安全制御 outcome だけがあり tool execution outcome はありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-plane-004
