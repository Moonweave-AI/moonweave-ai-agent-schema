    locator: Function calling guide > tool calls
    evidence_kind: primary-api
    confidence: high
  - id: claim-tool-plane-anthropic
    source: src-anthropic-tool-use
    supports: Anthropic correlates tool_use blocks with tool_result blocks by tool_use_id.
    locator: Tool use > tool_result blocks
    evidence_kind: primary-api
    confidence: high
  - id: claim-tool-plane-mcp
    source: src-mcp-tools
    supports: MCP separates listing tools from calling them on an initialized session.
    locator: Server features > Tools > Listing and Calling
    evidence_kind: primary-spec
    confidence: high
  - id: claim-tool-plane-design
    source: src-tool-plane-design
    supports: Moonweave assigns durable definitions, query-time selection, invocation attempts, and MCP wire facts to separate modules within tool-plane.
    locator: Tool plane domain boundary
    evidence_kind: design-inference
    confidence: high
