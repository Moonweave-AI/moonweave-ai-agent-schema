schema: moonweave.ai/ontology-node/v1
id: tool-plane
kind: domain
labels:
  zh: 工具调用域
  en: Tool Invocation Domain
  ja: ツール呼出しドメイン
semantics:
  short_definition:
    zh: 定义可调用能力的契约、发现、选择、调用、结果与副作用记录，以及真实 MCP 工具协议对象的领域。
    en: The domain for callable-capability contracts, discovery, selection, invocation, results and effect records, plus real MCP tool protocol objects.
    ja: 呼出し可能な能力の契約、発見、選択、呼出し、結果と副作用記録、および実際の MCP ツールプロトコル対象のドメイン。
  definition:
    zh: 工具调用域建模一个运行时可请求的能力从可读契约到调用结果的链条：工具/函数的名称、输入输出 schema、可用性与选择依据、绑定参数的调用请求、执行尝试、结果和已声明的副作用。它包含 MCP 的 Server Tool、`tools/list`、`tools/call`、JSON-RPC 消息和标准 transport，但这些名称只用于真实 MCP 连接。通用函数工具、托管工具或项目本地操作不能仅因具有相同功能而被称为 MCP Tool；同样，MCP Resource 和 Prompt 是独立协议 feature，不是任意工具调用的同义词。
    en: >-
      The Tool Invocation Domain models the chain from a readable callable contract to its invocation result: a tool or function's name, input/output schemas, availability and selection basis, an invocation request with bound arguments, an execution attempt, its result, and declared effects. It includes MCP Server Tools, `tools/list`, `tools/call`, JSON-RPC messages, and standard transports, but uses those names only for a real MCP connection. A generic function tool, hosted tool, or local project operation is not an MCP Tool merely because it performs a similar function; likewise, MCP Resources and Prompts are distinct protocol features rather than synonyms for any tool call.
    ja: ツール呼出しドメインは、読み取り可能な呼出し契約からその呼出し結果までの連鎖をモデル化します。すなわちツールまたは関数の名前、入出力 schema、可用性と選択根拠、束縛済み引数を持つ呼出し要求、実行試行、結果、宣言済み副作用です。MCP Server Tool、`tools/list`、`tools/call`、JSON-RPC メッセージ、標準 transport を含みますが、これらの名称は実際の MCP 接続に限ります。類似した機能を持つだけの一般 function tool、hosted tool、ローカル操作を MCP Tool と呼びません。また MCP Resource と Prompt は任意のツール呼出しの同義語ではなく、別個のプロトコル feature です。
  why_needed:
    zh: 模型生成的参数不能直接等同于已授权、已执行或成功的外部操作。把契约、选择、请求、执行和结果分开，才能验证参数、记录用户批准、处理重试，并让调用方区分协议错误、工具执行错误和安全拒绝。
    en: Model-generated arguments are not automatically authorized, executed, or successful external actions. Separating contract, selection, request, execution, and result makes it possible to validate arguments, record human approval, handle retries, and distinguish protocol errors, tool execution errors, and safety denials.
    ja: モデル生成の引数は、自動的に認可済み・実行済み・成功済みの外部操作にはなりません。契約、選択、要求、実行、結果を分離すれば、引数検証、ユーザー承認記録、再試行処理、プロトコルエラー・ツール実行エラー・安全拒否の区別が可能になります。
  includes:
    - zh: 函数、托管工具或本地工具的可调用契约，以及名称、描述、输入输出 schema 与预期效果。
      en: Callable contracts for function, hosted, or local tools, including names, descriptions, input/output schemas, and expected effects.
      ja: 名前、説明、入出力 schema、期待される効果を含む function、hosted、local tool の呼出し契約。
    - zh: 工具目录、注册、发现、候选评估和受约束的选择决定。
      en: Tool catalogs, registration, discovery, candidate assessment, and constrained selection decisions.
      ja: ツールカタログ、登録、発見、候補評価、制約付き選択決定。
    - zh: 调用请求、参数绑定、执行尝试、结果、可观测副作用和调用级诊断。
      en: Invocation requests, argument binding, execution attempts, results, observable effects, and invocation-level diagnostics.
      ja: 呼出し要求、引数束縛、実行試行、結果、観測可能な副作用、呼出しレベルの診断。
    - zh: 真实 MCP 会话中的 Tool capability、`tools/list`、`tools/call`、Tool Result 与 stdio/Streamable HTTP transport。
      en: Tool capability, `tools/list`, `tools/call`, Tool Result, and stdio/Streamable HTTP transport in a real MCP session.
      ja: 実際の MCP session における Tool capability、`tools/list`、`tools/call`、Tool Result、stdio/Streamable HTTP transport。
  excludes:
    - zh: 是否允许调用、批准请求、授权授予、策略计算和数据披露决定，属于安全域。
      en: Whether a call is allowed, approval prompts, authorization grants, policy evaluation, and data-disclosure decisions, which belong to Safety.
      ja: 呼出しの許可、承認プロンプト、認可付与、ポリシー評価、データ開示決定。これらは Safety に属します。
    - zh: 计划、委派、任务所有权或控制权转移，属于编排域；即便实现把子智能体包成工具，管理者仍保留控制权才是工具模式。
      en: Planning, delegation, task ownership, or control transfer, which belong to Orchestration; even when an implementation wraps a subagent as a tool, it is tool mode only while the manager retains control.
      ja: 計画、委任、タスク所有権、制御権移転。これらは Orchestration に属します。実装が subagent を tool として包む場合でも、manager が制御を保持する間だけ tool mode です。
    - zh: 整体运行的检查点、恢复、原始 trace、span、日志和指标，属于运行时域。
      en: Whole-run checkpoints, recovery, and raw traces, spans, logs, and metrics, which belong to Runtime.
      ja: 実行全体の checkpoint、recovery、生の trace、span、log、metric。これらは Runtime に属します。
    - zh: 任意 URL、文档或模板不能仅因可被读取而成为 MCP Resource、Prompt 或 Tool；需存在相应 MCP server capability 和协议载荷。
      en: A URL, document, or template is not an MCP Resource, Prompt, or Tool merely because it can be read; the corresponding MCP server capability and protocol payload must exist.
      ja: URL、文書、テンプレートは読み取れるだけで MCP Resource、Prompt、Tool にはなりません。対応する MCP server capability とプロトコルペイロードが必要です。
  semantic_kind: domain
  aliases: [tool use, function calling, callable capability]
engineering:
  explanation:
    zh: 运行时先向模型提供本地工具或协议发现到的契约，并在安全层批准后执行。MCP 客户端可发送 JSON-RPC `tools/list` 获得 `name`、`description`、`inputSchema` 和可选 `outputSchema`，再以 `tools/call` 及 `name`/`arguments` 调用。Responses API 的 function calling 则令模型输出 `function_call`，调用者按 `call_id` 回送 `function_call_output`。两种 I/O 都是真实接口，但不可互相伪装；本体保留调用的内部证据和它们的明确关联。
    en: A runtime first provides the model with local-tool contracts or contracts discovered through a protocol, then executes after the Safety layer permits it. An MCP client can send JSON-RPC `tools/list` to obtain `name`, `description`, `inputSchema`, and optional `outputSchema`, then call with `tools/call` plus `name` and `arguments`. Responses function calling instead has the model emit `function_call`, and the caller returns `function_call_output` by `call_id`. Both are real I/O interfaces but must not masquerade as one another; the ontology retains internal call evidence and explicit associations to them.
    ja: 実行時は、まず local tool 契約またはプロトコルで発見した契約をモデルへ与え、Safety 層の許可後に実行します。MCP client は JSON-RPC `tools/list` で `name`、`description`、`inputSchema`、任意の `outputSchema` を得て、`tools/call` と `name`/`arguments` で呼び出せます。Responses の function calling ではモデルが `function_call` を出力し、呼出し側が `call_id` により `function_call_output` を返します。いずれも実際の I/O ですが相互に偽装してはならず、本体は内部呼出し証拠と明示的関連を保持します。
  typical_input:
    - description:
        zh: MCP `tools/call` 请求
        en: MCP `tools/call` request
        ja: MCP `tools/call` 要求
      format: |-
        {"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"get_weather","arguments":{"location":"New York"}}}
    - description:
        zh: Responses function tool 定义
        en: Responses function-tool definition
        ja: Responses function tool 定義
      format: |-
        {"type":"function","name":"get_weather","description":"Return current weather","parameters":{"type":"object","properties":{"location":{"type":"string"}},"required":["location"],"additionalProperties":false}}
  typical_output:
    - description:
        zh: MCP Tool Result
        en: MCP Tool Result
        ja: MCP Tool Result
      format: |-
        {"jsonrpc":"2.0","id":2,"result":{"content":[{"type":"text","text":"22 C"}],"isError":false}}
    - description:
        zh: Responses function call output
        en: Responses function-call output
        ja: Responses function-call output
      format: |-
        {"type":"function_call_output","call_id":"call_123","output":"{\"temperature_c\":22}"}
  reference_implementations:
    - name: MCP Tools 2025-11-25
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines Tool, `tools/list`, `tools/call`, JSON Schema input/output contracts, result content, and error handling.
    - name: MCP Transports 2025-11-25
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/transports
      description: Defines JSON-RPC over stdio and Streamable HTTP for a real MCP connection.
    - name: OpenAI Responses function calling
      url: https://developers.openai.com/api/docs/guides/function-calling
      description: Defines function tool declarations, `function_call`, call IDs, and `function_call_output` continuation items.
    - name: OpenAI Agents SDK tools
      url: https://openai.github.io/openai-agents-python/tools/
      description: Distinguishes hosted, local/runtime, function, and agents-as-tools patterns, including the no-handoff boundary.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels:
        zh: 领域标识
        en: Domain identifier
        ja: ドメイン識別子
      definitions:
        zh: 工具调用域的稳定本体标识。
        en: Stable ontology identifier for the Tool Invocation Domain.
        ja: ツール呼出しドメインの安定した本体識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^tool-plane$'
      example_value: tool-plane
      source_claims: [claim-tool-plane-design]
    - id: module_ids
      labels:
        zh: 模块标识列表
        en: Module identifier list
        ja: モジュール識別子リスト
      definitions:
        zh: 工具契约/目录、发现选择、调用执行和 MCP 协议承载的模块标识。
        en: Identifiers for tool contracts/catalogs, discovery/selection, invocation/execution, and MCP protocol carriage modules.
        ja: ツール契約/カタログ、発見/選択、呼出し/実行、MCP プロトコル搬送のモジュール識別子。
      datatype: array
      required: true
      cardinality: {min: 4, max: 4}
      example_value: '["tool-registry-definition","tool-discovery-selection","tool-invocation-execution","tool-mcp-transport"]'
      source_claims: [claim-tool-plane-design]
  constraints:
    - id: tool-plane-contract-and-boundary
      severity: error
      expression_language: plain
      expression: A callable operation must have a named contract and a validated argument shape before an execution attempt is recorded. Use MCP Tool, `tools/list`, `tools/call`, Resource, Prompt, JSON-RPC, and transport nodes only for actual MCP traffic; classify approval and authorization separately in Safety and ownership transfer separately in Orchestration.
      explanation:
        zh: 该约束避免把模型建议当作已执行操作，也避免把本地或其他供应商工具错误标为 MCP 协议对象。
        en: This prevents a model suggestion from being treated as an executed action and prevents local or other-provider tools from being mislabelled as MCP protocol objects.
        ja: この制約は、モデルの提案を実行済み操作として扱うこと、および local または他プロバイダーの tool を MCP プロトコル対象と誤表記することを防ぎます。
      source_claims: [claim-tool-mcp-tools, claim-tool-mcp-transport, claim-tool-plane-design]
  required_relations: []
examples:
  - id: tool-plane-positive-mcp-call

    labels:
      zh: MCP 天气工具调用
      en: MCP weather-tool invocation
      ja: MCP 天気ツール呼出し
    descriptions:
      zh: tool-plane 涵盖 Toolformer/Gorilla/ReAct/ToolBench/ART 论文与 Anthropic/LangChain/Vercel AI SDK/Semantic Kernel/Instructor/Code Interpreter/Computer Use 项目的真实工具集成。
      en: tool-plane covers Toolformer/Gorilla/ReAct/ToolBench/ART papers and Anthropic/LangChain/Vercel AI SDK/Semantic Kernel/Instructor/Code Interpreter/Computer Use real tool integrations.
      ja: tool-plane は Toolformer/Gorilla/ReAct/ToolBench/ART 論文と Anthropic/LangChain/Vercel AI SDK/Semantic Kernel/Instructor/Code Interpreter/Computer Use の実 tool 統合を涵盖。
    field_values: {protocol: MCP, method: tools/call, tool_name: get_weather, arguments: '{"location":"New York"}'}
    related_node_ids: [tool-plane, MCPToolCallRequest, MCPServer, MCPListToolsResult]
    related_relation_ids: []

    source_claims: [claim-tool-mcp-tools]
  - id: tool-plane-counterexample-approval-is-not-call

    labels:
      zh: 批准提示不是工具调用
      en: An approval prompt is not a tool invocation
      ja: 承認プロンプトはツール呼出しではない
    descriptions:
      zh: 反例：仅引用 MCP/OpenAI function calling 而忽略论文与多元 SDK 契约的单一范式建模。
      en: Counterexample: single-paradigm modeling citing only MCP/OpenAI function calling while ignoring papers and diverse SDK contracts.
      ja: 反例：MCP/OpenAI function calling のみ引用し論文と多元 SDK 契約を無視する単一パラダイムモデリング。
    field_values: {approval_state: pending, invocation_id: null, effect: null}
    related_node_ids: [tool-plane, PermissionPrompt]
    related_relation_ids: []

    source_claims: [claim-tool-plane-design]
  - id: tool-plane-boundary-agent-as-tool

    labels:
      zh: 子智能体作为工具与移交的边界
      en: Boundary between a subagent-as-tool and a handoff
      ja: subagent-as-tool と handoff の境界
    descriptions:
      zh: 论文训练范式（Toolformer/ART）vs 运行时 SDK（Anthropic/Vercel AI SDK）vs 传输协议（MCP）的三层边界。
      en: Three-layer boundary among paper training paradigms (Toolformer/ART), runtime SDKs (Anthropic/Vercel AI SDK), transport protocols (MCP).
      ja: 論文訓練パラダイム（Toolformer/ART）、ランタイム SDK（Anthropic/Vercel AI SDK）、transport プロトコル（MCP）の三層境界。
    field_values: {pattern: agent-as-tool, manager_retains_control: true, ownership_transfer: false}
    related_node_ids: [tool-plane, AgentAsToolInvocation, orchestration-plane]
    related_relation_ids: []

    source_claims: [claim-tool-agents-as-tools]
  - id: tool-plane-instance-responses-function-loop

    labels:
      zh: Responses 函数调用回合
      en: Responses function-calling turn
      ja: Responses function-calling turn
    descriptions:
      zh: 可追溯到 Toolformer arXiv:2302.04761、Gorilla arXiv:2305.15334、Anthropic tool use docs 或 Vercel AI SDK docs 的具体实例。
      en: Concrete instance traceable to Toolformer arXiv:2302.04761, Gorilla arXiv:2305.15334, Anthropic tool use docs, or Vercel AI SDK docs.
      ja: Toolformer arXiv:2302.04761、Gorilla arXiv:2305.15334、Anthropic tool use docs、Vercel AI SDK docs に追跡可能な具体実例。
        `call_123` 是模型为 `get_weather` 产生的 function call；运行时验证 JSON 参数、执行本地函数，并以同一 `call_id` 发送 `function_call_output`。
        `call_123` is a model-produced function call for `get_weather`; the runtime validates JSON arguments, runs a local function, and sends `function_call_output` with the same `call_id`.
        `call_123` はモデルが `get_weather` のために生成した function call です。実行時は JSON 引数を検証し、local function を実行し、同じ `call_id` で `function_call_output` を送ります。
    field_values: {call_id: call_123, tool_type: function, name: get_weather, result_item_type: function_call_output}
    related_node_ids: [tool-plane, FunctionTool, ToolCall, ToolResult]
    related_relation_ids: []

    source_claims: [claim-tool-openai-function-calling]
parent_relation: null
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol — Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-spec
    relevance: Defines MCP Tools, `tools/list`, `tools/call`, Tool schemas, Tool Result, errors, and associated security requirements.
  - id: mcp-transports-2025-11-25
    title: Model Context Protocol — Transports
    url: https://modelcontextprotocol.io/specification/2025-11-25/basic/transports
    source_type: official-spec
    relevance: Defines JSON-RPC message encoding and the standard stdio and Streamable HTTP transports.
  - id: openai-responses-function-calling
    title: OpenAI Responses API — Function calling
    url: https://developers.openai.com/api/docs/guides/function-calling
    source_type: official-doc
    relevance: Defines function tool declarations, model function calls, call IDs, and `function_call_output` continuation items.
  - id: openai-agents-sdk-tools
    title: OpenAI Agents SDK — Tools
    url: https://openai.github.io/openai-agents-python/tools/
    source_type: official-doc
    relevance: Distinguishes hosted, local/runtime, function, and agents-as-tools patterns and their handoff boundary.
  - id: json-schema-core-2020-12
    title: JSON Schema Draft 2020-12 Core
    url: https://json-schema.org/draft/2020-12/json-schema-core
    source_type: standard
    relevance: Defines schema resources, identifiers, references, and vocabulary foundations used by tool parameter schemas.
source_claims:
  - id: claim-tool-mcp-tools
    source: mcp-tools-2025-11-25
    supports: MCP servers expose Tools; clients discover them with JSON-RPC `tools/list` and invoke them with `tools/call`, whose parameters contain a tool name and arguments. Tool definitions use inputSchema and optional outputSchema, and results carry content and optional error state.
    locator: Tools — Capabilities; Protocol Messages; Tool; Tool Result; Error Handling
    evidence_kind: normative
    confidence: high
  - id: claim-tool-mcp-transport
    source: mcp-transports-2025-11-25
    supports: MCP encodes messages as UTF-8 JSON-RPC and standardizes stdio and Streamable HTTP transport mechanisms for client-server communication.
    locator: Transports — overview; stdio; Streamable HTTP
    evidence_kind: normative
    confidence: high
  - id: claim-tool-openai-function-calling
    source: openai-responses-function-calling
    supports: The Responses function-calling guide documents function tool definitions, model `function_call` output, and returning execution output as `function_call_output` linked by `call_id`.
    locator: Function calling — define tools; execute function calls and append results; formatting results
    evidence_kind: normative
    confidence: high
  - id: claim-tool-agents-as-tools
    source: openai-agents-sdk-tools
    supports: The Agents SDK documents agents-as-tools as exposing an agent as callable without a full handoff, so control-retaining calls and ownership-transferring handoffs must remain distinct.
    locator: Tools — overview; Agents as tools
    evidence_kind: normative
    confidence: high
  - id: claim-tool-plane-design
    source: json-schema-core-2020-12
    supports: Moonweave's separation of contract, selection, request, execution, result, policy, and ownership is a local design boundary informed by schema-based callable contracts; it is not a JSON Schema class hierarchy.
    locator: JSON Schema Core — schema resources and validation vocabulary model
    evidence_kind: design-inference
    confidence: high
