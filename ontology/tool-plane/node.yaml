source_claims:
  - id: claim-tool-plane-001
    source: eng-proto-mcp-spec
    supports: MCP defines hosts, per-server clients, servers, protocol lifecycle, capability negotiation, and server primitives for tools, resources, and prompts. Its tools contract covers discovery and invocation with structured arguments and returned content, while resources and prompts remain distinct primitives. This supports the tool-plane chain from external capability exposure through invocation and result, but MCP does not define Moonweave's full Capability taxonomy, matching decision, ExecutionAttempt, InvocationEffect, or side-effect commitment boundary.
    locator: Specification > Architecture; Lifecycle > Capability negotiation; Server Features > Tools, Resources, and Prompts
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-tool-plane-002
    source: eng-fw-openai-python-docs
    supports: OpenAI Agents SDK Tools distinguishes hosted, local-runtime, function, agent-as-tool, and deferred-search surfaces; FunctionTool specifies name, description, JSON input schema, invocation callback, and returned output, while the MCP guide covers server-backed tools. These interfaces directly support registry, discovery, invocation, execution, result, and transport concerns. Moonweave's complete capability/resource hierarchy, side-effect model, and canonical ownership remain ontology decisions.
    locator: Tools > Choosing a tool type; Hosted tool search; Local runtime tools; Function tools; Custom function tools; Model context protocol (MCP) > MCP servers
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-tool-plane-003
    source: eng-proto-mcp-spec
    supports: MCP defines capability negotiation, tools, resources, prompts, request/response messages, and session transport. Moonweave preserves those distinct stages in the canonical invocation chain.
    locator: Specification > Architecture, lifecycle, server features > Tools, resources, prompts, and request-response messages
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tool-plane-004
    source: eng-fw-openai-python-docs
    supports: OpenAI Agents SDK distinguishes tool selection and invocation from approval or policy control, supporting a boundary where a denied call has no tool attempt or result.
    locator: Tools > Tool approval and execution; Model context protocol (MCP) > MCP servers
    evidence_kind: design-inference
    confidence: high
    review_status: pending
