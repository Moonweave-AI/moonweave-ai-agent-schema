schema: moonweave.ai/ontology-node/v1
id: tool-plane
kind: domain
labels:
  en: Capability & Resource Invocation Domain
  zh: 能力与资源调用域
  ja: 能力とリソース呼び出しドメイン
semantics:
  short_definition:
    en: Operational domain for registering, discovering, invoking, and transporting agent capabilities.
    zh: 负责智能体能力注册、发现、调用与协议传输的运行域。
    ja: エージェント能力の登録、発見、呼び出し、プロトコル転送を担う運用ドメイン。
  definition:
    en: The tool plane spans four cooperating modules that together describe how callable capabilities are defined in durable catalogs, narrowed at query time, executed with traceable attempts and results, and carried over MCP or vendor tool APIs. Registry and definition modules hold versioned contracts that survive individual requests. Discovery and selection explain why one candidate was chosen for a need. Invocation and execution record bound arguments, attempts, diagnostics, and effects for one call. MCP transport captures session negotiation, JSON-RPC correlation, and stdio or Streamable HTTP bindings without absorbing business authorization or stable tool definitions.
    zh: 工具域由四个协作模块组成，共同描述可调用能力如何在持久目录中定义、在查询期被收窄、以可追踪的尝试与结果执行，并通过 MCP 或厂商工具 API 承载。注册与定义模块保存跨请求存续的版本化合同；发现与选择解释为何针对一次需求选中某个候选；调用与执行记录单次调用的绑定参数、尝试、诊断与效果；MCP 传输捕获会话协商、JSON-RPC 关联以及 stdio 或 Streamable HTTP 绑定，但不吸收业务授权或稳定工具定义。
    ja: tool plane は四協調 module により、呼出可能能力の永続 catalog 定義、query-time 絞込み、追跡可能 attempt/result 実行、MCP または vendor tool API 転送を記述します。registry/definition は request を跨ぐ版管理 contract、discovery/selection は候補選択理由、invocation/execution は bound argument/attempt/diagnostic/effect、MCP transport は session negotiation/JSON-RPC correlation/stdio/Streamable HTTP binding を保持し、business authorization/stable tool definition は吸収しません。
  why_needed:
    en: Agent platforms expose dozens of tools, MCP servers, and hosted capabilities; without a dedicated domain, registry facts, selection rationale, invocation attempts, and wire-level protocol records collapse into one undifferentiated tool call blob.
    zh: 智能体平台会暴露大量工具、MCP 服务器与托管能力；若没有专用域，注册事实、选择理由、调用尝试和线路级协议记录会混成一个无法区分的工具调用块。
    ja: エージェント platform は多数 tool/MCP server/hosted capability を公開します。専用 domain がなければ registry fact、selection rationale、invocation attempt、wire-level protocol record が区別不能な tool call blob に潰れます。
  includes:
    - en: "tool-registry-definition, tool-discovery-selection, tool-invocation-execution, and tool-mcp-transport modules."
      zh: tool-registry-definition、tool-discovery-selection、tool-invocation-execution 与 tool-mcp-transport 四个模块。
      ja: tool-registry-definition、tool-discovery-selection、tool-invocation-execution、tool-mcp-transport の四 module。
    - en: Versioned capability contracts, query-scoped candidate selection, invocation occurrence chains, and MCP session/message transport.
      zh: 版本化能力合同、查询期候选选择、调用发生链与 MCP 会话/消息传输。
      ja: 版管理 capability contract、query-scoped candidate selection、invocation occurrence chain、MCP session/message transport。
  excludes:
    - en: Orchestration handoff, runtime run attempts, safety authorization decisions, and conversational message presentation.
      zh: 编排移交、运行时运行尝试、安全授权决定与会话消息呈现。
      ja: orchestration handoff、runtime run attempt、safety authorization decision、会話 message presentation。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    en: Vendor APIs expose different layers that the tool plane keeps separate. OpenAI Responses and Chat Completions surface tools[] definitions, tool_choice, and function_call or tool_call items in assistant output. Anthropic Messages API returns assistant content blocks with type tool_use and matching tool_result blocks. MCP 2025-11-25 separates tools/list and tools/call, session initialize, and transport-specific framing on stdio or Streamable HTTP. Moonweave maps durable definitions to registry, query-time narrowing to discovery, attempt/result records to invocation, and wire/session facts to MCP transport.
    zh: 各厂商 API 暴露不同层级，工具域将其分开保存。OpenAI Responses 与 Chat Completions 提供 tools[] 定义、tool_choice 以及 assistant 输出中的 function_call 或 tool_call 项；Anthropic Messages API 返回 type 为 tool_use 的 assistant content block 及对应 tool_result block；MCP 2025-11-25 区分 tools/list 与 tools/call、session initialize，以及 stdio 或 Streamable HTTP 上的传输分帧。Moonweave 将持久定义映射到注册模块，查询期收窄映射到发现模块，尝试/结果记录映射到调用模块，线路/会话事实映射到 MCP 传输模块。
    ja: vendor API は異なる layer を公開し tool plane は分離保持します。OpenAI Responses/Chat Completions は tools[]/tool_choice/function_call/tool_call item、Anthropic Messages API は tool_use assistant content block と tool_result block、MCP 2025-11-25 は tools/list/tools/call/session initialize/stdio/Streamable HTTP framing を分離。Moonweave は durable definition→registry、query-time narrowing→discovery、attempt/result→invocation、wire/session fact→MCP transport に写像します。
  typical_input:
    - description: Anthropic Messages API — assistant tool_use block awaiting execution.
      format: |
        {
          "id": "msg_01TOOL",
          "role": "assistant",
          "content": [
            {"type": "tool_use", "id": "toolu_01", "name": "get_weather", "input": {"city": "Shanghai"}}
          ]
        }
      source_claims: [claim-tool-plane-anthropic]
    - description: MCP tools/call JSON-RPC request on an initialized session.
      format: |
        {"jsonrpc":"2.0","id":4,"method":"tools/call","params":{"name":"get_weather","arguments":{"city":"Shanghai"}}}
      source_claims: [claim-tool-plane-mcp]
  typical_output:
    - description: Moonweave-local invocation trace spanning selection, attempt, and result.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "tool_selection_decision_id": "decision-weather-204",
          "tool_call_attempt_id": "attempt-weather-204-1",
          "tool_result_id": "result-weather-204-1",
          "mcp_session_id": "session-mcp-12"
        }
      source_claims: [claim-tool-plane-design]
  reference_implementations:
    - name: OpenAI Function Calling
      url: https://platform.openai.com/docs/guides/function-calling
      description: tools schema, tool_choice, and tool call outputs.
    - name: Anthropic Tool Use
      url: https://docs.anthropic.com/en/docs/build-with-claude/tool-use
      description: tool_use and tool_result content blocks.
    - name: MCP Specification 2025-11-25
      url: https://modelcontextprotocol.io/specification/2025-11-25/
      description: Session lifecycle, tools/list, tools/call, and transports.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 域标识, en: Domain identifier, ja: ドメイン識別子}
      definitions:
        zh: 工具域的稳定标识，固定为 tool-plane。
        en: Stable identifier for the tool plane; always tool-plane.
        ja: tool plane の安定識別子。常に tool-plane。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^tool-plane$'
      example_value: tool-plane
      allowed_values: []
      source_claims: [claim-tool-plane-design]
    - id: module_ids
      labels: {zh: 子模块标识, en: Child module identifiers, ja: 子モジュール識別子}
      definitions:
        zh: 组成工具域的四个一级模块标识列表。
        en: Identifiers of the four first-level modules composing the tool plane.
        ja: tool plane を構成する四 first-level module identifier 列表。
      datatype: array
      required: true
      cardinality: {min: 4, max: 4}
      pattern: null
      example_value: [tool-registry-definition, tool-discovery-selection, tool-invocation-execution, tool-mcp-transport]
      allowed_values: []
      source_claims: [claim-tool-plane-design]
  constraints: []
  required_relations: []
examples:
  - id: tool-plane-example-openai-function-call-chain
    labels:
      zh: OpenAI 工具调用完整链
      en: OpenAI tool-call chain
      ja: OpenAI tool-call 連鎖
    descriptions:
      zh: "gpt-4.1 返回 function_call name=get_weather 后，运行时创建 ToolCallPlan、ToolCallAttempt，并以 tool 角色消息回传结果；授权拒绝时不得伪造 ToolAttempt。"
      en: "After gpt-4.1 returns function_call name=get_weather, runtime creates ToolCallPlan and ToolCallAttempt and returns a tool-role message; authorization denial must not fabricate ToolAttempt."
      ja: "gpt-4.1 が function_call name=get_weather を返した後、runtime が ToolCallPlan/ToolCallAttempt を作成し tool role message を返却。authorization denial 時 ToolAttempt を捏造しません。"
    example_source:
      product: OpenAI Function Calling
      url: https://platform.openai.com/docs/guides/function-calling
    field_values:
      model: gpt-4.1
      function_name: get_weather
      arguments: {city: Shanghai}
    related_node_ids: [tool-plane, tool-invocation-execution]
    related_relation_ids: []
    source_claims: [claim-tool-plane-openai]
  - id: tool-plane-example-anthropic-tool-use
    labels:
      zh: Anthropic tool_use 到 tool_result
      en: Anthropic tool_use to tool_result
      ja: Anthropic tool_use から tool_result
    descriptions:
      zh: "assistant message 含 tool_use id=toolu_01；执行后在 user message 中返回 tool_result tool_use_id=toolu_01，保持 block 级关联。"
      en: "Assistant message contains tool_use id=toolu_01; execution returns tool_result with tool_use_id=toolu_01 in the next user message, preserving block-level correlation."
      ja: "assistant message に tool_use id=toolu_01。実行後 user message で tool_result tool_use_id=toolu_01 を返し block 级 correlation を保持。"
    example_source:
      product: Anthropic Messages API
      url: https://docs.anthropic.com/en/docs/build-with-claude/tool-use
    field_values:
      tool_use_id: toolu_01
      tool_name: get_weather
    related_node_ids: [tool-plane, tool-invocation-execution]
    related_relation_ids: []
    source_claims: [claim-tool-plane-anthropic]
  - id: tool-plane-example-mcp-list-to-call
    labels:
      zh: MCP 从 tools/list 到 tools/call
      en: MCP tools/list to tools/call
      ja: MCP tools/list から tools/call
    descriptions:
      zh: "initialize 后会话 session-mcp-12 调用 tools/list 发现 get_weather，再以 id=4 发送 tools/call；列表页不替代 ToolDefinition 身份。"
      en: "After initialize, session-mcp-12 calls tools/list to discover get_weather, then sends tools/call with id=4; the list page does not substitute for ToolDefinition identity."
      ja: "initialize 後 session-mcp-12 が tools/list で get_weather を発見し id=4 で tools/call を送信。list page は ToolDefinition identity を代替しません。"
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
    field_values:
      mcp_session_id: session-mcp-12
      jsonrpc_id: 4
      tool_name: get_weather
    related_node_ids: [tool-plane, tool-mcp-transport, tool-registry-definition]
    related_relation_ids: []
    source_claims: [claim-tool-plane-mcp]
  - id: tool-plane-example-discovery-to-plan-handoff
    labels:
      zh: 选择决定交接调用计划
      en: Selection decision informs call plan
      ja: selection decision が call plan へ handoff
    descriptions:
      zh: "ToolSelectionDecision decision-204 选择 weather@3 并显式 informs ToolCallPlan plan-weather-204；不得仅凭名称 weather 构造计划。"
      en: "ToolSelectionDecision decision-204 selects weather@3 and explicitly informs ToolCallPlan plan-weather-204; the plan must not be built from the display name weather alone."
      ja: "ToolSelectionDecision decision-204 が weather@3 を選択し ToolCallPlan plan-weather-204 へ明示 informs。display name weather だけで plan を構築しません。"
    example_source:
      product: ToolBench / DFSDT
      url: https://arxiv.org/abs/2307.16789
    field_values:
      selection_decision_id: decision-204
      tool_call_plan_id: plan-weather-204
      definition_ref: weather@3.0.0
    related_node_ids: [tool-plane, tool-discovery-selection, tool-invocation-execution]
    related_relation_ids: []
    source_claims: [claim-tool-plane-design]
  - id: tool-plane-example-auth-denial-boundary
    labels:
      zh: 授权拒绝不产生工具尝试
      en: Authorization denial creates no tool attempt
      ja: 認可拒否は tool attempt を生成しない
    descriptions:
      zh: "call-plan-delete-9 已选 tool-delete-file@2，PolicyDecision decision-9 拒绝；不得创建 ToolAttempt、MCPRequest 或空 ToolResult。"
      en: "call-plan-delete-9 selects tool-delete-file@2 but PolicyDecision decision-9 denies; no ToolAttempt, MCPRequest, or empty ToolResult may be created."
      ja: "call-plan-delete-9 が tool-delete-file@2 を選択しても PolicyDecision decision-9 が拒否。ToolAttempt/MCPRequest/empty ToolResult を作成しません。"
    example_source:
      product: Moonweave tool-plane boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
    field_values:
      policy_decision_id: decision-9
      authorization_outcome: denied
      tool_attempt_created: false
    related_node_ids: [tool-plane, safety-plane]
    related_relation_ids: []
    source_claims: [claim-tool-plane-design]
parent_relation: null
relations: []
