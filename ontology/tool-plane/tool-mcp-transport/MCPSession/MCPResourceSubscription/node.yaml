schema: moonweave.ai/ontology-node/v1
id: MCPResourceSubscription
kind: concept
labels:
  zh: MCP 资源订阅
  en: MCP resource subscription
  ja: MCP リソース購読
semantics:
  short_definition:
    zh: 客户端通过 resources/subscribe 为特定资源 URI 建立、以接收其更新通知的 MCP 订阅。
    en: An MCP subscription established by a client through resources/subscribe for a specific resource URI to receive its update notifications.
    ja: client が resources/subscribe を通じて特定 resource URI の更新通知を受けるために確立する MCP 購読。
  definition:
    zh: >
      MCP 资源订阅是核心 MCP 2025-11-25 标准化的 subscription 实例。若 server resources capability 声明 subscribe，client
      可以用 resources/subscribe 和 uri 建立该关联；该 resource 改变时 server 以 notifications/resources/updated 发送 URI。
      订阅不返回该 resource 的内容，client 需要时另发 resources/read。它不表示对所有资源、resource list 或本地文件系统路径的隐式监听。
    en: >
      An MCP resource subscription is the subscription instance standardized by core MCP 2025-11-25. If server resources
      capability declares subscribe, a client establishes the association through resources/subscribe and uri; when that resource
      changes the server sends notifications/resources/updated with the URI. The subscription does not return resource contents,
      which the client reads separately with resources/read. It does not mean implicit watching of every resource, a resource list,
      or a local filesystem path.
    ja: >
      MCP リソース購読は core MCP 2025-11-25 が標準化する subscription instance である。server resources capability が subscribe を
      宣言した場合、client は resources/subscribe と uri で関連を確立し、その resource が変更すると server は URI 付き
      notifications/resources/updated を送る。購読は resource content を返さず、client は必要に応じ resources/read を別途行う。
      全 resource、resource list、ローカル filesystem path の暗黙監視を意味しない。
  why_needed:
    zh: 它为可变资源提供显式、细粒度且可协商的变更反馈，而无需以轮询或全量内容推送维持新鲜度。
    en: It provides explicit, fine-grained, negotiated change feedback for mutable resources without maintaining freshness by polling or full-content pushes.
    ja: ポーリングまたは全 content push で鮮度を維持せず、可変 resource 用の明示的で細粒度な交渉済み変更フィードバックを提供する。
  includes:
    - {zh: resources/subscribe 请求, en: resources/subscribe request, ja: resources/subscribe 要求}
    - {zh: 具体 URI 的资源变化, en: Changes for one concrete URI, ja: 一つの具体 URI の変更}
    - {zh: notifications/resources/updated 反馈, en: notifications/resources/updated feedback, ja: notifications/resources/updated フィードバック}
  excludes:
    - {zh: 资源内容读取, en: Resource content reading, ja: resource content 読取}
    - {zh: 不含 resources.subscribe 的服务器上的隐式订阅, en: Implicit subscription on a server without resources.subscribe, ja: resources.subscribe のない server での暗黙購読}
  semantic_kind: state
  aliases:
    - {language: en, value: resource change subscription, alias_kind: synonym}
engineering:
  explanation:
    zh: client 以资源 URI 请求订阅。server 仅在声明 resources.subscribe 时接受；每次变化将相同 URI 放入 updated notification。client 以 URI 对本地缓存和后续 read 去重、关联。
    en: The client requests subscription by resource URI. The server accepts only when it declared resources.subscribe; on each change it puts the same URI in updated notification. The client uses the URI to deduplicate and correlate local cache and later reads.
    ja: client は resource URI で購読を要求する。server は resources.subscribe を宣言した場合のみ受け入れ、変更ごとに同じ URI を updated 通知に入れる。client は URI でローカル cache と後続 read を重複排除・相関する。
  typical_input:
    - description: Subscribe to one resource URI.
      format: '{"jsonrpc":"2.0","id":4,"method":"resources/subscribe","params":{"uri":"file:///project/src/main.rs"}}'
      source_claims: [mcp-resource-subscription-protocol]
  typical_output:
    - description: Notify that that subscribed URI changed.
      format: '{"jsonrpc":"2.0","method":"notifications/resources/updated","params":{"uri":"file:///project/src/main.rs"}}'
      source_claims: [mcp-resource-subscription-protocol]
  reference_implementations:
    - name: MCP Resources specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
      description: Defines resource subscriptions and resource update notification flow.
structure:
  identity_keys: ["local_subscriber_endpoint","uri"]
  fields:
    - id: local_subscriber_endpoint
      labels: {zh: "本地订阅客户端端点", en: "Local subscribing-client endpoint", ja: "ローカル購読クライアント端点"}
      definitions:
        zh: "Moonweave 的本地端点引用，记录谁建立了订阅；它不是 resources/subscribe JSON 中的字段。"
        en: "A Moonweave-local endpoint reference recording who established the subscription; it is not a resources/subscribe JSON field."
        ja: "誰が購読を確立したかを記録する Moonweave ローカル端点参照。resources/subscribe JSON のフィールドではない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "client-42"
      allowed_values: []
      source_claims: [moonweave-resource-subscription-session-composition]
    - id: uri
      labels: {zh: "资源 URI", en: "Resource URI", ja: "リソース URI"}
      definitions:
        zh: "建立订阅时的原生 resources/subscribe params.uri 成员，并与更新通知的 params.uri 相同。"
        en: "The native resources/subscribe params.uri member, equal to params.uri in the update notification."
        ja: "購読確立時のネイティブな resources/subscribe params.uri メンバーで、更新通知の params.uri と等しい。"
      datatype: uri
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "file:///project/src/main.rs"
      allowed_values: []
      source_claims: [mcp-resource-subscription-protocol]
    - id: local_subscribe_method
      labels: {zh: "本地订阅方法描述", en: "Local subscribe-method descriptor", ja: "ローカル購読メソッド記述"}
      definitions:
        zh: "Moonweave 的本地描述值，指向 wire method resources/subscribe；并非额外 payload 字段。"
        en: "A Moonweave-local descriptor referring to wire method resources/subscribe; it is not an additional payload field."
        ja: "wire method resources/subscribe を参照する Moonweave ローカル記述値。追加の payload フィールドではない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "resources/subscribe"
      allowed_values: []
      source_claims: [moonweave-resource-subscription-session-composition]
    - id: local_update_method
      labels: {zh: "本地更新方法描述", en: "Local update-method descriptor", ja: "ローカル更新メソッド記述"}
      definitions:
        zh: "Moonweave 的本地描述值，指向 wire method notifications/resources/updated；并非额外 payload 字段。"
        en: "A Moonweave-local descriptor referring to wire method notifications/resources/updated; it is not an additional payload field."
        ja: "wire method notifications/resources/updated を参照する Moonweave ローカル記述値。追加の payload フィールドではない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "notifications/resources/updated"
      allowed_values: []
      source_claims: [moonweave-resource-subscription-session-composition]
  constraints:
    - id: resource-subscription-server-support
      severity: error
      expression_language: plain
      expression: The server declares resources.subscribe before a client can establish an MCPResourceSubscription.
      explanation:
        zh: 在 client 建立 MCPResourceSubscription 前，server 声明 resources.subscribe。
        en: The server declares resources.subscribe before a client can establish an MCPResourceSubscription.
        ja: client が MCPResourceSubscription を確立する前に server は resources.subscribe を宣言する。
      source_claims: [mcp-resource-subscription-capability]
    - id: resource-subscription-update-uri-matches
      severity: error
      expression_language: plain
      expression: An update notification for this subscription carries the same resource URI used in resources/subscribe.
      explanation:
        zh: 此订阅的更新通知携带与 resources/subscribe 相同的 resource URI。
        en: An update notification for this subscription carries the same resource URI used in resources/subscribe.
        ja: この購読の更新通知は resources/subscribe で使った同じ resource URI を運ぶ。
      source_claims: [mcp-resource-subscription-protocol]
  required_relations: []
examples:
  - id: resource-subscription-positive-uri

    labels: {zh: 对具体 URI 的订阅, en: Subscription to concrete URI, ja: 具体 URI への購読}

    descriptions:
      zh: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。
      en: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths.
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"local_subscriber_endpoint":"client-42","uri":"file:///project/src/main.rs","local_subscribe_method":"resources/subscribe","local_update_method":"notifications/resources/updated"}
    related_node_ids: [MCPResourceSubscription, MCPSession, MCPResourceUpdatedNotification]
    related_relation_ids: [MCPResourceSubscription-part_of-MCPSession]

    source_claims: [mcp-resource-subscription-capability, mcp-resource-subscription-protocol]
  - id: resource-subscription-counterexample-wildcard

    labels: {zh: 隐式订阅所有资源, en: Implicit subscription to all resources, ja: 全 resource への暗黙購読}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"local_subscriber_endpoint":"client-42","uri":"file:///project/*","local_subscribe_method":"resources/subscribe","local_update_method":"notifications/resources/updated"}
    related_node_ids: [MCPResourceSubscription, MCPSession]
    related_relation_ids: [MCPResourceSubscription-part_of-MCPSession]

    source_claims: [mcp-resource-subscription-protocol]
  - id: resource-subscription-boundary-list-changed

    labels: {zh: URI 订阅与资源列表改变的边界, en: Boundary between URI subscription and resource-list change, ja: URI 購読と resource-list 変更の境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"local_subscriber_endpoint":"client-42","uri":"file:///project/src/main.rs","local_subscribe_method":"resources/subscribe","local_update_method":"notifications/resources/updated"}
    related_node_ids: [MCPResourceSubscription, MCPNotification]
    related_relation_ids: [MCPResourceSubscription-part_of-MCPSession]

    source_claims: [mcp-resource-subscription-protocol, mcp-resource-subscription-list-change]
  - id: resource-subscription-instance-main-rs

    labels: {zh: main.rs 资源订阅实例, en: main.rs resource subscription instance, ja: main.rs resource 購読実例}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"local_subscriber_endpoint":"client-42","uri":"file:///project/src/main.rs","local_subscribe_method":"resources/subscribe","local_update_method":"notifications/resources/updated"}
    related_node_ids: [MCPResourceSubscription, MCPResourceUpdatedNotification, MCPClient]
    related_relation_ids: [MCPResourceSubscription-part_of-MCPSession]

    source_claims: [mcp-resource-subscription-protocol]
parent_relation:
  id: MCPResourceSubscription-part_of-MCPSession
  predicate: part_of
  target: concept:MCPSession
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是 MCP 会话中 URI 范围的资源订阅部分
    en: is a URI-scoped resource-subscription part of an MCP session
    ja: MCP セッションの URI 範囲 resource subscription 部分である
  definition:
    zh: MCP 资源订阅是在一个 MCP 会话内为一个明确资源 URI 登记更新通知的关联。
    en: An MCP resource subscription is the registration within one MCP session for update notifications about one explicit resource URI.
    ja: MCP resource subscription は一つの明示 resource URI の更新通知を一つの MCP session 内で登録する関連である。
  cardinality:
    source: {min: 1, max: 1}
    target: {min: 0, max: null}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_resource_subscription
    labels:
      zh: 具有资源订阅
      en: has resource subscription
      ja: resource subscription を持つ
  conditions:
    - condition: The server declared resources.subscribe and the client issued resources/subscribe for one URI.
      source_claims: [mcp-resource-subscription-capability, mcp-resource-subscription-protocol]
  temporal_scope: session
  boundary_context: 此组成关系只表达一个会话内单 URI 的 core resource subscription，不把资源内容、resource list 事件、缓存或通用订阅 API 作为其组成部分。
  constraints:
    - id: resource-subscription-session-membership
      severity: error
      expression_language: plain
      expression: Moonweave records each MCPResourceSubscription as belonging to one MCPSession.
      explanation:
        zh: Moonweave 将每个 MCPResourceSubscription 记录为属于一个 MCPSession。
        en: Moonweave records each MCPResourceSubscription as belonging to one MCPSession.
        ja: Moonweave は各 MCPResourceSubscription を一つの MCPSession に属するものとして記録する。
      source_claims: [moonweave-resource-subscription-session-composition]
    - id: resource-subscription-is-uri-scoped
      severity: error
      expression_language: plain
      expression: An MCPResourceSubscription has one concrete resource URI and uses resources/subscribe for that URI.
      explanation:
        zh: MCPResourceSubscription 具有一个具体 resource URI，并对该 URI 使用 resources/subscribe。
        en: An MCPResourceSubscription has one concrete resource URI and uses resources/subscribe for that URI.
        ja: MCPResourceSubscription は一つの具体 resource URI を持ち、その URI に resources/subscribe を使う。
      source_claims: [mcp-resource-subscription-protocol]
  examples: []
  source_claims: [moonweave-resource-subscription-session-composition]
  distinct_fact_rationale:
    zh: 该组成关系将标准 URI 范围订阅绑定到会话，而不虚构一个更宽泛的通用订阅协议类型。
    en: This composition binds the standard URI-scoped subscription to its session without inventing a broader generic subscription protocol type.
    ja: この構成は、より広い汎用 subscription プロトコル型を創作せず、標準 URI 範囲 subscription を session に結び付ける。
relations: []
sources:
  - id: mcp-resources-2025-11-25
    title: Model Context Protocol Specification — Resources
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
    source_type: official-specification
    locator: "Capabilities; Subscriptions; List Changed Notification"
    relevance: Defines resource-specific subscription, update notification, and list-change distinction.
source_claims:
  - id: mcp-resource-subscription-capability
    source: mcp-resources-2025-11-25
    supports: A server declares resources.subscribe to indicate that clients can subscribe to individual resource changes.
    locator: "Capabilities"
    evidence_kind: normative
    confidence: high
  - id: moonweave-resource-subscription-session-composition
    source: mcp-resources-2025-11-25
    supports: "Moonweave models the standard URI-scoped resource subscription as part of an MCPSession for schema navigation; this composition edge is a taxonomy design inference."
    locator: "Subscriptions"
    evidence_kind: design-inference
    confidence: high
  - id: mcp-resource-subscription-protocol
    source: mcp-resources-2025-11-25
    supports: A client uses resources/subscribe with a specific URI and receives notifications/resources/updated when that resource changes.
    locator: "Subscriptions"
    evidence_kind: normative
    confidence: high
  - id: mcp-resource-subscription-list-change
    source: mcp-resources-2025-11-25
    supports: Resource list changes use separate listChanged capability and notifications/resources/list_changed.
    locator: "Capabilities; List Changed Notification"
    evidence_kind: normative
    confidence: high
