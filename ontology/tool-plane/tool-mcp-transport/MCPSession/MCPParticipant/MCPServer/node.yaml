schema: moonweave.ai/ontology-node/v1
id: MCPServer
kind: concept
status: review
labels:
  en: MCP server
  zh: MCP 服务器
  ja: MCP サーバー
semantics:
  short_definition:
    zh: 向一个 MCP 客户端会话提供工具、资源、提示等特性的协议端点。
    en: A protocol endpoint providing tools, resources, prompts, or other features to one MCP client session.
    ja: 一つの MCP クライアントセッションへ tools・resources・prompts 等を提供する端点。
  definition:
    zh: MCP 服务器是一种 MCP 参与方（MCPParticipant），响应初始化并声明服务器能力，向一个客户端提供工具、资源、提示与实用功能，并可在客户端已声明能力下发送 sampling、elicitation 或 roots 请求；它不是 OAuth 授权服务器或任意上游 API。
    en: An MCP server is an MCPParticipant that responds to initialization, declares server capabilities, serves tools, resources, prompts, and utilities to one client, and may send sampling, elicitation, or roots requests only under declared client capabilities. It is not an OAuth authorization server or arbitrary upstream API.
    ja: MCP server は MCPParticipant の一種で initialization に応答し server capability と tool/resource/prompt/utility を一 client に提供し、client capability 下だけ sampling/elicitation/roots request を送ります。OAuth server/upstream API ではありません。
  why_needed:
    zh: 服务器角色界定哪些能力应由初始化结果声明、哪些列表和调用方法由其实现，以及何时允许反向请求客户端特性。
    en: The server role determines which capabilities appear in the initialization result, which list/call methods it implements, and when server-to-client feature requests are permitted.
    ja: サーバー役割は初期化結果で宣言する能力、実装する list/call メソッド、クライアント機能を逆向き要求できる条件を決めます。
  includes:
    - zh: 纳入参与已初始化 MCP 会话、履行服务器能力并处理相应协议方法的端点。
      en: Includes endpoints in initialized MCP sessions that fulfill declared server capabilities and handle their protocol methods.
      ja: 初期化済み MCP セッションで宣言済みサーバー能力を履行し、対応メソッドを処理する端点を含みます。
  excludes:
    - zh: 排除只签发访问令牌的授权服务器、被 MCP 工具调用的外部 API 以及宿主中的模型提供商。
      en: Excludes authorization servers that only issue tokens, external APIs called by MCP tools, and model providers inside the host.
      ja: トークンだけを発行する認可サーバー、MCP tool が呼ぶ外部 API、ホスト内モデル提供者を除きます。
  semantic_kind: role
  aliases: []
structure:
  identity_keys:
    - participant_id
  fields:
    - id: server_implementation_ref
      labels:
        zh: 服务器实现引用
        en: server-implementation reference
        ja: server implementation 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用承担该协议端点行为的服务器实现或部署。
        en: References the server implementation or deployment fulfilling this endpoint role.
        ja: この endpoint role を実装する server implementation/deployment を参照します。
      allowed_values: []
      pattern: null
      example_value: deployment:repo-context-prod
      source_claims:
        - claim-mcp-server-002
    - id: feature_families
      labels:
        zh: 提供的特性族
        en: provided feature families
        ja: 提供 feature families
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出服务器实际声明并可履行的工具、资源、提示或实用功能族。
        en: Lists the tool, resource, prompt, or utility feature families actually declared and fulfilled by the server.
        ja: server が実際に宣言・履行する tool/resource/prompt/utility feature families を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - resources
        - tools
      source_claims:
        - claim-mcp-server-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: mcp-server-positive-repository-provider
    kind: positive
    labels:
      zh: 代码仓库服务端点
      en: Repository provider endpoint
      ja: リポジトリ提供端点
    scenario_id: null
    descriptions:
      zh: "`repo-server` 在初始化结果声明 `resources` 与 `tools`，随后响应 `resources/list` 和 `tools/call`。"
      en: "`repo-server` declares `resources` and `tools` in its initialization result, then handles `resources/list` and `tools/call`."
      ja: "`repo-server` は初期化結果で `resources` と `tools` を宣言し、`resources/list` と `tools/call` を処理します。"
    field_values:
      participant_id: repo-server
      session_id: mcp-session-repository-1
      participant_side: server
      server_implementation_ref: deployment:repo-context-prod
      feature_families:
        - resources
        - tools
    related_node_ids:
      - MCPServer
      - MCPServerCapability
      - MCPParticipant
    related_relation_ids:
      - MCPServer-is_a-MCPParticipant
    expected_result:
      zh: 该端点被识别为 MCPServer，且只能使用已声明能力。
      en: The endpoint is identified as MCPServer and may use only declared capabilities.
      ja: 端点は MCPServer と識別され、宣言済み能力だけを使用できます。
    why_valid_or_invalid:
      zh: 它响应初始化并实际履行服务器特性方法。
      en: It answers initialization and fulfills server-feature methods.
      ja: 初期化に応答し、サーバー機能メソッドを履行します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-server-001
  - id: mcp-server-boundary-oauth-issuer
    kind: boundary
    labels:
      zh: 独立 OAuth 授权服务器
      en: Separate OAuth authorization server
      ja: 独立 OAuth 認可サーバー
    scenario_id: null
    descriptions:
      zh: "`login.example.com` 发布授权元数据并签发访问令牌，但不处理任何 MCP JSON-RPC 方法。"
      en: "`login.example.com` publishes authorization metadata and issues access tokens but handles no MCP JSON-RPC method."
      ja: "`login.example.com` は認可メタデータを公開し access token を発行しますが、MCP JSON-RPC メソッドを処理しません。"
    field_values:
      service: login.example.com
      role: authorization-server
    related_node_ids:
      - MCPServer
      - MCPAuthorization
    related_relation_ids: []
    expected_result:
      zh: 不得仅因参与 MCP 授权流程就把它归为 MCPServer。
      en: Participation in MCP authorization does not make it an MCPServer.
      ja: MCP 認可フローへの参加だけで MCPServer に分類しません。
    why_valid_or_invalid:
      zh: 令牌签发与 MCP 资源服务器端点是不同协议角色。
      en: Token issuance and the MCP resource-server endpoint are different protocol roles.
      ja: トークン発行と MCP リソースサーバー端点は別の役割です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-server-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: MCPClient
    shared_parent_concept_id: MCPParticipant
    differentia:
      zh: MCPServer 与 MCPClient 同属 MCPParticipant；MCPClient 发起初始化和服务器功能请求并承接客户端能力；MCPServer 返回初始化结果、提供工具/资源/提示并发起客户端功能请求。
      en: MCPServer and MCPClient share MCPParticipant; MCPClient initiates initialization and server-feature requests and serves client capabilities, whereas MCPServer returns initialization results, provides tools/resources/prompts, and initiates client-feature requests.
      ja: MCPServer と MCPClient は MCPParticipant を共有し、MCPClient は initialization/server-feature request を開始し client capability を提供し、MCPServer は initialization result と tools/resources/prompts を提供して client-feature request を開始します。
    source_claims:
      - claim-mcp-server-004
parent_relation:
  id: MCPServer-is_a-MCPParticipant
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: MCPServer是一种MCPParticipant
    en: MCPServer is a MCPParticipant
    ja: MCPServerがMCPParticipantを一種である
  definitions:
    zh: MCPServer 是 MCPParticipant 的严格子型；其必要身份差异是：MCP 服务器是一种 MCP 参与方（MCPParticipant），响应初始化并声明服务器能力，向一个客户端提供工具、资源、提示与实用功能，并可在客户端已声明能力下发送 sampling、elicitation 或 roots 请求；它不是 OAuth 授权服务器或任意上游 API。
    en: "MCPServer is a strict subtype of MCPParticipant; its necessary identity differentia is: An MCP server is an MCPParticipant that responds to initialization, declares server capabilities, serves tools, resources, prompts, and utilities to one client, and may send sampling, elicitation, or roots requests only under declared client capabilities. It is not an OAuth authorization server or arbitrary upstream API."
    ja: MCPServer は MCPParticipant の strict subtype であり、必要な identity differentia は次の通りです：MCP server は MCPParticipant の一種で initialization に応答し server capability と tool/resource/prompt/utility を一 client に提供し、client capability 下だけ sampling/elicitation/roots request を送ります。OAuth server/upstream API ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
    en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
    ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
  inverse_reading:
