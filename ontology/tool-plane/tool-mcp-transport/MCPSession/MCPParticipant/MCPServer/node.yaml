schema: moonweave.ai/ontology-node/v1
id: MCPServer
kind: concept
labels:
  zh: MCP 服务器
  en: MCP server
  ja: MCP サーバー
semantics:
  short_definition:
    zh: 向连接的 MCP 客户端暴露专用资源、工具、提示及其他已声明功能的协议端点。
    en: The protocol endpoint that exposes specialized resources, tools, prompts, and other declared features to a connected MCP client.
    ja: 接続した MCP クライアントへ専門的 resources、tools、prompts、その他の宣言済み機能を公開するプロトコル端点。
  definition:
    zh: >
      MCP 服务器是提供专用上下文和 capability 的独立端点。它在 initialize result 中声明 server capabilities 和 serverInfo，
      可提供 prompts、resources、tools、logging、completions、tasks 或 experimental 功能，并可通过 client 接口请求 sampling。
      服务器可以是本地进程或远程服务。它不是 host、HTTP 授权服务器、某个工具定义本身或所有客户端之间共享的未经隔离上下文。
    en: >
      An MCP server is an independent endpoint that provides specialized context and capabilities. It declares server capabilities
      and serverInfo in initialize result, may provide prompts, resources, tools, logging, completions, tasks, or experimental
      features, and may request sampling through client interfaces. A server can be a local process or remote service. It is not
      the host, an HTTP authorization server, a tool definition itself, or unisolated context shared across every client.
    ja: >
      MCP サーバーは専門的 context と capability を提供する独立端点である。initialize result で server capabilities と
      serverInfo を宣言し、prompts、resources、tools、logging、completions、tasks、experimental を提供でき、client
      interface 経由で sampling を求められる。server はローカルプロセスまたはリモートサービスであり、host、HTTP 認可サーバー、
      ツール定義自体、全 client 間で非分離に共有される context ではない。
  why_needed:
    zh: 专用服务器可在 host 控制的隔离连接内为客户端提供可组合的上下文与操作，而不强迫每个 host 实现同一领域功能。
    en: Specialized servers provide composable context and operations to clients over host-controlled isolated connections without forcing every host to implement the same domain features.
    ja: 専門 server は、各 host に同じ領域機能を実装させず、host 制御の分離接続で client に合成可能な context と操作を提供する。
  includes:
    - {zh: serverInfo 和 capability 声明, en: serverInfo and capability declarations, ja: serverInfo と capability 宣言}
    -
      zh: prompts、resources、tools 与相关通知
      en: Prompts, resources, tools, and related notifications
      ja: prompts、resources、tools と関連通知
    - {zh: 本地子进程或远程服务部署, en: Local-subprocess or remote-service deployment, ja: ローカル子プロセスまたはリモートサービス配備}
  excludes:
    - {zh: host 侧连接权限和用户同意决策, en: Host-side connection permission and user-consent decisions, ja: host 側の接続権限とユーザー同意判断}
    - {zh: client 的模型选择或资源根目录声明, en: Client model selection or roots declarations, ja: client のモデル選択または roots 宣言}
  semantic_kind: role
  aliases:
    - {language: en, value: MCP server endpoint, alias_kind: synonym}
engineering:
  explanation:
    zh: 服务器以 initialize result 返回 protocolVersion、server capabilities 和 serverInfo。它只能公开已声明的 feature，客户端据此调用列表、读取或调用方法；本地服务器通常用 stdio，远程服务器可用 Streamable HTTP。
    en: A server returns protocolVersion, server capabilities, and serverInfo in initialize result. It exposes only declared features, from which a client invokes list, read, or call methods; a local server commonly uses stdio and a remote server may use Streamable HTTP.
    ja: server は initialize result に protocolVersion、server capabilities、serverInfo を返す。宣言済み feature だけを公開し、client はそこから list、read、call を呼ぶ。ローカル server は通常 stdio、リモート server は Streamable HTTP を使える。
  typical_input:
    - description: Client initialization to a server.
      format: '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{},"clientInfo":{"name":"ExampleClient","version":"1.0"}}}'
      source_claims: [mcp-server-initialize]
  typical_output:
    - description: Server feature declaration in initialization result.
      format: '{"jsonrpc":"2.0","id":1,"result":{"protocolVersion":"2025-11-25","capabilities":{"tools":{},"resources":{}},"serverInfo":{"name":"ExampleServer","version":"1.0"}}}'
      source_claims: [mcp-server-initialize]
  reference_implementations:
    - name: MCP Architecture specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/architecture
      description: Canonical server role, server primitives, independent responsibilities, and deployment forms.
structure:
  identity_keys: ["local_server_instance", "local_endpoint_role"]
  fields:
    - id: local_participant_reference
      labels: {zh: "本地参与者引用", en: "Local participant reference", ja: "ローカル参加者参照"}
      definitions:
        zh: "继承自 MCPParticipant 的会话参与者引用；对 MCPServer 它与 `local_server_instance` 指向同一个服务端端点。"
        en: "The session-participant reference inherited from MCPParticipant; for MCPServer it identifies the same server endpoint as `local_server_instance`."
        ja: "MCPParticipant から継承するセッション参加者参照。MCPServer では `local_server_instance` と同じサーバー端点を指す。"
      datatype: identifier
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "server-weather"
      allowed_values: []
      source_claims: [mcp-server-role]
    - id: local_endpoint_role
      labels: {zh: "本地端点角色", en: "Local endpoint role", ja: "ローカル端点ロール"}
      definitions:
        zh: "继承自 MCPParticipant 的 Moonweave 端点角色；该子类型固定为 `server`，不是 JSON-RPC 信封字段。"
        en: "The Moonweave endpoint role inherited from MCPParticipant; this subtype fixes it to `server`, not a JSON-RPC envelope field."
        ja: "MCPParticipant から継承する Moonweave 端点ロール。この下位型では JSON-RPC エンベロープのフィールドではなく `server` に固定される。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "server"
      allowed_values: ["server"]
      source_claims: [mcp-server-role]
    - id: local_implementation_name
      labels: {zh: "本地实现名称视图", en: "Local implementation-name view", ja: "ローカル実装名表示"}
      definitions:
        zh: "继承自 MCPParticipant 的本地显示视图，取自原生 initialize 结果中的 `serverInfo.name`。"
        en: "The local display view inherited from MCPParticipant, taken from native `serverInfo.name` in the initialize result."
        ja: "MCPParticipant から継承するローカル表示ビューで、initialize 結果内のネイティブな `serverInfo.name` から取得する。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "WeatherServer"
      allowed_values: []
      source_claims: [mcp-server-initialize]
    - id: local_server_instance
      labels: {zh: "本地服务器实例", en: "Local server instance", ja: "ローカルサーバーインスタンス"}
      definitions:
        zh: "Moonweave 的本地实例引用，表示会话中一个 MCP server；它不是 wire 字段。"
        en: "A Moonweave-local instance reference for one MCP server in a session; it is not a wire field."
        ja: "セッション内の一つの MCP server を表す Moonweave ローカルインスタンス参照。wire フィールドではない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "server-weather"
      allowed_values: []
      source_claims: [moonweave-mcp-server-taxonomy]
    - id: local_server_info_name
      labels: {zh: "本地 serverInfo 名称视图", en: "Local serverInfo-name view", ja: "ローカル serverInfo 名表示"}
      definitions:
        zh: "Moonweave 的本地查看值，来自 initialize 结果的 serverInfo.name；它不是通用 implementation_name wire 字段。"
        en: "A Moonweave-local viewing value from serverInfo.name in the initialize result; it is not a generic implementation_name wire field."
        ja: "initialize 結果の serverInfo.name からの Moonweave ローカル表示値。一般的な implementation_name wire フィールドではない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "WeatherServer"
      allowed_values: []
      source_claims: [mcp-server-initialize]
    - id: local_declared_capabilities
      labels: {zh: "本地声明能力快照", en: "Local declared-capabilities snapshot", ja: "ローカル宣言機能スナップショット"}
      definitions:
        zh: "Moonweave 的本地快照，引用 initialize 结果 capabilities；它不是另一个 wire 字段。"
        en: "A Moonweave-local snapshot referring to capabilities in the initialize result; it is not another wire field."
        ja: "initialize 結果の capabilities を参照する Moonweave ローカルスナップショット。別の wire フィールドではない。"
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: {"tools":{},"resources":{}}
      allowed_values: []
      source_claims: [mcp-server-capability-categories]
    - id: local_deployment_kind
      labels: {zh: "本地部署类型", en: "Local deployment kind", ja: "ローカル配備種別"}
      definitions:
        zh: "Moonweave 的本地部署分类 local-process 或 remote-service；它不在 MCP initialize JSON 中。"
        en: "A Moonweave-local deployment classification local-process or remote-service; it is not in MCP initialize JSON."
        ja: "local-process または remote-service を示す Moonweave ローカル配備分類。MCP initialize JSON にはない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "local-process"
      allowed_values: ["local-process","remote-service"]
      source_claims: [mcp-server-role]
  constraints:
    - id: server-advertises-implemented-features
      severity: error
      expression_language: plain
      expression: A server advertises implemented server features in its initialization capabilities and clients use those declarations to determine available operations.
      explanation:
        zh: server 在初始化 capabilities 中公布已实现 feature，client 以这些声明确定可用操作。
        en: A server advertises implemented server features in its initialization capabilities and clients use those declarations to determine available operations.
        ja: server は初期化 capabilities で実装済み feature を広告し、client はその宣言で利用可能操作を判断する。
      source_claims: [mcp-server-capability-categories]
    - id: server-context-isolation
      severity: error
      expression_language: plain
      expression: A server receives only necessary contextual information through its isolated client connection and does not see other server connections.
      explanation:
        zh: server 只能通过隔离 client 连接获得必要上下文，且不能看到其他 server 连接。
        en: A server receives only necessary contextual information through its isolated client connection and does not see other server connections.
        ja: server は分離 client 接続を通じ必要な context だけを受け、他 server 接続を見ない。
      source_claims: [mcp-server-isolation]
  required_relations: []
examples:
  - id: mcp-server-positive-weather-tools

    labels: {zh: 声明天气工具的服务器, en: Server declaring weather tools, ja: 天気ツールを宣言する server}

    descriptions:
      zh: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。
      en: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths.
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"local_participant_reference":"server-weather","local_endpoint_role":"server","local_implementation_name":"WeatherServer","local_server_instance":"server-weather","local_server_info_name":"WeatherServer","local_declared_capabilities":{"tools":{},"resources":{}},"local_deployment_kind":"local-process"}
    related_node_ids: [MCPServer, MCPParticipant, MCPClient, MCPToolCallRequest]
    related_relation_ids: [MCPServer-is_a-MCPParticipant]

    source_claims: [mcp-server-initialize, mcp-server-capability-categories]
  - id: mcp-server-counterexample-undeclared-resource-subscription

    labels: {zh: 未声明订阅却发送更新, en: Update sent without declared subscription, ja: 購読未宣言で更新送信}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"local_participant_reference":"server-weather","local_endpoint_role":"server","local_implementation_name":"WeatherServer","local_server_instance":"server-weather","local_server_info_name":"WeatherServer","local_declared_capabilities":{"resources":{}},"local_deployment_kind":"remote-service"}
    related_node_ids: [MCPServer, MCPResourceSubscription, MCPResourceUpdatedNotification]
    related_relation_ids: [MCPServer-is_a-MCPParticipant]

    source_claims: [mcp-server-capability-categories]
  - id: mcp-server-boundary-local-or-remote

    labels: {zh: 本地与远程部署的边界, en: Boundary between local and remote deployment, ja: ローカルとリモート配備の境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"local_participant_reference":"server-weather","local_endpoint_role":"server","local_implementation_name":"WeatherServer","local_server_instance":"server-weather","local_server_info_name":"WeatherServer","local_declared_capabilities":{"tools":{}},"local_deployment_kind":"remote-service"}
    related_node_ids: [MCPServer, MCPStdioTransport, MCPStreamableHTTPTransport]
    related_relation_ids: [MCPServer-is_a-MCPParticipant]

    source_claims: [mcp-server-role]
  - id: mcp-server-instance-weather-server

    labels: {zh: WeatherServer 实例, en: WeatherServer instance, ja: WeatherServer 実例}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"local_participant_reference":"server-weather","local_endpoint_role":"server","local_implementation_name":"WeatherServer","local_server_instance":"server-weather","local_server_info_name":"WeatherServer","local_declared_capabilities":{"tools":{},"resources":{"subscribe":true}},"local_deployment_kind":"local-process"}
    related_node_ids: [MCPServer, MCPServerCapability, MCPSession]
    related_relation_ids: [MCPServer-is_a-MCPParticipant]

    source_claims: [mcp-server-role, mcp-server-capability-categories]
parent_relation:
  id: MCPServer-is_a-MCPParticipant
  predicate: is_a
  target: concept:MCPParticipant
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是 MCP 参与者的服务器子类, en: is the server subtype of MCP participant, ja: MCP 参加者の server 下位型である}
  definition:
    zh: MCP 服务器是向已连接 client 公开专用 context 与已声明 capability 的 MCP 会话参与者。
    en: An MCP server is an MCP session participant that exposes specialized context and declared capabilities to its connected client.
    ja: MCP server は接続 client に専門 context と宣言済み capability を公開する MCP セッション参加者である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_server_subtype
    labels: {zh: 具有服务器子类, en: has server subtype, ja: server 下位型を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: 该层级表达提供 feature 的协议端点角色，不把 host、授权服务器、单个工具或资源建模为 server 子类。
  constraints:
    - id: server-subtype-advertises-capabilities
      severity: error
      expression_language: plain
      expression: An MCPServer advertises the protocol features it implements through server capabilities during initialization.
      explanation:
        zh: MCPServer 在初始化期间通过 server capabilities 声明其实现的协议功能。
        en: An MCPServer advertises the protocol features it implements through server capabilities during initialization.
        ja: MCPServer は初期化中に server capabilities を通じ実装プロトコル機能を広告する。
      source_claims: [mcp-server-initialize]
  examples: []
  source_claims: [moonweave-mcp-server-taxonomy]
  distinct_fact_rationale:
    zh: 子类由 server-side capability 提供与声明职责区分，而不是由任意 response 消息区分。
    en: The subtype is distinguished by server-side capability provision and declaration responsibility, not arbitrary response messages.
    ja: この下位型は任意の response メッセージではなく server 側 capability 提供・宣言責務により区別される。
relations: []
