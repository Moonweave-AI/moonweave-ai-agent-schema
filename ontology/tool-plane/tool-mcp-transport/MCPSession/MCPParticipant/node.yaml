schema: moonweave.ai/ontology-node/v1
id: MCPParticipant
kind: concept
status: review
labels:
  zh: MCP 参与方
  en: MCP Participant
  ja: MCP 参加者
semantics:
  short_definition:
    zh: 在一条 MCP 会话中承担协议端点职责的客户端或服务器角色。
    en: A client or server endpoint role in one MCP session.
    ja: 一つの MCP セッションでプロトコル端点を担うクライアントまたはサーバーの役割。
  definition:
    zh: MCP 参与方是一种角色，表示在一条 MCP 会话中承担客户端或服务器消息发送、接收、初始化与能力履约职责的协议端点；宿主应用、最终用户、OAuth 授权服务器、网络进程或普通上游 API 不因相邻出现而成为参与方。
    en: An MCP participant is a role borne by a protocol endpoint that sends and receives messages, performs initialization, and fulfills client or server capabilities within one MCP session. A host application, end user, OAuth authorization server, network process, or upstream API does not become a participant through adjacency.
    ja: MCP participant は一 MCP session で message send/receive・initialization・client/server capability 履行を担う protocol endpoint role です。host app・end user・OAuth server・network process・upstream API は隣接だけで participant になりません。
  why_needed:
    zh: 把端点角色单独建模，才能询问某条消息由哪一方合法发出，并避免把用户同意或宿主编排误当成协议端点行为。
    en: A distinct endpoint role makes message-direction questions decidable and prevents user consent or host orchestration from being mistaken for protocol-endpoint behavior.
    ja: 端点役割を独立させることで、どちらがメッセージを合法に送れるかを判定でき、利用者同意やホスト編成を端点動作と誤認しません。
  includes:
    - zh: 纳入已绑定某一 MCP 会话并承担客户端或服务器协议义务的端点角色。
      en: Includes endpoint roles bound to an MCP session and carrying client or server protocol obligations.
      ja: MCP セッションに結び付けられ、クライアントまたはサーバーの義務を担う端点役割を含みます。
  excludes:
    - zh: 排除宿主进程、批准操作的用户、OAuth 授权服务器和未参与 MCP 会话的普通服务。
      en: Excludes the host process, approving user, OAuth authorization server, and ordinary services outside an MCP session.
      ja: ホストプロセス、承認する利用者、OAuth 認可サーバー、MCP セッション外の一般サービスを除きます。
  semantic_kind: role
  aliases: []
structure:
  identity_keys:
    - participant_id
  fields:
    - id: participant_id
      labels:
        zh: 参与方标识
        en: participant ID
        ja: participant ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一条 MCP 会话中的一个协议端点角色。
        en: Stably identifies one protocol-endpoint role in an MCP session.
        ja: 一 MCP session 内の一 protocol-endpoint role を安定識別します。
      allowed_values: []
      pattern: null
      example_value: repo-context-client
      source_claims:
        - claim-mcp-participant-002
    - id: session_id
      labels:
        zh: 会话引用
        en: session reference
        ja: session 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该参与方承担协议职责的唯一 MCPSession。
        en: References the one MCPSession in which the participant fulfills its protocol duties.
        ja: participant が protocol duty を担う一 MCPSession を参照します。
      allowed_values: []
      pattern: null
      example_value: mcp-session-repo-context-1
      source_claims:
        - claim-mcp-participant-003
    - id: participant_side
      labels:
        zh: 参与方方向
        en: participant side
        ja: participant side
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明端点在该会话中承担客户端还是服务器协议方向。
        en: States whether the endpoint fulfills the client or server protocol direction in this session.
        ja: endpoint が session 内で client/server のどちらの protocol direction を担うかを示します。
      allowed_values:
        - id: MCPParticipantSideClient
          value: client
          labels:
            zh: 客户端
            en: client
            ja: client
          definitions:
            zh: 发起初始化并请求服务器特性的协议方向。
            en: The protocol side that initiates initialization and requests server features.
            ja: initialization を開始し server feature を要求する protocol side。
          status: accepted
          source_claims:
            - claim-mcp-participant-004
        - id: MCPParticipantSideServer
          value: server
          labels:
            zh: 服务器
            en: server
            ja: server
          definitions:
            zh: 响应初始化并提供协议特性的协议方向。
            en: The protocol side that answers initialization and provides protocol features.
            ja: initialization に応答し protocol feature を提供する side。
          status: accepted
          source_claims:
            - claim-mcp-participant-005
      pattern: null
      example_value: client
      source_claims:
        - claim-mcp-participant-006
  constraints: []
  required_relation_constraints: []
examples:
  - id: mcp-participant-positive-session-endpoints
    kind: positive
    labels:
      zh: 版本协商的两端
      en: Two endpoints negotiating a version
      ja: 版交渉を行う二端点
    scenario_id: null
    descriptions:
      zh: 桌面宿主为 `repo-context` 服务创建一个客户端；该客户端发送 `initialize`，服务端返回版本和能力。客户端角色与服务器角色都是该会话的 MCPParticipant。
      en: A desktop host creates a client for the `repo-context` service. The client sends `initialize`, and the server returns its version and capabilities. Both endpoint roles are MCPParticipant instances.
      ja: デスクトップホストが `repo-context` サービス用クライアントを作成し、クライアントが `initialize`、サーバーが版と能力を返します。両端点役割が MCPParticipant です。
    field_values:
      participant_id: repo-context-client
      session_id: mcp-session-repo-context-1
      participant_side: client
    related_node_ids:
      - MCPParticipant
      - MCPClient
      - MCPServer
    related_relation_ids:
      - MCPClient-is_a-MCPParticipant
      - MCPServer-is_a-MCPParticipant
    expected_result:
      zh: 查询返回两个参与方角色，并保持客户端与服务器方向。
      en: The query returns two participant roles while preserving client/server direction.
      ja: 照会は二つの参加者役割を返し、クライアント・サーバー方向を保持します。
    why_valid_or_invalid:
      zh: 两者都承担会话内规范职责，而不是仅与系统相邻。
      en: Both fulfill normative duties inside the session rather than merely being adjacent systems.
      ja: 両者は単なる隣接システムではなく、セッション内の規範的責務を担います。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-participant-001
  - id: mcp-participant-boundary-approving-user
    kind: boundary
    labels:
      zh: 批准采样的用户
      en: User approving sampling
      ja: sampling を承認する利用者
    scenario_id: null
    descriptions:
      zh: 用户在宿主界面批准一次 `sampling/createMessage`，但用户本人不编码、发送或接收 MCP 消息。
      en: A user approves one `sampling/createMessage` in the host UI but does not encode, send, or receive MCP messages.
      ja: 利用者がホスト UI で `sampling/createMessage` を承認しても、本人は MCP メッセージを符号化・送受信しません。
    field_values:
      actor: end-user
      action: approve
    related_node_ids:
      - MCPParticipant
    related_relation_ids: []
    expected_result:
      zh: 不得把该用户归为 MCPParticipant。
      en: The user is not classified as MCPParticipant.
      ja: 利用者を MCPParticipant に分類しません。
    why_valid_or_invalid:
      zh: 用户作出同意决定，协议端点职责仍由客户端承担。
      en: The user supplies consent; the client still carries the protocol-endpoint duties.
      ja: 利用者は同意を与えるだけで、プロトコル端点責務はクライアントが担います。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-participant-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: MCPSession-has_participant-MCPParticipant
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有 MCP 参与方
    en: has MCP participant
    ja: MCP participant を持つ
  definitions:
    zh: MCPSession has_participant 在该会话初始化、运行或关闭区间内具有明确 session_id 与 participant_id 关联的 MCPParticipant；MCPClient 与 MCPServer 是参与方角色的严格子类，但具体参与关系仍是会话成员事实，而不是类型继承。
    en: An MCPSession has_participant an MCPParticipant when session_id and participant_id are explicitly correlated during initialization, operation, or shutdown. MCPClient and MCPServer are strict participant-role subtypes, while concrete participation remains a session-membership fact rather than type inheritance.
    ja: MCPSession は initialization・operation・shutdown 区間で session_id と participant_id が明示相関する MCPParticipant を has_participant します。MCPClient/MCPServer は participant role の strict subtype ですが具体 participation は type inheritance ではなく session membership fact です。
  cardinality:
    source:
      min: 1
      max: null
    target:
      min: 1
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 参与 MCP 会话
      en: participates in MCP session
      ja: MCP session に参加する
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: MCPSession-has_participant-MCPParticipant-example-positive-manual-001
      kind: positive
      labels:
        zh: 初始化确认会话参与方正例
        en: Initialization establishes session participant positive case
        ja: initialization が session participant を確立する正例
      scenario_id: null
      descriptions:
        zh: session-42 的 initialize 请求与响应分别记录 client-42 和 server-7，二者的 protocolVersion、session_id 与有效区间均可核对。
        en: The initialize request and response for session-42 record client-42 and server-7 with correlatable protocolVersion, session_id, and validity intervals.
        ja: session-42 の initialize request/response が client-42/server-7 を記録し protocolVersion・session_id・validity interval を照合できます。
      field_values: {}
      related_node_ids:
        - MCPSession
        - MCPParticipant
        - MCPClient
        - MCPServer
      related_relation_ids:
        - MCPSession-has_participant-MCPParticipant
        - MCPClient-is_a-MCPParticipant
        - MCPServer-is_a-MCPParticipant
      expected_result:
        zh: 建立 session-42 到两个参与方的 has_participant 事实，并分别保留客户端和服务器角色。
        en: Assert session-42 has_participant facts for both participants while retaining their separate client and server roles.
        ja: session-42 の二 participant への has_participant fact を成立させ client/server role を分離保持します。
      why_valid_or_invalid:
        zh: 初始化交换提供明确双方身份、协议版本、会话相关性和有效时间。
        en: The initialization exchange supplies explicit identities for both sides, protocol version, session correlation, and valid time.
        ja: initialization exchange が両 side identity・protocol version・session correlation・valid time を提供します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-mcp-participant-007
    - id: MCPSession-has_participant-MCPParticipant-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 同端点流量不证明会话成员边界例
        en: Traffic on same endpoint does not prove session membership boundary case
        ja: 同一 endpoint traffic は session membership を証明しない境界例
      scenario_id: null
      descriptions:
        zh: 日志只显示某客户端访问同一 HTTP 端点，没有 initialize 相关性、session_id 或把该身份绑定到当前会话的授权上下文。
        en: A log only shows a client reaching the same HTTP endpoint, with no initialize correlation, session_id, or authorization context binding that identity to the current session.
        ja: log は client が同じ HTTP endpoint に到達したことだけを示し initialize correlation・session_id・current session への authorization binding がありません。
      field_values: {}
      related_node_ids:
        - MCPSession
        - MCPParticipant
      related_relation_ids:
        - MCPSession-has_participant-MCPParticipant
      expected_result:
        zh: 不建立 has_participant；端点共用或时间邻近不足以证明会话成员身份。
        en: Do not assert has_participant; endpoint sharing or temporal proximity is insufficient to prove session membership.
        ja: has_participant を成立させません。endpoint sharing や temporal proximity だけでは session membership を証明できません。
      why_valid_or_invalid:
        zh: 缺少初始化和会话相关字段时，参与方归属无法审计。
        en: Without initialization and session-correlation fields, participant membership is not auditable.
        ja: initialization と session-correlation field がなく participant membership を監査できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-mcp-participant-008
  source_claims:
    - claim-mcp-participant-009
  distinct_fact_rationale:
    zh: has_participant 表达具体会话成员关系；MCPClient/MCPServer 的 is_a 只表达角色分类，两者不能互相替代。
    en: has_participant states concrete session membership; MCPClient and MCPServer is_a relations state role classification, and neither fact substitutes for the other.
    ja: has_participant は concrete session membership、MCPClient/MCPServer is_a は role classification を表し相互代替できません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
review:
  status: accepted
  method: manual-mcp-spec-verification
  reviewer: manual-mcp-spec-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 MCP 2025-11-25 规范（生命周期、传输、授权、能力协商、JSON-RPC 消息、资源订阅）完成人工语义核验。
    en: Manually verified against MCP 2025-11-25 (lifecycle, transports, authorization, capability negotiation, JSON-RPC messages, resource subscriptions).
    ja: MCP 2025-11-25 仕様（ライフサイクル、トランスポート、認可、能力協議、JSON-RPC メッセージ、リソース購読）に照らして手動意味審査を完了しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-mcp-participant-001
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 requires initialization to be the first client-server interaction, exchanges distinct client and server capability declarations, negotiates one protocol version, enters operation only after notifications/initialized, and shuts down through the selected transport.
    locator: MCP 2025-11-25 > Base Protocol > Lifecycle > Initialization, Capability Negotiation, Operation, and Shutdown
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-mcp-participant-002
    source: eng-proto-mcp-2025-spec
    supports: MCP assigns separate client and server protocol roles inside each stateful connection; Moonweave gives each endpoint role a stable record identifier.
    locator: MCP 2025-11-25 > Architecture > Hosts, clients, and servers
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-mcp-participant-003
    source: eng-proto-mcp-2025-spec
    supports: MCP lifecycle and capability state are scoped to one client-server connection; Moonweave binds each endpoint role to that session.
    locator: MCP 2025-11-25 > Architecture and Base Protocol > Lifecycle
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-mcp-participant-004
    source: eng-proto-mcp-2025-spec
    supports: MCP defines a client role created by the host for one server connection.
    locator: MCP 2025-11-25 > Architecture > Clients
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-mcp-participant-005
    source: eng-proto-mcp-2025-spec
    supports: MCP defines the server role that exposes tools, resources, prompts, and protocol utilities.
    locator: MCP 2025-11-25 > Architecture > Servers
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-mcp-participant-006
    source: eng-proto-mcp-2025-spec
    supports: MCP assigns directional client and server responsibilities within each connection.
    locator: MCP 2025-11-25 > Architecture > Clients and servers
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-mcp-participant-007
    source: eng-proto-mcp-2025-spec
    supports: MCP lifecycle requires initialization as the first client-server interaction, exchanges client and server information and capabilities, negotiates one protocol version, and then enters operation. Moonweave uses those correlated facts to establish session membership for both participant roles.
    locator: MCP 2025-11-25 > Base Protocol > Lifecycle > Initialization, Capability Negotiation, Operation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-mcp-participant-008
    source: eng-proto-mcp-2025-spec
    supports: MCP lifecycle ties protocol operation to a completed initialization exchange and negotiated version. Moonweave therefore does not infer session participation from shared transport endpoints or nearby traffic alone.
    locator: MCP 2025-11-25 > Base Protocol > Lifecycle > Initialization; Operation; Shutdown
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-mcp-participant-009
    source: eng-proto-mcp-2025-spec
    supports: MCP lifecycle explicitly coordinates a client and server through initialization, capability negotiation, operation, and shutdown. This supports a session-membership fact over the common MCPParticipant role while preserving MCPClient and MCPServer as role specializations.
    locator: MCP 2025-11-25 > Base Protocol > Lifecycle > Initialization, Capability Negotiation, Operation, Shutdown
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
