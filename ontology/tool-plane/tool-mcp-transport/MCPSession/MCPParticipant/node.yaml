  - id: moonweave-mcp-participant-session-composition
    source: mcp-architecture-2025-11-25
    supports: "Moonweave treats client and server endpoint roles as parts of an MCPSession for schema navigation; this composition edge is a taxonomy design inference."
    locator: "MCP Architecture"
    evidence_kind: design-inference
    confidence: high
  - id: mcp-participant-roles
    source: mcp-architecture-2025-11-25
    supports: Clients negotiate and route protocol messages while servers provide resources, tools, prompts, and sampling requests.
    locator: "Clients; Servers"
    evidence_kind: normative
    confidence: high
  - id: mcp-participant-initialization
    source: mcp-lifecycle-2025-11-25
    supports: Initialization exchanges client and server capabilities and implementation information.
    locator: "Initialization"
    evidence_kind: normative
    confidence: high