schema: moonweave.ai/ontology-node/v1
id: MCPParticipant
kind: concept
labels:
  zh: MCP 会话参与者
  en: MCP session participant
  ja: MCP セッション参加者
semantics:
  short_definition:
    zh: 一个 MCP 会话中的端点角色，即客户端或服务器。
    en: 'An endpoint role in an MCP session: either the client or the server.'
    ja: MCP セッション内の端点役割、すなわちクライアントまたはサーバー。
  definition:
    zh: >
      MCP 会话参与者是在一个有状态 client-server 会话中发送或接收 MCP JSON-RPC 消息的端点。参与者有客户端和服务器两种角色：
      host 创建并管理客户端，客户端与特定服务器维持隔离连接；服务器暴露专用的上下文和 capability。此概念不表示 host、用户、
      OAuth 授权服务器或单条消息的发送者字段。
    en: >
      An MCP session participant is an endpoint that sends or receives MCP JSON-RPC messages in a stateful client-server
      session. There are client and server roles: a host creates and manages clients, a client maintains an isolated connection
      to a particular server, and a server exposes specialized context and capabilities. It does not mean the host, a user, an
      OAuth authorization server, or a sender field in one message.
    ja: >
      MCP セッション参加者は状態を持つ client-server セッションで MCP JSON-RPC メッセージを送受信する端点である。役割は
      client と server の二つであり、host が client を作成・管理し、client は特定 server への分離接続を維持し、server は
      専門的 context と capability を公開する。host、ユーザー、OAuth 認可サーバー、一件のメッセージの送信者フィールドではない。
  why_needed:
    zh: 明确端点角色可使方向性、能力声明、请求权限和隔离边界按会话建模，而非归因于不相关的 host 或用户。
    en: Explicit endpoint roles let direction, capability declarations, request permissions, and isolation boundaries be modeled per session rather than attributed to an unrelated host or user.
    ja: 明示的な端点役割により、方向、capability 宣言、要求権限、分離境界を無関係な host やユーザーではなくセッションごとにモデル化できる。
  includes:
    - {zh: MCPClient 端点, en: An MCPClient endpoint, ja: MCPClient 端点}
    - {zh: MCPServer 端点, en: An MCPServer endpoint, ja: MCPServer 端点}
    - {zh: 会话内的双向消息路由, en: In-session bidirectional message routing, ja: セッション内双方向メッセージルーティング}
  excludes:
    - {zh: 创建客户端的 host 进程, en: The host process that creates a client, ja: client を作る host プロセス}
    - {zh: 授权服务器或最终用户, en: An authorization server or end user, ja: 認可サーバーまたは最終ユーザー}
  semantic_kind: role
  aliases:
    - {language: en, value: MCP endpoint, alias_kind: synonym}
engineering:
  explanation:
    zh: 会话记录一个 client endpoint 和一个 server endpoint；双方在初始化中交换实现信息和 capabilities，并在操作期按角色路由请求、响应和通知。
    en: A session records one client endpoint and one server endpoint; they exchange implementation information and capabilities in initialization and route requests, responses, and notifications by role during operation.
    ja: セッションは client endpoint 一つと server endpoint 一つを記録する。双方は初期化で実装情報と capability を交換し、運用中に役割で要求、応答、通知をルーティングする。
  typical_input:
    - description: Client implementation information in initialize.
      format: '{"clientInfo":{"name":"ExampleClient","version":"1.0.0"},"capabilities":{}}'
      source_claims: [mcp-participant-initialization]
  typical_output:
    - description: Server implementation information and capabilities in initialize result.
      format: '{"serverInfo":{"name":"ExampleServer","version":"1.0.0"},"capabilities":{"tools":{}}}'
      source_claims: [mcp-participant-initialization]
  reference_implementations:
    - name: MCP Architecture specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/architecture
      description: Defines host, client, server roles and isolated 1:1 client-server connections.
structure:
  identity_keys: ["local_endpoint_role"]
  fields:
    - id: local_participant_reference
      labels: {zh: "本地端点引用", en: "Local endpoint reference", ja: "ローカル端点参照"}
      definitions:
        zh: "Moonweave 的本地引用，用于在会话图中区分端点；它不是 MCP JSON-RPC 或 initialize 字段。"
        en: "A Moonweave-local reference used to distinguish endpoints in a session graph; it is not an MCP JSON-RPC or initialize field."
        ja: "セッショングラフで端点を区別する Moonweave ローカル参照。MCP JSON-RPC または initialize フィールドではない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "client-42"
      allowed_values: []
      source_claims: [moonweave-mcp-participant-session-composition]
    - id: local_endpoint_role
      labels: {zh: "本地端点角色", en: "Local endpoint role", ja: "ローカル端点ロール"}
      definitions:
        zh: "Moonweave 的本地分类值 client 或 server；MCP wire 消息不含通用 endpoint_role 成员。"
        en: "A Moonweave-local classification value client or server; MCP wire messages have no generic endpoint_role member."
        ja: "client または server を示す Moonweave ローカル分類値。MCP wire メッセージには一般的な endpoint_role メンバーはない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "client"
      allowed_values: ["client","server"]
      source_claims: [moonweave-mcp-participant-session-composition]
    - id: local_implementation_name
      labels: {zh: "本地实现名称视图", en: "Local implementation-name view", ja: "ローカル実装名表示"}
      definitions:
        zh: "Moonweave 的本地查看值，来自 clientInfo.name 或 serverInfo.name；不存在统一的 implementation_name wire 字段。"
        en: "A Moonweave-local viewing value from clientInfo.name or serverInfo.name; there is no common implementation_name wire field."
        ja: "clientInfo.name または serverInfo.name からの Moonweave ローカル表示値。共通の implementation_name wire フィールドはない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "ExampleClient"
      allowed_values: []
      source_claims: [mcp-participant-initialization]
  constraints:
    - id: session-has-client-and-server-endpoints
      severity: error
      expression_language: plain
      expression: An MCP session has one client endpoint and one server endpoint.
      explanation:
        zh: MCP 会话具有一个客户端端点和一个服务器端点。
        en: An MCP session has one client endpoint and one server endpoint.
        ja: MCP セッションは client endpoint 一つと server endpoint 一つを持つ。
      source_claims: [mcp-participant-architecture]
    - id: participant-role-is-not-host-role
      severity: error
      expression_language: plain
      expression: Host coordination is distinct from the client and server endpoint roles in an MCP session.
      explanation:
        zh: host 协调职责与 MCP 会话中的客户端和服务器端点角色不同。
        en: Host coordination is distinct from the client and server endpoint roles in an MCP session.
        ja: host の調整責務は MCP セッションの client と server 端点役割とは異なる。
      source_claims: [mcp-participant-architecture]
  required_relations: []
examples:
  - id: mcp-participant-positive-pair

    labels: {zh: 会话端点对, en: Session endpoint pair, ja: セッション端点対}

    descriptions:
      zh: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。"
      en: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths."
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"local_participant_reference":"client-42","local_endpoint_role":"client","local_implementation_name":"ExampleClient"}
    related_node_ids: [MCPParticipant, MCPClient, MCPServer, MCPSession]
    related_relation_ids: [MCPParticipant-part_of-MCPSession]

    source_claims: [mcp-participant-architecture]
  - id: mcp-participant-counterexample-user-endpoint

    labels: {zh: 用户作为会话端点, en: User as session endpoint, ja: ユーザーをセッション端点とする}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"local_participant_reference":"user-alex","local_endpoint_role":"client","local_implementation_name":"Human"}
    related_node_ids: [MCPParticipant, MCPSession]
    related_relation_ids: [MCPParticipant-part_of-MCPSession]

    source_claims: [mcp-participant-architecture]
  - id: mcp-participant-boundary-host-client

    labels: {zh: host 与 client 的边界, en: Boundary between host and client, ja: host と client の境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"local_participant_reference":"client-42","local_endpoint_role":"client","local_implementation_name":"ExampleClient"}
    related_node_ids: [MCPParticipant, MCPClient, MCPSession]
    related_relation_ids: [MCPParticipant-part_of-MCPSession]

    source_claims: [mcp-participant-architecture]
  - id: mcp-participant-instance-client-42

    labels: {zh: client-42 端点实例, en: client-42 endpoint instance, ja: client-42 端点実例}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"local_participant_reference":"client-42","local_endpoint_role":"client","local_implementation_name":"ExampleClient"}
    related_node_ids: [MCPParticipant, MCPClient, MCPSession]
    related_relation_ids: [MCPParticipant-part_of-MCPSession]

    source_claims: [mcp-participant-roles]
parent_relation:
  id: MCPParticipant-part_of-MCPSession
  predicate: part_of
  target: concept:MCPSession
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是 MCP 会话的端点部分, en: is an endpoint part of an MCP session, ja: MCP セッションの端点部分である}
  definition:
    zh: MCP 会话由一个客户端端点和一个服务器端点组成。
    en: An MCP session is composed of one client endpoint and one server endpoint.
    ja: MCP セッションは client endpoint 一つと server endpoint 一つで構成される。
  cardinality: {source: {min: 1, max: 1}, target: {min: 2, max: 2}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_endpoint_part
    labels: {zh: 具有端点部分, en: has endpoint part, ja: 端点部分を持つ}
  conditions: []
  temporal_scope: session
  boundary_context: 该组成关系限定为单一 MCP 会话中的两个协议端点，不包括 host、用户、授权服务器或消息对象。
  constraints:
    - id: session-endpoint-pair-cardinality
      severity: error
      expression_language: plain
      expression: Each session has exactly two endpoint parts, one client and one server.
      explanation:
        zh: 每个会话恰有两个端点部分，一个客户端和一个服务器。
        en: Each session has exactly two endpoint parts, one client and one server.
        ja: 各セッションは client 一つと server 一つ、ちょうど二つの端点部分を持つ。
      source_claims: [mcp-participant-architecture]
  examples: []
  source_claims: [moonweave-mcp-participant-session-composition]
  distinct_fact_rationale:
    zh: 该事实描述会话端点组成，而不是能力所有权、消息成员资格或 host 的产品责任。
    en: The fact describes session endpoint composition, not capability ownership, message membership, or host product responsibility.
    ja: この事実はセッション端点構成を記述し、capability 所有、メッセージ所属、host 製品責務を記述しない。
relations: []
