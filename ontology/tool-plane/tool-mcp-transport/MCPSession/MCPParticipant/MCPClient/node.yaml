        ja: ホストがファイルサーバー用 `fs-client-1` を作成し、`roots` 能力付き `initialize` を送り、その後 `resources/list` を呼びます。
      field_values: {}
      related_node_ids:
        - MCPClient
        - MCPParticipant
      related_relation_ids:
        - MCPClient-is_a-MCPParticipant
      expected_result:
        zh: 建立 MCPClient-is_a-MCPParticipant，并保留所述协议方向与条件。
        en: Assert MCPClient-is_a-MCPParticipant with the stated protocol direction and conditions.
        ja: MCPClient-is_a-MCPParticipant を stated protocol direction/condition 付きで確立します。
      why_valid_or_invalid:
        zh: 仅当对象满足 MCPClient 的全部身份条件时，才能沿 is_a 归入 MCPParticipant。
