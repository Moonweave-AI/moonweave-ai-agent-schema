  - id: claim-mcp-client-004
    source: eng-proto-mcp-2025-spec
    supports: "Sibling evidence scope: MCPClient and MCPServer are compared only under MCPParticipant. MCP 2025-11-25 requires initialization to be the first client-server interaction, exchanges distinct client and server capability declarations, negotiates one protocol version, enters operation only after notifications/initialized, and shuts down through the selected transport."
    locator: MCP 2025-11-25 > Base Protocol > Lifecycle > Initialization, Capability Negotiation, Operation, and Shutdown
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-mcp-client-005
    source: eng-proto-mcp-2025-spec
    supports: "MCP 2025-11-25 requires initialization to be the first client-server interaction, exchanges distinct client and server capability declarations, negotiates one protocol version, enters operation only after notifications/initialized, and shuts down through the selected transport. For this reviewed edge, the operational reading is: MCPClient is a strict subtype of MCPParticipant; its necessary identity differentia is: An MCP client is an MCPParticipant created by a host for one specific server and responsible for isolated protocol state. It initiates initialization and server-feature requests and serves roots, sampling, and elicitation when declared, but is not the host application that manages multiple connections."
    locator: MCP 2025-11-25 > Base Protocol > Lifecycle > Initialization, Capability Negotiation, Operation, and Shutdown
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-mcp-client-006
    source: eng-proto-mcp-2025-spec
    supports: "MCP 2025-11-25 requires initialization to be the first client-server interaction, exchanges distinct client and server capability declarations, negotiates one protocol version, enters operation only after notifications/initialized, and shuts down through the selected transport. For this reviewed edge, the operational reading is: MCPClient advertises MCPClientCapability in initialize params.capabilities so the server can determine whether roots, sampling, elicitation, and other server-to-client methods are legal; implemented code is not a declaration."
    locator: MCP 2025-11-25 > Base Protocol > Lifecycle > Initialization, Capability Negotiation, Operation, and Shutdown
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-mcp-client-007
    source: eng-proto-mcp-2025-spec
    supports: "MCP 2025-11-25 defines roots as a client feature: the server sends roots/list and the client returns file-URI boundaries. Roots describe workspace scope but do not themselves grant operating-system access or constitute a server definition list. For this reviewed edge, the operational reading is: An MCPClient that declared roots provides MCPRootList when the server calls roots/list, enumerating filesystem boundaries the server may operate within; server resources and unrestricted host filesystem access are not that list."
    locator: MCP 2025-11-25 > Client Features > Roots > Capabilities, Listing Roots, Data Types, and Security
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
