schema: moonweave.ai/ontology-node/v1
id: MCPClient
kind: concept
labels:
  zh: MCP 客户端
  en: MCP client
  ja: MCP クライアント
semantics:
  short_definition:
    zh: 由 MCP host 创建和管理、与一个特定 MCP 服务器维持隔离有状态连接的协议端点。
    en: The protocol endpoint created and managed by an MCP host that maintains an isolated stateful connection to one particular MCP server.
    ja: MCP host により作成・管理され、一つの特定 MCP サーバーへの分離された状態を持つ接続を維持するプロトコル端点。
  definition:
    zh: >
      MCP 客户端是 host 为某个服务器创建的端点。它建立并维护与该服务器的一个有状态会话，执行初始化、版本和 capability 协商，
      双向路由协议消息，并管理订阅和通知。客户端可声明 roots、sampling、elicitation、tasks 或 experimental 支持。它不是 host
      进程、模型供应商客户端，亦不是向外部用户直接展示的应用界面。
    en: >
      An MCP client is an endpoint a host creates for a server. It establishes and maintains one stateful session with that
      server, performs initialization and version/capability negotiation, routes protocol messages bidirectionally, and manages
      subscriptions and notifications. A client may declare roots, sampling, elicitation, tasks, or experimental support. It is
      not the host process, a model-provider client, or an application UI directly shown to an external user.
    ja: >
      MCP クライアントは host がある server のために作る端点である。その server との一つの状態を持つセッションを確立・維持し、
      初期化、バージョン/capability 交渉、双方向プロトコルメッセージルーティング、購読と通知管理を行う。client は roots、sampling、
      elicitation、tasks、experimental を宣言できる。host プロセス、モデルプロバイダークライアント、外部ユーザーに直接見せる UI ではない。
  why_needed:
    zh: 每服务器独立 client 连接将状态、权限和上下文隔离，使 host 可组合多个服务器而不让服务器相互窥视。
    en: A separate client connection per server isolates state, permissions, and context so a host can compose multiple servers without letting them inspect one another.
    ja: server ごとの独立 client 接続は状態、権限、context を分離し、host が複数 server を組み合わせても相互に覗かせない。
  includes:
    - {zh: initialize 和 initialized 生命周期行为, en: initialize and initialized lifecycle behavior, ja: initialize と initialized のライフサイクル動作}
    - {zh: client capabilities 声明, en: Client capability declarations, ja: client capability 宣言}
    - {zh: 与一个特定 server 的消息路由和订阅管理, en: Message routing and subscription management for one particular server, ja: 一つの特定 server 向けメッセージルーティングと購読管理}
  excludes:
    - {zh: 创建多个 client 的 host 协调器, en: The host coordinator that creates multiple clients, ja: 複数 client を作る host コーディネーター}
    -
      zh: server 暴露的工具、资源和 prompts
      en: Tools, resources, and prompts exposed by a server
      ja: server が公開する tools、resources、prompts
  semantic_kind: role
  aliases:
    - {language: en, value: MCP client instance, alias_kind: synonym}
engineering:
  explanation:
    zh: host 为目标 server 生成一个 client 实例。client 发送 initialize，保存协商版本和双方 capabilities，并在 initialized 后按允许 feature 路由请求、响应、通知、订阅和 server-to-client 请求。
    en: The host creates one client instance for a target server. The client sends initialize, stores the negotiated version and both capability sets, and after initialized routes allowed requests, responses, notifications, subscriptions, and server-to-client requests.
    ja: host は対象 server のために client instance を一つ作る。client は initialize を送り、交渉済みバージョンと双方 capability set を保存し、initialized 後に許可された要求、応答、通知、購読、server-to-client 要求をルーティングする。
  typical_input:
    - description: Client initialize input.
      format: '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{"sampling":{}},"clientInfo":{"name":"ExampleClient","version":"1.0.0"}}}'
      source_claims: [mcp-client-initialize]
  typical_output:
    - description: Client readiness signal after receiving server initialize result.
      format: '{"jsonrpc":"2.0","method":"notifications/initialized"}'
      source_claims: [mcp-client-initialize]
  reference_implementations:
    - name: MCP Architecture specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/architecture
      description: Canonical host-created client roles, one server connection, routing, and isolation.
structure:
  identity_keys: ["local_client_instance", "local_endpoint_role"]
  fields:
    - id: local_participant_reference
      labels: {zh: "本地参与者引用", en: "Local participant reference", ja: "ローカル参加者参照"}
      definitions:
        zh: "继承自 MCPParticipant 的会话参与者引用；对 MCPClient 它与 `local_client_instance` 指向同一个 host 管理的 client。"
        en: "The session-participant reference inherited from MCPParticipant; for MCPClient it identifies the same host-managed client as `local_client_instance`."
        ja: "MCPParticipant から継承するセッション参加者参照。MCPClient では `local_client_instance` と同じ host 管理 client を指す。"
      datatype: identifier
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "client-42"
      allowed_values: []
      source_claims: [mcp-client-role]
    - id: local_endpoint_role
      labels: {zh: "本地端点角色", en: "Local endpoint role", ja: "ローカル端点ロール"}
      definitions:
        zh: "继承自 MCPParticipant 的 Moonweave 端点角色；该子类型固定为 `client`，不是 JSON-RPC 信封字段。"
        en: "The Moonweave endpoint role inherited from MCPParticipant; this subtype fixes it to `client`, not a JSON-RPC envelope field."
        ja: "MCPParticipant から継承する Moonweave 端点ロール。この下位型では JSON-RPC エンベロープのフィールドではなく `client` に固定される。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "client"
      allowed_values: ["client"]
      source_claims: [mcp-client-role]
    - id: local_implementation_name
      labels: {zh: "本地实现名称视图", en: "Local implementation-name view", ja: "ローカル実装名表示"}
      definitions:
        zh: "继承自 MCPParticipant 的本地显示视图，取自原生 `initialize.params.clientInfo.name`。"
        en: "The local display view inherited from MCPParticipant, taken from native `initialize.params.clientInfo.name`."
        ja: "MCPParticipant から継承するローカル表示ビューで、ネイティブな `initialize.params.clientInfo.name` から取得する。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "ExampleClient"
      allowed_values: []
      source_claims: [mcp-client-initialize]
    - id: local_client_instance
      labels: {zh: "本地客户端实例", en: "Local client instance", ja: "ローカルクライアントインスタンス"}
      definitions:
        zh: "Moonweave 的本地实例引用，表示由 host 创建的一个 MCP client；它不是 wire 字段。"
        en: "A Moonweave-local instance reference for one host-created MCP client; it is not a wire field."
        ja: "host が作成した一つの MCP client を表す Moonweave ローカルインスタンス参照。wire フィールドではない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "client-42"
      allowed_values: []
      source_claims: [moonweave-mcp-client-taxonomy]
    - id: local_isolated_server_connection
      labels: {zh: "本地隔离服务器连接", en: "Local isolated server connection", ja: "ローカル隔離サーバー接続"}
      definitions:
        zh: "Moonweave 的本地连接引用，表示该客户端与一个服务器的一对一隔离连接；它不是 MCP 消息成员。"
        en: "A Moonweave-local connection reference for this client's isolated 1:1 connection to one server; it is not an MCP message member."
        ja: "このクライアントと一つのサーバーの隔離された 1:1 接続を表す Moonweave ローカル接続参照。MCP メッセージメンバーではない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "conn-weather-42"
      allowed_values: []
      source_claims: [mcp-client-role]
    - id: local_declared_capabilities
      labels: {zh: "本地声明能力快照", en: "Local declared-capabilities snapshot", ja: "ローカル宣言機能スナップショット"}
      definitions:
        zh: "Moonweave 的本地快照，引用 initialize.params.capabilities；它不是另一个 wire 字段。"
        en: "A Moonweave-local snapshot referring to initialize.params.capabilities; it is not another wire field."
        ja: "initialize.params.capabilities を参照する Moonweave ローカルスナップショット。別の wire フィールドではない。"
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: {"sampling":{}}
      allowed_values: []
      source_claims: [mcp-client-capability-categories]
    - id: local_negotiated_protocol_version
      labels: {zh: "本地协商协议版本", en: "Local negotiated protocol version", ja: "ローカル交渉済みプロトコル版"}
      definitions:
        zh: "Moonweave 的本地会话状态，从 initialize 的 protocolVersion 交换得出；不是 client 对象的 wire 字段。"
        en: "A Moonweave-local session state derived from initialize protocolVersion exchange; it is not a wire field of a client object."
        ja: "initialize の protocolVersion 交換から得られる Moonweave ローカルセッション状態。client オブジェクトの wire フィールドではない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2025-11-25"
      allowed_values: []
      source_claims: [mcp-client-initialize]
  constraints:
    - id: client-is-created-per-server-connection
      severity: error
      expression_language: plain
      expression: A host-created MCP client maintains an isolated connection and 1:1 relationship with a particular server.
      explanation:
        zh: host 创建的 MCP 客户端维持隔离连接，并与特定服务器具有 1:1 关系。
        en: A host-created MCP client maintains an isolated connection and 1:1 relationship with a particular server.
        ja: host 作成 MCP client は分離接続を維持し、特定 server と 1:1 関係を持つ。
      source_claims: [mcp-client-role]
    - id: client-uses-only-declared-and-negotiated-features
      severity: error
      expression_language: plain
      expression: The client routes only features successfully negotiated with its server for the session.
      explanation:
        zh: client 只能路由在该会话中与 server 成功协商的功能。
        en: The client routes only features successfully negotiated with its server for the session.
        ja: client はそのセッションで server と成功裏に交渉した機能だけをルーティングする。
      source_claims: [mcp-client-capability-categories]
  required_relations: []
examples:
  - id: mcp-client-positive-weather-connection

    labels: {zh: 与天气服务器的隔离 client, en: Isolated client to weather server, ja: 天気サーバーへの分離 client}

    descriptions:
      zh: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。
      en: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths.
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"local_participant_reference":"client-42","local_endpoint_role":"client","local_implementation_name":"WeatherHost","local_client_instance":"client-42","local_isolated_server_connection":"conn-weather-42","local_declared_capabilities":{"sampling":{}},"local_negotiated_protocol_version":"2025-11-25"}
    related_node_ids: [MCPClient, MCPParticipant, MCPServer, MCPSession]
    related_relation_ids: [MCPClient-is_a-MCPParticipant]

    source_claims: [mcp-client-role]
  - id: mcp-client-counterexample-shared-cross-server-context

    labels: {zh: 跨 server 共享完整上下文, en: Full context shared across servers, ja: server 間の完全 context 共有}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"local_participant_reference":"client-shared","local_endpoint_role":"client","local_implementation_name":"SharedHost","local_client_instance":"client-shared","local_isolated_server_connection":"conn-shared","local_declared_capabilities":{},"local_negotiated_protocol_version":"2025-11-25"}
    related_node_ids: [MCPClient, MCPServer]
    related_relation_ids: [MCPClient-is_a-MCPParticipant]

    source_claims: [mcp-client-isolation]
  - id: mcp-client-boundary-host-consent

    labels: {zh: client 路由与 host 同意的边界, en: Boundary between client routing and host consent, ja: client ルーティングと host 同意の境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"local_participant_reference":"client-42","local_endpoint_role":"client","local_implementation_name":"WeatherHost","local_client_instance":"client-42","local_isolated_server_connection":"conn-weather-42","local_declared_capabilities":{"sampling":{}},"local_negotiated_protocol_version":"2025-11-25"}
    related_node_ids: [MCPClient, MCPSamplingRequest]
    related_relation_ids: [MCPClient-is_a-MCPParticipant]

    source_claims: [mcp-client-role, mcp-client-isolation]
  - id: mcp-client-instance-client-42

    labels: {zh: client-42 实例, en: client-42 instance, ja: client-42 実例}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"local_participant_reference":"client-42","local_endpoint_role":"client","local_implementation_name":"WeatherHost","local_client_instance":"client-42","local_isolated_server_connection":"conn-weather-42","local_declared_capabilities":{"sampling":{},"elicitation":{"form":{}}},"local_negotiated_protocol_version":"2025-11-25"}
    related_node_ids: [MCPClient, MCPClientCapability, MCPSession]
    related_relation_ids: [MCPClient-is_a-MCPParticipant]

    source_claims: [mcp-client-role, mcp-client-capability-categories]
parent_relation:
  id: MCPClient-is_a-MCPParticipant
  predicate: is_a
  target: concept:MCPParticipant
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是 MCP 参与者的客户端子类, en: is the client subtype of MCP participant, ja: MCP 参加者の client 下位型である}
  definition:
    zh: MCP 客户端是负责特定服务器连接、协商和消息路由的 MCP 会话参与者。
    en: An MCP client is an MCP session participant responsible for a particular server connection, negotiation, and message routing.
    ja: MCP client は特定 server 接続、交渉、メッセージルーティングを担う MCP セッション参加者である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_client_subtype
    labels: {zh: 具有客户端子类, en: has client subtype, ja: client 下位型を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: 该层级表达端点角色，不把 host、用户、传输适配器或某条 client 发出的消息建模为 client 子类。
  constraints:
    - id: client-subtype-role
      severity: error
      expression_language: plain
      expression: An MCPClient is a host-created session endpoint that maintains an isolated connection to a particular server.
      explanation:
        zh: MCPClient 是 host 创建、维持与特定 server 隔离连接的会话端点。
        en: An MCPClient is a host-created session endpoint that maintains an isolated connection to a particular server.
        ja: MCPClient は host 作成で特定 server への分離接続を維持するセッション端点である。
      source_claims: [mcp-client-role]
  examples: []
  source_claims: [moonweave-mcp-client-taxonomy]
  distinct_fact_rationale:
    zh: 子类由 host 创建、特定 server 连接和 client-side 协商职责区分，不由任意请求发起行为区分。
    en: The subtype is distinguished by host creation, a particular server connection, and client-side negotiation responsibility, not arbitrary request initiation.
    ja: この下位型は host 作成、特定 server 接続、client 側交渉責務により区別され、任意の要求開始動作では区別されない。
relations: []
sources:
