    relevance: Defines host-created clients, isolated 1:1 server connections, routing, isolation, and client capability declaration.
  - id: mcp-lifecycle-2025-11-25
    title: Model Context Protocol Specification — Lifecycle
    url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
    source_type: official-specification
    locator: "Initialization; Capability Negotiation; Operation"
    relevance: Defines client initialize data, negotiation, initialized notification, and operation restrictions.
source_claims:
  - id: mcp-client-role
    source: mcp-architecture-2025-11-25
    supports: Each host-created client maintains an isolated stateful server connection, negotiates protocol capabilities, routes messages, and has a 1:1 relationship with a particular server.
    locator: "Clients"
    evidence_kind: normative
    confidence: high
  - id: moonweave-mcp-client-taxonomy
    source: mcp-architecture-2025-11-25
    supports: "Moonweave classifies the MCP client endpoint role as an MCPParticipant subtype for navigation; this subclass edge is a taxonomy design inference."
    locator: "MCP Architecture"
    evidence_kind: design-inference
    confidence: high
  - id: mcp-client-isolation
    source: mcp-architecture-2025-11-25
    supports: Servers do not read the whole conversation or see into other servers; connections are isolated and cross-server interactions are controlled by the host.
    locator: "Design Principles"
    evidence_kind: normative
    confidence: high
  - id: mcp-client-capability-categories
    source: mcp-lifecycle-2025-11-25
    supports: Client capability categories include roots, sampling, elicitation, tasks, and experimental, and negotiated capabilities govern operation.
    locator: "Capability Negotiation; Operation"
    evidence_kind: normative
    confidence: high
  - id: mcp-client-initialize
    source: mcp-lifecycle-2025-11-25
    supports: The client begins initialization with supported protocol version, client capabilities, and client implementation information, then sends initialized after server response.
    locator: "Initialization"
    evidence_kind: normative
    confidence: high
