schema: moonweave.ai/ontology-node/v1
id: MCPClient
kind: concept
status: review
labels:
  en: MCP client
  zh: MCP 客户端
  ja: MCP クライアント
semantics:
  short_definition:
    zh: 由宿主管理、为单个 MCP 服务器维持隔离会话的协议端点。
    en: A host-managed protocol endpoint maintaining an isolated session with one MCP server.
    ja: ホストに管理され、単一 MCP サーバーとの隔離セッションを維持する端点。
  definition:
    zh: MCP 客户端是一种 MCP 参与方（MCPParticipant），由宿主为一个特定服务器创建并维护隔离协议状态；它发起初始化与服务器特性请求，并在已声明能力下承接 roots、sampling 和 elicitation，但不等于管理多个连接的宿主应用。
    en: An MCP client is an MCPParticipant created by a host for one specific server and responsible for isolated protocol state. It initiates initialization and server-feature requests and serves roots, sampling, and elicitation when declared, but is not the host application that manages multiple connections.
    ja: MCP client は MCPParticipant の一種で、host が一特定 server 向けに生成し isolated protocol state を管理します。initialization/server feature request を開始し declared roots/sampling/elicitation を担いますが multi-connection host application ではありません。
  why_needed:
    zh: 客户端身份决定初始化方向、可声明的客户端能力以及跨服务器隔离边界，是验证消息合法性的必要条件。
    en: Client identity determines initialization direction, client-declarable capabilities, and cross-server isolation, making it necessary for protocol-validity checks.
    ja: クライアント同一性は初期化方向、宣言可能なクライアント能力、サーバー間隔離を決め、プロトコル妥当性検査に必要です。
  includes:
    - zh: 纳入宿主为某个具体服务器创建并负责该会话协议状态的客户端端点。
      en: Includes a client endpoint created by the host for one specific server and responsible for that session's protocol state.
      ja: 特定サーバー用にホストが作成し、そのセッション状態を担うクライアント端点を含みます。
  excludes:
    - zh: 排除宿主应用本身、无 MCP 会话的 HTTP 调用方以及服务器向上游 API 使用的 OAuth 客户端身份。
      en: Excludes the host application itself, HTTP callers without an MCP session, and an MCP server's separate OAuth-client role toward an upstream API.
      ja: ホストアプリ自体、MCP セッションを持たない HTTP 呼出元、上流 API に対するサーバーの別個の OAuth クライアント役割を除きます。
  semantic_kind: role
  aliases: []
structure:
  identity_keys:
    - participant_id
  fields:
    - id: host_application_ref
      labels:
        zh: 宿主应用引用
        en: host-application reference
        ja: host application 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用创建并管理该 MCPClient 的宿主应用。
        en: References the host application that creates and manages this MCPClient.
        ja: この MCPClient を作成・管理する host application を参照します。
      allowed_values: []
      pattern: null
      example_value: host:moonweave-desktop
      source_claims:
        - claim-mcp-client-002
    - id: peer_server_ref
      labels:
        zh: 对端服务器引用
        en: peer-server reference
        ja: peer server 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该客户端在本会话中唯一连接的 MCPServer 参与方。
        en: References the one MCPServer participant connected to this client in the session.
        ja: session 内で client が接続する一 MCPServer participant を参照します。
      allowed_values: []
      pattern: null
      example_value: filesystem-server
      source_claims:
        - claim-mcp-client-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: mcp-client-positive-filesystem-session
    kind: positive
    labels:
      zh: 文件服务专用客户端
      en: Dedicated filesystem client
      ja: ファイルサービス専用クライアント
    scenario_id: null
    descriptions:
      zh: 宿主为文件服务创建 `fs-client-1`，该端点发送带 `roots` 能力的 `initialize`，并在此后调用 `resources/list`。
      en: The host creates `fs-client-1` for a filesystem server; this endpoint sends `initialize` with the `roots` capability and later calls `resources/list`.
      ja: ホストがファイルサーバー用 `fs-client-1` を作成し、`roots` 能力付き `initialize` を送り、その後 `resources/list` を呼びます。
    field_values:
      participant_id: fs-client-1
      session_id: mcp-session-filesystem-1
      participant_side: client
      host_application_ref: host:moonweave-desktop
      peer_server_ref: filesystem-server
    related_node_ids:
      - MCPClient
      - MCPSession
      - MCPParticipant
    related_relation_ids:
      - MCPClient-is_a-MCPParticipant
    expected_result:
      zh: 端点被识别为该服务器会话的 MCPClient。
      en: The endpoint is identified as the MCPClient for that server session.
      ja: 端点はそのサーバーセッションの MCPClient と識別されます。
    why_valid_or_invalid:
      zh: 它由宿主创建、绑定单一服务器并承担初始化与调用职责。
      en: It is host-created, bound to one server, and performs initialization and calls.
      ja: ホストに作成され、単一サーバーに結び付き、初期化と呼出しを担います。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-client-001
  - id: mcp-client-boundary-host-process
    kind: boundary
    labels:
      zh: 管理两个连接的宿主
      en: Host managing two connections
      ja: 二接続を管理するホスト
    scenario_id: null
    descriptions:
      zh: 桌面应用同时管理 Git 和数据库两个 MCP 客户端，并聚合它们的上下文；该桌面应用是 host，不是任一会话的 MCPClient。
      en: A desktop application manages separate Git and database MCP clients and aggregates their context; the application is the host, not the MCPClient of either session.
      ja: デスクトップアプリが Git と database の別々の MCP クライアントを管理し文脈を集約します。このアプリは host で、どちらのセッションの MCPClient でもありません。
    field_values:
      host: desktop-app
      managed_clients: 2
    related_node_ids:
      - MCPClient
    related_relation_ids: []
    expected_result:
      zh: 只把两个会话端点归为 MCPClient。
      en: Only the two session endpoints are classified as MCPClient.
      ja: 二つのセッション端点だけを MCPClient に分類します。
    why_valid_or_invalid:
      zh: 管理与聚合属于 host 职责，1:1 服务器协议状态属于客户端职责。
      en: Management and aggregation are host duties; 1:1 server protocol state is a client duty.
      ja: 管理・集約は host の責務で、1:1 サーバー状態はクライアントの責務です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-client-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: MCPServer
    shared_parent_concept_id: MCPParticipant
    differentia:
      zh: MCPClient 与 MCPServer 同属 MCPParticipant；MCPClient 发起初始化和服务器功能请求并承接客户端能力；MCPServer 返回初始化结果、提供工具/资源/提示并发起客户端功能请求。
      en: MCPClient and MCPServer share MCPParticipant; MCPClient initiates initialization and server-feature requests and serves client capabilities, whereas MCPServer returns initialization results, provides tools/resources/prompts, and initiates client-feature requests.
      ja: MCPClient と MCPServer は MCPParticipant を共有し、MCPClient は initialization/server-feature request を開始し client capability を提供し、MCPServer は initialization result と tools/resources/prompts を提供して client-feature request を開始します。
    source_claims:
      - claim-mcp-client-004
parent_relation:
  id: MCPClient-is_a-MCPParticipant
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: MCPClient是一种MCPParticipant
    en: MCPClient is a MCPParticipant
    ja: MCPClientがMCPParticipantを一種である
  definitions:
    zh: MCPClient 是 MCPParticipant 的严格子型；其必要身份差异是：MCP 客户端是一种 MCP 参与方（MCPParticipant），由宿主为一个特定服务器创建并维护隔离协议状态；它发起初始化与服务器特性请求，并在已声明能力下承接 roots、sampling 和 elicitation，但不等于管理多个连接的宿主应用。
    en: "MCPClient is a strict subtype of MCPParticipant; its necessary identity differentia is: An MCP client is an MCPParticipant created by a host for one specific server and responsible for isolated protocol state. It initiates initialization and server-feature requests and serves roots, sampling, and elicitation when declared, but is not the host application that manages multiple connections."
    ja: MCPClient は MCPParticipant の strict subtype であり、必要な identity differentia は次の通りです：MCP client は MCPParticipant の一種で、host が一特定 server 向けに生成し isolated protocol state を管理します。initialization/server feature request を開始し declared roots/sampling/elicitation を担いますが multi-connection host application ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
    en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
    ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: MCPParticipant反向关联MCPClient
      en: MCPParticipant is the inverse target of MCPClient
      ja: MCPParticipantからMCPClientへの逆読解
