      en: MCPClient advertises MCPClientCapability in initialize params.capabilities so the server can determine whether roots, sampling, elicitation, and other server-to-client methods are legal; implemented code is not a declaration.
      ja: MCPClient は initialize params.capabilities で MCPClientCapability を宣言し roots・sampling・elicitation 等 server-to-client method の可否を server に示します。実装だけでは宣言になりません。
