schema: moonweave.ai/ontology-node/v1
id: MCPStdioTransport
kind: concept
labels:
  zh: MCP 标准输入输出传输
  en: MCP stdio transport
  ja: MCP stdio トランスポート
semantics:
  short_definition:
    zh: 由客户端启动服务器子进程，并以 stdin/stdout 交换换行分隔 MCP 消息的标准传输。
    en: The standard transport in which a client launches a server subprocess and exchanges newline-delimited MCP messages through stdin and stdout.
    ja: クライアントがサーバー子プロセスを起動し、stdin と stdout で改行区切りの MCP メッセージを交換する標準トランスポート。
  definition:
    zh: >
      MCP stdio 传输是本地客户端—服务器通信的标准 MCP 传输。客户端启动服务器子进程；服务器从 stdin
      读取 JSON-RPC 请求、响应和通知，并向 stdout 写入这些消息。每条消息由换行符分隔且不得包含嵌入换行；
      stdout 和 stdin 均不得承载非 MCP 内容。它不定义 HTTP 会话、URL、头部或 OAuth 授权流程。
    en: >
      MCP stdio transport is the standard local client-server transport. The client launches the server
      as a subprocess; the server reads JSON-RPC requests, responses, and notifications from stdin and writes
      them to stdout. Each message is newline-delimited and cannot contain embedded newlines; neither stdout
      nor stdin may carry non-MCP content. It does not define HTTP sessions, URLs, headers, or OAuth flows.
    ja: >
      MCP stdio トランスポートはローカルなクライアント・サーバー通信の標準トランスポートである。クライアントは
      サーバーを子プロセスとして起動し、サーバーは stdin から JSON-RPC の要求、応答、通知を読み、stdout に書き込む。
      各メッセージは改行で区切られ、埋め込み改行を含めず、stdin と stdout は MCP 以外を運ばない。HTTP セッション、URL、
      ヘッダー、OAuth フローは定義しない。
  why_needed:
    zh: 本地工具服务器可通过进程边界获得简单、可组合且不依赖网络监听器的协议连接。
    en: It gives local tool servers a simple composable protocol connection across a process boundary without a network listener.
    ja: ローカルツールサーバーに、ネットワークリスナーなしでプロセス境界を越える単純で合成可能なプロトコル接続を与える。
  includes:
    - {zh: 子进程启动, en: Client-launched subprocesses, ja: クライアント起動の子プロセス}
    - {zh: stdin、stdout 的换行分隔 JSON-RPC 消息, en: Newline-delimited JSON-RPC on stdin and stdout, ja: stdin と stdout 上の改行区切り JSON-RPC}
    - {zh: stderr 上的 UTF-8 日志, en: UTF-8 logging on stderr, ja: stderr 上の UTF-8 ログ}
  excludes:
    - {zh: stdout 中的普通日志或横幅, en: Ordinary logs or banners on stdout, ja: stdout 上の通常ログやバナー}
    -
      zh: Streamable HTTP 的 URL、POST、GET 或 SSE
      en: Streamable HTTP URLs, POST, GET, or SSE
      ja: Streamable HTTP の URL、POST、GET、SSE
  semantic_kind: specification
  aliases:
    - {language: en, value: stdio transport, alias_kind: abbreviation}
engineering:
  explanation:
    zh: 适配器逐行读取 stdin/stdout，将每一行作为完整 JSON-RPC 消息解析；应用日志仅写入 stderr。客户端负责启动和终止子进程。
    en: The adapter reads stdin/stdout one line at a time and parses each line as a complete JSON-RPC message; application logs go only to stderr. The client starts and terminates the subprocess.
    ja: アダプターは stdin/stdout を一行ずつ読み、各行を完全な JSON-RPC メッセージとして解析する。アプリケーションログは stderr のみに出し、クライアントが子プロセスを開始・終了する。
  typical_input:
    - description: A client writes one newline-terminated JSON-RPC request to server stdin.
      format: '{"jsonrpc":"2.0","id":7,"method":"tools/list"}\n'
      source_claims: [mcp-stdio-framing]
  typical_output:
    - description: The server writes one newline-terminated JSON-RPC response to stdout.
      format: '{"jsonrpc":"2.0","id":7,"result":{"tools":[]}}\n'
      source_claims: [mcp-stdio-framing]
  reference_implementations:
    - name: MCP Transports specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/transports
      description: Normative stdio subprocess, framing, and stderr behavior.
structure:
  identity_keys: [local_server_process, local_transport_kind]
  fields:
    - id: local_session_reference
      labels: {zh: "本地会话引用", en: "Local session reference", ja: "ローカルセッション参照"}
      definitions:
        zh: "继承自 MCPTransport 的 Moonweave 关联值，引用使用该 stdio 连接的 MCP 会话；它不是 stdio 信封成员。"
        en: "The Moonweave association value inherited from MCPTransport, referencing the MCP session using this stdio connection; it is not a stdio envelope member."
        ja: "MCPTransport から継承する Moonweave 関連値で、この stdio 接続を使う MCP セッションを参照する。stdio エンベロープのメンバーではない。"
      datatype: identifier
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "session-42"
      allowed_values: []
      source_claims: [mcp-stdio-subprocess]
    - id: local_transport_kind
      labels: {zh: "本地传输类型", en: "Local transport kind", ja: "ローカルトランスポート種別"}
      definitions:
        zh: "继承自 MCPTransport 的 Moonweave 分类；此标准子类型固定为 `stdio`。"
        en: "The Moonweave classification inherited from MCPTransport; this standard subtype fixes it to `stdio`."
        ja: "MCPTransport から継承する Moonweave 分類であり、この標準下位型では `stdio` に固定される。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "stdio"
      allowed_values: ["stdio"]
      source_claims: [mcp-stdio-subprocess]
    - id: local_message_encoding
      labels: {zh: "本地消息编码描述", en: "Local message-encoding descriptor", ja: "ローカルメッセージ符号化記述"}
      definitions:
        zh: "继承自 MCPTransport 的 Moonweave 描述，明确 stdio 在线路上承载 UTF-8 编码的 JSON-RPC 2.0。"
        en: "The Moonweave descriptor inherited from MCPTransport, specifying that stdio carries UTF-8 encoded JSON-RPC 2.0 on its message streams."
        ja: "MCPTransport から継承する Moonweave 記述で、stdio がメッセージストリーム上で UTF-8 エンコードの JSON-RPC 2.0 を運ぶことを明示する。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "UTF-8 JSON-RPC 2.0"
      allowed_values: ["UTF-8 JSON-RPC 2.0"]
      source_claims: [mcp-stdio-framing]
    - id: local_server_process
      labels: {zh: "本地服务器进程", en: "Local server process", ja: "ローカルサーバープロセス"}
      definitions:
        zh: "Moonweave 的本地进程引用，表示客户端启动的服务器子进程；它不是 JSON-RPC 字段。"
        en: "A Moonweave-local process reference for the server subprocess launched by the client; it is not a JSON-RPC field."
        ja: "クライアントが起動するサーバー子プロセスの Moonweave ローカルプロセス参照。JSON-RPC フィールドではない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "weather-mcp-server"
      allowed_values: []
      source_claims: [mcp-stdio-subprocess]
    - id: local_stdio_channels
      labels: {zh: "本地 stdio 通道描述", en: "Local stdio-channel descriptor", ja: "ローカル stdio チャネル記述"}
      definitions:
        zh: "Moonweave 的本地通道描述：客户端写服务器 stdin，服务器写 stdout；不是 payload 字段。"
        en: "A Moonweave-local channel descriptor: client writes server stdin and server writes stdout; it is not a payload field."
        ja: "クライアントがサーバー stdin に書き、サーバーが stdout に書くことを示す Moonweave ローカルチャネル記述。payload フィールドではない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "stdin/stdout"
      allowed_values: []
      source_claims: [mcp-stdio-subprocess]
    - id: local_line_framing
      labels: {zh: "本地行分帧描述", en: "Local line-framing descriptor", ja: "ローカル行フレーミング記述"}
      definitions:
        zh: "Moonweave 的本地传输描述：一条完整 JSON-RPC 消息用换行分隔，消息内不得嵌入换行。"
        en: "A Moonweave-local transport descriptor: one complete JSON-RPC message is newline-delimited and has no embedded newline."
        ja: "完全な JSON-RPC メッセージ一件を改行で区切り、メッセージ内に改行を埋め込まないことを示す Moonweave ローカルトランスポート記述。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "newline"
      allowed_values: []
      source_claims: [mcp-stdio-framing]
  constraints:
    - id: stdio-message-per-line
      severity: error
      expression_language: plain
      expression: Each stdin or stdout line is one complete MCP JSON-RPC message and contains no embedded newline.
      explanation:
        zh: stdin 或 stdout 的每行都必须是一条完整 MCP JSON-RPC 消息，且不得包含嵌入换行符。
        en: Each stdin or stdout line must be one complete MCP JSON-RPC message and contain no embedded newline.
        ja: stdin または stdout の各行は完全な MCP JSON-RPC メッセージ一件であり、埋め込み改行を含まない。
      source_claims: [mcp-stdio-framing]
    - id: stdio-no-non-mcp-on-message-streams
      severity: error
      expression_language: plain
      expression: The server stdout and client stdin contain only valid MCP messages; server logs use stderr.
      explanation:
        zh: 服务器 stdout 和客户端 stdin 只能包含有效 MCP 消息；服务器日志写入 stderr。
        en: Server stdout and client stdin contain only valid MCP messages; server logs use stderr.
        ja: サーバー stdout とクライアント stdin は有効な MCP メッセージだけを含み、サーバーログは stderr を使う。
      source_claims: [mcp-stdio-stream-safety]
  required_relations: []
examples:
  - id: mcp-stdio-positive-tools-list

    labels: {zh: 通过 stdin 请求工具列表, en: Request tools list through stdin, ja: stdin による tools list 要求}

    descriptions:
      zh: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。"
      en: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths."
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"local_session_reference":"session-weather-42","local_transport_kind":"stdio","local_message_encoding":"UTF-8 JSON-RPC 2.0","local_server_process":"weather-mcp-server","local_stdio_channels":"stdin/stdout","local_line_framing":"newline"}
    related_node_ids: [MCPStdioTransport, MCPTransport, MCPRequest, MCPResponse]
    related_relation_ids: [MCPStdioTransport-is_a-MCPTransport]

    source_claims: [mcp-stdio-subprocess, mcp-stdio-framing]
  - id: mcp-stdio-counterexample-log-on-stdout

    labels: {zh: stdout 中的启动日志, en: Startup log on stdout, ja: stdout の起動ログ}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"local_session_reference":"session-weather-42","local_transport_kind":"stdio","local_message_encoding":"UTF-8 JSON-RPC 2.0","local_server_process":"weather-mcp-server","local_stdio_channels":"stdin/stdout","local_line_framing":"newline"}
    related_node_ids: [MCPStdioTransport]
    related_relation_ids: [MCPStdioTransport-is_a-MCPTransport]

    source_claims: [mcp-stdio-stream-safety]
  - id: mcp-stdio-boundary-stderr-log

    labels: {zh: stderr 日志的边界, en: Boundary of stderr logging, ja: stderr ログの境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"local_session_reference":"session-weather-42","local_transport_kind":"stdio","local_message_encoding":"UTF-8 JSON-RPC 2.0","local_server_process":"weather-mcp-server","local_stdio_channels":"stdin/stdout","local_line_framing":"newline"}
    related_node_ids: [MCPStdioTransport]
    related_relation_ids: [MCPStdioTransport-is_a-MCPTransport]

    source_claims: [mcp-stdio-stream-safety]
  - id: mcp-stdio-instance-weather-server

    labels: {zh: weather-mcp-server 实例, en: weather-mcp-server instance, ja: weather-mcp-server インスタンス}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"local_session_reference":"session-weather-42","local_transport_kind":"stdio","local_message_encoding":"UTF-8 JSON-RPC 2.0","local_server_process":"weather-mcp-server","local_stdio_channels":"stdin/stdout","local_line_framing":"newline"}
    related_node_ids: [MCPStdioTransport, MCPTransport]
    related_relation_ids: [MCPStdioTransport-is_a-MCPTransport]

    source_claims: [mcp-stdio-subprocess, mcp-stdio-framing]
parent_relation:
  id: MCPStdioTransport-is_a-MCPTransport
  predicate: is_a
  target: concept:MCPTransport
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是 MCP 传输的 stdio 子类, en: is the stdio subtype of MCP transport, ja: MCP トランスポートの stdio 下位型である}
  definition:
    zh: MCP stdio 传输是以本地子进程标准流承载消息的 MCP 传输。
    en: An MCP stdio transport is an MCP transport that carries messages through local subprocess standard streams.
    ja: MCP stdio トランスポートはローカル子プロセスの標準ストリームでメッセージを運ぶ MCP トランスポートである。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_stdio_subtype
    labels: {zh: 具有 stdio 子类, en: has stdio subtype, ja: stdio 下位型を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: 该层级只表达传输种类，不表示某个子进程、消息或会话的成员资格。
  constraints:
    - id: stdio-transport-uses-standard-streams
      severity: error
      expression_language: plain
      expression: An MCPStdioTransport uses client-launched subprocess stdin and stdout for MCP messages.
      explanation:
        zh: MCPStdioTransport 使用客户端启动子进程的 stdin 和 stdout 承载 MCP 消息。
        en: An MCPStdioTransport uses client-launched subprocess stdin and stdout for MCP messages.
        ja: MCPStdioTransport はクライアント起動子プロセスの stdin と stdout で MCP メッセージを運ぶ。
      source_claims: [mcp-stdio-subprocess]
  examples: []
  source_claims: [moonweave-mcp-stdio-transport-taxonomy]
  distinct_fact_rationale:
    zh: 该子类由本地子进程和标准流 framing 区分，而非由通用 JSON-RPC 消息语义区分。
    en: The subtype is distinguished by local subprocess and standard-stream framing, not general JSON-RPC message semantics.
    ja: この下位型は汎用 JSON-RPC メッセージ意味論ではなく、ローカル子プロセスと標準ストリーム framing により区別される。
relations: []
