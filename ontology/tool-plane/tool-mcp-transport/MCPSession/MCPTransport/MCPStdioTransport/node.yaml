schema: moonweave.ai/ontology-node/v1
id: MCPStdioTransport
kind: concept
labels:
  zh: MCP 标准输入输出传输
  en: MCP stdio transport
  ja: MCP stdio トランスポート
semantics:
  short_definition:
    zh: 客户端启动子进程并通过 stdin/stdout 换行分帧交换 MCP JSON-RPC 消息的传输绑定。
    en: Transport binding where the client launches a subprocess and exchanges newline-framed MCP JSON-RPC over stdin/stdout.
    ja: client が subprocess を起動し stdin/stdout newline framing で MCP JSON-RPC を交換する transport binding。
  definition:
    zh: MCP 标准输入输出传输是 MCPTransport 的严格子类型，继承 transport_spec_id 配置身份；server_process_id 只是承载该配置的一次进程绑定。客户端写 stdin、读 stdout，每条 UTF-8 JSON-RPC 消息以换行分隔且消息体不得含换行；stderr 仅用于可选日志而非协议错误通道。普通 shell 流、Streamable HTTP 端点或无 MCP JSON-RPC 消息的编译器输出都不构成 MCPStdioTransport。
    en: MCP stdio transport is a strict MCPTransport subtype inheriting transport_spec_id configuration identity; server_process_id is only the process binding realizing that configuration. The client writes stdin and reads stdout with newline-delimited UTF-8 JSON-RPC messages that contain no embedded newlines; stderr is optional logging, not a protocol error channel. Ordinary shell streams, Streamable HTTP endpoints, or compiler output without MCP JSON-RPC messages do not constitute MCPStdioTransport.
    ja: MCP stdio transport は MCPTransport strict subtype で transport_spec_id configuration identity を継承し server_process_id は process binding のみ。client は stdin write/stdout read で embedded newline なし UTF-8 JSON-RPC newline framing。stderr は optional log。ordinary shell stream/Streamable HTTP endpoint/MCP JSON-RPC なし compiler output は MCPStdioTransport ではありません。
  why_needed:
    zh: 独立子型使换行分帧、stdout 纯净性与进程关闭顺序可验证，而不把这些规则施加到 HTTP。
    en: The subtype makes newline framing, stdout purity, and subprocess shutdown order testable without applying them to HTTP.
    ja: subtype により newline framing・stdout purity・subprocess shutdown order を HTTP に誤適用せず検証できます。
  includes:
    - zh: 纳入由客户端启动、按 stdin/stdout 交换规范消息的本地服务器绑定。
      en: Includes local server bindings launched by the client and exchanging conforming messages through stdin and stdout.
      ja: client 起動で stdin/stdout により conforming message を交換する local binding を含みます。
  excludes:
    - zh: 排除普通 shell 流、stderr 日志、Streamable HTTP 与旧 SSE 端点。
      en: Excludes ordinary shell streams, stderr logs, Streamable HTTP, and legacy SSE endpoints.
      ja: ordinary shell stream・stderr log・Streamable HTTP・legacy SSE endpoint を除外します。
  semantic_kind: specification
  aliases: []
engineering:
  explanation:
    zh: MCP 2025-11-25 stdio 传输规定 client 启动 server subprocess，JSON-RPC 消息以换行分隔，message body 不得包含 embedded newline，stderr 仅日志。典型线路形如两行 initialize/result 与一行 notifications/initialized。LangChain MCP adapter 与 Anthropic MCP connector 在本地开发场景常用 stdio 绑定连接 IDE 宿主与工具服务器。
    en: MCP 2025-11-25 stdio transport requires the client to launch the server subprocess, delimit JSON-RPC messages by newline without embedded newlines, and restrict stderr to logging. Typical wire traffic is initialize/result lines plus notifications/initialized. LangChain MCP adapters and Anthropic MCP connectors commonly use stdio bindings to connect IDE hosts and tool servers in local development.
    ja: MCP 2025-11-25 stdio transport は client が server subprocess を起動し JSON-RPC を newline 区切り（embedded newline 禁止）、stderr は log のみ。典型 wire は initialize/result 行と notifications/initialized。LangChain MCP adapter/Anthropic MCP connector は local dev で stdio binding を常用。
  typical_input:
    - description: stdio newline-delimited initialize line on stdin.
      format: |
        {"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{}}}
      source_claims: [claim-mcp-stdio-transport-spec]
  typical_output:
    - description: Moonweave-local stdio transport binding record.
      format: |
        {"transport_kind":"stdio","frame_delimiter":"newline","server_process_id":"mcp-stdio-proc-91"}
      source_claims: [claim-mcp-stdio-transport-design]
  reference_implementations:
    - name: MCP Transports
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/transports
      description: stdio newline framing rules.
    - name: LangChain MCP
      url: https://python.langchain.com/docs/integrations/tools/mcp/
      description: Local stdio MCP server connections.
structure:
  identity_keys: []
  fields:
    - id: frame_delimiter
      labels:
        zh: 帧分隔符
        en: frame delimiter
        ja: frame delimiter
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 stdio 传输以换行分隔完整 JSON-RPC 消息，消息体不得内含换行。
        en: Records that stdio delimits complete JSON-RPC messages by newline and that message bodies must not contain embedded newlines.
        ja: stdio が complete JSON-RPC message を newline で区切り、message body に embedded newline を許さないことを記録します。
      allowed_values:
        - id: MCPStdioFrameDelimiterNewline
          value: newline
          labels:
            zh: 换行
            en: newline
            ja: newline
          definitions:
            zh: 一行一条消息。
            en: One complete message per line.
            ja: 一 line に一 complete message。
          status: accepted
          source_claims:
            - claim-mcp-stdio-transport-spec
      pattern: null
      example_value: newline
      source_claims:
        - claim-mcp-stdio-transport-spec
    - id: server_process_id
      labels:
        zh: 服务器进程标识
        en: server process ID
        ja: サーバープロセスID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识被客户端启动并承载该 stdio 会话的服务器进程。
        en: Identifies the server process launched by the client for this stdio session.
        ja: この stdio session 向けに client が起動した server process を識別します。
      allowed_values: []
      pattern: null
      example_value: mcp-stdio-proc-91
      source_claims:
        - claim-mcp-stdio-transport-design
  constraints: []
  required_relation_constraints: []
examples:
  - id: MCPStdioTransport-example-positive-001
    kind: positive
    labels:
      zh: MCP 标准输入输出传输正例
      en: Positive MCP stdio transport case
      ja: MCP stdio トランスポートの正例
    scenario_id: null
    descriptions:
      zh: 客户端启动 repo-server，向 stdin 写一行 initialize，服务器在 stdout 回一行 result，调试信息只写 stderr。
      en: The client launches repo-server, writes one initialize line to stdin, receives one result line on stdout, and keeps diagnostics on stderr.
      ja: client が repo-server を起動し stdin に initialize 一行、stdout に result 一行、diagnostic は stderr に出します。
    field_values:
      transport_spec_id: mcp-transport:stdio:workspace
      transport_kind: stdio
      encoding: UTF-8
      frame_delimiter: newline
      server_process_id: mcp-stdio-proc-91
    related_node_ids:
      - MCPStdioTransport
    related_relation_ids: []
    expected_result:
      zh: 归为 MCPStdioTransport。
      en: Classify MCPStdioTransport.
      ja: MCPStdioTransport と分類します。
    why_valid_or_invalid:
      zh: 启动关系、方向、换行分帧和 stdout/stderr 约束都符合。
      en: Launch relation, direction, newline framing, and stdout/stderr constraints all conform.
      ja: launch・direction・newline framing・stdout/stderr constraint が一致します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    example_source:
      product: MCP Transports
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/transports
    source_claims:
      - claim-mcp-stdio-transport-spec
  - id: MCPStdioTransport-example-boundary-001
    kind: boundary
    labels:
      zh: MCP 标准输入输出传输边界例
      en: Boundary MCP stdio transport case
      ja: MCP stdio トランスポートの境界例
    scenario_id: null
    descriptions:
      zh: 脚本把普通编译器 stdout/stderr 交给宿主，但没有 MCP JSON-RPC 消息。
      en: A script exposes compiler stdout and stderr to the host without MCP JSON-RPC messages.
      ja: script が compiler stdout/stderr を host に渡しますが MCP JSON-RPC message はありません。
    field_values: {}
    related_node_ids:
      - MCPStdioTransport
    related_relation_ids: []
    expected_result:
      zh: 不得仅凭 stdio 通道归为 MCPStdioTransport。
      en: Do not classify MCPStdioTransport merely from stdio channels.
      ja: stdio channel だけで MCPStdioTransport にしません。
    why_valid_or_invalid:
      zh: 标准流是承载介质，合法 MCP 消息与端点职责才确定协议传输。
      en: Standard streams are only media; conforming MCP messages and endpoint roles establish the protocol transport.
      ja: standard stream は media にすぎず MCP message/endpoint role が protocol transport を決めます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    example_source:
      product: Moonweave MCP transport design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-stdio-transport-design
parent_relation:
  id: MCPStdioTransport-is_a-MCPTransport
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: MCPStdioTransport是一种MCPTransport
    en: MCPStdioTransport is a MCPTransport
    ja: MCPStdioTransportがMCPTransportを一種である
  definitions:
    zh: MCPStdioTransport 是 MCPTransport 的严格子型；其必要身份差异是：MCP 标准输入输出传输是一种 MCP 传输（MCPTransport），由客户端启动服务器子进程，客户端写 stdin、服务器写 stdout，每条 UTF-8 JSON-RPC 消息以换行分隔且内部不得含换行；stderr 仅用于可选日志，不是协议错误通道。
    en: "MCPStdioTransport is a strict subtype of MCPTransport; its necessary identity differentia is: MCP stdio transport is an MCPTransport where the client launches a server subprocess, writes its stdin, and reads its stdout. Each UTF-8 JSON-RPC message is newline-delimited and contains no embedded newline; stderr is optional logging, not a protocol-error channel."
    ja: MCPStdioTransport は MCPTransport の strict subtype であり、必要な identity differentia は次の通りです：MCP stdio transport は MCPTransport の一種で client が server subprocess を起動し stdin に書き stdout を読みます。UTF-8 JSON-RPC message は newline-delimited で embedded newline 無し、stderr は optional log で protocol-error channel ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
    en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
    ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: MCPTransport反向关联MCPStdioTransport
      en: MCPTransport is the inverse target of MCPStdioTransport
      ja: MCPTransportからMCPStdioTransportへの逆読解
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
