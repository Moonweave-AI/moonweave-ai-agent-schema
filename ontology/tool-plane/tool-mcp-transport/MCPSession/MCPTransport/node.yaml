        en: An ordinary network call is not the transport binding carrying an MCP JSON-RPC lifecycle.
        ja: ordinary network call は MCP JSON-RPC lifecycle を持つ transport binding ではありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
