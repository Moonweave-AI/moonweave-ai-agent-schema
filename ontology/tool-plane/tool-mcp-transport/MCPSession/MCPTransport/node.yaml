schema: moonweave.ai/ontology-node/v1
id: MCPTransport
kind: concept
labels:
  zh: MCP 传输
  en: MCP transport
  ja: MCPトランスポート
semantics:
  short_definition:
    zh: 承载 MCP UTF-8 JSON-RPC 消息并维持客户端与服务器会话通信的机制。
    en: A mechanism that carries MCP UTF-8 JSON-RPC messages and sustains client-server session communication.
    ja: MCP UTF-8 JSON-RPCメッセージを運び、クライアント・サーバーセッション通信を維持する仕組み。
  definition:
    zh: >
      MCP 传输是定义 MCP JSON-RPC 消息如何编码、发送和接收的通信机制。2025-11-25 MCP 标准定义
      stdio 和 Streamable HTTP 两种标准传输，并允许可插拔的自定义传输。传输提供线路与连接语义；
      initialize、能力协商以及 tools、resources 或 prompts 的协议含义不由传输定义。
    en: >
      An MCP transport is the communication mechanism that defines how MCP JSON-RPC messages
      are encoded, sent, and received. MCP 2025-11-25 defines stdio and Streamable HTTP as
      standard transports and permits pluggable custom transports. A transport supplies wire
      and connection semantics; it does not define initialization, capability negotiation, or
      the protocol meaning of tools, resources, or prompts.
    ja: >
      MCPトランスポートはMCP JSON-RPCメッセージの符号化、送信、受信方法を定義する通信機構である。
      MCP 2025-11-25はstdioとStreamable HTTPを標準トランスポートとして定義し、プラガブルなcustom
      transportも許す。トランスポートはワイヤーと接続意味を提供し、初期化、機能交渉、tools、resources、
      promptsのプロトコル意味を定義しない。
  why_needed:
    zh: >
      传输抽象让一个 MCP 客户端可使用本地子进程或远程服务，而不改变 JSON-RPC 操作模型。它也明确了
      消息 framing、会话标头、断线恢复和网络安全责任应在哪里实现。
    en: >
      Transport abstraction lets an MCP client use either a local subprocess or a remote service
      without changing the JSON-RPC operation model. It also makes clear where message framing,
      session headers, disconnect recovery, and network security responsibilities live.
    ja: >
      トランスポート抽象により、MCPクライアントはJSON-RPC操作モデルを変えずにローカルsubprocessまたは
      リモートserviceを使える。またメッセージframing、session header、切断復旧、ネットワークsecurityの
      責任がどこにあるかを明確にする。
  includes:
    - zh: stdio 的子进程 stdin/stdout 消息传输。
      en: stdio subprocess stdin/stdout message exchange.
      ja: stdio subprocessのstdin/stdoutメッセージ交換。
    - zh: Streamable HTTP 的 POST、GET、JSON 与可选 SSE 交换。
      en: Streamable HTTP POST, GET, JSON, and optional SSE exchange.
      ja: Streamable HTTPのPOST、GET、JSON、任意SSE交換。
    - zh: 与选定传输相关的会话生命周期和安全约束。
      en: Session lifecycle and security constraints related to the selected transport.
      ja: 選択したトランスポートに関連するsession lifecycleとsecurity制約。
  excludes:
    - zh: JSON-RPC 请求、响应或通知本身。
      en: The JSON-RPC request, response, or notification itself.
      ja: JSON-RPCリクエスト、レスポンス、または通知そのもの。
    - zh: 某个 MCP 功能的能力声明或方法语义。
      en: A capability declaration or method semantics for a particular MCP feature.
      ja: 特定MCP機能のcapability宣言またはmethod意味。
  semantic_kind: specification
  aliases:
    - language: en
      value: MCP wire transport
      alias_kind: synonym
engineering:
  explanation:
    zh: >
      传输适配器接收完整 JSON-RPC 对象，按标准 framing 写入字节，再将收到的完整对象交给 MCP 会话层。
      stdio 使用一行一对象；Streamable HTTP 使用单一 MCP endpoint，POST 发送消息，GET 可打开 SSE。
      适配器不能把任意日志混入消息通道，也不能因换用 transport 改写 method 或 JSON-RPC id。
    en: >
      A transport adapter receives a complete JSON-RPC object, frames it as bytes under the
      selected standard, and gives received complete objects to the MCP session layer. stdio
      uses one object per line; Streamable HTTP uses one MCP endpoint, POST to send messages,
      and optional GET to open SSE. The adapter cannot mix arbitrary logs into the message
      channel or rewrite method or JSON-RPC id when changing transport.
    ja: >
      トランスポートadapterは完全なJSON-RPC objectを受け、選択標準に従ってbytesへframeし、受信した完全
      objectをMCP session layerへ渡す。stdioは一行一object、Streamable HTTPは一MCP endpoint、POSTで
      メッセージ送信、任意GETでSSEを開く。adapterは任意logをmessage channelに混ぜたり、transport変更時に
      methodやJSON-RPC idを書き換えたりできない。
  typical_input:
    - description: A complete JSON-RPC request handed to a selected transport.
      format: |
        {"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{},"clientInfo":{"name":"host","version":"1.0"}}}
      source_claims: [mcp-transport-json-rpc]
  typical_output:
    - description: The same logical response returned through stdio or Streamable HTTP.
      format: |
        {"jsonrpc":"2.0","id":1,"result":{"protocolVersion":"2025-11-25","capabilities":{},"serverInfo":{"name":"server","version":"1.0"}}}
      source_claims: [mcp-transport-json-rpc]
  reference_implementations:
    - name: MCP transports specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/transports
      description: Defines stdio, Streamable HTTP, standard framing, and custom transport option.
structure:
  identity_keys: [local_transport_kind]
  fields:
    - id: local_session_reference
      labels: {zh: "本地会话引用", en: "Local session reference", ja: "ローカルセッション参照"}
      definitions:
        zh: "Moonweave 的本地连接上下文引用；不存在名为 session_id 的通用 MCP JSON-RPC 字段。"
        en: "A Moonweave-local connection-context reference; no generic MCP JSON-RPC field named session_id exists."
        ja: "Moonweave ローカル接続コンテキスト参照。session_id という一般的な MCP JSON-RPC フィールドは存在しない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "session-42"
      allowed_values: []
      source_claims: [moonweave-mcp-transport-session-composition]
    - id: local_transport_kind
      labels: {zh: "本地传输类型", en: "Local transport kind", ja: "ローカルトランスポート種別"}
      definitions:
        zh: "Moonweave 的本地分类 stdio、streamable-http 或 custom；它不是 JSON-RPC 成员。"
        en: "A Moonweave-local classification of stdio, streamable-http, or custom; it is not a JSON-RPC member."
        ja: "stdio、streamable-http、custom を示す Moonweave ローカル分類。JSON-RPC メンバーではない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "stdio"
      allowed_values: ["stdio","streamable-http","custom"]
      source_claims: [moonweave-mcp-transport-session-composition]
    - id: local_message_encoding
      labels: {zh: "本地消息编码描述", en: "Local message-encoding descriptor", ja: "ローカルメッセージ符号化記述"}
      definitions:
        zh: "Moonweave 的本地描述，概括标准传输携带 UTF-8 JSON-RPC；不是 payload 字段。"
        en: "A Moonweave-local descriptor summarizing standard transport carriage of UTF-8 JSON-RPC; it is not a payload field."
        ja: "標準トランスポートが UTF-8 JSON-RPC を運ぶことを要約する Moonweave ローカル記述。payload フィールドではない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "UTF-8 JSON-RPC 2.0"
      allowed_values: []
      source_claims: [mcp-transport-json-rpc]
  constraints:
    - id: transport-carries-complete-json-rpc-messages
      severity: error
      expression_language: plain
      expression: A standard MCP transport carries complete UTF-8 JSON-RPC messages according to its defined framing.
      explanation:
        zh: 标准 MCP 传输按其定义的 framing 承载完整 UTF-8 JSON-RPC 消息。
        en: A standard MCP transport carries complete UTF-8 JSON-RPC messages according to its defined framing.
        ja: 標準MCPトランスポートは定義済みframingに従って完全なUTF-8 JSON-RPCメッセージを運ぶ。
      source_claims: [mcp-transport-json-rpc]
    - id: transport-does-not-redefine-protocol-methods
      severity: error
      expression_language: plain
      expression: Changing transport does not change JSON-RPC method id or negotiated MCP feature semantics.
      explanation:
        zh: 更换传输不会改变 JSON-RPC method、id 或已协商 MCP 功能语义。
        en: Changing transport does not change JSON-RPC method, id, or negotiated MCP feature semantics.
        ja: transport変更はJSON-RPC method、id、交渉済みMCP機能意味を変更しない。
      source_claims: [mcp-transport-standards]
  required_relations: []
examples:
  - id: mcp-transport-positive-stdio-initialize

    labels: {zh: stdio 上传输初始化, en: Initialize over stdio, ja: stdio上のinitialize}

    descriptions:
      zh: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。"
      en: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths."
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"local_session_reference":"session-42","local_transport_kind":"stdio","local_message_encoding":"UTF-8 JSON-RPC 2.0"}
    related_node_ids: [MCPTransport, MCPStdioTransport]
    related_relation_ids: [MCPTransport-part_of-MCPSession]

    source_claims: [mcp-transport-standards, mcp-transport-stdio]
  - id: mcp-transport-counterexample-stdout-log

    labels: {zh: stdout 混入日志, en: Log mixed into stdout, ja: stdoutへのlog混入}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"local_session_reference":"session-42","local_transport_kind":"stdio","local_message_encoding":"UTF-8 JSON-RPC 2.0"}
    related_node_ids: [MCPTransport, MCPStdioTransport]
    related_relation_ids: [MCPTransport-part_of-MCPSession]

    source_claims: [mcp-transport-stdio]
  - id: mcp-transport-boundary-http-message

    labels: {zh: HTTP 传输与 JSON-RPC 消息的边界, en: Boundary between HTTP transport and JSON-RPC message, ja: HTTP transportとJSON-RPCメッセージの境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"local_session_reference":"session-42","local_transport_kind":"streamable-http","local_message_encoding":"UTF-8 JSON-RPC 2.0"}
    related_node_ids: [MCPTransport, MCPMessage, MCPStreamableHTTPTransport]
    related_relation_ids: [MCPTransport-part_of-MCPSession]

    source_claims: [mcp-transport-http, mcp-transport-json-rpc]
  - id: mcp-transport-instance-session-42-stdio

    labels: {zh: session-42 stdio 传输实例, en: session-42 stdio transport instance, ja: session-42 stdio transportインスタンス}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"local_session_reference":"session-42","local_transport_kind":"stdio","local_message_encoding":"UTF-8 JSON-RPC 2.0"}
    related_node_ids: [MCPTransport, MCPStdioTransport]
    related_relation_ids: [MCPTransport-part_of-MCPSession]

    source_claims: [mcp-transport-stdio]
parent_relation:
  id: MCPTransport-part_of-MCPSession
  predicate: part_of
  target: concept:MCPSession
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是会话的传输机制, en: is the session transport, ja: sessionのtransportである}
  definition:
    zh: 一个 MCP 传输为特定 MCP 会话承载双向消息通信。
    en: An MCP transport carries bidirectional message communication for a particular MCP session.
    ja: MCP transportは特定MCP sessionの双方向message通信を運ぶ。
  cardinality:
    source: {min: 1, max: 1}
    target: {min: 1, max: 1}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_transport
    labels: {zh: 具有传输机制, en: has transport, ja: transportを持つ}
  conditions: []
  temporal_scope: session
  boundary_context: 一个会话绑定一个实际 transport 实例；同一 transport implementation 可服务多个会话实例。
  constraints:
    - id: session-transport-binding
      severity: error
      expression_language: plain
      expression: A transport instance binds one MCP session at a time even if one implementation serves multiple sessions.
      explanation:
        zh: 一个传输实例一次绑定一个 MCP 会话，即使其实现可服务多个会话。
        en: A transport instance binds one MCP session at a time even if one implementation serves multiple sessions.
        ja: transport instanceは、一実装が複数sessionを提供しても一度に一MCP sessionへ束縛される。
      source_claims: [mcp-transport-session]
  examples: []
  source_claims: [moonweave-mcp-transport-session-composition]
  distinct_fact_rationale:
    zh: 该关系表达会话通信载体，而非能力对象或单个消息的成员资格。
    en: The relation expresses session communication carrier rather than capability ownership or membership of one message.
    ja: この関係はcapability所有や一messageの所属ではなくsession通信carrierを表す。
relations: []
sources:
  - id: mcp-transports-2025-11-25
    title: Model Context Protocol Specification — Transports
    url: https://modelcontextprotocol.io/specification/2025-11-25/basic/transports
    source_type: official-specification
    locator: "Transports; stdio; Streamable HTTP; Custom Transports"
    relevance: Defines standard transports, JSON-RPC UTF-8 encoding, stdio rules, HTTP behavior, and custom transport option.
source_claims:
  - id: mcp-transport-json-rpc
    source: mcp-transports-2025-11-25
    supports: MCP uses UTF-8 encoded JSON-RPC messages carried by the selected transport.
    locator: "Transports"
    evidence_kind: normative
    confidence: high
  - id: moonweave-mcp-transport-session-composition
    source: mcp-transports-2025-11-25
    supports: "Moonweave treats the selected transport as a part of an MCPSession for schema navigation; this composition edge is a taxonomy design inference."
    locator: "Transport Message Format"
    evidence_kind: design-inference
    confidence: high
  - id: mcp-transport-standards
    source: mcp-transports-2025-11-25
    supports: MCP defines stdio and Streamable HTTP standard transports and permits pluggable custom transports.
    locator: "Transports; Custom Transports"
    evidence_kind: normative
    confidence: high
  - id: mcp-transport-stdio
    source: mcp-transports-2025-11-25
    supports: stdio uses client-launched subprocess stdin stdout newline-delimited messages and stderr logging.
    locator: "stdio"
    evidence_kind: normative
    confidence: high
  - id: mcp-transport-http
    source: mcp-transports-2025-11-25
    supports: Streamable HTTP uses an MCP endpoint with POST and GET and may use SSE.
    locator: "Streamable HTTP"
    evidence_kind: normative
    confidence: high
  - id: mcp-transport-session
    source: mcp-transports-2025-11-25
    supports: Standard transports carry stateful MCP client-server session communication.
    locator: "Transports; Session Management"
    evidence_kind: normative
    confidence: high