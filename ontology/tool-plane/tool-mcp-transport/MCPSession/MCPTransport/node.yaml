        en: Both session endpoints share the same transport binding and framing rules and perform shutdown through that binding.
        ja: session endpoint 双方が同じ transport binding/framing rule を共有しその binding で shutdown します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
