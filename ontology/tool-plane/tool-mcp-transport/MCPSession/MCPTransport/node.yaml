      expected_result:
        zh: 不得建立 MCPSession-uses_transport-MCPTransport；保留实际出现的较宽或相邻事实。
        en: Do not assert MCPSession-uses_transport-MCPTransport; retain the broader or adjacent fact actually present.
        ja: MCPSession-uses_transport-MCPTransport を確立せず、実際の broader/adjacent fact を保持します。
      why_valid_or_invalid:
