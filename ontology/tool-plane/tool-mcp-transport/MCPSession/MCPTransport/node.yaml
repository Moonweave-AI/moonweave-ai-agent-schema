schema: moonweave.ai/ontology-node/v1
id: MCPTransport
kind: concept
status: review
labels:
  en: MCP transport
  zh: MCP 传输
  ja: MCP トランスポート
semantics:
  short_definition:
    zh: 承载 UTF‑8 JSON‑RPC MCP 消息的 stdio、Streamable HTTP 或兼容自定义绑定。
    en: A stdio, Streamable HTTP, or compatible custom binding carrying UTF-8 JSON-RPC MCP messages.
    ja: UTF-8 JSON-RPC MCP メッセージを運ぶ stdio、Streamable HTTP、互換 custom binding。
  definition:
    zh: MCP 传输是一种规范，定义 UTF-8 JSON-RPC 消息的承载、分帧与关闭合同；当前两个标准子型是按换行分隔的 MCPStdioTransport 与使用单一 MCP 端点、POST/GET 及可选 SSE 的 MCPStreamableHTTPTransport。旧 HTTP+SSE 仅为兼容路径，自定义 WebSocket 也不是标准子型。
    en: An MCP transport is a specification for carrying, framing, and closing UTF-8 JSON-RPC messages. Its two standard bindings are newline-delimited MCPStdioTransport and MCPStreamableHTTPTransport using one MCP endpoint with POST/GET and optional SSE. Legacy HTTP+SSE is only a compatibility path, and custom WebSocket is not a standard subtype.
    ja: MCP transport は UTF-8 JSON-RPC message の carrying/framing/close を定める仕様です。standard subtype は newline-delimited MCPStdioTransport と single MCP endpoint・POST/GET・optional SSE の MCPStreamableHTTPTransport の二つで、legacy HTTP+SSE/custom WebSocket は standard subtype ではありません。
  why_needed:
    zh: 单独建模传输可验证分帧、内容类型、连接安全和关闭行为，同时避免把 transport 细节错误提升为消息语义。
    en: A separate transport concept supports checks of framing, content types, connection security, and shutdown without turning transport details into message semantics.
    ja: transport を独立化すると framing、content type、接続安全、終了を検査でき、transport 詳細を message 意味へ誤昇格しません。
  includes:
    - zh: 纳入实际承载 MCP 消息并满足相应分帧、编码与端点规则的 stdio、Streamable HTTP 和兼容自定义传输实例。
      en: Includes stdio, Streamable HTTP, and compatible custom transport instances that actually carry MCP messages under their framing, encoding, and endpoint rules.
      ja: framing・encoding・endpoint 規則に従い MCP message を運ぶ stdio、Streamable HTTP、互換 custom transport を含みます。
  excludes:
    - zh: 排除 stderr 日志、HTTP 授权流程、JSON-RPC 对象本身以及仅表示业务网络通道的连接。
      en: Excludes stderr logs, the HTTP authorization flow, JSON-RPC objects themselves, and network connections that carry only business traffic.
      ja: stderr log、HTTP 認可フロー、JSON-RPC object 自体、業務通信だけの接続を除きます。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - transport_spec_id
  fields:
    - id: transport_spec_id
      labels:
        zh: 传输规范标识
        en: transport-specification ID
        ja: transport specification ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识会话采用的一份传输绑定与分帧规范，而不是某条 TCP 或进程连接。
        en: Stably identifies the transport binding and framing specification used by a session rather than a particular TCP or process connection.
        ja: session が使う transport binding/framing specification を安定識別し、個別 TCP/process connection とは区別します。
      allowed_values: []
      pattern: null
      example_value: mcp-transport:stdio:workspace
      source_claims:
        - claim-mcp-transport-002
    - id: encoding
      labels:
        zh: 字符编码
        en: character encoding
        ja: character encoding
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录两种标准 MCP 传输共同要求的 UTF-8 JSON 编码。
        en: Records the UTF-8 JSON encoding required by both standard MCP transports.
        ja: 両 standard MCP transport が要求する UTF-8 JSON encoding を記録します。
      allowed_values:
        - id: MCPTransportEncodingUtf8
          value: UTF-8
          labels:
            zh: UTF-8
            en: UTF-8
            ja: UTF-8
          definitions:
            zh: MCP JSON-RPC 消息的固定编码。
            en: The fixed encoding for MCP JSON-RPC messages.
            ja: MCP JSON-RPC message の fixed encoding。
          status: accepted
          source_claims:
            - claim-mcp-transport-003
      pattern: null
      example_value: UTF-8
      source_claims:
        - claim-mcp-transport-003
    - id: transport_kind
      labels:
        zh: 传输种类
        en: transport kind
        ja: transport 種別
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录绑定是当前标准 stdio、当前标准 Streamable HTTP、仅兼容的旧 HTTP+SSE，还是自定义 WebSocket；枚举明确区分规范地位，不把 SSE 或 WebSocket 提升为第三种标准传输。
        en: Records whether the binding is current-standard stdio, current-standard Streamable HTTP, compatibility-only legacy HTTP+SSE, or custom WebSocket; the enum preserves normative status instead of promoting SSE or WebSocket to a third standard transport.
        ja: binding が current-standard stdio、current-standard Streamable HTTP、compatibility-only legacy HTTP+SSE、custom WebSocket のいずれかを記録し、SSE/WebSocket を第三 standard transport に昇格させません。
      allowed_values:
        - id: MCPTransportKindStdio
          value: stdio
          labels:
            zh: 标准输入输出（当前标准）
            en: stdio (current standard)
            ja: stdio（現行標準）
          definitions:
            zh: MCP 2025-11-25 明确定义的换行分帧子进程传输。
            en: The newline-framed subprocess transport explicitly standardized by MCP 2025-11-25.
            ja: MCP 2025-11-25 が明示的に標準化する newline-framed subprocess transport。
          status: accepted
          source_claims:
            - claim-mcp-transport-001
        - id: MCPTransportKindStreamableHTTP
          value: streamable-http
          labels:
            zh: 可流式 HTTP（当前标准）
            en: Streamable HTTP (current standard)
            ja: Streamable HTTP（現行標準）
          definitions:
            zh: MCP 2025-11-25 明确定义的单端点 POST/GET 与可选 SSE 传输。
            en: The one-endpoint POST/GET transport with optional SSE explicitly standardized by MCP 2025-11-25.
            ja: MCP 2025-11-25 が明示的に標準化する single-endpoint POST/GET と optional SSE transport。
          status: accepted
          source_claims:
            - claim-mcp-transport-001
        - id: MCPTransportKindLegacyHttpSse
          value: legacy-http-sse
          labels:
            zh: 旧 HTTP+SSE（仅兼容）
            en: legacy HTTP+SSE (compatibility only)
            ja: legacy HTTP+SSE（互換のみ）
          definitions:
            zh: 2024-11-05 双端点 HTTP+SSE 的向后兼容路径，不是当前标准子型。
            en: The backwards-compatibility path for the 2024-11-05 two-endpoint HTTP+SSE transport, not a current-standard subtype.
            ja: 2024-11-05 two-endpoint HTTP+SSE の backwards-compatibility path で、current-standard subtype ではありません。
          status: accepted
          source_claims:
            - claim-mcp-transport-001
        - id: MCPTransportKindCustomWebSocket
          value: custom-websocket
          labels:
            zh: 自定义 WebSocket（扩展）
            en: custom WebSocket (extension)
            ja: custom WebSocket（拡張）
          definitions:
            zh: 按 MCP 自定义传输扩展点并遵循 RFC 6455 承载消息的非标准绑定。
            en: A non-standard binding using the MCP custom-transport extension point and RFC 6455 WebSocket framing.
            ja: MCP custom-transport extension point と RFC 6455 WebSocket framing を使う non-standard binding。
          status: accepted
          source_claims:
            - claim-mcp-transport-004
            - claim-mcp-transport-005
      pattern: null
      example_value: streamable-http
      source_claims:
        - claim-mcp-transport-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: mcp-transport-positive-stdio-frame
    kind: positive
    labels:
      zh: 单行 stdio 消息帧
      en: Single-line stdio message frame
      ja: 単一行 stdio message frame
    scenario_id: null
    descriptions:
      zh: 客户端启动本地服务器子进程，并向 stdin 写入一行完整 `initialize` JSON‑RPC；服务器从 stdout 返回一行响应，诊断只写 stderr。
      en: The client launches a local server subprocess, writes one complete `initialize` JSON-RPC line to stdin, receives one response line on stdout, and keeps diagnostics on stderr.
      ja: client が local server subprocess を起動し、stdin に一行の完全な `initialize` JSON-RPC を書き、stdout で一行応答を受け、診断は stderr に出します。
    field_values:
      transport_spec_id: mcp-transport:stdio:workspace
      transport_kind: stdio
      encoding: UTF-8
    related_node_ids:
      - MCPTransport
      - MCPMessage
    related_relation_ids: []
    expected_result:
      zh: 记录一个 stdio MCPTransport，并把 stdout 行解析为 MCPMessage。
      en: A stdio MCPTransport is recorded and the stdout line is decoded as MCPMessage.
      ja: stdio MCPTransport を記録し、stdout 行を MCPMessage として復号します。
    why_valid_or_invalid:
      zh: 通道、分隔符和 stdout/stderr 约束全部符合 stdio 规范。
      en: The channel, delimiter, and stdout/stderr constraints all match stdio.
      ja: channel、delimiter、stdout/stderr 制約が stdio 仕様に一致します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-transport-004
  - id: mcp-transport-boundary-stderr-log
    kind: boundary
    labels:
      zh: stderr 调试日志
      en: Debug line on stderr
      ja: stderr debug log
    scenario_id: null
    descriptions:
      zh: 服务器向 stderr 输出 `index warmup complete`，该行不是 JSON‑RPC，也不会发往客户端协议输入。
      en: The server writes `index warmup complete` to stderr; the line is not JSON-RPC and is not sent on the client's protocol input.
      ja: server が stderr に `index warmup complete` を書きます。この行は JSON-RPC でなく client protocol input へ送られません。
    field_values:
      stream: stderr
      payload: index warmup complete
    related_node_ids:
      - MCPTransport
      - MCPMessage
    related_relation_ids: []
    expected_result:
      zh: 日志可由宿主捕获，但不得解析为 MCPMessage。
      en: The host may capture the log, but it is not decoded as MCPMessage.
      ja: host は log を捕捉できますが MCPMessage として復号しません。
    why_valid_or_invalid:
      zh: stderr 是传输旁路日志，不是 MCP 消息承载方向。
      en: stderr is an out-of-band log stream, not an MCP message direction.
      ja: stderr は帯域外 log stream で、MCP message 搬送方向ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-transport-004
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: MCPSession-uses_transport-MCPTransport
  predicate: uses_transport
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: MCPSession使用传输MCPTransport
    en: MCPSession uses transport MCPTransport
    ja: MCPSessionがMCPTransportをtransportを使う
  definitions:
    zh: MCPSession 在其有效期内使用一个具体 MCPTransport 绑定来分帧、传递并关闭消息交换；stdio 与 Streamable HTTP 的启动、会话与关闭规则不同，SSE 只是后者的可选流形态。
    en: MCPSession uses one concrete MCPTransport binding during its lifetime to frame, carry, and shut down message exchange; stdio and Streamable HTTP have different startup, session, and shutdown rules, while SSE is only an optional stream form of the latter.
    ja: MCPSession は lifetime 中一 concrete MCPTransport binding で message exchange を frame/carry/shutdown します。stdio と Streamable HTTP は lifecycle rule が異なり SSE は後者の optional stream form です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
    en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
    ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
  inverse_reading:
    predicate: is_transport_for
    labels:
      zh: MCPTransport反向关联MCPSession
      en: MCPTransport is the inverse target of MCPSession
      ja: MCPTransportからMCPSessionへの逆読解
  conditions: []
  temporal_scope: valid-time
  boundary_context:
    trust_boundary_concept_id: TrustBoundary
    authority_basis:
      zh: MCPSession 与 MCPTransport 保持各自本体所有权；此边只记录已核验的 MCP 协议事实，不转移定义权或授权。
      en: MCPSession and MCPTransport retain their ontology owners; this edge records only a verified MCP protocol fact and transfers neither definitional ownership nor authorization.
      ja: MCPSession と MCPTransport は各 ontology owner を維持し、この edge は verified MCP protocol fact のみを記録して定義所有権や認可を移転しません。
    protocol_or_resource_context:
