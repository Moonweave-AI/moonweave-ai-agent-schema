schema: moonweave.ai/ontology-node/v1
id: MCPAuthorization
kind: concept
status: review
labels:
  en: MCP authorization
  zh: MCP 授权
  ja: MCP 認可
semantics:
  short_definition:
    zh: HTTP 型 MCP 传输中面向受保护服务器的 OAuth 授权上下文与流程。
    en: The OAuth authorization context and flow for a protected MCP server over HTTP.
    ja: HTTP 型 MCP transport で保護 MCP server へアクセスする OAuth 認可文脈・フロー。
  definition:
    zh: MCP 授权是一种信息记录，保存 HTTP 型 MCP 传输对受保护资源发现、授权服务器、`resource` 参数、PKCE 与受众绑定令牌的授权上下文；它不适用于 stdio 凭据读取，也不是通用 PolicyDecision、AuthorizationGrant 或某个 tools/call 的业务许可。
    en: MCP authorization is an information record for protected-resource discovery, authorization-server metadata, the resource parameter, PKCE, and audience-bound tokens on HTTP-based MCP transports. It does not apply to stdio credential loading and is not a generic PolicyDecision, AuthorizationGrant, or business permission for a tools/call operation.
    ja: MCP 認可は HTTP-based transport の protected-resource discovery・authorization-server metadata・resource parameter・PKCE・audience-bound token を保存する情報記録です。stdio credential 読込み、generic PolicyDecision/AuthorizationGrant、tools/call の business permission ではありません。
  why_needed:
    zh: 授权上下文把令牌受众、资源服务器发现和 transport 适用范围连在一起，可阻止 token passthrough、错误受众复用与把 HTTP 认证误当业务许可。
    en: The authorization context joins token audience, resource-server discovery, and transport applicability, supporting checks against token passthrough, wrong-audience reuse, and confusion with business permission.
    ja: 認可文脈は token audience、resource server discovery、transport 適用範囲を結び、token passthrough、誤 audience 再利用、業務 permission との混同を防ぎます。
  includes:
    - zh: 纳入 HTTP 型 MCP 服务器的受保护资源发现、OAuth 授权服务器发现、resource indicator、访问令牌获取与验证状态。
      en: Includes protected-resource discovery, authorization-server discovery, resource indicators, access-token acquisition, and token validation for HTTP MCP servers.
      ja: HTTP MCP server の protected-resource discovery、authorization-server discovery、resource indicator、access-token 取得・検証状態を含みます。
  excludes:
    - zh: 排除 stdio 从环境读取凭据、服务器访问上游 API 使用的另一枚令牌、host 的用户同意以及策略域的授权授予。
      en: Excludes stdio credentials loaded from the environment, separate tokens used by a server for upstream APIs, host user consent, and policy-domain authorization grants.
      ja: stdio の環境 credential、server が上流 API に使う別 token、host user consent、policy-domain authorization grant を除きます。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - authorization_context_id
  fields:
    - id: authorization_context_id
      labels:
        zh: 授权上下文标识
        en: authorization-context ID
        ja: authorization context ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一组面向特定 MCP 受保护资源的 HTTP 授权上下文。
        en: Stably identifies one HTTP authorization context for a particular protected MCP resource.
        ja: 特定 protected MCP resource に対する一 HTTP authorization context を安定識別します。
      allowed_values: []
      pattern: null
      example_value: mcp-auth:files-example:20260717
      source_claims:
        - claim-mcp-authorization-002
    - id: resource_uri
      labels:
        zh: 受保护资源 URI
        en: protected-resource URI
        ja: protected resource URI
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录用作 OAuth resource indicator 与令牌受众的 MCP 服务器规范 URI。
        en: Records the canonical MCP server URI used as the OAuth resource indicator and token audience.
        ja: OAuth resource indicator/token audience に使う canonical MCP server URI を記録します。
      allowed_values: []
      pattern: null
      example_value: https://files.example/mcp
      source_claims:
        - claim-mcp-authorization-003
    - id: authorization_server_ref
      labels:
        zh: 授权服务器引用
        en: authorization-server reference
        ja: authorization server 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用通过受保护资源元数据发现并负责签发受众绑定令牌的授权服务器。
        en: References the authorization server discovered through protected-resource metadata and responsible for issuing audience-bound tokens.
        ja: protected-resource metadata で発見し audience-bound token を発行する authorization server を参照します。
      allowed_values: []
      pattern: null
      example_value: authorization-server:identity.example
      source_claims:
        - claim-mcp-authorization-004
    - id: code_challenge_method
      labels:
        zh: PKCE 挑战方法
        en: PKCE challenge method
        ja: PKCE challenge method
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录授权码流程采用的 PKCE 挑战方法；MCP 授权要求 S256。
        en: Records the PKCE challenge method used by the authorization-code flow; MCP authorization requires S256.
        ja: authorization-code flow の PKCE challenge method を記録し、MCP authorization は S256 を要求します。
      allowed_values:
        - id: MCPAuthorizationPkceS256
          value: S256
          labels:
            zh: S256
            en: S256
            ja: S256
          definitions:
            zh: SHA-256 PKCE 挑战。
            en: The SHA-256 PKCE challenge.
            ja: SHA-256 PKCE challenge。
          status: accepted
          source_claims:
            - claim-mcp-authorization-005
      pattern: null
      example_value: S256
      source_claims:
        - claim-mcp-authorization-006
  constraints: []
  required_relation_constraints: []
examples:
  - id: mcp-authorization-positive-resource-bound-token
    kind: positive
    labels:
      zh: 目标服务器绑定令牌
      en: Token bound to the target server
      ja: 対象サーバーに bound された token
    scenario_id: null
    descriptions:
      zh: "`https://files.example/mcp` 返回 401 与 protected-resource metadata；客户端发现授权服务器，以该 MCP URI 作为 `resource` 完成 PKCE 流程，并提交只面向该服务器的令牌。"
      en: "`https://files.example/mcp` returns 401 with protected-resource metadata. The client discovers the authorization server, uses that MCP URI as `resource` in a PKCE flow, and sends a token intended only for that server."
      ja: "`https://files.example/mcp` が 401 と protected-resource metadata を返し、client は認可 server を発見し、その MCP URI を `resource` とする PKCE flow で対象専用 token を送ります。"
    field_values:
      authorization_context_id: mcp-auth:files-example:20260717
      resource_uri: https://files.example/mcp
      authorization_server_ref: authorization-server:identity.example
      code_challenge_method: S256
    related_node_ids:
      - MCPAuthorization
      - MCPClient
      - MCPServer
      - MCPStreamableHTTPTransport
    related_relation_ids:
      - MCPAuthorization-applies_to-MCPStreamableHTTPTransport
    expected_result:
      zh: 服务器验证令牌受众后才处理 MCP 请求。
      en: The server processes the MCP request only after validating token audience.
      ja: server は token audience 検証後だけ MCP request を処理します。
    why_valid_or_invalid:
      zh: 发现、resource indicator、PKCE 与受众验证均属于规范化 HTTP 授权链。
      en: Discovery, resource indicator, PKCE, and audience validation form the specified HTTP authorization chain.
      ja: discovery、resource indicator、PKCE、audience validation が規定 HTTP 認可 chain を構成します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-authorization-001
  - id: mcp-authorization-boundary-stdio-env
    kind: boundary
    labels:
      zh: stdio 环境凭据
      en: stdio environment credential
      ja: stdio 環境 credential
    scenario_id: null
    descriptions:
      zh: 本地 stdio 服务器从进程环境读取 API 凭据，没有 protected-resource metadata、OAuth 重定向或 MCP HTTP token。
      en: A local stdio server reads an API credential from its process environment, with no protected-resource metadata, OAuth redirect, or MCP HTTP token.
      ja: local stdio server が process environment から API credential を読み、protected-resource metadata、OAuth redirect、MCP HTTP token はありません。
    field_values:
      transport: stdio
      credential_source: environment
    related_node_ids:
      - MCPAuthorization
      - MCPTransport
    related_relation_ids: []
    expected_result:
      zh: 不得创建 MCPAuthorization 流程实例。
      en: No MCPAuthorization flow instance is created.
      ja: MCPAuthorization flow instance を作成しません。
    why_valid_or_invalid:
      zh: 规范明确 stdio 不应采用该 HTTP OAuth 流程。
      en: The specification explicitly excludes stdio from this HTTP OAuth flow.
      ja: 仕様は stdio をこの HTTP OAuth flow の対象外とします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-authorization-001
external_mappings: []
