schema: moonweave.ai/ontology-node/v1
id: MCPAuthorization
kind: concept
labels:
  zh: MCP 授权
  en: MCP authorization
  ja: MCP 認可
semantics:
  short_definition:
    zh: HTTP 传输上允许 MCP 客户端代表资源所有者访问受保护 MCP 服务器的可选 OAuth 2.1 授权机制。
    en: The optional OAuth 2.1 authorization mechanism that lets an MCP client access a protected MCP server on a resource owner's behalf over HTTP transport.
    ja: HTTP トランスポートで、MCP クライアントがリソース所有者に代わり保護された MCP サーバーへアクセスできるようにする任意の OAuth 2.1 認可機構。
  definition:
    zh: >
      MCP 授权是在传输层保护受限 MCP 服务器请求的规范。受保护的 MCP 服务器作为 OAuth 资源服务器，
      MCP 客户端作为 OAuth 客户端，授权服务器在需要时与用户交互并签发访问令牌。授权在 MCP 实现中是可选的；
      支持 HTTP 传输的实现应遵循本规范，而 stdio 实现不应使用此流程，应从环境取得凭据。该概念不等同于
      JSON-RPC 的工具权限决定，也不代表用户认证界面本身。
    en: >
      MCP authorization is the transport-level specification for protecting requests to a restricted MCP server. A
      protected MCP server acts as an OAuth resource server, an MCP client as an OAuth client, and an authorization
      server interacts with the user when needed and issues access tokens. Authorization is optional for MCP
      implementations; HTTP implementations should follow this specification, while stdio implementations should not
      use this flow and should obtain credentials from the environment. It is not a JSON-RPC tool-permission decision
      or a user-authentication interface itself.
    ja: >
      MCP 認可は制限された MCP サーバーへの要求を保護するトランスポート層仕様である。保護された MCP サーバーは OAuth
      リソースサーバー、MCP クライアントは OAuth クライアントとして動作し、認可サーバーは必要時にユーザーと対話して
      アクセストークンを発行する。MCP 実装において認可は任意であり、HTTP 実装は本仕様に従うべきだが、stdio 実装は
      このフローを用いず環境から資格情報を取得すべきである。これは JSON-RPC のツール権限判断やユーザー認証 UI 自体ではない。
  why_needed:
    zh: 远程受保护资源需要在请求前发现授权服务器、限制令牌受众与范围，并避免将长期凭据暴露给 MCP 服务器。
    en: Protected remote resources need authorization-server discovery, audience- and scope-limited tokens, and no exposure of long-lived credentials to the MCP server.
    ja: 保護されたリモートリソースには、認可サーバー発見、対象者とスコープを制限したトークン、MCP サーバーへ長期資格情報を露出しないことが必要である。
  includes:
    -
      zh: OAuth 2.1 资源服务器、客户端和授权服务器角色
      en: OAuth 2.1 resource-server, client, and authorization-server roles
      ja: OAuth 2.1 のリソースサーバー、クライアント、認可サーバー役割
    - {zh: 受保护资源元数据和授权服务器发现, en: Protected Resource Metadata and authorization-server discovery, ja: Protected Resource Metadata と認可サーバー発見}
    -
      zh: Bearer 访问令牌、resource 参数和范围处理
      en: Bearer access tokens, resource parameters, and scope handling
      ja: Bearer アクセストークン、resource パラメーター、スコープ処理
  excludes:
    - {zh: stdio 传输的 HTTP OAuth 流程, en: The HTTP OAuth flow for stdio transport, ja: stdio トランスポート向け HTTP OAuth フロー}
    - {zh: 由应用自行定义的工具确认 UI, en: Application-defined tool confirmation UI, ja: アプリケーション固有のツール確認 UI}
  semantic_kind: specification
  aliases:
    - {language: en, value: MCP OAuth authorization, alias_kind: synonym}
engineering:
  explanation:
    zh: 'HTTP 客户端对 401 的 WWW-Authenticate challenge 解析 resource_metadata 和 scope，发现授权服务器元数据，获取受众绑定的访问令牌，并对受保护 endpoint 发送 Authorization: Bearer 头。服务器验证令牌的受众、签名、有效期和所需范围。'
    en: 'An HTTP client parses resource_metadata and scope from a 401 WWW-Authenticate challenge, discovers authorization-server metadata, obtains an audience-bound access token, and sends Authorization: Bearer to the protected endpoint. The server validates the token audience, signature, expiry, and needed scope.'
    ja: 'HTTP クライアントは 401 WWW-Authenticate challenge の resource_metadata と scope を解析し、認可サーバーメタデータを発見して対象者に結び付いたアクセストークンを得て、保護 endpoint に Authorization: Bearer を送る。サーバーはトークンの対象者、署名、有効期限、必要スコープを検証する。'
  typical_input:
    - description: A protected endpoint's authorization challenge.
      format: |
        HTTP/1.1 401 Unauthorized
        WWW-Authenticate: Bearer resource_metadata="https://mcp.example.com/.well-known/oauth-protected-resource", scope="files:read"
      source_claims: [mcp-auth-challenge]
  typical_output:
    - description: An authorized request after discovery and token acquisition.
      format: |
        POST /mcp
        Authorization: Bearer <access-token>
        MCP-Protocol-Version: 2025-11-25
      source_claims: [mcp-auth-access-token]
  reference_implementations:
    - name: MCP Authorization specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/authorization
      description: Normative HTTP authorization roles, discovery, access-token use, and security requirements.
structure:
  identity_keys: [resource, authorization_servers]
  fields:
    - id: resource
      labels: {zh: "资源参数", en: "Resource parameter", ja: "Resource パラメーター"}
      definitions:
        zh: "OAuth 授权和令牌请求使用的原生 resource 参数，值为规范受保护 MCP 资源 URI。"
        en: "The native resource parameter used in OAuth authorization and token requests, whose value is the canonical protected MCP resource URI."
        ja: "OAuth 認可・トークン要求で使うネイティブな resource パラメーター。値は正規の保護 MCP リソース URI。"
      datatype: uri
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "https://mcp.example.com/mcp"
      allowed_values: []
      source_claims: [mcp-auth-resource-parameter]
    - id: authorization_servers
      labels: {zh: "授权服务器列表", en: "Authorization servers", ja: "認可サーバー一覧"}
      definitions:
        zh: "OAuth Protected Resource Metadata 的原生 authorization_servers 成员，至少列出一个授权服务器。"
        en: "The native authorization_servers member of OAuth Protected Resource Metadata, listing at least one authorization server."
        ja: "OAuth Protected Resource Metadata のネイティブな authorization_servers メンバー。少なくとも一つの認可サーバーを列挙する。"
      datatype: array
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: ["https://auth.example.com"]
      allowed_values: []
      source_claims: [mcp-auth-discovery, mcp-auth-roles]
    - id: scope
      labels: {zh: "范围", en: "Scope", ja: "スコープ"}
      definitions:
        zh: "401 WWW-Authenticate challenge 或 OAuth 流程中的原生 scope 值；它表明所需权限，不是 JSON-RPC 参数。"
        en: "The native scope value in a 401 WWW-Authenticate challenge or OAuth flow; it states required permission and is not a JSON-RPC parameter."
        ja: "401 WWW-Authenticate challenge または OAuth フローのネイティブな scope 値。必要権限を示し、JSON-RPC パラメーターではない。"
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: "files:read"
      allowed_values: []
      source_claims: [mcp-auth-challenge]
    - id: authorization_header
      labels: {zh: "Authorization 头", en: "Authorization header", ja: "Authorization ヘッダー"}
      definitions:
        zh: "受保护 HTTP 请求中的原生 Authorization: Bearer 头；令牌不得放在 URL 查询参数。"
        en: "The native Authorization: Bearer header on a protected HTTP request; the token must not be put in a URL query parameter."
        ja: "保護 HTTP 要求のネイティブな Authorization: Bearer ヘッダー。トークンを URL クエリパラメーターに置いてはならない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "Bearer <redacted-access-token>"
      allowed_values: []
      source_claims: [mcp-auth-access-token]
    - id: token_audience_claim
      labels: {zh: "令牌受众声明", en: "Token audience claim", ja: "トークン対象者クレーム"}
      definitions:
        zh: "访问令牌中绑定到规范资源 URI 的 OAuth 受众声明；它是令牌验证属性，不是 MCP JSON-RPC 字段或 HTTP 头。"
        en: "The OAuth audience claim in an access token bound to the canonical resource URI; it is a token-validation property, not an MCP JSON-RPC field or HTTP header."
        ja: "正規リソース URI に結び付くアクセス トークンの OAuth audience クレーム。トークン検証属性であり、MCP JSON-RPC フィールドや HTTP ヘッダーではない。"
      datatype: uri
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "https://mcp.example.com/mcp"
      allowed_values: []
      source_claims: [mcp-auth-token-audience]
  constraints:
    - id: authorization-is-optional-but-http-scoped
      severity: error
      expression_language: plain
      expression: When MCP authorization is implemented for an HTTP-based transport it follows this authorization specification; stdio does not use this HTTP authorization flow.
      explanation:
        zh: 当 HTTP 传输实现 MCP 授权时，它遵循本授权规范；stdio 不使用该 HTTP 授权流程。
        en: When MCP authorization is implemented for an HTTP-based transport it follows this authorization specification; stdio does not use this HTTP authorization flow.
        ja: HTTP ベースのトランスポートで MCP 認可を実装する場合は本認可仕様に従い、stdio はこの HTTP 認可フローを用いない。
      source_claims: [mcp-auth-transport-scope]
    - id: protected-server-publishes-discovery
      severity: error
      expression_language: plain
      expression: A protected MCP server exposes authorization-server location through OAuth Protected Resource Metadata and a client supports the mandated discovery mechanisms.
      explanation:
        zh: 受保护 MCP 服务器通过 OAuth Protected Resource Metadata 暴露授权服务器位置，客户端支持规定的发现机制。
        en: A protected MCP server exposes authorization-server location through OAuth Protected Resource Metadata and a client supports the mandated discovery mechanisms.
        ja: 保護された MCP サーバーは OAuth Protected Resource Metadata で認可サーバー位置を公開し、クライアントは定められた発見機構を支える。
      source_claims: [mcp-auth-discovery]
    - id: token-audience-matches-resource
      severity: error
      expression_language: plain
      expression: The access token audience matches the canonical protected resource URI used by the MCP request.
      explanation:
        zh: 访问令牌受众必须匹配 MCP 请求使用的规范受保护资源 URI。
        en: The access token audience must match the canonical protected resource URI used by the MCP request.
        ja: アクセストークンの対象者は MCP 要求が使う正規の保護リソース URI と一致する。
      source_claims: [mcp-auth-token-audience]
  required_relations: []
examples:
  - id: mcp-authorization-positive-bearer-discovery

    labels: {zh: 发现后携带 Bearer 令牌, en: Bearer token after discovery, ja: 発見後の Bearer トークン}

    descriptions:
      zh: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。"
      en: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths."
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"resource":"https://mcp.example.com/mcp","authorization_servers":["https://auth.example.com"],"scope":"files:read","authorization_header":"Bearer <redacted-access-token>","token_audience_claim":"https://mcp.example.com/mcp"}
    related_node_ids: [MCPAuthorization, MCPStreamableHTTPTransport, MCPClient, MCPServer]
    related_relation_ids: [MCPAuthorization-part_of-MCPStreamableHTTPTransport]

    source_claims: [mcp-auth-discovery, mcp-auth-challenge, mcp-auth-access-token]
  - id: mcp-authorization-counterexample-stdio-oauth

    labels: {zh: stdio 上启动 HTTP OAuth, en: HTTP OAuth started on stdio, ja: stdio 上で開始した HTTP OAuth}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"resource":"https://mcp.example.com/mcp","authorization_servers":["https://auth.example.com"],"scope":"files:read","authorization_header":"Bearer <token-for-other-resource>","token_audience_claim":"https://other.example.com/mcp"}
    related_node_ids: [MCPAuthorization, MCPStdioTransport]
    related_relation_ids: [MCPAuthorization-part_of-MCPStreamableHTTPTransport]

    source_claims: [mcp-auth-transport-scope]
  - id: mcp-authorization-boundary-tool-confirmation

    labels: {zh: OAuth 授权与工具确认的边界, en: Boundary between OAuth authorization and tool confirmation, ja: OAuth 認可とツール確認の境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"resource":"https://mcp.example.com/mcp","authorization_servers":["https://auth.example.com"],"scope":"files:read","authorization_header":"Bearer <redacted-access-token>","token_audience_claim":"https://mcp.example.com/mcp"}
    related_node_ids: [MCPAuthorization, MCPToolCallRequest]
    related_relation_ids: [MCPAuthorization-part_of-MCPStreamableHTTPTransport]

    source_claims: [mcp-auth-purpose]
  - id: mcp-authorization-instance-files-read

    labels: {zh: files:read 授权实例, en: files:read authorization instance, ja: files:read 認可実例}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"resource":"https://mcp.example.com/mcp","authorization_servers":["https://auth.example.com"],"scope":"files:read","authorization_header":"Bearer <redacted-access-token>","token_audience_claim":"https://mcp.example.com/mcp"}
    related_node_ids: [MCPAuthorization, MCPStreamableHTTPTransport]
    related_relation_ids: [MCPAuthorization-part_of-MCPStreamableHTTPTransport]

    source_claims: [mcp-auth-discovery, mcp-auth-token-audience]
parent_relation:
  id: MCPAuthorization-part_of-MCPStreamableHTTPTransport
  predicate: part_of
  target: concept:MCPStreamableHTTPTransport
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是可流式 HTTP 传输的可选授权部分, en: is an optional authorization part of Streamable HTTP transport, ja: Streamable HTTP トランスポートの任意の認可部分である}
  definition:
    zh: MCP 授权在启用时是 HTTP MCP 传输的受保护资源访问部分。
    en: When enabled, MCP authorization is the protected-resource access part of an HTTP MCP transport.
    ja: 有効化された場合、MCP 認可は HTTP MCP トランスポートの保護リソースアクセス部分である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_authorization_part
    labels: {zh: 具有授权部分, en: has authorization part, ja: 認可部分を持つ}
  conditions:
    - condition: The HTTP transport serves protected MCP resources and authorization is implemented.
      source_claims: [mcp-auth-optional]
  temporal_scope: session
  boundary_context: 此组成关系只适用于启用了授权的 HTTP 传输；它不把每条 JSON-RPC 消息或应用确认 UI 作为授权组成部分。
  constraints:
    - id: authorization-part-is-optional
      severity: warning
      expression_language: plain
      expression: An HTTP MCP transport has an MCPAuthorization part only when it implements authorization for protected resources.
      explanation:
        zh: HTTP MCP 传输只有在为受保护资源实现授权时才具有 MCPAuthorization 部分。
        en: An HTTP MCP transport has an MCPAuthorization part only when it implements authorization for protected resources.
        ja: HTTP MCP トランスポートが保護リソース向け認可を実装する場合にのみ MCPAuthorization 部分を持つ。
      source_claims: [mcp-auth-optional]
  examples: []
  source_claims: [moonweave-mcp-authorization-http-composition]
  distinct_fact_rationale:
    zh: 该关系表达可选的受保护资源访问机制，而不是 HTTP carrier、JSON-RPC 消息或工具调用。
    en: This relation expresses the optional protected-resource access mechanism rather than the HTTP carrier, a JSON-RPC message, or a tool invocation.
    ja: この関係は HTTP 担体、JSON-RPC メッセージ、ツール呼び出しではなく、任意の保護リソースアクセス機構を表す。
relations: []
sources:
  - id: mcp-authorization-2025-11-25
    title: Model Context Protocol Specification — Authorization
    url: https://modelcontextprotocol.io/specification/2025-11-25/basic/authorization
    source_type: official-specification
    locator: "Purpose and Scope; Protocol Requirements; Roles; Overview; Authorization Server Discovery; Access Token Usage; Security Considerations"
    relevance: Defines optional MCP authorization for HTTP-based transport, OAuth roles, discovery, token use, scopes, and security obligations.
source_claims:
  - id: mcp-auth-purpose
    source: mcp-authorization-2025-11-25
    supports: MCP authorization is a transport-level capability allowing clients to access restricted MCP servers on behalf of resource owners through HTTP-based transports.
    locator: "Purpose and Scope"
    evidence_kind: normative
    confidence: high
  - id: moonweave-mcp-authorization-http-composition
    source: mcp-authorization-2025-11-25
    supports: "Moonweave models optional authorization as a part of MCPStreamableHTTPTransport for schema navigation; this composition edge is a taxonomy design inference."
    locator: "Authorization Framework"
    evidence_kind: design-inference
    confidence: high
  - id: mcp-auth-optional
    source: mcp-authorization-2025-11-25
    supports: Authorization is optional for MCP implementations.
    locator: "Protocol Requirements"
    evidence_kind: normative
    confidence: high
  - id: mcp-auth-transport-scope
    source: mcp-authorization-2025-11-25
    supports: HTTP-based transports should follow this authorization specification, while stdio should not and should retrieve credentials from the environment.
    locator: "Protocol Requirements"
    evidence_kind: normative
    confidence: high
  - id: mcp-auth-roles
    source: mcp-authorization-2025-11-25
    supports: A protected MCP server is an OAuth resource server, an MCP client is an OAuth client, and an authorization server issues access tokens.
    locator: "Roles"
    evidence_kind: normative
    confidence: high
  - id: mcp-auth-discovery
    source: mcp-authorization-2025-11-25
    supports: Protected MCP servers implement OAuth Protected Resource Metadata and clients use it to discover authorization servers through supported discovery mechanisms.
    locator: "Overview; Authorization Server Discovery"
    evidence_kind: normative
    confidence: high
  - id: mcp-auth-challenge
    source: mcp-authorization-2025-11-25
    supports: A 401 WWW-Authenticate response may direct the client to resource metadata and required scope, which the client must parse and handle.
    locator: "Protected Resource Metadata Discovery Requirements"
