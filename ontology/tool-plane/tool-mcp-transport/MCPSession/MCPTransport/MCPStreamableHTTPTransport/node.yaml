schema: moonweave.ai/ontology-node/v1
id: MCPStreamableHTTPTransport
kind: concept
status: review
labels:
  zh: MCP 可流式 HTTP 传输
  en: MCP Streamable HTTP transport
  ja: MCP Streamable HTTP トランスポート
semantics:
  short_definition:
    zh: 以单一 MCP HTTP 端点、POST/GET 与可选 SSE 承载消息的标准传输。
    en: The standard transport using one MCP HTTP endpoint, POST/GET, and optional SSE message streams.
    ja: single MCP HTTP endpoint・POST/GET・optional SSE を使う standard transport。
  definition:
    zh: MCP 可流式 HTTP 传输是 MCPTransport 的严格下位类型，继承 MCPTransport 的 transport_spec_id 配置身份；mcp_endpoint_uri 是该传输配置的端点信息而不是替代身份。服务器提供同时支持 POST 与 GET 的单一 MCP 端点，双方可按响应形态使用 SSE，并必须实施 Origin 校验等防护。
    en: MCP Streamable HTTP transport is a strict MCPTransport subtype and inherits the transport_spec_id configuration identity from MCPTransport; mcp_endpoint_uri is endpoint information on that transport configuration, not a replacement identity. The server provides one MCP endpoint supporting POST and GET, either side may use SSE under the response contract, and protections such as Origin validation are required.
    ja: MCP Streamable HTTP transport は MCPTransport の厳密な下位型で、MCPTransport から configuration identity の transport_spec_id を継承し、mcp_endpoint_uri は endpoint 情報であって代替 identity ではありません。server は POST/GET 対応 single MCP endpoint を提供し、SSE と Origin validation 等を扱います。
  why_needed:
    zh: 独立子型使端点、内容类型、会话头、SSE 重连和 DNS rebinding 防护可查询，不再把 SSE 自身误称为第三种标准传输。
    en: The subtype makes endpoint, media type, session header, SSE reconnection, and DNS-rebinding controls queryable without treating SSE itself as a third standard transport.
    ja: subtype により endpoint・media type・session header・SSE reconnection・DNS-rebinding control を検査し SSE 自体を第三 standard transport としません。
  includes:
    - zh: 纳入符合单端点 POST/GET 与可选 SSE 合同的 HTTP MCP 绑定。
      en: Includes HTTP MCP bindings conforming to the one-endpoint POST/GET contract with optional SSE.
      ja: single-endpoint POST/GET と optional SSE contract に従う HTTP MCP binding を含みます。
  excludes:
    - zh: 排除普通 REST API、旧双端点 HTTP+SSE、自定义 WebSocket 和 OAuth 流本身。
      en: Excludes ordinary REST APIs, legacy two-endpoint HTTP+SSE, custom WebSocket, and the OAuth flow itself.
      ja: ordinary REST API・legacy two-endpoint HTTP+SSE・custom WebSocket・OAuth flow 自体を除外します。
  semantic_kind: specification
  aliases: []
