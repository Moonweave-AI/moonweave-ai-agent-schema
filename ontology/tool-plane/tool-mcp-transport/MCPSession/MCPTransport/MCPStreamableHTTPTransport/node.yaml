sibling_differentiation:
  - sibling_concept_id: MCPStdioTransport
    shared_parent_concept_id: MCPTransport
    differentia:
      zh: MCPStreamableHTTPTransport 与 MCPStdioTransport 同属 MCPTransport；MCPStdioTransport 使用子进程 stdin/stdout 换行分帧；MCPStreamableHTTPTransport 使用单一 HTTP 端点、POST/GET 与可选 SSE，并适用 Origin 与 HTTP 授权控制。
      en: MCPStreamableHTTPTransport and MCPStdioTransport share MCPTransport; MCPStdioTransport uses newline framing over subprocess stdin/stdout, whereas MCPStreamableHTTPTransport uses one HTTP endpoint with POST/GET and optional SSE plus Origin and HTTP authorization controls.
      ja: MCPStreamableHTTPTransport と MCPStdioTransport は MCPTransport を共有し、MCPStdioTransport は subprocess stdin/stdout の newline framing、MCPStreamableHTTPTransport は single HTTP endpoint・POST/GET・optional SSE と Origin/HTTP authorization control を使います。
