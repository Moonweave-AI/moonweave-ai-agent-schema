    zh: MCPStreamableHTTPTransport是一种MCPTransport
    en: MCPStreamableHTTPTransport is a MCPTransport
    ja: MCPStreamableHTTPTransportがMCPTransportを一種である
  definitions:
    zh: MCPStreamableHTTPTransport 是 MCPTransport 的严格子型；其必要身份差异是：MCP 可流式 HTTP 传输是一种 MCP 传输（MCPTransport），服务器提供同时支持 POST 与 GET 的单一 MCP 端点，客户端 POST 消息，双方可按协商与响应形态使用 SSE 流；它要求 Origin 校验等连接防护，并取代 2024-11-05 的双端点 HTTP+SSE 标准。
    en: "MCPStreamableHTTPTransport is a strict subtype of MCPTransport; its necessary identity differentia is: MCP Streamable HTTP transport is an MCPTransport whose server provides one MCP endpoint supporting POST and GET; the client POSTs messages and either side may use SSE streams according to the request and response contract. It requires protections such as Origin validation and replaces the 2024-11-05 two-endpoint HTTP+SSE standard."
    ja: MCPStreamableHTTPTransport は MCPTransport の strict subtype であり、必要な identity differentia は次の通りです：MCP Streamable HTTP transport は MCPTransport の一種で server が POST/GET 対応 single MCP endpoint を提供し client が message を POST、contract に応じ SSE stream を使います。Origin validation 等を要求し 2024-11-05 two-endpoint HTTP+SSE standard を置換します。
