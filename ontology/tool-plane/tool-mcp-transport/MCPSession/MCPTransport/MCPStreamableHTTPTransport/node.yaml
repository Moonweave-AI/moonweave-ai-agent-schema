schema: moonweave.ai/ontology-node/v1
id: MCPStreamableHTTPTransport
kind: concept
labels:
  zh: MCP 可流式 HTTP 传输
  en: MCP Streamable HTTP transport
  ja: MCP Streamable HTTP トランスポート
semantics:
  short_definition:
    zh: 通过单一 MCP HTTP 端点的 POST、GET、JSON 和可选 SSE 承载 MCP 消息的标准传输。
    en: The standard transport that carries MCP messages through POST, GET, JSON, and optional SSE at one MCP HTTP endpoint.
    ja: 一つの MCP HTTP エンドポイントで POST、GET、JSON、任意の SSE を通じて MCP メッセージを運ぶ標準トランスポート。
  definition:
    zh: >
      MCP 可流式 HTTP 传输使独立服务器进程能够处理多个客户端连接。服务器必须提供同时支持 POST 和 GET 的单一
      MCP endpoint；客户端以 POST 发送一条 JSON-RPC 消息，服务器对请求返回 JSON 或 SSE，对通知和响应返回 202 或 HTTP 错误。
      客户端可以用 GET 打开 SSE 流接收服务器消息。它不把 HTTP URL、状态码或头部本身当作 MCP JSON-RPC 消息。
    en: >
      MCP Streamable HTTP transport lets an independent server process handle multiple client connections. The server
      must provide one MCP endpoint supporting both POST and GET; a client POSTs one JSON-RPC message, and the server
      returns JSON or SSE for a request and 202 or an HTTP error for a notification or response. A client may use GET
      to open an SSE stream for server messages. It does not treat HTTP URLs, status codes, or headers as JSON-RPC messages.
    ja: >
      MCP Streamable HTTP トランスポートは独立したサーバープロセスが複数のクライアント接続を扱えるようにする。サーバーは
      POST と GET の両方を支える一つの MCP endpoint を提供し、クライアントは JSON-RPC メッセージ一件を POST する。
      サーバーは要求に JSON または SSE を返し、通知または応答には 202 か HTTP エラーを返す。クライアントは GET で
      サーバーメッセージ用の SSE ストリームを開ける。HTTP URL、状態コード、ヘッダー自体は JSON-RPC メッセージではない。
  why_needed:
    zh: 它提供远程部署、流式服务器消息、会话恢复和多连接支持，同时保留 MCP 的 JSON-RPC 语义。
    en: It enables remote deployment, streamed server messages, session recovery, and multiple connections while preserving MCP JSON-RPC semantics.
    ja: MCP JSON-RPC 意味論を保ちながら、リモート配備、サーバーメッセージのストリーミング、セッション回復、複数接続を可能にする。
  includes:
    - {zh: 单一支持 POST 与 GET 的 MCP endpoint, en: One MCP endpoint supporting POST and GET, ja: POST と GET を支える一つの MCP endpoint}
    - {zh: 单条 JSON-RPC POST 正文, en: Single JSON-RPC POST bodies, ja: 一件の JSON-RPC POST 本文}
    - {zh: 可选的 Server-Sent Events 流, en: Optional Server-Sent Events streams, ja: 任意の Server-Sent Events ストリーム}
    - {zh: HTTP 会话 ID 和协议版本头部, en: HTTP session IDs and protocol-version headers, ja: HTTP セッション ID とプロトコルバージョンヘッダー}
  excludes:
    - {zh: 已废弃 HTTP+SSE 传输的双端点模型, en: The deprecated two-endpoint HTTP+SSE transport model, ja: 廃止された二エンドポイント HTTP+SSE モデル}
    - {zh: 作为 JSON-RPC payload 的 URL 或 HTTP 状态码, en: URLs or HTTP statuses as JSON-RPC payloads, ja: JSON-RPC ペイロードとしての URL や HTTP 状態}
  semantic_kind: specification
  aliases:
    - {language: en, value: Streamable HTTP, alias_kind: abbreviation}
engineering:
  explanation:
    zh: 服务器在同一 endpoint 验证 Origin 和认证，以 POST 接收单条 JSON-RPC body；请求可返回 application/json 或 text/event-stream。GET 可建立 SSE，断开后可用 Last-Event-ID 恢复。
    en: The server validates Origin and authentication at the same endpoint and receives a single JSON-RPC body by POST; requests may return application/json or text/event-stream. GET may establish SSE and a client may resume with Last-Event-ID after disconnect.
    ja: サーバーは同じ endpoint で Origin と認証を検証し、POST で一つの JSON-RPC body を受け取る。要求には application/json か text/event-stream を返せる。GET は SSE を確立でき、切断後クライアントは Last-Event-ID で再開できる。
  typical_input:
    - description: A POST containing one MCP JSON-RPC request with both required Accept types.
      format: |
        POST /mcp
        Accept: application/json, text/event-stream
        Content-Type: application/json

        {"jsonrpc":"2.0","id":8,"method":"resources/list"}
      source_claims: [mcp-http-post]
  typical_output:
    - description: JSON response to a client request.
      format: |
        HTTP/1.1 200 OK
        Content-Type: application/json

        {"jsonrpc":"2.0","id":8,"result":{"resources":[]}}
      source_claims: [mcp-http-post]
  reference_implementations:
    - name: MCP Transports specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/transports
      description: Normative Streamable HTTP endpoint, security, POST, GET, SSE, and session behavior.
structure:
  identity_keys: [endpoint_url, http_method, local_transport_kind]
  fields:
    - id: local_session_reference
      labels: {zh: "本地会话引用", en: "Local session reference", ja: "ローカルセッション参照"}
      definitions:
        zh: "继承自 MCPTransport 的 Moonweave 关联值，引用使用该 HTTP 端点交互的 MCP 会话；它不是 HTTP 头。"
        en: "The Moonweave association value inherited from MCPTransport, referencing the MCP session using this HTTP endpoint interaction; it is not an HTTP header."
        ja: "MCPTransport から継承する Moonweave 関連値で、この HTTP エンドポイント対話を使う MCP セッションを参照する。HTTP ヘッダーではない。"
      datatype: identifier
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "session-42"
      allowed_values: []
      source_claims: [mcp-http-session]
    - id: local_transport_kind
      labels: {zh: "本地传输类型", en: "Local transport kind", ja: "ローカルトランスポート種別"}
      definitions:
        zh: "继承自 MCPTransport 的 Moonweave 分类；此标准子类型固定为 `streamable-http`。"
        en: "The Moonweave classification inherited from MCPTransport; this standard subtype fixes it to `streamable-http`."
        ja: "MCPTransport から継承する Moonweave 分類であり、この標準下位型では `streamable-http` に固定される。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "streamable-http"
      allowed_values: ["streamable-http"]
      source_claims: [mcp-http-endpoint]
    - id: local_message_encoding
      labels: {zh: "本地消息编码描述", en: "Local message-encoding descriptor", ja: "ローカルメッセージ符号化記述"}
      definitions:
        zh: "继承自 MCPTransport 的 Moonweave 描述，明确 HTTP 请求体与 SSE 事件承载 UTF-8 JSON-RPC 2.0 消息。"
        en: "The Moonweave descriptor inherited from MCPTransport, specifying that HTTP bodies and SSE events carry UTF-8 JSON-RPC 2.0 messages."
        ja: "MCPTransport から継承する Moonweave 記述で、HTTP body と SSE event が UTF-8 JSON-RPC 2.0 メッセージを運ぶことを明示する。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "UTF-8 JSON-RPC 2.0"
      allowed_values: ["UTF-8 JSON-RPC 2.0"]
      source_claims: [mcp-http-post]
    - id: endpoint_url
      labels: {zh: "MCP 端点 URL", en: "MCP endpoint URL", ja: "MCP エンドポイント URL"}
      definitions:
        zh: "同时接受 POST 和 GET 的单一 MCP HTTP 路径；它是 HTTP API 端点，不是 JSON-RPC 成员。"
        en: "The single MCP HTTP path accepting POST and GET; it is an HTTP API endpoint, not a JSON-RPC member."
        ja: "POST と GET を受ける単一の MCP HTTP パス。JSON-RPC メンバーではなく HTTP API エンドポイントである。"
      datatype: uri
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "https://mcp.example.com/mcp"
      allowed_values: []
      source_claims: [mcp-http-endpoint]
    - id: http_method
      labels: {zh: "HTTP 方法", en: "HTTP method", ja: "HTTP メソッド"}
      definitions:
        zh: "HTTP 请求行中的原生方法：POST 发送一条 JSON-RPC 消息，GET 可打开 SSE 流。"
        en: "The native HTTP request-line method: POST sends one JSON-RPC message and GET may open an SSE stream."
        ja: "ネイティブな HTTP リクエストラインのメソッド。POST は一件の JSON-RPC メッセージを送信し、GET は SSE ストリームを開き得る。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "POST"
      allowed_values: ["POST","GET"]
      source_claims: [mcp-http-endpoint]
    - id: accept_header
      labels: {zh: "Accept 头", en: "Accept header", ja: "Accept ヘッダー"}
      definitions:
        zh: "原生 HTTP Accept 头的媒体类型；POST 客户端同时接受 application/json 和 text/event-stream，SSE GET 接受 text/event-stream。"
        en: "The media types in the native HTTP Accept header; POST clients accept application/json and text/event-stream, while an SSE GET accepts text/event-stream."
        ja: "ネイティブな HTTP Accept ヘッダーのメディア型。POST クライアントは application/json と text/event-stream を受け、SSE GET は text/event-stream を受ける。"
      datatype: array
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: ["application/json","text/event-stream"]
      allowed_values: []
      source_claims: [mcp-http-post, mcp-http-get]
    - id: mcp_protocol_version_header
      labels: {zh: "MCP-Protocol-Version 头", en: "MCP-Protocol-Version header", ja: "MCP-Protocol-Version ヘッダー"}
      definitions:
        zh: "HTTP 后续请求中的原生 MCP-Protocol-Version 头；其值为 initialize 后协商的版本，不是 JSON-RPC 字段。"
        en: "The native MCP-Protocol-Version HTTP header on subsequent requests; its value is negotiated after initialize and is not a JSON-RPC field."
        ja: "後続 HTTP 要求のネイティブな MCP-Protocol-Version ヘッダー。値は initialize 後に交渉され、JSON-RPC フィールドではない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2025-11-25"
      allowed_values: []
      source_claims: [mcp-http-protocol-version]
    - id: mcp_session_id_header
      labels: {zh: "MCP-Session-Id 头", en: "MCP-Session-Id header", ja: "MCP-Session-Id ヘッダー"}
      definitions:
        zh: "服务器可在 initialize 响应中发出的原生 MCP-Session-Id HTTP 头；若已分配，客户端在后续 HTTP 请求中携带它。它不是 JSON-RPC 成员。"
        en: "The native MCP-Session-Id HTTP header a server may issue in an initialize response; once assigned, the client carries it on subsequent HTTP requests. It is not a JSON-RPC member."
        ja: "サーバーが initialize 応答で発行できるネイティブな MCP-Session-Id HTTP ヘッダー。割り当てられた後、クライアントは後続 HTTP 要求で運ぶ。JSON-RPC メンバーではない。"
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: "a1b2c3"
      allowed_values: []
      source_claims: [mcp-http-session]
  constraints:
    - id: streamable-http-one-endpoint
      severity: error
      expression_language: plain
      expression: The server provides one MCP endpoint path that supports both HTTP POST and HTTP GET.
      explanation:
        zh: 服务器必须提供一个同时支持 HTTP POST 和 HTTP GET 的 MCP endpoint 路径。
        en: The server must provide one MCP endpoint path that supports both HTTP POST and HTTP GET.
        ja: サーバーは HTTP POST と HTTP GET の両方を支える一つの MCP endpoint パスを提供する。
      source_claims: [mcp-http-endpoint]
    - id: streamable-http-post-body-is-one-message
      severity: error
      expression_language: plain
      expression: Each client POST body contains one JSON-RPC request, notification, or response.
      explanation:
        zh: 每个客户端 POST 正文都包含一条 JSON-RPC 请求、通知或响应。
        en: Each client POST body contains one JSON-RPC request, notification, or response.
        ja: 各クライアント POST body は JSON-RPC の要求、通知、応答のいずれか一件を含む。
      source_claims: [mcp-http-post]
    - id: streamable-http-origin-validation
      severity: error
      expression_language: plain
      expression: Servers validate Origin on every incoming connection and reject an invalid present Origin with HTTP 403.
      explanation:
        zh: 服务器验证每个入站连接的 Origin；若存在的 Origin 无效，则以 HTTP 403 拒绝。
        en: Servers validate Origin on every incoming connection and reject an invalid present Origin with HTTP 403.
        ja: サーバーは全ての受信接続で Origin を検証し、存在する Origin が無効なら HTTP 403 で拒否する。
      source_claims: [mcp-http-security]
    - id: streamable-http-session-header-continuity
      severity: error
      expression_language: plain
      expression: If a server assigns MCP-Session-Id in the initialize response, the client includes that exact header in every subsequent HTTP request; a terminated session may produce 404 and requires reinitialization.
      explanation:
        zh: 服务器在 initialize 响应中分配 MCP-Session-Id 后，客户端在每个后续 HTTP 请求中携带同一头；若会话已终止，服务器可返回 404，客户端重新初始化。
        en: If a server assigns MCP-Session-Id in the initialize response, the client includes that exact header in every subsequent HTTP request; a terminated session may produce 404 and requires reinitialization.
        ja: サーバーが initialize 応答で MCP-Session-Id を割り当てた場合、クライアントは全ての後続 HTTP 要求で同じヘッダーを送る。終了済みセッションは 404 になり得るため再初期化する。
      source_claims: [mcp-http-session]
    - id: streamable-http-version-header-continuity
      severity: error
      expression_language: plain
      expression: Subsequent Streamable HTTP requests include the negotiated MCP-Protocol-Version header; an unsupported or invalid version is rejected with HTTP 400.
      explanation:
        zh: 后续 Streamable HTTP 请求携带协商的 MCP-Protocol-Version 头；不支持或无效的版本以 HTTP 400 拒绝。
        en: Subsequent Streamable HTTP requests include the negotiated MCP-Protocol-Version header; an unsupported or invalid version is rejected with HTTP 400.
        ja: 後続 Streamable HTTP 要求には交渉済み MCP-Protocol-Version ヘッダーを含める。未対応または無効な版は HTTP 400 で拒否される。
      source_claims: [mcp-http-protocol-version]
  required_relations: []
examples:
  - id: mcp-streamable-http-positive-post-json

    labels: {zh: POST 单条工具请求, en: POST one tool request, ja: 一件のツール要求を POST}

    descriptions:
      zh: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。"
      en: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths."
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"local_session_reference":"session-a1b2c3","local_transport_kind":"streamable-http","local_message_encoding":"UTF-8 JSON-RPC 2.0","endpoint_url":"https://mcp.example.com/mcp","http_method":"POST","accept_header":["application/json","text/event-stream"],"mcp_protocol_version_header":"2025-11-25","mcp_session_id_header":"a1b2c3"}
    related_node_ids: [MCPStreamableHTTPTransport, MCPTransport, MCPRequest]
    related_relation_ids: [MCPStreamableHTTPTransport-is_a-MCPTransport]

    source_claims: [mcp-http-endpoint, mcp-http-post]
  - id: mcp-streamable-http-counterexample-two-messages

    labels: {zh: 一个 POST 中的两条消息, en: Two messages in one POST, ja: 一つの POST 内の二メッセージ}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"local_session_reference":"session-a1b2c3","local_transport_kind":"streamable-http","local_message_encoding":"UTF-8 JSON-RPC 2.0","endpoint_url":"https://mcp.example.com/mcp","http_method":"POST","accept_header":["application/json","text/event-stream"],"mcp_protocol_version_header":"2025-11-25"}
    related_node_ids: [MCPStreamableHTTPTransport]
    related_relation_ids: [MCPStreamableHTTPTransport-is_a-MCPTransport]

    source_claims: [mcp-http-post]
  - id: mcp-streamable-http-boundary-get-sse

    labels: {zh: GET 打开 SSE 的边界, en: GET opens SSE boundary, ja: GET が開く SSE の境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"local_session_reference":"session-a1b2c3","local_transport_kind":"streamable-http","local_message_encoding":"UTF-8 JSON-RPC 2.0","endpoint_url":"https://mcp.example.com/mcp","http_method":"GET","accept_header":["text/event-stream"],"mcp_protocol_version_header":"2025-11-25","mcp_session_id_header":"a1b2c3"}
    related_node_ids: [MCPStreamableHTTPTransport, MCPNotification]
    related_relation_ids: [MCPStreamableHTTPTransport-is_a-MCPTransport]

    source_claims: [mcp-http-get]
  - id: mcp-streamable-http-instance-session-header

    labels: {zh: 带会话头的远程实例, en: Remote instance with session header, ja: セッションヘッダーを持つリモート実例}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"local_session_reference":"session-a1b2c3","local_transport_kind":"streamable-http","local_message_encoding":"UTF-8 JSON-RPC 2.0","endpoint_url":"https://mcp.example.com/mcp","http_method":"POST","accept_header":["application/json","text/event-stream"],"mcp_protocol_version_header":"2025-11-25","mcp_session_id_header":"a1b2c3"}
    related_node_ids: [MCPStreamableHTTPTransport, MCPSession]
    related_relation_ids: [MCPStreamableHTTPTransport-is_a-MCPTransport]

    source_claims: [mcp-http-session, mcp-http-protocol-version]
