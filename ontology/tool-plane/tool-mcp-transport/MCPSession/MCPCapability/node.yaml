schema: moonweave.ai/ontology-node/v1
id: MCPCapability
kind: concept
status: review
labels:
  zh: MCP 协议能力
  en: MCP Capability
  ja: MCP プロトコル能力
semantics:
  short_definition:
    zh: 在初始化中声明并约束会话可用协议特性的协商项。
    en: An initialization declaration that enables and constrains a protocol feature for the session.
    ja: 初期化で宣言され、セッション利用可能機能を制約する交渉項目。
  definition:
    zh: MCP 协议能力是一种能力，表示客户端或服务器在初始化参数/结果中实际声明的协议特性及子能力，例如 roots、sampling、resources.subscribe 或 tools.listChanged；它约束会话可发送的消息，不是 ToolDefinition、OAuth scope、权限授予或一次已执行操作。
    en: An MCP capability is a capability actually declared by a client or server in initialization parameters or results, including sub-capabilities such as roots, sampling, resources.subscribe, or tools.listChanged. It constrains legal session messages and is not a ToolDefinition, OAuth scope, authorization grant, or executed operation.
    ja: MCP protocol capability は client/server が initialization params/result で実際に宣言する能力で、roots・sampling・resources.subscribe・tools.listChanged 等を含みます。session message を制約しますが ToolDefinition・OAuth scope・grant・execution ではありません。
  why_needed:
    zh: 能力节点使“实现了但未声明”和“已声明可使用”可被区分，并为双端功能方向与子能力条件提供可查询依据。
    en: A capability node distinguishes implemented-but-unadvertised behavior from negotiated availability and makes feature direction and sub-capability conditions queryable.
    ja: 能力ノードは実装済み未宣言と交渉済み利用可能を区別し、機能方向と下位能力条件を照会可能にします。
  includes:
    - zh: 纳入初始化中实际声明的标准、实验或扩展能力及其参数化子能力。
      en: Includes standard, experimental, or extension capabilities actually declared during initialization, including their sub-capability settings.
      ja: 初期化で実際に宣言された標準・実験・拡張能力と下位能力設定を含みます。
  excludes:
    - zh: 排除 tools/list 返回的 Tool、OAuth scope、宿主策略开关和仅在代码中实现但未进入会话协商的功能。
      en: Excludes Tool records from tools/list, OAuth scopes, host policy switches, and code paths implemented but not negotiated into the session.
      ja: tools/list の Tool、OAuth scope、host policy switch、実装済みでもセッション交渉に入らない機能を除きます。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys:
    - session_id
    - capability_name
  fields:
    - id: session_id
      labels:
        zh: 会话引用
        en: session reference
        ja: session 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该能力声明生效的 MCPSession；另一会话必须重新协商。
        en: References the MCPSession in which this capability declaration is effective; another session must negotiate separately.
        ja: capability declaration が有効な MCPSession を参照し、別 session では再交渉が必要です。
      allowed_values: []
      pattern: null
      example_value: mcp-session-repo-17
      source_claims:
        - claim-mcp-capability-002
    - id: capability_name
      labels:
        zh: 能力名称
        en: capability name
        ja: capability 名
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录初始化声明中的特性或子特性路径，例如 sampling 或 resources.subscribe。
        en: Records the feature or sub-feature path declared at initialization, such as sampling or resources.subscribe.
        ja: sampling や resources.subscribe のような initialization declaration の feature/sub-feature path を記録します。
      allowed_values: []
      pattern: null
      example_value: resources.subscribe
      source_claims:
        - claim-mcp-capability-003
    - id: declaring_side
      labels:
        zh: 声明方向
        en: declaring side
        ja: declaring side
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明该能力由客户端初始化参数还是服务器初始化结果声明。
        en: States whether the capability is declared by client initialization parameters or the server initialization result.
        ja: capability が client initialization params か server initialization result のどちらで宣言されたかを示します。
      allowed_values:
        - id: MCPCapabilityDeclaringSideClient
          value: client
          labels:
            zh: 客户端声明
            en: client-declared
            ja: client 宣言
          definitions:
            zh: 客户端在 initialize 参数中声明。
            en: Declared by the client in initialize parameters.
            ja: client が initialize params で宣言。
          status: accepted
          source_claims:
            - claim-mcp-capability-004
        - id: MCPCapabilityDeclaringSideServer
          value: server
          labels:
            zh: 服务器声明
            en: server-declared
            ja: server 宣言
          definitions:
            zh: 服务器在 initialize 结果中声明。
            en: Declared by the server in the initialize result.
            ja: server が initialize result で宣言。
          status: accepted
          source_claims:
            - claim-mcp-capability-005
      pattern: null
      example_value: server
      source_claims:
        - claim-mcp-capability-006
  constraints: []
  required_relation_constraints: []
examples:
  - id: mcp-capability-positive-bidirectional-declarations
    kind: positive
    labels:
      zh: 双端分别声明能力
      en: Separate declarations by both endpoints
      ja: 両端の別個の能力宣言
    scenario_id: null
    descriptions:
      zh: "客户端初始化声明 `sampling`；服务器结果声明 `resources: {subscribe: true}`。二者都是 MCPCapability，但方向和拥有方不同。"
      en: "The client initialization declares `sampling`; the server result declares `resources: {subscribe: true}`. Both are MCPCapability values with different owners and directions."
      ja: "client 初期化が `sampling`、server 結果が `resources: {subscribe: true}` を宣言します。両方 MCPCapability ですが所有者と方向が異なります。"
    field_values:
      session_id: mcp-session-repo-17
      capability_name: resources.subscribe
      declaring_side: server
    related_node_ids:
      - MCPCapability
      - MCPServerCapability
    related_relation_ids:
      - MCPServerCapability-is_a-MCPCapability
    expected_result:
      zh: 查询区分客户端能力与服务器能力，并保留子能力值。
      en: The query distinguishes client and server capabilities and retains the sub-capability value.
      ja: 照会は client/server 能力を区別し、下位能力値を保持します。
    why_valid_or_invalid:
      zh: 两个声明都进入初始化合同，但可发送的消息集合不同。
      en: Both declarations enter the initialization contract but enable different message sets.
      ja: 両宣言とも初期化契約に入りますが、有効化するメッセージ集合が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-capability-001
  - id: mcp-capability-boundary-tool-definition
    kind: boundary
    labels:
      zh: 列出的工具不是能力声明
      en: Listed tool is not a capability declaration
      ja: 一覧 tool は能力宣言ではない
    scenario_id: null
    descriptions:
      zh: "`tools/list` 返回名为 `read_file` 的工具及 inputSchema；这说明一个可调用工具，不是初始化中的 `tools` capability。"
      en: "`tools/list` returns a `read_file` tool with an inputSchema; it describes a callable tool, not the initialization `tools` capability."
      ja: "`tools/list` が inputSchema 付き `read_file` を返します。これは呼出可能 tool で、初期化の `tools` capability ではありません。"
    field_values:
      method: tools/list
      tool_name: read_file
    related_node_ids:
      - MCPCapability
      - MCPToolList
    related_relation_ids: []
    expected_result:
      zh: 不得把 ToolDefinition 记录归为 MCPCapability。
      en: The ToolDefinition record is not classified as MCPCapability.
      ja: ToolDefinition 記録を MCPCapability に分類しません。
    why_valid_or_invalid:
      zh: 能力声明开启协议特性，工具记录描述该特性暴露的成员。
      en: A capability enables a protocol feature; a tool record describes one member exposed by that feature.
      ja: 能力宣言は機能を有効化し、tool 記録はその機能が公開する一要素を記述します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-capability-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: MCPSession-enables-MCPCapability
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: MCPSession启用MCPCapability
    en: MCPSession enables MCPCapability
    ja: MCPSessionがMCPCapabilityを有効化する
  definitions:
    zh: MCPSession 只在 initialization 交换中由正确参与方声明、且当前协议版本支持时启用 MCPCapability；错误响应不自动重协商，代码潜能与 OAuth scope 也不构成会话能力。
    en: MCPSession enables MCPCapability only when the correct participant declares it during initialization and the negotiated protocol version supports it; an error response does not automatically renegotiate, and code potential or OAuth scope is not a session capability.
    ja: MCPSession は correct participant が initialization で宣言し negotiated protocol version が対応する時だけ MCPCapability を有効化します。error response は自動再交渉せず code potential/OAuth scope も session capability ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
    en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
    ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: MCPCapability反向关联MCPSession
      en: MCPCapability is the inverse target of MCPSession
      ja: MCPCapabilityからMCPSessionへの逆読解
  conditions: []
  temporal_scope: valid-time
  boundary_context:
    trust_boundary_concept_id: TrustBoundary
    authority_basis:
      zh: MCPSession 与 MCPCapability 保持各自本体所有权；此边只记录已核验的 MCP 协议事实，不转移定义权或授权。
      en: MCPSession and MCPCapability retain their ontology owners; this edge records only a verified MCP protocol fact and transfers neither definitional ownership nor authorization.
      ja: MCPSession と MCPCapability は各 ontology owner を維持し、この edge は verified MCP protocol fact のみを記録して定義所有権や認可を移転しません。
    protocol_or_resource_context:
      zh: 初始化已完成，声明方与能力方向正确，且后续操作满足能力子字段。
      en: Initialization completed, the declaring side matches capability direction, and the later operation satisfies capability sub-fields.
      ja: initialization 完了、declaring side が capability direction と一致し later operation が sub-field を満たします。
  constraints: []
  examples:
    - id: MCPSession-enables-MCPCapability-example-positive-001
      kind: positive
      labels:
        zh: MCPSession-enables-MCPCapability 正例
        en: Positive case for MCPSession-enables-MCPCapability
        ja: MCPSession-enables-MCPCapability の正例
      scenario_id: null
      descriptions:
        zh: 客户端声明 sampling.tools，服务器因此可在 operation 阶段发送带 tools 的 sampling/createMessage。
        en: The client declares sampling.tools, enabling the server to send sampling/createMessage with tools during operation.
        ja: client が sampling.tools を宣言し server は operation phase で tools 付き sampling/createMessage を送れます。
      field_values: {}
      related_node_ids:
        - MCPSession
        - MCPCapability
      related_relation_ids:
        - MCPSession-enables-MCPCapability
      expected_result:
        zh: 建立 MCPSession-enables-MCPCapability，并保留所述协议方向与条件。
        en: Assert MCPSession-enables-MCPCapability with the stated protocol direction and conditions.
        ja: MCPSession-enables-MCPCapability を stated protocol direction/condition 付きで確立します。
      why_valid_or_invalid:
        zh: 初始化已完成，声明方与能力方向正确，且后续操作满足能力子字段。
        en: Initialization completed, the declaring side matches capability direction, and the later operation satisfies capability sub-fields.
        ja: initialization 完了、declaring side が capability direction と一致し later operation が sub-field を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-mcp-capability-007
    - id: MCPSession-enables-MCPCapability-example-boundary-001
      kind: boundary
      labels:
        zh: MCPSession-enables-MCPCapability 边界例
        en: Boundary case for MCPSession-enables-MCPCapability
        ja: MCPSession-enables-MCPCapability の境界例
      scenario_id: null
      descriptions:
        zh: 服务器收到一次 Method not found 错误后，直接假定未声明的 elicitation 已启用。
        en: After one Method not found error, the server assumes undeclared elicitation has become enabled.
        ja: server が Method not found error 後 undeclared elicitation が enabled と仮定します。
      field_values: {}
      related_node_ids:
        - MCPSession
        - MCPCapability
      related_relation_ids:
        - MCPSession-enables-MCPCapability
      expected_result:
        zh: 不得建立 MCPSession-enables-MCPCapability；保留实际出现的较宽或相邻事实。
        en: Do not assert MCPSession-enables-MCPCapability; retain the broader or adjacent fact actually present.
        ja: MCPSession-enables-MCPCapability を確立せず、実際の broader/adjacent fact を保持します。
      why_valid_or_invalid:
        zh: 错误不会变更初始化能力集合，必须由声明而非推测建立 enables。
        en: An error does not alter initialization capabilities; enables requires a declaration rather than inference.
        ja: error は initialization capability set を変更せず enables には declaration が必要です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-mcp-capability-007
  source_claims:
    - claim-mcp-capability-007
  distinct_fact_rationale:
    zh: MCPSession-enables-MCPCapability 只在其方法、方向、载荷或类型条件成立时记录；它不等于端点共现、反向捷径或词形相似。
    en: MCPSession-enables-MCPCapability records only the reviewed method, direction, payload, or subtype condition; it is not endpoint co-occurrence, a redundant inverse shortcut, or lexical similarity.
    ja: MCPSession-enables-MCPCapability は reviewed method・direction・payload・subtype condition のみを記録し、endpoint 共起・redundant inverse shortcut・lexical similarity ではありません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
