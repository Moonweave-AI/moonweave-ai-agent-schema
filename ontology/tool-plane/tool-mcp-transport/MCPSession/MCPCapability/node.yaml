schema: moonweave.ai/ontology-node/v1
id: MCPCapability
kind: concept
labels:
  zh: MCP 能力声明
  en: MCP capability declaration
  ja: MCP機能宣言
semantics:
  short_definition:
    zh: 客户端或服务器为一个 MCP 会话声明的可选协议功能集合。
    en: A client or server's advertised set of optional MCP features for one session.
    ja: 一つのMCPセッションについてクライアントまたはサーバーが宣言する任意プロトコル機能の集合。
  definition:
    zh: >
      MCP 能力声明是 `initialize` 请求和结果中交换的 `capabilities` 对象。它标识客户端可提供
      或服务器可提供的可选协议功能，使两个端点能将正常操作限制在该有状态会话已协商的功能之内。
    en: >
      An MCP capability declaration is the `capabilities` object exchanged in the
      `initialize` request and result. It identifies the optional protocol features that
      a client can provide or a server can offer, so both endpoints can limit normal
      operation to features negotiated for that stateful session.
    ja: >
      MCP機能宣言は、`initialize` リクエストと結果で交換される `capabilities` オブジェクトである。
      クライアントが提供できる、またはサーバーが提供する任意機能を示し、両端点が状態を持つ
      セッションで交渉済みの機能だけを通常運用で使えるようにする。
  why_needed:
    zh: >
      能力协商避免端点假定某个可选方法、通知或功能可用，也允许较新的实现增加支持而无需每个
      对端都实现所有可选功能。
    en: >
      Capability negotiation prevents an endpoint from assuming that an optional method,
      notification, or feature is available. It also lets newer implementations add
      support without requiring every peer to implement every optional feature.
    ja: >
      機能交渉により、端点が任意のメソッド、通知、機能を利用可能だと勝手に仮定することを防ぐ。
      また、全ての相手に全任意機能の実装を要求せずに新しい実装が対応を追加できる。
  includes:
    - zh: roots、sampling、elicitation、tasks 和 experimental 等客户端功能声明。
      en: Client feature declarations such as roots, sampling, elicitation, tasks, and experimental features.
      ja: roots、sampling、elicitation、tasks、experimental などのクライアント機能宣言。
    - zh: prompts、resources、tools、logging、completions、tasks 和 experimental 等服务器功能声明。
      en: Server feature declarations such as prompts, resources, tools, logging, completions, tasks, and experimental features.
      ja: prompts、resources、tools、logging、completions、tasks、experimental などのサーバー機能宣言。
    - zh: "`listChanged` 和资源 `subscribe` 等特定功能的子能力。"
      en: Feature-specific sub-capabilities such as `listChanged` and resource `subscribe`.
      ja: "`listChanged` や resource の `subscribe` など機能固有のサブ機能。"
  excludes:
    - zh: 协商后返回的资源、提示词或工具定义；它们是功能数据而非能力声明。
      en: A resource, prompt, or tool definition returned after negotiation; those are feature data, not a capability declaration.
      ja: 交渉後に返る resource、prompt、tool の定義。これらは機能データであり機能宣言ではない。
    - zh: 对端可以使用未声明可选功能的断言。
      en: A claim that a peer may use an unadvertised optional feature.
      ja: 相手が未宣言の任意機能を使用できるという主張。
  semantic_kind: specification
  aliases:
    - language: en
      value: capabilities object
      alias_kind: synonym
    - language: en
      value: capability negotiation declaration
      alias_kind: synonym
engineering:
  explanation:
    zh: >
      客户端在 `initialize.params.capabilities` 发送其对象，服务器在
      `initialize.result.capabilities` 返回其对象。例如，声明 `tools` 的服务器可以在操作阶段
      接收 `tools/list` 和 `tools/call`；未声明 `sampling` 的客户端不能被要求创建模型消息。
    en: >
      The client sends its object in `initialize.params.capabilities`; the server returns
      its object in `initialize.result.capabilities`. For example, a server that advertises
      `tools` may receive `tools/list` and `tools/call` during operation, whereas a client
      that has not advertised `sampling` must not be asked to create a model message.
    ja: >
      クライアントは `initialize.params.capabilities` に、サーバーは
      `initialize.result.capabilities` に自身のオブジェクトを送る。たとえば `tools` を宣言した
      サーバーは運用中に `tools/list` と `tools/call` を受けられるが、`sampling` を宣言しない
      クライアントにはモデルメッセージ作成を求められない。
  typical_input:
    - description: Client capability declaration in an initialize request.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 1,
          "method": "initialize",
          "params": {
            "protocolVersion": "2025-11-25",
            "capabilities": {
              "roots": {"listChanged": true},
              "sampling": {},
              "elicitation": {"form": {}, "url": {}}
            },
            "clientInfo": {"name": "desktop-host", "version": "1.0.0"}
          }
        }
      source_claims: [mcp-capability-initialize-exchange]
  typical_output:
    - description: Server capability declaration in the matching initialize result.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 1,
          "result": {
            "protocolVersion": "2025-11-25",
            "capabilities": {
              "resources": {"subscribe": true, "listChanged": true},
              "tools": {"listChanged": true}
            },
            "serverInfo": {"name": "files", "version": "1.0.0"}
          }
        }
      source_claims: [mcp-capability-initialize-exchange]
  reference_implementations:
    - name: MCP lifecycle specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
      description: Defines initialize, capability negotiation, and operation-phase restrictions.
structure:
  identity_keys: [local_owner_role]
  fields:
    - id: local_owner_role
      labels: {zh: "本地声明方角色", en: "Local declaration-owner role", ja: "ローカル宣言所有者ロール"}
      definitions:
        zh: "Moonweave 的本地分类值，说明能力对象来自 client 或 server；它不是 initialize 中的字段。"
        en: "A Moonweave-local classification value stating whether a capability object came from client or server; it is not an initialize field."
        ja: "能力オブジェクトが client と server のどちらから来たかを示す Moonweave ローカル分類値。initialize のフィールドではない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "server"
      allowed_values: ["client","server"]
      source_claims: [moonweave-mcp-capability-session-composition]
    - id: local_capability_object
      labels: {zh: "本地能力对象视图", en: "Local capability-object view", ja: "ローカル能力オブジェクト表示"}
      definitions:
        zh: "Moonweave 的本地查看值，引用原生 initialize.params.capabilities 或 initialize result capabilities；它不是额外 wire 层。"
        en: "A Moonweave-local viewing value referring to native initialize.params.capabilities or initialize-result capabilities; it is not an extra wire layer."
        ja: "ネイティブな initialize.params.capabilities または initialize 結果 capabilities を参照する Moonweave ローカル表示値。追加の wire 層ではない。"
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: {"tools":{"listChanged":true}}
      allowed_values: []
      source_claims: [moonweave-mcp-capability-session-composition]
    - id: local_protocol_version_context
      labels: {zh: "本地协议版本上下文", en: "Local protocol-version context", ja: "ローカルプロトコル版コンテキスト"}
      definitions:
        zh: "Moonweave 的本地会话上下文，从 initialize 的 protocolVersion 交换派生；不是 capabilities 对象成员。"
        en: "A Moonweave-local session context derived from initialize protocolVersion exchange; it is not a capabilities-object member."
        ja: "initialize の protocolVersion 交換から導かれる Moonweave ローカルセッション文脈。capabilities オブジェクトのメンバーではない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2025-11-25"
      allowed_values: []
      source_claims: [mcp-capability-initialize-exchange]
  constraints:
    - id: negotiated-features-only
      severity: error
      expression_language: plain
      expression: During operation, an endpoint uses only optional features successfully negotiated through initialize for this session.
      explanation:
        zh: 在操作阶段，端点只能使用已通过本会话 initialize 成功协商的可选功能。
        en: During operation, an endpoint uses only optional features successfully negotiated through initialize for this session.
        ja: 運用中、端点はこのセッションの initialize で成功裏に交渉された任意機能だけを使用する。
      source_claims: [mcp-capability-operation-restriction]
  required_relations: []
examples:
  - id: mcp-capability-positive-server-tools

    labels: {zh: 已声明的服务器工具功能, en: Advertised server tools feature, ja: 宣言済みのサーバー tools 機能}

    descriptions:
      zh: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。"
      en: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths."
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"local_owner_role":"server","local_capability_object":{"tools":{"listChanged":true}},"local_protocol_version_context":"2025-11-25"}
    related_node_ids: [MCPCapability, MCPServerCapability]
    related_relation_ids: [MCPCapability-part_of-MCPSession]

    source_claims: [mcp-capability-initialize-exchange, mcp-capability-operation-restriction]
  - id: mcp-capability-counterexample-unadvertised-tools

    labels: {zh: 未声明的工具调用, en: Unadvertised tool invocation, ja: 未宣言の tool 呼び出し}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"local_owner_role":"server","local_capability_object":{"resources":{}},"local_protocol_version_context":"2025-11-25"}
    related_node_ids: [MCPCapability, MCPServerCapability]
    related_relation_ids: [MCPCapability-part_of-MCPSession]

    source_claims: [mcp-capability-operation-restriction]
  - id: mcp-capability-boundary-resource-data

    labels: {zh: 资源数据与能力声明的边界, en: Boundary between resource data and capability declaration, ja: resource データと機能宣言の境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"local_owner_role":"server","local_capability_object":{"resources":{}},"local_protocol_version_context":"2025-11-25"}
    related_node_ids: [MCPCapability]
    related_relation_ids: [MCPCapability-part_of-MCPSession]

    source_claims: [mcp-capability-initialize-exchange]
  - id: mcp-capability-instance-client-initialize

    labels: {zh: 客户端初始化能力实例, en: Client initialize capability instance, ja: クライアント initialize 機能インスタンス}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"local_owner_role":"client","local_capability_object":{"roots":{"listChanged":true},"sampling":{}},"local_protocol_version_context":"2025-11-25"}
    related_node_ids: [MCPCapability, MCPClientCapability]
    related_relation_ids: [MCPCapability-part_of-MCPSession]

    source_claims: [mcp-capability-initialize-exchange]
parent_relation:
  id: MCPCapability-part_of-MCPSession
  predicate: part_of
  target: concept:MCPSession
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 作为以下对象的一部分协商
    en: is negotiated as part of
    ja: の一部として交渉される
  definition:
    zh: 能力声明在建立 MCP 会话时交换，并约束该会话的可选功能。
    en: A capability declaration is exchanged while establishing an MCP session and governs that session's optional features.
    ja: 機能宣言はMCPセッションの確立中に交換され、そのセッションの任意機能を統制する。
  cardinality:
    source: {min: 1, max: 1}
    target: {min: 1, max: null}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_capability_declaration
    labels:
      zh: 具有能力声明
      en: has capability declaration
      ja: 機能宣言を持つ
  conditions: []
  temporal_scope: session
  boundary_context: Capability declarations do not transfer automatically to a different session.
  constraints:
    - id: capabilities-are-negotiated-at-initialization
      severity: error
      expression_language: plain
      expression: The capability declaration is exchanged as part of initialize, not introduced by an arbitrary normal-operation message.
      explanation:
        zh: 能力声明是 initialize 的一部分，不能由任意普通操作消息引入。
        en: The capability declaration is exchanged as part of initialize, not introduced by an arbitrary normal-operation message.
        ja: 機能宣言は initialize の一部として交換され、任意の通常運用メッセージで導入されない。
      source_claims: [mcp-capability-initialize-exchange]
  examples: []
  source_claims: [moonweave-mcp-capability-session-composition]
  distinct_fact_rationale:
    zh: 该关系表达会话范围的协商；消息关系表达单个 JSON-RPC 信封的传输。
    en: The relation captures session-scoped negotiation, whereas a message relation captures transport of one JSON-RPC envelope.
    ja: この関係はセッション範囲の交渉を表し、メッセージ関係は一つのJSON-RPCエンベロープの伝送を表す。
relations: []
sources:
  - id: mcp-lifecycle-2025-11-25
    title: Model Context Protocol Specification — Lifecycle
    url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
    source_type: official-specification
    locator: "Initialization; Capability Negotiation; Operation"
    relevance: Defines the initialize exchange, the capability categories, and the negotiated-features restriction.
source_claims:
  - id: mcp-capability-initialize-exchange
    source: mcp-lifecycle-2025-11-25
    supports: Client and server exchange capability objects in initialize request and result.
    locator: "Initialization; Capability Negotiation"
    evidence_kind: normative
    confidence: high
  - id: moonweave-mcp-capability-session-composition
    source: mcp-lifecycle-2025-11-25
    supports: "Moonweave treats a negotiated capability declaration as a part of an MCPSession for schema navigation; this composition edge is a taxonomy design inference."
    locator: "Initialization"
    evidence_kind: design-inference
    confidence: high
  - id: mcp-capability-operation-restriction
    source: mcp-lifecycle-2025-11-25
    supports: During operation, both endpoints use only capabilities successfully negotiated for the session.
    locator: "Operation"
    evidence_kind: normative
    confidence: high