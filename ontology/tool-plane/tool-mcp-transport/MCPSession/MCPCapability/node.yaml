    ja: MCP 2025-11-25 仕様（ライフサイクル、トランスポート、認可、能力協議、JSON-RPC メッセージ、リソース購読）に照らして手動意味審査を完了しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-mcp-capability-001
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 requires initialization to be the first client-server interaction, exchanges distinct client and server capability declarations, negotiates one protocol version, enters operation only after notifications/initialized, and shuts down through the selected transport.
    locator: MCP 2025-11-25 > Base Protocol > Lifecycle > Initialization, Capability Negotiation, Operation, and Shutdown
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-mcp-capability-002
    source: eng-proto-mcp-2025-spec
    supports: MCP capabilities are negotiated during initialization and constrain subsequent messages in that session.
    locator: MCP 2025-11-25 > Lifecycle > Initialization and capability negotiation
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-mcp-capability-003
    source: eng-proto-mcp-2025-spec
    supports: MCP initialization declares named client and server capabilities with optional nested sub-capability options.
    locator: MCP 2025-11-25 > Lifecycle > ClientCapabilities and ServerCapabilities
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-mcp-capability-004
    source: eng-proto-mcp-2025-spec
    supports: InitializeRequest carries client capabilities.
    locator: MCP 2025-11-25 > Lifecycle > InitializeRequest.params.capabilities
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-mcp-capability-005
    source: eng-proto-mcp-2025-spec
    supports: InitializeResult carries server capabilities.
    locator: MCP 2025-11-25 > Lifecycle > InitializeResult.capabilities
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-mcp-capability-006
    source: eng-proto-mcp-2025-spec
    supports: MCP uses distinct client and server capability declarations with directional effects.
    locator: MCP 2025-11-25 > Lifecycle > Capability negotiation
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-mcp-capability-007
    source: eng-proto-mcp-2025-spec
    supports: "MCP 2025-11-25 requires initialization to be the first client-server interaction, exchanges distinct client and server capability declarations, negotiates one protocol version, enters operation only after notifications/initialized, and shuts down through the selected transport. For this reviewed edge, the operational reading is: MCPSession enables MCPCapability only when the correct participant declares it during initialization and the negotiated protocol version supports it; an error response does not automatically renegotiate, and code potential or OAuth scope is not a session capability."
    locator: MCP 2025-11-25 > Base Protocol > Lifecycle > Initialization, Capability Negotiation, Operation, and Shutdown
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
