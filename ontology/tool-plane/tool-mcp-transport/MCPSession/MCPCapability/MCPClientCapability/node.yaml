sibling_differentiation:
  - sibling_concept_id: MCPServerCapability
    shared_parent_concept_id: MCPCapability
    differentia:
      zh: MCPClientCapability 与 MCPServerCapability 同属 MCPCapability；MCPClientCapability 位于 initialize 参数并约束服务器到客户端的请求；MCPServerCapability 位于 initialize 结果并约束客户端到服务器的请求与通知。
      en: MCPClientCapability and MCPServerCapability share MCPCapability; MCPClientCapability appears in initialize parameters and gates server-to-client requests, whereas MCPServerCapability appears in initialize results and gates client-to-server requests and notifications.
      ja: MCPClientCapability と MCPServerCapability は MCPCapability を共有し、MCPClientCapability は initialize params で server-to-client request を制約し、MCPServerCapability は initialize result で client-to-server request/notification を制約します。
    source_claims:
      - claim-mcp-client-capability-003
