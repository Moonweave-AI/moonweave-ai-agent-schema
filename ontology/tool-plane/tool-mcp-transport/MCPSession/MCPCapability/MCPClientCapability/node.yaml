      zh: "客户端 repo-client 在 initialize 中声明 `sampling: {tools:{}}`。"
      en: Client repo-client declares sampling with tools in initialize.
      ja: client repo-client が initialize で sampling.tools を宣言します。
    field_values:
      session_id: mcp-session-repo-17
      capability_name: sampling
      declaring_side: client
    related_node_ids:
      - MCPClientCapability
    related_relation_ids: []
    expected_result:
      zh: 创建 MCPClientCapability，并允许服务器在该子能力范围内请求采样。
      en: Create MCPClientCapability and permit server sampling requests only within that sub-capability.
      ja: MCPClientCapability を作りその sub-capability 内だけ server sampling request を許可します。
    why_valid_or_invalid:
      zh: 声明位置、参与方方向与能力名称都属于客户端初始化参数。
      en: Declaration location, participant direction, and capability name all belong to client initialization parameters.
      ja: declaration location・participant direction・capability name が client initialization params に一致します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-client-capability-001
  - id: MCPClientCapability-example-boundary-001
    kind: boundary
    labels:
      zh: MCP 客户端能力边界例
      en: Boundary MCP client capability case
      ja: MCP クライアント能力の境界例
    scenario_id: null
    descriptions:
      zh: 服务器 initialize 结果声明 `resources:{subscribe:true}`。
      en: The server initialize result declares resources.subscribe.
      ja: server initialize result が resources.subscribe を宣言します。
    field_values: {}
    related_node_ids:
      - MCPClientCapability
    related_relation_ids: []
    expected_result:
      zh: 归入 MCPServerCapability，而不是 MCPClientCapability。
      en: Classify MCPServerCapability, not MCPClientCapability.
      ja: MCPServerCapability とし MCPClientCapability にしません。
    why_valid_or_invalid:
      zh: 能力名称不能覆盖声明方与消息方向。
      en: The capability name cannot override the declaring party and message direction.
      ja: capability name は declaring party/message direction を上書きしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-client-capability-001
