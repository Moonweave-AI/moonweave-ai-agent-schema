    ja: MCPClientCapability は MCPCapability の strict subtype であり、必要な identity differentia は次の通りです：MCP client capability は MCPCapability の一種で MCPClient が initialize params に roots・sampling・elicitation・tasks・experimental と sub-capability を宣言します。server tools/resources/prompts はこの subtype ではありません。
