schema: moonweave.ai/ontology-node/v1
id: MCPClientCapability
kind: concept
labels:
  zh: MCP 客户端能力声明
  en: MCP client capability declaration
  ja: MCPクライアント機能宣言
semantics:
  short_definition:
    zh: 客户端在 MCP 初始化时声明的可选协议功能集合。
    en: The optional MCP features a client declares during initialization.
    ja: MCP初期化時にクライアントが宣言する任意プロトコル機能の集合。
  definition:
    zh: >
      MCP 客户端能力声明是 `initialize.params.capabilities` 中由客户端拥有的部分。它告知
      服务器本会话可用的可选客户端功能，包括 roots、sampling、elicitation、任务增强请求以及
      experimental 扩展。
    en: >
      An MCP client capability declaration is the client-owned portion of
      `initialize.params.capabilities`. It tells the server which optional client features
      are available for that session, including roots, sampling, elicitation, task-augmented
      requests, and experimental extensions.
    ja: >
      MCPクライアント機能宣言は `initialize.params.capabilities` のクライアント所有部分である。
      roots、sampling、elicitation、タスク拡張リクエスト、experimental 拡張を含む、その
      セッションで利用可能な任意クライアント機能をサーバーに知らせる。
  why_needed:
    zh: >
      服务器发起的 `sampling/createMessage` 等请求只能在连接客户端明确声明对应能力时发送。
      该声明将主机提供的功能与服务器提供的功能清晰分开。
    en: >
      Server-initiated requests such as `sampling/createMessage` can be sent only when the
      connected client explicitly declares the relevant capability. The declaration keeps
      host-provided features distinct from server-provided features.
    ja: >
      `sampling/createMessage` などサーバー開始リクエストは、接続済みクライアントが対応機能を
      明示的に宣言した場合にのみ送信できる。この宣言はホスト提供機能をサーバー提供機能から
      区別する。
  includes:
    - zh: '`roots` 及可选的 `listChanged` 子能力。'
      en: '`roots`, including its optional `listChanged` sub-capability.'
      ja: '`roots` と任意の `listChanged` サブ機能。'
    - zh: '`sampling`、`elicitation` 和任务增强客户端请求支持。'
      en: '`sampling`, `elicitation`, and task-augmented client request support.'
      ja: '`sampling`、`elicitation`、タスク拡張クライアントリクエスト対応。'
    - zh: 为非标准功能显式声明的 `experimental` 对象。
      en: An explicitly declared `experimental` object for non-standard features.
      ja: 非標準機能のために明示される `experimental` オブジェクト。
  excludes:
    - zh: tools、resources、prompts、logging 和 completions 等服务器能力。
      en: Server capabilities such as tools, resources, prompts, logging, and completions.
      ja: tools、resources、prompts、logging、completions などのサーバー機能。
    - zh: sampling 或 elicitation 请求本身；它们是由声明启用的消息。
      en: A sampling or elicitation request itself; those are messages enabled by a declaration.
      ja: sampling または elicitation リクエストそのもの。これらは宣言により有効になるメッセージである。
  semantic_kind: specification
  aliases:
    - language: en
      value: client capabilities
      alias_kind: synonym
    - language: en
      value: initialize client capabilities
      alias_kind: synonym
engineering:
  explanation:
    zh: >
      客户端仅在 `initialize.params.capabilities` 中发送此对象。服务器读取它后才可发出可选的
      服务器到客户端请求。比如没有 `sampling` 的客户端不能被当作支持 `sampling/createMessage`。
    en: >
      The client sends this object only in `initialize.params.capabilities`. A server reads it
      before issuing optional server-to-client requests. If `sampling` is absent, the server
      cannot treat `sampling/createMessage` as supported by that client.
    ja: >
      クライアントはこのオブジェクトを `initialize.params.capabilities` にのみ送る。サーバーは
      任意のサーバー発クライアント向けリクエストを出す前にそれを読む。`sampling` がなければ
      `sampling/createMessage` をそのクライアント対応として扱えない。
  typical_input:
    - description: Client initialization advertises roots, sampling, and elicitation support.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 1,
          "method": "initialize",
          "params": {
            "protocolVersion": "2025-11-25",
            "capabilities": {
              "roots": {"listChanged": true},
              "sampling": {},
              "elicitation": {"form": {}, "url": {}}
            },
            "clientInfo": {"name": "host-client", "version": "2.0.0"}
          }
        }
      source_claims: [mcp-client-capability-categories]
  typical_output:
    - description: A server may issue this request after the client advertised sampling support.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 27,
          "method": "sampling/createMessage",
          "params": {
            "messages": [
              {"role": "user", "content": {"type": "text", "text": "Summarize this."}}
            ],
            "maxTokens": 256
          }
        }
      source_claims: [mcp-sampling-create-message]
  reference_implementations:
    - name: MCP lifecycle specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
      description: Names the client capability categories and negotiated-operation rule.
    - name: MCP sampling specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/client/sampling
      description: Defines the sampling/createMessage request and response protocol.
structure:
  identity_keys: ["local_owner_role"]
  fields:
    - id: local_owner_role
      labels: {zh: "本地声明方角色", en: "Local declaration-owner role", ja: "ローカル宣言所有者ロール"}
      definitions:
        zh: "继承自 MCPCapability 的 Moonweave 会话分类字段；此子类型必须取 `client`，而非原生 capabilities 成员。"
        en: "The Moonweave session-classification field inherited from MCPCapability; this subtype fixes it to `client`, rather than treating it as a native capabilities member."
        ja: "MCPCapability から継承する Moonweave のセッション分類フィールド。この下位型ではネイティブ capabilities メンバーではなく `client` に固定される。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "client"
      allowed_values: ["client"]
      source_claims: [mcp-client-capability-categories]
    - id: local_capability_object
      labels: {zh: "本地能力对象视图", en: "Local capability-object view", ja: "ローカル能力オブジェクト表示"}
      definitions:
        zh: "对原生 `initialize.params.capabilities` 的 Moonweave 记录视图；它承载本节点的 client 专属能力字段而不增加 wire 字段。"
        en: "A Moonweave record view of native `initialize.params.capabilities`; it carries this node's client-only capability fields without adding a wire field."
        ja: "ネイティブな `initialize.params.capabilities` の Moonweave 記録ビュー。このノードのクライアント専用能力フィールドを運ぶが、wire フィールドを追加しない。"
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: {"roots":{"listChanged":true},"sampling":{},"elicitation":{"form":{},"url":{}}}
      allowed_values: []
      source_claims: [mcp-client-capability-categories]
    - id: local_protocol_version_context
      labels: {zh: "本地协议版本上下文", en: "Local protocol-version context", ja: "ローカルプロトコル版コンテキスト"}
      definitions:
        zh: "从同一 initialize 请求的 `protocolVersion` 取得的会话上下文，说明此能力对象适用的协商版本。"
        en: "The session context taken from `protocolVersion` in the same initialize request, identifying the negotiated version to which this capability object applies."
        ja: "同じ initialize リクエストの `protocolVersion` から取得するセッション文脈で、この能力オブジェクトが適用される交渉済みバージョンを示す。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2025-11-25"
      allowed_values: []
      source_claims: [mcp-client-capability-categories]
    - id: experimental
      labels: {zh: "实验性能力", en: "Experimental capabilities", ja: "実験的機能"}
      definitions:
        zh: "原生 initialize.params.capabilities.experimental 对象，用于明确声明非标准客户端能力。"
        en: "The native initialize.params.capabilities.experimental object that explicitly declares non-standard client features."
        ja: "非標準クライアント機能を明示的に宣言するネイティブな initialize.params.capabilities.experimental オブジェクト。"
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {}
      allowed_values: []
      source_claims: [mcp-client-capability-categories]
    - id: roots
      labels: {zh: "根目录能力", en: "Roots capability", ja: "Roots 機能"}
      definitions:
        zh: "原生 initialize.params.capabilities.roots 对象；可含 listChanged。"
        en: "The native initialize.params.capabilities.roots object; it can include listChanged."
        ja: "ネイティブな initialize.params.capabilities.roots オブジェクト。listChanged を含められる。"
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {"listChanged":true}
      allowed_values: []
      source_claims: [mcp-client-capability-categories]
    - id: sampling
      labels: {zh: "采样能力", en: "Sampling capability", ja: "Sampling 機能"}
      definitions:
        zh: "原生 initialize.params.capabilities.sampling 对象，允许服务器在声明范围内发送 sampling/createMessage。"
        en: "The native initialize.params.capabilities.sampling object, enabling in-scope server sampling/createMessage requests."
        ja: "ネイティブな initialize.params.capabilities.sampling オブジェクト。範囲内のサーバー sampling/createMessage 要求を有効にする。"
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {}
      allowed_values: []
      source_claims: [mcp-client-capability-categories, mcp-sampling-create-message]
    - id: elicitation
      labels: {zh: "征集能力", en: "Elicitation capability", ja: "Elicitation 機能"}
      definitions:
        zh: "原生 initialize.params.capabilities.elicitation 对象，可声明 form 和 url 模式。"
        en: "The native initialize.params.capabilities.elicitation object, which can declare form and url modes."
        ja: "form と url モードを宣言できるネイティブな initialize.params.capabilities.elicitation オブジェクト。"
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {"form":{}}
      allowed_values: []
      source_claims: [mcp-client-capability-categories]
    - id: tasks
      labels: {zh: "任务能力", en: "Tasks capability", ja: "Tasks 機能"}
      definitions:
        zh: "原生 initialize.params.capabilities.tasks 对象，用于任务列表、取消和受支持的任务化请求。"
        en: "The native initialize.params.capabilities.tasks object for task listing, cancellation, and supported task-augmented requests."
        ja: "タスク一覧、取消、対応するタスク拡張要求のためのネイティブな initialize.params.capabilities.tasks オブジェクト。"
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {"list":{},"cancel":{}}
      allowed_values: []
      source_claims: [mcp-client-capability-categories]
  constraints:
    - id: client-capability-role-separation
      severity: error
      expression_language: plain
      expression: A client capability declaration lists client features and does not represent server tools resources prompts logging or completions.
      explanation:
        zh: 客户端能力声明只列出客户端功能，不能表示服务器的 tools、resources、prompts、logging 或 completions。
        en: A client capability declaration lists client features and does not represent server tools, resources, prompts, logging, or completions.
        ja: クライアント機能宣言はクライアント機能を列挙し、サーバーの tools、resources、prompts、logging、completions を表さない。
      source_claims: [mcp-client-capability-categories]
    - id: client-optional-request-requires-negotiation
      severity: error
      expression_language: plain
      expression: A server uses an optional client feature only when the client successfully negotiated that feature for this session.
      explanation:
        zh: 服务器只能在客户端为该会话成功协商可选功能时使用该功能。
        en: A server uses an optional client feature only when the client successfully negotiated that feature for this session.
        ja: サーバーは、クライアントがそのセッションで任意機能を成功裏に交渉した場合にのみそれを使用する。
      source_claims: [mcp-client-capability-operation]
  required_relations: []
examples:
  - id: mcp-client-capability-positive-sampling

    labels: {zh: 已声明的 sampling 支持, en: Advertised sampling support, ja: 宣言済み sampling 対応}

    descriptions:
      zh: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。"
      en: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths."
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"local_owner_role":"client","local_capability_object":{"sampling":{}},"local_protocol_version_context":"2025-11-25","sampling":{}}
    related_node_ids: [MCPClientCapability, MCPCapability]
    related_relation_ids: [MCPClientCapability-is_a-MCPCapability]

    source_claims: [mcp-client-capability-categories, mcp-sampling-create-message]
  - id: mcp-client-capability-counterexample-server-tools

    labels: {zh: 客户端错误声明服务器工具, en: Client incorrectly declares server tools, ja: クライアントによるサーバー tools の誤宣言}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"local_owner_role":"client","local_capability_object":{"tools":{}},"local_protocol_version_context":"2025-11-25"}
    related_node_ids: [MCPClientCapability, MCPServerCapability]
    related_relation_ids: [MCPClientCapability-is_a-MCPCapability]

    source_claims: [mcp-client-capability-categories]
  - id: mcp-client-capability-boundary-elicitation-request

    labels: {zh: 能力声明与征询请求的边界, en: Boundary between capability declaration and elicitation request, ja: 機能宣言と elicitation リクエストの境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"local_owner_role":"client","local_capability_object":{"elicitation":{"form":{}}},"local_protocol_version_context":"2025-11-25","elicitation":{"form":{}}}
    related_node_ids: [MCPClientCapability]
    related_relation_ids: [MCPClientCapability-is_a-MCPCapability]

    source_claims: [mcp-client-capability-categories]
  - id: mcp-client-capability-instance-host-client

    labels: {zh: host-client 的能力对象实例, en: host-client capability object instance, ja: host-client 機能オブジェクトのインスタンス}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"local_owner_role":"client","local_capability_object":{"roots":{"listChanged":true},"sampling":{},"elicitation":{"form":{}}},"local_protocol_version_context":"2025-11-25","roots":{"listChanged":true},"sampling":{},"elicitation":{"form":{}}}
    related_node_ids: [MCPClientCapability, MCPCapability]
    related_relation_ids: [MCPClientCapability-is_a-MCPCapability]

    source_claims: [mcp-client-capability-categories]
parent_relation:
  id: MCPClientCapability-is_a-MCPCapability
  predicate: is_a
  target: concept:MCPCapability
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是客户端拥有的能力声明, en: is a client-owned capability declaration, ja: クライアント所有の機能宣言である}
  definition:
    zh: MCP 客户端能力声明是端点角色为客户端的 MCP 能力声明。
    en: An MCP client capability declaration is an MCP capability declaration whose endpoint role is client.
    ja: MCPクライアント機能宣言は端点の役割がクライアントであるMCP機能宣言である。
  cardinality:
    source: {min: 0, max: null}
    target: {min: 1, max: 1}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_client_capability_declaration
    labels: {zh: 具有客户端能力声明, en: has client capability declaration, ja: クライアント機能宣言を持つ}
  conditions: []
  temporal_scope: session
  boundary_context: 该关系适用于一个会话中的客户端 capabilities 对象，不表示主机的全部产品功能。
  constraints:
    - id: client-role-required
      severity: error
      expression_language: plain
      expression: Only a client-owned initialize capabilities object instantiates MCPClientCapability.
      explanation:
        zh: 只有客户端拥有的 initialize capabilities 对象可以实例化 MCPClientCapability。
        en: Only a client-owned initialize capabilities object instantiates MCPClientCapability.
        ja: クライアント所有の initialize capabilities オブジェクトだけが MCPClientCapability を実例化する。
      source_claims: [mcp-client-capability-categories]
  examples: []
  source_claims: [moonweave-mcp-client-capability-taxonomy]
  distinct_fact_rationale:
    zh: 该子类由客户端端点角色和客户端专属功能词汇区分。
    en: This subtype is distinguished by the client endpoint role and client-only feature vocabulary.
    ja: この下位型はクライアント端点の役割とクライアント専用の機能語彙により区別される。
relations: []
