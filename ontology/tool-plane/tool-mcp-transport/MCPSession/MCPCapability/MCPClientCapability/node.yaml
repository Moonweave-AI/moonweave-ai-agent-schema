schema: moonweave.ai/ontology-node/v1
id: MCPClientCapability
kind: concept
status: review
labels:
  zh: MCP 客户端能力
  en: MCP client capability
  ja: MCP クライアント能力
semantics:
  short_definition:
    zh: 客户端在 initialize 参数中声明的 roots、sampling、elicitation 等能力。
    en: A roots, sampling, elicitation, or other capability declared by a client in initialize parameters.
    ja: client が initialize params で宣言する roots・sampling・elicitation 等の capability。
  definition:
    zh: MCP 客户端能力是 MCPCapability 的严格下位类型，继承 MCPCapability 的 session_id 与 capability_name 复合身份，并以继承字段 declaring_side=client 限定声明方。MCPClient 在 initialize 参数中声明 roots、sampling、elicitation、tasks 或 experimental 等能力；服务器侧 tools、resources 或 prompts 声明不属于该子型。
    en: An MCP client capability is a strict MCPCapability subtype and inherits the compound session_id and capability_name identity from MCPCapability; the inherited declaring_side value is client. An MCPClient declares roots, sampling, elicitation, tasks, experimental features, and their sub-capabilities in initialize parameters, whereas server-side tools, resources, or prompts declarations are not this subtype.
    ja: MCP client capability は MCPCapability の厳密な下位型で、MCPCapability から session_id と capability_name の複合 identity を継承し、継承 field declaring_side=client で宣言側を限定します。MCPClient が initialize params に roots・sampling・elicitation・tasks・experimental を宣言し、server 側 tools/resources/prompts はこの subtype ではありません。
  why_needed:
    zh: 客户端能力层明确反向请求的合法前提，防止仅因服务器实现 sampling 或 elicitation 就假定会话可以使用。
    en: The client-capability layer makes prerequisites for server-to-client requests explicit instead of assuming a feature merely because the server implements it.
    ja: client capability 層は server-to-client request の prerequisite を明示し server implementation だけで利用可能と仮定しません。
  includes:
    - zh: 纳入 initialize.params.capabilities 中由客户端实际声明的标准与扩展能力。
      en: Includes standard and extension capabilities actually declared in initialize.params.capabilities by the client.
      ja: client の initialize.params.capabilities に実際に宣言された standard/extension capability を含みます。
  excludes:
    - zh: 排除服务器能力、宿主 UI 开关、OAuth scope 和未进入初始化的代码特性。
      en: Excludes server capabilities, host UI flags, OAuth scopes, and code features absent from initialization.
      ja: server capability・host UI flag・OAuth scope・initialization にない code feature を除外します。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: mcp-client-capability-declaring-side
      severity: error
      expression_language: plain
      expression: Inherited declaring_side MUST equal client; server declarations belong to MCPServerCapability instead.
      explanations:
        zh: 继承的 declaring_side 必须为 client；服务器声明应归 MCPServerCapability。
        en: Inherited declaring_side must be client; server declarations belong to MCPServerCapability.
        ja: 継承 declaring_side は client でなければならず、server declaration は MCPServerCapability に属します。
      source_claims:
        - claim-mcp-client-capability-002
  required_relation_constraints: []
