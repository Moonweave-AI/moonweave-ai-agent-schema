schema: moonweave.ai/ontology-node/v1
id: MCPServerCapability
kind: concept
labels:
  zh: MCP 服务器能力声明
  en: MCP server capability declaration
  ja: MCPサーバー機能宣言
semantics:
  short_definition:
    zh: 服务器在 MCP 初始化结果中声明的可选协议功能集合。
    en: The optional MCP features a server declares in its initialization result.
    ja: MCP初期化結果でサーバーが宣言する任意プロトコル機能の集合。
  definition:
    zh: >
      MCP 服务器能力声明是 `initialize` 结果中的服务器拥有的 `capabilities` 对象。它告知客户端
      该会话可提供的服务器功能，包括 prompts、resources、tools、logging、completions、任务支持和
      experimental 扩展。
    en: >
      An MCP server capability declaration is the server-owned `capabilities` object in an
      `initialize` result. It tells the client which server features are available for the
      session, including prompts, resources, tools, logging, completions, task support, and
      experimental extensions.
    ja: >
      MCPサーバー機能宣言は `initialize` 結果のサーバー所有 `capabilities` オブジェクトである。
      prompts、resources、tools、logging、completions、タスク対応、experimental 拡張を含む、その
      セッションで利用可能なサーバー機能をクライアントに知らせる。
  why_needed:
    zh: >
      客户端必须根据服务器实际声明决定可以发送哪些可选请求。例如，只有声明 `tools` 后才可请求
      `tools/list` 或调用工具；只有声明 resources 后才可读取或订阅资源。
    en: >
      A client must decide which optional requests it can send from the server's actual
      declaration. For example, it can request `tools/list` or call a tool only after tools
      are advertised, and can read or subscribe to resources only after resources are advertised.
    ja: >
      クライアントはサーバーの実際の宣言から送れる任意リクエストを判断する。たとえば tools が
      宣言された後にのみ `tools/list` や tool 呼び出しができ、resources が宣言された後にのみ
      resource の読み取りまたは購読ができる。
  includes:
    - zh: prompts、resources 和 tools 等服务器向客户端公开的功能。
      en: Server features exposed to the client, including prompts, resources, and tools.
      ja: prompts、resources、tools を含めサーバーがクライアントへ公開する機能。
    - zh: logging、completions、tasks 和 experimental 等可选服务器功能。
      en: Optional server features such as logging, completions, tasks, and experimental extensions.
      ja: logging、completions、tasks、experimental 拡張などの任意サーバー機能。
    - zh: resources `subscribe` 和提示词、资源、工具 `listChanged` 等子能力。
      en: Sub-capabilities such as resource `subscribe` and prompt/resource/tool `listChanged`.
      ja: resource の `subscribe` や prompt/resource/tool の `listChanged` などのサブ機能。
  excludes:
    - zh: roots、sampling 和 elicitation 等客户端能力。
      en: Client capabilities such as roots, sampling, and elicitation.
      ja: roots、sampling、elicitation などのクライアント機能。
    - zh: 具体的 prompt、resource 或 tool 定义；这些是已声明功能返回的数据。
      en: A concrete prompt, resource, or tool definition; those are data returned by an advertised feature.
      ja: 具体的な prompt、resource、tool 定義。これらは宣言済み機能が返すデータである。
  semantic_kind: specification
  aliases:
    - language: en
      value: server capabilities
      alias_kind: synonym
    - language: en
      value: initialize server capabilities
      alias_kind: synonym
engineering:
  explanation:
    zh: >
      服务器在响应 initialize 时返回此对象。客户端将对象保存为会话协商状态，然后只发送与声明
      功能相符的请求。`tools: {"listChanged":true}` 既允许工具请求，也表示服务器会发送工具列表
      变更通知。
    en: >
      The server returns this object when responding to initialize. The client saves it as
      session negotiation state and sends only requests that match advertised features.
      `tools: {"listChanged":true}` permits tool requests and signals tool-list-change
      notification support.
    ja: >
      サーバーは initialize への応答時にこのオブジェクトを返す。クライアントはそれをセッションの
      交渉状態として保存し、宣言済み機能に対応するリクエストだけを送る。
      `tools: {"listChanged":true}` は tool リクエストを可能にし、tool リスト変更通知対応を示す。
  typical_input:
    - description: Client asks a server that advertised tools for its tool definitions.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 4,
          "method": "tools/list",
          "params": {}
        }
      source_claims: [mcp-server-tools-capability]
  typical_output:
    - description: Server initialize result declares resources and tools.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 1,
          "result": {
            "protocolVersion": "2025-11-25",
            "capabilities": {
              "resources": {"subscribe": true, "listChanged": true},
              "tools": {"listChanged": true}
            },
            "serverInfo": {"name": "files", "version": "1.0.0"}
          }
        }
      source_claims: [mcp-server-capability-categories]
  reference_implementations:
    - name: MCP lifecycle specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
      description: Defines server capability categories and initialize result semantics.
    - name: MCP tools specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines tools/list, tools/call, and the tools capability requirement.
structure:
  identity_keys: ["local_owner_role"]
  fields:
    - id: local_owner_role
      labels: {zh: "本地声明方角色", en: "Local declaration-owner role", ja: "ローカル宣言所有者ロール"}
      definitions:
        zh: "继承自 MCPCapability 的 Moonweave 会话分类字段；此子类型必须取 `server`，而非原生 capabilities 成员。"
        en: "The Moonweave session-classification field inherited from MCPCapability; this subtype fixes it to `server`, rather than treating it as a native capabilities member."
        ja: "MCPCapability から継承する Moonweave のセッション分類フィールド。この下位型ではネイティブ capabilities メンバーではなく `server` に固定される。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "server"
      allowed_values: ["server"]
      source_claims: [mcp-server-capability-categories]
    - id: local_capability_object
      labels: {zh: "本地能力对象视图", en: "Local capability-object view", ja: "ローカル能力オブジェクト表示"}
      definitions:
        zh: "对原生 initialize 结果 `capabilities` 的 Moonweave 记录视图；它承载本节点的 server 专属能力字段而不增加 wire 字段。"
        en: "A Moonweave record view of native initialize-result `capabilities`; it carries this node's server-only capability fields without adding a wire field."
        ja: "ネイティブな initialize 結果 `capabilities` の Moonweave 記録ビュー。このノードのサーバー専用能力フィールドを運ぶが、wire フィールドを追加しない。"
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: {"resources":{"subscribe":true},"tools":{"listChanged":true}}
      allowed_values: []
      source_claims: [mcp-server-capability-categories]
    - id: local_protocol_version_context
      labels: {zh: "本地协议版本上下文", en: "Local protocol-version context", ja: "ローカルプロトコル版コンテキスト"}
      definitions:
        zh: "从同一 initialize 结果的 `protocolVersion` 取得的会话上下文，说明此能力对象适用的协商版本。"
        en: "The session context taken from `protocolVersion` in the same initialize result, identifying the negotiated version to which this capability object applies."
        ja: "同じ initialize 結果の `protocolVersion` から取得するセッション文脈で、この能力オブジェクトが適用される交渉済みバージョンを示す。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2025-11-25"
      allowed_values: []
      source_claims: [mcp-server-capability-categories]
    - id: experimental
      labels: {zh: "实验性能力", en: "Experimental capabilities", ja: "実験的機能"}
      definitions:
        zh: "原生 initialize 结果 capabilities.experimental 对象，用于明确声明非标准服务器能力。"
        en: "The native capabilities.experimental object in the initialize result, declaring non-standard server features."
        ja: "非標準サーバー機能を明示する、initialize 結果のネイティブな capabilities.experimental オブジェクト。"
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {}
      allowed_values: []
      source_claims: [mcp-server-capability-categories]
    - id: logging
      labels: {zh: "日志能力", en: "Logging capability", ja: "Logging 機能"}
      definitions:
        zh: "原生 initialize 结果 capabilities.logging 对象，表示服务器可发送日志消息。"
        en: "The native capabilities.logging object in the initialize result, indicating that the server can send log messages."
        ja: "サーバーがログメッセージを送れることを示す、initialize 結果のネイティブな capabilities.logging オブジェクト。"
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {}
      allowed_values: []
      source_claims: [mcp-server-capability-categories]
    - id: completions
      labels: {zh: "补全能力", en: "Completions capability", ja: "Completions 機能"}
      definitions:
        zh: "原生 initialize 结果 capabilities.completions 对象，表示服务器提供参数补全。"
        en: "The native capabilities.completions object in the initialize result, indicating server-side argument completion."
        ja: "サーバー側の引数補完を示す、initialize 結果のネイティブな capabilities.completions オブジェクト。"
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {}
      allowed_values: []
      source_claims: [mcp-server-capability-categories]
    - id: prompts
      labels: {zh: "提示词能力", en: "Prompts capability", ja: "Prompts 機能"}
      definitions:
        zh: "原生 initialize 结果 capabilities.prompts 对象；可含 listChanged。"
        en: "The native capabilities.prompts object in the initialize result; it can include listChanged."
        ja: "initialize 結果のネイティブな capabilities.prompts オブジェクト。listChanged を含められる。"
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {"listChanged":true}
      allowed_values: []
      source_claims: [mcp-server-capability-categories]
    - id: resources
      labels: {zh: "资源能力", en: "Resources capability", ja: "Resources 機能"}
      definitions:
        zh: "原生 initialize 结果 capabilities.resources 对象；可含 subscribe 和 listChanged。"
        en: "The native capabilities.resources object in the initialize result; it can include subscribe and listChanged."
        ja: "initialize 結果のネイティブな capabilities.resources オブジェクト。subscribe と listChanged を含められる。"
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {"subscribe":true}
      allowed_values: []
      source_claims: [mcp-server-capability-categories]
    - id: tools
      labels: {zh: "工具能力", en: "Tools capability", ja: "Tools 機能"}
      definitions:
        zh: "原生 initialize 结果 capabilities.tools 对象；可含 listChanged。"
        en: "The native capabilities.tools object in the initialize result; it can include listChanged."
        ja: "initialize 結果のネイティブな capabilities.tools オブジェクト。listChanged を含められる。"
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {"listChanged":true}
      allowed_values: []
      source_claims: [mcp-server-capability-categories, mcp-server-tools-capability]
    - id: tasks
      labels: {zh: "任务能力", en: "Tasks capability", ja: "Tasks 機能"}
      definitions:
        zh: "原生 initialize 结果 capabilities.tasks 对象，用于任务列表、取消和任务化工具调用。"
        en: "The native capabilities.tasks object in the initialize result for task listing, cancellation, and task-augmented tool calls."
        ja: "タスク一覧、取消、タスク拡張ツール呼び出しのための、initialize 結果のネイティブな capabilities.tasks オブジェクト。"
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {"list":{},"cancel":{}}
      allowed_values: []
      source_claims: [mcp-server-capability-categories]
  constraints:
    - id: server-capability-role-separation
      severity: error
      expression_language: plain
      expression: A server capability declaration lists server features and does not represent client roots sampling or elicitation support.
      explanation:
        zh: 服务器能力声明只列出服务器功能，不能表示客户端 roots、sampling 或 elicitation 支持。
        en: A server capability declaration lists server features and does not represent client roots, sampling, or elicitation support.
        ja: サーバー機能宣言はサーバー機能を列挙し、クライアントの roots、sampling、elicitation 対応を表さない。
      source_claims: [mcp-server-capability-categories]
    - id: server-feature-must-be-advertised
      severity: error
      expression_language: plain
      expression: A client uses an optional server feature only when that server successfully advertised it for the session.
      explanation:
        zh: 客户端只能在服务器为本会话成功声明可选服务器功能时使用该功能。
        en: A client uses an optional server feature only when that server successfully advertised it for the session.
        ja: クライアントは、サーバーがそのセッションで任意サーバー機能を成功裏に宣言した場合にのみそれを使用する。
      source_claims: [mcp-server-capability-operation]
  required_relations: []
examples:
  - id: mcp-server-capability-positive-tools-list

    labels: {zh: 已声明工具后的列表请求, en: Tool list request after tools advertisement, ja: tools 宣言後の tool リスト要求}

    descriptions:
      zh: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。
      en: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths.
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"local_owner_role":"server","local_capability_object":{"tools":{"listChanged":true}},"local_protocol_version_context":"2025-11-25","tools":{"listChanged":true}}
    related_node_ids: [MCPServerCapability, MCPCapability]
    related_relation_ids: [MCPServerCapability-is_a-MCPCapability]

    source_claims: [mcp-server-capability-categories, mcp-server-tools-capability]
  - id: mcp-server-capability-counterexample-client-sampling

    labels: {zh: 服务器错误声明客户端 sampling, en: Server incorrectly declares client sampling, ja: サーバーによるクライアント sampling の誤宣言}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"local_owner_role":"server","local_capability_object":{"sampling":{}},"local_protocol_version_context":"2025-11-25"}
    related_node_ids: [MCPServerCapability, MCPClientCapability]
    related_relation_ids: [MCPServerCapability-is_a-MCPCapability]

    source_claims: [mcp-server-capability-categories]
  - id: mcp-server-capability-boundary-tool-definition

    labels: {zh: 工具能力与工具定义的边界, en: Boundary between tools capability and tool definition, ja: tools 機能と tool 定義の境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"local_owner_role":"server","local_capability_object":{"tools":{}},"local_protocol_version_context":"2025-11-25","tools":{}}
    related_node_ids: [MCPServerCapability]
    related_relation_ids: [MCPServerCapability-is_a-MCPCapability]

    source_claims: [mcp-server-tools-capability]
  - id: mcp-server-capability-instance-files-server

    labels: {zh: files 服务器能力对象实例, en: files server capability object instance, ja: files サーバー機能オブジェクトのインスタンス}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"local_owner_role":"server","local_capability_object":{"resources":{"subscribe":true},"tools":{"listChanged":true}},"local_protocol_version_context":"2025-11-25","resources":{"subscribe":true},"tools":{"listChanged":true}}
    related_node_ids: [MCPServerCapability, MCPCapability]
    related_relation_ids: [MCPServerCapability-is_a-MCPCapability]

    source_claims: [mcp-server-capability-categories]
parent_relation:
  id: MCPServerCapability-is_a-MCPCapability
  predicate: is_a
  target: concept:MCPCapability
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是服务器拥有的能力声明, en: is a server-owned capability declaration, ja: サーバー所有の機能宣言である}
  definition:
    zh: MCP 服务器能力声明是端点角色为服务器的 MCP 能力声明。
    en: An MCP server capability declaration is an MCP capability declaration whose endpoint role is server.
    ja: MCPサーバー機能宣言は端点の役割がサーバーであるMCP機能宣言である。
  cardinality:
    source: {min: 0, max: null}
    target: {min: 1, max: 1}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_server_capability_declaration
    labels: {zh: 具有服务器能力声明, en: has server capability declaration, ja: サーバー機能宣言を持つ}
  conditions: []
  temporal_scope: session
  boundary_context: 该关系适用于一个会话中的服务器 capabilities 对象，不表示部署环境的所有服务。
  constraints:
    - id: server-role-required
      severity: error
      expression_language: plain
      expression: Only a server-owned initialize result capabilities object instantiates MCPServerCapability.
      explanation:
        zh: 只有服务器拥有的 initialize 结果 capabilities 对象可以实例化 MCPServerCapability。
        en: Only a server-owned initialize result capabilities object instantiates MCPServerCapability.
        ja: サーバー所有の initialize 結果 capabilities オブジェクトだけが MCPServerCapability を実例化する。
      source_claims: [mcp-server-capability-categories]
  examples: []
  source_claims: [moonweave-mcp-server-capability-taxonomy]
  distinct_fact_rationale:
    zh: 该子类由服务器端点角色和服务器专属功能词汇区分。
    en: This subtype is distinguished by the server endpoint role and server-only feature vocabulary.
    ja: この下位型はサーバー端点の役割とサーバー専用の機能語彙により区別される。
relations: []
