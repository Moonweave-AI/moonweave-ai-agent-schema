schema: moonweave.ai/ontology-node/v1
id: MCPServerCapability
kind: concept
status: review
labels:
  en: MCP server capability
  zh: MCP 服务器能力
  ja: MCP サーバー能力
semantics:
  short_definition:
    zh: MCP 服务器在初始化结果中声明的服务器侧协议能力。
    en: A server-side protocol capability declared in the MCP initialization result.
    ja: MCP 初期化結果でサーバーが宣言するサーバー側能力。
  definition:
    zh: MCP 服务器能力是一种 MCP 协议能力（MCPCapability），由服务器在 initialize 结果中声明 tools、resources、prompts、logging、completions、tasks 等及其子能力；客户端的 roots、sampling、elicitation 声明不是该子型。
    en: An MCP server capability is an MCPCapability declared by a server in the initialize result, including tools, resources, prompts, logging, completions, tasks, and their sub-capabilities. Client declarations such as roots, sampling, and elicitation are not this subtype.
    ja: MCP server capability は MCPCapability の一種で server が initialize result に tools/resources/prompts/logging/completions/tasks と sub-capability を宣言します。client roots/sampling/elicitation は含みません。
  why_needed:
    zh: 服务器能力专门化可防止把消息方向颠倒，例如服务器只有声明 resources.subscribe 后才应发送单资源更新通知。
    en: The server specialization prevents direction errors; for example, a server should send per-resource update notifications only after declaring resources.subscribe.
    ja: サーバー能力の特化は方向誤りを防ぎ、例えば resources.subscribe 宣言後だけ単一資源更新通知を送れると判定できます。
  includes:
    - zh: 纳入服务器 initialize 结果中的标准服务器能力、子能力和服务器扩展声明。
      en: Includes standard server capabilities, sub-capabilities, and server extensions in the initialize result.
      ja: server initialize 結果の標準能力、下位能力、server extension 宣言を含みます。
  excludes:
    - zh: 排除客户端初始化参数中的 sampling、roots、elicitation，以及列表返回的工具、提示和资源成员。
      en: Excludes client-side sampling, roots, and elicitation declarations and the tool, prompt, or resource members returned by list methods.
      ja: client 初期化の sampling・roots・elicitation と、list が返す tool・prompt・resource 要素を除きます。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys:
    - session_id
    - capability_name
  fields:
    - id: capability_options
      labels:
        zh: 能力选项
        en: capability options
        ja: capability options
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 保存服务器为该能力族声明的可选标准子特性开关，例如 subscribe 与 listChanged；当能力声明为空对象时可缺省。
        en: Stores optional standard sub-feature switches declared by the server for this capability family, such as subscribe and listChanged; absent when the capability is declared as an empty object.
        ja: subscribe/listChanged など、server が capability family に宣言した optional standard sub-feature switches を保存し、空 object 宣言では absent になり得ます。
      allowed_values: []
      pattern: null
      example_value:
        subscribe: true
        listChanged: true
      source_claims:
        - claim-mcp-server-capability-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: mcp-server-capability-positive-resources
    kind: positive
    labels:
      zh: 资源订阅服务器能力
      en: Resource-subscription server capability
      ja: リソース購読サーバー能力
    scenario_id: null
    descriptions:
      zh: "服务器在 initialize 结果返回 `resources: {subscribe: true, listChanged: true}`，随后可处理 `resources/subscribe` 并发送更新通知。"
      en: "The server returns `resources: {subscribe: true, listChanged: true}` in initialize, enabling it to handle `resources/subscribe` and emit update notifications."
      ja: "server が initialize 結果に `resources: {subscribe: true, listChanged: true}` を返し、`resources/subscribe` と更新通知を扱えます。"
    field_values:
      session_id: mcp-session-repository-1
      capability_name: resources
      declaring_side: server
      capability_options:
        subscribe: true
        listChanged: true
    related_node_ids:
      - MCPServerCapability
      - MCPServer
      - MCPCapability
    related_relation_ids:
      - MCPServerCapability-is_a-MCPCapability
    expected_result:
      zh: 该声明被识别为服务器能力，并启用两个资源子特性。
      en: The declaration is a server capability enabling both resource sub-features.
      ja: 宣言は二つの資源下位機能を有効化する server capability と識別されます。
    why_valid_or_invalid:
      zh: 声明位于服务器初始化结果且字段属于服务器资源特性。
      en: It appears in the server initialization result and its fields belong to the server resources feature.
      ja: server 初期化結果にあり、項目が server resources 機能に属します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-server-capability-001
  - id: mcp-server-capability-boundary-sampling
    kind: boundary
    labels:
      zh: 客户端 sampling 声明
      en: Client sampling declaration
      ja: client sampling 宣言
    scenario_id: null
    descriptions:
      zh: "客户端在 initialize 参数中声明 `sampling: {}`；服务器之后可请求采样。"
      en: "The client declares `sampling: {}` in initialize parameters, allowing the server to request sampling later."
      ja: "client が initialize params に `sampling: {}` を宣言し、後で server が sampling を要求できます。"
    field_values:
      owner: client
      capability: sampling
    related_node_ids:
      - MCPServerCapability
      - MCPCapability
    related_relation_ids: []
    expected_result:
      zh: 该声明是客户端 MCPCapability，不是 MCPServerCapability。
      en: The declaration is a client MCPCapability, not MCPServerCapability.
      ja: 宣言は client MCPCapability で、MCPServerCapability ではありません。
    why_valid_or_invalid:
      zh: 能力归属由初始化消息方向决定，而非由最终发起采样请求的一方决定。
      en: Capability ownership follows initialization-message direction, not the party that later initiates the sampling request.
      ja: 能力所有者は初期化メッセージ方向で決まり、後に sampling を要求する側では決まりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-server-capability-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: MCPClientCapability
    shared_parent_concept_id: MCPCapability
    differentia:
      zh: MCPServerCapability 与 MCPClientCapability 同属 MCPCapability；MCPClientCapability 位于 initialize 参数并约束服务器到客户端的请求；MCPServerCapability 位于 initialize 结果并约束客户端到服务器的请求与通知。
      en: MCPServerCapability and MCPClientCapability share MCPCapability; MCPClientCapability appears in initialize parameters and gates server-to-client requests, whereas MCPServerCapability appears in initialize results and gates client-to-server requests and notifications.
      ja: MCPServerCapability と MCPClientCapability は MCPCapability を共有し、MCPClientCapability は initialize params で server-to-client request を制約し、MCPServerCapability は initialize result で client-to-server request/notification を制約します。
    source_claims:
      - claim-mcp-server-capability-003
