  definitions:
    zh: MCPServerCapability 是 MCPCapability 的严格子型；其必要身份差异是：MCP 服务器能力是一种 MCP 协议能力（MCPCapability），由服务器在 initialize 结果中声明 tools、resources、prompts、logging、completions、tasks 等及其子能力；客户端的 roots、sampling、elicitation 声明不是该子型。
    en: "MCPServerCapability is a strict subtype of MCPCapability; its necessary identity differentia is: An MCP server capability is an MCPCapability declared by a server in the initialize result, including tools, resources, prompts, logging, completions, tasks, and their sub-capabilities. Client declarations such as roots, sampling, and elicitation are not this subtype."
    ja: MCPServerCapability は MCPCapability の strict subtype であり、必要な identity differentia は次の通りです：MCP server capability は MCPCapability の一種で server が initialize result に tools/resources/prompts/logging/completions/tasks と sub-capability を宣言します。client roots/sampling/elicitation は含みません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
    en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
    ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: MCPCapability反向关联MCPServerCapability
      en: MCPCapability is the inverse target of MCPServerCapability
      ja: MCPCapabilityからMCPServerCapabilityへの逆読解
