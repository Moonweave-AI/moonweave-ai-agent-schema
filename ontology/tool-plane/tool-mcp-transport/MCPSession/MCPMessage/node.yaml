schema: moonweave.ai/ontology-node/v1
id: MCPMessage
kind: concept
status: review
labels:
  zh: MCP 消息
  en: MCP message
  ja: MCP メッセージ
semantics:
  short_definition:
    zh: 可在线路上编码或解码的合法 JSON‑RPC 请求、响应或通知。
    en: A valid JSON-RPC request, response, or notification encodable on the MCP wire.
    ja: MCP wire で符号化・復号できる正当な JSON-RPC request・response・notification。
  definition:
    zh: MCP 消息是一种信息记录，表示线路上合法的 JSON-RPC 2.0 请求、结果响应、错误响应或通知；具体子型决定 id、method、params、result 与 error 的允许组合。它不等同于对话 Message、通用 ProtocolEnvelope、HTTP 状态/SSE 外壳或 stderr 日志。
    en: An MCP message is an information record representing a valid JSON-RPC 2.0 request, result response, error response, or notification on the wire; the subtype determines the permitted combination of id, method, params, result, and error. It is not a conversational Message, generic ProtocolEnvelope, HTTP status or SSE wrapper, or stderr log.
    ja: MCP message は wire 上の valid JSON-RPC 2.0 request・result response・error response・notification を表す情報記録です。subtype が id/method/params/result/error の組合せを決め、conversation Message・generic ProtocolEnvelope・HTTP/SSE wrapper・stderr log ではありません。
  why_needed:
    zh: 消息上位概念使编码、传输和验证可共享规则，同时保留 request/response/notification 在关联与方向上的严格差异。
    en: The message genus shares encoding and transport validation while preserving strict correlation and direction differences among requests, responses, and notifications.
    ja: message 上位概念は encoding・transport 検証を共有しつつ、request/response/notification の相関と方向差を保持します。
  includes:
    - zh: 纳入符合 MCP 当前 schema 的 JSON‑RPC 请求、成功或错误响应以及通知对象。
      en: Includes JSON-RPC requests, success or error responses, and notifications conforming to the current MCP schema.
      ja: 現行 MCP schema に適合する JSON-RPC request、成功/ error response、notification を含みます。
  excludes:
    - zh: 排除 HTTP 响应元数据、SSE `event:`/`data:` 包装、stderr 日志和 schema 校验失败的任意 JSON。
      en: Excludes HTTP response metadata, SSE `event:`/`data:` framing, stderr logs, and arbitrary JSON that fails the schema.
      ja: HTTP response metadata、SSE `event:`/`data:` framing、stderr log、schema 不適合 JSON を除きます。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - message_record_id
  fields:
    - id: message_record_id
      labels:
        zh: 消息记录标识
        en: message-record ID
        ja: message record ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一条线路消息记录；它不是可缺失或可复用的 JSON-RPC request id。
        en: Stably identifies one wire-message record; it is not the optional or reusable JSON-RPC request id.
        ja: 一 wire-message record を安定識別し、optional/reusable な JSON-RPC request id とは異なります。
      allowed_values: []
      pattern: null
      example_value: mcp-message:s-42:1
      source_claims:
        - claim-mcp-message-002
    - id: session_id
      labels:
        zh: 会话引用
        en: session reference
        ja: session 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用承载该消息并约束其版本、能力与 id 唯一性的 MCPSession。
        en: References the MCPSession that carries the message and scopes its version, capabilities, and request-id uniqueness.
        ja: message を運び version/capability/request-id uniqueness を拘束する MCPSession を参照します。
      allowed_values: []
      pattern: null
      example_value: mcp-session-s-42
      source_claims:
        - claim-mcp-message-003
    - id: jsonrpc
      labels:
        zh: JSON-RPC 版本
        en: JSON-RPC version
        ja: JSON-RPC version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: MCP 线路消息固定使用 JSON-RPC 2.0。
        en: The JSON-RPC version fixed to 2.0 for MCP wire messages.
        ja: MCP wire message で 2.0 に固定される JSON-RPC version です。
      allowed_values:
        - id: MCPMessageJsonRpc20
          value: "2.0"
          labels:
            zh: JSON-RPC 2.0
            en: JSON-RPC 2.0
            ja: JSON-RPC 2.0
          definitions:
            zh: MCP 基础协议使用的固定版本。
            en: The fixed version used by the MCP base protocol.
            ja: MCP base protocol が用いる fixed version。
          status: accepted
          source_claims:
            - claim-mcp-message-004
      pattern: null
      example_value: "2.0"
      source_claims:
        - claim-mcp-message-004
    - id: message_kind
      labels:
        zh: 消息种类
        en: message kind
        ja: message kind
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分请求、结果响应、错误响应和通知四种互斥线路结构。
        en: "Distinguishes the four mutually exclusive wire structures: request, result response, error response, and notification."
        ja: request/result response/error response/notification の四 mutually exclusive wire structures を区別します。
      allowed_values:
        - id: MCPMessageKindRequest
          value: request
          labels:
            zh: 请求
            en: request
            ja: request
          definitions:
            zh: 带 id、method 并要求响应。
            en: Carries id and method and requires a response.
            ja: id/method を持ち response を要します。
          status: accepted
          source_claims:
            - claim-mcp-message-005
        - id: MCPMessageKindResultResponse
          value: result-response
          labels:
            zh: 结果响应
            en: result response
            ja: result response
          definitions:
            zh: 以同一 id 返回 result。
            en: Returns result under the correlated id.
            ja: correlated id で result を返します。
          status: accepted
          source_claims:
            - claim-mcp-message-006
        - id: MCPMessageKindErrorResponse
          value: error-response
          labels:
            zh: 错误响应
            en: error response
            ja: error response
          definitions:
            zh: 返回标准 error 对象。
            en: Returns the standard error object.
            ja: standard error object を返します。
          status: accepted
          source_claims:
            - claim-mcp-message-007
        - id: MCPMessageKindNotification
          value: notification
          labels:
            zh: 通知
            en: notification
            ja: notification
          definitions:
            zh: 带 method 但不带 id，也不接收响应。
            en: Carries method without id and receives no response.
            ja: method を持ち id/response を持ちません。
          status: accepted
          source_claims:
            - claim-mcp-message-008
      pattern: null
      example_value: request
      source_claims:
        - claim-mcp-message-009
  constraints: []
  required_relation_constraints: []
examples:
  - id: mcp-message-positive-initialize-request
    kind: positive
    labels:
      zh: 合法 initialize 消息
      en: Valid initialize message
      ja: 正当な initialize message
    scenario_id: null
    descriptions:
      zh: "`{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{...}}` 在 stdio 上作为一行 UTF‑8 发送。"
      en: "`{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{...}}` is sent as one UTF-8 line over stdio."
      ja: "`{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{...}}` が stdio 上で一行 UTF-8 として送られます。"
    field_values:
      message_record_id: mcp-message:initialize:1
      session_id: mcp-session-initialize-1
      jsonrpc: "2.0"
      message_kind: request
    related_node_ids:
      - MCPMessage
      - MCPRequest
    related_relation_ids:
      - MCPRequest-is_a-MCPMessage
    expected_result:
      zh: 对象通过 MCPMessage schema，并进一步归为 MCPRequest。
      en: The object validates as MCPMessage and is further classified as MCPRequest.
      ja: object は MCPMessage schema を通り、MCPRequest に分類されます。
    why_valid_or_invalid:
      zh: 它具备 JSON‑RPC 版本、请求 id 和 method，且字段组合合法。
      en: It has the JSON-RPC version, request id, method, and a valid field combination.
      ja: JSON-RPC 版、request id、method と正当な項目組合せを持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-message-001
  - id: mcp-message-boundary-http-status
    kind: boundary
    labels:
      zh: HTTP 401 外壳
      en: HTTP 401 envelope
      ja: HTTP 401 envelope
    scenario_id: null
    descriptions:
      zh: Streamable HTTP 端点返回状态 `401` 与 `WWW-Authenticate` 头，但响应体没有 JSON‑RPC 对象。
      en: A Streamable HTTP endpoint returns status `401` with a `WWW-Authenticate` header and no JSON-RPC body.
      ja: Streamable HTTP endpoint が `401` と `WWW-Authenticate` header を返し、JSON-RPC body はありません。
    field_values:
      http_status: 401
      header: WWW-Authenticate
    related_node_ids:
      - MCPMessage
      - MCPAuthorization
    related_relation_ids: []
    expected_result:
      zh: 这是授权传输响应，不创建 MCPMessage。
      en: This is an authorization transport response; no MCPMessage is created.
      ja: これは認可 transport response で、MCPMessage は作成しません。
    why_valid_or_invalid:
      zh: HTTP 外壳未包含可按 MCP schema 解码的 JSON‑RPC 对象。
      en: The HTTP envelope contains no JSON-RPC object decodable by the MCP schema.
      ja: HTTP envelope に MCP schema で復号可能な JSON-RPC object がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-message-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: MCPSession-carries-MCPMessage
  predicate: carries
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: MCPSession承载MCPMessage
    en: MCPSession carries MCPMessage
    ja: MCPSessionがMCPMessageを保持する
  definitions:
    zh: MCPSession 在初始化开始至传输关闭的有效区间内承载 MCPMessage，并以该会话的协议版本、请求 id 空间与能力状态解释消息；相邻 HTTP 响应或另一连接的 JSON-RPC 不能并入。
    en: MCPSession carries MCPMessage during its interval from initialization start through transport shutdown, interpreting messages under that session's protocol version, request-ID namespace, and capability state; adjacent HTTP responses or JSON-RPC from another connection cannot be merged.
    ja: MCPSession は initialization start から transport shutdown まで MCPMessage を保持し session の protocol version・request-ID namespace・capability state で解釈します。他 connection の JSON-RPC/HTTP response は統合しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
    en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
    ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
  inverse_reading:
    predicate: is_carried_by
    labels:
      zh: MCPMessage反向关联MCPSession
      en: MCPMessage is the inverse target of MCPSession
      ja: MCPMessageからMCPSessionへの逆読解
  conditions: []
  temporal_scope: valid-time
  boundary_context:
    trust_boundary_concept_id: TrustBoundary
    authority_basis:
      zh: MCPSession 与 MCPMessage 保持各自本体所有权；此边只记录已核验的 MCP 协议事实，不转移定义权或授权。
      en: MCPSession and MCPMessage retain their ontology owners; this edge records only a verified MCP protocol fact and transfers neither definitional ownership nor authorization.
      ja: MCPSession と MCPMessage は各 ontology owner を維持し、この edge は verified MCP protocol fact のみを記録して定義所有権や認可を移転しません。
    protocol_or_resource_context:
      zh: 消息在该会话选定传输上发送或接收，并共享相同生命周期与请求相关状态。
      en: The message is sent or received over the session's selected transport and shares its lifecycle and request-correlation state.
      ja: message が session selected transport 上で送受信され同じ lifecycle/request-correlation state を共有します。
  constraints: []
  examples:
    - id: MCPSession-carries-MCPMessage-example-positive-001
      kind: positive
      labels:
        zh: MCPSession-carries-MCPMessage 正例
        en: Positive case for MCPSession-carries-MCPMessage
        ja: MCPSession-carries-MCPMessage の正例
      scenario_id: null
      descriptions:
        zh: session repo-17 在 initialize 后承载 id=41 的 tools/list 请求与结果。
        en: Session repo-17 carries the id=41 tools/list request and result after initialization.
        ja: session repo-17 が initialize 後 id=41 tools/list request/result を保持します。
      field_values: {}
      related_node_ids:
        - MCPSession
        - MCPMessage
      related_relation_ids:
        - MCPSession-carries-MCPMessage
      expected_result:
        zh: 建立 MCPSession-carries-MCPMessage，并保留所述协议方向与条件。
        en: Assert MCPSession-carries-MCPMessage with the stated protocol direction and conditions.
        ja: MCPSession-carries-MCPMessage を stated protocol direction/condition 付きで確立します。
      why_valid_or_invalid:
        zh: 消息在该会话选定传输上发送或接收，并共享相同生命周期与请求相关状态。
        en: The message is sent or received over the session's selected transport and shares its lifecycle and request-correlation state.
        ja: message が session selected transport 上で送受信され同じ lifecycle/request-correlation state を共有します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-mcp-message-010
    - id: MCPSession-carries-MCPMessage-example-boundary-001
      kind: boundary
      labels:
        zh: MCPSession-carries-MCPMessage 边界例
        en: Boundary case for MCPSession-carries-MCPMessage
        ja: MCPSession-carries-MCPMessage の境界例
      scenario_id: null
      descriptions:
        zh: 另一个浏览器标签在独立 session repo-18 中复用 id=41。
        en: Another browser tab reuses id=41 in independent session repo-18.
        ja: 別 browser tab が independent session repo-18 で id=41 を再利用します。
      field_values: {}
      related_node_ids:
        - MCPSession
        - MCPMessage
      related_relation_ids:
        - MCPSession-carries-MCPMessage
      expected_result:
        zh: 不得建立 MCPSession-carries-MCPMessage；保留实际出现的较宽或相邻事实。
        en: Do not assert MCPSession-carries-MCPMessage; retain the broader or adjacent fact actually present.
        ja: MCPSession-carries-MCPMessage を確立せず、実際の broader/adjacent fact を保持します。
      why_valid_or_invalid:
        zh: RequestId 只在各自会话命名空间中解释，不能跨会话合并消息。
        en: RequestId is interpreted within each session namespace, so messages cannot be merged across sessions.
        ja: RequestId は各 session namespace 内で解釈し cross-session message merge はできません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-mcp-message-010
  source_claims:
    - claim-mcp-message-010
  distinct_fact_rationale:
    zh: MCPSession-carries-MCPMessage 只在其方法、方向、载荷或类型条件成立时记录；它不等于端点共现、反向捷径或词形相似。
    en: MCPSession-carries-MCPMessage records only the reviewed method, direction, payload, or subtype condition; it is not endpoint co-occurrence, a redundant inverse shortcut, or lexical similarity.
    ja: MCPSession-carries-MCPMessage は reviewed method・direction・payload・subtype condition のみを記録し、endpoint 共起・redundant inverse shortcut・lexical similarity ではありません。
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: parent-to-child
relations:
  - id: MCPMessage-received_by-MCPParticipant
    predicate: received_by
    direction: source-to-target
    relation_kind: information
    labels:
      zh: MCPMessage由其接收MCPParticipant
      en: MCPMessage is received by MCPParticipant
      ja: MCPMessageがMCPParticipantを受信される
    definitions:
      zh: MCPMessage 由在同一 MCPSession 中承担对端角色的 MCPParticipant 接收；接收端必须按请求、响应或通知子型解析线路记录，HTTP 代理或最终用户不是该协议接收方。
      en: MCPMessage is received by the peer MCPParticipant in the same MCPSession, which parses the wire record as a request, response, or notification subtype; an HTTP proxy or end user is not the protocol receiver.
      ja: MCPMessage は同じ MCPSession の peer MCPParticipant に受信され request/response/notification subtype として解析されます。HTTP proxy/end user は protocol receiver ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
      en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
      ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
    inverse_reading:
      predicate: receives
      labels:
        zh: MCPParticipant反向关联MCPMessage
        en: MCPParticipant is the inverse target of MCPMessage
        ja: MCPParticipantからMCPMessageへの逆読解
    conditions: []
    temporal_scope: timeless
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: MCPMessage 与 MCPParticipant 保持各自本体所有权；此边只记录已核验的 MCP 协议事实，不转移定义权或授权。
        en: MCPMessage and MCPParticipant retain their ontology owners; this edge records only a verified MCP protocol fact and transfers neither definitional ownership nor authorization.
        ja: MCPMessage と MCPParticipant は各 ontology owner を維持し、この edge は verified MCP protocol fact のみを記録して定義所有権や認可を移転しません。
      protocol_or_resource_context:
