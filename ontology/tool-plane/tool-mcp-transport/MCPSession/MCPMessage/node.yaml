    layout_role: cross-link
    review_status: pending
    target: concept:MCPParticipant
  - id: MCPMessage-sent_by-MCPParticipant
    predicate: sent_by
    direction: source-to-target
    relation_kind: information
    labels:
      zh: MCPMessage由其发送MCPParticipant
      en: MCPMessage is sent by MCPParticipant
      ja: MCPMessageがMCPParticipantを送信される
