    supports: "MCP 2025-11-25 defines the base protocol as JSON-RPC request, result-response, error-response, and notification records; it also fixes request-ID uniqueness within a session and separates lifecycle, capability negotiation, transport, authorization, server features, and client features. For this reviewed edge, the operational reading is: MCPMessage is received by the peer MCPParticipant in the same MCPSession, which parses the wire record as a request, response, or notification subtype; an HTTP proxy or end user is not the protocol receiver."
