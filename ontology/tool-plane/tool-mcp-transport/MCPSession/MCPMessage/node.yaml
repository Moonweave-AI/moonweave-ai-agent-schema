        en: The receiver is the session's MCPClient or MCPServer and actually consumes the complete JSON-RPC message.
        ja: receiver は session の MCPClient/MCPServer で complete JSON-RPC message を実際に消費します。
    constraints: []
    examples:
      - id: MCPMessage-received_by-MCPParticipant-example-positive-001
        kind: positive
        labels:
          zh: MCPMessage-received_by-MCPParticipant 正例
          en: Positive case for MCPMessage-received_by-MCPParticipant
          ja: MCPMessage-received_by-MCPParticipant の正例
        scenario_id: null
        descriptions:
          zh: repo-server 解析客户端发送的 id=17、method=tools/list 请求。
          en: repo-server parses the client's id=17 tools/list request.
          ja: repo-server が client の id=17 tools/list request を解析します。
        field_values: {}
        related_node_ids:
          - MCPMessage
          - MCPParticipant
        related_relation_ids:
          - MCPMessage-received_by-MCPParticipant
        expected_result:
          zh: 建立 MCPMessage-received_by-MCPParticipant，并保留所述协议方向与条件。
          en: Assert MCPMessage-received_by-MCPParticipant with the stated protocol direction and conditions.
