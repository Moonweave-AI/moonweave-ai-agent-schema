    source: eng-proto-mcp-2025-spec
    supports: "MCP 2025-11-25 requires initialization to be the first client-server interaction, exchanges distinct client and server capability declarations, negotiates one protocol version, enters operation only after notifications/initialized, and shuts down through the selected transport. For this reviewed edge, the operational reading is: MCPSession carries MCPMessage during its interval from initialization start through transport shutdown, interpreting messages under that session's protocol version, request-ID namespace, and capability state; adjacent HTTP responses or JSON-RPC from another connection cannot be merged."
    locator: MCP 2025-11-25 > Base Protocol > Lifecycle > Initialization, Capability Negotiation, Operation, and Shutdown
    evidence_kind: design-inference
    confidence: high
    review_status: pending
