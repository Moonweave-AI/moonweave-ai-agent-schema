schema: moonweave.ai/ontology-node/v1
id: MCPMessage
kind: concept
labels:
  zh: MCP 消息
  en: MCP message
  ja: MCPメッセージ
semantics:
  short_definition:
    zh: 在 MCP 客户端和服务器之间传输的一个 UTF-8 编码 JSON-RPC 2.0 信封。
    en: One UTF-8 encoded JSON-RPC 2.0 envelope exchanged between MCP client and server.
    ja: MCPクライアントとサーバーの間で交換される一つのUTF-8符号化JSON-RPC 2.0エンベロープ。
  definition:
    zh: >
      MCP 消息是 MCP 传输承载的 JSON-RPC 2.0 请求、响应或通知。请求有 method 和 id，响应将
      result 或 error 关联到 id，通知有 method 但没有 id。消息的具体语义由协商的 MCP 功能和
      方法名称决定，而不是由传输本身决定。
    en: >
      An MCP message is a JSON-RPC 2.0 request, response, or notification carried by an MCP
      transport. A request has a method and id, a response associates a result or error with
      an id, and a notification has a method but no id. Its concrete meaning is determined by
      the negotiated MCP feature and method name, not by the transport alone.
    ja: >
      MCPメッセージはMCPトランスポートが運ぶJSON-RPC 2.0のリクエスト、レスポンス、または通知である。
      リクエストはmethodとidを持ち、レスポンスはresultまたはerrorをidに対応付け、通知はmethodを
      持つがidを持たない。具体的な意味はトランスポート単独ではなく、交渉済みのMCP機能とメソッド名で
      決まる。
  why_needed:
    zh: >
      统一消息信封让同一 MCP 操作可在 stdio 或 Streamable HTTP 上运行，也让客户端和服务器能够
      关联请求、响应、错误和异步通知，而不用为每种服务器功能发明不同的线路格式。
    en: >
      A common message envelope lets the same MCP operation work over stdio or Streamable HTTP.
      It also lets clients and servers correlate requests, responses, errors, and asynchronous
      notifications without inventing a separate wire format for every server feature.
    ja: >
      共通メッセージエンベロープにより、同じMCP操作がstdioでもStreamable HTTPでも動作する。また、
      クライアントとサーバーはサーバー機能ごとに別のワイヤー形式を作らずに、リクエスト、レスポンス、
      エラー、非同期通知を対応付けられる。
  includes:
    - zh: 带 id 的 JSON-RPC 请求。
      en: JSON-RPC requests with an id.
      ja: idを持つJSON-RPCリクエスト。
    - zh: 带相同 id 且具有 result 或 error 的 JSON-RPC 响应。
      en: JSON-RPC responses with the matching id and either result or error.
      ja: 対応するidとresultまたはerrorを持つJSON-RPCレスポンス。
    - zh: 不带 id 的 JSON-RPC 通知。
      en: JSON-RPC notifications without an id.
      ja: idを持たないJSON-RPC通知。
  excludes:
    - zh: stdio 字节流或 HTTP 请求本身；它们是承载消息的传输机制。
      en: The stdio byte stream or HTTP request itself; those are transport mechanisms that carry a message.
      ja: stdioのバイトストリームまたはHTTPリクエスト自体。これらはメッセージを運ぶトランスポート機構である。
    - zh: 一个工具定义、资源记录或提示词模板；它们可能位于消息 params 或 result 中。
      en: A tool definition, resource record, or prompt template; each may occur inside message params or result.
      ja: tool定義、resourceレコード、promptテンプレート。それらはメッセージのparamsまたはresult内にあり得る。
  semantic_kind: information
  aliases:
    - language: en
      value: JSON-RPC envelope
      alias_kind: synonym
engineering:
  explanation:
    zh: >
      实现应在发送前序列化一个完整 JSON-RPC 对象并按所选传输编码。stdio 每行只能有一条消息且
      stdout 不得有非 MCP 内容；Streamable HTTP 的 POST 正文是一条请求、通知或响应。接收方先按
      JSON-RPC 形状区分消息，再按 method 和协商能力路由。
    en: >
      An implementation serializes one complete JSON-RPC object before sending it using the
      selected transport. stdio carries one message per newline and stdout contains no non-MCP
      content; a Streamable HTTP POST body is one request, notification, or response. The
      receiver first discriminates its JSON-RPC shape, then routes by method and negotiated capability.
    ja: >
      実装は選択したトランスポートで送る前に一つの完全なJSON-RPCオブジェクトを直列化する。stdioは
      改行ごとに一メッセージを運びstdoutに非MCP内容を出さない。Streamable HTTPのPOST本文は一つの
      リクエスト、通知、またはレスポンスである。受信側はまずJSON-RPC形状を判別し、次にmethodと
      交渉済み機能でルーティングする。
  typical_input:
    - description: A client requests the list of tools from a server that advertised tools.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 4,
          "method": "tools/list",
          "params": {}
        }
      source_claims: [mcp-message-json-rpc]
  typical_output:
    - description: The server returns the matching JSON-RPC result response.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 4,
          "result": {
            "tools": [
              {"name": "read_file", "inputSchema": {"type": "object"}}
            ]
          }
        }
      source_claims: [mcp-message-json-rpc]
  reference_implementations:
    - name: MCP transports specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/transports
      description: Requires UTF-8 JSON-RPC messages and defines how standard transports carry them.
    - name: JSON-RPC 2.0 specification
      url: https://www.jsonrpc.org/specification
      description: Defines request response and notification object shapes.
structure:
  identity_keys: []
  fields:
    - id: jsonrpc
      labels: {zh: "JSON-RPC 版本", en: "JSON-RPC version", ja: "JSON-RPC バージョン"}
      definitions:
        zh: "MCP 消息包络中的原生 jsonrpc 成员；其值必须为 \"2.0\"。"
        en: "The native jsonrpc member of the MCP message envelope; it must be \"2.0\"."
        ja: "MCP メッセージエンベロープのネイティブな jsonrpc メンバーで、値は \"2.0\" でなければならない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2.0"
      allowed_values: ["2.0"]
      source_claims: [mcp-message-json-rpc]
    - id: id
      labels: {zh: "JSON-RPC 标识", en: "JSON-RPC id", ja: "JSON-RPC id"}
      definitions:
        zh: "请求与其响应关联使用的原生 id 成员；通知没有该成员，解析失败的错误响应可以为 null。"
        en: "The native id member correlates a request and response; notifications omit it and a parse-error response may use null."
        ja: "要求と応答を関連付けるネイティブな id メンバー。通知では省略され、解析エラー応答では null になり得る。"
      datatype: string-or-number-or-null
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 4
      allowed_values: []
      source_claims: [json-rpc-message-shapes]
    - id: method
      labels: {zh: "方法", en: "Method", ja: "メソッド"}
      definitions:
        zh: "请求或通知中的原生 method 成员；响应不携带 method。"
        en: "The native method member on a request or notification; a response does not carry method."
        ja: "要求または通知のネイティブな method メンバー。応答には method はない。"
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: "tools/list"
      allowed_values: []
      source_claims: [json-rpc-message-shapes]
    - id: params
      labels: {zh: "参数", en: "Parameters", ja: "パラメーター"}
      definitions:
        zh: "由方法定义的可选原生 params 对象。"
        en: "The optional native params object defined by the method."
        ja: "メソッドが定義する任意のネイティブな params オブジェクト。"
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {"cursor":"page-2"}
      allowed_values: []
      source_claims: [json-rpc-message-shapes]
    - id: result
      labels: {zh: "成功结果", en: "Success result", ja: "成功結果"}
      definitions:
        zh: "成功响应中的原生 result 成员；它与 error 互斥。"
        en: "The native result member in a successful response; it is mutually exclusive with error."
        ja: "成功応答のネイティブな result メンバー。error とは排他的である。"
      datatype: json
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {"tools":[]}
      allowed_values: []
      source_claims: [json-rpc-message-shapes]
    - id: error
      labels: {zh: "错误对象", en: "Error object", ja: "エラーオブジェクト"}
      definitions:
        zh: "失败响应中的原生 error 对象，含 code、message 和可选 data。"
        en: "The native error object in a failed response, with code, message, and optional data."
        ja: "失敗応答のネイティブな error オブジェクト。code、message、および任意の data を含む。"
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {"code":-32600,"message":"Invalid Request"}
      allowed_values: []
      source_claims: [json-rpc-message-shapes]
  constraints:
    - id: mcp-message-json-rpc-version
      severity: error
      expression_language: plain
      expression: Every MCP message is a UTF-8 encoded JSON-RPC 2.0 object.
      explanation:
        zh: 每条 MCP 消息都是 UTF-8 编码的 JSON-RPC 2.0 对象。
        en: Every MCP message is a UTF-8 encoded JSON-RPC 2.0 object.
        ja: すべてのMCPメッセージはUTF-8符号化されたJSON-RPC 2.0オブジェクトである。
      source_claims: [mcp-message-json-rpc]
    - id: mcp-message-notification-has-no-id
      severity: error
      expression_language: plain
      expression: A JSON-RPC notification has a method and no correlation id.
      explanation:
        zh: JSON-RPC 通知具有 method，但没有关联 id。
        en: A JSON-RPC notification has a method and no correlation id.
        ja: JSON-RPC通知はmethodを持つが相関idを持たない。
      source_claims: [json-rpc-message-shapes]
  required_relations: []
examples:
  - id: mcp-message-positive-tools-list-request

    labels: {zh: 工具列表请求消息, en: Tool list request message, ja: toolリストリクエストメッセージ}

    descriptions:
      zh: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。
      en: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths.
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"jsonrpc":"2.0","id":4,"method":"tools/list"}
    related_node_ids: [MCPMessage, MCPRequest]
    related_relation_ids: [MCPMessage-part_of-MCPSession]

    source_claims: [mcp-message-json-rpc, json-rpc-message-shapes]
  - id: mcp-message-counterexample-stdout-log

    labels: {zh: stdout 上的非 MCP 日志行, en: Non-MCP log line on stdout, ja: stdout上の非MCPログ行}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"method":"tools/list"}
    related_node_ids: [MCPMessage, MCPStdioTransport]
    related_relation_ids: [MCPMessage-part_of-MCPSession]

    source_claims: [mcp-message-stdio-framing]
  - id: mcp-message-boundary-http-envelope

    labels: {zh: HTTP 请求与 MCP 消息的边界, en: Boundary between HTTP request and MCP message, ja: HTTPリクエストとMCPメッセージの境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"jsonrpc":"2.0","id":4,"method":"tools/list"}
    related_node_ids: [MCPMessage, MCPStreamableHTTPTransport]
    related_relation_ids: [MCPMessage-part_of-MCPSession]

    source_claims: [mcp-message-json-rpc]
  - id: mcp-message-instance-tools-list

    labels: {zh: tools/list 请求实例, en: tools/list request instance, ja: tools/listリクエストインスタンス}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"jsonrpc":"2.0","id":4,"method":"tools/list"}
    related_node_ids: [MCPMessage, MCPRequest]
    related_relation_ids: [MCPMessage-part_of-MCPSession]

    source_claims: [mcp-message-json-rpc]
parent_relation:
  id: MCPMessage-part_of-MCPSession
  predicate: part_of
  target: concept:MCPSession
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是会话中的消息, en: is a message of the session, ja: セッションのメッセージである}
  definition:
    zh: MCP 消息在特定的客户端与服务器有状态会话中交换。
    en: An MCP message is exchanged within one stateful client-server session.
    ja: MCPメッセージは一つの状態を持つクライアント・サーバーセッション内で交換される。
  cardinality:
    source: {min: 1, max: 1}
    target: {min: 1, max: null}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_message
    labels: {zh: 具有消息, en: has message, ja: メッセージを持つ}
  conditions: []
  temporal_scope: session
  boundary_context: 同一 JSON-RPC 消息不应在不同 MCP 会话中复用为同一实例。
  constraints:
    - id: message-session-membership
      severity: error
      expression_language: plain
      expression: A message instance belongs to the one stateful MCP session in which it is exchanged.
      explanation:
        zh: 消息实例属于交换它的那一个有状态 MCP 会话。
        en: A message instance belongs to the one stateful MCP session in which it is exchanged.
        ja: メッセージインスタンスは、それが交換される一つの状態を持つMCPセッションに属する。
      source_claims: [mcp-message-json-rpc]
  examples: []
  source_claims: [moonweave-mcp-message-session-composition]
  distinct_fact_rationale:
    zh: 该关系表达会话成员资格，不把消息与承载它的 stdio 或 HTTP 传输混为一谈。
    en: The relation expresses session membership without conflating a message with the stdio or HTTP transport that carries it.
    ja: この関係はセッション所属を表し、メッセージを運ぶstdioまたはHTTPトランスポートと混同しない。
relations: []
sources:
  - id: mcp-transports-2025-11-25
    title: Model Context Protocol Specification — Transports
    url: https://modelcontextprotocol.io/specification/2025-11-25/basic/transports
    source_type: official-specification
    locator: "Transports; stdio; Streamable HTTP"
    relevance: Defines UTF-8 JSON-RPC messages and the standard transport framing rules.
  - id: json-rpc-2-0
    title: JSON-RPC 2.0 Specification
    url: https://www.jsonrpc.org/specification
    source_type: official-specification
    locator: "Request object; Response object; Notification"
    relevance: Defines request response and notification envelope shapes.
source_claims:
  - id: mcp-message-json-rpc
    source: mcp-transports-2025-11-25
    supports: MCP messages are UTF-8 encoded JSON-RPC objects carried by standard transports.
    locator: "Transports"
    evidence_kind: normative
    confidence: high
  - id: moonweave-mcp-message-session-composition
    source: mcp-transports-2025-11-25
    supports: "Moonweave treats a message exchanged over an established connection as a part of MCPSession for schema navigation; this composition edge is a taxonomy design inference."
    locator: "Transport Message Format"
    evidence_kind: design-inference
    confidence: high
  - id: mcp-message-stdio-framing
    source: mcp-transports-2025-11-25
    supports: stdio messages are newline delimited and stdout contains only valid MCP messages while stderr may contain logging.
    locator: "stdio"
    evidence_kind: normative
    confidence: high
  - id: json-rpc-message-shapes
    source: json-rpc-2-0
    supports: JSON-RPC defines distinct request response and notification object shapes including notification omission of id.
    locator: "Request object; Response object; Notification"
    evidence_kind: normative
    confidence: high
