      zh: MCPMessage-received_by-MCPParticipant 只在其方法、方向、载荷或类型条件成立时记录；它不等于端点共现、反向捷径或词形相似。
      en: MCPMessage-received_by-MCPParticipant records only the reviewed method, direction, payload, or subtype condition; it is not endpoint co-occurrence, a redundant inverse shortcut, or lexical similarity.
