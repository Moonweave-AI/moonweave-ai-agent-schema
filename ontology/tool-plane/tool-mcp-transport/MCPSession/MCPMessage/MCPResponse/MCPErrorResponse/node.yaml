schema: moonweave.ai/ontology-node/v1
id: MCPErrorResponse
kind: concept
labels:
  zh: MCP JSON-RPC 错误响应
  en: MCP JSON-RPC error response
  ja: MCP JSON-RPC errorレスポンス
semantics:
  short_definition:
    zh: 含有 code 和 message 的 error、没有 result 的 MCP JSON-RPC 响应。
    en: An MCP JSON-RPC response that contains error with code and message and no result.
    ja: codeとmessageを持つerrorを含みresultを含まないMCP JSON-RPCレスポンス。
  definition:
    zh: >
      MCP JSON-RPC 错误响应是一个 JSON-RPC 2.0 response object，其中 `error` 包含整数 code、字符串
      message 和可选 data，而 `result` 不存在。对于可识别的请求，它使用相同 id；若在检测 id 前发生
      无法恢复的协议错误，JSON-RPC 允许 id 为 null。错误响应表示协议或方法处理失败，而不应泄露服务端
      敏感实现细节。
    en: >
      An MCP JSON-RPC error response is a JSON-RPC 2.0 response object whose `error` contains
      an integer code, string message, and optional data while `result` is absent. For an
      identifiable request it uses the same id; if an unrecoverable protocol error occurs before
      id is detected, JSON-RPC permits id null. An error response represents protocol or method
      processing failure and should not expose sensitive server implementation detail.
    ja: >
      MCP JSON-RPC errorレスポンスは、`error` に整数code、文字列message、任意dataを含み `result` が
      存在しないJSON-RPC 2.0 response objectである。識別可能なリクエストには同じidを使う。id検出前に
      回復不能なプロトコルerrorが起きた場合、JSON-RPCはid nullを許す。errorレスポンスはプロトコルまたは
      method処理失敗を表し、機密サーバー実装詳細を露出すべきではない。
  why_needed:
    zh: >
      结构化错误让调用方可以区分无效参数、未找到对象、版本不兼容和内部失败，并将一个失败关联到正确的
      pending request。它避免用 transport 断开、自由文本日志或伪成功 payload 表示错误。
    en: >
      Structured errors let callers distinguish invalid parameters, missing objects, version
      incompatibility, and internal failure while associating one failure with the correct
      pending request. They avoid using transport disconnection, free-text logs, or a fake
      success payload to communicate error.
    ja: >
      構造化errorにより、呼び出し側は無効パラメーター、欠落オブジェクト、バージョン非互換、内部失敗を
      区別し、一つの失敗を正しい保留リクエストに対応付けられる。トランスポート切断、自由形式ログ、
      偽の成功payloadでerrorを伝えることを避ける。
  includes:
    - zh: 一个 JSON-RPC error object，具有整数 code 和字符串 message。
      en: One JSON-RPC error object with integer code and string message.
      ja: 整数codeと文字列messageを持つ一つのJSON-RPC error object。
    - zh: 可选的 error data，用于安全的附加诊断。
      en: Optional error data for safe additional diagnostics.
      ja: 安全な追加診断のための任意error data。
    - zh: 对识别请求的相同 JSON-RPC id 或协议错误时的 null id。
      en: The same JSON-RPC id for an identifiable request or null id for a protocol error.
      ja: 識別可能なリクエストの同じJSON-RPC id、またはプロトコルerrorのnull id。
  excludes:
    - zh: 与 error 共存的 result 成员。
      en: A result member coexisting with error.
      ja: errorと共存するresultメンバー。
    - zh: 表示工具层失败的 ToolResult.isError；它仍可位于 JSON-RPC result 内。
      en: ToolResult.isError indicating tool-level failure; it may still occur inside JSON-RPC result.
      ja: tool層失敗を示すToolResult.isError。これはJSON-RPC result内にあり得る。
  semantic_kind: information
  aliases:
    - language: en
      value: JSON-RPC error object response
      alias_kind: synonym
engineering:
  explanation:
    zh: >
      服务器应映射验证和方法失败到标准 JSON-RPC error，例如 prompts/get 缺少参数时的 -32602、
      resources/read 未找到资源时的 -32002、或内部错误 -32603。它保留请求 id、给用户安全的 message，
      仅在 data 中附加允许公开的诊断。客户端按 id 结束 pending request 并按 code、message 和可信 data
      执行恢复，而不是将 HTTP/SSE 断开解释为确定错误。
    en: >
      A server maps validation and method failure to standard JSON-RPC error, such as -32602 for
      missing prompts/get params, -32002 for resource not found in resources/read, or -32603 for
      internal error. It keeps request id, provides a user-safe message, and attaches only
      permitted diagnostics in data. The client ends the pending request by id and recovers using
      code, message, and trusted data instead of treating HTTP or SSE close as a definite error.
    ja: >
      サーバーは検証・method失敗を標準JSON-RPC errorへマッピングする。例としてprompts/getのparams不足は
      -32602、resources/readのresource not foundは-32002、内部errorは-32603である。request idを保持し、
      ユーザー安全なmessageを出し、公開許可済み診断だけをdataに添える。クライアントはidで保留リクエストを
      終了し、HTTPまたはSSEの切断を確定errorとせずcode、message、信頼できるdataで復旧する。
  typical_input:
    - description: A resources/read request for a URI the server cannot resolve.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 5,
          "method": "resources/read",
          "params": {"uri": "file:///nonexistent.txt"}
        }
      source_claims: [mcp-error-response-resource-not-found]
  typical_output:
    - description: Same-id resource-not-found error response.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 5,
          "error": {
            "code": -32002,
            "message": "Resource not found",
            "data": {"uri": "file:///nonexistent.txt"}
          }
        }
      source_claims: [mcp-error-response-resource-not-found]
  reference_implementations:
    - name: JSON-RPC 2.0 specification
      url: https://www.jsonrpc.org/specification
      description: Defines Error object, response id behavior, and mutually exclusive result/error.
    - name: MCP resources specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
      description: Specifies resources/read resource-not-found error example.
structure:
  identity_keys: ["id"]
  fields:
    - id: jsonrpc
      labels: {zh: "JSON-RPC 版本", en: "JSON-RPC version", ja: "JSON-RPC バージョン"}
      definitions:
        zh: "MCP 响应包络中的原生 jsonrpc 成员，值必须为 \"2.0\"。"
        en: "The native jsonrpc member of the MCP response envelope; it must be \"2.0\"."
        ja: "MCP 応答エンベロープのネイティブな jsonrpc メンバーで、値は \"2.0\" でなければならない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2.0"
      allowed_values: ["2.0"]
      source_claims: [mcp-error-response-json-rpc]
    - id: id
      labels: {zh: "JSON-RPC 标识", en: "JSON-RPC id", ja: "JSON-RPC id"}
      definitions:
        zh: "与所响应请求相同的原生 JSON-RPC id。"
        en: "The native JSON-RPC id equal to the request being answered."
        ja: "応答対象の要求と同じネイティブな JSON-RPC id。"
      datatype: string-or-number-or-null
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 5
      allowed_values: []
      source_claims: [mcp-error-response-json-rpc]
    - id: error
      labels: {zh: "错误对象", en: "Error object", ja: "エラーオブジェクト"}
      definitions:
        zh: "原生 error 对象必须有整数 code、字符串 message 和可选 data；错误响应没有 result。"
        en: "The native error object has required integer code and string message and optional data; an error response has no result."
        ja: "ネイティブな error オブジェクトは整数の code と文字列の message を必須とし、任意の data を持つ。エラー応答には result がない。"
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: {"code":-32002,"message":"Resource not found","data":{"uri":"file:///nonexistent.txt"}}
      allowed_values: []
      source_claims: [mcp-error-response-json-rpc]
  constraints:
    - id: error-response-omits-result
      severity: error
      expression_language: plain
      expression: An error response contains error and omits result.
      explanation:
        zh: 错误响应包含 error 并省略 result。
        en: An error response contains error and omits result.
        ja: errorレスポンスはerrorを含みresultを省略する。
      source_claims: [mcp-error-response-json-rpc]
    - id: error-response-safe-message
      severity: warning
      expression_language: plain
      expression: Error message and data expose only diagnostics that the server is permitted to disclose to the client.
      explanation:
        zh: error message 和 data 只暴露服务器允许向客户端披露的诊断信息。
        en: Error message and data expose only diagnostics that the server is permitted to disclose to the client.
        ja: error messageとdataはサーバーがクライアントへ開示を許可する診断だけを露出する。
      source_claims: [mcp-error-response-json-rpc]
  required_relations: []
examples:
  - id: mcp-error-response-positive-resource-not-found

    labels: {zh: 资源未找到错误响应, en: Resource-not-found error response, ja: resource-not-found errorレスポンス}

    descriptions:
      zh: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。"
      en: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths."
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"jsonrpc":"2.0","id":5,"error":{"code":-32002,"message":"Resource not found","data":{"uri":"file:///nonexistent.txt"}}}
    related_node_ids: [MCPErrorResponse, MCPResponse]
    related_relation_ids: [MCPErrorResponse-is_a-MCPResponse]

    source_claims: [mcp-error-response-resource-not-found, mcp-error-response-json-rpc]
  - id: mcp-error-response-counterexample-result-and-error

    labels: {zh: 误带 result 的错误响应, en: Error response incorrectly carrying result, ja: resultを誤って持つerrorレスポンス}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"jsonrpc":"2.0","id":5,"result":{},"error":{"code":-32002,"message":"Resource not found"}}
    related_node_ids: [MCPErrorResponse, MCPResultResponse]
    related_relation_ids: [MCPErrorResponse-is_a-MCPResponse]

    source_claims: [mcp-error-response-json-rpc]
  - id: mcp-error-response-boundary-tool-is-error

    labels: {zh: JSON-RPC error 与 ToolResult.isError 的边界, en: Boundary between JSON-RPC error and ToolResult.isError, ja: JSON-RPC errorとToolResult.isErrorの境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"jsonrpc":"2.0","id":2}
    related_node_ids: [MCPErrorResponse, MCPResultResponse]
    related_relation_ids: [MCPErrorResponse-is_a-MCPResponse]

    source_claims: [mcp-error-response-json-rpc]
  - id: mcp-error-response-instance-not-found-5

    labels: {zh: id 5 未找到响应实例, en: id 5 not-found response instance, ja: id 5 not-foundレスポンスインスタンス}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"jsonrpc":"2.0","id":5,"error":{"code":-32002,"message":"Resource not found","data":{"uri":"file:///nonexistent.txt"}}}
    related_node_ids: [MCPErrorResponse, MCPResponse]
    related_relation_ids: [MCPErrorResponse-is_a-MCPResponse]

    source_claims: [mcp-error-response-resource-not-found, mcp-error-response-json-rpc]
parent_relation:
  id: MCPErrorResponse-is_a-MCPResponse
  predicate: is_a
  target: concept:MCPResponse
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是 JSON-RPC 错误响应, en: is a JSON-RPC error response, ja: JSON-RPC errorレスポンスである}
  definition:
    zh: MCPErrorResponse 是有 error、没有 result 的 MCPResponse。
    en: An MCPErrorResponse is an MCPResponse with error and no result.
    ja: MCPErrorResponseはerrorを持ちresultを持たないMCPResponseである。
  cardinality:
    source: {min: 0, max: null}
    target: {min: 1, max: 1}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_error_response
    labels: {zh: 具有错误响应, en: has error response, ja: errorレスポンスを持つ}
  conditions: []
  temporal_scope: session
  boundary_context: 不包括 JSON-RPC result 中的应用层错误，也不把日志或连接关闭当成 error response。
  constraints:
    - id: error-response-discriminator
      severity: error
      expression_language: plain
      expression: An MCPErrorResponse has error and no result member.
      explanation:
        zh: MCPErrorResponse 有 error 且没有 result 成员。
        en: An MCPErrorResponse has error and no result member.
        ja: MCPErrorResponseはerrorを持ちresultメンバーを持たない。
      source_claims: [mcp-error-response-json-rpc]
  examples: []
  source_claims: [moonweave-mcp-error-response-taxonomy]
  distinct_fact_rationale:
    zh: 此子类由 JSON-RPC error 成员区分，而非工具层或业务层失败状态。
    en: This subtype is distinguished by the JSON-RPC error member, not tool-level or business-level failure state.
    ja: この下位型はtool層またはビジネス層失敗状態ではなくJSON-RPC errorメンバーで区別される。
relations: []
