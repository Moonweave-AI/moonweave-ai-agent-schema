schema: moonweave.ai/ontology-node/v1
id: MCPErrorResponse
kind: concept
status: review
labels:
  zh: MCP 错误响应
  en: MCP error response
  ja: MCP エラー応答
semantics:
  short_definition:
    zh: 以请求 id 返回 error.code 与 error.message 的 MCP 响应。
    en: An MCP response carrying error.code and error.message under the request ID.
    ja: request ID で error.code と error.message を返す MCP response。
  definition:
    zh: MCP 错误响应是 MCPResponse 的严格下位类型，继承 MCPResponse 的 message_record_id 作为线路响应记录身份。继承的 request_id 仅用于关联原请求：能读取时必须回显，只有畸形请求导致 id 无法解析时才可缺省；error_code、error_message 与 response_member=error 构成种差且不得出现 result。它不是通用 ToolError。
    en: "An MCP error response is a strict MCPResponse subtype and inherits the message_record_id wire-response identity from MCPResponse. The inherited request_id only correlates the original request: it must be repeated when readable and may be absent only when a malformed request prevents parsing the id. error_code, error_message, and response_member=error supply the differentia, result is absent, and this record is not a generic ToolError."
    ja: MCP error response は MCPResponse の厳密な下位型で、MCPResponse から wire response record の identity である message_record_id を継承します。継承した request_id は元 request の相関だけに使い、読取可能なら同値を返し malformed request で解析不能な時だけ省略できます。error_code・error_message・response_member=error が種差で result は持たず、generic ToolError ではありません。
  why_needed:
    zh: 协议错误子型使版本不匹配、无效参数和方法错误保持 JSON-RPC 关联，不与工具执行诊断混合。
    en: The protocol-error subtype preserves JSON-RPC correlation for version, parameter, and method failures without mixing them with tool-execution diagnostics.
    ja: protocol-error subtype は version/parameter/method failure の JSON-RPC correlation を保持し tool-execution diagnostic と混合しません。
  includes:
    - zh: 纳入合法 JSON-RPC error 响应及畸形请求无法读取 id 的受限例外。
      en: Includes valid JSON-RPC error responses and the limited malformed-request case where the ID cannot be read.
      ja: valid JSON-RPC error response と malformed request で ID を読めない限定例を含みます。
  excludes:
    - zh: 排除 ToolResult.isError、HTTP 4xx/5xx 本身和 stderr 文本。
      en: Excludes ToolResult.isError, HTTP 4xx or 5xx status alone, and stderr text.
      ja: ToolResult.isError・HTTP 4xx/5xx status 単独・stderr text を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: error_code
      labels:
        zh: 错误代码
        en: error code
        ja: エラーコード
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 JSON-RPC 或 MCP 定义的整数错误代码。
        en: Records the integer JSON-RPC or MCP-defined error code.
        ja: JSON-RPC/MCP 定義 integer error code を記録します。
      allowed_values: []
      pattern: null
      example_value: -32602
      source_claims:
        - claim-mcp-error-response-001
    - id: error_message
      labels:
        zh: 错误说明
        en: error message
        ja: error message
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 映射 JSON-RPC error.message 的简明可读说明；它与整数 error_code 同属 error 对象，不是 stderr 或工具结果正文。
        en: Maps the concise human-readable JSON-RPC error.message; it belongs to the error object with integer error_code and is neither stderr nor tool-result text.
        ja: integer error_code と同じ error object に属する簡潔な JSON-RPC error.message を表し、stderr や tool-result text ではありません。
      allowed_values: []
      pattern: null
      example_value: Unsupported protocol version
      source_claims:
        - claim-mcp-error-response-002
  constraints:
    - id: mcp-error-response-correlation-and-member
      severity: error
      expression_language: plain
      expression: response_member MUST equal error and result MUST be absent; inherited request_id MUST equal the failed MCPRequest.request_id whenever that ID was readable, and MAY be absent only when the request ID could not be parsed.
      explanations:
        zh: 错误响应必须标记 response_member=error 且不带 result；能读取原请求 id 时，继承的 request_id 必须回显该关联值，只有无法解析时才可缺省。
        en: An error response sets response_member to error and omits result; inherited request_id repeats the failed request correlation whenever readable and is absent only when the ID could not be parsed.
        ja: error response は response_member=error として result を持たず、継承 request_id は読取可能な failed request の相関値を反映し、解析不能時だけ省略できます。
      source_claims:
        - claim-mcp-error-response-003
  required_relation_constraints: []
examples:
  - id: MCPErrorResponse-example-positive-001
    kind: positive
    labels:
      zh: MCP 错误响应正例
      en: Positive MCP error response case
      ja: MCP エラー応答の正例
    scenario_id: null
    descriptions:
      zh: initialize id=7 使用不兼容版本，服务器返回 id=7、code=-32602 与说明。
      en: Initialize id=7 uses an unsupported version and the server returns id=7, code -32602, and a message.
      ja: initialize id=7 が unsupported version を使い server が同 id・code -32602・message を返します。
    field_values:
      message_record_id: mcp-message:initialize-error:7
      session_id: mcp-session-initialize-7
      jsonrpc: "2.0"
      message_kind: error-response
      response_member: error
      request_id: 7
      error_code: -32602
      error_message: Unsupported protocol version
    related_node_ids:
      - MCPErrorResponse
    related_relation_ids: []
    expected_result:
      zh: 归为 MCPErrorResponse 并关联请求 7。
      en: Classify MCPErrorResponse and correlate it with request 7.
      ja: MCPErrorResponse として request 7 に対応させます。
    why_valid_or_invalid:
      zh: 错误结构、整数代码与可读请求 id 均合法。
      en: The error object, integer code, and readable request ID are valid.
      ja: error object・integer code・readable request ID が valid です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-error-response-001
  - id: MCPErrorResponse-example-boundary-001
    kind: boundary
    labels:
      zh: MCP 错误响应边界例
      en: Boundary MCP error response case
      ja: MCP エラー応答の境界例
    scenario_id: null
    descriptions:
      zh: tools/call 正常返回 result，但 result.isError=true。
      en: tools/call returns a normal result whose isError field is true.
      ja: tools/call が result を返し result.isError=true です。
    field_values: {}
    related_node_ids:
      - MCPErrorResponse
    related_relation_ids: []
    expected_result:
      zh: 不得归为 MCPErrorResponse。
      en: Do not classify MCPErrorResponse.
      ja: MCPErrorResponse に分類しません。
    why_valid_or_invalid:
      zh: 协议响应位于 result 分支；工具业务失败属于内层结果语义。
      en: The protocol response uses the result branch; tool failure is inner result semantics.
      ja: protocol response は result branch で tool failure は inner result semantics です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-error-response-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: MCPResultResponse
    shared_parent_concept_id: MCPResponse
    differentia:
      zh: MCPErrorResponse 与 MCPResultResponse 同属 MCPResponse；MCPResultResponse 只带 result 并表示 JSON-RPC 成功；MCPErrorResponse 只带 error 且必须包含错误 code 与 message。
      en: MCPErrorResponse and MCPResultResponse share MCPResponse; MCPResultResponse carries only result and records JSON-RPC success, whereas MCPErrorResponse carries only error with a required code and message.
      ja: MCPErrorResponse と MCPResultResponse は MCPResponse を共有し、MCPResultResponse は result のみで JSON-RPC success、MCPErrorResponse は required code/message を持つ error のみです。
    source_claims:
      - claim-mcp-error-response-004
parent_relation:
  id: MCPErrorResponse-is_a-MCPResponse
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: MCPErrorResponse是一种MCPResponse
    en: MCPErrorResponse is a MCPResponse
    ja: MCPErrorResponseがMCPResponseを一種である
  definitions:
    zh: MCPErrorResponse 是 MCPResponse 的严格子型；其必要身份差异是：MCP 错误响应是一种 MCP 响应（MCPResponse），包含 `error.code` 整数、`error.message` 字符串及可选 data，而不含 result；能读取请求 id 时必须回显同一 id，无法解析 id 的畸形请求才允许缺省。它不是通用 ToolError。
    en: "MCPErrorResponse is a strict subtype of MCPResponse; its necessary identity differentia is: An MCP error response is an MCPResponse with integer error.code, string error.message, optional data, and no result. It repeats the request ID whenever readable and may omit it only when a malformed request prevents correlation. It is not a generic ToolError."
    ja: MCPErrorResponse は MCPResponse の strict subtype であり、必要な identity differentia は次の通りです：MCP error response は MCPResponse の一種で integer error.code・string error.message・任意 data を持ち result を持ちません。request id を読める時は同 id、malformed request で読めない時のみ省略でき、generic ToolError ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
    en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
    ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: MCPResponse反向关联MCPErrorResponse
      en: MCPResponse is the inverse target of MCPErrorResponse
      ja: MCPResponseからMCPErrorResponseへの逆読解
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MCPErrorResponse-is_a-MCPResponse-example-positive-001
      kind: positive
      labels:
        zh: MCPErrorResponse-is_a-MCPResponse 正例
        en: Positive case for MCPErrorResponse-is_a-MCPResponse
        ja: MCPErrorResponse-is_a-MCPResponse の正例
      scenario_id: null
      descriptions:
        zh: initialize id=7 使用不兼容版本，服务器返回 id=7、code=-32602 与说明。
        en: Initialize id=7 uses an unsupported version and the server returns id=7, code -32602, and a message.
        ja: initialize id=7 が unsupported version を使い server が同 id・code -32602・message を返します。
      field_values: {}
      related_node_ids:
        - MCPErrorResponse
        - MCPResponse
      related_relation_ids:
        - MCPErrorResponse-is_a-MCPResponse
      expected_result:
        zh: 建立 MCPErrorResponse-is_a-MCPResponse，并保留所述协议方向与条件。
        en: Assert MCPErrorResponse-is_a-MCPResponse with the stated protocol direction and conditions.
        ja: MCPErrorResponse-is_a-MCPResponse を stated protocol direction/condition 付きで確立します。
      why_valid_or_invalid:
        zh: 仅当对象满足 MCPErrorResponse 的全部身份条件时，才能沿 is_a 归入 MCPResponse。
        en: Assert the subtype edge only when the object satisfies every identity condition of MCPErrorResponse.
        ja: object が MCPErrorResponse の全 identity condition を満たす時だけ is_a edge を確立します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-mcp-error-response-005
    - id: MCPErrorResponse-is_a-MCPResponse-example-boundary-001
      kind: boundary
      labels:
        zh: MCPErrorResponse-is_a-MCPResponse 边界例
        en: Boundary case for MCPErrorResponse-is_a-MCPResponse
        ja: MCPErrorResponse-is_a-MCPResponse の境界例
      scenario_id: null
      descriptions:
        zh: tools/call 正常返回 result，但 result.isError=true。
        en: tools/call returns a normal result whose isError field is true.
        ja: tools/call が result を返し result.isError=true です。
      field_values: {}
