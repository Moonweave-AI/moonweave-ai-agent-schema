schema: moonweave.ai/ontology-node/v1
id: MCPListRootsResult
kind: concept
labels:
  zh: MCP roots/list 结果
  en: MCP roots/list result
  ja: MCP roots/list 結果
semantics:
  short_definition:
    zh: 支持 roots capability 的客户端对服务器 `roots/list` 请求返回的、界定服务器可操作文件系统范围的成功 JSON-RPC 结果。
    en: The successful JSON-RPC result returned by a roots-capable client to a server's `roots/list` request, bounding where the server may operate in the filesystem.
    ja: server の `roots/list` 要求に roots 対応 client が返し、server が filesystem で操作できる範囲を境界付ける成功 JSON-RPC 結果。
  definition:
    zh: >
      MCP 根目录列表结果是 client feature 的 JSON-RPC result：server 向声明 roots capability 的 client 发送 roots/list，
      client 以 roots 数组回复。每个 Root 具有当前规范要求的 file:// URI 和可选人类可读 name。roots 是 client 明示暴露给 server
      的操作边界，server 应尊重它们。该结果不等于 server 的 resources/list、操作系统所有挂载点、host 的完整文件权限或授权 bearer token。
    en: >
      An MCP root-list result is a client-feature JSON-RPC result: a server sends roots/list to a client that declared roots
      capability, and the client replies with roots array. Each Root has a file:// URI required by the current specification and
      optional human-readable name. Roots are client-explicit operation boundaries that a server should respect. The result is not
      the server's resources/list, all operating-system mounts, the host's complete filesystem permissions, or an authorization bearer token.
    ja: >
      MCP ルート一覧結果は client feature の JSON-RPC result である。server が roots capability を宣言した client に roots/list を送り、
      client は roots 配列で返す。各 Root は現在仕様で必要な file:// URI と任意 human-readable name を持つ。roots は client が明示的に
      server へ公開する操作境界であり、server はそれを尊重すべきである。server の resources/list、OS の全 mount、host の完全 filesystem 権限、
      authorization bearer token ではない。
  why_needed:
    zh: 它允许 client 安全、显式地告知 server 可工作的目录或文件范围，使工具和资源操作能在用户控制的边界内运行。
    en: It lets a client safely and explicitly tell a server which directories or files it may work within so tool and resource operations stay within user-controlled boundaries.
    ja: client が server に作業可能な directory または file を安全かつ明示的に伝え、tool と resource 操作をユーザー制御境界内に保てる。
  includes:
    - {zh: roots/list 的 client-to-server 成功 result, en: Client-to-server success result for roots/list, ja: roots/list の client-to-server 成功 result}
    - {zh: file URI 和可选 root name, en: file URI and optional root name, ja: file URI と任意 root name}
    - {zh: roots.listChanged 的刷新提示, en: roots.listChanged refresh signaling, ja: roots.listChanged の更新 signal}
  excludes:
    - {zh: server 暴露的 resources 列表, en: Resource list exposed by a server, ja: server が公開する resource 一覧}
    - {zh: client 未授权或不可访问的目录, en: Directories not exposed or accessible by the client, ja: client が公開・アクセスしていない directory}
  semantic_kind: result
  aliases:
    - {language: en, value: ListRootsResult, alias_kind: protocol-type}
engineering:
  explanation:
    zh: server 先读取 client capability；若 roots 支持，则发出 roots/list。client 验证和授权 file URI 后返回 roots；如果声明 listChanged，根变化时发送 notifications/roots/list_changed，server 再请求列表并校验每个操作路径在 root 内。
    en: The server first checks client capability; if roots is supported, it sends roots/list. The client validates and authorizes file URIs before returning roots; if it declared listChanged, it sends notifications/roots/list_changed on change, after which the server requests the list again and validates each operation path against a root.
    ja: server はまず client capability を確認し、roots 対応なら roots/list を送る。client は file URI を検証・認可して roots を返す。listChanged を宣言した場合、変更時 notifications/roots/list_changed を送り、server は一覧を再要求して各操作 path を root に照らして検証する。
  typical_input:
    - description: Server asks a roots-capable client for roots.
      format: '{"jsonrpc":"2.0","id":1,"method":"roots/list"}'
      source_claims: [mcp-root-list-protocol]
  typical_output:
    - description: Client returns authorized file roots.
      format: '{"jsonrpc":"2.0","id":1,"result":{"roots":[{"uri":"file:///home/user/projects/myproject","name":"My Project"}]}}'
      source_claims: [mcp-root-list-protocol]
  reference_implementations:
    - name: MCP Roots specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/client/roots
      description: Defines roots capability, roots/list direction and result, Root fields, changes, and filesystem security boundaries.
structure:
  identity_keys: ["id"]
  fields:
    - id: jsonrpc
      labels: {zh: "JSON-RPC 版本", en: "JSON-RPC version", ja: "JSON-RPC バージョン"}
      definitions:
        zh: "该根目录结果包络中的原生 jsonrpc 成员，值必须为 \"2.0\"。"
        en: "The native jsonrpc member of this roots result envelope; it must be \"2.0\"."
        ja: "この roots 結果エンベロープのネイティブな jsonrpc メンバーで、値は \"2.0\" でなければならない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2.0"
      allowed_values: ["2.0"]
      source_claims: [mcp-root-list-protocol]
    - id: id
      labels: {zh: "JSON-RPC 标识", en: "JSON-RPC id", ja: "JSON-RPC id"}
      definitions:
        zh: "与 roots/list 请求关联的原生 JSON-RPC id。"
        en: "The native JSON-RPC id correlating the roots result to roots/list."
        ja: "roots/list と roots 結果を関連付けるネイティブな JSON-RPC id。"
      datatype: string-or-number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims: [mcp-root-list-protocol]
    - id: result
      labels: {zh: "结果对象", en: "Result object", ja: "結果オブジェクト"}
      definitions:
        zh: "从 MCPResultResponse 继承的原生 JSON-RPC result 对象；此子类型在其中放入 `roots` 数组。"
        en: "The native JSON-RPC result object inherited from MCPResultResponse; this subtype places the `roots` array inside it."
        ja: "MCPResultResponse から継承するネイティブな JSON-RPC result オブジェクト。この下位型では `roots` 配列をその中に入れる。"
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: {"roots":[{"uri":"file:///home/user/projects/myproject","name":"My Project"}]}
      allowed_values: []
      source_claims: [mcp-root-list-protocol]
    - id: roots
      labels: {zh: "根目录", en: "Roots", ja: "ルート"}
      definitions:
        zh: "原生 result.roots 数组；每项有必填 file:// URI 和可选 name。"
        en: "The native result.roots array; each entry has a required file:// URI and optional name."
        ja: "ネイティブな result.roots 配列。各項目は必須の file:// URI と任意の name を持つ。"
      datatype: array
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: [{"uri":"file:///home/user/projects/myproject","name":"My Project"}]
      allowed_values: []
      source_claims: [mcp-root-list-protocol, mcp-root-list-definition]
  constraints:
    - id: root-list-client-capability-required
      severity: error
      expression_language: plain
      expression: A server requests roots/list only from a client that declared roots capability.
      explanation:
        zh: server 仅向声明 roots capability 的 client 请求 roots/list。
        en: A server requests roots/list only from a client that declared roots capability.
        ja: server は roots capability を宣言した client にのみ roots/list を要求する。
      source_claims: [mcp-root-list-capability]
    - id: root-uri-is-file-uri
      severity: error
      expression_language: plain
      expression: Each Root URI is a file:// URI in the current MCP specification.
      explanation:
        zh: 当前 MCP 规范中每个 Root URI 都是 file:// URI。
        en: Each Root URI is a file:// URI in the current MCP specification.
        ja: 現在 MCP 仕様では各 Root URI は file:// URI である。
      source_claims: [mcp-root-list-definition]
    - id: server-respects-root-boundaries
      severity: error
      expression_language: plain
      expression: Servers validate operation paths against provided roots and respect those root boundaries.
      explanation:
        zh: server 验证操作路径属于提供的 roots，并尊重这些 root boundaries。
        en: Servers validate operation paths against provided roots and respect those root boundaries.
        ja: server は操作 path を提供 roots に照らして検証し、その root boundaries を尊重する。
      source_claims: [mcp-root-list-security]
  required_relations: []
examples:
  - id: mcp-root-list-positive-project

    labels: {zh: 返回项目根目录, en: Return project root, ja: プロジェクト root を返す}

    descriptions:
      zh: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。"
      en: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths."
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"jsonrpc":"2.0","id":1,"result":{"roots":[{"uri":"file:///home/user/projects/myproject","name":"My Project"}]},"roots":[{"uri":"file:///home/user/projects/myproject","name":"My Project"}]}
    related_node_ids: [MCPListRootsResult, MCPClient, MCPServer]
    related_relation_ids: [MCPListRootsResult-is_a-MCPResultResponse]

    source_claims: [mcp-root-list-capability, mcp-root-list-protocol, mcp-root-list-definition]
  - id: mcp-root-list-counterexample-server-resource-list

    labels: {zh: server 返回自己的资源作为 roots, en: Server returns its resources as roots, ja: server が自身 resources を roots として返す}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"jsonrpc":"2.0","id":2,"result":{"roots":[{"uri":"https://server.example/resource","name":"Resource"}]},"roots":[{"uri":"https://server.example/resource","name":"Resource"}]}
    related_node_ids: [MCPListRootsResult, MCPListResourcesResult]
    related_relation_ids: [MCPListRootsResult-is_a-MCPResultResponse]

    source_claims: [mcp-root-list-protocol, mcp-root-list-definition]
  - id: mcp-root-list-boundary-list-changed

    labels: {zh: 根列表响应与变更通知的边界, en: Boundary between root list and list-changed notification, ja: root list 応答と変更通知の境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"jsonrpc":"2.0","id":3,"result":{"roots":[]},"roots":[]}
    related_node_ids: [MCPListRootsResult, MCPNotification]
    related_relation_ids: [MCPListRootsResult-is_a-MCPResultResponse]

    source_claims: [mcp-root-list-changed]
  - id: mcp-root-list-instance-project-root

    labels: {zh: My Project 根目录实例, en: My Project root instance, ja: My Project root 実例}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"jsonrpc":"2.0","id":1,"result":{"roots":[{"uri":"file:///home/user/projects/myproject","name":"My Project"}]},"roots":[{"uri":"file:///home/user/projects/myproject","name":"My Project"}]}
    related_node_ids: [MCPListRootsResult, MCPSession, MCPClient]
    related_relation_ids: [MCPListRootsResult-is_a-MCPResultResponse]

    source_claims: [mcp-root-list-protocol, mcp-root-list-security]
