schema: moonweave.ai/ontology-node/v1
id: MCPToolList
kind: concept
status: review
labels:
  en: MCP tool list
  zh: MCP 工具列表
  ja: MCP ツール一覧
semantics:
  short_definition:
    zh: "`tools/list` 返回的一页可调用工具定义。"
    en: A page of callable tool definitions returned by `tools/list`.
    ja: "`tools/list` が返す callable tool 定義の一ページ。"
  definition:
    zh: MCP 工具列表是一种 MCP 定义列表（MCPDefinitionList），表示 `tools/list` 返回的一页 `tools` 定义与可选 `nextCursor`；成员描述名称、说明、inputSchema 等发现信息，它不是 ToolRegistry、MCPToolCallRequest、ToolCall、ToolResult 或某个单独 ToolDefinition。
    en: An MCP tool list is an MCPDefinitionList representing one tools/list page of tool definitions and optional nextCursor. Members carry discovery details such as name, description, and inputSchema; the page is not a ToolRegistry, MCPToolCallRequest, ToolCall, ToolResult, or one standalone ToolDefinition.
    ja: MCP tool list は MCPDefinitionList の一種で tools/list の一 page と任意 nextCursor です。member は name/description/inputSchema 等を持ち、ToolRegistry・MCPToolCallRequest・ToolCall・ToolResult・単一 ToolDefinition ではありません。
  why_needed:
    zh: 独立的发现页节点使服务器某次公布的工具集合可被分页、版本比较和来源审计，同时不把每个工具定义或随后调用压成同一对象。
    en: A distinct discovery-page node allows the tool set published by a server at a point in time to be paginated, compared, and provenance-audited without collapsing individual definitions or later calls into the same object.
    ja: 独立 discovery-page node により、server がある時点で公開した tool set を pagination・比較・provenance audit でき、個別定義や後続 call と同一 object に潰しません。
  includes:
    - zh: 纳入 `tools/list` 响应页、其中每个工具的发现元数据与输入模式，以及存在时的 `nextCursor`。
      en: Includes a `tools/list` response page, discovery metadata and input schema for each tool member, and `nextCursor` when present.
      ja: "`tools/list` response page、各 tool member の discovery metadata と input schema、存在する場合の `nextCursor` を含みます。"
  excludes:
    - zh: 排除服务器能力声明、应用内部 ToolRegistry、`tools/call` 请求、ToolResult 内容以及单个 ToolDefinition 本身。
      en: Excludes server capability declarations, an application's internal ToolRegistry, `tools/call` requests, ToolResult content, and an individual ToolDefinition itself.
      ja: server capability 宣言、application 内部 ToolRegistry、`tools/call` request、ToolResult content、個別 ToolDefinition 自体を除きます。
  semantic_kind: collection
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: tools
      labels:
        zh: 工具定义成员
        en: tool definition members
        ja: tool 定義 member
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对应 ListToolsResult.tools 的数组；每个成员至少含 name 与有效 inputSchema，并可带 title、description、icons、outputSchema、annotations 和 execution。
        en: Maps to the ListToolsResult.tools array; each member has at least a name and valid inputSchema and may carry title, description, icons, outputSchema, annotations, and execution.
        ja: ListToolsResult.tools array に対応し、各 member は少なくとも name と valid inputSchema を持ち、title・description・icons・outputSchema・annotations・execution を任意に保持します。
      allowed_values: []
      pattern: null
      example_value:
        - name: read_file
          inputSchema:
            type: object
      source_claims:
        - claim-mcp-tool-list-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: mcp-tool-list-positive-repository-tools
    kind: positive
    labels:
      zh: 仓库工具发现页
      en: Repository-tool discovery page
      ja: repository tool discovery page
    scenario_id: null
    descriptions:
      zh: "代码服务器响应 `tools/list`，返回 `search_code` 和 `read_file` 两项定义，各有 JSON Schema 输入，并带 `nextCursor: \"tool-page-2\"`；整个响应页是 MCPToolList。"
      en: "A code server answers `tools/list` with `search_code` and `read_file`, each carrying a JSON Schema input, plus `nextCursor: \"tool-page-2\"`; the complete response page is MCPToolList."
      ja: "code server が `tools/list` に `search_code` と `read_file` を返し、それぞれ JSON Schema input と `nextCursor: \"tool-page-2\"` を持たせます。response page 全体が MCPToolList です。"
    field_values:
      session_id: mcp-session-repository-tools-4
      request_id: 41
      list_method: tools/list
      member_count: 2
      tools:
        - name: search_code
          description: Search repository text.
          inputSchema:
            type: object
            properties:
              query:
                type: string
            required:
              - query
        - name: read_file
          description: Read one repository file.
          inputSchema:
            type: object
            properties:
              path:
                type: string
            required:
              - path
      next_cursor: tool-page-2
    related_node_ids:
      - MCPToolList
      - MCPDefinitionList
      - ToolDefinition
    related_relation_ids:
      - MCPToolList-is_a-MCPDefinitionList
      - MCPToolList-lists-ToolDefinition
    expected_result:
      zh: 记录一个列表页，并使其中两个工具定义保持独立成员身份。
      en: One list page is recorded while both tool definitions retain independent member identities.
      ja: 一つの list page を記録し、二 tool definition は独立 member identity を保ちます。
    why_valid_or_invalid:
      zh: 结果来自专门的列表方法，成员是可发现定义而不是执行结果。
      en: The result comes from the dedicated listing method and its members are discoverable definitions rather than execution results.
      ja: 専用 listing method の result で、member は実行 result ではなく discoverable definition です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-tool-list-003
  - id: mcp-tool-list-boundary-call-result
    kind: boundary
    labels:
      zh: 工具调用结果不是工具列表
      en: Tool-call result is not a tool list
      ja: tool-call result は tool list ではない
    scenario_id: null
    descriptions:
      zh: "客户端以 `tools/call` 执行 `read_file`，服务器返回文本内容和 `isError: false`；该对象是调用结果，不能因包含工具名称而归入 MCPToolList。"
      en: "A client invokes `read_file` with `tools/call` and receives text content with `isError: false`; the object is a call result and does not become MCPToolList merely because it names a tool."
      ja: "client が `tools/call` で `read_file` を実行し、server が text content と `isError: false` を返します。この object は call result で、tool name を含むだけでは MCPToolList になりません。"
    field_values:
      method: tools/call
      tool_name: read_file
      result_isError: false
    related_node_ids:
      - MCPToolList
      - ToolResult
    related_relation_ids: []
    expected_result:
      zh: 保留为工具执行结果，不创建发现列表。
      en: It remains a tool execution result and no discovery list is created.
      ja: tool execution result として保持し、discovery list は作成しません。
    why_valid_or_invalid:
      zh: 调用方法、结果内容和单次执行身份均不同于 `tools/list` 的定义集合。
      en: The call method, result content, and one-execution identity all differ from the definition collection returned by `tools/list`.
      ja: call method、result content、単一 execution identity が `tools/list` の定義集合とすべて異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-tool-list-003
external_mappings: []
applicability:
  - core
