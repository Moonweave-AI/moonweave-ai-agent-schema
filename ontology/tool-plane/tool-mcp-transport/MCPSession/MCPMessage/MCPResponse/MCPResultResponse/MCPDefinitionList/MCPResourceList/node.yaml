schema: moonweave.ai/ontology-node/v1
id: MCPResourceList
kind: concept
status: review
labels:
  en: MCP resource list
  zh: MCP 资源列表
  ja: MCP リソース一覧
semantics:
  short_definition:
    zh: "`resources/list` 返回的一页具体资源定义。"
    en: A page of concrete resource definitions returned by `resources/list`.
    ja: "`resources/list` が返す具体 resource 定義の一ページ。"
  definition:
    zh: MCP 资源列表是一种 MCP 定义列表（MCPDefinitionList），表示 `resources/list` 返回的一页具体 `resources` URI 定义与可选 `nextCursor`；它不包含未绑定的 URI Template，也不是 `resources/read` 返回的文本或二进制内容。
    en: An MCP resource list is an MCPDefinitionList representing one resources/list page of concrete resource URI definitions and optional nextCursor. It contains neither unbound URI templates nor text or binary contents returned by resources/read.
    ja: MCP resource list は MCPDefinitionList の一種で resources/list が返す concrete resource URI definition の一 page と任意 nextCursor です。unbound URI Template や resources/read の text/binary content を含みません。
  why_needed:
    zh: 把“可发现的具体资源目录”与动态模板及资源内容分开，才能正确连接发现、读取和订阅三个阶段。
    en: Separating the discoverable directory of concrete resources from dynamic templates and resource content allows discovery, reading, and subscription to connect without collapsing their stages.
    ja: 発見可能な具体 resource directory を動的 template と resource content から分け、discovery・read・subscription の三段階を混同せず接続するために必要です。
  includes:
    - zh: 纳入 `resources/list` 响应页、其中具有具体 URI 的资源元数据条目，以及用于继续分页的 `nextCursor`。
      en: Includes a `resources/list` response page, its resource metadata entries with concrete URIs, and the `nextCursor` used to continue pagination.
      ja: "`resources/list` response page、具体 URI を持つ resource metadata entry、pagination 継続用 `nextCursor` を含みます。"
  excludes:
    - zh: 排除 `resources/templates/list` 的 `uriTemplate` 条目、`resources/read` 的 `contents`，以及仅说明服务器支持 resources 的 capability 声明。
      en: Excludes `uriTemplate` entries from `resources/templates/list`, `contents` from `resources/read`, and a capability declaration that merely says the server supports resources.
      ja: "`resources/templates/list` の `uriTemplate` entry、`resources/read` の `contents`、server が resources を支持するとだけ示す capability 宣言を除きます。"
  semantic_kind: collection
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: resources
      labels:
        zh: 具体资源成员
        en: concrete resource members
        ja: concrete resource member
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对应 ListResourcesResult.resources 的数组；每个元素必须是具有 name 与 concrete URI 的 ResourceDefinition 信息快照，成员图身份由 lists 关系保持。
        en: Maps to ListResourcesResult.resources. Every element must be a ResourceDefinition snapshot with a name and concrete URI, while member graph identity is retained by the lists relation.
        ja: ListResourcesResult.resources に対応し、各 element は name と concrete URI を持つ ResourceDefinition snapshot で、member graph identity は lists relation が保持します。
      allowed_values: []
      pattern: null
      example_value:
        - name: README
          uri: file:///repo/README.md
          mimeType: text/markdown
        - name: schema
          uri: file:///repo/schema.json
          mimeType: application/schema+json
      source_claims:
        - claim-mcp-resource-list-002
  constraints: []
  required_relation_constraints:
    - id: mcp-resource-list-lists-concrete-resources
      direction: outgoing
      predicate: lists
      target_concept_id: ResourceDefinition
      cardinality:
        min: 0
        max: null
      explanations:
        zh: 列表页可为空；每个 resources 元素必须对应一个 concrete ResourceDefinition，且不得以此边连接 ResourceTemplate 或 ResourceReadResult。
        en: A page may be empty; every resources element must correspond to one concrete ResourceDefinition, and this edge must not connect ResourceTemplate or ResourceReadResult.
        ja: page は空でもよく、各 resources element は concrete ResourceDefinition 一つに対応し、この edge で ResourceTemplate や ResourceReadResult を接続しません。
      source_claims:
        - claim-mcp-resource-list-003
examples:
  - id: mcp-resource-list-positive-repository-files
    kind: positive
    labels:
      zh: 仓库文件资源页
      en: Repository-file resource page
      ja: repository file resource page
    scenario_id: null
    descriptions:
      zh: 文件服务器对 `resources/list` 返回 `file:///repo/README.md` 和 `file:///repo/schema.json` 两个具体资源及其 MIME 类型；该页归为 MCPResourceList。
      en: A filesystem server answers `resources/list` with two concrete resources, `file:///repo/README.md` and `file:///repo/schema.json`, including their MIME types; the page is MCPResourceList.
      ja: filesystem server が `resources/list` に `file:///repo/README.md` と `file:///repo/schema.json` の二つの具体 resource と MIME type を返し、この page を MCPResourceList とします。
    field_values:
      session_id: mcp-session-s-42
      request_id: 41
      list_method: resources/list
      resources:
        - name: README
          uri: file:///repo/README.md
          mimeType: text/markdown
        - name: schema
          uri: file:///repo/schema.json
          mimeType: application/schema+json
      member_count: 2
    related_node_ids:
      - MCPResourceList
      - MCPDefinitionList
      - ResourceDefinition
    related_relation_ids:
      - MCPResourceList-is_a-MCPDefinitionList
      - MCPResourceList-lists-ResourceDefinition
    expected_result:
      zh: 页面与两个 ResourceDefinition 分别保留身份，后续读取可引用其 URI。
      en: The page and its two ResourceDefinition members retain separate identities, and later reads can reference their URIs.
      ja: page と二つの ResourceDefinition member の同一性を分け、後続 read が URI を参照できます。
    why_valid_or_invalid:
      zh: 成员 URI 已具体化且直接可读，结果字段为 `resources` 而非 `contents` 或 `resourceTemplates`。
      en: The member URIs are concrete and directly readable, and the result field is `resources`, not `contents` or `resourceTemplates`.
      ja: member URI が具体化され直接 read でき、result field が `contents` や `resourceTemplates` ではなく `resources` だからです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-resource-list-004
  - id: mcp-resource-list-boundary-uri-template
    kind: boundary
    labels:
      zh: 动态 URI 模板不属于具体资源列表
      en: Dynamic URI template is not a concrete resource list member
      ja: 動的 URI template は具体 resource list member ではない
    scenario_id: null
    descriptions:
      zh: 服务器发布 `repo://{owner}/{name}/issues/{number}`，其中仍有变量占位符；该条目应进入 MCPResourceTemplateList，而不能当作可直接读取的 MCPResourceList 成员。
      en: A server publishes `repo://{owner}/{name}/issues/{number}` with unresolved variables; the entry belongs in MCPResourceTemplateList and cannot be treated as a directly readable MCPResourceList member.
      ja: server が未解決変数を持つ `repo://{owner}/{name}/issues/{number}` を公開します。この entry は MCPResourceTemplateList に属し、直接 read 可能な MCPResourceList member ではありません。
    field_values:
      method: resources/templates/list
      uriTemplate: repo://{owner}/{name}/issues/{number}
    related_node_ids:
      - MCPResourceList
      - MCPResourceTemplateList
    related_relation_ids: []
    expected_result:
      zh: 归入资源模板页，待参数展开后再形成具体 URI。
      en: It is classified in the resource-template page; only expansion with arguments yields a concrete URI.
      ja: resource-template page に分類し、argument 展開後に初めて具体 URI を形成します。
    why_valid_or_invalid:
      zh: 未绑定变量的 URI 模板不满足具体、可直接读取的资源条目边界。
      en: A URI template with unbound variables does not satisfy the boundary of a concrete, directly readable resource entry.
      ja: 未束縛変数を持つ URI template は、具体的で直接 read 可能な resource entry の境界を満たしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-resource-list-005
external_mappings: []
