schema: moonweave.ai/ontology-node/v1
id: MCPDefinitionList
kind: concept
status: review
labels:
  zh: MCP 定义列表
  en: MCP Definition List
  ja: MCP 定義一覧
semantics:
  short_definition:
    zh: MCP 服务器列表方法返回的一页可发现定义。
    en: A page of discoverable definitions returned by an MCP server list method.
    ja: MCP サーバーの list method が返す発見可能な定義の一ページ。
  definition:
    zh: MCP 定义列表是一种集合，是 `tools/list`、`resources/list`、`resources/templates/list` 或 `prompts/list` 返回的一页服务器可发现定义及可选 `nextCursor` 的共同上位概念；它不涵盖客户端 `roots/list`、能力声明、持久注册表或读取/调用结果。
    en: An MCP definition list is a collection serving as the common parent of one server discovery page returned by tools/list, resources/list, resources/templates/list, or prompts/list, including optional nextCursor. It excludes client roots/list, capability declarations, persistent registries, and read or call results.
    ja: MCP definition list は collection の一種で、tools/list・resources/list・resources/templates/list・prompts/list が返す一 server discovery page と任意 nextCursor の共通親です。client roots/list・capability declaration・persistent registry・read/call result を含みません。
  why_needed:
    zh: 共同上位概念只抽取服务器发现列表真正共享的分页集合语义，避免把根范围、能力和执行结果硬塞进同一层。
    en: The supertype captures only the pagination and collection semantics genuinely shared by server discovery lists, preventing roots, capabilities, and execution results from being flattened into that layer.
    ja: サーバー discovery list が実際に共有するページング・集合意味だけを抽出し、roots・capability・実行結果を同じ層へ平坦化しないために必要です。
  includes:
    - zh: 纳入工具、具体资源、资源 URI 模板或提示定义的服务器端列表响应页，包括该页的成员数组与可选续页游标。
      en: Includes server-side response pages listing tool, concrete-resource, resource-URI-template, or prompt definitions, including the member array and optional continuation cursor.
      ja: tool、具体 resource、resource URI template、prompt 定義を列挙するサーバー側応答ページと、その member array・任意 continuation cursor を含みます。
  excludes:
    - zh: 排除客户端响应 `roots/list` 返回的根范围、`initialize` 中的 capability、`resources/read` 内容、`prompts/get` 消息以及 `tools/call` 结果。
      en: Excludes roots returned by the client for `roots/list`, capabilities in `initialize`, `resources/read` content, `prompts/get` messages, and `tools/call` results.
      ja: クライアントが `roots/list` で返す root、`initialize` の capability、`resources/read` content、`prompts/get` message、`tools/call` result を除きます。
  semantic_kind: collection
  aliases: []
structure:
  identity_keys:
    - session_id
    - request_id
  fields:
    - id: session_id
      labels:
        zh: 会话标识
        en: session ID
        ja: session ID
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 承载该列表响应及其关联请求的 MCPSession 标识；它是本体相关字段，不是 JSON-RPC result 对象的新增 wire member。
        en: Identifies the MCPSession carrying this list response and its correlated request; it is an ontological correlation field, not an added wire member of the JSON-RPC result object.
        ja: list response と相関 request を運ぶ MCPSession を識別する ontology correlation field で、JSON-RPC result object の追加 wire member ではありません。
      allowed_values: []
      pattern: null
      example_value: mcp-session-s-42
      source_claims:
        - claim-mcp-definition-list-002
    - id: request_id
      labels:
        zh: 关联请求标识
        en: correlated request ID
        ja: 相関 request ID
      datatype: string-or-integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 与产生该列表页的 JSON-RPC 列表请求共享的 id；结果载荷本身不重复声明 method。
        en: The JSON-RPC id shared with the list request that produced this page; the result payload itself does not repeat the method.
        ja: この page を生成した JSON-RPC list request と共有する id で、result payload 自体は method を繰り返しません。
      allowed_values: []
      pattern: null
      example_value: 41
      source_claims:
        - claim-mcp-definition-list-003
    - id: list_method
      labels:
        zh: 关联列表方法
        en: correlated list method
        ja: 相関 list method
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 从具有同一 request_id 的请求读取的方法判别符，仅允许四种服务器定义发现方法；它用于确定成员数组种类，不伪装为 result wire field。
        en: The method discriminator read from the request with the same request_id. It is limited to the four server-definition discovery methods and determines the member-array kind without pretending to be a result wire field.
        ja: 同じ request_id の request から読む method discriminator で、四つの server-definition discovery method に限定し、result wire field を装わず member-array kind を決めます。
      allowed_values:
        - id: MCPDefinitionListMethodTools
          value: tools/list
          labels:
            zh: 工具列表
            en: tools list
            ja: tools list
          definitions:
            zh: 返回 Tool 定义页。
            en: Returns a page of Tool definitions.
            ja: Tool definition page を返します。
          status: accepted
          source_claims:
            - claim-mcp-definition-list-004
        - id: MCPDefinitionListMethodResources
          value: resources/list
          labels:
            zh: 资源列表
            en: resources list
            ja: resources list
          definitions:
            zh: 返回 concrete Resource 定义页。
            en: Returns a page of concrete Resource definitions.
            ja: concrete Resource definition page を返します。
          status: accepted
          source_claims:
            - claim-mcp-definition-list-005
        - id: MCPDefinitionListMethodResourceTemplates
          value: resources/templates/list
          labels:
            zh: 资源模板列表
            en: resource templates list
            ja: resource templates list
          definitions:
            zh: 返回 ResourceTemplate 定义页。
            en: Returns a page of ResourceTemplate definitions.
            ja: ResourceTemplate definition page を返します。
          status: accepted
          source_claims:
            - claim-mcp-definition-list-006
        - id: MCPDefinitionListMethodPrompts
          value: prompts/list
          labels:
            zh: 提示列表
            en: prompts list
            ja: prompts list
          definitions:
            zh: 返回 Prompt 定义页。
            en: Returns a page of Prompt definitions.
            ja: Prompt definition page を返します。
          status: accepted
          source_claims:
            - claim-mcp-definition-list-007
      pattern: null
      example_value: resources/list
      source_claims:
        - claim-mcp-definition-list-008
    - id: next_cursor
      labels:
        zh: 下一页游标
        en: next-page cursor
        ja: next-page cursor
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 对应 result.nextCursor 的可选不透明续页游标；客户端只能回传，不能解析其内部结构。
        en: Maps to the optional opaque result.nextCursor; clients may return it for continuation but must not infer internal structure.
        ja: optional opaque result.nextCursor に対応し、client は continuation に返せますが内部構造を推測しません。
      allowed_values: []
      pattern: null
      example_value: page-2
      source_claims:
        - claim-mcp-definition-list-009
    - id: member_count
      labels:
        zh: 本页成员数
        en: page member count
        ja: page member count
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 由具体列表结果的成员数组长度派生的非负计数，便于验证空页和分页；不是新增 wire member。
        en: A non-negative count derived from the concrete list result's member-array length for validating empty pages and pagination; it is not an added wire member.
        ja: concrete list result の member-array length から導出する非負 count で、empty page と pagination 検証用であり追加 wire member ではありません。
      allowed_values: []
      pattern: ^(0|[1-9][0-9]*)$
      example_value: 2
      source_claims:
        - claim-mcp-definition-list-010
  constraints:
    - id: mcp-definition-list-page-correlation
      severity: error
      expression_language: plain
      expression: Within one MCPSession, request_id MUST identify exactly one request whose method equals list_method, and member_count MUST equal the length of the concrete subtype member array.
      explanations:
        zh: 同一会话内 request_id 必须唯一关联一个方法等于 list_method 的请求；member_count 必须等于具体下位列表成员数组长度。
        en: Within one session, request_id must correlate exactly one request whose method equals list_method, and member_count must equal the concrete subtype member-array length.
        ja: 同一 session で request_id は method=list_method の request 一つに相関し、member_count は concrete subtype member-array length と一致しなければなりません。
      source_claims:
        - claim-mcp-definition-list-011
  required_relation_constraints: []
examples:
  - id: mcp-definition-list-positive-resource-page
    kind: positive
    labels:
      zh: 资源发现页属于定义列表
      en: Resource discovery page as a definition list
      ja: 定義一覧としての resource discovery page
    scenario_id: null
    descriptions:
      zh: "服务器对 `resources/list` 返回两个资源定义及 `nextCursor: \"page-2\"`；该响应页是 MCPResourceList，也属于 MCPDefinitionList。"
      en: "A server answers `resources/list` with two resource definitions and `nextCursor: \"page-2\"`; that response page is an MCPResourceList and therefore an MCPDefinitionList."
      ja: "サーバーが `resources/list` に二つの resource 定義と `nextCursor: \"page-2\"` を返します。この応答ページは MCPResourceList であり、MCPDefinitionList でもあります。"
    field_values:
      session_id: mcp-session-s-42
      request_id: 41
      list_method: resources/list
      member_count: 2
      next_cursor: page-2
    related_node_ids:
      - MCPDefinitionList
      - MCPResourceList
    related_relation_ids:
      - MCPResourceList-is_a-MCPDefinitionList
    expected_result:
      zh: 按资源列表记录该页，并通过 is_a 继承共同列表语义。
      en: The page is recorded as MCPResourceList and inherits the common list semantics through is_a.
      ja: ページを MCPResourceList として記録し、is_a により共通 list 意味を継承します。
    why_valid_or_invalid:
      zh: 它由服务器列表方法产生，成员是可发现定义，并具有标准续页游标。
      en: It is produced by a server list method, contains discoverable definitions, and carries the standard continuation cursor.
      ja: サーバー list method が生成し、発見可能な定義を含み、標準 continuation cursor を持つためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-definition-list-001
  - id: mcp-definition-list-boundary-client-roots
    kind: boundary
    labels:
      zh: 根范围列表不是服务器定义列表
      en: Root list is not a server definition list
      ja: root list はサーバー定義一覧ではない
    scenario_id: null
    descriptions:
      zh: 服务器调用 `roots/list` 后，客户端返回两个 `file://` 根范围。该对象是 MCPRootList；已废弃的 `MCPRootList-is_a-MCPDefinitionList` 不得用于恢复旧归类。
      en: After a server calls `roots/list`, the client returns two `file://` roots. The object is MCPRootList; the deprecated `MCPRootList-is_a-MCPDefinitionList` relation must not restore the former classification.
      ja: サーバーが `roots/list` を呼び、クライアントが二つの `file://` root を返します。この object は MCPRootList であり、deprecated な `MCPRootList-is_a-MCPDefinitionList` で旧分類を復活させてはいけません。
    field_values:
      method: roots/list
      producer: client
      root_count: 2
    related_node_ids:
      - MCPDefinitionList
      - MCPRootList
    related_relation_ids:
      - MCPRootList-is_a-MCPDefinitionList
    expected_result:
      zh: MCPRootList 保持独立组合根，不计入四类服务器定义列表。
      en: MCPRootList remains an independent composition root and is not counted among the four server definition lists.
      ja: MCPRootList は独立した composition root のままで、四種類のサーバー定義 list に数えません。
    why_valid_or_invalid:
      zh: 生产方、方向和成员含义都不同：根由客户端暴露为操作范围，不是服务器发布的功能定义。
      en: "Producer, direction, and member meaning differ: roots are exposed by the client as operating scope, not published by the server as feature definitions."
      ja: producer・方向・member 意味が異なり、root は client が操作範囲として公開するもので、server が feature 定義として発行するものではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-definition-list-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: MCPResultResponse-carries-MCPDefinitionList
  predicate: carries
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: MCPResultResponse承载MCPDefinitionList
    en: MCPResultResponse carries MCPDefinitionList
    ja: MCPResultResponseがMCPDefinitionListを保持する
  definitions:
    zh: MCPResultResponse 对 tools/list、resources/list、resources/templates/list 或 prompts/list 承载恰当的 MCPDefinitionList 页及可选 nextCursor；初始化结果或单项 get/read/call 结果不属于此组成边。
    en: MCPResultResponse carries the appropriate MCPDefinitionList page and optional nextCursor for tools/list, resources/list, resources/templates/list, or prompts/list; initialization and single-item get/read/call results are outside this composition.
    ja: MCPResultResponse は tools/list・resources/list・resources/templates/list・prompts/list の appropriate MCPDefinitionList page と optional nextCursor を保持し、initialize/single get/read/call result は対象外です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
    en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
    ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
  inverse_reading:
    predicate: is_carried_by
    labels:
      zh: MCPDefinitionList反向关联MCPResultResponse
      en: MCPDefinitionList is the inverse target of MCPResultResponse
      ja: MCPDefinitionListからMCPResultResponseへの逆読解
  conditions: []
  temporal_scope: timeless
  boundary_context:
    trust_boundary_concept_id: TrustBoundary
    authority_basis:
      zh: MCPResultResponse 与 MCPDefinitionList 保持各自本体所有权；此边只记录已核验的 MCP 协议事实，不转移定义权或授权。
      en: MCPResultResponse and MCPDefinitionList retain their ontology owners; this edge records only a verified MCP protocol fact and transfers neither definitional ownership nor authorization.
      ja: MCPResultResponse と MCPDefinitionList は各 ontology owner を維持し、この edge は verified MCP protocol fact のみを記録して定義所有権や認可を移転しません。
    protocol_or_resource_context:
      zh: 响应关联四种 list 方法之一，result 含对应复数成员键，且游标语义一致。
      en: The response correlates to one of the four list methods, result contains the matching plural member key, and cursor semantics are consistent.
      ja: response が四 list method の一つに対応し result に matching plural member key と一貫した cursor semantics があります。
  constraints: []
  examples:
    - id: MCPResultResponse-carries-MCPDefinitionList-example-positive-001
      kind: positive
      labels:
        zh: MCPResultResponse-carries-MCPDefinitionList 正例
        en: Positive case for MCPResultResponse-carries-MCPDefinitionList
        ja: MCPResultResponse-carries-MCPDefinitionList の正例
      scenario_id: null
      descriptions:
        zh: tools/list 的 id=31 结果包含 tools 数组与 nextCursor=page-2。
        en: The id=31 tools/list result contains a tools array and nextCursor page-2.
        ja: id=31 tools/list result が tools array と nextCursor=page-2 を含みます。
      field_values: {}
      related_node_ids:
        - MCPResultResponse
        - MCPDefinitionList
      related_relation_ids:
        - MCPResultResponse-carries-MCPDefinitionList
      expected_result:
        zh: 建立 MCPResultResponse-carries-MCPDefinitionList，并保留所述协议方向与条件。
        en: Assert MCPResultResponse-carries-MCPDefinitionList with the stated protocol direction and conditions.
        ja: MCPResultResponse-carries-MCPDefinitionList を stated protocol direction/condition 付きで確立します。
      why_valid_or_invalid:
        zh: 响应关联四种 list 方法之一，result 含对应复数成员键，且游标语义一致。
        en: The response correlates to one of the four list methods, result contains the matching plural member key, and cursor semantics are consistent.
        ja: response が四 list method の一つに対応し result に matching plural member key と一貫した cursor semantics があります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-mcp-definition-list-012
    - id: MCPResultResponse-carries-MCPDefinitionList-example-boundary-001
      kind: boundary
      labels:
        zh: MCPResultResponse-carries-MCPDefinitionList 边界例
        en: Boundary case for MCPResultResponse-carries-MCPDefinitionList
        ja: MCPResultResponse-carries-MCPDefinitionList の境界例
      scenario_id: null
      descriptions:
        zh: tools/call 的 id=32 结果包含 content 与 structuredContent。
        en: The id=32 tools/call result contains content and structuredContent.
        ja: id=32 tools/call result が content と structuredContent を含みます。
      field_values: {}
      related_node_ids:
        - MCPResultResponse
        - MCPDefinitionList
      related_relation_ids:
        - MCPResultResponse-carries-MCPDefinitionList
      expected_result:
        zh: 不得建立 MCPResultResponse-carries-MCPDefinitionList；保留实际出现的较宽或相邻事实。
        en: Do not assert MCPResultResponse-carries-MCPDefinitionList; retain the broader or adjacent fact actually present.
        ja: MCPResultResponse-carries-MCPDefinitionList を確立せず、実際の broader/adjacent fact を保持します。
      why_valid_or_invalid:
        zh: 调用结果是执行输出，不是可发现定义分页列表。
        en: A call result is execution output rather than a paginated discovery-definition list.
        ja: call result は execution output で paginated discovery-definition list ではありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-mcp-definition-list-012
  source_claims:
    - claim-mcp-definition-list-012
  distinct_fact_rationale:
    zh: MCPResultResponse-carries-MCPDefinitionList 只在其方法、方向、载荷或类型条件成立时记录；它不等于端点共现、反向捷径或词形相似。
    en: MCPResultResponse-carries-MCPDefinitionList records only the reviewed method, direction, payload, or subtype condition; it is not endpoint co-occurrence, a redundant inverse shortcut, or lexical similarity.
    ja: MCPResultResponse-carries-MCPDefinitionList は reviewed method・direction・payload・subtype condition のみを記録し、endpoint 共起・redundant inverse shortcut・lexical similarity ではありません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
review:
  status: accepted
  method: manual-mcp-spec-verification
  reviewer: manual-mcp-spec-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 MCP 2025-11-25 规范（生命周期、传输、授权、能力协商、JSON-RPC 消息、资源订阅）完成人工语义核验。
    en: Manually verified against MCP 2025-11-25 (lifecycle, transports, authorization, capability negotiation, JSON-RPC messages, resource subscriptions).
    ja: MCP 2025-11-25 仕様（ライフサイクル、トランスポート、認可、能力協議、JSON-RPC メッセージ、リソース購読）に照らして手動意味審査を完了しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-mcp-definition-list-001
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 defines the base protocol as JSON-RPC request, result-response, error-response, and notification records; it also fixes request-ID uniqueness within a session and separates lifecycle, capability negotiation, transport, authorization, server features, and client features.
    locator: MCP 2025-11-25 > Base Protocol > Overview > Messages and Lifecycle
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-mcp-definition-list-002
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 requires request IDs to remain unique within a session. Moonweave therefore includes session identity when correlating a list result page.
    locator: MCP 2025-11-25 > Base Protocol > Overview > Request IDs and lifecycle
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-mcp-definition-list-003
    source: eng-proto-mcp-2025-spec
    supports: MCP JSON-RPC result responses carry the same request ID as the request they answer.
    locator: MCP 2025-11-25 > Base Protocol > Overview > Responses and request IDs
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-mcp-definition-list-004
    source: eng-proto-mcp-2025-spec
    supports: MCP defines tools/list as the server tool discovery method.
    locator: MCP 2025-11-25 > Server Features > Tools > Listing
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-mcp-definition-list-005
    source: eng-proto-mcp-2025-spec
    supports: MCP defines resources/list as the concrete-resource discovery method.
    locator: MCP 2025-11-25 > Server Features > Resources > Listing Resources
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-mcp-definition-list-006
    source: eng-proto-mcp-2025-spec
    supports: MCP defines resources/templates/list as the resource-template discovery method.
    locator: MCP 2025-11-25 > Server Features > Resources > Resource Templates
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-mcp-definition-list-007
    source: eng-proto-mcp-2025-spec
    supports: MCP defines prompts/list as the server prompt discovery method.
    locator: MCP 2025-11-25 > Server Features > Prompts > Listing
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-mcp-definition-list-008
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 defines separate server list methods for tools, resources, resource templates, and prompts.
    locator: MCP 2025-11-25 > Server Features > Tools, Resources, and Prompts > Listing
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-mcp-definition-list-009
    source: eng-proto-mcp-2025-spec
    supports: MCP list results may carry an optional nextCursor for pagination.
    locator: MCP 2025-11-25 > Schema Reference > PaginatedResult.nextCursor
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-mcp-definition-list-010
