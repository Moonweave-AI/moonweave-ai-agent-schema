schema: moonweave.ai/ontology-node/v1
id: MCPResourceTemplateList
kind: concept
status: review
labels:
  en: MCP resource template list
  zh: MCP 资源模板列表
  ja: MCP リソーステンプレート一覧
semantics:
  short_definition:
    zh: "`resources/templates/list` 返回的一页参数化资源 URI 模板。"
    en: A page of parameterized resource URI templates returned by `resources/templates/list`.
    ja: "`resources/templates/list` が返す parameterized resource URI template の一ページ。"
  definition:
    zh: MCP 资源模板列表是一种 MCP 定义列表（MCPDefinitionList），表示 `resources/templates/list` 返回的一页带未绑定变量的 `resourceTemplates` 与可选 `nextCursor`；它不是具体资源目录、参数绑定活动或展开后得到的单个 URI。
    en: An MCP resource-template list is an MCPDefinitionList representing one resources/templates/list page of resourceTemplates with unbound variables and optional nextCursor. It is not a concrete resource catalog, an argument-binding activity, or one URI produced after expansion.
    ja: MCP resource-template list は MCPDefinitionList の一種で unbound variable を持つ resourceTemplates の一 page と任意 nextCursor です。concrete resource catalog・binding activity・expanded URI ではありません。
  why_needed:
    zh: 模板列表保留“资源族的参数化发现”这一层，使模板、展开动作和具体资源不会以相似 URI 文本混为同级节点。
    en: The template list preserves the parameterized-discovery layer for resource families so that template, expansion activity, and concrete resource are not flattened merely because their URI strings look alike.
    ja: resource family の parameterized discovery 層を保持し、似た URI 文字列を理由に template・展開動作・具体 resource を同列化しないために必要です。
  includes:
    - zh: 纳入 `resources/templates/list` 响应页、带变量的 `uriTemplate` 条目、模板发现元数据和可选的续页游标。
      en: Includes a `resources/templates/list` response page, entries with variable-bearing `uriTemplate` values, template discovery metadata, and an optional continuation cursor.
      ja: "`resources/templates/list` response page、変数を持つ `uriTemplate` entry、template discovery metadata、任意 continuation cursor を含みます。"
  excludes:
    - zh: 排除 `resources/list` 中已具体化的 URI、模板参数绑定活动以及 `resources/read` 返回的资源内容。
      en: Excludes concrete URIs from `resources/list`, the activity of binding template arguments, and resource content returned by `resources/read`.
      ja: "`resources/list` の具体 URI、template argument binding activity、`resources/read` が返す resource content を除きます。"
  semantic_kind: collection
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: resource_templates
      labels:
        zh: 资源模板成员
        en: resource-template members
        ja: resource-template member
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对应 ListResourceTemplatesResult.resourceTemplates 的数组；每个元素必须含 name 与 RFC 6570 uriTemplate，成员图身份由 lists 关系保持。
        en: Maps to ListResourceTemplatesResult.resourceTemplates. Every element must contain a name and RFC 6570 uriTemplate, while member graph identity is retained by the lists relation.
        ja: ListResourceTemplatesResult.resourceTemplates に対応し、各 element は name と RFC 6570 uriTemplate を含み、member graph identity は lists relation が保持します。
      allowed_values: []
      pattern: null
      example_value:
        - name: issue
          uriTemplate: repo://{owner}/{name}/issues/{number}
          mimeType: application/json
      source_claims:
        - claim-mcp-resource-template-list-002
  constraints: []
  required_relation_constraints:
    - id: mcp-resource-template-list-lists-resource-templates
      direction: outgoing
      predicate: lists
      target_concept_id: ResourceTemplate
      cardinality:
        min: 0
        max: null
      explanations:
        zh: 列表页可为空；每个 resourceTemplates 元素必须对应一个仍含未绑定变量的 ResourceTemplate，不能用该边连接 concrete ResourceDefinition。
        en: A page may be empty; every resourceTemplates element must correspond to one ResourceTemplate with unbound variables, and this edge must not connect a concrete ResourceDefinition.
        ja: page は空でもよく、各 resourceTemplates element は未束縛 variable を持つ ResourceTemplate 一つに対応し、concrete ResourceDefinition をこの edge で接続しません。
      source_claims:
        - claim-mcp-resource-template-list-003
examples:
  - id: mcp-resource-template-list-positive-issue-family
    kind: positive
    labels:
      zh: 议题资源族模板页
      en: Issue-resource family template page
      ja: issue resource family template page
    scenario_id: null
    descriptions:
      zh: 代码托管服务器以 `resources/templates/list` 发布 `repo://{owner}/{name}/issues/{number}`，同时说明参数化议题资源的名称和媒体类型；响应页归为 MCPResourceTemplateList。
      en: A code-hosting server publishes `repo://{owner}/{name}/issues/{number}` through `resources/templates/list` together with a name and media type for the parameterized issue resource; the response page is MCPResourceTemplateList.
      ja: code-hosting server が `resources/templates/list` で `repo://{owner}/{name}/issues/{number}` を公開し、parameterized issue resource の name と media type を添えます。この response page は MCPResourceTemplateList です。
    field_values:
      session_id: mcp-session-s-42
      request_id: 42
      list_method: resources/templates/list
      resource_templates:
        - name: issue
          uriTemplate: repo://{owner}/{name}/issues/{number}
          mimeType: application/json
      member_count: 1
    related_node_ids:
      - MCPResourceTemplateList
      - MCPDefinitionList
      - ResourceTemplate
    related_relation_ids:
      - MCPResourceTemplateList-is_a-MCPDefinitionList
      - MCPResourceTemplateList-lists-ResourceTemplate
    expected_result:
      zh: 保留一个模板列表页及其参数化成员，不提前创建任意具体议题资源。
      en: One template-list page and its parameterized member are retained without pre-creating arbitrary concrete issue resources.
      ja: template-list page と parameterized member を保持し、任意の具体 issue resource を先に作りません。
    why_valid_or_invalid:
      zh: 成员含未绑定变量，并由专门的模板列表方法发布。
      en: The member has unbound variables and is published by the dedicated template-list operation.
      ja: member に未束縛変数があり、専用 template-list operation で公開されるためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-resource-template-list-004
  - id: mcp-resource-template-list-boundary-concrete-readme
    kind: boundary
    labels:
      zh: 具体 README 资源不是模板
      en: Concrete README resource is not a template
      ja: 具体 README resource は template ではない
    scenario_id: null
    descriptions:
      zh: "`resources/list` 返回 `file:///repo/README.md`，URI 中没有变量且可直接用于 `resources/read`；它属于 MCPResourceList，而非 MCPResourceTemplateList。"
      en: "`resources/list` returns `file:///repo/README.md`; the URI has no variables and can be passed directly to `resources/read`, so it belongs to MCPResourceList rather than MCPResourceTemplateList."
      ja: "`resources/list` が `file:///repo/README.md` を返し、URI に変数がなく直接 `resources/read` に渡せます。これは MCPResourceList に属し、MCPResourceTemplateList ではありません。"
    field_values:
      method: resources/list
      uri: file:///repo/README.md
      has_template_variables: false
    related_node_ids:
      - MCPResourceTemplateList
      - MCPResourceList
    related_relation_ids: []
    expected_result:
      zh: 记录为具体资源条目，不创建模板成员。
      en: It is recorded as a concrete resource entry and no template member is created.
      ja: 具体 resource entry として記録し、template member は作成しません。
    why_valid_or_invalid:
      zh: 该 URI 已完整定位一个资源，缺少模板概念所需的未绑定参数。
      en: The URI already locates one complete resource and lacks the unbound parameters required by the template concept.
      ja: URI は既に一つの resource を完全に定位し、template 概念に必要な未束縛 parameter がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-resource-template-list-005
external_mappings: []
