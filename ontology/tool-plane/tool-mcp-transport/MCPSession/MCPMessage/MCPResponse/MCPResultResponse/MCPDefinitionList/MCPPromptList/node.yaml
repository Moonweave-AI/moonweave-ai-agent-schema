schema: moonweave.ai/ontology-node/v1
id: MCPPromptList
kind: concept
status: review
labels:
  en: MCP prompt list
  zh: MCP 提示列表
  ja: MCP プロンプト一覧
semantics:
  short_definition:
    zh: "`prompts/list` 返回的一页可用提示定义。"
    en: A page of available prompt definitions returned by `prompts/list`.
    ja: "`prompts/list` が返す利用可能な prompt 定義の一ページ。"
  definition:
    zh: MCP 提示列表是一种 MCP 定义列表（MCPDefinitionList），表示 `prompts/list` 返回的一页 `prompts` 成员及可选 `nextCursor`；成员描述名称、标题、说明和参数合同，它不是 `prompts/get` 生成的消息、PromptInstantiation 或某个单独 PromptDefinition。
    en: An MCP prompt list is an MCPDefinitionList representing one prompts/list page of prompt members and optional nextCursor. Members describe names, titles, descriptions, and argument contracts; the page is not messages generated by prompts/get, a PromptInstantiation, or one standalone PromptDefinition.
    ja: MCP prompt list は MCPDefinitionList の一種で prompts/list の一 page と任意 nextCursor を表します。member は name/title/description/argument contract で、prompts/get message・PromptInstantiation・単一 PromptDefinition ではありません。
  why_needed:
    zh: 列表页与单个定义、参数实例化结果分开后，发现、分页和提示执行可各自保持清晰身份。
    en: Separating the list page from individual definitions and instantiated results keeps discovery, pagination, and prompt execution as distinct identities.
    ja: list page を個別定義や instantiated result から分けることで、discovery・pagination・prompt execution の同一性を明確に保てます。
  includes:
    - zh: 纳入 `prompts/list` 结果中的整个 `prompts` 集合、每个提示定义的发现元数据，以及存在时的 `nextCursor`。
      en: Includes the complete `prompts` collection in a `prompts/list` result, the discovery metadata of each prompt definition, and `nextCursor` when present.
      ja: "`prompts/list` result の `prompts` collection 全体、各 prompt 定義の discovery metadata、存在する場合の `nextCursor` を含みます。"
  excludes:
    - zh: 排除 `prompts/get` 返回的 `messages`、绑定参数的 PromptInstantiation，以及脱离响应页单独存在的 PromptDefinition。
      en: Excludes `messages` returned by `prompts/get`, argument-binding PromptInstantiation, and an individual PromptDefinition considered apart from its response page.
      ja: "`prompts/get` が返す `messages`、argument を束縛する PromptInstantiation、response page から独立した個別 PromptDefinition を除きます。"
  semantic_kind: collection
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: prompts
      labels:
        zh: 提示定义成员
        en: prompt definition members
        ja: prompt 定義 member
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对应 ListPromptsResult.prompts 的数组；每个成员保存 name 以及可选 title、description 与 arguments，成员图身份由 lists 关系保持。
        en: Maps to the ListPromptsResult.prompts array; each member retains name and optional title, description, and arguments, while the lists relation preserves member graph identity.
        ja: ListPromptsResult.prompts array に対応し、各 member は name と optional title・description・arguments を保持し、member graph identity は lists relation で保ちます。
      allowed_values: []
      pattern: null
      example_value:
        - name: release-summary
          arguments:
            - name: from
              required: true
      source_claims:
        - claim-mcp-prompt-list-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: mcp-prompt-list-positive-release-prompts
    kind: positive
    labels:
      zh: 发布流程提示发现页
      en: Release-workflow prompt discovery page
      ja: release workflow prompt discovery page
    scenario_id: null
    descriptions:
      zh: 客户端调用 `prompts/list`，服务器返回 `release-summary` 与 `rollback-plan` 两个提示定义，并给出下一页游标。整个响应页记录为 MCPPromptList。
      en: A client calls `prompts/list`; the server returns the `release-summary` and `rollback-plan` prompt definitions plus a next-page cursor. The entire response page is recorded as MCPPromptList.
      ja: client が `prompts/list` を呼び、server が `release-summary` と `rollback-plan` の二つの prompt 定義と次ページ cursor を返します。応答ページ全体を MCPPromptList として記録します。
    field_values:
      session_id: mcp-session-release-prompts-8
      request_id: 18
      list_method: prompts/list
      member_count: 2
      prompts:
        - name: release-summary
          description: Summarize changes between two releases.
          arguments:
            - name: from
              required: true
            - name: to
              required: true
        - name: rollback-plan
          description: Prepare a rollback plan for one release.
          arguments:
            - name: release
              required: true
      next_cursor: p2
    related_node_ids:
      - MCPPromptList
      - MCPDefinitionList
      - PromptDefinition
    related_relation_ids:
      - MCPPromptList-is_a-MCPDefinitionList
      - MCPPromptList-lists-PromptDefinition
    expected_result:
      zh: 创建一个列表页节点，并把两个成员保留为 PromptDefinition。
      en: One list-page node is created while its two members remain PromptDefinition records.
      ja: 一つの list-page node を作り、二つの member は PromptDefinition record のままにします。
    why_valid_or_invalid:
      zh: 这是列表方法的分页发现结果，而非提示内容的实例化。
      en: This is the paginated discovery result of the list method, not an instantiation of prompt content.
      ja: list method の paginated discovery result であり、prompt content の instantiation ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-prompt-list-003
  - id: mcp-prompt-list-boundary-get-result
    kind: boundary
    labels:
      zh: 提示获取结果不是列表
      en: Prompt-get result is not a list
      ja: prompt-get result は一覧ではない
    scenario_id: null
    descriptions:
      zh: 客户端以 `prompts/get` 请求 `release-summary` 并传入版本号，服务器返回一组角色消息；该对象属于实例化结果语境，不是 MCPPromptList。
      en: A client requests `release-summary` through `prompts/get` with a version argument and receives role-tagged messages; that object belongs to prompt-instantiation context, not MCPPromptList.
      ja: client が version argument 付きで `prompts/get` により `release-summary` を要求し、role 付き message 群を受け取ります。この object は prompt instantiation の文脈に属し、MCPPromptList ではありません。
    field_values:
      method: prompts/get
      name: release-summary
      result_field: messages
    related_node_ids:
      - MCPPromptList
      - PromptInstantiation
    related_relation_ids: []
    expected_result:
      zh: 保留为提示实例化结果，不创建列表页。
      en: It remains a prompt-instantiation result and no list page is created.
      ja: prompt-instantiation result として保持し、list page は作成しません。
    why_valid_or_invalid:
      zh: "`prompts/get` 解析一个已选定义并返回消息，方法和结果形态均不同于发现列表。"
      en: "`prompts/get` resolves one selected definition and returns messages; both method and result shape differ from discovery listing."
      ja: "`prompts/get` は選択済み定義一件を解決して message を返し、method も result shape も discovery listing と異なります。"
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-prompt-list-003
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: MCPResourceList
    shared_parent_concept_id: MCPDefinitionList
    differentia:
      zh: MCPPromptList 与 MCPResourceList 同属 MCPDefinitionList；四种列表分别承载 prompts、具体 resources、含未绑定变量的 resourceTemplates 与 tools；成员键与后续 get/read/call 操作不能互换。
      en: MCPPromptList and MCPResourceList share MCPDefinitionList; The four lists carry prompts, concrete resources, unbound resourceTemplates, and tools respectively; their member keys and subsequent get/read/call operations are not interchangeable.
      ja: MCPPromptList と MCPResourceList は MCPDefinitionList を共有し、四 list は prompts・concrete resources・unbound resourceTemplates・tools を各々持ち、member key と subsequent get/read/call は交換できません。
