      en: MCPPromptList and MCPResourceTemplateList share MCPDefinitionList; The four lists carry prompts, concrete resources, unbound resourceTemplates, and tools respectively; their member keys and subsequent get/read/call operations are not interchangeable.
      ja: MCPPromptList と MCPResourceTemplateList は MCPDefinitionList を共有し、四 list は prompts・concrete resources・unbound resourceTemplates・tools を各々持ち、member key と subsequent get/read/call は交換できません。
