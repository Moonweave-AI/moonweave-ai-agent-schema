schema: moonweave.ai/ontology-node/v1
id: MCPListToolsResult
kind: concept
labels:
  zh: MCP tools/list 结果
  en: MCP tools/list result
  ja: MCP tools/list 結果
semantics:
  short_definition:
    zh: 服务器对 `tools/list` 的成功 JSON-RPC 结果，列出可由 client 和模型发现的工具定义。
    en: The successful JSON-RPC result to `tools/list`, enumerating tool definitions discoverable by a client and model.
    ja: client とモデルが発見できる tool 定義を列挙する `tools/list` の成功 JSON-RPC 結果。
  definition:
    zh: >
      MCP 工具列表结果是 tools/list 的 JSON-RPC result，包含 tools 数组和可选 nextCursor。每个 tool 以唯一 name 标识，
      包含 human-readable description 和有效 inputSchema，并可带 title、icons、outputSchema、annotations 或 execution。
      list 只声明可调用工具的 contract；实际调用使用 tools/call 并返回单独的 content/isError result。它不是工具执行结果、
      模型的 tool_use block 或未经 server 声明的本地函数目录。
    en: >
      An MCP tool-list result is the JSON-RPC result of tools/list containing tools array and optional nextCursor. Each tool is
      identified by a unique name, has a human-readable description and valid inputSchema, and may include title, icons, outputSchema,
      annotations, or execution. The list declares the callable-tool contract; actual invocation uses tools/call and returns separate
      content/isError result. It is not a tool execution result, a model tool_use block, or an undeclared local-function catalogue.
    ja: >
      MCP ツール一覧結果は tools 配列と任意 nextCursor を含む tools/list の JSON-RPC result である。各 tool は一意 name で識別され、
      human-readable description と有効 inputSchema を持ち、title、icons、outputSchema、annotations、execution を持てる。
      一覧は呼出可能 tool contract を宣言し、実際の呼出しは tools/call と別の content/isError result を使う。tool 実行結果、
      モデル tool_use block、server 未宣言のローカル function catalogue ではない。
  why_needed:
    zh: client 与模型可在调用前发现可用工具、参数 schema 和人类可理解的说明，并保留 host 对实际调用的控制。
    en: Clients and models can discover available tools, parameter schemas, and human-readable descriptions before invocation while hosts retain control over actual calls.
    ja: client とモデルは呼出し前に利用可能 tools、parameter schema、human-readable description を発見でき、host は実際の呼出しを制御し続ける。
  includes:
    - {zh: tools 数组和可选 nextCursor, en: tools array and optional nextCursor, ja: tools 配列と任意 nextCursor}
    -
      zh: 唯一 tool name、description 和 inputSchema
      en: Unique tool name, description, and inputSchema
      ja: 一意 tool name、description、inputSchema
  excludes:
    - {zh: tools/call 的 content 和 isError, en: content and isError from tools/call, ja: tools/call の content と isError}
    - {zh: 模型 provider 专有 tool call 格式, en: Provider-specific model tool-call format, ja: プロバイダー固有モデル tool-call 形式}
  semantic_kind: result
  aliases:
    - {language: en, value: ListToolsResult, alias_kind: protocol-type}
engineering:
  explanation:
    zh: client 在 server tools capability 已协商后发送 tools/list 和可选 cursor。server 返回定义页；client/host 可向模型展示 schema 并执行额外同意控制，实际调用仍通过 tools/call 传递 name 和 arguments。
    en: After server tools capability is negotiated, a client sends tools/list with optional cursor. The server returns a definition page; client/host may present schema to a model and enforce further consent controls, while actual invocation still passes name and arguments through tools/call.
    ja: server tools capability 交渉後、client は任意 cursor 付き tools/list を送る。server は definition page を返す。client/host は schema をモデルへ示し追加同意制御を行えるが、実際の呼出しは tools/call で name と arguments を渡す。
  typical_input:
    - description: List tool definitions.
      format: '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{"cursor":"optional-cursor"}}'
      source_claims: [mcp-tool-list-protocol]
  typical_output:
    - description: Tool definition page.
      format: '{"jsonrpc":"2.0","id":1,"result":{"tools":[{"name":"get_weather","description":"Get weather","inputSchema":{"type":"object","properties":{"location":{"type":"string"}},"required":["location"]}}],"nextCursor":"next-page"}}'
      source_claims: [mcp-tool-list-protocol]
  reference_implementations:
    - name: MCP Tools specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines tool capability, tools/list, Tool fields, schemas, pagination, and separate tools/call results.
structure:
  identity_keys: ["id", "local_list_variant"]
  fields:
    - id: jsonrpc
      labels: {zh: "JSON-RPC 版本", en: "JSON-RPC version", ja: "JSON-RPC バージョン"}
      definitions:
        zh: "该结果包络中的原生 jsonrpc 成员，值必须为 \"2.0\"。"
        en: "The native jsonrpc member of this result envelope; it must be \"2.0\"."
        ja: "この結果エンベロープのネイティブな jsonrpc メンバーで、値は \"2.0\" でなければならない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2.0"
      allowed_values: ["2.0"]
      source_claims: [mcp-tool-list-protocol]
    - id: id
      labels: {zh: "JSON-RPC 标识", en: "JSON-RPC id", ja: "JSON-RPC id"}
      definitions:
        zh: "与相应列表请求关联的原生 JSON-RPC id。"
        en: "The native JSON-RPC id correlating the result to its list request."
        ja: "対応する一覧要求に結果を関連付けるネイティブな JSON-RPC id。"
      datatype: string-or-number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims: [mcp-tool-list-protocol]
    - id: result
      labels: {zh: "结果对象", en: "Result object", ja: "結果オブジェクト"}
      definitions:
        zh: "从 MCPDiscoveryListResult 继承的原生 JSON-RPC result；此子类型的对象包含 `tools` 和可选 `nextCursor`。"
        en: "The native JSON-RPC result inherited from MCPDiscoveryListResult; this subtype's object contains `tools` and optional `nextCursor`."
        ja: "MCPDiscoveryListResult から継承するネイティブな JSON-RPC result。この下位型のオブジェクトは `tools` と任意の `nextCursor` を含む。"
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: {"tools":[{"name":"get_weather","inputSchema":{"type":"object"}}],"nextCursor":"next-page"}
      allowed_values: []
      source_claims: [mcp-tool-list-protocol]
    - id: local_list_variant
      labels: {zh: "本地列表变体", en: "Local list variant", ja: "ローカル一覧バリアント"}
      definitions:
        zh: "从 MCPDiscoveryListResult 继承的 Moonweave 分类；此子类型固定为 `tools`，不是 MCP wire 字段。"
        en: "The Moonweave classification inherited from MCPDiscoveryListResult; this subtype fixes it to `tools`, not an MCP wire field."
        ja: "MCPDiscoveryListResult から継承する Moonweave 分類。この下位型では MCP wire フィールドではなく `tools` に固定される。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "tools"
      allowed_values: ["tools"]
      source_claims: [moonweave-mcp-list-tools-result-taxonomy]
    - id: local_entry_set
      labels: {zh: "本地条目集合", en: "Local entry set", ja: "ローカルエントリー集合"}
      definitions:
        zh: "从 MCPDiscoveryListResult 继承的 Moonweave 查看值，引用本结果的原生 `result.tools` 数组。"
        en: "The Moonweave view inherited from MCPDiscoveryListResult, referring to this result's native `result.tools` array."
        ja: "MCPDiscoveryListResult から継承する Moonweave 表示値で、この結果のネイティブな `result.tools` 配列を参照する。"
      datatype: array
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: [{"name":"get_weather","inputSchema":{"type":"object"}}]
      allowed_values: []
      source_claims: [moonweave-mcp-list-tools-result-taxonomy]
    - id: tools
      labels: {zh: "工具定义", en: "Tool definitions", ja: "ツール定義"}
      definitions:
        zh: "原生 result.tools 数组，包含服务器公开的工具定义，而不是调用结果。"
        en: "The native result.tools array of server-exposed tool definitions, not invocation results."
        ja: "サーバー公開ツールの定義を含むネイティブな result.tools 配列。呼び出し結果ではない。"
      datatype: array
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: [{"name":"get_weather","description":"Read current weather","inputSchema":{"type":"object"}}]
      allowed_values: []
      source_claims: [mcp-tool-list-protocol, mcp-tool-list-definition]
    - id: nextCursor
      labels: {zh: "下一游标", en: "Next cursor", ja: "次カーソル"}
      definitions:
        zh: "可选的原生 result.nextCursor 成员，用于取得后续页。"
        en: "The optional native result.nextCursor member used to obtain a subsequent page."
        ja: "後続ページを取得するための任意のネイティブな result.nextCursor メンバー。"
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: "next-page"
      allowed_values: []
      source_claims: [mcp-tool-list-protocol]
  constraints:
    - id: tool-list-requires-capability
      severity: error
      expression_language: plain
      expression: tools/list is used only when the server declared tools capability.
      explanation:
        zh: 只有 server 声明 tools capability 时才使用 tools/list。
        en: tools/list is used only when the server declared tools capability.
        ja: tools/list は server が tools capability を宣言した場合にのみ使う。
      source_claims: [mcp-tool-list-capability]
    - id: tool-list-input-schema-valid
      severity: error
      expression_language: plain
      expression: Every tool definition has a unique name and a valid non-null JSON Schema inputSchema.
      explanation:
        zh: 每个 tool definition 都具有唯一 name 和有效且非 null 的 JSON Schema inputSchema。
        en: Every tool definition has a unique name and a valid non-null JSON Schema inputSchema.
        ja: 各 tool definition は一意 name と有効で non-null な JSON Schema inputSchema を持つ。
      source_claims: [mcp-tool-list-definition]
    - id: tool-list-is-not-call-result
      severity: error
      expression_language: plain
      expression: Tool-list definitions do not substitute for content and isError returned by tools/call.
      explanation:
        zh: tool-list definitions 不替代 tools/call 返回的 content 和 isError。
        en: Tool-list definitions do not substitute for content and isError returned by tools/call.
        ja: tool-list definitions は tools/call が返す content と isError を代替しない。
      source_claims: [mcp-tool-list-protocol, mcp-tool-list-call]
  required_relations: []
examples:
  - id: mcp-tool-list-positive-weather

    labels: {zh: 发现天气工具, en: Discover weather tool, ja: 天気ツールを発見}

    descriptions:
      zh: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。
      en: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths.
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"jsonrpc":"2.0","id":1,"result":{"tools":[{"name":"get_weather","description":"Read current weather","inputSchema":{"type":"object"}}],"nextCursor":"next-page"},"local_list_variant":"tools","local_entry_set":[{"name":"get_weather","description":"Read current weather","inputSchema":{"type":"object"}}],"tools":[{"name":"get_weather","description":"Read current weather","inputSchema":{"type":"object"}}],"nextCursor":"next-page"}
    related_node_ids: [MCPListToolsResult, MCPDiscoveryListResult, MCPToolCallRequest]
    related_relation_ids: [MCPListToolsResult-is_a-MCPDiscoveryListResult]

    source_claims: [mcp-tool-list-capability, mcp-tool-list-protocol, mcp-tool-list-definition]
  - id: mcp-tool-list-counterexample-null-schema

    labels: {zh: 空 inputSchema 工具, en: Tool with null inputSchema, ja: null inputSchema の tool}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"jsonrpc":"2.0","id":2,"result":{"tools":[{"name":"get_weather","inputSchema":null}]},"local_list_variant":"tools","local_entry_set":[{"name":"get_weather","inputSchema":null}],"tools":[{"name":"get_weather","inputSchema":null}]}
    related_node_ids: [MCPListToolsResult]
    related_relation_ids: [MCPListToolsResult-is_a-MCPDiscoveryListResult]

    source_claims: [mcp-tool-list-definition]
  - id: mcp-tool-list-boundary-list-changed

    labels: {zh: 工具页与列表变化通知的边界, en: Boundary between tool page and list-changed notification, ja: tool page と list-changed 通知の境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"jsonrpc":"2.0","id":3,"result":{"tools":[]},"local_list_variant":"tools","local_entry_set":[],"tools":[]}
    related_node_ids: [MCPListToolsResult, MCPNotification]
    related_relation_ids: [MCPListToolsResult-is_a-MCPDiscoveryListResult]

    source_claims: [mcp-tool-list-changed]
  - id: mcp-tool-list-instance-weather-page

    labels: {zh: 天气工具页实例, en: Weather-tool page instance, ja: 天気ツールページ実例}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"jsonrpc":"2.0","id":1,"result":{"tools":[{"name":"get_weather","description":"Read current weather","inputSchema":{"type":"object"}}],"nextCursor":"next-page"},"local_list_variant":"tools","local_entry_set":[{"name":"get_weather","description":"Read current weather","inputSchema":{"type":"object"}}],"tools":[{"name":"get_weather","description":"Read current weather","inputSchema":{"type":"object"}}],"nextCursor":"next-page"}
    related_node_ids: [MCPListToolsResult, MCPDiscoveryListResult]
    related_relation_ids: [MCPListToolsResult-is_a-MCPDiscoveryListResult]

    source_claims: [mcp-tool-list-protocol]
parent_relation:
  id: MCPListToolsResult-is_a-MCPDiscoveryListResult
  predicate: is_a
  target: concept:MCPDiscoveryListResult
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是 MCP 发现列表结果的 tools/list 子类, en: is the tools/list subtype of MCP discovery-list result, ja: MCP ディスカバリー一覧結果の tools/list 下位型である}
  definition:
    zh: MCPListToolsResult 是承载可调用工具定义的 MCPDiscoveryListResult。
    en: MCPListToolsResult is an MCPDiscoveryListResult carrying callable tool definitions.
    ja: MCPListToolsResult は呼出可能 tool 定義を運ぶ MCPDiscoveryListResult である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_tool_list_subtype
    labels: {zh: 具有工具列表子类, en: has tool-list subtype, ja: tool 一覧下位型を持つ}
  conditions: []
  temporal_scope: response
  boundary_context: 该层级只表达 callable-tool discovery definitions，不包括工具调用、工具执行结果或模型 provider 格式。
  constraints:
    - id: tool-list-collection-fixed
      severity: error
      expression_language: plain
      expression: An MCPListToolsResult has tools collection entries returned by tools/list.
      explanation:
        zh: MCPListToolsResult 具有 tools/list 返回的 tools collection entries。
        en: An MCPListToolsResult has tools collection entries returned by tools/list.
        ja: MCPListToolsResult は tools/list が返す tools collection entries を持つ。
      source_claims: [mcp-tool-list-protocol]
  examples: []
  source_claims: [moonweave-mcp-list-tools-result-taxonomy]
  distinct_fact_rationale:
    zh: 子类由 tools collection、unique name 和 inputSchema contract 区分，不与 tools/call results 或 prompt/resource definitions 混合。
    en: The subtype is distinguished by tools collection, unique name, and inputSchema contract without mixing tools/call results or prompt/resource definitions.
    ja: この下位型は tools/call results や prompt/resource definitions を混ぜず、tools collection、一意 name、inputSchema contract により区別される。
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification — Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-specification
    locator: "User Interaction Model; Capabilities; Listing Tools; Calling Tools; List Changed Notification; Tool; Tool Names"
    relevance: Defines tools capability, list result and pagination, tool definition schema, separate calls and results, list change signals, and human control guidance.
source_claims:
  - id: mcp-tool-list-capability
    source: mcp-tools-2025-11-25
    supports: Servers supporting tools declare tools capability and optional listChanged during initialization.
    locator: "Capabilities"
    evidence_kind: normative
    confidence: high
  - id: moonweave-mcp-list-tools-result-taxonomy
    source: mcp-tools-2025-11-25
    supports: "Moonweave classifies the tools/list result as an MCPDiscoveryListResult for navigation; this subclass edge is a taxonomy design inference."
    locator: "Listing Tools"
    evidence_kind: design-inference
    confidence: high
  - id: mcp-tool-list-protocol
    source: mcp-tools-2025-11-25
    supports: tools/list returns tools definitions with optional nextCursor and pagination support.
    locator: "Listing Tools"
    evidence_kind: normative
    confidence: high
  - id: mcp-tool-list-definition
    source: mcp-tools-2025-11-25
    supports: A tool definition has unique name, description, and valid non-null JSON Schema inputSchema, with optional metadata and output schema.
    locator: "Tool; Tool Names"
    evidence_kind: normative
    confidence: high
  - id: mcp-tool-list-call
    source: mcp-tools-2025-11-25
    supports: tools/call is a separate request using name and arguments and returns content and isError result.
    locator: "Calling Tools"
    evidence_kind: normative
    confidence: high
  - id: mcp-tool-list-changed
    source: mcp-tools-2025-11-25
    supports: Servers declaring tools.listChanged should send notifications/tools/list_changed when available tools change.
    locator: "List Changed Notification"
    evidence_kind: normative
    confidence: high
