schema: moonweave.ai/ontology-node/v1
id: MCPListPromptsResult
kind: concept
labels:
  zh: MCP prompts/list 结果
  en: MCP prompts/list result
  ja: MCP prompts/list 結果
semantics:
  short_definition:
    zh: 服务器对 `prompts/list` 的成功 JSON-RPC 结果，列出可由客户端发现和选择的 prompt template 定义。
    en: The successful JSON-RPC result to `prompts/list`, enumerating prompt-template definitions discoverable and selectable by a client.
    ja: client が発見・選択できる prompt template 定義を列挙する `prompts/list` の成功 JSON-RPC 結果。
  definition:
    zh: >
      MCP 提示列表结果是 prompts/list 的 JSON-RPC result，包含 prompts 数组和可选 nextCursor。每个 prompt definition 具有唯一 name，
      可带 title、description、icons 和可自定义的 arguments。该列表仅发布 prompt template 声明；具体消息内容由 prompts/get
      返回，且 prompt 的使用仍由 client 和用户控制。它不是模型 sampling request 或已渲染 prompt message。
    en: >
      An MCP prompt-list result is the JSON-RPC result of prompts/list containing prompts array and optional nextCursor. Each prompt
      definition has a unique name and may include title, description, icons, and customizable arguments. The list publishes prompt
      template declarations only; concrete messages are returned by prompts/get and prompt use remains under client and user control.
      It is not a model sampling request or an already-rendered prompt message.
    ja: >
      MCP プロンプト一覧結果は prompts 配列と任意 nextCursor を含む prompts/list の JSON-RPC result である。各 prompt definition は
      一意 name を持ち、title、description、icons、カスタマイズ可能 arguments を持てる。一覧は prompt template 宣言だけを公開し、
      具体 messages は prompts/get が返し、prompt の利用は client とユーザー制御下に残る。モデル sampling 要求や既に render された prompt message ではない。
  why_needed:
    zh: 客户端可向用户展示可选 prompt 模板及其参数，而无需预先知道 server 的模板名称或获取每个模板的完整消息。
    en: Clients can show users available prompt templates and their parameters without knowing server template names in advance or fetching every template's full messages.
    ja: client は server template 名を事前に知ったり各 template の完全 messages を取得したりせずに、利用可能 prompt template と parameters をユーザーに示せる。
  includes:
    - {zh: prompts 数组, en: prompts array, ja: prompts 配列}
    -
      zh: prompt name、metadata 和可选 arguments
      en: Prompt name, metadata, and optional arguments
      ja: prompt name、metadata、任意 arguments
    - {zh: nextCursor 分页, en: nextCursor pagination, ja: nextCursor ページネーション}
  excludes:
    - {zh: prompts/get 的 messages, en: prompts/get messages, ja: prompts/get の messages}
    - {zh: 模型采样或用户已批准调用, en: Model sampling or a user-approved invocation, ja: モデル sampling またはユーザー承認済み呼出し}
  semantic_kind: result
  aliases:
    - {language: en, value: ListPromptsResult, alias_kind: protocol-type}
engineering:
  explanation:
    zh: client 先确认 server 宣布 prompts capability，发送 prompts/list 和可选 cursor。server 以同 id 返回 prompt definitions 与 nextCursor；client 可让用户选择，再以 prompts/get 和 name/arguments 获取具体 messages。
    en: A client confirms server prompts capability then sends prompts/list with optional cursor. The server returns prompt definitions and nextCursor with the same id; the client may let a user select one and then use prompts/get with name and arguments for concrete messages.
    ja: client は server prompts capability を確認して任意 cursor 付き prompts/list を送る。server は同じ id で prompt definitions と nextCursor を返し、client はユーザーに選択させ、その後 prompts/get と name/arguments で具体 messages を取得できる。
  typical_input:
    - description: List prompt templates.
      format: '{"jsonrpc":"2.0","id":1,"method":"prompts/list","params":{"cursor":"optional-cursor"}}'
      source_claims: [mcp-prompt-list-protocol]
  typical_output:
    - description: A page of prompt definitions.
      format: '{"jsonrpc":"2.0","id":1,"result":{"prompts":[{"name":"code_review","description":"Review code","arguments":[{"name":"code","required":true}]}],"nextCursor":"next-page"}}'
      source_claims: [mcp-prompt-list-protocol]
  reference_implementations:
    - name: MCP Prompts specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
      description: Defines prompt list, prompt definition, prompt get, pagination, and user-controlled prompt exposure.
structure:
  identity_keys: ["id", "local_list_variant"]
  fields:
    - id: jsonrpc
      labels: {zh: "JSON-RPC 版本", en: "JSON-RPC version", ja: "JSON-RPC バージョン"}
      definitions:
        zh: "该结果包络中的原生 jsonrpc 成员，值必须为 \"2.0\"。"
        en: "The native jsonrpc member of this result envelope; it must be \"2.0\"."
        ja: "この結果エンベロープのネイティブな jsonrpc メンバーで、値は \"2.0\" でなければならない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2.0"
      allowed_values: ["2.0"]
      source_claims: [mcp-prompt-list-protocol]
    - id: id
      labels: {zh: "JSON-RPC 标识", en: "JSON-RPC id", ja: "JSON-RPC id"}
      definitions:
        zh: "与相应列表请求关联的原生 JSON-RPC id。"
        en: "The native JSON-RPC id correlating the result to its list request."
        ja: "対応する一覧要求に結果を関連付けるネイティブな JSON-RPC id。"
      datatype: string-or-number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims: [mcp-prompt-list-protocol]
    - id: result
      labels: {zh: "结果对象", en: "Result object", ja: "結果オブジェクト"}
      definitions:
        zh: "从 MCPDiscoveryListResult 继承的原生 JSON-RPC result；此子类型的对象包含 `prompts` 和可选 `nextCursor`。"
        en: "The native JSON-RPC result inherited from MCPDiscoveryListResult; this subtype's object contains `prompts` and optional `nextCursor`."
        ja: "MCPDiscoveryListResult から継承するネイティブな JSON-RPC result。この下位型のオブジェクトは `prompts` と任意の `nextCursor` を含む。"
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: {"prompts":[{"name":"code_review"}],"nextCursor":"next-page"}
      allowed_values: []
      source_claims: [mcp-prompt-list-protocol]
    - id: local_list_variant
      labels: {zh: "本地列表变体", en: "Local list variant", ja: "ローカル一覧バリアント"}
      definitions:
        zh: "从 MCPDiscoveryListResult 继承的 Moonweave 分类；此子类型固定为 `prompts`，不是 MCP wire 字段。"
        en: "The Moonweave classification inherited from MCPDiscoveryListResult; this subtype fixes it to `prompts`, not an MCP wire field."
        ja: "MCPDiscoveryListResult から継承する Moonweave 分類。この下位型では MCP wire フィールドではなく `prompts` に固定される。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "prompts"
      allowed_values: ["prompts"]
      source_claims: [moonweave-mcp-list-prompts-result-taxonomy]
    - id: local_entry_set
      labels: {zh: "本地条目集合", en: "Local entry set", ja: "ローカルエントリー集合"}
      definitions:
        zh: "从 MCPDiscoveryListResult 继承的 Moonweave 查看值，引用本结果的原生 `result.prompts` 数组。"
        en: "The Moonweave view inherited from MCPDiscoveryListResult, referring to this result's native `result.prompts` array."
        ja: "MCPDiscoveryListResult から継承する Moonweave 表示値で、この結果のネイティブな `result.prompts` 配列を参照する。"
      datatype: array
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: [{"name":"code_review"}]
      allowed_values: []
      source_claims: [moonweave-mcp-list-prompts-result-taxonomy]
    - id: prompts
      labels: {zh: "提示词定义", en: "Prompt definitions", ja: "プロンプト定義"}
      definitions:
        zh: "原生 result.prompts 数组，包含提示词模板定义而不是 prompts/get 的渲染消息。"
        en: "The native result.prompts array of prompt-template definitions, not rendered prompts/get messages."
        ja: "プロンプトテンプレート定義を含むネイティブな result.prompts 配列。prompts/get の描画済みメッセージではない。"
      datatype: array
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: [{"name":"code_review","description":"Review code"}]
      allowed_values: []
      source_claims: [mcp-prompt-list-protocol, mcp-prompt-list-definition]
    - id: nextCursor
      labels: {zh: "下一游标", en: "Next cursor", ja: "次カーソル"}
      definitions:
        zh: "可选的原生 result.nextCursor 成员，用于取得后续页。"
        en: "The optional native result.nextCursor member used to obtain a subsequent page."
        ja: "後続ページを取得するための任意のネイティブな result.nextCursor メンバー。"
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: "next-page"
      allowed_values: []
      source_claims: [mcp-prompt-list-protocol]
  constraints:
    - id: prompt-list-requires-server-capability
      severity: error
      expression_language: plain
      expression: prompts/list is used only when the server declared prompts capability.
      explanation:
        zh: 只有 server 声明 prompts capability 时才使用 prompts/list。
        en: prompts/list is used only when the server declared prompts capability.
        ja: prompts/list は server が prompts capability を宣言した場合にのみ使う。
      source_claims: [mcp-prompt-list-capability]
    - id: prompt-list-does-not-return-prompt-messages
      severity: error
      expression_language: plain
      expression: Prompt-list entries are definitions; concrete prompt messages are returned by prompts/get.
      explanation:
        zh: prompt-list 条目是 definitions；具体 prompt messages 由 prompts/get 返回。
        en: Prompt-list entries are definitions; concrete prompt messages are returned by prompts/get.
        ja: prompt-list 項目は definitions であり、具体 prompt messages は prompts/get が返す。
      source_claims: [mcp-prompt-list-protocol, mcp-prompt-list-get]
  required_relations: []
examples:
  - id: mcp-prompt-list-positive-code-review

    labels: {zh: 发现 code_review 提示, en: Discover code_review prompt, ja: code_review prompt を発見}

    descriptions:
      zh: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。
      en: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths.
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"jsonrpc":"2.0","id":1,"result":{"prompts":[{"name":"code_review","description":"Review code"}],"nextCursor":"next-page"},"local_list_variant":"prompts","local_entry_set":[{"name":"code_review","description":"Review code"}],"prompts":[{"name":"code_review","description":"Review code"}],"nextCursor":"next-page"}
    related_node_ids: [MCPListPromptsResult, MCPDiscoveryListResult, MCPPromptGetRequest]
    related_relation_ids: [MCPListPromptsResult-is_a-MCPDiscoveryListResult]

    source_claims: [mcp-prompt-list-capability, mcp-prompt-list-protocol]
  - id: mcp-prompt-list-counterexample-messages-in-list

    labels: {zh: 列表中返回渲染消息, en: Rendered messages returned in list, ja: 一覧で render messages を返す}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"jsonrpc":"2.0","id":2,"result":{"prompts":[{"name":"code_review","messages":["rendered message"]}]},"local_list_variant":"prompts","local_entry_set":[{"name":"code_review","messages":["rendered message"]}],"prompts":[{"name":"code_review","messages":["rendered message"]}]}
    related_node_ids: [MCPListPromptsResult, MCPPromptGetRequest]
    related_relation_ids: [MCPListPromptsResult-is_a-MCPDiscoveryListResult]

    source_claims: [mcp-prompt-list-protocol, mcp-prompt-list-get]
  - id: mcp-prompt-list-boundary-list-changed

    labels: {zh: 列表页与列表变化通知的边界, en: Boundary between list page and list-changed notification, ja: 一覧ページと一覧変更通知の境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"jsonrpc":"2.0","id":3,"result":{"prompts":[]},"local_list_variant":"prompts","local_entry_set":[],"prompts":[]}
    related_node_ids: [MCPListPromptsResult, MCPNotification]
    related_relation_ids: [MCPListPromptsResult-is_a-MCPDiscoveryListResult]

    source_claims: [mcp-prompt-list-changed]
  - id: mcp-prompt-list-instance-code-review-page

    labels: {zh: code_review 列表页实例, en: code_review list-page instance, ja: code_review 一覧ページ実例}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"jsonrpc":"2.0","id":1,"result":{"prompts":[{"name":"code_review","description":"Review code"}],"nextCursor":"next-page"},"local_list_variant":"prompts","local_entry_set":[{"name":"code_review","description":"Review code"}],"prompts":[{"name":"code_review","description":"Review code"}],"nextCursor":"next-page"}
    related_node_ids: [MCPListPromptsResult, MCPDiscoveryListResult]
    related_relation_ids: [MCPListPromptsResult-is_a-MCPDiscoveryListResult]

    source_claims: [mcp-prompt-list-protocol]
parent_relation:
  id: MCPListPromptsResult-is_a-MCPDiscoveryListResult
  predicate: is_a
  target: concept:MCPDiscoveryListResult
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是 MCP 发现列表结果的 prompts/list 子类, en: is the prompts/list subtype of MCP discovery-list result, ja: MCP ディスカバリー一覧結果の prompts/list 下位型である}
  definition:
    zh: MCPListPromptsResult 是承载 prompt template definitions 的 MCPDiscoveryListResult。
    en: MCPListPromptsResult is an MCPDiscoveryListResult carrying prompt-template definitions.
    ja: MCPListPromptsResult は prompt template definitions を運ぶ MCPDiscoveryListResult である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_prompt_list_subtype
    labels: {zh: 具有提示列表子类, en: has prompt-list subtype, ja: prompt 一覧下位型を持つ}
  conditions: []
  temporal_scope: response
  boundary_context: 该层级仅表达 prompt template discovery result，不包括 prompts/get messages、sampling 或 UI 命令。
  constraints:
    - id: prompt-list-collection-fixed
      severity: error
      expression_language: plain
      expression: An MCPListPromptsResult has prompts collection entries returned by prompts/list.
      explanation:
        zh: MCPListPromptsResult 具有由 prompts/list 返回的 prompts collection entries。
        en: An MCPListPromptsResult has prompts collection entries returned by prompts/list.
        ja: MCPListPromptsResult は prompts/list が返す prompts collection entries を持つ。
      source_claims: [mcp-prompt-list-protocol]
  examples: []
  source_claims: [moonweave-mcp-list-prompts-result-taxonomy]
  distinct_fact_rationale:
    zh: 子类由 prompts collection 和 template metadata 区分，不与 concrete messages 或 tools/resources collections 混合。
    en: The subtype is distinguished by prompts collection and template metadata without mixing concrete messages or tools/resources collections.
    ja: この下位型は concrete messages や tools/resources collection を混ぜず、prompts collection と template metadata で区別される。
relations: []
sources:
  - id: mcp-prompts-2025-11-25
    title: Model Context Protocol Specification — Prompts
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
    source_type: official-specification
    locator: "User Interaction Model; Capabilities; Listing Prompts; Getting a Prompt; List Changed Notification; Prompt"
    relevance: Defines prompt capability, prompt list definitions and pagination, prompt get messages, list change signals, and user-controlled selection.
source_claims:
  - id: mcp-prompt-list-capability
    source: mcp-prompts-2025-11-25
    supports: Servers supporting prompts declare prompts capability and optional listChanged during initialization.
    locator: "Capabilities"
    evidence_kind: normative
    confidence: high
  - id: moonweave-mcp-list-prompts-result-taxonomy
    source: mcp-prompts-2025-11-25
    supports: "Moonweave classifies the prompts/list result as an MCPDiscoveryListResult for navigation; this subclass edge is a taxonomy design inference."
    locator: "Listing Prompts"
    evidence_kind: design-inference
    confidence: high
  - id: mcp-prompt-list-protocol
    source: mcp-prompts-2025-11-25
    supports: prompts/list returns prompts definitions and optional nextCursor with pagination support.
    locator: "Listing Prompts"
    evidence_kind: normative
    confidence: high
  - id: mcp-prompt-list-definition
    source: mcp-prompts-2025-11-25
    supports: Prompt definitions have unique name and optional title, description, icons, and arguments.
    locator: "Prompt"
    evidence_kind: normative
    confidence: high
  - id: mcp-prompt-list-get
    source: mcp-prompts-2025-11-25
    supports: prompts/get with prompt name and optional arguments returns concrete description and messages.
    locator: "Getting a Prompt"
    evidence_kind: normative
    confidence: high
  - id: mcp-prompt-list-changed
    source: mcp-prompts-2025-11-25
    supports: A server declaring prompts.listChanged should send notifications/prompts/list_changed when available prompts change.
    locator: "List Changed Notification"
    evidence_kind: normative
    confidence: high
