schema: moonweave.ai/ontology-node/v1
id: MCPDiscoveryListResult
kind: concept
labels:
  zh: MCP 发现列表结果
  en: MCP discovery-list result
  ja: MCP ディスカバリー一覧結果
semantics:
  short_definition:
    zh: 由 MCP 发现列表方法返回、包含 prompts、resources、resource templates 或 tools 声明条目的成功 JSON-RPC 结果。
    en: A successful JSON-RPC result from an MCP discovery list method containing prompt, resource, resource-template, or tool declarations.
    ja: prompt、resource、resource template、tool の宣言項目を含む MCP ディスカバリー一覧メソッドの成功 JSON-RPC 結果。
  definition:
    zh: >
      MCP 发现列表结果是服务器发现请求的 JSON-RPC 成功响应及其 result payload。prompts/list 返回 prompts，resources/list 返回 resources，
      resources/templates/list 返回 resourceTemplates，tools/list 返回 tools；这些列表方法可使用 pagination cursor/nextCursor。
      此概念不包括 resources/read 的 contents、tools/call 的 content、单一 prompt get 结果或 client 返回的 roots/list。
    en: >
      An MCP discovery-list result is the successful JSON-RPC response and result payload for a server discovery request. prompts/list returns prompts,
      resources/list returns resources, resources/templates/list returns resourceTemplates, and tools/list returns tools; these list
      methods may use pagination cursor and nextCursor. It excludes resources/read contents, tools/call content, one prompt-get result,
      and the client-returned roots/list result.
    ja: >
      MCP ディスカバリー一覧結果は server 発見要求の成功 JSON-RPC 応答と result payload である。prompts/list は prompts、resources/list は
      resources、resources/templates/list は resourceTemplates、tools/list は tools を返す。これら list method は pagination
      cursor と nextCursor を使える。resources/read content、tools/call content、一件の prompt get 結果、client が返す roots/list 結果は除く。
  why_needed:
    zh: 客户端可先获得结构化可用功能声明，再决定在协商会话中读取、获取或调用什么。
    en: Clients can obtain structured declarations of available features before deciding what to read, get, or call in a negotiated session.
    ja: client は交渉済みセッションで何を read、get、call するか決める前に利用可能機能の構造化宣言を得られる。
  includes:
    -
      zh: prompts、resources、resourceTemplates 或 tools 数组
      en: prompts, resources, resourceTemplates, or tools array
      ja: prompts、resources、resourceTemplates、tools 配列
    - {zh: 可选 nextCursor 分页连续标识, en: Optional nextCursor pagination continuation, ja: 任意 nextCursor ページネーション継続}
  excludes:
    - {zh: resource contents 或 tool execution content, en: Resource contents or tool-execution content, ja: resource content または tool 実行 content}
    - {zh: client 返回的 roots/list 结果, en: A roots/list result returned by a client, ja: client が返す roots/list 結果}
  semantic_kind: result
  aliases:
    - {language: en, value: discovery result, alias_kind: synonym}
engineering:
  explanation:
    zh: client 发送相应 list method，server 以同一 JSON-RPC id 返回其中一个正确命名的条目数组和可选 nextCursor。client 仅将这些声明视为可发现对象，具体操作仍使用 get/read/call 等单独方法。
    en: A client sends the applicable list method and the server returns one correctly named entry array and optional nextCursor with the same JSON-RPC id. A client treats entries as discoverable declarations; concrete operations still use separate get, read, or call methods.
    ja: client は該当 list method を送り、server は同じ JSON-RPC id で正しい名前の entry 配列と任意 nextCursor を返す。client は entry を発見可能宣言として扱い、具体操作には別の get、read、call を使う。
  typical_input:
    - description: Discover tools, with optional pagination cursor.
      format: '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{"cursor":"optional-cursor"}}'
      source_claims: [mcp-discovery-list-tools]
  typical_output:
    - description: A page of declared tool definitions.
      format: '{"jsonrpc":"2.0","id":1,"result":{"tools":[{"name":"get_weather","inputSchema":{"type":"object"}}],"nextCursor":"next-page"}}'
      source_claims: [mcp-discovery-list-tools]
  reference_implementations:
    - name: MCP Server Features specifications
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines tools/list and the related server discovery result family.
structure:
  identity_keys: ["id","local_list_variant"]
  fields:
    - id: jsonrpc
      labels: {zh: "JSON-RPC 版本", en: "JSON-RPC version", ja: "JSON-RPC バージョン"}
      definitions:
        zh: "继承自 MCPResultResponse 的原生信封成员，值必须为 `2.0`。"
        en: "The native envelope member inherited from MCPResultResponse; its value must be `2.0`."
        ja: "MCPResultResponse から継承するネイティブなエンベロープメンバーで、値は `2.0` でなければならない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2.0"
      allowed_values: ["2.0"]
      source_claims: [mcp-discovery-list-tools]
    - id: id
      labels: {zh: "JSON-RPC 标识", en: "JSON-RPC id", ja: "JSON-RPC id"}
      definitions:
        zh: "继承自 MCPResultResponse 的原生请求关联标识，必须与相应发现请求的 id 相同。"
        en: "The native request-correlation identifier inherited from MCPResultResponse, equal to the corresponding discovery request id."
        ja: "MCPResultResponse から継承するネイティブな要求相関識別子で、対応するディスカバリー要求の id と同じである。"
      datatype: string-or-number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims: [mcp-discovery-list-tools]
    - id: result
      labels: {zh: "结果对象", en: "Result object", ja: "結果オブジェクト"}
      definitions:
        zh: "继承自 MCPResultResponse 的原生 result 对象；此子类型在其中放入一个发现条目数组及可选 nextCursor。"
        en: "The native result object inherited from MCPResultResponse; this subtype places one discovery-entry array and optional nextCursor inside it."
        ja: "MCPResultResponse から継承するネイティブな result オブジェクト。この下位型では一つのディスカバリー項目配列と任意の nextCursor を入れる。"
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: {"tools":[{"name":"get_weather"}],"nextCursor":"next-page"}
      allowed_values: []
      source_claims: [mcp-discovery-list-tools]
    - id: local_list_variant
      labels: {zh: "本地列表变体", en: "Local list variant", ja: "ローカル一覧バリアント"}
      definitions:
        zh: "Moonweave 的本地分类标签，用于汇总 prompts、resources、resourceTemplates 或 tools 列表；它不是 MCP wire 字段。"
        en: "A Moonweave-local classification tag grouping prompts, resources, resourceTemplates, or tools lists; it is not an MCP wire field."
        ja: "prompts、resources、resourceTemplates、tools の一覧をまとめる Moonweave ローカル分類タグ。MCP の wire フィールドではない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "tools"
      allowed_values: ["prompts","resources","resourceTemplates","tools"]
      source_claims: [moonweave-mcp-discovery-list-taxonomy]
    - id: local_entry_set
      labels: {zh: "本地条目集合", en: "Local entry set", ja: "ローカルエントリー集合"}
      definitions:
        zh: "Moonweave 的本地查看值，指向变体对应的原生 result.prompts、result.resources、result.resourceTemplates 或 result.tools；它本身不是 wire 字段。"
        en: "A Moonweave-local viewing value referring to the variant's native result.prompts, result.resources, result.resourceTemplates, or result.tools; it is not itself a wire field."
        ja: "バリアントのネイティブな result.prompts、result.resources、result.resourceTemplates、result.tools を参照する Moonweave ローカル表示値。それ自体は wire フィールドではない。"
      datatype: array
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: []
      allowed_values: []
      source_claims: [moonweave-mcp-discovery-list-taxonomy]
    - id: nextCursor
      labels: {zh: "下一游标", en: "Next cursor", ja: "次カーソル"}
      definitions:
        zh: "具体的可分页列表结果中可选的原生 nextCursor 成员。"
        en: "The optional native nextCursor member on a concrete paginated list result."
        ja: "具体的なページング一覧結果にある任意のネイティブな nextCursor メンバー。"
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: "next-page"
      allowed_values: []
      source_claims: [mcp-discovery-list-pagination]
  constraints:
    - id: discovery-list-key-matches-method
      severity: error
      expression_language: plain
      expression: 'The result collection key matches the invoked discovery method: prompts/list, resources/list, resources/templates/list, or tools/list.'
      explanation:
        zh: 结果集合键必须匹配所调用发现方法：prompts/list、resources/list、resources/templates/list 或 tools/list。
        en: 'The result collection key matches the invoked discovery method: prompts/list, resources/list, resources/templates/list, or tools/list.'
        ja: 結果コレクションキーは呼び出した発見 method（prompts/list、resources/list、resources/templates/list、tools/list）に一致する。
      source_claims: [mcp-discovery-list-prompts, mcp-discovery-list-resources, mcp-discovery-list-tools]
    - id: discovery-list-is-not-content-result
      severity: error
      expression_language: plain
      expression: A discovery-list result advertises entries and does not substitute for resources/read contents or tools/call content.
      explanation:
        zh: discovery-list result 公布条目，不替代 resources/read contents 或 tools/call content。
        en: A discovery-list result advertises entries and does not substitute for resources/read contents or tools/call content.
        ja: discovery-list result は項目を公開し、resources/read content や tools/call content を代替しない。
      source_claims: [mcp-discovery-list-resources, mcp-discovery-list-tools]
  required_relations: []
examples:
  - id: mcp-discovery-list-positive-tools

    labels: {zh: 工具定义页, en: Tool-definition page, ja: ツール定義ページ}

    descriptions:
      zh: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。
      en: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths.
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"jsonrpc":"2.0","id":1,"result":{"tools":[{"name":"get_weather","inputSchema":{"type":"object"}}],"nextCursor":"next-page"},"local_list_variant":"tools","local_entry_set":[{"name":"get_weather"}],"nextCursor":"next-page"}
    related_node_ids: [MCPDiscoveryListResult, MCPListToolsResult, MCPResultResponse]
    related_relation_ids: [MCPDiscoveryListResult-is_a-MCPResultResponse]

    source_claims: [mcp-discovery-list-tools, mcp-discovery-list-pagination]
  - id: mcp-discovery-list-counterexample-contents-as-resources

    labels: {zh: 将资源内容伪装为资源列表, en: Resource contents masquerading as resource list, ja: resource content を resource list に偽装}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"jsonrpc":"2.0","id":2,"result":{"resources":[{"uri":"file:///project/README.md","text":"incorrectly embedded content"}]},"local_list_variant":"resources","local_entry_set":[{"uri":"file:///project/README.md","text":"incorrectly embedded content"}]}
    related_node_ids: [MCPDiscoveryListResult, MCPListResourcesResult, MCPResourceReadRequest]
    related_relation_ids: [MCPDiscoveryListResult-is_a-MCPResultResponse]

    source_claims: [mcp-discovery-list-resources]
  - id: mcp-discovery-list-boundary-roots

    labels: {zh: 服务器定义列表与 client roots 的边界, en: Boundary between server definitions and client roots, ja: server 定義一覧と client roots の境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"jsonrpc":"2.0","id":3,"result":{"resources":[{"uri":"file:///project/README.md","name":"README.md"}]},"local_list_variant":"resources","local_entry_set":[{"uri":"file:///project/README.md","name":"README.md"}]}
    related_node_ids: [MCPDiscoveryListResult, MCPListResourcesResult, MCPListRootsResult]
    related_relation_ids: [MCPDiscoveryListResult-is_a-MCPResultResponse]

    source_claims: [mcp-discovery-list-resources, mcp-discovery-list-roots]
  - id: mcp-discovery-list-instance-template-page

    labels: {zh: 资源模板定义页实例, en: Resource-template definition-page instance, ja: resource template 定義ページ実例}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"jsonrpc":"2.0","id":4,"result":{"resourceTemplates":[{"uriTemplate":"file:///{path}","name":"workspace file"}]},"local_list_variant":"resourceTemplates","local_entry_set":[{"uriTemplate":"file:///{path}","name":"workspace file"}]}
    related_node_ids: [MCPDiscoveryListResult, MCPListResourceTemplatesResult]
    related_relation_ids: [MCPDiscoveryListResult-is_a-MCPResultResponse]

    source_claims: [mcp-discovery-list-resources]
parent_relation:
  id: MCPDiscoveryListResult-is_a-MCPResultResponse
  predicate: is_a
  target: concept:MCPResultResponse
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是 MCP 成功响应的发现列表子类, en: is the discovery-list subtype of MCP result response, ja: MCP 成功応答のディスカバリー一覧下位型である}
  definition:
    zh: MCP 发现列表结果是承载服务器可发现声明条目的 MCP 成功响应。
    en: An MCP discovery-list result is an MCP successful response that carries server-discoverable declaration entries.
    ja: MCP ディスカバリー一覧結果は server 発見可能な宣言項目を運ぶ MCP 成功応答である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_discovery_list_result_subtype
    labels: {zh: 具有发现列表结果子类, en: has discovery-list result subtype, ja: ディスカバリー一覧結果下位型を持つ}
  conditions: []
  temporal_scope: response
  boundary_context: 此层级限定 server discovery-list result，不包括内容结果、执行结果或 client-returned roots/list result。
  constraints:
    - id: discovery-list-is-success-result
      severity: error
      expression_language: plain
      expression: An MCPDiscoveryListResult is a successful JSON-RPC result for a server discovery list method.
      explanation:
        zh: MCPDiscoveryListResult 是 server discovery list method 的成功 JSON-RPC result。
        en: An MCPDiscoveryListResult is a successful JSON-RPC result for a server discovery list method.
        ja: MCPDiscoveryListResult は server discovery list method の成功 JSON-RPC result である。
      source_claims: [mcp-discovery-list-prompts, mcp-discovery-list-resources, mcp-discovery-list-tools]
  examples: []
  source_claims: [moonweave-mcp-discovery-list-taxonomy]
  distinct_fact_rationale:
    zh: 子类由发现列表的结构化声明 payload 区分，不由任意数组、内容数组或 pagination 字段本身区分。
    en: The subtype is distinguished by structured discovery-declaration payload, not an arbitrary array, content array, or pagination field alone.
    ja: この下位型は任意配列、content 配列、pagination field だけではなく、構造化 discovery 宣言 payload により区別される。
relations: []
sources:
  - id: mcp-prompts-2025-11-25
    title: Model Context Protocol Specification — Prompts
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
    source_type: official-specification
    locator: "Listing Prompts"
    relevance: Defines prompts/list result entries and pagination.
  - id: mcp-resources-2025-11-25
    title: Model Context Protocol Specification — Resources
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
    source_type: official-specification
    locator: "Listing Resources; Resource Templates; Reading Resources"
    relevance: Defines resources/list, resources/templates/list, pagination, and separate resource-content reads.
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification — Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-specification
    locator: "Listing Tools; Calling Tools"
    relevance: Defines tools/list definitions, pagination, and separate tool execution result content.
  - id: mcp-roots-2025-11-25
    title: Model Context Protocol Specification — Roots
    url: https://modelcontextprotocol.io/specification/2025-11-25/client/roots
    source_type: official-specification
    locator: "Listing Roots"
    relevance: Defines roots/list as a client response distinct from server definition discovery.
source_claims:
  - id: mcp-discovery-list-prompts
    source: mcp-prompts-2025-11-25
    supports: prompts/list returns a prompts definition list and supports pagination.
    locator: "Listing Prompts"
    evidence_kind: normative
    confidence: high
  - id: moonweave-mcp-discovery-list-taxonomy
    source: mcp-prompts-2025-11-25
    supports: "Moonweave groups the protocol's prompt, resource, tool, and template listing results under MCPDiscoveryListResult for navigation; this subclass edge is a taxonomy design inference."
    locator: "Listing Prompts"
    evidence_kind: design-inference
    confidence: high
  - id: mcp-discovery-list-resources
    source: mcp-resources-2025-11-25
    supports: resources/list returns resources, resources/templates/list returns resourceTemplates, and resources/read separately returns contents.
    locator: "Listing Resources; Resource Templates; Reading Resources"
    evidence_kind: normative
    confidence: high
  - id: mcp-discovery-list-tools
    source: mcp-tools-2025-11-25
    supports: tools/list returns tool definition entries while tools/call separately returns execution content.
    locator: "Listing Tools; Calling Tools"
    evidence_kind: normative
    confidence: high
  - id: mcp-discovery-list-pagination
    source: mcp-tools-2025-11-25
    supports: MCP list results may use cursor request parameter and nextCursor response continuation.
    locator: "Listing Tools"
    evidence_kind: normative
    confidence: high
  - id: mcp-discovery-list-roots
    source: mcp-roots-2025-11-25
    supports: roots/list is a client capability request-response that returns client-provided roots, distinct from server discovery lists.
    locator: "Listing Roots"
    evidence_kind: normative
    confidence: high
