schema: moonweave.ai/ontology-node/v1
id: MCPListResourceTemplatesResult
kind: concept
labels:
  zh: MCP resources/templates/list 结果
  en: MCP resources/templates/list result
  ja: MCP resources/templates/list 結果
semantics:
  short_definition:
    zh: 对 `resources/templates/list` 的成功响应中按 URI 模板公开的资源模板集合。
    en: The resource template collection exposed by the successful response to `resources/templates/list`.
    ja: '`resources/templates/list` への成功レスポンスでURI templateとして公開されるresource template集合。'
  definition:
    zh: >
      MCP 资源模板列表结果是 `resources/templates/list` 成功响应的 `resourceTemplates` 数组。每个
      ResourceTemplate 提供 `uriTemplate`、name 以及可选 title、description、mimeType 和 icons，
      用于暴露参数化资源的可发现模式。它不等同于 `resources/list` 返回的具体 Resource 记录，也不等同于
      通过 resources/read 返回的内容。
    en: >
      An MCP resource template list result is the `resourceTemplates` array in a successful
      `resources/templates/list` response. Each ResourceTemplate provides uriTemplate, name,
      and optional title, description, mimeType, and icons to expose a discoverable pattern for
      parameterized resources. It is not the concrete Resource records returned by `resources/list`
      or the contents returned through resources/read.
    ja: >
      MCP resource template list結果は成功した `resources/templates/list` レスポンスの
      `resourceTemplates` 配列である。各ResourceTemplateはuriTemplate、name、任意のtitle、description、
      mimeType、iconsを提供し、パラメーター化resourceの発見可能なパターンを公開する。これは
      `resources/list` が返す具体的Resourceレコードやresources/readが返す内容ではない。
  why_needed:
    zh: >
      模板让服务器描述一类资源而不必预先枚举每个实例，例如 `file:///{path}`。客户端可将模板与参数
      补全或用户选择结合，再对具体 URI 进行 resources/read；这避免把 URI 模式误当成某个已存在资源。
    en: >
      Templates let a server describe a class of resources without enumerating every instance,
      for example `file:///{path}`. A client can combine a template with argument completion or
      user selection and then issue resources/read for a concrete URI, avoiding confusion between
      a URI pattern and an existing resource.
    ja: >
      templateによりサーバーは、たとえば `file:///{path}` のように全インスタンスを列挙せずresourceの
      クラスを記述できる。クライアントはtemplateをargument補完またはユーザー選択と組み合わせ、具体URIに
      resources/readを発行できるため、URIパターンと既存resourceを混同しない。
  includes:
    - zh: '`resources/templates/list` 成功 result 中的 `resourceTemplates` 数组。'
      en: The `resourceTemplates` array in a successful `resources/templates/list` result.
      ja: 成功した `resources/templates/list` resultの `resourceTemplates` 配列。
    - zh: 每个模板的 URI template、name 和可选展示元数据。
      en: URI template, name, and optional display metadata for each template.
      ja: 各templateのURI template、name、任意の表示メタデータ。
    - zh: 参数化资源的发现信息。
      en: Discovery information for parameterized resources.
      ja: パラメーター化resourceの発見情報。
  excludes:
    - zh: '`resources/list` 返回的具体 resources 数组。'
      en: The concrete resources array returned by `resources/list`.
      ja: '`resources/list` が返す具体的resources配列。'
    - zh: resources/read 返回的 text 或 blob ResourceContents。
      en: Text or blob ResourceContents returned by resources/read.
      ja: resources/readが返すtextまたはblob ResourceContents。
  semantic_kind: information
  aliases:
    - language: en
      value: resources templates list result
      alias_kind: synonym
engineering:
  explanation:
    zh: >
      客户端在服务器声明 resources 后发送 `resources/templates/list`。服务器返回每个模板的 RFC 6570
      风格 uriTemplate 与 metadata。客户端不得将模板原样传给 resources/read；它先用参数生成一个具体、
      有效 URI，再按资源和主机授权边界读取该 URI。
    en: >
      After the server declares resources, a client sends `resources/templates/list`. The server
      returns each RFC 6570-style uriTemplate with metadata. The client does not pass the template
      verbatim to resources/read; it first expands parameters to a concrete valid URI and then
      reads that URI subject to resource and host authorization boundaries.
    ja: >
      サーバーがresourcesを宣言した後、クライアントは `resources/templates/list` を送る。サーバーは各
      RFC 6570風uriTemplateとmetadataを返す。クライアントはtemplateをそのままresources/readへ渡さず、
      まずparametersを具体的で有効なURIへ展開し、resourceとhost認可境界に従ってそのURIを読み取る。
  typical_input:
    - description: Client asks a resources-capable server for parameterized resource templates.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 3,
          "method": "resources/templates/list",
          "params": {}
        }
      source_claims: [mcp-resource-templates-list]
  typical_output:
    - description: Server returns a named file URI template.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 3,
          "result": {
            "resourceTemplates": [
              {
                "uriTemplate": "file:///{path}",
                "name": "project_files",
                "title": "Project Files",
                "mimeType": "application/octet-stream"
              }
            ]
          }
        }
      source_claims: [mcp-resource-templates-list]
  reference_implementations:
    - name: MCP resources specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
      description: Defines resource capability, resources/templates/list, and ResourceTemplate fields.
structure:
  identity_keys: ["id", "local_list_variant"]
  fields:
    - id: jsonrpc
      labels: {zh: "JSON-RPC 版本", en: "JSON-RPC version", ja: "JSON-RPC バージョン"}
      definitions:
        zh: "该结果包络中的原生 jsonrpc 成员，值必须为 \"2.0\"。"
        en: "The native jsonrpc member of this result envelope; it must be \"2.0\"."
        ja: "この結果エンベロープのネイティブな jsonrpc メンバーで、値は \"2.0\" でなければならない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2.0"
      allowed_values: ["2.0"]
      source_claims: [mcp-resource-templates-list]
    - id: id
      labels: {zh: "JSON-RPC 标识", en: "JSON-RPC id", ja: "JSON-RPC id"}
      definitions:
        zh: "与相应列表请求关联的原生 JSON-RPC id。"
        en: "The native JSON-RPC id correlating the result to its list request."
        ja: "対応する一覧要求に結果を関連付けるネイティブな JSON-RPC id。"
      datatype: string-or-number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims: [mcp-resource-templates-list]
    - id: result
      labels: {zh: "结果对象", en: "Result object", ja: "結果オブジェクト"}
      definitions:
        zh: "从 MCPDiscoveryListResult 继承的原生 JSON-RPC result；此子类型的对象包含 `resourceTemplates` 和可选 `nextCursor`。"
        en: "The native JSON-RPC result inherited from MCPDiscoveryListResult; this subtype's object contains `resourceTemplates` and optional `nextCursor`."
        ja: "MCPDiscoveryListResult から継承するネイティブな JSON-RPC result。この下位型のオブジェクトは `resourceTemplates` と任意の `nextCursor` を含む。"
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: {"resourceTemplates":[{"uriTemplate":"file:///{path}","name":"project_files"}]}
      allowed_values: []
      source_claims: [mcp-resource-templates-list]
    - id: local_list_variant
      labels: {zh: "本地列表变体", en: "Local list variant", ja: "ローカル一覧バリアント"}
      definitions:
        zh: "从 MCPDiscoveryListResult 继承的 Moonweave 分类；此子类型固定为 `resourceTemplates`，不是 MCP wire 字段。"
        en: "The Moonweave classification inherited from MCPDiscoveryListResult; this subtype fixes it to `resourceTemplates`, not an MCP wire field."
        ja: "MCPDiscoveryListResult から継承する Moonweave 分類。この下位型では MCP wire フィールドではなく `resourceTemplates` に固定される。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "resourceTemplates"
      allowed_values: ["resourceTemplates"]
      source_claims: [moonweave-mcp-list-resource-templates-result-taxonomy]
    - id: local_entry_set
      labels: {zh: "本地条目集合", en: "Local entry set", ja: "ローカルエントリー集合"}
      definitions:
        zh: "从 MCPDiscoveryListResult 继承的 Moonweave 查看值，引用本结果的原生 `result.resourceTemplates` 数组。"
        en: "The Moonweave view inherited from MCPDiscoveryListResult, referring to this result's native `result.resourceTemplates` array."
        ja: "MCPDiscoveryListResult から継承する Moonweave 表示値で、この結果のネイティブな `result.resourceTemplates` 配列を参照する。"
      datatype: array
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: [{"uriTemplate":"file:///{path}","name":"project_files"}]
      allowed_values: []
      source_claims: [moonweave-mcp-list-resource-templates-result-taxonomy]
    - id: resourceTemplates
      labels: {zh: "资源模板", en: "Resource templates", ja: "リソーステンプレート"}
      definitions:
        zh: "原生 result.resourceTemplates 数组，列出参数化资源的 URI 模板。"
        en: "The native result.resourceTemplates array listing URI templates for parameterized resources."
        ja: "パラメーター化リソースの URI テンプレートを列挙するネイティブな result.resourceTemplates 配列。"
      datatype: array
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: [{"uriTemplate":"file:///project/{path}","name":"Project file"}]
      allowed_values: []
      source_claims: [mcp-resource-templates-list]
    - id: nextCursor
      labels: {zh: "下一游标", en: "Next cursor", ja: "次カーソル"}
      definitions:
        zh: "可选的原生 result.nextCursor 成员，用于取得后续页。"
        en: "The optional native result.nextCursor member used to obtain a subsequent page."
        ja: "後続ページを取得するための任意のネイティブな result.nextCursor メンバー。"
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: "next-page"
      allowed_values: []
      source_claims: [mcp-resource-templates-list]
  constraints:
    - id: resource-templates-list-requires-resources-capability
      severity: error
      expression_language: plain
      expression: A client requests resource templates only after the server declared resources capability for the session.
      explanation:
        zh: 客户端只能在服务器已为会话声明 resources 能力后请求资源模板。
        en: A client requests resource templates only after the server declared resources capability for the session.
        ja: クライアントはサーバーがセッションでresources機能を宣言した後にのみresource templateを要求する。
      source_claims: [mcp-resource-templates-capability]
    - id: resource-template-requires-uri-template-and-name
      severity: error
      expression_language: plain
      expression: Each returned resource template has uriTemplate and name and describes a parameterized pattern rather than ResourceContents.
      explanation:
        zh: 每个返回资源模板都有 uriTemplate 和 name，并描述参数化模式而非 ResourceContents。
        en: Each returned resource template has uriTemplate and name and describes a parameterized pattern rather than ResourceContents.
        ja: 返された各resource templateはuriTemplateとnameを持ち、ResourceContentsではなくパラメーター化パターンを記述する。
      source_claims: [mcp-resource-templates-list]
  required_relations: []
examples:
  - id: mcp-resource-template-list-positive-files

    labels: {zh: 项目文件 URI 模板列表, en: Project files URI template list, ja: プロジェクトファイルURI templateリスト}

    descriptions:
      zh: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。
      en: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths.
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"jsonrpc":"2.0","id":1,"result":{"resourceTemplates":[{"uriTemplate":"file:///{path}","name":"project_files"}],"nextCursor":"next-page"},"local_list_variant":"resourceTemplates","local_entry_set":[{"uriTemplate":"file:///{path}","name":"project_files"}],"resourceTemplates":[{"uriTemplate":"file:///{path}","name":"project_files"}],"nextCursor":"next-page"}
    related_node_ids: [MCPListResourceTemplatesResult, MCPDiscoveryListResult]
    related_relation_ids: [MCPListResourceTemplatesResult-is_a-MCPDiscoveryListResult]

    source_claims: [mcp-resource-templates-capability, mcp-resource-templates-list]
  - id: mcp-resource-template-list-counterexample-concrete-resource-shape

    labels: {zh: 模板列表误返回具体资源, en: Template list incorrectly returns concrete resource, ja: template listが具体resourceを誤って返す}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"jsonrpc":"2.0","id":2,"result":{"resources":[{"uri":"file:///project/a.txt","name":"a.txt"}]},"local_list_variant":"resourceTemplates","local_entry_set":[{"uri":"file:///project/a.txt","name":"a.txt"}],"resourceTemplates":[{"uri":"file:///project/a.txt","name":"a.txt"}]}
    related_node_ids: [MCPListResourceTemplatesResult, MCPListResourcesResult]
    related_relation_ids: [MCPListResourceTemplatesResult-is_a-MCPDiscoveryListResult]

    source_claims: [mcp-resource-templates-list]
  - id: mcp-resource-template-list-boundary-template-vs-read

    labels: {zh: URI 模板与资源读取的边界, en: Boundary between URI template and resource read, ja: URI templateとresource readの境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"jsonrpc":"2.0","id":3,"result":{"resourceTemplates":[]},"local_list_variant":"resourceTemplates","local_entry_set":[],"resourceTemplates":[]}
    related_node_ids: [MCPListResourceTemplatesResult, MCPResourceReadRequest]
    related_relation_ids: [MCPListResourceTemplatesResult-is_a-MCPDiscoveryListResult]

    source_claims: [mcp-resource-templates-list]
  - id: mcp-resource-template-list-instance-files-3

    labels: {zh: project_files 模板列表实例, en: project_files template list instance, ja: project_files template listインスタンス}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"jsonrpc":"2.0","id":3,"result":{"resourceTemplates":[{"uriTemplate":"file:///{path}","name":"project_files"}]},"local_list_variant":"resourceTemplates","local_entry_set":[{"uriTemplate":"file:///{path}","name":"project_files"}],"resourceTemplates":[{"uriTemplate":"file:///{path}","name":"project_files"}]}
    related_node_ids: [MCPListResourceTemplatesResult, MCPDiscoveryListResult]
    related_relation_ids: [MCPListResourceTemplatesResult-is_a-MCPDiscoveryListResult]

    source_claims: [mcp-resource-templates-list]
parent_relation:
  id: MCPListResourceTemplatesResult-is_a-MCPDiscoveryListResult
  predicate: is_a
  target: concept:MCPDiscoveryListResult
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是 MCP 发现列表结果的 resources/templates/list 子类, en: is the resources/templates/list subtype of MCP discovery-list result, ja: MCP ディスカバリー一覧結果の resources/templates/list 下位型である}
  definition:
    zh: MCPListResourceTemplatesResult 是资源模板项构成的 MCPDiscoveryListResult。
    en: MCPListResourceTemplatesResult is an MCPDiscoveryListResult composed of resource-template entries.
    ja: MCPListResourceTemplatesResult は resource template 項目から構成される MCPDiscoveryListResult である。
  cardinality:
    source: {min: 0, max: null}
    target: {min: 1, max: 1}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_resource_template_list
    labels: {zh: 具有资源模板列表, en: has resource template list, ja: resource templateリストを持つ}
  conditions: []
  temporal_scope: session
  boundary_context: 不包括 resources/list 的 ResourceList 或 resources/read 的 ResourceContents。
  constraints:
    - id: resource-template-list-discriminator
      severity: error
      expression_language: plain
      expression: An MCPListResourceTemplatesResult contains resourceTemplates entries with uriTemplate and name rather than concrete resource contents.
      explanation:
        zh: MCPListResourceTemplatesResult 包含具有 uriTemplate 和 name 的 resourceTemplates 项，而非具体资源内容。
        en: An MCPListResourceTemplatesResult contains resourceTemplates entries with uriTemplate and name rather than concrete resource contents.
        ja: MCPListResourceTemplatesResult は具体 resource 内容ではなく uriTemplate と name を持つ resourceTemplates 項目を含む。
      source_claims: [mcp-resource-templates-list]
  examples: []
  source_claims: [moonweave-mcp-list-resource-templates-result-taxonomy]
  distinct_fact_rationale:
    zh: 该子类由 resourceTemplates 结果字段和 URI 模式语义区分，不与具体资源或内容混合。
    en: This subtype is distinguished by resourceTemplates result field and URI-pattern semantics without mixing concrete resources or content.
    ja: この下位型は具体resourceや内容を混ぜず、resourceTemplates結果フィールドとURIパターン意味で区別される。
relations: []
