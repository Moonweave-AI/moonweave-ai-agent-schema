schema: moonweave.ai/ontology-node/v1
id: MCPListResourcesResult
kind: concept
labels:
  zh: MCP resources/list 结果
  en: MCP resources/list result
  ja: MCP resources/list 結果
semantics:
  short_definition:
    zh: 服务器对 `resources/list` 的成功 JSON-RPC 结果，列出其公开的具体 MCP resource 定义。
    en: The successful JSON-RPC result to `resources/list`, enumerating its exposed concrete MCP resource definitions.
    ja: 公開する具体 MCP resource 定義を列挙する `resources/list` の成功 JSON-RPC 結果。
  definition:
    zh: >
      MCP 资源列表结果是 resources/list 的 JSON-RPC result，含 resources 数组和可选 nextCursor。每个 resource definition 以唯一 uri
      标识，可包含 name、title、description、icons、mimeType 和 size。此列表发现的是具体资源，而非 parameterized resource templates；
      其内容需要通过 resources/read 获取。它不等于资源缓存、文件系统目录扫描结果或更新通知。
    en: >
      An MCP resource-list result is the JSON-RPC result of resources/list containing resources array and optional nextCursor.
      Each resource definition is identified by unique uri and may contain name, title, description, icons, mimeType, and size.
      The list discovers concrete resources, not parameterized resource templates; their contents are retrieved through resources/read.
      It is not a resource cache, filesystem directory-scan result, or update notification.
    ja: >
      MCP リソース一覧結果は resources 配列と任意 nextCursor を含む resources/list の JSON-RPC result である。各 resource definition は
      一意 uri で識別され、name、title、description、icons、mimeType、size を持てる。一覧は具体 resource を発見し、parameterized
      resource template は発見しない。content は resources/read で取得する。resource cache、filesystem directory-scan result、更新通知ではない。
  why_needed:
    zh: client 能发现 server 提供的可读上下文项，并按 URI 选择读取、订阅或在 UI 中展示，而不预先知道资源集合。
    en: Clients can discover readable context items offered by a server and choose them by URI for reading, subscription, or UI display without knowing the resource set in advance.
    ja: client は resource set を事前に知らずに、server 提供の読取可能 context item を発見し、URI で読取、購読、UI 表示用に選べる。
  includes:
    - {zh: resources 数组和资源 metadata, en: resources array and resource metadata, ja: resources 配列と resource metadata}
    - {zh: 可选 nextCursor, en: Optional nextCursor, ja: 任意 nextCursor}
  excludes:
    - {zh: resources/read 的 text 或 blob 内容, en: Text or blob contents from resources/read, ja: resources/read の text または blob content}
    - {zh: resourceTemplates 或 listChanged notification, en: resourceTemplates or listChanged notification, ja: resourceTemplates または listChanged 通知}
  semantic_kind: result
  aliases:
    - {language: en, value: ListResourcesResult, alias_kind: protocol-type}
engineering:
  explanation:
    zh: client 在 server 资源能力已协商后发送 resources/list 和可选 cursor。server 返回资源 definition 页；client 可以根据 uri 后续 resources/read、resources/subscribe 或用户选择，不将 metadata 当作 content。
    en: After server resources capability is negotiated, a client sends resources/list with optional cursor. The server returns a page of resource definitions; the client may later resources/read, resources/subscribe, or let a user select by uri without treating metadata as contents.
    ja: server resources capability 交渉後、client は任意 cursor 付き resources/list を送る。server は resource definitions page を返し、client は metadata を content と扱わず uri で後続 resources/read、resources/subscribe、ユーザー選択を行える。
  typical_input:
    - description: List concrete resources.
      format: '{"jsonrpc":"2.0","id":1,"method":"resources/list","params":{"cursor":"optional-cursor"}}'
      source_claims: [mcp-resource-list-protocol]
  typical_output:
    - description: A page of resource definitions.
      format: '{"jsonrpc":"2.0","id":1,"result":{"resources":[{"uri":"file:///project/src/main.rs","name":"main.rs","mimeType":"text/x-rust"}],"nextCursor":"next-page"}}'
      source_claims: [mcp-resource-list-protocol]
  reference_implementations:
    - name: MCP Resources specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
      description: Defines resources/list result, concrete Resource fields, read separation, templates, and list changes.
structure:
  identity_keys: ["id", "local_list_variant"]
  fields:
    - id: jsonrpc
      labels: {zh: "JSON-RPC 版本", en: "JSON-RPC version", ja: "JSON-RPC バージョン"}
      definitions:
        zh: "该结果包络中的原生 jsonrpc 成员，值必须为 \"2.0\"。"
        en: "The native jsonrpc member of this result envelope; it must be \"2.0\"."
        ja: "この結果エンベロープのネイティブな jsonrpc メンバーで、値は \"2.0\" でなければならない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2.0"
      allowed_values: ["2.0"]
      source_claims: [mcp-resource-list-protocol]
    - id: id
      labels: {zh: "JSON-RPC 标识", en: "JSON-RPC id", ja: "JSON-RPC id"}
      definitions:
        zh: "与相应列表请求关联的原生 JSON-RPC id。"
        en: "The native JSON-RPC id correlating the result to its list request."
        ja: "対応する一覧要求に結果を関連付けるネイティブな JSON-RPC id。"
      datatype: string-or-number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims: [mcp-resource-list-protocol]
    - id: result
      labels: {zh: "结果对象", en: "Result object", ja: "結果オブジェクト"}
      definitions:
        zh: "从 MCPDiscoveryListResult 继承的原生 JSON-RPC result；此子类型的对象包含 `resources` 和可选 `nextCursor`。"
        en: "The native JSON-RPC result inherited from MCPDiscoveryListResult; this subtype's object contains `resources` and optional `nextCursor`."
        ja: "MCPDiscoveryListResult から継承するネイティブな JSON-RPC result。この下位型のオブジェクトは `resources` と任意の `nextCursor` を含む。"
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: {"resources":[{"uri":"file:///project/README.md","name":"README.md"}],"nextCursor":"next-page"}
      allowed_values: []
      source_claims: [mcp-resource-list-protocol]
    - id: local_list_variant
      labels: {zh: "本地列表变体", en: "Local list variant", ja: "ローカル一覧バリアント"}
      definitions:
        zh: "从 MCPDiscoveryListResult 继承的 Moonweave 分类；此子类型固定为 `resources`，不是 MCP wire 字段。"
        en: "The Moonweave classification inherited from MCPDiscoveryListResult; this subtype fixes it to `resources`, not an MCP wire field."
        ja: "MCPDiscoveryListResult から継承する Moonweave 分類。この下位型では MCP wire フィールドではなく `resources` に固定される。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "resources"
      allowed_values: ["resources"]
      source_claims: [moonweave-mcp-list-resources-result-taxonomy]
    - id: local_entry_set
      labels: {zh: "本地条目集合", en: "Local entry set", ja: "ローカルエントリー集合"}
      definitions:
        zh: "从 MCPDiscoveryListResult 继承的 Moonweave 查看值，引用本结果的原生 `result.resources` 数组。"
        en: "The Moonweave view inherited from MCPDiscoveryListResult, referring to this result's native `result.resources` array."
        ja: "MCPDiscoveryListResult から継承する Moonweave 表示値で、この結果のネイティブな `result.resources` 配列を参照する。"
      datatype: array
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: [{"uri":"file:///project/README.md","name":"README.md"}]
      allowed_values: []
      source_claims: [moonweave-mcp-list-resources-result-taxonomy]
    - id: resources
      labels: {zh: "资源定义", en: "Resource definitions", ja: "リソース定義"}
      definitions:
        zh: "原生 result.resources 数组，列出可读取资源的元数据而不是资源内容。"
        en: "The native result.resources array listing readable-resource metadata, not resource contents."
        ja: "読み取り可能リソースのメタデータを列挙するネイティブな result.resources 配列。リソース内容ではない。"
      datatype: array
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: [{"uri":"file:///project/README.md","name":"README"}]
      allowed_values: []
      source_claims: [mcp-resource-list-protocol, mcp-resource-list-definition]
    - id: nextCursor
      labels: {zh: "下一游标", en: "Next cursor", ja: "次カーソル"}
      definitions:
        zh: "可选的原生 result.nextCursor 成员，用于取得后续页。"
        en: "The optional native result.nextCursor member used to obtain a subsequent page."
        ja: "後続ページを取得するための任意のネイティブな result.nextCursor メンバー。"
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: "next-page"
      allowed_values: []
      source_claims: [mcp-resource-list-protocol]
  constraints:
    - id: resource-list-requires-capability
      severity: error
      expression_language: plain
      expression: resources/list is used only when the server declared resources capability.
      explanation:
        zh: 只有 server 声明 resources capability 时才使用 resources/list。
        en: resources/list is used only when the server declared resources capability.
        ja: resources/list は server が resources capability を宣言した場合にのみ使う。
      source_claims: [mcp-resource-list-capability]
    - id: resource-list-defines-not-reads
      severity: error
      expression_language: plain
      expression: Resource-list entries define concrete resources; resources/read returns the resource contents.
      explanation:
        zh: resource-list 条目定义具体 resources；resources/read 返回 resource contents。
        en: Resource-list entries define concrete resources; resources/read returns the resource contents.
        ja: resource-list 項目は具体 resources を定義し、resources/read が resource contents を返す。
      source_claims: [mcp-resource-list-protocol, mcp-resource-list-read]
  required_relations: []
examples:
  - id: mcp-resource-list-positive-main-rs

    labels: {zh: 发现 main.rs 资源, en: Discover main.rs resource, ja: main.rs resource を発見}

    descriptions:
      zh: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。"
      en: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths."
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"jsonrpc":"2.0","id":1,"result":{"resources":[{"uri":"file:///project/README.md","name":"README"}],"nextCursor":"next-page"},"local_list_variant":"resources","local_entry_set":[{"uri":"file:///project/README.md","name":"README"}],"resources":[{"uri":"file:///project/README.md","name":"README"}],"nextCursor":"next-page"}
    related_node_ids: [MCPListResourcesResult, MCPDiscoveryListResult, MCPResourceReadRequest]
    related_relation_ids: [MCPListResourcesResult-is_a-MCPDiscoveryListResult]

    source_claims: [mcp-resource-list-capability, mcp-resource-list-protocol]
  - id: mcp-resource-list-counterexample-template-as-resource

    labels: {zh: 将 URI 模板作为具体资源, en: URI template treated as concrete resource, ja: URI template を具体 resource と扱う}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"jsonrpc":"2.0","id":2,"result":{"resources":[{"uriTemplate":"file:///{path}","name":"invalid concrete resource"}]},"local_list_variant":"resources","local_entry_set":[{"uriTemplate":"file:///{path}","name":"invalid concrete resource"}],"resources":[{"uriTemplate":"file:///{path}","name":"invalid concrete resource"}]}
    related_node_ids: [MCPListResourcesResult, MCPListResourceTemplatesResult]
    related_relation_ids: [MCPListResourcesResult-is_a-MCPDiscoveryListResult]

    source_claims: [mcp-resource-list-protocol, mcp-resource-list-templates]
  - id: mcp-resource-list-boundary-list-changed

    labels: {zh: 资源列表页与 listChanged 的边界, en: Boundary between resource page and listChanged, ja: resource page と listChanged の境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"jsonrpc":"2.0","id":3,"result":{"resources":[]},"local_list_variant":"resources","local_entry_set":[],"resources":[]}
    related_node_ids: [MCPListResourcesResult, MCPNotification]
    related_relation_ids: [MCPListResourcesResult-is_a-MCPDiscoveryListResult]

    source_claims: [mcp-resource-list-changed]
  - id: mcp-resource-list-instance-page-one

    labels: {zh: 资源列表第一页实例, en: Resource-list first-page instance, ja: resource-list 第一ページ実例}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"jsonrpc":"2.0","id":1,"result":{"resources":[{"uri":"file:///project/README.md","name":"README"}],"nextCursor":"next-page"},"local_list_variant":"resources","local_entry_set":[{"uri":"file:///project/README.md","name":"README"}],"resources":[{"uri":"file:///project/README.md","name":"README"}],"nextCursor":"next-page"}
    related_node_ids: [MCPListResourcesResult, MCPDiscoveryListResult]
    related_relation_ids: [MCPListResourcesResult-is_a-MCPDiscoveryListResult]

    source_claims: [mcp-resource-list-protocol]
parent_relation:
  id: MCPListResourcesResult-is_a-MCPDiscoveryListResult
  predicate: is_a
  target: concept:MCPDiscoveryListResult
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是 MCP 发现列表结果的 resources/list 子类, en: is the resources/list subtype of MCP discovery-list result, ja: MCP ディスカバリー一覧結果の resources/list 下位型である}
  definition:
    zh: MCPListResourcesResult 是承载具体 resource definitions 的 MCPDiscoveryListResult。
    en: MCPListResourcesResult is an MCPDiscoveryListResult carrying concrete resource definitions.
    ja: MCPListResourcesResult は具体 resource definitions を運ぶ MCPDiscoveryListResult である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_resource_list_subtype
    labels: {zh: 具有资源列表子类, en: has resource-list subtype, ja: resource 一覧下位型を持つ}
  conditions: []
  temporal_scope: response
  boundary_context: 该层级表达具体 resource discovery，不包括 templates、contents、subscriptions 或 list-change notifications。
  constraints:
    - id: resource-list-collection-fixed
      severity: error
      expression_language: plain
      expression: An MCPListResourcesResult has resources entries returned by resources/list.
      explanation:
        zh: MCPListResourcesResult 具有 resources/list 返回的 resources entries。
        en: An MCPListResourcesResult has resources entries returned by resources/list.
        ja: MCPListResourcesResult は resources/list が返す resources entries を持つ。
      source_claims: [mcp-resource-list-protocol]
  examples: []
  source_claims: [moonweave-mcp-list-resources-result-taxonomy]
  distinct_fact_rationale:
    zh: 子类由具体 URI resource definitions 区分，不与 URI templates、resource contents 或 tools/prompts definitions 混合。
    en: The subtype is distinguished by concrete-URI resource definitions without mixing URI templates, resource contents, or tools/prompts definitions.
    ja: この下位型は URI templates、resource contents、tools/prompts definitions を混ぜず、具体 URI resource definitions により区別される。
relations: []
sources:
  - id: mcp-resources-2025-11-25
    title: Model Context Protocol Specification — Resources
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
    source_type: official-specification
    locator: "Capabilities; Listing Resources; Reading Resources; Resource Templates; List Changed Notification; Resource"
    relevance: Defines resource capability, concrete resource lists and pagination, reads, templates, list-change notices, and resource fields.
source_claims:
  - id: mcp-resource-list-capability
    source: mcp-resources-2025-11-25
    supports: Servers supporting resources declare resources capability and may declare listChanged.
    locator: "Capabilities"
    evidence_kind: normative
    confidence: high
  - id: moonweave-mcp-list-resources-result-taxonomy
    source: mcp-resources-2025-11-25
    supports: "Moonweave classifies the resources/list result as an MCPDiscoveryListResult for navigation; this subclass edge is a taxonomy design inference."
    locator: "Listing Resources"
    evidence_kind: design-inference
    confidence: high
  - id: mcp-resource-list-protocol
    source: mcp-resources-2025-11-25
    supports: resources/list returns resources definitions with optional nextCursor and pagination support.
    locator: "Listing Resources"
    evidence_kind: normative
    confidence: high
  - id: mcp-resource-list-definition
    source: mcp-resources-2025-11-25
    supports: A resource definition has unique uri and may include name, title, description, icons, mimeType, and size.
    locator: "Resource"
    evidence_kind: normative
    confidence: high
  - id: mcp-resource-list-read
    source: mcp-resources-2025-11-25
    supports: resources/read separately retrieves resource contents for a URI.
    locator: "Reading Resources"
    evidence_kind: normative
    confidence: high
  - id: mcp-resource-list-templates
    source: mcp-resources-2025-11-25
    supports: resources/templates/list returns resourceTemplates for parameterized resources, separate from resources/list.
    locator: "Resource Templates"
    evidence_kind: normative
    confidence: high
  - id: mcp-resource-list-changed
    source: mcp-resources-2025-11-25
    supports: Servers declaring resources.listChanged should notify with notifications/resources/list_changed when available resources change.
    locator: "List Changed Notification"
    evidence_kind: normative
    confidence: high