schema: moonweave.ai/ontology-node/v1
id: MCPInitializeResult
kind: concept
labels:
  zh: MCP 初始化结果
  en: MCP initialize result
  ja: MCP 初期化結果
semantics:
  short_definition:
    zh: 服务端对 `initialize` 请求返回的、声明协商协议版本和服务端能力的成功 JSON-RPC 结果。
    en: The successful JSON-RPC result through which a server answers `initialize` and declares the negotiated protocol version and server capabilities.
    ja: server が `initialize` に応答し、交渉したプロトコル版と server 能力を宣言する成功 JSON-RPC 結果。
  definition:
    zh: >
      MCPInitializeResult 是与一个 `initialize` 请求使用相同 JSON-RPC id 的成功响应。其 `result` 中必须包含服务端选定的
      `protocolVersion`、服务端 `capabilities` 和 `serverInfo`，并可包含面向客户端的 `instructions`。它表示初始化请求在协议层
      已成功处理，但完整生命周期还要求客户端随后发送 `notifications/initialized`；它既不是请求本身，也不是带 JSON-RPC `error`
      成员的失败响应。
    en: >
      An MCPInitializeResult is the successful response using the same JSON-RPC id as an `initialize` request. Its
      `result` contains the server-selected `protocolVersion`, server `capabilities`, and `serverInfo`, and may contain
      client-facing `instructions`. It means the initialization request was processed successfully at the protocol
      layer, while the lifecycle still requires the client to send `notifications/initialized`; it is neither the
      request itself nor a failure response containing a JSON-RPC `error` member.
    ja: >
      MCPInitializeResult は `initialize` 要求と同じ JSON-RPC id を使う成功応答である。`result` には server が選んだ
      `protocolVersion`、server の `capabilities`、`serverInfo` が含まれ、client 向けの `instructions` を含めてもよい。
      これは初期化要求がプロトコル層で成功したことを示すが、ライフサイクルにはなお client による
      `notifications/initialized` が必要である。これは要求自体でも JSON-RPC `error` を含む失敗応答でもない。
  why_needed:
    zh: 它把服务端实际支持的版本和功能明确返回给客户端，使客户端能够按协商结果决定后续可调用的方法，而不是猜测服务端实现。
    en: It explicitly returns the version and features the server actually supports so the client can select subsequent methods from the negotiated result rather than guessing implementation behavior.
    ja: server が実際に対応する版と機能を明示的に返すため、client は実装を推測せず交渉結果から後続メソッドを選べる。
  includes:
    - {zh: "与 initialize 请求相同的 JSON-RPC id 和一个 `result` 成员", en: "The same JSON-RPC id as initialize and one `result` member", ja: "initialize と同じ JSON-RPC id と一つの `result` メンバー"}
    - {zh: "原生 `result.protocolVersion`、`result.capabilities` 和 `result.serverInfo`", en: "The native `result.protocolVersion`, `result.capabilities`, and `result.serverInfo` members", ja: "ネイティブな `result.protocolVersion`、`result.capabilities`、`result.serverInfo` メンバー"}
    - {zh: "可选的、供客户端使用的 `result.instructions`", en: "Optional client-facing `result.instructions`", ja: "任意の client 向け `result.instructions`"}
  excludes:
    - {zh: "客户端发送的 initialize 请求", en: "The client-sent initialize request", ja: "client が送る initialize 要求"}
    - {zh: "带 JSON-RPC `error` 成员的初始化失败响应", en: "An initialization failure response with a JSON-RPC `error` member", ja: "JSON-RPC `error` メンバーを持つ初期化失敗応答"}
    - {zh: "客户端确认完成初始化的 `notifications/initialized` 通知", en: "The client notification `notifications/initialized` confirming completed initialization", ja: "初期化完了を確認する client 通知 `notifications/initialized`"}
  semantic_kind: information
  aliases:
    - {language: en, value: InitializeResult, alias_kind: official-schema-name}
engineering:
  explanation:
    zh: >
      服务端在验证 initialize 参数后构造 `{jsonrpc, id, result}`，其中 id 必须回显请求 id，且不能同时附加 JSON-RPC error。
      客户端将 `result.protocolVersion` 与自身版本协商状态比对，保存服务端能力和说明，然后发送 initialized 通知。这里的能力对象
      是后续调用的协议前提；例如未在结果中声明 tools 时，客户端不能把 tools/list 当作已协商服务。
    en: >
      After validating initialize parameters, the server constructs `{jsonrpc, id, result}`. The id must echo the
      request id and JSON-RPC error must not be added. The client compares `result.protocolVersion` with its negotiated
      version state, stores server capabilities and instructions, then emits initialized. The capability object is a
      protocol prerequisite for later calls: if tools was not declared in this result, a client cannot treat tools/list
      as a negotiated service.
    ja: >
      server は initialize パラメータを検証した後、`{jsonrpc, id, result}` を構成する。id は要求 id を反映し、JSON-RPC error を
      追加してはならない。client は `result.protocolVersion` を交渉済み版の状態と照合し、server 能力と instructions を保存して
      initialized を発行する。能力オブジェクトは後続呼出しのプロトコル前提であり、この結果が tools を宣言しないなら client は
      tools/list を交渉済みサービスとして扱えない。
  typical_input:
    - description: A server receives a valid initialize request from a client.
      format: |
        {
          "jsonrpc": "2.0",
          "id": "init-1",
          "method": "initialize",
          "params": {
            "protocolVersion": "2025-11-25",
            "capabilities": {},
            "clientInfo": {"name": "example-host", "version": "1.0.0"}
          }
        }
      source_claims: [mcp-initialize-request-shape]
  typical_output:
    - description: Server returns its negotiated version and capabilities with the same id.
      format: |
        {
          "jsonrpc": "2.0",
          "id": "init-1",
          "result": {
            "protocolVersion": "2025-11-25",
            "capabilities": {"tools": {"listChanged": true}},
            "serverInfo": {"name": "example-server", "version": "1.0.0"},
            "instructions": "Use tools only when requested by the user."
          }
        }
      source_claims: [mcp-initialize-result-shape]
  reference_implementations:
    - name: MCP lifecycle specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
      description: Defines the server initialization response and the next client initialized notification.
    - name: MCP schema
      url: https://modelcontextprotocol.io/specification/2025-11-25/schema
      description: Declares InitializeResult and its protocolVersion, capabilities, serverInfo, and optional instructions members.
structure:
  identity_keys: ["id"]
  fields:
    - id: jsonrpc
      labels: {zh: "JSON-RPC 版本", en: "JSON-RPC version", ja: "JSON-RPC バージョン"}
      definitions: {zh: "初始化成功响应包络中的原生 `jsonrpc` 成员，固定为 `2.0`。", en: "The native `jsonrpc` member of the initialization success envelope, fixed to `2.0`.", ja: "初期化成功応答包絡のネイティブな `jsonrpc` メンバーであり、`2.0` に固定される。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2.0"
      allowed_values: ["2.0"]
      source_claims: [mcp-initialize-result-shape]
    - id: id
      labels: {zh: "关联请求标识", en: "Correlated request id", ja: "対応する要求 id"}
      definitions: {zh: "与被处理的 initialize 请求相同的原生 JSON-RPC id。", en: "The native JSON-RPC id equal to the initialize request being processed.", ja: "処理された initialize 要求と等しいネイティブ JSON-RPC id。"}
      datatype: string-or-number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "init-1"
      allowed_values: []
      source_claims: [mcp-initialize-result-shape]
    - id: result
      labels: {zh: "初始化结果对象", en: "Initialization result object", ja: "初期化結果オブジェクト"}
      definitions: {zh: "包含服务端初始化结果成员的原生 JSON-RPC `result` 对象；它不能与 `error` 共存。", en: "The native JSON-RPC `result` object containing server initialization members; it cannot coexist with `error`.", ja: "server 初期化メンバーを含むネイティブ JSON-RPC `result` オブジェクトであり、`error` と共存できない。"}
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: {"protocolVersion": "2025-11-25", "capabilities": {}, "serverInfo": {"name": "example-server", "version": "1.0.0"}}
      allowed_values: []
      source_claims: [mcp-initialize-result-shape, json-rpc-success-result]
    - id: protocolVersion
      labels: {zh: "协商协议版本", en: "Negotiated protocol version", ja: "交渉済みプロトコル版"}
      definitions: {zh: "原生 `result.protocolVersion` 成员，表示服务端为本会话确认的 MCP 版本。", en: "The native `result.protocolVersion` member representing the MCP version confirmed by the server for this session.", ja: "このセッションについて server が確認した MCP 版を表すネイティブな `result.protocolVersion` メンバー。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2025-11-25"
      allowed_values: []
      source_claims: [mcp-initialize-result-shape]
    - id: capabilities
      labels: {zh: "服务端能力", en: "Server capabilities", ja: "server 能力"}
      definitions: {zh: "原生 `result.capabilities` 对象，声明服务端在本会话中支持的可选功能。", en: "The native `result.capabilities` object declaring optional features supported by the server in this session.", ja: "このセッションで server が対応する任意機能を宣言するネイティブな `result.capabilities` オブジェクト。"}
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: {"tools": {"listChanged": true}}
      allowed_values: []
      source_claims: [mcp-initialize-result-shape, mcp-capability-negotiation]
    - id: serverInfo
      labels: {zh: "服务端实现信息", en: "Server implementation information", ja: "server 実装情報"}
      definitions: {zh: "原生 `result.serverInfo` 对象，至少携带服务端实现的名称和版本。", en: "The native `result.serverInfo` object carrying at least the server implementation name and version.", ja: "少なくとも server 実装の名称と版を運ぶネイティブな `result.serverInfo` オブジェクト。"}
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: {"name": "example-server", "version": "1.0.0"}
      allowed_values: []
      source_claims: [mcp-initialize-result-shape]
    - id: instructions
      labels: {zh: "服务端使用说明", en: "Server usage instructions", ja: "server 利用指示"}
      definitions: {zh: "可选的原生 `result.instructions` 字符串，向客户端提供使用该服务端的附加说明。", en: "The optional native `result.instructions` string providing additional guidance for using the server.", ja: "server の利用に関する追加案内を client に渡す任意のネイティブ `result.instructions` 文字列。"}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: "Use tools only when requested by the user."
      allowed_values: []
      source_claims: [mcp-initialize-result-shape]
  constraints:
    - id: initialize-result-correlates-to-initialize-id
      severity: error
      expression_language: plain
      expression: An MCPInitializeResult uses the same JSON-RPC id as the initialize request it answers.
      explanation: {zh: "初始化结果不能采用新的关联 id；客户端据同一 id 结束 pending initialize 调用。", en: "An initialization result cannot use a new correlation id; the client completes its pending initialize call by the same id.", ja: "初期化結果は新しい対応 id を使えない。client は同じ id で保留中の initialize 呼出しを完了する。"}
      source_claims: [mcp-initialize-lifecycle, json-rpc-success-result]
    - id: initialize-result-declares-server-negotiation-state
      severity: error
      expression_language: plain
      expression: The initialization result contains protocolVersion, capabilities, and serverInfo, while instructions remains optional.
      explanation: {zh: "服务端必须交回协商状态和实现身份；使用说明可以省略。", en: "The server must return negotiation state and implementation identity; usage instructions may be omitted.", ja: "server は交渉状態と実装識別を返す必要があり、利用指示は省略できる。"}
      source_claims: [mcp-initialize-result-shape]
  required_relations: []
examples:
  - id: mcp-initialize-result-positive

    labels: {zh: "有效的初始化成功结果", en: "Valid initialization success result", ja: "有効な初期化成功結果"}

    descriptions:
      zh: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。"
      en: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths."
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"jsonrpc": "2.0", "id": "init-1", "result": {"protocolVersion": "2025-11-25", "capabilities": {"tools": {"listChanged": true}}, "serverInfo": {"name": "example-server", "version": "1.0.0"}}, "protocolVersion": "2025-11-25", "capabilities": {"tools": {"listChanged": true}}, "serverInfo": {"name": "example-server", "version": "1.0.0"}}
    related_node_ids: [MCPInitializeResult, MCPInitializeRequest]
    related_relation_ids: [MCPInitializeResult-is_a-MCPResultResponse]

    source_claims: [mcp-initialize-result-shape, mcp-initialize-lifecycle]
  - id: mcp-initialize-result-counterexample-error-response

    labels: {zh: "被误标为结果的初始化错误", en: "Initialization error mislabeled as result", ja: "結果と誤分類された初期化エラー"}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"jsonrpc": "2.0", "id": "init-2", "error": {"code": -32602, "message": "Invalid params"}}
    related_node_ids: [MCPInitializeResult, MCPErrorResponse]
    related_relation_ids: [MCPInitializeResult-is_a-MCPResultResponse]

    source_claims: [json-rpc-success-result, mcp-initialize-lifecycle]
  - id: mcp-initialize-result-boundary-instructions

    labels: {zh: "必需协商字段与可选说明的边界", en: "Boundary between required negotiation fields and optional instructions", ja: "必須交渉フィールドと任意 instructions の境界"}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"jsonrpc": "2.0", "id": "init-3", "result": {"protocolVersion": "2025-11-25", "capabilities": {}, "serverInfo": {"name": "example-server", "version": "1.0.0"}}, "protocolVersion": "2025-11-25", "capabilities": {}, "serverInfo": {"name": "example-server", "version": "1.0.0"}}
    related_node_ids: [MCPInitializeResult, MCPResultResponse]
    related_relation_ids: [MCPInitializeResult-is_a-MCPResultResponse]

    source_claims: [mcp-initialize-result-shape]
  - id: mcp-initialize-result-instance-init-1

    labels: {zh: "init-1 初始化结果实例", en: "init-1 initialize result instance", ja: "init-1 初期化結果インスタンス"}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"jsonrpc": "2.0", "id": "init-1", "result": {"protocolVersion": "2025-11-25", "capabilities": {"tools": {}}, "serverInfo": {"name": "example-server", "version": "1.0.0"}, "instructions": "Use tools only when requested by the user."}, "protocolVersion": "2025-11-25", "capabilities": {"tools": {}}, "serverInfo": {"name": "example-server", "version": "1.0.0"}, "instructions": "Use tools only when requested by the user."}
    related_node_ids: [MCPInitializeResult, MCPServer]
    related_relation_ids: [MCPInitializeResult-is_a-MCPResultResponse]

    source_claims: [mcp-initialize-result-shape]
