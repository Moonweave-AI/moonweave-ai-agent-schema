schema: moonweave.ai/ontology-node/v1
id: MCPRootList
kind: concept
status: review
labels:
  en: MCP root list
  zh: MCP 根范围列表
  ja: MCP ルート範囲一覧
semantics:
  short_definition:
    zh: 客户端响应 `roots/list` 时返回的一组文件系统根范围。
    en: A set of filesystem roots returned by a client in response to `roots/list`.
    ja: client が `roots/list` への応答で返す filesystem root の集合。
  definition:
    zh: MCP 根范围列表是一种集合，表示服务器发送 `roots/list` 后由客户端返回的一组 `file://` 根 URI 与可选名称；它描述客户端提供的工作区边界，不是服务器定义列表、沙箱挂载、OAuth scope，也不会自动授予底层文件访问权限。
    en: An MCP root list is a collection of file URI roots and optional display names returned by a client after a server sends roots/list. It describes client-provided workspace boundaries and is not a server definition list, sandbox mount, OAuth scope, or automatic grant of underlying file access.
    ja: MCP root list は server の roots/list 後に client が返す file URI root と任意 name の collection です。client-provided workspace boundary であり server definition list・sandbox mount・OAuth scope・file access grant ではありません。
  why_needed:
    zh: 根范围需要独立于资源目录和安全授权建模，才能表达“客户端建议的工作边界”而不误称为服务器发布内容或强制访问控制。
    en: Roots must be modeled separately from resource directories and security grants so that client-advised working boundaries are not mistaken for server-published content or enforced access control.
    ja: root を resource directory や security grant から分離し、client が示す作業境界を server-published content や強制 access control と誤認しないために必要です。
  includes:
    - zh: 纳入客户端对 `roots/list` 的结果、其中的 `file://` 根 URI、可选名称，以及在 `notifications/roots/list_changed` 后重新取得的完整根集合。
      en: Includes a client's `roots/list` result, its `file://` root URIs and optional names, and the refreshed complete root set obtained after `notifications/roots/list_changed`.
      ja: client の `roots/list` result、`file://` root URI と任意 name、`notifications/roots/list_changed` 後に再取得した完全 root set を含みます。
  excludes:
    - zh: 排除服务器的 tools/resources/prompts 定义页、HTTP 授权 scope、操作系统权限、容器挂载和任意非 `file://` 资源 URI。
      en: Excludes server tool/resource/prompt definition pages, HTTP authorization scopes, operating-system permissions, container mounts, and arbitrary non-`file://` resource URIs.
      ja: server の tools/resources/prompts 定義 page、HTTP authorization scope、OS permission、container mount、任意の非 `file://` resource URI を除きます。
  semantic_kind: collection
  aliases: []
structure:
  identity_keys:
    - session_id
    - request_id
  fields:
    - id: session_id
      labels:
        zh: 会话引用
        en: session reference
        ja: session 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用客户端返回该根列表的 MCP 会话。
        en: References the MCP session in which the client returned this root list.
        ja: client が root list を返した MCP session を参照します。
      allowed_values: []
      pattern: null
      example_value: mcp-session-roots-4
      source_claims:
        - claim-mcp-root-list-002
    - id: request_id
      labels:
        zh: 请求标识
        en: request ID
        ja: request ID
      datatype: string-or-integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 关联触发该集合返回的 roots/list 请求。
        en: Correlates the roots/list request that caused this collection to be returned.
        ja: collection return を引き起こした roots/list request を相関します。
      allowed_values: []
      pattern: null
      example_value: 64
      source_claims:
        - claim-mcp-root-list-003
    - id: roots
      labels:
        zh: 根目录成员
        en: root members
        ja: root members
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存客户端公开的 file:// URI 与可选名称列表；它表达范围但不授予文件权限。
        en: Stores the client-exposed file:// URIs and optional names; it expresses scope without granting filesystem authority.
        ja: client が公開する file:// URI と optional name を保存し、scope を示すが filesystem authority は付与しません。
      allowed_values: []
      pattern: null
      example_value:
        - uri: file:///D:/work/app
          name: Application
      source_claims:
        - claim-mcp-root-list-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: mcp-root-list-positive-workspace-boundaries
    kind: positive
    labels:
      zh: 客户端公布两个工作根
      en: Client exposes two workspace roots
      ja: client が二つの workspace root を公開
    scenario_id: null
    descriptions:
      zh: 代码助手客户端收到 `roots/list` 后返回 `file:///D:/work/app` 与 `file:///D:/work/docs`，分别标注“应用”和“文档”；该结果整体归为 MCPRootList。
      en: After receiving `roots/list`, a coding-assistant client returns `file:///D:/work/app` and `file:///D:/work/docs`, labeled “Application” and “Documentation”; the complete result is MCPRootList.
      ja: coding-assistant client が `roots/list` を受け、`file:///D:/work/app` と `file:///D:/work/docs` を「Application」「Documentation」として返します。result 全体を MCPRootList とします。
    field_values:
      session_id: mcp-session-roots-4
      request_id: 64
      roots:
        - uri: file:///D:/work/app
          name: Application
        - uri: file:///D:/work/docs
          name: Documentation
    related_node_ids:
      - MCPRootList
      - MCPClient
      - MCPServer
    related_relation_ids: []
    expected_result:
      zh: 创建一个客户端根集合，其两个成员保留各自 URI 与名称。
      en: One client root set is created with both members retaining their URI and name.
      ja: 一つの client root set を作り、二 member の URI と name を保持します。
    why_valid_or_invalid:
      zh: 结果由客户端产生，成员均为文件 URI，并用于告知服务器当前工作边界。
      en: The result is client-produced, every member is a file URI, and the set informs the server of the current working boundary.
      ja: result は client が生成し、全 member が file URI で、server に現在の作業境界を知らせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-root-list-005
  - id: mcp-root-list-boundary-oauth-scope
    kind: boundary
    labels:
      zh: OAuth scope 不是根范围
      en: OAuth scope is not a root list
      ja: OAuth scope は root list ではない
    scenario_id: null
    descriptions:
      zh: HTTP 客户端获得 scope 为 `files.read` 的访问令牌；即使该令牌允许读取文件服务，它也没有列出任何 `file://` 根，不能生成 MCPRootList。
      en: An HTTP client obtains an access token with scope `files.read`; even if the token permits a file service, it lists no `file://` roots and cannot create MCPRootList.
      ja: HTTP client が scope `files.read` の access token を取得しても、`file://` root を列挙していないため MCPRootList を作れません。
    field_values:
      authorization_scope: files.read
      roots: null
    related_node_ids:
      - MCPRootList
      - MCPAuthorization
    related_relation_ids: []
    expected_result:
      zh: 把该值保留在授权上下文中，不将其解释为工作区根集合。
      en: The value remains in authorization context and is not interpreted as a workspace root set.
      ja: 値は authorization context に保持し、workspace root set と解釈しません。
    why_valid_or_invalid:
      zh: 授权 scope 表示令牌权限；根列表是客户端通过独立协议方法返回的文件 URI 集合。
      en: An authorization scope expresses token permission; a root list is a file-URI set returned by the client through a separate protocol operation.
      ja: authorization scope は token permission を表し、root list は別 protocol operation で client が返す file-URI set です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-root-list-005
external_mappings: []
