schema: moonweave.ai/ontology-node/v1
id: MCPResultResponse
kind: concept
labels:
  zh: MCP 成功响应
  en: MCP success response
  ja: MCP成功レスポンス
semantics:
  short_definition:
    zh: 含有 result、没有 error 的 MCP JSON-RPC 响应。
    en: An MCP JSON-RPC response that contains result and no error.
    ja: resultを含みerrorを含まないMCP JSON-RPCレスポンス。
  definition:
    zh: >
      MCP 成功响应是对一个 MCP 请求的 JSON-RPC response object，其中相同 id 与请求相关联，`result`
      成员承载该方法的成功输出，而 `error` 成员不存在。result 的具体形状取决于方法，例如 tools/list
      的 tools、resources/read 的 contents 或 prompts/get 的 messages。
    en: >
      An MCP success response is a JSON-RPC response object to one MCP request in which the
      same id correlates to the request, the `result` member carries the method's successful
      output, and `error` is absent. The concrete result shape depends on method, such as
      tools for tools/list, contents for resources/read, or messages for prompts/get.
    ja: >
      MCP成功レスポンスは一つのMCPリクエストへのJSON-RPC response objectであり、同じidでリクエストに
      対応付けられ、`result` がmethodの成功出力を運び、`error` は存在しない。具体的なresult形状は
      methodにより異なり、tools/listならtools、resources/readならcontents、prompts/getならmessagesである。
  why_needed:
    zh: >
      成功响应将协议层成功与业务内容分开：例如 ToolResult 的 `isError: true` 仍可能位于 JSON-RPC
      result 中，因为服务器成功执行并返回了一个工具层错误表示。调用方必须先识别 JSON-RPC success，
      再解释特定方法的 result 语义。
    en: >
      A success response separates protocol-level success from business content. For example,
      a ToolResult with `isError: true` can still appear in JSON-RPC result because the server
      successfully returned a tool-level error representation. Callers identify JSON-RPC success
      first, then interpret method-specific result semantics.
    ja: >
      成功レスポンスはプロトコル層の成功をビジネス内容から分離する。たとえば `isError: true` のToolResultも、
      サーバーがtool層error表現を正常に返したためJSON-RPC resultに現れ得る。呼び出し側はまずJSON-RPC
      成功を識別し、次にmethod固有のresult意味を解釈する。
  includes:
    - zh: 与请求相同的 JSON-RPC id。
      en: The same JSON-RPC id as the request.
      ja: リクエストと同じJSON-RPC id。
    - zh: 恰好一个 `result` 成员。
      en: Exactly one `result` member.
      ja: ちょうど一つの `result` メンバー。
    - zh: 由相应 MCP 方法定义的成功数据。
      en: Success data defined by the corresponding MCP method.
      ja: 対応するMCP methodが定義する成功データ。
  excludes:
    - zh: 具有 JSON-RPC `error` 成员的失败响应。
      en: A failure response with a JSON-RPC `error` member.
      ja: JSON-RPC `error` メンバーを持つ失敗レスポンス。
    - zh: 无论内容看似成功与否，任何没有 id 的通知。
      en: Any id-less notification regardless of whether its content looks successful.
      ja: 内容が成功に見えるかどうかに関係なく、idを持たない通知。
  semantic_kind: information
  aliases:
    - language: en
      value: JSON-RPC result response
      alias_kind: synonym
engineering:
  explanation:
    zh: >
      在完成一个已验证且授权的请求后，服务器构造 `{jsonrpc:"2.0",id,result}`。它必须不添加
      JSON-RPC error；调用方按 id 移除 pending request，然后按 method 解码 result。对 tools/call，
      JSON-RPC result 表示协议响应成功，而 ToolResult.isError 仍是工具方法结果的一部分。
    en: >
      After completing a validated and authorized request, the server constructs
      `{jsonrpc:"2.0",id,result}` and does not add JSON-RPC error. The caller removes the
      pending request by id and decodes result by method. For tools/call, JSON-RPC result means
      protocol response success, while ToolResult.isError remains part of the tool method result.
    ja: >
      検証・認可済みリクエストの完了後、サーバーは `{jsonrpc:"2.0",id,result}` を構成しJSON-RPC errorを
      追加しない。呼び出し側はidで保留リクエストを除去しmethodによりresultをデコードする。tools/callでは
      JSON-RPC resultはプロトコルレスポンス成功を示し、ToolResult.isErrorはtool method結果の一部である。
  typical_input:
    - description: A successfully processed tools/list request.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 4,
          "method": "tools/list",
          "params": {}
        }
      source_claims: [mcp-result-response-json-rpc]
  typical_output:
    - description: The successful same-id tools/list result response.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 4,
          "result": {
            "tools": [
              {"name": "get_weather", "inputSchema": {"type": "object"}}
            ]
          }
        }
      source_claims: [mcp-result-response-json-rpc]
  reference_implementations:
    - name: JSON-RPC 2.0 specification
      url: https://www.jsonrpc.org/specification
      description: Defines result response shape and mutual exclusion with error.
    - name: MCP tools specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Illustrates method-specific ToolResult semantics inside successful JSON-RPC result.
structure:
  identity_keys: ["id"]
  fields:
    - id: jsonrpc
      labels: {zh: "JSON-RPC 版本", en: "JSON-RPC version", ja: "JSON-RPC バージョン"}
      definitions:
        zh: "MCP 响应包络中的原生 jsonrpc 成员，值必须为 \"2.0\"。"
        en: "The native jsonrpc member of the MCP response envelope; it must be \"2.0\"."
        ja: "MCP 応答エンベロープのネイティブな jsonrpc メンバーで、値は \"2.0\" でなければならない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2.0"
      allowed_values: ["2.0"]
      source_claims: [mcp-result-response-json-rpc]
    - id: id
      labels: {zh: "JSON-RPC 标识", en: "JSON-RPC id", ja: "JSON-RPC id"}
      definitions:
        zh: "与所响应请求相同的原生 JSON-RPC id。"
        en: "The native JSON-RPC id equal to the request being answered."
        ja: "応答対象の要求と同じネイティブな JSON-RPC id。"
      datatype: string-or-number-or-null
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 4
      allowed_values: []
      source_claims: [mcp-result-response-json-rpc, mcp-result-response-session]
    - id: result
      labels: {zh: "成功结果", en: "Success result", ja: "成功結果"}
      definitions:
        zh: "成功响应中的原生 result 成员；它不能与 error 同时出现。"
        en: "The native result member of a successful response; it cannot coexist with error."
        ja: "成功応答のネイティブな result メンバー。error と共存できない。"
      datatype: json
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: {"contents":[]}
      allowed_values: []
      source_claims: [mcp-result-response-json-rpc]
  constraints:
    - id: result-response-omits-error
      severity: error
      expression_language: plain
      expression: A success response contains result and omits JSON-RPC error.
      explanation:
        zh: 成功响应包含 result 并省略 JSON-RPC error。
        en: A success response contains result and omits JSON-RPC error.
        ja: 成功レスポンスはresultを含みJSON-RPC errorを省略する。
      source_claims: [mcp-result-response-json-rpc]
    - id: result-response-result-is-method-specific
      severity: error
      expression_language: plain
      expression: The result value is decoded against the method of the correlated request rather than treated as one universal payload schema.
      explanation:
        zh: result 值应按关联请求的方法解码，不能当作一种通用 payload schema。
        en: The result value is decoded against the method of the correlated request rather than treated as one universal payload schema.
        ja: result値は一つの普遍的payload schemaとしてではなく、相関リクエストのmethodに対してデコードされる。
      source_claims: [mcp-result-response-json-rpc]
  required_relations: []
examples:
  - id: mcp-result-response-positive-tools-list

    labels: {zh: 工具列表成功结果, en: Successful tool list result, ja: 成功したtoolリストresult}

    descriptions:
      zh: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。"
      en: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths."
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"jsonrpc":"2.0","id":4,"result":{"tools":[{"name":"get_weather"}]}}
    related_node_ids: [MCPResultResponse, MCPResponse]
    related_relation_ids: [MCPResultResponse-is_a-MCPResponse]

    source_claims: [mcp-result-response-json-rpc]
  - id: mcp-result-response-counterexample-error-member

    labels: {zh: 误标为成功的错误响应, en: Error response mislabeled as success, ja: 成功と誤分類されたerrorレスポンス}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"jsonrpc":"2.0","id":4}
    related_node_ids: [MCPResultResponse, MCPErrorResponse]
    related_relation_ids: [MCPResultResponse-is_a-MCPResponse]

    source_claims: [mcp-result-response-json-rpc]
  - id: mcp-result-response-boundary-tool-is-error

    labels: {zh: JSON-RPC 成功与工具层错误的边界, en: Boundary between JSON-RPC success and tool-level error, ja: JSON-RPC成功とtool層errorの境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"jsonrpc":"2.0","id":2,"result":{"content":[],"isError":true}}
    related_node_ids: [MCPResultResponse, MCPToolCallRequest]
    related_relation_ids: [MCPResultResponse-is_a-MCPResponse]

    source_claims: [mcp-result-response-json-rpc, mcp-tools-result]
  - id: mcp-result-response-instance-tools-list-4

    labels: {zh: tools/list 成功响应实例, en: tools/list success response instance, ja: tools/list成功レスポンスインスタンス}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"jsonrpc":"2.0","id":4,"result":{"tools":[{"name":"get_weather"}]}}
    related_node_ids: [MCPResultResponse, MCPResponse]
    related_relation_ids: [MCPResultResponse-is_a-MCPResponse]

    source_claims: [mcp-result-response-json-rpc]
parent_relation:
  id: MCPResultResponse-is_a-MCPResponse
  predicate: is_a
  target: concept:MCPResponse
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是成功响应, en: is a success response, ja: 成功レスポンスである}
  definition:
    zh: MCPResultResponse 是具有 result、没有 JSON-RPC error 的 MCPResponse。
    en: An MCPResultResponse is an MCPResponse with result and no JSON-RPC error.
    ja: MCPResultResponseはresultを持ちJSON-RPC errorを持たないMCPResponseである。
  cardinality:
    source: {min: 0, max: null}
    target: {min: 1, max: 1}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_success_response
    labels: {zh: 具有成功响应, en: has success response, ja: 成功レスポンスを持つ}
  conditions: []
  temporal_scope: session
  boundary_context: 不包括 error response，也不把 method result 内的 isError 当作 JSON-RPC error。
  constraints:
    - id: result-response-discriminator
      severity: error
      expression_language: plain
      expression: An MCPResultResponse has result and no JSON-RPC error member.
      explanation:
        zh: MCPResultResponse 有 result 且没有 JSON-RPC error 成员。
        en: An MCPResultResponse has result and no JSON-RPC error member.
        ja: MCPResultResponseはresultを持ちJSON-RPC errorメンバーを持たない。
      source_claims: [mcp-result-response-json-rpc]
  examples: []
  source_claims: [moonweave-mcp-result-response-taxonomy]
  distinct_fact_rationale:
    zh: 此子类由 JSON-RPC result/error 区分，而非 result payload 的应用语义。
    en: This subtype is distinguished by JSON-RPC result/error, not application semantics of the result payload.
    ja: この下位型はresult payloadのアプリケーション意味ではなくJSON-RPC result/errorで区別される。
relations: []
sources:
  - id: json-rpc-2-0
    title: JSON-RPC 2.0 Specification
    url: https://www.jsonrpc.org/specification
    source_type: official-specification
    locator: "Response object"
    relevance: Defines successful result response shape and exclusion of error.
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification — Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-specification
    locator: "Calling Tools; Tool Result"
    relevance: Defines tool result content and isError inside a successful JSON-RPC result.
  - id: mcp-lifecycle-2025-11-25
    title: Model Context Protocol Specification — Lifecycle
    url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
    source_type: official-specification
    locator: "Operation; Timeouts"
    relevance: Defines request operations and response waiting within an MCP session, including timeout expectations.
source_claims:
  - id: mcp-result-response-json-rpc
    source: json-rpc-2-0
    supports: A JSON-RPC success response uses request id and result while error is absent.
    locator: "Response object"
    evidence_kind: normative
    confidence: high
  - id: moonweave-mcp-result-response-taxonomy
    source: json-rpc-2-0
    supports: "Moonweave classifies a successful JSON-RPC response used by MCP as an MCPResponse for navigation; this subclass edge is a taxonomy design inference."
    locator: "5 Response Object"
    evidence_kind: design-inference
    confidence: high
  - id: mcp-result-response-session
    source: mcp-lifecycle-2025-11-25
    supports: An MCP request operation and its response wait occur within a stateful session and are bounded by timeout expectations.
    locator: "Operation; Timeouts"
    evidence_kind: normative
    confidence: high
  - id: mcp-tools-result
    source: mcp-tools-2025-11-25
    supports: A ToolResult includes content and isError and is returned as the result of tools/call.
    locator: "Calling Tools; Tool Result"
    evidence_kind: normative
    confidence: high