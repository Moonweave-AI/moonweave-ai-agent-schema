        en: Do not assert MCPResultResponse-is_a-MCPResponse; retain the broader or adjacent fact actually present.
        ja: MCPResultResponse-is_a-MCPResponse を確立せず、実際の broader/adjacent fact を保持します。
      why_valid_or_invalid:
