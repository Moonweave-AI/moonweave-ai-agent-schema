schema: moonweave.ai/ontology-node/v1
id: MCPResultResponse
kind: concept
status: review
labels:
  zh: MCP 结果响应
  en: MCP result response
  ja: MCP 結果応答
semantics:
  short_definition:
    zh: 以请求 id 返回 result 且不带 error 的 MCP 响应。
    en: An MCP response carrying result and no error under the request ID.
    ja: request ID で result を返し error を持たない MCP response。
  definition:
    zh: MCP 结果响应是 MCPResponse 的严格下位类型，继承 MCPResponse 的 message_record_id 作为线路响应记录身份。request_id 是继承的请求关联字段，必须回显对应请求的值；必需的 result 与 response_member=result 构成种差且不得同时出现 error。JSON-RPC 层成功不排除内部 CallToolResult 以 isError=true 报告工具级失败。
    en: An MCP result response is a strict MCPResponse subtype and inherits the message_record_id wire-response identity from MCPResponse. The inherited request_id is a correlation field and must repeat the corresponding request value; required result together with response_member=result supplies the differentia, and error cannot coexist. JSON-RPC-level success does not prevent an inner CallToolResult from reporting tool-level failure with isError=true.
    ja: MCP result response は MCPResponse の厳密な下位型で、MCPResponse から wire response record の identity である message_record_id を継承します。継承した request_id は request 相関 field で対応値を必ず反映し、必須 result と response_member=result が種差となり error は共存しません。inner CallToolResult は isError=true を返せます。
  why_needed:
    zh: 独立子型防止把工具业务失败误升级为 JSON-RPC error，并支持精确关联成功结果载荷。
    en: A distinct subtype prevents tool-level failure from being promoted to JSON-RPC error and supports precise correlation of successful result payloads.
    ja: 独立 subtype により tool-level failure を JSON-RPC error へ誤昇格せず successful result payload を正確に相関します。
  includes:
    - zh: 纳入具有同一请求 id、result 且没有 error 的协议响应。
      en: Includes protocol responses with the correlated request ID, result, and no error.
      ja: correlated request ID・result を持ち error 無しの protocol response を含みます。
  excludes:
    - zh: 排除 error response、HTTP 成功状态和 CallToolResult 本身。
      en: Excludes error responses, HTTP success statuses, and CallToolResult itself.
      ja: error response・HTTP success status・CallToolResult 自体を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: result
      labels:
        zh: 结果对象
        en: result object
        ja: result object
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 映射 JSON-RPC 成功响应的必需 result 成员；具体 MCP 方法决定其中的属性合同，且同一响应不得同时带 error。
        en: Maps the required result member of a successful JSON-RPC response; the concrete MCP method determines its property contract, and the same response cannot also carry error.
        ja: successful JSON-RPC response の required result member に対応し、具体 MCP method が property contract を決め、同一 response は error を同時に保持できません。
      allowed_values: []
      pattern: null
      example_value:
        tools: []
      source_claims:
        - claim-mcp-result-response-002
    - id: elicitation_action
      labels:
        zh: 征询结果动作
        en: elicitation result action
        ja: elicitation 結果 action
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 当该结果响应回答 `elicitation/create` 时，记录用户或客户端选择的 `accept`、`decline` 或 `cancel`；其他 MCP 结果响应不使用该字段。
        en: When this result response answers elicitation/create, records the client or user choice accept, decline, or cancel; other MCP result responses do not use this field.
        ja: この result response が `elicitation/create` に応答する場合、client/user の選択 accept・decline・cancel を記録し、他の MCP result response では使用しません。
      allowed_values:
        - id: MCPElicitationActionAccept
          value: accept
          labels:
            zh: 接受并提交输入
            en: accept and submit input
            ja: 入力を accept して submit
          definitions:
            zh: 用户接受请求，并在结果 content 中提交所请求的输入。
            en: The user accepts the request and submits the requested input in the result content.
            ja: user が request を accept し、result content に requested input を submit します。
          status: accepted
          source_claims:
            - claim-mcp-result-response-003
        - id: MCPElicitationActionDecline
          value: decline
          labels:
            zh: 拒绝请求
            en: decline request
            ja: request を decline
          definitions:
            zh: 用户明确拒绝提供请求的输入。
            en: The user explicitly declines to provide the requested input.
            ja: user が requested input の提供を明示的に decline します。
          status: accepted
          source_claims:
            - claim-mcp-result-response-004
        - id: MCPElicitationActionCancel
          value: cancel
          labels:
            zh: 取消交互
            en: cancel interaction
            ja: interaction を cancel
          definitions:
            zh: 用户在不接受也不明确拒绝请求内容的情况下取消交互。
            en: The user cancels the interaction without accepting or explicitly declining the requested content.
            ja: user が requested content を accept/decline せず interaction を cancel します。
          status: accepted
          source_claims:
            - claim-mcp-result-response-005
      pattern: null
      example_value: accept
      source_claims:
        - claim-mcp-result-response-006
    - id: elicitation_content
      labels:
        zh: 征询响应内容
        en: elicitation response content
        ja: elicitation 応答 content
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: "仅当该响应是表单模式 `elicitation/create` 的 `action: accept` 结果时，保存与请求 `requestedSchema` 匹配的字符串、数字、布尔值或字符串数组属性；`decline`、`cancel` 及 URL 模式结果省略该字段。"
        en: "Only for an action: accept result of a form-mode elicitation/create, carries properties matching requestedSchema whose values are strings, numbers, booleans, or string arrays; decline, cancel, and URL-mode results omit the field."
        ja: "form-mode `elicitation/create` の `action: accept` result に限り、requestedSchema に適合する string・number・boolean・string array value の property を保持し、decline・cancel・URL-mode result では省略します。"
      allowed_values: []
      pattern: null
      example_value:
        confirmation: true
        display_name: Moonweave operator
      source_claims:
        - claim-mcp-result-response-007
  constraints:
    - id: mcp-result-response-correlation-and-member
      severity: error
      expression_language: plain
      expression: request_id MUST be present and equal the answered MCPRequest.request_id, response_member MUST equal result, and error MUST be absent.
      explanations:
        zh: 结果响应必须以继承的 request_id 字段回显原请求关联值，response_member 必须为 result，且不得同时带 error。
        en: A result response must repeat the original request correlation in inherited request_id, set response_member to result, and omit error.
        ja: result response は継承 request_id に元 request の相関値を反映し、response_member=result として error を持ちません。
      source_claims:
        - claim-mcp-result-response-008
  required_relation_constraints: []
examples:
  - id: MCPResultResponse-example-positive-001
    kind: positive
    labels:
      zh: MCP 结果响应正例
      en: Positive MCP result response case
      ja: MCP 結果応答の正例
    scenario_id: null
    descriptions:
      zh: tools/list 请求 id=41 后，服务器以 id=41 返回 `result:{tools:[...]}`。
      en: After tools/list request id=41, the server returns id=41 with result containing tools.
      ja: tools/list request id=41 後 server が同 id と tools result を返します。
    field_values:
      message_record_id: mcp-message:tools-list-result:41
      session_id: mcp-session-s-42
      jsonrpc: "2.0"
      message_kind: result-response
      response_member: result
      request_id: 41
      result:
        tools:
          - name: read_file
            inputSchema:
              type: object
              properties:
                path:
                  type: string
              required:
                - path
    related_node_ids:
      - MCPResultResponse
    related_relation_ids: []
    expected_result:
      zh: 归为 MCPResultResponse，并与请求 41 关联。
      en: Classify MCPResultResponse and correlate it with request 41.
      ja: MCPResultResponse として request 41 に対応させます。
    why_valid_or_invalid:
      zh: 同一 id 与 result/error 互斥条件都满足。
      en: The same-ID and result/error exclusivity conditions are both satisfied.
      ja: same-ID と result/error exclusivity を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-result-response-001
  - id: MCPResultResponse-example-boundary-001
    kind: boundary
    labels:
      zh: MCP 结果响应边界例
      en: Boundary MCP result response case
      ja: MCP 結果応答の境界例
    scenario_id: null
    descriptions:
      zh: tools/call 的外层 result 含 `isError:true`。
      en: A tools/call outer result contains isError=true.
      ja: tools/call outer result が isError=true を含みます。
    field_values: {}
    related_node_ids:
      - MCPResultResponse
    related_relation_ids: []
    expected_result:
      zh: 外层仍归 MCPResultResponse；内层形成工具失败信息。
      en: Keep the outer message as MCPResultResponse; model the inner value as tool failure information.
      ja: outer message は MCPResultResponse のまま、inner value を tool failure 情報とします。
    why_valid_or_invalid:
      zh: CallToolResult.isError 不改变 JSON-RPC result 分支。
      en: CallToolResult.isError does not change the JSON-RPC result branch.
      ja: CallToolResult.isError は JSON-RPC result branch を変更しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-result-response-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: MCPErrorResponse
    shared_parent_concept_id: MCPResponse
    differentia:
      zh: MCPResultResponse 与 MCPErrorResponse 同属 MCPResponse；MCPResultResponse 只带 result 并表示 JSON-RPC 成功；MCPErrorResponse 只带 error 且必须包含错误 code 与 message。
      en: MCPResultResponse and MCPErrorResponse share MCPResponse; MCPResultResponse carries only result and records JSON-RPC success, whereas MCPErrorResponse carries only error with a required code and message.
      ja: MCPResultResponse と MCPErrorResponse は MCPResponse を共有し、MCPResultResponse は result のみで JSON-RPC success、MCPErrorResponse は required code/message を持つ error のみです。
    source_claims:
      - claim-mcp-result-response-009
parent_relation:
  id: MCPResultResponse-is_a-MCPResponse
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: MCPResultResponse是一种MCPResponse
    en: MCPResultResponse is a MCPResponse
    ja: MCPResultResponseがMCPResponseを一種である
  definitions:
    zh: MCPResultResponse 是 MCPResponse 的严格子型；其必要身份差异是：MCP 结果响应是一种 MCP 响应（MCPResponse），以与请求相同的 RequestId 返回必需的 `result` 对象且不含 `error`；它表示 JSON-RPC 层成功完成，但内部 CallToolResult 仍可用 `isError=true` 报告工具级失败。
    en: "MCPResultResponse is a strict subtype of MCPResponse; its necessary identity differentia is: An MCP result response is an MCPResponse that uses the request's RequestId, contains the required result object, and contains no error. It records JSON-RPC-level success even when an inner CallToolResult reports a tool-level failure with isError=true."
    ja: MCPResultResponse は MCPResponse の strict subtype であり、必要な identity differentia は次の通りです：MCP result response は MCPResponse の一種で request と同じ RequestId、必須 result object、error 無しを満たします。JSON-RPC success を表しますが inner CallToolResult は isError=true で tool-level failure を報告できます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
    en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
    ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: MCPResponse反向关联MCPResultResponse
      en: MCPResponse is the inverse target of MCPResultResponse
      ja: MCPResponseからMCPResultResponseへの逆読解
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
