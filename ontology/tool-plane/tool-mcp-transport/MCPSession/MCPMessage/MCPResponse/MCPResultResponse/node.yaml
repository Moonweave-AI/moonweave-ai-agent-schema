      kind: positive
      labels:
        zh: MCPResultResponse-is_a-MCPResponse 正例
        en: Positive case for MCPResultResponse-is_a-MCPResponse
        ja: MCPResultResponse-is_a-MCPResponse の正例
      scenario_id: null
      descriptions:
        zh: tools/list 请求 id=41 后，服务器以 id=41 返回 `result:{tools:[...]}`。
        en: After tools/list request id=41, the server returns id=41 with result containing tools.
        ja: tools/list request id=41 後 server が同 id と tools result を返します。
      field_values: {}
