        en: The MCPResultResponse boundary case lacks the method, direction, payload, or state required by the subtype and cannot be classified through shared vocabulary.
        ja: MCPResultResponse boundary case は subtype に必要な method・direction・payload・state を欠き、shared vocabulary だけで分類できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-mcp-result-response-010
  source_claims:
