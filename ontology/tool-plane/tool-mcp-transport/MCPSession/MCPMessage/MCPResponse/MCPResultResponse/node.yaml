        en: Assert MCPResultResponse-is_a-MCPResponse with the stated protocol direction and conditions.
        ja: MCPResultResponse-is_a-MCPResponse を stated protocol direction/condition 付きで確立します。
      why_valid_or_invalid:
        zh: 仅当对象满足 MCPResultResponse 的全部身份条件时，才能沿 is_a 归入 MCPResponse。
        en: Assert the subtype edge only when the object satisfies every identity condition of MCPResultResponse.
        ja: object が MCPResultResponse の全 identity condition を満たす時だけ is_a edge を確立します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-mcp-result-response-010
    - id: MCPResultResponse-is_a-MCPResponse-example-boundary-001
      kind: boundary
      labels:
        zh: MCPResultResponse-is_a-MCPResponse 边界例
        en: Boundary case for MCPResultResponse-is_a-MCPResponse
        ja: MCPResultResponse-is_a-MCPResponse の境界例
      scenario_id: null
      descriptions:
        zh: tools/call 的外层 result 含 `isError:true`。
        en: A tools/call outer result contains isError=true.
        ja: tools/call outer result が isError=true を含みます。
      field_values: {}
      related_node_ids:
