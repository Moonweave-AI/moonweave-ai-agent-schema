source_claims:
  - id: claim-mcp-response-001
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 defines the base protocol as JSON-RPC request, result-response, error-response, and notification records; it also fixes request-ID uniqueness within a session and separates lifecycle, capability negotiation, transport, authorization, server features, and client features.
    locator: MCP 2025-11-25 > Base Protocol > Overview > Messages and Lifecycle
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-mcp-response-002
    source: eng-proto-mcp-2025-spec
    supports: A JSON-RPC response repeats the request id, while an error for an invalid or unknown id can use null.
    locator: MCP 2025-11-25 > Base Protocol > Responses and errors > id
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-mcp-response-003
    source: eng-proto-mcp-2025-spec
    supports: A JSON-RPC result response carries result and id.
    locator: MCP 2025-11-25 > Base Protocol > Result responses
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-mcp-response-004
    source: eng-proto-mcp-2025-spec
    supports: A JSON-RPC error response carries error and id rather than result.
    locator: MCP 2025-11-25 > Base Protocol > Error responses
    evidence_kind: normative
