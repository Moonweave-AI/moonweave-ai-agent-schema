      kind: positive
      labels:
        zh: MCPResponse-is_a-MCPMessage 正例
        en: Positive case for MCPResponse-is_a-MCPMessage
        ja: MCPResponse-is_a-MCPMessage の正例
      scenario_id: null
      descriptions:
        zh: 服务器返回 `{"jsonrpc":"2.0","id":41,"result":{"tools":[...]}}`，与先前 id 41 的请求关联。
        en: The server returns `{"jsonrpc":"2.0","id":41,"result":{"tools":[...]}}`, correlated with the earlier request id 41.
        ja: server が `{"jsonrpc":"2.0","id":41,"result":{"tools":[...]}}` を返し、先の id 41 request と相関します。
      field_values: {}
      related_node_ids:
        - MCPResponse
        - MCPMessage
      related_relation_ids:
        - MCPResponse-is_a-MCPMessage
      expected_result:
        zh: 建立 MCPResponse-is_a-MCPMessage，并保留所述协议方向与条件。
        en: Assert MCPResponse-is_a-MCPMessage with the stated protocol direction and conditions.
        ja: MCPResponse-is_a-MCPMessage を stated protocol direction/condition 付きで確立します。
      why_valid_or_invalid:
        zh: 仅当对象满足 MCPResponse 的全部身份条件时，才能沿 is_a 归入 MCPMessage。
        en: Assert the subtype edge only when the object satisfies every identity condition of MCPResponse.
        ja: object が MCPResponse の全 identity condition を満たす時だけ is_a edge を確立します。
      synthetic: true
