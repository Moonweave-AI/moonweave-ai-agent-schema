schema: moonweave.ai/ontology-node/v1
id: MCPResponse
kind: concept
labels:
  zh: MCP 响应
  en: MCP response
  ja: MCPレスポンス
semantics:
  short_definition:
    zh: 以相同 JSON-RPC id 对一个 MCP 请求返回 result 或 error 的消息。
    en: A message that returns either result or error for one MCP request using the same JSON-RPC id.
    ja: 一つのMCPリクエストに同じJSON-RPC idでresultまたはerrorを返すメッセージ。
  definition:
    zh: >
      MCP 响应是 JSON-RPC 2.0 response object，用与触发请求相同的 id 关联。它必须包含恰好一个
      `result` 或 `error` 成员，且不含 method。MCP 响应可以承载任意已协商协议方法的成功数据或标准
      JSON-RPC 错误；它不是没有 id 的通知，也不是一个新的请求。
    en: >
      An MCP response is a JSON-RPC 2.0 response object correlated with its triggering request
      by the same id. It contains exactly one of `result` or `error` and no method. An MCP
      response can carry successful data for any negotiated protocol method or a standard
      JSON-RPC error; it is neither an id-less notification nor a new request.
    ja: >
      MCPレスポンスは、同じidで起点リクエストに対応付けられるJSON-RPC 2.0 response objectである。
      `result` または `error` のちょうど一方を含みmethodを持たない。MCPレスポンスは任意の交渉済み
      プロトコルメソッドの成功データまたは標準JSON-RPC errorを運べる。idなし通知でも新しいリクエストでもない。
  why_needed:
    zh: >
      响应提供请求的终止语义：发送方可用 id 识别完成、成功、失败和可重试的情况。将成功与错误分开也使
      调用方可以稳定地处理协议错误而不从业务数据或 transport 状态猜测结果。
    en: >
      A response supplies a request's termination semantics: the sender can use id to identify
      completion, success, failure, and retryable cases. Keeping success distinct from error
      also lets callers handle protocol failures without guessing from business data or transport state.
    ja: >
      レスポンスはリクエストの終了意味を与える。送信側はidで完了、成功、失敗、再試行可能な場合を識別できる。
      成功をerrorから分けることで、呼び出し側はビジネスデータやトランスポート状態から推測せずにプロトコル
      失敗を安定して扱える。
  includes:
    - zh: 带相同 id 的成功 `result` 对象。
      en: A successful `result` object with the matching id.
      ja: 対応するidを持つ成功 `result` オブジェクト。
    - zh: 带相同 id 的 `error` 对象，包含 code 和 message。
      en: An `error` object with matching id, code, and message.
      ja: 対応するid、code、messageを持つ `error` オブジェクト。
    - zh: 对一个已收到 JSON-RPC 请求的终止答复。
      en: A terminal answer to one received JSON-RPC request.
      ja: 一つの受信済みJSON-RPCリクエストへの終端回答。
  excludes:
    - zh: 不带 id 的通知。
      en: A notification with no id.
      ja: idを持たない通知。
    - zh: method 和 id 同时存在的新请求。
      en: A new request that has both method and id.
      ja: methodとidの両方を持つ新しいリクエスト。
  semantic_kind: information
  aliases:
    - language: en
      value: JSON-RPC response
      alias_kind: synonym
engineering:
  explanation:
    zh: >
      接收请求时实现应保存 id、方法和超时上下文。完成后它构造一个 JSON-RPC 2.0 response object：成功时
      设置 result，失败时设置 error，绝不能同时设置二者。调用方将 id 匹配到 pending request 后，根据
      result 或 error 分支而不是把 SSE/HTTP 连接关闭视为一个响应。
    en: >
      On receiving a request, an implementation keeps its id, method, and timeout context. On
      completion it constructs a JSON-RPC 2.0 response object: success sets result, failure sets
      error, and it never sets both. The caller matches id to a pending request then branches on
      result or error instead of treating an SSE or HTTP connection close as a response.
    ja: >
      リクエスト受信時、実装はid、method、タイムアウト文脈を保持する。完了時にJSON-RPC 2.0 response
      objectを構成し、成功はresult、失敗はerrorを設定し両方は設定しない。呼び出し側はidを保留リクエストに
      対応付け、SSEまたはHTTP接続の切断をレスポンスと見なさずresultまたはerrorで分岐する。
  typical_input:
    - description: The native JSON-RPC request a server correlates while the MCP operation remains pending in its session.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 2,
          "method": "resources/read",
          "params": {"uri": "file:///project/src/main.rs"}
        }
      source_claims: [json-rpc-response-correlation, mcp-response-session]
  typical_output:
    - description: Error response for a resource not found.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 2,
          "error": {
            "code": -32002,
            "message": "Resource not found",
            "data": {"uri": "file:///project/src/main.rs"}
          }
        }
      source_claims: [json-rpc-response-correlation]
  reference_implementations:
    - name: JSON-RPC 2.0 specification
      url: https://www.jsonrpc.org/specification
      description: Defines response id, mutually exclusive result/error, and error object shape.
    - name: MCP lifecycle specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
      description: Defines request timeouts and cancellation behavior in MCP sessions.
structure:
  identity_keys: ["id"]
  fields:
    - id: jsonrpc
      labels: {zh: "JSON-RPC 版本", en: "JSON-RPC version", ja: "JSON-RPC バージョン"}
      definitions:
        zh: "MCP 响应包络中的原生 jsonrpc 成员，值必须为 \"2.0\"。"
        en: "The native jsonrpc member of the MCP response envelope; it must be \"2.0\"."
        ja: "MCP 応答エンベロープのネイティブな jsonrpc メンバーで、値は \"2.0\" でなければならない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2.0"
      allowed_values: ["2.0"]
      source_claims: [json-rpc-response-correlation]
    - id: id
      labels: {zh: "JSON-RPC 标识", en: "JSON-RPC id", ja: "JSON-RPC id"}
      definitions:
        zh: "与所响应请求相同的原生 JSON-RPC id。"
        en: "The native JSON-RPC id equal to the request being answered."
        ja: "応答対象の要求と同じネイティブな JSON-RPC id。"
      datatype: string-or-number-or-null
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2
      allowed_values: []
      source_claims: [json-rpc-response-correlation]
    - id: result
      labels: {zh: "成功结果", en: "Success result", ja: "成功結果"}
      definitions:
        zh: "成功响应中的原生 result 成员；它不能与 error 同时出现。"
        en: "The native result member of a successful response; it cannot coexist with error."
        ja: "成功応答のネイティブな result メンバー。error と共存できない。"
      datatype: json
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {"contents":[]}
      allowed_values: []
      source_claims: [json-rpc-response-result-error]
    - id: error
      labels: {zh: "错误对象", en: "Error object", ja: "エラーオブジェクト"}
      definitions:
        zh: "失败响应中的原生 error 对象；它不能与 result 同时出现。"
        en: "The native error object of a failed response; it cannot coexist with result."
        ja: "失敗応答のネイティブな error オブジェクト。result と共存できない。"
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {"code":-32002,"message":"Resource not found"}
      allowed_values: []
      source_claims: [json-rpc-response-result-error]
  constraints:
    - id: response-has-exactly-one-outcome
      severity: error
      expression_language: plain
      expression: An MCP response includes exactly one of result or error and includes no method.
      explanation:
        zh: MCP 响应恰好包含 result 或 error 之一，并且不包含 method。
        en: An MCP response includes exactly one of result or error and includes no method.
        ja: MCPレスポンスはresultまたはerrorのちょうど一方を含みmethodを含まない。
      source_claims: [json-rpc-response-result-error]
    - id: response-id-matches-request
      severity: error
      expression_language: plain
      expression: The response id equals the id of the request it answers.
      explanation:
        zh: 响应 id 等于它答复的请求 id。
        en: The response id equals the id of the request it answers.
        ja: レスポンスidはそれが答えるリクエストidと等しい。
      source_claims: [json-rpc-response-correlation]
  required_relations: []
examples:
  - id: mcp-response-positive-resource-read-result

    labels: {zh: 资源读取成功响应, en: Successful resource read response, ja: 成功したresource readレスポンス}

    descriptions:
      zh: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。"
      en: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths."
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"jsonrpc":"2.0","id":2,"result":{"contents":[{"uri":"file:///project/src/main.rs","text":"fn main() {}"}]}}
    related_node_ids: [MCPResponse, MCPResultResponse]
    related_relation_ids: [MCPResponse-is_a-MCPMessage]

    source_claims: [json-rpc-response-correlation, json-rpc-response-result-error]
  - id: mcp-response-counterexample-both-result-error

    labels: {zh: 同时带结果和错误的响应, en: Response containing both result and error, ja: resultとerrorの両方を含むレスポンス}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"jsonrpc":"2.0","id":2,"result":{},"error":{"code":-32603,"message":"Internal error"}}
    related_node_ids: [MCPResponse]
    related_relation_ids: [MCPResponse-is_a-MCPMessage]

    source_claims: [json-rpc-response-result-error]
  - id: mcp-response-boundary-notification

    labels: {zh: 响应与通知的边界, en: Boundary between response and notification, ja: レスポンスと通知の境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"jsonrpc":"2.0","id":2,"result":{"contents":[]}}
    related_node_ids: [MCPResponse, MCPNotification]
    related_relation_ids: [MCPResponse-is_a-MCPMessage]

    source_claims: [json-rpc-response-correlation]
  - id: mcp-response-instance-resource-not-found

    labels: {zh: 资源未找到响应实例, en: Resource-not-found response instance, ja: resource-not-foundレスポンスインスタンス}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"jsonrpc":"2.0","id":2,"error":{"code":-32002,"message":"Resource not found"}}
    related_node_ids: [MCPResponse, MCPErrorResponse]
    related_relation_ids: [MCPResponse-is_a-MCPMessage]

    source_claims: [json-rpc-response-correlation, json-rpc-response-result-error]
parent_relation:
  id: MCPResponse-is_a-MCPMessage
  predicate: is_a
  target: concept:MCPMessage
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是响应消息, en: is a response message, ja: レスポンスメッセージである}
  definition:
    zh: MCPResponse 是带 id、带 result 或 error 且没有 method 的 MCPMessage。
    en: An MCPResponse is an MCPMessage with id, result or error, and no method.
    ja: MCPResponseはidとresultまたはerrorを持ちmethodを持たないMCPMessageである。
  cardinality:
    source: {min: 0, max: null}
    target: {min: 1, max: 1}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_response_message
    labels: {zh: 具有响应消息, en: has response message, ja: レスポンスメッセージを持つ}
  conditions: []
  temporal_scope: session
  boundary_context: 该关系不包括通知或请求，也不把 transport 关闭解释为响应。
  constraints:
    - id: response-subtype-discriminator
      severity: error
      expression_language: plain
      expression: An MCPResponse has id and exactly one outcome but no method.
      explanation:
        zh: MCPResponse 有 id 和恰好一个 outcome，但没有 method。
        en: An MCPResponse has id and exactly one outcome but no method.
        ja: MCPResponseはidとちょうど一つのoutcomeを持つがmethodを持たない。
      source_claims: [json-rpc-response-result-error]
  examples: []
  source_claims: [moonweave-mcp-response-taxonomy]
  distinct_fact_rationale:
    zh: 此专门化由关联 id、终止 outcome 和无 method 的 JSON-RPC shape 区分。
    en: This specialization is distinguished by correlated id, terminal outcome, and JSON-RPC shape without method.
    ja: この特殊化は相関id、終端outcome、methodを持たないJSON-RPC形状により区別される。
relations: []
sources:
  - id: json-rpc-2-0
    title: JSON-RPC 2.0 Specification
    url: https://www.jsonrpc.org/specification
    source_type: official-specification
    locator: "Response object; Error object; Notification"
    relevance: Defines response id, result/error exclusivity, error object, and notification distinction.
  - id: mcp-lifecycle-2025-11-25
    title: Model Context Protocol Specification — Lifecycle
    url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
    source_type: official-specification
    locator: "Operation; Timeouts"
    relevance: Defines MCP request operation, timeout, cancellation, and response waiting behavior.
source_claims:
  - id: json-rpc-response-correlation
    source: json-rpc-2-0
    supports: A JSON-RPC response uses the same id as its request and contains no method.
    locator: "Response object"
    evidence_kind: normative
    confidence: high
  - id: moonweave-mcp-response-taxonomy
    source: json-rpc-2-0
    supports: "Moonweave classifies a JSON-RPC response envelope carried by MCP as an MCPMessage for navigation; this subclass edge is a taxonomy design inference."
    locator: "5 Response Object"
    evidence_kind: design-inference
    confidence: high
  - id: json-rpc-response-result-error
    source: json-rpc-2-0
    supports: A response includes exactly one result or error and error contains code message and optional data.
    locator: "Response object; Error object"
    evidence_kind: normative
    confidence: high
  - id: mcp-response-session
    source: mcp-lifecycle-2025-11-25
    supports: MCP requests operate in a stateful session and implementations establish timeouts before awaiting responses.
    locator: "Operation; Timeouts"
    evidence_kind: normative
    confidence: high