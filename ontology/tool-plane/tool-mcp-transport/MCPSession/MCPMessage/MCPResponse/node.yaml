schema: moonweave.ai/ontology-node/v1
id: MCPResponse
kind: concept
status: review
labels:
  zh: MCP 响应
  en: MCP response
  ja: MCP 応答
semantics:
  short_definition:
    zh: 以请求 id 返回 result 或 error 的 MCP 关联消息。
    en: An MCP correlated message returning either result or error for a request id.
    ja: request id に result または error を返す MCP 相関 message。
  definition:
    zh: MCP 响应是一种 MCP 消息（MCPMessage），按同一 RequestId 关联先前请求，并由 MCPResultResponse 或 MCPErrorResponse 两个严格子型分别承载 result 或 error；它没有 method，也不等同于 HTTP 响应或 `CallToolResult.isError` 业务失败标志。
    en: An MCP response is an MCPMessage correlated to a prior request by the same RequestId and specialized strictly as MCPResultResponse carrying result or MCPErrorResponse carrying error. It has no method and is not an HTTP response or the business-failure flag CallToolResult.isError.
    ja: MCP response は MCPMessage の一種で同 RequestId により prior request と対応し、result を持つ MCPResultResponse または error を持つ MCPErrorResponse に厳密分類されます。method・HTTP response・CallToolResult.isError ではありません。
  why_needed:
    zh: 响应身份把协议错误、正常结果和工具执行失败分层，确保关联、重试和错误展示不会混用。
    en: Response identity separates protocol errors, normal results, and tool-execution failures so correlation, retry, and error presentation do not conflate them.
    ja: response 同一性は protocol error、normal result、tool execution failure を分離し、相関・再試行・表示の混同を防ぎます。
  includes:
    - zh: 纳入具有合法 RequestId 且恰含 result 或 error 之一的 JSON‑RPC 响应。
      en: Includes JSON-RPC responses with a valid RequestId and exactly one of result or error.
      ja: 正当な RequestId と result/error のどちらか一方を持つ JSON-RPC response を含みます。
  excludes:
    - zh: "排除包含 method 的请求/通知、HTTP 状态响应以及成功 JSON‑RPC result 中的工具级 `isError: true` 记录本身。"
      en: "Excludes messages with method, HTTP status responses, and the tool-level `isError: true` record nested inside an otherwise successful JSON-RPC result."
      ja: "method を持つ request/notification、HTTP status response、成功 JSON-RPC result 内の tool-level `isError: true` 記録自体を除きます。"
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - message_record_id
  fields:
    - id: request_id
      labels:
        zh: 关联请求标识
        en: correlated request ID
        ja: correlated request ID
      datatype: string-or-integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 关联先前请求的 JSON-RPC id；无法解析请求 id 的错误响应可为空。
        en: Correlates the prior JSON-RPC request id; an error response for an unparseable id may leave it absent.
        ja: 先行 JSON-RPC request id を相関し、id を解析できない error response では absent になり得ます。
      allowed_values: []
      pattern: null
      example_value: 41
      source_claims:
        - claim-mcp-response-002
    - id: response_member
      labels:
        zh: 响应成员
        en: response member
        ja: response member
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明响应携带 result 还是 error；两者互斥且响应不带 method。
        en: States whether the response carries result or error; the members are mutually exclusive and a response has no method.
        ja: response が result/error のどちらを持つかを示し、両者は mutually exclusive で method は持ちません。
      allowed_values:
        - id: MCPResponseMemberResult
          value: result
          labels:
            zh: 结果
            en: result
            ja: result
          definitions:
            zh: 成功或工具执行结果成员。
            en: The success or tool-execution result member.
            ja: success/tool-execution result member。
          status: accepted
          source_claims:
            - claim-mcp-response-003
        - id: MCPResponseMemberError
          value: error
          labels:
            zh: 协议错误
            en: protocol error
            ja: protocol error
          definitions:
            zh: JSON-RPC 协议错误成员。
            en: The JSON-RPC protocol-error member.
            ja: JSON-RPC protocol-error member。
          status: accepted
          source_claims:
            - claim-mcp-response-004
      pattern: null
      example_value: result
      source_claims:
        - claim-mcp-response-005
  constraints: []
  required_relation_constraints: []
examples:
  - id: mcp-response-positive-tools-page
    kind: positive
    labels:
      zh: tools/list 成功响应
      en: Successful tools/list response
      ja: tools/list 成功 response
    scenario_id: null
    descriptions:
      zh: 服务器返回 `{"jsonrpc":"2.0","id":41,"result":{"tools":[...]}}`，与先前 id 41 的请求关联。
      en: The server returns `{"jsonrpc":"2.0","id":41,"result":{"tools":[...]}}`, correlated with the earlier request id 41.
      ja: server が `{"jsonrpc":"2.0","id":41,"result":{"tools":[...]}}` を返し、先の id 41 request と相関します。
    field_values:
      message_record_id: mcp-message:tools-list-result:41
      session_id: mcp-session-s-42
      jsonrpc: "2.0"
      message_kind: result-response
      request_id: 41
      response_member: result
    related_node_ids:
      - MCPResponse
      - MCPToolList
      - MCPMessage
    related_relation_ids:
      - MCPResponse-is_a-MCPMessage
    expected_result:
      zh: 响应被关联到请求 41，并解析为成功 result。
      en: The response correlates to request 41 and is decoded as a successful result.
      ja: response は request 41 と相関し、成功 result として復号されます。
    why_valid_or_invalid:
      zh: 同一 id 与 result 字段满足成功响应结构。
      en: The matching id and result field satisfy the success-response structure.
      ja: 同じ id と result 項目が成功 response 構造を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-response-001
  - id: mcp-response-boundary-tool-iserror
    kind: boundary
    labels:
      zh: 工具级 isError
      en: Tool-level isError
      ja: tool-level isError
    scenario_id: null
    descriptions:
      zh: "`tools/call` 的 JSON‑RPC result 成功返回，但其 `result.isError` 为 true，表示工具执行失败。"
      en: A `tools/call` JSON-RPC result returns successfully while `result.isError` is true, indicating a tool-execution failure.
      ja: "`tools/call` の JSON-RPC result は成功ですが `result.isError` が true で、tool execution failure を示します。"
    field_values:
      jsonrpc_result: success
      tool_isError: true
    related_node_ids:
      - MCPResponse
    related_relation_ids: []
    expected_result:
      zh: 外层仍是成功 MCPResponse；内层失败不得改写为 JSON‑RPC error response。
      en: The outer object remains a successful MCPResponse; the inner failure is not rewritten as a JSON-RPC error response.
      ja: 外側は成功 MCPResponse のままで、内側失敗を JSON-RPC error response に変換しません。
    why_valid_or_invalid:
      zh: 协议关联成功与工具业务失败属于不同错误层。
      en: Protocol correlation success and tool business failure occupy different error layers.
      ja: protocol 相関成功と tool 業務失敗は別の error layer です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-response-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: MCPRequest
    shared_parent_concept_id: MCPMessage
    differentia:
      zh: MCPResponse 与 MCPRequest 同属 MCPMessage；MCPRequest 带 id 和 method 并要求响应；MCPResponse 以同 id 带 result 或 error 且无 method；MCPNotification 带 method 但无 id、也无响应。
      en: MCPResponse and MCPRequest share MCPMessage; MCPRequest has id and method and requires a response; MCPResponse has the same id with result or error and no method; MCPNotification has method but no id and receives no response.
      ja: MCPResponse と MCPRequest は MCPMessage を共有し、MCPRequest は id/method と応答義務、MCPResponse は同 id と result/error で method 無し、MCPNotification は method 有り id/応答無しです。
    source_claims:
      - claim-mcp-response-006
  - sibling_concept_id: MCPNotification
    shared_parent_concept_id: MCPMessage
    differentia:
      zh: MCPResponse 与 MCPNotification 同属 MCPMessage；MCPRequest 带 id 和 method 并要求响应；MCPResponse 以同 id 带 result 或 error 且无 method；MCPNotification 带 method 但无 id、也无响应。
      en: MCPResponse and MCPNotification share MCPMessage; MCPRequest has id and method and requires a response; MCPResponse has the same id with result or error and no method; MCPNotification has method but no id and receives no response.
      ja: MCPResponse と MCPNotification は MCPMessage を共有し、MCPRequest は id/method と応答義務、MCPResponse は同 id と result/error で method 無し、MCPNotification は method 有り id/応答無しです。
    source_claims:
      - claim-mcp-response-007
parent_relation:
  id: MCPResponse-is_a-MCPMessage
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: MCPResponse是一种MCPMessage
    en: MCPResponse is a MCPMessage
    ja: MCPResponseがMCPMessageを一種である
  definitions:
    zh: MCPResponse 是 MCPMessage 的严格子型；其必要身份差异是：MCP 响应是一种 MCP 消息（MCPMessage），按同一 RequestId 关联先前请求，并由 MCPResultResponse 或 MCPErrorResponse 两个严格子型分别承载 result 或 error；它没有 method，也不等同于 HTTP 响应或 `CallToolResult.isError` 业务失败标志。
    en: "MCPResponse is a strict subtype of MCPMessage; its necessary identity differentia is: An MCP response is an MCPMessage correlated to a prior request by the same RequestId and specialized strictly as MCPResultResponse carrying result or MCPErrorResponse carrying error. It has no method and is not an HTTP response or the business-failure flag CallToolResult.isError."
    ja: MCPResponse は MCPMessage の strict subtype であり、必要な identity differentia は次の通りです：MCP response は MCPMessage の一種で同 RequestId により prior request と対応し、result を持つ MCPResultResponse または error を持つ MCPErrorResponse に厳密分類されます。method・HTTP response・CallToolResult.isError ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
    en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
    ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: MCPMessage反向关联MCPResponse
      en: MCPMessage is the inverse target of MCPResponse
      ja: MCPMessageからMCPResponseへの逆読解
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
