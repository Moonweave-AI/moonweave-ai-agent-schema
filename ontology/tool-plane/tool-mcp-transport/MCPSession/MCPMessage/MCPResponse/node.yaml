    en: MCPResponse-is_a-MCPMessage records only the reviewed method, direction, payload, or subtype condition; it is not endpoint co-occurrence, a redundant inverse shortcut, or lexical similarity.
    ja: MCPResponse-is_a-MCPMessage は reviewed method・direction・payload・subtype condition のみを記録し、endpoint 共起・redundant inverse shortcut・lexical similarity ではありません。
