parent_relation:
  id: MCPElicitation-is_a-MCPRequest
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: MCPElicitation是一种MCPRequest
    en: MCPElicitation is a MCPRequest
    ja: MCPElicitationがMCPRequestを一種である
  definitions:
    zh: MCPElicitation 是 MCPRequest 的严格子型；其必要身份差异是：MCP 补充输入请求是一种 MCP 请求（MCPRequest），由服务器以 `elicitation/create` 发往已声明相应能力的客户端；表单模式使用受限 `requestedSchema`，URL 模式隔离敏感交互，并始终由客户端控制展示、同意与响应。普通追问或工具结果中的文字要求不是该协议请求。
    en: "MCPElicitation is a strict subtype of MCPRequest; its necessary identity differentia is: MCP elicitation is an MCPRequest sent by a server with elicitation/create to a client that declared the corresponding capability. Form mode uses restricted requestedSchema, URL mode isolates sensitive interaction, and the client controls presentation, consent, and response; ordinary questions or text inside a tool result are not this protocol request."
    ja: MCPElicitation は MCPRequest の strict subtype であり、必要な identity differentia は次の通りです：MCP elicitation は MCPRequest の一種で、server が capability を宣言した client へ elicitation/create を送ります。form mode は restricted requestedSchema、URL mode は sensitive interaction を分離し、client が表示・同意・応答を制御します。通常質問や tool result text ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
    en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
    ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: MCPRequest反向关联MCPElicitation
      en: MCPRequest is the inverse target of MCPElicitation
      ja: MCPRequestからMCPElicitationへの逆読解
