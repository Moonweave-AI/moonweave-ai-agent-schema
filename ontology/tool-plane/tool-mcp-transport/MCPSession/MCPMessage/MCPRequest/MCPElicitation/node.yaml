    differentia:
      zh: MCPElicitation 与 MCPSamplingRequest 同属 MCPRequest；五种请求按 method、发送方向与载荷不同：elicitation/create 和 sampling/createMessage 为服务器到客户端；prompts/get、resources/read、tools/call 为客户端到服务器，分别绑定提示、URI 和工具参数。
      en: "MCPElicitation and MCPSamplingRequest share MCPRequest; The five requests differ by method, direction, and payload: elicitation/create and sampling/createMessage travel server-to-client; prompts/get, resources/read, and tools/call travel client-to-server and bind prompt arguments, a URI, and tool arguments respectively."
      ja: MCPElicitation と MCPSamplingRequest は MCPRequest を共有し、五 request は method/direction/payload が異なり、elicitation/create・sampling/createMessage は server-to-client、prompts/get・resources/read・tools/call は client-to-server で prompt arguments・URI・tool arguments を各々束縛します。
    source_claims:
