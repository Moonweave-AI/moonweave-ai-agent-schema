schema: moonweave.ai/ontology-node/v1
id: MCPPromptGetRequest
kind: concept
status: review
labels:
  zh: MCP 提示获取请求
  en: MCP prompt-get request
  ja: MCP プロンプト取得要求
semantics:
  short_definition:
    zh: method=`prompts/get`、按名称和参数请求提示实例化的 MCP 请求。
    en: An MCP request with method prompts/get selecting a prompt by name and arguments.
    ja: method=prompts/get で name/argument により prompt を選ぶ MCP request。
  definition:
    zh: MCP 提示获取请求是 MCPRequest 的严格下位类型，沿 MCPRequest 继承 message_record_id 线路记录身份；继承的 request_id 仍只是响应关联值。method=prompts/get 与包含提示 name、可选 arguments 的 params 构成种差。它在线路层请求通用 PromptGetRequest 活动，不是 MCPPromptList、PromptDefinition、PromptInstantiation 或生成消息。
    en: An MCP prompt-get request is a strict MCPRequest subtype and inherits the message_record_id wire-record identity through MCPRequest; inherited request_id remains only a response-correlation value. method=prompts/get and params selecting a prompt name plus optional arguments provide the differentia. At the wire layer it requests a generic PromptGetRequest activity and is not MCPPromptList, PromptDefinition, PromptInstantiation, or generated messages.
    ja: MCP prompt-get request は MCPRequest の厳密な下位型で、MCPRequest を通じて wire record identity の message_record_id を継承し、継承 request_id は response correlation 値にすぎません。method=prompts/get と prompt name・任意 arguments を持つ params が種差で、list/definition/instantiation/message ではありません。
  why_needed:
    zh: 专门请求子型建立协议消息到通用调用的精确桥梁，避免把所有 MCPRequest 都误映射为提示获取。
    en: The specialized request creates a precise bridge from wire message to generic invocation without mapping every MCPRequest to prompt retrieval.
    ja: specialized request は wire message から generic invocation への正確な bridge を作り全 MCPRequest の誤 mapping を防ぎます。
  includes:
    - zh: 纳入具有 RequestId、method=prompts/get、name 与合法 arguments 的请求。
      en: Includes requests with RequestId, method prompts/get, name, and valid arguments.
      ja: RequestId・method=prompts/get・name・valid arguments を持つ request を含みます。
  excludes:
    - zh: 排除 prompts/list、PromptInstantiation 与普通 ToolCall。
      en: Excludes prompts/list, PromptInstantiation, and ordinary ToolCall.
      ja: prompts/list・PromptInstantiation・ordinary ToolCall を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: mcp-prompt-get-request-method
      severity: error
      expression_language: plain
      expression: Inherited method MUST equal prompts/get and inherited params MUST contain a prompt name; arguments MAY be present.
      explanations:
        zh: 继承的 method 必须为 prompts/get，params 必须给出提示 name，并可携带 arguments。
        en: Inherited method must be prompts/get, and params must provide a prompt name with optional arguments.
        ja: 継承 method は prompts/get、params は prompt name と任意 arguments を持たなければなりません。
      source_claims:
        - claim-mcp-prompt-get-request-002
  required_relation_constraints: []
