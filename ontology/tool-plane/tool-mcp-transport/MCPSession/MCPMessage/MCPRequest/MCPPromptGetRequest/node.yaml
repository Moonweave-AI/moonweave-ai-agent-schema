  - id: MCPPromptGetRequest-example-positive-001
    kind: positive
    labels:
      zh: MCP 提示获取请求正例
      en: Positive MCP prompt-get request case
      ja: MCP プロンプト取得要求の正例
    scenario_id: null
    descriptions:
      zh: id=22 的请求以 prompts/get 选择 release-summary 并传入 from/to 参数。
      en: Request id=22 selects release-summary with from/to arguments using prompts/get.
      ja: request id=22 が prompts/get で release-summary と from/to argument を選びます。
    field_values:
      message_record_id: mcp-message:prompt-get:22
      session_id: mcp-session-prompts-22
      jsonrpc: "2.0"
      message_kind: request
      request_id: 22
      method: prompts/get
      params:
        name: release-summary
        arguments:
          from: v2.3.0
          to: v2.4.0
    related_node_ids:
      - MCPPromptGetRequest
    related_relation_ids: []
    expected_result:
      zh: 归为 MCPPromptGetRequest 并请求一个 PromptGetRequest 活动。
      en: Classify MCPPromptGetRequest and request one PromptGetRequest activity.
      ja: MCPPromptGetRequest とし一 PromptGetRequest activity を要求します。
    why_valid_or_invalid:
      zh: method、id 与参数合同均属于提示获取。
      en: Method, ID, and parameter contract all belong to prompt retrieval.
      ja: method・ID・parameter contract が prompt retrieval に一致します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-prompt-get-request-003
  - id: MCPPromptGetRequest-example-boundary-001
    kind: boundary
    labels:
      zh: MCP 提示获取请求边界例
      en: Boundary MCP prompt-get request case
      ja: MCP プロンプト取得要求の境界例
    scenario_id: null
    descriptions:
      zh: id=23 使用 prompts/list 并带 cursor。
      en: Request id=23 uses prompts/list with a cursor.
      ja: request id=23 が cursor 付き prompts/list を使います。
    field_values: {}
    related_node_ids:
      - MCPPromptGetRequest
    related_relation_ids: []
    expected_result:
      zh: 保留为普通 MCPRequest，不归为 MCPPromptGetRequest。
      en: Keep a generic MCPRequest, not MCPPromptGetRequest.
      ja: generic MCPRequest とし MCPPromptGetRequest にしません。
    why_valid_or_invalid:
      zh: 发现列表与按名称实例化是不同方法和生命周期。
      en: List discovery and named instantiation are different methods and lifecycles.
      ja: list discovery と named instantiation は異なる method/lifecycle です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-prompt-get-request-003
