    shared_parent_concept_id: MCPRequest
    differentia:
      zh: MCPPromptGetRequest 与 MCPElicitation 同属 MCPRequest；五种请求按 method、发送方向与载荷不同：elicitation/create 和 sampling/create 为服务器到客户端；prompts/get、resources/read、tools/call 为客户端到服务器，分别绑定提示、URI 和工具参数。
      en: "MCPPromptGetRequest and MCPElicitation share MCPRequest; The five requests differ by method, direction, and payload: elicitation/create and sampling/create travel server-to-client; prompts/get, resources/read, and tools/call travel client-to-server and bind prompt arguments, a URI, and tool arguments respectively."
      ja: MCPPromptGetRequest と MCPElicitation は MCPRequest を共有し、五 request は method/direction/payload が異なり、elicitation/create・sampling/create は server-to-client、prompts/get・resources/read・tools/call は client-to-server で prompt arguments・URI・tool arguments を各々束縛します。
