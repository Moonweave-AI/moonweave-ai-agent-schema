schema: moonweave.ai/ontology-node/v1
id: MCPPromptGetRequest
kind: concept
labels:
  zh: MCP 获取提示词请求
  en: MCP prompts/get request
  ja: MCP prompts/getリクエスト
semantics:
  short_definition:
    zh: 客户端按名称请求服务器生成一个具体提示词消息集合的 `prompts/get` 请求。
    en: A `prompts/get` request in which a client asks a server to produce a named prompt's concrete messages.
    ja: クライアントがサーバーに名前付きpromptの具体的なメッセージ群を生成させる `prompts/get` リクエスト。
  definition:
    zh: >
      MCP prompts/get 请求是 method 为 `prompts/get` 的 MCP 请求。其 params 必须包含已公开提示词的
      `name`，并可包含用于定制该提示词的 `arguments`。服务器以同一 JSON-RPC id 返回 PromptResult，
      其中可含 description 和按角色排列的 messages；无效名称或缺失必填参数应产生 JSON-RPC 错误。
    en: >
      An MCP prompts/get request is an MCP request whose method is `prompts/get`. Its params
      contain the name of an exposed prompt and may contain arguments that customize it. The
      server returns a PromptResult with the same JSON-RPC id, which may contain a description
      and role-ordered messages; an invalid name or missing required argument should yield a
      JSON-RPC error.
    ja: >
      MCP prompts/getリクエストはmethodが `prompts/get` のMCPリクエストである。paramsには公開済みpromptの
      nameを含み、そのカスタマイズ用argumentsを含めてもよい。サーバーは同じJSON-RPC idでdescriptionと
      role順のmessagesを持ち得るPromptResultを返す。無効なnameまたは必須argumentsの欠落はJSON-RPC
      エラーになるべきである。
  why_needed:
    zh: >
      prompts/get 将可发现的提示词定义与一次具体、用户选择的提示词使用分开。客户端可先列出定义，
      再向服务器请求带当前参数的消息，而不是复制模板或把提示词当作工具调用。
    en: >
      prompts/get separates a discoverable prompt definition from one concrete, user-selected
      use of that prompt. A client can list definitions first and then ask the server for
      messages with current arguments instead of copying templates or treating prompts as tools.
    ja: >
      prompts/getは発見可能なprompt定義を一回の具体的でユーザー選択されたprompt使用から分離する。
      クライアントは最初に定義を列挙し、テンプレートを複製したりpromptをtool呼び出しとして扱ったりせずに、
      現在のargumentsを持つメッセージをサーバーへ要求できる。
  includes:
    - zh: method 为 `prompts/get` 的带 id JSON-RPC 请求。
      en: An id-bearing JSON-RPC request whose method is `prompts/get`.
      ja: methodが `prompts/get` であるid付きJSON-RPCリクエスト。
    - zh: 必需的提示词 name 和可选的 arguments 对象。
      en: A required prompt name and optional arguments object.
      ja: 必須のprompt名と任意のargumentsオブジェクト。
    - zh: 对 PromptResult 或 JSON-RPC error 的期待。
      en: The expectation of a PromptResult or JSON-RPC error.
      ja: PromptResultまたはJSON-RPC errorへの期待。
  excludes:
    - zh: '`prompts/list` 的发现请求。'
      en: A `prompts/list` discovery request.
      ja: '`prompts/list` の発見リクエスト。'
    - zh: 已返回的 PromptMessage 或静态提示词定义本身。
      en: A returned PromptMessage or the static prompt definition itself.
      ja: 返されたPromptMessageまたは静的prompt定義そのもの。
  semantic_kind: information
  aliases:
    - language: en
      value: prompt retrieval request
      alias_kind: synonym
engineering:
  explanation:
    zh: >
      客户端先确认服务器在 initialize 中声明 prompts，再用 `prompts/list` 发现 name 和所需参数。调用
      prompts/get 时服务器应验证 name 和 arguments，插入参数生成 messages，并为无效参数返回标准
      JSON-RPC error。提示词为用户控制功能，主机应保留选择和使用提示词的控制权。
    en: >
      The client first confirms that the server declared prompts in initialize, then discovers
      names and required parameters with `prompts/list`. On prompts/get, the server validates
      name and arguments, renders messages, and returns a standard JSON-RPC error for invalid
      params. Prompts are user-controlled, so the host retains control over selecting and using them.
    ja: >
      クライアントはまずサーバーがinitializeでpromptsを宣言したことを確認し、`prompts/list` でnameと
      必須パラメーターを発見する。prompts/get時にサーバーはnameとargumentsを検証し、messagesを生成し、
      無効paramsには標準JSON-RPC errorを返す。promptsはユーザー制御機能であり、ホストは選択と使用の
      制御を保持する。
  typical_input:
    - description: Client gets the code_review prompt with one code argument.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 2,
          "method": "prompts/get",
          "params": {
            "name": "code_review",
            "arguments": {"code": "def hello():\n    print('world')"}
          }
        }
      source_claims: [mcp-prompts-get]
  typical_output:
    - description: Server returns generated prompt messages with the same id.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 2,
          "result": {
            "description": "Code review prompt",
            "messages": [
              {"role": "user", "content": {"type": "text", "text": "Please review this code."}}
            ]
          }
        }
      source_claims: [mcp-prompts-get]
  reference_implementations:
    - name: MCP prompts specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
      description: Defines prompt capability, prompts/list, prompts/get, data types, error handling, and input validation.
structure:
  identity_keys: ["id","method","name"]
  fields:
    - id: jsonrpc
      labels: {zh: "JSON-RPC 版本", en: "JSON-RPC version", ja: "JSON-RPC バージョン"}
      definitions:
        zh: "该请求包络中的原生 jsonrpc 成员，值必须为 \"2.0\"。"
        en: "The native jsonrpc member of this request envelope; it must be \"2.0\"."
        ja: "この要求エンベロープのネイティブな jsonrpc メンバーで、値は \"2.0\" でなければならない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2.0"
      allowed_values: ["2.0"]
      source_claims: [mcp-prompts-get]
    - id: id
      labels: {zh: "JSON-RPC 标识", en: "JSON-RPC id", ja: "JSON-RPC id"}
      definitions:
        zh: "关联该请求与结果或错误响应的原生 JSON-RPC id。"
        en: "The native JSON-RPC id correlating this request with its result or error response."
        ja: "この要求を結果またはエラー応答に対応付けるネイティブな JSON-RPC id。"
      datatype: string-or-number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2
      allowed_values: []
      source_claims: [mcp-prompts-get]
    - id: method
      labels: {zh: "方法", en: "Method", ja: "メソッド"}
      definitions:
        zh: "该子类型继承的 JSON-RPC 方法判别字段；在此节点中固定为 `prompts/get`。"
        en: "The inherited JSON-RPC method discriminator, fixed to `prompts/get` for this subtype."
        ja: "この下位型が継承する JSON-RPC のメソッド判別子であり、このノードでは `prompts/get` に固定される。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "prompts/get"
      allowed_values: ["prompts/get"]
      source_claims: [mcp-prompts-get]
    - id: name
      labels: {zh: "提示词名称", en: "Prompt name", ja: "プロンプト名"}
      definitions:
        zh: "原生 params.name 成员，指定要取得的公开提示词。"
        en: "The native params.name member selecting the exposed prompt to retrieve."
        ja: "取得する公開プロンプトを選ぶネイティブな params.name メンバー。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "code_review"
      allowed_values: []
      source_claims: [mcp-prompts-get]
    - id: arguments
      labels: {zh: "提示词参数", en: "Prompt arguments", ja: "プロンプト引数"}
      definitions:
        zh: "可选的原生 params.arguments 对象，按名称向提示词提供字符串参数。"
        en: "The optional native params.arguments object that supplies named string arguments to the prompt."
        ja: "名前付き文字列引数をプロンプトへ渡す任意のネイティブな params.arguments オブジェクト。"
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {"code":"def hello(): pass"}
      allowed_values: []
      source_claims: [mcp-prompts-get]
  constraints:
    - id: prompts-get-requires-prompts-capability
      severity: error
      expression_language: plain
      expression: A client sends prompts/get only after the server declared the prompts capability for the session.
      explanation:
        zh: 客户端只能在服务器已为会话声明 prompts 能力后发送 prompts/get。
        en: A client sends prompts/get only after the server declared the prompts capability for the session.
        ja: クライアントはサーバーがセッションでprompts機能を宣言した後にのみprompts/getを送る。
      source_claims: [mcp-prompts-capability]
    - id: prompts-get-validates-name-and-arguments
      severity: error
      expression_language: plain
      expression: The server validates the prompt name and required arguments before producing prompt messages.
      explanation:
        zh: 服务器在生成提示词消息前验证提示词名称和必填参数。
        en: The server validates the prompt name and required arguments before producing prompt messages.
        ja: サーバーはpromptメッセージを生成する前にprompt名と必須argumentsを検証する。
      source_claims: [mcp-prompts-validation]
  required_relations: []
examples:
  - id: mcp-prompts-get-positive-code-review

    labels: {zh: 获取带代码参数的提示词, en: Get prompt with code argument, ja: コードarguments付きprompt取得}

    descriptions:
      zh: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。"
      en: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths."
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"jsonrpc":"2.0","id":2,"method":"prompts/get","name":"code_review","arguments":{"code":"def hello(): pass"}}
    related_node_ids: [MCPPromptGetRequest, MCPRequest]
    related_relation_ids: [MCPPromptGetRequest-is_a-MCPRequest]

    source_claims: [mcp-prompts-capability, mcp-prompts-get]
  - id: mcp-prompts-get-counterexample-missing-required-argument

    labels: {zh: 缺少必填参数的提示词请求, en: Prompt request missing required argument, ja: 必須argumentsを欠くpromptリクエスト}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"jsonrpc":"2.0","id":3,"method":"prompts/get","name":"code_review","arguments":{}}
    related_node_ids: [MCPPromptGetRequest, MCPRequest]
    related_relation_ids: [MCPPromptGetRequest-is_a-MCPRequest]

    source_claims: [mcp-prompts-validation]
  - id: mcp-prompts-get-boundary-prompt-definition

    labels: {zh: 提示词定义与获取请求的边界, en: Boundary between prompt definition and get request, ja: prompt定義とgetリクエストの境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"jsonrpc":"2.0","id":2,"method":"prompts/get","name":"code_review"}
    related_node_ids: [MCPPromptGetRequest]
    related_relation_ids: [MCPPromptGetRequest-is_a-MCPRequest]

    source_claims: [mcp-prompts-get]
  - id: mcp-prompts-get-instance-code-review-2

    labels: {zh: code_review 获取请求实例, en: code_review get request instance, ja: code_review getリクエストインスタンス}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"jsonrpc":"2.0","id":2,"method":"prompts/get","name":"code_review","arguments":{"code":"def hello(): pass"}}
    related_node_ids: [MCPPromptGetRequest, MCPRequest]
    related_relation_ids: [MCPPromptGetRequest-is_a-MCPRequest]

    source_claims: [mcp-prompts-get]
