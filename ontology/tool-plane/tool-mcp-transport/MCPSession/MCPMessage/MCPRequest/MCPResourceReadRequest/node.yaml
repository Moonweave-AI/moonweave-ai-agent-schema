      kind: positive
      labels:
        zh: MCPResourceReadRequest-is_a-MCPRequest 正例
        en: Positive case for MCPResourceReadRequest-is_a-MCPRequest
        ja: MCPResourceReadRequest-is_a-MCPRequest の正例
      scenario_id: null
      descriptions:
        zh: id=31 请求 resources/read，URI 为 file:///repo/README.md。
        en: Request id=31 calls resources/read for file:///repo/README.md.
        ja: request id=31 が file:///repo/README.md を resources/read します。
      field_values: {}
      related_node_ids:
        - MCPResourceReadRequest
        - MCPRequest
      related_relation_ids:
        - MCPResourceReadRequest-is_a-MCPRequest
      expected_result:
        zh: 建立 MCPResourceReadRequest-is_a-MCPRequest，并保留所述协议方向与条件。
        en: Assert MCPResourceReadRequest-is_a-MCPRequest with the stated protocol direction and conditions.
        ja: MCPResourceReadRequest-is_a-MCPRequest を stated protocol direction/condition 付きで確立します。
      why_valid_or_invalid:
        zh: 仅当对象满足 MCPResourceReadRequest 的全部身份条件时，才能沿 is_a 归入 MCPRequest。
        en: Assert the subtype edge only when the object satisfies every identity condition of MCPResourceReadRequest.
        ja: object が MCPResourceReadRequest の全 identity condition を満たす時だけ is_a edge を確立します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-mcp-resource-read-request-012
    - id: MCPResourceReadRequest-is_a-MCPRequest-example-boundary-001
      kind: boundary
      labels:
        zh: MCPResourceReadRequest-is_a-MCPRequest 边界例
        en: Boundary case for MCPResourceReadRequest-is_a-MCPRequest
        ja: MCPResourceReadRequest-is_a-MCPRequest の境界例
      scenario_id: null
