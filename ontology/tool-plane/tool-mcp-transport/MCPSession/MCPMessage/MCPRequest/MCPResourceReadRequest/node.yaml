parent_relation:
  id: MCPResourceReadRequest-is_a-MCPRequest
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: MCPResourceReadRequest是一种MCPRequest
    en: MCPResourceReadRequest is a MCPRequest
    ja: MCPResourceReadRequestがMCPRequestを一種である
  definitions:
    zh: MCPResourceReadRequest 是 MCPRequest 的严格子型；其必要身份差异是：MCP 资源读取请求是一种 MCP 请求（MCPRequest），其 method 固定为 `resources/read` 且 params 包含具体资源 URI；它在线路层请求通用 ResourceReadRequest 活动，不是 ResourceDefinition、ResourceSubscription、列表页或读取结果。
    en: "MCPResourceReadRequest is a strict subtype of MCPRequest; its necessary identity differentia is: An MCP resource-read request is an MCPRequest whose method is resources/read and whose params contain one concrete resource URI. At the wire layer it requests a generic ResourceReadRequest activity; it is not a ResourceDefinition, ResourceSubscription, list page, or read result."
    ja: MCPResourceReadRequest は MCPRequest の strict subtype であり、必要な identity differentia は次の通りです：MCP resource-read request は MCPRequest の一種で method=resources/read、params に concrete resource URI を持ちます。wire layer から generic ResourceReadRequest activity を要求し definition/subscription/list/result ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
    en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
    ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: MCPRequest反向关联MCPResourceReadRequest
      en: MCPRequest is the inverse target of MCPResourceReadRequest
      ja: MCPRequestからMCPResourceReadRequestへの逆読解
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
