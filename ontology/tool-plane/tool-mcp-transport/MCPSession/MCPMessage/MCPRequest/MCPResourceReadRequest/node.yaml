      en: "MCPResourceReadRequest and MCPSamplingRequest share MCPRequest; The five requests differ by method, direction, and payload: elicitation/create and sampling/createMessage travel server-to-client; prompts/get, resources/read, and tools/call travel client-to-server and bind prompt arguments, a URI, and tool arguments respectively."
      ja: MCPResourceReadRequest と MCPSamplingRequest は MCPRequest を共有し、五 request は method/direction/payload が異なり、elicitation/create・sampling/createMessage は server-to-client、prompts/get・resources/read・tools/call は client-to-server で prompt arguments・URI・tool arguments を各々束縛します。
    source_claims:
      - claim-mcp-resource-read-request-009
  - sibling_concept_id: MCPPromptGetRequest
    shared_parent_concept_id: MCPRequest
    differentia:
      zh: MCPResourceReadRequest 与 MCPPromptGetRequest 同属 MCPRequest；五种请求按 method、发送方向与载荷不同：elicitation/create 和 sampling/createMessage 为服务器到客户端；prompts/get、resources/read、tools/call 为客户端到服务器，分别绑定提示、URI 和工具参数。
      en: "MCPResourceReadRequest and MCPPromptGetRequest share MCPRequest; The five requests differ by method, direction, and payload: elicitation/create and sampling/createMessage travel server-to-client; prompts/get, resources/read, and tools/call travel client-to-server and bind prompt arguments, a URI, and tool arguments respectively."
      ja: MCPResourceReadRequest と MCPPromptGetRequest は MCPRequest を共有し、五 request は method/direction/payload が異なり、elicitation/create・sampling/createMessage は server-to-client、prompts/get・resources/read・tools/call は client-to-server で prompt arguments・URI・tool arguments を各々束縛します。
    source_claims:
      - claim-mcp-resource-read-request-010
  - sibling_concept_id: MCPToolCallRequest
    shared_parent_concept_id: MCPRequest
    differentia:
      zh: MCPResourceReadRequest 与 MCPToolCallRequest 同属 MCPRequest；五种请求按 method、发送方向与载荷不同：elicitation/create 和 sampling/createMessage 为服务器到客户端；prompts/get、resources/read、tools/call 为客户端到服务器，分别绑定提示、URI 和工具参数。
      en: "MCPResourceReadRequest and MCPToolCallRequest share MCPRequest; The five requests differ by method, direction, and payload: elicitation/create and sampling/createMessage travel server-to-client; prompts/get, resources/read, and tools/call travel client-to-server and bind prompt arguments, a URI, and tool arguments respectively."
      ja: MCPResourceReadRequest と MCPToolCallRequest は MCPRequest を共有し、五 request は method/direction/payload が異なり、elicitation/create・sampling/createMessage は server-to-client、prompts/get・resources/read・tools/call は client-to-server で prompt arguments・URI・tool arguments を各々束縛します。
    source_claims:
