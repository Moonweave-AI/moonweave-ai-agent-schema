schema: moonweave.ai/ontology-node/v1
id: MCPResourceReadRequest
kind: concept
labels:
  zh: MCP 资源读取请求
  en: MCP resources/read request
  ja: MCP resources/readリクエスト
semantics:
  short_definition:
    zh: 客户端按 URI 请求服务器返回资源内容的 `resources/read` 请求。
    en: A `resources/read` request in which a client asks a server to return contents for a resource URI.
    ja: クライアントがサーバーにresource URIの内容を返すよう求める `resources/read` リクエスト。
  definition:
    zh: >
      MCP resources/read 请求是 method 为 `resources/read` 的 MCP 请求，其 params 包含必填 `uri`。
      在服务器已声明 resources 能力的会话中，服务器使用同一 JSON-RPC id 返回 ResourceContents 列表。
      每项包含 URI、可选 MIME 类型以及 text 或 base64 blob；资源不存在时应返回 JSON-RPC 错误。
    en: >
      An MCP resources/read request is an MCP request whose method is `resources/read` and
      whose params contain a required `uri`. In a session where the server advertised resources,
      the server returns a ResourceContents list using the same JSON-RPC id. Each item contains
      a URI, optional MIME type, and either text or a base64 blob; a missing resource should
      produce a JSON-RPC error.
    ja: >
      MCP resources/readリクエストはmethodが `resources/read` でparamsに必須の `uri` を持つ
      MCPリクエストである。サーバーがresourcesを宣言したセッションでは、サーバーは同じJSON-RPC idで
      ResourceContentsリストを返す。各項目はURI、任意のMIME type、textまたはbase64 blobを持ち、
      存在しないresourceはJSON-RPC errorになるべきである。
  why_needed:
    zh: >
      resources/read 将资源定义或列表中的标识与实际内容获取分开。它让主机按需引入服务器管理的上下文，
      而不假定资源是本地文件，也不把资源读取误作订阅或工具调用。
    en: >
      resources/read separates an identifier in a resource definition or list from actual content
      retrieval. It lets a host incorporate server-managed context on demand without assuming a
      resource is a local file or confusing a read with a subscription or tool call.
    ja: >
      resources/readはresource定義またはリスト内の識別子を実内容の取得から分離する。hostはresourceが
      ローカルファイルだと仮定せず、読み取りを購読やtool呼び出しと混同せずに、サーバー管理コンテキストを
      必要時に組み込める。
  includes:
    - zh: method 为 `resources/read` 的带 id 请求。
      en: An id-bearing request whose method is `resources/read`.
      ja: methodが `resources/read` のid付きリクエスト。
    - zh: 作为必填参数的 resource URI。
      en: A resource URI as the required parameter.
      ja: 必須パラメーターとしてのresource URI。
    - zh: 对 ResourceContents 结果或资源未找到错误的期待。
      en: The expectation of ResourceContents result data or a resource-not-found error.
      ja: ResourceContents結果データまたはresource-not-found errorへの期待。
  excludes:
    - zh: '`resources/list` 或 `resources/templates/list` 的发现请求。'
      en: A `resources/list` or `resources/templates/list` discovery request.
      ja: '`resources/list` または `resources/templates/list` の発見リクエスト。'
    - zh: '`resources/subscribe` 的变更订阅请求。'
      en: A `resources/subscribe` change-subscription request.
      ja: '`resources/subscribe` の変更購読リクエスト。'
  semantic_kind: information
  aliases:
    - language: en
      value: resource content retrieval request
      alias_kind: synonym
engineering:
  explanation:
    zh: >
      客户端先确认 resources 能力并可通过 `resources/list` 或一个 resource link 获得 URI。它发送
      resources/read 后，服务器授权并解析 URI，返回 text 或 blob ResourceContents。客户端必须把返回
      内容视为外部数据并按 host 政策决定是否在模型上下文中使用；HTTP URI 不保证通过 MCP 服务器读取。
    en: >
      The client first confirms resources capability and may obtain a URI from `resources/list`
      or a resource link. After sending resources/read, the server authorizes and resolves the
      URI and returns text or blob ResourceContents. The client treats returned content as
      external data and decides under host policy whether to use it in model context; an HTTP URI
      does not guarantee that it is read through the MCP server.
    ja: >
      クライアントはまずresources機能を確認し、`resources/list` またはresource linkからURIを得る。
      resources/read送信後、サーバーはURIを認可・解決してtextまたはblob ResourceContentsを返す。
      クライアントは返却内容を外部データとして扱い、モデルコンテキストで使うかをhostポリシーで決める。
      HTTP URIはMCPサーバー経由で読まれることを保証しない。
  typical_input:
    - description: Client requests the contents of one file-like resource URI.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 2,
          "method": "resources/read",
          "params": {"uri": "file:///project/src/main.rs"}
        }
      source_claims: [mcp-resources-read]
  typical_output:
    - description: Server returns text resource contents with the same id.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 2,
          "result": {
            "contents": [
              {
                "uri": "file:///project/src/main.rs",
                "mimeType": "text/x-rust",
                "text": "fn main() {}"
              }
            ]
          }
        }
      source_claims: [mcp-resources-read]
  reference_implementations:
    - name: MCP resources specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
      description: Defines resources capability, resources/read request/result, ResourceContents, URI guidance, and errors.
structure:
  identity_keys: ["id","method","uri"]
  fields:
    - id: jsonrpc
      labels: {zh: "JSON-RPC 版本", en: "JSON-RPC version", ja: "JSON-RPC バージョン"}
      definitions:
        zh: "该请求包络中的原生 jsonrpc 成员，值必须为 \"2.0\"。"
        en: "The native jsonrpc member of this request envelope; it must be \"2.0\"."
        ja: "この要求エンベロープのネイティブな jsonrpc メンバーで、値は \"2.0\" でなければならない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2.0"
      allowed_values: ["2.0"]
      source_claims: [mcp-resources-read]
    - id: id
      labels: {zh: "JSON-RPC 标识", en: "JSON-RPC id", ja: "JSON-RPC id"}
      definitions:
        zh: "关联该请求与结果或错误响应的原生 JSON-RPC id。"
        en: "The native JSON-RPC id correlating this request with its result or error response."
        ja: "この要求を結果またはエラー応答に対応付けるネイティブな JSON-RPC id。"
      datatype: string-or-number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2
      allowed_values: []
      source_claims: [mcp-resources-read]
    - id: method
      labels: {zh: "方法", en: "Method", ja: "メソッド"}
      definitions:
        zh: "该子类型继承的 JSON-RPC 方法判别字段；在此节点中固定为 `resources/read`。"
        en: "The inherited JSON-RPC method discriminator, fixed to `resources/read` for this subtype."
        ja: "この下位型が継承する JSON-RPC のメソッド判別子であり、このノードでは `resources/read` に固定される。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "resources/read"
      allowed_values: ["resources/read"]
      source_claims: [mcp-resources-read]
    - id: uri
      labels: {zh: "资源 URI", en: "Resource URI", ja: "リソース URI"}
      definitions:
        zh: "原生 params.uri 成员，指定要读取内容的资源。"
        en: "The native params.uri member identifying the resource whose contents are requested."
        ja: "内容を読み取る対象リソースを識別するネイティブな params.uri メンバー。"
      datatype: uri
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "file:///project/src/main.rs"
      allowed_values: []
      source_claims: [mcp-resources-read]
  constraints:
    - id: resource-read-requires-resources-capability
      severity: error
      expression_language: plain
      expression: A client sends resources/read only after the server declared resources capability for the session.
      explanation:
        zh: 客户端只能在服务器已为会话声明 resources 能力后发送 resources/read。
        en: A client sends resources/read only after the server declared resources capability for the session.
        ja: クライアントはサーバーがセッションでresources機能を宣言した後にのみresources/readを送る。
      source_claims: [mcp-resources-capability]
    - id: resource-read-uri-required
      severity: error
      expression_language: plain
      expression: A resources/read request contains one required URI parameter identifying the requested resource.
      explanation:
        zh: resources/read 请求包含一个标识所请求资源的必填 URI 参数。
        en: A resources/read request contains one required URI parameter identifying the requested resource.
        ja: resources/readリクエストは要求されたresourceを識別する一つの必須URIパラメーターを含む。
      source_claims: [mcp-resources-read]
  required_relations: []
examples:
  - id: mcp-resources-read-positive-main-rs

    labels: {zh: 读取已公开 Rust 源文件, en: Read an exposed Rust source file, ja: 公開済みRustソースファイルの読み取り}

    descriptions:
      zh: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。
      en: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths.
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"jsonrpc":"2.0","id":2,"method":"resources/read","uri":"file:///project/src/main.rs"}
    related_node_ids: [MCPResourceReadRequest, MCPRequest]
    related_relation_ids: [MCPResourceReadRequest-is_a-MCPRequest]

    source_claims: [mcp-resources-capability, mcp-resources-read]
  - id: mcp-resources-read-counterexample-missing-uri

    labels: {zh: 缺少 URI 的资源读取, en: Resource read missing URI, ja: URIを欠くresource read}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"jsonrpc":"2.0","id":3,"method":"resources/read"}
    related_node_ids: [MCPResourceReadRequest, MCPRequest]
    related_relation_ids: [MCPResourceReadRequest-is_a-MCPRequest]

    source_claims: [mcp-resources-read]
  - id: mcp-resources-read-boundary-list-vs-read

    labels: {zh: 资源列表与内容读取的边界, en: Boundary between resource list and content read, ja: resourceリストと内容読み取りの境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"jsonrpc":"2.0","id":2,"method":"resources/read","uri":"file:///project/src/main.rs"}
    related_node_ids: [MCPResourceReadRequest]
    related_relation_ids: [MCPResourceReadRequest-is_a-MCPRequest]

    source_claims: [mcp-resources-read]
  - id: mcp-resources-read-instance-main-rs-2

    labels: {zh: main.rs 读取请求实例, en: main.rs read request instance, ja: main.rs readリクエストインスタンス}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"jsonrpc":"2.0","id":2,"method":"resources/read","uri":"file:///project/src/main.rs"}
    related_node_ids: [MCPResourceReadRequest, MCPRequest]
    related_relation_ids: [MCPResourceReadRequest-is_a-MCPRequest]

    source_claims: [mcp-resources-read]
parent_relation:
  id: MCPResourceReadRequest-is_a-MCPRequest
  predicate: is_a
  target: concept:MCPRequest
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是资源读取请求, en: is a resource read request, ja: resource readリクエストである}
  definition:
    zh: MCPResourceReadRequest 是 method 固定为 resources/read 且有 URI 参数的 MCPRequest。
    en: An MCPResourceReadRequest is an MCPRequest whose method is resources/read and has URI params.
    ja: MCPResourceReadRequestはmethodがresources/readでURI paramsを持つMCPRequestである。
  cardinality:
    source: {min: 0, max: null}
    target: {min: 1, max: 1}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_resource_read_request
    labels: {zh: 具有资源读取请求, en: has resource read request, ja: resource readリクエストを持つ}
  conditions: []
  temporal_scope: session
  boundary_context: 该关系不包括 list、template list、subscribe 或 resource updated notification。
  constraints:
    - id: resource-read-method-and-uri-discriminator
      severity: error
      expression_language: plain
      expression: An MCPResourceReadRequest has method resources/read and required URI params.
      explanation:
        zh: MCPResourceReadRequest 的 method 为 resources/read 并具有必填 URI params。
        en: An MCPResourceReadRequest has method resources/read and required URI params.
        ja: MCPResourceReadRequestはmethod resources/readと必須URI paramsを持つ。
      source_claims: [mcp-resources-read]
  examples: []
  source_claims: [moonweave-mcp-resource-read-request-taxonomy]
  distinct_fact_rationale:
    zh: 它由 resources/read 方法和 URI 参数区分，不把资源发现或变更订阅混入其中。
    en: It is distinguished by resources/read method and URI params without collapsing resource discovery or change subscription into it.
    ja: resource発見や変更購読を混同せず、resources/read methodとURI paramsで区別される。
relations: []
sources:
  - id: mcp-resources-2025-11-25
    title: Model Context Protocol Specification — Resources
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
    source_type: official-specification
    locator: "Capabilities; Reading Resources; Resource Contents; Error Handling; Common URI Schemes"
    relevance: Defines resources capability, resources/read request/result, content forms, errors, and URI behavior.
source_claims:
  - id: mcp-resources-capability
    source: mcp-resources-2025-11-25
    supports: Servers that support resources declare resources capability and optional subscribe and listChanged features.
    locator: "Capabilities"
    evidence_kind: normative
    confidence: high
  - id: moonweave-mcp-resource-read-request-taxonomy
    source: mcp-resources-2025-11-25
    supports: "Moonweave classifies resources/read as an MCPRequest subtype for navigation; this subclass edge is a taxonomy design inference."
    locator: "Reading Resources"
    evidence_kind: design-inference
    confidence: high
  - id: mcp-resources-read
    source: mcp-resources-2025-11-25
    supports: resources/read takes URI and returns same-id contents containing URI MIME type and text or blob data.
    locator: "Reading Resources; Resource Contents"
    evidence_kind: normative
    confidence: high
