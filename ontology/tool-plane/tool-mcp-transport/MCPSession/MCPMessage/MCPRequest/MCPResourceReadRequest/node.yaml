schema: moonweave.ai/ontology-node/v1
id: MCPResourceReadRequest
kind: concept
status: review
labels:
  zh: MCP 资源读取请求
  en: MCP resource-read request
  ja: MCP リソース読取要求
semantics:
  short_definition:
    zh: method=`resources/read`、按具体 URI 请求内容的 MCP 请求。
    en: An MCP request with method resources/read asking for contents at a concrete URI.
    ja: method=resources/read で concrete URI content を要求する MCP request。
  definition:
    zh: MCP 资源读取请求是 MCPRequest 的严格下位类型，沿 MCPRequest 继承 message_record_id 线路记录身份；request_id 继续作为普通关联值。收窄后的 method=resources/read 与 params 中的具体资源 URI（另以 resource_uri 暴露查询）构成种差。它请求通用 ResourceReadRequest 活动，不是 ResourceDefinition、ResourceSubscription、列表页或读取结果。
    en: An MCP resource-read request is a strict MCPRequest subtype and inherits the message_record_id wire-record identity through MCPRequest; request_id remains an ordinary correlation value. The narrowed method=resources/read and a concrete resource URI in params, exposed queryably as resource_uri, provide the differentia. It requests a generic ResourceReadRequest activity and is not a ResourceDefinition, ResourceSubscription, list page, or read result.
    ja: MCP resource-read request は MCPRequest の厳密な下位型で、MCPRequest を通じて wire record identity の message_record_id を継承し、request_id は通常の相関値のままです。method=resources/read と params の concrete resource URI（resource_uri として検索可能）が種差で、definition/subscription/list/result ではありません。
  why_needed:
    zh: 专门子型让资源读取的协议记录与通用调用活动、资源定义和返回内容保持四种身份。
    en: The specialized subtype keeps the wire record, generic invocation, resource definition, and returned contents as four distinct identities.
    ja: specialized subtype は wire record・generic invocation・resource definition・returned content の四 identity を分離します。
  includes:
    - zh: 纳入具有 RequestId、resources/read 与具体 URI 的请求。
      en: Includes requests with RequestId, resources/read, and one concrete URI.
      ja: RequestId・resources/read・concrete URI を持つ request を含みます。
  excludes:
    - zh: 排除 resources/list、URI 模板、subscribe 请求与 contents 结果。
      en: Excludes resources/list, URI templates, subscribe requests, and contents results.
      ja: resources/list・URI template・subscribe request・contents result を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: method
      labels:
        zh: 资源读取方法
        en: resource-read method
        ja: resource-read method
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 继承并收窄 MCPRequest.method；只有固定字符串 `resources/read` 才属于本下位请求。
        en: Narrows inherited MCPRequest.method; only the fixed string `resources/read` qualifies for this subtype.
        ja: 継承 MCPRequest.method を絞り fixed string `resources/read` のみ本 subtype に属します。
      allowed_values:
        - id: MCPRequestMethodResourcesRead
          value: resources/read
          labels:
            zh: 读取资源
            en: read resource
            ja: resource read
          definitions:
            zh: 按 params.uri 读取资源内容的固定 MCP 方法。
            en: The fixed MCP method for reading resource content at params.uri.
            ja: params.uri の resource content を読む fixed MCP method です。
          status: accepted
          source_claims:
            - claim-mcp-resource-read-request-002
      pattern: null
      example_value: resources/read
      source_claims:
        - claim-mcp-resource-read-request-003
    - id: resource_uri
      labels:
        zh: 待读取资源 URI
        en: resource URI to read
        ja: read 対象 resource URI
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 映射 ReadResourceRequest.params.uri 的具体 URI；本字段把嵌套 wire 参数变为可查询信息，但不会另建 URI 节点。
        en: Maps to the concrete ReadResourceRequest.params.uri. It makes the nested wire parameter queryable without creating a separate URI node.
        ja: concrete ReadResourceRequest.params.uri に対応し、nested wire parameter を queryable にしますが別 URI node は作りません。
      allowed_values: []
      pattern: null
      example_value: file:///repo/README.md
      source_claims:
        - claim-mcp-resource-read-request-004
  constraints: []
  required_relation_constraints:
    - id: mcp-resource-read-request-maps-one-read-activity
      direction: outgoing
      predicate: requests
      target_concept_id: ResourceReadRequest
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每条 wire-level resources/read 请求必须映射恰好一个通用 ResourceReadRequest；两者共享 request ID 与资源 URI，但保留不同身份。
        en: Every wire-level resources/read request must map to exactly one generic ResourceReadRequest. They share request ID and resource URI while retaining different identities.
        ja: 各 wire-level resources/read request は generic ResourceReadRequest 一つに対応し、request ID と resource URI を共有しながら別 identity を保持します。
      source_claims:
        - claim-mcp-resource-read-request-005
examples:
  - id: MCPResourceReadRequest-example-positive-001
    kind: positive
    labels:
      zh: MCP 资源读取请求正例
      en: Positive MCP resource-read request case
      ja: MCP リソース読取要求の正例
    scenario_id: null
    descriptions:
      zh: id=31 请求 resources/read，URI 为 file:///repo/README.md。
      en: Request id=31 calls resources/read for file:///repo/README.md.
      ja: request id=31 が file:///repo/README.md を resources/read します。
    field_values:
      message_record_id: mcp-message:resource-read:31
      session_id: mcp-session-s-42
      jsonrpc: "2.0"
      message_kind: request
      request_id: 31
      method: resources/read
      params:
        uri: file:///repo/README.md
      resource_uri: file:///repo/README.md
    related_node_ids:
      - MCPResourceReadRequest
      - ResourceReadRequest
    related_relation_ids:
      - MCPResourceReadRequest-requests-ResourceReadRequest
    expected_result:
      zh: 归为 MCPResourceReadRequest 并请求通用 ResourceReadRequest。
      en: Classify MCPResourceReadRequest and request a generic ResourceReadRequest.
      ja: MCPResourceReadRequest とし generic ResourceReadRequest を要求します。
    why_valid_or_invalid:
      zh: method 与具体 URI 共同确定读取请求。
      en: The method and concrete URI jointly determine a resource read.
      ja: method と concrete URI が resource read を決めます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-resource-read-request-006
  - id: MCPResourceReadRequest-example-boundary-001
    kind: boundary
    labels:
      zh: MCP 资源读取请求边界例
      en: Boundary MCP resource-read request case
      ja: MCP リソース読取要求の境界例
    scenario_id: null
    descriptions:
      zh: id=32 对同一 URI 调用 resources/subscribe。
      en: Request id=32 calls resources/subscribe for the same URI.
      ja: request id=32 が同 URI へ resources/subscribe を呼びます。
    field_values: {}
    related_node_ids:
      - MCPResourceReadRequest
    related_relation_ids: []
    expected_result:
      zh: 不得归为 MCPResourceReadRequest。
      en: Do not classify MCPResourceReadRequest.
      ja: MCPResourceReadRequest に分類しません。
    why_valid_or_invalid:
      zh: 相同 URI 不会抹除 read 与 subscribe 的方法差异。
      en: The same URI does not erase the method difference between read and subscribe.
      ja: same URI でも read/subscribe の method difference は残ります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-resource-read-request-007
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: MCPElicitation
    shared_parent_concept_id: MCPRequest
    differentia:
      zh: MCPResourceReadRequest 与 MCPElicitation 同属 MCPRequest；五种请求按 method、发送方向与载荷不同：elicitation/create 和 sampling/createMessage 为服务器到客户端；prompts/get、resources/read、tools/call 为客户端到服务器，分别绑定提示、URI 和工具参数。
      en: "MCPResourceReadRequest and MCPElicitation share MCPRequest; The five requests differ by method, direction, and payload: elicitation/create and sampling/createMessage travel server-to-client; prompts/get, resources/read, and tools/call travel client-to-server and bind prompt arguments, a URI, and tool arguments respectively."
      ja: MCPResourceReadRequest と MCPElicitation は MCPRequest を共有し、五 request は method/direction/payload が異なり、elicitation/create・sampling/createMessage は server-to-client、prompts/get・resources/read・tools/call は client-to-server で prompt arguments・URI・tool arguments を各々束縛します。
    source_claims:
