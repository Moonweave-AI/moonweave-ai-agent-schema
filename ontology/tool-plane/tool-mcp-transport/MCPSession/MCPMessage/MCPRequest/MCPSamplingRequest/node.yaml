schema: moonweave.ai/ontology-node/v1
id: MCPSamplingRequest
kind: concept
status: review
labels:
  en: MCP sampling request
  zh: MCP 采样请求
  ja: MCP サンプリング要求
semantics:
  short_definition:
    zh: 服务器通过 `sampling/createMessage` 请求客户端代为执行模型采样的 MCP 请求。
    en: An MCP request in which a server asks a client to perform model sampling through `sampling/createMessage`.
    ja: server が `sampling/createMessage` により client へ model sampling の代行を求める MCP request。
  definition:
    zh: MCP 采样请求是一种 MCP 请求（MCPRequest），由服务器以 `sampling/createMessage` 发往已声明 sampling 能力的客户端；它携带消息与采样偏好，但模型选择、参数审查、用户批准和实际提供方调用仍由客户端控制。
    en: An MCP sampling request is an MCPRequest sent by a server with sampling/createMessage to a client that declared sampling support. It carries messages and sampling preferences, while model choice, parameter review, user approval, and the actual provider call remain under client control.
    ja: MCP sampling request は MCPRequest の一種で server が sampling capability 宣言済 client へ sampling/createMessage を送ります。message/preference を運びますが model choice・review・user approval・provider call は client control です。
  why_needed:
    zh: 该节点保留服务器请求与客户端模型调用之间的控制边界，使审计能够判断谁选择模型、谁批准提示以及数据是否被越权送往提供方。
    en: The node preserves the control boundary between the server's request and the client's model call, allowing audits to identify who selected the model, approved the prompt, and released data to a provider.
    ja: server request と client model call の制御境界を保持し、model 選択者、prompt 承認者、provider への data 開示権限を監査できるようにします。
  includes:
    - zh: 纳入已协商 sampling 能力后由服务器发送的 `sampling/createMessage` 请求，包括消息、令牌上限、模型偏好和其他受客户端审查的采样参数。
      en: Includes `sampling/createMessage` sent by a server after sampling capability negotiation, including messages, token limit, model preferences, and other sampling parameters subject to client review.
      ja: sampling capability 交渉後に server が送る `sampling/createMessage` と、その message、token limit、model preference、client review 対象の sampling parameter を含みます。
  excludes:
    - zh: 排除客户端实际发给模型提供方的调用、服务器自行持有密钥的直接模型调用、`tools/call` 请求以及未声明 sampling capability 的反向消息。
      en: Excludes the client's actual provider invocation, a server's direct model call using its own credential, `tools/call`, and reverse messages sent without a declared sampling capability.
      ja: client から model provider への実 call、server が自分の credential で行う直接 model call、`tools/call`、sampling capability 未宣言の reverse message を除きます。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - session_id
    - request_id
  fields:
    - id: message_count
      labels:
        zh: 采样消息数量
        en: sampling message count
        ja: sampling message count
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 sampling/createMessage 请求中提交给客户端审查的消息数量。
        en: Records the number of messages submitted for client review in sampling/createMessage.
        ja: sampling/createMessage で client review に提出する messages 数を記録します。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-mcp-sampling-request-002
    - id: max_tokens
      labels:
        zh: 最大令牌数
        en: maximum tokens
        ja: maximum tokens
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规范化保存线路参数 maxTokens 的上限值。
        en: Stores the normalized value of the wire parameter maxTokens.
        ja: wire parameter maxTokens の normalized value を保存します。
      allowed_values: []
      pattern: null
      example_value: 600
      source_claims:
        - claim-mcp-sampling-request-003
    - id: capability_negotiated
      labels:
        zh: 能力已协商
        en: capability negotiated
        ja: capability negotiated
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 确认客户端已声明 sampling 能力，服务器才可发出该请求。
        en: Confirms that the client declared sampling before the server sent this request.
        ja: server が request を送る前に client が sampling を宣言したことを確認します。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims:
        - claim-mcp-sampling-request-004
    - id: model_selected_by
      labels:
        zh: 模型选择方
        en: model selected by
        ja: model selected by
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录最终模型由客户端控制选择，服务器只能提供偏好提示。
        en: Records that final model selection remains controlled by the client while the server may only provide preferences.
        ja: server は preference のみ提示でき、final model selection は client が制御すると記録します。
      allowed_values:
        - id: MCPSamplingModelSelectedByClient
          value: client
          labels:
            zh: 客户端
            en: client
            ja: client
          definitions:
            zh: 客户端保留模型、提供方与授权控制。
            en: The client retains model, provider, and authorization control.
            ja: client が model/provider/authorization control を保持します。
          status: accepted
          source_claims:
            - claim-mcp-sampling-request-005
      pattern: null
      example_value: client
      source_claims:
        - claim-mcp-sampling-request-006
  constraints: []
  required_relation_constraints: []
examples:
  - id: mcp-sampling-positive-summary-draft
    kind: positive
    labels:
      zh: 服务器请求客户端生成摘要草稿
      en: Server asks client to draft a summary
      ja: server が client に summary draft を依頼
    scenario_id: null
    descriptions:
      zh: "仓库服务器完成日志读取后发送 `sampling/createMessage`，附上两条消息、`maxTokens: 600` 和偏好“低成本”；客户端检查内容并选择允许的模型。"
      en: "After reading repository logs, a server sends `sampling/createMessage` with two messages, `maxTokens: 600`, and a low-cost preference; the client reviews the content and selects an allowed model."
      ja: "repository server が log 読取後、二つの message、`maxTokens: 600`、low-cost preference を付けて `sampling/createMessage` を送り、client が内容を確認して許可 model を選びます。"
    field_values:
      message_record_id: mcp-message:sampling:74
      session_id: mcp-session-repository-summary-9
      jsonrpc: "2.0"
      message_kind: request
      request_id: 74
      method: sampling/createMessage
      params:
        messages:
          - role: user
            content:
              type: text
              text: Summarize the repository log.
          - role: assistant
            content:
              type: text
              text: I will draft a concise summary.
        maxTokens: 600
        modelPreferences:
          costPriority: 0.8
      message_count: 2
      max_tokens: 600
      capability_negotiated: true
      model_selected_by: client
    related_node_ids:
      - MCPSamplingRequest
      - MCPRequest
      - MCPClient
      - MCPServer
    related_relation_ids:
      - MCPSamplingRequest-is_a-MCPRequest
    expected_result:
      zh: 协议消息归为 MCPSamplingRequest；后续提供方调用仍记录为客户端控制的另一事件。
      en: The protocol message is MCPSamplingRequest; the later provider invocation remains a separate client-controlled event.
      ja: protocol message を MCPSamplingRequest とし、後続 provider invocation は client-controlled な別 event として保持します。
    why_valid_or_invalid:
      zh: 它具有标准方法、服务器到客户端方向、协商能力以及客户端最终控制。
      en: It has the standard method, server-to-client direction, negotiated capability, and final client control.
      ja: 標準 method、server-to-client 方向、negotiated capability、client の最終制御を備えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-sampling-request-007
  - id: mcp-sampling-boundary-direct-provider-call
    kind: boundary
    labels:
      zh: 服务器直接调用模型提供方
      en: Server calls a model provider directly
      ja: server が model provider を直接呼ぶ
    scenario_id: null
    descriptions:
      zh: 某服务器使用自己的 API 密钥直接向模型提供方提交提示，MCP 客户端既未收到 `sampling/createMessage` 也无法审查；这是服务器内部模型调用，不是 MCP 采样请求。
      en: A server uses its own API key to submit a prompt directly to a model provider; the MCP client receives no `sampling/createMessage` and cannot review it. This is an internal server model call, not an MCP sampling request.
      ja: server が自分の API key で model provider へ prompt を直接送り、MCP client は `sampling/createMessage` を受けず review もできません。これは server 内部 model call で、MCP sampling request ではありません。
    field_values:
      method: null
      credential_owner: server
      client_review:
