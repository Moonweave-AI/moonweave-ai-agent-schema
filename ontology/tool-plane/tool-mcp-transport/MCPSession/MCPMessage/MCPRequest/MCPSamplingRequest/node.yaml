schema: moonweave.ai/ontology-node/v1
id: MCPSamplingRequest
kind: concept
labels:
  zh: MCP 采样请求
  en: MCP sampling request
  ja: MCP サンプリング要求
semantics:
  short_definition:
    zh: MCP 服务器向支持采样的客户端发出的 sampling/createMessage JSON-RPC 请求，用于请求语言模型生成。
    en: A sampling/createMessage JSON-RPC request from an MCP server to a sampling-capable client for a language-model generation.
    ja: 言語モデル生成を求めるために MCP サーバーがサンプリング対応クライアントへ送る sampling/createMessage JSON-RPC 要求。
  definition:
    zh: >
      MCP 采样请求让服务器通过客户端请求 LLM 生成，使客户端保留模型访问、模型选择和权限控制。该请求的方法为
      sampling/createMessage，参数包含消息以及可选模型偏好、system prompt、maxTokens、工具和 toolChoice。它只可发给在
      初始化中声明 sampling 能力的客户端；含工具的请求还要求客户端声明 sampling.tools。它不是服务器直接调用模型供应商 API，
      也不是一个普通 MCP 工具调用。
    en: >
      An MCP sampling request lets a server request an LLM generation through a client, leaving model access, selection,
      and permissions under client control. Its method is sampling/createMessage and its parameters include messages plus
      optional model preferences, a system prompt, maxTokens, tools, and toolChoice. It can be sent only to a client that
      declared sampling during initialization; a tool-enabled request additionally requires sampling.tools. It is neither
      a server's direct provider API call nor an ordinary MCP tool invocation.
    ja: >
      MCP サンプリング要求は、モデルアクセス、選択、権限をクライアントの制御下に保ちながら、サーバーがクライアント経由で
      LLM 生成を求めるものである。method は sampling/createMessage であり、messages と任意の model preferences、system prompt、
      maxTokens、tools、toolChoice を含む。初期化で sampling を宣言したクライアントだけに送れ、ツール有効要求には
      sampling.tools がさらに必要である。サーバーからの直接プロバイダー API 呼び出しや通常の MCP ツール呼び出しではない。
  why_needed:
    zh: 服务器可利用用户控制的模型能力而无需持有模型 API 密钥，且客户端能够审查、选择模型、拒绝请求和保护敏感数据。
    en: Servers can use user-controlled model capabilities without holding model API keys, while clients can review, select models, deny requests, and protect sensitive data.
    ja: サーバーはモデル API キーを持たずにユーザー制御のモデル能力を利用でき、クライアントは要求のレビュー、モデル選択、拒否、機密データ保護を行える。
  includes:
    - {zh: sampling/createMessage 方法, en: The sampling/createMessage method, ja: sampling/createMessage メソッド}
    -
      zh: 用户和 assistant 角色的文本、图像或音频消息
      en: User- and assistant-role text, image, or audio messages
      ja: user・assistant 役割のテキスト、画像、音声メッセージ
    - {zh: 可选模型偏好和工具使用配置, en: Optional model preferences and tool-use configuration, ja: 任意のモデル選好とツール利用設定}
  excludes:
    - {zh: 服务器侧模型 API 密钥或直接供应商调用, en: Server-side model API keys or direct provider calls, ja: サーバー側モデル API キーまたは直接プロバイダー呼び出し}
    - {zh: 客户端未声明支持时的工具型采样请求, en: Tool-enabled sampling sent to a client without declared support, ja: 宣言済み対応のないクライアントへのツール有効サンプリング}
  semantic_kind: request
  aliases:
    - {language: en, value: CreateMessageRequest, alias_kind: protocol-type}
engineering:
  explanation:
    zh: 服务器构造 messages 和约束，客户端在用户控制下选择模型并返回 assistant role 的内容、模型和 stopReason。若使用工具，服务器处理 ToolUseContent 后以仅包含匹配 ToolResultContent 的 user 消息继续下一轮。
    en: The server constructs messages and constraints; under user control the client selects a model and returns assistant-role content, model, and stopReason. With tools, the server handles ToolUseContent and continues with a user message containing only matching ToolResultContent.
    ja: サーバーが messages と制約を構成し、クライアントはユーザー制御下でモデルを選び assistant 役割の content、model、stopReason を返す。ツール利用時はサーバーが ToolUseContent を処理し、対応する ToolResultContent のみを含む user メッセージで次のターンを続ける。
  typical_input:
    - description: A basic creation request from server to client.
      format: '{"jsonrpc":"2.0","id":1,"method":"sampling/createMessage","params":{"messages":[{"role":"user","content":{"type":"text","text":"Summarize this."}}],"maxTokens":100}}'
      source_claims: [mcp-sampling-create-message]
  typical_output:
    - description: A client-created generation result.
      format: '{"jsonrpc":"2.0","id":1,"result":{"role":"assistant","content":{"type":"text","text":"Summary"},"model":"client-selected-model","stopReason":"endTurn"}}'
      source_claims: [mcp-sampling-create-message]
  reference_implementations:
    - name: MCP Sampling specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/client/sampling
      description: Normative sampling capability, CreateMessage request/result, tool loop, human control, and security constraints.
structure:
  identity_keys: ["id","method"]
  fields:
    - id: jsonrpc
      labels: {zh: "JSON-RPC 版本", en: "JSON-RPC version", ja: "JSON-RPC バージョン"}
      definitions:
        zh: "该请求包络中的原生 jsonrpc 成员，值必须为 \"2.0\"。"
        en: "The native jsonrpc member of this request envelope; it must be \"2.0\"."
        ja: "この要求エンベロープのネイティブな jsonrpc メンバーで、値は \"2.0\" でなければならない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2.0"
      allowed_values: ["2.0"]
      source_claims: [mcp-sampling-create-message]
    - id: id
      labels: {zh: "JSON-RPC 标识", en: "JSON-RPC id", ja: "JSON-RPC id"}
      definitions:
        zh: "关联该服务器请求与客户端响应的原生 JSON-RPC id。"
        en: "The native JSON-RPC id correlating this server request with the client response."
        ja: "このサーバー要求とクライアント応答を対応付けるネイティブな JSON-RPC id。"
      datatype: string-or-number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims: [mcp-sampling-create-message]
    - id: method
      labels: {zh: "方法", en: "Method", ja: "メソッド"}
      definitions:
        zh: "固定为 sampling/createMessage 的原生 method 成员。"
        en: "The native method member fixed to sampling/createMessage."
        ja: "sampling/createMessage に固定されるネイティブな method メンバー。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "sampling/createMessage"
      allowed_values: ["sampling/createMessage"]
      source_claims: [mcp-sampling-create-message]
    - id: messages
      labels: {zh: "输入消息", en: "Input messages", ja: "入力メッセージ"}
      definitions:
        zh: "原生 params.messages 数组，按顺序提供给客户端选择的模型。"
        en: "The native params.messages array supplied in order to the client-selected model."
        ja: "クライアントが選ぶモデルへ順序どおりに渡されるネイティブな params.messages 配列。"
      datatype: array
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: [{"role":"user","content":{"type":"text","text":"Summarize this."}}]
      allowed_values: []
      source_claims: [mcp-sampling-create-message]
    - id: maxTokens
      labels: {zh: "最大令牌数", en: "Maximum tokens", ja: "最大トークン数"}
      definitions:
        zh: "原生 params.maxTokens 成员，是本次生成的必填最大输出令牌数。"
        en: "The native params.maxTokens member, the required maximum output-token count for this generation."
        ja: "この生成で必須となる最大出力トークン数を示すネイティブな params.maxTokens メンバー。"
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 100
      allowed_values: []
      source_claims: [mcp-sampling-create-message]
    - id: tools
      labels: {zh: "采样工具", en: "Sampling tools", ja: "サンプリングツール"}
      definitions:
        zh: "可选的原生 params.tools 数组；只有客户端声明 sampling.tools 时才能发送。"
        en: "The optional native params.tools array, permitted only when the client declared sampling.tools."
        ja: "クライアントが sampling.tools を宣言した場合にのみ送れる任意のネイティブな params.tools 配列。"
      datatype: array
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: []
      allowed_values: []
      source_claims: [mcp-sampling-tools]
    - id: toolChoice
      labels: {zh: "工具选择", en: "Tool choice", ja: "ツール選択"}
      definitions:
        zh: "可选的原生 params.toolChoice 对象；其 mode 可为 auto、required 或 none。"
        en: "The optional native params.toolChoice object; its mode can be auto, required, or none."
        ja: "任意のネイティブな params.toolChoice オブジェクト。その mode は auto、required、none のいずれかである。"
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {"mode":"auto"}
      allowed_values: []
      source_claims: [mcp-sampling-tool-choice]
  constraints:
    - id: sampling-client-declared-capability
      severity: error
      expression_language: plain
      expression: A server sends sampling/createMessage only to a client that declared sampling capability during initialization.
      explanation:
        zh: 服务器只能向初始化期间声明 sampling 能力的客户端发送 sampling/createMessage。
        en: A server sends sampling/createMessage only to a client that declared sampling capability during initialization.
        ja: サーバーは初期化で sampling capability を宣言したクライアントにのみ sampling/createMessage を送る。
      source_claims: [mcp-sampling-capability]
    - id: sampling-tools-require-client-support
      severity: error
      expression_language: plain
      expression: A request with tools is sent only when the client declared sampling.tools capability.
      explanation:
        zh: 含 tools 的请求只能在客户端声明 sampling.tools 能力时发送。
        en: A request with tools is sent only when the client declared sampling.tools capability.
        ja: tools を含む要求はクライアントが sampling.tools capability を宣言した場合にのみ送る。
      source_claims: [mcp-sampling-tools]
    - id: sampling-tool-results-are-complete-and-exclusive
      severity: error
      expression_language: plain
      expression: A user message carrying tool results contains only matching ToolResultContent blocks for preceding tool uses.
      explanation:
        zh: 承载工具结果的 user 消息只能包含与先前工具使用匹配的 ToolResultContent 块。
        en: A user message carrying tool results contains only matching ToolResultContent blocks for preceding tool uses.
        ja: ツール結果を運ぶ user メッセージは、先行ツール利用に対応する ToolResultContent ブロックだけを含む。
      source_claims: [mcp-sampling-tool-result-balance]
  required_relations: []
examples:
  - id: mcp-sampling-positive-basic

    labels: {zh: 基础采样请求, en: Basic sampling request, ja: 基本サンプリング要求}

    descriptions:
      zh: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。
      en: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths.
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"jsonrpc":"2.0","id":1,"method":"sampling/createMessage","messages":[{"role":"user","content":{"type":"text","text":"Summarize this."}}],"maxTokens":100,"toolChoice":{"mode":"auto"}}
    related_node_ids: [MCPSamplingRequest, MCPRequest, MCPClientCapability]
    related_relation_ids: [MCPSamplingRequest-is_a-MCPRequest]

    source_claims: [mcp-sampling-capability, mcp-sampling-create-message]
  - id: mcp-sampling-counterexample-tools-without-capability

    labels: {zh: 未声明 tools 的工具型采样, en: Tool sampling without declared tools capability, ja: tools capability 未宣言のツールサンプリング}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"jsonrpc":"2.0","id":2,"method":"sampling/createMessage","messages":[{"role":"user","content":{"type":"text","text":"Find weather."}}],"maxTokens":100,"toolChoice":{"mode":"auto"}}
    related_node_ids: [MCPSamplingRequest, MCPClientCapability]
    related_relation_ids: [MCPSamplingRequest-is_a-MCPRequest]

    source_claims: [mcp-sampling-tools]
  - id: mcp-sampling-boundary-human-review

    labels: {zh: 人工审查边界, en: Human-review boundary, ja: 人間レビュー境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"jsonrpc":"2.0","id":3,"method":"sampling/createMessage","messages":[{"role":"user","content":{"type":"text","text":"Draft a reply."}}],"maxTokens":100,"toolChoice":{"mode":"none"}}
    related_node_ids: [MCPSamplingRequest]
    related_relation_ids: [MCPSamplingRequest-is_a-MCPRequest]

    source_claims: [mcp-sampling-human-control]
  - id: mcp-sampling-instance-summary-request

    labels: {zh: 文本摘要请求实例, en: Text-summary request instance, ja: テキスト要約要求実例}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"jsonrpc":"2.0","id":1,"method":"sampling/createMessage","messages":[{"role":"user","content":{"type":"text","text":"Summarize this."}}],"maxTokens":100,"toolChoice":{"mode":"none"}}
    related_node_ids: [MCPSamplingRequest, MCPRequest]
    related_relation_ids: [MCPSamplingRequest-is_a-MCPRequest]

    source_claims: [mcp-sampling-create-message]
parent_relation:
  id: MCPSamplingRequest-is_a-MCPRequest
  predicate: is_a
  target: concept:MCPRequest
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是 MCP 请求的采样子类, en: is the sampling subtype of MCP request, ja: MCP 要求のサンプリング下位型である}
  definition:
    zh: MCP 采样请求是从服务器发向客户端、请求语言模型生成的 MCP 请求。
    en: An MCP sampling request is an MCP request sent from a server to a client to request a language-model generation.
    ja: MCP サンプリング要求は言語モデル生成を求めるためにサーバーからクライアントへ送る MCP 要求である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_sampling_request_subtype
    labels: {zh: 具有采样请求子类, en: has sampling request subtype, ja: サンプリング要求下位型を持つ}
  conditions: []
  temporal_scope: request
  boundary_context: 此层级只表达 sampling/createMessage 的请求语义，不表达模型、生成结果或用户批准流程的成员关系。
  constraints:
    - id: sampling-request-method-fixed
      severity: error
      expression_language: plain
      expression: An MCPSamplingRequest uses the sampling/createMessage method.
      explanation:
        zh: MCPSamplingRequest 使用 sampling/createMessage 方法。
        en: An MCPSamplingRequest uses the sampling/createMessage method.
        ja: MCPSamplingRequest は sampling/createMessage メソッドを使用する。
      source_claims: [mcp-sampling-create-message]
  examples: []
  source_claims: [moonweave-mcp-sampling-request-taxonomy]
  distinct_fact_rationale:
    zh: 该子类由服务器到客户端的模型生成方向和 sampling/createMessage 词汇区分。
    en: This subtype is distinguished by its server-to-client model-generation direction and sampling/createMessage vocabulary.
    ja: この下位型はサーバーからクライアントへのモデル生成方向と sampling/createMessage 語彙により区別される。
relations: []
sources:
  - id: mcp-sampling-2025-11-25
    title: Model Context Protocol Specification — Sampling
    url: https://modelcontextprotocol.io/specification/2025-11-25/client/sampling
    source_type: official-specification
    locator: "Sampling; User Interaction Model; Tools in Sampling; Capabilities; Protocol Messages; Message Content Constraints; Error Handling; Security Considerations"
    relevance: Defines server-to-client sampling, capability declarations, CreateMessage messages, tools, human oversight, and tool-result constraints.
source_claims:
  - id: mcp-sampling-human-control
    source: mcp-sampling-2025-11-25
    supports: Sampling leaves model access, selection, and permissions under client control, and implementations should keep a human able to review or deny requests and outputs.
    locator: "Sampling; User Interaction Model"
    evidence_kind: normative
    confidence: high
  - id: moonweave-mcp-sampling-request-taxonomy
    source: mcp-sampling-2025-11-25
    supports: "Moonweave classifies sampling/createMessage as an MCPRequest subtype for navigation; this subclass edge is a taxonomy design inference."
    locator: "Creating Messages"
    evidence_kind: design-inference
    confidence: high
  - id: mcp-sampling-capability
    source: mcp-sampling-2025-11-25
    supports: Clients supporting sampling declare sampling capability during initialization.
    locator: "Capabilities"
    evidence_kind: normative
    confidence: high
  - id: mcp-sampling-tools
    source: mcp-sampling-2025-11-25
    supports: Tool-enabled sampling requests require the client to have declared sampling.tools and servers must not send them otherwise.
    locator: "Tools in Sampling; Capabilities"
    evidence_kind: normative
    confidence: high
  - id: mcp-sampling-create-message
    source: mcp-sampling-2025-11-25
    supports: Servers use sampling/createMessage with messages and optional model preferences, systemPrompt, maxTokens, tools, and toolChoice; clients return assistant content, model, and stopReason.
    locator: "Protocol Messages > Creating Messages; Sampling with Tools"
    evidence_kind: normative
    confidence: high
  - id: mcp-sampling-tool-choice
    source: mcp-sampling-2025-11-25
    supports: toolChoice supports auto, required, and none modes for tool use in sampling.
    locator: "Cross-API Compatibility > Tool Choice Modes"
    evidence_kind: normative
    confidence: high
  - id: mcp-sampling-tool-result-balance
    source: mcp-sampling-2025-11-25
    supports: Tool-result user messages contain only tool results and each preceding tool use is matched before other messages.
    locator: "Message Content Constraints; Security Considerations"
    evidence_kind: normative
    confidence: high
