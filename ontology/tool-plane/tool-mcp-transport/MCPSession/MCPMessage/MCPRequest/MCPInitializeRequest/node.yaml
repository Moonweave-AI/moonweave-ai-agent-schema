    labels: {zh: "有效的客户端初始化", en: "Valid client initialization", ja: "有効な client 初期化"}

    descriptions:
      zh: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。"
      en: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths."
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"jsonrpc": "2.0", "id": "init-1", "method": "initialize", "params": {"protocolVersion": "2025-11-25", "capabilities": {"roots": {}}, "clientInfo": {"name": "example-host", "version": "1.0.0"}}, "protocolVersion": "2025-11-25", "capabilities": {"roots": {}}, "clientInfo": {"name": "example-host", "version": "1.0.0"}}
    related_node_ids: [MCPInitializeRequest, MCPInitializeResult]
    related_relation_ids: [MCPInitializeRequest-is_a-MCPRequest]

    source_claims: [mcp-initialize-request-shape, mcp-initialize-lifecycle]
  - id: mcp-initialize-request-counterexample-missing-version

    labels: {zh: "缺少协议版本的伪初始化", en: "Pseudo-initialization missing protocol version", ja: "プロトコル版を欠く疑似初期化"}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"jsonrpc": "2.0", "id": "init-2", "method": "initialize", "params": {"capabilities": {}, "clientInfo": {"name": "example-host", "version": "1.0.0"}}, "capabilities": {}, "clientInfo": {"name": "example-host", "version": "1.0.0"}}
    related_node_ids: [MCPInitializeRequest, MCPRequest]
    related_relation_ids: [MCPInitializeRequest-is_a-MCPRequest]

    source_claims: [mcp-initialize-request-shape]
  - id: mcp-initialize-request-boundary-connection-versus-initialization

    labels: {zh: "连接建立与初始化协商的边界", en: "Boundary between connection and initialization", ja: "接続確立と初期化交渉の境界"}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"jsonrpc": "2.0", "id": "init-3", "method": "initialize", "params": {"protocolVersion": "2025-11-25", "capabilities": {}, "clientInfo": {"name": "example-host", "version": "1.0.0"}}, "protocolVersion": "2025-11-25", "capabilities": {}, "clientInfo": {"name": "example-host", "version": "1.0.0"}}
    related_node_ids: [MCPInitializeRequest, MCPStdioTransport]
    related_relation_ids: [MCPInitializeRequest-is_a-MCPRequest]

    source_claims: [mcp-initialize-lifecycle]
  - id: mcp-initialize-request-instance-init-1

    labels: {zh: "init-1 初始化请求实例", en: "init-1 initialize request instance", ja: "init-1 初期化要求インスタンス"}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"jsonrpc": "2.0", "id": "init-1", "method": "initialize", "params": {"protocolVersion": "2025-11-25", "capabilities": {"roots": {"listChanged": true}}, "clientInfo": {"name": "example-host", "version": "1.0.0"}}, "protocolVersion": "2025-11-25", "capabilities": {"roots": {"listChanged": true}}, "clientInfo": {"name": "example-host", "version": "1.0.0"}}
    related_node_ids: [MCPInitializeRequest, MCPClient]
    related_relation_ids: [MCPInitializeRequest-is_a-MCPRequest]

    source_claims: [mcp-initialize-request-shape]
