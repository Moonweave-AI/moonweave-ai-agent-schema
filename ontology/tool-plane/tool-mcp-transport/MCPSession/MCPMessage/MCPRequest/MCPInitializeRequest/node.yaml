schema: moonweave.ai/ontology-node/v1
id: MCPInitializeRequest
kind: concept
labels:
  zh: MCP 初始化请求
  en: MCP initialize request
  ja: MCP 初期化リクエスト
semantics:
  short_definition:
    zh: 客户端在新 MCP 会话开始时发送、用来协商协议版本和能力的 `initialize` JSON-RPC 请求。
    en: The client `initialize` JSON-RPC request that starts a new MCP session by negotiating protocol version and capabilities.
    ja: 新しい MCP セッションでプロトコル版と能力を交渉するために client が送る `initialize` JSON-RPC リクエスト。
  definition:
    zh: >
      MCPInitializeRequest 是 MCP 生命周期中的第一个协议请求：它以 `jsonrpc: "2.0"`、请求 id、`method:
      "initialize"` 和参数对象发送。参数中的 `protocolVersion` 标识客户端支持的 MCP 版本，`capabilities` 描述客户端可提供的可选能力，
      `clientInfo` 标识实现。服务端以相同 id 返回 InitializeResult；在结果成功且客户端随后发送
      `notifications/initialized` 前，双方不进入常规协议操作阶段。
    en: >
      An MCPInitializeRequest is the first protocol request in the MCP lifecycle. It is sent with `jsonrpc: "2.0"`,
      a request id, `method: "initialize"`, and a parameter object. `protocolVersion` identifies the MCP version
      supported by the client, `capabilities` describes optional client features, and `clientInfo` identifies the
      implementation. The server returns an InitializeResult with the same id; ordinary protocol operation does not
      begin until that result succeeds and the client subsequently sends `notifications/initialized`.
    ja: >
      MCPInitializeRequest は MCP ライフサイクルにおける最初のプロトコル要求である。`jsonrpc: "2.0"`、要求 id、
      `method: "initialize"`、パラメータオブジェクトを持つ。`protocolVersion` は client が対応する MCP 版を示し、
      `capabilities` は任意の client 機能を、`clientInfo` は実装を示す。server は同じ id の InitializeResult を返し、
      その成功と client による `notifications/initialized` の送信まで通常のプロトコル操作は始まらない。
  why_needed:
    zh: 它让双方在发送工具、资源或其他可选方法前，先明确共同协议版本和彼此能力，避免把连接已建立误当作功能已协商。
    en: It establishes the common protocol version and each peer's capabilities before tools, resources, or other optional methods are used; a live transport connection alone is not feature negotiation.
    ja: 接続済みの transport を機能交渉済みと取り違えないよう、tools、resources、その他の任意メソッドの前に共通のプロトコル版と両者の能力を確定する。
  includes:
    - {zh: "带请求 id 且 method 为 `initialize` 的客户端到服务端 JSON-RPC 请求", en: "A client-to-server JSON-RPC request with an id and method `initialize`", ja: "id を持ち method が `initialize` である client から server への JSON-RPC 要求"}
    - {zh: "原生 `params.protocolVersion`、`params.capabilities` 和 `params.clientInfo` 成员", en: "The native `params.protocolVersion`, `params.capabilities`, and `params.clientInfo` members", ja: "ネイティブな `params.protocolVersion`、`params.capabilities`、`params.clientInfo` メンバー"}
    - {zh: "等待同一 id 的初始化成功结果或 JSON-RPC 错误的关联", en: "Correlation to a same-id initialization result or JSON-RPC error", ja: "同じ id の初期化成功結果または JSON-RPC error への対応付け"}
  excludes:
    - {zh: "服务端返回的 InitializeResult", en: "The server-returned InitializeResult", ja: "server が返す InitializeResult"}
    - {zh: "客户端在成功结果后发送的 `notifications/initialized` 通知", en: "The `notifications/initialized` notification sent after a successful result", ja: "成功結果後に client が送る `notifications/initialized` 通知"}
    - {zh: "已经进入操作阶段的 `tools/list`、`resources/read` 等请求", en: "Operational-phase requests such as `tools/list` or `resources/read`", ja: "操作段階の `tools/list` や `resources/read` などの要求"}
  semantic_kind: information
  aliases:
    - {language: en, value: InitializeRequest, alias_kind: official-schema-name}
engineering:
  explanation:
    zh: >
      MCP 客户端在 transport 建立后先序列化此请求，并把 pending 调用按 id 登记。服务端解析版本、客户端能力和实现信息，
      再返回初始化结果；客户端检查协商结果后发送 initialized 通知，才开放后续方法。实现应把能力对象当作声明而不是授权：
      例如服务端只有在对应客户端能力已协商时才可以发送 sampling 或 roots 请求。
    en: >
      After the transport is established, an MCP client serializes this request and records the pending call by id.
      The server reads version, client capabilities, and implementation information, then returns its initialization
      result. The client checks that result and sends the initialized notification before opening later methods.
      Implementations treat capability objects as declarations rather than authorization: for example, a server can
      issue sampling or roots requests only when the corresponding client capability was negotiated.
    ja: >
      transport 確立後、MCP client はこの要求を直列化し、保留中の呼出しを id で記録する。server は版、client 能力、
      実装情報を読み、初期化結果を返す。client は結果を確認して initialized 通知を送ってから後続メソッドを開く。
      実装は capability object を認可ではなく宣言として扱う。たとえば server は対応する client 能力が交渉済みの場合にのみ
      sampling または roots の要求を出せる。
  typical_input:
    - description: Client proposes the current MCP version and declares roots support.
      format: |
        {
          "jsonrpc": "2.0",
          "id": "init-1",
          "method": "initialize",
          "params": {
            "protocolVersion": "2025-11-25",
            "capabilities": {"roots": {"listChanged": true}},
            "clientInfo": {"name": "example-host", "version": "1.0.0"}
          }
        }
      source_claims: [mcp-initialize-request-shape]
  typical_output:
    - description: Server correlates its initialization result to the request id.
      format: |
        {
          "jsonrpc": "2.0",
          "id": "init-1",
          "result": {
            "protocolVersion": "2025-11-25",
            "capabilities": {"tools": {"listChanged": true}},
            "serverInfo": {"name": "example-server", "version": "1.0.0"}
          }
        }
      source_claims: [mcp-initialize-result-shape]
  reference_implementations:
    - name: MCP lifecycle specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
      description: Defines initialization as the first lifecycle phase, its request/result sequence, and the initialized notification transition.
    - name: MCP schema
      url: https://modelcontextprotocol.io/specification/2025-11-25/schema
      description: Declares the InitializeRequest request type and its protocolVersion, capabilities, and clientInfo parameters.
structure:
  identity_keys: ["id", "method"]
  fields:
    - id: jsonrpc
      labels: {zh: "JSON-RPC 版本", en: "JSON-RPC version", ja: "JSON-RPC バージョン"}
      definitions: {zh: "初始化请求包络中的原生 `jsonrpc` 成员，值固定为 `2.0`。", en: "The native `jsonrpc` envelope member, fixed to `2.0`.", ja: "初期化要求のネイティブな `jsonrpc` 包絡メンバーであり、値は `2.0` に固定される。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2.0"
      allowed_values: ["2.0"]
      source_claims: [mcp-initialize-request-shape]
    - id: id
      labels: {zh: "请求标识", en: "Request id", ja: "要求 id"}
      definitions: {zh: "关联本请求与服务端 InitializeResult 或 JSON-RPC 错误的原生请求 id。", en: "The native request id that correlates this request with the server's InitializeResult or JSON-RPC error.", ja: "この要求を server の InitializeResult または JSON-RPC error に対応付けるネイティブな要求 id。"}
      datatype: string-or-number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "init-1"
      allowed_values: []
      source_claims: [mcp-initialize-request-shape]
    - id: method
      labels: {zh: "方法", en: "Method", ja: "メソッド"}
      definitions: {zh: "继承的 JSON-RPC 方法判别字段；该子类型固定为 `initialize`。", en: "The inherited JSON-RPC method discriminator, fixed to `initialize` for this subtype.", ja: "継承した JSON-RPC メソッド判別子であり、この下位型では `initialize` に固定される。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "initialize"
      allowed_values: ["initialize"]
      source_claims: [mcp-initialize-request-shape]
    - id: params
      labels: {zh: "初始化参数", en: "Initialization parameters", ja: "初期化パラメータ"}
      definitions: {zh: "承载版本、能力和客户端信息的原生 `params` 对象。", en: "The native `params` object carrying version, capabilities, and client information.", ja: "版、能力、client 情報を運ぶネイティブな `params` オブジェクト。"}
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: {"protocolVersion": "2025-11-25", "capabilities": {}, "clientInfo": {"name": "example-host", "version": "1.0.0"}}
      allowed_values: []
      source_claims: [mcp-initialize-request-shape]
    - id: protocolVersion
      labels: {zh: "客户端协议版本", en: "Client protocol version", ja: "client プロトコル版"}
      definitions: {zh: "原生 `params.protocolVersion` 成员，声明客户端在本次初始化中支持的 MCP 版本。", en: "The native `params.protocolVersion` member declaring the MCP version supported by the client for this initialization.", ja: "この初期化で client が対応する MCP 版を宣言するネイティブな `params.protocolVersion` メンバー。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2025-11-25"
      allowed_values: []
      source_claims: [mcp-initialize-request-shape]
    - id: capabilities
      labels: {zh: "客户端能力", en: "Client capabilities", ja: "client 能力"}
      definitions: {zh: "原生 `params.capabilities` 对象，枚举客户端在协商后可接收或提供的可选功能。", en: "The native `params.capabilities` object enumerating optional features the client can receive or provide after negotiation.", ja: "交渉後に client が受信または提供できる任意機能を列挙するネイティブな `params.capabilities` オブジェクト。"}
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: {"roots": {"listChanged": true}}
      allowed_values: []
      source_claims: [mcp-initialize-request-shape, mcp-capability-negotiation]
    - id: clientInfo
      labels: {zh: "客户端实现信息", en: "Client implementation information", ja: "client 実装情報"}
      definitions: {zh: "原生 `params.clientInfo` 对象，至少携带客户端实现的名称和版本。", en: "The native `params.clientInfo` object carrying at least the client implementation name and version.", ja: "少なくとも client 実装の名称と版を運ぶネイティブな `params.clientInfo` オブジェクト。"}
      datatype: object
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: {"name": "example-host", "version": "1.0.0"}
      allowed_values: []
      source_claims: [mcp-initialize-request-shape]
  constraints:
    - id: initialize-request-is-first-protocol-request
      severity: error
      expression_language: plain
      expression: A client sends initialize before normal MCP protocol operation for a new session.
      explanation: {zh: "新会话的常规协议操作必须以 initialize 为前置条件。", en: "Normal protocol operation in a new session has initialize as its prerequisite.", ja: "新しいセッションの通常プロトコル操作には initialize が前提となる。"}
      source_claims: [mcp-initialize-lifecycle]
    - id: initialize-request-declares-version-capabilities-and-client-info
      severity: error
      expression_language: plain
      expression: An initialize request supplies protocolVersion, capabilities, and clientInfo in its params object.
      explanation: {zh: "这三项是初始化参数对象中用于兼容性与能力协商的规范成员。", en: "These are the normative initialization parameter members for compatibility and capability negotiation.", ja: "これら三つは互換性と能力交渉のための規範的な初期化パラメータメンバーである。"}
      source_claims: [mcp-initialize-request-shape]
  required_relations: []
examples:
