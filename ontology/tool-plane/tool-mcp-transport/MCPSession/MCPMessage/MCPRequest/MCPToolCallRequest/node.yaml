      en: "MCPToolCallRequest and MCPElicitation share MCPRequest; The five requests differ by method, direction, and payload: elicitation/create and sampling/createMessage travel server-to-client; prompts/get, resources/read, and tools/call travel client-to-server and bind prompt arguments, a URI, and tool arguments respectively."
      ja: MCPToolCallRequest と MCPElicitation は MCPRequest を共有し、五 request は method/direction/payload が異なり、elicitation/create・sampling/createMessage は server-to-client、prompts/get・resources/read・tools/call は client-to-server で prompt arguments・URI・tool arguments を各々束縛します。
