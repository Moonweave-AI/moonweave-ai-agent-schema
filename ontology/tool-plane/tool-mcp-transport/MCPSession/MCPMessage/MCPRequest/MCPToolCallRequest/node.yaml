      zh: 归为 MCPToolCallRequest 并请求一个 ToolCall。
      en: Classify MCPToolCallRequest and request one ToolCall.
      ja: MCPToolCallRequest とし一 ToolCall を要求します。
    why_valid_or_invalid:
      zh: method、名称与实参完整描述工具协议调用。
      en: Method, name, and arguments fully describe the protocol tool call.
      ja: method・name・arguments が protocol tool call を記述します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-tool-call-request-003
  - id: MCPToolCallRequest-example-boundary-001
    kind: boundary
    labels:
      zh: MCP 工具调用请求边界例
      en: Boundary MCP tool-call request case
      ja: MCP ツール呼出要求の境界例
