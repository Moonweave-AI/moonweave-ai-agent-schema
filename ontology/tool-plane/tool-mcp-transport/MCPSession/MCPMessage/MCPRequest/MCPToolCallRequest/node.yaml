schema: moonweave.ai/ontology-node/v1
id: MCPToolCallRequest
kind: concept
status: review
labels:
  zh: MCP 工具调用请求
  en: MCP tool-call request
  ja: MCP ツール呼出要求
semantics:
  short_definition:
    zh: method=`tools/call`、以工具名称和实参请求执行的 MCP 请求。
    en: An MCP request with method tools/call naming a tool and its arguments.
    ja: method=tools/call で tool name と argument を指定する MCP request。
  definition:
    zh: MCP 工具调用请求是 MCPRequest 的严格下位类型，沿 MCPRequest 继承 message_record_id 线路记录身份；继承的 request_id 仅用于协议关联。method=tools/call 与携带工具 name、arguments 的 params 构成种差。它在线路层请求一个通用 ToolCall 活动，但不是 MCPToolList、ToolDefinition、ToolCallAttempt 或 ToolResult。
    en: An MCP tool-call request is a strict MCPRequest subtype and inherits the message_record_id wire-record identity through MCPRequest; inherited request_id is only protocol correlation. method=tools/call and params carrying the tool name and arguments supply the differentia. At the wire layer it requests one generic ToolCall activity but is not MCPToolList, ToolDefinition, ToolCallAttempt, or ToolResult.
    ja: MCP tool-call request は MCPRequest の厳密な下位型で、MCPRequest を通じて wire record identity の message_record_id を継承し、継承 request_id は protocol correlation のみです。method=tools/call と tool name/arguments を持つ params が種差で、list/definition/attempt/result ではありません。
  why_needed:
    zh: 专门子型只把 tools/call 映射到通用 ToolCall，避免 sampling、resources 或 prompts 请求误进入工具执行树。
    en: The specialized subtype maps only tools/call to generic ToolCall, preventing sampling, resource, or prompt requests from entering the tool-execution tree.
    ja: specialized subtype は tools/call だけを generic ToolCall に map し sampling/resource/prompt request の誤分類を防ぎます。
  includes:
    - zh: 纳入具有 RequestId、tools/call、工具名称与结构化 arguments 的请求。
      en: Includes requests with RequestId, tools/call, a tool name, and structured arguments.
      ja: RequestId・tools/call・tool name・structured arguments を持つ request を含みます。
  excludes:
    - zh: 排除 tools/list、采样内模型工具调用项、ToolCall 活动和 ToolResult。
      en: Excludes tools/list, model tool-use items inside sampling, the ToolCall activity, and ToolResult.
      ja: tools/list・sampling 内 model tool-use item・ToolCall activity・ToolResult を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: mcp-tool-call-request-method
      severity: error
      expression_language: plain
      expression: Inherited method MUST equal tools/call and inherited params MUST contain a tool name; arguments MUST be an object when present.
      explanations:
        zh: 继承的 method 必须为 tools/call，params 必须给出工具 name；arguments 出现时必须为对象。
        en: Inherited method must be tools/call, params must provide a tool name, and arguments must be an object when present.
        ja: 継承 method は tools/call、params は tool name を持ち、arguments がある場合は object でなければなりません。
      source_claims:
        - claim-mcp-tool-call-request-002
  required_relation_constraints: []
