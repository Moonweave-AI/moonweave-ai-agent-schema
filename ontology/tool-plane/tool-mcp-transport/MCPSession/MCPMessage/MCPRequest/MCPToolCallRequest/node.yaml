      zh: 外层归 MCPSamplingRequest，不归 MCPToolCallRequest。
      en: Classify the outer request as MCPSamplingRequest, not MCPToolCallRequest.
      ja: outer request は MCPSamplingRequest とし MCPToolCallRequest にしません。
    why_valid_or_invalid:
      zh: 嵌套采样工具循环不改变外层 MCP method。
      en: A nested sampling tool loop does not change the outer MCP method.
      ja: nested sampling tool loop は outer MCP method を変更しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-tool-call-request-003
