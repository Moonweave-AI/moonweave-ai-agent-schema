schema: moonweave.ai/ontology-node/v1
id: MCPToolCallRequest
kind: concept
labels:
  zh: MCP 工具调用请求
  en: MCP tools/call request
  ja: MCP tools/callリクエスト
semantics:
  short_definition:
    zh: 客户端请求服务器按名称执行一个已公开工具并传入参数的 `tools/call` 请求。
    en: A `tools/call` request in which a client asks a server to invoke one exposed tool by name with arguments.
    ja: クライアントがサーバーに公開済みtoolをnameとargumentsで実行させる `tools/call` リクエスト。
  definition:
    zh: >
      MCP tools/call 请求是 method 为 `tools/call` 的 MCP 请求。其 params 包含必填 `name` 和可选
      `arguments`，后者必须符合已公开工具的 inputSchema。服务器以同一 JSON-RPC id 返回 ToolResult，
      其中可有 content、structuredContent 和 isError；工具描述和注解应被客户端视为不可信，主机必须保持
      用户对工具调用的控制。
    en: >
      An MCP tools/call request is an MCP request whose method is `tools/call`. Its params
      contain a required `name` and optional `arguments`, which must conform to the exposed
      tool's inputSchema. The server returns a ToolResult with the same JSON-RPC id, possibly
      containing content, structuredContent, and isError; clients treat tool descriptions and
      annotations as untrusted, and hosts retain user control over tool invocation.
    ja: >
      MCP tools/callリクエストはmethodが `tools/call` のMCPリクエストである。paramsには必須のnameと
      任意のargumentsがあり、後者は公開済みtoolのinputSchemaに適合しなければならない。サーバーは同じ
      JSON-RPC idでcontent、structuredContent、isErrorを持ち得るToolResultを返す。クライアントはtool
      のdescriptionとannotationを信頼できないものとして扱い、hostはtool呼び出しに対するユーザー制御を保持する。
  why_needed:
    zh: >
      tools/call 让已发现工具的定义、参数验证和一次有副作用或只读执行保持可追踪的边界。它不是执行实现，
      也不表示用户已同意；主机在产生请求前必须以用户可理解的方式控制该操作。
    en: >
      tools/call keeps the definition, argument validation, and one possibly side-effecting or
      read-only execution of a discovered tool in a traceable boundary. It is neither the tool
      implementation nor proof of user consent; the host controls that action before producing
      the request in a user-understandable way.
    ja: >
      tools/callは発見済みtoolの定義、arguments検証、そして副作用を持つ場合もある一回の読み取りまたは
      実行を追跡可能な境界に置く。これはtool実装でもユーザー同意の証拠でもない。hostはユーザーが理解できる
      形でその操作を制御してからリクエストを生成する。
  includes:
    - zh: method 为 `tools/call` 的带 id 请求。
      en: An id-bearing request whose method is `tools/call`.
      ja: methodが `tools/call` のid付きリクエスト。
    - zh: 已公开工具的必填 name 以及可选 arguments。
      en: The required name of an exposed tool and optional arguments.
      ja: 公開済みtoolの必須nameと任意arguments。
    - zh: 对同 id ToolResult 或 JSON-RPC error 的期待。
      en: The expectation of a same-id ToolResult or JSON-RPC error.
      ja: 同じidのToolResultまたはJSON-RPC errorへの期待。
  excludes:
    - zh: '`tools/list` 返回的工具定义。'
      en: A tool definition returned by `tools/list`.
      ja: '`tools/list` が返すtool定義。'
    - zh: 实际服务器端工具实现、用户同意 UI 或工具执行结果本身。
      en: The server-side tool implementation, user-consent UI, or tool result itself.
      ja: サーバー側tool実装、ユーザー同意UI、またはtool結果そのもの。
  semantic_kind: information
  aliases:
    - language: en
      value: tool invocation request
      alias_kind: synonym
engineering:
  explanation:
    zh: >
      客户端先从 `tools/list` 获取 name 和 inputSchema，并检查服务器已声明 tools。主机在授权后发送
      tools/call；服务器验证 arguments、执行目标操作，并以 content 或 structuredContent 返回结果。
      如果工具提供 outputSchema，服务器必须输出符合该 schema 的 structured result，客户端应验证它。
    en: >
      The client first obtains name and inputSchema from `tools/list` and checks that the server
      advertised tools. After host authorization it sends tools/call; the server validates
      arguments, performs the target operation, and returns content or structuredContent. If
      the tool provides outputSchema, the server must produce conformant structured results and
      the client should validate them.
    ja: >
      クライアントはまず `tools/list` からnameとinputSchemaを得て、サーバーがtoolsを宣言したことを
      確認する。host認可後にtools/callを送り、サーバーはargumentsを検証して対象操作を実行し、content
      またはstructuredContentを返す。toolがoutputSchemaを提供する場合、サーバーは適合する構造化結果を
      出力し、クライアントは検証すべきである。
  typical_input:
    - description: Client invokes a discovered weather tool with schema-valid arguments.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 2,
          "method": "tools/call",
          "params": {
            "name": "get_weather",
            "arguments": {"location": "New York"}
          }
        }
      source_claims: [mcp-tools-call]
  typical_output:
    - description: Server returns a non-error text ToolResult with the same id.
      format: |
        {
          "jsonrpc": "2.0",
          "id": 2,
          "result": {
            "content": [{"type": "text", "text": "Current weather in New York: 72 F"}],
            "isError": false
          }
        }
      source_claims: [mcp-tools-call]
  reference_implementations:
    - name: MCP tools specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines tools capability, tools/list, tools/call, input/output schemas, and ToolResult.
    - name: MCP specification overview
      url: https://modelcontextprotocol.io/specification/2025-11-25
      description: Requires host user consent and control for tool invocation.
structure:
  identity_keys: ["id","method","name"]
  fields:
    - id: jsonrpc
      labels: {zh: "JSON-RPC 版本", en: "JSON-RPC version", ja: "JSON-RPC バージョン"}
      definitions:
        zh: "该请求包络中的原生 jsonrpc 成员，值必须为 \"2.0\"。"
        en: "The native jsonrpc member of this request envelope; it must be \"2.0\"."
        ja: "この要求エンベロープのネイティブな jsonrpc メンバーで、値は \"2.0\" でなければならない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2.0"
      allowed_values: ["2.0"]
      source_claims: [mcp-tools-call]
    - id: id
      labels: {zh: "JSON-RPC 标识", en: "JSON-RPC id", ja: "JSON-RPC id"}
      definitions:
        zh: "关联该请求与结果或错误响应的原生 JSON-RPC id。"
        en: "The native JSON-RPC id correlating this request with its result or error response."
        ja: "この要求を結果またはエラー応答に対応付けるネイティブな JSON-RPC id。"
      datatype: string-or-number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 2
      allowed_values: []
      source_claims: [mcp-tools-call]
    - id: method
      labels: {zh: "方法", en: "Method", ja: "メソッド"}
      definitions:
        zh: "该子类型继承的 JSON-RPC 方法判别字段；在此节点中固定为 `tools/call`。"
        en: "The inherited JSON-RPC method discriminator, fixed to `tools/call` for this subtype."
        ja: "この下位型が継承する JSON-RPC のメソッド判別子であり、このノードでは `tools/call` に固定される。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "tools/call"
      allowed_values: ["tools/call"]
      source_claims: [mcp-tools-call]
    - id: name
      labels: {zh: "工具名称", en: "Tool name", ja: "ツール名"}
      definitions:
        zh: "原生 params.name 成员，指向服务器公开的工具。"
        en: "The native params.name member naming an exposed server tool."
        ja: "公開されたサーバーツールを指すネイティブな params.name メンバー。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "get_weather"
      allowed_values: []
      source_claims: [mcp-tools-call, mcp-tools-name-guidance]
    - id: arguments
      labels: {zh: "工具参数", en: "Tool arguments", ja: "ツール引数"}
      definitions:
        zh: "可选的原生 params.arguments 对象，必须符合该工具的 inputSchema。"
        en: "The optional native params.arguments object, which must conform to the tool inputSchema."
        ja: "任意のネイティブな params.arguments オブジェクト。ツールの inputSchema に適合しなければならない。"
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {"location":"New York"}
      allowed_values: []
      source_claims: [mcp-tools-call]
  constraints:
    - id: tool-call-requires-tools-capability
      severity: error
      expression_language: plain
      expression: A client sends tools/call only after the server declared tools capability for the session.
      explanation:
        zh: 客户端只能在服务器已为会话声明 tools 能力后发送 tools/call。
        en: A client sends tools/call only after the server declared tools capability for the session.
        ja: クライアントはサーバーがセッションでtools機能を宣言した後にのみtools/callを送る。
      source_claims: [mcp-tools-capability]
    - id: tool-call-arguments-conform-to-input-schema
      severity: error
      expression_language: plain
      expression: Tool call arguments conform to the inputSchema published for the named tool.
      explanation:
        zh: 工具调用参数符合已公开名称工具的 inputSchema。
        en: Tool call arguments conform to the inputSchema published for the named tool.
        ja: tool call argumentsは名前付きtoolに公開されたinputSchemaに適合する。
      source_claims: [mcp-tools-call]
    - id: tool-call-host-controls-user-consent
      severity: error
      expression_language: plain
      expression: The host obtains and preserves explicit user control over a tool invocation before it is sent.
      explanation:
        zh: 主机在发送工具调用前取得并保留用户对该操作的明确控制权。
        en: The host obtains and preserves explicit user control over a tool invocation before it is sent.
        ja: hostはtool呼び出しを送る前に、その操作に対する明示的なユーザー制御を取得して保持する。
      source_claims: [mcp-tool-user-consent]
  required_relations: []
examples:
  - id: mcp-tools-call-positive-weather

    labels: {zh: 调用已公开天气工具, en: Call an exposed weather tool, ja: 公開済み天気toolの呼び出し}

    descriptions:
      zh: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。"
      en: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths."
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"jsonrpc":"2.0","id":2,"method":"tools/call","name":"get_weather","arguments":{"location":"New York"}}
    related_node_ids: [MCPToolCallRequest, MCPRequest]
    related_relation_ids: [MCPToolCallRequest-is_a-MCPRequest]

    source_claims: [mcp-tools-capability, mcp-tools-call, mcp-tool-user-consent]
  - id: mcp-tools-call-counterexample-schema-violation

    labels: {zh: 不符合工具 schema 的调用, en: Tool call violating input schema, ja: input schemaに違反するtool call}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"jsonrpc":"2.0","id":3,"method":"tools/call","name":"get_weather","arguments":{"location":42}}
    related_node_ids: [MCPToolCallRequest, MCPRequest]
    related_relation_ids: [MCPToolCallRequest-is_a-MCPRequest]

    source_claims: [mcp-tools-call]
  - id: mcp-tools-call-boundary-definition-vs-invocation

    labels: {zh: 工具定义与工具调用的边界, en: Boundary between tool definition and invocation, ja: tool定義と呼び出しの境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"jsonrpc":"2.0","id":2,"method":"tools/call","name":"get_weather","arguments":{"location":"New York"}}
    related_node_ids: [MCPToolCallRequest]
    related_relation_ids: [MCPToolCallRequest-is_a-MCPRequest]

    source_claims: [mcp-tools-call]
  - id: mcp-tools-call-instance-weather-2

    labels: {zh: get_weather 调用实例, en: get_weather call instance, ja: get_weather callインスタンス}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"jsonrpc":"2.0","id":2,"method":"tools/call","name":"get_weather","arguments":{"location":"New York"}}
    related_node_ids: [MCPToolCallRequest, MCPRequest]
    related_relation_ids: [MCPToolCallRequest-is_a-MCPRequest]

    source_claims: [mcp-tools-call]
parent_relation:
  id: MCPToolCallRequest-is_a-MCPRequest
  predicate: is_a
  target: concept:MCPRequest
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是工具调用请求, en: is a tool invocation request, ja: tool呼び出しリクエストである}
  definition:
    zh: MCPToolCallRequest 是 method 固定为 tools/call、具有工具名称和可选参数的 MCPRequest。
    en: An MCPToolCallRequest is an MCPRequest whose method is tools/call with tool name and optional arguments.
    ja: MCPToolCallRequestはmethodがtools/callでtool nameと任意argumentsを持つMCPRequestである。
  cardinality:
    source: {min: 0, max: null}
    target: {min: 1, max: 1}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_tool_call_request
    labels: {zh: 具有工具调用请求, en: has tool call request, ja: tool callリクエストを持つ}
  conditions: []
  temporal_scope: session
  boundary_context: 该关系不包括 tools/list、工具定义、工具实现、ToolResult 或用户同意记录。
  constraints:
    - id: tool-call-method-name-discriminator
      severity: error
      expression_language: plain
      expression: An MCPToolCallRequest has method tools/call and required name params.
      explanation:
        zh: MCPToolCallRequest 的 method 为 tools/call 且有必填 name params。
        en: An MCPToolCallRequest has method tools/call and required name params.
        ja: MCPToolCallRequestはmethod tools/callと必須name paramsを持つ。
      source_claims: [mcp-tools-call]
  examples: []
  source_claims: [moonweave-mcp-tool-call-request-taxonomy]
  distinct_fact_rationale:
    zh: 它由 tools/call 方法和 name/arguments 区分，并显式保留工具定义、执行和用户控制边界。
    en: It is distinguished by tools/call method and name/arguments while preserving boundaries to definition, execution, and user control.
    ja: tools/call methodとname/argumentsで区別され、定義、実行、ユーザー制御への境界を保持する。
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification — Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-specification
    locator: "Capabilities; Calling Tools; Tool; Tool Result; Output Schema"
    relevance: Defines tools capability, tools/call request/result, schemas, and untrusted tool annotations.
  - id: mcp-specification-2025-11-25
    title: Model Context Protocol Specification
    url: https://modelcontextprotocol.io/specification/2025-11-25
    source_type: official-specification
    locator: "Security and Trust & Safety; Tool Safety"
    relevance: Requires explicit user consent and user control for tool invocation.
source_claims:
  - id: mcp-tools-capability
    source: mcp-tools-2025-11-25
    supports: Servers that support tools declare tools capability during initialization.
    locator: "Capabilities"
    evidence_kind: normative
    confidence: high
  - id: moonweave-mcp-tool-call-request-taxonomy
    source: mcp-tools-2025-11-25
    supports: "Moonweave classifies tools/call as an MCPRequest subtype for navigation; this subclass edge is a taxonomy design inference."
    locator: "Calling Tools"
    evidence_kind: design-inference
    confidence: high
  - id: mcp-tools-call
    source: mcp-tools-2025-11-25
    supports: tools/call takes name and optional arguments and returns same-id content and isError result data; arguments use tool inputSchema.
    locator: "Calling Tools; Tool; Tool Result"
    evidence_kind: normative
    confidence: high
  - id: mcp-tools-name-guidance
    source: mcp-tools-2025-11-25
    supports: Tool names are unique within a server and have recommended character and length restrictions.
    locator: "Tool Names"
    evidence_kind: normative
    confidence: high
  - id: mcp-tool-user-consent
    source: mcp-specification-2025-11-25
    supports: Hosts obtain explicit user consent before invoking a tool and users retain control over actions.
    locator: "Security and Trust & Safety; Tool Safety"
    evidence_kind: normative
    confidence: high