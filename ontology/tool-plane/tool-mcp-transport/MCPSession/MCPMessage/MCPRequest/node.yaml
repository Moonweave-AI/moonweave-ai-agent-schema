schema: moonweave.ai/ontology-node/v1
id: MCPRequest
kind: concept
labels:
  zh: MCP 请求
  en: MCP request
  ja: MCPリクエスト
semantics:
  short_definition:
    zh: 期望通过相同 JSON-RPC id 获得结果或错误响应的 MCP JSON-RPC 消息。
    en: An MCP JSON-RPC message that expects a result or error response with the same id.
    ja: 同じJSON-RPC idを持つ結果またはエラーレスポンスを期待するMCP JSON-RPCメッセージ。
  definition:
    zh: >
      MCP 请求是带有 `jsonrpc: "2.0"`、id、method 和可选 params 的 JSON-RPC 请求对象。它可以由
      客户端发送到服务器，例如 `tools/list`，也可以由服务器发送到支持对应客户端能力的客户端，例如
      `sampling/createMessage`。接收方最终使用相同 id 返回一个 result 或 error 响应。
    en: >
      An MCP request is a JSON-RPC request object with `jsonrpc: "2.0"`, an id, a method,
      and optional params. A client may send one to a server, such as `tools/list`, and a
      server may send one to a client that supports the corresponding client feature, such as
      `sampling/createMessage`. The receiver ultimately returns one result or error response
      using the same id.
    ja: >
      MCPリクエストは `jsonrpc: "2.0"`、id、method、任意のparamsを持つJSON-RPCリクエスト
      オブジェクトである。クライアントは `tools/list` のようにサーバーへ送れ、サーバーは
      `sampling/createMessage` のように対応クライアント機能を持つクライアントへ送れる。受信側は
      最終的に同じidで一つのresultまたはerrorレスポンスを返す。
  why_needed:
    zh: >
      请求将一个命名的 MCP 操作与可关联、可超时和可取消的响应通道结合起来。它使双向功能能够共用
      一个消息模型，而不是将客户端操作与服务器操作误当成不同协议。
    en: >
      A request combines a named MCP operation with a correlatable response channel that can
      time out or be cancelled. It lets bidirectional features share one message model instead
      of treating client and server operations as separate protocols.
    ja: >
      リクエストは名前付きMCP操作と、相関付け、タイムアウト、取消しができるレスポンスチャネルを結ぶ。
      双方向機能が一つのメッセージモデルを共有でき、クライアント操作とサーバー操作を別プロトコルとして
      扱わずに済む。
  includes:
    - zh: 客户端到服务器的协议请求，如 `initialize`、`tools/list` 和 `resources/read`。
      en: Client-to-server protocol requests such as `initialize`, `tools/list`, and `resources/read`.
      ja: '`initialize`、`tools/list`、`resources/read` などのクライアントからサーバーへのプロトコルリクエスト。'
    - zh: 在已协商客户端能力时的服务器到客户端请求，如 `sampling/createMessage`。
      en: Server-to-client requests such as `sampling/createMessage` when client capability was negotiated.
      ja: クライアント機能が交渉済みの場合の `sampling/createMessage` などサーバーからクライアントへのリクエスト。
    - zh: 对相同 id 的一个结果或错误响应的期待。
      en: The expectation of one result or error response with the same id.
      ja: 同じidを持つ一つのresultまたはerrorレスポンスへの期待。
  excludes:
    - zh: 没有 id 且不要求响应的通知。
      en: A notification with no id and no expected response.
      ja: idを持たずレスポンスを期待しない通知。
    - zh: 对已收到请求的 result 或 error 响应。
      en: A result or error response to a request already received.
      ja: 既に受け取ったリクエストに対するresultまたはerrorレスポンス。
  semantic_kind: information
  aliases:
    - language: en
      value: JSON-RPC request
      alias_kind: synonym
engineering:
  explanation:
    zh: >
      发送方为每个未完成请求分配 id，并登记超时和取消处理。接收方根据 method 验证 params、执行或
      调度操作，然后返回 `result` 或 `error`，不得为同一个 id 发送二者。请求前还必须满足会话
      初始化和能力协商要求。
    en: >
      The sender allocates an id for each pending request and records timeout and cancellation
      handling. The receiver validates params from method, executes or schedules the operation,
      then returns either `result` or `error`, never both for the same id. A request must also
      satisfy session initialization and capability-negotiation requirements before use.
    ja: >
      送信側は各保留リクエストにidを割り当て、タイムアウトと取消し処理を記録する。受信側はmethodから
      paramsを検証し、操作を実行またはスケジュールして、同じidに対してresultまたはerrorのいずれかを
      返す。リクエストの前にセッション初期化と機能交渉の要件も満たす必要がある。
  typical_input:
    - description: Client requests a resource's contents from a server that advertised resources.
      format: |
        {
          "jsonrpc": "2.0",
          "id": "read-7",
          "method": "resources/read",
          "params": {"uri": "file:///workspace/README.md"}
        }
      source_claims: [mcp-request-json-rpc]
  typical_output:
    - description: Server returns one matching result response.
      format: |
        {
          "jsonrpc": "2.0",
          "id": "read-7",
          "result": {
            "contents": [
              {"uri": "file:///workspace/README.md", "text": "# Project"}
            ]
          }
        }
      source_claims: [mcp-request-json-rpc]
  reference_implementations:
    - name: MCP lifecycle specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
      description: Defines initialization, negotiated operation, request timeout, and cancellation behavior.
    - name: JSON-RPC 2.0 specification
      url: https://www.jsonrpc.org/specification
      description: Defines request object and response correlation rules.
structure:
  identity_keys: ["id","method"]
  fields:
    - id: jsonrpc
      labels: {zh: "JSON-RPC 版本", en: "JSON-RPC version", ja: "JSON-RPC バージョン"}
      definitions:
        zh: "MCP 包络中的原生 jsonrpc 成员，值必须为 \"2.0\"。"
        en: "The native jsonrpc envelope member; its value must be \"2.0\"."
        ja: "MCP エンベロープのネイティブな jsonrpc メンバーで、値は \"2.0\" でなければならない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2.0"
      allowed_values: ["2.0"]
      source_claims: [mcp-request-json-rpc]
    - id: id
      labels: {zh: "JSON-RPC 标识", en: "JSON-RPC id", ja: "JSON-RPC id"}
      definitions:
        zh: "原生 JSON-RPC id；请求和响应据此关联，通知省略它。"
        en: "The native JSON-RPC id; requests and responses correlate through it, while notifications omit it."
        ja: "ネイティブな JSON-RPC id。要求と応答はこれで対応付けられ、通知では省略される。"
      datatype: string-or-number-or-null
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "read-7"
      allowed_values: []
      source_claims: [json-rpc-request-response-correlation]
    - id: method
      labels: {zh: "方法", en: "Method", ja: "メソッド"}
      definitions:
        zh: "请求调用的原生 MCP 方法名。"
        en: "The native MCP method name invoked by the request."
        ja: "要求が呼び出すネイティブな MCP メソッド名。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "resources/read"
      allowed_values: []
      source_claims: [mcp-request-json-rpc]
    - id: params
      labels: {zh: "参数", en: "Parameters", ja: "パラメーター"}
      definitions:
        zh: "由 method 规定的可选原生参数对象。"
        en: "The optional native parameter object prescribed by method."
        ja: "method が定める任意のネイティブなパラメーターオブジェクト。"
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {"uri":"file:///workspace/README.md"}
      allowed_values: []
      source_claims: [mcp-request-json-rpc]
  constraints:
    - id: request-requires-id-and-method
      severity: error
      expression_language: plain
      expression: An MCP request contains a JSON-RPC id and method and is encoded as JSON-RPC version 2.0.
      explanation:
        zh: MCP 请求包含 JSON-RPC id 和 method，并以 JSON-RPC 2.0 编码。
        en: An MCP request contains a JSON-RPC id and method and is encoded as JSON-RPC version 2.0.
        ja: MCPリクエストはJSON-RPC idとmethodを含み、JSON-RPC 2.0として符号化される。
      source_claims: [mcp-request-json-rpc, json-rpc-request-response-correlation]
    - id: request-uses-negotiated-method
      severity: error
      expression_language: plain
      expression: An optional MCP request method is sent only after its necessary capability was negotiated for the session.
      explanation:
        zh: 可选 MCP 请求方法仅在本会话已协商其必要能力后发送。
        en: An optional MCP request method is sent only after its necessary capability was negotiated for the session.
        ja: 任意のMCPリクエストメソッドは、その必要機能がセッションで交渉された後にのみ送られる。
      source_claims: [mcp-request-session-operation]
  required_relations: []
examples:
  - id: mcp-request-positive-resource-read

    labels: {zh: 已协商资源读取请求, en: Negotiated resource read request, ja: 交渉済みresource読み取りリクエスト}

    descriptions:
      zh: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。
      en: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths.
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"jsonrpc":"2.0","id":"read-7","method":"resources/read","params":{"uri":"file:///workspace/README.md"}}
    related_node_ids: [MCPRequest, MCPResourceReadRequest]
    related_relation_ids: [MCPRequest-is_a-MCPMessage]

    source_claims: [mcp-request-json-rpc, mcp-request-session-operation]
  - id: mcp-request-counterexample-missing-id

    labels: {zh: 缺少 id 的伪请求, en: Pseudo-request missing id, ja: idを欠く疑似リクエスト}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"jsonrpc":"2.0","method":"tools/list","params":{}}
    related_node_ids: [MCPRequest, MCPNotification]
    related_relation_ids: [MCPRequest-is_a-MCPMessage]

    source_claims: [json-rpc-request-response-correlation]
  - id: mcp-request-boundary-server-client-request

    labels: {zh: 双向请求方向边界, en: Bidirectional request-direction boundary, ja: 双方向リクエスト方向の境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"jsonrpc":"2.0","id":27,"method":"sampling/createMessage","params":{}}
    related_node_ids: [MCPRequest, MCPSamplingRequest]
    related_relation_ids: [MCPRequest-is_a-MCPMessage]

    source_claims: [mcp-request-session-operation]
  - id: mcp-request-instance-read-7

    labels: {zh: read-7 请求实例, en: read-7 request instance, ja: read-7リクエストインスタンス}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"jsonrpc":"2.0","id":"read-7","method":"resources/read","params":{"uri":"file:///workspace/README.md"}}
    related_node_ids: [MCPRequest, MCPResourceReadRequest]
    related_relation_ids: [MCPRequest-is_a-MCPMessage]

    source_claims: [mcp-request-json-rpc]
parent_relation:
  id: MCPRequest-is_a-MCPMessage
  predicate: is_a
  target: concept:MCPMessage
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是请求消息, en: is a request message, ja: リクエストメッセージである}
  definition:
    zh: MCP 请求是带 id 且期望匹配响应的 MCP 消息。
    en: An MCP request is an MCP message with an id that expects a matching response.
    ja: MCPリクエストはidを持ち対応するレスポンスを期待するMCPメッセージである。
  cardinality:
    source: {min: 0, max: null}
    target: {min: 1, max: 1}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_request_message
    labels: {zh: 具有请求消息, en: has request message, ja: リクエストメッセージを持つ}
  conditions: []
  temporal_scope: session
  boundary_context: 一个请求实例只有在其 id 关联到预期响应的会话期间才有未完成语义。
  constraints:
    - id: request-subtype-discriminator
      severity: error
      expression_language: plain
      expression: An MCPRequest has both an id and method unlike a notification and unlike a response.
      explanation:
        zh: MCPRequest 同时具有 id 和 method，这不同于通知也不同于响应。
        en: An MCPRequest has both an id and method unlike a notification and unlike a response.
        ja: MCPRequestは通知ともレスポンスとも異なりidとmethodの両方を持つ。
      source_claims: [json-rpc-request-response-correlation]
  examples: []
  source_claims: [moonweave-mcp-request-taxonomy]
  distinct_fact_rationale:
    zh: 此专门化由 id、method 和匹配响应的预期区分，而非具体 MCP 方法。
    en: This specialization is distinguished by id, method, and expectation of a matching response, not by one specific MCP method.
    ja: この特殊化は特定のMCPメソッドではなく、id、method、対応レスポンスへの期待により区別される。
relations: []
sources:
  - id: mcp-lifecycle-2025-11-25
    title: Model Context Protocol Specification — Lifecycle
    url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
    source_type: official-specification
    locator: "Initialization; Operation; Timeouts"
    relevance: Defines operation after negotiation and request timeout/cancellation guidance.
  - id: json-rpc-2-0
    title: JSON-RPC 2.0 Specification
    url: https://www.jsonrpc.org/specification
    source_type: official-specification
    locator: "Request object; Response object; Notification"
    relevance: Defines request id, method, params, response correlation, and notification distinction.
source_claims:
  - id: mcp-request-json-rpc
    source: json-rpc-2-0
    supports: A JSON-RPC request has jsonrpc id method and optional params and receives a correlated response.
    locator: "Request object; Response object"
    evidence_kind: normative
    confidence: high
  - id: moonweave-mcp-request-taxonomy
    source: json-rpc-2-0
    supports: "Moonweave classifies a JSON-RPC request envelope used by MCP as an MCPMessage for navigation; this subclass edge is a taxonomy design inference."
    locator: "4 Request Object"
    evidence_kind: design-inference
    confidence: high
  - id: json-rpc-request-response-correlation
    source: json-rpc-2-0
    supports: Requests and responses share id while notifications omit id and do not receive responses.
    locator: "Request object; Response object; Notification"
    evidence_kind: normative
    confidence: high
  - id: mcp-request-session-operation
    source: mcp-lifecycle-2025-11-25
    supports: Optional protocol features may be used only after successful session capability negotiation and requests should have timeouts.
    locator: "Operation; Timeouts"
    evidence_kind: normative
    confidence: high
