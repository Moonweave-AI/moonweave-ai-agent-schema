schema: moonweave.ai/ontology-node/v1
id: MCPRequest
kind: concept
status: review
labels:
  zh: MCP 请求
  en: MCP request
  ja: MCP 要求
semantics:
  short_definition:
    zh: 带请求 id、method 与可选 params，并要求一个关联响应的 MCP 消息。
    en: An MCP message with request id, method, optional params, and one required correlated response.
    ja: request id、method、任意 params を持ち、対応応答を要求する MCP message。
  definition:
    zh: MCP 请求是 MCPMessage 的严格下位类型，继承 MCPMessage 的 message_record_id 作为线路消息记录身份。request_id 只是同一会话内关联响应、取消与进度的协议标识，method 与可选 params 给出请求载荷；请求方不得在同一会话复用 request_id，且该关联标识不创建第二条本体身份。
    en: An MCP request is a strict MCPMessage subtype and inherits the message_record_id wire-record identity from MCPMessage. request_id is only the protocol correlation value for the response, cancellation, and progress within one session, while method and optional params form the request payload. The requestor must not reuse request_id in that session, and the correlation value does not create a second ontology identity.
    ja: MCP request は MCPMessage の厳密な下位型で、MCPMessage から wire record の identity である message_record_id を継承します。request_id は同一 session 内の response・cancellation・progress を結ぶ protocol correlation 値にすぎず、method と任意 params が request payload を与えます。request_id は再利用できず、別の ontology identity を作りません。
  why_needed:
    zh: 请求身份支撑超时、取消、进度和响应关联；若与通知混淆，系统会等待不存在的响应或丢失错误归属。
    en: Request identity supports timeout, cancellation, progress, and response correlation; confusing it with notifications causes waits for nonexistent responses or lost error attribution.
    ja: request 同一性は timeout・cancel・progress・response 相関を支え、notification と混同すると存在しない応答待ちや error 帰属喪失を招きます。
  includes:
    - zh: 纳入 schema 合法、具有 RequestId 与 method、预期 result/error 响应的双向 MCP 请求。
      en: Includes schema-valid bidirectional MCP requests with RequestId and method that expect a result or error response.
      ja: schema 適合で RequestId と method を持ち、result/error 応答を期待する双方向 MCP request を含みます。
  excludes:
    - zh: 排除无 id 的通知、只有 id 与 result/error 的响应以及 transport 层 HTTP 请求。
      en: Excludes id-less notifications, responses containing id plus result/error, and transport-level HTTP requests.
      ja: id のない notification、id と result/error の response、transport-level HTTP request を除きます。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: request_id
      labels:
        zh: 请求标识
        en: request ID
        ja: request ID
      datatype: string-or-integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 映射 wire 字段 id，用于把请求与一个 result 或 error 响应相关联；不得为 null。
        en: Maps to the wire id and correlates the request with one result or error response; it cannot be null.
        ja: wire id に対応し request と一 result/error response を相関し null にはできません。
      allowed_values: []
      pattern: null
      example_value: 41
      source_claims:
        - claim-mcp-request-002
    - id: method
      labels:
        zh: 协议方法
        en: protocol method
        ja: protocol method
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 要执行的 MCP 方法名；具体下位请求通过固定 allowed_values 收窄该字段。
        en: The MCP method to execute; concrete request subtypes narrow this field with a fixed allowed_values discriminator.
        ja: 実行する MCP method 名で concrete request subtype は fixed allowed_values discriminator で絞ります。
      allowed_values: []
      pattern: null
      example_value: tools/list
      source_claims:
        - claim-mcp-request-003
    - id: params
      labels:
        zh: 方法参数
        en: method parameters
        ja: method parameter
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 可选的结构化方法参数对象；每个具体方法决定其属性合同，参数不能替代 method 或 request_id。
        en: Optional structured method parameters whose property contract is determined by the concrete method; params cannot replace method or request_id.
        ja: concrete method が property contract を決める optional structured parameter object で method や request_id を置換しません。
      allowed_values: []
      pattern: null
      example_value: {}
      source_claims:
        - claim-mcp-request-004
  constraints:
    - id: mcp-request-session-id-uniqueness
      severity: error
      expression_language: plain
      expression: Within one active MCPSession, request_id MUST be unique among outstanding MCPRequest records and MUST NOT be null.
      explanations:
        zh: 同一活动会话中，未完成请求的 request_id 必须唯一且不得为 null。
        en: Within one active session, outstanding request IDs must be unique and non-null.
        ja: 同一 active session で outstanding request_id は一意かつ non-null でなければなりません。
      source_claims:
        - claim-mcp-request-005
  required_relation_constraints: []
examples:
  - id: mcp-request-positive-tools-list
    kind: positive
    labels:
      zh: 带 id 的 tools/list
      en: tools/list with an id
      ja: id 付き tools/list
    scenario_id: null
    descriptions:
      zh: 客户端发送 `{"jsonrpc":"2.0","id":41,"method":"tools/list","params":{}}` 并为 id 41 启动超时。
      en: The client sends `{"jsonrpc":"2.0","id":41,"method":"tools/list","params":{}}` and starts a timeout for id 41.
      ja: client が `{"jsonrpc":"2.0","id":41,"method":"tools/list","params":{}}` を送り、id 41 の timeout を開始します。
    field_values:
      message_record_id: mcp-message:tools-list:41
      session_id: mcp-session-s-42
      jsonrpc: "2.0"
      message_kind: request
      request_id: 41
      method: tools/list
      params: {}
    related_node_ids:
      - MCPRequest
      - MCPToolList
      - MCPMessage
    related_relation_ids:
      - MCPRequest-is_a-MCPMessage
    expected_result:
      zh: 请求与随后 id 41 的 result/error 关联。
      en: The request correlates with the later result or error carrying id 41.
      ja: request は後の id 41 の result/error と相関します。
    why_valid_or_invalid:
      zh: id、method 与预期响应三项均满足请求定义。
      en: Its id, method, and expected response satisfy the request definition.
      ja: id、method、期待応答が request 定義を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-request-001
  - id: mcp-request-boundary-initialized-notification
    kind: boundary
    labels:
      zh: initialized 无 id
      en: initialized without id
      ja: id のない initialized
    scenario_id: null
    descriptions:
      zh: 客户端发送 `{"jsonrpc":"2.0","method":"notifications/initialized"}`，协议不要求服务器回复。
      en: The client sends `{"jsonrpc":"2.0","method":"notifications/initialized"}` and the protocol expects no server response.
      ja: client が `{"jsonrpc":"2.0","method":"notifications/initialized"}` を送り、server 応答は要求されません。
    field_values:
      jsonrpc: "2.0"
      method: notifications/initialized
    related_node_ids:
      - MCPRequest
      - MCPNotification
      - MCPMessage
    related_relation_ids:
      - MCPNotification-is_a-MCPMessage
    expected_result:
      zh: 对象归为 MCPNotification，不归为 MCPRequest。
      en: The object is MCPNotification, not MCPRequest.
      ja: object は MCPNotification で、MCPRequest ではありません。
    why_valid_or_invalid:
      zh: 没有 RequestId 且无需关联响应。
      en: It has no RequestId and requires no correlated response.
      ja: RequestId がなく、対応応答を要求しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-request-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: MCPResponse
    shared_parent_concept_id: MCPMessage
    differentia:
      zh: MCPRequest 与 MCPResponse 同属 MCPMessage；MCPRequest 带 id 和 method 并要求响应；MCPResponse 以同 id 带 result 或 error 且无 method；MCPNotification 带 method 但无 id、也无响应。
      en: MCPRequest and MCPResponse share MCPMessage; MCPRequest has id and method and requires a response; MCPResponse has the same id with result or error and no method; MCPNotification has method but no id and receives no response.
      ja: MCPRequest と MCPResponse は MCPMessage を共有し、MCPRequest は id/method と応答義務、MCPResponse は同 id と result/error で method 無し、MCPNotification は method 有り id/応答無しです。
    source_claims:
      - claim-mcp-request-006
  - sibling_concept_id: MCPNotification
    shared_parent_concept_id: MCPMessage
    differentia:
      zh: MCPRequest 与 MCPNotification 同属 MCPMessage；MCPRequest 带 id 和 method 并要求响应；MCPResponse 以同 id 带 result 或 error 且无 method；MCPNotification 带 method 但无 id、也无响应。
      en: MCPRequest and MCPNotification share MCPMessage; MCPRequest has id and method and requires a response; MCPResponse has the same id with result or error and no method; MCPNotification has method but no id and receives no response.
      ja: MCPRequest と MCPNotification は MCPMessage を共有し、MCPRequest は id/method と応答義務、MCPResponse は同 id と result/error で method 無し、MCPNotification は method 有り id/応答無しです。
    source_claims:
      - claim-mcp-request-007
parent_relation:
  id: MCPRequest-is_a-MCPMessage
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: MCPRequest是一种MCPMessage
    en: MCPRequest is a MCPMessage
    ja: MCPRequestがMCPMessageを一種である
  definitions:
    zh: MCPRequest 是 MCPMessage 的严格子型；其必要身份差异是：MCP 请求是一种 MCP 消息（MCPMessage），包含非空字符串或整数 RequestId、method 与可选 params，并要求接收方以同一 id 返回一个结果响应或错误响应；请求方在同一会话中不得复用 id，它与无 id 的通知严格区分。
    en: "MCPRequest is a strict subtype of MCPMessage; its necessary identity differentia is: An MCP request is an MCPMessage with a non-null string or integer RequestId, a method, optional params, and exactly one correlated result or error response using the same id. The requestor must not reuse an id within the same session, and requests remain distinct from notifications without an id."
    ja: MCPRequest は MCPMessage の strict subtype であり、必要な identity differentia は次の通りです：MCP request は MCPMessage の一種で non-null string/integer RequestId・method・任意 params を持ち、同 id の result/error response 一件を要求します。requestor は同一 session 内で id を再利用せず id 無し notification と区別します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
    en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
    ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: MCPMessage反向关联MCPRequest
      en: MCPMessage is the inverse target of MCPRequest
      ja: MCPMessageからMCPRequestへの逆読解
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MCPRequest-is_a-MCPMessage-example-positive-001
      kind: positive
      labels:
        zh: MCPRequest-is_a-MCPMessage 正例
        en: Positive case for MCPRequest-is_a-MCPMessage
        ja: MCPRequest-is_a-MCPMessage の正例
      scenario_id: null
      descriptions:
        zh: 客户端发送 `{"jsonrpc":"2.0","id":41,"method":"tools/list","params":{}}` 并为 id 41 启动超时。
        en: The client sends `{"jsonrpc":"2.0","id":41,"method":"tools/list","params":{}}` and starts a timeout for id 41.
        ja: client が `{"jsonrpc":"2.0","id":41,"method":"tools/list","params":{}}` を送り、id 41 の timeout を開始します。
      field_values: {}
      related_node_ids:
        - MCPRequest
        - MCPMessage
      related_relation_ids:
        - MCPRequest-is_a-MCPMessage
      expected_result:
        zh: 建立 MCPRequest-is_a-MCPMessage，并保留所述协议方向与条件。
        en: Assert MCPRequest-is_a-MCPMessage with the stated protocol direction and conditions.
        ja: MCPRequest-is_a-MCPMessage を stated protocol direction/condition 付きで確立します。
      why_valid_or_invalid:
        zh: 仅当对象满足 MCPRequest 的全部身份条件时，才能沿 is_a 归入 MCPMessage。
        en: Assert the subtype edge only when the object satisfies every identity condition of MCPRequest.
        ja: object が MCPRequest の全 identity condition を満たす時だけ is_a edge を確立します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-mcp-request-008
    - id: MCPRequest-is_a-MCPMessage-example-boundary-001
      kind: boundary
      labels:
        zh: MCPRequest-is_a-MCPMessage 边界例
        en: Boundary case for MCPRequest-is_a-MCPMessage
        ja: MCPRequest-is_a-MCPMessage の境界例
      scenario_id: null
      descriptions:
        zh: 客户端发送 `{"jsonrpc":"2.0","method":"notifications/initialized"}`，协议不要求服务器回复。
        en: The client sends `{"jsonrpc":"2.0","method":"notifications/initialized"}` and the protocol expects no server response.
        ja: client が `{"jsonrpc":"2.0","method":"notifications/initialized"}` を送り、server 応答は要求されません。
      field_values: {}
      related_node_ids:
        - MCPRequest
        - MCPMessage
      related_relation_ids:
        - MCPRequest-is_a-MCPMessage
      expected_result:
        zh: 不得建立 MCPRequest-is_a-MCPMessage；保留实际出现的较宽或相邻事实。
        en: Do not assert MCPRequest-is_a-MCPMessage; retain the broader or adjacent fact actually present.
        ja: MCPRequest-is_a-MCPMessage を確立せず、実際の broader/adjacent fact を保持します。
      why_valid_or_invalid:
        zh: MCPRequest 的边界例缺少该子型所需的 method、方向、载荷或状态，不能凭共享词汇归入该子型。
        en: The MCPRequest boundary case lacks the method, direction, payload, or state required by the subtype and cannot be classified through shared vocabulary.
        ja: MCPRequest boundary case は subtype に必要な method・direction・payload・state を欠き、shared vocabulary だけで分類できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-mcp-request-008
  source_claims:
    - claim-mcp-request-008
  distinct_fact_rationale:
    zh: MCPRequest-is_a-MCPMessage 只在其方法、方向、载荷或类型条件成立时记录；它不等于端点共现、反向捷径或词形相似。
    en: MCPRequest-is_a-MCPMessage records only the reviewed method, direction, payload, or subtype condition; it is not endpoint co-occurrence, a redundant inverse shortcut, or lexical similarity.
    ja: MCPRequest-is_a-MCPMessage は reviewed method・direction・payload・subtype condition のみを記録し、endpoint 共起・redundant inverse shortcut・lexical similarity ではありません。
