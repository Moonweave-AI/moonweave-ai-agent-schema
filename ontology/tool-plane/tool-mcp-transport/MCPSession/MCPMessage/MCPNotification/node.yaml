schema: moonweave.ai/ontology-node/v1
id: MCPNotification
kind: concept
labels:
  zh: MCP 通知
  en: MCP notification
  ja: MCP 通知
semantics:
  short_definition:
    zh: 不带 JSON-RPC id、发送方不期待响应的单向 MCP 消息。
    en: A one-way MCP message without a JSON-RPC id for which the sender does not expect a response.
    ja: JSON-RPC id を持たず、送信者が応答を期待しない一方向 MCP メッセージ。
  definition:
    zh: >
      MCP 通知是 JSON-RPC notification 形式的 MCPMessage：它包含 method 和可选 params，但不含 id，因此接收方不返回 JSON-RPC response。
      MCP 使用通知宣布 initialized、资源列表变化、资源更新、进度和其他事件。通知不等于 request 的无响应超时，也不等于 server 的 HTTP 状态响应。
    en: >
      An MCP notification is an MCPMessage in JSON-RPC notification form: it contains a method and optional params but no id,
      so the receiver does not return a JSON-RPC response. MCP uses notifications for initialized, resource-list changes, resource
      updates, progress, and other events. A notification is not a request that timed out without a response or a server's HTTP status response.
    ja: >
      MCP 通知は JSON-RPC notification 形式の MCPMessage である。method と任意 params を持つが id を持たないため、受信者は
      JSON-RPC response を返さない。MCP は initialized、リソース一覧変更、リソース更新、進捗、その他のイベントに通知を使う。
      通知は応答がタイムアウトした要求や server の HTTP status response ではない。
  why_needed:
    zh: 它允许一方通报事件而不持有请求关联、响应状态或往返等待成本。
    en: It lets one party report an event without retaining request correlation, response state, or round-trip waiting cost.
    ja: 要求相関、応答状態、往復待機コストを保持せずに、一方がイベントを報告できる。
  includes:
    - {zh: method 和可选 params, en: A method and optional params, ja: method と任意 params}
    -
      zh: 初始化完成、资源变化和进度事件
      en: Initialization-complete, resource-change, and progress events
      ja: 初期化完了、リソース変更、進捗イベント
  excludes:
    - {zh: 具有 id 并期待 response 的请求, en: A request with an id that expects a response, ja: id を持ち response を期待する要求}
    - {zh: JSON-RPC 错误或成功响应, en: A JSON-RPC error or success response, ja: JSON-RPC エラーまたは成功応答}
  semantic_kind: message
  aliases:
    - {language: en, value: JSON-RPC notification, alias_kind: synonym}
engineering:
  explanation:
    zh: 发送方构造 jsonrpc、method 和可选 params，省略 id；接收方处理该事件但不得为它发送 JSON-RPC 响应。通知只应在相关功能已协商时发送。
    en: The sender constructs jsonrpc, method, and optional params and omits id; the receiver handles the event but must not send a JSON-RPC response for it. A notification is sent only when its relevant feature was negotiated.
    ja: 送信者は jsonrpc、method、任意 params を構成して id を省略し、受信者はイベントを処理するが JSON-RPC response を返してはならない。関連機能が交渉済みの場合のみ通知を送る。
  typical_input:
    - description: A server-to-client resource list change notification.
      format: '{"jsonrpc":"2.0","method":"notifications/resources/list_changed"}'
      source_claims: [mcp-notification-resource-list]
  typical_output:
    - description: No JSON-RPC response is produced for a notification.
      format: 'No JSON-RPC response'
      source_claims: [jsonrpc-notification]
  reference_implementations:
    - name: JSON-RPC 2.0 Specification
      url: https://www.jsonrpc.org/specification
      description: Defines notifications as request objects without id for which a response is not returned.
structure:
  identity_keys: ["method"]
  fields:
    - id: jsonrpc
      labels: {zh: "JSON-RPC 版本", en: "JSON-RPC version", ja: "JSON-RPC バージョン"}
      definitions:
        zh: "MCP 包络中的原生 jsonrpc 成员，值必须为 \"2.0\"。"
        en: "The native jsonrpc envelope member; its value must be \"2.0\"."
        ja: "MCP エンベロープのネイティブな jsonrpc メンバーで、値は \"2.0\" でなければならない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2.0"
      allowed_values: ["2.0"]
      source_claims: [jsonrpc-notification]
    - id: method
      labels: {zh: "方法", en: "Method", ja: "メソッド"}
      definitions:
        zh: "通知事件类型的原生 JSON-RPC method 成员。"
        en: "The native JSON-RPC method member identifying the notification event type."
        ja: "通知イベント種別を識別するネイティブな JSON-RPC method メンバー。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "notifications/initialized"
      allowed_values: []
      source_claims: [jsonrpc-notification, mcp-notification-initialized]
    - id: params
      labels: {zh: "参数", en: "Parameters", ja: "パラメーター"}
      definitions:
        zh: "事件需要数据时携带的可选原生 params 对象。"
        en: "The optional native params object carried when an event needs data."
        ja: "イベントにデータが必要な場合に運ばれる任意のネイティブな params オブジェクト。"
      datatype: object
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: {"uri":"file:///project/src/main.rs"}
      allowed_values: []
      source_claims: [mcp-notification-resource-update]
  constraints:
    - id: notification-has-no-id-or-response
      severity: error
      expression_language: plain
      expression: A notification omits JSON-RPC id and the receiver must not reply with a JSON-RPC response.
      explanation:
        zh: 通知省略 JSON-RPC id，接收方不得以 JSON-RPC response 回复。
        en: A notification omits JSON-RPC id and the receiver must not reply with a JSON-RPC response.
        ja: 通知は JSON-RPC id を省略し、受信者は JSON-RPC response を返してはならない。
      source_claims: [jsonrpc-notification]
    - id: notification-feature-negotiated
      severity: error
      expression_language: plain
      expression: A feature-specific MCP notification is sent only when the relevant feature or sub-capability has been negotiated.
      explanation:
        zh: 仅当相关 feature 或子 capability 已协商时，才发送特定功能的 MCP 通知。
        en: A feature-specific MCP notification is sent only when the relevant feature or sub-capability has been negotiated.
        ja: 機能固有 MCP 通知は関連 feature または sub-capability が交渉済みの場合にのみ送る。
      source_claims: [mcp-notification-capability]
  required_relations: []
examples:
  - id: mcp-notification-positive-initialized

    labels: {zh: 客户端已初始化通知, en: Client initialized notification, ja: client initialized 通知}

    descriptions:
      zh: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。"
      en: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths."
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"jsonrpc":"2.0","method":"notifications/initialized"}
    related_node_ids: [MCPNotification, MCPSession]
    related_relation_ids: [MCPNotification-is_a-MCPMessage]

    source_claims: [mcp-notification-initialized, jsonrpc-notification]
  - id: mcp-notification-counterexample-with-id

    labels: {zh: 带 id 的通知, en: Notification carrying an id, ja: id を持つ通知}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"jsonrpc":"2.0","id":7,"method":"notifications/resources/updated","params":{"uri":"file:///project/src/main.rs"}}
    related_node_ids: [MCPNotification, MCPRequest]
    related_relation_ids: [MCPNotification-is_a-MCPMessage]

    source_claims: [jsonrpc-notification]
  - id: mcp-notification-boundary-response-timeout

    labels: {zh: 通知与超时请求的边界, en: Boundary between notification and timed-out request, ja: 通知とタイムアウト要求の境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"jsonrpc":"2.0","method":"resources/read","params":{"uri":"file:///project/src/main.rs"}}
    related_node_ids: [MCPNotification, MCPRequest]
    related_relation_ids: [MCPNotification-is_a-MCPMessage]

    source_claims: [jsonrpc-notification, mcp-notification-timeout]
  - id: mcp-notification-instance-resource-list-changed

    labels: {zh: 资源列表变化实例, en: Resource-list-changed instance, ja: リソース一覧変更実例}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"jsonrpc":"2.0","method":"notifications/resources/list_changed"}
    related_node_ids: [MCPNotification, MCPServerCapability, MCPClient]
    related_relation_ids: [MCPNotification-is_a-MCPMessage]

    source_claims: [mcp-notification-resource-list, mcp-notification-capability]
parent_relation:
  id: MCPNotification-is_a-MCPMessage
  predicate: is_a
  target: concept:MCPMessage
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是 MCP 消息的通知子类, en: is the notification subtype of MCP message, ja: MCP メッセージの通知下位型である}
  definition:
    zh: MCP 通知是无 id、无 JSON-RPC 响应期待的 MCP 消息。
    en: An MCP notification is an MCP message with no id and no expectation of a JSON-RPC response.
    ja: MCP 通知は id がなく JSON-RPC response を期待しない MCP メッセージである。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_notification_subtype
    labels: {zh: 具有通知子类, en: has notification subtype, ja: 通知下位型を持つ}
  conditions: []
  temporal_scope: message
  boundary_context: 该层级表达 JSON-RPC 无响应通知形式，不包括通知内容所指的资源、功能能力或 UI 事件。
  constraints:
    - id: notification-subtype-omits-id
      severity: error
      expression_language: plain
      expression: An MCPNotification is a JSON-RPC notification and therefore omits id.
      explanation:
        zh: MCPNotification 是 JSON-RPC notification，因而省略 id。
        en: An MCPNotification is a JSON-RPC notification and therefore omits id.
        ja: MCPNotification は JSON-RPC notification であり、したがって id を省略する。
      source_claims: [jsonrpc-notification]
  examples: []
  source_claims: [moonweave-mcp-notification-taxonomy]
  distinct_fact_rationale:
    zh: 该子类由无 id 和无 response 期待区分，不由 method 名称或单向业务事件区分。
    en: The subtype is distinguished by no id and no expected response, not a method name or one-way business event alone.
    ja: この下位型は method 名または一方向業務イベントだけではなく、id と期待応答がないことで区別される。
relations: []
sources:
  - id: json-rpc-2-0
    title: JSON-RPC 2.0 Specification
    url: https://www.jsonrpc.org/specification
    source_type: official-specification
    locator: "Notification"
    relevance: Defines a notification as a request object without an id for which a response is not returned.
  - id: mcp-lifecycle-2025-11-25
    title: Model Context Protocol Specification — Lifecycle
    url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
    source_type: official-specification
    locator: "Initialization; Timeouts"
    relevance: Defines notifications/initialized and request timeout behavior.
  - id: mcp-resources-2025-11-25
    title: Model Context Protocol Specification — Resources
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
    source_type: official-specification
    locator: "Capabilities; List Changed Notification; Subscriptions"
    relevance: Defines resources listChanged and resource-updated notifications and their capability conditions.
source_claims:
  - id: jsonrpc-notification
    source: json-rpc-2-0
    supports: A JSON-RPC notification is a request object without id and a response object must not be returned for it.
    locator: "Notification"
    evidence_kind: normative
    confidence: high
  - id: moonweave-mcp-notification-taxonomy
    source: json-rpc-2-0
    supports: "Moonweave classifies a JSON-RPC notification carried by MCP as an MCPMessage for navigation; this subclass edge is a taxonomy design inference."
    locator: "4.1 Notification"
    evidence_kind: design-inference
    confidence: high
  - id: mcp-notification-initialized
    source: mcp-lifecycle-2025-11-25
    supports: After successful initialization the client sends notifications/initialized to indicate readiness for normal operations.
    locator: "Initialization"
    evidence_kind: normative
    confidence: high
  - id: mcp-notification-timeout
    source: mcp-lifecycle-2025-11-25
    supports: Request timeout is handled as a timed-out request and may result in cancellation notification rather than changing the original request type.
    locator: "Timeouts"
    evidence_kind: normative
    confidence: high
  - id: mcp-notification-capability
    source: mcp-resources-2025-11-25
    supports: Resource list-change and subscription update notification features are enabled by the server resources capability subfeatures.
    locator: "Capabilities; List Changed Notification; Subscriptions"
    evidence_kind: normative
    confidence: high
  - id: mcp-notification-resource-list
    source: mcp-resources-2025-11-25
    supports: Servers declaring resources.listChanged should send notifications/resources/list_changed when resource list changes.
    locator: "List Changed Notification"
    evidence_kind: normative
    confidence: high
  - id: mcp-notification-resource-update
    source: mcp-resources-2025-11-25
    supports: Resource update notifications use notifications/resources/updated with the resource URI parameter.
    locator: "Subscriptions"
    evidence_kind: normative
    confidence: high