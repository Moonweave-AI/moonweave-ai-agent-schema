        ja: MCPNotification-is_a-MCPMessage を確立せず、実際の broader/adjacent fact を保持します。
      why_valid_or_invalid:
        zh: MCPNotification 的边界例缺少该子型所需的 method、方向、载荷或状态，不能凭共享词汇归入该子型。
