schema: moonweave.ai/ontology-node/v1
id: MCPNotification
kind: concept
status: review
labels:
  zh: MCP 通知
  en: MCP notification
  ja: MCP 通知
semantics:
  short_definition:
    zh: 带 method 但不带请求 id、无需关联响应的 MCP 消息。
    en: An MCP message with method but no request id and no correlated response.
    ja: method を持つが request id を持たず、対応応答を要しない MCP message。
  definition:
    zh: "MCP 通知是一种 MCP 消息（MCPMessage），包含 `jsonrpc: \"2.0\"`、method 与可选 params，但不带 RequestId 且接收方不得返回响应；它可双向发送，只有具体通知子型才能规定发送方向、能力前提或订阅关联。"
    en: An MCP notification is an MCPMessage with jsonrpc 2.0, a method, optional params, no RequestId, and no response from the receiver. Notifications can travel in either direction; only a concrete notification subtype can establish sender direction, capability preconditions, or subscription association.
    ja: MCP notification は MCPMessage の一種で jsonrpc 2.0・method・任意 params を持ち RequestId と応答を持ちません。双方向に送れ、sender direction・capability prerequisite・subscription association は具体 subtype だけが定めます。
  why_needed:
    zh: 通知身份避免为单向事件建立虚假等待状态，并使 list_changed、updated、progress 等方法的发送方与前置能力可验证。
    en: Notification identity prevents false response waits and makes sender direction and prerequisite capabilities testable for list_changed, updated, progress, and similar methods.
    ja: notification 同一性は不要な応答待ちを防ぎ、list_changed・updated・progress 等の送信方向と前提能力を検証可能にします。
  includes:
    - zh: 纳入 schema 合法、无 RequestId 且不要求响应的客户端到服务器或服务器到客户端通知。
      en: Includes schema-valid client-to-server or server-to-client notifications with no RequestId and no expected response.
      ja: schema 適合で RequestId と期待応答を持たない client→server または server→client notification を含みます。
  excludes:
    - zh: 排除带 id 并要求响应的请求、只有 result/error 的响应以及 SSE 传输层事件名。
      en: Excludes requests with ids, result/error responses, and SSE transport event names.
      ja: id 付き request、result/error response、SSE transport event name を除きます。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - message_record_id
  fields:
    - id: method
      labels:
        zh: 通知方法
        en: notification method
        ja: notification method
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录通知的 MCP 方法名；通知不得同时出现 request_id。
        en: Records the MCP notification method; a notification must not also carry a request_id.
        ja: MCP notification method を記録し、notification は request_id を同時に持ちません。
      allowed_values: []
      pattern: null
      example_value: notifications/resources/updated
      source_claims:
        - claim-mcp-notification-002
    - id: params
      labels:
        zh: 通知参数
        en: notification params
        ja: notification params
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 保存具体通知方法定义的可选参数对象。
        en: Stores the optional parameter object defined by the concrete notification method.
        ja: concrete notification method が定義する optional params object を保存します。
      allowed_values: []
      pattern: null
      example_value:
        uri: file:///project/src/main.rs
      source_claims:
        - claim-mcp-notification-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: mcp-notification-positive-resource-updated
    kind: positive
    labels:
      zh: 资源更新通知
      en: Resource updated notification
      ja: リソース更新 notification
    scenario_id: null
    descriptions:
      zh: 服务器发送 `notifications/resources/updated`，params 含已订阅 URI，消息没有 id。
      en: The server sends `notifications/resources/updated` with the subscribed URI in params and no id.
      ja: server が購読 URI を params に入れた `notifications/resources/updated` を id なしで送ります。
    field_values:
      message_record_id: mcp-message:resource-updated:18
      session_id: mcp-session-s-42
      jsonrpc: "2.0"
      message_kind: notification
      method: notifications/resources/updated
      params:
        uri: file:///project/src/main.rs
    related_node_ids:
      - MCPNotification
      - ResourceSubscription
      - MCPMessage
    related_relation_ids:
      - MCPNotification-is_a-MCPMessage
    expected_result:
      zh: 客户端处理更新事件但不发送 JSON‑RPC 响应。
      en: The client handles the update event without sending a JSON-RPC response.
      ja: client は更新 event を処理し JSON-RPC response を返しません。
    why_valid_or_invalid:
      zh: 具体 method 是单向通知，且消息不存在 RequestId。
      en: The concrete method is one-way and the message has no RequestId.
      ja: 具体 method は一方向で、message に RequestId がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-notification-001
  - id: mcp-notification-boundary-roots-list-request
    kind: boundary
    labels:
      zh: 带 id 的 roots/list
      en: roots/list with id
      ja: id 付き roots/list
    scenario_id: null
    descriptions:
      zh: 服务器发送 `{"id":9,"method":"roots/list"}` 并等待客户端返回 roots。
      en: The server sends `{"id":9,"method":"roots/list"}` and waits for the client to return roots.
      ja: server が `{"id":9,"method":"roots/list"}` を送り、client の roots 応答を待ちます。
    field_values:
      id: 9
      method: roots/list
    related_node_ids:
      - MCPNotification
      - MCPRequest
      - MCPRootList
    related_relation_ids: []
    expected_result:
      zh: 对象归为 MCPRequest，不归为 MCPNotification。
      en: The object is MCPRequest, not MCPNotification.
      ja: object は MCPRequest で、MCPNotification ではありません。
    why_valid_or_invalid:
      zh: RequestId 与预期响应使其具备请求身份。
      en: The RequestId and expected response give it request identity.
      ja: RequestId と期待応答により request 同一性を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-notification-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: MCPRequest
    shared_parent_concept_id: MCPMessage
    differentia:
      zh: MCPNotification 与 MCPRequest 同属 MCPMessage；MCPRequest 带 id 和 method 并要求响应；MCPResponse 以同 id 带 result 或 error 且无 method；MCPNotification 带 method 但无 id、也无响应。
      en: MCPNotification and MCPRequest share MCPMessage; MCPRequest has id and method and requires a response; MCPResponse has the same id with result or error and no method; MCPNotification has method but no id and receives no response.
      ja: MCPNotification と MCPRequest は MCPMessage を共有し、MCPRequest は id/method と応答義務、MCPResponse は同 id と result/error で method 無し、MCPNotification は method 有り id/応答無しです。
    source_claims:
      - claim-mcp-notification-004
  - sibling_concept_id: MCPResponse
    shared_parent_concept_id: MCPMessage
    differentia:
      zh: MCPNotification 与 MCPResponse 同属 MCPMessage；MCPRequest 带 id 和 method 并要求响应；MCPResponse 以同 id 带 result 或 error 且无 method；MCPNotification 带 method 但无 id、也无响应。
      en: MCPNotification and MCPResponse share MCPMessage; MCPRequest has id and method and requires a response; MCPResponse has the same id with result or error and no method; MCPNotification has method but no id and receives no response.
      ja: MCPNotification と MCPResponse は MCPMessage を共有し、MCPRequest は id/method と応答義務、MCPResponse は同 id と result/error で method 無し、MCPNotification は method 有り id/応答無しです。
    source_claims:
      - claim-mcp-notification-005
parent_relation:
  id: MCPNotification-is_a-MCPMessage
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: MCPNotification是一种MCPMessage
    en: MCPNotification is a MCPMessage
    ja: MCPNotificationがMCPMessageを一種である
  definitions:
    zh: "MCPNotification 是 MCPMessage 的严格子型；其必要身份差异是：MCP 通知是一种 MCP 消息（MCPMessage），包含 `jsonrpc: \"2.0\"`、method 与可选 params，但不带 RequestId 且接收方不得返回响应；它可双向发送，只有具体通知子型才能规定发送方向、能力前提或订阅关联。"
    en: "MCPNotification is a strict subtype of MCPMessage; its necessary identity differentia is: An MCP notification is an MCPMessage with jsonrpc 2.0, a method, optional params, no RequestId, and no response from the receiver. Notifications can travel in either direction; only a concrete notification subtype can establish sender direction, capability preconditions, or subscription association."
    ja: MCPNotification は MCPMessage の strict subtype であり、必要な identity differentia は次の通りです：MCP notification は MCPMessage の一種で jsonrpc 2.0・method・任意 params を持ち RequestId と応答を持ちません。双方向に送れ、sender direction・capability prerequisite・subscription association は具体 subtype だけが定めます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
    en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
    ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: MCPMessage反向关联MCPNotification
      en: MCPMessage is the inverse target of MCPNotification
      ja: MCPMessageからMCPNotificationへの逆読解
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: MCPNotification-is_a-MCPMessage-example-positive-001
      kind: positive
      labels:
        zh: MCPNotification-is_a-MCPMessage 正例
        en: Positive case for MCPNotification-is_a-MCPMessage
        ja: MCPNotification-is_a-MCPMessage の正例
      scenario_id: null
      descriptions:
        zh: 服务器发送 `notifications/resources/updated`，params 含已订阅 URI，消息没有 id。
        en: The server sends `notifications/resources/updated` with the subscribed URI in params and no id.
        ja: server が購読 URI を params に入れた `notifications/resources/updated` を id なしで送ります。
      field_values: {}
      related_node_ids:
        - MCPNotification
        - MCPMessage
      related_relation_ids:
        - MCPNotification-is_a-MCPMessage
      expected_result:
        zh: 建立 MCPNotification-is_a-MCPMessage，并保留所述协议方向与条件。
        en: Assert MCPNotification-is_a-MCPMessage with the stated protocol direction and conditions.
        ja: MCPNotification-is_a-MCPMessage を stated protocol direction/condition 付きで確立します。
      why_valid_or_invalid:
        zh: 仅当对象满足 MCPNotification 的全部身份条件时，才能沿 is_a 归入 MCPMessage。
        en: Assert the subtype edge only when the object satisfies every identity condition of MCPNotification.
        ja: object が MCPNotification の全 identity condition を満たす時だけ is_a edge を確立します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-mcp-notification-006
    - id: MCPNotification-is_a-MCPMessage-example-boundary-001
      kind: boundary
      labels:
