schema: moonweave.ai/ontology-node/v1
id: MCPInitializedNotification
kind: concept
labels:
  zh: MCP 初始化完成通知
  en: MCP initialized notification
  ja: MCP 初期化完了通知
semantics:
  short_definition:
    zh: 客户端在成功收到初始化结果后发送的、表示其已准备进入 MCP 操作阶段的 `notifications/initialized` 通知。
    en: The `notifications/initialized` notification a client sends after successful initialization to indicate readiness for MCP operation.
    ja: 初期化の成功後に client が MCP 操作の準備完了を示すため送る `notifications/initialized` 通知。
  definition:
    zh: >
      MCPInitializedNotification 是 MCP 生命周期初始化阶段最后的客户端到服务端 JSON-RPC 通知。它使用
      `jsonrpc: "2.0"` 和固定 `method: "notifications/initialized"`，没有请求 id，也不请求响应。它只能在客户端收到
      成功的 InitializeResult 后发送，用来确认客户端接受了初始化协商并使会话进入操作阶段；它不是 initialize 请求、
      InitializeResult，也不是任意资源或工具变化通知。
    en: >
      An MCPInitializedNotification is the final client-to-server JSON-RPC notification in the initialization phase of
      the MCP lifecycle. It uses `jsonrpc: "2.0"` and the fixed method `notifications/initialized`, has no request id,
      and expects no response. The client sends it only after receiving a successful InitializeResult to confirm it has
      accepted the initialization negotiation and to move the session into operation. It is not the initialize request,
      the InitializeResult, or an arbitrary resource or tool change notification.
    ja: >
      MCPInitializedNotification は MCP ライフサイクルの初期化段階における最後の client から server への JSON-RPC 通知である。
      `jsonrpc: "2.0"` と固定メソッド `notifications/initialized` を使い、要求 id を持たず、応答も期待しない。client は成功した
      InitializeResult を受け取った後だけこれを送り、初期化交渉を受け入れたことを確認してセッションを操作段階へ移す。
      これは initialize 要求、InitializeResult、任意の resource または tool 変更通知ではない。
  why_needed:
    zh: 它把“服务端已响应初始化”和“客户端已接受协商、可开始操作”分成两个明确事件，避免服务端过早发送依赖客户端能力的请求。
    en: It makes “the server answered initialization” and “the client accepted negotiation and is ready to operate” separate explicit events, so a server does not prematurely use client-dependent features.
    ja: 「server が初期化に応答した」と「client が交渉を受け入れて操作可能である」を別の明示イベントにし、server が client 依存機能を早過ぎる時点で使うことを防ぐ。
  includes:
    - {zh: "由客户端在成功 InitializeResult 后发送的固定方法通知", en: "A fixed-method notification sent by the client after a successful InitializeResult", ja: "成功した InitializeResult の後に client が送る固定メソッド通知"}
    - {zh: '原生 `jsonrpc: "2.0"` 和 `method: "notifications/initialized"` 包络成员', en: 'The native `jsonrpc: "2.0"` and `method: "notifications/initialized"` envelope members', ja: 'ネイティブな `jsonrpc: "2.0"` と `method: "notifications/initialized"` 包絡メンバー'}
    - {zh: "无 id 且无响应预期的 JSON-RPC 通知语义", en: "JSON-RPC notification semantics with no id and no response expectation", ja: "id も応答期待もない JSON-RPC 通知の意味論"}
  excludes:
    - {zh: "需要同一 id 响应的 `initialize` 请求", en: "The `initialize` request that requires a same-id response", ja: "同じ id の応答を必要とする `initialize` 要求"}
    - {zh: "携带服务端能力的 InitializeResult", en: "The InitializeResult carrying server capabilities", ja: "server 能力を運ぶ InitializeResult"}
    - {zh: "带 id 的、等待响应的操作请求或 server 到 client 请求", en: "An id-bearing operational request or server-to-client request awaiting a response", ja: "id を持ち応答を待つ操作要求または server から client への要求"}
  semantic_kind: event
  aliases:
    - {language: en, value: InitializedNotification, alias_kind: official-schema-name}
engineering:
  explanation:
    zh: >
      客户端处理成功的 InitializeResult 后立即向同一 server 方向写入这一行 JSON-RPC 通知；不会为它分配 pending id，
      也不会等待响应。服务端收到该通知后才可以进入正常运行并使用已协商的 client 能力。若初始化以 JSON-RPC error 结束，
      客户端不发送此通知，而应处理失败或关闭会话。
    en: >
      Once the client processes a successful InitializeResult, it writes this JSON-RPC notification toward the same
      server; it allocates no pending id and waits for no response. Only after receiving it can the server enter normal
      operation and use negotiated client capabilities. If initialization ended in a JSON-RPC error, the client does
      not send this notification and instead handles failure or closes the session.
    ja: >
      client は成功した InitializeResult を処理すると、同じ server に向けてこの JSON-RPC 通知を書き出す。保留 id は割り当てず、
      応答も待たない。server は受信後にのみ通常操作へ入り、交渉済み client 能力を使える。初期化が JSON-RPC error で終わった場合、
      client はこの通知を送らず、失敗処理またはセッション終了を行う。
  typical_input:
    - description: A successful InitializeResult lets the client complete the initialization request.
      format: |
        {
          "jsonrpc": "2.0",
          "id": "init-1",
          "result": {
            "protocolVersion": "2025-11-25",
            "capabilities": {},
            "serverInfo": {"name": "example-server", "version": "1.0.0"}
          }
        }
      source_claims: [mcp-initialized-sequencing]
  typical_output:
    - description: Client emits the one-way initialized notification.
      format: |
        {
          "jsonrpc": "2.0",
          "method": "notifications/initialized"
        }
      source_claims: [mcp-initialized-notification-shape]
  reference_implementations:
    - name: MCP lifecycle specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
      description: Defines the requirement for the client to send initialized after successful initialization and before operation.
    - name: MCP schema
      url: https://modelcontextprotocol.io/specification/2025-11-25/schema
      description: Declares InitializedNotification with the notifications/initialized method.
structure:
  identity_keys: ["method"]
  fields:
    - id: jsonrpc
      labels: {zh: "JSON-RPC 版本", en: "JSON-RPC version", ja: "JSON-RPC バージョン"}
      definitions: {zh: "初始化完成通知包络中的原生 `jsonrpc` 成员，固定为 `2.0`。", en: "The native `jsonrpc` member of the initialized notification envelope, fixed to `2.0`.", ja: "初期化完了通知包絡のネイティブな `jsonrpc` メンバーであり、`2.0` に固定される。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2.0"
      allowed_values: ["2.0"]
      source_claims: [mcp-initialized-notification-shape]
    - id: method
      labels: {zh: "通知方法", en: "Notification method", ja: "通知メソッド"}
      definitions: {zh: "继承的 JSON-RPC 方法判别字段；在此节点固定为 `notifications/initialized`。", en: "The inherited JSON-RPC method discriminator, fixed to `notifications/initialized` in this node.", ja: "継承した JSON-RPC メソッド判別子であり、このノードでは `notifications/initialized` に固定される。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "notifications/initialized"
      allowed_values: ["notifications/initialized"]
      source_claims: [mcp-initialized-notification-shape]
  constraints:
    - id: initialized-notification-follows-successful-initialize
      severity: error
      expression_language: plain
      expression: A client sends notifications/initialized only after it received a successful InitializeResult for the session.
      explanation: {zh: "成功初始化结果是进入操作阶段前发送本通知的前置条件。", en: "A successful initialization result is the prerequisite to sending this notification before operation.", ja: "成功した初期化結果が、操作前にこの通知を送る前提条件である。"}
      source_claims: [mcp-initialized-sequencing]
    - id: initialized-notification-has-no-request-id-or-response
      severity: error
      expression_language: plain
      expression: An MCPInitializedNotification has no JSON-RPC request id and receives no response.
      explanation: {zh: "它是单向通知，而不是等待配对结果的 JSON-RPC 请求。", en: "It is a one-way notification, not a JSON-RPC request awaiting a paired result.", ja: "これは一方向通知であり、対になる結果を待つ JSON-RPC 要求ではない。"}
      source_claims: [mcp-initialized-notification-shape, json-rpc-notification]
  required_relations: []
examples:
  - id: mcp-initialized-notification-positive

    labels: {zh: "成功初始化后的完成通知", en: "Completion notification after successful initialization", ja: "成功初期化後の完了通知"}

    descriptions:
      zh: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。
      en: MCP JSON-RPC tools/call {"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/tmp/test.txt"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths.
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"jsonrpc": "2.0", "method": "notifications/initialized"}
    related_node_ids: [MCPInitializedNotification, MCPInitializeResult]
    related_relation_ids: [MCPInitializedNotification-is_a-MCPNotification]

    source_claims: [mcp-initialized-sequencing, mcp-initialized-notification-shape]
  - id: mcp-initialized-notification-counterexample-with-id

    labels: {zh: "错误附带 id 的完成通知", en: "Initialized notification incorrectly carrying an id", ja: "誤って id を持つ完了通知"}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"jsonrpc": "2.0", "id": "initialized-1", "method": "notifications/initialized"}
    related_node_ids: [MCPInitializedNotification, MCPRequest]
    related_relation_ids: [MCPInitializedNotification-is_a-MCPNotification]

    source_claims: [mcp-initialized-notification-shape, json-rpc-notification]
  - id: mcp-initialized-notification-boundary-failed-initialize

    labels: {zh: "成功初始化与失败初始化的边界", en: "Boundary between successful and failed initialization", ja: "成功初期化と失敗初期化の境界"}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"jsonrpc": "2.0", "method": "notifications/initialized"}
    related_node_ids: [MCPInitializedNotification, MCPErrorResponse]
    related_relation_ids: [MCPInitializedNotification-is_a-MCPNotification]

    source_claims: [mcp-initialized-sequencing]
  - id: mcp-initialized-notification-instance-session-42

    labels: {zh: "session-42 初始化完成通知实例", en: "session-42 initialized notification instance", ja: "session-42 初期化完了通知インスタンス"}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"jsonrpc": "2.0", "method": "notifications/initialized"}
    related_node_ids: [MCPInitializedNotification, MCPClient]
    related_relation_ids: [MCPInitializedNotification-is_a-MCPNotification]

    source_claims: [mcp-initialized-sequencing, mcp-initialized-notification-shape]
