  id: MCPResourceUpdatedNotification-is_a-MCPNotification
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: MCPResourceUpdatedNotification是一种MCPNotification
    en: MCPResourceUpdatedNotification is a MCPNotification
    ja: MCPResourceUpdatedNotificationがMCPNotificationを一種である
  definitions:
    zh: MCPResourceUpdatedNotification 是 MCPNotification 的严格子型；其必要身份差异是：MCP 资源更新通知是一种 MCP 通知（MCPNotification），由声明 resources.subscribe 的服务器以 `notifications/resources/updated` 发送，并在 params.uri 中指向当前有效 ResourceSubscription 的同一 URI；通用通知、list_changed 或退订后的消息不属于该子型的合法实例。
    en: "MCPResourceUpdatedNotification is a strict subtype of MCPNotification; its necessary identity differentia is: An MCP resource-updated notification is an MCPNotification sent by a server that declared resources.subscribe, using notifications/resources/updated with params.uri equal to the URI of an active ResourceSubscription. Generic notifications, list_changed, and post-unsubscribe messages are not valid instances of this subtype."
    ja: MCPResourceUpdatedNotification は MCPNotification の strict subtype であり、必要な identity differentia は次の通りです：MCP resource-updated notification は MCPNotification の一種で resources.subscribe 宣言 server が notifications/resources/updated と active ResourceSubscription と同じ params.uri を送ります。generic notification・list_changed・post-unsubscribe message は valid instance ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
    en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
    ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
  inverse_reading:
    predicate: has_subtype
    labels:
