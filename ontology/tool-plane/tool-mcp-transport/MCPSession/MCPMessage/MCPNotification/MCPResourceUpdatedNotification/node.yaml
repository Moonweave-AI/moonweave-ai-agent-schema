        explanations:
          zh: 建立订阅或发送更新通知前，服务器必须协商 resources.subscribe 能力。
          en: The server must negotiate the resources.subscribe capability before establishing the subscription or sending the update.
          ja: subscription 確立または update 送信前に server は resources.subscribe capability を交渉しなければなりません。
        source_claims:
