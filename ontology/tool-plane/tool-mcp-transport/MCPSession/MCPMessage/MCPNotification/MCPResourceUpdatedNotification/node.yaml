          en: The notification URI must equal the subscribed URI or be proven as its sub-resource by documented server hierarchy; a raw prefix is insufficient.
          ja: notification URI は subscribed URI と同じか documented server hierarchy で sub-resource と証明され、raw prefix は不十分です。
        source_claims:
