      en: MCPResourceUpdatedNotification updates ResourceSubscription
      ja: MCPResourceUpdatedNotificationがResourceSubscriptionを更新を届ける
    definitions:
      zh: MCPResourceUpdatedNotification 通过 updates 关联至少一个活动 ResourceSubscription；通知 URI 可以等于订阅 URI，也可以由服务器文档化的资源层级证明为其 sub-resource。该边表示订阅范围收到变更信号，不修改订阅合同，也不得用裸字符串前缀推断子资源关系。
      en: MCPResourceUpdatedNotification updates at least one active ResourceSubscription. The notification URI may equal the subscribed URI or be proven by the server's documented resource hierarchy to be its sub-resource. The edge records delivery within the subscription scope, does not mutate the subscription contract, and never infers sub-resource coverage from a raw string prefix alone.
      ja: MCPResourceUpdatedNotification は active ResourceSubscription 一つ以上へ updates し、notification URI は subscribed URI と同じか server-documented resource hierarchy で sub-resource と証明されます。subscription scope 内 delivery を示し contract を変更せず、raw string prefix のみで sub-resource coverage を推測しません。
