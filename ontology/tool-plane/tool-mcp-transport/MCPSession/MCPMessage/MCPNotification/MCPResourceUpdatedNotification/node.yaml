  - id: mcp-resource-updated-capability
    source: mcp-resources-2025-11-25
    supports: Server resources capability declares optional subscribe support for clients to receive individual resource change notifications.
    locator: "Capabilities"
    evidence_kind: normative
    confidence: high
  - id: moonweave-mcp-resource-updated-notification-taxonomy
    source: mcp-resources-2025-11-25
    supports: "Moonweave classifies the fixed resource-update notification as an MCPNotification for navigation; this subclass edge is a taxonomy design inference."
    locator: "Subscriptions"
    evidence_kind: design-inference
    confidence: high
  - id: mcp-resource-updated-subscribe
    source: mcp-resources-2025-11-25
    supports: Clients subscribe to a specific resource with resources/subscribe and URI parameter.
    locator: "Subscriptions"
    evidence_kind: normative
    confidence: high
  - id: mcp-resource-updated-notification
    source: mcp-resources-2025-11-25
    supports: A resource change notification uses notifications/resources/updated and contains the changed resource URI.
    locator: "Subscriptions"
    evidence_kind: normative
    confidence: high
  - id: mcp-resource-updated-read
    source: mcp-resources-2025-11-25
    supports: Resource contents are retrieved by a distinct resources/read request returning contents for a URI.
    locator: "Reading Resources"
    evidence_kind: normative
    confidence: high
  - id: mcp-resource-updated-list-change
    source: mcp-resources-2025-11-25
    supports: A server declaring resources.listChanged uses notifications/resources/list_changed when the available resource list changes.
    locator: "List Changed Notification"
    evidence_kind: normative
    confidence: high