        en: Assert MCPResourceUpdatedNotification-is_a-MCPNotification with the stated protocol direction and conditions.
        ja: MCPResourceUpdatedNotification-is_a-MCPNotification を stated protocol direction/condition 付きで確立します。
      why_valid_or_invalid:
