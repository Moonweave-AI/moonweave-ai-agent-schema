schema: moonweave.ai/ontology-node/v1
id: MCPResourceUpdatedNotification
kind: concept
labels:
  zh: MCP 资源更新通知
  en: MCP resource updated notification
  ja: MCP リソース更新通知
semantics:
  short_definition:
    zh: 服务器向已订阅特定资源的客户端发送的 notifications/resources/updated 无响应通知。
    en: The notifications/resources/updated no-response notification sent by a server to a client subscribed to a specific resource.
    ja: 特定リソースを購読したクライアントへ server が送る notifications/resources/updated の無応答通知。
  definition:
    zh: >
      MCP 资源更新通知是资源订阅更新事件，method 固定为 notifications/resources/updated，params 包含已变更 resource 的 URI。
      客户端先在 server 声明 resources.subscribe 后以 resources/subscribe 请求订阅特定 URI，服务器随后可发送该 notification。
      通知提示 client 可重新读取资源；它不携带资源内容、不代替 resources/read，也不等同于 resources/list_changed。
    en: >
      An MCP resource updated notification is the update event for a resource subscription. Its method is
      notifications/resources/updated and params contain the URI of the changed resource. After a server declares
      resources.subscribe, a client subscribes to a specific URI with resources/subscribe and the server may send this
      notification. It tells the client it may reread the resource; it carries no resource contents, does not replace
      resources/read, and is not resources/list_changed.
    ja: >
      MCP リソース更新通知はリソース購読の更新イベントである。method は notifications/resources/updated に固定され、params は
      変更 resource の URI を含む。server が resources.subscribe を宣言後、client は resources/subscribe で特定 URI を購読し、
      server はこの通知を送れる。client に resource 再読取可能を伝えるが、resource content を運ばず、resources/read の代替でも
      resources/list_changed でもない。
  why_needed:
    zh: 订阅者可及时失效缓存或重新读取变化资源，无需轮询每个资源，同时不把大内容重复推送进会话。
    en: Subscribers can invalidate cache or reread a changed resource without polling each resource or repeatedly pushing large contents into a session.
    ja: 購読者は各 resource のポーリングや大きな content の反復 push なしに、キャッシュ無効化または変更 resource の再読取ができる。
  includes:
    - {zh: notifications/resources/updated method, en: The notifications/resources/updated method, ja: notifications/resources/updated メソッド}
    - {zh: 已订阅资源的 URI 参数, en: URI parameter of a subscribed resource, ja: 購読済み resource の URI パラメーター}
  excludes:
    - {zh: resource 内容或二进制 blob, en: Resource contents or binary blob, ja: resource content またはバイナリ blob}
    - {zh: 可用资源列表发生变化的通知, en: Notification that the available resource list changed, ja: 利用可能 resource 一覧が変わった通知}
  semantic_kind: message
  aliases:
    - {language: en, value: ResourceUpdatedNotification, alias_kind: protocol-type}
engineering:
  explanation:
    zh: client 先确认服务器 resources.subscribe，再向 resources/subscribe 提供 URI。资源改变时 server 发送无 id 的 updated notification；client 根据 URI 失效缓存并可用 resources/read 重新获取 contents。
    en: The client first confirms server resources.subscribe and supplies a URI to resources/subscribe. When the resource changes, the server sends an id-less updated notification; the client invalidates by URI and may retrieve contents again with resources/read.
    ja: client は先に server resources.subscribe を確認し resources/subscribe に URI を渡す。resource 変更時に server は id なし updated 通知を送り、client は URI でキャッシュを無効化し resources/read で content を再取得できる。
  typical_input:
    - description: A client resource subscription request.
      format: '{"jsonrpc":"2.0","id":4,"method":"resources/subscribe","params":{"uri":"file:///project/src/main.rs"}}'
      source_claims: [mcp-resource-updated-subscribe]
  typical_output:
    - description: Later change notification without response expectation.
      format: '{"jsonrpc":"2.0","method":"notifications/resources/updated","params":{"uri":"file:///project/src/main.rs"}}'
      source_claims: [mcp-resource-updated-notification]
  reference_implementations:
    - name: MCP Resources specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
      description: Defines resource subscription capability, subscribe request, and update notification.
structure:
  identity_keys: ["method","uri"]
  fields:
    - id: jsonrpc
      labels: {zh: "JSON-RPC 版本", en: "JSON-RPC version", ja: "JSON-RPC バージョン"}
      definitions:
        zh: "MCP 包络中的原生 jsonrpc 成员，值必须为 \"2.0\"。"
        en: "The native jsonrpc envelope member; its value must be \"2.0\"."
        ja: "MCP エンベロープのネイティブな jsonrpc メンバーで、値は \"2.0\" でなければならない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2.0"
      allowed_values: ["2.0"]
      source_claims: [mcp-resource-updated-notification]
    - id: method
      labels: {zh: "方法", en: "Method", ja: "メソッド"}
      definitions:
        zh: "固定为 notifications/resources/updated 的原生 method 成员。"
        en: "The native method member fixed to notifications/resources/updated."
        ja: "notifications/resources/updated に固定されるネイティブな method メンバー。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "notifications/resources/updated"
      allowed_values: ["notifications/resources/updated"]
      source_claims: [mcp-resource-updated-notification]
    - id: uri
      labels: {zh: "资源 URI", en: "Resource URI", ja: "リソース URI"}
      definitions:
        zh: "原生 params.uri 成员，标识已订阅且发生变化的资源。"
        en: "The native params.uri member identifying the subscribed resource that changed."
        ja: "変更された購読済みリソースを識別するネイティブな params.uri メンバー。"
      datatype: uri
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "file:///project/src/main.rs"
      allowed_values: []
      source_claims: [mcp-resource-updated-subscribe, mcp-resource-updated-notification]
  constraints:
    - id: resource-update-requires-subscription-capability
      severity: error
      expression_language: plain
      expression: The server declares resources.subscribe before accepting a client subscription and sending resource update notifications.
      explanation:
        zh: server 在接受 client 订阅并发送资源更新通知前声明 resources.subscribe。
        en: The server declares resources.subscribe before accepting a client subscription and sending resource update notifications.
        ja: server は client 購読を受け入れリソース更新通知を送る前に resources.subscribe を宣言する。
      source_claims: [mcp-resource-updated-capability]
    - id: resource-update-carries-uri-not-content
      severity: error
      expression_language: plain
      expression: The update notification identifies the changed resource URI and does not substitute for resources/read contents.
      explanation:
        zh: 更新通知标识已变更资源 URI，不替代 resources/read 的 contents。
        en: The update notification identifies the changed resource URI and does not substitute for resources/read contents.
        ja: 更新通知は変更 resource URI を識別し、resources/read の content を代替しない。
      source_claims: [mcp-resource-updated-notification, mcp-resource-updated-read]
  required_relations: []
examples:
  - id: mcp-resource-updated-positive-file-change

    labels: {zh: 已订阅文件改变, en: Subscribed file changes, ja: 購読済みファイル変更}

    descriptions:
      zh: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。"
      en: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths."
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"jsonrpc":"2.0","method":"notifications/resources/updated","uri":"file:///project/src/main.rs"}
    related_node_ids: [MCPResourceUpdatedNotification, MCPResourceSubscription, MCPNotification]
    related_relation_ids: [MCPResourceUpdatedNotification-is_a-MCPNotification]

    source_claims: [mcp-resource-updated-capability, mcp-resource-updated-subscribe, mcp-resource-updated-notification]
  - id: mcp-resource-updated-counterexample-content-push

    labels: {zh: 更新通知内推送全部内容, en: Full contents pushed in update notification, ja: 更新通知で全 content を push}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"jsonrpc":"2.0","method":"notifications/resources/updated","uri":"file:///project/src/main.rs"}
    related_node_ids: [MCPResourceUpdatedNotification, MCPResourceReadRequest]
    related_relation_ids: [MCPResourceUpdatedNotification-is_a-MCPNotification]

    source_claims: [mcp-resource-updated-notification, mcp-resource-updated-read]
  - id: mcp-resource-updated-boundary-list-change

    labels: {zh: 单资源更新与列表变化的边界, en: Boundary between item update and list change, ja: 個別更新と一覧変更の境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"jsonrpc":"2.0","method":"notifications/resources/updated","uri":"file:///project/src/main.rs"}
    related_node_ids: [MCPResourceUpdatedNotification, MCPNotification]
    related_relation_ids: [MCPResourceUpdatedNotification-is_a-MCPNotification]

    source_claims: [mcp-resource-updated-notification, mcp-resource-updated-list-change]
  - id: mcp-resource-updated-instance-main-rs

    labels: {zh: main.rs 更新实例, en: main.rs update instance, ja: main.rs 更新実例}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"jsonrpc":"2.0","method":"notifications/resources/updated","uri":"file:///project/src/main.rs"}
    related_node_ids: [MCPResourceUpdatedNotification, MCPResourceSubscription, MCPServer]
    related_relation_ids: [MCPResourceUpdatedNotification-is_a-MCPNotification]

    source_claims: [mcp-resource-updated-subscribe, mcp-resource-updated-notification]
parent_relation:
  id: MCPResourceUpdatedNotification-is_a-MCPNotification
  predicate: is_a
  target: concept:MCPNotification
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是 MCP 通知的资源更新子类, en: is the resource-updated subtype of MCP notification, ja: MCP 通知のリソース更新下位型である}
  definition:
    zh: MCP 资源更新通知是报告已订阅资源 URI 已变化的无响应 MCP 通知。
    en: An MCP resource updated notification is an MCP notification reporting that a subscribed resource URI changed without response expectation.
    ja: MCP リソース更新通知は購読済み resource URI が変わったことを応答期待なしに報告する MCP 通知である。
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_resource_updated_subtype
    labels: {zh: 具有资源更新子类, en: has resource-updated subtype, ja: リソース更新下位型を持つ}
  conditions: []
  temporal_scope: message
  boundary_context: 该层级只表达订阅资源变化 signal，不包括资源内容、resource list 变化或订阅 request 本身。
  constraints:
    - id: resource-updated-method-fixed
      severity: error
      expression_language: plain
      expression: An MCPResourceUpdatedNotification uses notifications/resources/updated with the changed resource URI.
      explanation:
        zh: MCPResourceUpdatedNotification 使用 notifications/resources/updated 并携带已变更资源 URI。
        en: An MCPResourceUpdatedNotification uses notifications/resources/updated with the changed resource URI.
        ja: MCPResourceUpdatedNotification は変更 resource URI と共に notifications/resources/updated を使う。
      source_claims: [mcp-resource-updated-notification]
  examples: []
  source_claims: [moonweave-mcp-resource-updated-notification-taxonomy]
  distinct_fact_rationale:
    zh: 子类由订阅资源的固定 method 与 URI update signal 区分，不由任意资源 metadata 修改区分。
    en: The subtype is distinguished by the fixed method and URI update signal for a subscribed resource, not arbitrary resource metadata change.
    ja: この下位型は任意 resource metadata 変更ではなく、購読 resource 用の固定 method と URI 更新 signal により区別される。
relations: []
