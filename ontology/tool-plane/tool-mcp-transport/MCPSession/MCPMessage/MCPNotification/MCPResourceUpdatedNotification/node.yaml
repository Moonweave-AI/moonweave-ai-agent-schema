schema: moonweave.ai/ontology-node/v1
id: MCPResourceUpdatedNotification
kind: concept
status: review
labels:
  zh: MCP 资源更新通知
  en: MCP resource-updated notification
  ja: MCP リソース更新通知
semantics:
  short_definition:
    zh: method=`notifications/resources/updated`、指向已订阅 URI 的通知。
    en: A notifications/resources/updated notification naming a subscribed URI.
    ja: method=notifications/resources/updated で subscribed URI を示す notification。
  definition:
    zh: MCP 资源更新通知是 MCPNotification 的严格下位类型，继承 MCPNotification 的 message_record_id 线路记录身份；notification_sequence 只用于本地排序，不是第二身份。声明 resources.subscribe 的服务器以 method=notifications/resources/updated 发送，resource_uri 必须落在至少一个活动 ResourceSubscription 的覆盖范围内。list_changed、未声明能力或退订后的消息均不是合法实例。
    en: An MCP resource-updated notification is a strict MCPNotification subtype and inherits the message_record_id wire-record identity from MCPNotification; notification_sequence is only local ordering and not a second identity. A server declaring resources.subscribe sends method=notifications/resources/updated, and resource_uri must fall within at least one active ResourceSubscription scope. list_changed, missing capability, and post-unsubscribe messages are invalid instances.
    ja: MCP resource-updated notification は MCPNotification の厳密な下位型で、MCPNotification から wire record identity の message_record_id を継承し、notification_sequence は local ordering にすぎず第二 identity ではありません。resources.subscribe を宣言した server が method=notifications/resources/updated で送り、resource_uri は active ResourceSubscription scope 内でなければなりません。
  why_needed:
    zh: 具体通知子型把订阅关联限制在资源更新，避免把所有 MCPNotification 都错误连接到 MCPSubscription。
    en: The concrete subtype limits subscription association to resource updates instead of connecting every MCPNotification to MCPSubscription.
    ja: concrete subtype は subscription association を resource update に限定し全 MCPNotification の誤接続を防ぎます。
  includes:
    - zh: 纳入能力已协商、URI 与有效订阅一致的 resources/updated 通知。
      en: Includes resources/updated notifications whose capability is negotiated and URI matches an active subscription.
      ja: capability negotiated かつ URI が active subscription と一致する resources/updated notification を含みます。
  excludes:
    - zh: 排除 resources/list_changed、progress、logging 和退订后更新。
      en: Excludes resources/list_changed, progress, logging, and updates after unsubscribe.
      ja: resources/list_changed・progress・logging・post-unsubscribe update を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: notification_sequence
      labels:
        zh: 通知序号
        en: notification sequence
        ja: 通知順序
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在本地会话记录中稳定排序该无 RequestId 通知。
        en: Locally orders this no-RequestId notification within the session record.
        ja: RequestId を持たない notification を session record 内で順序付けます。
      allowed_values: []
      pattern: null
      example_value: 18
      source_claims:
        - claim-mcp-resource-updated-notification-002
    - id: method
      labels:
        zh: 资源更新通知方法
        en: resource-update notification method
        ja: resource-update notification method
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 通知的 wire method 判别符，固定为 `notifications/resources/updated`。
        en: The wire-method discriminator, fixed to `notifications/resources/updated`.
        ja: notification の wire-method discriminator で `notifications/resources/updated` に固定されます。
      allowed_values:
        - id: MCPNotificationMethodResourceUpdated
          value: notifications/resources/updated
          labels:
            zh: 资源已更新
            en: resource updated
            ja: resource updated
          definitions:
            zh: 通知已订阅范围内资源变化的固定 MCP 方法。
            en: The fixed MCP method notifying a resource change within a subscribed scope.
            ja: subscribed scope 内 resource change を通知する fixed MCP method です。
          status: accepted
          source_claims:
            - claim-mcp-resource-updated-notification-003
      pattern: null
      example_value: notifications/resources/updated
      source_claims:
        - claim-mcp-resource-updated-notification-004
    - id: resource_uri
      labels:
        zh: 已更新资源 URI
        en: updated resource URI
        ja: updated resource URI
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 映射 ResourceUpdatedNotification.params.uri，指向发生变化的资源；可为订阅 URI 或其文档化子资源，不能仅靠字符串前缀猜测覆盖关系。
        en: Maps to ResourceUpdatedNotification.params.uri and identifies the changed resource. It may be the subscribed URI or a documented sub-resource; coverage must not be guessed from a raw string prefix alone.
        ja: ResourceUpdatedNotification.params.uri に対応し changed resource を識別します。subscribed URI または documented sub-resource で、raw string prefix だけで coverage を推測しません。
      allowed_values: []
      pattern: null
      example_value: file:///repo/schema.json
      source_claims:
        - claim-mcp-resource-updated-notification-005
  constraints:
    - id: resource-updated-notification-prerequisites
      severity: error
      expression_language: plain
      expression: The server MUST have declared resources.subscribe capability, and resource_uri MUST be covered by at least one active ResourceSubscription through equality or a server-documented sub-resource relation.
      explanations:
        zh: 服务器必须声明 resources.subscribe；resource_uri 必须由至少一个 active 订阅以相等 URI 或服务器文档化子资源关系覆盖。
        en: The server must declare resources.subscribe, and resource_uri must be covered by at least one active subscription through URI equality or a documented sub-resource relation.
        ja: server は resources.subscribe を宣言し、resource_uri は URI equality または documented sub-resource relation により active subscription 一つ以上に covered されなければなりません。
      source_claims:
        - claim-mcp-resource-updated-notification-006
  required_relation_constraints:
    - id: resource-updated-notification-matches-active-subscription
      direction: outgoing
      predicate: updates
      target_concept_id: ResourceSubscription
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 每条合法 updated 通知必须匹配至少一个活动 ResourceSubscription；同一 URI 范围可能被多个会话或客户端订阅。
        en: Every valid updated notification must match at least one active ResourceSubscription; the same URI scope may be subscribed by multiple sessions or clients.
        ja: 各 valid updated notification は active ResourceSubscription 一つ以上に matching し、同じ URI scope を複数 session/client が subscribe できます。
      source_claims:
        - claim-mcp-resource-updated-notification-007
examples:
  - id: MCPResourceUpdatedNotification-example-positive-001
    kind: positive
    labels:
      zh: MCP 资源更新通知正例
      en: Positive MCP resource-updated notification case
      ja: MCP リソース更新通知の正例
    scenario_id: null
    descriptions:
      zh: 客户端订阅 `file:///repo` 后，服务器依据已声明的仓库子资源层级，对 `file:///repo/schema.json` 发送 notifications/resources/updated。
      en: After the client subscribes to `file:///repo`, the server uses its documented repository sub-resource hierarchy and sends notifications/resources/updated for `file:///repo/schema.json`.
      ja: client が `file:///repo` を subscribe 後、server は documented repository sub-resource hierarchy に基づき `file:///repo/schema.json` の notifications/resources/updated を送ります。
    field_values:
      message_record_id: mcp-message:resource-updated:18
      session_id: mcp-session-s-42
      jsonrpc: "2.0"
      message_kind: notification
      notification_sequence: 18
      method: notifications/resources/updated
      resource_uri: file:///repo/schema.json
    related_node_ids:
      - MCPResourceUpdatedNotification
      - ResourceSubscription
    related_relation_ids:
      - MCPResourceUpdatedNotification-updates-ResourceSubscription
    expected_result:
      zh: 归为 MCPResourceUpdatedNotification 并关联该 ResourceSubscription。
      en: Classify MCPResourceUpdatedNotification and link the ResourceSubscription.
      ja: MCPResourceUpdatedNotification とし ResourceSubscription に関連付けます。
    why_valid_or_invalid:
      zh: 方法、能力、方向、URI 与有效期全部匹配。
      en: Method, capability, direction, URI, and active interval all match.
      ja: method・capability・direction・URI・active interval が一致します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-resource-updated-notification-008
  - id: MCPResourceUpdatedNotification-example-boundary-001
    kind: boundary
    labels:
      zh: MCP 资源更新通知边界例
      en: Boundary MCP resource-updated notification case
      ja: MCP リソース更新通知の境界例
    scenario_id: null
    descriptions:
      zh: 服务器发送 notifications/resources/list_changed，且客户端没有单 URI 订阅。
      en: The server sends notifications/resources/list_changed and the client has no per-URI subscription.
      ja: server が resources/list_changed を送り client に per-URI subscription がありません。
    field_values: {}
    related_node_ids:
      - MCPResourceUpdatedNotification
    related_relation_ids: []
    expected_result:
      zh: 保留为 MCPNotification，不归资源更新子型。
      en: Keep MCPNotification and do not classify the resource-updated subtype.
      ja: MCPNotification のまま resource-updated subtype にしません。
    why_valid_or_invalid:
      zh: 列表失效与单资源更新具有不同方法和前置状态。
      en: List invalidation and per-resource update have different methods and prerequisite state.
      ja: list invalidation と per-resource update は method/prerequisite state が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-resource-updated-notification-009
external_mappings: []
applicability:
  - core
sibling_differentiation: []
