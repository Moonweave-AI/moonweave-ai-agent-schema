        en: MCPResourceUpdatedNotification and ResourceSubscription retain their ontology owners; this edge records only a verified MCP protocol fact and transfers neither definitional ownership nor authorization.
        ja: MCPResourceUpdatedNotification と ResourceSubscription は各 ontology owner を維持し、この edge は verified MCP protocol fact のみを記録して定義所有権や認可を移転しません。
      protocol_or_resource_context:
