        en: Do not assert ResourceSubscription-is_a-MCPSubscription; retain the broader or adjacent fact actually present.
        ja: ResourceSubscription-is_a-MCPSubscription を確立せず、実際の broader/adjacent fact を保持します。
      why_valid_or_invalid:
        zh: ResourceSubscription 的边界例缺少该子型所需的 method、方向、载荷或状态，不能凭共享词汇归入该子型。
        en: The ResourceSubscription boundary case lacks the method, direction, payload, or state required by the subtype and cannot be classified through shared vocabulary.
        ja: ResourceSubscription boundary case は subtype に必要な method・direction・payload・state を欠き、shared vocabulary だけで分類できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
