    en: ResourceSubscription-is_a-MCPSubscription records only the reviewed method, direction, payload, or subtype condition; it is not endpoint co-occurrence, a redundant inverse shortcut, or lexical similarity.
    ja: ResourceSubscription-is_a-MCPSubscription は reviewed method・direction・payload・subtype condition のみを記録し、endpoint 共起・redundant inverse shortcut・lexical similarity ではありません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: ResourceSubscription-subscribes_to-ResourceDefinition
    predicate: subscribes_to
    direction: source-to-target
    relation_kind: information
    labels:
      zh: ResourceSubscription订阅ResourceDefinition
      en: ResourceSubscription subscribes to ResourceDefinition
      ja: ResourceSubscriptionがResourceDefinitionを購読する
    definitions:
      zh: ResourceSubscription 在协商 resources.subscribe 能力且 resources/subscribe 成功后，以 subscription.resource_uri 指向一个 URI 相等的 ResourceDefinition 作为订阅范围根；该关系的有效期持续到 unsubscribe 或会话结束。子资源更新由 updates 关系表达，资源曾被列出或读取不等于已订阅。
      en: After resources.subscribe capability negotiation and a successful resources/subscribe, ResourceSubscription points from subscription.resource_uri to one ResourceDefinition with the equal URI as the subscription-scope root. The relation remains valid until unsubscribe or session end; sub-resource updates are expressed by the updates relation, and prior listing or reading is not subscription.
      ja: resources.subscribe capability 交渉と successful resources/subscribe 後、ResourceSubscription は subscription.resource_uri と同じ URI の ResourceDefinition 一つを subscription-scope root として指します。validity は unsubscribe/session end までで、sub-resource update は updates relation が表し、listing/read は subscription ではありません。
    cardinality:
      source:
        min: 1
        max: null
      target:
        min: 1
        max: 1
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: has_subscription
      labels:
        zh: ResourceDefinition反向关联ResourceSubscription
        en: ResourceDefinition is the inverse target of ResourceSubscription
        ja: ResourceDefinitionからResourceSubscriptionへの逆読解
    conditions:
      - id: resource-subscription-successful-establishment
        severity: error
        expression_language: plain
        expression: A resources/subscribe request for subscription.resource_uri MUST have completed successfully after resources.subscribe capability negotiation.
        explanations:
          zh: 必须先协商 resources.subscribe 能力，并成功完成针对 resource_uri 的 resources/subscribe。
          en: The resources.subscribe capability must be negotiated and resources/subscribe for resource_uri must complete successfully.
          ja: resources.subscribe capability を交渉し resource_uri の resources/subscribe が成功完了しなければなりません。
        source_claims:
          - claim-resource-subscription-008
      - id: resource-subscription-definition-uri-correlation
        severity: error
        expression_language: plain
        expression: subscription.resource_uri MUST equal ResourceDefinition.uri; this relation selects the subscription-scope root, while sub-resource coverage belongs to update notifications.
        explanations:
          zh: subscription.resource_uri 必须等于 ResourceDefinition.uri；该边选择订阅范围根，子资源覆盖由更新通知处理。
          en: subscription.resource_uri must equal ResourceDefinition.uri; this edge selects the scope root while update notifications handle sub-resource coverage.
          ja: subscription.resource_uri は ResourceDefinition.uri と一致し、この edge は scope root を選び sub-resource coverage は update notification が扱います。
        source_claims:
          - claim-resource-subscription-009
    temporal_scope: valid-time
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: ResourceSubscription 与 ResourceDefinition 保持各自本体所有权；此边只记录已核验的 MCP 协议事实，不转移定义权或授权。
        en: ResourceSubscription and ResourceDefinition retain their ontology owners; this edge records only a verified MCP protocol fact and transfers neither definitional ownership nor authorization.
        ja: ResourceSubscription と ResourceDefinition は各 ontology owner を維持し、この edge は verified MCP protocol fact のみを記録して定義所有権や認可を移転しません。
      protocol_or_resource_context:
        zh: 订阅请求成功，URI 解析到该资源定义，且当前时间处于订阅有效期。
        en: The subscribe request succeeded, URI resolves to the resource definition, and current time lies within the subscription's valid interval.
        ja: subscribe request 成功、URI が resource definition に解決し current time が subscription valid interval 内です。
    constraints: []
    examples:
      - id: ResourceSubscription-subscribes_to-ResourceDefinition-example-positive-001
        kind: positive
        labels:
          zh: ResourceSubscription-subscribes_to-ResourceDefinition 正例
