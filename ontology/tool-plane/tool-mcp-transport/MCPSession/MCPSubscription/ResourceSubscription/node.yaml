schema: moonweave.ai/ontology-node/v1
id: ResourceSubscription
kind: concept
status: review
labels:
  zh: MCP 资源订阅
  en: MCP resource subscription
  ja: MCP リソース購読
semantics:
  short_definition:
    zh: 客户端针对一个资源 URI 建立并维持的 MCP 更新订阅状态。
    en: An MCP update-subscription state established and maintained by a client for one resource URI.
    ja: client が一つの resource URI に対して確立・維持する MCP update subscription state。
  definition:
    zh: MCP 资源订阅是一种 MCPSubscription，在协商出 resources.subscribe 能力且客户端成功发送 `resources/subscribe` 后，以会话内 subscription_id 持续记录一个订阅 URI 的活动范围；服务器可对该 URI 或其文档化子资源发送 `notifications/resources/updated`，订阅由 `resources/unsubscribe` 或会话关闭终止。它不是 ResourceDefinition、请求消息或 list_changed。
    en: An MCP resource subscription is an MCPSubscription identified by a session-scoped subscription_id after resources.subscribe capability negotiation and a successful resources/subscribe. It keeps an active scope for one subscribed URI; the server may send notifications/resources/updated for that URI or a documented sub-resource, and resources/unsubscribe or session closure ends the state. It is not a ResourceDefinition, request message, or list_changed notification.
    ja: MCP resource subscription は resources.subscribe capability 交渉と successful resources/subscribe 後、session-scoped subscription_id で識別される MCPSubscription です。一 subscribed URI の active scope を保持し、その URI または文書化 sub-resource への notifications/resources/updated を受け、resources/unsubscribe/session close で終了します。ResourceDefinition・request・list_changed ではありません。
  why_needed:
    zh: 它把具体 URI 的持续订阅状态从请求、资源定义和列表失效通知中拆开，使更新通知能回溯到准确目标与有效生命周期。
    en: It separates durable per-URI state from requests, resource definitions, and list invalidation so each update notification can be traced to the exact target and active lifecycle.
    ja: URI ごとの durable state を request・resource definition・list invalidation から分け、各 update notification を正確な target と active lifecycle へ追跡できるようにします。
  includes:
    - zh: 纳入会话内由成功 `resources/subscribe` 建立、绑定一个 URI、可接收对应 updated 通知并由 unsubscribe 或会话结束终止的状态记录。
      en: Includes session state established by a successful `resources/subscribe`, bound to one URI, eligible for matching updated notifications, and terminated by unsubscribe or session end.
      ja: 成功した `resources/subscribe` で確立し、一 URI に束縛され、対応 updated notification を受け、unsubscribe または session end で終了する state record を含みます。
  excludes:
    - zh: 排除 subscribe/unsubscribe 请求消息、ResourceDefinition、单次 `resources/read`、resources capability，以及无需逐 URI 建订的 `notifications/resources/list_changed`。
      en: Excludes subscribe and unsubscribe request messages, ResourceDefinition, one-time `resources/read`, the resources capability, and `notifications/resources/list_changed`, which requires no per-URI subscription.
      ja: subscribe/unsubscribe request message、ResourceDefinition、単発 `resources/read`、resources capability、URI ごとの subscribe を要しない `notifications/resources/list_changed` を除きます。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - subscription_id
  fields:
    - id: resource_uri
      labels:
        zh: 订阅 URI
        en: subscribed URI
        ja: subscribed URI
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 成功 resources/subscribe 的 params.uri；它定义通知覆盖范围的根，但通知 URI 可为服务器文档化的子资源。
        en: The params.uri from the successful resources/subscribe. It is the root of the notification scope, while a notification URI may identify a server-documented sub-resource.
        ja: successful resources/subscribe の params.uri で notification scope の root ですが、notification URI は server-documented sub-resource でも構いません。
      allowed_values: []
      pattern: null
      example_value: file:///repo
      source_claims:
        - claim-resource-subscription-002
  constraints:
    - id: resource-subscription-lifecycle-interval
      severity: error
      expression_language: plain
      expression: status=active REQUIRES ended_at to be absent; status=ended REQUIRES ended_at >= established_at; only active subscriptions may match resource-updated notifications.
      explanations:
        zh: active 时 ended_at 必须为空；ended 时 ended_at 必须存在且不早于 established_at；只有 active 订阅可匹配更新通知。
        en: ended_at is absent while active; ended subscriptions require ended_at at or after established_at; only active subscriptions match update notifications.
        ja: active では ended_at は absent、ended では established_at 以後の ended_at が required、update notification は active subscription のみ matching します。
      source_claims:
        - claim-resource-subscription-003
  required_relation_constraints:
    - id: resource-subscription-targets-one-resource-definition
      direction: outgoing
      predicate: subscribes_to
      target_concept_id: ResourceDefinition
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个订阅状态必须关联一个其 URI 与 resource_uri 相同的 ResourceDefinition；子资源更新通过通知关系覆盖，不改变订阅目标身份。
        en: Each subscription state must reference one ResourceDefinition whose URI equals resource_uri; sub-resource updates are covered by the notification relation and do not change target identity.
        ja: 各 subscription state は resource_uri と同じ URI の ResourceDefinition 一つを参照し、sub-resource update は notification relation が扱い target identity を変えません。
      source_claims:
        - claim-resource-subscription-004
examples:
  - id: resource-subscription-positive-schema-updates
    kind: positive
    labels:
      zh: 订阅 schema.json 更新
      en: Subscribe to schema.json updates
      ja: schema.json update を subscribe
    scenario_id: null
    descriptions:
      zh: 客户端在会话 `s-42` 中订阅 `file:///repo`；服务器声明该 URI 覆盖仓库文件，并随后对其子资源 `file:///repo/schema.json` 发送 updated 通知，直至客户端退订。
      en: In session `s-42`, a client subscribes to `file:///repo`. The server documents repository files as sub-resources and later emits an updated notification for `file:///repo/schema.json` until the client unsubscribes.
      ja: session `s-42` で client が `file:///repo` を subscribe し、server は repository file を sub-resource と文書化して `file:///repo/schema.json` の updated notification を送り、client unsubscribe まで続きます。
    field_values:
      subscription_id: resource-subscription:s-42:repo
      session_id: mcp-session-s-42
      target_ref: resource:file:///repo
      resource_uri: file:///repo
      status: active
      established_at: 2026-07-16T08:00:00Z
    related_node_ids:
      - ResourceSubscription
      - MCPSubscription
      - ResourceDefinition
      - MCPResourceUpdatedNotification
    related_relation_ids:
      - ResourceSubscription-is_a-MCPSubscription
      - ResourceSubscription-subscribes_to-ResourceDefinition
      - MCPResourceUpdatedNotification-updates-ResourceSubscription
    expected_result:
      zh: 建立一条 active ResourceSubscription，并把同 URI 的 updated 通知关联到它。
      en: An active ResourceSubscription is established and the same-URI updated notification is linked to it.
      ja: active ResourceSubscription を確立し、同 URI の updated notification を関連付けます。
    why_valid_or_invalid:
      zh: 具有明确订阅者、单一 URI、建订事件、匹配通知和可终止生命周期。
      en: It has a specific subscriber, one URI, an establishment event, a matching notification, and a terminable lifecycle.
      ja: 特定 subscriber、一 URI、establishment event、matching notification、終了可能 lifecycle を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-resource-subscription-005
  - id: resource-subscription-boundary-list-changed
    kind: boundary
    labels:
      zh: 资源列表变化不等于 URI 订阅
      en: Resource-list change is not a URI subscription
      ja: resource-list change は URI subscription ではない
    scenario_id: null
    descriptions:
      zh: 服务器因资源目录增加条目而发送 `notifications/resources/list_changed`；客户端此前没有对任何 URI 执行 `resources/subscribe`，所以该通知只使列表缓存失效，不形成 ResourceSubscription。
      en: A server emits `notifications/resources/list_changed` after adding a directory entry; the client has never issued `resources/subscribe` for any URI, so the notification invalidates the list cache but creates no ResourceSubscription.
      ja: server が resource directory entry 追加後に `notifications/resources/list_changed` を送りましたが、client はどの URI にも `resources/subscribe` していません。notification は list cache を invalidate するだけで ResourceSubscription を作りません。
    field_values:
      notification: notifications/resources/list_changed
      resource_uri: null
      subscribe_request_seen: false
    related_node_ids:
      - ResourceSubscription
      - MCPResourceList
      - MCPNotification
    related_relation_ids: []
    expected_result:
      zh: 刷新资源列表，但订阅状态集合保持为空。
      en: The resource list is refreshed while the subscription-state set remains empty.
      ja: resource list を refresh し、subscription-state set は空のままです。
    why_valid_or_invalid:
      zh: 列表变化通知没有单一目标 URI，也没有建立资源订阅所需的 subscribe 请求。
      en: A list-change notification has no single target URI and no subscribe request that could establish resource-subscription state.
      ja: list-change notification は単一 target URI も subscription state を確立する subscribe request も持ちません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-resource-subscription-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ResourceSubscription-is_a-MCPSubscription
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: ResourceSubscription是一种MCPSubscription
    en: ResourceSubscription is a MCPSubscription
    ja: ResourceSubscriptionがMCPSubscriptionを一種である
  definitions:
    zh: ResourceSubscription 是 MCPSubscription 的严格子型；其必要身份差异是：MCP 资源订阅是一种信息记录，也是 MCP 订阅（MCPSubscription）的严格子型；它在客户端成功发送 `resources/subscribe` 后针对一个资源 URI 持续存在，接受同 URI 的 `notifications/resources/updated`，并由 `resources/unsubscribe` 或会话关闭终止；它不是 ResourceDefinition、请求消息或 list_changed。
    en: "ResourceSubscription is a strict subtype of MCPSubscription; its necessary identity differentia is: An MCP resource subscription is an information record and strict MCPSubscription subtype that persists for one resource URI after a successful resources/subscribe, receives notifications/resources/updated for that URI, and ends with resources/unsubscribe or session closure. It is not a ResourceDefinition, request message, or list_changed notification."
    ja: ResourceSubscription は MCPSubscription の strict subtype であり、必要な identity differentia は次の通りです：MCP resource subscription は MCPSubscription の一種で successful resources/subscribe 後一 URI に存続し同 URI の notifications/resources/updated を受け、resources/unsubscribe/session close で終了します。ResourceDefinition・request・list_changed ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
    en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
    ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: MCPSubscription反向关联ResourceSubscription
      en: MCPSubscription is the inverse target of ResourceSubscription
      ja: MCPSubscriptionからResourceSubscriptionへの逆読解
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ResourceSubscription-is_a-MCPSubscription-example-positive-001
      kind: positive
      labels:
        zh: ResourceSubscription-is_a-MCPSubscription 正例
        en: Positive case for ResourceSubscription-is_a-MCPSubscription
        ja: ResourceSubscription-is_a-MCPSubscription の正例
      scenario_id: null
      descriptions:
        zh: 客户端在会话 `s-42` 中对 `file:///repo/schema.json` 发送 `resources/subscribe`；服务器随后针对同一 URI 发出 `notifications/resources/updated`，直至客户端退订。
        en: In session `s-42`, a client sends `resources/subscribe` for `file:///repo/schema.json`; the server later emits `notifications/resources/updated` for the same URI until the client unsubscribes.
        ja: session `s-42` で client が `file:///repo/schema.json` に `resources/subscribe` を送り、client が unsubscribe するまで server が同じ URI へ `notifications/resources/updated` を送ります。
      field_values: {}
      related_node_ids:
        - ResourceSubscription
        - MCPSubscription
      related_relation_ids:
        - ResourceSubscription-is_a-MCPSubscription
      expected_result:
        zh: 建立 ResourceSubscription-is_a-MCPSubscription，并保留所述协议方向与条件。
        en: Assert ResourceSubscription-is_a-MCPSubscription with the stated protocol direction and conditions.
        ja: ResourceSubscription-is_a-MCPSubscription を stated protocol direction/condition 付きで確立します。
      why_valid_or_invalid:
        zh: 仅当对象满足 ResourceSubscription 的全部身份条件时，才能沿 is_a 归入 MCPSubscription。
        en: Assert the subtype edge only when the object satisfies every identity condition of ResourceSubscription.
        ja: object が ResourceSubscription の全 identity condition を満たす時だけ is_a edge を確立します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-resource-subscription-007
    - id: ResourceSubscription-is_a-MCPSubscription-example-boundary-001
      kind: boundary
      labels:
        zh: ResourceSubscription-is_a-MCPSubscription 边界例
        en: Boundary case for ResourceSubscription-is_a-MCPSubscription
        ja: ResourceSubscription-is_a-MCPSubscription の境界例
      scenario_id: null
      descriptions:
        zh: 服务器因资源目录增加条目而发送 `notifications/resources/list_changed`；客户端此前没有对任何 URI 执行 `resources/subscribe`，所以该通知只使列表缓存失效，不形成 ResourceSubscription。
        en: A server emits `notifications/resources/list_changed` after adding a directory entry; the client has never issued `resources/subscribe` for any URI, so the notification invalidates the list cache but creates no ResourceSubscription.
        ja: server が resource directory entry 追加後に `notifications/resources/list_changed` を送りましたが、client はどの URI にも `resources/subscribe` していません。notification は list cache を invalidate するだけで ResourceSubscription を作りません。
      field_values: {}
