        expected_result:
          zh: 建立 ResourceSubscription-subscribes_to-ResourceDefinition，并保留所述协议方向与条件。
          en: Assert ResourceSubscription-subscribes_to-ResourceDefinition with the stated protocol direction and conditions.
          ja: ResourceSubscription-subscribes_to-ResourceDefinition を stated protocol direction/condition 付きで確立します。
        why_valid_or_invalid:
          zh: 订阅请求成功，URI 解析到该资源定义，且当前时间处于订阅有效期。
          en: The subscribe request succeeded, URI resolves to the resource definition, and current time lies within the subscription's valid interval.
