          en: After subscribe succeeds for file:///repo/schema.json, the subscription links to the definition with that URI.
          ja: file:///repo/schema.json subscribe 成功後 subscription が同 URI definition に結び付きます。
        field_values: {}
        related_node_ids:
          - ResourceSubscription
          - ResourceDefinition
        related_relation_ids:
