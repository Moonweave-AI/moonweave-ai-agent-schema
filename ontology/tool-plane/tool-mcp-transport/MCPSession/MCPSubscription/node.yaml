    locator: MCP Resources > Listing, Reading, Templates, List Changed, Subscriptions, and Resource Updated Notification
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-mcp-subscription-002
    source: eng-proto-mcp-resources-2025-06-18
