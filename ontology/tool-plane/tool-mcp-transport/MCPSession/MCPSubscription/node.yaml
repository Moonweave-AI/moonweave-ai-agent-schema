    supports: "The official MCP Resources specification separates concrete resources, URI templates, reads, list-change notifications, and per-resource subscriptions. Only notifications/resources/updated is tied to a subscribed URI; notifications/resources/list_changed invalidates discovery without creating a subscription. For this reviewed edge, the operational reading is: MCPSession establishes MCPSubscription after the correlated subscribe request succeeds and ends its valid interval after successful unsubscribe or session shutdown; capability advertisement or list discovery alone creates no subscription."
    locator: MCP Resources > Listing, Reading, Templates, List Changed, Subscriptions, and Resource Updated Notification
    evidence_kind: design-inference
