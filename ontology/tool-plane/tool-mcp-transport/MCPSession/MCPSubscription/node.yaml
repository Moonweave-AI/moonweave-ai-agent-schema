schema: moonweave.ai/ontology-node/v1
id: MCPSubscription
kind: concept
status: review
labels:
  zh: MCP 订阅
  en: MCP subscription
  ja: MCP 購読
semantics:
  short_definition:
    zh: 会话中针对服务器项目维持更新通知的已建立订阅状态。
    en: An established session state for receiving update notifications about a server item.
    ja: server item の更新通知を受けるため session 内で確立された subscription state。
  definition:
    zh: MCP 订阅是一种信息记录，表示会话内对一个协议项目成功建立并持续到退订或断连的更新状态；当前标准具体子型是 ResourceSubscription。它不是 capability 声明、subscribe 请求消息或无需逐项订阅的 list_changed 通知。
    en: An MCP subscription is an information record for an item-specific update state successfully established within a session and lasting until unsubscribe or disconnect; the current standard concrete subtype is ResourceSubscription. It is not a capability declaration, subscribe request message, or list_changed notification that requires no item subscription.
    ja: MCP subscription は session 内で確立し unsubscribe/disconnect まで続く item-specific update state の情報記録で、現 standard subtype は ResourceSubscription です。capability・subscribe request・item subscription 不要の list_changed ではありません。
  why_needed:
    zh: 把持续状态与建订请求、能力支持和通知事件分开，才能回答“当前订阅什么、何时失效、这条通知属于哪段生命周期”。
    en: Separating ongoing state from subscribe requests, capability support, and notification events makes it possible to answer what is currently subscribed, when it ended, and which lifecycle a notification belongs to.
    ja: ongoing state を subscribe request・capability support・notification event から分け、現在の購読対象、終了時点、notification が属する lifecycle を答えられるようにします。
  includes:
    - zh: 纳入成功建立后在 MCP 会话内持续存在、具有明确订阅者与目标、并可关联后续更新通知及取消事件的订阅状态。
      en: Includes subscription state that persists in an MCP session after successful establishment, has a specific subscriber and target, and can be linked to later update notifications and cancellation.
      ja: 確立成功後 MCP session 内で持続し、特定 subscriber と target を持ち、後続 update notification・cancellation に結び付く subscription state を含みます。
  excludes:
    - zh: 排除 `resources/subscribe` 请求消息本身、resources capability、一次 `resources/read`，以及 tools/prompts/resources 的 `list_changed` 通知支持。
      en: Excludes the `resources/subscribe` request message itself, the resources capability, a one-time `resources/read`, and support for tools, prompts, or resources `list_changed` notifications.
      ja: "`resources/subscribe` request message 自体、resources capability、単発 `resources/read`、tools/prompts/resources の `list_changed` notification support を除きます。"
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - subscription_id
  fields:
    - id: subscription_id
      labels:
        zh: 订阅标识
        en: subscription ID
        ja: subscription ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识会话内一项已建立的协议订阅状态。
        en: Stably identifies one established protocol-subscription state within a session.
        ja: session 内の一 established protocol-subscription state を安定識別します。
      allowed_values: []
      pattern: null
      example_value: resource-subscription:s-42:schema
      source_claims:
        - claim-mcp-subscription-002
    - id: session_id
      labels:
        zh: 会话引用
        en: session reference
        ja: session 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用建立并限制该订阅生命周期的 MCPSession。
        en: References the MCPSession that establishes and bounds the subscription lifecycle.
        ja: subscription lifecycle を確立・制限する MCPSession を参照します。
      allowed_values: []
      pattern: null
      example_value: mcp-session-s-42
      source_claims:
        - claim-mcp-subscription-003
    - id: target_ref
      labels:
        zh: 订阅目标引用
        en: subscription-target reference
        ja: subscription target 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被逐项订阅的协议对象；具体子型收窄目标种类。
        en: References the individually subscribed protocol object; a concrete subtype narrows the target kind.
        ja: 個別 subscribe された protocol object を参照し、concrete subtype が target kind を狭めます。
      allowed_values: []
      pattern: null
      example_value: resource:file:///repo/schema.json
      source_claims:
        - claim-mcp-subscription-004
    - id: status
      labels:
        zh: 订阅状态
        en: subscription status
        ja: subscription status
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分可接收更新的活动状态与退订或断连后的结束状态。
        en: Distinguishes update-eligible active state from ended state after unsubscribe or disconnect.
        ja: update-eligible active state と unsubscribe/disconnect 後の ended state を区別します。
      allowed_values:
        - id: MCPSubscriptionStatusActive
          value: active
          labels:
            zh: 活动
            en: active
            ja: active
          definitions:
            zh: 成功订阅后且尚未结束。
            en: Successfully established and not yet ended.
            ja: successfully established で未終了。
          status: accepted
          source_claims:
            - claim-mcp-subscription-005
        - id: MCPSubscriptionStatusEnded
          value: ended
          labels:
            zh: 已结束
            en: ended
            ja: ended
          definitions:
            zh: 退订成功或会话终止。
            en: Ended by successful unsubscribe or session termination.
            ja: unsubscribe success/session termination で終了。
          status: accepted
          source_claims:
            - claim-mcp-subscription-006
      pattern: null
      example_value: active
      source_claims:
        - claim-mcp-subscription-007
    - id: established_at
      labels:
        zh: 建立时刻
        en: established at
        ja: established at
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录成功 subscribe 响应后订阅开始生效的时刻。
        en: Records when the subscription became effective after a successful subscribe response.
        ja: successful subscribe response 後に subscription が有効化した時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T08:00:00Z
      source_claims:
        - claim-mcp-subscription-008
    - id: ended_at
      labels:
        zh: 结束时刻
        en: ended at
        ja: ended at
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录退订成功或会话终止导致订阅失效的时刻。
        en: Records when unsubscribe success or session termination ended the subscription.
        ja: unsubscribe success/session termination で subscription が失効した時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T09:30:00Z
      source_claims:
        - claim-mcp-subscription-009
  constraints: []
  required_relation_constraints: []
examples:
  - id: mcp-subscription-positive-resource-state
    kind: positive
    labels:
      zh: 资源订阅的共同状态
      en: Common state of a resource subscription
      ja: resource subscription の共通 state
    scenario_id: null
    descriptions:
      zh: 客户端成功订阅 `file:///repo/schema.json` 后，在当前会话内保存订阅者、URI 和建立时间；该 ResourceSubscription 同时满足 MCPSubscription 的共同状态定义。
      en: After successfully subscribing to `file:///repo/schema.json`, the client retains the subscriber, URI, and establishment time in the current session; that ResourceSubscription also satisfies the common MCPSubscription state definition.
      ja: client が `file:///repo/schema.json` を正常に subscribe した後、current session に subscriber・URI・established time を保持します。この ResourceSubscription は MCPSubscription の共通 state 定義も満たします。
    field_values:
      subscription_id: resource-subscription:s-42:schema
      session_id: mcp-session-s-42
      target_ref: resource:file:///repo/schema.json
      status: active
      established_at: 2026-07-16T08:00:00Z
    related_node_ids:
      - MCPSubscription
      - ResourceSubscription
    related_relation_ids:
      - ResourceSubscription-is_a-MCPSubscription
    expected_result:
      zh: 同一状态以 ResourceSubscription 为具体类型，并继承 MCPSubscription 的生命周期字段。
      en: The same state is typed as ResourceSubscription and inherits MCPSubscription lifecycle semantics.
      ja: 同じ state を ResourceSubscription とし、MCPSubscription の lifecycle 意味を継承します。
    why_valid_or_invalid:
      zh: 它是成功请求后持续存在的有目标状态，而不是瞬时消息。
      en: It is target-specific state persisting after a successful request, not the transient request message.
      ja: 成功 request 後に持続する target-specific state で、瞬時 message ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-subscription-001
  - id: mcp-subscription-boundary-tool-list-changed
    kind: boundary
    labels:
      zh: 工具列表变更通知不创建订阅
      en: Tool-list change notification creates no subscription
      ja: tool-list change notification は subscription を作らない
    scenario_id: null
    descriptions:
      zh: 服务器声明 `tools.listChanged` 并发送 `notifications/tools/list_changed`；客户端可以重新调用 `tools/list`，但此前没有针对某个工具的 subscribe 操作，因此不存在 MCPSubscription。
      en: A server declares `tools.listChanged` and sends `notifications/tools/list_changed`; the client may call `tools/list` again, but no per-tool subscribe operation occurred, so no MCPSubscription exists.
      ja: server が `tools.listChanged` を宣言し `notifications/tools/list_changed` を送ります。client は `tools/list` を再呼出しできますが、個別 tool への subscribe operation がないため MCPSubscription は存在しません。
    field_values:
      notification: notifications/tools/list_changed
      per_item_subscription: false
    related_node_ids:
      - MCPSubscription
      - MCPNotification
      - MCPToolList
    related_relation_ids: []
    expected_result:
      zh: 记录列表变更通知，不派生订阅状态。
      en: The list-change notification is recorded without deriving subscription state.
      ja: list-change notification を記録し、subscription state は派生しません。
    why_valid_or_invalid:
      zh: "`list_changed` 是能力允许的广播提示，不具有目标项目和建订/退订生命周期。"
      en: "`list_changed` is a capability-enabled broadcast signal and has no target item or subscribe/unsubscribe lifecycle."
      ja: "`list_changed` は capability-enabled broadcast signal で、target item や subscribe/unsubscribe lifecycle を持ちません。"
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-subscription-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: MCPSession-establishes-MCPSubscription
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: MCPSession建立MCPSubscription
    en: MCPSession establishes MCPSubscription
    ja: MCPSessionがMCPSubscriptionを確立する
  definitions:
    zh: MCPSession 在相关 subscribe 请求成功返回后建立 MCPSubscription，并在 unsubscribe 成功或会话关闭时结束其有效期；能力声明或列表发现本身不会建立订阅。
    en: MCPSession establishes MCPSubscription after the correlated subscribe request succeeds and ends its valid interval after successful unsubscribe or session shutdown; capability advertisement or list discovery alone creates no subscription.
    ja: MCPSession は correlated subscribe request 成功後 MCPSubscription を確立し successful unsubscribe/session shutdown で valid interval を終了します。capability advertisement/list discovery だけでは作りません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
    en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
    ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: MCPSubscription反向关联MCPSession
      en: MCPSubscription is the inverse target of MCPSession
      ja: MCPSubscriptionからMCPSessionへの逆読解
  conditions: []
  temporal_scope: valid-time
  boundary_context:
    trust_boundary_concept_id: TrustBoundary
    authority_basis:
      zh: MCPSession 与 MCPSubscription 保持各自本体所有权；此边只记录已核验的 MCP 协议事实，不转移定义权或授权。
      en: MCPSession and MCPSubscription retain their ontology owners; this edge records only a verified MCP protocol fact and transfers neither definitional ownership nor authorization.
      ja: MCPSession と MCPSubscription は各 ontology owner を維持し、この edge は verified MCP protocol fact のみを記録して定義所有権や認可を移転しません。
    protocol_or_resource_context:
      zh: 服务器已声明对应 subscribe 能力，客户端请求有效目标，且成功响应与当前会话相关。
      en: The server declared the relevant subscribe capability, the client requested a valid target, and the success response correlates within the current session.
      ja: server が relevant subscribe capability を宣言し client が valid target を要求して success response が current session 内で相関します。
  constraints: []
  examples:
    - id: MCPSession-establishes-MCPSubscription-example-positive-001
      kind: positive
      labels:
        zh: MCPSession-establishes-MCPSubscription 正例
        en: Positive case for MCPSession-establishes-MCPSubscription
        ja: MCPSession-establishes-MCPSubscription の正例
      scenario_id: null
      descriptions:
        zh: resources/subscribe 对 file:///repo/schema.json 成功返回后创建活动订阅。
        en: A successful resources/subscribe for file:///repo/schema.json creates an active subscription.
        ja: file:///repo/schema.json の successful resources/subscribe 後 active subscription を作ります。
      field_values: {}
      related_node_ids:
        - MCPSession
        - MCPSubscription
      related_relation_ids:
        - MCPSession-establishes-MCPSubscription
      expected_result:
        zh: 建立 MCPSession-establishes-MCPSubscription，并保留所述协议方向与条件。
        en: Assert MCPSession-establishes-MCPSubscription with the stated protocol direction and conditions.
        ja: MCPSession-establishes-MCPSubscription を stated protocol direction/condition 付きで確立します。
      why_valid_or_invalid:
        zh: 服务器已声明对应 subscribe 能力，客户端请求有效目标，且成功响应与当前会话相关。
        en: The server declared the relevant subscribe capability, the client requested a valid target, and the success response correlates within the current session.
        ja: server が relevant subscribe capability を宣言し client が valid target を要求して success response が current session 内で相関します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-mcp-subscription-010
    - id: MCPSession-establishes-MCPSubscription-example-boundary-001
      kind: boundary
      labels:
        zh: MCPSession-establishes-MCPSubscription 边界例
        en: Boundary case for MCPSession-establishes-MCPSubscription
        ja: MCPSession-establishes-MCPSubscription の境界例
      scenario_id: null
      descriptions:
        zh: 服务器只在 initialize 中声明 resources.subscribe=true，客户端尚未请求订阅。
        en: The server only declares resources.subscribe=true in initialize; the client has not subscribed.
        ja: server は initialize で resources.subscribe=true を宣言しただけで client は subscribe していません。
      field_values: {}
      related_node_ids:
        - MCPSession
        - MCPSubscription
      related_relation_ids:
        - MCPSession-establishes-MCPSubscription
      expected_result:
        zh: 不得建立 MCPSession-establishes-MCPSubscription；保留实际出现的较宽或相邻事实。
        en: Do not assert MCPSession-establishes-MCPSubscription; retain the broader or adjacent fact actually present.
        ja: MCPSession-establishes-MCPSubscription を確立せず、実際の broader/adjacent fact を保持します。
      why_valid_or_invalid:
        zh: 能力表示允许请求，不是订阅实例的成立事件。
        en: Capability indicates that a request is permitted; it is not the event establishing a subscription instance.
        ja: capability は request permission で subscription instance establishment event ではありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-mcp-subscription-010
  source_claims:
    - claim-mcp-subscription-010
  distinct_fact_rationale:
    zh: MCPSession-establishes-MCPSubscription 只在其方法、方向、载荷或类型条件成立时记录；它不等于端点共现、反向捷径或词形相似。
    en: MCPSession-establishes-MCPSubscription records only the reviewed method, direction, payload, or subtype condition; it is not endpoint co-occurrence, a redundant inverse shortcut, or lexical similarity.
    ja: MCPSession-establishes-MCPSubscription は reviewed method・direction・payload・subtype condition のみを記録し、endpoint 共起・redundant inverse shortcut・lexical similarity ではありません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
