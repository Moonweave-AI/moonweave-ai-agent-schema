    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-mcp-session-008
    source: eng-proto-mcp-2025-spec
    supports: MCP lifecycle separates initialization, normal operation, and shutdown behavior.
    locator: MCP 2025-11-25 > Base Protocol > Lifecycle
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-mcp-session-009
    source: eng-proto-mcp-spec
    supports: The MCP lifecycle requires initialization to negotiate protocol version and capabilities before either side begins ordinary protocol operations. This directly supports the negotiated-before-use integrity constraint.
    locator: Specification > Architecture, base protocol, and server features
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-mcp-session-010
    source: eng-proto-mcp-spec
    supports: MCP uses a client-server architecture in which one client initiates the connection and initialization exchange. Moonweave requires each MCPSession record to identify exactly one client through the accepted has_participant fact.
    locator: Specification > Architecture, base protocol, and server features
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-mcp-session-011
    source: eng-proto-mcp-spec
    supports: MCP defines the server as the counterparty that exposes negotiated features to a connected client. Moonweave therefore requires each MCPSession record to identify exactly one server participant.
    locator: Specification > Architecture, base protocol, and server features
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-mcp-session-012
    source: eng-proto-mcp-2025-spec
    supports: "MCP 2025-11-25 requires initialization to be the first client-server interaction, exchanges distinct client and server capability declarations, negotiates one protocol version, enters operation only after notifications/initialized, and shuts down through the selected transport. For this reviewed edge, the operational reading is: MCPSession has one MCPClient participant maintaining isolated protocol state for the specific server; a host may manage multiple clients, but the host itself and clients for other servers are not this session endpoint."
    locator: MCP 2025-11-25 > Base Protocol > Lifecycle > Initialization, Capability Negotiation, Operation, and Shutdown
    evidence_kind: design-inference
