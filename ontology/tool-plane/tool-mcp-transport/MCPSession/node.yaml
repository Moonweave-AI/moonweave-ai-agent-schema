schema: moonweave.ai/ontology-node/v1
id: MCPSession
kind: concept
status: review
labels:
  zh: MCP 会话
  en: MCP Session
  ja: MCP セッション
semantics:
  short_definition:
    zh: 由协议版本、协商能力和一对客户端/服务器端点约束的有状态交互期间。
    en: A stateful interaction period bound to one client/server pair, protocol version, and negotiated capabilities.
    ja: 一対の client/server、プロトコル版、交渉済み能力に結び付く状態付き対話期間。
  definition:
    zh: MCP 会话是一种实体，表示一个客户端—服务器端点对从初始化、版本与能力协商、运行直到传输关闭的有状态协议上下文；它约束消息 id、能力和版本，不等同于裸 TCP/HTTP 连接、OAuth token session、宿主聚合状态或单个请求。
    en: An MCP session is an entity representing the stateful protocol context for one client-server endpoint pair from initialization and version/capability negotiation through operation until transport closure. It scopes message IDs, capabilities, and version and is not a raw TCP/HTTP connection, OAuth token session, host aggregate, or one request.
    ja: MCP session は一 client-server endpoint pair の initialization・version/capability negotiation・operation・transport close までを表す entity です。message ID/capability/version を scope し raw connection・OAuth session・host aggregate・single request ではありません。
  why_needed:
    zh: 会话把版本和能力承诺固定到具体端点对，使验证器能够拒绝初始化前消息、未协商特性和错误服务器上的状态复用。
    en: The session binds version and capability commitments to a concrete endpoint pair, allowing validators to reject pre-initialization traffic, unnegotiated features, and state reused with the wrong server.
    ja: セッションは版・能力の約束を具体的端点対へ結び付け、初期化前通信、未交渉機能、別サーバーへの状態再利用を拒否可能にします。
  includes:
    - zh: 纳入完成初始化握手并处于运行或关闭过程中的特定客户端—服务器协议状态。
      en: Includes the protocol state of a specific client-server pair after the initialization handshake and through operation or shutdown.
      ja: 初期化ハンドシェイク後、運用・終了までの特定 client–server プロトコル状態を含みます。
  excludes:
    - zh: 排除尚未初始化的传输连接、单个 JSON-RPC 请求、OAuth 令牌会话以及 host 跨服务器聚合状态。
      en: Excludes uninitialized transport connections, individual JSON-RPC requests, OAuth token sessions, and host-level cross-server aggregation state.
      ja: 未初期化 transport 接続、個別 JSON-RPC 要求、OAuth token セッション、host のサーバー横断集約状態を除きます。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - mcp_session_id
  fields:
    - id: mcp_session_id
      labels:
        zh: MCP 会话标识
        en: MCP session ID
        ja: MCP セッション ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次客户端与服务器之间的 MCP 会话。
        en: Stable identifier for one MCP session between a client and server.
        ja: クライアントとサーバー間の一つの MCP セッションを安定して識別します。
      allowed_values: []
      pattern: null
      example_value: mcp-session-001
      source_claims:
        - claim-mcp-session-002
    - id: protocol_version
      labels:
        zh: 协议版本
        en: protocol version
        ja: プロトコルバージョン
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 初始化期间协商并用于该会话的 MCP 协议版本。
        en: MCP protocol version negotiated during initialization and used by this session.
        ja: 初期化中に交渉され、このセッションで使用される MCP プロトコルバージョンです。
      allowed_values: []
      pattern: null
      example_value: 2025-11-25
      source_claims:
        - claim-mcp-session-003
    - id: state
      labels:
        zh: 会话状态
        en: session state
        ja: セッション状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: MCP 会话在初始化、活动、关闭或失败生命周期中的状态。
        en: State in the initialized, active, closed, or failed MCP lifecycle.
        ja: initialized、active、closed、failed の MCP ライフサイクル状態です。
      allowed_values: []
      pattern: null
      example_value: initialized
      source_claims:
        - claim-mcp-session-004
    - id: phase
      labels:
        zh: 协议阶段
        en: protocol phase
        ja: protocol phase
      datatype: enum
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分初始化协商、正常操作与终止三个协议阶段，不与成功或失败状态混为一体。
        en: Distinguishes initialization negotiation, normal operation, and termination phases without conflating phase with success or failure state.
        ja: initialization negotiation・normal operation・termination phase を区別し、success/failure state と混同しません。
      allowed_values:
        - id: MCPSessionPhaseInitialization
          value: initialization
          labels:
            zh: 初始化
            en: initialization
            ja: initialization
          definitions:
            zh: 版本与能力尚在协商。
            en: Protocol version and capabilities are being negotiated.
            ja: protocol version/capability を交渉中。
          status: accepted
          source_claims:
            - claim-mcp-session-005
        - id: MCPSessionPhaseOperation
          value: operation
          labels:
            zh: 运行
            en: operation
            ja: operation
          definitions:
            zh: 初始化完成后的普通协议交互。
            en: Ordinary protocol interaction after initialization completes.
            ja: initialization 完了後の ordinary protocol interaction。
          status: accepted
          source_claims:
            - claim-mcp-session-006
        - id: MCPSessionPhaseTermination
          value: termination
          labels:
            zh: 终止
            en: termination
            ja: termination
          definitions:
            zh: 传输关闭或会话失败后的终止阶段。
            en: The terminating phase after transport closure or session failure.
            ja: transport closure/session failure 後の terminating phase。
          status: accepted
          source_claims:
            - claim-mcp-session-007
      pattern: null
      example_value: operation
      source_claims:
        - claim-mcp-session-008
  constraints:
    - id: mcp-session-negotiated-before-use
      severity: error
      expression_language: plain
      expression: requests other than initialization occur only after protocol version and capabilities are negotiated
      explanations:
        zh: 除初始化外的请求只能在协议版本和能力协商完成后发生。
        en: Requests other than initialization occur only after protocol version and capabilities are negotiated.
        ja: 初期化以外の要求はプロトコルバージョンと能力の交渉後にのみ発生します。
      source_claims:
        - claim-mcp-session-009
  required_relation_constraints:
    - id: mcp-session-has-client
      direction: outgoing
      predicate: has_participant
      target_concept_id: MCPClient
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: MCP 会话必须有一个客户端参与者。
        en: An MCP session has one client participant.
        ja: MCP セッションには一つのクライアント参加者があります。
      source_claims:
        - claim-mcp-session-010
    - id: mcp-session-has-server
      direction: outgoing
      predicate: has_participant
      target_concept_id: MCPServer
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: MCP 会话必须有一个服务器参与者。
        en: An MCP session has one server participant.
        ja: MCP セッションには一つのサーバー参加者があります。
      source_claims:
        - claim-mcp-session-011
examples:
  - id: mcp-session-positive-negotiated-operation
    kind: positive
    labels:
      zh: 完成握手后的运行会话
      en: Operational session after handshake
      ja: ハンドシェイク後の運用セッション
    scenario_id: null
    descriptions:
      zh: 客户端请求版本 `2025-11-25` 并声明 roots；服务器返回同版及 resources；客户端发送 `notifications/initialized` 后调用 `resources/list`。
      en: The client requests version `2025-11-25` with roots, the server returns the same version with resources, and the client sends `notifications/initialized` before calling `resources/list`.
      ja: client が `2025-11-25` と roots を要求し、server が同版と resources を返し、client が `notifications/initialized` 後に `resources/list` を呼びます。
    field_values:
      mcp_session_id: mcp-session-roots-resources-1
      protocol_version: 2025-11-25
      state: active
      phase: operation
    related_node_ids:
      - MCPSession
      - MCPClient
      - MCPServer
      - MCPCapability
    related_relation_ids:
      - MCPSession-has_participant-MCPClient
      - MCPSession-has_participant-MCPServer
      - MCPSession-enables-MCPCapability
    expected_result:
      zh: 会话记录固定该端点对、版本与能力集合。
      en: The session record binds the endpoint pair, version, and capability set.
      ja: セッション記録は端点対、版、能力集合を固定します。
    why_valid_or_invalid:
      zh: 三步初始化已完成，后续调用发生在协商合同内。
      en: The three-step initialization is complete and the later call occurs under the negotiated contract.
      ja: 三段階初期化が完了し、後続呼出しは交渉済み契約内です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-session-001
  - id: mcp-session-boundary-preinitialize-http
    kind: boundary
    labels:
      zh: 初始化前的 HTTP 连接
      en: HTTP connection before initialization
      ja: 初期化前 HTTP 接続
    scenario_id: null
    descriptions:
      zh: 客户端打开 `/mcp` 的 HTTP 连接但尚未发送 `initialize`，服务端也未返回协议版本。
      en: A client opens an HTTP connection to `/mcp` but has not sent `initialize`, and the server has returned no protocol version.
      ja: client が `/mcp` へ HTTP 接続を開きますが `initialize` は未送信で、server も版を返していません。
    field_values:
      transport: streamable-http
      initialized: false
    related_node_ids:
      - MCPSession
      - MCPTransport
    related_relation_ids: []
    expected_result:
      zh: 只能识别传输连接，不能建立 MCPSession。
      en: Only a transport connection is present; no MCPSession is established.
      ja: transport 接続だけが存在し、MCPSession は成立しません。
    why_valid_or_invalid:
      zh: 缺少版本与能力握手，无法形成会话级协议合同。
      en: Without version and capability negotiation, no session-level protocol contract exists.
      ja: 版・能力交渉がなく、セッション契約が成立しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-mcp-session-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: MCPSession-has_participant-MCPClient
    predicate: has_participant
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: MCPSession包含参与方MCPClient
      en: MCPSession has participant MCPClient
      ja: MCPSessionがMCPClientをparticipantを持つ
    definitions:
      zh: MCPSession 包含一个为特定服务器维护独立协议状态的 MCPClient 参与方；宿主可管理多个客户端，但宿主本身与其他服务器连接不能成为该会话的客户端端点。
      en: MCPSession has one MCPClient participant maintaining isolated protocol state for the specific server; a host may manage multiple clients, but the host itself and clients for other servers are not this session endpoint.
      ja: MCPSession は specific server 向け isolated protocol state を持つ一 MCPClient participant を含みます。host 自体や他 server の client connection は当 session endpoint ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
      en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
      ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
    inverse_reading:
      predicate: participates_in
      labels:
        zh: MCPClient反向关联MCPSession
        en: MCPClient is the inverse target of MCPSession
        ja: MCPClientからMCPSessionへの逆読解
    conditions: []
    temporal_scope: valid-time
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: MCPSession 与 MCPClient 保持各自本体所有权；此边只记录已核验的 MCP 协议事实，不转移定义权或授权。
        en: MCPSession and MCPClient retain their ontology owners; this edge records only a verified MCP protocol fact and transfers neither definitional ownership nor authorization.
        ja: MCPSession と MCPClient は各 ontology owner を維持し、この edge は verified MCP protocol fact のみを記録して定義所有権や認可を移転しません。
      protocol_or_resource_context:
        zh: 客户端发送该会话的 initialize 请求，并持续持有请求 id、能力与传输状态直至关闭。
        en: The client sends this session's initialize request and retains its request-ID, capability, and transport state until shutdown.
        ja: client が session initialize request を送り shutdown まで request-ID/capability/transport state を保持します。
    constraints: []
    examples:
      - id: MCPSession-has_participant-MCPClient-example-positive-001
        kind: positive
        labels:
          zh: MCPSession-has_participant-MCPClient 正例
          en: Positive case for MCPSession-has_participant-MCPClient
          ja: MCPSession-has_participant-MCPClient の正例
        scenario_id: null
        descriptions:
          zh: host 为 repo-server 创建 repo-client-17，并由其发送 initialize。
          en: The host creates repo-client-17 for repo-server, and that client sends initialize.
          ja: host が repo-server 向け repo-client-17 を作り initialize を送信します。
        field_values: {}
        related_node_ids:
          - MCPSession
          - MCPClient
        related_relation_ids:
          - MCPSession-has_participant-MCPClient
        expected_result:
          zh: 建立 MCPSession-has_participant-MCPClient，并保留所述协议方向与条件。
          en: Assert MCPSession-has_participant-MCPClient with the stated protocol direction and conditions.
          ja: MCPSession-has_participant-MCPClient を stated protocol direction/condition 付きで確立します。
        why_valid_or_invalid:
          zh: 客户端发送该会话的 initialize 请求，并持续持有请求 id、能力与传输状态直至关闭。
          en: The client sends this session's initialize request and retains its request-ID, capability, and transport state until shutdown.
          ja: client が session initialize request を送り shutdown まで request-ID/capability/transport state を保持します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-mcp-session-012
      - id: MCPSession-has_participant-MCPClient-example-boundary-001
        kind: boundary
        labels:
          zh: MCPSession-has_participant-MCPClient 边界例
          en: Boundary case for MCPSession-has_participant-MCPClient
          ja: MCPSession-has_participant-MCPClient の境界例
        scenario_id: null
        descriptions:
          zh: 同一 host 的 db-client-3 连接另一台数据库 MCPServer。
          en: The same host's db-client-3 connects to a different database MCPServer.
          ja: 同じ host の db-client-3 が別 database MCPServer に接続します。
        field_values: {}
        related_node_ids:
          - MCPSession
          - MCPClient
        related_relation_ids:
          - MCPSession-has_participant-MCPClient
        expected_result:
          zh: 不得建立 MCPSession-has_participant-MCPClient；保留实际出现的较宽或相邻事实。
          en: Do not assert MCPSession-has_participant-MCPClient; retain the broader or adjacent fact actually present.
          ja: MCPSession-has_participant-MCPClient を確立せず、実際の broader/adjacent fact を保持します。
        why_valid_or_invalid:
          zh: MCP 客户端状态按服务器连接隔离，另一连接不是该会话组成部分。
          en: MCP client state is isolated per server connection, so the other connection is not part of this session.
          ja: MCP client state は server connection 毎に隔離され other connection は当 session part ではありません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-mcp-session-012
    source_claims:
      - claim-mcp-session-012
    distinct_fact_rationale:
      zh: MCPSession-has_participant-MCPClient 只在其方法、方向、载荷或类型条件成立时记录；它不等于端点共现、反向捷径或词形相似。
      en: MCPSession-has_participant-MCPClient records only the reviewed method, direction, payload, or subtype condition; it is not endpoint co-occurrence, a redundant inverse shortcut, or lexical similarity.
      ja: MCPSession-has_participant-MCPClient は reviewed method・direction・payload・subtype condition のみを記録し、endpoint 共起・redundant inverse shortcut・lexical similarity ではありません。
    layout_role: cross-link
    review_status: accepted
    target: concept:MCPClient
  - id: MCPSession-has_participant-MCPServer
    predicate: has_participant
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: MCPSession包含参与方MCPServer
      en: MCPSession has participant MCPServer
      ja: MCPSessionがMCPServerをparticipantを持つ
    definitions:
      zh: MCPSession 包含一个返回 initialize 结果并提供服务器能力的 MCPServer 参与方；其上游 API、OAuth 授权服务器、代理或同进程其他 MCP 服务不因依赖关系成为该会话参与方。
      en: MCPSession has one MCPServer participant returning the initialize result and providing server capabilities; an upstream API, OAuth authorization server, proxy, or another MCP service in the same process does not become this session participant through dependency.
      ja: MCPSession は initialize result と server capability を提供する一 MCPServer participant を含みます。upstream API・OAuth server・proxy・同 process 別 MCP service は dependency だけで participant になりません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
      en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
      ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
    inverse_reading:
      predicate: participates_in
      labels:
        zh: MCPServer反向关联MCPSession
        en: MCPServer is the inverse target of MCPSession
        ja: MCPServerからMCPSessionへの逆読解
    conditions: []
    temporal_scope: valid-time
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: MCPSession 与 MCPServer 保持各自本体所有权；此边只记录已核验的 MCP 协议事实，不转移定义权或授权。
        en: MCPSession and MCPServer retain their ontology owners; this edge records only a verified MCP protocol fact and transfers neither definitional ownership nor authorization.
        ja: MCPSession と MCPServer は各 ontology owner を維持し、この edge は verified MCP protocol fact のみを記録して定義所有権や認可を移転しません。
      protocol_or_resource_context:
        zh: 服务器接收该会话 initialize、返回协商版本与能力，并持续处理该连接的合法消息。
        en: The server receives this session's initialize, returns negotiated version and capabilities, and continues processing valid messages on that connection.
        ja: server が session initialize を受信し negotiated version/capability を返して connection の valid message を処理します。
    constraints: []
    examples:
      - id: MCPSession-has_participant-MCPServer-example-positive-001
        kind: positive
        labels:
          zh: MCPSession-has_participant-MCPServer 正例
          en: Positive case for MCPSession-has_participant-MCPServer
          ja: MCPSession-has_participant-MCPServer の正例
        scenario_id: null
        descriptions:
          zh: repo-server-2 返回 protocolVersion=2025-11-25 与 tools 能力。
          en: repo-server-2 returns protocolVersion 2025-11-25 and tools capability.
          ja: repo-server-2 が protocolVersion=2025-11-25 と tools capability を返します。
        field_values: {}
        related_node_ids:
          - MCPSession
          - MCPServer
        related_relation_ids:
          - MCPSession-has_participant-MCPServer
        expected_result:
          zh: 建立 MCPSession-has_participant-MCPServer，并保留所述协议方向与条件。
          en: Assert MCPSession-has_participant-MCPServer with the stated protocol direction and conditions.
          ja: MCPSession-has_participant-MCPServer を stated protocol direction/condition 付きで確立します。
        why_valid_or_invalid:
          zh: 服务器接收该会话 initialize、返回协商版本与能力，并持续处理该连接的合法消息。
          en: The server receives this session's initialize, returns negotiated version and capabilities, and continues processing valid messages on that connection.
          ja: server が session initialize を受信し negotiated version/capability を返して connection の valid message を処理します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-mcp-session-013
      - id: MCPSession-has_participant-MCPServer-example-boundary-001
        kind: boundary
        labels:
          zh: MCPSession-has_participant-MCPServer 边界例
          en: Boundary case for MCPSession-has_participant-MCPServer
          ja: MCPSession-has_participant-MCPServer の境界例
        scenario_id: null
        descriptions:
          zh: repo-server-2 调用外部 Git API 获取数据。
          en: repo-server-2 calls an external Git API for data.
          ja: repo-server-2 が external Git API から data を取得します。
        field_values: {}
        related_node_ids:
          - MCPSession
          - MCPServer
        related_relation_ids:
          - MCPSession-has_participant-MCPServer
        expected_result:
          zh: 不得建立 MCPSession-has_participant-MCPServer；保留实际出现的较宽或相邻事实。
          en: Do not assert MCPSession-has_participant-MCPServer; retain the broader or adjacent fact actually present.
          ja: MCPSession-has_participant-MCPServer を確立せず、実際の broader/adjacent fact を保持します。
        why_valid_or_invalid:
          zh: 上游数据源没有发送或接收该 MCP 会话消息，因此不是 MCPServer 参与方。
          en: The upstream data source neither sends nor receives this MCP session's messages and is not its MCPServer participant.
          ja: upstream data source は当 MCP session message を送受信せず MCPServer participant ではありません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-mcp-session-013
    source_claims:
