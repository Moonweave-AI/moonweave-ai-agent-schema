source_claims:
  - id: claim-mcp-session-001
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 requires initialization to be the first client-server interaction, exchanges distinct client and server capability declarations, negotiates one protocol version, enters operation only after notifications/initialized, and shuts down through the selected transport.
    locator: MCP 2025-11-25 > Base Protocol > Lifecycle > Initialization, Capability Negotiation, Operation, and Shutdown
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-mcp-session-002
    source: eng-proto-mcp-spec
    supports: The MCP architecture defines a stateful client-server connection whose initialization, negotiated capabilities, requests, and notifications belong to one protocol interaction. Moonweave adds mcp_session_id as a stable engineering identifier for that connection; the identifier field is a design inference, not an MCP wire field.
    locator: Specification > Architecture, base protocol, and server features
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-mcp-session-003
    source: eng-proto-mcp-spec
    supports: MCP initialization requires the client and server to negotiate a protocol version before ordinary operations. The protocol_version field records the version accepted for this session and is directly grounded in that initialization contract.
    locator: Specification > Architecture, base protocol, and server features
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-mcp-session-004
    source: eng-proto-mcp-spec
    supports: MCP defines an initialization phase before normal requests and requires both sides to respect connection closure and protocol errors. Moonweave summarizes those observable phases as initialized, active, closed, or failed session state; the four-value lifecycle is a design inference over the protocol state machine.
    locator: Specification > Architecture, base protocol, and server features
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-mcp-session-005
    source: eng-proto-mcp-2025-spec
    supports: MCP requires initialization and capability negotiation before ordinary operations.
    locator: MCP 2025-11-25 > Lifecycle > Initialization
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-mcp-session-006
    source: eng-proto-mcp-2025-spec
    supports: After initialized notification, ordinary feature requests and notifications may proceed.
    locator: MCP 2025-11-25 > Lifecycle > Operation
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-mcp-session-007
    source: eng-proto-mcp-2025-spec
    supports: MCP connections end through transport-specific shutdown or failure handling.
