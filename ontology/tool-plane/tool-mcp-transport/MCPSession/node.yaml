schema: moonweave.ai/ontology-node/v1
id: MCPSession
kind: concept
labels:
  zh: MCP 会话
  en: MCP session
  ja: MCP セッション
semantics:
  short_definition:
    zh: 一个 MCP 客户端与一个 MCP 服务器之间经过初始化、协商、运行和关闭的有状态协议交互。
    en: A stateful protocol interaction between one MCP client and one MCP server that proceeds through initialization, negotiation, operation, and shutdown.
    ja: 初期化、交渉、運用、終了を経る、一つの MCP クライアントと一つの MCP サーバー間の状態を持つプロトコル対話。
  definition:
    zh: >
      MCP 会话是在客户端与服务器之间发生的一组逻辑相关交互。它以初始化开始：客户端首先发送 initialize，双方协商协议版本、
      功能和实现信息，客户端再发送 notifications/initialized。之后双方在已协商功能内交换消息，最终由底层传输关闭。
      会话不是单条 JSON-RPC 消息、服务器进程的全部生命周期或主机与所有服务器之间的全局连接池。
    en: >
      An MCP session is a set of logically related interactions between a client and a server. It begins with initialization:
      the client first sends initialize, the parties negotiate protocol version, capabilities, and implementation information,
      then the client sends notifications/initialized. They subsequently exchange messages within negotiated features and finally
      close through the underlying transport. A session is not one JSON-RPC message, a server process's whole lifetime, or a host's global connection pool.
    ja: >
      MCP セッションはクライアントとサーバー間の論理的に関連する対話の集合である。初期化で始まり、クライアントが最初に
      initialize を送り、双方がプロトコルバージョン、capability、実装情報を交渉し、その後クライアントが
      notifications/initialized を送る。以後は交渉済み機能内でメッセージ交換し、下位トランスポートで終了する。
      セッションは一件の JSON-RPC メッセージ、サーバープロセス全寿命、またはホストの全体接続プールではない。
  why_needed:
    zh: 会话给版本和功能协商、状态管理、超时与有序关闭提供边界，避免双方在未协商功能上操作。
    en: It bounds version and feature negotiation, state management, timeouts, and orderly closure so parties do not operate on unnegotiated features.
    ja: 交渉されていない機能で動作しないよう、バージョンと機能の交渉、状態管理、タイムアウト、整然とした終了の境界を与える。
  includes:
    -
      zh: initialize、initialize response 和 initialized 通知
      en: initialize, initialize response, and initialized notification
      ja: initialize、initialize 応答、initialized 通知
    - {zh: 协商后操作期的双向 MCP 消息, en: Bidirectional MCP messages during negotiated operation, ja: 交渉済み運用期の双方向 MCP メッセージ}
    - {zh: 传输信号的关闭, en: Transport-signaled closure, ja: トランスポートで通知する終了}
  excludes:
    -
      zh: 单条请求、响应或通知
      en: A single request, response, or notification
      ja: 単一の要求、応答、通知
    - {zh: 未初始化的 HTTP endpoint 或 stdio 子进程, en: An uninitialized HTTP endpoint or stdio subprocess, ja: 初期化されていない HTTP endpoint または stdio 子プロセス}
  semantic_kind: process
  aliases:
    - {language: en, value: client-server session, alias_kind: synonym}
engineering:
  explanation:
    zh: 客户端以 initialize 开始会话并保存协商版本与 capability；在 initialized 之前限制发送请求。操作期只调用已协商功能，并为每个请求配置超时；关闭时使用 stdio 流关闭或 HTTP 连接关闭。
    en: A client begins a session with initialize and stores the negotiated version and capabilities; it limits requests before initialized. Operation uses only negotiated features and configures a timeout per request; shutdown closes stdio streams or HTTP connections.
    ja: クライアントは initialize でセッションを始め交渉済みバージョンと capability を保存し、initialized 前の要求を制限する。運用では交渉済み機能だけを使い要求ごとにタイムアウトを設定し、終了では stdio ストリームまたは HTTP 接続を閉じる。
  typical_input:
    - description: The client initiates a session.
      format: '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{},"clientInfo":{"name":"host","version":"1.0"}}}'
      source_claims: [mcp-session-initialization]
  typical_output:
    - description: The server acknowledges negotiated capability information.
      format: '{"jsonrpc":"2.0","id":1,"result":{"protocolVersion":"2025-11-25","capabilities":{},"serverInfo":{"name":"server","version":"1.0"}}}'
      source_claims: [mcp-session-initialization]
  reference_implementations:
    - name: MCP Lifecycle specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
      description: Normative lifecycle phases, initialize sequence, capability negotiation, timeouts, and shutdown.
structure:
  identity_keys: ["local_client_endpoint","local_server_endpoint","local_negotiated_protocol_version"]
  fields:
    - id: local_client_endpoint
      labels: {zh: "本地客户端端点", en: "Local client endpoint", ja: "ローカルクライアント端点"}
      definitions:
        zh: "Moonweave 的本地端点引用；MCP 不定义 client_id 作为会话 JSON-RPC 字段。"
        en: "A Moonweave-local endpoint reference; MCP does not define client_id as a session JSON-RPC field."
        ja: "Moonweave ローカル端点参照。MCP は client_id をセッション JSON-RPC フィールドとして定義しない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "client-42"
      allowed_values: []
      source_claims: [mcp-session-architecture]
    - id: local_server_endpoint
      labels: {zh: "本地服务器端点", en: "Local server endpoint", ja: "ローカルサーバー端点"}
      definitions:
        zh: "Moonweave 的本地端点引用；MCP 不定义 server_id 作为会话 JSON-RPC 字段。"
        en: "A Moonweave-local endpoint reference; MCP does not define server_id as a session JSON-RPC field."
        ja: "Moonweave ローカル端点参照。MCP は server_id をセッション JSON-RPC フィールドとして定義しない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "server-weather"
      allowed_values: []
      source_claims: [mcp-session-architecture]
    - id: local_negotiated_protocol_version
      labels: {zh: "本地协商协议版本", en: "Local negotiated protocol version", ja: "ローカル交渉済みプロトコル版"}
      definitions:
        zh: "Moonweave 的本地会话状态，从 initialize 中 protocolVersion 的选择和确认得出；不是通用会话字段。"
        en: "A Moonweave-local session state derived from selecting and confirming protocolVersion in initialize; it is not a generic session field."
        ja: "initialize で protocolVersion を選択・確認して得られる Moonweave ローカルセッション状態。一般的なセッションフィールドではない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2025-11-25"
      allowed_values: []
      source_claims: [mcp-session-version]
    - id: local_lifecycle_phase
      labels: {zh: "本地生命周期阶段", en: "Local lifecycle phase", ja: "ローカルライフサイクル段階"}
      definitions:
        zh: "Moonweave 的本地状态初始化、操作或关闭，概括协议生命周期；不是 wire 字段。"
        en: "A Moonweave-local state of initialization, operation, or shutdown summarizing the protocol lifecycle; it is not a wire field."
        ja: "プロトコルライフサイクルを要約する初期化・運用・終了の Moonweave ローカル状態。wire フィールドではない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "operation"
      allowed_values: ["initialization","operation","shutdown"]
      source_claims: [mcp-session-phases]
  constraints:
    - id: session-initialize-first
      severity: error
      expression_language: plain
      expression: Initialization is the first client-server interaction and the client initiates it with initialize.
      explanation:
        zh: 初始化必须是客户端与服务器的第一次交互，且客户端以 initialize 发起。
        en: Initialization must be the first client-server interaction and the client initiates it with initialize.
        ja: 初期化はクライアント・サーバーの最初の対話であり、クライアントが initialize で開始する。
      source_claims: [mcp-session-initialization]
    - id: session-operation-needs-negotiation
      severity: error
      expression_language: plain
      expression: During operation both parties respect the negotiated protocol version and use only successfully negotiated capabilities.
      explanation:
        zh: 运行期双方遵守协商版本，并只使用已成功协商的能力。
        en: During operation both parties respect the negotiated protocol version and use only successfully negotiated capabilities.
        ja: 運用中、両者は交渉済みプロトコルバージョンを守り、成功裏に交渉された capability だけを用いる。
      source_claims: [mcp-session-operation]
    - id: session-timeout-bounds-waiting
      severity: warning
      expression_language: plain
      expression: Implementations establish request timeouts and stop waiting after a timeout, ordinarily sending cancellation.
      explanation:
        zh: 实现应为请求设置超时；超时后停止等待，并通常发送取消通知。
        en: Implementations should establish request timeouts and stop waiting after a timeout, ordinarily sending cancellation.
        ja: 実装は要求タイムアウトを設定し、超過後は待機をやめ通常は取消通知を送るべきである。
      source_claims: [mcp-session-timeouts]
  required_relations: []
examples:
  - id: mcp-session-positive-initialized

    labels: {zh: 初始化后进入运行, en: Enter operation after initialization, ja: 初期化後に運用へ移行}

    descriptions:
      zh: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}；同时 Anthropic MCP connector 与 LangChain MCP adapter 提供等价工具调用路径。"
      en: "MCP JSON-RPC tools/call {\"method\":\"tools/call\",\"params\":{\"name\":\"read_file\",\"arguments\":{\"path\":\"/tmp/test.txt\"}}}; Anthropic MCP connector and LangChain MCP adapter provide equivalent tool-call paths."
      ja: MCP JSON-RPC tools/call。Anthropic MCP connector と LangChain MCP adapter が同等 tool-call 経路を提供。
    field_values: {"local_client_endpoint":"client-42","local_server_endpoint":"server-weather","local_negotiated_protocol_version":"2025-11-25","local_lifecycle_phase":"operation"}
    related_node_ids: [MCPSession, MCPClient, MCPServer, MCPMessage]
    related_relation_ids: []

    source_claims: [mcp-session-initialization]
  - id: mcp-session-counterexample-preinitialize-tool-call

    labels: {zh: 初始化前调用工具, en: Tool call before initialization, ja: 初期化前のツール呼び出し}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；arguments 违反 inputSchema required 字段。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; arguments violate inputSchema required fields.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。inputSchema required 違反。
    field_values: {"local_client_endpoint":"client-42","local_server_endpoint":"server-weather","local_negotiated_protocol_version":"2025-11-25","local_lifecycle_phase":"initialization"}
    related_node_ids: [MCPSession, MCPToolCallRequest]
    related_relation_ids: []

    source_claims: [mcp-session-initialization]
  - id: mcp-session-boundary-server-process

    labels: {zh: 会话与服务器进程的边界, en: Boundary between session and server process, ja: セッションとサーバープロセスの境界}

    descriptions:
      zh: MCP wire JSON-RPC 封包 vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP 是传输层非唯一工具范式。
      en: Boundary among MCP wire JSON-RPC envelope, ReAct text Action, Anthropic tool_use structured payload; MCP is transport layer not sole tool paradigm.
      ja: MCP wire JSON-RPC envelope、ReAct テキスト Action、Anthropic tool_use structured payload の境界。MCP は transport 層であり唯一の tool パラダイムではない。
    field_values: {"local_client_endpoint":"client-42","local_server_endpoint":"server-weather","local_negotiated_protocol_version":"2025-11-25","local_lifecycle_phase":"operation"}
    related_node_ids: [MCPSession, MCPServer, MCPStreamableHTTPTransport]
    related_relation_ids: []

    source_claims: [mcp-session-architecture]
  - id: mcp-session-instance-client-42-weather

    labels: {zh: client-42 与 weather 会话, en: client-42 weather session, ja: client-42 weather セッション}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：initialize→tools/list→tools/call read_file path=/README.md 返回 content text block。
      en: MCP Inspector debugging server-filesystem: initialize→tools/list→tools/call read_file path=/README.md returns content text block.
      ja: MCP Inspector が server-filesystem をデバッグ：initialize→tools/list→tools/call read_file。
    field_values: {"local_client_endpoint":"client-42","local_server_endpoint":"server-weather","local_negotiated_protocol_version":"2025-11-25","local_lifecycle_phase":"operation"}
    related_node_ids: [MCPSession, MCPClient, MCPServer]
    related_relation_ids: []

    source_claims: [mcp-session-architecture, mcp-session-operation]
parent_relation: null
relations: []
sources:
  - id: mcp-lifecycle-2025-11-25
    title: Model Context Protocol Specification — Lifecycle
    url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
    source_type: official-specification
    locator: "Lifecycle Phases; Initialization; Version Negotiation; Capability Negotiation; Operation; Shutdown; Timeouts"
    relevance: Defines MCP client-server lifecycle, initialize sequence, negotiated operation, shutdown, and timeouts.
  - id: mcp-architecture-2025-11-25
    title: Model Context Protocol Specification — Architecture
    url: https://modelcontextprotocol.io/specification/2025-11-25/architecture
    source_type: official-specification
    locator: "Architecture; Clients; Capability Negotiation"
    relevance: Defines the stateful client-server session architecture and isolated client-server connections.
source_claims:
  - id: mcp-session-phases
    source: mcp-lifecycle-2025-11-25
    supports: MCP lifecycle has initialization, operation, and shutdown phases.
    locator: "Lifecycle"
    evidence_kind: normative
    confidence: high
  - id: mcp-session-initialization
    source: mcp-lifecycle-2025-11-25
    supports: Initialization is first; the client sends initialize, server responds with version and capabilities, and client sends notifications/initialized before normal operations.
    locator: "Initialization"
    evidence_kind: normative
    confidence: high
  - id: mcp-session-version
    source: mcp-lifecycle-2025-11-25
    supports: Client and server negotiate a supported protocol version in initialize, and the client disconnects if it cannot support the server response version.
    locator: "Version Negotiation"
    evidence_kind: normative
    confidence: high
  - id: mcp-session-operation
    source: mcp-lifecycle-2025-11-25
    supports: During operation parties respect the negotiated version and use only successfully negotiated capabilities.
    locator: "Operation"
    evidence_kind: normative
    confidence: high
  - id: mcp-session-timeouts
    source: mcp-lifecycle-2025-11-25
    supports: Implementations should establish per-request timeouts and issue cancellation after timeout rather than wait indefinitely.
    locator: "Timeouts"
    evidence_kind: normative
    confidence: high
  - id: mcp-session-architecture
    source: mcp-architecture-2025-11-25
    supports: Each host-created client maintains an isolated stateful connection and has a 1:1 relationship with a particular server.
    locator: "Clients"
    evidence_kind: normative
    confidence: high