module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 输入是会话承载的 MCPRequest 及其具体方法子型；MCPResponse-responds_to-MCPRequest 在本面使用请求端点，明确该请求等待同 RequestId 的相关响应，而不把响应误作第二项输入。
          en: Input is an MCPRequest carried by the session and its concrete method subtype; on this facet MCPResponse-responds_to-MCPRequest uses the request endpoint to require a response correlated by the same RequestId, without treating the response as another input.
          ja: 入力は session が運ぶ MCPRequest とその具体的 method subtype です。この面の MCPResponse-responds_to-MCPRequest は request 端点を用いて同じ RequestId の応答を要求し、応答を別の入力とは扱いません。
        family_concept_ids:
          - MCPRequest
        relation_ids:
          - MCPSession-carries-MCPMessage
          - MCPResponse-responds_to-MCPRequest
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 输出是以同 RequestId 回应请求的 MCPResponse。
          en: Output is MCPResponse correlated to the request by the same RequestId.
          ja: output は同 RequestId で request に対応する MCPResponse です。
        family_concept_ids:
          - MCPResponse
        relation_ids:
          - MCPResponse-responds_to-MCPRequest
        not_applicable_reason: null
      failure:
        applicable: true
        description:
          zh: 协议层失败是 MCPErrorResponse，而不是通用 ToolError 或 CallToolResult.isError；它作为 MCPResponse 的严格下位类沿用请求—响应相关事实，is_a 只承担分类而不伪装成失败事件。
          en: Protocol-layer failure is MCPErrorResponse rather than generic ToolError or CallToolResult.isError; as a strict MCPResponse subtype it uses the request-response correlation fact, while is_a remains taxonomy rather than masquerading as a failure event.
          ja: protocol-layer failure は generic ToolError や CallToolResult.isError ではなく MCPErrorResponse です。MCPResponse の厳密な下位型として request-response 対応事実を用い、is_a は失敗 event ではなく分類だけを担います。
        family_concept_ids:
          - MCPErrorResponse
        relation_ids:
          - MCPResponse-responds_to-MCPRequest
        not_applicable_reason: null
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: MCP 的错误处理依赖具体方法、传输状态与应用策略；规范没有定义一个适用于所有 MCPErrorResponse 的通用恢复活动，而且错误响应本身不会重新协商已启用能力。
          en: MCP error handling depends on the method, transport state, and application policy; the specification defines no universal recovery activity for every MCPErrorResponse, and an error response does not renegotiate enabled capabilities by itself.
          ja: MCP error handling は method・transport state・application policy に依存し、全 MCPErrorResponse に共通する recovery activity は定義されず、error response 自体は enabled capability を再交渉しません。
