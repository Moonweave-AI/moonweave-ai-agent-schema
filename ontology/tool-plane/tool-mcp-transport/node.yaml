schema: moonweave.ai/ontology-node/v1
id: tool-mcp-transport
kind: module
labels:
  zh: MCP 会话与传输
  en: MCP session and transport
  ja: MCP セッションとトランスポート
semantics:
  short_definition:
    zh: 描述 MCP 客户端与服务器如何建立有状态会话、协商能力并通过标准传输交换 JSON-RPC 消息的模块。
    en: The module describing how MCP clients and servers establish stateful sessions, negotiate capabilities, and exchange JSON-RPC messages over standard transports.
    ja: MCP クライアントとサーバーが状態を持つセッションを確立し、capability を交渉し、標準トランスポートで JSON-RPC メッセージを交換する方法を記述するモジュール。
  definition:
    zh: >
      MCP 会话与传输模块覆盖 MCP 的 client-host-server 通信层：一对客户端和服务器建立会话、初始化时协商版本与功能、
      在运行期交换请求、响应和通知，并通过 stdio 或 Streamable HTTP 承载 UTF-8 JSON-RPC。它包括端点角色、
      会话、消息、能力、传输、资源订阅及服务器向客户端的采样与信息征集请求。它不定义工具或资源的领域业务，
      不替代 host 的用户体验或应用专有授权策略。
    en: >
      The MCP session and transport module covers MCP's client-host-server communication layer: a client and server establish
      a session, negotiate version and features at initialization, exchange requests, responses, and notifications during operation,
      and carry UTF-8 JSON-RPC over stdio or Streamable HTTP. It includes endpoint roles, sessions, messages, capabilities,
      transports, resource subscriptions, and server-to-client sampling and elicitation requests. It does not define a tool's or
      resource's domain business logic, nor replace host user experience or application-specific authorization policy.
    ja: >
      MCP セッションとトランスポートモジュールは MCP の client-host-server 通信層を扱う。クライアントとサーバーがセッションを
      確立し、初期化でバージョンと機能を交渉し、運用中に要求、応答、通知を交換し、stdio または Streamable HTTP で UTF-8
      JSON-RPC を運ぶ。端点役割、セッション、メッセージ、capability、トランスポート、リソース購読、サーバーからクライアントへの
      サンプリングと情報取得要求を含む。ツールやリソースの領域業務ロジック、host の UX、アプリ固有の認可方針は定義しない。
  why_needed:
    zh: 统一的通信生命周期和传输边界使客户端可安全地连接本地或远程服务器，并只使用双方明确协商的能力。
    en: A common communication lifecycle and transport boundary lets clients safely connect local or remote servers and use only explicitly negotiated capabilities.
    ja: 共通の通信ライフサイクルとトランスポート境界により、クライアントはローカルまたはリモートサーバーへ安全に接続し、明示的に交渉された capability だけを使える。
  includes:
    - {zh: client-host-server 端点角色和隔离连接, en: Client-host-server endpoint roles and isolated connections, ja: client-host-server の端点役割と分離接続}
    -
      zh: 初始化、版本/能力协商、运行和关闭
      en: Initialization, version/capability negotiation, operation, and shutdown
      ja: 初期化、バージョン/capability 交渉、運用、終了
    - {zh: JSON-RPC 消息和 stdio/Streamable HTTP 传输, en: JSON-RPC messages and stdio/Streamable HTTP transports, ja: JSON-RPC メッセージと stdio/Streamable HTTP トランスポート}
  excludes:
    -
      zh: 单个工具、提示或资源的领域定义
      en: Domain definitions of individual tools, prompts, or resources
      ja: 個別ツール、prompt、resource の領域定義
    - {zh: host 应用的显示界面或模型供应商 API, en: Host-application presentation UI or a model-provider API, ja: host アプリの表示 UI またはモデルプロバイダー API}
  semantic_kind: module
  aliases: []
engineering:
  explanation:
    zh: 实现先为每个服务器建立隔离客户端连接，然后执行 initialize/initialized。会话层根据协商 capabilities 路由 JSON-RPC，传输适配器负责 stdio 或 HTTP framing；业务功能在各自方法的协议章节中实现。
    en: An implementation creates an isolated client connection per server, then performs initialize/initialized. The session layer routes JSON-RPC by negotiated capabilities and the transport adapter owns stdio or HTTP framing; feature business behavior remains in its protocol section.
    ja: 実装はサーバーごとに分離クライアント接続を作り、initialize/initialized を実行する。セッション層は交渉済み capability で JSON-RPC をルーティングし、トランスポートアダプターが stdio または HTTP framing を担う。機能業務動作は各プロトコル節に残る。
  typical_input:
    - description: Initial client-to-server handshake carried by a selected standard transport.
      format: '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{},"clientInfo":{"name":"host","version":"1.0"}}}'
      source_claims: [mcp-module-lifecycle]
  typical_output:
    - description: Negotiated server result followed by client readiness notification.
      format: '{"jsonrpc":"2.0","id":1,"result":{"protocolVersion":"2025-11-25","capabilities":{},"serverInfo":{"name":"server","version":"1.0"}}}\n{"jsonrpc":"2.0","method":"notifications/initialized"}'
      source_claims: [mcp-module-lifecycle]
  reference_implementations:
    - name: MCP Architecture and Lifecycle specifications
      url: https://modelcontextprotocol.io/specification/2025-11-25/architecture
      description: Canonical roles, isolated connections, capability negotiation, and lifecycle context.
structure:
  identity_keys: ["local_connection_scope"]
  fields:
    - id: local_connection_scope
      labels: {zh: "本地连接范围", en: "Local connection scope", ja: "ローカル接続スコープ"}
      definitions:
        zh: "Moonweave 用于将一个客户端到一个服务端的隔离连接归入本模块的本地引用；它不是 MCP 线上的 JSON 字段。"
        en: "A Moonweave-local reference that places one isolated client-to-server connection in this module; it is not an MCP wire JSON field."
        ja: "一つの分離された client-to-server 接続をこのモジュールに置く Moonweave ローカル参照であり、MCP ワイヤ JSON フィールドではない。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "weather-host-to-weather-server"
      allowed_values: []
      source_claims: [mcp-module-architecture]
    - id: protocol_version
      labels: {zh: "协商协议版本", en: "Negotiated protocol version", ja: "交渉済みプロトコル版"}
      definitions:
        zh: "该连接初始化时协商出的 MCP protocolVersion；其线上的来源是 initialize 请求和结果。"
        en: "The MCP protocolVersion negotiated when this connection initializes; its wire source is the initialize request and result."
        ja: "この接続の初期化時に交渉される MCP protocolVersion。ワイヤ上の出所は initialize 要求と結果である。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "2025-11-25"
      allowed_values: []
      source_claims: [mcp-module-lifecycle]
    - id: transport_kind
      labels: {zh: "传输类型", en: "Transport kind", ja: "トランスポート種別"}
      definitions:
        zh: "承载该连接 MCP JSON-RPC 消息的传输选择；标准选择为 stdio 或 Streamable HTTP，符合要求的自定义传输也可被明确记录。"
        en: "The transport choice carrying this connection's MCP JSON-RPC messages; standard choices are stdio and Streamable HTTP, while a conforming custom transport may be explicitly recorded."
        ja: "この接続の MCP JSON-RPC メッセージを運ぶ transport の選択。標準選択は stdio と Streamable HTTP であり、適合する custom transport も明示的に記録できる。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: "stdio"
      allowed_values: ["stdio", "streamable-http", "custom"]
      source_claims: [mcp-module-transports]
  constraints:
    - id: module-uses-json-rpc-and-standard-transports
      severity: error
      expression_language: plain
      expression: MCP communication uses UTF-8 JSON-RPC and the standard stdio or Streamable HTTP transport mechanisms unless a custom transport preserves MCP message format and lifecycle.
      explanation:
        zh: MCP 通信使用 UTF-8 JSON-RPC 和标准 stdio 或 Streamable HTTP 传输；自定义传输必须保留 MCP 消息格式和生命周期。
        en: MCP communication uses UTF-8 JSON-RPC and the standard stdio or Streamable HTTP transport mechanisms unless a custom transport preserves MCP message format and lifecycle.
        ja: MCP 通信は UTF-8 JSON-RPC と標準 stdio または Streamable HTTP を使い、custom transport は MCP メッセージ形式とライフサイクルを保つ。
      source_claims: [mcp-module-transports]
    - id: module-negotiates-before-operation
      severity: error
      expression_language: plain
      expression: Client and server negotiate version and capabilities during initialization before normal feature operation.
      explanation:
        zh: 客户端和服务器在正常功能运行前于初始化中协商版本和能力。
        en: Client and server negotiate version and capabilities during initialization before normal feature operation.
        ja: クライアントとサーバーは通常の機能運用前に初期化でバージョンと capability を交渉する。
      source_claims: [mcp-module-lifecycle]
  required_relations: []
examples:
  - id: mcp-module-positive-local-server

    labels: {zh: 本地 stdio 服务器连接, en: Local stdio server connection, ja: ローカル stdio サーバー接続}

    descriptions:
      zh: MCP JSON-RPC lifecycle initialize→tools/list→tools/call；Anthropic MCP connector 与 LangChain MCP adapter 提供等价传输路径（MCP 是传输层之一，非唯一工具范式）。
      en: MCP JSON-RPC lifecycle initialize→tools/list→tools/call; Anthropic MCP connector and LangChain MCP adapter provide equivalent transport paths (MCP is one transport layer, not sole tool paradigm).
      ja: MCP JSON-RPC lifecycle initialize→tools/list→tools/call。Anthropic MCP connector、LangChain MCP adapter が同等 transport 経路を提供（MCP は transport 層の一つ）。
    field_values: {"local_connection_scope":"weather-host-to-weather-server","protocol_version":"2025-11-25","transport_kind":"stdio"}
    related_node_ids: [tool-mcp-transport, MCPSession, MCPStdioTransport, MCPClient, MCPServer]
    related_relation_ids: []

    source_claims: [mcp-module-architecture, mcp-module-lifecycle, mcp-module-transports]
  - id: mcp-module-counterexample-unnegotiated-feature

    labels: {zh: 未协商功能的操作, en: Operation on an unnegotiated feature, ja: 未交渉機能での操作}

    descriptions:
      zh: 反例：initialize 前 tools/call；混合 MCP JSON-RPC id 与 Anthropic tool_use_id；Streamable HTTP 未授权访问。
      en: Counterexample: tools/call before initialize; mixing MCP JSON-RPC id with Anthropic tool_use_id; unauthorized Streamable HTTP access.
      ja: 反例：initialize 前 tools/call。MCP JSON-RPC id と Anthropic tool_use_id 混同。Streamable HTTP 未認可。
    field_values: {"local_connection_scope":"client-42-to-files-server","protocol_version":"2025-11-25","transport_kind":"streamable-http"}
    related_node_ids: [tool-mcp-transport, MCPCapability, MCPResourceSubscription]
    related_relation_ids: []

    source_claims: [mcp-module-capabilities]
  - id: mcp-module-boundary-tool-business-logic

    labels: {zh: 通信模块与工具业务逻辑边界, en: Boundary between communication module and tool business logic, ja: 通信モジュールとツール業務ロジックの境界}

    descriptions:
      zh: MCP wire JSON-RPC vs ReAct 文本 Action vs Anthropic tool_use 的结构化载荷边界；MCP transport 非工具选择/执行语义本身。
      en: Boundary among MCP wire JSON-RPC, ReAct text Action, Anthropic tool_use structured payload; MCP transport is not tool selection/execution semantics itself.
      ja: MCP wire JSON-RPC、ReAct テキスト Action、Anthropic tool_use の境界。MCP transport は tool 選択/実行 semantics 自体ではない。
    field_values: {"local_connection_scope":"weather-client-to-weather-server","protocol_version":"2025-11-25","transport_kind":"stdio"}
    related_node_ids: [tool-mcp-transport, MCPToolCallRequest, MCPSession]
    related_relation_ids: []

    source_claims: [mcp-module-architecture]
  - id: mcp-module-instance-remote-session

    labels: {zh: 远程 HTTP 会话实例, en: Remote HTTP session instance, ja: リモート HTTP セッション実例}

    descriptions:
      zh: MCP Inspector 调试 server-filesystem：stdio transport initialize protocolVersion 2025-11-25→tools/call read_file。
      en: MCP Inspector debugging server-filesystem: stdio transport initialize protocolVersion 2025-11-25→tools/call read_file.
      ja: MCP Inspector server-filesystem デバッグ：stdio transport initialize→tools/call read_file。
    field_values: {"local_connection_scope":"client-42-to-server-weather","protocol_version":"2025-11-25","transport_kind":"streamable-http"}
    related_node_ids: [tool-mcp-transport, MCPSession, MCPStreamableHTTPTransport, MCPClient, MCPServer]
    related_relation_ids: []

