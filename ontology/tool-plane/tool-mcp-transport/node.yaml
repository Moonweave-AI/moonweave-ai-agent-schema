schema: moonweave.ai/ontology-node/v1
id: tool-mcp-transport
kind: module
status: review
labels:
  zh: MCP 会话、消息与传输
  en: MCP sessions, messages, and transport
  ja: MCP セッション、メッセージ、トランスポート
semantics:
  short_definition:
    zh: MCP 会话、消息与传输描述一对 MCP 客户端与服务器如何协商版本和能力、建立会话、交换可相关的 JSON-RPC 请求、响应与通知，并通过 stdio 或 Streamable HTTP 承载协议交互。它拥有协议发生和线路身份，不拥有被列出或调用的能力定义、业务授权、底层网络路由或协议到核心本体的映射。
    en: MCP sessions, messages, and transport describes how an MCP client and server negotiate version and capabilities, establish a session, exchange correlatable JSON-RPC requests, responses, and notifications, and carry the interaction over stdio or Streamable HTTP. It owns protocol occurrences and wire identities, not the capability definitions listed or invoked, business authorization, underlying network routes, or mappings from MCP to the canonical ontology.
    ja: MCP セッション、メッセージ、トランスポートは、MCP クライアントとサーバーが版と能力を協議し、セッションを確立し、対応付け可能な JSON-RPC の要求、応答、通知を交換し、stdio または Streamable HTTP で対話を運ぶ過程を記述します。所有するのはプロトコル上の発生と通信上の同一性であり、一覧化・呼び出しされる能力定義、業務認可、下位のネットワーク経路、MCP から規範本体への写像ではありません。
  definition:
    zh: MCP 会话、消息与传输描述一对 MCP 客户端与服务器如何协商版本和能力、建立会话、交换可相关的 JSON-RPC 请求、响应与通知，并通过 stdio 或 Streamable HTTP 承载协议交互。它拥有协议发生和线路身份，不拥有被列出或调用的能力定义、业务授权、底层网络路由或协议到核心本体的映射。
    en: MCP sessions, messages, and transport describes how an MCP client and server negotiate version and capabilities, establish a session, exchange correlatable JSON-RPC requests, responses, and notifications, and carry the interaction over stdio or Streamable HTTP. It owns protocol occurrences and wire identities, not the capability definitions listed or invoked, business authorization, underlying network routes, or mappings from MCP to the canonical ontology.
    ja: MCP セッション、メッセージ、トランスポートは、MCP クライアントとサーバーが版と能力を協議し、セッションを確立し、対応付け可能な JSON-RPC の要求、応答、通知を交換し、stdio または Streamable HTTP で対話を運ぶ過程を記述します。所有するのはプロトコル上の発生と通信上の同一性であり、一覧化・呼び出しされる能力定義、業務認可、下位のネットワーク経路、MCP から規範本体への写像ではありません。
  why_needed:
    zh: 让系统能够按协议版本还原一条 MCP 交互：谁与谁连接、协商了什么、哪条消息对应哪次请求，以及使用了何种传输。
    en: "Makes an MCP interaction reconstructable by protocol version: who connected to whom, what was negotiated, which message correlates to which request, and which transport carried it."
    ja: プロトコル版ごとに、誰が誰に接続し、何を協議し、どのメッセージがどの要求に対応し、どのトランスポートを使ったかを復元できるようにします。
  includes:
    - zh: MCP 客户端、服务器、会话生命周期、初始化与能力协商，以及带 RequestId 相关性的请求、成功响应、错误响应和通知。
      en: MCP clients, servers, session lifecycle, initialization and capability negotiation, and RequestId-correlated requests, successful responses, error responses, and notifications.
      ja: MCP クライアント、サーバー、セッションのライフサイクル、初期化と能力協議、RequestId で対応付ける要求、成功応答、エラー応答、通知を含みます。
    - zh: stdio 与 Streamable HTTP 传输、HTTP 场景中的 MCP 授权协议状态、工具/资源/提示的列表与功能请求载荷，以及资源订阅和更新通知。
      en: Stdio and Streamable HTTP transports, MCP authorization protocol state for HTTP, list and feature-request payloads for tools, resources, and prompts, and resource subscriptions and update notifications.
      ja: stdio と Streamable HTTP、HTTP における MCP 認可プロトコルの状態、ツール・リソース・プロンプトの一覧と機能要求のペイロード、リソース購読と更新通知を含みます。
  excludes:
    - zh: 工具、资源和提示的稳定定义归能力目录与定义；列表响应只是协议容器，不成为定义的结构父级。
      en: Durable tool, resource, and prompt definitions belong to capability catalogs and definitions; a list response is only a protocol container, never a structural parent of those definitions.
      ja: ツール、リソース、プロンプトの永続的な定義は能力カタログと定義に属します。一覧応答はプロトコル上の容器にすぎず、定義の構造上の親にはなりません。
    - zh: 通用能力调用、对话消息和工具结果展示分别归能力调用与结果、信息域；MCP 只记录它们如何在线路上表达和相关。
      en: Generic capability invocations, conversational messages, and displayed tool results belong respectively to capability invocation and outcomes and to the information domain; MCP records only how they are represented and correlated on the wire.
      ja: 一般的な能力呼び出し、会話メッセージ、表示されるツール結果は、それぞれ能力呼び出しと結果、情報領域に属します。MCP は通信上の表現と対応付けだけを記録します。
    - zh: 业务授权、网络端点与路由、以及 MCP 构造到核心本体的语义映射分别归授权策略、网络控制和协议映射。
      en: Business authorization, network endpoints and routes, and semantic mappings from MCP constructs to the canonical ontology belong respectively to authorization policy, network control, and protocol mappings.
      ja: 業務認可、ネットワーク端点と経路、MCP 構造から規範本体への意味写像は、それぞれ認可ポリシー、ネットワーク制御、プロトコル写像に属します。
  semantic_kind: null
  aliases: []
purpose:
  zh: 以协议原生身份完整记录 MCP 会话的协商、消息相关、功能载荷、订阅状态和传输方式。
  en: Record MCP negotiation, message correlation, feature payloads, subscription state, and transport using protocol-native identities.
  ja: MCP の協議、メッセージ対応、機能ペイロード、購読状態、トランスポートを、プロトコル固有の同一性で完全に記録します。
structure: null
examples:
  - id: tool-mcp-transport-lifecycle-capability-example-positive
    kind: positive
    labels:
      zh: 完成版本与双向能力协商的 MCP 会话
      en: MCP session with version and bidirectional capability negotiation
      ja: version と双方向 capability を協商済み MCP session
    scenario_id: null
    descriptions:
      zh: session-repo-17 中 repo-client@2.6 发送 initialize id=1，声明 roots 与 sampling；repo-server@4.2 以同 id 接受 2025-11-25 并声明 tools 与 resources.subscribe。客户端发送 initialized 后，会话只启用这四项由正确一侧声明的能力。
      en: In session-repo-17, repo-client@2.6 sends initialize id=1 with roots and sampling. repo-server@4.2 accepts protocol 2025-11-25 on the same ID and declares tools and resources.subscribe. After initialized, the session enables only those four capabilities advertised by the correct side.
      ja: session-repo-17 で repo-client@2.6 が initialize id=1 と roots/sampling を送り、repo-server@4.2 が同 id で protocol 2025-11-25 を受理して tools/resources.subscribe を宣言します。initialized 後、正しい側が advertise した四 capability だけを enable します。
    field_values:
      mcp_session_id: session-repo-17
      client_id: repo-client
      client_version: 2.6.0
      server_id: repo-server
      server_version: 4.2.0
      initialize_request_id: 1
      requested_protocol_version: 2025-11-25
      negotiated_protocol_version: 2025-11-25
      client_advertised_capabilities:
        - roots
        - sampling
      server_advertised_capabilities:
        - tools
        - resources.subscribe
      initialized_notification_received: true
      operation_enabled_capabilities:
        - roots
        - sampling
        - tools
        - resources.subscribe
      operation_started_at: 2026-07-16T11:00:02Z
    related_node_ids:
      - MCPSession
      - MCPParticipant
      - MCPClient
      - MCPServer
      - MCPClientCapability
      - MCPServerCapability
      - MCPCapability
    related_relation_ids:
      - MCPSession-has_participant-MCPParticipant
      - MCPSession-has_participant-MCPClient
      - MCPSession-has_participant-MCPServer
      - MCPClient-advertises-MCPClientCapability
      - MCPServer-advertises-MCPServerCapability
      - MCPSession-enables-MCPCapability
    expected_result:
      zh: 返回唯一客户端、服务器和协商版本，并按声明方向列出四项已启用能力；初始化完成前或未协商的能力不得进入 operation。
      en: Return the unique client, server, and negotiated version and list the four enabled capabilities by advertising side; nothing unnegotiated or pre-initialization is available during operation.
      ja: unique client/server/negotiated version と advertise 側別の四 enabled capability を返し、未協商または initialization 前 capability は operation で利用不可とします。
    why_valid_or_invalid:
      zh: 参与者、版本、能力声明和会话启用是四类独立事实；实现某个 handler 并不等于对端已协商该能力。
      en: Participants, version agreement, capability advertisement, and session enablement are separate facts; implementing a handler does not mean the peer negotiated it.
      ja: participant・version agreement・capability advertisement・session enablement は別 fact で、handler 実装だけでは peer が協商したことになりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-mcp-transport-011
  - id: tool-mcp-transport-lifecycle-capability-example-counter
    kind: counterexample
    labels:
      zh: 把未声明的客户端能力误标为已启用
      en: Undeclared client capability marked as enabled
      ja: 未宣言 client capability を enabled と誤記
    scenario_id: null
    descriptions:
      zh: session-repo-18 的 repo-server 实现 elicitation handler，但 repo-client 的 initialize capabilities 只有 roots；服务器响应也不能代替客户端声明，记录却仍把 elicitation.form 标为 enabled。
      en: repo-server in session-repo-18 implements an elicitation handler, but repo-client's initialize capabilities contain only roots. A server response cannot substitute for client advertisement, yet the record marks elicitation.form enabled.
      ja: session-repo-18 の repo-server は elicitation handler を実装しますが repo-client initialize capability は roots だけです。server response は client advertisement を代替できないのに elicitation.form を enabled と記録します。
    field_values:
      mcp_session_id: session-repo-18
      client_id: repo-client
      server_id: repo-server
      negotiated_protocol_version: 2025-11-25
      client_advertised_capabilities:
        - roots
      server_implemented_handlers:
        - elicitation/create
      server_advertised_capabilities:
        - tools
      incorrectly_enabled_capability: elicitation.form
      advertising_side_required: client
      client_advertisement_present: false
      operation_use_valid: false
    related_node_ids:
      - MCPSession
      - MCPParticipant
      - MCPClient
      - MCPServer
      - MCPClientCapability
      - MCPServerCapability
      - MCPCapability
    related_relation_ids:
      - MCPSession-has_participant-MCPParticipant
      - MCPSession-has_participant-MCPClient
      - MCPSession-has_participant-MCPServer
      - MCPClient-advertises-MCPClientCapability
      - MCPServer-advertises-MCPServerCapability
      - MCPSession-enables-MCPCapability
    expected_result:
      zh: 删除 elicitation.form 的会话启用事实并报告缺少客户端声明；handler 可保留为实现细节，但 operation 不得使用该能力。
      en: Remove the session enablement for elicitation.form and report the missing client advertisement; retain the handler as implementation detail but forbid capability use in operation.
      ja: elicitation.form session enablement を削除し missing client advertisement を報告します。handler は implementation detail として保持できますが operation use は禁止します。
    why_valid_or_invalid:
      zh: MCP 要求 operation 只使用成功协商的能力；服务器实现和客户端声明属于不同主体，不能因名称相同而合并。
      en: MCP permits only successfully negotiated capabilities during operation; server implementation and client advertisement belong to different participants and cannot be merged by name.
      ja: MCP operation は協商済み capability だけを許し、server implementation と client advertisement は別 participant の fact で name 一致では統合できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-mcp-transport-011
  - id: tool-mcp-transport-message-correlation-example-positive
    kind: positive
    labels:
      zh: 同一会话内请求与结果响应一一关联
      en: Request and result response correlate within one session
      ja: 同一 session 内 request/result response の一対一 correlation
    scenario_id: null
    descriptions:
      zh: session-repo-17 中 repo-client 发送 message-req-17（JSON-RPC id=17、method=tools/list），repo-server 接收后返回 message-res-17（同 id、result）；响应明确是 MCPResultResponse，且该请求没有第二个终结响应。
      en: In session-repo-17, repo-client sends message-req-17 with JSON-RPC id=17 and method=tools/list. repo-server receives it and returns message-res-17 with the same ID and a result; the response is explicitly an MCPResultResponse and no second terminal response exists.
      ja: session-repo-17 で repo-client が JSON-RPC id=17/method=tools/list の message-req-17 を送り、repo-server が受信して同 id/result の message-res-17 を返します。response は明示 MCPResultResponse で第二 terminal response はありません。
    field_values:
      mcp_session_id: session-repo-17
      request_message_id: message-req-17
      jsonrpc_request_id: 17
      request_method: tools/list
      request_sender_id: repo-client
      request_receiver_id: repo-server
      response_message_id: message-res-17
      jsonrpc_response_id: 17
      response_sender_id: repo-server
      response_receiver_id: repo-client
      response_subtype: MCPResultResponse
      response_payload_member: result
      terminal_response_count: 1
    related_node_ids:
      - MCPSession
      - MCPMessage
      - MCPRequest
      - MCPResponse
      - MCPResultResponse
      - MCPErrorResponse
      - MCPParticipant
    related_relation_ids:
      - MCPSession-carries-MCPMessage
      - MCPMessage-sent_by-MCPParticipant
      - MCPMessage-received_by-MCPParticipant
      - MCPResponse-responds_to-MCPRequest
      - MCPResultResponse-is_a-MCPResponse
      - MCPErrorResponse-is_a-MCPResponse
    expected_result:
      zh: 返回同一会话、同一 JSON-RPC id、相反发送方向和唯一结果响应；无 id 通知不参与该请求的终结关联。
      en: Return the same session and JSON-RPC ID, reversed sender direction, and one result response; ID-less notifications do not terminate the request.
      ja: 同一 session/JSON-RPC id、逆 sender direction、一 result response を返し、id 無し notification は request terminal correlation に含めません。
    why_valid_or_invalid:
      zh: 关联同时使用会话身份和协议 id；结果响应与错误响应是互斥子型，发送者/接收者也必须与请求方向相反。
      en: Correlation uses both session identity and protocol ID; result and error responses are exclusive subtypes, and sender/receiver direction reverses the request.
      ja: correlation は session identity と protocol id の両方を使い、result/error response は排他的 subtype、sender/receiver direction は request と逆です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-mcp-transport-012
  - id: tool-mcp-transport-message-correlation-example-counter
    kind: counterexample
    labels:
      zh: 跨会话复用 id 并把通知当作响应
      en: Request ID reused across sessions and notification treated as response
      ja: cross-session id 再利用と notification の response 誤認
    scenario_id: null
    descriptions:
      zh: message-req-17 属于 session-repo-17，但系统将 session-admin-4 的 error id=17 关联给它，又把 notifications/tools/list_changed（无 id）计为第二个终结响应。
      en: message-req-17 belongs to session-repo-17, but the system correlates an error with id=17 from session-admin-4 and also counts ID-less notifications/tools/list_changed as a second terminal response.
      ja: message-req-17 は session-repo-17 所属ですが、session-admin-4 の error id=17 を関連付け、さらに id 無し notifications/tools/list_changed を第二 terminal response と数えます。
    field_values:
      request_session_id: session-repo-17
      request_message_id: message-req-17
      jsonrpc_request_id: 17
      foreign_error_session_id: session-admin-4
      foreign_error_message_id: message-error-admin-17
      foreign_error_jsonrpc_id: 17
      notification_message_id: message-notification-tools-changed-9
      notification_method: notifications/tools/list_changed
      notification_jsonrpc_id: null
      asserted_terminal_response_count: 2
      same_session_check_passed: false
      valid_terminal_response_count: 0
    related_node_ids:
      - MCPSession
      - MCPMessage
      - MCPRequest
      - MCPResponse
      - MCPResultResponse
      - MCPErrorResponse
      - MCPParticipant
    related_relation_ids:
      - MCPSession-carries-MCPMessage
      - MCPMessage-sent_by-MCPParticipant
      - MCPMessage-received_by-MCPParticipant
      - MCPResponse-responds_to-MCPRequest
      - MCPResultResponse-is_a-MCPResponse
      - MCPErrorResponse-is_a-MCPResponse
    expected_result:
      zh: 拒绝两条关联并保持请求未终结；只有当前会话中同 id 的 result 或 error 响应才能完成该请求。
      en: Reject both correlations and leave the request unresolved; only a same-ID result or error response in the current session may complete it.
      ja: 二 correlation を拒否して request を unresolved のまま保ち、current session の同 id result/error response だけが完了できます。
    why_valid_or_invalid:
      zh: JSON-RPC id 只在相应关联上下文中有意义；跨会话同号不是同一请求，无 id 通知在类型上也不是 MCPResponse。
      en: A JSON-RPC ID is meaningful only in its correlation context; the same number in another session is not the same request, and an ID-less notification is not an MCPResponse subtype.
      ja: JSON-RPC id は correlation context 内だけで意味を持ち、別 session の同番号は同 request ではなく、id 無し notification は MCPResponse subtype でもありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-mcp-transport-012
  - id: tool-mcp-transport-transport-authorization-example-positive
    kind: positive
    labels:
      zh: 受保护的远程 HTTP 会话
      en: Protected remote HTTP session
      ja: 保護された remote HTTP session
    scenario_id: null
    descriptions:
      zh: 远程 Streamable HTTP 会话跨越 TrustBoundary 访问受保护 MCP 服务器；MCPAuthorization 中绑定资源受众的令牌只适用于该 HTTP 资源，工具操作权限仍需单独判断。
      en: A remote Streamable HTTP session crosses a TrustBoundary to a protected MCP server; the resource-audience-bound token in MCPAuthorization applies only to that HTTP resource, while tool-operation permission remains a separate judgment.
      ja: remote Streamable HTTP session が TrustBoundary を越えて protected MCP server に接続し、MCPAuthorization の resource-audience-bound token はその HTTP resource のみに適用され、tool-operation permission は別に判断します。
    field_values:
      mcp_session_id: session-repository-http-42
      transport_subtype: MCPStreamableHTTPTransport
      mcp_endpoint: https://mcp.example.net/repository
      http_methods:
        - POST
        - GET
      accept_media_types:
        - application/json
        - text/event-stream
      protocol_version_header: 2025-11-25
      crosses_remote_trust_boundary: true
      protected_resource_uri: https://mcp.example.net/repository
      authorization_server: https://auth.example.net
      access_token_audience: https://mcp.example.net/repository
      access_token_scopes:
        - mcp:connect
      resource_audience_validated: true
      generic_tool_permission_inferred: false
      tool_operation_permission_decision_id: permission-decision-search-repository-42
    related_node_ids:
      - MCPSession
      - MCPTransport
      - MCPStdioTransport
      - MCPStreamableHTTPTransport
      - MCPAuthorization
      - TrustBoundary
    related_relation_ids:
      - MCPSession-uses_transport-MCPTransport
      - MCPStdioTransport-is_a-MCPTransport
      - MCPStreamableHTTPTransport-is_a-MCPTransport
      - MCPAuthorization-applies_to-MCPStreamableHTTPTransport
    expected_result:
      zh: 将该会话判定为 Streamable HTTP；令牌只授权访问其受众所指向的 MCP 受保护资源，是否允许具体工具操作仍由独立权限决策回答。
      en: Classify the session as Streamable HTTP. The token authorizes access only to its audience-bound MCP protected resource; a separate permission decision determines whether the concrete tool operation is allowed.
      ja: session を Streamable HTTP と判定します。token は audience に binding された MCP protected resource への access だけを認可し、具体的 tool operation は別の permission decision で判断します。
    why_valid_or_invalid:
      zh: 该记录满足 Streamable HTTP 的端点与协议版本要求，也满足 OAuth 资源参数和令牌受众绑定；它没有把传输级连接授权抬升为任意 `tools/call` 的业务权限。TrustBoundary 仅作跨域边界比较，不虚构未审核关系。
      en: The record satisfies Streamable HTTP endpoint and protocol-version requirements plus OAuth resource-parameter and token-audience binding. It does not elevate transport-level connection authorization into business permission for arbitrary `tools/call` operations. TrustBoundary remains a cross-domain comparison, not an invented relation.
      ja: Streamable HTTP endpoint/protocol-version 要件と OAuth resource parameter/token audience binding を満たし、transport-level connection authorization を任意 `tools/call` の business permission に昇格させません。TrustBoundary は cross-domain comparison のみで未審査 relation を作りません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-mcp-transport-013
  - id: tool-mcp-transport-transport-authorization-example-counter
    kind: counterexample
    labels:
      zh: 把本地 stdio 误当远程 OAuth 资源
      en: Local stdio misclassified as a remote OAuth resource
      ja: local stdio を remote OAuth resource と誤分類
    scenario_id: null
    descriptions:
      zh: 本地 stdio 子进程没有跨越远程 HTTP 信任边界，应从环境取得凭据；若把它标成 OAuth 受保护资源，或把资源令牌解释成通用 tools/call 许可，就混淆了两个边界。
      en: A local stdio subprocess does not cross a remote HTTP trust boundary and should obtain credentials from the environment; marking it as an OAuth protected resource or treating a resource token as generic tools/call permission collapses two distinct boundaries.
