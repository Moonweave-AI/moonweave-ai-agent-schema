            zh: 本体人工复核将 is_a 保留给严格特化，并只把逐边确认的 carries、enables、establishes、has_participant、uses_transport、applies_to 与 produces 事实提升为解释性主骨架；未形成普遍父子事实的消息相关或跨域映射继续作为 cross-link。
            en: Manual ontology review reserves is_a for strict specialization and promotes only edge-reviewed carries, enables, establishes, has_participant, uses_transport, applies_to, and produces facts to the explanatory primary backbone; message correlations or cross-domain mappings without universal parenthood remain cross-links.
            ja: 本体の人工レビューでは is_a を厳密な特殊化に限定し、個別に確認した carries、enables、establishes、has_participant、uses_transport、applies_to、produces の事実だけを説明用 primary backbone へ昇格します。普遍的な親子事実を持たない message correlation やドメイン間 mapping は cross-link に留めます。
