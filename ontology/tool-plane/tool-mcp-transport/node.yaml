                の事実だけを説明用 primary backbone へ昇格します。普遍的な親子事実を持たない message
                correlation やドメイン間 mapping は cross-link に留めます。
    - other_module_id: safety-network-control
      semantic_area:
        zh: 协议会话身份与网络调用身份
        en: Protocol-session identity versus network-call identity
        ja: protocol session identity と network call identity
      candidate_concept_ids:
        - NetworkEndpoint
        - NetworkPolicy
      overlap_reason:
        zh: 一个 MCP 交互可能经历多个网络请求或重连，网络策略拒绝发生在路由层并不重定义 MCP Capability 或 Session。
        en: One MCP interaction can span several network requests or reconnects; a
          network-policy denial occurs at routing and does not redefine MCP
          Capability or Session.
        ja: 一 MCP interaction は複数 network request/reconnect を跨げ、network-policy denial は
          routing layer で起き MCP Capability/Session を再定義しません。
