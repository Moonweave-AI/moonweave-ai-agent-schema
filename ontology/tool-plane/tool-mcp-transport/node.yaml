    authority: A
    status: fetched
    why_it_matters: Initialization, capability negotiation, and operation phases.
  - id: src-mcp-transports
    title: MCP Transports Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-11-25/basic/transports
    version: checked 2026-07-19
    accessed_on: 2026-07-19
    source_type: official-spec
    authority: A
    status: fetched
    why_it_matters: stdio newline framing and Streamable HTTP endpoint rules.
  - id: src-mcp-tools-wire
    title: MCP Server Tools Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
    version: checked 2026-07-19
    accessed_on: 2026-07-19
    source_type: official-spec
    authority: A
    status: fetched
    why_it_matters: tools/call JSON-RPC request and response correlation.
  - id: src-mcp-transport-design
    title: Moonweave tool-mcp-transport module boundary design
    publisher: Moonweave
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    version: checked 2026-07-19
    accessed_on: 2026-07-19
    source_type: design-inference
    authority: B
    status: fetched
    why_it_matters: Wire/session facts separate from registry definitions and invocation attempts.
source_claims:
  - id: claim-tool-mcp-transport-lifecycle
    source: src-mcp-lifecycle
    supports: MCP requires initialization and capability negotiation before ordinary operations.
    locator: Lifecycle > Initialization and Operation
    evidence_kind: primary-spec
    confidence: high
  - id: claim-tool-mcp-transport-stdio
    source: src-mcp-transports
    supports: MCP stdio transport uses newline-delimited JSON-RPC without embedded newlines.
    locator: Transports > stdio
    evidence_kind: primary-spec
    confidence: high
  - id: claim-tool-mcp-transport-tools
    source: src-mcp-tools-wire
    supports: MCP tools/call uses JSON-RPC id correlation between request and Tool Result response.
    locator: Server features > Tools > Calling Tools
    evidence_kind: primary-spec
    confidence: high
  - id: claim-tool-mcp-transport-design
    source: src-mcp-transport-design
    supports: Moonweave treats list responses as protocol containers and enabled capabilities as negotiated session facts.
    locator: MCP sessions, messages, and transport module boundary
    evidence_kind: design-inference
    confidence: high
