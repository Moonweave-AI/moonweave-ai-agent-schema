schema: moonweave.ai/ontology-node/v1
id: tool-mcp-transport
kind: module
labels:
  zh: MCP 会话、消息与传输
  en: MCP sessions, messages, and transport
  ja: MCP セッション、メッセージ、トランスポート
semantics:
  short_definition:
    zh: 描述 MCP 客户端与服务器如何协商版本与能力、交换 JSON-RPC 消息并通过 stdio 或 Streamable HTTP 承载协议交互的模块。
    en: Module describing how MCP clients and servers negotiate version and capabilities, exchange JSON-RPC messages, and carry interactions over stdio or Streamable HTTP.
    ja: MCP client/server が version/capability を協議し JSON-RPC message を交換、stdio/Streamable HTTP で対話を運ぶ module。
  definition:
    zh: MCP 会话、消息与传输以 MCPSession 为状态根，记录 initialize/notifications/initialized 生命周期、RequestId 相关的 MCPRequest/MCPResponse/MCPNotification，以及 MCPStdioTransport 或 MCPStreamableHTTPTransport 绑定。tools/list、resources/list 等列表响应是协议容器，稳定 ToolDefinition 仍归 tool-registry-definition。tools/call 的 JSON-RPC 载荷在此模块记录线路事实，ToolCallAttempt 与 ToolResult 归 tool-invocation-execution。Anthropic MCP connector 与 LangChain MCP adapter 都建立 host 侧 client 会话，但 OAuth 业务授权与 Moonweave 本体映射不在本模块复制。
    en: MCP sessions, messages, and transport roots state in MCPSession, recording initialize and notifications/initialized lifecycle, RequestId-correlated MCPRequest, MCPResponse, and MCPNotification objects, plus MCPStdioTransport or MCPStreamableHTTPTransport bindings. List responses such as tools/list and resources/list are protocol containers; stable ToolDefinition remains in tool-registry-definition. JSON-RPC payloads for tools/call are wire facts here, while ToolCallAttempt and ToolResult belong to tool-invocation-execution. Anthropic MCP connectors and LangChain MCP adapters establish host-side client sessions, but OAuth business authorization and Moonweave canonical mappings are not copied here.
    ja: MCP sessions/messages/transport は MCPSession を state root に initialize/notifications/initialized lifecycle、RequestId 相関 MCPRequest/MCPResponse/MCPNotification、MCPStdioTransport/MCPStreamableHTTPTransport binding を記録。tools/list/resources/list は protocol container で stable ToolDefinition は tool-registry-definition。tools/call JSON-RPC は wire fact、ToolCallAttempt/ToolResult は tool-invocation-execution。Anthropic MCP connector/LangChain MCP adapter は host-side client session を確立しますが OAuth business authorization/Moonweave canonical mapping は複製しません。
  why_needed:
    zh: 没有协议层记录，就无法按 MCP 2025-11-25 还原初始化顺序、哪条响应回答了哪条请求，以及 stdio 换行分帧是否被遵守。
    en: Without protocol-layer records, an MCP 2025-11-25 interaction cannot reconstruct initialization order, which response answered which request, or whether stdio newline framing was honored.
    ja: protocol-layer record がなければ MCP 2025-11-25 interaction の initialization 順序、response/request 対応、stdio newline framing 遵守を復元できません。
  includes:
    - zh: MCPSession、MCPClient、MCPServer、MCPMessage 子类型、MCPCapability 协商、MCPTransport 子类型与 ResourceSubscription。
      en: MCPSession, MCPClient, MCPServer, MCPMessage subtypes, MCPCapability negotiation, MCPTransport subtypes, and ResourceSubscription.
      ja: MCPSession/MCPClient/MCPServer/MCPMessage subtype/MCPCapability negotiation/MCPTransport subtype/ResourceSubscription。
    - zh: initialize、notifications/initialized、tools/call JSON-RPC 与 Streamable HTTP SSE 事件的相关性事实。
      en: Correlation facts for initialize, notifications/initialized, tools/call JSON-RPC, and Streamable HTTP SSE events.
      ja: initialize/notifications/initialized/tools/call JSON-RPC/Streamable HTTP SSE event の correlation fact。
  excludes:
    - zh: ToolDefinition、ToolCallAttempt、PolicyDecision 与通用网络路由。
      en: ToolDefinition, ToolCallAttempt, PolicyDecision, and generic network routing.
      ja: ToolDefinition/ToolCallAttempt/PolicyDecision/generic network routing。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: MCP 2025-11-25 规定 initialization 必须是首个交互，双方交换 client/server capabilities，客户端发送 notifications/initialized 后进入 operation。传输层支持 stdio 换行分帧 JSON-RPC 与 Streamable HTTP 单端点 POST/GET（可选 SSE）。tools/call 请求形如 {"method":"tools/call","params":{"name":"...","arguments":{...}}}，响应 content[] 可含 text、image 或 resource。Moonweave 把 session_id、jsonrpc id 与 transport_spec_id 作为线路身份，不把 list 页成员当作 registry 定义。
    en: MCP 2025-11-25 requires initialization as the first interaction, exchanges client and server capabilities, and enters operation after the client sends notifications/initialized. Transports include stdio newline-delimited JSON-RPC and Streamable HTTP single-endpoint POST/GET with optional SSE. A tools/call request looks like {"method":"tools/call","params":{"name":"...","arguments":{...}}} and responses use content[] with text, image, or resource parts. Moonweave treats session_id, jsonrpc id, and transport_spec_id as wire identities and does not treat list page members as registry definitions.
    ja: MCP 2025-11-25 は initialization を first interaction とし capabilities 交換後 client notifications/initialized で operation 開始。transport は stdio newline-delimited JSON-RPC と Streamable HTTP POST/GET（optional SSE）。tools/call request/response content[] は wire shape。Moonweave は session_id/jsonrpc id/transport_spec_id を wire identity とし list page member を registry definition としません。
  typical_input:
    - description: MCP initialize request and result.
      format: |
        {"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{"roots":{}}}}
        =>
        {"protocolVersion":"2025-11-25","capabilities":{"tools":{}}}
      source_claims: [claim-tool-mcp-transport-lifecycle]
    - description: MCP stdio newline-delimited message framing.
      format: |
        {"jsonrpc":"2.0","id":1,"method":"initialize","params":{...}}
        {"jsonrpc":"2.0","method":"notifications/initialized"}
      source_claims: [claim-tool-mcp-transport-stdio]
  typical_output:
    - description: Moonweave-local MCP session correlation record.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "mcp_session_id": "session-repo-17",
          "negotiated_protocol_version": "2025-11-25",
          "enabled_capabilities": ["tools","resources.subscribe"]
        }
      source_claims: [claim-tool-mcp-transport-design]
  reference_implementations:
    - name: MCP Lifecycle
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
      description: Initialization, operation, and shutdown phases.
    - name: MCP Transports
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/transports
      description: stdio and Streamable HTTP bindings.
    - name: LangChain MCP Adapters
      url: https://python.langchain.com/docs/integrations/tools/mcp/
      description: Host-side MCP client session integration pattern.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 模块标识, en: Module identifier, ja: モジュール識別子}
      definitions:
        zh: MCP 会话、消息与传输模块的稳定标识。
        en: Stable identifier for the MCP sessions, messages, and transport module.
        ja: MCP sessions/messages/transport module の安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^tool-mcp-transport$'
      example_value: tool-mcp-transport
      allowed_values: []
      source_claims: [claim-tool-mcp-transport-design]
    - id: mcp_session_id
      labels: {zh: MCP 会话标识, en: MCP session identifier, ja: MCP セッション識別子}
      definitions:
        zh: 一次客户端-服务器 MCP 会话的工程标识，绑定协商版本与 enabled capabilities。
        en: Engineering identifier for one client-server MCP session binding negotiated version and enabled capabilities.
        ja: client-server MCP session の engineering identifier。negotiated version/enabled capabilities を bind。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: session-repo-17
      allowed_values: []
      source_claims: [claim-tool-mcp-transport-design]
    - id: transport_kind
      labels: {zh: 传输类型, en: Transport kind, ja: トランスポート種別}
      definitions:
        zh: 承载该会话的 MCP 传输类型：stdio 或 streamable-http。
        en: MCP transport kind carrying the session—stdio or streamable-http.
        ja: session を運ぶ MCP transport kind（stdio/streamable-http）。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: stdio
      allowed_values: [stdio, streamable-http]
      source_claims: [claim-tool-mcp-transport-stdio]
  constraints: []
  required_relations: []
examples:
  - id: tool-mcp-transport-example-lifecycle-positive
    labels:
      zh: 完成协商的运行会话
      en: Operational session after negotiation
      ja: 協議完了後の運用 session
    descriptions:
      zh: "session-repo-17 完成 initialize 与 notifications/initialized，启用 tools 与 resources.subscribe 后调用 resources/list。"
      en: "session-repo-17 completes initialize and notifications/initialized, enables tools and resources.subscribe, then calls resources/list."
      ja: "session-repo-17 が initialize/notifications/initialized 完了後 tools/resources.subscribe を enable し resources/list を呼ぶ。"
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
    field_values:
      mcp_session_id: session-repo-17
      negotiated_protocol_version: 2025-11-25
    related_node_ids: [tool-mcp-transport, MCPSession]
    related_relation_ids: []
    source_claims: [claim-tool-mcp-transport-lifecycle]
  - id: tool-mcp-transport-example-stdio-framing
    labels:
      zh: stdio 换行分帧
      en: stdio newline framing
      ja: stdio newline framing
    descriptions:
      zh: "客户端启动 repo-server，stdin 写一行 initialize，stdout 回一行 result；stderr 仅日志。"
      en: "Client launches repo-server, writes one initialize line to stdin, reads one result line from stdout; stderr is logging only."
      ja: "client が repo-server を起動し stdin に initialize 一行、stdout に result 一行。stderr は log のみ。"
    example_source:
      product: MCP Transports
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/transports
    field_values:
      transport_kind: stdio
      frame_delimiter: newline
    related_node_ids: [tool-mcp-transport, MCPStdioTransport]
    related_relation_ids: []
    source_claims: [claim-tool-mcp-transport-stdio]
  - id: tool-mcp-transport-example-tools-call-jsonrpc
    labels:
      zh: tools/call JSON-RPC 相关性
      en: tools/call JSON-RPC correlation
      ja: tools/call JSON-RPC correlation
    descriptions:
      zh: "MCPRequest id=4 发送 tools/call，MCPResultResponse 必须以同 id 返回 content[]。"
      en: "MCPRequest id=4 sends tools/call; MCPResultResponse must return content[] with the same id."
      ja: "MCPRequest id=4 が tools/call を送り MCPResultResponse は同 id で content[] を返す。"
    example_source:
      product: MCP Server Tools
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
    field_values:
      jsonrpc_id: 4
      method: tools/call
    related_node_ids: [tool-mcp-transport, tool-invocation-execution]
    related_relation_ids: []
    source_claims: [claim-tool-mcp-transport-tools]
  - id: tool-mcp-transport-example-capability-counter
    labels:
      zh: 未声明能力不得标为 enabled
      en: Undeclared capability must not be enabled
      ja: 未宣言 capability を enabled としない
    descriptions:
      zh: "repo-server 实现 elicitation handler，但 client initialize 未声明 elicitation；记录不得把 elicitation.form 标为 enabled。"
      en: "repo-server implements an elicitation handler but client initialize did not advertise elicitation; the record must not mark elicitation.form enabled."
      ja: "repo-server が elicitation handler を実装しても client initialize 未宣言 elicitation。elicitation.form を enabled と記録しません。"
    example_source:
      product: Moonweave MCP transport design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
    field_values:
      mcp_session_id: session-repo-18
      falsely_enabled_capability: elicitation.form
    related_node_ids: [tool-mcp-transport, MCPSession]
    related_relation_ids: []
    source_claims: [claim-tool-mcp-transport-design]
  - id: tool-mcp-transport-example-streamable-http
    labels:
      zh: Streamable HTTP 单端点
      en: Streamable HTTP single endpoint
      ja: Streamable HTTP 単一端点
    descriptions:
      zh: "客户端向 /mcp 发送 POST initialize，随后 GET 订阅 SSE 通知；HTTP 连接本身不等于 MCPSession。"
      en: "Client POSTs initialize to /mcp then GETs SSE notifications; the raw HTTP connection alone is not an MCPSession."
      ja: "client が /mcp へ POST initialize 後 GET SSE notification。raw HTTP connection 単体は MCPSession ではない。"
    example_source:
      product: MCP Transports
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/transports
    field_values:
      transport_kind: streamable-http
      endpoint: /mcp
    related_node_ids: [tool-mcp-transport]
    related_relation_ids: []
    source_claims: [claim-tool-mcp-transport-stdio]
parent_relation: null
relations: []
module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 输入是会话承载的 MCPRequest 及其具体方法子型；MCPResponse-responds_to-MCPRequest
            在本面使用请求端点，明确该请求等待同 RequestId 的相关响应，而不把响应误作第二项输入。
          en: Input is an MCPRequest carried by the session and its concrete method
            subtype; on this facet MCPResponse-responds_to-MCPRequest uses the
            request endpoint to require a response correlated by the same
            RequestId, without treating the response as another input.
          ja: 入力は session が運ぶ MCPRequest とその具体的 method subtype です。この面の
            MCPResponse-responds_to-MCPRequest は request 端点を用いて同じ RequestId
            の応答を要求し、応答を別の入力とは扱いません。
        family_concept_ids:
          - MCPRequest
        relation_ids:
          - MCPSession-carries-MCPMessage
          - MCPResponse-responds_to-MCPRequest
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 输出是以同 RequestId 回应请求的 MCPResponse。
          en: Output is MCPResponse correlated to the request by the same RequestId.
          ja: output は同 RequestId で request に対応する MCPResponse です。
        family_concept_ids:
          - MCPResponse
        relation_ids:
          - MCPResponse-responds_to-MCPRequest
        not_applicable_reason: null
      failure:
        applicable: true
        description:
          zh: 协议层失败是 MCPErrorResponse，而不是通用 ToolError 或 CallToolResult.isError；它作为
            MCPResponse 的严格下位类沿用请求—响应相关事实，is_a 只承担分类而不伪装成失败事件。
          en: Protocol-layer failure is MCPErrorResponse rather than generic ToolError or
            CallToolResult.isError; as a strict MCPResponse subtype it uses the
            request-response correlation fact, while is_a remains taxonomy
            rather than masquerading as a failure event.
          ja: protocol-layer failure は generic ToolError や CallToolResult.isError ではなく
            MCPErrorResponse です。MCPResponse の厳密な下位型として request-response
            対応事実を用い、is_a は失敗 event ではなく分類だけを担います。
        family_concept_ids:
          - MCPErrorResponse
        relation_ids:
          - MCPResponse-responds_to-MCPRequest
        not_applicable_reason: null
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: MCP 的错误处理依赖具体方法、传输状态与应用策略；规范没有定义一个适用于所有 MCPErrorResponse
            的通用恢复活动，而且错误响应本身不会重新协商已启用能力。
          en: MCP error handling depends on the method, transport state, and application
            policy; the specification defines no universal recovery activity for
            every MCPErrorResponse, and an error response does not renegotiate
            enabled capabilities by itself.
          ja: MCP error handling は method・transport state・application policy に依存し、全
            MCPErrorResponse に共通する recovery activity は定義されず、error response 自体は
            enabled capability を再交渉しません。
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-mcp-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: tool-mcp-transport 的领域边界已逐项核实：输入、输出与协议错误以 accepted relation 闭合；恢复明确不适用。
            en: "The tool-mcp-transport domain boundary was checked point by point: Input,
              output, and protocol error close through accepted relations;
              recovery is explicitly non-applicable."
            ja: tool-mcp-transport domain boundary を個別確認しました：input/output/protocol error は
              accepted relation で閉じ recovery は explicit non-applicable です。
        - reviewer_id: moonweave-mcp-ontology-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 本体人工复核将 is_a 保留给严格特化，并只把逐边确认的
              carries、enables、establishes、has_participant、uses_transport、applies_to
              与 produces 事实提升为解释性主骨架；未形成普遍父子事实的消息相关或跨域映射继续作为 cross-link。
            en: Manual ontology review reserves is_a for strict specialization and promotes
              only edge-reviewed carries, enables, establishes, has_participant,
              uses_transport, applies_to, and produces facts to the explanatory
              primary backbone; message correlations or cross-domain mappings
              without universal parenthood remain cross-links.
            ja: 本体の人工レビューでは is_a を厳密な特殊化に限定し、個別に確認した
              carries、enables、establishes、has_participant、uses_transport、applies_to、produces
              の事実だけを説明用 primary backbone へ昇格します。普遍的な親子事実を持たない message
              correlation やドメイン間 mapping は cross-link に留めます。
  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - MCPSession
    allowed_backbone_predicates:
      - applies_to
      - carries
      - enables
      - establishes
      - has_participant
      - is_a
      - uses_transport
    flat_root_exception_concept_ids: []
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-mcp-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: tool-mcp-transport 的领域边界已逐项核实：MCPSession
              是唯一会话根，参与方、能力、消息、载荷、订阅、传输、授权与提示实例分别通过真实协议关系接入主干。
            en: "The tool-mcp-transport boundary was checked point by point: MCPSession is
              the sole session root, and participants, capabilities, messages,
              payloads, subscriptions, transports, authorization, and prompt
              instantiation enter the backbone through real protocol facts."
            ja: tool-mcp-transport boundary を個別確認し MCPSession を唯一 session root
              とし、participant・capability・message・payload・subscription・transport・authorization・prompt
              instantiation を実在 protocol fact で backbone に接続しました。
        - reviewer_id: moonweave-mcp-ontology-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 结构审查以事实谓词而非名称前缀建模：is_a
              只表示类型细分，carries、enables、establishes、has_participant、uses_transport、applies_to
              与 produces 负责不同语义种类之间的逻辑父级。
            en: "Structural review models fact predicates rather than name prefixes: is_a is
              reserved for specialization, while carries, enables, establishes,
              has_participant, uses_transport, applies_to, and produces provide
              logical parents across different semantic kinds."
            ja: 構造審査は name prefix ではなく fact predicate を用い、is_a を specialization に限定し、異なる
              semantic kind 間は
              carries・enables・establishes・has_participant・uses_transport・applies_to・produces
              で logical parent を表します。
  competency_questions:
    - id: tool-mcp-transport-lifecycle-capability-cq
      semantic_key: tool-mcp-transport.lifecycle-capability
      primary_owner_module_id: tool-mcp-transport
      related_module_ids: []
      questions:
        zh: 一条 MCP 会话由哪些客户端和服务器参与、协商了哪个版本，并且哪些客户端/服务器能力在 operation 阶段真正可用？
        en: Which client and server participate in an MCP session, which version was
          negotiated, and which client/server capabilities are actually usable
          during operation?
        ja: MCP session にどの client/server が参加し、どの version を negotiation し、operation
          phase でどの client/server capability が実際に使えますか。
      query: Traverse session participants, initialization capability advertisements,
        and the session-enabled capabilities without inferring undeclared
        implementation features.
      expected_assertion: The session has one isolated client and server, and only
        capabilities declared by the correct side under the negotiated version
        are enabled.
      evidence_binding:
        applicability: owner-only
        owner_concept_ids:
          - MCPSession
          - MCPParticipant
          - MCPClient
          - MCPServer
          - MCPClientCapability
          - MCPServerCapability
          - MCPCapability
        related_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 参与者、初始化声明和会话启用能力均属于 MCP 会话内部事实；该 CQ 不借用工具注册或运行时能力推断未协商特性。
          en: Participants, initialization declarations, and session-enabled capabilities
            are all internal MCP-session facts; the CQ does not borrow registry
            or runtime capabilities to infer unnegotiated features.
          ja: participant・initialization declaration・session-enabled capability はすべて MCP
            session 内部 fact であり、registry/runtime capability から未 negotiation
            feature を推論しません。
      positive_example_ids:
        - tool-mcp-transport-lifecycle-capability-example-positive
      counterexample_ids:
        - tool-mcp-transport-lifecycle-capability-example-counter
      source_claims:
        - claim-tool-mcp-transport-design
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-mcp-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: tool-mcp-transport 的领域边界已逐项核实：tool-mcp-transport.lifecycle-capability
                只由可接受的真实关系回答。
              en: "The tool-mcp-transport domain boundary was checked point by point:
                tool-mcp-transport.lifecycle-capability is answered only by
                accepted, real protocol facts."
              ja: tool-mcp-transport domain boundary
                を個別確認しました：tool-mcp-transport.lifecycle-capability は accepted
                real protocol fact のみで回答します。
          - reviewer_id: moonweave-mcp-ontology-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-16
            decision_note:
              zh: 本体人工复核将 is_a 保留给严格特化，并只把逐边确认的
                carries、enables、establishes、has_participant、uses_transport、applies_to
                与 produces 事实提升为解释性主骨架；未形成普遍父子事实的消息相关或跨域映射继续作为 cross-link。
              en: Manual ontology review reserves is_a for strict specialization and promotes
                only edge-reviewed carries, enables, establishes,
                has_participant, uses_transport, applies_to, and produces facts
                to the explanatory primary backbone; message correlations or
                cross-domain mappings without universal parenthood remain
                cross-links.
