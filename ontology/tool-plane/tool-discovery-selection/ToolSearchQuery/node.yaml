schema: moonweave.ai/ontology-node/v1
id: ToolSearchQuery
kind: concept
labels:
  zh: 工具搜索查询
  en: Tool Search Query
  ja: ツール検索クエリ
semantics:
  short_definition:
    zh: 用于缩小工具发现范围的本地能力需求表达。
    en: A local expression of capability needs used to narrow tool discovery.
    ja: tool discovery を絞り込むための local capability need の表現。
  definition:
    zh: ToolSearchQuery 是 Moonweave 对任务所需能力、输入兼容性和发现范围的本地描述，用来指导 ToolSearch 过滤或组织原生目录记录。它不是 MCP tools/list 请求的标准字段：当前 MCP tools/list 仅支持 cursor 分页；它也不是 A2A AgentCard 或某个工具的调用参数。
    en: ToolSearchQuery is Moonweave's local description of capabilities needed by a task, input compatibility, and discovery scope used by ToolSearch to filter or organize native catalog records. It is not a standard field of an MCP tools/list request, which currently supports cursor pagination only, and it is neither an A2A AgentCard nor a tool-call argument.
    ja: ToolSearchQuery は task が必要とする capability、input compatibility、discovery scope の Moonweave-local description であり、ToolSearch が native catalog record を filter または整理するのに使う。現在 MCP tools/list が support するのは cursor pagination だけであり、この query は MCP tools/list request の標準 field ではない。また A2A AgentCard や tool-call argument でもない。
  why_needed:
    zh: 使用本地查询能把需求和目录读取分离，避免把应用层关键词误称为协议接口，同时让后续候选集的发现依据可审计。
    en: A local query separates requirements from catalog reads, avoiding a false claim that application keywords are protocol fields while making the basis for a later candidate set auditable.
    ja: local query は requirement と catalog read を分け、application keyword が protocol field だという誤った主張を避け、後続 candidate set の根拠を監査可能にする。
  includes:
    - zh: 所需能力、期望输入/输出模式、来源范围和非决策性的发现过滤条件。
      en: Required capabilities, desired input/output modes, source scope, and non-decisive discovery filters.
      ja: required capability、desired input/output mode、source scope、非決定的な discovery filter。
    - zh: 指向原始用户需求或任务约束的引用。
      en: A reference to the originating user need or task constraint.
      ja: originating user need または task constraint への reference。
  excludes:
    - zh: MCP tools/list 的 cursor、MCP tools/call arguments、A2A AgentCard 或 ToolSelectionDecision。
      en: An MCP tools/list cursor, MCP tools/call arguments, an A2A AgentCard, or a ToolSelectionDecision.
      ja: MCP tools/list cursor、MCP tools/call arguments、A2A AgentCard、ToolSelectionDecision。
    - zh: 工具结果、候选资格结论或可用性检测。
      en: A tool result, candidate eligibility conclusion, or availability check.
      ja: tool result、candidate eligibility conclusion、availability check。
  semantic_kind: information
engineering:
  explanation:
    zh: 查询由应用或代理从任务需求构建，并在本地与 MCP Tool 的名称/描述/inputSchema 或 A2A AgentSkill 的描述/标签/模式比较。协议适配器仍向 MCP 发送有效的 tools/list cursor 请求，或读取完整的 AgentCard；查询本身不越过协议边界。
    en: An application or agent builds the query from task needs and locally compares it with an MCP Tool's name, description, and inputSchema or an A2A AgentSkill's description, tags, and modes. The protocol adapter still sends a valid cursor-only tools/list request to MCP or reads a full AgentCard; the query itself does not cross the protocol boundary.
    ja: application または agent が task need から query を作り、MCP Tool の name、description、inputSchema、または A2A AgentSkill の description、tag、mode とローカルに比較する。protocol adapter は引き続き有効な cursor-only tools/list request を MCP に送り、または完全な AgentCard を読む。query 自体は protocol boundary を越えない。
  typical_input:
    - description:
        zh: 用户任务需求
        en: User task requirement
        ja: User task requirement
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"task_requirement","task_ref":"task:42","need":"search public documentation","required_input":"text/plain"}
      source_claims: [claim-query-local]
    - description:
        zh: MCP 目录读取请求
        en: MCP catalog-read request
        ja: MCP catalog-read request
      format: |-
        {"jsonrpc":"2.0","id":17,"method":"tools/list","params":{"cursor":"page-2"}}
      source_claims: [claim-query-mcp-list]
  typical_output:
    - description:
        zh: 本地搜索查询
        en: Local search query
        ja: Local search query
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"tool_search_query","query_id":"q-17","task_requirement_ref":"task:42","requested_capabilities":["search"],"acceptable_input_modes":["text/plain"],"source_scope":["mcp","a2a"]}
      source_claims: [claim-query-local]
  reference_implementations:
    - name: Model Context Protocol tools/list
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines the actual cursor-based protocol request used to read tool catalogs.
    - name: A2A Agent Card
      url: https://a2a-protocol.org/latest/specification/
      description: Defines skills and their descriptive capability metadata that a local query may inspect.
structure:
  identity_keys: [query_id]
  fields:
    - id: query_id
      labels: {zh: 查询标识, en: Query identifier, ja: query 識別子}
      definitions:
        zh: 稳定标识一个本地搜索需求表达，不替代 MCP JSON-RPC id 或 AgentCard 标识。
        en: Stably identifies one local search-requirement expression and does not replace an MCP JSON-RPC id or AgentCard identifier.
        ja: 一つの local search-requirement expression を安定して識別し、MCP JSON-RPC id や AgentCard identifier を置き換えない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: q-17
      source_claims: [claim-query-local]
    - id: task_requirement_ref
      labels: {zh: 任务需求引用, en: Task-requirement reference, ja: task requirement 参照}
      definitions:
        zh: 指向促使发现的需求或约束记录，防止查询脱离其任务语境。
        en: Points to the need or constraint record that prompted discovery, preventing the query from losing task context.
        ja: discovery を促した need または constraint record を指し、query が task context を失うことを防ぐ。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: task:42
      source_claims: [claim-query-local]
    - id: requested_capabilities
      labels: {zh: 所需能力, en: Requested capabilities, ja: requested capability}
      definitions:
        zh: 本地发现过滤条件中的能力词或标签，不宣称这些值是 MCP 或 A2A 的统一枚举。
        en: Capability words or tags used as local discovery filters; these values are not asserted to be a unified MCP or A2A enumeration.
        ja: local discovery filter で使う capability word または tag。これらの値が統一された MCP または A2A enumeration だとは主張しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: search
      source_claims: [claim-query-local, claim-query-a2a-skills]
    - id: source_scope
      labels: {zh: 来源范围, en: Source scope, ja: source scope}
      definitions:
        zh: 限定查询可读取的目录种类，例如 mcp、a2a 或受控本地目录；不改变这些来源各自的请求格式。
        en: Limits the catalog kinds the query may read, such as mcp, a2a, or a controlled local catalog, without changing their respective request shapes.
        ja: query が読める catalog kind を mcp、a2a、controlled local catalog などに限定し、それぞれの request shape は変更しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: mcp
      source_claims: [claim-query-mcp-list, claim-query-a2a-skills, claim-query-local]
  constraints:
    - id: query-is-not-an-mcp-list-parameter
      severity: error
      expression_language: plain
      expression: ToolSearchQuery fields must remain local filtering metadata; an MCP tools/list request generated from it may carry only protocol-defined parameters such as cursor.
      explanation:
        zh: MCP tools/list 规范列举的是 cursor，而不是能力关键词、需求标签或意图字段。
        en: The MCP tools/list specification defines cursor pagination, not capability keywords, requirement tags, or intent fields.
        ja: MCP tools/list specification は cursor pagination を定め、capability keyword、requirement tag、intent field を定めない。
      source_claims: [claim-query-mcp-list, claim-query-local]
    - id: query-has-no-selection-conclusion
      severity: error
      expression_language: plain
      expression: A ToolSearchQuery must contain discovery criteria only and must not assert candidate_refs, availability_state, eligibility_state, match_state, rank, selected_candidate_ref, or tool-call arguments.
      explanation:
        zh: 查询描述要找什么；它不是发现结果、评估记录或调用请求。
        en: A query describes what to look for; it is not a discovery result, assessment record, or call request.
        ja: query は何を探すかを記述し、discovery result、assessment record、call request ではない。
      source_claims: [claim-query-local]
  required_relations: []
examples:
  - id: query-positive-search-documentation

    labels: {zh: 搜索文档能力, en: Search-documentation capability, ja: documentation search capability}
    descriptions:
      zh: ToolBench (Qin 2023) 16000+ RapidAPI 工具发现；Gorilla APIBench 1645 API retriever-aware 检索；Toolformer 支持 Calculator/QA/Search/Translator/Calendar 五类工具发现。
      en: ToolBench (Qin 2023) discovers tools among 16000+ RapidAPI; Gorilla APIBench 1645 API retriever-aware retrieval; Toolformer supports Calculator/QA/Search/Translator/Calendar discovery.
      ja: ToolBench (Qin 2023) が 16000+ RapidAPI から tool 発見。Gorilla APIBench 1645 API retriever-aware 检索。Toolformer が Calculator/QA/Search/Translator/Calendar 五类 tool 発見を支持。
    field_values: {query_id: q-17, task_requirement_ref: task:42, requested_capabilities: [search], source_scope: [mcp, a2a]}
    related_node_ids: [ToolSearchQuery, ToolSearch]
    related_relation_ids: [ToolSearchQuery-was_used_by-ToolSearch]

    source_claims: [claim-query-local, claim-query-mcp-list, claim-query-a2a-skills]
  - id: query-counterexample-keyword-in-mcp-request

    labels: {zh: 向 MCP 列举请求注入关键词, en: Inject a keyword into MCP list request, ja: MCP list request に keyword を注入する}
    descriptions:
      zh: 反例：Gorilla 无 retriever 时 hallucinate 不存在 API；ToolBench 未验证 RapidAPI endpoint 可用性即加入候选集。
      en: Counterexample: Gorilla hallucinates nonexistent API without retriever; ToolBench adds candidates without verifying RapidAPI endpoint availability.
      ja: 反例：Gorilla が retriever なしで不存在 API を hallucinate。ToolBench が RapidAPI endpoint 可用性未検証で candidate set に追加。
    field_values: {query_id: q-18, task_requirement_ref: task:43, requested_capabilities: [search], generated_mcp_params: {keyword: search}}
    related_node_ids: [ToolSearchQuery, ToolSearch]
    related_relation_ids: []

    source_claims: [claim-query-mcp-list]
  - id: query-boundary-agentcard-not-query

    labels: {zh: AgentCard 不是查询, en: AgentCard is not a query, ja: AgentCard は query ではない}
    descriptions:
      zh: Gorilla APIBench 离线训练检索 vs ToolBench 在线 RapidAPI 实时发现的注册边界；ToolMatch 分数非 ToolBench DFSDT 决策树节点。
      en: Boundary between Gorilla APIBench offline training retrieval vs ToolBench online RapidAPI live discovery; ToolMatch score is not a ToolBench DFSDT tree node.
      ja: Gorilla APIBench offline 訓練检索と ToolBench online RapidAPI リアルタイム発見の登録境界。ToolMatch score は ToolBench DFSDT 決定木 node ではない。
    field_values: {query_id: q-19, task_requirement_ref: task:44, requested_capabilities: [research], source_scope: [a2a], inspected_source: a2a:agent-card/research}
    related_node_ids: [ToolSearchQuery, ToolCandidate]
    related_relation_ids: [ToolSearchQuery-was_used_by-ToolSearch]

    source_claims: [claim-query-a2a-skills, claim-query-local]
  - id: query-instance-input-mode-filter

    labels: {zh: 输入模式过滤实例, en: Input-mode filter instance, ja: input-mode filter instance}
    descriptions:
      zh: Gorilla 实例：retriever 返回 torch.hub.load API 文档；ToolBench 实例：RapidAPI "Spoonacular" recipe search API tool_id=spoonacular-search。
      en: Gorilla instance: retriever returns torch.hub.load API docs; ToolBench instance: RapidAPI "Spoonacular" recipe search API tool_id=spoonacular-search.
      ja: Gorilla 実例：retriever が torch.hub.load API 文档を返す。ToolBench 実例：RapidAPI "Spoonacular" recipe search API tool_id=spoonacular-search。
    field_values: {query_id: q-20, task_requirement_ref: task:45, requested_capabilities: [research], acceptable_input_modes: ['text/plain'], source_scope: [a2a]}
    related_node_ids: [ToolSearchQuery, ToolSearch]
    related_relation_ids: [ToolSearchQuery-was_used_by-ToolSearch]

    source_claims: [claim-query-a2a-skills, claim-query-local]
parent_relation: null
relations:
  - id: ToolSearchQuery-was_used_by-ToolSearch
    predicate: was_used_by
    target: concept:ToolSearch
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 由工具搜索使用, en: was used by tool search, ja: tool search に使用された}
    definitions:
      zh: 当 ToolSearch 读取该本地发现条件以限定目录读取和本地筛选时，ToolSearchQuery 由该活动使用。
      en: ToolSearchQuery was used by ToolSearch when that activity read the local discovery criteria to bound catalog reads and local filtering.
      ja: ToolSearch が catalog read と local filtering を限定するためにこの local discovery criteria を読んだとき、ToolSearchQuery はその activity に使用された。
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: uses
      labels: {zh: 使用查询条件, en: uses query condition, ja: query condition を使用する}
    conditions:
      - id: query-use-provenance-condition
        severity: error
        expression: Assert was_used_by only when a ToolSearch records the query reference as discovery input; a catalog entry or a protocol request object does not satisfy this relation.
        explanations: {zh: 使用关系连接本地查询实体与读取它的活动，不把查询字段写入原生协议请求。, en: The use relation connects the local query entity to the activity that read it without writing query fields into a native protocol request., ja: use relation は local query entity とそれを読んだ activity を結び、query field を native protocol request に書き込まない。}
        source_claims: [claim-query-prov-use, claim-query-local]
    temporal_scope: valid-time
    boundary_context: This Moonweave-local inverse of PROV usage records activity input provenance; it does not turn the query into an MCP tools/list or A2A AgentCard request object.
    constraints: []
    examples: []
    source_claims: [claim-query-prov-use, claim-query-local]
    distinct_fact_rationale:
      zh: 使用溯源记录查询被搜索活动读取，而不把输入记录误建模为活动的组成部分。
      en: Use provenance records that a search activity read the query without mis-modeling the input record as an activity component.
      ja: use provenance は search activity が query を読んだことを記録し、input record を activity の構成要素として誤って model 化しない。
    layout_role: cross-link
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol — Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-spec
    relevance: Defines tools/list request parameters and Tool metadata available for local inspection.
  - id: a2a-latest-specification
    title: Agent2Agent Protocol Specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-spec
    relevance: Defines AgentCard skills, tags, and input/output modes available for local inspection.
  - id: w3c-prov-o
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines Entity and Activity provenance links, including an Activity's use of an Entity.
source_claims:
  - id: claim-query-mcp-list
    source: mcp-tools-2025-11-25
    supports: MCP tools/list is requested with an optional cursor and returns tools plus an optional nextCursor; the protocol shape does not define a keyword or capability-query parameter.
    locator: Tools — Listing Tools
    evidence_kind: normative
    confidence: high
  - id: claim-query-a2a-skills
    source: a2a-latest-specification
    supports: A2A AgentSkill may describe a focused capability with name, description, tags, inputModes, and outputModes for consumers to inspect.
    locator: AgentCard and AgentSkill data model
    evidence_kind: normative
    confidence: high
  - id: claim-query-local
    source: mcp-tools-2025-11-25
    supports: query_id, task_requirement_ref, requested_capabilities, acceptable_input_modes, and source_scope are Moonweave-local discovery metadata used to organize catalog reads without extending native protocol requests.
    locator: Tools — Listing Tools
    evidence_kind: design-inference
    confidence: high
  - id: claim-query-prov-use
    source: w3c-prov-o
    supports: PROV-O models an Activity using an Entity; this local was_used_by inverse records ToolSearch consuming a ToolSearchQuery without asserting structural composition.
    locator: Section 3.1, prov:Entity and prov:used
    evidence_kind: standard
    confidence: high
