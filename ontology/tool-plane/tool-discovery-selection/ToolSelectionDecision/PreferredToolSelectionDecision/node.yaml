schema: moonweave.ai/ontology-node/v1
id: PreferredToolSelectionDecision
kind: concept
labels:
  zh: 首选工具选择决策
  en: Preferred Tool Selection Decision
  ja: 優先ツール選択決定
semantics:
  short_definition:
    zh: 在已评估候选中选择一个首选候选并记录偏好依据的工具选择决策。
    en: A tool-selection decision that chooses one preferred candidate among assessed candidates and records the basis for preference.
    ja: assessed candidate の中から一つの preferred candidate を選び、preference の根拠を記録する tool-selection decision。
  definition:
    zh: PreferredToolSelectionDecision 是 ToolSelectionDecision 的一种，处于 selected 状态并在候选范围、任务、政策和评估 finding 的语境中记录一个首选候选及其偏好理由。偏好理由可引用任务适配、明确政策、用户限制或经评估的非功能约束；它不是未解释的数字排名、OpenAI tool_choice、MCP allowed_tools、批准事件或实际调用。其他候选仍可同时匹配，首选也不自动获得执行权限。
    en: PreferredToolSelectionDecision is a kind of ToolSelectionDecision in selected state that records one preferred candidate and its preference rationale in the context of candidate scope, task, policy, and assessment findings. The rationale may cite task fit, explicit policy, user constraints, or assessed non-functional constraints; it is not an unexplained numeric rank, OpenAI tool_choice, MCP allowed_tools, an approval event, or an actual call. Other candidates may still match, and preference does not automatically grant execution authority.
    ja: PreferredToolSelectionDecision は ToolSelectionDecision の一種であり、selected state で candidate scope、task、policy、assessment finding の context における一つの preferred candidate と preference rationale を記録する。rationale は task fit、明示的 policy、user constraint、assessed non-functional constraint を引用できる。説明のない numeric rank、OpenAI tool_choice、MCP allowed_tools、approval event、actual call ではない。他の candidate はなお match し得て、preference は自動的に execution authority を与えない。
  why_needed:
    zh: 多个候选可能都合格，但系统仍需说明为何此次优先一个。专门决策让偏好依据可复核，并禁止用目录顺序、模型配置或未经解释的置信度偷偷取代决策理由。
    en: Several candidates may be eligible, yet a system still needs to explain why one is preferred this time. A specialized decision makes preference basis reviewable and prevents catalog order, model configuration, or unexplained confidence from silently replacing decision rationale.
    ja: 複数の candidate が eligible でも、system は今回なぜ一つを prefer するかを説明する必要がある。specialized decision は preference basis を reviewable にし、catalog order、model configuration、説明のない confidence が decision rationale を黙って置き換えることを防ぐ。
  includes:
    - zh: 一个已选候选、其评估引用以及任务、政策或用户偏好依据。
      en: One chosen candidate, its assessment references, and task, policy, or user-preference basis.
      ja: 一つの chosen candidate、その assessment reference、task、policy、user-preference basis。
    - zh: 明确说明本次优先，而不把其他候选永久降级。
      en: An explicit statement of preference for this decision without permanently demoting other candidates.
      ja: 他の candidate を永久に降格せず、この decision での preference を明示すること。
  excludes:
    - zh: 没有理由的最高分、目录顺序、批准结果、工具调用、回退触发或无选择状态。
      en: An unexplained highest score, catalog order, approval result, tool call, fallback trigger, or no-selection state.
      ja: 説明のない highest score、catalog order、approval result、tool call、fallback trigger、no-selection state。
    - zh: 将所有匹配候选标记为一个首选或把首选等同于执行。
      en: Marking every matched candidate as one preferred candidate or equating preference with execution.
      ja: すべての matched candidate を一つの preferred candidate とマークすること、または preference を execution と同一視すること。
  semantic_kind: information
engineering:
  explanation:
    zh: 选择器在已有评估后写入 selected、chosen_candidate_ref、assessment_refs 和 preference_basis_refs。偏好依据必须指向可检查的任务、政策、用户或评估记录；模型侧 tool_choice 可在下游配置中限制候选，却不能替代这些依据或调用工具。
    en: After existing assessment, a selector writes selected, chosen_candidate_ref, assessment_refs, and preference_basis_refs. Preference basis must point to inspectable task, policy, user, or assessment records; a model-side tool_choice may constrain candidates in downstream configuration but cannot replace these bases or call the tool.
    ja: existing assessment の後、selector は selected、chosen_candidate_ref、assessment_refs、preference_basis_refs を書く。preference basis は inspectable task、policy、user、assessment record を指さなければならない。model-side tool_choice は downstream configuration で candidate を制約できるが、これらの basis を置き換えたり tool を call したりできない。
  typical_input:
    - description:
        zh: 本地评估与偏好依据
        en: Local assessments and preference basis
        ja: Local assessment and preference basis
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"preference_input","candidate_set_ref":"set:17","assessment_refs":["assess:17","assess:18"],"preference_basis_refs":["task:42","policy:read-only","user:preference/fast"]}
      source_claims: [claim-preferred-decision-local]
    - description:
        zh: OpenAI 受限工具配置
        en: OpenAI constrained-tool configuration
        ja: OpenAI constrained-tool configuration
      format: |-
        {"tool_choice":{"type":"allowed_tools","mode":"auto","tools":[{"type":"mcp","server_label":"docs","name":"search-docs"},{"type":"mcp","server_label":"docs","name":"search-backup"}]}}
      source_claims: [claim-preferred-decision-openai]
  typical_output:
    - description:
        zh: 本地首选选择决策
        en: Local preferred-selection decision
        ja: Local preferred-selection decision
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"preferred_tool_selection_decision","decision_id":"preferred-17","selection_activity_ref":"selection:17","candidate_set_ref":"set:17","decision_state":"selected","chosen_candidate_ref":"candidate:search-docs","assessment_refs":["assess:17"],"preference_basis_refs":["task:42","user:preference/fast"],"rationale":"Both candidates match; search-docs satisfies the requested low-latency preference"}
      source_claims: [claim-preferred-decision-local]
  reference_implementations:
    - name: OpenAI Responses create reference
      url: https://developers.openai.com/api/reference/resources/responses/methods/create
      description: Defines tool-choice restriction as request configuration distinct from a local preference decision.
    - name: Model Context Protocol Tool definition
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines native Tool descriptions and annotations that can be cited through assessment evidence.
structure:
  identity_keys: [decision_id]
  fields:
    - id: decision_id
      labels: {zh: 首选决策标识, en: Preferred-decision identifier, ja: preferred-decision 識別子}
      definitions:
        zh: 稳定标识一次本地首选选择决策，不替代候选 id、模型响应 id 或调用 id。
        en: Stably identifies one local preferred-selection decision and does not replace a candidate id, model response id, or invocation id.
        ja: 一つの local preferred-selection decision を安定して識別し、candidate id、model response id、invocation id を置き換えない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: preferred-17
      source_claims: [claim-preferred-decision-local]
    - id: selection_activity_ref
      labels: {zh: 选择活动引用, en: Selection-activity reference, ja: selection-activity 参照}
      definitions:
        zh: 指向形成首选的 ToolSelectionActivity。
        en: Points to the ToolSelectionActivity that formed the preference.
        ja: preference を形成した ToolSelectionActivity を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: selection:17
      source_claims: [claim-preferred-decision-local]
    - id: candidate_set_ref
      labels: {zh: 候选集引用, en: Candidate-set reference, ja: candidate-set 参照}
      definitions:
        zh: 指向首选决定所比较的候选范围。
        en: Points to the candidate scope compared by the preferred decision.
        ja: preferred decision が比較した candidate scope を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: set:17
      source_claims: [claim-preferred-decision-local]
    - id: decision_state
      labels: {zh: 决策状态, en: Decision state, ja: decision state}
      definitions:
        zh: 继承选择决策的结果状态；首选子类将其收窄为 selected，而不是无选择、待澄清或待审批。
        en: Retains the selection decision's outcome state; this preferred subtype narrows it to selected rather than no selection, pending clarification, or pending approval.
        ja: selection decision の outcome state を保持する。この preferred subtype では no selection、pending clarification、pending approval ではなく selected に限定する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [selected]
      pattern: null
      example_value: selected
      source_claims: [claim-preferred-decision-local]
    - id: chosen_candidate_ref
      labels: {zh: 首选候选引用, en: Preferred-candidate reference, ja: preferred-candidate 参照}
      definitions:
        zh: 指向候选范围内一个经评估后被本次选择活动优先的候选；它不调用该工具。
        en: Points to one candidate in scope preferred by this selection activity after assessment; it does not call the tool.
        ja: assessment 後にこの selection activity が prefer した scope 内の一つの candidate を指す。tool を call しない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: candidate:search-docs
      source_claims: [claim-preferred-decision-local]
    - id: assessment_refs
      labels: {zh: 评估引用, en: Assessment references, ja: assessment 参照}
      definitions:
        zh: 指向支持首选候选与替代项比较的评估或 finding。
        en: Points to assessments or findings supporting comparison of the preferred candidate and alternatives.
        ja: preferred candidate と alternative の比較を支持する assessment または finding を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: assess:17
      source_claims: [claim-preferred-decision-local]
    - id: preference_basis_refs
      labels: {zh: 偏好依据引用, en: Preference-basis references, ja: preference-basis 参照}
      definitions:
        zh: 指向说明为何优先此候选的任务约束、政策、用户偏好或评估的非功能证据。
        en: Points to task constraints, policy, user preference, or assessed non-functional evidence explaining why this candidate is preferred.
        ja: この candidate が prefer される理由を説明する task constraint、policy、user preference、assessed non-functional evidence を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: user:preference/fast
      source_claims: [claim-preferred-decision-local]
  constraints:
    - id: preferred-decision-must-be-selected-and-evidenced
      severity: error
      expression_language: plain
      expression: PreferredToolSelectionDecision must have decision_state selected, exactly one chosen_candidate_ref within candidate_set_ref, at least one assessment_ref, and at least one inspectable preference_basis_ref; unexplained score or list order is not a valid basis.
      explanation:
        zh: 首选必须是有范围、有证据且有具体理由的选择，而非分数标签。
        en: Preference must be a scoped, evidenced choice with a concrete reason, not a score label.
        ja: preference は scope と evidence と具体的理由を持つ choice でなければならず、score label ではない。
      source_claims: [claim-preferred-decision-local]
    - id: preferred-decision-is-not-execution-or-global-ranking
      severity: error
      expression_language: plain
      expression: PreferredToolSelectionDecision must not contain tool_choice, allowed_tools, rank, global_best, approval_granted, tool_call, invocation_id, or tool_result; preference applies only to this decision context.
      explanation:
        zh: 首选是一次选择的局部决策，不等同于全局最佳、批准或执行。
        en: Preference is a local decision for this selection, not a global best claim, approval, or execution.
        ja: preference はこの selection の local decision であり、global best claim、approval、execution ではない。
      source_claims: [claim-preferred-decision-openai, claim-preferred-decision-local]
  required_relations: []
examples:
  - id: preferred-decision-positive-user-latency-preference

    labels: {zh: 用户低延迟偏好, en: User low-latency preference, ja: user low-latency preference}
    descriptions:
      zh: Toolformer (Schick 2023) 自监督判断何时插入 [Calculator(350/7)]/[Search(query)]；ToolBench DFSDT 在 16000+ RapidAPI 上 depth-first 工具选择；ART 从示例库检索多步推理模式。
      en: Toolformer (Schick 2023) self-supervised when-to-insert [Calculator(350/7)]/[Search(query)]; ToolBench DFSDT depth-first tool selection over 16000+ RapidAPI; ART retrieves multi-step reasoning patterns from task demos.
      ja: Toolformer (Schick 2023) 自己教師あり [Calculator(350/7)]/[Search(query)] 挿入判断。ToolBench DFSDT が 16000+ RapidAPI で depth-first tool 選択。ART が task demo から多段 reasoning pattern を检索。
    field_values: {decision_id: preferred-17, selection_activity_ref: selection:17, candidate_set_ref: set:17, decision_state: selected, chosen_candidate_ref: candidate:search-docs, assessment_refs: [assess:17, assess:18], preference_basis_refs: [user:preference/fast]}
    related_node_ids: [PreferredToolSelectionDecision, ToolSelectionDecision, ToolMatch]
    related_relation_ids: [PreferredToolSelectionDecision-is_a-ToolSelectionDecision]

    source_claims: [claim-preferred-decision-local]
  - id: preferred-decision-counterexample-highest-score-only

    labels: {zh: 仅凭最高分首选, en: Prefer only by highest score, ja: highest score だけで prefer する}
    descriptions:
      zh: 反例：未执行 ToolBench API 检索或 Gorilla retriever 就假定工具可用；违反 Toolformer 自监督「仅在 API 调用改善 loss 时插入」准则。
      en: Counterexample: assuming tool availability without ToolBench API search or Gorilla retriever; violates Toolformer self-supervised criterion of inserting only when API call improves loss.
      ja: 反例：ToolBench API 检索や Gorilla retriever なしで tool 可用性を仮定。Toolformer 自己教師あり「API 呼出しが loss 改善時のみ挿入」准则違反。
    field_values: {decision_id: preferred-18, selection_activity_ref: selection:18, candidate_set_ref: set:18, decision_state: selected, chosen_candidate_ref: candidate:score-only, score: 0.98}
    related_node_ids: [PreferredToolSelectionDecision, ToolSelectionDecision]
    related_relation_ids: []

    source_claims: [claim-preferred-decision-local]
  - id: preferred-decision-boundary-multiple-matches

    labels: {zh: 多个匹配中的首选, en: Preference among multiple matches, ja: 複数 match の中の preference}
    descriptions:
      zh: Toolformer 训练时 API 调用标记 vs ToolBench/Gorilla 运行时 capability discovery 的方法论边界；本地 ToolSelectionDecision 非 wire tool_choice。
      en: Methodological boundary between Toolformer training-time API markers vs ToolBench/Gorilla runtime capability discovery; local ToolSelectionDecision is not wire tool_choice.
      ja: Toolformer 訓練時 API marker と ToolBench/Gorilla ランタイム capability discovery の方法論境界。ローカル ToolSelectionDecision は wire tool_choice ではない。
    field_values: {decision_id: preferred-19, selection_activity_ref: selection:19, candidate_set_ref: set:19, decision_state: selected, chosen_candidate_ref: candidate:search-docs, assessment_refs: [match:19, match:20], preference_basis_refs: [policy:read-only, user:preference/fast]}
    related_node_ids: [PreferredToolSelectionDecision, ToolMatch]
    related_relation_ids: [PreferredToolSelectionDecision-is_a-ToolSelectionDecision]

    source_claims: [claim-preferred-decision-local]
  - id: preferred-decision-instance-policy-preference

    labels: {zh: 政策偏好实例, en: Policy-preference instance, ja: policy-preference instance}
    descriptions:
      zh: ToolBench ToolLLM 实例：query="book a flight"→DFSDT 选择 RapidAPI flights/search；Gorilla retriever 返回 HuggingFace transformers.pipeline API 文档 top-3。
      en: ToolBench ToolLLM instance: query="book a flight"→DFSDT selects RapidAPI flights/search; Gorilla retriever returns HuggingFace transformers.pipeline API docs top-3.
      ja: ToolBench ToolLLM 実例：query="book a flight"→DFSDT が RapidAPI flights/search を選択。Gorilla retriever が HuggingFace transformers.pipeline API 文档 top-3 を返す。
    field_values: {decision_id: preferred-20, selection_activity_ref: selection:20, candidate_set_ref: set:20, decision_state: selected, chosen_candidate_ref: candidate:readonly-search, assessment_refs: [assess:20, assess:21], preference_basis_refs: [policy:read-only]}
    related_node_ids: [PreferredToolSelectionDecision, ToolEligibilityAssessment]
    related_relation_ids: [PreferredToolSelectionDecision-is_a-ToolSelectionDecision]

    source_claims: [claim-preferred-decision-local]
parent_relation:
  id: PreferredToolSelectionDecision-is_a-ToolSelectionDecision
  predicate: is_a
  target: concept:ToolSelectionDecision
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是工具选择决策的一种, en: is a kind of tool selection decision, ja: tool selection decision の一種である}
  definitions:
    zh: PreferredToolSelectionDecision 继承选择决策的状态、候选范围和评估要求，并将状态收窄为有明确偏好依据的 selected。
    en: PreferredToolSelectionDecision inherits selection-decision state, candidate scope, and assessment requirements and narrows state to selected with explicit preference basis.
    ja: PreferredToolSelectionDecision は selection-decision state、candidate scope、assessment requirement を継承し、state を明示的 preference basis を持つ selected に限定する。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels: {zh: 具有首选选择决策子类, en: has preferred-selection decision subtype, ja: preferred-selection decision subtype を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: This is a true subtype hierarchy for a local decision and does not transform a preferred candidate into an approved or executed tool call.
  constraints: []
  examples: []
  source_claims: [claim-preferred-decision-local]
  distinct_fact_rationale:
    zh: 首选决策仍是选择决策，其额外语义是可审计的局部偏好，而非协议级别的工具强制或全局排名。
    en: A preferred decision remains a selection decision; its added meaning is auditable local preference rather than protocol-level tool forcing or global ranking.
    ja: preferred decision は selection decision のままであり、追加の意味は監査可能な local preference であり、protocol-level tool forcing や global ranking ではない。
  layout_role: primary-backbone
relations: []
sources:
  - id: openai-responses-create-reference
    title: OpenAI API — Responses create reference
    url: https://developers.openai.com/api/reference/resources/responses/methods/create
    source_type: official-doc
    relevance: Defines request-level tool-choice restrictions that remain separate from a local preferred decision.
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol — Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-spec
    relevance: Defines Tool capability metadata available to assessment without making a global ranking claim.
source_claims:
  - id: claim-preferred-decision-openai
    source: openai-responses-create-reference
    supports: OpenAI Responses tool_choice and allowed-tools forms constrain model-accessible tools in a request, which is distinct from an application-owned preference rationale.
    locator: Request body — tool_choice and allowed_tools
    evidence_kind: normative
    confidence: high
  - id: claim-preferred-decision-mcp
    source: mcp-tools-2025-11-25
    supports: MCP Tool declarations contain capability metadata and schemas that applications may assess, while tools/call remains a separate operation.
    locator: Tools — Tool definition and Calling Tools
    evidence_kind: normative
    confidence: high
  - id: claim-preferred-decision-local
    source: openai-responses-create-reference
    supports: preferred decision identity, preference_basis_refs, local selected state, and distinction from ranking, request configuration, approval, and invocation are Moonweave-local decision design inferences.
    locator: Request body — tool_choice and allowed_tools
    evidence_kind: design-inference
    confidence: high
