schema: moonweave.ai/ontology-node/v1
id: FallbackToolSelectionDecision
kind: concept
labels:
  zh: 工具回退选择决策
  en: Fallback Tool Selection Decision
  ja: ツールフォールバック選択決定
semantics:
  short_definition:
    zh: 由于先前选择不能继续而以明确触发和证据记录的工具选择决策。
    en: A tool-selection decision made because a prior selection cannot proceed, with explicit trigger and evidence.
    ja: prior selection が継続できないために、明示的な trigger と evidence を持って作られる tool-selection decision。
  definition:
    zh: FallbackToolSelectionDecision 是 ToolSelectionDecision 的一种，记录先前决策、回退触发、重新评估的候选范围以及新的选择、无选择或待处理状态。它不会修改或抹去先前决策，也不把工具调用失败、审批拒绝或策略变化本身当作新的选择；回退候选仍必须在可追溯候选范围内并有相应评估证据。
    en: FallbackToolSelectionDecision is a kind of ToolSelectionDecision that records a prior decision, fallback trigger, reassessed candidate scope, and a new selected, no-selection, or pending state. It does not mutate or erase the prior decision and does not treat a tool-call failure, approval denial, or policy change itself as the new selection; a fallback candidate must still be within traceable candidate scope and have corresponding assessment evidence.
    ja: FallbackToolSelectionDecision は ToolSelectionDecision の一種であり、prior decision、fallback trigger、reassessed candidate scope、新しい selected、no-selection、pending state を記録する。prior decision を mutate または erase せず、tool-call failure、approval denial、policy change 自体を新しい selection と扱わない。fallback candidate は traceable candidate scope 内にあり対応する assessment evidence を持たなければならない。
  why_needed:
    zh: 失败后的替代选择需要解释它为何发生、为何安全、与旧决定有何关系。专门决策记录保留这条链，使后续调用层不会把任何错误或列表顺序误解释为已批准的替代工具。
    en: An alternative after failure needs explanation of why it occurred, why it is safe, and how it relates to the old decision. A specialized decision record retains that chain so a later invocation layer does not misread any error or list order as an approved alternative tool.
    ja: failure 後の alternative には、なぜ起きたか、なぜ safe か、old decision とどう関係するかの説明が必要である。specialized decision record はその chain を保持し、後続 invocation layer が error や list order を approved alternative tool と誤読しないようにする。
  includes:
    - zh: 先前决策引用、回退触发、评估证据和新的选择状态。
      en: A prior-decision reference, fallback trigger, assessment evidence, and new selection state.
      ja: prior-decision reference、fallback trigger、assessment evidence、新しい selection state。
    - zh: 对已有候选的重新选择、明确无选择或等待澄清/审批。
      en: Reselection among existing candidates, explicit no selection, or waiting for clarification or approval.
      ja: existing candidate 間の reselection、explicit no selection、clarification または approval 待ち。
  excludes:
    - zh: 隐式选择列表第二项、重新发现新候选、调用失败结果或对旧决策的就地修改。
      en: Implicitly choosing the second list item, discovering new candidates, a call-failure result, or in-place modification of the old decision.
      ja: list の二番目を暗黙に選ぶこと、新しい candidate の discovery、call-failure result、old decision の in-place modification。
    - zh: 不含先前决策和触发原因的普通 ToolSelectionDecision。
      en: An ordinary ToolSelectionDecision with no prior decision and trigger reason.
      ja: prior decision と trigger reason のない通常の ToolSelectionDecision。
  semantic_kind: information
engineering:
  explanation:
    zh: 回退选择活动创建一条新 decision_id，而不是改写 prior_decision_ref。记录必须关联 trigger 证据和新候选的评估；若没有合格替代项，decision_state 为 no_selection 或 pending_clarification，而不能产生伪造的 chosen_candidate_ref。
    en: A fallback selection activity creates a new decision_id rather than rewriting prior_decision_ref. The record must link trigger evidence and assessments of the new candidate; if no eligible alternative exists, decision_state is no_selection or pending_clarification and cannot fabricate chosen_candidate_ref.
    ja: fallback selection activity は prior_decision_ref を書き換えず新しい decision_id を作る。record は trigger evidence と新しい candidate の assessment を link しなければならない。eligible alternative がない場合、decision_state は no_selection または pending_clarification であり、chosen_candidate_ref を捏造できない。
  typical_input:
    - description:
        zh: 本地回退选择输入
        en: Local fallback-selection input
        ja: Local fallback-selection input
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"fallback_selection_input","prior_decision_ref":"decision:select-17","trigger_ref":"approval:17","candidate_set_ref":"set:17","assessment_refs":["assess:18"]}
      source_claims: [claim-fallback-decision-local]
    - description:
        zh: OpenAI 远程 MCP 审批约束
        en: OpenAI remote-MCP approval constraint
        ja: OpenAI remote-MCP approval constraint
      format: |-
        {"type":"mcp","server_label":"docs","server_url":"https://tools.example.test/mcp","allowed_tools":["search-docs","search-backup"],"require_approval":"always"}
      source_claims: [claim-fallback-decision-openai]
  typical_output:
    - description:
        zh: 本地回退选择决策
        en: Local fallback-selection decision
        ja: Local fallback-selection decision
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"fallback_tool_selection_decision","decision_id":"fallback-17","selection_activity_ref":"selection:fallback-17","prior_decision_ref":"decision:select-17","fallback_trigger_ref":"approval:17","candidate_set_ref":"set:17","decision_state":"selected","chosen_candidate_ref":"candidate:search-backup","assessment_refs":["assess:18"],"rationale":"Backup is eligible after primary approval denial"}
      source_claims: [claim-fallback-decision-local]
  reference_implementations:
    - name: OpenAI Responses remote MCP configuration
      url: https://developers.openai.com/api/reference/resources/responses/methods/create
      description: Defines allowed-tool and approval constraints that may be preserved as fallback trigger evidence.
    - name: Model Context Protocol Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines Tool declarations and distinguishes them from tools/call failures and results.
structure:
  identity_keys: [decision_id]
  fields:
    - id: decision_id
      labels: {zh: 回退决策标识, en: Fallback-decision identifier, ja: fallback-decision 識別子}
      definitions:
        zh: 稳定标识一条新的本地回退选择决策，不复用先前决策 id。
        en: Stably identifies one new local fallback-selection decision and does not reuse the prior decision id.
        ja: 一つの新しい local fallback-selection decision を安定して識別し、prior decision id を再利用しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: fallback-17
      source_claims: [claim-fallback-decision-local]
    - id: selection_activity_ref
      labels: {zh: 选择活动引用, en: Selection-activity reference, ja: selection-activity 参照}
      definitions:
        zh: 继承产生该新回退决策的 ToolSelectionActivity 引用；它不是被替换的 prior_decision_ref。
        en: Retains the ToolSelectionActivity reference that formed this new fallback decision; it is not the prior_decision_ref being replaced.
        ja: この新しい fallback decision を形成した ToolSelectionActivity reference を保持する。置換対象の prior_decision_ref ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: selection:fallback-17
      source_claims: [claim-fallback-decision-local]
    - id: prior_decision_ref
      labels: {zh: 先前决策引用, en: Prior-decision reference, ja: prior-decision 参照}
      definitions:
        zh: 指向无法继续的 ToolSelectionDecision，保留原决策的状态与理由。
        en: Points to the ToolSelectionDecision that cannot proceed and retains its original state and rationale.
        ja: 継続できない ToolSelectionDecision を指し、元の state と rationale を保持する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: decision:select-17
      source_claims: [claim-fallback-decision-local]
    - id: fallback_trigger_ref
      labels: {zh: 回退触发引用, en: Fallback-trigger reference, ja: fallback-trigger 参照}
      definitions:
        zh: 指向使先前选择无法继续的审批、政策、可用性或资格证据。
        en: Points to approval, policy, availability, or eligibility evidence that prevents the prior selection from proceeding.
        ja: prior selection の継続を妨げる approval、policy、availability、eligibility evidence を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: approval:17
      source_claims: [claim-fallback-decision-local]
    - id: candidate_set_ref
      labels: {zh: 候选集引用, en: Candidate-set reference, ja: candidate-set 参照}
      definitions:
        zh: 继承本次决策可比较的候选范围；回退候选必须来自此范围，而不是在决策时重新发现。
        en: Retains the candidate scope comparable by this decision; a fallback candidate must come from this scope rather than be newly discovered at decision time.
        ja: この decision で比較可能な candidate scope を保持する。fallback candidate は decision 時に新規 discovery されるのでなく、この scope から来なければならない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: set:17
      source_claims: [claim-fallback-decision-local]
    - id: decision_state
      labels: {zh: 回退决策状态, en: Fallback-decision state, ja: fallback-decision state}
      definitions:
        zh: 说明回退是否选择替代项、明确无选择或仍需澄清/审批；它不记录调用执行。
        en: States whether fallback selects an alternative, explicitly selects none, or still needs clarification or approval; it does not record invocation execution.
        ja: fallback が alternative を選ぶ、explicitly none を選ぶ、clarification または approval をなお必要とするかを示す。invocation execution は記録しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [selected, no_selection, pending_clarification, pending_approval]
      pattern: null
      example_value: selected
      source_claims: [claim-fallback-decision-local]
    - id: chosen_candidate_ref
      labels: {zh: 回退已选候选引用, en: Fallback chosen-candidate reference, ja: fallback chosen-candidate 参照}
      definitions:
        zh: 仅在 selected 状态下指向原候选范围中经重新评估的一个替代候选。
        en: Points only in selected state to one re-assessed alternative in the original candidate scope.
        ja: selected state の場合に限り、original candidate scope 内で re-assessed された一つの alternative を指す。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: candidate:search-backup
      source_claims: [claim-fallback-decision-local]
    - id: assessment_refs
      labels: {zh: 重新评估引用, en: Reassessment references, ja: reassessment 参照}
      definitions:
        zh: 指向支持回退选择或无选择的新旧评估 evidence。
        en: Points to new or retained assessment evidence supporting fallback selection or no selection.
        ja: fallback selection または no selection を支持する新しいまたは保持された assessment evidence を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: assess:18
      source_claims: [claim-fallback-decision-local]
  constraints:
    - id: fallback-decision-preserves-prior-and-requires-trigger
      severity: error
      expression_language: plain
      expression: Every FallbackToolSelectionDecision must have a distinct decision_id, selection_activity_ref, prior_decision_ref, fallback_trigger_ref, candidate_set_ref, and assessment_refs; it must not mutate, supersede silently, or reuse the prior decision id.
      explanation:
        zh: 回退必须保留旧决策和触发证据的审计链。
        en: Fallback must retain an audit chain to the old decision and trigger evidence.
        ja: fallback は old decision と trigger evidence への audit chain を保持しなければならない。
      source_claims: [claim-fallback-decision-local]
    - id: fallback-decision-state-and-candidate-must-agree
      severity: error
      expression_language: plain
      expression: selected requires one chosen_candidate_ref in candidate_set_ref and supporting assessment_refs; no_selection or pending states require no chosen_candidate_ref and an explicit blocker or rationale; no field may contain tool_call or tool_result.
      explanation:
        zh: 回退选择与普通选择一样需证据一致，且不能跨入调用执行。
        en: Fallback choice needs the same evidence consistency as ordinary selection and cannot cross into invocation execution.
        ja: fallback choice は通常の selection と同じ evidence consistency を必要とし、invocation execution に跨れない。
      source_claims: [claim-fallback-decision-local]
  required_relations: []
examples:
  - id: fallback-decision-positive-backup-selected

    labels: {zh: 选择已评估备选项, en: Select assessed backup, ja: assessed backup を選択する}
    descriptions:
      zh: Toolformer (Schick 2023) 自监督判断何时插入 [Calculator(350/7)]/[Search(query)]；ToolBench DFSDT 在 16000+ RapidAPI 上 depth-first 工具选择；ART 从示例库检索多步推理模式。
      en: Toolformer (Schick 2023) self-supervised when-to-insert [Calculator(350/7)]/[Search(query)]; ToolBench DFSDT depth-first tool selection over 16000+ RapidAPI; ART retrieves multi-step reasoning patterns from task demos.
      ja: Toolformer (Schick 2023) 自己教師あり [Calculator(350/7)]/[Search(query)] 挿入判断。ToolBench DFSDT が 16000+ RapidAPI で depth-first tool 選択。ART が task demo から多段 reasoning pattern を检索。
    field_values: {decision_id: fallback-17, selection_activity_ref: selection:fallback-17, prior_decision_ref: decision:select-17, fallback_trigger_ref: approval:17, candidate_set_ref: set:17, decision_state: selected, chosen_candidate_ref: candidate:search-backup, assessment_refs: [assess:18]}
    related_node_ids: [FallbackToolSelectionDecision, ToolSelectionDecision]
    related_relation_ids: [FallbackToolSelectionDecision-is_a-ToolSelectionDecision]

    source_claims: [claim-fallback-decision-local]
  - id: fallback-decision-counterexample-overwrite-prior

    labels: {zh: 覆盖先前决策, en: Overwrite prior decision, ja: prior decision を上書きする}
    descriptions:
      zh: 反例：未执行 ToolBench API 检索或 Gorilla retriever 就假定工具可用；违反 Toolformer 自监督「仅在 API 调用改善 loss 时插入」准则。
      en: Counterexample: assuming tool availability without ToolBench API search or Gorilla retriever; violates Toolformer self-supervised criterion of inserting only when API call improves loss.
      ja: 反例：ToolBench API 检索や Gorilla retriever なしで tool 可用性を仮定。Toolformer 自己教師あり「API 呼出しが loss 改善時のみ挿入」准则違反。
    field_values: {decision_id: select-17, chosen_candidate_ref: candidate:search-backup, decision_state: selected}
    related_node_ids: [FallbackToolSelectionDecision, ToolSelectionDecision]
    related_relation_ids: []

    source_claims: [claim-fallback-decision-local]
  - id: fallback-decision-boundary-no-alternative

    labels: {zh: 无替代候选边界, en: No-alternative boundary, ja: no-alternative 境界}
    descriptions:
      zh: Toolformer 训练时 API 调用标记 vs ToolBench/Gorilla 运行时 capability discovery 的方法论边界；本地 ToolSelectionDecision 非 wire tool_choice。
      en: Methodological boundary between Toolformer training-time API markers vs ToolBench/Gorilla runtime capability discovery; local ToolSelectionDecision is not wire tool_choice.
      ja: Toolformer 訓練時 API marker と ToolBench/Gorilla ランタイム capability discovery の方法論境界。ローカル ToolSelectionDecision は wire tool_choice ではない。
    field_values: {decision_id: fallback-19, selection_activity_ref: selection:fallback-19, prior_decision_ref: decision:select-19, fallback_trigger_ref: availability:19, candidate_set_ref: set:19, decision_state: no_selection, assessment_refs: [assess:19, assess:20]}
    related_node_ids: [FallbackToolSelectionDecision, ToolClarificationRequest]
    related_relation_ids: [FallbackToolSelectionDecision-is_a-ToolSelectionDecision]

    source_claims: [claim-fallback-decision-local]
  - id: fallback-decision-instance-policy-trigger

    labels: {zh: 政策触发回退实例, en: Policy-trigger fallback instance, ja: policy-trigger fallback instance}
    descriptions:
      zh: ToolBench ToolLLM 实例：query="book a flight"→DFSDT 选择 RapidAPI flights/search；Gorilla retriever 返回 HuggingFace transformers.pipeline API 文档 top-3。
      en: ToolBench ToolLLM instance: query="book a flight"→DFSDT selects RapidAPI flights/search; Gorilla retriever returns HuggingFace transformers.pipeline API docs top-3.
      ja: ToolBench ToolLLM 実例：query="book a flight"→DFSDT が RapidAPI flights/search を選択。Gorilla retriever が HuggingFace transformers.pipeline API 文档 top-3 を返す。
    field_values: {decision_id: fallback-20, selection_activity_ref: selection:fallback-20, prior_decision_ref: decision:select-20, fallback_trigger_ref: policy:offline, candidate_set_ref: set:20, decision_state: selected, chosen_candidate_ref: candidate:local-search, assessment_refs: [assess:21]}
    related_node_ids: [FallbackToolSelectionDecision, ToolEligibilityAssessment]
    related_relation_ids: [FallbackToolSelectionDecision-is_a-ToolSelectionDecision]

    source_claims: [claim-fallback-decision-local]
parent_relation:
  id: FallbackToolSelectionDecision-is_a-ToolSelectionDecision
  predicate: is_a
  target: concept:ToolSelectionDecision
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是工具选择决策的一种, en: is a kind of tool selection decision, ja: tool selection decision の一種である}
  definitions:
    zh: FallbackToolSelectionDecision 继承选择决策的状态、候选范围和评估要求，并额外要求先前决策与回退触发。
    en: FallbackToolSelectionDecision inherits selection-decision state, candidate scope, and assessment requirements and additionally requires a prior decision and fallback trigger.
    ja: FallbackToolSelectionDecision は selection-decision state、candidate scope、assessment requirement を継承し、さらに prior decision と fallback trigger を要求する。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels: {zh: 具有回退选择决策子类, en: has fallback-selection decision subtype, ja: fallback-selection decision subtype を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: This is a true subtype hierarchy for a decision record and does not turn an approval event, error, or tool invocation into a decision.
  constraints: []
  examples: []
  source_claims: [claim-fallback-decision-local]
  distinct_fact_rationale:
    zh: 回退决策仍是选择决策，只是它的有效性依赖已记录的先前决定和新的触发。
    en: A fallback decision remains a selection decision, but its validity depends on a recorded prior decision and a new trigger.
    ja: fallback decision は selection decision のままだが、その validity は記録済み prior decision と新しい trigger に依存する。
  layout_role: primary-backbone
relations: []
sources:
  - id: openai-responses-create-reference
    title: OpenAI API — Responses create reference
    url: https://developers.openai.com/api/reference/resources/responses/methods/create
    source_type: official-doc
    relevance: Defines remote MCP allowed-tool and approval controls that can be retained as trigger evidence, not a fallback decision.
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol — Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-spec
    relevance: Defines Tool declarations and distinct tools/call result boundary.
source_claims:
  - id: claim-fallback-decision-openai
    source: openai-responses-create-reference
    supports: OpenAI remote MCP tool configuration includes allowed_tools and require_approval controls that can constrain a request and serve as external evidence for a local fallback trigger.
    locator: Request body — MCP tool configuration
    evidence_kind: normative
    confidence: high
  - id: claim-fallback-decision-mcp
    source: mcp-tools-2025-11-25
    supports: MCP separates Tool declarations from tools/call and CallToolResult, so a failure or result remains distinct from a local fallback selection decision.
    locator: Tools — Tool definition and Calling Tools
    evidence_kind: normative
    confidence: high
  - id: claim-fallback-decision-local
    source: openai-responses-create-reference
    supports: selection_activity_ref, candidate_set_ref, prior_decision_ref, fallback_trigger_ref, distinct decision identity, reassessment evidence, and fallback selected/no-selection/pending states are Moonweave-local decision design inferences.
    locator: Request body — MCP tool configuration
    evidence_kind: design-inference
    confidence: high
