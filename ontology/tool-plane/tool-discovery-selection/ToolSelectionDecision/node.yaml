schema: moonweave.ai/ontology-node/v1
id: ToolSelectionDecision
kind: concept
labels:
  zh: 工具选择决策
  en: Tool Selection Decision
  ja: ツール選択決定
semantics:
  short_definition:
    zh: 在给定候选范围、评估证据和约束下记录选择、拒绝或等待状态的本地决策记录。
    en: A local decision record that captures selection, rejection, or waiting state under a candidate scope, assessment evidence, and constraints.
    ja: candidate scope、assessment evidence、constraint の下で selection、rejection、waiting state を記録する local decision record。
  definition:
    zh: ToolSelectionDecision 是由 ToolSelectionActivity 生成的本地结果记录，说明该活动选定一个候选、明确不选任何候选、等待澄清或等待审批，并保留所依据的候选集、评估和理由。它不是 ToolMatch、排名分数、OpenAI tool_choice、MCP Tool、批准事件或工具调用；即使 decision_state 为 selected，执行仍属于工具调用执行边界。
    en: ToolSelectionDecision is the local result record generated by ToolSelectionActivity, stating that the activity selected one candidate, explicitly selected none, awaits clarification, or awaits approval while retaining the candidate set, assessments, and rationale on which it relies. It is not a ToolMatch, ranking score, OpenAI tool_choice, MCP Tool, approval event, or tool call; even when decision_state is selected, execution remains in the tool-invocation execution boundary.
    ja: ToolSelectionDecision は ToolSelectionActivity により生成される local result record であり、一つの candidate を selected、明示的に none selected、clarification 待ち、approval 待ちのいずれかを示し、依拠する candidate set、assessment、rationale を保持する。ToolMatch、ranking score、OpenAI tool_choice、MCP Tool、approval event、tool call ではない。decision_state が selected でも execution は tool-invocation execution boundary に属する。
  why_needed:
    zh: 选择需要可解释的结果，特别是在没有合格候选、信息不足或审批未完成时。独立记录使调用层只能消费明确决策，而不会从匹配信号、配置或目录顺序猜测应执行什么。
    en: Selection needs an explainable outcome, especially when no candidate is eligible, information is missing, or approval is unfinished. A separate record lets the invocation layer consume only an explicit decision instead of guessing what to execute from a match signal, configuration, or catalog order.
    ja: selection には説明可能な outcome が必要であり、特に eligible candidate がない、information が不足、approval が未完了の場合に必要である。別 record により invocation layer は match signal、configuration、catalog order から何を execute すべきかを推測せず、明示的な decision だけを消費できる。
  includes:
    - zh: selected、no_selection、pending_clarification 或 pending_approval 等明确状态。
      en: Explicit states such as selected, no_selection, pending_clarification, or pending_approval.
      ja: selected、no_selection、pending_clarification、pending_approval などの明示的な state。
    - zh: 一个可选的已选候选引用，以及候选集、评估和理由引用。
      en: An optional chosen-candidate reference plus candidate-set, assessment, and rationale references.
      ja: optional chosen-candidate reference と candidate-set、assessment、rationale reference。
  excludes:
    - zh: 搜索结果、评估 finding、服务可用性观测、批准结果、工具参数和工具调用结果。
      en: Search results, assessment findings, service-availability observations, approval results, tool arguments, and tool-call results.
      ja: search result、assessment finding、service-availability observation、approval result、tool argument、tool-call result。
    - zh: 以 OpenAI tool_choice 或 MCP allowed_tools 为唯一依据的隐式选择。
      en: An implicit selection based solely on OpenAI tool_choice or MCP allowed_tools.
      ja: OpenAI tool_choice または MCP allowed_tools だけに基づく implicit selection。
  semantic_kind: information
engineering:
  explanation:
    zh: 选择器在完成本地选择活动后写入决策。selected 状态须引用一个候选和支持它的评估；其他状态保留未选理由或阻塞引用。若随后生成 OpenAI tool_choice 或发出 MCP tools/call，它们是下游协议动作，必须保留为独立对象。
    en: A selector writes the decision after completing local selection activity. The selected state must reference one candidate and supporting assessments; other states retain an unchosen rationale or blocking reference. If an OpenAI tool_choice is later generated or MCP tools/call is sent, those are downstream protocol actions and must remain separate objects.
    ja: selector は local selection activity を完了した後 decision を書く。selected state は一つの candidate と supporting assessment を参照しなければならない。他の state は unchosen rationale または blocking reference を保持する。後で OpenAI tool_choice が生成されたり MCP tools/call が送られたりしても、それらは downstream protocol action であり別 object のままでなければならない。
  typical_input:
    - description:
        zh: 本地选择证据
        en: Local selection evidence
        ja: Local selection evidence
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"selection_input","selection_activity_ref":"selection:17","candidate_set_ref":"set:17","assessment_refs":["assess:17"],"task_requirement_ref":"task:42"}
      source_claims: [claim-decision-local]
    - description:
        zh: OpenAI 工具选择约束
        en: OpenAI tool-choice constraint
        ja: OpenAI tool-choice constraint
      format: |-
        {"tool_choice":{"type":"mcp","server_label":"docs","name":"search-docs"}}
      source_claims: [claim-decision-openai]
  typical_output:
    - description:
        zh: 本地工具选择决策
        en: Local tool-selection decision
        ja: Local tool-selection decision
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"tool_selection_decision","decision_id":"select-17","selection_activity_ref":"selection:17","candidate_set_ref":"set:17","decision_state":"selected","chosen_candidate_ref":"candidate:search-docs","assessment_refs":["assess:17"],"rationale":"Eligible match satisfies task under policy"}
      source_claims: [claim-decision-local]
  reference_implementations:
    - name: OpenAI Responses create reference
      url: https://developers.openai.com/api/reference/resources/responses/methods/create
      description: Defines model tool-choice configuration that is kept distinct from a local decision record.
    - name: Model Context Protocol Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines Tool declarations and the separate tools/call operation.
structure:
  identity_keys: [decision_id]
  fields:
    - id: decision_id
      labels: {zh: 决策标识, en: Decision identifier, ja: decision 識別子}
      definitions:
        zh: 稳定标识一个本地选择决策，不替代工具名、模型响应 id 或调用 id。
        en: Stably identifies one local selection decision and does not replace a tool name, model response id, or invocation id.
        ja: 一つの local selection decision を安定して識別し、tool name、model response id、invocation id を置き換えない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: select-17
      source_claims: [claim-decision-local]
    - id: selection_activity_ref
      labels: {zh: 选择活动引用, en: Selection-activity reference, ja: selection-activity 参照}
      definitions:
        zh: 指向形成该结果的 ToolSelectionActivity，使决策可回溯到候选范围和过程。
        en: Points to the ToolSelectionActivity that formed this result so it can be traced to candidate scope and process.
        ja: この result を形成した ToolSelectionActivity を指し、candidate scope と process に追跡可能にする。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: selection:17
      source_claims: [claim-decision-local]
    - id: candidate_set_ref
      labels: {zh: 候选集引用, en: Candidate-set reference, ja: candidate-set 参照}
      definitions:
        zh: 指向决策考虑过的 ToolCandidateSet，并限制 chosen_candidate_ref 的来源范围。
        en: Points to the ToolCandidateSet considered by the decision and bounds the origin of chosen_candidate_ref.
        ja: decision が考慮した ToolCandidateSet を指し、chosen_candidate_ref の origin scope を制限する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: set:17
      source_claims: [claim-decision-local]
    - id: decision_state
      labels: {zh: 决策状态, en: Decision state, ja: decision state}
      definitions:
        zh: 表示是否选择、明确不选择或因澄清/审批暂停；不是工具运行状态。
        en: States whether a candidate is selected, explicitly not selected, or paused for clarification or approval; it is not a tool runtime state.
        ja: candidate が selected、explicitly not selected、clarification または approval で paused のどれかを示す。tool runtime state ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [selected, no_selection, pending_clarification, pending_approval]
      pattern: null
      example_value: selected
      source_claims: [claim-decision-local]
    - id: chosen_candidate_ref
      labels: {zh: 已选候选引用, en: Chosen-candidate reference, ja: chosen-candidate 参照}
      definitions:
        zh: 在且仅在 decision_state 为 selected 时指向候选集中的一个 ToolCandidate；它不是执行调用。
        en: Points to one ToolCandidate in the candidate set if and only if decision_state is selected; it is not an invocation call.
        ja: decision_state が selected の場合に限り candidate set 内の一つの ToolCandidate を指す。invocation call ではない。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: candidate:search-docs
      source_claims: [claim-decision-local]
    - id: assessment_refs
      labels: {zh: 评估引用, en: Assessment references, ja: assessment 参照}
      definitions:
        zh: 指向支持状态和理由的 ToolCandidateAssessment 或其 finding。
        en: Points to ToolCandidateAssessments or findings that support the state and rationale.
        ja: state と rationale を支持する ToolCandidateAssessment または finding を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: assess:17
      source_claims: [claim-decision-local]
  constraints:
    - id: decision-state-and-candidate-must-agree
      severity: error
      expression_language: plain
      expression: decision_state selected requires exactly one chosen_candidate_ref from candidate_set_ref and supporting assessment_refs; no_selection, pending_clarification, and pending_approval require no chosen_candidate_ref and an explicit rationale or blocking reference.
      explanation:
        zh: 状态、候选和证据必须一致，避免把未决或拒绝状态伪装成已选。
        en: State, candidate, and evidence must agree, preventing pending or rejected states from being disguised as selected.
        ja: state、candidate、evidence は一致しなければならず、pending または rejected state を selected と偽装することを防ぐ。
      source_claims: [claim-decision-local]
    - id: decision-is-not-protocol-call-or-result
      severity: error
      expression_language: plain
      expression: ToolSelectionDecision must not contain tool_choice, allowed_tools, tool_call, invocation_id, tool_result, approval_granted, or availability_state; such protocol configurations, approvals, and runtime records remain separate evidence or downstream objects.
      explanation:
        zh: 决策记录选择理由；协议配置、批准和执行保留各自边界。
        en: A decision record captures selection rationale; protocol configuration, approval, and execution retain their own boundaries.
        ja: decision record は selection rationale を記録する。protocol configuration、approval、execution はそれぞれの boundary を保持する。
      source_claims: [claim-decision-openai, claim-decision-local]
  required_relations: []
examples:
  - id: decision-positive-selected-candidate

    labels: {zh: 选定有评估证据的候选, en: Select candidate with assessment evidence, ja: assessment evidence を持つ candidate を選定する}
    descriptions:
      zh: Toolformer (Schick 2023) 模型自监督判断插入 [QA("What is the capital of France?")]；ToolBench DFSDT 在 16000+ RapidAPI 上 depth-first 选择 get_weather API；本地 ToolSelectionDecision 记录 selected 状态与评估证据。
      en: Toolformer (Schick 2023) self-supervised decision to insert [QA("What is the capital of France?")]; ToolBench DFSDT depth-first selects get_weather among 16000+ RapidAPI; local ToolSelectionDecision records selected state with assessment evidence.
      ja: Toolformer (Schick 2023) が [QA("What is the capital of France?")] 挿入を自己教師あり判断。ToolBench DFSDT が 16000+ RapidAPI から get_weather を depth-first 選択。ローカル ToolSelectionDecision が selected state を記録。
    field_values: {decision_id: select-17, selection_activity_ref: selection:17, candidate_set_ref: set:17, decision_state: selected, chosen_candidate_ref: candidate:search-docs, assessment_refs: [assess:17]}
    related_node_ids: [ToolSelectionDecision, ToolSelectionActivity, ToolCandidateAssessment]
    related_relation_ids: [ToolSelectionDecision-was_generated_by-ToolSelectionActivity]

    source_claims: [claim-decision-local]
  - id: decision-counterexample-selected-without-candidate

    labels: {zh: 已选状态没有候选, en: Selected state without candidate, ja: candidate のない selected state}
    descriptions:
      zh: 反例：未执行 ToolBench API 检索或 Gorilla retriever 就假定工具可用；违反 Toolformer 自监督「仅在 API 调用改善 loss 时插入」准则。
      en: Counterexample: assuming tool availability without ToolBench API search or Gorilla retriever; violates Toolformer self-supervised criterion of inserting only when API call improves loss.
      ja: 反例：ToolBench API 检索や Gorilla retriever なしで tool 可用性を仮定。Toolformer 自己教師あり「API 呼出しが loss 改善時のみ挿入」准则違反。
    field_values: {decision_id: select-18, selection_activity_ref: selection:18, candidate_set_ref: set:18, decision_state: selected}
    related_node_ids: [ToolSelectionDecision, ToolCandidate]
    related_relation_ids: []

    source_claims: [claim-decision-local]
  - id: decision-boundary-pending-approval

    labels: {zh: 待审批决策边界, en: Pending-approval decision boundary, ja: pending-approval decision 境界}
    descriptions:
      zh: Toolformer 训练时 API 调用标记 vs ToolBench/Gorilla 运行时 capability discovery 的方法论边界；本地 ToolSelectionDecision 非 wire tool_choice。
      en: Methodological boundary between Toolformer training-time API markers vs ToolBench/Gorilla runtime capability discovery; local ToolSelectionDecision is not wire tool_choice.
      ja: Toolformer 訓練時 API marker と ToolBench/Gorilla ランタイム capability discovery の方法論境界。ローカル ToolSelectionDecision は wire tool_choice ではない。
    field_values: {decision_id: select-19, selection_activity_ref: selection:19, candidate_set_ref: set:19, decision_state: pending_approval, assessment_refs: [assess:19], blocking_ref: approval:19}
    related_node_ids: [ToolSelectionDecision, ToolAvailabilityAssessment]
    related_relation_ids: [ToolSelectionDecision-was_generated_by-ToolSelectionActivity]

    source_claims: [claim-decision-openai, claim-decision-local]
  - id: decision-instance-explicit-no-selection

    labels: {zh: 明确无选择实例, en: Explicit no-selection instance, ja: explicit no-selection instance}
    descriptions:
      zh: ART (Paranjape 2023) 从示例库检索推理模式失败时 no_selection；Gorilla retriever-aware training 无匹配 API 时拒绝 hallucinated 调用，保留 assessment_refs 与 rationale。
      en: ART (Paranjape 2023) no_selection when task-demo retrieval fails; Gorilla retriever-aware training rejects hallucinated call without matching API, retaining assessment_refs and rationale.
      ja: ART (Paranjape 2023) が task-demo 检索失敗で no_selection。Gorilla retriever-aware training が matching API なし hallucinated call を拒否。
    field_values: {decision_id: select-20, selection_activity_ref: selection:20, candidate_set_ref: set:20, decision_state: no_selection, assessment_refs: [assess:20, assess:21], rationale: no-eligible-candidate}
    related_node_ids: [ToolSelectionDecision, ToolEligibilityAssessment]
    related_relation_ids: [ToolSelectionDecision-was_generated_by-ToolSelectionActivity]

    source_claims: [claim-decision-local]
parent_relation: null
relations:
  - id: ToolSelectionDecision-was_generated_by-ToolSelectionActivity
    predicate: was_generated_by
    target: concept:ToolSelectionActivity
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 由工具选择活动生成, en: was generated by tool selection activity, ja: tool selection activity により生成された}
    definitions:
      zh: 当 ToolSelectionActivity 综合候选范围、评估证据和约束并记录 selected、no_selection 或等待状态时，ToolSelectionDecision 由该活动生成。
      en: ToolSelectionDecision was generated by ToolSelectionActivity when that activity combined candidate scope, assessment evidence, and constraints and recorded a selected, no_selection, or waiting state.
      ja: ToolSelectionActivity が candidate scope、assessment evidence、constraint を統合し、selected、no_selection、または waiting state を記録したとき、ToolSelectionDecision はその activity により生成された。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: generated
      labels: {zh: 生成选择决策, en: generated selection decision, ja: selection decision を生成した}
    conditions:
      - id: decision-generation-provenance-condition
        severity: error
        expression: Assert was_generated_by only when selection_activity_ref identifies the activity that recorded the candidate scope, supporting assessments, decision state, and rationale; a tool_choice configuration or call record is not this decision entity.
        explanations: {zh: 生成关系需要活动的可审计选择证据，不能用模型配置或运行时调用代替决策记录。, en: The generation relation requires auditable selection evidence from the activity; model configuration or a runtime call cannot substitute for the decision record., ja: generation relation には activity からの監査可能な selection evidence が必要であり、model configuration または runtime call は decision record の代わりにならない。}
        source_claims: [claim-decision-prov-generation, claim-decision-local]
    temporal_scope: valid-time
    boundary_context: This provenance link records a generated local decision result; it does not authorize, configure, or execute a protocol tool call.
    constraints: []
    examples: []
    source_claims: [claim-decision-prov-generation, claim-decision-local]
    distinct_fact_rationale:
      zh: 生成溯源连接选择活动与其独立决策记录，而不把该结果误建模为活动的组成部分。
      en: Generation provenance links the selection activity to its independent decision record without mis-modeling the result as an activity component.
      ja: generation provenance は selection activity と独立した decision record を結び、result を activity の構成要素として誤って model 化しない。
    layout_role: cross-link
sources:
  - id: openai-responses-create-reference
    title: OpenAI API — Responses create reference
    url: https://developers.openai.com/api/reference/resources/responses/methods/create
    source_type: official-doc
    relevance: Defines protocol-level tool-choice and remote-MCP configuration that a local selection decision must not impersonate.
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol — Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-spec
    relevance: Defines Tool declarations and tools/call as a separate execution operation.
  - id: w3c-prov-o
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines Entity and Activity provenance links, including an Entity's generation by an Activity.
source_claims:
  - id: claim-decision-openai
    source: openai-responses-create-reference
    supports: OpenAI Responses tool_choice supports model tool constraints including none, auto, required, allowed-tools, and selected remote MCP tool references; these are request configuration fields.
    locator: Request body — tool_choice and allowed_tools
    evidence_kind: normative
    confidence: high
  - id: claim-decision-mcp
    source: mcp-tools-2025-11-25
    supports: MCP defines Tool declaration separately from tools/call and its CallToolResult, preserving the distinction between deciding about a tool and invoking it.
    locator: Tools — Tool definition and Calling Tools
    evidence_kind: normative
    confidence: high
  - id: claim-decision-local
    source: openai-responses-create-reference
    supports: decision_id, decision_state, chosen_candidate_ref, assessment_refs, no-selection and pending states, and separation from protocol configuration and invocation are Moonweave-local decision design inferences.
    locator: Request body — tool_choice and allowed_tools
    evidence_kind: design-inference
    confidence: high
  - id: claim-decision-prov-generation
    source: w3c-prov-o
    supports: PROV-O relates a generated Entity to the Activity that generated it; this local was_generated_by link records a ToolSelectionDecision without asserting structural composition.
    locator: Section 3.1, prov:Entity and prov:wasGeneratedBy
    evidence_kind: standard
    confidence: high
