schema: moonweave.ai/ontology-node/v1
id: ToolSelectionDecision
kind: concept
status: review
labels:
  zh: 工具选择决定
  en: Tool selection decision
  ja: ツール選択決定
semantics:
  short_definition:
    zh: 工具选择决定记录一次选择活动对候选的承诺、拒选理由和调用交接。
    en: A tool selection decision records one selection activity's commitment to a candidate, rejection reasons, and invocation handoff.
    ja: ツール選択決定は一 selection activity の candidate commitment・rejection reasons・invocation handoff を記録します。
  definition:
    zh: 工具选择决定是一份不可变的信息记录，引用被选 ToolCandidate、同一集合中的被拒候选、使用的查询版本和决定理由，并可通知 ToolCallPlan；它不直接选择 ToolDefinition，从而保留候选与评估中间层。
    en: A tool selection decision is an immutable information record referencing the selected ToolCandidate, rejected candidates from the same set, query version, and rationale, and it may inform ToolCallPlan; it never selects ToolDefinition directly, preserving candidate and assessment layers.
    ja: ツール選択決定は selected ToolCandidate・同一 set の rejected candidates・query version・rationale を参照する immutable information record で ToolCallPlan に情報を渡せます。ToolDefinition を直接選ばず candidate/assessment layers を保持します。
  why_needed:
    zh: 决定节点提供可复现的选择证据和稳定交接点，避免把模型的一次工具名称输出误当完整选择逻辑。
    en: The decision node provides reproducible choice evidence and a stable handoff point, preventing one emitted tool name from masquerading as complete selection logic.
    ja: decision node は reproducible choice evidence と stable handoff point を提供し、model の一 tool-name output を complete selection logic と誤認しません。
  includes:
    - zh: 带 decision_id、query_version、selected_candidate_id、被拒候选理由和决定时间的不可变记录。
      en: Immutable records with decision_id, query_version, selected_candidate_id, rejected-candidate reasons, and decision time.
      ja: decision_id・query_version・selected_candidate_id・rejected-candidate reasons・decision time を持つ immutable record。
  excludes:
    - zh: 选择活动本身、没有候选引用的 ToolDefinition 名称，以及已经参数化的 ToolCallPlan。
      en: The selection activity itself, a ToolDefinition name without candidate reference, and an already parameterized ToolCallPlan.
      ja: selection activity 自体・candidate reference のない ToolDefinition name・既に parameterized な ToolCallPlan。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - decision_id
  fields:
    - id: decision_id
      labels:
        zh: 决定标识
        en: decision ID
        ja: 判断 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一份不可变选择决定。
        en: Uniquely identifies one immutable selection decision.
        ja: 一つの immutable selection decision を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: tool-decision-042
      source_claims:
        - claim-tool-selection-decision-001
    - id: query_version
      labels:
        zh: 查询版本
        en: query version
        ja: クエリ版
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 决定所依据的 ToolSearchQuery 版本。
        en: ToolSearchQuery version on which the decision is based.
        ja: decision が依拠する ToolSearchQuery version です。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-tool-selection-decision-001
    - id: selected_candidate_id
      labels:
        zh: 选中候选标识
        en: selected candidate ID
        ja: 選択候補 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向该决定选择的 ToolCandidate，而不是 ToolDefinition 名称。
        en: References the selected ToolCandidate rather than a ToolDefinition name.
        ja: ToolDefinition name ではなく selected ToolCandidate を参照します。
      allowed_values: []
      pattern: null
      example_value: candidate-read-file
      source_claims:
        - claim-tool-selection-decision-001
    - id: rejected_candidate_reasons
      labels:
        zh: 被拒候选理由
        en: rejected-candidate reasons
        ja: 却下候補理由
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按 candidate_id 保存未选候选的可核验证据理由，不以单一总分掩盖硬约束失败。
        en: Stores an evidence-checkable reason for each unselected candidate keyed by candidate_id, without hiding hard-constraint failures behind one aggregate score.
        ja: candidate_id ごとに未選択理由を保存し、hard-constraint failure を単一 aggregate score で隠しません。
      allowed_values: []
      pattern: null
      example_value:
        candidate-network-scanner: fails no-network eligibility constraint
        candidate-name-only-search: missing dependency-declaration capability
      source_claims:
        - claim-tool-selection-decision-002
    - id: rationale
      labels:
        zh: 决定理由
        en: decision rationale
        ja: 判断根拠
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 解释硬约束、完整能力覆盖、可用性和平局处理如何导向结果。
        en: Explains how hard constraints, complete capability coverage, availability, and tie handling led to the result.
        ja: hard constraints・complete capability coverage・availability・tie handling が結果へ至る経路を説明します。
      allowed_values: []
      pattern: null
      example_value: only eligible and available candidate with complete capability coverage
      source_claims:
        - claim-tool-selection-decision-001
    - id: decided_at
      labels:
        zh: 决定时刻
        en: decided at
        ja: 決定時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录决定形成时刻，用于判断其可用性证据是否仍在有效期内。
        en: Records when the decision was made so point-in-time availability evidence can be checked for validity.
        ja: decision 形成時刻を記録し、point-in-time availability evidence の有効性を確認できるようにします。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:20:10.000Z
      source_claims:
        - claim-tool-selection-decision-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: ToolSelectionDecision-example-positive-manual-001
    kind: positive
    labels:
      zh: 工具选择决定正例
      en: Positive case for Tool selection decision
      ja: ツール選択決定の正例
    scenario_id: null
    descriptions:
      zh: tool-decision-042 选择 candidate-read-file，记录 query version 2，并为另外两个候选分别保存权限失败和能力缺口理由。
      en: tool-decision-042 selects candidate-read-file under query version 2 and records authorization failure and capability gap as separate reasons for the other two candidates.
      ja: tool-decision-042 は query version 2 で candidate-read-file を選び、他二 candidates に authorization failure と capability gap を別理由として記録します。
    field_values:
      decision_id: tool-decision-042
      query_version: 2
      selected_candidate_id: candidate-read-file
      rejected_candidate_reasons:
        candidate-network-scanner: fails no-network eligibility constraint
        candidate-name-only-search: missing dependency-declaration capability
      rationale: only eligible and available candidate with complete capability coverage
      decided_at: 2026-07-16T01:20:10.000Z
    related_node_ids:
      - ToolSelectionDecision
      - ToolCandidate
      - ToolCallPlan
    related_relation_ids:
      - ToolSelectionDecision-selects-ToolCandidate
      - ToolSelectionDecision-rejects-ToolCandidate
      - ToolSelectionDecision-informs-ToolCallPlan
    expected_result:
      zh: 被选与被拒候选来自同一集合，决定理由可由现有评估重算，调用计划只读取该决定。
      en: Selected and rejected candidates come from one set, rationale can be recomputed from assessments, and ToolCallPlan only reads the decision.
      ja: selected/rejected candidates は同一 set 由来で rationale は assessments から再計算でき、ToolCallPlan は decision を読むだけです。
    why_valid_or_invalid:
      zh: 决定身份、候选引用和逐候选理由完整，且没有跨过候选层直连定义。
      en: Decision identity, candidate references, and per-candidate reasons are complete without shortcutting directly to a definition.
      ja: decision identity・candidate references・per-candidate reasons が完全で definition へ shortcut しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-selection-decision-001
  - id: ToolSelectionDecision-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 工具选择决定边界例
      en: Boundary case for Tool selection decision
      ja: ツール選択決定の境界例
    scenario_id: null
    descriptions:
      zh: 模型输出字符串“read_file”，但没有 candidate_id、query_version 或替代项理由；这只能是工具名称提议，不是 ToolSelectionDecision。
      en: The model emits the string “read_file” without candidate ID, query version, or reasons for alternatives; this is only a tool-name proposal, not ToolSelectionDecision.
      ja: model が candidate ID・query version・alternative reasons なしに『read_file』を出力した場合、tool-name proposal に過ぎず ToolSelectionDecision ではありません。
    field_values:
      decision_id: name-only-042
      query_version: 0
      selected_candidate_id: read_file
      rationale: model said so
    related_node_ids:
      - ToolSelectionDecision
      - ToolDefinition
    related_relation_ids: []
    expected_result:
      zh: 验证器拒绝名称直连定义，要求先解析为同一候选集中的 ToolCandidate。
      en: Validation rejects a name-to-definition shortcut and requires resolution to a ToolCandidate from the same set.
      ja: validation は name-to-definition shortcut を拒否し、同一 set の ToolCandidate への resolution を要求します。
    why_valid_or_invalid:
      zh: 工具名称没有携带查询期候选身份，也不能证明替代项经过一致评估。
      en: A tool name carries no query-scoped candidate identity and cannot prove consistent evaluation of alternatives.
      ja: tool name は query-scoped candidate identity を持たず alternatives の consistent evaluation を証明しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-selection-decision-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ToolSelectionActivity-produces-ToolSelectionDecision
  predicate: produces
  direction: source-to-target
  relation_kind: causal
  labels:
    zh: 产生选择决定
    en: produces selection decision
    ja: 選択判断を生成する
  definitions:
    zh: 完成且有唯一合格结果的 ToolSelectionActivity produces 一份不可变 ToolSelectionDecision；活动与结果具有不同身份。
    en: A completed ToolSelectionActivity with one justified result produces one immutable ToolSelectionDecision; activity and result retain different identities.
    ja: 一 justified result を持つ completed ToolSelectionActivity は一 immutable ToolSelectionDecision を produces し activity/result は別 identity を保持します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数由具体查询、候选集合和运行策略决定。
    en: Cardinality depends on the concrete query, candidate set, and runtime policy.
    ja: cardinality は具体 query・candidate set・runtime policy に依存します。
  inverse_reading:
    predicate: inverse_produces
    labels:
      zh: 反向：产生选择决定
      en: inverse of produces selection decision
      ja: 逆：選択判断を生成する
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: ToolSelectionActivity-produces-ToolSelectionDecision-example-positive-manual-001
      kind: positive
      labels:
        zh: 产生选择决定正例
        en: Positive case for produces selection decision
        ja: 選択判断を生成するの正例
      scenario_id: null
      descriptions:
        zh: select-tool-042 在评估齐全后生成 tool-decision-042，决定时间晚于活动开始且引用同一候选集。
        en: After assessments complete, select-tool-042 produces tool-decision-042 whose time follows activity start and whose candidates come from the same set.
        ja: assessments 完了後 select-tool-042 は tool-decision-042 を生成し decision time は activity start 後で candidates は同一 set 由来です。
      field_values: {}
      related_node_ids:
        - ToolSelectionActivity
        - ToolSelectionDecision
      related_relation_ids:
        - ToolSelectionActivity-produces-ToolSelectionDecision
      expected_result:
        zh: 图谱保留 ToolSelectionActivity-produces-ToolSelectionDecision，并保持 ToolSelectionActivity 到 ToolSelectionDecision 的方向。
        en: The graph retains ToolSelectionActivity-produces-ToolSelectionDecision with direction ToolSelectionActivity to ToolSelectionDecision.
        ja: graph は ToolSelectionActivity-produces-ToolSelectionDecision を ToolSelectionActivity から ToolSelectionDecision の方向で保持します。
      why_valid_or_invalid:
        zh: 场景给出了 produces 成立所需的独立业务事实，而非仅有两个端点。
        en: The case supplies the independent domain fact required by produces, not merely the two endpoints.
        ja: case は二 endpoint だけでなく produces に必要な independent domain fact を示します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-selection-decision-004
    - id: ToolSelectionActivity-produces-ToolSelectionDecision-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 产生选择决定边界例
        en: Boundary case for produces selection decision
        ja: 選択判断を生成するの境界例
      scenario_id: null
      descriptions:
        zh: 候选并列且缺少授权答案时，活动只产生 clarification request；不得同时伪造 ToolSelectionDecision。
        en: When candidates tie and authority is unresolved, the activity produces only a clarification request and must not fabricate ToolSelectionDecision.
        ja: candidate tie かつ authority unresolved 時 activity は clarification request のみ生成し ToolSelectionDecision を捏造しません。
      field_values: {}
      related_node_ids:
        - ToolSelectionActivity
        - ToolSelectionDecision
      related_relation_ids:
        - ToolSelectionActivity-produces-ToolSelectionDecision
      expected_result:
        zh: 验证器不得从名称相似、邻接或反向事实推断 ToolSelectionActivity-produces-ToolSelectionDecision。
        en: Validation must not infer ToolSelectionActivity-produces-ToolSelectionDecision from name similarity, adjacency, or a reversed fact.
        ja: validation は name similarity・adjacency・reversed fact から ToolSelectionActivity-produces-ToolSelectionDecision を推論してはいけません。
      why_valid_or_invalid:
        zh: produces 的方向和成立条件未满足，因此该边不能进入 accepted 图。
        en: The direction or truth conditions of produces are absent, so the edge cannot enter the accepted graph.
        ja: produces の direction または truth conditions がなく edge は accepted graph に入りません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-selection-decision-004
  source_claims:
    - claim-tool-selection-decision-004
  distinct_fact_rationale:
    zh: 产出边分开过程与记录，并允许澄清成为无决定的合法分支。
    en: The output edge separates process from record and permits clarification as a legitimate no-decision branch.
    ja: output edge は process と record を分け clarification を legitimate no-decision branch とします。
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: parent-to-child
