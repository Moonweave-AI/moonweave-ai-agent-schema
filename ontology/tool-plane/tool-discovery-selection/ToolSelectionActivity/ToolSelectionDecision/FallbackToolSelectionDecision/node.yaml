schema: moonweave.ai/ontology-node/v1
id: FallbackToolSelectionDecision
kind: concept
status: accepted
labels:
  zh: 后备工具选择决定
  en: Fallback tool selection decision
  ja: 代替ツール選択決定
semantics:
  short_definition:
    zh: 后备工具选择决定在首选失效后记录一项新的候选选择并沿袭首选决定。
    en: A fallback tool selection decision records a new candidate choice after the preferred choice is invalidated and supersedes that preferred decision.
    ja: 代替ツール選択決定は preferred choice 失効後の new candidate choice を記録し preferred decision を supersede します。
  definition:
    zh: 后备工具选择决定是一种 ToolSelectionDecision，由 FallbackToolSelectionActivity 产生，引用触发失败和被取代的 PreferredToolSelectionDecision，并对剩余候选使用刷新后的评估；它是新记录，不修改旧决定，也不等同于调用重试。
    en: A fallback tool selection decision is a ToolSelectionDecision produced by FallbackToolSelectionActivity; it references the triggering failure and superseded PreferredToolSelectionDecision and uses refreshed assessments for remaining candidates; it is a new immutable record, not mutation of the old decision or invocation retry.
    ja: 代替ツール選択決定は FallbackToolSelectionActivity が生成する ToolSelectionDecision で、triggering failure と superseded PreferredToolSelectionDecision を参照し remaining candidates の refreshed assessments を使用します。old decision の mutation や invocation retry ではない new immutable record です。
  why_needed:
    zh: 该节点保留失败前后决定沿袭和重新授权依据，避免模糊的 ToolFallback 同时指工具、策略和动作。
    en: This node preserves pre/post-failure decision lineage and reauthorization basis, replacing the ambiguous ToolFallback that conflated tool, policy, and action.
    ja: この node は failure 前後の decision lineage と reauthorization basis を保持し、tool・policy・action を混同した曖昧 ToolFallback を置き換えます。
  includes:
    - zh: 带 previous_decision_id、trigger_attempt_id、新 selected_candidate_id 和刷新评估理由的不可变决定。
      en: Immutable decisions with previous_decision_id, trigger_attempt_id, new selected_candidate_id, and refreshed-assessment rationale.
      ja: previous_decision_id・trigger_attempt_id・new selected_candidate_id・refreshed-assessment rationale を持つ immutable decision。
  excludes:
    - zh: 静态备用工具列表、同一候选的调用重试，以及就地改写原 ToolSelectionDecision。
      en: A static fallback list, retrying the same candidate, and in-place mutation of the original ToolSelectionDecision.
      ja: static fallback list・same candidate の invocation retry・original ToolSelectionDecision の in-place mutation。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: previous_decision_id
      labels:
        zh: 前序决定标识
        en: previous decision ID
        ja: 前判断 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向被该后备决定取代的首选决定。
        en: References the preferred decision superseded by this fallback decision.
        ja: この fallback decision が supersede する preferred decision を参照します。
      allowed_values: []
      pattern: null
      example_value: tool-decision-042
      source_claims:
        - claim-fallback-tool-selection-decision-001
    - id: trigger_attempt_id
      labels:
        zh: 触发尝试标识
        en: trigger attempt ID
        ja: トリガー試行 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识促使首选失效的 ToolCallAttempt。
        en: Identifies the ToolCallAttempt that invalidated the preferred choice.
        ja: preferred choice を invalid にした ToolCallAttempt を識別します。
      allowed_values: []
      pattern: null
      example_value: tool-attempt-read-file-003
      source_claims:
        - claim-fallback-tool-selection-decision-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: FallbackToolSelectionDecision-example-positive-manual-001
    kind: positive
    labels:
      zh: 后备工具选择决定正例
      en: Positive case for Fallback tool selection decision
      ja: 代替ツール選択決定の正例
    scenario_id: null
    descriptions:
      zh: fallback-decision-043 引用失败的 read_file attempt 与 tool-decision-042，基于刷新评估选择 candidate-shell-read，并保留新 decision_id。
      en: fallback-decision-043 references the failed read_file attempt and tool-decision-042, selects candidate-shell-read from refreshed assessments, and retains a new decision ID.
      ja: fallback-decision-043 は failed read_file attempt と tool-decision-042 を参照し refreshed assessments から candidate-shell-read を選び new decision ID を保持します。
    field_values:
      decision_id: fallback-decision-043
      query_version: 2
      selected_candidate_id: candidate-shell-read
      rejected_candidate_reasons:
        candidate-read-file: availability evidence expired after tool-attempt-read-file-003 failed
        candidate-name-only-search: does not satisfy exact repository-content reading requirements
      rationale: read_file became unavailable; candidate-shell-read remains eligible, available, and covers the repository-reading requirements
      decided_at: 2026-07-16T01:20:40.000Z
      previous_decision_id: tool-decision-042
      trigger_attempt_id: tool-attempt-read-file-003
    related_node_ids:
      - FallbackToolSelectionDecision
      - ToolSelectionDecision
      - PreferredToolSelectionDecision
      - ToolCallAttempt
      - ToolCandidate
    related_relation_ids:
      - FallbackToolSelectionDecision-supersedes-PreferredToolSelectionDecision
      - ToolSelectionDecision-selects-ToolCandidate
    expected_result:
      zh: 首选决定保持不可变，新决定形成单向 supersedes 沿袭并选择不同候选。
      en: The preferred decision stays immutable; the new decision forms one-way supersedes lineage and selects a different candidate.
      ja: preferred decision は immutable のまま new decision は one-way supersedes lineage を形成し別 candidate を選びます。
    why_valid_or_invalid:
      zh: 前序决定、触发尝试和新候选三者齐全，能够解释为何发生后备选择。
      en: Previous decision, triggering attempt, and new candidate are all present, explaining why fallback selection occurred.
      ja: previous decision・triggering attempt・new candidate が揃い fallback selection の理由を説明できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-fallback-tool-selection-decision-001
  - id: FallbackToolSelectionDecision-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 后备工具选择决定边界例
      en: Boundary case for Fallback tool selection decision
      ja: 代替ツール選択決定の境界例
    scenario_id: null
    descriptions:
      zh: 系统把 tool-decision-042 的 selected_candidate_id 直接改为 shell-read，删除了 read_file 历史；这种就地更新不是 FallbackToolSelectionDecision。
      en: The system edits selected_candidate_id inside tool-decision-042 to shell-read and erases read_file history; this in-place update is not FallbackToolSelectionDecision.
      ja: system が tool-decision-042 の selected_candidate_id を shell-read に直接変更し read_file history を消すのは in-place update で FallbackToolSelectionDecision ではありません。
    field_values:
      previous_decision_id: tool-decision-042
      trigger_attempt_id: tool-attempt-read-file-003
    related_node_ids:
      - FallbackToolSelectionDecision
      - PreferredToolSelectionDecision
    related_relation_ids:
      - FallbackToolSelectionDecision-supersedes-PreferredToolSelectionDecision
    expected_result:
      zh: 验证器要求新 decision_id 和保留的前序记录，拒绝覆盖式回退。
      en: Validation requires a new decision ID and preserved predecessor and rejects overwrite-style fallback.
      ja: validation は new decision ID と preserved predecessor を要求し overwrite-style fallback を拒否します。
    why_valid_or_invalid:
      zh: 覆盖旧决定会破坏审计沿袭，使失败触发与实际调用无法复原。
      en: Overwriting the old decision destroys audit lineage and prevents reconstruction of failure trigger and actual calls.
      ja: old decision の overwrite は audit lineage を破壊し failure trigger と actual calls の復元を妨げます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-fallback-tool-selection-decision-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: PreferredToolSelectionDecision
    shared_parent_concept_id: ToolSelectionDecision
    differentia:
      zh: FallbackToolSelectionDecision 与 PreferredToolSelectionDecision 同属 ToolSelectionDecision；FallbackToolSelectionDecision 保存失败触发与 supersedes 沿袭，PreferredToolSelectionDecision 是失败前的首轮决定。
      en: FallbackToolSelectionDecision and PreferredToolSelectionDecision share ToolSelectionDecision; FallbackToolSelectionDecision preserves failure trigger and supersedes lineage, while PreferredToolSelectionDecision is the pre-failure first-round decision.
      ja: FallbackToolSelectionDecision と PreferredToolSelectionDecision は ToolSelectionDecision を共有し、前者は failure trigger と supersedes lineage、後者は pre-failure first-round decision です。
    source_claims:
      - claim-fallback-tool-selection-decision-002
parent_relation:
  id: FallbackToolSelectionDecision-is_a-ToolSelectionDecision
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: FallbackToolSelectionDecision 是 ToolSelectionDecision 的严格子类；其区分条件是：它引用失败触发和前序首选决定，并以新记录选择替代候选。
    en: "FallbackToolSelectionDecision is a strict subtype of ToolSelectionDecision; its differentia is: it references a failure trigger and predecessor preferred decision and selects an alternative in a new record."
    ja: FallbackToolSelectionDecision は ToolSelectionDecision の厳密な subtype で、種差は次の通りです：failure trigger と predecessor preferred decision を参照し new record で alternative candidate を選択します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数由具体查询、候选集合和运行策略决定。
    en: Cardinality depends on the concrete query, candidate set, and runtime policy.
    ja: cardinality は具体 query・candidate set・runtime policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: FallbackToolSelectionDecision-is_a-ToolSelectionDecision-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive case for is a
        ja: の一種の正例
      scenario_id: null
      descriptions:
        zh: 记录同时满足 ToolSelectionDecision 的上位定义和 FallbackToolSelectionDecision 的完整种差：它引用失败触发和前序首选决定，并以新记录选择替代候选。
        en: "The record satisfies both the parent definition of ToolSelectionDecision and the complete differentia of FallbackToolSelectionDecision: it references a failure trigger and predecessor preferred decision and selects an alternative in a new record."
        ja: record は ToolSelectionDecision の上位 definition と FallbackToolSelectionDecision の完全な種差を満たします：failure trigger と predecessor preferred decision を参照し new record で alternative candidate を選択します。
      field_values: {}
      related_node_ids:
        - FallbackToolSelectionDecision
        - ToolSelectionDecision
