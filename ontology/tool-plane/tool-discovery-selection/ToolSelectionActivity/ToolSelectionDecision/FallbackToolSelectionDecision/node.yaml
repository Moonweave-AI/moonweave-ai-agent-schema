        en: Validation retains ToolSelectionDecision identity and does not promote the object to FallbackToolSelectionDecision.
        ja: validation は ToolSelectionDecision identity を保持し object を FallbackToolSelectionDecision に昇格しません。
      why_valid_or_invalid:
        zh: 共享上位概念不足以证明 FallbackToolSelectionDecision 的严格成员资格。
        en: A shared parent is insufficient to prove strict membership in FallbackToolSelectionDecision.
        ja: shared parent だけでは FallbackToolSelectionDecision の strict membership を証明できません。
