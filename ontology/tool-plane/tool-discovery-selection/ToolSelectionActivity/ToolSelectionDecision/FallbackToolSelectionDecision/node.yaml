      ja: new FallbackToolSelectionDecision は earlier PreferredToolSelectionDecision を supersedes し後者を history として保持し current validity を終了します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 基数由具体查询、候选集合和运行策略决定。
      en: Cardinality depends on the concrete query, candidate set, and runtime policy.
      ja: cardinality は具体 query・candidate set・runtime policy に依存します。
    inverse_reading:
      predicate: inverse_supersedes
      labels:
        zh: 反向：取代首选决定
        en: inverse of supersedes preferred decision
        ja: 逆：優先判断を置き換える
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
