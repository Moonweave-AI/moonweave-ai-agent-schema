        - FallbackToolSelectionDecision-is_a-ToolSelectionDecision
      expected_result:
        zh: 验证器将该记录归为 FallbackToolSelectionDecision，并通过 is_a 继承 ToolSelectionDecision 的约束。
        en: Validation classifies the record as FallbackToolSelectionDecision and inherits ToolSelectionDecision constraints through is_a.
        ja: validation は record を FallbackToolSelectionDecision と分類し is_a により ToolSelectionDecision constraints を継承します。
      why_valid_or_invalid:
        zh: 完整种差而非名称前缀证明了 FallbackToolSelectionDecision 的成员资格。
        en: The complete differentia, not a shared name prefix, proves membership in FallbackToolSelectionDecision.
        ja: shared name prefix ではなく完全な種差が FallbackToolSelectionDecision membership を証明します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-fallback-tool-selection-decision-003
    - id: FallbackToolSelectionDecision-is_a-ToolSelectionDecision-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種の境界例
      scenario_id: null
      descriptions:
        zh: 对象只满足 ToolSelectionDecision 的一般条件，却缺少 FallbackToolSelectionDecision 的关键种差：它引用失败触发和前序首选决定，并以新记录选择替代候选。
        en: "The object satisfies only the general conditions of ToolSelectionDecision and lacks the defining differentia of FallbackToolSelectionDecision: it references a failure trigger and predecessor preferred decision and selects an alternative in a new record."
        ja: object は ToolSelectionDecision の一般条件だけを満たし FallbackToolSelectionDecision の種差を欠きます：failure trigger と predecessor preferred decision を参照し new record で alternative candidate を選択します。
      field_values: {}
      related_node_ids:
