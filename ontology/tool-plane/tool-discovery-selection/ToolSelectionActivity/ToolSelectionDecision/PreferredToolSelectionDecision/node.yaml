schema: moonweave.ai/ontology-node/v1
id: PreferredToolSelectionDecision
kind: concept
status: accepted
labels:
  zh: 首选工具选择决定
  en: Preferred tool selection decision
  ja: 優先ツール選択決定
semantics:
  short_definition:
    zh: 首选工具选择决定是在正常选择轮次中首次确定的可调用候选。
    en: A preferred tool selection decision is the first callable candidate chosen in the normal selection round.
    ja: 優先ツール選択決定は通常 selection round で最初に確定された callable candidate です。
  definition:
    zh: 首选工具选择决定是一种 ToolSelectionDecision，在任何调用失败或可用性失效之前，由完整候选评估产生；它是后续 fallback 决定的沿袭起点，但不承诺调用一定成功。
    en: A preferred tool selection decision is a ToolSelectionDecision produced from complete candidate assessments before any invocation failure or availability invalidation; it anchors later fallback lineage but does not guarantee invocation success.
    ja: 優先ツール選択決定は invocation failure や availability invalidation 前に complete candidate assessments から生成される ToolSelectionDecision で、後続 fallback lineage の起点ですが invocation success を保証しません。
  why_needed:
    zh: 首选子类为 fallback supersedes 边提供明确目标，避免把后备决定与任意历史选择或静态配置混在一起。
    en: The preferred subtype gives the fallback supersedes edge a precise target and avoids mixing fallback with arbitrary historical choices or static configuration.
    ja: preferred subtype は fallback supersedes edge に明確 target を与え、fallback を任意 historical choice や static configuration と混同しません。
  includes:
    - zh: 在初始选择活动中产生、尚未因调用失败而被取代的 ToolSelectionDecision。
      en: ToolSelectionDecision records produced by initial selection and not yet superseded after invocation failure.
      ja: initial selection で生成され invocation failure 後にまだ supersede されていない ToolSelectionDecision records。
  excludes:
    - zh: 失败后产生的 FallbackToolSelectionDecision，以及配置文件中的固定默认工具。
      en: FallbackToolSelectionDecision produced after failure and a fixed default tool in configuration.
      ja: failure 後に生成された FallbackToolSelectionDecision と configuration の fixed default tool。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: selection_round
      labels:
        zh: 选择轮次
        en: selection round
        ja: 選択ラウンド
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 首选决定固定为同一查询的第一个选择轮次。
        en: The preferred decision is fixed to the first selection round for the query.
        ja: preferred decision は query の第一 selection round に固定されます。
      allowed_values:
        - id: PreferredToolSelectionRoundOne
          value: 1
          labels:
            zh: 首轮选择
            en: first selection round
            ja: 第一選択ラウンド
          definitions:
            zh: 同一查询中首次形成的首选候选决定；后续因调用失败形成的决定属于后备轮次，不得改写该值。
            en: The first preferred-candidate decision for one query; a later decision caused by invocation failure belongs to a fallback round and must not rewrite this value.
            ja: 同一 query の最初の preferred-candidate decision で、invocation failure 後の decision は fallback round に属し、この値を書き換えません。
          status: accepted
          source_claims:
            - claim-preferred-tool-selection-decision-002
      pattern: null
      example_value: 1
      source_claims:
        - claim-preferred-tool-selection-decision-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: PreferredToolSelectionDecision-example-positive-manual-001
    kind: positive
    labels:
      zh: 首选工具选择决定正例
      en: Positive case for Preferred tool selection decision
      ja: 優先ツール選択決定の正例
    scenario_id: null
    descriptions:
      zh: query version 2 的第一轮完整评估选出 candidate-read-file，并把决定标记为 selection_round 1。
      en: The first complete assessment round for query version 2 selects candidate-read-file and marks the decision as selection_round 1.
      ja: query version 2 の第一 complete assessment round が candidate-read-file を選び decision を selection_round 1 とします。
    field_values:
      decision_id: tool-decision-042
      query_version: 2
      selected_candidate_id: candidate-read-file
      rejected_candidate_reasons:
        candidate-network-scanner: fails no-network eligibility constraint
        candidate-name-only-search: missing dependency-declaration capability
      rationale: only eligible and available candidate with complete capability coverage
      decided_at: 2026-07-16T01:20:10.000Z
      selection_round: 1
    related_node_ids:
      - PreferredToolSelectionDecision
      - ToolSelectionDecision
      - ToolCandidate
    related_relation_ids:
      - PreferredToolSelectionDecision-is_a-ToolSelectionDecision
      - ToolSelectionDecision-selects-ToolCandidate
    expected_result:
      zh: 该决定成为本查询的唯一首选沿袭起点。
      en: The decision becomes the sole preferred-lineage anchor for the query.
      ja: decision は query の唯一 preferred-lineage anchor になります。
    why_valid_or_invalid:
      zh: 它在失败之前由正常轮次产生，并满足父类的候选和理由要求。
      en: It is produced by the normal round before failure and satisfies the parent candidate and rationale requirements.
      ja: failure 前の normal round で生成され parent の candidate/rationale requirements を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-preferred-tool-selection-decision-001
  - id: PreferredToolSelectionDecision-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 首选工具选择决定边界例
      en: Boundary case for Preferred tool selection decision
      ja: 優先ツール選択決定の境界例
    scenario_id: null
    descriptions:
      zh: 配置项 default_tool=read_file 没有候选评估或 decision_id，只是偏好配置，不能成为 PreferredToolSelectionDecision。
      en: The setting default_tool=read_file has no candidate assessment or decision ID; it is preference configuration, not PreferredToolSelectionDecision.
      ja: default_tool=read_file という setting は candidate assessment も decision ID もなく preference configuration で、PreferredToolSelectionDecision ではありません。
    field_values:
      selection_round: 1
    related_node_ids:
      - PreferredToolSelectionDecision
      - ToolDefinition
    related_relation_ids: []
    expected_result:
      zh: 验证器要求真实选择活动和完整父类字段，不能把默认值升级为决定。
      en: Validation requires a real selection activity and complete parent fields and does not promote a default value to a decision.
      ja: validation は real selection activity と complete parent fields を要求し default value を decision に昇格しません。
    why_valid_or_invalid:
      zh: 静态偏好没有查询期候选身份、被拒替代项或选择时间。
      en: Static preference lacks query-scoped candidacy, rejected alternatives, and decision time.
      ja: static preference は query-scoped candidacy・rejected alternatives・decision time を欠きます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-preferred-tool-selection-decision-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: FallbackToolSelectionDecision
    shared_parent_concept_id: ToolSelectionDecision
    differentia:
      zh: PreferredToolSelectionDecision 与 FallbackToolSelectionDecision 同属 ToolSelectionDecision；前者来自失败前的首轮选择，后者由失败或可用性失效触发并沿袭前者。
      en: PreferredToolSelectionDecision and FallbackToolSelectionDecision share ToolSelectionDecision; the former comes from the pre-failure first round, while the latter is triggered by failure or availability invalidation and supersedes the former.
      ja: PreferredToolSelectionDecision と FallbackToolSelectionDecision は ToolSelectionDecision を共有し、前者は pre-failure first round、後者は failure/availability invalidation で trigger され前者を supersede します。
    source_claims:
      - claim-preferred-tool-selection-decision-003
parent_relation:
  id: PreferredToolSelectionDecision-is_a-ToolSelectionDecision
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: PreferredToolSelectionDecision 是 ToolSelectionDecision 的严格子类；其区分条件是：它是失败前首轮评估产生的初始候选承诺。
    en: "PreferredToolSelectionDecision is a strict subtype of ToolSelectionDecision; its differentia is: it is the initial candidate commitment produced by the pre-failure first assessment round."
    ja: PreferredToolSelectionDecision は ToolSelectionDecision の厳密な subtype で、種差は次の通りです：pre-failure first assessment round が生成する initial candidate commitment です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数由具体查询、候选集合和运行策略决定。
    en: Cardinality depends on the concrete query, candidate set, and runtime policy.
    ja: cardinality は具体 query・candidate set・runtime policy に依存します。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: PreferredToolSelectionDecision-is_a-ToolSelectionDecision-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive case for is a
        ja: の一種の正例
      scenario_id: null
      descriptions:
        zh: 记录同时满足 ToolSelectionDecision 的上位定义和 PreferredToolSelectionDecision 的完整种差：它是失败前首轮评估产生的初始候选承诺。
        en: "The record satisfies both the parent definition of ToolSelectionDecision and the complete differentia of PreferredToolSelectionDecision: it is the initial candidate commitment produced by the pre-failure first assessment round."
        ja: record は ToolSelectionDecision の上位 definition と PreferredToolSelectionDecision の完全な種差を満たします：pre-failure first assessment round が生成する initial candidate commitment です。
      field_values: {}
      related_node_ids:
        - PreferredToolSelectionDecision
        - ToolSelectionDecision
      related_relation_ids:
        - PreferredToolSelectionDecision-is_a-ToolSelectionDecision
      expected_result:
        zh: 验证器将该记录归为 PreferredToolSelectionDecision，并通过 is_a 继承 ToolSelectionDecision 的约束。
        en: Validation classifies the record as PreferredToolSelectionDecision and inherits ToolSelectionDecision constraints through is_a.
        ja: validation は record を PreferredToolSelectionDecision と分類し is_a により ToolSelectionDecision constraints を継承します。
      why_valid_or_invalid:
        zh: 完整种差而非名称前缀证明了 PreferredToolSelectionDecision 的成员资格。
        en: The complete differentia, not a shared name prefix, proves membership in PreferredToolSelectionDecision.
        ja: shared name prefix ではなく完全な種差が PreferredToolSelectionDecision membership を証明します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-preferred-tool-selection-decision-004
    - id: PreferredToolSelectionDecision-is_a-ToolSelectionDecision-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種の境界例
      scenario_id: null
      descriptions:
        zh: 对象只满足 ToolSelectionDecision 的一般条件，却缺少 PreferredToolSelectionDecision 的关键种差：它是失败前首轮评估产生的初始候选承诺。
        en: "The object satisfies only the general conditions of ToolSelectionDecision and lacks the defining differentia of PreferredToolSelectionDecision: it is the initial candidate commitment produced by the pre-failure first assessment round."
        ja: object は ToolSelectionDecision の一般条件だけを満たし PreferredToolSelectionDecision の種差を欠きます：pre-failure first assessment round が生成する initial candidate commitment です。
      field_values: {}
      related_node_ids:
        - PreferredToolSelectionDecision
        - ToolSelectionDecision
      related_relation_ids:
        - PreferredToolSelectionDecision-is_a-ToolSelectionDecision
      expected_result:
        zh: 验证器保留 ToolSelectionDecision 身份，不把该对象提升为 PreferredToolSelectionDecision。
        en: Validation retains ToolSelectionDecision identity and does not promote the object to PreferredToolSelectionDecision.
        ja: validation は ToolSelectionDecision identity を保持し object を PreferredToolSelectionDecision に昇格しません。
      why_valid_or_invalid:
        zh: 共享上位概念不足以证明 PreferredToolSelectionDecision 的严格成员资格。
        en: A shared parent is insufficient to prove strict membership in PreferredToolSelectionDecision.
        ja: shared parent だけでは PreferredToolSelectionDecision の strict membership を証明できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-preferred-tool-selection-decision-004
  source_claims:
    - claim-preferred-tool-selection-decision-004
