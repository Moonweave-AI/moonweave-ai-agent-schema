schema: moonweave.ai/ontology-node/v1
id: ToolEligibilityAssessment
kind: concept
status: accepted
labels:
  zh: 工具资格评估
  en: Tool eligibility assessment
  ja: ツール適格性評価
semantics:
  short_definition:
    zh: 工具资格评估判断候选是否满足查询中的硬性环境、权限和副作用约束。
    en: A tool eligibility assessment decides whether a candidate satisfies hard environment, authority, and side-effect constraints.
    ja: ツール適格性評価は candidate が hard environment・authority・side-effect constraints を満たすか判断します。
  definition:
    zh: 工具资格评估是一种 ToolCandidateAssessment，对 ToolSearchQuery 的每项硬约束给出通过、失败或证据不足；它使用 ToolPermissionSpec 和行为声明作为证据，但不授予权限，也不衡量功能语义匹配。
    en: A tool eligibility assessment is a ToolCandidateAssessment that records pass, fail, or insufficient evidence for every hard constraint in ToolSearchQuery; it may use ToolPermissionSpec and behavior declarations as evidence but grants no authority and does not measure functional fit.
    ja: ツール適格性評価は ToolCandidateAssessment の一種で、ToolSearchQuery の各 hard constraint に pass・fail・insufficient evidence を記録します。ToolPermissionSpec と behavior declaration を evidence にできますが authority を grant せず functional fit も測りません。
  why_needed:
    zh: 资格节点阻止高语义分数越过权限、网络、沙箱或副作用边界，并把“合适”与“允许使用”明确分开。
    en: The eligibility node prevents a high semantic score from bypassing permission, network, sandbox, or side-effect boundaries and separates “fits the task” from “may be used”.
    ja: eligibility node は高 semantic score が permission・network・sandbox・side-effect boundary を越えるのを防ぎ、『task に適合』と『使用可能』を分離します。
  includes:
    - zh: 逐项检查 workspace 范围、网络策略、所需授权、写入副作用和数据披露限制。
      en: Criterion-by-criterion checks of workspace scope, network policy, required authority, write effects, and disclosure limits.
      ja: workspace scope・network policy・required authority・write effect・disclosure limit の criterion-by-criterion check。
  excludes:
    - zh: 功能描述相似度、运行端点瞬时健康状态，以及真正的 AuthorizationGrant。
      en: Functional-description similarity, transient endpoint health, and an actual AuthorizationGrant.
      ja: functional-description similarity・transient endpoint health・actual AuthorizationGrant。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: constraint_results
      labels:
        zh: 约束结果
        en: constraint results
        ja: 制約結果
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按硬约束 ID 记录 pass、fail 或 insufficient-evidence。
        en: Maps each hard-constraint ID to pass, fail, or insufficient-evidence.
        ja: 各 hard-constraint ID を pass・fail・insufficient-evidence に対応付けます。
      allowed_values: []
      pattern: null
      example_value:
        read-only: pass
        no-network: pass
        workspace-scoped: pass
      source_claims:
        - claim-tool-eligibility-assessment-001
    - id: reauthorization_required
      labels:
        zh: 需要重新授权
        en: reauthorization required
        ja: 再認可要否
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 候选超出当前权限范围时标记是否必须另行授权。
        en: Marks whether separate authorization is required because the candidate exceeds current scope.
        ja: candidate が current scope を超えるため separate authorization が必要か示します。
      allowed_values: []
      pattern: null
      example_value: false
      source_claims:
        - claim-tool-eligibility-assessment-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: ToolEligibilityAssessment-example-positive-manual-001
    kind: positive
    labels:
      zh: 工具资格评估正例
      en: Positive case for Tool eligibility assessment
      ja: ツール適格性評価の正例
    scenario_id: null
    descriptions:
      zh: read_file 候选被证明只读、限于 workspace 且不访问网络；三项硬约束均 pass，当前授权范围足够。
      en: The read_file candidate is proven read-only, workspace-scoped, and network-free; all hard constraints pass and current authority is sufficient.
      ja: read_file candidate は read-only・workspace-scoped・network-free と証明され、全 hard constraints が pass し current authority で十分です。
    field_values:
      assessment_id: assessment-read-file-eligibility
      query_version: 2
      evidence_refs:
        - tool-permission:read-file@18#read-only
        - tool-permission:read-file@18#workspace-scope
        - runtime-policy:repo-agent@2#network-denied
      conclusion: pass
      constraint_results:
        read-only: pass
        no-network: pass
        workspace-scoped: pass
      reauthorization_required: false
    related_node_ids:
      - ToolEligibilityAssessment
      - ToolCandidateAssessment
      - ToolCandidate
      - ToolPermissionSpec
    related_relation_ids:
      - ToolCandidateAssessment-assesses-ToolCandidate
    expected_result:
      zh: 资格结论为 pass，但该记录不创建新的 AuthorizationGrant。
      en: Eligibility passes, but the assessment creates no new AuthorizationGrant.
      ja: eligibility は pass しますが assessment は新しい AuthorizationGrant を作りません。
    why_valid_or_invalid:
      zh: 所有硬约束有独立证据，授权状态只是被读取而非由评估产生。
      en: Every hard constraint has evidence; authority state is read rather than produced by the assessment.
      ja: 各 hard constraint に evidence があり、authority state は assessment が生成せず読むだけです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-eligibility-assessment-001
  - id: ToolEligibilityAssessment-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 工具资格评估边界例
      en: Boundary case for Tool eligibility assessment
      ja: ツール適格性評価の境界例
    scenario_id: null
    descriptions:
      zh: write_file 能完成任务且当前端点健康，但查询声明只读；无论能力分数多高，其资格结论都必须 fail。
      en: write_file can accomplish the task and its endpoint is healthy, but the query is read-only; eligibility must fail regardless of capability score.
      ja: write_file は task を実行でき endpoint も healthy ですが query は read-only で、capability score に関係なく eligibility は fail です。
    field_values:
      constraint_results:
        read-only: fail
        no-network: pass
        workspace-scoped: pass
      reauthorization_required: true
    related_node_ids:
      - ToolEligibilityAssessment
      - ToolCandidateAssessment
      - ToolMatch
      - ToolCandidate
    related_relation_ids:
      - ToolCandidateAssessment-assesses-ToolCandidate
    expected_result:
      zh: 选择活动不得选择该候选，除非形成新查询或取得明确的不同授权。
      en: Selection cannot choose the candidate unless a new query is formed or distinct authority is obtained.
      ja: 新 query の形成または明示的な別 authority の取得なしに selection は candidate を選べません。
    why_valid_or_invalid:
      zh: 硬约束是淘汰条件，不是可以被语义匹配分数抵消的偏好。
      en: A hard constraint is an elimination condition, not a preference offset by semantic-fit score.
      ja: hard constraint は elimination condition で、semantic-fit score で相殺できる preference ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-eligibility-assessment-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ToolAvailabilityAssessment
    shared_parent_concept_id: ToolCandidateAssessment
    differentia:
      zh: ToolEligibilityAssessment 与 ToolAvailabilityAssessment 同属 ToolCandidateAssessment；前者判断策略和权限资格，后者记录特定时点的端点或运行表面可用性。
      en: ToolEligibilityAssessment and ToolAvailabilityAssessment share ToolCandidateAssessment; the former decides policy and authority eligibility, while the latter records endpoint or runtime-surface availability at a particular time.
      ja: ToolEligibilityAssessment と ToolAvailabilityAssessment は ToolCandidateAssessment を共有し、前者は policy/authority eligibility、後者は特定時点の endpoint/runtime-surface availability を記録します。
    source_claims:
      - claim-tool-eligibility-assessment-002
parent_relation:
  id: ToolEligibilityAssessment-is_a-ToolCandidateAssessment
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: ToolEligibilityAssessment 是 ToolCandidateAssessment 的严格子类；其区分条件是：逐项判定查询的环境、权限和副作用硬约束。
    en: "ToolEligibilityAssessment is a strict subtype of ToolCandidateAssessment; its differentia is: it decides each hard environment, authority, and side-effect constraint from the query."
    ja: ToolEligibilityAssessment は ToolCandidateAssessment の厳密な subtype で、種差は次の通りです：query の hard environment・authority・side-effect constraints を一項ずつ判断します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数由具体查询、候选集合和运行策略决定。
    en: Cardinality depends on the concrete query, candidate set, and runtime policy.
    ja: cardinality は具体 query・candidate set・runtime policy に依存します。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ToolEligibilityAssessment-is_a-ToolCandidateAssessment-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive case for is a
        ja: の一種の正例
      scenario_id: null
      descriptions:
        zh: 记录同时满足 ToolCandidateAssessment 的上位定义和 ToolEligibilityAssessment 的完整种差：逐项判定查询的环境、权限和副作用硬约束。
        en: "The record satisfies both the parent definition of ToolCandidateAssessment and the complete differentia of ToolEligibilityAssessment: it decides each hard environment, authority, and side-effect constraint from the query."
        ja: record は ToolCandidateAssessment の上位 definition と ToolEligibilityAssessment の完全な種差を満たします：query の hard environment・authority・side-effect constraints を一項ずつ判断します。
      field_values: {}
      related_node_ids:
        - ToolEligibilityAssessment
        - ToolCandidateAssessment
      related_relation_ids:
        - ToolEligibilityAssessment-is_a-ToolCandidateAssessment
      expected_result:
        zh: 验证器将该记录归为 ToolEligibilityAssessment，并通过 is_a 继承 ToolCandidateAssessment 的约束。
        en: Validation classifies the record as ToolEligibilityAssessment and inherits ToolCandidateAssessment constraints through is_a.
        ja: validation は record を ToolEligibilityAssessment と分類し is_a により ToolCandidateAssessment constraints を継承します。
      why_valid_or_invalid:
        zh: 完整种差而非名称前缀证明了 ToolEligibilityAssessment 的成员资格。
        en: The complete differentia, not a shared name prefix, proves membership in ToolEligibilityAssessment.
        ja: shared name prefix ではなく完全な種差が ToolEligibilityAssessment membership を証明します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-eligibility-assessment-003
    - id: ToolEligibilityAssessment-is_a-ToolCandidateAssessment-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種の境界例
      scenario_id: null
      descriptions:
        zh: 对象只满足 ToolCandidateAssessment 的一般条件，却缺少 ToolEligibilityAssessment 的关键种差：逐项判定查询的环境、权限和副作用硬约束。
        en: "The object satisfies only the general conditions of ToolCandidateAssessment and lacks the defining differentia of ToolEligibilityAssessment: it decides each hard environment, authority, and side-effect constraint from the query."
        ja: object は ToolCandidateAssessment の一般条件だけを満たし ToolEligibilityAssessment の種差を欠きます：query の hard environment・authority・side-effect constraints を一項ずつ判断します。
      field_values: {}
      related_node_ids:
        - ToolEligibilityAssessment
        - ToolCandidateAssessment
      related_relation_ids:
        - ToolEligibilityAssessment-is_a-ToolCandidateAssessment
      expected_result:
        zh: 验证器保留 ToolCandidateAssessment 身份，不把该对象提升为 ToolEligibilityAssessment。
        en: Validation retains ToolCandidateAssessment identity and does not promote the object to ToolEligibilityAssessment.
        ja: validation は ToolCandidateAssessment identity を保持し object を ToolEligibilityAssessment に昇格しません。
      why_valid_or_invalid:
        zh: 共享上位概念不足以证明 ToolEligibilityAssessment 的严格成员资格。
        en: A shared parent is insufficient to prove strict membership in ToolEligibilityAssessment.
        ja: shared parent だけでは ToolEligibilityAssessment の strict membership を証明できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-eligibility-assessment-003
  source_claims:
    - claim-tool-eligibility-assessment-003
