schema: moonweave.ai/ontology-node/v1
id: ToolEligibilityAssessment
kind: concept
labels:
  zh: 工具资格评估
  en: Tool Eligibility Assessment
  ja: ツール適格性評価
semantics:
  short_definition:
    zh: 检查一个候选是否在当前任务和政策约束下具备可被考虑的能力与接口条件的候选评估。
    en: A candidate assessment that checks whether a candidate has the capability and interface conditions to be considered under the current task and policy constraints.
    ja: current task と policy constraint の下で candidate が考慮可能な capability と interface condition を持つかを検査する candidate assessment。
  definition:
    zh: ToolEligibilityAssessment 是 ToolCandidateAssessment 的一种，它将一个 ToolCandidate 的原生能力说明与当前任务要求和适用政策相对照，给出 eligible、ineligible 或 unknown finding。对 MCP Tool，它可检查声明的 inputSchema、outputSchema 或注解；对 A2A AgentSkill，它可检查描述、标签、inputModes、outputModes 和 securityRequirements。它不把“已允许配置”或“当前在线”误写成任务资格，也不排名或选择候选。
    en: ToolEligibilityAssessment is a kind of ToolCandidateAssessment that compares a ToolCandidate's native capability description with the current task requirements and applicable policy and returns an eligible, ineligible, or unknown finding. For an MCP Tool it may inspect declared inputSchema, outputSchema, or annotations; for an A2A AgentSkill it may inspect description, tags, inputModes, outputModes, and securityRequirements. It does not mistake configured allowance or current online state for task eligibility, and it does not rank or select candidates.
    ja: ToolEligibilityAssessment は ToolCandidateAssessment の一種であり、ToolCandidate の native capability description を current task requirement と applicable policy に比較し、eligible、ineligible、unknown の finding を返す。MCP Tool には宣言された inputSchema、outputSchema、annotation を検査でき、A2A AgentSkill には description、tag、inputModes、outputModes、securityRequirements を検査できる。configured allowance や current online state を task eligibility と誤認せず、candidate を rank または select しない。
  why_needed:
    zh: 可被调用并不等于能以所需输入、输出、权限和政策完成任务。显式资格评估让系统可以拒绝不匹配项或保留 unknown，而不会把简单文本相似度和运行状态混入能力判断。
    en: Being callable does not mean a candidate can complete the task with required inputs, outputs, permissions, and policy. An explicit eligibility assessment lets a system reject mismatches or retain unknown without mixing simple text similarity or runtime state into a capability judgment.
    ja: callable であることは、必要な input、output、permission、policy で task を完了できることを意味しない。明示的な eligibility assessment により、system は simple text similarity や runtime state を capability judgment に混ぜず、mismatch を拒否したり unknown を保持したりできる。
  includes:
    - zh: 对任务能力、原生输入/输出描述、授权要求和适用政策的兼容性检查。
      en: Compatibility checks among task capabilities, native input/output descriptions, authorization requirements, and applicable policy.
      ja: task capability、native input/output description、authorization requirement、applicable policy 間の compatibility check。
    - zh: eligible、ineligible 或 unknown finding，以及解释该 finding 的来源引用。
      en: An eligible, ineligible, or unknown finding and source references that explain it.
      ja: eligible、ineligible、unknown の finding と、それを説明する source reference。
  excludes:
    - zh: 当前网络连接、服务器健康、审批是否完成等可用性判断。
      en: Availability judgments about current network connection, server health, or completed approval.
      ja: current network connection、server health、approval completion に関する availability judgment。
    - zh: 候选排序、偏好权重、最终选择、工具调用或调用结果。
      en: Candidate ranking, preference weights, final selection, a tool call, or a call result.
      ja: candidate ranking、preference weight、final selection、tool call、call result。
  semantic_kind: activity
engineering:
  explanation:
    zh: 评估器先按 candidate.source_kind 读取正确的原生描述，再把任务需求与其能力、输入/输出模式及政策比较。它把结论、缺失信息和证据保存在本地 finding 中；如果来源只有描述性 AgentSkill 而没有可验证的调用接口，结论可为 unknown 而不是伪造 MCP schema。
    en: An assessor first reads the correct native description according to candidate.source_kind, then compares task requirements with its capability, input/output modes, and policy. It stores the conclusion, missing information, and evidence in a local finding; if a source has only a descriptive AgentSkill and no verifiable call interface, the conclusion can be unknown rather than fabricating an MCP schema.
    ja: assessor はまず candidate.source_kind に従って正しい native description を読み、task requirement を capability、input/output mode、policy と比較する。conclusion、missing information、evidence を local finding に保存する。source が descriptive AgentSkill だけで検証可能な call interface を持たない場合、MCP schema を捏造せず conclusion を unknown にできる。
  typical_input:
    - description:
        zh: MCP Tool 能力与输入 schema
        en: MCP Tool capability and input schema
        ja: MCP Tool capability and input schema
      format: |-
        {"name":"search-docs","description":"Search documentation","inputSchema":{"type":"object","properties":{"query":{"type":"string"}},"required":["query"]},"outputSchema":{"type":"object"}}
      source_claims: [claim-eligibility-mcp-schema]
    - description:
        zh: A2A AgentSkill 能力描述
        en: A2A AgentSkill capability description
        ja: A2A AgentSkill capability description
      format: |-
        {"id":"research","name":"Research","description":"Find public sources","tags":["search"],"inputModes":["text/plain"],"outputModes":["text/plain"],"securityRequirements":[{"schemes":["oauth2"]}]}
      source_claims: [claim-eligibility-a2a-skill]
    - description:
        zh: 本地任务与政策需求
        en: Local task and policy requirements
        ja: Local task and policy requirements
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"task_requirement","task_ref":"task:42","required_capabilities":["search"],"required_input":"text/plain","policy_ref":"policy:read-only"}
      source_claims: [claim-eligibility-local]
  typical_output:
    - description:
        zh: 本地资格 finding
        en: Local eligibility finding
        ja: Local eligibility finding
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"tool_eligibility_assessment","assessment_id":"eligibility-17","candidate_ref":"candidate:search-docs","task_requirement_ref":"task:42","eligibility_state":"eligible","evidence_refs":["mcp:docs/search-docs","policy:read-only"],"rationale":"Declared query input and search description satisfy the task requirement"}
      source_claims: [claim-eligibility-local]
  reference_implementations:
    - name: Model Context Protocol Tool declaration
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines Tool inputSchema, optional output schema, annotations, and execution metadata.
    - name: A2A AgentSkill
      url: https://a2a-protocol.org/latest/specification/
      description: Defines AgentSkill description, tags, I/O modes, and security requirements.
structure:
  identity_keys: [assessment_id]
  fields:
    - id: assessment_id
      labels: {zh: 资格评估标识, en: Eligibility-assessment identifier, ja: eligibility-assessment 識別子}
      definitions:
        zh: 稳定标识一次本地资格评估，不替代来源工具名、技能 id 或任务 id。
        en: Stably identifies one local eligibility assessment and does not replace a source tool name, skill id, or task id.
        ja: 一つの local eligibility assessment を安定して識別し、source tool name、skill id、task id を置き換えない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: eligibility-17
      source_claims: [claim-eligibility-local]
    - id: candidate_ref
      labels: {zh: 候选引用, en: Candidate reference, ja: candidate 参照}
      definitions:
        zh: 指向要比较其能力说明的一个 ToolCandidate。
        en: Points to the one ToolCandidate whose capability description is compared.
        ja: capability description を比較する一つの ToolCandidate を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: candidate:search-docs
      source_claims: [claim-eligibility-local]
    - id: task_requirement_ref
      labels: {zh: 任务需求引用, en: Task-requirement reference, ja: task requirement 参照}
      definitions:
        zh: 指向本次资格判断所依据的能力、输入/输出和政策要求。
        en: Points to the capability, input/output, and policy requirements used for this eligibility judgment.
        ja: この eligibility judgment に使う capability、input/output、policy requirement を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: task:42
      source_claims: [claim-eligibility-local]
    - id: eligibility_state
      labels: {zh: 资格状态, en: Eligibility state, ja: eligibility state}
      definitions:
        zh: 在该任务和政策语境中的本地结论；unknown 表示接口或政策信息不足。
        en: The local conclusion in this task and policy context; unknown means interface or policy information is insufficient.
        ja: この task と policy context における local conclusion。unknown は interface または policy information が不十分であることを示す。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [eligible, ineligible, unknown]
      pattern: null
      example_value: eligible
      source_claims: [claim-eligibility-local]
    - id: evidence_refs
      labels: {zh: 证据引用, en: Evidence references, ja: evidence 参照}
      definitions:
        zh: 指向原生能力描述及任务/政策记录；不同来源仍按自己的 schema 解释。
        en: Points to native capability descriptions and task or policy records; different sources remain interpreted by their own schemas.
        ja: native capability description と task または policy record を指す。異なる source はそれぞれ独自の schema で解釈され続ける。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: mcp:docs/search-docs
      source_claims: [claim-eligibility-mcp-schema, claim-eligibility-a2a-skill, claim-eligibility-local]
  constraints:
    - id: eligibility-uses-native-capability-shape
      severity: error
      expression_language: plain
      expression: An eligibility finding must cite the candidate's actual source capability description and task_requirement_ref; an A2A AgentSkill may be evaluated through its declared modes and security requirements but must not be assigned an MCP inputSchema without an independent MCP Tool source.
      explanation:
        zh: 资格判断必须来自真实来源字段，而不是跨协议的虚构统一 schema。
        en: An eligibility judgment must use real source fields rather than a fabricated cross-protocol universal schema.
        ja: eligibility judgment は実際の source field を使わなければならず、捏造された cross-protocol universal schema を使えない。
      source_claims: [claim-eligibility-mcp-schema, claim-eligibility-a2a-skill, claim-eligibility-local]
    - id: eligibility-is-not-availability-or-selection
      severity: error
      expression_language: plain
      expression: ToolEligibilityAssessment must not assert connection_state, availability_state, observed_at as a liveness proof, rank, selected_candidate_ref, tool_call, or tool_result; it reports task-and-policy compatibility only.
      explanation:
        zh: 资格回答“能否满足此请求”，不回答“此时能否访问”或“应选哪个”。
        en: Eligibility answers “can it satisfy this request,” not “can it be accessed now” or “which one should be chosen.”
        ja: eligibility は「この request を満たせるか」に答え、「今 access できるか」や「どれを選ぶべきか」には答えない。
      source_claims: [claim-eligibility-local]
  required_relations: []
examples:
  - id: eligibility-positive-mcp-schema-fits

    labels: {zh: MCP schema 符合任务, en: MCP schema fits the task, ja: MCP schema が task に適合する}
    descriptions:
      zh: Toolformer (Schick 2023) 自监督判断何时插入 [Calculator(350/7)]/[Search(query)]；ToolBench DFSDT 在 16000+ RapidAPI 上 depth-first 工具选择；ART 从示例库检索多步推理模式。
      en: Toolformer (Schick 2023) self-supervised when-to-insert [Calculator(350/7)]/[Search(query)]; ToolBench DFSDT depth-first tool selection over 16000+ RapidAPI; ART retrieves multi-step reasoning patterns from task demos.
      ja: Toolformer (Schick 2023) 自己教師あり [Calculator(350/7)]/[Search(query)] 挿入判断。ToolBench DFSDT が 16000+ RapidAPI で depth-first tool 選択。ART が task demo から多段 reasoning pattern を检索。
    field_values: {assessment_id: eligibility-17, candidate_ref: candidate:search-docs, task_requirement_ref: task:42, eligibility_state: eligible, evidence_refs: [mcp:docs/search-docs, task:42]}
    related_node_ids: [ToolEligibilityAssessment, ToolCandidateAssessment]
    related_relation_ids: [ToolEligibilityAssessment-is_a-ToolCandidateAssessment]

    source_claims: [claim-eligibility-mcp-schema, claim-eligibility-local]
  - id: eligibility-counterexample-configured-but-incompatible

    labels: {zh: 已配置但接口不兼容, en: Configured but interface-incompatible, ja: configured だが interface-incompatible}
    descriptions:
      zh: 反例：未执行 ToolBench API 检索或 Gorilla retriever 就假定工具可用；违反 Toolformer 自监督「仅在 API 调用改善 loss 时插入」准则。
      en: Counterexample: assuming tool availability without ToolBench API search or Gorilla retriever; violates Toolformer self-supervised criterion of inserting only when API call improves loss.
      ja: 反例：ToolBench API 检索や Gorilla retriever なしで tool 可用性を仮定。Toolformer 自己教師あり「API 呼出しが loss 改善時のみ挿入」准则違反。
    field_values: {assessment_id: eligibility-18, candidate_ref: candidate:search-docs, task_requirement_ref: task:43, eligibility_state: eligible, evidence_refs: [openai:response-config/18]}
    related_node_ids: [ToolEligibilityAssessment, ToolAvailabilityAssessment]
    related_relation_ids: []

    source_claims: [claim-eligibility-local]
  - id: eligibility-boundary-available-but-ineligible

    labels: {zh: 可用但不合格, en: Available but ineligible, ja: available だが ineligible}
    descriptions:
      zh: Toolformer 训练时 API 调用标记 vs ToolBench/Gorilla 运行时 capability discovery 的方法论边界；本地 ToolSelectionDecision 非 wire tool_choice。
      en: Methodological boundary between Toolformer training-time API markers vs ToolBench/Gorilla runtime capability discovery; local ToolSelectionDecision is not wire tool_choice.
      ja: Toolformer 訓練時 API marker と ToolBench/Gorilla ランタイム capability discovery の方法論境界。ローカル ToolSelectionDecision は wire tool_choice ではない。
    field_values: {assessment_id: eligibility-19, candidate_ref: candidate:search-docs, task_requirement_ref: task:44, eligibility_state: ineligible, evidence_refs: [mcp:docs/search-docs, task:44]}
    related_node_ids: [ToolEligibilityAssessment, ToolAvailabilityAssessment]
    related_relation_ids: [ToolEligibilityAssessment-is_a-ToolCandidateAssessment]

    source_claims: [claim-eligibility-mcp-schema, claim-eligibility-local]
  - id: eligibility-instance-a2a-description-unknown

    labels: {zh: A2A 描述信息不足实例, en: A2A description-insufficient instance, ja: A2A description-insufficient instance}
    descriptions:
      zh: ToolBench ToolLLM 实例：query="book a flight"→DFSDT 选择 RapidAPI flights/search；Gorilla retriever 返回 HuggingFace transformers.pipeline API 文档 top-3。
      en: ToolBench ToolLLM instance: query="book a flight"→DFSDT selects RapidAPI flights/search; Gorilla retriever returns HuggingFace transformers.pipeline API docs top-3.
      ja: ToolBench ToolLLM 実例：query="book a flight"→DFSDT が RapidAPI flights/search を選択。Gorilla retriever が HuggingFace transformers.pipeline API 文档 top-3 を返す。
    field_values: {assessment_id: eligibility-20, candidate_ref: candidate:a2a-research, task_requirement_ref: task:45, eligibility_state: unknown, evidence_refs: [a2a:agent-card/research-agent#skill/research, task:45]}
    related_node_ids: [ToolEligibilityAssessment, ToolCandidate]
    related_relation_ids: [ToolEligibilityAssessment-is_a-ToolCandidateAssessment]

    source_claims: [claim-eligibility-a2a-skill, claim-eligibility-local]
parent_relation:
  id: ToolEligibilityAssessment-is_a-ToolCandidateAssessment
  predicate: is_a
  target: concept:ToolCandidateAssessment
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是候选评估的一种, en: is a kind of candidate assessment, ja: candidate assessment の一種である}
  definitions:
    zh: ToolEligibilityAssessment 继承 ToolCandidateAssessment 的单候选、任务语境与证据要求，并把检查收窄为任务和政策兼容性。
    en: ToolEligibilityAssessment inherits ToolCandidateAssessment's single-candidate, task-context, and evidence requirements while narrowing the check to task and policy compatibility.
    ja: ToolEligibilityAssessment は ToolCandidateAssessment の single-candidate、task-context、evidence requirement を継承し、check を task と policy compatibility に限定する。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels: {zh: 具有资格评估子类, en: has eligibility-assessment subtype, ja: eligibility-assessment subtype を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: This hierarchy states a true subtype relation between assessment activities; it does not equate source capability metadata with a final selection or availability observation.
  constraints: []
  examples: []
  source_claims: [claim-eligibility-local]
  distinct_fact_rationale:
    zh: 资格评估与一般候选评估同属评估活动，其特定问题是“在该任务下是否可考虑”，不是“现在是否在线”。
    en: Eligibility assessment and general candidate assessment are both assessment activities; its specific question is “may it be considered for this task,” not “is it online now.”
    ja: eligibility assessment と general candidate assessment はともに assessment activity である。固有の問いは「この task で考慮できるか」であり、「今 online か」ではない。
  layout_role: primary-backbone
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol — Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-spec
    relevance: Defines Tool capability descriptions, schemas, annotations, and execution metadata.
  - id: a2a-latest-specification
    title: Agent2Agent Protocol Specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-spec
    relevance: Defines AgentSkill descriptions, modes, and security requirements.
source_claims:
  - id: claim-eligibility-mcp-schema
    source: mcp-tools-2025-11-25
    supports: An MCP Tool declaration includes name, description, required inputSchema, and optional output schema, annotations, and execution metadata that consumers can inspect without changing the native schema.
    locator: Tools — Tool definition
    evidence_kind: normative
    confidence: high
  - id: claim-eligibility-a2a-skill
    source: a2a-latest-specification
    supports: An A2A AgentSkill exposes id, name, description, tags, and optional inputModes, outputModes, and securityRequirements for describing focused agent behavior.
    locator: AgentCard and AgentSkill data model
    evidence_kind: normative
    confidence: high
  - id: claim-eligibility-local
    source: mcp-tools-2025-11-25
    supports: assessment_id, task_requirement_ref, eligibility_state, compatibility rationale, and the eligible/ineligible/unknown policy are Moonweave-local design inferences that compare native capability descriptions with a particular task and policy.
    locator: Tools — Tool definition
    evidence_kind: design-inference
    confidence: high
