schema: moonweave.ai/ontology-node/v1
id: ToolAvailabilityAssessment
kind: concept
status: accepted
labels:
  zh: 工具可用性评估
  en: Tool availability assessment
  ja: ツール可用性評価
semantics:
  short_definition:
    zh: 工具可用性评估记录候选在决定时点是否可发现、可连接并可接受调用。
    en: A tool availability assessment records whether a candidate is discoverable, reachable, and accepting calls at decision time.
    ja: ツール可用性評価は decision time に candidate が discoverable・reachable・accepting calls か記録します。
  definition:
    zh: 工具可用性评估是一种带观察时间和有效期限的 ToolCandidateAssessment，描述工具定义在当前会话是否仍可见、运行端点是否可达以及容量状态是否允许新调用；它是易失事实，不等同于持久注册或能力匹配。
    en: A tool availability assessment is a ToolCandidateAssessment with an observation time and validity window, describing whether the definition remains visible in the session, the runtime endpoint is reachable, and capacity permits a new call; it is volatile evidence, not persistent registration or capability fit.
    ja: ツール可用性評価は observation time と validity window を持つ ToolCandidateAssessment で、definition が session で可視か、runtime endpoint が reachable か、capacity が new call を許すか記録します。volatile evidence であり persistent registration や capability fit ではありません。
  why_needed:
    zh: 单独建模时点可用性可以解释“为什么合适的工具没有被选中”，并在工具列表变更或缓存失效后强制重新评估。
    en: Point-in-time availability explains why a fitting tool was not chosen and forces reassessment after tool-list changes or cache invalidation.
    ja: point-in-time availability は fitting tool が選ばれなかった理由を説明し、tool-list change や cache invalidation 後の再評価を強制します。
  includes:
    - zh: 带 observed_at、valid_until、可见性、端点健康与容量结论的瞬时评估。
      en: Transient assessments with observed_at, valid_until, visibility, endpoint health, and capacity conclusions.
      ja: observed_at・valid_until・visibility・endpoint health・capacity conclusion を持つ transient assessment。
  excludes:
    - zh: ToolRegistry 成员身份、功能契约适配，以及没有时间范围的永久“可用”标签。
      en: ToolRegistry membership, functional-contract fit, and permanent availability labels without a time scope.
      ja: ToolRegistry membership・functional-contract fit・time scope のない永続『available』label。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: availability_state
      labels:
        zh: 可用状态
        en: availability state
        ja: 可用状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 available、unavailable 或 unknown。
        en: Records available, unavailable, or unknown.
        ja: available・unavailable・unknown を記録します。
      allowed_values:
        - id: ToolAvailabilityAvailable
          value: available
          labels:
            zh: 当前可用
            en: available
            ja: 利用可能
          definitions:
            zh: 在 observed_at 时刻取得的正面证据表明候选可被访问，且该证据尚未超过 valid_until；它不等同于已获操作授权。
            en: Positive evidence observed at observed_at shows the candidate is reachable and remains within valid_until; this is not equivalent to operation authorization.
            ja: observed_at の positive evidence が candidate の reachability を示し valid_until 内にあり、operation authorization と同一ではありません。
          status: accepted
          source_claims:
            - claim-tool-availability-assessment-002
        - id: ToolAvailabilityUnavailable
          value: unavailable
          labels:
            zh: 当前不可用
            en: unavailable
            ja: 利用不可
          definitions:
            zh: 在 observed_at 时刻取得的明确证据表明候选不能被访问或已从当前可见集合移除；该结论不表示定义已注销。
            en: Explicit evidence at observed_at shows the candidate cannot be reached or has left the currently visible set; this does not mean its definition has been deregistered.
            ja: observed_at の explicit evidence が candidate の unreachable または current visible set からの removal を示し、definition の deregistration は意味しません。
          status: accepted
          source_claims:
            - claim-tool-availability-assessment-003
        - id: ToolAvailabilityUnknown
          value: unknown
          labels:
            zh: 当前未知
            en: unknown
            ja: 不明
          definitions:
            zh: 没有足够的新鲜观测可以确认可用或不可用；系统必须保留未知，而不能把缺少证据默认为任一结论。
            en: No sufficiently fresh observation establishes either availability or unavailability; the system must retain unknown rather than defaulting missing evidence to either conclusion.
            ja: available/unavailable を確定する十分に fresh な observation がなく、missing evidence をどちらかに default せず unknown を保持します。
          status: accepted
          source_claims:
            - claim-tool-availability-assessment-004
      pattern: null
      example_value: available
      source_claims:
        - claim-tool-availability-assessment-001
    - id: observed_at
      labels:
        zh: 观察时间
        en: observed at
        ja: 観測時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 可用性证据实际观测的 UTC 时间。
        en: UTC instant when availability evidence was observed.
        ja: availability evidence が観測された UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:19:55.000Z
      source_claims:
        - claim-tool-availability-assessment-001
    - id: valid_until
      labels:
        zh: 有效截止
        en: valid until
        ja: 有効期限
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 超过该时间必须重新观察，不能沿用旧结论。
        en: After this instant the conclusion must be refreshed rather than reused.
        ja: この時刻後は conclusion を再観測し、再利用してはいけません。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:20:25.000Z
      source_claims:
        - claim-tool-availability-assessment-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: ToolAvailabilityAssessment-example-positive-manual-001
    kind: positive
    labels:
      zh: 工具可用性评估正例
      en: Positive case for Tool availability assessment
      ja: ツール可用性評価の正例
    scenario_id: null
    descriptions:
      zh: MCP 工具列表缓存刚刷新，read_file 端点健康且容量正常；评估在 30 秒有效窗内记录 available。
      en: The MCP tool-list cache has just refreshed, the read_file endpoint is healthy, and capacity is normal; the assessment records available for a 30-second window.
      ja: MCP tool-list cache が更新直後で read_file endpoint が healthy、capacity も正常なため30秒 window で available を記録します。
    field_values:
      assessment_id: assessment-read-file-availability
      query_version: 2
      evidence_refs:
        - mcp-tool-list:session-repository-features-23@2026-07-16T01:19:55.000Z#read_file
        - endpoint-health:read-file@2026-07-16T01:19:55.000Z
        - capacity-snapshot:read-file@2026-07-16T01:19:55.000Z
      conclusion: pass
      availability_state: available
      observed_at: 2026-07-16T01:19:55.000Z
      valid_until: 2026-07-16T01:20:25.000Z
    related_node_ids:
      - ToolAvailabilityAssessment
      - ToolCandidateAssessment
      - ToolCandidate
      - MCPToolList
    related_relation_ids:
      - ToolCandidateAssessment-assesses-ToolCandidate
    expected_result:
      zh: 只有在 valid_until 之前，选择活动才可把该结论视作当前证据。
      en: Selection may treat the conclusion as current only before valid_until.
      ja: selection は valid_until 前だけ conclusion を current evidence として扱えます。
    why_valid_or_invalid:
      zh: 观察时间、状态和有效窗完整，能够在列表变化后判定证据失效。
      en: Observation time, state, and validity window are complete, so evidence expiry is decidable after list changes.
      ja: observation time・state・validity window が揃い、list change 後の evidence expiry を判定できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-availability-assessment-001
  - id: ToolAvailabilityAssessment-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 工具可用性评估边界例
      en: Boundary case for Tool availability assessment
      ja: ツール可用性評価の境界例
    scenario_id: null
    descriptions:
      zh: 工具上周成功调用且仍在 Registry 中，但当前 MCP 会话已收到 tools/list_changed；旧成功不能证明此刻 available。
      en: The tool succeeded last week and remains in Registry, but the current MCP session received tools/list_changed; historical success cannot prove current availability.
      ja: tool は先週成功し Registry に残っていますが current MCP session は tools/list_changed を受けており、historical success は current availability を証明しません。
    field_values:
      availability_state: unknown
      observed_at: 2026-07-09T01:19:55.000Z
      valid_until: 2026-07-09T01:20:25.000Z
    related_node_ids:
      - ToolAvailabilityAssessment
      - ToolRegistry
      - MCPToolList
    related_relation_ids: []
    expected_result:
      zh: 旧评估失效，候选必须重新发现或健康检查后才能选择。
      en: The old assessment is expired; the candidate requires rediscovery or a fresh health observation before selection.
      ja: old assessment は expired で、selection 前に rediscovery または fresh health observation が必要です。
    why_valid_or_invalid:
      zh: 持久注册与历史成功都不能替代带当前时间范围的可用性证据。
      en: Persistent registration and historical success cannot substitute for time-scoped current availability evidence.
      ja: persistent registration と historical success は time-scoped current availability evidence の代替になりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-availability-assessment-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ToolMatch
    shared_parent_concept_id: ToolCandidateAssessment
    differentia:
      zh: ToolAvailabilityAssessment 与 ToolMatch 同属 ToolCandidateAssessment；ToolAvailabilityAssessment 是带时效的运行观察，ToolMatch 是定义契约相对于任务需求的语义判断。
      en: ToolAvailabilityAssessment and ToolMatch share ToolCandidateAssessment; ToolAvailabilityAssessment is a time-limited runtime observation, while ToolMatch is a semantic judgment of definition contract against task requirements.
      ja: ToolAvailabilityAssessment と ToolMatch は ToolCandidateAssessment を共有し、前者は time-limited runtime observation、後者は definition contract と task requirements の semantic judgment です。
    source_claims:
      - claim-tool-availability-assessment-005
parent_relation:
  id: ToolAvailabilityAssessment-is_a-ToolCandidateAssessment
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: ToolAvailabilityAssessment 是 ToolCandidateAssessment 的严格子类；其区分条件是：带观察时间和有效窗记录当前可见性、连通性与容量。
    en: "ToolAvailabilityAssessment is a strict subtype of ToolCandidateAssessment; its differentia is: it records current visibility, reachability, and capacity with observation time and validity window."
    ja: ToolAvailabilityAssessment は ToolCandidateAssessment の厳密な subtype で、種差は次の通りです：observation time と validity window 付きで current visibility・reachability・capacity を記録します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数由具体查询、候选集合和运行策略决定。
    en: Cardinality depends on the concrete query, candidate set, and runtime policy.
    ja: cardinality は具体 query・candidate set・runtime policy に依存します。
  inverse_reading:
    predicate: inverse_is_a
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ToolAvailabilityAssessment-is_a-ToolCandidateAssessment-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive case for is a
        ja: の一種の正例
      scenario_id: null
      descriptions:
        zh: 记录同时满足 ToolCandidateAssessment 的上位定义和 ToolAvailabilityAssessment 的完整种差：带观察时间和有效窗记录当前可见性、连通性与容量。
        en: "The record satisfies both the parent definition of ToolCandidateAssessment and the complete differentia of ToolAvailabilityAssessment: it records current visibility, reachability, and capacity with observation time and validity window."
        ja: record は ToolCandidateAssessment の上位 definition と ToolAvailabilityAssessment の完全な種差を満たします：observation time と validity window 付きで current visibility・reachability・capacity を記録します。
      field_values: {}
      related_node_ids:
        - ToolAvailabilityAssessment
        - ToolCandidateAssessment
      related_relation_ids:
        - ToolAvailabilityAssessment-is_a-ToolCandidateAssessment
      expected_result:
        zh: 验证器将该记录归为 ToolAvailabilityAssessment，并通过 is_a 继承 ToolCandidateAssessment 的约束。
        en: Validation classifies the record as ToolAvailabilityAssessment and inherits ToolCandidateAssessment constraints through is_a.
        ja: validation は record を ToolAvailabilityAssessment と分類し is_a により ToolCandidateAssessment constraints を継承します。
      why_valid_or_invalid:
        zh: 完整种差而非名称前缀证明了 ToolAvailabilityAssessment 的成员资格。
        en: The complete differentia, not a shared name prefix, proves membership in ToolAvailabilityAssessment.
        ja: shared name prefix ではなく完全な種差が ToolAvailabilityAssessment membership を証明します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-availability-assessment-006
    - id: ToolAvailabilityAssessment-is_a-ToolCandidateAssessment-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種の境界例
      scenario_id: null
      descriptions:
        zh: 对象只满足 ToolCandidateAssessment 的一般条件，却缺少 ToolAvailabilityAssessment 的关键种差：带观察时间和有效窗记录当前可见性、连通性与容量。
        en: "The object satisfies only the general conditions of ToolCandidateAssessment and lacks the defining differentia of ToolAvailabilityAssessment: it records current visibility, reachability, and capacity with observation time and validity window."
        ja: object は ToolCandidateAssessment の一般条件だけを満たし ToolAvailabilityAssessment の種差を欠きます：observation time と validity window 付きで current visibility・reachability・capacity を記録します。
      field_values: {}
      related_node_ids:
        - ToolAvailabilityAssessment
        - ToolCandidateAssessment
      related_relation_ids:
        - ToolAvailabilityAssessment-is_a-ToolCandidateAssessment
      expected_result:
        zh: 验证器保留 ToolCandidateAssessment 身份，不把该对象提升为 ToolAvailabilityAssessment。
        en: Validation retains ToolCandidateAssessment identity and does not promote the object to ToolAvailabilityAssessment.
        ja: validation は ToolCandidateAssessment identity を保持し object を ToolAvailabilityAssessment に昇格しません。
      why_valid_or_invalid:
        zh: 共享上位概念不足以证明 ToolAvailabilityAssessment 的严格成员资格。
        en: A shared parent is insufficient to prove strict membership in ToolAvailabilityAssessment.
        ja: shared parent だけでは ToolAvailabilityAssessment の strict membership を証明できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-availability-assessment-006
  source_claims:
    - claim-tool-availability-assessment-006
