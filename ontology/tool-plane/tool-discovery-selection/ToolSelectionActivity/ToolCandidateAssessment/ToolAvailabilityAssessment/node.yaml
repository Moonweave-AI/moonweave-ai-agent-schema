source_claims:
  - id: claim-tool-availability-assessment-001
    source: eng-proto-mcp-tools-2025-06-18
    supports: MCP tools/list may be followed by notifications/tools/list_changed, and OpenAI MCP integrations document tool-list cache invalidation; Moonweave therefore treats availability as time-scoped evidence rather than a property of ToolDefinition.
    locator: Server Features > Tools > Protocol Messages > Listing Tools, Calling Tools, and List Changed Notification
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tool-availability-assessment-002
    source: eng-proto-mcp-tools-2025-06-18
    supports: MCP lists tools and can later signal list changes. Moonweave therefore treats available as a time-bounded observation, not a permanent property of ToolDefinition.
    locator: Server Features > Tools > Protocol Messages > Listing Tools, Calling Tools, and List Changed Notification
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-tool-availability-assessment-003
    source: eng-proto-mcp-tools-2025-06-18
    supports: The MCP list-changed mechanism permits the currently exposed tool set to change without erasing stable registry identity. Moonweave therefore separates point-in-time unavailability from deregistration.
    locator: Server Features > Tools > Protocol Messages > Listing Tools, Calling Tools, and List Changed Notification
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-tool-availability-assessment-004
    source: eng-proto-mcp-tools-2025-06-18
    supports: Because MCP tool exposure may change after an earlier list result, stale or absent observations cannot safely establish current availability. Moonweave records that epistemic gap as unknown.
    locator: Server Features > Tools > Protocol Messages > Listing Tools, Calling Tools, and List Changed Notification
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-tool-availability-assessment-005
    source: eng-proto-mcp-tools-2025-06-18
    supports: "Sibling evidence scope: ToolAvailabilityAssessment and ToolMatch are compared only under ToolCandidateAssessment; MCP tools/list may be followed by notifications/tools/list_changed, and OpenAI MCP integrations document tool-list cache invalidation; Moonweave therefore treats availability as time-scoped evidence rather than a property of ToolDefinition."
    locator: Server Features > Tools > Protocol Messages > Listing Tools, Calling Tools, and List Changed Notification
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tool-availability-assessment-006
    source: eng-proto-mcp-tools-2025-06-18
    supports: MCP list-changed notifications make tool visibility time-sensitive, supporting availability as a separate candidate-assessment subtype.
    locator: Server Features > Tools > Protocol Messages > Listing Tools, Calling Tools, and List Changed Notification
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
