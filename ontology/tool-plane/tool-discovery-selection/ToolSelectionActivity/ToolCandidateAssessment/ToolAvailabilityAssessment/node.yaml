schema: moonweave.ai/ontology-node/v1
id: ToolAvailabilityAssessment
kind: concept
labels:
  zh: 工具可用性评估
  en: Tool Availability Assessment
  ja: ツール可用性評価
semantics:
  short_definition:
    zh: 检查一个候选工具在特定时点是否具备可访问和可继续调用的运行前提的候选评估。
    en: A candidate assessment that checks whether a tool has the operational preconditions for access and continued calling at a specific time.
    ja: 特定時点で tool が access と継続的 calling の operational precondition を持つかを検査する candidate assessment。
  definition:
    zh: ToolAvailabilityAssessment 是 ToolCandidateAssessment 的一种，针对一个候选在观察时刻检查连接、会话授权、配置允许范围、服务状态或其他实际运行证据，给出 available、unavailable 或 unknown finding。它不判断该工具能否完成任务，也不以 MCP tools/list、A2A 技能描述或 OpenAI allowed_tools 配置单独证明实时可用。
    en: ToolAvailabilityAssessment is a kind of ToolCandidateAssessment that checks connectivity, session authorization, configured allowance, service status, or other operational evidence for one candidate at an observation time and returns an available, unavailable, or unknown finding. It does not judge whether the tool can complete the task and does not use MCP tools/list, an A2A skill description, or OpenAI allowed_tools configuration alone as proof of live availability.
    ja: ToolAvailabilityAssessment は ToolCandidateAssessment の一種であり、observation time に一つの candidate の connectivity、session authorization、configured allowance、service status、その他の operational evidence を検査し、available、unavailable、unknown の finding を返す。tool が task を完了できるかを判断せず、MCP tools/list、A2A skill description、OpenAI allowed_tools configuration だけを live availability の証明にしない。
  why_needed:
    zh: 发现到的工具和策略允许的工具都可能因会话、审批、网络、服务故障或速率状态而暂时不能用。把此结论标上时间和证据，能避免把目录内容或配置当作运行成功保证。
    en: A discovered or policy-allowed tool may still be temporarily unusable because of session, approval, network, service, or rate conditions. Attaching time and evidence to this conclusion avoids treating catalog content or configuration as a guarantee of runtime success.
    ja: 発見済みまたは policy-allowed な tool でも、session、approval、network、service、rate condition により一時的に使えないことがある。この conclusion に time と evidence を付けることで、catalog content や configuration を runtime success の保証と扱うことを避ける。
  includes:
    - zh: 具有观察时间的连接、授权、审批状态、服务状态或本地健康证据检查。
      en: Connectivity, authorization, approval-state, service-status, or local health-evidence checks with an observation time.
      ja: observation time を持つ connectivity、authorization、approval state、service status、local health evidence の check。
    - zh: available、unavailable 或 unknown 的临时运行结论及其证据引用。
      en: A time-bounded available, unavailable, or unknown operational conclusion with evidence references.
      ja: evidence reference を伴う time-bounded available、unavailable、unknown の operational conclusion。
  excludes:
    - zh: 任务能力匹配、输入 schema 兼容、候选排名、最终选择或工具实际执行。
      en: Task-capability match, input-schema compatibility, candidate ranking, final selection, or actual tool execution.
      ja: task-capability match、input-schema compatibility、candidate ranking、final selection、actual tool execution。
    - zh: 仅凭 tools/list 列出、AgentCard skill 描述或 allowed_tools 配置得出的可用结论。
      en: An availability conclusion based only on being listed by tools/list, described by an AgentCard skill, or included in allowed_tools configuration.
      ja: tools/list での listing、AgentCard skill description、allowed_tools configuration だけに基づく availability conclusion。
  semantic_kind: activity
engineering:
  explanation:
    zh: 评估器将候选的来源配置与有时间戳的运行观测分开保存。远程 MCP server_label、allowed_tools 和 require_approval 可说明会话约束；只有对应的会话观测、授权/审批结果或健康信号才能支持当时的可用性 finding，缺少时必须为 unknown。
    en: An assessor stores a candidate's source configuration separately from timestamped operational observations. Remote-MCP server_label, allowed_tools, and require_approval can describe session constraints; only corresponding session observations, authorization or approval results, or health signals can support an availability finding at that time, and absence of them requires unknown.
    ja: assessor は candidate の source configuration を timestamped operational observation と分けて保存する。remote-MCP server_label、allowed_tools、require_approval は session constraint を説明できるが、対応する session observation、authorization または approval result、health signal だけがその時点の availability finding を支持できる。これらがなければ unknown が必要である。
  typical_input:
    - description:
        zh: OpenAI 远程 MCP 会话配置
        en: OpenAI remote-MCP session configuration
        ja: OpenAI remote-MCP session configuration
      format: |-
        {"type":"mcp","server_label":"docs","server_url":"https://tools.example.test/mcp","allowed_tools":["search-docs"],"require_approval":"always"}
      source_claims: [claim-availability-openai-config]
    - description:
        zh: 有时间戳的本地运行观测
        en: Timestamped local operational observation
        ja: Timestamped local operational observation
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"tool_operational_observation","candidate_ref":"candidate:search-docs","task_requirement_ref":"task:42","observed_at":"2026-07-19T09:20:00Z","connection_state":"connected","authorization_state":"authorized","approval_state":"pending"}
      source_claims: [claim-availability-local]
  typical_output:
    - description:
        zh: 本地可用性 finding
        en: Local availability finding
        ja: Local availability finding
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"tool_availability_assessment","assessment_id":"availability-17","candidate_ref":"candidate:search-docs","task_requirement_ref":"task:42","observed_at":"2026-07-19T09:20:00Z","availability_state":"unknown","evidence_refs":["openai:response-config/17","observation:17"],"rationale":"Approval is still pending"}
      source_claims: [claim-availability-local]
  reference_implementations:
    - name: OpenAI Responses remote MCP configuration
      url: https://developers.openai.com/api/reference/resources/responses/methods/create
      description: Defines server labels, allowed tools, and approval controls for remote MCP tools in a Responses request.
    - name: Model Context Protocol tools/list
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines tool discovery records, whose presence is distinct from a later operational-success observation.
structure:
  identity_keys: [assessment_id]
  fields:
    - id: assessment_id
      labels: {zh: 可用性评估标识, en: Availability-assessment identifier, ja: availability-assessment 識別子}
      definitions:
        zh: 稳定标识一次本地可用性评估；它不替代服务器标签、协议请求 id 或工具名称。
        en: Stably identifies one local availability assessment and does not replace a server label, protocol request id, or tool name.
        ja: 一つの local availability assessment を安定して識別し、server label、protocol request id、tool name を置き換えない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: availability-17
      source_claims: [claim-availability-local]
    - id: candidate_ref
      labels: {zh: 候选引用, en: Candidate reference, ja: candidate 参照}
      definitions:
        zh: 指向被检查可用性的一个 ToolCandidate。
        en: Points to the one ToolCandidate whose availability is checked.
        ja: availability を検査する一つの ToolCandidate を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: candidate:search-docs
      source_claims: [claim-availability-local]
    - id: task_requirement_ref
      labels: {zh: 任务需求引用, en: Task-requirement reference, ja: task-requirement 参照}
      definitions:
        zh: 继承候选评估所服务的具体任务需求；它保留评估语境，却不把可用性误写成任务适配结论。
        en: Retains the concrete task requirement served by the candidate assessment; it preserves assessment context without turning availability into a task-fit conclusion.
        ja: candidate assessment が扱う具体的な task requirement を保持する。assessment context を保つが、availability を task-fit conclusion に変えない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: task:42
      source_claims: [claim-availability-local]
    - id: observed_at
      labels: {zh: 观察时间, en: Observation time, ja: observation time}
      definitions:
        zh: 记录运行证据所对应的时刻；可用性不是无时间限制的属性。
        en: Records the time to which operational evidence applies; availability is not an unbounded property.
        ja: operational evidence が適用される時刻を記録する。availability は時間無制限の property ではない。
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      pattern: ISO-8601
      example_value: '2026-07-19T09:20:00Z'
      source_claims: [claim-availability-local]
    - id: availability_state
      labels: {zh: 可用性状态, en: Availability state, ja: availability state}
      definitions:
        zh: 本地运行 finding；unknown 表示证据不足，不能自动提升为 available。
        en: The local operational finding; unknown means evidence is insufficient and cannot be promoted to available automatically.
        ja: local operational finding。unknown は evidence 不足を意味し、自動的に available へ昇格できない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [available, unavailable, unknown]
      pattern: null
      example_value: unknown
      source_claims: [claim-availability-local]
    - id: evidence_refs
      labels: {zh: 证据引用, en: Evidence references, ja: evidence 参照}
      definitions:
        zh: 指向配置和有时间戳观测；配置可解释约束，但运行 finding 还需实际观测证据。
        en: Points to configuration and timestamped observations; configuration can explain constraints, but an operational finding still needs actual observation evidence.
        ja: configuration と timestamped observation を指す。configuration は constraint を説明できるが、operational finding には実際の observation evidence がなお必要である。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: observation:17
      source_claims: [claim-availability-openai-config, claim-availability-local]
  constraints:
    - id: availability-requires-time-bounded-operational-evidence
      severity: error
      expression_language: plain
      expression: availability_state equals available or unavailable requires task_requirement_ref, observed_at, and at least one evidence_ref to a timestamped operational observation, authorization result, approval result, or equivalent health signal; configuration-only evidence yields unknown.
      explanation:
        zh: 目录和配置表达发现或许可，而不是在某时刻的真实连通与授权状态。
        en: Catalogs and configuration express discovery or permission, not actual connectivity and authorization state at a time.
        ja: catalog と configuration は discovery または permission を表し、ある時刻の実際の connectivity と authorization state を表さない。
      source_claims: [claim-availability-openai-config, claim-availability-mcp-discovery, claim-availability-local]
    - id: availability-does-not-assess-task-fit
      severity: error
      expression_language: plain
      expression: ToolAvailabilityAssessment must not assert eligibility_state, match_state, rank, selected_candidate_ref, tool_call, or tool_result; it reports operational access only.
      explanation:
        zh: 能访问并不意味着能满足当前任务或应被选中。
        en: Being accessible does not mean the candidate can satisfy the current task or should be selected.
        ja: access できることは、candidate が current task を満たせることや選択すべきことを意味しない。
      source_claims: [claim-availability-local]
  required_relations: []
examples:
  - id: availability-positive-observed-connected

    labels: {zh: 有观测的可用候选, en: Candidate available with observation, ja: observation を伴う available candidate}
    descriptions:
      zh: Toolformer (Schick 2023) 自监督判断何时插入 [Calculator(350/7)]/[Search(query)]；ToolBench DFSDT 在 16000+ RapidAPI 上 depth-first 工具选择；ART 从示例库检索多步推理模式。
      en: Toolformer (Schick 2023) self-supervised when-to-insert [Calculator(350/7)]/[Search(query)]; ToolBench DFSDT depth-first tool selection over 16000+ RapidAPI; ART retrieves multi-step reasoning patterns from task demos.
      ja: Toolformer (Schick 2023) 自己教師あり [Calculator(350/7)]/[Search(query)] 挿入判断。ToolBench DFSDT が 16000+ RapidAPI で depth-first tool 選択。ART が task demo から多段 reasoning pattern を检索。
    field_values: {assessment_id: availability-17, candidate_ref: candidate:search-docs, task_requirement_ref: task:42, observed_at: '2026-07-19T09:20:00Z', availability_state: available, evidence_refs: [observation:17]}
    related_node_ids: [ToolAvailabilityAssessment, ToolCandidateAssessment]
    related_relation_ids: [ToolAvailabilityAssessment-is_a-ToolCandidateAssessment]

    source_claims: [claim-availability-local]
  - id: availability-counterexample-config-only

    labels: {zh: 仅凭配置断言可用, en: Assert availability from configuration alone, ja: configuration だけから availability を主張する}
    descriptions:
      zh: 反例：未执行 ToolBench API 检索或 Gorilla retriever 就假定工具可用；违反 Toolformer 自监督「仅在 API 调用改善 loss 时插入」准则。
      en: Counterexample: assuming tool availability without ToolBench API search or Gorilla retriever; violates Toolformer self-supervised criterion of inserting only when API call improves loss.
      ja: 反例：ToolBench API 检索や Gorilla retriever なしで tool 可用性を仮定。Toolformer 自己教師あり「API 呼出しが loss 改善時のみ挿入」准则違反。
    field_values: {assessment_id: availability-18, candidate_ref: candidate:search-docs, observed_at: '2026-07-19T09:25:00Z', availability_state: available, evidence_refs: [openai:response-config/18]}
    related_node_ids: [ToolAvailabilityAssessment, ToolCandidateAssessment]
    related_relation_ids: []

    source_claims: [claim-availability-openai-config, claim-availability-local]
  - id: availability-boundary-listed-not-available

    labels: {zh: 已列出不等于可用, en: Listed is not available, ja: listed は available ではない}
    descriptions:
      zh: Toolformer 训练时 API 调用标记 vs ToolBench/Gorilla 运行时 capability discovery 的方法论边界；本地 ToolSelectionDecision 非 wire tool_choice。
      en: Methodological boundary between Toolformer training-time API markers vs ToolBench/Gorilla runtime capability discovery; local ToolSelectionDecision is not wire tool_choice.
      ja: Toolformer 訓練時 API marker と ToolBench/Gorilla ランタイム capability discovery の方法論境界。ローカル ToolSelectionDecision は wire tool_choice ではない。
    field_values: {assessment_id: availability-19, candidate_ref: candidate:search-docs, task_requirement_ref: task:44, observed_at: '2026-07-19T09:30:00Z', availability_state: unknown, evidence_refs: [mcp:list:19]}
    related_node_ids: [ToolAvailabilityAssessment, ToolCandidate]
    related_relation_ids: [ToolAvailabilityAssessment-is_a-ToolCandidateAssessment]

    source_claims: [claim-availability-mcp-discovery, claim-availability-local]
  - id: availability-instance-unreachable-server

    labels: {zh: 服务不可达实例, en: Unreachable-service instance, ja: unreachable-service instance}
    descriptions:
      zh: ToolBench ToolLLM 实例：query="book a flight"→DFSDT 选择 RapidAPI flights/search；Gorilla retriever 返回 HuggingFace transformers.pipeline API 文档 top-3。
      en: ToolBench ToolLLM instance: query="book a flight"→DFSDT selects RapidAPI flights/search; Gorilla retriever returns HuggingFace transformers.pipeline API docs top-3.
      ja: ToolBench ToolLLM 実例：query="book a flight"→DFSDT が RapidAPI flights/search を選択。Gorilla retriever が HuggingFace transformers.pipeline API 文档 top-3 を返す。
    field_values: {assessment_id: availability-20, candidate_ref: candidate:search-docs, task_requirement_ref: task:45, observed_at: '2026-07-19T09:35:00Z', availability_state: unavailable, evidence_refs: [observation:20]}
    related_node_ids: [ToolAvailabilityAssessment, ToolCandidateAssessment]
    related_relation_ids: [ToolAvailabilityAssessment-is_a-ToolCandidateAssessment]

    source_claims: [claim-availability-local]
parent_relation:
  id: ToolAvailabilityAssessment-is_a-ToolCandidateAssessment
  predicate: is_a
  target: concept:ToolCandidateAssessment
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是候选评估的一种, en: is a kind of candidate assessment, ja: candidate assessment の一種である}
  definitions:
    zh: ToolAvailabilityAssessment 继承 ToolCandidateAssessment 的单候选、任务语境和证据边界，并将检查范围限定为时间相关的运行可访问性。
    en: ToolAvailabilityAssessment inherits ToolCandidateAssessment's single-candidate, task-context, and evidence boundaries while narrowing the check to time-dependent operational accessibility.
    ja: ToolAvailabilityAssessment は ToolCandidateAssessment の single-candidate、task-context、evidence boundary を継承し、check を time-dependent operational accessibility に限定する。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels: {zh: 具有可用性评估子类, en: has availability-assessment subtype, ja: availability-assessment subtype を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: This hierarchy states a true subtype relation between assessment activities; it does not convert a protocol configuration record into an availability observation.
  constraints: []
  examples: []
  source_claims: [claim-availability-local]
  distinct_fact_rationale:
    zh: 可用性评估与一般候选评估同属评估活动，只是其问题是“此时能否访问”，而不是“是否适合任务”。
    en: Availability assessment and general candidate assessment are both assessment activities; its specific question is “can it be accessed now,” not “does it fit the task.”
    ja: availability assessment と general candidate assessment はともに assessment activity である。固有の問いは「今 access できるか」であり、「task に適合するか」ではない。
  layout_role: primary-backbone
relations: []
sources:
  - id: openai-responses-create-reference
    title: OpenAI API — Responses create reference
    url: https://developers.openai.com/api/reference/resources/responses/methods/create
    source_type: official-doc
    relevance: Defines remote MCP configuration, allowed-tools, and approval controls that constrain a session but do not establish live service health.
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol — Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-spec
    relevance: Defines tools/list discovery separately from later tools/call operation.
source_claims:
  - id: claim-availability-openai-config
    source: openai-responses-create-reference
    supports: OpenAI remote MCP configuration has server_label, server_url or connector_id, optional allowed_tools, and require_approval controls; these describe configuration and authorization workflow choices for a Responses request.
    locator: Request body — MCP tool configuration
    evidence_kind: normative
    confidence: high
  - id: claim-availability-mcp-discovery
    source: mcp-tools-2025-11-25
    supports: MCP tools/list enumerates Tool declarations and can paginate with nextCursor, while tools/call is a distinct operation that returns a CallToolResult.
    locator: Tools — Listing Tools and Calling Tools
    evidence_kind: normative
    confidence: high
  - id: claim-availability-local
    source: openai-responses-create-reference
    supports: assessment_id, candidate_ref, task_requirement_ref, observed_at, availability_state, operational-observation evidence, and the available/unavailable/unknown policy are Moonweave-local design inferences that distinguish task-scoped assessment context from time-bounded operational access.
    locator: Request body — MCP tool configuration
    evidence_kind: design-inference
    confidence: high
