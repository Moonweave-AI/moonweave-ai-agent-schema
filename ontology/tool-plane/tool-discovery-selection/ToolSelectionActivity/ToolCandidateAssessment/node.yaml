          en: A score stores only tool_name=read_file while two definition versions share that name; assesses is invalid without a resolved candidate.
          ja: score が tool_name=read_file のみで同名 definition versions が二つある場合 resolved candidate なしに assesses は成立しません。
        field_values: {}
