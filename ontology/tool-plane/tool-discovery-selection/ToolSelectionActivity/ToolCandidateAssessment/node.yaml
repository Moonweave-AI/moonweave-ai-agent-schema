        descriptions:
          zh: assessment-read-file-fit 明确引用 tool-query-042 version 2；version 3 增加写入需求后该评估被标记过期。
          en: assessment-read-file-fit references tool-query-042 version 2; when version 3 adds a write requirement, the assessment is marked stale.
          ja: assessment-read-file-fit は tool-query-042 version 2 を参照し version 3 が write requirement を追加すると stale になります。
