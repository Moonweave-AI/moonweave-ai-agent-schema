      en: ToolCandidateAssessment assesses exactly one ToolCandidate so conclusion, evidence, and query version belong to that candidate rather than a generic tool name.
      ja: ToolCandidateAssessment は一つの ToolCandidate を assesses し conclusion・evidence・query version を generic tool name でなく candidate に帰属させます。
    cardinality: null
