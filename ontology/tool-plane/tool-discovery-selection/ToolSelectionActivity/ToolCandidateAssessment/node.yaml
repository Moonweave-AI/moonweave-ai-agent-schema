    distinct_fact_rationale:
      zh: 该边把评估证据绑定到候选身份，是选择可重放性的必要条件。
      en: This edge binds assessment evidence to candidate identity and is required for replayable selection.
      ja: この edge は assessment evidence を candidate identity に結び replayable selection に必要です。
    layout_role: cross-link
    review_status: accepted
    target: concept:ToolCandidate
  - id: ToolCandidateAssessment-evaluates_against-ToolSearchQuery
    predicate: evaluates_against
    direction: source-to-target
