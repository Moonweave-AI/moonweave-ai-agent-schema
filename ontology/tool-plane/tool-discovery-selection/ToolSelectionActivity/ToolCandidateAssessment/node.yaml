    source: lit-tool-api-bank
    supports: API-Bank evaluates API retrieval and call correctness per tool-use dialogue; Moonweave binds each assessment to a concrete query-scoped candidate so errors can be localized before invocation.
    locator: Abstract; Evaluation System; Retrieve+Call and Plan+Retrieve+Call settings
    evidence_kind: design-inference
    confidence: high
