    source: lit-tool-api-bank
    supports: API-Bank evaluates retrieval and calling as distinct capabilities; Moonweave retains the concrete evidence behind each candidate assessment so its conclusion can be audited before selection.
    locator: Abstract; Evaluation System; Retrieve+Call and Plan+Retrieve+Call settings
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tool-candidate-assessment-003
    source: lit-tool-api-bank
    supports: API-Bank evaluates retrieval, planning, and calling separately. Moonweave uses pass only for the tested pre-selection dimension so success in one stage cannot stand in for the later selection or call.
    locator: Abstract; Evaluation System; Retrieve+Call and Plan+Retrieve+Call settings
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-tool-candidate-assessment-004
    source: lit-tool-api-bank
    supports: API-Bank's stage-separated evaluation supports locating an observed failure in the assessed stage. Moonweave therefore reserves fail for contradictory evidence rather than an unevaluated candidate.
    locator: Abstract; Evaluation System; Retrieve+Call and Plan+Retrieve+Call settings
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-tool-candidate-assessment-005
    source: lit-tool-api-bank
    supports: Stage-separated tool evaluation leaves a meaningful difference between a measured failure and a stage without adequate evidence. Moonweave preserves that difference as insufficient-evidence.
    locator: Abstract; Evaluation System; Retrieve+Call and Plan+Retrieve+Call settings
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-tool-candidate-assessment-006
    source: lit-tool-api-bank
    supports: API-Bank's Retrieve+Call and Plan+Retrieve+Call settings expose failures between retrieval and calling; Moonweave requires selection to consume explicit per-candidate evidence before committing a call target.
    locator: Abstract; Evaluation System; Retrieve+Call and Plan+Retrieve+Call settings
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
