schema: moonweave.ai/ontology-node/v1
id: ToolCandidateAssessment
kind: concept
labels:
  zh: 工具候选评估
  en: Tool Candidate Assessment
  ja: ツール候補評価
semantics:
  short_definition:
    zh: 为工具选择收集并解释单个候选证据的本地评估活动。
    en: A local assessment activity that gathers and explains evidence about one tool candidate for tool selection.
    ja: tool selection のために一つの tool candidate に関する evidence を集めて説明する local assessment activity。
  definition:
    zh: ToolCandidateAssessment 是 Moonweave 中针对一个 ToolCandidate、当前任务和适用政策进行检查的活动。它可产生可用性、资格和匹配 finding，并引用 MCP Tool schema、A2A AgentSkill 描述或 OpenAI 远程 MCP 配置作为证据；它不会列举新候选、调用工具、把模型 tool_choice 配置重命名为评估，也不会自行作最终选择。
    en: ToolCandidateAssessment is the Moonweave activity that examines one ToolCandidate against the current task and applicable policy. It may produce availability, eligibility, and match findings and cite an MCP Tool schema, an A2A AgentSkill description, or OpenAI remote-MCP configuration as evidence; it does not enumerate new candidates, invoke a tool, rename a model tool_choice configuration as an assessment, or make the final selection itself.
    ja: ToolCandidateAssessment は一つの ToolCandidate を current task と applicable policy に対して検査する Moonweave activity である。availability、eligibility、match finding を作り、MCP Tool schema、A2A AgentSkill description、OpenAI remote-MCP configuration を evidence として引用できる。新しい candidate を列挙せず、tool を invoke せず、model tool_choice configuration を assessment と改名せず、最終 selection も自ら行わない。
  why_needed:
    zh: “能被发现”“当前能访问”“可完成请求”和“应被选择”是不同结论。独立评估活动使每个结论保留其观察时间、来源和理由，避免把目录元数据误作运行保证或最终决策。
    en: “Can be discovered,” “is currently accessible,” “can satisfy the request,” and “should be selected” are different conclusions. A separate assessment activity preserves time, source, and rationale for each conclusion, avoiding the mistake of treating catalog metadata as a runtime guarantee or final decision.
    ja: 「発見できる」「現在 access できる」「request を満たせる」「選択すべき」は異なる conclusion である。独立した assessment activity は各 conclusion の time、source、rationale を保持し、catalog metadata を runtime guarantee や final decision と誤認することを避ける。
  includes:
    - zh: 对一个候选的可用性、资格、匹配和政策证据的检查与发现记录。
      en: Checks and finding records for one candidate's availability, eligibility, match, and policy evidence.
      ja: 一つの candidate の availability、eligibility、match、policy evidence の check と finding record。
    - zh: 不确定或拒绝结论，以及用于重新验证的来源对象引用。
      en: Indeterminate or negative conclusions and source-object references used for re-verification.
      ja: indeterminate または negative conclusion、および再検証に使う source-object reference。
  excludes:
    - zh: ToolSearch、ToolCandidateSet、工具执行、工具调用结果、候选排序和 ToolSelectionDecision。
      en: ToolSearch, ToolCandidateSet, tool execution, a tool-call result, candidate ranking, and ToolSelectionDecision.
      ja: ToolSearch、ToolCandidateSet、tool execution、tool-call result、candidate ranking、ToolSelectionDecision。
    - zh: 把 OpenAI 的 tool_choice 或 remote MCP 配置直接视为已完成的本地评估。
      en: Treating an OpenAI tool_choice or remote-MCP configuration directly as a completed local assessment.
      ja: OpenAI tool_choice または remote-MCP configuration を完成済みの local assessment と直接扱うこと。
  semantic_kind: activity
engineering:
  explanation:
    zh: 评估器读取候选的原生声明和当次会话/政策证据，生成有 assessment_id、candidate_ref、evidence_refs 和 finding_refs 的本地记录。OpenAI Responses 的 tool_choice 与 remote MCP allowed_tools 可作为配置或政策证据；它们不能证明服务实时可达，也不能替代本地选择决策。
    en: An assessor reads a candidate's native declaration and current session or policy evidence, then creates a local record with assessment_id, candidate_ref, evidence_refs, and finding_refs. OpenAI Responses tool_choice and remote-MCP allowed_tools may serve as configuration or policy evidence; they do not prove live server reachability or replace a local selection decision.
    ja: assessor は candidate の native declaration と current session または policy evidence を読み、assessment_id、candidate_ref、evidence_refs、finding_refs を持つ local record を作る。OpenAI Responses tool_choice と remote-MCP allowed_tools は configuration または policy evidence になり得るが、live server reachability を証明せず、local selection decision を置き換えない。
  typical_input:
    - description:
        zh: MCP 候选工具声明
        en: MCP candidate-tool declaration
        ja: MCP candidate-tool declaration
      format: |-
        {"name":"search-docs","description":"Search documentation","inputSchema":{"type":"object","properties":{"query":{"type":"string"}},"required":["query"]}}
      source_claims: [claim-assessment-mcp-schema]
    - description:
        zh: OpenAI 远程 MCP 配置
        en: OpenAI remote-MCP configuration
        ja: OpenAI remote-MCP configuration
      format: |-
        {"type":"mcp","server_label":"docs","server_url":"https://tools.example.test/mcp","allowed_tools":["search-docs"],"require_approval":"always"}
      source_claims: [claim-assessment-openai-config]
    - description:
        zh: OpenAI 工具选择约束
        en: OpenAI tool-choice constraint
        ja: OpenAI tool-choice constraint
      format: |-
        {"tool_choice":{"type":"allowed_tools","mode":"required","tools":[{"type":"mcp","server_label":"docs","name":"search-docs"}]}}
      source_claims: [claim-assessment-openai-config]
  typical_output:
    - description:
        zh: 本地候选评估记录
        en: Local candidate-assessment record
        ja: Local candidate-assessment record
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"tool_candidate_assessment","assessment_id":"assess-17","candidate_ref":"candidate:search-docs","task_requirement_ref":"task:42","assessment_scope":["availability","eligibility","match"],"evidence_refs":["mcp:docs/search-docs","openai:response-config/17"],"finding_refs":["availability:17","eligibility:17","match:17"]}
      source_claims: [claim-assessment-local]
  reference_implementations:
    - name: Model Context Protocol Tool declaration
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines tool metadata and input schemas that can be assessed for a task.
    - name: OpenAI Responses create reference
      url: https://developers.openai.com/api/reference/resources/responses/methods/create
      description: Defines tool_choice and remote MCP tool configuration including allowed-tools and approval controls.
structure:
  identity_keys: [assessment_id]
  fields:
    - id: assessment_id
      labels: {zh: 评估标识, en: Assessment identifier, ja: assessment 識別子}
      definitions:
        zh: 稳定标识一个本地候选评估活动，不替代协议请求 id、响应 id 或工具名称。
        en: Stably identifies one local candidate-assessment activity and does not replace a protocol request id, response id, or tool name.
        ja: 一つの local candidate-assessment activity を安定して識別し、protocol request id、response id、tool name を置き換えない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: assess-17
      source_claims: [claim-assessment-local]
    - id: candidate_ref
      labels: {zh: 候选引用, en: Candidate reference, ja: candidate 参照}
      definitions:
        zh: 指向本次被评估的一个 ToolCandidate，而非其来源协议对象的非受控复制。
        en: Points to the one ToolCandidate being assessed rather than an uncontrolled copy of its source protocol object.
        ja: assessment される一つの ToolCandidate を指し、その source protocol object の無制御な copy ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: candidate:search-docs
      source_claims: [claim-assessment-local]
    - id: task_requirement_ref
      labels: {zh: 任务需求引用, en: Task-requirement reference, ja: task requirement 参照}
      definitions:
        zh: 指向要满足的当前任务、用户要求或政策约束，使资格和匹配结论有明确语境。
        en: Points to the current task, user need, or policy constraint to be satisfied so eligibility and match conclusions have explicit context.
        ja: 満たすべき current task、user need、policy constraint を指し、eligibility と match conclusion に明示的な context を与える。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: task:42
      source_claims: [claim-assessment-local]
    - id: evidence_refs
      labels: {zh: 证据引用, en: Evidence references, ja: evidence 参照}
      definitions:
        zh: 指向用于评估的原生工具定义、AgentCard、会话配置、政策或观测记录；它们保留各自 schema。
        en: Points to native tool definitions, AgentCards, session configuration, policy, or observations used by the assessment; each retains its own schema.
        ja: assessment に使う native tool definition、AgentCard、session configuration、policy、observation を指す。各 object は独自の schema を保持する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: mcp:docs/search-docs
      source_claims: [claim-assessment-mcp-schema, claim-assessment-openai-config, claim-assessment-local]
  constraints:
    - id: assessment-distinguishes-evidence-from-decision
      severity: error
      expression_language: plain
      expression: A ToolCandidateAssessment must identify one candidate and task requirement, retain evidence_refs, and must not contain selected_candidate_ref, final_rank, tool_call, or tool_result fields.
      explanation:
        zh: 评估生成可审计证据；选择、排名与执行必须由独立概念表示。
        en: Assessment produces auditable evidence; selection, ranking, and execution must be represented by separate concepts.
        ja: assessment は監査可能な evidence を作る。selection、ranking、execution は別 concept で表さなければならない。
      source_claims: [claim-assessment-local]
    - id: assessment-config-is-not-liveness-proof
      severity: error
      expression_language: plain
      expression: A remote MCP configuration, allowed_tools list, or tool_choice constraint may be cited as configuration or policy evidence but cannot alone establish availability_state equals available.
      explanation:
        zh: 配置描述允许或要求哪些工具，不保证远端在评估时可达或批准已完成。
        en: Configuration describes which tools are allowed or required; it does not guarantee the remote server is reachable at assessment time or that approval completed.
        ja: configuration は許可または要求される tool を説明するが、assessment 時の remote server reachability や approval completion を保証しない。
      source_claims: [claim-assessment-openai-config, claim-assessment-local]
  required_relations: []
examples:
  - id: assessment-positive-separate-findings

    labels: {zh: 分离的候选评估发现, en: Separate candidate-assessment findings, ja: 分離された candidate-assessment finding}
    descriptions:
      zh: Toolformer (Schick 2023) 自监督判断何时插入 [Calculator(350/7)]/[Search(query)]；ToolBench DFSDT 在 16000+ RapidAPI 上 depth-first 工具选择；ART 从示例库检索多步推理模式。
      en: Toolformer (Schick 2023) self-supervised when-to-insert [Calculator(350/7)]/[Search(query)]; ToolBench DFSDT depth-first tool selection over 16000+ RapidAPI; ART retrieves multi-step reasoning patterns from task demos.
      ja: Toolformer (Schick 2023) 自己教師あり [Calculator(350/7)]/[Search(query)] 挿入判断。ToolBench DFSDT が 16000+ RapidAPI で depth-first tool 選択。ART が task demo から多段 reasoning pattern を检索。
    field_values: {assessment_id: assess-17, candidate_ref: candidate:search-docs, task_requirement_ref: task:42, evidence_refs: [mcp:docs/search-docs, openai:response-config/17], finding_refs: [availability:17, eligibility:17, match:17]}
    related_node_ids: [ToolCandidateAssessment, ToolAvailabilityAssessment, ToolEligibilityAssessment, ToolMatch]
    related_relation_ids: [ToolCandidateAssessment-part-of-ToolSelectionActivity]

    source_claims: [claim-assessment-mcp-schema, claim-assessment-openai-config, claim-assessment-local]
  - id: assessment-counterexample-selects-tool

    labels: {zh: 评估记录直接选择工具, en: Assessment record directly selects a tool, ja: assessment record が tool を直接選択する}
    descriptions:
      zh: 反例：未执行 ToolBench API 检索或 Gorilla retriever 就假定工具可用；违反 Toolformer 自监督「仅在 API 调用改善 loss 时插入」准则。
      en: Counterexample: assuming tool availability without ToolBench API search or Gorilla retriever; violates Toolformer self-supervised criterion of inserting only when API call improves loss.
      ja: 反例：ToolBench API 检索や Gorilla retriever なしで tool 可用性を仮定。Toolformer 自己教師あり「API 呼出しが loss 改善時のみ挿入」准则違反。
    field_values: {assessment_id: assess-18, candidate_ref: candidate:search-docs, task_requirement_ref: task:43, evidence_refs: [mcp:docs/search-docs], selected_candidate_ref: candidate:search-docs, tool_call_arguments: {query: policy}}
    related_node_ids: [ToolCandidateAssessment, ToolSelectionDecision]
    related_relation_ids: []

    source_claims: [claim-assessment-local]
  - id: assessment-boundary-openai-tool-choice

    labels: {zh: OpenAI 工具选择配置边界, en: OpenAI tool-choice configuration boundary, ja: OpenAI tool-choice configuration の境界}
    descriptions:
      zh: Toolformer 训练时 API 调用标记 vs ToolBench/Gorilla 运行时 capability discovery 的方法论边界；本地 ToolSelectionDecision 非 wire tool_choice。
      en: Methodological boundary between Toolformer training-time API markers vs ToolBench/Gorilla runtime capability discovery; local ToolSelectionDecision is not wire tool_choice.
      ja: Toolformer 訓練時 API marker と ToolBench/Gorilla ランタイム capability discovery の方法論境界。ローカル ToolSelectionDecision は wire tool_choice ではない。
    field_values: {assessment_id: assess-19, candidate_ref: candidate:search-docs, task_requirement_ref: task:44, evidence_refs: [openai:response-config/19], configured_tool_choice: required}
    related_node_ids: [ToolCandidateAssessment, ToolAvailabilityAssessment, ToolEligibilityAssessment]
    related_relation_ids: [ToolCandidateAssessment-part-of-ToolSelectionActivity]

    source_claims: [claim-assessment-openai-config, claim-assessment-local]
  - id: assessment-instance-ineligible-schema

    labels: {zh: schema 不支持的评估实例, en: Schema-incompatible assessment instance, ja: schema-incompatible assessment instance}
    descriptions:
      zh: ToolBench ToolLLM 实例：query="book a flight"→DFSDT 选择 RapidAPI flights/search；Gorilla retriever 返回 HuggingFace transformers.pipeline API 文档 top-3。
      en: ToolBench ToolLLM instance: query="book a flight"→DFSDT selects RapidAPI flights/search; Gorilla retriever returns HuggingFace transformers.pipeline API docs top-3.
      ja: ToolBench ToolLLM 実例：query="book a flight"→DFSDT が RapidAPI flights/search を選択。Gorilla retriever が HuggingFace transformers.pipeline API 文档 top-3 を返す。
    field_values: {assessment_id: assess-20, candidate_ref: candidate:search-docs, task_requirement_ref: task:45, evidence_refs: [mcp:docs/search-docs], finding_refs: [eligibility:20], eligibility_state: ineligible}
    related_node_ids: [ToolCandidateAssessment, ToolEligibilityAssessment]
    related_relation_ids: [ToolCandidateAssessment-part-of-ToolSelectionActivity]

    source_claims: [claim-assessment-mcp-schema, claim-assessment-local]
parent_relation:
  id: ToolCandidateAssessment-part-of-ToolSelectionActivity
  predicate: part_of
  target: concept:ToolSelectionActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是工具选择的评估步骤, en: is an assessment step of tool selection, ja: tool selection の評価段階である}
  definitions:
    zh: ToolCandidateAssessment 为 ToolSelectionActivity 提供候选证据和 finding，但不等同于其最后的选择决策。
    en: ToolCandidateAssessment provides candidate evidence and findings to ToolSelectionActivity but is not its final selection decision.
    ja: ToolCandidateAssessment は ToolSelectionActivity に candidate evidence と finding を提供するが、その final selection decision ではない。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_part
    labels: {zh: 包含候选评估, en: has candidate assessment, ja: candidate assessment を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: This Moonweave composition distinguishes evaluation evidence from a protocol tool_choice request, a selection decision, and tool execution.
  constraints: []
  examples: []
  source_claims: [claim-assessment-local]
  distinct_fact_rationale:
    zh: 该关系表达选择活动中的证据收集步骤，而不是候选与被选工具之间的关系。
    en: This relation expresses the evidence-gathering step within selection, not a relation between a candidate and a selected tool.
    ja: この relation は selection 内の evidence-gathering step を表し、candidate と selected tool の relation を表さない。
  layout_role: primary-backbone
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol — Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-spec
    relevance: Defines Tool declarations, input schemas, and their discovery boundary.
  - id: openai-responses-create-reference
    title: OpenAI API — Responses create reference
    url: https://developers.openai.com/api/reference/resources/responses/methods/create
    source_type: official-doc
    relevance: Defines Responses tool_choice and remote MCP configuration, allowed-tools, and approval parameters.
source_claims:
  - id: claim-assessment-mcp-schema
    source: mcp-tools-2025-11-25
    supports: An MCP Tool declaration has a name, description, required inputSchema, and optional output schema, annotations, and execution metadata; tools/list discovers declarations rather than proving a call succeeds.
    locator: Tools — Tool definition and Listing Tools
    evidence_kind: normative
    confidence: high
  - id: claim-assessment-openai-config
    source: openai-responses-create-reference
    supports: OpenAI Responses supports tool_choice modes and remote MCP tool configuration with server_label, server_url or connector_id, allowed_tools, and require_approval controls.
    locator: Request body — tool_choice and MCP tool configuration
    evidence_kind: normative
    confidence: high
  - id: claim-assessment-local
    source: openai-responses-create-reference
    supports: assessment_id, candidate_ref, task_requirement_ref, evidence_refs, finding_refs, and the separation of availability, eligibility, match, selection, and execution are Moonweave-local assessment design inferences over native protocol evidence.
    locator: Request body — tool_choice and MCP tool configuration
    evidence_kind: design-inference
    confidence: high
