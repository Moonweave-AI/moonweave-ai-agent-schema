schema: moonweave.ai/ontology-node/v1
id: ToolCandidateAssessment
kind: concept
status: accepted
labels:
  zh: 工具候选评估
  en: Tool candidate assessment
  ja: ツール候補評価
semantics:
  short_definition:
    zh: 工具候选评估记录一个候选相对于一版检索查询的可审计判断。
    en: A tool candidate assessment records an auditable judgment about one candidate against one search-query version.
    ja: ツール候補評価は一つの candidate を一つの search-query version に対して行った監査可能な judgment を記録します。
  definition:
    zh: 工具候选评估是一类信息对象，把被评候选、查询版本、评估维度、证据和结论绑定在一起；ToolMatch、ToolEligibilityAssessment 与 ToolAvailabilityAssessment 是互补子类，任一单项都不能代替完整选择。
    en: A tool candidate assessment is an information object binding the assessed candidate, query version, dimension, evidence, and conclusion; ToolMatch, ToolEligibilityAssessment, and ToolAvailabilityAssessment are complementary subtypes, and no single dimension substitutes for selection.
    ja: ツール候補評価は assessed candidate・query version・dimension・evidence・conclusion を結合する information object です。ToolMatch・ToolEligibilityAssessment・ToolAvailabilityAssessment は補完的 subtype で、単一 dimension は selection を代替しません。
  why_needed:
    zh: 该上位层把“评估证据”和“选择决定”分开，并让能力匹配、硬约束与时点可用性拥有清楚的同级边界。
    en: This parent separates assessment evidence from selection decisions and gives capability fit, hard eligibility, and point-in-time availability clear sibling boundaries.
    ja: この parent は assessment evidence を selection decision から分離し、capability fit・hard eligibility・point-in-time availability に明確な sibling boundary を与えます。
  includes:
    - zh: 带 assessment_id、candidate_id、query_version、评估维度、证据引用和结论的记录。
      en: Records with assessment_id, candidate_id, query_version, assessment dimension, evidence references, and conclusion.
      ja: assessment_id・candidate_id・query_version・assessment dimension・evidence references・conclusion を持つ record。
  excludes:
    - zh: 不带候选或查询版本的通用评分，以及已经承诺选择结果的 ToolSelectionDecision。
      en: Generic scores without candidate or query version, and ToolSelectionDecision records that commit a choice.
      ja: candidate/query version を欠く generic score と、choice を確定する ToolSelectionDecision record。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - assessment_id
  fields:
    - id: assessment_id
      labels:
        zh: 评估标识
        en: assessment ID
        ja: 評価 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一个候选的一个评估维度。
        en: Uniquely identifies one assessment dimension for one candidate.
        ja: 一 candidate の一 assessment dimension を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: assessment-read-file-fit
      source_claims:
        - claim-tool-candidate-assessment-001
    - id: query_version
      labels:
        zh: 查询版本
        en: query version
        ja: クエリ版
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 结论成立所依据的查询版本。
        en: Query version for which the conclusion remains valid.
        ja: conclusion が有効な query version です。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-tool-candidate-assessment-001
    - id: evidence_refs
      labels:
        zh: 证据引用
        en: evidence references
        ja: 証拠参照
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用支持本项评估结论的工具定义字段、运行观测或策略结果，不能只保存无来源分数。
        en: References the definition fields, runtime observations, or policy results supporting this assessment instead of storing an unsupported score.
        ja: 根拠のない score ではなく、assessment を支える definition fields・runtime observations・policy results を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - tool-def:read-file@18#input_schema
        - tool-def:read-file@18#result_schema
      source_claims:
        - claim-tool-candidate-assessment-002
    - id: conclusion
      labels:
        zh: 评估结论
        en: assessment conclusion
        ja: 評価結論
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录通过、不通过或证据不足，不用缺省值冒充通过。
        en: Records pass, fail, or insufficient evidence; absence is never treated as pass.
        ja: pass・fail・insufficient evidence を記録し、absence を pass と扱いません。
      allowed_values:
        - id: ToolCandidateAssessmentPass
          value: pass
          labels:
            zh: 通过
            en: pass
            ja: 合格
          definitions:
            zh: 针对声明的评估维度和查询版本，当前证据满足全部必需条件；通过仅适用于该次评估，不替代最终选择。
            en: For the declared assessment dimension and query version, current evidence satisfies every required condition; pass applies only to this assessment and does not replace final selection.
            ja: declared assessment dimension と query version に対して current evidence が required conditions を満たす結論で、final selection を代替しません。
          status: accepted
          source_claims:
            - claim-tool-candidate-assessment-003
        - id: ToolCandidateAssessmentFail
          value: fail
          labels:
            zh: 不通过
            en: fail
            ja: 不合格
          definitions:
            zh: 当前证据明确违反该评估维度的一项必需条件；结论必须指明失败条件，不能由缺少证据推断。
            en: Current evidence explicitly violates a required condition of the assessed dimension; the failed condition must be identified and cannot be inferred merely from missing evidence.
            ja: current evidence が assessed dimension の required condition に明示的に違反し、failed condition を特定する必要があり、missing evidence だけから推定しません。
          status: accepted
          source_claims:
            - claim-tool-candidate-assessment-004
        - id: ToolCandidateAssessmentInsufficientEvidence
          value: insufficient-evidence
          labels:
            zh: 证据不足
            en: insufficient evidence
            ja: 証拠不足
          definitions:
            zh: 证据缺失、过期或无法归属于同一查询版本，因而既不能判定通过，也不能判定不通过。
            en: Evidence is missing, stale, or cannot be attributed to the same query version, so neither pass nor fail can be concluded.
            ja: evidence が missing・stale、または同一 query version に帰属できず、pass/fail のどちらも結論できません。
          status: accepted
          source_claims:
            - claim-tool-candidate-assessment-005
      pattern: null
      example_value: pass
      source_claims:
        - claim-tool-candidate-assessment-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: ToolCandidateAssessment-example-positive-manual-001
    kind: positive
    labels:
      zh: 工具候选评估正例
      en: Positive case for Tool candidate assessment
      ja: ツール候補評価の正例
    scenario_id: null
    descriptions:
      zh: assessment-read-file-fit 将 candidate-read-file、query version 2、文件读取能力证据和 pass 结论绑定，并保留具体 ToolMatch 子类。
      en: assessment-read-file-fit binds candidate-read-file, query version 2, file-reading evidence, and a pass conclusion, while retaining the concrete ToolMatch subtype.
      ja: assessment-read-file-fit は candidate-read-file・query version 2・file-reading evidence・pass conclusion を結合し、具体 ToolMatch subtype を保持します。
    field_values:
      assessment_id: assessment-read-file-fit
      query_version: 2
      evidence_refs:
        - tool-def:read-file@18#input_schema
        - tool-def:read-file@18#result_schema
      conclusion: pass
    related_node_ids:
      - ToolCandidateAssessment
      - ToolMatch
      - ToolCandidate
      - ToolSearchQuery
    related_relation_ids:
      - ToolCandidateAssessment-assesses-ToolCandidate
      - ToolCandidateAssessment-evaluates_against-ToolSearchQuery
    expected_result:
      zh: 评估可追溯到唯一候选和查询版本，且维度子类明确。
      en: The assessment traces to one candidate and query version and has an explicit dimension subtype.
      ja: assessment は一 candidate と query version に追跡でき、dimension subtype が明示されます。
    why_valid_or_invalid:
      zh: 身份、证据对象和结论同时存在，足以供选择活动消费而不等同于选择。
      en: Identity, evidence object, and conclusion are all present, making the record consumable by selection without becoming a decision.
      ja: identity・evidence object・conclusion が揃い、selection が消費できても decision にはなりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-candidate-assessment-001
  - id: ToolCandidateAssessment-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 工具候选评估边界例
      en: Boundary case for Tool candidate assessment
      ja: ツール候補評価の境界例
    scenario_id: null
    descriptions:
      zh: “read_file 看起来不错”没有 candidate_id、query_version、评估维度或证据，只是非结构化意见，不是 ToolCandidateAssessment。
      en: “read_file looks good” lacks candidate_id, query_version, assessment dimension, and evidence; it is an unstructured opinion, not ToolCandidateAssessment.
      ja: 『read_file は良さそう』は candidate_id・query_version・assessment dimension・evidence を欠く非構造化 opinion で、ToolCandidateAssessment ではありません。
    field_values:
      assessment_id: opinion-read-file
      query_version: 0
      conclusion: insufficient-evidence
    related_node_ids:
      - ToolCandidateAssessment
      - ToolCandidate
    related_relation_ids: []
    expected_result:
      zh: 验证器要求明确维度、候选和查询版本，不能从自然语言赞许推断通过。
      en: Validation requires dimension, candidate, and query version and cannot infer pass from casual approval.
      ja: validation は dimension・candidate・query version を要求し、casual approval から pass を推論しません。
    why_valid_or_invalid:
      zh: 无绑定的赞许既不能复查，也会在查询改变后留下错误结论。
      en: Unbound approval is neither reviewable nor safe from becoming stale after a query change.
      ja: unbound approval は review 不能で、query change 後に stale conclusion となります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-candidate-assessment-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ToolSelectionActivity-considers-ToolCandidateAssessment
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 考虑候选评估
    en: considers candidate assessment
    ja: 候補評価を考慮する
  definitions:
    zh: ToolSelectionActivity considers 每个候选的能力匹配、资格和时点可用性评估，且仅使用与当前 query_version 一致的证据。
    en: ToolSelectionActivity considers capability fit, eligibility, and point-in-time availability for every candidate using only evidence matching the current query version.
    ja: ToolSelectionActivity は各 candidate の capability fit・eligibility・point-in-time availability を considers し current query_version と一致する evidence だけを使います。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数由具体查询、候选集合和运行策略决定。
    en: Cardinality depends on the concrete query, candidate set, and runtime policy.
    ja: cardinality は具体 query・candidate set・runtime policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：考虑候选评估
      en: inverse of considers candidate assessment
      ja: 逆：候補評価を考慮する
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ToolSelectionActivity-considers-ToolCandidateAssessment-example-positive-manual-001
      kind: positive
      labels:
        zh: 考虑候选评估正例
        en: Positive case for considers candidate assessment
        ja: 候補評価を考慮するの正例
      scenario_id: null
      descriptions:
        zh: 选择活动对三个候选各读取三类评估，并拒绝 query version 1 的过期可用性记录。
        en: The activity reads all three assessment dimensions for three candidates and rejects an expired availability record from query version 1.
        ja: activity は三 candidates の三 assessment dimensions を読み query version 1 の expired availability record を拒否します。
      field_values: {}
      related_node_ids:
        - ToolSelectionActivity
        - ToolCandidateAssessment
      related_relation_ids:
        - ToolSelectionActivity-considers-ToolCandidateAssessment
      expected_result:
        zh: 图谱保留 ToolSelectionActivity-considers-ToolCandidateAssessment，并保持 ToolSelectionActivity 到 ToolCandidateAssessment 的方向。
        en: The graph retains ToolSelectionActivity-considers-ToolCandidateAssessment with direction ToolSelectionActivity to ToolCandidateAssessment.
        ja: graph は ToolSelectionActivity-considers-ToolCandidateAssessment を ToolSelectionActivity から ToolCandidateAssessment の方向で保持します。
      why_valid_or_invalid:
        zh: 场景给出了 considers 成立所需的独立业务事实，而非仅有两个端点。
        en: The case supplies the independent domain fact required by considers, not merely the two endpoints.
        ja: case は二 endpoint だけでなく considers に必要な independent domain fact を示します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-candidate-assessment-006
    - id: ToolSelectionActivity-considers-ToolCandidateAssessment-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 考虑候选评估边界例
        en: Boundary case for considers candidate assessment
        ja: 候補評価を考慮するの境界例
      scenario_id: null
      descriptions:
        zh: 决定理由引用了未绑定候选的全局 embedding 分数；该数值不是 ToolCandidateAssessment，不能建立 considers。
        en: The rationale cites a global embedding score not bound to a candidate; that value is not ToolCandidateAssessment and cannot support considers.
        ja: rationale が candidate に bind されない global embedding score を引用しても ToolCandidateAssessment でなく considers を支えません。
      field_values: {}
      related_node_ids:
        - ToolSelectionActivity
        - ToolCandidateAssessment
      related_relation_ids:
        - ToolSelectionActivity-considers-ToolCandidateAssessment
      expected_result:
        zh: 验证器不得从名称相似、邻接或反向事实推断 ToolSelectionActivity-considers-ToolCandidateAssessment。
        en: Validation must not infer ToolSelectionActivity-considers-ToolCandidateAssessment from name similarity, adjacency, or a reversed fact.
        ja: validation は name similarity・adjacency・reversed fact から ToolSelectionActivity-considers-ToolCandidateAssessment を推論してはいけません。
      why_valid_or_invalid:
        zh: considers 的方向和成立条件未满足，因此该边不能进入 accepted 图。
        en: The direction or truth conditions of considers are absent, so the edge cannot enter the accepted graph.
        ja: considers の direction または truth conditions がなく edge は accepted graph に入りません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-candidate-assessment-006
  source_claims:
    - claim-tool-candidate-assessment-006
  distinct_fact_rationale:
    zh: 证据消费边使选择理由可重算，并阻止算法分数直接成为图谱层级。
    en: The evidence-consumption edge makes rationale recomputable and prevents an algorithm score from becoming an ontology level.
    ja: evidence-consumption edge は rationale を再計算可能にし algorithm score が ontology level になるのを防ぎます。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
