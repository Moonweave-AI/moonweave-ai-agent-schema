schema: moonweave.ai/ontology-node/v1
id: ToolMatch
kind: concept
status: accepted
labels:
  zh: 工具能力匹配评估
  en: Tool capability-fit assessment
  ja: ツール能力適合評価
semantics:
  short_definition:
    zh: 工具能力匹配评估判断候选声明的能力是否覆盖查询任务意图。
    en: A tool capability-fit assessment judges whether a candidate's declared capability covers the query intent.
    ja: ツール能力適合評価は candidate の declared capability が query intent を覆うか判断します。
  definition:
    zh: 工具能力匹配评估是一种 ToolCandidateAssessment，只比较 ToolDefinition 的功能语义、输入输出契约与 ToolSearchQuery 的任务需求；它不判断当前是否可达，也不替代权限和副作用资格检查。
    en: A tool capability-fit assessment is a ToolCandidateAssessment that compares the functional semantics and input/output contract of a ToolDefinition with the task requirements in ToolSearchQuery; it does not establish current reachability or replace authority and side-effect eligibility checks.
    ja: ツール能力適合評価は ToolCandidateAssessment の一種で、ToolDefinition の functional semantics・input/output contract と ToolSearchQuery の task requirements を比較します。current reachability や authority/side-effect eligibility は判断しません。
  why_needed:
    zh: 该节点把语义适配从正则命中、向量算法品牌和运行可用性中抽离，使匹配结论描述“能否完成任务”而非“算法如何召回”。
    en: This node separates semantic fit from regex hits, embedding implementation, and runtime availability, so the conclusion states whether the tool can do the job rather than how it was retrieved.
    ja: この node は semantic fit を regex hit・embedding implementation・runtime availability から分離し、retrieval method ではなく tool が task を実行できるかを表します。
  includes:
    - zh: 对功能描述、参数契约、输出语义和任务所需能力逐项比对的证据记录。
      en: Evidence records comparing functional description, parameter contract, output semantics, and required capabilities criterion by criterion.
      ja: functional description・parameter contract・output semantics・required capabilities を criterion ごとに比較する evidence record。
  excludes:
    - zh: 仅名称或正则命中、仅向量相似度、当前网络可达性和权限授权结果。
      en: Name or regex hits alone, embedding similarity alone, current network reachability, and authorization outcomes.
      ja: name/regex hit のみ、embedding similarity のみ、current network reachability、authorization outcome。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: matched_requirements
      labels:
        zh: 已匹配需求
        en: matched requirements
        ja: 適合要件
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: ToolDefinition 明确覆盖的查询需求清单。
        en: Query requirements explicitly covered by the ToolDefinition.
        ja: ToolDefinition が明示的に覆う query requirements の一覧です。
      allowed_values: []
      pattern: null
      example_value:
        - read repository files
        - return exact line ranges
      source_claims:
        - claim-tool-match-001
    - id: unmet_requirements
      labels:
        zh: 未满足需求
        en: unmet requirements
        ja: 未充足要件
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 定义契约未覆盖或证据不足的查询需求。
        en: Query requirements not covered by the definition contract or lacking evidence.
        ja: definition contract が覆わない、または evidence 不足の query requirements です。
      allowed_values: []
      pattern: null
      example_value: []
      source_claims:
        - claim-tool-match-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: ToolMatch-example-positive-manual-001
    kind: positive
    labels:
      zh: 工具能力匹配评估正例
      en: Positive case for Tool capability-fit assessment
      ja: ツール能力適合評価の正例
    scenario_id: null
    descriptions:
      zh: read_file 定义明确接受 workspace 路径并返回带行号文本，覆盖查询的读取和精确定位需求；未满足需求为空。
      en: The read_file definition accepts a workspace path and returns line-numbered text, covering both reading and precise-location requirements; unmet requirements are empty.
      ja: read_file definition は workspace path を受け line-numbered text を返し、reading と precise-location requirements を覆い、unmet requirements は空です。
    field_values:
      assessment_id: assessment-read-file-fit
      query_version: 2
      evidence_refs:
        - tool-def:read-file@18#input_schema
        - tool-def:read-file@18#result_schema
      conclusion: pass
      matched_requirements:
        - read repository files
        - return exact line ranges
      unmet_requirements: []
    related_node_ids:
      - ToolMatch
      - ToolCandidateAssessment
      - ToolCandidate
      - ToolDefinition
      - ToolSearchQuery
    related_relation_ids:
      - ToolCandidateAssessment-assesses-ToolCandidate
      - ToolCandidateAssessment-evaluates_against-ToolSearchQuery
    expected_result:
      zh: 匹配结论为 pass，并逐项列出定义契约覆盖的查询需求。
      en: The fit conclusion is pass with criterion-by-criterion coverage from the definition contract.
      ja: fit conclusion は pass で、definition contract による criterion-by-criterion coverage を示します。
    why_valid_or_invalid:
      zh: 能力和输入输出契约均有直接证据，且没有混入可用性或权限结论。
      en: Capability and input/output contract have direct evidence without mixing availability or authorization conclusions.
      ja: capability と input/output contract に直接 evidence があり、availability/authorization conclusion を混ぜません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-match-001
  - id: ToolMatch-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 工具能力匹配评估边界例
      en: Boundary case for Tool capability-fit assessment
      ja: ツール能力適合評価の境界例
    scenario_id: null
    descriptions:
      zh: 名为 read_everything 的工具与查询词高度相似，但定义只返回缓存摘要且不保证行号；名称相似不能形成 pass 的 ToolMatch。
      en: A tool named read_everything is lexically similar to the query, but its definition returns only cached summaries without line guarantees; name similarity cannot yield a passing ToolMatch.
      ja: read_everything という tool は query と字面上似ていますが、definition は cached summary のみを返し line guarantee がなく、name similarity では passing ToolMatch になりません。
    field_values:
      matched_requirements:
        - read repository files
      unmet_requirements:
        - return exact line ranges
    related_node_ids:
      - ToolMatch
      - ToolCandidateAssessment
      - ToolDefinition
      - ToolSearchQuery
    related_relation_ids:
      - ToolCandidateAssessment-evaluates_against-ToolSearchQuery
    expected_result:
      zh: 结论为 fail 或不足，不得由名称、正则或单一向量分数覆盖缺失契约。
      en: The conclusion is fail or insufficient; name, regex, or one embedding score cannot override the missing contract.
      ja: conclusion は fail または insufficient で、name・regex・単一 embedding score は missing contract を上書きできません。
    why_valid_or_invalid:
      zh: 任务需求要求精确行范围，而候选定义没有作出该能力承诺。
      en: The task requires exact line ranges, which the candidate definition does not promise.
      ja: task は exact line ranges を要求しますが candidate definition はその capability を約束していません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-match-001
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ToolEligibilityAssessment
    shared_parent_concept_id: ToolCandidateAssessment
    differentia:
      zh: ToolMatch 与 ToolEligibilityAssessment 同属 ToolCandidateAssessment；ToolMatch 比较功能契约与任务需求，ToolEligibilityAssessment 判断硬性环境、权限和副作用限制。
      en: ToolMatch and ToolEligibilityAssessment share ToolCandidateAssessment; ToolMatch compares functional contract with task need, whereas ToolEligibilityAssessment decides hard environment, authority, and side-effect constraints.
      ja: ToolMatch と ToolEligibilityAssessment は ToolCandidateAssessment を共有し、ToolMatch は functional contract と task need、ToolEligibilityAssessment は hard environment・authority・side-effect constraints を判断します。
    source_claims:
      - claim-tool-match-002
parent_relation:
  id: ToolMatch-is_a-ToolCandidateAssessment
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: ToolMatch 是 ToolCandidateAssessment 的严格子类；其区分条件是：只评估定义契约与任务需求的能力适配，不判断权限或时点可用性。
    en: "ToolMatch is a strict subtype of ToolCandidateAssessment; its differentia is: it evaluates definition-contract fit to task requirements without deciding authority or point-in-time availability."
    ja: ToolMatch は ToolCandidateAssessment の厳密な subtype で、種差は次の通りです：definition-contract fit と task requirements だけを評価し authority や point-in-time availability は判断しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数由具体查询、候选集合和运行策略决定。
    en: Cardinality depends on the concrete query, candidate set, and runtime policy.
    ja: cardinality は具体 query・candidate set・runtime policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ToolMatch-is_a-ToolCandidateAssessment-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive case for is a
        ja: の一種の正例
      scenario_id: null
      descriptions:
        zh: 记录同时满足 ToolCandidateAssessment 的上位定义和 ToolMatch 的完整种差：只评估定义契约与任务需求的能力适配，不判断权限或时点可用性。
        en: "The record satisfies both the parent definition of ToolCandidateAssessment and the complete differentia of ToolMatch: it evaluates definition-contract fit to task requirements without deciding authority or point-in-time availability."
        ja: record は ToolCandidateAssessment の上位 definition と ToolMatch の完全な種差を満たします：definition-contract fit と task requirements だけを評価し authority や point-in-time availability は判断しません。
      field_values: {}
      related_node_ids:
        - ToolMatch
        - ToolCandidateAssessment
      related_relation_ids:
        - ToolMatch-is_a-ToolCandidateAssessment
      expected_result:
        zh: 验证器将该记录归为 ToolMatch，并通过 is_a 继承 ToolCandidateAssessment 的约束。
        en: Validation classifies the record as ToolMatch and inherits ToolCandidateAssessment constraints through is_a.
        ja: validation は record を ToolMatch と分類し is_a により ToolCandidateAssessment constraints を継承します。
      why_valid_or_invalid:
        zh: 完整种差而非名称前缀证明了 ToolMatch 的成员资格。
        en: The complete differentia, not a shared name prefix, proves membership in ToolMatch.
        ja: shared name prefix ではなく完全な種差が ToolMatch membership を証明します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-match-003
    - id: ToolMatch-is_a-ToolCandidateAssessment-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種の境界例
      scenario_id: null
      descriptions:
        zh: 对象只满足 ToolCandidateAssessment 的一般条件，却缺少 ToolMatch 的关键种差：只评估定义契约与任务需求的能力适配，不判断权限或时点可用性。
        en: "The object satisfies only the general conditions of ToolCandidateAssessment and lacks the defining differentia of ToolMatch: it evaluates definition-contract fit to task requirements without deciding authority or point-in-time availability."
        ja: object は ToolCandidateAssessment の一般条件だけを満たし ToolMatch の種差を欠きます：definition-contract fit と task requirements だけを評価し authority や point-in-time availability は判断しません。
      field_values: {}
      related_node_ids:
        - ToolMatch
        - ToolCandidateAssessment
      related_relation_ids:
        - ToolMatch-is_a-ToolCandidateAssessment
      expected_result:
        zh: 验证器保留 ToolCandidateAssessment 身份，不把该对象提升为 ToolMatch。
        en: Validation retains ToolCandidateAssessment identity and does not promote the object to ToolMatch.
        ja: validation は ToolCandidateAssessment identity を保持し object を ToolMatch に昇格しません。
      why_valid_or_invalid:
        zh: 共享上位概念不足以证明 ToolMatch 的严格成员资格。
        en: A shared parent is insufficient to prove strict membership in ToolMatch.
        ja: shared parent だけでは ToolMatch の strict membership を証明できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-match-003
  source_claims:
    - claim-tool-match-003
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
