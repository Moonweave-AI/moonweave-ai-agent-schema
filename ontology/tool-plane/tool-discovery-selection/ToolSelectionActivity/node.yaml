schema: moonweave.ai/ontology-node/v1
id: ToolSelectionActivity
kind: concept
status: review
labels:
  zh: 工具选择活动
  en: Tool selection activity
  ja: ツール選択活動
semantics:
  short_definition:
    zh: 工具选择活动消费候选集和评估证据，产出选择决定或澄清请求。
    en: A tool selection activity consumes a candidate set and assessment evidence to produce a decision or clarification request.
    ja: ツール選択活動は candidate set と assessment evidence を消費し selection decision または clarification request を生成します。
  definition:
    zh: 工具选择活动是一类运行期活动，它在同一查询版本内检查候选完备性、能力匹配、硬性资格和时点可用性，然后产出 ToolSelectionDecision；若证据不足或候选无法唯一判定，则请求 ToolClarificationRequest，而不是臆造选择。
    en: A tool selection activity is a runtime activity that checks candidate completeness, capability fit, hard eligibility, and point-in-time availability under one query version, then produces ToolSelectionDecision; when evidence is insufficient or no unique choice is justified, it requests ToolClarificationRequest instead of fabricating a choice.
    ja: ツール選択活動は同一 query version で candidate completeness・capability fit・hard eligibility・point-in-time availability を確認し ToolSelectionDecision を生成する runtime activity です。evidence 不足または一意 choice が正当化できない場合は、選択を捏造せず ToolClarificationRequest を要求します。
  why_needed:
    zh: 活动节点把“进行比较的过程”与“比较后留下的决定记录”分开，并为无决定的合法结果保留位置。
    en: The activity separates the comparison process from the resulting decision record and leaves room for a legitimate no-decision outcome.
    ja: activity node は comparison process と結果 decision record を分け、正当な no-decision outcome の位置を確保します。
  includes:
    - zh: 消费一份 ToolCandidateSet 和对应 ToolCandidateAssessment，应用声明的决策规则并记录输出的活动。
      en: Activities that consume one ToolCandidateSet and its ToolCandidateAssessment records, apply a declared decision rule, and record the output.
      ja: 一つの ToolCandidateSet と対応 ToolCandidateAssessment を消費し、declared decision rule を適用して output を記録する活動。
  excludes:
    - zh: 候选检索、模型已经发出的 ToolCall，以及只保存结果而不表示活动的 ToolSelectionDecision。
      en: Candidate retrieval, an already emitted ToolCall, and ToolSelectionDecision as a result record rather than an activity.
      ja: candidate retrieval、既に発行された ToolCall、活動ではなく結果 record である ToolSelectionDecision。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - selection_activity_id
  fields:
    - id: selection_activity_id
      labels:
        zh: 选择活动标识
        en: selection activity ID
        ja: 選択活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次候选比较活动。
        en: Uniquely identifies one candidate-comparison activity.
        ja: 一回の candidate-comparison activity を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: select-tool-042
      source_claims:
        - claim-tool-selection-activity-001
    - id: decision_rule
      labels:
        zh: 决策规则
        en: decision rule
        ja: 判断規則
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明硬约束优先级、比较维度和确定性平局处理。
        en: States hard-constraint precedence, comparison dimensions, and deterministic tie handling.
        ja: hard-constraint precedence・comparison dimensions・deterministic tie handling を記述します。
      allowed_values: []
      pattern: null
      example_value: eligible AND available, then highest complete capability coverage, tie -> clarification
      source_claims:
        - claim-tool-selection-activity-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: ToolSelectionActivity-example-positive-manual-001
    kind: positive
    labels:
      zh: 工具选择活动正例
      en: Positive case for Tool selection activity
      ja: ツール選択活動の正例
    scenario_id: null
    descriptions:
      zh: select-tool-042 消费三个候选及其能力、资格和可用性评估，先淘汰硬约束失败项，再选择能力覆盖完整且当前可用的 read_file。
      en: select-tool-042 consumes three candidates and their fit, eligibility, and availability assessments, removes hard-constraint failures first, then chooses the available read_file candidate with complete coverage.
      ja: select-tool-042 は三 candidates と fit・eligibility・availability assessments を消費し、hard-constraint failures を先に除外して完全 coverage かつ available な read_file を選びます。
    field_values:
      selection_activity_id: select-tool-042
      decision_rule: eligible AND available, then highest complete capability coverage, tie -> clarification
    related_node_ids:
      - ToolSelectionActivity
      - ToolCandidateSet
      - ToolCandidateAssessment
      - ToolSelectionDecision
    related_relation_ids:
      - ToolSelectionActivity-consumes-ToolCandidateSet
      - ToolSelectionActivity-considers-ToolCandidateAssessment
      - ToolSelectionActivity-produces-ToolSelectionDecision
    expected_result:
      zh: 所有被比较候选都有完整评估，硬约束优先于软排序，输出一个可审计决定。
      en: Every compared candidate has complete assessments, hard constraints precede soft ranking, and one auditable decision is produced.
      ja: 比較対象全 candidate に complete assessments があり、hard constraints が soft ranking に優先し、一つの auditable decision が生成されます。
    why_valid_or_invalid:
      zh: 输入、规则和输出身份均明确，能够重放选择而不会把活动与决定混为一体。
      en: Inputs, rule, and output identity are explicit, so the choice is replayable without conflating activity and decision.
      ja: input・rule・output identity が明示され、activity と decision を混同せず choice を replay できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-selection-activity-001
  - id: ToolSelectionActivity-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 工具选择活动边界例
      en: Boundary case for Tool selection activity
      ja: ツール選択活動の境界例
    scenario_id: null
    descriptions:
      zh: 模型仅因 read_file 排在列表首位就选择它，既没有其他候选评估也没有声明规则；这不是可审计的 ToolSelectionActivity。
      en: The model chooses read_file solely because it appears first, with no assessments for alternatives and no declared rule; this is not an auditable ToolSelectionActivity.
      ja: model が read_file を list 先頭という理由だけで選び、alternatives の assessment も declared rule もない場合、auditable ToolSelectionActivity ではありません。
    field_values:
      selection_activity_id: select-first-042
      decision_rule: first item
    related_node_ids:
      - ToolSelectionActivity
      - ToolCandidateSet
    related_relation_ids:
      - ToolSelectionActivity-consumes-ToolCandidateSet
    expected_result:
      zh: 验证器拒绝无评估证据的选择，不生成 accepted ToolSelectionDecision。
      en: Validation rejects the unevidenced choice and does not produce an accepted ToolSelectionDecision.
      ja: validation は evidence のない choice を拒否し accepted ToolSelectionDecision を生成しません。
    why_valid_or_invalid:
      zh: 列表位置不是声明的语义、资格或可用性证据，不能解释替代项为何落选。
      en: List position is not declared fit, eligibility, or availability evidence and cannot explain rejected alternatives.
      ja: list position は fit・eligibility・availability evidence ではなく alternatives の rejection を説明できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-selection-activity-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: ToolSelectionActivity-consumes-ToolCandidateSet
    predicate: consumes
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 消费候选集
      en: consumes candidate set
      ja: 候補集合を消費する
    definitions:
      zh: ToolSelectionActivity consumes 唯一 ToolCandidateSet，确保被选和被拒候选来自同一检索范围。
      en: ToolSelectionActivity consumes exactly one ToolCandidateSet so selected and rejected candidates come from one search scope.
      ja: ToolSelectionActivity は一つの ToolCandidateSet を consumes し selected/rejected candidates が同じ search scope 由来であることを保証します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 基数由具体查询、候选集合和运行策略决定。
      en: Cardinality depends on the concrete query, candidate set, and runtime policy.
      ja: cardinality は具体 query・candidate set・runtime policy に依存します。
    inverse_reading:
      predicate: inverse_consumes
      labels:
        zh: 反向：消费候选集
        en: inverse of consumes candidate set
        ja: 逆：候補集合を消費する
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: ToolSelectionActivity-consumes-ToolCandidateSet-example-positive-manual-001
        kind: positive
        labels:
          zh: 消费候选集正例
          en: Positive case for consumes candidate set
          ja: 候補集合を消費するの正例
        scenario_id: null
        descriptions:
          zh: select-tool-042 只比较 tool-candidates-042 的三个成员，未把 registry 中未返回工具加入备选。
          en: select-tool-042 compares only the three members of tool-candidates-042 and does not add unreturned registry tools.
          ja: select-tool-042 は tool-candidates-042 の三 members だけを比較し unreturned registry tools を追加しません。
        field_values: {}
        related_node_ids:
          - ToolSelectionActivity
          - ToolCandidateSet
        related_relation_ids:
          - ToolSelectionActivity-consumes-ToolCandidateSet
        expected_result:
          zh: 图谱保留 ToolSelectionActivity-consumes-ToolCandidateSet，并保持 ToolSelectionActivity 到 ToolCandidateSet 的方向。
          en: The graph retains ToolSelectionActivity-consumes-ToolCandidateSet with direction ToolSelectionActivity to ToolCandidateSet.
          ja: graph は ToolSelectionActivity-consumes-ToolCandidateSet を ToolSelectionActivity から ToolCandidateSet の方向で保持します。
        why_valid_or_invalid:
          zh: 场景给出了 consumes 成立所需的独立业务事实，而非仅有两个端点。
          en: The case supplies the independent domain fact required by consumes, not merely the two endpoints.
          ja: case は二 endpoint だけでなく consumes に必要な independent domain fact を示します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
        source_claims:
          - claim-tool-selection-activity-002
      - id: ToolSelectionActivity-consumes-ToolCandidateSet-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 消费候选集边界例
          en: Boundary case for consumes candidate set
          ja: 候補集合を消費するの境界例
        scenario_id: null
        descriptions:
          zh: 选择过程混合两个不同 query_version 的候选集，无法形成一致的 consumes 事实。
          en: A selection process mixes candidate sets from two query versions and cannot establish a coherent consumes fact.
          ja: selection process が二 query versions の candidate sets を混合すると coherent consumes fact を確立できません。
        field_values: {}
        related_node_ids:
          - ToolSelectionActivity
          - ToolCandidateSet
        related_relation_ids:
          - ToolSelectionActivity-consumes-ToolCandidateSet
        expected_result:
          zh: 验证器不得从名称相似、邻接或反向事实推断 ToolSelectionActivity-consumes-ToolCandidateSet。
          en: Validation must not infer ToolSelectionActivity-consumes-ToolCandidateSet from name similarity, adjacency, or a reversed fact.
          ja: validation は name similarity・adjacency・reversed fact から ToolSelectionActivity-consumes-ToolCandidateSet を推論してはいけません。
        why_valid_or_invalid:
          zh: consumes 的方向和成立条件未满足，因此该边不能进入 accepted 图。
          en: The direction or truth conditions of consumes are absent, so the edge cannot enter the accepted graph.
          ja: consumes の direction または truth conditions がなく edge は accepted graph に入りません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
        source_claims:
          - claim-tool-selection-activity-002
    source_claims:
      - claim-tool-selection-activity-002
    distinct_fact_rationale:
      zh: 输入集合边固定比较总体，支持遗漏、越界和混版检测。
      en: The input-set edge fixes the comparison population and supports omission, scope, and mixed-version checks.
      ja: input-set edge は comparison population を固定し omission・scope・mixed-version checks を支えます。
    layout_role: cross-link
    review_status: pending
    target: concept:ToolCandidateSet
