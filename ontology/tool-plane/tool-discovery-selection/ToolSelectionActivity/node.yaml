schema: moonweave.ai/ontology-node/v1
id: ToolSelectionActivity
kind: concept
labels:
  zh: 工具选择活动
  en: Tool Selection Activity
  ja: ツール選択活動
semantics:
  short_definition:
    zh: 基于候选评估和适用政策形成明确工具选择决策的活动。
    en: An activity that forms an explicit tool-selection decision from candidate assessments and applicable policy.
    ja: candidate assessment と applicable policy から明示的な tool-selection decision を形成する活動。
  definition:
    zh: ToolSelectionActivity 是 Moonweave 对从已有 ToolCandidate 范围中作出选择或拒绝选择的活动边界。它使用 ToolCandidateAssessment 的可用性、资格和匹配 finding，以及任务、政策、审批或回退规则，产生 ToolSelectionDecision。它不负责从目录发现更多工具，不把单个 ToolMatch 视为选定结果，也不执行所选工具；OpenAI Responses 的 tool_choice 可表达模型侧工具约束，但不是本体选择活动本身。
    en: ToolSelectionActivity is Moonweave's activity boundary for choosing, or declining to choose, from an existing ToolCandidate scope. It uses ToolCandidateAssessment availability, eligibility, and match findings together with task, policy, approval, or fallback rules to produce a ToolSelectionDecision. It does not discover more tools from catalogs, treat one ToolMatch as a selected result, or execute the selected tool; OpenAI Responses tool_choice can express a model-side tool constraint but is not the ontology selection activity itself.
    ja: ToolSelectionActivity は既存の ToolCandidate scope から選ぶ、または選ばないための Moonweave activity boundary である。ToolCandidateAssessment の availability、eligibility、match finding と task、policy、approval、fallback rule を使い、ToolSelectionDecision を作る。catalog からさらに tool を発見せず、一つの ToolMatch を selected result と扱わず、selected tool を execute しない。OpenAI Responses tool_choice は model-side tool constraint を表せるが、本体 selection activity 自体ではない。
  why_needed:
    zh: “候选存在”“候选适合”和“本次应使用哪个候选”之间需要清晰的审计链。选择活动使应用可以记录拒绝、无选择、审批待定或回退原因，而不把模型配置、文本相似度或调用结果混进决策。
    en: An auditable chain is needed between “a candidate exists,” “a candidate fits,” and “which candidate should be used this time.” Selection activity lets an application record rejection, no-selection, pending approval, or fallback rationale without mixing model configuration, text similarity, or call results into the decision.
    ja: 「candidate が存在する」「candidate が適合する」「今回どの candidate を使うべきか」の間には監査可能な chain が必要である。selection activity により application は rejection、no-selection、pending approval、fallback rationale を記録でき、model configuration、text similarity、call result を decision に混ぜない。
  includes:
    - zh: 已有候选、评估 finding、任务/政策约束和产生选择或无选择记录的决策步骤。
      en: Existing candidates, assessment findings, task or policy constraints, and the decision step that produces a selection or no-selection record.
      ja: 既存 candidate、assessment finding、task または policy constraint、selection または no-selection record を作る decision step。
    - zh: 需要信息澄清、审批、回退或显式拒绝的选择路径。
      en: Selection paths that require clarification, approval, fallback, or explicit rejection.
      ja: clarification、approval、fallback、explicit rejection を必要とする selection path。
  excludes:
    - zh: 目录扫描、候选创建、实际工具调用、工具结果、网络健康探测或协议传输。
      en: Catalog scanning, candidate creation, actual tool call, tool result, network health probing, or protocol transport.
      ja: catalog scanning、candidate creation、actual tool call、tool result、network health probing、protocol transport。
    - zh: 把 OpenAI tool_choice、MCP allowed_tools 或一个匹配 finding 直接重命名为选择决策。
      en: Renaming an OpenAI tool_choice, MCP allowed_tools, or one match finding directly as a selection decision.
      ja: OpenAI tool_choice、MCP allowed_tools、一つの match finding を直接 selection decision と改名すること。
  semantic_kind: activity
engineering:
  explanation:
    zh: 选择器接收本地候选和 finding 引用，检查任务与政策后写入 decision_id、chosen_candidate_ref 或 no_selection_reason，并保存评估证据。若集成 OpenAI Responses，可将经批准的约束映射到真实 tool_choice/allowed_tools 形状，但本地选择记录始终保留其理由、候选范围和来源。
    en: A selector receives local candidate and finding references, checks task and policy, then writes decision_id, chosen_candidate_ref or no_selection_reason, and assessment evidence. When integrated with OpenAI Responses, approved constraints can be mapped to the real tool_choice or allowed_tools shapes, but the local selection record always retains its rationale, candidate scope, and provenance.
    ja: selector は local candidate と finding reference を受け取り、task と policy を検査し、decision_id、chosen_candidate_ref または no_selection_reason、assessment evidence を書く。OpenAI Responses と統合する場合、承認済み constraint を実際の tool_choice または allowed_tools shape に map できるが、local selection record は常に rationale、candidate scope、provenance を保持する。
  typical_input:
    - description:
        zh: 本地候选与评估证据
        en: Local candidates and assessment evidence
        ja: Local candidates and assessment evidence
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"selection_input","candidate_set_ref":"set:17","assessment_refs":["assess:17","assess:18"],"task_requirement_ref":"task:42","policy_ref":"policy:read-only"}
      source_claims: [claim-selection-local]
    - description:
        zh: OpenAI 受限工具选择配置
        en: OpenAI constrained tool-choice configuration
        ja: OpenAI constrained tool-choice configuration
      format: |-
        {"tool_choice":{"type":"allowed_tools","mode":"required","tools":[{"type":"mcp","server_label":"docs","name":"search-docs"}]}}
      source_claims: [claim-selection-openai]
  typical_output:
    - description:
        zh: 本地选择决策
        en: Local selection decision
        ja: Local selection decision
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"tool_selection_decision","decision_id":"select-17","selection_activity_ref":"selection:17","candidate_set_ref":"set:17","chosen_candidate_ref":"candidate:search-docs","assessment_refs":["assess:17"],"decision_state":"selected","rationale":"Eligible candidate satisfies task under read-only policy"}
      source_claims: [claim-selection-local]
  reference_implementations:
    - name: OpenAI Responses create reference
      url: https://developers.openai.com/api/reference/resources/responses/methods/create
      description: Defines tool_choice modes, allowed-tools restriction, and remote MCP tool choice.
    - name: Model Context Protocol Tool declaration
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines the native Tool declaration whose schema can be used as assessment evidence.
structure:
  identity_keys: [activity_id]
  fields:
    - id: activity_id
      labels: {zh: 选择活动标识, en: Selection-activity identifier, ja: selection-activity 識別子}
      definitions:
        zh: 稳定标识一次本地选择活动，不替代模型响应 id、工具名或决策 id。
        en: Stably identifies one local selection activity and does not replace a model response id, tool name, or decision id.
        ja: 一つの local selection activity を安定して識別し、model response id、tool name、decision id を置き換えない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: selection-17
      source_claims: [claim-selection-local]
    - id: candidate_set_ref
      labels: {zh: 候选集引用, en: Candidate-set reference, ja: candidate-set 参照}
      definitions:
        zh: 指向决策可考虑的既有 ToolCandidateSet；选择活动不在该字段中发现新候选。
        en: Points to the existing ToolCandidateSet that the decision may consider; selection does not discover new candidates through this field.
        ja: decision が考慮できる既存 ToolCandidateSet を指す。selection はこの field で新しい candidate を発見しない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: set:17
      source_claims: [claim-selection-local]
    - id: assessment_refs
      labels: {zh: 评估引用, en: Assessment references, ja: assessment 参照}
      definitions:
        zh: 指向用于选择的本地候选评估及其 finding，支持选中或未选中理由。
        en: Points to local candidate assessments and their findings used for selection, supporting a chosen or unchosen rationale.
        ja: selection に使う local candidate assessment とその finding を指し、chosen または unchosen rationale を支持する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: assess:17
      source_claims: [claim-selection-local]
    - id: decision_ref
      labels: {zh: 决策引用, en: Decision reference, ja: decision 参照}
      definitions:
        zh: 指向本活动产生的 ToolSelectionDecision；该决定与评估 finding 分开存储。
        en: Points to the ToolSelectionDecision produced by this activity; the decision is stored separately from assessment findings.
        ja: この activity が作る ToolSelectionDecision を指す。decision は assessment finding と別に保存される。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: decision:select-17
      source_claims: [claim-selection-local]
  constraints:
    - id: selection-requires-assessment-and-explicit-decision
      severity: error
      expression_language: plain
      expression: Every ToolSelectionActivity must reference an existing candidate_set_ref, at least one assessment_ref, and exactly one decision_ref; the decision must state selected, no_selection, pending_clarification, or pending_approval explicitly.
      explanation:
        zh: 选择要连接候选范围、证据和明确结果，不能由隐含分数或模型配置代替。
        en: Selection must connect candidate scope, evidence, and an explicit result; implicit scores or model configuration cannot replace it.
        ja: selection は candidate scope、evidence、明示的な result を結ばなければならない。implicit score や model configuration では置き換えられない。
      source_claims: [claim-selection-local]
    - id: selection-does-not-invoke-or-discover
      severity: error
      expression_language: plain
      expression: ToolSelectionActivity must not contain catalog-list requests, candidate creation, tool_call, tool_result, or execution status; it consumes existing candidates and produces a decision only.
      explanation:
        zh: 发现、选择和执行有不同失败与审计边界。
        en: Discovery, selection, and execution have distinct failure and audit boundaries.
        ja: discovery、selection、execution には異なる failure と audit boundary がある。
      source_claims: [claim-selection-local]
  required_relations: []
examples:
  - id: selection-positive-evidenced-choice

    labels: {zh: 有证据的选择, en: Evidenced selection, ja: evidence を伴う selection}
    descriptions:
      zh: Toolformer (Schick 2023) 自监督判断何时插入 [Calculator(350/7)]/[Search(query)]；ToolBench DFSDT 在 16000+ RapidAPI 上 depth-first 工具选择；ART 从示例库检索多步推理模式。
      en: Toolformer (Schick 2023) self-supervised when-to-insert [Calculator(350/7)]/[Search(query)]; ToolBench DFSDT depth-first tool selection over 16000+ RapidAPI; ART retrieves multi-step reasoning patterns from task demos.
      ja: Toolformer (Schick 2023) 自己教師あり [Calculator(350/7)]/[Search(query)] 挿入判断。ToolBench DFSDT が 16000+ RapidAPI で depth-first tool 選択。ART が task demo から多段 reasoning pattern を检索。
    field_values: {activity_id: selection-17, candidate_set_ref: set:17, assessment_refs: [assess:17], decision_ref: decision:select-17}
    related_node_ids: [ToolSelectionActivity, ToolCandidateAssessment, ToolSelectionDecision]
    related_relation_ids: []

    source_claims: [claim-selection-local]
  - id: selection-counterexample-tool-choice-is-decision

    labels: {zh: 将 tool_choice 当作决策, en: Treat tool_choice as the decision, ja: tool_choice を decision と扱う}
    descriptions:
      zh: 反例：未执行 ToolBench API 检索或 Gorilla retriever 就假定工具可用；违反 Toolformer 自监督「仅在 API 调用改善 loss 时插入」准则。
      en: Counterexample: assuming tool availability without ToolBench API search or Gorilla retriever; violates Toolformer self-supervised criterion of inserting only when API call improves loss.
      ja: 反例：ToolBench API 检索や Gorilla retriever なしで tool 可用性を仮定。Toolformer 自己教師あり「API 呼出しが loss 改善時のみ挿入」准则違反。
    field_values: {activity_id: selection-18, configured_tool_choice: required, candidate_set_ref: set:18}
    related_node_ids: [ToolSelectionActivity, ToolSelectionDecision]
    related_relation_ids: []

    source_claims: [claim-selection-openai, claim-selection-local]
  - id: selection-boundary-no-eligible-candidate

    labels: {zh: 无合格候选边界, en: No-eligible-candidate boundary, ja: no-eligible-candidate 境界}
    descriptions:
      zh: Toolformer 训练时 API 调用标记 vs ToolBench/Gorilla 运行时 capability discovery 的方法论边界；本地 ToolSelectionDecision 非 wire tool_choice。
      en: Methodological boundary between Toolformer training-time API markers vs ToolBench/Gorilla runtime capability discovery; local ToolSelectionDecision is not wire tool_choice.
      ja: Toolformer 訓練時 API marker と ToolBench/Gorilla ランタイム capability discovery の方法論境界。ローカル ToolSelectionDecision は wire tool_choice ではない。
    field_values: {activity_id: selection-19, candidate_set_ref: set:19, assessment_refs: [assess:19, assess:20], decision_ref: decision:select-19, decision_state: no_selection}
    related_node_ids: [ToolSelectionActivity, ToolSelectionDecision, ToolEligibilityAssessment]
    related_relation_ids: []

    source_claims: [claim-selection-local]
  - id: selection-instance-pending-approval

    labels: {zh: 待审批选择实例, en: Pending-approval selection instance, ja: pending-approval selection instance}
    descriptions:
      zh: ToolBench ToolLLM 实例：query="book a flight"→DFSDT 选择 RapidAPI flights/search；Gorilla retriever 返回 HuggingFace transformers.pipeline API 文档 top-3。
      en: ToolBench ToolLLM instance: query="book a flight"→DFSDT selects RapidAPI flights/search; Gorilla retriever returns HuggingFace transformers.pipeline API docs top-3.
      ja: ToolBench ToolLLM 実例：query="book a flight"→DFSDT が RapidAPI flights/search を選択。Gorilla retriever が HuggingFace transformers.pipeline API 文档 top-3 を返す。
    field_values: {activity_id: selection-20, candidate_set_ref: set:20, assessment_refs: [assess:21], decision_ref: decision:select-20, decision_state: pending_approval}
    related_node_ids: [ToolSelectionActivity, ToolSelectionDecision, ToolAvailabilityAssessment]
    related_relation_ids: []

    source_claims: [claim-selection-openai, claim-selection-local]
parent_relation: null
relations: []
sources:
  - id: openai-responses-create-reference
    title: OpenAI API — Responses create reference
    url: https://developers.openai.com/api/reference/resources/responses/methods/create
    source_type: official-doc
    relevance: Defines tool_choice modes, allowed-tools restriction, remote MCP configuration, and approval controls.
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol — Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-spec
    relevance: Defines native Tool declarations used as evidence, distinct from selection and tool execution.
source_claims:
  - id: claim-selection-openai
    source: openai-responses-create-reference
    supports: OpenAI Responses tool_choice supports none, auto, required, and allowed-tools forms, and remote MCP tool configuration can constrain allowable tools and require approval.
    locator: Request body — tool_choice, allowed_tools, and MCP tool configuration
    evidence_kind: normative
    confidence: high
  - id: claim-selection-mcp
    source: mcp-tools-2025-11-25
    supports: MCP Tool declarations provide native names, schemas, and annotations for tools, while tools/call is a distinct execution operation.
    locator: Tools — Tool definition and Calling Tools
    evidence_kind: normative
    confidence: high
  - id: claim-selection-local
    source: openai-responses-create-reference
    supports: activity_id, candidate_set_ref, assessment_refs, decision_ref, no_selection, pending approval, and the separation of selection from discovery and invocation are Moonweave-local design inferences.
    locator: Request body — tool_choice and MCP tool configuration
    evidence_kind: design-inference
    confidence: high
