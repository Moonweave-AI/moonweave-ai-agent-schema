schema: moonweave.ai/ontology-node/v1
id: ToolClarificationRequest
kind: concept
status: accepted
labels:
  zh: 工具选择澄清请求
  en: Tool-selection clarification request
  ja: ツール選択確認要求
semantics:
  short_definition:
    zh: 工具选择澄清请求在缺少决定性信息时请求补充一项明确需求或授权选择。
    en: A tool-selection clarification request asks for one missing requirement or authority choice when no justified selection is possible.
    ja: ツール選択確認要求は正当な selection が不可能なとき欠けた requirement または authority choice を一つ求めます。
  definition:
    zh: 工具选择澄清请求是一份信息对象，由 ToolSelectionActivity 在候选并列、硬约束冲突或证据不足时产生，并明确关联需修订的 ToolSearchQuery；它不是提示词页面，也不擅自放宽约束或创建选择决定。
    en: A tool-selection clarification request is an information object produced by ToolSelectionActivity when candidates tie, hard constraints conflict, or evidence is insufficient, and it explicitly points to the ToolSearchQuery needing revision; it is not a prompt page and neither relaxes constraints nor creates a decision on its own.
    ja: ツール選択確認要求は candidate tie・hard constraint conflict・evidence insufficiency 時に ToolSelectionActivity が生成し、revision が必要な ToolSearchQuery を明示する information object です。prompt page ではなく constraint を勝手に緩和せず decision も作りません。
  why_needed:
    zh: 澄清节点为“不能可靠选择”提供正常结果，取代含糊的 ToolDisambiguationPrompt，并保持信息解释附着在图节点上。
    en: The clarification node makes “cannot yet choose reliably” a normal outcome, replaces ambiguous ToolDisambiguationPrompt, and keeps explanatory information attached to the graph node.
    ja: clarification node は『まだ確実に選べない』を正常 outcome とし、曖昧 ToolDisambiguationPrompt を置き換え、説明情報を graph node に付着させます。
  includes:
    - zh: 点名冲突候选、缺失信息、对查询的最小修订问题以及等待方的请求记录。
      en: Requests naming conflicting candidates, missing information, the minimal query revision question, and the waiting party.
      ja: conflicting candidates・missing information・minimal query revision question・waiting party を示す request。
  excludes:
    - zh: 完整系统提示、未经请求的约束放宽，以及已经选择某候选的 ToolSelectionDecision。
      en: A complete system prompt, unrequested constraint relaxation, and ToolSelectionDecision that already selects a candidate.
      ja: complete system prompt・unrequested constraint relaxation・既に candidate を選んだ ToolSelectionDecision。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - clarification_request_id
  fields:
    - id: clarification_request_id
      labels:
        zh: 澄清请求标识
        en: clarification request ID
        ja: 確認要求 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次未决工具选择的澄清请求。
        en: Uniquely identifies one clarification request for an unresolved tool choice.
        ja: unresolved tool choice に対する一 clarification request を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: clarify-tool-042
      source_claims:
        - claim-tool-clarification-request-002
    - id: requested_from_ref
      labels:
        zh: 请求回答方
        en: requested-from reference
        ja: 回答依頼先参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向有权补充缺失事实或授权选择约束的参与者，不能由系统自行代答。
        en: References the participant authorized to supply the missing fact or decide the selection constraint; the system cannot answer on that participant's behalf.
        ja: missing fact または selection constraint を決定する権限を持つ participant を参照し、system が代理回答してはなりません。
      allowed_values: []
      pattern: null
      example_value: actor:workspace-owner
      source_claims:
        - claim-tool-clarification-request-003
    - id: missing_information
      labels:
        zh: 缺失信息
        en: missing information
        ja: 不足情報
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明阻止可靠选择的最小缺失事实。
        en: States the smallest missing fact preventing a justified choice.
        ja: justified choice を妨げる最小 missing fact を記述します。
      allowed_values: []
      pattern: null
      example_value: whether network access may be authorized
      source_claims:
        - claim-tool-clarification-request-004
    - id: question_text
      labels:
        zh: 澄清问题
        en: clarification question
        ja: 確認質問
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 向能够解决缺失事实的参与者提出单一、可回答的问题。
        en: Asks the responsible participant one answerable question that resolves the missing fact.
        ja: missing fact を解決できる participant に一つの answerable question を提示します。
      allowed_values: []
      pattern: null
      example_value: May this run use the network-enabled vulnerability scanner?
      source_claims:
        - claim-tool-clarification-request-005
  constraints: []
  required_relation_constraints: []
examples:
  - id: ToolClarificationRequest-example-positive-manual-001
    kind: positive
    labels:
      zh: 工具选择澄清请求正例
      en: Positive case for Tool-selection clarification request
      ja: ツール選択確認要求の正例
    scenario_id: null
    descriptions:
      zh: 两个扫描工具能力相当，一个需要网络授权；当前查询没有说明是否允许网络，因此选择活动提出单一授权澄清问题并暂停决定。
      en: Two scanners have equal capability but one requires network authority; because the query is silent, selection asks one authorization question and pauses the decision.
      ja: 二つの scanner は同等 capability ですが一方は network authority を要し query が無指定なため、selection は一 authorization question を出して decision を保留します。
    field_values:
      clarification_request_id: clarify-tool-042
      requested_from_ref: actor:workspace-owner
      missing_information: whether network access may be authorized
      question_text: May this run use the network-enabled vulnerability scanner?
    related_node_ids:
      - ToolClarificationRequest
      - ToolSearchQuery
      - ToolSelectionActivity
    related_relation_ids:
      - ToolSelectionActivity-requests_clarification-ToolClarificationRequest
      - ToolClarificationRequest-clarifies-ToolSearchQuery
    expected_result:
      zh: 在查询修订前不产生选择决定，澄清答案形成新 query_version 后重新评估。
      en: No selection decision is produced before query revision; the answer creates a new query version and triggers reassessment.
      ja: query revision 前に selection decision を生成せず、answer が new query version を形成して reassessment を trigger します。
    why_valid_or_invalid:
      zh: 缺失事实、负责回答者和查询修订点明确，不会用默认假设绕过授权。
      en: The missing fact, responsible answerer, and query revision point are explicit, so no default assumption bypasses authority.
      ja: missing fact・responsible answerer・query revision point が明示され default assumption で authority を迂回しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-clarification-request-006
  - id: ToolClarificationRequest-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 工具选择澄清请求边界例
      en: Boundary case for Tool-selection clarification request
      ja: ツール選択確認要求の境界例
    scenario_id: null
    descriptions:
      zh: 系统直接删除“禁网”硬约束并选择网络扫描器，没有提出问题或形成新查询版本；这不是澄清，而是未授权改写。
      en: The system silently removes the no-network constraint and chooses the network scanner without asking or creating a new query version; this is unauthorized rewriting, not clarification.
      ja: system が no-network constraint を黙って削除し network scanner を選び、質問も new query version も作らない場合、clarification ではなく unauthorized rewriting です。
    field_values:
      clarification_request_id: silent-relaxation-042
      missing_information: network authority
      question_text: ""
    related_node_ids:
      - ToolClarificationRequest
      - ToolSearchQuery
      - ToolSelectionDecision
    related_relation_ids:
      - ToolClarificationRequest-clarifies-ToolSearchQuery
    expected_result:
      zh: 验证器拒绝空问题和就地约束改写，不允许产生 accepted 选择决定。
      en: Validation rejects the empty question and in-place constraint rewrite and permits no accepted selection decision.
      ja: validation は empty question と in-place constraint rewrite を拒否し accepted selection decision を許しません。
    why_valid_or_invalid:
      zh: 澄清必须向有权参与者获取新事实，而不是由系统自行改变用户约束。
      en: Clarification must obtain a new fact from an authorized participant rather than changing user constraints itself.
      ja: clarification は authorized participant から new fact を得る必要があり system 自身が user constraints を変えてはいけません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-clarification-request-007
external_mappings: []
applicability:
  - core
sibling_differentiation: []
