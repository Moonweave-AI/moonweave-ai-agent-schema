    source: eng-proto-mcp-elicitation
    supports: "Direct source premise: MCP elicitation carries a message and a schema for additional information needed by an interactive workflow. Moonweave design inference: missing_information records the smallest absent fact that blocks a justified tool choice, rather than treating the whole prompt as missing."
