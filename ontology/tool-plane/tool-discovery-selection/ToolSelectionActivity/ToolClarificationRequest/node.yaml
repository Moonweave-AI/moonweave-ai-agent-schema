    source: eng-proto-mcp-elicitation
    supports: "Direct source premise: MCP elicitation lets a server request additional information from a user through the client and distinguishes accept, decline, and cancel responses. Moonweave design inference: ToolClarificationRequest is the persisted selection-domain request produced after Moonweave detects a tie, hard-constraint conflict, or evidence gap; MCP does not define candidate-tie or constraint-conflict detection."
    locator: Client Features > Elicitation > User Interaction Model; Creating Elicitation Requests; Response Actions
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tool-clarification-request-002
