schema: moonweave.ai/ontology-node/v1
id: FallbackToolSelectionActivity
kind: concept
labels:
  zh: 工具回退选择活动
  en: Fallback Tool Selection Activity
  ja: ツールフォールバック選択活動
semantics:
  short_definition:
    zh: 在先前选择不能继续时，依据明确触发原因重新形成回退选择决策的选择活动。
    en: A selection activity that forms a fallback decision when an earlier selection cannot proceed for an explicit reason.
    ja: 先行 selection が明示的な理由で継続できないとき、fallback decision を形成する selection activity。
  definition:
    zh: FallbackToolSelectionActivity 是 ToolSelectionActivity 的一种，在原选择被拒绝、审批失败、候选变为不可用、资格改变或策略要求回退时，从已经发现并评估的替代候选中形成新的 ToolSelectionDecision。它必须引用先前决策和触发条件；它不是重新扫描目录、绕过审批、把调用失败结果当作选择本身，或自动把第二个候选作为回退。
    en: FallbackToolSelectionActivity is a kind of ToolSelectionActivity that forms a new ToolSelectionDecision from already discovered and assessed alternatives when the original selection is rejected, approval fails, a candidate becomes unavailable, eligibility changes, or policy requires fallback. It must reference the prior decision and trigger; it is not a fresh catalog scan, an approval bypass, a tool-call failure treated as selection itself, or automatically choosing the second candidate.
    ja: FallbackToolSelectionActivity は ToolSelectionActivity の一種であり、original selection が rejected、approval failed、candidate が unavailable、eligibility が changed、または policy が fallback を要求したとき、すでに discovered かつ assessed な alternative から新しい ToolSelectionDecision を形成する。prior decision と trigger を参照しなければならない。fresh catalog scan、approval bypass、tool-call failure 自体を selection と扱うこと、または二番目の candidate を自動選択することではない。
  why_needed:
    zh: 回退经常被误写成“失败后随便换一个”。把触发、替代候选和新决策显式化，能保留安全约束与审计理由，并防止旧决策或工具调用结果被静默覆盖。
    en: Fallback is often miswritten as “pick anything after failure.” Making trigger, alternative candidates, and a new decision explicit preserves safety constraints and audit rationale while preventing silent overwrite of the prior decision or a tool-call result.
    ja: fallback は「failure の後で何でも選ぶ」と誤記されがちである。trigger、alternative candidate、新しい decision を明示すると safety constraint と audit rationale を保持し、prior decision や tool-call result の silent overwrite を防ぐ。
  includes:
    - zh: 对先前选择、回退触发、已评估替代候选和新回退决策的关联。
      en: Links among a prior selection, fallback trigger, assessed alternatives, and a new fallback decision.
      ja: prior selection、fallback trigger、assessed alternative、新しい fallback decision 間の link。
    - zh: 因审批、政策、可用性或资格变化而作出的显式重新选择。
      en: Explicit reselection caused by approval, policy, availability, or eligibility change.
      ja: approval、policy、availability、eligibility change による明示的な reselection。
  excludes:
    - zh: 新工具发现、无证据的第二候选选择、工具执行或忽略审批要求。
      en: New tool discovery, unsupported second-candidate selection, tool execution, or ignoring approval requirements.
      ja: new tool discovery、根拠のない second-candidate selection、tool execution、approval requirement の無視。
    - zh: 与先前选择无关的普通初始 ToolSelectionActivity。
      en: An ordinary initial ToolSelectionActivity unrelated to a prior selection.
      ja: prior selection と無関係な通常の初期 ToolSelectionActivity。
  semantic_kind: activity
engineering:
  explanation:
    zh: 回退选择器读取 prior_decision_ref 和 trigger evidence，过滤仍在原候选范围内且有足够评估证据的替代项，生成新的 fallback 决策。若没有安全替代项，它应产生 no_selection 或澄清请求，而不是执行未经评估的工具。
    en: A fallback selector reads prior_decision_ref and trigger evidence, filters alternatives still within the original candidate scope and supported by sufficient assessment evidence, and creates a new fallback decision. If no safe alternative exists, it produces no_selection or a clarification request rather than executing an unassessed tool.
    ja: fallback selector は prior_decision_ref と trigger evidence を読み、original candidate scope 内にあり十分な assessment evidence に支持された alternative を filter し、新しい fallback decision を作る。safe alternative がない場合、unassessed tool を execute せず no_selection または clarification request を作る。
  typical_input:
    - description:
        zh: 先前选择与审批触发
        en: Prior selection and approval trigger
        ja: Prior selection and approval trigger
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"fallback_selection_input","prior_decision_ref":"decision:select-17","trigger":{"kind":"approval_denied","evidence_ref":"approval:17"},"candidate_set_ref":"set:17","assessment_refs":["assess:17","assess:18"]}
      source_claims: [claim-fallback-activity-local]
    - description:
        zh: OpenAI 远程 MCP 审批配置
        en: OpenAI remote-MCP approval configuration
        ja: OpenAI remote-MCP approval configuration
      format: |-
        {"type":"mcp","server_label":"docs","server_url":"https://tools.example.test/mcp","allowed_tools":["search-docs","search-backup"],"require_approval":"always"}
      source_claims: [claim-fallback-activity-openai]
  typical_output:
    - description:
        zh: 本地回退选择决策
        en: Local fallback-selection decision
        ja: Local fallback-selection decision
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"fallback_tool_selection_decision","activity_id":"fallback-activity-17","decision_ref":"decision:fallback-17","prior_decision_ref":"decision:select-17","trigger_ref":"approval:17","candidate_set_ref":"set:17","chosen_candidate_ref":"candidate:search-backup","decision_state":"selected","assessment_refs":["assess:18"]}
      source_claims: [claim-fallback-activity-local]
  reference_implementations:
    - name: OpenAI Responses remote MCP configuration
      url: https://developers.openai.com/api/reference/resources/responses/methods/create
      description: Defines remote MCP approval controls and allowed-tool restrictions that can be input evidence for a local fallback rule.
    - name: Model Context Protocol Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines tool declarations and distinguishes them from tools/call execution.
structure:
  identity_keys: [activity_id]
  fields:
    - id: activity_id
      labels: {zh: 回退选择活动标识, en: Fallback-selection activity identifier, ja: fallback-selection activity 識別子}
      definitions:
        zh: 稳定标识一次由先前选择触发的本地回退选择活动。
        en: Stably identifies one local fallback-selection activity triggered by an earlier selection.
        ja: earlier selection により trigger された一つの local fallback-selection activity を安定して識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: fallback-activity-17
      source_claims: [claim-fallback-activity-local]
    - id: candidate_set_ref
      labels: {zh: 候选集引用, en: Candidate-set reference, ja: candidate-set 参照}
      definitions:
        zh: 继承选择活动的候选范围，并限定回退只能在该范围内重选；它不触发新的工具发现。
        en: Retains the selection activity's candidate scope and limits fallback to reselection within that scope; it does not trigger new tool discovery.
        ja: selection activity の candidate scope を保持し、その scope 内の reselection に fallback を限定する。new tool discovery を起動しない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: set:17
      source_claims: [claim-fallback-activity-local]
    - id: assessment_refs
      labels: {zh: 评估引用, en: Assessment references, ja: assessment 参照}
      definitions:
        zh: 继承并记录支持回退候选的评估证据；不能用候选列表顺序代替这些评估。
        en: Retains and records assessment evidence supporting the fallback candidate; candidate-list order cannot replace those assessments.
        ja: fallback candidate を支持する assessment evidence を保持して記録する。candidate-list order はそれらの assessment を置き換えられない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: assess:18
      source_claims: [claim-fallback-activity-local]
    - id: decision_ref
      labels: {zh: 决策引用, en: Decision reference, ja: decision 参照}
      definitions:
        zh: 继承选择活动对所形成决策的引用；在该子类中它必须与 fallback_decision_ref 指向同一新决策。
        en: Retains the selection activity's reference to the decision it formed; in this subtype it must identify the same new decision as fallback_decision_ref.
        ja: selection activity が形成した decision への参照を保持する。この subtype では fallback_decision_ref と同じ新しい decision を識別しなければならない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: decision:fallback-17
      source_claims: [claim-fallback-activity-local]
    - id: prior_decision_ref
      labels: {zh: 先前决策引用, en: Prior-decision reference, ja: prior-decision 参照}
      definitions:
        zh: 指向不能继续的 ToolSelectionDecision，保留原有理由和选择状态。
        en: Points to the ToolSelectionDecision that cannot proceed, preserving its original rationale and state.
        ja: 継続できない ToolSelectionDecision を指し、元の rationale と state を保持する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: decision:select-17
      source_claims: [claim-fallback-activity-local]
    - id: fallback_trigger_ref
      labels: {zh: 回退触发引用, en: Fallback-trigger reference, ja: fallback-trigger 参照}
      definitions:
        zh: 指向审批拒绝、可用性变化、资格变化或政策要求等可审计触发证据。
        en: Points to auditable trigger evidence such as approval denial, availability change, eligibility change, or policy requirement.
        ja: approval denial、availability change、eligibility change、policy requirement などの監査可能な trigger evidence を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: approval:17
      source_claims: [claim-fallback-activity-local]
    - id: fallback_decision_ref
      labels: {zh: 回退决策引用, en: Fallback-decision reference, ja: fallback-decision 参照}
      definitions:
        zh: 指向本活动新产生的 FallbackToolSelectionDecision，而非修改先前决策。
        en: Points to the new FallbackToolSelectionDecision produced by this activity rather than mutating the prior decision.
        ja: prior decision を mutate せず、この activity が作る新しい FallbackToolSelectionDecision を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: decision:fallback-17
      source_claims: [claim-fallback-activity-local]
  constraints:
    - id: fallback-selection-requires-prior-trigger-and-evidence
      severity: error
      expression_language: plain
      expression: Every FallbackToolSelectionActivity must retain candidate_set_ref and assessment_refs, reference prior_decision_ref and fallback_trigger_ref, and set decision_ref equal to the new fallback_decision_ref; it must not mutate or erase the prior decision.
      explanation:
        zh: 回退是可追溯的重新选择，而不是隐式替换。
        en: Fallback is traceable reselection, not implicit replacement.
        ja: fallback は traceable reselection であり、implicit replacement ではない。
      source_claims: [claim-fallback-activity-local]
    - id: fallback-selection-does-not-bypass-controls-or-invoke
      severity: error
      expression_language: plain
      expression: A fallback activity must not set tool_call, tool_result, approval_override, or create new candidates; denied or pending approval and absent eligible alternatives require a pending or no-selection decision.
      explanation:
        zh: 回退不授予执行权限，也不越过审批或重新发现边界。
        en: Fallback does not grant execution authority or cross approval and discovery boundaries.
        ja: fallback は execution authority を与えず、approval と discovery boundary を越えない。
      source_claims: [claim-fallback-activity-openai, claim-fallback-activity-local]
  required_relations: []
examples:
  - id: fallback-activity-positive-approval-denied

    labels: {zh: 审批拒绝后的回退, en: Fallback after approval denial, ja: approval denial 後の fallback}
    descriptions:
      zh: Toolformer (Schick 2023) 自监督判断何时插入 [Calculator(350/7)]/[Search(query)]；ToolBench DFSDT 在 16000+ RapidAPI 上 depth-first 工具选择；ART 从示例库检索多步推理模式。
      en: Toolformer (Schick 2023) self-supervised when-to-insert [Calculator(350/7)]/[Search(query)]; ToolBench DFSDT depth-first tool selection over 16000+ RapidAPI; ART retrieves multi-step reasoning patterns from task demos.
      ja: Toolformer (Schick 2023) 自己教師あり [Calculator(350/7)]/[Search(query)] 挿入判断。ToolBench DFSDT が 16000+ RapidAPI で depth-first tool 選択。ART が task demo から多段 reasoning pattern を检索。
    field_values: {activity_id: fallback-activity-17, candidate_set_ref: set:17, assessment_refs: [assess:17, assess:18], decision_ref: decision:fallback-17, prior_decision_ref: decision:select-17, fallback_trigger_ref: approval:17, fallback_decision_ref: decision:fallback-17}
    related_node_ids: [FallbackToolSelectionActivity, FallbackToolSelectionDecision, ToolSelectionDecision]
    related_relation_ids: [FallbackToolSelectionActivity-is_a-ToolSelectionActivity]

    source_claims: [claim-fallback-activity-local]
  - id: fallback-activity-counterexample-pick-next-item

    labels: {zh: 直接选择第二项, en: Directly pick the second item, ja: 二番目の item を直接選ぶ}
    descriptions:
      zh: 反例：未执行 ToolBench API 检索或 Gorilla retriever 就假定工具可用；违反 Toolformer 自监督「仅在 API 调用改善 loss 时插入」准则。
      en: Counterexample: assuming tool availability without ToolBench API search or Gorilla retriever; violates Toolformer self-supervised criterion of inserting only when API call improves loss.
      ja: 反例：ToolBench API 检索や Gorilla retriever なしで tool 可用性を仮定。Toolformer 自己教師あり「API 呼出しが loss 改善時のみ挿入」准则違反。
    field_values: {activity_id: fallback-activity-18, prior_decision_ref: decision:select-18, chosen_candidate_ref: candidate:second}
    related_node_ids: [FallbackToolSelectionActivity, ToolCandidate]
    related_relation_ids: []

    source_claims: [claim-fallback-activity-local]
  - id: fallback-activity-boundary-no-safe-alternative

    labels: {zh: 无安全替代项边界, en: No-safe-alternative boundary, ja: no-safe-alternative 境界}
    descriptions:
      zh: Toolformer 训练时 API 调用标记 vs ToolBench/Gorilla 运行时 capability discovery 的方法论边界；本地 ToolSelectionDecision 非 wire tool_choice。
      en: Methodological boundary between Toolformer training-time API markers vs ToolBench/Gorilla runtime capability discovery; local ToolSelectionDecision is not wire tool_choice.
      ja: Toolformer 訓練時 API marker と ToolBench/Gorilla ランタイム capability discovery の方法論境界。ローカル ToolSelectionDecision は wire tool_choice ではない。
    field_values: {activity_id: fallback-activity-19, candidate_set_ref: set:19, assessment_refs: [assess:19, assess:20], decision_ref: decision:fallback-19, prior_decision_ref: decision:select-19, fallback_trigger_ref: availability:19, fallback_decision_ref: decision:fallback-19, decision_state: no_selection}
    related_node_ids: [FallbackToolSelectionActivity, ToolClarificationRequest]
    related_relation_ids: [FallbackToolSelectionActivity-is_a-ToolSelectionActivity]

    source_claims: [claim-fallback-activity-local]
  - id: fallback-activity-instance-policy-change

    labels: {zh: 政策变化回退实例, en: Policy-change fallback instance, ja: policy-change fallback instance}
    descriptions:
      zh: ToolBench ToolLLM 实例：query="book a flight"→DFSDT 选择 RapidAPI flights/search；Gorilla retriever 返回 HuggingFace transformers.pipeline API 文档 top-3。
      en: ToolBench ToolLLM instance: query="book a flight"→DFSDT selects RapidAPI flights/search; Gorilla retriever returns HuggingFace transformers.pipeline API docs top-3.
      ja: ToolBench ToolLLM 実例：query="book a flight"→DFSDT が RapidAPI flights/search を選択。Gorilla retriever が HuggingFace transformers.pipeline API 文档 top-3 を返す。
    field_values: {activity_id: fallback-activity-20, candidate_set_ref: set:20, assessment_refs: [assess:21], decision_ref: decision:fallback-20, prior_decision_ref: decision:select-20, fallback_trigger_ref: policy:offline, fallback_decision_ref: decision:fallback-20}
    related_node_ids: [FallbackToolSelectionActivity, ToolEligibilityAssessment]
    related_relation_ids: [FallbackToolSelectionActivity-is_a-ToolSelectionActivity]

    source_claims: [claim-fallback-activity-local]
parent_relation:
  id: FallbackToolSelectionActivity-is_a-ToolSelectionActivity
  predicate: is_a
  target: concept:ToolSelectionActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是工具选择活动的一种, en: is a kind of tool selection activity, ja: tool selection activity の一種である}
  definitions:
    zh: FallbackToolSelectionActivity 继承选择活动的候选、评估和决策边界，并额外要求先前决策与回退触发。
    en: FallbackToolSelectionActivity inherits the candidate, assessment, and decision boundaries of tool selection activity and additionally requires a prior decision and fallback trigger.
    ja: FallbackToolSelectionActivity は tool selection activity の candidate、assessment、decision boundary を継承し、さらに prior decision と fallback trigger を要求する。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels: {zh: 具有回退选择活动子类, en: has fallback-selection activity subtype, ja: fallback-selection activity subtype を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: This is a true subtype hierarchy for a selection activity; it does not imply a fallback candidate is executable or approved.
  constraints: []
  examples: []
  source_claims: [claim-fallback-activity-local]
  distinct_fact_rationale:
    zh: 回退选择仍是选择活动，只是增加了来源于先前决策的触发与替代约束。
    en: Fallback selection remains a selection activity but adds trigger and alternative constraints originating from a prior decision.
    ja: fallback selection は selection activity のままであり、prior decision に由来する trigger と alternative constraint を加える。
  layout_role: primary-backbone
relations: []
sources:
  - id: openai-responses-create-reference
    title: OpenAI API — Responses create reference
    url: https://developers.openai.com/api/reference/resources/responses/methods/create
    source_type: official-doc
    relevance: Defines remote MCP allowed-tools and approval configuration that can be preserved as selection evidence.
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol — Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-spec
    relevance: Defines Tool declaration and distinct tools/call execution boundary.
source_claims:
  - id: claim-fallback-activity-openai
    source: openai-responses-create-reference
    supports: OpenAI remote MCP configuration supports allowed_tools and require_approval, exposing request-level constraints that can be kept as evidence for local fallback rules.
    locator: Request body — MCP tool configuration
    evidence_kind: normative
    confidence: high
  - id: claim-fallback-activity-mcp
    source: mcp-tools-2025-11-25
    supports: MCP Tool declarations are distinct from the tools/call operation and CallToolResult, preserving a boundary between selecting an alternative and invoking it.
    locator: Tools — Tool definition and Calling Tools
    evidence_kind: normative
    confidence: high
  - id: claim-fallback-activity-local
    source: openai-responses-create-reference
    supports: candidate_set_ref, assessment_refs, decision_ref/fallback_decision_ref equality, prior_decision_ref, fallback_trigger_ref, and no-selection handling are Moonweave-local fallback-selection design inferences.
    locator: Request body — MCP tool configuration
    evidence_kind: design-inference
    confidence: high
