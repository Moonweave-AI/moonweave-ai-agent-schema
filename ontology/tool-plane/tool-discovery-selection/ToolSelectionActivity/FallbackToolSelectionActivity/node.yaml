schema: moonweave.ai/ontology-node/v1
id: FallbackToolSelectionActivity
kind: concept
status: accepted
labels:
  zh: 后备工具重选活动
  en: Fallback tool reselection activity
  ja: 代替ツール再選択活動
semantics:
  short_definition:
    zh: 后备工具重选活动在首选工具不可用或调用失败后重新评估剩余候选。
    en: A fallback tool reselection activity reassesses remaining candidates after the preferred tool becomes unavailable or its call fails.
    ja: 代替ツール再選択活動は preferred tool が unavailable または call failure 後に remaining candidates を再評価します。
  definition:
    zh: 后备工具重选活动是一种 ToolSelectionActivity，由明确的 ToolCallAttempt 失败或新鲜可用性证据触发；它保留原查询目标，刷新受影响评估，并产生新的 FallbackToolSelectionDecision，不把旧工具名称直接替换进原决定。
    en: A fallback tool reselection activity is a ToolSelectionActivity triggered by an explicit ToolCallAttempt failure or fresh availability evidence; it preserves the original query objective, refreshes affected assessments, and produces a new FallbackToolSelectionDecision rather than replacing a tool name inside the old decision.
    ja: 代替ツール再選択活動は明示 ToolCallAttempt failure または fresh availability evidence が trigger する ToolSelectionActivity で、original query objective を保持し、影響 assessment を更新して新しい FallbackToolSelectionDecision を生成し、old decision 内の tool name を置換しません。
  why_needed:
    zh: 该子类把“失败后的新一轮选择”与重试同一调用、路由重试策略及静态备用清单区分，并保留完整决策沿袭。
    en: This subtype distinguishes a new selection round after failure from retrying the same call, routing retry policy, and a static fallback list while preserving decision lineage.
    ja: この subtype は failure 後の new selection round を same-call retry・routing retry policy・static fallback list から分け、decision lineage を保持します。
  includes:
    - zh: 由首选调用失败、工具列表变化或可用性过期触发，并重新比较仍合格候选的活动。
      en: Activities triggered by preferred-call failure, tool-list change, or availability expiry that recompare still-eligible candidates.
      ja: preferred-call failure・tool-list change・availability expiry で trigger され、still-eligible candidates を再比較する活動。
  excludes:
    - zh: 同一 ToolCallAttempt 内的传输重试、预先声明但未触发的备用列表，以及改变任务目标的全新查询。
      en: Transport retry within the same ToolCallAttempt, an untriggered static fallback list, and a new query that changes the task objective.
      ja: 同じ ToolCallAttempt 内 transport retry・未 trigger の static fallback list・task objective を変える new query。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: trigger_attempt_id
      labels:
        zh: 触发尝试标识
        en: trigger attempt ID
        ja: トリガー試行 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向促使重选的 ToolCallAttempt。
        en: Identifies the ToolCallAttempt that caused reselection.
        ja: reselection を引き起こした ToolCallAttempt を識別します。
      allowed_values: []
      pattern: null
      example_value: tool-attempt-read-file-003
      source_claims:
        - claim-fallback-tool-selection-activity-001
    - id: refresh_scope
      labels:
        zh: 刷新范围
        en: refresh scope
        ja: 再評価範囲
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出重选前必须更新的评估维度。
        en: Lists assessment dimensions that must be refreshed before reselection.
        ja: reselection 前に更新すべき assessment dimensions を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - availability
        - eligibility
      source_claims:
        - claim-fallback-tool-selection-activity-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: FallbackToolSelectionActivity-example-positive-manual-001
    kind: positive
    labels:
      zh: 后备工具重选活动正例
      en: Positive case for Fallback tool reselection activity
      ja: 代替ツール再選択活動の正例
    scenario_id: null
    descriptions:
      zh: read_file 的第三次 ToolCallAttempt 返回端点不可用；重选活动引用该 attempt，刷新剩余候选可用性与资格，并选择本地 shell 读取工具。
      en: The third read_file ToolCallAttempt reports endpoint unavailable; the reselection activity references that attempt, refreshes availability and eligibility for remaining candidates, and chooses a local shell-reading tool.
      ja: read_file の第三 ToolCallAttempt が endpoint unavailable を報告し、reselection activity はその attempt を参照して remaining candidates の availability/eligibility を更新し local shell-reading tool を選びます。
    field_values:
      selection_activity_id: select-tool-fallback-043
      decision_rule: exclude the failed candidate, refresh availability and eligibility, then select the remaining candidate with complete capability coverage
      trigger_attempt_id: tool-attempt-read-file-003
      refresh_scope:
        - availability
        - eligibility
    related_node_ids:
      - FallbackToolSelectionActivity
      - ToolCallAttempt
      - FallbackToolSelectionDecision
    related_relation_ids:
      - FallbackToolSelectionActivity-responds_to-ToolCallAttempt
    expected_result:
      zh: 重选与失败尝试有可追溯因果边，且产生新决定而不修改首选决定。
      en: Reselection has a traceable causal edge to the failed attempt and produces a new decision without mutating the preferred decision.
      ja: reselection は failed attempt への traceable causal edge を持ち preferred decision を変更せず new decision を生成します。
    why_valid_or_invalid:
      zh: 触发证据、刷新范围和新选择轮次均明确，因此可以区分重选与盲目重试。
      en: Trigger evidence, refresh scope, and new selection round are explicit, distinguishing reselection from blind retry.
      ja: trigger evidence・refresh scope・new selection round が明示され blind retry と区別できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-fallback-tool-selection-activity-001
  - id: FallbackToolSelectionActivity-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 后备工具重选活动边界例
      en: Boundary case for Fallback tool reselection activity
      ja: 代替ツール再選択活動の境界例
    scenario_id: null
    descriptions:
      zh: 网络库在同一 attempt 内自动重发相同请求，候选、评估和决定均未变化；这是调用重试，不是后备工具重选。
      en: A network library resends the same request inside one attempt while candidate, assessments, and decision remain unchanged; this is invocation retry, not fallback reselection.
      ja: network library が同じ attempt 内で同一 request を再送し candidate・assessments・decision が不変なら invocation retry で、fallback reselection ではありません。
    field_values:
      trigger_attempt_id: tool-attempt-read-file-003
      refresh_scope: []
    related_node_ids:
      - FallbackToolSelectionActivity
      - ToolCallAttempt
    related_relation_ids:
      - FallbackToolSelectionActivity-responds_to-ToolCallAttempt
    expected_result:
      zh: 验证器保持 retry 活动身份，不创建 FallbackToolSelectionDecision。
      en: Validation retains retry identity and does not create FallbackToolSelectionDecision.
      ja: validation は retry identity を保持し FallbackToolSelectionDecision を作成しません。
    why_valid_or_invalid:
      zh: 没有候选比较或新决定，重复传输不满足重选活动的种差。
      en: No candidate comparison or new decision occurs, so repeated transport does not meet the reselection differentia.
      ja: candidate comparison も new decision もないため repeated transport は reselection differentia を満たしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-fallback-tool-selection-activity-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: FallbackToolSelectionActivity-is_a-ToolSelectionActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: FallbackToolSelectionActivity 是 ToolSelectionActivity 的严格子类；其区分条件是：由失败或可用性失效触发，刷新评估并开启新选择轮次。
    en: "FallbackToolSelectionActivity is a strict subtype of ToolSelectionActivity; its differentia is: it is triggered by failure or availability invalidation, refreshes assessments, and opens a new selection round."
    ja: FallbackToolSelectionActivity は ToolSelectionActivity の厳密な subtype で、種差は次の通りです：failure または availability invalidation で trigger され assessment を更新して new selection round を開きます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数由具体查询、候选集合和运行策略决定。
    en: Cardinality depends on the concrete query, candidate set, and runtime policy.
    ja: cardinality は具体 query・candidate set・runtime policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: FallbackToolSelectionActivity-is_a-ToolSelectionActivity-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive case for is a
        ja: の一種の正例
      scenario_id: null
      descriptions:
        zh: 记录同时满足 ToolSelectionActivity 的上位定义和 FallbackToolSelectionActivity 的完整种差：由失败或可用性失效触发，刷新评估并开启新选择轮次。
        en: "The record satisfies both the parent definition of ToolSelectionActivity and the complete differentia of FallbackToolSelectionActivity: it is triggered by failure or availability invalidation, refreshes assessments, and opens a new selection round."
        ja: record は ToolSelectionActivity の上位 definition と FallbackToolSelectionActivity の完全な種差を満たします：failure または availability invalidation で trigger され assessment を更新して new selection round を開きます。
      field_values: {}
      related_node_ids:
        - FallbackToolSelectionActivity
        - ToolSelectionActivity
      related_relation_ids:
        - FallbackToolSelectionActivity-is_a-ToolSelectionActivity
      expected_result:
        zh: 验证器将该记录归为 FallbackToolSelectionActivity，并通过 is_a 继承 ToolSelectionActivity 的约束。
        en: Validation classifies the record as FallbackToolSelectionActivity and inherits ToolSelectionActivity constraints through is_a.
        ja: validation は record を FallbackToolSelectionActivity と分類し is_a により ToolSelectionActivity constraints を継承します。
      why_valid_or_invalid:
        zh: 完整种差而非名称前缀证明了 FallbackToolSelectionActivity 的成员资格。
        en: The complete differentia, not a shared name prefix, proves membership in FallbackToolSelectionActivity.
        ja: shared name prefix ではなく完全な種差が FallbackToolSelectionActivity membership を証明します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-fallback-tool-selection-activity-002
    - id: FallbackToolSelectionActivity-is_a-ToolSelectionActivity-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種の境界例
      scenario_id: null
      descriptions:
        zh: 对象只满足 ToolSelectionActivity 的一般条件，却缺少 FallbackToolSelectionActivity 的关键种差：由失败或可用性失效触发，刷新评估并开启新选择轮次。
        en: "The object satisfies only the general conditions of ToolSelectionActivity and lacks the defining differentia of FallbackToolSelectionActivity: it is triggered by failure or availability invalidation, refreshes assessments, and opens a new selection round."
        ja: object は ToolSelectionActivity の一般条件だけを満たし FallbackToolSelectionActivity の種差を欠きます：failure または availability invalidation で trigger され assessment を更新して new selection round を開きます。
      field_values: {}
      related_node_ids:
        - FallbackToolSelectionActivity
        - ToolSelectionActivity
      related_relation_ids:
        - FallbackToolSelectionActivity-is_a-ToolSelectionActivity
      expected_result:
        zh: 验证器保留 ToolSelectionActivity 身份，不把该对象提升为 FallbackToolSelectionActivity。
        en: Validation retains ToolSelectionActivity identity and does not promote the object to FallbackToolSelectionActivity.
        ja: validation は ToolSelectionActivity identity を保持し object を FallbackToolSelectionActivity に昇格しません。
      why_valid_or_invalid:
        zh: 共享上位概念不足以证明 FallbackToolSelectionActivity 的严格成员资格。
        en: A shared parent is insufficient to prove strict membership in FallbackToolSelectionActivity.
        ja: shared parent だけでは FallbackToolSelectionActivity の strict membership を証明できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-fallback-tool-selection-activity-002
  source_claims:
