schema: moonweave.ai/ontology-node/v1
id: ToolCandidate
kind: concept
labels:
  zh: 工具候选
  en: Tool Candidate
  ja: ツール候補
semantics:
  short_definition:
    zh: 在一次发现范围内指向一个可能相关能力来源的本地候选条目。
    en: A local candidate entry that points to one potentially relevant capability source within a discovery scope.
    ja: 一つの discovery scope 内で潜在的に関連する capability source を指す local candidate entry。
  definition:
    zh: ToolCandidate 是 Moonweave 对已发现能力项的轻量投影，带有来源工具或技能引用、来源种类和发现上下文。它可代表 MCP Tool 声明、A2A AgentSkill 或受控本地目录项；“候选”仅表示可进一步检查，不证明该项当前可访问、符合请求、优于其他项或已经被选中。
    en: ToolCandidate is Moonweave's lightweight projection of a discovered capability item with a source-tool or skill reference, source kind, and discovery context. It may represent an MCP Tool declaration, an A2A AgentSkill, or a controlled local catalog entry; “candidate” only means it can be examined further and does not prove current access, request eligibility, superiority, or selection.
    ja: ToolCandidate は source tool または skill reference、source kind、discovery context を持つ、発見済み capability item の Moonweave 軽量 projection である。MCP Tool declaration、A2A AgentSkill、controlled local catalog entry を表せる。「candidate」はさらに検査できることだけを示し、現在の access、request eligibility、優位性、selection を証明しない。
  why_needed:
    zh: 目录中的每个项需要独立的来源和身份，以便后续评估能解释自己检查的是哪个协议对象，而不会把描述性的技能和可调用的工具混为一谈。
    en: Each catalog item needs independent provenance and identity so later assessment can state which protocol object it inspected without conflating descriptive skills with callable tools.
    ja: 各 catalog item には独立した provenance と identity が必要である。これにより後続 assessment は検査した protocol object を示せ、descriptive skill と callable tool を混同しない。
  includes:
    - zh: 指向一个 MCP Tool、A2A AgentSkill 或受控本地能力项的本地引用。
      en: A local reference to one MCP Tool, A2A AgentSkill, or controlled local capability item.
      ja: 一つの MCP Tool、A2A AgentSkill、または controlled local capability item への local reference。
    - zh: 发现来源、所属候选集和非决策性的初始发现信号。
      en: Discovery provenance, the containing candidate set, and a non-decisive initial discovery signal.
      ja: discovery provenance、包含する candidate set、非決定的な初期 discovery signal。
  excludes:
    - zh: ToolCandidateSet 本身、可用性或资格评估结果、ToolMatch、排序结果或 ToolSelectionDecision。
      en: A ToolCandidateSet itself, an availability or eligibility assessment result, a ToolMatch, a ranking result, or a ToolSelectionDecision.
      ja: ToolCandidateSet 自体、availability または eligibility assessment result、ToolMatch、ranking result、ToolSelectionDecision。
    - zh: 对原生协议对象字段的重定义，例如把 AgentSkill 假定为有 MCP inputSchema。
      en: Redefinition of native protocol fields, such as assuming an AgentSkill has an MCP inputSchema.
      ja: AgentSkill が MCP inputSchema を持つと仮定するなど、native protocol field の再定義。
  semantic_kind: information
engineering:
  explanation:
    zh: 适配器从原生目录项创建 candidate_id，并保存原项引用和 source_kind。它可以记录名称或描述相似度作为发现理由，但评估活动才会检查 schema、政策或当前连通性。
    en: An adapter creates candidate_id from a native catalog item and retains a reference to that item and its source_kind. It may record name or description similarity as a discovery rationale, while assessment activities check schemas, policy, or current connectivity.
    ja: adapter は native catalog item から candidate_id を作り、item への reference と source_kind を保持する。name または description の類似性を discovery rationale として記録できるが、schema、policy、現在の connectivity は assessment activity が検査する。
  typical_input:
    - description:
        zh: MCP Tool 声明
        en: MCP Tool declaration
        ja: MCP Tool declaration
      format: |-
        {"name":"search-docs","title":"Search docs","description":"Search documentation","inputSchema":{"type":"object","properties":{"query":{"type":"string"}},"required":["query"]}}
      source_claims: [claim-candidate-mcp-tool]
    - description:
        zh: A2A AgentSkill 声明
        en: A2A AgentSkill declaration
        ja: A2A AgentSkill declaration
      format: |-
        {"id":"research","name":"Research","description":"Find public sources","tags":["search"],"inputModes":["text/plain"],"outputModes":["text/plain"]}
      source_claims: [claim-candidate-a2a-skill]
  typical_output:
    - description:
        zh: 本地候选条目
        en: Local candidate entry
        ja: Local candidate entry
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"tool_candidate","candidate_id":"candidate:search-docs","candidate_set_ref":"set:17","source_kind":"mcp-tool","source_capability_ref":"mcp:docs/search-docs","discovery_signal":"description contains search"}
      source_claims: [claim-candidate-local]
  reference_implementations:
    - name: Model Context Protocol Tool declaration
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines the server-provided Tool object used by tools/list and tools/call.
    - name: A2A AgentSkill
      url: https://a2a-protocol.org/latest/specification/
      description: Defines the capability-description record published in AgentCard.skills.
structure:
  identity_keys: [candidate_id]
  fields:
    - id: candidate_id
      labels: {zh: 候选标识, en: Candidate identifier, ja: candidate 識別子}
      definitions:
        zh: 稳定标识一个本地候选条目，不取代 MCP Tool.name 或 A2A AgentSkill.id。
        en: Stably identifies one local candidate entry and does not replace MCP Tool.name or A2A AgentSkill.id.
        ja: 一つの local candidate entry を安定して識別し、MCP Tool.name や A2A AgentSkill.id を置き換えない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: candidate:search-docs
      source_claims: [claim-candidate-local]
    - id: candidate_set_ref
      labels: {zh: 候选集引用, en: Candidate-set reference, ja: candidate-set 参照}
      definitions:
        zh: 指向发现该项的 ToolCandidateSet，保留其搜索范围和来源快照。
        en: Points to the ToolCandidateSet that discovered the item and retains its search scope and source snapshots.
        ja: item を発見した ToolCandidateSet を指し、その search scope と source snapshot を保持する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: set:17
      source_claims: [claim-candidate-local]
    - id: source_kind
      labels: {zh: 来源种类, en: Source kind, ja: source kind}
      definitions:
        zh: 说明候选来源是 MCP Tool、A2A AgentSkill 或受控本地能力项；该值决定应使用哪个原生 schema 验证来源。
        en: States whether the source is an MCP Tool, A2A AgentSkill, or controlled local capability item; the value determines which native schema validates the source.
        ja: source が MCP Tool、A2A AgentSkill、controlled local capability item のどれかを示す。この値により source を検証する native schema が決まる。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [mcp-tool, a2a-agent-skill, local-catalog-item]
      pattern: null
      example_value: mcp-tool
      source_claims: [claim-candidate-mcp-tool, claim-candidate-a2a-skill, claim-candidate-local]
    - id: source_capability_ref
      labels: {zh: 来源能力引用, en: Source capability reference, ja: source capability 参照}
      definitions:
        zh: 指向实际 MCP Tool、A2A AgentSkill 或本地目录项，使其字段继续由来源规范或目录契约解释。
        en: Points to the actual MCP Tool, A2A AgentSkill, or local catalog item so its fields remain interpreted by the source specification or catalog contract.
        ja: 実際の MCP Tool、A2A AgentSkill、local catalog item を指し、その field が source specification または catalog contract で解釈され続ける。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp:docs/search-docs
      source_claims: [claim-candidate-mcp-tool, claim-candidate-a2a-skill]
  constraints:
    - id: candidate-source-kind-must-match-reference
      severity: error
      expression_language: plain
      expression: source_kind and source_capability_ref must identify one compatible native source; an a2a-agent-skill candidate cannot assert MCP Tool.inputSchema unless a separate MCP Tool reference is present.
      explanation:
        zh: A2A 技能与 MCP Tool 的能力描述形式不同，投影不能抹去这一边界。
        en: A2A skills and MCP Tools describe capability differently, and a projection cannot erase that boundary.
        ja: A2A skill と MCP Tool は capability を異なる形で説明するため、projection はその境界を消せない。
      source_claims: [claim-candidate-mcp-tool, claim-candidate-a2a-skill]
    - id: candidate-has-no-assessment-or-selection-state
      severity: error
      expression_language: plain
      expression: A ToolCandidate may record a discovery_signal only and must not assert availability_state, eligibility_state, match_state, rank, selected, or an invocation result.
      explanation:
        zh: 候选表示可能性，而非运行状态、适合性或最终决定。
        en: A candidate expresses possibility, not runtime state, suitability, or a final decision.
        ja: candidate は可能性を表し、runtime state、suitability、final decision を表さない。
      source_claims: [claim-candidate-local]
  required_relations: []
examples:
  - id: candidate-positive-mcp-tool

    labels: {zh: MCP 搜索工具候选, en: MCP search-tool candidate, ja: MCP search-tool candidate}
    descriptions:
      zh: ToolBench (Qin 2023) 16000+ RapidAPI 工具发现；Gorilla APIBench 1645 API retriever-aware 检索；Toolformer 支持 Calculator/QA/Search/Translator/Calendar 五类工具发现。
      en: ToolBench (Qin 2023) discovers tools among 16000+ RapidAPI; Gorilla APIBench 1645 API retriever-aware retrieval; Toolformer supports Calculator/QA/Search/Translator/Calendar discovery.
      ja: ToolBench (Qin 2023) が 16000+ RapidAPI から tool 発見。Gorilla APIBench 1645 API retriever-aware 检索。Toolformer が Calculator/QA/Search/Translator/Calendar 五类 tool 発見を支持。
    field_values: {candidate_id: candidate:search-docs, candidate_set_ref: set:17, source_kind: mcp-tool, source_capability_ref: mcp:docs/search-docs, discovery_signal: name-and-description-match}
    related_node_ids: [ToolCandidate, ToolCandidateSet]
    related_relation_ids: [ToolCandidate-part-of-ToolCandidateSet]

    source_claims: [claim-candidate-mcp-tool, claim-candidate-local]
  - id: candidate-counterexample-skill-as-mcp-schema

    labels: {zh: 将 A2A 技能伪作 MCP schema, en: Falsely treat an A2A skill as MCP schema, ja: A2A skill を MCP schema と偽る}
    descriptions:
      zh: 反例：Gorilla 无 retriever 时 hallucinate 不存在 API；ToolBench 未验证 RapidAPI endpoint 可用性即加入候选集。
      en: Counterexample: Gorilla hallucinates nonexistent API without retriever; ToolBench adds candidates without verifying RapidAPI endpoint availability.
      ja: 反例：Gorilla が retriever なしで不存在 API を hallucinate。ToolBench が RapidAPI endpoint 可用性未検証で candidate set に追加。
    field_values: {candidate_id: candidate:research, candidate_set_ref: set:18, source_kind: a2a-agent-skill, source_capability_ref: a2a:agent/research, inputSchema: '{"type":"object"}'}
    related_node_ids: [ToolCandidate, ToolEligibilityAssessment]
    related_relation_ids: []

    source_claims: [claim-candidate-a2a-skill]
  - id: candidate-boundary-discovery-signal

    labels: {zh: 发现信号边界, en: Discovery-signal boundary, ja: discovery-signal 境界}
    descriptions:
      zh: Gorilla APIBench 离线训练检索 vs ToolBench 在线 RapidAPI 实时发现的注册边界；ToolMatch 分数非 ToolBench DFSDT 决策树节点。
      en: Boundary between Gorilla APIBench offline training retrieval vs ToolBench online RapidAPI live discovery; ToolMatch score is not a ToolBench DFSDT tree node.
      ja: Gorilla APIBench offline 訓練检索と ToolBench online RapidAPI リアルタイム発見の登録境界。ToolMatch score は ToolBench DFSDT 決定木 node ではない。
    field_values: {candidate_id: candidate:docs, candidate_set_ref: set:19, source_kind: mcp-tool, source_capability_ref: mcp:docs/search, discovery_signal: description-similarity:0.8}
    related_node_ids: [ToolCandidate, ToolMatch, ToolSelectionDecision]
    related_relation_ids: [ToolCandidate-part-of-ToolCandidateSet]

    source_claims: [claim-candidate-local]
  - id: candidate-instance-a2a-skill

    labels: {zh: A2A 研究技能实例, en: A2A research-skill instance, ja: A2A research-skill instance}
    descriptions:
      zh: Gorilla 实例：retriever 返回 torch.hub.load API 文档；ToolBench 实例：RapidAPI "Spoonacular" recipe search API tool_id=spoonacular-search。
      en: Gorilla instance: retriever returns torch.hub.load API docs; ToolBench instance: RapidAPI "Spoonacular" recipe search API tool_id=spoonacular-search.
      ja: Gorilla 実例：retriever が torch.hub.load API 文档を返す。ToolBench 実例：RapidAPI "Spoonacular" recipe search API tool_id=spoonacular-search。
    field_values: {candidate_id: candidate:a2a-research, candidate_set_ref: set:20, source_kind: a2a-agent-skill, source_capability_ref: a2a:agent-card/research-agent#skill/research}
    related_node_ids: [ToolCandidate, ToolCandidateSet]
    related_relation_ids: [ToolCandidate-part-of-ToolCandidateSet]

    source_claims: [claim-candidate-a2a-skill, claim-candidate-local]
parent_relation:
  id: ToolCandidate-part-of-ToolCandidateSet
  predicate: part_of
  target: concept:ToolCandidateSet
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是候选集的成员, en: is a member of candidate set, ja: candidate set のメンバーである}
  definitions:
    zh: ToolCandidate 是 ToolCandidateSet 中有独立来源引用的一个候选条目。
    en: ToolCandidate is one candidate entry with independent provenance reference in a ToolCandidateSet.
    ja: ToolCandidate は ToolCandidateSet 内で独立した provenance reference を持つ一つの candidate entry である。
  cardinality: {source: {min: 1, max: 1}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_part
    labels: {zh: 包含候选, en: contains candidate, ja: candidate を含む}
  conditions: []
  temporal_scope: timeless
  boundary_context: This composition records set membership and does not assert a source tool is executable or selected.
  constraints: []
  examples: []
  source_claims: [claim-candidate-local]
  distinct_fact_rationale:
    zh: 该关系说明集合成员资格，不把条目的来源、评估或选择状态混入集合结构。
    en: This relation states collection membership without mixing a member's source, assessment, or selection state into collection structure.
    ja: この relation は collection membership を示し、member の source、assessment、selection state を collection structure に混ぜない。
  layout_role: primary-backbone
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol — Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-spec
    relevance: Defines server-provided Tool declarations and their input schemas.
  - id: a2a-latest-specification
    title: Agent2Agent Protocol Specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-spec
    relevance: Defines AgentSkill capability-description fields in AgentCard.
source_claims:
  - id: claim-candidate-mcp-tool
    source: mcp-tools-2025-11-25
    supports: MCP tools/list exposes Tool declarations with a unique name, optional title and description, required inputSchema, and optional output schema and annotations.
    locator: Tools — Tool definition
    evidence_kind: normative
    confidence: high
  - id: claim-candidate-a2a-skill
    source: a2a-latest-specification
    supports: A2A AgentSkill contains id, name, description, tags, and optional examples, inputModes, outputModes, and security requirements to describe an agent capability.
    locator: AgentCard and AgentSkill data model
    evidence_kind: normative
    confidence: high
  - id: claim-candidate-local
    source: mcp-tools-2025-11-25
    supports: candidate_id, candidate_set_ref, source_kind, source_capability_ref, and discovery_signal are Moonweave-local projections that retain protocol-native declarations and defer assessment and selection.
    locator: Tools — Tool definition
    evidence_kind: design-inference
    confidence: high
