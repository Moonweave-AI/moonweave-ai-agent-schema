schema: moonweave.ai/ontology-node/v1
id: ToolCandidateSet
kind: concept
labels:
  zh: 工具候选集
  en: Tool Candidate Set
  ja: ツール候補集合
semantics:
  short_definition:
    zh: 一次工具发现活动产生的、带来源快照的候选工具集合。
    en: A provenance-bearing collection of candidate tools produced by one tool-discovery activity.
    ja: 一つの tool-discovery activity が作る provenance 付きの候補ツール集合。
  definition:
    zh: ToolCandidateSet 是 Moonweave 的本地发现产物，收集与某一 ToolSearch 和其来源快照相关的 ToolCandidate。它可投影 MCP tools/list 的一个或多个响应页，或 A2A AgentCard 的 skills，但不等同于任何一个原生 tools 数组或 skills 数组，也不表示集合中的成员已经可用、合格、排序或选定。
    en: ToolCandidateSet is a Moonweave-local discovery artifact that collects ToolCandidates associated with one ToolSearch and its source snapshots. It may project one or more MCP tools/list response pages or an A2A AgentCard's skills, but it is not identical to a native tools array or skills array and does not state that members are available, eligible, ranked, or selected.
    ja: ToolCandidateSet は一つの ToolSearch とその source snapshot に関連する ToolCandidate を集める Moonweave-local discovery artifact である。一つ以上の MCP tools/list response page や A2A AgentCard の skills を projection できるが、native tools array や skills array そのものではなく、member が available、eligible、ranked、selected であることも示さない。
  why_needed:
    zh: 协议目录可能分页、跨服务器或只提供能力描述；显式候选集使应用能说明“看过哪些来源、还剩哪些页”，随后再审计地评估每个候选。
    en: Protocol catalogs may be paginated, span servers, or provide only capability descriptions. An explicit candidate set lets an application state which sources were read and which pages remain before it assesses each candidate audibly.
    ja: protocol catalog は page 分割、複数 server、または capability description のみの場合がある。明示的な candidate set により、application は読んだ source と残る page を示してから、各 candidate を監査可能に assessment できる。
  includes:
    - zh: 关联同一搜索和来源快照的一组本地 ToolCandidate 引用。
      en: A group of local ToolCandidate references associated with the same search and source snapshots.
      ja: 同じ search と source snapshot に関連する local ToolCandidate reference の group。
    - zh: 对 MCP nextCursor、目录完整性或读取时间的明确记录。
      en: Explicit records of MCP nextCursor, catalog completeness, or read time.
      ja: MCP nextCursor、catalog completeness、read time の明示的な記録。
  excludes:
    - zh: 原生 MCP tools/list 响应包络、A2A AgentCard 本体或单个 ToolCandidate。
      en: A native MCP tools/list response envelope, an A2A AgentCard itself, or one individual ToolCandidate.
      ja: native MCP tools/list response envelope、A2A AgentCard 自体、または一つの ToolCandidate。
    - zh: 最终选择、首选顺序、可调用性或任务资格的断言。
      en: Assertions of final selection, preferred order, callability, or task eligibility.
      ja: final selection、preferred order、callability、task eligibility の assertion。
  semantic_kind: collection
engineering:
  explanation:
    zh: 适配器为每个目录快照生成局部候选条目，并保存产生它们的搜索、页游标和来源引用。若 MCP 响应有 nextCursor，候选集必须表明它只是已读取页面的快照，而非完整目录的无依据声明。
    en: An adapter creates local candidate entries for each catalog snapshot and retains the search, page cursor, and provenance reference that produced them. If an MCP response has nextCursor, the set must say it is a snapshot of pages read rather than an unsupported claim of catalog completeness.
    ja: adapter は各 catalog snapshot に local candidate entry を作り、それを生んだ search、page cursor、provenance reference を保持する。MCP response に nextCursor がある場合、set は完全な catalog だという根拠のない主張ではなく、読んだ page の snapshot であることを示さなければならない。
  typical_input:
    - description:
        zh: MCP tools/list 响应页
        en: MCP tools/list response page
        ja: MCP tools/list response page
      format: |-
        {"jsonrpc":"2.0","id":17,"result":{"tools":[{"name":"search-docs","description":"Search documentation","inputSchema":{"type":"object","properties":{"query":{"type":"string"}},"required":["query"]}}],"nextCursor":"page-3"}}
      source_claims: [claim-candidate-set-mcp]
    - description:
        zh: A2A AgentCard skills
        en: A2A AgentCard skills
        ja: A2A AgentCard skills
      format: |-
        {"skills":[{"id":"research","name":"Research","description":"Search public sources","tags":["search"],"inputModes":["text/plain"],"outputModes":["text/plain"]}]}
      source_claims: [claim-candidate-set-a2a]
  typical_output:
    - description:
        zh: 本地候选集快照
        en: Local candidate-set snapshot
        ja: Local candidate-set snapshot
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"tool_candidate_set","candidate_set_id":"set-17","search_ref":"search:17","source_snapshot_refs":["mcp:list:17"],"candidate_refs":["candidate:search-docs"],"continuation_cursor":"page-3","catalog_complete":false}
      source_claims: [claim-candidate-set-local]
  reference_implementations:
    - name: Model Context Protocol tools/list
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines paginated enumeration of Tool declarations through tools/list.
    - name: A2A Agent Card
      url: https://a2a-protocol.org/latest/specification/
      description: Defines the skills list published by an agent card.
structure:
  identity_keys: [candidate_set_id]
  fields:
    - id: candidate_set_id
      labels: {zh: 候选集标识, en: Candidate-set identifier, ja: candidate-set 識別子}
      definitions:
        zh: 稳定标识一个 Moonweave 候选集合，不替代协议响应 id、服务器标签或 AgentCard 标识。
        en: Stably identifies one Moonweave candidate collection and does not replace a protocol response id, server label, or AgentCard identifier.
        ja: 一つの Moonweave candidate collection を安定して識別し、protocol response id、server label、AgentCard identifier を置き換えない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: set-17
      source_claims: [claim-candidate-set-local]
    - id: search_ref
      labels: {zh: 搜索引用, en: Search reference, ja: search 参照}
      definitions:
        zh: 指向产生该集合的 ToolSearch，使查询和发现范围可追溯。
        en: Points to the ToolSearch that produced the set so its query and discovery scope are traceable.
        ja: set を作った ToolSearch を指し、その query と discovery scope を追跡可能にする。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: search:17
      source_claims: [claim-candidate-set-local]
    - id: source_snapshot_refs
      labels: {zh: 来源快照引用, en: Source snapshot references, ja: source snapshot 参照}
      definitions:
        zh: 指向构建集合时实际读取的 MCP 响应页、AgentCard 或其他能力目录。
        en: Points to the MCP response pages, AgentCards, or other capability catalogs actually read when the set was built.
        ja: set を作る際に実際に読んだ MCP response page、AgentCard、または他の capability catalog を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: mcp:list:17
      source_claims: [claim-candidate-set-mcp, claim-candidate-set-a2a]
    - id: candidate_refs
      labels: {zh: 候选引用, en: Candidate references, ja: candidate 参照}
      definitions:
        zh: 该集合内本地 ToolCandidate 的引用；它们仍需单独评估。
        en: References to local ToolCandidates in this set; they still require separate assessment.
        ja: この set 内の local ToolCandidate への reference。これらには別の assessment がなお必要である。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: candidate:search-docs
      source_claims: [claim-candidate-set-local]
  constraints:
    - id: candidate-set-provenance-and-pagination
      severity: error
      expression_language: plain
      expression: Every ToolCandidateSet must retain source_snapshot_refs; when a referenced MCP tools/list page provides nextCursor, the set must retain that cursor or set catalog_complete to false.
      explanation:
        zh: 工具目录可以分页；遗漏游标会把部分读取错误表示为完整发现。
        en: A tool catalog can be paginated; dropping its cursor can misrepresent a partial read as complete discovery.
        ja: tool catalog は page 分割できる。cursor を捨てると部分的な read を complete discovery と誤表現できてしまう。
      source_claims: [claim-candidate-set-mcp, claim-candidate-set-local]
    - id: candidate-set-is-not-selection
      severity: error
      expression_language: plain
      expression: candidate_refs may identify discovered entries only and must not encode selected_candidate_ref, rank order, availability_state, or eligibility_state.
      explanation:
        zh: 候选集边界止于发现；评估状态和决策属于后续记录。
        en: The candidate-set boundary ends at discovery; assessment states and decisions belong to later records.
        ja: candidate-set の境界は discovery で終わる。assessment state と decision は後続 record に属する。
      source_claims: [claim-candidate-set-local]
  required_relations: []
examples:
  - id: candidate-set-positive-paginated-mcp

    labels: {zh: MCP 已读页候选集, en: Candidate set from an MCP page, ja: MCP page からの candidate set}
    descriptions:
      zh: ToolBench (Qin 2023) 16000+ RapidAPI 工具发现；Gorilla APIBench 1645 API retriever-aware 检索；Toolformer 支持 Calculator/QA/Search/Translator/Calendar 五类工具发现。
      en: ToolBench (Qin 2023) discovers tools among 16000+ RapidAPI; Gorilla APIBench 1645 API retriever-aware retrieval; Toolformer supports Calculator/QA/Search/Translator/Calendar discovery.
      ja: ToolBench (Qin 2023) が 16000+ RapidAPI から tool 発見。Gorilla APIBench 1645 API retriever-aware 检索。Toolformer が Calculator/QA/Search/Translator/Calendar 五类 tool 発見を支持。
    field_values: {candidate_set_id: set-17, search_ref: search:17, source_snapshot_refs: [mcp:list:17], candidate_refs: [candidate:search-docs], continuation_cursor: page-3, catalog_complete: false}
    related_node_ids: [ToolCandidateSet, ToolSearch, ToolCandidate]
    related_relation_ids: [ToolCandidateSet-was_generated_by-ToolSearch]

    source_claims: [claim-candidate-set-mcp, claim-candidate-set-local]
  - id: candidate-set-counterexample-selected-member

    labels: {zh: 候选集内直接选定成员, en: Directly select a set member, ja: set member を直接選定する}
    descriptions:
      zh: 反例：Gorilla 无 retriever 时 hallucinate 不存在 API；ToolBench 未验证 RapidAPI endpoint 可用性即加入候选集。
      en: Counterexample: Gorilla hallucinates nonexistent API without retriever; ToolBench adds candidates without verifying RapidAPI endpoint availability.
      ja: 反例：Gorilla が retriever なしで不存在 API を hallucinate。ToolBench が RapidAPI endpoint 可用性未検証で candidate set に追加。
    field_values: {candidate_set_id: set-18, search_ref: search:18, source_snapshot_refs: [mcp:list:18], candidate_refs: [candidate:search-docs], selected_candidate_ref: candidate:search-docs}
    related_node_ids: [ToolCandidateSet, ToolSelectionDecision]
    related_relation_ids: []

    source_claims: [claim-candidate-set-local]
  - id: candidate-set-boundary-a2a-skills

    labels: {zh: A2A 技能投影边界, en: A2A skill projection boundary, ja: A2A skill projection の境界}
    descriptions:
      zh: Gorilla APIBench 离线训练检索 vs ToolBench 在线 RapidAPI 实时发现的注册边界；ToolMatch 分数非 ToolBench DFSDT 决策树节点。
      en: Boundary between Gorilla APIBench offline training retrieval vs ToolBench online RapidAPI live discovery; ToolMatch score is not a ToolBench DFSDT tree node.
      ja: Gorilla APIBench offline 訓練检索と ToolBench online RapidAPI リアルタイム発見の登録境界。ToolMatch score は ToolBench DFSDT 決定木 node ではない。
    field_values: {candidate_set_id: set-19, search_ref: search:19, source_snapshot_refs: [a2a:agent-card/research], candidate_refs: [candidate:a2a-research]}
    related_node_ids: [ToolCandidateSet, ToolCandidate]
    related_relation_ids: [ToolCandidateSet-was_generated_by-ToolSearch]

    source_claims: [claim-candidate-set-a2a, claim-candidate-set-local]
  - id: candidate-set-instance-complete-local-catalog

    labels: {zh: 完整本地目录实例, en: Complete local-catalog instance, ja: complete local-catalog instance}
    descriptions:
      zh: Gorilla 实例：retriever 返回 torch.hub.load API 文档；ToolBench 实例：RapidAPI "Spoonacular" recipe search API tool_id=spoonacular-search。
      en: Gorilla instance: retriever returns torch.hub.load API docs; ToolBench instance: RapidAPI "Spoonacular" recipe search API tool_id=spoonacular-search.
      ja: Gorilla 実例：retriever が torch.hub.load API 文档を返す。ToolBench 実例：RapidAPI "Spoonacular" recipe search API tool_id=spoonacular-search。
    field_values: {candidate_set_id: set-20, search_ref: search:20, source_snapshot_refs: [local:catalog/v3], candidate_refs: [candidate:local-read, candidate:local-search], catalog_complete: true}
    related_node_ids: [ToolCandidateSet, ToolSearch]
    related_relation_ids: [ToolCandidateSet-was_generated_by-ToolSearch]

    source_claims: [claim-candidate-set-local]
parent_relation: null
relations:
  - id: ToolCandidateSet-was_generated_by-ToolSearch
    predicate: was_generated_by
    target: concept:ToolSearch
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 由工具搜索生成, en: was generated by tool search, ja: tool search により生成された}
    definitions:
      zh: 当 ToolSearch 汇集实际读取的目录快照并记录候选与分页状态时，ToolCandidateSet 由该活动生成。
      en: ToolCandidateSet was generated by ToolSearch when that activity assembled actually read catalog snapshots and recorded candidates and pagination state.
      ja: ToolSearch が実際に読んだ catalog snapshot を集め、candidate と pagination state を記録したとき、ToolCandidateSet はその activity により生成された。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: generated
      labels: {zh: 生成候选集, en: generated candidate set, ja: candidate set を生成した}
    conditions:
      - id: candidate-set-generation-provenance-condition
        severity: error
        expression: Assert was_generated_by only when search_ref and source_snapshot_refs identify the search activity and catalog material used to create the snapshot; an uninspected catalog declaration is not a generated candidate set.
        explanations: {zh: 生成关系要求可追溯的搜索过程和来源快照，不把原生目录响应直接等同于本地集合。, en: Generation requires a traceable search process and source snapshots; it does not equate a native catalog response with the local collection., ja: generation には追跡可能な search process と source snapshot が必要であり、native catalog response を local collection と同一視しない。}
        source_claims: [claim-candidate-set-prov-generation, claim-candidate-set-local]
    temporal_scope: valid-time
    boundary_context: This provenance link records a Moonweave-local discovery output; it does not claim an MCP tools/list response or an A2A AgentCard is itself a ToolCandidateSet.
    constraints: []
    examples: []
    source_claims: [claim-candidate-set-prov-generation, claim-candidate-set-local]
    distinct_fact_rationale:
      zh: 生成溯源连接搜索活动与其本地候选快照，而不把该输出记录误建模为活动的组成部分。
      en: Generation provenance links the search activity to its local candidate snapshot without mis-modeling the output record as an activity component.
      ja: generation provenance は search activity と local candidate snapshot を結び、output record を activity の構成要素として誤って model 化しない。
    layout_role: cross-link
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol — Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-spec
    relevance: Defines the paginated tools/list result and Tool declarations.
  - id: a2a-latest-specification
    title: Agent2Agent Protocol Specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-spec
    relevance: Defines AgentCard skills and their capability-description fields.
  - id: w3c-prov-o
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines Entity and Activity provenance links, including an Entity's generation by an Activity.
source_claims:
  - id: claim-candidate-set-mcp
    source: mcp-tools-2025-11-25
    supports: An MCP tools/list response returns a tools array and may return nextCursor for another page; Tool is a separately defined declaration with a name and input schema.
    locator: Tools — Listing Tools and Tool definition
    evidence_kind: normative
    confidence: high
  - id: claim-candidate-set-a2a
    source: a2a-latest-specification
    supports: A2A AgentCard publishes skills with identifiers, descriptive metadata, and optional input and output modes to describe an agent's focused capabilities.
    locator: AgentCard and AgentSkill data model
    evidence_kind: normative
    confidence: high
  - id: claim-candidate-set-local
    source: mcp-tools-2025-11-25
    supports: candidate_set_id, search_ref, candidate_refs, catalog_complete, and cross-source aggregation are Moonweave-local discovery records that preserve the native catalog objects rather than replace them.
    locator: Tools — Listing Tools
    evidence_kind: design-inference
    confidence: high
  - id: claim-candidate-set-prov-generation
    source: w3c-prov-o
    supports: PROV-O relates a generated Entity to the Activity that generated it; this local was_generated_by link records a ToolCandidateSet output without asserting structural composition.
    locator: Section 3.1, prov:Entity and prov:wasGeneratedBy
    evidence_kind: standard
    confidence: high
