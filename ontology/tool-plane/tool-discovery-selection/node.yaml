schema: moonweave.ai/ontology-node/v1
id: tool-discovery-selection
kind: module
labels:
  zh: 工具发现与选择
  en: Tool discovery and selection
  ja: ツール発見と選択
semantics:
  short_definition:
    zh: 描述一次需求如何从可见工具定义形成候选、比较适配性并得出首选、后备或澄清结论的查询期模块。
    en: Query-time module describing how one need forms candidates from visible tool definitions, compares fit, and reaches a preferred, fallback, or clarification outcome.
    ja: 一要求が可視 tool definition から候補を形成し適合性を比較して第一候補/代替/確認要求に至る query-time module。
  definition:
    zh: 工具发现与选择拥有 ToolSearchQuery、ToolSearch、ToolCandidateSet、ToolCandidateAssessment 与 ToolSelectionDecision 等随任务变化的判断对象。它读取 tool-registry-definition 中的稳定 ToolDefinition 与 RegistryEntry，但不拥有它们。模块记录候选如何形成、能力/资格/可用性如何分别评估、哪条规则选择了哪个候选，以及失败时是后备重选还是提出 ToolClarificationRequest。OpenAI hosted tool search、MCP tools/list 与 ToolBench DFSDT 都区分“检索/列举”与“实际调用”，本模块只覆盖前者到 ToolCallPlan 的显式交接。
    en: Tool discovery and selection owns task-varying judgment objects such as ToolSearchQuery, ToolSearch, ToolCandidateSet, ToolCandidateAssessment, and ToolSelectionDecision. It reads stable ToolDefinition and RegistryEntry records from tool-registry-definition without owning them. The module records how candidates form, how capability, eligibility, and availability are assessed separately, which rule selected which candidate, and whether failure triggers fallback reselection or a ToolClarificationRequest. OpenAI hosted tool search, MCP tools/list, and ToolBench DFSDT all separate retrieval or listing from actual calling; this module covers only the path through an explicit handoff to ToolCallPlan.
    ja: tool discovery/selection は ToolSearchQuery/ToolSearch/ToolCandidateSet/ToolCandidateAssessment/ToolSelectionDecision 等 task-varying judgment object を所有し、tool-registry-definition の stable ToolDefinition/RegistryEntry を参照のみします。候補形成、capability/eligibility/availability 分離評価、rule による candidate 選択、failure 時 fallback reselection/ToolClarificationRequest を記録。OpenAI hosted tool search/MCP tools/list/ToolBench DFSDT は retrieval/listing と actual calling を分離し、本 module は ToolCallPlan への explicit handoff までを扱います。
  why_needed:
    zh: 若不能解释“为什么看见这些候选、为什么选它、为什么改用后备或必须先追问”，工具调用就无法审计，也无法与安全授权或注册版本对齐。
    en: Without explaining why these candidates were visible, why one was selected, why a fallback was chosen, or why clarification was required first, tool invocation cannot be audited or aligned with authorization and registry versions.
    ja: なぜその候補群が見え、なぜ一つを選び、なぜ代替/確認が必要だったかを説明できなければ tool invocation は監査できず authorization/registry version と整合しません。
  includes:
    - zh: 版本化 ToolSearchQuery、ToolSearch、ToolCandidateSet、ToolCandidateAssessment、ToolSelectionDecision、ToolClarificationRequest 与 FallbackToolSelectionActivity。
      en: Versioned ToolSearchQuery, ToolSearch, ToolCandidateSet, ToolCandidateAssessment, ToolSelectionDecision, ToolClarificationRequest, and FallbackToolSelectionActivity.
      ja: 版管理 ToolSearchQuery/ToolSearch/ToolCandidateSet/ToolCandidateAssessment/ToolSelectionDecision/ToolClarificationRequest/FallbackToolSelectionActivity。
    - zh: 候选到稳定定义/注册条目的来歴引用，以及 ToolSelectionDecision 到 ToolCallPlan 的显式交接。
      en: Candidate provenance to stable definitions and registry entries, plus explicit ToolSelectionDecision-to-ToolCallPlan handoff.
      ja: 候補から stable definition/registry entry への provenance 参照と ToolSelectionDecision→ToolCallPlan explicit handoff。
  excludes:
    - zh: 稳定 ToolDefinition、RegistryEntry、授权决定、ToolCallAttempt 与 ToolResult。
      en: Stable ToolDefinition, RegistryEntry, authorization decisions, ToolCallAttempt, and ToolResult.
      ja: stable ToolDefinition/RegistryEntry/authorization decision/ToolCallAttempt/ToolResult。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 发现层对应“模型或宿主在调用前缩小工具面”的产品行为。OpenAI Agents SDK 支持 hosted tool search 与 conditional tool enabling，在运行时暴露 deferred tool 集合。MCP tools/list 返回分页工具声明，但不执行 tools/call。ToolBench DFSDT 明确区分 Retrieve 与 Call 阶段。Moonweave 用 ToolSearchQuery 版本、registry 快照 digest 与 ToolCandidate 到 ToolDefinition 的固定引用，避免名称相似或旧缓存共现被误当作候选来源。
    en: Discovery corresponds to narrowing the tool surface before invocation. OpenAI Agents SDK supports hosted tool search and conditional tool enabling for deferred surfaces at runtime. MCP tools/list returns paginated tool declarations without executing tools/call. ToolBench DFSDT explicitly separates Retrieve and Call stages. Moonweave binds candidates with ToolSearchQuery version, registry snapshot digest, and immutable ToolDefinition references so name similarity or stale cache co-occurrence is not mistaken for provenance.
    ja: discovery は invocation 前 tool surface 絞込みに対応。OpenAI Agents SDK hosted tool search/conditional enabling、MCP tools/list paginated declaration（tools/call なし）、ToolBench DFSDT Retrieve/Call 分離。Moonweave は ToolSearchQuery version/registry snapshot digest/immutable ToolDefinition 参照で name similarity/stale cache 共起を provenance と誤認しません。
  typical_input:
    - description: MCP tools/list — paginated discovery on an initialized session.
      format: |
        {"jsonrpc":"2.0","id":2,"method":"tools/list","params":{"cursor":null}}
        =>
        {"tools":[{"name":"get_weather","description":"Forecast","inputSchema":{"type":"object","properties":{"city":{"type":"string"}}}}]}
      source_claims: [claim-tool-discovery-selection-mcp]
    - description: OpenAI Agents — conditional hosted tool search surface.
      format: |
        {"tool_choice":"auto","tools":[{"type":"hosted_tool","name":"code_interpreter"}],"tool_search":{"query":"weather forecast APIs"}}
      source_claims: [claim-tool-discovery-selection-openai]
  typical_output:
    - description: Moonweave-local ToolSelectionDecision with reproducible rejection rationale.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "selection_decision_id": "decision-204",
          "selected_definition_ref": "weather@3.0.0#sha256:weather-definition-v3",
          "rejected_candidates": [{"candidate_id":"candidate-climate-v2","reason":"latency margin below ceiling"}],
          "tool_call_plan_id": "plan-weather-204"
        }
      source_claims: [claim-tool-discovery-selection-design]
  reference_implementations:
    - name: MCP Server Tools
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
      description: tools/list discovery separate from tools/call.
    - name: OpenAI Agents SDK Tools
      url: https://openai.github.io/openai-agents-python/tools/
      description: Hosted tool search and conditional enabling.
    - name: ToolBench / ToolLLM
      url: https://arxiv.org/abs/2307.16789
      description: Retrieve+Call and Plan+Retrieve+Call evaluation settings.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 模块标识, en: Module identifier, ja: モジュール識別子}
      definitions:
        zh: 工具发现与选择模块的稳定标识。
        en: Stable identifier for the tool discovery and selection module.
        ja: tool discovery/selection module の安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^tool-discovery-selection$'
      example_value: tool-discovery-selection
      allowed_values: []
      source_claims: [claim-tool-discovery-selection-design]
    - id: tool_search_query_id
      labels: {zh: 搜索查询标识, en: Tool search query identifier, ja: ツール検索クエリ識別子}
      definitions:
        zh: 一次发现/选择所消费的版本化 ToolSearchQuery 标识。
        en: Versioned ToolSearchQuery identifier consumed by one discovery or selection act.
        ja: 一回 discovery/selection が消費する版管理 ToolSearchQuery identifier。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: query-weather@7
      allowed_values: []
      source_claims: [claim-tool-discovery-selection-design]
    - id: selection_decision_id
      labels: {zh: 选择决定标识, en: Selection decision identifier, ja: 選択判断識別子}
      definitions:
        zh: 正常输出时产生的 ToolSelectionDecision 标识，用于交接 ToolCallPlan。
        en: ToolSelectionDecision identifier produced on the normal output path and handed to ToolCallPlan.
        ja: 正常 output path で生成され ToolCallPlan へ handoff する ToolSelectionDecision identifier。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: decision-204
      allowed_values: []
      source_claims: [claim-tool-discovery-selection-design]
  constraints: []
  required_relations: []
examples:
  - id: tool-discovery-selection-example-mcp-tools-list
    labels:
      zh: MCP tools/list 形成候选集
      en: MCP tools/list candidate formation
      ja: MCP tools/list 候補形成
    descriptions:
      zh: "search-204 读取 registry-production@118 与 query-weather@7，从 tools/list 结果形成 weather@3 与 climate@2 两个候选，并显式过滤 payment-admin@9。"
      en: "search-204 reads registry-production@118 and query-weather@7, forms weather@3 and climate@2 from tools/list, and explicitly filters payment-admin@9."
      ja: "search-204 が registry-production@118/query-weather@7 を読み tools/list から weather@3/climate@2 候補を形成し payment-admin@9 を明示 filter。"
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
    field_values:
      tool_search_id: search-204
      registry_snapshot: registry-production@118
      candidate_count: 2
    related_node_ids: [tool-discovery-selection, tool-registry-definition]
    related_relation_ids: []
    source_claims: [claim-tool-discovery-selection-mcp]
  - id: tool-discovery-selection-example-openai-hosted-search
    labels:
      zh: OpenAI hosted tool search 暴露候选面
      en: OpenAI hosted tool search exposes candidates
      ja: OpenAI hosted tool search 候補面公開
    descriptions:
      zh: "Agents SDK 针对当前 turn 运行 hosted tool search，仅暴露与 forecast 相关的 deferred tools；选择前不得直接 tools/call。"
      en: "Agents SDK runs hosted tool search for the current turn and exposes only forecast-related deferred tools; tools/call must not run before selection."
      ja: "Agents SDK が current turn で hosted tool search を実行し forecast 関連 deferred tools のみ公開。selection 前に tools/call しません。"
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/tools/
    field_values:
      tool_search_query: forecast APIs read-only
      deferred_tools_exposed: 3
    related_node_ids: [tool-discovery-selection]
    related_relation_ids: []
    source_claims: [claim-tool-discovery-selection-openai]
  - id: tool-discovery-selection-example-assessment-separation
    labels:
      zh: 能力、资格与可用性分评
      en: Separate capability, eligibility, and availability assessment
      ja: capability/eligibility/availability 分離評価
    descriptions:
      zh: "assessment-weather-204 分别记录 capability fit 0.92、read-only 资格通过与 126ms 可用性探测；三者任一过期则不得 selection-ready。"
      en: "assessment-weather-204 records capability fit 0.92, read-only eligibility pass, and 126ms availability probe separately; any stale dimension blocks selection-ready."
      ja: "assessment-weather-204 が capability fit 0.92/read-only eligibility pass/126ms availability probe を分離記録。いずれか stale なら selection-ready 不可。"
    example_source:
      product: API-Bank
      url: https://arxiv.org/abs/2304.08244
    field_values:
      assessment_id: assessment-weather-204
      capability_fit_score: 0.92
      observed_latency_ms: 126
    related_node_ids: [tool-discovery-selection]
    related_relation_ids: []
    source_claims: [claim-tool-discovery-selection-design]
  - id: tool-discovery-selection-example-decision-handoff
    labels:
      zh: 选择决定显式交接调用计划
      en: Explicit decision-to-plan handoff
      ja: decision→plan 明示 handoff
    descriptions:
      zh: "decision-204 选择 weather@3 并 rejects climate-v2（延迟接近上限），通过 informs 边把 definition_ref 交给 plan-weather-204。"
      en: "decision-204 selects weather@3, rejects climate-v2 for latency margin, and hands definition_ref to plan-weather-204 through an informs edge."
      ja: "decision-204 が weather@3 を選択し climate-v2 を latency margin で reject、informs edge で definition_ref を plan-weather-204 へ渡す。"
    example_source:
      product: ToolBench
      url: https://arxiv.org/abs/2307.16789
    field_values:
      selection_decision_id: decision-204
      tool_call_plan_id: plan-weather-204
      selected_definition_ref: weather@3.0.0
    related_node_ids: [tool-discovery-selection, tool-invocation-execution]
    related_relation_ids: []
    source_claims: [claim-tool-discovery-selection-design]
  - id: tool-discovery-selection-example-fallback-counter
    labels:
      zh: 禁止静默切换到高权限工具
      en: Reject silent switch to privileged tool
      ja: privileged tool への silent switch 拒否
    descriptions:
      zh: "weather@3 超时后未记录 failed attempt 就直接调用未评估的 admin-location-write@1；必须拒绝并要求显式 fallback 或 clarification。"
      en: "After weather@3 times out with no failed attempt recorded, unassessed admin-location-write@1 is invoked silently; reject and require explicit fallback or clarification."
      ja: "weather@3 timeout 後 failed attempt 未記録のまま未評価 admin-location-write@1 を silent invoke。拒否し explicit fallback/clarification を要求。"
    example_source:
      product: Moonweave discovery design
      url: https://moonweave.ai/ontology/agent-system/2.4.0/
    field_values:
      failed_tool_call_attempt_id: null
      silently_invoked_tool: admin-location-write@1
    related_node_ids: [tool-discovery-selection, tool-invocation-execution]
    related_relation_ids: []
    source_claims: [claim-tool-discovery-selection-design]
parent_relation: null
relations: []
module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 输入是一份版本化 ToolSearchQuery，由 ToolSearch 消费。
          en: Input is a versioned ToolSearchQuery consumed by ToolSearch.
          ja: input は ToolSearch が消費する versioned ToolSearchQuery です。
        family_concept_ids:
          - ToolSearchQuery
        relation_ids:
          - ToolSearch-consumes_query-ToolSearchQuery
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 正常输出是 ToolSelectionDecision，并通过 ToolCallPlan 交接调用。
          en: Normal output is ToolSelectionDecision handed to ToolCallPlan.
          ja: normal output は ToolCallPlan に渡される ToolSelectionDecision です。
        family_concept_ids:
          - ToolSelectionDecision
        relation_ids:
          - ToolSelectionActivity-produces-ToolSelectionDecision
          - ToolSelectionDecision-informs-ToolCallPlan
        not_applicable_reason: null
      failure:
        applicable: true
        description:
          zh: 证据不足或约束冲突产生 ToolClarificationRequest，不伪造选择。
          en: Insufficient evidence or conflicting constraints produce
            ToolClarificationRequest rather than a fabricated choice.
          ja: evidence insufficiency または constraint conflict は fabricated choice でなく
            ToolClarificationRequest を生成します。
        family_concept_ids:
          - ToolClarificationRequest
        relation_ids:
          - ToolSelectionActivity-requests_clarification-ToolClarificationRequest
          - ToolClarificationRequest-clarifies-ToolSearchQuery
        not_applicable_reason: null
      recovery:
        applicable: true
        description:
          zh: 调用失败触发 FallbackToolSelectionActivity 和沿袭首选决定的新后备决定。
          en: Invocation failure triggers FallbackToolSelectionActivity and a new fallback
            decision superseding the preferred decision.
          ja: invocation failure は FallbackToolSelectionActivity と preferred decision を
            supersede する new fallback decision を trigger します。
        family_concept_ids:
          - FallbackToolSelectionActivity
          - FallbackToolSelectionDecision
        relation_ids:
          - FallbackToolSelectionActivity-responds_to-ToolCallAttempt
          - FallbackToolSelectionDecision-supersedes-PreferredToolSelectionDecision
        not_applicable_reason: null
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-tool-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 本模块已逐节点、逐边复核；工具定义归注册域，候选与评估归查询期发现域，调用参数、尝试和结果归调用域。
            en: "This module was reviewed node by node and edge by edge: stable tool
              definitions belong to registry, query-scoped candidates and
              assessments belong here, and arguments, attempts, and results
              belong to invocation."
            ja: 本 module は node/edge ごとに審査され、stable tool definition は registry、query-scoped
              candidate/assessment は本 module、argument・attempt・result は
              invocation に属します。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 本模块已逐节点、逐边复核；工具定义归注册域，候选与评估归查询期发现域，调用参数、尝试和结果归调用域。
            en: "This module was reviewed node by node and edge by edge: stable tool
              definitions belong to registry, query-scoped candidates and
              assessments belong here, and arguments, attempts, and results
              belong to invocation."
            ja: 本 module は node/edge ごとに審査され、stable tool definition は registry、query-scoped
              candidate/assessment は本 module、argument・attempt・result は
              invocation に属します。
        - reviewer_id: moonweave-trilingual-terminology-reviewer
          reviewer_role: schema
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 本模块已逐节点、逐边复核；工具定义归注册域，候选与评估归查询期发现域，调用参数、尝试和结果归调用域。
            en: "This module was reviewed node by node and edge by edge: stable tool
              definitions belong to registry, query-scoped candidates and
              assessments belong here, and arguments, attempts, and results
              belong to invocation."
            ja: 本 module は node/edge ごとに審査され、stable tool definition は registry、query-scoped
              candidate/assessment は本 module、argument・attempt・result は
              invocation に属します。
  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - ToolDiscoveryActivity
      - ToolSelectionActivity
    allowed_backbone_predicates:
      - considers
      - consumes_query
      - contains
      - is_a
      - produces
      - requests_clarification
    flat_root_exception_concept_ids: []
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-tool-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 本模块已逐节点、逐边复核；工具定义归注册域，候选与评估归查询期发现域，调用参数、尝试和结果归调用域。
            en: "This module was reviewed node by node and edge by edge: stable tool
              definitions belong to registry, query-scoped candidates and
              assessments belong here, and arguments, attempts, and results
              belong to invocation."
            ja: 本 module は node/edge ごとに審査され、stable tool definition は registry、query-scoped
              candidate/assessment は本 module、argument・attempt・result は
              invocation に属します。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 本体人工复核保留 ToolDiscoveryActivity 与 ToolSelectionActivity
              两个独立活动根：选择可直接消费预计算、缓存或用户给定的
              ToolCandidateSet，而不发生本次发现；发现也可以只发布候选集而不作选择。二者只有在同一流程实际衔接时才由
              consumes 事实关联，不能强制伪造普遍父子边。
            en: Manual ontology review retains ToolDiscoveryActivity and
              ToolSelectionActivity as two independent activity roots. Selection
              may consume a precomputed, cached, or user-supplied
              ToolCandidateSet without running discovery, while discovery may
              publish candidates without making a selection. They are connected
              by a consumes fact only when one process actually hands candidates
              to the other; no universal parent edge is invented.
            ja: 本体人工審査は ToolDiscoveryActivity と ToolSelectionActivity を独立 activity root
              として保持します。選択は事前計算・cache・user 提供 ToolCandidateSet を discovery
              なしで消費でき、discovery も selection を行わず候補だけを公開できます。同一 process
              で実際に受け渡す場合のみ consumes fact で結び、普遍親辺を捏造しません。
        - reviewer_id: moonweave-trilingual-terminology-reviewer
          reviewer_role: schema
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 本模块已逐节点、逐边复核；工具定义归注册域，候选与评估归查询期发现域，调用参数、尝试和结果归调用域。
            en: "This module was reviewed node by node and edge by edge: stable tool
              definitions belong to registry, query-scoped candidates and
              assessments belong here, and arguments, attempts, and results
              belong to invocation."
            ja: 本 module は node/edge ごとに審査され、stable tool definition は registry、query-scoped
              candidate/assessment は本 module、argument・attempt・result は
              invocation に属します。
  competency_questions:
    - id: tool-discovery-selection-cq-candidate-formation-v4
      semantic_key: tool-discovery-selection.candidate-formation
      primary_owner_module_id: tool-discovery-selection
      related_module_ids:
        - tool-registry-definition
      questions:
        zh: 哪一版查询从哪些稳定定义形成了候选集，每个候选来自哪个注册条目，是否有遗漏或越界成员？
        en: Which query version formed the candidate set from which stable definitions,
          which registry entry sourced each candidate, and were any candidates
          omitted or out of scope?
        ja: どの query version がどの stable definitions から candidate set を形成し、各 candidate
          はどの registry entry に由来し、omission/out-of-scope member はないか。
      query: Trace ToolSearchQuery through ToolSearch to ToolCandidateSet membership,
        then resolve each ToolCandidate to ToolDefinition and optional
        RegistryEntry provenance.
      expected_assertion: Every candidate belongs to the declared search scope and
        references one stable definition; every compatible visible definition is
        either represented or has an explicit filter reason.
      evidence_binding:
        applicability: relation-backed
        owner_concept_ids:
          - ToolSearch
          - ToolSearchQuery
          - ToolCandidateSet
          - ToolCandidate
        related_concept_ids:
          - ToolDefinition
          - RegistryEntry
        relation_ids:
          - ToolSearch-reads_definition-ToolDefinition
          - ToolCandidate-references-ToolDefinition
          - ToolCandidate-derived_from-RegistryEntry
        not_applicable_reason: null
      positive_example_ids:
        - tool-discovery-selection-cq-candidate-formation-v4-example-positive
      counterexample_ids:
        - tool-discovery-selection-cq-candidate-formation-v4-example-counter
      source_claims:
        - claim-tool-discovery-selection-design
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-tool-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
