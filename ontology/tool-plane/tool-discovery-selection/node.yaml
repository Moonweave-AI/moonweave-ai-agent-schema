    ja: ツール検索
  owns_when:
    zh: 当一个对象离开本次需求、搜索范围或候选比较便失去身份时，由本模块拥有；典型对象是搜索查询、候选、候选评估、选择决定和澄清请求。
    en: Own an object when it loses its identity outside this need, search scope, or
      candidate comparison; typical objects are search queries, candidates,
      candidate assessments, selection decisions, and clarification requests.
    ja: 今回の要求、検索範囲、または候補比較から切り離すと同一性を失う対象を所有します。代表例は検索照会、候補、候補評価、選択判断、確認要求です。
  references_when:
    zh: 搜索引用稳定定义和注册条目；选择结论可以通知调用计划，后备重选可以响应失败尝试；资格评估可以引用策略上下文，但不接管定义、调用或授权对象。
    en: Search references durable definitions and registry entries; a selection may
      inform a call plan, fallback reselection may respond to a failed attempt,
      and eligibility assessment may reference policy context without taking
      ownership of definitions, invocations, or authorization objects.
    ja: 検索は永続的な定義と登録項目を参照します。選択結果は呼び出し計画に伝えられ、代替選択は失敗した試行に応答でき、資格評価はポリシー文脈を参照できますが、定義、呼び出し、認可対象の所有権は移りません。
