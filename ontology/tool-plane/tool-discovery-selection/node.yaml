schema: moonweave.ai/ontology-node/v1
id: tool-discovery-selection
kind: module
labels:
  zh: 工具发现与选择
  en: Tool Discovery and Selection
  ja: ツール発見と選択
semantics:
  short_definition:
    zh: 组织工具目录发现、候选评估和选择决策的 Moonweave 本体模块边界。
    en: A Moonweave ontology module boundary for tool-catalog discovery, candidate assessment, and selection decisions.
    ja: tool catalog discovery、candidate assessment、selection decision を編成する Moonweave ontology module boundary。
  definition:
    zh: 本模块描述从能力来源发现候选工具、检查候选的可用性/资格/匹配、再形成选择、回退或澄清决策的本体概念。它以 MCP tools/list 的 Tool 声明、A2A AgentCard 的 AgentSkill 描述和 OpenAI Responses 的 tool_choice/remote MCP 配置作为真实工程边界，但不把这些不同协议对象压成一个通用工具 JSON，也不包含工具实际执行、工具结果、权限授予或网络安全策略。
    en: This module describes ontology concepts for discovering candidate tools from capability sources, checking candidate availability, eligibility, and match, and then forming selection, fallback, or clarification decisions. It uses MCP tools/list Tool declarations, A2A AgentCard AgentSkill descriptions, and OpenAI Responses tool_choice or remote-MCP configuration as real engineering boundaries, without flattening those different protocol objects into one universal tool JSON or including actual tool execution, tool results, permission grants, or network-safety policy.
    ja: 本モジュールは capability source から candidate tool を発見し、candidate の availability、eligibility、match を検査し、selection、fallback、clarification decision を形成する本体概念を記述する。MCP tools/list の Tool declaration、A2A AgentCard の AgentSkill description、OpenAI Responses の tool_choice/remote-MCP configuration を実装上の境界として使うが、異なる protocol object を一つの万能 tool JSON に平坦化せず、actual tool execution、tool result、permission grant、network-safety policy を含まない。
  why_needed:
    zh: “列出工具”“工具可调用”“工具适合任务”“应选择哪个工具”和“已经执行”有不同的来源、时间与失败语义。本模块把这些阶段拆开，使应用能保留协议事实、审计本地推理，并防止目录条目或模型配置被误当作执行授权。
    en: “List a tool,” “tool is callable,” “tool fits a task,” “which tool should be chosen,” and “tool has executed” have different source, time, and failure semantics. This module separates those phases so an application can retain protocol facts, audit local reasoning, and prevent catalog entries or model configuration from being mistaken for execution authority.
    ja: 「tool を list する」「tool が callable である」「tool が task に適合する」「どの tool を選ぶべきか」「tool が executed した」には異なる source、time、failure semantics がある。本モジュールはこれらの phase を分け、application が protocol fact を保持し local reasoning を監査し、catalog entry や model configuration が execution authority と誤認されるのを防ぐ。
  includes:
    - zh: MCP Tool 和 A2A AgentSkill 的能力发现来源，以及带来源的本地候选投影。
      en: Capability-discovery sources from MCP Tool and A2A AgentSkill records and provenance-bearing local candidate projections.
      ja: MCP Tool と A2A AgentSkill record からの capability-discovery source と provenance 付き local candidate projection。
    - zh: 可用性、资格和匹配评估，以及选择、首选、回退、无选择和澄清决策。
      en: Availability, eligibility, and match assessment plus selection, preferred, fallback, no-selection, and clarification decisions.
      ja: availability、eligibility、match assessment と selection、preferred、fallback、no-selection、clarification decision。
  excludes:
    - zh: MCP tools/call、OpenAI 模型工具调用、A2A 任务执行及其结果。
      en: MCP tools/call, OpenAI model tool invocations, A2A task execution, and their results.
      ja: MCP tools/call、OpenAI model tool invocation、A2A task execution、およびその result。
    - zh: 身份认证、权限授予、审批执行、网络隔离和安全沙箱策略；它们只可作为选择证据被引用。
      en: Authentication, permission grants, approval execution, network isolation, and safety-sandbox policy; these may only be cited as selection evidence.
      ja: authentication、permission grant、approval execution、network isolation、safety-sandbox policy。これらは selection evidence としてのみ引用できる。
  semantic_kind: module-boundary
  aliases: []
engineering:
  explanation:
    zh: 集成层按来源协议读取能力：MCP 客户端使用 tools/list 与可选 cursor 获取 Tool 声明；A2A 消费者读取 AgentCard skills；OpenAI Responses 请求使用 tool_choice 和 remote MCP 配置来约束模型可用工具。Moonweave 适配器随后建立候选、评估和决策记录，始终保存 source_kind 和原始引用；真正的调用仍使用各自协议的执行接口。
    en: An integration reads capabilities by source protocol: an MCP client uses tools/list with an optional cursor to receive Tool declarations; an A2A consumer reads AgentCard skills; an OpenAI Responses request uses tool_choice and remote-MCP configuration to constrain model-accessible tools. A Moonweave adapter then builds candidate, assessment, and decision records while preserving source_kind and original references; actual calls still use each protocol's execution interface.
    ja: integration は source protocol ごとに capability を読む。MCP client は optional cursor を持つ tools/list で Tool declaration を受け取り、A2A consumer は AgentCard skills を読み、OpenAI Responses request は tool_choice と remote-MCP configuration で model-accessible tool を制約する。Moonweave adapter は source_kind と original reference を保持しながら candidate、assessment、decision record を作る。actual call は各 protocol の execution interface を使い続ける。
  typical_input:
    - description:
        zh: MCP 工具目录响应
        en: MCP tool-catalog response
        ja: MCP tool-catalog response
      format: |-
        {"jsonrpc":"2.0","id":1,"result":{"tools":[{"name":"search-docs","description":"Search documentation","inputSchema":{"type":"object","properties":{"query":{"type":"string"}},"required":["query"]}}],"nextCursor":"page-2"}}
      source_claims: [claim-module-mcp-discovery]
    - description:
        zh: A2A AgentCard 技能目录
        en: A2A AgentCard skill catalog
        ja: A2A AgentCard skill catalog
      format: |-
        {"name":"Research agent","skills":[{"id":"research","name":"Research","description":"Find sources","tags":["search"],"inputModes":["text/plain"],"outputModes":["text/plain"]}]}
      source_claims: [claim-module-a2a-skills]
    - description:
        zh: OpenAI 工具选择约束
        en: OpenAI tool-choice constraint
        ja: OpenAI tool-choice constraint
      format: |-
        {"tool_choice":{"type":"allowed_tools","mode":"required","tools":[{"type":"mcp","server_label":"docs","name":"search-docs"}]}}
      source_claims: [claim-module-openai-tool-choice]
  typical_output:
    - description:
        zh: 本地选择决策记录
        en: Local selection-decision record
        ja: Local selection-decision record
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"tool_selection_decision","decision_id":"select-17","candidate_set_ref":"set:17","assessment_refs":["assess:17"],"decision_state":"selected","chosen_candidate_ref":"candidate:search-docs","source_protocol_boundary":"mcp-2025-11-25"}
      source_claims: [claim-module-local-boundary]
  reference_implementations:
    - name: Model Context Protocol Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines Tool discovery through tools/list and separate execution through tools/call.
    - name: A2A Agent Card
      url: https://a2a-protocol.org/latest/specification/
      description: Defines AgentCard skills as descriptions of focused agent capabilities.
    - name: OpenAI Responses create reference
      url: https://developers.openai.com/api/reference/resources/responses/methods/create
      description: Defines tool_choice, allowed-tools forms, and remote MCP tool configuration.
structure:
  identity_keys: [local_record_kind, source_protocol_boundary]
  fields:
    - id: local_record_kind
      labels: {zh: 本地记录种类, en: Local record kind, ja: local record kind}
      definitions:
        zh: 标识本模块中记录的是发现、候选、评估、澄清或选择决策；它不是跨协议 wire type。
        en: Identifies whether a module record is discovery, candidate, assessment, clarification, or selection decision; it is not a cross-protocol wire type.
        ja: module record が discovery、candidate、assessment、clarification、selection decision のどれかを示す。cross-protocol wire type ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [tool_discovery_activity, tool_search, tool_candidate_set, tool_candidate, tool_candidate_assessment, tool_availability_assessment, tool_eligibility_assessment, tool_match, tool_clarification_request, tool_selection_decision]
      pattern: null
      example_value: tool_selection_decision
      source_claims: [claim-module-local-boundary]
    - id: source_protocol_boundary
      labels: {zh: 来源协议边界, en: Source-protocol boundary, ja: source-protocol boundary}
      definitions:
        zh: 记录来源对象所遵循的协议或本地设计边界，使本体记录不覆盖 MCP、A2A 或 OpenAI 的原生 schema。
        en: Records the protocol or local-design boundary followed by the source object so ontology records do not overwrite MCP, A2A, or OpenAI native schemas.
        ja: source object が従う protocol または local-design boundary を記録し、ontology record が MCP、A2A、OpenAI native schema を上書きしないようにする。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp-2025-11-25
      source_claims: [claim-module-mcp-discovery, claim-module-a2a-skills, claim-module-openai-tool-choice, claim-module-local-boundary]
    - id: source_object_ref
      labels: {zh: 来源对象引用, en: Source-object reference, ja: source-object 参照}
      definitions:
        zh: 指向实际 MCP Tool、A2A AgentSkill、OpenAI 请求配置或本地记录，使来源可按自身 schema 复核。
        en: Points to the actual MCP Tool, A2A AgentSkill, OpenAI request configuration, or local record so provenance can be reviewed against its own schema.
        ja: 実際の MCP Tool、A2A AgentSkill、OpenAI request configuration、local record を指し、provenance を独自 schema に対して review 可能にする。
      datatype: string
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: mcp:docs/search-docs
      source_claims: [claim-module-mcp-discovery, claim-module-a2a-skills, claim-module-openai-tool-choice, claim-module-local-boundary]
  constraints:
    - id: module-preserves-native-protocol-shapes
      severity: error
      expression_language: plain
      expression: A record in this module must retain source_protocol_boundary and source_object_ref and must validate the native source object against its declared MCP, A2A, or OpenAI schema rather than a universal tool schema.
      explanation:
        zh: 三类来源以不同字段描述能力与选择约束；本模块只添加本地可审计关联。
        en: The three source families describe capability and selection constraints with different fields; this module adds only local auditable associations.
        ja: 三つの source family は異なる field で capability と selection constraint を記述する。本モジュールは local な監査可能 association だけを加える。
      source_claims: [claim-module-mcp-discovery, claim-module-a2a-skills, claim-module-openai-tool-choice, claim-module-local-boundary]
    - id: module-separates-discovery-assessment-selection-and-invocation
      severity: error
      expression_language: plain
      expression: Discovery records may create candidate scope, assessment records may create evidence findings, and selection records may create decisions; no record in this module may assert a tool_call, tool_result, permission grant, or execution success.
      explanation:
        zh: 本模块拥有发现、评估和选择的本体边界，调用执行和授权保留在各自模块/协议中。
        en: This module owns ontology boundaries for discovery, assessment, and selection; invocation execution and authorization remain in their respective modules or protocols.
        ja: 本モジュールは discovery、assessment、selection の ontology boundary を所有し、invocation execution と authorization はそれぞれの module または protocol に残る。
      source_claims: [claim-module-mcp-discovery, claim-module-openai-tool-choice, claim-module-local-boundary]
  required_relations: []
examples:
  - id: module-positive-mcp-discovery-to-decision

    labels: {zh: 从 MCP 发现到本地决策, en: From MCP discovery to local decision, ja: MCP discovery から local decision へ}
    descriptions:
      zh: Toolformer (Schick 2023) [Calculator(350/7)] 自监督 API 选择；ToolBench (Qin 2023) DFSDT 16000+ RapidAPI 选择；ART (Paranjape 2023) 示例库推理模式选择；Gorilla retriever-aware API 选择。
      en: Toolformer (Schick 2023) [Calculator(350/7)] self-supervised API selection; ToolBench (Qin 2023) DFSDT over 16000+ RapidAPI; ART (Paranjape 2023) task-demo reasoning selection; Gorilla retriever-aware API selection.
      ja: Toolformer 自己教師あり API 選択。ToolBench DFSDT 16000+ RapidAPI。ART task-demo reasoning 選択。Gorilla retriever-aware API 選択。
    field_values: {local_record_kind: tool_selection_decision, source_protocol_boundary: mcp-2025-11-25, source_object_ref: mcp:docs/search-docs}
    related_node_ids: [ToolDiscoveryActivity, ToolCandidateAssessment, ToolSelectionDecision]
    related_relation_ids: []

    source_claims: [claim-module-mcp-discovery, claim-module-local-boundary]
  - id: module-counterexample-tools-call-is-not-selection

    labels: {zh: tools/call 不是选择, en: tools/call is not selection, ja: tools/call は selection ではない}
    descriptions:
      zh: 反例：未 ToolBench 检索或 Gorilla retriever 就假定工具可用；Toolformer 准则违反——API 调用不改善 loss 仍插入标记。
      en: Counterexample: assuming tool availability without ToolBench search or Gorilla retriever; Toolformer criterion violation—inserting markers when API call does not improve loss.
      ja: 反例：ToolBench 检索/Gorilla retriever なしで tool 可用性仮定。Toolformer 准则違反。
    field_values: {local_record_kind: tool_selection_decision, method: tools/call}
    related_node_ids: [ToolSelectionDecision, MCPToolCallRequest]
    related_relation_ids: []

    source_claims: [claim-module-mcp-discovery, claim-module-local-boundary]
  - id: module-boundary-openai-tool-choice

    labels: {zh: OpenAI tool_choice 边界, en: OpenAI tool_choice boundary, ja: OpenAI tool_choice 境界}
    descriptions:
      zh: Toolformer 训练标记 vs ToolBench/Gorilla 运行时 discovery vs ART 示例检索的方法论边界。
      en: Methodological boundary among Toolformer training markers, ToolBench/Gorilla runtime discovery, ART demo retrieval.
      ja: Toolformer 訓練 marker、ToolBench/Gorilla ランタイム discovery、ART demo 检索の方法論境界。
    field_values: {local_record_kind: tool_selection_decision, source_protocol_boundary: openai-responses, source_object_ref: responses:req-42/tool_choice}
    related_node_ids: [ToolSelectionDecision, PreferredToolSelectionDecision]
    related_relation_ids: []

    source_claims: [claim-module-openai-tool-choice, claim-module-local-boundary]
  - id: module-instance-a2a-skill-selection

    descriptions:
      zh: ToolBench 实例：query="send email"→DFSDT 选 RapidAPI Gmail API；Gorilla 实例：retriever 返回 transformers.pipeline API top-3。
      en: ToolBench instance: query="send email"→DFSDT selects RapidAPI Gmail API; Gorilla instance: retriever returns transformers.pipeline API top-3.
      ja: ToolBench 実例：query="send email"→DFSDT。Gorilla 実例：retriever transformers.pipeline API top-3。
    labels: {zh: A2A 技能选择实例, en: A2A skill-selection instance, ja: A2A skill selection instance}
    field_values: {local_record_kind: tool_selection_decision, source_protocol_boundary: a2a-1.0, source_object_ref: a2a:research-agent/research, decision_id: select-22}
    related_node_ids: [ToolSelectionDecision, PreferredToolSelectionDecision, ToolCandidateAssessment]
    related_relation_ids: []

    source_claims: [claim-module-a2a-skills, claim-module-local-boundary]
parent_relation: null
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol — Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-spec
    relevance: Defines tools/list Tool declarations distinct from tools/call execution.
  - id: a2a-protocol-specification
    title: A2A Protocol Specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-spec
    relevance: Defines AgentCard skills as capability descriptions for agent selection.
  - id: openai-responses-create
    title: OpenAI Responses API — Create
    url: https://developers.openai.com/api/reference/resources/responses/methods/create
    source_type: official-doc
    relevance: Defines tool_choice and remote MCP tool configuration on model requests.
  - id: moonweave-ontology-design
    title: Moonweave Agent Ontology Schema repository
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    source_type: design-inference
    relevance: Repository provenance for local discovery/selection record boundaries.
source_claims:
  - id: claim-module-mcp-discovery
    source: mcp-tools-2025-11-25
    supports: MCP clients discover Tool records with tools/list, optionally paginated with nextCursor, before any tools/call execution.
    locator: Listing Tools; Pagination
    evidence_kind: normative
    confidence: high
  - id: claim-module-a2a-skills
    source: a2a-protocol-specification
    supports: A2A AgentCard exposes skills with id, name, description, tags, and input/output modes as discoverable capability descriptions.
    locator: Agent Card; skills
    evidence_kind: normative
    confidence: high
  - id: claim-module-openai-tool-choice
    source: openai-responses-create
    supports: OpenAI Responses requests may constrain model tool use through tool_choice, including allowed_tools and remote MCP tool references.
    locator: tool_choice parameter
    evidence_kind: normative
    confidence: high
  - id: claim-module-local-boundary
    source: moonweave-ontology-design
    supports: Moonweave discovery/selection records are local audit projections that preserve source_protocol_boundary and source_object_ref without replacing native MCP, A2A, or OpenAI payloads.
    locator: tool-discovery-selection module design
    evidence_kind: design-inference
    confidence: high
