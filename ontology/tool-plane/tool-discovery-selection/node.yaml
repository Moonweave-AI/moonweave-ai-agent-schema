sources:
  - id: src-mcp-tools-list
    title: MCP Server Tools Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
    version: checked 2026-07-19
    accessed_on: 2026-07-19
    source_type: official-spec
    authority: A
    status: fetched
    why_it_matters: Separates tools/list discovery from tools/call execution.
  - id: src-openai-agents-tools
    title: OpenAI Agents SDK Tools
    publisher: OpenAI
    url: https://openai.github.io/openai-agents-python/tools/
    version: checked 2026-07-19
    accessed_on: 2026-07-19
    source_type: official-doc
    authority: A
    status: fetched
    why_it_matters: Hosted tool search and conditional tool enabling at runtime.
  - id: src-toolbench
    title: ToolBench / ToolLLM
    publisher: arXiv
    url: https://arxiv.org/abs/2307.16789
    version: checked 2026-07-19
    accessed_on: 2026-07-19
    source_type: survey
    authority: A
    status: fetched
    why_it_matters: Separates retrieval/planning from tool calling in evaluation settings.
  - id: src-tool-discovery-design
    title: Moonweave tool-discovery-selection module boundary design
    publisher: Moonweave
    url: https://moonweave.ai/ontology/agent-system/2.4.0/
    version: checked 2026-07-19
    accessed_on: 2026-07-19
    source_type: design-inference
    authority: B
    status: fetched
    why_it_matters: Query-scoped candidates, assessments, and explicit decision-to-plan handoff.
source_claims:
  - id: claim-tool-discovery-selection-mcp
    source: src-mcp-tools-list
    supports: MCP tools/list exposes tool declarations separately from tools/call, grounding query-scoped candidate formation.
    locator: Server features > Tools > Listing Tools
    evidence_kind: primary-spec
    confidence: high
  - id: claim-tool-discovery-selection-openai
    source: src-openai-agents-tools
    supports: OpenAI Agents SDK documents deferred tool loading and hosted tool search separate from invocation.
    locator: Tools > Hosted tool search
    evidence_kind: primary-api
    confidence: high
  - id: claim-tool-discovery-selection-design
    source: src-tool-discovery-design
    supports: Moonweave requires separate capability, eligibility, and availability evidence and explicit ToolSelectionDecision-to-ToolCallPlan handoff.
    locator: Tool discovery and selection module boundary
    evidence_kind: design-inference
    confidence: high
