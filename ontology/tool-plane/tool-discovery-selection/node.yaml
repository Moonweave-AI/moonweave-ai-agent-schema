schema: moonweave.ai/ontology-node/v1
id: tool-discovery-selection
kind: module
status: review
labels:
  zh: 工具发现与选择
  en: Tool discovery and selection
  ja: ツール発見と選択
semantics:
  short_definition:
    zh: 工具发现与选择描述一次需求如何在当前可见的工具定义中形成候选、比较适配性与当时可用性，并产生首选、后备或澄清结论。它拥有查询期判断，不拥有长期工具定义、授权策略或实际调用。
    en: Tool discovery and selection describes how one need forms candidates from the tool definitions currently visible, compares fit and point-in-time availability, and reaches a preferred, fallback, or clarification outcome. It owns query-time judgments, not durable tool definitions, authorization policy, or the resulting invocation.
    ja: ツール発見と選択は、一つの要求が現在参照できるツール定義から候補を作り、適合性とその時点の利用可能性を比較して、第一候補、代替候補、または確認要求に至る過程を記述します。ここで所有するのは照会時の判断であり、永続的なツール定義、認可ポリシー、実際の呼び出しではありません。
  definition:
    zh: 工具发现与选择描述一次需求如何在当前可见的工具定义中形成候选、比较适配性与当时可用性，并产生首选、后备或澄清结论。它拥有查询期判断，不拥有长期工具定义、授权策略或实际调用。
    en: Tool discovery and selection describes how one need forms candidates from the tool definitions currently visible, compares fit and point-in-time availability, and reaches a preferred, fallback, or clarification outcome. It owns query-time judgments, not durable tool definitions, authorization policy, or the resulting invocation.
    ja: ツール発見と選択は、一つの要求が現在参照できるツール定義から候補を作り、適合性とその時点の利用可能性を比較して、第一候補、代替候補、または確認要求に至る過程を記述します。ここで所有するのは照会時の判断であり、永続的なツール定義、認可ポリシー、実際の呼び出しではありません。
  why_needed:
    zh: 让系统能够解释“为什么看见这些候选、为什么选它、为什么改用后备工具，或为什么必须先追问”。
    en: Makes it possible to explain why these candidates were visible, why one was selected, why a fallback was chosen, or why clarification was required first.
    ja: なぜその候補群が見えたのか、なぜ一つを選んだのか、なぜ代替に切り替えたのか、またはなぜ先に確認が必要なのかを説明できるようにします。
  includes:
    - zh: 本次搜索使用的查询、搜索活动、候选集合，以及每个候选对稳定工具定义和注册条目的来源引用。
      en: The query, search activity, and candidate set for this search, including each candidate's provenance references to a durable tool definition and registry entry.
      ja: 今回の検索に用いた照会、検索活動、候補集合、および各候補から永続的なツール定義と登録項目への来歴参照を含みます。
    - zh: 对候选的能力适配、资格和当时可用性评估，以及首选、后备和无法可靠选择时的澄清结论。
      en: Candidate assessments for capability fit, eligibility, and current availability, together with preferred, fallback, and clarification outcomes.
      ja: 候補の能力適合性、資格、その時点の利用可能性の評価と、第一候補、代替候補、確認要求の結論を含みます。
  excludes:
    - zh: 能力目录、工具定义、注册条目和输入输出约束属于能力目录与定义；本模块只读取它们。
      en: Capability catalogs, tool definitions, registry entries, and input/output constraints belong to capability catalogs and definitions; this module only reads them.
      ja: 能力カタログ、ツール定義、登録項目、入出力制約は能力カタログと定義に属し、本モジュールはそれらを参照するだけです。
    - zh: 权限范围、策略决定和授权授予属于授权与策略决策；“符合任务”不能替代“获准执行”。
      en: Permission scopes, policy decisions, and authorization grants belong to authorization and policy decisions; being suitable for a task is not the same as being authorized to execute it.
      ja: 権限範囲、ポリシー判断、認可付与は認可とポリシー判断に属します。タスクに適していることと、実行を許可されていることは同じではありません。
    - zh: 已绑定参数的调用计划、调用尝试、结果、诊断和效果归能力调用与结果；检索或排序算法作为实现信息，不成为业务概念节点。
      en: Bound call plans, invocation attempts, results, diagnostics, and effects belong to capability invocation and outcomes; retrieval or ranking algorithms remain implementation information rather than business-concept nodes.
      ja: 引数を束縛した呼び出し計画、呼び出し試行、結果、診断、効果は能力呼び出しと結果に属します。検索や順位付けのアルゴリズムは実装情報であり、業務概念ノードにはしません。
  semantic_kind: null
  aliases: []
purpose:
  zh: 保留从需求、候选和评估证据到选择或澄清结论的完整理由链。
  en: Preserve the complete rationale chain from a need through candidates and assessment evidence to a selection or clarification outcome.
  ja: 要求から候補と評価証拠を経て、選択または確認要求の結論に至る理由の連鎖を保持します。
structure: null
examples:
  - id: tool-discovery-selection-cq-candidate-formation-v4-example-positive
    kind: positive
    labels:
      zh: 由固定注册表快照形成完整候选集
      en: Complete candidate set from a fixed registry snapshot
      ja: 固定 registry snapshot から形成した完全 candidate set
    scenario_id: null
    descriptions:
      zh: search-204 使用 query-weather@7 与 registry-production@118，只读取满足天气预报、只读权限和 800 ms 上限的 weather@3 与 climate@2；set-204 中两个候选分别回指唯一 ToolDefinition 和 RegistryEntry，payment-admin@9 因写权限被记录为显式过滤项。
      en: search-204 uses query-weather@7 and registry-production@118. It reads only weather@3 and climate@2, which satisfy forecast capability, read-only permission, and an 800 ms limit; both candidates in set-204 point to one ToolDefinition and RegistryEntry, while payment-admin@9 is explicitly filtered for write permission.
      ja: search-204 は query-weather@7 と registry-production@118 を使い、forecast capability・read-only permission・800 ms 上限を満たす weather@3 と climate@2 だけを読みます。set-204 の二 candidate は各一つの ToolDefinition/RegistryEntry を参照し、payment-admin@9 は write permission のため明示 filter されます。
    field_values:
      tool_search_id: search-204
      query_id: query-weather
      query_version: 7
      registry_snapshot: registry-production@118
      required_capability: weather.forecast
      required_effect_class: read-only
      maximum_latency_milliseconds: 800
      candidate_set_id: set-204
      candidate_definition_refs:
        - weather@3.0.0#sha256:weather-definition-v3
        - climate@2.2.0#sha256:climate-definition-v2
      candidate_registry_entry_refs:
        - registry-entry-weather-v3-prod
        - registry-entry-climate-v2-prod
      explicitly_filtered_entry: registry-entry-payment-admin-v9
      filter_reason: write permission violates read-only query constraint
    related_node_ids:
      - ToolSearch
      - ToolCandidateSet
      - ToolCandidate
      - ToolDefinition
      - RegistryEntry
    related_relation_ids:
      - ToolSearch-consumes_query-ToolSearchQuery
      - ToolSearch-reads_definition-ToolDefinition
      - ToolSearch-produces-ToolCandidateSet
      - ToolCandidateSet-contains-ToolCandidate
      - ToolCandidate-references-ToolDefinition
      - ToolCandidate-derived_from-RegistryEntry
    expected_result:
      zh: 返回两个范围内候选及其固定定义和注册条目；对同一快照中未进入集合的条目返回可复核过滤原因，候选集无遗漏也无越界。
      en: Every candidate belongs to the declared search scope and references one stable definition; every compatible visible definition is either represented or has an explicit filter reason.
      ja: 範囲内の二 candidate と固定 definition/registry entry を返し、同 snapshot で集合に入らない entry には検証可能 filter reason を返します。omission も out-of-scope member もありません。
    why_valid_or_invalid:
      zh: 查询版本、注册表快照、定义摘要、候选身份和过滤原因均显式记录；候选形成没有依赖名称相似或当前注册表状态。
      en: Query version, registry snapshot, definition digests, candidate identities, and filter rationale are explicit; formation relies on neither name similarity nor current registry state.
      ja: query version・registry snapshot・definition digest・candidate identity・filter rationale が明示され、name similarity や現在 registry state に依存しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-discovery-selection-002
  - id: tool-discovery-selection-cq-candidate-formation-v4-example-counter
    kind: counterexample
    labels:
      zh: 混入缓存候选且漏掉兼容定义
      en: Stale-cache candidate with an omitted compatible definition
      ja: stale-cache candidate 混入と compatible definition 漏れ
    scenario_id: null
    descriptions:
      zh: search-205 声称使用 registry-production@119，却从旧缓存加入没有该快照 RegistryEntry 的 weather-lite@1，并漏掉满足 query-weather@8 的 climate@2；候选只保存显示名，无法回指定义版本或摘要。
      en: search-205 claims registry-production@119 but injects weather-lite@1 from an old cache even though that snapshot has no RegistryEntry for it, omits climate@2 despite query-weather@8 compatibility, and stores only display names rather than definition versions or digests.
      ja: search-205 は registry-production@119 を使ったと主張しますが、同 snapshot に RegistryEntry のない weather-lite@1 を旧 cache から混入し、query-weather@8 に適合する climate@2 を漏らします。candidate は display name だけで definition version/digest を参照できません。
    field_values:
      tool_search_id: search-205
      query_id: query-weather
      query_version: 8
      declared_registry_snapshot: registry-production@119
      candidate_set_id: set-205
      stale_cache_snapshot: registry-production@113
      out_of_snapshot_candidate: weather-lite@1
      out_of_snapshot_registry_entry_id: null
      out_of_snapshot_definition_digest: null
      omitted_compatible_definition: climate@2.2.0#sha256:climate-definition-v2
      candidate_identity_basis: display-name-only
      completeness_check_passed: false
    related_node_ids:
      - ToolSearch
      - ToolCandidateSet
      - ToolCandidate
      - ToolDefinition
      - RegistryEntry
    related_relation_ids:
      - ToolSearch-consumes_query-ToolSearchQuery
      - ToolSearch-reads_definition-ToolDefinition
      - ToolSearch-produces-ToolCandidateSet
      - ToolCandidateSet-contains-ToolCandidate
      - ToolCandidate-references-ToolDefinition
      - ToolCandidate-derived_from-RegistryEntry
    expected_result:
      zh: 拒绝 set-205：删除无快照来源的 weather-lite@1，补入或明确过滤 climate@2，并为每个候选提供固定定义和注册条目引用后才能接受。
      en: Reject set-205 until weather-lite@1 without snapshot provenance is removed, climate@2 is represented or explicitly filtered, and every candidate has immutable definition and RegistryEntry references.
      ja: snapshot provenance のない weather-lite@1 を除き、climate@2 を追加または明示 filter し、全 candidate に不変 definition/RegistryEntry 参照を付けるまで set-205 を拒否します。
    why_valid_or_invalid:
      zh: 旧缓存共现和名称相似都不能证明候选来自声明快照；同时漏掉兼容定义使候选集既越界又不完整。
      en: Old-cache co-occurrence and name similarity do not prove derivation from the declared snapshot, while omitting a compatible definition makes the set both out of scope and incomplete.
      ja: old-cache 共起や name similarity は declared snapshot 由来を証明せず、compatible definition の漏れで集合は out-of-scope かつ不完全です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-discovery-selection-002
  - id: tool-discovery-selection-cq-candidate-assessment-v4-example-positive
    kind: positive
    labels:
      zh: 能力、资格与时点可用性分别核验
      en: Capability, eligibility, and availability assessed separately
      ja: capability・eligibility・availability の分離評価
    scenario_id: null
    descriptions:
      zh: assessment-weather-204 针对 candidate-weather-v3 与 query-weather@7 分别记录 0.92 的能力适配分、输入 Schema 和只读权限两项硬资格通过，以及 09:32:14Z 探测到 126 ms 延迟的可用状态；三类证据均在 5 分钟有效窗内。
      en: assessment-weather-204 evaluates candidate-weather-v3 against query-weather@7 with a 0.92 capability-fit score, separate passes for input-schema and read-only-permission eligibility, and a 126 ms availability probe at 09:32:14Z; all three evidence classes are within the five-minute validity window.
      ja: assessment-weather-204 は candidate-weather-v3 を query-weather@7 に対し、capability fit 0.92、input-schema/read-only-permission の hard eligibility pass、09:32:14Z の 126 ms availability probe として別々に記録し、三 evidence は 5 分 validity window 内です。
    field_values:
      selection_activity_id: selection-204
      assessment_id: assessment-weather-204
      candidate_id: candidate-weather-v3
      query_id: query-weather
      query_version: 7
      capability_fit_score: 0.92
      capability_evidence_model: tool-retriever-2026-07-10
      input_schema_eligibility: pass
      permission_eligibility: pass-read-only
      availability_checked_at: 2026-07-16T09:32:14Z
      observed_latency_milliseconds: 126
      evidence_valid_until: 2026-07-16T09:37:14Z
      selection_ready: true
    related_node_ids:
      - ToolSelectionActivity
      - ToolCandidateAssessment
      - ToolCandidate
      - ToolSearchQuery
    related_relation_ids:
      - ToolSelectionActivity-considers-ToolCandidateAssessment
      - ToolCandidateAssessment-assesses-ToolCandidate
      - ToolCandidateAssessment-evaluates_against-ToolSearchQuery
    expected_result:
      zh: 返回三项相互独立且仍有效的评估结论；候选只有在能力适配充分、硬资格全部通过且当前可用时才标记为可选择。
      en: No candidate is selection-ready unless all required dimensions are present, current, and free of hard-constraint failure.
      ja: 三つの独立かつ有効な評価を返し、capability fit が十分、全 hard eligibility が pass、現在 available の場合だけ selection-ready とします。
    why_valid_or_invalid:
      zh: 适配分不能替代资格或在线状态；每项结论都有自己的证据来源、检查时刻和有效期。
      en: A fit score substitutes for neither eligibility nor live availability; each conclusion has its own evidence source, observation time, and validity interval.
      ja: fit score は eligibility や live availability を代替せず、各 conclusion は固有 evidence source・observation time・validity interval を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-discovery-selection-003
  - id: tool-discovery-selection-cq-candidate-assessment-v4-example-counter
    kind: counterexample
    labels:
      zh: 用过期适配分掩盖资格变化
      en: Stale fit score hides an eligibility change
      ja: stale fit score が eligibility 変更を隠す例
    scenario_id: null
    descriptions:
      zh: assessment-weather-199 复用 48 小时前的 0.95 适配分，把 candidate-weather-v4 标成 eligible；但 v4 的权限规格已从只读改为 location-write，且当前没有可用性探测或检查时刻。
      en: assessment-weather-199 reuses a 0.95 fit score from 48 hours earlier to mark candidate-weather-v4 eligible, even though v4 changed its permission specification from read-only to location-write and has no current availability probe or check time.
      ja: assessment-weather-199 は 48 時間前の fit 0.95 を再利用して candidate-weather-v4 を eligible としますが、v4 permission は read-only から location-write へ変わり、現在 availability probe/check time もありません。
    field_values:
      assessment_id: assessment-weather-199
      candidate_id: candidate-weather-v4
      query_id: query-weather
      query_version: 9
      capability_fit_score: 0.95
      fit_evidence_observed_at: 2026-07-14T09:30:00Z
      assessment_started_at: 2026-07-16T09:30:00Z
      current_permission_spec: location-write
      required_permission_spec: read-only
      hard_eligibility_result: not-evaluated
      availability_checked_at: null
      availability_result: unknown
      asserted_selection_ready: true
    related_node_ids:
      - ToolSelectionActivity
      - ToolCandidateAssessment
      - ToolCandidate
      - ToolSearchQuery
    related_relation_ids:
      - ToolSelectionActivity-considers-ToolCandidateAssessment
      - ToolCandidateAssessment-assesses-ToolCandidate
      - ToolCandidateAssessment-evaluates_against-ToolSearchQuery
    expected_result:
      zh: 将该候选标记为证据过期且硬资格失败，不得进入选择；只有按当前定义重做资格检查和可用性探测后才能重新评估。
      en: Mark the candidate stale and hard-ineligible and exclude it from selection until eligibility and availability are re-evaluated against the current definition.
      ja: candidate を stale かつ hard-ineligible として selection から除外し、current definition に対する eligibility/availability 再評価後だけ再検討します。
    why_valid_or_invalid:
      zh: 历史适配分只回答旧版本的语义相似性，不能证明当前权限资格或时点可用性；把三者合成一个 eligible 布尔值会掩盖失败原因。
      en: A historical fit score answers semantic similarity for an old version, not current permission eligibility or point-in-time availability; collapsing the three into one eligible flag hides the failure.
      ja: historical fit score は旧 version の semantic similarity だけを示し、current permission eligibility や point-in-time availability を証明しません。三者を一 eligible flag に畳むと failure reason が失われます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-discovery-selection-003
  - id: tool-discovery-selection-cq-selection-decision-v4-example-positive
    kind: positive
    labels:
      zh: 带拒绝理由的选择决定完成调用交接
      en: Selection decision hands off with rejection rationale
      ja: reject rationale 付き selection decision の call handoff
    scenario_id: null
    descriptions:
      zh: selection-204 按 rule-weather-choice@5 从 set-204 选择 candidate-weather-v3；decision-204 记录 climate-v2 因延迟 742 ms 接近 800 ms 上限而被拒绝，并把 weather@3 的固定定义引用交给 plan-weather-204。
      en: selection-204 applies rule-weather-choice@5 to set-204 and selects candidate-weather-v3. decision-204 rejects climate-v2 because its 742 ms latency is too close to the 800 ms ceiling, then hands the immutable weather@3 definition reference to plan-weather-204.
      ja: selection-204 は rule-weather-choice@5 を set-204 に適用して candidate-weather-v3 を選びます。decision-204 は climate-v2 を 742 ms が 800 ms 上限に近い理由で reject し、不変 weather@3 definition 参照を plan-weather-204 へ渡します。
    field_values:
      selection_activity_id: selection-204
      candidate_set_id: set-204
      selection_rule_id: rule-weather-choice
      selection_rule_version: 5
      selection_decision_id: decision-204
      selected_candidate_id: candidate-weather-v3
      selected_definition_ref: weather@3.0.0#sha256:weather-definition-v3
      rejected_candidate_id: candidate-climate-v2
      rejected_candidate_latency_milliseconds: 742
      rejection_reason: insufficient latency margin below 800 ms ceiling
      tool_call_plan_id: plan-weather-204
      handoff_definition_ref: weather@3.0.0#sha256:weather-definition-v3
    related_node_ids:
      - ToolSelectionActivity
      - ToolSelectionDecision
      - ToolCandidate
      - ToolCallPlan
    related_relation_ids:
      - ToolSelectionActivity-consumes-ToolCandidateSet
      - ToolSelectionActivity-considers-ToolCandidateAssessment
      - ToolSelectionActivity-produces-ToolSelectionDecision
      - ToolSelectionDecision-selects-ToolCandidate
      - ToolSelectionDecision-rejects-ToolCandidate
      - ToolSelectionDecision-informs-ToolCallPlan
    expected_result:
      zh: 返回唯一被选候选、所有明确拒绝项及可复算理由，并确认调用计划接收的定义引用与选择决定完全一致。
      en: The selected and rejected candidates come from one candidate set, rationale is reproducible from current assessments, and invocation receives the decision without a definition shortcut.
      ja: 一つの candidate set から selected/rejected candidate と再計算可能 rationale を返し、call plan の definition 参照が decision と完全一致すると確認します。
    why_valid_or_invalid:
      zh: 选择活动、决定、规则版本、候选评估和调用计划各有独立身份；跨模块只由 decision→plan 的显式交接边连接。
      en: Selection activity, decision, rule version, candidate assessments, and call plan retain separate identities; the explicit decision-to-plan handoff is the only cross-module bridge.
      ja: selection activity・decision・rule version・candidate assessment・call plan は別 identity を保ち、明示 decision→plan handoff だけが cross-module bridge です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-discovery-selection-004
  - id: tool-discovery-selection-cq-selection-decision-v4-example-counter
    kind: counterexample
    labels:
      zh: 调用计划按名称跳过选择决定
      en: Call plan bypasses the selection decision by name
      ja: name 一致で selection decision を迂回する call plan
    scenario_id: null
    descriptions:
      zh: plan-weather-205 仅凭名称 weather 构造对 weather@2 的调用；当前 decision-205 实际选择 weather@3，但没有 informs 交接边、规则版本或其他候选的拒绝理由。
      en: plan-weather-205 constructs a call to weather@2 from the name weather alone. The current decision-205 actually selected weather@3, but there is no informs handoff, rule version, or rejection rationale for alternatives.
      ja: plan-weather-205 は weather という name だけで weather@2 call を作ります。current decision-205 は weather@3 を選んでいますが、informs handoff・rule version・alternative reject rationale がありません。
    field_values:
      selection_activity_id: selection-205
      selection_decision_id: decision-205
      selected_candidate_id: candidate-weather-v3
      selected_definition_ref: weather@3.0.0#sha256:weather-definition-v3
      selection_rule_version: null
      rejected_candidate_rationales: []
      tool_call_plan_id: plan-weather-205
      planned_tool_name: weather
      planned_definition_ref: weather@2.4.1#sha256:weather-definition-v2
      decision_informs_plan: false
      identity_match: false
    related_node_ids:
      - ToolSelectionActivity
      - ToolSelectionDecision
      - ToolCandidate
      - ToolCallPlan
    related_relation_ids:
      - ToolSelectionActivity-consumes-ToolCandidateSet
      - ToolSelectionActivity-considers-ToolCandidateAssessment
