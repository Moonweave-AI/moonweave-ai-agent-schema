schema: moonweave.ai/ontology-node/v1
id: ToolMatch
kind: concept
labels:
  zh: 工具匹配
  en: Tool Match
  ja: ツール適合記録
semantics:
  short_definition:
    zh: 说明一个候选与某项任务要求之间适合、不适合或证据不足的本地评估 finding。
    en: A local assessment finding stating that one candidate is matched, not matched, or insufficiently evidenced against a task requirement.
    ja: 一つの candidate が task requirement に matched、not matched、または evidence 不足であることを示す local assessment finding。
  definition:
    zh: ToolMatch 是由 ToolCandidateAssessment 生成的 Moonweave finding，记录一个 ToolCandidate 与特定任务要求之间的匹配状态、理由和证据。它可综合资格、能力描述、输入/输出兼容性或政策证据，但不是候选排序、最优声明、ToolSelectionDecision、模型 tool_choice 或工具调用；多个 matched finding 可以同时存在，最终是否选择其中之一仍由单独决策表示。
    en: ToolMatch is a Moonweave finding generated by ToolCandidateAssessment that records the match state, rationale, and evidence between one ToolCandidate and a particular task requirement. It may synthesize eligibility, capability description, input/output compatibility, or policy evidence, but it is not a candidate ranking, a best-tool claim, a ToolSelectionDecision, a model tool_choice, or a tool call; several matched findings can coexist, and a separate decision still expresses whether one is selected.
    ja: ToolMatch は ToolCandidateAssessment により生成される Moonweave finding であり、一つの ToolCandidate と特定の task requirement の間の match state、rationale、evidence を記録する。eligibility、capability description、input/output compatibility、policy evidence を統合できるが、candidate ranking、best-tool claim、ToolSelectionDecision、model tool_choice、tool call ではない。matched finding は複数共存でき、どれを選ぶかは別の decision が表す。
  why_needed:
    zh: 评估往往需要保留“为什么这个候选符合或不符合”这一可读、可审计的结论。把它从选择决策分开，能支持多个合格候选、负面理由和不确定性，而不把置信度伪装为排序或执行授权。
    en: Assessment often needs a readable, auditable conclusion about why a candidate fits or fails. Keeping it separate from a selection decision supports multiple eligible candidates, negative rationales, and uncertainty without disguising confidence as rank or execution authorization.
    ja: assessment には candidate がなぜ適合または不適合なのかについて、読めて監査可能な conclusion が必要なことが多い。selection decision から分けることで、複数の eligible candidate、negative rationale、不確実性を支え、confidence を rank や execution authorization に偽装しない。
  includes:
    - zh: 对一个候选和一个任务需求的 matched、not_matched 或 indeterminate finding。
      en: A matched, not_matched, or indeterminate finding for one candidate and one task requirement.
      ja: 一つの candidate と一つの task requirement に対する matched、not_matched、indeterminate finding。
    - zh: 指向评估证据、资格 finding 或来源能力描述的理由引用。
      en: Rationale references to assessment evidence, eligibility findings, or source capability descriptions.
      ja: assessment evidence、eligibility finding、source capability description への rationale reference。
  excludes:
    - zh: ToolCandidate 本身、ToolEligibilityAssessment、候选名次、首选工具、ToolSelectionDecision 或工具调用参数。
      en: A ToolCandidate itself, ToolEligibilityAssessment, candidate rank, a preferred tool, ToolSelectionDecision, or tool-call arguments.
      ja: ToolCandidate 自体、ToolEligibilityAssessment、candidate rank、preferred tool、ToolSelectionDecision、tool-call argument。
    - zh: 由 OpenAI tool_choice 或 MCP allowed_tools 直接推导出的最终选择。
      en: A final selection directly inferred from OpenAI tool_choice or MCP allowed_tools.
      ja: OpenAI tool_choice または MCP allowed_tools から直接推論された final selection。
  semantic_kind: information
engineering:
  explanation:
    zh: 评估器在检查候选后生成 match_id，并将 candidate_ref、assessment_ref、task_requirement_ref、状态、理由和 evidence_refs 写入本地 finding。来源 schema 继续由 MCP 或 A2A 验证；若信息仅支持能力描述而无法证实任务接口，则记录 indeterminate，而不是把候选视作已选工具。
    en: After examining a candidate, an assessor creates match_id and records candidate_ref, assessment_ref, task_requirement_ref, state, rationale, and evidence_refs in a local finding. Source schemas remain validated by MCP or A2A; if evidence supports only a capability description but not the task interface, it records indeterminate rather than treating the candidate as selected.
    ja: assessor は candidate を検査した後、match_id を作り、candidate_ref、assessment_ref、task_requirement_ref、state、rationale、evidence_refs を local finding に記録する。source schema は MCP または A2A で検証され続ける。evidence が capability description だけを支持し task interface を確証できない場合、candidate を selected と扱わず indeterminate を記録する。
  typical_input:
    - description:
        zh: MCP 工具声明证据
        en: MCP Tool declaration evidence
        ja: MCP Tool declaration evidence
      format: |-
        {"name":"search-docs","description":"Search documentation","inputSchema":{"type":"object","properties":{"query":{"type":"string"}},"required":["query"]}}
      source_claims: [claim-match-mcp-schema]
    - description:
        zh: 本地候选评估 finding
        en: Local candidate-assessment finding
        ja: Local candidate-assessment finding
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"tool_candidate_assessment","assessment_id":"assess-17","candidate_ref":"candidate:search-docs","task_requirement_ref":"task:42","finding_refs":["eligibility:17"]}
      source_claims: [claim-match-local]
  typical_output:
    - description:
        zh: 本地工具匹配 finding
        en: Local tool-match finding
        ja: Local tool-match finding
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"tool_match","match_id":"match-17","assessment_ref":"assess-17","candidate_ref":"candidate:search-docs","task_requirement_ref":"task:42","match_state":"matched","evidence_refs":["eligibility:17","mcp:docs/search-docs"],"rationale":"Declared search capability accepts the required query input"}
      source_claims: [claim-match-local]
  reference_implementations:
    - name: Model Context Protocol Tool declaration
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines capability descriptions and schemas used as evidence for a local match finding.
    - name: A2A AgentSkill
      url: https://a2a-protocol.org/latest/specification/
      description: Defines skill descriptions, tags, modes, and security requirements that can be referenced as capability evidence.
structure:
  identity_keys: [match_id]
  fields:
    - id: match_id
      labels: {zh: 匹配标识, en: Match identifier, ja: match 識別子}
      definitions:
        zh: 稳定标识一个本地匹配 finding，不替代候选 id、来源工具名或选择决策 id。
        en: Stably identifies one local match finding and does not replace a candidate id, source tool name, or selection-decision id.
        ja: 一つの local match finding を安定して識別し、candidate id、source tool name、selection-decision id を置き換えない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: match-17
      source_claims: [claim-match-local]
    - id: assessment_ref
      labels: {zh: 评估引用, en: Assessment reference, ja: assessment 参照}
      definitions:
        zh: 指向包含该 finding 的 ToolCandidateAssessment，使匹配理由可回溯到同一候选和任务语境。
        en: Points to the ToolCandidateAssessment containing this finding so its rationale can be traced to the same candidate and task context.
        ja: この finding を含む ToolCandidateAssessment を指し、rationale を同じ candidate と task context に追跡可能にする。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: assess-17
      source_claims: [claim-match-local]
    - id: candidate_ref
      labels: {zh: 候选引用, en: Candidate reference, ja: candidate 参照}
      definitions:
        zh: 指向本 finding 所判断的一个 ToolCandidate；不得代表整组候选。
        en: Points to the one ToolCandidate judged by this finding and must not stand for an entire candidate set.
        ja: この finding が判断する一つの ToolCandidate を指し、candidate set 全体を表してはならない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: candidate:search-docs
      source_claims: [claim-match-local]
    - id: task_requirement_ref
      labels: {zh: 任务需求引用, en: Task-requirement reference, ja: task requirement 参照}
      definitions:
        zh: 指向该匹配判断所针对的具体任务需求或政策语境。
        en: Points to the specific task requirement or policy context against which match is judged.
        ja: match を判断する特定の task requirement または policy context を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: task:42
      source_claims: [claim-match-local]
    - id: match_state
      labels: {zh: 匹配状态, en: Match state, ja: match state}
      definitions:
        zh: 本地判断状态；indeterminate 说明证据不足，不表达相对名次或选择。
        en: The local judgment state; indeterminate means evidence is insufficient and does not express relative rank or selection.
        ja: local judgment state。indeterminate は evidence 不足を意味し、relative rank や selection を表さない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [matched, not_matched, indeterminate]
      pattern: null
      example_value: matched
      source_claims: [claim-match-local]
    - id: evidence_refs
      labels: {zh: 证据引用, en: Evidence references, ja: evidence 参照}
      definitions:
        zh: 指向支持匹配理由的本地评估 finding 和原生能力描述。
        en: Points to local assessment findings and native capability descriptions that support the match rationale.
        ja: match rationale を支持する local assessment finding と native capability description を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: eligibility:17
      source_claims: [claim-match-mcp-schema, claim-match-a2a-skill, claim-match-local]
  constraints:
    - id: match-must-remain-task-and-assessment-bound
      severity: error
      expression_language: plain
      expression: Every ToolMatch must reference exactly one assessment_ref, candidate_ref, and task_requirement_ref, and evidence_refs must support the stated match_state; a match cannot be detached from its assessment context.
      explanation:
        zh: “匹配”只在特定候选和特定任务的证据语境中有含义。
        en: “Match” has meaning only in evidence context for a specific candidate and specific task.
        ja: 「match」は特定の candidate と特定の task の evidence context 内でのみ意味を持つ。
      source_claims: [claim-match-local]
    - id: match-is-not-ranking-or-selection
      severity: error
      expression_language: plain
      expression: ToolMatch must not contain rank, score_as_rank, preferred, selected_candidate_ref, tool_choice, tool_call, or tool_result; multiple matches may coexist before a separate selection decision.
      explanation:
        zh: 匹配 finding 说明符合程度或缺口，不承担候选比较和执行授权。
        en: A match finding explains fit or a gap; it does not perform candidate comparison or execution authorization.
        ja: match finding は fit または gap を説明し、candidate comparison や execution authorization を行わない。
      source_claims: [claim-match-local]
  required_relations: []
examples:
  - id: match-positive-schema-supports-search

    labels: {zh: schema 支持搜索任务, en: Schema supports search task, ja: schema が search task を支持する}
    descriptions:
      zh: ToolBench (Qin 2023) 16000+ RapidAPI 工具发现；Gorilla APIBench 1645 API retriever-aware 检索；Toolformer 支持 Calculator/QA/Search/Translator/Calendar 五类工具发现。
      en: ToolBench (Qin 2023) discovers tools among 16000+ RapidAPI; Gorilla APIBench 1645 API retriever-aware retrieval; Toolformer supports Calculator/QA/Search/Translator/Calendar discovery.
      ja: ToolBench (Qin 2023) が 16000+ RapidAPI から tool 発見。Gorilla APIBench 1645 API retriever-aware 检索。Toolformer が Calculator/QA/Search/Translator/Calendar 五类 tool 発見を支持。
    field_values: {match_id: match-17, assessment_ref: assess-17, candidate_ref: candidate:search-docs, task_requirement_ref: task:42, match_state: matched, evidence_refs: [mcp:docs/search-docs, eligibility:17]}
    related_node_ids: [ToolMatch, ToolCandidateAssessment, ToolEligibilityAssessment]
    related_relation_ids: [ToolMatch-was_generated_by-ToolCandidateAssessment]

    source_claims: [claim-match-mcp-schema, claim-match-local]
  - id: match-counterexample-match-selects-candidate

    labels: {zh: 用匹配记录直接选择候选, en: Use a match record to select a candidate, ja: match record で candidate を直接選択する}
    descriptions:
      zh: 反例：Gorilla 无 retriever 时 hallucinate 不存在 API；ToolBench 未验证 RapidAPI endpoint 可用性即加入候选集。
      en: Counterexample: Gorilla hallucinates nonexistent API without retriever; ToolBench adds candidates without verifying RapidAPI endpoint availability.
      ja: 反例：Gorilla が retriever なしで不存在 API を hallucinate。ToolBench が RapidAPI endpoint 可用性未検証で candidate set に追加。
    field_values: {match_id: match-18, assessment_ref: assess-18, candidate_ref: candidate:search-docs, task_requirement_ref: task:43, match_state: matched, evidence_refs: [eligibility:18], preferred: true, selected_candidate_ref: candidate:search-docs}
    related_node_ids: [ToolMatch, ToolSelectionDecision]
    related_relation_ids: []

    source_claims: [claim-match-local]
  - id: match-boundary-two-matched-candidates

    labels: {zh: 两个同时匹配的候选, en: Two simultaneously matched candidates, ja: 同時に matched な二つの candidate}
    descriptions:
      zh: Gorilla APIBench 离线训练检索 vs ToolBench 在线 RapidAPI 实时发现的注册边界；ToolMatch 分数非 ToolBench DFSDT 决策树节点。
      en: Boundary between Gorilla APIBench offline training retrieval vs ToolBench online RapidAPI live discovery; ToolMatch score is not a ToolBench DFSDT tree node.
      ja: Gorilla APIBench offline 訓練检索と ToolBench online RapidAPI リアルタイム発見の登録境界。ToolMatch score は ToolBench DFSDT 決定木 node ではない。
    field_values: {match_id: match-19, assessment_ref: assess-19, candidate_ref: candidate:search-docs, task_requirement_ref: task:44, match_state: matched, evidence_refs: [eligibility:19]}
    related_node_ids: [ToolMatch, ToolSelectionDecision]
    related_relation_ids: [ToolMatch-was_generated_by-ToolCandidateAssessment]

    source_claims: [claim-match-local]
  - id: match-instance-a2a-indeterminate

    labels: {zh: A2A 描述不确定匹配实例, en: A2A indeterminate-match instance, ja: A2A indeterminate-match instance}
    descriptions:
      zh: Gorilla 实例：retriever 返回 torch.hub.load API 文档；ToolBench 实例：RapidAPI "Spoonacular" recipe search API tool_id=spoonacular-search。
      en: Gorilla instance: retriever returns torch.hub.load API docs; ToolBench instance: RapidAPI "Spoonacular" recipe search API tool_id=spoonacular-search.
      ja: Gorilla 実例：retriever が torch.hub.load API 文档を返す。ToolBench 実例：RapidAPI "Spoonacular" recipe search API tool_id=spoonacular-search。
    field_values: {match_id: match-20, assessment_ref: assess-20, candidate_ref: candidate:a2a-research, task_requirement_ref: task:45, match_state: indeterminate, evidence_refs: [a2a:agent-card/research-agent#skill/research]}
    related_node_ids: [ToolMatch, ToolCandidate]
    related_relation_ids: [ToolMatch-was_generated_by-ToolCandidateAssessment]

    source_claims: [claim-match-a2a-skill, claim-match-local]
parent_relation: null
relations:
  - id: ToolMatch-was_generated_by-ToolCandidateAssessment
    predicate: was_generated_by
    target: concept:ToolCandidateAssessment
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 由候选评估生成, en: was generated by candidate assessment, ja: candidate assessment により生成された}
    definitions:
      zh: 当 ToolCandidateAssessment 比较候选、任务要求和证据并记录匹配结论时，ToolMatch 由该评估活动生成。
      en: ToolMatch was generated by ToolCandidateAssessment when that activity compared a candidate, task requirement, and evidence and recorded a match conclusion.
      ja: ToolCandidateAssessment が candidate、task requirement、evidence を比較して match conclusion を記録したとき、ToolMatch はその assessment activity により生成された。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: generated
      labels: {zh: 生成匹配 finding, en: generated match finding, ja: match finding を生成した}
    conditions:
      - id: match-generation-provenance-condition
        severity: error
        expression: Assert was_generated_by only when assessment_ref identifies the assessment that compared the candidate and task requirement and evidence_refs support the recorded match state.
        explanations: {zh: 匹配 finding 需要对应的评估活动和证据，不能由候选名称、排序或模型配置单独生成。, en: A match finding requires its assessment activity and evidence; it cannot be generated merely from a candidate name, ranking, or model configuration., ja: match finding には対応する assessment activity と evidence が必要であり、candidate name、ranking、model configuration だけから生成できない。}
        source_claims: [claim-match-prov-generation, claim-match-local]
    temporal_scope: valid-time
    boundary_context: This provenance link records an assessment output and does not assert that a match is a selected tool, a model tool_choice, or an invocation.
    constraints: []
    examples: []
    source_claims: [claim-match-prov-generation, claim-match-local]
    distinct_fact_rationale:
      zh: 生成溯源把独立的匹配 finding 连接到产生它的评估活动，而不把 finding 误建模为活动的组成部分。
      en: Generation provenance links the independent match finding to its producing assessment activity without mis-modeling the finding as an activity component.
      ja: generation provenance は独立した match finding をそれを生成した assessment activity に結び、finding を activity の構成要素として誤って model 化しない。
    layout_role: cross-link
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol — Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-spec
    relevance: Defines Tool capability descriptions and schemas used as native matching evidence.
  - id: a2a-latest-specification
    title: Agent2Agent Protocol Specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-spec
    relevance: Defines AgentSkill capability descriptions used as native matching evidence.
  - id: w3c-prov-o
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines Entity and Activity provenance links, including an Entity's generation by an Activity.
source_claims:
  - id: claim-match-mcp-schema
    source: mcp-tools-2025-11-25
    supports: An MCP Tool declaration supplies a name, description, required inputSchema, and optional output schema and annotations that can serve as native capability evidence.
    locator: Tools — Tool definition
    evidence_kind: normative
    confidence: high
  - id: claim-match-a2a-skill
    source: a2a-latest-specification
    supports: An A2A AgentSkill exposes descriptive capability fields including name, description, tags, and optional input and output modes and security requirements.
    locator: AgentCard and AgentSkill data model
    evidence_kind: normative
    confidence: high
  - id: claim-match-local
    source: mcp-tools-2025-11-25
    supports: match_id, assessment_ref, task_requirement_ref, match_state, rationale, and the separation of a match finding from ranking, selection, and invocation are Moonweave-local assessment design inferences.
    locator: Tools — Tool definition
    evidence_kind: design-inference
    confidence: high
  - id: claim-match-prov-generation
    source: w3c-prov-o
    supports: PROV-O relates a generated Entity to the Activity that generated it; this local was_generated_by link records a ToolMatch finding without asserting structural composition.
    locator: Section 3.1, prov:Entity and prov:wasGeneratedBy
    evidence_kind: standard
    confidence: high
