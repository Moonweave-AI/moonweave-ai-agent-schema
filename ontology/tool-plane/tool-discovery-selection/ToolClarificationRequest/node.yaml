schema: moonweave.ai/ontology-node/v1
id: ToolClarificationRequest
kind: concept
labels:
  zh: 工具选择澄清请求
  en: Tool Clarification Request
  ja: ツール選択確認要求
semantics:
  short_definition:
    zh: 因选择所需事实缺失或歧义而发出的、阻止或限定工具选择的本地信息请求。
    en: A local information request that blocks or narrows tool selection because a required fact is missing or ambiguous.
    ja: 必要な fact の欠落または曖昧さにより tool selection を block または narrow する local information request。
  definition:
    zh: ToolClarificationRequest 是由 ToolSelectionActivity 在候选、任务、权限、风险或输出要求不足以支持选择时生成的本地请求记录。它明确问题、所缺事实和被阻塞的选择步骤，并等待用户、策略系统或受权参与者提供信息；它不是一个候选、评估 finding、最终选择、批准结果、工具调用或发现新目录的请求。
    en: ToolClarificationRequest is a local request record generated by ToolSelectionActivity when candidates, task details, permissions, risk, or output requirements are insufficient to support a choice. It names the question, missing fact, and blocked selection step and waits for information from a user, policy system, or authorized participant; it is not a candidate, assessment finding, final selection, approval result, tool call, or request to discover a new catalog.
    ja: ToolClarificationRequest は candidate、task detail、permission、risk、output requirement が choice を支持するのに不十分なとき ToolSelectionActivity により生成される local request record である。question、missing fact、blocked selection step を明示し、user、policy system、authorized participant からの情報を待つ。candidate、assessment finding、final selection、approval result、tool call、新しい catalog を発見する request ではない。
  why_needed:
    zh: 当多个候选都可能合理时，强行选择会隐藏任务或授权假设。澄清请求保留“不足以决定”的状态，使选择能在信息到达后继续，而不是把猜测写成工具偏好。
    en: When multiple candidates could be reasonable, forcing a choice hides task or authorization assumptions. A clarification request preserves the “insufficient to decide” state so selection can continue after information arrives rather than recording a guess as tool preference.
    ja: 複数の candidate が合理的であり得るとき、choice を強制すると task または authorization assumption を隠す。clarification request は「決定には不十分」という state を保持し、情報が到着した後に selection を継続でき、guess を tool preference として記録しない。
  includes:
    - zh: 被阻塞选择活动、缺失事实类别、问题文本和答复来源约束。
      en: The blocked selection activity, missing-fact category, question text, and response-source constraint.
      ja: blocked selection activity、missing-fact category、question text、response-source constraint。
    - zh: 对任务范围、所需输出、许可或风险偏好的明确追问。
      en: An explicit follow-up about task scope, required output, permission, or risk preference.
      ja: task scope、required output、permission、risk preference に関する明示的な follow-up。
  excludes:
    - zh: 对新工具目录的搜索、候选资格判断、批准动作、最终决策和实际执行。
      en: Searching a new tool catalog, candidate eligibility judgment, approval action, final decision, and actual execution.
      ja: new tool catalog の検索、candidate eligibility judgment、approval action、final decision、actual execution。
    - zh: 将泛化问题当作已获得的用户授权或任务需求。
      en: Treating a generic question as already obtained user authorization or task requirement.
      ja: generic question を既に得られた user authorization や task requirement と扱うこと。
  semantic_kind: information
engineering:
  explanation:
    zh: 选择器保存 request_id、selection_activity_ref、missing_fact_kind、question 和 response_authority。答复到达后应创建或更新相关任务/政策证据并重新评估或选择；不能仅因提出问题就写入 selected_candidate_ref 或工具参数。
    en: A selector stores request_id, selection_activity_ref, missing_fact_kind, question, and response_authority. After an answer arrives, it should create or update relevant task or policy evidence and reassess or select; asking the question alone cannot write selected_candidate_ref or tool arguments.
    ja: selector は request_id、selection_activity_ref、missing_fact_kind、question、response_authority を保存する。answer 到着後、関連 task または policy evidence を作成または更新し、reassess または select すべきである。question を出しただけで selected_candidate_ref や tool argument を書けない。
  typical_input:
    - description:
        zh: 选择中的信息缺口
        en: Information gap during selection
        ja: Selection 中の information gap
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"selection_gap","selection_activity_ref":"selection:17","task_requirement_ref":"task:42","missing_fact_kind":"output_format","candidate_refs":["candidate:csv-export","candidate:json-export"]}
      source_claims: [claim-clarification-local]
    - description:
        zh: OpenAI 可选工具约束
        en: OpenAI allowed-tools constraint
        ja: OpenAI allowed-tools constraint
      format: |-
        {"tool_choice":{"type":"allowed_tools","mode":"auto","tools":[{"type":"mcp","server_label":"export","name":"csv-export"},{"type":"mcp","server_label":"export","name":"json-export"}]}}
      source_claims: [claim-clarification-openai]
  typical_output:
    - description:
        zh: 本地澄清请求
        en: Local clarification request
        ja: Local clarification request
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"tool_clarification_request","request_id":"clarify-17","selection_activity_ref":"selection:17","missing_fact_kind":"output_format","question":"Should the export be CSV or JSON?","response_authority":"user","blocks_decision_ref":"decision:select-17"}
      source_claims: [claim-clarification-local]
  reference_implementations:
    - name: OpenAI Responses create reference
      url: https://developers.openai.com/api/reference/resources/responses/methods/create
      description: Defines model tool-choice constraints whose presence does not substitute for task clarification.
    - name: Model Context Protocol Tool definition
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines native tool descriptions and input schemas that may reveal an unresolved requirement.
structure:
  identity_keys: [request_id]
  fields:
    - id: request_id
      labels: {zh: 澄清请求标识, en: Clarification-request identifier, ja: clarification-request 識別子}
      definitions:
        zh: 稳定标识一个本地澄清请求，不替代会话消息 id、审批 id 或选择决策 id。
        en: Stably identifies one local clarification request and does not replace a conversation message id, approval id, or selection-decision id.
        ja: 一つの local clarification request を安定して識別し、conversation message id、approval id、selection-decision id を置き換えない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: clarify-17
      source_claims: [claim-clarification-local]
    - id: selection_activity_ref
      labels: {zh: 选择活动引用, en: Selection-activity reference, ja: selection-activity 参照}
      definitions:
        zh: 指向因信息不足而暂停或受限的 ToolSelectionActivity。
        en: Points to the ToolSelectionActivity paused or constrained by missing information.
        ja: missing information により pause または制約された ToolSelectionActivity を指す。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: selection:17
      source_claims: [claim-clarification-local]
    - id: missing_fact_kind
      labels: {zh: 缺失事实种类, en: Missing-fact kind, ja: missing-fact kind}
      definitions:
        zh: 说明需要澄清的是任务范围、输出格式、权限、风险阈值或其他可检验事实。
        en: States whether clarification is needed for task scope, output format, permission, risk threshold, or another inspectable fact.
        ja: task scope、output format、permission、risk threshold、その他の inspectable fact のどれに clarification が必要かを示す。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [task_scope, output_format, permission, risk_threshold, input_value, policy_exception]
      pattern: null
      example_value: output_format
      source_claims: [claim-clarification-local]
    - id: question
      labels: {zh: 澄清问题, en: Clarification question, ja: clarification question}
      definitions:
        zh: 向指定答复主体提出的具体问题，必须能减少当前选择中的可检验歧义。
        en: A concrete question to the specified response authority that must reduce an inspectable ambiguity in the current selection.
        ja: 指定された response authority への具体的な question。current selection の inspectable ambiguity を減らさなければならない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Should the export be CSV or JSON?
      source_claims: [claim-clarification-local]
    - id: response_authority
      labels: {zh: 答复授权主体, en: Response authority, ja: response authority}
      definitions:
        zh: 指定可提供该事实的主体，例如 user、policy-system 或 authorized-approver；问题本身不授予许可。
        en: Identifies who may provide the fact, such as user, policy-system, or authorized-approver; the question itself grants no permission.
        ja: user、policy-system、authorized-approver など fact を提供できる主体を示す。question 自体は permission を与えない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [user, policy-system, authorized-approver]
      pattern: null
      example_value: user
      source_claims: [claim-clarification-local]
  constraints:
    - id: clarification-must-name-a-blocking-fact
      severity: error
      expression_language: plain
      expression: Every ToolClarificationRequest must reference one selection activity, state one missing_fact_kind, identify response_authority, and ask a concrete question that can change or validate a later assessment or decision.
      explanation:
        zh: 澄清必须解决可验证的不确定性，而不能只是空泛对话。
        en: Clarification must resolve verifiable uncertainty rather than serve as a vague conversation.
        ja: clarification は曖昧な conversation ではなく、検証可能な uncertainty を解決しなければならない。
      source_claims: [claim-clarification-local]
    - id: clarification-is-not-choice-or-authorization
      severity: error
      expression_language: plain
      expression: A ToolClarificationRequest must not set selected_candidate_ref, decision_state selected, approval_granted, tool_choice, tool_call, or tool_result; only an answer plus subsequent assessment or decision may change those records.
      explanation:
        zh: 提问不等于取得授权、作出选择或执行工具。
        en: Asking does not equal obtaining authorization, making a choice, or executing a tool.
        ja: asking は authorization の取得、choice、tool execution と同じではない。
      source_claims: [claim-clarification-openai, claim-clarification-local]
  required_relations: []
examples:
  - id: clarification-positive-output-format

    labels: {zh: 询问导出格式, en: Ask export format, ja: export format を尋ねる}
    descriptions:
      zh: ToolBench (Qin 2023) 16000+ RapidAPI 工具发现；Gorilla APIBench 1645 API retriever-aware 检索；Toolformer 支持 Calculator/QA/Search/Translator/Calendar 五类工具发现。
      en: ToolBench (Qin 2023) discovers tools among 16000+ RapidAPI; Gorilla APIBench 1645 API retriever-aware retrieval; Toolformer supports Calculator/QA/Search/Translator/Calendar discovery.
      ja: ToolBench (Qin 2023) が 16000+ RapidAPI から tool 発見。Gorilla APIBench 1645 API retriever-aware 检索。Toolformer が Calculator/QA/Search/Translator/Calendar 五类 tool 発見を支持。
    field_values: {request_id: clarify-17, selection_activity_ref: selection:17, missing_fact_kind: output_format, question: 'Should the export be CSV or JSON?', response_authority: user}
    related_node_ids: [ToolClarificationRequest, ToolSelectionActivity]
    related_relation_ids: [ToolClarificationRequest-was_generated_by-ToolSelectionActivity]

    source_claims: [claim-clarification-local]
  - id: clarification-counterexample-question-selects-tool

    labels: {zh: 在澄清中预先选择工具, en: Preselect a tool in clarification, ja: clarification で tool を事前選択する}
    descriptions:
      zh: 反例：Gorilla 无 retriever 时 hallucinate 不存在 API；ToolBench 未验证 RapidAPI endpoint 可用性即加入候选集。
      en: Counterexample: Gorilla hallucinates nonexistent API without retriever; ToolBench adds candidates without verifying RapidAPI endpoint availability.
      ja: 反例：Gorilla が retriever なしで不存在 API を hallucinate。ToolBench が RapidAPI endpoint 可用性未検証で candidate set に追加。
    field_values: {request_id: clarify-18, selection_activity_ref: selection:18, missing_fact_kind: output_format, question: 'CSV or JSON?', response_authority: user, selected_candidate_ref: candidate:csv-export}
    related_node_ids: [ToolClarificationRequest, ToolSelectionDecision]
    related_relation_ids: []

    source_claims: [claim-clarification-local]
  - id: clarification-boundary-new-discovery

    labels: {zh: 澄清与新发现的边界, en: Boundary between clarification and new discovery, ja: clarification と new discovery の境界}
    descriptions:
      zh: Gorilla APIBench 离线训练检索 vs ToolBench 在线 RapidAPI 实时发现的注册边界；ToolMatch 分数非 ToolBench DFSDT 决策树节点。
      en: Boundary between Gorilla APIBench offline training retrieval vs ToolBench online RapidAPI live discovery; ToolMatch score is not a ToolBench DFSDT tree node.
      ja: Gorilla APIBench offline 訓練检索と ToolBench online RapidAPI リアルタイム発見の登録境界。ToolMatch score は ToolBench DFSDT 決定木 node ではない。
    field_values: {request_id: clarify-19, selection_activity_ref: selection:19, missing_fact_kind: task_scope, question: 'Must this tool run offline?', response_authority: user}
    related_node_ids: [ToolClarificationRequest, ToolDiscoveryActivity]
    related_relation_ids: [ToolClarificationRequest-was_generated_by-ToolSelectionActivity]

    source_claims: [claim-clarification-local]
  - id: clarification-instance-permission-authority

    labels: {zh: 权限澄清实例, en: Permission-clarification instance, ja: permission-clarification instance}
    descriptions:
      zh: Gorilla 实例：retriever 返回 torch.hub.load API 文档；ToolBench 实例：RapidAPI "Spoonacular" recipe search API tool_id=spoonacular-search。
      en: Gorilla instance: retriever returns torch.hub.load API docs; ToolBench instance: RapidAPI "Spoonacular" recipe search API tool_id=spoonacular-search.
      ja: Gorilla 実例：retriever が torch.hub.load API 文档を返す。ToolBench 実例：RapidAPI "Spoonacular" recipe search API tool_id=spoonacular-search。
    field_values: {request_id: clarify-20, selection_activity_ref: selection:20, missing_fact_kind: permission, question: 'May this task use write access?', response_authority: authorized-approver}
    related_node_ids: [ToolClarificationRequest, ToolEligibilityAssessment]
    related_relation_ids: [ToolClarificationRequest-was_generated_by-ToolSelectionActivity]

    source_claims: [claim-clarification-local]
parent_relation: null
relations:
  - id: ToolClarificationRequest-was_generated_by-ToolSelectionActivity
    predicate: was_generated_by
    target: concept:ToolSelectionActivity
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 由工具选择活动生成, en: was generated by tool selection activity, ja: tool selection activity により生成された}
    definitions:
      zh: 当 ToolSelectionActivity 识别到影响候选选择的未知事实并记录问题与答复约束时，ToolClarificationRequest 由该活动生成。
      en: ToolClarificationRequest was generated by ToolSelectionActivity when that activity identified an unknown fact affecting candidate choice and recorded the question and response constraint.
      ja: ToolSelectionActivity が candidate choice に影響する unknown fact を識別し、question と response constraint を記録したとき、ToolClarificationRequest はその activity により生成された。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: generated
      labels: {zh: 生成澄清请求, en: generated clarification request, ja: clarification request を生成した}
    conditions:
      - id: clarification-generation-provenance-condition
        severity: error
        expression: Assert was_generated_by only when selection_activity_ref identifies the activity that recorded a concrete missing fact, question, and response authority; the request itself is not an approval or selection result.
        explanations: {zh: 生成关系记录选择活动产生的信息请求，不把问题、答复权限或未决状态误当作授权或决策。, en: The generation relation records the selection activity's information request without mistaking a question, response authority, or pending state for authorization or a decision., ja: generation relation は selection activity の information request を記録し、question、response authority、pending state を authorization または decision と誤認しない。}
        source_claims: [claim-clarification-prov-generation, claim-clarification-local]
    temporal_scope: valid-time
    boundary_context: This provenance link records a generated local request; it does not convert the request into user authorization, a protocol message, a discovery activity, or a tool call.
    constraints: []
    examples: []
    source_claims: [claim-clarification-prov-generation, claim-clarification-local]
    distinct_fact_rationale:
      zh: 生成溯源连接选择活动与其产生的澄清记录，而不把该请求误建模为活动的组成部分。
      en: Generation provenance links the selection activity to its generated clarification record without mis-modeling the request as an activity component.
      ja: generation provenance は selection activity と生成された clarification record を結び、request を activity の構成要素として誤って model 化しない。
    layout_role: cross-link
sources:
  - id: openai-responses-create-reference
    title: OpenAI API — Responses create reference
    url: https://developers.openai.com/api/reference/resources/responses/methods/create
    source_type: official-doc
    relevance: Defines model-side tool constraints that remain distinct from a local task clarification and selection decision.
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol — Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-spec
    relevance: Defines native Tool descriptions and schemas used to identify unresolved input or output requirements.
  - id: w3c-prov-o
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines Entity and Activity provenance links, including an Entity's generation by an Activity.
source_claims:
  - id: claim-clarification-openai
    source: openai-responses-create-reference
    supports: OpenAI Responses tool_choice and allowed-tools shapes constrain available model tool choices but do not contain a user task clarification or authorization result.
    locator: Request body — tool_choice and allowed_tools
    evidence_kind: normative
    confidence: high
  - id: claim-clarification-mcp
    source: mcp-tools-2025-11-25
    supports: An MCP Tool declaration has its own description and input schema, allowing an application to inspect which task facts remain needed without invoking the tool.
    locator: Tools — Tool definition
    evidence_kind: normative
    confidence: high
  - id: claim-clarification-local
    source: openai-responses-create-reference
    supports: request_id, missing_fact_kind, question, response_authority, blocking selection state, and separation from authorization, selection, discovery, and invocation are Moonweave-local design inferences.
    locator: Request body — tool_choice and allowed_tools
    evidence_kind: design-inference
    confidence: high
  - id: claim-clarification-prov-generation
    source: w3c-prov-o
    supports: PROV-O relates a generated Entity to the Activity that generated it; this local was_generated_by link records a ToolClarificationRequest without asserting structural composition.
    locator: Section 3.1, prov:Entity and prov:wasGeneratedBy
    evidence_kind: standard
    confidence: high
