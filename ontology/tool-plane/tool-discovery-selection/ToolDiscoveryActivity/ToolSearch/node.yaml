schema: moonweave.ai/ontology-node/v1
id: ToolSearch
kind: concept
labels:
  zh: 工具搜索
  en: Tool Search
  ja: ツール検索
semantics:
  short_definition:
    zh: 根据本地需求在已知能力目录中发现候选工具的活动。
    en: An activity that discovers candidate tools in known capability catalogs from local requirements.
    ja: ローカルの要求から既知の capability catalog 内の候補ツールを発見する活動。
  definition:
    zh: ToolSearch 是 Moonweave 中将 ToolSearchQuery 应用于一个或多个能力来源、形成可追溯 ToolCandidateSet 的发现活动。它可以读取 MCP tools/list 的工具定义或 A2A AgentCard 的 skills，但不会声称 MCP tools/list 接受关键词查询，也不会判定候选可用、合格、排名或已选择。
    en: ToolSearch is the Moonweave discovery activity that applies a ToolSearchQuery to one or more capability sources and forms a traceable ToolCandidateSet. It may read MCP tools/list tool definitions or A2A AgentCard skills, but it does not claim that MCP tools/list accepts keyword queries and does not decide availability, eligibility, ranking, or selection.
    ja: ToolSearch は ToolSearchQuery を一つ以上の capability source に適用し、追跡可能な ToolCandidateSet を作る Moonweave の discovery activity である。MCP tools/list の tool definition や A2A AgentCard の skills を読めるが、MCP tools/list が keyword query を受け取るとは主張せず、availability、eligibility、ranking、selection を決定しない。
  why_needed:
    zh: 不同协议以不同对象公布能力；把发现步骤与之后的评估和决策分开，能保留来源、分页和不确定性，而不把“已列出”误写成“应调用”。
    en: Protocols publish capabilities through different objects. Separating discovery from later assessment and decision preserves provenance, pagination, and uncertainty without turning “listed” into “should be called.”
    ja: protocol は異なる object で capability を公開する。discovery を後続の assessment と decision から分けることで、provenance、pagination、不確実性を保持し、「listed」を「should be called」に変えない。
  includes:
    - zh: 读取 MCP tools/list 响应、A2A AgentCard skills 或等价目录，并用本地查询过滤或整理候选。
      en: Reading MCP tools/list responses, A2A AgentCard skills, or equivalent catalogs and locally filtering or organizing candidates with a query.
      ja: MCP tools/list response、A2A AgentCard skills、または同等の catalog を読み、query で候補をローカルに filter または整理すること。
    - zh: 记录目录快照、游标和候选的来源引用。
      en: Recording a catalog snapshot, cursor, and provenance references for candidates.
      ja: catalog snapshot、cursor、候補の provenance reference を記録すること。
  excludes:
    - zh: 对候选作可用性、资格或任务匹配判断，以及在多个候选中作最终选择。
      en: Judging candidate availability, eligibility, or task match, or making a final choice among candidates.
      ja: candidate の availability、eligibility、task match を判断すること、または候補間の最終選択。
    - zh: MCP tools/call 的执行，或把 tools/list 的 cursor 当作服务端关键词搜索参数。
      en: MCP tools/call execution, or treating the tools/list cursor as a server-side keyword-search parameter.
      ja: MCP tools/call の実行、または tools/list cursor を server-side keyword-search parameter として扱うこと。
  semantic_kind: activity
engineering:
  explanation:
    zh: 适配器先保留原生目录快照，再在本地把 ToolSearchQuery 与名称、描述、inputSchema 或 AgentSkill 标签比较，输出候选集。MCP 分页由 nextCursor 继续；本地相关性信号只用于发现，不能替代选择决策。
    en: An adapter first retains the native catalog snapshot, then locally compares a ToolSearchQuery with names, descriptions, inputSchema, or AgentSkill tags and emits a candidate set. MCP pagination continues through nextCursor; local relevance signals support discovery only and do not replace a selection decision.
    ja: adapter はまず native catalog snapshot を保持し、ToolSearchQuery を name、description、inputSchema、AgentSkill tag とローカルに比較して candidate set を出力する。MCP pagination は nextCursor で継続し、local relevance signal は discovery だけを支え、selection decision を置き換えない。
  typical_input:
    - description:
        zh: MCP 工具目录请求
        en: MCP tool-catalog request
        ja: MCP tool catalog request
      format: |-
        {"jsonrpc":"2.0","id":17,"method":"tools/list","params":{"cursor":"page-2"}}
      source_claims: [claim-tool-search-mcp-list]
    - description:
        zh: A2A AgentCard 技能目录
        en: A2A AgentCard skill catalog
        ja: A2A AgentCard skill catalog
      format: |-
        {"name":"Research agent","skills":[{"id":"web-research","name":"Web research","description":"Find and summarize public sources","tags":["search","research"],"inputModes":["text/plain"],"outputModes":["text/plain"]}]}
      source_claims: [claim-tool-search-a2a-skills]
    - description:
        zh: 本地工具搜索查询
        en: Local tool-search query
        ja: Local tool-search query
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"tool_search_query","query_id":"q-17","requested_capabilities":["search"],"required_input":"text/plain"}
      source_claims: [claim-tool-search-local-discovery]
  typical_output:
    - description:
        zh: 带来源的本地候选集
        en: Local candidate set with provenance
        ja: provenance を持つ local candidate set
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"tool_candidate_set","candidate_set_id":"set-17","search_id":"search-17","source_snapshot_ref":"mcp:list:17","continuation_cursor":"page-3","candidate_refs":["candidate:search-docs"]}
      source_claims: [claim-tool-search-local-discovery]
  reference_implementations:
    - name: Model Context Protocol tools/list
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines discovery of server-exposed tools, their schemas, and cursor pagination.
    - name: A2A Agent Card
      url: https://a2a-protocol.org/latest/specification/
      description: Defines AgentCard skills as descriptions of focused capabilities an agent can perform.
structure:
  identity_keys: [search_id]
  fields:
    - id: search_id
      labels: {zh: 搜索标识, en: Search identifier, ja: 検索識別子}
      definitions:
        zh: 稳定标识一次本地发现活动，不替代 MCP JSON-RPC id、MCP 工具名或 A2A AgentCard 标识。
        en: Stably identifies one local discovery activity and does not replace an MCP JSON-RPC id, MCP tool name, or A2A AgentCard identifier.
        ja: 一つの local discovery activity を安定して識別し、MCP JSON-RPC id、MCP tool name、A2A AgentCard identifier を置き換えない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: search-17
      source_claims: [claim-tool-search-local-discovery]
    - id: query_ref
      labels: {zh: 查询引用, en: Query reference, ja: query 参照}
      definitions:
        zh: 指向驱动本次发现的本地 ToolSearchQuery；它不是 MCP tools/list 的协议参数声明。
        en: Points to the local ToolSearchQuery driving discovery; it is not a declaration of an MCP tools/list protocol parameter.
        ja: discovery を駆動する local ToolSearchQuery を指し、MCP tools/list protocol parameter の宣言ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: query:q-17
      source_claims: [claim-tool-search-local-discovery, claim-tool-search-mcp-list]
    - id: source_snapshot_refs
      labels: {zh: 来源快照引用, en: Source snapshot references, ja: source snapshot 参照}
      definitions:
        zh: 指向本次读取的原生 tools/list 页面、AgentCard 或其他目录快照，以便重新验证候选来源与分页状态。
        en: Points to native tools/list pages, AgentCards, or other catalog snapshots read by this search so candidate provenance and pagination state can be re-verified.
        ja: この search が読んだ native tools/list page、AgentCard、または他の catalog snapshot を指し、candidate provenance と pagination state を再検証できるようにする。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: mcp:list:17
      source_claims: [claim-tool-search-mcp-list, claim-tool-search-a2a-skills]
  constraints:
    - id: tool-search-preserves-native-discovery-shape
      severity: error
      expression_language: plain
      expression: Every ToolSearch must retain at least one source_snapshot_refs entry, and an MCP source must retain its tools/list response or cursor rather than inventing query fields in the MCP request.
      explanation:
        zh: MCP tools/list 用游标列举工具；本地查询可以过滤其结果，但不能伪造服务端关键词接口。
        en: MCP tools/list enumerates tools with a cursor; a local query may filter its result but cannot fabricate a server-side keyword interface.
        ja: MCP tools/list は cursor で tool を列挙する。local query は結果を filter できるが、server-side keyword interface を捏造できない。
      source_claims: [claim-tool-search-mcp-list, claim-tool-search-local-discovery]
    - id: tool-search-does-not-select
      severity: error
      expression_language: plain
      expression: A ToolSearch output may contain candidate_refs and discovery signals only; it must not assert availability_state, eligibility_state, rank, selected_candidate_ref, or a tool invocation.
      explanation:
        zh: 列出候选只说明它们被发现，评估、排序和选择属于后续概念。
        en: Listing candidates only says that they were discovered; assessment, ranking, and selection belong to later concepts.
        ja: candidate を列挙することは発見されたことだけを示す。assessment、ranking、selection は後続 concept に属する。
      source_claims: [claim-tool-search-local-discovery]
  required_relations: []
examples:
  - id: tool-search-positive-mcp-page

    labels: {zh: 读取 MCP 工具页, en: Read an MCP tool page, ja: MCP tool page を読む}
    descriptions:
      zh: ToolBench (Qin 2023) 16000+ RapidAPI 工具发现；Gorilla APIBench 1645 API retriever-aware 检索；Toolformer 支持 Calculator/QA/Search/Translator/Calendar 五类工具发现。
      en: ToolBench (Qin 2023) discovers tools among 16000+ RapidAPI; Gorilla APIBench 1645 API retriever-aware retrieval; Toolformer supports Calculator/QA/Search/Translator/Calendar discovery.
      ja: ToolBench (Qin 2023) が 16000+ RapidAPI から tool 発見。Gorilla APIBench 1645 API retriever-aware 检索。Toolformer が Calculator/QA/Search/Translator/Calendar 五类 tool 発見を支持。
    field_values: {search_id: search-17, query_ref: query:q-17, source_snapshot_refs: [mcp:list:17]}
    related_node_ids: [ToolSearch, ToolSearchQuery, ToolCandidateSet]
    related_relation_ids: [ToolSearch-part-of-ToolDiscoveryActivity]

    source_claims: [claim-tool-search-mcp-list, claim-tool-search-local-discovery]
  - id: tool-search-counterexample-list-is-selection

    labels: {zh: 将列举误作选择, en: Treat listing as selection, ja: listing を selection と誤認する}
    descriptions:
      zh: 反例：Gorilla 无 retriever 时 hallucinate 不存在 API；ToolBench 未验证 RapidAPI endpoint 可用性即加入候选集。
      en: Counterexample: Gorilla hallucinates nonexistent API without retriever; ToolBench adds candidates without verifying RapidAPI endpoint availability.
      ja: 反例：Gorilla が retriever なしで不存在 API を hallucinate。ToolBench が RapidAPI endpoint 可用性未検証で candidate set に追加。
    field_values: {search_id: search-18, query_ref: query:q-18, source_snapshot_refs: [mcp:list:18], selected_candidate_ref: candidate:first}
    related_node_ids: [ToolSearch, ToolSelectionDecision]
    related_relation_ids: []

    source_claims: [claim-tool-search-mcp-list, claim-tool-search-local-discovery]
  - id: tool-search-boundary-a2a-skills

    labels: {zh: A2A 技能描述边界, en: A2A skill-description boundary, ja: A2A skill description の境界}
    descriptions:
      zh: Gorilla APIBench 离线训练检索 vs ToolBench 在线 RapidAPI 实时发现的注册边界；ToolMatch 分数非 ToolBench DFSDT 决策树节点。
      en: Boundary between Gorilla APIBench offline training retrieval vs ToolBench online RapidAPI live discovery; ToolMatch score is not a ToolBench DFSDT tree node.
      ja: Gorilla APIBench offline 訓練检索と ToolBench online RapidAPI リアルタイム発見の登録境界。ToolMatch score は ToolBench DFSDT 決定木 node ではない。
    field_values: {search_id: search-19, query_ref: query:q-19, source_snapshot_refs: [a2a:agent-card/research-agent]}
    related_node_ids: [ToolSearch, ToolCandidate, ToolSearchQuery]
    related_relation_ids: [ToolSearch-part-of-ToolDiscoveryActivity]

    source_claims: [claim-tool-search-a2a-skills, claim-tool-search-local-discovery]
  - id: tool-search-instance-paginated-catalog

    labels: {zh: 分页目录搜索实例, en: Paginated catalog-search instance, ja: paginated catalog-search instance}
    descriptions:
      zh: Gorilla 实例：retriever 返回 torch.hub.load API 文档；ToolBench 实例：RapidAPI "Spoonacular" recipe search API tool_id=spoonacular-search。
      en: Gorilla instance: retriever returns torch.hub.load API docs; ToolBench instance: RapidAPI "Spoonacular" recipe search API tool_id=spoonacular-search.
      ja: Gorilla 実例：retriever が torch.hub.load API 文档を返す。ToolBench 実例：RapidAPI "Spoonacular" recipe search API tool_id=spoonacular-search。
    field_values: {search_id: search-20, query_ref: query:q-20, source_snapshot_refs: [mcp:list:20], continuation_cursor: page-3}
    related_node_ids: [ToolSearch, ToolCandidateSet]
    related_relation_ids: [ToolSearch-part-of-ToolDiscoveryActivity]

    source_claims: [claim-tool-search-mcp-list]
parent_relation:
  id: ToolSearch-part-of-ToolDiscoveryActivity
  predicate: part_of
  target: concept:ToolDiscoveryActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 是工具发现的搜索步骤, en: is a search step of tool discovery, ja: tool discovery の検索段階である}
  definitions:
    zh: ToolSearch 是 ToolDiscoveryActivity 中读取能力目录并形成候选的步骤；它不会替代发现活动的整体来源管理。
    en: ToolSearch is the step within ToolDiscoveryActivity that reads capability catalogs and forms candidates; it does not replace the activity's overall provenance management.
    ja: ToolSearch は ToolDiscoveryActivity 内で capability catalog を読み候補を作る段階であり、activity 全体の provenance management を置き換えない。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_part
    labels: {zh: 包含搜索步骤, en: has search step, ja: 検索段階を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: This is a Moonweave composition relation; protocol-native discovery requests and responses remain defined by MCP or A2A.
  constraints: []
  examples: []
  source_claims: [claim-tool-search-local-discovery]
  distinct_fact_rationale:
    zh: 该关系表达活动分解，不把本地搜索查询或候选集变成工具执行或选择决策。
    en: This relation expresses activity decomposition and does not turn a local query or candidate set into tool execution or a selection decision.
    ja: この relation は activity decomposition を表し、local query や candidate set を tool execution や selection decision に変えない。
  layout_role: primary-backbone
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol — Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-spec
    relevance: Defines tools/list discovery, Tool definitions, and cursor pagination.
  - id: a2a-latest-specification
    title: Agent2Agent Protocol Specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-spec
    relevance: Defines AgentCard and AgentSkill capability descriptions.
source_claims:
  - id: claim-tool-search-mcp-list
    source: mcp-tools-2025-11-25
    supports: MCP tools/list is a discovery request with an optional cursor and returns a tools array with an optional nextCursor; each tool declaration carries its own name, description, and input schema.
    locator: Tools — Listing Tools and Tool definition
    evidence_kind: normative
    confidence: high
  - id: claim-tool-search-a2a-skills
    source: a2a-latest-specification
    supports: An A2A AgentCard can publish AgentSkill entries with id, name, description, tags, and optional input and output modes that describe focused tasks the agent can perform.
    locator: AgentCard and AgentSkill data model
    evidence_kind: normative
    confidence: high
  - id: claim-tool-search-local-discovery
    source: mcp-tools-2025-11-25
    supports: ToolSearchQuery, search_id, candidate-set construction, and local relevance signals are Moonweave design inferences over protocol-native catalog records; they preserve rather than extend MCP or A2A request schemas.
    locator: Tools — Listing Tools and Tool definition
    evidence_kind: design-inference
    confidence: high
