source_claims:
  - id: claim-tool-search-001
    source: eng-fw-openai-agents-tools
    supports: OpenAI hosted tool search loads only the deferred subset needed for the current turn, while disabled tools are hidden at runtime; this directly supports a query-bounded ToolSearch activity rather than treating the full registry as the candidate set.
    locator: Tools > Hosted tools > Hosted tool search; Conditional tool enabling
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tool-search-002
    source: eng-fw-openai-agents-tools
    supports: OpenAI hosted tool search loads a turn-relevant deferred subset, supporting ToolSearch as a concrete query-driven subtype of runtime ToolDiscoveryActivity.
    locator: Tools > Hosted tools > Hosted tool search; Conditional tool enabling
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tool-search-003
    source: eng-proto-mcp-tools-2025-06-18
    supports: MCP tools/list exposes tool definitions separately from tools/call invocation; Moonweave models search as reading those stable definitions without taking ownership of them.
    locator: Server Features > Tools > Protocol Messages > Listing Tools, Calling Tools, and List Changed Notification
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
