schema: moonweave.ai/ontology-node/v1
id: ToolSearch
kind: concept
status: accepted
labels:
  zh: 工具检索
  en: Tool search
  ja: ツール検索
semantics:
  short_definition:
    zh: 工具检索按当前需求从可见工具定义中形成有界候选集。
    en: Tool search forms a bounded candidate set from visible tool definitions for the current need.
    ja: ツール検索は現在の必要性に応じて可視ツール定義から有界候補集合を形成します。
  definition:
    zh: 工具检索是一种 ToolDiscoveryActivity，并沿用该发现活动的 discovery_activity_id：它消费一份 ToolSearchQuery，读取但不改写 ToolDefinition，并产生仅属于该次查询的 ToolCandidateSet；候选尚不是选择决定，更不是调用。
    en: Tool search is a ToolDiscoveryActivity and retains that discovery activity's discovery_activity_id. It consumes one ToolSearchQuery, reads but does not rewrite ToolDefinition records, and produces a ToolCandidateSet scoped to that query; a candidate is neither a selection decision nor an invocation.
    ja: ツール検索は ToolDiscoveryActivity の一種で、その discovery activity の discovery_activity_id を継承します。一つの ToolSearchQuery を消費し、ToolDefinition を変更せず読み、その query に限定された ToolCandidateSet を生成します。candidate は selection decision でも invocation でもありません。
  why_needed:
    zh: 该节点承载从大工具表面缩减为当前回合相关候选的真实活动，避免把工具注册表本身或模型最终选择误作搜索。
    en: This node captures the real activity that narrows a large tool surface to turn-relevant candidates, avoiding confusion with the registry itself or the model's eventual choice.
    ja: この node は大きな tool surface を turn-relevant candidates へ絞る実活動を表し、registry 自体や model の最終 choice との混同を防ぎます。
  includes:
    - zh: 按查询语义、当前上下文和硬性可见性条件检索延迟工具或注册工具的活动。
      en: Retrieval of deferred or registered tools using query semantics, current context, and hard visibility conditions.
      ja: query semantics、current context、hard visibility conditions により deferred/registered tools を検索する活動。
  excludes:
    - zh: 无任务查询的 tools/list 目录枚举、持久注册写入，以及已经带参数的 ToolCall。
      en: Query-free tools/list enumeration, persistent registry writes, and a parameterized ToolCall.
      ja: task query を伴わない tools/list enumeration、persistent registry write、parameterized ToolCall。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: completed_at
      labels:
        zh: 完成时间
        en: completed at
        ja: 完了時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 候选集形成完毕的 UTC 时间。
        en: UTC instant when candidate-set formation completed.
        ja: candidate-set formation が完了した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:20:00.000Z
      source_claims:
        - claim-tool-search-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: ToolSearch-example-positive-manual-001
    kind: positive
    labels:
      zh: 工具检索正例
      en: Positive case for Tool search
      ja: ツール検索の正例
    scenario_id: null
    descriptions:
      zh: 用户要求检查 Python 仓库安全问题；ToolSearch discover-tools-run-042 读取可见工具定义，只返回代码搜索、文件读取和静态分析候选。
      en: A user asks for a Python repository security review; ToolSearch discover-tools-run-042 reads visible definitions and returns only code-search, file-reading, and static-analysis candidates.
      ja: user が Python repository の security review を依頼し、ToolSearch discover-tools-run-042 は可視 definitions を読み code-search・file-reading・static-analysis candidates だけを返します。
    field_values:
      discovery_activity_id: discover-tools-run-042
      completed_at: 2026-07-16T01:20:00.000Z
    related_node_ids:
      - ToolSearch
      - ToolSearchQuery
      - ToolCandidateSet
      - ToolDefinition
    related_relation_ids:
      - ToolSearch-consumes_query-ToolSearchQuery
      - ToolSearch-reads_definition-ToolDefinition
      - ToolSearch-produces-ToolCandidateSet
    expected_result:
      zh: 查询、读取定义和产出候选集均归于继承的 discovery_activity_id，且没有生成 ToolCallPlan。
      en: The query, definition reads, and candidate-set output share the inherited discovery_activity_id, with no ToolCallPlan created.
      ja: query、definition read、candidate-set output は継承した discovery_activity_id に属し、ToolCallPlan は生成されません。
    why_valid_or_invalid:
      zh: 该例完整覆盖检索输入、读取边界和输出，并把选择与调用留给后续层级。
      en: The case covers search input, read boundary, and output while leaving selection and invocation to later levels.
      ja: search input、read boundary、output を網羅し、selection と invocation を後続 level に残します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-search-001
  - id: ToolSearch-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 工具检索边界例
      en: Boundary case for Tool search
      ja: ツール検索の境界例
    scenario_id: null
    descriptions:
      zh: 模型已经发出带 path 参数的 read_file 调用；即使调用所用工具先前经过搜索，该对象仍是 ToolCall 而不是 ToolSearch。
      en: The model has emitted a read_file call with a path argument; even if the tool was searched earlier, this object is ToolCall, not ToolSearch.
      ja: model が path argument 付き read_file call を発行した場合、tool が以前検索されていても、この object は ToolCall であり ToolSearch ではありません。
    field_values:
      discovery_activity_id: call-read-file-042
      completed_at: 2026-07-16T01:21:00.000Z
    related_node_ids:
      - ToolSearch
      - ToolCall
    related_relation_ids: []
    expected_result:
      zh: 带实参的调用保持 ToolCall 身份，不倒退归类为检索。
      en: The argument-bearing operation remains ToolCall and is not reclassified as search.
      ja: argument-bearing operation は ToolCall のままで search に再分類されません。
    why_valid_or_invalid:
      zh: 检索产生候选并沿用发现活动身份，调用则消费具体定义和参数并沿用调用身份；二者的上位活动和生命周期不同。
      en: Search produces candidates under a discovery-activity identity, whereas invocation consumes a concrete definition and arguments under an invocation identity; their parent activities and lifecycles differ.
      ja: search は discovery-activity identity の下で candidates を生成し、invocation は invocation identity の下で具体 definition と arguments を消費するため、上位 activity と lifecycle が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-search-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ToolSearch-is_a-ToolDiscoveryActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種
  definitions:
    zh: ToolSearch 是 ToolDiscoveryActivity 的严格子类；其区分条件是：消费 ToolSearchQuery 并产生仅属于该查询的 ToolCandidateSet。
    en: "ToolSearch is a strict subtype of ToolDiscoveryActivity; its differentia is: it consumes ToolSearchQuery and produces a ToolCandidateSet scoped to that query."
    ja: ToolSearch は ToolDiscoveryActivity の厳密な subtype で、種差は次の通りです：ToolSearchQuery を消費し query-scoped ToolCandidateSet を生成します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数由具体查询、候选集合和运行策略决定。
    en: Cardinality depends on the concrete query, candidate set, and runtime policy.
    ja: cardinality は具体 query・candidate set・runtime policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: inverse of is a
      ja: 逆：の一種
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ToolSearch-is_a-ToolDiscoveryActivity-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive case for is a
        ja: の一種の正例
      scenario_id: null
      descriptions:
        zh: 记录同时满足 ToolDiscoveryActivity 的上位定义和 ToolSearch 的完整种差：消费 ToolSearchQuery 并产生仅属于该查询的 ToolCandidateSet。
        en: "The record satisfies both the parent definition of ToolDiscoveryActivity and the complete differentia of ToolSearch: it consumes ToolSearchQuery and produces a ToolCandidateSet scoped to that query."
        ja: record は ToolDiscoveryActivity の上位 definition と ToolSearch の完全な種差を満たします：ToolSearchQuery を消費し query-scoped ToolCandidateSet を生成します。
      field_values: {}
      related_node_ids:
        - ToolSearch
        - ToolDiscoveryActivity
      related_relation_ids:
        - ToolSearch-is_a-ToolDiscoveryActivity
      expected_result:
        zh: 验证器将该记录归为 ToolSearch，并通过 is_a 继承 ToolDiscoveryActivity 的约束。
        en: Validation classifies the record as ToolSearch and inherits ToolDiscoveryActivity constraints through is_a.
        ja: validation は record を ToolSearch と分類し is_a により ToolDiscoveryActivity constraints を継承します。
      why_valid_or_invalid:
        zh: 完整种差而非名称前缀证明了 ToolSearch 的成员资格。
        en: The complete differentia, not a shared name prefix, proves membership in ToolSearch.
        ja: shared name prefix ではなく完全な種差が ToolSearch membership を証明します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-search-002
    - id: ToolSearch-is_a-ToolDiscoveryActivity-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種の境界例
      scenario_id: null
      descriptions:
        zh: 对象只满足 ToolDiscoveryActivity 的一般条件，却缺少 ToolSearch 的关键种差：消费 ToolSearchQuery 并产生仅属于该查询的 ToolCandidateSet。
        en: "The object satisfies only the general conditions of ToolDiscoveryActivity and lacks the defining differentia of ToolSearch: it consumes ToolSearchQuery and produces a ToolCandidateSet scoped to that query."
        ja: object は ToolDiscoveryActivity の一般条件だけを満たし ToolSearch の種差を欠きます：ToolSearchQuery を消費し query-scoped ToolCandidateSet を生成します。
      field_values: {}
      related_node_ids:
        - ToolSearch
        - ToolDiscoveryActivity
      related_relation_ids:
        - ToolSearch-is_a-ToolDiscoveryActivity
      expected_result:
        zh: 验证器保留 ToolDiscoveryActivity 身份，不把该对象提升为 ToolSearch。
        en: Validation retains ToolDiscoveryActivity identity and does not promote the object to ToolSearch.
        ja: validation は ToolDiscoveryActivity identity を保持し object を ToolSearch に昇格しません。
      why_valid_or_invalid:
        zh: 共享上位概念不足以证明 ToolSearch 的严格成员资格。
        en: A shared parent is insufficient to prove strict membership in ToolSearch.
        ja: shared parent だけでは ToolSearch の strict membership を証明できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-search-002
  source_claims:
    - claim-tool-search-002
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
