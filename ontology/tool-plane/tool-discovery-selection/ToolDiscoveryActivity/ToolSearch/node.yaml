          en: A registry publication creates definition version 19 and replaces catalog membership; that write fact is not reads_definition.
          ja: registry publication が definition version 19 を作り catalog membership を置換する write fact は reads_definition ではありません。
        field_values: {}
        related_node_ids:
          - ToolSearch
