schema: moonweave.ai/ontology-node/v1
id: ToolSearchQuery
kind: concept
status: accepted
labels:
  zh: 工具检索查询
  en: Tool search query
  ja: ツール検索クエリ
semantics:
  short_definition:
    zh: 工具检索查询记录一次工具搜索的任务意图和不可违反的约束。
    en: A tool search query records the task intent and non-negotiable constraints for one tool search.
    ja: ツール検索クエリは一回の tool search に対する task intent と違反不能な constraints を記録します。
  definition:
    zh: 工具检索查询是一份信息对象，固定某次搜索要解决的任务意图、所需能力、上下文范围和硬性约束；它不包含候选排名，也不等同于用户原始消息或工具参数。
    en: A tool search query is an information object that fixes the task intent, required capabilities, context scope, and hard constraints for one search; it contains neither candidate ranking nor tool-call arguments and is not the raw user message.
    ja: ツール検索クエリは一回の search の task intent、required capabilities、context scope、hard constraints を固定する information object で、candidate ranking や tool-call arguments を含まず raw user message とも異なります。
  why_needed:
    zh: 显式查询节点使所有候选和评估都能追溯到同一需求版本，避免任务变化后沿用已经失效的分数。
    en: An explicit query node lets every candidate and assessment trace to one requirement version and prevents stale scores from surviving a task change.
    ja: 明示 query node により全 candidate と assessment が同一 requirement version に追跡でき、task change 後の stale score を防ぎます。
  includes:
    - zh: 规范化的任务意图、必需能力、运行环境限制、权限前置条件和查询版本。
      en: Normalized task intent, required capabilities, environment limits, permission prerequisites, and query version.
      ja: 正規化された task intent、required capabilities、environment limits、permission prerequisites、query version。
  excludes:
    - zh: 候选工具列表、模型最终选择、ToolCall 参数以及用户消息的全部会话内容。
      en: Candidate lists, the model's final selection, ToolCall arguments, and the full conversational content of a user message.
      ja: candidate list、model の final selection、ToolCall arguments、user message の全 conversation content。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - query_id
    - query_version
  fields:
    - id: query_id
      labels:
        zh: 查询标识
        en: query ID
        ja: クエリ ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨检索与评估稳定标识同一查询。
        en: Stably identifies the query across search and assessment.
        ja: search と assessment を通じ同じ query を安定識別します。
      allowed_values: []
      pattern: null
      example_value: tool-query-042
      source_claims:
        - claim-tool-search-query-001
    - id: query_version
      labels:
        zh: 查询版本
        en: query version
        ja: クエリ版
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 需求或硬约束变更时递增的版本号。
        en: Version incremented when requirements or hard constraints change.
        ja: requirement または hard constraint 変更時に増分する version です。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-tool-search-query-001
    - id: task_intent
      labels:
        zh: 任务意图
        en: task intent
        ja: タスク意図
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 工具需要帮助完成的可检验任务结果。
        en: The testable task outcome that a tool must help achieve.
        ja: tool が達成を支援すべき検証可能な task outcome です。
      allowed_values: []
      pattern: null
      example_value: inspect Python dependencies without modifying files
      source_claims:
        - claim-tool-search-query-001
    - id: required_capabilities
      labels:
        zh: 必需能力
        en: required capabilities
        ja: 必須能力
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出候选工具必须实际提供的功能结果，而不是工具名称或检索算法特征。
        en: Lists the functional outcomes that a candidate tool must actually provide, rather than tool names or retriever features.
        ja: tool 名や retriever feature ではなく、candidate tool が実際に提供すべき functional outcomes を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - read repository dependency manifests
        - report exact dependency declarations
      source_claims:
        - claim-tool-search-query-002
    - id: context_scope
      labels:
        zh: 上下文范围
        en: context scope
        ja: コンテキスト範囲
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次检索可使用的工作区、资源边界和运行环境，不复制完整会话内容。
        en: Fixes the workspace, resource boundary, and runtime environment available to this search without copying the full conversation.
        ja: 完全な conversation を複製せず、この search が利用できる workspace・resource boundary・runtime environment を固定します。
      allowed_values: []
      pattern: null
      example_value:
        workspace_ref: workspace:moonweave
        resource_scope: dependency manifests
      source_claims:
        - claim-tool-search-query-003
    - id: hard_constraints
      labels:
        zh: 硬性约束
        en: hard constraints
        ja: 必須制約
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 任何候选入选前都必须满足的环境、权限和副作用限制。
        en: Environment, authority, and side-effect limits every candidate must satisfy before selection.
        ja: 全 candidate が selection 前に満たすべき environment・authority・side-effect limits です。
      allowed_values: []
      pattern: null
      example_value:
        - read-only
        - workspace-scoped
        - no network
      source_claims:
        - claim-tool-search-query-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: ToolSearchQuery-example-positive-manual-001
    kind: positive
    labels:
      zh: 工具检索查询正例
      en: Positive case for Tool search query
      ja: ツール検索クエリの正例
    scenario_id: null
    descriptions:
      zh: tool-query-042 明确要求只读检查 Python 依赖，并声明 workspace 范围和禁网约束；后续候选评估均引用版本 2。
      en: tool-query-042 asks for a read-only Python dependency inspection and declares workspace scope plus no-network constraints; every later assessment references version 2.
      ja: tool-query-042 は read-only Python dependency inspection を要求し、workspace scope と no-network constraints を宣言し、後続 assessment はすべて version 2 を参照します。
    field_values:
      query_id: tool-query-042
      query_version: 2
      task_intent: inspect Python dependencies without modifying files
      required_capabilities:
        - read repository dependency manifests
        - report exact dependency declarations
      context_scope:
        workspace_ref: workspace:moonweave
        resource_scope: dependency manifests
      hard_constraints:
        - read-only
        - workspace-scoped
        - no network
    related_node_ids:
      - ToolSearchQuery
      - ToolCandidateAssessment
    related_relation_ids:
      - ToolCandidateAssessment-evaluates_against-ToolSearchQuery
    expected_result:
      zh: 每项候选评估引用 query_id 与版本 2，硬约束不得被软评分覆盖。
      en: Every candidate assessment references the query ID and version 2; soft scores cannot override hard constraints.
      ja: 各 candidate assessment は query ID と version 2 を参照し、soft score は hard constraints を上書きできません。
    why_valid_or_invalid:
      zh: 该记录把意图、版本和硬约束同时固定，能够决定评估是否仍然有效。
      en: The record fixes intent, version, and hard constraints together, making assessment freshness decidable.
      ja: intent、version、hard constraints を同時に固定し、assessment freshness を判定できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-search-query-001
  - id: ToolSearchQuery-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 工具检索查询边界例
      en: Boundary case for Tool search query
      ja: ツール検索クエリの境界例
    scenario_id: null
    descriptions:
      zh: 用户消息“帮我看看项目”缺少任务结果、约束和查询版本；它只能作为形成 ToolSearchQuery 的输入，不能直接充当该查询对象。
      en: The user message “take a look at my project” lacks an outcome, constraints, and query version; it can inform a ToolSearchQuery but cannot itself be that query object.
      ja: user message『project を見て』は outcome、constraints、query version を欠き、ToolSearchQuery の入力にはなっても query object 自体ではありません。
    field_values:
      query_id: raw-message-042
      query_version: 0
      task_intent: take a look
      hard_constraints: []
    related_node_ids:
      - ToolSearchQuery
      - UserMessage
    related_relation_ids: []
    expected_result:
      zh: 验证器要求先形成结构化查询，不把含糊消息当作可评估查询。
      en: Validation requires a structured query and does not treat an ambiguous message as assessment-ready.
      ja: validation は structured query を要求し、ambiguous message を assessment-ready と扱いません。
    why_valid_or_invalid:
      zh: 消息身份由会话和角色决定，而检索查询由任务意图、版本与硬约束共同决定。
      en: Message identity comes from conversation and role, while search-query identity comes from task intent, version, and hard constraints.
      ja: message identity は conversation と role で決まり、search-query identity は task intent・version・hard constraints で決まります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-search-query-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ToolSearch-consumes_query-ToolSearchQuery
  predicate: consumes_query
  direction: source-to-target
  relation_kind: information
  labels:
    zh: 消费检索查询
    en: consumes search query
    ja: 検索クエリを消費する
  definitions:
    zh: ToolSearch consumes_query 唯一 ToolSearchQuery 及其版本，搜索范围和候选形成必须能追溯到该输入。
    en: ToolSearch consumes_query exactly one ToolSearchQuery version, and search scope plus candidate formation must trace to that input.
    ja: ToolSearch は一つの ToolSearchQuery version を consumes_query し search scope と candidate formation はその input に追跡できなければなりません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数由具体查询、候选集合和运行策略决定。
    en: Cardinality depends on the concrete query, candidate set, and runtime policy.
    ja: cardinality は具体 query・candidate set・runtime policy に依存します。
  inverse_reading:
    predicate: inverse_consumes_query
    labels:
      zh: 反向：消费检索查询
      en: inverse of consumes search query
      ja: 逆：検索クエリを消費する
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ToolSearch-consumes_query-ToolSearchQuery-example-positive-manual-001
      kind: positive
      labels:
        zh: 消费检索查询正例
        en: Positive case for consumes search query
        ja: 検索クエリを消費するの正例
      scenario_id: null
      descriptions:
        zh: tool-search-042 消费 tool-query-042 version 2，候选集和全部评估沿用相同 query_version。
        en: tool-search-042 consumes tool-query-042 version 2 and its candidate set and assessments use the same query version.
        ja: tool-search-042 は tool-query-042 version 2 を消費し candidate set/assessments は同じ query version を使います。
      field_values: {}
      related_node_ids:
        - ToolSearch
        - ToolSearchQuery
      related_relation_ids:
        - ToolSearch-consumes_query-ToolSearchQuery
      expected_result:
        zh: 图谱保留 ToolSearch-consumes_query-ToolSearchQuery，并保持 ToolSearch 到 ToolSearchQuery 的方向。
        en: The graph retains ToolSearch-consumes_query-ToolSearchQuery with direction ToolSearch to ToolSearchQuery.
        ja: graph は ToolSearch-consumes_query-ToolSearchQuery を ToolSearch から ToolSearchQuery の方向で保持します。
      why_valid_or_invalid:
        zh: 场景给出了 consumes_query 成立所需的独立业务事实，而非仅有两个端点。
        en: The case supplies the independent domain fact required by consumes_query, not merely the two endpoints.
        ja: case は二 endpoint だけでなく consumes_query に必要な independent domain fact を示します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-search-query-004
    - id: ToolSearch-consumes_query-ToolSearchQuery-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 消费检索查询边界例
        en: Boundary case for consumes search query
        ja: 検索クエリを消費するの境界例
      scenario_id: null
      descriptions:
        zh: 搜索日志只保存用户文本哈希且无法解析到 ToolSearchQuery 版本；哈希邻接不能替代 consumes_query。
        en: A search log stores only a user-text hash and cannot resolve a ToolSearchQuery version; hash adjacency cannot substitute for consumes_query.
        ja: search log が user-text hash だけを持ち ToolSearchQuery version を resolve できなければ hash adjacency は consumes_query を代替しません。
      field_values: {}
      related_node_ids:
        - ToolSearch
        - ToolSearchQuery
      related_relation_ids:
        - ToolSearch-consumes_query-ToolSearchQuery
      expected_result:
        zh: 验证器不得从名称相似、邻接或反向事实推断 ToolSearch-consumes_query-ToolSearchQuery。
        en: Validation must not infer ToolSearch-consumes_query-ToolSearchQuery from name similarity, adjacency, or a reversed fact.
        ja: validation は name similarity・adjacency・reversed fact から ToolSearch-consumes_query-ToolSearchQuery を推論してはいけません。
      why_valid_or_invalid:
        zh: consumes_query 的方向和成立条件未满足，因此该边不能进入 accepted 图。
        en: The direction or truth conditions of consumes_query are absent, so the edge cannot enter the accepted graph.
        ja: consumes_query の direction または truth conditions がなく edge は accepted graph に入りません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-search-query-004
  source_claims:
    - claim-tool-search-query-004
  distinct_fact_rationale:
    zh: 输入边固定搜索的需求版本，是候选与评估一致性的起点。
    en: The input edge fixes the search requirement version and anchors candidate-assessment consistency.
    ja: input edge は search requirement version を固定し candidate-assessment consistency の起点です。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
