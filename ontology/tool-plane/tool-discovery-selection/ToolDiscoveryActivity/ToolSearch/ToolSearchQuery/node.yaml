source_claims:
  - id: claim-tool-search-query-001
    source: lit-tool-toollm
    supports: ToolLLM's neural API retriever recommends APIs for each instruction, while API-Bank evaluates retrieval separately from calling; Moonweave therefore records the normalized instruction and constraints as a versioned ToolSearchQuery.
    locator: Abstract; Tool Retriever; depth-first search decision tree; ToolEval
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tool-search-query-002
    source: lit-tool-toollm
    supports: ToolLLM retrieves APIs for a concrete instruction and then evaluates whether a valid tool-use path can solve it; Moonweave records the required functional outcomes explicitly so retrieval evidence can be checked against the query.
    locator: Abstract; Tool Retriever; depth-first search decision tree; ToolEval
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tool-search-query-003
    source: eng-fw-openai-agents-tools
    supports: OpenAI hosted tool search and conditional tool enabling make the visible tool subset depend on current runtime context; Moonweave records that bounded context separately from task intent and hard constraints.
    locator: Tools > Hosted tools > Hosted tool search; Conditional tool enabling
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tool-search-query-004
    source: lit-tool-toollm
    supports: ToolLLM's retriever recommends APIs for each instruction; Moonweave records the exact normalized instruction and constraint bundle consumed by each search.
    locator: Abstract; Tool Retriever; depth-first search decision tree; ToolEval
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
