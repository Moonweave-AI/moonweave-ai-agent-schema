schema: moonweave.ai/ontology-node/v1
id: ToolCandidateSet
kind: concept
status: review
labels:
  zh: 工具候选集
  en: Tool candidate set
  ja: ツール候補集合
semantics:
  short_definition:
    zh: 工具候选集保存一次检索在明确范围内返回的全部工具候选。
    en: A tool candidate set holds every tool candidate returned by one search within a declared scope.
    ja: ツール候補集合は宣言された範囲で一回の search が返した全 tool candidate を保持します。
  definition:
    zh: 工具候选集是一项有界集合对象，由且仅由一次 ToolSearch 产生，并以 composition 包含各 ToolCandidate；其范围说明允许验证遗漏和额外候选，但集合本身不代表排序或最终选择。
    en: A tool candidate set is a bounded collection produced by exactly one ToolSearch and compositionally containing ToolCandidate records; its scope statement makes omissions and extras testable, while the set itself expresses neither ranking nor final selection.
    ja: ツール候補集合は一回だけの ToolSearch が生成し ToolCandidate records を composition として含む bounded collection です。scope statement により omission と extra を検証でき、集合自体は ranking も final selection も表しません。
  why_needed:
    zh: 候选集合把检索完整性与后续评分、排序和选择分开，外部审计可以先判断“找全了吗”，再判断“选对了吗”。
    en: The set separates retrieval completeness from later scoring, ranking, and selection, allowing an audit to ask “was the search complete?” before “was the choice correct?”.
    ja: set は retrieval completeness を後続 scoring・ranking・selection から分け、audit は『検索が完全か』を『選択が正しいか』より先に問えます。
  includes:
    - zh: 同一 search_id、query_version 与可见范围下产生的所有 ToolCandidate 成员。
      en: All ToolCandidate members produced under one search_id, query_version, and visibility scope.
      ja: 同じ search_id・query_version・visibility scope で生成された全 ToolCandidate members。
  excludes:
    - zh: 完整 ToolRegistry、已经排序的执行计划，以及由另一次查询产生的候选。
      en: The full ToolRegistry, an ordered execution plan, and candidates produced by another query.
      ja: 完全な ToolRegistry、ordered execution plan、別 query が生成した candidates。
  semantic_kind: collection
  aliases: []
structure:
  identity_keys:
    - candidate_set_id
  fields:
    - id: candidate_set_id
      labels:
        zh: 候选集标识
        en: candidate-set ID
        ja: 候補集合 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次搜索的候选集合。
        en: Uniquely identifies the candidate set from one search.
        ja: 一回の search の candidate set を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: tool-candidates-042
      source_claims:
        - claim-tool-candidate-set-001
    - id: query_version
      labels:
        zh: 查询版本
        en: query version
        ja: クエリ版
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识产生该候选集时采用的 ToolSearchQuery 版本。
        en: Identifies the ToolSearchQuery version used when the candidate set was produced.
        ja: candidate set 生成時に用いた ToolSearchQuery version を識別します。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-tool-candidate-set-002
    - id: scope_statement
      labels:
        zh: 范围说明
        en: scope statement
        ja: 範囲記述
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明候选完备性相对于哪些目录版本、命名空间和过滤条件成立。
        en: States the catalog versions, namespaces, and filters relative to which candidate completeness is claimed.
        ja: candidate completeness を主張する catalog versions・namespaces・filters を記述します。
      allowed_values: []
      pattern: null
      example_value: registry v18, namespaces code+filesystem, read-only filters
      source_claims:
        - claim-tool-candidate-set-001
    - id: member_count
      labels:
        zh: 成员数量
        en: member count
        ja: メンバー数
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 集合中直接包含的 ToolCandidate 数量。
        en: Number of ToolCandidate records directly contained by the set.
        ja: set が直接含む ToolCandidate records の数です。
      allowed_values: []
      pattern: null
      example_value: 3
      source_claims:
        - claim-tool-candidate-set-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: ToolCandidateSet-example-positive-manual-001
    kind: positive
    labels:
      zh: 工具候选集正例
      en: Positive case for Tool candidate set
      ja: ツール候補集合の正例
    scenario_id: null
    descriptions:
      zh: tool-candidates-042 声明 registry v18、code 与 filesystem 命名空间及只读过滤条件，并包含三个可追溯候选。
      en: tool-candidates-042 declares registry v18, code and filesystem namespaces, and read-only filters, then contains three traceable candidates.
      ja: tool-candidates-042 は registry v18、code/filesystem namespaces、read-only filters を宣言し、追跡可能な三つの candidates を含みます。
    field_values:
      candidate_set_id: tool-candidates-042
      query_version: 2
      scope_statement: registry v18, namespaces code+filesystem, read-only filters
      member_count: 3
    related_node_ids:
      - ToolCandidateSet
      - ToolCandidate
    related_relation_ids:
      - ToolCandidateSet-contains-ToolCandidate
    expected_result:
      zh: member_count 与直接包含边数量一致，且范围说明足以复查遗漏。
      en: member_count equals the number of direct containment edges and the scope statement permits omission checks.
      ja: member_count は直接 containment edge 数と一致し、scope statement により omission check が可能です。
    why_valid_or_invalid:
      zh: 集合的身份、成员和完备性边界均明确，未提前编码排序或选择。
      en: Identity, membership, and completeness boundary are explicit without prematurely encoding ranking or selection.
      ja: identity・membership・completeness boundary が明確で、ranking や selection を先取りしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-candidate-set-001
  - id: ToolCandidateSet-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 工具候选集边界例
      en: Boundary case for Tool candidate set
      ja: ツール候補集合の境界例
    scenario_id: null
    descriptions:
      zh: 将 ToolRegistry 的 240 个条目直接标为当前候选集，但没有 search_id 或过滤范围，会把持久目录误作查询结果。
      en: Labelling all 240 ToolRegistry entries as the current candidate set without a search ID or filter scope mistakes a persistent catalog for a query result.
      ja: search ID や filter scope なしに ToolRegistry の240 entries 全てを current candidate set とするのは persistent catalog を query result と誤認します。
    field_values:
      candidate_set_id: registry-v18
      scope_statement: all registered tools
      member_count: 240
    related_node_ids:
      - ToolCandidateSet
      - ToolRegistry
    related_relation_ids: []
    expected_result:
      zh: 验证器拒绝无查询归属的集合，不把 RegistryEntry 自动提升为 ToolCandidate。
      en: Validation rejects a set without query provenance and does not automatically promote RegistryEntry to ToolCandidate.
      ja: validation は query provenance のない set を拒否し、RegistryEntry を ToolCandidate に自動昇格しません。
    why_valid_or_invalid:
      zh: 目录成员身份跨请求持续，候选成员身份只在一份查询和范围说明内成立。
      en: Catalog membership persists across requests; candidacy exists only within one query and scope statement.
      ja: catalog membership は request 間で持続しますが、candidacy は一つの query と scope statement 内だけで成立します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-candidate-set-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ToolSearch-produces-ToolCandidateSet
  predicate: produces
  direction: source-to-target
  relation_kind: causal
  labels:
    zh: 产生候选集
    en: produces candidate set
    ja: 候補集合を生成する
  definitions:
    zh: 一次 ToolSearch produces 一份有界 ToolCandidateSet；该输出记录查询期候选，不直接产出选择决定或调用计划。
    en: One ToolSearch produces one bounded ToolCandidateSet recording query-lifetime candidates, not a selection decision or invocation plan.
    ja: 一 ToolSearch は query-lifetime candidates を記録する bounded ToolCandidateSet を produces し selection decision や invocation plan を直接生成しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数由具体查询、候选集合和运行策略决定。
    en: Cardinality depends on the concrete query, candidate set, and runtime policy.
    ja: cardinality は具体 query・candidate set・runtime policy に依存します。
  inverse_reading:
    predicate: inverse_produces
    labels:
      zh: 反向：产生候选集
      en: inverse of produces candidate set
      ja: 逆：候補集合を生成する
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: ToolSearch-produces-ToolCandidateSet-example-positive-manual-001
      kind: positive
      labels:
        zh: 产生候选集正例
        en: Positive case for produces candidate set
        ja: 候補集合を生成するの正例
      scenario_id: null
      descriptions:
        zh: tool-search-042 完成后产生 tool-candidates-042，后者 scope_statement 与 search 使用的过滤范围一致。
        en: After tool-search-042 completes it produces tool-candidates-042 whose scope statement matches the filters used by the search.
        ja: tool-search-042 完了後に tool-candidates-042 を生成し scope statement は search filters と一致します。
      field_values: {}
      related_node_ids:
        - ToolSearch
        - ToolCandidateSet
      related_relation_ids:
        - ToolSearch-produces-ToolCandidateSet
      expected_result:
        zh: 图谱保留 ToolSearch-produces-ToolCandidateSet，并保持 ToolSearch 到 ToolCandidateSet 的方向。
        en: The graph retains ToolSearch-produces-ToolCandidateSet with direction ToolSearch to ToolCandidateSet.
        ja: graph は ToolSearch-produces-ToolCandidateSet を ToolSearch から ToolCandidateSet の方向で保持します。
      why_valid_or_invalid:
        zh: 场景给出了 produces 成立所需的独立业务事实，而非仅有两个端点。
        en: The case supplies the independent domain fact required by produces, not merely the two endpoints.
        ja: case は二 endpoint だけでなく produces に必要な independent domain fact を示します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-candidate-set-003
    - id: ToolSearch-produces-ToolCandidateSet-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 产生候选集边界例
        en: Boundary case for produces candidate set
        ja: 候補集合を生成するの境界例
      scenario_id: null
      descriptions:
        zh: 模型从完整注册表直接生成 ToolCallPlan，没有任何候选集；不能补画一条 search produces 调用计划的捷径。
        en: A model creates ToolCallPlan directly from the full registry with no candidate set; no shortcut from search to call plan may be invented.
        ja: model が candidate set なしに full registry から ToolCallPlan を直接作っても search-to-call-plan shortcut を捏造してはいけません。
      field_values: {}
      related_node_ids:
        - ToolSearch
        - ToolCandidateSet
      related_relation_ids:
        - ToolSearch-produces-ToolCandidateSet
      expected_result:
        zh: 验证器不得从名称相似、邻接或反向事实推断 ToolSearch-produces-ToolCandidateSet。
        en: Validation must not infer ToolSearch-produces-ToolCandidateSet from name similarity, adjacency, or a reversed fact.
        ja: validation は name similarity・adjacency・reversed fact から ToolSearch-produces-ToolCandidateSet を推論してはいけません。
      why_valid_or_invalid:
        zh: produces 的方向和成立条件未满足，因此该边不能进入 accepted 图。
        en: The direction or truth conditions of produces are absent, so the edge cannot enter the accepted graph.
        ja: produces の direction または truth conditions がなく edge は accepted graph に入りません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-candidate-set-003
  source_claims:
    - claim-tool-candidate-set-003
  distinct_fact_rationale:
    zh: 该因果边明确检索输出层，阻止 ToolSearch 跨级直连 ToolSelectionDecision 或 ToolCallPlan。
    en: The causal edge fixes the search-output layer and prevents ToolSearch from shortcutting to ToolSelectionDecision or ToolCallPlan.
    ja: causal edge は search-output layer を固定し ToolSearch の ToolSelectionDecision/ToolCallPlan への shortcut を防ぎます。
