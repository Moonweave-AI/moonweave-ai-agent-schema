source_claims:
  - id: claim-tool-candidate-001
    source: eng-proto-mcp-tools-2025-06-18
    supports: MCP tools/list returns stable tool descriptions that can be enumerated independently of tools/call; Moonweave therefore represents candidacy as a query-scoped reference to a definition, not as another copy of the tool schema.
    locator: Server Features > Tools > Protocol Messages > Listing Tools, Calling Tools, and List Changed Notification
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tool-candidate-002
    source: eng-proto-mcp-tools-2025-06-18
    supports: MCP separates tools/list from tools/call. Moonweave therefore uses pending only for a query-scoped candidate whose required pre-selection evidence is not yet complete; it does not infer readiness from list membership.
    locator: Server Features > Tools > Protocol Messages > Listing Tools, Calling Tools, and List Changed Notification
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-tool-candidate-003
    source: eng-proto-mcp-tools-2025-06-18
    supports: Because MCP listing and calling are separate operations, Moonweave distinguishes an evidence-qualified candidate from both a merely listed definition and a candidate already committed to a call.
    locator: Server Features > Tools > Protocol Messages > Listing Tools, Calling Tools, and List Changed Notification
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-tool-candidate-004
    source: eng-proto-mcp-tools-2025-06-18
    supports: MCP tool definitions remain independently listable. Moonweave therefore scopes rejection to one query and preserves the stable definition instead of turning a selection outcome into registry invalidity.
    locator: Server Features > Tools > Protocol Messages > Listing Tools, Calling Tools, and List Changed Notification
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-tool-candidate-005
    source: eng-proto-mcp-tools-2025-06-18
    supports: MCP keeps discovery and tools/call distinct. Moonweave accordingly records selected as the handoff decision before invocation, without collapsing it into a call result.
    locator: Server Features > Tools > Protocol Messages > Listing Tools, Calling Tools, and List Changed Notification
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-tool-candidate-006
    source: eng-fw-openai-agents-tools
    supports: OpenAI hosted tool search loads a bounded subset for the current turn; Moonweave records that subset through explicit ToolCandidateSet membership rather than treating the whole registry as candidates.
    locator: Tools > Hosted tools > Hosted tool search; Conditional tool enabling
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tool-candidate-007
    source: eng-proto-mcp-tools-2025-06-18
    supports: MCP tools/list returns named tool definitions and supports list changes; Moonweave optionally records the exact registry member from which a query-scoped candidate was derived.
    locator: Server Features > Tools > Protocol Messages > Listing Tools, Calling Tools, and List Changed Notification
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tool-candidate-008
    source: eng-proto-mcp-tools-2025-06-18
    supports: MCP Tool data carries a unique name, description, input schema, optional output schema, and annotations; Moonweave keeps that stable contract in ToolDefinition and lets candidates reference it.
    locator: Server Features > Tools > Protocol Messages > Listing Tools, Calling Tools, and List Changed Notification
    evidence_kind: design-inference
    confidence: high
