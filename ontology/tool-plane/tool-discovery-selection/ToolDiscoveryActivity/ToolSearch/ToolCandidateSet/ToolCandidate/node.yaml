schema: moonweave.ai/ontology-node/v1
id: ToolCandidate
kind: concept
status: review
labels:
  zh: 工具候选
  en: Tool candidate
  ja: ツール候補
semantics:
  short_definition:
    zh: 工具候选是某一 ToolCandidateSet 中对一个稳定 ToolDefinition 的查询期引用。
    en: A ToolCandidate is a query-lifetime reference in one ToolCandidateSet to one stable ToolDefinition.
    ja: ToolCandidate は一つの ToolCandidateSet 内で stable ToolDefinition を参照する query-lifetime record です。
  definition:
    zh: 工具候选是 ToolCandidateSet 中的一份查询期信息记录：它引用而不复制一个稳定 ToolDefinition，并通过 ToolCandidateAssessment-assesses-ToolCandidate 接收面向当前 ToolSearchQuery 的匹配、资格与可用性证据；只有后续 ToolSelectionDecision 才能选中或拒绝它。
    en: A ToolCandidate is a query-lifetime information record contained by a ToolCandidateSet. It references rather than copies one stable ToolDefinition and receives fit, eligibility, and availability evidence for the current ToolSearchQuery through ToolCandidateAssessment-assesses-ToolCandidate; only a later ToolSelectionDecision may select or reject it.
    ja: ToolCandidate は ToolCandidateSet に含まれる query-lifetime information record です。一つの stable ToolDefinition を複製せず参照し、ToolCandidateAssessment-assesses-ToolCandidate を通じて current ToolSearchQuery に対する fit・eligibility・availability evidence を受け、後続 ToolSelectionDecision だけが選択または棄却できます。
  why_needed:
    zh: 独立候选节点让同一个 ToolDefinition 在不同任务中具有不同的匹配、可用性和淘汰结果，而不会污染持久定义。
    en: A separate candidate node lets the same ToolDefinition receive different fit, availability, and rejection results in different tasks without contaminating the persistent definition.
    ja: 独立 candidate node により同じ ToolDefinition が task ごとに異なる fit・availability・rejection result を持て、persistent definition を汚染しません。
  includes:
    - zh: 带 candidate_id、query_version、ToolDefinition 引用和可选 RegistryEntry 来源的查询期记录。
      en: Query-lifetime records with candidate_id, query_version, a ToolDefinition reference, and optional RegistryEntry provenance.
      ja: candidate_id・query_version・ToolDefinition reference・任意 RegistryEntry provenance を持つ query-lifetime record。
  excludes:
    - zh: 跨请求稳定的 ToolDefinition、已经执行的 ToolCall，以及没有工具定义引用的泛化候选。
      en: A request-independent ToolDefinition, an executed ToolCall, and a generic candidate lacking a tool-definition reference.
      ja: request-independent ToolDefinition、executed ToolCall、tool-definition reference を欠く generic candidate。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - candidate_id
  fields:
    - id: candidate_id
      labels:
        zh: 候选标识
        en: candidate ID
        ja: 候補 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在一份候选集中唯一标识该候选。
        en: Uniquely identifies the candidate within one candidate set.
        ja: 一つの candidate set 内で candidate を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: candidate-read-file
      source_claims:
        - claim-tool-candidate-001
    - id: query_version
      labels:
        zh: 查询版本
        en: query version
        ja: クエリ版
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 候选身份所依据的 ToolSearchQuery 版本。
        en: ToolSearchQuery version on which candidacy depends.
        ja: candidacy が依存する ToolSearchQuery version です。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-tool-candidate-001
    - id: candidate_state
      labels:
        zh: 候选状态
        en: candidate state
        ja: 候補状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录候选当前处于待评估、合格、淘汰或已选择。
        en: Records whether the candidate is pending assessment, eligible, rejected, or selected.
        ja: candidate が assessment pending・eligible・rejected・selected のどれかを記録します。
      allowed_values:
        - id: ToolCandidateStatePending
          value: pending
          labels:
            zh: 待评估
            en: pending assessment
            ja: 評価待ち
          definitions:
            zh: 候选已进入当前查询的候选集，但能力适配、硬约束或时点可用性仍缺少至少一项当前证据，因此不得进入选择决定。
            en: The candidate is in the current query's candidate set, but at least one current capability-fit, hard-constraint, or point-in-time availability assessment is missing, so it cannot enter a selection decision.
            ja: candidate は current query の candidate set に含まれますが、capability fit・hard constraint・point-in-time availability の current evidence が一つ以上不足するため selection decision に進めません。
          status: accepted
          source_claims:
            - claim-tool-candidate-002
        - id: ToolCandidateStateEligible
          value: eligible
          labels:
            zh: 合格候选
            en: eligible
            ja: 選択可能
          definitions:
            zh: 候选针对同一查询版本的必需评估均为当前有效，且不存在硬约束失败；它可以参与选择，但尚未因此成为已选择候选。
            en: All required assessments for the same query version are current and no hard constraint has failed; the candidate may be considered for selection but is not thereby selected.
            ja: 同一 query version の required assessment がすべて current で hard constraint failure がなく、selection の対象にできますが selected を意味しません。
          status: accepted
          source_claims:
            - claim-tool-candidate-003
        - id: ToolCandidateStateRejected
          value: rejected
          labels:
            zh: 已排除
            en: rejected
            ja: 除外済み
          definitions:
            zh: 当前查询的评估或选择决定已明确排除该候选，并保留可审计理由；该状态不宣称工具定义本身无效。
            en: An assessment or selection decision for the current query has explicitly excluded the candidate and retains an auditable reason; this does not assert that the tool definition itself is invalid.
            ja: current query の assessment または selection decision が auditable reason とともに candidate を明示的に除外した状態で、tool definition 自体の invalidity は主張しません。
          status: accepted
          source_claims:
            - claim-tool-candidate-004
        - id: ToolCandidateStateSelected
          value: selected
          labels:
            zh: 已选择
            en: selected
            ja: 選択済み
          definitions:
            zh: 当前选择决定已将该候选交接给下游调用计划；该状态只表达选择承诺，不表示调用已经执行或成功。
            en: The current selection decision has handed the candidate to a downstream call plan; the state expresses a selection commitment, not that invocation has executed or succeeded.
            ja: current selection decision が candidate を downstream call plan に引き渡した状態で、invocation の実行または成功は意味しません。
          status: accepted
          source_claims:
            - claim-tool-candidate-005
      pattern: null
      example_value: eligible
      source_claims:
        - claim-tool-candidate-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: ToolCandidate-example-positive-manual-001
    kind: positive
    labels:
      zh: 工具候选正例
      en: Positive case for Tool candidate
      ja: ツール候補の正例
    scenario_id: null
    descriptions:
      zh: candidate-read-file 在 tool-candidates-042 中引用 registry v18 的 read_file ToolDefinition；面向查询版本 2 的 ToolCandidateAssessment 将匹配、资格和可用性证据归到该候选，结论为 eligible。
      en: candidate-read-file belongs to tool-candidates-042 and references the read_file ToolDefinition from registry v18; a ToolCandidateAssessment for query version 2 assigns fit, eligibility, and availability evidence to that candidate and concludes eligible.
      ja: candidate-read-file は tool-candidates-042 に属して registry v18 の read_file ToolDefinition を参照し、query version 2 の ToolCandidateAssessment が fit・eligibility・availability evidence を当該 candidate に帰属させ eligible と結論します。
    field_values:
      candidate_id: candidate-read-file
      query_version: 2
      candidate_state: eligible
    related_node_ids:
      - ToolCandidate
      - ToolCandidateSet
      - ToolCandidateAssessment
      - ToolSearchQuery
      - ToolDefinition
      - RegistryEntry
    related_relation_ids:
      - ToolCandidateSet-contains-ToolCandidate
      - ToolCandidateAssessment-assesses-ToolCandidate
      - ToolCandidateAssessment-evaluates_against-ToolSearchQuery
      - ToolCandidate-references-ToolDefinition
      - ToolCandidate-derived_from-RegistryEntry
    expected_result:
      zh: 候选身份局限于该集合和查询版本，定义本身未被复制或改写。
      en: Candidacy is limited to the set and query version; the definition is referenced without copying or mutation.
      ja: candidacy は set と query version に限定され、definition は copy/mutation なしで参照されます。
    why_valid_or_invalid:
      zh: 该例同时给出候选身份、来源和定义引用，能够与目录条目及调用区分。
      en: The case supplies candidate identity, provenance, and definition reference, distinguishing it from both catalog entry and invocation.
      ja: candidate identity・provenance・definition reference を示し、catalog entry と invocation の両方から区別できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-candidate-001
  - id: ToolCandidate-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 工具候选边界例
      en: Boundary case for Tool candidate
      ja: ツール候補の境界例
    scenario_id: null
    descriptions:
      zh: read_file ToolDefinition 虽然存在于注册表，但在当前查询未返回它时，它仍只是定义，不能凭名称相同自动成为 ToolCandidate。
      en: The read_file ToolDefinition remains merely a definition when the current search did not return it; name equality cannot automatically make it a ToolCandidate.
      ja: read_file ToolDefinition が registry にあっても current search が返していなければ definition のままで、name equality だけで ToolCandidate にはなりません。
    field_values:
      candidate_id: read_file
      query_version: 2
      candidate_state: pending
    related_node_ids:
      - ToolCandidate
      - ToolDefinition
    related_relation_ids:
      - ToolCandidate-references-ToolDefinition
    expected_result:
      zh: 没有集合成员边和 search provenance 时，验证器拒绝候选身份。
      en: Without set membership and search provenance, validation rejects candidacy.
      ja: set membership と search provenance がなければ validation は candidacy を拒否します。
    why_valid_or_invalid:
      zh: 持久定义的存在只是被搜索条件，不足以证明当前查询中的候选成员资格。
      en: Existence of a persistent definition is only a search precondition, not proof of query-scoped candidacy.
      ja: persistent definition の存在は search precondition に過ぎず、query-scoped candidacy の証明ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-candidate-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ToolCandidateSet-contains-ToolCandidate
  predicate: contains
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 包含候选
    en: contains candidate
    ja: 候補を含む
  definitions:
    zh: ToolCandidateSet 通过 contains 将同一 search_id 与 query_version 下的 ToolCandidate 纳入集合成员；成员身份随集合结束，不复制 ToolDefinition。
    en: ToolCandidateSet contains ToolCandidate as membership under one search_id and query_version; membership ends with the set and does not copy ToolDefinition.
    ja: ToolCandidateSet は同じ search_id/query_version の ToolCandidate を member として contains し、membership は set と共に終了し ToolDefinition を複製しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数由具体查询、候选集合和运行策略决定。
    en: Cardinality depends on the concrete query, candidate set, and runtime policy.
    ja: cardinality は具体 query・candidate set・runtime policy に依存します。
  inverse_reading:
    predicate: inverse_contains
    labels:
      zh: 反向：包含候选
      en: inverse of contains candidate
      ja: 逆：候補を含む
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ToolCandidateSet-contains-ToolCandidate-example-positive-manual-001
      kind: positive
      labels:
        zh: 包含候选正例
        en: Positive case for contains candidate
        ja: 候補を含むの正例
      scenario_id: null
      descriptions:
        zh: tool-candidates-042 的 member_count 为 3，恰有三条 contains 边指向带唯一 candidate_id 的候选。
        en: tool-candidates-042 has member_count 3 and exactly three contains edges to candidates with unique candidate IDs.
        ja: tool-candidates-042 は member_count 3 で unique candidate IDs への contains edges が三本あります。
      field_values: {}
      related_node_ids:
        - ToolCandidateSet
        - ToolCandidate
      related_relation_ids:
        - ToolCandidateSet-contains-ToolCandidate
      expected_result:
        zh: 图谱保留 ToolCandidateSet-contains-ToolCandidate，并保持 ToolCandidateSet 到 ToolCandidate 的方向。
        en: The graph retains ToolCandidateSet-contains-ToolCandidate with direction ToolCandidateSet to ToolCandidate.
        ja: graph は ToolCandidateSet-contains-ToolCandidate を ToolCandidateSet から ToolCandidate の方向で保持します。
      why_valid_or_invalid:
        zh: 场景给出了 contains 成立所需的独立业务事实，而非仅有两个端点。
        en: The case supplies the independent domain fact required by contains, not merely the two endpoints.
        ja: case は二 endpoint だけでなく contains に必要な independent domain fact を示します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-candidate-006
    - id: ToolCandidateSet-contains-ToolCandidate-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 包含候选边界例
        en: Boundary case for contains candidate
        ja: 候補を含むの境界例
      scenario_id: null
      descriptions:
        zh: RegistryEntry 出现在搜索日志中但没有被该集合返回；仅被读取不能建立 contains 成员边。
        en: A RegistryEntry appears in the search log but was not returned by this set; being read does not establish contains membership.
        ja: RegistryEntry が search log に現れても set が返していなければ read だけでは contains membership を確立しません。
      field_values: {}
      related_node_ids:
        - ToolCandidateSet
        - ToolCandidate
      related_relation_ids:
        - ToolCandidateSet-contains-ToolCandidate
      expected_result:
        zh: 验证器不得从名称相似、邻接或反向事实推断 ToolCandidateSet-contains-ToolCandidate。
        en: Validation must not infer ToolCandidateSet-contains-ToolCandidate from name similarity, adjacency, or a reversed fact.
        ja: validation は name similarity・adjacency・reversed fact から ToolCandidateSet-contains-ToolCandidate を推論してはいけません。
      why_valid_or_invalid:
        zh: contains 的方向和成立条件未满足，因此该边不能进入 accepted 图。
        en: The direction or truth conditions of contains are absent, so the edge cannot enter the accepted graph.
        ja: contains の direction または truth conditions がなく edge は accepted graph に入りません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-candidate-006
  source_claims:
    - claim-tool-candidate-006
  distinct_fact_rationale:
    zh: 该边表达一次查询结果的集合成员关系，是候选图的唯一 composition 骨架。
    en: This edge expresses query-result membership and is the sole composition backbone for candidates.
    ja: この edge は query-result membership を表し candidate graph の唯一 composition backbone です。
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: parent-to-child
relations:
  - id: ToolCandidate-derived_from-RegistryEntry
    predicate: derived_from
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 源自注册条目
      en: derived from registry entry
      ja: 登録項目に由来する
    definitions:
      zh: ToolCandidate derived_from 返回该候选的 RegistryEntry 来源，以便追溯目录版本和成员身份；没有注册来源时该边可省略而非伪造。
      en: ToolCandidate derived_from its RegistryEntry provenance so catalog version and membership can be traced; when no registry entry exists, the edge is omitted rather than fabricated.
      ja: ToolCandidate は catalog version/membership を追跡するため RegistryEntry provenance に derived_from し、entry がなければ edge を捏造せず省略します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 基数由具体查询、候选集合和运行策略决定。
      en: Cardinality depends on the concrete query, candidate set, and runtime policy.
      ja: cardinality は具体 query・candidate set・runtime policy に依存します。
    inverse_reading:
      predicate: inverse_derived_from
      labels:
        zh: 反向：源自注册条目
        en: inverse of derived from registry entry
        ja: 逆：登録項目に由来する
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: ToolCandidate-derived_from-RegistryEntry-example-positive-manual-001
        kind: positive
        labels:
          zh: 源自注册条目正例
          en: Positive case for derived from registry entry
          ja: 登録項目に由来するの正例
        scenario_id: null
        descriptions:
          zh: candidate-read-file 保存 registry-entry-read-file-v18，搜索审计可回溯到产生候选的目录成员。
          en: candidate-read-file records registry-entry-read-file-v18, allowing search audit to trace the catalog member that produced candidacy.
          ja: candidate-read-file は registry-entry-read-file-v18 を記録し search audit が candidacy 元 catalog member を追跡できます。
        field_values: {}
        related_node_ids:
          - ToolCandidate
          - RegistryEntry
        related_relation_ids:
          - ToolCandidate-derived_from-RegistryEntry
        expected_result:
          zh: 图谱保留 ToolCandidate-derived_from-RegistryEntry，并保持 ToolCandidate 到 RegistryEntry 的方向。
          en: The graph retains ToolCandidate-derived_from-RegistryEntry with direction ToolCandidate to RegistryEntry.
          ja: graph は ToolCandidate-derived_from-RegistryEntry を ToolCandidate から RegistryEntry の方向で保持します。
        why_valid_or_invalid:
          zh: 场景给出了 derived_from 成立所需的独立业务事实，而非仅有两个端点。
          en: The case supplies the independent domain fact required by derived_from, not merely the two endpoints.
          ja: case は二 endpoint だけでなく derived_from に必要な independent domain fact を示します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
        source_claims:
          - claim-tool-candidate-007
      - id: ToolCandidate-derived_from-RegistryEntry-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 源自注册条目边界例
          en: Boundary case for derived from registry entry
          ja: 登録項目に由来するの境界例
        scenario_id: null
        descriptions:
          zh: 临时 client-executed tool search 返回未注册定义时，不得把相似名称的 RegistryEntry 当作其来源。
          en: When client-executed tool search returns an unregistered definition, a similarly named RegistryEntry must not be asserted as provenance.
          ja: client-executed tool search が unregistered definition を返す場合、同名 RegistryEntry を provenance として主張してはいけません。
        field_values: {}
        related_node_ids:
          - ToolCandidate
          - RegistryEntry
        related_relation_ids:
          - ToolCandidate-derived_from-RegistryEntry
        expected_result:
          zh: 验证器不得从名称相似、邻接或反向事实推断 ToolCandidate-derived_from-RegistryEntry。
          en: Validation must not infer ToolCandidate-derived_from-RegistryEntry from name similarity, adjacency, or a reversed fact.
          ja: validation は name similarity・adjacency・reversed fact から ToolCandidate-derived_from-RegistryEntry を推論してはいけません。
        why_valid_or_invalid:
          zh: derived_from 的方向和成立条件未满足，因此该边不能进入 accepted 图。
          en: The direction or truth conditions of derived_from are absent, so the edge cannot enter the accepted graph.
          ja: derived_from の direction または truth conditions がなく edge は accepted graph に入りません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
        source_claims:
          - claim-tool-candidate-007
    source_claims:
      - claim-tool-candidate-007
    distinct_fact_rationale:
      zh: 来源边保留候选形成的目录沿袭，同时不把 RegistryEntry 变成候选父类。
      en: The provenance edge preserves catalog lineage without turning RegistryEntry into a candidate superclass.
      ja: provenance edge は catalog lineage を保持し RegistryEntry を candidate superclass にしません。
    layout_role: cross-link
    review_status: pending
    target: concept:RegistryEntry
  - id: ToolCandidate-references-ToolDefinition
    predicate: references
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 引用工具定义
      en: references tool definition
      ja: ツール定義を参照する
    definitions:
      zh: ToolCandidate references 被评估的稳定 ToolDefinition；候选只保存引用和查询期状态，不复制名称、schema 或权限规范。
      en: ToolCandidate references the stable ToolDefinition being assessed; the candidate stores only the reference and query-lifetime state, not copied names, schemas, or permission specifications.
      ja: ToolCandidate は assessed stable ToolDefinition を references し candidate は reference と query-lifetime state だけを持ち name・schema・permission specification を複製しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 基数由具体查询、候选集合和运行策略决定。
      en: Cardinality depends on the concrete query, candidate set, and runtime policy.
      ja: cardinality は具体 query・candidate set・runtime policy に依存します。
    inverse_reading:
      predicate: inverse_references
      labels:
        zh: 反向：引用工具定义
        en: inverse of references tool definition
        ja: 逆：ツール定義を参照する
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: ToolCandidate-references-ToolDefinition-example-positive-manual-001
        kind: positive
        labels:
          zh: 引用工具定义正例
          en: Positive case for references tool definition
          ja: ツール定義を参照するの正例
        scenario_id: null
        descriptions:
          zh: candidate-read-file 的 definition_id 指向 registry v18 的唯一 read_file ToolDefinition，所有评估读取该版本。
          en: candidate-read-file points to the unique read_file ToolDefinition in registry v18 and every assessment reads that version.
          ja: candidate-read-file は registry v18 の unique read_file ToolDefinition を指し全 assessment がその version を読みます。
        field_values: {}
        related_node_ids:
          - ToolCandidate
          - ToolDefinition
        related_relation_ids:
          - ToolCandidate-references-ToolDefinition
        expected_result:
          zh: 图谱保留 ToolCandidate-references-ToolDefinition，并保持 ToolCandidate 到 ToolDefinition 的方向。
