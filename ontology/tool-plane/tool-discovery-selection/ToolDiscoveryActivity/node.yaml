schema: moonweave.ai/ontology-node/v1
id: ToolDiscoveryActivity
kind: concept
labels:
  zh: 工具发现活动
  en: Tool Discovery Activity
  ja: ツール発見活動
semantics:
  short_definition:
    zh: 从能力来源读取并建立可追溯候选范围的活动。
    en: An activity that reads capability sources and establishes a traceable candidate scope.
    ja: capability source を読み、追跡可能な candidate scope を確立する活動。
  definition:
    zh: ToolDiscoveryActivity 是 Moonweave 对发现可能能力来源的活动边界。它可通过 MCP tools/list 读取服务器公开的 Tool 声明，或读取 A2A AgentCard 的 AgentSkill 描述，再形成带来源的 ToolCandidateSet。发现只回答“看到了哪些可能项”，不证明工具当前可用、适合任务、优于其他项、已被选择或已执行。
    en: ToolDiscoveryActivity is Moonweave's activity boundary for discovering possible capability sources. It may read server-exposed Tool declarations through MCP tools/list or AgentSkill descriptions in an A2A AgentCard, then form a provenance-bearing ToolCandidateSet. Discovery answers only “which possible items were seen”; it does not prove a tool is currently available, fits the task, is better than another item, has been selected, or has executed.
    ja: ToolDiscoveryActivity は可能な capability source を発見する Moonweave の activity boundary である。MCP tools/list により server-exposed Tool declaration を読み、または A2A AgentCard の AgentSkill description を読み、provenance 付き ToolCandidateSet を形成できる。discovery が答えるのは「どの可能な item を見たか」だけであり、tool が現在 available、task に適合、他より優位、selected、executed であることを証明しない。
  why_needed:
    zh: 发现源有不同 schema、分页和时效性。单独建模发现活动能保存其读取边界和来源，让评估与选择不会把“目录中存在”错误解释为运行权限或最终决定。
    en: Discovery sources have different schemas, pagination, and freshness. Modeling discovery separately preserves what was read and from where, preventing assessment and selection from misreading “exists in a catalog” as runtime permission or a final decision.
    ja: discovery source には異なる schema、pagination、freshness がある。discovery を別に model 化すると何をどこから読んだかを保持し、assessment と selection が「catalog に存在する」を runtime permission や final decision と誤読するのを防ぐ。
  includes:
    - zh: MCP tools/list 的目录读取和游标续页，或 A2A AgentCard skills 的读取。
      en: Catalog reads and cursor continuation through MCP tools/list, or reads of A2A AgentCard skills.
      ja: MCP tools/list による catalog read と cursor continuation、または A2A AgentCard skills の read。
    - zh: 对已读来源、读取时间、查询和生成候选集的本地记录。
      en: Local records of sources read, read time, query, and the generated candidate set.
      ja: 読んだ source、read time、query、生成された candidate set の local record。
  excludes:
    - zh: 对候选的可用性、资格、匹配、排序或选择判断。
      en: Availability, eligibility, match, ranking, or selection judgments about candidates.
      ja: candidate に関する availability、eligibility、match、ranking、selection judgment。
    - zh: MCP tools/call、A2A 任务执行或任何工具调用结果。
      en: MCP tools/call, A2A task execution, or any tool-call result.
      ja: MCP tools/call、A2A task execution、任意の tool-call result。
  semantic_kind: activity
engineering:
  explanation:
    zh: 发现器保留原生目录对象和分页信息，然后在本地建立 activity_id、ToolSearchQuery 引用和 ToolCandidateSet 引用。MCP 的 tools/list 使用 cursor 而非关键词筛选；A2A AgentSkill 是能力描述而非 MCP Tool schema，因此适配器必须保存来源种类。
    en: A discoverer retains native catalog objects and pagination information, then locally creates activity_id, a ToolSearchQuery reference, and a ToolCandidateSet reference. MCP tools/list uses a cursor rather than keyword filtering; an A2A AgentSkill is a capability description rather than an MCP Tool schema, so an adapter must retain source kind.
    ja: discoverer は native catalog object と pagination information を保持し、activity_id、ToolSearchQuery reference、ToolCandidateSet reference をローカルに作る。MCP tools/list は keyword filtering ではなく cursor を使う。A2A AgentSkill は MCP Tool schema ではなく capability description のため、adapter は source kind を保持しなければならない。
  typical_input:
    - description:
        zh: MCP 工具发现请求
        en: MCP tool-discovery request
        ja: MCP tool-discovery request
      format: |-
        {"jsonrpc":"2.0","id":1,"method":"tools/list","params":{"cursor":"page-2"}}
      source_claims: [claim-discovery-mcp]
    - description:
        zh: A2A AgentCard 技能描述
        en: A2A AgentCard skill description
        ja: A2A AgentCard skill description
      format: |-
        {"name":"Research agent","skills":[{"id":"research","name":"Research","description":"Find public sources","tags":["search"],"inputModes":["text/plain"]}]}
      source_claims: [claim-discovery-a2a]
  typical_output:
    - description:
        zh: 本地发现活动记录
        en: Local discovery-activity record
        ja: Local discovery-activity record
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"tool_discovery_activity","activity_id":"discover-17","query_ref":"query:q-17","source_snapshot_refs":["mcp:list:17"],"candidate_set_ref":"set:17","read_at":"2026-07-19T09:00:00Z"}
      source_claims: [claim-discovery-local]
  reference_implementations:
    - name: Model Context Protocol tools/list
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines server tool discovery, Tool declarations, and cursor pagination.
    - name: A2A Agent Card
      url: https://a2a-protocol.org/latest/specification/
      description: Defines agent capability descriptions published as AgentCard skills.
structure:
  identity_keys: [activity_id]
  fields:
    - id: activity_id
      labels: {zh: 发现活动标识, en: Discovery-activity identifier, ja: discovery-activity 識別子}
      definitions:
        zh: 稳定标识一次本地发现活动，不替代 MCP JSON-RPC id、A2A AgentCard id 或服务器标签。
        en: Stably identifies one local discovery activity and does not replace an MCP JSON-RPC id, A2A AgentCard id, or server label.
        ja: 一つの local discovery activity を安定して識別し、MCP JSON-RPC id、A2A AgentCard id、server label を置き換えない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: discover-17
      source_claims: [claim-discovery-local]
    - id: source_snapshot_refs
      labels: {zh: 来源快照引用, en: Source snapshot references, ja: source snapshot 参照}
      definitions:
        zh: 指向实际读取的 tools/list 页、AgentCard 或其他目录快照，使发现范围可复核。
        en: Points to the tools/list pages, AgentCards, or other catalog snapshots actually read so discovery scope is reviewable.
        ja: 実際に読んだ tools/list page、AgentCard、または他の catalog snapshot を指し、discovery scope を reviewable にする。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: mcp:list:17
      source_claims: [claim-discovery-mcp, claim-discovery-a2a]
    - id: candidate_set_ref
      labels: {zh: 候选集引用, en: Candidate-set reference, ja: candidate-set 参照}
      definitions:
        zh: 指向本活动产生的本地 ToolCandidateSet，而非原生协议数组。
        en: Points to the local ToolCandidateSet produced by this activity, not a native protocol array.
        ja: この activity が作る local ToolCandidateSet を指し、native protocol array ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: set:17
      source_claims: [claim-discovery-local]
  constraints:
    - id: discovery-preserves-source-and-page-boundary
      severity: error
      expression_language: plain
      expression: Every ToolDiscoveryActivity must retain source_snapshot_refs; an MCP source with nextCursor must retain the cursor or an explicit incomplete-catalog status in its candidate-set record.
      explanation:
        zh: 目录分页影响发现覆盖范围，丢弃游标会夸大已发现范围。
        en: Catalog pagination affects discovery coverage, and dropping a cursor can overstate what was discovered.
        ja: catalog pagination は discovery coverage に影響し、cursor を捨てると発見範囲を過大に示すことがある。
      source_claims: [claim-discovery-mcp, claim-discovery-local]
    - id: discovery-has-no-assessment-or-invocation
      severity: error
      expression_language: plain
      expression: A ToolDiscoveryActivity may record sources, queries, and candidate sets only; it must not assert availability_state, eligibility_state, match_state, rank, selected_candidate_ref, tool_call, or tool_result.
      explanation:
        zh: 发现只建立可能项范围，其他状态由评估、选择和调用边界承担。
        en: Discovery establishes only the scope of possible items; other states belong to assessment, selection, and invocation boundaries.
        ja: discovery は可能な item の scope だけを確立する。他の state は assessment、selection、invocation boundary に属する。
      source_claims: [claim-discovery-local]
  required_relations: []
examples:
  - id: discovery-positive-mcp-catalog

    labels: {zh: 读取 MCP 目录, en: Read MCP catalog, ja: MCP catalog を読む}
    descriptions:
      zh: ToolBench (Qin 2023) 16000+ RapidAPI 工具发现；Gorilla APIBench 1645 API retriever-aware 检索；Toolformer 支持 Calculator/QA/Search/Translator/Calendar 五类工具发现。
      en: ToolBench (Qin 2023) discovers tools among 16000+ RapidAPI; Gorilla APIBench 1645 API retriever-aware retrieval; Toolformer supports Calculator/QA/Search/Translator/Calendar discovery.
      ja: ToolBench (Qin 2023) が 16000+ RapidAPI から tool 発見。Gorilla APIBench 1645 API retriever-aware 检索。Toolformer が Calculator/QA/Search/Translator/Calendar 五类 tool 発見を支持。
    field_values: {activity_id: discover-17, source_snapshot_refs: [mcp:list:17], candidate_set_ref: set:17}
    related_node_ids: [ToolDiscoveryActivity, ToolSearch, ToolCandidateSet]
    related_relation_ids: []

    source_claims: [claim-discovery-mcp, claim-discovery-local]
  - id: discovery-counterexample-listing-is-availability

    labels: {zh: 将目录列举视为可用性, en: Treat catalog listing as availability, ja: catalog listing を availability と扱う}
    descriptions:
      zh: 反例：Gorilla 无 retriever 时 hallucinate 不存在 API；ToolBench 未验证 RapidAPI endpoint 可用性即加入候选集。
      en: Counterexample: Gorilla hallucinates nonexistent API without retriever; ToolBench adds candidates without verifying RapidAPI endpoint availability.
      ja: 反例：Gorilla が retriever なしで不存在 API を hallucinate。ToolBench が RapidAPI endpoint 可用性未検証で candidate set に追加。
    field_values: {activity_id: discover-18, source_snapshot_refs: [mcp:list:18], candidate_set_ref: set:18, availability_state: available}
    related_node_ids: [ToolDiscoveryActivity, ToolAvailabilityAssessment]
    related_relation_ids: []

    source_claims: [claim-discovery-mcp, claim-discovery-local]
  - id: discovery-boundary-a2a-agent-skill

    labels: {zh: A2A 技能发现边界, en: A2A skill-discovery boundary, ja: A2A skill-discovery 境界}
    descriptions:
      zh: Gorilla APIBench 离线训练检索 vs ToolBench 在线 RapidAPI 实时发现的注册边界；ToolMatch 分数非 ToolBench DFSDT 决策树节点。
      en: Boundary between Gorilla APIBench offline training retrieval vs ToolBench online RapidAPI live discovery; ToolMatch score is not a ToolBench DFSDT tree node.
      ja: Gorilla APIBench offline 訓練检索と ToolBench online RapidAPI リアルタイム発見の登録境界。ToolMatch score は ToolBench DFSDT 決定木 node ではない。
    field_values: {activity_id: discover-19, source_snapshot_refs: [a2a:agent-card/research], candidate_set_ref: set:19, source_kind: a2a-agent-skill}
    related_node_ids: [ToolDiscoveryActivity, ToolCandidate]
    related_relation_ids: []

    source_claims: [claim-discovery-a2a, claim-discovery-local]
  - id: discovery-instance-paginated-resume

    labels: {zh: 分页续读实例, en: Paginated-resume instance, ja: paginated-resume instance}
    descriptions:
      zh: Gorilla 实例：retriever 返回 torch.hub.load API 文档；ToolBench 实例：RapidAPI "Spoonacular" recipe search API tool_id=spoonacular-search。
      en: Gorilla instance: retriever returns torch.hub.load API docs; ToolBench instance: RapidAPI "Spoonacular" recipe search API tool_id=spoonacular-search.
      ja: Gorilla 実例：retriever が torch.hub.load API 文档を返す。ToolBench 実例：RapidAPI "Spoonacular" recipe search API tool_id=spoonacular-search。
    field_values: {activity_id: discover-20, source_snapshot_refs: [mcp:list:20], candidate_set_ref: set:20, continuation_cursor: page-3}
    related_node_ids: [ToolDiscoveryActivity, ToolCandidateSet]
    related_relation_ids: []

    source_claims: [claim-discovery-mcp]
parent_relation: null
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol — Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-spec
    relevance: Defines tools/list discovery, Tool declarations, and cursor pagination.
  - id: a2a-latest-specification
    title: Agent2Agent Protocol Specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-spec
    relevance: Defines AgentCard skills as descriptive focused capabilities.
source_claims:
  - id: claim-discovery-mcp
    source: mcp-tools-2025-11-25
    supports: MCP tools/list enumerates Tool declarations, takes an optional cursor, and returns tools with optional nextCursor for continuation.
    locator: Tools — Listing Tools and Tool definition
    evidence_kind: normative
    confidence: high
  - id: claim-discovery-a2a
    source: a2a-latest-specification
    supports: An A2A AgentCard publishes AgentSkill descriptions with identity, narrative description, tags, and optional I/O modes and security requirements.
    locator: AgentCard and AgentSkill data model
    evidence_kind: normative
    confidence: high
  - id: claim-discovery-local
    source: mcp-tools-2025-11-25
    supports: activity_id, source_snapshot_refs, candidate_set_ref, read time, and separation of discovery from assessment, selection, and invocation are Moonweave-local design inferences over catalog records.
    locator: Tools — Listing Tools
    evidence_kind: design-inference
    confidence: high
