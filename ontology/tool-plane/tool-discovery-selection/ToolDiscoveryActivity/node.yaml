schema: moonweave.ai/ontology-node/v1
id: ToolDiscoveryActivity
kind: concept
status: review
labels:
  zh: 工具发现活动
  en: Tool discovery activity
  ja: ツール発見活動
semantics:
  short_definition:
    zh: 工具发现活动在特定运行上下文中确定哪些工具定义可供后续检索。
    en: A tool discovery activity determines which tool definitions are available in a particular run context.
    ja: ツール発見活動は特定の実行コンテキストで後続検索に利用できるツール定義を確定します。
  definition:
    zh: 工具发现活动是一类运行期活动：它读取已注册或延迟加载的工具定义表面，依据当前参与者、环境和可见性条件形成可检索范围；它不创建工具定义，也不执行工具。
    en: A tool discovery activity is a runtime activity that reads registered or deferred tool-definition surfaces and establishes a searchable scope for the current actor, environment, and visibility conditions; it neither creates definitions nor invokes tools.
    ja: ツール発見活動は、登録済みまたは遅延ロードされたツール定義面を読み、現在の actor・environment・visibility 条件に対する検索可能範囲を確立する実行時活動であり、定義の作成もツール実行も行いません。
  why_needed:
    zh: 该上位概念把运行期发现与持久注册、任务相关搜索和实际调用分开，使图谱先表达活动种类，再表达具体工具检索。
    en: This parent concept separates runtime discovery from persistent registration, task-specific search, and invocation so the graph states the activity kind before the concrete search.
    ja: この上位概念は runtime discovery を persistent registration、task-specific search、invocation から分離し、具体検索の前に活動種別を示します。
  includes:
    - zh: 读取当前可见工具目录、延迟加载命名空间或 MCP 工具列表以建立可检索范围的活动。
      en: Activities that read a currently visible tool catalog, deferred namespace, or MCP tool list to establish searchable scope.
      ja: 現在可視な tool catalog、deferred namespace、MCP tool list を読み検索範囲を確立する活動。
  excludes:
    - zh: 写入 ToolRegistry 的注册活动，以及带参数执行 ToolCall 的调用活动。
      en: Registration activities that write ToolRegistry and invocation activities that execute a parameterized ToolCall.
      ja: ToolRegistry へ書き込む registration activity と、parameterized ToolCall を実行する invocation activity。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - discovery_activity_id
  fields:
    - id: discovery_activity_id
      labels:
        zh: 发现活动标识
        en: discovery activity ID
        ja: 発見活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一次运行期工具发现活动。
        en: Uniquely identifies one runtime tool-discovery activity.
        ja: 一回の runtime tool-discovery activity を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: discover-tools-run-042
      source_claims:
        - claim-tool-discovery-activity-001
  constraints: []
  required_relation_constraints: []
examples:
  - id: ToolDiscoveryActivity-example-positive-manual-001
    kind: positive
    labels:
      zh: 工具发现活动正例
      en: Positive case for Tool discovery activity
      ja: ツール発見活動の正例
    scenario_id: null
    descriptions:
      zh: 代码审查智能体启动时读取当前账号可见的 MCP 工具和延迟加载命名空间，记录 discovery_activity_id 后再发起具体 ToolSearch。
      en: When a code-review agent starts, it reads MCP tools and deferred namespaces visible to the current account, records a discovery_activity_id, and only then starts a concrete ToolSearch.
      ja: コードレビュー agent の開始時に、現在の account から見える MCP tools と deferred namespaces を読み、discovery_activity_id を記録してから具体的 ToolSearch を開始します。
    field_values:
      discovery_activity_id: discover-tools-run-042
    related_node_ids:
      - ToolDiscoveryActivity
      - ToolSearch
      - ToolDefinition
    related_relation_ids:
      - ToolSearch-is_a-ToolDiscoveryActivity
    expected_result:
      zh: 发现活动只建立可检索范围，不产生工具调用或注册写入。
      en: The activity establishes searchable scope without producing a tool call or registry write.
      ja: 活動は検索範囲だけを確立し、tool call や registry write を生成しません。
    why_valid_or_invalid:
      zh: 场景明确给出运行期读取、活动身份和后续搜索，三者与注册和执行均可区分。
      en: The case states runtime reading, activity identity, and a later search, all distinguishable from registration and execution.
      ja: runtime reading、activity identity、後続 search が明示され、registration と execution から区別できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-discovery-activity-001
  - id: ToolDiscoveryActivity-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 工具发现活动边界例
      en: Boundary case for Tool discovery activity
      ja: ツール発見活動の境界例
    scenario_id: null
    descriptions:
      zh: 管理员发布一个新的 ToolDefinition 会改变持久目录，但这是一项 RegistryPublicationActivity，不是 ToolDiscoveryActivity。
      en: An administrator publishing a new ToolDefinition changes the persistent catalog, but that is RegistryPublicationActivity rather than ToolDiscoveryActivity.
      ja: 管理者が新しい ToolDefinition を公開して永続 catalog を変更する行為は RegistryPublicationActivity であり、ToolDiscoveryActivity ではありません。
    field_values:
      discovery_activity_id: publish-tool-042
    related_node_ids:
      - ToolDiscoveryActivity
      - RegistryPublicationActivity
      - ToolDefinition
    related_relation_ids: []
    expected_result:
      zh: 验证器保留 RegistryPublicationActivity 类型，不把目录写入归为发现。
      en: Validation retains RegistryPublicationActivity and does not classify a catalog write as discovery.
      ja: validation は RegistryPublicationActivity を保持し、catalog write を discovery に分類しません。
    why_valid_or_invalid:
      zh: 持久目录写入改变定义成员关系，而发现活动只读取当前可见范围。
      en: Persistent catalog writes change definition membership, whereas discovery only reads current visibility.
      ja: persistent catalog write は definition membership を変えますが、discovery は current visibility を読むだけです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-discovery-activity-001
