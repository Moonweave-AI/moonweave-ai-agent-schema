schema: moonweave.ai/ontology-node/v1
id: RegistrationActivity
kind: concept
labels:
  zh: 本地登记活动 profile
  en: Local registration activity profile
  ja: ローカル登録 activity profile
semantics:
  short_definition:
    zh: 将工具引用纳入本地注册治理的 Moonweave 活动 profile。
    en: A Moonweave activity profile that admits a tool reference into local registration governance.
    ja: tool reference をローカル registration governance に受け入れる Moonweave activity profile。
  definition:
    zh: >
      RegistrationActivity 是 RegistryActivity 的本地子类，记录某个工具引用被本地注册器接受、其证据和执行者。
      它不是 MCP 的注册操作：MCP Tools 规范定义 tools/list 与 tools/call，而不定义向服务器注册工具的请求。
    en: >
      RegistrationActivity is a local subtype of RegistryActivity that records a tool reference
      being accepted by a local registry, its evidence, and its actor. It is not an MCP registration
      operation: the MCP Tools specification defines tools/list and tools/call, not a request to
      register a tool with a server.
    ja: >
      RegistrationActivity は、tool reference がローカル registry に受け入れられたこと、その evidence、actor を記録する
      RegistryActivity のローカル subtype である。これは MCP registration operation ではない。MCP Tools specification は
      tools/list と tools/call を定義するが、server に tool を登録する request は定義しない。
  why_needed:
    zh: 本地系统需要审计采用一个已发现或已配置工具的决定。
    en: A local system needs to audit its decision to adopt a discovered or configured tool.
    ja: ローカル system には、発見または構成された tool を採用する decision を audit する必要がある。
  includes:
    - zh: 被登记的工具引用、证据、时间和执行者。
      en: The admitted tool reference, evidence, time, and actor.
      ja: 登録された tool reference、evidence、time、actor。
    - zh: 生成一个不可变本地条目版本。
      en: Generation of an immutable local entry version.
      ja: 不変ローカル entry version の生成。
  excludes:
    - zh: MCP 服务器的 tools/list 响应或 Tool 定义本身。
      en: An MCP server's tools/list response or Tool definition itself.
      ja: MCP server の tools/list response または Tool definition 自体。
    - zh: 对工具的实际 tools/call 调用。
      en: An actual tools/call invocation of the tool.
      ja: tool の実際の tools/call invocation。
  semantic_kind: activity
  aliases:
    - language: en
      value: local tool onboarding activity
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      活动应引用之前的来源快照或应用配置提交，并生成一个新的不可变 RegistryEntry 版本来记录采用；不得就地更改既有条目的 local_state。只要服务器的工具集合改变，
      它仍须通过 tools/list 再发现；本地登记不能改变服务器暴露的集合。
    en: >
      The activity should reference a prior source snapshot or application configuration revision and
      generate a new immutable RegistryEntry version to record adoption and must not mutate an existing entry local_state in place. Whenever a server's tool set changes, it is
      still rediscovered through tools/list; local registration cannot alter the server-exposed set.
    ja: >
      activity は前の source snapshot または application configuration revision を参照し、RegistryEntry の新しい不変 version を生成して adoption を記録し、既存 entry の local_state を in-place で変更してはならない。server の tool set が変わる場合も tools/list で再発見され、ローカル registration は
      server-exposed set を変更できない。
  typical_input:
    - description:
        zh: 已验证的工具来源快照。
        en: A verified tool-provenance snapshot.
        ja: 検証済み tool-provenance snapshot。
      format: |
        {"source_ref":"mcp://files/tools/read_file","verified_at":"2026-07-18T00:00:00Z"}
      source_claims: [moonweave-registration-activity-profile]
  typical_output:
    - description:
        zh: 新建或更新的本地注册条目。
        en: A created or updated local registration entry.
        ja: 作成または更新されたローカル registration entry。
      format: |
        {"activity_kind":"registration","entry_id":"files-read-file","local_state":"approved"}
      source_claims: [moonweave-registration-activity-profile]
  reference_implementations:
    - name: MCP Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines tool discovery and calling but no tool-registration request.
structure:
  identity_keys: [activity_id, registry_ref, entry_id]
  fields:
    - id: entry_id
      labels:
        zh: 登记条目标识符
        en: Registered entry identifier
        ja: 登録 entry 識別子
      definitions:
        zh: 由本登记活动生成的不可变本地 RegistryEntry 版本的标识符。
        en: The identifier of the immutable local RegistryEntry version generated by this registration activity.
        ja: この registration activity が生成する不変ローカル RegistryEntry version の識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: files-read-file
      allowed_values: []
      source_claims: [moonweave-registration-activity-profile]
    - id: admission_basis
      labels:
        zh: 登记依据
        en: Admission basis
        ja: 登録 basis
      definitions:
        zh: 支持本地登记决定的来源快照或配置修订引用。
        en: A source-snapshot or configuration-revision reference supporting the local admission decision.
        ja: ローカル admission decision を支持する source-snapshot または configuration-revision reference。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: mcp://files/tools/read_file@2026-07-18
      allowed_values: []
      source_claims: [moonweave-registration-activity-profile]
    - id: admitted_at
      labels:
        zh: 登记时间
        en: Admitted time
        ja: 登録時刻
      definitions:
        zh: 本地登记决定被记录的时间。
        en: The time the local admission decision was recorded.
        ja: ローカル admission decision が記録された時刻。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ISO-8601-date-time
      example_value: "2026-07-18T00:00:00Z"
      allowed_values: []
      source_claims: [moonweave-registration-activity-profile]
    - id: actor_ref
      labels:
        zh: 执行者引用
        en: Actor reference
        ja: actor reference
      definitions:
        zh: 执行本地登记决定的服务或负责人。
        en: The service or responsible party performing the local admission decision.
        ja: ローカル admission decision を実行する service または responsible party。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: registry-controller
      allowed_values: []
      source_claims: [moonweave-registration-activity-profile]
    - id: activity_id
      labels:
        zh: 活动标识符
        en: Activity identifier
        ja: activity 識別子
      definitions:
        zh: 在本地注册器范围内唯一标识活动。
        en: Uniquely identifies an activity within a local registry scope.
        ja: ローカル registry scope 内で activity を一意に識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: act-42
      allowed_values: []
      source_claims: [moonweave-registration-activity-taxonomy]
    - id: registry_ref
      labels:
        zh: 注册器引用
        en: Registry reference
        ja: registry reference
      definitions:
        zh: 标识该活动使用的本地 ToolRegistry 实体；它是使用关系的本地引用，不表示活动被注册器组成性拥有。
        en: Identifies the local ToolRegistry Entity used by this activity; it is a local reference for a use relationship and does not mean the registry compositionally owns the activity.
        ja: この activity が使用するローカル ToolRegistry Entity を識別する。これは use relationship のローカル reference であり、registry が activity を compositionally 所有することを意味しない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: registry:tools-default
      allowed_values: []
      source_claims: [moonweave-registration-activity-taxonomy]
    - id: activity_kind
      labels:
        zh: 活动种类
        en: Activity kind
        ja: activity kind
      definitions:
        zh: 本地治理动作的类型。
        en: The type of local governance action.
        ja: ローカル governance action の type。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: refresh
      allowed_values: [registration, deregistration, publication, refresh]
      source_claims: [moonweave-registration-activity-taxonomy]
    - id: occurred_at
      labels:
        zh: 发生时间
        en: Occurred time
        ja: 発生時刻
      definitions:
        zh: 本地动作被记录发生的时间。
        en: The time at which the local action was recorded as occurring.
        ja: ローカル action が発生したと記録された時刻。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ISO-8601-date-time
      example_value: "2026-07-18T00:00:00Z"
      allowed_values: []
      source_claims: [moonweave-registration-activity-taxonomy]
    - id: evidence_ref
      labels:
        zh: 证据引用
        en: Evidence reference
        ja: evidence reference
      definitions:
        zh: 指向触发或证明本地活动的输入记录。
        en: Points to an input record that triggered or evidences the local activity.
        ja: ローカル activity を起動または証明する input record を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: mcp-notification-19
      allowed_values: []
      source_claims: [moonweave-registration-activity-taxonomy]
  constraints:
    - id: registration-does-not-alter-server-tools
      severity: error
      expression_language: plain
      expression: A local registration activity must retain its admission_basis, use its inherited registry_ref, generate a new immutable RegistryEntry version, and cannot claim to add a Tool to an MCP server.
      explanation:
        zh: 本地采用工具不等于改变服务器的协议工具集合。
        en: Locally adopting a tool is not the same as changing a server's protocol tool set.
        ja: tool をローカルで採用することは server の protocol tool set を変更することではない。
      source_claims: [moonweave-registration-activity-profile, mcp-tool-discovery-not-registration]
    - id: registration-activity-inherits-parent-required-fields
      severity: error
      expression_language: plain
      expression: "All inherited required RegistryActivity fields are fields of this same record; the is_a subtype does not establish or reference a second RegistryActivity record."
      explanation: {zh: "所有继承的 RegistryActivity 必需字段属于同一记录，该 is_a 子类型不建立或引用第二条 RegistryActivity 记录。", en: "Inherited required fields stay on the same record rather than creating a second parent record.", ja: "継承された必須 RegistryActivity フィールドは同じレコードに属し、この is_a 下位型は 2 番目の親レコードを作成または参照しない。"}
      source_claims: [moonweave-registration-activity-taxonomy]
  required_relations: []
examples:
  - id: registration-activity-positive-mcp-onboarding

    labels:
      zh: MCP 工具本地登记
      en: Local onboarding of an MCP tool
      ja: MCP tool のローカル onboarding

    descriptions:
      zh: Gorilla APIBench 1645 API 注册（HuggingFace/TorchHub/TensorHub）；ToolBench 16000+ RapidAPI 工具注册表；Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") 插件注册。
      en: Gorilla APIBench registers 1645 APIs (HuggingFace/TorchHub/TensorHub); ToolBench 16000+ RapidAPI tool registry; Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") plugin registration.
      ja: Gorilla APIBench が 1645 API を登録。ToolBench 16000+ RapidAPI tool registry。Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") プラグイン登録。
    field_values:
      activity_id: register-files-read-file-20260719
      registry_ref: registry://files
      entry_id: files-read-file
      actor_ref: registry-controller
    related_node_ids: [RegistrationActivity, RegistryEntry]
    related_relation_ids: [RegistrationActivity-is_a-RegistryActivity, RegistryEntry-was_generated_by-RegistryActivity]

    source_claims: [moonweave-registration-activity-profile]
  - id: registration-activity-counterexample-server-registration

    labels:
      zh: 声称向 MCP 服务器登记工具
      en: Claimed registration with MCP server
      ja: MCP server への登録を主張する例

    descriptions:
      zh: 反例：ToolBench 注册未验证 RapidAPI key 的 endpoint；Gorilla registry 混入 hallucinated API 无 retriever 校验；Semantic Kernel plugin 名冲突未检测。
      en: Counterexample: ToolBench registers RapidAPI endpoint without key verification; Gorilla registry includes hallucinated API without retriever validation; Semantic Kernel plugin name collision undetected.
      ja: 反例：ToolBench が RapidAPI key 未検証 endpoint を登録。Gorilla registry に retriever 未検証 hallucinated API 混入。
    field_values:
      entry_id: files-read-file
    related_node_ids: [RegistrationActivity]
    related_relation_ids: [RegistrationActivity-is_a-RegistryActivity, RegistryEntry-was_generated_by-RegistryActivity]

    source_claims: [mcp-tool-discovery-not-registration, moonweave-registration-activity-profile]
  - id: registration-activity-boundary-discovery-admission

    labels:
      zh: 发现与本地登记边界
      en: Boundary between discovery and local admission
      ja: discovery とローカル admission の境界

    descriptions:
      zh: Gorilla 离线 APIBench 索引 vs ToolBench 在线 RapidAPI catalog vs Semantic Kernel 本地 plugin 注册的持久化边界。
      en: Persistence boundary among Gorilla offline APIBench index, ToolBench online RapidAPI catalog, Semantic Kernel local plugin registration.
      ja: Gorilla offline APIBench index、ToolBench online RapidAPI catalog、Semantic Kernel ローカル plugin 登録の永続化境界。
    field_values:
      admission_basis: mcp://files/tools/read_file
    related_node_ids: [RegistrationActivity, ToolRegistry]
    related_relation_ids: [RegistrationActivity-is_a-RegistryActivity, RegistryEntry-was_generated_by-RegistryActivity]

    source_claims: [mcp-tool-discovery-not-registration, moonweave-registration-activity-profile]
  - id: registration-activity-instance-openai-function

    labels:
      zh: OpenAI 函数工具本地登记实例
      en: Local onboarding instance for OpenAI function tool
      ja: OpenAI function tool のローカル onboarding instance

    descriptions:
      zh: "ToolBench registry 实例：tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}；Semantic Kernel WeatherPlugin.get_weather(city:str) 注册实例。"
      en: "ToolBench registry instance: tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}; Semantic Kernel WeatherPlugin.get_weather(city:str) registration instance."
      ja: ToolBench registry 実例：tool_id=rapidapi-weather-api endpoint=/forecast。Semantic Kernel WeatherPlugin.get_weather(city:str) 登録実例。
    field_values:
      activity_id: register-support-get-customer-20260719
      registry_ref: registry://support
      entry_id: support-get-customer
      actor_ref: configuration-controller
    related_node_ids: [RegistrationActivity, FunctionTool]
    related_relation_ids: [RegistrationActivity-is_a-RegistryActivity, RegistryEntry-was_generated_by-RegistryActivity]

    source_claims: [moonweave-registration-activity-profile]
parent_relation:
  id: RegistrationActivity-is_a-RegistryActivity
  predicate: is_a
  target: concept:RegistryActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是本地注册治理活动的一种
    en: is a kind of local registration-governance activity
    ja: ローカル登録ガバナンス activity の一種である
  definition:
    zh: RegistrationActivity 是以接纳工具引用为目的的本地 RegistryActivity。
    en: RegistrationActivity is a local RegistryActivity whose purpose is admitting a tool reference.
    ja: RegistrationActivity は tool reference を受け入れることを目的とするローカル RegistryActivity である。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 具有子类型
      en: has subtype
      ja: subtype を持つ
  conditions: []
  temporal_scope: event
  boundary_context: This local subtype edge does not describe an MCP operation or request type.
  constraints:
    - id: registration-subtype-is-local
      severity: error
      expression_language: plain
      expression: RegistrationActivity is a Moonweave local subtype and must not be labeled as an MCP registration method.
      explanation:
        zh: 当前 MCP Tools 规范不包含注册工具的方法。
        en: The current MCP Tools specification contains no method for registering a tool.
        ja: 現在の MCP Tools specification には tool を登録する method はない。
      source_claims: [moonweave-registration-activity-taxonomy]
  examples: []
  source_claims: [moonweave-registration-activity-taxonomy]
  distinct_fact_rationale:
    zh: 该子类按本地动作目的分类，而不按协议方法分类。
    en: This subtype is classified by local action purpose, not by a protocol method.
    ja: この subtype は protocol method ではなくローカル action purpose により分類される。
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification — Tools
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    version: 2025-11-25
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Defines tools/list and tools/call, not tool-registration operations.
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: design-inference
    relevance: Defines local RegistrationActivity profile and taxonomy.
source_claims:
  - id: mcp-tool-discovery-not-registration
    source: mcp-tools-2025-11-25
    supports: MCP Tools specifies tools/list for discovery and tools/call for invocation; this specification section defines no client request to register a Tool with a server.
    locator: "Listing Tools; Calling Tools"
    evidence_kind: normative
    confidence: high
  - id: moonweave-registration-activity-profile
    source: moonweave-ontology-design
    supports: RegistrationActivity is a Moonweave local activity that uses its inherited registry reference and generates an immutable RegistryEntry version to record admission of a provenance-bearing tool reference.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
  - id: moonweave-registration-activity-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave classifies RegistrationActivity as a subtype of RegistryActivity for local navigation.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high