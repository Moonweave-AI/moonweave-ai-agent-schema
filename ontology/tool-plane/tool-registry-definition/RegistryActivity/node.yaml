schema: moonweave.ai/ontology-node/v1
id: RegistryActivity
kind: concept
labels:
  zh: 注册治理活动 profile
  en: Registration-governance activity profile
  ja: 登録ガバナンス activity profile
semantics:
  short_definition:
    zh: 记录本地注册器动作的 Moonweave 活动 profile。
    en: A Moonweave activity profile that records an action taken by a local registry.
    ja: ローカル registry が行った action を記録する Moonweave activity profile。
  definition:
    zh: >
      RegistryActivity 是独立根概念的本地审计活动总类；它使用一个 ToolRegistry，涵盖登记、注销、发布和刷新等动作。MCP 的 list_changed
      notification 可以作为观察证据，但并不定义这种活动对象，也不证明任何本地动作已完成。
    en: >
      RegistryActivity is an independent-root local audit-activity umbrella that uses one ToolRegistry, covering actions such as
      registration, deregistration, publication, and refresh. An MCP list_changed notification can
      be observed as evidence, but it does not define this activity object or prove that any local action completed.
    ja: >
      RegistryActivity は一つの ToolRegistry を使用する独立 root のローカル audit-activity umbrella であり、registration、deregistration、
      publication、refresh などの action を扱う。MCP list_changed notification は evidence として観測できるが、
      この activity object を定義せず、ローカル action が完了したことも証明しない。
  why_needed:
    zh: 本地审计需要区分协议事件与由其触发的治理动作。
    en: Local audit needs to distinguish a protocol event from a governance action it may trigger.
    ja: ローカル audit には protocol event と、それが起動し得る governance action を区別する必要がある。
  includes:
    - zh: 本地活动标识、时间、行为种类和证据引用。
      en: A local activity identifier, time, action kind, and evidence reference.
      ja: ローカル activity identifier、time、action kind、evidence reference。
    - zh: 注册、注销和发布这三种本地活动子类。
      en: Local registration, deregistration, and publication activity subtypes.
      ja: ローカル registration、deregistration、publication activity subtype。
  excludes:
    - zh: MCP notification 或 JSON-RPC 消息本身。
      en: An MCP notification or JSON-RPC message itself.
      ja: MCP notification または JSON-RPC message 自体。
    - zh: 协议标准定义的注册生命周期状态机。
      en: A registration lifecycle state machine defined by a protocol standard.
      ja: protocol standard が定義する registration lifecycle state machine。
  semantic_kind: activity
  aliases:
    - language: en
      value: local registry audit event
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      activity_kind 必须记录本地行为，registry_ref 识别该活动使用的本地注册器，而 evidence_ref 连接输入，例如 list_changed notification、工具列表快照或
      应用配置提交。记录 evidence 不应把输入事件与本地决定合并为同一个协议消息。
    en: >
      activity_kind records the local action, registry_ref identifies the local registry used by the activity, and evidence_ref links the input, such as a
      list_changed notification, tool-list snapshot, or application configuration revision.
      Recording evidence must not merge the input event and local decision into one protocol message.
    ja: >
      activity_kind はローカル action を記録し、registry_ref は activity が使用するローカル registry を識別し、evidence_ref は list_changed notification、tool-list snapshot、
      application configuration revision などの input を結ぶ。evidence を記録しても input event とローカル decision を
      一つの protocol message に統合してはならない。
  typical_input:
    - description:
        zh: MCP 工具列表变化通知。
        en: An MCP tool-list-change notification.
        ja: MCP tool-list-change notification。
      format: |
        {"method":"notifications/tools/list_changed"}
      source_claims: [mcp-list-change-notification]
  typical_output:
    - description:
        zh: 本地刷新请求活动。
        en: A local refresh-request activity.
        ja: ローカル refresh-request activity。
      format: |
        {"activity_id":"act-42","registry_ref":"registry:tools-default","activity_kind":"refresh","evidence_ref":"mcp-notification-19"}
      source_claims: [moonweave-registry-activity-profile]
  reference_implementations:
    - name: MCP Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines list-changed notification as a protocol event.
structure:
  identity_keys: [activity_id, registry_ref]
  fields:
    - id: activity_id
      labels:
        zh: 活动标识符
        en: Activity identifier
        ja: activity 識別子
      definitions:
        zh: 在本地注册器范围内唯一标识活动。
        en: Uniquely identifies an activity within a local registry scope.
        ja: ローカル registry scope 内で activity を一意に識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: act-42
      allowed_values: []
      source_claims: [moonweave-registry-activity-profile]
    - id: registry_ref
      labels:
        zh: 注册器引用
        en: Registry reference
        ja: registry reference
      definitions:
        zh: 标识该活动使用的本地 ToolRegistry 实体；它是使用关系的本地引用，不表示活动被注册器组成性拥有。
        en: Identifies the local ToolRegistry Entity used by this activity; it is a local reference for a use relationship and does not mean the registry compositionally owns the activity.
        ja: この activity が使用するローカル ToolRegistry Entity を識別する。これは use relationship のローカル reference であり、registry が activity を compositionally 所有することを意味しない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: registry:tools-default
      allowed_values: []
      source_claims: [prov-activity-used-entity, moonweave-registry-activity-profile]
    - id: activity_kind
      labels:
        zh: 活动种类
        en: Activity kind
        ja: activity kind
      definitions:
        zh: 本地治理动作的类型。
        en: The type of local governance action.
        ja: ローカル governance action の type。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: refresh
      allowed_values: [registration, deregistration, publication, refresh]
      source_claims: [moonweave-registry-activity-profile]
    - id: occurred_at
      labels:
        zh: 发生时间
        en: Occurred time
        ja: 発生時刻
      definitions:
        zh: 本地动作被记录发生的时间。
        en: The time at which the local action was recorded as occurring.
        ja: ローカル action が発生したと記録された時刻。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ISO-8601-date-time
      example_value: "2026-07-18T00:00:00Z"
      allowed_values: []
      source_claims: [moonweave-registry-activity-profile]
    - id: evidence_ref
      labels:
        zh: 证据引用
        en: Evidence reference
        ja: evidence reference
      definitions:
        zh: 指向触发或证明本地活动的输入记录。
        en: Points to an input record that triggered or evidences the local activity.
        ja: ローカル activity を起動または証明する input record を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: mcp-notification-19
      allowed_values: []
      source_claims: [moonweave-registry-activity-profile]
    - id: actor_ref
      labels:
        zh: 执行者引用
        en: Actor reference
        ja: actor reference
      definitions:
        zh: 执行本地动作的服务或负责人引用。
        en: A reference to the service or responsible party that performed the local action.
        ja: ローカル action を実行した service または responsible party への reference。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: registry-controller
      allowed_values: []
      source_claims: [moonweave-registry-activity-profile]
  constraints:
    - id: activity-needs-evidence-and-local-kind
      severity: error
      expression_language: plain
      expression: A RegistryActivity must identify a local action kind and evidence_ref and must not claim the evidence itself is the local action.
      explanation:
        zh: 输入通知与本地后续动作有因果关联，但不是同一个事实。
        en: An input notification and a subsequent local action can be causally related but are not one fact.
        ja: input notification と後続のローカル action は因果的に関連し得るが、一つの fact ではない。
      source_claims: [moonweave-registry-activity-profile, mcp-list-change-notification]
  required_relations: [RegistryActivity-uses-ToolRegistry]
examples:
  - id: registry-activity-positive-refresh

    labels:
      zh: 刷新活动
      en: Refresh activity
      ja: refresh activity

    descriptions:
      zh: Gorilla APIBench 1645 API 注册（HuggingFace/TorchHub/TensorHub）；ToolBench 16000+ RapidAPI 工具注册表；Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") 插件注册。
      en: Gorilla APIBench registers 1645 APIs (HuggingFace/TorchHub/TensorHub); ToolBench 16000+ RapidAPI tool registry; Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") plugin registration.
      ja: Gorilla APIBench が 1645 API を登録。ToolBench 16000+ RapidAPI tool registry。Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") プラグイン登録。
    field_values:
      registry_ref: registry:tools-default
      activity_kind: refresh
      actor_ref: registry-controller
    related_node_ids: [RegistryActivity, ToolRegistry]
    related_relation_ids: [RegistryActivity-uses-ToolRegistry]

    source_claims: [moonweave-registry-activity-profile, mcp-list-change-notification]
  - id: registry-activity-counterexample-notification-equals-registration

    labels:
      zh: 通知等于注册的错误断言
      en: Notification-equals-registration assertion
      ja: notification は registration と等しいという主張

    descriptions:
      zh: 反例：ToolBench 注册未验证 RapidAPI key 的 endpoint；Gorilla registry 混入 hallucinated API 无 retriever 校验；Semantic Kernel plugin 名冲突未检测。
      en: Counterexample: ToolBench registers RapidAPI endpoint without key verification; Gorilla registry includes hallucinated API without retriever validation; Semantic Kernel plugin name collision undetected.
      ja: 反例：ToolBench が RapidAPI key 未検証 endpoint を登録。Gorilla registry に retriever 未検証 hallucinated API 混入。
    field_values:
      registry_ref: registry:tools-default
      activity_kind: registration
    related_node_ids: [RegistryActivity, RegistrationActivity]
    related_relation_ids: [RegistryActivity-uses-ToolRegistry]

    source_claims: [mcp-list-change-notification, moonweave-registry-activity-profile]
  - id: registry-activity-boundary-audit-and-protocol

    labels:
      zh: 审计活动与协议消息边界
      en: Boundary between audit activity and protocol message
      ja: audit activity と protocol message の境界

    descriptions:
      zh: Gorilla 离线 APIBench 索引 vs ToolBench 在线 RapidAPI catalog vs Semantic Kernel 本地 plugin 注册的持久化边界。
      en: Persistence boundary among Gorilla offline APIBench index, ToolBench online RapidAPI catalog, Semantic Kernel local plugin registration.
      ja: Gorilla offline APIBench index、ToolBench online RapidAPI catalog、Semantic Kernel ローカル plugin 登録の永続化境界。
    field_values:
      registry_ref: registry:tools-default
      evidence_ref: mcp-notification-19
    related_node_ids: [RegistryActivity]
    related_relation_ids: [RegistryActivity-uses-ToolRegistry]

    source_claims: [moonweave-registry-activity-profile]
  - id: registry-activity-instance-configuration-refresh

    labels:
      zh: 应用配置刷新实例
      en: Application-configuration refresh instance
      ja: application-configuration refresh instance

    descriptions:
      zh: "ToolBench registry 实例：tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}；Semantic Kernel WeatherPlugin.get_weather(city:str) 注册实例。"
      en: "ToolBench registry instance: tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}; Semantic Kernel WeatherPlugin.get_weather(city:str) registration instance."
      ja: ToolBench registry 実例：tool_id=rapidapi-weather-api endpoint=/forecast。Semantic Kernel WeatherPlugin.get_weather(city:str) 登録実例。
    field_values:
      registry_ref: registry:tools-default
      activity_kind: refresh
      actor_ref: configuration-controller
    related_node_ids: [RegistryActivity, FunctionTool]
    related_relation_ids: [RegistryActivity-uses-ToolRegistry]

    source_claims: [moonweave-registry-activity-profile]
parent_relation: null
relations:
  - id: RegistryActivity-uses-ToolRegistry
    predicate: uses
    target: concept:ToolRegistry
    endpoint_order: activity-to-registry
    direction: source-to-target
    relation_kind: provenance
    labels:
      zh: 使用工具注册器
      en: uses tool registry
      ja: tool registry を使用する
    definition:
      zh: RegistryActivity 在登记、注销、发布或刷新时使用一个 ToolRegistry 实体作为本地治理输入；该活动不是注册器的组成部件。
      en: A RegistryActivity uses one ToolRegistry Entity as a local governance input while registering, deregistering, publishing, or refreshing; the activity is not a compositional part of the registry.
      ja: RegistryActivity は registration、deregistration、publication、refresh の際に一つの ToolRegistry Entity をローカル governance input として使用する。activity は registry の compositional part ではない。
    cardinality:
      source:
        min: 1
        max: 1
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_used_by
      labels:
        zh: 被注册治理活动使用
        en: is used by registry-governance activity
        ja: registry-governance activity により使用される
    conditions:
      - id: registry-reference-must-match-use
        severity: error
        expression_language: plain
        expression: Assert this relation only when registry_ref identifies the target ToolRegistry Entity used as the input or governed registry of the activity.
        explanation:
          zh: 日志中仅提到注册器名称而未识别具体注册器实体时，不能建立该使用事实。
          en: Mentioning a registry name in a log without identifying the concrete registry Entity does not establish this use fact.
          ja: log で registry 名に言及するだけで具体的な registry Entity を識別しない場合、この use fact は確立しない。
        source_claims: [prov-activity-used-entity, moonweave-registry-activity-profile]
    temporal_scope: event
    boundary_context: This PROV-style use relation links a local governance Activity to a ToolRegistry Entity. It neither makes the activity a registry component nor defines an MCP registration lifecycle.
    constraints:
      - id: registry-activity-provenance-not-composition
        severity: error
        expression_language: plain
        expression: RegistryActivity must use a ToolRegistry through provenance and must not be modeled as part_of that registry.
        explanation:
          zh: 审计活动和被治理的注册器都有独立身份与保留期，必须用活动—实体出处关系而不是删除级联关系表达。
          en: The audit activity and governed registry have independent identity and retention boundaries, so provenance rather than deletion-cascade composition expresses their link.
          ja: audit activity と governed registry は独立した identity と retention boundary を持つため、deletion-cascade composition ではなく provenance で link を表す。
        source_claims: [prov-activity-used-entity, moonweave-registry-activity-profile]
    examples: []
    source_claims: [prov-activity-used-entity, moonweave-registry-activity-profile]
    distinct_fact_rationale:
      zh: 注册器是活动所使用的实体，活动历史也可独立保留；两者不是整体与部件。
      en: The registry is an Entity used by the activity and the activity history may be retained independently, so they are not whole and part.
      ja: registry は activity が使用する Entity であり、activity history は独立して保持できるため、whole と part ではない。
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification — Tools
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    version: 2025-11-25
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Defines the list-changed notification used as possible evidence.
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    publisher: World Wide Web Consortium (W3C)
    url: https://www.w3.org/TR/prov-o/
    version: W3C Recommendation 30 April 2013
    accessed_on: 2026-07-19
    source_type: standard
    relevance: Defines Activity, Entity, and the prov:used relationship used to distinguish registry governance actions from registry entities.
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: design-inference
    relevance: Defines local registry activities and their use of a ToolRegistry without compositional ownership.
source_claims:
  - id: prov-activity-used-entity
    source: prov-o-core
    supports: PROV-O distinguishes Activity from Entity and defines prov:used for an Activity's use of an Entity.
    locator: "PROV-O: prov:Activity, prov:Entity, prov:used"
    evidence_kind: normative
    confidence: high
  - id: mcp-list-change-notification
    source: mcp-tools-2025-11-25
    supports: Servers that declare tools listChanged should notify clients when their available-tool list changes.
    locator: "List Changed Notification"
    evidence_kind: normative
    confidence: high
  - id: moonweave-registry-activity-profile
    source: moonweave-ontology-design
    supports: RegistryActivity is a Moonweave local audit profile that records a local action separately from its evidence input.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
  - id: moonweave-registry-activity-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave models RegistryActivity as a local Activity that uses a ToolRegistry Entity for governance actions and audit history.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high