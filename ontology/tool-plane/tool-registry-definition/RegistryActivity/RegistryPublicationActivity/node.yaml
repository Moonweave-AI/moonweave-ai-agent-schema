schema: moonweave.ai/ontology-node/v1
id: RegistryPublicationActivity
kind: concept
labels:
  zh: 本地注册发布活动 profile
  en: Local registry-publication activity profile
  ja: ローカル登録公開 activity profile
semantics:
  short_definition:
    zh: 将已登记本地工具引用投影到发布表面的 Moonweave 活动 profile。
    en: A Moonweave activity profile that projects registered local tool references onto a publication surface.
    ja: 登録済みローカル tool reference を publication surface に project する Moonweave activity profile。
  definition:
    zh: >
      RegistryPublicationActivity 是 RegistryActivity 的本地子类，记录某一时刻本地注册器如何把条目投影到
      CapabilitySurface。它不等同于 MCP tools/list，也不代表服务器发出 notifications/tools/list_changed；它是
      本地消费者视图的发布审计。
    en: >
      RegistryPublicationActivity is a local subtype of RegistryActivity that records how a local
      registry projected entries onto a new immutable CapabilitySurface version at a time. It is not MCP tools/list and
      does not represent a server emitting notifications/tools/list_changed; it audits publication
      of a local consumer view.
    ja: >
      RegistryPublicationActivity は、ローカル registry がある時点で entry を CapabilitySurface にどう project したかを
      記録する RegistryActivity のローカル subtype である。MCP tools/list ではなく、server が notifications/tools/list_changed
      を発行することも表さない。ローカル consumer view の publication を audit する。
  why_needed:
    zh: 管理者需要解释一个本地表面为什么包含或排除了某些工具引用。
    en: Administrators need to explain why a local surface included or excluded particular tool references.
    ja: administrator には、ローカル surface が特定の tool reference を含めたまたは除外した理由を説明する必要がある。
  includes:
    - zh: 目标发布表面、已发布条目集合和选择规则引用。
      en: Target publication surface, published entry set, and selection-rule reference.
      ja: target publication surface、published entry set、selection-rule reference。
    - zh: 本地生成时刻和输入目录快照引用。
      en: Local generation time and input-catalog snapshot reference.
      ja: ローカル generation time と input-catalog snapshot reference。
  excludes:
    - zh: MCP tools/list 的协议响应，或 list_changed notification。
      en: An MCP tools/list protocol response or list_changed notification.
      ja: MCP tools/list protocol response または list_changed notification。
    - zh: 向调用方授予执行权限的授权决定。
      en: An authorization decision granting a caller execution permission.
      ja: caller に execution permission を与える authorization decision。
  semantic_kind: activity
  aliases:
    - language: en
      value: local tool-surface publication event
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      发布活动保存 target_surface_ref、published_entry_ids、selection_rule_ref 和 source_snapshot_ref。运行时仍会在
      调用时检查可用性和权限；发布仅解释本地提示或 Agent 配置中可见的候选集合。
    en: >
      Publication stores target_surface_ref, result_surface_revision_ref, published_entry_ids, selection_rule_ref, and
      source_snapshot_ref, and generates a new immutable CapabilitySurface version rather than mutating a prior view. The runtime still checks availability and permission at invocation;
      publication only explains the candidate set visible in a local prompt or Agent configuration.
    ja: >
      publication は target_surface_ref、published_entry_ids、selection_rule_ref、source_snapshot_ref を保存する。
      runtime は invocation 時に availability と permission を引き続き確認する。publication はローカル prompt または
      Agent configuration に見える candidate set だけを説明する。
  typical_input:
    - description:
        zh: 本地注册器条目快照和发布规则。
        en: A local registry-entry snapshot and publication rule.
        ja: ローカル registry-entry snapshot と publication rule。
      format: |
        {"entries":["files-read-file","files-write-file"],"selection_rule":"readonly-v1"}
      source_claims: [moonweave-registry-publication-profile]
  typical_output:
    - description:
        zh: 面向 reader 表面的本地发布活动。
        en: A local publication activity for the reader surface.
        ja: reader surface 向けローカル publication activity。
      format: |
        {"target_surface_ref":"reader","result_surface_revision_ref":"reader@1","published_entry_ids":["files-read-file"],"selection_rule_ref":"readonly-v1"}
      source_claims: [moonweave-registry-publication-profile]
  reference_implementations:
    - name: MCP Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines protocol tool discovery, distinct from local surface publication.
structure:
  identity_keys: [activity_id, registry_ref, target_surface_ref]
  fields:
    - id: target_surface_ref
      labels:
        zh: 目标发布表面引用
        en: Target publication surface reference
        ja: target publication surface reference
      definitions:
        zh: 指向接收本地发布投影的 CapabilitySurface。
        en: Identifies the CapabilitySurface series receiving the local publication projection; the concrete generated immutable version is result_surface_revision_ref.
        ja: ローカル publication projection を受ける CapabilitySurface を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: reader
      allowed_values: []
      source_claims: [moonweave-registry-publication-profile]
    - id: result_surface_revision_ref
      labels:
        zh: 结果表面版本引用
        en: Result surface-version reference
        ja: result surface-version reference
      definitions:
        zh: 指向本发布活动生成的不可变 CapabilitySurface 版本；发布变化必须产生新版本而非就地修改已有表面。
        en: Points to the immutable CapabilitySurface version generated by this publication activity; a publication change must create a new version rather than mutate an existing surface in place.
        ja: この publication activity が生成する不変 CapabilitySurface version を指す。publication change は既存 surface を in-place で mutate せず新 version を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: reader@1
      allowed_values: []
      source_claims: [moonweave-registry-publication-profile]
    - id: published_entry_ids
      labels:
        zh: 已发布条目标识符
        en: Published entry identifiers
        ja: 公開 entry 識別子
      definitions:
        zh: 该活动投影到目标表面的本地注册条目。
        en: Local registration entries projected by this activity onto the target surface.
        ja: この activity が target surface に project するローカル registration entry。
      datatype: array
      required: true
      cardinality:
        min: 0
        max: null
      pattern: null
      example_value: '["files-read-file"]'
      allowed_values: []
      source_claims: [moonweave-registry-publication-profile]
    - id: selection_rule_ref
      labels:
        zh: 选择规则引用
        en: Selection-rule reference
        ja: selection-rule reference
      definitions:
        zh: 决定本地条目是否投影到表面的版本化规则。
        en: The versioned rule determining whether a local entry is projected onto the surface.
        ja: ローカル entry を surface に project するかを決める versioned rule。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: readonly-v1
      allowed_values: []
      source_claims: [moonweave-registry-publication-profile]
    - id: source_snapshot_ref
      labels:
        zh: 来源快照引用
        en: Source snapshot reference
        ja: source snapshot reference
      definitions:
        zh: 该发布决策所依据的本地目录或协议发现快照。
        en: The local-catalog or protocol-discovery snapshot on which the publication decision relied.
        ja: publication decision が依拠したローカル catalog または protocol-discovery snapshot。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: catalog-snapshot-42
      allowed_values: []
      source_claims: [moonweave-registry-publication-profile]
    - id: published_at
      labels:
        zh: 发布时间
        en: Published time
        ja: 公開時刻
      definitions:
        zh: 本地表面投影被记录的时间。
        en: The time the local surface projection was recorded.
        ja: ローカル surface projection が記録された時刻。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ISO-8601-date-time
      example_value: "2026-07-18T00:00:00Z"
      allowed_values: []
      source_claims: [moonweave-registry-publication-profile]
    - id: activity_id
      labels:
        zh: 活动标识符
        en: Activity identifier
        ja: activity 識別子
      definitions:
        zh: 在本地注册器范围内唯一标识活动。
        en: Uniquely identifies an activity within a local registry scope.
        ja: ローカル registry scope 内で activity を一意に識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: act-42
      allowed_values: []
      source_claims: [moonweave-registry-publication-taxonomy]
    - id: registry_ref
      labels:
        zh: 注册器引用
        en: Registry reference
        ja: registry reference
      definitions:
        zh: 标识该活动使用的本地 ToolRegistry 实体；它是使用关系的本地引用，不表示活动被注册器组成性拥有。
        en: Identifies the local ToolRegistry Entity used by this activity; it is a local reference for a use relationship and does not mean the registry compositionally owns the activity.
        ja: この activity が使用するローカル ToolRegistry Entity を識別する。これは use relationship のローカル reference であり、registry が activity を compositionally 所有することを意味しない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: registry:tools-default
      allowed_values: []
      source_claims: [moonweave-registry-publication-taxonomy]
    - id: activity_kind
      labels:
        zh: 活动种类
        en: Activity kind
        ja: activity kind
      definitions:
        zh: 本地治理动作的类型。
        en: The type of local governance action.
        ja: ローカル governance action の type。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: refresh
      allowed_values: [registration, deregistration, publication, refresh]
      source_claims: [moonweave-registry-publication-taxonomy]
    - id: occurred_at
      labels:
        zh: 发生时间
        en: Occurred time
        ja: 発生時刻
      definitions:
        zh: 本地动作被记录发生的时间。
        en: The time at which the local action was recorded as occurring.
        ja: ローカル action が発生したと記録された時刻。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ISO-8601-date-time
      example_value: "2026-07-18T00:00:00Z"
      allowed_values: []
      source_claims: [moonweave-registry-publication-taxonomy]
    - id: evidence_ref
      labels:
        zh: 证据引用
        en: Evidence reference
        ja: evidence reference
      definitions:
        zh: 指向触发或证明本地活动的输入记录。
        en: Points to an input record that triggered or evidences the local activity.
        ja: ローカル activity を起動または証明する input record を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: mcp-notification-19
      allowed_values: []
      source_claims: [moonweave-registry-publication-taxonomy]
    - id: actor_ref
      labels:
        zh: 执行者引用
        en: Actor reference
        ja: actor reference
      definitions:
        zh: 执行本地动作的服务或负责人引用。
        en: A reference to the service or responsible party that performed the local action.
        ja: ローカル action を実行した service または responsible party への reference。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: registry-controller
      allowed_values: []
      source_claims: [moonweave-registry-publication-taxonomy]
  constraints:
    - id: publication-is-not-permission-or-mcp-list
      severity: error
      expression_language: plain
      expression: RegistryPublicationActivity must retain its local selection inputs, use its inherited registry_ref, generate result_surface_revision_ref as a new immutable CapabilitySurface version, and must not be represented as MCP tools/list, list_changed, or an execution-permission grant.
      explanation:
        zh: 本地表面发布、协议发现和调用授权是三个不同的职责。
        en: Local surface publication, protocol discovery, and invocation authorization are three different responsibilities.
        ja: ローカル surface publication、protocol discovery、invocation authorization は三つの異なる responsibility である。
      source_claims: [moonweave-registry-publication-profile]
    - id: registry-publication-activity-inherits-parent-required-fields
      severity: error
      expression_language: plain
      expression: "All inherited required RegistryActivity fields are fields of this same record; the is_a subtype does not establish or reference a second RegistryActivity record."
      explanation: {zh: "所有继承的 RegistryActivity 必需字段属于同一记录，该 is_a 子类型不建立或引用第二条 RegistryActivity 记录。", en: "Inherited required fields stay on the same record rather than creating a second parent record.", ja: "継承された必須 RegistryActivity フィールドは同じレコードに属し、この is_a 下位型は 2 番目の親レコードを作成または参照しない。"}
      source_claims: [moonweave-registry-publication-taxonomy]
  required_relations: []
examples:
  - id: registry-publication-positive-reader

    labels:
      zh: 只读表面发布
      en: Read-only surface publication
      ja: read-only surface publication

    descriptions:
      zh: Gorilla APIBench 1645 API 注册（HuggingFace/TorchHub/TensorHub）；ToolBench 16000+ RapidAPI 工具注册表；Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") 插件注册。
      en: Gorilla APIBench registers 1645 APIs (HuggingFace/TorchHub/TensorHub); ToolBench 16000+ RapidAPI tool registry; Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") plugin registration.
      ja: Gorilla APIBench が 1645 API を登録。ToolBench 16000+ RapidAPI tool registry。Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") プラグイン登録。
    field_values:
      activity_id: publish-reader-20260719
      registry_ref: registry://files
      target_surface_ref: reader
      selection_rule_ref: readonly-v1
    related_node_ids: [RegistryPublicationActivity, CapabilitySurface]
    related_relation_ids: [RegistryPublicationActivity-is_a-RegistryActivity, CapabilitySurface-was_generated_by-RegistryPublicationActivity]

    source_claims: [moonweave-registry-publication-profile]
  - id: registry-publication-counterexample-tools-list-response

    labels:
      zh: 本地发布冒充 tools/list
      en: Local publication posed as tools/list
      ja: ローカル publication を tools/list と偽装する例

    descriptions:
      zh: 反例：ToolBench 注册未验证 RapidAPI key 的 endpoint；Gorilla registry 混入 hallucinated API 无 retriever 校验；Semantic Kernel plugin 名冲突未检测。
      en: Counterexample: ToolBench registers RapidAPI endpoint without key verification; Gorilla registry includes hallucinated API without retriever validation; Semantic Kernel plugin name collision undetected.
      ja: 反例：ToolBench が RapidAPI key 未検証 endpoint を登録。Gorilla registry に retriever 未検証 hallucinated API 混入。
    field_values:
      target_surface_ref: reader
    related_node_ids: [RegistryPublicationActivity]
    related_relation_ids: [RegistryPublicationActivity-is_a-RegistryActivity, CapabilitySurface-was_generated_by-RegistryPublicationActivity]

    source_claims: [mcp-tool-list-shape, moonweave-registry-publication-profile]
  - id: registry-publication-boundary-visibility-authorization

    labels:
      zh: 发布可见性与授权边界
      en: Boundary between publication visibility and authorization
      ja: publication visibility と authorization の境界

    descriptions:
      zh: Gorilla 离线 APIBench 索引 vs ToolBench 在线 RapidAPI catalog vs Semantic Kernel 本地 plugin 注册的持久化边界。
      en: Persistence boundary among Gorilla offline APIBench index, ToolBench online RapidAPI catalog, Semantic Kernel local plugin registration.
      ja: Gorilla offline APIBench index、ToolBench online RapidAPI catalog、Semantic Kernel ローカル plugin 登録の永続化境界。
    field_values:
      target_surface_ref: writer
    related_node_ids: [RegistryPublicationActivity, CapabilitySurface]
    related_relation_ids: [RegistryPublicationActivity-is_a-RegistryActivity, CapabilitySurface-was_generated_by-RegistryPublicationActivity]

    source_claims: [moonweave-registry-publication-profile]
  - id: registry-publication-instance-openai-support

    labels:
      zh: OpenAI 支持表面发布实例
      en: OpenAI support-surface publication instance
      ja: OpenAI support-surface publication instance

    descriptions:
      zh: ToolBench registry 实例：tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}；Semantic Kernel WeatherPlugin.get_weather(city:str) 注册实例。
      en: ToolBench registry instance: tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}; Semantic Kernel WeatherPlugin.get_weather(city:str) registration instance.
      ja: ToolBench registry 実例：tool_id=rapidapi-weather-api endpoint=/forecast。Semantic Kernel WeatherPlugin.get_weather(city:str) 登録実例。
    field_values:
      activity_id: publish-support-20260719
      registry_ref: registry://support
      target_surface_ref: support
      selection_rule_ref: support-v2
    related_node_ids: [RegistryPublicationActivity, FunctionTool]
    related_relation_ids: [RegistryPublicationActivity-is_a-RegistryActivity, CapabilitySurface-was_generated_by-RegistryPublicationActivity]

    source_claims: [moonweave-registry-publication-profile]
parent_relation:
  id: RegistryPublicationActivity-is_a-RegistryActivity
  predicate: is_a
  target: concept:RegistryActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是本地注册治理活动的一种
    en: is a kind of local registration-governance activity
    ja: ローカル登録ガバナンス activity の一種である
  definition:
    zh: RegistryPublicationActivity 是以本地表面投影为目的的 RegistryActivity。
    en: RegistryPublicationActivity is a RegistryActivity whose purpose is local surface projection.
    ja: RegistryPublicationActivity はローカル surface projection を目的とする RegistryActivity である。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 具有子类型
      en: has subtype
      ja: subtype を持つ
  conditions: []
  temporal_scope: event
  boundary_context: This local subtype edge is not an MCP list response, notification, or authorization type.
  constraints:
    - id: publication-subtype-is-local
      severity: error
      expression_language: plain
      expression: RegistryPublicationActivity is a Moonweave local subtype and cannot be labeled as a protocol tools/list result or permission grant.
      explanation:
        zh: 本地发布审计不会改变 MCP 的列表消息或授权模型。
        en: Local publication audit does not change MCP list messages or authorization model.
        ja: ローカル publication audit は MCP list message や authorization model を変更しない。
      source_claims: [moonweave-registry-publication-taxonomy]
  examples: []
  source_claims: [moonweave-registry-publication-taxonomy]
  distinct_fact_rationale:
    zh: 该子类按本地发布目的分类，而非按协议消息分类。
    en: This subtype is classified by local publication purpose, not a protocol message.
    ja: この subtype は protocol message ではなくローカル publication purpose により分類される。
relations: []
sources:
