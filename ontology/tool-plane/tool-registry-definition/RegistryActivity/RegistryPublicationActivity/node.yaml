source_claims:
  - id: mcp-tool-list-shape
    source: mcp-tools-2025-11-25
    supports: MCP tools/list returns a result containing a tools array of Tool records and an optional nextCursor.
    locator: "Listing Tools"
    evidence_kind: normative
    confidence: high
  - id: moonweave-registry-publication-profile
    source: moonweave-ontology-design
    supports: RegistryPublicationActivity is a Moonweave local audit activity that uses its inherited registry reference and generates an immutable CapabilitySurface version by projecting registered references.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
  - id: moonweave-registry-publication-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave classifies RegistryPublicationActivity as a subtype of RegistryActivity for local navigation.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
