schema: moonweave.ai/ontology-node/v1
id: DeregistrationActivity
kind: concept
labels:
  zh: 本地注销活动 profile
  en: Local deregistration activity profile
  ja: ローカル登録解除 activity profile
semantics:
  short_definition:
    zh: 从本地注册治理中移除或停用工具引用的 Moonweave 活动 profile。
    en: A Moonweave activity profile that removes or retires a tool reference from local registration governance.
    ja: tool reference をローカル registration governance から削除または retirement する Moonweave activity profile。
  definition:
    zh: >
      DeregistrationActivity 是 RegistryActivity 的本地子类，记录某个本地 RegistryEntry 停用、移除或替换的决定
      及其证据。它不删除 MCP 服务器的 Tool；服务器随后通过 tools/list 暴露什么，仍由服务器和 MCP 协议处理。
    en: >
      DeregistrationActivity is a local subtype of RegistryActivity that records the decision and
      evidence to retire, remove, or replace a local RegistryEntry by generating an immutable retired successor version. It does not delete an MCP
      server's Tool; what a server later exposes through tools/list remains owned by that server and MCP.
    ja: >
      DeregistrationActivity は、ローカル RegistryEntry を retire、remove、replace する decision と evidence を記録する
      RegistryActivity のローカル subtype である。MCP server の Tool を削除するものではない。後で server が tools/list
      で何を expose するかは、その server と MCP が担う。
  why_needed:
    zh: 本地使用策略可能停止采用一个仍被服务器暴露的工具，也可能保留其历史以供审计。
    en: Local usage policy may stop adopting a tool that a server still exposes and may retain its history for audit.
    ja: ローカル usage policy は server がなお expose する tool の採用を止めることがあり、audit のため history を保持できる。
  includes:
    - zh: 被停用的本地条目、动作时间和本地依据。
      en: The retired local entry, action time, and local basis.
      ja: retirement されたローカル entry、action time、ローカル basis。
    - zh: 对替代条目或重新发现动作的可选引用。
      en: Optional references to a replacement entry or rediscovery action.
      ja: replacement entry または rediscovery action への任意 reference。
  excludes:
    - zh: 删除服务器 Tool 的 MCP 请求。
      en: An MCP request to delete a server Tool.
      ja: server Tool を削除する MCP request。
    - zh: ToolDefinition 中的协议级弃用字段。
      en: A protocol-level deprecation field in ToolDefinition.
      ja: ToolDefinition 内の protocol-level deprecation field。
  semantic_kind: activity
  aliases:
    - language: en
      value: local tool retirement activity
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      注销记录 target_entry_id、local_basis 和替代引用（如有）。它可以由重新获取 tools/list 后发现的变化触发，
      也可以由应用策略触发；无论哪种情况，它只改变本地目录中的采纳状态。
    en: >
      Deregistration records target_entry_id, local_basis, and a replacement reference when present.
      It can be triggered by a change found after re-fetching tools/list or by application policy;
      in either case it generates a new immutable local-catalog entry version and does not mutate a prior adoption state in place.
    ja: >
      deregistration は target_entry_id、local_basis、存在する場合は replacement reference を記録する。tools/list の
      再取得後に見つかった変更または application policy により起動され得るが、いずれの場合もローカル catalog の
      adoption state だけを変更する。
  typical_input:
    - description:
        zh: 重新获取后不再出现的本地工具来源快照。
        en: A refreshed source snapshot in which a previously local tool is absent.
        ja: 以前のローカル tool が存在しない refresh 済み source snapshot。
      format: |
        {"previous_ref":"mcp://files/tools/read_file","new_tools":["list_files"]}
      source_claims: [mcp-tools-list-for-deregistration]
  typical_output:
    - description:
        zh: 本地注销活动记录。
        en: A local deregistration activity record.
        ja: ローカル deregistration activity record。
      format: |
        {"activity_kind":"deregistration","target_entry_id":"files-read-file","result_entry_ref":"files-read-file@2","local_basis":"not-observed-after-refresh"}
      source_claims: [moonweave-deregistration-activity-profile]
  reference_implementations:
    - name: MCP Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines discovery and list-change notification, not deletion of a server Tool by a client.
structure:
  identity_keys: [activity_id, registry_ref, target_entry_id]
  fields:
    - id: target_entry_id
      labels:
        zh: 目标条目标识符
        en: Target entry identifier
        ja: target entry 識別子
      definitions:
        zh: 本地将被停用、移除或替换的 RegistryEntry。
        en: The prior local RegistryEntry version being retired, removed, or replaced by a newly generated successor version.
        ja: retire、remove、replace されるローカル RegistryEntry。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: files-read-file
      allowed_values: []
      source_claims: [moonweave-deregistration-activity-profile]
    - id: result_entry_ref
      labels:
        zh: 结果条目版本引用
        en: Result entry-version reference
        ja: result entry-version reference
      definitions:
        zh: 指向本注销活动生成的不可变 retired 或 replacement RegistryEntry 版本；它记录本地治理结果，不删除目标来源工具。
        en: Points to the immutable retired or replacement RegistryEntry version generated by this activity; it records the local governance result and does not delete the target source tool.
        ja: この activity が生成する不変 retired または replacement RegistryEntry version を指す。ローカル governance result を記録し、target source tool を削除しない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: files-read-file@2
      allowed_values: []
      source_claims: [moonweave-deregistration-activity-profile]
    - id: local_basis
      labels:
        zh: 本地注销依据
        en: Local deregistration basis
        ja: ローカル登録解除 basis
      definitions:
        zh: 支持本地停用决定的政策或来源观察。
        en: The policy or source observation supporting the local retirement decision.
        ja: ローカル retirement decision を支持する policy または source observation。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: not-observed-after-refresh
      allowed_values: []
      source_claims: [moonweave-deregistration-activity-profile]
    - id: retired_at
      labels:
        zh: 注销时间
        en: Retired time
        ja: 登録解除時刻
      definitions:
        zh: 本地注销决定记录的时间。
        en: The time the local deregistration decision was recorded.
        ja: ローカル deregistration decision が記録された時刻。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ISO-8601-date-time
      example_value: "2026-07-18T00:00:00Z"
      allowed_values: []
      source_claims: [moonweave-deregistration-activity-profile]
    - id: replacement_entry_ref
      labels:
        zh: 替代条目引用
        en: Replacement entry reference
        ja: replacement entry reference
      definitions:
        zh: 若本地策略选择替代工具，则指向该本地条目；没有替代时为空。
        en: Points to a local replacement entry when local policy selects one; absent when there is no replacement.
        ja: ローカル policy が replacement tool を選ぶときローカル replacement entry を指し、ない場合は空である。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: files-list-files
      allowed_values: []
      source_claims: [moonweave-deregistration-activity-profile]
    - id: activity_id
      labels:
        zh: 活动标识符
        en: Activity identifier
        ja: activity 識別子
      definitions:
        zh: 在本地注册器范围内唯一标识活动。
        en: Uniquely identifies an activity within a local registry scope.
        ja: ローカル registry scope 内で activity を一意に識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: act-42
      allowed_values: []
      source_claims: [moonweave-deregistration-activity-taxonomy]
    - id: registry_ref
      labels:
        zh: 注册器引用
        en: Registry reference
        ja: registry reference
      definitions:
        zh: 标识该活动使用的本地 ToolRegistry 实体；它是使用关系的本地引用，不表示活动被注册器组成性拥有。
        en: Identifies the local ToolRegistry Entity used by this activity; it is a local reference for a use relationship and does not mean the registry compositionally owns the activity.
        ja: この activity が使用するローカル ToolRegistry Entity を識別する。これは use relationship のローカル reference であり、registry が activity を compositionally 所有することを意味しない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: registry:tools-default
      allowed_values: []
      source_claims: [moonweave-deregistration-activity-taxonomy]
    - id: activity_kind
      labels:
        zh: 活动种类
        en: Activity kind
        ja: activity kind
      definitions:
        zh: 本地治理动作的类型。
        en: The type of local governance action.
        ja: ローカル governance action の type。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: refresh
      allowed_values: [registration, deregistration, publication, refresh]
      source_claims: [moonweave-deregistration-activity-taxonomy]
    - id: occurred_at
      labels:
        zh: 发生时间
        en: Occurred time
        ja: 発生時刻
      definitions:
        zh: 本地动作被记录发生的时间。
        en: The time at which the local action was recorded as occurring.
        ja: ローカル action が発生したと記録された時刻。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ISO-8601-date-time
      example_value: "2026-07-18T00:00:00Z"
      allowed_values: []
      source_claims: [moonweave-deregistration-activity-taxonomy]
    - id: evidence_ref
      labels:
        zh: 证据引用
        en: Evidence reference
        ja: evidence reference
      definitions:
        zh: 指向触发或证明本地活动的输入记录。
        en: Points to an input record that triggered or evidences the local activity.
        ja: ローカル activity を起動または証明する input record を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: mcp-notification-19
      allowed_values: []
      source_claims: [moonweave-deregistration-activity-taxonomy]
    - id: actor_ref
      labels:
        zh: 执行者引用
        en: Actor reference
        ja: actor reference
      definitions:
        zh: 执行本地动作的服务或负责人引用。
        en: A reference to the service or responsible party that performed the local action.
        ja: ローカル action を実行した service または responsible party への reference。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: registry-controller
      allowed_values: []
      source_claims: [moonweave-deregistration-activity-taxonomy]
  constraints:
    - id: deregistration-is-local-only
      severity: error
      expression_language: plain
      expression: DeregistrationActivity must identify a local target entry, use its inherited registry_ref, generate result_entry_ref as a new immutable RegistryEntry version, and must not claim to delete, deprecate, or mutate the source server Tool.
      explanation:
        zh: 本地停用不会赋予客户端改变 MCP 服务器工具集合的权限。
        en: Local retirement does not give a client authority to change an MCP server's tool set.
        ja: ローカル retirement は client に MCP server の tool set を変更する authority を与えない。
      source_claims: [moonweave-deregistration-activity-profile, mcp-tools-list-for-deregistration]
    - id: deregistration-activity-inherits-parent-required-fields
      severity: error
      expression_language: plain
      expression: "All inherited required RegistryActivity fields are fields of this same record; the is_a subtype does not establish or reference a second RegistryActivity record."
      explanation: {zh: "所有继承的 RegistryActivity 必需字段属于同一记录，该 is_a 子类型不建立或引用第二条 RegistryActivity 记录。", en: "Inherited required fields stay on the same record rather than creating a second parent record.", ja: "継承された必須 RegistryActivity フィールドは同じレコードに属し、この is_a 下位型は 2 番目の親レコードを作成または参照しない。"}
      source_claims: [moonweave-deregistration-activity-taxonomy]
  required_relations: []
examples:
  - id: deregistration-activity-positive-local-retirement

    labels:
      zh: 本地停用条目
      en: Local entry retirement
      ja: ローカル entry retirement

    descriptions:
      zh: Gorilla APIBench 1645 API 注册（HuggingFace/TorchHub/TensorHub）；ToolBench 16000+ RapidAPI 工具注册表；Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") 插件注册。
      en: Gorilla APIBench registers 1645 APIs (HuggingFace/TorchHub/TensorHub); ToolBench 16000+ RapidAPI tool registry; Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") plugin registration.
      ja: Gorilla APIBench が 1645 API を登録。ToolBench 16000+ RapidAPI tool registry。Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") プラグイン登録。
    field_values:
      activity_id: deregister-files-read-file-20260719
      registry_ref: registry://files
      target_entry_id: files-read-file
      local_basis: not-observed-after-refresh
    related_node_ids: [DeregistrationActivity, RegistryEntry]
    related_relation_ids: [DeregistrationActivity-is_a-RegistryActivity, RegistryEntry-was_generated_by-RegistryActivity]

    source_claims: [moonweave-deregistration-activity-profile, mcp-tools-list-for-deregistration]
  - id: deregistration-activity-counterexample-delete-server-tool

    labels:
      zh: 本地注销被误作服务器删除
      en: Local deregistration misused as server deletion
      ja: ローカル deregistration を server deletion と誤用する例

    descriptions:
      zh: 反例：ToolBench 注册未验证 RapidAPI key 的 endpoint；Gorilla registry 混入 hallucinated API 无 retriever 校验；Semantic Kernel plugin 名冲突未检测。
      en: Counterexample: ToolBench registers RapidAPI endpoint without key verification; Gorilla registry includes hallucinated API without retriever validation; Semantic Kernel plugin name collision undetected.
      ja: 反例：ToolBench が RapidAPI key 未検証 endpoint を登録。Gorilla registry に retriever 未検証 hallucinated API 混入。
    field_values:
      target_entry_id: files-read-file
    related_node_ids: [DeregistrationActivity]
    related_relation_ids: [DeregistrationActivity-is_a-RegistryActivity, RegistryEntry-was_generated_by-RegistryActivity]

    source_claims: [mcp-tools-list-for-deregistration, moonweave-deregistration-activity-profile]
  - id: deregistration-activity-boundary-policy-and-protocol

    labels:
      zh: 本地策略与协议状态边界
      en: Boundary between local policy and protocol state
      ja: ローカル policy と protocol state の境界

    descriptions:
      zh: Gorilla 离线 APIBench 索引 vs ToolBench 在线 RapidAPI catalog vs Semantic Kernel 本地 plugin 注册的持久化边界。
      en: Persistence boundary among Gorilla offline APIBench index, ToolBench online RapidAPI catalog, Semantic Kernel local plugin registration.
      ja: Gorilla offline APIBench index、ToolBench online RapidAPI catalog、Semantic Kernel ローカル plugin 登録の永続化境界。
    field_values:
      local_basis: policy-risk-v2
    related_node_ids: [DeregistrationActivity, ToolDefinition]
    related_relation_ids: [DeregistrationActivity-is_a-RegistryActivity, RegistryEntry-was_generated_by-RegistryActivity]

    source_claims: [moonweave-deregistration-activity-profile]
  - id: deregistration-activity-instance-function-replacement

    labels:
      zh: 函数工具替代实例
      en: Function-tool replacement instance
      ja: function-tool replacement instance

    descriptions:
      zh: ToolBench registry 实例：tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}；Semantic Kernel WeatherPlugin.get_weather(city:str) 注册实例。
      en: ToolBench registry instance: tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}; Semantic Kernel WeatherPlugin.get_weather(city:str) registration instance.
      ja: ToolBench registry 実例：tool_id=rapidapi-weather-api endpoint=/forecast。Semantic Kernel WeatherPlugin.get_weather(city:str) 登録実例。
    field_values:
      activity_id: deregister-support-get-customer-20260719
      registry_ref: registry://support
      target_entry_id: support-get-customer
      replacement_entry_ref: support-get-customer-v2
    related_node_ids: [DeregistrationActivity, FunctionTool]
    related_relation_ids: [DeregistrationActivity-is_a-RegistryActivity, RegistryEntry-was_generated_by-RegistryActivity]

    source_claims: [moonweave-deregistration-activity-profile]
parent_relation:
  id: DeregistrationActivity-is_a-RegistryActivity
  predicate: is_a
  target: concept:RegistryActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是本地注册治理活动的一种
    en: is a kind of local registration-governance activity
    ja: ローカル登録ガバナンス activity の一種である
  definition:
    zh: DeregistrationActivity 是以停用或移除本地工具引用为目的的 RegistryActivity。
    en: DeregistrationActivity is a RegistryActivity whose purpose is retiring or removing a local tool reference.
    ja: DeregistrationActivity はローカル tool reference を retirement または remove することを目的とする RegistryActivity である。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 具有子类型
      en: has subtype
      ja: subtype を持つ
  conditions: []
  temporal_scope: event
  boundary_context: This subtype is local and does not define deletion or deprecation in MCP.
  constraints:
    - id: deregistration-subtype-is-local
      severity: error
      expression_language: plain
      expression: DeregistrationActivity is a Moonweave local subtype and must not be represented as an MCP Tool deletion operation.
      explanation:
        zh: 本地注销语义不会向 MCP 增加删除 Tool 的方法。
        en: Local deregistration semantics do not add a Tool-deletion method to MCP.
        ja: ローカル deregistration semantics は MCP に Tool-deletion method を追加しない。
      source_claims: [moonweave-deregistration-activity-taxonomy]
  examples: []
  source_claims: [moonweave-deregistration-activity-taxonomy]
  distinct_fact_rationale:
    zh: 该子类按本地移除目的分类，而不是协议操作。
    en: This subtype is classified by local removal purpose, not a protocol operation.
    ja: この subtype は protocol operation ではなくローカル removal purpose により分類される。
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification — Tools
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    version: 2025-11-25
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Defines tools/list and Tool discovery, not client deletion of server Tools.
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: design-inference
    relevance: Defines local DeregistrationActivity profile and taxonomy.
source_claims:
  - id: mcp-tools-list-for-deregistration
    source: mcp-tools-2025-11-25
    supports: MCP clients discover currently available Tool records with tools/list and receive optional list-change notifications; the tools section defines no client Tool-deletion request.
    locator: "Listing Tools; List Changed Notification"
    evidence_kind: normative
    confidence: high
  - id: moonweave-deregistration-activity-profile
    source: moonweave-ontology-design
    supports: DeregistrationActivity is a Moonweave local activity that uses its inherited registry reference and generates an immutable retirement or replacement RegistryEntry version rather than mutating a local tool-reference entry in place.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
  - id: moonweave-deregistration-activity-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave classifies DeregistrationActivity as a subtype of RegistryActivity for local navigation.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
