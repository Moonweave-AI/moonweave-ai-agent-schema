schema: moonweave.ai/ontology-node/v1
id: LocalRuntimeTool
kind: concept
labels:
  zh: 本地运行时工具类别 profile
  en: Local-runtime tool category profile
  ja: local-runtime tool category profile
semantics:
  short_definition:
    zh: 对由应用或其配置执行环境完成实际工作的本地 Tool profile 的 Moonweave 分类。
    en: A Moonweave classification for a local Tool profile whose actual work is performed by an application or its configured execution environment.
    ja: application またはその configured execution environment が実作業を行うローカル Tool profile の Moonweave classification。
  definition:
    zh: >
      LocalRuntimeTool 是为兼容既有 ID 保留的 Moonweave 本地类别 profile。它记录工具由应用进程或
      已配置的本地执行环境实现，而不是由模型响应本身执行。Agents SDK 文档将 ComputerTool、
      ApplyPatchTool 和 ShellTool 等放在 local/runtime execution 的讨论中，但 LocalRuntimeTool
      不是 SDK 类、MCP Tool 记录或通用的安全许可。
    en: >
      LocalRuntimeTool is a Moonweave local category profile retained for compatibility. It records
      that an application process or configured local execution environment performs tool work rather
      than the model response itself. Agents SDK documentation discusses ComputerTool, ApplyPatchTool,
      and ShellTool under local/runtime execution, but LocalRuntimeTool is not an SDK class, an MCP
      Tool record, or a universal security grant.
    ja: >
      LocalRuntimeTool は compatibility のために保持する Moonweave ローカル category profile である。
      model response 自体ではなく application process または configured local execution environment が
      tool work を行うことを記録する。Agents SDK documentation は ComputerTool、ApplyPatchTool、
      ShellTool などを local/runtime execution で説明するが、LocalRuntimeTool は SDK class、MCP Tool
      record、または universal security grant ではない。
  why_needed:
    zh: 本地编排器可识别实现责任在自身环境中的工具，同时不把分类误作执行授权或统一协议。
    en: A local orchestrator can identify tools whose implementation responsibility stays in its environment without mistaking the classification for execution authorization or a unified protocol.
    ja: ローカル orchestrator は implementation responsibility が自身の environment にある tool を識別でき、classification を execution authorization や unified protocol と誤認しない。
  includes:
    - zh: 工具引用、实现引用、执行边界和来源运行时。
      en: A tool reference, implementation reference, execution boundary, and source runtime.
      ja: tool reference、implementation reference、execution boundary、source runtime。
    - zh: 对 ComputerTool、FunctionTool 或本地 ShellTool 等具体实现的本地分类。
      en: Local classification of concrete implementations such as ComputerTool, FunctionTool, or local ShellTool.
      ja: ComputerTool、FunctionTool、または local ShellTool など concrete implementation のローカル classification。
  excludes:
    - zh: 模型自行完成的响应内容、远程 MCP server 配置或托管容器运行结论。
      en: Model-produced response content, remote MCP server configuration, or a conclusion that a container is hosted.
      ja: model-produced response content、remote MCP server configuration、または container が hosted であるという結論。
    - zh: 任意本地工具均可执行、可信或无需人工审批的断言。
      en: An assertion that any local tool is executable, trusted, or free of human approval.
      ja: 任意の local tool が executable、trusted、または human approval 不要であるという assertion。
  semantic_kind: local-profile
  aliases:
    - language: en
      value: application-executed tool category
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      tool_ref 指向具体工具，implementation_ref 指向应用提供的执行器或函数，execution_boundary
      表示本地责任边界。该 profile 只帮助本地选择和审计；每次调用仍须按 SDK 配置、输入契约、
      沙箱和审批规则验证。
    en: >
      tool_ref points to a concrete tool, implementation_ref points to an application-provided
      executor or function, and execution_boundary states the local responsibility boundary. This
      profile only helps local selection and audit; each call still requires SDK configuration,
      input-contract, sandbox, and approval validation.
    ja: >
      tool_ref は concrete tool を指し、implementation_ref は application-provided executor または
      function を指し、execution_boundary はローカル responsibility boundary を示す。この profile は
      local selection と audit を助けるだけである。各 call は SDK configuration、input contract、
      sandbox、approval validation を引き続き必要とする。
  typical_input:
    - description:
        zh: 对本地 ComputerTool 实现的分类记录。
        en: A classification record for a local ComputerTool implementation.
        ja: ローカル ComputerTool implementation の classification record。
      format: |
        {"tool_ref":"browser-computer","implementation_ref":"python://automation/PlaywrightComputer","execution_boundary":"application-environment","source_runtime":"OpenAI-Agents-SDK"}
      source_claims: [agents-sdk-local-runtime-tools, moonweave-local-runtime-tool-profile]
  typical_output:
    - description:
        zh: 供本地选择器审计的执行边界信息。
        en: Execution-boundary information auditable by a local selector.
        ja: ローカル selector が audit できる execution-boundary information。
      format: |
        {"tool_ref":"browser-computer","execution_boundary":"application-environment","implementation_kind":"computer-harness"}
      source_claims: [moonweave-local-runtime-tool-profile]
  reference_implementations:
    - name: OpenAI Agents SDK Tools
      url: https://openai.github.io/openai-agents-python/tools/
      description: Documents local/runtime execution tools and the application-provided implementations they require.
structure:
  identity_keys: [tool_ref, execution_boundary]
  fields:
    - id: tool_ref
      labels:
        zh: 工具引用
        en: Tool reference
        ja: tool reference
      definitions:
        zh: 指向被本地运行时类别组织的具体 Tool profile。
        en: Points to the concrete Tool profile organized by this local-runtime category.
        ja: この local-runtime category が整理する concrete Tool profile を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: browser-computer
      allowed_values: []
      source_claims: [moonweave-local-runtime-tool-profile]
    - id: implementation_ref
      labels:
        zh: 实现引用
        en: Implementation reference
        ja: implementation reference
      definitions:
        zh: 指向应用或本地环境实际提供的执行器、函数或接口实现。
        en: Points to the executor, function, or interface implementation actually provided by the application or local environment.
        ja: application または local environment が実際に提供する executor、function、または interface implementation を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: python://automation/PlaywrightComputer
      allowed_values: []
      source_claims: [agents-sdk-local-runtime-tools, moonweave-local-runtime-tool-profile]
    - id: execution_boundary
      labels:
        zh: 执行边界
        en: Execution boundary
        ja: execution boundary
      definitions:
        zh: 说明实际工作由应用或其本地配置环境承担的本地分类值。
        en: States the local classification that the application or its locally configured environment performs the actual work.
        ja: application またはそのローカル configured environment が実作業を行うことを示すローカル classification value。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: application-environment
      allowed_values: [application-environment, local-sandbox]
      source_claims: [moonweave-local-runtime-tool-profile]
    - id: implementation_kind
      labels:
        zh: 实现种类
        en: Implementation kind
        ja: implementation kind
      definitions:
        zh: 说明具体本地实现是计算机接口、函数调用器、shell 执行器或其他执行器。
        en: States whether the concrete local implementation is a computer interface, function invoker, shell executor, or another executor.
        ja: concrete local implementation が computer interface、function invoker、shell executor、または別の executor のどれかを示す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: computer-harness
      allowed_values: [computer-harness, function-invoker, shell-executor, patch-editor, other]
      source_claims: [agents-sdk-local-runtime-tools, moonweave-local-runtime-tool-profile]
    - id: source_runtime
      labels:
        zh: 来源运行时
        en: Source runtime
        ja: source runtime
      definitions:
        zh: 标识定义具体工具行为的 SDK、应用框架或本地运行时。
        en: Identifies the SDK, application framework, or local runtime that defines concrete tool behavior.
        ja: concrete tool behavior を定義する SDK、application framework、または local runtime を識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: OpenAI-Agents-SDK
      allowed_values: []
      source_claims: [moonweave-local-runtime-tool-profile]
  constraints:
    - id: local-runtime-tool-needs-implementation
      severity: error
      expression_language: plain
      expression: LocalRuntimeTool must identify a tool_ref, implementation_ref, execution_boundary, and source_runtime and cannot be used as a universal authorization or protocol capability claim.
      explanation:
        zh: 本地实现责任不等于调用已获批准或某协议已协商能力。
        en: Local implementation responsibility does not mean a call is approved or a protocol capability is negotiated.
        ja: ローカル implementation responsibility は call が approved されたことや protocol capability が交渉済みであることを意味しない。
      source_claims: [moonweave-local-runtime-tool-profile]
  required_relations: []
examples:
  - id: local-runtime-tool-positive-computer-harness

    labels:
      zh: 浏览器计算机本地实现
      en: Browser computer local implementation
      ja: browser computer local implementation

    descriptions:
      zh: Gorilla APIBench 1645 API 注册（HuggingFace/TorchHub/TensorHub）；ToolBench 16000+ RapidAPI 工具注册表；Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") 插件注册。
      en: Gorilla APIBench registers 1645 APIs (HuggingFace/TorchHub/TensorHub); ToolBench 16000+ RapidAPI tool registry; Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") plugin registration.
      ja: Gorilla APIBench が 1645 API を登録。ToolBench 16000+ RapidAPI tool registry。Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") プラグイン登録。
    field_values:
      tool_ref: browser-computer
      implementation_ref: python://automation/PlaywrightComputer
      execution_boundary: application-environment
      implementation_kind: computer-harness
      source_runtime: OpenAI-Agents-SDK
    related_node_ids: [LocalRuntimeTool, Tool]
    related_relation_ids: [LocalRuntimeTool-describes-Tool]

    source_claims: [agents-sdk-local-runtime-tools, moonweave-local-runtime-tool-profile]
  - id: local-runtime-tool-counterexample-model-execution

    labels:
      zh: 将模型响应当作本地执行器
      en: Model response treated as local executor
      ja: model response を local executor として扱う例

    descriptions:
      zh: 反例：ToolBench 注册未验证 RapidAPI key 的 endpoint；Gorilla registry 混入 hallucinated API 无 retriever 校验；Semantic Kernel plugin 名冲突未检测。
      en: Counterexample: ToolBench registers RapidAPI endpoint without key verification; Gorilla registry includes hallucinated API without retriever validation; Semantic Kernel plugin name collision undetected.
      ja: 反例：ToolBench が RapidAPI key 未検証 endpoint を登録。Gorilla registry に retriever 未検証 hallucinated API 混入。
    field_values:
      tool_ref: maintenance-shell
      execution_boundary: application-environment
      implementation_ref: model-output://suggested-command
      implementation_kind: shell-executor
      source_runtime: model-output-only
    related_node_ids: [LocalRuntimeTool, Tool]
    related_relation_ids: [LocalRuntimeTool-describes-Tool]

    source_claims: [moonweave-local-runtime-tool-profile]
  - id: local-runtime-tool-boundary-local-and-hosted-shell

    labels:
      zh: 本地与托管 shell 边界
      en: Boundary between local and hosted shell
      ja: local と hosted shell の境界

    descriptions:
      zh: Gorilla 离线 APIBench 索引 vs ToolBench 在线 RapidAPI catalog vs Semantic Kernel 本地 plugin 注册的持久化边界。
      en: Persistence boundary among Gorilla offline APIBench index, ToolBench online RapidAPI catalog, Semantic Kernel local plugin registration.
      ja: Gorilla offline APIBench index、ToolBench online RapidAPI catalog、Semantic Kernel ローカル plugin 登録の永続化境界。
    field_values:
      tool_ref: maintenance-shell
      implementation_ref: application://maintenance/shell
      execution_boundary: application-environment
      implementation_kind: shell-executor
      source_runtime: OpenAI-Agents-SDK
    related_node_ids: [LocalRuntimeTool, Tool]
    related_relation_ids: [LocalRuntimeTool-describes-Tool]

    source_claims: [agents-sdk-local-runtime-tools, moonweave-local-runtime-tool-profile]
  - id: local-runtime-tool-instance-function-executor

    labels:
      zh: 本地库存函数执行器实例
      en: Local inventory-function executor instance
      ja: local inventory-function executor instance

    descriptions:
      zh: "ToolBench registry 实例：tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}；Semantic Kernel WeatherPlugin.get_weather(city:str) 注册实例。"
      en: "ToolBench registry instance: tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}; Semantic Kernel WeatherPlugin.get_weather(city:str) registration instance."
      ja: ToolBench registry 実例：tool_id=rapidapi-weather-api endpoint=/forecast。Semantic Kernel WeatherPlugin.get_weather(city:str) 登録実例。
    field_values:
      tool_ref: inventory-lookup
      implementation_ref: application://inventory/lookup
      execution_boundary: application-environment
      implementation_kind: function-invoker
      source_runtime: OpenAI-Agents-SDK
    related_node_ids: [LocalRuntimeTool, Tool]
    related_relation_ids: [LocalRuntimeTool-describes-Tool]

    source_claims: [moonweave-local-runtime-tool-profile]
parent_relation: null
