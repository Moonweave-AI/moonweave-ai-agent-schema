schema: moonweave.ai/ontology-node/v1
id: HostedContainerShellConfiguration
kind: concept
labels:
  zh: 托管容器 Shell 配置 profile
  en: Hosted-container Shell configuration profile
  ja: hosted-container Shell 設定 profile
semantics:
  short_definition:
    zh: 将 ShellTool 的托管容器模式组织到本地目录中的 Moonweave 兼容 profile。
    en: A Moonweave compatibility profile that organizes a ShellTool hosted-container mode in a local catalog.
    ja: ShellTool の hosted-container mode をローカル catalog に整理する Moonweave compatibility profile。
  definition:
    zh: >
      HostedContainerShellConfiguration 是 Moonweave 的本地配置 profile，用于记录当前 Agents SDK ShellTool 的托管容器环境，而不是一个 SDK 类名。
      当前 SDK 使用 ShellTool(environment={"type":"container_auto"}) 或
      ShellTool(environment={"type":"container_reference","container_id":...}) 表达托管 shell。
      本 profile 记录该实际配置的本地分类和容器边界，不是 MCP Tool、远程 shell 协议或权限许可。
    en: >
      HostedContainerShellConfiguration is a Moonweave local configuration profile for the current
      Agents SDK ShellTool hosted-container environment. The SDK expresses hosted shell with
      ShellTool(environment={"type":"container_auto"}) or
      ShellTool(environment={"type":"container_reference","container_id":...}). This profile records
      local classification and container boundary for that concrete configuration; it is not an MCP
      Tool, a remote-shell protocol, or a permission grant.
    ja: >
      HostedContainerShellConfiguration は、現在の Agents SDK ShellTool の hosted-container environment を記録する Moonweave ローカル configuration profile であり、SDK class 名ではない。SDK は
      ShellTool(environment={"type":"container_auto"}) または
      ShellTool(environment={"type":"container_reference","container_id":...}) で hosted shell を表す。
      この profile は concrete configuration のローカル classification と container boundary を記録する。
      MCP Tool、remote-shell protocol、permission grant ではない。
  why_needed:
    zh: 既有目录可保留托管 shell ID，同时明确它只是对当前 ShellTool 容器配置的本地映射。
    en: A named configuration record keeps hosted-container settings inspectable without inventing an SDK class or confusing this configuration with the ShellTool runtime binding it describes.
    ja: 既存 catalog は hosted-shell ID を保持しつつ、それが current ShellTool container configuration のローカル mapping に過ぎないことを明確にできる。
  includes:
    - zh: ShellTool 引用、容器环境类型、可选容器引用、网络策略和技能引用。
      en: A ShellTool reference, container environment type, optional container reference, network policy, and skill reference.
      ja: ShellTool reference、container environment type、任意の container reference、network policy、skill reference。
    - zh: 对 container_auto 和 container_reference 两种托管容器模式的本地分类。
      en: Local classification of container_auto and container_reference hosted-container modes.
      ja: container_auto と container_reference hosted-container mode のローカル classification。
  excludes:
    - zh: 一个新的 SDK HostedShellTool 类、MCP 服务端工具或本地 executor 注册。
      en: A new SDK HostedShellTool class, an MCP server tool, or local executor registration.
      ja: 新しい SDK HostedShellTool class、MCP server tool、または local executor registration。
    - zh: 直接保存命令、容器密钥或任何网络域秘密。
      en: Direct storage of commands, container credentials, or any network-domain secret.
      ja: command、container credential、または network-domain secret の直接保存。
  semantic_kind: local-profile
  aliases:
    - language: en
      value: HostedShellTool
      alias_kind: legacy
    - language: en
      value: ShellTool hosted-container mapping
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      shell_tool_ref 指向实际 ShellTool，environment_type 必须是 container_auto 或
      container_reference。container_ref 仅在重用容器时出现，network_policy 与 skills_ref 记录
      允许的托管环境设置。此 profile 不设置 executor、needs_approval 或 on_approval，也不保存秘密。
    en: >
      shell_tool_ref points to the actual ShellTool and environment_type must be container_auto or
      container_reference. container_ref appears only when reusing a container, while network_policy
      and skills_ref record permitted hosted-environment settings. This profile sets no executor,
      needs_approval, or on_approval and stores no secrets.
    ja: >
      shell_tool_ref は実際の ShellTool を指し、environment_type は container_auto または
      container_reference でなければならない。container_ref は container を再利用する場合だけに現れ、
      network_policy と skills_ref は許可された hosted-environment setting を記録する。この profile は
      executor、needs_approval、on_approval を設定せず、secret も保存しない。
  typical_input:
    - description:
        zh: 禁用网络的自动托管容器 shell 配置。
        en: An automatic hosted-container shell configuration with network disabled.
        ja: network を無効化した automatic hosted-container shell configuration。
      format: |
        {"shell_tool_ref":"analysis-shell","environment_type":"container_auto","network_policy":"disabled","skills_ref":"skill://csv-analysis/v1"}
      source_claims: [agents-sdk-hosted-shell-configuration, moonweave-hosted-shell-profile]
  typical_output:
    - description:
        zh: 供本地审计使用的托管容器边界记录。
        en: A hosted-container boundary record used by local audit.
        ja: local audit で使う hosted-container boundary record。
      format: |
        {"shell_tool_ref":"analysis-shell","execution_boundary":"responses-hosted-container","environment_type":"container_auto"}
      source_claims: [moonweave-hosted-shell-profile]
  reference_implementations:
    - name: OpenAI Agents SDK Hosted container shell
      url: https://openai.github.io/openai-agents-python/tools/
      description: Documents hosted ShellTool environments through container_auto and container_reference configuration.
structure:
  identity_keys: [shell_tool_ref, environment_type]
  fields:
    - id: shell_tool_ref
      labels:
        zh: ShellTool 引用
        en: ShellTool reference
        ja: ShellTool reference
      definitions:
        zh: 指向实际使用托管容器环境的官方 SDK ShellTool。
        en: Points to the official SDK ShellTool that uses a hosted-container environment.
        ja: hosted-container environment を使う公式 SDK ShellTool を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: analysis-shell
      allowed_values: []
      source_claims: [moonweave-hosted-shell-profile]
    - id: environment_type
      labels:
        zh: 容器环境类型
        en: Container environment type
        ja: container environment type
      definitions:
        zh: SDK ShellTool 的托管容器类型，只能是 container_auto 或 container_reference。
        en: The hosted-container type for SDK ShellTool and restricted to container_auto or container_reference.
        ja: SDK ShellTool の hosted-container type。container_auto または container_reference に限定される。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: container_auto
      allowed_values: [container_auto, container_reference]
      source_claims: [agents-sdk-hosted-shell-configuration]
    - id: container_ref
      labels:
        zh: 容器引用
        en: Container reference
        ja: container reference
      definitions:
        zh: 对应 container_reference 模式中重用的既有容器标识。
        en: Identifies the existing container reused by container_reference mode.
        ja: container_reference mode が再利用する既存 container を識別する。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: cntr_example
      allowed_values: []
      source_claims: [agents-sdk-hosted-shell-configuration]
    - id: network_policy
      labels:
        zh: 网络策略
        en: Network policy
        ja: network policy
      definitions:
        zh: 托管容器的网络策略模式，例如 disabled 或 allowlist。
        en: The hosted-container network-policy mode, such as disabled or allowlist.
        ja: disabled または allowlist など hosted-container network-policy mode。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: disabled
      allowed_values: [disabled, allowlist]
      source_claims: [agents-sdk-hosted-shell-configuration]
    - id: skills_ref
      labels:
        zh: 技能引用
        en: Skill reference
        ja: skill reference
      definitions:
        zh: 可选地引用挂载到托管 ShellTool 环境的技能或内联技能包。
        en: Optionally references skills or inline skill bundles mounted into the hosted ShellTool environment.
        ja: hosted ShellTool environment に mount する skill または inline skill bundle を任意で参照する。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: null
      pattern: null
      example_value: skill://csv-analysis/v1
      allowed_values: []
      source_claims: [agents-sdk-hosted-shell-configuration]
  constraints:
    - id: hosted-shell-profile-needs-container-mode
      severity: error
      expression_language: plain
      expression: HostedContainerShellConfiguration must reference a ShellTool configured with container_auto or container_reference and cannot include a local executor or secret material.
      explanation:
        zh: 托管 shell 是 ShellTool 容器配置的本地映射，不能混入本地执行器或秘密。
        en: Hosted shell is a local mapping of ShellTool container configuration and cannot mix in a local executor or secrets.
        ja: hosted shell は ShellTool container configuration のローカル mapping であり、local executor や secret を混在できない。
      source_claims: [agents-sdk-hosted-shell-configuration, moonweave-hosted-shell-profile]
  required_relations: []
examples:
  - id: hosted-shell-positive-auto-container

    labels:
      zh: 自动托管容器 shell
      en: Automatic hosted-container shell
      ja: automatic hosted-container shell

    descriptions:
      zh: OpenAI Hosted tools:[{type:"code_interpreter"}] 托管沙箱；Anthropic tools:[{name:"get_weather",input_schema:{type:"object",properties:{location:{type:"string"}}}] 托管 schema 验证。
      en: OpenAI Hosted tools:[{type:"code_interpreter"}] managed sandbox; Anthropic tools:[{name:"get_weather",input_schema:{type:"object",properties:{location:{type:"string"}}}] managed schema validation.
      ja: OpenAI Hosted tools:[{type:"code_interpreter"}] マネージド sandbox。Anthropic tools input_schema マネージド検証。
    field_values:
      shell_tool_ref: analysis-shell
      environment_type: container_auto
      network_policy: disabled
    related_node_ids: [HostedContainerShellConfiguration, ShellTool]
    related_relation_ids: [HostedContainerShellConfiguration-describes-ShellTool]

    source_claims: [agents-sdk-hosted-shell-configuration, moonweave-hosted-shell-profile]
  - id: hosted-shell-counterexample-invented-sdk-class

    labels:
      zh: 虚构 HostedShellTool SDK 类
      en: Invented HostedShellTool SDK class
      ja: 架空の HostedShellTool SDK class

    descriptions:
      zh: 反例：HostedMCPTool 未配置 server_url 就注册；HostedContainerShell 无 resource limits 配置。
      en: Counterexample: HostedMCPTool registered without server_url; HostedContainerShell without resource limits.
      ja: 反例：HostedMCPTool server_url 未設定で登録。HostedContainerShell resource limits 未設定。
    field_values:
      environment_type: container_auto
      shell_tool_ref: analysis-shell
    related_node_ids: [HostedContainerShellConfiguration, ShellTool]
    related_relation_ids: [HostedContainerShellConfiguration-describes-ShellTool]

    source_claims: [agents-sdk-hosted-shell-configuration, moonweave-hosted-shell-profile]
  - id: hosted-shell-boundary-container-lifecycle

    labels:
      zh: 自动与复用容器生命周期边界
      en: Boundary between automatic and reused container lifecycle
      ja: automatic と reused container lifecycle の境界

    descriptions:
      zh: OpenAI 托管 Code Interpreter vs Anthropic 托管 tool_use vs 本地 LocalRuntimeTool 的执行环境边界。
      en: Execution environment boundary among OpenAI hosted Code Interpreter, Anthropic hosted tool_use, local LocalRuntimeTool.
      ja: OpenAI マネージド Code Interpreter、Anthropic マネージド tool_use、ローカル LocalRuntimeTool の実行環境境界。
    field_values:
      environment_type: container_reference
      container_ref: cntr_example
    related_node_ids: [HostedContainerShellConfiguration, ShellTool]
    related_relation_ids: [HostedContainerShellConfiguration-describes-ShellTool]

    source_claims: [agents-sdk-hosted-shell-configuration]
  - id: hosted-shell-instance-csv-analysis

    labels:
      zh: CSV 分析托管 shell 实例
      en: CSV-analysis hosted-shell instance
      ja: CSV-analysis hosted-shell instance

    descriptions:
      zh: OpenAI Assistants hosted code_interpreter 实例：thread 内执行 matplotlib 生成 chart PNG；Anthropic hosted get_weather 实例 input={location:"Tokyo"}。
      en: OpenAI Assistants hosted code_interpreter instance: matplotlib chart PNG in thread; Anthropic hosted get_weather instance input={location:"Tokyo"}.
      ja: OpenAI Assistants hosted code_interpreter 実例：matplotlib chart PNG。Anthropic hosted get_weather input={location:"Tokyo"}。
    field_values:
      shell_tool_ref: csv-analysis-shell
      environment_type: container_auto
      skills_ref: skill://csv-analysis/v1
      network_policy: disabled
    related_node_ids: [HostedContainerShellConfiguration, ShellTool]
    related_relation_ids: [HostedContainerShellConfiguration-describes-ShellTool]

    source_claims: [agents-sdk-hosted-shell-configuration, moonweave-hosted-shell-profile]
