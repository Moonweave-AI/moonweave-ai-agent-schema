schema: moonweave.ai/ontology-node/v1
id: CapabilitySurface
kind: concept
status: review
labels:
  zh: 能力表面
  en: Capability Surface
  ja: 能力公開面
semantics:
  short_definition:
    zh: 能力表面是面向特定受众发布的能力描述符集合。
    en: A Capability Surface is a set of capability descriptors published to a particular audience.
    ja: 能力公開面は特定受け手へ公開される能力記述子集合です。
  definition:
    zh: 能力表面是一种 CapabilityCatalog，复用 catalog_id，并由受众、环境与发布版本界定模型或客户端可浏览的描述符集合；它从更大注册表投影成员，但自身不执行搜索。
    en: A Capability Surface is a CapabilityCatalog that reuses catalog_id and scopes a browsable descriptor collection by audience, environment, and publication version. It projects members from a larger registry but does not itself perform search.
    ja: Capability Surface は catalog_id を再利用し、audience、environment、publication version で browsable descriptor collection を限定する CapabilityCatalog です。大きな registry から member を projection しますが search は実行しません。
  why_needed:
    zh: 把发布表面建模为集合，可以清楚区分目录全量、可见子集和查询时临时加载的候选。
    en: Modeling publication as a collection separates the full catalog, the visible subset, and candidates loaded for one query.
    ja: 公開面を集合として表すことで、全目録・可視 subset・一回の query candidate を区別できます。
  includes:
    - zh: 纳入有稳定版本、明确受众并保存发布成员关系的描述符集合。
      en: Includes versioned descriptor collections with a defined audience and persistent publication membership.
      ja: 安定版、明確な受け手、公開所属関係を持つ記述子集合を含みます。
  excludes:
    - zh: 排除一次查询返回的候选列表、目录注册表和模型上下文中已加载的临时工具集。
      en: Excludes one query's candidate list, the registration catalog, and a transient set loaded into model context.
      ja: 一回の query candidate list、登録目録、model context へ一時 load された集合を除きます。
  semantic_kind: collection
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: audience
      labels:
        zh: 发布受众
        en: publication audience
        ja: 公開対象
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 发布受众作为 CapabilitySurface 节点内部信息保存，不建立同名图节点。
        en: publication audience is stored as information on the CapabilitySurface node and does not create a namesake graph node.
        ja: 公開対象は CapabilitySurface node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: trusted-production-models
      source_claims:
        - claim-capability-surface-003
        - claim-capability-surface-004
    - id: publication_version
      labels:
        zh: 发布版本
        en: publication version
        ja: 公開版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 发布版本作为 CapabilitySurface 节点内部信息保存，不建立同名图节点。
        en: publication version is stored as information on the CapabilitySurface node and does not create a namesake graph node.
        ja: 公開版は CapabilitySurface node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: "42"
      source_claims:
        - claim-capability-surface-005
        - claim-capability-surface-006
  constraints: []
  required_relation_constraints: []
examples:
  - id: CapabilitySurface-example-positive-manual-001
    kind: positive
    labels:
      zh: CapabilitySurface 正例
      en: CapabilitySurface positive case
      ja: CapabilitySurface 正例
    scenario_id: null
    descriptions:
      zh: 生产助手表面版本 42 向受信模型发布二十个经过审查的描述符。
      en: Production assistant surface version 42 publishes twenty reviewed descriptors to trusted models.
      ja: 本番 assistant surface 版 42 が信頼 model に二十記述子を公開します。
    field_values:
      catalog_id: catalog:enterprise-capabilities
      governance_scope: enterprise-production
      membership_policy:
        admission: reviewed
        descriptor_limit: 20
      audience: trusted-production-models
      publication_version: "42"
    related_node_ids:
      - CapabilitySurface
      - CapabilityCatalog
    related_relation_ids:
      - CapabilitySurface-is_a-CapabilityCatalog
    expected_result:
      zh: 该集合归能力表面，并通过 contains 保存成员。
      en: The collection is a CapabilitySurface whose membership is recorded with contains.
      ja: 集合を能力公開面とし contains で所属を記録します。
    why_valid_or_invalid:
      zh: 稳定表面版本和受众共同决定集合身份。
      en: Its stable surface version and audience jointly determine collection identity.
      ja: 安定 surface 版と受け手が集合 identity を決めるためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-capability-surface-007
      - claim-capability-surface-008
  - id: CapabilitySurface-example-boundary-manual-001
    kind: boundary
    labels:
      zh: CapabilitySurface 边界例
      en: CapabilitySurface boundary case
      ja: CapabilitySurface 境界例
    scenario_id: null
    descriptions:
      zh: 用户提问后，工具搜索只加载其中三个描述符。
      en: After a user query, tool search loads only three of those descriptors.
      ja: user query 後 tool search が三記述子だけを load します。
    field_values: {}
    related_node_ids:
      - CapabilitySurface
      - CapabilityCatalog
    related_relation_ids:
      - CapabilitySurface-is_a-CapabilityCatalog
    expected_result:
      zh: 三个候选属于发现活动，不形成新的能力表面。
      en: The three candidates belong to discovery and do not form a new CapabilitySurface.
      ja: 三 candidate は発見活動に属し新 surface を作りません。
    why_valid_or_invalid:
      zh: 候选集合依赖当前查询且没有独立发布版本。
      en: The candidate set depends on the current query and has no independent publication version.
      ja: candidate 集合は current query に依存し独立公開版がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-capability-surface-009
      - claim-capability-surface-010
