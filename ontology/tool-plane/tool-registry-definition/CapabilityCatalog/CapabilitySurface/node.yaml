schema: moonweave.ai/ontology-node/v1
id: CapabilitySurface
kind: concept
labels:
  zh: 能力发布表面 profile
  en: Capability publication surface profile
  ja: 能力公開 surface profile
semantics:
  short_definition:
    zh: 面向特定调用方发布本地能力引用子集的 Moonweave profile。
    en: A Moonweave profile that publishes a selected subset of local capability references to a specific caller.
    ja: 特定の caller にローカル capability reference の選択された部分集合を公開する Moonweave profile。
  definition:
    zh: >
      CapabilitySurface 是不可变的本地发布视图版本，用于说明某个 Agent、用户界面或集成可见的能力引用。它仅存在于其标识的 CapabilityCatalog 修订中，并由 RegistryPublicationActivity 生成；删除该本地目录修订只删除该视图 profile，不删除来源协议记录。它可由 MCP 列表
      响应、OpenAI tools 配置或本地策略生成，但不是 MCP capability negotiation 对象，也不是协议规定的访问控制
      机制；任何过滤或审批决定仍由相应运行时负责。
    en: >
      CapabilitySurface is an immutable local publication-view version that states which capability references are
      visible to an Agent, user interface, or integration. It exists only in its identified CapabilityCatalog revision and is generated by a RegistryPublicationActivity; deleting that local catalog revision deletes this view profile, not source protocol records. It may be derived from MCP list
      responses, OpenAI tools configuration, or local policy, but it is not an MCP capability-
      negotiation object or protocol-mandated access-control mechanism; the relevant runtime still
      owns filtering and approval decisions.
    ja: >
      CapabilitySurface は Agent、user interface、integration に見える capability reference を示す不変のローカル公開 view version
      である。識別した CapabilityCatalog revision 内でのみ存在し、RegistryPublicationActivity により生成される。ローカル catalog revision の削除はこの view profile だけを削除し source protocol record を削除しない。MCP list response、OpenAI tools configuration、ローカル policy から導出できるが、MCP capability-
      negotiation object や protocol が義務付ける access-control mechanism ではない。filtering と approval の
      決定は該当 runtime が担う。
  why_needed:
    zh: 同一目录可面向不同调用方提供不同的可见集合，而不改变原始能力定义。
    en: One catalog can present different visible sets to different callers without changing source capability definitions.
    ja: 一つの catalog は source capability definition を変更せず、異なる caller に異なる visible set を提示できる。
  includes:
    - zh: 面向调用方的能力引用集合与来源。
      en: A caller-facing set of capability references and their provenance.
      ja: caller-facing の capability reference 集合とその provenance。
    - zh: 本地选择规则的标识和审计信息。
      en: Identifiers and audit information for local selection rules.
      ja: ローカル selection rule の識別子と audit information。
  excludes:
    - zh: MCP initialize 中 server capabilities 对象。
      en: The server capabilities object in MCP initialize.
      ja: MCP initialize 内の server capabilities object。
    - zh: 实际授权决定或协议工具调用。
      en: An actual authorization decision or protocol tool invocation.
      ja: 実際の authorization decision または protocol tool invocation。
  semantic_kind: entity
  aliases:
    - language: en
      value: published capability view
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      实现可从 MCP 列表中取得候选项，再使用本地 allow-list 生成表面；也可直接把 OpenAI 函数工具配置投影为表面。
      该投影必须同时记录其输入快照、选择规则、目录修订和生成活动；任何变化生成新的 surface_revision，不得宣称 MCP 已协商该表面或该表面已经授予权限。
    en: >
      An implementation can obtain candidates from MCP lists and apply a local allow-list, or
      project configured OpenAI function tools directly. The projection must record its input
      snapshot, selection rule, catalog revision, and generating activity; any change generates a new surface_revision. It cannot claim MCP negotiated the surface or that the surface grants permission.
    ja: >
      implementation は MCP list から candidate を取得してローカル allow-list を適用でき、構成済み OpenAI function tool を
      直接 project することもできる。projection は input snapshot、selection rule、catalog revision、generating activity を記録し、変更は新しい surface_revision を生成する。MCP が surface を
      negotiation した、または surface が permission を与えたと主張できない。
  typical_input:
    - description:
        zh: 由 MCP tools/list 得到的候选工具集合。
        en: A candidate tool set obtained from MCP tools/list.
        ja: MCP tools/list から取得した candidate tool set。
      format: |
        {"tools":[{"name":"read_file"},{"name":"write_file"}]}
      source_claims: [mcp-tools-list-for-surface]
  typical_output:
    - description:
        zh: 仅向只读 Agent 发布 read_file 的本地表面。
        en: A local surface publishing only read_file to a read-only Agent.
        ja: read-only Agent に read_file だけを公開するローカル surface。
      format: |
        {"surface_id":"reader","surface_revision":"1","published_capability_ids":["read_file"],"selection_rule":"readonly-v1","publication_activity_ref":"act-publish-42"}
      source_claims: [moonweave-surface-profile]
  reference_implementations:
    - name: MCP Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines tool discovery and states that applications choose their user-interaction model.
    - name: OpenAI Agents SDK Tools
      url: https://openai.github.io/openai-agents-python/tools/
      description: Documents tool filtering and runtime configuration patterns.
structure:
  identity_keys: [surface_id, surface_revision]
  fields:
    - id: surface_id
      labels:
        zh: 发布表面标识符
        en: Publication surface identifier
        ja: 公開 surface 識別子
      definitions:
        zh: 标识一个本地可见能力集合。
        en: Identifies one local visible capability set.
        ja: 一つのローカル visible capability set を識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: reader
      allowed_values: []
      source_claims: [moonweave-surface-profile]
    - id: surface_revision
      labels:
        zh: 发布表面版本
        en: Publication surface version
        ja: publication surface version
      definitions:
        zh: 标识不可变发布视图版本；能力集合、规则或来源变化必须生成新版本。
        en: Identifies an immutable publication-view version; a change to the capability set, rule, or source must generate a new version.
        ja: 不変 publication-view version を識別する。capability set、rule、source の変更は新 version を生成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "1"
      allowed_values: []
      source_claims: [moonweave-surface-profile]
    - id: catalog_revision_ref
      labels:
        zh: 目录修订引用
        en: Catalog revision reference
        ja: catalog revision reference
      definitions:
        zh: 标识拥有该发布视图版本的 CapabilityCatalog 本地快照；视图离开该快照即无效，删除快照不删除来源协议记录。
        en: Identifies the CapabilityCatalog local snapshot owning this publication-view version; the view is invalid outside that snapshot, and deleting it does not delete source protocol records.
        ja: この publication-view version を所有する CapabilityCatalog ローカル snapshot を識別する。view はその snapshot 外では無効で、snapshot の削除は source protocol record を削除しない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: catalog:engineering@42
      allowed_values: []
      source_claims: [moonweave-surface-profile, moonweave-surface-taxonomy]
    - id: publication_activity_ref
      labels:
        zh: 发布活动引用
        en: Publication activity reference
        ja: publication activity reference
      definitions:
        zh: 标识生成此不可变视图版本的 RegistryPublicationActivity；它记录出处，不把活动纳入目录或视图的删除边界。
        en: Identifies the RegistryPublicationActivity that generated this immutable view version; it records provenance and does not put the activity inside the deletion boundary of the catalog or view.
        ja: この不変 view version を生成した RegistryPublicationActivity を識別する。provenance を記録し、activity を catalog または view の deletion boundary 内に置かない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: act-publish-42
      allowed_values: []
      source_claims: [moonweave-surface-profile, prov-entity-generated-by-activity]
    - id: published_capability_ids
      labels:
        zh: 已发布能力标识符
        en: Published capability identifiers
        ja: 公開 capability 識別子
      definitions:
        zh: 被本地不可变视图版本选择的能力引用标识符。
        en: Capability-reference identifiers selected by this local immutable view version.
        ja: このローカル不変 view version が選択した capability-reference identifier。
      datatype: array
      required: true
      cardinality:
        min: 0
        max: null
      pattern: null
      example_value: '["read_file"]'
      allowed_values: []
      source_claims: [moonweave-surface-profile]
    - id: selection_rule
      labels:
        zh: 选择规则
        en: Selection rule
        ja: 選択 rule
      definitions:
        zh: 产生该本地视图的版本化规则引用。
        en: A versioned rule reference used to produce the local view.
        ja: ローカル view を生成するための versioned rule reference。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: readonly-v1
      allowed_values: []
      source_claims: [moonweave-surface-profile]
    - id: source_snapshot
      labels:
        zh: 来源快照
        en: Source snapshot
        ja: source snapshot
      definitions:
        zh: 表面生成所依据的协议或应用配置快照。
        en: The protocol or application-configuration snapshot from which the surface was derived.
        ja: surface の導出元となった protocol または application-configuration snapshot。
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: '{"protocol":"MCP","method":"tools/list","retrieved_at":"2026-07-18T00:00:00Z"}'
      allowed_values: []
      source_claims: [moonweave-surface-profile]
  constraints:
    - id: surface-is-not-permission-grant
      severity: error
      expression_language: plain
      expression: A publication surface version must retain catalog_revision_ref and publication_activity_ref, may select visible references but does not itself grant protocol or runtime permission to invoke them, and must never be mutated in place.
      explanation:
        zh: 可见性与授权不同；执行时仍必须执行相应的审批和访问控制，且表面变化由新版本表达。
        en: Visibility differs from authorization; execution must still enforce its applicable approval and access control, and surface changes are represented by new versions.
        ja: visibility は authorization と異なり、execution では該当する approval と access control をなお強制しなければならない。surface change は新 version で表す。
      source_claims: [moonweave-surface-profile]
  required_relations: [CapabilitySurface-part_of-CapabilityCatalog, CapabilitySurface-was_generated_by-RegistryPublicationActivity]
examples:
  - id: capability-surface-positive-readonly

    labels:
      zh: 只读发布表面
      en: Read-only publication surface
      ja: read-only 公開 surface

    descriptions:
      zh: Gorilla APIBench 1645 API 注册（HuggingFace/TorchHub/TensorHub）；ToolBench 16000+ RapidAPI 工具注册表；Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") 插件注册。
      en: Gorilla APIBench registers 1645 APIs (HuggingFace/TorchHub/TensorHub); ToolBench 16000+ RapidAPI tool registry; Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") plugin registration.
      ja: Gorilla APIBench が 1645 API を登録。ToolBench 16000+ RapidAPI tool registry。Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") プラグイン登録。
    field_values:
      surface_revision: "1"
      catalog_revision_ref: catalog:engineering@42
      publication_activity_ref: act-publish-42
      surface_id: reader
      selection_rule: readonly-v1
    related_node_ids: [CapabilitySurface, CapabilityCatalog]
    related_relation_ids: [CapabilitySurface-part_of-CapabilityCatalog, CapabilitySurface-was_generated_by-RegistryPublicationActivity]

    source_claims: [moonweave-surface-profile]
  - id: capability-surface-counterexample-permission

    labels:
      zh: 可见即授权的错误推断
      en: Visibility-implies-permission error
      ja: visibility が permission を意味するという誤り

    descriptions:
      zh: 反例：ToolBench 注册未验证 RapidAPI key 的 endpoint；Gorilla registry 混入 hallucinated API 无 retriever 校验；Semantic Kernel plugin 名冲突未检测。
      en: Counterexample: ToolBench registers RapidAPI endpoint without key verification; Gorilla registry includes hallucinated API without retriever validation; Semantic Kernel plugin name collision undetected.
      ja: 反例：ToolBench が RapidAPI key 未検証 endpoint を登録。Gorilla registry に retriever 未検証 hallucinated API 混入。
    field_values:
      surface_revision: "1"
      catalog_revision_ref: catalog:engineering@42
      publication_activity_ref: act-publish-42
      surface_id: writer
    related_node_ids: [CapabilitySurface]
    related_relation_ids: [CapabilitySurface-part_of-CapabilityCatalog, CapabilitySurface-was_generated_by-RegistryPublicationActivity]

    source_claims: [moonweave-surface-profile]
  - id: capability-surface-boundary-capability-negotiation

    labels:
      zh: 发布表面与 MCP 能力协商边界
      en: Boundary between publication surface and MCP capability negotiation
      ja: publication surface と MCP capability negotiation の境界

    descriptions:
      zh: Gorilla 离线 APIBench 索引 vs ToolBench 在线 RapidAPI catalog vs Semantic Kernel 本地 plugin 注册的持久化边界。
      en: Persistence boundary among Gorilla offline APIBench index, ToolBench online RapidAPI catalog, Semantic Kernel local plugin registration.
      ja: Gorilla offline APIBench index、ToolBench online RapidAPI catalog、Semantic Kernel ローカル plugin 登録の永続化境界。
    field_values:
      surface_id: reader
      surface_revision: "1"
      catalog_revision_ref: catalog:engineering@42
      publication_activity_ref: act-publish-42
      source_snapshot: MCP initialize and tools/list
    related_node_ids: [CapabilitySurface]
    related_relation_ids: [CapabilitySurface-part_of-CapabilityCatalog, CapabilitySurface-was_generated_by-RegistryPublicationActivity]

    source_claims: [mcp-tools-list-for-surface, moonweave-surface-profile]
  - id: capability-surface-instance-openai-support-tools

    labels:
      zh: 支持 Agent 的 OpenAI 工具表面实例
      en: OpenAI support-Agent tool-surface instance
      ja: OpenAI support-Agent tool-surface instance

    descriptions:
      zh: "ToolBench registry 实例：tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}；Semantic Kernel WeatherPlugin.get_weather(city:str) 注册实例。"
      en: "ToolBench registry instance: tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}; Semantic Kernel WeatherPlugin.get_weather(city:str) registration instance."
      ja: ToolBench registry 実例：tool_id=rapidapi-weather-api endpoint=/forecast。Semantic Kernel WeatherPlugin.get_weather(city:str) 登録実例。
    field_values:
      surface_revision: "1"
      catalog_revision_ref: catalog:engineering@42
      publication_activity_ref: act-publish-42
      surface_id: support
      selection_rule: support-v2
    related_node_ids: [CapabilitySurface, ToolSpecification]
    related_relation_ids: [CapabilitySurface-part_of-CapabilityCatalog, CapabilitySurface-was_generated_by-RegistryPublicationActivity]

    source_claims: [moonweave-surface-profile]
parent_relation:
  id: CapabilitySurface-part_of-CapabilityCatalog
  predicate: part_of
  target: concept:CapabilityCatalog
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是能力目录修订的不可变发布组成部分
    en: is an immutable publication component of capability catalog revision
    ja: capability catalog revision の不変 publication component である
  definition:
    zh: CapabilitySurface 只作为 catalog_revision_ref 标识的 CapabilityCatalog 本地快照中的发布视图版本存在；父目录拥有该 profile 与删除边界，协议来源记录和生成活动不属于该组合。
    en: CapabilitySurface exists only as a publication-view version in the CapabilityCatalog local snapshot identified by catalog_revision_ref; the parent catalog owns the profile and deletion boundary, while protocol source records and the generating activity are outside the composition.
    ja: CapabilitySurface は catalog_revision_ref が識別する CapabilityCatalog ローカル snapshot 内の publication-view version としてのみ存在する。parent catalog は profile と deletion boundary を所有し、protocol source record と generating activity は composition 外にある。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_part
    labels:
      zh: 包含发布视图版本
      en: has publication-view version
      ja: publication-view version を持つ
  conditions: []
  temporal_scope: versioned
  boundary_context: This strict local composition is a catalog snapshot boundary and does not represent MCP initialize capability negotiation.
  constraints:
    - id: surface-parent-strict-versioned-composition
      severity: error
      expression_language: plain
      expression: CapabilitySurface must carry catalog_revision_ref, may not outlive or be independently deleted from its parent catalog revision, and must not cascade deletion to source protocol records or RegistryPublicationActivity.
      explanation:
        zh: 发布视图是本地目录快照的严格组成部分；其活动出处和协议来源具有独立保留边界。
        en: A publication view is a strict component of a local catalog snapshot; its activity provenance and protocol sources have independent retention boundaries.
        ja: publication view はローカル catalog snapshot の strict component である。その activity provenance と protocol source は独立した retention boundary を持つ。
      source_claims: [moonweave-surface-taxonomy]
  examples: []
  source_claims: [moonweave-surface-taxonomy]
  distinct_fact_rationale:
    zh: 此关系表达本地视图版本的所有权；生成该视图的活动是单独的 PROV 出处事实。
    en: This relation expresses ownership of the local view version; the activity that generated it is a separate PROV provenance fact.
    ja: この relation はローカル view version の ownership を表す。それを生成した activity は別の PROV provenance fact である。
relations:
  - id: CapabilitySurface-was_generated_by-RegistryPublicationActivity
    predicate: was_generated_by
    target: concept:RegistryPublicationActivity
    endpoint_order: surface-to-publication-activity
    direction: source-to-target
    relation_kind: provenance
    labels:
      zh: 由注册发布活动生成
      en: was generated by registry publication activity
      ja: registry publication activity により生成された
    definition:
      zh: 每个 CapabilitySurface 不可变版本都由一个本地 RegistryPublicationActivity 生成；该活动使用注册器、选择条目并产生新的消费者视图，而不将视图或活动误称为 MCP tools/list。
      en: Each immutable CapabilitySurface version is generated by one local RegistryPublicationActivity; the activity uses a registry, selects entries, and produces a new consumer view without calling the view or activity MCP tools/list.
      ja: 各不変 CapabilitySurface version は一つのローカル RegistryPublicationActivity により生成される。activity は registry を使用し entry を選択して新しい consumer view を生成するが、view または activity を MCP tools/list と呼ばない。
    cardinality:
      source:
        min: 1
        max: 1
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: generates
      labels:
        zh: 生成能力发布表面
        en: generates capability publication surface
        ja: capability publication surface を生成する
    conditions:
      - id: publication-activity-must-match-surface
        severity: error
        expression_language: plain
        expression: Assert only when publication_activity_ref identifies the target RegistryPublicationActivity and that activity's target_surface_ref identifies this surface_id.
        explanation:
          zh: 仅有规则或输入快照而没有对应发布活动时，不能断言该表面已由活动生成。
          en: A rule or input snapshot alone, without its corresponding publication activity, does not establish that the surface was generated by the activity.
          ja: 対応する publication activity なしに rule または input snapshot だけがあっても、surface が activity により生成されたとは確立しない。
        source_claims: [prov-entity-generated-by-activity, moonweave-surface-profile]
    temporal_scope: event
    boundary_context: This PROV-style generation relation links a publication Entity to an Activity and does not make it a protocol response or make the activity a catalog component.
    constraints: []
    examples: []
    source_claims: [prov-entity-generated-by-activity, moonweave-surface-profile]
    distinct_fact_rationale:
      zh: 发布活动产生新视图实体，而视图属于目录修订的组成事实由独立 part_of 关系表达。
      en: A publication activity generates a new view Entity, while the distinct fact that the view belongs to a catalog revision is expressed by part_of.
      ja: publication activity は新しい view Entity を生成する。view が catalog revision に属する別の fact は part_of で表す。
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification — Tools
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    version: 2025-11-25
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Defines tools capability and tools/list discovery, distinct from local views.
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    publisher: World Wide Web Consortium (W3C)
    url: https://www.w3.org/TR/prov-o/
    version: W3C Recommendation 30 April 2013
    accessed_on: 2026-07-19
    source_type: standard
    relevance: Defines Entity, Activity, and prov:wasGeneratedBy for local publication-view provenance.
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: design-inference
    relevance: Defines immutable local publication-surface semantics, strict catalog containment, and publication provenance.
source_claims:
  - id: prov-entity-generated-by-activity
    source: prov-o-core
    supports: PROV-O distinguishes Entity from Activity and defines prov:wasGeneratedBy for an Entity generated by an Activity.
    locator: "PROV-O: prov:Entity, prov:Activity, prov:wasGeneratedBy"
    evidence_kind: normative
    confidence: high
  - id: mcp-tools-list-for-surface
    source: mcp-tools-2025-11-25
    supports: MCP servers advertise tools capability and clients discover Tool records through tools/list.
    locator: "Capabilities; Listing Tools"
    evidence_kind: normative
    confidence: high
  - id: moonweave-surface-profile
    source: moonweave-ontology-design
    supports: CapabilitySurface is an immutable Moonweave local publication-view version that selects references and records its rule, source snapshot, catalog revision, and generating publication activity.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
  - id: moonweave-surface-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave treats CapabilitySurface as a strict immutable component of a CapabilityCatalog revision; its generating activity is linked by provenance and source protocol records remain outside the deletion boundary.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high