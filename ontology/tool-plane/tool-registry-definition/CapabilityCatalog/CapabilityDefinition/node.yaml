schema: moonweave.ai/ontology-node/v1
id: CapabilityDefinition
kind: concept
labels:
  zh: 能力定义 profile
  en: Capability definition profile
  ja: 能力定義 profile
semantics:
  short_definition:
    zh: 统一引用不同协议能力记录的 Moonweave 本地定义 profile。
    en: A Moonweave local definition profile that references capability records from different protocols.
    ja: 異なる protocol の能力記録を参照する Moonweave ローカル定義 profile。
  definition:
    zh: >
      CapabilityDefinition 是一个本地 umbrella profile，用于描述调用方可理解的名称、用途和输入契约。它可映射
      到 MCP Tool、Prompt、Resource 或 ResourceTemplate，也可映射到 OpenAI function tool；该总类并非任何一个
      标准的 wire type，具体映射必须保留协议标签和来源。
    en: >
      CapabilityDefinition is a local umbrella profile for a caller-understandable name, purpose,
      and input contract. It can map to an MCP Tool, Prompt, Resource, or ResourceTemplate, or to
      an OpenAI function tool; this umbrella is not a wire type in any standard, and each mapping
      must preserve its protocol label and provenance.
    ja: >
      CapabilityDefinition は、呼び出し側が理解できる名前、用途、入力契約のためのローカル umbrella profile である。
      MCP Tool、Prompt、Resource、ResourceTemplate または OpenAI function tool に対応付けられるが、この umbrella は
      いかなる standard の wire type でもなく、各対応付けは protocol label と来歴を保持しなければならない。
  why_needed:
    zh: 跨协议比较需要共同的本地索引，但比较不能抹去每种协议的原始契约。
    en: Cross-protocol comparison needs a common local index without erasing each protocol's original contract.
    ja: protocol 横断比較には共通のローカル index が必要だが、各 protocol の原契約を消してはならない。
  includes:
    - zh: MCP Tool、Prompt、Resource 与 ResourceTemplate 的对齐引用。
      en: Aligned references to MCP Tool, Prompt, Resource, and ResourceTemplate records.
      ja: MCP Tool、Prompt、Resource、ResourceTemplate 記録への整合参照。
    - zh: OpenAI 函数工具的带来源引用。
      en: Provenance-bearing references to OpenAI function tools.
      ja: OpenAI 関数ツールへの来歴付き参照。
  excludes:
    - zh: 具体实现代码、连接配置和一次调用结果。
      en: Concrete implementation code, connection configuration, and one invocation result.
      ja: 具体的 implementation code、connection configuration、単一 invocation result。
    - zh: 任一标准中名为 CapabilityDefinition 的原生消息类型。
      en: A native message type named CapabilityDefinition in any standard.
      ja: いずれかの standard における CapabilityDefinition という native message type。
  semantic_kind: entity
  aliases:
    - language: en
      value: cross-protocol capability profile
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      映射应保存 source_protocol 与 source_kind。例如 MCP Prompt 使用 name、description 和 arguments，而 MCP
      Tool 使用 inputSchema；OpenAI function tool 使用 parameters。profile 只记录这种差异，不声称字段可互换。
    en: >
      A mapping keeps source_protocol and source_kind. For example, an MCP Prompt uses name,
      description, and arguments, an MCP Tool uses inputSchema, and an OpenAI function tool uses
      parameters. The profile records those differences and does not claim the fields are interchangeable.
    ja: >
      mapping は source_protocol と source_kind を保持する。例えば MCP Prompt は name、description、arguments を使い、
      MCP Tool は inputSchema を使い、OpenAI function tool は parameters を使う。profile は差異を記録し、field が
      交換可能だとは主張しない。
  typical_input:
    - description:
        zh: MCP Prompt 列表中的提示词定义。
        en: A prompt definition in an MCP prompt list.
        ja: MCP prompt list 内の prompt definition。
      format: |
        {"name":"code_review","description":"Review code","arguments":[{"name":"code","required":true}]}
      source_claims: [mcp-prompt-record]
  typical_output:
    - description:
        zh: 保留协议来源的本地能力引用。
        en: A local capability reference retaining its protocol provenance.
        ja: protocol provenance を保持するローカル capability reference。
      format: |
        {"capability_id":"code_review","source_protocol":"MCP","source_kind":"Prompt"}
      source_claims: [moonweave-capability-definition-profile]
  reference_implementations:
    - name: MCP Tools, Prompts, and Resources
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Protocol-specific record shapes that the local profile may reference.
    - name: OpenAI Function Calling
      url: https://developers.openai.com/api/docs/guides/function-calling
      description: Function-tool schema shape distinct from MCP records.
structure:
  identity_keys: [capability_id, source_protocol, source_kind, definition_revision]
  fields:
    - id: definition_revision
      labels:
        zh: 能力定义 profile 版本
        en: capability-definition profile version
        ja: capability-definition profile version
      definitions:
        zh: 标识此不可变本地 能力定义 profile 版本；变更必须创建新版本，不得就地修改。
        en: Identifies this immutable local capability-definition profile version; a change must create a new version rather than mutate it in place.
        ja: この不変ローカル capability-definition profile version を識別する。変更は in-place で mutate せず新 version を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "1"
      allowed_values: []
      source_claims: [moonweave-capability-definition-profile, moonweave-capability-definition-taxonomy]
    - id: catalog_revision_ref
      labels:
        zh: 能力目录修订引用
        en: capability catalog revision reference
        ja: capability catalog revision reference
      definitions:
        zh: 标识拥有此 能力定义 profile 版本 的不可变 能力目录修订；该组成部分在父修订外无效，删除父修订只删除本地 profile，不删除 MCP、OpenAI 或应用配置来源记录。
        en: Identifies the immutable capability catalog revision that owns this capability-definition profile version; the component is invalid outside that parent revision, and deleting the parent revision deletes only local profiles, not MCP, OpenAI, or application-configuration source records.
        ja: この capability-definition profile version を所有する不変 capability catalog revision を識別する。component は parent revision 外では無効で、parent revision を削除してもローカル profile だけが削除され、MCP、OpenAI、application-configuration の source record は削除されない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: capabilitycatalog@1
      allowed_values: []
      source_claims: [moonweave-capability-definition-profile, moonweave-capability-definition-taxonomy]
    - id: capability_id
      labels:
        zh: 能力标识符
        en: Capability identifier
        ja: 能力識別子
      definitions:
        zh: 在其来源范围内定位记录的名称或标识符。
        en: The name or identifier that locates the record within its source scope.
        ja: source scope 内で記録を特定する名前または識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: code_review
      allowed_values: []
      source_claims: [moonweave-capability-definition-profile]
    - id: source_protocol
      labels:
        zh: 来源协议
        en: Source protocol
        ja: source protocol
      definitions:
        zh: 指示该记录来自 MCP、OpenAI 应用配置或其他明确来源。
        en: Indicates whether the record comes from MCP, an OpenAI application configuration, or another declared source.
        ja: 記録が MCP、OpenAI application configuration、または別の明示された source のどれから来るかを示す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: MCP
      allowed_values: [MCP, OpenAI]
      source_claims: [moonweave-capability-definition-profile]
    - id: source_kind
      labels:
        zh: 来源记录类型
        en: Source record kind
        ja: source record kind
      definitions:
        zh: 记录来源的标准术语，如 Tool、Prompt、Resource、ResourceTemplate 或 function。
        en: The source's standard term, such as Tool, Prompt, Resource, ResourceTemplate, or function.
        ja: Tool、Prompt、Resource、ResourceTemplate、function など source の標準用語。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Prompt
      allowed_values: [Tool, Prompt, Resource, ResourceTemplate, function]
      source_claims: [mcp-prompt-record, mcp-resource-record, mcp-tool-record, openai-function-record]
    - id: contract_summary
      labels:
        zh: 契约摘要
        en: Contract summary
        ja: 契約要約
      definitions:
        zh: 指向来源定义字段的不可替代摘要，而不是重写后的协议 payload。
        en: A non-substituting summary pointing to source definition fields, not a rewritten protocol payload.
        ja: source definition field を指す、置換しない要約であり、書き換えた protocol payload ではない。
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: '{"input_field":"arguments","source_uri":"mcp://server/prompts/code_review"}'
      allowed_values: []
      source_claims: [moonweave-capability-definition-profile]
  constraints:
    - id: source-kind-must-preserve-standard-shape
      severity: error
      expression_language: plain
      expression: source_kind must preserve the originating protocol term and contract_summary must not rename source fields as equivalent fields.
      explanation:
        zh: 本地 profile 可以比较能力，但不能把 Prompt arguments、Tool inputSchema 与函数 parameters 宣称为同一字段。
        en: A local profile may compare capabilities but cannot claim Prompt arguments, Tool inputSchema, and function parameters are one field.
        ja: ローカル profile は能力を比較できるが、Prompt arguments、Tool inputSchema、function parameters を同一 field と主張できない。
      source_claims: [moonweave-capability-definition-profile]
  required_relations: [CapabilityDefinition-part_of-CapabilityCatalog]
examples:
  - id: capability-definition-positive-mcp-prompt

    labels:
      zh: MCP Prompt 引用
      en: MCP Prompt reference
      ja: MCP Prompt 参照

    descriptions:
      zh: Gorilla APIBench 1645 API 注册（HuggingFace/TorchHub/TensorHub）；ToolBench 16000+ RapidAPI 工具注册表；Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") 插件注册。
      en: Gorilla APIBench registers 1645 APIs (HuggingFace/TorchHub/TensorHub); ToolBench 16000+ RapidAPI tool registry; Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") plugin registration.
      ja: Gorilla APIBench が 1645 API を登録。ToolBench 16000+ RapidAPI tool registry。Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") プラグイン登録。
    field_values:
      source_protocol: MCP
      source_kind: Prompt
    related_node_ids: [CapabilityDefinition, PromptDefinition]
    related_relation_ids: [CapabilityDefinition-part_of-CapabilityCatalog]

    source_claims: [mcp-prompt-record, moonweave-capability-definition-profile]
  - id: capability-definition-counterexample-field-collapse

    labels:
      zh: 将不同契约字段合并
      en: Collapsed contract fields
      ja: 契約 field の統合例

    descriptions:
      zh: 反例：ToolBench 注册未验证 RapidAPI key 的 endpoint；Gorilla registry 混入 hallucinated API 无 retriever 校验；Semantic Kernel plugin 名冲突未检测。
      en: Counterexample: ToolBench registers RapidAPI endpoint without key verification; Gorilla registry includes hallucinated API without retriever validation; Semantic Kernel plugin name collision undetected.
      ja: 反例：ToolBench が RapidAPI key 未検証 endpoint を登録。Gorilla registry に retriever 未検証 hallucinated API 混入。
    field_values:
      source_kind: Tool
    related_node_ids: [CapabilityDefinition]
    related_relation_ids: [CapabilityDefinition-part_of-CapabilityCatalog]

    source_claims: [moonweave-capability-definition-profile]
  - id: capability-definition-boundary-runtime-code

    labels:
      zh: 定义与实现代码边界
      en: Boundary between definition and implementation code
      ja: 定義と implementation code の境界

    descriptions:
      zh: Gorilla 离线 APIBench 索引 vs ToolBench 在线 RapidAPI catalog vs Semantic Kernel 本地 plugin 注册的持久化边界。
      en: Persistence boundary among Gorilla offline APIBench index, ToolBench online RapidAPI catalog, Semantic Kernel local plugin registration.
      ja: Gorilla offline APIBench index、ToolBench online RapidAPI catalog、Semantic Kernel ローカル plugin 登録の永続化境界。
    field_values:
      source_protocol: OpenAI
      source_kind: function
    related_node_ids: [FunctionTool]
    related_relation_ids: [CapabilityDefinition-part_of-CapabilityCatalog]

    source_claims: [openai-function-record]
  - id: capability-definition-instance-resource-template

    labels:
      zh: MCP ResourceTemplate 实例
      en: MCP ResourceTemplate instance
      ja: MCP ResourceTemplate instance

    descriptions:
      zh: "ToolBench registry 实例：tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}；Semantic Kernel WeatherPlugin.get_weather(city:str) 注册实例。"
      en: "ToolBench registry instance: tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}; Semantic Kernel WeatherPlugin.get_weather(city:str) registration instance."
      ja: ToolBench registry 実例：tool_id=rapidapi-weather-api endpoint=/forecast。Semantic Kernel WeatherPlugin.get_weather(city:str) 登録実例。
    field_values:
      source_protocol: MCP
      source_kind: ResourceTemplate
    related_node_ids: [ResourceTemplate]
    related_relation_ids: [CapabilityDefinition-part_of-CapabilityCatalog]

    source_claims: [mcp-resource-record, moonweave-capability-definition-profile]
parent_relation:
  id: CapabilityDefinition-part_of-CapabilityCatalog
  predicate: part_of
  target: concept:CapabilityCatalog
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是能力目录修订的不可变组成部分
    en: is an immutable component of capability catalog revision
    ja: capability catalog revision の不変 component である
  definition:
    zh: CapabilityDefinition 仅作为 catalog_revision_ref 标识的 能力目录修订 中的 能力定义 profile 版本 存在；父修订拥有该 profile 副本与删除边界，MCP、OpenAI 或应用配置来源记录 始终位于该边界之外。
    en: CapabilityDefinition exists only as a capability-definition profile version in the capability catalog revision identified by catalog_revision_ref; the parent revision owns this profile copy and deletion boundary, while MCP, OpenAI, or application-configuration source records always remain outside that boundary.
    ja: CapabilityDefinition は catalog_revision_ref が識別する capability catalog revision 内の capability-definition profile version としてのみ存在する。parent revision はこの profile copy と deletion boundary を所有し、MCP、OpenAI、application-configuration の source record は常にその boundary 外に残る。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_part
    labels:
      zh: 包含不可变组成版本
      en: has immutable component version
      ja: immutable component version を持つ
  conditions: []
  temporal_scope: versioned
  boundary_context: This strict local composition records a versioned deletion boundary for a Moonweave profile component. It does not make MCP, OpenAI, or application-configuration source records components of the parent.
  constraints:
    - id: capabilitydefinition-strict-versioned-composition
      severity: error
      expression_language: plain
      expression: CapabilityDefinition must carry catalog_revision_ref and definition_revision, may not outlive or be independently deleted from that parent revision, and must not cascade deletion to MCP, OpenAI, or application-configuration source records.
      explanation:
        zh: 该组成部分是本地父修订的严格版本化部分；它没有孤立的可变生命周期，且不能删除MCP、OpenAI 或应用配置来源记录。
        en: The component is a strict versioned part of its local parent revision; it has no orphan mutable lifecycle and cannot delete MCP, OpenAI, or application-configuration source records.
        ja: component はローカル parent revision の strict versioned part である。orphan mutable lifecycle を持たず、MCP、OpenAI、application-configuration の source record を削除できない。
      source_claims: [moonweave-capability-definition-taxonomy]
  examples: []
  source_claims: [moonweave-capability-definition-taxonomy]
  distinct_fact_rationale:
    zh: 此关系表达本地 profile 版本的所有权和删除边界；MCP、OpenAI 或应用配置来源记录 的来源与生命周期由其各自系统保持。
    en: This relation expresses ownership and deletion boundary of a local profile version; provenance and lifecycle of MCP, OpenAI, or application-configuration source records remain with their respective systems.
    ja: この relation はローカル profile version の ownership と deletion boundary を表す。MCP、OpenAI、application-configuration の source record の provenance と lifecycle は各 system に残る。
relations: []
