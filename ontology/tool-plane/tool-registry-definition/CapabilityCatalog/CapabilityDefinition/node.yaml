source_claims:
  - id: mcp-tool-record
    source: mcp-tools-2025-11-25
    supports: An MCP Tool record has a unique name and an inputSchema JSON Schema, with optional metadata and output schema fields.
    locator: "Tool"
    evidence_kind: normative
    confidence: high
  - id: mcp-prompt-record
    source: mcp-prompts-2025-11-25
    supports: An MCP Prompt record has a unique name and optional description, icons, and arguments.
    locator: "Prompt"
    evidence_kind: normative
    confidence: high
  - id: mcp-resource-record
    source: mcp-resources-2025-11-25
    supports: MCP specifies concrete Resource and ResourceTemplate records with distinct URI and URI-template fields.
    locator: "Resource Templates; Resource"
    evidence_kind: normative
    confidence: high
  - id: openai-function-record
    source: openai-function-calling
    supports: An OpenAI function tool is defined by type function, name, description, parameters JSON Schema, and strict behavior.
    locator: "Function tools; Strict mode"
    evidence_kind: normative
    confidence: high
  - id: moonweave-capability-definition-profile
    source: moonweave-ontology-design
    supports: CapabilityDefinition is a Moonweave local umbrella profile that preserves protocol kind and provenance while enabling comparison.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
  - id: moonweave-capability-definition-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave treats CapabilityDefinition as a strict immutable component of a CapabilityCatalog revision; the local profile may be deleted with its parent snapshot while source protocol records remain outside that deletion boundary.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high