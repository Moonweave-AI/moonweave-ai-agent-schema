schema: moonweave.ai/ontology-node/v1
id: CapabilityDefinition
kind: concept
status: accepted
labels:
  zh: 能力定义
  en: Capability Definition
  ja: 能力定義
semantics:
  short_definition:
    zh: 能力定义是可被发布、发现或实例化的稳定能力规格。
    en: A Capability Definition is a stable capability specification that can be published, discovered, or instantiated.
    ja: 能力定義は公開・発見・具体化できる安定した能力仕様です。
  definition:
    zh: 能力定义是一种规格，以稳定定义标识和版本为身份，并声明调用方在使用前可检查的名称、描述、输入或定位合同；工具规格、提示定义与资源定义在此共享定义层，而不共享具体执行语义。
    en: A Capability Definition is a specification identified by a stable definition ID and version and declaring inspectable names, descriptions, and input or addressing contracts. Tool specifications, prompt definitions, and resource definitions share this definition layer without sharing execution semantics.
    ja: 能力定義は安定した定義 ID と版で識別され、利用前に検査できる名称・説明・入力または addressing 契約を宣言します。ツール、prompt、resource の具体的実行意味は分離します。
  why_needed:
    zh: 共同定义层消除了提示、资源与工具之间的错误父子关系，又允许目录发布流程统一处理可发现描述。
    en: The shared definition layer removes false parentage among prompts, resources, and tools while letting catalog publication handle discoverable descriptions consistently.
    ja: 共通定義層は prompt・resource・tool 間の誤った親子関係を除き、公開処理を一貫させます。
  includes:
    - zh: 纳入跨请求稳定、可命名且有明确参数或寻址合同的能力规格。
      en: Includes stable, named capability specifications with explicit argument or addressing contracts.
      ja: 要求を越えて安定し、名称と引数または addressing 契約を持つ能力仕様を含みます。
  excludes:
    - zh: 排除目录条目、查询候选、一次实例化结果和一次调用尝试。
      en: Excludes registry entries, query candidates, one instantiation result, and one call attempt.
      ja: registry entry、query candidate、一回の具体化結果、一回の call attempt を除きます。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - capability_definition_id
  fields:
    - id: capability_definition_id
      labels:
        zh: 能力定义标识
        en: capability-definition ID
        ja: 能力定義 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 能力定义标识作为 CapabilityDefinition 节点内部信息保存，不建立同名图节点。
        en: capability-definition ID is stored as information on the CapabilityDefinition node and does not create a namesake graph node.
        ja: 能力定義 IDは CapabilityDefinition node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: capdef:weather
      source_claims:
        - claim-capability-definition-004
        - claim-capability-definition-005
        - claim-capability-definition-006
    - id: version
      labels:
        zh: 定义版本
        en: definition version
        ja: 定義版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 定义版本作为 CapabilityDefinition 节点内部信息保存，不建立同名图节点。
        en: definition version is stored as information on the CapabilityDefinition node and does not create a namesake graph node.
        ja: 定義版は CapabilityDefinition node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: 3.0.0
      source_claims:
        - claim-capability-definition-007
        - claim-capability-definition-008
        - claim-capability-definition-009
    - id: name
      labels:
        zh: 定义名称
        en: definition name
        ja: 定義名
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 定义名称作为 CapabilityDefinition 节点内部信息保存，不建立同名图节点。
        en: definition name is stored as information on the CapabilityDefinition node and does not create a namesake graph node.
        ja: 定義名は CapabilityDefinition node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: weather
      source_claims:
        - claim-capability-definition-010
        - claim-capability-definition-011
        - claim-capability-definition-012
  constraints:
    - id: capability-definition-single-inherited-identity
      severity: error
      expression_language: plain
      expression: Every accepted is_a specialization of CapabilityDefinition MUST reuse capability_definition_id as its stable definition identity and MUST NOT introduce a synonymous specification or definition ID; protocol name, URI, and URI template fields remain addresses or discriminators.
      explanations:
        zh: CapabilityDefinition 的 accepted 下位类必须复用 capability_definition_id；协议 name、URI 与 URI Template 是寻址或种差字段，不得再造同义规格 ID。
        en: Accepted CapabilityDefinition subtypes reuse capability_definition_id; protocol names, URIs, and URI templates are addresses or differentia, not synonymous specification IDs.
        ja: CapabilityDefinition の accepted subtype は capability_definition_id を再利用し、protocol name・URI・URI Template は address/differentia として扱い、同義 specification ID を追加しません。
      source_claims:
        - claim-capability-definition-013
        - claim-capability-definition-014
        - claim-capability-definition-015
  required_relation_constraints: []
examples:
  - id: CapabilityDefinition-example-positive-manual-001
    kind: positive
    labels:
      zh: CapabilityDefinition 正例
      en: CapabilityDefinition positive case
      ja: CapabilityDefinition 正例
    scenario_id: null
    descriptions:
      zh: 同一目录把工具、提示和资源的稳定定义交给统一发布作业处理。
      en: One catalog passes stable tool, prompt, and resource definitions to a common publication job.
      ja: 一つの目録が tool・prompt・resource の安定定義を共通公開 job に渡します。
    field_values:
      capability_definition_id: capdef:weather
      version: 3.0.0
      name: weather
    related_node_ids:
      - CapabilityDefinition
    related_relation_ids: []
    expected_result:
      zh: 三类定义共享能力定义层，再按各自合同继续细分。
      en: The three kinds share CapabilityDefinition and then specialize by their own contracts.
      ja: 三種類は CapabilityDefinition を共有し、各契約で細分化します。
    why_valid_or_invalid:
      zh: 共享的是定义身份和可检查性，不是运行方式。
      en: They share definition identity and inspectability, not runtime behavior.
      ja: 共有するのは定義 identity と検査可能性であり実行方式ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-capability-definition-016
      - claim-capability-definition-017
      - claim-capability-definition-018
  - id: CapabilityDefinition-example-boundary-manual-001
    kind: boundary
    labels:
      zh: CapabilityDefinition 边界例
      en: CapabilityDefinition boundary case
      ja: CapabilityDefinition 境界例
    scenario_id: null
    descriptions:
      zh: 一次 prompt/get 返回了已填充变量的消息数组。
      en: One prompt/get call returns a message array with variables already filled.
      ja: 一回の prompt/get が変数展開済み message array を返します。
    field_values: {}
    related_node_ids:
      - CapabilityDefinition
    related_relation_ids: []
    expected_result:
      zh: 返回结果属于实例化信息，不是能力定义。
      en: The returned result is instantiation information, not a CapabilityDefinition.
      ja: 返却結果は具体化情報であり能力定義ではありません。
    why_valid_or_invalid:
      zh: 结果由请求参数和时刻决定，定义则在多次实例化之间保持稳定。
      en: The result depends on request arguments and time, while the definition persists across instantiations.
      ja: 結果は request argument と時点に依存し、定義は複数具体化を越えて存続します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-capability-definition-019
      - claim-capability-definition-020
      - claim-capability-definition-021
