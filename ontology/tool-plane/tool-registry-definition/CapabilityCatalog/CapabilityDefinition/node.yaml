parent_relation:
  id: CapabilityCatalog-contains-CapabilityDefinition
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 收录能力定义
    en: contains capability definition
    ja: 能力定義を収録する
  definitions:
    zh: CapabilityCatalog contains 依据其成员规则被收录的 CapabilityDefinition；定义保留 capability_definition_id 与 version，目录只保存受治理成员关系，不复制工具、提示或资源定义的合同内容。
    en: A CapabilityCatalog contains a CapabilityDefinition admitted under its membership rules. The definition retains capability_definition_id and version; the catalog stores governed membership rather than copying the contract content of tool, prompt, or resource definitions.
    ja: CapabilityCatalog は membership rule により受け入れた CapabilityDefinition を contains します。definition は capability_definition_id/version を保持し、catalog は tool・prompt・resource contract を複製せず governed membership を保存します。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 是能力目录成员
      en: is member of capability catalog
      ja: 能力目録の member である
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: CapabilityCatalog-contains-CapabilityDefinition-example-positive-manual-001
      kind: positive
      labels:
        zh: 目录收录版本化定义正例
        en: Catalog contains a versioned definition positive case
        ja: 目録が versioned definition を収録する正例
      scenario_id: null
      descriptions:
        zh: catalog-prod 的成员规则接纳 weather-tool definition v3；该定义仍保留 capability_definition_id 和 version，后续 tools/list 可投影其当前可见版本。
        en: catalog-prod admits weather-tool definition v3 under its membership rules; the definition retains capability_definition_id and version, and a later tools/list response may project the currently visible version.
        ja: catalog-prod が membership rule により weather-tool definition v3 を受け入れ、capability_definition_id/version を保持し、後の tools/list は current visible version を projection できます。
      field_values: {}
      related_node_ids:
        - CapabilityCatalog
        - CapabilityDefinition
      related_relation_ids:
        - CapabilityCatalog-contains-CapabilityDefinition
      expected_result:
        zh: 建立 catalog-prod —contains→ weather-tool-v3，并保留目录成员与定义合同的身份分离。
        en: Assert catalog-prod —contains→ weather-tool-v3 while preserving separate identities for catalog membership and the definition contract.
        ja: catalog-prod —contains→ weather-tool-v3 を成立させ catalog membership と definition contract の identity を分離します。
      why_valid_or_invalid:
        zh: 稳定目录、明确成员规则与版本化定义三项事实同时存在。
        en: A stable catalog, explicit membership rule, and versioned definition are all present.
        ja: stable catalog・explicit membership rule・versioned definition の三事実が揃っています。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-capability-definition-022
    - id: CapabilityCatalog-contains-CapabilityDefinition-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 列表响应不是持久目录边界例
        en: List response is not a persistent catalog boundary case
        ja: list response は persistent catalog ではない境界例
      scenario_id: null
      descriptions:
        zh: 客户端只收到一页 tools/list 响应，既没有稳定 catalog_id，也没有成员规则或版本接纳记录。
        en: A client receives one tools/list response page with no stable catalog_id, membership rule, or version-admission record.
        ja: client が一 page の tools/list response を受けただけで stable catalog_id・membership rule・version admission record がありません。
      field_values: {}
      related_node_ids:
        - CapabilityCatalog
        - CapabilityDefinition
      related_relation_ids:
        - CapabilityCatalog-contains-CapabilityDefinition
      expected_result:
        zh: 不从一次响应页推断持久 contains；该页保留为协议消息或列表投影。
        en: Do not infer persistent contains from one response page; retain the page as a protocol message or list projection.
        ja: 一 response page から persistent contains を推論せず protocol message/list projection として保持します。
      why_valid_or_invalid:
        zh: 瞬时列表投影缺少受治理成员关系，不能替代目录本体。
        en: A transient list projection lacks governed membership and cannot substitute for the catalog itself.
        ja: transient list projection は governed membership を欠き catalog 自体を代替できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-capability-definition-023
  source_claims:
    - claim-capability-definition-024
  distinct_fact_rationale:
    zh: contains 表达目录成员事实；它不等于定义分类，也不等于一次列表响应中的临时共现。
    en: contains states catalog membership; it is neither definition classification nor transient co-occurrence in one list response.
    ja: contains は catalog membership を表し definition classification や一 list response の transient co-occurrence ではありません。
