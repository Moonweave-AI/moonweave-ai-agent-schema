    en: ResourceCapabilityDefinition is a CapabilityDefinition specialized by discoverable, readable-resource metadata. It carries only information shared by concrete resources and URI templates.
    ja: ResourceCapabilityDefinition は discoverable/readable-resource metadata を種差とする CapabilityDefinition で、concrete resource と URI template の共有情報だけを担います。
  cardinality: null
  cardinality_not_applicable_reason:
