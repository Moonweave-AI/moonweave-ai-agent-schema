schema: moonweave.ai/ontology-node/v1
id: ResourceCapabilityDefinition
kind: concept
labels:
  zh: 资源能力定义 profile
  en: Resource capability definition profile
  ja: リソース能力定義 profile
semantics:
  short_definition:
    zh: 用于组织 MCP Resource 与 ResourceTemplate 对齐记录的 Moonweave 本地总类 profile。
    en: A Moonweave local umbrella profile organizing records aligned to MCP Resource and ResourceTemplate.
    ja: MCP Resource と ResourceTemplate に整合する record を整理する Moonweave ローカル umbrella profile。
  definition:
    zh: >
      ResourceCapabilityDefinition 是本地 umbrella profile，用于将静态 MCP Resource 记录与参数化 MCP
      ResourceTemplate 记录并置比较。MCP 规范分别命名它们为 Resource 和 ResourceTemplate；本总类不是 MCP
      wire type，也不将资源内容、URI 模板或订阅事件变成同一字段。
    en: >
      ResourceCapabilityDefinition is a local umbrella profile for comparing static MCP Resource
      records with parameterized MCP ResourceTemplate records. The MCP specification names them
      Resource and ResourceTemplate respectively; this umbrella is not an MCP wire type and does
      not collapse resource content, URI templates, or subscription events into one field.
    ja: >
      ResourceCapabilityDefinition は静的 MCP Resource record と parameterized MCP ResourceTemplate record を
      比較するためのローカル umbrella profile である。MCP specification はそれぞれ Resource と ResourceTemplate と
      名付ける。この umbrella は MCP wire type ではなく、resource content、URI template、subscription event を
      一つの field に統合しない。
  why_needed:
    zh: 资源记录和资源模板都提供上下文，但它们的标识、发现和读取契约不同。
    en: Resource records and resource templates both provide context, but their identity, discovery, and reading contracts differ.
    ja: resource record と resource template はどちらも context を提供するが、identity、discovery、reading contract は異なる。
  includes:
    - zh: MCP Resource 的 URI 标识、名称和内容元数据。
      en: MCP Resource URI identity, name, and content metadata.
      ja: MCP Resource の URI identity、name、content metadata。
    - zh: MCP ResourceTemplate 的 URI template 与参数化说明。
      en: MCP ResourceTemplate URI template and parameterization description.
      ja: MCP ResourceTemplate の URI template と parameterization description。
  excludes:
    - zh: resources/read 返回的实际 text 或 blob 内容。
      en: Actual text or blob content returned by resources/read.
      ja: resources/read が返す実際の text または blob content。
    - zh: 一个名为 ResourceCapabilityDefinition 的 MCP 原生对象。
      en: An MCP native object named ResourceCapabilityDefinition.
      ja: ResourceCapabilityDefinition という MCP native object。
  semantic_kind: local-profile
  aliases:
    - language: en
      value: MCP resource umbrella profile
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      服务器宣布 resources capability 后，可用 resources/list 返回 Resource 记录，并用 resources/templates/list
      返回 ResourceTemplate 记录。资源读取以 resources/read 的 uri 为输入；模板使用 uriTemplate 表达可参数化地址。
      umbrella profile 只保存这种分层，不替代这些协议方法。
    en: >
      After a server declares resources capability, resources/list returns Resource records and
      resources/templates/list returns ResourceTemplate records. Resource reading uses a uri in
      resources/read, while a template uses uriTemplate for a parameterized address. The umbrella
      profile records this layering only and does not replace these protocol methods.
    ja: >
      server が resources capability を宣言した後、resources/list は Resource record を返し、resources/templates/list は
      ResourceTemplate record を返す。resource reading は resources/read の uri を使い、template は parameterized address の
      uriTemplate を使う。umbrella profile はこの layer だけを記録し、これらの protocol method を置換しない。
  typical_input:
    - description:
        zh: 获取参数化资源模板的 MCP 请求。
        en: An MCP request to list parameterized resource templates.
        ja: parameterized resource template を list する MCP request。
      format: |
        {"jsonrpc":"2.0","id":3,"method":"resources/templates/list"}
      source_claims: [mcp-resource-template-list]
  typical_output:
    - description:
        zh: 一个 URI 模板记录。
        en: One URI-template record.
        ja: 一つの URI-template record。
      format: |
        {"resourceTemplates":[{"uriTemplate":"file:///{path}","name":"Project Files"}]}
      source_claims: [mcp-resource-template-list]
  reference_implementations:
    - name: MCP Resources
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
      description: Defines Resource, ResourceTemplate, resource listing, reading, and subscriptions.
structure:
  identity_keys: [capability_id, source_protocol, source_kind, definition_revision, source_server, resource_kind]
  fields:
    - id: source_server
      labels:
        zh: 来源服务器引用
        en: Source server reference
        ja: source server reference
      definitions:
        zh: 暴露 Resource 或 ResourceTemplate 的 MCP 服务器。
        en: The MCP server exposing a Resource or ResourceTemplate.
        ja: Resource または ResourceTemplate を expose する MCP server。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: mcp://files
      allowed_values: []
      source_claims: [mcp-resource-capability]
    - id: resource_kind
      labels:
        zh: 资源记录种类
        en: Resource record kind
        ja: resource record kind
      definitions:
        zh: 标识来源是具体 Resource 还是参数化 ResourceTemplate。
        en: Identifies whether the source is a concrete Resource or a parameterized ResourceTemplate.
        ja: source が具体的な Resource か parameterized ResourceTemplate かを識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: ResourceTemplate
      allowed_values: [Resource, ResourceTemplate]
      source_claims: [mcp-resource-record, mcp-resource-template-record]
    - id: source_ref
      labels:
        zh: 来源记录引用
        en: Source-record reference
        ja: source-record reference
      definitions:
        zh: 保持原始 URI 或 URI template 及其协议来源的引用。
        en: A reference retaining the original URI or URI template and its protocol provenance.
        ja: 元の URI または URI template とその protocol provenance を保持する reference。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: file:///{path}
      allowed_values: []
      source_claims: [mcp-resource-record, mcp-resource-template-record]
    - id: discovery_method
      labels:
        zh: 发现方法
        en: Discovery method
        ja: discovery method
      definitions:
        zh: 产生记录的标准 MCP 列表方法。
        en: The standard MCP list method that produces the record.
        ja: record を生成する標準 MCP list method。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: resources/templates/list
      allowed_values: [resources/list, resources/templates/list]
      source_claims: [mcp-resource-list, mcp-resource-template-list]
    - id: definition_revision
      labels:
        zh: 能力定义 profile 版本
        en: capability-definition profile version
        ja: capability-definition profile version
      definitions:
        zh: 标识此不可变本地 能力定义 profile 版本；变更必须创建新版本，不得就地修改。
        en: Identifies this immutable local capability-definition profile version; a change must create a new version rather than mutate it in place.
        ja: この不変ローカル capability-definition profile version を識別する。変更は in-place で mutate せず新 version を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "1"
      allowed_values: []
      source_claims: [moonweave-resource-capability-taxonomy]
    - id: catalog_revision_ref
      labels:
        zh: 能力目录修订引用
        en: capability catalog revision reference
        ja: capability catalog revision reference
      definitions:
        zh: 标识拥有此 能力定义 profile 版本 的不可变 能力目录修订；该组成部分在父修订外无效，删除父修订只删除本地 profile，不删除 MCP、OpenAI 或应用配置来源记录。
        en: Identifies the immutable capability catalog revision that owns this capability-definition profile version; the component is invalid outside that parent revision, and deleting the parent revision deletes only local profiles, not MCP, OpenAI, or application-configuration source records.
        ja: この capability-definition profile version を所有する不変 capability catalog revision を識別する。component は parent revision 外では無効で、parent revision を削除してもローカル profile だけが削除され、MCP、OpenAI、application-configuration の source record は削除されない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: capabilitycatalog@1
      allowed_values: []
      source_claims: [moonweave-resource-capability-taxonomy]
    - id: capability_id
      labels:
        zh: 能力标识符
        en: Capability identifier
        ja: 能力識別子
      definitions:
        zh: 在其来源范围内定位记录的名称或标识符。
        en: The name or identifier that locates the record within its source scope.
        ja: source scope 内で記録を特定する名前または識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: code_review
      allowed_values: []
      source_claims: [moonweave-resource-capability-taxonomy]
    - id: source_protocol
      labels:
        zh: 来源协议
        en: Source protocol
        ja: source protocol
      definitions:
        zh: 指示该记录来自 MCP、OpenAI 应用配置或其他明确来源。
        en: Indicates whether the record comes from MCP, an OpenAI application configuration, or another declared source.
        ja: 記録が MCP、OpenAI application configuration、または別の明示された source のどれから来るかを示す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: MCP
      allowed_values: [MCP, OpenAI]
      source_claims: [moonweave-resource-capability-taxonomy]
    - id: source_kind
      labels:
        zh: 来源记录类型
        en: Source record kind
        ja: source record kind
      definitions:
        zh: 记录来源的标准术语，如 Tool、Prompt、Resource、ResourceTemplate 或 function。
        en: The source's standard term, such as Tool, Prompt, Resource, ResourceTemplate, or function.
        ja: Tool、Prompt、Resource、ResourceTemplate、function など source の標準用語。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Prompt
      allowed_values: [Tool, Prompt, Resource, ResourceTemplate, function]
      source_claims: [moonweave-resource-capability-taxonomy]
    - id: contract_summary
      labels:
        zh: 契约摘要
        en: Contract summary
        ja: 契約要約
      definitions:
        zh: 指向来源定义字段的不可替代摘要，而不是重写后的协议 payload。
        en: A non-substituting summary pointing to source definition fields, not a rewritten protocol payload.
        ja: source definition field を指す、置換しない要約であり、書き換えた protocol payload ではない。
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: '{"input_field":"arguments","source_uri":"mcp://server/prompts/code_review"}'
      allowed_values: []
      source_claims: [moonweave-resource-capability-taxonomy]
  constraints:
    - id: resource-and-template-remain-distinct
      severity: error
      expression_language: plain
      expression: resource_kind and discovery_method must preserve whether the source is Resource or ResourceTemplate and must not replace uri with uriTemplate.
      explanation:
        zh: 具体资源的 URI 和模板的 URI template 有不同语义。
        en: A concrete resource URI and a template URI template have different semantics.
        ja: 具体 resource の URI と template の URI template は異なる semantics を持つ。
      source_claims: [mcp-resource-record, mcp-resource-template-record]
    - id: resource-capability-definition-inherits-parent-required-fields
      severity: error
      expression_language: plain
      expression: "All inherited required CapabilityDefinition fields are fields of this same record; the is_a subtype does not establish or reference a second CapabilityDefinition record."
      explanation: {zh: "所有继承的 CapabilityDefinition 必需字段属于同一记录，该 is_a 子类型不建立或引用第二条 CapabilityDefinition 记录。", en: "Inherited required fields stay on the same record rather than creating a second parent record.", ja: "継承された必須 CapabilityDefinition フィールドは同じレコードに属し、この is_a 下位型は 2 番目の親レコードを作成または参照しない。"}
      source_claims: [moonweave-resource-capability-taxonomy]
  required_relations: []
examples:
  - id: resource-capability-positive-template

    labels:
      zh: 项目文件资源模板
      en: Project-files resource template
      ja: project-files resource template

    descriptions:
      zh: "Semantic Kernel PromptTemplate 与 kernel.invoke(function_name,args)；LangChain PromptTemplate.format()；MCP prompts/get name=code_review arguments={code:\"...\"}。"
      en: "Semantic Kernel PromptTemplate and kernel.invoke(function_name,args); LangChain PromptTemplate.format(); MCP prompts/get name=code_review arguments={code:\"...\"}."
      ja: Semantic Kernel PromptTemplate。LangChain PromptTemplate.format()。MCP prompts/get name=code_review。
    field_values:
      source_server: mcp://files
      resource_kind: ResourceTemplate
      capability_id: file:///{path}
      source_protocol: MCP
      source_kind: ResourceTemplate
      definition_revision: "1"
      discovery_method: resources/templates/list
    related_node_ids: [ResourceCapabilityDefinition, ResourceTemplate]
    related_relation_ids: [ResourceCapabilityDefinition-is_a-CapabilityDefinition]

    source_claims: [mcp-resource-template-list, mcp-resource-template-record]
  - id: resource-capability-counterexample-uri-collapse

    labels:
      zh: 将 URI 与 URI template 合并
      en: URI and URI-template collapse
      ja: URI と URI template の統合例

    descriptions:
      zh: 反例：MCP resources/read uri 未订阅就假定内容可用；Semantic Kernel prompt 参数未验证即实例化。
      en: Counterexample: assuming MCP resources/read uri content without subscription; Semantic Kernel prompt instantiated without argument validation.
      ja: 反例：MCP resources/read uri 未購読で内容可用を仮定。Semantic Kernel prompt 引数未検証でインスタンス化。
    field_values:
      resource_kind: ResourceTemplate
    related_node_ids: [ResourceCapabilityDefinition]
    related_relation_ids: [ResourceCapabilityDefinition-is_a-CapabilityDefinition]

    source_claims: [mcp-resource-record, mcp-resource-template-record]
  - id: resource-capability-boundary-definition-and-content

    labels:
      zh: 资源定义与内容边界
      en: Boundary between resource definition and content
      ja: resource definition と content の境界

    descriptions:
      zh: MCP Prompt/Resource 能力 vs LangChain PromptTemplate vs Semantic Kernel 模板函数的声明-实例化边界。
      en: Declaration-instantiation boundary among MCP Prompt/Resource capability, LangChain PromptTemplate, Semantic Kernel template functions.
      ja: MCP Prompt/Resource、LangChain PromptTemplate、Semantic Kernel テンプレート関数の宣言-インスタンス化境界。
    field_values:
      discovery_method: resources/list
    related_node_ids: [ResourceCapabilityDefinition, ResourceDefinition]
    related_relation_ids: [ResourceCapabilityDefinition-is_a-CapabilityDefinition]

    source_claims: [mcp-resource-list, mcp-resource-read]
  - id: resource-capability-instance-readme

    labels:
      zh: README Resource 实例
      en: README Resource instance
      ja: README Resource instance

    descriptions:
      zh: "MCP 实例：prompts/get name=summarize arguments={text:\"long article...\"} 返回 messages；resources/read uri=file:///data/config.json。"
      en: "MCP instance: prompts/get name=summarize arguments={text:\"long article...\"} returns messages; resources/read uri=file:///data/config.json."
      ja: MCP 実例：prompts/get name=summarize。resources/read uri=file:///data/config.json。
    field_values:
      source_server: mcp://files
      resource_kind: Resource
      capability_id: file:///project/README.md
      source_protocol: MCP
      source_kind: Resource
      definition_revision: "1"
      discovery_method: resources/list
    related_node_ids: [ResourceCapabilityDefinition, ResourceDefinition]
    related_relation_ids: [ResourceCapabilityDefinition-is_a-CapabilityDefinition]

    source_claims: [mcp-resource-record, mcp-resource-list]
parent_relation:
  id: ResourceCapabilityDefinition-is_a-CapabilityDefinition
  predicate: is_a
  target: concept:CapabilityDefinition
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是能力定义 profile 的一种
    en: is a kind of capability definition profile
    ja: 能力定義 profile の一種である
  definition:
    zh: ResourceCapabilityDefinition 是保留 Resource 与 ResourceTemplate 差异的本地能力定义总类。
    en: ResourceCapabilityDefinition is a local capability-definition umbrella that preserves Resource and ResourceTemplate differences.
    ja: ResourceCapabilityDefinition は Resource と ResourceTemplate の差異を保持するローカル capability-definition umbrella である。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 具有子类型
      en: has subtype
      ja: subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: This is a Moonweave taxonomy edge and not a Resource or ResourceTemplate wire-type inheritance relation.
  constraints:
    - id: resource-umbrella-taxonomy-is-local
      severity: error
      expression_language: plain
      expression: The umbrella relation is local taxonomy and must not claim MCP defines ResourceCapabilityDefinition as a native parent type.
      explanation:
        zh: MCP 明确命名 Resource 和 ResourceTemplate，但未定义该总类。
        en: MCP names Resource and ResourceTemplate explicitly but does not define this umbrella parent.
        ja: MCP は Resource と ResourceTemplate を明示的に名付けるが、この umbrella parent は定義しない。
      source_claims: [moonweave-resource-capability-taxonomy]
  examples: []
  source_claims: [moonweave-resource-capability-taxonomy]
  distinct_fact_rationale:
    zh: 该边组织本地比较，而不改变 MCP 的具体记录类型。
    en: This edge organizes local comparison and does not alter MCP's concrete record kinds.
    ja: この edge はローカル比較を整理し、MCP の具体的な record kind を変更しない。
relations: []
sources:
  - id: mcp-resources-2025-11-25
    title: Model Context Protocol Specification — Resources
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
    version: 2025-11-25
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Defines resources capability, Resource records, ResourceTemplate records, and methods.
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: design-inference
    relevance: Defines the local resource umbrella profile and taxonomy.
source_claims:
  - id: mcp-resource-capability
    source: mcp-resources-2025-11-25
    supports: Servers that support resources declare resources capability during initialization.
    locator: "Capabilities"
    evidence_kind: normative
    confidence: high
  - id: mcp-resource-list
    source: mcp-resources-2025-11-25
    supports: Clients use resources/list to retrieve available Resource records.
    locator: "Listing Resources"
    evidence_kind: normative
    confidence: high
  - id: mcp-resource-template-list
    source: mcp-resources-2025-11-25
    supports: Clients use resources/templates/list to retrieve ResourceTemplate records.
    locator: "Resource Templates"
    evidence_kind: normative
    confidence: high
  - id: mcp-resource-read
    source: mcp-resources-2025-11-25
    supports: Clients use resources/read with a URI and receive resource contents.
    locator: "Reading Resources"
    evidence_kind: normative
    confidence: high
  - id: mcp-resource-record
    source: mcp-resources-2025-11-25
    supports: An MCP Resource record includes uri, name, optional title, description, icons, mimeType, and size.
    locator: "Resource"
    evidence_kind: normative
    confidence: high
  - id: mcp-resource-template-record
    source: mcp-resources-2025-11-25
    supports: An MCP ResourceTemplate record uses uriTemplate and may include name, title, description, mimeType, and icons.
    locator: "Resource Templates"
    evidence_kind: normative
    confidence: high
  - id: moonweave-resource-capability-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave classifies ResourceCapabilityDefinition under CapabilityDefinition as a local umbrella taxonomy edge.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high