schema: moonweave.ai/ontology-node/v1
id: ResourceCapabilityDefinition
kind: concept
status: review
labels:
  zh: 资源能力定义
  en: resource capability definition
  ja: リソース能力定義
semantics:
  short_definition:
    zh: 资源能力定义是具体资源与资源 URI 模板共享的可发现元数据规范。
    en: A ResourceCapabilityDefinition is the shared discoverable-metadata specification for concrete resources and resource URI templates.
    ja: ResourceCapabilityDefinition は具体 resource と resource URI template が共有する発見可能 metadata 仕様です。
  definition:
    zh: 资源能力定义是一种 CapabilityDefinition，复用上位 capability_definition_id 与版本信息，并承载具体资源和资源模板共同拥有的程序名称、显示标题、描述、图标、媒体类型提示与使用注解。它不再引入同义 resource_capability_definition_id，也不预设固定 URI 或 URI Template。
    en: A ResourceCapabilityDefinition is a CapabilityDefinition that reuses the inherited capability_definition_id and version information while carrying the programmatic name, display title, description, icons, media-type hint, and usage annotations shared by concrete resources and templates. It introduces no synonymous resource_capability_definition_id and preselects neither a fixed URI nor a URI Template.
    ja: ResourceCapabilityDefinition は継承した capability_definition_id と版情報を再利用し、具体 resource と template が共有する programmatic name、display title、description、icon、media-type hint、usage annotation を保持します。同義 resource_capability_definition_id、fixed URI、URI Template を導入しません。
  why_needed:
    zh: MCP 的 Resource 与 ResourceTemplate 共享名称和展示元数据，却分别使用 uri 与 uriTemplate；把共同信息上移后，可以复用元数据而不迫使模板继承具体 URI。
    en: MCP Resource and ResourceTemplate share naming and display metadata but use uri and uriTemplate respectively. Moving only the common information upward preserves reuse without forcing a template to inherit a concrete URI.
    ja: MCP Resource と ResourceTemplate は名称・表示 metadata を共有する一方 uri と uriTemplate を別々に使います。共通情報だけを上位化すれば template に concrete URI を継承させず再利用できます。
  includes:
    - zh: 纳入资源声明跨两种寻址形式共享的定义标识、版本、name、title、description、icons、mimeType 和 annotations。
      en: Includes definition identity, version, name, title, description, icons, mimeType, and annotations shared across the two resource-addressing forms.
      ja: 二つの resource addressing 形式で共有する definition ID、version、name、title、description、icons、mimeType、annotations を含みます。
  excludes:
    - zh: 排除具体 uri、uriTemplate、模板变量、资源内容、读取活动、订阅状态和一次列表响应页。
      en: Excludes a concrete uri, uriTemplate, template variables, resource contents, read activities, subscription state, and one list-response page.
      ja: concrete uri、uriTemplate、template variable、resource content、read activity、subscription state、一回の list-response page を除きます。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: title
      labels:
        zh: 显示标题
        en: display title
        ja: 表示タイトル
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 面向最终用户、比程序名称更易读的可选标题。
        en: Optional end-user-facing title optimized for readability beyond the programmatic name.
        ja: programmatic name より人間可読な任意 end-user-facing title です。
      allowed_values: []
      pattern: null
      example_value: Moonweave Ontology Manual
      source_claims:
        - claim-resource-capability-definition-002
    - id: description
      labels:
        zh: 资源描述
        en: resource description
        ja: resource 説明
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 说明资源或模板代表什么以及客户端何时应使用它。
        en: Explains what the resource or template represents and when a client should use it.
        ja: resource/template が何を表し client がいつ使うかを説明します。
      allowed_values: []
      pattern: null
      example_value: Reviewed ontology engineering manual
      source_claims:
        - claim-resource-capability-definition-003
    - id: icons
      labels:
        zh: 图标
        en: icons
        ja: icons
      datatype: array
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 供客户端可信地显示该资源能力的一组可选尺寸化图标。
        en: Optional set of sized icons that a client may safely display for this resource capability.
        ja: client が resource capability のため安全に表示できる任意 sized icon 集合です。
      allowed_values: []
      pattern: null
      example_value:
        - src: https://moonweave.ai/icons/manual.png
          mimeType: image/png
          sizes:
            - 48x48
      source_claims:
        - claim-resource-capability-definition-004
    - id: mime_type
      labels:
        zh: 媒体类型提示
        en: media-type hint
        ja: media-type hint
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 具体资源的已知 MIME 类型，或模板所有匹配资源共同拥有的 MIME 类型提示。
        en: Known MIME type of a concrete resource or a hint shared by every resource matching a template.
        ja: concrete resource の既知 MIME type、または template に一致する全 resource が共有する MIME type hint です。
      allowed_values: []
      pattern: null
      example_value: text/markdown
      source_claims:
        - claim-resource-capability-definition-005
    - id: annotations
      labels:
        zh: 使用注解
        en: usage annotations
        ja: 利用 annotation
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 保存 audience、priority 与 lastModified 等客户端使用提示，不把提示当作授权决定。
        en: Stores client hints such as audience, priority, and lastModified without treating those hints as authorization decisions.
        ja: audience、priority、lastModified など client hint を保持し、authorization decision として扱いません。
      allowed_values: []
      pattern: null
      example_value:
        audience:
          - assistant
        priority: 0.8
        lastModified: 2026-07-16T04:00:00Z
      source_claims:
        - claim-resource-capability-definition-006
  constraints: []
  required_relation_constraints: []
examples:
  - id: ResourceCapabilityDefinition-example-positive-manual-001
    kind: positive
    labels:
      zh: 资源共享元数据正例
      en: Shared resource metadata positive case
      ja: 共有 resource metadata 正例
    scenario_id: null
    descriptions:
      zh: "`capdef:resource:docs/manual@2.0.0` 声明程序名称 manual、显示标题、Markdown 媒体类型、图标和 assistant audience；具体子型随后分别增加 `docs://manual` 或 `docs://{section}`，共同元数据不预先选择寻址形式。"
      en: "`capdef:resource:docs/manual@2.0.0` declares the programmatic name manual, a display title, Markdown media type, icon, and assistant audience. A concrete subtype later adds either `docs://manual` or `docs://{section}` without the shared metadata preselecting an addressing form."
      ja: "`capdef:resource:docs/manual@2.0.0` は name=manual、display title、Markdown media type、icon、assistant audience を宣言し、concrete subtype が後で `docs://manual` または `docs://{section}` を追加します。共有 metadata は addressing 形式を先決しません。"
    field_values:
      capability_definition_id: capdef:resource:docs/manual
      version: 2.0.0
      name: manual
      title: Moonweave Ontology Manual
      description: Reviewed ontology engineering manual
      icons:
        - src: https://moonweave.ai/icons/manual.png
          mimeType: image/png
          sizes:
            - 48x48
      mime_type: text/markdown
      annotations:
        audience:
          - assistant
        priority: 0.8
        lastModified: 2026-07-16T04:00:00Z
    related_node_ids:
      - ResourceCapabilityDefinition
      - CapabilityDefinition
      - ResourceDefinition
      - ResourceTemplate
    related_relation_ids:
      - ResourceCapabilityDefinition-is_a-CapabilityDefinition
      - ResourceDefinition-is_a-ResourceCapabilityDefinition
      - ResourceTemplate-is_a-ResourceCapabilityDefinition
    expected_result:
      zh: 共享元数据只实例化一次，并由两个 sibling 子型继承；固定 URI 与 URI Template 不会同时成为必填。
      en: Shared metadata is represented once and inherited by the two sibling subtypes; fixed URI and URI Template never become jointly required.
      ja: 共有 metadata は一度だけ表現され二 sibling subtype に継承され、fixed URI と URI Template が同時必須になりません。
    why_valid_or_invalid:
      zh: 该记录具备稳定身份、版本和 MCP 两种资源描述共同拥有的字段，同时没有越权声明任何具体寻址方式。
      en: The record has stable identity, version, and fields shared by both MCP resource descriptions without prematurely asserting either concrete addressing form.
      ja: 安定 identity、version、両 MCP resource description の共有 field を持ち、どちらの concrete addressing 形式も早期に主張しないためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-resource-capability-definition-007
  - id: ResourceCapabilityDefinition-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 读取结果不是共享资源定义
      en: Read result is not shared resource metadata
      ja: read result は共有 resource metadata ではない
    scenario_id: null
    descriptions:
      zh: "`resources/read` 返回 `docs://manual` 的一段 Markdown 文本和接收时间；它是一次读取结果，没有稳定定义版本，也不应归为 ResourceCapabilityDefinition。"
      en: "`resources/read` returns a Markdown content item and receipt time for `docs://manual`. It is one read result without a stable definition revision and is not a ResourceCapabilityDefinition."
      ja: "`resources/read` が `docs://manual` の Markdown content と receipt time を返します。一回の read result で安定定義版を持たず ResourceCapabilityDefinition ではありません。"
    field_values:
      request_id: resource-read-088
      contents:
        - uri: docs://manual
          text: "# Manual"
      received_at: 2026-07-16T04:05:00Z
    related_node_ids:
      - ResourceCapabilityDefinition
      - ResourceReadResult
    related_relation_ids: []
    expected_result:
      zh: 保留 ResourceReadResult，不创建 ResourceCapabilityDefinition。
      en: Retain ResourceReadResult and create no ResourceCapabilityDefinition.
      ja: ResourceReadResult を保持し ResourceCapabilityDefinition を作りません。
    why_valid_or_invalid:
      zh: 内容和接收时间属于一次运行结果，不能替代跨请求稳定的定义身份、版本和发现元数据。
      en: Content and receipt time belong to one runtime result and cannot replace stable cross-request definition identity, version, and discovery metadata.
      ja: content と receipt time は一回の runtime result に属し、cross-request の安定 definition identity、version、discovery metadata を代替できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-resource-capability-definition-008
external_mappings: []
applicability:
  - core
sibling_differentiation: []
