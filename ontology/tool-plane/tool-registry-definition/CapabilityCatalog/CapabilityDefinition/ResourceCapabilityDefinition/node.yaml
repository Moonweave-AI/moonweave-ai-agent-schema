        en: A stable definition carries resource name, title, description, icons, media type, and annotations without yet claiming either a concrete URI or a URI template.
        ja: stable definition が name、title、description、icons、media type、annotations を持ち、concrete URI か URI template かはまだ主張しません。
      field_values:
