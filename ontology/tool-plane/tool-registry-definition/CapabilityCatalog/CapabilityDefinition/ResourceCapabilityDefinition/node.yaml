source_claims:
  - id: claim-resource-capability-definition-001
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 defines Resource and ResourceTemplate as sibling protocol records that share name, optional title, description, icons, mimeType, and annotations but differ in uri versus uriTemplate. ResourceCapabilityDefinition is Moonweave's shared metadata abstraction over that official split.
    locator: MCP 2025-11-25 > Schema Reference > resources/list > Resource; resources/templates/list > ResourceTemplate
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-resource-capability-definition-002
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 defines optional title on Resource and ResourceTemplate for human-readable display.
    locator: MCP 2025-11-25 > Schema Reference > BaseMetadata.title inherited by Resource and ResourceTemplate
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-resource-capability-definition-003
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 defines optional description on Resource and ResourceTemplate as a hint that can improve client and model understanding.
    locator: MCP 2025-11-25 > Schema Reference > Resource.description and ResourceTemplate.description
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-resource-capability-definition-004
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 defines optional Icon arrays on Resource and ResourceTemplate, including src, mimeType, sizes, and display-security guidance.
    locator: MCP 2025-11-25 > Schema Reference > Icon; Resource.icons; ResourceTemplate.icons
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-resource-capability-definition-005
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 defines optional mimeType on Resource and permits it on ResourceTemplate only when all matching resources share that type.
    locator: MCP 2025-11-25 > Schema Reference > Resource.mimeType and ResourceTemplate.mimeType
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-resource-capability-definition-006
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 defines optional Annotations with audience, priority, and lastModified for resources and resource templates as client usage or display hints.
    locator: MCP 2025-11-25 > Schema Reference > Annotations; Server Features > Resources > Annotations
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-resource-capability-definition-007
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 gives Resource and ResourceTemplate the same BaseMetadata, icons, description, mimeType, and annotations surfaces while assigning uri only to Resource and uriTemplate only to ResourceTemplate. This case preserves exactly that shared-versus-distinct boundary.
    locator: MCP 2025-11-25 > Schema Reference > Resource and ResourceTemplate
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-resource-capability-definition-008
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 separates Resource and ResourceTemplate discovery records from ReadResourceResult contents. This boundary case applies that protocol distinction directly.
    locator: MCP 2025-11-25 > Schema Reference > Resource, ResourceTemplate, and ReadResourceResult
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-resource-capability-definition-009
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 gives Resource and ResourceTemplate the same discovery metadata while keeping their addressing fields distinct. The common genus is a reviewed Moonweave design inference.
    locator: MCP 2025-11-25 > Schema Reference > Resource; ResourceTemplate
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-resource-capability-definition-010
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 separates returned ResourceContents from resource declarations and templates.
    locator: MCP 2025-11-25 > Schema Reference > ReadResourceResult; Resource; ResourceTemplate
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-resource-capability-definition-011
    source: eng-proto-mcp-2025-spec
    supports: Resource and ResourceTemplate share discoverability metadata but have different addressing discriminators; Moonweave models that common contract as a CapabilityDefinition subtype.
    locator: MCP 2025-11-25 > Schema Reference > Resource; ResourceTemplate
    evidence_kind: design-inference
    confidence: high
    review_status: pending
