  method: manual-semantic
  reviewer: manual-tool-spec-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 MCP 2025-11-25、OpenAI function calling、Anthropic tool use 与 OpenAI Agents SDK 逐项核验概念定义、字段、关系与层级位置。
    en: Verified concept definitions, fields, relations, and hierarchy placement against MCP 2025-11-25, OpenAI function calling, Anthropic tool use, and the OpenAI Agents SDK.
    ja: MCP 2025-11-25、OpenAI function calling、Anthropic tool use、OpenAI Agents SDK に照らし概念定義・フィールド・関係・階層位置を個別検証しました。
  sections:
