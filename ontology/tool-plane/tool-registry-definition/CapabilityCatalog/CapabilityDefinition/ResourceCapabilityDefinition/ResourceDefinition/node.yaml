schema: moonweave.ai/ontology-node/v1
id: ResourceDefinition
kind: concept
labels:
  zh: MCP Resource 定义 profile
  en: MCP Resource definition profile
  ja: MCP Resource 定義 profile
semantics:
  short_definition:
    zh: 对具体 MCP Resource 记录的兼容定义 profile。
    en: A compatibility definition profile for a concrete MCP Resource record.
    ja: 具体的な MCP Resource record の compatibility 定義 profile。
  definition:
    zh: >
      ResourceDefinition 是为保留兼容 ID 而设置的本地 profile；它对应 MCP 标准名称 Resource。一个 Resource 以 uri
      唯一标识，包含 name，并可包含 title、description、icons、mimeType 和 size。客户端以 resources/list 发现记录，
      再以 resources/read 的 uri 读取内容。ResourceDefinition 不是额外的 MCP wire type。
    en: >
      ResourceDefinition is a local profile retained for compatibility and aligned to the MCP
      standard name Resource. A Resource is uniquely identified by uri, includes name, and may
      include title, description, icons, mimeType, and size. Clients discover records with
      resources/list and read content using the uri with resources/read. ResourceDefinition is not
      an additional MCP wire type.
    ja: >
      ResourceDefinition は compatibility のために保持されたローカル profile であり、MCP の標準名 Resource に整合する。
      Resource は uri で一意に識別され、name を含み、title、description、icons、mimeType、size を持ち得る。client は
      resources/list で record を発見し、resources/read の uri で content を読む。ResourceDefinition は追加の MCP wire type ではない。
  why_needed:
    zh: 具体资源的身份和元数据应在读取内容前可发现，并与参数化模板保持区分。
    en: Concrete resource identity and metadata should be discoverable before content is read and remain distinct from parameterized templates.
    ja: 具体 resource の identity と metadata は content を読む前に発見可能であり、parameterized template と区別されるべきである。
  includes:
    - zh: Resource 的 uri、name 和可选展示与 MIME 元数据。
      en: Resource uri, name, and optional display and MIME metadata.
      ja: Resource の uri、name、任意の display と MIME metadata。
    - zh: resources/list 发现和 resources/read 读取的边界。
      en: The boundary between resources/list discovery and resources/read retrieval.
      ja: resources/list discovery と resources/read retrieval の境界。
  excludes:
    - zh: URI 模板或对模板变量的解释。
      en: A URI template or interpretation of template variables.
      ja: URI template または template variable の解釈。
    - zh: 单次读取返回的 text 或 blob 数据。
      en: Text or blob data returned by one read.
      ja: 一回の read が返す text または blob data。
  semantic_kind: protocol-aligned-profile
  aliases:
    - language: en
      value: MCP Resource profile
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      Resource 记录是列表数据而不是内容载荷。服务器对 resources/read 的响应在 contents 数组中返回与 uri 对应的
      text 或 blob；本 profile 记录可发现的 Resource 定义，不能缓存后把一次内容误当成资源身份。
    en: >
      A Resource record is list data rather than a content payload. A server returns text or blob
      associated with uri in the contents array of a resources/read response; this profile records
      the discoverable Resource definition and cannot mistake one cached content response for resource identity.
    ja: >
      Resource record は content payload ではなく list data である。server は resources/read response の contents array に
      uri に関連する text または blob を返す。この profile は発見可能な Resource definition を記録し、一回の cache した
      content response を resource identity と誤認できない。
  typical_input:
    - description:
        zh: 读取 README Resource 的 MCP 请求。
        en: An MCP request to read a README Resource.
        ja: README Resource を読む MCP request。
      format: |
        {"jsonrpc":"2.0","id":2,"method":"resources/read","params":{"uri":"file:///project/README.md"}}
      source_claims: [mcp-resource-read-for-definition]
  typical_output:
    - description:
        zh: 返回文本内容的资源读取结果。
        en: A resource-read result returning text content.
        ja: text content を返す resource-read result。
      format: |
        {"contents":[{"uri":"file:///project/README.md","mimeType":"text/markdown","text":"# Project"}]}
      source_claims: [mcp-resource-read-for-definition]
  reference_implementations:
    - name: MCP Resources
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
      description: Defines concrete Resource record fields and resources/read content forms.
structure:
  identity_keys: [capability_id, source_protocol, source_kind, definition_revision, source_server, resource_kind, uri]
  fields:
    - id: uri
      labels:
        zh: 资源 URI
        en: Resource URI
        ja: Resource URI
      definitions:
        zh: MCP Resource 的唯一标识符，并用于 resources/read。
        en: The unique identifier of an MCP Resource and the value used by resources/read.
        ja: MCP Resource の一意な識別子であり、resources/read が使う値。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: URI
      example_value: file:///project/README.md
      allowed_values: []
      source_claims: [mcp-resource-record-for-definition, mcp-resource-read-for-definition]
    - id: name
      labels:
        zh: 资源名称
        en: Resource name
        ja: Resource 名
      definitions:
        zh: Resource 的名称。
        en: The name of the Resource.
        ja: Resource の name。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: README.md
      allowed_values: []
      source_claims: [mcp-resource-record-for-definition]
    - id: mime_type
      labels:
        zh: MIME 类型
        en: MIME type
        ja: MIME type
      definitions:
        zh: Resource 的可选 MIME 类型。
        en: The optional MIME type of the Resource.
        ja: Resource の任意 MIME type。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: text/markdown
      allowed_values: []
      source_claims: [mcp-resource-record-for-definition]
    - id: size
      labels:
        zh: 资源大小
        en: Resource size
        ja: Resource size
      definitions:
        zh: Resource 的可选字节大小元数据。
        en: Optional resource size metadata in bytes.
        ja: byte 単位の任意 Resource size metadata。
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: 2840
      allowed_values: []
      source_claims: [mcp-resource-record-for-definition]
    - id: source_server
      labels:
        zh: 来源服务器引用
        en: Source server reference
        ja: source server reference
      definitions:
        zh: 暴露该 Resource 的 MCP 服务器。
        en: The MCP server exposing this Resource.
        ja: この Resource を expose する MCP server。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: mcp://files
      allowed_values: []
      source_claims: [mcp-resource-record-for-definition]
    - id: resource_kind
      labels:
        zh: 资源记录种类
        en: Resource record kind
        ja: resource record kind
      definitions:
        zh: 标识来源是具体 Resource 还是参数化 ResourceTemplate。
        en: Identifies whether the source is a concrete Resource or a parameterized ResourceTemplate.
        ja: source が具体的な Resource か parameterized ResourceTemplate かを識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: ResourceTemplate
      allowed_values: [Resource, ResourceTemplate]
      source_claims: [moonweave-resource-definition-taxonomy]
    - id: source_ref
      labels:
        zh: 来源记录引用
        en: Source-record reference
        ja: source-record reference
      definitions:
        zh: 保持原始 URI 或 URI template 及其协议来源的引用。
        en: A reference retaining the original URI or URI template and its protocol provenance.
        ja: 元の URI または URI template とその protocol provenance を保持する reference。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: file:///{path}
      allowed_values: []
      source_claims: [moonweave-resource-definition-taxonomy]
    - id: discovery_method
      labels:
        zh: 发现方法
        en: Discovery method
        ja: discovery method
      definitions:
        zh: 产生记录的标准 MCP 列表方法。
        en: The standard MCP list method that produces the record.
        ja: record を生成する標準 MCP list method。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: resources/templates/list
      allowed_values: [resources/list, resources/templates/list]
      source_claims: [moonweave-resource-definition-taxonomy]
    - id: definition_revision
      labels:
        zh: 能力定义 profile 版本
        en: capability-definition profile version
        ja: capability-definition profile version
      definitions:
        zh: 标识此不可变本地 能力定义 profile 版本；变更必须创建新版本，不得就地修改。
        en: Identifies this immutable local capability-definition profile version; a change must create a new version rather than mutate it in place.
        ja: この不変ローカル capability-definition profile version を識別する。変更は in-place で mutate せず新 version を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "1"
      allowed_values: []
      source_claims: [moonweave-resource-definition-taxonomy]
    - id: catalog_revision_ref
      labels:
        zh: 能力目录修订引用
        en: capability catalog revision reference
        ja: capability catalog revision reference
      definitions:
        zh: 标识拥有此 能力定义 profile 版本 的不可变 能力目录修订；该组成部分在父修订外无效，删除父修订只删除本地 profile，不删除 MCP、OpenAI 或应用配置来源记录。
        en: Identifies the immutable capability catalog revision that owns this capability-definition profile version; the component is invalid outside that parent revision, and deleting the parent revision deletes only local profiles, not MCP, OpenAI, or application-configuration source records.
        ja: この capability-definition profile version を所有する不変 capability catalog revision を識別する。component は parent revision 外では無効で、parent revision を削除してもローカル profile だけが削除され、MCP、OpenAI、application-configuration の source record は削除されない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: capabilitycatalog@1
      allowed_values: []
      source_claims: [moonweave-resource-definition-taxonomy]
    - id: capability_id
      labels:
        zh: 能力标识符
        en: Capability identifier
        ja: 能力識別子
      definitions:
        zh: 在其来源范围内定位记录的名称或标识符。
        en: The name or identifier that locates the record within its source scope.
        ja: source scope 内で記録を特定する名前または識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: code_review
      allowed_values: []
      source_claims: [moonweave-resource-definition-taxonomy]
    - id: source_protocol
      labels:
        zh: 来源协议
        en: Source protocol
        ja: source protocol
      definitions:
        zh: 指示该记录来自 MCP、OpenAI 应用配置或其他明确来源。
        en: Indicates whether the record comes from MCP, an OpenAI application configuration, or another declared source.
        ja: 記録が MCP、OpenAI application configuration、または別の明示された source のどれから来るかを示す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: MCP
      allowed_values: [MCP, OpenAI]
      source_claims: [moonweave-resource-definition-taxonomy]
    - id: source_kind
      labels:
        zh: 来源记录类型
        en: Source record kind
        ja: source record kind
      definitions:
        zh: 记录来源的标准术语，如 Tool、Prompt、Resource、ResourceTemplate 或 function。
        en: The source's standard term, such as Tool, Prompt, Resource, ResourceTemplate, or function.
        ja: Tool、Prompt、Resource、ResourceTemplate、function など source の標準用語。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Prompt
      allowed_values: [Tool, Prompt, Resource, ResourceTemplate, function]
      source_claims: [moonweave-resource-definition-taxonomy]
    - id: contract_summary
      labels:
        zh: 契约摘要
        en: Contract summary
        ja: 契約要約
      definitions:
        zh: 指向来源定义字段的不可替代摘要，而不是重写后的协议 payload。
        en: A non-substituting summary pointing to source definition fields, not a rewritten protocol payload.
        ja: source definition field を指す、置換しない要約であり、書き換えた protocol payload ではない。
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: '{"input_field":"arguments","source_uri":"mcp://server/prompts/code_review"}'
      allowed_values: []
      source_claims: [moonweave-resource-definition-taxonomy]
  constraints:
    - id: resource-uri-is-not-template
      severity: error
      expression_language: plain
      expression: uri must identify a concrete Resource and must not be replaced with a ResourceTemplate uriTemplate.
      explanation:
        zh: 具体资源以 URI 读取，参数化资源使用不同的 uriTemplate 字段。
        en: A concrete Resource is read by URI, while a parameterized resource uses the separate uriTemplate field.
        ja: 具体 Resource は URI で read され、parameterized resource は別の uriTemplate field を使う。
      source_claims: [mcp-resource-record-for-definition]
    - id: resource-definition-inherits-parent-required-fields
      severity: error
      expression_language: plain
      expression: "All inherited required ResourceCapabilityDefinition fields are fields of this same record; the is_a subtype does not establish or reference a second ResourceCapabilityDefinition record."
      explanation: {zh: "所有继承的 ResourceCapabilityDefinition 必需字段属于同一记录，该 is_a 子类型不建立或引用第二条 ResourceCapabilityDefinition 记录。", en: "Inherited required fields stay on the same record rather than creating a second parent record.", ja: "継承された必須 ResourceCapabilityDefinition フィールドは同じレコードに属し、この is_a 下位型は 2 番目の親レコードを作成または参照しない。"}
      source_claims: [moonweave-resource-definition-taxonomy]
  required_relations: []
examples:
  - id: resource-definition-positive-readme

    labels:
      zh: README 资源
      en: README Resource
      ja: README Resource

    descriptions:
      zh: "Semantic Kernel PromptTemplate 与 kernel.invoke(function_name,args)；LangChain PromptTemplate.format()；MCP prompts/get name=code_review arguments={code:\"...\"}。"
      en: "Semantic Kernel PromptTemplate and kernel.invoke(function_name,args); LangChain PromptTemplate.format(); MCP prompts/get name=code_review arguments={code:\"...\"}."
      ja: Semantic Kernel PromptTemplate。LangChain PromptTemplate.format()。MCP prompts/get name=code_review。
    field_values:
      uri: file:///project/README.md
      name: README.md
      source_server: mcp://files
      resource_kind: Resource
      capability_id: file:///project/README.md
      source_protocol: MCP
      source_kind: Resource
      definition_revision: "1"
    related_node_ids: [ResourceDefinition]
    related_relation_ids: [ResourceDefinition-is_a-ResourceCapabilityDefinition]

    source_claims: [mcp-resource-record-for-definition]
  - id: resource-definition-counterexample-template-as-resource

    labels:
      zh: URI 模板伪装为具体资源
      en: URI template posed as concrete Resource
      ja: URI template を具体 Resource と偽装する例

    descriptions:
      zh: 反例：MCP resources/read uri 未订阅就假定内容可用；Semantic Kernel prompt 参数未验证即实例化。
      en: Counterexample: assuming MCP resources/read uri content without subscription; Semantic Kernel prompt instantiated without argument validation.
      ja: 反例：MCP resources/read uri 未購読で内容可用を仮定。Semantic Kernel prompt 引数未検証でインスタンス化。
    field_values:
      uri: file:///{path}
    related_node_ids: [ResourceDefinition, ResourceTemplate]
    related_relation_ids: [ResourceDefinition-is_a-ResourceCapabilityDefinition]

    source_claims: [mcp-resource-record-for-definition, mcp-resource-template-record-for-definition]
  - id: resource-definition-boundary-metadata-and-content

    labels:
      zh: 资源元数据与内容边界
      en: Boundary between Resource metadata and content
      ja: Resource metadata と content の境界

    descriptions:
      zh: MCP Prompt/Resource 能力 vs LangChain PromptTemplate vs Semantic Kernel 模板函数的声明-实例化边界。
      en: Declaration-instantiation boundary among MCP Prompt/Resource capability, LangChain PromptTemplate, Semantic Kernel template functions.
      ja: MCP Prompt/Resource、LangChain PromptTemplate、Semantic Kernel テンプレート関数の宣言-インスタンス化境界。
    field_values:
      uri: file:///project/README.md
    related_node_ids: [ResourceDefinition]
    related_relation_ids: [ResourceDefinition-is_a-ResourceCapabilityDefinition]

    source_claims: [mcp-resource-read-for-definition]
  - id: resource-definition-instance-project-readme

    labels:
      zh: 项目 README 实例
      en: Project README instance
      ja: project README instance

    descriptions:
      zh: "MCP 实例：prompts/get name=summarize arguments={text:\"long article...\"} 返回 messages；resources/read uri=file:///data/config.json。"
      en: "MCP instance: prompts/get name=summarize arguments={text:\"long article...\"} returns messages; resources/read uri=file:///data/config.json."
      ja: MCP 実例：prompts/get name=summarize。resources/read uri=file:///data/config.json。
    field_values:
      source_server: mcp://files
      mime_type: text/markdown
      resource_kind: Resource
      capability_id: file:///project/README.md
      source_protocol: MCP
      source_kind: Resource
      definition_revision: "1"
    related_node_ids: [ResourceDefinition]
    related_relation_ids: [ResourceDefinition-is_a-ResourceCapabilityDefinition]

    source_claims: [mcp-resource-record-for-definition]
parent_relation:
  id: ResourceDefinition-is_a-ResourceCapabilityDefinition
  predicate: is_a
  target: concept:ResourceCapabilityDefinition
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是资源能力定义 profile 的一种具体资源 profile
    en: is a concrete-resource profile within the resource capability definition profile
    ja: リソース能力定義 profile 内の具体 resource profile である
  definition:
    zh: ResourceDefinition 在本地 umbrella 中专门表达具体 MCP Resource 记录。
    en: ResourceDefinition expresses a concrete MCP Resource record within the local umbrella.
    ja: ResourceDefinition はローカル umbrella 内で具体的な MCP Resource record を表す。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 具有子类型
      en: has subtype
      ja: subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: This is a Moonweave taxonomy relation and does not rename the MCP Resource record.
  constraints:
    - id: resource-profile-taxonomy-is-local
      severity: error
      expression_language: plain
      expression: The local subtype relation must preserve that MCP names the wire record Resource, not ResourceDefinition.
      explanation:
        zh: 兼容 ID 不得覆盖标准协议名称。
        en: A compatibility ID must not overwrite the standard protocol name.
        ja: compatibility ID は standard protocol name を上書きしてはならない。
      source_claims: [moonweave-resource-definition-taxonomy]
  examples: []
  source_claims: [moonweave-resource-definition-taxonomy]
  distinct_fact_rationale:
    zh: 本地 taxonomy 用于导航，标准 Resource 字段仍由 MCP 定义。
    en: The local taxonomy supports navigation while MCP still defines standard Resource fields.
    ja: ローカル taxonomy は navigation を支え、標準 Resource field はなお MCP が定義する。
relations: []
sources:
  - id: mcp-resources-2025-11-25
    title: Model Context Protocol Specification — Resources
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
    version: 2025-11-25
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Defines concrete Resource records and resources/read behavior.
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: design-inference
    relevance: Defines compatibility naming and local taxonomy placement.
source_claims:
  - id: mcp-resource-record-for-definition
    source: mcp-resources-2025-11-25
    supports: An MCP Resource record includes uri, name, optional title, description, icons, mimeType, and size.
    locator: "Resource"
    evidence_kind: normative
    confidence: high
  - id: mcp-resource-read-for-definition
    source: mcp-resources-2025-11-25
    supports: resources/read takes a URI and returns contents containing URI, MIME type, and text or blob data.
    locator: "Reading Resources; Resource Contents"
    evidence_kind: normative
    confidence: high
  - id: mcp-resource-template-record-for-definition
    source: mcp-resources-2025-11-25
    supports: ResourceTemplate records use uriTemplate rather than the concrete Resource uri field.
    locator: "Resource Templates"
    evidence_kind: normative
    confidence: high
  - id: moonweave-resource-definition-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave classifies ResourceDefinition under ResourceCapabilityDefinition as a local compatibility taxonomy edge.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high