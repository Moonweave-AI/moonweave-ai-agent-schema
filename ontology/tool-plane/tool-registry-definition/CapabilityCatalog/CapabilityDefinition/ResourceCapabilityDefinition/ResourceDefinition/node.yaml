schema: moonweave.ai/ontology-node/v1
id: ResourceDefinition
kind: concept
status: accepted
labels:
  zh: 资源定义
  en: Resource Definition
  ja: リソース定義
semantics:
  short_definition:
    zh: 资源定义声明一个可按 URI 发现和读取的上下文资源。
    en: A Resource Definition declares contextual data discoverable and readable by URI.
    ja: リソース定義は URI で発見・読取できる context resource を宣言します。
  definition:
    zh: 资源定义是一种 ResourceCapabilityDefinition，复用上位 capability_definition_id；具体资源 URI 是 MCP 协议寻址字段而不是第二套资源定义 ID。名称、标题、描述、图标、媒体类型和注解继承自共同上位类，本类只增加具体资源 URI 与可选原始字节大小；它不是 URI 模板、工具、订阅状态或一次读取返回的内容。
    en: A Resource Definition is a ResourceCapabilityDefinition that reuses the inherited capability_definition_id; its concrete resource URI is the MCP protocol address rather than a second resource-definition ID. Name, title, description, icons, media type, and annotations come from the shared parent; this subtype adds only the resource URI and optional raw byte size. It is not a URI template, tool, subscription state, or one read result.
    ja: ResourceDefinition は継承した capability_definition_id を再利用し、concrete resource URI を第二の resource-definition ID ではなく MCP protocol address として持ちます。共有 metadata を継承して resource URI と任意 raw byte size だけを追加し、URI template、tool、subscription state、一回の read result ではありません。
  why_needed:
    zh: 资源与工具共享可发现定义的抽象，却通过 URI 寻址和读取语义形成独立分支，避免被误写为 ToolSpecification。
    en: Resources share discoverable-definition abstraction with tools but form a separate URI-addressed read branch rather than being misclassified as ToolSpecification.
    ja: resource は tool と発見可能定義を共有しますが URI-addressed read 意味で別 branch となり ToolSpecification にはしません。
  includes:
    - zh: 纳入具有稳定联合身份、具体 URI、共同发现元数据和可选原始字节大小的可读取资源声明。
      en: Includes readable resource declarations with stable joint identity, a concrete URI, shared discovery metadata, and optional raw byte size.
      ja: 安定 joint identity、concrete URI、共有 discovery metadata、任意 raw byte size を持つ readable resource 宣言を含みます。
  excludes:
    - zh: 排除资源内容、订阅会话、ToolDefinition 和带变量的资源模板。
      en: Excludes resource content, subscription sessions, ToolDefinitions, and parameterized resource templates.
      ja: resource content、subscription session、ToolDefinition、parameterized template を除きます。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: uri
      labels:
        zh: 资源 URI
        en: resource URI
        ja: resource URI
      datatype: uri
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 资源 URI作为 ResourceDefinition 节点内部信息保存，不建立同名图节点。
        en: resource URI is stored as information on the ResourceDefinition node and does not create a namesake graph node.
        ja: resource URIは ResourceDefinition node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: docs://manual
      source_claims:
        - claim-resource-definition-002
    - id: size
      labels:
        zh: 原始字节大小
        en: raw byte size
        ja: raw byte size
      datatype: integer
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 资源原始内容在 base64 编码或 tokenization 之前的可选字节数。
        en: Optional size of the raw resource content in bytes before base64 encoding or tokenization.
        ja: base64 encoding や tokenization 前の raw resource content の任意 byte 数です。
      allowed_values: []
      pattern: null
      example_value: 18432
      source_claims:
        - claim-resource-definition-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: ResourceDefinition-example-positive-manual-001
    kind: positive
    labels:
      zh: ResourceDefinition 正例
      en: ResourceDefinition positive case
      ja: ResourceDefinition 正例
    scenario_id: null
    descriptions:
      zh: 服务器在 resources/list 中列出 `docs://manual`：持久定义复用 capability_definition_id，具体 URI 承担协议寻址，并携带名称、标题、说明、图标、媒体类型、注解与原始字节大小。
      en: "In resources/list, a server exposes `docs://manual`: the persisted definition reuses capability_definition_id, the concrete URI provides protocol addressing, and the record carries name, title, description, icons, media type, annotations, and raw byte size."
      ja: server は resources/list で `docs://manual` を提示し、persisted definition は capability_definition_id を再利用し、concrete URI が protocol address を担い、各 metadata と raw byte size を保持します。
    field_values:
      capability_definition_id: capdef:resource:docs/manual
      version: 2.0.0
      uri: docs://manual
      name: manual
      title: Moonweave Ontology Manual
      description: Reviewed ontology engineering manual
      icons:
        - src: https://moonweave.ai/icons/manual.png
          mimeType: image/png
          sizes:
            - 48x48
      mime_type: text/markdown
      annotations:
        audience:
          - assistant
        priority: 0.8
        lastModified: 2026-07-16T04:00:00Z
      size: 18432
    related_node_ids:
      - ResourceDefinition
      - ResourceCapabilityDefinition
    related_relation_ids:
      - ResourceDefinition-is_a-ResourceCapabilityDefinition
    expected_result:
      zh: 该声明归为 ResourceDefinition；共同发现元数据由 ResourceCapabilityDefinition 承担，本节点只增加具体 URI 与 size。
      en: Classify the declaration as ResourceDefinition; ResourceCapabilityDefinition carries shared discovery metadata while this node adds the concrete URI and size.
      ja: 宣言を ResourceDefinition とし、共有 discovery metadata は ResourceCapabilityDefinition、本 node は concrete URI と size を追加します。
    why_valid_or_invalid:
      zh: 稳定 URI 和读取合同跨多次访问持续存在。
      en: The stable URI and read contract persist across accesses.
      ja: 安定 URI と read contract が複数 access を越えて存続するためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-resource-definition-004
  - id: ResourceDefinition-example-boundary-manual-001
    kind: boundary
    labels:
      zh: ResourceDefinition 边界例
      en: ResourceDefinition boundary case
      ja: ResourceDefinition 境界例
    scenario_id: null
    descriptions:
      zh: resources/read 的响应携带 request ID、content URI、MIME 类型与当前文本；这些是一次读取的协议结果，而不是目录中的资源定义。
      en: A resources/read response carries a request ID, content URI, MIME type, and current text. Those fields identify one protocol read result rather than a catalog ResourceDefinition.
      ja: resources/read response は request ID、content URI、MIME type、現在 text を持ちますが、一回の protocol read result であり catalog ResourceDefinition ではありません。
    field_values:
      request_id: resource-read-088
      content_uri: docs://manual
      mime_type: text/markdown
      text: "# Moonweave Ontology Manual"
      received_at: 2026-07-16T04:05:00Z
    related_node_ids:
      - ResourceCapabilityDefinition
      - CapabilityDefinition
      - ResourceReadResult
    related_relation_ids:
      - ResourceCapabilityDefinition-is_a-CapabilityDefinition
    expected_result:
      zh: 返回对象属于资源内容，不是新的资源定义。
      en: The returned object is resource content, not a new ResourceDefinition.
      ja: 返却 object は resource content で新しい ResourceDefinition ではありません。
    why_valid_or_invalid:
      zh: 内容可随读取时刻变化，定义 URI 身份保持稳定。
      en: Content may vary by read time while definition URI identity remains stable.
      ja: content は read time で変化し definition URI identity は安定します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-resource-definition-005
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ResourceDefinition-is_a-ResourceCapabilityDefinition
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种资源能力定义
    en: is a resource capability definition
    ja: resource capability definition の一種
  definitions:
    zh: ResourceDefinition 是以 concrete URI 为必要种差、并可记录 raw byte size 的 ResourceCapabilityDefinition。
    en: ResourceDefinition is a ResourceCapabilityDefinition specialized by a required concrete URI and optional raw byte size.
    ja: ResourceDefinition は required concrete URI と optional raw byte size を種差とする ResourceCapabilityDefinition です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: is_a 是类级种属关系。
    en: is_a is a class-level genus relation.
    ja: is_a は class-level genus relation です。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 具有具体资源下位类
      en: has concrete-resource subtype
      ja: concrete-resource 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ResourceDefinition-is_a-ResourceCapabilityDefinition-example-positive-manual-001
      kind: positive
      labels:
        zh: 具体 URI 正例
        en: concrete-URI positive case
        ja: concrete-URI 正例
      scenario_id: resource-definition-genus-positive
      descriptions:
        zh: resources/list 成员 `docs://manual` 有名称、具体 URI 与可选 size。
        en: A resources/list member for `docs://manual` has a name, concrete URI, and optional size.
        ja: resources/list member `docs://manual` は name、concrete URI、optional size を持ちます。
      field_values:
        uri: docs://manual
        size: 18432
      related_node_ids:
        - ResourceDefinition
        - ResourceCapabilityDefinition
      related_relation_ids:
        - ResourceDefinition-is_a-ResourceCapabilityDefinition
      expected_result:
        zh: 建立具体资源到共同资源能力定义的下位关系。
        en: Assert the concrete-resource subtype relation.
        ja: concrete-resource subtype relation を assertion します。
      why_valid_or_invalid:
        zh: 具体 URI 而非 URI template 决定该下位身份。
        en: A concrete URI rather than a URI template determines this subtype identity.
        ja: URI template ではなく concrete URI が subtype identity を決めます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-resource-definition-006
    - id: ResourceDefinition-is_a-ResourceCapabilityDefinition-example-boundary-manual-001
      kind: boundary
      labels:
        zh: URI 模板边界
        en: URI-template boundary
        ja: URI-template 境界
      scenario_id: resource-definition-genus-boundary
      descriptions:
        zh: "`repo://{owner}/{name}` 仍含未绑定变量。"
        en: "`repo://{owner}/{name}` still contains unbound variables."
        ja: "`repo://{owner}/{name}` は未束縛 variable を含みます。"
      field_values:
        uri_template: repo://{owner}/{name}
        template_arguments:
          - owner
          - name
      related_node_ids:
        - ResourceDefinition
        - ResourceCapabilityDefinition
        - ResourceTemplate
      related_relation_ids:
        - ResourceDefinition-is_a-ResourceCapabilityDefinition
      expected_result:
        zh: 保留为 ResourceTemplate。
        en: Keep it as ResourceTemplate.
        ja: ResourceTemplate に留めます。
      why_valid_or_invalid:
        zh: 未绑定模板不是具体 URI 资源。
        en: An unbound template is not a concrete-URI resource.
        ja: 未束縛 template は concrete-URI resource ではありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-resource-definition-007
  source_claims:
    - claim-resource-definition-008
  distinct_fact_rationale:
    zh: 该边只表达 concrete URI 与 size 形成的具体资源种差。
    en: This edge states only the concrete-URI and size differentia of a concrete resource.
    ja: concrete URI と size による concrete-resource 種差だけを表します。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations: []
review:
