    source_claims: accepted
source_claims:
  - id: claim-resource-definition-001
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 defines Resource and ResourceTemplate as separate protocol shapes. Resource requires name and concrete URI and may include title, description, icons, mimeType, annotations, and raw byte size; it is not a read result.
    locator: MCP 2025-11-25 > Schema Reference > resources/list > Resource; resources/templates/list > ResourceTemplate; resources/read > ReadResourceResult
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-resource-definition-002
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 requires Resource.uri and describes the Resource as a known resource the server can read.
    locator: MCP 2025-11-25 > Schema Reference > Resource.uri
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-resource-definition-003
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 defines optional Resource.size as raw content bytes before base64 encoding or tokenization so hosts can estimate context usage.
    locator: MCP 2025-11-25 > Schema Reference > Resource.size
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-resource-definition-004
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 defines a concrete Resource with required name and URI plus optional title, description, icons, mimeType, annotations, and size, separately from ResourceTemplate and ReadResourceResult. The positive case instantiates that exact boundary.
    locator: MCP 2025-11-25 > Schema Reference > resources/list > Resource
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-definition-005
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 distinguishes a listed Resource from ReadResourceResult.contents returned for one resources/read request. The boundary case remains a read result and therefore lacks ResourceDefinition identity keys.
    locator: MCP 2025-11-25 > Schema Reference > resources/read > ReadResourceResult; ResourceContents
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-definition-006
    source: eng-proto-mcp-2025-spec
    supports: MCP requires Resource.uri and separately permits Resource.size.
    locator: MCP 2025-11-25 > Schema Reference > Resource
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-definition-007
    source: eng-proto-mcp-2025-spec
    supports: MCP separates required Resource.uri from ResourceTemplate.uriTemplate.
    locator: MCP 2025-11-25 > Schema Reference > Resource; ResourceTemplate
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-definition-008
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 requires concrete Resource.uri and permits raw byte Resource.size, grounding the concrete-resource differentia.
    locator: MCP 2025-11-25 > Schema Reference > Resource
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
