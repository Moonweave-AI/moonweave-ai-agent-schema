schema: moonweave.ai/ontology-node/v1
id: ResourceTemplate
kind: concept
labels:
  zh: MCP ResourceTemplate
  en: MCP ResourceTemplate
  ja: MCP ResourceTemplate
semantics:
  short_definition:
    zh: MCP 中暴露参数化资源地址的标准 ResourceTemplate 记录。
    en: The standard MCP ResourceTemplate record exposing a parameterized resource address.
    ja: parameterized resource address を expose する標準 MCP ResourceTemplate record。
  definition:
    zh: >
      ResourceTemplate 是 MCP 的标准记录，用 uriTemplate 表示可参数化资源，并可包含 name、title、description、
      mimeType 和 icons。客户端通过 resources/templates/list 发现它，随后可用具体 URI 按资源读取流程获取内容。
      本节点保留其官方名称；它的目录父边只是 Moonweave 的导航 taxonomy。
    en: >
      ResourceTemplate is the standard MCP record for a parameterized resource, using uriTemplate
      and optionally name, title, description, mimeType, and icons. Clients discover it through
      resources/templates/list and can later obtain content with a concrete URI through resource
      reading flow. This node retains its official name; its directory parent edge is Moonweave navigation taxonomy only.
    ja: >
      ResourceTemplate は parameterized resource のための標準 MCP record であり、uriTemplate と任意の name、title、
      description、mimeType、icons を使う。client は resources/templates/list で発見し、後で具体 URI を使い resource
      reading flow から content を取得できる。この node は公式名を保持し、directory parent edge は Moonweave navigation taxonomy にすぎない。
  why_needed:
    zh: 服务器可声明一类资源而不预先列举每个具体 URI。
    en: A server can declare a class of resources without listing every concrete URI beforehand.
    ja: server は事前にすべての具体 URI を list せず resource の class を宣言できる。
  includes:
    - zh: 参数化 uriTemplate 与其人类可读元数据。
      en: A parameterized uriTemplate and its human-readable metadata.
      ja: parameterized uriTemplate とその human-readable metadata。
    - zh: resources/templates/list 发现语义。
      en: resources/templates/list discovery semantics.
      ja: resources/templates/list discovery semantics。
  excludes:
    - zh: 已解析的具体 Resource URI 记录。
      en: A resolved concrete Resource URI record.
      ja: resolve 済みの具体 Resource URI record。
    - zh: resources/read 返回的内容对象。
      en: A content object returned by resources/read.
      ja: resources/read が返す content object。
  semantic_kind: protocol-record
  aliases:
    - language: en
      value: parameterized MCP resource
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      服务器通过 resources/templates/list 返回 resourceTemplates 数组，每项包含 uriTemplate。模板变量的具体值形成
      可读取 URI；模板本身不等于该 URI 的已读取内容，也不等于 resources/list 中的具体 Resource 记录。
    en: >
      A server returns a resourceTemplates array through resources/templates/list, each item carrying
      uriTemplate. Concrete values for template variables form a readable URI; the template itself
      is neither the content read at that URI nor a concrete Resource record in resources/list.
    ja: >
      server は resources/templates/list で resourceTemplates array を返し、各 item は uriTemplate を持つ。template variable
      の具体値が readable URI を形成する。template 自体はその URI で read された content でも、resources/list 内の具体的な
      Resource record でもない。
  typical_input:
    - description:
        zh: 列出资源模板的 MCP 请求。
        en: An MCP request to list resource templates.
        ja: resource template を list する MCP request。
      format: |
        {"jsonrpc":"2.0","id":3,"method":"resources/templates/list"}
      source_claims: [mcp-resource-template-list-for-template]
  typical_output:
    - description:
        zh: 项目文件模板记录。
        en: A project-files template record.
        ja: project-files template record。
      format: |
        {"resourceTemplates":[{"uriTemplate":"file:///{path}","name":"Project Files","mimeType":"application/octet-stream"}]}
      source_claims: [mcp-resource-template-list-for-template]
  reference_implementations:
    - name: MCP Resources
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
      description: Defines ResourceTemplate and resources/templates/list.
structure:
  identity_keys: [capability_id, source_protocol, source_kind, definition_revision, source_server, resource_kind, uri_template]
  fields:
    - id: uri_template
      labels:
        zh: URI 模板
        en: URI template
        ja: URI template
      definitions:
        zh: 表示参数化资源地址的 MCP uriTemplate 字段。
        en: The MCP uriTemplate field expressing a parameterized resource address.
        ja: parameterized resource address を表す MCP uriTemplate field。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: URI-template
      example_value: file:///{path}
      allowed_values: []
      source_claims: [mcp-resource-template-record-for-template]
    - id: name
      labels:
        zh: 模板名称
        en: Template name
        ja: template 名
      definitions:
        zh: ResourceTemplate 的名称。
        en: The name of the ResourceTemplate.
        ja: ResourceTemplate の name。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Project Files
      allowed_values: []
      source_claims: [mcp-resource-template-record-for-template]
    - id: description
      labels:
        zh: 模板说明
        en: Template description
        ja: template 説明
      definitions:
        zh: ResourceTemplate 的可选人类可读说明。
        en: An optional human-readable description of the ResourceTemplate.
        ja: ResourceTemplate の任意 human-readable description。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: Access files in the project directory
      allowed_values: []
      source_claims: [mcp-resource-template-record-for-template]
    - id: mime_type
      labels:
        zh: MIME 类型
        en: MIME type
        ja: MIME type
      definitions:
        zh: 模板资源的可选 MIME 类型提示。
        en: An optional MIME-type hint for resources from the template.
        ja: template からの resource の任意 MIME-type hint。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: application/octet-stream
      allowed_values: []
      source_claims: [mcp-resource-template-record-for-template]
    - id: source_server
      labels:
        zh: 来源服务器引用
        en: Source server reference
        ja: source server reference
      definitions:
        zh: 暴露该 ResourceTemplate 的 MCP 服务器。
        en: The MCP server exposing the ResourceTemplate.
        ja: ResourceTemplate を expose する MCP server。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: mcp://files
      allowed_values: []
      source_claims: [mcp-resource-template-record-for-template]
    - id: resource_kind
      labels:
        zh: 资源记录种类
        en: Resource record kind
        ja: resource record kind
      definitions:
        zh: 标识来源是具体 Resource 还是参数化 ResourceTemplate。
        en: Identifies whether the source is a concrete Resource or a parameterized ResourceTemplate.
        ja: source が具体的な Resource か parameterized ResourceTemplate かを識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: ResourceTemplate
      allowed_values: [Resource, ResourceTemplate]
      source_claims: [moonweave-resource-template-taxonomy]
    - id: source_ref
      labels:
        zh: 来源记录引用
        en: Source-record reference
        ja: source-record reference
      definitions:
        zh: 保持原始 URI 或 URI template 及其协议来源的引用。
        en: A reference retaining the original URI or URI template and its protocol provenance.
        ja: 元の URI または URI template とその protocol provenance を保持する reference。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: file:///{path}
      allowed_values: []
      source_claims: [moonweave-resource-template-taxonomy]
    - id: discovery_method
      labels:
        zh: 发现方法
        en: Discovery method
        ja: discovery method
      definitions:
        zh: 产生记录的标准 MCP 列表方法。
        en: The standard MCP list method that produces the record.
        ja: record を生成する標準 MCP list method。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: resources/templates/list
      allowed_values: [resources/list, resources/templates/list]
      source_claims: [moonweave-resource-template-taxonomy]
    - id: definition_revision
      labels:
        zh: 能力定义 profile 版本
        en: capability-definition profile version
        ja: capability-definition profile version
      definitions:
        zh: 标识此不可变本地 能力定义 profile 版本；变更必须创建新版本，不得就地修改。
        en: Identifies this immutable local capability-definition profile version; a change must create a new version rather than mutate it in place.
        ja: この不変ローカル capability-definition profile version を識別する。変更は in-place で mutate せず新 version を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "1"
      allowed_values: []
      source_claims: [moonweave-resource-template-taxonomy]
    - id: catalog_revision_ref
      labels:
        zh: 能力目录修订引用
        en: capability catalog revision reference
        ja: capability catalog revision reference
      definitions:
        zh: 标识拥有此 能力定义 profile 版本 的不可变 能力目录修订；该组成部分在父修订外无效，删除父修订只删除本地 profile，不删除 MCP、OpenAI 或应用配置来源记录。
        en: Identifies the immutable capability catalog revision that owns this capability-definition profile version; the component is invalid outside that parent revision, and deleting the parent revision deletes only local profiles, not MCP, OpenAI, or application-configuration source records.
        ja: この capability-definition profile version を所有する不変 capability catalog revision を識別する。component は parent revision 外では無効で、parent revision を削除してもローカル profile だけが削除され、MCP、OpenAI、application-configuration の source record は削除されない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: capabilitycatalog@1
      allowed_values: []
      source_claims: [moonweave-resource-template-taxonomy]
    - id: capability_id
      labels:
        zh: 能力标识符
        en: Capability identifier
        ja: 能力識別子
      definitions:
        zh: 在其来源范围内定位记录的名称或标识符。
        en: The name or identifier that locates the record within its source scope.
        ja: source scope 内で記録を特定する名前または識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: code_review
      allowed_values: []
      source_claims: [moonweave-resource-template-taxonomy]
    - id: source_protocol
      labels:
        zh: 来源协议
        en: Source protocol
        ja: source protocol
      definitions:
        zh: 指示该记录来自 MCP、OpenAI 应用配置或其他明确来源。
        en: Indicates whether the record comes from MCP, an OpenAI application configuration, or another declared source.
        ja: 記録が MCP、OpenAI application configuration、または別の明示された source のどれから来るかを示す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: MCP
      allowed_values: [MCP, OpenAI]
      source_claims: [moonweave-resource-template-taxonomy]
    - id: source_kind
      labels:
        zh: 来源记录类型
        en: Source record kind
        ja: source record kind
      definitions:
        zh: 记录来源的标准术语，如 Tool、Prompt、Resource、ResourceTemplate 或 function。
        en: The source's standard term, such as Tool, Prompt, Resource, ResourceTemplate, or function.
        ja: Tool、Prompt、Resource、ResourceTemplate、function など source の標準用語。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Prompt
      allowed_values: [Tool, Prompt, Resource, ResourceTemplate, function]
      source_claims: [moonweave-resource-template-taxonomy]
    - id: contract_summary
      labels:
        zh: 契约摘要
        en: Contract summary
        ja: 契約要約
      definitions:
        zh: 指向来源定义字段的不可替代摘要，而不是重写后的协议 payload。
        en: A non-substituting summary pointing to source definition fields, not a rewritten protocol payload.
        ja: source definition field を指す、置換しない要約であり、書き換えた protocol payload ではない。
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: '{"input_field":"arguments","source_uri":"mcp://server/prompts/code_review"}'
      allowed_values: []
      source_claims: [moonweave-resource-template-taxonomy]
  constraints:
    - id: template-is-not-concrete-resource
      severity: error
      expression_language: plain
      expression: uri_template must remain a ResourceTemplate address pattern and must not be stored as the concrete uri of a Resource.
      explanation:
        zh: 模板用于派生地址，具体 Resource 使用不同 URI 字段。
        en: A template derives addresses while a concrete Resource uses a different URI field.
        ja: template は address を導出し、具体 Resource は異なる URI field を使う。
      source_claims: [mcp-resource-template-record-for-template, mcp-resource-record-for-template]
    - id: resource-template-inherits-parent-required-fields
      severity: error
      expression_language: plain
      expression: "All inherited required ResourceCapabilityDefinition fields are fields of this same record; the is_a subtype does not establish or reference a second ResourceCapabilityDefinition record."
      explanation: {zh: "所有继承的 ResourceCapabilityDefinition 必需字段属于同一记录，该 is_a 子类型不建立或引用第二条 ResourceCapabilityDefinition 记录。", en: "Inherited required fields stay on the same record rather than creating a second parent record.", ja: "継承された必須 ResourceCapabilityDefinition フィールドは同じレコードに属し、この is_a 下位型は 2 番目の親レコードを作成または参照しない。"}
      source_claims: [moonweave-resource-template-taxonomy]
  required_relations: []
examples:
  - id: resource-template-positive-project-files

    labels:
      zh: 项目文件模板
      en: Project-files template
      ja: project-files template

    descriptions:
      zh: "Semantic Kernel PromptTemplate 与 kernel.invoke(function_name,args)；LangChain PromptTemplate.format()；MCP prompts/get name=code_review arguments={code:\"...\"}。"
      en: "Semantic Kernel PromptTemplate and kernel.invoke(function_name,args); LangChain PromptTemplate.format(); MCP prompts/get name=code_review arguments={code:\"...\"}."
      ja: Semantic Kernel PromptTemplate。LangChain PromptTemplate.format()。MCP prompts/get name=code_review。
    field_values:
      uri_template: file:///{path}
      name: Project Files
      source_server: mcp://files
      resource_kind: ResourceTemplate
      capability_id: file:///{path}
      source_protocol: MCP
      source_kind: ResourceTemplate
      definition_revision: "1"
    related_node_ids: [ResourceTemplate]
    related_relation_ids: [ResourceTemplate-is_a-ResourceCapabilityDefinition]

    source_claims: [mcp-resource-template-record-for-template]
  - id: resource-template-counterexample-concrete-uri

    labels:
      zh: 用具体 URI 代替模板
      en: Concrete URI substituted for template
      ja: template を具体 URI で置換する例

    descriptions:
      zh: 反例：MCP resources/read uri 未订阅就假定内容可用；Semantic Kernel prompt 参数未验证即实例化。
      en: Counterexample: assuming MCP resources/read uri content without subscription; Semantic Kernel prompt instantiated without argument validation.
      ja: 反例：MCP resources/read uri 未購読で内容可用を仮定。Semantic Kernel prompt 引数未検証でインスタンス化。
    field_values:
      uri_template: file:///project/README.md
    related_node_ids: [ResourceTemplate, ResourceDefinition]
    related_relation_ids: [ResourceTemplate-is_a-ResourceCapabilityDefinition]

    source_claims: [mcp-resource-template-record-for-template, mcp-resource-record-for-template]
  - id: resource-template-boundary-template-and-read

    labels:
      zh: 模板与读取内容边界
      en: Boundary between template and read content
      ja: template と read content の境界

    descriptions:
      zh: MCP Prompt/Resource 能力 vs LangChain PromptTemplate vs Semantic Kernel 模板函数的声明-实例化边界。
      en: Declaration-instantiation boundary among MCP Prompt/Resource capability, LangChain PromptTemplate, Semantic Kernel template functions.
      ja: MCP Prompt/Resource、LangChain PromptTemplate、Semantic Kernel テンプレート関数の宣言-インスタンス化境界。
    field_values:
      uri_template: file:///{path}
    related_node_ids: [ResourceTemplate, ResourceDefinition]
    related_relation_ids: [ResourceTemplate-is_a-ResourceCapabilityDefinition]

    source_claims: [mcp-resource-template-list-for-template]
  - id: resource-template-instance-files-server

    labels:
      zh: files 服务器 ResourceTemplate 实例
      en: files-server ResourceTemplate instance
      ja: files-server ResourceTemplate instance

    descriptions:
      zh: "MCP 实例：prompts/get name=summarize arguments={text:\"long article...\"} 返回 messages；resources/read uri=file:///data/config.json。"
      en: "MCP instance: prompts/get name=summarize arguments={text:\"long article...\"} returns messages; resources/read uri=file:///data/config.json."
      ja: MCP 実例：prompts/get name=summarize。resources/read uri=file:///data/config.json。
    field_values:
      source_server: mcp://files
      mime_type: application/octet-stream
      resource_kind: ResourceTemplate
      capability_id: file:///{path}
      source_protocol: MCP
      source_kind: ResourceTemplate
      definition_revision: "1"
    related_node_ids: [ResourceTemplate]
    related_relation_ids: [ResourceTemplate-is_a-ResourceCapabilityDefinition]

    source_claims: [mcp-resource-template-record-for-template]
parent_relation:
  id: ResourceTemplate-is_a-ResourceCapabilityDefinition
  predicate: is_a
  target: concept:ResourceCapabilityDefinition
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是资源能力定义 profile 中的参数化资源记录
    en: is a parameterized-resource record within the resource capability definition profile
    ja: リソース能力定義 profile 内の parameterized-resource record である
  definition:
    zh: ResourceTemplate 在 Moonweave 本地 umbrella 下表示 MCP 的参数化资源标准记录。
    en: ResourceTemplate represents MCP's standard parameterized-resource record under the Moonweave local umbrella.
    ja: ResourceTemplate は Moonweave ローカル umbrella の下で MCP の標準 parameterized-resource record を表す。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 具有子类型
      en: has subtype
      ja: subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: The parent edge is Moonweave taxonomy and does not alter the official MCP ResourceTemplate record name.
  constraints:
    - id: resource-template-parent-is-local-taxonomy
      severity: error
      expression_language: plain
      expression: This hierarchy edge organizes the official MCP record locally and must not claim MCP defines the ResourceCapabilityDefinition parent type.
      explanation:
        zh: 标准对象可被本地分类，但本地父类不是协议 schema。
        en: A standard object may be locally classified, but the local parent is not protocol schema.
        ja: standard object はローカルに分類できるが、ローカル parent は protocol schema ではない。
      source_claims: [moonweave-resource-template-taxonomy]
  examples: []
  source_claims: [moonweave-resource-template-taxonomy]
  distinct_fact_rationale:
    zh: 关系仅表达本地导航，不重写 MCP 规范。
    en: The relation expresses local navigation only and does not rewrite MCP specification.
    ja: 関係はローカル navigation だけを表し、MCP specification を書き換えない。
relations: []
sources:
  - id: mcp-resources-2025-11-25
    title: Model Context Protocol Specification — Resources
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
    version: 2025-11-25
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Defines ResourceTemplate and concrete Resource distinctions.
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: design-inference
    relevance: Defines local taxonomy placement only.
source_claims:
  - id: mcp-resource-template-list-for-template
    source: mcp-resources-2025-11-25
    supports: MCP clients retrieve ResourceTemplate records with resources/templates/list.
    locator: "Resource Templates"
    evidence_kind: normative
    confidence: high
  - id: mcp-resource-template-record-for-template
    source: mcp-resources-2025-11-25
    supports: A ResourceTemplate includes uriTemplate and may include name, title, description, mimeType, and icons.
    locator: "Resource Templates"
    evidence_kind: normative
    confidence: high
  - id: mcp-resource-record-for-template
    source: mcp-resources-2025-11-25
    supports: A concrete Resource uses uri as its unique identifier, distinct from a ResourceTemplate uriTemplate.
    locator: "Resource"
    evidence_kind: normative
    confidence: high
  - id: moonweave-resource-template-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave places ResourceTemplate under ResourceCapabilityDefinition as a local navigation taxonomy edge.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high