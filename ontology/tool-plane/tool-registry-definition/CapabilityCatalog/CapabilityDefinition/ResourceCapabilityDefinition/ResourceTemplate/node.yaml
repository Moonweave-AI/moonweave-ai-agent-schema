schema: moonweave.ai/ontology-node/v1
id: ResourceTemplate
kind: concept
status: review
labels:
  zh: 资源模板
  en: Resource Template
  ja: リソーステンプレート
semantics:
  short_definition:
    zh: 资源模板用 URI 模板和参数规则声明一族可寻址资源。
    en: A Resource Template declares a family of addressable resources with a URI template and argument rules.
    ja: リソーステンプレートは URI template と argument rule で addressable resource family を宣言します。
  definition:
    zh: 资源模板是一种 ResourceCapabilityDefinition，复用上位 capability_definition_id；URI 模板及未绑定变量集合是 MCP 寻址合同和种差，不是另一套定义身份。名称、标题、说明、图标、媒体类型和注解继承自共同上位类；它不是具体 ResourceDefinition、模板展开动作或一次读取结果。
    en: A Resource Template is a ResourceCapabilityDefinition that reuses the inherited capability_definition_id; its URI template and unbound-variable set are the MCP addressing contract and differentia, not another definition identity. Shared metadata comes from the parent; it is neither a concrete ResourceDefinition, template-expansion event, nor one read result.
    ja: ResourceTemplate は継承した capability_definition_id を再利用し、URI template と未束縛 variable 集合を別 identity ではなく MCP addressing contract/differentia とします。共有 metadata を継承し、具体 ResourceDefinition、template expansion event、一回の read result ではありません。
  why_needed:
    zh: 把模板与具体资源设为共同上位类下的同级分支，可以忠实表达 MCP 的两个独立返回集合，并防止模板错误继承 concrete URI 与 size。
    en: Making templates and concrete resources sibling branches under a shared parent mirrors MCP's separate result collections and prevents templates from incorrectly inheriting concrete URI and size.
    ja: template と concrete resource を共有親下の sibling branch にすることで MCP の別 result collection を忠実に表し、template が concrete URI と size を誤継承することを防ぎます。
  includes:
    - zh: 纳入符合 RFC 6570 表达式、保留至少一个未绑定变量并携带共同发现元数据的 URI 模板声明。
      en: Includes URI-template declarations with an RFC 6570 expression, at least one unbound variable, and shared discovery metadata.
      ja: RFC 6570 expression、少なくとも一つの unbound variable、共有 discovery metadata を持つ URI-template 宣言を含みます。
  excludes:
    - zh: 排除固定 URI 资源、已展开的具体 URI 和一次资源读取结果。
      en: Excludes fixed-URI resources, expanded concrete URIs, and one resource-read result.
      ja: fixed URI resource、expanded concrete URI、一回の resource-read result を除きます。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: uri_template
      labels:
        zh: URI 模板
        en: URI template
        ja: URI テンプレート
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: URI 模板作为 ResourceTemplate 节点内部信息保存，不建立同名图节点。
        en: URI template is stored as information on the ResourceTemplate node and does not create a namesake graph node.
        ja: URI テンプレートは ResourceTemplate node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: repo://{owner}/{name}
      source_claims:
        - claim-resource-template-002
    - id: template_arguments
      labels:
        zh: 模板参数
        en: template arguments
        ja: template 引数
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 模板参数作为 ResourceTemplate 节点内部信息保存，不建立同名图节点。
        en: template arguments is stored as information on the ResourceTemplate node and does not create a namesake graph node.
        ja: template 引数は ResourceTemplate node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value:
        - owner
        - name
      source_claims:
        - claim-resource-template-003
  constraints:
    - id: resource-template-rfc6570-variable-closure
      severity: error
      expression_language: plain
      expression: uri_template MUST be a valid RFC 6570 URI template, template_arguments MUST equal its distinct unbound variable names, and at least one template argument MUST remain unbound.
      explanations:
        zh: URI 模板必须符合 RFC 6570；template_arguments 必须恰好记录表达式中的去重未绑定变量，且至少保留一个变量。
        en: The URI template must conform to RFC 6570; template_arguments must exactly list the distinct unbound variables in the expression, with at least one variable remaining.
        ja: URI template は RFC 6570 に適合し、template_arguments は式内の重複なし未束縛 variable と一致し、少なくとも一つを保持しなければなりません。
      source_claims:
        - claim-resource-template-004
  required_relation_constraints: []
examples:
  - id: ResourceTemplate-example-positive-manual-001
    kind: positive
    labels:
      zh: ResourceTemplate 正例
      en: ResourceTemplate positive case
      ja: ResourceTemplate 正例
    scenario_id: null
    descriptions:
      zh: resources/templates/list 返回模板 `repo://{owner}/{name}`，其两个 RFC 6570 变量尚未绑定，并携带用于发现的名称、标题、说明、图标、媒体类型与注解。
      en: resources/templates/list returns `repo://{owner}/{name}` with two still-unbound RFC 6570 variables and discovery metadata for name, title, description, icons, media type, and annotations.
      ja: resources/templates/list は未束縛 RFC 6570 variable 二つを持つ `repo://{owner}/{name}` と name、title、description、icons、media type、annotations を返します。
    field_values:
      capability_definition_id: capdef:resource-template:repository
      version: 1.1.0
      name: repository
      title: Repository documents
      description: Documents addressable by repository owner and name
      icons:
        - src: https://moonweave.ai/icons/repository.svg
          mimeType: image/svg+xml
      mime_type: text/markdown
      annotations:
        audience:
          - assistant
        priority: 0.6
      uri_template: repo://{owner}/{name}
      template_arguments:
        - owner
        - name
    related_node_ids:
      - ResourceTemplate
      - ResourceCapabilityDefinition
    related_relation_ids:
      - ResourceTemplate-is_a-ResourceCapabilityDefinition
    expected_result:
      zh: 该节点归 ResourceTemplate，并与 concrete ResourceDefinition 一起继承 ResourceCapabilityDefinition。
      en: Classify the node as ResourceTemplate, inheriting ResourceCapabilityDefinition alongside the concrete ResourceDefinition branch.
      ja: node を ResourceTemplate とし、concrete ResourceDefinition branch と並んで ResourceCapabilityDefinition を継承します。
    why_valid_or_invalid:
      zh: 其身份由带变量的 URI 合同而非某个展开值决定。
      en: Its identity is determined by the parameterized URI contract, not one expanded value.
      ja: identity が parameterized URI contract で決まり一つの展開値ではないためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-resource-template-005
  - id: ResourceTemplate-example-boundary-manual-001
    kind: boundary
    labels:
      zh: ResourceTemplate 边界例
      en: ResourceTemplate boundary case
      ja: ResourceTemplate 境界例
    scenario_id: null
    descriptions:
      zh: 所有变量已展开后得到 concrete URI `repo://moonweave/schema`，并可在 resources/list 中作为可读资源出现。
      en: After all variables are expanded, `repo://moonweave/schema` is a concrete URI that may appear as a readable resource in resources/list.
      ja: 全 variable 展開後の `repo://moonweave/schema` は concrete URI であり resources/list の readable resource として現れ得ます。
    field_values:
      uri: repo://moonweave/schema
      name: moonweave-schema
      mime_type: text/markdown
      size: 9216
    related_node_ids:
      - ResourceDefinition
    related_relation_ids: []
    expected_result:
      zh: 展开值是具体资源 URI，不再作为 ResourceTemplate 身份。
      en: The expanded value is a concrete resource URI and is not a ResourceTemplate identity.
      ja: 展開値は具体 resource URI で ResourceTemplate identity ではありません。
    why_valid_or_invalid:
      zh: 模板合同与模板的一次应用具有不同身份键。
      en: The template contract and one application of it have different identity keys.
      ja: template contract と一回の application は別 identity key を持つためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-resource-template-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ResourceTemplate-is_a-ResourceCapabilityDefinition
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种资源能力定义
    en: is a resource capability definition
    ja: resource capability definition の一種
  definitions:
    zh: ResourceTemplate 是以 RFC 6570 URI template 及未绑定变量集合为必要种差的 ResourceCapabilityDefinition。
    en: ResourceTemplate is a ResourceCapabilityDefinition specialized by a required RFC 6570 URI template and its set of unbound variables.
    ja: ResourceTemplate は required RFC 6570 URI template と未束縛 variable 集合を種差とする ResourceCapabilityDefinition です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: is_a 是类级种属关系。
    en: is_a is a class-level genus relation.
    ja: is_a は class-level genus relation です。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 具有资源模板下位类
      en: has resource-template subtype
      ja: resource-template 下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ResourceTemplate-is_a-ResourceCapabilityDefinition-example-positive-manual-001
      kind: positive
      labels:
        zh: RFC 6570 模板正例
        en: RFC 6570 template positive case
        ja: RFC 6570 template 正例
      scenario_id: resource-template-genus-positive
      descriptions:
        zh: resources/templates/list 成员 `repo://{owner}/{name}` 保留两个未绑定变量。
        en: A resources/templates/list member `repo://{owner}/{name}` retains two unbound variables.
        ja: resources/templates/list member `repo://{owner}/{name}` は未束縛 variable 二つを保持します。
      field_values:
        uri_template: repo://{owner}/{name}
        template_arguments:
          - owner
          - name
      related_node_ids:
        - ResourceTemplate
        - ResourceCapabilityDefinition
      related_relation_ids:
        - ResourceTemplate-is_a-ResourceCapabilityDefinition
      expected_result:
        zh: 建立资源模板到共同资源能力定义的下位关系。
        en: Assert the resource-template subtype relation.
        ja: resource-template subtype relation を assertion します。
      why_valid_or_invalid:
        zh: RFC 6570 表达式和未绑定变量共同给出模板身份。
        en: The RFC 6570 expression and unbound variables jointly establish template identity.
        ja: RFC 6570 expression と未束縛 variable が共同で template identity を決めます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-resource-template-007
    - id: ResourceTemplate-is_a-ResourceCapabilityDefinition-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 具体 URI 边界
        en: concrete-URI boundary
        ja: concrete-URI 境界
      scenario_id: resource-template-genus-boundary
      descriptions:
        zh: "`repo://moonweave/schema` 已无未绑定变量。"
        en: "`repo://moonweave/schema` has no unbound variable left."
        ja: "`repo://moonweave/schema` に未束縛 variable は残りません。"
      field_values:
        uri: repo://moonweave/schema
      related_node_ids:
        - ResourceTemplate
        - ResourceCapabilityDefinition
        - ResourceDefinition
      related_relation_ids:
        - ResourceTemplate-is_a-ResourceCapabilityDefinition
      expected_result:
        zh: 保留为 ResourceDefinition。
        en: Keep it as ResourceDefinition.
        ja: ResourceDefinition に留めます。
      why_valid_or_invalid:
        zh: 全部变量展开后不再具备模板种差。
        en: After full expansion it no longer has the template differentia.
        ja: 全展開後は template 種差を持ちません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-resource-template-008
  source_claims:
    - claim-resource-template-009
  distinct_fact_rationale:
    zh: 该边只表达 RFC 6570 模板与未绑定变量形成的模板种差。
    en: This edge states only the RFC 6570 template and unbound-variable differentia.
    ja: RFC 6570 template と未束縛 variable による template 種差だけを表します。
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
