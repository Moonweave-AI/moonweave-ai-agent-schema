source_claims:
  - id: claim-resource-template-001
    source: eng-proto-mcp-2025-spec
    supports: "MCP 2025-11-25 defines ResourceTemplate separately from Resource: it requires a name and RFC 6570 uriTemplate, may carry shared discovery metadata, and does not contain Resource.uri or Resource.size."
    locator: MCP 2025-11-25 > Schema Reference > resources/templates/list > ResourceTemplate; resources/list > Resource
    evidence_kind: official
    confidence: high
    review_status: pending
  - id: claim-resource-template-002
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 requires ResourceTemplate.uriTemplate and specifies that it is an RFC 6570 URI template.
    locator: MCP 2025-11-25 > Schema Reference > ResourceTemplate.uriTemplate
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-resource-template-003
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 defines ResourceTemplate through an RFC 6570 uriTemplate. Moonweave materializes the unbound variables parsed from that expression as template_arguments so the template identity and validation boundary are queryable without turning arguments into graph nodes.
    locator: MCP 2025-11-25 > Schema Reference > ResourceTemplate.uriTemplate
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-resource-template-004
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 requires ResourceTemplate.uriTemplate to be an RFC 6570 URI template. Moonweave makes its unbound-variable closure explicit so template identity can be validated.
    locator: MCP 2025-11-25 > Schema Reference > ResourceTemplate.uriTemplate
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-resource-template-005
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 defines ResourceTemplate as a separately listed shape with required name and RFC 6570 uriTemplate plus optional discovery metadata. The positive case instantiates that exact template boundary.
    locator: MCP 2025-11-25 > Schema Reference > resources/templates/list > ResourceTemplate
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-resource-template-006
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 lists concrete Resource records separately from ResourceTemplate records. Once every template variable has been expanded, the resulting URI can identify a concrete resource but no longer carries ResourceTemplate identity.
    locator: MCP 2025-11-25 > Schema Reference > resources/list > Resource; resources/templates/list > ResourceTemplate
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-resource-template-007
    source: eng-proto-mcp-2025-spec
    supports: MCP requires ResourceTemplate.uriTemplate to be an RFC 6570 URI template.
    locator: MCP 2025-11-25 > Schema Reference > ResourceTemplate.uriTemplate
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-resource-template-008
    source: eng-proto-mcp-2025-spec
    supports: MCP separates concrete Resource.uri from ResourceTemplate.uriTemplate.
    locator: MCP 2025-11-25 > Schema Reference > Resource; ResourceTemplate
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-resource-template-009
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 requires an RFC 6570 uriTemplate, grounding the template differentia independently of concrete Resource.uri.
    locator: MCP 2025-11-25 > Schema Reference > ResourceTemplate.uriTemplate
    evidence_kind: design-inference
    confidence: high
    review_status: pending
