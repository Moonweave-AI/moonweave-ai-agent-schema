schema: moonweave.ai/ontology-node/v1
id: ToolSpecification
kind: concept
status: accepted
labels:
  zh: 工具规格
  en: Tool Specification
  ja: ツール仕様
semantics:
  short_definition:
    zh: 工具规格是约束工具接口或使用条件的版本化规格集合。
    en: A Tool Specification is a versioned specification set constraining a tool interface or its use conditions.
    ja: ツール仕様は tool interface または利用条件を制約する versioned specification set です。
  definition:
    zh: 工具规格是一种能力定义，复用 capability_definition_id 与版本信息，作为 ToolDefinition 与 ToolPermissionSpec 的共同上位概念，组织接口合同和权限合同；它不再引入同义 specification_id，也不是注册条目、工具实体或某次调用状态。
    en: A Tool Specification is a CapabilityDefinition that reuses capability_definition_id and its version information. It is the common parent of ToolDefinition and ToolPermissionSpec, organizing interface and permission contracts without introducing a synonymous specification_id; it is neither a RegistryEntry, Tool entity, nor per-call state.
    ja: ツール仕様は capability_definition_id と版情報を再利用し、ToolDefinition と ToolPermissionSpec の共通親として interface/permission contract を整理する CapabilityDefinition です。同義 specification_id、RegistryEntry、Tool entity、per-call state を導入しません。
  why_needed:
    zh: 该中间层把工具专属规格从提示和资源定义中分离，并允许接口规格与权限规格形成下一层逻辑分支。
    en: This intermediate layer separates tool-specific specifications from prompt and resource definitions and lets interface and permission specifications form the next logical branches.
    ja: tool-specific specification を prompt/resource definition から分け、interface と permission specification の次層 branch を作ります。
  includes:
    - zh: 纳入具有稳定标识和版本、专门约束工具接口或使用条件的规格。
      en: Includes stable, versioned specifications specifically constraining tool interfaces or conditions of use.
      ja: stable ID と版を持ち tool interface または利用条件を制約する specification を含みます。
  excludes:
    - zh: 排除提示模板、资源 URI 定义、注册条目、工具实体和调用记录。
      en: Excludes prompt templates, resource URI definitions, registry entries, tool entities, and call records.
      ja: prompt template、resource URI definition、registry entry、tool entity、call record を除きます。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: contract_kind
      labels:
        zh: 合同类型
        en: contract kind
        ja: 契約種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 合同类型作为 ToolSpecification 节点内部信息保存，不建立同名图节点。
        en: contract kind is stored as information on the ToolSpecification node and does not create a namesake graph node.
        ja: 契約種別は ToolSpecification node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: interface
      source_claims:
        - claim-tool-specification-004
        - claim-tool-specification-005
        - claim-tool-specification-006
  constraints: []
  required_relation_constraints: []
examples:
  - id: ToolSpecification-example-positive-manual-001
    kind: positive
    labels:
      zh: ToolSpecification 正例
      en: ToolSpecification positive case
      ja: ToolSpecification 正例
    scenario_id: null
    descriptions:
      zh: "`capdef:weather` 的 v3 快照是 weather 的版本化接口规格；只读权限由另一个 capability_definition_id 对应的 ToolPermissionSpec 记录。"
      en: The v3 snapshot of `capdef:weather` is the versioned weather interface specification; a ToolPermissionSpec under another capability_definition_id records its read-only permission contract.
      ja: "`capdef:weather` の v3 snapshot は versioned weather interface specification で、別 capability_definition_id の ToolPermissionSpec が read-only permission contract を記録します。"
    field_values:
      capability_definition_id: capdef:weather
      version: 3.0.0
      name: weather
      contract_kind: interface
    related_node_ids:
      - ToolSpecification
      - CapabilityDefinition
    related_relation_ids:
      - ToolSpecification-is_a-CapabilityDefinition
    expected_result:
      zh: 该接口合同归为 ToolSpecification，并由 contract_kind=interface 进入 ToolDefinition 下位类。
      en: The interface contract is a ToolSpecification and specializes as ToolDefinition through contract_kind=interface.
      ja: interface contract を ToolSpecification とし、contract_kind=interface により ToolDefinition へ特殊化します。
    why_valid_or_invalid:
      zh: 共同种差是版本化地约束工具，而不是形成目录成员。
      en: Their common differentia is versioned constraint of a tool rather than catalog membership.
      ja: 共通種差が tool の versioned constraint で catalog membership ではないためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-specification-007
      - claim-tool-specification-008
      - claim-tool-specification-009
  - id: ToolSpecification-example-boundary-manual-001
    kind: boundary
    labels:
      zh: ToolSpecification 边界例
      en: ToolSpecification boundary case
      ja: ToolSpecification 境界例
    scenario_id: null
    descriptions:
      zh: 生产注册条目引用 weather v3，并标记 endpoint 与环境。
      en: A production registry entry references weather v3 and records endpoint and environment.
      ja: 本番 registry entry が weather v3 を参照し endpoint と environment を記録します。
    field_values: {}
    related_node_ids:
      - ToolSpecification
      - CapabilityDefinition
    related_relation_ids:
      - ToolSpecification-is_a-CapabilityDefinition
    expected_result:
      zh: 该对象仍是 RegistryEntry，不是 ToolSpecification。
      en: The object remains RegistryEntry, not ToolSpecification.
      ja: object は RegistryEntry で ToolSpecification ではありません。
    why_valid_or_invalid:
      zh: 成员记录引用规格但不继承规格身份。
      en: A membership record references a specification but does not inherit specification identity.
      ja: membership record は specification を参照しても identity を継承しないためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-specification-010
      - claim-tool-specification-011
      - claim-tool-specification-012
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ToolSpecification-is_a-CapabilityDefinition
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: is_a
    en: is a
    ja: is_a
  definitions:
    zh: 工具规格是一种能力定义：它继承稳定、版本化的定义身份，并以专门约束工具接口或使用条件作为种差。
    en: ToolSpecification is a CapabilityDefinition specialized by versioned constraints on tool interfaces or conditions of use.
    ja: ToolSpecification は stable versioned definition identity を継承し tool interface または use condition の制約で細分化します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体注册表与版本策略。
    en: Cardinality depends on the concrete registry and version policy.
    ja: cardinality は具体 registry と version policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：is_a
      en: inverse of is_a
      ja: 逆：is_a
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ToolSpecification-is_a-CapabilityDefinition-example-positive-manual-001
      kind: positive
      labels:
        zh: ToolSpecification-is_a-CapabilityDefinition 正例
        en: ToolSpecification-is_a-CapabilityDefinition positive case
        ja: ToolSpecification-is_a-CapabilityDefinition 正例
      scenario_id: null
      descriptions:
        zh: 接口定义和权限规格共享对工具进行版本化约束的上位语义。
        en: Interface definitions and permission specs share the upper meaning of versioned constraints on a tool.
        ja: interface definition と permission spec は tool の versioned constraint という上位意味を共有します。
      field_values: {}
      related_node_ids:
        - ToolSpecification
        - CapabilityDefinition
      related_relation_ids:
        - ToolSpecification-is_a-CapabilityDefinition
      expected_result:
        zh: 保留 ToolSpecification —is_a→ CapabilityDefinition，并按定义解释该方向。
        en: Retain ToolSpecification —is_a→ CapabilityDefinition and interpret that direction as defined.
        ja: ToolSpecification —is_a→ CapabilityDefinition を保持し定義どおり解釈します。
      why_valid_or_invalid:
        zh: 场景同时满足来源身份、目标身份和本关系要求的业务条件。
        en: The case satisfies the source identity, target identity, and the business condition required by this relation.
        ja: case は source identity、target identity、relation が要求する business condition を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-specification-013
    - id: ToolSpecification-is_a-CapabilityDefinition-example-boundary-manual-001
      kind: boundary
      labels:
        zh: ToolSpecification-is_a-CapabilityDefinition 边界例
        en: ToolSpecification-is_a-CapabilityDefinition boundary case
        ja: ToolSpecification-is_a-CapabilityDefinition 境界例
      scenario_id: null
      descriptions:
        zh: 提示定义使用消息模板，不声明工具执行合同。
        en: A prompt definition uses message templates and declares no tool-execution contract.
        ja: prompt definition は message template を使い tool-execution contract を宣言しません。
      field_values: {}
      related_node_ids:
        - ToolSpecification
        - CapabilityDefinition
      related_relation_ids:
        - ToolSpecification-is_a-CapabilityDefinition
      expected_result:
        zh: 不以该场景建立 ToolSpecification-is_a-CapabilityDefinition，并把对象保留在其正确身份中。
        en: Do not assert ToolSpecification-is_a-CapabilityDefinition for this case; retain each object under its correct identity.
        ja: この case では ToolSpecification-is_a-CapabilityDefinition を assertion せず各 object の正しい identity を保持します。
      why_valid_or_invalid:
        zh: 场景缺少本关系要求的决定性条件；相邻概念或时间接近不能补足该条件。
        en: The case lacks the relation's decisive condition; conceptual adjacency or temporal proximity cannot supply it.
        ja: case は relation の decisive condition を欠き、concept adjacency や temporal proximity では補えません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-specification-014
  source_claims:
    - claim-tool-specification-015
  distinct_fact_rationale:
    zh: 该边表达一个不可由端点层级替代的独立业务事实。
    en: This edge expresses an independent business fact that endpoint hierarchy cannot replace.
    ja: この edge は endpoint hierarchy で代替できない独立 business fact を表します。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
