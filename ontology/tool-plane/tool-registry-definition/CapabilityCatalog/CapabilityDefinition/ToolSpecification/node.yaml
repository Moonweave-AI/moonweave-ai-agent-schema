source_claims:
  - id: mcp-tool-schema
    source: mcp-tools-2025-11-25
    supports: An MCP Tool has a unique name, inputSchema JSON Schema, and optional title, description, icons, outputSchema, annotations, and execution fields.
    locator: "Tool"
    evidence_kind: normative
    confidence: high
  - id: mcp-tool-call
    source: mcp-tools-2025-11-25
    supports: MCP clients invoke a Tool with tools/call using name and arguments.
    locator: "Calling Tools"
    evidence_kind: normative
    confidence: high
  - id: openai-function-schema
    source: openai-function-calling
    supports: An OpenAI function tool uses type function with name, description, and parameters JSON Schema.
    locator: "Function tools"
    evidence_kind: normative
    confidence: high
  - id: openai-strict-mode
    source: openai-function-calling
    supports: With strict true, OpenAI requires additionalProperties false for each parameters object and all properties to be required, with nullable types for optional values.
    locator: "Strict mode"
    evidence_kind: normative
    confidence: high
  - id: moonweave-tool-specification-profile
    source: moonweave-ontology-design
    supports: ToolSpecification is a Moonweave local profile that retains source protocol and source field names when comparing callable-tool schemas.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
  - id: moonweave-tool-specification-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave classifies ToolSpecification under CapabilityDefinition as a local taxonomy edge.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
