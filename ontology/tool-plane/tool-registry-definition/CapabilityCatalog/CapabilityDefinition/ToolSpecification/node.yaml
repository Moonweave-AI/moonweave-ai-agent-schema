schema: moonweave.ai/ontology-node/v1
id: ToolSpecification
kind: concept
labels:
  zh: 可调用工具 schema profile
  en: Callable-tool schema profile
  ja: 呼び出し可能ツール schema profile
semantics:
  short_definition:
    zh: 比较 MCP Tool 与 OpenAI function tool 输入契约的 Moonweave 本地 schema profile。
    en: A Moonweave local schema profile for comparing MCP Tool and OpenAI function-tool input contracts.
    ja: MCP Tool と OpenAI function-tool の入力 contract を比較する Moonweave ローカル schema profile。
  definition:
    zh: >
      ToolSpecification 是 Moonweave local profile，用于保持可调用工具的名称、描述、输入 schema 与来源协议。MCP 的
      标准 Tool 使用 inputSchema，且可选 outputSchema、annotations 与 execution；OpenAI function tool 使用 type、
      name、description、parameters 和 strict。两者可采用 JSON Schema，但字段位置、调用消息和严格性语义不可互换。
    en: >
      ToolSpecification is a Moonweave local profile for retaining callable-tool name, description,
      input schema, and source protocol. A standard MCP Tool uses inputSchema and optional
      outputSchema, annotations, and execution; an OpenAI function tool uses type, name,
      description, parameters, and strict. Both may use JSON Schema, but their field positions,
      call messages, and strictness semantics are not interchangeable.
    ja: >
      ToolSpecification は呼び出し可能 tool の name、description、input schema、source protocol を保持する Moonweave
      local profile である。標準 MCP Tool は inputSchema と任意の outputSchema、annotations、execution を使い、OpenAI
      function tool は type、name、description、parameters、strict を使う。どちらも JSON Schema を使い得るが、field position、
      call message、strictness semantics は交換可能ではない。
  why_needed:
    zh: 调用方必须能准确理解输入契约，同时不能因 schema 相似而把不同协议接口混同。
    en: A caller must understand an input contract precisely without confusing different protocol interfaces because schemas look similar.
    ja: caller は schema が似ていても異なる protocol interface を混同せず、input contract を正確に理解しなければならない。
  includes:
    - zh: MCP Tool inputSchema 和 OpenAI function parameters 的来源标记。
      en: Provenance markers for MCP Tool inputSchema and OpenAI function parameters.
      ja: MCP Tool inputSchema と OpenAI function parameters の provenance marker。
    - zh: 可选输出 schema、严格性和调用协议边界。
      en: Optional output schema, strictness, and call-protocol boundaries.
      ja: 任意 output schema、strictness、call-protocol boundary。
  excludes:
    - zh: 工具实现代码、工具调用结果或审批决定。
      en: Tool implementation code, a tool-call result, or an approval decision.
      ja: tool implementation code、tool-call result、approval decision。
    - zh: 一个名为 ToolSpecification 的 MCP 或 OpenAI 原生 wire object。
      en: An MCP or OpenAI native wire object named ToolSpecification.
      ja: ToolSpecification という MCP または OpenAI native wire object。
  semantic_kind: local-profile
  aliases:
    - language: en
      value: cross-protocol callable schema profile
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      MCP clients以 tools/list 发现 Tool，再以 tools/call 发送 name 与 arguments。OpenAI 请求将 function tool 定义放入
      tools，并由模型产生函数调用。MCP 的 inputSchema 若没有 $schema 默认为 JSON Schema 2020-12；OpenAI strict mode
      对 parameters 的对象结构有额外要求。本 profile 应存储 source_protocol，不能复制字段名称假装统一格式。
    en: >
      MCP clients discover a Tool with tools/list and send name plus arguments with tools/call.
      OpenAI requests place function-tool definitions in tools and the model produces function calls.
      MCP inputSchema defaults to JSON Schema 2020-12 when $schema is absent; OpenAI strict mode has
      additional object-structure requirements for parameters. This profile stores source_protocol
      and cannot copy field names to pretend there is one unified wire format.
    ja: >
      MCP client は tools/list で Tool を発見し、tools/call で name と arguments を送る。OpenAI request は function-tool
      definition を tools に置き、model が function call を生成する。MCP inputSchema は $schema がないと JSON Schema
      2020-12 が既定であり、OpenAI strict mode は parameters の object structure に追加要件を持つ。この profile は
      source_protocol を保存し、一つの unified wire format があるように field name を複製できない。
  typical_input:
    - description:
        zh: MCP Tool 定义记录。
        en: An MCP Tool definition record.
        ja: MCP Tool definition record。
      format: |
        {"name":"get_weather","description":"Read weather","inputSchema":{"type":"object","properties":{"city":{"type":"string"}},"required":["city"]}}
      source_claims: [mcp-tool-schema]
    - description:
        zh: OpenAI 严格函数工具定义。
        en: A strict OpenAI function-tool definition.
        ja: strict OpenAI function-tool definition。
      format: |
        {"type":"function","name":"get_weather","description":"Read weather","parameters":{"type":"object","properties":{"city":{"type":"string"}},"required":["city"],"additionalProperties":false},"strict":true}
      source_claims: [openai-function-schema, openai-strict-mode]
  typical_output:
    - description:
        zh: MCP 工具调用请求。
        en: An MCP tool-call request.
        ja: MCP tool-call request。
      format: |
        {"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"get_weather","arguments":{"city":"Tokyo"}}}
      source_claims: [mcp-tool-call]
  reference_implementations:
    - name: MCP Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines Tool inputSchema, outputSchema, tools/list, and tools/call.
    - name: OpenAI Function Calling
      url: https://developers.openai.com/api/docs/guides/function-calling
      description: Defines function-tool fields, JSON Schema parameters, and strict mode.
structure:
  identity_keys: [capability_id, source_protocol, source_kind, definition_revision, tool_name]
  fields:
    - id: source_protocol
      labels:
        zh: 来源协议
        en: Source protocol
        ja: source protocol
      definitions:
        zh: 指明 schema 使用 MCP Tool 或 OpenAI function tool 契约。
        en: States whether the schema uses the MCP Tool or OpenAI function-tool contract.
        ja: schema が MCP Tool または OpenAI function-tool contract のどちらを使うかを示す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: MCP
      allowed_values: [MCP, OpenAI]
      source_claims: [moonweave-tool-specification-profile]
    - id: tool_name
      labels:
        zh: 工具名称
        en: Tool name
        ja: tool 名
      definitions:
        zh: 来源 Tool 或 function tool 的名称。
        en: The name of the source Tool or function tool.
        ja: source Tool または function tool の name。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: get_weather
      allowed_values: []
      source_claims: [mcp-tool-schema, openai-function-schema]
    - id: input_schema_field
      labels:
        zh: 输入 schema 来源字段
        en: Input-schema source field
        ja: input-schema source field
      definitions:
        zh: 保留 inputSchema 或 parameters 的原始字段名称。
        en: Retains the original field name inputSchema or parameters.
        ja: 元の field 名 inputSchema または parameters を保持する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: inputSchema
      allowed_values: [inputSchema, parameters]
      source_claims: [mcp-tool-schema, openai-function-schema]
    - id: input_schema
      labels:
        zh: 输入 JSON Schema
        en: Input JSON Schema
        ja: input JSON Schema
      definitions:
        zh: 按来源协议解释的输入 JSON Schema 对象。
        en: The input JSON Schema object interpreted under the source protocol.
        ja: source protocol の下で解釈される input JSON Schema object。
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: '{"type":"object","properties":{"city":{"type":"string"}},"required":["city"]}'
      allowed_values: []
      source_claims: [mcp-tool-schema, openai-function-schema]
    - id: strict_mode
      labels:
        zh: OpenAI 严格模式
        en: OpenAI strict mode
        ja: OpenAI strict mode
      definitions:
        zh: 仅在 OpenAI function tool 来源下表示 strict 是否启用。
        en: Indicates whether strict is enabled only for an OpenAI function-tool source.
        ja: OpenAI function-tool source に対してのみ strict が有効かを示す。
      datatype: boolean
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: true
      allowed_values: []
      source_claims: [openai-strict-mode]
    - id: definition_revision
      labels:
        zh: 能力定义 profile 版本
        en: capability-definition profile version
        ja: capability-definition profile version
      definitions:
        zh: 标识此不可变本地 能力定义 profile 版本；变更必须创建新版本，不得就地修改。
        en: Identifies this immutable local capability-definition profile version; a change must create a new version rather than mutate it in place.
        ja: この不変ローカル capability-definition profile version を識別する。変更は in-place で mutate せず新 version を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "1"
      allowed_values: []
      source_claims: [moonweave-tool-specification-taxonomy]
    - id: catalog_revision_ref
      labels:
        zh: 能力目录修订引用
        en: capability catalog revision reference
        ja: capability catalog revision reference
      definitions:
        zh: 标识拥有此 能力定义 profile 版本 的不可变 能力目录修订；该组成部分在父修订外无效，删除父修订只删除本地 profile，不删除 MCP、OpenAI 或应用配置来源记录。
        en: Identifies the immutable capability catalog revision that owns this capability-definition profile version; the component is invalid outside that parent revision, and deleting the parent revision deletes only local profiles, not MCP, OpenAI, or application-configuration source records.
        ja: この capability-definition profile version を所有する不変 capability catalog revision を識別する。component は parent revision 外では無効で、parent revision を削除してもローカル profile だけが削除され、MCP、OpenAI、application-configuration の source record は削除されない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: capabilitycatalog@1
      allowed_values: []
      source_claims: [moonweave-tool-specification-taxonomy]
    - id: capability_id
      labels:
        zh: 能力标识符
        en: Capability identifier
        ja: 能力識別子
      definitions:
        zh: 在其来源范围内定位记录的名称或标识符。
        en: The name or identifier that locates the record within its source scope.
        ja: source scope 内で記録を特定する名前または識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: code_review
      allowed_values: []
      source_claims: [moonweave-tool-specification-taxonomy]
    - id: source_kind
      labels:
        zh: 来源记录类型
        en: Source record kind
        ja: source record kind
      definitions:
        zh: 记录来源的标准术语，如 Tool、Prompt、Resource、ResourceTemplate 或 function。
        en: The source's standard term, such as Tool, Prompt, Resource, ResourceTemplate, or function.
        ja: Tool、Prompt、Resource、ResourceTemplate、function など source の標準用語。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Prompt
      allowed_values: [Tool, Prompt, Resource, ResourceTemplate, function]
      source_claims: [moonweave-tool-specification-taxonomy]
    - id: contract_summary
      labels:
        zh: 契约摘要
        en: Contract summary
        ja: 契約要約
      definitions:
        zh: 指向来源定义字段的不可替代摘要，而不是重写后的协议 payload。
        en: A non-substituting summary pointing to source definition fields, not a rewritten protocol payload.
        ja: source definition field を指す、置換しない要約であり、書き換えた protocol payload ではない。
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: '{"input_field":"arguments","source_uri":"mcp://server/prompts/code_review"}'
      allowed_values: []
      source_claims: [moonweave-tool-specification-taxonomy]
  constraints:
    - id: source-protocol-preserves-schema-contract
      severity: error
      expression_language: plain
      expression: source_protocol and input_schema_field must agree, and strict_mode is valid only for an OpenAI function-tool profile.
      explanation:
        zh: 相同 JSON Schema 技术不使 MCP inputSchema 与 OpenAI parameters 成为同一 wire 字段。
        en: Shared JSON Schema technology does not make MCP inputSchema and OpenAI parameters one wire field.
        ja: 共通の JSON Schema technology は MCP inputSchema と OpenAI parameters を一つの wire field にしない。
      source_claims: [mcp-tool-schema, openai-function-schema, openai-strict-mode]
    - id: tool-specification-inherits-parent-required-fields
      severity: error
      expression_language: plain
      expression: "All inherited required CapabilityDefinition fields are fields of this same record; the is_a subtype does not establish or reference a second CapabilityDefinition record."
      explanation: {zh: "所有继承的 CapabilityDefinition 必需字段属于同一记录，该 is_a 子类型不建立或引用第二条 CapabilityDefinition 记录。", en: "Inherited required fields stay on the same record rather than creating a second parent record.", ja: "継承された必須 CapabilityDefinition フィールドは同じレコードに属し、この is_a 下位型は 2 番目の親レコードを作成または参照しない。"}
      source_claims: [moonweave-tool-specification-taxonomy]
  required_relations: []
examples:
  - id: tool-specification-positive-mcp-tool

    labels:
      zh: MCP Tool 输入 schema
      en: MCP Tool input schema
      ja: MCP Tool input schema

    descriptions:
      zh: Gorilla APIBench 训练 LLM 生成 API 调用减少 hallucination；LangChain BaseTool(name,description,args_schema,_run(),_arun())；Semantic Kernel @kernel_function；Instructor response_model=Pydantic 作 schema。
      en: Gorilla APIBench trains LLM for API calls reducing hallucination; LangChain BaseTool(name,description,args_schema,_run(),_arun()); Semantic Kernel @kernel_function; Instructor response_model=Pydantic as schema.
      ja: Gorilla APIBench が LLM を訓練して API 呼出し hallucination を低減。LangChain BaseTool。Semantic Kernel @kernel_function。Instructor response_model=Pydantic schema。
    field_values:
      source_protocol: MCP
      tool_name: get_weather
      capability_id: get_weather
      source_kind: Tool
      definition_revision: "1"
      input_schema_field: inputSchema
    related_node_ids: [ToolSpecification]
    related_relation_ids: [ToolSpecification-is_a-CapabilityDefinition]

    source_claims: [mcp-tool-schema, mcp-tool-call]
  - id: tool-specification-counterexample-field-relabel

    labels:
      zh: 将 parameters 重命名为 inputSchema
      en: Parameters relabeled as inputSchema
      ja: parameters を inputSchema と改名する例

    descriptions:
      zh: 反例：Gorilla 无 retriever 生成不存在 API 名；LangChain tool 缺 args_schema Pydantic model；Instructor response_model 字段与 OpenAI function parameters 混用。
      en: Counterexample: Gorilla generates nonexistent API name without retriever; LangChain tool missing args_schema Pydantic model; Instructor response_model fields mixed with OpenAI function parameters.
      ja: 反例：Gorilla が retriever なしで不存在 API 名を生成。LangChain tool に args_schema 欠落。Instructor response_model と OpenAI function parameters 混同。
    field_values:
      source_protocol: OpenAI
      input_schema_field: inputSchema
    related_node_ids: [ToolSpecification]
    related_relation_ids: [ToolSpecification-is_a-CapabilityDefinition]

    source_claims: [mcp-tool-schema, openai-function-schema]
  - id: tool-specification-boundary-schema-and-execution

    labels:
      zh: schema 与执行边界
      en: Boundary between schema and execution
      ja: schema と execution の境界

    descriptions:
      zh: Gorilla API 文档 schema vs LangChain StructuredTool.from_function vs Instructor Pydantic model 的声明-运行时边界；ToolDefinition profile 非 wire 对象。
      en: Declaration-runtime boundary among Gorilla API doc schema, LangChain StructuredTool.from_function, Instructor Pydantic model; ToolDefinition profile is not wire object.
      ja: Gorilla API 文档 schema、LangChain StructuredTool.from_function、Instructor Pydantic model の宣言-ランタイム境界。ToolDefinition profile は wire object ではない。
    field_values:
      tool_name: get_weather
    related_node_ids: [ToolSpecification, ToolDefinition]
    related_relation_ids: [ToolSpecification-is_a-CapabilityDefinition]

    source_claims: [mcp-tool-call]
  - id: tool-specification-instance-openai-strict

    labels:
      zh: OpenAI 严格函数工具实例
      en: OpenAI strict function-tool instance
      ja: OpenAI strict function-tool instance

    descriptions:
      zh: LangChain 实例：StructuredTool.from_function(get_weather,name="get_weather",args_schema=WeatherInput)；Gorilla 实例：HuggingFace pipeline(task="sentiment-analysis") API 调用 schema。
      en: LangChain instance: StructuredTool.from_function(get_weather,name="get_weather",args_schema=WeatherInput); Gorilla instance: HuggingFace pipeline(task="sentiment-analysis") API call schema.
      ja: LangChain 実例：StructuredTool.from_function(get_weather,args_schema=WeatherInput)。Gorilla 実例：HuggingFace pipeline(task="sentiment-analysis") API 呼出し schema。
    field_values:
      source_protocol: OpenAI
      tool_name: get_weather
      capability_id: get_weather
      source_kind: function
      definition_revision: "1"
      input_schema_field: parameters
      strict_mode: true
    related_node_ids: [ToolSpecification, FunctionTool]
    related_relation_ids: [ToolSpecification-is_a-CapabilityDefinition]

    source_claims: [openai-function-schema, openai-strict-mode]
parent_relation:
  id: ToolSpecification-is_a-CapabilityDefinition
  predicate: is_a
  target: concept:CapabilityDefinition
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是能力定义 profile 的一种
    en: is a kind of capability definition profile
    ja: 能力定義 profile の一種である
  definition:
    zh: ToolSpecification 是保存跨协议工具 schema 差异的本地能力定义 profile。
    en: ToolSpecification is a local capability definition profile that preserves cross-protocol tool-schema differences.
    ja: ToolSpecification は protocol 横断 tool-schema difference を保持するローカル capability definition profile である。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 具有子类型
      en: has subtype
      ja: subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: This is local taxonomy and does not define a shared MCP/OpenAI ToolSpecification wire type.
  constraints:
    - id: tool-specification-taxonomy-is-local
      severity: error
      expression_language: plain
      expression: The subtype relation must remain a Moonweave local profile taxonomy and cannot claim an MCP or OpenAI shared parent type.
      explanation:
        zh: 两个协议可使用 JSON Schema，但没有共同的 ToolSpecification wire object。
        en: The two protocols may use JSON Schema but have no shared ToolSpecification wire object.
        ja: 二つの protocol は JSON Schema を使い得るが、共有 ToolSpecification wire object はない。
      source_claims: [moonweave-tool-specification-taxonomy]
  examples: []
  source_claims: [moonweave-tool-specification-taxonomy]
  distinct_fact_rationale:
    zh: 此边仅组织本地 schema 比较，不合并协议对象。
    en: This edge organizes local schema comparison and does not merge protocol objects.
    ja: この edge はローカル schema comparison を整理し、protocol object を統合しない。
relations: []
