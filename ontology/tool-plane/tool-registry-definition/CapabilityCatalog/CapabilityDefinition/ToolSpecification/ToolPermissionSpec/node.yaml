      ja: ToolPermissionSpec 境界例
    scenario_id: null
    descriptions:
      zh: 运行时针对 call-218 判定当前用户无权限。
      en: At runtime, call-218 is denied for the current user.
      ja: runtime で call-218 が current user に deny されます。
    field_values: {}
    related_node_ids:
