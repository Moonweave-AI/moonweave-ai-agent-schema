schema: moonweave.ai/ontology-node/v1
id: ToolPermissionSpec
kind: concept
labels:
  zh: 工具权限策略 profile
  en: Tool permission-policy profile
  ja: ツール権限 policy profile
semantics:
  short_definition:
    zh: 记录本地工具调用审批与授权规则的 Moonweave profile。
    en: A Moonweave profile recording local approval and authorization rules for tool calls.
    ja: tool call のローカル approval と authorization rule を記録する Moonweave profile。
  definition:
    zh: >
      ToolPermissionSpec 是本地治理 profile，用于描述工具调用前的审批、允许条件和责任边界。它不是 MCP Tool 字段、
      MCP capability negotiation，也不是 OpenAI function tool schema。某些 Agents SDK 集成提供 require_approval 等
      运行时选项，但这不建立一个跨协议通用的 permission wire type。
    en: >
      ToolPermissionSpec is a local governance profile describing approval, allow conditions, and
      responsibility boundaries before a tool call. It is not an MCP Tool field, MCP capability
      negotiation, or an OpenAI function-tool schema. Some Agents SDK integrations provide runtime
      options such as require_approval, but that does not establish a cross-protocol permission wire type.
    ja: >
      ToolPermissionSpec は tool call 前の approval、allow condition、responsibility boundary を記述するローカル
      governance profile である。MCP Tool field、MCP capability negotiation、OpenAI function-tool schema ではない。
      一部の Agents SDK integration は require_approval などの runtime option を提供するが、それは protocol 横断の
      permission wire type を確立しない。
  why_needed:
    zh: 工具可发现并不代表允许执行；本地策略必须明确保存和审计。
    en: A discoverable tool is not necessarily permitted to execute, so local policy must be explicit and auditable.
    ja: 発見可能な tool が実行を許可されるとは限らないため、ローカル policy は明示的かつ監査可能でなければならない。
  includes:
    - zh: 本地审批模式、适用主体和允许条件。
      en: Local approval mode, subject scope, and allow conditions.
      ja: ローカル approval mode、subject scope、allow condition。
    - zh: 对运行时审批机制的来源引用。
      en: Provenance references to runtime approval mechanisms.
      ja: runtime approval mechanism への provenance reference。
  excludes:
    - zh: MCP Tool 定义中的 inputSchema 或 annotations。
      en: An MCP Tool inputSchema or annotations object.
      ja: MCP Tool inputSchema または annotations object。
    - zh: 可发现性、发布表面或实际执行结果。
      en: Discoverability, publication surface, or an actual execution result.
      ja: discoverability、publication surface、実際の execution result。
  semantic_kind: entity
  aliases:
    - language: en
      value: local tool-approval policy
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      本地执行器在调用前读取 policy_ref 和 approval_mode，并将实际批准结果另记为运行时事件。对 MCP server 的
      require_approval 配置仅是某一 SDK 连接器选项；本 profile 不能反向声称所有 MCP Tool 或 OpenAI function 都有
      同一审批字段。
    en: >
      A local executor reads policy_ref and approval_mode before a call and records the actual
      approval result separately as a runtime event. require_approval on an MCP server is one SDK
      connector option; this profile cannot claim every MCP Tool or OpenAI function has the same approval field.
    ja: >
      ローカル executor は call 前に policy_ref と approval_mode を読み、実際の approval result を runtime event として
      別に記録する。MCP server の require_approval は一つの SDK connector option である。この profile はすべての
      MCP Tool または OpenAI function に同じ approval field があると主張できない。
  typical_input:
    - description:
        zh: 对危险工具要求人工批准的本地策略。
        en: A local policy requiring human approval for a sensitive tool.
        ja: sensitive tool に human approval を要求するローカル policy。
      format: |
        {"tool_ref":"delete_file","approval_mode":"always","policy_ref":"safety-v1"}
      source_claims: [moonweave-tool-permission-profile]
  typical_output:
    - description:
        zh: 交给运行时执行器的审批请求。
        en: An approval request handed to a runtime executor.
        ja: runtime executor に渡す approval request。
      format: |
        {"tool_ref":"delete_file","approval_required":true,"policy_ref":"safety-v1"}
      source_claims: [moonweave-tool-permission-profile]
  reference_implementations:
    - name: OpenAI Agents SDK MCP integration
      url: https://openai.github.io/openai-agents-python/mcp/
      description: Documents per-server and per-tool require_approval runtime configuration.
structure:
  identity_keys: [policy_id, tool_ref, policy_revision]
  fields:
    - id: policy_revision
      labels:
        zh: 工具权限策略 profile 版本
        en: tool-permission policy profile version
        ja: tool-permission policy profile version
      definitions:
        zh: 标识此不可变本地 工具权限策略 profile 版本；变更必须创建新版本，不得就地修改。
        en: Identifies this immutable local tool-permission policy profile version; a change must create a new version rather than mutate it in place.
        ja: この不変ローカル tool-permission policy profile version を識別する。変更は in-place で mutate せず新 version を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "1"
      allowed_values: []
      source_claims: [moonweave-tool-permission-profile, moonweave-tool-permission-taxonomy]
    - id: tool_specification_revision_ref
      labels:
        zh: 工具规范 profile 修订引用
        en: tool-specification profile revision reference
        ja: tool-specification profile revision reference
      definitions:
        zh: 标识拥有此 工具权限策略 profile 版本 的不可变 工具规范 profile 修订；该组成部分在父修订外无效，删除父修订只删除本地 profile，不删除 运行时授权决定和来源协议字段。
        en: Identifies the immutable tool-specification profile revision that owns this tool-permission policy profile version; the component is invalid outside that parent revision, and deleting the parent revision deletes only local profiles, not runtime authorization decisions and source-protocol fields.
        ja: この tool-permission policy profile version を所有する不変 tool-specification profile revision を識別する。component は parent revision 外では無効で、parent revision を削除してもローカル profile だけが削除され、runtime authorization decision と source-protocol field は削除されない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: toolspecification@1
      allowed_values: []
      source_claims: [moonweave-tool-permission-profile, moonweave-tool-permission-taxonomy]
    - id: policy_id
      labels:
        zh: 策略标识符
        en: Policy identifier
        ja: policy 識別子
      definitions:
        zh: 本地权限策略的稳定标识符。
        en: A stable identifier for the local permission policy.
        ja: ローカル permission policy の安定識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: safety-v1
      allowed_values: []
      source_claims: [moonweave-tool-permission-profile]
    - id: tool_ref
      labels:
        zh: 工具引用
        en: Tool reference
        ja: tool reference
      definitions:
        zh: 本地策略适用的工具或工具定义引用。
        en: The tool or tool-definition reference to which local policy applies.
        ja: ローカル policy が適用される tool または tool-definition reference。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: delete_file
      allowed_values: []
      source_claims: [moonweave-tool-permission-profile]
    - id: approval_mode
      labels:
        zh: 审批模式
        en: Approval mode
        ja: approval mode
      definitions:
        zh: 本地策略要求批准的方式。
        en: The way local policy requires approval.
        ja: ローカル policy が approval を要求する方式。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: always
      allowed_values: [always, never, conditional]
      source_claims: [moonweave-tool-permission-profile]
    - id: policy_ref
      labels:
        zh: 策略出处引用
        en: Policy provenance reference
        ja: policy provenance reference
      definitions:
        zh: 说明该本地规则来源和版本的引用。
        en: A reference explaining source and version of the local rule.
        ja: ローカル rule の source と version を説明する reference。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: safety-v1
      allowed_values: []
      source_claims: [moonweave-tool-permission-profile]
  constraints:
    - id: permission-profile-is-not-tool-schema
      severity: error
      expression_language: plain
      expression: ToolPermissionSpec must identify a local policy and may not be serialized as an MCP Tool field or OpenAI function parameters field.
      explanation:
        zh: 权限治理和输入契约分别属于本地策略层与协议定义层。
        en: Permission governance and input contract belong to local policy and protocol-definition layers respectively.
        ja: permission governance と input contract はそれぞれローカル policy layer と protocol-definition layer に属する。
      source_claims: [moonweave-tool-permission-profile]
  required_relations: [ToolPermissionSpec-part_of-ToolSpecification]
examples:
  - id: tool-permission-positive-human-approval

    labels:
      zh: 删除操作人工审批
      en: Human approval for deletion
      ja: deletion の human approval

    descriptions:
      zh: Gorilla APIBench 训练 LLM 生成 API 调用减少 hallucination；LangChain BaseTool(name,description,args_schema,_run(),_arun())；Semantic Kernel @kernel_function；Instructor response_model=Pydantic 作 schema。
      en: Gorilla APIBench trains LLM for API calls reducing hallucination; LangChain BaseTool(name,description,args_schema,_run(),_arun()); Semantic Kernel @kernel_function; Instructor response_model=Pydantic as schema.
      ja: Gorilla APIBench が LLM を訓練して API 呼出し hallucination を低減。LangChain BaseTool。Semantic Kernel @kernel_function。Instructor response_model=Pydantic schema。
    field_values:
      tool_ref: delete_file
      approval_mode: always
    related_node_ids: [ToolPermissionSpec, Tool]
    related_relation_ids: [ToolPermissionSpec-part_of-ToolSpecification]

    source_claims: [moonweave-tool-permission-profile]
  - id: tool-permission-counterexample-mcp-field

    labels:
      zh: 本地策略伪装为 MCP Tool 字段
      en: Local policy posed as MCP Tool field
      ja: ローカル policy を MCP Tool field と偽装する例

    descriptions:
      zh: 反例：Gorilla 无 retriever 生成不存在 API 名；LangChain tool 缺 args_schema Pydantic model；Instructor response_model 字段与 OpenAI function parameters 混用。
      en: Counterexample: Gorilla generates nonexistent API name without retriever; LangChain tool missing args_schema Pydantic model; Instructor response_model fields mixed with OpenAI function parameters.
      ja: 反例：Gorilla が retriever なしで不存在 API 名を生成。LangChain tool に args_schema 欠落。Instructor response_model と OpenAI function parameters 混同。
    field_values:
      approval_mode: always
    related_node_ids: [ToolPermissionSpec]
    related_relation_ids: [ToolPermissionSpec-part_of-ToolSpecification]

    source_claims: [moonweave-tool-permission-profile]
  - id: tool-permission-boundary-approval-result

    labels:
      zh: 策略与批准结果边界
      en: Boundary between policy and approval result
      ja: policy と approval result の境界

    descriptions:
      zh: Gorilla API 文档 schema vs LangChain StructuredTool.from_function vs Instructor Pydantic model 的声明-运行时边界；ToolDefinition profile 非 wire 对象。
      en: Declaration-runtime boundary among Gorilla API doc schema, LangChain StructuredTool.from_function, Instructor Pydantic model; ToolDefinition profile is not wire object.
      ja: Gorilla API 文档 schema、LangChain StructuredTool.from_function、Instructor Pydantic model の宣言-ランタイム境界。ToolDefinition profile は wire object ではない。
    field_values:
      approval_mode: always
    related_node_ids: [ToolPermissionSpec]
    related_relation_ids: [ToolPermissionSpec-part_of-ToolSpecification]

    source_claims: [moonweave-tool-permission-profile]
  - id: tool-permission-instance-agents-mcp

    labels:
      zh: Agents SDK MCP 审批配置实例
      en: Agents SDK MCP approval configuration instance
      ja: Agents SDK MCP approval configuration instance

    descriptions:
      zh: LangChain 实例：StructuredTool.from_function(get_weather,name="get_weather",args_schema=WeatherInput)；Gorilla 实例：HuggingFace pipeline(task="sentiment-analysis") API 调用 schema。
      en: LangChain instance: StructuredTool.from_function(get_weather,name="get_weather",args_schema=WeatherInput); Gorilla instance: HuggingFace pipeline(task="sentiment-analysis") API call schema.
      ja: LangChain 実例：StructuredTool.from_function(get_weather,args_schema=WeatherInput)。Gorilla 実例：HuggingFace pipeline(task="sentiment-analysis") API 呼出し schema。
    field_values:
      tool_ref: delete_file
      approval_mode: always
    related_node_ids: [ToolPermissionSpec, HostedMCPTool]
    related_relation_ids: [ToolPermissionSpec-part_of-ToolSpecification]

    source_claims: [agents-mcp-require-approval, moonweave-tool-permission-profile]
parent_relation:
  id: ToolPermissionSpec-part_of-ToolSpecification
  predicate: part_of
  target: concept:ToolSpecification
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是工具规范 profile 修订的不可变组成部分
    en: is an immutable component of tool-specification profile revision
    ja: tool-specification profile revision の不変 component である
  definition:
    zh: ToolPermissionSpec 仅作为 tool_specification_revision_ref 标识的 工具规范 profile 修订 中的 工具权限策略 profile 版本 存在；父修订拥有该 profile 副本与删除边界，运行时授权决定和来源协议字段 始终位于该边界之外。
    en: ToolPermissionSpec exists only as a tool-permission policy profile version in the tool-specification profile revision identified by tool_specification_revision_ref; the parent revision owns this profile copy and deletion boundary, while runtime authorization decisions and source-protocol fields always remain outside that boundary.
    ja: ToolPermissionSpec は tool_specification_revision_ref が識別する tool-specification profile revision 内の tool-permission policy profile version としてのみ存在する。parent revision はこの profile copy と deletion boundary を所有し、runtime authorization decision と source-protocol field は常にその boundary 外に残る。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_part
    labels:
      zh: 包含不可变组成版本
      en: has immutable component version
      ja: immutable component version を持つ
  conditions: []
  temporal_scope: versioned
  boundary_context: This strict local composition records a versioned deletion boundary for a Moonweave profile component. It does not make runtime authorization decisions and source-protocol fields components of the parent.
  constraints:
    - id: toolpermissionspec-strict-versioned-composition
      severity: error
      expression_language: plain
      expression: ToolPermissionSpec must carry tool_specification_revision_ref and policy_revision, may not outlive or be independently deleted from that parent revision, and must not cascade deletion to runtime authorization decisions and source-protocol fields.
      explanation:
        zh: 该组成部分是本地父修订的严格版本化部分；它没有孤立的可变生命周期，且不能删除运行时授权决定和来源协议字段。
        en: The component is a strict versioned part of its local parent revision; it has no orphan mutable lifecycle and cannot delete runtime authorization decisions and source-protocol fields.
        ja: component はローカル parent revision の strict versioned part である。orphan mutable lifecycle を持たず、runtime authorization decision と source-protocol field を削除できない。
      source_claims: [moonweave-tool-permission-taxonomy]
  examples: []
  source_claims: [moonweave-tool-permission-taxonomy]
  distinct_fact_rationale:
    zh: 此关系表达本地 profile 版本的所有权和删除边界；运行时授权决定和来源协议字段 的来源与生命周期由其各自系统保持。
    en: This relation expresses ownership and deletion boundary of a local profile version; provenance and lifecycle of runtime authorization decisions and source-protocol fields remain with their respective systems.
    ja: この relation はローカル profile version の ownership と deletion boundary を表す。runtime authorization decision と source-protocol field の provenance と lifecycle は各 system に残る。
relations: []
