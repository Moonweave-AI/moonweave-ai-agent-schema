source_claims:
  - id: agents-mcp-require-approval
    source: openai-agents-sdk-mcp
    supports: Agents SDK MCP server integrations support require_approval policies that can be global or per tool.
    locator: "Streamable HTTP MCP servers; Approval policies"
    evidence_kind: normative
    confidence: high
  - id: moonweave-tool-permission-profile
    source: moonweave-ontology-design
    supports: ToolPermissionSpec is a Moonweave local governance profile for approval and allow conditions before tool execution.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
  - id: moonweave-tool-permission-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave treats ToolPermissionSpec as a strict immutable component of a ToolSpecification revision; local policy profile deletion does not delete source-protocol fields or runtime authorization decisions.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
