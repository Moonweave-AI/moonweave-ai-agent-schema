    descriptions:
      zh: 只读天气工具允许生产助手查询公共城市，但禁止写操作。
      en: A read-only weather tool lets the production assistant query public cities but forbids write actions.
      ja: read-only weather tool が本番 assistant の public city query を許可し write action を禁止します。
    field_values:
      capability_definition_id: capdef:weather-permission
      version: 2.0.0
      name: weather-read-policy
      contract_kind: permission
      subject_scope: production-assistants
      allowed_actions:
