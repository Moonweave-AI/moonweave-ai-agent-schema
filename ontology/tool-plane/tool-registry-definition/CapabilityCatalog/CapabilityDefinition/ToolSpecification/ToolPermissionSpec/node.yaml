      - ToolSpecification
    related_relation_ids:
      - ToolPermissionSpec-is_a-ToolSpecification
    expected_result:
      zh: 版本化规则归 ToolPermissionSpec 并约束工具。
      en: The versioned rule is ToolPermissionSpec constraining the tool.
      ja: versioned rule を ToolPermissionSpec とし tool を制約します。
    why_valid_or_invalid:
      zh: 规则跨多次调用稳定并可独立版本化。
      en: The rule persists across calls and can be versioned independently.
      ja: rule が複数 call を越えて安定し独立 version 化できるためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
