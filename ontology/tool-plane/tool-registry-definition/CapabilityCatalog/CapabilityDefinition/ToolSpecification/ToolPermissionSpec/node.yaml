      zh: 该记录是权限决定事件，不是新的权限规格。
      en: The record is a permission-decision event, not a new ToolPermissionSpec.
      ja: record は permission-decision event で新 ToolPermissionSpec ではありません。
    why_valid_or_invalid:
      zh: 决定依赖本次主体和上下文，规格声明可复用规则。
      en: The decision depends on this subject and context; the specification declares reusable rules.
      ja: decision は今回 subject/context に依存し specification は reusable rule を宣言するためです。
