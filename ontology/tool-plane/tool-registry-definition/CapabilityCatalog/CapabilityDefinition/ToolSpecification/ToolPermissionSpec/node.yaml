schema: moonweave.ai/ontology-node/v1
id: ToolPermissionSpec
kind: concept
status: accepted
labels:
  zh: 工具权限规格
  en: Tool Permission Specification
  ja: ツール権限仕様
semantics:
  short_definition:
    zh: 工具权限规格声明使用工具前必须满足的权限与审批条件。
    en: A Tool Permission Specification declares permission and approval conditions required before using a tool.
    ja: ツール権限仕様は tool 利用前の permission と approval 条件を宣言します。
  definition:
    zh: 工具权限规格是一种工具规格，复用上位 capability_definition_id 作为稳定身份，声明允许的主体、动作、资源范围、环境与审批条件；它约束 Tool 和调用计划，但不再引入同义 permission_spec_id，也不等同于运行时权限决定或用户一次授权。
    en: A Tool Permission Specification is a ToolSpecification that reuses the inherited capability_definition_id as its stable identity. It declares allowed subjects, actions, resource scope, environments, and approval conditions without introducing a synonymous permission_spec_id; it constrains Tool and call planning but is not a runtime permission decision or one user consent.
    ja: ツール権限仕様は継承した capability_definition_id を安定 identity として再利用し、subject、action、resource scope、environment、approval 条件を宣言する ToolSpecification です。同義 permission_spec_id、runtime permission decision、一回の user consent ではありません。
  why_needed:
    zh: 把权限合同置于规格层，既可与工具定义关联，又能让运行时策略决定保留自己的事件身份和上下文。
    en: Keeping permission contracts in the specification layer links them to definitions while preserving separate identities for runtime policy decisions and context.
    ja: permission contract を specification 層に置き、definition との関連と runtime policy decision の別 identity を両立します。
  includes:
    - zh: 纳入版本化的主体、动作、资源和审批条件集合。
      en: Includes versioned sets of subject, action, resource, and approval conditions.
      ja: versioned subject、action、resource、approval condition set を含みます。
  excludes:
    - zh: 排除一次权限检查结果、用户同意事件、沙箱配置和一般安全政策。
      en: Excludes one permission-check result, a user-consent event, sandbox configuration, and general safety policy.
      ja: 一回の permission-check result、user consent event、sandbox config、general safety policy を除きます。
  semantic_kind: specification
  aliases: []
