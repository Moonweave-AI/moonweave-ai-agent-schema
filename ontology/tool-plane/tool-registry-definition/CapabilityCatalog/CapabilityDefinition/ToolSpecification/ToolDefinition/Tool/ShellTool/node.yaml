schema: moonweave.ai/ontology-node/v1
id: ShellTool
kind: concept
status: review
labels:
  zh: Shell 工具
  en: Shell Tool
  ja: シェルツール
semantics:
  short_definition:
    zh: Shell 工具以命令语言调用操作系统环境，并可由应用本地执行或由平台托管执行。
    en: A Shell Tool invokes an operating-system environment through command language and may execute locally under the application or in a hosted platform container.
    ja: Shell Tool は command language で operating-system environment を呼び出し、application local または platform-hosted container で実行できます。
  definition:
    zh: Shell 工具是 Tool 的严格下位类型，继承 Tool 的 tool_id 作为已注册工具身份；executor_ref 与 working_directory 描述命令接口和执行配置，不创建另一身份。它接收命令或脚本并返回 stdout、stderr 与退出状态；执行责任再由 LocalShellTool 或 HostedShellTool 区分。
    en: A Shell Tool is a strict Tool subtype and inherits the registered-tool identity tool_id from Tool; executor_ref and working_directory describe its command interface and execution configuration without creating another identity. It accepts commands or scripts and returns stdout, stderr, and exit status, while LocalShellTool and HostedShellTool further distinguish execution responsibility.
    ja: Shell Tool は Tool の厳密な下位型で、Tool から registered-tool identity の tool_id を継承します。executor_ref と working_directory は command interface と実行設定で、別 identity を作りません。command/script を受け stdout・stderr・exit status を返し、LocalShellTool と HostedShellTool が実行責任を分けます。
  why_needed:
    zh: Shell 机制有独特的命令语言、工作目录和进程风险，不能与普通函数或计算机界面动作混为同级无差别节点。
    en: Shell execution has distinct command-language, working-directory, and process risks and must remain separate from ordinary functions and computer-interface actions.
    ja: shell execution は command language、working directory、process risk が固有で function や UI action と区別が必要です。
  includes:
    - zh: 纳入通过 shell 命令接口执行命令并报告退出状态的本地或托管工具。
      en: Includes local or hosted tools that execute through a shell-command interface and report exit status.
      ja: shell-command interface で command を実行し exit status を返す local/hosted tool を含みます。
  excludes:
    - zh: 排除纯函数处理器、GUI 点击工具、非 shell 的托管代码解释器和一次命令运行记录。
      en: Excludes pure function handlers, GUI click tools, non-shell hosted code interpreters, and one command-run record.
      ja: pure function handler・GUI click tool・non-shell hosted code interpreter・一回の command-run record を除きます。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: executor_ref
      labels:
        zh: 命令执行器引用
        en: command-executor reference
        ja: command executor 参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 命令执行器引用作为 ShellTool 节点内部信息保存，不建立同名图节点。
        en: command-executor reference is stored as information on the ShellTool node and does not create a namesake graph node.
        ja: command executor 参照は ShellTool node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: powershell:workspace
      source_claims:
        - claim-shell-tool-002
    - id: working_directory
      labels:
        zh: 工作目录
        en: working directory
        ja: 作業 directory
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 工作目录作为 ShellTool 节点内部信息保存，不建立同名图节点。
        en: working directory is stored as information on the ShellTool node and does not create a namesake graph node.
        ja: 作業 directoryは ShellTool node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: D:/workspace
      source_claims:
        - claim-shell-tool-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: ShellTool-example-positive-manual-001
    kind: positive
    labels:
      zh: ShellTool 正例
      en: ShellTool positive case
      ja: ShellTool 正例
    scenario_id: null
    descriptions:
      zh: 代理通过受控 PowerShell 执行器在工作区运行只读构建检查。
      en: An agent runs a read-only build check in the workspace through a controlled PowerShell executor.
      ja: agent が controlled PowerShell executor で workspace の read-only build check を実行します。
    field_values:
      tool_id: tool:shell:workspace
      provisioning_mode: local-runtime
      executor_ref: executor:powershell:workspace-readonly
      working_directory: D:/moonweave-ai/moonweave-ai-agent-schema
    related_node_ids:
      - ShellTool
      - Tool
    related_relation_ids:
      - ShellTool-is_a-Tool
    expected_result:
      zh: 把命令接口识别为 ShellTool；再根据执行责任归入 LocalShellTool 或 HostedShellTool。
      en: Identify the command interface as ShellTool, then classify it as LocalShellTool or HostedShellTool according to execution responsibility.
      ja: command interface を ShellTool と識別し、実行責任により LocalShellTool または HostedShellTool に分類します。
    why_valid_or_invalid:
      zh: 输入是命令语言，结果包含进程退出状态。
      en: Its input is command language and its result includes process exit status.
      ja: input が command language で result が process exit status を含むためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-shell-tool-004
  - id: ShellTool-example-boundary-manual-001
    kind: boundary
    labels:
      zh: ShellTool 边界例
      en: ShellTool boundary case
      ja: ShellTool 境界例
    scenario_id: null
    descriptions:
      zh: 平台托管 Python 解释器并在服务端执行代码。
      en: A platform hosts a Python interpreter and executes code on its servers.
      ja: platform が Python interpreter を hosted し server-side で code を実行します。
    field_values: {}
    related_node_ids:
      - ShellTool
      - Tool
    related_relation_ids:
      - ShellTool-is_a-Tool
    expected_result:
      zh: 该对象可归 HostedTool，但只有提供 shell 命令接口时才同时归入 HostedShellTool。
      en: The object may be a HostedTool, but it is a HostedShellTool only when it exposes a shell-command interface.
      ja: object は HostedTool になり得ますが、shell-command interface を提供する場合だけ HostedShellTool です。
    why_valid_or_invalid:
      zh: 类似命令的输入不能覆盖执行基础设施的分类依据。
      en: Command-like input does not override the execution-infrastructure criterion.
      ja: command-like input は execution infrastructure 分類条件を上書きしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-shell-tool-005
