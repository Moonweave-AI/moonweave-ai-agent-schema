schema: moonweave.ai/ontology-node/v1
id: APIOperation
kind: concept
status: accepted
labels:
  zh: API 操作
  en: API Operation
  ja: API 操作
semantics:
  short_definition:
    zh: API 操作是可由工具暴露的一项具名外部动作。
    en: An API Operation is one named external action exposed by a tool.
    ja: API 操作はツールが公開する名前付き外部動作です。
  definition:
    zh: API 操作是一种工具能力，以方法或动作名、目标端点、参数约束、结果约束、认证要求和副作用语义共同确定；它描述可做什么，不等同于一次真实调用。
    en: An API Operation is a ToolCapability determined by its method or action name, target endpoint, argument constraints, result constraints, authentication requirements, and side-effect semantics; it describes what can be done, not one invocation.
    ja: API 操作は、動作名、対象 endpoint、引数・結果制約、認証要件、副作用意味で決まるツール能力であり、一回の呼出し記録ではありません。
  why_needed:
    zh: 把操作置于能力层可以让发现阶段比较能力，同时让调用阶段继续使用独立的调用身份与结果。
    en: Keeping operations in the capability layer supports discovery-time comparison while preserving separate invocation identities and results.
    ja: 操作を能力層に置くことで、発見時の比較と呼出し時の独立した同一性を両立できます。
  includes:
    - zh: 纳入具有稳定动作名、输入边界和可观察结果类型的 API 动作。
      en: Includes API actions with a stable action name, input boundary, and observable result type.
      ja: 安定した動作名、入力境界、観測可能な結果型を持つ API 動作を含みます。
  excludes:
    - zh: 排除一次 tools/call 请求、HTTP 往返记录以及只描述整个工具的元数据。
      en: Excludes one tools/call request, an HTTP exchange record, and metadata describing the whole tool.
      ja: 一回の tools/call 要求、HTTP 交換記録、ツール全体の metadata を除きます。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: action_name
      labels:
        zh: 动作名称
        en: action name
        ja: 動作名
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 动作名称作为 APIOperation 节点内部信息保存，不建立同名图节点。
        en: action name is stored as information on the APIOperation node and does not create a namesake graph node.
        ja: 動作名は APIOperation node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: weather.lookup
      source_claims:
        - claim-api-operation-003
        - claim-api-operation-004
    - id: input_contract
      labels:
        zh: 输入合同
        en: input contract
        ja: 入力契約
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 输入合同作为 APIOperation 节点内部信息保存，不建立同名图节点。
        en: input contract is stored as information on the APIOperation node and does not create a namesake graph node.
        ja: 入力契約は APIOperation node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value:
        type: object
      source_claims:
        - claim-api-operation-005
        - claim-api-operation-006
    - id: result_contract
      labels:
        zh: 结果合同
        en: result contract
        ja: 結果契約
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 结果合同作为 APIOperation 节点内部信息保存，不建立同名图节点。
        en: result contract is stored as information on the APIOperation node and does not create a namesake graph node.
        ja: 結果契約は APIOperation node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value:
        type: object
      source_claims:
        - claim-api-operation-007
        - claim-api-operation-008
  constraints: []
  required_relation_constraints: []
examples:
  - id: APIOperation-example-positive-manual-001
    kind: positive
    labels:
      zh: APIOperation 正例
      en: APIOperation positive case
      ja: APIOperation 正例
    scenario_id: null
    descriptions:
      zh: "`weather.lookup` 以城市为参数并返回预报对象，作为工具的一项稳定操作发布。"
      en: "`weather.lookup` accepts a city and returns a forecast object as a stable tool operation."
      ja: "`weather.lookup` は都市を受け取り予報 object を返す安定した操作として公開されます。"
    field_values:
      capability_id: capability:weather-lookup
      input_boundary:
        type: object
        required:
          - city
        properties:
          city:
            type: string
      effect_semantics: read-external-data
      action_name: weather.lookup
      input_contract:
        type: object
        required:
          - city
        properties:
          city:
            type: string
      result_contract:
        type: object
        required:
          - temperature_c
          - conditions
        properties:
          temperature_c:
            type: number
          conditions:
            type: string
    related_node_ids:
      - APIOperation
      - ToolCapability
    related_relation_ids:
      - APIOperation-is_a-ToolCapability
    expected_result:
      zh: 该记录归入 API 操作，并保留输入、结果和副作用边界。
      en: The record is classified as an API Operation with argument, result, and side-effect boundaries.
      ja: 記録を API 操作に分類し、引数・結果・副作用境界を保持します。
    why_valid_or_invalid:
      zh: 对象描述可复用动作合同，而非某一次请求。
      en: It describes a reusable action contract rather than one request.
      ja: 一回の要求ではなく再利用可能な動作契約を記述するためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-api-operation-009
      - claim-api-operation-010
  - id: APIOperation-example-boundary-manual-001
    kind: boundary
    labels:
      zh: APIOperation 边界例
      en: APIOperation boundary case
      ja: APIOperation 境界例
    scenario_id: null
    descriptions:
      zh: 编号为 call-92 的 `weather.lookup` 已经执行并产生错误结果。
      en: Call `call-92` already executed `weather.lookup` and produced an error result.
      ja: call-92 は `weather.lookup` を実行し error result を生成しました。
    field_values: {}
    related_node_ids:
      - APIOperation
      - ToolCapability
    related_relation_ids:
      - APIOperation-is_a-ToolCapability
    expected_result:
      zh: 该对象留在调用执行域，不能作为 API 操作节点。
      en: The object stays in invocation execution and is not an API Operation node.
      ja: 対象は呼出し実行領域に残り API 操作 node にはしません。
    why_valid_or_invalid:
      zh: 调用 ID 和结果状态决定的是事件身份，操作定义则跨调用持续存在。
      en: Invocation ID and result status identify an event, whereas an operation persists across calls.
      ja: 呼出し ID と結果状態は event を識別し、操作は複数呼出しを越えて存続します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-api-operation-011
      - claim-api-operation-012
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: APIOperation-is_a-ToolCapability
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: is_a
    en: is a
    ja: is_a
  definitions:
    zh: API 操作是一种工具能力：它继承可复用能力身份，并以具名外部动作、接口与效果作为进一步种差。
    en: APIOperation is a ToolCapability specialized by a named external action, interface, and effect while retaining reusable capability identity.
    ja: APIOperation は reusable capability identity を継承し、名前付き外部動作・interface・effect で細分化した ToolCapability です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体注册表与版本策略。
    en: Cardinality depends on the concrete registry and version policy.
    ja: cardinality は具体 registry と version policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：is_a
      en: inverse of is_a
      ja: 逆：is_a
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: APIOperation-is_a-ToolCapability-example-positive-manual-001
      kind: positive
      labels:
        zh: APIOperation-is_a-ToolCapability 正例
        en: APIOperation-is_a-ToolCapability positive case
