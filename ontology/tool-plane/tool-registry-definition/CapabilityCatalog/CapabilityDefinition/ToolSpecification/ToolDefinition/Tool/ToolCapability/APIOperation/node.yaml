      descriptions:
        zh: "`weather.lookup` 既是可复用读取能力，又明确声明城市参数和预报结果。"
        en: "`weather.lookup` is a reusable reading ability with explicit city arguments and forecast results."
        ja: "`weather.lookup` は city argument と forecast result を持つ reusable reading ability です。"
      field_values: {}
      related_node_ids:
