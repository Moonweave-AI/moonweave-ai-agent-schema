        ja: APIOperation —is_a→ ToolCapability を保持し定義どおり解釈します。
      why_valid_or_invalid:
        zh: 场景同时满足来源身份、目标身份和本关系要求的业务条件。
        en: The case satisfies the source identity, target identity, and the business condition required by this relation.
        ja: case は source identity、target identity、relation が要求する business condition を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-api-operation-013
    - id: APIOperation-is_a-ToolCapability-example-boundary-manual-001
      kind: boundary
      labels:
        zh: APIOperation-is_a-ToolCapability 边界例
        en: APIOperation-is_a-ToolCapability boundary case
        ja: APIOperation-is_a-ToolCapability 境界例
      scenario_id: null
      descriptions:
        zh: 一次编号调用只有参数、状态和结果，没有跨调用的操作身份。
        en: One numbered call has arguments, state, and result but no operation identity across calls.
        ja: 一回の numbered call は argument・state・result を持つが cross-call operation identity はありません。
      field_values: {}
      related_node_ids:
        - APIOperation
        - ToolCapability
      related_relation_ids:
        - APIOperation-is_a-ToolCapability
      expected_result:
        zh: 不以该场景建立 APIOperation-is_a-ToolCapability，并把对象保留在其正确身份中。
        en: Do not assert APIOperation-is_a-ToolCapability for this case; retain each object under its correct identity.
        ja: この case では APIOperation-is_a-ToolCapability を assertion せず各 object の正しい identity を保持します。
      why_valid_or_invalid:
        zh: 场景缺少本关系要求的决定性条件；相邻概念或时间接近不能补足该条件。
        en: The case lacks the relation's decisive condition; conceptual adjacency or temporal proximity cannot supply it.
        ja: case は relation の decisive condition を欠き、concept adjacency や temporal proximity では補えません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-api-operation-014
  source_claims:
    - claim-api-operation-015
  distinct_fact_rationale:
    zh: 该边表达一个不可由端点层级替代的独立业务事实。
    en: This edge expresses an independent business fact that endpoint hierarchy cannot replace.
    ja: この edge は endpoint hierarchy で代替できない独立 business fact を表します。
