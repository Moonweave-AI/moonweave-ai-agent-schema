schema: moonweave.ai/ontology-node/v1
id: HostedMCPTool
kind: concept
status: review
labels:
  zh: 托管 MCP 工具
  en: Hosted MCP Tool
  ja: ホスト型 MCP ツール
semantics:
  short_definition:
    zh: 托管 MCP 工具通过平台托管的 MCP 连接调用远端服务器工具。
    en: A Hosted MCP Tool invokes a remote server tool through a platform-hosted MCP connection.
    ja: ホスト型 MCP ツールは platform 管理 MCP 接続で remote server tool を呼びます。
  definition:
    zh: 托管 MCP 工具是 HostedTool 的严格下位类型，继承 HostedTool 的 tool_id 作为同一托管工具身份；server_ref 与 remote_tool_name 只说明平台通过哪一 MCP 连接转发到哪个远端工具，不构成影子身份。应用提供服务器配置与审批策略，平台负责协议连接和调用转发；它不等同于 MCPServer 参与者。
    en: A Hosted MCP Tool is a strict HostedTool subtype and inherits the same hosted-tool identity tool_id from HostedTool; server_ref and remote_tool_name only state which MCP connection and remote tool the platform forwards to and do not form a shadow identity. The application supplies server configuration and approval policy while the platform manages protocol connectivity and forwarding; this node is not the MCPServer actor.
    ja: Hosted MCP Tool は HostedTool の厳密な下位型で、HostedTool から同じ hosted tool identity の tool_id を継承します。server_ref と remote_tool_name は platform が使う MCP connection と remote tool を示すだけで shadow identity ではありません。application が設定・approval policy を与え、platform が接続と転送を担います。
  why_needed:
    zh: 该层级明确“平台托管执行”与“MCP 协议来源”两个连续种差，避免直接把所有 MCP 相关对象平铺在 Tool 下。
    en: This hierarchy expresses two successive differentiae—platform-hosted execution and MCP protocol origin—instead of flattening every MCP-related object under Tool.
    ja: platform-hosted execution と MCP protocol origin の二段階種差を表し、MCP 関連 object の平坦化を防ぎます。
  includes:
    - zh: 纳入由平台维护 MCP 连接并代表模型调用远端 tools/list 中工具的配置。
      en: Includes configurations where the platform maintains an MCP connection and calls tools advertised by a remote tools/list.
      ja: platform が MCP connection を維持し remote tools/list の tool を呼ぶ設定を含みます。
  excludes:
    - zh: 排除本地 MCP 客户端进程、MCPServer 参与者和普通托管网页搜索工具。
      en: Excludes a locally executed MCP client process, the MCPServer actor, and ordinary hosted web search.
      ja: local MCP client process、MCPServer actor、通常 hosted web search を除きます。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: server_ref
      labels:
        zh: MCP 服务器引用
        en: MCP server reference
        ja: MCP server 参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: MCP 服务器引用作为 HostedMCPTool 节点内部信息保存，不建立同名图节点。
        en: MCP server reference is stored as information on the HostedMCPTool node and does not create a namesake graph node.
        ja: MCP server 参照は HostedMCPTool node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: mcp:crm
      source_claims:
        - claim-hosted-mcp-tool-003
        - claim-hosted-mcp-tool-004
    - id: remote_tool_name
      labels:
        zh: 远端工具名
        en: remote tool name
        ja: remote tool 名
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 远端工具名作为 HostedMCPTool 节点内部信息保存，不建立同名图节点。
        en: remote tool name is stored as information on the HostedMCPTool node and does not create a namesake graph node.
        ja: remote tool 名は HostedMCPTool node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: search_contacts
      source_claims:
        - claim-hosted-mcp-tool-005
        - claim-hosted-mcp-tool-006
  constraints: []
  required_relation_constraints: []
examples:
  - id: HostedMCPTool-example-positive-manual-001
    kind: positive
    labels:
      zh: HostedMCPTool 正例
      en: HostedMCPTool positive case
      ja: HostedMCPTool 正例
    scenario_id: null
    descriptions:
      zh: 应用提供 CRM MCP 服务器 URL，平台建立连接并调用远端 `search_contacts`。
      en: The application supplies a CRM MCP server URL; the platform establishes the connection and calls remote `search_contacts`.
      ja: application が CRM MCP server URL を提供し platform が接続して remote `search_contacts` を呼びます。
    field_values:
      tool_id: tool:hosted:mcp:crm-search-contacts
      provisioning_mode: remote-provider
      hosted_endpoint: https://crm.example/mcp
      server_ref: mcp-server:crm-production
      remote_tool_name: search_contacts
    related_node_ids:
      - HostedMCPTool
      - HostedTool
    related_relation_ids:
      - HostedMCPTool-is_a-HostedTool
    expected_result:
      zh: 该配置归为托管 MCP 工具，并继承托管工具。
      en: The configuration is a HostedMCPTool under HostedTool.
      ja: 設定を HostedMCPTool とし HostedTool を継承します。
    why_valid_or_invalid:
      zh: 执行通道由平台托管，工具语义来自 MCP 服务器。
      en: The execution channel is platform-hosted and the tool semantics originate from an MCP server.
      ja: 実行 channel が platform-hosted で tool 意味が MCP server 由来だからです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-hosted-mcp-tool-007
      - claim-hosted-mcp-tool-008
  - id: HostedMCPTool-example-boundary-manual-001
    kind: boundary
    labels:
      zh: HostedMCPTool 边界例
      en: HostedMCPTool boundary case
      ja: HostedMCPTool 境界例
    scenario_id: null
    descriptions:
      zh: 应用在自己的进程中运行 MCP 客户端并直接处理协议消息。
      en: The application runs an MCP client in its own process and directly handles protocol messages.
      ja: application が自 process で MCP client を動かし protocol message を直接処理します。
    field_values: {}
    related_node_ids:
      - HostedMCPTool
      - HostedTool
    related_relation_ids:
      - HostedMCPTool-is_a-HostedTool
    expected_result:
      zh: 该执行配置不属于 HostedMCPTool，应按本地运行边界描述。
      en: That execution configuration is not HostedMCPTool and must be modeled under the local runtime boundary.
      ja: 実行設定は HostedMCPTool ではなく local runtime 境界で表します。
    why_valid_or_invalid:
      zh: 使用 MCP 协议本身不能证明连接由平台托管。
      en: Using MCP alone does not prove that the connection is platform-hosted.
      ja: MCP 利用だけでは connection が platform-hosted と証明できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-hosted-mcp-tool-009
      - claim-hosted-mcp-tool-010
