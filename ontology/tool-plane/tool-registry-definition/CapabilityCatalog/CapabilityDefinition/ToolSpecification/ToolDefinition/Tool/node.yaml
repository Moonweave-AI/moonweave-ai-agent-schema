schema: moonweave.ai/ontology-node/v1
id: Tool
kind: concept
status: review
labels:
  zh: 工具
  en: Tool
  ja: ツール
semantics:
  short_definition:
    zh: 工具是代理可以选择并请求执行的稳定能力实体。
    en: A Tool is a stable capability entity that an agent can select and request to execute.
    ja: ツールは agent が選択し実行要求できる安定した能力 entity です。
  definition:
    zh: 工具是本模块关键实体，以稳定工具标识和执行提供方式为身份；它承载可复用能力并由 ToolDefinition 描述，可分为托管工具和本地运行时工具，但不包含一次调用的参数、结果或调用 ID。
    en: A Tool is this module's key entity, identified by stable tool ID and execution-provisioning mode. It carries reusable capability, is described by a ToolDefinition, and specializes into hosted and local-runtime tools without containing one invocation's arguments, result, or call ID.
    ja: ツールは stable tool ID と execution provisioning mode で識別される key entity で、ToolDefinition に記述され hosted/local-runtime に細分化されます。一回の call argument、result、call ID は含みません。
  why_needed:
    zh: 稳定工具实体把“是什么能力”与“怎样定义”“在哪里登记”“本次如何调用”分开，形成整个工具本体闭环的中心。
    en: The stable Tool entity separates what the capability is from how it is defined, where it is registered, and how one invocation proceeds.
    ja: stable Tool entity が capability 自体、definition、registration、一回の invocation を分離し tool ontology の中心を作ります。
  includes:
    - zh: 纳入可跨多次调用保持同一工具标识和执行提供方式的能力实体。
      en: Includes reusable capability entities retaining one tool ID and provisioning mode across calls.
      ja: 複数 call を越えて tool ID と provisioning mode を保持する capability entity を含みます。
  excludes:
    - zh: 排除 ToolDefinition、RegistryEntry、ToolCall、执行尝试和结果。
      en: Excludes ToolDefinition, RegistryEntry, ToolCall, execution attempts, and results.
      ja: ToolDefinition、RegistryEntry、ToolCall、execution attempt、result を除きます。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - tool_id
  fields:
    - id: tool_id
      labels:
        zh: 工具标识
        en: tool ID
        ja: ツール ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 工具标识作为 Tool 节点内部信息保存，不建立同名图节点。
        en: tool ID is stored as information on the Tool node and does not create a namesake graph node.
        ja: ツール IDは Tool node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: tool:weather
      source_claims:
        - claim-tool-003
        - claim-tool-004
    - id: provisioning_mode
      labels:
        zh: 执行提供方式
        en: execution provisioning mode
        ja: 実行提供方式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 执行提供方式作为 Tool 节点内部信息保存，不建立同名图节点。
        en: execution provisioning mode is stored as information on the Tool node and does not create a namesake graph node.
        ja: 実行提供方式は Tool node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: local-runtime
      source_claims:
        - claim-tool-005
        - claim-tool-006
  constraints: []
  required_relation_constraints: []
examples:
  - id: Tool-example-positive-manual-001
    kind: positive
    labels:
      zh: Tool 正例
      en: Tool positive case
      ja: Tool 正例
    scenario_id: null
    descriptions:
      zh: "`tool:weather` 在多个版本定义和多次调用之间保持同一业务能力身份。"
      en: "`tool:weather` retains one business-capability identity across definition versions and many calls."
      ja: "`tool:weather` は definition version と複数 call を越えて一つの business capability identity を保持します。"
    field_values:
      tool_id: tool:weather
      provisioning_mode: remote-provider
    related_node_ids:
      - Tool
    related_relation_ids: []
    expected_result:
      zh: 该对象归 Tool；版本合同由 ToolDefinition 另行记录。
      en: The object is a Tool; versioned contracts are recorded separately by ToolDefinition.
      ja: object を Tool とし version contract は ToolDefinition に分離します。
    why_valid_or_invalid:
      zh: 工具身份跨定义版本与调用事件持续存在。
      en: Tool identity persists across definition versions and invocation events.
      ja: tool identity が definition version と invocation event を越えて存続するためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-007
      - claim-tool-008
  - id: Tool-example-boundary-manual-001
    kind: boundary
    labels:
      zh: Tool 边界例
      en: Tool boundary case
      ja: Tool 境界例
    scenario_id: null
    descriptions:
      zh: 调用 `call-218` 使用 weather v3 参数并已完成。
      en: Invocation `call-218` used weather v3 arguments and completed.
      ja: invocation `call-218` が weather v3 argument を使い完了しました。
    field_values: {}
    related_node_ids:
      - Tool
    related_relation_ids: []
    expected_result:
      zh: 该记录属于 ToolCall 或尝试，不是 Tool。
      en: The record is a ToolCall or attempt, not the Tool.
      ja: record は ToolCall または attempt で Tool ではありません。
    why_valid_or_invalid:
      zh: 调用 ID 决定事件身份，tool_id 决定可复用能力身份。
      en: Call ID identifies an event; tool_id identifies reusable capability.
      ja: call ID は event、tool_id は reusable capability を識別するためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-009
      - claim-tool-010
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ToolDefinition-describes-Tool
  predicate: describes
  direction: source-to-target
  relation_kind: information
  labels:
    zh: describes
    en: describes
    ja: describes
  definitions:
    zh: 工具定义通过 describes 指明其版本化接口所描述的稳定工具实体；多个定义版本可指向同一 Tool。
    en: ToolDefinition describes the stable Tool entity governed by its versioned interface, and multiple definition versions may point to one Tool.
    ja: ToolDefinition は versioned interface が記述する stable Tool entity を describes し、複数 definition version が一 Tool を指せます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体注册表与版本策略。
    en: Cardinality depends on the concrete registry and version policy.
    ja: cardinality は具体 registry と version policy に依存します。
  inverse_reading:
    predicate: inverse_describes
    labels:
      zh: 反向：describes
      en: inverse of describes
      ja: 逆：describes
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ToolDefinition-describes-Tool-example-positive-manual-001
      kind: positive
      labels:
        zh: ToolDefinition-describes-Tool 正例
        en: ToolDefinition-describes-Tool positive case
        ja: ToolDefinition-describes-Tool 正例
      scenario_id: null
      descriptions:
        zh: weather v2 和 v3 定义都描述 `tool:weather`。
        en: Weather v2 and v3 definitions both describe `tool:weather`.
        ja: weather v2 と v3 definition が共に `tool:weather` を describes します。
      field_values: {}
      related_node_ids:
        - ToolDefinition
        - Tool
      related_relation_ids:
        - ToolDefinition-describes-Tool
      expected_result:
        zh: 保留 ToolDefinition —describes→ Tool，并按定义解释该方向。
        en: Retain ToolDefinition —describes→ Tool and interpret that direction as defined.
        ja: ToolDefinition —describes→ Tool を保持し定義どおり解釈します。
      why_valid_or_invalid:
        zh: 场景同时满足来源身份、目标身份和本关系要求的业务条件。
        en: The case satisfies the source identity, target identity, and the business condition required by this relation.
        ja: case は source identity、target identity、relation が要求する business condition を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-011
    - id: ToolDefinition-describes-Tool-example-boundary-manual-001
      kind: boundary
      labels:
        zh: ToolDefinition-describes-Tool 边界例
        en: ToolDefinition-describes-Tool boundary case
        ja: ToolDefinition-describes-Tool 境界例
      scenario_id: null
      descriptions:
        zh: RegistryEntry 描述具体定义版本，而不是替代定义描述工具的事实。
        en: RegistryEntry describes a concrete definition version and does not replace the definition-to-tool fact.
        ja: RegistryEntry は具体 definition version を describes し definition-to-tool fact を代替しません。
      field_values: {}
      related_node_ids:
        - ToolDefinition
        - Tool
      related_relation_ids:
        - ToolDefinition-describes-Tool
      expected_result:
        zh: 不以该场景建立 ToolDefinition-describes-Tool，并把对象保留在其正确身份中。
        en: Do not assert ToolDefinition-describes-Tool for this case; retain each object under its correct identity.
        ja: この case では ToolDefinition-describes-Tool を assertion せず各 object の正しい identity を保持します。
      why_valid_or_invalid:
        zh: 场景缺少本关系要求的决定性条件；相邻概念或时间接近不能补足该条件。
        en: The case lacks the relation's decisive condition; conceptual adjacency or temporal proximity cannot supply it.
        ja: case は relation の decisive condition を欠き、concept adjacency や temporal proximity では補えません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-012
  source_claims:
    - claim-tool-013
  distinct_fact_rationale:
    zh: 该边表达一个不可由端点层级替代的独立业务事实。
    en: This edge expresses an independent business fact that endpoint hierarchy cannot replace.
    ja: この edge は endpoint hierarchy で代替できない独立 business fact を表します。
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: parent-to-child
