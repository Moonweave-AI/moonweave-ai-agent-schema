schema: moonweave.ai/ontology-node/v1
id: LocalRuntimeTool
kind: concept
status: accepted
labels:
  zh: 本地运行时工具
  en: Local Runtime Tool
  ja: ローカル実行ツール
semantics:
  short_definition:
    zh: 本地运行时工具由代理应用控制的执行器直接运行。
    en: A Local Runtime Tool is run directly by an executor controlled by the agent application.
    ja: ローカル実行ツールは agent application 管理 executor で直接実行されます。
  definition:
    zh: 本地运行时工具是 Tool 的严格下位类型，继承 Tool 的 tool_id 作为已注册工具身份；executor_ref 只记录可选的应用侧执行器绑定，不替代或扩展身份。其函数处理器、计算机提供方或 Shell 执行器位于应用控制边界内，但仍可能访问网络并仍须经过权限审批。
    en: A Local Runtime Tool is a strict Tool subtype and inherits the registered-tool identity tool_id from Tool; executor_ref only records an optional application-side executor binding and neither replaces nor extends that identity. Its function handler, computer provider, or shell executor lives inside the application-controlled boundary, though it may still access networks and remains subject to approval.
    ja: Local Runtime Tool は Tool の厳密な下位型で、Tool から registered-tool identity の tool_id を継承します。executor_ref は任意の application-side executor binding を記録するだけで identity を置換・拡張しません。実行器は application 管理境界内ですが network access と approval は別条件です。
  why_needed:
    zh: 该层把函数、计算机和 Shell 三种机制组织成真正的实现层级，而不是把同前缀概念直接平铺在 Tool 下。
    en: This layer organizes function, computer, and shell mechanisms into a genuine implementation hierarchy instead of flattening prefixed concepts under Tool.
    ja: function・computer・shell mechanism を実装階層に整理し、Tool 直下の平坦化を避けます。
  includes:
    - zh: 纳入由应用进程、受控子进程或应用提供设备接口执行的工具。
      en: Includes tools executed by the application process, a controlled subprocess, or an application-provided device interface.
      ja: application process、controlled subprocess、application 提供 device interface で実行する tool を含みます。
  excludes:
    - zh: 排除平台侧托管工具、提供工具的服务器参与者以及一次本地调用尝试。
      en: Excludes platform-side hosted tools, provider actors, and one local call attempt.
      ja: platform-side hosted tool、provider actor、一回の local call attempt を除きます。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: executor_ref
      labels:
        zh: 执行器引用
        en: executor reference
        ja: executor 参照
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 执行器引用作为 LocalRuntimeTool 节点内部信息保存，不建立同名图节点。
        en: executor reference is stored as information on the LocalRuntimeTool node and does not create a namesake graph node.
        ja: executor 参照は LocalRuntimeTool node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: executor:workspace
      source_claims:
        - claim-local-runtime-tool-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: LocalRuntimeTool-example-positive-manual-001
    kind: positive
    labels:
      zh: LocalRuntimeTool 正例
      en: LocalRuntimeTool positive case
      ja: LocalRuntimeTool 正例
    scenario_id: null
    descriptions:
      zh: 代理在受控容器中提供函数处理器、Shell 执行器和计算机接口。
      en: An agent exposes function handlers, a shell executor, and a computer interface inside a controlled container.
      ja: agent が controlled container 内で function handler、shell executor、computer interface を提供します。
    field_values:
      tool_id: tool:local:workspace-runtime
      provisioning_mode: local-runtime
      executor_ref: executor:workspace-runtime
    related_node_ids:
      - LocalRuntimeTool
      - Tool
    related_relation_ids:
      - LocalRuntimeTool-is_a-Tool
    expected_result:
      zh: 三者先归本地运行时工具，再按机制细分。
      en: All three first classify as LocalRuntimeTool and then specialize by mechanism.
      ja: 三者を LocalRuntimeTool とし mechanism で細分化します。
    why_valid_or_invalid:
      zh: 该子类的共同种差是执行器位于应用控制的本地运行环境中。
      en: Their common differentia is application-controlled execution.
      ja: 共通種差が application-controlled execution だからです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-local-runtime-tool-003
  - id: LocalRuntimeTool-example-boundary-manual-001
    kind: boundary
    labels:
      zh: LocalRuntimeTool 边界例
      en: LocalRuntimeTool boundary case
      ja: LocalRuntimeTool 境界例
    scenario_id: null
    descriptions:
      zh: 应用只提供服务器 URL，MCP 连接和远端调用由平台托管。
      en: The application supplies only a server URL; the platform hosts the MCP connection and remote calls.
      ja: application は server URL のみ提供し platform が MCP connection と remote call を管理します。
    field_values: {}
    related_node_ids:
      - LocalRuntimeTool
      - Tool
    related_relation_ids:
      - LocalRuntimeTool-is_a-Tool
    expected_result:
      zh: 该工具进入 HostedMCPTool 分支。
      en: The tool enters the HostedMCPTool branch.
      ja: tool は HostedMCPTool branch に入ります。
    why_valid_or_invalid:
      zh: 应用侧配置不等于应用控制执行基础设施。
      en: Application-side configuration does not imply application-controlled execution infrastructure.
      ja: application-side 設定は application-controlled execution を意味しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-local-runtime-tool-004
external_mappings: []
applicability:
  - core
sibling_differentiation: []
