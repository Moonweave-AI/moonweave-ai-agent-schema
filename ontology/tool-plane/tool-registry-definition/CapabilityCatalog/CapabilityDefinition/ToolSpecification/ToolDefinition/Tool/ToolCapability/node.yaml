schema: moonweave.ai/ontology-node/v1
id: ToolCapability
kind: concept
status: accepted
labels:
  zh: 工具能力
  en: Tool Capability
  ja: ツール能力
semantics:
  short_definition:
    zh: 工具能力是工具可对外承诺的一类可复用操作能力。
    en: A Tool Capability is a reusable operational ability that a tool can promise externally.
    ja: ツール能力は tool が外部へ約束する再利用可能な操作能力です。
  definition:
    zh: 工具能力是一种能力，以稳定能力标识、输入输出边界和效果语义为身份；它可由一个或多个工具提供，并可进一步细分为 API 操作，但不等同于工具实体、描述符或调用结果。
    en: A Tool Capability is a capability identified by stable capability ID, input/output boundary, and effect semantics. One or more tools may offer it and it may specialize into APIOperation, but it is neither a Tool entity, descriptor, nor call result.
    ja: ツール能力は stable capability ID、input/output boundary、effect semantics で識別され、複数 tool が提供でき APIOperation に細分化されます。Tool entity、descriptor、call result ではありません。
  why_needed:
    zh: 能力层允许在不依赖具体实现或注册条目的情况下比较“能做什么”，并为 API 操作提供逻辑上位节点。
    en: The capability layer supports comparison of what can be done independently of implementation or registry membership and provides a real parent for APIOperation.
    ja: 実装や registry membership から独立して「何ができるか」を比較し APIOperation の親を作ります。
  includes:
    - zh: 纳入具有稳定效果、输入边界和输出类型的可复用工具能力。
      en: Includes reusable tool abilities with stable effects, input boundaries, and output types.
      ja: stable effect、input boundary、output type を持つ reusable tool ability を含みます。
  excludes:
    - zh: 排除具体工具实例、宣传描述符、查询匹配和一次工具执行。
      en: Excludes concrete tool entities, promotional descriptors, query matches, and one tool execution.
      ja: concrete tool entity、descriptor、query match、一回の tool execution を除きます。
  semantic_kind: capability
  aliases: []
structure:
  identity_keys:
    - capability_id
  fields:
    - id: capability_id
      labels:
        zh: 能力标识
        en: capability ID
        ja: 能力 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 能力标识作为 ToolCapability 节点内部信息保存，不建立同名图节点。
        en: capability ID is stored as information on the ToolCapability node and does not create a namesake graph node.
        ja: 能力 IDは ToolCapability node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: capability:external-data-read
      source_claims:
        - claim-tool-capability-003
        - claim-tool-capability-004
    - id: input_boundary
      labels:
        zh: 输入边界
        en: input boundary
        ja: 入力境界
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 输入边界作为 ToolCapability 节点内部信息保存，不建立同名图节点。
        en: input boundary is stored as information on the ToolCapability node and does not create a namesake graph node.
        ja: 入力境界は ToolCapability node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value:
        type: object
      source_claims:
        - claim-tool-capability-005
        - claim-tool-capability-006
    - id: effect_semantics
      labels:
        zh: 效果语义
        en: effect semantics
        ja: 効果意味
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 效果语义作为 ToolCapability 节点内部信息保存，不建立同名图节点。
        en: effect semantics is stored as information on the ToolCapability node and does not create a namesake graph node.
        ja: 効果意味は ToolCapability node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: read-external-data
      source_claims:
        - claim-tool-capability-007
        - claim-tool-capability-008
  constraints:
    - id: tool-capability-single-inherited-identity
      severity: error
      expression_language: plain
      expression: Every accepted is_a specialization of ToolCapability MUST reuse capability_id; subtype fields such as action_name distinguish behavior but MUST NOT create a synonymous operation ID.
      explanations:
        zh: ToolCapability 的 accepted 下位类复用 capability_id；action_name 等字段描述行为种差，不产生同义 operation ID。
        en: Accepted ToolCapability subtypes reuse capability_id; fields such as action_name describe behavioral differentia rather than creating a synonymous operation ID.
        ja: ToolCapability の accepted subtype は capability_id を再利用し、action_name 等は behavior differentia であって同義 operation ID を作りません。
      source_claims:
        - claim-tool-capability-009
  required_relation_constraints: []
examples:
  - id: ToolCapability-example-positive-manual-001
    kind: positive
    labels:
      zh: ToolCapability 正例
      en: ToolCapability positive case
      ja: ToolCapability 正例
    scenario_id: null
    descriptions:
      zh: 外部数据读取能力可同时由数据库工具和 HTTP API 工具提供。
      en: External-data reading can be offered by both a database tool and an HTTP API tool.
      ja: external-data reading を database tool と HTTP API tool の両方が提供できます。
    field_values:
      capability_id: capability:external-data-read
      input_boundary:
        type: object
        required:
          - query
      effect_semantics: read-external-data
    related_node_ids:
      - ToolCapability
    related_relation_ids: []
    expected_result:
      zh: 共同能力归 ToolCapability，各工具用 offers_capability 关联。
      en: The shared ability is ToolCapability and each tool links through offers_capability.
      ja: 共通能力を ToolCapability とし各 tool が offers_capability で関連します。
    why_valid_or_invalid:
      zh: 能力身份独立于具体实现工具，因此不会被某一个工具实例所独占。
      en: Capability identity is not exclusive to one implementing tool.
      ja: capability identity が一つの implementation tool に専有されないためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-capability-010
      - claim-tool-capability-011
  - id: ToolCapability-example-boundary-manual-001
    kind: boundary
    labels:
      zh: ToolCapability 边界例
      en: ToolCapability boundary case
      ja: ToolCapability 境界例
    scenario_id: null
    descriptions:
      zh: 生产表面为数据读取能力生成两句摘要和搜索标签。
      en: A production surface creates a two-line summary and search tags for data reading.
      ja: 本番 surface が data-reading の短い summary と search tag を作ります。
    field_values: {}
    related_node_ids:
      - ToolCapability
    related_relation_ids: []
    expected_result:
      zh: 该记录是 CapabilityDescriptor，不是 ToolCapability。
      en: The record is CapabilityDescriptor, not ToolCapability.
      ja: record は CapabilityDescriptor で ToolCapability ではありません。
    why_valid_or_invalid:
      zh: 描述符是发布信息，能力是可复用语义。
      en: A descriptor is publication information; a capability is reusable semantics.
      ja: descriptor は公開情報、capability は reusable semantics だからです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-capability-012
      - claim-tool-capability-013
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: Tool-offers_capability-ToolCapability
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: offers_capability
    en: offers capability
    ja: offers_capability
  definitions:
    zh: 工具通过 offers_capability 声明其实现的可复用能力语义；同一能力可由多个工具提供。
    en: Tool offers_capability links a tool to reusable capability semantics it implements, and several tools may offer the same capability.
    ja: Tool は offers_capability で実装する reusable capability semantics と結び、同一 capability を複数 tool が提供できます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体注册表与版本策略。
    en: Cardinality depends on the concrete registry and version policy.
    ja: cardinality は具体 registry と version policy に依存します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：offers_capability
      en: inverse of offers_capability
      ja: 逆：offers_capability
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: Tool-offers_capability-ToolCapability-example-positive-manual-001
      kind: positive
      labels:
        zh: Tool-offers_capability-ToolCapability 正例
        en: Tool-offers_capability-ToolCapability positive case
        ja: Tool-offers_capability-ToolCapability 正例
      scenario_id: null
      descriptions:
        zh: 数据库工具和 HTTP 工具都提供外部数据读取能力。
        en: A database tool and an HTTP tool both offer external-data reading.
        ja: database tool と HTTP tool が共に external-data reading を offer します。
      field_values: {}
      related_node_ids:
