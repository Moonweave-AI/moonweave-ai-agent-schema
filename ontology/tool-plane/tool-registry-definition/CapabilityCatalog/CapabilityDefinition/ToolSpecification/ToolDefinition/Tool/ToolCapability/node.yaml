      related_relation_ids:
        - Tool-offers_capability-ToolCapability
      expected_result:
        zh: 保留 Tool —offers_capability→ ToolCapability，并按定义解释该方向。
        en: Retain Tool —offers_capability→ ToolCapability and interpret that direction as defined.
        ja: Tool —offers_capability→ ToolCapability を保持し定義どおり解釈します。
      why_valid_or_invalid:
        zh: 场景同时满足来源身份、目标身份和本关系要求的业务条件。
        en: The case satisfies the source identity, target identity, and the business condition required by this relation.
        ja: case は source identity、target identity、relation が要求する business condition を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-capability-014
    - id: Tool-offers_capability-ToolCapability-example-boundary-manual-001
      kind: boundary
      labels:
        zh: Tool-offers_capability-ToolCapability 边界例
        en: Tool-offers_capability-ToolCapability boundary case
        ja: Tool-offers_capability-ToolCapability 境界例
      scenario_id: null
      descriptions:
        zh: 描述符中的 marketing 标签不能单独证明工具实现该能力。
        en: A marketing tag in a descriptor cannot alone prove that the tool implements the capability.
        ja: descriptor の marketing tag だけでは tool が capability を実装すると証明できません。
      field_values: {}
      related_node_ids:
        - Tool
        - ToolCapability
      related_relation_ids:
        - Tool-offers_capability-ToolCapability
      expected_result:
        zh: 不以该场景建立 Tool-offers_capability-ToolCapability，并把对象保留在其正确身份中。
        en: Do not assert Tool-offers_capability-ToolCapability for this case; retain each object under its correct identity.
        ja: この case では Tool-offers_capability-ToolCapability を assertion せず各 object の正しい identity を保持します。
      why_valid_or_invalid:
        zh: 场景缺少本关系要求的决定性条件；相邻概念或时间接近不能补足该条件。
        en: The case lacks the relation's decisive condition; conceptual adjacency or temporal proximity cannot supply it.
        ja: case は relation の decisive condition を欠き、concept adjacency や temporal proximity では補えません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-capability-015
  source_claims:
    - claim-tool-capability-016
  distinct_fact_rationale:
    zh: 该边表达一个不可由端点层级替代的独立业务事实。
    en: This edge expresses an independent business fact that endpoint hierarchy cannot replace.
    ja: この edge は endpoint hierarchy で代替できない独立 business fact を表します。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
