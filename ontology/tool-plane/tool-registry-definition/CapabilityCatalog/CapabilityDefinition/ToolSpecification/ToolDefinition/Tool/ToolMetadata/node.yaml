schema: moonweave.ai/ontology-node/v1
id: ToolMetadata
kind: concept
status: accepted
labels:
  zh: 工具元数据
  en: Tool Metadata
  ja: ツールメタデータ
semantics:
  short_definition:
    zh: 工具元数据是关于工具或其定义的可独立治理信息。
    en: Tool Metadata is independently governed information about a tool or its definition.
    ja: ツールメタデータは tool または definition に関する独立統治情報です。
  definition:
    zh: 工具元数据是一种信息，以元数据标识、所述对象和生效范围为身份；能力描述符与弃用通知分别细化为发布投影和生命周期公告，它不承载完整调用合同，也不执行任何活动。
    en: Tool Metadata is information identified by metadata ID, described object, and effective scope. CapabilityDescriptor and ToolDeprecationNotice specialize publication projection and lifecycle announcement; metadata carries neither the full invocation contract nor agency.
    ja: ツールメタデータは metadata ID、described object、effective scope で識別され、CapabilityDescriptor と ToolDeprecationNotice が公開 projection と lifecycle notice に細分化します。完全 call contract や行為主体性は持ちません。
  why_needed:
    zh: 独立元数据层避免将搜索摘要、弃用公告等信息直接塞进工具实体，同时仍可精确关联其所描述对象。
    en: A separate metadata layer avoids stuffing search summaries and deprecation announcements into the Tool entity while allowing precise links to described objects.
    ja: search summary や deprecation notice を Tool entity に詰め込まず described object へ精密に関連できます。
  includes:
    - zh: 纳入有独立标识、目标对象和生效范围的工具描述或治理信息。
      en: Includes tool descriptive or governance information with its own identity, target object, and effective scope.
      ja: 独立 ID、target object、effective scope を持つ tool description/governance 情報を含みます。
  excludes:
    - zh: 排除 ToolDefinition 合同字段、注册活动、调用事件和无独立身份的普通说明字段。
      en: Excludes ToolDefinition contract fields, registry activities, invocation events, and ordinary description fields without separate identity.
      ja: ToolDefinition contract field、registry activity、invocation event、独立 identity のない description field を除きます。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - metadata_id
  fields:
    - id: metadata_id
      labels:
        zh: 元数据标识
        en: metadata ID
        ja: メタデータ ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 元数据标识作为 ToolMetadata 节点内部信息保存，不建立同名图节点。
        en: metadata ID is stored as information on the ToolMetadata node and does not create a namesake graph node.
        ja: メタデータ IDは ToolMetadata node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: metadata:weather:v3:prod
      source_claims:
        - claim-tool-metadata-003
        - claim-tool-metadata-004
    - id: described_object_ref
      labels:
        zh: 所述对象引用
        en: described-object reference
        ja: 記述対象参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 所述对象引用作为 ToolMetadata 节点内部信息保存，不建立同名图节点。
        en: described-object reference is stored as information on the ToolMetadata node and does not create a namesake graph node.
        ja: 記述対象参照は ToolMetadata node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: tool:weather
      source_claims:
        - claim-tool-metadata-005
        - claim-tool-metadata-006
    - id: effective_scope
      labels:
        zh: 生效范围
        en: effective scope
        ja: 適用範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 生效范围作为 ToolMetadata 节点内部信息保存，不建立同名图节点。
        en: effective scope is stored as information on the ToolMetadata node and does not create a namesake graph node.
        ja: 適用範囲は ToolMetadata node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: production
      source_claims:
        - claim-tool-metadata-007
        - claim-tool-metadata-008
  constraints:
    - id: tool-metadata-single-inherited-identity
      severity: error
      expression_language: plain
      expression: Every accepted is_a specialization of ToolMetadata MUST reuse metadata_id; descriptor and deprecation-notice kinds are discriminated by their content and effective scope, not by synonymous IDs.
      explanations:
        zh: ToolMetadata 的 accepted 下位类复用 metadata_id；描述符和弃用通知由内容与有效范围区分，不增加同义 ID。
        en: Accepted ToolMetadata subtypes reuse metadata_id; descriptor and deprecation-notice kinds differ through content and effective scope, not synonymous IDs.
        ja: ToolMetadata の accepted subtype は metadata_id を再利用し、descriptor/deprecation notice は content と effective scope で区別して同義 ID を追加しません。
      source_claims:
        - claim-tool-metadata-009
  required_relation_constraints: []
examples:
  - id: ToolMetadata-example-positive-manual-001
    kind: positive
    labels:
      zh: ToolMetadata 正例
      en: ToolMetadata positive case
      ja: ToolMetadata 正例
    scenario_id: null
    descriptions:
      zh: 同一工具拥有面向生产表面的描述符和针对旧版本的弃用通知。
      en: One tool has a production-surface descriptor and a deprecation notice for an old version.
      ja: 一つの tool が本番 surface descriptor と旧版 deprecation notice を持ちます。
    field_values:
      metadata_id: metadata:weather:production-descriptor
      described_object_ref: tool:weather
      effective_scope: production
    related_node_ids:
      - ToolMetadata
    related_relation_ids: []
    expected_result:
      zh: 两项信息共享 ToolMetadata 上位类型再按目的细分。
      en: Both records share ToolMetadata and then specialize by purpose.
      ja: 二 record は ToolMetadata を共有し purpose で細分化します。
    why_valid_or_invalid:
      zh: 它们有独立信息身份但都不改变工具实体身份。
      en: They have independent information identities without changing Tool identity.
      ja: 独立 information identity を持つが Tool identity を変えないためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-metadata-010
      - claim-tool-metadata-011
  - id: ToolMetadata-example-boundary-manual-001
    kind: boundary
    labels:
      zh: ToolMetadata 边界例
      en: ToolMetadata boundary case
      ja: ToolMetadata 境界例
    scenario_id: null
    descriptions:
      zh: ToolDefinition.description 只是该定义内的一段说明文字。
      en: ToolDefinition.description is merely one explanatory field inside the definition.
      ja: ToolDefinition.description は definition 内の説明 field です。
    field_values: {}
    related_node_ids:
      - ToolMetadata
    related_relation_ids: []
    expected_result:
      zh: 无独立身份的字段不提升为 ToolMetadata 节点。
      en: A field without independent identity is not promoted to a ToolMetadata node.
      ja: 独立 identity のない field は ToolMetadata node にしません。
    why_valid_or_invalid:
      zh: 节点化需要独立生命周期、来源或治理范围。
      en: Node promotion requires an independent lifecycle, provenance, or governance scope.
      ja: node 化には独立 lifecycle、provenance、governance scope が必要だからです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-metadata-012
      - claim-tool-metadata-013
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: Tool-has_metadata-ToolMetadata
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 具有工具元数据
    en: has tool metadata
    ja: ツールメタデータを持つ
  definitions:
    zh: Tool has_metadata 连接具有独立 metadata_id、所述工具和生效范围的 ToolMetadata；普通 name、description 或 annotation 字段仍属于 ToolDefinition，只有需要独立生命周期、发布或弃用身份的信息才成为 ToolMetadata 节点。
    en: Tool has_metadata links a ToolMetadata record with its own metadata_id, described tool, and effective scope. Ordinary name, description, or annotation fields remain in ToolDefinition; information becomes a ToolMetadata node only when it needs an independent publication, deprecation, or lifecycle identity.
    ja: Tool has_metadata は独自 metadata_id・described tool・effective scope を持つ ToolMetadata record を結びます。通常の name・description・annotation は ToolDefinition field に残し、独立 publication・deprecation・lifecycle identity が必要な情報だけを ToolMetadata node とします。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 描述工具
      en: describes tool
      ja: tool を記述する
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: Tool-has_metadata-ToolMetadata-example-positive-manual-001
      kind: positive
      labels:
        zh: 工具具有独立弃用元数据正例
        en: Tool has independent deprecation metadata positive case
        ja: tool が独立 deprecation metadata を持つ正例
      scenario_id: null
      descriptions:
        zh: weather-tool 关联 notice-2026-07；该记录具有 metadata_id、生效日期、替代工具和发布范围，可独立于 ToolDefinition 版本演进。
        en: weather-tool links notice-2026-07, which has metadata_id, effective date, replacement tool, and publication scope and can evolve independently of ToolDefinition versions.
        ja: weather-tool が metadata_id・effective date・replacement tool・publication scope を持つ notice-2026-07 に接続し ToolDefinition version と独立に進化します。
      field_values: {}
      related_node_ids:
        - Tool
        - ToolMetadata
      related_relation_ids:
        - Tool-has_metadata-ToolMetadata
      expected_result:
        zh: 建立 weather-tool —has_metadata→ notice-2026-07。
        en: Assert weather-tool —has_metadata→ notice-2026-07.
        ja: weather-tool —has_metadata→ notice-2026-07 を成立させます。
      why_valid_or_invalid:
        zh: 记录具备独立身份、描述对象与生效范围，超出了普通定义字段。
        en: The record has independent identity, described object, and effective scope beyond an ordinary definition field.
        ja: record は独立 identity・described object・effective scope を持ち ordinary definition field を超えます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-metadata-014
    - id: Tool-has_metadata-ToolMetadata-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 普通描述字段不是元数据节点边界例
        en: Ordinary description field is not metadata node boundary case
        ja: ordinary description field は metadata node ではない境界例
      scenario_id: null
      descriptions:
        zh: ToolDefinition 只有一段 description，没有 metadata_id、独立生效范围或发布生命周期。
        en: A ToolDefinition has only a description string with no metadata_id, independent effective scope, or publication lifecycle.
        ja: ToolDefinition に description string だけがあり metadata_id・independent effective scope・publication lifecycle がありません。
      field_values: {}
      related_node_ids:
        - Tool
        - ToolMetadata
      related_relation_ids:
        - Tool-has_metadata-ToolMetadata
      expected_result:
        zh: 保留 description 字段，不创建 ToolMetadata 或 has_metadata 边。
        en: Retain the description field and create neither ToolMetadata nor has_metadata.
        ja: description field を保持し ToolMetadata/has_metadata を作りません。
      why_valid_or_invalid:
        zh: 将每个说明字段节点化会重复 ToolDefinition 内容并制造虚假层级。
        en: Turning every descriptive field into a node would duplicate ToolDefinition content and create a false hierarchy.
        ja: 各 description field を node 化すると ToolDefinition content を重複し false hierarchy を作ります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-metadata-015
  source_claims:
    - claim-tool-metadata-016
  distinct_fact_rationale:
    zh: has_metadata 表达稳定工具与独立信息记录的关联，不复制 ToolDefinition 的普通字段。
    en: has_metadata relates a stable tool to an independently identified information record without duplicating ordinary ToolDefinition fields.
    ja: has_metadata は stable tool と independently identified information record を結び ordinary ToolDefinition field を複製しません。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
