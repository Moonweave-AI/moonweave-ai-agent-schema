schema: moonweave.ai/ontology-node/v1
id: HostedTool
kind: concept
status: review
labels:
  zh: 托管工具
  en: Hosted Tool
  ja: ホスト型ツール
semantics:
  short_definition:
    zh: 托管工具由模型平台或外部托管服务控制执行基础设施。
    en: A Hosted Tool runs on execution infrastructure controlled by a model platform or hosted service.
    ja: ホスト型ツールは model platform または hosted service 管理基盤で実行されます。
  definition:
    zh: 托管工具是 Tool 的严格下位类型，继承 Tool 的 tool_id 作为已注册工具身份；hosted_endpoint 是执行位置配置而不是新身份。应用提交配置与调用意图，平台或外部服务负责实际执行、扩缩容和结果回传；模型是否选择该工具并不是分类依据。
    en: A Hosted Tool is a strict Tool subtype and inherits the registered-tool identity tool_id from Tool; hosted_endpoint is execution-location configuration rather than a new identity. The application submits configuration and call intent while a platform or external service performs execution, scaling, and result delivery; model selection is not the classification criterion.
    ja: Hosted Tool は Tool の厳密な下位型で、Tool から registered-tool identity の tool_id を継承します。hosted_endpoint は execution-location 設定で新しい identity ではありません。application は設定と call intent を渡し、platform または external service が実行・拡縮・結果返却を担います。
  why_needed:
    zh: 这个中间层把执行控制位置作为真实种差，为托管 MCP 等更具体机制提供上位节点。
    en: This intermediate layer uses execution-control location as a real differentia and provides a parent for more specific hosted mechanisms such as HostedMCPTool.
    ja: 実行管理場所を真の種差とし、HostedMCPTool など具体 mechanism の親を作ります。
  includes:
    - zh: 纳入执行器、资源配额与结果通道由外部平台管理的工具。
      en: Includes tools whose executor, resource quota, and result channel are managed by an external platform.
      ja: executor、resource quota、result channel が外部 platform 管理の tool を含みます。
  excludes:
    - zh: 排除应用函数处理器、本地计算机提供方和本地 Shell 执行器。
      en: Excludes application function handlers, local computer providers, and local shell executors.
      ja: application function handler、local computer provider、local shell executor を除きます。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: hosted_endpoint
      labels:
        zh: 托管端点
        en: hosted endpoint
        ja: hosted endpoint
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 托管端点作为 HostedTool 节点内部信息保存，不建立同名图节点。
        en: hosted endpoint is stored as information on the HostedTool node and does not create a namesake graph node.
        ja: hosted endpointは HostedTool node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: platform:web-search
      source_claims:
        - claim-hosted-tool-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: HostedTool-example-positive-manual-001
    kind: positive
    labels:
      zh: HostedTool 正例
      en: HostedTool positive case
      ja: HostedTool 正例
    scenario_id: null
    descriptions:
      zh: 平台提供网页搜索工具，应用只提交查询和允许的域名。
      en: A platform provides web search while the application supplies only the query and allowed domains.
      ja: platform が web search を提供し application は query と allowed domain だけを渡します。
    field_values:
      tool_id: tool:hosted:web-search
      provisioning_mode: platform-hosted
      hosted_endpoint: platform:web-search
    related_node_ids:
      - HostedTool
      - Tool
    related_relation_ids:
      - HostedTool-is_a-Tool
    expected_result:
      zh: 该工具归托管工具，执行端点保留为节点信息。
      en: The tool is classified as HostedTool with its execution endpoint kept as node information.
      ja: tool を HostedTool とし execution endpoint を node 情報として保持します。
    why_valid_or_invalid:
      zh: 应用只声明托管入口，并不拥有远端服务内部的实际搜索执行器。
      en: The application does not own the actual search executor.
      ja: application が実検索 executor を所有しないためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-hosted-tool-003
  - id: HostedTool-example-boundary-manual-001
    kind: boundary
    labels:
      zh: HostedTool 边界例
      en: HostedTool boundary case
      ja: HostedTool 境界例
    scenario_id: null
    descriptions:
      zh: 模型选择了一个由应用本地函数处理器执行的搜索工具。
      en: The model selects a search tool executed by an application-local function handler.
      ja: model が application-local function handler 実行の search tool を選びます。
    field_values: {}
    related_node_ids:
      - HostedTool
      - Tool
    related_relation_ids:
      - HostedTool-is_a-Tool
    expected_result:
      zh: 该工具仍归 LocalRuntimeTool，而不是 HostedTool。
      en: The tool remains a LocalRuntimeTool rather than a HostedTool.
      ja: tool は LocalRuntimeTool で HostedTool ではありません。
    why_valid_or_invalid:
      zh: 选择主体与执行基础设施控制主体是不同维度。
      en: The chooser and the controller of execution infrastructure are different dimensions.
      ja: 選択主体と実行基盤管理主体は別次元だからです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-hosted-tool-004
