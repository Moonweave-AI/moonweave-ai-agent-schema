      expected_result:
        zh: 不以该场景建立 FunctionTool-is_a-LocalRuntimeTool，并把对象保留在其正确身份中。
        en: Do not assert FunctionTool-is_a-LocalRuntimeTool for this case; retain each object under its correct identity.
        ja: この case では FunctionTool-is_a-LocalRuntimeTool を assertion せず各 object の正しい identity を保持します。
      why_valid_or_invalid:
        zh: 场景缺少本关系要求的决定性条件；相邻概念或时间接近不能补足该条件。
