schema: moonweave.ai/ontology-node/v1
id: FunctionTool
kind: concept
status: accepted
labels:
  zh: 函数工具
  en: Function Tool
  ja: 関数ツール
semantics:
  short_definition:
    zh: 函数工具把应用函数处理器作为模型可调用工具暴露。
    en: A Function Tool exposes an application function handler as a model-callable tool.
    ja: 関数ツールは application function handler を model 呼出し可能 tool として公開します。
  definition:
    zh: 函数工具是 LocalRuntimeTool 的严格下位类型，继承 LocalRuntimeTool 的 tool_id 作为已注册工具身份；handler_ref 与 parameter_schema 是处理器绑定和调用合同，不是额外身份。应用负责验证参数、执行处理器并把结果转换为工具输出；该节点不是函数定义文本，也不是某一次函数调用。
    en: A Function Tool is a strict LocalRuntimeTool subtype and inherits the registered-tool identity tool_id from LocalRuntimeTool; handler_ref and parameter_schema are its handler binding and call contract, not additional identities. The application validates arguments, executes the handler, and converts its result into tool output; this node is neither function-definition text nor one function call.
    ja: Function Tool は LocalRuntimeTool の厳密な下位型で、LocalRuntimeTool から registered-tool identity の tool_id を継承します。handler_ref と parameter_schema は handler binding と call contract で追加 identity ではありません。application が引数検証・実行・結果変換を担い、一回の function call ではありません。
  why_needed:
    zh: 将函数机制置于本地运行时分支，可与计算机和 Shell 工具共享执行控制边界，同时保留不同接口。
    en: Placing the function mechanism under LocalRuntimeTool shares the execution-control boundary with computer and shell tools while preserving distinct interfaces.
    ja: function mechanism を LocalRuntimeTool 配下に置き、computer・shell と実行管理境界を共有しつつ interface を分けます。
  includes:
    - zh: 纳入由应用函数处理器执行并从函数签名或参数模型生成 Schema 的工具。
      en: Includes tools executed by application handlers whose schemas derive from function signatures or parameter models.
      ja: application handler が実行し function signature や parameter model から schema を得る tool を含みます。
  excludes:
    - zh: 排除平台托管工具、计算机界面控制器和一次函数执行记录。
      en: Excludes platform-hosted tools, computer-interface controllers, and one function execution record.
      ja: platform-hosted tool、computer interface controller、一回の function execution record を除きます。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: handler_ref
      labels:
        zh: 处理器引用
        en: handler reference
        ja: handler 参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 处理器引用作为 FunctionTool 节点内部信息保存，不建立同名图节点。
        en: handler reference is stored as information on the FunctionTool node and does not create a namesake graph node.
        ja: handler 参照は FunctionTool node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: python:lookup_weather
      source_claims:
        - claim-function-tool-003
        - claim-function-tool-004
    - id: parameter_schema
      labels:
        zh: 参数 Schema
        en: parameter schema
        ja: 引数 Schema
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 参数 Schema作为 FunctionTool 节点内部信息保存，不建立同名图节点。
        en: parameter schema is stored as information on the FunctionTool node and does not create a namesake graph node.
        ja: 引数 Schemaは FunctionTool node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value:
        type: object
      source_claims:
        - claim-function-tool-005
        - claim-function-tool-006
  constraints: []
  required_relation_constraints: []
examples:
  - id: FunctionTool-example-positive-manual-001
    kind: positive
    labels:
      zh: FunctionTool 正例
      en: FunctionTool positive case
      ja: FunctionTool 正例
    scenario_id: null
    descriptions:
      zh: Python 函数 `lookup_weather(city)` 被转换为严格参数 Schema 并绑定本地处理器。
      en: Python function `lookup_weather(city)` is converted to a strict argument schema and bound to a local handler.
      ja: Python function `lookup_weather(city)` を strict argument schema に変換し local handler へ bind します。
    field_values:
      tool_id: tool:function:weather
      provisioning_mode: local-runtime
      handler_ref: python:lookup_weather
      parameter_schema:
        type: object
        required:
          - city
        properties:
          city:
            type: string
    related_node_ids:
      - FunctionTool
      - LocalRuntimeTool
    related_relation_ids:
      - FunctionTool-is_a-LocalRuntimeTool
    expected_result:
      zh: 该配置归为函数工具并继承本地运行时工具。
      en: The configuration is a FunctionTool under LocalRuntimeTool.
      ja: 設定を FunctionTool とし LocalRuntimeTool を継承します。
    why_valid_or_invalid:
      zh: 应用进程控制参数验证和函数执行。
      en: The application process controls argument validation and function execution.
      ja: application process が引数検証と関数実行を制御するためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-function-tool-007
      - claim-function-tool-008
  - id: FunctionTool-example-boundary-manual-001
    kind: boundary
    labels:
      zh: FunctionTool 边界例
      en: FunctionTool boundary case
      ja: FunctionTool 境界例
    scenario_id: null
    descriptions:
      zh: 模型服务直接执行托管网页搜索，应用没有对应函数处理器。
      en: The model service directly executes hosted web search and the application has no corresponding function handler.
      ja: model service が hosted web search を直接実行し application に handler はありません。
    field_values: {}
    related_node_ids:
      - FunctionTool
      - LocalRuntimeTool
    related_relation_ids:
      - FunctionTool-is_a-LocalRuntimeTool
    expected_result:
      zh: 该工具属于 HostedTool，不是 FunctionTool。
      en: The tool is a HostedTool, not a FunctionTool.
      ja: tool は HostedTool で FunctionTool ではありません。
    why_valid_or_invalid:
      zh: 函数工具必须有应用控制的处理器绑定。
      en: A FunctionTool requires an application-controlled handler binding.
      ja: FunctionTool には application 管理 handler binding が必要だからです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-function-tool-009
      - claim-function-tool-010
