schema: moonweave.ai/ontology-node/v1
id: LocalShellTool
kind: concept
status: accepted
labels:
  zh: 本地 Shell 工具
  en: Local Shell Tool
  ja: ローカル Shell ツール
semantics:
  short_definition:
    zh: 由应用提供执行器并在应用控制环境中运行命令的 Shell 工具。
    en: A Shell Tool whose executor is supplied by the application and runs commands in an application-controlled environment.
    ja: application が executor を提供し、application-controlled environment で command を実行する Shell Tool。
  definition:
    zh: 本地 Shell 工具是 ShellTool 的严格下位类型，继承 ShellTool 的 tool_id 作为同一 Shell 工具身份；继承的 executor_ref 只把该工具绑定到应用提供的命令执行器，不构成复合或影子身份。应用负责启动进程、设置工作目录、传入环境变量并返回 stdout、stderr 与退出状态。
    en: A Local Shell Tool is a strict ShellTool subtype and inherits the same shell-tool identity tool_id from ShellTool; inherited executor_ref only binds that tool to an application-supplied command executor and forms neither a compound nor shadow identity. The application starts the process, sets the working directory, supplies environment variables, and returns stdout, stderr, and exit status.
    ja: Local Shell Tool は ShellTool の厳密な下位型で、ShellTool から同じ shell-tool identity の tool_id を継承します。継承 executor_ref は application 提供 command executor への binding にすぎず、compound/shadow identity を作りません。application が process・working directory・environment variable・output を管理します。
  why_needed:
    zh: 本地执行的权限、文件系统和进程责任属于应用，必须与平台托管容器的责任边界分开。
    en: Local permissions, filesystem access, and process responsibility belong to the application and must be separated from platform-hosted container responsibility.
    ja: local permission・filesystem access・process responsibility は application に属し、platform-hosted container の責任境界と分離する必要があります。
  includes:
    - zh: 纳入由应用回调或执行器对象实际启动本地 shell 进程的工具。
      en: Includes tools whose application callback or executor object actually starts the local shell process.
      ja: application callback または executor object が local shell process を実際に起動する tool を含みます。
  excludes:
    - zh: 排除由平台在托管容器中执行的 shell，以及单次命令调用记录。
      en: Excludes shells executed by the platform in a hosted container and individual command invocation records.
      ja: platform が hosted container で実行する shell と個別 command invocation record を除きます。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: local-shell-tool-application-executor-boundary
      severity: error
      expression_language: plain
      expression: Inherited provisioning_mode MUST equal local-runtime, and inherited executor_ref MUST reference the application-supplied executor that starts the local process; executor_ref MUST NOT extend or replace inherited tool_id identity.
      explanations:
        zh: 继承的 provisioning_mode 必须为 local-runtime，executor_ref 必须指向负责启动本地进程的应用执行器；执行器引用不得扩展或替代继承的 tool_id 身份。
        en: Inherited provisioning_mode is local-runtime and executor_ref names the application executor that starts the local process; the executor reference neither extends nor replaces inherited tool_id identity.
        ja: 継承 provisioning_mode は local-runtime、executor_ref は local process を起動する application executor を指し、継承 tool_id identity を拡張・置換しません。
      source_claims:
        - claim-local-shell-tool-002
  required_relation_constraints: []
examples:
  - id: LocalShellTool-example-positive-manual-001
    kind: positive
    labels:
      zh: 本地 PowerShell 执行
      en: local PowerShell execution
      ja: local PowerShell 実行
    scenario_id: null
    descriptions:
      zh: 应用实现 executor 回调，在工作区启动 PowerShell 并把退出码返回代理运行时。
      en: The application implements the executor callback, starts PowerShell in the workspace, and returns the exit code to the agent runtime.
      ja: application が executor callback を実装し、workspace で PowerShell を起動して exit code を agent runtime に返します。
    field_values:
      tool_id: tool:shell:local-workspace
      provisioning_mode: local-runtime
      executor_ref: executor:powershell:workspace
    related_node_ids:
      - LocalShellTool
      - ShellTool
    related_relation_ids:
      - LocalShellTool-is_a-ShellTool
    expected_result:
      zh: 归入 LocalShellTool。
      en: Classify as LocalShellTool.
      ja: LocalShellTool に分類します。
    why_valid_or_invalid:
      zh: 应用提供执行器并承担进程启动、目录和退出状态处理责任。
      en: The application, not the platform, bears process-execution responsibility.
      ja: platform ではなく application が process-execution responsibility を担います。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-local-shell-tool-003
  - id: LocalShellTool-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 平台托管容器边界
      en: hosted-container boundary
      ja: hosted-container 境界
    scenario_id: local-shell-boundary
    descriptions:
      zh: 该对象仍是 ShellTool，但平台自动创建托管容器并在其中执行命令，因此满足 HostedShellTool 的平台托管种差，不满足 LocalShellTool 的应用执行器种差。
      en: The object remains a ShellTool, but the platform creates a hosted container and executes commands inside it, so it satisfies the platform-hosted differentia of HostedShellTool rather than the application-executor differentia of LocalShellTool.
      ja: 対象は ShellTool ですが、platform が hosted container を作成して内部で command を実行するため、LocalShellTool の application-executor 種差ではなく HostedShellTool の platform-hosted 種差を満たします。
    field_values: {}
    related_node_ids:
      - LocalShellTool
      - HostedShellTool
      - ShellTool
    related_relation_ids:
      - LocalShellTool-is_a-ShellTool
      - HostedShellTool-is_a-ShellTool
    expected_result:
      zh: 归入 HostedShellTool，而不是 LocalShellTool。
      en: Classify as HostedShellTool, not LocalShellTool.
      ja: LocalShellTool ではなく HostedShellTool に分類します。
    why_valid_or_invalid:
      zh: LocalShellTool 与 HostedShellTool 都通过 is_a 继承 ShellTool；本例的执行基础设施和进程责任由平台承担，所以保留共同上位类并在两个兄弟类之间选择 HostedShellTool。
      en: LocalShellTool and HostedShellTool both inherit ShellTool through is_a. Because the platform owns the execution infrastructure and process responsibility here, the shared genus remains valid while the correct sibling is HostedShellTool.
      ja: LocalShellTool／HostedShellTool はどちらも is_a で ShellTool を継承します。本例では platform が execution infrastructure・process responsibility を担うため、共通 genus を保持しつつ sibling は HostedShellTool を選びます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-local-shell-tool-004
