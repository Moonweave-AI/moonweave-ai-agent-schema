schema: moonweave.ai/ontology-node/v1
id: HostedShellTool
kind: concept
status: accepted
labels:
  zh: 托管 Shell 工具
  en: Hosted Shell Tool
  ja: ホステッド Shell ツール
semantics:
  short_definition:
    zh: 由平台在受管容器中执行命令的 Shell 工具。
    en: A Shell Tool whose commands execute in a platform-managed container.
    ja: platform-managed container で command を実行する Shell Tool。
  definition:
    zh: 托管 Shell 工具是 ShellTool 的严格下位类型，继承 ShellTool 的 tool_id 作为同一 Shell 工具身份；container_mode 只记录平台容器策略，不是另一身份。平台创建或复用容器、执行命令并返回输出；继承的 executor_ref 指向平台执行责任，调用方不提供本地进程执行器。
    en: A Hosted Shell Tool is a strict ShellTool subtype and inherits the same shell-tool identity tool_id from ShellTool; container_mode records platform container policy and is not another identity. The platform creates or reuses the container, executes commands, and returns output; inherited executor_ref denotes platform execution responsibility rather than a caller-supplied local process executor.
    ja: Hosted Shell Tool は ShellTool の厳密な下位型で、ShellTool から同じ shell-tool identity の tool_id を継承します。container_mode は platform container policy で別 identity ではありません。platform が container と command execution を管理し、継承 executor_ref は platform execution responsibility を示します。
  why_needed:
    zh: 托管容器的文件、网络、生命周期和计费责任不同于应用本地进程。
    en: Hosted-container filesystem, network, lifecycle, and billing responsibilities differ from an application-local process.
    ja: hosted-container の filesystem・network・lifecycle・billing responsibility は application-local process と異なります。
  includes:
    - zh: 纳入 container_auto 或 container_reference 方式的托管 shell。
      en: Includes hosted shells configured with container_auto or container_reference.
      ja: container_auto または container_reference の hosted shell を含みます。
  excludes:
    - zh: 排除应用回调实际启动的本地 shell 和非 shell 代码解释器。
      en: Excludes local shells actually started by an application callback and non-shell code interpreters.
      ja: application callback が起動する local shell と non-shell code interpreter を除きます。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: container_mode
      labels:
        zh: 容器模式
        en: container mode
        ja: container mode
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明平台自动创建容器或引用既有托管容器。
        en: States whether the platform automatically creates or references an existing hosted container.
        ja: platform が container を自動作成するか既存 hosted container を参照するかを示します。
      allowed_values:
        - id: HostedShellContainerModeAuto
          value: container_auto
          labels:
            zh: 平台自动容器
            en: platform-created container
            ja: platform-created container
          definitions:
            zh: 平台为本次托管 Shell 工具执行自动创建并管理容器。
            en: The platform creates and manages a container for the hosted ShellTool execution.
            ja: platform が hosted ShellTool execution 用 container を作成・管理します。
          status: accepted
          source_claims:
            - claim-hosted-shell-tool-002
        - id: HostedShellContainerModeReference
          value: container_reference
          labels:
            zh: 引用既有托管容器
            en: referenced hosted container
            ja: referenced hosted container
          definitions:
            zh: 托管 Shell 工具执行引用一个已经存在的平台托管容器。
            en: The hosted ShellTool execution references an existing platform-managed container.
            ja: hosted ShellTool execution が既存 platform-managed container を参照します。
          status: accepted
          source_claims:
            - claim-hosted-shell-tool-003
      pattern: null
      example_value: container_auto
      source_claims:
        - claim-hosted-shell-tool-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: HostedShellTool-example-positive-manual-001
    kind: positive
    labels:
      zh: 自动托管容器
      en: automatic hosted container
      ja: automatic hosted container
    scenario_id: null
    descriptions:
      zh: 平台以 container_auto 创建容器并执行 shell 命令。
      en: The platform creates a container with container_auto and executes shell commands.
      ja: platform が container_auto で container を作成し shell command を実行します。
    field_values:
      tool_id: tool:shell:hosted
      provisioning_mode: platform-hosted
      executor_ref: executor:platform:container-auto
      container_mode: container_auto
    related_node_ids:
      - HostedShellTool
      - ShellTool
    related_relation_ids:
      - HostedShellTool-is_a-ShellTool
    expected_result:
      zh: 归入 HostedShellTool。
      en: Classify as HostedShellTool.
      ja: HostedShellTool に分類します。
    why_valid_or_invalid:
      zh: 平台承担容器创建、隔离和命令进程执行的完整责任。
      en: The platform bears container and process-execution responsibility.
      ja: platform が container と process-execution responsibility を担います。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-hosted-shell-tool-005
  - id: HostedShellTool-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 应用本地执行器边界
      en: application-local executor boundary
      ja: application-local executor 境界
    scenario_id: hosted-shell-boundary
    descriptions:
      zh: 该对象仍是 ShellTool，但应用提供回调并在自己的工作区进程中执行命令，因此满足 LocalShellTool 的应用执行器种差，不满足 HostedShellTool 的平台托管种差。
      en: The object remains a ShellTool, but the application supplies a callback and executes the command in its own workspace process, so it satisfies the application-executor differentia of LocalShellTool rather than the platform-hosted differentia of HostedShellTool.
      ja: 対象は ShellTool ですが、application が callback を提供して自身の workspace process で command を実行するため、HostedShellTool の platform-hosted 種差ではなく LocalShellTool の application-executor 種差を満たします。
    field_values: {}
    related_node_ids:
      - HostedShellTool
      - LocalShellTool
      - ShellTool
    related_relation_ids:
      - HostedShellTool-is_a-ShellTool
      - LocalShellTool-is_a-ShellTool
    expected_result:
      zh: 归入 LocalShellTool，而不是 HostedShellTool。
      en: Classify as LocalShellTool, not HostedShellTool.
      ja: HostedShellTool ではなく LocalShellTool に分類します。
    why_valid_or_invalid:
      zh: HostedShellTool 与 LocalShellTool 都通过 is_a 继承 ShellTool；本例由调用应用提供本地执行器并承担进程责任，所以保留共同上位类并在两个兄弟类之间选择 LocalShellTool。
      en: HostedShellTool and LocalShellTool both inherit ShellTool through is_a. Because the calling application supplies the local executor and bears process responsibility, the shared genus remains valid while the correct sibling is LocalShellTool.
      ja: HostedShellTool／LocalShellTool はどちらも is_a で ShellTool を継承します。本例では calling application が local executor を提供して process responsibility を担うため、共通 genus を保持しつつ sibling は LocalShellTool を選びます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-hosted-shell-tool-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
