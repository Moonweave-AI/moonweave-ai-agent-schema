      expected_result:
        zh: 保留 ComputerTool —is_a→ LocalRuntimeTool，并按定义解释该方向。
        en: Retain ComputerTool —is_a→ LocalRuntimeTool and interpret that direction as defined.
        ja: ComputerTool —is_a→ LocalRuntimeTool を保持し定義どおり解釈します。
      why_valid_or_invalid:
        zh: 场景同时满足来源身份、目标身份和本关系要求的业务条件。
        en: The case satisfies the source identity, target identity, and the business condition required by this relation.
        ja: case は source identity、target identity、relation が要求する business condition を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-computer-tool-005
    - id: ComputerTool-is_a-LocalRuntimeTool-example-boundary-manual-001
      kind: boundary
      labels:
        zh: ComputerTool-is_a-LocalRuntimeTool 边界例
        en: ComputerTool-is_a-LocalRuntimeTool boundary case
        ja: ComputerTool-is_a-LocalRuntimeTool 境界例
      scenario_id: null
      descriptions:
        zh: 上传图片的普通函数处理器不观察或控制交互界面。
        en: An ordinary image-upload function neither observes nor controls an interactive interface.
        ja: 通常 image-upload function は interactive interface を観測・制御しません。
      field_values: {}
      related_node_ids:
        - ComputerTool
        - LocalRuntimeTool
      related_relation_ids:
        - ComputerTool-is_a-LocalRuntimeTool
      expected_result:
        zh: 不以该场景建立 ComputerTool-is_a-LocalRuntimeTool，并把对象保留在其正确身份中。
        en: Do not assert ComputerTool-is_a-LocalRuntimeTool for this case; retain each object under its correct identity.
        ja: この case では ComputerTool-is_a-LocalRuntimeTool を assertion せず各 object の正しい identity を保持します。
      why_valid_or_invalid:
        zh: 场景缺少本关系要求的决定性条件；相邻概念或时间接近不能补足该条件。
        en: The case lacks the relation's decisive condition; conceptual adjacency or temporal proximity cannot supply it.
        ja: case は relation の decisive condition を欠き、concept adjacency や temporal proximity では補えません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-computer-tool-006
  source_claims:
    - claim-computer-tool-007
  distinct_fact_rationale:
    zh: 该边表达一个不可由端点层级替代的独立业务事实。
    en: This edge expresses an independent business fact that endpoint hierarchy cannot replace.
    ja: この edge は endpoint hierarchy で代替できない独立 business fact を表します。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
