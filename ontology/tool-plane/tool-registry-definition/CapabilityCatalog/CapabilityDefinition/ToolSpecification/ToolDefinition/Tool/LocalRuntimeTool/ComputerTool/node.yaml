  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: is_a
    en: is a
    ja: is_a
  definitions:
    zh: 计算机控制工具是一种本地运行时工具：它继承应用控制执行边界，并以截图观察和界面动作接口作为具体机制。
    en: ComputerTool is a LocalRuntimeTool specialized by screenshot observation and interface-action mechanisms within an application-controlled executor.
    ja: ComputerTool は application-controlled executor を継承し screenshot 観測と UI action mechanism で細分化した LocalRuntimeTool です。
  cardinality: null
  cardinality_not_applicable_reason:
