schema: moonweave.ai/ontology-node/v1
id: ComputerTool
kind: concept
status: accepted
labels:
  zh: 计算机控制工具
  en: Computer Tool
  ja: コンピュータ操作ツール
semantics:
  short_definition:
    zh: 计算机控制工具通过应用提供的计算机接口执行界面动作。
    en: A Computer Tool performs interface actions through an application-provided computer interface.
    ja: コンピュータ操作ツールは application 提供 interface で画面操作を実行します。
  definition:
    zh: 计算机控制工具是 LocalRuntimeTool 的严格下位类型，继承 LocalRuntimeTool 的 tool_id 作为同一已注册工具身份；computer_provider_ref 只限定实现该工具的计算机接口，不另建身份。它通过截图观察以及点击、输入、滚动等动作操作界面，描述的是执行机制而非某一次点击事件。
    en: A Computer Tool is a strict LocalRuntimeTool subtype and inherits the tool_id identity of the same registered tool from LocalRuntimeTool; computer_provider_ref only qualifies the computer interface implementing that tool and does not create another identity. It observes screenshots and performs clicks, typing, scrolling, and related interface actions as an execution mechanism, not as one click event.
    ja: Computer Tool は LocalRuntimeTool の厳密な下位型で、LocalRuntimeTool から同じ registered tool の identity である tool_id を継承します。computer_provider_ref は実装 computer interface を限定するだけで別 identity を作りません。screenshot 観測と click・type・scroll を行う実行 mechanism で、一回の event ではありません。
  why_needed:
    zh: 该子类把设备界面控制与函数处理器、Shell 执行器分开，便于独立配置风险和观察反馈。
    en: This subclass separates device-interface control from function handlers and shell executors so its risks and observation loop can be configured independently.
    ja: device interface 操作を function handler と shell executor から分離し、risk と observation loop を別管理できます。
  includes:
    - zh: 纳入由应用控制计算机提供方并暴露截图与界面动作的工具。
      en: Includes tools backed by an application-controlled computer provider exposing screenshots and interface actions.
      ja: application 管理 computer provider による screenshot と UI action tool を含みます。
  excludes:
    - zh: 排除远程托管网页搜索、普通函数处理器和一次鼠标点击尝试。
      en: Excludes hosted web search, ordinary function handlers, and one mouse-click attempt.
      ja: hosted web search、通常 function handler、一回の mouse click attempt を除きます。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: computer_provider_ref
      labels:
        zh: 计算机提供方引用
        en: computer-provider reference
        ja: computer provider 参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 计算机提供方引用作为 ComputerTool 节点内部信息保存，不建立同名图节点。
        en: computer-provider reference is stored as information on the ComputerTool node and does not create a namesake graph node.
        ja: computer provider 参照は ComputerTool node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: provider:desktop-1
      source_claims:
        - claim-computer-tool-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: ComputerTool-example-positive-manual-001
    kind: positive
    labels:
      zh: ComputerTool 正例
      en: ComputerTool positive case
      ja: ComputerTool 正例
    scenario_id: null
    descriptions:
      zh: 桌面代理通过本地 provider 获取截图并执行坐标点击。
      en: A desktop agent obtains screenshots and performs coordinate clicks through a local provider.
      ja: desktop agent が local provider から screenshot を取得し座標 click を実行します。
    field_values:
      tool_id: tool:computer:desktop-provider-7
      provisioning_mode: local-runtime
      computer_provider_ref: computer-provider:desktop-7
    related_node_ids:
      - ComputerTool
      - LocalRuntimeTool
    related_relation_ids:
      - ComputerTool-is_a-LocalRuntimeTool
    expected_result:
      zh: 该工具归入计算机控制工具，并继承本地运行时工具。
      en: The tool is classified as ComputerTool under LocalRuntimeTool.
      ja: tool を ComputerTool とし LocalRuntimeTool を継承します。
    why_valid_or_invalid:
      zh: 执行器由应用控制，动作接口专门面向计算机界面。
      en: The executor is application-controlled and its action interface is specific to computer interaction.
      ja: executor が application 管理で action interface が computer 操作用だからです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-computer-tool-003
  - id: ComputerTool-example-boundary-manual-001
    kind: boundary
    labels:
      zh: ComputerTool 边界例
      en: ComputerTool boundary case
      ja: ComputerTool 境界例
    scenario_id: null
    descriptions:
      zh: 应用调用普通函数把图像文件上传到对象存储。
      en: An application calls an ordinary function that uploads an image file to object storage.
      ja: application が通常 function で image file を object storage へ upload します。
    field_values: {}
    related_node_ids:
      - ComputerTool
      - LocalRuntimeTool
    related_relation_ids:
      - ComputerTool-is_a-LocalRuntimeTool
    expected_result:
      zh: 该对象归 FunctionTool，而不是 ComputerTool。
      en: The object is a FunctionTool rather than a ComputerTool.
      ja: 対象は FunctionTool で ComputerTool ではありません。
    why_valid_or_invalid:
      zh: 处理文件不等于观察并控制交互式计算机界面。
      en: Processing a file is not the same as observing and controlling an interactive computer interface.
      ja: file 処理は interactive computer interface の観測・制御とは異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-computer-tool-004
external_mappings: []
applicability:
  - core
sibling_differentiation: []
