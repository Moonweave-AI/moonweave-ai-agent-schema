schema: moonweave.ai/ontology-node/v1
id: CapabilityDescriptor
kind: concept
status: review
labels:
  zh: 能力描述符
  en: Capability Descriptor
  ja: 能力記述子
semantics:
  short_definition:
    zh: 能力描述符是面向发现者发布的一份精简能力说明。
    en: A Capability Descriptor is a compact capability description published to discoverers.
    ja: 能力記述子は発見者向けに公開される簡潔な能力説明です。
  definition:
    zh: 能力描述符是一种 ToolMetadata，复用 metadata_id，并以来源定义版本、发布表面、名称、摘要、能力标签和关键接口提示形成发现视图；它不复制完整 ToolDefinition，也不保存检索分数。
    en: A Capability Descriptor is ToolMetadata that reuses metadata_id and forms a discovery view from source-definition version, publication surface, name, summary, capability tags, and essential interface hints. It does not copy the full ToolDefinition or store a search score.
    ja: Capability Descriptor は metadata_id を再利用し、source-definition version、publication surface、name、summary、capability tag、interface hint から discovery view を作る ToolMetadata です。完全 ToolDefinition や search score を保存しません。
  why_needed:
    zh: 描述符让大规模能力表面保持轻量，并把发布时裁剪与定义本身的权威合同分开。
    en: Descriptors keep large capability surfaces lightweight and separate publication-time projection from the authoritative definition contract.
    ja: 大規模 surface を軽量に保ち、公開時 projection と権威ある定義契約を分離します。
  includes:
    - zh: 纳入由某一稳定定义派生、面向特定表面发布的精简描述记录。
      en: Includes compact published records derived from one stable definition for a particular surface.
      ja: 一つの安定定義から特定 surface 向けに派生した簡潔な公開記録を含みます。
  excludes:
    - zh: 排除完整工具定义、查询相关匹配分数以及一次模型选择决定。
      en: Excludes a full tool definition, query-specific match scores, and one model selection decision.
      ja: 完全 tool definition、query 固有 match score、一回の model selection を除きます。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: source_definition_ref
      labels:
        zh: 来源定义引用
        en: source definition reference
        ja: 元定義参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 来源定义引用作为 CapabilityDescriptor 节点内部信息保存，不建立同名图节点。
        en: source definition reference is stored as information on the CapabilityDescriptor node and does not create a namesake graph node.
        ja: 元定義参照は CapabilityDescriptor node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: tool-def:weather@3
      source_claims:
        - claim-capability-descriptor-003
        - claim-capability-descriptor-004
    - id: summary
      labels:
        zh: 发布摘要
        en: published summary
        ja: 公開要約
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 发布摘要作为 CapabilityDescriptor 节点内部信息保存，不建立同名图节点。
        en: published summary is stored as information on the CapabilityDescriptor node and does not create a namesake graph node.
        ja: 公開要約は CapabilityDescriptor node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: Read a city forecast.
      source_claims:
        - claim-capability-descriptor-005
        - claim-capability-descriptor-006
    - id: capability_tags
      labels:
        zh: 能力标签
        en: capability tags
        ja: 能力タグ
      datatype: array
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 能力标签作为 CapabilityDescriptor 节点内部信息保存，不建立同名图节点。
        en: capability tags is stored as information on the CapabilityDescriptor node and does not create a namesake graph node.
        ja: 能力タグは CapabilityDescriptor node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value:
        - weather
        - read-only
      source_claims:
        - claim-capability-descriptor-007
        - claim-capability-descriptor-008
  constraints: []
  required_relation_constraints: []
examples:
  - id: CapabilityDescriptor-example-positive-manual-001
    kind: positive
    labels:
      zh: CapabilityDescriptor 正例
      en: CapabilityDescriptor positive case
      ja: CapabilityDescriptor 正例
    scenario_id: null
    descriptions:
      zh: 生产表面发布 `weather.lookup` 的名称、两句摘要和只读标签，完整 Schema 仍留在定义中。
      en: A production surface publishes the name, two-line summary, and read-only tag for `weather.lookup`; full schemas remain in the definition.
      ja: 本番 surface は `weather.lookup` の名称、短い要約、read-only tag を公開し、完全 schema は定義に残します。
    field_values:
      metadata_id: metadata:weather:v3:prod
      described_object_ref: tool:weather
      effective_scope: production
      source_definition_ref: tool-def:weather@3
      summary: Read a city forecast without modifying external state.
      capability_tags:
        - weather
        - read-only
    related_node_ids:
      - CapabilityDescriptor
      - ToolMetadata
    related_relation_ids:
      - CapabilityDescriptor-is_a-ToolMetadata
    expected_result:
      zh: 精简记录归为能力描述符并关联来源操作。
      en: The compact record is a CapabilityDescriptor linked to its source operation.
      ja: 簡潔な記録を能力記述子とし元操作へ関連付けます。
    why_valid_or_invalid:
      zh: 它承担发布投影而不成为第二份定义。
      en: It serves as a publication projection rather than a second definition.
      ja: 第二の定義ではなく公開 projection を担うためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-capability-descriptor-009
      - claim-capability-descriptor-010
  - id: CapabilityDescriptor-example-boundary-manual-001
    kind: boundary
    labels:
      zh: CapabilityDescriptor 边界例
      en: CapabilityDescriptor boundary case
      ja: CapabilityDescriptor 境界例
    scenario_id: null
    descriptions:
      zh: 工具搜索针对当前问题计算相关度 0.84。
      en: Tool search computes a relevance score of 0.84 for the current question.
      ja: tool search が現在質問に relevance score 0.84 を計算します。
    field_values: {}
    related_node_ids:
      - CapabilityDescriptor
      - ToolMetadata
    related_relation_ids:
      - CapabilityDescriptor-is_a-ToolMetadata
    expected_result:
      zh: 该分数属于 ToolMatch，不写入能力描述符。
      en: The score belongs to ToolMatch and is not stored in CapabilityDescriptor.
      ja: score は ToolMatch に属し能力記述子へ保存しません。
    why_valid_or_invalid:
      zh: 分数随查询变化，而描述符在发布版本内稳定。
      en: The score varies by query, while the descriptor is stable within a publication version.
      ja: score は query で変化し、記述子は公開版内で安定します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-capability-descriptor-011
      - claim-capability-descriptor-012
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: CapabilityDescriptor-is_a-ToolMetadata
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: is_a
    en: is a
    ja: is_a
  definitions:
    zh: 能力描述符是一种工具元数据：它继承独立信息身份，并专门承担面向发现表面的精简发布投影。
    en: CapabilityDescriptor is ToolMetadata specialized as a compact publication projection for discovery surfaces.
    ja: CapabilityDescriptor は独立情報 identity を継承し、discovery surface 向け公開 projection に特化した ToolMetadata です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体注册表与版本策略。
    en: Cardinality depends on the concrete registry and version policy.
    ja: cardinality は具体 registry と version policy に依存します。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：is_a
      en: inverse of is_a
      ja: 逆：is_a
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: CapabilityDescriptor-is_a-ToolMetadata-example-positive-manual-001
      kind: positive
      labels:
        zh: CapabilityDescriptor-is_a-ToolMetadata 正例
        en: CapabilityDescriptor-is_a-ToolMetadata positive case
        ja: CapabilityDescriptor-is_a-ToolMetadata 正例
      scenario_id: null
      descriptions:
        zh: 生产描述符只保留名称、摘要和标签，并引用完整定义。
        en: A production descriptor keeps only name, summary, and tags while referencing the full definition.
        ja: 本番 descriptor は name、summary、tag のみ保持し full definition を参照します。
      field_values: {}
      related_node_ids:
        - CapabilityDescriptor
        - ToolMetadata
      related_relation_ids:
        - CapabilityDescriptor-is_a-ToolMetadata
      expected_result:
        zh: 保留 CapabilityDescriptor —is_a→ ToolMetadata，并按定义解释该方向。
        en: Retain CapabilityDescriptor —is_a→ ToolMetadata and interpret that direction as defined.
        ja: CapabilityDescriptor —is_a→ ToolMetadata を保持し定義どおり解釈します。
      why_valid_or_invalid:
        zh: 场景同时满足来源身份、目标身份和本关系要求的业务条件。
        en: The case satisfies the source identity, target identity, and the business condition required by this relation.
        ja: case は source identity、target identity、relation が要求する business condition を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-capability-descriptor-013
    - id: CapabilityDescriptor-is_a-ToolMetadata-example-boundary-manual-001
      kind: boundary
      labels:
        zh: CapabilityDescriptor-is_a-ToolMetadata 边界例
        en: CapabilityDescriptor-is_a-ToolMetadata boundary case
        ja: CapabilityDescriptor-is_a-ToolMetadata 境界例
      scenario_id: null
      descriptions:
        zh: 定义内普通 description 字段没有独立生命周期或发布身份。
        en: An ordinary description field inside a definition has no independent lifecycle or publication identity.
        ja: definition 内の通常 description field は独立 lifecycle や publication identity を持ちません。
      field_values: {}
      related_node_ids:
        - CapabilityDescriptor
        - ToolMetadata
      related_relation_ids:
        - CapabilityDescriptor-is_a-ToolMetadata
      expected_result:
        zh: 不以该场景建立 CapabilityDescriptor-is_a-ToolMetadata，并把对象保留在其正确身份中。
        en: Do not assert CapabilityDescriptor-is_a-ToolMetadata for this case; retain each object under its correct identity.
        ja: この case では CapabilityDescriptor-is_a-ToolMetadata を assertion せず各 object の正しい identity を保持します。
      why_valid_or_invalid:
        zh: 场景缺少本关系要求的决定性条件；相邻概念或时间接近不能补足该条件。
        en: The case lacks the relation's decisive condition; conceptual adjacency or temporal proximity cannot supply it.
        ja: case は relation の decisive condition を欠き、concept adjacency や temporal proximity では補えません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-capability-descriptor-014
  source_claims:
    - claim-capability-descriptor-015
  distinct_fact_rationale:
    zh: 该边表达一个不可由端点层级替代的独立业务事实。
    en: This edge expresses an independent business fact that endpoint hierarchy cannot replace.
    ja: この edge は endpoint hierarchy で代替できない独立 business fact を表します。
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: child-to-parent
