      - ToolDeprecationNotice-is_a-ToolMetadata
    expected_result:
      zh: 该过程是 DeregistrationActivity，不是弃用通知。
      en: The process is DeregistrationActivity, not a deprecation notice.
      ja: process は DeregistrationActivity で deprecation notice ではありません。
    why_valid_or_invalid:
      zh: 实际状态变化具有活动身份和生效时刻。
      en: An actual state change has activity identity and effective time.
      ja: 実状態変更は activity identity と effective time を持つためです。
