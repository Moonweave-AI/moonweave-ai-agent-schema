    scenario_id: null
    descriptions:
      zh: 公告要求 weather v2 用户在三十天内迁移到 v3，并提供字段映射。
      en: A notice asks weather v2 users to migrate to v3 within thirty days and provides field mappings.
      ja: notice が weather v2 user に三十日以内の v3 migration と field mapping を示します。
    field_values:
      metadata_id: metadata:weather:v2:deprecation
      described_object_ref: tooldef:weather@2.0.0
      effective_scope: production
      target_definition_ref: tooldef:weather@2.0.0
      deprecates_at: 2026-08-16T00:00:00Z
      replacement_ref: tooldef:weather@3.0.0
    related_node_ids:
      - ToolDeprecationNotice
      - ToolMetadata
    related_relation_ids:
      - ToolDeprecationNotice-is_a-ToolMetadata
    expected_result:
      zh: 公告归 ToolDeprecationNotice 并 deprecates 目标定义。
      en: The notice is ToolDeprecationNotice and deprecates the target definition.
      ja: notice を ToolDeprecationNotice とし target definition を deprecates します。
    why_valid_or_invalid:
      zh: 它是可引用治理信息，尚未改变条目成员状态。
      en: It is referable governance information and has not changed entry membership.
      ja: 参照可能 governance 情報で entry membership をまだ変えないためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-deprecation-notice-009
      - claim-tool-deprecation-notice-010
  - id: ToolDeprecationNotice-example-boundary-manual-001
    kind: boundary
    labels:
      zh: ToolDeprecationNotice 边界例
      en: ToolDeprecationNotice boundary case
      ja: ToolDeprecationNotice 境界例
    scenario_id: null
    descriptions:
      zh: 午夜作业实际终止了生产条目并记录操作者。
      en: A midnight job actually terminates the production entry and records its operator.
      ja: midnight job が本番 entry を実際に終了し operator を記録します。
    field_values: {}
    related_node_ids:
