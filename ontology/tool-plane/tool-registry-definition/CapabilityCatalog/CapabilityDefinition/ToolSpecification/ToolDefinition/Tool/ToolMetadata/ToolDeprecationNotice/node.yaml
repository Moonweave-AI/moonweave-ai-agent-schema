schema: moonweave.ai/ontology-node/v1
id: ToolDeprecationNotice
kind: concept
status: accepted
labels:
  zh: 工具弃用通知
  en: Tool Deprecation Notice
  ja: ツール廃止通知
semantics:
  short_definition:
    zh: 工具弃用通知说明某工具定义将停止推荐或支持。
    en: A Tool Deprecation Notice states that a tool definition will cease to be recommended or supported.
    ja: ツール廃止通知は tool definition の推奨・support 終了を示します。
  definition:
    zh: 工具弃用通知是一种 ToolMetadata，复用 metadata_id，并以目标定义、弃用时间、替代定义和迁移说明表达治理意图；它不会自动终止 RegistryEntry，也不等同于 DeregistrationActivity。
    en: A Tool Deprecation Notice is ToolMetadata that reuses metadata_id and expresses governance intent through target definition, deprecation time, replacement definition, and migration guidance. It neither terminates a RegistryEntry automatically nor constitutes DeregistrationActivity.
    ja: Tool Deprecation Notice は metadata_id を再利用し、target definition、deprecation time、replacement、migration guidance で governance intent を表す ToolMetadata です。RegistryEntry を自動終了せず DeregistrationActivity でもありません。
  why_needed:
    zh: 把弃用信息与实际成员终止分开，系统才能表达提前公告、并行迁移和不同环境的分阶段下线。
    en: Separating deprecation information from membership termination supports advance notice, parallel migration, and staged retirement across environments.
    ja: deprecation 情報と membership termination を分け、事前告知、parallel migration、環境別段階廃止を表現できます。
  includes:
    - zh: 纳入有目标定义、弃用日期、替代项和迁移指导的治理通知。
      en: Includes governance notices with a target definition, deprecation date, replacement, and migration guidance.
      ja: target definition、deprecation date、replacement、migration guidance を持つ governance notice を含みます。
  excludes:
    - zh: 排除实际注销过程、一般描述文本、错误消息和注册状态字段。
      en: Excludes actual deregistration processes, ordinary descriptions, error messages, and registration-status fields.
      ja: actual deregistration process、ordinary description、error message、registration status field を除きます。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: target_definition_ref
      labels:
        zh: 目标定义引用
        en: target definition reference
        ja: 対象定義参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 目标定义引用作为 ToolDeprecationNotice 节点内部信息保存，不建立同名图节点。
        en: target definition reference is stored as information on the ToolDeprecationNotice node and does not create a namesake graph node.
        ja: 対象定義参照は ToolDeprecationNotice node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: tool-def:weather@2
      source_claims:
        - claim-tool-deprecation-notice-003
        - claim-tool-deprecation-notice-004
    - id: deprecates_at
      labels:
        zh: 弃用时刻
        en: deprecation time
        ja: 廃止時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 弃用时刻作为 ToolDeprecationNotice 节点内部信息保存，不建立同名图节点。
        en: deprecation time is stored as information on the ToolDeprecationNotice node and does not create a namesake graph node.
        ja: 廃止時刻は ToolDeprecationNotice node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: 2026-08-01T00:00:00Z
      source_claims:
        - claim-tool-deprecation-notice-005
        - claim-tool-deprecation-notice-006
    - id: replacement_ref
      labels:
        zh: 替代定义引用
        en: replacement definition reference
        ja: 代替定義参照
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 替代定义引用作为 ToolDeprecationNotice 节点内部信息保存，不建立同名图节点。
        en: replacement definition reference is stored as information on the ToolDeprecationNotice node and does not create a namesake graph node.
        ja: 代替定義参照は ToolDeprecationNotice node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: tool-def:weather@3
      source_claims:
        - claim-tool-deprecation-notice-007
        - claim-tool-deprecation-notice-008
  constraints: []
  required_relation_constraints: []
