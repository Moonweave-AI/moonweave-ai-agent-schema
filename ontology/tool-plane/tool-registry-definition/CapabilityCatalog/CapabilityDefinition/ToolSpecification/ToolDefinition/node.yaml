schema: moonweave.ai/ontology-node/v1
id: ToolDefinition
kind: concept
labels:
  zh: 可调用工具定义 profile
  en: Callable-tool definition profile
  ja: 呼び出し可能ツール定義 profile
semantics:
  short_definition:
    zh: 保留来源协议的可调用工具声明的 Moonweave 兼容 profile。
    en: A Moonweave compatibility profile for a callable-tool declaration that retains source protocol.
    ja: source protocol を保持する呼び出し可能 tool declaration の Moonweave compatibility profile。
  definition:
    zh: >
      ToolDefinition 是跨协议本地 profile，而非 MCP 或 OpenAI 的统一对象。它引用 MCP Tool 记录、OpenAI function
      tool 定义或 Agents SDK 工具对象，并保留其 source_protocol、源字段名和 schema。MCP 的官方对象名是 Tool；OpenAI
      使用 function tool；两者不能因都“定义工具”而互相替换。
    en: >
      ToolDefinition is a cross-protocol local profile rather than a unified MCP or OpenAI object.
      It references an MCP Tool record, an OpenAI function-tool definition, or an Agents SDK tool
      object and retains source_protocol, source field names, and schema. MCP's official object is
      Tool and OpenAI uses a function tool; the two cannot replace each other merely because both define tools.
    ja: >
      ToolDefinition は統一された MCP または OpenAI object ではなく protocol 横断のローカル profile である。MCP Tool record、
      OpenAI function-tool definition、または Agents SDK tool object を参照し、source_protocol、source field name、schema を
      保持する。MCP の公式 object は Tool、OpenAI は function tool を使い、どちらも tool を定義するからといって相互に
      置き換えられない。
  why_needed:
    zh: 本地目录需要引用多种工具声明，而调用方仍需知道每种声明的真实协议形状。
    en: A local catalog needs to reference several tool declarations while callers still need their true protocol shape.
    ja: ローカル catalog は複数の tool declaration を参照する必要があるが、caller は各 declaration の真の protocol shape を知る必要がある。
  includes:
    - zh: 来源协议、工具名称、schema 引用和来源记录。
      en: Source protocol, tool name, schema reference, and source record.
      ja: source protocol、tool name、schema reference、source record。
    - zh: 对 MCP Tool、OpenAI function tool 或 SDK tool 的明确标记。
      en: Explicit marking of an MCP Tool, OpenAI function tool, or SDK tool.
      ja: MCP Tool、OpenAI function tool、SDK tool の明示的な marking。
  excludes:
    - zh: 单一共享的 MCP/OpenAI ToolDefinition wire type。
      en: A single shared MCP/OpenAI ToolDefinition wire type.
      ja: 単一で共有された MCP/OpenAI ToolDefinition wire type。
    - zh: 工具执行实例或执行结果。
      en: A tool execution instance or execution result.
      ja: tool execution instance または execution result。
  semantic_kind: local-profile
  aliases:
    - language: en
      value: cross-protocol callable declaration
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      profile 应保存 source_protocol 和 source_record_ref。例如 MCP Tool 的源 schema 字段为 inputSchema，OpenAI
      function 的源 schema 字段为 parameters；SDK FunctionTool 又由函数签名和 Pydantic 生成 schema。适配器必须按来源
      转换，不能把 profile 自身当作可发送的请求对象。
    en: >
      The profile retains source_protocol and source_record_ref. For example, an MCP Tool source
      schema field is inputSchema, an OpenAI function source schema field is parameters, and an SDK
      FunctionTool generates schema from signature and Pydantic. An adapter must convert by source
      and cannot treat the profile itself as a sendable request object.
    ja: >
      profile は source_protocol と source_record_ref を保持する。例えば MCP Tool source schema field は inputSchema、
      OpenAI function source schema field は parameters、SDK FunctionTool は signature と Pydantic から schema を生成する。
      adapter は source ごとに convert し、この profile 自体を送信可能 request object として扱えない。
  typical_input:
    - description:
        zh: 一个来源明确的 MCP Tool 引用。
        en: A provenance-bearing MCP Tool reference.
        ja: provenance を持つ MCP Tool reference。
      format: |
        {"source_protocol":"MCP","source_record_ref":"mcp://files/tools/read_file","source_schema_field":"inputSchema"}
      source_claims: [moonweave-tool-definition-profile]
  typical_output:
    - description:
        zh: 可供本地目录引用的工具定义 profile。
        en: A callable-tool definition profile for local-catalog reference.
        ja: ローカル catalog reference 用の callable-tool definition profile。
      format: |
        {"tool_definition_id":"files-read-file","source_protocol":"MCP","tool_name":"read_file"}
      source_claims: [moonweave-tool-definition-profile]
  reference_implementations:
    - name: MCP Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines MCP Tool records and field names.
    - name: OpenAI Function Calling
      url: https://developers.openai.com/api/docs/guides/function-calling
      description: Defines OpenAI function-tool declarations.
structure:
  identity_keys: [capability_id, source_protocol, source_kind, definition_revision, tool_name, tool_definition_id]
  fields:
    - id: tool_definition_id
      labels:
        zh: 本地工具定义标识符
        en: Local tool-definition identifier
        ja: ローカル tool-definition 識別子
      definitions:
        zh: 在本地目录范围内标识该 profile。
        en: Identifies this profile within local catalog scope.
        ja: ローカル catalog scope 内でこの profile を識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: files-read-file
      allowed_values: []
      source_claims: [moonweave-tool-definition-profile]
    - id: source_protocol
      labels:
        zh: 来源协议
        en: Source protocol
        ja: source protocol
      definitions:
        zh: 标识该声明的真实协议或 SDK 表面。
        en: Identifies the declaration's actual protocol or SDK surface.
        ja: declaration の実際の protocol または SDK surface を識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: MCP
      allowed_values: [MCP, OpenAI, OpenAI-Agents-SDK]
      source_claims: [moonweave-tool-definition-profile]
    - id: tool_name
      labels:
        zh: 工具名称
        en: Tool name
        ja: tool 名
      definitions:
        zh: 来源声明中给出的工具名称。
        en: The tool name supplied by the source declaration.
        ja: source declaration が提供する tool name。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: read_file
      allowed_values: []
      source_claims: [mcp-tool-definition-record, openai-function-definition-record]
    - id: source_record_ref
      labels:
        zh: 来源记录引用
        en: Source-record reference
        ja: source-record reference
      definitions:
        zh: 指向原始协议记录、应用配置或 SDK 定义的引用。
        en: A reference to the original protocol record, application configuration, or SDK definition.
        ja: 元の protocol record、application configuration、SDK definition への reference。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: mcp://files/tools/read_file
      allowed_values: []
      source_claims: [moonweave-tool-definition-profile]
    - id: source_schema_field
      labels:
        zh: 来源 schema 字段
        en: Source schema field
        ja: source schema field
      definitions:
        zh: 原始声明中承载输入 schema 的字段名。
        en: The field name carrying input schema in the original declaration.
        ja: 元の declaration で input schema を運ぶ field name。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: inputSchema
      allowed_values: [inputSchema, parameters, params_json_schema]
      source_claims: [mcp-tool-definition-record, openai-function-definition-record, agents-function-tool-schema]
    - id: input_schema_field
      labels:
        zh: 输入 schema 来源字段
        en: Input-schema source field
        ja: input-schema source field
      definitions:
        zh: 保留 inputSchema 或 parameters 的原始字段名称。
        en: Retains the original field name inputSchema or parameters.
        ja: 元の field 名 inputSchema または parameters を保持する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: inputSchema
      allowed_values: [inputSchema, parameters]
      source_claims: [moonweave-tool-definition-taxonomy]
    - id: input_schema
      labels:
        zh: 输入 JSON Schema
        en: Input JSON Schema
        ja: input JSON Schema
      definitions:
        zh: 按来源协议解释的输入 JSON Schema 对象。
        en: The input JSON Schema object interpreted under the source protocol.
        ja: source protocol の下で解釈される input JSON Schema object。
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: '{"type":"object","properties":{"city":{"type":"string"}},"required":["city"]}'
      allowed_values: []
      source_claims: [moonweave-tool-definition-taxonomy]
    - id: definition_revision
      labels:
        zh: 能力定义 profile 版本
        en: capability-definition profile version
        ja: capability-definition profile version
      definitions:
        zh: 标识此不可变本地 能力定义 profile 版本；变更必须创建新版本，不得就地修改。
        en: Identifies this immutable local capability-definition profile version; a change must create a new version rather than mutate it in place.
        ja: この不変ローカル capability-definition profile version を識別する。変更は in-place で mutate せず新 version を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "1"
      allowed_values: []
      source_claims: [moonweave-tool-definition-taxonomy]
    - id: catalog_revision_ref
      labels:
        zh: 能力目录修订引用
        en: capability catalog revision reference
        ja: capability catalog revision reference
      definitions:
        zh: 标识拥有此 能力定义 profile 版本 的不可变 能力目录修订；该组成部分在父修订外无效，删除父修订只删除本地 profile，不删除 MCP、OpenAI 或应用配置来源记录。
        en: Identifies the immutable capability catalog revision that owns this capability-definition profile version; the component is invalid outside that parent revision, and deleting the parent revision deletes only local profiles, not MCP, OpenAI, or application-configuration source records.
        ja: この capability-definition profile version を所有する不変 capability catalog revision を識別する。component は parent revision 外では無効で、parent revision を削除してもローカル profile だけが削除され、MCP、OpenAI、application-configuration の source record は削除されない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: capabilitycatalog@1
      allowed_values: []
      source_claims: [moonweave-tool-definition-taxonomy]
    - id: capability_id
      labels:
        zh: 能力标识符
        en: Capability identifier
        ja: 能力識別子
      definitions:
        zh: 在其来源范围内定位记录的名称或标识符。
        en: The name or identifier that locates the record within its source scope.
        ja: source scope 内で記録を特定する名前または識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: code_review
      allowed_values: []
      source_claims: [moonweave-tool-definition-taxonomy]
    - id: source_kind
      labels:
        zh: 来源记录类型
        en: Source record kind
        ja: source record kind
      definitions:
        zh: 记录来源的标准术语，如 Tool、Prompt、Resource、ResourceTemplate 或 function。
        en: The source's standard term, such as Tool, Prompt, Resource, ResourceTemplate, or function.
        ja: Tool、Prompt、Resource、ResourceTemplate、function など source の標準用語。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Prompt
      allowed_values: [Tool, Prompt, Resource, ResourceTemplate, function]
      source_claims: [moonweave-tool-definition-taxonomy]
    - id: contract_summary
      labels:
        zh: 契约摘要
        en: Contract summary
        ja: 契約要約
      definitions:
        zh: 指向来源定义字段的不可替代摘要，而不是重写后的协议 payload。
        en: A non-substituting summary pointing to source definition fields, not a rewritten protocol payload.
        ja: source definition field を指す、置換しない要約であり、書き換えた protocol payload ではない。
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: '{"input_field":"arguments","source_uri":"mcp://server/prompts/code_review"}'
      allowed_values: []
      source_claims: [moonweave-tool-definition-taxonomy]
  constraints:
    - id: definition-must-identify-its-source-shape
      severity: error
      expression_language: plain
      expression: source_protocol and source_schema_field must identify the source declaration shape; a ToolDefinition profile cannot be emitted as a universal wire object.
      explanation:
        zh: 兼容 profile 可引用多种声明，但必须保留每一种声明的字段和协议。
        en: A compatibility profile may reference several declarations but must retain each declaration's fields and protocol.
        ja: compatibility profile は複数 declaration を参照できるが、各 declaration の field と protocol を保持しなければならない。
      source_claims: [moonweave-tool-definition-profile]
    - id: tool-definition-inherits-parent-required-fields
      severity: error
      expression_language: plain
      expression: "All inherited required ToolSpecification fields are fields of this same record; the is_a subtype does not establish or reference a second ToolSpecification record."
      explanation: {zh: "所有继承的 ToolSpecification 必需字段属于同一记录，该 is_a 子类型不建立或引用第二条 ToolSpecification 记录。", en: "Inherited required fields stay on the same record rather than creating a second parent record.", ja: "継承された必須 ToolSpecification フィールドは同じレコードに属し、この is_a 下位型は 2 番目の親レコードを作成または参照しない。"}
      source_claims: [moonweave-tool-definition-taxonomy]
  required_relations: []
examples:
  - id: tool-definition-positive-mcp

    labels:
      zh: MCP Tool 定义引用
      en: MCP Tool definition reference
      ja: MCP Tool definition reference

    descriptions:
      zh: Gorilla (Patil 2023) APIBench 训练 LLM 生成准确 API 调用；LangChain @tool def search(query:str)->str 与 BaseTool(name,description,args_schema,_run()) 定义可调用 schema。
      en: Gorilla (Patil 2023) APIBench trains LLM for accurate API calls; LangChain @tool def search(query:str)->str and BaseTool(name,description,args_schema,_run()) define callable schema.
      ja: Gorilla (Patil 2023) APIBench が LLM を訓練して正確な API 呼出しを生成。LangChain @tool と BaseTool(name,description,args_schema,_run()) が callable schema を定義。
    field_values:
      source_protocol: MCP
      tool_name: read_file
      capability_id: read_file
      source_kind: Tool
      definition_revision: "1"
      source_schema_field: inputSchema
    related_node_ids: [ToolDefinition]
    related_relation_ids: [ToolDefinition-is_a-ToolSpecification]

    source_claims: [mcp-tool-definition-record, moonweave-tool-definition-profile]
  - id: tool-definition-counterexample-universal-wire-object

    labels:
      zh: 伪造统一工具定义消息
      en: Fabricated universal tool-definition message
      ja: 捏造された universal tool-definition message

    descriptions:
      zh: 反例：Gorilla 无 retriever 生成不存在 API 名；LangChain tool 缺 args_schema Pydantic model；Instructor response_model 字段与 OpenAI function parameters 混用。
      en: Counterexample: Gorilla generates nonexistent API name without retriever; LangChain tool missing args_schema Pydantic model; Instructor response_model fields mixed with OpenAI function parameters.
      ja: 反例：Gorilla が retriever なしで不存在 API 名を生成。LangChain tool に args_schema 欠落。Instructor response_model と OpenAI function parameters 混同。
    field_values:
      source_protocol: MCP
    related_node_ids: [ToolDefinition]
    related_relation_ids: [ToolDefinition-is_a-ToolSpecification]

    source_claims: [moonweave-tool-definition-profile]
  - id: tool-definition-boundary-definition-and-runtime

    labels:
      zh: 声明与运行时对象边界
      en: Boundary between declaration and runtime object
      ja: declaration と runtime object の境界

    descriptions:
      zh: Gorilla API 文档 schema vs LangChain StructuredTool.from_function vs Instructor Pydantic model 的声明-运行时边界；ToolDefinition profile 非 wire 对象。
      en: Declaration-runtime boundary among Gorilla API doc schema, LangChain StructuredTool.from_function, Instructor Pydantic model; ToolDefinition profile is not wire object.
      ja: Gorilla API 文档 schema、LangChain StructuredTool.from_function、Instructor Pydantic model の宣言-ランタイム境界。ToolDefinition profile は wire object ではない。
    field_values:
      source_protocol: OpenAI-Agents-SDK
      source_schema_field: params_json_schema
    related_node_ids: [ToolDefinition, FunctionTool]
    related_relation_ids: [ToolDefinition-is_a-ToolSpecification]

    source_claims: [agents-function-tool-schema, moonweave-tool-definition-profile]
  - id: tool-definition-instance-openai-function

    labels:
      zh: OpenAI 函数工具定义实例
      en: OpenAI function-tool definition instance
      ja: OpenAI function-tool definition instance

    descriptions:
      zh: Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather")；@kernel_function(description="Get weather") def get_weather(city:str)->str；Instructor client.chat.completions.create(response_model=User) 用 Pydantic 作 schema。
      en: Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather"); @kernel_function(description="Get weather") def get_weather(city:str)->str; Instructor client.chat.completions.create(response_model=User) uses Pydantic as schema.
      ja: Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather")。@kernel_function(description="Get weather") def get_weather(city:str)->str。Instructor response_model=User が Pydantic schema を使用。
    field_values:
      source_protocol: OpenAI
      tool_name: get_weather
      capability_id: get_weather
      source_kind: function
      definition_revision: "1"
      source_schema_field: parameters
    related_node_ids: [ToolDefinition, ToolSpecification]
    related_relation_ids: [ToolDefinition-is_a-ToolSpecification]

    source_claims: [openai-function-definition-record, moonweave-tool-definition-profile]
parent_relation:
  id: ToolDefinition-is_a-ToolSpecification
  predicate: is_a
  target: concept:ToolSpecification
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是可调用工具 schema profile 的一种定义 profile
    en: is a definition profile within the callable-tool schema profile
    ja: 呼び出し可能ツール schema profile 内の定義 profile である
  definition:
    zh: ToolDefinition 在本地 schema profile 中保留一个来源明确的工具声明。
    en: ToolDefinition retains one provenance-bearing tool declaration within the local schema profile.
    ja: ToolDefinition はローカル schema profile 内で一つの provenance-bearing tool declaration を保持する。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 具有子类型
      en: has subtype
      ja: subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: This is local profile taxonomy and does not establish a shared MCP/OpenAI ToolDefinition type.
  constraints:
    - id: tool-definition-taxonomy-is-local
      severity: error
      expression_language: plain
      expression: The subtype relation must preserve that ToolDefinition is a Moonweave compatibility profile rather than a protocol-native shared type.
      explanation:
        zh: MCP 与 OpenAI 使用不同的工具声明形状。
        en: MCP and OpenAI use different tool-declaration shapes.
        ja: MCP と OpenAI は異なる tool-declaration shape を使う。
      source_claims: [moonweave-tool-definition-taxonomy]
  examples: []
  source_claims: [moonweave-tool-definition-taxonomy]
  distinct_fact_rationale:
    zh: 关系用于本地导航而不替代标准声明。
    en: The relation supports local navigation without replacing standard declarations.
    ja: 関係は標準 declaration を置換せずローカル navigation を支える。
relations: []
