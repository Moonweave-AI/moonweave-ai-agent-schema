source_claims:
  - id: mcp-tool-definition-record
    source: mcp-tools-2025-11-25
    supports: An MCP Tool record uses name and inputSchema with optional descriptive and execution-related fields.
    locator: "Tool"
    evidence_kind: normative
    confidence: high
  - id: openai-function-definition-record
    source: openai-function-calling
    supports: An OpenAI function tool declaration uses type function, name, description, parameters, and optional strict behavior.
    locator: "Function tools; Strict mode"
    evidence_kind: normative
    confidence: high
  - id: agents-function-tool-schema
    source: openai-agents-sdk-tools
    supports: Agents SDK FunctionTool instances expose name, description, params_json_schema, and an invocation handler.
    locator: "Function tools; Custom function tools"
    evidence_kind: normative
    confidence: high
  - id: moonweave-tool-definition-profile
    source: moonweave-ontology-design
    supports: ToolDefinition is a Moonweave local compatibility profile that retains each callable declaration's source protocol and field names.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
  - id: moonweave-tool-definition-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave classifies ToolDefinition under ToolSpecification as a local compatibility taxonomy edge.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
