      zh: ToolDefinition 边界例
      en: ToolDefinition boundary case
      ja: ToolDefinition 境界例
    scenario_id: null
    descriptions:
      zh: 生产注册条目引用 weather v3，并增加环境与提供端点。
      en: A production registry entry references weather v3 and adds environment and provider endpoint.
      ja: 本番 registry entry が weather v3 を参照し environment と provider endpoint を追加します。
    field_values: {}
    related_node_ids:
      - ToolDefinition
      - ToolSpecification
    related_relation_ids:
      - ToolDefinition-is_a-ToolSpecification
    expected_result:
      zh: 该对象是 RegistryEntry；不得复制定义 Schema。
      en: The object is RegistryEntry and must not copy the definition schemas.
      ja: object は RegistryEntry で definition schema を複製しません。
    why_valid_or_invalid:
      zh: 目录成员身份与版本合同身份由不同键决定。
      en: Catalog-membership identity and versioned-contract identity use different keys.
      ja: catalog membership identity と version contract identity が別 key だからです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-definition-022
      - claim-tool-definition-023
      - claim-tool-definition-024
      - claim-tool-definition-025
