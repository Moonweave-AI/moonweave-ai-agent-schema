        ja: 出力 Schemaは ToolDefinition node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value:
        type: object
      source_claims:
        - claim-tool-definition-012
        - claim-tool-definition-013
        - claim-tool-definition-014
        - claim-tool-definition-015
    - id: behavior_annotations
      labels:
        zh: 行为注解
        en: behavior annotations
        ja: 動作 annotation
      datatype: object
