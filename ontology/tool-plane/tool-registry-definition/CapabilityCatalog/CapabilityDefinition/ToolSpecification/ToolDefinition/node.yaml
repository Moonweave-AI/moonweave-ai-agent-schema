schema: moonweave.ai/ontology-node/v1
id: ToolDefinition
kind: concept
status: review
labels:
  zh: 工具定义
  en: Tool Definition
  ja: ツール定義
semantics:
  short_definition:
    zh: 工具定义是一个具体版本的可调用工具接口声明。
    en: A Tool Definition is one concrete version of a callable tool interface declaration.
    ja: ツール定義は callable tool interface の一つの具体 version 宣言です。
  definition:
    zh: 工具定义是一种工具规格，复用上位 capability_definition_id 作为稳定身份，并内嵌名称、说明、必需输入 Schema、可选输出 Schema 和行为注解；Schema 是节点信息而非独立图节点，定义描述 Tool 但不等同于 Tool 或注册条目。
    en: A Tool Definition is a ToolSpecification that reuses the inherited capability_definition_id as its stable identity and embeds name, description, required input schema, optional output schema, and behavior annotations. Schemas are node information rather than separate graph nodes, and the definition describes but is not the Tool or RegistryEntry.
    ja: ツール定義は継承した capability_definition_id を安定 identity として再利用し、name、description、required input schema、optional output schema、behavior annotation を node 情報として内包する ToolSpecification です。Tool や RegistryEntry 自体ではありません。
  why_needed:
    zh: 把 Schema、说明和实例都固定在定义节点内，可保持单一图结构，同时让每个版本具有可验证、可引用且不与目录成员混淆的合同。
    en: Keeping schemas, explanations, and examples on the definition node preserves one graph structure while giving each version a verifiable, referable contract distinct from catalog membership.
    ja: schema、説明、例を definition node 内に保持し、一つの graph structure と検証可能 version contract を両立します。
  includes:
    - zh: 纳入复用稳定 capability_definition_id、具有明确版本、名称和输入 JSON Schema 的工具接口声明。
      en: Includes tool interface declarations that reuse a stable capability_definition_id and carry an explicit version, name, and input JSON Schema.
      ja: stable capability_definition_id を再利用し、version、name、input JSON Schema を持つ tool interface 宣言を含みます。
  excludes:
    - zh: 排除 schema_node、framework 节点、source_document 节点、RegistryEntry 和一次 ToolCall。
      en: Excludes schema_node, framework, and source_document graph nodes, RegistryEntry, and one ToolCall.
      ja: schema_node、framework、source_document graph node、RegistryEntry、一回の ToolCall を除きます。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: title
      labels:
        zh: 显示标题
        en: display title
        ja: 表示 title
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 显示标题作为 ToolDefinition 节点内部信息保存，不建立同名图节点。
        en: display title is stored as information on the ToolDefinition node and does not create a namesake graph node.
        ja: 表示 titleは ToolDefinition node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: Weather Lookup
      source_claims:
        - claim-tool-definition-005
    - id: description
      labels:
        zh: 工具说明
        en: tool description
        ja: ツール説明
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 工具说明作为 ToolDefinition 节点内部信息保存，不建立同名图节点。
        en: tool description is stored as information on the ToolDefinition node and does not create a namesake graph node.
        ja: ツール説明は ToolDefinition node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: Returns a city forecast.
      source_claims:
