examples:
  - id: ToolDefinition-example-positive-manual-001
    kind: positive
    labels:
      zh: ToolDefinition 正例
      en: ToolDefinition positive case
      ja: ToolDefinition 正例
    scenario_id: null
    descriptions:
      zh: weather 定义 v3 内嵌名称、城市输入 Schema、可选预报输出 Schema 和只读注解。
      en: Weather definition v3 embeds its name, city input schema, optional forecast output schema, and read-only annotation.
      ja: weather definition v3 が name、city input schema、optional forecast output schema、read-only annotation を内包します。
    field_values:
      capability_definition_id: capdef:weather
      version: 3.0.0
      name: weather
      contract_kind: interface
      description: Read-only weather lookup for a named city
      argument_schema:
        type: object
        properties:
          city:
            type: string
        required:
          - city
        additionalProperties: false
      result_schema:
        type: object
        properties:
          temperature_c:
            type: number
          conditions:
            type: string
        required:
          - temperature_c
          - conditions
        additionalProperties: false
      behavior_annotations:
        readOnlyHint: true
        destructiveHint: false
    related_node_ids:
      - ToolDefinition
      - ToolSpecification
    related_relation_ids:
      - ToolDefinition-is_a-ToolSpecification
    expected_result:
      zh: 记录归 ToolDefinition；Schema 作为字段显示，不新增图节点。
      en: The record is a ToolDefinition; schemas appear as fields without new graph nodes.
      ja: record を ToolDefinition とし schema は field 表示で graph node を増やしません。
    why_valid_or_invalid:
      zh: 一份版本合同由联合身份键和内嵌接口信息完整确定。
      en: A versioned contract is fully determined by its joint identity keys and embedded interface information.
      ja: version contract が joint identity key と embedded interface 情報で決まるためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-definition-018
      - claim-tool-definition-019
      - claim-tool-definition-020
      - claim-tool-definition-021
