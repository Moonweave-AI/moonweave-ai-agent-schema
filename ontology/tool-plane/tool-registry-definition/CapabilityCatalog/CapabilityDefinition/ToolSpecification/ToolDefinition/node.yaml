      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 行为注解作为 ToolDefinition 节点内部信息保存，不建立同名图节点。
        en: behavior annotations is stored as information on the ToolDefinition node and does not create a namesake graph node.
        ja: 動作 annotationは ToolDefinition node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
