schema: moonweave.ai/ontology-node/v1
id: PromptDefinition
kind: concept
status: accepted
labels:
  zh: 提示定义
  en: Prompt Definition
  ja: プロンプト定義
semantics:
  short_definition:
    zh: 提示定义以名称、可选标题与参数声明一项可发现的提示能力。
    en: A Prompt Definition declares a discoverable prompt capability by name, optional title, and arguments.
    ja: プロンプト定義は名称、任意 title、引数で発見可能な prompt 能力を宣言します。
  definition:
    zh: 提示定义是一种能力定义，复用上位 capability_definition_id；prompt_name 是服务器范围内的协议寻址名，可选 title、description、icons 与 arguments 构成 MCP prompts/list 可发现的提示种差。具体 messages 由 prompts/get 在 PromptInstantiation 中生成，不属于定义本身；它不是工具，也没有 inputSchema 执行语义。
    en: A Prompt Definition is a CapabilityDefinition that reuses the inherited capability_definition_id; prompt_name is its server-scoped protocol address, while optional title, description, icons, and arguments form the MCP prompts/list discoverable differentia. Concrete messages are produced by prompts/get during PromptInstantiation and are not part of the definition itself; it is not a tool and has no inputSchema execution semantics.
    ja: プロンプト定義は継承した capability_definition_id を再利用し、prompt_name を server-scoped protocol address、optional title・description・icons・arguments を MCP prompts/list discoverable differentia とする CapabilityDefinition です。concrete messages は prompts/get による PromptInstantiation で生成され definition 自体には含まれません。tool や inputSchema 実行ではありません。
  why_needed:
    zh: 把提示放在能力定义层而不是工具规格下，既保留统一发现抽象，又防止提示模板被误读为可执行工具。
    en: Placing prompts under CapabilityDefinition rather than ToolSpecification preserves a shared discovery abstraction without misreading templates as executable tools.
    ja: prompt を CapabilityDefinition 配下に置き、共通発見抽象を保ちながら実行 tool との誤認を防ぎます。
  includes:
    - zh: 纳入具有稳定名称、可选标题、描述、图标与参数的可列举提示声明。
      en: Includes listable prompt declarations with a stable name, optional title, description, icons, and arguments.
      ja: 安定名称、optional title・description・icons・arguments を持つ listable prompt 宣言を含みます。
  excludes:
    - zh: 排除已经填充参数的消息结果、系统提示文本片段和可执行 ToolDefinition。
      en: Excludes instantiated message results, system-prompt text fragments, and executable ToolDefinitions.
      ja: 具体化済み message result、system prompt text fragment、実行可能 ToolDefinition を除きます。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: prompt_name
      labels:
        zh: 提示名称
        en: prompt name
        ja: プロンプト名
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 提示名称作为 PromptDefinition 节点内部信息保存，不建立同名图节点。
        en: prompt name is stored as information on the PromptDefinition node and does not create a namesake graph node.
        ja: プロンプト名は PromptDefinition node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: incident-triage
      source_claims:
        - claim-prompt-definition-002
    - id: title
      labels:
        zh: 显示标题
        en: display title
        ja: 表示 title
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: MCP 可选的人类可读提示标题，作为节点内部信息保存。
        en: Optional MCP human-readable prompt title stored as node information.
        ja: 任意 MCP human-readable prompt title を node 情報として保存します。
      allowed_values: []
      pattern: null
      example_value: Incident Triage
      source_claims:
        - claim-prompt-definition-004
    - id: description
      labels:
        zh: 提示描述
        en: prompt description
        ja: prompt 説明
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: MCP 可选提示说明，作为节点内部信息保存。
        en: Optional MCP prompt description stored as node information.
        ja: 任意 MCP prompt description を node 情報として保存します。
      allowed_values: []
      pattern: null
      example_value: Triage an incident for a named service.
      source_claims:
        - claim-prompt-definition-004
    - id: icons
      labels:
        zh: 图标
        en: icons
        ja: icons
      datatype: array
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: MCP 可选图标集合，作为节点内部信息保存。
        en: Optional MCP icon set stored as node information.
        ja: 任意 MCP icon set を node 情報として保存します。
      allowed_values: []
      pattern: null
      example_value:
        - src: https://example.com/triage.svg
          mimeType: image/svg+xml
          sizes:
            - any
      source_claims:
        - claim-prompt-definition-004
    - id: arguments
      labels:
        zh: 提示参数
        en: prompt arguments
        ja: prompt 引数
      datatype: array
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: MCP 可选参数声明（name、description、required），作为节点内部信息保存。
        en: Optional MCP argument declarations (name, description, required) stored as node information.
        ja: 任意 MCP argument declaration（name・description・required）を node 情報として保存します。
      allowed_values: []
      pattern: null
      example_value:
        - name: service
          description: Service whose incident is being triaged.
          required: true
      source_claims:
        - claim-prompt-definition-003
  constraints: []
  required_relation_constraints: []
examples:
  - id: PromptDefinition-example-positive-manual-001
    kind: positive
    labels:
      zh: PromptDefinition 正例
      en: PromptDefinition positive case
      ja: PromptDefinition 正例
    scenario_id: null
    descriptions:
      zh: MCP 服务器在 prompts/list 中列出 `incident-triage`，携带 title、description 与 `service` 参数声明，不包含 messages。
      en: An MCP server lists `incident-triage` in prompts/list with title, description, and a `service` argument declaration, without messages.
      ja: MCP server が prompts/list で `incident-triage` と title、description、`service` argument declaration を列挙し messages は含みません。
    field_values:
      capability_definition_id: promptdef:incident-triage
      version: 1.0.0
      name: incident-triage
      prompt_name: incident-triage
      title: Incident Triage
      description: Triage an incident for a named service.
      arguments:
        - name: service
          description: Service whose incident is being triaged.
          required: true
    related_node_ids:
      - PromptDefinition
      - CapabilityDefinition
    related_relation_ids:
      - PromptDefinition-is_a-CapabilityDefinition
    expected_result:
      zh: 该声明归提示定义并继承能力定义。
      en: The declaration is a PromptDefinition under CapabilityDefinition.
      ja: 宣言を PromptDefinition とし CapabilityDefinition を継承します。
    why_valid_or_invalid:
      zh: 身份由可复用名称和模板合同决定，而非某次填充值。
      en: Its identity comes from a reusable name and template contract rather than one filled value.
      ja: 再利用名称と template 契約が identity を決めるためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-prompt-definition-005
  - id: PromptDefinition-example-boundary-manual-001
    kind: boundary
    labels:
      zh: PromptDefinition 边界例
      en: PromptDefinition boundary case
      ja: PromptDefinition 境界例
    scenario_id: null
    descriptions:
      zh: 客户端用 service=payments 调用 prompts/get 并得到三条具体消息。
      en: A client calls prompts/get with service=payments and receives three concrete messages.
      ja: client が service=payments で prompts/get を呼び三つの具体 message を得ます。
    field_values: {}
    related_node_ids:
      - PromptDefinition
      - CapabilityDefinition
    related_relation_ids:
      - PromptDefinition-is_a-CapabilityDefinition
    expected_result:
      zh: 消息结果属于提示实例化，不是新的提示定义。
      en: The messages are a prompt instantiation, not a new PromptDefinition.
      ja: message は prompt instantiation で新しい PromptDefinition ではありません。
    why_valid_or_invalid:
      zh: 实例身份依赖本次参数，定义身份不依赖。
      en: Instantiation identity depends on this request's arguments; definition identity does not.
      ja: instance identity は今回 argument に依存し definition identity は依存しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-prompt-definition-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: PromptDefinition-is_a-CapabilityDefinition
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: is_a
    en: is a
    ja: is_a
  definitions:
    zh: 提示定义是一种能力定义：它继承稳定、可发现的定义身份，并以提示名称、可选展示元数据与参数声明作为具体合同；messages 由实例化产生。
    en: PromptDefinition is a CapabilityDefinition specialized by prompt name, optional display metadata, and argument declarations; messages are produced at instantiation.
    ja: PromptDefinition は stable discoverable definition identity を継承し prompt name、optional display metadata、argument declaration で細分化します。messages は instantiation で生成されます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体注册表与版本策略。
    en: Cardinality depends on the concrete registry and version policy.
    ja: cardinality は具体 registry と version policy に依存します。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：is_a
      en: inverse of is_a
      ja: 逆：is_a
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: PromptDefinition-is_a-CapabilityDefinition-example-positive-manual-001
      kind: positive
      labels:
        zh: PromptDefinition-is_a-CapabilityDefinition 正例
        en: PromptDefinition-is_a-CapabilityDefinition positive case
        ja: PromptDefinition-is_a-CapabilityDefinition 正例
      scenario_id: null
      descriptions:
        zh: prompts/list 返回稳定名称和参数，prompts/get 再进行实例化。
        en: prompts/list returns stable names and arguments before prompts/get instantiation.
        ja: prompts/list が stable name と argument を返し prompts/get が具体化します。
      field_values: {}
      related_node_ids:
        - PromptDefinition
        - CapabilityDefinition
      related_relation_ids:
        - PromptDefinition-is_a-CapabilityDefinition
      expected_result:
        zh: 保留 PromptDefinition —is_a→ CapabilityDefinition，并按定义解释该方向。
        en: Retain PromptDefinition —is_a→ CapabilityDefinition and interpret that direction as defined.
        ja: PromptDefinition —is_a→ CapabilityDefinition を保持し定義どおり解釈します。
      why_valid_or_invalid:
        zh: 场景同时满足来源身份、目标身份和本关系要求的业务条件。
        en: The case satisfies the source identity, target identity, and the business condition required by this relation.
        ja: case は source identity、target identity、relation が要求する business condition を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-prompt-definition-007
    - id: PromptDefinition-is_a-CapabilityDefinition-example-boundary-manual-001
      kind: boundary
      labels:
        zh: PromptDefinition-is_a-CapabilityDefinition 边界例
        en: PromptDefinition-is_a-CapabilityDefinition boundary case
        ja: PromptDefinition-is_a-CapabilityDefinition 境界例
      scenario_id: null
      descriptions:
        zh: 已经填充变量的消息数组是实例化结果而非定义。
        en: A message array with filled variables is an instantiation result rather than a definition.
        ja: 変数展開済み message array は instantiation result で definition ではありません。
      field_values: {}
      related_node_ids:
        - PromptDefinition
        - CapabilityDefinition
      related_relation_ids:
        - PromptDefinition-is_a-CapabilityDefinition
      expected_result:
        zh: 不以该场景建立 PromptDefinition-is_a-CapabilityDefinition，并把对象保留在其正确身份中。
        en: Do not assert PromptDefinition-is_a-CapabilityDefinition for this case; retain each object under its correct identity.
        ja: この case では PromptDefinition-is_a-CapabilityDefinition を assertion せず各 object の正しい identity を保持します。
      why_valid_or_invalid:
        zh: 场景缺少本关系要求的决定性条件；相邻概念或时间接近不能补足该条件。
        en: The case lacks the relation's decisive condition; conceptual adjacency or temporal proximity cannot supply it.
        ja: case は relation の decisive condition を欠き、concept adjacency や temporal proximity では補えません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-prompt-definition-008
  source_claims:
    - claim-prompt-definition-009
  distinct_fact_rationale:
    zh: 该边表达一个不可由端点层级替代的独立业务事实。
    en: This edge expresses an independent business fact that endpoint hierarchy cannot replace.
    ja: この edge は endpoint hierarchy で代替できない独立 business fact を表します。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
