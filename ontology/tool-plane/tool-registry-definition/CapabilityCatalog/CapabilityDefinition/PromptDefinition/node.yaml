schema: moonweave.ai/ontology-node/v1
id: PromptDefinition
kind: concept
status: review
labels:
  zh: 提示定义
  en: Prompt Definition
  ja: プロンプト定義
semantics:
  short_definition:
    zh: 提示定义以名称、参数和消息模板声明一项可选择的提示能力。
    en: A Prompt Definition declares a selectable prompt capability by name, arguments, and message templates.
    ja: プロンプト定義は名称、引数、message template で選択可能な prompt 能力を宣言します。
  definition:
    zh: 提示定义是一种能力定义，复用上位 capability_definition_id；prompt_name 是服务器范围内的协议寻址名，参数合同与消息模板决定其提示种差。客户端通过 prompts/list 发现并经 prompts/get 实例化它；它不是工具，也没有执行 inputSchema 取得结果的调用语义。
    en: A Prompt Definition is a CapabilityDefinition that reuses the inherited capability_definition_id; prompt_name is its server-scoped protocol address, while the argument contract and message templates provide the prompt-specific differentia. Clients discover it through prompts/list and instantiate it through prompts/get; it is not a tool and has no inputSchema execution semantics.
    ja: プロンプト定義は継承した capability_definition_id を再利用し、prompt_name を server-scoped protocol address、argument contract と message template を prompt-specific differentia とする CapabilityDefinition です。prompts/list と prompts/get で利用され、tool や inputSchema 実行ではありません。
  why_needed:
    zh: 把提示放在能力定义层而不是工具规格下，既保留统一发现抽象，又防止提示模板被误读为可执行工具。
    en: Placing prompts under CapabilityDefinition rather than ToolSpecification preserves a shared discovery abstraction without misreading templates as executable tools.
    ja: prompt を CapabilityDefinition 配下に置き、共通発見抽象を保ちながら実行 tool との誤認を防ぎます。
  includes:
    - zh: 纳入具有稳定名称、可选参数和消息模板的可列举提示声明。
      en: Includes listable prompt declarations with a stable name, optional arguments, and message templates.
      ja: 安定名称、optional argument、message template を持つ listable prompt 宣言を含みます。
  excludes:
    - zh: 排除已经填充参数的消息结果、系统提示文本片段和可执行 ToolDefinition。
      en: Excludes instantiated message results, system-prompt text fragments, and executable ToolDefinitions.
      ja: 具体化済み message result、system prompt text fragment、実行可能 ToolDefinition を除きます。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: prompt_name
      labels:
        zh: 提示名称
        en: prompt name
        ja: プロンプト名
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 提示名称作为 PromptDefinition 节点内部信息保存，不建立同名图节点。
        en: prompt name is stored as information on the PromptDefinition node and does not create a namesake graph node.
        ja: プロンプト名は PromptDefinition node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: incident-triage
      source_claims:
        - claim-prompt-definition-002
    - id: arguments
      labels:
        zh: 提示参数
        en: prompt arguments
        ja: prompt 引数
      datatype: array
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 提示参数作为 PromptDefinition 节点内部信息保存，不建立同名图节点。
        en: prompt arguments is stored as information on the PromptDefinition node and does not create a namesake graph node.
        ja: prompt 引数は PromptDefinition node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value:
        - service
      source_claims:
        - claim-prompt-definition-003
    - id: message_templates
      labels:
        zh: 消息模板
        en: message templates
        ja: message template
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 消息模板作为 PromptDefinition 节点内部信息保存，不建立同名图节点。
        en: message templates is stored as information on the PromptDefinition node and does not create a namesake graph node.
        ja: message templateは PromptDefinition node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value:
        - system
        - user
      source_claims:
        - claim-prompt-definition-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: PromptDefinition-example-positive-manual-001
    kind: positive
    labels:
      zh: PromptDefinition 正例
      en: PromptDefinition positive case
      ja: PromptDefinition 正例
    scenario_id: null
    descriptions:
      zh: MCP 服务器列出 `incident-triage`，声明 `service` 参数和三条消息模板。
      en: An MCP server lists `incident-triage` with a `service` argument and three message templates.
      ja: MCP server が `incident-triage` と `service` argument、三 message template を列挙します。
    field_values:
      capability_definition_id: promptdef:incident-triage
      version: 1.0.0
      name: incident-triage
      prompt_name: incident-triage
      arguments:
        - name: service
          description: Service whose incident is being triaged.
          required: true
      message_templates:
        - role: system
          template: Triage the incident for service {{service}} using verified evidence only.
        - role: user
          template: Summarize impact and current symptoms for {{service}}.
        - role: assistant
          template: Return severity, evidence, owner, and next action.
    related_node_ids:
      - PromptDefinition
      - CapabilityDefinition
    related_relation_ids:
      - PromptDefinition-is_a-CapabilityDefinition
    expected_result:
      zh: 该声明归提示定义并继承能力定义。
      en: The declaration is a PromptDefinition under CapabilityDefinition.
      ja: 宣言を PromptDefinition とし CapabilityDefinition を継承します。
    why_valid_or_invalid:
      zh: 身份由可复用名称和模板合同决定，而非某次填充值。
      en: Its identity comes from a reusable name and template contract rather than one filled value.
      ja: 再利用名称と template 契約が identity を決めるためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-prompt-definition-005
  - id: PromptDefinition-example-boundary-manual-001
    kind: boundary
    labels:
      zh: PromptDefinition 边界例
      en: PromptDefinition boundary case
      ja: PromptDefinition 境界例
    scenario_id: null
    descriptions:
      zh: 客户端用 service=payments 调用 prompts/get 并得到三条具体消息。
      en: A client calls prompts/get with service=payments and receives three concrete messages.
      ja: client が service=payments で prompts/get を呼び三つの具体 message を得ます。
    field_values: {}
    related_node_ids:
      - PromptDefinition
      - CapabilityDefinition
    related_relation_ids:
      - PromptDefinition-is_a-CapabilityDefinition
    expected_result:
      zh: 消息结果属于提示实例化，不是新的提示定义。
      en: The messages are a prompt instantiation, not a new PromptDefinition.
      ja: message は prompt instantiation で新しい PromptDefinition ではありません。
    why_valid_or_invalid:
      zh: 实例身份依赖本次参数，定义身份不依赖。
      en: Instantiation identity depends on this request's arguments; definition identity does not.
      ja: instance identity は今回 argument に依存し definition identity は依存しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-prompt-definition-006
external_mappings: []
