schema: moonweave.ai/ontology-node/v1
id: PromptDefinition
kind: concept
labels:
  zh: MCP 提示词定义 profile
  en: MCP Prompt definition profile
  ja: MCP Prompt 定義 profile
semantics:
  short_definition:
    zh: 对 MCP Prompt 记录的本地对齐定义 profile。
    en: A local profile aligned to an MCP Prompt record.
    ja: MCP Prompt record に整合したローカル定義 profile。
  definition:
    zh: >
      PromptDefinition 是 Moonweave 中对 MCP Prompt 记录的本地 profile。MCP 的标准对象名是 Prompt：它有唯一 name，
      并可带 title、description、icons 与 arguments；客户端通过 prompts/list 发现它，并通过 prompts/get 取得填充
      arguments 后的消息。此兼容 ID 不是额外的 MCP wire type。
    en: >
      PromptDefinition is Moonweave's local profile aligned to an MCP Prompt record. The MCP
      standard object is named Prompt: it has a unique name and may carry title, description,
      icons, and arguments; clients discover it through prompts/list and retrieve messages with
      arguments through prompts/get. This compatibility ID is not an additional MCP wire type.
    ja: >
      PromptDefinition は MCP Prompt record に整合した Moonweave のローカル profile である。MCP の標準 object 名は
      Prompt であり、固有の name と title、description、icons、arguments を持ち得る。client は prompts/list で
      発見し、arguments を埋めた message を prompts/get で取得する。この compatibility ID は追加の MCP wire type ではない。
  why_needed:
    zh: 提示词模板的定义、发现和获取与工具调用不同，必须保持其用户控制和消息生成语义。
    en: Prompt-template definition, discovery, and retrieval differ from tool invocation and must retain user-controlled message-generation semantics.
    ja: prompt template の定義、discovery、retrieval は tool invocation と異なり、user-controlled message-generation semantics を保持する必要がある。
  includes:
    - zh: MCP Prompt 的 name、可选说明和可选 arguments 描述。
      en: MCP Prompt name, optional descriptive metadata, and optional argument descriptions.
      ja: MCP Prompt の name、任意の descriptive metadata、任意の argument description。
    - zh: prompts/list 发现与 prompts/get 检索之间的契约边界。
      en: The contract boundary between prompts/list discovery and prompts/get retrieval.
      ja: prompts/list discovery と prompts/get retrieval の contract boundary。
  excludes:
    - zh: 由 prompts/get 生成的具体 PromptMessage 内容。
      en: Concrete PromptMessage content generated by prompts/get.
      ja: prompts/get が生成する具体的な PromptMessage content。
    - zh: MCP Tool 的 inputSchema 或 OpenAI 函数工具 parameters。
      en: An MCP Tool inputSchema or OpenAI function-tool parameters.
      ja: MCP Tool inputSchema または OpenAI function-tool parameters。
  semantic_kind: protocol-aligned-profile
  aliases:
    - language: en
      value: MCP Prompt profile
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      服务器在初始化中声明 prompts capability 后，客户端可用 prompts/list 获取 Prompt 记录。对某个 Prompt 的
      prompts/get 请求携带 name 与可选 arguments，并返回 description 和 messages。Prompt 的 arguments 是模板定制
      描述，不是 Tool 的 JSON Schema 输入对象。
    en: >
      After a server declares prompts capability at initialization, a client can obtain Prompt
      records with prompts/list. A prompts/get request for one Prompt carries name and optional
      arguments and returns description and messages. Prompt arguments describe template
      customization; they are not a Tool JSON Schema input object.
    ja: >
      server が initialization で prompts capability を宣言した後、client は prompts/list で Prompt record を取得できる。
      一つの Prompt に対する prompts/get request は name と任意の arguments を持ち、description と messages を返す。
      Prompt arguments は template customization を記述し、Tool の JSON Schema input object ではない。
  typical_input:
    - description:
        zh: 获取代码审查提示词的 MCP 请求。
        en: An MCP request to retrieve a code-review prompt.
        ja: code-review prompt を取得する MCP request。
      format: |
        {"jsonrpc":"2.0","id":2,"method":"prompts/get","params":{"name":"code_review","arguments":{"code":"print('hi')"}}}
      source_claims: [mcp-prompt-get]
  typical_output:
    - description:
        zh: 一个包含 user 消息的 Prompt 结果。
        en: A Prompt result containing a user message.
        ja: user message を含む Prompt result。
      format: |
        {"description":"Code review prompt","messages":[{"role":"user","content":{"type":"text","text":"Review this code"}}]}
      source_claims: [mcp-prompt-get]
  reference_implementations:
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
      description: Defines Prompt records, prompts/list, prompts/get, and argument semantics.
structure:
  identity_keys: [capability_id, source_protocol, source_kind, definition_revision, name, source_server]
  fields:
    - id: name
      labels:
        zh: 提示词名称
        en: Prompt name
        ja: Prompt 名
      definitions:
        zh: MCP Prompt 的唯一标识符。
        en: The unique identifier of an MCP Prompt.
        ja: MCP Prompt の一意な識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: code_review
      allowed_values: []
      source_claims: [mcp-prompt-record]
    - id: title
      labels:
        zh: 显示标题
        en: Display title
        ja: 表示 title
      definitions:
        zh: 面向人类显示的可选 Prompt 名称。
        en: An optional human-readable name for displaying the Prompt.
        ja: Prompt を表示する任意の human-readable name。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: Request Code Review
      allowed_values: []
      source_claims: [mcp-prompt-record]
    - id: description
      labels:
        zh: 提示词说明
        en: Prompt description
        ja: Prompt 説明
      definitions:
        zh: 说明该 Prompt 用途的可选人类可读描述。
        en: An optional human-readable description of the Prompt's purpose.
        ja: Prompt の目的を説明する任意の human-readable description。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: Request a code review
      allowed_values: []
      source_claims: [mcp-prompt-record]
    - id: arguments
      labels:
        zh: 模板参数描述
        en: Template argument descriptions
        ja: template argument description
      definitions:
        zh: 用于定制 Prompt 的可选参数列表，每项可标记 required。
        en: An optional argument list for customizing the Prompt, where each argument may be marked required.
        ja: Prompt を customize する任意の argument list であり、各 argument は required と表示できる。
      datatype: array
      required: false
      cardinality:
        min: 0
        max: null
      pattern: null
      example_value: '[{"name":"code","required":true}]'
      allowed_values: []
      source_claims: [mcp-prompt-record]
    - id: source_server
      labels:
        zh: 来源服务器引用
        en: Source server reference
        ja: source server reference
      definitions:
        zh: 暴露该 MCP Prompt 的服务器引用。
        en: A reference to the server exposing the MCP Prompt.
        ja: MCP Prompt を expose する server への reference。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: mcp://review-server
      allowed_values: []
      source_claims: [mcp-prompt-record]
    - id: definition_revision
      labels:
        zh: 能力定义 profile 版本
        en: capability-definition profile version
        ja: capability-definition profile version
      definitions:
        zh: 标识此不可变本地 能力定义 profile 版本；变更必须创建新版本，不得就地修改。
        en: Identifies this immutable local capability-definition profile version; a change must create a new version rather than mutate it in place.
        ja: この不変ローカル capability-definition profile version を識別する。変更は in-place で mutate せず新 version を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "1"
      allowed_values: []
      source_claims: [moonweave-prompt-definition-taxonomy]
    - id: catalog_revision_ref
      labels:
        zh: 能力目录修订引用
        en: capability catalog revision reference
        ja: capability catalog revision reference
      definitions:
        zh: 标识拥有此 能力定义 profile 版本 的不可变 能力目录修订；该组成部分在父修订外无效，删除父修订只删除本地 profile，不删除 MCP、OpenAI 或应用配置来源记录。
        en: Identifies the immutable capability catalog revision that owns this capability-definition profile version; the component is invalid outside that parent revision, and deleting the parent revision deletes only local profiles, not MCP, OpenAI, or application-configuration source records.
        ja: この capability-definition profile version を所有する不変 capability catalog revision を識別する。component は parent revision 外では無効で、parent revision を削除してもローカル profile だけが削除され、MCP、OpenAI、application-configuration の source record は削除されない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: capabilitycatalog@1
      allowed_values: []
      source_claims: [moonweave-prompt-definition-taxonomy]
    - id: capability_id
      labels:
        zh: 能力标识符
        en: Capability identifier
        ja: 能力識別子
      definitions:
        zh: 在其来源范围内定位记录的名称或标识符。
        en: The name or identifier that locates the record within its source scope.
        ja: source scope 内で記録を特定する名前または識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: code_review
      allowed_values: []
      source_claims: [moonweave-prompt-definition-taxonomy]
    - id: source_protocol
      labels:
        zh: 来源协议
        en: Source protocol
        ja: source protocol
      definitions:
        zh: 指示该记录来自 MCP、OpenAI 应用配置或其他明确来源。
        en: Indicates whether the record comes from MCP, an OpenAI application configuration, or another declared source.
        ja: 記録が MCP、OpenAI application configuration、または別の明示された source のどれから来るかを示す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: MCP
      allowed_values: [MCP, OpenAI]
      source_claims: [moonweave-prompt-definition-taxonomy]
    - id: source_kind
      labels:
        zh: 来源记录类型
        en: Source record kind
        ja: source record kind
      definitions:
        zh: 记录来源的标准术语，如 Tool、Prompt、Resource、ResourceTemplate 或 function。
        en: The source's standard term, such as Tool, Prompt, Resource, ResourceTemplate, or function.
        ja: Tool、Prompt、Resource、ResourceTemplate、function など source の標準用語。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Prompt
      allowed_values: [Tool, Prompt, Resource, ResourceTemplate, function]
      source_claims: [moonweave-prompt-definition-taxonomy]
    - id: contract_summary
      labels:
        zh: 契约摘要
        en: Contract summary
        ja: 契約要約
      definitions:
        zh: 指向来源定义字段的不可替代摘要，而不是重写后的协议 payload。
        en: A non-substituting summary pointing to source definition fields, not a rewritten protocol payload.
        ja: source definition field を指す、置換しない要約であり、書き換えた protocol payload ではない。
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: '{"input_field":"arguments","source_uri":"mcp://server/prompts/code_review"}'
      allowed_values: []
      source_claims: [moonweave-prompt-definition-taxonomy]
  constraints:
    - id: prompt-arguments-are-not-tool-schema
      severity: error
      expression_language: plain
      expression: Prompt arguments describe prompts/get customization and must not be represented as an MCP Tool inputSchema or OpenAI function parameters.
      explanation:
        zh: Prompt 和 Tool 都可由模型使用，但其记录和调用契约不同。
        en: Prompts and Tools may both be used with models, but their records and call contracts differ.
        ja: Prompt と Tool はどちらも model と使えるが、record と call contract は異なる。
      source_claims: [mcp-prompt-record, mcp-prompt-get]
    - id: prompt-definition-inherits-parent-required-fields
      severity: error
      expression_language: plain
      expression: "All inherited required CapabilityDefinition fields are fields of this same record; the is_a subtype does not establish or reference a second CapabilityDefinition record."
      explanation: {zh: "所有继承的 CapabilityDefinition 必需字段属于同一记录，该 is_a 子类型不建立或引用第二条 CapabilityDefinition 记录。", en: "Inherited required fields stay on the same record rather than creating a second parent record.", ja: "継承された必須 CapabilityDefinition フィールドは同じレコードに属し、この is_a 下位型は 2 番目の親レコードを作成または参照しない。"}
      source_claims: [moonweave-prompt-definition-taxonomy]
  required_relations: []
examples:
  - id: prompt-definition-positive-code-review

    labels:
      zh: 代码审查 Prompt
      en: Code-review Prompt
      ja: code-review Prompt

    descriptions:
      zh: Semantic Kernel PromptTemplate 与 kernel.invoke(function_name,args)；LangChain PromptTemplate.format()；MCP prompts/get name=code_review arguments={code:"..."}。
      en: Semantic Kernel PromptTemplate and kernel.invoke(function_name,args); LangChain PromptTemplate.format(); MCP prompts/get name=code_review arguments={code:"..."}.
      ja: Semantic Kernel PromptTemplate。LangChain PromptTemplate.format()。MCP prompts/get name=code_review。
    field_values:
      name: code_review
      capability_id: code_review
      source_protocol: MCP
      source_kind: Prompt
      definition_revision: "1"
      arguments: '[{"name":"code","required":true}]'
    related_node_ids: [PromptDefinition]
    related_relation_ids: [PromptDefinition-is_a-CapabilityDefinition]

    source_claims: [mcp-prompt-record]
  - id: prompt-definition-counterexample-tool-schema

    labels:
      zh: 将 Prompt 参数当作工具 schema
      en: Prompt arguments treated as Tool schema
      ja: Prompt arguments を Tool schema と扱う例

    descriptions:
      zh: 反例：MCP resources/read uri 未订阅就假定内容可用；Semantic Kernel prompt 参数未验证即实例化。
      en: Counterexample: assuming MCP resources/read uri content without subscription; Semantic Kernel prompt instantiated without argument validation.
      ja: 反例：MCP resources/read uri 未購読で内容可用を仮定。Semantic Kernel prompt 引数未検証でインスタンス化。
    field_values:
      name: code_review
    related_node_ids: [PromptDefinition, ToolDefinition]
    related_relation_ids: [PromptDefinition-is_a-CapabilityDefinition]

    source_claims: [mcp-prompt-record, mcp-prompt-get]
  - id: prompt-definition-boundary-definition-and-message

    labels:
      zh: Prompt 定义与消息结果边界
      en: Boundary between Prompt definition and message result
      ja: Prompt definition と message result の境界

    descriptions:
      zh: MCP Prompt/Resource 能力 vs LangChain PromptTemplate vs Semantic Kernel 模板函数的声明-实例化边界。
      en: Declaration-instantiation boundary among MCP Prompt/Resource capability, LangChain PromptTemplate, Semantic Kernel template functions.
      ja: MCP Prompt/Resource、LangChain PromptTemplate、Semantic Kernel テンプレート関数の宣言-インスタンス化境界。
    field_values:
      name: code_review
    related_node_ids: [PromptDefinition]
    related_relation_ids: [PromptDefinition-is_a-CapabilityDefinition]

    source_claims: [mcp-prompt-get]
  - id: prompt-definition-instance-review-server

    labels:
      zh: 审查服务器 Prompt 实例
      en: Review-server Prompt instance
      ja: review-server Prompt instance

    descriptions:
      zh: MCP 实例：prompts/get name=summarize arguments={text:"long article..."} 返回 messages；resources/read uri=file:///data/config.json。
      en: MCP instance: prompts/get name=summarize arguments={text:"long article..."} returns messages; resources/read uri=file:///data/config.json.
      ja: MCP 実例：prompts/get name=summarize。resources/read uri=file:///data/config.json。
    field_values:
      name: code_review
      source_server: mcp://review-server
      capability_id: code_review
      source_protocol: MCP
      source_kind: Prompt
      definition_revision: "1"
    related_node_ids: [PromptDefinition]
    related_relation_ids: [PromptDefinition-is_a-CapabilityDefinition]

    source_claims: [mcp-prompt-record]
parent_relation:
  id: PromptDefinition-is_a-CapabilityDefinition
  predicate: is_a
  target: concept:CapabilityDefinition
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是能力定义 profile 的一种
    en: is a kind of capability definition profile
    ja: 能力定義 profile の一種である
  definition:
    zh: PromptDefinition 是专门保留 MCP Prompt 记录语义的本地能力定义 profile。
    en: PromptDefinition is a local capability definition profile specialized to preserve MCP Prompt record semantics.
    ja: PromptDefinition は MCP Prompt record semantics を保持するよう特化したローカル capability definition profile である。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 具有子类型
      en: has subtype
      ja: subtype を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: This is Moonweave taxonomy for a compatibility profile, not an MCP inheritance relation.
  constraints:
    - id: prompt-profile-taxonomy-is-local
      severity: error
      expression_language: plain
      expression: The subtype edge organizes a local compatibility profile and must not claim MCP defines CapabilityDefinition as a parent wire type.
      explanation:
        zh: MCP 定义 Prompt 记录，不定义该本地总类。
        en: MCP defines a Prompt record and does not define this local umbrella parent.
        ja: MCP は Prompt record を定義し、このローカル umbrella parent を定義しない。
      source_claims: [moonweave-prompt-definition-taxonomy]
  examples: []
  source_claims: [moonweave-prompt-definition-taxonomy]
  distinct_fact_rationale:
    zh: 该边只组织本地兼容 profile，不能改变 Prompt 的标准名称。
    en: This edge organizes a local compatibility profile and cannot change the standard name Prompt.
    ja: この edge はローカル compatibility profile を整理し、標準名 Prompt を変更できない。
relations: []
sources:
  - id: mcp-prompts-2025-11-25
    title: Model Context Protocol Specification — Prompts
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
    version: 2025-11-25
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Defines MCP Prompt records, discovery, and retrieval.
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: design-inference
    relevance: Defines this local compatibility profile and taxonomy edge.
source_claims:
  - id: mcp-prompt-record
    source: mcp-prompts-2025-11-25
    supports: An MCP Prompt has a unique name and optional title, description, icons, and argument list.
    locator: "Prompt"
    evidence_kind: normative
    confidence: high
  - id: mcp-prompt-get
    source: mcp-prompts-2025-11-25
    supports: Clients retrieve a named Prompt with prompts/get, optionally supply arguments, and receive description and messages.
    locator: "Getting a Prompt"
    evidence_kind: normative
    confidence: high
  - id: moonweave-prompt-definition-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave classifies PromptDefinition under CapabilityDefinition as a local compatibility taxonomy edge.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
