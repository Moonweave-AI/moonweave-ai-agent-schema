source_claims:
  - id: claim-prompt-definition-001
    source: eng-proto-mcp-prompts-2025-06-18
    supports: MCP 2025-11-25 defines Prompt with name, optional title, description, icons, and arguments in prompts/list, and returns concrete messages only from prompts/get. Moonweave uses this evidence to delimit PromptDefinition from its reviewed neighbors.
    locator: MCP Prompts > Data Types > Prompt; Listing Prompts; Getting a Prompt
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-prompt-definition-002
    source: eng-proto-mcp-prompts-2025-06-18
    supports: MCP 2025-11-25 defines Prompt.name as the server-scoped protocol address in prompts/list and prompts/get.
    locator: Server Features > Prompts > Protocol Messages > Listing Prompts; Data Types > Prompt
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-prompt-definition-003
    source: eng-proto-mcp-prompts-2025-06-18
    supports: MCP 2025-11-25 Prompt.arguments declares optional customization parameters in prompts/list.
    locator: Server Features > Prompts > Protocol Messages > Listing Prompts; Data Types > Prompt
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-prompt-definition-004
    source: eng-proto-mcp-prompts-2025-06-18
    supports: MCP 2025-11-25 Prompt data type includes optional title, description, and icons alongside required name and optional arguments. This claim applies to PromptDefinition display metadata fields.
    locator: MCP Prompts > Data Types > Prompt
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-prompt-definition-005
    source: eng-proto-mcp-prompts-2025-06-18
    supports: MCP 2025-11-25 prompts/list exposes discoverable Prompt metadata without messages; the positive case instantiates that boundary.
    locator: Server Features > Prompts > Protocol Messages > Listing Prompts; Data Types > Prompt
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-prompt-definition-006
    source: eng-proto-mcp-prompts-2025-06-18
    supports: MCP 2025-11-25 prompts/get returns concrete messages and therefore cannot be classified as PromptDefinition; the boundary case instantiates that distinction.
    locator: Server Features > Prompts > Protocol Messages > Listing Prompts; Data Types > Prompt
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-prompt-definition-007
    source: eng-proto-mcp-prompts-2025-06-18
    supports: MCP Prompts defines discoverable named prompt declarations separately from prompts/get results, supporting PromptDefinition under CapabilityDefinition. This evidence is applied to the positive case for PromptDefinition-is_a-CapabilityDefinition.
    locator: Server Features > Prompts > Protocol Messages > Listing Prompts; Data Types > Prompt
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-prompt-definition-008
    source: eng-proto-mcp-prompts-2025-06-18
    supports: MCP Prompts defines discoverable named prompt declarations separately from prompts/get results, supporting PromptDefinition under CapabilityDefinition. This evidence is applied to the boundary case for PromptDefinition-is_a-CapabilityDefinition.
    locator: Server Features > Prompts > Protocol Messages > Listing Prompts; Data Types > Prompt
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-prompt-definition-009
    source: eng-proto-mcp-prompts-2025-06-18
