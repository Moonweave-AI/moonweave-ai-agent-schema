schema: moonweave.ai/ontology-node/v1
id: RegistryEntry
kind: concept
labels:
  zh: 注册条目 profile
  en: Registration entry profile
  ja: 登録 entry profile
semantics:
  short_definition:
    zh: 指向一个本地工具引用及其审计信息的 Moonweave 条目 profile。
    en: A Moonweave entry profile pointing to one local tool reference and its audit information.
    ja: 一つのローカル tool reference とその audit information を指す Moonweave entry profile。
  definition:
    zh: >
      RegistryEntry 是 ToolRegistry 的一个不可变本地条目版本，连接一个工具定义引用、其来源快照和本地治理
      状态。它只能存在于标识的本地注册器修订中；删除该注册器修订会删除这份 profile 记录，但不会删除来源协议记录。它可引用由 MCP tools/list 发现的 Tool 或应用配置的函数工具，但它不是 MCP Tool 的字段，也不是
      tools/list 返回的标准记录。
    en: >
      RegistryEntry is an immutable local entry version in ToolRegistry that connects one tool-definition
      reference, its provenance snapshot, and local governance state. It exists only in its identified local registry revision; deleting that registry revision deletes this profile record, not the source protocol record. It may reference an MCP Tool
      discovered through tools/list or an application-configured function tool, but it is neither a
      field of an MCP Tool nor a standard record returned by tools/list.
    ja: >
      RegistryEntry は ToolRegistry 内で一つの tool-definition reference、その provenance snapshot、ローカル
      governance state を結ぶ不変のローカル entry version である。識別したローカル registry revision 内でのみ存在し、その revision を削除しても source protocol record は削除しない。tools/list で発見した MCP Tool または application-
      configured function tool を参照できるが、MCP Tool の field でも tools/list が返す標準 record でもない。
  why_needed:
    zh: 本地治理需要将“发现到什么”与“何时为何采用该引用”分开保留。
    en: Local governance needs to retain separately what was discovered and when and why the reference was adopted.
    ja: ローカル governance には、何が発見されたかと、その参照がいつなぜ採用されたかを分けて保持する必要がある。
  includes:
    - zh: 本地条目标识、工具定义引用和来源快照。
      en: A local entry identifier, a tool-definition reference, and a provenance snapshot.
      ja: ローカル entry identifier、tool-definition reference、provenance snapshot。
    - zh: 本地使用状态和审计时间戳。
      en: Local use state and audit timestamps.
      ja: ローカル use state と audit timestamp。
  excludes:
    - zh: MCP Tool 的 inputSchema、outputSchema 或 annotations 本体。
      en: The inputSchema, outputSchema, or annotations object of an MCP Tool itself.
      ja: MCP Tool 自体の inputSchema、outputSchema、annotations object。
    - zh: MCP 规范定义的登记条目或注册表消息。
      en: A registry entry or registration message defined by the MCP specification.
      ja: MCP specification が定義する registry entry または registration message。
  semantic_kind: entity
  aliases:
    - language: en
      value: local tool registration entry
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      条目以 source_ref 指向取得时的协议记录，并记录 local_state 例如 observed、approved 或 retired。每次状态改变都生成一个带 entry_version 的新不可变条目版本；旧版本保留审计。该状态只描述
      本地治理，不能被序列化为 MCP Tool 字段，也不能据此改变服务器的 tools/list 结果。
    en: >
      An entry points to the observed protocol record with source_ref and records a local_state such
      as observed, approved, or retired. Each state change generates a new immutable entry version
      carrying entry_version while prior versions remain for audit. The state describes local governance only; it cannot be
      serialized as an MCP Tool field or alter a server's tools/list result.
    ja: >
      entry は source_ref で観測した protocol record を指し、observed、approved、retired などの local_state を記録する。
      state change ごとに entry_version を持つ新しい不変 entry version を生成し、以前の version を audit のため保持する。
      この state はローカル governance だけを表し、MCP Tool field として serialize したり server の tools/list result を
      変更したりできない。
  typical_input:
    - description:
        zh: 取得的 MCP Tool 记录和服务器来源。
        en: An observed MCP Tool record and server provenance.
        ja: 観測した MCP Tool record と server provenance。
      format: |
        {"source_ref":"mcp://files/tools/read_file","tool":{"name":"read_file","inputSchema":{"type":"object"}}}
      source_claims: [mcp-tool-record-for-entry]
  typical_output:
    - description:
        zh: 本地注册条目。
        en: A local registration entry.
        ja: ローカル registration entry。
      format: |
        {"entry_id":"files-read-file","tool_definition_ref":"read_file","local_state":"observed"}
      source_claims: [moonweave-registry-entry-profile]
  reference_implementations:
    - name: MCP Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines Tool records that a local entry may reference.
structure:
  identity_keys: [entry_id, entry_version]
  fields:
    - id: entry_id
      labels:
        zh: 条目标识符
        en: Entry identifier
        ja: entry 識別子
      definitions:
        zh: 标识本地条目系列；与 entry_version 一起唯一标识一个不可变条目版本。
        en: Identifies a local entry series and, with entry_version, uniquely identifies one immutable entry version.
        ja: ローカル entry series を識別し、entry_version とともに一つの不変 entry version を一意に識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: files-read-file
      allowed_values: []
      source_claims: [moonweave-registry-entry-profile]
    - id: entry_version
      labels:
        zh: 条目版本
        en: Entry version
        ja: entry version
      definitions:
        zh: 标识此条目系列的不可变本地版本；本地状态或证据变化必须创建新版本而不是修改此版本。
        en: Identifies this immutable local version in the entry series; a local-state or evidence change must create a new version rather than mutate this one.
        ja: entry series 内のこの不変ローカル version を識別する。local-state または evidence の変更はこの version を mutate せず新 version を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "1"
      allowed_values: []
      source_claims: [moonweave-registry-entry-profile]
    - id: registry_revision_ref
      labels:
        zh: 注册器修订引用
        en: Registry revision reference
        ja: registry revision reference
      definitions:
        zh: 标识拥有该条目版本的不可变本地 ToolRegistry 修订；条目离开该修订即无效，删除该修订会删除条目 profile 而非来源协议记录。
        en: Identifies the immutable local ToolRegistry revision that owns this entry version; the entry is invalid outside that revision, and deleting the revision deletes the entry profile rather than its source protocol record.
        ja: この entry version を所有する不変ローカル ToolRegistry revision を識別する。entry はその revision 外では無効で、revision の削除は source protocol record ではなく entry profile を削除する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: registry:tools-default@42
      allowed_values: []
      source_claims: [moonweave-registry-entry-profile, moonweave-registry-entry-taxonomy]
    - id: tool_definition_ref
      labels:
        zh: 工具定义引用
        en: Tool-definition reference
        ja: tool-definition reference
      definitions:
        zh: 指向本地 ToolDefinition profile 或保持协议来源的工具引用。
        en: Points to a local ToolDefinition profile or a provenance-bearing tool reference.
        ja: ローカル ToolDefinition profile または provenance を保持する tool reference を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: read_file
      allowed_values: []
      source_claims: [moonweave-registry-entry-profile]
    - id: source_ref
      labels:
        zh: 来源记录引用
        en: Source-record reference
        ja: source-record reference
      definitions:
        zh: 用于追溯协议记录或应用配置出处的不可变引用。
        en: An immutable reference used to trace the protocol record or application-configuration origin.
        ja: protocol record または application-configuration origin を追跡する不変 reference。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: mcp://files/tools/read_file
      allowed_values: []
      source_claims: [moonweave-registry-entry-profile]
    - id: local_state
      labels:
        zh: 本地治理状态
        en: Local governance state
        ja: ローカル governance state
      definitions:
        zh: 本地登记流程的状态，不是来源协议字段。
        en: A state of the local registration process, not a source-protocol field.
        ja: ローカル registration process の state であり、source-protocol field ではない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: observed
      allowed_values: [observed, approved, retired]
      source_claims: [moonweave-registry-entry-profile]
    - id: recorded_at
      labels:
        zh: 记录时间
        en: Recorded time
        ja: 記録時刻
      definitions:
        zh: 该不可变条目版本被本地活动生成的时间；确认或状态改变必须生成新版本。
        en: The time this immutable entry version was generated by a local activity; confirmation or state change must generate a new version.
        ja: この不変 entry version がローカル activity により生成された時刻。confirmation または state change は新 version を生成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ISO-8601-date-time
      example_value: "2026-07-18T00:00:00Z"
      allowed_values: []
      source_claims: [moonweave-registry-entry-profile]
  constraints:
    - id: entry-provenance-required
      severity: error
      expression_language: plain
      expression: Every RegistryEntry must retain source_ref, registry_revision_ref, and entry_version, be generated by a RegistryActivity, and state that local_state is not a protocol field or a mutable in-place lifecycle field.
      explanation:
        zh: 无来源的本地状态不可审计，也不能被误投影为 MCP Tool 属性。
        en: A local state without provenance or a parent registry revision is not auditable and cannot be projected as an MCP Tool property or mutated in place.
        ja: provenance または parent registry revision のないローカル state は監査できず、MCP Tool property として project したり in-place で mutation したりできない。
      source_claims: [moonweave-registry-entry-profile]
  required_relations: [RegistryEntry-part_of-ToolRegistry, RegistryEntry-was_generated_by-RegistryActivity]
examples:
  - id: registry-entry-positive-observed-tool

    labels:
      zh: 已观察工具条目
      en: Observed tool entry
      ja: 観測済み tool entry

    descriptions:
      zh: Gorilla APIBench 1645 API 注册（HuggingFace/TorchHub/TensorHub）；ToolBench 16000+ RapidAPI 工具注册表；Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") 插件注册。
      en: Gorilla APIBench registers 1645 APIs (HuggingFace/TorchHub/TensorHub); ToolBench 16000+ RapidAPI tool registry; Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") plugin registration.
      ja: Gorilla APIBench が 1645 API を登録。ToolBench 16000+ RapidAPI tool registry。Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") プラグイン登録。
    field_values:
      entry_version: "1"
      registry_revision_ref: registry:tools-default@42
      entry_id: files-read-file
      local_state: observed
    related_node_ids: [RegistryEntry, ToolDefinition]
    related_relation_ids: [RegistryEntry-part_of-ToolRegistry, RegistryEntry-was_generated_by-RegistryActivity]

    source_claims: [moonweave-registry-entry-profile]
  - id: registry-entry-counterexample-state-as-mcp-field

    labels:
      zh: 本地状态冒充 MCP 字段
      en: Local state posed as MCP field
      ja: ローカル state を MCP field と偽装する例

    descriptions:
      zh: 反例：ToolBench 注册未验证 RapidAPI key 的 endpoint；Gorilla registry 混入 hallucinated API 无 retriever 校验；Semantic Kernel plugin 名冲突未检测。
      en: Counterexample: ToolBench registers RapidAPI endpoint without key verification; Gorilla registry includes hallucinated API without retriever validation; Semantic Kernel plugin name collision undetected.
      ja: 反例：ToolBench が RapidAPI key 未検証 endpoint を登録。Gorilla registry に retriever 未検証 hallucinated API 混入。
    field_values:
      entry_version: "1"
      registry_revision_ref: registry:tools-default@42
      local_state: approved
    related_node_ids: [RegistryEntry]
    related_relation_ids: [RegistryEntry-part_of-ToolRegistry, RegistryEntry-was_generated_by-RegistryActivity]

    source_claims: [mcp-tool-record-for-entry, moonweave-registry-entry-profile]
  - id: registry-entry-boundary-entry-and-tool

    labels:
      zh: 条目与工具记录的边界
      en: Boundary between entry and Tool record
      ja: entry と Tool record の境界

    descriptions:
      zh: Gorilla 离线 APIBench 索引 vs ToolBench 在线 RapidAPI catalog vs Semantic Kernel 本地 plugin 注册的持久化边界。
      en: Persistence boundary among Gorilla offline APIBench index, ToolBench online RapidAPI catalog, Semantic Kernel local plugin registration.
      ja: Gorilla offline APIBench index、ToolBench online RapidAPI catalog、Semantic Kernel ローカル plugin 登録の永続化境界。
    field_values:
      entry_version: "1"
      registry_revision_ref: registry:tools-default@42
      tool_definition_ref: read_file
    related_node_ids: [RegistryEntry, ToolDefinition]
    related_relation_ids: [RegistryEntry-part_of-ToolRegistry, RegistryEntry-was_generated_by-RegistryActivity]

    source_claims: [mcp-tool-record-for-entry, moonweave-registry-entry-profile]
  - id: registry-entry-instance-openai-function

    labels:
      zh: OpenAI 函数工具条目实例
      en: OpenAI function-tool entry instance
      ja: OpenAI function-tool entry instance

    descriptions:
      zh: "ToolBench registry 实例：tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}；Semantic Kernel WeatherPlugin.get_weather(city:str) 注册实例。"
      en: "ToolBench registry instance: tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}; Semantic Kernel WeatherPlugin.get_weather(city:str) registration instance."
      ja: ToolBench registry 実例：tool_id=rapidapi-weather-api endpoint=/forecast。Semantic Kernel WeatherPlugin.get_weather(city:str) 登録実例。
    field_values:
      entry_version: "1"
      registry_revision_ref: registry:tools-default@42
      entry_id: support-get-customer
      local_state: approved
    related_node_ids: [RegistryEntry, FunctionTool]
    related_relation_ids: [RegistryEntry-part_of-ToolRegistry, RegistryEntry-was_generated_by-RegistryActivity]

    source_claims: [moonweave-registry-entry-profile]
parent_relation:
  id: RegistryEntry-part_of-ToolRegistry
  predicate: part_of
  target: concept:ToolRegistry
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是注册器修订的不可变组成条目
    en: is an immutable entry component of registry revision
    ja: registry revision の不変 entry component である
  definition:
    zh: RegistryEntry 只作为一个标识的 ToolRegistry 修订中的本地条目版本存在；父修订拥有其 profile 副本和删除边界，来源协议记录不在该边界内。
    en: RegistryEntry exists only as a local entry version in one identified ToolRegistry revision; the parent revision owns its profile copy and deletion boundary, while the source protocol record remains outside that boundary.
    ja: RegistryEntry は一つの識別済み ToolRegistry revision 内のローカル entry version としてのみ存在する。parent revision は profile copy と deletion boundary を所有し、source protocol record はその boundary 外に残る。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_part
    labels:
      zh: 包含不可变条目版本
      en: has immutable entry version
      ja: immutable entry version を持つ
  conditions: []
  temporal_scope: versioned
  boundary_context: This strict local composition applies only to the immutable registry profile copy. It is not a field relation inside an MCP Tool record and never cascades to a source protocol record.
  constraints:
    - id: registry-entry-strict-versioned-composition
      severity: error
      expression_language: plain
      expression: RegistryEntry must carry registry_revision_ref, may not outlive or be independently deleted from that owning revision, and must not imply deletion of its source ToolDefinition or protocol record.
      explanation:
        zh: 条目版本是本地注册器快照的严格组成部分；它可以被父修订删除，但不能孤立地拥有可变生命周期，也不能删除来源记录。
        en: An entry version is a strict component of a local registry snapshot; its parent revision may delete it, but it has no orphan mutable lifecycle and cannot delete the source record.
        ja: entry version はローカル registry snapshot の strict component である。parent revision はこれを削除できるが、orphan mutable lifecycle を持たず source record を削除できない。
      source_claims: [moonweave-registry-entry-taxonomy]
  examples: []
  source_claims: [moonweave-registry-entry-taxonomy]
  distinct_fact_rationale:
    zh: 此关系表达本地版本快照的所有权和删除边界；来源工具记录的出处仍由其协议拥有。
    en: This relation expresses ownership and deletion boundary of a local version snapshot; the source tool record's provenance remains owned by its protocol.
    ja: この relation はローカル version snapshot の ownership と deletion boundary を表す。source tool record の provenance はその protocol が所有し続ける。
relations:
  - id: RegistryEntry-was_generated_by-RegistryActivity
    predicate: was_generated_by
    target: concept:RegistryActivity
    endpoint_order: entry-to-activity
    direction: source-to-target
    relation_kind: provenance
    labels:
      zh: 由注册治理活动生成
      en: was generated by registry-governance activity
      ja: registry-governance activity により生成された
    definition:
      zh: 每个 RegistryEntry 不可变版本都由一个本地 RegistryActivity 生成；登记和注销通过生成新版本记录采用或停用，而不就地修改既有条目。
      en: Each immutable RegistryEntry version is generated by one local RegistryActivity; registration and deregistration record adoption or retirement by generating a new version rather than mutating an existing entry in place.
      ja: 各不変 RegistryEntry version は一つのローカル RegistryActivity により生成される。registration と deregistration は既存 entry を in place で mutate せず、新 version を生成して adoption または retirement を記録する。
    cardinality:
      source:
        min: 1
        max: 1
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: generates
      labels:
        zh: 生成注册条目版本
        en: generates registration entry version
        ja: registration entry version を生成する
    conditions:
      - id: registry-entry-generation-evidence
        severity: error
        expression_language: plain
        expression: Assert only when the target RegistryActivity identifies the same entry_id and records evidence for the creation of this immutable entry_version.
        explanation:
          zh: 仅有来源快照而没有本地治理活动证据时，不能把条目版本称为已生成。
          en: A source snapshot alone, without evidence of a local governance activity, does not establish that an entry version was generated.
          ja: ローカル governance activity の evidence なしに source snapshot だけがあっても、entry version が生成されたとは確立しない。
        source_claims: [prov-entity-generated-by-activity, moonweave-registry-entry-profile]
    temporal_scope: event
    boundary_context: This PROV-style generation link records an Entity produced by a governance Activity and does not make that Activity a component of the ToolRegistry.
    constraints: []
    examples: []
    source_claims: [prov-entity-generated-by-activity, moonweave-registry-entry-profile]
    distinct_fact_rationale:
      zh: 活动生成一份新的条目实体；实体与活动的出处不同于条目属于注册器修订的组成事实。
      en: An activity generates a new entry Entity; Entity–Activity provenance is distinct from the fact that the entry belongs to a registry revision.
      ja: activity は新しい entry Entity を生成する。Entity–Activity provenance は entry が registry revision に属する composition fact とは別である。
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification — Tools
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    version: 2025-11-25
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Defines the Tool record that an entry may reference.
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    publisher: World Wide Web Consortium (W3C)
    url: https://www.w3.org/TR/prov-o/
    version: W3C Recommendation 30 April 2013
    accessed_on: 2026-07-19
    source_type: standard
    relevance: Defines Entity, Activity, and prov:wasGeneratedBy used for immutable registry-entry provenance.
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: design-inference
    relevance: Defines immutable local RegistryEntry version semantics, containment, and provenance.
source_claims:
  - id: prov-entity-generated-by-activity
    source: prov-o-core
    supports: PROV-O distinguishes Entity from Activity and defines prov:wasGeneratedBy for an Entity generated by an Activity.
    locator: "PROV-O: prov:Entity, prov:Activity, prov:wasGeneratedBy"
    evidence_kind: normative
    confidence: high
  - id: mcp-tool-record-for-entry
    source: mcp-tools-2025-11-25
    supports: An MCP Tool record is identified by name and includes an inputSchema plus optional metadata and output schema fields.
    locator: "Tool"
    evidence_kind: normative
    confidence: high
  - id: moonweave-registry-entry-profile
    source: moonweave-ontology-design
    supports: RegistryEntry is an immutable Moonweave local entry version that associates a tool reference, provenance, local state, parent registry revision, and generating governance activity.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
  - id: moonweave-registry-entry-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave treats RegistryEntry as a strict immutable component of a specific ToolRegistry revision; an orphaned entry version is invalid and source protocol records remain outside the deletion boundary.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high