sibling_differentiation: []
parent_relation:
  id: ToolRegistry-contains-RegistryEntry
  predicate: contains
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: contains
    en: contains
    ja: contains
  definitions:
    zh: 工具注册表通过 contains 把注册条目纳入其持久成员集合；条目的环境与成员身份仍独立于注册表本身。
    en: ToolRegistry contains RegistryEntry as persistent catalog membership while each entry retains its own environment and membership identity.
    ja: ToolRegistry は contains で RegistryEntry を永続 member とし、各 entry の environment と membership identity を保持します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 基数取决于具体注册表与版本策略。
    en: Cardinality depends on the concrete registry and version policy.
    ja: cardinality は具体 registry と version policy に依存します。
  inverse_reading:
    predicate: inverse_contains
    labels:
      zh: 反向：contains
      en: inverse of contains
      ja: 逆：contains
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ToolRegistry-contains-RegistryEntry-example-positive-manual-001
      kind: positive
      labels:
        zh: ToolRegistry-contains-RegistryEntry 正例
        en: ToolRegistry-contains-RegistryEntry positive case
        ja: ToolRegistry-contains-RegistryEntry 正例
      scenario_id: null
      descriptions:
        zh: 生产注册表包含 weather v3 条目和 CRM v5 条目。
        en: A production registry contains a weather v3 entry and a CRM v5 entry.
        ja: production registry が weather v3 entry と CRM v5 entry を含みます。
      field_values: {}
      related_node_ids:
        - ToolRegistry
        - RegistryEntry
      related_relation_ids:
        - ToolRegistry-contains-RegistryEntry
      expected_result:
        zh: 保留 ToolRegistry —contains→ RegistryEntry，并按定义解释该方向。
        en: Retain ToolRegistry —contains→ RegistryEntry and interpret that direction as defined.
        ja: ToolRegistry —contains→ RegistryEntry を保持し定義どおり解釈します。
      why_valid_or_invalid:
        zh: 场景同时满足来源身份、目标身份和本关系要求的业务条件。
        en: The case satisfies the source identity, target identity, and the business condition required by this relation.
        ja: case は source identity、target identity、relation が要求する business condition を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-registry-entry-017
    - id: ToolRegistry-contains-RegistryEntry-example-boundary-manual-001
      kind: boundary
      labels:
        zh: ToolRegistry-contains-RegistryEntry 边界例
        en: ToolRegistry-contains-RegistryEntry boundary case
        ja: ToolRegistry-contains-RegistryEntry 境界例
      scenario_id: null
      descriptions:
        zh: 注册表不能直接 contains ToolDefinition，因为同一定义可对应多个环境条目。
        en: A registry must not directly contain ToolDefinition because one definition may have entries in several environments.
        ja: registry は ToolDefinition を直接 contains しません。一 definition が複数 environment entry を持てるためです。
      field_values: {}
      related_node_ids:
        - ToolRegistry
        - RegistryEntry
      related_relation_ids:
        - ToolRegistry-contains-RegistryEntry
      expected_result:
        zh: 不以该场景建立 ToolRegistry-contains-RegistryEntry，并把对象保留在其正确身份中。
        en: Do not assert ToolRegistry-contains-RegistryEntry for this case; retain each object under its correct identity.
        ja: この case では ToolRegistry-contains-RegistryEntry を assertion せず各 object の正しい identity を保持します。
      why_valid_or_invalid:
        zh: 场景缺少本关系要求的决定性条件；相邻概念或时间接近不能补足该条件。
        en: The case lacks the relation's decisive condition; conceptual adjacency or temporal proximity cannot supply it.
        ja: case は relation の decisive condition を欠き、concept adjacency や temporal proximity では補えません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-registry-entry-018
  source_claims:
    - claim-registry-entry-019
  distinct_fact_rationale:
    zh: 该边表达一个不可由端点层级替代的独立业务事实。
    en: This edge expresses an independent business fact that endpoint hierarchy cannot replace.
    ja: この edge は endpoint hierarchy で代替できない独立 business fact を表します。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
