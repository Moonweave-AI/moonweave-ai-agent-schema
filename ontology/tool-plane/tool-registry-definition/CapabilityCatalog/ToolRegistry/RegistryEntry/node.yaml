schema: moonweave.ai/ontology-node/v1
id: RegistryEntry
kind: concept
status: accepted
labels:
  zh: 注册条目
  en: Registry Entry
  ja: 登録項目
semantics:
  short_definition:
    zh: 注册条目是目录中引用一个具体工具定义和提供端点的成员记录。
    en: A Registry Entry is a catalog member record referring to one concrete tool definition and provider endpoint.
    ja: 登録項目は一つの具体 tool definition と provider endpoint を参照する目録 member record です。
  definition:
    zh: 注册条目是一种信息记录，以条目标识、所属注册表和环境范围为身份；它引用具体 ToolDefinition 版本、提供方或端点并保存注册状态，但不复制完整 Schema，不是工具本体，也不是一次搜索匹配。
    en: A Registry Entry is an information record identified by entry ID, containing registry, and environment scope. It references a concrete ToolDefinition version and provider or endpoint and stores registration status without copying full schemas; it is neither the Tool nor one search match.
    ja: 登録項目は entry ID、所属 registry、environment scope で識別され、具体 ToolDefinition 版と provider endpoint、status を参照します。完全 schema、Tool 自体、search match ではありません。
  why_needed:
    zh: 独立条目身份允许同一工具定义在测试、生产或不同提供端点拥有不同成员生命周期。
    en: Independent entry identity lets one ToolDefinition have different membership lifecycles across testing, production, or provider endpoints.
    ja: 独立 entry identity により同一 ToolDefinition が test・production・provider endpoint ごとに別 lifecycle を持てます。
  includes:
    - zh: 纳入有独立条目标识、注册表归属和具体定义版本引用的成员记录。
      en: Includes member records with an independent entry ID, registry membership, and reference to a concrete definition version.
      ja: 独立 entry ID、registry 所属、具体 definition version reference を持つ member record を含みます。
  excludes:
    - zh: 排除 ToolDefinition 内容副本、ToolCandidate、提供方参与者和一次 tools/list 响应页。
      en: Excludes copied ToolDefinition content, ToolCandidate, provider actors, and one tools/list response page.
      ja: ToolDefinition copy、ToolCandidate、provider actor、一回の tools/list page を除きます。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - registry_entry_id
  fields:
    - id: registry_entry_id
      labels:
        zh: 注册条目标识
        en: registry-entry ID
        ja: 登録項目 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 注册条目标识作为 RegistryEntry 节点内部信息保存，不建立同名图节点。
        en: registry-entry ID is stored as information on the RegistryEntry node and does not create a namesake graph node.
        ja: 登録項目 IDは RegistryEntry node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: entry:prod:weather:v3
      source_claims:
        - claim-registry-entry-003
        - claim-registry-entry-004
    - id: definition_ref
      labels:
        zh: 定义引用
        en: definition reference
        ja: 定義参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 定义引用作为 RegistryEntry 节点内部信息保存，不建立同名图节点。
        en: definition reference is stored as information on the RegistryEntry node and does not create a namesake graph node.
        ja: 定義参照は RegistryEntry node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: tool-def:weather@3
      source_claims:
        - claim-registry-entry-005
        - claim-registry-entry-006
    - id: provider_ref
      labels:
        zh: 提供方引用
        en: provider reference
        ja: 提供者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 提供方引用作为 RegistryEntry 节点内部信息保存，不建立同名图节点。
        en: provider reference is stored as information on the RegistryEntry node and does not create a namesake graph node.
        ja: 提供者参照は RegistryEntry node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: provider:weather-prod
      source_claims:
        - claim-registry-entry-007
        - claim-registry-entry-008
    - id: environment_scope
      labels:
        zh: 环境范围
        en: environment scope
        ja: 環境範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 环境范围作为 RegistryEntry 节点内部信息保存，不建立同名图节点。
        en: environment scope is stored as information on the RegistryEntry node and does not create a namesake graph node.
        ja: 環境範囲は RegistryEntry node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: production
      source_claims:
        - claim-registry-entry-009
        - claim-registry-entry-010
    - id: registration_status
      labels:
        zh: 注册状态
        en: registration status
        ja: 登録状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 注册状态作为 RegistryEntry 节点内部信息保存，不建立同名图节点。
        en: registration status is stored as information on the RegistryEntry node and does not create a namesake graph node.
        ja: 登録状態は RegistryEntry node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: active
      source_claims:
        - claim-registry-entry-011
        - claim-registry-entry-012
  constraints: []
  required_relation_constraints: []
examples:
  - id: RegistryEntry-example-positive-manual-001
    kind: positive
    labels:
      zh: RegistryEntry 正例
      en: RegistryEntry positive case
      ja: RegistryEntry 正例
    scenario_id: null
    descriptions:
      zh: 生产条目引用 weather v3 定义、天气提供方和 production 环境。
      en: A production entry refers to weather v3, its weather provider, and the production environment.
      ja: 本番 entry が weather v3 definition、weather provider、production environment を参照します。
    field_values:
      registry_entry_id: registry-entry:weather:v3:production
      definition_ref: tooldef:weather@3.0.0
      provider_ref: provider:weather-production
      environment_scope: production
      registration_status: active
    related_node_ids:
      - RegistryEntry
      - ToolRegistry
    related_relation_ids:
      - ToolRegistry-contains-RegistryEntry
    expected_result:
      zh: ToolRegistry 包含该条目，条目再描述具体 ToolDefinition。
      en: ToolRegistry contains the entry, which describes the concrete ToolDefinition.
      ja: ToolRegistry が entry を含み entry が具体 ToolDefinition を describes します。
    why_valid_or_invalid:
      zh: 成员身份和定义身份由不同字段决定。
      en: Membership identity and definition identity are determined by different fields.
      ja: membership identity と definition identity が別 field で決まるためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-registry-entry-013
      - claim-registry-entry-014
  - id: RegistryEntry-example-boundary-manual-001
    kind: boundary
    labels:
      zh: RegistryEntry 边界例
      en: RegistryEntry boundary case
      ja: RegistryEntry 境界例
    scenario_id: null
    descriptions:
      zh: weather v3 ToolDefinition 含名称和 Schema，但未说明目录与端点。
      en: The weather v3 ToolDefinition has a name and schemas but no registry or endpoint membership.
      ja: weather v3 ToolDefinition は名称と schema を持ちますが registry・endpoint 所属はありません。
    field_values: {}
    related_node_ids:
      - RegistryEntry
      - ToolRegistry
    related_relation_ids:
      - ToolRegistry-contains-RegistryEntry
    expected_result:
      zh: 定义和条目保持两个节点，通过 describes 连接。
      en: Definition and entry remain separate nodes connected by describes.
      ja: definition と entry を別 node とし describes で接続します。
    why_valid_or_invalid:
      zh: 可复用规范身份不等于目录成员身份。
      en: Reusable specification identity is not catalog-membership identity.
      ja: 再利用 specification identity と catalog membership identity は別だからです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-registry-entry-015
      - claim-registry-entry-016
