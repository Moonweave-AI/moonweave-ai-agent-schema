schema: moonweave.ai/ontology-node/v1
id: RegistryActivity
kind: concept
status: accepted
labels:
  zh: 注册表活动
  en: Registry Activity
  ja: レジストリ活動
semantics:
  short_definition:
    zh: 注册表活动是受审计地改变目录成员或发布成员的过程。
    en: A Registry Activity is an audited process that changes catalog or publication membership.
    ja: レジストリ活動は目録または公開所属を監査可能に変更する process です。
  definition:
    zh: 注册表活动是一种活动，以活动标识、施事者、目标目录和变更结果为身份；注册、注销和发布分别处理加入、终止与面向受众的发布，它们共享变更语义但保留不同输出。
    en: A Registry Activity is an activity identified by activity ID, actor, target catalog, and change outcome. Registration, deregistration, and publication specialize addition, termination, and audience-facing publication while retaining different outputs.
    ja: レジストリ活動は activity ID、actor、target catalog、change outcome で識別され、登録・解除・公開が加入・終了・受け手向け公開を細分化します。
  why_needed:
    zh: 该活动上位层阻止 RegistryEntry 或 CapabilitySurface 被错误赋予自我产生、自我终止或自我发布的施事能力。
    en: This activity layer prevents RegistryEntry or CapabilitySurface from being assigned agency to produce, terminate, or publish itself.
    ja: RegistryEntry や CapabilitySurface に自己生成・自己終了・自己公開の行為主体性を誤付与しません。
  includes:
    - zh: 纳入对目录或发布成员执行加入、移除、替换和发布的可追溯过程。
      en: Includes traceable processes that add, remove, replace, or publish catalog membership.
      ja: 目録または公開所属を加入・除去・置換・公開する traceable process を含みます。
  excludes:
    - zh: 排除集合本身、成员记录、list_changed 通知和一次工具调用。
      en: Excludes the collection itself, member records, list_changed notifications, and one tool invocation.
      ja: collection 自体、member record、list_changed notification、一回の tool invocation を除きます。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - registry_activity_id
  fields:
    - id: registry_activity_id
      labels:
        zh: 活动标识
        en: activity ID
        ja: 活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 活动标识作为 RegistryActivity 节点内部信息保存，不建立同名图节点。
        en: activity ID is stored as information on the RegistryActivity node and does not create a namesake graph node.
        ja: 活動 IDは RegistryActivity node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: registry-activity:2026-0714-001
      source_claims:
        - claim-registry-activity-002
    - id: actor_ref
      labels:
        zh: 施事者引用
        en: actor reference
        ja: 行為者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 施事者引用作为 RegistryActivity 节点内部信息保存，不建立同名图节点。
        en: actor reference is stored as information on the RegistryActivity node and does not create a namesake graph node.
        ja: 行為者参照は RegistryActivity node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: release-bot
      source_claims:
        - claim-registry-activity-003
    - id: occurred_at
      labels:
        zh: 发生时刻
        en: occurrence time
        ja: 発生時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 发生时刻作为 RegistryActivity 节点内部信息保存，不建立同名图节点。
        en: occurrence time is stored as information on the RegistryActivity node and does not create a namesake graph node.
        ja: 発生時刻は RegistryActivity node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T09:00:00Z
      source_claims:
        - claim-registry-activity-004
  constraints:
    - id: registry-activity-single-inherited-identity
      severity: error
      expression_language: plain
      expression: Every accepted is_a specialization of RegistryActivity MUST reuse registry_activity_id; registration, deregistration, and publication are activity kinds, not independent aliases for the same occurrence.
      explanations:
        zh: RegistryActivity 的 accepted 下位活动复用 registry_activity_id；注册、注销与发布是活动种类，不为同一次发生再造别名 ID。
        en: Accepted RegistryActivity subtypes reuse registry_activity_id; registration, deregistration, and publication are activity kinds rather than independent aliases for one occurrence.
        ja: RegistryActivity の accepted subtype は registry_activity_id を再利用し、registration・deregistration・publication は activity kind で同一 occurrence の別名 ID ではありません。
      source_claims:
        - claim-registry-activity-005
  required_relation_constraints: []
examples:
  - id: RegistryActivity-example-positive-manual-001
    kind: positive
    labels:
      zh: RegistryActivity 正例
      en: RegistryActivity positive case
      ja: RegistryActivity 正例
    scenario_id: null
    descriptions:
      zh: 同一变更单注册 v3、注销 v2 并重新发布生产能力表面。
      en: One change ticket registers v3, deregisters v2, and republishes the production capability surface.
      ja: 一つの change ticket が v3 登録、v2 解除、本番 surface 再公開を行います。
    field_values:
      registry_activity_id: registry-activity:weather-cutover-20260717
      actor_ref: operations:release-manager
      occurred_at: 2026-07-17T09:00:00Z
    related_node_ids:
      - RegistryActivity
    related_relation_ids: []
    expected_result:
      zh: 三个过程共享注册表活动上位类型并保持各自结果。
      en: The three processes share RegistryActivity while retaining distinct outcomes.
      ja: 三 process は RegistryActivity を共有し各結果を保持します。
    why_valid_or_invalid:
      zh: 共同种差是对目录或发布成员的受审计变更。
      en: Their common differentia is an audited membership change.
      ja: 共通種差が監査可能な membership change だからです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-registry-activity-006
  - id: RegistryActivity-example-boundary-manual-001
    kind: boundary
    labels:
      zh: RegistryActivity 边界例
      en: RegistryActivity boundary case
      ja: RegistryActivity 境界例
    scenario_id: null
    descriptions:
      zh: 服务器发送 notifications/tools/list_changed 通知。
      en: A server sends notifications/tools/list_changed.
      ja: server が notifications/tools/list_changed を送信します。
    field_values: {}
    related_node_ids:
      - RegistryActivity
    related_relation_ids: []
    expected_result:
      zh: 通知保留为协议消息，可关联导致它的活动。
      en: The notification remains a protocol message and may reference the causing activity.
      ja: notification は protocol message のままで原因 activity と関連できます。
    why_valid_or_invalid:
      zh: 信息记录与产生该信息的过程有不同身份。
      en: An information record and the process producing it have different identities.
      ja: 情報記録とその生成 process は別 identity だからです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-registry-activity-007
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: RegistryActivity-operates_on-ToolRegistry
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 作用于工具注册表
    en: operates on tool registry
    ja: ツール登録表に作用する
  definitions:
    zh: RegistryActivity operates_on 其明确 target_catalog_id 指向的 ToolRegistry，并以活动结果改变、终止或发布该注册表的成员状态；通知可以报告变化，但通知本身不是注册表活动。
    en: A RegistryActivity operates_on the ToolRegistry named by its target_catalog_id and changes, terminates, or publishes registry membership through its activity outcome. A notification may report that change, but the notification is not itself a registry activity.
    ja: RegistryActivity は target_catalog_id が示す ToolRegistry に operates_on し activity outcome により membership を追加・終了・公開します。notification は変更を報告できますが registry activity 自体ではありません。
  cardinality:
    source:
      min: 1
      max: 1
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 被注册表活动作用
      en: is operated on by registry activity
      ja: registry activity の作用対象である
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: RegistryActivity-operates_on-ToolRegistry-example-positive-manual-001
      kind: positive
      labels:
        zh: 注册活动作用于明确注册表正例
        en: Registry activity targets a definite registry positive case
        ja: registry activity が明示 registry を対象とする正例
      scenario_id: null
      descriptions:
        zh: registration-44 由发布服务执行，target_catalog_id 指向 registry-prod，并产生该注册表中的新 RegistryEntry。
        en: registration-44 is performed by the release service, names registry-prod as target_catalog_id, and produces a new RegistryEntry in that registry.
        ja: registration-44 は release service が実行し target_catalog_id に registry-prod を指定して当該 registry の新 RegistryEntry を生成します。
      field_values: {}
      related_node_ids:
        - RegistryActivity
        - ToolRegistry
      related_relation_ids:
        - RegistryActivity-operates_on-ToolRegistry
      expected_result:
        zh: 建立 registration-44 —operates_on→ registry-prod。
        en: Assert registration-44 —operates_on→ registry-prod.
        ja: registration-44 —operates_on→ registry-prod を成立させます。
      why_valid_or_invalid:
        zh: 活动身份、施事者、目标目录与变更结果均可审计。
        en: Activity identity, actor, target catalog, and change outcome are all auditable.
        ja: activity identity・actor・target catalog・change outcome がすべて監査可能です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-registry-activity-008
    - id: RegistryActivity-operates_on-ToolRegistry-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 变更通知不是注册活动边界例
        en: Change notification is not registry activity boundary case
        ja: change notification は registry activity ではない境界例
      scenario_id: null
      descriptions:
        zh: 客户端收到 notifications/tools/list_changed，但没有 activity_id、actor、target_catalog_id 或成员变更结果。
        en: A client receives notifications/tools/list_changed with no activity_id, actor, target_catalog_id, or membership-change outcome.
        ja: client が notifications/tools/list_changed を受けますが activity_id・actor・target_catalog_id・membership-change outcome がありません。
      field_values: {}
      related_node_ids:
        - RegistryActivity
        - ToolRegistry
      related_relation_ids:
        - RegistryActivity-operates_on-ToolRegistry
      expected_result:
        zh: 不把通知实例化为 RegistryActivity，也不建立 operates_on 边。
        en: Do not instantiate the notification as RegistryActivity or assert operates_on.
        ja: notification を RegistryActivity とせず operates_on edge も成立させません。
      why_valid_or_invalid:
        zh: 报告变化的消息缺少活动身份与实际变更结果。
        en: A message reporting change lacks activity identity and the actual change outcome.
        ja: change report message は activity identity と actual change outcome を欠きます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-registry-activity-009
  source_claims:
    - claim-registry-activity-010
  distinct_fact_rationale:
    zh: operates_on 表达活动的治理目标；它不同于 contains 成员关系，也不同于 list_changed 消息。
    en: operates_on states the governed target of an activity; it differs from containment membership and from a list_changed message.
    ja: operates_on は activity の governed target を表し contains membership や list_changed message と異なります。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
