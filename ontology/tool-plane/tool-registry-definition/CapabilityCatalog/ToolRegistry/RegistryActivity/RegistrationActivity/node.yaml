sibling_differentiation:
  - sibling_concept_id: RegistryPublicationActivity
    shared_parent_concept_id: RegistryActivity
    differentia:
      zh: 端点特定对照：父节点 RegistryActivity：RegistrationActivity（semantic kind=activity，骨架 RegistrationActivity-is_a-RegistryActivity）；RegistryPublicationActivity（semantic kind=activity，骨架 RegistryPublicationActivity-is_a-RegistryActivity）。双端条件：RegistrationActivity 条件：“注册活动核验一份工具定义并产生可用的目录条目”；RegistryPublicationActivity 条件：“注册表发布活动把选定能力描述符发布到指定能力表面”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent RegistryActivity: RegistrationActivity (semantic kind=activity, backbone RegistrationActivity-is_a-RegistryActivity); RegistryPublicationActivity (semantic kind=activity, backbone RegistryPublicationActivity-is_a-RegistryActivity). Endpoint conditions: RegistrationActivity condition: “A Registration Activity validates a tool definition and produces an available catalog entry”; RegistryPublicationActivity condition: “A Registry Publication Activity publishes selected capability descriptors to a designated capability surface”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 RegistryActivity：RegistrationActivity（semantic kind=activity、バックボーン RegistrationActivity-is_a-RegistryActivity）；RegistryPublicationActivity（semantic kind=activity、バックボーン RegistryPublicationActivity-is_a-RegistryActivity）。両端条件：RegistrationActivity の条件：「登録活動は tool definition を検証し利用可能 catalog entry を生成します」；RegistryPublicationActivity の条件：「レジストリ公開活動は選択した能力記述子を指定 capability surface へ公開します」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-registration-activity-007
