    labels:
      zh: RegistrationActivity 正例
      en: RegistrationActivity positive case
      ja: RegistrationActivity 正例
    scenario_id: null
    descriptions:
      zh: 发布流水线验证 weather v3 的输入 Schema 和权限后，为生产注册表创建条目。
      en: A release pipeline validates weather v3 input schema and permissions before creating a production registry entry.
      ja: release pipeline が weather v3 input schema と permission を検証し本番 registry entry を作ります。
    field_values:
      registry_activity_id: registry-activity:weather-v3-register
      actor_ref: release-pipeline:weather
      occurred_at: 2026-07-17T08:30:00Z
      definition_ref: tooldef:weather@3.0.0
      target_registry_ref: registry:tools:production
      outcome: registered
    related_node_ids:
      - RegistrationActivity
      - RegistryActivity
    related_relation_ids:
      - RegistrationActivity-is_a-RegistryActivity
    expected_result:
      zh: 流水线运行归注册活动，并分别 registers 定义、produces 条目。
      en: The pipeline run is RegistrationActivity that registers the definition and produces the entry.
      ja: pipeline run を RegistrationActivity とし definition を registers、entry を produces します。
    why_valid_or_invalid:
      zh: 过程有明确输入、验证与持久输出。
      en: The process has an explicit input, validation, and persistent output.
      ja: 明確な input、validation、persistent output があるためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-registration-activity-005
  - id: RegistrationActivity-example-boundary-manual-001
    kind: boundary
    labels:
      zh: RegistrationActivity 边界例
      en: RegistrationActivity boundary case
      ja: RegistrationActivity 境界例
    scenario_id: null
    descriptions:
      zh: 开发者只保存了尚未提交注册表的 ToolDefinition 草稿。
      en: A developer saves a ToolDefinition draft that has not been submitted to a registry.
      ja: developer が registry 未提出の ToolDefinition draft を保存します。
    field_values: {}
    related_node_ids:
      - RegistrationActivity
      - RegistryActivity
    related_relation_ids:
      - RegistrationActivity-is_a-RegistryActivity
    expected_result:
      zh: 草稿仍是定义信息，不产生注册活动或条目。
      en: The draft remains definition information and creates neither RegistrationActivity nor RegistryEntry.
      ja: draft は定義情報のままで RegistrationActivity も RegistryEntry も作りません。
    why_valid_or_invalid:
      zh: 定义存在不等于目录成员关系已经建立。
      en: Definition existence does not mean catalog membership has been established.
      ja: definition 存在と catalog membership 成立は別だからです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-registration-activity-006
