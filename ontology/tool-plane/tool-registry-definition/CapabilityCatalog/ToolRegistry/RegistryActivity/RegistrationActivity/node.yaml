schema: moonweave.ai/ontology-node/v1
id: RegistrationActivity
kind: concept
status: review
labels:
  zh: 注册活动
  en: Registration Activity
  ja: 登録活動
semantics:
  short_definition:
    zh: 注册活动核验一份工具定义并产生可用的目录条目。
    en: A Registration Activity validates a tool definition and produces an available catalog entry.
    ja: 登録活動は tool definition を検証し利用可能 catalog entry を生成します。
  definition:
    zh: 注册活动是一种 RegistryActivity，复用 registry_activity_id，并以输入定义、目标目录与结果为种差；它校验名称和 Schema、应用治理策略，并产生引用原定义的 RegistryEntry，而不复制定义内容。
    en: A Registration Activity is a RegistryActivity that reuses registry_activity_id and is differentiated by input definition, target catalog, and outcome. It validates names and schemas, applies governance policy, and produces a RegistryEntry that refers to rather than copies the definition.
    ja: Registration Activity は registry_activity_id を再利用し、input definition、target catalog、outcome で区別する RegistryActivity です。name/schema を検証し、definition を copy せず参照する RegistryEntry を生成します。
  why_needed:
    zh: 显式注册过程提供输入到输出的责任交接，并保留验证失败、审批者和生效时间等审计事实。
    en: An explicit registration process provides the input-to-output handoff and preserves audit facts such as validation failure, approver, and effective time.
    ja: 明示登録 process が input-output handoff と validation failure、approver、effective time を保持します。
  includes:
    - zh: 纳入有输入定义、目标注册表、验证结果和产生条目的受审计过程。
      en: Includes audited processes with an input definition, target registry, validation result, and produced entry.
      ja: input definition、target registry、validation result、produced entry を持つ監査 process を含みます。
  excludes:
    - zh: 排除手工编写定义、条目本身、工具列表响应和模型搜索。
      en: Excludes authoring a definition, the entry itself, a tool-list response, and model search.
      ja: definition authoring、entry 自体、tool-list response、model search を除きます。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: definition_ref
      labels:
        zh: 输入定义引用
        en: input definition reference
        ja: 入力定義参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 输入定义引用作为 RegistrationActivity 节点内部信息保存，不建立同名图节点。
        en: input definition reference is stored as information on the RegistrationActivity node and does not create a namesake graph node.
        ja: 入力定義参照は RegistrationActivity node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: tool-def:weather@3
      source_claims:
        - claim-registration-activity-002
    - id: target_registry_ref
      labels:
        zh: 目标注册表引用
        en: target registry reference
        ja: 対象 registry 参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 目标注册表引用作为 RegistrationActivity 节点内部信息保存，不建立同名图节点。
        en: target registry reference is stored as information on the RegistrationActivity node and does not create a namesake graph node.
        ja: 対象 registry 参照は RegistrationActivity node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: registry:prod
      source_claims:
        - claim-registration-activity-003
    - id: outcome
      labels:
        zh: 注册结果
        en: registration outcome
        ja: 登録結果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 注册结果作为 RegistrationActivity 节点内部信息保存，不建立同名图节点。
        en: registration outcome is stored as information on the RegistrationActivity node and does not create a namesake graph node.
        ja: 登録結果は RegistrationActivity node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: accepted
      source_claims:
        - claim-registration-activity-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: RegistrationActivity-example-positive-manual-001
