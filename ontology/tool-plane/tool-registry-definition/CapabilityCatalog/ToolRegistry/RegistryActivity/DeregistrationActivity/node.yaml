schema: moonweave.ai/ontology-node/v1
id: DeregistrationActivity
kind: concept
status: review
labels:
  zh: 注销活动
  en: Deregistration Activity
  ja: 登録解除活動
semantics:
  short_definition:
    zh: 注销活动终止一个注册条目的有效目录成员关系。
    en: A Deregistration Activity terminates the valid catalog membership of a registry entry.
    ja: 登録解除活動は registry entry の有効な目録所属を終了します。
  definition:
    zh: 注销活动是一种 RegistryActivity，复用 registry_activity_id，并以目标条目、生效时间和原因为种差；它记录撤回、替换或过期造成的成员终止，可触发工具列表变更，但不删除历史定义。
    en: A Deregistration Activity is a RegistryActivity that reuses registry_activity_id and is differentiated by target entry, effective time, and reason. It records membership termination caused by withdrawal, replacement, or expiry and may trigger a tool-list change without deleting historical definitions.
    ja: Deregistration Activity は registry_activity_id を再利用し、target entry、effective time、reason で区別する RegistryActivity です。withdrawal・replacement・expiry による membership 終了を記録し、historical definition を削除しません。
  why_needed:
    zh: 独立活动节点保留谁在何时以何种理由终止成员关系，避免把状态变化错误地归给条目自身。
    en: A separate activity records who terminated membership, when, and why, instead of assigning agency to the entry itself.
    ja: 誰がいつ何故所属を終了したかを記録し、entry 自身に行為主体性を与えません。
  includes:
    - zh: 纳入有目标条目、生效时刻和注销原因的受审计成员终止过程。
      en: Includes audited membership-termination processes with a target entry, effective time, and reason.
      ja: 対象 entry、発効時刻、理由を持つ監査可能な所属終了 process を含みます。
  excludes:
    - zh: 排除弃用通知、条目当前状态字段和 tools/list_changed 通知消息。
      en: Excludes a deprecation notice, an entry status field, and the tools/list_changed notification message.
      ja: deprecation notice、entry status field、tools/list_changed notification を除きます。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: target_entry_ref
      labels:
        zh: 目标条目引用
        en: target-entry reference
        ja: 対象 entry 参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 目标条目引用作为 DeregistrationActivity 节点内部信息保存，不建立同名图节点。
        en: target-entry reference is stored as information on the DeregistrationActivity node and does not create a namesake graph node.
        ja: 対象 entry 参照は DeregistrationActivity node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: entry:prod:weather:v2
      source_claims:
        - claim-deregistration-activity-002
    - id: effective_at
      labels:
        zh: 生效时刻
        en: effective time
        ja: 発効時刻
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 生效时刻作为 DeregistrationActivity 节点内部信息保存，不建立同名图节点。
        en: effective time is stored as information on the DeregistrationActivity node and does not create a namesake graph node.
        ja: 発効時刻は DeregistrationActivity node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: 2026-08-01T00:00:00Z
      source_claims:
        - claim-deregistration-activity-003
    - id: reason
      labels:
        zh: 注销原因
        en: deregistration reason
        ja: 登録解除理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 注销原因作为 DeregistrationActivity 节点内部信息保存，不建立同名图节点。
        en: deregistration reason is stored as information on the DeregistrationActivity node and does not create a namesake graph node.
        ja: 登録解除理由は DeregistrationActivity node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: replaced-by-v3
      source_claims:
        - claim-deregistration-activity-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: DeregistrationActivity-example-positive-manual-001
    kind: positive
    labels:
      zh: DeregistrationActivity 正例
      en: DeregistrationActivity positive case
      ja: DeregistrationActivity 正例
    scenario_id: null
    descriptions:
      zh: 运维批准 weather v2 下线，并在午夜终止生产条目。
      en: Operations approves retirement of weather v2 and terminates its production entry at midnight.
      ja: 運用担当が weather v2 廃止を承認し深夜に本番 entry を終了します。
    field_values:
      registry_activity_id: registry-activity:weather-v2-deregister
      actor_ref: operations:release-manager
      occurred_at: 2026-07-17T09:00:00Z
      target_entry_ref: registry-entry:weather:v2:production
      effective_at: 2026-07-18T00:00:00Z
      reason: weather v3 is approved and v2 has reached its scheduled end of service
    related_node_ids:
      - DeregistrationActivity
      - RegistryActivity
    related_relation_ids:
      - DeregistrationActivity-is_a-RegistryActivity
    expected_result:
      zh: 过程记录为注销活动并以 terminates 指向条目。
      en: The process is recorded as DeregistrationActivity pointing to the entry with terminates.
      ja: process を DeregistrationActivity とし terminates で entry を指します。
    why_valid_or_invalid:
      zh: 它有独立施事、生效时间和注销原因。
      en: It has independent agency, effective time, and termination reason.
      ja: 独立した行為主体、発効時刻、終了理由があるためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-deregistration-activity-005
  - id: DeregistrationActivity-example-boundary-manual-001
    kind: boundary
    labels:
      zh: DeregistrationActivity 边界例
      en: DeregistrationActivity boundary case
      ja: DeregistrationActivity 境界例
    scenario_id: null
    descriptions:
      zh: ToolDeprecationNotice 宣布 v2 将在三十天后停止支持。
      en: A ToolDeprecationNotice announces that v2 support will end in thirty days.
      ja: ToolDeprecationNotice が v2 support を三十日後に終了すると告知します。
    field_values: {}
    related_node_ids:
      - DeregistrationActivity
      - RegistryActivity
    related_relation_ids:
      - DeregistrationActivity-is_a-RegistryActivity
    expected_result:
      zh: 通知仍是元数据，尚未终止注册条目。
      en: The notice remains metadata and has not terminated a registry entry.
      ja: notice は metadata のままで registry entry を終了していません。
    why_valid_or_invalid:
      zh: 未来弃用意图与实际成员终止是不同事实。
      en: A future deprecation intention and actual membership termination are different facts.
      ja: 将来の廃止意図と実際の所属終了は別 fact です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-deregistration-activity-006
