sibling_differentiation:
  - sibling_concept_id: RegistrationActivity
    shared_parent_concept_id: RegistryActivity
    differentia:
      zh: 正向身份比较：父节点 RegistryActivity：DeregistrationActivity（semantic kind=activity，骨架 DeregistrationActivity-is_a-RegistryActivity）；RegistrationActivity（semantic kind=activity，骨架 RegistrationActivity-is_a-RegistryActivity）。双端条件：DeregistrationActivity 条件：“注销活动终止一个注册条目的有效目录成员关系”；RegistrationActivity 条件：“注册活动核验一份工具定义并产生可用的目录条目”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent RegistryActivity: DeregistrationActivity (semantic kind=activity, backbone DeregistrationActivity-is_a-RegistryActivity); RegistrationActivity (semantic kind=activity, backbone RegistrationActivity-is_a-RegistryActivity). Endpoint conditions: DeregistrationActivity condition: “A Deregistration Activity terminates the valid catalog membership of a registry entry”; RegistrationActivity condition: “A Registration Activity validates a tool definition and produces an available catalog entry”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 RegistryActivity：DeregistrationActivity（semantic kind=activity、バックボーン DeregistrationActivity-is_a-RegistryActivity）；RegistrationActivity（semantic kind=activity、バックボーン RegistrationActivity-is_a-RegistryActivity）。両端条件：DeregistrationActivity の条件：「登録解除活動は registry entry の有効な目録所属を終了します」；RegistrationActivity の条件：「登録活動は tool definition を検証し利用可能 catalog entry を生成します」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-deregistration-activity-007
