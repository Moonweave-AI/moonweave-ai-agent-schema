schema: moonweave.ai/ontology-node/v1
id: RegistryPublicationActivity
kind: concept
status: review
labels:
  zh: 注册表发布活动
  en: Registry Publication Activity
  ja: レジストリ公開活動
semantics:
  short_definition:
    zh: 注册表发布活动把选定能力描述符发布到指定能力表面。
    en: A Registry Publication Activity publishes selected capability descriptors to a designated capability surface.
    ja: レジストリ公開活動は選択した能力記述子を指定 capability surface へ公開します。
  definition:
    zh: 注册表发布活动是一种 RegistryActivity，复用 registry_activity_id，并以来源目录、目标能力表面与发布版本为种差；它按受众、信任与令牌预算生成或选择 CapabilityDescriptor，不修改 ToolDefinition，也不执行当前查询的 ToolSearch。
    en: A Registry Publication Activity is a RegistryActivity that reuses registry_activity_id and is differentiated by source catalog, target capability surface, and publication version. It selects or generates CapabilityDescriptors by audience, trust, and token budget without modifying ToolDefinitions or performing the current query's ToolSearch.
    ja: Registry Publication Activity は registry_activity_id を再利用し、source catalog、target capability surface、publication version で区別する RegistryActivity です。ToolDefinition を変更せず current ToolSearch も実行しません。
  why_needed:
    zh: 显式施事活动让发布成员拥有独立生命周期，也避免把 CapabilitySurface 错写成会主动发布自身内容的对象。
    en: Explicit agency gives publication membership its own lifecycle and avoids depicting CapabilitySurface as publishing itself.
    ja: 明示 activity により公開所属を独立 lifecycle とし CapabilitySurface の自己公開を防ぎます。
  includes:
    - zh: 纳入从注册表选择描述符并更新指定表面版本的受审计发布作业。
      en: Includes audited publication jobs that select descriptors from a registry and update a designated surface version.
      ja: registry から descriptor を選び指定 surface version を更新する監査 job を含みます。
  excludes:
    - zh: 排除表面集合本身、查询时排序、注册条目创建和一次模型调用。
      en: Excludes the surface collection itself, query-time ranking, entry creation, and one model invocation.
      ja: surface collection 自体、query-time ranking、entry creation、一回の model invocation を除きます。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
