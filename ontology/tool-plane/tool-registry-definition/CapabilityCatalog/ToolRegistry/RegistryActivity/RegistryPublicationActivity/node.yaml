    related_relation_ids:
      - RegistryPublicationActivity-is_a-RegistryActivity
    expected_result:
      zh: 活动通过 publishes 指向描述符，通过 publishes_to 指向表面。
      en: The activity points to descriptors through publishes and to the surface through publishes_to.
      ja: activity は publishes で descriptor、publishes_to で surface を指します。
    why_valid_or_invalid:
      zh: 作业、来源目录、成员和目标表面均可审计。
      en: The job, source catalog, members, and target surface are all auditable.
      ja: job、source catalog、member、target surface を監査できるためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-registry-publication-activity-009
      - claim-registry-publication-activity-010
