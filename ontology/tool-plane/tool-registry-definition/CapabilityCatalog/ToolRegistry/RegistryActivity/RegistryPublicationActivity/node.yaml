      ja: RegistryPublicationActivity 境界例
    scenario_id: null
    descriptions:
      zh: 模型在已发布表面中搜索并加载三个候选工具。
      en: A model searches an already published surface and loads three candidate tools.
      ja: model が公開済み surface を検索し三 candidate tool を load します。
    field_values: {}
    related_node_ids:
      - RegistryPublicationActivity
      - RegistryActivity
    related_relation_ids:
