    descriptions:
      zh: 发布作业从四百条注册记录选择二十个描述符并更新生产表面版本 42。
      en: A publication job selects twenty descriptors from four hundred registry records and updates production surface version 42.
      ja: publication job が四百 registry record から二十 descriptor を選び本番 surface 版 42 を更新します。
    field_values:
      registry_activity_id: registry-activity:publish-production-surface-42
      actor_ref: publication-job:capability-surface
      occurred_at: 2026-07-17T09:15:00Z
      source_registry_ref: registry:tools:production
      target_surface_ref: discovery-surface:production-tools
      publication_version: "42"
    related_node_ids:
