        zh: 来源注册表引用
        en: source registry reference
        ja: 元 registry 参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 来源注册表引用作为 RegistryPublicationActivity 节点内部信息保存，不建立同名图节点。
        en: source registry reference is stored as information on the RegistryPublicationActivity node and does not create a namesake graph node.
        ja: 元 registry 参照は RegistryPublicationActivity node 内情報として保持し、同名 graph node を作りません。
