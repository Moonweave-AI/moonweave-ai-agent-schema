      zh: 该步骤属于发现域，表面版本与成员未变化。
      en: The step belongs to discovery; surface version and membership remain unchanged.
      ja: step は discovery に属し surface version と membership は変わりません。
    why_valid_or_invalid:
      zh: 消费发布集合与产生发布集合是不同过程。
      en: Consuming a published collection and producing it are different processes.
      ja: 公開集合の消費と生成は別 process だからです。
