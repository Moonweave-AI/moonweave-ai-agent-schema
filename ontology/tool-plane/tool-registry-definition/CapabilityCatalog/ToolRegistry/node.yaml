schema: moonweave.ai/ontology-node/v1
id: ToolRegistry
kind: concept
labels:
  zh: 工具注册治理 profile
  en: Tool registration-governance profile
  ja: ツール登録ガバナンス profile
semantics:
  short_definition:
    zh: 管理本地工具引用登记和变更记录的 Moonweave profile。
    en: A Moonweave profile for governing local tool-reference registration and change records.
    ja: ローカル tool-reference の登録と変更記録を管理する Moonweave profile。
  definition:
    zh: >
      ToolRegistry 是 Moonweave 的不可变本地注册器修订 profile，用于登记本地工具引用、来源、对独立治理活动的引用和发布状态。MCP 规定
      服务器通过 tools/list 暴露当前 Tool 集合，并可发送 list_changed 通知，但不定义持久 ToolRegistry、RegistryEntry
      或注册/注销活动。因此本概念绝不能声称为 MCP 原生对象。
    en: >
      ToolRegistry is an immutable Moonweave local registry-revision profile for recording local tool references, provenance,
      references to independent governance activities, and publication state. MCP specifies that a server exposes its current Tool
      set through tools/list and may send a list_changed notification, but it defines no persistent
      ToolRegistry, RegistryEntry, or registration/deregistration activity. This concept must never
      claim to be an MCP native object.
    ja: >
      ToolRegistry はローカル tool reference、provenance、独立した governance activity への reference、publication state を記録する
      不変の Moonweave local registry-revision profile である。MCP は server が現在の Tool set を tools/list で公開し list_changed notification
      を送れることを規定するが、持続的 ToolRegistry、RegistryEntry、registration/deregistration activity は定義しない。
      この concept は MCP native object と決して主張してはならない。
  why_needed:
    zh: 本地维护需要可审计登记历史，而协议发现响应通常只表达当前可见集合。
    en: Local maintenance needs auditable registration history, while protocol discovery responses normally express only a current visible set.
    ja: ローカル保守には監査可能な登録履歴が必要であり、protocol discovery response は通常現在の visible set だけを表す。
  includes:
    - zh: 本地工具引用、来源和登记状态。
      en: Local tool references, provenance, and registration state.
      ja: ローカル tool reference、provenance、registration state。
    - zh: 指向独立注册、注销和发布活动的本地引用。
      en: Local references to independent registration, deregistration, and publication activities.
      ja: 独立した registration、deregistration、publication activity へのローカル reference。
  excludes:
    - zh: MCP Tool、tools/list 响应或 notifications/tools/list_changed 本身。
      en: An MCP Tool, a tools/list response, or notifications/tools/list_changed itself.
      ja: MCP Tool、tools/list response、notifications/tools/list_changed 自体。
    - zh: MCP 规范未定义的协议级注册服务。
      en: A protocol-level registration service not defined by the MCP specification.
      ja: MCP specification が定義しない protocol-level registration service。
  semantic_kind: entity
  aliases:
    - language: en
      value: local tool registry profile
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      注册器可监听 tools/list 快照或 list_changed 通知，并在新 registry_revision 中收集不可变 RegistryEntry 版本。activity_refs 仅引用独立的注册、注销、发布或刷新活动，注册器不会组成性拥有这些活动；它们可按审计保留策略独立保存。实现应在每个条目上保存 server、取得时间
      和原始 Tool 名称；通知只表明列表可能变化，不能证明一个特定的本地注册活动已经发生。
    en: >
      A registry can observe tools/list snapshots or list_changed notifications and collect immutable RegistryEntry versions in a new registry_revision. activity_refs only reference independent registration, deregistration, publication, or refresh activities; the registry does not compositionally own them and they may be retained separately under audit policy. It should retain server, retrieval time, and original Tool name on each
      entry; a notification only signals that a list may have changed and cannot prove a particular
      local registration activity occurred.
    ja: >
      registry は tools/list snapshot または list_changed notification を観測して新しい registry_revision に不変 RegistryEntry version を収集できる。activity_refs は独立した registration、deregistration、publication、refresh activity を参照するだけで、registry はそれらを compositionally 所有せず audit policy により別途保持できる。
      各 entry に server、取得時刻、元の Tool name を保持すべきである。notification は list が変わった可能性を示すだけで、
      特定のローカル registration activity が発生したことを証明しない。
  typical_input:
    - description:
        zh: MCP 服务器发出的工具列表变更通知。
        en: A tool-list-change notification emitted by an MCP server.
        ja: MCP server が発行する tool-list-change notification。
      format: |
        {"jsonrpc":"2.0","method":"notifications/tools/list_changed"}
      source_claims: [mcp-tools-list-changed]
  typical_output:
    - description:
        zh: 本地审计活动，记录重新获取列表的原因。
        en: A local audit activity recording why the list is fetched again.
        ja: list を再取得する理由を記録するローカル audit activity。
      format: |
        {"registry_id":"engineering-tools","registry_revision":"42","activity_ref":"act-42","reason":"mcp-list-changed"}
      source_claims: [moonweave-tool-registry-profile]
  reference_implementations:
    - name: MCP Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines tools/list and optional notifications/tools/list_changed, not a registry lifecycle.
structure:
  identity_keys: [registry_id, registry_revision]
  fields:
    - id: registry_id
      labels:
        zh: 注册治理标识符
        en: Registration-governance identifier
        ja: 登録ガバナンス識別子
      definitions:
        zh: 标识本地工具登记集合的稳定标识符。
        en: A stable identifier for a local tool-registration collection.
        ja: ローカル tool-registration collection の安定識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: engineering-tools
      allowed_values: []
      source_claims: [moonweave-tool-registry-profile]
    - id: registry_revision
      labels:
        zh: 注册器修订
        en: Registry revision
        ja: registry revision
      definitions:
        zh: 标识本地注册器的不可变版本快照；条目组成和发布状态变化必须创建新修订。
        en: Identifies the immutable version snapshot of the local registry; changes to entry composition or publication state must create a new revision.
        ja: ローカル registry の不変 version snapshot を識別する。entry composition または publication state の変更は新 revision を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "42"
      allowed_values: []
      source_claims: [moonweave-tool-registry-profile]
    - id: catalog_revision_ref
      labels:
        zh: 目录修订引用
        en: Catalog revision reference
        ja: catalog revision reference
      definitions:
        zh: 标识拥有此注册器修订的 CapabilityCatalog 本地快照；删除目录快照会删除该注册器 profile，但不会删除外部协议记录或独立审计活动。
        en: Identifies the CapabilityCatalog local snapshot that owns this registry revision; deleting the catalog snapshot deletes this registry profile but not external protocol records or independent audit activities.
        ja: この registry revision を所有する CapabilityCatalog ローカル snapshot を識別する。catalog snapshot の削除はこの registry profile を削除するが、外部 protocol record または独立 audit activity は削除しない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: catalog:engineering@42
      allowed_values: []
      source_claims: [moonweave-tool-registry-profile, moonweave-tool-registry-taxonomy]
    - id: entries
      labels:
        zh: 本地登记条目版本
        en: Local registration entry versions
        ja: ローカル登録 entry version
      definitions:
        zh: 由本注册器修订严格拥有的不可变 RegistryEntry profile 集合；每个条目在该修订外无效，来源协议记录不被包含。
        en: A set of immutable RegistryEntry profiles strictly owned by this registry revision; each entry is invalid outside this revision and no source protocol record is included.
        ja: この registry revision が strict に所有する不変 RegistryEntry profile の集合。各 entry はこの revision 外では無効で、source protocol record は含まれない。
      datatype: array
      required: true
      cardinality:
        min: 0
        max: null
      pattern: null
      example_value: '[{"entry_id":"files-read-file","entry_version":"1"}]'
      allowed_values: []
      source_claims: [moonweave-tool-registry-profile, moonweave-tool-registry-taxonomy]
    - id: activity_refs
      labels:
        zh: 本地活动引用
        en: Local activity references
        ja: ローカル activity reference
      definitions:
        zh: 指向使用此注册器的独立注册、注销、发布或刷新活动；引用不把活动变成注册器的组成部分，也不规定其删除边界。
        en: References independent registration, deregistration, publication, or refresh activities that use this registry; the references do not make activities registry components or set their deletion boundary.
        ja: この registry を使用する独立した registration、deregistration、publication、refresh activity を参照する。reference は activity を registry component にせず deletion boundary も定めない。
      datatype: array
      required: true
      cardinality:
        min: 0
        max: null
      pattern: null
      example_value: '["act-42"]'
      allowed_values: []
      source_claims: [moonweave-tool-registry-profile]
    - id: provenance_policy
      labels:
        zh: 来源保留策略
        en: Provenance-retention policy
        ja: provenance 保持 policy
      definitions:
        zh: 要求条目保留协议、服务器或应用配置出处的本地策略。
        en: A local policy requiring entries to retain protocol, server, or application-configuration origin.
        ja: entry が protocol、server、application-configuration origin を保持することを要求するローカル policy。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: source-required-v1
      allowed_values: []
      source_claims: [moonweave-tool-registry-profile]
  constraints:
    - id: registry-is-local-not-mcp-service
      severity: error
      expression_language: plain
      expression: ToolRegistry is an immutable local registry revision and activity_refs must remain non-owning references to separate RegistryActivity records; neither may be serialized or described as MCP registry messages or server-owned Tool fields.
      explanation:
        zh: MCP 的 tools/list 和 list_changed 不创建协议级注册生命周期；本地删除目录修订也不会删除独立活动或来源协议记录。
        en: MCP tools/list and list_changed do not create a protocol-level registration lifecycle; deleting a local catalog revision also does not delete independent activities or source protocol records.
        ja: MCP tools/list と list_changed は protocol-level registration lifecycle を作らない。ローカル catalog revision を削除しても、独立 activity または source protocol record は削除されない。
      source_claims: [moonweave-tool-registry-profile, mcp-tools-list-changed]
  required_relations: [ToolRegistry-part_of-CapabilityCatalog]
examples:
  - id: tool-registry-positive-refresh-audit

    labels:
      zh: 列表刷新审计
      en: List-refresh audit
      ja: list-refresh audit

    descriptions:
      zh: Gorilla APIBench 1645 API 注册（HuggingFace/TorchHub/TensorHub）；ToolBench 16000+ RapidAPI 工具注册表；Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") 插件注册。
      en: Gorilla APIBench registers 1645 APIs (HuggingFace/TorchHub/TensorHub); ToolBench 16000+ RapidAPI tool registry; Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") plugin registration.
      ja: Gorilla APIBench が 1645 API を登録。ToolBench 16000+ RapidAPI tool registry。Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") プラグイン登録。
    field_values:
      registry_revision: "42"
      catalog_revision_ref: catalog:engineering@42
      registry_id: engineering-tools
    related_node_ids: [ToolRegistry, RegistryActivity]
    related_relation_ids: [ToolRegistry-part_of-CapabilityCatalog]

    source_claims: [mcp-tools-list-changed, moonweave-tool-registry-profile]
  - id: tool-registry-counterexample-native-mcp-registry

    labels:
      zh: 把本地注册器声称为 MCP 服务
      en: Local registry claimed as MCP service
      ja: ローカル registry を MCP service と主張する例

    descriptions:
      zh: 反例：ToolBench 注册未验证 RapidAPI key 的 endpoint；Gorilla registry 混入 hallucinated API 无 retriever 校验；Semantic Kernel plugin 名冲突未检测。
      en: Counterexample: ToolBench registers RapidAPI endpoint without key verification; Gorilla registry includes hallucinated API without retriever validation; Semantic Kernel plugin name collision undetected.
      ja: 反例：ToolBench が RapidAPI key 未検証 endpoint を登録。Gorilla registry に retriever 未検証 hallucinated API 混入。
    field_values:
      registry_revision: "42"
      catalog_revision_ref: catalog:engineering@42
      registry_id: engineering-tools
    related_node_ids: [ToolRegistry, RegistryEntry]
    related_relation_ids: [ToolRegistry-part_of-CapabilityCatalog]

    source_claims: [mcp-tools-list-changed, moonweave-tool-registry-profile]
  - id: tool-registry-boundary-current-list-history

    labels:
      zh: 当前列表与本地历史边界
      en: Boundary between current list and local history
      ja: current list とローカル history の境界

    descriptions:
      zh: Gorilla 离线 APIBench 索引 vs ToolBench 在线 RapidAPI catalog vs Semantic Kernel 本地 plugin 注册的持久化边界。
      en: Persistence boundary among Gorilla offline APIBench index, ToolBench online RapidAPI catalog, Semantic Kernel local plugin registration.
      ja: Gorilla offline APIBench index、ToolBench online RapidAPI catalog、Semantic Kernel ローカル plugin 登録の永続化境界。
    field_values:
      registry_id: engineering-tools
      registry_revision: "42"
      catalog_revision_ref: catalog:engineering@42
      activity_refs: '["act-retire-7"]'
    related_node_ids: [ToolRegistry, DeregistrationActivity]
    related_relation_ids: [ToolRegistry-part_of-CapabilityCatalog]

    source_claims: [moonweave-tool-registry-profile]
  - id: tool-registry-instance-application-tool-onboarding

    labels:
      zh: 应用函数工具登记实例
      en: Application function-tool onboarding instance
      ja: application function-tool onboarding instance

    descriptions:
      zh: ToolBench registry 实例：tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}；Semantic Kernel WeatherPlugin.get_weather(city:str) 注册实例。
      en: ToolBench registry instance: tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}; Semantic Kernel WeatherPlugin.get_weather(city:str) registration instance.
      ja: ToolBench registry 実例：tool_id=rapidapi-weather-api endpoint=/forecast。Semantic Kernel WeatherPlugin.get_weather(city:str) 登録実例。
    field_values:
      registry_revision: "42"
      catalog_revision_ref: catalog:support@42
      registry_id: support-tools
      provenance_policy: source-required-v1
    related_node_ids: [ToolRegistry, FunctionTool]
    related_relation_ids: [ToolRegistry-part_of-CapabilityCatalog]

    source_claims: [moonweave-tool-registry-profile]
parent_relation:
  id: ToolRegistry-part_of-CapabilityCatalog
  predicate: part_of
  target: concept:CapabilityCatalog
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是能力目录修订的不可变注册治理组成部分
    en: is an immutable registration-governance component of capability catalog revision
    ja: capability catalog revision の不変 registration-governance component である
  definition:
    zh: ToolRegistry 仅作为其 catalog_revision_ref 标识的 CapabilityCatalog 本地快照中的注册器修订存在；父目录拥有该 profile 副本与删除边界，独立活动和外部协议记录不属于该组合。
    en: ToolRegistry exists only as a registry revision in the CapabilityCatalog local snapshot identified by catalog_revision_ref; the parent catalog owns this profile copy and deletion boundary, while independent activities and external protocol records are outside the composition.
    ja: ToolRegistry は catalog_revision_ref が識別する CapabilityCatalog ローカル snapshot 内の registry revision としてのみ存在する。parent catalog はこの profile copy と deletion boundary を所有し、独立 activity と外部 protocol record は composition 外にある。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_part
    labels:
      zh: 包含注册器修订
      en: has registry revision
      ja: registry revision を持つ
  conditions: []
  temporal_scope: versioned
  boundary_context: This strict local composition is a versioned Moonweave catalog snapshot boundary, not an MCP registration service or Tool relation.
  constraints:
    - id: registry-parent-strict-versioned-composition
      severity: error
      expression_language: plain
      expression: ToolRegistry must carry catalog_revision_ref, may not outlive or be independently deleted from that parent catalog revision, and must not cascade deletion to activity_refs or source protocol records.
      explanation:
        zh: 注册器修订是目录快照的严格组成部分；活动只被引用且独立保留，协议来源记录始终位于本地删除边界之外。
        en: A registry revision is a strict component of a catalog snapshot; activities are only referenced and retained independently, and protocol source records always remain outside the local deletion boundary.
        ja: registry revision は catalog snapshot の strict component である。activity は reference のみで独立保持され、protocol source record は常にローカル deletion boundary 外に残る。
      source_claims: [moonweave-tool-registry-taxonomy]
  examples: []
  source_claims: [moonweave-tool-registry-taxonomy]
  distinct_fact_rationale:
    zh: 该关系表达本地快照所有权；活动使用注册器的出处事实由单独的 PROV 关系表达。
    en: This relation expresses local snapshot ownership; the provenance fact that an activity uses a registry is expressed by a separate PROV relationship.
    ja: この relation はローカル snapshot ownership を表す。activity が registry を使用する provenance fact は別の PROV relationship で表す。
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification — Tools
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    version: 2025-11-25
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Defines tools/list and list-changed notification, but no persistent registry lifecycle.
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: design-inference
    relevance: Defines immutable local ToolRegistry revision semantics, containment, and non-owning activity references.
source_claims:
  - id: mcp-tools-list-changed
    source: mcp-tools-2025-11-25
    supports: A server that declares tools listChanged may notify clients with notifications/tools/list_changed when its available-tool list changes.
    locator: "Capabilities; List Changed Notification"
    evidence_kind: normative
    confidence: high
  - id: moonweave-tool-registry-profile
    source: moonweave-ontology-design
    supports: ToolRegistry is an immutable Moonweave local registry-revision profile for auditable tool-reference registration and provenance; its activity references point to separately retained governance activities.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
  - id: moonweave-tool-registry-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave treats ToolRegistry as a strict immutable component of a CapabilityCatalog revision; its activity references are not composition and no local deletion cascades to external protocol records.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
