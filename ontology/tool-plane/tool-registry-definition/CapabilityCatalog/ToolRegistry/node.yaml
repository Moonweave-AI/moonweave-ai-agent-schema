      expected_result:
        zh: 保留 ToolRegistry —is_a→ CapabilityCatalog，并按定义解释该方向。
        en: Retain ToolRegistry —is_a→ CapabilityCatalog and interpret that direction as defined.
        ja: ToolRegistry —is_a→ CapabilityCatalog を保持し定義どおり解釈します。
      why_valid_or_invalid:
        zh: 场景同时满足来源身份、目标身份和本关系要求的业务条件。
        en: The case satisfies the source identity, target identity, and the business condition required by this relation.
        ja: case は source identity、target identity、relation が要求する business condition を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-registry-009
    - id: ToolRegistry-is_a-CapabilityCatalog-example-boundary-manual-001
      kind: boundary
      labels:
        zh: ToolRegistry-is_a-CapabilityCatalog 边界例
        en: ToolRegistry-is_a-CapabilityCatalog boundary case
        ja: ToolRegistry-is_a-CapabilityCatalog 境界例
      scenario_id: null
      descriptions:
        zh: 单次 tools/list 页面随游标和会话变化。
        en: One tools/list page varies with cursor and session.
        ja: 一回の tools/list page は cursor と session で変化します。
      field_values: {}
      related_node_ids:
        - ToolRegistry
        - CapabilityCatalog
      related_relation_ids:
        - ToolRegistry-is_a-CapabilityCatalog
      expected_result:
        zh: 不以该场景建立 ToolRegistry-is_a-CapabilityCatalog，并把对象保留在其正确身份中。
        en: Do not assert ToolRegistry-is_a-CapabilityCatalog for this case; retain each object under its correct identity.
        ja: この case では ToolRegistry-is_a-CapabilityCatalog を assertion せず各 object の正しい identity を保持します。
      why_valid_or_invalid:
        zh: 场景缺少本关系要求的决定性条件；相邻概念或时间接近不能补足该条件。
        en: The case lacks the relation's decisive condition; conceptual adjacency or temporal proximity cannot supply it.
        ja: case は relation の decisive condition を欠き、concept adjacency や temporal proximity では補えません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-tool-registry-010
  source_claims:
