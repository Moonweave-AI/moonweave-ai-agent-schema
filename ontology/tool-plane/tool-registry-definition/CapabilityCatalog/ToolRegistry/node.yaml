schema: moonweave.ai/ontology-node/v1
id: ToolRegistry
kind: concept
status: accepted
labels:
  zh: 工具注册表
  en: Tool Registry
  ja: ツールレジストリ
semantics:
  short_definition:
    zh: 工具注册表是持久保存工具注册条目及治理范围的目录。
    en: A Tool Registry is a persistent catalog of tool registry entries and their governance scope.
    ja: ツールレジストリは tool registry entry と governance scope の永続目録です。
  definition:
    zh: 工具注册表是一种能力目录，复用 catalog_id 作为稳定身份，并以环境与治理边界限定 RegistryEntry 成员；它不复制 ToolDefinition，不是 tools/list 的一次响应，也不承担查询排序。
    en: A Tool Registry is a CapabilityCatalog that reuses catalog_id as its stable identity and scopes RegistryEntry membership by environment and governance boundary. It does not copy ToolDefinitions, is not one tools/list response, and performs no query ranking.
    ja: ツールレジストリは catalog_id を安定 identity として再利用し、environment と governance boundary で RegistryEntry membership を限定する CapabilityCatalog です。ToolDefinition copy、tools/list response、query ranking ではありません。
  why_needed:
    zh: 注册表把持久成员关系从定义内容、协议列举消息与发现查询中分离，形成注册闭环的稳定集合节点。
    en: The registry separates persistent membership from definition content, protocol listing messages, and discovery queries, forming the stable collection in the registration loop.
    ja: persistent membership を definition content、protocol list message、discovery query から分離し登録 loop の安定 collection を作ります。
  includes:
    - zh: 纳入具有稳定注册表标识、环境范围和条目成员关系的工具目录。
      en: Includes tool catalogs with a stable registry ID, environment scope, and entry membership.
      ja: stable registry ID、environment scope、entry membership を持つ tool catalog を含みます。
  excludes:
    - zh: 排除工具定义集合副本、临时 tools/list 页面、能力表面和查询候选集。
      en: Excludes copied definition sets, transient tools/list pages, capability surfaces, and query candidate sets.
      ja: definition set copy、transient tools/list page、capability surface、query candidate set を除きます。
  semantic_kind: collection
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: environment
      labels:
        zh: 注册表环境
        en: registry environment
        ja: registry 環境
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 注册表环境作为 ToolRegistry 节点内部信息保存，不建立同名图节点。
        en: registry environment is stored as information on the ToolRegistry node and does not create a namesake graph node.
        ja: registry 環境は ToolRegistry node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: production
      source_claims:
        - claim-tool-registry-003
        - claim-tool-registry-004
  constraints: []
  required_relation_constraints: []
examples:
  - id: ToolRegistry-example-positive-manual-001
    kind: positive
    labels:
      zh: ToolRegistry 正例
      en: ToolRegistry positive case
      ja: ToolRegistry 正例
    scenario_id: null
    descriptions:
      zh: 生产工具注册表包含 weather、CRM 和工单工具的环境化条目。
      en: A production tool registry contains environment-scoped entries for weather, CRM, and ticketing tools.
      ja: 本番 tool registry が weather、CRM、ticketing tool の environment-scoped entry を含みます。
    field_values:
      catalog_id: catalog:enterprise-tools
      governance_scope: enterprise-production
      membership_policy:
        admission: reviewed
        required_approvals:
          - security
          - operations
      environment: production
    related_node_ids:
      - ToolRegistry
      - CapabilityCatalog
    related_relation_ids:
      - ToolRegistry-is_a-CapabilityCatalog
    expected_result:
      zh: 集合归 ToolRegistry，成员仅为 RegistryEntry。
      en: The collection is ToolRegistry and its direct members are RegistryEntries.
      ja: collection を ToolRegistry とし direct member は RegistryEntry のみです。
    why_valid_or_invalid:
      zh: 条目承载成员身份，定义通过条目引用而不被复制。
      en: Entries carry membership identity and reference definitions without copying them.
      ja: entry が membership identity を持ち definition を copy せず参照するためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-registry-005
      - claim-tool-registry-006
  - id: ToolRegistry-example-boundary-manual-001
    kind: boundary
    labels:
      zh: ToolRegistry 边界例
      en: ToolRegistry boundary case
      ja: ToolRegistry 境界例
    scenario_id: null
    descriptions:
      zh: 客户端请求 tools/list 后收到当前可见工具的分页结果。
      en: A client requests tools/list and receives a page of currently visible tools.
      ja: client が tools/list を要求し current visible tool の page を得ます。
    field_values: {}
    related_node_ids:
      - ToolRegistry
      - CapabilityCatalog
    related_relation_ids:
      - ToolRegistry-is_a-CapabilityCatalog
    expected_result:
      zh: 分页结果是协议消息，不是 ToolRegistry。
      en: The page is a protocol message, not the ToolRegistry.
      ja: page は protocol message で ToolRegistry ではありません。
    why_valid_or_invalid:
      zh: 响应依赖会话与分页游标，缺少独立目录治理身份。
      en: The response depends on session and cursor and lacks independent catalog-governance identity.
      ja: response は session/cursor に依存し独立 catalog governance identity がないためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-registry-007
      - claim-tool-registry-008
external_mappings: []
applicability:
  - core
sibling_differentiation: []
