schema: moonweave.ai/ontology-node/v1
id: CapabilityCatalog
kind: concept
labels:
  zh: 能力目录 profile
  en: Capability catalog profile
  ja: 能力カタログ profile
semantics:
  short_definition:
    zh: 汇总能力定义引用的 Moonweave 本地目录 profile。
    en: A Moonweave local catalog profile that aggregates references to capability definitions.
    ja: 能力定義への参照を集約する Moonweave ローカルカタログ profile。
  definition:
    zh: >
      CapabilityCatalog 是用于稳定标识、分组和发布能力定义引用的不可变 Moonweave 本地目录修订 profile。每次条目组成、发布表面或治理配置变化都创建新的 catalog_revision；删除一个本地目录修订只删除其 profile 组件和引用，不删除协议记录。它可以从 MCP
      的 tools/list、prompts/list 或 resources/list 结果整理条目，也可整理在 OpenAI Responses API 请求的
      tools 参数中声明的应用函数工具；它不是
      官方 MCP Registry REST 服务、MCP Tool 或 OpenAI API 对象。
    en: >
      CapabilityCatalog is an immutable Moonweave local catalog-revision profile for stable identification, grouping, and
      publication of capability-definition references. Every change to entry composition, publication surface, or governance configuration creates a new catalog_revision; deleting a local catalog revision deletes only its profile components and references, not protocol records. It may organize entries derived from MCP
      tools/list, prompts/list, or resources/list, or application-configured OpenAI function tools
      declared in a Responses API request's tools parameter; it is
      not the MCP Registry REST service, an MCP Tool, or an OpenAI API object.
    ja: >
      CapabilityCatalog は、能力定義参照の安定識別、グループ化、公開のための不変 Moonweave local catalog-revision profile である。entry composition、publication surface、governance configuration の変更ごとに新しい catalog_revision を作成する。ローカル catalog revision の削除はその profile component と reference だけを削除し protocol record を削除しない。
      MCP の tools/list、prompts/list、resources/list から得た項目や OpenAI Responses API 要求の tools parameter
      で宣言された application function tool を
      整理できるが、独立ホストされた MCP Registry REST service、MCP Tool、OpenAI API object ではない。
  why_needed:
    zh: 本地系统需要在不篡改协议记录的前提下，保存分组、归属和发布选择。
    en: A local system needs to retain grouping, ownership, and publication choices without altering protocol records.
    ja: ローカル system には、protocol record を変更せずにグループ化、所有、公開選択を保持する必要がある。
  includes:
    - zh: 带稳定 catalog_id 的本地能力引用集合。
      en: A local collection of capability references with a stable catalog_id.
      ja: 安定した catalog_id を持つローカル能力参照の集合。
    - zh: 对 MCP 列表结果或 OpenAI 请求中声明的应用函数工具的来源标记。
      en: Provenance markers for MCP list results or application function tools declared in an OpenAI request.
      ja: MCP list result または OpenAI 要求で宣言された application function tool の来歴 marker。
  excludes:
    - zh: 独立托管的 MCP Registry REST 服务及其发布的 server metadata。
      en: The independently hosted MCP Registry REST service and its published server metadata.
      ja: 独立ホストされた MCP Registry REST service とその公開 server metadata。
    - zh: 单次 tools/list、prompts/list 或 resources/list 响应本身。
      en: A single tools/list, prompts/list, or resources/list response itself.
      ja: 単一の tools/list、prompts/list、resources/list response 自体。
  semantic_kind: entity
  aliases:
    - language: en
      value: local capability catalog
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      目录将协议记录的引用与本地发布元数据分开保存，并以 catalog_revision 冻结每个本地快照。例如，它可以引用某次 tools/list 的 Tool 名称和 schema
      摘要，但必须保留服务器、协议版本和获取时间，不能把目录条目回写成协议字段或修改来源记录。
    en: >
      The catalog stores references to protocol records separately from local publication metadata and freezes each local snapshot with catalog_revision.
      For example, it may retain a Tool name and schema digest from tools/list, but it must retain
      server, protocol version, and retrieval time rather than write catalog fields back as protocol fields or mutate source records.
    ja: >
      カタログは protocol record への参照をローカル公開 metadata と分離して保存し、catalog_revision で各ローカル snapshot を固定する。例えば tools/list の Tool 名と
      schema digest を保持できるが、catalog field を protocol field として書き戻したり source record を mutate したりせず、server、protocol version、
      取得時刻を保持しなければならない。
  typical_input:
    - description:
        zh: 来自 MCP tools/list 的工具记录快照。
        en: A snapshot of Tool records from MCP tools/list.
        ja: MCP tools/list からの Tool 記録 snapshot。
      format: |
        {"server":"files","tools":[{"name":"read_file","inputSchema":{"type":"object"}}]}
      source_claims: [mcp-list-records]
    - description:
        zh: OpenAI Responses API 的函数工具请求片段。
        en: OpenAI Responses API function-tool request fragment
        ja: OpenAI Responses API の function tool 要求断片。
      format: |
        {"tools":[{"type":"function","name":"lookup_ticket","description":"Look up a support ticket by identifier.","parameters":{"type":"object","properties":{"ticket_id":{"type":"string"}},"required":["ticket_id"],"additionalProperties":false},"strict":true}]}
      source_claims: [openai-function-tool-definition]
  typical_output:
    - description:
        zh: 本地目录条目引用，而不是协议响应。
        en: A local catalog entry reference, not a protocol response.
        ja: protocol response ではなくローカル catalog entry reference。
      format: |
        {"catalog_id":"engineering","catalog_revision":"42","entries":[{"source":"mcp://files","capability_id":"read_file"}]}
      source_claims: [moonweave-catalog-profile]
  reference_implementations:
    - name: MCP Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines discoverable Tool records returned by tools/list, distinct from a local catalog snapshot.
    - name: OpenAI Function Calling
      url: https://developers.openai.com/api/docs/guides/function-calling
      description: Defines function tools declared in a Responses API request's tools parameter.
structure:
  identity_keys: [catalog_id, catalog_revision]
  fields:
    - id: catalog_id
      labels:
        zh: 目录标识符
        en: Catalog identifier
        ja: カタログ識別子
      definitions:
        zh: 用于本地目录引用和审计的稳定标识符。
        en: A stable identifier for local catalog references and audit.
        ja: ローカル catalog 参照と監査のための安定識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: engineering-tools
      allowed_values: []
      source_claims: [moonweave-catalog-profile]
    - id: catalog_revision
      labels:
        zh: 目录修订
        en: Catalog revision
        ja: catalog revision
      definitions:
        zh: 标识不可变本地目录快照；条目、表面或注册器组成变化必须产生新修订，旧修订可独立保留或删除其本地 profile。
        en: Identifies an immutable local catalog snapshot; a change to entries, surfaces, or registry composition must produce a new revision, while an old revision may be retained or deleted as its own local profile.
        ja: 不変ローカル catalog snapshot を識別する。entry、surface、registry composition の変更は新 revision を生成し、旧 revision は独自のローカル profile として保持または削除できる。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "42"
      allowed_values: []
      source_claims: [moonweave-catalog-profile]
    - id: entries
      labels:
        zh: 能力引用条目
        en: Capability reference entries
        ja: 能力参照項目
      definitions:
        zh: 该不可变目录修订拥有的本地能力引用和严格子 profile；外部协议记录只被引用，不属于本地删除边界。
        en: Local capability references and strict child profiles owned by this immutable catalog revision; external protocol records are only referenced and remain outside the local deletion boundary.
        ja: この不変 catalog revision が所有するローカル capability reference と strict child profile。外部 protocol record は reference のみでローカル deletion boundary 外に残る。
      datatype: array
      required: true
      cardinality:
        min: 0
        max: null
      pattern: null
      example_value: '[{"source":"mcp://files","capability_id":"read_file"}]'
      allowed_values: []
      source_claims: [moonweave-catalog-profile]
    - id: provenance
      labels:
        zh: 来源信息
        en: Provenance
        ja: 来歴
      definitions:
        zh: 记录协议、服务器或应用配置来源及其取得时间。
        en: Records protocol, server, or application-configuration origin and retrieval time.
        ja: protocol、server、application configuration の出所と取得時刻を記録する。
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: '{"protocol":"MCP","server":"files","retrieved_at":"2026-07-18T00:00:00Z"}'
      allowed_values: []
      source_claims: [moonweave-catalog-profile]
  constraints:
    - id: catalog-does-not-rewrite-protocol-record
      severity: error
      expression_language: plain
      expression: A catalog revision must preserve provenance, identify catalog_revision, create a new revision rather than mutate local membership in place, and must not claim that its local fields are MCP or OpenAI wire fields.
      explanation:
        zh: 目录只组织引用和本地快照组件；它不能把本地分组或发布字段冒充为协议字段，也不能删除来源协议记录。
        en: The catalog only organizes references and local snapshot components; it cannot present local grouping or publication fields as protocol fields or delete source protocol records.
        ja: catalog は reference とローカル snapshot component を整理するだけで、ローカル grouping や publication field を protocol field として提示したり source protocol record を削除したりできない。
      source_claims: [moonweave-catalog-profile]
  required_relations: []
examples:
  - id: capability-catalog-positive-local-index

    labels:
      zh: 本地能力索引
      en: Local capability index
      ja: ローカル能力 index

    descriptions:
      zh: Gorilla APIBench 1645 API 注册（HuggingFace/TorchHub/TensorHub）；ToolBench 16000+ RapidAPI 工具注册表；Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") 插件注册。
      en: Gorilla APIBench registers 1645 APIs (HuggingFace/TorchHub/TensorHub); ToolBench 16000+ RapidAPI tool registry; Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") plugin registration.
      ja: Gorilla APIBench が 1645 API を登録。ToolBench 16000+ RapidAPI tool registry。Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") プラグイン登録。
    field_values:
      catalog_revision: "42"
      catalog_id: engineering-tools
      entries:
        - source: mcp://files
          capability_id: read_file
      provenance:
        protocol: MCP
        server: files
        retrieved_at: "2026-07-18T00:00:00Z"
    related_node_ids: [CapabilityCatalog, CapabilityDefinition]
    related_relation_ids: []

    source_claims: [moonweave-catalog-profile]
  - id: capability-catalog-counterexample-mcp-registry

    labels:
      zh: 伪称 MCP 注册表
      en: Claimed MCP registry
      ja: MCP registry と偽称する例

    descriptions:
      zh: 反例：ToolBench 注册未验证 RapidAPI key 的 endpoint；Gorilla registry 混入 hallucinated API 无 retriever 校验；Semantic Kernel plugin 名冲突未检测。
      en: Counterexample: ToolBench registers RapidAPI endpoint without key verification; Gorilla registry includes hallucinated API without retriever validation; Semantic Kernel plugin name collision undetected.
      ja: 反例：ToolBench が RapidAPI key 未検証 endpoint を登録。Gorilla registry に retriever 未検証 hallucinated API 混入。
    field_values:
      catalog_revision: "42"
      catalog_id: engineering-tools
    related_node_ids: [CapabilityCatalog]
    related_relation_ids: []

    source_claims: [moonweave-catalog-profile, mcp-registry-rest-service]
  - id: capability-catalog-boundary-list-response

    labels:
      zh: 列表响应与目录边界
      en: Boundary between list response and catalog
      ja: list response と catalog の境界

    descriptions:
      zh: Gorilla 离线 APIBench 索引 vs ToolBench 在线 RapidAPI catalog vs Semantic Kernel 本地 plugin 注册的持久化边界。
      en: Persistence boundary among Gorilla offline APIBench index, ToolBench online RapidAPI catalog, Semantic Kernel local plugin registration.
      ja: Gorilla offline APIBench index、ToolBench online RapidAPI catalog、Semantic Kernel ローカル plugin 登録の永続化境界。
    field_values:
      catalog_id: engineering-tools
      catalog_revision: "42"
      protocol_method: tools/list
    related_node_ids: [CapabilityCatalog]
    related_relation_ids: []

    source_claims: [mcp-list-records, moonweave-catalog-profile]
  - id: capability-catalog-instance-openai-configuration

    labels:
      zh: 应用工具配置目录实例
      en: Application-tool configuration catalog instance
      ja: application-tool configuration catalog instance

    descriptions:
      zh: "ToolBench registry 实例：tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}；Semantic Kernel WeatherPlugin.get_weather(city:str) 注册实例。"
      en: "ToolBench registry instance: tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}; Semantic Kernel WeatherPlugin.get_weather(city:str) registration instance."
      ja: ToolBench registry 実例：tool_id=rapidapi-weather-api endpoint=/forecast。Semantic Kernel WeatherPlugin.get_weather(city:str) 登録実例。
    field_values:
      catalog_revision: "42"
      catalog_id: support-tools
      entries:
        - source: application://support-agent/responses-request-42
          capability_id: lookup_ticket
          source_tool:
            type: function
            name: lookup_ticket
            description: Look up a support ticket by identifier.
            parameters:
              type: object
              properties:
                ticket_id:
                  type: string
              required: [ticket_id]
              additionalProperties: false
            strict: true
      provenance:
        source_kind: application-configuration
        protocol: OpenAI-Responses-API
        request_parameter: tools
        configured_at: "2026-07-18T00:00:00Z"
    related_node_ids: [CapabilityCatalog, ToolSpecification]
    related_relation_ids: []

    source_claims: [moonweave-catalog-profile, openai-function-tool-definition]
parent_relation: null
relations: []
