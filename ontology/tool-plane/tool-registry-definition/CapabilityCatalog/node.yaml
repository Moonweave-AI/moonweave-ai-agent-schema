schema: moonweave.ai/ontology-node/v1
id: CapabilityCatalog
kind: concept
status: accepted
labels:
  zh: 能力目录
  en: Capability Catalog
  ja: 能力目録
semantics:
  short_definition:
    zh: 能力目录是持久组织多类能力定义或发布集合的目录。
    en: A Capability Catalog persistently organizes multiple kinds of capability definitions or published collections.
    ja: 能力目録は複数種類の能力定義や公開集合を永続的に整理する目録です。
  definition:
    zh: 能力目录是一种集合，以稳定目录标识、治理范围和成员规则为身份；它是工具注册表与能力表面的共同上位概念，但不把工具、提示和资源强行视为同一种定义。
    en: A Capability Catalog is a collection identified by a stable catalog ID, governance scope, and membership rules. It is the common upper concept of ToolRegistry and CapabilitySurface without treating tools, prompts, and resources as the same definition kind.
    ja: 能力目録は安定した目録 ID、統治範囲、所属規則で識別され、ToolRegistry と CapabilitySurface の共通上位概念ですが、ツール・prompt・resource を同一種別にはしません。
  why_needed:
    zh: 这个上位层把“长期登记集合”和“面向受众的发布集合”联系起来，同时保留两者不同的成员生命周期。
    en: This upper layer connects persistent registration collections with audience-facing publication collections while preserving their different membership lifecycles.
    ja: 永続登録集合と受け手向け公開集合を結びつけつつ、異なる所属ライフサイクルを保持します。
  includes:
    - zh: 纳入具有独立标识、成员准入规则和治理范围的能力集合。
      en: Includes capability collections with their own identity, admission rules, and governance scope.
      ja: 独立 ID、加入規則、統治範囲を持つ能力集合を含みます。
  excludes:
    - zh: 排除一次 tools/list 响应页、查询结果列表和单个工具定义。
      en: Excludes one tools/list response page, a query result list, and an individual tool definition.
      ja: 一回の tools/list 応答 page、検索結果 list、単一 tool definition を除きます。
  semantic_kind: collection
  aliases: []
structure:
  identity_keys:
    - catalog_id
  fields:
    - id: catalog_id
      labels:
        zh: 目录标识
        en: catalog ID
        ja: 目録 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 目录标识作为 CapabilityCatalog 节点内部信息保存，不建立同名图节点。
        en: catalog ID is stored as information on the CapabilityCatalog node and does not create a namesake graph node.
        ja: 目録 IDは CapabilityCatalog node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: catalog:enterprise-tools
      source_claims:
        - claim-capability-catalog-004
        - claim-capability-catalog-005
        - claim-capability-catalog-006
    - id: governance_scope
      labels:
        zh: 治理范围
        en: governance scope
        ja: 統治範囲
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 治理范围作为 CapabilityCatalog 节点内部信息保存，不建立同名图节点。
        en: governance scope is stored as information on the CapabilityCatalog node and does not create a namesake graph node.
        ja: 統治範囲は CapabilityCatalog node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value: enterprise-production
      source_claims:
        - claim-capability-catalog-007
        - claim-capability-catalog-008
        - claim-capability-catalog-009
    - id: membership_policy
      labels:
        zh: 成员规则
        en: membership policy
        ja: 所属規則
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 成员规则作为 CapabilityCatalog 节点内部信息保存，不建立同名图节点。
        en: membership policy is stored as information on the CapabilityCatalog node and does not create a namesake graph node.
        ja: 所属規則は CapabilityCatalog node 内情報として保持し、同名 graph node を作りません。
      allowed_values: []
      pattern: null
      example_value:
        admission: reviewed
      source_claims:
        - claim-capability-catalog-010
        - claim-capability-catalog-011
        - claim-capability-catalog-012
  constraints:
    - id: capability-catalog-single-inherited-identity
      severity: error
      expression_language: plain
      expression: Every accepted is_a specialization of CapabilityCatalog MUST reuse catalog_id and MUST NOT introduce a synonymous registry or surface ID.
      explanations:
        zh: CapabilityCatalog 的 accepted 下位类复用 catalog_id；环境、治理范围和成员规则描述目录状态，不产生第二套注册表身份。
        en: Accepted CapabilityCatalog subtypes reuse catalog_id; environment, governance scope, and membership policy describe catalog state rather than creating a second registry identity.
        ja: CapabilityCatalog の accepted subtype は catalog_id を再利用し、environment・governance scope・membership policy は catalog state を記述して第二の registry identity を作りません。
      source_claims:
        - claim-capability-catalog-013
  required_relation_constraints: []
examples:
  - id: CapabilityCatalog-example-positive-manual-001
    kind: positive
    labels:
      zh: CapabilityCatalog 正例
      en: CapabilityCatalog positive case
      ja: CapabilityCatalog 正例
    scenario_id: null
    descriptions:
      zh: 企业目录同时治理工具注册表和只向生产模型发布的能力表面。
      en: An enterprise catalog governs a tool registry and a capability surface published only to production models.
      ja: 企業目録が tool registry と本番 model 向け capability surface を統治します。
    field_values:
      catalog_id: catalog:enterprise-capabilities
      governance_scope: enterprise-production
      membership_policy:
        admission: reviewed
        required_approvals:
          - security
          - operations
    related_node_ids:
      - CapabilityCatalog
    related_relation_ids: []
    expected_result:
      zh: 二者共享能力目录上位节点，但各自保留成员规则。
      en: Both share CapabilityCatalog as an upper node while retaining their membership rules.
      ja: 両者は CapabilityCatalog を共有しつつ所属規則を保持します。
    why_valid_or_invalid:
      zh: 该对象描述跨集合治理，而不是某一种成员记录。
      en: The object describes governance across collections rather than one member record.
      ja: 単一 member record ではなく集合横断統治を表すためです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-capability-catalog-014
      - claim-capability-catalog-015
      - claim-capability-catalog-016
  - id: CapabilityCatalog-example-boundary-manual-001
    kind: boundary
    labels:
      zh: CapabilityCatalog 边界例
      en: CapabilityCatalog boundary case
      ja: CapabilityCatalog 境界例
    scenario_id: null
    descriptions:
      zh: 客户端收到含五十个工具的临时 tools/list 响应。
      en: A client receives a transient tools/list response containing fifty tools.
      ja: client が五十 tool を含む一時的 tools/list response を受け取ります。
    field_values: {}
    related_node_ids:
      - CapabilityCatalog
    related_relation_ids: []
    expected_result:
      zh: 响应是协议消息，不建立能力目录身份。
      en: The response is a protocol message and does not establish a CapabilityCatalog identity.
      ja: 応答は protocol message であり能力目録 identity を作りません。
    why_valid_or_invalid:
      zh: 分页响应随会话变化，缺少持久目录标识与治理规则。
      en: A paged response varies by session and lacks a persistent catalog ID and governance rules.
      ja: page 応答は session ごとに変わり、永続 ID と統治規則がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-capability-catalog-017
      - claim-capability-catalog-018
      - claim-capability-catalog-019
external_mappings: []
