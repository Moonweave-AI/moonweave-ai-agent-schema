  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification — Tools
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    version: 2025-11-25
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Defines tools/list and Tool records that a local catalog may reference as a snapshot source.
  - id: mcp-registry-faq
    title: Model Context Protocol — Registry Frequently Asked Questions
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/registry/faq
    accessed_on: 2026-07-19
    source_type: official-doc
    relevance: Defines the Official MCP Registry as a separately hosted service and its Registry API as REST, establishing a protocol-service boundary for the local catalog profile.
  - id: openai-function-calling
    title: OpenAI API — Function Calling
    publisher: OpenAI
    url: https://developers.openai.com/api/docs/guides/function-calling
    accessed_on: 2026-07-18
    source_type: official-doc
    relevance: Defines function tools declared in a Responses API request's tools parameter and their JSON Schema fields.
  - id: moonweave-ontology-design
    title: Moonweave Agent Ontology Schema repository
    publisher: Moonweave-AI
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: design-inference
    relevance: Repository provenance for the local immutable capability-catalog revision design and its composition boundaries.
source_claims:
  - id: mcp-list-records
    source: mcp-tools-2025-11-25
    supports: MCP tools/list returns a page of currently discoverable Tool records and can be paginated.
    locator: "Listing Tools"
    evidence_kind: normative
    confidence: high
  - id: mcp-registry-rest-service
    source: mcp-registry-faq
    supports: The MCP Registry FAQ defines the Official MCP Registry as the service hosted at registry.modelcontextprotocol.io and the Official MCP Registry API as a REST API served there.
    locator: "What is the difference between Official MCP Registry, MCP Registry, MCP registry, MCP Registry API, etc?"
    evidence_kind: official-doc
    confidence: high
  - id: openai-function-tool-definition
    source: openai-function-calling
    supports: OpenAI function tools are declared in the tools parameter of each API request; a function definition uses type "function", name, description, parameters as JSON Schema, and may set strict.
    locator: "Function calling > Defining functions"
    evidence_kind: official-doc
    confidence: high
  - id: moonweave-catalog-profile
    source: moonweave-ontology-design
    supports: CapabilityCatalog is an immutable Moonweave local catalog-revision profile for grouping capability references and preserving their provenance without owning source protocol records.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high