schema: moonweave.ai/ontology-node/v1
id: tool-registry-definition
kind: module
labels:
  zh: 工具目录与定义配置
  en: Tool catalog and definition profiles
  ja: ツールカタログと定義プロファイル
semantics:
  short_definition:
    zh: 用于组织可调用能力描述及其本地目录配置的 Moonweave 模块。
    en: A Moonweave module for organizing callable-capability descriptions and local catalog profiles.
    ja: 呼び出し可能な能力記述とローカルカタログプロファイルを編成する Moonweave モジュール。
  definition:
    zh: >
      本模块是 Moonweave 的分类边界，不是 MCP 或 OpenAI 的 wire object。它把 MCP 的 Tool、Prompt、
      Resource 与 ResourceTemplate 记录，以及 OpenAI 函数工具和 Agents SDK 工具类别，放在可比较的本地
      定义与目录配置中。它不把不同协议的字段、生命周期或执行模型等同起来。
    en: >
      This module is a Moonweave taxonomy boundary, not an MCP or OpenAI wire object. It places
      MCP Tool, Prompt, Resource, and ResourceTemplate records alongside OpenAI function tools and
      Agents SDK tool categories in comparable local definition and catalog profiles. It does not
      equate their fields, lifecycle, or execution models.
    ja: >
      このモジュールは Moonweave の分類境界であり、MCP または OpenAI の wire object ではない。
      MCP の Tool、Prompt、Resource、ResourceTemplate の記録と、OpenAI 関数ツールおよび Agents SDK の
      ツール分類を、比較可能なローカル定義・カタログプロファイルに配置する。各プロトコルのフィールド、
      ライフサイクル、実行モデルを同一視しない。
  why_needed:
    zh: >
      调用方需要知道可用能力的名称、输入契约和来源；维护方也需要避免把发现结果、运行时对象与本地目录
      记录混为一谈。本模块提供这种边界，而实际发现和调用仍由各协议处理。
    en: >
      Callers need names, input contracts, and provenance for available capabilities, while
      maintainers need to keep discovery results, runtime objects, and local catalog records
      distinct. This module supplies that boundary; each protocol still handles discovery and calls.
    ja: >
      呼び出し側には利用可能な能力の名前、入力契約、来歴が必要であり、保守側には発見結果、実行時 object、
      ローカルカタログ記録を区別する必要がある。本モジュールはその境界を提供し、発見と呼び出しは各
      プロトコルに委ねる。
  includes:
    - zh: MCP Tool、Prompt、Resource 和 ResourceTemplate 的协议对齐描述。
      en: Protocol-aligned descriptions of MCP Tool, Prompt, Resource, and ResourceTemplate records.
      ja: MCP Tool、Prompt、Resource、ResourceTemplate 記録に整合した記述。
    - zh: OpenAI 函数工具和 Agents SDK 工具类别的运行时适配描述。
      en: Runtime-adaptation descriptions for OpenAI function tools and Agents SDK tool categories.
      ja: OpenAI 関数ツールと Agents SDK ツール分類の実行時適応記述。
    - zh: 明确标记为本地 profile 的目录、发布、注册和元数据配置。
      en: Catalog, publication, registration, and metadata profiles explicitly marked local.
      ja: ローカル profile と明示したカタログ、公開、登録、メタデータの構成。
  excludes:
    - zh: MCP 的 tools/call、prompts/get 或 resources/read 的实际调用与返回内容。
      en: Actual MCP tools/call, prompts/get, or resources/read invocation and returned content.
      ja: MCP の tools/call、prompts/get、resources/read の実呼び出しおよび返却 content。
    - zh: 访问控制决定、审批执行和运行时调度策略。
      en: Access-control decisions, approval execution, and runtime scheduling policy.
      ja: アクセス制御の決定、承認実行、実行時スケジューリング方針。
  semantic_kind: module-boundary
  aliases:
    - language: en
      value: callable capability profiles
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      MCP 服务器通过 tools/list、prompts/list 和 resources/list 返回当前可发现记录；OpenAI 请求把函数工具
      schema 放入 tools 数组；Agents SDK 则把函数、托管工具、MCP 工具和本地运行时工具组合到 Agent。本模块只
      记录这些接口的定义边界和本地整理方式，绝不替代协议消息。
    en: >
      MCP servers return currently discoverable records through tools/list, prompts/list, and
      resources/list; OpenAI requests place function-tool schemas in a tools array; and the
      Agents SDK combines function, hosted, MCP, and local-runtime tools on an Agent. This module
      records those definition boundaries and local organization only; it never replaces protocol messages.
    ja: >
      MCP サーバーは tools/list、prompts/list、resources/list で現在発見可能な記録を返し、OpenAI request は
      関数ツール schema を tools 配列に入れ、Agents SDK は関数、hosted、MCP、local-runtime ツールを Agent に
      組み合わせる。本モジュールはそれらの定義境界とローカル整理だけを記録し、プロトコル message を置換しない。
  typical_input:
    - description:
        zh: MCP 客户端请求当前工具记录。
        en: An MCP client requests current tool records.
        ja: MCP クライアントが現在の tool 記録を要求する。
      format: |
        {"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}
      source_claims: [mcp-tools-list]
    - description:
        zh: OpenAI Responses API 的函数工具定义。
        en: A function-tool definition for the OpenAI Responses API.
        ja: OpenAI Responses API 用の関数ツール定義。
      format: |
        {"type":"function","name":"get_weather","description":"Read weather","parameters":{"type":"object","properties":{"city":{"type":"string"}},"required":["city"],"additionalProperties":false},"strict":true}
      source_claims: [openai-function-tool-shape]
  typical_output:
    - description:
        zh: 返回可发现 MCP 工具记录的列表响应。
        en: A list response containing discoverable MCP Tool records.
        ja: 発見可能な MCP Tool 記録を含む list response。
      format: |
        {"tools":[{"name":"get_weather","inputSchema":{"type":"object","properties":{"city":{"type":"string"}},"required":["city"]}}]}
      source_claims: [mcp-tools-list]
  reference_implementations:
    - name: MCP Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Current MCP Tool record, tools/list, and tools/call specification.
    - name: MCP Prompts
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
      description: Current MCP Prompt record, prompts/list, and prompts/get specification.
    - name: MCP Resources
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
      description: Current MCP Resource and ResourceTemplate record specification.
    - name: OpenAI Function Calling
      url: https://developers.openai.com/api/docs/guides/function-calling
      description: Current OpenAI function-tool definition and strict-mode guidance.
    - name: OpenAI Agents SDK Tools
      url: https://openai.github.io/openai-agents-python/tools/
      description: Current Agents SDK hosted, local-runtime, function, and MCP tool categories.
structure:
  identity_keys: [module_scope_id]
  fields:
    - id: module_scope_id
      labels: {zh: 模块范围标识, en: Module scope identifier, ja: モジュール範囲識別子}
      definitions:
        zh: 此本体模块的稳定标识，仅用于本地目录和审计，不是 MCP 或 OpenAI 协议字段。
        en: Stable identifier of this ontology module for local cataloging and audit; it is not an MCP or OpenAI protocol field.
        ja: ローカルのカタログ化と監査のための本体モジュールの安定識別子であり、MCP または OpenAI のプロトコル項目ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^tool-registry-definition$'
      example_value: tool-registry-definition
      allowed_values: [tool-registry-definition]
      source_claims: [moonweave-registry-module-boundary]
    - id: source_protocol_boundary
      labels: {zh: 来源协议边界, en: Source-protocol boundary, ja: source-protocol boundary}
      definitions:
        zh: 标识被引用的能力定义遵循 MCP、OpenAI、Agents SDK 或本地 profile 边界。
        en: Identifies whether a referenced capability definition follows MCP, OpenAI, Agents SDK, or a local profile boundary.
        ja: 参照される capability definition が MCP、OpenAI、Agents SDK、または local profile boundary に従うかを識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp-2025-11-25
      source_claims: [mcp-tools-list, openai-function-tool-shape, moonweave-registry-module-boundary]
  constraints:
    - id: registry-module-local-profile-boundary
      severity: error
      expression_language: plain
      expression: A local catalog, registry, runtime binding, or registration activity in this module must identify its source boundary and must not be presented as a native MCP or OpenAI payload.
      explanation:
        zh: 本地目录与协议 wire 对象必须分层；不能把本地 profile 字段冒充为 tools/list 或 function 定义字段。
        en: Local catalog records and protocol wire objects must remain layered; local profile fields must not masquerade as tools/list or function-definition fields.
        ja: local catalog record と protocol wire object は層別に保たれ、local profile field を tools/list または function-definition field のように見せてはならない。
      source_claims: [moonweave-registry-module-boundary, mcp-tools-list]
    - id: registry-module-no-execution-claims
      severity: error
      expression_language: plain
      expression: Definition and catalog records in this module describe discoverable contracts and local membership; they must not assert tools/call execution, tool results, or authorization grants.
      explanation:
        zh: 定义与目录只回答“有什么、如何描述、在哪个修订中可见”，不回答“是否已调用或已授权”。
        en: Definitions and catalogs answer what exists, how it is described, and in which revision it is visible—not whether it was invoked or authorized.
        ja: definition と catalog は何が存在し、どう記述され、どの revision で見えるかに答え、呼び出されたか、許可されたかには答えない。
      source_claims: [moonweave-registry-module-boundary, mcp-tools-list]
  required_relations: []
