schema: moonweave.ai/ontology-node/v1
id: tool-registry-definition
kind: module
labels:
  zh: 能力目录与定义
  en: Capability catalogs and definitions
  ja: 能力カタログと定義
semantics:
  short_definition:
    zh: 维护跨请求稳定的能力身份、版本化定义与目录成员关系，说明“有什么、如何描述、在哪个目录版可见”的注册模块。
    en: Registry module maintaining durable capability identities, versioned definitions, and catalog membership across requests—what exists, how it is described, and in which catalog revision it is visible.
    ja: request を跨ぐ capability identity/版管理 definition/catalog membership を維持し「何が存在しどう記述されどの catalog 版で見えるか」を示す registry module。
  definition:
    zh: 能力目录与定义以 CapabilityCatalog 为根，拥有 ToolDefinition、PromptDefinition、ResourceDefinition、RegistryEntry 与 RegistrationActivity 等跨查询持续的对象。它回答稳定工具合同、JSON Schema 输入输出、托管/本地/函数/MCP 提供方式，以及注册、发布与弃用活动，但不记录一次 ToolSearch 的候选排名或 ToolCallAttempt 的参数绑定。Gorilla APIBench 与 LangChain BaseTool/StructuredTool 都强调“定义先于调用”；MCP Tool 数据类型（name、description、inputSchema）是 registry 侧合同，tools/list 页面归 MCP 传输模块。
    en: Capability catalogs and definitions roots in CapabilityCatalog and owns objects that persist across queries such as ToolDefinition, PromptDefinition, ResourceDefinition, RegistryEntry, and RegistrationActivity. It answers stable tool contracts, JSON Schema inputs and outputs, hosted/local/function/MCP provisioning forms, and register/publish/deprecate activities, but not one ToolSearch candidate ranking or ToolCallAttempt argument binding. Gorilla APIBench and LangChain BaseTool/StructuredTool both treat definition-before-call as primary; MCP Tool datatype fields (name, description, inputSchema) are registry-side contracts while tools/list pages belong to MCP transport.
    ja: capability catalogs/definitions は CapabilityCatalog root で ToolDefinition/PromptDefinition/ResourceDefinition/RegistryEntry/RegistrationActivity 等 query 横断 object を所有。stable tool contract/JSON Schema I/O/hosted-local-function-MCP provisioning/register-publish-deprecate activity を答えますが ToolSearch candidate ranking/ToolCallAttempt argument binding は記録しません。Gorilla APIBench/LangChain BaseTool/StructuredTool は definition-before-call を重視。MCP Tool datatype は registry-side contract、tools/list page は MCP transport module。
  why_needed:
    zh: 若工具名称、Schema 版本与目录成员随每次查询或调用漂移，发现、授权与执行都无法引用同一份可验证合同。
    en: If tool names, schema versions, and catalog membership drift with every query or call, discovery, authorization, and execution cannot reference one verifiable contract.
    ja: tool name/schema version/catalog membership が query/call ごとに drift すると discovery/authorization/execution が同一 verifiable contract を参照できません。
  includes:
    - zh: CapabilityCatalog、ToolRegistry、RegistryEntry、ToolDefinition、PromptDefinition、ResourceDefinition 与 RegistrationActivity/RegistryPublicationActivity。
      en: CapabilityCatalog, ToolRegistry, RegistryEntry, ToolDefinition, PromptDefinition, ResourceDefinition, and RegistrationActivity/RegistryPublicationActivity.
      ja: CapabilityCatalog/ToolRegistry/RegistryEntry/ToolDefinition/PromptDefinition/ResourceDefinition/RegistrationActivity/RegistryPublicationActivity。
    - zh: 版本化 JSON Schema 合同、ToolPermissionSpec 声明（不授予授权）与 CapabilitySurface 发布集合。
      en: Versioned JSON Schema contracts, ToolPermissionSpec declarations (not grants), and CapabilitySurface publication collections.
      ja: 版管理 JSON Schema contract/ToolPermissionSpec declaration（grant ではない）/CapabilitySurface publication collection。
  excludes:
    - zh: ToolCandidate、ToolSelectionDecision、ToolCallAttempt、MCPToolList 页面与 AuthorizationGrant。
      en: ToolCandidate, ToolSelectionDecision, ToolCallAttempt, MCPToolList pages, and AuthorizationGrant.
      ja: ToolCandidate/ToolSelectionDecision/ToolCallAttempt/MCPToolList page/AuthorizationGrant。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 注册层保存 durable contract。MCP Tool 类型要求 name、description、inputSchema（Draft 2020-12 JSON Schema）与可选 annotations。OpenAI function/tools 参数使用 JSON Schema，strict mode 可强制 additionalProperties=false。Anthropic tool 定义使用 input_schema 且 name 在工具集内唯一。LangChain StructuredTool 用 args_schema（Pydantic）生成 schema；Semantic Kernel 以 plugin/function 注册。Instructor 用 Pydantic response_model 约束结构化输出。Moonweave 用 definition digest/version 解析 RegistryEntry，禁止仅凭别名命中多个 active 版本。
    en: Registry stores durable contracts. MCP Tool requires name, description, inputSchema (Draft 2020-12 JSON Schema), and optional annotations. OpenAI function/tools parameters use JSON Schema with optional strict mode. Anthropic tool definitions use input_schema with unique names per toolset. LangChain StructuredTool derives schema from Pydantic args_schema; Semantic Kernel registers plugins/functions. Instructor constrains outputs with Pydantic response_model. Moonweave resolves RegistryEntry by definition digest/version and rejects ambiguous alias matches across multiple active versions.
    ja: registry は durable contract を保存。MCP Tool name/description/inputSchema/annotations、OpenAI JSON Schema strict、Anthropic input_schema unique name、LangChain StructuredTool Pydantic args_schema、Semantic Kernel plugin/function、Instructor Pydantic response_model。Moonweave は definition digest/version で RegistryEntry を解決し alias 複数 active version 曖昧一致を拒否。
  typical_input:
    - description: MCP Tool declaration in tools/list.
      format: |
        {"name":"get_weather","description":"Forecast","inputSchema":{"type":"object","properties":{"city":{"type":"string"}},"required":["city"]}}
      source_claims: [claim-tool-registry-definition-mcp]
    - description: OpenAI function tool schema.
      format: |
        {"type":"function","function":{"name":"get_weather","parameters":{"type":"object","properties":{"city":{"type":"string"}},"required":["city"]}}}
      source_claims: [claim-tool-registry-definition-openai]
  typical_output:
    - description: Moonweave-local RegistryEntry resolving one ToolDefinition version.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "registry_entry_id": "registry-entry-weather-v3-prod",
          "definition_ref": "weather@3.0.0#sha256:weather-definition-v3",
          "resolution_cardinality": 1
        }
      source_claims: [claim-tool-registry-definition-design]
  reference_implementations:
    - name: MCP Server Tools
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
      description: Tool datatype with inputSchema.
    - name: OpenAI Function Calling
      url: https://platform.openai.com/docs/guides/function-calling
      description: Function parameters JSON Schema.
    - name: Gorilla / APIBench
      url: https://arxiv.org/abs/2307.16789
      description: Large-scale API documentation and tool registry benchmark.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 模块标识, en: Module identifier, ja: モジュール識別子}
      definitions:
        zh: 能力目录与定义模块的稳定标识。
        en: Stable identifier for the capability catalogs and definitions module.
        ja: capability catalogs/definitions module の安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^tool-registry-definition$'
      example_value: tool-registry-definition
      allowed_values: []
      source_claims: [claim-tool-registry-definition-design]
    - id: registry_entry_id
      labels: {zh: 注册条目标识, en: Registry entry identifier, ja: 登録項目識別子}
      definitions:
        zh: 持久目录成员 RegistryEntry 标识，引用唯一 ToolDefinition 版本。
        en: Persistent catalog member RegistryEntry identifier referencing one ToolDefinition version.
        ja: 永続 catalog member RegistryEntry identifier。唯一 ToolDefinition version を参照。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: registry-entry-weather-v3-prod
      allowed_values: []
      source_claims: [claim-tool-registry-definition-design]
    - id: definition_digest
      labels: {zh: 定义摘要, en: Definition digest, ja: 定義ダイジェスト}
      definitions:
        zh: 不可变 ToolDefinition 内容摘要，用于版本解析与歧义检测。
        en: Immutable digest of ToolDefinition content for version resolution and ambiguity detection.
        ja: 不変 ToolDefinition 内容 digest。version resolution/ambiguity detection 用。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: sha256:weather-definition-v3
      allowed_values: []
      source_claims: [claim-tool-registry-definition-design]
  constraints: []
  required_relations: []
examples:
  - id: tool-registry-definition-example-mcp-tool-declaration
    labels:
      zh: MCP Tool 声明入注册表
      en: MCP Tool declaration in registry
      ja: MCP Tool 宣言を registry へ
    descriptions:
      zh: "RegistrationActivity 校验 MCP Tool inputSchema 后产生 registry-entry-weather-v3-prod，条目 describes weather@3.0.0。"
      en: "RegistrationActivity validates MCP Tool inputSchema and produces registry-entry-weather-v3-prod describing weather@3.0.0."
      ja: "RegistrationActivity が MCP Tool inputSchema を検証し registry-entry-weather-v3-prod を生成、weather@3.0.0 を describes。"
    example_source:
      product: Model Context Protocol
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
    field_values:
      registry_entry_id: registry-entry-weather-v3-prod
      tool_name: get_weather
    related_node_ids: [tool-registry-definition]
    related_relation_ids: []
    source_claims: [claim-tool-registry-definition-mcp]
  - id: tool-registry-definition-example-langchain-structured-tool
    labels:
      zh: LangChain StructuredTool schema
      en: LangChain StructuredTool schema
      ja: LangChain StructuredTool schema
    descriptions:
      zh: "StructuredTool 由 Pydantic args_schema 生成 JSON Schema 并注册为 FunctionTool 定义；draft 未注册不得推断 RegistryEntry。"
      en: "StructuredTool generates JSON Schema from Pydantic args_schema and registers as a function tool definition; drafts must not infer RegistryEntry."
      ja: "StructuredTool が Pydantic args_schema から JSON Schema を生成し function tool definition として登録。draft から RegistryEntry を推論しません。"
    example_source:
      product: LangChain
      url: https://python.langchain.com/docs/concepts/tools/
    field_values:
      tool_name: get_weather
      definition_state: draft
      registry_entry_id: null
    related_node_ids: [tool-registry-definition]
    related_relation_ids: []
    source_claims: [claim-tool-registry-definition-design]
  - id: tool-registry-definition-example-publication-surface
    labels:
      zh: 发布到 CapabilitySurface
      en: Publish to CapabilitySurface
      ja: CapabilitySurface へ公開
    descriptions:
      zh: "RegistryPublicationActivity 将 20 个 CapabilityDescriptor 发布到 surface-model-production v42；查询时加载候选不等于发布。"
      en: "RegistryPublicationActivity publishes 20 CapabilityDescriptors to surface-model-production v42; query-time candidate loading is not publication."
      ja: "RegistryPublicationActivity が 20 CapabilityDescriptor を surface-model-production v42 へ公開。query-time candidate loading は publication ではない。"
    example_source:
      product: OpenAI Agents SDK
      url: https://openai.github.io/openai-agents-python/tools/
    field_values:
      publication_activity_id: registry-publication-prod-42
      published_surface_version: 42
    related_node_ids: [tool-registry-definition, tool-discovery-selection]
    related_relation_ids: []
    source_claims: [claim-tool-registry-definition-openai]
  - id: tool-registry-definition-example-version-resolution
    labels:
      zh: 唯一条目解析版本合同
      en: Unique entry resolves versioned contract
      ja: 唯一 entry が版 contract を解決
    descriptions:
      zh: "registry-entry-weather-v3-prod 唯一解析 weather@3.0.0、stable Tool 与 read-only ToolPermissionSpec。"
      en: "registry-entry-weather-v3-prod uniquely resolves weather@3.0.0, stable Tool, and read-only ToolPermissionSpec."
      ja: "registry-entry-weather-v3-prod が weather@3.0.0/stable Tool/read-only ToolPermissionSpec を一意解決。"
    example_source:
      product: Gorilla APIBench
      url: https://arxiv.org/abs/2307.16789
    field_values:
      registry_entry_id: registry-entry-weather-v3-prod
      resolution_cardinality: 1
    related_node_ids: [tool-registry-definition]
    related_relation_ids: []
    source_claims: [claim-tool-registry-definition-design]
  - id: tool-registry-definition-example-ambiguous-alias
    labels:
      zh: 模糊别名必须报告歧义
      en: Ambiguous alias must report ambiguity
      ja: 曖昧 alias は ambiguity を報告
    descriptions:
      zh: "仅请求别名 weather 时同时命中 v2 与 v3 active 条目；解析必须报告歧义，不得任意选版。"
      en: "Alias weather alone matches active v2 and v3 entries; resolution must report ambiguity and not pick arbitrarily."
      ja: "alias weather だけで active v2/v3 entry に一致。resolution は ambiguity を報告し任意選版しません。"
    example_source:
      product: Moonweave registry design
      url: https://moonweave.ai/ontology/agent-system/2.4.0/
    field_values:
      requested_tool_alias: weather
      resolution_cardinality: 2
    related_node_ids: [tool-registry-definition]
    related_relation_ids: []
    source_claims: [claim-tool-registry-definition-design]
parent_relation: null
relations: []
module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 注册活动接收一份具体工具定义作为待核验输入。
          en: RegistrationActivity receives one concrete ToolDefinition as input for
            validation.
          ja: RegistrationActivity は検証 input として一 concrete ToolDefinition を受け取ります。
        family_concept_ids:
          - ToolDefinition
        relation_ids:
          - RegistrationActivity-registers-ToolDefinition
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 成功注册活动产生一个持久注册条目。
          en: A successful RegistrationActivity produces one persistent RegistryEntry.
          ja: successful RegistrationActivity は一 persistent RegistryEntry を生成します。
        family_concept_ids:
          - RegistryEntry
        relation_ids:
          - RegistrationActivity-produces-RegistryEntry
        not_applicable_reason: null
      failure:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 当前源只建模成功注册产生 RegistryEntry 的路径，没有定义规范化的注册拒绝或校验失败节点；缺少 RegistryEntry
            不能被反向解释为图中的失败事实。
          en: The current source models only the successful path in which registration
            produces a RegistryEntry and defines no canonical
            registration-rejection or validation-failure node; absence of a
            RegistryEntry cannot be reverse-inferred as a failure fact in the
            graph.
          ja: current source は registration が RegistryEntry を生成する success path のみを model
            化し、canonical registration-rejection/validation-failure node
            はなく、RegistryEntry の absence を graph の failure fact と逆推論できません。
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 更正定义后重新注册、注销或发布弃用通知属于注册表生命周期治理；本模块没有定义把失败状态恢复到成功状态的独立 RecoveryActivity。
          en: Registering a corrected definition, deregistering an entry, or publishing a
            deprecation notice are registry lifecycle-governance actions; this
            module defines no separate RecoveryActivity that restores a failed
            state to success.
          ja: corrected definition の再 registration・entry の deregistration・deprecation
            notice の publication は registry lifecycle governance であり、failed
            state を success に戻す独立 RecoveryActivity は定義しません。
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-tool-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 领域复核确认 tool-registry-definition interaction contract
              的身份由稳定定义、目录成员或工具执行类型决定；它不依赖某一次搜索或调用。
            en: Domain review confirms that tool-registry-definition interaction contract is
              identified by a stable definition, catalog membership, or tool
              execution type rather than one search or invocation.
            ja: ドメイン審査は、tool-registry-definition interaction contract
              の同一性が一回の検索や呼出しではなく、安定した定義・目録所属・実行方式で決まることを確認しました。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 本体复核确认 tool-registry-definition interaction contract 的结构位置为 registration
              input-output handoff；业务流关系只补充事实，不替代该层级位置。
            en: Ontology review confirms the structural placement of
              tool-registry-definition interaction contract as registration
              input-output handoff; workflow relations add facts but do not
              replace that placement.
            ja: 本体審査は tool-registry-definition interaction contract の構造位置を registration
              input-output handoff と確認し、業務フロー関係が階層位置を代替しないことを確認しました。
  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - CapabilityCatalog
    allowed_backbone_predicates:
      - contains
      - describes
      - has_metadata
      - is_a
      - offers_capability
      - operates_on
    flat_root_exception_concept_ids: []
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-tool-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项领域复核确认每个可执行 Tool 必须由确定版本的 ToolDefinition 描述；尚无定义的候选实现不能进入本模块的 Tool
              分类，只能停留在外部实现或发现候选状态。
            en: Point-by-point domain review confirms that every executable Tool in this
              module must be described by an exact ToolDefinition version. An
              implementation candidate without such a definition cannot enter
              the Tool taxonomy and remains an external implementation or
              discovery candidate.
            ja: 個別領域審査は、このモジュールの実行可能 Tool が必ず特定版 ToolDefinition に記述されると確認しました。定義のない実装候補は
              Tool 分類へ入れず、外部実装または発見候補に留まります。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 本体人工复核确认
              CapabilityCatalog→CapabilityDefinition→ToolSpecification→ToolDefinition→Tool
              构成真实解释链；最后一步使用 describes 而非 is_a，既消除无关系的 Tool 第二根，也保留
              specification 与 entity 的种类差异。
            en: Manual ontology review confirms the genuine explanatory chain
              CapabilityCatalog→CapabilityDefinition→ToolSpecification→ToolDefinition→Tool.
              The final step uses describes rather than is_a, removing the
              unrelated second Tool root while preserving the
              specification/entity kind distinction.
            ja: 本体人工審査は
              CapabilityCatalog→CapabilityDefinition→ToolSpecification→ToolDefinition→Tool
              を真正な説明連鎖と確認しました。最後は is_a でなく describes を使い、無関係な Tool 第二ルートを除去しつつ
              specification/entity の種別差を保ちます。
  competency_questions:
    - id: tool-registry-definition-cq-registration-v4
      semantic_key: tool-registry-definition.registration-handoff
      primary_owner_module_id: tool-registry-definition
      related_module_ids: []
      questions:
        zh: 一份工具定义经过什么过程成为哪个持久注册条目？
        en: Through what process does a ToolDefinition become which persistent
          RegistryEntry?
        ja: ToolDefinition はどの process でどの persistent RegistryEntry になりますか。
      query: Trace one ToolDefinition through RegistrationActivity to its produced
        RegistryEntry.
      expected_assertion: A successful activity registers exactly the reviewed
        definition version, produces an entry, and the entry describes that same
        definition.
      evidence_binding:
        applicability: owner-only
        owner_concept_ids:
          - RegistrationActivity
          - ToolDefinition
          - RegistryEntry
        related_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 注册问题完全由本模块拥有的注册活动、工具定义和注册条目回答；内部关系保留在查询与示例中，但 CQ 证据绑定无需声明跨模块证据。
          en: The registration question is answered entirely by the module-owned
            registration activity, tool definition, and registry entry. Internal
            relations remain in the query and examples, but the CQ evidence
            binding declares no cross-module evidence.
          ja: registration question は本 module 所有の registration activity・tool
            definition・registry entry だけで回答します。内部 relation は query と example
            に保持しますが、CQ evidence binding は cross-module evidence を宣言しません。
      positive_example_ids:
        - tool-registry-definition-cq-registration-v4-example-positive
      counterexample_ids:
        - tool-registry-definition-cq-registration-v4-example-counter
      source_claims:
        - claim-tool-registry-definition-design
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-tool-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 领域复核确认 tool-registry-definition-cq-registration-v4
                的身份由稳定定义、目录成员或工具执行类型决定；它不依赖某一次搜索或调用。
              en: Domain review confirms that tool-registry-definition-cq-registration-v4 is
                identified by a stable definition, catalog membership, or tool
                execution type rather than one search or invocation.
              ja: ドメイン審査は、tool-registry-definition-cq-registration-v4
                の同一性が一回の検索や呼出しではなく、安定した定義・目録所属・実行方式で決まることを確認しました。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 本体复核确认该 CQ 为 owner-only：注册活动、定义与条目都属于本模块；内部业务边用于回答问题，但不伪装成跨模块证据。
              en: "Ontology review confirms this CQ as owner-only: registration activity,
                definition, and entry all belong to this module; internal
                business edges answer the query without masquerading as
                cross-module evidence."
              ja: 本体審査はこの CQ を owner-only と確認しました。registration activity・definition・entry は本
                module 所有で、内部 business edge は query を回答しますが cross-module
                evidence には見せません。
    - id: tool-registry-definition-cq-publication-v4
      semantic_key: tool-registry-definition.surface-publication
      primary_owner_module_id: tool-registry-definition
      related_module_ids: []
      questions:
        zh: 哪些描述符由哪次活动发布到哪个能力表面？
        en: Which descriptors were published by which activity to which
          CapabilitySurface?
        ja: どの descriptor がどの activity によりどの CapabilitySurface へ公開されましたか。
      query: Trace RegistryPublicationActivity to published CapabilityDescriptors,
        target CapabilitySurface, and retained surface membership.
      expected_assertion: The publication activity, descriptors, target surface, and
        surface membership agree on one publication version.
      evidence_binding:
        applicability: owner-only
        owner_concept_ids:
          - RegistryPublicationActivity
          - CapabilityDescriptor
          - CapabilitySurface
        related_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 发布活动、能力描述符和能力表面均由本模块拥有；该问题不需要把发现时加载或调用时执行误作发布证据。
          en: The publication activity, capability descriptors, and capability surface are
            all owned here; the question does not treat discovery-time loading
