schema: moonweave.ai/ontology-node/v1
id: tool-registry-definition
kind: module
status: accepted
labels:
  zh: 能力目录与定义
  en: Capability catalogs and definitions
  ja: 能力カタログと定義
semantics:
  short_definition:
    zh: 能力目录与定义维护跨请求稳定存在的能力身份、版本化定义和目录成员关系，覆盖工具、资源与提示等可发现能力。它说明“有什么、怎样描述、在哪个目录版本中可见”，不说明本次为何选中、是否获准或实际如何调用。
    en: Capability catalogs and definitions maintains durable capability identities, versioned definitions, and catalog membership across requests, covering discoverable tools, resources, prompts, and related capability forms. It answers what exists, how it is described, and in which catalog revision it is visible—not why it was selected now, whether it was authorized, or how it was invoked.
    ja: 能力カタログと定義は、要求をまたいで存続する能力の同一性、版管理された定義、カタログ所属を維持し、発見可能なツール、リソース、プロンプトなどを扱います。「何が存在し、どう記述され、どのカタログ版で見えるか」を説明しますが、今回なぜ選ばれたか、許可されたか、どう呼び出されたかは扱いません。
  definition:
    zh: 能力目录与定义维护跨请求稳定存在的能力身份、版本化定义和目录成员关系，覆盖工具、资源与提示等可发现能力。它说明“有什么、怎样描述、在哪个目录版本中可见”，不说明本次为何选中、是否获准或实际如何调用。
    en: Capability catalogs and definitions maintains durable capability identities, versioned definitions, and catalog membership across requests, covering discoverable tools, resources, prompts, and related capability forms. It answers what exists, how it is described, and in which catalog revision it is visible—not why it was selected now, whether it was authorized, or how it was invoked.
    ja: 能力カタログと定義は、要求をまたいで存続する能力の同一性、版管理された定義、カタログ所属を維持し、発見可能なツール、リソース、プロンプトなどを扱います。「何が存在し、どう記述され、どのカタログ版で見えるか」を説明しますが、今回なぜ選ばれたか、許可されたか、どう呼び出されたかは扱いません。
  why_needed:
    zh: 为发现、选择和调用提供唯一、可版本化且可追溯的能力合同来源。
    en: Provide discovery, selection, and invocation with one versioned, traceable source for capability contracts.
    ja: 発見、選択、呼び出しに対して、版管理され追跡可能な能力契約の一意な出所を提供します。
  includes:
    - zh: 稳定能力身份，以及工具、资源和提示的版本化定义、输入输出合同、描述信息与提供方式；这些内容不依赖某一次搜索或调用。
      en: Durable capability identities and versioned definitions, input/output contracts, descriptive information, and provisioning forms for tools, resources, and prompts; these do not depend on one search or invocation.
      ja: 永続的な能力の同一性と、ツール、リソース、プロンプトの版管理された定義、入出力契約、説明情報、提供形態を含みます。これらは一回の検索や呼び出しに依存しません。
    - zh: 能力目录、工具注册表、注册条目，以及注册、注销、弃用和发布这些目录成员关系的活动。
      en: Capability catalogs, tool registries, registry entries, and the activities that register, deregister, deprecate, or publish catalog membership.
      ja: 能力カタログ、ツール登録簿、登録項目と、それらの所属を登録、解除、非推奨化、公開する活動を含みます。
  excludes:
    - zh: 名称、描述、Schema、端点、权限需求和示例是相应能力节点的信息，不因可查询而另建“Schema 节点”或“来源节点”。
      en: Names, descriptions, schemas, endpoints, permission requirements, and examples are information on the relevant capability node; queryability does not justify separate schema or source nodes.
      ja: 名称、説明、スキーマ、端点、権限要件、例は対応する能力ノードの情報であり、照会可能であることを理由に別のスキーマノードや出典ノードを作りません。
    - zh: 权限需求可以由定义声明，但 PermissionScope、PolicyRule、PolicyDecision 和 AuthorizationGrant 的身份归授权与策略决策；定义不能自行授予权限。
      en: A definition may declare permission requirements, but PermissionScope, PolicyRule, PolicyDecision, and AuthorizationGrant identities belong to authorization and policy decisions; a definition cannot grant authority by itself.
      ja: 定義は権限要件を宣言できますが、PermissionScope、PolicyRule、PolicyDecision、AuthorizationGrant の同一性は認可とポリシー判断に属し、定義だけで権限を付与することはできません。
    - zh: 查询期候选与选择、单次调用和结果、MCP 列表响应与会话、提供者和模型身份分别归发现、调用、MCP 与运行时模块。
      en: Query-time candidates and selections, individual invocations and results, MCP list responses and sessions, and provider or model identities belong respectively to discovery, invocation, MCP, and Runtime.
      ja: 照会時の候補と選択、個別の呼び出しと結果、MCP の一覧応答とセッション、提供者やモデルの同一性は、それぞれ発見、呼び出し、MCP、実行時の各モジュールに属します。
  semantic_kind: null
  aliases: []
purpose:
  zh: 维护能力身份、版本化合同、目录成员关系和发布可见性的唯一事实来源。
  en: Maintain the sole source of truth for capability identity, versioned contracts, catalog membership, and publication visibility.
  ja: 能力の同一性、版管理された契約、カタログ所属、公開可視性について唯一の事実源を維持します。
structure: null
examples:
  - id: tool-registry-definition-cq-registration-v4-example-positive
    kind: positive
    labels:
      zh: 经校验定义生成生产注册条目
      en: Validated definition becomes a production registry entry
      ja: 検証済み definition から production registry entry を生成
    scenario_id: null
    descriptions:
      zh: 发布流水线校验 weather v3，注册活动产生生产条目，条目引用原定义。
      en: A release pipeline validates weather v3; RegistrationActivity produces a production entry that references the original definition.
      ja: release pipeline が weather v3 を検証し RegistrationActivity が original definition 参照 production entry を生成します。
    field_values:
      registration_activity_id: registration-weather-v3-prod-20260716
      target_catalog_id: registry-production-tools
      capability_definition_id: capdef:weather
      version: 3.0.0
      definition_digest: sha256:weather-definition-v3
      input_schema_dialect: https://json-schema.org/draft/2020-12/schema
      validation_status: passed
      registry_entry_id: registry-entry-weather-v3-prod
      registry_entry_revision: 1
      registry_entry_state: active
      occurred_at: 2026-07-16T09:15:30Z
    related_node_ids:
      - RegistrationActivity
      - ToolDefinition
      - RegistryEntry
    related_relation_ids:
      - RegistrationActivity-registers-ToolDefinition
      - RegistrationActivity-produces-RegistryEntry
      - RegistryEntry-describes-ToolDefinition
    expected_result:
      zh: 可沿三条业务边从输入定义追踪到持久注册成员。
      en: Three business relations trace the input definition to persistent registry membership.
      ja: 三 business relation で input definition から persistent registry membership まで追跡できます。
    why_valid_or_invalid:
      zh: 过程、输入定义和输出条目具有不同身份且责任交接完整。
      en: Process, input definition, and output entry have distinct identities with a complete responsibility handoff.
      ja: process、input definition、output entry が別 identity を持ち handoff が完全です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-registry-definition-006
  - id: tool-registry-definition-cq-registration-v4-example-counter
    kind: counterexample
    labels:
      zh: 只有定义草稿而没有注册事实
      en: Definition draft without a registration fact
      ja: registration fact のない definition draft
    scenario_id: null
    descriptions:
      zh: 开发者只保存 ToolDefinition 草稿，没有目标注册表、注册活动或条目。
      en: A developer only saves a ToolDefinition draft with no target registry, registration activity, or entry.
      ja: developer が ToolDefinition draft のみ保存し target registry、registration activity、entry はありません。
    field_values:
      capability_definition_id: capdef:weather
      version: 3.1.0-draft
      definition_digest: sha256:weather-definition-v31-draft
      definition_state: draft
      target_catalog_id: null
      registration_activity_id: null
      validation_status: not-run
      registry_entry_id: null
      persisted_at: null
    related_node_ids:
      - ToolDefinition
      - RegistrationActivity
      - RegistryEntry
    related_relation_ids:
      - RegistrationActivity-registers-ToolDefinition
      - RegistrationActivity-produces-RegistryEntry
      - RegistryEntry-describes-ToolDefinition
    expected_result:
      zh: 定义保持未注册状态，不推断任何 RegistryEntry。
      en: The definition remains unregistered and no RegistryEntry is inferred.
      ja: definition は unregistered のままで RegistryEntry を推論しません。
    why_valid_or_invalid:
      zh: 定义存在不能替代目录成员产生过程。
      en: Definition existence cannot replace the process that creates catalog membership.
      ja: definition 存在は catalog membership 生成 process を代替できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-registry-definition-007
  - id: tool-registry-definition-cq-publication-v4-example-positive
    kind: positive
    labels:
      zh: 能力描述符发布到新版模型表面
      en: Capability descriptors published to a new model surface
      ja: capability descriptor を新 model surface に公開
    scenario_id: null
    descriptions:
      zh: 发布作业生成二十个能力描述符，将其发布到生产模型表面版本 42。
      en: A publication job generates twenty descriptors and publishes them to production-model surface version 42.
      ja: publication job が二十 descriptor を生成し production-model surface version 42 へ公開します。
    field_values:
      publication_activity_id: registry-publication-prod-42
      source_registry_revision: registry-production-tools@118
      capability_descriptor_count: 20
      descriptor_ids:
        - descriptor-weather-v3
        - descriptor-search-repo-v8
        - descriptor-create-ticket-v5
      capability_surface_id: surface-model-production
      previous_surface_version: 41
      published_surface_version: 42
      membership_digest: sha256:surface-prod-v42
      published_at: 2026-07-16T09:30:00Z
    related_node_ids:
      - RegistryPublicationActivity
      - CapabilityDescriptor
      - CapabilitySurface
    related_relation_ids:
      - RegistryPublicationActivity-publishes-CapabilityDescriptor
      - RegistryPublicationActivity-publishes_to-CapabilitySurface
      - CapabilitySurface-contains-CapabilityDescriptor
    expected_result:
      zh: 活动、描述符、目标表面和表面成员关系均可查询。
      en: The activity, descriptors, target surface, and surface membership are all queryable.
      ja: activity、descriptor、target surface、surface membership をすべて query できます。
    why_valid_or_invalid:
      zh: 发布施事者与发布集合分开，成员生命周期因此可审计。
      en: Publishing agency is separate from the published collection, making membership lifecycle auditable.
      ja: publishing agency と published collection が分離し membership lifecycle を監査できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-registry-definition-008
  - id: tool-registry-definition-cq-publication-v4-example-counter
    kind: counterexample
    labels:
      zh: 查询时加载候选不等于发布
      en: Query-time candidate loading is not publication
      ja: query-time candidate loading は publication ではない
    scenario_id: null
    descriptions:
      zh: 模型针对当前问题从既有表面加载三个候选，未改变表面版本或成员。
      en: For the current query, a model loads three candidates from an existing surface without changing its version or membership.
      ja: current query で model が existing surface から三 candidate を load し version と membership は変えません。
    field_values:
      selection_activity_id: tool-selection-current-turn-73
      capability_surface_id: surface-model-production
      surface_version_before: 42
      surface_version_after: 42
      membership_digest_before: sha256:surface-prod-v42
      membership_digest_after: sha256:surface-prod-v42
      loaded_candidate_descriptor_ids:
        - descriptor-weather-v3
        - descriptor-geocode-v2
        - descriptor-timezone-v1
      publication_activity_id: null
      descriptor_membership_changed: false
    related_node_ids:
      - CapabilitySurface
      - CapabilityDescriptor
      - RegistryPublicationActivity
    related_relation_ids:
      - RegistryPublicationActivity-publishes-CapabilityDescriptor
      - CapabilitySurface-contains-CapabilityDescriptor
      - RegistryPublicationActivity-publishes_to-CapabilitySurface
    expected_result:
      zh: 该过程归发现域，不新增发布活动。
      en: The process belongs to discovery and creates no publication activity.
      ja: process は discovery に属し publication activity を追加しません。
    why_valid_or_invalid:
      zh: 消费已发布集合与产生新发布版本是不同过程。
      en: Consuming a published collection differs from producing a new publication version.
      ja: published collection 消費と new publication version 生成は別 process です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-registry-definition-009
  - id: tool-registry-definition-cq-version-resolution-v4-example-positive
    kind: positive
    labels:
      zh: 注册条目唯一解析版本化工具合同
      en: Registry entry uniquely resolves a versioned tool contract
      ja: registry entry から versioned tool contract を一意解決
    scenario_id: null
    descriptions:
      zh: 生产条目引用 weather v3，定义描述稳定工具并声明只读权限规格。
      en: A production entry references weather v3; the definition describes the stable tool and declares a read-only permission specification.
      ja: production entry が weather v3 を参照し definition が stable tool を describes し read-only permission spec を declares します。
    field_values:
      registry_entry_id: registry-entry-weather-v3-prod
      registry_entry_revision: 1
      capability_definition_id: capdef:weather
      version: 3.0.0
      definition_digest: sha256:weather-definition-v3
      stable_tool_id: tool-weather
      tool_name: get_weather
      permission_capability_definition_id: capdef:weather-permission
      permission_version: 2.0.0
      declared_effect_class: read-only
      resolution_cardinality: 1
    related_node_ids:
      - RegistryEntry
      - ToolDefinition
      - Tool
      - ToolPermissionSpec
    related_relation_ids:
      - RegistryEntry-describes-ToolDefinition
      - ToolDefinition-describes-Tool
      - ToolDefinition-declares-ToolPermissionSpec
    expected_result:
      zh: 查询返回唯一版本合同、稳定工具身份和对应权限规则。
      en: The query returns one versioned contract, stable Tool identity, and applicable permission rules.
      ja: query は一 version contract、stable Tool identity、applicable permission rule を返します。
    why_valid_or_invalid:
      zh: 成员、定义、工具与权限规格各自保留身份并由明确边连接。
      en: Membership, definition, tool, and permission specification retain their own identities and explicit links.
      ja: membership、definition、tool、permission spec が各 identity と explicit link を保持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-registry-definition-010
  - id: tool-registry-definition-cq-version-resolution-v4-example-counter
    kind: counterexample
    labels:
      zh: 模糊别名同时命中两个活动版本
      en: Ambiguous alias matches two active versions
      ja: 曖昧 alias が二つの active version に一致
    scenario_id: null
    descriptions:
      zh: 请求只给出模糊工具名称，两个兼容定义版本同时有效。
      en: A request supplies only an ambiguous tool name while two compatible definition versions are active.
      ja: request が曖昧 tool name のみ提供し二 compatible definition version が active です。
    field_values:
      requested_tool_alias: weather
      version_constraint: null
      candidate_registry_entry_ids:
        - registry-entry-weather-v2-prod
        - registry-entry-weather-v3-prod
      candidate_definition_versions:
        - 2.4.1
        - 3.0.0
      candidate_permission_spec_ids:
        - permission-weather-read-v1
        - permission-weather-read-v2
      resolution_cardinality: 2
      resolved_definition_id: null
      ambiguity_reason: missing version or immutable registry-entry reference
    related_node_ids:
      - Tool
      - ToolDefinition
      - RegistryEntry
      - ToolPermissionSpec
    related_relation_ids:
      - ToolDefinition-describes-Tool
      - RegistryEntry-describes-ToolDefinition
      - ToolDefinition-declares-ToolPermissionSpec
    expected_result:
      zh: 解析必须报告歧义，不得任意选择版本。
      en: Resolution reports ambiguity and must not choose a version arbitrarily.
      ja: resolution は ambiguity を報告し任意 version を選びません。
    why_valid_or_invalid:
      zh: 稳定工具身份不足以唯一确定版本化接口合同。
      en: Stable Tool identity alone cannot uniquely identify a versioned interface contract.
      ja: stable Tool identity だけでは versioned interface contract を一意特定できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-registry-definition-011
parent_relation: null
relations: []
module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 注册活动接收一份具体工具定义作为待核验输入。
          en: RegistrationActivity receives one concrete ToolDefinition as input for validation.
          ja: RegistrationActivity は検証 input として一 concrete ToolDefinition を受け取ります。
        family_concept_ids:
          - ToolDefinition
        relation_ids:
          - RegistrationActivity-registers-ToolDefinition
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 成功注册活动产生一个持久注册条目。
          en: A successful RegistrationActivity produces one persistent RegistryEntry.
          ja: successful RegistrationActivity は一 persistent RegistryEntry を生成します。
        family_concept_ids:
          - RegistryEntry
        relation_ids:
          - RegistrationActivity-produces-RegistryEntry
        not_applicable_reason: null
      failure:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 当前源只建模成功注册产生 RegistryEntry 的路径，没有定义规范化的注册拒绝或校验失败节点；缺少 RegistryEntry 不能被反向解释为图中的失败事实。
          en: The current source models only the successful path in which registration produces a RegistryEntry and defines no canonical registration-rejection or validation-failure node; absence of a RegistryEntry cannot be reverse-inferred as a failure fact in the graph.
          ja: current source は registration が RegistryEntry を生成する success path のみを model 化し、canonical registration-rejection/validation-failure node はなく、RegistryEntry の absence を graph の failure fact と逆推論できません。
      recovery:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 更正定义后重新注册、注销或发布弃用通知属于注册表生命周期治理；本模块没有定义把失败状态恢复到成功状态的独立 RecoveryActivity。
          en: Registering a corrected definition, deregistering an entry, or publishing a deprecation notice are registry lifecycle-governance actions; this module defines no separate RecoveryActivity that restores a failed state to success.
          ja: corrected definition の再 registration・entry の deregistration・deprecation notice の publication は registry lifecycle governance であり、failed state を success に戻す独立 RecoveryActivity は定義しません。
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-tool-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 领域复核确认 tool-registry-definition interaction contract 的身份由稳定定义、目录成员或工具执行类型决定；它不依赖某一次搜索或调用。
            en: Domain review confirms that tool-registry-definition interaction contract is identified by a stable definition, catalog membership, or tool execution type rather than one search or invocation.
            ja: ドメイン審査は、tool-registry-definition interaction contract の同一性が一回の検索や呼出しではなく、安定した定義・目録所属・実行方式で決まることを確認しました。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 本体复核确认 tool-registry-definition interaction contract 的结构位置为 registration input-output handoff；业务流关系只补充事实，不替代该层级位置。
            en: Ontology review confirms the structural placement of tool-registry-definition interaction contract as registration input-output handoff; workflow relations add facts but do not replace that placement.
            ja: 本体審査は tool-registry-definition interaction contract の構造位置を registration input-output handoff と確認し、業務フロー関係が階層位置を代替しないことを確認しました。
  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - CapabilityCatalog
    allowed_backbone_predicates:
      - contains
      - describes
      - has_metadata
      - is_a
      - offers_capability
      - operates_on
    flat_root_exception_concept_ids: []
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-tool-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项领域复核确认每个可执行 Tool 必须由确定版本的 ToolDefinition 描述；尚无定义的候选实现不能进入本模块的 Tool 分类，只能停留在外部实现或发现候选状态。
            en: Point-by-point domain review confirms that every executable Tool in this module must be described by an exact ToolDefinition version. An implementation candidate without such a definition cannot enter the Tool taxonomy and remains an external implementation or discovery candidate.
            ja: 個別領域審査は、このモジュールの実行可能 Tool が必ず特定版 ToolDefinition に記述されると確認しました。定義のない実装候補は Tool 分類へ入れず、外部実装または発見候補に留まります。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
