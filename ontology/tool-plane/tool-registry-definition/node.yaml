    descriptions:
      zh: Gorilla APIBench 1645 API schema；LangChain @tool/BaseTool/StructuredTool.from_function；Semantic Kernel kernel.add_plugin/@kernel_function；Instructor Pydantic response_model schema。
      en: Gorilla APIBench 1645 API schema; LangChain @tool/BaseTool/StructuredTool.from_function; Semantic Kernel kernel.add_plugin/@kernel_function; Instructor Pydantic response_model schema.
      ja: Gorilla APIBench 1645 API schema。LangChain @tool/BaseTool。Semantic Kernel kernel.add_plugin/@kernel_function。Instructor Pydantic response_model。
    field_values: {module_scope_id: tool-registry-definition, source_protocol_boundary: mcp-2025-11-25}
