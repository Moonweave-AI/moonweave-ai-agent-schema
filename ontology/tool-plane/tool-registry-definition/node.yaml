    descriptions:
      zh: 反例：Gorilla 无 retriever hallucinate API；LangChain tool 缺 args_schema；Instructor response_model 与 OpenAI parameters 字段混用。
      en: Counterexample: Gorilla hallucinates API without retriever; LangChain tool missing args_schema; Instructor response_model mixed with OpenAI parameters fields.
      ja: 反例：Gorilla retriever なし hallucinate。LangChain args_schema 欠落。Instructor/OpenAI parameters 混同。
    field_values: {module_scope_id: tool-registry-definition, method: tools/call}
