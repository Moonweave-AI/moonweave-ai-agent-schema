schema: moonweave.ai/ontology-node/v1
id: HostedTool
kind: concept
labels:
  zh: 托管工具类别 profile
  en: Hosted-tool category profile
  ja: hosted-tool category profile
semantics:
  short_definition:
    zh: 对由外部托管环境执行的本地 Tool profile 的 Moonweave 分类。
    en: A Moonweave classification for a local Tool profile executed by an externally hosted environment.
    ja: 外部 hosted environment が実行するローカル Tool profile の Moonweave classification。
  definition:
    zh: >
      HostedTool 是保留既有 ID 的 Moonweave 本地类别 profile。它用来描述工具的执行边界由托管服务
      负责，并可引用 Agents SDK 文档中的 Hosted OpenAI tools 类别。它不是 Agents SDK 的稳定类名、
      不是 MCP Tool wire 记录，也不表示所有托管服务都有相同传输、授权或审批模型。
    en: >
      HostedTool is a Moonweave local category profile retained for compatibility. It describes a
      tool whose execution boundary is managed by a hosted service and may reference the Hosted
      OpenAI tools category documented by the Agents SDK. It is not a stable Agents SDK class name,
      not an MCP Tool wire record, and does not mean all hosted services share one transport,
      authorization, or approval model.
    ja: >
      HostedTool は compatibility のために保持する Moonweave ローカル category profile である。hosted
      service が execution boundary を管理する tool を記述し、Agents SDK が文書化する Hosted OpenAI
      tools category を参照できる。これは安定した Agents SDK class name でも MCP Tool wire record
      でもなく、すべての hosted service が一つの transport、authorization、approval model を共有することも意味しない。
  why_needed:
    zh: 本地选择器可区分托管执行与本地运行时执行，但仍保留各实际工具的来源和审批边界。
    en: A local selector can distinguish hosted execution from local-runtime execution while retaining each concrete tool's provenance and approval boundary.
    ja: ローカル selector は concrete tool ごとの provenance と approval boundary を保持しながら hosted execution と local-runtime execution を区別できる。
  includes:
    - zh: 工具引用、托管提供方、执行边界和可选 SDK 类别引用。
      en: A tool reference, hosting provider, execution boundary, and optional SDK-category reference.
      ja: tool reference、hosting provider、execution boundary、任意の SDK-category reference。
    - zh: 对 HostedMCPTool 等具体托管实现的本地分类。
      en: Local classification of concrete hosted implementations such as HostedMCPTool.
      ja: HostedMCPTool のような concrete hosted implementation のローカル classification。
  excludes:
    - zh: 任何单一协议的必需消息、传输格式或服务器 capability 声明。
      en: A required message, transport format, or server capability declaration of any one protocol.
      ja: 一つの protocol に必須の message、transport format、または server capability declaration。
    - zh: 将“托管”误作“无需审批”或“可信”的安全断言。
      en: A security assertion that “hosted” means “approval-free” or “trusted.”
      ja: 「hosted」が「approval-free」または「trusted」を意味するという security assertion。
  semantic_kind: local-profile
  aliases:
    - language: en
      value: externally hosted tool category
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      tool_ref 指向实际 Tool profile，hosting_provider 和 execution_boundary 说明何处及由谁运行。
      sdk_category_ref 可以记录具体 SDK 文档类别；该分类不携带凭据、请求载荷或授权结论。
      每个具体实现仍须使用其来源 SDK、协议和运行时策略规定的连接与审批方式。
    en: >
      tool_ref points to the concrete Tool profile, while hosting_provider and execution_boundary
      state where and by whom it runs. sdk_category_ref can record a concrete SDK documentation
      category; this classification carries no credential, request payload, or authorization result.
      Each concrete implementation must still use the connection and approval method specified by
      its source SDK, protocol, and runtime policy.
    ja: >
      tool_ref は concrete Tool profile を指し、hosting_provider と execution_boundary はどこで誰が
      実行するかを示す。sdk_category_ref は具体的な SDK documentation category を記録できる。この
      classification は credential、request payload、authorization result を持たない。各 concrete
      implementation は source SDK、protocol、runtime policy が定める connection と approval method を使う必要がある。
  typical_input:
    - description:
        zh: 对 Agents SDK 托管 MCP 工具的本地分类。
        en: A local classification for an Agents SDK hosted MCP tool.
        ja: Agents SDK hosted MCP tool のローカル classification。
      format: |
        {"tool_ref":"deepwiki-hosted-mcp","hosting_provider":"OpenAI Responses API","execution_boundary":"hosted-service","sdk_category_ref":"HostedMCPTool"}
      source_claims: [openai-agents-sdk-hosted-tools-category, moonweave-hosted-tool-profile]
  typical_output:
    - description:
        zh: 供本地选择器使用的执行边界记录。
        en: An execution-boundary record used by a local selector.
        ja: ローカル selector が使う execution-boundary record。
      format: |
        {"tool_ref":"deepwiki-hosted-mcp","execution_boundary":"hosted-service","source_runtime":"OpenAI-Agents-SDK"}
      source_claims: [moonweave-hosted-tool-profile]
  reference_implementations:
    - name: OpenAI Agents SDK Tools
      url: https://openai.github.io/openai-agents-python/tools/
      description: Documents hosted OpenAI tools separately from local and runtime tool categories.
structure:
  identity_keys: [tool_ref, execution_boundary]
  fields:
    - id: tool_ref
      labels:
        zh: 工具引用
        en: Tool reference
        ja: tool reference
      definitions:
        zh: 指向被分类为托管执行的本地 Tool profile。
        en: Points to the local Tool profile classified as hosted execution.
        ja: hosted execution として分類されるローカル Tool profile を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: deepwiki-hosted-mcp
      allowed_values: []
      source_claims: [moonweave-hosted-tool-profile]
    - id: hosting_provider
      labels:
        zh: 托管提供方
        en: Hosting provider
        ja: hosting provider
      definitions:
        zh: 标识负责托管该实际执行环境的提供方或服务边界。
        en: Identifies the provider or service boundary that hosts the concrete execution environment.
        ja: concrete execution environment を host する provider または service boundary を識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: OpenAI Responses API
      allowed_values: []
      source_claims: [moonweave-hosted-tool-profile]
    - id: execution_boundary
      labels:
        zh: 执行边界
        en: Execution boundary
        ja: execution boundary
      definitions:
        zh: 说明调用由托管服务而非本地应用进程执行的本地分类值。
        en: States the local classification that a hosted service, rather than the local application process, executes the call.
        ja: ローカル application process ではなく hosted service が call を実行することを示すローカル classification value。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: hosted-service
      allowed_values: [hosted-service]
      source_claims: [moonweave-hosted-tool-profile]
    - id: sdk_category_ref
      labels:
        zh: SDK 类别引用
        en: SDK category reference
        ja: SDK category reference
      definitions:
        zh: 可选地指向具体 SDK 文档中描述该实现的类别或类名。
        en: Optionally points to the category or class name used by concrete SDK documentation for this implementation.
        ja: この implementation を具体的な SDK documentation が記述する category または class name を任意で指す。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: HostedMCPTool
      allowed_values: []
      source_claims: [openai-agents-sdk-hosted-tools-category, moonweave-hosted-tool-profile]
    - id: source_runtime
      labels:
        zh: 来源运行时
        en: Source runtime
        ja: source runtime
      definitions:
        zh: 标识定义实际托管工具行为的 SDK 或服务运行时。
        en: Identifies the SDK or service runtime that defines concrete hosted-tool behavior.
        ja: concrete hosted-tool behavior を定義する SDK または service runtime を識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: OpenAI-Agents-SDK
      allowed_values: []
      source_claims: [moonweave-hosted-tool-profile]
  constraints:
    - id: hosted-tool-needs-concrete-runtime
      severity: error
      expression_language: plain
      expression: HostedTool must identify its tool_ref, hosting_provider, execution_boundary, and source_runtime; it cannot imply shared transport, trust, or approval semantics for all hosted tools.
      explanation:
        zh: 托管位置是本地分类维度，不能取代具体运行时的安全和调用规则。
        en: Hosting location is a local classification dimension and cannot replace a concrete runtime's security or call rules.
        ja: hosting location はローカル classification dimension であり、concrete runtime の security または call rule を置き換えられない。
      source_claims: [moonweave-hosted-tool-profile]
  required_relations: []
examples:
  - id: hosted-tool-positive-sdk-category

    labels:
      zh: 托管 MCP 工具本地类别
      en: Hosted MCP tool local category
      ja: hosted MCP tool local category

    descriptions:
      zh: Gorilla APIBench 1645 API 注册（HuggingFace/TorchHub/TensorHub）；ToolBench 16000+ RapidAPI 工具注册表；Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") 插件注册。
      en: Gorilla APIBench registers 1645 APIs (HuggingFace/TorchHub/TensorHub); ToolBench 16000+ RapidAPI tool registry; Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") plugin registration.
      ja: Gorilla APIBench が 1645 API を登録。ToolBench 16000+ RapidAPI tool registry。Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") プラグイン登録。
    field_values:
      tool_ref: deepwiki-hosted-mcp
      hosting_provider: OpenAI Responses API
      execution_boundary: hosted-service
      sdk_category_ref: HostedMCPTool
      source_runtime: OpenAI-Agents-SDK
    related_node_ids: [HostedTool, Tool]
    related_relation_ids: [HostedTool-describes-Tool]

    source_claims: [openai-agents-sdk-hosted-tools-category, moonweave-hosted-tool-profile]
  - id: hosted-tool-counterexample-mcp-wire-type

    labels:
      zh: 托管类别被当作 MCP wire 类型
      en: Hosted category treated as MCP wire type
      ja: hosted category を MCP wire type として扱う例

    descriptions:
      zh: 反例：ToolBench 注册未验证 RapidAPI key 的 endpoint；Gorilla registry 混入 hallucinated API 无 retriever 校验；Semantic Kernel plugin 名冲突未检测。
      en: Counterexample: ToolBench registers RapidAPI endpoint without key verification; Gorilla registry includes hallucinated API without retriever validation; Semantic Kernel plugin name collision undetected.
      ja: 反例：ToolBench が RapidAPI key 未検証 endpoint を登録。Gorilla registry に retriever 未検証 hallucinated API 混入。
    field_values:
      tool_ref: deepwiki-hosted-mcp
      hosting_provider: OpenAI Responses API
      execution_boundary: hosted-service
      source_runtime: OpenAI-Agents-SDK
    related_node_ids: [HostedTool, Tool]
    related_relation_ids: [HostedTool-describes-Tool]

    source_claims: [moonweave-hosted-tool-profile]
  - id: hosted-tool-boundary-hosted-and-local

    labels:
      zh: 托管与本地运行时边界
      en: Boundary between hosted and local runtime
      ja: hosted と local runtime の境界

    descriptions:
      zh: Gorilla 离线 APIBench 索引 vs ToolBench 在线 RapidAPI catalog vs Semantic Kernel 本地 plugin 注册的持久化边界。
      en: Persistence boundary among Gorilla offline APIBench index, ToolBench online RapidAPI catalog, Semantic Kernel local plugin registration.
      ja: Gorilla offline APIBench index、ToolBench online RapidAPI catalog、Semantic Kernel ローカル plugin 登録の永続化境界。
    field_values:
      tool_ref: deepwiki-hosted-mcp
      hosting_provider: OpenAI Responses API
      execution_boundary: hosted-service
      source_runtime: OpenAI-Agents-SDK
    related_node_ids: [HostedTool, Tool]
    related_relation_ids: [HostedTool-describes-Tool]

    source_claims: [moonweave-hosted-tool-profile]
  - id: hosted-tool-instance-responses-service

    labels:
      zh: Responses 服务托管工具实例
      en: Responses-service hosted tool instance
      ja: Responses-service hosted tool instance

    descriptions:
      zh: ToolBench registry 实例：tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}；Semantic Kernel WeatherPlugin.get_weather(city:str) 注册实例。
      en: ToolBench registry instance: tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}; Semantic Kernel WeatherPlugin.get_weather(city:str) registration instance.
      ja: ToolBench registry 実例：tool_id=rapidapi-weather-api endpoint=/forecast。Semantic Kernel WeatherPlugin.get_weather(city:str) 登録実例。
    field_values:
      tool_ref: deepwiki-hosted-mcp
      hosting_provider: OpenAI Responses API
      execution_boundary: hosted-service
      sdk_category_ref: HostedMCPTool
      source_runtime: OpenAI-Agents-SDK
    related_node_ids: [HostedTool, Tool]
    related_relation_ids: [HostedTool-describes-Tool]

    source_claims: [openai-agents-sdk-hosted-tools-category, moonweave-hosted-tool-profile]
parent_relation: null
