    target: concept:Tool
    endpoint_order: profile-to-described-tool
    direction: source-to-target
    relation_kind: association
    labels: {zh: "描述托管执行工具", en: "describes hosted-execution tool", ja: "hosted-execution tool を記述する"}
    definition: {zh: "HostedTool profile 描述由托管服务执行的独立 Tool 运行时绑定。", en: "The HostedTool profile describes a distinct Tool runtime binding executed by a hosted service.", ja: "HostedTool profile は hosted service が実行する別個の Tool runtime binding を記述する。"}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: is_described_by, labels: {zh: "由执行分类 profile 描述", en: "is described by execution-classification profile", ja: "execution-classification profile により記述される"}}
    conditions: []
    temporal_scope: runtime
    boundary_context: This association keeps the HostedTool profile record distinct from the Tool runtime record it classifies.
    constraints:
      - id: hosted-tool-describes-distinct-runtime-record
        severity: error
        expression_language: plain
        expression: "tool_ref identifies a distinct Tool runtime record; this HostedTool profile classifies that record and does not inherit its identity."
        explanation: {zh: "分类 profile 必须指向独立运行时记录，不能继承其身份。", en: "The classification profile must point to a distinct runtime record and cannot inherit that record's identity.", ja: "classification profile は別個の runtime record を指し、その identity を継承できない。"}
        source_claims: [moonweave-hosted-tool-taxonomy]
    examples: []
    source_claims: [moonweave-hosted-tool-taxonomy]
    distinct_fact_rationale: {zh: "该关联保留分类 profile 与被描述运行时记录的不同身份。", en: "This association preserves the distinct identities of the classification profile and described runtime record.", ja: "この association は classification profile と記述対象 runtime record の別個の identity を保持する。"}
