    evidence_kind: normative
    confidence: high
  - id: moonweave-api-operation-profile
    source: moonweave-ontology-design
    supports: APIOperation is an immutable Moonweave local HTTP-adapter profile that associates a ToolCapability with a concrete HTTP operation without becoming a protocol-native Tool.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
