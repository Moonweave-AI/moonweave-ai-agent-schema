schema: moonweave.ai/ontology-node/v1
id: APIOperation
kind: concept
labels:
  zh: OpenAPI 操作适配 profile
  en: OpenAPI operation-adapter profile
  ja: OpenAPI operation-adapter profile
semantics:
  short_definition:
    zh: 用于把 HTTP 后端操作关联到本地 ToolCapability 的 Moonweave 适配 profile。
    en: A Moonweave adapter profile that associates an HTTP backend operation with a local ToolCapability.
    ja: HTTP backend operation をローカル ToolCapability に関連付ける Moonweave adapter profile。
  definition:
    zh: >
      APIOperation 是为兼容既有 ID 保留的独立本地 HTTP 适配 profile。它通过实现关系关联一个本地 ToolCapability，而不继承该能力分面。仅当某个实现实际拥有
      OpenAPI Operation Object 时，它可记录该操作的 operationId、HTTP 方法、路径和适配器引用。
      OpenAPI 将 Operation Object 定义为路径上的一个 API 操作；本 profile 不是 MCP Tool，
      不是 MCP capability，也不是 OpenAI function tool 请求对象。
    en: >
      APIOperation is an independent local HTTP-adapter profile retained for compatibility. It realizes one local ToolCapability through an association rather than inheriting from that capability facet. When an implementation
      actually has an OpenAPI Operation Object, it may record that operation's operationId, HTTP method,
      path, and adapter reference. OpenAPI defines an Operation Object as one API operation on a path.
      This profile is not an MCP Tool, an MCP capability, or an OpenAI function-tool request object.
    ja: >
      APIOperation は compatibility のために保持する独立したローカル HTTP-adapter profile である。capability facet から inheritance せず association により一つのローカル ToolCapability を実現する。実装が
      実際の OpenAPI Operation Object を持つ場合にだけ、その operationId、HTTP method、path、
      adapter reference を記録できる。OpenAPI では Operation Object は path 上の一つの API
      operation である。この profile は MCP Tool、MCP capability、または OpenAI function-tool
      request object ではない。
  why_needed:
    zh: 本地编排器可将业务动作关联到真实 HTTP 适配器，同时不把 OpenAPI 文档误称为其他工具协议。
    en: A local orchestrator can associate a business action with a real HTTP adapter without relabeling an OpenAPI document as another tool protocol.
    ja: ローカル orchestrator は OpenAPI document を別の tool protocol と誤称せずに business action を実際の HTTP adapter に関連付けられる。
  includes:
    - zh: OpenAPI 文档引用、operationId、HTTP 方法、路径模板和本地适配器引用。
      en: An OpenAPI document reference, operationId, HTTP method, path template, and local adapter reference.
      ja: OpenAPI document reference、operationId、HTTP method、path template、ローカル adapter reference。
    - zh: 对 HTTP 后端操作的本地可调用能力关联。
      en: A local callable-capability association for an HTTP backend operation.
      ja: HTTP backend operation のローカル callable-capability association。
  excludes:
    - zh: MCP server 的 tools capability 声明、tools/list 响应或 Tool 记录。
      en: An MCP server tools capability declaration, tools/list response, or Tool record.
      ja: MCP server の tools capability declaration、tools/list response、または Tool record。
    - zh: 没有实际 OpenAPI Operation Object 的任意 REST、GraphQL 或 RPC 标签。
      en: An arbitrary REST, GraphQL, or RPC label without an actual OpenAPI Operation Object.
      ja: 実際の OpenAPI Operation Object を持たない任意の REST、GraphQL、または RPC label。
  semantic_kind: entity
  aliases:
    - language: en
      value: HTTP operation adapter
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      openapi_document_ref 指向具体 OpenAPI 文档，operation_id 对应 Operation Object 的 operationId，
      而 adapter_ref 指向执行 HTTP 请求的本地实现。路径和方法用于选择适配器；参数、请求体、响应和安全要求
      仍须由实际 OpenAPI 文档及运行时策略处理。
    en: >
      openapi_document_ref points to a concrete OpenAPI document, operation_id corresponds to the
      Operation Object operationId, and adapter_ref points to the local implementation that makes an
      HTTP request. Path and method select an adapter; the real OpenAPI document and runtime policy
      still govern parameters, request bodies, responses, and security.
    ja: >
      openapi_document_ref は具体的な OpenAPI document を指し、operation_id は Operation Object の
      operationId に対応し、adapter_ref は HTTP request を行うローカル implementation を指す。path と
      method は adapter を選択する。parameter、request body、response、security は実際の OpenAPI
      document と runtime policy が引き続き扱う。
  typical_input:
    - description:
        zh: 指向 OpenAPI GET 操作的本地能力适配器。
        en: A local capability adapter pointing at an OpenAPI GET operation.
        ja: OpenAPI GET operation を指すローカル capability adapter。
      format: |
        {"openapi_document_ref":"customer-api-v1","operation_id":"getCustomer","http_method":"GET","path_template":"/customers/{customerId}"}
      source_claims: [openapi-operation-object, moonweave-api-operation-profile]
  typical_output:
    - description:
        zh: 可由本地执行器解析的 HTTP 适配器引用。
        en: An HTTP adapter reference resolvable by a local executor.
        ja: ローカル executor が解決できる HTTP adapter reference。
      format: |
        {"adapter_ref":"http-adapter://customer-api/getCustomer","tool_capability_ref":"get-customer"}
      source_claims: [moonweave-api-operation-profile]
  reference_implementations:
    - name: OpenAPI Specification Operation Object
      url: https://spec.openapis.org/oas/latest.html
      description: Defines an Operation Object as a single API operation on a path and specifies operationId and related operation fields.
structure:
  identity_keys: [openapi_document_ref, operation_id, adapter_revision]
  fields:
    - id: adapter_revision
      labels:
        zh: HTTP 适配器修订
        en: HTTP adapter revision
        ja: HTTP adapter revision
      definitions:
        zh: 标识此独立本地 HTTP 适配器修订；执行器、定义或适配映射变化必须创建新版本，而不修改旧记录。
        en: Identifies this independent local HTTP adapter revision; a change to executor, definition, or adapter mapping must create a new version rather than mutate the old record.
        ja: この独立ローカル HTTP adapter revision を識別する。executor、definition、adapter mapping の変更は旧 record を mutate せず新 version を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "1"
      allowed_values: []
      source_claims: [moonweave-api-operation-profile]
    - id: openapi_document_ref
      labels:
        zh: OpenAPI 文档引用
        en: OpenAPI document reference
        ja: OpenAPI document reference
      definitions:
        zh: 指向承载该 Operation Object 的具体 OpenAPI 文档版本。
        en: Points to the concrete OpenAPI document version that contains the Operation Object.
        ja: Operation Object を含む具体的な OpenAPI document version を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: customer-api-v1
      allowed_values: []
      source_claims: [moonweave-api-operation-profile]
    - id: operation_id
      labels:
        zh: 操作标识符
        en: Operation identifier
        ja: operation identifier
      definitions:
        zh: 对应 OpenAPI Operation Object 的 operationId；该标识符在相关文档内应保持唯一。
        en: Corresponds to an OpenAPI Operation Object operationId and should remain unique within its relevant document.
        ja: OpenAPI Operation Object の operationId に対応し、関連 document 内で一意であるべき identifier。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: getCustomer
      allowed_values: []
      source_claims: [openapi-operation-object, moonweave-api-operation-profile]
    - id: http_method
      labels:
        zh: HTTP 方法
        en: HTTP method
        ja: HTTP method
      definitions:
        zh: 该操作所在路径项的 HTTP 方法，用于选择本地 HTTP 适配器。
        en: The HTTP method of the path item that helps select the local HTTP adapter.
        ja: ローカル HTTP adapter を選ぶための path item の HTTP method。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: GET
      allowed_values: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS]
      source_claims: [openapi-operation-object, moonweave-api-operation-profile]
    - id: path_template
      labels:
        zh: 路径模板
        en: Path template
        ja: path template
      definitions:
        zh: OpenAPI 文档中承载该操作的路径模板，不携带一次调用的实际参数值。
        en: The path template that contains the operation in the OpenAPI document and not the actual values of one call.
        ja: OpenAPI document 内で operation を含む path template。単一 call の実値は含まない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: /customers/{customerId}
      allowed_values: []
      source_claims: [openapi-operation-object, moonweave-api-operation-profile]
    - id: adapter_ref
      labels:
        zh: 本地适配器引用
        en: Local adapter reference
        ja: local adapter reference
      definitions:
        zh: 指向将本地工具调用转换为该 HTTP 操作的实现。
        en: Points to the implementation that converts a local tool call into this HTTP operation.
        ja: ローカル tool call をこの HTTP operation に変換する implementation を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: http-adapter://customer-api/getCustomer
      allowed_values: []
      source_claims: [moonweave-api-operation-profile]
  constraints:
    - id: api-operation-needs-concrete-openapi-operation
      severity: error
      expression_language: plain
      expression: APIOperation must identify adapter_revision, a concrete OpenAPI document and operation identifier, and realize exactly one local ToolCapability; a changed local adapter mapping creates a new revision and it cannot be used to assert that every HTTP endpoint is an MCP Tool or an OpenAI function.
      explanation:
        zh: 本地 HTTP 适配关系不把端点自动转换为其他协议的工具对象。
        en: A local HTTP adapter association does not automatically convert an endpoint into another protocol's tool object.
        ja: ローカル HTTP adapter association は endpoint を他の protocol の tool object に自動変換しない。
      source_claims: [openapi-operation-object, moonweave-api-operation-profile]
  required_relations: [APIOperation-realizes-ToolCapability]
examples:
  - id: api-operation-positive-openapi-get

    labels:
      zh: OpenAPI 客户查询操作
      en: OpenAPI customer retrieval operation
      ja: OpenAPI customer retrieval operation

    descriptions:
      zh: Gorilla APIBench 训练 LLM 生成 API 调用减少 hallucination；LangChain BaseTool(name,description,args_schema,_run(),_arun())；Semantic Kernel @kernel_function；Instructor response_model=Pydantic 作 schema。
      en: Gorilla APIBench trains LLM for API calls reducing hallucination; LangChain BaseTool(name,description,args_schema,_run(),_arun()); Semantic Kernel @kernel_function; Instructor response_model=Pydantic as schema.
      ja: Gorilla APIBench が LLM を訓練して API 呼出し hallucination を低減。LangChain BaseTool。Semantic Kernel @kernel_function。Instructor response_model=Pydantic schema。
    field_values:
      adapter_revision: "1"
      operation_id: getCustomer
      http_method: GET
      path_template: /customers/{customerId}
    related_node_ids: [APIOperation, ToolCapability]
    related_relation_ids: [APIOperation-realizes-ToolCapability]

    source_claims: [openapi-operation-object, moonweave-api-operation-profile]
  - id: api-operation-counterexample-mcp-relabel

    labels:
      zh: 将 HTTP 端点误称为 MCP Tool
      en: HTTP endpoint relabeled as an MCP Tool
      ja: HTTP endpoint を MCP Tool と誤称する例

    descriptions:
      zh: 反例：Gorilla 无 retriever 生成不存在 API 名；LangChain tool 缺 args_schema Pydantic model；Instructor response_model 字段与 OpenAI function parameters 混用。
      en: Counterexample: Gorilla generates nonexistent API name without retriever; LangChain tool missing args_schema Pydantic model; Instructor response_model fields mixed with OpenAI function parameters.
      ja: 反例：Gorilla が retriever なしで不存在 API 名を生成。LangChain tool に args_schema 欠落。Instructor response_model と OpenAI function parameters 混同。
    field_values:
      adapter_revision: "1"
      path_template: /health
      adapter_ref: http-adapter://service/health
    related_node_ids: [APIOperation, ToolCapability]
    related_relation_ids: [APIOperation-realizes-ToolCapability]

    source_claims: [moonweave-api-operation-profile]
  - id: api-operation-boundary-operation-and-policy

    labels:
      zh: HTTP 操作与运行时策略边界
      en: Boundary between HTTP operation and runtime policy
      ja: HTTP operation と runtime policy の境界

    descriptions:
      zh: Gorilla API 文档 schema vs LangChain StructuredTool.from_function vs Instructor Pydantic model 的声明-运行时边界；ToolDefinition profile 非 wire 对象。
      en: Declaration-runtime boundary among Gorilla API doc schema, LangChain StructuredTool.from_function, Instructor Pydantic model; ToolDefinition profile is not wire object.
      ja: Gorilla API 文档 schema、LangChain StructuredTool.from_function、Instructor Pydantic model の宣言-ランタイム境界。ToolDefinition profile は wire object ではない。
    field_values:
      adapter_revision: "1"
      operation_id: createPayment
      http_method: POST
    related_node_ids: [APIOperation, ToolCapability]
    related_relation_ids: [APIOperation-realizes-ToolCapability]

    source_claims: [openapi-operation-object, moonweave-api-operation-profile]
  - id: api-operation-instance-http-adapter

    labels:
      zh: 客户查询 HTTP 适配器实例
      en: Customer-query HTTP adapter instance
      ja: customer-query HTTP adapter instance

    descriptions:
      zh: LangChain 实例：StructuredTool.from_function(get_weather,name="get_weather",args_schema=WeatherInput)；Gorilla 实例：HuggingFace pipeline(task="sentiment-analysis") API 调用 schema。
      en: LangChain instance: StructuredTool.from_function(get_weather,name="get_weather",args_schema=WeatherInput); Gorilla instance: HuggingFace pipeline(task="sentiment-analysis") API call schema.
      ja: LangChain 実例：StructuredTool.from_function(get_weather,args_schema=WeatherInput)。Gorilla 実例：HuggingFace pipeline(task="sentiment-analysis") API 呼出し schema。
    field_values:
      adapter_revision: "1"
      openapi_document_ref: customer-api-v1
      operation_id: getCustomer
      adapter_ref: http-adapter://customer-api/getCustomer
    related_node_ids: [APIOperation, ToolCapability]
    related_relation_ids: [APIOperation-realizes-ToolCapability]

    source_claims: [openapi-operation-object, moonweave-api-operation-profile]
parent_relation: null
relations:
  - id: APIOperation-realizes-ToolCapability
    predicate: realizes
    target: concept:ToolCapability
    endpoint_order: adapter-to-capability
    direction: source-to-target
    relation_kind: association
    labels:
      zh: 实现工具能力分面
      en: realizes tool-capability facet
      ja: tool-capability facet を実現する
    definition:
      zh: APIOperation 将一个有具体 OpenAPI Operation Object 的 HTTP 适配 profile 关联到一个本地 ToolCapability；它不是该能力的子类型。
      en: APIOperation associates one HTTP adapter profile backed by a concrete OpenAPI Operation Object with one local ToolCapability; it is not a subtype of that capability.
      ja: APIOperation は具体的な OpenAPI Operation Object に裏付けられた一つの HTTP adapter profile を一つのローカル ToolCapability に関連付ける。これは capability の subtype ではない。
    cardinality:
      source:
        min: 1
        max: 1
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_realized_by
      labels:
        zh: 被 HTTP 适配 profile 实现
        en: is realized by HTTP adapter profile
        ja: HTTP adapter profile により実現される
    conditions:
      - id: concrete-openapi-contract-required
        expression_language: plain
        expression: The source APIOperation must identify a concrete OpenAPI document version and operationId before it realizes a local ToolCapability.
        source_claims: [openapi-operation-object]
    temporal_scope: versioned
    boundary_context: This is a Moonweave local adapter association. It does not declare an OpenAPI Operation Object to be an MCP Tool, an MCP capability, or an OpenAI function-tool request object.
    constraints:
      - id: api-operation-realization-is-local
        severity: error
        expression_language: plain
        expression: APIOperation realizes a local ToolCapability association and must not be interpreted as OpenAPI, MCP, or OpenAI type inheritance.
        explanation:
          zh: 本地适配关联不改变 OpenAPI 或任一工具协议的对象模型。
          en: A local adapter association does not change the object model of OpenAPI or any tool protocol.
          ja: ローカル adapter association は OpenAPI またはいかなる tool protocol の object model も変更しない。
        source_claims: [moonweave-api-operation-taxonomy]
    examples: []
    source_claims: [moonweave-api-operation-taxonomy, openapi-operation-object]
    distinct_fact_rationale:
      zh: 该边记录 HTTP 适配器实现本地业务能力的事实，与 OpenAPI 文档中的 Operation Object 定义是不同事实。
      en: This edge records that an HTTP adapter realizes a local business capability, a fact distinct from the Operation Object definition in the OpenAPI document.
      ja: この edge は HTTP adapter がローカル business capability を実現する fact を記録し、OpenAPI document 内の Operation Object 定義とは別の fact である。
