schema: moonweave.ai/ontology-node/v1
id: HostedMCPTool
kind: concept
labels:
  zh: Agents SDK HostedMCPTool
  en: Agents SDK HostedMCPTool
  ja: Agents SDK HostedMCPTool
semantics:
  short_definition:
    zh: OpenAI Agents SDK 中由 Responses API 托管并连接远程 MCP 服务器的 HostedMCPTool 配置。
    en: An OpenAI Agents SDK HostedMCPTool configuration hosted by the Responses API and connected to a remote MCP server.
    ja: Responses API に hosted され remote MCP server に接続する OpenAI Agents SDK HostedMCPTool configuration。
  definition:
    zh: >
      HostedMCPTool 是 OpenAI Agents SDK 文档明确命名的工具类型。其 tool_config 使用 type 为 mcp，
      具有 server_label，并通过 server_url 或 connector 配置指向远程 MCP 服务器；Responses API 代表
      调用方枚举和调用远程服务器的工具。它不是本地 MCPServer 实例，不应加入本地 mcp_servers 列表，
      也不是通用 Moonweave HostedTool 分类本身。
    en: >
      HostedMCPTool is a tool type explicitly named in OpenAI Agents SDK documentation. Its tool_config
      uses type mcp, has server_label, and points to a remote MCP server through server_url or connector
      configuration; the Responses API lists and calls the remote server's tools on the caller's behalf.
      It is not a local MCPServer instance, should not be added to a local mcp_servers list, and is not
      itself the generic Moonweave HostedTool category.
    ja: >
      HostedMCPTool は OpenAI Agents SDK documentation で明示的に名付けられた tool type である。
      tool_config は type mcp を使い、server_label を持ち、server_url または connector configuration
      を通じて remote MCP server を指す。Responses API は caller に代わって remote server の tool を
      list し call する。これはローカル MCPServer instance ではなく、ローカル mcp_servers list に
      追加すべきではなく、generic Moonweave HostedTool category 自体でもない。
  why_needed:
    zh: 目录必须准确表达托管 MCP 连接的 SDK 语义，避免把远程服务器配置与本地 MCP 服务器混为一谈。
    en: A catalog must express the SDK semantics of a hosted MCP connection accurately and avoid conflating remote server configuration with a local MCP server.
    ja: catalog は hosted MCP connection の SDK semantics を正確に表し、remote server configuration とローカル MCP server を混同しない必要がある。
  includes:
    - zh: server_label、远程 server_url 或 connector 配置、审批配置和可选延迟加载配置。
      en: server_label, a remote server_url or connector configuration, approval configuration, and optional deferred loading.
      ja: server_label、remote server_url または connector configuration、approval configuration、任意の deferred loading。
    - zh: 由 Responses API 托管的远程 MCP 工具发现和调用语义。
      en: Remote MCP tool discovery and call semantics hosted by the Responses API.
      ja: Responses API に hosted された remote MCP tool discovery と call semantics。
  excludes:
    - zh: 本地 MCPServer 对象、其本地 mcp_servers 注册，或在本 profile 中存放连接密钥。
      en: A local MCPServer object, its local mcp_servers registration, or connection secrets stored in this profile.
      ja: ローカル MCPServer object、そのローカル mcp_servers registration、またはこの profile に格納する connection secret。
    - zh: 对远程服务器工具权限或批准结果的永久授权声明。
      en: A permanent authorization assertion for remote-server tools or approval results.
      ja: remote-server tool または approval result に対する恒久的な authorization assertion。
  semantic_kind: official-sdk-type
  aliases:
    - language: en
      value: hosted remote MCP tool
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      server_label 是托管工具的稳定标记，server_url 或 connector_id 选择连接路径，tool_config 保存
      SDK 的 mcp 配置，require_approval 表示 SDK 审批策略。defer_loading 为 true 时，SDK 可与
      ToolSearchTool 配合延迟获取托管服务器工具；该优化不改变 MCP server 的实际工具定义。
    en: >
      server_label is the stable hosted-tool marker, server_url or connector_id chooses the connection
      route, tool_config carries SDK mcp configuration, and require_approval represents SDK approval
      policy. When defer_loading is true, the SDK can defer hosted-server tool loading with ToolSearchTool;
      that optimization does not change the MCP server's actual tool definitions.
    ja: >
      server_label は stable hosted-tool marker、server_url または connector_id は connection route、
      tool_config は SDK mcp configuration、require_approval は SDK approval policy を表す。
      defer_loading が true の場合、SDK は ToolSearchTool とともに hosted-server tool loading を遅延できる。
      この optimization は MCP server の実際の tool definition を変更しない。
  typical_input:
    - description:
        zh: 使用远程 URL 的 HostedMCPTool 配置。
        en: A HostedMCPTool configuration using a remote URL.
        ja: remote URL を使う HostedMCPTool configuration。
      format: |
        {"tool_config":{"type":"mcp","server_label":"deepwiki","server_url":"https://mcp.deepwiki.com/mcp","require_approval":"never"}}
      source_claims: [agents-sdk-hosted-mcp-config]
  typical_output:
    - description:
        zh: 由 Responses API 代表调用方发现的远程工具引用。
        en: A remote tool reference discovered by the Responses API on the caller's behalf.
        ja: Responses API が caller に代わって発見した remote tool reference。
      format: |
        {"server_label":"deepwiki","remote_tool_name":"search_docs","execution_boundary":"responses-hosted"}
      source_claims: [agents-sdk-hosted-mcp-execution]
  reference_implementations:
    - name: OpenAI Agents SDK MCP
      url: https://openai.github.io/openai-agents-python/mcp/
      description: Documents HostedMCPTool configuration, hosted remote MCP execution, approval handling, and deferred loading.
structure:
  identity_keys: [tool_id, source_protocol, binding_revision, server_label]
  fields:
    - id: server_label
      labels:
        zh: 服务器标签
        en: Server label
        ja: server label
      definitions:
        zh: HostedMCPTool tool_config 中标识远程 MCP 服务器的标签。
        en: The label in HostedMCPTool tool_config that identifies the remote MCP server.
        ja: remote MCP server を識別する HostedMCPTool tool_config 内の label。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: deepwiki
      allowed_values: []
      source_claims: [agents-sdk-hosted-mcp-config]
    - id: server_url
      labels:
        zh: 服务器 URL
        en: Server URL
        ja: server URL
      definitions:
        zh: 可选的远程 MCP server_url；使用 connector 配置时可不提供。
        en: An optional remote MCP server_url that may be absent when connector configuration is used.
        ja: connector configuration を使う場合は省略できる任意の remote MCP server_url。
      datatype: uri
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: https://mcp.deepwiki.com/mcp
      allowed_values: []
      source_claims: [agents-sdk-hosted-mcp-config]
    - id: connector_id
      labels:
        zh: 连接器标识符
        en: Connector identifier
        ja: connector identifier
      definitions:
        zh: 可选的托管连接器标识符，用于以连接器配置代替直接 server_url。
        en: An optional hosted connector identifier used instead of a direct server_url.
        ja: direct server_url の代わりに使う任意の hosted connector identifier。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: connector:deepwiki
      allowed_values: []
      source_claims: [agents-sdk-hosted-mcp-config]
    - id: tool_config
      labels:
        zh: 工具配置
        en: Tool configuration
        ja: tool configuration
      definitions:
        zh: 传递给 HostedMCPTool 的 SDK mcp 配置，不包含凭据值。
        en: The SDK mcp configuration passed to HostedMCPTool and containing no credential values.
        ja: credential value を含まない HostedMCPTool に渡す SDK mcp configuration。
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: '{"type":"mcp","server_label":"deepwiki","server_url":"https://mcp.deepwiki.com/mcp"}'
      allowed_values: []
      source_claims: [agents-sdk-hosted-mcp-config]
    - id: require_approval
      labels:
        zh: 审批要求
        en: Approval requirement
        ja: approval requirement
      definitions:
        zh: HostedMCPTool 配置的 SDK 审批策略；实际审批仍在运行时处理。
        en: The SDK approval policy for HostedMCPTool configuration; actual approval is still handled at runtime.
        ja: HostedMCPTool configuration の SDK approval policy。実際の approval は runtime で引き続き処理される。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: never
      allowed_values: [always, never, per-tool-policy]
      source_claims: [agents-sdk-hosted-mcp-approval]
    - id: defer_loading
      labels:
        zh: 延迟加载
        en: Deferred loading
        ja: deferred loading
      definitions:
        zh: 可选地表示是否与 ToolSearchTool 配合延迟获取托管服务器的工具。
        en: Optionally states whether hosted-server tools are loaded lazily with ToolSearchTool.
        ja: ToolSearchTool とともに hosted-server tool を lazy load するかを任意で示す。
      datatype: boolean
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: true
      allowed_values: [true, false]
      source_claims: [agents-sdk-hosted-mcp-deferred-loading]
    - id: binding_revision
      labels:
        zh: 运行时绑定修订
        en: Runtime-binding revision
        ja: runtime-binding revision
      definitions:
        zh: 标识此独立本地 运行时绑定修订；执行器、定义或适配映射变化必须创建新版本，而不修改旧记录。
        en: Identifies this independent local Runtime-binding revision; a change to executor, definition, or adapter mapping must create a new version rather than mutate the old record.
        ja: この独立ローカル runtime-binding revision を識別する。executor、definition、adapter mapping の変更は旧 record を mutate せず新 version を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "1"
      allowed_values: []
      source_claims: [moonweave-hosted-mcp-tool-taxonomy]
    - id: tool_id
      labels:
        zh: 本地工具标识符
        en: Local tool identifier
        ja: ローカル tool 識別子
      definitions:
        zh: 在本地运行时范围内标识可调用工具 profile。
        en: Identifies a callable-tool profile within local runtime scope.
        ja: ローカル runtime scope 内で callable-tool profile を識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: files-read-file
      allowed_values: []
      source_claims: [moonweave-hosted-mcp-tool-taxonomy]
    - id: definition_ref
      labels:
        zh: 定义引用
        en: Definition reference
        ja: definition reference
      definitions:
        zh: 指向此运行时绑定所实现的、来源明确的一个 ToolDefinition profile。
        en: Points to the one provenance-bearing ToolDefinition profile realized by this runtime binding.
        ja: この runtime binding が実現する、provenance を持つ一つの ToolDefinition profile を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: files-read-file
      allowed_values: []
      source_claims: [moonweave-hosted-mcp-tool-taxonomy]
    - id: executor_kind
      labels:
        zh: 执行器种类
        en: Executor kind
        ja: executor kind
      definitions:
        zh: 标识调用由 MCP server、应用函数或 SDK 运行时等哪个执行器处理。
        en: Identifies whether an MCP server, application function, SDK runtime, or another executor handles the call.
        ja: MCP server、application function、SDK runtime、その他の executor のどれが call を処理するかを示す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: mcp-server
      allowed_values: [mcp-server, application-function, agents-sdk-runtime, hosted-service]
      source_claims: [moonweave-hosted-mcp-tool-taxonomy]
    - id: source_protocol
      labels:
        zh: 来源协议
        en: Source protocol
        ja: source protocol
      definitions:
        zh: 标识工具的定义和调用契约所属协议或 SDK。
        en: Identifies the protocol or SDK owning tool definition and call contract.
        ja: tool definition と call contract を所有する protocol または SDK を識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: MCP
      allowed_values: [MCP, OpenAI, OpenAI-Agents-SDK]
      source_claims: [moonweave-hosted-mcp-tool-taxonomy]
  constraints:
    - id: hosted-mcp-tool-needs-one-remote-route
      severity: error
      expression_language: plain
      expression: HostedMCPTool must provide server_label and an appropriate server_url or connector configuration, use type mcp in tool_config, and keep credentials outside this ontology profile.
      explanation:
        zh: 托管 MCP 配置必须指向远程服务器或连接器，但不得把秘密或本地服务器注册混入语义记录。
        en: Hosted MCP configuration must point to a remote server or connector but must not mix secrets or local-server registration into the semantic record.
        ja: hosted MCP configuration は remote server または connector を指す必要があるが、secret や local-server registration を semantic record に混在させてはならない。
      source_claims: [agents-sdk-hosted-mcp-config, moonweave-hosted-mcp-tool-profile]
    - id: hosted-mcptool-inherits-parent-required-fields
      severity: error
      expression_language: plain
      expression: "All inherited required Tool fields are fields of this same record; the is_a subtype does not establish or reference a second Tool record."
      explanation: {zh: "所有继承的 Tool 必需字段属于同一记录，该 is_a 子类型不建立或引用第二条 Tool 记录。", en: "Inherited required fields stay on the same record rather than creating a second parent record.", ja: "継承された必須 Tool フィールドは同じレコードに属し、この is_a 下位型は 2 番目の親レコードを作成または参照しない。"}
      source_claims: [moonweave-hosted-mcp-tool-taxonomy]
  required_relations: []
examples:
  - id: hosted-mcp-tool-positive-url-config

    labels:
      zh: URL 托管 MCP 配置
      en: URL-hosted MCP configuration
      ja: URL-hosted MCP configuration

    descriptions:
      zh: "OpenAI Hosted tools:[{type:\"code_interpreter\"}] 托管沙箱；Anthropic tools:[{name:\"get_weather\",input_schema:{type:\"object\",properties:{location:{type:\"string\"}}}] 托管 schema 验证。"
      en: "OpenAI Hosted tools:[{type:\"code_interpreter\"}] managed sandbox; Anthropic tools:[{name:\"get_weather\",input_schema:{type:\"object\",properties:{location:{type:\"string\"}}}] managed schema validation."
      ja: "OpenAI Hosted tools:[{type:\"code_interpreter\"}] マネージド sandbox。Anthropic tools input_schema マネージド検証。"
    field_values:
      tool_id: hosted-mcp-deepwiki
      source_protocol: OpenAI-Agents-SDK
      binding_revision: "1"
      server_label: deepwiki
      server_url: https://mcp.deepwiki.com/mcp
      require_approval: never
    related_node_ids: [HostedMCPTool, HostedTool]
    related_relation_ids: [HostedMCPTool-is_a-Tool]

    source_claims: [agents-sdk-hosted-mcp-config, agents-sdk-hosted-mcp-execution]
  - id: hosted-mcp-tool-counterexample-local-server-registration

    labels:
      zh: 托管工具被注册为本地服务器
      en: Hosted tool registered as local server
      ja: hosted tool を local server として登録する例

    descriptions:
      zh: 反例：HostedMCPTool 未配置 server_url 就注册；HostedContainerShell 无 resource limits 配置。
      en: Counterexample: HostedMCPTool registered without server_url; HostedContainerShell without resource limits.
      ja: 反例：HostedMCPTool server_url 未設定で登録。HostedContainerShell resource limits 未設定。
    field_values:
      server_label: deepwiki
      tool_config: '{"type":"mcp","server_label":"deepwiki"}'
    related_node_ids: [HostedMCPTool, HostedTool]
    related_relation_ids: [HostedMCPTool-is_a-Tool]

    source_claims: [agents-sdk-hosted-mcp-execution]
  - id: hosted-mcp-tool-boundary-deferred-loading

    labels:
      zh: 延迟加载与服务器工具定义边界
      en: Boundary between deferred loading and server tool definitions
      ja: deferred loading と server tool definition の境界

    descriptions:
      zh: OpenAI 托管 Code Interpreter vs Anthropic 托管 tool_use vs 本地 LocalRuntimeTool 的执行环境边界。
      en: Execution environment boundary among OpenAI hosted Code Interpreter, Anthropic hosted tool_use, local LocalRuntimeTool.
      ja: OpenAI マネージド Code Interpreter、Anthropic マネージド tool_use、ローカル LocalRuntimeTool の実行環境境界。
    field_values:
      defer_loading: true
      server_label: deepwiki
    related_node_ids: [HostedMCPTool, HostedTool]
    related_relation_ids: [HostedMCPTool-is_a-Tool]

    source_claims: [agents-sdk-hosted-mcp-deferred-loading]
  - id: hosted-mcp-tool-instance-connector-config

    labels:
      zh: 连接器托管 MCP 实例
      en: Connector-hosted MCP instance
      ja: connector-hosted MCP instance

    descriptions:
      zh: "OpenAI Assistants hosted code_interpreter 实例：thread 内执行 matplotlib 生成 chart PNG；Anthropic hosted get_weather 实例 input={location:\"Tokyo\"}。"
      en: "OpenAI Assistants hosted code_interpreter instance: matplotlib chart PNG in thread; Anthropic hosted get_weather instance input={location:\"Tokyo\"}."
      ja: "OpenAI Assistants hosted code_interpreter 実例：matplotlib chart PNG。Anthropic hosted get_weather input={location:\"Tokyo\"}。"
    field_values:
      tool_id: hosted-mcp-deepwiki
      source_protocol: OpenAI-Agents-SDK
      binding_revision: "1"
      server_label: deepwiki
      connector_id: connector:deepwiki
      require_approval: always
    related_node_ids: [HostedMCPTool, HostedTool]
    related_relation_ids: [HostedMCPTool-is_a-Tool]

    source_claims: [agents-sdk-hosted-mcp-config, agents-sdk-hosted-mcp-approval]
