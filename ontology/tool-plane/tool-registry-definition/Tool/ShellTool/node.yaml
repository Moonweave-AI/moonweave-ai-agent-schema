schema: moonweave.ai/ontology-node/v1
id: ShellTool
kind: concept
labels:
  zh: Agents SDK ShellTool
  en: Agents SDK ShellTool
  ja: Agents SDK ShellTool
semantics:
  short_definition:
    zh: 可通过本地执行器或 OpenAI 托管容器执行命令的 OpenAI Agents SDK ShellTool。
    en: An OpenAI Agents SDK ShellTool that can execute commands through a local executor or an OpenAI-hosted container.
    ja: local executor または OpenAI-hosted container を通じて command を実行できる OpenAI Agents SDK ShellTool。
  definition:
    zh: >
      ShellTool 是官方 Agents SDK 工具类型，跨越本地和托管两种执行方式。使用 executor 或
      environment type 为 local 时，应用承担命令执行；使用 environment type 为 container_auto
      或 container_reference 时，Responses API 提供托管容器。它不是 MCP Tool 记录，也不是一个
      自行保证命令安全、网络许可或文件访问的 Moonweave 泛型类别。
    en: >
      ShellTool is an official Agents SDK tool type spanning local and hosted execution modes. With
      an executor or environment type local, the application performs command execution; with
      environment type container_auto or container_reference, the Responses API provides a hosted
      container. It is not an MCP Tool record and not a Moonweave generic category that independently
      guarantees command safety, network permission, or file access.
    ja: >
      ShellTool は local と hosted execution mode をまたぐ公式 Agents SDK tool type である。executor
      または environment type local を使う場合は application が command execution を行い、
      environment type container_auto または container_reference を使う場合は Responses API が
      hosted container を提供する。これは MCP Tool record ではなく、command safety、network permission、
      file access を独自に保証する Moonweave generic category でもない。
  why_needed:
    zh: 目录需记录命令执行的真实环境，避免将同一 ShellTool 名称误解为单一安全或传输模型。
    en: A catalog needs to record the real command-execution environment and avoid interpreting one ShellTool name as one security or transport model.
    ja: catalog は実際の command-execution environment を記録し、一つの ShellTool name を一つの security または transport model と解釈しない必要がある。
  includes:
    - zh: 环境类型、可选本地执行器、网络策略和技能引用。
      en: Environment type, optional local executor, network policy, and skill references.
      ja: environment type、任意の local executor、network policy、skill reference。
    - zh: 本地执行和托管容器执行的明确区分。
      en: An explicit distinction between local execution and hosted-container execution.
      ja: local execution と hosted-container execution の明示的な区別。
  excludes:
    - zh: 任意 shell 命令文本本身、MCP tools/call 负载或长期凭据存储。
      en: An arbitrary shell command text itself, an MCP tools/call payload, or long-lived credential storage.
      ja: 任意の shell command text 自体、MCP tools/call payload、または long-lived credential storage。
    - zh: 忽略 sandbox、网络策略或人工审批的执行声明。
      en: An execution assertion that ignores sandbox, network policy, or human approval.
      ja: sandbox、network policy、human approval を無視する execution assertion。
  semantic_kind: official-sdk-type
  aliases:
    - language: en
      value: SDK shell execution tool
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      environment_type 决定本地或托管容器模式；executor_ref 仅用于本地实现。托管环境可使用
      container_auto 或 container_reference，并可设定 network_policy 和 skills；官方文档明确指出
      托管环境不应同时设置 executor、needs_approval 或 on_approval。命令文本和结果属于一次运行，
      不应存入工具定义 profile。
    en: >
      environment_type chooses local or hosted-container mode; executor_ref is only for local
      implementation. Hosted environments can use container_auto or container_reference and may set
      network_policy and skills; official documentation says hosted environments must not also set
      executor, needs_approval, or on_approval. Command text and results belong to one run and are
      not stored in the tool-definition profile.
    ja: >
      environment_type は local または hosted-container mode を選び、executor_ref は local
      implementation だけに使う。hosted environment は container_auto または container_reference を
      使え、network_policy と skills を設定できる。公式 documentation は hosted environment で
      executor、needs_approval、on_approval を同時に設定してはならないとする。command text と result
      は一回の run に属し、tool-definition profile には保存しない。
  typical_input:
    - description:
        zh: 使用本地 executor 的 ShellTool 配置。
        en: A ShellTool configuration using a local executor.
        ja: local executor を使う ShellTool configuration。
      format: |
        {"environment_type":"local","executor_ref":"python://shell/run_shell","network_policy":"local-policy"}
      source_claims: [agents-sdk-shell-tool-modes]
  typical_output:
    - description:
        zh: 具有执行环境来源的单次命令输出。
        en: One command output with execution-environment provenance.
        ja: execution-environment provenance を持つ一回の command output。
      format: |
        {"run_ref":"shell-run-42","output_kind":"stdout-stderr","execution_boundary":"local"}
      source_claims: [agents-sdk-shell-tool-modes]
  reference_implementations:
    - name: OpenAI Agents SDK ShellTool
      url: https://openai.github.io/openai-agents-python/tools/
      description: Documents ShellTool local execution and hosted container environments, including container_auto and container_reference.
structure:
  identity_keys: [tool_id, source_protocol, binding_revision, environment_type]
  fields:
    - id: environment_type
      labels:
        zh: 环境类型
        en: Environment type
        ja: environment type
      definitions:
        zh: ShellTool 使用的运行环境类型，例如 local、container_auto 或 container_reference。
        en: The ShellTool execution-environment type, such as local, container_auto, or container_reference.
        ja: local、container_auto、container_reference など ShellTool が使う execution-environment type。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: local
      allowed_values: [local, container_auto, container_reference]
      source_claims: [agents-sdk-shell-tool-modes]
    - id: executor_ref
      labels:
        zh: 本地执行器引用
        en: Local executor reference
        ja: local executor reference
      definitions:
        zh: 本地 ShellTool 模式中执行命令的应用实现；托管环境不可使用。
        en: The application implementation that executes commands in local ShellTool mode and must not be used for hosted environments.
        ja: local ShellTool mode で command を実行する application implementation。hosted environment では使ってはならない。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: python://shell/run_shell
      allowed_values: []
      source_claims: [agents-sdk-shell-tool-modes]
    - id: container_ref
      labels:
        zh: 容器引用
        en: Container reference
        ja: container reference
      definitions:
        zh: 可选的已有托管容器引用，仅用于 container_reference 环境。
        en: An optional existing hosted-container reference used only with container_reference environment.
        ja: container_reference environment だけで使う任意の既存 hosted-container reference。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: cntr_example
      allowed_values: []
      source_claims: [agents-sdk-shell-tool-modes]
    - id: network_policy
      labels:
        zh: 网络策略
        en: Network policy
        ja: network policy
      definitions:
        zh: 可选地记录托管容器的网络策略模式或本地策略引用。
        en: Optionally records a hosted-container network-policy mode or a local policy reference.
        ja: hosted-container network-policy mode または local policy reference を任意で記録する。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: disabled
      allowed_values: [disabled, allowlist, local-policy]
      source_claims: [agents-sdk-shell-tool-modes]
    - id: skills_ref
      labels:
        zh: 技能引用
        en: Skill reference
        ja: skill reference
      definitions:
        zh: 可选地引用 ShellTool 可用的技能或技能包，不包括其秘密内容。
        en: Optionally references skills or skill bundles available to ShellTool and excludes their secret content.
        ja: ShellTool が利用できる skill または skill bundle を任意で参照し、その secret content は含まない。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: null
      pattern: null
      example_value: skill://csv-analysis/v1
      allowed_values: []
      source_claims: [agents-sdk-shell-tool-modes]
    - id: binding_revision
      labels:
        zh: 运行时绑定修订
        en: Runtime-binding revision
        ja: runtime-binding revision
      definitions:
        zh: 标识此独立本地 运行时绑定修订；执行器、定义或适配映射变化必须创建新版本，而不修改旧记录。
        en: Identifies this independent local Runtime-binding revision; a change to executor, definition, or adapter mapping must create a new version rather than mutate the old record.
        ja: この独立ローカル runtime-binding revision を識別する。executor、definition、adapter mapping の変更は旧 record を mutate せず新 version を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "1"
      allowed_values: []
      source_claims: [moonweave-shell-tool-taxonomy]
    - id: tool_id
      labels:
        zh: 本地工具标识符
        en: Local tool identifier
        ja: ローカル tool 識別子
      definitions:
        zh: 在本地运行时范围内标识可调用工具 profile。
        en: Identifies a callable-tool profile within local runtime scope.
        ja: ローカル runtime scope 内で callable-tool profile を識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: files-read-file
      allowed_values: []
      source_claims: [moonweave-shell-tool-taxonomy]
    - id: definition_ref
      labels:
        zh: 定义引用
        en: Definition reference
        ja: definition reference
      definitions:
        zh: 指向此运行时绑定所实现的、来源明确的一个 ToolDefinition profile。
        en: Points to the one provenance-bearing ToolDefinition profile realized by this runtime binding.
        ja: この runtime binding が実現する、provenance を持つ一つの ToolDefinition profile を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: files-read-file
      allowed_values: []
      source_claims: [moonweave-shell-tool-taxonomy]
    - id: executor_kind
      labels:
        zh: 执行器种类
        en: Executor kind
        ja: executor kind
      definitions:
        zh: 标识调用由 MCP server、应用函数或 SDK 运行时等哪个执行器处理。
        en: Identifies whether an MCP server, application function, SDK runtime, or another executor handles the call.
        ja: MCP server、application function、SDK runtime、その他の executor のどれが call を処理するかを示す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: mcp-server
      allowed_values: [mcp-server, application-function, agents-sdk-runtime, hosted-service]
      source_claims: [moonweave-shell-tool-taxonomy]
    - id: source_protocol
      labels:
        zh: 来源协议
        en: Source protocol
        ja: source protocol
      definitions:
        zh: 标识工具的定义和调用契约所属协议或 SDK。
        en: Identifies the protocol or SDK owning tool definition and call contract.
        ja: tool definition と call contract を所有する protocol または SDK を識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: MCP
      allowed_values: [MCP, OpenAI, OpenAI-Agents-SDK]
      source_claims: [moonweave-shell-tool-taxonomy]
  constraints:
    - id: shell-tool-environment-must-be-coherent
      severity: error
      expression_language: plain
      expression: ShellTool must specify environment_type; hosted container environments cannot set executor_ref, while local execution needs an application-provided execution path and all modes remain subject to runtime policy.
      explanation:
        zh: 本地和托管执行使用不同配置边界，工具定义不会自行批准命令。
        en: Local and hosted execution use different configuration boundaries, and a tool definition does not approve commands by itself.
        ja: local と hosted execution は異なる configuration boundary を使い、tool definition 自体は command を承認しない。
      source_claims: [agents-sdk-shell-tool-modes]
    - id: shell-tool-inherits-parent-required-fields
      severity: error
      expression_language: plain
      expression: "All inherited required Tool fields are fields of this same record; the is_a subtype does not establish or reference a second Tool record."
      explanation: {zh: "所有继承的 Tool 必需字段属于同一记录，该 is_a 子类型不建立或引用第二条 Tool 记录。", en: "Inherited required fields stay on the same record rather than creating a second parent record.", ja: "継承された必須 Tool フィールドは同じレコードに属し、この is_a 下位型は 2 番目の親レコードを作成または参照しない。"}
      source_claims: [moonweave-shell-tool-taxonomy]
  required_relations: []
examples:
  - id: shell-tool-positive-local-executor

    labels:
      zh: 本地 shell 执行器
      en: Local shell executor
      ja: local shell executor

    descriptions:
      zh: Claude Computer Use {type:"tool_use",name:"computer",input:{action:"click",coordinate:[100,200]}} 或 action:"type" 键盘输入；OpenAI Assistants tools:[{type:"code_interpreter"}] 沙箱 Python 执行。
      en: Claude Computer Use {type:"tool_use",name:"computer",input:{action:"click",coordinate:[100,200]}} or action:"type" keyboard; OpenAI Assistants tools:[{type:"code_interpreter"}] sandbox Python execution.
      ja: Claude Computer Use action:"click"/"type"。OpenAI Assistants tools:[{type:"code_interpreter"}] sandbox Python 実行。
    field_values:
      tool_id: local-run-shell
      source_protocol: OpenAI-Agents-SDK
      binding_revision: "1"
      environment_type: local
      executor_ref: python://shell/run_shell
    related_node_ids: [ShellTool, Tool]
    related_relation_ids: [ShellTool-is_a-Tool]

    source_claims: [agents-sdk-shell-tool-modes]
  - id: shell-tool-counterexample-hosted-executor

    labels:
      zh: 托管容器同时设置本地执行器
      en: Hosted container with local executor
      ja: local executor を同時設定する hosted container

    descriptions:
      zh: 反例：Computer Use click coordinate 超出 display_width_px:1024 边界；Code Interpreter 执行 os.system 逃逸沙箱（应被阻止）。
      en: Counterexample: Computer Use click coordinate exceeds display_width_px:1024; Code Interpreter os.system escapes sandbox (should be blocked).
      ja: 反例：Computer Use click coordinate が display 境界超過。Code Interpreter os.system sandbox 逃逸。
    field_values:
      environment_type: container_auto
      executor_ref: python://shell/run_shell
    related_node_ids: [ShellTool, Tool]
    related_relation_ids: [ShellTool-is_a-Tool]

    source_claims: [agents-sdk-shell-tool-modes]
  - id: shell-tool-boundary-auto-and-reference-container

    labels:
      zh: 自动容器与引用容器边界
      en: Boundary between automatic and referenced container
      ja: automatic と referenced container の境界

    descriptions:
      zh: Claude Browser/Computer Use GUI 交互 vs OpenAI Code Interpreter 代码沙箱 vs 本地 ShellCommand 进程执行的权限边界。
      en: Permission boundary among Claude Browser/Computer Use GUI interaction, OpenAI Code Interpreter code sandbox, local ShellCommand process execution.
      ja: Claude Computer Use GUI 交互、OpenAI Code Interpreter コード sandbox、ローカル ShellCommand プロセス実行の権限境界。
    field_values:
      environment_type: container_reference
      container_ref: cntr_example
    related_node_ids: [ShellTool, Tool]
    related_relation_ids: [ShellTool-is_a-Tool]

    source_claims: [agents-sdk-shell-tool-modes]
  - id: shell-tool-instance-hosted-skill

    labels:
      zh: 托管 CSV 技能 shell 实例
      en: Hosted CSV-skill shell instance
      ja: hosted CSV-skill shell instance

    descriptions:
      zh: Code Interpreter 实例：import pandas as pd; df=pd.read_csv('data.csv'); df.describe() 返回统计摘要；Computer Use 实例：action:"screenshot" 捕获 1024x768 屏幕。
      en: Code Interpreter instance: import pandas; df.describe() returns stats; Computer Use instance: action:"screenshot" captures 1024x768 screen.
      ja: Code Interpreter 実例：pandas df.describe() 統計摘要。Computer Use 実例：action:"screenshot" 1024x768 画面キャプチャ。
    field_values:
      tool_id: csv-analysis-shell
      source_protocol: OpenAI-Agents-SDK
      binding_revision: "1"
      environment_type: container_auto
      network_policy: disabled
      skills_ref: skill://csv-analysis/v1
    related_node_ids: [ShellTool, Tool]
    related_relation_ids: [ShellTool-is_a-Tool]

    source_claims: [agents-sdk-shell-tool-modes]
parent_relation:
  id: ShellTool-is_a-Tool
  predicate: is_a
  target: concept:Tool
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: "是 Tool 运行时绑定的 ShellTool 子类型", en: "is a ShellTool subtype of the Tool runtime binding", ja: "ShellTool は Tool runtime binding の下位型である"}
  definition: {zh: "ShellTool 是保留同一 Tool 运行时绑定身份并增加 shell execution-mode contract 的本地下位型。", en: "ShellTool is a local subtype that retains the same Tool runtime-binding identity and adds its shell execution-mode contract.", ja: "ShellTool は同じ Tool runtime-binding identity を保持し shell execution-mode contract を加えるローカル下位型である。"}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_subtype, labels: {zh: "具有工具运行时绑定子类型", en: "has runtime-binding subtype", ja: "runtime-binding subtype を持つ"}}
  conditions: []
  temporal_scope: runtime
  boundary_context: This is a true same-record Moonweave subtype. It retains the Tool runtime-binding identity and does not assert external SDK or protocol class inheritance.
  constraints:
    - id: shell-tool-inherits-tool-identity
      severity: error
      expression_language: plain
      expression: "ShellTool carries the required Tool fields as one runtime-binding record and must not reference a second Tool profile as its parent identity."
      explanation: {zh: "该子类型与 Tool 使用同一运行时绑定身份，不能引用第二条父工具记录。", en: "The subtype shares one runtime-binding identity with Tool and cannot reference a second parent tool record.", ja: "この下位型は Tool と一つの runtime-binding identity を共有し、2 番目の親 tool record を参照できない。"}
      source_claims: [moonweave-shell-tool-taxonomy]
  examples: []
  source_claims: [moonweave-shell-tool-taxonomy]
  distinct_fact_rationale: {zh: "该层级表示同一运行时绑定记录上的实际本地下位型，而非外部 SDK 类树。", en: "This hierarchy states a true local subtype on the same runtime-binding record, not an external SDK class tree.", ja: "この hierarchy は外部 SDK class tree ではなく同じ runtime-binding record 上の真のローカル下位型を表す。"}
relations: []
