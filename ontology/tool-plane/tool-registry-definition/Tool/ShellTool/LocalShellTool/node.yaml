schema: moonweave.ai/ontology-node/v1
id: LocalShellTool
kind: concept
labels:
  zh: Agents SDK LocalShellTool（旧版本地 shell 集成）
  en: Agents SDK LocalShellTool legacy local-shell integration
  ja: Agents SDK LocalShellTool legacy local-shell integration
semantics:
  short_definition:
    zh: OpenAI Agents SDK 文档保留的旧版本地 shell 集成，用于应用在自身环境中执行命令。
    en: A legacy local-shell integration retained in OpenAI Agents SDK documentation for applications that execute commands in their own environment.
    ja: application が自身の environment で command を実行するために OpenAI Agents SDK documentation に残る legacy local-shell integration。
  definition:
    zh: >
      LocalShellTool 是 OpenAI Agents SDK 文档中标记为旧版本地 shell 集成的名称。它表示命令由
      应用的本地执行路径处理，而非由 Responses API 托管容器执行。当前文档还说明可使用
      ShellTool(environment={"type":"local","skills":[...]}) 配置本地 shell 技能。因此本节点
      保留 LocalShellTool 的官方兼容名称和来源，不能将其称为 MCP Tool、通用 shell 协议或
      对本机命令的无条件授权。
    en: >
      LocalShellTool is the name documented by OpenAI Agents SDK as a legacy local-shell integration.
      It represents commands handled by an application's local execution path rather than a
      Responses API hosted container. Current documentation also describes local shell skills through
      ShellTool(environment={"type":"local","skills":[...]}). This node retains LocalShellTool's
      official compatibility name and provenance; it cannot be called an MCP Tool, a generic shell
      protocol, or an unconditional authorization for machine commands.
    ja: >
      LocalShellTool は OpenAI Agents SDK documentation で legacy local-shell integration として
      記載される名称である。Responses API hosted container ではなく application の local execution
      path が command を処理することを表す。current documentation は
      ShellTool(environment={"type":"local","skills":[...]}) による local shell skill も説明する。
      この node は LocalShellTool の公式 compatibility name と provenance を保持する。MCP Tool、
      generic shell protocol、または machine command への無条件 authorization と呼ぶことはできない。
  why_needed:
    zh: 目录可准确保留已有 LocalShellTool 集成，并引导新配置明确采用当前 ShellTool 的本地环境语义。
    en: A catalog can retain existing LocalShellTool integrations accurately while guiding new configuration toward explicit current ShellTool local-environment semantics.
    ja: catalog は既存 LocalShellTool integration を正確に保持しつつ、新しい configuration を明示的な current ShellTool local-environment semantics へ導ける。
  includes:
    - zh: 应用本地执行器引用、本地执行边界、可选技能引用和当前配置引用。
      en: An application local-executor reference, local execution boundary, optional skill reference, and current-configuration reference.
      ja: application local-executor reference、local execution boundary、任意の skill reference、current-configuration reference。
    - zh: 旧 LocalShellTool 集成与当前 ShellTool 本地模式之间的显式兼容信息。
      en: Explicit compatibility information between legacy LocalShellTool integration and current ShellTool local mode.
      ja: legacy LocalShellTool integration と current ShellTool local mode の明示的な compatibility information。
  excludes:
    - zh: 由 container_auto 或 container_reference 提供的托管容器执行。
      en: Hosted-container execution provided by container_auto or container_reference.
      ja: container_auto または container_reference が提供する hosted-container execution。
    - zh: 命令文本、一次 stdout 或 stderr、任何机密、以及自动安全批准。
      en: Command text, one stdout or stderr value, any secret, and automatic security approval.
      ja: command text、一回の stdout または stderr value、secret、automatic security approval。
  semantic_kind: official-sdk-legacy-type
  aliases:
    - language: en
      value: legacy SDK local shell integration
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      executor_ref 指向应用实际运行命令的本地实现，execution_boundary 固定表达 application-environment。
      skills_ref 可记录本地 shell 可用的技能；current_configuration_ref 可指向推荐的
      ShellTool(environment={"type":"local"}) 配置。命令、工作目录和权限在每次执行时由本地
      策略决定，不应被此定义 profile 预先批准。
    en: >
      executor_ref points to the local implementation that actually runs commands, and
      execution_boundary consistently expresses application-environment. skills_ref can record
      skills available to local shell, while current_configuration_ref can point to the recommended
      ShellTool(environment={"type":"local"}) configuration. Command, working-directory, and permission
      decisions are made by local policy on every run and are not pre-approved by this definition profile.
    ja: >
      executor_ref は実際に command を実行するローカル implementation を指し、execution_boundary は
      一貫して application-environment を表す。skills_ref は local shell が利用できる skill を記録でき、
      current_configuration_ref は推奨する ShellTool(environment={"type":"local"}) configuration を
      指せる。command、working-directory、permission の決定は各 run で local policy が行い、
      この definition profile により事前承認されない。
  typical_input:
    - description:
        zh: 由应用执行器支撑的旧 LocalShellTool 记录。
        en: A legacy LocalShellTool record backed by an application executor.
        ja: application executor に支えられた legacy LocalShellTool record。
      format: |
        {"executor_ref":"python://shell/run_local","execution_boundary":"application-environment","current_configuration_ref":"agents://ShellTool/environment/local"}
      source_claims: [agents-sdk-local-shell-legacy, moonweave-local-shell-tool-profile]
  typical_output:
    - description:
        zh: 用于审计本地命令执行来源的单次运行记录。
        en: A one-run record used to audit local command-execution provenance.
        ja: local command-execution provenance を audit するための one-run record。
      format: |
        {"run_ref":"local-shell-run-42","executor_ref":"python://shell/run_local","output_kind":"stdout-stderr"}
      source_claims: [moonweave-local-shell-tool-profile]
  reference_implementations:
    - name: OpenAI Agents SDK local runtime tools
      url: https://openai.github.io/openai-agents-python/tools/
      description: Documents LocalShellTool as legacy local-shell integration and ShellTool local environment support for current local shell skills.
structure:
  identity_keys: [tool_id, source_protocol, binding_revision, environment_type, executor_ref, execution_boundary]
  fields:
    - id: executor_ref
      labels:
        zh: 本地执行器引用
        en: Local executor reference
        ja: local executor reference
      definitions:
        zh: 指向应用中实际执行 LocalShellTool 命令的本地实现。
        en: Points to the local application implementation that actually executes LocalShellTool commands.
        ja: LocalShellTool command を実際に実行するローカル application implementation を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: python://shell/run_local
      allowed_values: []
      source_claims: [agents-sdk-local-shell-legacy, moonweave-local-shell-tool-profile]
    - id: execution_boundary
      labels:
        zh: 执行边界
        en: Execution boundary
        ja: execution boundary
      definitions:
        zh: 表示命令由应用环境执行而非托管容器的本地边界。
        en: The local boundary stating that commands execute in the application environment rather than a hosted container.
        ja: command が hosted container ではなく application environment で実行されることを示すローカル boundary。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: application-environment
      allowed_values: [application-environment, local-sandbox]
      source_claims: [moonweave-local-shell-tool-profile]
    - id: skills_ref
      labels:
        zh: 技能引用
        en: Skill reference
        ja: skill reference
      definitions:
        zh: 可选地引用本地 shell 可使用的技能或技能包，不存放技能中的秘密内容。
        en: Optionally references skills or skill bundles available to local shell and does not store secret content from them.
        ja: local shell が利用できる skill または skill bundle を任意で参照し、その secret content は保存しない。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: null
      pattern: null
      example_value: skill://repo-maintenance/v1
      allowed_values: []
      source_claims: [agents-sdk-local-shell-current-mode, moonweave-local-shell-tool-profile]
    - id: current_configuration_ref
      labels:
        zh: 当前配置引用
        en: Current configuration reference
        ja: current configuration reference
      definitions:
        zh: 可选地指向用 ShellTool local 环境表达当前本地 shell 配置的引用。
        en: Optionally points to a current local-shell configuration expressed through ShellTool local environment.
        ja: ShellTool local environment を通じて表す current local-shell configuration を任意で指す。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: agents://ShellTool/environment/local
      allowed_values: []
      source_claims: [agents-sdk-local-shell-current-mode, moonweave-local-shell-tool-profile]
    - id: local_policy_ref
      labels:
        zh: 本地策略引用
        en: Local policy reference
        ja: local policy reference
      definitions:
        zh: 指向执行命令前由应用检查的本地沙箱、审批或工作区策略。
        en: Points to local sandbox, approval, or workspace policy checked by the application before executing commands.
        ja: command 実行前に application が確認する local sandbox、approval、または workspace policy を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: policy://workspace/shell
      allowed_values: []
      source_claims: [moonweave-local-shell-tool-profile]
    - id: environment_type
      labels:
        zh: 环境类型
        en: Environment type
        ja: environment type
      definitions:
        zh: ShellTool 使用的运行环境类型，例如 local、container_auto 或 container_reference。
        en: The ShellTool execution-environment type, such as local, container_auto, or container_reference.
        ja: local、container_auto、container_reference など ShellTool が使う execution-environment type。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: local
      allowed_values: [local, container_auto, container_reference]
      source_claims: [moonweave-local-shell-tool-taxonomy]
    - id: binding_revision
      labels:
        zh: 运行时绑定修订
        en: Runtime-binding revision
        ja: runtime-binding revision
      definitions:
        zh: 标识此独立本地 运行时绑定修订；执行器、定义或适配映射变化必须创建新版本，而不修改旧记录。
        en: Identifies this independent local Runtime-binding revision; a change to executor, definition, or adapter mapping must create a new version rather than mutate the old record.
        ja: この独立ローカル runtime-binding revision を識別する。executor、definition、adapter mapping の変更は旧 record を mutate せず新 version を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "1"
      allowed_values: []
      source_claims: [moonweave-local-shell-tool-taxonomy]
    - id: tool_id
      labels:
        zh: 本地工具标识符
        en: Local tool identifier
        ja: ローカル tool 識別子
      definitions:
        zh: 在本地运行时范围内标识可调用工具 profile。
        en: Identifies a callable-tool profile within local runtime scope.
        ja: ローカル runtime scope 内で callable-tool profile を識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: files-read-file
      allowed_values: []
      source_claims: [moonweave-local-shell-tool-taxonomy]
    - id: definition_ref
      labels:
        zh: 定义引用
        en: Definition reference
        ja: definition reference
      definitions:
        zh: 指向此运行时绑定所实现的、来源明确的一个 ToolDefinition profile。
        en: Points to the one provenance-bearing ToolDefinition profile realized by this runtime binding.
        ja: この runtime binding が実現する、provenance を持つ一つの ToolDefinition profile を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: files-read-file
      allowed_values: []
      source_claims: [moonweave-local-shell-tool-taxonomy]
    - id: executor_kind
      labels:
        zh: 执行器种类
        en: Executor kind
        ja: executor kind
      definitions:
        zh: 标识调用由 MCP server、应用函数或 SDK 运行时等哪个执行器处理。
        en: Identifies whether an MCP server, application function, SDK runtime, or another executor handles the call.
        ja: MCP server、application function、SDK runtime、その他の executor のどれが call を処理するかを示す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: mcp-server
      allowed_values: [mcp-server, application-function, agents-sdk-runtime, hosted-service]
      source_claims: [moonweave-local-shell-tool-taxonomy]
    - id: source_protocol
      labels:
        zh: 来源协议
        en: Source protocol
        ja: source protocol
      definitions:
        zh: 标识工具的定义和调用契约所属协议或 SDK。
        en: Identifies the protocol or SDK owning tool definition and call contract.
        ja: tool definition と call contract を所有する protocol または SDK を識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: MCP
      allowed_values: [MCP, OpenAI, OpenAI-Agents-SDK]
      source_claims: [moonweave-local-shell-tool-taxonomy]
  constraints:
    - id: local-shell-tool-needs-local-executor
      severity: error
      expression_language: plain
      expression: LocalShellTool must identify an application executor and local policy reference; it cannot be represented as hosted container execution or as pre-approved command authority.
      explanation:
        zh: 旧本地集成仍依赖应用执行和每次运行时策略检查。
        en: The legacy local integration still depends on application execution and per-run policy checks.
        ja: legacy local integration は引き続き application execution と per-run policy check に依存する。
      source_claims: [agents-sdk-local-shell-legacy, moonweave-local-shell-tool-profile]
    - id: local-shell-tool-inherits-parent-required-fields
      severity: error
      expression_language: plain
      expression: "All inherited required ShellTool fields are fields of this same record; the is_a subtype does not establish or reference a second ShellTool record."
      explanation: {zh: "所有继承的 ShellTool 必需字段属于同一记录，该 is_a 子类型不建立或引用第二条 ShellTool 记录。", en: "Inherited required fields stay on the same record rather than creating a second parent record.", ja: "継承された必須 ShellTool フィールドは同じレコードに属し、この is_a 下位型は 2 番目の親レコードを作成または参照しない。"}
      source_claims: [moonweave-local-shell-tool-taxonomy]
  required_relations: []
examples:
  - id: local-shell-tool-positive-app-executor

    labels:
      zh: 应用本地 shell 执行器
      en: Application local-shell executor
      ja: application local-shell executor

    descriptions:
      zh: "Claude Computer Use {type:\"tool_use\",name:\"computer\",input:{action:\"click\",coordinate:[100,200]}} 或 action:\"type\" 键盘输入；OpenAI Assistants tools:[{type:\"code_interpreter\"}] 沙箱 Python 执行。"
      en: "Claude Computer Use {type:\"tool_use\",name:\"computer\",input:{action:\"click\",coordinate:[100,200]}} or action:\"type\" keyboard; OpenAI Assistants tools:[{type:\"code_interpreter\"}] sandbox Python execution."
      ja: "Claude Computer Use action:\"click\"/\"type\"。OpenAI Assistants tools:[{type:\"code_interpreter\"}] sandbox Python 実行。"
    field_values:
      tool_id: local-run-shell
      source_protocol: OpenAI-Agents-SDK
      binding_revision: "1"
      environment_type: local
      executor_ref: python://shell/run_local
      execution_boundary: application-environment
      local_policy_ref: policy://workspace/shell
    related_node_ids: [LocalShellTool, ShellTool]
    related_relation_ids: [LocalShellTool-is_a-ShellTool]

    source_claims: [agents-sdk-local-shell-legacy, moonweave-local-shell-tool-profile]
  - id: local-shell-tool-counterexample-hosted-container

    labels:
      zh: 将 LocalShellTool 误作托管容器
      en: LocalShellTool treated as hosted container
      ja: LocalShellTool を hosted container として扱う例

    descriptions:
      zh: 反例：Computer Use click coordinate 超出 display_width_px:1024 边界；Code Interpreter 执行 os.system 逃逸沙箱（应被阻止）。
      en: Counterexample: Computer Use click coordinate exceeds display_width_px:1024; Code Interpreter os.system escapes sandbox (should be blocked).
      ja: 反例：Computer Use click coordinate が display 境界超過。Code Interpreter os.system sandbox 逃逸。
    field_values:
      executor_ref: python://shell/run_local
      execution_boundary: application-environment
    related_node_ids: [LocalShellTool, ShellTool]
    related_relation_ids: [LocalShellTool-is_a-ShellTool]

    source_claims: [agents-sdk-local-shell-legacy, moonweave-local-shell-tool-profile]
  - id: local-shell-tool-boundary-legacy-and-current-mode

    labels:
      zh: 旧集成与当前 local ShellTool 模式边界
      en: Boundary between legacy integration and current local ShellTool mode
      ja: legacy integration と current local ShellTool mode の境界

    descriptions:
      zh: Claude Browser/Computer Use GUI 交互 vs OpenAI Code Interpreter 代码沙箱 vs 本地 ShellCommand 进程执行的权限边界。
      en: Permission boundary among Claude Browser/Computer Use GUI interaction, OpenAI Code Interpreter code sandbox, local ShellCommand process execution.
      ja: Claude Computer Use GUI 交互、OpenAI Code Interpreter コード sandbox、ローカル ShellCommand プロセス実行の権限境界。
    field_values:
      current_configuration_ref: agents://ShellTool/environment/local
      skills_ref: skill://repo-maintenance/v1
    related_node_ids: [LocalShellTool, ShellTool]
    related_relation_ids: [LocalShellTool-is_a-ShellTool]

    source_claims: [agents-sdk-local-shell-legacy, agents-sdk-local-shell-current-mode]
  - id: local-shell-tool-instance-repo-maintenance

    labels:
      zh: 仓库维护本地 shell 实例
      en: Repository-maintenance local-shell instance
      ja: repository-maintenance local-shell instance

    descriptions:
      zh: Code Interpreter 实例：import pandas as pd; df=pd.read_csv('data.csv'); df.describe() 返回统计摘要；Computer Use 实例：action:"screenshot" 捕获 1024x768 屏幕。
      en: Code Interpreter instance: import pandas; df.describe() returns stats; Computer Use instance: action:"screenshot" captures 1024x768 screen.
      ja: Code Interpreter 実例：pandas df.describe() 統計摘要。Computer Use 実例：action:"screenshot" 1024x768 画面キャプチャ。
    field_values:
      tool_id: repo-maintenance-shell
      source_protocol: OpenAI-Agents-SDK
      binding_revision: "1"
      environment_type: local
      executor_ref: python://shell/repo_maintenance
      execution_boundary: application-environment
      skills_ref: skill://repo-maintenance/v1
      local_policy_ref: policy://workspace/shell
    related_node_ids: [LocalShellTool, ShellTool]
    related_relation_ids: [LocalShellTool-is_a-ShellTool]

    source_claims: [moonweave-local-shell-tool-profile]
