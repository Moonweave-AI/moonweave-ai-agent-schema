schema: moonweave.ai/ontology-node/v1
id: ToolDeprecationNotice
kind: concept
labels:
  zh: 本地工具退役通知 profile
  en: Local tool-retirement notice profile
  ja: ローカル tool-retirement notice profile
semantics:
  short_definition:
    zh: 记录本地目录中某个工具替换或停止使用安排的 Moonweave 通知 profile。
    en: A Moonweave notice profile that records a replacement or retirement arrangement for a tool in a local catalog.
    ja: ローカル catalog 内の tool の replacement または retirement arrangement を記録する Moonweave notice profile。
  definition:
    zh: >
      ToolDeprecationNotice 是为兼容既有 ID 保留的本地生命周期通知 profile。它记录目标工具、
      生效时间、可选替代工具和迁移说明，供本地目录、编排器或团队沟通使用。它不是 MCP Tool 字段，
      不是 OpenAI function schema，也不会改变远程服务器仍可能公开的工具记录。
    en: >
      ToolDeprecationNotice is a local lifecycle-notice profile retained for compatibility. It records
      a target tool, effective time, optional replacement tool, and migration guidance for a local
      catalog, orchestrator, or team communication. It is not an MCP Tool field, not an OpenAI
      function schema, and does not alter a tool record that a remote server may still expose.
    ja: >
      ToolDeprecationNotice は compatibility のために保持するローカル lifecycle-notice profile である。
      ローカル catalog、orchestrator、または team communication のために target tool、effective time、
      任意の replacement tool、migration guidance を記録する。これは MCP Tool field でも OpenAI
      function schema でもなく、remote server が公開し続ける tool record を変更しない。
  why_needed:
    zh: 本地使用者可在替换工具时获得明确迁移路径，而不把目录决策伪装成远程协议状态。
    en: Local users can receive a clear migration path when a tool is replaced without presenting a catalog decision as remote protocol state.
    ja: ローカル user は tool の置換時に明確な migration path を得られ、catalog decision を remote protocol state として見せかけない。
  includes:
    - zh: 目标工具引用、生效时间、替代工具引用和迁移说明。
      en: A target-tool reference, effective time, replacement-tool reference, and migration guidance.
      ja: target-tool reference、effective time、replacement-tool reference、migration guidance。
    - zh: 面向本地目录和团队的退役沟通记录。
      en: A retirement communication record for a local catalog and team.
      ja: ローカル catalog と team のための retirement communication record。
  excludes:
    - zh: 远程 MCP server 当前公开的 Tool 列表或其协议调用结果。
      en: A remote MCP server's currently exposed Tool list or its protocol call result.
      ja: remote MCP server が現在公開する Tool list またはその protocol call result。
    - zh: 删除工具、撤销授权或执行迁移的实际操作。
      en: The actual operation that deletes a tool, revokes authorization, or performs a migration.
      ja: tool を削除し、authorization を取り消し、または migration を実行する実際の operation。
  semantic_kind: entity
  aliases:
    - language: en
      value: local tool migration notice
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      notice_id 标识本地沟通记录，target_tool_ref 指向受影响的 Tool profile。effective_at 给出
      本地策略开始生效的时间；replacement_ref 和 migration_guidance 帮助调用方更新引用。
      执行器仍须在每次调用时依据源协议、可用性和权限作出决定。
    en: >
      notice_id identifies the local communication record and target_tool_ref points to the affected
      Tool profile. effective_at gives the time at which local policy begins to apply; replacement_ref
      and migration_guidance help callers update references. An executor must still decide each call
      from source protocol, availability, and permissions.
    ja: >
      notice_id はローカル communication record を識別し、target_tool_ref は影響を受ける Tool profile
      を指す。effective_at は local policy が適用され始める時刻を示し、replacement_ref と
      migration_guidance は caller の reference 更新を助ける。executor は source protocol、
      availability、permission に基づき各 call を引き続き判断しなければならない。
  typical_input:
    - description:
        zh: 本地目录中旧客户查询工具的迁移通知。
        en: A migration notice for an older customer-lookup tool in a local catalog.
        ja: ローカル catalog 内の古い customer-lookup tool の migration notice。
      format: |
        {"notice_id":"customer-lookup-v1-retirement","target_tool_ref":"get-customer-v1","effective_at":"2026-09-01T00:00:00Z","replacement_ref":"get-customer-v2"}
      source_claims: [moonweave-tool-retirement-notice-profile]
  typical_output:
    - description:
        zh: 可由本地选择器呈现的迁移指引。
        en: Migration guidance that a local selector can present.
        ja: ローカル selector が提示できる migration guidance。
      format: |
        {"target_tool_ref":"get-customer-v1","replacement_ref":"get-customer-v2","migration_guidance":"Use customer_id instead of legacy_id."}
      source_claims: [moonweave-tool-retirement-notice-profile]
  reference_implementations:
    - name: Moonweave ontology profile design
      url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
      description: Defines the local profile boundary for catalog lifecycle notices and tool references.
structure:
  identity_keys: [notice_id, target_tool_ref, notice_revision]
  fields:
    - id: notice_revision
      labels:
        zh: 工具弃用通知 profile 版本
        en: tool-deprecation notice profile version
        ja: tool-deprecation notice profile version
      definitions:
        zh: 标识此不可变本地 工具弃用通知 profile 版本；变更必须创建新版本，不得就地修改。
        en: Identifies this immutable local tool-deprecation notice profile version; a change must create a new version rather than mutate it in place.
        ja: この不変ローカル tool-deprecation notice profile version を識別する。変更は in-place で mutate せず新 version を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "1"
      allowed_values: []
      source_claims: [moonweave-tool-retirement-notice-profile, moonweave-tool-retirement-notice-taxonomy]
    - id: metadata_revision_ref
      labels:
        zh: 工具元数据修订引用
        en: tool-metadata revision reference
        ja: tool-metadata revision reference
      definitions:
        zh: 标识拥有此 工具弃用通知 profile 版本 的不可变 工具元数据修订；该组成部分在父修订外无效，删除父修订只删除本地 profile，不删除 来源协议弃用字段和运行时调用记录。
        en: Identifies the immutable tool-metadata revision that owns this tool-deprecation notice profile version; the component is invalid outside that parent revision, and deleting the parent revision deletes only local profiles, not source-protocol deprecation fields and runtime invocation records.
        ja: この tool-deprecation notice profile version を所有する不変 tool-metadata revision を識別する。component は parent revision 外では無効で、parent revision を削除してもローカル profile だけが削除され、source-protocol deprecation field と runtime invocation record は削除されない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: toolmetadata@1
      allowed_values: []
      source_claims: [moonweave-tool-retirement-notice-profile, moonweave-tool-retirement-notice-taxonomy]
    - id: notice_id
      labels:
        zh: 通知标识符
        en: Notice identifier
        ja: notice identifier
      definitions:
        zh: 在本地目录范围内唯一标识此工具退役通知。
        en: Uniquely identifies this tool-retirement notice within local catalog scope.
        ja: ローカル catalog scope 内でこの tool-retirement notice を一意に識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: customer-lookup-v1-retirement
      allowed_values: []
      source_claims: [moonweave-tool-retirement-notice-profile]
    - id: target_tool_ref
      labels:
        zh: 目标工具引用
        en: Target tool reference
        ja: target tool reference
      definitions:
        zh: 指向此本地通知影响的 Tool profile。
        en: Points to the Tool profile affected by this local notice.
        ja: このローカル notice の影響を受ける Tool profile を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: get-customer-v1
      allowed_values: []
      source_claims: [moonweave-tool-retirement-notice-profile]
    - id: effective_at
      labels:
        zh: 生效时间
        en: Effective time
        ja: effective time
      definitions:
        zh: 本地选择或迁移策略开始应用该通知的时间点。
        en: The time at which local selection or migration policy begins to apply this notice.
        ja: ローカル selection または migration policy がこの notice を適用し始める時刻。
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 2026-09-01T00:00:00Z
      allowed_values: []
      source_claims: [moonweave-tool-retirement-notice-profile]
    - id: replacement_ref
      labels:
        zh: 替代工具引用
        en: Replacement tool reference
        ja: replacement tool reference
      definitions:
        zh: 可选地指向建议调用方迁移到的本地 Tool profile。
        en: Optionally points to the local Tool profile to which callers are advised to migrate.
        ja: caller が移行するよう助言されるローカル Tool profile を任意で指す。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: get-customer-v2
      allowed_values: []
      source_claims: [moonweave-tool-retirement-notice-profile]
    - id: migration_guidance
      labels:
        zh: 迁移指引
        en: Migration guidance
        ja: migration guidance
      definitions:
        zh: 为本地调用方说明如何调整引用或输入的可读指引。
        en: Human-readable guidance telling local callers how to adjust references or inputs.
        ja: ローカル caller が reference または input をどう調整するかを示す human-readable guidance。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Use customer_id instead of legacy_id.
      allowed_values: []
      source_claims: [moonweave-tool-retirement-notice-profile]
  constraints:
    - id: tool-retirement-notice-is-local-guidance
      severity: error
      expression_language: plain
      expression: ToolDeprecationNotice must identify a target tool and effective time and cannot be treated as proof that a remote server has removed, disabled, or revoked a source tool.
      explanation:
        zh: 本地迁移通知不能替代远程工具可用性或授权检查。
        en: A local migration notice cannot replace remote tool availability or authorization checks.
        ja: ローカル migration notice は remote tool availability または authorization check を置き換えられない。
      source_claims: [moonweave-tool-retirement-notice-profile]
  required_relations: [ToolDeprecationNotice-part_of-ToolMetadata]
examples:
  - id: tool-retirement-notice-positive-replacement

    labels:
      zh: 客户查询工具替换通知
      en: Customer-lookup replacement notice
      ja: customer-lookup replacement notice

    descriptions:
      zh: Gorilla APIBench 1645 API 注册（HuggingFace/TorchHub/TensorHub）；ToolBench 16000+ RapidAPI 工具注册表；Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") 插件注册。
      en: Gorilla APIBench registers 1645 APIs (HuggingFace/TorchHub/TensorHub); ToolBench 16000+ RapidAPI tool registry; Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") plugin registration.
      ja: Gorilla APIBench が 1645 API を登録。ToolBench 16000+ RapidAPI tool registry。Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") プラグイン登録。
    field_values:
      notice_id: customer-lookup-v1-retirement
      target_tool_ref: get-customer-v1
      replacement_ref: get-customer-v2
    related_node_ids: [ToolDeprecationNotice, ToolMetadata]
    related_relation_ids: [ToolDeprecationNotice-part_of-ToolMetadata]

    source_claims: [moonweave-tool-retirement-notice-profile]
  - id: tool-retirement-notice-counterexample-server-removal

    labels:
      zh: 本地通知被当作服务器删除证明
      en: Local notice treated as proof of server removal
      ja: ローカル notice を server removal の証拠として扱う例

    descriptions:
      zh: 反例：ToolBench 注册未验证 RapidAPI key 的 endpoint；Gorilla registry 混入 hallucinated API 无 retriever 校验；Semantic Kernel plugin 名冲突未检测。
      en: Counterexample: ToolBench registers RapidAPI endpoint without key verification; Gorilla registry includes hallucinated API without retriever validation; Semantic Kernel plugin name collision undetected.
      ja: 反例：ToolBench が RapidAPI key 未検証 endpoint を登録。Gorilla registry に retriever 未検証 hallucinated API 混入。
    field_values:
      target_tool_ref: files-read-file
      effective_at: 2026-09-01T00:00:00Z
    related_node_ids: [ToolDeprecationNotice, ToolMetadata]
    related_relation_ids: [ToolDeprecationNotice-part_of-ToolMetadata]

    source_claims: [moonweave-tool-retirement-notice-profile]
  - id: tool-retirement-notice-boundary-guidance-and-execution

    labels:
      zh: 迁移指引与执行边界
      en: Boundary between migration guidance and execution
      ja: migration guidance と execution の境界

    descriptions:
      zh: Gorilla 离线 APIBench 索引 vs ToolBench 在线 RapidAPI catalog vs Semantic Kernel 本地 plugin 注册的持久化边界。
      en: Persistence boundary among Gorilla offline APIBench index, ToolBench online RapidAPI catalog, Semantic Kernel local plugin registration.
      ja: Gorilla offline APIBench index、ToolBench online RapidAPI catalog、Semantic Kernel ローカル plugin 登録の永続化境界。
    field_values:
      migration_guidance: Use customer_id instead of legacy_id.
    related_node_ids: [ToolDeprecationNotice, ToolMetadata]
    related_relation_ids: [ToolDeprecationNotice-part_of-ToolMetadata]

    source_claims: [moonweave-tool-retirement-notice-profile]
  - id: tool-retirement-notice-instance-local-policy

    labels:
      zh: 本地支付工具迁移实例
      en: Local payment-tool migration instance
      ja: ローカル payment-tool migration instance

    descriptions:
      zh: "ToolBench registry 实例：tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}；Semantic Kernel WeatherPlugin.get_weather(city:str) 注册实例。"
      en: "ToolBench registry instance: tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}; Semantic Kernel WeatherPlugin.get_weather(city:str) registration instance."
      ja: ToolBench registry 実例：tool_id=rapidapi-weather-api endpoint=/forecast。Semantic Kernel WeatherPlugin.get_weather(city:str) 登録実例。
    field_values:
      notice_id: payment-v1-quarterly-retirement
      target_tool_ref: create-payment-v1
      replacement_ref: create-payment-v2
      effective_at: 2026-10-01T00:00:00Z
    related_node_ids: [ToolDeprecationNotice, ToolMetadata]
    related_relation_ids: [ToolDeprecationNotice-part_of-ToolMetadata]

    source_claims: [moonweave-tool-retirement-notice-profile]
parent_relation:
  id: ToolDeprecationNotice-part_of-ToolMetadata
  predicate: part_of
  target: concept:ToolMetadata
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是工具元数据修订的不可变组成部分
    en: is an immutable component of tool-metadata revision
    ja: tool-metadata revision の不変 component である
  definition:
    zh: ToolDeprecationNotice 仅作为 metadata_revision_ref 标识的 工具元数据修订 中的 工具弃用通知 profile 版本 存在；父修订拥有该 profile 副本与删除边界，来源协议弃用字段和运行时调用记录 始终位于该边界之外。
    en: ToolDeprecationNotice exists only as a tool-deprecation notice profile version in the tool-metadata revision identified by metadata_revision_ref; the parent revision owns this profile copy and deletion boundary, while source-protocol deprecation fields and runtime invocation records always remain outside that boundary.
    ja: ToolDeprecationNotice は metadata_revision_ref が識別する tool-metadata revision 内の tool-deprecation notice profile version としてのみ存在する。parent revision はこの profile copy と deletion boundary を所有し、source-protocol deprecation field と runtime invocation record は常にその boundary 外に残る。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_part
    labels:
      zh: 包含不可变组成版本
      en: has immutable component version
      ja: immutable component version を持つ
  conditions: []
  temporal_scope: versioned
  boundary_context: This strict local composition records a versioned deletion boundary for a Moonweave profile component. It does not make source-protocol deprecation fields and runtime invocation records components of the parent.
  constraints:
    - id: tooldeprecationnotice-strict-versioned-composition
      severity: error
      expression_language: plain
      expression: ToolDeprecationNotice must carry metadata_revision_ref and notice_revision, may not outlive or be independently deleted from that parent revision, and must not cascade deletion to source-protocol deprecation fields and runtime invocation records.
      explanation:
        zh: 该组成部分是本地父修订的严格版本化部分；它没有孤立的可变生命周期，且不能删除来源协议弃用字段和运行时调用记录。
        en: The component is a strict versioned part of its local parent revision; it has no orphan mutable lifecycle and cannot delete source-protocol deprecation fields and runtime invocation records.
        ja: component はローカル parent revision の strict versioned part である。orphan mutable lifecycle を持たず、source-protocol deprecation field と runtime invocation record を削除できない。
      source_claims: [moonweave-tool-retirement-notice-taxonomy]
  examples: []
  source_claims: [moonweave-tool-retirement-notice-taxonomy]
  distinct_fact_rationale:
    zh: 此关系表达本地 profile 版本的所有权和删除边界；来源协议弃用字段和运行时调用记录 的来源与生命周期由其各自系统保持。
    en: This relation expresses ownership and deletion boundary of a local profile version; provenance and lifecycle of source-protocol deprecation fields and runtime invocation records remain with their respective systems.
    ja: この relation はローカル profile version の ownership と deletion boundary を表す。source-protocol deprecation field と runtime invocation record の provenance と lifecycle は各 system に残る。
relations: []
sources:
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: design-inference
    relevance: Defines local tool-retirement notices and their metadata composition boundary.
source_claims:
  - id: moonweave-tool-retirement-notice-profile
    source: moonweave-ontology-design
    supports: ToolDeprecationNotice is a Moonweave local notice that gives callers replacement and migration guidance without asserting remote protocol state.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
  - id: moonweave-tool-retirement-notice-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave treats ToolDeprecationNotice as a strict immutable component of a ToolMetadata revision; deleting the local notice does not delete source-protocol deprecation fields or invocation records.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high