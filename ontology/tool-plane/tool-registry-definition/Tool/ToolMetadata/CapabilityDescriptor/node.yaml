schema: moonweave.ai/ontology-node/v1
id: CapabilityDescriptor
kind: concept
labels:
  zh: 本地能力描述符 profile
  en: Local capability-descriptor profile
  ja: ローカル capability-descriptor profile
semantics:
  short_definition:
    zh: 为一个本地可调用工具提供面向特定受众的能力摘要和来源说明的 Moonweave profile。
    en: A Moonweave profile that gives a local callable tool an audience-specific capability summary and provenance note.
    ja: ローカル callable tool に audience 固有の capability summary と provenance note を与える Moonweave profile。
  definition:
    zh: >
      CapabilityDescriptor 是保留既有 ID 的 Moonweave 本地展示 profile。它将工具引用、受众、
      人类可读能力摘要和来源引用放在一起，供目录或编排界面使用。它不是 MCP Tool 的标准字段，
      不是 OpenAI function 的 parameters schema，也不证明工具在当前会话中可调用。
    en: >
      CapabilityDescriptor is a Moonweave local presentation profile retained for compatibility. It
      keeps a tool reference, audience, human-readable capability summary, and provenance reference
      together for a catalog or orchestration interface. It is not a standard field of an MCP Tool,
      not an OpenAI function parameters schema, and does not prove a tool is callable in the current session.
    ja: >
      CapabilityDescriptor は compatibility のために保持する Moonweave ローカル presentation profile
      である。catalog または orchestration interface のために tool reference、audience、
      human-readable capability summary、provenance reference をまとめる。これは MCP Tool の標準 field
      でも OpenAI function parameters schema でもなく、現在の session で tool が callable であることも証明しない。
  why_needed:
    zh: 团队可在不篡改协议定义或输入契约的情况下，向不同使用者解释本地工具的业务用途。
    en: Teams can explain a local tool's business purpose to different users without altering a protocol definition or input contract.
    ja: team は protocol definition や input contract を変更せずに、異なる user へローカル tool の business purpose を説明できる。
  includes:
    - zh: 工具引用、目标受众、能力摘要和来源引用。
      en: A tool reference, target audience, capability summary, and provenance reference.
      ja: tool reference、target audience、capability summary、provenance reference。
    - zh: 仅用于本地目录和界面选择的描述性语言。
      en: Descriptive language used only for local catalogs and interface selection.
      ja: ローカル catalog と interface selection だけに使う descriptive language。
  excludes:
    - zh: MCP Tool 的 inputSchema、OpenAI function 的 parameters 或任何调用参数。
      en: An MCP Tool inputSchema, OpenAI function parameters, or any call arguments.
      ja: MCP Tool inputSchema、OpenAI function parameters、または call arguments。
    - zh: 服务器 capability 协商、授权决定或一次调用结果。
      en: Server capability negotiation, an authorization decision, or one call result.
      ja: server capability negotiation、authorization decision、または一回の call result。
  semantic_kind: entity
  aliases:
    - language: en
      value: local tool summary
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      descriptor_id 唯一标识本地摘要，tool_ref 指向 Tool profile，audience 限定摘要的阅读者，
      provenance_ref 记录摘要来自协议记录、产品文档或本地规则。能力摘要可帮助发现工具，
      但实际输入验证和调用许可仍由源协议与运行时执行。
    en: >
      descriptor_id uniquely identifies the local summary, tool_ref points to a Tool profile,
      audience scopes the intended reader, and provenance_ref records whether the summary came from
      a protocol record, product documentation, or a local rule. The summary can aid discovery, but
      source protocol and runtime still perform input validation and call authorization.
    ja: >
      descriptor_id はローカル summary を一意に識別し、tool_ref は Tool profile を指し、audience は
      想定 reader を限定し、provenance_ref は summary が protocol record、product documentation、
      または local rule のどれに由来するかを記録する。summary は discovery を助けられるが、
      source protocol と runtime が input validation と call authorization を引き続き行う。
  typical_input:
    - description:
        zh: 为支持团队创建的本地工具摘要。
        en: A local tool summary written for a support team.
        ja: support team のために書かれたローカル tool summary。
      format: |
        {"descriptor_id":"customer-lookup-support","tool_ref":"get-customer","audience":"support-team","capability_summary":"Looks up a customer by identifier."}
      source_claims: [moonweave-capability-descriptor-profile]
  typical_output:
    - description:
        zh: 明示来源的可发现性记录。
        en: A discovery record with explicit provenance.
        ja: 明示的な provenance を持つ discovery record。
      format: |
        {"tool_ref":"get-customer","provenance_ref":"local-doc://support/customer-lookup","visibility":"local-catalog"}
      source_claims: [moonweave-capability-descriptor-profile]
  reference_implementations:
    - name: Model Context Protocol Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines MCP Tool records and their source-side metadata, distinct from a Moonweave local descriptor.
structure:
  identity_keys: [descriptor_id, tool_ref, descriptor_revision]
  fields:
    - id: descriptor_revision
      labels:
        zh: 能力描述符 profile 版本
        en: capability-descriptor profile version
        ja: capability-descriptor profile version
      definitions:
        zh: 标识此不可变本地 能力描述符 profile 版本；变更必须创建新版本，不得就地修改。
        en: Identifies this immutable local capability-descriptor profile version; a change must create a new version rather than mutate it in place.
        ja: この不変ローカル capability-descriptor profile version を識別する。変更は in-place で mutate せず新 version を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "1"
      allowed_values: []
      source_claims: [moonweave-capability-descriptor-profile, moonweave-capability-descriptor-taxonomy]
    - id: metadata_revision_ref
      labels:
        zh: 工具元数据修订引用
        en: tool-metadata revision reference
        ja: tool-metadata revision reference
      definitions:
        zh: 标识拥有此 能力描述符 profile 版本 的不可变 工具元数据修订；该组成部分在父修订外无效，删除父修订只删除本地 profile，不删除 来源协议描述和运行时调用记录。
        en: Identifies the immutable tool-metadata revision that owns this capability-descriptor profile version; the component is invalid outside that parent revision, and deleting the parent revision deletes only local profiles, not source-protocol descriptions and runtime invocation records.
        ja: この capability-descriptor profile version を所有する不変 tool-metadata revision を識別する。component は parent revision 外では無効で、parent revision を削除してもローカル profile だけが削除され、source-protocol description と runtime invocation record は削除されない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: toolmetadata@1
      allowed_values: []
      source_claims: [moonweave-capability-descriptor-profile, moonweave-capability-descriptor-taxonomy]
    - id: descriptor_id
      labels:
        zh: 描述符标识符
        en: Descriptor identifier
        ja: descriptor identifier
      definitions:
        zh: 在本地目录范围内唯一标识此能力描述符。
        en: Uniquely identifies this capability descriptor within local catalog scope.
        ja: ローカル catalog scope でこの capability descriptor を一意に識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: customer-lookup-support
      allowed_values: []
      source_claims: [moonweave-capability-descriptor-profile]
    - id: tool_ref
      labels:
        zh: 工具引用
        en: Tool reference
        ja: tool reference
      definitions:
        zh: 指向此描述符所解释的本地 Tool profile。
        en: Points to the local Tool profile explained by this descriptor.
        ja: この descriptor が説明するローカル Tool profile を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: get-customer
      allowed_values: []
      source_claims: [moonweave-capability-descriptor-profile]
    - id: audience
      labels:
        zh: 目标受众
        en: Target audience
        ja: target audience
      definitions:
        zh: 说明能力摘要面向的本地角色或用户群体。
        en: States the local role or user group for which the capability summary is written.
        ja: capability summary の対象となるローカル role または user group を示す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: support-team
      allowed_values: []
      source_claims: [moonweave-capability-descriptor-profile]
    - id: capability_summary
      labels:
        zh: 能力摘要
        en: Capability summary
        ja: capability summary
      definitions:
        zh: 用于发现和理解的简短人类可读说明，不替代输入或输出契约。
        en: A short human-readable explanation for discovery and understanding that does not replace input or output contracts.
        ja: discovery と理解のための短い human-readable explanation。input または output contract を置き換えない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Looks up a customer by identifier.
      allowed_values: []
      source_claims: [moonweave-capability-descriptor-profile]
    - id: provenance_ref
      labels:
        zh: 来源引用
        en: Provenance reference
        ja: provenance reference
      definitions:
        zh: 指向支撑此摘要的协议记录、产品文档或本地规则。
        en: Points to a protocol record, product document, or local rule supporting this summary.
        ja: この summary を支える protocol record、product document、または local rule を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: local-doc://support/customer-lookup
      allowed_values: []
      source_claims: [moonweave-capability-descriptor-profile]
  constraints:
    - id: capability-descriptor-needs-provenance
      severity: error
      expression_language: plain
      expression: CapabilityDescriptor must identify its tool_ref and provenance_ref and cannot be treated as a protocol-native schema or runtime authorization record.
      explanation:
        zh: 本地说明必须保留来源，且不能越过协议契约或运行时许可。
        en: A local explanation must retain provenance and cannot override a protocol contract or runtime permission.
        ja: ローカル explanation は provenance を保持し、protocol contract や runtime permission を上書きできない。
      source_claims: [moonweave-capability-descriptor-profile]
  required_relations: [CapabilityDescriptor-part_of-ToolMetadata]
examples:
  - id: capability-descriptor-positive-support-summary

    labels:
      zh: 支持团队客户查询摘要
      en: Support-team customer lookup summary
      ja: support-team customer lookup summary

    descriptions:
      zh: Gorilla APIBench 训练 LLM 生成 API 调用减少 hallucination；LangChain BaseTool(name,description,args_schema,_run(),_arun())；Semantic Kernel @kernel_function；Instructor response_model=Pydantic 作 schema。
      en: Gorilla APIBench trains LLM for API calls reducing hallucination; LangChain BaseTool(name,description,args_schema,_run(),_arun()); Semantic Kernel @kernel_function; Instructor response_model=Pydantic as schema.
      ja: Gorilla APIBench が LLM を訓練して API 呼出し hallucination を低減。LangChain BaseTool。Semantic Kernel @kernel_function。Instructor response_model=Pydantic schema。
    field_values:
      descriptor_id: customer-lookup-support
      tool_ref: get-customer
      audience: support-team
    related_node_ids: [CapabilityDescriptor, ToolMetadata]
    related_relation_ids: [CapabilityDescriptor-part_of-ToolMetadata]

    source_claims: [moonweave-capability-descriptor-profile]
  - id: capability-descriptor-counterexample-schema-substitution

    labels:
      zh: 用摘要替代参数 schema
      en: Summary substituted for parameter schema
      ja: summary を parameter schema の代わりにする例

    descriptions:
      zh: 反例：Gorilla 无 retriever 生成不存在 API 名；LangChain tool 缺 args_schema Pydantic model；Instructor response_model 字段与 OpenAI function parameters 混用。
      en: Counterexample: Gorilla generates nonexistent API name without retriever; LangChain tool missing args_schema Pydantic model; Instructor response_model fields mixed with OpenAI function parameters.
      ja: 反例：Gorilla が retriever なしで不存在 API 名を生成。LangChain tool に args_schema 欠落。Instructor response_model と OpenAI function parameters 混同。
    field_values:
      tool_ref: get-customer
      capability_summary: Looks up a customer by identifier.
    related_node_ids: [CapabilityDescriptor, ToolMetadata]
    related_relation_ids: [CapabilityDescriptor-part_of-ToolMetadata]

    source_claims: [moonweave-capability-descriptor-profile]
  - id: capability-descriptor-boundary-description-and-callability

    labels:
      zh: 描述与会话可调用性边界
      en: Boundary between description and session callability
      ja: description と session callability の境界

    descriptions:
      zh: Gorilla API 文档 schema vs LangChain StructuredTool.from_function vs Instructor Pydantic model 的声明-运行时边界；ToolDefinition profile 非 wire 对象。
      en: Declaration-runtime boundary among Gorilla API doc schema, LangChain StructuredTool.from_function, Instructor Pydantic model; ToolDefinition profile is not wire object.
      ja: Gorilla API 文档 schema、LangChain StructuredTool.from_function、Instructor Pydantic model の宣言-ランタイム境界。ToolDefinition profile は wire object ではない。
    field_values:
      tool_ref: files-read-file
      provenance_ref: local-doc://catalog/read-file
    related_node_ids: [CapabilityDescriptor, ToolMetadata]
    related_relation_ids: [CapabilityDescriptor-part_of-ToolMetadata]

    source_claims: [moonweave-capability-descriptor-profile, mcp-tool-record-boundary]
  - id: capability-descriptor-instance-product-note

    labels:
      zh: 产品目录描述符实例
      en: Product-catalog descriptor instance
      ja: product-catalog descriptor instance

    descriptions:
      zh: LangChain 实例：StructuredTool.from_function(get_weather,name="get_weather",args_schema=WeatherInput)；Gorilla 实例：HuggingFace pipeline(task="sentiment-analysis") API 调用 schema。
      en: LangChain instance: StructuredTool.from_function(get_weather,name="get_weather",args_schema=WeatherInput); Gorilla instance: HuggingFace pipeline(task="sentiment-analysis") API call schema.
      ja: LangChain 実例：StructuredTool.from_function(get_weather,args_schema=WeatherInput)。Gorilla 実例：HuggingFace pipeline(task="sentiment-analysis") API 呼出し schema。
    field_values:
      descriptor_id: invoice-search-finance-ops
      tool_ref: invoice-search
      audience: finance-ops
      provenance_ref: local-doc://finance/invoice-search
    related_node_ids: [CapabilityDescriptor, ToolMetadata]
    related_relation_ids: [CapabilityDescriptor-part_of-ToolMetadata]

    source_claims: [moonweave-capability-descriptor-profile]
parent_relation:
  id: CapabilityDescriptor-part_of-ToolMetadata
  predicate: part_of
  target: concept:ToolMetadata
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是工具元数据修订的不可变组成部分
    en: is an immutable component of tool-metadata revision
    ja: tool-metadata revision の不変 component である
  definition:
    zh: CapabilityDescriptor 仅作为 metadata_revision_ref 标识的 工具元数据修订 中的 能力描述符 profile 版本 存在；父修订拥有该 profile 副本与删除边界，来源协议描述和运行时调用记录 始终位于该边界之外。
    en: CapabilityDescriptor exists only as a capability-descriptor profile version in the tool-metadata revision identified by metadata_revision_ref; the parent revision owns this profile copy and deletion boundary, while source-protocol descriptions and runtime invocation records always remain outside that boundary.
    ja: CapabilityDescriptor は metadata_revision_ref が識別する tool-metadata revision 内の capability-descriptor profile version としてのみ存在する。parent revision はこの profile copy と deletion boundary を所有し、source-protocol description と runtime invocation record は常にその boundary 外に残る。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_part
    labels:
      zh: 包含不可变组成版本
      en: has immutable component version
      ja: immutable component version を持つ
  conditions: []
  temporal_scope: versioned
  boundary_context: This strict local composition records a versioned deletion boundary for a Moonweave profile component. It does not make source-protocol descriptions and runtime invocation records components of the parent.
  constraints:
    - id: capabilitydescriptor-strict-versioned-composition
      severity: error
      expression_language: plain
      expression: CapabilityDescriptor must carry metadata_revision_ref and descriptor_revision, may not outlive or be independently deleted from that parent revision, and must not cascade deletion to source-protocol descriptions and runtime invocation records.
      explanation:
        zh: 该组成部分是本地父修订的严格版本化部分；它没有孤立的可变生命周期，且不能删除来源协议描述和运行时调用记录。
        en: The component is a strict versioned part of its local parent revision; it has no orphan mutable lifecycle and cannot delete source-protocol descriptions and runtime invocation records.
        ja: component はローカル parent revision の strict versioned part である。orphan mutable lifecycle を持たず、source-protocol description と runtime invocation record を削除できない。
      source_claims: [moonweave-capability-descriptor-taxonomy]
  examples: []
  source_claims: [moonweave-capability-descriptor-taxonomy]
  distinct_fact_rationale:
    zh: 此关系表达本地 profile 版本的所有权和删除边界；来源协议描述和运行时调用记录 的来源与生命周期由其各自系统保持。
    en: This relation expresses ownership and deletion boundary of a local profile version; provenance and lifecycle of source-protocol descriptions and runtime invocation records remain with their respective systems.
    ja: この relation はローカル profile version の ownership と deletion boundary を表す。source-protocol description と runtime invocation record の provenance と lifecycle は各 system に残る。
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification — Tools
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    version: 2025-11-25
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Defines MCP Tool records and their distinct source-side metadata surface.
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: design-inference
    relevance: Defines the local CapabilityDescriptor profile and metadata taxonomy.
source_claims:
  - id: mcp-tool-record-boundary
    source: mcp-tools-2025-11-25
    supports: MCP defines Tool records and their protocol fields separately from any Moonweave local catalog description.
    locator: "Tool"
    evidence_kind: normative
    confidence: high
  - id: moonweave-capability-descriptor-profile
    source: moonweave-ontology-design
    supports: CapabilityDescriptor is a Moonweave local audience-specific tool summary with explicit provenance and no protocol-native call authority.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
  - id: moonweave-capability-descriptor-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave treats CapabilityDescriptor as a strict immutable component of a ToolMetadata revision; deleting the local descriptor does not delete source-protocol descriptions or invocation records.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
