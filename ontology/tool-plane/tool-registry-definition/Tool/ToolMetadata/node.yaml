schema: moonweave.ai/ontology-node/v1
id: ToolMetadata
kind: concept
labels:
  zh: 工具元数据 profile
  en: Tool metadata profile
  ja: ツールメタデータ profile
semantics:
  short_definition:
    zh: 汇总来源明确的工具展示和行为提示的 Moonweave 本地 profile。
    en: A Moonweave local profile aggregating provenance-bearing display and behavior hints for a tool.
    ja: tool の provenance を持つ display と behavior hint を集約する Moonweave ローカル profile。
  definition:
    zh: >
      ToolMetadata 是本地组织 profile，聚合某个工具的标题、描述、图标、注释、执行提示和本地描述符。MCP Tool 规范定义
      title、description、icons、annotations 和 execution 等字段；OpenAI function tool 的 description 有不同位置和
      语义。本 profile 不能把本地描述符或弃用通知伪装为每个来源协议的原生字段。
    en: >
      ToolMetadata is a local organization profile aggregating title, description, icons,
      annotations, execution hints, and local descriptors for one tool. MCP Tool specification
      defines fields such as title, description, icons, annotations, and execution, while an OpenAI
      function tool places description differently. This profile cannot present local descriptors or
      retirement notices as native fields in every source protocol.
    ja: >
      ToolMetadata は一つの tool の title、description、icons、annotations、execution hint、ローカル descriptor を集約する
      ローカル organization profile である。MCP Tool specification は title、description、icons、annotations、execution
      などを定義し、OpenAI function tool は description を異なる位置に置く。この profile はローカル descriptor や
      retirement notice をすべての source protocol の native field として提示できない。
  why_needed:
    zh: 展示与选择需要元数据，但其来源和可信度必须可追溯。
    en: Display and selection need metadata, but its source and trust level must remain traceable.
    ja: display と selection には metadata が必要だが、その source と trust level は追跡可能でなければならない。
  includes:
    - zh: 来源字段的显示元数据和行为提示。
      en: Display metadata and behavior hints from source fields.
      ja: source field からの display metadata と behavior hint。
    - zh: 明确标为本地的描述符与通知引用。
      en: Descriptor and notice references explicitly marked local.
      ja: ローカルと明示された descriptor と notice reference。
  excludes:
    - zh: 工具的输入参数 schema、执行结果或权限策略。
      en: Tool input parameter schema, execution result, or permission policy.
      ja: tool input parameter schema、execution result、permission policy。
    - zh: 假定为所有协议受信任的元数据。
      en: Metadata assumed trusted by every protocol.
      ja: すべての protocol で trusted と仮定される metadata。
  semantic_kind: entity
  aliases:
    - language: en
      value: local tool presentation profile
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      metadata_source 逐项记录字段来自 MCP Tool、OpenAI function 或本地规则。MCP 指出客户端必须将 Tool annotations
      视为不受信任，除非它们来自受信任服务器；本地描述符也必须保持来源和信任边界。
    en: >
      metadata_source records whether each field comes from MCP Tool, OpenAI function, or local
      rule. MCP states that clients must treat Tool annotations as untrusted unless they come from a
      trusted server; local descriptors must likewise retain source and trust boundaries.
    ja: >
      metadata_source は各 field が MCP Tool、OpenAI function、ローカル rule のどれから来るかを記録する。MCP は client が
      trusted server 由来でない限り Tool annotations を untrusted と扱わなければならないとする。ローカル descriptor も
      同様に source と trust boundary を保持しなければならない。
  typical_input:
    - description:
        zh: 一个 MCP Tool 的展示与注释字段。
        en: Display and annotation fields of an MCP Tool.
        ja: MCP Tool の display と annotation field。
      format: |
        {"title":"Weather","description":"Read weather","annotations":{"readOnlyHint":true}}
      source_claims: [mcp-tool-metadata-fields]
  typical_output:
    - description:
        zh: 带来源标记的本地元数据 profile。
        en: A local metadata profile with provenance markers.
        ja: provenance marker を持つローカル metadata profile。
      format: |
        {"tool_ref":"get_weather","display_title":"Weather","metadata_source":"MCP Tool"}
      source_claims: [moonweave-tool-metadata-profile]
  reference_implementations:
    - name: MCP Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines Tool display fields, annotations, execution hints, and trust guidance.
structure:
  identity_keys: [tool_ref, metadata_revision]
  fields:
    - id: metadata_revision
      labels:
        zh: 工具元数据 profile 版本
        en: tool-metadata profile version
        ja: tool-metadata profile version
      definitions:
        zh: 标识此不可变本地 工具元数据 profile 版本；变更必须创建新版本，不得就地修改。
        en: Identifies this immutable local tool-metadata profile version; a change must create a new version rather than mutate it in place.
        ja: この不変ローカル tool-metadata profile version を識別する。変更は in-place で mutate せず新 version を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "1"
      allowed_values: []
      source_claims: [moonweave-tool-metadata-profile, moonweave-tool-metadata-taxonomy]
    - id: tool_revision_ref
      labels:
        zh: Tool 运行时绑定修订引用
        en: Tool runtime-binding revision reference
        ja: Tool runtime-binding revision reference
      definitions:
        zh: 标识拥有此 工具元数据 profile 版本 的不可变 Tool 运行时绑定修订；该组成部分在父修订外无效，删除父修订只删除本地 profile，不删除 来源协议元数据和运行时调用记录。
        en: Identifies the immutable Tool runtime-binding revision that owns this tool-metadata profile version; the component is invalid outside that parent revision, and deleting the parent revision deletes only local profiles, not source-protocol metadata and runtime invocation records.
        ja: この tool-metadata profile version を所有する不変 Tool runtime-binding revision を識別する。component は parent revision 外では無効で、parent revision を削除してもローカル profile だけが削除され、source-protocol metadata と runtime invocation record は削除されない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: tool@1
      allowed_values: []
      source_claims: [moonweave-tool-metadata-profile, moonweave-tool-metadata-taxonomy]
    - id: tool_ref
      labels:
        zh: 工具引用
        en: Tool reference
        ja: tool reference
      definitions:
        zh: 本地元数据所描述的工具 profile 引用。
        en: The callable-tool profile reference described by this metadata.
        ja: この metadata が記述する callable-tool profile reference。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: files-read-file
      allowed_values: []
      source_claims: [moonweave-tool-metadata-profile]
    - id: display_title
      labels:
        zh: 显示标题
        en: Display title
        ja: 表示 title
      definitions:
        zh: 用于本地显示的标题及其来源记录。
        en: A title used for local display together with its provenance record.
        ja: provenance record とともにローカル display に使う title。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: Read File
      allowed_values: []
      source_claims: [mcp-tool-metadata-fields, moonweave-tool-metadata-profile]
    - id: description
      labels:
        zh: 描述
        en: Description
        ja: 説明
      definitions:
        zh: 带来源上下文的工具人类可读描述。
        en: A human-readable tool description with source context.
        ja: source context を持つ human-readable tool description。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: Read a file from the workspace
      allowed_values: []
      source_claims: [mcp-tool-metadata-fields, moonweave-tool-metadata-profile]
    - id: metadata_source
      labels:
        zh: 元数据来源
        en: Metadata source
        ja: metadata source
      definitions:
        zh: 指明显示字段来自协议记录还是本地规则。
        en: States whether display fields come from a protocol record or local rule.
        ja: display field が protocol record 由来かローカル rule 由来かを示す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: MCP Tool
      allowed_values: [MCP Tool, OpenAI function, local]
      source_claims: [moonweave-tool-metadata-profile]
    - id: trust_boundary
      labels:
        zh: 信任边界
        en: Trust boundary
        ja: trust boundary
      definitions:
        zh: 说明调用方如何处理该元数据的来源可信度。
        en: States how a caller should treat provenance trust for this metadata.
        ja: caller がこの metadata の provenance trust をどう扱うべきかを示す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: untrusted-unless-server-trusted
      allowed_values: [trusted, untrusted-unless-server-trusted, local-policy]
      source_claims: [mcp-tool-annotation-trust, moonweave-tool-metadata-profile]
  constraints:
    - id: metadata-needs-source-and-trust
      severity: error
      expression_language: plain
      expression: ToolMetadata must record metadata_source and trust_boundary and cannot elevate local descriptors into protocol-native trusted fields.
      explanation:
        zh: 展示提示可能帮助选择，但不能绕过来源验证。
        en: Presentation hints may help selection but cannot bypass provenance validation.
        ja: presentation hint は selection を助け得るが provenance validation を迂回できない。
      source_claims: [mcp-tool-annotation-trust, moonweave-tool-metadata-profile]
  required_relations: [ToolMetadata-part_of-Tool]
examples:
  - id: tool-metadata-positive-mcp-title

    labels:
      zh: MCP Tool 显示标题
      en: MCP Tool display title
      ja: MCP Tool display title

    descriptions:
      zh: Gorilla APIBench 1645 API 注册（HuggingFace/TorchHub/TensorHub）；ToolBench 16000+ RapidAPI 工具注册表；Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") 插件注册。
      en: Gorilla APIBench registers 1645 APIs (HuggingFace/TorchHub/TensorHub); ToolBench 16000+ RapidAPI tool registry; Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") plugin registration.
      ja: Gorilla APIBench が 1645 API を登録。ToolBench 16000+ RapidAPI tool registry。Semantic Kernel kernel.add_plugin(WeatherPlugin(),"weather") プラグイン登録。
    field_values:
      metadata_source: MCP Tool
      trust_boundary: untrusted-unless-server-trusted
    related_node_ids: [ToolMetadata, Tool]
    related_relation_ids: [ToolMetadata-part_of-Tool]

    source_claims: [mcp-tool-metadata-fields, mcp-tool-annotation-trust]
  - id: tool-metadata-counterexample-trusted-hint

    labels:
      zh: 未验证注释被视为可信
      en: Unverified annotation treated as trusted
      ja: 未検証 annotation を trusted と扱う例

    descriptions:
      zh: 反例：ToolBench 注册未验证 RapidAPI key 的 endpoint；Gorilla registry 混入 hallucinated API 无 retriever 校验；Semantic Kernel plugin 名冲突未检测。
      en: Counterexample: ToolBench registers RapidAPI endpoint without key verification; Gorilla registry includes hallucinated API without retriever validation; Semantic Kernel plugin name collision undetected.
      ja: 反例：ToolBench が RapidAPI key 未検証 endpoint を登録。Gorilla registry に retriever 未検証 hallucinated API 混入。
    field_values:
      trust_boundary: trusted
    related_node_ids: [ToolMetadata]
    related_relation_ids: [ToolMetadata-part_of-Tool]

    source_claims: [mcp-tool-annotation-trust]
  - id: tool-metadata-boundary-metadata-and-schema

    labels:
      zh: 元数据与输入 schema 边界
      en: Boundary between metadata and input schema
      ja: metadata と input schema の境界

    descriptions:
      zh: Gorilla 离线 APIBench 索引 vs ToolBench 在线 RapidAPI catalog vs Semantic Kernel 本地 plugin 注册的持久化边界。
      en: Persistence boundary among Gorilla offline APIBench index, ToolBench online RapidAPI catalog, Semantic Kernel local plugin registration.
      ja: Gorilla offline APIBench index、ToolBench online RapidAPI catalog、Semantic Kernel ローカル plugin 登録の永続化境界。
    field_values:
      metadata_source: local
    related_node_ids: [ToolMetadata, ToolSpecification]
    related_relation_ids: [ToolMetadata-part_of-Tool]

    source_claims: [moonweave-tool-metadata-profile]
  - id: tool-metadata-instance-local-descriptor

    labels:
      zh: 本地能力描述符实例
      en: Local capability-descriptor instance
      ja: ローカル capability-descriptor instance

    descriptions:
      zh: "ToolBench registry 实例：tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}；Semantic Kernel WeatherPlugin.get_weather(city:str) 注册实例。"
      en: "ToolBench registry instance: tool_id=rapidapi-weather-api endpoint=/forecast params={q,city,units}; Semantic Kernel WeatherPlugin.get_weather(city:str) registration instance."
      ja: ToolBench registry 実例：tool_id=rapidapi-weather-api endpoint=/forecast。Semantic Kernel WeatherPlugin.get_weather(city:str) 登録実例。
    field_values:
      metadata_source: local
      trust_boundary: local-policy
    related_node_ids: [ToolMetadata, CapabilityDescriptor]
    related_relation_ids: [ToolMetadata-part_of-Tool]

    source_claims: [moonweave-tool-metadata-profile]
parent_relation:
  id: ToolMetadata-part_of-Tool
  predicate: part_of
  target: concept:Tool
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是Tool 运行时绑定修订的不可变组成部分
    en: is an immutable component of Tool runtime-binding revision
    ja: Tool runtime-binding revision の不変 component である
  definition:
    zh: ToolMetadata 仅作为 tool_revision_ref 标识的 Tool 运行时绑定修订 中的 工具元数据 profile 版本 存在；父修订拥有该 profile 副本与删除边界，来源协议元数据和运行时调用记录 始终位于该边界之外。
    en: ToolMetadata exists only as a tool-metadata profile version in the Tool runtime-binding revision identified by tool_revision_ref; the parent revision owns this profile copy and deletion boundary, while source-protocol metadata and runtime invocation records always remain outside that boundary.
    ja: ToolMetadata は tool_revision_ref が識別する Tool runtime-binding revision 内の tool-metadata profile version としてのみ存在する。parent revision はこの profile copy と deletion boundary を所有し、source-protocol metadata と runtime invocation record は常にその boundary 外に残る。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_part
    labels:
      zh: 包含不可变组成版本
      en: has immutable component version
      ja: immutable component version を持つ
  conditions: []
  temporal_scope: versioned
  boundary_context: This strict local composition records a versioned deletion boundary for a Moonweave profile component. It does not make source-protocol metadata and runtime invocation records components of the parent.
  constraints:
    - id: toolmetadata-strict-versioned-composition
      severity: error
      expression_language: plain
      expression: ToolMetadata must carry tool_revision_ref and metadata_revision, may not outlive or be independently deleted from that parent revision, and must not cascade deletion to source-protocol metadata and runtime invocation records.
      explanation:
        zh: 该组成部分是本地父修订的严格版本化部分；它没有孤立的可变生命周期，且不能删除来源协议元数据和运行时调用记录。
        en: The component is a strict versioned part of its local parent revision; it has no orphan mutable lifecycle and cannot delete source-protocol metadata and runtime invocation records.
        ja: component はローカル parent revision の strict versioned part である。orphan mutable lifecycle を持たず、source-protocol metadata と runtime invocation record を削除できない。
      source_claims: [moonweave-tool-metadata-taxonomy]
  examples: []
  source_claims: [moonweave-tool-metadata-taxonomy]
  distinct_fact_rationale:
    zh: 此关系表达本地 profile 版本的所有权和删除边界；来源协议元数据和运行时调用记录 的来源与生命周期由其各自系统保持。
    en: This relation expresses ownership and deletion boundary of a local profile version; provenance and lifecycle of source-protocol metadata and runtime invocation records remain with their respective systems.
    ja: この relation はローカル profile version の ownership と deletion boundary を表す。source-protocol metadata と runtime invocation record の provenance と lifecycle は各 system に残る。
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification — Tools
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    version: 2025-11-25
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Defines MCP Tool metadata fields and annotation trust guidance.
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: design-inference
    relevance: Defines local ToolMetadata profile and taxonomy.
source_claims:
  - id: mcp-tool-metadata-fields
    source: mcp-tools-2025-11-25
    supports: MCP Tool records may include title, description, icons, annotations, and execution properties.
    locator: "Tool"
    evidence_kind: normative
    confidence: high
  - id: mcp-tool-annotation-trust
    source: mcp-tools-2025-11-25
    supports: MCP clients must consider Tool annotations untrusted unless they come from trusted servers.
    locator: "Tool"
    evidence_kind: normative
    confidence: high
  - id: moonweave-tool-metadata-profile
    source: moonweave-ontology-design
    supports: ToolMetadata is a Moonweave local profile that aggregates tool presentation data while retaining source and trust boundary.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
  - id: moonweave-tool-metadata-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave treats ToolMetadata as a strict immutable component of a Tool runtime-binding revision; deleting local metadata does not delete source-protocol metadata or invocation records.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high