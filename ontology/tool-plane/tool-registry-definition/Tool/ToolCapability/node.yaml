schema: moonweave.ai/ontology-node/v1
id: ToolCapability
kind: concept
labels:
  zh: 工具能力分面 profile
  en: Tool capability-facet profile
  ja: ツール能力 facet profile
semantics:
  short_definition:
    zh: 描述一个本地可调用工具可执行业务动作的 Moonweave 分面 profile。
    en: A Moonweave facet profile describing a business action a local callable tool can perform.
    ja: ローカル callable tool が実行できる business action を記述する Moonweave facet profile。
  definition:
    zh: >
      ToolCapability 是本地语义分面，用于描述如“读取文件”或“查询客户”的动作意图，并可关联 HTTP APIOperation 等
      适配实现。它不是 MCP initialize 的 tools capability，也不是 MCP Tool annotations，更不是 OpenAI 内置工具类型。
      本 profile 只帮助本地分类和选择，不能声明协议允许某种调用。
    en: >
      ToolCapability is a local semantic facet describing an action intent such as reading a file
      or querying a customer and may associate an adapter implementation such as an HTTP
      APIOperation. It is not the tools capability in MCP initialize, an MCP Tool annotation, or an
      OpenAI built-in tool type. This profile assists local classification and selection only and
      cannot declare what a protocol permits to call.
    ja: >
      ToolCapability は file を読む、customer を照会するなどの action intent を記述するローカル semantic facet であり、
      HTTP APIOperation など adapter implementation と関連付けられ得る。MCP initialize の tools capability、MCP Tool
      annotation、OpenAI built-in tool type ではない。この profile はローカル classification と selection を助けるだけで、
      protocol が何を call できるかを宣言できない。
  why_needed:
    zh: 本地系统可按业务意图比较工具，同时不把该分类误作协议能力协商。
    en: A local system can compare tools by business intent without mistaking classification for protocol capability negotiation.
    ja: ローカル system は classification を protocol capability negotiation と誤認せず business intent で tool を比較できる。
  includes:
    - zh: 本地动作标识、输入输出意图和实现引用。
      en: Local action identifier, input/output intent, and implementation reference.
      ja: ローカル action identifier、input/output intent、implementation reference。
    - zh: 与 HTTP 操作或其他本地适配器的可选关联。
      en: Optional association with an HTTP operation or another local adapter.
      ja: HTTP operation または別のローカル adapter との任意 association。
  excludes:
    - zh: MCP server capabilities.tools 声明。
      en: The MCP server capabilities.tools declaration.
      ja: MCP server capabilities.tools declaration。
    - zh: 工具参数 JSON Schema、执行权限或工具调用结果。
      en: Tool parameter JSON Schema, execution permission, or tool-call result.
      ja: tool parameter JSON Schema、execution permission、tool-call result。
  semantic_kind: entity
  aliases:
    - language: en
      value: local action facet
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      capability_id 命名本地动作，implementation_ref 可指向 APIOperation、FunctionTool 或 MCP Tool source_ref；若指向 APIOperation，
      其实现事实由 APIOperation-realizes-ToolCapability 关联表达，而不是子类关系。选择器可用
      该分面过滤候选工具，但实际可用性仍应由 MCP capability 协商、OpenAI 请求配置和运行时权限检查决定。
    en: >
      capability_id names a local action and implementation_ref may point to APIOperation,
      FunctionTool, or an MCP Tool source_ref. When it points to APIOperation, the realization fact
      is expressed by the APIOperation-realizes-ToolCapability association rather than subtype
      inheritance. A selector can filter candidate tools by the facet, while actual availability remains determined by MCP capability negotiation, OpenAI request
      configuration, and runtime permission checks.
    ja: >
      capability_id はローカル action を名付け、implementation_ref は APIOperation、FunctionTool、または MCP Tool source_ref を
      指し得る。APIOperation を指すとき realization fact は subtype inheritance ではなく APIOperation-realizes-ToolCapability association で表す。selector は facet で candidate tool を filter できるが、実際の availability は MCP capability negotiation、
      OpenAI request configuration、runtime permission check により決まる。
  typical_input:
    - description:
        zh: 读取文件动作的本地能力分面。
        en: A local capability facet for reading a file.
        ja: file を読むローカル capability facet。
      format: |
        {"capability_id":"read-file","input_intent":"path","output_intent":"file-content"}
      source_claims: [moonweave-tool-capability-profile]
  typical_output:
    - description:
        zh: 关联到工具实现的分面记录。
        en: A facet record associated with a tool implementation.
        ja: tool implementation に関連付けられた facet record。
      format: |
        {"capability_id":"read-file","implementation_ref":"mcp://files/tools/read_file"}
      source_claims: [moonweave-tool-capability-profile]
  reference_implementations:
    - name: MCP Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines a server tools capability and Tool records, distinct from this local facet.
structure:
  identity_keys: [capability_id, tool_ref, capability_revision]
  fields:
    - id: capability_revision
      labels:
        zh: 工具能力分面版本
        en: tool-capability facet version
        ja: tool-capability facet version
      definitions:
        zh: 标识此不可变本地 工具能力分面版本；变更必须创建新版本，不得就地修改。
        en: Identifies this immutable local tool-capability facet version; a change must create a new version rather than mutate it in place.
        ja: この不変ローカル tool-capability facet version を識別する。変更は in-place で mutate せず新 version を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "1"
      allowed_values: []
      source_claims: [moonweave-tool-capability-profile, moonweave-tool-capability-taxonomy]
    - id: tool_revision_ref
      labels:
        zh: Tool 运行时绑定修订引用
        en: Tool runtime-binding revision reference
        ja: Tool runtime-binding revision reference
      definitions:
        zh: 标识拥有此 工具能力分面版本 的不可变 Tool 运行时绑定修订；该组成部分在父修订外无效，删除父修订只删除本地 profile，不删除 来源工具定义和运行时调用记录。
        en: Identifies the immutable Tool runtime-binding revision that owns this tool-capability facet version; the component is invalid outside that parent revision, and deleting the parent revision deletes only local profiles, not source tool definitions and runtime invocation records.
        ja: この tool-capability facet version を所有する不変 Tool runtime-binding revision を識別する。component は parent revision 外では無効で、parent revision を削除してもローカル profile だけが削除され、source tool definition と runtime invocation record は削除されない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: tool@1
      allowed_values: []
      source_claims: [moonweave-tool-capability-profile, moonweave-tool-capability-taxonomy]
    - id: capability_id
      labels:
        zh: 本地动作标识符
        en: Local action identifier
        ja: ローカル action 識別子
      definitions:
        zh: 标识本地业务动作意图。
        en: Identifies local business-action intent.
        ja: ローカル business-action intent を識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: read-file
      allowed_values: []
      source_claims: [moonweave-tool-capability-profile]
    - id: tool_ref
      labels:
        zh: 工具引用
        en: Tool reference
        ja: tool reference
      definitions:
        zh: 实现该本地动作意图的 Callable tool profile。
        en: The Callable tool profile implementing this local action intent.
        ja: このローカル action intent を実装する Callable tool profile。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: files-read-file
      allowed_values: []
      source_claims: [moonweave-tool-capability-profile]
    - id: input_intent
      labels:
        zh: 输入意图
        en: Input intent
        ja: input intent
      definitions:
        zh: 本地对所需输入种类的语义描述，不替代 schema。
        en: A local semantic description of required input kind and not a replacement for schema.
        ja: 必要な input kind のローカル semantic description であり、schema の置換ではない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: file-path
      allowed_values: []
      source_claims: [moonweave-tool-capability-profile]
    - id: output_intent
      labels:
        zh: 输出意图
        en: Output intent
        ja: output intent
      definitions:
        zh: 本地对预期业务输出种类的语义描述，不替代返回 schema。
        en: A local semantic description of expected business output kind and not a replacement for output schema.
        ja: 期待する business output kind のローカル semantic description であり、output schema の置換ではない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: file-content
      allowed_values: []
      source_claims: [moonweave-tool-capability-profile]
    - id: implementation_ref
      labels:
        zh: 实现引用
        en: Implementation reference
        ja: implementation reference
      definitions:
        zh: 指向实现该意图的协议工具或本地适配器。
        en: Points to a protocol tool or local adapter implementing the intent.
        ja: intent を実装する protocol tool またはローカル adapter を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: mcp://files/tools/read_file
      allowed_values: []
      source_claims: [moonweave-tool-capability-profile]
  constraints:
    - id: capability-facet-is-not-protocol-capability
      severity: error
      expression_language: plain
      expression: ToolCapability must identify a local action and implementation_ref and cannot be used as evidence that an MCP server advertised tools capability.
      explanation:
        zh: 本地业务分类不会取代 MCP 初始化协商。
        en: Local business classification does not replace MCP initialization negotiation.
        ja: ローカル business classification は MCP initialization negotiation を置換しない。
      source_claims: [moonweave-tool-capability-profile, mcp-tools-capability-boundary]
  required_relations: [ToolCapability-part_of-Tool]
examples:
  - id: tool-capability-positive-read-file

    labels:
      zh: 读取文件能力分面
      en: Read-file capability facet
      ja: read-file capability facet

    descriptions:
      zh: Gorilla APIBench 训练 LLM 生成 API 调用减少 hallucination；LangChain BaseTool(name,description,args_schema,_run(),_arun())；Semantic Kernel @kernel_function；Instructor response_model=Pydantic 作 schema。
      en: Gorilla APIBench trains LLM for API calls reducing hallucination; LangChain BaseTool(name,description,args_schema,_run(),_arun()); Semantic Kernel @kernel_function; Instructor response_model=Pydantic as schema.
      ja: Gorilla APIBench が LLM を訓練して API 呼出し hallucination を低減。LangChain BaseTool。Semantic Kernel @kernel_function。Instructor response_model=Pydantic schema。
    field_values:
      capability_id: read-file
      implementation_ref: mcp://files/tools/read_file
    related_node_ids: [ToolCapability, Tool]
    related_relation_ids: [ToolCapability-part_of-Tool, APIOperation-realizes-ToolCapability]

    source_claims: [moonweave-tool-capability-profile]
  - id: tool-capability-counterexample-mcp-advertisement

    labels:
      zh: 分面被误作 MCP tools capability
      en: Facet misused as MCP tools capability
      ja: facet を MCP tools capability と誤用する例

    descriptions:
      zh: 反例：Gorilla 无 retriever 生成不存在 API 名；LangChain tool 缺 args_schema Pydantic model；Instructor response_model 字段与 OpenAI function parameters 混用。
      en: Counterexample: Gorilla generates nonexistent API name without retriever; LangChain tool missing args_schema Pydantic model; Instructor response_model fields mixed with OpenAI function parameters.
      ja: 反例：Gorilla が retriever なしで不存在 API 名を生成。LangChain tool に args_schema 欠落。Instructor response_model と OpenAI function parameters 混同。
    field_values:
      capability_id: read-file
    related_node_ids: [ToolCapability]
    related_relation_ids: [ToolCapability-part_of-Tool]

    source_claims: [mcp-tools-capability-boundary, moonweave-tool-capability-profile]
  - id: tool-capability-boundary-intent-and-schema

    labels:
      zh: 业务意图与 schema 边界
      en: Boundary between business intent and schema
      ja: business intent と schema の境界

    descriptions:
      zh: Gorilla API 文档 schema vs LangChain StructuredTool.from_function vs Instructor Pydantic model 的声明-运行时边界；ToolDefinition profile 非 wire 对象。
      en: Declaration-runtime boundary among Gorilla API doc schema, LangChain StructuredTool.from_function, Instructor Pydantic model; ToolDefinition profile is not wire object.
      ja: Gorilla API 文档 schema、LangChain StructuredTool.from_function、Instructor Pydantic model の宣言-ランタイム境界。ToolDefinition profile は wire object ではない。
    field_values:
      input_intent: file-path
    related_node_ids: [ToolCapability, ToolSpecification]
    related_relation_ids: [ToolCapability-part_of-Tool]

    source_claims: [moonweave-tool-capability-profile]
  - id: tool-capability-instance-http-adapter

    labels:
      zh: HTTP 适配动作实例
      en: HTTP-adapter action instance
      ja: HTTP-adapter action instance

    descriptions:
      zh: LangChain 实例：StructuredTool.from_function(get_weather,name="get_weather",args_schema=WeatherInput)；Gorilla 实例：HuggingFace pipeline(task="sentiment-analysis") API 调用 schema。
      en: LangChain instance: StructuredTool.from_function(get_weather,name="get_weather",args_schema=WeatherInput); Gorilla instance: HuggingFace pipeline(task="sentiment-analysis") API call schema.
      ja: LangChain 実例：StructuredTool.from_function(get_weather,args_schema=WeatherInput)。Gorilla 実例：HuggingFace pipeline(task="sentiment-analysis") API 呼出し schema。
    field_values:
      capability_id: get-customer
      implementation_ref: api-operation-get-customer
    related_node_ids: [ToolCapability, APIOperation]
    related_relation_ids: [ToolCapability-part_of-Tool]

    source_claims: [moonweave-tool-capability-profile]
parent_relation:
  id: ToolCapability-part_of-Tool
  predicate: part_of
  target: concept:Tool
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 是Tool 运行时绑定修订的不可变组成部分
    en: is an immutable component of Tool runtime-binding revision
    ja: Tool runtime-binding revision の不変 component である
  definition:
    zh: ToolCapability 仅作为 tool_revision_ref 标识的 Tool 运行时绑定修订 中的 工具能力分面版本 存在；父修订拥有该 profile 副本与删除边界，来源工具定义和运行时调用记录 始终位于该边界之外。
    en: ToolCapability exists only as a tool-capability facet version in the Tool runtime-binding revision identified by tool_revision_ref; the parent revision owns this profile copy and deletion boundary, while source tool definitions and runtime invocation records always remain outside that boundary.
    ja: ToolCapability は tool_revision_ref が識別する Tool runtime-binding revision 内の tool-capability facet version としてのみ存在する。parent revision はこの profile copy と deletion boundary を所有し、source tool definition と runtime invocation record は常にその boundary 外に残る。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_part
    labels:
      zh: 包含不可变组成版本
      en: has immutable component version
      ja: immutable component version を持つ
  conditions: []
  temporal_scope: versioned
  boundary_context: This strict local composition records a versioned deletion boundary for a Moonweave profile component. It does not make source tool definitions and runtime invocation records components of the parent.
  constraints:
    - id: toolcapability-strict-versioned-composition
      severity: error
      expression_language: plain
      expression: ToolCapability must carry tool_revision_ref and capability_revision, may not outlive or be independently deleted from that parent revision, and must not cascade deletion to source tool definitions and runtime invocation records.
      explanation:
        zh: 该组成部分是本地父修订的严格版本化部分；它没有孤立的可变生命周期，且不能删除来源工具定义和运行时调用记录。
        en: The component is a strict versioned part of its local parent revision; it has no orphan mutable lifecycle and cannot delete source tool definitions and runtime invocation records.
        ja: component はローカル parent revision の strict versioned part である。orphan mutable lifecycle を持たず、source tool definition と runtime invocation record を削除できない。
      source_claims: [moonweave-tool-capability-taxonomy]
  examples: []
  source_claims: [moonweave-tool-capability-taxonomy]
  distinct_fact_rationale:
    zh: 此关系表达本地 profile 版本的所有权和删除边界；来源工具定义和运行时调用记录 的来源与生命周期由其各自系统保持。
    en: This relation expresses ownership and deletion boundary of a local profile version; provenance and lifecycle of source tool definitions and runtime invocation records remain with their respective systems.
    ja: この relation はローカル profile version の ownership と deletion boundary を表す。source tool definition と runtime invocation record の provenance と lifecycle は各 system に残る。
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification — Tools
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    version: 2025-11-25
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Defines the server tools capability, distinct from local action facets.
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: design-inference
    relevance: Defines local ToolCapability profile and taxonomy.
source_claims:
  - id: mcp-tools-capability-boundary
    source: mcp-tools-2025-11-25
    supports: An MCP server that supports tools declares tools capability before clients use tools/list or tools/call.
    locator: "Capabilities"
    evidence_kind: normative
    confidence: high
  - id: moonweave-tool-capability-profile
    source: moonweave-ontology-design
    supports: ToolCapability is a Moonweave local action-intent facet associated with a callable tool and optional implementation adapter.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
  - id: moonweave-tool-capability-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave treats ToolCapability as a strict immutable component of a Tool runtime-binding revision; deleting the local facet does not delete source definitions or invocation records.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
