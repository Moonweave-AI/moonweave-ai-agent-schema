schema: moonweave.ai/ontology-node/v1
id: FunctionTool
kind: concept
labels:
  zh: Agents SDK FunctionTool
  en: Agents SDK FunctionTool
  ja: Agents SDK FunctionTool
semantics:
  short_definition:
    zh: 由 Python 函数或显式 FunctionTool 对象实现的 OpenAI Agents SDK 本地函数调用工具。
    en: An OpenAI Agents SDK function-calling tool implemented by a Python function or an explicit FunctionTool object.
    ja: Python function または明示的な FunctionTool object で実装される OpenAI Agents SDK function-calling tool。
  definition:
    zh: >
      FunctionTool 是 Agents SDK 的官方运行时工具对象。装饰 Python 函数时，SDK 可从函数名、docstring
      和参数生成工具名称、描述及输入 JSON Schema；自定义 FunctionTool 则明确提供 name、description、
      params_json_schema 和 on_invoke_tool。它不是 MCP Tool 记录，也不允许用人类摘要替代参数 schema
      或应用实际执行函数。
    en: >
      FunctionTool is an official Agents SDK runtime tool object. When a Python function is decorated,
      the SDK can derive the tool name, description, and input JSON Schema from its name, docstring,
      and arguments; a custom FunctionTool explicitly supplies name, description, params_json_schema,
      and on_invoke_tool. It is not an MCP Tool record and does not allow a human summary to replace
      argument schema or actual application-function execution.
    ja: >
      FunctionTool は公式 Agents SDK runtime tool object である。Python function を decorate すると
      SDK は name、docstring、argument から tool name、description、input JSON Schema を導出できる。
      custom FunctionTool は name、description、params_json_schema、on_invoke_tool を明示的に提供する。
      これは MCP Tool record ではなく、human summary が argument schema や実際の application-function
      execution を置き換えることを許さない。
  why_needed:
    zh: 本地编排器可记录函数工具的可验证输入契约和执行器，而不混淆为远程协议工具。
    en: A local orchestrator can record a function tool's verifiable input contract and executor without conflating it with a remote protocol tool.
    ja: ローカル orchestrator は function tool の検証可能な input contract と executor を記録でき、remote protocol tool と混同しない。
  includes:
    - zh: 工具名称、描述、参数 JSON Schema、调用处理器和可选延迟加载设置。
      en: Tool name, description, parameters JSON Schema, invocation handler, and optional deferred loading.
      ja: tool name、description、parameters JSON Schema、invocation handler、任意の deferred loading。
    - zh: 由同步或异步 Python 函数提供的本地应用执行。
      en: Local application execution supplied by synchronous or asynchronous Python functions.
      ja: synchronous または asynchronous Python function が提供するローカル application execution。
  excludes:
    - zh: MCP server 的 Tool 定义、tools/call 消息或任意 HTTP endpoint。
      en: An MCP server Tool definition, tools/call message, or arbitrary HTTP endpoint.
      ja: MCP server Tool definition、tools/call message、または任意の HTTP endpoint。
    - zh: 仅凭 docstring 或能力描述就省略输入 schema 验证的调用。
      en: A call that omits input-schema validation solely because a docstring or capability description exists.
      ja: docstring または capability description があるだけで input-schema validation を省く call。
  semantic_kind: official-sdk-type
  aliases:
    - language: en
      value: Python function calling tool
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      function_ref 指向实际 Python 函数或调用处理器，params_json_schema 保留机器可验证的输入契约。
      name 和 description 可由装饰函数导出或显式提供；defer_loading 仅配置工具发现时机，不能改变
      函数权限、输入验证或执行责任。
    en: >
      function_ref points to the actual Python function or invocation handler, and params_json_schema
      retains the machine-verifiable input contract. name and description may be derived from a
      decorated function or supplied explicitly; defer_loading only configures discovery timing and
      cannot change function permission, input validation, or execution responsibility.
    ja: >
      function_ref は実際の Python function または invocation handler を指し、params_json_schema は
      machine-verifiable input contract を保持する。name と description は decorated function から
      導出するか明示的に与える。defer_loading は discovery timing だけを設定し、function permission、
      input validation、execution responsibility を変更できない。
  typical_input:
    - description:
        zh: 由装饰函数生成的天气查询 FunctionTool。
        en: A weather-query FunctionTool generated from a decorated function.
        ja: decorated function から生成された weather-query FunctionTool。
      format: |
        {"name":"fetch_weather","function_ref":"python://weather/fetch_weather","params_json_schema":{"type":"object","properties":{"location":{"type":"string"}},"required":["location"]}}
      source_claims: [agents-sdk-function-tool-generation]
  typical_output:
    - description:
        zh: 由本地调用处理器产生的函数工具输出。
        en: Function-tool output produced by a local invocation handler.
        ja: ローカル invocation handler が生成する function-tool output。
      format: |
        {"tool_name":"fetch_weather","output_kind":"text","executor_ref":"python://weather/fetch_weather"}
      source_claims: [agents-sdk-function-tool-generation]
  reference_implementations:
    - name: OpenAI Agents SDK Function tools
      url: https://openai.github.io/openai-agents-python/tools/
      description: Documents decorated Python functions and custom FunctionTool configuration with JSON Schema input contracts.
structure:
  identity_keys: [tool_id, source_protocol, binding_revision, name, function_ref]
  fields:
    - id: name
      labels:
        zh: 工具名称
        en: Tool name
        ja: tool name
      definitions:
        zh: FunctionTool 使用的名称，可由 Python 函数名导出或显式指定。
        en: The FunctionTool name, derived from a Python function name or provided explicitly.
        ja: Python function name から導出するか明示的に与える FunctionTool name。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: fetch_weather
      allowed_values: []
      source_claims: [agents-sdk-function-tool-generation]
    - id: description
      labels:
        zh: 工具描述
        en: Tool description
        ja: tool description
      definitions:
        zh: FunctionTool 的人类可读描述，可来自 docstring 或显式配置。
        en: The human-readable FunctionTool description, taken from a docstring or explicit configuration.
        ja: docstring または明示的 configuration から得る human-readable FunctionTool description。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Fetch the weather for a given location.
      allowed_values: []
      source_claims: [agents-sdk-function-tool-generation]
    - id: params_json_schema
      labels:
        zh: 参数 JSON Schema
        en: Parameters JSON Schema
        ja: parameters JSON Schema
      definitions:
        zh: 用于验证 FunctionTool 调用参数的 JSON Schema。
        en: The JSON Schema used to validate FunctionTool invocation arguments.
        ja: FunctionTool invocation argument を検証する JSON Schema。
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: '{"type":"object","properties":{"location":{"type":"string"}},"required":["location"]}'
      allowed_values: []
      source_claims: [agents-sdk-function-tool-generation]
    - id: function_ref
      labels:
        zh: 函数引用
        en: Function reference
        ja: function reference
      definitions:
        zh: 指向装饰函数或自定义调用处理器的本地实现。
        en: Points to the local implementation of the decorated function or custom invocation handler.
        ja: decorated function または custom invocation handler のローカル implementation を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: python://weather/fetch_weather
      allowed_values: []
      source_claims: [agents-sdk-function-tool-generation]
    - id: defer_loading
      labels:
        zh: 延迟加载
        en: Deferred loading
        ja: deferred loading
      definitions:
        zh: 可选地表示该函数工具是否等待 ToolSearchTool 在运行时加载。
        en: Optionally states whether this function tool waits for ToolSearchTool to load it at runtime.
        ja: この function tool が runtime で ToolSearchTool により load されるのを待つかを任意で示す。
      datatype: boolean
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: true
      allowed_values: [true, false]
      source_claims: [agents-sdk-function-tool-deferred-loading]
    - id: binding_revision
      labels:
        zh: 运行时绑定修订
        en: Runtime-binding revision
        ja: runtime-binding revision
      definitions:
        zh: 标识此独立本地 运行时绑定修订；执行器、定义或适配映射变化必须创建新版本，而不修改旧记录。
        en: Identifies this independent local Runtime-binding revision; a change to executor, definition, or adapter mapping must create a new version rather than mutate the old record.
        ja: この独立ローカル runtime-binding revision を識別する。executor、definition、adapter mapping の変更は旧 record を mutate せず新 version を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "1"
      allowed_values: []
      source_claims: [moonweave-function-tool-taxonomy]
    - id: tool_id
      labels:
        zh: 本地工具标识符
        en: Local tool identifier
        ja: ローカル tool 識別子
      definitions:
        zh: 在本地运行时范围内标识可调用工具 profile。
        en: Identifies a callable-tool profile within local runtime scope.
        ja: ローカル runtime scope 内で callable-tool profile を識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: files-read-file
      allowed_values: []
      source_claims: [moonweave-function-tool-taxonomy]
    - id: definition_ref
      labels:
        zh: 定义引用
        en: Definition reference
        ja: definition reference
      definitions:
        zh: 指向此运行时绑定所实现的、来源明确的一个 ToolDefinition profile。
        en: Points to the one provenance-bearing ToolDefinition profile realized by this runtime binding.
        ja: この runtime binding が実現する、provenance を持つ一つの ToolDefinition profile を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: files-read-file
      allowed_values: []
      source_claims: [moonweave-function-tool-taxonomy]
    - id: executor_kind
      labels:
        zh: 执行器种类
        en: Executor kind
        ja: executor kind
      definitions:
        zh: 标识调用由 MCP server、应用函数或 SDK 运行时等哪个执行器处理。
        en: Identifies whether an MCP server, application function, SDK runtime, or another executor handles the call.
        ja: MCP server、application function、SDK runtime、その他の executor のどれが call を処理するかを示す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: mcp-server
      allowed_values: [mcp-server, application-function, agents-sdk-runtime, hosted-service]
      source_claims: [moonweave-function-tool-taxonomy]
    - id: source_protocol
      labels:
        zh: 来源协议
        en: Source protocol
        ja: source protocol
      definitions:
        zh: 标识工具的定义和调用契约所属协议或 SDK。
        en: Identifies the protocol or SDK owning tool definition and call contract.
        ja: tool definition と call contract を所有する protocol または SDK を識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: MCP
      allowed_values: [MCP, OpenAI, OpenAI-Agents-SDK]
      source_claims: [moonweave-function-tool-taxonomy]
  constraints:
    - id: function-tool-needs-schema-and-handler
      severity: error
      expression_language: plain
      expression: FunctionTool must identify name, description, params_json_schema, and function_ref; human-readable text cannot replace JSON Schema validation or a local invocation handler.
      explanation:
        zh: 函数工具需要机器契约和实际执行器，摘要文本不足以调用它。
        en: A function tool needs a machine contract and an actual executor; summary text is insufficient to invoke it.
        ja: function tool には machine contract と実際の executor が必要であり、summary text だけでは invoke できない。
      source_claims: [agents-sdk-function-tool-generation]
    - id: function-tool-inherits-parent-required-fields
      severity: error
      expression_language: plain
      expression: "All inherited required Tool fields are fields of this same record; the is_a subtype does not establish or reference a second Tool record."
      explanation: {zh: "所有继承的 Tool 必需字段属于同一记录，该 is_a 子类型不建立或引用第二条 Tool 记录。", en: "Inherited required fields stay on the same record rather than creating a second parent record.", ja: "継承された必須 Tool フィールドは同じレコードに属し、この is_a 下位型は 2 番目の親レコードを作成または参照しない。"}
      source_claims: [moonweave-function-tool-taxonomy]
  required_relations: []
examples:
  - id: function-tool-positive-decorated-function

    labels:
      zh: 装饰天气函数
      en: Decorated weather function
      ja: decorated weather function

    descriptions:
      zh: LangChain @tool def search(query:str)->str: """Search the web.""" return web_search(query)；StructuredTool.from_function(func,name,description,args_schema) 生成可调用工具。
      en: LangChain @tool def search(query:str)->str: """Search the web.""" return web_search(query); StructuredTool.from_function(func,name,description,args_schema) yields callable tool.
      ja: LangChain @tool def search(query:str)->str。StructuredTool.from_function(func,name,description,args_schema) が callable tool を生成。
    field_values:
      tool_id: fetch-weather
      source_protocol: OpenAI-Agents-SDK
      binding_revision: "1"
      name: fetch_weather
      function_ref: python://weather/fetch_weather
      params_json_schema: '{"type":"object","required":["location"]}'
    related_node_ids: [FunctionTool, LocalRuntimeTool]
    related_relation_ids: [FunctionTool-is_a-Tool]

    source_claims: [agents-sdk-function-tool-generation]
  - id: function-tool-counterexample-summary-as-schema

    labels:
      zh: 用摘要替代 JSON Schema
      en: Summary substituted for JSON Schema
      ja: summary を JSON Schema の代わりにする例

    descriptions:
      zh: 反例：Gorilla 无 retriever 生成不存在 API 名；LangChain tool 缺 args_schema Pydantic model；Instructor response_model 字段与 OpenAI function parameters 混用。
      en: Counterexample: Gorilla generates nonexistent API name without retriever; LangChain tool missing args_schema Pydantic model; Instructor response_model fields mixed with OpenAI function parameters.
      ja: 反例：Gorilla が retriever なしで不存在 API 名を生成。LangChain tool に args_schema 欠落。Instructor response_model と OpenAI function parameters 混同。
    field_values:
      name: fetch_weather
      description: Fetch the weather for a given location.
    related_node_ids: [FunctionTool, LocalRuntimeTool]
    related_relation_ids: [FunctionTool-is_a-Tool]

    source_claims: [agents-sdk-function-tool-generation]
  - id: function-tool-boundary-deferred-discovery

    labels:
      zh: 延迟发现与函数执行边界
      en: Boundary between deferred discovery and function execution
      ja: deferred discovery と function execution の境界

    descriptions:
      zh: Gorilla API 文档 schema vs LangChain StructuredTool.from_function vs Instructor Pydantic model 的声明-运行时边界；ToolDefinition profile 非 wire 对象。
      en: Declaration-runtime boundary among Gorilla API doc schema, LangChain StructuredTool.from_function, Instructor Pydantic model; ToolDefinition profile is not wire object.
      ja: Gorilla API 文档 schema、LangChain StructuredTool.from_function、Instructor Pydantic model の宣言-ランタイム境界。ToolDefinition profile は wire object ではない。
    field_values:
      name: fetch_weather
      defer_loading: true
    related_node_ids: [FunctionTool, LocalRuntimeTool]
    related_relation_ids: [FunctionTool-is_a-Tool]

    source_claims: [agents-sdk-function-tool-deferred-loading]
  - id: function-tool-instance-custom-handler

    labels:
      zh: 自定义用户处理函数实例
      en: Custom user-processing function instance
      ja: custom user-processing function instance

    descriptions:
      zh: LangChain 实例：StructuredTool.from_function(get_weather,name="get_weather",args_schema=WeatherInput)；Gorilla 实例：HuggingFace pipeline(task="sentiment-analysis") API 调用 schema。
      en: LangChain instance: StructuredTool.from_function(get_weather,name="get_weather",args_schema=WeatherInput); Gorilla instance: HuggingFace pipeline(task="sentiment-analysis") API call schema.
      ja: LangChain 実例：StructuredTool.from_function(get_weather,args_schema=WeatherInput)。Gorilla 実例：HuggingFace pipeline(task="sentiment-analysis") API 呼出し schema。
    field_values:
      tool_id: process-user
      source_protocol: OpenAI-Agents-SDK
      binding_revision: "1"
      name: process_user
      function_ref: python://users/process_user
      params_json_schema: '{"type":"object","properties":{"username":{"type":"string"}}}'
    related_node_ids: [FunctionTool, LocalRuntimeTool]
    related_relation_ids: [FunctionTool-is_a-Tool]

    source_claims: [agents-sdk-function-tool-generation]
parent_relation:
  id: FunctionTool-is_a-Tool
  predicate: is_a
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: "是 Tool 运行时绑定的 FunctionTool 子类型", en: "is a FunctionTool subtype of the Tool runtime binding", ja: "FunctionTool は Tool runtime binding の下位型である"}
  definition: {zh: "FunctionTool 是保留同一 Tool 运行时绑定身份并增加 application-function handler contract 的本地下位型。", en: "FunctionTool is a local subtype that retains the same Tool runtime-binding identity and adds its application-function handler contract.", ja: "FunctionTool は同じ Tool runtime-binding identity を保持し application-function handler contract を加えるローカル下位型である。"}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_subtype, labels: {zh: "具有工具运行时绑定子类型", en: "has runtime-binding subtype", ja: "runtime-binding subtype を持つ"}}
  conditions: []
  temporal_scope: "runtime"
  boundary_context: This is a true same-record Moonweave subtype. It retains the Tool runtime-binding identity and does not assert external SDK or protocol class inheritance.
  constraints:
    - id: function-tool-inherits-tool-identity
      severity: error
      expression_language: plain
      expression: "FunctionTool carries the required Tool fields as one runtime-binding record and must not reference a second Tool profile as its parent identity."
      explanation: {zh: "该子类型与 Tool 使用同一运行时绑定身份，不能引用第二条父工具记录。", en: "The subtype shares one runtime-binding identity with Tool and cannot reference a second parent tool record.", ja: "この下位型は Tool と一つの runtime-binding identity を共有し、2 番目の親 tool record を参照できない。"}
      source_claims: [moonweave-function-tool-taxonomy]
  examples: []
  source_claims: [moonweave-function-tool-taxonomy]
  distinct_fact_rationale: {zh: "该层级表示同一运行时绑定记录上的实际本地下位型，而非外部 SDK 类树。", en: "This hierarchy states a true local subtype on the same runtime-binding record, not an external SDK class tree.", ja: "この hierarchy は外部 SDK class tree ではなく同じ runtime-binding record 上の真のローカル下位型を表す。"}
