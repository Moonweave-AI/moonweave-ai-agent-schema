    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    version: 2025-11-25
    accessed_on: 2026-07-18
    source_type: official-specification
    relevance: Defines MCP Tool records and tools/call execution boundary.
  - id: openai-agents-sdk-tools
    title: OpenAI Agents SDK — Tools
    publisher: OpenAI
    url: https://openai.github.io/openai-agents-python/tools/
    accessed_on: 2026-07-18
    source_type: official-documentation
    relevance: Documents distinct Agents SDK tool categories and local-runtime execution.
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: design-inference
    relevance: Defines the local Callable tool runtime-binding profile and its realization association.
source_claims:
  - id: mcp-tool-call-for-tool
    source: mcp-tools-2025-11-25
    supports: MCP clients call tools with tools/call and a server returns a Tool Result.
    locator: "Calling Tools; Tool Result"
    evidence_kind: normative
    confidence: high
  - id: moonweave-callable-tool-profile
    source: moonweave-ontology-design
    supports: Tool is an immutable Moonweave local runtime-binding profile that records a source definition, executor, and binding revision without merging protocol runtime types.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
  - id: moonweave-callable-tool-taxonomy
    source: moonweave-ontology-design
    supports: Moonweave models Tool as a local runtime-binding profile that realizes, rather than inherits from, a ToolDefinition profile.
    locator: "Moonweave local profile design"
    evidence_kind: design-inference
    confidence: high
