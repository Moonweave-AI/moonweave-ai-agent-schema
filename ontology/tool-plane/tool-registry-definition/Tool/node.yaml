schema: moonweave.ai/ontology-node/v1
id: Tool
kind: concept
labels:
  zh: 可调用工具 profile
  en: Callable tool profile
  ja: 呼び出し可能ツール profile
semantics:
  short_definition:
    zh: 表示可在特定运行时被调用的工具能力的 Moonweave 兼容 profile。
    en: A Moonweave compatibility profile for a callable capability in a particular runtime.
    ja: 特定 runtime で呼び出し可能な capability を表す Moonweave compatibility profile。
  definition:
    zh: >
      Tool 是为兼容现有 ID 保留的跨运行时运行时绑定概念；展示名称为 Callable tool profile。MCP 的 Tool 是一份服务器公开的
      定义记录，OpenAI function tool 是模型可调用的函数声明，而 Agents SDK 的工具包括 hosted、function、computer、
      shell 等运行时对象。本 profile 以独立根概念的方式实现一个本地 ToolDefinition profile，不能声称它们共享同一个协议对象或执行模型。
    en: >
      Tool is a cross-runtime runtime-binding concept retained for compatibility; its display name is Callable tool
      profile. MCP Tool is a server-exposed definition record, an OpenAI function tool is a
      model-callable function declaration, and Agents SDK tools include hosted, function, computer,
      shell, and other runtime objects. As an independent root, this profile realizes one local ToolDefinition profile and cannot claim they
      share one protocol object or execution model.
    ja: >
      Tool は compatibility のために保持された cross-runtime runtime-binding concept であり、表示名は Callable tool profile である。
      MCP Tool は server-exposed definition record、OpenAI function tool は model-callable function declaration、
      Agents SDK tool は hosted、function、computer、shell などの runtime object を含む。この profile はその一つを指し、
      独立した root として一つのローカル ToolDefinition profile を実現し、それらが一つの protocol object または execution model を共有すると主張できない。
  why_needed:
    zh: 用户和本地编排器需要识别“可调用能力”，但实现选择必须保留具体运行时语义。
    en: Users and local orchestrators need to recognize callable capability while implementation choice must retain concrete runtime semantics.
    ja: user とローカル orchestrator は callable capability を認識する必要があるが、implementation choice は具体的な runtime semantics を保持しなければならない。
  includes:
    - zh: 对一个来源明确的 MCP、OpenAI 或 SDK 工具对象的引用。
      en: A reference to one provenance-bearing MCP, OpenAI, or SDK tool object.
      ja: provenance を持つ一つの MCP、OpenAI、SDK tool object への reference。
    - zh: 本地可调用性、执行器和定义引用信息。
      en: Local callable status, executor reference, and definition reference.
      ja: ローカル callable status、executor reference、definition reference。
  excludes:
    - zh: 将 MCP Tool、OpenAI function 或 SDK Tool 统一成相同 wire 类型的断言。
      en: An assertion that MCP Tool, OpenAI function, and SDK Tool are one wire type.
      ja: MCP Tool、OpenAI function、SDK Tool が一つの wire type だという主張。
    - zh: 工具调用消息与单次结果内容。
      en: A tool-call message and one result's content.
      ja: tool-call message と一回の result content。
  semantic_kind: entity
  aliases:
    - language: en
      value: callable capability profile
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      tool_ref 指向具体定义或 SDK 实例，executor_kind 说明谁执行调用。MCP 调用由服务器通过 tools/call 处理，OpenAI
      function 由应用接收模型输出后执行，Agents SDK 会按工具类别运行。统一 profile 只用于本地调度和审计，不能发送给
      任一协议作为标准 Tool payload。
    en: >
      tool_ref points to a concrete definition or SDK instance and executor_kind states who runs a
      call. An MCP server handles tools/call, an application executes an OpenAI function after
      receiving model output, and Agents SDK runs tools by category. The unified profile serves
      local orchestration and audit only and cannot be sent to any protocol as a standard Tool payload.
    ja: >
      tool_ref は具体的な definition または SDK instance を指し、executor_kind は call を実行する主体を示す。MCP server は
      tools/call を処理し、application は model output を受けて OpenAI function を実行し、Agents SDK は category ごとに
      tool を実行する。統一 profile はローカル orchestration と audit のためだけで、任意の protocol に標準 Tool payload として送れない。
  typical_input:
    - description:
        zh: MCP Tool 的本地可调用引用。
        en: A local callable reference to an MCP Tool.
        ja: MCP Tool へのローカル callable reference。
      format: |
        {"tool_ref":"mcp://files/tools/read_file","executor_kind":"mcp-server"}
      source_claims: [moonweave-callable-tool-profile]
  typical_output:
    - description:
        zh: 发送给本地编排器的可调用工具信息。
        en: Callable-tool information sent to a local orchestrator.
        ja: ローカル orchestrator に送る callable-tool information。
      format: |
        {"tool_id":"files-read-file","definition_ref":"files-read-file","executor_kind":"mcp-server"}
      source_claims: [moonweave-callable-tool-profile]
  reference_implementations:
    - name: MCP Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines server-exposed Tool records and tools/call.
    - name: OpenAI Agents SDK Tools
      url: https://openai.github.io/openai-agents-python/tools/
      description: Documents hosted, local/runtime, function, and other tool categories.
structure:
  identity_keys: [tool_id, source_protocol, binding_revision]
  fields:
    - id: binding_revision
      labels:
        zh: 运行时绑定修订
        en: Runtime-binding revision
        ja: runtime-binding revision
      definitions:
        zh: 标识此独立本地 运行时绑定修订；执行器、定义或适配映射变化必须创建新版本，而不修改旧记录。
        en: Identifies this independent local Runtime-binding revision; a change to executor, definition, or adapter mapping must create a new version rather than mutate the old record.
        ja: この独立ローカル runtime-binding revision を識別する。executor、definition、adapter mapping の変更は旧 record を mutate せず新 version を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "1"
      allowed_values: []
      source_claims: [moonweave-callable-tool-profile]
    - id: tool_id
      labels:
        zh: 本地工具标识符
        en: Local tool identifier
        ja: ローカル tool 識別子
      definitions:
        zh: 在本地运行时范围内标识可调用工具 profile。
        en: Identifies a callable-tool profile within local runtime scope.
        ja: ローカル runtime scope 内で callable-tool profile を識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: files-read-file
      allowed_values: []
      source_claims: [moonweave-callable-tool-profile]
    - id: definition_ref
      labels:
        zh: 定义引用
        en: Definition reference
        ja: definition reference
      definitions:
        zh: 指向此运行时绑定所实现的、来源明确的一个 ToolDefinition profile。
        en: Points to the one provenance-bearing ToolDefinition profile realized by this runtime binding.
        ja: この runtime binding が実現する、provenance を持つ一つの ToolDefinition profile を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: files-read-file
      allowed_values: []
      source_claims: [moonweave-callable-tool-profile]
    - id: executor_kind
      labels:
        zh: 执行器种类
        en: Executor kind
        ja: executor kind
      definitions:
        zh: 标识调用由 MCP server、应用函数或 SDK 运行时等哪个执行器处理。
        en: Identifies whether an MCP server, application function, SDK runtime, or another executor handles the call.
        ja: MCP server、application function、SDK runtime、その他の executor のどれが call を処理するかを示す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: mcp-server
      allowed_values: [mcp-server, application-function, agents-sdk-runtime, hosted-service]
      source_claims: [moonweave-callable-tool-profile]
    - id: source_protocol
      labels:
        zh: 来源协议
        en: Source protocol
        ja: source protocol
      definitions:
        zh: 标识工具的定义和调用契约所属协议或 SDK。
        en: Identifies the protocol or SDK owning tool definition and call contract.
        ja: tool definition と call contract を所有する protocol または SDK を識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: MCP
      allowed_values: [MCP, OpenAI, OpenAI-Agents-SDK]
      source_claims: [moonweave-callable-tool-profile]
  constraints:
    - id: callable-tool-requires-source-runtime
      severity: error
      expression_language: plain
      expression: A Tool runtime-binding profile must identify binding_revision, definition_ref, source_protocol, and executor_kind, realize exactly one local ToolDefinition profile, and cannot be treated as one shared protocol runtime type.
      explanation:
        zh: 可调用性依赖特定协议和执行器，不由本地别名单独保证。
        en: Callability depends on a specific protocol and executor and is not guaranteed by a local alias alone.
        ja: callability は特定の protocol と executor に依存し、ローカル alias だけでは保証されない。
      source_claims: [moonweave-callable-tool-profile]
  required_relations: [Tool-realizes-ToolDefinition]
examples:
  - id: callable-tool-positive-mcp

    labels:
      zh: MCP 可调用工具引用
      en: MCP callable-tool reference
      ja: MCP callable-tool reference

    descriptions:
      zh: Gorilla APIBench 1645 API schema；LangChain @tool/BaseTool/StructuredTool.from_function；Semantic Kernel kernel.add_plugin/@kernel_function；Instructor Pydantic response_model schema。
      en: Gorilla APIBench 1645 API schema; LangChain @tool/BaseTool/StructuredTool.from_function; Semantic Kernel kernel.add_plugin/@kernel_function; Instructor Pydantic response_model schema.
      ja: Gorilla APIBench 1645 API schema。LangChain @tool/BaseTool。Semantic Kernel kernel.add_plugin/@kernel_function。Instructor Pydantic response_model。
    field_values:
      binding_revision: "1"
      source_protocol: MCP
      executor_kind: mcp-server
    related_node_ids: [Tool, ToolDefinition]
    related_relation_ids: [Tool-realizes-ToolDefinition]

    source_claims: [moonweave-callable-tool-profile]
  - id: callable-tool-counterexample-unified-wire

    labels:
      zh: 统一 wire Tool 断言
      en: Unified wire-Tool assertion
      ja: unified wire-Tool assertion

    descriptions:
      zh: 反例：Gorilla 无 retriever hallucinate API；LangChain tool 缺 args_schema；Instructor response_model 与 OpenAI parameters 字段混用。
      en: Counterexample: Gorilla hallucinates API without retriever; LangChain tool missing args_schema; Instructor response_model mixed with OpenAI parameters fields.
      ja: 反例：Gorilla retriever なし hallucinate。LangChain args_schema 欠落。Instructor/OpenAI parameters 混同。
    field_values:
      binding_revision: "1"
      source_protocol: MCP
      executor_kind: application-function
    related_node_ids: [Tool]
    related_relation_ids: [Tool-realizes-ToolDefinition]

    source_claims: [moonweave-callable-tool-profile]
  - id: callable-tool-boundary-profile-and-invocation

    labels:
      zh: 工具 profile 与调用边界
      en: Boundary between Tool profile and invocation
      ja: Tool profile と invocation の境界

    descriptions:
      zh: Gorilla API 文档 vs LangChain tool definition vs Semantic Kernel plugin vs Instructor Pydantic 的声明形状边界。
      en: Declaration shape boundary among Gorilla API docs, LangChain tool definition, Semantic Kernel plugin, Instructor Pydantic.
      ja: Gorilla API 文档、LangChain tool definition、Semantic Kernel plugin、Instructor Pydantic の宣言形状境界。
    field_values:
      binding_revision: "1"
      tool_id: files-read-file
    related_node_ids: [Tool]
    related_relation_ids: [Tool-realizes-ToolDefinition]

    source_claims: [mcp-tool-call-for-tool]
  - id: callable-tool-instance-function

    labels:
      zh: 应用函数工具实例
      en: Application function-tool instance
      ja: application function-tool instance

    descriptions:
      zh: LangChain StructuredTool.from_function(get_weather,args_schema=WeatherInput)；Gorilla HuggingFace pipeline API schema 实例。
      en: LangChain StructuredTool.from_function(get_weather,args_schema=WeatherInput); Gorilla HuggingFace pipeline API schema instance.
      ja: LangChain StructuredTool.from_function(get_weather,args_schema=WeatherInput)。Gorilla HuggingFace pipeline API schema 実例。
    field_values:
      binding_revision: "1"
      source_protocol: OpenAI
      executor_kind: application-function
    related_node_ids: [Tool, FunctionTool]
    related_relation_ids: [Tool-realizes-ToolDefinition]

    source_claims: [moonweave-callable-tool-profile]
parent_relation: null
relations:
  - id: Tool-realizes-ToolDefinition
    predicate: realizes
    target: concept:ToolDefinition
    endpoint_order: runtime-binding-to-definition
    direction: source-to-target
    relation_kind: association
    labels:
      zh: 实现可调用工具定义 profile
      en: realizes callable-tool definition profile
      ja: callable-tool definition profile を実現する
    definition:
      zh: Tool 运行时绑定实现一个来源明确的 ToolDefinition profile，并补充本地执行器信息；它不是该定义记录的子类型。
      en: A Tool runtime binding realizes one provenance-bearing ToolDefinition profile and adds local executor information; it is not a subtype of that definition record.
      ja: Tool runtime binding は一つの provenance を持つ ToolDefinition profile を実現し、ローカル executor information を加える。この binding は definition record の subtype ではない。
    cardinality:
      source:
        min: 1
        max: 1
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_realized_by
      labels:
        zh: 被运行时工具绑定实现
        en: is realized by runtime tool binding
        ja: runtime tool binding により実現される
    conditions: []
    temporal_scope: versioned
    boundary_context: This local realization association records a binding between a local runtime profile and a definition profile; it does not equate MCP Tool records, OpenAI function declarations, and SDK runtime objects.
    constraints:
      - id: callable-tool-realization-is-local
        severity: error
        expression_language: plain
        expression: Tool realizes a local ToolDefinition profile and must identify its source runtime; the association must not be asserted as shared protocol-native type inheritance.
        explanation:
          zh: 跨运行时共同名称不建立共同 wire 类型，运行时绑定也不继承协议定义记录。
          en: A common cross-runtime name establishes neither a common wire type nor inheritance from a protocol definition record.
          ja: cross-runtime の共通名は共通 wire type も protocol definition record からの inheritance も確立しない。
        source_claims: [moonweave-callable-tool-taxonomy]
    examples: []
    source_claims: [moonweave-callable-tool-taxonomy]
    distinct_fact_rationale:
      zh: 该边记录本地运行时绑定与定义 profile 的实现事实，不重写各来源工具对象。
      en: This edge records the realization fact between a local runtime binding and a definition profile without rewriting source tool objects.
      ja: この edge は source tool object を書き換えず、ローカル runtime binding と definition profile の実現 fact を記録する。
sources:
  - id: mcp-tools-2025-11-25
