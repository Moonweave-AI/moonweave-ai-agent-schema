    source: openai-agents-sdk-tools
    supports: ComputerTool requires an application-provided Computer or AsyncComputer implementation for GUI or browser automation, and the SDK maps that local harness onto the OpenAI Responses API computer surface.
    locator: "ComputerTool and the Responses computer tool"
