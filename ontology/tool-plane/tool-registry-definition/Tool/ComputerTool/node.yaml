schema: moonweave.ai/ontology-node/v1
id: ComputerTool
kind: concept
labels:
  zh: Agents SDK ComputerTool
  en: Agents SDK ComputerTool
  ja: Agents SDK ComputerTool
semantics:
  short_definition:
    zh: 由应用提供 Computer 或 AsyncComputer 实现，并映射到 OpenAI Responses computer surface 的 Agents SDK 工具。
    en: An Agents SDK tool backed by an application-provided Computer or AsyncComputer implementation and mapped to the OpenAI Responses computer surface.
    ja: application-provided Computer または AsyncComputer implementation に支えられ OpenAI Responses computer surface に対応付けられる Agents SDK tool。
  definition:
    zh: >
      ComputerTool 是 OpenAI Agents SDK 的官方工具类型和本地 harness。应用必须提供 Computer 或
      AsyncComputer 实现来完成 GUI 或浏览器自动化；SDK 将该本地 harness 映射到 Responses API
      computer surface。它不是远程 MCP Tool，不是由模型直接执行的动作，也不能仅因模型选择
      computer tool 而绕过本地实现或安全控制。
    en: >
      ComputerTool is an official OpenAI Agents SDK tool type and local harness. An application must
      provide a Computer or AsyncComputer implementation to perform GUI or browser automation; the SDK
      maps that local harness onto the Responses API computer surface. It is not a remote MCP Tool,
      not an action executed directly by the model, and cannot bypass local implementation or security
      controls merely because the model selects the computer tool.
    ja: >
      ComputerTool は公式 OpenAI Agents SDK tool type であり local harness である。GUI または browser
      automation を行うには application が Computer または AsyncComputer implementation を提供し、
      SDK はその local harness を Responses API computer surface に対応付ける。これは remote MCP Tool
      でも model が直接実行する action でもなく、model が computer tool を選んだだけで local
      implementation や security control を迂回できない。
  why_needed:
    zh: 工具目录可将浏览器或 GUI 操作绑定到负责实现和审计的本地 harness。
    en: A tool catalog can bind browser or GUI operations to the local harness responsible for implementation and audit.
    ja: tool catalog は browser または GUI operation を implementation と audit の責任を負う local harness に結び付けられる。
  includes:
    - zh: Computer 或 AsyncComputer 实现引用、目标环境和 Responses computer 选择器。
      en: A Computer or AsyncComputer implementation reference, target environment, and Responses computer selector.
      ja: Computer または AsyncComputer implementation reference、target environment、Responses computer selector。
    - zh: 由本地 harness 依序执行的计算机动作和截图输出边界。
      en: Computer-action and screenshot-output boundaries executed in order by a local harness.
      ja: local harness が順に実行する computer-action と screenshot-output boundary。
  excludes:
    - zh: MCP tools/call 请求、任意网页 API 调用或无需本地实现的纯模型操作。
      en: An MCP tools/call request, an arbitrary web API call, or a pure model action without a local implementation.
      ja: MCP tools/call request、任意の web API call、または local implementation を持たない pure model action。
    - zh: 对浏览器权限、网站授权或用户批准的隐含授予。
      en: An implicit grant of browser permission, website authorization, or user approval.
      ja: browser permission、website authorization、または user approval の暗黙の grant。
  semantic_kind: official-sdk-type
  aliases:
    - language: en
      value: Responses computer harness
      alias_kind: descriptive
engineering:
  explanation:
    zh: >
      computer_implementation_ref 指向应用实现的 Computer 或 AsyncComputer，environment 记录该实现的
      本地运行环境。responses_tool_selector 描述 SDK 映射到的 Responses computer surface；
      action 由本地 harness 执行，截图等输出再返回给运行时。该 profile 不保存站点凭据或批准结果。
    en: >
      computer_implementation_ref points to the application implementation of Computer or AsyncComputer,
      and environment records its local runtime environment. responses_tool_selector describes the
      Responses computer surface to which the SDK maps; the local harness executes actions and returns
      outputs such as screenshots to runtime. This profile stores neither site credentials nor approval results.
    ja: >
      computer_implementation_ref は application が実装する Computer または AsyncComputer を指し、
      environment はそのローカル runtime environment を記録する。responses_tool_selector は SDK が
      map する Responses computer surface を示す。local harness は action を実行し screenshot などの
      output を runtime に返す。この profile は site credential や approval result を保存しない。
  typical_input:
    - description:
        zh: 由本地浏览器 harness 支撑的 ComputerTool 配置。
        en: A ComputerTool configuration backed by a local browser harness.
        ja: ローカル browser harness に支えられた ComputerTool configuration。
      format: |
        {"computer_implementation_ref":"python://automation/PlaywrightComputer","computer_interface_kind":"AsyncComputer","environment":"browser","responses_tool_selector":"computer"}
      source_claims: [agents-sdk-computer-tool-local-harness]
  typical_output:
    - description:
        zh: 本地 harness 处理后返回的计算机输出引用。
        en: A computer-output reference returned after local-harness handling.
        ja: local-harness handling 後に返される computer-output reference。
      format: |
        {"computer_call_ref":"resp-call-42","output_kind":"screenshot","executor_ref":"python://automation/PlaywrightComputer"}
      source_claims: [agents-sdk-computer-tool-local-harness]
  reference_implementations:
    - name: OpenAI Agents SDK ComputerTool
      url: https://openai.github.io/openai-agents-python/tools/
      description: Documents the local Computer or AsyncComputer harness and its mapping to the Responses API computer surface.
structure:
  identity_keys: [tool_id, source_protocol, binding_revision, computer_implementation_ref, environment]
  fields:
    - id: computer_implementation_ref
      labels:
        zh: 计算机实现引用
        en: Computer implementation reference
        ja: computer implementation reference
      definitions:
        zh: 指向应用提供的 Computer 或 AsyncComputer 实现。
        en: Points to the application-provided Computer or AsyncComputer implementation.
        ja: application-provided Computer または AsyncComputer implementation を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: python://automation/PlaywrightComputer
      allowed_values: []
      source_claims: [agents-sdk-computer-tool-local-harness]
    - id: computer_interface_kind
      labels:
        zh: 计算机接口种类
        en: Computer interface kind
        ja: computer interface kind
      definitions:
        zh: 标识该实现遵循 Computer 还是 AsyncComputer 接口。
        en: Identifies whether the implementation follows the Computer or AsyncComputer interface.
        ja: implementation が Computer interface と AsyncComputer interface のどちらに従うかを識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: AsyncComputer
      allowed_values: [Computer, AsyncComputer]
      source_claims: [agents-sdk-computer-tool-local-harness]
    - id: environment
      labels:
        zh: 目标环境
        en: Target environment
        ja: target environment
      definitions:
        zh: 说明本地计算机实现控制的环境，例如 browser。
        en: States the environment controlled by the local computer implementation, such as browser.
        ja: browser など、ローカル computer implementation が制御する environment を示す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: browser
      allowed_values: [browser, desktop, other]
      source_claims: [agents-sdk-computer-tool-local-harness]
    - id: responses_tool_selector
      labels:
        zh: Responses 工具选择器
        en: Responses tool selector
        ja: Responses tool selector
      definitions:
        zh: 记录 SDK 在实际 Responses 请求中选择的计算机工具 surface。
        en: Records the computer tool surface selected by the SDK on the actual Responses request.
        ja: 実際の Responses request で SDK が選ぶ computer tool surface を記録する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: computer
      allowed_values: [computer, computer_use, computer_use_preview]
      source_claims: [agents-sdk-computer-tool-local-harness]
    - id: model_ref
      labels:
        zh: 模型引用
        en: Model reference
        ja: model reference
      definitions:
        zh: 可选地记录影响 SDK 计算机工具载荷选择的实际模型引用。
        en: Optionally records the effective model reference that influences SDK computer-tool payload selection.
        ja: SDK computer-tool payload selection に影響する effective model reference を任意で記録する。
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: gpt-5.5
      allowed_values: []
      source_claims: [agents-sdk-computer-tool-local-harness]
    - id: binding_revision
      labels:
        zh: 运行时绑定修订
        en: Runtime-binding revision
        ja: runtime-binding revision
      definitions:
        zh: 标识此独立本地 运行时绑定修订；执行器、定义或适配映射变化必须创建新版本，而不修改旧记录。
        en: Identifies this independent local Runtime-binding revision; a change to executor, definition, or adapter mapping must create a new version rather than mutate the old record.
        ja: この独立ローカル runtime-binding revision を識別する。executor、definition、adapter mapping の変更は旧 record を mutate せず新 version を作成しなければならない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: "1"
      allowed_values: []
      source_claims: [moonweave-computer-tool-taxonomy]
    - id: tool_id
      labels:
        zh: 本地工具标识符
        en: Local tool identifier
        ja: ローカル tool 識別子
      definitions:
        zh: 在本地运行时范围内标识可调用工具 profile。
        en: Identifies a callable-tool profile within local runtime scope.
        ja: ローカル runtime scope 内で callable-tool profile を識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: files-read-file
      allowed_values: []
      source_claims: [moonweave-computer-tool-taxonomy]
    - id: definition_ref
      labels:
        zh: 定义引用
        en: Definition reference
        ja: definition reference
      definitions:
        zh: 指向此运行时绑定所实现的、来源明确的一个 ToolDefinition profile。
        en: Points to the one provenance-bearing ToolDefinition profile realized by this runtime binding.
        ja: この runtime binding が実現する、provenance を持つ一つの ToolDefinition profile を指す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: files-read-file
      allowed_values: []
      source_claims: [moonweave-computer-tool-taxonomy]
    - id: executor_kind
      labels:
        zh: 执行器种类
        en: Executor kind
        ja: executor kind
      definitions:
        zh: 标识调用由 MCP server、应用函数或 SDK 运行时等哪个执行器处理。
        en: Identifies whether an MCP server, application function, SDK runtime, or another executor handles the call.
        ja: MCP server、application function、SDK runtime、その他の executor のどれが call を処理するかを示す。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: mcp-server
      allowed_values: [mcp-server, application-function, agents-sdk-runtime, hosted-service]
      source_claims: [moonweave-computer-tool-taxonomy]
    - id: source_protocol
      labels:
        zh: 来源协议
        en: Source protocol
        ja: source protocol
      definitions:
        zh: 标识工具的定义和调用契约所属协议或 SDK。
        en: Identifies the protocol or SDK owning tool definition and call contract.
        ja: tool definition と call contract を所有する protocol または SDK を識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: MCP
      allowed_values: [MCP, OpenAI, OpenAI-Agents-SDK]
      source_claims: [moonweave-computer-tool-taxonomy]
  constraints:
    - id: computer-tool-needs-local-harness
      severity: error
      expression_language: plain
      expression: ComputerTool must identify a Computer or AsyncComputer implementation and target environment; model selection cannot replace the local harness or its security controls.
      explanation:
        zh: SDK 的 Responses 映射依赖本地计算机实现，模型选择不是浏览器操作授权。
        en: SDK mapping to Responses depends on a local computer implementation, and model selection is not browser-operation authorization.
        ja: SDK の Responses mapping は local computer implementation に依存し、model selection は browser-operation authorization ではない。
      source_claims: [agents-sdk-computer-tool-local-harness]
    - id: computer-tool-inherits-parent-required-fields
      severity: error
      expression_language: plain
      expression: "All inherited required Tool fields are fields of this same record; the is_a subtype does not establish or reference a second Tool record."
      explanation: {zh: "所有继承的 Tool 必需字段属于同一记录，该 is_a 子类型不建立或引用第二条 Tool 记录。", en: "Inherited required fields stay on the same record rather than creating a second parent record.", ja: "継承された必須 Tool フィールドは同じレコードに属し、この is_a 下位型は 2 番目の親レコードを作成または参照しない。"}
      source_claims: [moonweave-computer-tool-taxonomy]
  required_relations: []
examples:
  - id: computer-tool-positive-browser-harness

    labels:
      zh: 浏览器异步计算机 harness
      en: Browser async-computer harness
      ja: browser async-computer harness

    descriptions:
      zh: "Claude Computer Use {type:\"tool_use\",name:\"computer\",input:{action:\"click\",coordinate:[100,200]}} 或 action:\"type\" 键盘输入；OpenAI Assistants tools:[{type:\"code_interpreter\"}] 沙箱 Python 执行。"
      en: "Claude Computer Use {type:\"tool_use\",name:\"computer\",input:{action:\"click\",coordinate:[100,200]}} or action:\"type\" keyboard; OpenAI Assistants tools:[{type:\"code_interpreter\"}] sandbox Python execution."
      ja: "Claude Computer Use action:\"click\"/\"type\"。OpenAI Assistants tools:[{type:\"code_interpreter\"}] sandbox Python 実行。"
    field_values:
      tool_id: browser-computer
      source_protocol: OpenAI-Agents-SDK
      binding_revision: "1"
      computer_implementation_ref: python://automation/PlaywrightComputer
      computer_interface_kind: AsyncComputer
      environment: browser
    related_node_ids: [ComputerTool, LocalRuntimeTool]
    related_relation_ids: [ComputerTool-is_a-Tool]

    source_claims: [agents-sdk-computer-tool-local-harness]
  - id: computer-tool-counterexample-no-implementation

    labels:
      zh: 没有本地实现的计算机工具
      en: Computer tool without local implementation
      ja: local implementation を持たない computer tool

    descriptions:
      zh: 反例：Computer Use click coordinate 超出 display_width_px:1024 边界；Code Interpreter 执行 os.system 逃逸沙箱（应被阻止）。
      en: Counterexample: Computer Use click coordinate exceeds display_width_px:1024; Code Interpreter os.system escapes sandbox (should be blocked).
      ja: 反例：Computer Use click coordinate が display 境界超過。Code Interpreter os.system sandbox 逃逸。
    field_values:
      responses_tool_selector: computer
      environment: browser
    related_node_ids: [ComputerTool, LocalRuntimeTool]
    related_relation_ids: [ComputerTool-is_a-Tool]

    source_claims: [agents-sdk-computer-tool-local-harness]
  - id: computer-tool-boundary-selector-and-action

    labels:
      zh: 工具选择器与计算机动作边界
      en: Boundary between tool selector and computer action
      ja: tool selector と computer action の境界

    descriptions:
      zh: Claude Browser/Computer Use GUI 交互 vs OpenAI Code Interpreter 代码沙箱 vs 本地 ShellCommand 进程执行的权限边界。
      en: Permission boundary among Claude Browser/Computer Use GUI interaction, OpenAI Code Interpreter code sandbox, local ShellCommand process execution.
      ja: Claude Computer Use GUI 交互、OpenAI Code Interpreter コード sandbox、ローカル ShellCommand プロセス実行の権限境界。
    field_values:
      responses_tool_selector: computer
      computer_interface_kind: AsyncComputer
    related_node_ids: [ComputerTool, LocalRuntimeTool]
    related_relation_ids: [ComputerTool-is_a-Tool]

    source_claims: [agents-sdk-computer-tool-local-harness]
  - id: computer-tool-instance-responses-browser

    labels:
      zh: Responses 浏览器自动化实例
      en: Responses browser-automation instance
      ja: Responses browser-automation instance

    descriptions:
      zh: Code Interpreter 实例：import pandas as pd; df=pd.read_csv('data.csv'); df.describe() 返回统计摘要；Computer Use 实例：action:"screenshot" 捕获 1024x768 屏幕。
      en: Code Interpreter instance: import pandas; df.describe() returns stats; Computer Use instance: action:"screenshot" captures 1024x768 screen.
      ja: Code Interpreter 実例：pandas df.describe() 統計摘要。Computer Use 実例：action:"screenshot" 1024x768 画面キャプチャ。
    field_values:
      tool_id: browser-computer
      source_protocol: OpenAI-Agents-SDK
      binding_revision: "1"
      model_ref: gpt-5.5
      responses_tool_selector: computer
      computer_implementation_ref: python://automation/PlaywrightComputer
      environment: browser
    related_node_ids: [ComputerTool, LocalRuntimeTool]
    related_relation_ids: [ComputerTool-is_a-Tool]

    source_claims: [agents-sdk-computer-tool-local-harness]
parent_relation:
  id: ComputerTool-is_a-Tool
  predicate: is_a
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: "是 Tool 运行时绑定的 ComputerTool 子类型", en: "is a ComputerTool subtype of the Tool runtime binding", ja: "ComputerTool は Tool runtime binding の下位型である"}
  definition: {zh: "ComputerTool 是保留同一 Tool 运行时绑定身份并增加 computer-harness contract 的本地下位型。", en: "ComputerTool is a local subtype that retains the same Tool runtime-binding identity and adds its computer-harness contract.", ja: "ComputerTool は同じ Tool runtime-binding identity を保持し computer-harness contract を加えるローカル下位型である。"}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_subtype, labels: {zh: "具有工具运行时绑定子类型", en: "has runtime-binding subtype", ja: "runtime-binding subtype を持つ"}}
  conditions: []
  temporal_scope: "runtime"
  boundary_context: This is a true same-record Moonweave subtype. It retains the Tool runtime-binding identity and does not assert external SDK or protocol class inheritance.
  constraints:
    - id: computer-tool-inherits-tool-identity
      severity: error
      expression_language: plain
      expression: "ComputerTool carries the required Tool fields as one runtime-binding record and must not reference a second Tool profile as its parent identity."
      explanation: {zh: "该子类型与 Tool 使用同一运行时绑定身份，不能引用第二条父工具记录。", en: "The subtype shares one runtime-binding identity with Tool and cannot reference a second parent tool record.", ja: "この下位型は Tool と一つの runtime-binding identity を共有し、2 番目の親 tool record を参照できない。"}
      source_claims: [moonweave-computer-tool-taxonomy]
  examples: []
  source_claims: [moonweave-computer-tool-taxonomy]
  distinct_fact_rationale: {zh: "该层级表示同一运行时绑定记录上的实际本地下位型，而非外部 SDK 类树。", en: "This hierarchy states a true local subtype on the same runtime-binding record, not an external SDK class tree.", ja: "この hierarchy は外部 SDK class tree ではなく同じ runtime-binding record 上の真のローカル下位型を表す。"}
relations: []
