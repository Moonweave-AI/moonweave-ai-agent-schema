schema: moonweave.ai/ontology-node/v1
id: InvocationExecutionRequest
kind: concept
labels: {zh: 调用执行请求记录, en: Invocation execution request record, ja: 呼出し実行要求記録}
semantics:
  short_definition: {zh: 作为一次 Invocation 组成部分的本地派发意图记录, en: A local dispatch-intent record that is part of one Invocation, ja: 一つの Invocation の一部となるローカル派発意図記録}
  definition:
    zh: >-
      InvocationExecutionRequest 是请求主机适配器派发一个 Invocation 的 Moonweave 本地固定方面请求实体。它不是原生 MCP JSON-RPC 封包、OpenAI Responses item 或 A2A SendMessageRequest；其唯一作用是在来源特定请求发出前关联、策略门控并审计派发意图。
    en: >
      An InvocationExecutionRequest is a Moonweave local, fixed-aspect request Entity that asks a host adapter to
      dispatch one Invocation. It is not a native MCP JSON-RPC envelope, an OpenAI Responses item,
      or an A2A SendMessageRequest. Its sole purpose is correlation, policy gating, and audit of
      dispatch intent before the source-specific request is emitted.
    ja: >-
      InvocationExecutionRequest は host adapter に一つの Invocation を配信するよう求める Moonweave のローカル固定側面 request Entity である。ネイティブ MCP JSON-RPC envelope、OpenAI Responses item、A2A SendMessageRequest ではない。source-specific request が発行される前に、配信意図を相関、policy gate、監査することだけを目的とする。
  why_needed:
    zh: >-
      原生表面具有不同的请求契约和审批流。本地请求实体让 Invocation 使用稳定输入记录，同时将派发意图与原生请求、产生的尝试、结果、错误和效果区分开。
    en: >
      Native surfaces have different request contracts and approval flows. A local request Entity
      lets an Invocation use a stable input record while distinguishing dispatch intent from the
      native request, resulting attempt, result, error, and effect.
    ja: >-
      ネイティブ surface には異なる request contract と approval flow がある。ローカル request Entity により Invocation は安定した input record を使用でき、配信意図を native request、結果の attempt、result、error、effect から分離できる。
  includes:
    - {zh: 本地请求标识、调用引用、目标表面、原生请求引用和审批状态, en: "Local request ID, invocation reference, target surface, native-request reference, and approval state", ja: ローカル要求 ID、呼出し参照、対象表面、ネイティブ要求参照、承認状態}
  excludes:
    - {zh: MCP tools/call JSON-RPC 对象, en: An MCP tools/call JSON-RPC object, ja: MCP tools/call JSON-RPC オブジェクト}
    - {zh: OpenAI function_call 或 A2A SendMessage 对象, en: An OpenAI function_call or A2A SendMessage object, ja: OpenAI function_call または A2A SendMessage オブジェクト}
  semantic_kind: entity
  aliases:
    - {language: en, value: local dispatch request, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      适配器在发出来源特定请求之前或期间创建该记录。对 MCP，该请求可以是 JSON-RPC tools/call；该记录只保存对封包的引用而非改名字段的第二副本。remote-MCP 或 A2A 适配器使用自己的原生契约，仍只由此本地组成部分关联。
    en: >
      An adapter creates this record before or while it emits a source-specific request. For MCP,
      that request can be {"jsonrpc":"2.0","id":2,"method":"tools/call",
      "params":{"name":"get_weather","arguments":{"location":"New York"}}}. The record holds a
      reference to that envelope, not a second copy with renamed fields. A remote-MCP or A2A adapter
      uses its own native contract and is still only correlated by this local component.
    ja: >-
      adapter は source-specific request を発行する前または発行中にこの記録を作る。MCP では request は JSON-RPC tools/call になり得る。この記録は envelope の参照だけを保持し、改名した field の複製を作らない。remote-MCP または A2A adapter は独自の native contract を使い、依然としてこのローカル component により相関される。
  typical_input:
    - description: Native MCP tools/call request referenced by a local dispatch intent.
      format: '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"get_weather","arguments":{"location":"New York"}}}'
      source_claims: [mcp-tools-call]
  typical_output:
    - description: Local dispatch-intent record.
      format: '{"local_execution_request_id":"dispatch-42","local_invocation_ref":"invocation-42","local_dispatch_surface":"mcp_jsonrpc","local_native_request_ref":"mcp-session-42#id-2","local_approval_state":"approved"}'
      source_claims: [moonweave-execution-request]
  reference_implementations:
    - name: Model Context Protocol Tools specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines native tools/call request format.
    - name: OpenAI API MCP and Connectors guide
      url: https://developers.openai.com/api/docs/guides/tools-connectors-mcp
      description: Defines remote-MCP calling and approvals.
structure:
  identity_keys: [local_execution_request_id]
  fields:
    - id: local_execution_request_id
      labels: {zh: 本地执行请求标识, en: Local execution-request ID, ja: ローカル実行要求 ID}
      definitions: {zh: 主机分配给派发意图的标识, en: Identifier assigned by the host to the dispatch intent, ja: 派発送意図にホストが割り当てる識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dispatch-42
      allowed_values: []
      source_claims: [moonweave-execution-request]
    - id: local_invocation_ref
      labels: {zh: 调用引用, en: Invocation reference, ja: Invocation 参照}
      definitions: {zh: 此派发意图所属的 Invocation, en: Invocation to which this dispatch intent belongs, ja: この派発送意図が属する Invocation}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: invocation-42
      allowed_values: []
      source_claims: [moonweave-execution-request]
    - id: local_dispatch_surface
      labels: {zh: 本地派发表面, en: Local dispatch surface, ja: ローカル派発表面}
      definitions: {zh: 将接收原生请求的协议或 API 表面，不是该表面的 type 字段, en: Protocol or API surface that will receive the native request and not that surface's type field, ja: ネイティブ要求を受けるプロトコルまたは API 表面でありその type 項目ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp_jsonrpc
      allowed_values: [mcp_jsonrpc, openai_responses, openai_remote_mcp, a2a]
      source_claims: [mcp-tools-call, openai-function-call, openai-remote-mcp-call, a2a-send-message]
    - id: local_native_request_ref
      labels: {zh: 原生请求引用, en: Native request reference, ja: ネイティブ要求参照}
      definitions: {zh: 指向保留的来源特定请求对象或 item 的可审计引用, en: Auditable reference to a retained source-specific request object or item, ja: 保持されたソース固有要求オブジェクトまたは item への監査可能参照}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: mcp-session-42#id-2
      allowed_values: []
      source_claims: [moonweave-execution-request]
    - id: local_approval_state
      labels: {zh: 本地审批状态, en: Local approval state, ja: ローカル承認状態}
      definitions: {zh: 主机对派发意图的局部审批观察，不替代远端协议状态, en: Host-local approval observation for dispatch intent and not a replacement for remote protocol state, ja: 派発送意図に対するホストローカル承認観測でありリモートプロトコル状態の置換ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: approved
      allowed_values: [not_required, pending, approved, denied]
      source_claims: [mcp-tools-call, openai-remote-mcp-call, moonweave-execution-request]
    - id: local_requested_at
      labels: {zh: 本地请求时间, en: Local requested-at time, ja: ローカル要求時刻}
      definitions: {zh: 主机记录派发意图的时间戳, en: Host-recorded timestamp for the dispatch intent, ja: 派発送意図のホスト記録時刻}
      datatype: date-time
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: "2026-07-19T09:00:00Z"
      allowed_values: []
      source_claims: [moonweave-execution-request]
  constraints:
    - id: execution-request-is-local-correlation
      severity: error
      expression_language: plain
      expression: local_native_request_ref, when present, points to a retained native object whose schema remains owned by local_dispatch_surface.
      explanation: {zh: 若存在 local_native_request_ref，必须指向 schema 仍归 local_dispatch_surface 所有的原生对象, en: "When present, local_native_request_ref points to a retained native object whose schema remains owned by local_dispatch_surface", ja: local_native_request_ref がある場合は schema が local_dispatch_surface に属したままの保持済みネイティブオブジェクトを指す}
      source_claims: [moonweave-execution-request]
    - id: execution-request-precedes-attempt
      severity: error
      expression_language: plain
      expression: An approved or not_required local request may lead to an InvocationAttempt; a denied request must not claim a successful attempt caused by this request.
      explanation: {zh: approved 或 not_required 请求可引发 InvocationAttempt；denied 请求不得声称引发成功尝试, en: An approved or not_required request may lead to an InvocationAttempt; a denied request cannot claim a successful attempt caused by it, ja: approved または not_required の要求は InvocationAttempt に至り得るが denied 要求はそれによる成功試行を主張できない}
      source_claims: [moonweave-execution-request]
  required_relations: [InvocationExecutionRequest-was_used_by-Invocation]
examples:
  - id: execution-request-positive-mcp

    labels: {zh: MCP 工具派发意图, en: MCP tool dispatch intent, ja: MCP ツール派発送意図}

    descriptions:
      zh: ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]；Anthropic content:[{type:"tool_use",id:"toolu_01",name:"get_weather",input:{location:"Paris"}}]；Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。
      en: ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]; Anthropic content:[{type:"tool_use",id:"toolu_01",name:"get_weather",input:{location:"Paris"}}]; Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}}).
      ja: ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]。Anthropic tool_use。Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。
    field_values: {local_execution_request_id: dispatch-42, local_invocation_ref: invocation-42, local_dispatch_surface: mcp_jsonrpc, local_native_request_ref: mcp-session-42#id-2, local_approval_state: approved}
    related_node_ids: [InvocationExecutionRequest, Invocation, ToolCall]
    related_relation_ids: [InvocationExecutionRequest-was_used_by-Invocation]

    source_claims: [mcp-tools-call, moonweave-execution-request]
  - id: execution-request-counterexample-native-envelope

    labels: {zh: 把本地记录冒充 JSON-RPC, en: Local record masquerading as JSON-RPC, ja: JSON-RPC を装うローカル記録}

    descriptions:
      zh: 反例：ReAct Action 无对应 Observation 就继续推理；Anthropic tool_use 缺少配对 tool_result(tool_use_id)；Vercel AI SDK execute 抛错未捕获。
      en: Counterexample: ReAct continues reasoning without Observation for Action; Anthropic tool_use missing paired tool_result(tool_use_id); Vercel AI SDK execute error uncaught.
      ja: 反例：ReAct Action に Observation なしで reasoning 継続。Anthropic tool_use に tool_result ペア欠落。Vercel AI SDK execute エラー未捕捉。
    field_values: {local_execution_request_id: dispatch-bad, local_invocation_ref: invocation-43, local_dispatch_surface: mcp_jsonrpc, local_approval_state: approved}
    related_node_ids: [InvocationExecutionRequest]
    related_relation_ids: [InvocationExecutionRequest-was_used_by-Invocation]

    source_claims: [mcp-tools-call, moonweave-execution-request]
  - id: execution-request-boundary-remote-mcp-approval

    labels: {zh: 远程 MCP 审批边界, en: Remote-MCP approval boundary, ja: リモート MCP 承認境界}

    descriptions:
      zh: ReAct 文本 Action 标记 vs Anthropic structured tool_use vs Vercel AI SDK Zod schema tool 的 wire 契约边界；本地 Invocation 活动非原生封包。
      en: Wire contract boundary among ReAct text Action markers, Anthropic structured tool_use, Vercel AI SDK Zod schema tools; local Invocation activity is not native envelope.
      ja: ReAct テキスト Action marker、Anthropic structured tool_use、Vercel AI SDK Zod schema tool の wire 契約境界。ローカル Invocation 活動はネイティブ envelope ではない。
    field_values: {local_execution_request_id: dispatch-remote-1, local_invocation_ref: invocation-remote-1, local_dispatch_surface: openai_remote_mcp, local_native_request_ref: response-42/output/approval-1, local_approval_state: pending}
    related_node_ids: [InvocationExecutionRequest, ToolCall]
    related_relation_ids: [InvocationExecutionRequest-was_used_by-Invocation]

    source_claims: [openai-remote-mcp-call, moonweave-execution-request]
  - id: execution-request-instance-a2a

    labels: {zh: 远程代理请求实例, en: Remote-agent request instance, ja: リモートエージェント要求実例}

    descriptions:
      zh: ReAct HotpotQA 实例：Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup[Arthur's Magazine]→Finish[1850]；Anthropic tool_use_id=toolu_01A09q90qw90 配对 tool_result。
      en: ReAct HotpotQA instance: Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup→Finish[1850]; Anthropic tool_use_id=toolu_01A09q90qw90 paired with tool_result.
      ja: ReAct HotpotQA 実例：Thought→Action: Search→Observation→Lookup→Finish[1850]。Anthropic tool_use_id=toolu_01A09q90qw90 が tool_result とペア。
    field_values: {local_execution_request_id: dispatch-a2a-1, local_invocation_ref: invocation-a2a-1, local_dispatch_surface: a2a, local_native_request_ref: a2a-http-1/message-send, local_approval_state: not_required}
    related_node_ids: [InvocationExecutionRequest, AgentAsToolInvocation]
    related_relation_ids: [InvocationExecutionRequest-was_used_by-Invocation]

    source_claims: [a2a-send-message, moonweave-execution-request]
parent_relation: null
relations:
  - id: InvocationExecutionRequest-was_used_by-Invocation
    predicate: was_used_by
    target: concept:Invocation
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 被调用使用, en: was used by invocation, ja: Invocation により使用された}
    definitions: {zh: 当 Invocation 依据本地派发意图选择、审批或提交一次来源特定请求时，该请求实体被该 Invocation 使用, en: "The request Entity is used by an Invocation when the invocation selects, approves, or submits a source-specific request from that local dispatch intent", ja: Invocation がローカル派発送意図からソース固有要求を選択、承認、送信するとき要求 Entity はその Invocation により使用される}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: uses, labels: {zh: 使用执行请求, en: uses execution request, ja: 実行要求を使用する}}
    conditions:
      - id: execution-request-use-condition
        severity: error
        expression_language: plain
        expression: Assert only when local_invocation_ref identifies the target Invocation and dispatch evidence shows the request was evaluated or submitted by it.
        explanation: {zh: 尚未关联调用的草稿不构成使用, en: A draft that is not associated with an invocation does not establish use, ja: Invocation に関連付けられていない下書きは使用を確立しない}
        source_claims: [prov-entity-activity, moonweave-execution-request]
    temporal_scope: dispatch
    boundary_context: This provenance edge links a request Entity to activity use and does not turn any native API request into a Moonweave subtype.
    constraints: []
    examples: []
    source_claims: [prov-entity-activity, moonweave-execution-request]
    distinct_fact_rationale: A request record is an input Entity used by an activity, not a compositional child of that activity.
    layout_role: cross-link
