schema: moonweave.ai/ontology-node/v1
id: ExecutionSpecification
kind: concept
labels:
  zh: 执行规格
  en: Execution specification
  ja: 実行仕様
semantics:
  short_definition:
    zh: 为本地执行器声明超时、重试、并发和授权边界的 Moonweave 配置记录。
    en: A Moonweave configuration record declaring timeout, retry, concurrency, and authorization boundaries for a local executor.
    ja: ローカル実行器のタイムアウト、再試行、並行性、認可境界を宣言する Moonweave 設定記録。
  definition:
    zh: >-
      ExecutionSpecification 是主机在运行调用之前或期间使用的本地配置工件。它可设定超时、重试、并发限制及控制执行的主机策略；它不是 MCP Tool 定义、MCP tools/call 请求、OpenAI Responses tools 参数或 A2A SendMessageConfiguration，协议特定设置仍保留在其来源载荷中。
    en: >
      An ExecutionSpecification is a local configuration artifact used before or while a host runs
      an invocation. It may set timeout, retry and concurrency limits and name the host policy that
      controls execution. It is not an MCP Tool definition, an MCP tools/call request, an OpenAI
      Responses tools parameter, or an A2A SendMessageConfiguration. Protocol-specific settings
      remain in their source payloads and are only referenced by this local record.
    ja: >-
      ExecutionSpecification はホストが呼び出しを実行する前または実行中に使うローカル設定 artifact である。タイムアウト、再試行、並行性の制限と実行を制御するホスト方針を記録できるが、MCP Tool 定義、MCP tools/call 要求、OpenAI Responses tools parameter、A2A SendMessageConfiguration ではない。プロトコル固有設定は元の payload に残る。
  why_needed:
    zh: >-
      不同协议调用需要可复现的执行限制和策略出处。将配置与调用发生本身分开，可防止 retry_limit 等本地字段被错误地公布为服务器支持的 MCP、Responses 或 A2A 字段。
    en: >
      Hosts need reproducible execution limits and policy provenance across calls that use different
      protocols. Separating configuration from the call occurrence prevents configuration fields such
      as retry_limit from being falsely exposed as server-supported MCP, Responses, or A2A fields.
    ja: >-
      異なるプロトコルを使う呼び出しには再現可能な実行制限と方針の出所が必要である。設定を呼び出しの発生から分離することで、retry_limit などのローカル項目をサーバー対応の MCP、Responses、A2A 項目として誤って公開しない。
  includes:
    - {zh: 本地超时、重试和并发限制, en: "Local timeout, retry, and concurrency limits", ja: ローカルのタイムアウト、再試行、並行性制限}
    - {zh: 执行表面和主机授权策略的引用, en: References to an execution surface and host authorization policy, ja: 実行表面とホスト認可ポリシーへの参照}
  excludes:
    - {zh: 工具的公开 inputSchema 或 outputSchema, en: A tool's published inputSchema or outputSchema, ja: ツールが公開する inputSchema または outputSchema}
    - {zh: 具体 MCP、Responses 或 A2A 请求载荷, en: "A concrete MCP, Responses, or A2A request payload", ja: 具体的な MCP、Responses、A2A 要求ペイロード}
  semantic_kind: information
  aliases:
    - {language: en, value: execution policy record, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      主机在派发前解析本地规格，并在不修改原生请求的前提下施加限制。MCP 服务器仍验证自己的工具参数和访问控制，Responses 工具选择仍遵循 API 请求，A2A 服务器仍应用自己的协议语义。
    en: >
      The host resolves this local specification before dispatch. It enforces the limits around a
      native request, preserving that request unchanged. An MCP server still validates its own tool
      arguments and access controls, a Responses tool selection still follows the API request, and
      an A2A server still applies its own protocol semantics.
    ja: >-
      ホストは配信前にこのローカル仕様を解決し、ネイティブ要求を変更せずにその周囲で制限を強制する。MCP サーバーは独自のツール引数とアクセス制御を検証し、Responses のツール選択は API 要求に従い、A2A サーバーは独自のプロトコル意味論を適用する。
  typical_input:
    - description: Local execution policy for a remote tool call.
      format: '{"local_specification_id":"exec-spec-7","local_timeout_ms":30000,"local_retry_limit":1,"local_concurrency_limit":4,"local_surface":"mcp_tools_call"}'
      source_claims: [moonweave-execution-specification]
  typical_output:
    - description: The executor applies the local limits and records the selected policy reference.
      format: '{"local_specification_id":"exec-spec-7","local_policy_reference":"policy/remote-tool-safe"}'
      source_claims: [moonweave-execution-specification]
  reference_implementations:
    - name: MCP Tools specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Requires server input validation, access controls, rate limits, and output sanitization.
    - name: OpenAI Function Calling guide
      url: https://developers.openai.com/api/docs/guides/function-calling
      description: Describes Responses tool choice and client-side execution of emitted calls.
structure:
  identity_keys: [local_specification_id]
  fields:
    - id: local_specification_id
      labels: {zh: 本地规格标识, en: Local specification ID, ja: ローカル仕様 ID}
      definitions: {zh: 主机为该配置记录分配的本地稳定标识, en: A host-assigned stable identifier for this local configuration record, ja: このローカル設定記録に対するホスト割当ての安定識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: exec-spec-7
      allowed_values: []
      source_claims: [moonweave-execution-specification]
    - id: local_timeout_ms
      labels: {zh: 本地超时毫秒数, en: Local timeout milliseconds, ja: ローカルタイムアウトミリ秒}
      definitions: {zh: 主机等待本次执行的最长本地时长, en: The maximum local duration for which the host waits for this execution, ja: ホストがこの実行を待機する最大ローカル時間}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 30000
      allowed_values: []
      source_claims: [moonweave-execution-specification]
    - id: local_retry_limit
      labels: {zh: 本地重试上限, en: Local retry limit, ja: ローカル再試行上限}
      definitions: {zh: 主机可创建的额外尝试次数，不是远程协议字段, en: The number of additional attempts a host may create; it is not a remote protocol field, ja: ホストが作成できる追加試行回数でありリモートプロトコル項目ではない}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims: [moonweave-execution-specification]
    - id: local_concurrency_limit
      labels: {zh: 本地并发上限, en: Local concurrency limit, ja: ローカル並行実行上限}
      definitions: {zh: 主机允许此规格同时运行的调用数量, en: The number of calls the host permits concurrently under this specification, ja: この仕様の下でホストが同時に許可する呼び出し数}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 4
      allowed_values: []
      source_claims: [moonweave-execution-specification]
    - id: local_surface
      labels: {zh: 本地执行表面, en: Local execution surface, ja: ローカル実行表面}
      definitions: {zh: 用于选择适配器的本地来源分类，不是协议枚举, en: "A local source classification used to select an adapter, not a protocol enum", ja: アダプター選択に使うローカルのソース分類でありプロトコル列挙値ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp_tools_call
      allowed_values: [mcp_tools_call, openai_responses_function, openai_responses_remote_mcp, a2a_send_message, local_command]
      source_claims: [moonweave-execution-specification]
    - id: local_policy_reference
      labels: {zh: 本地策略引用, en: Local policy reference, ja: ローカルポリシー参照}
      definitions: {zh: 指向主机授权或安全策略的本地引用, en: A local reference to the host authorization or safety policy, ja: ホスト認可または安全ポリシーへのローカル参照}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: policy/remote-tool-safe
      allowed_values: []
      source_claims: [moonweave-execution-specification, mcp-tool-safety]
  constraints:
    - id: execution-spec-positive-limits
      severity: error
      expression_language: plain
      expression: local_timeout_ms and local_concurrency_limit are positive integers and local_retry_limit is a non-negative integer.
      explanation:
        zh: 超时和并发上限必须为正整数，重试上限必须为非负整数。
        en: Timeout and concurrency limits are positive integers, and the retry limit is a non-negative integer.
        ja: タイムアウトと並行性上限は正の整数であり、再試行上限は非負整数である。
      source_claims: [moonweave-execution-specification]
    - id: execution-spec-is-not-native-tool-schema
      severity: error
      expression_language: plain
      expression: An ExecutionSpecification never substitutes for an MCP inputSchema, OpenAI function parameters, or A2A SendMessageConfiguration.
      explanation:
        zh: 执行规格不得取代 MCP inputSchema、OpenAI 函数参数或 A2A SendMessageConfiguration。
        en: An execution specification does not substitute for an MCP inputSchema, OpenAI function parameters, or A2A SendMessageConfiguration.
        ja: 実行仕様は MCP inputSchema、OpenAI 関数パラメーター、A2A SendMessageConfiguration を置き換えない。
      source_claims: [mcp-tool-safety, moonweave-execution-specification]
  required_relations: []
examples:
  - id: execution-spec-positive-remote-mcp

    labels: {zh: 远程 MCP 本地规格, en: Remote MCP local specification, ja: リモート MCP ローカル仕様}

    descriptions:
      zh: "ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]；Anthropic content:[{type:\"tool_use\",id:\"toolu_01\",name:\"get_weather\",input:{location:\"Paris\"}}]；Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。"
      en: "ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]; Anthropic content:[{type:\"tool_use\",id:\"toolu_01\",name:\"get_weather\",input:{location:\"Paris\"}}]; Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})."
      ja: "ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]。Anthropic tool_use。Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。"
    field_values: {local_specification_id: exec-spec-7, local_timeout_ms: 30000, local_retry_limit: 1, local_concurrency_limit: 4, local_surface: mcp_tools_call}
    related_node_ids: [ExecutionSpecification, InvocationSpecification, ToolCall]
    related_relation_ids: []

    source_claims: [moonweave-execution-specification]
  - id: execution-spec-counterexample-negative-timeout

    labels: {zh: 负超时, en: Negative timeout, ja: 負のタイムアウト}

    descriptions:
      zh: 反例：ReAct Action 无对应 Observation 就继续推理；Anthropic tool_use 缺少配对 tool_result(tool_use_id)；Vercel AI SDK execute 抛错未捕获。
      en: Counterexample: ReAct continues reasoning without Observation for Action; Anthropic tool_use missing paired tool_result(tool_use_id); Vercel AI SDK execute error uncaught.
      ja: 反例：ReAct Action に Observation なしで reasoning 継続。Anthropic tool_use に tool_result ペア欠落。Vercel AI SDK execute エラー未捕捉。
    field_values: {local_specification_id: exec-spec-bad, local_timeout_ms: -1, local_retry_limit: 0, local_concurrency_limit: 1, local_surface: local_command}
    related_node_ids: [ExecutionSpecification]
    related_relation_ids: []

    source_claims: [moonweave-execution-specification]
  - id: execution-spec-boundary-tool-definition

    labels: {zh: 规格与工具定义边界, en: Specification versus tool-definition boundary, ja: 仕様とツール定義の境界}

    descriptions:
      zh: ReAct 文本 Action 标记 vs Anthropic structured tool_use vs Vercel AI SDK Zod schema tool 的 wire 契约边界；本地 Invocation 活动非原生封包。
      en: Wire contract boundary among ReAct text Action markers, Anthropic structured tool_use, Vercel AI SDK Zod schema tools; local Invocation activity is not native envelope.
      ja: ReAct テキスト Action marker、Anthropic structured tool_use、Vercel AI SDK Zod schema tool の wire 契約境界。ローカル Invocation 活動はネイティブ envelope ではない。
    field_values: {local_specification_id: exec-spec-7, local_timeout_ms: 30000, local_retry_limit: 1, local_concurrency_limit: 4, local_surface: mcp_tools_call}
    related_node_ids: [ExecutionSpecification, InvocationSpecification, ToolCall]
    related_relation_ids: []

    source_claims: [mcp-tool-safety, moonweave-execution-specification]
  - id: execution-spec-instance-a2a-policy

    labels: {zh: A2A 调用策略实例, en: A2A invocation policy instance, ja: A2A 呼び出しポリシーインスタンス}

    descriptions:
      zh: ReAct HotpotQA 实例：Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup[Arthur's Magazine]→Finish[1850]；Anthropic tool_use_id=toolu_01A09q90qw90 配对 tool_result。
      en: ReAct HotpotQA instance: Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup→Finish[1850]; Anthropic tool_use_id=toolu_01A09q90qw90 paired with tool_result.
      ja: ReAct HotpotQA 実例：Thought→Action: Search→Observation→Lookup→Finish[1850]。Anthropic tool_use_id=toolu_01A09q90qw90 が tool_result とペア。
    field_values: {local_specification_id: exec-spec-a2a, local_timeout_ms: 60000, local_retry_limit: 0, local_concurrency_limit: 2, local_surface: a2a_send_message, local_policy_reference: policy/a2a-agent-safe}
    related_node_ids: [ExecutionSpecification, AgentAsToolInvocation]
    related_relation_ids: []

    source_claims: [moonweave-execution-specification]
parent_relation: null
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification - Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-specification
    locator: "Calling Tools; Error Handling; Security Considerations"
    relevance: Establishes tool input validation and host/server safety responsibilities.
  - id: openai-responses-function-calling
    title: OpenAI API - Function Calling
    url: https://developers.openai.com/api/docs/guides/function-calling
    source_type: official-documentation
    locator: "Additional configurations; Tool choice"
    relevance: Describes provider-specific tool-selection settings.
source_claims:
  - id: mcp-tool-safety
    source: mcp-tools-2025-11-25
    supports: MCP servers validate tool inputs and implement access controls and rate limits, while clients use confirmation, validation, timeouts, and audit logging as appropriate.
    locator: "Security Considerations"
    evidence_kind: normative
    confidence: high
  - id: moonweave-execution-specification
    source: openai-responses-function-calling
    supports: Moonweave ExecutionSpecification is a local execution-policy projection; it groups host controls without asserting they are a native MCP, OpenAI, or A2A schema.
    locator: "Additional configurations; Tool choice"
    evidence_kind: design-inference
    confidence: high