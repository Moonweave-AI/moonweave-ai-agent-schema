schema: moonweave.ai/ontology-node/v1
id: ExecutionSpecification
kind: concept
status: review
labels:
  zh: 执行规范
  en: Execution Specification
  ja: 実行仕様
semantics:
  short_definition:
    zh: 执行规范是可复用地声明输入、结果、时限、批准与效果边界的规范属概念。
    en: An Execution Specification is the reusable genus for input, result, timeout, approval, and effect contracts of executable actions.
    ja: 実行仕様は executable action の input・result・timeout・approval・effect contract を再利用可能に宣言する属概念です。
  definition:
    zh: 执行规范是一种以 specification_id 与 version 识别的可复用规范，它在任何一次执行发生之前声明输入合同、结果合同、最长执行时限、批准方式和允许的效果模式。它只承载各种可执行动作共有的合同信息；具体调用的能力目标由 InvocationSpecification 收窄，本次拟执行的工具与实参由 ToolCallPlan 收窄，而请求、调用、尝试和结果仍是独立发生记录。
    en: "An Execution Specification is a reusable specification identified by specification_id and version that declares an input contract, result contract, maximum execution duration, approval mode, and permitted effect mode before any execution occurrence. It carries only the contract shared by executable actions: InvocationSpecification narrows the capability target for calls, ToolCallPlan narrows the proposed tool and bound arguments, and requests, invocations, attempts, and results remain independent occurrence records."
    ja: 実行仕様は specification_id と version で識別する再利用可能な仕様で、execution occurrence より前に input contract・result contract・最大実行時間・approval mode・許可 effect mode を宣言します。executable action 共通 contract のみを保持し、InvocationSpecification が call の capability target を、ToolCallPlan が予定 tool と bound arguments を限定し、request・invocation・attempt・result は独立 occurrence record のままです。
  why_needed:
    zh: 把通用执行合同提升为同类上位节点，可避免用运行时发生或某一种工具调用反向组织所有规范，并使时限、批准与效果边界只定义一次。
    en: A specification-only genus prevents runtime occurrences or one tool-call subtype from organizing every contract and gives timeout, approval, and effect boundaries one explicit home.
    ja: specification-only genus により runtime occurrence や一 tool-call subtype を全 contract の親にせず、timeout・approval・effect boundary の所在を一つにします。
  includes:
    - zh: 纳入可在多次执行中复用并具有稳定版本的输入、结果、时限、批准和效果合同。
      en: Includes stable, versioned input, result, timeout, approval, and effect contracts reusable across executions.
      ja: 複数 execution で再利用する stable versioned input・result・timeout・approval・effect contract を含みます。
  excludes:
    - zh: 排除某个能力或工具的具体目标绑定、某次实参绑定、已提交请求、已开始调用、尝试、诊断和返回结果。
      en: Excludes a concrete capability or tool target binding, one call's bound arguments, submitted requests, started invocations, attempts, diagnostics, and returned results.
      ja: concrete capability/tool target binding、一 call の bound arguments、submitted request、started invocation、attempt、diagnostic、returned result を除きます。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - specification_id
    - version
  fields:
    - id: specification_id
      labels:
        zh: 执行规范标识
        en: execution-specification ID
        ja: 実行仕様 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在多次执行发生之外稳定识别一份执行合同。
        en: Stably identifies one execution contract independently of its occurrences.
        ja: occurrence から独立して一 execution contract を安定識別します。
      allowed_values: []
      pattern: null
      example_value: execution-spec:bounded-action
      source_claims:
        - claim-execution-specification-004
    - id: version
      labels:
        zh: 执行规范版本
        en: execution-specification version
        ja: 実行仕様版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定输入、结果和治理约束的兼容修订版。
        en: Fixes the compatible revision of the input, result, and governance contract.
        ja: input・result・governance contract の compatible revision を固定します。
      allowed_values: []
      pattern: null
      example_value: 1.0.0
      source_claims:
        - claim-execution-specification-005
    - id: input_contract_ref
      labels:
        zh: 输入合同引用
        en: input-contract reference
        ja: 入力 contract 参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用在执行前验证输入所用的不可变 Schema 或等价合同修订版。
        en: References the immutable schema or equivalent contract revision used to validate input before execution.
        ja: execution 前 input validation に使う immutable schema または equivalent contract revision を参照します。
      allowed_values: []
      pattern: null
      example_value: schema:bounded-action-input@1
      source_claims:
        - claim-execution-specification-006
    - id: result_contract_ref
      labels:
        zh: 结果合同引用
        en: result-contract reference
        ja: 結果 contract 参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用成功或失败返回必须遵守的结果结构修订版。
        en: References the result-structure revision that successful or failed returns must follow.
        ja: success/failure return が従う result structure revision を参照します。
      allowed_values: []
      pattern: null
      example_value: schema:bounded-action-result@1
      source_claims:
        - claim-execution-specification-007
    - id: timeout_ms
      labels:
        zh: 最长执行毫秒
        en: maximum execution milliseconds
        ja: 最大実行ミリ秒
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明一次执行尝试获准占用的最长持续时间，必须为正整数。
        en: Declares the maximum duration permitted for one execution attempt and must be a positive integer.
        ja: 一 execution attempt に許可する最大 duration を宣言し positive integer とします。
      allowed_values: []
      pattern: null
      example_value: 30000
      source_claims:
        - claim-execution-specification-008
    - id: approval_mode
      labels:
        zh: 批准方式
        en: approval mode
        ja: 承認方式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明无需批准、按条件批准或每次执行均需批准。
        en: Declares whether approval is unnecessary, conditional, or required for every execution.
        ja: approval が不要・conditional・every execution required のいずれかを宣言します。
      allowed_values: []
      pattern: null
      example_value: conditional
      source_claims:
        - claim-execution-specification-009
    - id: effect_mode
      labels:
        zh: 允许效果模式
        en: permitted effect mode
        ja: 許可 effect mode
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明执行合同允许只读、预览或外部写入效果；运行时事实仍由 InvocationEffect 记录。
        en: Declares whether the contract permits read-only, preview, or external-write effects; actual runtime effects remain InvocationEffect records.
        ja: contract が read-only・preview・external-write effect のどれを許可するか宣言し actual runtime effect は InvocationEffect record に残します。
      allowed_values: []
      pattern: null
      example_value: read-only
      source_claims:
        - claim-execution-specification-010
  constraints: []
  required_relation_constraints: []
examples:
  - id: ExecutionSpecification-example-positive-manual-001
    kind: positive
    labels:
      zh: 执行规范正例
      en: Execution Specification positive case
      ja: 実行仕様正例
    scenario_id: null
    descriptions:
      zh: bounded-action@1 在任何调用发生前固定输入与结果 Schema、三十秒时限、条件批准和只读效果，可被多个具体 InvocationSpecification 复用。
      en: bounded-action@1 fixes input and result schemas, a thirty-second limit, conditional approval, and read-only effects before any call occurs and can be reused by several concrete InvocationSpecifications.
      ja: bounded-action@1 は call occurrence 前に input/result schema・三十秒 limit・conditional approval・read-only effect を固定し複数 concrete InvocationSpecification が再利用できます。
    field_values:
      specification_id: execution-spec:bounded-action
      version: 1.0.0
      input_contract_ref: schema:bounded-action-input@1
      result_contract_ref: schema:bounded-action-result@1
      timeout_ms: 30000
      approval_mode: conditional
      effect_mode: read-only
    related_node_ids:
      - ExecutionSpecification
      - InvocationSpecification
      - ToolCallPlan
    related_relation_ids:
      - InvocationSpecification-is_a-ExecutionSpecification
      - ToolCallPlan-is_a-InvocationSpecification
    expected_result:
      zh: 建立一个不含请求、调用或结果事实的 ExecutionSpecification，并让调用规范沿 is_a 继承通用合同。
      en: Create an ExecutionSpecification containing no request, invocation, or result facts and let invocation specifications inherit its common contract through is_a.
      ja: request・invocation・result fact を含まない ExecutionSpecification を作り invocation specification が is_a で common contract を継承します。
    why_valid_or_invalid:
      zh: 该对象在发生之前可独立版本化，所有字段描述的是可复用治理合同而非某次运行状态。
      en: The object is independently versionable before occurrence and every field describes a reusable governance contract rather than one run's state.
      ja: occurrence 前に独立 version 化でき全 field が一 run state でなく reusable governance contract を記述します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-execution-specification-011
      - claim-execution-specification-012
  - id: ExecutionSpecification-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 执行规范边界例
      en: Execution Specification boundary case
      ja: 実行仕様境界例
    scenario_id: null
    descriptions:
      zh: invocation-weather-0042 已在 02:05:00Z 开始并产生 attempt-1；这些发生标识、时间与状态不能被当作 ExecutionSpecification。
      en: invocation-weather-0042 has started at 02:05:00Z and produced attempt-1; those occurrence identifiers, timestamps, and states are not an ExecutionSpecification.
      ja: invocation-weather-0042 は 02:05:00Z に開始し attempt-1 を生成済みで、この occurrence ID・timestamp・state は ExecutionSpecification ではありません。
    field_values:
      invocation_id: invocation-weather-0042
      attempt_id: attempt-1
      started_at: 2026-07-16T02:05:00Z
      status: running
    related_node_ids:
      - ExecutionSpecification
      - Invocation
      - InvocationAttempt
    related_relation_ids: []
    expected_result:
      zh: 不建立 ExecutionSpecification；把开始时刻和运行状态保留在 Invocation 与 InvocationAttempt。
      en: Do not create an ExecutionSpecification; retain start time and runtime state on Invocation and InvocationAttempt.
      ja: ExecutionSpecification を作らず start time と runtime state を Invocation/InvocationAttempt に保持します。
    why_valid_or_invalid:
      zh: 边界记录缺少稳定规范身份与版本，而且只描述已经发生的一次运行。
      en: The boundary record lacks stable specification identity and version and describes only one execution occurrence.
      ja: boundary record は stable specification identity/version を欠き一 execution occurrence のみを記述します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-execution-specification-013
external_mappings: []
