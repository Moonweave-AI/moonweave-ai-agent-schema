source_claims:
  - id: claim-execution-specification-001
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 separates the reusable Tool declaration with inputSchema and optional outputSchema from an individual tools/call request, response, execution error, confirmation, and timeout behavior; Moonweave generalizes those stable pre-execution contracts as ExecutionSpecification.
    locator: Server Features > Tools > Protocol Messages > Calling Tools; Data Types > Tool, Output Schema and Error Handling; Security Considerations
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-execution-specification-002
    source: eng-fw-openai-function-schema
    supports: OpenAI Agents SDK FuncSchema prepares a named function, parameter model, generated JSON Schema, signature, context-taking flag, and strict-schema choice before handler execution, supporting a reusable input-contract layer.
    locator: Function schema > FuncSchema dataclass > name, params_pydantic_model, params_json_schema, signature, takes_context and strict_json_schema
    evidence_kind: official
    confidence: high
    review_status: pending
  - id: claim-execution-specification-003
    source: eng-fw-openai-hitl
    supports: OpenAI Agents SDK checks approval rules before tool execution and records a per-call approval or rejection before resuming, supporting approval as a pre-execution contract rather than an invocation subtype.
    locator: Human-in-the-loop > How the approval flow works > needs_approval, ToolApprovalItem, approve or reject, and resume
    evidence_kind: official
    confidence: high
    review_status: pending
  - id: claim-execution-specification-004
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 separates published tool definitions and request schemas from individual tools/call messages; Moonweave uses a stable specification identifier to preserve that reusable-contract boundary.
    locator: Server Features > Tools > Data Types > Tool; Protocol Messages > Calling Tools
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-execution-specification-005
    source: eng-proto-mcp-2025-spec
    supports: The pinned MCP 2025-11-25 specification gives request, tool-definition, and result schemas a definite protocol revision; Moonweave keeps the governing execution contract version explicit for reproducibility.
    locator: Specification version 2025-11-25 > Server Features > Tools > Protocol Messages and Data Types
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-execution-specification-006
    source: eng-fw-openai-function-schema
    supports: OpenAI Agents SDK FuncSchema stores a function name, Pydantic parameter model, generated params_json_schema, signature, and strict_json_schema before converting validated data to call arguments.
    locator: Function schema > FuncSchema > params_pydantic_model, params_json_schema, signature, strict_json_schema and to_call_args
    evidence_kind: official
    confidence: high
    review_status: pending
  - id: claim-execution-specification-007
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 tools may publish outputSchema, servers must conform structuredContent to it, and clients should validate structured results against it.
    locator: Server Features > Tools > Data Types > Output Schema and Structured Content
    evidence_kind: official
    confidence: high
    review_status: pending
  - id: claim-execution-specification-008
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 security considerations state that clients should implement timeouts for tool calls, grounding an explicit pre-execution timeout contract.
    locator: Server Features > Tools > Security Considerations > Clients SHOULD implement timeouts for tool calls
    evidence_kind: official
    confidence: high
    review_status: pending
  - id: claim-execution-specification-009
    source: eng-fw-openai-hitl
    supports: OpenAI Agents SDK evaluates a per-tool approval rule before execution, pauses with a ToolApprovalItem when no decision exists, and resumes only after approve or reject is recorded for the call.
    locator: Human-in-the-loop > How the approval flow works > needs_approval, interruptions, approve or reject, and resume
    evidence_kind: official
    confidence: high
    review_status: pending
  - id: claim-execution-specification-010
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 distinguishes tool definition metadata and annotations from the later tools/call occurrence and requires clients to treat behavioral annotations as untrusted unless the server is trusted; Moonweave therefore records the permitted effect as a reviewed contract, not an observed effect.
    locator: Server Features > Tools > Data Types > Tool annotations; Protocol Messages > Calling Tools; Security Considerations
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-execution-specification-011
    source: eng-proto-mcp-2025-spec
    supports: The MCP 2025-11-25 Tool definition fixes inputSchema and optional outputSchema before tools/call, while its security guidance covers confirmation and timeout boundaries used in this reviewed execution-contract case.
    locator: Server Features > Tools > Data Types > Tool and Output Schema; Security Considerations
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-execution-specification-012
    source: eng-fw-openai-hitl
    supports: The OpenAI Agents SDK approval rule is evaluated before a concrete tool call proceeds and can pause, approve or reject, and resume the original run, supporting the pre-execution approval boundary in this case.
    locator: Human-in-the-loop > How the approval flow works > approval rule, interruption, decision, and resumption
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-execution-specification-013
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 represents tools/call as a JSON-RPC request and response distinct from the earlier Tool definition, supporting rejection of occurrence state as reusable specification data.
    locator: Server Features > Tools > Protocol Messages > Calling Tools; Data Types > Tool
    evidence_kind: design-inference
    confidence: high
    review_status: pending
