    locator: "Additional configurations; Tool choice"
    evidence_kind: normative
    confidence: high
  - id: openai-remote-mcp-approvals
    source: openai-responses-remote-mcp
    supports: OpenAI remote MCP approvals use dedicated mcp_approval_request and mcp_approval_response items.
    locator: "Approvals"
    evidence_kind: normative
    confidence: high
  - id: moonweave-tool-call-plan
    source: openai-responses-function-calling
    supports: Moonweave ToolCallPlan is a local candidate-selection component of an InvocationSpecification and not a native provider request or call record.
    locator: "Additional configurations; Tool choice"
