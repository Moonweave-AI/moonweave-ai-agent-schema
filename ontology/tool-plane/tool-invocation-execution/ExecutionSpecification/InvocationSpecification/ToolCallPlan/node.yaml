schema: moonweave.ai/ontology-node/v1
id: ToolCallPlan
kind: concept
labels:
  zh: 工具调用计划
  en: Tool-call plan
  ja: ツール呼び出し計画
semantics:
  short_definition:
    zh: 作为调用规格组成部分，描述主机准备选择哪些工具候选项及其本地选择策略的记录。
    en: A component of an invocation specification that records candidate tools and a host's local selection strategy.
    ja: 呼び出し仕様の構成要素として、候補ツールとホストのローカル選択戦略を記録するもの。
  definition:
    zh: >-
      ToolCallPlan 是 InvocationSpecification 的本地计划组成部分。在调用存在之前，它标识计划工具引用、允许候选集合和本地选择模式。它可参考 OpenAI tool_choice 或 MCP 工具列表，但不是 OpenAI tools 参数或 tool_choice 对象、MCP tools/list 结果、tools/call 请求或 Responses mcp_approval_request item。
    en: >
      A ToolCallPlan is a local plan component of an InvocationSpecification. It identifies a planned
      tool reference, an allowed-candidate set, and a local selection mode before a call exists. It
      may be informed by OpenAI tool_choice or an MCP tool list, but it is neither an OpenAI tools
      parameter nor tool_choice object, an MCP tools/list result, a tools/call request, or a
      Responses mcp_approval_request item.
    ja: >-
      ToolCallPlan は InvocationSpecification のローカルな計画構成要素である。呼び出しが存在する前に、予定ツール参照、許可候補集合、ローカル選択モードを識別する。OpenAI tool_choice や MCP ツール一覧から情報を得てもよいが、OpenAI tools parameter または tool_choice object、MCP tools/list 結果、tools/call 要求、Responses mcp_approval_request item ではない。
  why_needed:
    zh: >-
      主机可在副作用发生前审查计划暴露或派发的内容。将计划建模为规格的一部分而不是 ToolCall 子类，可避免把候选选择误当成已完成调用、工具定义或用户审批事件。
    en: >
      A host can review what it intends to expose or dispatch before side effects occur. Modeling the
      plan as part of the specification—not as a ToolCall subtype—avoids treating a candidate choice
      as a completed call, a tool definition, or a user approval event.
    ja: >-
      ホストは副作用が生じる前に公開または配信する意図をレビューできる。計画を ToolCall subtype ではなく仕様の一部としてモデル化すると、候補選択を完了済み呼び出し、ツール定義、またはユーザー承認イベントと誤認しない。
  includes:
    - {zh: 计划的工具引用和候选集合, en: Planned tool references and candidate set, ja: 計画ツール参照と候補集合}
    - {zh: 本地选择和审批提示, en: Local selection and approval hints, ja: ローカル選択と承認ヒント}
  excludes:
    - {zh: 实际工具参数或执行结果, en: Actual tool arguments or an execution result, ja: 実際のツール引数または実行結果}
    - {zh: MCP tools/list 返回的原生定义页, en: A native MCP tools/list definition page, ja: ネイティブ MCP tools/list 定義ページ}
  semantic_kind: information
  aliases:
    - {language: en, value: planned tool selection, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      主机可从 MCP 发现或提供方工具注册中导出候选项。派发前它评估本地策略，再构造表面特定消息。selection_mode 为 forced 的计划并不自行调用工具；在 OpenAI Responses 中，原生强制函数形式属于 tool_choice，远程 MCP 审批仍遵循 API 的审批 item 流。
    en: >
      A host may derive candidates from MCP discovery or provider tool registration. Before dispatch,
      it evaluates its local policy and then constructs a surface-specific message. A plan with
      selection_mode forced does not itself call the tool; in OpenAI Responses the native forced
      function form belongs in tool_choice, and remote MCP approval still follows the API's approval
      item flow.
    ja: >-
      ホストは MCP discovery または provider のツール登録から候補を導出できる。配信前にローカル方針を評価してから表面固有のメッセージを構築する。selection_mode が forced の計画自体はツールを呼び出さない。OpenAI Responses ではネイティブの強制 function form は tool_choice に属し、リモート MCP の承認は API の approval item flow に従う。
  typical_input:
    - description: A local plan limits a call to one weather candidate.
      format: '{"local_plan_id":"plan-17","local_invocation_specification_ref":"invoke-spec-9","local_candidate_tool_refs":["mcp:weather/get_weather"],"local_selection_mode":"forced","local_approval_hint":"host_review"}'
      source_claims: [moonweave-tool-call-plan]
  typical_output:
    - description: The planner marks one candidate as ready for later adapter dispatch.
      format: '{"local_plan_id":"plan-17","local_planned_target":"mcp:weather/get_weather","local_plan_state":"ready"}'
      source_claims: [moonweave-tool-call-plan]
  reference_implementations:
    - name: OpenAI Function Calling guide
      url: https://developers.openai.com/api/docs/guides/function-calling
      description: Defines auto, required, forced, and allowed tool-choice forms.
    - name: MCP Tools specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines tools/list discovery and separate tools/call execution.
structure:
  identity_keys: [local_plan_id]
  fields:
    - id: local_plan_id
      labels: {zh: 本地计划标识, en: Local plan ID, ja: ローカル計画 ID}
      definitions: {zh: 主机为该计划组件分配的本地标识, en: A host-assigned identifier for this plan component, ja: この計画構成要素に対するホスト割当て識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: plan-17
      allowed_values: []
      source_claims: [moonweave-tool-call-plan]
    - id: local_invocation_specification_ref
      labels: {zh: 调用规格引用, en: Invocation specification reference, ja: 呼び出し仕様参照}
      definitions: {zh: 包含此计划的本地调用规格, en: The local invocation specification that contains this plan, ja: この計画を含むローカル呼び出し仕様}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: invoke-spec-9
      allowed_values: []
      source_claims: [moonweave-tool-call-plan]
    - id: local_candidate_tool_refs
      labels: {zh: 本地候选工具引用, en: Local candidate tool references, ja: ローカル候補ツール参照}
      definitions: {zh: 可供主机选择的本地或已发现工具引用集合, en: A collection of local or discovered tool references from which the host may choose, ja: ホストが選べるローカルまたは発見済みツール参照の集合}
      datatype: string[]
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: '["mcp:weather/get_weather"]'
      allowed_values: []
      source_claims: [moonweave-tool-call-plan, mcp-tools-discovery]
    - id: local_selection_mode
      labels: {zh: 本地选择模式, en: Local selection mode, ja: ローカル選択モード}
      definitions: {zh: 主机计划层面的选择意图，不是 OpenAI tool_choice 原生值, en: A host-level selection intent rather than a native OpenAI tool_choice value, ja: ネイティブ OpenAI tool_choice 値ではなくホストレベルの選択意図}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: forced
      allowed_values: [auto, required, forced, allowed_set]
      source_claims: [moonweave-tool-call-plan, openai-tool-choice]
    - id: local_approval_hint
      labels: {zh: 本地审批提示, en: Local approval hint, ja: ローカル承認ヒント}
      definitions: {zh: 主机使用的预派发提示，不等同于任一原生审批对象, en: A pre-dispatch hint used by the host and not any native approval object, ja: ホストが使う配信前ヒントでありネイティブ承認オブジェクトではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: host_review
      allowed_values: [host_review, policy_auto, prohibited]
      source_claims: [moonweave-tool-call-plan, openai-remote-mcp-approvals]
  constraints:
    - id: tool-call-plan-has-candidate
      severity: error
      expression_language: plain
      expression: local_candidate_tool_refs contains at least one candidate reference.
      explanation:
        zh: 候选工具引用集合必须至少包含一个元素。
        en: The candidate-tool reference collection contains at least one entry.
        ja: 候補ツール参照集合は少なくとも一つの項目を含む。
      source_claims: [moonweave-tool-call-plan]
    - id: tool-call-plan-is-not-a-call
      severity: error
      expression_language: plain
      expression: A ToolCallPlan does not carry concrete call arguments, a JSON-RPC id, a Responses call_id, or an execution output.
      explanation:
        zh: 工具调用计划不携带具体参数、JSON-RPC id、Responses call_id 或执行输出。
        en: A tool-call plan carries neither concrete arguments, a JSON-RPC id, a Responses call_id, nor execution output.
        ja: ツール呼び出し計画は具体的引数、JSON-RPC id、Responses call_id、実行出力を持たない。
      source_claims: [mcp-tools-discovery, openai-tool-choice, moonweave-tool-call-plan]
  required_relations: []
examples:
  - id: tool-call-plan-positive-forced-weather

    labels: {zh: 强制天气工具计划, en: Forced weather-tool plan, ja: 強制天気ツール計画}

    descriptions:
      zh: "ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]；Anthropic content:[{type:\"tool_use\",id:\"toolu_01\",name:\"get_weather\",input:{location:\"Paris\"}}]；Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。"
      en: "ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]; Anthropic content:[{type:\"tool_use\",id:\"toolu_01\",name:\"get_weather\",input:{location:\"Paris\"}}]; Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})."
      ja: "ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]。Anthropic tool_use。Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。"
    field_values: {local_plan_id: plan-17, local_invocation_specification_ref: invoke-spec-9, local_candidate_tool_refs: '["mcp:weather/get_weather"]', local_selection_mode: forced, local_approval_hint: host_review}
    related_node_ids: [ToolCallPlan, InvocationSpecification, ToolCall]
    related_relation_ids: [ToolCallPlan-part_of-InvocationSpecification]

    source_claims: [moonweave-tool-call-plan]
  - id: tool-call-plan-counterexample-empty-candidates

    labels: {zh: 空候选集合, en: Empty candidate set, ja: 空の候補集合}

    descriptions:
      zh: 反例：ReAct Action 无对应 Observation 就继续推理；Anthropic tool_use 缺少配对 tool_result(tool_use_id)；Vercel AI SDK execute 抛错未捕获。
      en: Counterexample: ReAct continues reasoning without Observation for Action; Anthropic tool_use missing paired tool_result(tool_use_id); Vercel AI SDK execute error uncaught.
      ja: 反例：ReAct Action に Observation なしで reasoning 継続。Anthropic tool_use に tool_result ペア欠落。Vercel AI SDK execute エラー未捕捉。
    field_values: {local_plan_id: plan-bad, local_invocation_specification_ref: invoke-spec-9, local_candidate_tool_refs: '[]', local_selection_mode: forced, local_approval_hint: host_review}
    related_node_ids: [ToolCallPlan]
    related_relation_ids: [ToolCallPlan-part_of-InvocationSpecification]

    source_claims: [moonweave-tool-call-plan]
  - id: tool-call-plan-boundary-tool-choice

    labels: {zh: 本地模式与 tool_choice 边界, en: Local mode versus tool_choice boundary, ja: ローカルモードと tool_choice の境界}

    descriptions:
      zh: ReAct 文本 Action 标记 vs Anthropic structured tool_use vs Vercel AI SDK Zod schema tool 的 wire 契约边界；本地 Invocation 活动非原生封包。
      en: Wire contract boundary among ReAct text Action markers, Anthropic structured tool_use, Vercel AI SDK Zod schema tools; local Invocation activity is not native envelope.
      ja: ReAct テキスト Action marker、Anthropic structured tool_use、Vercel AI SDK Zod schema tool の wire 契約境界。ローカル Invocation 活動はネイティブ envelope ではない。
    field_values: {local_plan_id: plan-17, local_invocation_specification_ref: invoke-spec-9, local_candidate_tool_refs: '["function:get_weather"]', local_selection_mode: forced, local_approval_hint: host_review}
    related_node_ids: [ToolCallPlan, ToolCall]
    related_relation_ids: [ToolCallPlan-part_of-InvocationSpecification]

    source_claims: [openai-tool-choice, moonweave-tool-call-plan]
  - id: tool-call-plan-instance-remote-mcp-review

    labels: {zh: 远程 MCP 审查计划实例, en: Remote-MCP review-plan instance, ja: リモート MCP レビュー計画インスタンス}

    descriptions:
      zh: ReAct HotpotQA 实例：Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup[Arthur's Magazine]→Finish[1850]；Anthropic tool_use_id=toolu_01A09q90qw90 配对 tool_result。
      en: ReAct HotpotQA instance: Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup→Finish[1850]; Anthropic tool_use_id=toolu_01A09q90qw90 paired with tool_result.
      ja: ReAct HotpotQA 実例：Thought→Action: Search→Observation→Lookup→Finish[1850]。Anthropic tool_use_id=toolu_01A09q90qw90 が tool_result とペア。
    field_values: {local_plan_id: plan-roll, local_invocation_specification_ref: invoke-spec-9, local_candidate_tool_refs: '["remote-mcp:dmcp/roll"]', local_selection_mode: allowed_set, local_approval_hint: host_review}
    related_node_ids: [ToolCallPlan, InvocationSpecification, ToolCall]
    related_relation_ids: [ToolCallPlan-part_of-InvocationSpecification]

    source_claims: [openai-remote-mcp-approvals, moonweave-tool-call-plan]
