      en: Do not create ToolCallPlan; keep the record in the more accurate concept identified by the boundary.
      ja: ToolCallPlan を作らず boundary が示す accurate concept に保持します。
    why_valid_or_invalid:
      zh: 排除候选排序、ToolDefinition、实际 ToolCall、尝试与结果。
      en: Excludes candidate ranking, ToolDefinition, an actual ToolCall, attempts, and results.
      ja: candidate ranking・ToolDefinition・actual ToolCall・attempt・result を除きます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
