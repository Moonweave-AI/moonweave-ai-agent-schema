schema: moonweave.ai/ontology-node/v1
id: ToolCallPlan
kind: concept
status: review
labels:
  zh: 工具调用计划
  en: Tool Call Plan
  ja: ツール呼び出し計画
semantics:
  short_definition:
    zh: 工具调用计划是为一个已选工具准备目标版本、操作、实参与执行约束的一种调用规范。
    en: A Tool Call Plan is an Invocation Specification preparing a selected tool version, operation, arguments, and execution constraints.
    ja: ツール呼び出し計画は selected tool version・operation・arguments・execution constraints を準備する Invocation Specification です。
  definition:
    zh: 工具调用计划是一种 InvocationSpecification，沿用 specification_id、version 与超时合同，并以 ToolDefinition 版本、操作名、参数绑定、批准要求和幂等策略为种差；它可规划一个 ToolCall，但计划存在不证明调用或尝试已经发生。
    en: A Tool Call Plan is an InvocationSpecification that retains its specification_id, version, and timeout contract and is differentiated by a ToolDefinition revision, operation name, argument bindings, approval requirement, and idempotency policy. It may plan a ToolCall, but its existence does not prove a call or attempt occurred.
    ja: ツール呼び出し計画は InvocationSpecification の specification_id・version・timeout contract を継承し、ToolDefinition version・operation name・argument bindings・approval requirement・idempotency policy を種差とします。ToolCall を plan できますが call/attempt occurrence は証明しません。
  why_needed:
    zh: 该层在选择之后、执行之前固定确切定义版本与约束，使参数校验或批准失败不会产生虚假 ToolCallAttempt。
    en: This layer fixes the exact definition version and constraints after selection but before execution, so validation or approval failure creates no fictitious ToolCallAttempt.
    ja: selection 後 execution 前に exact definition version と constraints を固定し validation/approval failure で fictitious ToolCallAttempt を作りません。
  includes:
    - zh: 纳入已确定工具版本、操作、参数绑定和执行约束，但尚可等待校验或批准的计划。
      en: Includes plans with a resolved tool version, operation, argument bindings, and execution constraints that may still await validation or approval.
      ja: resolved tool version・operation・argument bindings・execution constraints を持ち validation/approval 待ち得る plan を含みます。
  excludes:
    - zh: 排除候选排序、ToolDefinition、实际 ToolCall、尝试与结果。
      en: Excludes candidate ranking, ToolDefinition, an actual ToolCall, attempts, and results.
      ja: candidate ranking・ToolDefinition・actual ToolCall・attempt・result を除きます。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: tool_definition_ref
      labels:
        zh: 工具定义引用
        en: tool-definition reference
        ja: tool definition 参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定计划解析到的 ToolDefinition 版本。
        en: Fixes the ToolDefinition version resolved by the plan.
        ja: plan が解決した ToolDefinition version を固定します。
      allowed_values: []
      pattern: null
      example_value: tool-def:weather@3
      source_claims:
        - claim-tool-call-plan-005
        - claim-tool-call-plan-006
        - claim-tool-call-plan-007
        - claim-tool-call-plan-008
    - id: operation_name
      labels:
        zh: 操作名称
        en: operation name
        ja: 操作名
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指定计划调用的具名操作。
        en: Specifies the named operation planned for invocation.
        ja: planned invocation の named operation を指定します。
      allowed_values: []
      pattern: null
      example_value: weather.lookup
      source_claims:
        - claim-tool-call-plan-009
        - claim-tool-call-plan-010
        - claim-tool-call-plan-011
        - claim-tool-call-plan-012
    - id: argument_bindings
      labels:
        zh: 参数绑定
        en: argument bindings
        ja: 引数 binding
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存待输入 Schema 校验的结构化实参绑定。
        en: Stores structured argument bindings to validate against the input schema.
        ja: input schema で検証する structured argument bindings を保存します。
      allowed_values: []
      pattern: null
      example_value:
        city: Hangzhou
      source_claims:
        - claim-tool-call-plan-013
        - claim-tool-call-plan-014
        - claim-tool-call-plan-015
        - claim-tool-call-plan-016
    - id: approval_required
      labels:
        zh: 是否需要批准
        en: approval required
        ja: 承認要否
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该计划是否必须先通过人工或策略批准。
        en: Records whether the plan requires prior human or policy approval.
        ja: human/policy approval が事前必要か記録します。
      allowed_values: []
      pattern: null
      example_value: false
      source_claims:
        - claim-tool-call-plan-017
        - claim-tool-call-plan-018
        - claim-tool-call-plan-019
        - claim-tool-call-plan-020
    - id: idempotency_strategy
      labels:
        zh: 幂等策略
        en: idempotency strategy
        ja: 冪等 strategy
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 规定支持写操作时如何关联安全重放。
        en: Specifies how safe replay is correlated for supported mutations.
        ja: supported mutation の safe replay correlation を規定します。
      allowed_values: []
      pattern: null
      example_value: reuse-key-on-transport-retry
      source_claims:
        - claim-tool-call-plan-021
        - claim-tool-call-plan-022
        - claim-tool-call-plan-023
        - claim-tool-call-plan-024
  constraints:
    - id: tool-call-plan-target-and-input-coherence
      severity: error
      expression_language: plain
      expression: tool_definition_ref MUST resolve to the same published capability revision as inherited definition_ref, and argument_bindings MUST validate against inherited input_contract_ref before ToolCallPlan may plan or request a ToolCall.
      explanations:
        zh: 计划引用的工具定义必须与调用规范目标一致，实参绑定必须先通过继承的输入合同；否则不得形成或请求 ToolCall。
        en: The planned tool definition must match the invocation-specification target and bound arguments must pass the inherited input contract before a ToolCall is formed or requested.
        ja: planned tool definition は invocation-specification target と一致し bound arguments は inherited input contract を通過してから ToolCall を形成・要求します。
      source_claims:
        - claim-tool-call-plan-025
    - id: tool-call-plan-approval-resolution
      severity: error
      expression_language: plain
      expression: Inherited approval_mode=required REQUIRES approval_required=true; approval_mode=none REQUIRES approval_required=false; approval_mode=conditional REQUIRES the applicable rule to be evaluated for this plan before execution.
      explanations:
        zh: 工具调用计划必须把继承的批准方式解析为本次调用的布尔决定；条件批准在执行前必须完成规则求值。
        en: The plan must resolve the inherited approval mode to a per-call Boolean decision, evaluating conditional approval before execution.
        ja: plan は inherited approval mode を per-call Boolean decision に解決し conditional approval を execution 前に評価します。
      source_claims:
        - claim-tool-call-plan-026
  required_relation_constraints: []
examples:
  - id: ToolCallPlan-example-positive-manual-001
    kind: positive
    labels:
      zh: 工具调用计划正例
      en: Tool Call Plan positive case
      ja: ツール呼び出し計画正例
    scenario_id: null
    descriptions:
      zh: weather 计划固定 v3 定义、city 参数、三十秒超时和无需批准；校验通过后才规划实际 ToolCall。
      en: A weather plan fixes definition v3, the city argument, a thirty-second timeout, and no approval requirement; only after validation does it plan an actual ToolCall.
      ja: weather plan が definition v3・city argument・三十秒 timeout・approval none を固定し validation 後のみ actual ToolCall を plan します。
    field_values:
      specification_id: invocation-spec:weather
      version: 3.1.0
      input_contract_ref: schema:weather-input@3
      result_contract_ref: schema:weather-output@3
      approval_mode: conditional
      effect_mode: read-only
      definition_ref: tool-def:weather@3
      tool_definition_ref: tool-def:weather@3
      operation_name: weather.lookup
      argument_bindings:
        city: Hangzhou
      timeout_ms: 30000
      approval_required: false
      idempotency_strategy: reuse-key-on-transport-retry
    related_node_ids:
