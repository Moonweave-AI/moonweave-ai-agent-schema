    related_relation_ids:
      - ToolCallPlan-is_a-InvocationSpecification
      - ToolCallPlan-plans-ToolCall
    expected_result:
      zh: 建立 ToolCallPlan，并保留它与相邻规范、尝试或结果的独立身份。
      en: Create ToolCallPlan while preserving its identity from adjacent specifications, attempts, or results.
      ja: ToolCallPlan を作成し adjacent specification・attempt・result との separate identity を保持します。
    why_valid_or_invalid:
      zh: 纳入已确定工具版本、操作、参数绑定和执行约束，但尚可等待校验或批准的计划。
      en: Includes plans with a resolved tool version, operation, argument bindings, and execution constraints that may still await validation or approval.
      ja: resolved tool version・operation・argument bindings・execution constraints を持ち validation/approval 待ち得る plan を含みます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-call-plan-027
      - claim-tool-call-plan-028
      - claim-tool-call-plan-029
      - claim-tool-call-plan-030
  - id: ToolCallPlan-example-boundary-manual-001
    kind: boundary
