      zh: 工具调用计划边界例
      en: Tool Call Plan boundary case
      ja: ツール呼び出し計画境界例
    scenario_id: null
    descriptions:
      zh: ToolSelectionDecision 只记录为何选择 weather，没有绑定本次 city 参数或超时，不能充当 ToolCallPlan。
      en: A ToolSelectionDecision records why weather was selected but binds neither this call's city argument nor timeout, so it is not a ToolCallPlan.
      ja: ToolSelectionDecision は weather selection reason のみで city argument/timeout を bind せず ToolCallPlan ではありません。
    field_values:
      selection_decision_id: tool-selection-weather-0042
      selected_tool_ref: tool:weather
