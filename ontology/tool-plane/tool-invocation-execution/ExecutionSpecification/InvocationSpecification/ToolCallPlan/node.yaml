    source: eng-fw-openai-function-schema
    supports: "OpenAI FuncSchema fixes a callable name and JSON Schema parameter contract before handler execution. Moonweave stores ToolCallPlan.tool_definition_ref because this field specifically records: Fixes the ToolDefinition version resolved by the plan."
