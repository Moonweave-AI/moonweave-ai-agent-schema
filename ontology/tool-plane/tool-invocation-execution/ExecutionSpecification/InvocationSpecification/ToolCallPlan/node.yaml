source_claims:
  - id: claim-tool-call-plan-001
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 tools/call binds one published tool name to one concrete arguments object, while Tool inputSchema and optional outputSchema remain reusable declarations. Moonweave uses ToolCallPlan for the proposed per-call target and argument binding before execution begins.
    locator: Server Features > Tools > Protocol Messages > Calling Tools; Data Types > Tool and Output Schema
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-tool-call-plan-002
    source: eng-fw-openai-function-schema
    supports: OpenAI FuncSchema fixes a callable name and JSON Schema parameter contract before handler execution. Moonweave uses this primary evidence to delimit ToolCallPlan as specification with the reviewed boundary stated in its definition.
    locator: Function schema > FuncSchema name, params_json_schema and strict_json_schema
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-tool-call-plan-003
    source: eng-fw-openai-hitl
    supports: OpenAI HITL records a pending tool call, a per-call approval or rejection, and later resumption of the original run. Moonweave uses this primary evidence to delimit ToolCallPlan as specification with the reviewed boundary stated in its definition.
    locator: Human-in-the-loop > Tool approval requests; approve, reject and resume
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-tool-call-plan-004
    source: eng-api-stripe-idempotency
    supports: Stripe documents that retrying a mutation with the same idempotency key replays the first saved response instead of repeating the external effect. Moonweave uses this primary evidence to delimit ToolCallPlan as specification with the reviewed boundary stated in its definition.
    locator: API Reference > Idempotent requests > replaying a request with the same key
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-tool-call-plan-005
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 clients discover a Tool declaration before calling its name. Moonweave pins the reviewed declaration revision as tool_definition_ref so later schema validation is reproducible.
    locator: Server Features > Tools > Protocol Messages > Listing Tools and Calling Tools; Data Types > Tool
    evidence_kind: design-inference
    confidence: high
    review_status: pending
