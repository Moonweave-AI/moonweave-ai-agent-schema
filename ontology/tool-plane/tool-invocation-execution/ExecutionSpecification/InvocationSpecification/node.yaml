  relation_kind: hierarchy
  labels: {zh: 是执行规格的一种, en: is an execution-specification subtype, ja: 実行仕様の下位型である}
  definition: {zh: 调用规格是聚焦单次本地调用计划的执行规格, en: An InvocationSpecification is an ExecutionSpecification focused on one local invocation plan, ja: InvocationSpecification は一つのローカル呼び出し計画に焦点を当てた ExecutionSpecification である}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_invocation_specification, labels: {zh: 具有调用规格, en: has invocation specification, ja: 呼び出し仕様を持つ}}
  conditions: []
  temporal_scope: configuration
  boundary_context: This edge classifies a local execution-policy subtype and does not express a dispatched call or protocol request.
  constraints: []
  examples: []
  source_claims: [moonweave-invocation-specification]
  distinct_fact_rationale: It is a genuine subtype because every InvocationSpecification is an ExecutionSpecification with additional invocation-planning constraints. It uses one same-record identity in which local_invocation_specification_id identifies the same local ExecutionSpecification record, so a second ExecutionSpecification reference field is not permitted.
relations: []
