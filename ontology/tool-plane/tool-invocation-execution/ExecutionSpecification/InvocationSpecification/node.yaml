    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 separates the published Tool definition and its inputSchema/outputSchema from each tools/call request, result, protocol error, and execution error. Moonweave uses that boundary to specialize InvocationSpecification from the reusable ExecutionSpecification without treating a call occurrence as its parent.
    locator: Server Features > Tools > Protocol Messages > Calling Tools; Data Types > Tool, Output Schema and Error Handling
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-invocation-specification-002
    source: eng-fw-openai-function-schema
    supports: OpenAI FuncSchema fixes a callable name and JSON Schema parameter contract before handler execution. Moonweave uses this primary evidence to delimit InvocationSpecification as specification with the reviewed boundary stated in its definition.
    locator: Function schema > FuncSchema name, params_json_schema and strict_json_schema
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-invocation-specification-003
    source: eng-fw-openai-hitl
    supports: OpenAI HITL records a pending tool call, a per-call approval or rejection, and later resumption of the original run. Moonweave uses this primary evidence to delimit InvocationSpecification as specification with the reviewed boundary stated in its definition.
