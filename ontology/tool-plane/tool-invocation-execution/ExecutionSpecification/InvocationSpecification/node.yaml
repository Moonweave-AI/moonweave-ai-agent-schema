schema: moonweave.ai/ontology-node/v1
id: InvocationSpecification
kind: concept
status: accepted
labels:
  zh: 调用规范
  en: Invocation Specification
  ja: 呼び出し仕様
semantics:
  short_definition:
    zh: 调用规范是约束一次或一类调用如何绑定目标、参数、时限与返回的规格。
    en: An Invocation Specification constrains how one call or call family binds a target, arguments, limits, and return contract.
    ja: 呼び出し仕様は一呼出しまたは呼出し種別の target・argument・limit・return contract を制約する仕様です。
  definition:
    zh: 调用规范是一种 ExecutionSpecification，沿用其 specification_id 与 version，并继承输入、结果、时限、批准与效果合同；它的种差是引用一个已发布 CapabilityDefinition 版本作为可调用目标。它可以治理多次 Invocation，但不记录某次请求的实参、开始时刻、尝试、诊断或返回结果。
    en: An Invocation Specification is an ExecutionSpecification that retains its specification_id and version and inherits its input, result, timeout, approval, and effect contract. Its differentia is a reference to one published CapabilityDefinition revision as the callable target. It may govern many Invocations but records no request arguments, start time, attempt, diagnostic, or returned result.
    ja: 呼び出し仕様は ExecutionSpecification の specification_id/version と input・result・timeout・approval・effect contract を継承し、一 published CapabilityDefinition revision を callable target として参照することを種差とします。複数 Invocation を統制できますが request arguments・start time・attempt・diagnostic・returned result は記録しません。
  why_needed:
    zh: 把规范与发生事实分开后，同一安全约束可治理多次调用，而历史调用仍能指向当时使用的确切版本。
    en: Separating specification from occurrences lets one safety contract govern many invocations while historical calls retain the exact version used.
    ja: specification と occurrence を分離し一 safety contract が複数 invocation を統制し historical call が使用版を保持できます。
  includes:
    - zh: 纳入具有稳定版本、目标定义引用、参数合同和执行约束的调用规格。
      en: Includes versioned invocation specifications with a target-definition reference, argument contract, and execution constraints.
      ja: stable version・target definition reference・argument contract・execution constraint を持つ invocation specification を含みます。
  excludes:
    - zh: 排除一次请求中的实参记录、发生中的 ToolCall、ToolDefinition 本身和执行结果。
      en: Excludes concrete arguments in one request, an occurring ToolCall, the ToolDefinition itself, and execution results.
      ja: 一 request の concrete arguments、occurring ToolCall、ToolDefinition 自体、execution result を除きます。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: definition_ref
      labels:
        zh: 能力定义引用
        en: capability-definition reference
        ja: 能力定義参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向提供参数与结果 Schema 的稳定能力定义版本。
        en: References the stable capability-definition version supplying argument and result schemas.
        ja: argument/result schema を供給する stable capability definition version を参照します。
      allowed_values: []
      pattern: null
