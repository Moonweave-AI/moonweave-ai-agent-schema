      en: Weather specification 3.1 fixes tool definition v3, a thirty-second timeout, read-only effects, and a structured return contract for many city-query invocations.
      ja: weather specification 3.1 が tool definition v3・三十秒 timeout・read-only effect・structured return contract を固定し複数 city query に使われます。
