schema: moonweave.ai/ontology-node/v1
id: InvocationSpecification
kind: concept
labels:
  zh: 调用规格
  en: Invocation specification
  ja: 呼び出し仕様
semantics:
  short_definition:
    zh: 说明主机准备以何种目标、派发模式和审批策略执行本地调用的执行规格子类。
    en: An execution-specification subtype describing the target, dispatch mode, and approval policy a host plans for a local invocation.
    ja: ホストがローカル呼び出しに予定する対象、配信モード、承認ポリシーを記述する実行仕様の下位型。
  definition:
    zh: >-
      InvocationSpecification 是面向预期调用的 Moonweave 本地执行策略。它作为同一条 ExecutionSpecification 记录的调用规划子类型，并描述本地目标类型、派发模式、可选幂等键和审批要求；它不是 MCP tools/call 请求、OpenAI Responses tool_choice 字段、mcp_approval_request item 或 A2A SendMessageRequest，这些原生记录有各自字段和时序。
    en: >
      An InvocationSpecification is a Moonweave local execution policy focused on a prospective
      invocation. It is the same local ExecutionSpecification record classified for invocation planning and describes local target kind,
      dispatch mode, optional idempotency key, and approval requirement. It does not equal an MCP
      tools/call request, an OpenAI Responses tool_choice field, an mcp_approval_request item, or an
      A2A SendMessageRequest. Those are native records with their own field names and timing.
    ja: >-
      InvocationSpecification は予定された呼び出しに焦点を当てる Moonweave のローカル実行方針である。同一の ExecutionSpecification レコードを呼び出し計画として分類し、ローカル対象種別、配信モード、任意の冪等キー、承認要件を記述する。MCP tools/call 要求、OpenAI Responses tool_choice 項目、mcp_approval_request item、A2A SendMessageRequest とは同一ではなく、それらは固有のフィールドと時機を持つ。
  why_needed:
    zh: >-
      安全调用的规划要求主机将准备派发的内容与已经发送的内容分离。该记录使意图可审查，同时不会把审批偏好当作用户同意的证明或独立于重试的协议保证。
    en: >
      Planning a safe call requires a host to separate what it intends to dispatch from what has
      already been sent. This record makes intent reviewable without treating an approval preference
      as proof of user consent or a retry-independent protocol guarantee.
    ja: >-
      安全な呼び出しの計画では、ホストは配信しようとする内容を既に送信した内容から分離する必要がある。この記録は、承認設定をユーザー同意の証明や再試行と独立したプロトコル保証と扱わずに、意図をレビュー可能にする。
  includes:
    - {zh: 同一条本地执行规格记录的调用规划身份, en: Same-record execution-specification identity for invocation planning, ja: 呼び出し計画の同一レコード実行仕様 ID}
    - {zh: 目标类型、派发模式和审批要求, en: "Target kind, dispatch mode, and approval requirement", ja: 対象種別、配信モード、承認要件}
  excludes:
    - {zh: 已发送请求或已发生的调用尝试, en: A sent request or an occurred invocation attempt, ja: 送信済み要求または発生済み呼び出し試行}
    - {zh: 协议原生的审批或工具选择载荷, en: A protocol-native approval or tool-selection payload, ja: プロトコルネイティブな承認またはツール選択ペイロード}
  semantic_kind: information
  aliases:
    - {language: en, value: invocation policy, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      规划器在派发前建立此本地记录，派发适配器随后创建恰当的原生载荷，例如 MCP tools/call、OpenAI Responses 请求或调用流、A2A SendMessage。远程 MCP 若要求审批，Responses API 会生成原生 mcp_approval_request item，本地 approval_required 不能替代它。
    en: >
      A planner builds this local record before dispatch. The dispatch adapter then creates the
      appropriate native payload: MCP tools/call, an OpenAI Responses request or emitted call flow,
      or A2A SendMessage. If a remote MCP server requires approval, the Responses API emits a native
      mcp_approval_request item; local approval_required cannot substitute for that item.
    ja: >-
      プランナーは配信前にこのローカル記録を構築し、配信 adapter が MCP tools/call、OpenAI Responses 要求または生成された call flow、A2A SendMessage など適切なネイティブ payload を作る。リモート MCP サーバーが承認を必要とする場合は Responses API がネイティブ mcp_approval_request item を生成し、ローカル approval_required はそれを代替できない。
  typical_input:
    - description: A host plans a manually approved remote-MCP invocation.
      format: '{"local_invocation_specification_id":"invoke-spec-9","local_target_kind":"tool","local_dispatch_mode":"synchronous","local_approval_requirement":"host_review"}'
      source_claims: [moonweave-invocation-specification]
  typical_output:
    - description: The adapter selects a source-specific dispatch path without emitting it yet.
      format: '{"local_invocation_specification_id":"invoke-spec-9","local_dispatch_status":"planned"}'
      source_claims: [moonweave-invocation-specification]
  reference_implementations:
    - name: OpenAI Function Calling guide
      url: https://developers.openai.com/api/docs/guides/function-calling
      description: Defines provider tool-choice behavior.
    - name: OpenAI MCP and Connectors guide
      url: https://developers.openai.com/api/docs/guides/tools-connectors-mcp
      description: Defines remote-MCP approval items.
structure:
  identity_keys: [local_invocation_specification_id]
  fields:
    - id: local_invocation_specification_id
      labels: {zh: 本地调用规格标识, en: Local invocation specification ID, ja: ローカル呼び出し仕様 ID}
      definitions: {zh: 主机为本地调用规格分配的标识, en: The identifier assigned by the host to this local invocation specification, ja: このローカル呼び出し仕様にホストが割り当てる識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: invoke-spec-9
      allowed_values: []
      source_claims: [moonweave-invocation-specification]
    - id: local_target_kind
      labels: {zh: 本地目标类别, en: Local target kind, ja: ローカル対象種別}
      definitions: {zh: 适配器选择使用的本地目标分类, en: A local target classification used for adapter selection, ja: アダプター選択に使うローカル対象分類}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: tool
      allowed_values: [tool, command, remote_agent, prompt, resource]
      source_claims: [moonweave-invocation-specification]
    - id: local_dispatch_mode
      labels: {zh: 本地派发模式, en: Local dispatch mode, ja: ローカル配信モード}
      definitions: {zh: 主机是否等待此调用的本地调度选择, en: A host scheduling choice for whether it waits on this invocation, ja: この呼び出しを待機するかに関するホストのスケジューリング選択}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: synchronous
      allowed_values: [synchronous, asynchronous]
      source_claims: [moonweave-invocation-specification]
    - id: local_idempotency_key
      labels: {zh: 本地幂等键, en: Local idempotency key, ja: ローカル冪等キー}
      definitions: {zh: 主机用于避免重复派发的可选本地键，不是所有协议都定义的字段, en: An optional host key used to avoid duplicate dispatch; it is not a field defined by every protocol, ja: 重複配信回避に用いる任意のホストキーであり全プロトコルの定義項目ではない}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: idem-weather-20260719-01
      allowed_values: []
      source_claims: [moonweave-invocation-specification]
    - id: local_approval_requirement
      labels: {zh: 本地审批要求, en: Local approval requirement, ja: ローカル承認要件}
      definitions: {zh: 主机在派发前采用的本地审批策略，不等同于原生审批 item, en: A local approval policy used by the host before dispatch; it is not a native approval item, ja: 配信前にホストが使うローカル承認ポリシーでありネイティブ承認 item ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: host_review
      allowed_values: [host_review, policy_auto, prohibited]
      source_claims: [moonweave-invocation-specification, openai-remote-mcp-approvals]
    - id: local_specification_id
      labels: {zh: 本地规格标识, en: Local specification ID, ja: ローカル仕様 ID}
      definitions: {zh: 主机为该配置记录分配的本地稳定标识, en: A host-assigned stable identifier for this local configuration record, ja: このローカル設定記録に対するホスト割当ての安定識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: exec-spec-7
      allowed_values: []
      source_claims: [moonweave-invocation-specification]
    - id: local_timeout_ms
      labels: {zh: 本地超时毫秒数, en: Local timeout milliseconds, ja: ローカルタイムアウトミリ秒}
      definitions: {zh: 主机等待本次执行的最长本地时长, en: The maximum local duration for which the host waits for this execution, ja: ホストがこの実行を待機する最大ローカル時間}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 30000
      allowed_values: []
      source_claims: [moonweave-invocation-specification]
    - id: local_retry_limit
      labels: {zh: 本地重试上限, en: Local retry limit, ja: ローカル再試行上限}
      definitions: {zh: 主机可创建的额外尝试次数，不是远程协议字段, en: The number of additional attempts a host may create; it is not a remote protocol field, ja: ホストが作成できる追加試行回数でありリモートプロトコル項目ではない}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims: [moonweave-invocation-specification]
    - id: local_concurrency_limit
      labels: {zh: 本地并发上限, en: Local concurrency limit, ja: ローカル並行実行上限}
      definitions: {zh: 主机允许此规格同时运行的调用数量, en: The number of calls the host permits concurrently under this specification, ja: この仕様の下でホストが同時に許可する呼び出し数}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 4
      allowed_values: []
      source_claims: [moonweave-invocation-specification]
    - id: local_surface
      labels: {zh: 本地执行表面, en: Local execution surface, ja: ローカル実行表面}
      definitions: {zh: 用于选择适配器的本地来源分类，不是协议枚举, en: "A local source classification used to select an adapter, not a protocol enum", ja: アダプター選択に使うローカルのソース分類でありプロトコル列挙値ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp_tools_call
      allowed_values: [mcp_tools_call, openai_responses_function, openai_responses_remote_mcp, a2a_send_message, local_command]
      source_claims: [moonweave-invocation-specification]
  constraints:
    - id: invocation-spec-references-execution-spec
      severity: error
      expression_language: plain
      expression: "local_invocation_specification_id identifies the same local ExecutionSpecification record classified for invocation planning."
      explanation:
        zh: 执行规格引用必须指向同一主机策略上下文中可用的 ExecutionSpecification。
        en: The execution-specification reference identifies an ExecutionSpecification available in the same host policy context.
        ja: 実行仕様参照は同じホストポリシー文脈で利用可能な ExecutionSpecification を示す。
      source_claims: [moonweave-invocation-specification]
    - id: invocation-spec-is-not-approval-event
      severity: error
      expression_language: plain
      expression: local_approval_requirement describes host intent and does not prove an OpenAI mcp_approval_request or a user approval response occurred.
      explanation:
        zh: 本地审批要求仅描述主机意图，不能证明 mcp_approval_request 或用户审批响应已发生。
        en: A local approval requirement only describes host intent; it does not prove an mcp_approval_request or user approval response occurred.
        ja: ローカル承認要件はホストの意図を示すだけで、mcp_approval_request やユーザー承認応答の発生を証明しない。
      source_claims: [openai-remote-mcp-approvals, moonweave-invocation-specification]
    - id: invocation-specification-id-same-record-parent-identity
      severity: error
      expression_language: plain
      expression: "local_invocation_specification_id = local_specification_id; both identify the same local ExecutionSpecification record and inherited parent fields belong to that one record."
      explanation: {zh: "local_invocation_specification_id 与 local_specification_id 标识同一条本地 ExecutionSpecification 记录，继承的父字段属于该同一记录。", en: "The child and parent IDs are equal representations of one local record, not a link to a second parent record.", ja: "local_invocation_specification_id と local_specification_id は同じローカル ExecutionSpecification レコードを識別し、継承した親フィールドはその一つのレコードに属する。"}
      source_claims: [moonweave-invocation-specification]
  required_relations: []
examples:
  - id: invocation-spec-positive-tool

    labels: {zh: 已规划的工具调用, en: Planned tool invocation, ja: 計画済みツール呼び出し}

    descriptions:
      zh: ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]；Anthropic content:[{type:"tool_use",id:"toolu_01",name:"get_weather",input:{location:"Paris"}}]；Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。
      en: ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]; Anthropic content:[{type:"tool_use",id:"toolu_01",name:"get_weather",input:{location:"Paris"}}]; Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}}).
      ja: ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]。Anthropic tool_use。Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。
    field_values: {local_invocation_specification_id: invoke-spec-9, local_target_kind: tool, local_dispatch_mode: synchronous, local_approval_requirement: host_review}
    related_node_ids: [InvocationSpecification, ExecutionSpecification, ToolCallPlan]
    related_relation_ids: [InvocationSpecification-is_a-ExecutionSpecification]

    source_claims: [moonweave-invocation-specification]
  - id: invocation-spec-counterexample-missing-target-kind

    labels: {zh: 缺少目标类别, en: Missing target kind, ja: 対象種別の欠落}

    descriptions:
      zh: 反例：ReAct Action 无对应 Observation 就继续推理；Anthropic tool_use 缺少配对 tool_result(tool_use_id)；Vercel AI SDK execute 抛错未捕获。
      en: Counterexample: ReAct continues reasoning without Observation for Action; Anthropic tool_use missing paired tool_result(tool_use_id); Vercel AI SDK execute error uncaught.
      ja: 反例：ReAct Action に Observation なしで reasoning 継続。Anthropic tool_use に tool_result ペア欠落。Vercel AI SDK execute エラー未捕捉。
    field_values: {local_invocation_specification_id: invoke-spec-bad, local_dispatch_mode: synchronous, local_approval_requirement: host_review}
    related_node_ids: [InvocationSpecification]
    related_relation_ids: [InvocationSpecification-is_a-ExecutionSpecification]

    source_claims: [moonweave-invocation-specification]
  - id: invocation-spec-boundary-openai-approval

    labels: {zh: 本地策略与原生审批边界, en: Local policy versus native approval boundary, ja: ローカルポリシーとネイティブ承認の境界}

    descriptions:
      zh: ReAct 文本 Action 标记 vs Anthropic structured tool_use vs Vercel AI SDK Zod schema tool 的 wire 契约边界；本地 Invocation 活动非原生封包。
      en: Wire contract boundary among ReAct text Action markers, Anthropic structured tool_use, Vercel AI SDK Zod schema tools; local Invocation activity is not native envelope.
      ja: ReAct テキスト Action marker、Anthropic structured tool_use、Vercel AI SDK Zod schema tool の wire 契約境界。ローカル Invocation 活動はネイティブ envelope ではない。
    field_values: {local_invocation_specification_id: invoke-spec-9, local_target_kind: tool, local_dispatch_mode: synchronous, local_approval_requirement: host_review}
    related_node_ids: [InvocationSpecification, ToolCallPlan, ToolCall]
    related_relation_ids: [InvocationSpecification-is_a-ExecutionSpecification]

    source_claims: [openai-remote-mcp-approvals, moonweave-invocation-specification]
  - id: invocation-spec-instance-a2a-dispatch

    labels: {zh: A2A 派发计划实例, en: A2A dispatch-plan instance, ja: A2A 配信計画インスタンス}

    descriptions:
      zh: ReAct HotpotQA 实例：Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup[Arthur's Magazine]→Finish[1850]；Anthropic tool_use_id=toolu_01A09q90qw90 配对 tool_result。
      en: ReAct HotpotQA instance: Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup→Finish[1850]; Anthropic tool_use_id=toolu_01A09q90qw90 paired with tool_result.
      ja: ReAct HotpotQA 実例：Thought→Action: Search→Observation→Lookup→Finish[1850]。Anthropic tool_use_id=toolu_01A09q90qw90 が tool_result とペア。
    field_values: {local_invocation_specification_id: invoke-spec-a2a, local_target_kind: remote_agent, local_dispatch_mode: asynchronous, local_idempotency_key: idem-a2a-01, local_approval_requirement: host_review}
    related_node_ids: [InvocationSpecification, AgentAsToolInvocation]
    related_relation_ids: [InvocationSpecification-is_a-ExecutionSpecification]

    source_claims: [moonweave-invocation-specification]
parent_relation:
  id: InvocationSpecification-is_a-ExecutionSpecification
  predicate: is_a
