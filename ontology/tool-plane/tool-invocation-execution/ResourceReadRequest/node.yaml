schema: moonweave.ai/ontology-node/v1
id: ResourceReadRequest
kind: concept
labels: {zh: 资源读取请求记录, en: Resource-read request record, ja: リソース読取要求記録}
semantics:
  short_definition: {zh: 被一次 Invocation 使用的本地 MCP resources/read 请求实体, en: A local MCP resources/read request Entity used by one Invocation, ja: 一つの Invocation により使用されるローカル MCP resources/read 要求 Entity}
  definition:
    zh: >-
      ResourceReadRequest 是 Moonweave 本地固定方面请求实体，由 Invocation 使用并与一个原生 MCP resources/read 请求关联。它保存选定 URI、本地授权观察和原生请求引用；它不是 JSON-RPC 封包、ToolCall 或成功时生成的 ResourceReadResult。
    en: >
      A ResourceReadRequest is a Moonweave local, fixed-aspect request Entity that an Invocation uses and that correlates
      with one native MCP resources/read request. It stores the selected URI, local authorization
      observation, and a native-request reference. It is not the JSON-RPC envelope, a ToolCall, or
      the ResourceReadResult produced on success.
    ja: >-
      ResourceReadRequest は Invocation により使用され、一つのネイティブ MCP resources/read request と相関する Moonweave ローカル固定側面 request Entity である。選択した URI、ローカル authorization observation、native request reference を保存する。JSON-RPC envelope、ToolCall、成功時に生成される ResourceReadResult ではない。
  why_needed:
    zh: >-
      MCP resources 是 URI 寻址的只读上下文，具有 URI 校验、访问控制和二进制编码要求。本地请求实体让这些策略观察与原生请求及返回的资源内容分离。
    en: >
      MCP resources are URI-addressed read-only context and have URI-validation, access-control, and
      binary-encoding requirements. A local request Entity keeps those policy observations separate
      from the native request and from returned resource content.
    ja: >-
      MCP resources は URI addressable な read-only context であり、URI validation、access control、binary encoding の要件がある。ローカル request Entity はこれらの policy observation を native request と返却 resource content から分離する。
  includes:
    - {zh: 本地请求标识、调用引用、资源 URI、原生请求引用和本地授权观察, en: "Local request ID, invocation reference, resource URI, native request reference, and local authorization observation", ja: ローカル要求 ID、呼出し参照、リソース URI、ネイティブ要求参照、ローカル認可観測}
  excludes:
    - {zh: MCP resources/read JSON-RPC envelope, en: An MCP resources/read JSON-RPC envelope, ja: MCP resources/read JSON-RPC envelope}
    - {zh: ResourceReadResult 内容或 ToolCall, en: ResourceReadResult content or ToolCall, ja: ResourceReadResult 内容または ToolCall}
  semantic_kind: entity
  aliases:
    - {language: en, value: local resource retrieval request, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      原生请求是带 uri 的 resources/read JSON-RPC 请求，成功响应返回 result.contents，缺失资源可返回 JSON-RPC -32002。本地记录只保留 URI 关联和主机本地授权观察，不复制 wire 请求，也不把资源读取变成工具调用。
    en: >
      The native request is {"jsonrpc":"2.0","id":2,"method":"resources/read",
      "params":{"uri":"file:///project/src/main.rs"}}. A native success response returns
      result.contents; a missing resource can return JSON-RPC -32002. The local record only retains
      URI correlation and host-local authorization observation; it does not copy the wire request or
      make a resource read a tool call.
    ja: >-
      ネイティブ request は uri を持つ resources/read JSON-RPC request であり、success response は result.contents を返し、見つからない resource は JSON-RPC -32002 になり得る。ローカル record は URI correlation と host-local authorization observation のみを保持し、wire request を複製せず resource read を tool call にしない。
  typical_input:
    - description: Native MCP resources/read request.
      format: '{"jsonrpc":"2.0","id":2,"method":"resources/read","params":{"uri":"file:///project/src/main.rs"}}'
      source_claims: [mcp-resource-read]
  typical_output:
    - description: Local resource-read request record.
      format: '{"local_resource_read_request_id":"resource-read-42","local_invocation_ref":"invocation-42","local_resource_uri":"file:///project/src/main.rs","local_mcp_request_ref":"mcp-session-42#id-2","local_authorization_observation":"authorized"}'
      source_claims: [moonweave-resource-read-request]
  reference_implementations:
    - name: Model Context Protocol Resources specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
      description: Defines resources/read request, errors, and security obligations.
structure:
  identity_keys: [local_resource_read_request_id]
  fields:
    - id: local_resource_read_request_id
      labels: {zh: 本地资源读取请求标识, en: Local resource-read request ID, ja: ローカル resource-read 要求 ID}
      definitions: {zh: 主机分配给资源检索请求记录的标识, en: Identifier assigned by the host to the resource-retrieval request record, ja: リソース検索要求記録にホストが割り当てる識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: resource-read-42
      allowed_values: []
      source_claims: [moonweave-resource-read-request]
    - id: local_invocation_ref
      labels: {zh: 调用引用, en: Invocation reference, ja: Invocation 参照}
      definitions: {zh: 此资源读取所属的 Invocation, en: Invocation to which this resource read belongs, ja: このリソース読取が属する Invocation}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: invocation-42
      allowed_values: []
      source_claims: [moonweave-resource-read-request]
    - id: local_resource_uri
      labels: {zh: 本地资源 URI, en: Local resource URI, ja: ローカルリソース URI}
      definitions: {zh: 从原生 resources/read params.uri 复制以供审计的 URI, en: URI copied for audit from native resources/read params.uri, ja: 監査用にネイティブ resources/read params.uri から複写した URI}
      datatype: uri
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: file:///project/src/main.rs
      allowed_values: []
      source_claims: [mcp-resource-read]
    - id: local_mcp_request_ref
      labels: {zh: MCP 原生请求引用, en: MCP native request reference, ja: MCP ネイティブ要求参照}
      definitions: {zh: 指向保留的 resources/read JSON-RPC 请求对象的本地引用, en: Local reference to the retained resources/read JSON-RPC request object, ja: 保持された resources/read JSON-RPC 要求オブジェクトへのローカル参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp-session-42#id-2
      allowed_values: []
      source_claims: [mcp-resource-read, moonweave-resource-read-request]
    - id: local_authorization_observation
      labels: {zh: 本地授权观察, en: Local authorization observation, ja: ローカル認可観測}
      definitions: {zh: 主机对 URI 验证和访问决定的局部观察，不替代服务器权限状态, en: "Host-local observation of URI validation and access decision, not a replacement for server permission state", ja: URI 検証とアクセス決定に対するホストローカル観測でありサーバー権限状態の置換ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: authorized
      allowed_values: [pending, authorized, denied]
      source_claims: [mcp-resource-errors-security, moonweave-resource-read-request]
    - id: local_requested_at
      labels: {zh: 本地请求时间, en: Local requested-at time, ja: ローカル要求時刻}
      definitions: {zh: 主机记录请求的时间戳, en: Host-recorded request timestamp, ja: ホスト記録の要求時刻}
      datatype: date-time
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: "2026-07-19T09:00:00Z"
      allowed_values: []
      source_claims: [moonweave-resource-read-request]
  constraints:
    - id: resource-read-request-uri-matches-native
      severity: error
      expression_language: plain
      expression: local_mcp_request_ref identifies a retained resources/read request whose params.uri equals local_resource_uri.
      explanation: {zh: local_mcp_request_ref 必须指向 params.uri 等于 local_resource_uri 的保留 resources/read 请求, en: local_mcp_request_ref identifies a retained resources/read request whose params.uri equals local_resource_uri, ja: local_mcp_request_ref は params.uri が local_resource_uri と一致する保持済み resources/read 要求を示す}
      source_claims: [mcp-resource-read, moonweave-resource-read-request]
    - id: resource-read-request-denial-has-no-success-result
      severity: error
      expression_language: plain
      expression: A request with local_authorization_observation denied must not claim a successful ResourceReadResult from that request.
      explanation: {zh: local_authorization_observation 为 denied 的请求不得声称产生成功 ResourceReadResult, en: A request whose local_authorization_observation is denied cannot claim a successful ResourceReadResult, ja: local_authorization_observation が denied の要求は成功 ResourceReadResult を主張できない}
      source_claims: [mcp-resource-errors-security, moonweave-resource-read-request]
  required_relations: [ResourceReadRequest-was_used_by-Invocation]
examples:
  - id: resource-read-request-positive-file

    labels: {zh: 源文件资源读取请求, en: Source-file resource-read request, ja: ソースファイルリソース読取要求}

    descriptions:
      zh: "Semantic Kernel PromptTemplate 与 kernel.invoke(function_name,args)；LangChain PromptTemplate.format()；MCP prompts/get name=code_review arguments={code:\"...\"}。"
      en: "Semantic Kernel PromptTemplate and kernel.invoke(function_name,args); LangChain PromptTemplate.format(); MCP prompts/get name=code_review arguments={code:\"...\"}."
      ja: Semantic Kernel PromptTemplate。LangChain PromptTemplate.format()。MCP prompts/get name=code_review。
    field_values: {local_resource_read_request_id: resource-read-42, local_invocation_ref: invocation-42, local_resource_uri: file:///project/src/main.rs, local_mcp_request_ref: mcp-session-42#id-2, local_authorization_observation: authorized}
    related_node_ids: [ResourceReadRequest, Invocation, ResourceReadResult]
    related_relation_ids: [ResourceReadRequest-was_used_by-Invocation]

    source_claims: [mcp-resource-read, mcp-resource-errors-security, moonweave-resource-read-request]
  - id: resource-read-request-counterexample-tool-call

    labels: {zh: 将资源读取伪装为工具调用, en: Resource read mislabeled as tool call, ja: ツール呼出しと誤分類されたリソース読取}

    descriptions:
      zh: 反例：MCP resources/read uri 未订阅就假定内容可用；Semantic Kernel prompt 参数未验证即实例化。
      en: Counterexample: assuming MCP resources/read uri content without subscription; Semantic Kernel prompt instantiated without argument validation.
      ja: 反例：MCP resources/read uri 未購読で内容可用を仮定。Semantic Kernel prompt 引数未検証でインスタンス化。
    field_values: {local_resource_read_request_id: resource-read-bad, local_invocation_ref: invocation-43, local_resource_uri: file:///project/src/main.rs, local_mcp_request_ref: mcp-session-42#id-3, local_authorization_observation: authorized}
    related_node_ids: [ResourceReadRequest, ToolCall]
    related_relation_ids: [ResourceReadRequest-was_used_by-Invocation]

    source_claims: [mcp-resource-read, moonweave-resource-read-request]
  - id: resource-read-request-boundary-native-envelope

    labels: {zh: 原生请求与本地记录边界, en: Native request versus local-record boundary, ja: ネイティブ要求とローカル記録の境界}

    descriptions:
      zh: MCP Prompt/Resource 能力 vs LangChain PromptTemplate vs Semantic Kernel 模板函数的声明-实例化边界。
      en: Declaration-instantiation boundary among MCP Prompt/Resource capability, LangChain PromptTemplate, Semantic Kernel template functions.
      ja: MCP Prompt/Resource、LangChain PromptTemplate、Semantic Kernel テンプレート関数の宣言-インスタンス化境界。
    field_values: {local_resource_read_request_id: resource-read-44, local_invocation_ref: invocation-44, local_resource_uri: resource://docs/readme, local_mcp_request_ref: mcp-session-42#id-4, local_authorization_observation: pending}
    related_node_ids: [ResourceReadRequest, Invocation]
    related_relation_ids: [ResourceReadRequest-was_used_by-Invocation]

    source_claims: [mcp-resource-read, moonweave-resource-read-request]
  - id: resource-read-request-instance-denied

    labels: {zh: 敏感资源拒绝实例, en: Sensitive-resource denial instance, ja: 機微リソース拒否実例}

    descriptions:
      zh: "MCP 实例：prompts/get name=summarize arguments={text:\"long article...\"} 返回 messages；resources/read uri=file:///data/config.json。"
      en: "MCP instance: prompts/get name=summarize arguments={text:\"long article...\"} returns messages; resources/read uri=file:///data/config.json."
      ja: MCP 実例：prompts/get name=summarize。resources/read uri=file:///data/config.json。
    field_values: {local_resource_read_request_id: resource-read-private-1, local_invocation_ref: invocation-private-1, local_resource_uri: file:///private/secrets.txt, local_mcp_request_ref: mcp-session-45#id-9, local_authorization_observation: denied}
    related_node_ids: [ResourceReadRequest, InvocationDiagnostic]
    related_relation_ids: [ResourceReadRequest-was_used_by-Invocation]

    source_claims: [mcp-resource-errors-security, moonweave-resource-read-request]
parent_relation: null
relations:
  - id: ResourceReadRequest-was_used_by-Invocation
    predicate: was_used_by
    target: concept:Invocation
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 被调用使用, en: was used by invocation, ja: Invocation により使用された}
    definitions: {zh: 当 Invocation 检查 URI、授权并提交该来源特定 resources/read 请求时，该请求实体被该 Invocation 使用, en: The request Entity is used by an Invocation when it checks URI and authorization and submits the source-specific resources/read request, ja: Invocation が URI と認可を検査してソース固有 resources/read 要求を送信するとき要求 Entity はその Invocation により使用される}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: uses, labels: {zh: 使用资源读取请求, en: uses resource-read request, ja: リソース読取要求を使用する}}
    conditions:
      - id: resource-read-request-use-condition
        severity: error
        expression_language: plain
        expression: Assert only when local_invocation_ref identifies the target Invocation and local_mcp_request_ref identifies the request evaluated or submitted by it.
        explanation: {zh: 未由调用使用的 URI 草稿不构成读取, en: A URI draft not used by an invocation does not establish a read, ja: Invocation により使用されていない URI 下書きは読取を確立しない}
        source_claims: [prov-entity-activity, moonweave-resource-read-request]
    temporal_scope: dispatch
    boundary_context: This edge records provenance use of a request Entity and does not make a native resources/read envelope a Moonweave subtype or activity component.
    constraints: []
    examples: []
    source_claims: [prov-entity-activity, moonweave-resource-read-request]
    distinct_fact_rationale: Resource-read request data is an input Entity used by activity, not a compositional child of invocation.
    layout_role: cross-link
