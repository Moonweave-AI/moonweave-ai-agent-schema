    locator: "Reading Resources; Error Handling; Security Considerations"
    relevance: Defines resources/read I/O, failure conditions, and security requirements.
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    locator: "prov:Entity; prov:Activity; prov:used; prov:wasUsedBy"
    relevance: Distinguishes resource-read request entities from activities that use them.
source_claims:
  - id: prov-entity-activity
    source: prov-o-core
    supports: PROV-O distinguishes an Entity from the Activity that uses it and defines the inverse wasUsedBy provenance relationship.
    locator: "PROV-O: prov:Entity, prov:Activity, prov:used, prov:wasUsedBy"
    evidence_kind: normative
    confidence: high
  - id: mcp-resource-read
    source: mcp-resources-2025-11-25
    supports: MCP resources/read is a JSON-RPC request with params.uri and success returns result.contents.
    locator: "Reading Resources"
    evidence_kind: normative
    confidence: high
  - id: mcp-resource-errors-security
    source: mcp-resources-2025-11-25
    supports: Missing resources can return JSON-RPC -32002, and servers must validate URIs, protect sensitive resources, and correctly encode binary data.
    locator: "Error Handling; Security Considerations"
    evidence_kind: normative
    confidence: high
  - id: moonweave-resource-read-request
    source: mcp-resources-2025-11-25
    supports: Moonweave ResourceReadRequest is a local request component that references a native resources/read request without replacing its schema.
    locator: "Reading Resources"
    evidence_kind: design-inference
    confidence: high