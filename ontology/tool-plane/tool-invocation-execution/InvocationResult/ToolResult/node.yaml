schema: moonweave.ai/ontology-node/v1
id: ToolResult
kind: concept
labels: {zh: 工具结果记录, en: Tool result record, ja: ツール結果記録}
semantics:
  short_definition: {zh: 对一次工具调用结果的本地、来源保真的证据记录, en: A local provenance-preserving evidence record for one tool-call result, ja: 一つのツール呼出し結果に対するローカル出所保持証拠記録}
  definition:
    zh: >-
      ToolResult 是面向工具调用返回证据的 InvocationResult 子类，是带有明确来源表面的 Moonweave 本地记录。原生 MCP ToolResult、OpenAI Responses function_call_output 与 OpenAI Responses mcp_call 是不同的载荷契约，A2A Artifact 不是 ToolResult。
    en: >
      A ToolResult is an InvocationResult subtype for evidence returned by a tool-oriented call.
      It is a Moonweave local record with an explicit source surface. Native MCP ToolResult,
      OpenAI Responses function_call_output, and OpenAI Responses mcp_call are different payload
      contracts; an A2A Artifact is not a ToolResult.
    ja: >-
      ToolResult は tool-oriented call が返した evidence のための InvocationResult subtype であり、明示的 source surface を持つ Moonweave ローカル record である。ネイティブ MCP ToolResult、OpenAI Responses function_call_output、OpenAI Responses mcp_call は異なる payload contract であり、A2A Artifact は ToolResult ではない。
  why_needed:
    zh: >-
      主机需要将工具结果与尝试关联，同时不抹平协议差异。尤其 MCP content 和 structuredContent 不可与 Responses output 字符串互换，二者也都不是 A2A Task Artifact。
    en: >
      A host needs to correlate tool outcomes with attempts without erasing protocol distinctions.
      In particular, MCP content and structuredContent are not interchangeable with a Responses
      output string, and neither is an A2A Task Artifact.
    ja: >-
      ホストは protocol distinction を消さずに tool outcome を attempt と相関する必要がある。特に MCP content と structuredContent は Responses output string と交換可能ではなく、どちらも A2A Task Artifact ではない。
  includes:
    - {zh: 本地结果标识、调用引用、来源表面和原生证据引用, en: "Local result ID, call reference, source surface, and native evidence reference", ja: ローカル結果 ID、呼出し参照、ソース表面、ネイティブ証拠参照}
  excludes:
    - {zh: A2A Task Artifact, en: An A2A Task Artifact, ja: A2A Task Artifact}
    - {zh: JSON-RPC 协议错误本身, en: A JSON-RPC protocol error itself, ja: JSON-RPC プロトコルエラー自体}
  semantic_kind: entity
  aliases:
    - {language: en, value: local tool-outcome evidence, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      原生 MCP tools/call 返回含 content、可选 structuredContent 和 isError 的 ToolResult。OpenAI Responses API 中，function_call_output input item 则有 type、call_id 和 output；remote-MCP mcp_call output item 有 arguments、output、error、name 和 server_label。本地记录只存储一种表面并引用其原生形状，不合成共享 wire schema。
    en: >
      Native MCP tools/call returns a ToolResult object with content and optional structuredContent
      and isError. In the OpenAI Responses API, a function_call_output input item instead contains
      type, call_id, and output. A Responses remote-MCP mcp_call output item has arguments, output,
      error, name, and server_label. The local record stores one surface and references its native
      shape; it does not synthesize a shared wire schema.
    ja: >-
      ネイティブ MCP tools/call は content、任意の structuredContent、isError を持つ ToolResult object を返す。OpenAI Responses API では function_call_output input item は type、call_id、output を持ち、remote-MCP mcp_call output item は arguments、output、error、name、server_label を持つ。ローカル record は一つの surface を保存して native shape を参照し、共有 wire schema を合成しない。
  typical_input:
    - description: Native MCP ToolResult returned from a tools/call request.
      format: '{"content":[{"type":"text","text":"25 C"}],"structuredContent":{"temperature":25},"isError":false}'
      source_claims: [mcp-tool-result]
    - description: OpenAI Responses function_call_output input item.
      format: '{"type":"function_call_output","call_id":"call_12345xyz","output":"25 C"}'
      source_claims: [openai-function-output]
  typical_output:
    - description: Local evidence record pointing to one native result item.
      format: '{"local_tool_result_id":"tool-result-42","local_result_surface":"mcp_tool_result","local_native_result_ref":"mcp-session-42#id-2"}'
      source_claims: [moonweave-tool-result]
  reference_implementations:
    - name: Model Context Protocol Tools specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines ToolResult content, structuredContent, isError, and errors.
    - name: OpenAI Function Calling guide
      url: https://developers.openai.com/api/docs/guides/function-calling
      description: Defines Responses function_call_output items.
structure:
  identity_keys: [local_tool_result_id]
  fields:
    - id: local_tool_result_id
      labels: {zh: 本地工具结果标识, en: Local tool-result ID, ja: ローカルツール結果 ID}
      definitions: {zh: 主机分配给工具结果证据的标识, en: Identifier assigned by the host to tool-result evidence, ja: ツール結果証拠にホストが割り当てる識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: tool-result-42
      allowed_values: []
      source_claims: [moonweave-tool-result]
    - id: local_tool_call_ref
      labels: {zh: 工具调用引用, en: Tool-call reference, ja: ツール呼出し参照}
      definitions: {zh: 产生该结果的本地 ToolCall, en: The local ToolCall that produced this result, ja: この結果を生成したローカル ToolCall}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: tool-call-42
      allowed_values: []
      source_claims: [moonweave-tool-result]
    - id: local_result_surface
      labels: {zh: 本地结果来源表面, en: Local result source surface, ja: ローカル結果ソース表面}
      definitions: {zh: 原生结果契约所属的来源表面，不是原生 type 字段, en: Source surface owning the native result contract and not a native type field, ja: ネイティブ結果契約のソース表面でありネイティブ type 項目ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp_tool_result
      allowed_values: [mcp_tool_result, openai_function_call_output, openai_remote_mcp_call]
      source_claims: [mcp-tool-result, openai-function-output, openai-remote-mcp-result]
    - id: local_native_result_ref
      labels: {zh: 原生结果引用, en: Native result reference, ja: ネイティブ結果参照}
      definitions: {zh: 指向保留的 MCP 对象或 OpenAI Responses item 的可审计引用, en: Auditable reference to a retained MCP object or OpenAI Responses item, ja: 保持された MCP オブジェクトまたは OpenAI Responses item への監査可能参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp-session-42#id-2
      allowed_values: []
      source_claims: [moonweave-tool-result]
    - id: local_mcp_content_ref
      labels: {zh: MCP content 引用, en: MCP content reference, ja: MCP content 参照}
      definitions: {zh: 当来源表面为 mcp_tool_result 时，指向原生 content 或 structuredContent 的本地引用, en: Local reference to native content or structuredContent when the source surface is mcp_tool_result, ja: ソース表面が mcp_tool_result の場合のネイティブ content または structuredContent へのローカル参照}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: mcp-session-42#id-2/content/0
      allowed_values: []
      source_claims: [mcp-tool-result, moonweave-tool-result]
    - id: local_openai_call_id
      labels: {zh: OpenAI 调用标识, en: OpenAI call ID, ja: OpenAI call ID}
      definitions: {zh: 当来源为 Responses function_call_output 时从原生项复制的 call_id, en: call_id copied from a native Responses function_call_output item when that is the source, ja: ソースが Responses function_call_output の場合にネイティブ item から複写する call_id}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: call_12345xyz
      allowed_values: []
      source_claims: [openai-function-output]
    - id: local_result_id
      labels: {zh: 本地结果标识, en: Local result ID, ja: ローカル結果 ID}
      definitions: {zh: 主机分配给结果证据的标识, en: The identifier assigned by the host to result evidence, ja: 結果証拠に対するホスト割当て識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: result-42
      allowed_values: []
      source_claims: [moonweave-tool-result]
    - id: local_attempt_ref
      labels: {zh: 尝试引用, en: Attempt reference, ja: 試行参照}
      definitions: {zh: 产生该结果证据的 InvocationAttempt, en: The InvocationAttempt that produced this result evidence, ja: この結果証拠を生成した InvocationAttempt}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: attempt-42-1
      allowed_values: []
      source_claims: [moonweave-tool-result]
    - id: local_disposition
      labels: {zh: 本地结果处置, en: Local result disposition, ja: ローカル結果処置}
      definitions: {zh: 主机对结果证据的局部判断，不改写远端状态, en: The host's local disposition of result evidence and not a rewrite of remote state, ja: 結果証拠に対するホストのローカル判断でありリモート状態の書き換えではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: success
      allowed_values: [success, failure, partial, unknown]
      source_claims: [moonweave-tool-result]
    - id: local_result_kind
      labels: {zh: 本地结果类别, en: Local result kind, ja: ローカル結果種別}
      definitions: {zh: 选择具体本地结果子类的分类，不是协议 type 字段, en: "A classification selecting a concrete local result subtype, not a protocol type field", ja: 具体的ローカル結果下位型を選ぶ分類でありプロトコル type 項目ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: tool
      allowed_values: [tool, execution, resource_read]
      source_claims: [moonweave-tool-result]
  constraints:
    - id: tool-result-single-native-contract
      severity: error
      expression_language: plain
      expression: local_result_surface selects exactly one native contract; fields from MCP content, Responses output, and remote-MCP error are not claimed as one shared payload.
      explanation: {zh: local_result_surface 必须选择唯一原生契约；MCP content、Responses output 和远程 MCP error 不得合成共享载荷, en: "local_result_surface selects one native contract; MCP content, Responses output, and remote-MCP error must not become a shared payload", ja: local_result_surface は一つのネイティブ契約を選び、MCP content、Responses output、remote-MCP error を共有 payload にしてはならない}
      source_claims: [mcp-tool-result, openai-function-output, openai-remote-mcp-result, moonweave-tool-result]
    - id: tool-result-excludes-a2a-artifact
      severity: error
      expression_language: plain
      expression: An A2A Artifact may be referenced by a separate local remote-agent outcome record but is never represented as this ToolResult's native payload.
      explanation: {zh: A2A Artifact 可由独立远程代理结果记录引用，但不得作为本 ToolResult 的原生 payload, en: An A2A Artifact may be referenced by a separate remote-agent outcome record but not as this ToolResult's native payload, ja: A2A Artifact は別のリモートエージェント結果記録から参照できるがこの ToolResult のネイティブ payload にはならない}
      source_claims: [a2a-task-result, moonweave-tool-result]
    - id: tool-result-id-same-record-parent-identity
      severity: error
      expression_language: plain
      expression: "local_tool_result_id = local_result_id; both identify the same local InvocationResult record and inherited parent fields belong to that one record."
      explanation: {zh: "local_tool_result_id 与 local_result_id 标识同一条本地 InvocationResult 记录，继承的父字段属于该同一记录。", en: "The child and parent IDs are equal representations of one local record, not a link to a second parent record.", ja: "local_tool_result_id と local_result_id は同じローカル InvocationResult レコードを識別し、継承した親フィールドはその一つのレコードに属する。"}
      source_claims: [moonweave-tool-result]
  required_relations: []
examples:
  - id: tool-result-positive-mcp

    labels: {zh: MCP 天气工具结果, en: MCP weather tool result, ja: MCP 天気ツール結果}

    descriptions:
      zh: ReAct Observation: Search[Paris] 返回 "Paris has 2,165 hotels"；Anthropic 跟进 {role:"user",content:[{type:"tool_result",tool_use_id:"toolu_01A09q90qw90",content:"15°C, sunny"}]}。
      en: ReAct Observation: Search[Paris] returns "Paris has 2,165 hotels"; Anthropic follow-up {role:"user",content:[{type:"tool_result",tool_use_id:"toolu_01A09q90qw90",content:"15°C, sunny"}]}.
      ja: ReAct Observation: Search[Paris] が "Paris has 2,165 hotels" を返す。Anthropic フォローアップ {role:"user",content:[{type:"tool_result",tool_use_id:"toolu_01A09q90qw90",content:"15°C, sunny"}]}。
    field_values: {local_tool_result_id: tool-result-42, local_tool_call_ref: tool-call-42, local_result_surface: mcp_tool_result, local_native_result_ref: mcp-session-42#id-2, local_mcp_content_ref: mcp-session-42#id-2/content/0}
    related_node_ids: [ToolResult, InvocationResult, ToolCall]
    related_relation_ids: [ToolResult-is_a-InvocationResult]

    source_claims: [mcp-tool-result, moonweave-tool-result]
  - id: tool-result-counterexample-mixed-schema

    labels: {zh: 混合 MCP 与 Responses 字段, en: Mixed MCP and Responses fields, ja: MCP と Responses 項目の混在}

    descriptions:
      zh: 反例：Toolformer 执行 [Calculator(350/7)] 后未插入结果 token 50 就继续生成；Anthropic tool_result 的 tool_use_id 与 tool_use 不匹配。
      en: Counterexample: Toolformer continues generation without inserting result token 50 after [Calculator(350/7)]; Anthropic tool_result tool_use_id mismatches tool_use.
      ja: 反例：Toolformer が [Calculator(350/7)] 実行後 result token 50 未挿入で生成継続。Anthropic tool_result tool_use_id 不一致。
    field_values: {local_tool_result_id: tool-result-bad, local_tool_call_ref: tool-call-43, local_result_surface: mcp_tool_result, local_native_result_ref: mcp-session-42#id-3, local_openai_call_id: call_12345xyz}
    related_node_ids: [ToolResult]
    related_relation_ids: [ToolResult-is_a-InvocationResult]

    source_claims: [mcp-tool-result, openai-function-output, moonweave-tool-result]
  - id: tool-result-boundary-function-output

    labels: {zh: Responses 函数输出边界, en: Responses function-output boundary, ja: Responses 関数出力境界}

    descriptions:
      zh: Vercel AI SDK streamText 流式 tool result delta vs 完整 ToolResult 记录的聚合边界；Code Interpreter 图像输出非 text-only ToolResult。
      en: Boundary between Vercel AI SDK streamText streaming tool-result deltas vs aggregated ToolResult record; Code Interpreter image output is not text-only ToolResult.
      ja: Vercel AI SDK streamText ストリーミング tool result delta と完全 ToolResult 記録の集約境界。Code Interpreter 画像出力は text-only ToolResult ではない。
    field_values: {local_tool_result_id: tool-result-openai-1, local_tool_call_ref: tool-call-openai-1, local_result_surface: openai_function_call_output, local_native_result_ref: response-input-1/item/0, local_openai_call_id: call_12345xyz}
    related_node_ids: [ToolResult, ToolCall]
    related_relation_ids: [ToolResult-is_a-InvocationResult]

    source_claims: [openai-function-output, moonweave-tool-result]
  - id: tool-result-instance-remote-mcp

    labels: {zh: 远程 MCP 调用实例, en: Remote-MCP call instance, ja: リモート MCP 呼出し実例}

    descriptions:
      zh: OpenAI Assistants code_interpreter 实例：执行 plt.savefig 返回 image/png base64；Vercel AI SDK execute 返回 {temperature:15,unit:"C"} JSON。
      en: OpenAI Assistants code_interpreter instance: plt.savefig returns image/png base64; Vercel AI SDK execute returns {temperature:15,unit:"C"} JSON.
      ja: OpenAI Assistants code_interpreter 実例：plt.savefig が image/png base64 を返す。Vercel AI SDK execute が {temperature:15,unit:"C"} JSON を返す。
    field_values: {local_tool_result_id: tool-result-remote-1, local_tool_call_ref: tool-call-remote-1, local_result_surface: openai_remote_mcp_call, local_native_result_ref: response-42/output/mcp_1}
    related_node_ids: [ToolResult, ToolCall]
    related_relation_ids: [ToolResult-is_a-InvocationResult]

    source_claims: [openai-remote-mcp-result, moonweave-tool-result]
parent_relation:
  id: ToolResult-is_a-InvocationResult
  predicate: is_a
  target: concept:InvocationResult
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是调用结果记录的工具结果子类, en: is a tool-result subtype of invocation result, ja: InvocationResult のツール結果下位型である}
  definition: {zh: ToolResult 是按工具调用来源表面记录证据的 InvocationResult, en: ToolResult is an InvocationResult that records evidence by tool-call source surface, ja: ToolResult はツール呼出しソース表面ごとに証拠を記録する InvocationResult である}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_subtype, labels: {zh: 具有子类, en: has subtype, ja: 下位型を持つ}}
  conditions: []
  temporal_scope: timeless
  boundary_context: The hierarchy applies to local evidence records; it does not assert that MCP ToolResult, Responses items, and A2A objects are the same native type.
  constraints: []
  examples: []
  source_claims: [moonweave-tool-result]
  distinct_fact_rationale: ToolResult narrows local InvocationResult evidence to a tool-oriented source while preserving each source's native payload contract. It uses one same-record identity in which local_tool_result_id identifies the same local InvocationResult record, so a second InvocationResult reference field is not permitted.
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification - Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-specification
    locator: "Calling Tools; Tool Result; Structured Content; Error Handling"
    relevance: Defines native tools/call results and errors.
  - id: openai-responses-function-calling
    title: OpenAI API - Function Calling
    url: https://developers.openai.com/api/docs/guides/function-calling
    source_type: official-documentation
    locator: "Execute function calls and append results; Formatting results"
    relevance: Defines Responses function_call_output.
  - id: openai-responses-remote-mcp
    title: OpenAI API - MCP and Connectors
    url: https://developers.openai.com/api/docs/guides/tools-connectors-mcp
    source_type: official-documentation
    locator: "Calling tools"
    relevance: Defines Responses remote-MCP mcp_call output items.
  - id: a2a-protocol-specification
    title: A2A Protocol Specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-specification
    locator: "3.1.1 Send Message; 4.1.7 Artifact"
    relevance: Defines A2A Task and Artifact boundaries.
source_claims:
  - id: mcp-tool-result
    source: mcp-tools-2025-11-25
    supports: MCP tools/call succeeds with a ToolResult containing content and optional structuredContent and isError fields; protocol-level failures use JSON-RPC errors.
    locator: "Calling Tools; Tool Result; Structured Content; Error Handling"
    evidence_kind: normative
    confidence: high
  - id: openai-function-output
    source: openai-responses-function-calling
    supports: A Responses function_call_output input item identifies call_id and supplies output as a string or supported image or file object array.
    locator: "Execute function calls and append results; Formatting results"
    evidence_kind: normative
    confidence: high
  - id: openai-remote-mcp-result
    source: openai-responses-remote-mcp
    supports: A Responses mcp_call output item contains arguments, output, error, name, and server_label.
    locator: "Calling tools"
    evidence_kind: normative
    confidence: high
  - id: a2a-task-result
    source: a2a-protocol-specification
    supports: A2A SendMessage returns Task or Message, and an Artifact is a Part-based Task output rather than an MCP ToolResult.
    locator: "3.1.1 Send Message; 4.1.7 Artifact"
    evidence_kind: normative
    confidence: high
  - id: moonweave-tool-result
    source: mcp-tools-2025-11-25
    supports: Moonweave ToolResult is a local provenance-preserving evidence subtype that references one native result contract at a time.
    locator: "Tool Result"
    evidence_kind: design-inference
    confidence: high
