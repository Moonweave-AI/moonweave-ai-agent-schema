schema: moonweave.ai/ontology-node/v1
id: ResourceReadResult
kind: concept
labels: {zh: 资源读取结果记录, en: Resource read result record, ja: リソース読取結果記録}
semantics:
  short_definition: {zh: 对一次 MCP resources/read 响应的本地结果证据记录, en: A local result-evidence record for one MCP resources/read response, ja: 一つの MCP resources/read 応答に対するローカル結果証拠記録}
  definition:
    zh: >-
      ResourceReadResult 是用于证明 MCP 资源读取操作返回资源内容的 InvocationResult 子类。它是 Moonweave 投影，而不是原生 MCP JSON-RPC 响应或原生 result.contents 数组本身。
    en: >
      A ResourceReadResult is an InvocationResult subtype for evidence that an MCP resource-read
      operation returned resource contents. It is a Moonweave projection, not the native MCP
      JSON-RPC response or the native result.contents array itself.
    ja: >-
      ResourceReadResult は MCP resource-read operation が resource contents を返した証拠のための InvocationResult subtype である。Moonweave projection であり、ネイティブ MCP JSON-RPC response や native result.contents array 自体ではない。
  why_needed:
    zh: >-
      资源读取携带 URI 寻址的文本或二进制内容。该子类保留这一载荷族，而不会把资源响应当作 ToolResult、OpenAI Responses item 或 A2A Artifact。
    en: >
      Resource reads carry URI-addressed text or binary content. This subtype preserves that payload
      family without treating a resource response as a ToolResult, an OpenAI Responses item, or an
      A2A Artifact.
    ja: >-
      resource read は URI-addressed text または binary content を運ぶ。この subtype はその payload family を保持し、resource response を ToolResult、OpenAI Responses item、A2A Artifact として扱わない。
  includes:
    - {zh: 本地结果标识、资源 URI、内容种类和原生 contents 引用, en: "Local result ID, resource URI, content kind, and native contents reference", ja: ローカル結果 ID、リソース URI、内容種別、ネイティブ contents 参照}
  excludes:
    - {zh: MCP JSON-RPC 响应 envelope, en: An MCP JSON-RPC response envelope, ja: MCP JSON-RPC 応答 envelope}
    - {zh: MCP ToolResult 或 A2A Artifact, en: An MCP ToolResult or A2A Artifact, ja: MCP ToolResult または A2A Artifact}
  semantic_kind: entity
  aliases:
    - {language: en, value: local resource-read evidence, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      原生 MCP resources/read 请求成功响应携带 result.contents，其对象有 uri、可选 mimeType 以及 text 或 blob。该节点记录对这些对象的不可变本地引用；资源未找到是 JSON-RPC error -32002，而不是 ResourceReadResult。
    en: >
      The native MCP request is {"jsonrpc":"2.0","id":2,"method":"resources/read",
      "params":{"uri":"file:///project/src/main.rs"}}. Its native success response carries
      result.contents, whose objects have uri, optional mimeType, and either text or blob.
      This node records immutable local references to those objects. A resource-not-found condition
      is a JSON-RPC error (-32002), not a ResourceReadResult.
    ja: >-
      ネイティブ MCP resources/read request の success response は result.contents を持ち、その object は uri、任意の mimeType、text または blob を持つ。この node はそれらへの immutable local reference を記録する。resource-not-found は ResourceReadResult ではなく JSON-RPC error -32002 である。
  typical_input:
    - description: Native MCP resources/read request.
      format: '{"jsonrpc":"2.0","id":2,"method":"resources/read","params":{"uri":"file:///project/src/main.rs"}}'
      source_claims: [mcp-resource-read]
  typical_output:
    - description: Native MCP success response retained by reference in the local record.
      format: '{"jsonrpc":"2.0","id":2,"result":{"contents":[{"uri":"file:///project/src/main.rs","mimeType":"text/x-rust","text":"fn main() {}"}]}}'
      source_claims: [mcp-resource-read]
  reference_implementations:
    - name: Model Context Protocol Resources specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
      description: Defines resources/read request and resource contents.
structure:
  identity_keys: [local_resource_read_result_id]
  fields:
    - id: local_resource_read_result_id
      labels: {zh: 本地资源读取结果标识, en: Local resource-read result ID, ja: ローカル resource-read 結果 ID}
      definitions: {zh: 主机分配给资源读取结果证据的标识, en: Identifier assigned by the host to resource-read result evidence, ja: リソース読取結果証拠にホストが割り当てる識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: resource-result-42
      allowed_values: []
      source_claims: [moonweave-resource-read-result]
    - id: local_resource_uri
      labels: {zh: 本地资源 URI, en: Local resource URI, ja: ローカルリソース URI}
      definitions: {zh: 从原生 resources/read params.uri 复制以供审计的 URI, en: The URI copied for audit from native resources/read params.uri, ja: 監査用にネイティブ resources/read params.uri から複写した URI}
      datatype: uri
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: file:///project/src/main.rs
      allowed_values: []
      source_claims: [mcp-resource-read]
    - id: local_content_kind
      labels: {zh: 本地内容种类, en: Local content kind, ja: ローカル内容種別}
      definitions: {zh: 被引用原生内容的表现形式，不替代原生 text 或 blob 字段, en: Representation of referenced native content without replacing native text or blob fields, ja: 参照するネイティブ内容の表現でありネイティブ text または blob 項目を置換しない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: text
      allowed_values: [text, binary]
      source_claims: [mcp-resource-read]
    - id: local_mcp_contents_ref
      labels: {zh: 原生 contents 引用, en: Native contents reference, ja: ネイティブ contents 参照}
      definitions: {zh: 指向保留的 MCP result.contents 对象的不可变本地引用, en: Immutable local reference to the retained MCP result.contents object, ja: 保持された MCP result.contents オブジェクトへの不変ローカル参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp-session-42#id-2/result/contents/0
      allowed_values: []
      source_claims: [moonweave-resource-read-result]
    - id: local_content_sha256
      labels: {zh: 本地内容摘要, en: Local content digest, ja: ローカル内容ダイジェスト}
      definitions: {zh: 可选的本地内容完整性摘要，不是 MCP 响应字段, en: Optional local integrity digest of content and not an MCP response field, ja: 任意のローカル内容完全性ダイジェストであり MCP 応答項目ではない}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: '^sha256:[0-9a-f]{64}$'
      example_value: sha256:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      allowed_values: []
      source_claims: [moonweave-resource-read-result]
    - id: local_result_id
      labels: {zh: 本地结果标识, en: Local result ID, ja: ローカル結果 ID}
      definitions: {zh: 主机分配给结果证据的标识, en: The identifier assigned by the host to result evidence, ja: 結果証拠に対するホスト割当て識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: result-42
      allowed_values: []
      source_claims: [moonweave-resource-read-result]
    - id: local_attempt_ref
      labels: {zh: 尝试引用, en: Attempt reference, ja: 試行参照}
      definitions: {zh: 产生该结果证据的 InvocationAttempt, en: The InvocationAttempt that produced this result evidence, ja: この結果証拠を生成した InvocationAttempt}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: attempt-42-1
      allowed_values: []
      source_claims: [moonweave-resource-read-result]
    - id: local_disposition
      labels: {zh: 本地结果处置, en: Local result disposition, ja: ローカル結果処置}
      definitions: {zh: 主机对结果证据的局部判断，不改写远端状态, en: The host's local disposition of result evidence and not a rewrite of remote state, ja: 結果証拠に対するホストのローカル判断でありリモート状態の書き換えではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: success
      allowed_values: [success, failure, partial, unknown]
      source_claims: [moonweave-resource-read-result]
    - id: local_result_kind
      labels: {zh: 本地结果类别, en: Local result kind, ja: ローカル結果種別}
      definitions: {zh: 选择具体本地结果子类的分类，不是协议 type 字段, en: "A classification selecting a concrete local result subtype, not a protocol type field", ja: 具体的ローカル結果下位型を選ぶ分類でありプロトコル type 項目ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: tool
      allowed_values: [tool, execution, resource_read]
      source_claims: [moonweave-resource-read-result]
  constraints:
    - id: resource-read-result-preserves-native-content-shape
      severity: error
      expression_language: plain
      expression: local_mcp_contents_ref identifies a retained native content object whose uri matches local_resource_uri and whose representation matches local_content_kind.
      explanation: {zh: 引用的原生内容对象必须匹配记录的 URI 和内容种类, en: The referenced native content object must match the recorded URI and content kind, ja: 参照するネイティブ内容オブジェクトは記録した URI と内容種別に一致しなければならない}
      source_claims: [mcp-resource-read, moonweave-resource-read-result]
    - id: resource-read-result-keeps-error-separate
      severity: error
      expression_language: plain
      expression: A JSON-RPC resources/read error, including -32002 Resource not found, is represented as InvocationDiagnostic rather than ResourceReadResult.
      explanation: {zh: resources/read JSON-RPC 错误必须是 InvocationDiagnostic，而非 ResourceReadResult, en: A resources/read JSON-RPC error is an InvocationDiagnostic rather than a ResourceReadResult, ja: resources/read JSON-RPC エラーは ResourceReadResult ではなく InvocationDiagnostic である}
      source_claims: [mcp-resource-errors-security]
    - id: resource-read-result-id-same-record-parent-identity
      severity: error
      expression_language: plain
      expression: "local_resource_read_result_id = local_result_id; both identify the same local InvocationResult record and inherited parent fields belong to that one record."
      explanation: {zh: "local_resource_read_result_id 与 local_result_id 标识同一条本地 InvocationResult 记录，继承的父字段属于该同一记录。", en: "The child and parent IDs are equal representations of one local record, not a link to a second parent record.", ja: "local_resource_read_result_id と local_result_id は同じローカル InvocationResult レコードを識別し、継承した親フィールドはその一つのレコードに属する。"}
      source_claims: [moonweave-resource-read-result]
  required_relations: []
examples:
  - id: resource-read-result-positive-text

    labels: {zh: Rust 源文件读取结果, en: Rust source resource result, ja: Rust ソースリソース結果}

    descriptions:
      zh: ReAct Observation 步骤返回环境反馈；Anthropic {type:"tool_result",tool_use_id:"toolu_01",content:"15°C, sunny"}；OpenAI Code Interpreter 沙箱返回 text/image 输出。
      en: ReAct Observation step returns environment feedback; Anthropic {type:"tool_result",tool_use_id:"toolu_01",content:"15°C, sunny"}; OpenAI Code Interpreter sandbox returns text/image output.
      ja: ReAct Observation が環境 feedback を返す。Anthropic tool_result。OpenAI Code Interpreter sandbox が text/image 出力を返す。
    field_values: {local_resource_read_result_id: resource-result-42, local_resource_uri: file:///project/src/main.rs, local_content_kind: text, local_mcp_contents_ref: mcp-session-42#id-2/result/contents/0}
    related_node_ids: [ResourceReadResult, InvocationResult, ResourceReadRequest]
    related_relation_ids: [ResourceReadResult-is_a-InvocationResult]

    source_claims: [mcp-resource-read, moonweave-resource-read-result]
  - id: resource-read-result-counterexample-uri-mismatch

    labels: {zh: URI 不一致结果, en: URI-mismatched result, ja: URI 不一致結果}

    descriptions:
      zh: 反例：Toolformer 执行 [Calculator(350/7)] 后未插入结果 token 50 就继续生成；Anthropic tool_result 的 tool_use_id 与 tool_use 不匹配。
      en: Counterexample: Toolformer continues generation without inserting result token 50 after [Calculator(350/7)]; Anthropic tool_result tool_use_id mismatches tool_use.
      ja: 反例：Toolformer が [Calculator(350/7)] 実行後 result token 50 未挿入で生成継続。Anthropic tool_result tool_use_id 不一致。
    field_values: {local_resource_read_result_id: resource-result-bad, local_resource_uri: file:///project/src/main.rs, local_content_kind: text, local_mcp_contents_ref: mcp-session-42#id-2/result/contents/1}
    related_node_ids: [ResourceReadResult]
    related_relation_ids: [ResourceReadResult-is_a-InvocationResult]

    source_claims: [mcp-resource-read, moonweave-resource-read-result]
  - id: resource-read-result-boundary-native-response

    labels: {zh: 原生响应与本地记录边界, en: Native response versus local-record boundary, ja: ネイティブ応答とローカル記録の境界}

    descriptions:
      zh: Vercel AI SDK streamText 流式 tool result delta vs 完整 ToolResult 记录的聚合边界；Code Interpreter 图像输出非 text-only ToolResult。
      en: Boundary between Vercel AI SDK streamText streaming tool-result deltas vs aggregated ToolResult record; Code Interpreter image output is not text-only ToolResult.
      ja: Vercel AI SDK streamText ストリーミング tool result delta と完全 ToolResult 記録の集約境界。Code Interpreter 画像出力は text-only ToolResult ではない。
    field_values: {local_resource_read_result_id: resource-result-44, local_resource_uri: file:///project/logo.png, local_content_kind: binary, local_mcp_contents_ref: mcp-session-42#id-3/result/contents/0}
    related_node_ids: [ResourceReadResult, InvocationResult]
    related_relation_ids: [ResourceReadResult-is_a-InvocationResult]

    source_claims: [mcp-resource-read, moonweave-resource-read-result]
  - id: resource-read-result-instance-binary

    labels: {zh: 二进制图像资源实例, en: Binary image resource instance, ja: バイナリ画像リソース実例}

    descriptions:
      zh: OpenAI Assistants code_interpreter 实例：执行 plt.savefig 返回 image/png base64；Vercel AI SDK execute 返回 {temperature:15,unit:"C"} JSON。
      en: OpenAI Assistants code_interpreter instance: plt.savefig returns image/png base64; Vercel AI SDK execute returns {temperature:15,unit:"C"} JSON.
      ja: OpenAI Assistants code_interpreter 実例：plt.savefig が image/png base64 を返す。Vercel AI SDK execute が {temperature:15,unit:"C"} JSON を返す。
    field_values: {local_resource_read_result_id: resource-result-image-1, local_resource_uri: file:///project/logo.png, local_content_kind: binary, local_mcp_contents_ref: mcp-session-44#id-9/result/contents/0, local_content_sha256: sha256:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    related_node_ids: [ResourceReadResult, InvocationResult]
    related_relation_ids: [ResourceReadResult-is_a-InvocationResult]

    source_claims: [mcp-resource-read, mcp-resource-errors-security, moonweave-resource-read-result]
parent_relation:
  id: ResourceReadResult-is_a-InvocationResult
  predicate: is_a
  target: concept:InvocationResult
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是调用结果记录的资源读取子类, en: is a resource-read subtype of invocation result, ja: InvocationResult の resource-read 下位型である}
  definition: {zh: ResourceReadResult 是专门记录资源读取证据的 InvocationResult, en: ResourceReadResult is an InvocationResult specialized for resource-read evidence, ja: ResourceReadResult はリソース読取証拠に特化した InvocationResult である}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_subtype, labels: {zh: 具有子类, en: has subtype, ja: 下位型を持つ}}
  conditions: []
  temporal_scope: timeless
  boundary_context: This hierarchy concerns local evidence records only; native MCP responses keep their wire contract.
  constraints: []
  examples: []
  source_claims: [moonweave-resource-read-result]
  distinct_fact_rationale: ResourceReadResult narrows a local InvocationResult by provenance and payload family, while a native resources/read response remains protocol data. It uses one same-record identity in which local_resource_read_result_id identifies the same local InvocationResult record, so a second InvocationResult reference field is not permitted.
relations: []
sources:
  - id: mcp-resources-2025-11-25
    title: Model Context Protocol Specification - Resources
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/resources
    source_type: official-specification
    locator: "Reading Resources; Resource Contents; Error Handling; Security Considerations"
    relevance: Defines native resources/read I/O, content forms, errors, and URI protections.
source_claims:
  - id: mcp-resource-read
    source: mcp-resources-2025-11-25
    supports: MCP resources/read is a JSON-RPC request with params.uri and returns result.contents entries containing uri, optional mimeType, and text or blob content.
    locator: "Reading Resources; Resource Contents"
    evidence_kind: normative
    confidence: high
  - id: mcp-resource-errors-security
    source: mcp-resources-2025-11-25
    supports: A missing resource may produce JSON-RPC -32002, and servers must validate resource URIs, protect sensitive resources, and correctly encode binary data.
    locator: "Error Handling; Security Considerations"
    evidence_kind: normative
    confidence: high
  - id: moonweave-resource-read-result
    source: mcp-resources-2025-11-25
    supports: Moonweave ResourceReadResult is a local result-evidence subtype that references rather than replaces a native MCP resources/read response.
    locator: "Reading Resources"
    evidence_kind: design-inference
    confidence: high
