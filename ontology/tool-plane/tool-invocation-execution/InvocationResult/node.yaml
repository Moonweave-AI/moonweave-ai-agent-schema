schema: moonweave.ai/ontology-node/v1
id: InvocationResult
kind: concept
labels:
  zh: 调用结果记录
  en: Invocation result record
  ja: 呼び出し結果記録
semantics:
  short_definition:
    zh: 与一次 InvocationAttempt 关联的本地结果证据记录。
    en: A local result-evidence record associated with one InvocationAttempt.
    ja: 一つの InvocationAttempt に関連するローカル結果証拠記録。
  definition:
    zh: >-
      InvocationResult 是由 InvocationAttempt 生成的本地固定方面结果证据实体。它记录尝试返回或观察到结果的处置和出处，但不定义通用返回载荷，MCP ToolResult 有 content、structuredContent 和 isError，Responses function_call_output 有 call_id 和 output，Responses mcp_call 有 output 和 error，A2A 则产生 Task 或 Message 以及后续 Artifact；具体结果子类保留这些差异。
    en: >
      An InvocationResult is a local, fixed-aspect result-evidence Entity generated by an
      InvocationAttempt. It records disposition and provenance for an attempt's returned or observed
      outcome, but does not identify a universal return payload:
      MCP ToolResult has content, structuredContent, and isError; Responses function_call_output has
      call_id and output; Responses mcp_call has output and error; A2A yields a Task or Message and
      later Artifacts. Concrete result subtypes preserve those differences.
    ja: >-
      InvocationResult は InvocationAttempt により生成されるローカル固定側面 result-evidence Entity である。attempt の返却または観測された outcome の disposition と provenance を記録するが、共通 return payload は定義しない。MCP ToolResult は content、structuredContent、isError、Responses function_call_output は call_id と output、Responses mcp_call は output と error、A2A は Task または Message と後続 Artifact を持つ。具体的 result subtype がこれらの差異を保存する。
  why_needed:
    zh: >-
      主机需要为每个尝试结果提供审计锚点，同时保留来源特定载荷契约。该记录是通过出处连接到产生尝试的独立实体，不是活动组成部分，也不替代原生 API 输出。
    en: >
      A host needs one audit anchor for each attempt outcome while retaining source-specific payload
      contracts. The record is a distinct Entity linked by provenance to the producing attempt, not a
      component of that activity and not a replacement for native API output.
    ja: >-
      ホストには source-specific payload contract を保ったまま各 attempt outcome の audit anchor が必要である。この record は provenance により生成 attempt に結ばれる別の Entity であり、活動の component でも native API output の代替でもない。
  includes:
    - {zh: 本地结果标识、尝试引用、处置和证据引用, en: "Local result ID, attempt reference, disposition, and evidence reference", ja: ローカル結果 ID、試行参照、処置、証拠参照}
  excludes:
    - {zh: 任何单一协议的完整结果 schema, en: The complete result schema of any single protocol, ja: いずれか一つのプロトコルの完全な結果 schema}
    - {zh: 错误诊断或状态影响, en: Error diagnostic or state impact, ja: error 診断または状態影響}
  semantic_kind: entity
  aliases:
    - {language: en, value: local outcome evidence, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      结果适配器按引用记录原生证据，仅当载荷族已知时选择子类。它不会把 MCP content 数组、OpenAI output 字符串、remote mcp_call 对象和 A2A Task/Artifact 对象合并到一个字段；诊断和效果仍是与同一尝试关联的独立记录。
    en: >
      A result adapter records native evidence by reference and chooses a subtype only when its
      payload family is known. It does not merge MCP content arrays, OpenAI output strings, remote
      mcp_call objects, and A2A Task/Artifact objects into one field. Diagnostics and effects remain
      separate records linked to the same attempt.
    ja: >-
      result adapter は native evidence を参照で記録し、payload family が判明した場合にのみ subtype を選ぶ。MCP content array、OpenAI output string、remote mcp_call object、A2A Task/Artifact object を一つの field に統合しない。diagnostic と effect は同じ attempt に結び付く別 record のままである。
  typical_input:
    - description: A local result references native MCP evidence after a tool-call attempt.
      format: '{"local_result_id":"result-42","local_attempt_ref":"attempt-42-1","local_disposition":"success","local_native_evidence_ref":"mcp-session-42#id-2"}'
      source_claims: [moonweave-invocation-result]
  typical_output:
    - description: A subtype later captures source-specific result evidence.
      format: '{"local_result_id":"result-42","local_result_kind":"tool"}'
      source_claims: [moonweave-invocation-result]
  reference_implementations:
    - name: MCP Tools specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines ToolResult and protocol errors.
    - name: OpenAI Function Calling guide
      url: https://developers.openai.com/api/docs/guides/function-calling
      description: Defines function_call_output items.
structure:
  identity_keys: [local_result_id]
  fields:
    - id: local_result_id
      labels: {zh: 本地结果标识, en: Local result ID, ja: ローカル結果 ID}
      definitions: {zh: 主机分配给结果证据的标识, en: The identifier assigned by the host to result evidence, ja: 結果証拠に対するホスト割当て識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: result-42
      allowed_values: []
      source_claims: [moonweave-invocation-result]
    - id: local_attempt_ref
      labels: {zh: 尝试引用, en: Attempt reference, ja: 試行参照}
      definitions: {zh: 产生该结果证据的 InvocationAttempt, en: The InvocationAttempt that produced this result evidence, ja: この結果証拠を生成した InvocationAttempt}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: attempt-42-1
      allowed_values: []
      source_claims: [moonweave-invocation-result]
    - id: local_disposition
      labels: {zh: 本地结果处置, en: Local result disposition, ja: ローカル結果処置}
      definitions: {zh: 主机对结果证据的局部判断，不改写远端状态, en: The host's local disposition of result evidence and not a rewrite of remote state, ja: 結果証拠に対するホストのローカル判断でありリモート状態の書き換えではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: success
      allowed_values: [success, failure, partial, unknown]
      source_claims: [moonweave-invocation-result]
    - id: local_result_kind
      labels: {zh: 本地结果类别, en: Local result kind, ja: ローカル結果種別}
      definitions: {zh: 选择具体本地结果子类的分类，不是协议 type 字段, en: "A classification selecting a concrete local result subtype, not a protocol type field", ja: 具体的ローカル結果下位型を選ぶ分類でありプロトコル type 項目ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: tool
      allowed_values: [tool, execution, resource_read]
      source_claims: [moonweave-invocation-result]
    - id: local_native_evidence_ref
      labels: {zh: 原生证据引用, en: Native evidence reference, ja: ネイティブ証拠参照}
      definitions: {zh: 原生响应、item 或 A2A 对象的可审计引用, en: "An auditable reference to a native response, item, or A2A object", ja: ネイティブ応答、item、A2A オブジェクトへの監査可能参照}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: mcp-session-42#id-2
      allowed_values: []
      source_claims: [moonweave-invocation-result]
    - id: local_received_at
      labels: {zh: 本地接收时间, en: Local received-at time, ja: ローカル受信時刻}
      definitions: {zh: 主机记录结果证据可用的时间戳, en: The host-recorded time at which result evidence became available, ja: 結果証拠が利用可能になったホスト記録時刻}
      datatype: date-time
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: "2026-07-19T09:01:00Z"
      allowed_values: []
      source_claims: [moonweave-invocation-result]
  constraints:
    - id: invocation-result-attaches-to-attempt
      severity: error
      expression_language: plain
      expression: local_attempt_ref identifies exactly one InvocationAttempt and local_result_kind selects a compatible result subtype.
      explanation:
        zh: local_attempt_ref 必须指向一个 InvocationAttempt，且 local_result_kind 必须选择兼容结果子类。
        en: local_attempt_ref identifies exactly one InvocationAttempt and local_result_kind selects a compatible result subtype.
        ja: local_attempt_ref は一つの InvocationAttempt を示し local_result_kind は互換結果下位型を選ぶ。
      source_claims: [moonweave-invocation-result]
    - id: invocation-result-preserves-native-shape
      severity: error
      expression_language: plain
      expression: A base InvocationResult stores provenance only and does not combine MCP content, Responses output, remote mcp_call error, and A2A Artifacts into one universal payload.
      explanation:
        zh: 基础 InvocationResult 只存储来源信息，不得把 MCP content、Responses output、远程 mcp_call error 和 A2A Artifacts 合并为通用载荷。
        en: A base InvocationResult stores provenance only and does not combine MCP content, Responses output, remote mcp_call error, and A2A Artifacts into one universal payload.
        ja: 基本 InvocationResult は出所のみを保存し、MCP content、Responses output、remote mcp_call error、A2A Artifacts を一つの共通ペイロードに結合しない。
      source_claims: [mcp-tool-result, openai-function-output, openai-remote-mcp-result, a2a-task-result, moonweave-invocation-result]
  required_relations: [InvocationResult-was_generated_by-InvocationAttempt]
examples:
  - id: invocation-result-positive-tool-evidence

    labels: {zh: 工具结果证据, en: Tool-result evidence, ja: ツール結果証拠}

    descriptions:
      zh: ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]；Anthropic content:[{type:"tool_use",id:"toolu_01",name:"get_weather",input:{location:"Paris"}}]；Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。
      en: ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]; Anthropic content:[{type:"tool_use",id:"toolu_01",name:"get_weather",input:{location:"Paris"}}]; Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}}).
      ja: ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]。Anthropic tool_use。Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。
    field_values: {local_result_id: result-42, local_attempt_ref: attempt-42-1, local_disposition: success, local_result_kind: tool, local_native_evidence_ref: mcp-session-42#id-2}
    related_node_ids: [InvocationResult, InvocationAttempt, ToolResult]
    related_relation_ids: [InvocationResult-was_generated_by-InvocationAttempt]

    source_claims: [moonweave-invocation-result]
  - id: invocation-result-counterexample-mixed-payload

    labels: {zh: 混合结果载荷, en: Mixed result payload, ja: 混在結果ペイロード}

    descriptions:
      zh: 反例：ReAct Action 无对应 Observation 就继续推理；Anthropic tool_use 缺少配对 tool_result(tool_use_id)；Vercel AI SDK execute 抛错未捕获。
      en: Counterexample: ReAct continues reasoning without Observation for Action; Anthropic tool_use missing paired tool_result(tool_use_id); Vercel AI SDK execute error uncaught.
      ja: 反例：ReAct Action に Observation なしで reasoning 継続。Anthropic tool_use に tool_result ペア欠落。Vercel AI SDK execute エラー未捕捉。
    field_values: {local_result_id: result-bad, local_attempt_ref: attempt-42-1, local_disposition: success, local_result_kind: tool}
    related_node_ids: [InvocationResult]
    related_relation_ids: [InvocationResult-was_generated_by-InvocationAttempt]

    source_claims: [mcp-tool-result, openai-function-output, a2a-task-result, moonweave-invocation-result]
  - id: invocation-result-boundary-a2a-artifact

    labels: {zh: 本地结果与 A2A Artifact 边界, en: Local result versus A2A Artifact boundary, ja: ローカル結果と A2A Artifact の境界}

    descriptions:
      zh: ReAct 文本 Action 标记 vs Anthropic structured tool_use vs Vercel AI SDK Zod schema tool 的 wire 契约边界；本地 Invocation 活动非原生封包。
      en: Wire contract boundary among ReAct text Action markers, Anthropic structured tool_use, Vercel AI SDK Zod schema tools; local Invocation activity is not native envelope.
      ja: ReAct テキスト Action marker、Anthropic structured tool_use、Vercel AI SDK Zod schema tool の wire 契約境界。ローカル Invocation 活動はネイティブ envelope ではない。
    field_values: {local_result_id: result-a2a, local_attempt_ref: attempt-a2a-1, local_disposition: success, local_result_kind: tool, local_native_evidence_ref: a2a-task-1#artifact-report}
    related_node_ids: [InvocationResult, AgentAsToolInvocation, ToolResult]
    related_relation_ids: [InvocationResult-was_generated_by-InvocationAttempt]

    source_claims: [a2a-task-result, moonweave-invocation-result]
  - id: invocation-result-instance-local-command

    labels: {zh: 本地命令结果实例, en: Local command result instance, ja: ローカルコマンド結果インスタンス}

    descriptions:
      zh: ReAct HotpotQA 实例：Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup[Arthur's Magazine]→Finish[1850]；Anthropic tool_use_id=toolu_01A09q90qw90 配对 tool_result。
      en: ReAct HotpotQA instance: Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup→Finish[1850]; Anthropic tool_use_id=toolu_01A09q90qw90 paired with tool_result.
      ja: ReAct HotpotQA 実例：Thought→Action: Search→Observation→Lookup→Finish[1850]。Anthropic tool_use_id=toolu_01A09q90qw90 が tool_result とペア。
    field_values: {local_result_id: result-cmd-1, local_attempt_ref: attempt-cmd-1, local_disposition: success, local_result_kind: execution, local_received_at: "2026-07-19T09:01:00Z"}
    related_node_ids: [InvocationResult, ExecutionResult, ShellCommand]
    related_relation_ids: [InvocationResult-was_generated_by-InvocationAttempt]

    source_claims: [moonweave-invocation-result]
parent_relation: null
relations:
  - id: InvocationResult-was_generated_by-InvocationAttempt
    predicate: was_generated_by
    target: concept:InvocationAttempt
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 由调用尝试生成, en: was generated by invocation attempt, ja: 呼出し試行により生成された}
    definitions: {zh: 当 local_attempt_ref 指向实际产生或接收该固定结果证据的尝试时，该结果由该尝试生成, en: The result is generated by the InvocationAttempt identified by local_attempt_ref when that attempt actually produced or received this fixed result evidence, ja: local_attempt_ref がこの固定結果証拠を実際に生成または受信した試行を指すとき結果はその InvocationAttempt により生成される}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: generated, labels: {zh: 生成调用结果, en: generated invocation result, ja: 呼出し結果を生成した}}
    conditions:
      - id: invocation-result-generation-condition
        severity: error
        expression_language: plain
        expression: Assert only when local_attempt_ref identifies the target InvocationAttempt and that attempt observed or created this immutable local result record.
        explanation: {zh: 后续读取或重放既有结果不得成为生成者, en: A later reader or replay of existing result evidence is not its generator, ja: 既存結果証拠の後続 reader または replay は生成者ではない}
        source_claims: [prov-entity-activity, moonweave-invocation-result]
    temporal_scope: execution
    boundary_context: This provenance edge distinguishes the generated result Entity from the activity and does not turn result payload into a component or subtype of the attempt.
    constraints: []
    examples: []
    source_claims: [prov-entity-activity, moonweave-invocation-result]
    distinct_fact_rationale: A result record persists as distinct evidence after the activity; generation describes causality rather than parentage.
    layout_role: cross-link
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification - Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-specification
    locator: "Tool Result; Error Handling"
    relevance: Defines MCP ToolResult and errors.
  - id: openai-responses-function-calling
    title: OpenAI API - Function Calling
    url: https://developers.openai.com/api/docs/guides/function-calling
    source_type: official-documentation
    locator: "Execute function calls and append results; Formatting results"
    relevance: Defines Responses function_call_output fields.
  - id: openai-responses-remote-mcp
    title: OpenAI API - MCP and Connectors
    url: https://developers.openai.com/api/docs/guides/tools-connectors-mcp
    source_type: official-documentation
    locator: "Calling tools"
    relevance: Defines remote-MCP mcp_call output and error fields.
  - id: a2a-protocol-specification
    title: A2A Protocol Specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-specification
    locator: "3.1.1 Send Message; 4.1.1 Task; 4.1.7 Artifact"
    relevance: Defines A2A task/message outputs and artifacts.
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    locator: "prov:Entity; prov:Activity; prov:wasGeneratedBy"
    relevance: Distinguishes generated evidence entities from activities.
source_claims:
  - id: prov-entity-activity
    source: prov-o-core
    supports: PROV-O distinguishes an Entity from the Activity that generated it and defines prov:wasGeneratedBy for that provenance fact.
    locator: "PROV-O: prov:Entity, prov:Activity, prov:wasGeneratedBy"
    evidence_kind: normative
    confidence: high
  - id: mcp-tool-result
    source: mcp-tools-2025-11-25
    supports: MCP ToolResult contains content and may contain structuredContent and isError, with outputSchema constraining structured results when provided.
    locator: "Tool Result; Structured Content; Output Schema; Error Handling"
    evidence_kind: normative
    confidence: high
  - id: openai-function-output
    source: openai-responses-function-calling
    supports: A Responses function_call_output input item identifies call_id and supplies output as a string or supported image/file object array.
    locator: "Execute function calls and append results; Formatting results"
    evidence_kind: normative
    confidence: high
  - id: openai-remote-mcp-result
    source: openai-responses-remote-mcp
    supports: A Responses mcp_call output item contains arguments, output, error, name, and server_label.
    locator: "Calling tools"
    evidence_kind: normative
    confidence: high
  - id: a2a-task-result
    source: a2a-protocol-specification
    supports: A2A SendMessage returns Task or Message, and an A2A Artifact is a Part-based output of a Task rather than a generic tool result.
    locator: "3.1.1 Send Message; 4.1.1 Task; 4.1.7 Artifact"
    evidence_kind: normative
    confidence: high
  - id: moonweave-invocation-result
    source: mcp-tools-2025-11-25
    supports: Moonweave InvocationResult is a local provenance anchor for one attempt and delegates source-specific payload meaning to concrete result subtypes.
    locator: "Tool Result"
    evidence_kind: design-inference
    confidence: high
