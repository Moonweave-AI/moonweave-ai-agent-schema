schema: moonweave.ai/ontology-node/v1
id: ExecutionResult
kind: concept
labels:
  zh: 进程执行结果
  en: Process execution result
  ja: プロセス実行結果
semantics:
  short_definition:
    zh: 记录本地主机进程终止和输出流证据的 InvocationResult 子类。
    en: An InvocationResult subtype recording local host-process termination and stream evidence.
    ja: ローカルホストプロセスの終了とストリーム証拠を記録する InvocationResult の下位型。
  definition:
    zh: >-
      ExecutionResult 是针对 Command 或 ShellCommand 执行的本地结果子类。它记录在主机策略下的进程退出码、终止类别及已捕获 stdout 和 stderr 的引用；它不是 MCP ToolResult content 数组、Responses function_call_output item、mcp_call 输出字符串或 A2A Artifact。它是真实结果子类，因为每个 ExecutionResult 都是带进程终止不变量的调用结果证据。
    en: >
      An ExecutionResult is a local result subtype for Command or ShellCommand execution. It records
      process exit code, termination kind, and references to captured stdout and stderr under host
      policy. It is not an MCP ToolResult content array, a Responses function_call_output item, an
      mcp_call output string, or A2A Artifact. It is a true result subtype because every
      ExecutionResult is invocation result evidence with process-specific termination invariants.
    ja: >-
      ExecutionResult は Command または ShellCommand 実行のためのローカル result subtype である。host policy の下で process exit code、termination kind、取得した stdout と stderr の参照を記録する。MCP ToolResult content array、Responses function_call_output item、mcp_call output string、A2A Artifact ではない。各 ExecutionResult は process-specific termination invariant を持つ invocation result evidence なので真の result subtype である。
  why_needed:
    zh: >-
      进程执行需要可区分的退出状态和流证据，尤其当命令在工具适配器后使用时。这避免将本地进程结果展示给模型时误称为某种远程协议的结果 schema。
    en: >
      Process execution needs distinguishable evidence for exit status and streams, especially when a
      command is used behind a tool adapter. This keeps a local process result from being presented to
      a model as if it had one of the remote protocol result schemas.
    ja: >-
      process 実行には、特に command が tool adapter の背後で使われる場合、区別可能な exit status と stream evidence が必要である。これによりローカル process result をモデルに提示するとき、リモート protocol result schema の一つであるかのように扱わない。
  includes:
    - {zh: 退出码、终止类别以及 stdout/stderr 引用, en: "Exit code, termination kind, and stdout/stderr references", ja: 終了コード、終了種別、stdout/stderr 参照}
  excludes:
    - {zh: MCP content blocks、Responses output 和 A2A Parts, en: "MCP content blocks, Responses output, and A2A Parts", ja: MCP content blocks、Responses output、A2A Parts}
  semantic_kind: entity
  aliases:
    - {language: en, value: command result, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      进程运行器依据主机保留策略捕获退出和流，再存储引用而不是无差别地把原始输出插入模型上下文。工具适配器若想通过 MCP 或 Responses 返回结果，会在校验和清理后构造该协议的独立结果对象。
    en: >
      The process runner captures exit and streams according to host retention policy, then stores
      references rather than indiscriminately inserting raw output into a model context. If a tool
      adapter wants to return the result through MCP or Responses, it constructs that protocol's
      separate result object after applying validation and sanitization.
    ja: >-
      process runner は host retention policy に従って exit と stream を取得し、raw output を無差別に model context へ入れず reference を保存する。tool adapter が MCP または Responses で result を返したい場合、validation と sanitization の後でその protocol 固有の別 result object を構築する。
  typical_input:
    - description: A completed local process run.
      format: '{"exit_code":0,"termination_kind":"exited","stdout_ref":"logs://cmd-1/stdout","stderr_ref":"logs://cmd-1/stderr"}'
      source_claims: [moonweave-execution-result]
  typical_output:
    - description: A local result record links process evidence to the generic result anchor.
      format: '{"local_execution_result_id":"exec-result-1"}'
      source_claims: [moonweave-execution-result]
  reference_implementations:
    - name: MCP Tools specification - Security Considerations
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Requires output sanitization and validation around tool execution.
structure:
  identity_keys: [local_execution_result_id]
  fields:
    - id: local_execution_result_id
      labels: {zh: 本地进程结果标识, en: Local execution-result ID, ja: ローカル実行結果 ID}
      definitions: {zh: 主机分配给进程执行结果的标识, en: The identifier assigned by the host to the process execution result, ja: プロセス実行結果に対するホスト割当て識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: exec-result-1
      allowed_values: []
      source_claims: [moonweave-execution-result]
    - id: exit_code
      labels: {zh: 退出码, en: Exit code, ja: 終了コード}
      definitions: {zh: 本地进程运行器观察到的退出状态代码, en: The exit status code observed by the local process runner, ja: ローカルプロセス実行器が観測した終了状態コード}
      datatype: integer
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: 0
      allowed_values: []
      source_claims: [moonweave-execution-result]
    - id: termination_kind
      labels: {zh: 终止类别, en: Termination kind, ja: 終了種別}
      definitions: {zh: 主机观察到的进程终止方式, en: The way the host observed the process terminate, ja: ホストが観測したプロセス終了方式}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: exited
      allowed_values: [exited, signaled, timed_out, cancelled, unknown]
      source_claims: [moonweave-execution-result]
    - id: stdout_ref
      labels: {zh: 标准输出引用, en: Standard-output reference, ja: 標準出力参照}
      definitions: {zh: 受主机保留策略控制的 stdout 证据引用, en: A stdout evidence reference controlled by host retention policy, ja: ホスト保持ポリシーで制御される stdout 証拠参照}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: logs://cmd-1/stdout
      allowed_values: []
      source_claims: [moonweave-execution-result, mcp-output-safety]
    - id: stderr_ref
      labels: {zh: 标准错误引用, en: Standard-error reference, ja: 標準エラー参照}
      definitions: {zh: 受主机保留策略控制的 stderr 证据引用, en: A stderr evidence reference controlled by host retention policy, ja: ホスト保持ポリシーで制御される stderr 証拠参照}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: logs://cmd-1/stderr
      allowed_values: []
      source_claims: [moonweave-execution-result, mcp-output-safety]
    - id: local_result_id
      labels: {zh: 本地结果标识, en: Local result ID, ja: ローカル結果 ID}
      definitions: {zh: 主机分配给结果证据的标识, en: The identifier assigned by the host to result evidence, ja: 結果証拠に対するホスト割当て識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: result-42
      allowed_values: []
      source_claims: [moonweave-execution-result]
    - id: local_attempt_ref
      labels: {zh: 尝试引用, en: Attempt reference, ja: 試行参照}
      definitions: {zh: 产生该结果证据的 InvocationAttempt, en: The InvocationAttempt that produced this result evidence, ja: この結果証拠を生成した InvocationAttempt}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: attempt-42-1
      allowed_values: []
      source_claims: [moonweave-execution-result]
    - id: local_disposition
      labels: {zh: 本地结果处置, en: Local result disposition, ja: ローカル結果処置}
      definitions: {zh: 主机对结果证据的局部判断，不改写远端状态, en: The host's local disposition of result evidence and not a rewrite of remote state, ja: 結果証拠に対するホストのローカル判断でありリモート状態の書き換えではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: success
      allowed_values: [success, failure, partial, unknown]
      source_claims: [moonweave-execution-result]
    - id: local_result_kind
      labels: {zh: 本地结果类别, en: Local result kind, ja: ローカル結果種別}
      definitions: {zh: 选择具体本地结果子类的分类，不是协议 type 字段, en: "A classification selecting a concrete local result subtype, not a protocol type field", ja: 具体的ローカル結果下位型を選ぶ分類でありプロトコル type 項目ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: tool
      allowed_values: [tool, execution, resource_read]
      source_claims: [moonweave-execution-result]
  constraints:
    - id: execution-result-process-termination-consistency
      severity: error
      expression_language: plain
      expression: exit_code is present only when termination_kind is exited; timed_out, cancelled, or signaled results must not imply successful exit.
      explanation:
        zh: exit_code 仅在 termination_kind 为 exited 时存在；timed_out、cancelled 或 signaled 不得暗示成功退出。
        en: exit_code is present only when termination_kind is exited; timed_out, cancelled, or signaled results do not imply successful exit.
        ja: exit_code は termination_kind が exited の場合のみ存在し、timed_out、cancelled、signaled は成功終了を示さない。
      source_claims: [moonweave-execution-result]
    - id: execution-result-is-not-tool-content
      severity: error
      expression_language: plain
      expression: stdout_ref and stderr_ref are local evidence references and do not claim MCP content blocks or OpenAI output item shape.
      explanation:
        zh: stdout_ref 和 stderr_ref 是本地证据引用，不得声称为 MCP content block 或 OpenAI output item 架构。
        en: stdout_ref and stderr_ref are local evidence references and do not claim MCP content-block or OpenAI output-item shape.
        ja: stdout_ref と stderr_ref はローカル証拠参照であり MCP content block または OpenAI output item 形式を主張しない。
      source_claims: [mcp-output-safety, moonweave-execution-result]
    - id: execution-result-id-same-record-parent-identity
      severity: error
      expression_language: plain
      expression: "local_execution_result_id = local_result_id; both identify the same local InvocationResult record and inherited parent fields belong to that one record."
      explanation: {zh: "local_execution_result_id 与 local_result_id 标识同一条本地 InvocationResult 记录，继承的父字段属于该同一记录。", en: "The child and parent IDs are equal representations of one local record, not a link to a second parent record.", ja: "local_execution_result_id と local_result_id は同じローカル InvocationResult レコードを識別し、継承した親フィールドはその一つのレコードに属する。"}
      source_claims: [moonweave-execution-result]
  required_relations: []
examples:
  - id: execution-result-positive-git-status

    labels: {zh: Git 状态结果, en: Git status result, ja: Git status 結果}

    descriptions:
      zh: "ReAct Observation 步骤返回环境反馈；Anthropic {type:\"tool_result\",tool_use_id:\"toolu_01\",content:\"15°C, sunny\"}；OpenAI Code Interpreter 沙箱返回 text/image 输出。"
      en: "ReAct Observation step returns environment feedback; Anthropic {type:\"tool_result\",tool_use_id:\"toolu_01\",content:\"15°C, sunny\"}; OpenAI Code Interpreter sandbox returns text/image output."
      ja: ReAct Observation が環境 feedback を返す。Anthropic tool_result。OpenAI Code Interpreter sandbox が text/image 出力を返す。
    field_values: {local_execution_result_id: exec-result-1, exit_code: 0, termination_kind: exited, stdout_ref: logs://cmd-1/stdout, stderr_ref: logs://cmd-1/stderr}
    related_node_ids: [ExecutionResult, InvocationResult, Command]
    related_relation_ids: [ExecutionResult-is_a-InvocationResult]

    source_claims: [moonweave-execution-result]
  - id: execution-result-counterexample-timeout-success

    labels: {zh: 超时却宣称成功, en: Timeout claimed successful, ja: タイムアウトを成功と主張}

    descriptions:
      zh: 反例：Toolformer 执行 [Calculator(350/7)] 后未插入结果 token 50 就继续生成；Anthropic tool_result 的 tool_use_id 与 tool_use 不匹配。
      en: Counterexample: Toolformer continues generation without inserting result token 50 after [Calculator(350/7)]; Anthropic tool_result tool_use_id mismatches tool_use.
      ja: 反例：Toolformer が [Calculator(350/7)] 実行後 result token 50 未挿入で生成継続。Anthropic tool_result tool_use_id 不一致。
    field_values: {local_execution_result_id: exec-result-bad, exit_code: 0, termination_kind: timed_out}
    related_node_ids: [ExecutionResult]
    related_relation_ids: [ExecutionResult-is_a-InvocationResult]

    source_claims: [moonweave-execution-result]
  - id: execution-result-boundary-mcp-tool-result

    labels: {zh: 进程结果与 MCP ToolResult 边界, en: Process result versus MCP ToolResult boundary, ja: プロセス結果と MCP ToolResult の境界}

    descriptions:
      zh: Vercel AI SDK streamText 流式 tool result delta vs 完整 ToolResult 记录的聚合边界；Code Interpreter 图像输出非 text-only ToolResult。
      en: Boundary between Vercel AI SDK streamText streaming tool-result deltas vs aggregated ToolResult record; Code Interpreter image output is not text-only ToolResult.
      ja: Vercel AI SDK streamText ストリーミング tool result delta と完全 ToolResult 記録の集約境界。Code Interpreter 画像出力は text-only ToolResult ではない。
    field_values: {local_execution_result_id: exec-result-2, exit_code: 0, termination_kind: exited, stdout_ref: logs://cmd-2/stdout}
    related_node_ids: [ExecutionResult, ToolResult, Command]
    related_relation_ids: [ExecutionResult-is_a-InvocationResult]

    source_claims: [mcp-output-safety, moonweave-execution-result]
  - id: execution-result-instance-shell-cancelled

    labels: {zh: 已取消 Shell 进程实例, en: Cancelled shell-process instance, ja: キャンセル済み Shell プロセスインスタンス}

    descriptions:
      zh: "OpenAI Assistants code_interpreter 实例：执行 plt.savefig 返回 image/png base64；Vercel AI SDK execute 返回 {temperature:15,unit:\"C\"} JSON。"
      en: "OpenAI Assistants code_interpreter instance: plt.savefig returns image/png base64; Vercel AI SDK execute returns {temperature:15,unit:\"C\"} JSON."
      ja: "OpenAI Assistants code_interpreter 実例：plt.savefig が image/png base64 を返す。Vercel AI SDK execute が {temperature:15,unit:\"C\"} JSON を返す。"
    field_values: {local_execution_result_id: exec-result-shell, termination_kind: cancelled, stderr_ref: logs://shell-1/stderr}
    related_node_ids: [ExecutionResult, ShellCommand, InvocationAttempt]
    related_relation_ids: [ExecutionResult-is_a-InvocationResult]

    source_claims: [moonweave-execution-result]
parent_relation:
  id: ExecutionResult-is_a-InvocationResult
  predicate: is_a
  target: concept:InvocationResult
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是调用结果中的进程执行子类, en: is a process-execution subtype of invocation result, ja: 呼び出し結果のプロセス実行下位型である}
  definition: {zh: 每个 ExecutionResult 都是具有进程终止证据的 InvocationResult, en: Every ExecutionResult is an InvocationResult with process-termination evidence, ja: すべての ExecutionResult はプロセス終了証拠を持つ InvocationResult である}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_execution_result_subtype, labels: {zh: 具有进程执行结果子类, en: has execution-result subtype, ja: プロセス実行結果下位型を持つ}}
  conditions: []
  temporal_scope: execution
  boundary_context: This hierarchy adds local process evidence and does not assert a remote tool or protocol result shape.
  constraints: []
  examples: []
  source_claims: [moonweave-execution-result]
  distinct_fact_rationale: Every ExecutionResult satisfies InvocationResult provenance and adds local process termination evidence. It uses one same-record identity in which local_execution_result_id identifies the same local InvocationResult record, so a second InvocationResult reference field is not permitted.
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification - Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-specification
    locator: "Security Considerations"
    relevance: Requires sanitized tool outputs and clear execution safety boundaries.
source_claims:
  - id: mcp-output-safety
    source: mcp-tools-2025-11-25
    supports: MCP servers sanitize tool outputs and clients validate tool results before passing them to language models.
    locator: "Security Considerations"
    evidence_kind: normative
    confidence: high
  - id: moonweave-execution-result
    source: mcp-tools-2025-11-25
    supports: Moonweave ExecutionResult is a local InvocationResult subtype for host-process termination and stream evidence, not an MCP or OpenAI result payload.
    locator: "Security Considerations"
    evidence_kind: design-inference
    confidence: high