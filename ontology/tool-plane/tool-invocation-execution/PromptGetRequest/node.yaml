schema: moonweave.ai/ontology-node/v1
id: PromptGetRequest
kind: concept
labels: {zh: 提示词获取请求记录, en: Prompt-get request record, ja: プロンプト取得要求記録}
semantics:
  short_definition: {zh: 被一次 Invocation 使用的本地 MCP 提示词检索请求实体, en: A local MCP prompt-retrieval request Entity used by one Invocation, ja: 一つの Invocation により使用されるローカル MCP プロンプト検索要求 Entity}
  definition:
    zh: >-
      PromptGetRequest 是用于 MCP prompts/get 检索的 Moonweave 本地固定方面请求实体。它关联本地 Invocation、选定提示词名称、参数投影和保留的原生请求引用；它不是原生 JSON-RPC 请求封包，响应消息由独立的本地 PromptInstantiation 实体表示。
    en: >
      A PromptGetRequest is a Moonweave local, fixed-aspect request Entity for an MCP prompts/get retrieval.
      It correlates a local invocation, selected prompt name, argument projection, and retained native
      request reference. It is not the native JSON-RPC request envelope; response messages are represented by a separate local PromptInstantiation Entity.
    ja: >-
      PromptGetRequest は MCP prompts/get retrieval のための Moonweave ローカル固定側面 request Entity である。ローカル Invocation、選択した prompt 名、argument projection、保持された native request reference を相関する。ネイティブ JSON-RPC request envelope ではなく、response message は別のローカル PromptInstantiation Entity で表す。
  why_needed:
    zh: >-
      MCP prompts 是用户可控模板，prompts/get 有独立的 name 与 arguments 契约。单独记录检索可防止将提示词操作误标为 MCP 工具调用或泛化请求子类。
    en: >
      MCP prompts are user-controlled templates and prompts/get has its own name-and-arguments
      contract. Recording retrieval separately prevents a prompt operation from being mislabeled as
      an MCP tool call or as a generic request subtype.
    ja: >-
      MCP prompts はユーザー制御可能な template であり、prompts/get には固有の name-and-arguments contract がある。retrieval を別に記録することで、prompt operation を MCP tool call または汎用 request subtype と誤分類しない。
  includes:
    - {zh: 本地请求标识、调用引用、提示词名称、参数引用和原生请求引用, en: "Local request ID, invocation reference, prompt name, arguments reference, and native request reference", ja: ローカル要求 ID、呼出し参照、プロンプト名、引数参照、ネイティブ要求参照}
  excludes:
    - {zh: MCP prompts/get JSON-RPC envelope, en: An MCP prompts/get JSON-RPC envelope, ja: MCP prompts/get JSON-RPC envelope}
    - {zh: MCP tools/call 或 PromptInstantiation 的消息载荷, en: MCP tools/call or PromptInstantiation message payload, ja: MCP tools/call または PromptInstantiation のメッセージ payload}
  semantic_kind: entity
  aliases:
    - {language: en, value: local prompt retrieval request, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      原生 MCP 操作是带 name 和 arguments 的 prompts/get JSON-RPC 请求，其成功响应包含 result.description 和 result.messages。本地记录保存关联和原生请求引用，PromptInstantiation 则记录对 result.messages 的本地实例化引用；无效名称或缺少必需参数使用 JSON-RPC -32602，而不是成功检索记录。
    en: >
      The native MCP operation is {"jsonrpc":"2.0","id":2,"method":"prompts/get",
      "params":{"name":"code_review","arguments":{"code":"def hello():\n    print('world')"}}}.
      Its success response has result.description and result.messages. This local record stores
      correlation and references the native request; PromptInstantiation records a local
      materialization reference to result.messages. Invalid names or missing required arguments use
      JSON-RPC -32602 rather than a successful retrieval record.
    ja: >-
      ネイティブ MCP operation は name と arguments を持つ prompts/get JSON-RPC request であり、success response は result.description と result.messages を持つ。ローカル record は相関と native request reference を保存し、PromptInstantiation は result.messages への local materialization reference を記録する。無効な name や必須 argument の欠落は成功 retrieval record ではなく JSON-RPC -32602 になる。
  typical_input:
    - description: Native MCP prompts/get request.
      format: '{"jsonrpc":"2.0","id":2,"method":"prompts/get","params":{"name":"code_review","arguments":{"code":"def hello():\\n    print(\u0027world\u0027)"}}}'
      source_claims: [mcp-prompts-get]
  typical_output:
    - description: Local prompt-retrieval request record.
      format: '{"local_prompt_get_request_id":"prompt-get-42","local_invocation_ref":"invocation-42","local_prompt_name":"code_review","local_mcp_request_ref":"mcp-session-42#id-2"}'
      source_claims: [moonweave-prompt-get-request]
  reference_implementations:
    - name: Model Context Protocol Prompts specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
      description: Defines prompts/get requests, responses, errors, and security.
structure:
  identity_keys: [local_prompt_get_request_id]
  fields:
    - id: local_prompt_get_request_id
      labels: {zh: 本地提示词获取请求标识, en: Local prompt-get request ID, ja: ローカル prompt-get 要求 ID}
      definitions: {zh: 主机分配给本地提示词检索记录的标识, en: Identifier assigned by the host to the local prompt-retrieval record, ja: ローカルプロンプト検索記録にホストが割り当てる識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: prompt-get-42
      allowed_values: []
      source_claims: [moonweave-prompt-get-request]
    - id: local_invocation_ref
      labels: {zh: 调用引用, en: Invocation reference, ja: Invocation 参照}
      definitions: {zh: 此提示词检索所属的 Invocation, en: Invocation to which this prompt retrieval belongs, ja: このプロンプト検索が属する Invocation}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: invocation-42
      allowed_values: []
      source_claims: [moonweave-prompt-get-request]
    - id: local_prompt_name
      labels: {zh: 本地提示词名称, en: Local prompt name, ja: ローカルプロンプト名}
      definitions: {zh: 从原生 prompts/get params.name 复制以供审计的提示词标识, en: Prompt identifier copied for audit from native prompts/get params.name, ja: 監査用にネイティブ prompts/get params.name から複写したプロンプト識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: code_review
      allowed_values: []
      source_claims: [mcp-prompts-get]
    - id: local_arguments_ref
      labels: {zh: 本地参数引用, en: Local arguments reference, ja: ローカル引数参照}
      definitions: {zh: 指向保留的原生 params.arguments 对象或受保护副本的不可变引用, en: Immutable reference to retained native params.arguments or a protected copy, ja: 保持されたネイティブ params.arguments または保護された複写への不変参照}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: mcp-session-42#id-2/params/arguments
      allowed_values: []
      source_claims: [mcp-prompts-get, moonweave-prompt-get-request]
    - id: local_mcp_request_ref
      labels: {zh: MCP 原生请求引用, en: MCP native request reference, ja: MCP ネイティブ要求参照}
      definitions: {zh: 指向保留的 prompts/get JSON-RPC 请求对象的本地引用, en: Local reference to the retained prompts/get JSON-RPC request object, ja: 保持された prompts/get JSON-RPC 要求オブジェクトへのローカル参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp-session-42#id-2
      allowed_values: []
      source_claims: [mcp-prompts-get, moonweave-prompt-get-request]
    - id: local_requested_at
      labels: {zh: 本地请求时间, en: Local requested-at time, ja: ローカル要求時刻}
      definitions: {zh: 主机记录检索请求的时间戳, en: Host-recorded timestamp for the retrieval request, ja: 検索要求のホスト記録時刻}
      datatype: date-time
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: "2026-07-19T09:00:00Z"
      allowed_values: []
      source_claims: [moonweave-prompt-get-request]
  constraints:
    - id: prompt-get-request-preserves-native-request
      severity: error
      expression_language: plain
      expression: local_mcp_request_ref identifies a retained prompts/get request whose params.name equals local_prompt_name.
      explanation: {zh: local_mcp_request_ref 必须指向 params.name 等于 local_prompt_name 的保留 prompts/get 请求, en: local_mcp_request_ref identifies a retained prompts/get request whose params.name equals local_prompt_name, ja: local_mcp_request_ref は params.name が local_prompt_name と一致する保持済み prompts/get 要求を示す}
      source_claims: [mcp-prompts-get, moonweave-prompt-get-request]
    - id: prompt-get-request-keeps-errors-separate
      severity: error
      expression_language: plain
      expression: Invalid prompt name or missing required arguments is represented as InvocationDiagnostic with the native JSON-RPC error rather than a successful PromptGetRequest materialization.
      explanation: {zh: 无效提示词名称或缺失必需参数必须以原生 JSON-RPC 错误的 InvocationDiagnostic 表示, en: Invalid prompt name or missing required arguments is represented by InvocationDiagnostic with native JSON-RPC error, ja: 無効なプロンプト名または必須引数不足はネイティブ JSON-RPC エラーを伴う InvocationDiagnostic として表す}
      source_claims: [mcp-prompts-errors-security]
  required_relations: [PromptGetRequest-was_used_by-Invocation]
examples:
  - id: prompt-get-request-positive-code-review

    labels: {zh: 代码审查提示词检索, en: Code-review prompt retrieval, ja: コードレビュー用プロンプト検索}

    descriptions:
      zh: "Semantic Kernel PromptTemplate 与 kernel.invoke(function_name,args)；LangChain PromptTemplate.format()；MCP prompts/get name=code_review arguments={code:\"...\"}。"
      en: "Semantic Kernel PromptTemplate and kernel.invoke(function_name,args); LangChain PromptTemplate.format(); MCP prompts/get name=code_review arguments={code:\"...\"}."
      ja: Semantic Kernel PromptTemplate。LangChain PromptTemplate.format()。MCP prompts/get name=code_review。
    field_values: {local_prompt_get_request_id: prompt-get-42, local_invocation_ref: invocation-42, local_prompt_name: code_review, local_arguments_ref: mcp-session-42#id-2/params/arguments, local_mcp_request_ref: mcp-session-42#id-2}
    related_node_ids: [PromptGetRequest, Invocation, PromptInstantiation]
    related_relation_ids: [PromptGetRequest-was_used_by-Invocation]

    source_claims: [mcp-prompts-get, moonweave-prompt-get-request]
  - id: prompt-get-request-counterexample-tool-call

    labels: {zh: 将提示词检索伪装为工具调用, en: Prompt retrieval mislabeled as tool call, ja: ツール呼出しと誤分類されたプロンプト検索}

    descriptions:
      zh: 反例：MCP resources/read uri 未订阅就假定内容可用；Semantic Kernel prompt 参数未验证即实例化。
      en: Counterexample: assuming MCP resources/read uri content without subscription; Semantic Kernel prompt instantiated without argument validation.
      ja: 反例：MCP resources/read uri 未購読で内容可用を仮定。Semantic Kernel prompt 引数未検証でインスタンス化。
    field_values: {local_prompt_get_request_id: prompt-get-bad, local_invocation_ref: invocation-43, local_prompt_name: code_review, local_mcp_request_ref: mcp-session-42#id-3}
    related_node_ids: [PromptGetRequest, ToolCall]
    related_relation_ids: [PromptGetRequest-was_used_by-Invocation]

    source_claims: [mcp-prompts-get, moonweave-prompt-get-request]
  - id: prompt-get-request-boundary-native-envelope

    labels: {zh: 原生请求与本地记录边界, en: Native request versus local-record boundary, ja: ネイティブ要求とローカル記録の境界}

    descriptions:
      zh: MCP Prompt/Resource 能力 vs LangChain PromptTemplate vs Semantic Kernel 模板函数的声明-实例化边界。
      en: Declaration-instantiation boundary among MCP Prompt/Resource capability, LangChain PromptTemplate, Semantic Kernel template functions.
      ja: MCP Prompt/Resource、LangChain PromptTemplate、Semantic Kernel テンプレート関数の宣言-インスタンス化境界。
    field_values: {local_prompt_get_request_id: prompt-get-44, local_invocation_ref: invocation-44, local_prompt_name: summarize, local_mcp_request_ref: mcp-session-42#id-4}
    related_node_ids: [PromptGetRequest, Invocation]
    related_relation_ids: [PromptGetRequest-was_used_by-Invocation]

    source_claims: [mcp-prompts-get, moonweave-prompt-get-request]
  - id: prompt-get-request-instance-parameterized

    labels: {zh: 参数化提示词实例, en: Parameterized prompt instance, ja: パラメーター化プロンプト実例}

    descriptions:
      zh: "MCP 实例：prompts/get name=summarize arguments={text:\"long article...\"} 返回 messages；resources/read uri=file:///data/config.json。"
      en: "MCP instance: prompts/get name=summarize arguments={text:\"long article...\"} returns messages; resources/read uri=file:///data/config.json."
      ja: MCP 実例：prompts/get name=summarize。resources/read uri=file:///data/config.json。
    field_values: {local_prompt_get_request_id: prompt-get-release-1, local_invocation_ref: invocation-release-1, local_prompt_name: release_notes, local_arguments_ref: mcp-session-45#id-9/params/arguments, local_mcp_request_ref: mcp-session-45#id-9}
    related_node_ids: [PromptGetRequest, Invocation]
    related_relation_ids: [PromptGetRequest-was_used_by-Invocation]

    source_claims: [mcp-prompts-get, moonweave-prompt-get-request]
