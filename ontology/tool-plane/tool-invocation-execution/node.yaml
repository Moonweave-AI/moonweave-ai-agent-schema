  taxonomy_contract:
    applicability: mixed-backbone
    hierarchy_policy: actual-is-a-or-part-of-only
    key_root_concept_ids: [ExecutionSpecification, Invocation, InvocationExecutionRequest, PromptGetRequest, PromptInstantiation, ResourceReadRequest, InvocationDiagnostic, InvocationEffect, InvocationResult]
    allowed_backbone_predicates: [is_a, part_of]
    flat_root_exception_concept_ids: [InvocationExecutionRequest, PromptGetRequest, PromptInstantiation, ResourceReadRequest, InvocationDiagnostic, InvocationEffect, InvocationResult]
    not_applicable_reason: null
  boundary_decisions:
    - id: native-payloads-remain-in-owning-protocol-modules
      decision: Invocation records may reference native protocol objects but do not replace them.
      source_claims: [moonweave-invocation-boundary]
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification - Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-specification
    locator: "Tools; Calling Tools; Tool Result; Error Handling"
    relevance: Defines MCP tool calls, tool results, and error boundaries.
  - id: openai-responses-function-calling
    title: OpenAI API - Function Calling
    url: https://developers.openai.com/api/docs/guides/function-calling
    source_type: official-documentation
    locator: "Handling function calls; Execute function calls and append results; Formatting results"
    relevance: Defines Responses function_call and function_call_output items.
  - id: openai-responses-remote-mcp
    title: OpenAI API - MCP and Connectors
    url: https://developers.openai.com/api/docs/guides/tools-connectors-mcp
    source_type: official-documentation
    locator: "Listing available tools; Calling tools; Approvals"
    relevance: Defines Responses remote-MCP output items and approval boundaries.
  - id: a2a-protocol-specification
    title: A2A Protocol Specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-specification
    locator: "3.1 Send Message; 3.7 Messages and Artifacts; 4.1 Task; 4.1.7 Artifact"
    relevance: Defines A2A message-driven tasks and their artifacts.
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    locator: "prov:Entity; prov:Activity; prov:used; prov:wasGeneratedBy"
    relevance: Distinguishes local request and evidence entities from activities that use or generate them.
source_claims:
  - id: prov-entity-activity-boundary
    source: prov-o-core
    supports: PROV-O distinguishes Entity from Activity and expresses activity use and entity generation as provenance relationships rather than subtype or composition parentage.
    locator: "PROV-O: prov:Entity, prov:Activity, prov:used, prov:wasGeneratedBy"
    evidence_kind: normative
    confidence: high
  - id: mcp-tools-wire
    source: mcp-tools-2025-11-25
    supports: MCP clients invoke tools with tools/call and servers return a ToolResult or a JSON-RPC protocol error.
    locator: "Calling Tools; Tool Result; Error Handling"
    evidence_kind: normative
    confidence: high
  - id: openai-responses-function-items
    source: openai-responses-function-calling
    supports: A Responses function_call output item has id, call_id, type, name, and JSON-encoded arguments, and a function_call_output input item returns output by call_id.
    locator: "Handling function calls; Execute function calls and append results"
    evidence_kind: normative
    confidence: high
  - id: openai-responses-remote-mcp-items
    source: openai-responses-remote-mcp
    supports: A Responses remote-MCP mcp_call item reports id, name, server_label, arguments, output, and error rather than exposing an MCP JSON-RPC envelope.
    locator: "Calling tools"
    evidence_kind: normative
    confidence: high
  - id: a2a-send-message
    source: a2a-protocol-specification
    supports: A2A SendMessage sends a Message and returns either a Task or direct Message; task processing may continue asynchronously.
    locator: "3.1.1 Send Message; 3.2.1 SendMessageRequest"
    evidence_kind: normative
    confidence: high
  - id: a2a-task-artifact
    source: a2a-protocol-specification
    supports: A2A Task is a stateful work unit and Artifacts are Part-based task outputs rather than generic tool-result objects.
    locator: "4.1.1 Task; 4.1.7 Artifact"
    evidence_kind: normative
    confidence: high
  - id: moonweave-invocation-boundary
    source: openai-responses-function-calling
    supports: Moonweave Invocation records are local, provenance-preserving projections that correlate native protocol objects without asserting a shared wire schema.
    locator: "Handling function calls; Execute function calls and append results"
    evidence_kind: design-inference
    confidence: high
