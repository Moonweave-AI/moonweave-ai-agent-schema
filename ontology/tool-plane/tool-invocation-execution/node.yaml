schema: moonweave.ai/ontology-node/v1
id: tool-invocation-execution
kind: module
labels:
  zh: 能力调用与结果
  en: Capability invocation and outcomes
  ja: 能力の呼び出しと結果
semantics:
  short_definition:
    zh: 描述一次已选能力如何从绑定参数的调用计划经独立尝试产生结果、诊断与可归因效果的调用发生模块。
    en: Invocation occurrence module describing how a selected capability moves from a bound call plan through independent attempts to results, diagnostics, and attributable effects.
    ja: 選択済み能力が bound call plan から独立 attempt を経て result/diagnostic/帰属 effect を生む invocation occurrence module。
  definition:
    zh: 能力调用与结果拥有 InvocationExecutionRequest、ToolCallPlan、ToolCall、ToolCallAttempt、ToolResult、InvocationDiagnostic 与 InvocationEffect 等一次调用生命周期对象。它消费 tool-discovery-selection 交接的定义引用与绑定参数，但不拥有 ToolDefinition 或 ToolSelectionDecision 身份。Anthropic tool_use/tool_result block、OpenAI function_call 输出、Vercel AI SDK generateText 的 toolCalls 字段，以及 MCP tools/call 响应，都提供“尝试”与“结果”之间的工程对照面。授权拒绝、MCP 会话封装与 RunOutcome 分别归安全、MCP 传输与运行时模块。
    en: Capability invocation and outcomes owns one-call lifecycle objects such as InvocationExecutionRequest, ToolCallPlan, ToolCall, ToolCallAttempt, ToolResult, InvocationDiagnostic, and InvocationEffect. It consumes definition references and bound arguments handed off from tool-discovery-selection without owning ToolDefinition or ToolSelectionDecision identity. Anthropic tool_use and tool_result blocks, OpenAI function_call outputs, Vercel AI SDK generateText toolCalls fields, and MCP tools/call responses all provide engineering surfaces between attempt and result. Authorization denial, MCP session envelopes, and RunOutcome belong respectively to safety, MCP transport, and runtime modules.
    ja: capability invocation/outcomes は InvocationExecutionRequest/ToolCallPlan/ToolCall/ToolCallAttempt/ToolResult/InvocationDiagnostic/InvocationEffect 等 one-call lifecycle object を所有し、tool-discovery-selection から definition reference/bound argument を消費しますが ToolDefinition/ToolSelectionDecision identity は所有しません。Anthropic tool_use/tool_result、OpenAI function_call、Vercel AI SDK generateText toolCalls、MCP tools/call response が attempt/result 間 engineering surface を提供。authorization denial/MCP session envelope/RunOutcome は safety/MCP transport/runtime module に属します。
  why_needed:
    zh: 若把验证失败、运行中尝试、最终成功结果和副作用压成一个状态，就无法定位是参数、执行器还是外部系统出错，也无法保留每次重试的独立证据。
    en: Collapsing validation failure, running attempts, final success, and side effects into one state prevents locating whether arguments, executors, or external systems failed and destroys independent evidence for each retry.
    ja: validation failure/running attempt/final success/side effect を一状態に潰すと argument/executor/external system の失敗箇所を特定できず retry ごとの独立 evidence も失われます。
  includes:
    - zh: ToolCallPlan、ToolCall、ToolCallAttempt、ToolResult、InvocationDiagnostic、InvocationEffect 与 PromptGetRequest/ResourceReadRequest 等具体调用。
      en: ToolCallPlan, ToolCall, ToolCallAttempt, ToolResult, InvocationDiagnostic, InvocationEffect, and concrete calls such as PromptGetRequest and ResourceReadRequest.
      ja: ToolCallPlan/ToolCall/ToolCallAttempt/ToolResult/InvocationDiagnostic/InvocationEffect と PromptGetRequest/ResourceReadRequest 等 concrete call。
    - zh: 针对固定 ToolDefinition 版本的 JSON Schema 实参校验与每次尝试的独立身份。
      en: JSON Schema argument validation against a fixed ToolDefinition version and separate identity for every attempt.
      ja: 固定 ToolDefinition version に対する JSON Schema 実引数 validation と各 attempt の独立 identity。
  excludes:
    - zh: ToolDefinition、RegistryEntry、MCPRequest/Response、PolicyDecision 与 RunAttempt。
      en: ToolDefinition, RegistryEntry, MCPRequest/Response, PolicyDecision, and RunAttempt.
      ja: ToolDefinition/RegistryEntry/MCPRequest/Response/PolicyDecision/RunAttempt。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 调用层记录“实际执行一次能力”的发生事实。Anthropic 在 assistant message 中发出 tool_use，随后在 user message 中返回 tool_result 并通过 tool_use_id 关联。OpenAI Chat/Responses 在 assistant 输出中给出 tool_calls 或 function_call，工具结果以 tool 角色消息或 output item 回传。Vercel AI SDK 的 generateText/streamText 把 toolCalls 与 toolResults 作为独立数组字段。MCP tools/call 在已初始化 session 上发送 JSON-RPC 请求并返回 content[] 结果。Moonweave 保留 ToolCallPlan→ToolCallAttempt→ToolResult 链条，validation 失败时不得创建 running attempt。
    en: Invocation records the occurrence of executing a capability once. Anthropic emits tool_use in an assistant message and returns tool_result in the next user message correlated by tool_use_id. OpenAI Chat/Responses emits tool_calls or function_call in assistant output and returns tool-role messages or output items. Vercel AI SDK generateText and streamText expose toolCalls and toolResults as separate arrays. MCP tools/call sends JSON-RPC on an initialized session and returns content[] results. Moonweave preserves ToolCallPlan→ToolCallAttempt→ToolResult and must not create a running attempt when validation fails.
    ja: invocation は capability 一回実行 occurrence を記録。Anthropic tool_use→tool_result（tool_use_id 相関）、OpenAI tool_calls/function_call→tool role message、Vercel AI SDK generateText/streamText toolCalls/toolResults 配列、MCP tools/call JSON-RPC content[] result。Moonweave は ToolCallPlan→ToolCallAttempt→ToolResult を保持し validation failure 時 running attempt を作りません。
  typical_input:
    - description: Anthropic tool_use block with bound arguments.
      format: |
        {"type":"tool_use","id":"toolu_01","name":"get_weather","input":{"city":"Shanghai"}}
      source_claims: [claim-tool-invocation-execution-anthropic]
    - description: MCP tools/call request and Tool Result content.
      format: |
        {"method":"tools/call","params":{"name":"get_weather","arguments":{"city":"Shanghai"}}}
        =>
        {"content":[{"type":"text","text":"72F and sunny"}],"isError":false}
      source_claims: [claim-tool-invocation-execution-mcp]
  typical_output:
    - description: Moonweave-local attempt and result trace.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "tool_call_plan_id": "plan-weather-204",
          "tool_call_attempt_id": "attempt-weather-204-1",
          "tool_result_id": "result-weather-204-1",
          "validation_result": "valid"
        }
      source_claims: [claim-tool-invocation-execution-design]
  reference_implementations:
    - name: Anthropic Tool Use
      url: https://docs.anthropic.com/en/docs/build-with-claude/tool-use
      description: tool_use and tool_result blocks.
    - name: Vercel AI SDK generateText
      url: https://sdk.vercel.ai/docs/reference/ai-sdk-core/generate-text
      description: toolCalls and toolResults arrays.
    - name: MCP Server Tools
      url: https://modelcontextprotocol.io/specification/2025-06-18/server/tools
      description: tools/call and Tool Result payload.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 模块标识, en: Module identifier, ja: モジュール識別子}
      definitions:
        zh: 能力调用与结果模块的稳定标识。
        en: Stable identifier for the capability invocation and outcomes module.
        ja: capability invocation/outcomes module の安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^tool-invocation-execution$'
      example_value: tool-invocation-execution
      allowed_values: []
      source_claims: [claim-tool-invocation-execution-design]
    - id: tool_call_plan_id
      labels: {zh: 调用计划标识, en: Tool call plan identifier, ja: ツール呼出計画識別子}
      definitions:
        zh: 已绑定参数、引用固定 ToolDefinition 版本的 ToolCallPlan 标识。
        en: ToolCallPlan identifier with bound arguments referencing a fixed ToolDefinition version.
        ja: bound argument を持ち固定 ToolDefinition version を参照する ToolCallPlan identifier。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: plan-weather-204
      allowed_values: []
      source_claims: [claim-tool-invocation-execution-design]
    - id: tool_call_attempt_id
      labels: {zh: 调用尝试标识, en: Tool call attempt identifier, ja: ツール呼出試行識別子}
      definitions:
        zh: 一次实际执行尝试的标识；失败尝试不得被最终结果覆盖。
        en: Identifier for one actual execution attempt; failed attempts must not be overwritten by a final result.
        ja: 一回 actual execution attempt の identifier。failed attempt は final result で上書きしません。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: attempt-weather-204-1
      allowed_values: []
      source_claims: [claim-tool-invocation-execution-design]
  constraints: []
  required_relations: []
examples:
  - id: tool-invocation-execution-example-anthropic-tool-result
    labels:
      zh: Anthropic tool_use 到 tool_result
      en: Anthropic tool_use to tool_result
      ja: Anthropic tool_use から tool_result
    descriptions:
      zh: "tool-call-0042 对应 toolu_01；执行后在 user message 返回 tool_result，tool_use_id 必须匹配。"
      en: "tool-call-0042 maps to toolu_01; execution returns tool_result in the user message with matching tool_use_id."
      ja: "tool-call-0042 が toolu_01 に対応。実行後 user message で matching tool_use_id の tool_result を返す。"
    example_source:
      product: Anthropic Messages API
      url: https://docs.anthropic.com/en/docs/build-with-claude/tool-use
    field_values:
      tool_use_id: toolu_01
      tool_call_id: tool-call-0042
    related_node_ids: [tool-invocation-execution]
