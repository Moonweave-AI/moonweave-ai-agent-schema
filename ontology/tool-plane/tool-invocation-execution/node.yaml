      en: "When required city is missing, validation returns /city required; running attempt-weather-0043-1 must not be created."
      ja: "required city 欠落時 validation が /city required を返し running attempt-weather-0043-1 を作成しません。"
    example_source:
      product: Moonweave invocation design
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
    field_values:
      validation_result: invalid
      attempt_created: false
    related_node_ids: [tool-invocation-execution]
    related_relation_ids: []
    source_claims: [claim-tool-invocation-execution-design]
parent_relation: null
relations: []
module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 输入以 InvocationExecutionRequest 为发生入口：请求实例化 InvocationSpecification 并请求一次
            Invocation，规范治理该发生；工具调用由 ToolCallPlan 明确对应
            ToolCall，提示实例化则解析并实例化一个确定版本的 PromptDefinition，计划或定义本身都不等于执行尝试。
          en: "Input begins with InvocationExecutionRequest: it instantiates an
            InvocationSpecification and requests an Invocation governed by that
            specification. A ToolCallPlan identifies the corresponding ToolCall,
            while PromptInstantiation resolves and instantiates one determinate
            PromptDefinition version; neither a plan nor a definition is an
            execution attempt."
          ja: 入力は InvocationExecutionRequest から始まり、InvocationSpecification
            を実体化してその仕様に統制される Invocation を要求します。ToolCallPlan は対応 ToolCall
            を示し、PromptInstantiation は確定版 PromptDefinition を解決・instance
            化しますが、plan も definition も execution attempt ではありません。
        family_concept_ids:
          - InvocationExecutionRequest
          - InvocationSpecification
          - ToolCallPlan
          - PromptDefinition
        relation_ids:
          - InvocationExecutionRequest-instantiates-InvocationSpecification
          - InvocationExecutionRequest-requests-Invocation
          - InvocationSpecification-governs-Invocation
          - ToolCallPlan-plans-ToolCall
          - PromptInstantiation-instantiates-PromptDefinition
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 输出是由确定尝试产生并与 attempt_id 关联的 InvocationResult；工具、命令和资源读取使用各自下位结果。提示实例化活动则跨域产出
            PromptTemplateInstance，结果身份仍归提示与指令。
          en: Output is an InvocationResult produced by a definite attempt and correlated
            with attempt_id; tools, commands, and resource reads use specialized
            results. PromptInstantiation also produces a cross-domain
            PromptTemplateInstance whose result identity remains owned by
            prompts and instructions.
          ja: output は definite attempt が produce し attempt_id と相関する InvocationResult
            で、tool・command・resource read は specialized result
            を使います。PromptInstantiation は cross-domain PromptTemplateInstance
            も生成し、result identity は prompts/instructions が所有します。
        family_concept_ids:
          - InvocationResult
          - ToolResult
          - ExecutionResult
          - ResourceReadResult
          - PromptTemplateInstance
        relation_ids:
          - InvocationAttempt-produces-InvocationResult
          - ToolCallAttempt-produces_result-ToolResult
          - Command-produces-ExecutionResult
          - ResourceReadRequest-produces-ResourceReadResult
          - PromptInstantiation-produces-PromptTemplateInstance
        not_applicable_reason: null
      failure:
        applicable: true
        description:
          zh: 工具执行失败仍可返回 is_error ToolResult，并以独立 ToolError 解释错误类别、代码和可重试性。
          en: Tool execution failure may still return an is_error ToolResult, with a
            separate ToolError explaining category, code, and retryability.
          ja: tool execution failure でも is_error ToolResult を返し separate ToolError が
            category・code・retryability を説明します。
        family_concept_ids:
          - ToolResult
          - ToolError
        relation_ids:
          - ToolCallAttempt-emits_diagnostic-ToolError
          - ToolResult-reports-ToolError
        not_applicable_reason: null
      recovery:
        applicable: true
        description:
          zh: 重试建立新的 ToolCallAttempt 并指向先前尝试；已经生效的副作用由 RecoveryAction 补偿或回滚。
          en: Retry creates a new ToolCallAttempt pointing to a prior attempt; an enacted
            side effect is compensated or rolled back by RecoveryAction.
          ja: retry は prior attempt を指す new ToolCallAttempt を作り enacted side effect は
            RecoveryAction が compensate/rollback します。
        family_concept_ids:
          - ToolCallAttempt
          - ToolSideEffect
          - RecoveryAction
        relation_ids:
          - ToolCallAttempt-retries-ToolCallAttempt
          - ToolSideEffect-recovered_by-RecoveryAction
        not_applicable_reason: null
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-tool-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 本域只拥有调用请求、调用发生、独立尝试、返回记录、工具诊断和已证实工具效应；定义、选择、消息摄入、安全批准与通用运行结局保留各自 owner。
            en: This module owns invocation requests, occurrences, independent attempts,
              return records, tool diagnostics, and evidenced tool effects only;
              definitions, selection, message ingestion, safety approval, and
              generic runtime outcomes retain their owners.
            ja: 本 module は invocation request・occurrence・independent attempt・return
              record・tool diagnostic・evidenced effect のみ所有し
              definition・selection・message ingestion・safety approval・generic
              outcome は各 owner に残します。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 结构审查确认 Invocation 下形成命令、工具、提示获取、资源读取与 attempt 组成分支，并以独立规格、结果、诊断和效应根闭合生命周期。
            en: Structural review confirms command, tool, prompt-get, resource-read, and
              composed-attempt branches under Invocation, closed by separate
              specification, result, diagnostic, and effect roots.
            ja: Invocation 下の command・tool・prompt-get・resource-read・composed-attempt branch
              と separate specification・result・diagnostic・effect root による closure
              を確認しました。
  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - Invocation
    allowed_backbone_predicates:
      - emits
      - has_attempt
      - is_a
      - may_cause
      - produces
      - requests
    flat_root_exception_concept_ids:
      - ExecutionSpecification
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-tool-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 本域只拥有调用请求、调用发生、独立尝试、返回记录、工具诊断和已证实工具效应；定义、选择、消息摄入、安全批准与通用运行结局保留各自 owner。
            en: This module owns invocation requests, occurrences, independent attempts,
              return records, tool diagnostics, and evidenced tool effects only;
              definitions, selection, message ingestion, safety approval, and
              generic runtime outcomes retain their owners.
            ja: 本 module は invocation request・occurrence・independent attempt・return
              record・tool diagnostic・evidenced effect のみ所有し
              definition・selection・message ingestion・safety approval・generic
              outcome は各 owner に残します。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 结构审查确认 Invocation 是本模块唯一的关键发生主干：Invocation —has_attempt→ InvocationAttempt
              是调用生命周期最直接的显示父链；InvocationAttempt —is_a→ RunAttempt
              作为跨域次级骨架保留严格类型语义。ExecutionSpecification 则是经审查的 flat-root
              exception，作为独立 specification-only 层级的入口；InvocationSpecification
              —governs→ Invocation
              只表达业务横向关系，不得提升为父关系。请求、结果、诊断和效应继续以各自真实谓词闭合生命周期。
            en: "Structural review confirms Invocation as the module's sole key occurrence
              backbone: Invocation —has_attempt→ InvocationAttempt is the most
              direct display-parent chain for the call lifecycle, while
              InvocationAttempt —is_a→ RunAttempt retains strict typing as a
              cross-domain secondary backbone. ExecutionSpecification is the
              reviewed flat-root exception that starts the independent
              specification-only hierarchy; InvocationSpecification —governs→
              Invocation is a lateral business relation and is not promoted to a
              parent edge. Requests, results, diagnostics, and effects continue
              to close the lifecycle through their factual predicates."
            ja: 構造審査は Invocation を本 module 唯一の key occurrence backbone と確認しました。Invocation
              —has_attempt→ InvocationAttempt は call lifecycle の最も直接的な
              display-parent chain で、InvocationAttempt —is_a→ RunAttempt は
              cross-domain secondary backbone
              として厳密な型意味を保持します。ExecutionSpecification は独立した specification-only
              hierarchy の入口となる審査済み flat-root exception
              です。InvocationSpecification —governs→ Invocation は業務上の横断 relation
              であり親辺へ昇格させません。request・result・diagnostic・effect は各自の事実 predicate で
              lifecycle を閉じます。
  competency_questions:
    - id: tool-invocation-execution-cq-argument-validation-v3
      semantic_key: tool-invocation-execution.argument-validation
      primary_owner_module_id: tool-invocation-execution
      related_module_ids:
        - tool-registry-definition
      questions:
        zh: 一次调用请求的实参是否符合它实例化的 InvocationSpecification 和所选 ToolDefinition 版本？
        en: Do an invocation request's arguments satisfy the InvocationSpecification it
          instantiates and the selected ToolDefinition version?
        ja: invocation request arguments は instantiated InvocationSpecification と
          selected ToolDefinition version に適合しますか。
      query: Resolve request-to-specification and specification-to-invocation links,
        then validate argument bindings against the exact selected
        ToolDefinition schema before any attempt starts.
      expected_assertion: A request may create an Invocation only after resolving one
        compatible definition version and passing argument validation;
        validation failure creates no attempt.
      evidence_binding:
        applicability: relation-backed
        owner_concept_ids:
          - InvocationExecutionRequest
          - InvocationSpecification
          - Invocation
          - ToolCallPlan
          - ToolCall
        related_concept_ids:
          - ToolDefinition
          - Tool
        relation_ids:
          - ToolDefinition-constrains_plan-ToolCallPlan
          - invokes_tool
        not_applicable_reason: null
      positive_example_ids:
        - tool-invocation-execution-cq-argument-validation-v3-example-positive
      counterexample_ids:
        - tool-invocation-execution-cq-argument-validation-v3-example-counter
      source_claims:
        - claim-tool-invocation-execution-design
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-tool-domain-reviewer
            reviewer_role: domain
