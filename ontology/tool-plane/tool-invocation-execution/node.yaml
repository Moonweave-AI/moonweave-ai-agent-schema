      questions:
        zh: 某次 ToolCall 有哪些 ToolCallAttempt；每次尝试返回什么 ToolResult、报告什么 ToolError，最终如何为
          RunOutcome 提供证据？
        en: Which ToolCallAttempts belong to a ToolCall, what ToolResult did each
          return, which ToolError did it report, and how do those facts evidence
          RunOutcome?
