    - other_module_id: runtime-execution-attempts
      semantic_area:
        zh: 工具专用调用与通用执行发生
        en: Tool-specific invocation versus generic execution occurrence
        ja: ツール固有呼出しと共通実行発生
      candidate_concept_ids:
        - RunAttempt
        - RunOutcome
      overlap_reason:
        zh: RunAttempt 提供所有活动共享的执行血缘；InvocationAttempt
          是其调用专用下位概念和唯一跨域衔接点，ToolCallAttempt 再在调用域内专化它。 本条仅记录
          RunAttempt、RunOutcome；其 canonical owner
          是执行尝试与结果（runtime-execution-attempts），因此 tool-invocation-execution
          在此引用这些概念。
        en: RunAttempt provides execution lineage shared by all activities;
          InvocationAttempt is its invocation-specific subtype and the single
          cross-domain hinge, while ToolCallAttempt further specializes it
          inside the invocation domain. This record is limited to RunAttempt and
          RunOutcome; their canonical owner is Execution attempts and outcomes
          (runtime-execution-attempts), so tool-invocation-execution references
          these concepts here.
        ja: RunAttempt は全活動共通の実行系譜を提供し、InvocationAttempt は呼出し固有の下位概念かつ唯一の domain
          間接続点、ToolCallAttempt は呼出し domain 内でさらに特殊化します。本条は RunAttempt・RunOutcome
          に限り、canonical owner は runtime-execution-attempts です。
      disambiguation_test:
        zh: 若移除 Invocation 引用和调用规范后仍可由 execution id、attempt number 与 outcome
          完整识别，则归执行尝试与结果；若尝试身份依赖具体 Invocation 或 ToolCall，则归调用与执行。
        en: If removing the Invocation reference and invocation specification still
          leaves an object fully identifiable by execution ID, attempt number,
          and outcome, it belongs to execution attempts and outcomes; if attempt
          identity depends on a concrete Invocation or ToolCall, it belongs to
          invocation and execution.
        ja: Invocation 参照と呼出し仕様を除いても execution id・attempt number・outcome で完全識別できれば
          execution attempts/outcomes、試行 identity が具体的 Invocation または ToolCall
          に依存すれば invocation/execution に属します。
