            zh: 结构审查确认 Invocation 是本模块唯一的关键发生主干：Invocation —has_attempt→ InvocationAttempt 是调用生命周期最直接的显示父链；InvocationAttempt —is_a→ RunAttempt 作为跨域次级骨架保留严格类型语义。ExecutionSpecification 则是经审查的 flat-root exception，作为独立 specification-only 层级的入口；InvocationSpecification —governs→ Invocation 只表达业务横向关系，不得提升为父关系。请求、结果、诊断和效应继续以各自真实谓词闭合生命周期。
            en: "Structural review confirms Invocation as the module's sole key occurrence backbone: Invocation —has_attempt→ InvocationAttempt is the most direct display-parent chain for the call lifecycle, while InvocationAttempt —is_a→ RunAttempt retains strict typing as a cross-domain secondary backbone. ExecutionSpecification is the reviewed flat-root exception that starts the independent specification-only hierarchy; InvocationSpecification —governs→ Invocation is a lateral business relation and is not promoted to a parent edge. Requests, results, diagnostics, and effects continue to close the lifecycle through their factual predicates."
            ja: 構造審査は Invocation を本 module 唯一の key occurrence backbone と確認しました。Invocation —has_attempt→ InvocationAttempt は call lifecycle の最も直接的な display-parent chain で、InvocationAttempt —is_a→ RunAttempt は cross-domain secondary backbone として厳密な型意味を保持します。ExecutionSpecification は独立した specification-only hierarchy の入口となる審査済み flat-root exception です。InvocationSpecification —governs→ Invocation は業務上の横断 relation であり親辺へ昇格させません。request・result・diagnostic・effect は各自の事実 predicate で lifecycle を閉じます。
