  key_notion:
    zh: 调用
    en: Invocation
    ja: 呼び出し
  owns_when:
    zh: 当对象必须依赖某次调用、某次独立尝试或该尝试产生的返回、诊断和效果才能识别时，由本模块拥有；可复用定义和整次运行不在此范围。
    en: Own an object when it can be identified only through a particular invocation, an independent attempt, or the return, diagnostic, or effect produced by that attempt; reusable definitions and the run as a whole are outside this scope.
    ja: 特定の呼び出し、独立した試行、またはその試行が生んだ返却、診断、効果によってのみ識別できる対象を所有します。再利用可能な定義と実行全体は対象外です。
  references_when:
    zh: 本模块引用被调用的稳定能力定义、此前的选择结论、采用的授权与隔离控制，以及承载调用的协议消息；其他模块需要描述一次具体调用时反向引用本模块对象，不复制其身份。
    en: This module references the durable capability definition invoked, the preceding selection, the authorization and isolation controls applied, and the protocol messages carrying the invocation. Other modules reference these invocation objects when needed rather than copying their identity.
    ja: 本モジュールは呼び出された永続的な能力定義、先行する選択結果、適用された認可と隔離制御、呼び出しを運ぶプロトコルメッセージを参照します。他のモジュールは必要に応じて呼び出し対象を参照し、その同一性を複製しません。
