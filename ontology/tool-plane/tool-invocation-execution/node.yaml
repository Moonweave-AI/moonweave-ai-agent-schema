      candidate_concept_ids:
        - AnswerOwnership
        - Orchestrator
      overlap_reason:
        zh: AgentAsToolInvocation 可由 Orchestrator 发起，但调用是具有参数、尝试和结果的发生事实；Orchestrator
          是跨多次调用复用的协作职责。 本条仅记录 AnswerOwnership、Orchestrator；其 canonical owner
          是协同角色（orchestration-actors-delegation），因此 tool-invocation-execution
          在此引用这些概念。
        en: AgentAsToolInvocation may be initiated by an Orchestrator, but the
          invocation is an occurrence with arguments, attempts, and results,
          whereas Orchestrator is a collaboration responsibility reused across
          calls. This record is limited to AnswerOwnership, Orchestrator; their
          canonical owner is Coordination roles
          (orchestration-actors-delegation), so tool-invocation-execution
          references these concepts here.
        ja: AgentAsToolInvocation は Orchestrator
          が開始できますが、呼び出しは引数・試行・結果を持つ発生事実で、Orchestrator は複数呼び出しで再利用される協働責務です。
          この記録は AnswerOwnership、Orchestrator だけを対象とし、canonical owner
          は協調ロール（orchestration-actors-delegation）です。したがって
          tool-invocation-execution はここでこれらを参照します。
