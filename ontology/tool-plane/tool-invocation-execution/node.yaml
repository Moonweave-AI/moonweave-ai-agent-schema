    source: eng-fw-openai-agents-tools
    supports: OpenAI Agents SDK distinguishes ordinary function-tool calls from agents-as-tools and states that the manager retains control when an agent is exposed as a tool. Moonweave uses manager-retained control to separate AgentAsToolInvocation from delegation.
    locator: Tools > Function tools; Agents as tools; Handling errors in function tools
    evidence_kind: official
    confidence: high
    review_status: accepted
