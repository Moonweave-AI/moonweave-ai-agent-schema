        zh: ToolCallAttempt 记录工具专用执行发生，ToolSideEffect 记录锚定到该尝试且已有证据的外部改变；CommitGate 在改变前识别并放行或阻断具体 CommitRequest，SideEffect 则是不依赖工具协议的外部改变事件。
