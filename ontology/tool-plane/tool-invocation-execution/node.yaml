        zh: 由 invocation id、参数、尝试与 ToolResult 识别的对象归调用与执行；由角色、职责范围与有效期识别的对象归协同角色。
        en: An object identified by invocation ID, arguments, attempts, and ToolResult
          belongs to invocation and execution; one identified by role,
          responsibility scope, and validity interval belongs to coordination
