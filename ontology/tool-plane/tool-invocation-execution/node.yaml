    source: eng-proto-mcp-tools-2025-06-18
    supports: MCP separates a tools/call request from its Tool Result, requires a result for tool execution errors, and reserves protocol errors for malformed or unknown requests. Moonweave uses the separation to define request, attempt, result, and diagnostic branches.
    locator: Server Features > Tools > Calling Tools; Tool Result; Error Handling
    evidence_kind: official
    confidence: high
    review_status: accepted
