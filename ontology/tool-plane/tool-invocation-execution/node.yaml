schema: moonweave.ai/ontology-node/v1
id: tool-invocation-execution
kind: module
status: review
labels:
  zh: 能力调用与结果
  en: Capability invocation and outcomes
  ja: 能力の呼び出しと結果
semantics:
  short_definition:
    zh: 能力调用与结果描述一次已选能力如何从调用请求和执行规范形成具体调用，经历一个或多个独立尝试，并产生结果、诊断或可归因的调用效果。它只拥有这次调用的发生事实，不拥有能力定义、协议封装、授权决定或整个智能体运行的结局。
    en: Capability invocation and outcomes describes how a selected capability becomes a concrete invocation from an execution request and specification, proceeds through one or more independent attempts, and yields results, diagnostics, or attributable invocation effects. It owns occurrence facts for that invocation, not the capability definition, protocol envelope, authorization decision, or outcome of the agent run as a whole.
    ja: 能力の呼び出しと結果は、選択済みの能力が実行要求と仕様から具体的な呼び出しとなり、一回以上の独立した試行を経て、結果、診断、または呼び出しに帰属する効果を生む過程を記述します。所有するのはその呼び出しの発生事実であり、能力定義、プロトコルの包絡、認可判断、エージェント実行全体の結果ではありません。
  definition:
    zh: 能力调用与结果描述一次已选能力如何从调用请求和执行规范形成具体调用，经历一个或多个独立尝试，并产生结果、诊断或可归因的调用效果。它只拥有这次调用的发生事实，不拥有能力定义、协议封装、授权决定或整个智能体运行的结局。
    en: Capability invocation and outcomes describes how a selected capability becomes a concrete invocation from an execution request and specification, proceeds through one or more independent attempts, and yields results, diagnostics, or attributable invocation effects. It owns occurrence facts for that invocation, not the capability definition, protocol envelope, authorization decision, or outcome of the agent run as a whole.
    ja: 能力の呼び出しと結果は、選択済みの能力が実行要求と仕様から具体的な呼び出しとなり、一回以上の独立した試行を経て、結果、診断、または呼び出しに帰属する効果を生む過程を記述します。所有するのはその呼び出しの発生事実であり、能力定義、プロトコルの包絡、認可判断、エージェント実行全体の結果ではありません。
  why_needed:
    zh: 让一次调用的意图、约束、每次尝试、返回内容、失败原因和可观察效果可以分别追踪，而不把失败覆盖成最终结果。
    en: Keeps invocation intent, constraints, every attempt, returned content, failure causes, and observable effects separately traceable without overwriting failures with a final result.
    ja: 呼び出し意図、制約、各試行、返却内容、失敗原因、観測可能な効果を別々に追跡し、失敗を最終結果で上書きしないようにします。
  includes:
    - zh: 工具调用、程序化工具调用、智能体作为工具调用、命令调用，以及提示获取和资源读取等具体能力调用。
      en: Concrete capability invocations including tool calls, programmatic tool calls, agent-as-tool calls, commands, prompt retrieval, and resource reads.
      ja: ツール呼び出し、プログラム化ツール呼び出し、エージェントをツールとして使う呼び出し、コマンド、プロンプト取得、リソース読み取りなどの具体的な能力呼び出しを含みます。
    - zh: 调用请求、可复用执行规范与已绑定参数的调用计划之间的区分。
      en: The distinction among an invocation request, a reusable execution specification, and a call plan with bound arguments.
      ja: 呼び出し要求、再利用可能な実行仕様、引数を束縛した呼び出し計画を区別します。
    - zh: 每次调用尝试及其结果、诊断和调用效果；不同尝试保留独立身份。
      en: Each invocation attempt and its result, diagnostic, and invocation effect, with separate identity retained for every attempt.
      ja: 各呼び出し試行と、その結果、診断、呼び出し効果を含み、試行ごとの同一性を保持します。
  excludes:
    - zh: 能力定义、目录成员和候选选择分别属于能力目录与定义、工具发现与选择。
      en: Capability definitions, catalog membership, and candidate selection belong respectively to capability catalogs and definitions and to tool discovery and selection.
      ja: 能力定義とカタログ所属は能力カタログと定義に、候補選択はツール発見と選択に属します。
    - zh: MCP 请求、响应、通知、会话和传输属于 MCP 会话与协议交互；对话中呈现的工具结果消息属于信息域。
      en: MCP requests, responses, notifications, sessions, and transports belong to MCP sessions and protocol interaction; tool-result messages presented in conversation belong to the information domain.
      ja: MCP の要求、応答、通知、セッション、トランスポートは MCP セッションとプロトコル対話に属し、会話に提示されるツール結果メッセージは情報領域に属します。
    - zh: 授权、隔离、提交闸门和实际外部副作用治理属于安全域；通用 RunAttempt 与 RunOutcome 属于运行时。
      en: Authorization, isolation, commit gates, and governance of actual external side effects belong to Safety; generic RunAttempt and RunOutcome belong to Runtime.
      ja: 認可、隔離、コミットゲート、実際の外部副作用の統制は安全領域に属し、一般的な RunAttempt と RunOutcome は実行時領域に属します。
  semantic_kind: null
  aliases: []
purpose:
  zh: 为一次能力调用建立从请求和规范到尝试、结果、诊断与效果的可追踪发生链。
  en: Establish a traceable occurrence chain from request and specification through attempts, results, diagnostics, and effects for one capability invocation.
  ja: 一回の能力呼び出しについて、要求と仕様から試行、結果、診断、効果までの追跡可能な発生連鎖を確立します。
structure: null
examples:
  - id: tool-invocation-execution-cq-argument-validation-v3-example-positive
    kind: positive
    labels:
      zh: 实参通过固定工具定义后形成调用
      en: Arguments validate against an immutable definition before invocation
      ja: 不変 tool definition 検証後に invocation を形成
    scenario_id: null
    descriptions:
      zh: "invoke-request-0042 实例化 weather-spec@3.1，plan-weather-0042 受 weather@3.0.0 的固定 Schema 约束；实参 {city: Shanghai} 通过 Draft 2020-12 校验后，请求才产生 tool-call-0042。"
      en: "invoke-request-0042 instantiates weather-spec@3.1, while plan-weather-0042 is constrained by the immutable schema of weather@3.0.0. Only after {city: Shanghai} passes Draft 2020-12 validation does the request create tool-call-0042."
      ja: "invoke-request-0042 は weather-spec@3.1 を instantiate し、plan-weather-0042 は weather@3.0.0 の不変 schema に制約されます。{city: Shanghai} が Draft 2020-12 validation を通過した後だけ tool-call-0042 を作ります。"
    field_values:
      invocation_request_id: invoke-request-0042
      invocation_specification_id: weather-spec
      invocation_specification_version: "3.1"
      tool_call_plan_id: plan-weather-0042
      tool_definition_id: weather
      tool_definition_version: 3.0.0
      tool_definition_digest: sha256:weather-definition-v3
      stable_tool_id: tool-weather
      input_schema_dialect: https://json-schema.org/draft/2020-12/schema
      input_schema_digest: sha256:weather-input-schema-v3
      arguments:
        city: Shanghai
      validation_result: valid
      invocation_id: invocation-weather-0042
      tool_call_id: tool-call-0042
      attempt_created: false
    related_node_ids:
      - InvocationExecutionRequest
      - InvocationSpecification
      - Invocation
      - ToolCallPlan
      - ToolCall
      - Tool
      - ToolDefinition
    related_relation_ids:
      - InvocationExecutionRequest-instantiates-InvocationSpecification
      - InvocationExecutionRequest-requests-Invocation
      - InvocationSpecification-governs-Invocation
      - ToolDefinition-constrains_plan-ToolCallPlan
      - invokes_tool
    expected_result:
      zh: 请求、规范、计划、定义和调用保持独立身份；返回通过的具体 Schema 版本与参数，且验证时尚未创建任何尝试。
      en: Request, specification, plan, definition, and invocation retain separate identities; return the exact schema revision and arguments that passed, with no attempt created during validation.
      ja: request・specification・plan・definition・invocation を分離し、通過した exact schema revision/argument を返し、validation 時点では attempt を作りません。
    why_valid_or_invalid:
      zh: 定义摘要和 Schema 方言固定了验证语义，ToolDefinition→ToolCallPlan 与 ToolCall→Tool 两条跨域边分别表达约束来源和稳定工具身份。
      en: The definition digest and schema dialect fix validation semantics; ToolDefinition-to-ToolCallPlan and ToolCall-to-Tool separately express the constraint source and stable tool identity.
      ja: definition digest と schema dialect が validation 意味を固定し、ToolDefinition→ToolCallPlan と ToolCall→Tool が constraint source と stable tool identity を別々に表します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-invocation-execution-004
  - id: tool-invocation-execution-cq-argument-validation-v3-example-counter
    kind: counterexample
    labels:
      zh: 缺少必填参数却伪造运行中尝试
      en: Running attempt fabricated after required-argument failure
      ja: required argument failure 後の running attempt 捏造
    scenario_id: null
    descriptions:
      zh: "invoke-request-0043 对 weather@3.0.0 只提交 {units: metric}，缺少 required=[city]；验证器返回 /city required 错误，但数据仍创建 running 的 attempt-weather-0043-1。"
      en: "invoke-request-0043 submits only {units: metric} to weather@3.0.0 and omits required=[city]. Validation returns a /city required error, yet the record still creates running attempt-weather-0043-1."
      ja: "invoke-request-0043 は weather@3.0.0 に {units: metric} だけを送り required=[city] を欠きます。validation は /city required error を返すのに running attempt-weather-0043-1 を作ります。"
    field_values:
      invocation_request_id: invoke-request-0043
      tool_call_plan_id: plan-weather-0043
      tool_definition_ref: weather@3.0.0#sha256:weather-definition-v3
      input_schema_digest: sha256:weather-input-schema-v3
      arguments:
        units: metric
      required_properties:
        - city
      validation_result: invalid
      validation_error_instance_path: /city
      validation_error_keyword: required
      fabricated_tool_call_attempt_id: attempt-weather-0043-1
      fabricated_attempt_state: running
    related_node_ids:
      - InvocationExecutionRequest
      - InvocationSpecification
      - Invocation
      - ToolCallPlan
      - ToolCall
      - ToolCallAttempt
      - Tool
      - ToolDefinition
    related_relation_ids:
      - InvocationExecutionRequest-instantiates-InvocationSpecification
      - InvocationExecutionRequest-requests-Invocation
      - InvocationSpecification-governs-Invocation
      - ToolDefinition-constrains_plan-ToolCallPlan
      - invokes_tool
    expected_result:
      zh: 保留请求与结构化验证错误，拒绝 running 尝试；补齐 city 并形成新请求版本前不得执行。
      en: Retain the request and structured validation error, reject the running attempt, and execute nothing until city is supplied in a new request revision.
      ja: request と structured validation error を保持し running attempt を拒否し、new request revision で city を補うまで実行しません。
    why_valid_or_invalid:
      zh: MCP 将输入验证错误与工具执行结果分开；未通过输入 Schema 的请求没有可执行调用身份，更不能凭状态字符串制造尝试。
      en: MCP separates input-validation errors from tool execution results; a request that fails its input schema has no executable call identity, and a state string cannot manufacture an attempt.
      ja: MCP は input-validation error と tool execution result を分けます。input schema failure request に executable call identity はなく state string で attempt を作れません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-invocation-execution-005
  - id: tool-invocation-execution-cq-attempt-result-v3-example-positive
    kind: positive
    labels:
      zh: 保留超时与成功两次调用尝试
      en: Timed-out and successful call attempts remain distinct
      ja: timeout/success call attempt を別々に保持
    scenario_id: null
    descriptions:
      zh: tool-call-0044 保留 attempt-weather-0044-1 与 attempt-weather-0044-2：第一次产生 isError=true 的 result-timeout-0044 并报告 upstream_timeout，第二次产生结构化 result-weather-0044；只有第二份结果以 criterion-weather-v2 为 outcome-0044=success 提供证据。
      en: tool-call-0044 preserves attempt-weather-0044-1 and attempt-weather-0044-2. The first produces result-timeout-0044 with isError=true and reports upstream_timeout; the second produces structured result-weather-0044, and only that result evidences outcome-0044=success under criterion-weather-v2.
      ja: tool-call-0044 は attempt-weather-0044-1/2 を保持します。第一は isError=true の result-timeout-0044 と upstream_timeout、第二は structured result-weather-0044 を生成し、第二だけが criterion-weather-v2 により outcome-0044=success を evidence します。
    field_values:
      invocation_id: invocation-weather-0044
      tool_call_id: tool-call-0044
      attempt_ids:
        - attempt-weather-0044-1
        - attempt-weather-0044-2
      attempt_numbers:
        - 1
        - 2
      attempt_1_state: timed-out
      attempt_1_result_id: result-timeout-0044
      attempt_1_is_error: true
      attempt_1_error_id: error-upstream-timeout-0044
      attempt_1_error_code: upstream_timeout
      attempt_2_state: succeeded
      attempt_2_result_id: result-weather-0044
      attempt_2_structured_content_digest: sha256:weather-result-0044
      completion_criterion_id: criterion-weather-v2
      run_outcome_id: outcome-0044
      run_outcome_value: success
    related_node_ids:
      - Invocation
      - InvocationAttempt
      - InvocationResult
      - InvocationDiagnostic
      - RunAttempt
      - ToolCall
      - ToolCallAttempt
      - ToolResult
      - ToolError
      - RunOutcome
    related_relation_ids:
      - Invocation-has_attempt-InvocationAttempt
      - ToolCall-has_attempt-ToolCallAttempt
      - ToolCallAttempt-is_a-InvocationAttempt
      - InvocationAttempt-is_a-RunAttempt
      - InvocationAttempt-produces-InvocationResult
      - InvocationAttempt-emits-InvocationDiagnostic
      - ToolCallAttempt-produces_result-ToolResult
      - ToolResult-reports-ToolError
      - ToolResult-evidences-RunOutcome
    expected_result:
      zh: 返回按序的两个尝试、各自结果和诊断，并只用成功尝试的可检查结果支持最终结局；超时历史保持不变。
      en: Return both ordered attempts with their own results and diagnostics, and use only the successful attempt's inspectable result to support the final outcome; preserve the timeout history unchanged.
      ja: 順序付き二 attempt と各 result/diagnostic を返し、successful attempt の検査可能 result だけで final outcome を支持し timeout history は不変保持します。
    why_valid_or_invalid:
      zh: ToolCall、ToolCallAttempt、ToolResult、ToolError 和 RunOutcome 回答不同问题；尝试子型边与结果证据边只连接身份，不覆盖先前发生。
      en: ToolCall, ToolCallAttempt, ToolResult, ToolError, and RunOutcome answer different questions; subtype and evidence edges connect identities without overwriting prior occurrences.
      ja: ToolCall・ToolCallAttempt・ToolResult・ToolError・RunOutcome は別問に答え、subtype/evidence edge は identity を結ぶだけで prior occurrence を上書きしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-invocation-execution-006
  - id: tool-invocation-execution-cq-attempt-result-v3-example-counter
    kind: counterexample
    labels:
      zh: 重试成功后覆盖超时历史
      en: Successful retry overwrites timeout history
      ja: retry success が timeout history を上書き
    scenario_id: null
    descriptions:
      zh: tool-call-0045 第二次尝试成功后，记录把 attempt-weather-0045-1 从 timed-out 改写为 succeeded，删除其错误，并让 ToolCall 直接指向 result-weather-0045，结果没有 producing attempt_id。
      en: After the second attempt of tool-call-0045 succeeds, the record rewrites attempt-weather-0045-1 from timed-out to succeeded, deletes its error, and links ToolCall directly to result-weather-0045, which has no producing attempt_id.
      ja: tool-call-0045 の second attempt success 後、attempt-weather-0045-1 を timed-out から succeeded に書換え error を削除し、ToolCall を producing attempt_id のない result-weather-0045 に直接結びます。
    field_values:
      tool_call_id: tool-call-0045
      original_attempt_1_id: attempt-weather-0045-1
      original_attempt_1_state: timed-out
      rewritten_attempt_1_state: succeeded
      original_attempt_1_error_id: error-upstream-timeout-0045
      error_record_preserved: false
      attempt_2_id: attempt-weather-0045-2
      attempt_2_state: succeeded
      result_id: result-weather-0045
      result_producing_attempt_id: null
      direct_tool_call_to_result_asserted: true
      history_mutated: true
    related_node_ids:
      - Invocation
      - InvocationAttempt
      - InvocationResult
      - InvocationDiagnostic
      - RunAttempt
      - ToolCall
      - ToolCallAttempt
      - ToolResult
      - ToolError
      - RunOutcome
    related_relation_ids:
      - Invocation-has_attempt-InvocationAttempt
      - ToolCall-has_attempt-ToolCallAttempt
      - ToolCallAttempt-is_a-InvocationAttempt
      - InvocationAttempt-is_a-RunAttempt
      - InvocationAttempt-produces-InvocationResult
      - InvocationAttempt-emits-InvocationDiagnostic
      - ToolCallAttempt-produces_result-ToolResult
      - ToolResult-reports-ToolError
      - ToolResult-evidences-RunOutcome
    expected_result:
      zh: 拒绝历史改写和 ToolCall→ToolResult 快捷边；恢复超时尝试与错误，并要求结果明确由第二次 ToolCallAttempt 产生。
      en: Reject the history rewrite and ToolCall-to-ToolResult shortcut; restore the timed-out attempt and error, and require the result to identify the second ToolCallAttempt as producer.
      ja: history rewrite と ToolCall→ToolResult shortcut を拒否し、timeout attempt/error を復元して result producer を second ToolCallAttempt と明示します。
    why_valid_or_invalid:
      zh: 重试是新发生而非原地状态修改；结果若跳过产生它的尝试，就无法审计延迟、用量、错误和最终结局的证据来源。
      en: A retry is a new occurrence, not an in-place state mutation; a result that skips its producing attempt cannot support audit of latency, usage, error, or final-outcome evidence.
      ja: retry は new occurrence で in-place mutation ではありません。producing attempt を飛ばす result では latency・usage・error・final outcome evidence を監査できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-invocation-execution-007
  - id: tool-invocation-execution-cq-effect-governance-v3-example-positive
    kind: positive
    labels:
      zh: 提交门允许后由外部回执证明副作用
      en: External receipt proves the side effect after commit approval
      ja: commit allow 後に external receipt が side effect を証明
    scenario_id: null
    descriptions:
      zh: attempt-ticket-778 在 gate-ticket-write-778 于 10:04:12Z 明确 allow 后提交幂等键 ticket-778；外部系统于 10:04:13Z 返回 receipt INC-778，因而 effect-ticket-778 被识别为 ToolSideEffect，并通过 InvocationEffect→SideEffect 类型链进入统一副作用治理。
      en: attempt-ticket-778 submits idempotency key ticket-778 only after gate-ticket-write-778 explicitly allows at 10:04:12Z. The external system returns receipt INC-778 at 10:04:13Z, so effect-ticket-778 is identified as ToolSideEffect and enters generic side-effect governance through the InvocationEffect-to-SideEffect type chain.
      ja: attempt-ticket-778 は gate-ticket-write-778 が 10:04:12Z に allow した後だけ idempotency key ticket-778 を送ります。外部 system が 10:04:13Z に receipt INC-778 を返すため effect-ticket-778 は ToolSideEffect と識別され InvocationEffect→SideEffect type chain で汎用 governance に入ります。
    field_values:
      tool_call_attempt_id: attempt-ticket-778
      invocation_effect_id: effect-ticket-778
      tool_side_effect_id: effect-ticket-778
      side_effect_type: create-record
      commit_gate_id: gate-ticket-write-778
      commit_decision: allow
      commit_decided_at: 2026-07-16T10:04:12Z
      idempotency_key: ticket-778
      external_receipt_id: INC-778
      external_effect_observed_at: 2026-07-16T10:04:13Z
      external_record_uri: ticket://incident/INC-778
      effect_enacted: true
    related_node_ids:
      - InvocationAttempt
      - InvocationEffect
      - ToolCallAttempt
      - ToolSideEffect
      - CommitGate
      - SideEffect
    related_relation_ids:
      - InvocationAttempt-may_cause-InvocationEffect
      - ToolCallAttempt-may_cause-ToolSideEffect
      - InvocationEffect-is_a-SideEffect
      - tool_side_effect_requires_commit_gate
    expected_result:
      zh: 返回允许决定、调用尝试、幂等键和外部回执，并确认实际变化晚于允许；ToolSideEffect 是 SideEffect 的下位事件，不创建第二个“映射后事件”。
      en: Return the allowing decision, call attempt, idempotency key, and external receipt, and verify enactment follows approval; ToolSideEffect is a SideEffect subtype rather than a second mapped event.
      ja: allow decision・call attempt・idempotency key・external receipt を返し enactment が approval 後と確認します。ToolSideEffect は SideEffect subtype で第二の mapped event は作りません。
    why_valid_or_invalid:
      zh: 提交门证明事前许可，外部回执证明事后发生；两种证据缺一不可，也不能用预览文本替代真实副作用。
      en: The commit gate proves prior permission and the external receipt proves subsequent occurrence; both are required, and preview text cannot substitute for an enacted side effect.
      ja: commit gate は事前 permission、external receipt は事後 occurrence を証明し、両方が必要です。preview text は enacted side effect を代替しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-invocation-execution-008
  - id: tool-invocation-execution-cq-effect-governance-v3-example-counter
    kind: counterexample
    labels:
      zh: 拒绝后把预览文本误记为副作用
      en: Preview text misrecorded as a side effect after rejection
      ja: reject 後 preview text を side effect と誤記
    scenario_id: null
    descriptions:
      zh: attempt-ticket-779 只生成“将创建工单”的 preview-779；gate-ticket-write-779 在 10:08:00Z 返回 reject，外部系统没有 receipt 或记录 URI，但数据仍建立 effect-ticket-779 且标记 enacted=true。
      en: attempt-ticket-779 produces only preview-779 saying “will create ticket.” gate-ticket-write-779 returns reject at 10:08:00Z and the external system provides neither receipt nor record URI, yet the data asserts effect-ticket-779 with enacted=true.
