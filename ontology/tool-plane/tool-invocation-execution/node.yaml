  key_notion:
    zh: 调用
    en: Invocation
    ja: 呼び出し
  owns_when:
    zh: 当对象必须依赖某次调用、某次独立尝试或该尝试产生的返回、诊断和效果才能识别时，由本模块拥有；可复用定义和整次运行不在此范围。
    en: Own an object when it can be identified only through a particular
      invocation, an independent attempt, or the return, diagnostic, or effect
      produced by that attempt; reusable definitions and the run as a whole are
      outside this scope.
    ja: 特定の呼び出し、独立した試行、またはその試行が生んだ返却、診断、効果によってのみ識別できる対象を所有します。再利用可能な定義と実行全体は対象外です。
  references_when:
    zh: 本模块引用被调用的稳定能力定义、此前的选择结论、采用的授权与隔离控制，以及承载调用的协议消息；其他模块需要描述一次具体调用时反向引用本模块对象，不复制其身份。
    en: This module references the durable capability definition invoked, the
      preceding selection, the authorization and isolation controls applied, and
      the protocol messages carrying the invocation. Other modules reference
      these invocation objects when needed rather than copying their identity.
    ja: 本モジュールは呼び出された永続的な能力定義、先行する選択結果、適用された認可と隔離制御、呼び出しを運ぶプロトコルメッセージを参照します。他のモジュールは必要に応じて呼び出し対象を参照し、その同一性を複製しません。
  boundary_decisions:
    - other_module_id: orchestration-delegation-handoff
      subject_concept_ids:
        - DelegationContract
        - HandoffProcess
      decision: references
      owner_module_id: orchestration-delegation-handoff
      rationale:
        zh: 调用与执行拥有管理者保留控制和答案责任的 AgentAsToolInvocation；委派与移交拥有转交工作、权限、上下文或控制责任的
          DelegationProcess 与 HandoffProcess。 本条仅记录
          DelegationContext、HandoffProcess；其 canonical owner
          是委派与移交（orchestration-delegation-handoff），因此 tool-invocation-execution
          在此引用这些概念。
        en: Invocation and execution own AgentAsToolInvocation when the manager retains
          control and answer responsibility; delegation and handoff own
          DelegationProcess and HandoffProcess that transfer work, authority,
          context, or control responsibility. This record is limited to
          DelegationContext, HandoffProcess; their canonical owner is Delegation
          and handoff (orchestration-delegation-handoff), so
          tool-invocation-execution references these concepts here.
        ja: 呼び出しと実行は管理者が制御と回答責任を保持する AgentAsToolInvocation
          を所有し、委任と引き継ぎは作業・権限・コンテキスト・制御責任を移す DelegationProcess と HandoffProcess
          を所有します。 この記録は DelegationContext、HandoffProcess だけを対象とし、canonical owner
          は委任と引き継ぎ（orchestration-delegation-handoff）です。したがって
          tool-invocation-execution はここでこれらを参照します。
      relation_ids: []
      relation_not_applicable_reason:
        zh: “调用与执行”与“委派与移交”之间没有适用于本 owner 概念组的已接受跨模块事实；该决策只比较明确列出的候选概念，不暗示运行时交互。
        en: There is no accepted cross-module fact applicable to this owner-homogeneous
          concept group between Invocation and execution and Delegation and
          handoff; the decision compares only the named candidates without
          implying runtime interaction.
        ja: 「呼び出しと実行」と「委任と引き継ぎ」の間には、この owner
          単一概念群に適用できる承認済みモジュール間事実がありません。明示候補だけを比較し、実行時相互作用を示唆しません。
