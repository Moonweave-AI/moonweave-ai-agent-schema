schema: moonweave.ai/ontology-node/v1
id: tool-invocation-execution
kind: module
labels:
  zh: 工具调用与执行
  en: Tool invocation and execution
  ja: ツール呼び出しと実行
semantics:
  short_definition:
    zh: 记录一次工具、命令或远程代理调用如何被计划、尝试、诊断并产生本地可审计结果的模块。
    en: A module for planning, attempting, diagnosing, and locally auditing tool, command, and remote-agent invocations.
    ja: ツール、コマンド、リモートエージェント呼び出しを計画・試行・診断・監査するモジュール。
  definition:
    zh: >-
      本模块建模 Moonweave 调用活动与固定方面的执行证据实体。请求记录由相关本地活动使用，结果、诊断、效果和提示词实例化记录由已观察的尝试生成；它可关联 MCP、Responses 和 A2A 原生数据，但不重命名、替换或合并其 wire schema。
    en: >
      This module models Moonweave invocation activities and fixed-aspect execution-evidence
      Entities. Request records are used by the relevant local activities; result, diagnostic,
      effect, and prompt-materialization records are generated by observed attempts. It distinguishes a
      local Invocation trace from protocol-native data: MCP tools/call is a JSON-RPC request and
      ToolResult is its result object; an OpenAI Responses function_call and function_call_output
      are response/input items; an OpenAI remote-MCP mcp_call is a Responses output item; and an
      A2A SendMessage operation creates or continues a Task or returns a Message. The module may
      correlate those records, but does not rename, replace, or merge their wire schemas.
    ja: >-
      このモジュールは Moonweave の呼び出し活動と固定側面の実行証拠 Entity をモデル化する。要求記録は対応するローカル活動により使用され、結果、診断、効果、プロンプト具体化記録は観測済み試行から生成される。MCP、Responses、A2A のネイティブデータを相関できるが、それぞれの wire schema を改名、置換、統合しない。
  why_needed:
    zh: >-
      主机需要跨异构执行表面审计意图、重试、诊断、效果和结果。将每个请求或证据实体与使用或生成它的活动及原生载荷分开，可避免把本地状态、错误或结果记录误认为 MCP、OpenAI 或 A2A wire 对象。
    en: >
      A host needs one auditable local account of intent, retries, diagnostics, effects, and outcomes
      across heterogeneous execution surfaces. Keeping each request or evidence Entity separate from
      its consuming or generating activity and from native payloads
      prevents a local status, error, or result record from being mistaken for an MCP, OpenAI, or A2A
      wire object.
    ja: >-
      ホストには異種の実行表面をまたぐ意図、再試行、診断、効果、結果の監査可能なローカル記録が必要である。各要求または証拠 Entity を使用・生成する活動およびネイティブ payload から分離することで、ローカルの状態、エラー、結果を MCP、OpenAI、A2A の wire object と誤認しない。
  includes:
    - {zh: 本地调用轨迹、尝试、诊断、效果和结果, en: "Local invocation traces, attempts, diagnostics, effects, and results", ja: ローカルの呼び出し軌跡、試行、診断、効果、結果}
    - {zh: 对 MCP、Responses 和 A2A 原始记录的有来源映射, en: "Provenance-aware mappings to MCP, Responses, and A2A native records", ja: MCP、Responses、A2A のネイティブ記録への出所付き対応}
  excludes:
    - {zh: MCP 工具定义或 JSON-RPC 传输会话, en: MCP tool definitions or JSON-RPC transport sessions, ja: MCP ツール定義または JSON-RPC トランスポートセッション}
    - {zh: OpenAI API 的原始 Responses item 或 A2A Task/Artifact 数据模型, en: Native OpenAI Responses items or the A2A Task/Artifact data model, ja: ネイティブ OpenAI Responses item または A2A Task/Artifact データモデル}
  semantic_kind: module
  aliases:
    - {language: en, value: invocation evidence, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      主机以所属协议表示保存原始消息，再按本地调用和尝试标识建立独立轨迹。它可以将 MCP tools/call、Responses function_call/function_call_output、Responses mcp_call 或 A2A SendMessage 交换关联到该轨迹，而不复制外部字段来伪造通用 wire 对象。
    en: >
      A host preserves raw protocol messages in their owning protocol representation, then creates a
      separate local trace keyed by local invocation and attempt identifiers. It can map an MCP
      tools/call request, a Responses function_call/function_call_output pair, a Responses mcp_call,
      or an A2A SendMessage exchange to that trace without copying foreign fields into a fabricated
      universal wire object.
    ja: >-
      ホストは生のプロトコルメッセージをそのプロトコル固有の表現で保存し、ローカルの呼び出しおよび試行 ID をキーに別のトレースを作成する。MCP tools/call、Responses の function_call/function_call_output、Responses mcp_call、A2A SendMessage 交換をそのトレースに対応付けられるが、外来フィールドをコピーして共通 wire object を捏造しない。
  typical_input:
    - description: A host receives a Responses function_call item and creates a local trace before executing it.
      format: '{"id":"fc_123","call_id":"call_123","type":"function_call","name":"get_weather","arguments":"{\"location\":\"Paris\"}"}'
      source_claims: [openai-responses-function-items]
  typical_output:
    - description: The host records a local outcome while preserving the native response item separately.
      format: '{"local_invocation_id":"inv-42","local_surface":"openai_responses_function","local_outcome":"succeeded"}'
      source_claims: [moonweave-invocation-boundary, prov-entity-activity-boundary]
  reference_implementations:
    - name: MCP Tools specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines MCP tool discovery, tools/call, result objects, and errors.
    - name: OpenAI Function Calling guide
      url: https://developers.openai.com/api/docs/guides/function-calling
      description: Defines Responses function_call and function_call_output items.
    - name: OpenAI MCP and Connectors guide
      url: https://developers.openai.com/api/docs/guides/tools-connectors-mcp
      description: Defines Responses mcp_list_tools, mcp_call, and approval items.
    - name: A2A Protocol Specification
      url: https://a2a-protocol.org/latest/specification/
      description: Defines SendMessage, Task, Message, Artifact, and streaming task updates.
structure:
  identity_keys: []
  fields:
    - id: module_scope_id
      labels: {zh: 模块范围标识, en: Module scope identifier, ja: モジュール範囲識別子}
      definitions: {zh: 此本体模块的稳定标识，仅用于本地目录和审计，不是 MCP、Responses 或 A2A 协议字段, en: "Stable identifier of this ontology module for local cataloging and audit; it is not an MCP, Responses, or A2A protocol field", ja: ローカルのカタログ化と監査のための本体モジュールの安定識別子であり、MCP、Responses、A2A のプロトコル項目ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: "^tool-invocation-execution$"
      example_value: tool-invocation-execution
      allowed_values: [tool-invocation-execution]
      source_claims: [moonweave-invocation-boundary]
  constraints:
    - id: invocation-module-preserves-native-boundaries
      severity: error
      expression_language: plain
      expression: A local invocation trace must identify its source surface and must not assert that its local fields are a native MCP, OpenAI Responses, or A2A payload.
      explanation:
        zh: 本地轨迹必须标识来源表面，且不得将本地字段声称为 MCP、Responses 或 A2A 原生载荷。
        en: A local trace identifies its source surface and never presents local fields as a native MCP, OpenAI Responses, or A2A payload.
        ja: ローカル軌跡はソース表面を示し、ローカル項目をネイティブ MCP、OpenAI Responses、A2A ペイロードとして提示しない。
      source_claims: [moonweave-invocation-boundary, prov-entity-activity-boundary]
  required_relations: []
