    descriptions:
      zh: "{city: Shanghai} 通过 weather@3 Draft 2020-12 校验后才创建 tool-call-0042；校验阶段无 attempt。"
      en: "{city: Shanghai} passes weather@3 Draft 2020-12 validation before tool-call-0042 is created; no attempt during validation."
      ja: "{city: Shanghai} が weather@3 Draft 2020-12 validation pass 後 tool-call-0042 作成。validation 段階 attempt なし。"
    example_source:
