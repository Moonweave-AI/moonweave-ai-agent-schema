module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 输入以 InvocationExecutionRequest 为发生入口：请求实例化 InvocationSpecification 并请求一次 Invocation，规范治理该发生；工具调用由 ToolCallPlan 明确对应 ToolCall，提示实例化则解析并实例化一个确定版本的 PromptDefinition，计划或定义本身都不等于执行尝试。
          en: "Input begins with InvocationExecutionRequest: it instantiates an InvocationSpecification and requests an Invocation governed by that specification. A ToolCallPlan identifies the corresponding ToolCall, while PromptInstantiation resolves and instantiates one determinate PromptDefinition version; neither a plan nor a definition is an execution attempt."
          ja: 入力は InvocationExecutionRequest から始まり、InvocationSpecification を実体化してその仕様に統制される Invocation を要求します。ToolCallPlan は対応 ToolCall を示し、PromptInstantiation は確定版 PromptDefinition を解決・instance 化しますが、plan も definition も execution attempt ではありません。
        family_concept_ids:
          - InvocationExecutionRequest
          - InvocationSpecification
          - ToolCallPlan
          - PromptDefinition
        relation_ids:
          - InvocationExecutionRequest-instantiates-InvocationSpecification
          - InvocationExecutionRequest-requests-Invocation
          - InvocationSpecification-governs-Invocation
          - ToolCallPlan-plans-ToolCall
          - PromptInstantiation-instantiates-PromptDefinition
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 输出是由确定尝试产生并与 attempt_id 关联的 InvocationResult；工具、命令和资源读取使用各自下位结果。提示实例化活动则跨域产出 PromptTemplateInstance，结果身份仍归提示与指令。
          en: Output is an InvocationResult produced by a definite attempt and correlated with attempt_id; tools, commands, and resource reads use specialized results. PromptInstantiation also produces a cross-domain PromptTemplateInstance whose result identity remains owned by prompts and instructions.
          ja: output は definite attempt が produce し attempt_id と相関する InvocationResult で、tool・command・resource read は specialized result を使います。PromptInstantiation は cross-domain PromptTemplateInstance も生成し、result identity は prompts/instructions が所有します。
        family_concept_ids:
          - InvocationResult
          - ToolResult
          - ExecutionResult
          - ResourceReadResult
          - PromptTemplateInstance
        relation_ids:
          - InvocationAttempt-produces-InvocationResult
          - ToolCallAttempt-produces_result-ToolResult
          - Command-produces-ExecutionResult
          - ResourceReadRequest-produces-ResourceReadResult
          - PromptInstantiation-produces-PromptTemplateInstance
        not_applicable_reason: null
      failure:
        applicable: true
        description:
          zh: 工具执行失败仍可返回 is_error ToolResult，并以独立 ToolError 解释错误类别、代码和可重试性。
          en: Tool execution failure may still return an is_error ToolResult, with a separate ToolError explaining category, code, and retryability.
          ja: tool execution failure でも is_error ToolResult を返し separate ToolError が category・code・retryability を説明します。
        family_concept_ids:
          - ToolResult
          - ToolError
        relation_ids:
          - ToolCallAttempt-emits_diagnostic-ToolError
          - ToolResult-reports-ToolError
        not_applicable_reason: null
      recovery:
        applicable: true
        description:
          zh: 重试建立新的 ToolCallAttempt 并指向先前尝试；已经生效的副作用由 RecoveryAction 补偿或回滚。
          en: Retry creates a new ToolCallAttempt pointing to a prior attempt; an enacted side effect is compensated or rolled back by RecoveryAction.
          ja: retry は prior attempt を指す new ToolCallAttempt を作り enacted side effect は RecoveryAction が compensate/rollback します。
        family_concept_ids:
          - ToolCallAttempt
          - ToolSideEffect
          - RecoveryAction
        relation_ids:
          - ToolCallAttempt-retries-ToolCallAttempt
          - ToolSideEffect-recovered_by-RecoveryAction
        not_applicable_reason: null
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-tool-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
