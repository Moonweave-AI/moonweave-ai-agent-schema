  - id: claim-tool-invocation-execution-001
    source: eng-proto-mcp-tools-2025-06-18
    supports: MCP separates a tools/call request from its Tool Result, requires a result for tool execution errors, and reserves protocol errors for malformed or unknown requests. Moonweave uses the separation to define request, attempt, result, and diagnostic branches.
    locator: Server Features > Tools > Calling Tools; Tool Result; Error Handling
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-tool-invocation-execution-002
    source: eng-fw-openai-agents-tools
    supports: OpenAI Agents SDK distinguishes ordinary function-tool calls from agents-as-tools and states that the manager retains control when an agent is exposed as a tool. Moonweave uses manager-retained control to separate AgentAsToolInvocation from delegation.
    locator: Tools > Function tools; Agents as tools; Handling errors in function tools
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-tool-invocation-execution-003
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry models each execution occurrence as a span with timestamps, attributes, events, and status rather than as a reusable specification. Moonweave uses occurrence telemetry to keep attempts separate from specifications and results.
    locator: Specification > Traces > Span creation, attributes, events and status
    evidence_kind: official
    confidence: high
