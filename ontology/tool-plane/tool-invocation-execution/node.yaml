      semantic_area:
        zh: 智能体工具调用与责任委派
        en: Agent-as-tool invocation versus responsibility delegation
        ja: エージェントツール呼び出しと責任委任
      candidate_concept_ids:
        - DelegationContract
        - HandoffProcess
      overlap_reason:
        zh: AgentAsToolInvocation 保留调用者的会话控制和最终答案责任；DelegationContract 明确约束被移交的工作、权限与完成条件，HandoffProcess 则实际转交下一步控制和责任。
        en: AgentAsToolInvocation retains caller conversation control and final-answer responsibility. DelegationContract explicitly bounds transferred work, authority, and completion terms, while HandoffProcess actually transfers next-step control and responsibility.
        ja: AgentAsToolInvocation は caller の会話制御と final-answer responsibility を保持します。DelegationContract は移管する work・authority・completion terms を境界付け、HandoffProcess は next-step control と responsibility を実際に移します。
      disambiguation_test:
        zh: 若调用者继续拥有最终答案、对话控制且被调用方仅返回工具结果，归调用与执行；若存在委派契约并转交工作范围、权限或责任，归委派与移交。
        en: If the caller retains the final answer and conversation control while the callee returns a tool result, it belongs to invocation and execution; if a delegation contract transfers work scope, authority, or responsibility, it belongs to delegation and handoff.
        ja: 呼び出し元が最終回答と会話制御を保持し、呼び出し先がツール結果を返すなら呼び出しと実行、委任契約が作業範囲・権限・責任を移すなら委任と引き継ぎに属します。
