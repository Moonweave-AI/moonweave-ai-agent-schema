schema: moonweave.ai/ontology-node/v1
id: ToolSideEffect
kind: concept
labels:
  zh: 工具副作用
  en: Tool side effect
  ja: ツール副作用
semantics:
  short_definition:
    zh: 由工具调用尝试导致或预期导致的 InvocationEffect 子类。
    en: An InvocationEffect subtype caused or expected to be caused by a tool-call attempt.
    ja: ツール呼び出し試行が生じさせた、または生じさせると予期される InvocationEffect の下位型。
  definition:
    zh: >-
      ToolSideEffect 是受限于 ToolCallAttempt 的本地效果分类。它将远程变更或数据披露等状态影响与 ToolResult 内容分开记录；它不是 MCP 工具 annotation、服务器提供的 ToolResult、OpenAI mcp_call 输出或 A2A Artifact。它是真实子类，因为每个 ToolSideEffect 都满足 InvocationEffect 的证据契约，并要求来源尝试派发工具。
    en: >
      A ToolSideEffect is a local effect classification constrained to a ToolCallAttempt. It records
      a state impact such as remote mutation or data disclosure separately from ToolResult content.
      It is not an MCP tool annotation, a server-provided ToolResult, an OpenAI mcp_call output, or an
      A2A Artifact. It is a true subtype because every ToolSideEffect meets InvocationEffect's evidence
      contract plus the invariant that its source attempt dispatches a tool.
    ja: >-
      ToolSideEffect は ToolCallAttempt に制約されたローカル effect classification である。remote mutation や data disclosure などの state impact を ToolResult content から分けて記録する。MCP tool annotation、server-provided ToolResult、OpenAI mcp_call output、A2A Artifact ではない。各 ToolSideEffect は InvocationEffect の evidence contract を満たし source attempt が tool を配信するという不変条件を持つため、真の subtype である。
  why_needed:
    zh: >-
      工具成功与副作用并非同义，唯读工具可在无变更时成功，失败或不确定调用也可能留下影响。该子类让策略和审计逻辑聚焦工具导致的效果，而不将输出内容等同外部状态。
    en: >
      Tool success and side effect are not synonymous: read-only tools can succeed without mutation,
      and failed or uncertain calls can still leave an impact. This subtype lets policy and audit logic
      focus on tool-caused effects without equating output content with external state.
    ja: >-
      tool success と side effect は同義ではない。read-only tool は mutation なしで成功でき、failed または uncertain call も impact を残し得る。この subtype により policy と audit logic は output content を外部 state と同一視せず tool-caused effect に焦点を当てられる。
  includes:
    - {zh: 工具调用尝试引用与效果证据, en: Tool-call-attempt reference and effect evidence, ja: ツール呼び出し試行参照と効果証拠}
  excludes:
    - {zh: 仅描述内容的 ToolResult 或 A2A Artifact, en: A ToolResult or A2A Artifact that only describes content, ja: 内容だけを記述する ToolResult または A2A Artifact}
  semantic_kind: entity
  aliases:
    - {language: en, value: tool impact record, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      主机仅在可识别预期或观察到的外部影响时才将该记录附着到 ToolCallAttempt。对 remote MCP，它可在工具调用前捕获数据披露，但审批仍是独立的 Responses 工作流；对直接 MCP 调用，它保留服务器结果并另行记录推断或观察到的变更目标。
    en: >
      The host attaches this record to a ToolCallAttempt only when it can identify an expected or
      observed external impact. For remote MCP, it may capture data disclosure before a tool call, but
      approval remains an independent Responses workflow. For MCP direct calls, it preserves the
      server result and separately logs the inferred or observed mutation target.
    ja: >-
      ホストは予期または観測された外部 impact を識別できる場合だけこの record を ToolCallAttempt に付ける。remote MCP では tool call 前の data disclosure を記録できるが、approval は独立した Responses workflow のままである。direct MCP call では server result を保持し、推論または観測された mutation target を別にログする。
  typical_input:
    - description: A remote-MCP tool call is expected to disclose filtered calendar data.
      format: '{"local_tool_side_effect_id":"tool-effect-1","local_tool_call_attempt_ref":"attempt-mcp-1","local_effect_kind":"data_disclosure"}'
      source_claims: [moonweave-tool-side-effect]
  typical_output:
    - description: Audit sees tool impact separately from the remote output string.
      format: '{"local_tool_side_effect_id":"tool-effect-1","local_observation":"expected"}'
      source_claims: [moonweave-tool-side-effect]
  reference_implementations:
    - name: OpenAI MCP and Connectors guide
      url: https://developers.openai.com/api/docs/guides/tools-connectors-mcp
      description: Describes review and approval before sharing data with remote MCP servers.
structure:
  identity_keys: [local_tool_side_effect_id]
  fields:
    - id: local_tool_side_effect_id
      labels: {zh: 本地工具副作用标识, en: Local tool-side-effect ID, ja: ローカルツール副作用 ID}
      definitions: {zh: 主机分配给工具副作用分类的标识, en: The host-assigned identifier for this tool-side-effect classification, ja: このツール副作用分類に対するホスト割当て識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: tool-effect-1
      allowed_values: []
      source_claims: [moonweave-tool-side-effect]
    - id: local_tool_call_attempt_ref
      labels: {zh: 工具调用尝试引用, en: Tool-call-attempt reference, ja: ツール呼び出し試行参照}
      definitions: {zh: 产生或预期产生该效果的 ToolCallAttempt, en: The ToolCallAttempt that produced or is expected to produce this effect, ja: この効果を生じさせた、または生じさせると予期される ToolCallAttempt}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: attempt-mcp-1
      allowed_values: []
      source_claims: [moonweave-tool-side-effect]
    - id: local_effect_kind
      labels: {zh: 本地效果类别, en: Local effect kind, ja: ローカル効果種別}
      definitions: {zh: 与父效果一致的主机分类, en: The host classification consistent with the parent effect, ja: 親効果と一貫するホスト分類}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: data_disclosure
      allowed_values: [file_write, remote_mutation, data_disclosure, process_spawn]
      source_claims: [moonweave-tool-side-effect]
    - id: local_observation
      labels: {zh: 本地观察状态, en: Local observation state, ja: ローカル観測状態}
      definitions: {zh: 对工具副作用是否被观察到的本地状态, en: The local state of whether the tool side effect was observed, ja: ツール副作用が観測されたかのローカル状態}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: expected
      allowed_values: [expected, observed, not_observed, unknown]
      source_claims: [moonweave-tool-side-effect]
    - id: local_effect_id
      labels: {zh: 本地效果标识, en: Local effect ID, ja: ローカル効果 ID}
      definitions: {zh: 主机分配给效果证据的标识, en: The identifier assigned by the host to effect evidence, ja: 効果証拠に対するホスト割当て識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: effect-1
      allowed_values: []
      source_claims: [moonweave-tool-side-effect]
    - id: local_attempt_ref
      labels: {zh: 尝试引用, en: Attempt reference, ja: 試行参照}
      definitions: {zh: 关联该效果的本地 InvocationAttempt, en: The local InvocationAttempt associated with this effect, ja: この効果に関連するローカル InvocationAttempt}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: attempt-cmd-1
      allowed_values: []
      source_claims: [moonweave-tool-side-effect]
    - id: local_target_ref
      labels: {zh: 效果目标引用, en: Effect target reference, ja: 効果対象参照}
      definitions: {zh: 受影响对象的策略受控本地引用, en: A policy-controlled local reference to the affected object, ja: 影響対象へのポリシー制御ローカル参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: file:D:/workspace/report.json
      allowed_values: []
      source_claims: [moonweave-tool-side-effect]
    - id: local_reversibility
      labels: {zh: 本地可逆性, en: Local reversibility, ja: ローカル可逆性}
      definitions: {zh: 主机对效果恢复可能性的本地评估, en: A host assessment of whether the effect can be recovered, ja: 効果を回復できるかのホスト評価}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: replaceable
      allowed_values: [reversible, replaceable, irreversible, unknown]
      source_claims: [moonweave-tool-side-effect]
  constraints:
    - id: tool-side-effect-has-tool-attempt
      severity: error
      expression_language: plain
      expression: "local_tool_call_attempt_ref resolves to a ToolCallAttempt in the same local InvocationEffect record identified by local_tool_side_effect_id."
      explanation:
        zh: local_tool_call_attempt_ref 必须解析到其尝试与父效果 local_attempt_ref 一致的 ToolCallAttempt。
        en: local_tool_call_attempt_ref resolves to a ToolCallAttempt whose attempt matches the parent effect local_attempt_ref.
        ja: local_tool_call_attempt_ref は親効果の local_attempt_ref と一致する試行を持つ ToolCallAttempt に解決する。
      source_claims: [moonweave-tool-side-effect]
    - id: tool-side-effect-not-tool-result
      severity: error
      expression_language: plain
      expression: A ToolSideEffect does not use content, structuredContent, output, or Artifact parts as proof of its effect without a target and observation record.
      explanation:
        zh: ToolSideEffect 不得仅凭 content、structuredContent、output 或 Artifact parts 证明效果；必须有目标和观察记录。
        en: A ToolSideEffect does not use content, structuredContent, output, or Artifact parts as proof of its effect without a target and observation record.
        ja: ToolSideEffect は対象と観測記録なしに content、structuredContent、output、Artifact parts を効果の証明に使わない。
      source_claims: [moonweave-tool-side-effect]
    - id: tool-side-effect-id-same-record-parent-identity
      severity: error
      expression_language: plain
      expression: "local_tool_side_effect_id = local_effect_id; both identify the same local InvocationEffect record and inherited parent fields belong to that one record."
      explanation: {zh: "local_tool_side_effect_id 与 local_effect_id 标识同一条本地 InvocationEffect 记录，继承的父字段属于该同一记录。", en: "The child and parent IDs are equal representations of one local record, not a link to a second parent record.", ja: "local_tool_side_effect_id と local_effect_id は同じローカル InvocationEffect レコードを識別し、継承した親フィールドはその一つのレコードに属する。"}
      source_claims: [moonweave-tool-side-effect]
  required_relations: []
examples:
  - id: tool-side-effect-positive-disclosure

    labels: {zh: 远程数据披露, en: Remote data disclosure, ja: リモートデータ開示}

    descriptions:
      zh: "ReAct Observation 步骤返回环境反馈；Anthropic {type:\"tool_result\",tool_use_id:\"toolu_01\",content:\"15°C, sunny\"}；OpenAI Code Interpreter 沙箱返回 text/image 输出。"
      en: "ReAct Observation step returns environment feedback; Anthropic {type:\"tool_result\",tool_use_id:\"toolu_01\",content:\"15°C, sunny\"}; OpenAI Code Interpreter sandbox returns text/image output."
      ja: ReAct Observation が環境 feedback を返す。Anthropic tool_result。OpenAI Code Interpreter sandbox が text/image 出力を返す。
    field_values: {local_tool_side_effect_id: tool-effect-1, local_tool_call_attempt_ref: attempt-mcp-1, local_effect_kind: data_disclosure, local_observation: expected}
    related_node_ids: [ToolSideEffect, InvocationEffect, ToolCallAttempt]
    related_relation_ids: [ToolSideEffect-is_a-InvocationEffect]

    source_claims: [openai-remote-mcp-approval-control, moonweave-tool-side-effect]
  - id: tool-side-effect-counterexample-no-tool-attempt

    labels: {zh: 无工具尝试的副作用, en: Side effect without tool attempt, ja: ツール試行のない副作用}

    descriptions:
      zh: 反例：Toolformer 执行 [Calculator(350/7)] 后未插入结果 token 50 就继续生成；Anthropic tool_result 的 tool_use_id 与 tool_use 不匹配。
      en: Counterexample: Toolformer continues generation without inserting result token 50 after [Calculator(350/7)]; Anthropic tool_result tool_use_id mismatches tool_use.
      ja: 反例：Toolformer が [Calculator(350/7)] 実行後 result token 50 未挿入で生成継続。Anthropic tool_result tool_use_id 不一致。
    field_values: {local_tool_side_effect_id: tool-effect-bad, local_tool_call_attempt_ref: attempt-cmd-1, local_effect_kind: file_write, local_observation: observed}
    related_node_ids: [ToolSideEffect, Command]
    related_relation_ids: [ToolSideEffect-is_a-InvocationEffect]

    source_claims: [moonweave-tool-side-effect]
  - id: tool-side-effect-boundary-artifact

    labels: {zh: 工具副作用与 A2A Artifact 边界, en: Tool side effect versus A2A Artifact boundary, ja: ツール副作用と A2A Artifact の境界}

    descriptions:
      zh: Vercel AI SDK streamText 流式 tool result delta vs 完整 ToolResult 记录的聚合边界；Code Interpreter 图像输出非 text-only ToolResult。
      en: Boundary between Vercel AI SDK streamText streaming tool-result deltas vs aggregated ToolResult record; Code Interpreter image output is not text-only ToolResult.
      ja: Vercel AI SDK streamText ストリーミング tool result delta と完全 ToolResult 記録の集約境界。Code Interpreter 画像出力は text-only ToolResult ではない。
    field_values: {local_tool_side_effect_id: tool-effect-2, local_tool_call_attempt_ref: attempt-tool-2, local_effect_kind: remote_mutation, local_observation: unknown}
    related_node_ids: [ToolSideEffect, AgentAsToolInvocation]
    related_relation_ids: [ToolSideEffect-is_a-InvocationEffect]

    source_claims: [moonweave-tool-side-effect]
  - id: tool-side-effect-instance-remote-update

    labels: {zh: 远程更新实例, en: Remote update instance, ja: リモート更新インスタンス}

    descriptions:
      zh: "OpenAI Assistants code_interpreter 实例：执行 plt.savefig 返回 image/png base64；Vercel AI SDK execute 返回 {temperature:15,unit:\"C\"} JSON。"
      en: "OpenAI Assistants code_interpreter instance: plt.savefig returns image/png base64; Vercel AI SDK execute returns {temperature:15,unit:\"C\"} JSON."
      ja: "OpenAI Assistants code_interpreter 実例：plt.savefig が image/png base64 を返す。Vercel AI SDK execute が {temperature:15,unit:\"C\"} JSON を返す。"
    field_values: {local_tool_side_effect_id: tool-effect-crm, local_tool_call_attempt_ref: attempt-crm-1, local_effect_kind: remote_mutation, local_observation: observed}
    related_node_ids: [ToolSideEffect, ToolCallAttempt, ToolResult]
    related_relation_ids: [ToolSideEffect-is_a-InvocationEffect]

    source_claims: [moonweave-tool-side-effect]
parent_relation:
  id: ToolSideEffect-is_a-InvocationEffect
  predicate: is_a
  target: concept:InvocationEffect
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是调用效果中的工具副作用子类, en: is a tool-side-effect subtype of invocation effect, ja: 呼び出し効果のツール副作用下位型である}
  definition: {zh: 每个 ToolSideEffect 都是由工具调用尝试关联的 InvocationEffect, en: Every ToolSideEffect is an InvocationEffect associated with a ToolCallAttempt, ja: すべての ToolSideEffect は ToolCallAttempt に関連する InvocationEffect である}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_tool_side_effect_subtype, labels: {zh: 具有工具副作用子类, en: has tool-side-effect subtype, ja: ツール副作用下位型を持つ}}
  conditions: []
  temporal_scope: execution
  boundary_context: This subtype narrows effect provenance to a tool-call attempt and does not make output content proof of state impact.
  constraints: []
  examples: []
  source_claims: [moonweave-tool-side-effect]
  distinct_fact_rationale: Every ToolSideEffect retains InvocationEffect evidence requirements and adds a ToolCallAttempt source invariant. It uses one same-record identity in which local_tool_side_effect_id identifies the same local InvocationEffect record, so a second InvocationEffect reference field is not permitted.
relations: []
sources:
  - id: openai-responses-remote-mcp
    title: OpenAI API - MCP and Connectors
    url: https://developers.openai.com/api/docs/guides/tools-connectors-mcp
    source_type: official-documentation
    locator: "Approvals"
    relevance: Requires review and approval visibility before sharing data with remote MCP servers.
source_claims:
  - id: openai-remote-mcp-approval-control
    source: openai-responses-remote-mcp
    supports: OpenAI requests approval before data is shared with a connector or remote MCP server and recommends review and logging of shared data.
    locator: "Approvals"
    evidence_kind: normative
    confidence: high
  - id: moonweave-tool-side-effect
    source: openai-responses-remote-mcp
    supports: Moonweave ToolSideEffect is a local InvocationEffect subtype constrained to ToolCallAttempt provenance and not a native output or artifact schema.
    locator: "Approvals"
    evidence_kind: design-inference
    confidence: high