schema: moonweave.ai/ontology-node/v1
id: InvocationEffect
kind: concept
labels:
  zh: 调用效果
  en: Invocation effect
  ja: 呼び出し効果
semantics:
  short_definition:
    zh: 作为一次 InvocationAttempt 的本地可审计外部影响记录。
    en: A locally auditable record of an external impact associated with one InvocationAttempt.
    ja: 一つの InvocationAttempt に関連する外部影響のローカル監査記録。
  definition:
    zh: >-
      InvocationEffect 记录一次尝试的主机观察到或预期的外部状态影响，例如文件写入、远程变更或数据披露。它是本地证据实体，不是 MCP annotation、ToolResult content item、OpenAI Responses output item 或 A2A Artifact；调用成功时效果可能仍不存在，结果数据本身也不能证明效果。它是由观察到的尝试生成的固定方面实体。
    en: >
      An InvocationEffect records a host-observed or host-expected external state impact of an attempt,
      such as a file write, remote mutation, or data disclosure. It is a local evidence Entity, not
      an MCP annotation, ToolResult content item, OpenAI Responses output item, or A2A Artifact. The
      effect may be absent even when a call succeeds, and result data alone does not prove an effect. It is a fixed-aspect Entity generated by the observed attempt.
    ja: >-
      InvocationEffect は file write、remote mutation、data disclosure など、attempt の host-observed または host-expected な外部 state impact を記録する。ローカル evidence Entity であり、MCP annotation、ToolResult content item、OpenAI Responses output item、A2A Artifact ではない。call が成功しても effect は存在し得ず、result data だけでは effect を証明しない。観測された attempt により生成された固定側面 Entity である。
  why_needed:
    zh: >-
      安全控制需要区分仅调用目标与实际更改或披露数据。将效果证据与结果和诊断分离，可防止把输出文本误读为变更或同意的证明。
    en: >
      Safety controls need to distinguish merely invoking a target from changing or disclosing data.
      Keeping effect evidence separate from the result and diagnostics prevents output text from being
      misread as proof of mutation or consent.
    ja: >-
      safety control には target を単に invoke することと data の変更または disclosure を区別する必要がある。effect evidence を result と diagnostic から分離することで、output text を mutation や consent の証明と誤読しない。
  includes:
    - {zh: 效果类别、目标引用和可逆性, en: "Effect kind, target reference, and reversibility", ja: 効果種別、対象参照、可逆性}
  excludes:
    - {zh: 工具调用消息、返回内容或用户同意 UI, en: "Tool-call message, return content, or user-consent UI", ja: ツール呼び出しメッセージ、返却内容、ユーザー同意 UI}
  semantic_kind: entity
  aliases:
    - {language: en, value: side-effect evidence, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      主机在派发前后以受策略控制的目标引用记录声明或观察到的效果。MCP 建议主机展示输入并对敏感操作请求确认，但不会使 ToolResult 成为某个文件系统或远程变更的证明；此本地效果记录保留该区别。
    en: >
      Before or after dispatch, the host records declared or observed effects with a policy-controlled
      target reference. MCP advises hosts to show inputs and request confirmation for sensitive
      operations, but it does not make a ToolResult the proof of a particular filesystem or remote
      mutation. This local effect record preserves that distinction.
    ja: >-
      ホストは配信前または後に policy-controlled target reference を持つ declared または observed effect を記録する。MCP は host に input 表示と sensitive operation の confirmation を勧めるが、ToolResult を特定 filesystem または remote mutation の証拠にはしない。この local effect record はその区別を保持する。
  typical_input:
    - description: An attempted file-writing command is recorded as an expected local effect.
      format: '{"local_effect_id":"effect-1","local_attempt_ref":"attempt-cmd-1","local_effect_kind":"file_write","local_target_ref":"file:D:/workspace/report.json","local_reversibility":"replaceable"}'
      source_claims: [moonweave-invocation-effect]
  typical_output:
    - description: Audit evidence records whether the expected effect was observed.
      format: '{"local_effect_id":"effect-1","local_observation":"observed"}'
      source_claims: [moonweave-invocation-effect]
  reference_implementations:
    - name: MCP Tools specification - Security Considerations
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Recommends confirmation and input visibility for sensitive invocations.
structure:
  identity_keys: [local_effect_id]
  fields:
    - id: local_effect_id
      labels: {zh: 本地效果标识, en: Local effect ID, ja: ローカル効果 ID}
      definitions: {zh: 主机分配给效果证据的标识, en: The identifier assigned by the host to effect evidence, ja: 効果証拠に対するホスト割当て識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: effect-1
      allowed_values: []
      source_claims: [moonweave-invocation-effect]
    - id: local_attempt_ref
      labels: {zh: 尝试引用, en: Attempt reference, ja: 試行参照}
      definitions: {zh: 关联该效果的本地 InvocationAttempt, en: The local InvocationAttempt associated with this effect, ja: この効果に関連するローカル InvocationAttempt}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: attempt-cmd-1
      allowed_values: []
      source_claims: [moonweave-invocation-effect]
    - id: local_effect_kind
      labels: {zh: 本地效果类别, en: Local effect kind, ja: ローカル効果種別}
      definitions: {zh: 主机分类的外部影响类别, en: A host-classified kind of external impact, ja: ホスト分類による外部影響種別}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: file_write
      allowed_values: [file_write, remote_mutation, data_disclosure, process_spawn]
      source_claims: [moonweave-invocation-effect]
    - id: local_target_ref
      labels: {zh: 效果目标引用, en: Effect target reference, ja: 効果対象参照}
      definitions: {zh: 受影响对象的策略受控本地引用, en: A policy-controlled local reference to the affected object, ja: 影響対象へのポリシー制御ローカル参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: file:D:/workspace/report.json
      allowed_values: []
      source_claims: [moonweave-invocation-effect]
    - id: local_reversibility
      labels: {zh: 本地可逆性, en: Local reversibility, ja: ローカル可逆性}
      definitions: {zh: 主机对效果恢复可能性的本地评估, en: A host assessment of whether the effect can be recovered, ja: 効果を回復できるかのホスト評価}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: replaceable
      allowed_values: [reversible, replaceable, irreversible, unknown]
      source_claims: [moonweave-invocation-effect]
    - id: local_observation
      labels: {zh: 本地观察状态, en: Local observation state, ja: ローカル観測状態}
      definitions: {zh: 主机是否观察到效果的状态，不是远程协议字段, en: Whether the host observed the effect; not a remote protocol field, ja: ホストが効果を観測したかの状態でありリモートプロトコル項目ではない}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: observed
      allowed_values: [expected, observed, not_observed, unknown]
      source_claims: [moonweave-invocation-effect]
  constraints:
    - id: invocation-effect-attaches-to-attempt
      severity: error
      expression_language: plain
      expression: local_attempt_ref identifies one InvocationAttempt and local_target_ref is present for every declared effect.
      explanation:
        zh: local_attempt_ref 必须指向一个 InvocationAttempt，且每个声明效果必须有 local_target_ref。
        en: local_attempt_ref identifies one InvocationAttempt and local_target_ref is present for every declared effect.
        ja: local_attempt_ref は一つの InvocationAttempt を示し、すべての宣言効果に local_target_ref が存在する。
      source_claims: [moonweave-invocation-effect]
    - id: invocation-effect-is-not-consent
      severity: error
      expression_language: plain
      expression: An effect record does not prove user consent; host consent and confirmation controls remain separate policy evidence.
      explanation:
        zh: 效果记录不能证明用户同意；主机同意和确认控制仍是独立策略证据。
        en: An effect record does not prove user consent; host consent and confirmation controls remain separate policy evidence.
        ja: 効果記録はユーザー同意を証明せず、ホスト同意と確認制御は別のポリシー証拠である。
      source_claims: [mcp-effect-safety, moonweave-invocation-effect]
  required_relations: [InvocationEffect-was_generated_by-InvocationAttempt]
examples:
  - id: invocation-effect-positive-file-write

    labels: {zh: 文件写入效果, en: File-write effect, ja: ファイル書き込み効果}

    descriptions:
      zh: ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]；Anthropic content:[{type:"tool_use",id:"toolu_01",name:"get_weather",input:{location:"Paris"}}]；Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。
      en: ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]; Anthropic content:[{type:"tool_use",id:"toolu_01",name:"get_weather",input:{location:"Paris"}}]; Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}}).
      ja: ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]。Anthropic tool_use。Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。
    field_values: {local_effect_id: effect-1, local_attempt_ref: attempt-cmd-1, local_effect_kind: file_write, local_target_ref: "file:D:/workspace/report.json", local_reversibility: replaceable, local_observation: observed}
    related_node_ids: [InvocationEffect, InvocationAttempt, ToolSideEffect]
    related_relation_ids: [InvocationEffect-was_generated_by-InvocationAttempt]

    source_claims: [moonweave-invocation-effect]
  - id: invocation-effect-counterexample-missing-target

    labels: {zh: 缺少效果目标, en: Missing effect target, ja: 効果対象の欠落}

    descriptions:
      zh: 反例：ReAct Action 无对应 Observation 就继续推理；Anthropic tool_use 缺少配对 tool_result(tool_use_id)；Vercel AI SDK execute 抛错未捕获。
      en: Counterexample: ReAct continues reasoning without Observation for Action; Anthropic tool_use missing paired tool_result(tool_use_id); Vercel AI SDK execute error uncaught.
      ja: 反例：ReAct Action に Observation なしで reasoning 継続。Anthropic tool_use に tool_result ペア欠落。Vercel AI SDK execute エラー未捕捉。
    field_values: {local_effect_id: effect-bad, local_attempt_ref: attempt-42-1, local_effect_kind: remote_mutation, local_reversibility: unknown}
    related_node_ids: [InvocationEffect]
    related_relation_ids: [InvocationEffect-was_generated_by-InvocationAttempt]

    source_claims: [moonweave-invocation-effect]
  - id: invocation-effect-boundary-tool-result

    labels: {zh: 效果与工具结果边界, en: Effect versus tool-result boundary, ja: 効果とツール結果の境界}

    descriptions:
      zh: ReAct 文本 Action 标记 vs Anthropic structured tool_use vs Vercel AI SDK Zod schema tool 的 wire 契约边界；本地 Invocation 活动非原生封包。
      en: Wire contract boundary among ReAct text Action markers, Anthropic structured tool_use, Vercel AI SDK Zod schema tools; local Invocation activity is not native envelope.
      ja: ReAct テキスト Action marker、Anthropic structured tool_use、Vercel AI SDK Zod schema tool の wire 契約境界。ローカル Invocation 活動はネイティブ envelope ではない。
    field_values: {local_effect_id: effect-2, local_attempt_ref: attempt-42-1, local_effect_kind: remote_mutation, local_target_ref: "crm:contact/17", local_reversibility: unknown, local_observation: observed}
    related_node_ids: [InvocationEffect, ToolResult]
    related_relation_ids: [InvocationEffect-was_generated_by-InvocationAttempt]

    source_claims: [mcp-effect-safety, moonweave-invocation-effect]
  - id: invocation-effect-instance-data-disclosure

    labels: {zh: 数据披露效果实例, en: Data-disclosure effect instance, ja: データ開示効果インスタンス}

    descriptions:
      zh: ReAct HotpotQA 实例：Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup[Arthur's Magazine]→Finish[1850]；Anthropic tool_use_id=toolu_01A09q90qw90 配对 tool_result。
      en: ReAct HotpotQA instance: Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup→Finish[1850]; Anthropic tool_use_id=toolu_01A09q90qw90 paired with tool_result.
      ja: ReAct HotpotQA 実例：Thought→Action: Search→Observation→Lookup→Finish[1850]。Anthropic tool_use_id=toolu_01A09q90qw90 が tool_result とペア。
    field_values: {local_effect_id: effect-disclosure, local_attempt_ref: attempt-mcp-1, local_effect_kind: data_disclosure, local_target_ref: "remote-mcp:dmcp", local_reversibility: irreversible, local_observation: expected}
    related_node_ids: [InvocationEffect, ToolCallAttempt]
    related_relation_ids: [InvocationEffect-was_generated_by-InvocationAttempt]

    source_claims: [mcp-effect-safety, moonweave-invocation-effect]
parent_relation: null
relations:
  - id: InvocationEffect-was_generated_by-InvocationAttempt
    predicate: was_generated_by
    target: concept:InvocationAttempt
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 由调用尝试生成, en: was generated by invocation attempt, ja: 呼出し試行により生成された}
    definitions: {zh: 当 local_attempt_ref 指向实际产生或观察该外部影响事实的 InvocationAttempt 时，该效果证据由该尝试生成, en: The effect evidence is generated by the InvocationAttempt identified by local_attempt_ref when that attempt actually caused or observed the external impact fact, ja: local_attempt_ref が外部影響事実を実際に引き起こしたまたは観測した InvocationAttempt を指すとき効果証拠はその試行により生成される}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: generated, labels: {zh: 生成调用效果, en: generated invocation effect, ja: 呼出し効果を生成した}}
    conditions:
      - id: invocation-effect-generation-condition
        severity: error
        expression_language: plain
        expression: Assert only when local_attempt_ref identifies the target attempt and observed or declared impact evidence supports the effect record.
        explanation: {zh: 结果文本或事后阅读不能单独证明影响生成, en: Result text or later reading alone cannot prove generation of an impact, ja: 結果テキストまたは後続の閲覧だけでは影響の生成を証明できない}
        source_claims: [prov-entity-activity, moonweave-invocation-effect]
    temporal_scope: execution
    boundary_context: This provenance edge keeps a fixed impact Entity distinct from the producing activity, result payload, and consent evidence.
    constraints: []
    examples: []
    source_claims: [prov-entity-activity, moonweave-invocation-effect]
    distinct_fact_rationale: An effect record is separately auditable evidence of impact, not an owned activity component.
    layout_role: cross-link
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification - Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-specification
    locator: "User Interaction Model; Security Considerations"
    relevance: Defines host confirmation and visibility expectations around sensitive tool operations.
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    locator: "prov:Entity; prov:Activity; prov:wasGeneratedBy"
    relevance: Distinguishes effect evidence entities from activities.
source_claims:
  - id: prov-entity-activity
    source: prov-o-core
    supports: PROV-O distinguishes an Entity from the Activity that generated it and defines prov:wasGeneratedBy for that provenance fact.
    locator: "PROV-O: prov:Entity, prov:Activity, prov:wasGeneratedBy"
    evidence_kind: normative
    confidence: high
  - id: mcp-effect-safety
    source: mcp-tools-2025-11-25
    supports: MCP hosts should retain human control, show tool inputs, request confirmation for sensitive operations, and validate tool results before passing them to a model.
    locator: "User Interaction Model; Security Considerations"
    evidence_kind: normative
    confidence: high
  - id: moonweave-invocation-effect
    source: mcp-tools-2025-11-25
    supports: Moonweave InvocationEffect is local evidence of an attempt's external impact and does not claim to be a native protocol result or consent record.
    locator: "Security Considerations"
    evidence_kind: design-inference
    confidence: high
