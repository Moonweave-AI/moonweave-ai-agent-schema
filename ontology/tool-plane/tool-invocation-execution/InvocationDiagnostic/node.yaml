schema: moonweave.ai/ontology-node/v1
id: InvocationDiagnostic
kind: concept
labels:
  zh: 调用诊断
  en: Invocation diagnostic
  ja: 呼び出し診断
semantics:
  short_definition:
    zh: 与单个 InvocationAttempt 关联的本地可读诊断记录。
    en: A local human-readable diagnostic record associated with one InvocationAttempt.
    ja: 一つの InvocationAttempt に関連するローカルで人間可読な診断記録。
  definition:
    zh: >-
      InvocationDiagnostic 是由一次尝试生成的本地固定方面诊断实体。它包含对主机有用的严重程度、代码、消息和来源分类；它不是 MCP JSON-RPC error 对象、isError 为 true 的 MCP ToolResult、Responses mcp_call error 字段或 A2A error response。这些原生形式只能作为保留出处的证据引用和归一化。
    en: >
      An InvocationDiagnostic is a local fixed-aspect diagnostic Entity generated by one attempt. It contains severity,
      code, message, and origin classification useful to the host. It is not an MCP JSON-RPC error
      object, an MCP ToolResult with isError true, a Responses mcp_call error field, or an A2A error
      response. Those native forms can be referenced and normalized only as provenance-aware evidence.
    ja: >-
      InvocationDiagnostic は一つの attempt により生成されるローカル固定側面 diagnostic Entity である。ホストに有用な severity、code、message、origin classification を含む。MCP JSON-RPC error object、isError が true の MCP ToolResult、Responses mcp_call error field、A2A error response ではない。これらの native form は provenance-aware evidence として参照・正規化されるだけである。
  why_needed:
    zh: >-
      操作员需要稳定的跨适配器解释，了解尝试为何被阻止、失败或需要注意。出处将该实体连接到产生它的尝试，而不会把诊断当作执行活动的组成部分或子类，也不会替代协议响应。
    en: >
      Operators need a stable, cross-adapter explanation of why an attempt was blocked, failed, or
      warrants attention. Provenance links this Entity to the producing attempt without making the
      diagnostic a component or subtype of execution activity, or a substitute for a protocol response.
    ja: >-
      operator には attempt がなぜ block、failure、attention の対象になったかを説明する安定した cross-adapter の説明が必要である。provenance はこの Entity を生成 attempt に結ぶが、diagnostic を実行活動の component や subtype、または protocol response の代替にはしない。
  includes:
    - {zh: 本地严重程度、代码、消息和来源, en: "Local severity, code, message, and origin", ja: ローカル重要度、コード、メッセージ、発生源}
  excludes:
    - {zh: 原生 JSON-RPC error 对象或 ToolResult content, en: A native JSON-RPC error object or ToolResult content, ja: ネイティブ JSON-RPC error オブジェクトまたは ToolResult content}
    - {zh: 远程任务状态, en: A remote task state, ja: リモートタスク状態}
  semantic_kind: entity
  aliases:
    - {language: en, value: execution diagnostic, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      适配器观察到协议错误、执行错误、连通性失败、策略阻止或警告时，主机附加 InvocationDiagnostic。它单独保留原始对象并记录简洁、已清理的本地消息；MCP 区分协议错误与工具执行错误，OpenAI remote MCP 在 mcp_call error 字段报告协议、执行和连接失败。
    en: >
      The host attaches an InvocationDiagnostic when an adapter observes a protocol error, execution
      error, connectivity failure, policy block, or warning. It preserves the raw object separately
      and records a concise, sanitized local message. MCP distinguishes protocol errors from tool
      execution errors; OpenAI remote MCP reports protocol, execution, and connectivity failures in
      the mcp_call error field.
    ja: >-
      adapter が protocol error、execution error、connectivity failure、policy block、warning を観測すると、ホストは InvocationDiagnostic を追加する。raw object を別に保持し、簡潔で sanitised なローカル message を記録する。MCP は protocol error と tool execution error を区別し、OpenAI remote MCP は mcp_call error field に protocol、execution、connectivity failure を報告する。
  typical_input:
    - description: A native remote-MCP error is preserved as evidence for a local diagnostic.
      format: '{"native_mcp_call":{"type":"mcp_call","name":"roll","error":"connection failed"},"local_diagnostic":{"local_diagnostic_id":"diag-1","severity":"error","local_code":"remote_connectivity"}}'
      source_claims: [openai-remote-mcp-errors, moonweave-invocation-diagnostic]
  typical_output:
    - description: An operator sees a sanitized local diagnostic attached to the attempt.
      format: '{"local_diagnostic_id":"diag-1","local_attempt_ref":"attempt-42-1","severity":"error","local_message":"Remote tool connection failed"}'
      source_claims: [moonweave-invocation-diagnostic]
  reference_implementations:
    - name: MCP Tools specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Distinguishes protocol and tool-execution errors.
    - name: OpenAI MCP and Connectors guide
      url: https://developers.openai.com/api/docs/guides/tools-connectors-mcp
      description: Describes failures in mcp_call error.
structure:
  identity_keys: [local_diagnostic_id]
  fields:
    - id: local_diagnostic_id
      labels: {zh: 本地诊断标识, en: Local diagnostic ID, ja: ローカル診断 ID}
      definitions: {zh: 主机分配给诊断证据的标识, en: The identifier the host assigns to diagnostic evidence, ja: 診断証拠に対するホスト割当て識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: diag-1
      allowed_values: []
      source_claims: [moonweave-invocation-diagnostic]
    - id: local_attempt_ref
      labels: {zh: 尝试引用, en: Attempt reference, ja: 試行参照}
      definitions: {zh: 产生或观察到该诊断的 InvocationAttempt, en: The InvocationAttempt that produced or observed this diagnostic, ja: この診断を生成または観測した InvocationAttempt}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: attempt-42-1
      allowed_values: []
      source_claims: [moonweave-invocation-diagnostic]
    - id: severity
      labels: {zh: 本地严重程度, en: Local severity, ja: ローカル重要度}
      definitions: {zh: 主机面向运营者的诊断级别，不是远程协议枚举, en: A host-facing diagnostic level and not a remote protocol enum, ja: ホスト向け診断レベルでありリモートプロトコル列挙値ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: error
      allowed_values: [error, warning]
      source_claims: [moonweave-invocation-diagnostic]
    - id: local_code
      labels: {zh: 本地诊断代码, en: Local diagnostic code, ja: ローカル診断コード}
      definitions: {zh: 主机定义的稳定分类代码，不复制原生 error.code, en: A stable host-defined classification code that does not copy a native error.code, ja: ネイティブ error.code をコピーしない安定したホスト定義分類コード}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: remote_connectivity
      allowed_values: []
      source_claims: [moonweave-invocation-diagnostic]
    - id: local_message
      labels: {zh: 本地诊断消息, en: Local diagnostic message, ja: ローカル診断メッセージ}
      definitions: {zh: 为审计和操作呈现而清理后的消息，不替代原始错误载荷, en: A sanitized message for audit and operations that does not replace raw error payload, ja: 監査と運用のためのサニタイズ済みメッセージであり生の error ペイロードを置き換えない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Remote tool connection failed
      allowed_values: []
      source_claims: [moonweave-invocation-diagnostic, mcp-error-boundary]
    - id: local_native_evidence_ref
      labels: {zh: 原生证据引用, en: Native evidence reference, ja: ネイティブ証拠参照}
      definitions: {zh: 原生错误或 item 的可选审计引用, en: An optional auditable reference to a native error or item, ja: ネイティブ error または item への任意の監査可能参照}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: responses:mcp_123
      allowed_values: []
      source_claims: [moonweave-invocation-diagnostic]
  constraints:
    - id: invocation-diagnostic-attaches-to-attempt
      severity: error
      expression_language: plain
      expression: local_attempt_ref identifies exactly one InvocationAttempt in the same host trace.
      explanation:
        zh: local_attempt_ref 必须指向同一主机轨迹中的一个 InvocationAttempt。
        en: local_attempt_ref identifies exactly one InvocationAttempt in the same host trace.
        ja: local_attempt_ref は同じホスト軌跡内の一つの InvocationAttempt を示す。
      source_claims: [moonweave-invocation-diagnostic]
    - id: invocation-diagnostic-does-not-replace-native-error
      severity: error
      expression_language: plain
      expression: A local diagnostic never asserts that local_code or local_message is the native JSON-RPC error, ToolResult, mcp_call error, or A2A error payload.
      explanation:
        zh: 本地诊断不得声称 local_code 或 local_message 是原生 JSON-RPC error、ToolResult、mcp_call error 或 A2A error 载荷。
        en: A local diagnostic never asserts that local_code or local_message is the native JSON-RPC error, ToolResult, mcp_call error, or A2A error payload.
        ja: ローカル診断は local_code または local_message がネイティブ JSON-RPC error、ToolResult、mcp_call error、A2A error ペイロードだと主張しない。
      source_claims: [mcp-error-boundary, openai-remote-mcp-errors, moonweave-invocation-diagnostic]
  required_relations: [InvocationDiagnostic-was_generated_by-InvocationAttempt]
examples:
  - id: invocation-diagnostic-positive-connectivity-error

    labels: {zh: 远程连接错误诊断, en: Remote connectivity diagnostic, ja: リモート接続診断}

    descriptions:
      zh: "ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]；Anthropic content:[{type:\"tool_use\",id:\"toolu_01\",name:\"get_weather\",input:{location:\"Paris\"}}]；Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。"
      en: "ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]; Anthropic content:[{type:\"tool_use\",id:\"toolu_01\",name:\"get_weather\",input:{location:\"Paris\"}}]; Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})."
      ja: "ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]。Anthropic tool_use。Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。"
    field_values: {local_diagnostic_id: diag-1, local_attempt_ref: attempt-42-1, severity: error, local_code: remote_connectivity, local_message: Remote tool connection failed, local_native_evidence_ref: responses:mcp_123}
    related_node_ids: [InvocationDiagnostic, InvocationAttempt, ToolError]
    related_relation_ids: [InvocationDiagnostic-was_generated_by-InvocationAttempt]

    source_claims: [openai-remote-mcp-errors, moonweave-invocation-diagnostic]
  - id: invocation-diagnostic-counterexample-native-error-copy

    labels: {zh: 伪装原生错误, en: Impersonated native error, ja: 偽装されたネイティブ error}

    descriptions:
      zh: 反例：ReAct Action 无对应 Observation 就继续推理；Anthropic tool_use 缺少配对 tool_result(tool_use_id)；Vercel AI SDK execute 抛错未捕获。
      en: Counterexample: ReAct continues reasoning without Observation for Action; Anthropic tool_use missing paired tool_result(tool_use_id); Vercel AI SDK execute error uncaught.
      ja: 反例：ReAct Action に Observation なしで reasoning 継続。Anthropic tool_use に tool_result ペア欠落。Vercel AI SDK execute エラー未捕捉。
    field_values: {local_diagnostic_id: diag-bad, local_attempt_ref: attempt-42-1, severity: error, local_code: "-32602", local_message: Invalid arguments}
    related_node_ids: [InvocationDiagnostic]
    related_relation_ids: [InvocationDiagnostic-was_generated_by-InvocationAttempt]

    source_claims: [mcp-error-boundary, moonweave-invocation-diagnostic]
  - id: invocation-diagnostic-boundary-tool-execution-error

    labels: {zh: 协议错误与工具执行错误边界, en: Protocol versus tool-execution error boundary, ja: プロトコル error とツール実行 error の境界}

    descriptions:
      zh: ReAct 文本 Action 标记 vs Anthropic structured tool_use vs Vercel AI SDK Zod schema tool 的 wire 契约边界；本地 Invocation 活动非原生封包。
      en: Wire contract boundary among ReAct text Action markers, Anthropic structured tool_use, Vercel AI SDK Zod schema tools; local Invocation activity is not native envelope.
      ja: ReAct テキスト Action marker、Anthropic structured tool_use、Vercel AI SDK Zod schema tool の wire 契約境界。ローカル Invocation 活動はネイティブ envelope ではない。
    field_values: {local_diagnostic_id: diag-2, local_attempt_ref: attempt-42-1, severity: error, local_code: tool_execution_validation, local_message: Departure date must be future}
    related_node_ids: [InvocationDiagnostic, ToolError, ToolResult]
    related_relation_ids: [InvocationDiagnostic-was_generated_by-InvocationAttempt]

    source_claims: [mcp-error-boundary, moonweave-invocation-diagnostic]
  - id: invocation-diagnostic-instance-warning

    labels: {zh: 重试警告实例, en: Retry warning instance, ja: 再試行警告インスタンス}

    descriptions:
      zh: ReAct HotpotQA 实例：Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup[Arthur's Magazine]→Finish[1850]；Anthropic tool_use_id=toolu_01A09q90qw90 配对 tool_result。
      en: ReAct HotpotQA instance: Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup→Finish[1850]; Anthropic tool_use_id=toolu_01A09q90qw90 paired with tool_result.
      ja: ReAct HotpotQA 実例：Thought→Action: Search→Observation→Lookup→Finish[1850]。Anthropic tool_use_id=toolu_01A09q90qw90 が tool_result とペア。
    field_values: {local_diagnostic_id: diag-warn, local_attempt_ref: attempt-42-1, severity: warning, local_code: retryable_timeout, local_message: Request exceeded host timeout; retry may be allowed}
    related_node_ids: [InvocationDiagnostic, ToolWarning, InvocationAttempt]
    related_relation_ids: [InvocationDiagnostic-was_generated_by-InvocationAttempt]

    source_claims: [moonweave-invocation-diagnostic]
parent_relation: null
relations:
  - id: InvocationDiagnostic-was_generated_by-InvocationAttempt
    predicate: was_generated_by
    target: concept:InvocationAttempt
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 由调用尝试生成, en: was generated by invocation attempt, ja: 呼出し試行により生成された}
    definitions: {zh: 当 local_attempt_ref 指向实际观察或创建该固定诊断记录的 InvocationAttempt 时，该诊断由该尝试生成, en: The diagnostic is generated by the InvocationAttempt identified by local_attempt_ref when that attempt actually observed or created this fixed diagnostic record, ja: local_attempt_ref がこの固定診断記録を実際に観測または作成した InvocationAttempt を指すとき診断はその試行により生成される}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: generated, labels: {zh: 生成调用诊断, en: generated invocation diagnostic, ja: 呼出し診断を生成した}}
    conditions:
      - id: invocation-diagnostic-generation-condition
        severity: error
        expression_language: plain
        expression: Assert only when local_attempt_ref identifies the target attempt and native or local observation evidence supports the diagnostic.
        explanation: {zh: 后续查看诊断不成为其生成者, en: Later inspection of a diagnostic does not become its generation, ja: 診断の後続検査はその生成にならない}
        source_claims: [prov-entity-activity, moonweave-invocation-diagnostic]
    temporal_scope: execution
    boundary_context: The cross-link records a generated diagnostic Entity and does not make error data a component or subtype of the attempt.
    constraints: []
    examples: []
    source_claims: [prov-entity-activity, moonweave-invocation-diagnostic]
    distinct_fact_rationale: A diagnostic remains independent evidence after the activity and its provenance is causal rather than compositional.
    layout_role: cross-link
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification - Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-specification
    locator: "Error Handling"
    relevance: Distinguishes JSON-RPC protocol errors from isError tool execution errors.
  - id: openai-responses-remote-mcp
    title: OpenAI API - MCP and Connectors
    url: https://developers.openai.com/api/docs/guides/tools-connectors-mcp
    source_type: official-documentation
    locator: "Calling tools"
    relevance: Describes mcp_call error for protocol, execution, and connectivity failures.
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    locator: "prov:Entity; prov:Activity; prov:wasGeneratedBy"
    relevance: Distinguishes a diagnostic evidence entity from its producing activity.
source_claims:
  - id: prov-entity-activity
    source: prov-o-core
    supports: PROV-O distinguishes an Entity from the Activity that generated it and defines prov:wasGeneratedBy for that provenance fact.
    locator: "PROV-O: prov:Entity, prov:Activity, prov:wasGeneratedBy"
    evidence_kind: normative
    confidence: high
  - id: mcp-error-boundary
    source: mcp-tools-2025-11-25
    supports: MCP distinguishes standard JSON-RPC protocol errors from tool execution errors represented in ToolResult with isError true.
    locator: "Error Handling"
    evidence_kind: normative
    confidence: high
  - id: openai-remote-mcp-errors
    source: openai-responses-remote-mcp
    supports: A failed remote-MCP mcp_call item populates error for MCP protocol errors, MCP tool execution errors, or general connectivity errors.
    locator: "Calling tools"
    evidence_kind: normative
    confidence: high
  - id: moonweave-invocation-diagnostic
    source: mcp-tools-2025-11-25
    supports: Moonweave InvocationDiagnostic is a local, sanitized evidence component of an attempt and does not replace a native error payload.
    locator: "Error Handling"
    evidence_kind: design-inference
    confidence: high