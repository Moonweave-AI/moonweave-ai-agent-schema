schema: moonweave.ai/ontology-node/v1
id: ToolWarning
kind: concept
labels:
  zh: 工具警告诊断
  en: Tool warning diagnostic
  ja: ツール警告診断
semantics:
  short_definition:
    zh: 严重程度为 warning 且与工具调用尝试有关的本地 InvocationDiagnostic 子类。
    en: An InvocationDiagnostic subtype with warning severity that is associated with a tool-call attempt.
    ja: warning 重要度を持ちツール呼び出し試行に関連する InvocationDiagnostic の下位型。
  definition:
    zh: >-
      ToolWarning 是用于需要操作员注意但尚未终止的条件的本地诊断，例如重试风险、接近超时、降级输出或策略提醒。MCP、OpenAI Responses 和 A2A 不定义统一的 ToolWarning wire 类型，因此该节点明确建模为主机本地分类，绝不重命名原生错误或状态消息。
    en: >
      A ToolWarning is a local diagnostic for a non-terminal condition requiring operator attention,
      such as retry risk, approaching timeout, degraded output, or policy caution. MCP, OpenAI
      Responses, and A2A do not define one universal ToolWarning wire type, so this node explicitly
      models a host-local classification and never relabels a native error or status message.
    ja: >-
      ToolWarning は retry risk、timeout 接近、degraded output、policy caution など operator の注意を要するがまだ terminal ではない条件のためのローカル diagnostic である。MCP、OpenAI Responses、A2A は共通の ToolWarning wire type を定義しないため、この node は明示的に host-local classification をモデル化し、native error や status message を改名しない。
  why_needed:
    zh: >-
      警告让主机暴露有意义的风险而不虚假地声明调用已失败。它是 InvocationDiagnostic 的真实子类，因为收窄了本地严重程度与工具调用上下文；它不是结果、状态或审批响应。
    en: >
      A warning lets the host expose meaningful risk without falsely declaring a call failed. It is a
      genuine InvocationDiagnostic subtype because it narrows local severity and tool-call context;
      it is not a result, status, or approval response.
    ja: >-
      warning は call failed と虚偽に宣言せずにホストが意味のある risk を示すことを可能にする。ローカル severity と tool-call context を狭めるため InvocationDiagnostic の真の subtype であり、result、status、approval response ではない。
  includes:
    - {zh: 本地警告类别和建议动作, en: Local warning category and suggested action, ja: ローカル警告分類と推奨行動}
  excludes:
    - {zh: 失败的工具结果、协议 error 或 A2A TaskStatus, en: "A failed tool result, protocol error, or A2A TaskStatus", ja: 失敗したツール結果、プロトコル error、A2A TaskStatus}
  semantic_kind: entity
  aliases:
    - {language: en, value: local tool caution, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      监测条件需要注意但尚未建立终止失败时，主机发出 ToolWarning。例如 MCP 允许请求超时计时在进度时重置，但仍要求最大超时，主机可在最大值之前警告；原生进度通知和后续错误保持为独立证据。
    en: >
      The host emits a ToolWarning when a monitored condition warrants attention but does not yet
      establish terminal failure. For example, MCP allows request timeout clocks to reset on progress
      but still requires a maximum timeout; a host can warn before that maximum. The native progress
      notification and any later error remain separate evidence.
    ja: >-
      monitoring condition が注意を要するが terminal failure をまだ確立しない場合、ホストは ToolWarning を出す。たとえば MCP は progress により request timeout clock を reset できるが最大 timeout を要求するため、ホストはその前に警告できる。native progress notification と後続 error は別の evidence のままである。
  typical_input:
    - description: A host sees progress but approaches its maximum timeout.
      format: '{"local_tool_warning_id":"warn-1","local_warning_category":"approaching_timeout","local_suggested_action":"monitor"}'
      source_claims: [mcp-timeout-policy, moonweave-tool-warning]
  typical_output:
    - description: The operator sees a warning without a false success or failure claim.
      format: '{"local_tool_warning_id":"warn-1","severity":"warning","local_message":"Request remains active but is near host timeout"}'
      source_claims: [moonweave-tool-warning]
  reference_implementations:
    - name: MCP Lifecycle specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
      description: Defines timeout and progress behavior.
structure:
  identity_keys: [local_tool_warning_id]
  fields:
    - id: local_tool_warning_id
      labels: {zh: 本地工具警告标识, en: Local tool-warning ID, ja: ローカルツール警告 ID}
      definitions: {zh: 主机分配给警告分类的标识, en: The identifier assigned by the host to this warning classification, ja: この警告分類に対するホスト割当て識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: warn-1
      allowed_values: []
      source_claims: [moonweave-tool-warning]
    - id: local_warning_category
      labels: {zh: 本地警告类别, en: Local warning category, ja: ローカル警告分類}
      definitions: {zh: 主机定义的非终止风险类别, en: A host-defined non-terminal risk category, ja: ホスト定義の非終端リスク分類}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: approaching_timeout
      allowed_values: [approaching_timeout, retryable_failure, degraded_output, policy_caution]
      source_claims: [moonweave-tool-warning]
    - id: local_suggested_action
      labels: {zh: 本地建议动作, en: Local suggested action, ja: ローカル推奨行動}
      definitions: {zh: 供操作员或编排器使用的本地建议，不是协议命令, en: A local suggestion for an operator or orchestrator and not a protocol command, ja: 運用者またはオーケストレーター向けのローカル提案でありプロトコルコマンドではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: monitor
      allowed_values: [monitor, retry_if_safe, request_review, stop]
      source_claims: [moonweave-tool-warning]
    - id: local_native_evidence_ref
      labels: {zh: 原生证据引用, en: Native evidence reference, ja: ネイティブ証拠参照}
      definitions: {zh: 与警告关联的原生消息或 item 引用, en: A reference to a native message or item associated with the warning, ja: 警告に関連するネイティブメッセージまたは item 参照}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: mcp-session-42#progress-1
      allowed_values: []
      source_claims: [moonweave-tool-warning]
    - id: local_diagnostic_id
      labels: {zh: 本地诊断标识, en: Local diagnostic ID, ja: ローカル診断 ID}
      definitions: {zh: 主机分配给诊断证据的标识, en: The identifier the host assigns to diagnostic evidence, ja: 診断証拠に対するホスト割当て識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: diag-1
      allowed_values: []
      source_claims: [moonweave-tool-warning]
    - id: local_attempt_ref
      labels: {zh: 尝试引用, en: Attempt reference, ja: 試行参照}
      definitions: {zh: 产生或观察到该诊断的 InvocationAttempt, en: The InvocationAttempt that produced or observed this diagnostic, ja: この診断を生成または観測した InvocationAttempt}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: attempt-42-1
      allowed_values: []
      source_claims: [moonweave-tool-warning]
    - id: severity
      labels: {zh: 本地严重程度, en: Local severity, ja: ローカル重要度}
      definitions: {zh: 主机面向运营者的诊断级别，不是远程协议枚举, en: A host-facing diagnostic level and not a remote protocol enum, ja: ホスト向け診断レベルでありリモートプロトコル列挙値ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: error
      allowed_values: [error, warning]
      source_claims: [moonweave-tool-warning]
    - id: local_code
      labels: {zh: 本地诊断代码, en: Local diagnostic code, ja: ローカル診断コード}
      definitions: {zh: 主机定义的稳定分类代码，不复制原生 error.code, en: A stable host-defined classification code that does not copy a native error.code, ja: ネイティブ error.code をコピーしない安定したホスト定義分類コード}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: remote_connectivity
      allowed_values: []
      source_claims: [moonweave-tool-warning]
    - id: local_message
      labels: {zh: 本地诊断消息, en: Local diagnostic message, ja: ローカル診断メッセージ}
      definitions: {zh: 为审计和操作呈现而清理后的消息，不替代原始错误载荷, en: A sanitized message for audit and operations that does not replace raw error payload, ja: 監査と運用のためのサニタイズ済みメッセージであり生の error ペイロードを置き換えない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Remote tool connection failed
      allowed_values: []
      source_claims: [moonweave-tool-warning]
  constraints:
    - id: tool-warning-requires-warning-diagnostic
      severity: error
      expression_language: plain
      expression: "local_tool_warning_id identifies the same InvocationDiagnostic record with severity warning and a ToolCallAttempt context."
      explanation: {zh: "local_tool_warning_id 标识同一条严重性为 warning 且具有 ToolCallAttempt 上下文的 InvocationDiagnostic 记录。", en: "The ToolWarning ID identifies the same InvocationDiagnostic record with severity warning and a ToolCallAttempt context.", ja: "local_tool_warning_id は、severity が warning で ToolCallAttempt 文脈を持つ同じ InvocationDiagnostic レコードを識別する。"}
      source_claims: [moonweave-tool-warning]
    - id: tool-warning-is-not-terminal-outcome
      severity: error
      expression_language: plain
      expression: A ToolWarning cannot by itself set the Invocation or InvocationAttempt outcome to succeeded or failed.
      explanation:
        zh: ToolWarning 自身不能把 Invocation 或 InvocationAttempt 结果设为 succeeded 或 failed。
        en: A ToolWarning cannot by itself set the Invocation or InvocationAttempt outcome to succeeded or failed.
        ja: ToolWarning 単独では Invocation または InvocationAttempt 結果を succeeded または failed に設定できない。
      source_claims: [moonweave-tool-warning]
    - id: tool-warning-id-same-record-parent-identity
      severity: error
      expression_language: plain
      expression: "local_tool_warning_id = local_diagnostic_id; both identify the same local InvocationDiagnostic record and inherited parent fields belong to that one record."
      explanation: {zh: "local_tool_warning_id 与 local_diagnostic_id 标识同一条本地 InvocationDiagnostic 记录，继承的父字段属于该同一记录。", en: "The child and parent IDs are equal representations of one local record, not a link to a second parent record.", ja: "local_tool_warning_id と local_diagnostic_id は同じローカル InvocationDiagnostic レコードを識別し、継承した親フィールドはその一つのレコードに属する。"}
      source_claims: [moonweave-tool-warning]
  required_relations: []
examples:
  - id: tool-warning-positive-approaching-timeout

    labels: {zh: 接近超时警告, en: Approaching-timeout warning, ja: タイムアウト接近警告}

    descriptions:
      zh: Vercel AI SDK execute 抛 ToolExecutionError 捕获为 ToolError；ReAct Observation 返回 "Could not find entity" 作为 ToolWarning；Anthropic tool_result is_error:true 标记失败。
      en: Vercel AI SDK execute throws ToolExecutionError captured as ToolError; ReAct Observation returns "Could not find entity" as ToolWarning; Anthropic tool_result is_error:true marks failure.
      ja: Vercel AI SDK execute が ToolExecutionError を ToolError として捕捉。ReAct Observation が ToolWarning を返す。Anthropic tool_result is_error:true。
    field_values: {local_tool_warning_id: warn-1, local_warning_category: approaching_timeout, local_suggested_action: monitor, local_native_evidence_ref: mcp-session-42#progress-1}
    related_node_ids: [ToolWarning, InvocationDiagnostic, InvocationAttempt]
    related_relation_ids: [ToolWarning-is_a-InvocationDiagnostic]

    source_claims: [mcp-timeout-policy, moonweave-tool-warning]
  - id: tool-warning-counterexample-error-severity

    labels: {zh: 警告引用错误父项, en: Warning referencing error parent, ja: error 親を参照する warning}

    descriptions:
      zh: 反例：Toolformer API 调用失败仍插入虚假结果 token；Gorilla 执行 hallucinated API 404 未记录 ToolError。
      en: Counterexample: Toolformer inserts fake result token on API failure; Gorilla executes hallucinated API 404 without ToolError record.
      ja: 反例：Toolformer が API 失敗時も虚假 result token を挿入。Gorilla hallucinated API 404 未記録。
    field_values: {local_tool_warning_id: warn-bad, local_warning_category: retryable_failure, local_suggested_action: retry_if_safe}
    related_node_ids: [ToolWarning, ToolError]
    related_relation_ids: [ToolWarning-is_a-InvocationDiagnostic]

    source_claims: [moonweave-tool-warning]
  - id: tool-warning-boundary-a2a-status

    labels: {zh: 本地警告与 A2A TaskStatus 边界, en: Local warning versus A2A TaskStatus boundary, ja: ローカル警告と A2A TaskStatus の境界}

    descriptions:
      zh: ReAct 环境 Observation 错误文本 vs Anthropic structured error vs Vercel AI SDK ToolExecutionError 的诊断表示边界。
      en: Diagnostic display boundary among ReAct environment Observation error text, Anthropic structured error, Vercel AI SDK ToolExecutionError.
      ja: ReAct Observation エラーテキスト、Anthropic structured error、Vercel AI SDK ToolExecutionError の診断表示境界。
    field_values: {local_tool_warning_id: warn-a2a, local_warning_category: approaching_timeout, local_suggested_action: monitor}
    related_node_ids: [ToolWarning, AgentAsToolInvocation]
    related_relation_ids: [ToolWarning-is_a-InvocationDiagnostic]

    source_claims: [a2a-task-status, moonweave-tool-warning]
  - id: tool-warning-instance-degraded-output

    labels: {zh: 降级输出警告实例, en: Degraded-output warning instance, ja: 劣化出力警告インスタンス}

    descriptions:
      zh: Vercel AI SDK 实例：execute 超时 throw new Error("Weather API timeout")→ToolError code=TIMEOUT；ReAct 实例：Search 无结果 Observation="No results found"。
      en: Vercel AI SDK instance: execute timeout throw Error("Weather API timeout")→ToolError code=TIMEOUT; ReAct instance: Search no results Observation="No results found".
      ja: Vercel AI SDK 実例：execute timeout→ToolError code=TIMEOUT。ReAct 実例：Search 无结果 Observation="No results found"。
    field_values: {local_tool_warning_id: warn-output, local_warning_category: degraded_output, local_suggested_action: request_review}
    related_node_ids: [ToolWarning, ToolResult]
    related_relation_ids: [ToolWarning-is_a-InvocationDiagnostic]

    source_claims: [moonweave-tool-warning]
parent_relation:
  id: ToolWarning-is_a-InvocationDiagnostic
  predicate: is_a
  target: concept:InvocationDiagnostic
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是调用诊断中的警告子类, en: is a warning subtype of invocation diagnostic, ja: 呼び出し診断の warning 下位型である}
  definition: {zh: 每个 ToolWarning 都是 severity 为 warning 且具有工具调用上下文的 InvocationDiagnostic, en: Every ToolWarning is an InvocationDiagnostic with warning severity and tool-call context, ja: すべての ToolWarning は warning 重要度とツール呼び出し文脈を持つ InvocationDiagnostic である}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_tool_warning_subtype, labels: {zh: 具有工具警告子类, en: has tool-warning subtype, ja: ツール警告下位型を持つ}}
  conditions: []
  temporal_scope: execution
  boundary_context: This hierarchy classifies non-terminal local diagnostic severity and does not represent an external status or result.
  constraints: []
  examples: []
  source_claims: [moonweave-tool-warning]
  distinct_fact_rationale: ToolWarning is a genuine constrained diagnostic subtype, not a relationship from a tool to a warning. It uses one same-record identity in which local_tool_warning_id identifies the same local InvocationDiagnostic record, so a second InvocationDiagnostic reference field is not permitted.
relations: []
sources:
  - id: mcp-lifecycle-2025-11-25
    title: Model Context Protocol Specification - Lifecycle
    url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
    source_type: official-specification
    locator: "Timeouts"
    relevance: Defines progress-based timeout handling and maximum timeout constraints.
  - id: a2a-protocol-specification
    title: A2A Protocol Specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-specification
    locator: "4.1.1 Task; 4.1.2 TaskStatus"
    relevance: Defines remote task states separately from host-local warnings.
source_claims:
  - id: mcp-timeout-policy
    source: mcp-lifecycle-2025-11-25
    supports: MCP implementations may reset a request timeout on corresponding progress but should enforce a maximum timeout regardless of progress.
    locator: "Timeouts"
    evidence_kind: normative
    confidence: high
  - id: a2a-task-status
    source: a2a-protocol-specification
    supports: A2A Task has its own current TaskStatus and lifecycle states, distinct from local host diagnostics.
    locator: "4.1.1 Task; 4.1.2 TaskStatus"
    evidence_kind: normative
    confidence: high
  - id: moonweave-tool-warning
    source: mcp-lifecycle-2025-11-25
    supports: Moonweave ToolWarning is a host-local warning-severity InvocationDiagnostic subtype and not a universal protocol warning payload.
    locator: "Timeouts"
    evidence_kind: design-inference
    confidence: high
