schema: moonweave.ai/ontology-node/v1
id: ToolError
kind: concept
labels:
  zh: 工具错误诊断
  en: Tool error diagnostic
  ja: ツールエラー診断
semantics:
  short_definition:
    zh: 严重程度为 error 且与工具调用尝试有关的本地 InvocationDiagnostic 子类。
    en: An InvocationDiagnostic subtype with error severity that is associated with a tool-call attempt.
    ja: error 重要度を持ちツール呼び出し試行に関連する InvocationDiagnostic の下位型。
  definition:
    zh: >-
      ToolError 是针对无法在未处理、重试或终止前继续的工具调用尝试的本地诊断分类。它不以单一原生错误 schema 命名，MCP 可返回 JSON-RPC 协议错误或 isError ToolResult，OpenAI remote MCP 可填充 mcp_call.error；本地错误在保留原生形式的同时归类证据。
    en: >
      A ToolError is a local diagnostic classification for a tool-call attempt that cannot continue
      without handling, retry, or termination. It is not named after a single native error schema:
      MCP can return either JSON-RPC protocol error or isError ToolResult, and OpenAI remote MCP can
      populate mcp_call.error. The local error categorizes evidence while preserving the native form.
    ja: >-
      ToolError は処理、retry、termination なしには継続できない tool-call attempt のためのローカル diagnostic classification である。単一の native error schema に由来する名ではない。MCP は JSON-RPC protocol error または isError ToolResult を返せ、OpenAI remote MCP は mcp_call.error を埋め得る。ローカル error は native form を保存したまま evidence を分類する。
  why_needed:
    zh: >-
      操作员需要确定性的错误类别来决定恢复，而不扁平化不同协议语义。它是 InvocationDiagnostic 的真实子类，因为每个 ToolError 都具有 error 严重程度和工具调用上下文。
    en: >
      Operators need a deterministic error category to decide recovery without flattening distinct
      protocol semantics. It is a real subtype of InvocationDiagnostic because every ToolError is a
      diagnostic with severity error and a tool-call context.
    ja: >-
      operator には異なる protocol semantics を平坦化せず recovery を決める決定的な error category が必要である。各 ToolError は severity error と tool-call context を持つ diagnostic なので InvocationDiagnostic の真の subtype である。
  includes:
    - {zh: 本地错误类别与可选恢复提示, en: Local error category and optional recovery hint, ja: ローカルエラー分類と任意の回復ヒント}
  excludes:
    - {zh: JSON-RPC error 信封或 MCP ToolResult 原始内容, en: A JSON-RPC error envelope or raw MCP ToolResult content, ja: JSON-RPC error 封筒または生の MCP ToolResult content}
  semantic_kind: entity
  aliases:
    - {language: en, value: local tool failure diagnostic, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      主机只有在保留相关原生证据并把父诊断严重程度设为 error 后才创建 ToolError。恢复提示可建议重试、修正、审批或升级，但它本身不发出原生取消或审批响应。
    en: >
      The host creates ToolError only after retaining the relevant native evidence and setting the
      parent diagnostic severity to error. A recovery hint can recommend retry, correction, approval,
      or escalation, but does not itself issue a native cancellation or approval response.
    ja: >-
      ホストは関連 native evidence を保持し、親 diagnostic severity を error に設定した後にのみ ToolError を作成する。recovery hint は retry、correction、approval、escalation を勧められるが、それ自体は native cancellation または approval response を発行しない。
  typical_input:
    - description: A schema-invalid MCP tools/call is diagnosed locally after native rejection.
      format: '{"local_tool_error_id":"tool-error-1","local_error_category":"input_validation","local_recovery_hint":"correct_arguments"}'
      source_claims: [moonweave-tool-error]
  typical_output:
    - description: The host presents corrective information while preserving the raw native error by reference.
      format: '{"local_tool_error_id":"tool-error-1","local_native_evidence_ref":"mcp-session-42#id-3"}'
      source_claims: [moonweave-tool-error]
  reference_implementations:
    - name: MCP Tools specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines protocol and execution error handling.
structure:
  identity_keys: [local_tool_error_id]
  fields:
    - id: local_tool_error_id
      labels: {zh: 本地工具错误标识, en: Local tool-error ID, ja: ローカルツールエラー ID}
      definitions: {zh: 主机分配给工具错误分类的标识, en: The identifier assigned by the host to the tool-error classification, ja: ツールエラー分類に対するホスト割当て識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: tool-error-1
      allowed_values: []
      source_claims: [moonweave-tool-error]
    - id: local_error_category
      labels: {zh: 本地错误类别, en: Local error category, ja: ローカルエラー分類}
      definitions: {zh: 供主机恢复策略使用的本地类别，不是原生 error code, en: A local category used by host recovery policy and not a native error code, ja: ホスト回復ポリシーに使うローカル分類でありネイティブ error code ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: input_validation
      allowed_values: [input_validation, protocol, execution, connectivity, authorization, policy]
      source_claims: [moonweave-tool-error, mcp-tool-errors]
    - id: local_recovery_hint
      labels: {zh: 本地恢复提示, en: Local recovery hint, ja: ローカル回復ヒント}
      definitions: {zh: 面向主机的后续处理提示，不是协议控制消息, en: A host-facing next-step hint and not a protocol control message, ja: ホスト向け次の処理ヒントでありプロトコル制御メッセージではない}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: correct_arguments
      allowed_values: [correct_arguments, retry, request_approval, escalate, stop]
      source_claims: [moonweave-tool-error]
    - id: local_native_evidence_ref
      labels: {zh: 原生证据引用, en: Native evidence reference, ja: ネイティブ証拠参照}
      definitions: {zh: 与该错误有关的原生响应或 item 引用, en: A reference to the native response or item relevant to this error, ja: このエラーに関係するネイティブ応答または item 参照}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: mcp-session-42#id-3
      allowed_values: []
      source_claims: [moonweave-tool-error]
    - id: local_diagnostic_id
      labels: {zh: 本地诊断标识, en: Local diagnostic ID, ja: ローカル診断 ID}
      definitions: {zh: 主机分配给诊断证据的标识, en: The identifier the host assigns to diagnostic evidence, ja: 診断証拠に対するホスト割当て識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: diag-1
      allowed_values: []
      source_claims: [moonweave-tool-error]
    - id: local_attempt_ref
      labels: {zh: 尝试引用, en: Attempt reference, ja: 試行参照}
      definitions: {zh: 产生或观察到该诊断的 InvocationAttempt, en: The InvocationAttempt that produced or observed this diagnostic, ja: この診断を生成または観測した InvocationAttempt}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: attempt-42-1
      allowed_values: []
      source_claims: [moonweave-tool-error]
    - id: severity
      labels: {zh: 本地严重程度, en: Local severity, ja: ローカル重要度}
      definitions: {zh: 主机面向运营者的诊断级别，不是远程协议枚举, en: A host-facing diagnostic level and not a remote protocol enum, ja: ホスト向け診断レベルでありリモートプロトコル列挙値ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: error
      allowed_values: [error, warning]
      source_claims: [moonweave-tool-error]
    - id: local_code
      labels: {zh: 本地诊断代码, en: Local diagnostic code, ja: ローカル診断コード}
      definitions: {zh: 主机定义的稳定分类代码，不复制原生 error.code, en: A stable host-defined classification code that does not copy a native error.code, ja: ネイティブ error.code をコピーしない安定したホスト定義分類コード}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: remote_connectivity
      allowed_values: []
      source_claims: [moonweave-tool-error]
    - id: local_message
      labels: {zh: 本地诊断消息, en: Local diagnostic message, ja: ローカル診断メッセージ}
      definitions: {zh: 为审计和操作呈现而清理后的消息，不替代原始错误载荷, en: A sanitized message for audit and operations that does not replace raw error payload, ja: 監査と運用のためのサニタイズ済みメッセージであり生の error ペイロードを置き換えない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Remote tool connection failed
      allowed_values: []
      source_claims: [moonweave-tool-error]
  constraints:
    - id: tool-error-requires-error-diagnostic
      severity: error
      expression_language: plain
      expression: "local_tool_error_id identifies the same InvocationDiagnostic record with severity error and a ToolCallAttempt context."
      explanation: {zh: "local_tool_error_id 标识同一条严重性为 error 且具有 ToolCallAttempt 上下文的 InvocationDiagnostic 记录。", en: "The ToolError ID identifies the same InvocationDiagnostic record with severity error and a ToolCallAttempt context.", ja: "local_tool_error_id は、severity が error で ToolCallAttempt 文脈を持つ同じ InvocationDiagnostic レコードを識別する。"}
      source_claims: [moonweave-tool-error]
    - id: tool-error-does-not-flatten-native-error-types
      severity: error
      expression_language: plain
      expression: local_error_category does not claim that JSON-RPC protocol error, ToolResult isError, and mcp_call.error are the same native payload type.
      explanation:
        zh: local_error_category 不得声称 JSON-RPC 协议错误、ToolResult isError 与 mcp_call.error 是同一种原生载荷。
        en: local_error_category does not claim that JSON-RPC protocol error, ToolResult isError, and mcp_call.error are one native payload type.
        ja: local_error_category は JSON-RPC プロトコル error、ToolResult isError、mcp_call.error が一つのネイティブペイロード型だと主張しない。
      source_claims: [mcp-tool-errors, openai-remote-mcp-errors, moonweave-tool-error]
    - id: tool-error-id-same-record-parent-identity
      severity: error
      expression_language: plain
      expression: "local_tool_error_id = local_diagnostic_id; both identify the same local InvocationDiagnostic record and inherited parent fields belong to that one record."
      explanation: {zh: "local_tool_error_id 与 local_diagnostic_id 标识同一条本地 InvocationDiagnostic 记录，继承的父字段属于该同一记录。", en: "The child and parent IDs are equal representations of one local record, not a link to a second parent record.", ja: "local_tool_error_id と local_diagnostic_id は同じローカル InvocationDiagnostic レコードを識別し、継承した親フィールドはその一つのレコードに属する。"}
      source_claims: [moonweave-tool-error]
  required_relations: []
examples:
  - id: tool-error-positive-input-validation

    labels: {zh: 参数校验错误, en: Input-validation error, ja: 入力検証エラー}

    descriptions:
      zh: Vercel AI SDK execute 抛 ToolExecutionError 捕获为 ToolError；ReAct Observation 返回 "Could not find entity" 作为 ToolWarning；Anthropic tool_result is_error:true 标记失败。
      en: Vercel AI SDK execute throws ToolExecutionError captured as ToolError; ReAct Observation returns "Could not find entity" as ToolWarning; Anthropic tool_result is_error:true marks failure.
      ja: Vercel AI SDK execute が ToolExecutionError を ToolError として捕捉。ReAct Observation が ToolWarning を返す。Anthropic tool_result is_error:true。
    field_values: {local_tool_error_id: tool-error-1, local_error_category: input_validation, local_recovery_hint: correct_arguments, local_native_evidence_ref: mcp-session-42#id-3}
    related_node_ids: [ToolError, InvocationDiagnostic, ToolCallAttempt]
    related_relation_ids: [ToolError-is_a-InvocationDiagnostic]

    source_claims: [mcp-tool-errors, moonweave-tool-error]
  - id: tool-error-counterexample-warning-parent

    labels: {zh: 错误引用警告父项, en: Error referencing warning parent, ja: warning 親を参照する error}

    descriptions:
      zh: 反例：Toolformer API 调用失败仍插入虚假结果 token；Gorilla 执行 hallucinated API 404 未记录 ToolError。
      en: Counterexample: Toolformer inserts fake result token on API failure; Gorilla executes hallucinated API 404 without ToolError record.
      ja: 反例：Toolformer が API 失敗時も虚假 result token を挿入。Gorilla hallucinated API 404 未記録。
    field_values: {local_tool_error_id: tool-error-bad, local_error_category: execution, local_recovery_hint: retry}
    related_node_ids: [ToolError, ToolWarning]
    related_relation_ids: [ToolError-is_a-InvocationDiagnostic]

    source_claims: [moonweave-tool-error]
  - id: tool-error-boundary-mcp-result

    labels: {zh: 本地错误与 MCP isError 边界, en: Local error versus MCP isError boundary, ja: ローカル error と MCP isError の境界}

    descriptions:
      zh: ReAct 环境 Observation 错误文本 vs Anthropic structured error vs Vercel AI SDK ToolExecutionError 的诊断表示边界。
      en: Diagnostic display boundary among ReAct environment Observation error text, Anthropic structured error, Vercel AI SDK ToolExecutionError.
      ja: ReAct Observation エラーテキスト、Anthropic structured error、Vercel AI SDK ToolExecutionError の診断表示境界。
    field_values: {local_tool_error_id: tool-error-2, local_error_category: execution, local_recovery_hint: correct_arguments, local_native_evidence_ref: mcp-session-42#id-4}
    related_node_ids: [ToolError, ToolResult]
    related_relation_ids: [ToolError-is_a-InvocationDiagnostic]

    source_claims: [mcp-tool-errors, moonweave-tool-error]
  - id: tool-error-instance-approval-required

    labels: {zh: 需审批错误实例, en: Approval-required error instance, ja: 承認必要 error インスタンス}

    descriptions:
      zh: Vercel AI SDK 实例：execute 超时 throw new Error("Weather API timeout")→ToolError code=TIMEOUT；ReAct 实例：Search 无结果 Observation="No results found"。
      en: Vercel AI SDK instance: execute timeout throw Error("Weather API timeout")→ToolError code=TIMEOUT; ReAct instance: Search no results Observation="No results found".
      ja: Vercel AI SDK 実例：execute timeout→ToolError code=TIMEOUT。ReAct 実例：Search 无结果 Observation="No results found"。
    field_values: {local_tool_error_id: tool-error-approval, local_error_category: authorization, local_recovery_hint: request_approval}
    related_node_ids: [ToolError, ToolCallAttempt]
    related_relation_ids: [ToolError-is_a-InvocationDiagnostic]

    source_claims: [openai-remote-mcp-errors, moonweave-tool-error]
parent_relation:
  id: ToolError-is_a-InvocationDiagnostic
  predicate: is_a
  target: concept:InvocationDiagnostic
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是调用诊断中的错误子类, en: is an error subtype of invocation diagnostic, ja: 呼び出し診断の error 下位型である}
  definition: {zh: 每个 ToolError 都是 severity 为 error 且具有工具调用上下文的 InvocationDiagnostic, en: Every ToolError is an InvocationDiagnostic with error severity and tool-call context, ja: すべての ToolError は error 重要度とツール呼び出し文脈を持つ InvocationDiagnostic である}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_tool_error_subtype, labels: {zh: 具有工具错误子类, en: has tool-error subtype, ja: ツールエラー下位型を持つ}}
  conditions: []
  temporal_scope: execution
  boundary_context: This hierarchy classifies diagnostic severity and context; it does not turn an error into a protocol payload.
  constraints: []
  examples: []
  source_claims: [moonweave-tool-error]
  distinct_fact_rationale: ToolError is a genuine constrained diagnostic subtype, not a relation from a tool call to an error. It uses one same-record identity in which local_tool_error_id identifies the same local InvocationDiagnostic record, so a second InvocationDiagnostic reference field is not permitted.
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification - Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-specification
    locator: "Error Handling"
    relevance: Defines native MCP protocol and execution error forms.
  - id: openai-responses-remote-mcp
    title: OpenAI API - MCP and Connectors
    url: https://developers.openai.com/api/docs/guides/tools-connectors-mcp
    source_type: official-documentation
    locator: "Calling tools"
    relevance: Defines error reporting in Responses mcp_call items.
source_claims:
  - id: mcp-tool-errors
    source: mcp-tools-2025-11-25
    supports: MCP uses JSON-RPC errors for malformed or unknown requests and ToolResult isError true for tool execution failures such as validation or business-logic errors.
    locator: "Error Handling"
    evidence_kind: normative
    confidence: high
  - id: openai-remote-mcp-errors
    source: openai-responses-remote-mcp
    supports: Failed remote-MCP mcp_call items populate error for MCP protocol, tool execution, or connectivity failures.
    locator: "Calling tools"
    evidence_kind: normative
    confidence: high
  - id: moonweave-tool-error
    source: mcp-tools-2025-11-25
    supports: Moonweave ToolError is a local error-severity InvocationDiagnostic subtype that classifies evidence without replacing any native error form.
    locator: "Error Handling"
    evidence_kind: design-inference
    confidence: high
