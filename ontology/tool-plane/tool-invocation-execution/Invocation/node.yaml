schema: moonweave.ai/ontology-node/v1
id: Invocation
kind: concept
status: accepted
labels:
  zh: 调用
  en: Invocation
  ja: 呼び出し
semantics:
  short_definition:
    zh: 调用是把一个已选能力及其参数交给执行边界的一次可追踪活动。
    en: An Invocation is one traceable activity that submits a selected capability and its arguments to an execution boundary.
    ja: 呼び出しは選択済み能力と引数を実行境界へ渡す追跡可能な一回の活動です。
  definition:
    zh: 调用是一种活动，以 invocation_id、所用调用规范、请求方、参数摘要和发生时间为身份；它从请求意图开始，统摄一次或多次独立尝试，但不等同于请求记录、稳定能力定义、单次尝试或返回结果。
    en: An Invocation is an activity identified by invocation_id, governing invocation specification, requester, argument digest, and occurrence time. It is requested by an intent record and contains one or more independent attempts, but is not the request record, stable capability definition, one attempt, or returned result.
    ja: 呼び出しは invocation_id、統制仕様、要求者、引数 digest、発生時刻で識別する活動です。要求記録から開始し独立 attempt を含みますが、要求記録・安定定義・単一 attempt・返却結果そのものではありません。
  why_needed:
    zh: 该根节点把‘要执行什么’、‘实际执行几次’和‘返回了什么’分开，使重试、诊断与副作用可以沿同一调用追溯。
    en: This root separates what was requested, how many executions occurred, and what was returned so retries, diagnostics, and effects remain traceable to one call.
    ja: 要求内容・実行回数・返却内容を分離し、retry・diagnostic・effect を一呼出しへ追跡できます。
  includes:
    - zh: 纳入具有独立调用标识、确定能力目标、实参和发生时间的真实调用活动。
      en: Includes actual call activities with an independent invocation ID, resolved capability target, arguments, and occurrence time.
      ja: 独立 invocation ID、解決済み能力、引数、発生時刻を持つ実際の呼出し活動を含みます。
  excludes:
    - zh: 排除尚未执行的 InvocationSpecification、只表达意图的 InvocationExecutionRequest、单次 InvocationAttempt 和 InvocationResult。
      en: Excludes an unexecuted InvocationSpecification, an intent-only InvocationExecutionRequest, one InvocationAttempt, and an InvocationResult.
      ja: 未実行 InvocationSpecification、意図だけの InvocationExecutionRequest、単一 InvocationAttempt、InvocationResult を除きます。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - invocation_id
  fields:
    - id: invocation_id
      labels:
        zh: 调用标识
        en: invocation ID
        ja: 呼出し ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识这次调用，跨尝试保持不变。
        en: Uniquely identifies this invocation and remains stable across its attempts.
        ja: この呼出しを一意に識別し attempt 間で不変です。
      allowed_values: []
      pattern: null
      example_value: invocation-weather-0042
      source_claims:
        - claim-invocation-003
        - claim-invocation-004
    - id: specification_ref
      labels:
        zh: 调用规范引用
        en: invocation-specification reference
        ja: 呼出し仕様参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向本次调用所遵循的 InvocationSpecification。
        en: References the InvocationSpecification governing this call.
        ja: この呼出しを統制する InvocationSpecification を参照します。
      allowed_values: []
      pattern: null
      example_value: invocation-spec:weather@3
      source_claims:
        - claim-invocation-005
        - claim-invocation-006
    - id: requested_by_ref
      labels:
        zh: 请求方引用
        en: requester reference
        ja: 要求者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识发起这次调用的主体，但不把主体角色复制为调用节点。
        en: Identifies the actor requesting the invocation without copying its role into the call node.
        ja: 呼出し要求主体を識別し role を call node へ複製しません。
      allowed_values: []
      pattern: null
      example_value: agent:travel-planner
      source_claims:
        - claim-invocation-007
        - claim-invocation-008
    - id: argument_digest
      labels:
        zh: 实参摘要
        en: argument digest
        ja: 実引数 digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次调用的规范化实参快照，敏感值可保留在受控存储。
        en: Fixes the normalized argument snapshot while sensitive values may remain in controlled storage.
        ja: 正規化引数 snapshot を固定し sensitive value は controlled storage に保持できます。
      allowed_values: []
      pattern: null
      example_value: sha256:6c7a...
      source_claims:
        - claim-invocation-009
        - claim-invocation-010
    - id: requested_at
      labels:
        zh: 请求时刻
        en: requested at
        ja: 要求時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录调用活动被请求的 UTC 时刻。
        en: Records the UTC instant at which the invocation was requested.
        ja: 呼出しが要求された UTC 時刻を記録します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:30:00Z
      source_claims:
        - claim-invocation-011
        - claim-invocation-012
  constraints: []
  required_relation_constraints: []
examples:
  - id: Invocation-example-positive-manual-001
    kind: positive
    labels:
      zh: 调用正例
      en: Invocation positive case
      ja: 呼び出し正例
    scenario_id: null
    descriptions:
      zh: 旅行规划智能体以 invocation-weather-0042 调用已选天气能力，固定城市参数并随后产生两个尝试。
      en: A travel-planning agent invokes the selected weather capability as invocation-weather-0042, fixes the city argument, and later records two attempts.
      ja: 旅行計画 agent が選択済み weather 能力を invocation-weather-0042 として呼出し city 引数を固定し後に二 attempt を記録します。
    field_values:
      invocation_id: invocation-weather-0042
      specification_ref: invocation-spec:weather@3
      requested_by_ref: agent:travel-planner
      argument_digest: sha256:0dbc836a6ab61a7b14d9b96051b5f50c58f64dd1339b3189d2191c95e3d97fef
      requested_at: 2026-07-16T01:30:00Z
    related_node_ids:
      - Invocation
      - InvocationAttempt
    related_relation_ids:
      - Invocation-has_attempt-InvocationAttempt
    expected_result:
      zh: 建立 Invocation，并保留它与相邻规范、尝试或结果的独立身份。
      en: Create Invocation while preserving its identity from adjacent specifications, attempts, or results.
      ja: Invocation を作成し adjacent specification・attempt・result との separate identity を保持します。
    why_valid_or_invalid:
      zh: 纳入具有独立调用标识、确定能力目标、实参和发生时间的真实调用活动。
      en: Includes actual call activities with an independent invocation ID, resolved capability target, arguments, and occurrence time.
      ja: 独立 invocation ID、解決済み能力、引数、発生時刻を持つ実際の呼出し活動を含みます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-invocation-013
      - claim-invocation-014
  - id: Invocation-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 调用边界例
      en: Invocation boundary case
      ja: 呼び出し境界例
    scenario_id: null
    descriptions:
      zh: 目录中的 weather.lookup v3 只描述可复用接口，尚无调用标识、请求时刻或实际尝试。
      en: Catalog entry weather.lookup v3 describes a reusable interface but has no invocation ID, request time, or actual attempt.
      ja: catalog の weather.lookup v3 は reusable interface を記述するだけで invocation ID・要求時刻・actual attempt がありません。
    field_values:
      invocation_id: invocation-weather-0042
    related_node_ids:
      - Invocation
    related_relation_ids: []
    expected_result:
      zh: 不建立 Invocation；按边界例所示保留在更准确的概念中。
      en: Do not create Invocation; keep the record in the more accurate concept identified by the boundary.
      ja: Invocation を作らず boundary が示す accurate concept に保持します。
    why_valid_or_invalid:
      zh: 排除尚未执行的 InvocationSpecification、只表达意图的 InvocationExecutionRequest、单次 InvocationAttempt 和 InvocationResult。
      en: Excludes an unexecuted InvocationSpecification, an intent-only InvocationExecutionRequest, one InvocationAttempt, and an InvocationResult.
      ja: 未実行 InvocationSpecification、意図だけの InvocationExecutionRequest、単一 InvocationAttempt、InvocationResult を除きます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-invocation-015
      - claim-invocation-016
external_mappings: []
