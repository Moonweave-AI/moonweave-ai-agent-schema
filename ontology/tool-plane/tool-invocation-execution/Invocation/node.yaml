schema: moonweave.ai/ontology-node/v1
id: Invocation
kind: concept
labels:
  zh: 调用
  en: Invocation
  ja: 呼び出し
semantics:
  short_definition:
    zh: 主机为一个本地目标发起、跟踪和关闭的单次本地执行活动。
    en: One local execution activity a host initiates, tracks, and closes for a target.
    ja: ホストが一つの対象に対して開始・追跡・終了する一回のローカル実行活動。
  definition:
    zh: >-
      Invocation 是带有主机本地标识、来源表面标签、目标引用、生命周期状态和原生记录关联的 Moonweave 活动轨迹。它不是 MCP JSON-RPC tools/call 请求、OpenAI Responses function_call 或 mcp_call item，也不是 A2A SendMessageRequest 或 Task；该轨迹可关联这些记录及其本地尝试、诊断、效果和结果，但不主张拥有其原生 schema。
    en: >
      An Invocation is a Moonweave activity trace with a host-local identifier, source-surface label,
      target reference, lifecycle state, and correlations to native records. It is not itself the MCP
      JSON-RPC tools/call request, an OpenAI Responses function_call or mcp_call item, or an A2A
      SendMessageRequest/Task. A trace can correlate one of those records and its local attempts,
      diagnostics, effects, and results without claiming their native schemas.
    ja: >-
      Invocation はホストローカル ID、source-surface label、対象参照、ライフサイクル状態、ネイティブ記録への相関を持つ Moonweave の活動トレースである。MCP JSON-RPC tools/call 要求、OpenAI Responses の function_call または mcp_call item、A2A SendMessageRequest や Task そのものではない。これらの記録とローカル試行、診断、効果、結果を相関できるが、そのネイティブ schema を自らのものと主張しない。
  why_needed:
    zh: >-
      主机需要在派发适配器之间关联意图与结果，并保存重试和副作用的证据。活动边界使调用发生本身可与输入消息、结果数据、警告、错误和执行配置区分开。
    en: >
      A host needs to correlate intent and outcome across dispatch adapters while preserving evidence
      for retries and side effects. The activity boundary makes it possible to distinguish a call
      occurrence from its input message, result data, warning, error, or execution configuration.
    ja: >-
      ホストは配信 adapter をまたいで意図と結果を相関し、再試行と副作用の証拠を保持する必要がある。活動境界により、呼び出しの発生を入力メッセージ、結果データ、警告、エラー、実行設定から区別できる。
  includes:
    - {zh: 本地标识、来源表面、目标和生命周期, en: "Local identity, source surface, target, and lifecycle", ja: ローカル識別子、ソース表面、対象、ライフサイクル}
    - {zh: 对原生记录和本地尝试的关联, en: Correlations to native records and local attempts, ja: ネイティブ記録とローカル試行への相関}
  excludes:
    - {zh: 工具定义、请求参数本身或返回值本身, en: "A tool definition, request arguments themselves, or a return value itself", ja: ツール定義、要求引数そのもの、返却値そのもの}
    - {zh: A2A Task 或 Artifact 的原生生命周期, en: The native lifecycle of an A2A Task or Artifact, ja: A2A Task または Artifact のネイティブライフサイクル}
  semantic_kind: activity
  aliases:
    - {language: en, value: local execution trace, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      主机派发动作时创建本地 Invocation 并记录其适配器表面。适配器仍单独保留原生消息，MCP 使用 tools/call 封包，Responses 使用 function_call/function_call_output 或 mcp_call item，A2A 使用 SendMessage 加 Task 或 Message 输出；本地尝试、诊断、效果和结果通过组成关联到此轨迹。
    en: >
      When a host dispatches an action, it creates the local Invocation and records its adapter
      surface. The adapter retains the native message separately: MCP has a tools/call envelope,
      Responses has function_call/function_call_output or mcp_call items, and A2A has SendMessage
      plus Task or Message output. Local attempt, diagnostic, effect, and result records attach to
      this trace through composition rather than being represented as Invocation subclasses.
    ja: >-
      ホストは action を配信するときローカル Invocation を作成して adapter surface を記録する。adapter はネイティブメッセージを別に保持し、MCP は tools/call envelope、Responses は function_call/function_call_output または mcp_call item、A2A は SendMessage と Task または Message 出力を使う。ローカルの試行、診断、効果、結果は構成としてこのトレースに結び付く。
  typical_input:
    - description: A native MCP request is kept alongside a local invocation trace.
      format: '{"native_mcp_request":{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"get_weather","arguments":{"location":"Paris"}}},"local_invocation":{"local_invocation_id":"inv-42","local_surface":"mcp_tools_call","local_target_ref":"mcp:weather/get_weather"}}'
      source_claims: [mcp-tools-call, moonweave-invocation-trace]
  typical_output:
    - description: The host records a completed local trace after a correlated result is received.
      format: '{"local_invocation_id":"inv-42","local_lifecycle_state":"completed","local_native_record_refs":["mcp-session-42#id-2"]}'
      source_claims: [moonweave-invocation-trace]
  reference_implementations:
    - name: MCP Tools specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines tools/call and ToolResult envelopes.
    - name: OpenAI Function Calling guide
      url: https://developers.openai.com/api/docs/guides/function-calling
      description: Defines function_call and function_call_output item flow.
    - name: A2A Protocol Specification
      url: https://a2a-protocol.org/latest/specification/
      description: Defines SendMessage, Task, Message, and Artifact workflow.
structure:
  identity_keys: [local_invocation_id]
  fields:
    - id: local_invocation_id
      labels: {zh: 本地调用标识, en: Local invocation ID, ja: ローカル呼び出し ID}
      definitions: {zh: 主机为一个本地执行活动分配的稳定标识, en: A stable identifier assigned by the host to one local execution activity, ja: 一つのローカル実行活動にホストが割り当てる安定識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: inv-42
      allowed_values: []
      source_claims: [moonweave-invocation-trace]
    - id: local_surface
      labels: {zh: 本地来源表面, en: Local source surface, ja: ローカルソース表面}
      definitions: {zh: 主机选择适配器时记录的来源类型，非原生协议字段, en: The source category recorded by the host for adapter selection; not a native protocol field, ja: ホストがアダプター選択に記録するソース分類でありネイティブプロトコル項目ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp_tools_call
      allowed_values: [mcp_tools_call, openai_responses_function, openai_responses_remote_mcp, a2a_send_message, local_command]
      source_claims: [moonweave-invocation-trace]
    - id: local_target_ref
      labels: {zh: 本地目标引用, en: Local target reference, ja: ローカル対象参照}
      definitions: {zh: 指向要执行目标的本地或已发现引用, en: A local or discovered reference to the target being executed, ja: 実行対象へのローカルまたは発見済み参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp:weather/get_weather
      allowed_values: []
      source_claims: [moonweave-invocation-trace]
    - id: local_lifecycle_state
      labels: {zh: 本地生命周期状态, en: Local lifecycle state, ja: ローカルライフサイクル状態}
      definitions: {zh: 主机对其本地追踪活动的状态，不重命名远程 TaskStatus, en: The host state of its local trace and not a renamed remote TaskStatus, ja: ホストによるローカル軌跡状態でありリモート TaskStatus の改名ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dispatched
      allowed_values: [planned, dispatched, completed, failed, cancelled]
      source_claims: [moonweave-invocation-trace, a2a-task-boundary]
    - id: local_native_record_refs
      labels: {zh: 原生记录引用, en: Native record references, ja: ネイティブ記録参照}
      definitions: {zh: 关联的原生请求、item 或 A2A 对象的可审计引用, en: "Auditable references to correlated native requests, items, or A2A objects", ja: 相関するネイティブ要求、item、A2A オブジェクトへの監査可能参照}
      datatype: string[]
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: '["mcp-session-42#id-2"]'
      allowed_values: []
      source_claims: [moonweave-invocation-trace]
    - id: local_started_at
      labels: {zh: 本地开始时间, en: Local started-at time, ja: ローカル開始時刻}
      definitions: {zh: 主机记录该本地活动开始的时间戳, en: The host-recorded timestamp at which this local activity started, ja: このローカル活動をホストが開始として記録した時刻}
      datatype: date-time
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: "2026-07-19T09:00:00Z"
      allowed_values: []
      source_claims: [moonweave-invocation-trace]
  constraints:
    - id: invocation-trace-has-source-and-target
      severity: error
      expression_language: plain
      expression: Every Invocation has one local_surface and one local_target_ref.
      explanation:
        zh: 每个调用必须具有一个本地来源表面和一个目标引用。
        en: Every invocation has one local source surface and one target reference.
        ja: すべての呼び出しは一つのローカルソース表面と一つの対象参照を持つ。
      source_claims: [moonweave-invocation-trace]
    - id: invocation-trace-does-not-retype-native-record
      severity: error
      expression_language: plain
      expression: local_invocation_id and local_lifecycle_state do not replace MCP id, Responses call_id, or A2A taskId and TaskStatus.
      explanation:
        zh: local_invocation_id 和 local_lifecycle_state 不得取代 MCP id、Responses call_id 或 A2A taskId 与 TaskStatus。
        en: local_invocation_id and local_lifecycle_state do not replace MCP id, Responses call_id, or A2A taskId and TaskStatus.
        ja: local_invocation_id と local_lifecycle_state は MCP id、Responses call_id、A2A taskId と TaskStatus を置き換えない。
      source_claims: [mcp-tools-call, openai-function-call-items, a2a-task-boundary, moonweave-invocation-trace]
  required_relations: []
examples:
  - id: invocation-positive-mcp-weather

    labels: {zh: MCP 天气调用轨迹, en: MCP weather invocation trace, ja: MCP 天気呼び出し軌跡}

    descriptions:
      zh: ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]；Anthropic content:[{type:"tool_use",id:"toolu_01",name:"get_weather",input:{location:"Paris"}}]；Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。
      en: ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]; Anthropic content:[{type:"tool_use",id:"toolu_01",name:"get_weather",input:{location:"Paris"}}]; Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}}).
      ja: ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]。Anthropic tool_use。Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。
    field_values: {local_invocation_id: inv-42, local_surface: mcp_tools_call, local_target_ref: "mcp:weather/get_weather", local_lifecycle_state: dispatched, local_native_record_refs: '["mcp-session-42#id-2"]'}
    related_node_ids: [Invocation, ToolCall, InvocationAttempt]
    related_relation_ids: []

    source_claims: [mcp-tools-call, moonweave-invocation-trace]
  - id: invocation-counterexample-mixed-identifiers

    labels: {zh: 混合原生标识, en: Mixed native identifiers, ja: 混在したネイティブ識別子}

    descriptions:
      zh: 反例：ReAct Action 无对应 Observation 就继续推理；Anthropic tool_use 缺少配对 tool_result(tool_use_id)；Vercel AI SDK execute 抛错未捕获。
      en: Counterexample: ReAct continues reasoning without Observation for Action; Anthropic tool_use missing paired tool_result(tool_use_id); Vercel AI SDK execute error uncaught.
      ja: 反例：ReAct Action に Observation なしで reasoning 継続。Anthropic tool_use に tool_result ペア欠落。Vercel AI SDK execute エラー未捕捉。
    field_values: {local_invocation_id: inv-bad, local_surface: openai_responses_function, local_target_ref: "function:get_weather", local_lifecycle_state: dispatched, local_native_record_refs: '["call_123","task-123"]'}
    related_node_ids: [Invocation]
    related_relation_ids: []

    source_claims: [openai-function-call-items, a2a-task-boundary, moonweave-invocation-trace]
  - id: invocation-boundary-a2a-task

    labels: {zh: 调用轨迹与 A2A Task 边界, en: Invocation trace versus A2A Task boundary, ja: 呼び出し軌跡と A2A Task の境界}

    descriptions:
      zh: ReAct 文本 Action 标记 vs Anthropic structured tool_use vs Vercel AI SDK Zod schema tool 的 wire 契约边界；本地 Invocation 活动非原生封包。
      en: Wire contract boundary among ReAct text Action markers, Anthropic structured tool_use, Vercel AI SDK Zod schema tools; local Invocation activity is not native envelope.
      ja: ReAct テキスト Action marker、Anthropic structured tool_use、Vercel AI SDK Zod schema tool の wire 契約境界。ローカル Invocation 活動はネイティブ envelope ではない。
    field_values: {local_invocation_id: inv-a2a-1, local_surface: a2a_send_message, local_target_ref: "a2a:research-agent", local_lifecycle_state: dispatched, local_native_record_refs: '["a2a-message:msg-1"]'}
    related_node_ids: [Invocation, AgentAsToolInvocation, ToolResult]
    related_relation_ids: []

    source_claims: [a2a-send-message, a2a-task-boundary, moonweave-invocation-trace]
  - id: invocation-instance-local-command

    labels: {zh: 本地命令调用实例, en: Local command invocation instance, ja: ローカルコマンド呼び出しインスタンス}

    descriptions:
      zh: ReAct HotpotQA 实例：Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup[Arthur's Magazine]→Finish[1850]；Anthropic tool_use_id=toolu_01A09q90qw90 配对 tool_result。
      en: ReAct HotpotQA instance: Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup→Finish[1850]; Anthropic tool_use_id=toolu_01A09q90qw90 paired with tool_result.
      ja: ReAct HotpotQA 実例：Thought→Action: Search→Observation→Lookup→Finish[1850]。Anthropic tool_use_id=toolu_01A09q90qw90 が tool_result とペア。
    field_values: {local_invocation_id: inv-cmd-1, local_surface: local_command, local_target_ref: "shell:git-status", local_lifecycle_state: completed, local_started_at: "2026-07-19T09:00:00Z"}
    related_node_ids: [Invocation, Command, ShellCommand, ExecutionResult]
    related_relation_ids: []

    source_claims: [moonweave-invocation-trace]
parent_relation: null
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification - Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-specification
    locator: "Calling Tools; Tool Result; Error Handling"
    relevance: Defines distinct MCP request, result, and error records.
  - id: openai-responses-function-calling
    title: OpenAI API - Function Calling
    url: https://developers.openai.com/api/docs/guides/function-calling
    source_type: official-documentation
    locator: "Handling function calls; Execute function calls and append results"
    relevance: Defines function_call and function_call_output correlations.
  - id: a2a-protocol-specification
    title: A2A Protocol Specification
    url: https://a2a-protocol.org/latest/specification/
    source_type: official-specification
    locator: "3.1.1 Send Message; 4.1.1 Task; 4.1.7 Artifact"
    relevance: Defines message-driven task execution and artifacts.
source_claims:
  - id: mcp-tools-call
    source: mcp-tools-2025-11-25
    supports: MCP tools/call is a JSON-RPC request with name and optional arguments, and its server response is a ToolResult or protocol error.
    locator: "Calling Tools; Error Handling"
    evidence_kind: normative
    confidence: high
  - id: openai-function-call-items
    source: openai-responses-function-calling
    supports: A Responses function_call item uses id, call_id, name, and JSON-encoded arguments, while a later function_call_output item refers to call_id.
    locator: "Handling function calls; Execute function calls and append results"
    evidence_kind: normative
    confidence: high
  - id: a2a-send-message
    source: a2a-protocol-specification
    supports: A2A SendMessage sends a Message and returns a Task or direct Message, with task processing able to continue asynchronously.
    locator: "3.1.1 Send Message"
    evidence_kind: normative
    confidence: high
  - id: a2a-task-boundary
    source: a2a-protocol-specification
    supports: A2A Task is a stateful unit of work and Artifact is a Task output, each with native identifiers and lifecycle semantics.
    locator: "4.1.1 Task; 4.1.7 Artifact"
    evidence_kind: normative
    confidence: high
  - id: moonweave-invocation-trace
    source: openai-responses-function-calling
    supports: Moonweave Invocation is a local activity trace that correlates source-specific records without asserting a common native wire schema.
    locator: "Handling function calls"
    evidence_kind: design-inference
    confidence: high
