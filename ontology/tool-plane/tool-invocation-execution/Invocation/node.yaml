    source: eng-proto-mcp-tools-2025-06-18
    supports: MCP separates a tools/call request from its Tool Result, requires a result for tool execution errors, and reserves protocol errors for malformed or unknown requests. Moonweave uses this primary evidence to delimit Invocation as activity with the reviewed boundary stated in its definition.
    locator: Server Features > Tools > Calling Tools; Tool Result; Error Handling
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-invocation-002
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry models each execution occurrence as a span with timestamps, attributes, events, and status rather than as a reusable specification. Moonweave uses this primary evidence to delimit Invocation as activity with the reviewed boundary stated in its definition.
