schema: moonweave.ai/ontology-node/v1
id: ResourceReadRequest
kind: concept
status: accepted
labels:
  zh: 资源读取调用
  en: Resource Read Invocation
  ja: リソース読取呼び出し
semantics:
  short_definition:
    zh: 资源读取调用是按 URI 请求一次资源内容读取的一种调用。
    en: A Resource Read Invocation is an Invocation requesting one read of resource content by URI.
    ja: リソース読取呼び出しは URI で一 resource content read を要求する Invocation です。
  definition:
    zh: 资源读取调用是一种 Invocation，沿用 invocation_id 与请求时刻，并以规范化 URI 和请求方为种差；它对应 resources/read 的发生并产生 ResourceReadResult，但不是 ResourceDefinition、订阅状态或返回内容本身。
    en: A Resource Read Invocation is an Invocation that retains its invocation_id and request time and is differentiated by a normalized URI and requester. It represents a resources/read occurrence and produces a ResourceReadResult, but is not the ResourceDefinition, subscription state, or returned content itself.
    ja: リソース読取呼び出しは Invocation の invocation_id と request time を継承し、normalized URI と requester を種差とします。resources/read occurrence を表して ResourceReadResult を生成しますが ResourceDefinition・subscription state・returned content ではありません。
  why_needed:
    zh: 读取调用层把稳定资源定义、协议传输和实际读取结果分开，支持同一 URI 的多次有时间差读取。
    en: The read-invocation layer separates stable resource definition, protocol transport, and actual result, supporting multiple time-distinct reads of one URI.
    ja: read-invocation layer は stable resource definition・protocol transport・actual result を分け同一 URI の time-distinct reads を支えます。
  includes:
    - zh: 纳入具有读取请求标识和规范化 URI 的实际 resources/read 调用。
      en: Includes actual resources/read invocations with a read-request ID and normalized URI.
      ja: read-request ID と normalized URI を持つ actual resources/read invocation を含みます。
  excludes:
    - zh: 排除资源定义、资源列表、订阅状态、缓存条目和 ResourceReadResult。
      en: Excludes resource definitions, resource lists, subscription state, cache entries, and ResourceReadResult.
      ja: resource definition・resource list・subscription state・cache entry・ResourceReadResult を除きます。
  semantic_kind: activity
  aliases: []
