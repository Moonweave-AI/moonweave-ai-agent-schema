source_claims:
  - id: claim-resource-read-request-001
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 defines resources/read as one JSON-RPC request carrying params.uri and returning contents. Moonweave models the correlated request occurrence as ResourceReadRequest, separately from resources/list discovery, ResourceDefinition, subscription state, and returned content.
    locator: Server Features > Resources > Protocol Messages > Reading Resources; Data Types > Resource Contents
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-read-request-002
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 requires resources/read params.uri to identify the target resource; Moonweave stores the resolved normalized value as ResourceReadRequest.resource_uri.
    locator: Schema Reference > ReadResourceRequest.params.uri; Server Features > Resources > Reading Resources
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-read-request-003
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 assigns resources/read to the client-to-server request direction. Moonweave retains the authenticated client or actor reference as requester_ref without claiming it is a wire payload member.
    locator: Server Features > Resources > Protocol Messages > Reading Resources; Architecture > Client-server roles
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-read-request-004
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 resources/read sends a concrete URI in params and receives resource contents. The case records both the inherited invocation identity/specification reference and the protocol-correlated read-request identity, plus an argument digest, exact normalized URI, requesting actor, and occurrence time without folding them into the resource definition.
    locator: Server Features > Resources > Protocol Messages > Reading Resources > request params.uri and response contents
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-read-request-005
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 defines resources/list as discovery and resources/read as a separate request. A URI appearing in the list therefore does not establish a ResourceReadRequest occurrence.
    locator: Server Features > Resources > Protocol Messages > Listing Resources and Reading Resources
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-read-request-006
    source: eng-proto-mcp-resources-2025-06-18
    supports: MCP defines resources/read as a URI-addressed request returning one or more resource-content records. The ResourceReadRequest-is_a-Invocation positive case applies the documented distinction to the concrete endpoints and direction described here.
    locator: Server Features > Resources > Reading Resources; Resource Contents
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-resource-read-request-007
    source: eng-proto-mcp-resources-2025-06-18
    supports: MCP defines resources/read as a URI-addressed request returning one or more resource-content records. The ResourceReadRequest-is_a-Invocation boundary case applies the documented distinction to the concrete endpoints and direction described here.
    locator: Server Features > Resources > Reading Resources; Resource Contents
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-resource-read-request-008
    source: eng-proto-mcp-resources-2025-06-18
    supports: MCP defines resources/read as a URI-addressed request returning one or more resource-content records. Moonweave uses that primary evidence to justify ResourceReadRequest —is_a→ Invocation with the reviewed direction and boundary.
    locator: Server Features > Resources > Reading Resources; Resource Contents
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-resource-read-request-009
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 resources/read returns contents on success and uses JSON-RPC errors for invalid or inaccessible resource requests; Moonweave asserts ResourceReadResult only for the successful result path.
    locator: Server Features > Resources > Protocol Messages > Reading Resources; Error Handling
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-read-request-010
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 correlates the JSON-RPC response to one request ID and repeats the resource URI on every returned content item. Moonweave preserves both correlation dimensions on the generic result edge.
    locator: Schema Reference > ReadResourceRequest.id and ReadResourceResult.contents; Server Features > Resources > Reading Resources
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-read-request-011
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 shows one resources/read request and its correlated result.contents. resource-read-088 and resource-result-088 share the request correlation and exact URI, so the reviewed produces edge is valid.
    locator: Server Features > Resources > Protocol Messages > Reading Resources request and response; Data Types > Resource Contents
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-read-request-012
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 separates resources/list descriptions from resources/read contents. A list entry is discoverability metadata, not a successful read result, so no produces edge is asserted.
    locator: Server Features > Resources > Protocol Messages > Listing Resources versus Reading Resources
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-resource-read-request-013
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 defines a resources/read request with params.uri and a correlated successful result with contents whose members carry URI and text or blob. Moonweave uses the request ID and exact URI together to justify ResourceReadRequest —produces→ ResourceReadResult.
    locator: Server Features > Resources > Protocol Messages > Reading Resources; Data Types > Resource Contents, Text Content and Binary Content
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
