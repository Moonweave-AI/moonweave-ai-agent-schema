schema: moonweave.ai/ontology-node/v1
id: PromptInstantiation
kind: concept
status: accepted
labels:
  zh: 提示实例化
  en: prompt instantiation
  ja: プロンプト具体化
semantics:
  short_definition:
    zh: 响应一次提示获取调用，选择提示定义、校验并绑定参数并形成已绑定提示实例的执行活动。
    en: An execution activity that answers one prompt-get invocation by selecting a definition, validating and binding arguments, and forming a bound prompt instance.
    ja: 一回の prompt-get invocation に応答し、prompt definition を選択して argument を検証・束縛し、bound prompt instance を形成する execution activity。
  definition:
    zh: 提示实例化是一种调用执行活动：它由一次 PromptGetRequest 触发，解析 PromptDefinition 或 PromptTemplate 的确定版本，校验并绑定参数，并产生可由提示与指令域保存的 PromptTemplateInstance；MCP `prompts/get` 是该过程的协议实现之一，而不是该活动的所有者。
    en: Prompt instantiation is an invocation-execution activity triggered by one PromptGetRequest. It resolves a determinate PromptDefinition or PromptTemplate version, validates and binds arguments, and produces a PromptTemplateInstance owned by prompts and instructions. MCP prompts/get is one protocol realization of the process, not the owner of the activity.
    ja: prompt instantiation は一回の PromptGetRequest が起動する invocation-execution activity です。PromptDefinition/PromptTemplate の確定 version を解決し argument を検証・束縛して、prompt/instruction domain が所有する PromptTemplateInstance を生成します。MCP `prompts/get` はこの process の一 protocol implementation であり activity owner ではありません。
  why_needed:
    zh: 独立活动节点把 PromptGetRequest→参数绑定活动→PromptTemplateInstance 的因果链外显出来，使同一模板的多次执行可分别追踪输入、结果与失败，同时不复制提示规范或消息节点。
    en: A distinct activity exposes the causal chain PromptGetRequest → binding execution → PromptTemplateInstance, so repeated executions of one template can track inputs, results, and failures separately without copying prompt specifications or message nodes.
    ja: 独立 activity が PromptGetRequest → binding execution → PromptTemplateInstance の因果 chain を外显し、prompt specification/message node を複製せず同一 template の複数 execution を input・result・failure ごとに追跡できます。
  includes:
    - zh: 纳入一次提示获取调用中解析确定定义版本、校验完整参数绑定并产生 PromptTemplateInstance 的执行活动，包括 MCP `prompts/get` 和具有同等过程身份的 SDK 调用。
      en: Includes an execution activity that resolves a determinate definition version, validates complete bindings, and produces a PromptTemplateInstance for one prompt-get invocation, including MCP prompts/get and SDK calls with the same process identity.
      ja: 一回の prompt-get invocation で確定 definition version を解決し、complete binding を検証して PromptTemplateInstance を生成する execution activity（MCP `prompts/get` と同じ process identity の SDK call を含む）を含みます。
  excludes:
    - zh: 排除提示发现列表、PromptDefinition/PromptTemplate 规范本身、作为绑定结果的信息对象 PromptTemplateInstance、未经参数处理的静态 Message，以及模型后续推理。
      en: Excludes prompt discovery lists, PromptDefinition or PromptTemplate specifications themselves, the resulting information object PromptTemplateInstance, static Messages without argument processing, and later model inference.
      ja: prompt discovery list・PromptDefinition/PromptTemplate specification 自体・binding result information object の PromptTemplateInstance・argument 処理のない static Message・後続 model inference を除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - prompt_instantiation_id
  fields:
    - id: prompt_instantiation_id
      labels:
        zh: 提示实例化标识
        en: prompt instantiation ID
        ja: prompt instantiation ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次参数绑定与提示消息产出的执行发生，不与提示定义或结果实例共用身份。
        en: Stably identifies one execution occurrence of argument binding and prompt-message production, without sharing identity with the prompt definition or result instance.
        ja: argument binding と prompt-message production の一 execution occurrence を安定識別し、prompt definition/result instance と identity を共有しません。
      allowed_values: []
      pattern: ^prompt-instantiation:[A-Za-z0-9._:-]+$
      example_value: prompt-instantiation:release-summary:20260716-01
      source_claims:
        - claim-prompt-instantiation-002
    - id: prompt_get_request_id
      labels:
        zh: 提示获取请求标识
        en: prompt-get request ID
        ja: prompt-get request ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识触发本次实例化的唯一 PromptGetRequest，使活动能够回溯到其请求而不把两者合并为同一节点。
        en: Identifies the one PromptGetRequest that triggered this instantiation, preserving traceability without collapsing request and activity into one node.
        ja: この instantiation を起動した一 PromptGetRequest を識別し、request と activity を一 node に統合せず traceability を保持します。
      allowed_values: []
      pattern: ^prompt-get-request:[A-Za-z0-9._:-]+$
      example_value: prompt-get-request:release-summary:20260716-01
      source_claims:
        - claim-prompt-instantiation-003
    - id: prompt_definition_ref
      labels:
        zh: 提示定义引用
        en: prompt-definition reference
        ja: prompt definition 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向本次活动实际解析的确定 PromptDefinition 版本，不以协议方法名代替定义身份。
        en: References the exact PromptDefinition version resolved by this activity rather than substituting a protocol method name for definition identity.
        ja: protocol method 名を definition identity の代わりにせず、この activity が解決した確定 PromptDefinition version を参照します。
      allowed_values: []
      pattern: null
      example_value: prompt-def:release-summary@4
      source_claims:
        - claim-prompt-instantiation-004
    - id: argument_bindings
      labels:
        zh: 参数绑定
        en: argument bindings
        ja: 引数束縛
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存已经通过 PromptDefinition 参数声明校验并用于本次实例化的名称—值绑定。
        en: Stores the name-value bindings validated against the PromptDefinition argument declarations and used for this instantiation.
        ja: PromptDefinition argument declaration に対して検証され、この instantiation に使われた name-value bindings を保存します。
      allowed_values: []
      pattern: null
      example_value:
        from: v2.3.0
        to: v2.4.0
      source_claims:
        - claim-prompt-instantiation-005
    - id: output_message_count
      labels:
        zh: 输出消息数量
        en: output message count
        ja: 出力 message 数
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录本次实例化产生并由 PromptTemplateInstance 承载的角色化消息数量。
        en: Records the number of role-tagged messages produced by this instantiation and carried by its PromptTemplateInstance.
        ja: この instantiation が生成し PromptTemplateInstance が保持する role-tagged messages の数を記録します。
      allowed_values: []
      pattern: null
      example_value: 2
      source_claims:
        - claim-prompt-instantiation-006
  constraints: []
  required_relation_constraints: []
examples:
  - id: prompt-instantiation-positive-release-summary
    kind: positive
    labels:
      zh: 实例化发布摘要提示
      en: Instantiate a release-summary prompt
      ja: release-summary prompt を instance 化
    scenario_id: null
    descriptions:
      zh: 客户端请求 `prompts/get`，名称为 `release-summary`，参数为 `from=v2.3.0`、`to=v2.4.0`；服务器找到相应定义、绑定两个参数并生成 system/user 两条消息。
      en: A client requests `prompts/get` for `release-summary` with `from=v2.3.0` and `to=v2.4.0`; the server resolves the definition, binds both arguments, and produces system and user messages.
      ja: client が `release-summary` に対して `from=v2.3.0`、`to=v2.4.0` を付け `prompts/get` を要求し、server が定義を解決して二 argument を束縛し、system/user message を生成します。
    field_values:
      prompt_instantiation_id: prompt-instantiation:release-summary:20260716-01
      prompt_get_request_id: prompt-get-request:release-summary:20260716-01
      prompt_definition_ref: prompt-def:release-summary@4
      argument_bindings:
        from: v2.3.0
        to: v2.4.0
      output_message_count: 2
    related_node_ids:
      - PromptInstantiation
      - PromptDefinition
      - PromptTemplateInstance
    related_relation_ids:
      - PromptInstantiation-instantiates-PromptDefinition
      - PromptInstantiation-produces-PromptTemplateInstance
    expected_result:
      zh: 创建一次 PromptInstantiation，并把模板、参数和两条输出消息关联到该活动。
      en: One PromptInstantiation is created, linking the template, arguments, and two output messages to the activity.
      ja: 一つの PromptInstantiation を作り、template・argument・二 output message を activity に関連付けます。
    why_valid_or_invalid:
      zh: 存在按名称选定义、参数绑定和消息生成三个完整步骤。
      en: "All three defining steps are present: definition selection by name, argument binding, and message production."
      ja: name による definition selection、argument binding、message production の三 defining step が揃っています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-prompt-instantiation-001
  - id: prompt-instantiation-boundary-listing-only
    kind: boundary
    labels:
      zh: 只列举提示不构成实例化
      en: Listing prompts alone is not instantiation
      ja: prompt 一覧だけでは instantiation にならない
    scenario_id: null
    descriptions:
      zh: 服务器响应 `prompts/list`，列出 `release-summary` 的名称和两个参数定义，但没有收到参数、没有展开模板，也没有生成消息；这里只形成 MCPPromptList。
      en: A server answers `prompts/list` with the name `release-summary` and two argument definitions, but receives no argument values, expands no template, and produces no messages; only MCPPromptList is formed.
      ja: server が `prompts/list` に `release-summary` の name と二 argument 定義を返しますが、argument value を受けず template 展開も message 生成もしません。ここでは MCPPromptList だけが形成されます。
    field_values:
      prompt_instantiation_id: null
      prompt_get_request_id: null
      method: prompts/list
      argument_definitions: 2
      bound_arguments: 0
      message_count: 0
    related_node_ids:
      - PromptInstantiation
      - MCPPromptList
      - PromptDefinition
    related_relation_ids:
      - PromptInstantiation-instantiates-PromptDefinition
    expected_result:
      zh: 不创建 PromptInstantiation，保留发现页和静态定义。
      en: No PromptInstantiation is created; the discovery page and static definition are retained.
      ja: PromptInstantiation を作らず、discovery page と static definition を保持します。
    why_valid_or_invalid:
      zh: 列举只公开定义元数据，缺少实例化所需的参数绑定与消息产出。
      en: Listing exposes definition metadata only and lacks the argument binding and message production required for instantiation.
      ja: listing は definition metadata のみ公開し、instantiation に必要な argument binding と message production がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-prompt-instantiation-001
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: PromptGetRequest-produces-PromptInstantiation
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 产生
    en: produces
    ja: 生成する
  definitions:
    zh: PromptGetRequest 通过 produces 指向使用其参数生成的 PromptInstantiation；提示定义与实例化结果继续由各自 owner 保持。
    en: PromptGetRequest produces the PromptInstantiation generated from its arguments while definition and instantiation remain owned by their respective modules.
    ja: PromptGetRequest が arguments から生成した PromptInstantiation を produces し definition/instantiation は respective owner を保持します。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：产生
      en: "inverse: produces"
      ja: 逆：生成する
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: PromptGetRequest-produces-PromptInstantiation-example-positive-manual-001
      kind: positive
      labels:
        zh: PromptGetRequest-produces-PromptInstantiation 正例
        en: PromptGetRequest-produces-PromptInstantiation positive case
        ja: PromptGetRequest-produces-PromptInstantiation 正例
      scenario_id: null
      descriptions:
        zh: prompt-get-031 使用 language=zh 产生一份已填充消息的 PromptInstantiation。
        en: prompt-get-031 with language=zh produces one PromptInstantiation with filled messages.
        ja: prompt-get-031 が language=zh で filled messages の PromptInstantiation を produces します。
      field_values: {}
      related_node_ids:
        - PromptGetRequest
        - PromptInstantiation
      related_relation_ids:
        - PromptGetRequest-produces-PromptInstantiation
      expected_result:
        zh: 建立 PromptGetRequest —produces→ PromptInstantiation，并保持规范方向。
        en: Assert PromptGetRequest —produces→ PromptInstantiation in the reviewed direction.
        ja: PromptGetRequest —produces→ PromptInstantiation を reviewed direction で成立させます。
      why_valid_or_invalid:
        zh: 正例同时满足两个端点身份和该谓词的成立条件。
        en: The positive case satisfies both endpoint identities and the predicate's conditions.
        ja: positive case は両 endpoint identity と predicate condition を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-prompt-instantiation-007
    - id: PromptGetRequest-produces-PromptInstantiation-example-boundary-manual-001
      kind: boundary
      labels:
        zh: PromptGetRequest-produces-PromptInstantiation 边界例
        en: PromptGetRequest-produces-PromptInstantiation boundary case
        ja: PromptGetRequest-produces-PromptInstantiation 境界例
      scenario_id: null
      descriptions:
        zh: PromptDefinition 是可复用定义，不是某次 get 请求产生的实例化结果。
        en: PromptDefinition is reusable and is not an instantiation result produced by one get request.
        ja: PromptDefinition は reusable で one get request が produce する instantiation result ではありません。
      field_values: {}
      related_node_ids:
        - PromptGetRequest
        - PromptInstantiation
      related_relation_ids:
        - PromptGetRequest-produces-PromptInstantiation
      expected_result:
        zh: 不建立该边；边界例缺少 produces 所要求的事实。
        en: Do not assert the edge because the boundary case lacks the fact required by produces.
        ja: boundary case は produces required fact がなく edge を成立させません。
      why_valid_or_invalid:
        zh: 端点共现、类型相近或时间相邻都不足以推断该关系。
        en: Endpoint co-occurrence, similar types, or temporal proximity alone cannot infer this relation.
        ja: endpoint co-occurrence・similar type・temporal proximity だけでは relation を推論できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-prompt-instantiation-008
  source_claims:
    - claim-prompt-instantiation-009
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations:
  - id: PromptInstantiation-instantiates-PromptDefinition
    predicate: instantiates
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: PromptInstantiation实例化PromptDefinition
      en: PromptInstantiation instantiates PromptDefinition
      ja: PromptInstantiationがPromptDefinitionを具体化する
    definitions:
      zh: PromptInstantiation 解析并实例化一个确定版本的 PromptDefinition，按其参数合同校验完整绑定并生成具体消息；定义保留可复用规范身份，活动保留本次绑定身份，生成消息不是另一项定义。MCP `prompts/get` 是该事实的一种协议实现。
      en: PromptInstantiation resolves and instantiates one determinate PromptDefinition version, validates complete bindings against its argument contract, and produces concrete messages. The definition retains reusable specification identity, the activity retains this binding occurrence, and generated messages are not another definition. MCP `prompts/get` is one protocol realization of this fact.
      ja: PromptInstantiation は確定版 PromptDefinition 一件を解決・instance 化し、その argument contract に対して完全 binding を検証して concrete message を生成します。definition は reusable specification identity、activity は今回の binding occurrence を保持し、generated message は別 definition ではありません。MCP `prompts/get` はこの fact の一 protocol realization です。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该边记录满足协议前提的可查询事实；规范没有为所有实现规定一项统一本体基数。
      en: The edge records a queryable fact when its protocol preconditions hold; the specification does not impose one ontology cardinality across all implementations.
      ja: protocol prerequisite 成立時の照会可能 fact を記録し、specification は全 implementation に単一 ontology cardinality を課しません。
    inverse_reading:
      predicate: is_instantiated_by
      labels:
        zh: PromptDefinition反向关联PromptInstantiation
        en: PromptDefinition is the inverse target of PromptInstantiation
        ja: PromptDefinitionからPromptInstantiationへの逆読解
    conditions: []
    temporal_scope: timeless
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: PromptInstantiation 由调用执行本体拥有，PromptDefinition 由注册表定义本体拥有；此跨域边只记录本次活动实例化哪一项确定定义，不转移定义权或授权。
        en: PromptInstantiation belongs to invocation execution and PromptDefinition belongs to registry definition; this cross-domain edge records only which determinate definition the activity instantiates and transfers neither definitional ownership nor authorization.
        ja: PromptInstantiation は invocation execution、PromptDefinition は registry definition が所有します。この cross-domain edge は activity がどの確定 definition を instance 化したかだけを記録し、定義所有権や認可を移転しません。
      protocol_or_resource_context:
        zh: 请求中的定义引用解析到一个确定版本，参数绑定满足该版本的 required 声明；对 MCP 实现而言，对应 prompts/get 的已发现 name。
        en: The request's definition reference resolves to one determinate version and its bindings satisfy that version's required declarations; for MCP realizations this corresponds to a discovered prompts/get name.
        ja: request の definition reference は確定 version 一件へ解決し binding はその required declaration を満たします。MCP realization では discovered prompts/get name に対応します。
    constraints: []
    examples:
      - id: PromptInstantiation-instantiates-PromptDefinition-example-positive-001
        kind: positive
        labels:
          zh: PromptInstantiation-instantiates-PromptDefinition 正例
          en: Positive case for PromptInstantiation-instantiates-PromptDefinition
          ja: PromptInstantiation-instantiates-PromptDefinition の正例
        scenario_id: null
        descriptions:
          zh: review-code 定义以 language=typescript 实例化并生成 user 消息。
          en: The review-code definition is instantiated with language=typescript and produces a user message.
          ja: review-code definition を language=typescript で instantiate し user message を生成します。
        field_values: {}
        related_node_ids:
          - PromptInstantiation
          - PromptDefinition
        related_relation_ids:
          - PromptInstantiation-instantiates-PromptDefinition
        expected_result:
          zh: 建立 PromptInstantiation-instantiates-PromptDefinition，并保留所述协议方向与条件。
          en: Assert PromptInstantiation-instantiates-PromptDefinition with the stated protocol direction and conditions.
          ja: PromptInstantiation-instantiates-PromptDefinition を stated protocol direction/condition 付きで確立します。
        why_valid_or_invalid:
          zh: prompts/get name 解析到该定义，参数通过其合同，成功结果返回该定义生成的 messages。
          en: The prompts/get name resolves to the definition, arguments pass its contract, and the success result returns messages generated from it.
          ja: prompts/get name が definition に解決し arguments が contract を満たして success result が generated messages を返します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-prompt-instantiation-010
      - id: PromptInstantiation-instantiates-PromptDefinition-example-boundary-001
        kind: boundary
        labels:
          zh: PromptInstantiation-instantiates-PromptDefinition 边界例
          en: Boundary case for PromptInstantiation-instantiates-PromptDefinition
          ja: PromptInstantiation-instantiates-PromptDefinition の境界例
        scenario_id: null
        descriptions:
          zh: prompts/list 仅返回 review-code 的名称与参数说明。
          en: prompts/list only returns the review-code name and argument description.
          ja: prompts/list は review-code name/argument description のみ返します。
        field_values: {}
        related_node_ids:
          - PromptInstantiation
          - PromptDefinition
        related_relation_ids:
          - PromptInstantiation-instantiates-PromptDefinition
        expected_result:
          zh: 不得建立 PromptInstantiation-instantiates-PromptDefinition；保留实际出现的较宽或相邻事实。
          en: Do not assert PromptInstantiation-instantiates-PromptDefinition; retain the broader or adjacent fact actually present.
          ja: PromptInstantiation-instantiates-PromptDefinition を確立せず、実際の broader/adjacent fact を保持します。
        why_valid_or_invalid:
          zh: 列表发现没有执行参数绑定或生成消息，尚未发生实例化。
          en: List discovery performs neither argument binding nor message generation, so no instantiation occurred.
          ja: list discovery は argument binding/message generation を行わず instantiation は未発生です。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-prompt-instantiation-010
    source_claims:
      - claim-prompt-instantiation-010
    distinct_fact_rationale:
      zh: 该边记录一次绑定活动实例化一个已解析 PromptDefinition 版本的跨域事实；它不同于请求触发活动、活动产出绑定结果，也不是按名称共现生成的关系。
      en: This edge records the cross-domain fact that one binding activity instantiates a resolved PromptDefinition version. It is distinct from the request triggering the activity, the activity producing its bound result, or any relation inferred from name co-occurrence.
      ja: この edge は一 binding activity が resolved PromptDefinition version を instance 化する cross-domain fact を記録します。request が activity を起動する事実、activity が bound result を生成する事実、name 共起から推定する relation とは異なります。
    layout_role: cross-link
    review_status: accepted
    target: concept:PromptDefinition
  - id: PromptInstantiation-produces-PromptTemplateInstance
    predicate: produces
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 提示实例化产出提示模板实例
      en: prompt instantiation produces prompt template instance
      ja: prompt instantiation が prompt template instance を生成する
    definitions:
