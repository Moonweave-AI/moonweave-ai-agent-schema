        en: prompt arguments
        ja: prompt 引数
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存用于实例化提示定义的具体参数。
        en: Stores concrete arguments used to instantiate the prompt definition.
        ja: prompt definition 具体化に使う concrete arguments を保存します。
      allowed_values: []
      pattern: null
      example_value:
        language: zh
      source_claims:
        - claim-prompt-get-request-003
  constraints: []
  required_relation_constraints: []
