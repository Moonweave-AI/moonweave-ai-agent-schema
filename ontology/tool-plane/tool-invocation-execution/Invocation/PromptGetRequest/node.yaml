schema: moonweave.ai/ontology-node/v1
id: PromptGetRequest
kind: concept
status: accepted
labels:
  zh: 提示获取调用
  en: Prompt Get Invocation
  ja: プロンプト取得呼び出し
semantics:
  short_definition:
    zh: 提示获取调用是按提示定义名称与参数请求一次提示实例化的一种调用。
    en: A Prompt Get Invocation is an Invocation requesting one prompt instantiation by prompt-definition name and arguments.
    ja: プロンプト取得呼び出しは prompt definition name と arguments で一 prompt instantiation を要求する Invocation です。
  definition:
    zh: 提示获取调用是一种 Invocation，沿用 invocation_id 与请求时刻，并以 PromptDefinition 引用和参数为种差；它对应 prompts/get 的发生，并产生 PromptInstantiation，但不是可复用 PromptDefinition 或实例化后的消息内容。
    en: A Prompt Get Invocation is an Invocation that retains its invocation_id and request time and is differentiated by a PromptDefinition reference and arguments. It represents a prompts/get occurrence and produces a PromptInstantiation, but is neither the reusable PromptDefinition nor the instantiated message content.
    ja: プロンプト取得呼び出しは Invocation の invocation_id と request time を継承し、PromptDefinition reference と arguments を種差とします。prompts/get occurrence を表して PromptInstantiation を生成しますが reusable definition/message content ではありません。
  why_needed:
    zh: 独立调用节点可把提示定义、请求参数和实例化结果分开，并与 MCP 传输请求保持映射而不混成同一对象。
    en: The distinct invocation node separates prompt definition, request arguments, and instantiation result while mapping to MCP transport without merging them.
    ja: distinct invocation node が prompt definition・request arguments・instantiation result を分離し MCP transport と mapping しても merge しません。
  includes:
    - zh: 纳入具有请求标识、提示定义引用和具体参数的 prompts/get 调用。
      en: Includes prompts/get invocations with a request ID, prompt-definition reference, and concrete arguments.
      ja: request ID・prompt-definition reference・concrete arguments を持つ prompts/get invocation を含みます。
  excludes:
    - zh: 排除 prompts/list 发现、PromptDefinition、PromptTemplate 和已生成的 PromptInstantiation。
      en: Excludes prompts/list discovery, PromptDefinition, PromptTemplate, and the produced PromptInstantiation.
      ja: prompts/list discovery・PromptDefinition・PromptTemplate・produced PromptInstantiation を除きます。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: prompt_definition_ref
      labels:
        zh: 提示定义引用
        en: prompt-definition reference
        ja: prompt definition 参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次请求选择的 PromptDefinition。
        en: Fixes the PromptDefinition selected by this request.
        ja: request が選択した PromptDefinition を固定します。
      allowed_values: []
      pattern: null
