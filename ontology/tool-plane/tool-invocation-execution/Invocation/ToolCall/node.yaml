schema: moonweave.ai/ontology-node/v1
id: ToolCall
kind: concept
status: accepted
labels:
  zh: 工具调用
  en: Tool Call
  ja: ツール呼び出し
semantics:
  short_definition:
    zh: 工具调用是以已解析工具定义、具名操作和结构化实参为种差的一种调用。
    en: A Tool Call is an Invocation differentiated by a resolved tool definition, named operation, and structured arguments.
    ja: ツール呼び出しは resolved tool definition・named operation・structured arguments を種差とする Invocation です。
  definition:
    zh: 工具调用是一种 Invocation，沿用该调用的 invocation_id；call_id 仅作为模型或协议结果相关键，所选 ToolDefinition 版本、操作名和规范化实参构成工具调用种差，请求时刻从 Invocation 继承。它请求工具执行并统摄 ToolCallAttempt，但不等同于 ToolDefinition、候选选择、任一尝试或 ToolResult。幂等键只约束安全重放，不把重试合并为同一次尝试。
    en: A Tool Call is an Invocation that retains the invocation_id. Its call_id is only an external model or protocol correlation key, while the selected ToolDefinition revision, operation name, and normalized arguments form the tool-call differentia; request time is inherited from Invocation. It requests tool execution and contains ToolCallAttempts but is not the ToolDefinition, candidate selection, one attempt, or ToolResult. An idempotency key constrains safe replay without merging retries into one attempt.
    ja: ツール呼び出しは Invocation の invocation_id を継承します。call_id は model/protocol の外部相関キーにすぎず、selected ToolDefinition revision・operation name・normalized arguments が種差を成し、request time は Invocation から継承します。ToolCallAttempt を含みますが definition・selection・attempt・ToolResult ではありません。idempotency key は safe replay を制約し retry を一 attempt に統合しません。
  why_needed:
    zh: 工具调用层把稳定定义、具体实参、独立尝试和返回结果分开，能够准确关联 call_id 与每个结果。
    en: The tool-call layer separates stable definition, concrete arguments, independent attempts, and returned results, allowing exact call_id correlation.
    ja: tool-call layer は stable definition・concrete arguments・independent attempts・returned results を分け正確な call_id correlation を可能にします。
  includes:
    - zh: 纳入已解析唯一工具定义版本、具名操作并固定结构化实参的工具调用活动。
      en: Includes tool-call activities with one resolved tool-definition version, a named operation, and fixed structured arguments.
      ja: 一 resolved tool-definition version・named operation・fixed structured arguments を持つ tool-call activity を含みます。
  excludes:
    - zh: 排除工具定义、搜索候选、调用计划、工具调用尝试和返回内容。
      en: Excludes a tool definition, search candidate, call plan, tool-call attempt, and returned content.
      ja: tool definition・search candidate・call plan・tool-call attempt・returned content を除きます。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
