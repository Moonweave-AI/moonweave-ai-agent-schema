      labels:
        zh: 调用标识
        en: call ID
        ja: call ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 用于把模型产生的工具调用与对应 ToolResult 精确关联。
        en: Correlates the model-produced tool call with its exact ToolResult.
        ja: model-produced tool call と exact ToolResult を相関します。
      allowed_values: []
      pattern: null
      example_value: call_weather_0042
      source_claims:
        - claim-tool-call-004
        - claim-tool-call-005
        - claim-tool-call-006
    - id: tool_definition_ref
      labels:
        zh: 工具定义引用
        en: tool-definition reference
        ja: tool definition 参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次调用解析到的工具定义版本。
        en: Fixes the tool-definition version resolved for this call.
        ja: この call で解決した tool-definition version を固定します。
      allowed_values: []
      pattern: null
      example_value: tool-def:weather@3
      source_claims:
        - claim-tool-call-007
        - claim-tool-call-008
        - claim-tool-call-009
    - id: operation_name
      labels:
        zh: 操作名称
        en: operation name
        ja: 操作名
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录被调用的工具操作名称；在 MCP tools/call 中对应 params.name，在 OpenAI function calling 中对应 function name。
        en: Records the named tool operation being invoked; maps to MCP tools/call params.name and OpenAI function-calling function name.
        ja: 呼び出す named tool operation を記録します。MCP tools/call params.name と OpenAI function-calling function name に対応します。
      allowed_values: []
      pattern: null
      example_value: get_weather
      source_claims:
        - claim-tool-call-010
        - claim-tool-call-011
        - claim-tool-call-012
    - id: arguments
      labels:
        zh: 结构化实参
        en: structured arguments
        ja: 構造化実引数
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存按所选输入 Schema 校验后的实参。
        en: Stores arguments validated against the selected input schema.
        ja: selected input schema で検証した arguments を保存します。
      allowed_values: []
      pattern: null
      example_value:
        city: Hangzhou
      source_claims:
        - claim-tool-call-013
        - claim-tool-call-014
        - claim-tool-call-015
    - id: idempotency_key
      labels:
        zh: 幂等键
        en: idempotency key
        ja: 冪等 key
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 在支持幂等的外部写操作中关联安全重放，但不取代 attempt_id。
        en: Correlates safe replays for supported external mutations without replacing attempt_id.
        ja: supported external mutation の safe replay を相関し attempt_id は置換しません。
      allowed_values: []
      pattern: null
      example_value: weather-0042
      source_claims:
        - claim-tool-call-016
        - claim-tool-call-017
        - claim-tool-call-018
