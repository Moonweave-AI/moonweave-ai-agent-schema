schema: moonweave.ai/ontology-node/v1
id: ToolCall
kind: concept
labels: {zh: 工具调用活动, en: Tool-call activity, ja: ツール呼出し活動}
semantics:
  short_definition: {zh: 使用注册工具执行外部工作的本地 Invocation 活动, en: A local Invocation activity that executes work through a registered tool, ja: 登録済みツールで外部作業を実行するローカル Invocation 活動}
  definition:
    zh: >-
      ToolCall 是 Moonweave Invocation 的子类，即通过命名工具派发工作的有界本地活动。它具有来源表面并引用原生载荷，但不是 MCP tools/call JSON-RPC 封包、OpenAI Responses function_call item 或 OpenAI remote-MCP mcp_call item。
    en: >
      A ToolCall is a Moonweave Invocation subtype: a bounded local activity that dispatches work
      through a named tool. It has a source surface and references a native payload, but it is not
      itself an MCP tools/call JSON-RPC envelope, an OpenAI Responses function_call item, or an
      OpenAI remote-MCP mcp_call item.
    ja: >-
      ToolCall は名前付き tool を通じて作業を配信する境界付きローカル活動であり、Moonweave Invocation の subtype である。source surface を持ち native payload を参照するが、MCP tools/call JSON-RPC envelope、OpenAI Responses function_call item、OpenAI remote-MCP mcp_call item そのものではない。
  why_needed:
    zh: >-
      主机必须审计工具执行，同时保留每种 API 的实际契约。MCP 使用 JSON-RPC 的 name 和 arguments，Responses function_call 使用 call_id、name 和 JSON arguments，remote MCP 使用 Responses mcp_call item；一个本地活动可关联它们，而不虚假统一其 wire schema。
    en: >
      A host must audit tool execution while preserving each API's actual contract. MCP uses
      JSON-RPC name and arguments; Responses function_call uses call_id, name, and JSON arguments;
      remote MCP uses a Responses mcp_call item. One local activity can correlate these without
      falsely unifying their wire schemas.
    ja: >-
      ホストは各 API の実際の contract を保持しつつ tool 実行を監査する必要がある。MCP は JSON-RPC の name と arguments、Responses function_call は call_id、name、JSON arguments、remote MCP は Responses mcp_call item を使う。一つのローカル活動はそれらを相関できるが、wire schema を虚偽に統一しない。
  includes:
    - {zh: 本地调用标识、工具名称、来源表面、参数引用和原生调用引用, en: "Local call ID, tool name, source surface, arguments reference, and native-call reference", ja: ローカル呼出し ID、ツール名、ソース表面、引数参照、ネイティブ呼出し参照}
  excludes:
    - {zh: 原生 MCP、Responses 或 A2A wire 对象本身, en: "Native MCP, Responses, or A2A wire objects themselves", ja: ネイティブ MCP、Responses、A2A wire オブジェクト自体}
    - {zh: 未经工具适配器的原始 shell 文本, en: Raw shell text without a tool adapter, ja: ツール adapter を介さない生の shell テキスト}
  semantic_kind: activity
  aliases:
    - {language: en, value: local tool invocation, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      原生 MCP 派发是带 name 和 arguments 的 JSON-RPC tools/call；Responses 函数决策则以 function_call item 出现，远程 MCP 结果使用不同的 Responses mcp_call item。ToolCall 只保留其中一种原生形状的引用，绝不把它们改写为共享载荷。
    en: >
      Native MCP dispatch is {"jsonrpc":"2.0","id":2,"method":"tools/call",
      "params":{"name":"get_weather","arguments":{"location":"New York"}}}. A Responses function
      decision instead appears as {"type":"function_call","call_id":"call_12345xyz",
      "name":"get_weather","arguments":"{\"location\":\"New York\"}"}. Remote-MCP outcomes use a
      distinct Responses mcp_call item. A ToolCall retains a reference to exactly one of these
      native shapes and never rewrites it as a common payload.
    ja: >-
      ネイティブ MCP 配信は name と arguments を持つ JSON-RPC tools/call である。Responses の function decision は function_call item として現れ、remote MCP の結果は別の Responses mcp_call item を使う。ToolCall はこれらのうち一つの native shape への参照だけを保持し、共通 payload に書き換えない。
  typical_input:
    - description: Native MCP tools/call request.
      format: '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"get_weather","arguments":{"location":"New York"}}}'
      source_claims: [mcp-tools-call]
    - description: OpenAI Responses function_call item.
      format: '{"type":"function_call","call_id":"call_12345xyz","name":"get_weather","arguments":"{\\"location\\":\\"New York\\"}"}'
      source_claims: [openai-function-call]
  typical_output:
    - description: Local ToolCall activity record.
      format: '{"local_tool_call_id":"tool-call-42","local_source_surface":"mcp_jsonrpc","local_tool_name":"get_weather","local_native_call_ref":"mcp-session-42#id-2"}'
      source_claims: [moonweave-tool-call]
  reference_implementations:
    - name: Model Context Protocol Tools specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines native tools/call.
    - name: OpenAI Function Calling guide
      url: https://developers.openai.com/api/docs/guides/function-calling
      description: Defines Responses function_call items.
structure:
  identity_keys: [local_tool_call_id]
  fields:
    - id: local_tool_call_id
      labels: {zh: 本地工具调用标识, en: Local tool-call ID, ja: ローカルツール呼出し ID}
      definitions: {zh: 主机分配给该工具调用活动的稳定标识, en: Stable identifier assigned by the host to this tool-call activity, ja: このツール呼出し活動にホストが割り当てる安定識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: tool-call-42
      allowed_values: []
      source_claims: [moonweave-tool-call]
    - id: local_source_surface
      labels: {zh: 本地来源表面, en: Local source surface, ja: ローカルソース表面}
      definitions: {zh: 拥有原生调用契约的 API 或协议表面，不是原生 type 字段, en: API or protocol surface that owns the native call contract and not a native type field, ja: ネイティブ呼出し契約を所有する API またはプロトコル表面でありネイティブ type 項目ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp_jsonrpc
      allowed_values: [mcp_jsonrpc, openai_responses_function, openai_remote_mcp]
      source_claims: [mcp-tools-call, openai-function-call, openai-remote-mcp-call]
    - id: local_tool_name
      labels: {zh: 本地工具名称, en: Local tool name, ja: ローカルツール名}
      definitions: {zh: 从来源特定调用对象映射用于审计的工具名称, en: Tool name mapped from the source-specific call object for audit, ja: 監査用にソース固有呼出しオブジェクトから対応付けたツール名}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: get_weather
      allowed_values: []
      source_claims: [mcp-tools-call, openai-function-call, openai-remote-mcp-call]
    - id: local_arguments_ref
      labels: {zh: 本地参数引用, en: Local arguments reference, ja: ローカル引数参照}
      definitions: {zh: 指向保留的原生 arguments 值或受保护副本的本地引用, en: Local reference to retained native arguments value or protected copy, ja: 保持されたネイティブ arguments 値または保護された複写へのローカル参照}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: mcp-session-42#id-2/params/arguments
      allowed_values: []
      source_claims: [mcp-tools-call, openai-function-call, moonweave-tool-call]
    - id: local_native_call_ref
      labels: {zh: 原生调用引用, en: Native-call reference, ja: ネイティブ呼出し参照}
      definitions: {zh: 指向保留的 MCP JSON-RPC 对象或 OpenAI Responses item 的可审计引用, en: Auditable reference to a retained MCP JSON-RPC object or OpenAI Responses item, ja: 保持された MCP JSON-RPC オブジェクトまたは OpenAI Responses item への監査可能参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp-session-42#id-2
      allowed_values: []
      source_claims: [moonweave-tool-call]
    - id: local_approval_observation
      labels: {zh: 本地审批观察, en: Local approval observation, ja: ローカル承認観測}
      definitions: {zh: 主机对工具调用审批的局部观察，不替代来源协议的审批对象, en: Host-local observation of call approval and not a replacement for a source protocol approval object, ja: 呼出し承認に対するホストローカル観測でありソースプロトコル承認オブジェクトの置換ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: approved
      allowed_values: [not_required, pending, approved, denied]
      source_claims: [mcp-tools-call, openai-remote-mcp-call, moonweave-tool-call]
    - id: local_invocation_id
      labels: {zh: 本地调用标识, en: Local invocation ID, ja: ローカル呼び出し ID}
      definitions: {zh: 主机为一个本地执行活动分配的稳定标识, en: A stable identifier assigned by the host to one local execution activity, ja: 一つのローカル実行活動にホストが割り当てる安定識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: inv-42
      allowed_values: []
      source_claims: [moonweave-tool-call]
    - id: local_surface
      labels: {zh: 本地来源表面, en: Local source surface, ja: ローカルソース表面}
      definitions: {zh: 主机选择适配器时记录的来源类型，非原生协议字段, en: The source category recorded by the host for adapter selection; not a native protocol field, ja: ホストがアダプター選択に記録するソース分類でありネイティブプロトコル項目ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp_tools_call
      allowed_values: [mcp_tools_call, openai_responses_function, openai_responses_remote_mcp, a2a_send_message, local_command]
      source_claims: [moonweave-tool-call]
    - id: local_target_ref
      labels: {zh: 本地目标引用, en: Local target reference, ja: ローカル対象参照}
      definitions: {zh: 指向要执行目标的本地或已发现引用, en: A local or discovered reference to the target being executed, ja: 実行対象へのローカルまたは発見済み参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp:weather/get_weather
      allowed_values: []
      source_claims: [moonweave-tool-call]
    - id: local_lifecycle_state
      labels: {zh: 本地生命周期状态, en: Local lifecycle state, ja: ローカルライフサイクル状態}
      definitions: {zh: 主机对其本地追踪活动的状态，不重命名远程 TaskStatus, en: The host state of its local trace and not a renamed remote TaskStatus, ja: ホストによるローカル軌跡状態でありリモート TaskStatus の改名ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dispatched
      allowed_values: [planned, dispatched, completed, failed, cancelled]
      source_claims: [moonweave-tool-call]
  constraints:
    - id: tool-call-one-native-contract
      severity: error
      expression_language: plain
      expression: local_source_surface selects exactly one native call contract, and local_native_call_ref identifies a retained object conforming to that contract.
      explanation: {zh: local_source_surface 必须选择唯一原生调用契约，且引用必须指向符合该契约的保留对象, en: local_source_surface selects one native call contract and the reference identifies a retained object conforming to it, ja: local_source_surface は一つのネイティブ呼出し契約を選び参照はそれに適合する保持済みオブジェクトを示す}
      source_claims: [mcp-tools-call, openai-function-call, openai-remote-mcp-call, moonweave-tool-call]
    - id: tool-call-does-not-rewrite-wire-shape
      severity: error
      expression_language: plain
      expression: Local fields must not be added to native MCP or Responses objects and MCP name and arguments must not be claimed as a Responses function_call schema.
      explanation: {zh: 本地字段不得加入原生 MCP 或 Responses 对象；MCP name/arguments 不得冒充 Responses function_call schema, en: Local fields must not be added to native MCP or Responses objects and MCP name/arguments must not impersonate Responses function_call schema, ja: ローカル項目をネイティブ MCP または Responses オブジェクトに追加してはならず MCP name/arguments を Responses function_call schema と偽ってはならない}
      source_claims: [mcp-tools-call, openai-function-call, moonweave-tool-call]
    - id: tool-call-id-same-record-parent-identity
      severity: error
      expression_language: plain
      expression: "local_tool_call_id = local_invocation_id; both identify the same local Invocation record and inherited parent fields belong to that one record."
      explanation: {zh: "local_tool_call_id 与 local_invocation_id 标识同一条本地 Invocation 记录，继承的父字段属于该同一记录。", en: "The child and parent IDs are equal representations of one local record, not a link to a second parent record.", ja: "local_tool_call_id と local_invocation_id は同じローカル Invocation レコードを識別し、継承した親フィールドはその一つのレコードに属する。"}
      source_claims: [moonweave-tool-call]
  required_relations: []
examples:
  - id: tool-call-positive-mcp

    labels: {zh: MCP 天气工具调用, en: MCP weather tool call, ja: MCP 天気ツール呼出し}

    descriptions:
      zh: ReAct (Yao 2023) Action 步骤 Search[Paris hotels] 后，Anthropic Messages API 返回 content:[{type:"tool_use",id:"toolu_01A09q90qw90",name:"get_weather",input:{location:"Paris"}}]；主机记录本地 ToolCall 并关联原生载荷。
      en: After ReAct (Yao 2023) Action Search[Paris hotels], Anthropic Messages API returns content:[{type:"tool_use",id:"toolu_01A09q90qw90",name:"get_weather",input:{location:"Paris"}}]; host records local ToolCall correlated to native payload.
      ja: ReAct (Yao 2023) Action Search[Paris hotels] 後、Anthropic Messages API が content:[{type:"tool_use",id:"toolu_01A09q90qw90",name:"get_weather",input:{location:"Paris"}}] を返し、ホストがローカル ToolCall を記録。
    field_values: {local_tool_call_id: tool-call-42, local_source_surface: mcp_jsonrpc, local_tool_name: get_weather, local_arguments_ref: mcp-session-42#id-2/params/arguments, local_native_call_ref: mcp-session-42#id-2, local_approval_observation: approved}
    related_node_ids: [ToolCall, Invocation]
    related_relation_ids: [ToolCall-is_a-Invocation]

    source_claims: [mcp-tools-call, moonweave-tool-call]
  - id: tool-call-counterexample-mixed-contract

    labels: {zh: 混合 MCP 与 Responses 契约, en: Mixed MCP and Responses contract, ja: MCP と Responses 契約の混在}

    descriptions:
      zh: 反例：ReAct Action 无对应 Observation 就继续推理；Anthropic tool_use 缺少配对 tool_result(tool_use_id)；Vercel AI SDK execute 抛错未捕获。
      en: Counterexample: ReAct continues reasoning without Observation for Action; Anthropic tool_use missing paired tool_result(tool_use_id); Vercel AI SDK execute error uncaught.
      ja: 反例：ReAct Action に Observation なしで reasoning 継続。Anthropic tool_use に tool_result ペア欠落。Vercel AI SDK execute エラー未捕捉。
    field_values: {local_tool_call_id: tool-call-bad, local_source_surface: mcp_jsonrpc, local_tool_name: get_weather, local_native_call_ref: mcp-session-42#id-3, local_approval_observation: approved}
    related_node_ids: [ToolCall]
    related_relation_ids: [ToolCall-is_a-Invocation]

    source_claims: [mcp-tools-call, openai-function-call, moonweave-tool-call]
  - id: tool-call-boundary-function-call

    labels: {zh: Responses 函数调用边界, en: Responses function-call boundary, ja: Responses 関数呼出し境界}

    descriptions:
      zh: Vercel AI SDK generateText({model:openai("gpt-4"),tools:{weather:tool({description:"Get weather",parameters:z.object({city:z.string()}),execute:async({city})=>...})}}) 的 tool call 决策 vs Moonweave 本地 ToolCall 活动边界。
      en: Boundary between Vercel AI SDK generateText({model:openai("gpt-4"),tools:{weather:tool({description:"Get weather",parameters:z.object({city:z.string()}),execute:async({city})=>...})}}) tool-call decision and Moonweave local ToolCall activity.
      ja: Vercel AI SDK generateText の tool call 決定と Moonweave ローカル ToolCall 活動の境界。
    field_values: {local_tool_call_id: tool-call-openai-1, local_source_surface: openai_responses_function, local_tool_name: get_weather, local_native_call_ref: response-42/output/fc_1, local_approval_observation: not_required}
    related_node_ids: [ToolCall]
    related_relation_ids: [ToolCall-is_a-Invocation]

    source_claims: [openai-function-call, moonweave-tool-call]
  - id: tool-call-instance-remote-mcp

    labels: {zh: 远程 MCP 调用实例, en: Remote-MCP tool-call instance, ja: リモート MCP ツール呼出し実例}

    descriptions:
      zh: Toolformer (Schick 2023) 自监督插入 [Calculator(350/7)]→执行→50 结果；模型自行判断何时/在哪/用什么工具，非 MCP JSON-RPC 封包本身。
      en: Toolformer (Schick 2023) self-supervised insertion [Calculator(350/7)]→execute→50; model decides when/where/which tool—not the MCP JSON-RPC envelope itself.
      ja: Toolformer (Schick 2023) 自己教師あり [Calculator(350/7)]→実行→50。モデルがいつ/どこ/どの tool かを判断。MCP JSON-RPC envelope 自体ではない。
    field_values: {local_tool_call_id: tool-call-remote-1, local_source_surface: openai_remote_mcp, local_tool_name: roll, local_native_call_ref: response-42/output/mcp_1, local_approval_observation: approved}
    related_node_ids: [ToolCall, Invocation]
    related_relation_ids: [ToolCall-is_a-Invocation]

    source_claims: [openai-remote-mcp-call, moonweave-tool-call]
