  - id: tool_call_requires_permission_scope
    predicate: requires_permission_scope
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 需要权限范围
      en: requires permission scope
      ja: 権限範囲を必要とする
    definitions:
      zh: ToolCall 通过 requires_permission_scope 指向执行该具体调用所需的 PermissionScope；这条边只声明需求，不证明调用主体已获得授权。授权事实必须由另一个有效 AuthorizationGrant 证明，并且该 grant 的主体、资源、允许范围与有效期都必须覆盖本次调用。
      en: ToolCall requires_permission_scope points to the PermissionScope required to execute this particular call. The edge states a requirement only; it does not prove that the caller is authorized. Authorization must be established by a distinct valid AuthorizationGrant whose subject, resource, permitted scope, and validity interval cover the call.
      ja: ToolCall の requires_permission_scope は、この具体的な呼出しの実行に必要な PermissionScope を指す。この edge は要件だけを表し、呼出し主体が認可済みであることは証明しない。認可事実は、主体、resource、許可 scope、有効期間が当該呼出しを包含する別個の有効な AuthorizationGrant によって証明しなければならない。
