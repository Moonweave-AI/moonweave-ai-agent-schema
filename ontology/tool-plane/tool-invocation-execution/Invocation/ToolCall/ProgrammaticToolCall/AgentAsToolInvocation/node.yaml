schema: moonweave.ai/ontology-node/v1
id: AgentAsToolInvocation
kind: concept
labels: {zh: 代理即工具调用活动, en: Agent-as-tool invocation activity, ja: エージェントをツールとして呼び出す活動}
semantics:
  short_definition: {zh: 将专门代理作为可返回控制权工具执行的 ProgrammaticToolCall 活动, en: A ProgrammaticToolCall activity that invokes a specialized agent as a control-returning tool, ja: 専門エージェントを制御復帰型ツールとして実行する ProgrammaticToolCall 活動}
  definition:
    zh: >-
      AgentAsToolInvocation 是工具目标为代理适配器的本地 ProgrammaticToolCall 子类。嵌套工作返回后，父编排活动仍保留控制权；它不是 A2A SendMessage 请求、A2A Task、A2A Artifact 或 OpenAI Agents SDK 对象，这些可作为本地活动引用的原生证据。
    en: >
      An AgentAsToolInvocation is a local ProgrammaticToolCall subtype whose tool target is an agent
      adapter. The parent orchestration activity retains control after the nested work returns. It is
      not an A2A SendMessage request, A2A Task, A2A Artifact, or an OpenAI Agents SDK object; those
      may be native evidence referenced by this local activity.
    ja: >-
      AgentAsToolInvocation は tool target が agent adapter であるローカル ProgrammaticToolCall subtype である。nested work が戻った後も親 orchestration activity が制御を保持する。A2A SendMessage request、A2A Task、A2A Artifact、OpenAI Agents SDK object そのものではなく、これらはローカル活動が参照する native evidence になり得る。
  why_needed:
    zh: >-
      “代理作为工具”与控制权移交具有不同的编排语义。将前者建模为本地工具调用活动，可保留调用方控制权，并让适配器关联 OpenAI agent-as-tool 运行或 A2A 交换，而不折叠不同的消息、任务和产物契约。
    en: >
      “Agent as tool” and control handoff have different orchestration semantics. Modeling the former
      as a local tool-call activity preserves caller control and lets adapters correlate an OpenAI
      agent-as-tool run or an A2A exchange without collapsing their different message, task, and
      artifact contracts.
    ja: >-
      「agent as tool」と control handoff は異なる orchestration semantics を持つ。前者をローカル tool-call activity としてモデル化すると caller control を保ち、adapter は OpenAI agent-as-tool run または A2A exchange を相関でき、異なる message、task、artifact contract を一つに畳み込まない。
  includes:
    - {zh: 本地活动标识、父程序化调用引用、目标代理引用、适配器和控制返回模式, en: "Local activity ID, parent programmatic-call reference, target-agent reference, adapter, and control-return mode", ja: ローカル活動 ID、親プログラム型呼出し参照、対象エージェント参照、adapter、制御復帰モード}
  excludes:
    - {zh: A2A SendMessage、Task 或 Artifact 对象, en: "An A2A SendMessage, Task, or Artifact object", ja: A2A SendMessage、Task、Artifact オブジェクト}
    - {zh: 转移对话控制权的 handoff, en: A handoff that transfers conversation control, ja: 会話制御を移譲する handoff}
  semantic_kind: activity
  aliases:
    - {language: en, value: nested agent tool call, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      OpenAI Agents SDK 通过 agent.as_tool(tool_name, tool_description) 将代理作为可调用工具，并说明这避免完整 handoff。适配器使用 A2A 时，原生请求仍是带 Message 的 HTTP POST /message:send，响应仍是 Task 或 Message，任务 Artifact 仍为基于 Part 的输出；本地活动关联任一适配器但不重命名其原生对象。
    en: >
      The OpenAI Agents SDK exposes an agent as a callable tool with
      agent.as_tool(tool_name, tool_description), and documents that this avoids a full handoff.
      When an adapter uses A2A, its native request remains an HTTP POST to /message:send with a
      Message; the response remains a Task or Message, and task Artifacts remain Part-based output.
      The local activity correlates either adapter without renaming those native objects.
    ja: >-
      OpenAI Agents SDK は agent.as_tool(tool_name, tool_description) により agent を callable tool として公開し、完全な handoff を避けると説明している。adapter が A2A を使う場合、native request は Message を伴う HTTP POST /message:send のままで、response は Task または Message、task Artifact は Part-based output のままである。ローカル活動はどちらの adapter も相関するが native object を改名しない。
  typical_input:
    - description: OpenAI Agents SDK agent-as-tool registration.
      format: 'translator_agent.as_tool(tool_name="translate_text", tool_description="Translate text between languages.")'
      source_claims: [openai-agents-as-tool]
    - description: Native A2A message send request referenced by an adapter.
      format: '{"message":{"role":"ROLE_USER","parts":[{"text":"Summarize this report"}],"messageId":"msg-42"}}'
      source_claims: [a2a-send-message]
  typical_output:
    - description: Local agent-as-tool activity record.
      format: '{"local_agent_as_tool_invocation_id":"agent-tool-42","local_target_agent_ref":"agent:translator","local_agent_adapter":"openai_agents_sdk","local_control_return_mode":"return_to_caller"}'
      source_claims: [moonweave-agent-as-tool]
  reference_implementations:
    - name: OpenAI Agents SDK Tools
      url: https://openai.github.io/openai-agents-python/tools/
      description: Documents Agent.as_tool and nested tool-agent behavior.
    - name: A2A Protocol Specification
      url: https://a2a-protocol.org/latest/specification/
      description: Defines SendMessage, Task, Message, and Artifact contracts.
structure:
  identity_keys: [local_agent_as_tool_invocation_id]
  fields:
    - id: local_agent_as_tool_invocation_id
      labels: {zh: 本地代理工具调用标识, en: Local agent-as-tool invocation ID, ja: ローカル agent-as-tool 呼出し ID}
      definitions: {zh: 主机分配给代理即工具活动的标识, en: Identifier assigned by the host to the agent-as-tool activity, ja: agent-as-tool 活動にホストが割り当てる識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: agent-tool-42
      allowed_values: []
      source_claims: [moonweave-agent-as-tool]
    - id: local_target_agent_ref
      labels: {zh: 本地目标代理引用, en: Local target-agent reference, ja: ローカル対象エージェント参照}
      definitions: {zh: 被工具适配器调用的代理配置或可寻址代理标识, en: Addressable agent configuration or agent identifier invoked by the tool adapter, ja: ツール adapter が呼出すアドレス可能なエージェント設定またはエージェント識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: agent:translator
      allowed_values: []
      source_claims: [openai-agents-as-tool, moonweave-agent-as-tool]
    - id: local_agent_adapter
      labels: {zh: 本地代理适配器, en: Local agent adapter, ja: ローカルエージェント adapter}
      definitions: {zh: 执行嵌套代理调用的适配器种类，不是 A2A 或 OpenAI 原生 type 字段, en: Adapter kind used to execute nested agent call and not an A2A or OpenAI native type field, ja: ネストしたエージェント呼出しを実行する adapter 種別であり A2A または OpenAI ネイティブ type 項目ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: openai_agents_sdk
      allowed_values: [openai_agents_sdk, a2a_adapter, local_agent_runtime]
      source_claims: [openai-agents-as-tool, a2a-send-message, moonweave-agent-as-tool]
    - id: local_control_return_mode
      labels: {zh: 本地控制返回模式, en: Local control-return mode, ja: ローカル制御復帰モード}
      definitions: {zh: 嵌套工作结束时的本地编排期望，不替代远端任务状态, en: Local orchestration expectation at nested-work completion and not a replacement for remote task state, ja: ネスト作業完了時のローカル編成期待でありリモート task 状態の置換ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: return_to_caller
      allowed_values: [return_to_caller]
      source_claims: [openai-agents-as-tool, moonweave-agent-as-tool]
    - id: local_a2a_send_message_ref
      labels: {zh: A2A 发送消息引用, en: A2A SendMessage reference, ja: A2A SendMessage 参照}
      definitions: {zh: 当适配器为 a2a_adapter 时，指向保留的原生 A2A SendMessage 请求的本地引用, en: Local reference to retained native A2A SendMessage request when adapter is a2a_adapter, ja: adapter が a2a_adapter の場合に保持されたネイティブ A2A SendMessage 要求へのローカル参照}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: a2a-http-42/message-send
      allowed_values: []
      source_claims: [a2a-send-message, moonweave-agent-as-tool]
    - id: local_programmatic_tool_call_id
      labels: {zh: 本地程序化调用标识, en: Local programmatic-call ID, ja: ローカルプログラム型呼出し ID}
      definitions: {zh: 主机分配给程序化工具调用活动的标识, en: Identifier assigned by the host to the programmatic tool-call activity, ja: プログラム型ツール呼出し活動にホストが割り当てる識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: programmatic-call-42
      allowed_values: []
      source_claims: [moonweave-agent-as-tool]
    - id: local_caller_ref
      labels: {zh: 本地调用方引用, en: Local caller reference, ja: ローカル caller 参照}
      definitions: {zh: 发起该工具调用的运行时组件、工作流步骤或应用代码标识, en: "Identifier of the runtime component, workflow step, or application code that initiated the call", ja: 呼出しを開始したランタイム構成要素、ワークフローステップ、アプリケーションコードの識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: workflow:pricing-step
      allowed_values: []
      source_claims: [moonweave-agent-as-tool]
    - id: local_initiator_kind
      labels: {zh: 本地发起方种类, en: Local initiator kind, ja: ローカル開始者種別}
      definitions: {zh: 本地活动发起源分类，不是协议 type 字段, en: Classification of local activity initiator and not a protocol type field, ja: ローカル活動開始源の分類でありプロトコル type 項目ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: runtime_orchestrator
      allowed_values: [runtime_orchestrator, workflow_step, application_code, scheduler]
      source_claims: [moonweave-agent-as-tool]
    - id: local_tool_call_id
      labels: {zh: 本地工具调用标识, en: Local tool-call ID, ja: ローカルツール呼出し ID}
      definitions: {zh: 主机分配给该工具调用活动的稳定标识, en: Stable identifier assigned by the host to this tool-call activity, ja: このツール呼出し活動にホストが割り当てる安定識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: tool-call-42
      allowed_values: []
      source_claims: [moonweave-agent-as-tool]
    - id: local_source_surface
      labels: {zh: 本地来源表面, en: Local source surface, ja: ローカルソース表面}
      definitions: {zh: 拥有原生调用契约的 API 或协议表面，不是原生 type 字段, en: API or protocol surface that owns the native call contract and not a native type field, ja: ネイティブ呼出し契約を所有する API またはプロトコル表面でありネイティブ type 項目ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp_jsonrpc
      allowed_values: [mcp_jsonrpc, openai_responses_function, openai_remote_mcp]
      source_claims: [moonweave-agent-as-tool]
    - id: local_tool_name
      labels: {zh: 本地工具名称, en: Local tool name, ja: ローカルツール名}
      definitions: {zh: 从来源特定调用对象映射用于审计的工具名称, en: Tool name mapped from the source-specific call object for audit, ja: 監査用にソース固有呼出しオブジェクトから対応付けたツール名}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: get_weather
      allowed_values: []
      source_claims: [moonweave-agent-as-tool]
    - id: local_native_call_ref
      labels: {zh: 原生调用引用, en: Native-call reference, ja: ネイティブ呼出し参照}
      definitions: {zh: 指向保留的 MCP JSON-RPC 对象或 OpenAI Responses item 的可审计引用, en: Auditable reference to a retained MCP JSON-RPC object or OpenAI Responses item, ja: 保持された MCP JSON-RPC オブジェクトまたは OpenAI Responses item への監査可能参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp-session-42#id-2
      allowed_values: []
      source_claims: [moonweave-agent-as-tool]
    - id: local_approval_observation
      labels: {zh: 本地审批观察, en: Local approval observation, ja: ローカル承認観測}
      definitions: {zh: 主机对工具调用审批的局部观察，不替代来源协议的审批对象, en: Host-local observation of call approval and not a replacement for a source protocol approval object, ja: 呼出し承認に対するホストローカル観測でありソースプロトコル承認オブジェクトの置換ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: approved
      allowed_values: [not_required, pending, approved, denied]
      source_claims: [moonweave-agent-as-tool]
    - id: local_invocation_id
      labels: {zh: 本地调用标识, en: Local invocation ID, ja: ローカル呼び出し ID}
      definitions: {zh: 主机为一个本地执行活动分配的稳定标识, en: A stable identifier assigned by the host to one local execution activity, ja: 一つのローカル実行活動にホストが割り当てる安定識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: inv-42
      allowed_values: []
      source_claims: [moonweave-agent-as-tool]
    - id: local_surface
      labels: {zh: 本地来源表面, en: Local source surface, ja: ローカルソース表面}
      definitions: {zh: 主机选择适配器时记录的来源类型，非原生协议字段, en: The source category recorded by the host for adapter selection; not a native protocol field, ja: ホストがアダプター選択に記録するソース分類でありネイティブプロトコル項目ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp_tools_call
      allowed_values: [mcp_tools_call, openai_responses_function, openai_responses_remote_mcp, a2a_send_message, local_command]
      source_claims: [moonweave-agent-as-tool]
    - id: local_target_ref
      labels: {zh: 本地目标引用, en: Local target reference, ja: ローカル対象参照}
      definitions: {zh: 指向要执行目标的本地或已发现引用, en: A local or discovered reference to the target being executed, ja: 実行対象へのローカルまたは発見済み参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp:weather/get_weather
      allowed_values: []
      source_claims: [moonweave-agent-as-tool]
    - id: local_lifecycle_state
      labels: {zh: 本地生命周期状态, en: Local lifecycle state, ja: ローカルライフサイクル状態}
      definitions: {zh: 主机对其本地追踪活动的状态，不重命名远程 TaskStatus, en: The host state of its local trace and not a renamed remote TaskStatus, ja: ホストによるローカル軌跡状態でありリモート TaskStatus の改名ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dispatched
      allowed_values: [planned, dispatched, completed, failed, cancelled]
      source_claims: [moonweave-agent-as-tool]
  constraints:
    - id: agent-as-tool-retains-caller-control
      severity: error
      expression_language: plain
      expression: local_control_return_mode must be return_to_caller, and the activity must not assert a conversation-control handoff to local_target_agent_ref.
      explanation: {zh: 代理即工具调用必须返回调用方控制权，不能声称是 handoff, en: An agent-as-tool invocation returns control to caller and cannot claim to be a handoff, ja: agent-as-tool 呼出しは caller に制御を返し handoff だと主張できない}
      source_claims: [openai-agents-as-tool, moonweave-agent-as-tool]
    - id: agent-as-tool-keeps-a2a-native-objects
      severity: error
      expression_language: plain
      expression: When local_agent_adapter is a2a_adapter, local_a2a_send_message_ref identifies the native request and any returned Task, Message, or Artifact retains its A2A schema.
      explanation: {zh: 使用 A2A 适配器时，本地引用必须指向原生请求，返回 Task、Message 或 Artifact 保留 A2A schema, en: "With an A2A adapter the local reference identifies native request and returned Task, Message, or Artifact retains A2A schema", ja: A2A adapter ではローカル参照がネイティブ要求を示し返却 Task、Message、Artifact は A2A schema を保つ}
      source_claims: [a2a-send-message, a2a-task-artifact, moonweave-agent-as-tool]
    - id: agent-as-tool-invocation-id-same-record-parent-identity
      severity: error
      expression_language: plain
      expression: "local_agent_as_tool_invocation_id = local_programmatic_tool_call_id; both identify the same local ProgrammaticToolCall record and inherited parent fields belong to that one record."
      explanation: {zh: "local_agent_as_tool_invocation_id 与 local_programmatic_tool_call_id 标识同一条本地 ProgrammaticToolCall 记录，继承的父字段属于该同一记录。", en: "The child and parent IDs are equal representations of one local record, not a link to a second parent record.", ja: "local_agent_as_tool_invocation_id と local_programmatic_tool_call_id は同じローカル ProgrammaticToolCall レコードを識別し、継承した親フィールドはその一つのレコードに属する。"}
      source_claims: [moonweave-agent-as-tool]
  required_relations: []
examples:
  - id: agent-as-tool-positive-openai

    labels: {zh: OpenAI 翻译代理工具, en: OpenAI translator agent tool, ja: OpenAI 翻訳エージェントツール}

    descriptions:
      zh: ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]；Anthropic content:[{type:"tool_use",id:"toolu_01",name:"get_weather",input:{location:"Paris"}}]；Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。
      en: ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]; Anthropic content:[{type:"tool_use",id:"toolu_01",name:"get_weather",input:{location:"Paris"}}]; Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}}).
      ja: ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]。Anthropic tool_use。Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。
    field_values: {local_agent_as_tool_invocation_id: agent-tool-42, local_target_agent_ref: agent:translator, local_agent_adapter: openai_agents_sdk, local_control_return_mode: return_to_caller}
    related_node_ids: [AgentAsToolInvocation, ProgrammaticToolCall]
    related_relation_ids: [AgentAsToolInvocation-is_a-ProgrammaticToolCall]

    source_claims: [openai-agents-as-tool, moonweave-agent-as-tool]
  - id: agent-as-tool-counterexample-a2a-task-object

    labels: {zh: 将 A2A Task 冒充本地活动, en: A2A Task masquerading as local activity, ja: ローカル活動を装う A2A Task}

    descriptions:
      zh: 反例：ReAct Action 无对应 Observation 就继续推理；Anthropic tool_use 缺少配对 tool_result(tool_use_id)；Vercel AI SDK execute 抛错未捕获。
      en: Counterexample: ReAct continues reasoning without Observation for Action; Anthropic tool_use missing paired tool_result(tool_use_id); Vercel AI SDK execute error uncaught.
      ja: 反例：ReAct Action に Observation なしで reasoning 継続。Anthropic tool_use に tool_result ペア欠落。Vercel AI SDK execute エラー未捕捉。
    field_values: {local_agent_as_tool_invocation_id: agent-tool-bad, local_target_agent_ref: agent:researcher, local_agent_adapter: a2a_adapter, local_control_return_mode: return_to_caller}
    related_node_ids: [AgentAsToolInvocation]
    related_relation_ids: [AgentAsToolInvocation-is_a-ProgrammaticToolCall]

    source_claims: [a2a-send-message, a2a-task-artifact, moonweave-agent-as-tool]
  - id: agent-as-tool-boundary-a2a-message

    labels: {zh: A2A 消息与本地活动边界, en: A2A message versus local-activity boundary, ja: A2A メッセージとローカル活動の境界}

    descriptions:
      zh: ReAct 文本 Action 标记 vs Anthropic structured tool_use vs Vercel AI SDK Zod schema tool 的 wire 契约边界；本地 Invocation 活动非原生封包。
      en: Wire contract boundary among ReAct text Action markers, Anthropic structured tool_use, Vercel AI SDK Zod schema tools; local Invocation activity is not native envelope.
      ja: ReAct テキスト Action marker、Anthropic structured tool_use、Vercel AI SDK Zod schema tool の wire 契約境界。ローカル Invocation 活動はネイティブ envelope ではない。
    field_values: {local_agent_as_tool_invocation_id: agent-tool-a2a-1, local_target_agent_ref: agent:researcher, local_agent_adapter: a2a_adapter, local_control_return_mode: return_to_caller, local_a2a_send_message_ref: a2a-http-42/message-send}
    related_node_ids: [AgentAsToolInvocation, ProgrammaticToolCall]
    related_relation_ids: [AgentAsToolInvocation-is_a-ProgrammaticToolCall]

    source_claims: [a2a-send-message, a2a-task-artifact, moonweave-agent-as-tool]
  - id: agent-as-tool-instance-research

    labels: {zh: 研究代理工具实例, en: Research-agent tool instance, ja: 研究エージェントツール実例}

    descriptions:
