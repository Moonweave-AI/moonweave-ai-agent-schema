schema: moonweave.ai/ontology-node/v1
id: AgentAsToolInvocation
kind: concept
status: accepted
labels:
  zh: 智能体工具调用
  en: Agent-as-Tool Invocation
  ja: エージェントツール呼び出し
semantics:
  short_definition:
    zh: 智能体工具调用是把另一个智能体暴露为可调用工具的一种程序化工具调用。
    en: An Agent-as-Tool Invocation is a Programmatic Tool Call that exposes another agent as a callable tool.
    ja: エージェントツール呼び出しは別 agent を callable tool として公開する Programmatic Tool Call です。
  definition:
    zh: 智能体工具调用是一种 ProgrammaticToolCall，以被调用能力由另一个智能体实现、调用方生成输入并接收工具结果为种差；管理者保留会话控制与最终答案责任，被调用智能体不自动接管会话，因此该调用本身不是 DelegationProcess 或 Handoff。
    en: An Agent-as-Tool Invocation is a ProgrammaticToolCall differentiated by another agent implementing the called capability while the caller generates input and receives a tool result. The manager retains conversation control and final-answer responsibility; the called agent does not automatically take over the conversation, so the call is not itself a DelegationProcess or Handoff.
    ja: エージェントツール呼び出しは別 agent が called capability を実装し caller が input を生成して tool result を受け取る ProgrammaticToolCall です。manager は conversation control と final-answer responsibility を保持し、called agent は会話を自動引継ぎしないため DelegationProcess/Handoff ではありません。
  why_needed:
    zh: 该节点把‘调用智能体能力’与‘转移责任’明确分开，防止只因参与者是智能体就误判发生委派。
    en: The node separates calling an agent capability from transferring responsibility, preventing agent participation alone from implying delegation.
    ja: agent capability call と responsibility transfer を分離し agent participation だけで delegation と誤判しません。
  includes:
    - zh: 纳入调用方仍控制会话、生成输入并把被调用智能体返回值当作工具结果的程序化调用。
      en: Includes programmatic calls where the caller retains conversation control, generates input, and treats the called agent's return as a tool result.
      ja: caller が conversation control を保持し input を生成して called agent return を tool result とする programmatic call を含みます。
  excludes:
    - zh: 排除通过 DelegationContract 转移工作范围、权限或最终答案责任的委派，以及 Handoff 的会话控制转移。
      en: Excludes delegation that transfers work scope, authority, or final-answer responsibility through a DelegationContract, and conversation-control transfer through Handoff.
      ja: DelegationContract による work scope・authority・final-answer responsibility 移転と Handoff の conversation-control transfer を除きます。
  semantic_kind: activity
  aliases: []
structure:
