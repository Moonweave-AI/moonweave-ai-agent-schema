schema: moonweave.ai/ontology-node/v1
id: ProgrammaticToolCall
kind: concept
labels: {zh: 程序化工具调用活动, en: Programmatic tool-call activity, ja: プログラム型ツール呼出し活動}
semantics:
  short_definition: {zh: 由应用代码或运行时编排发起的 ToolCall 活动, en: A ToolCall activity initiated by application code or runtime orchestration, ja: アプリケーションコードまたはランタイム編成が開始する ToolCall 活動}
  definition:
    zh: >-
      ProgrammaticToolCall 是即时发起者为主机运行时、工作流或应用组件而非直接人工交互的 ToolCall 子类。它是本地活动分类，不是 OpenAI Responses function_call item、MCP JSON-RPC 请求或来源特定 SDK 对象。
    en: >
      A ProgrammaticToolCall is a ToolCall subtype whose immediate initiator is a host runtime,
      workflow, or application component rather than a direct human interaction. It is a local
      activity classification, not an OpenAI Responses function_call item, an MCP JSON-RPC request,
      or a source-specific SDK object.
    ja: >-
      ProgrammaticToolCall は直接の人間操作ではなく host runtime、workflow、application component が直近の起動者である ToolCall subtype である。ローカル活動の分類であり、OpenAI Responses function_call item、MCP JSON-RPC 要求、source-specific SDK object ではない。
  why_needed:
    zh: >-
      运行时自动调用工具时，执行权限、审批、审计和重试处理均会不同。此类型捕获活动级出处，而不声称每个原生工具 API 都存在程序化分类。
    en: >
      Execution authority, approval, audit, and retry handling differ when a runtime invokes a
      tool automatically. This type captures that activity-level provenance without claiming that
      the programmatic classification exists in every native tool API.
    ja: >-
      runtime が自動で tool を呼び出す場合、実行権限、承認、監査、再試行の処理は異なる。この type は活動レベルの provenance を捉えるが、すべての native tool API に programmatic classification があるとは主張しない。
  includes:
    - {zh: 本地程序化调用标识、父工具调用引用、调用方引用和自动化策略引用, en: "Local programmatic-call ID, parent tool-call reference, caller reference, and automation-policy reference", ja: ローカルプログラム型呼出し ID、親ツール呼出し参照、caller 参照、自动化ポリシー参照}
  excludes:
    - {zh: 由用户直接点击触发的调用, en: A call directly triggered by a user click, ja: ユーザークリックで直接起動された呼出し}
    - {zh: 原生 function_call、tools/call 或 mcp_call item, en: "Native function_call, tools/call, or mcp_call item", ja: ネイティブ function_call、tools/call、mcp_call item}
  semantic_kind: activity
  aliases:
    - {language: en, value: runtime-driven tool call, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      OpenAI Agents SDK 将本地/运行时工具与托管工具区分开，模型可决定调用本地工具，应用或已配置执行环境则负责实际工作。Moonweave 记录主机侧执行活动及其调用方和策略引用，这些本地字段不属于 Responses tool item 或 MCP JSON-RPC 请求。
    en: >
      The OpenAI Agents SDK distinguishes local/runtime tools from hosted tools: the model can decide
      to call a local tool, while the application or configured execution environment performs the
      work. Moonweave records the host-side execution activity and its caller/policy references.
      Those local fields do not belong in a Responses tool item or an MCP JSON-RPC request.
    ja: >-
      OpenAI Agents SDK は local/runtime tools と hosted tools を区別し、モデルは local tool を呼び出す判断ができる一方、application または設定済み execution environment が作業を行う。Moonweave はホスト側 execution activity と caller/policy references を記録し、それらのローカル field は Responses tool item や MCP JSON-RPC request には属さない。
  typical_input:
    - description: Local runtime decides to dispatch a registered calculator tool.
      format: '{"local_caller_ref":"workflow:pricing-step","local_automation_policy_ref":"policy:runtime-tools-v2"}'
      source_claims: [openai-agents-local-tools, moonweave-programmatic-tool-call]
  typical_output:
    - description: Programmatic call activity record.
      format: '{"local_programmatic_tool_call_id":"programmatic-call-42","local_initiator_kind":"runtime_orchestrator"}'
      source_claims: [moonweave-programmatic-tool-call]
  reference_implementations:
    - name: OpenAI Agents SDK Tools
      url: https://openai.github.io/openai-agents-python/tools/
      description: Distinguishes hosted, local/runtime, function, and agent tools.
structure:
  identity_keys: [local_programmatic_tool_call_id]
  fields:
    - id: local_programmatic_tool_call_id
      labels: {zh: 本地程序化调用标识, en: Local programmatic-call ID, ja: ローカルプログラム型呼出し ID}
      definitions: {zh: 主机分配给程序化工具调用活动的标识, en: Identifier assigned by the host to the programmatic tool-call activity, ja: プログラム型ツール呼出し活動にホストが割り当てる識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: programmatic-call-42
      allowed_values: []
      source_claims: [moonweave-programmatic-tool-call]
    - id: local_caller_ref
      labels: {zh: 本地调用方引用, en: Local caller reference, ja: ローカル caller 参照}
      definitions: {zh: 发起该工具调用的运行时组件、工作流步骤或应用代码标识, en: "Identifier of the runtime component, workflow step, or application code that initiated the call", ja: 呼出しを開始したランタイム構成要素、ワークフローステップ、アプリケーションコードの識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: workflow:pricing-step
      allowed_values: []
      source_claims: [moonweave-programmatic-tool-call]
    - id: local_initiator_kind
      labels: {zh: 本地发起方种类, en: Local initiator kind, ja: ローカル開始者種別}
      definitions: {zh: 本地活动发起源分类，不是协议 type 字段, en: Classification of local activity initiator and not a protocol type field, ja: ローカル活動開始源の分類でありプロトコル type 項目ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: runtime_orchestrator
      allowed_values: [runtime_orchestrator, workflow_step, application_code, scheduler]
      source_claims: [moonweave-programmatic-tool-call]
    - id: local_automation_policy_ref
      labels: {zh: 本地自动化策略引用, en: Local automation-policy reference, ja: ローカル自動化ポリシー参照}
      definitions: {zh: 约束该自动化调用的本地策略引用，不是工具 API 参数, en: Local policy reference constraining the automated call and not a tool API parameter, ja: 自動呼出しを制約するローカルポリシー参照でありツール API パラメーターではない}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: policy:runtime-tools-v2
      allowed_values: []
      source_claims: [moonweave-programmatic-tool-call]
    - id: local_tool_call_id
      labels: {zh: 本地工具调用标识, en: Local tool-call ID, ja: ローカルツール呼出し ID}
      definitions: {zh: 主机分配给该工具调用活动的稳定标识, en: Stable identifier assigned by the host to this tool-call activity, ja: このツール呼出し活動にホストが割り当てる安定識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: tool-call-42
      allowed_values: []
      source_claims: [moonweave-programmatic-tool-call]
    - id: local_source_surface
      labels: {zh: 本地来源表面, en: Local source surface, ja: ローカルソース表面}
      definitions: {zh: 拥有原生调用契约的 API 或协议表面，不是原生 type 字段, en: API or protocol surface that owns the native call contract and not a native type field, ja: ネイティブ呼出し契約を所有する API またはプロトコル表面でありネイティブ type 項目ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp_jsonrpc
      allowed_values: [mcp_jsonrpc, openai_responses_function, openai_remote_mcp]
      source_claims: [moonweave-programmatic-tool-call]
    - id: local_tool_name
      labels: {zh: 本地工具名称, en: Local tool name, ja: ローカルツール名}
      definitions: {zh: 从来源特定调用对象映射用于审计的工具名称, en: Tool name mapped from the source-specific call object for audit, ja: 監査用にソース固有呼出しオブジェクトから対応付けたツール名}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: get_weather
      allowed_values: []
      source_claims: [moonweave-programmatic-tool-call]
    - id: local_native_call_ref
      labels: {zh: 原生调用引用, en: Native-call reference, ja: ネイティブ呼出し参照}
      definitions: {zh: 指向保留的 MCP JSON-RPC 对象或 OpenAI Responses item 的可审计引用, en: Auditable reference to a retained MCP JSON-RPC object or OpenAI Responses item, ja: 保持された MCP JSON-RPC オブジェクトまたは OpenAI Responses item への監査可能参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp-session-42#id-2
      allowed_values: []
      source_claims: [moonweave-programmatic-tool-call]
    - id: local_approval_observation
      labels: {zh: 本地审批观察, en: Local approval observation, ja: ローカル承認観測}
      definitions: {zh: 主机对工具调用审批的局部观察，不替代来源协议的审批对象, en: Host-local observation of call approval and not a replacement for a source protocol approval object, ja: 呼出し承認に対するホストローカル観測でありソースプロトコル承認オブジェクトの置換ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: approved
      allowed_values: [not_required, pending, approved, denied]
      source_claims: [moonweave-programmatic-tool-call]
    - id: local_invocation_id
      labels: {zh: 本地调用标识, en: Local invocation ID, ja: ローカル呼び出し ID}
      definitions: {zh: 主机为一个本地执行活动分配的稳定标识, en: A stable identifier assigned by the host to one local execution activity, ja: 一つのローカル実行活動にホストが割り当てる安定識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: inv-42
      allowed_values: []
      source_claims: [moonweave-programmatic-tool-call]
    - id: local_surface
      labels: {zh: 本地来源表面, en: Local source surface, ja: ローカルソース表面}
      definitions: {zh: 主机选择适配器时记录的来源类型，非原生协议字段, en: The source category recorded by the host for adapter selection; not a native protocol field, ja: ホストがアダプター選択に記録するソース分類でありネイティブプロトコル項目ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp_tools_call
      allowed_values: [mcp_tools_call, openai_responses_function, openai_responses_remote_mcp, a2a_send_message, local_command]
      source_claims: [moonweave-programmatic-tool-call]
    - id: local_target_ref
      labels: {zh: 本地目标引用, en: Local target reference, ja: ローカル対象参照}
      definitions: {zh: 指向要执行目标的本地或已发现引用, en: A local or discovered reference to the target being executed, ja: 実行対象へのローカルまたは発見済み参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp:weather/get_weather
      allowed_values: []
      source_claims: [moonweave-programmatic-tool-call]
    - id: local_lifecycle_state
      labels: {zh: 本地生命周期状态, en: Local lifecycle state, ja: ローカルライフサイクル状態}
      definitions: {zh: 主机对其本地追踪活动的状态，不重命名远程 TaskStatus, en: The host state of its local trace and not a renamed remote TaskStatus, ja: ホストによるローカル軌跡状態でありリモート TaskStatus の改名ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dispatched
      allowed_values: [planned, dispatched, completed, failed, cancelled]
      source_claims: [moonweave-programmatic-tool-call]
  constraints:
    - id: programmatic-tool-call-has-runtime-initiator
      severity: error
      expression_language: plain
      expression: "local_caller_ref and local_initiator_kind must identify a non-human runtime initiator for this ProgrammaticToolCall record."
      explanation: {zh: 必须能识别非人工运行时发起者, en: A non-human runtime initiator must be identifiable, ja: 非人間ランタイム開始者を識別できなければならない}
      source_claims: [moonweave-programmatic-tool-call]
    - id: programmatic-tool-call-keeps-native-contract
      severity: error
      expression_language: plain
      expression: Caller and policy metadata remain Moonweave fields and are not asserted to be fields of native MCP or Responses call objects.
      explanation: {zh: 调用方和策略元数据是 Moonweave 字段，不能声称属于原生 MCP 或 Responses 对象, en: Caller and policy metadata are Moonweave fields and cannot be claimed as native MCP or Responses object fields, ja: caller とポリシーメタデータは Moonweave 項目でネイティブ MCP または Responses オブジェクト項目と主張できない}
      source_claims: [openai-agents-local-tools, moonweave-programmatic-tool-call]
    - id: programmatic-tool-call-id-same-record-parent-identity
      severity: error
      expression_language: plain
      expression: "local_programmatic_tool_call_id = local_tool_call_id; both identify the same local ToolCall record and inherited parent fields belong to that one record."
      explanation: {zh: "local_programmatic_tool_call_id 与 local_tool_call_id 标识同一条本地 ToolCall 记录，继承的父字段属于该同一记录。", en: "The child and parent IDs are equal representations of one local record, not a link to a second parent record.", ja: "local_programmatic_tool_call_id と local_tool_call_id は同じローカル ToolCall レコードを識別し、継承した親フィールドはその一つのレコードに属する。"}
      source_claims: [moonweave-programmatic-tool-call]
  required_relations: []
examples:
  - id: programmatic-tool-call-positive-workflow

    labels: {zh: 工作流计算器调用, en: Workflow calculator call, ja: ワークフロー計算機呼出し}

    descriptions:
      zh: "ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]；Anthropic content:[{type:\"tool_use\",id:\"toolu_01\",name:\"get_weather\",input:{location:\"Paris\"}}]；Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。"
      en: "ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]; Anthropic content:[{type:\"tool_use\",id:\"toolu_01\",name:\"get_weather\",input:{location:\"Paris\"}}]; Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})."
      ja: "ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]。Anthropic tool_use。Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。"
    field_values: {local_programmatic_tool_call_id: programmatic-call-42, local_caller_ref: workflow:pricing-step, local_initiator_kind: workflow_step, local_automation_policy_ref: policy:runtime-tools-v2}
    related_node_ids: [ProgrammaticToolCall, ToolCall]
    related_relation_ids: [ProgrammaticToolCall-is_a-ToolCall]

    source_claims: [openai-agents-local-tools, moonweave-programmatic-tool-call]
  - id: programmatic-tool-call-counterexample-user-click

    labels: {zh: 人工 GUI 点击, en: Manual GUI click, ja: 手動 GUI クリック}

    descriptions:
      zh: 反例：ReAct Action 无对应 Observation 就继续推理；Anthropic tool_use 缺少配对 tool_result(tool_use_id)；Vercel AI SDK execute 抛错未捕获。
      en: Counterexample: ReAct continues reasoning without Observation for Action; Anthropic tool_use missing paired tool_result(tool_use_id); Vercel AI SDK execute error uncaught.
      ja: 反例：ReAct Action に Observation なしで reasoning 継続。Anthropic tool_use に tool_result ペア欠落。Vercel AI SDK execute エラー未捕捉。
    field_values: {local_programmatic_tool_call_id: programmatic-call-bad, local_initiator_kind: runtime_orchestrator}
    related_node_ids: [ProgrammaticToolCall, ToolCall]
    related_relation_ids: [ProgrammaticToolCall-is_a-ToolCall]

    source_claims: [moonweave-programmatic-tool-call]
  - id: programmatic-tool-call-boundary-native-item

    labels: {zh: 本地活动与原生调用 item 边界, en: Local activity versus native-call item boundary, ja: ローカル活動とネイティブ呼出し item の境界}

    descriptions:
      zh: ReAct 文本 Action 标记 vs Anthropic structured tool_use vs Vercel AI SDK Zod schema tool 的 wire 契约边界；本地 Invocation 活动非原生封包。
      en: Wire contract boundary among ReAct text Action markers, Anthropic structured tool_use, Vercel AI SDK Zod schema tools; local Invocation activity is not native envelope.
      ja: ReAct テキスト Action marker、Anthropic structured tool_use、Vercel AI SDK Zod schema tool の wire 契約境界。ローカル Invocation 活動はネイティブ envelope ではない。
    field_values: {local_programmatic_tool_call_id: programmatic-call-44, local_caller_ref: runtime:responses-adapter, local_initiator_kind: runtime_orchestrator}
    related_node_ids: [ProgrammaticToolCall, ToolCall]
    related_relation_ids: [ProgrammaticToolCall-is_a-ToolCall]

    source_claims: [openai-agents-local-tools, moonweave-programmatic-tool-call]
  - id: programmatic-tool-call-instance-scheduled

    labels: {zh: 定时刷新实例, en: Scheduled refresh instance, ja: スケジュール更新実例}

    descriptions:
      zh: ReAct HotpotQA 实例：Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup[Arthur's Magazine]→Finish[1850]；Anthropic tool_use_id=toolu_01A09q90qw90 配对 tool_result。
      en: ReAct HotpotQA instance: Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup→Finish[1850]; Anthropic tool_use_id=toolu_01A09q90qw90 paired with tool_result.
      ja: ReAct HotpotQA 実例：Thought→Action: Search→Observation→Lookup→Finish[1850]。Anthropic tool_use_id=toolu_01A09q90qw90 が tool_result とペア。
    field_values: {local_programmatic_tool_call_id: programmatic-refresh-1, local_caller_ref: scheduler:nightly-index, local_initiator_kind: scheduler, local_automation_policy_ref: policy:scheduled-index-v1}
    related_node_ids: [ProgrammaticToolCall, ToolCall]
    related_relation_ids: [ProgrammaticToolCall-is_a-ToolCall]

    source_claims: [moonweave-programmatic-tool-call]
