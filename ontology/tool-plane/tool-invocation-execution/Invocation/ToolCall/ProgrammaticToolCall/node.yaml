schema: moonweave.ai/ontology-node/v1
id: ProgrammaticToolCall
kind: concept
status: accepted
labels:
  zh: 程序化工具调用
  en: Programmatic Tool Call
  ja: プログラム型ツール呼び出し
semantics:
  short_definition:
    zh: 程序化工具调用是由生成代码、运行时编排或显式 API 逻辑发起的一种工具调用。
    en: A Programmatic Tool Call is a Tool Call initiated by generated code, runtime orchestration, or explicit API logic.
    ja: プログラム型ツール呼び出しは generated code・runtime orchestration・explicit API logic が開始する Tool Call です。
  definition:
    zh: 程序化工具调用是一种 ToolCall，以 machine-readable 发起源、调用接口和运行时控制路径为种差；自然语言可以促成代码生成，但只有程序逻辑形成具名调用和结构化实参时才属于此类。
    en: A Programmatic Tool Call is a ToolCall differentiated by a machine-readable initiation source, call interface, and runtime control path. Natural language may prompt code generation, but the subtype applies only when program logic forms the named call and structured arguments.
    ja: プログラム型ツール呼び出しは machine-readable initiation source・call interface・runtime control path を種差とする ToolCall です。natural language が code generation を促しても program logic が named call と structured arguments を形成した場合のみ該当します。
  why_needed:
    zh: 该中间层为智能体作为工具等程序化专化提供真实父节点，而不让所有‘程序化 XXX’平铺在 ToolCall 下。
    en: This intermediate layer gives agent-as-tool and other programmatic specializations a real parent instead of flattening every ‘programmatic X’ under ToolCall.
    ja: agent-as-tool 等の programmatic specialization に実親を与え全てを ToolCall 直下へ平坦化しません。
  includes:
    - zh: 纳入由运行时代码、生成代码或 API 控制器形成 call_id 与结构化实参的工具调用。
      en: Includes tool calls whose call_id and structured arguments are formed by runtime code, generated code, or an API controller.
      ja: runtime code・generated code・API controller が call_id と structured arguments を形成する tool call を含みます。
  excludes:
    - zh: 排除用户在图形界面手动触发的工具动作、自然语言建议和未执行的代码片段。
      en: Excludes manually triggered GUI tool actions, natural-language suggestions, and unexecuted code snippets.
      ja: manual GUI tool action・natural-language suggestion・unexecuted code snippet を除きます。
  semantic_kind: activity
  aliases: []
