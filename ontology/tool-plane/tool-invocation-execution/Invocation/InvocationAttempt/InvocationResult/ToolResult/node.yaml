schema: moonweave.ai/ontology-node/v1
id: ToolResult
kind: concept
status: review
labels:
  zh: 工具结果
  en: Tool Result
  ja: ツール結果
semantics:
  short_definition:
    zh: 工具结果是与一个 call_id 和 attempt_id 关联、返回给调用方的工具输出记录。
    en: A Tool Result is a tool-output record returned to the caller and correlated with one call_id and attempt_id.
    ja: ツール結果は一 call_id/attempt_id と相関して caller へ返る tool-output record です。
  definition:
    zh: 工具结果是一种 InvocationResult，沿用 result_id、调用标识引用、尝试引用和接收时刻；其种差是返回调用相关键、工具错误标志以及文本或结构化内容。即使工具执行失败，执行边界也可返回 is_error=true 的 ToolResult，并由独立 ToolError 提供诊断。结果不是 ToolCallAttempt，也不能单独证明 RunAttempt 成功或外部状态已经改变。
    en: A Tool Result is an InvocationResult retaining result ID, invocation and attempt references, and receipt time. Its differentia is a call-correlation key, tool-error flag, and text or structured content. A failed execution may still return is_error=true while ToolError supplies diagnostics. The result is not the ToolCallAttempt and cannot by itself prove RunAttempt success or external state change.
    ja: ToolResult は InvocationResult の identity/reference/time を継承し call-correlation key・tool-error flag・content を持ちます。failure 時も is_error=true を返せ ToolError が diagnostic を提供します。ToolCallAttempt ではなく、単独で RunAttempt success や external state change を証明しません。
  why_needed:
    zh: MCP 式失败仍返回 Tool Result，因此结果与错误诊断必须分开；call_id 关联又能防止并行调用串线。
    en: MCP-style execution failure still returns a Tool Result, so result and error diagnostic must remain separate; call_id correlation also prevents parallel calls from crossing.
    ja: MCP-style failure でも Tool Result を返すため result/error diagnostic を分離し call_id correlation で parallel call crossing を防ぎます。
  includes:
    - zh: 纳入由确定 ToolCallAttempt 返回并包含 call_id、状态和内容载荷的结果。
      en: Includes results returned by a definite ToolCallAttempt with call_id, status, and content payload.
      ja: definite ToolCallAttempt が返し call_id・status・content payload を持つ result を含みます。
  excludes:
    - zh: 排除工具调用活动、错误诊断本身、未完成流片段、运行终态和副作用回执。
      en: Excludes tool-call activity, the error diagnostic itself, incomplete stream fragments, runtime terminal state, and effect receipts.
      ja: tool-call activity・error diagnostic 自体・incomplete stream fragment・runtime terminal state・effect receipt を除きます。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: call_id
      labels:
        zh: 调用标识
        en: call ID
        ja: call ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 关联产生该结果的 ToolCall。
        en: Correlates the result to its ToolCall.
        ja: result を ToolCall と相関します。
      allowed_values: []
      pattern: null
      example_value: call_weather_0042
      source_claims:
        - claim-tool-result-004
        - claim-tool-result-005
        - claim-tool-result-006
    - id: attempt_id
      labels:
        zh: 尝试标识
        en: attempt ID
        ja: 試行 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 关联实际返回该结果的 ToolCallAttempt。
        en: Correlates the result to the ToolCallAttempt that returned it.
        ja: result を返した ToolCallAttempt と相関します。
      allowed_values: []
      pattern: null
      example_value: tool-attempt-0042-2
      source_claims:
        - claim-tool-result-007
        - claim-tool-result-008
        - claim-tool-result-009
    - id: is_error
      labels:
        zh: 错误结果标志
        en: error-result flag
        ja: error result flag
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指示结果内容是否报告工具执行错误；不替代 ToolError 诊断。
        en: Indicates whether the content reports a tool-execution error without replacing ToolError diagnostics.
        ja: content が tool-execution error を報告するか示し ToolError diagnostic は置換しません。
      allowed_values: []
      pattern: null
      example_value: false
      source_claims:
        - claim-tool-result-010
        - claim-tool-result-011
        - claim-tool-result-012
    - id: content
      labels:
        zh: 结果内容
        en: result content
        ja: 結果内容
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存调用方可消费的文本、图像、音频或资源内容块。
        en: Stores caller-consumable text, image, audio, or resource content blocks.
        ja: caller-consumable text/image/audio/resource content block を保存します。
      allowed_values: []
      pattern: null
      example_value:
        - type: text
          text: 25°C
      source_claims:
        - claim-tool-result-013
        - claim-tool-result-014
        - claim-tool-result-015
    - id: structured_content
      labels:
        zh: 结构化结果
        en: structured content
        ja: 構造化結果
      datatype: object
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 在结果 Schema 存在时保存结构化输出。
        en: Stores structured output when a result schema is available.
        ja: result schema がある場合 structured output を保存します。
      allowed_values: []
      pattern: null
      example_value:
        temperature_c: 25
      source_claims:
        - claim-tool-result-016
        - claim-tool-result-017
        - claim-tool-result-018
    - id: payload_digest
      labels:
        zh: 载荷摘要
        en: payload digest
        ja: payload digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 用于校验保存内容与传输结果的一致性。
        en: Verifies consistency between stored content and the transported result.
        ja: stored content と transported result の consistency を検証します。
      allowed_values: []
      pattern: null
      example_value: sha256:1f4b...
      source_claims:
        - claim-tool-result-019
        - claim-tool-result-020
        - claim-tool-result-021
