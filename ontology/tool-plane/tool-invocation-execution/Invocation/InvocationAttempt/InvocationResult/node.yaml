schema: moonweave.ai/ontology-node/v1
id: InvocationResult
kind: concept
status: accepted
labels:
  zh: 调用返回记录
  en: Invocation Result
  ja: 呼び出し返却記録
semantics:
  short_definition:
    zh: 调用返回记录是一次调用尝试结束后返回给调用边界的信息记录。
    en: An Invocation Result is an information record returned to the invocation boundary after an attempt terminates.
    ja: 呼び出し返却記録は attempt 終了後 invocation boundary へ返る information record です。
  definition:
    zh: 调用返回记录是一种信息，以 result_id、invocation_id、attempt_id、接收时刻和返回状态为身份；它可承载输出、错误标志或内容引用，但不等同于执行活动、诊断解释、外部效应或汇总 RunOutcome。
    en: An Invocation Result is information identified by result_id, invocation_id, attempt_id, receipt time, and return status. It may carry output, an error indicator, or content references, but is not the execution activity, diagnostic explanation, external effect, or aggregate RunOutcome.
    ja: 呼び出し返却記録は result_id・invocation_id・attempt_id・receipt time・return status で識別する information です。output・error indicator・content reference を持てますが execution activity・diagnostic・external effect・aggregate RunOutcome ではありません。
  why_needed:
    zh: 统一结果上位层允许命令、工具和资源读取共享‘返回记录’语义，同时保留各自的输出结构。
    en: The result upper layer shares return-record semantics across commands, tools, and resource reads while preserving their different output structures.
    ja: result upper layer が command・tool・resource read の return-record semantics を共有し各 output structure を保持します。
  includes:
    - zh: 纳入与确定 invocation_id 和 attempt_id 相关联并已返回调用边界的信息。
      en: Includes information returned to the call boundary and correlated with a definite invocation_id and attempt_id.
      ja: definite invocation_id/attempt_id と相関し call boundary へ返った information を含みます。
  excludes:
    - zh: 排除执行尝试、尚未返回的流片段、错误诊断、任务成功结论和外部状态变化。
      en: Excludes the execution attempt, incomplete stream fragments, error diagnostics, task-success conclusions, and external state changes.
      ja: execution attempt・incomplete stream fragment・error diagnostic・task-success conclusion・external state change を除きます。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - result_id
  fields:
    - id: result_id
      labels:
        zh: 结果标识
        en: result ID
        ja: 結果 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识返回记录。
        en: Uniquely identifies the returned record.
        ja: returned record を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: result-weather-0042-2
      source_claims:
        - claim-invocation-result-003
        - claim-invocation-result-004
    - id: invocation_ref
      labels:
        zh: 调用引用
        en: invocation reference
        ja: 呼出し参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向产生该返回的 Invocation。
        en: References the Invocation for which the result was returned.
        ja: result 対象 Invocation を参照します。
      allowed_values: []
      pattern: null
      example_value: invocation-weather-0042
      source_claims:
        - claim-invocation-result-005
        - claim-invocation-result-006
    - id: attempt_ref
      labels:
        zh: 尝试引用
        en: attempt reference
        ja: 試行参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向实际产生该返回的 InvocationAttempt。
        en: References the InvocationAttempt that actually produced the return.
        ja: return を実際に生成した InvocationAttempt を参照します。
      allowed_values: []
      pattern: null
      example_value: tool-attempt-0042-2
      source_claims:
        - claim-invocation-result-007
        - claim-invocation-result-008
    - id: return_status
      labels:
        zh: 返回状态
        en: return status
        ja: 返却状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分 success、error、cancelled 与 timed_out 等返回状态。
        en: Distinguishes success, error, cancelled, and timed_out returns.
        ja: success・error・cancelled・timed_out return を区別します。
      allowed_values: []
      pattern: null
      example_value: success
      source_claims:
        - claim-invocation-result-009
        - claim-invocation-result-010
    - id: received_at
      labels:
        zh: 接收时刻
        en: received at
        ja: 受信時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录调用边界接收返回的 UTC 时刻。
        en: Records the UTC instant when the invocation boundary received the return.
        ja: invocation boundary が return を受信した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:30:03Z
      source_claims:
        - claim-invocation-result-011
        - claim-invocation-result-012
  constraints: []
  required_relation_constraints: []
examples:
  - id: InvocationResult-example-positive-manual-001
