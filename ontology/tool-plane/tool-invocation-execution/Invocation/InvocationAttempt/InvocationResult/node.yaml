    expected_result:
      zh: 建立 InvocationResult，并保留它与相邻规范、尝试或结果的独立身份。
      en: Create InvocationResult while preserving its identity from adjacent specifications, attempts, or results.
      ja: InvocationResult を作成し adjacent specification・attempt・result との separate identity を保持します。
    why_valid_or_invalid:
      zh: 纳入与确定 invocation_id 和 attempt_id 相关联并已返回调用边界的信息。
      en: Includes information returned to the call boundary and correlated with a definite invocation_id and attempt_id.
      ja: definite invocation_id/attempt_id と相関し call boundary へ返った information を含みます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-invocation-result-013
      - claim-invocation-result-014
  - id: InvocationResult-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 调用返回记录边界例
      en: Invocation Result boundary case
      ja: 呼び出し返却記録境界例
    scenario_id: null
    descriptions:
      zh: TraceSpan 记录了尝试耗时和状态，但没有调用方可消费的返回载荷，因此不是 InvocationResult。
      en: A TraceSpan records attempt duration and status but has no caller-consumable return payload, so it is not an InvocationResult.
      ja: TraceSpan は attempt duration/status を記録しても caller-consumable return payload がなく InvocationResult ではありません。
    field_values:
      result_id: result-weather-0042-2
    related_node_ids:
      - InvocationResult
    related_relation_ids: []
    expected_result:
      zh: 不建立 InvocationResult；按边界例所示保留在更准确的概念中。
      en: Do not create InvocationResult; keep the record in the more accurate concept identified by the boundary.
      ja: InvocationResult を作らず boundary が示す accurate concept に保持します。
    why_valid_or_invalid:
      zh: 排除执行尝试、尚未返回的流片段、错误诊断、任务成功结论和外部状态变化。
      en: Excludes the execution attempt, incomplete stream fragments, error diagnostics, task-success conclusions, and external state changes.
      ja: execution attempt・incomplete stream fragment・error diagnostic・task-success conclusion・external state change を除きます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-invocation-result-015
      - claim-invocation-result-016
