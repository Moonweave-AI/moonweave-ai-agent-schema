source_claims:
  - id: claim-resource-read-result-001
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 returns a resources/read result with a contents array whose text or binary items each carry their resource URI and optional media type. Moonweave models that correlated return as ResourceReadResult rather than as ResourceDefinition or subscription state.
    locator: Server Features > Resources > Protocol Messages > Reading Resources; Data Types > Resource Contents, Text Content and Binary Content
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-resource-read-result-002
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 JSON-RPC responses carry the same request id as ReadResourceRequest; Moonweave stores that correlation on ResourceReadResult.request_id.
    locator: Schema Reference > ReadResourceRequest.id and ReadResourceResult; Base Protocol > JSON-RPC correlation
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-resource-read-result-003
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 requires each returned text or binary resource-content item to carry its URI; Moonweave stores the normalized correlated URI on ResourceReadResult.resource_uri.
    locator: Server Features > Resources > Data Types > Text Content and Binary Content; Reading Resources response
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-resource-read-result-004
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 ReadResourceResult requires a contents array of text or binary resource-content records with URI and optional mimeType; Moonweave preserves that array as contents.
    locator: Schema Reference > ReadResourceResult.contents; Server Features > Resources > Resource Contents, Text Content and Binary Content
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-resource-read-result-005
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 resources/read returns a contents array with each item carrying the resource URI plus text or blob and optional media type. The case preserves those contents together with request correlation and receipt time, while its inherited InvocationResult fields identify the producing invocation attempt and mark the completed return as success.
    locator: Server Features > Resources > Protocol Messages > Reading Resources; Data Types > Text Content and Binary Content
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-resource-read-result-006
    source: eng-proto-mcp-2025-spec
    supports: MCP 2025-11-25 Resource declarations contain URI, name, title, description, icons, media type, and size, while resources/read results contain text or blob contents. A declaration without a correlated contents return is not ResourceReadResult.
    locator: Server Features > Resources > Data Types > Resource versus Resource Contents; Protocol Messages > Reading Resources
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-resource-read-result-007
    source: eng-proto-mcp-resources-2025-06-18
    supports: MCP defines resources/read as a URI-addressed request returning one or more resource-content records. The ResourceReadResult-is_a-InvocationResult positive case applies the documented distinction to the concrete endpoints and direction described here.
    locator: Server Features > Resources > Reading Resources; Resource Contents
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-resource-read-result-008
    source: eng-proto-mcp-resources-2025-06-18
    supports: MCP defines resources/read as a URI-addressed request returning one or more resource-content records. The ResourceReadResult-is_a-InvocationResult boundary case applies the documented distinction to the concrete endpoints and direction described here.
    locator: Server Features > Resources > Reading Resources; Resource Contents
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-resource-read-result-009
    source: eng-proto-mcp-resources-2025-06-18
    supports: MCP defines resources/read as a URI-addressed request returning one or more resource-content records. Moonweave uses that primary evidence to justify ResourceReadResult —is_a→ InvocationResult with the reviewed direction and boundary.
    locator: Server Features > Resources > Reading Resources; Resource Contents
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
