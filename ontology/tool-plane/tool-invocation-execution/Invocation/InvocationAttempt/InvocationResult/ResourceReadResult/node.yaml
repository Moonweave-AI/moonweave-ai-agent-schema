schema: moonweave.ai/ontology-node/v1
id: ResourceReadResult
kind: concept
status: review
labels:
  zh: 资源读取结果
  en: Resource Read Result
  ja: リソース読取結果
semantics:
  short_definition:
    zh: 资源读取结果是一次资源读取调用返回的 URI 内容记录。
    en: A Resource Read Result is the URI-content record returned by one resource-read invocation.
    ja: リソース読取結果は一 resource-read invocation が返す URI content record です。
  definition:
    zh: 资源读取结果是一种 InvocationResult，沿用 result_id、调用与尝试引用以及接收时刻，并以读取请求相关键、URI 和一个或多个文本或二进制内容项为种差；内容项可带媒体类型与版本线索。它不是 ResourceDefinition、缓存身份或订阅状态。
    en: A Resource Read Result is an InvocationResult that retains its result_id, invocation and attempt references, and receipt time and is differentiated by a read-request correlation key, URI, and one or more text or binary content items. Content items may carry media types and version hints; the result is not the ResourceDefinition, cache identity, or subscription state.
    ja: リソース読取結果は InvocationResult の result_id・invocation/attempt reference・receipt time を継承し、read-request correlation key・URI・一つ以上の text/binary content item を種差とします。content item は media type・version hint を持てますが ResourceDefinition・cache identity・subscription state ではありません。
  why_needed:
    zh: 独立结果节点允许同一 URI 在不同时刻返回不同内容，也不会误改稳定 ResourceDefinition。
    en: The distinct result node allows one URI to return different content at different times without mutating the stable ResourceDefinition.
    ja: distinct result node により同一 URI の time-varying content を stable ResourceDefinition 変更なしで表現できます。
  includes:
    - zh: 纳入与确定资源读取请求相关联并包含 URI、媒体类型和内容项的返回。
      en: Includes returns correlated with a definite resource-read request and carrying URI, media type, and content items.
      ja: definite resource-read request と相関し URI・media type・content item を持つ return を含みます。
  excludes:
    - zh: 排除 ResourceDefinition、resources/list 条目、订阅通知和未完成传输片段。
      en: Excludes ResourceDefinition, resources/list entries, subscription notifications, and incomplete transport fragments.
      ja: ResourceDefinition・resources/list entry・subscription notification・incomplete transport fragment を除きます。
  semantic_kind: information
  aliases: []
