schema: moonweave.ai/ontology-node/v1
id: ExecutionResult
kind: concept
status: accepted
labels:
  zh: 命令执行结果
  en: Command Execution Result
  ja: コマンド実行結果
semantics:
  short_definition:
    zh: 命令执行结果是命令调用尝试返回的输出、错误流与退出状态记录。
    en: A Command Execution Result is the output, error stream, and exit-status record returned by a command attempt.
    ja: コマンド実行結果は command attempt が返す output・error stream・exit-status record です。
  definition:
    zh: 命令执行结果是一种 InvocationResult，沿用 result_id、尝试引用和接收时刻，并以命令引用、stdout、stderr、exit_code 与产物引用为种差；它不再对应已弃用的 ExecutionRequest，也不因 exit_code=0 自动证明上层任务成功。
    en: A Command Execution Result is an InvocationResult that retains its result_id, attempt reference, and receipt time and is differentiated by a command reference, stdout, stderr, exit_code, and artifact references. It no longer corresponds to deprecated ExecutionRequest, and exit_code=0 does not by itself prove success of the higher-level task.
    ja: コマンド実行結果は InvocationResult の result_id・attempt reference・receipt time を継承し、command reference・stdout・stderr・exit_code・artifact reference を種差とします。deprecated ExecutionRequest には対応せず exit_code=0 だけで higher-level task success を証明しません。
  why_needed:
    zh: 命令专用结果把退出码和输出流从通用 InvocationResult 中细化出来，又与 Runtime 的 RunOutcome 分开。
    en: The command-specific result specializes exit code and streams while remaining separate from the runtime RunOutcome.
    ja: command-specific result が exit code/stream を細分化し runtime RunOutcome と分離します。
  includes:
    - zh: 纳入由确定 Command 尝试返回并具有退出状态或输出引用的结果记录。
      en: Includes result records returned by a definite Command attempt with exit status or output references.
      ja: definite Command attempt が返し exit status/output reference を持つ result record を含みます。
  excludes:
    - zh: 排除命令文本、执行活动、仅有追踪时长的 Span 和任务级 RunOutcome。
      en: Excludes command text, execution activity, a span carrying only duration, and task-level RunOutcome.
      ja: command text・execution activity・duration-only span・task-level RunOutcome を除きます。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: command_ref
      labels:
        zh: 命令引用
        en: command reference
        ja: command 参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向产生该输出的 Command。
        en: References the Command for which output was returned.
        ja: output 対象 Command を参照します。
      allowed_values: []
      pattern: null
      example_value: command-build-009
      source_claims:
        - claim-execution-result-003
        - claim-execution-result-004
    - id: exit_code
      labels:
        zh: 退出码
        en: exit code
        ja: 終了 code
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录进程退出状态，不等同于任务结果。
        en: Records process exit status without equating it to task outcome.
        ja: process exit status を記録し task outcome と同一視しません。
      allowed_values: []
      pattern: null
      example_value: 0
      source_claims:
        - claim-execution-result-005
        - claim-execution-result-006
    - id: stdout_ref
      labels:
        zh: 标准输出引用
        en: stdout reference
        ja: stdout 参照
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用受控存储中的标准输出。
        en: References standard output in controlled storage.
        ja: controlled storage の stdout を参照します。
      allowed_values: []
      pattern: null
      example_value: blob:stdout-009
      source_claims:
        - claim-execution-result-007
        - claim-execution-result-008
    - id: stderr_ref
      labels:
        zh: 标准错误引用
        en: stderr reference
        ja: stderr 参照
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用受控存储中的标准错误。
        en: References standard error in controlled storage.
        ja: controlled storage の stderr を参照します。
      allowed_values: []
      pattern: null
      example_value: blob:stderr-009
      source_claims:
        - claim-execution-result-009
        - claim-execution-result-010
    - id: artifact_refs
      labels:
        zh: 产物引用
        en: artifact references
        ja: artifact 参照
      datatype: array
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用命令执行产生并进入受控存储的文件或构建产物；空数组明确表示本次命令没有产物。
        en: References files or build artifacts produced by the command and placed in controlled storage; an empty array explicitly records that no artifact was produced.
        ja: command が生成し controlled storage に置いた file/build artifact を参照し、空 array は artifact がないことを明示します。
      allowed_values: []
      pattern: null
      example_value: []
      source_claims:
        - claim-execution-result-011
  constraints: []
  required_relation_constraints: []
