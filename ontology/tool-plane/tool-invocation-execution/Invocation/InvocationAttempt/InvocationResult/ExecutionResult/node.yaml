      - claim-execution-result-013
  - id: ExecutionResult-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 命令执行结果边界例
      en: Command Execution Result boundary case
      ja: コマンド実行結果境界例
    scenario_id: null
    descriptions:
      zh: 运行汇总根据多个命令和断言判定发布是否成功，这是 RunOutcome，不是某个命令的 ExecutionResult。
      en: A run summary decides release success from several commands and assertions; that is RunOutcome, not one command's ExecutionResult.
      ja: run summary が複数 command/assertion から release success を判定するのは RunOutcome で一 command の ExecutionResult ではありません。
    field_values:
      result_id: command-result-009
    related_node_ids:
      - ExecutionResult
      - InvocationResult
    related_relation_ids:
      - ExecutionResult-is_a-InvocationResult
    expected_result:
      zh: 不建立 ExecutionResult；按边界例所示保留在更准确的概念中。
      en: Do not create ExecutionResult; keep the record in the more accurate concept identified by the boundary.
      ja: ExecutionResult を作らず boundary が示す accurate concept に保持します。
    why_valid_or_invalid:
      zh: 排除命令文本、执行活动、仅有追踪时长的 Span 和任务级 RunOutcome。
      en: Excludes command text, execution activity, a span carrying only duration, and task-level RunOutcome.
      ja: command text・execution activity・duration-only span・task-level RunOutcome を除きます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-execution-result-014
      - claim-execution-result-015
