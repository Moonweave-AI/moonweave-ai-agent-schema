      zh: pnpm test 命令返回 exit_code=0、stdout 引用和空 stderr；系统保留为 Command Execution Result。
      en: The `pnpm test` command returns exit_code=0, a stdout reference, and empty stderr; the system records a Command Execution Result.
      ja: "`pnpm test` command が exit_code=0・stdout reference・empty stderr を返し Command Execution Result として記録します。"
    field_values:
      result_id: command-result-009
      invocation_ref: invocation:command-build-009
      attempt_ref: attempt-command-009-1
      return_status: success
      received_at: 2026-07-16T01:40:04Z
      command_ref: command-build-009
