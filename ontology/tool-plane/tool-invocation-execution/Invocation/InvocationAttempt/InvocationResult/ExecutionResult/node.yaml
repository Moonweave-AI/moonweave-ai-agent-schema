    expected_result:
      zh: 建立 ExecutionResult，并保留它与相邻规范、尝试或结果的独立身份。
      en: Create ExecutionResult while preserving its identity from adjacent specifications, attempts, or results.
      ja: ExecutionResult を作成し adjacent specification・attempt・result との separate identity を保持します。
    why_valid_or_invalid:
      zh: 纳入由确定 Command 尝试返回并具有退出状态或输出引用的结果记录。
      en: Includes result records returned by a definite Command attempt with exit status or output references.
      ja: definite Command attempt が返し exit status/output reference を持つ result record を含みます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
