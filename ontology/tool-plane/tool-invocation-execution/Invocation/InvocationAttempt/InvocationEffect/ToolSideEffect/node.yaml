schema: moonweave.ai/ontology-node/v1
id: ToolSideEffect
kind: concept
status: accepted
labels:
  zh: 工具副作用
  en: Tool Side Effect
  ja: ツール副作用
semantics:
  short_definition:
    zh: 工具副作用是由某次工具调用尝试造成并有证据确认的外部状态变化。
    en: A Tool Side Effect is an evidenced external-state change caused by one tool-call attempt.
    ja: ツール副作用は一 tool-call attempt が起こし evidence で確認された external-state change です。
  definition:
    zh: 工具副作用是 InvocationEffect 的子类，表示外部状态已经改变，并继承同一 side_effect_id、致因操作、变化类型、受影响资源、观测变化和发生时间。它的工具特有种差是可核验的提交回执与可选幂等键，而不是第二套 effect_id、工具尝试或外部目标身份。需要 CommitGate 时，允许决定必须先于该事件；重放同一幂等结果而未产生新变化时不得创建新副作用。
    en: A ToolSideEffect is an InvocationEffect subtype inheriting the same side_effect_id, causal operation, change kind, affected resources, observed change, and occurrence time. Its tool-specific differentia is a verifiable commit receipt and optional idempotency key, not a second effect ID, tool-attempt identity, or external-target identity. When a CommitGate is required, an allowing decision precedes the event; replaying an idempotent result without a new change creates no new side effect.
    ja: ToolSideEffect は InvocationEffect subtype で、同じ side_effect_id・causal operation・change kind・affected resources・observed change・occurrence time を継承します。tool-specific 種差は verifiable commit receipt と optional idempotency key であり、第二の effect ID・tool attempt identity・external target identity ではありません。CommitGate 必須時は allow decision が先行し、新 change のない idempotent replay は新 side effect を作りません。
  why_needed:
    zh: 工具专化层可连接工具尝试、提交门、通用 SideEffect 与恢复动作，同时不把结果文本误认作已生效副作用。
    en: The tool specialization connects the attempt, commit gate, generic SideEffect, and recovery action without mistaking result text for an enacted effect.
    ja: tool specialization が attempt・commit gate・generic SideEffect・recovery action を結び result text を enacted effect と誤認しません。
  includes:
    - zh: 纳入可定位到 ToolCallAttempt 且有外部回执或独立观测的实际写入、发送、删除、收费等变化。
      en: Includes actual writes, sends, deletes, charges, or other changes locatable to a ToolCallAttempt with an external receipt or independent observation.
      ja: ToolCallAttempt へ定位でき external receipt/independent observation を持つ actual write/send/delete/charge 等を含みます。
  excludes:
    - zh: 排除只读工具结果、效果声明、预览、CommitRequest、被拒绝的写入和没有证据的成功消息。
      en: Excludes read-only tool results, effect declarations, previews, CommitRequest, rejected writes, and success messages without evidence.
      ja: read-only tool result・effect declaration・preview・CommitRequest・rejected write・evidence なし success message を除きます。
  semantic_kind: event
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: commit_receipt_ref
      labels:
        zh: 提交回执引用
        en: commit-receipt reference
        ja: commit receipt 参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用证明提交已生效的服务回执。
        en: References the service receipt proving the commit took effect.
        ja: commit effect を証明する service receipt を参照します。
      allowed_values: []
      pattern: null
      example_value: receipt:ticket-778
      source_claims:
        - claim-tool-side-effect-004
        - claim-tool-side-effect-005
        - claim-tool-side-effect-006
    - id: idempotency_key
      labels:
        zh: 幂等键
        en: idempotency key
        ja: 冪等 key
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 关联安全重放并帮助检测重复副作用。
        en: Correlates safe replay and helps detect duplicate effects.
        ja: safe replay を相関し duplicate effect detection を助けます。
      allowed_values: []
      pattern: null
      example_value: ticket-create-778
      source_claims:
        - claim-tool-side-effect-007
        - claim-tool-side-effect-008
        - claim-tool-side-effect-009
  constraints:
    - id: tool-side-effect-idempotent-replay-is-not-new-effect
      severity: error
      expression_language: plain
      expression: reusing idempotency_key without a new externally observed change preserves the existing side_effect_id and does not create another ToolSideEffect
      explanations:
        zh: 幂等重放是同一结果的重取，不是新的外部变化事件。
        en: An idempotent replay retrieves the same outcome and is not a new external-change event.
        ja: idempotent replay は同じ outcome の再取得であり、新 external-change event ではありません。
      source_claims:
        - claim-tool-side-effect-010
  required_relation_constraints:
    - id: tool-side-effect-caused-by-one-tool-attempt
      direction: incoming
      predicate: may_cause
      target_concept_id: ToolCallAttempt
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个已实现效应恰好归因于一个直接的 ToolCallAttempt；重试但未产生新变化的尝试不创建新效应。
        en: Each realized effect is attributed to exactly one directly causal ToolCallAttempt; a retry that creates no new change creates no new effect.
        ja: 各 realized effect は一つの directly causal ToolCallAttempt に帰属し、新 change を生じない retry は新 effect を作りません。
      source_claims:
        - claim-tool-side-effect-011
