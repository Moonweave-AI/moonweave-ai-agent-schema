relations:
  - id: ToolSideEffect-recovered_by-RecoveryAction
    predicate: recovered_by
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 由其恢复
      en: recovered by
      ja: 復旧される
    definitions:
      zh: ToolSideEffect 仅在针对同一个已生效变化的 RecoveryAction 实际完成补偿、回滚或修复，并由后置条件核验恢复结果与残留影响时指向该动作；未执行的建议或仅启动但未核验的动作不构成 recovered_by。
      en: ToolSideEffect is recovered_by a RecoveryAction only when that action actually completed compensation, rollback, or repair against the same enacted change and postcondition verification recorded the recovery outcome and residual effects; an unexecuted suggestion or an action merely started without verification does not establish recovered_by.
      ja: ToolSideEffect は同一 enacted change に対する RecoveryAction が compensation/rollback/repair を actually completed し postcondition verification が recovery outcome と residual effects を記録した場合のみ recovered_by で結び unexecuted suggestion や verification なしの started action では成立しません。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_target_of_recovered_by
      labels:
        zh: 反向：recovered by
        en: is target of recovered by
        ja: 逆方向：recovered by
    conditions:
      - id: ToolSideEffect-recovered_by-RecoveryAction-condition-manual-20260717
        severity: error
        expression_language: plain
        expression: Assert only when the RecoveryAction actually completed, its target_effect_ref matches the same ToolSideEffect identity, and postcondition verification records the recovered state plus any residual effects; a proposal, queued action, or unverified execution is insufficient.
        explanations:
          zh: 仅当 RecoveryAction 已实际完成、target_effect_ref 匹配同一个 ToolSideEffect 身份，并且后置条件核验记录恢复状态及任何残留影响时成立；提案、排队动作或未核验执行不足。
          en: Assert only when the RecoveryAction actually completed, its target_effect_ref matches the same ToolSideEffect identity, and postcondition verification records the recovered state plus any residual effects; a proposal, queued action, or unverified execution is insufficient.
          ja: RecoveryAction が actually completed し target_effect_ref が same ToolSideEffect identity と一致し postcondition verification が recovered state と residual effects を記録する場合のみ成立し proposal・queued action・unverified execution は不十分です。
        source_claims:
          - claim-tool-side-effect-021
