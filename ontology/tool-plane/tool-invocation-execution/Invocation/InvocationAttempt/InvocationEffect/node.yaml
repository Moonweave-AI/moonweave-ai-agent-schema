  definitions:
    zh: InvocationAttempt may_cause 与该 attempt_id 可追溯关联的 InvocationEffect；只有外部目标已发生可观测状态变化并具备回执、审计事件或等价证据时才实例化效应。may_cause 表达调用尝试具有效应可能性，不把返回文本、预览或批准请求误当成已经发生的效应。
    en: An InvocationAttempt may_cause an InvocationEffect traceably correlated to its attempt_id. The effect instance exists only when an external target has undergone an observable state change with a receipt, audit event, or equivalent evidence. may_cause expresses effect potential without treating result text, a preview, or an approval request as an effect that already occurred.
    ja: InvocationAttempt は attempt_id と追跡可能に相関する InvocationEffect を may_cause します。effect instance は external target の observable state change と receipt・audit event 等の証拠がある場合のみ成立し、result text・preview・approval request を既発生 effect と誤認しません。
