schema: moonweave.ai/ontology-node/v1
id: InvocationEffect
kind: concept
status: accepted
labels:
  zh: 调用效应
  en: Invocation Effect
  ja: 呼び出し効果
semantics:
  short_definition:
    zh: 调用效应是可归因于一次调用尝试的外部状态变化事件。
    en: An Invocation Effect is an external-state-change event attributable to an invocation attempt.
    ja: 呼び出し効果は invocation attempt に帰属できる external-state-change event です。
  definition:
    zh: 调用效应是 SideEffect 的子类：它仍是同一项由 side_effect_id 标识的外部状态变化事件，种差仅在于该变化由一个可追踪的 InvocationAttempt 直接造成。调用效应不另建 effect_id、attempt_ref、外部目标或发生时间副本；这些事实分别由继承字段和因果关系表达。计划、预览、批准请求和返回文本都不是实际效应。
    en: An InvocationEffect is a SideEffect subtype and remains the same external state-change occurrence identified by side_effect_id. Its differentia is that one traceable InvocationAttempt directly caused the change. It does not create duplicate effect_id, attempt_ref, external-target, or occurrence-time fields; inherited facts and the causal relation carry those meanings. Plans, previews, approval requests, and result text are not realized effects.
    ja: InvocationEffect は SideEffect subtype であり、side_effect_id が識別する同じ external state-change occurrence です。種差は一つの traceable InvocationAttempt が change を直接生じたことです。effect_id・attempt_ref・external target・occurrence time の duplicate field を作らず、継承 field と causal relation で表します。plan・preview・approval request・result text は realized effect ではありません。
  why_needed:
    zh: 实际效应根把‘将要写入’与‘已经写入’分开，可在提交门之后核验副作用而不把声明当事实。
    en: The actual-effect root separates ‘will write’ from ‘did write’, enabling post-gate verification without treating declarations as facts.
    ja: actual-effect root が will write と did write を分け post-gate verification を可能にし declaration を fact にしません。
  includes:
    - zh: 纳入有外部目标、发生时刻和独立回执或观测证据的状态变化。
      en: Includes state changes with an external target, occurrence time, and independent receipt or observation evidence.
      ja: external target・occurrence time・independent receipt/observation evidence を持つ state change を含みます。
  excludes:
    - zh: 排除 Effect 计划、CommitRequest、批准决定、预览结果、只读调用和无证据的自报成功。
      en: Excludes effect plans, CommitRequest, approval decisions, preview results, read-only calls, and unverified self-reported success.
      ja: effect plan・CommitRequest・approval decision・preview result・read-only call・unverified self-report を除きます。
  semantic_kind: event
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints:
    - id: invocation-effect-caused-by-one-attempt
      direction: incoming
      predicate: may_cause
      target_concept_id: InvocationAttempt
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每个已实现效应恰好归因于一个直接的 InvocationAttempt；重试但未产生新变化的尝试不创建新效应。
        en: Each realized effect is attributed to exactly one directly causal InvocationAttempt; a retry that creates no new change creates no new effect.
        ja: 各 realized effect は一つの directly causal InvocationAttempt に帰属し、新 change を生じない retry は新 effect を作りません。
      source_claims:
        - claim-invocation-effect-004
