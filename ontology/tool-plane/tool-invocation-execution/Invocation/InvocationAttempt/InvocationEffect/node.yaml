source_claims:
  - id: claim-invocation-effect-001
    source: eng-proto-mcp-tools-2025-06-18
    supports: MCP separates a tools/call request from its Tool Result, requires a result for tool execution errors, and reserves protocol errors for malformed or unknown requests. Moonweave uses this primary evidence to delimit InvocationEffect as event with the reviewed boundary stated in its definition.
    locator: Server Features > Tools > Calling Tools; Tool Result; Error Handling
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-invocation-effect-002
    source: eng-fw-openai-hitl
    supports: OpenAI HITL records a pending tool call, a per-call approval or rejection, and later resumption of the original run. Moonweave uses this primary evidence to delimit InvocationEffect as event with the reviewed boundary stated in its definition.
    locator: Human-in-the-loop > Tool approval requests; approve, reject and resume
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-invocation-effect-003
    source: eng-api-stripe-idempotency
    supports: Stripe documents that retrying a mutation with the same idempotency key replays the first saved response instead of repeating the external effect. Moonweave uses this primary evidence to delimit InvocationEffect as event with the reviewed boundary stated in its definition.
    locator: API Reference > Idempotent requests > replaying a request with the same key
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
