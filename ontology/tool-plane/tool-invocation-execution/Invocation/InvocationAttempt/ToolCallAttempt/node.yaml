schema: moonweave.ai/ontology-node/v1
id: ToolCallAttempt
kind: concept
labels:
  zh: 工具调用尝试
  en: Tool-call attempt
  ja: ツール呼び出し試行
semantics:
  short_definition:
    zh: 专门派发一个工具调用的 InvocationAttempt 子类。
    en: An InvocationAttempt subtype specifically dispatching one tool call.
    ja: 一つのツール呼び出しを配信する InvocationAttempt の下位型。
  definition:
    zh: >-
      ToolCallAttempt 是目标为 ToolCall 的本地 InvocationAttempt。它记录本地尝试和用于发送调用的适配器表面；它不是 MCP tools/call 请求、OpenAI function_call item 或 Responses mcp_call item，这些原生记录可从底层尝试引用。它是实际子类，因为每个 ToolCallAttempt 都是目标为工具调用的 InvocationAttempt。
    en: >
      A ToolCallAttempt is a local InvocationAttempt whose target is a ToolCall. It records the local
      attempt and the adapter surface used to send the call. It is not the MCP tools/call request, the
      OpenAI function_call item, or a Responses mcp_call item; those native records can be referenced
      from the underlying attempt. It is a true subtype because every ToolCallAttempt remains an
      InvocationAttempt with the additional invariant that its target is a tool call.
    ja: >-
      ToolCallAttempt は対象が ToolCall であるローカル InvocationAttempt である。ローカル attempt と呼び出し送信に使う adapter surface を記録する。MCP tools/call 要求、OpenAI function_call item、Responses mcp_call item そのものではなく、これらのネイティブ記録は基礎 attempt から参照できる。各 ToolCallAttempt は tool call を対象とする InvocationAttempt なので真の subtype である。
  why_needed:
    zh: >-
      工具调用通常需要表面特定的派发、校验和重试证据。将此尝试类型与 ToolCall 区分，防止把计划或已发出的调用混同为主机的单次投递尝试。
    en: >
      Tool calls often need surface-specific dispatch, validation, and retry evidence. Distinguishing
      this attempt type from ToolCall prevents a planned or emitted call from being confused with the
      host's individual delivery attempt.
    ja: >-
      ツール呼び出しにはしばしば表面固有の配信、検証、再試行証拠が必要である。この attempt type を ToolCall と区別することで、予定または発行済みの call をホストの個別 delivery attempt と混同しない。
  includes:
    - {zh: 对尝试和工具调用的本地引用, en: Local references to the attempt and tool call, ja: 試行とツール呼び出しへのローカル参照}
    - {zh: 本地适配器表面和派发状态, en: Local adapter surface and dispatch state, ja: ローカルアダプター表面と配信状態}
  excludes:
    - {zh: 工具调用的原生请求字段或工具结果, en: Native request fields of the tool call or the tool result, ja: ツール呼び出しのネイティブ要求項目またはツール結果}
  semantic_kind: activity
  aliases:
    - {language: en, value: tool dispatch attempt, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      适配器校验本地 ToolCall 投影并创建其协议原生交换。MCP 派发创建带 name 和可选 arguments 的 tools/call，Responses 函数派发处理 function_call item 并返回 function_call_output，远程 MCP 派发通过 mcp_call output item 观察；该记录只记录围绕交换的主机尝试。
    en: >
      The adapter validates the local ToolCall projection and creates its protocol-native exchange.
      MCP dispatch creates tools/call with name and optional arguments; Responses function dispatch
      handles a function_call item and returns function_call_output; remote MCP dispatch is observed
      through an mcp_call output item. This record only records the host attempt around that exchange.
    ja: >-
      adapter はローカル ToolCall projection を検証して protocol-native exchange を作る。MCP 配信は name と任意 arguments を持つ tools/call を作り、Responses function 配信は function_call item を扱って function_call_output を返し、remote MCP 配信は mcp_call output item を通じて観測される。この記録は exchange 周辺の host attempt だけを記録する。
  typical_input:
    - description: First local attempt to send an MCP tool call.
      format: '{"local_tool_call_attempt_id":"tool-attempt-1","local_tool_call_ref":"tool-call-42","local_adapter_surface":"mcp_tools_call","local_dispatch_state":"sent"}'
      source_claims: [moonweave-tool-call-attempt]
  typical_output:
    - description: Native wire evidence remains referenced rather than copied into local fields.
      format: '{"local_tool_call_attempt_id":"tool-attempt-1","local_native_exchange_ref":"mcp-session-42#id-2"}'
      source_claims: [moonweave-tool-call-attempt]
  reference_implementations:
    - name: MCP Tools specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines native tools/call request and error boundaries.
    - name: OpenAI Function Calling guide
      url: https://developers.openai.com/api/docs/guides/function-calling
      description: Defines function_call and function_call_output flow.
structure:
  identity_keys: [local_tool_call_attempt_id]
  fields:
    - id: local_tool_call_attempt_id
      labels: {zh: 工具调用尝试标识, en: Tool-call attempt ID, ja: ツール呼び出し試行 ID}
      definitions: {zh: 主机分配给该工具派发尝试的标识, en: The host-assigned identifier for this tool-dispatch attempt, ja: このツール配信試行に対するホスト割当て識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: tool-attempt-1
      allowed_values: []
      source_claims: [moonweave-tool-call-attempt]
    - id: local_tool_call_ref
      labels: {zh: 工具调用引用, en: Tool-call reference, ja: ツール呼び出し参照}
      definitions: {zh: 被该尝试派发的本地 ToolCall 引用, en: The local ToolCall reference dispatched by this attempt, ja: この試行が配信するローカル ToolCall 参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: tool-call-42
      allowed_values: []
      source_claims: [moonweave-tool-call-attempt]
    - id: local_adapter_surface
      labels: {zh: 本地适配器表面, en: Local adapter surface, ja: ローカルアダプター表面}
      definitions: {zh: 主机派发该调用所用的来源适配器分类, en: The source-adapter classification the host uses to dispatch this call, ja: この呼び出しの配信にホストが使うソースアダプター分類}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp_tools_call
      allowed_values: [mcp_tools_call, openai_responses_function, openai_responses_remote_mcp]
      source_claims: [moonweave-tool-call-attempt]
    - id: local_dispatch_state
      labels: {zh: 本地派发状态, en: Local dispatch state, ja: ローカル配信状態}
      definitions: {zh: 主机对本次发送动作的局部状态，不表示远端执行成功, en: The host state of this send action and not proof of remote execution success, ja: この送信動作に対するホスト状態でありリモート実行成功の証明ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sent
      allowed_values: [prepared, sent, blocked, failed]
      source_claims: [moonweave-tool-call-attempt]
    - id: local_native_exchange_ref
      labels: {zh: 原生交换引用, en: Native exchange reference, ja: ネイティブ交換参照}
      definitions: {zh: 对该尝试创建或观察到的原生协议记录引用, en: A reference to the native protocol record created or observed for this attempt, ja: この試行で作成または観測したネイティブプロトコル記録への参照}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: mcp-session-42#id-2
      allowed_values: []
      source_claims: [moonweave-tool-call-attempt]
    - id: local_attempt_id
      labels: {zh: 本地尝试标识, en: Local attempt ID, ja: ローカル試行 ID}
      definitions: {zh: 主机分配给一次执行尝试的标识, en: A host-assigned identifier for one execution attempt, ja: 一回の実行試行に対するホスト割当て識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: attempt-42-1
      allowed_values: []
      source_claims: [moonweave-tool-call-attempt]
    - id: local_invocation_ref
      labels: {zh: 调用引用, en: Invocation reference, ja: 呼び出し参照}
      definitions: {zh: 包含该尝试的本地调用, en: The local invocation that contains this attempt, ja: この試行を含むローカル呼び出し}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: inv-42
      allowed_values: []
      source_claims: [moonweave-tool-call-attempt]
    - id: attempt_index
      labels: {zh: 尝试序号, en: Attempt index, ja: 試行番号}
      definitions: {zh: 同一调用中的从一开始的尝试序号, en: One-based ordinal of the attempt within the same invocation, ja: 同じ呼び出し内で一から始まる試行順序}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims: [moonweave-tool-call-attempt]
    - id: local_outcome
      labels: {zh: 本地尝试结果, en: Local attempt outcome, ja: ローカル試行結果}
      definitions: {zh: 主机对尝试状态的本地判断，不取代协议错误或远程任务状态, en: "A host's local disposition of the attempt, not a replacement for protocol error or remote task state", ja: ホストによるローカル試行の判断でありプロトコルエラーやリモートタスク状態の置換ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: running
      allowed_values: [running, succeeded, failed, timed_out, cancelled]
      source_claims: [moonweave-tool-call-attempt]
  constraints:
    - id: tool-call-attempt-references-tool-call
      severity: error
      expression_language: plain
      expression: "local_tool_call_ref identifies a ToolCall planned in the same local invocation context as this local_tool_call_attempt_id."
      explanation: {zh: "local_tool_call_ref 标识与该同一记录子类型处于同一本地调用上下文的 ToolCall。", en: "The ToolCall reference is correlated with this same-record specialization's local invocation context.", ja: "local_tool_call_ref は、この同一レコードの下位型と同じローカル呼び出し文脈の ToolCall を識別する。"}
      source_claims: [moonweave-tool-call-attempt]
    - id: tool-call-attempt-sent-is-not-success
      severity: error
      expression_language: plain
      expression: local_dispatch_state sent proves only host dispatch; success or failure is established by a correlated result or diagnostic.
      explanation:
        zh: local_dispatch_state 为 sent 仅证明主机派发；成功或失败须由关联结果或诊断确定。
        en: local_dispatch_state sent proves only host dispatch; success or failure is established by a correlated result or diagnostic.
        ja: local_dispatch_state sent はホスト配信のみを示し、成功または失敗は相関結果または診断で確定する。
      source_claims: [mcp-tools-call-boundary, moonweave-tool-call-attempt]
    - id: tool-call-attempt-id-same-record-parent-identity
      severity: error
      expression_language: plain
      expression: "local_tool_call_attempt_id = local_attempt_id; both identify the same local InvocationAttempt record and inherited parent fields belong to that one record."
      explanation: {zh: "local_tool_call_attempt_id 与 local_attempt_id 标识同一条本地 InvocationAttempt 记录，继承的父字段属于该同一记录。", en: "The child and parent IDs are equal representations of one local record, not a link to a second parent record.", ja: "local_tool_call_attempt_id と local_attempt_id は同じローカル InvocationAttempt レコードを識別し、継承した親フィールドはその一つのレコードに属する。"}
      source_claims: [moonweave-tool-call-attempt]
  required_relations: []
examples:
  - id: tool-call-attempt-positive-mcp-send

    labels: {zh: MCP 工具派发, en: MCP tool dispatch, ja: MCP ツール配信}

    descriptions:
      zh: ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]；Anthropic content:[{type:"tool_use",id:"toolu_01",name:"get_weather",input:{location:"Paris"}}]；Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。
      en: ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]; Anthropic content:[{type:"tool_use",id:"toolu_01",name:"get_weather",input:{location:"Paris"}}]; Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}}).
      ja: ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]。Anthropic tool_use。Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。
    field_values: {local_tool_call_attempt_id: tool-attempt-1, local_tool_call_ref: tool-call-42, local_adapter_surface: mcp_tools_call, local_dispatch_state: sent, local_native_exchange_ref: mcp-session-42#id-2}
    related_node_ids: [ToolCallAttempt, InvocationAttempt, ToolCall]
    related_relation_ids: [ToolCallAttempt-is_a-InvocationAttempt]

    source_claims: [mcp-tools-call-boundary, moonweave-tool-call-attempt]
  - id: tool-call-attempt-counterexample-result-as-send

    labels: {zh: 把结果当作派发, en: Result treated as dispatch, ja: 結果を配信として扱う}

    descriptions:
      zh: 反例：ReAct Action 无对应 Observation 就继续推理；Anthropic tool_use 缺少配对 tool_result(tool_use_id)；Vercel AI SDK execute 抛错未捕获。
      en: Counterexample: ReAct continues reasoning without Observation for Action; Anthropic tool_use missing paired tool_result(tool_use_id); Vercel AI SDK execute error uncaught.
      ja: 反例：ReAct Action に Observation なしで reasoning 継続。Anthropic tool_use に tool_result ペア欠落。Vercel AI SDK execute エラー未捕捉。
    field_values: {local_tool_call_attempt_id: tool-attempt-bad, local_tool_call_ref: tool-call-42, local_adapter_surface: mcp_tools_call, local_dispatch_state: "Current weather: 72 F"}
    related_node_ids: [ToolCallAttempt, ToolResult]
    related_relation_ids: [ToolCallAttempt-is_a-InvocationAttempt]

    source_claims: [mcp-tools-call-boundary, moonweave-tool-call-attempt]
  - id: tool-call-attempt-boundary-responses-item

    labels: {zh: 本地尝试与 Responses item 边界, en: Local attempt versus Responses-item boundary, ja: ローカル試行と Responses item の境界}

    descriptions:
      zh: ReAct 文本 Action 标记 vs Anthropic structured tool_use vs Vercel AI SDK Zod schema tool 的 wire 契约边界；本地 Invocation 活动非原生封包。
      en: Wire contract boundary among ReAct text Action markers, Anthropic structured tool_use, Vercel AI SDK Zod schema tools; local Invocation activity is not native envelope.
      ja: ReAct テキスト Action marker、Anthropic structured tool_use、Vercel AI SDK Zod schema tool の wire 契約境界。ローカル Invocation 活動はネイティブ envelope ではない。
    field_values: {local_tool_call_attempt_id: tool-attempt-fc, local_tool_call_ref: tool-call-fc, local_adapter_surface: openai_responses_function, local_dispatch_state: sent, local_native_exchange_ref: "responses:call_123"}
    related_node_ids: [ToolCallAttempt, ToolCall, InvocationAttempt]
    related_relation_ids: [ToolCallAttempt-is_a-InvocationAttempt]

    source_claims: [openai-function-call-items, moonweave-tool-call-attempt]
  - id: tool-call-attempt-instance-remote-mcp-blocked

    labels: {zh: 远程 MCP 被阻止实例, en: Remote-MCP blocked instance, ja: リモート MCP ブロック済みインスタンス}

    descriptions:
      zh: ReAct HotpotQA 实例：Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup[Arthur's Magazine]→Finish[1850]；Anthropic tool_use_id=toolu_01A09q90qw90 配对 tool_result。
      en: ReAct HotpotQA instance: Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup→Finish[1850]; Anthropic tool_use_id=toolu_01A09q90qw90 paired with tool_result.
      ja: ReAct HotpotQA 実例：Thought→Action: Search→Observation→Lookup→Finish[1850]。Anthropic tool_use_id=toolu_01A09q90qw90 が tool_result とペア。
    field_values: {local_tool_call_attempt_id: tool-attempt-mcp, local_tool_call_ref: tool-call-mcp, local_adapter_surface: openai_responses_remote_mcp, local_dispatch_state: blocked}
    related_node_ids: [ToolCallAttempt, ToolCall]
    related_relation_ids: [ToolCallAttempt-is_a-InvocationAttempt]

    source_claims: [moonweave-tool-call-attempt]
parent_relation:
  id: ToolCallAttempt-is_a-InvocationAttempt
  predicate: is_a
  target: concept:InvocationAttempt
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是调用尝试的一种, en: is an invocation-attempt subtype, ja: 呼び出し試行の下位型である}
  definition: {zh: 每个 ToolCallAttempt 都是目标为 ToolCall 的 InvocationAttempt, en: Every ToolCallAttempt is an InvocationAttempt targeted at a ToolCall, ja: すべての ToolCallAttempt は ToolCall を対象とする InvocationAttempt である}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_tool_call_attempt_subtype, labels: {zh: 具有工具调用尝试子类, en: has tool-call-attempt subtype, ja: ツール呼び出し試行下位型を持つ}}
  conditions: []
  temporal_scope: execution
  boundary_context: This subtype specializes the attempt target; it does not assert a result, error, or provider-native message shape.
  constraints: []
  examples: []
  source_claims: [moonweave-tool-call-attempt]
  distinct_fact_rationale: Every ToolCallAttempt retains InvocationAttempt semantics and adds the ToolCall target invariant. It uses one same-record identity in which local_tool_call_attempt_id identifies the same local InvocationAttempt record, so a second InvocationAttempt reference field is not permitted.
relations: []
