        en: Records the idempotency key actually used by this attempt so transport replay can be distinguished from a re-execution that may create a new external effect.
        ja: この attempt が実際に用いた idempotency key を記録し、transport replay と新 external effect を生み得る再実行を区別します。
      allowed_values: []
      pattern: null
      example_value: weather-0042
      source_claims:
