schema: moonweave.ai/ontology-node/v1
id: ToolCallAttempt
kind: concept
status: accepted
labels:
  zh: 工具调用尝试
  en: Tool Call Attempt
  ja: ツール呼び出し試行
semantics:
  short_definition:
    zh: 工具调用尝试是某次 ToolCall 交给具体工具执行器的一次独立执行。
    en: A Tool Call Attempt is one independent execution of a ToolCall by a concrete tool executor.
    ja: ツール呼び出し試行は一 ToolCall を具体 tool executor が実行する一回の独立実行です。
  definition:
    zh: 工具调用尝试是一种 InvocationAttempt，沿用 RunAttempt 的 activity_id、尝试序号与时间状态，并以执行一个确定 ToolCall 的执行器为种差；每次重试都是新的工具调用尝试，并通过 retries 指向先前尝试。授权、沙箱和幂等信息描述本次执行环境，但 ToolResult、ToolError 与 RunOutcome 仍保持独立身份。
    en: A Tool Call Attempt is an InvocationAttempt that retains the inherited RunAttempt activity_id, attempt number, and temporal state. Its differentia is execution of one definite ToolCall by one executor. Every retry is a new Tool Call Attempt linked to the prior attempt by retries. Authorization, sandbox, and idempotency data describe this execution context while ToolResult, ToolError, and RunOutcome retain separate identities.
    ja: ツール呼び出し試行は InvocationAttempt の一種で、RunAttempt の activity_id・attempt number・temporal state を継承し、一つの definite ToolCall を実行する executor を種差とします。retry ごとに新 Tool Call Attempt を作り retries で prior attempt を指します。authorization・sandbox・idempotency data は execution context を記述し ToolResult・ToolError・RunOutcome は separate identity を保持します。
  why_needed:
    zh: 工具专用尝试承载每次执行的超时、授权、沙箱和工具错误，又不会把这些运行事实写回 ToolCall 或稳定定义。
    en: The tool-specific attempt carries per-execution timeout, authorization, sandbox, and tool-error facts without writing them back into ToolCall or the stable definition.
    ja: tool-specific attempt が per-execution timeout・authorization・sandbox・tool-error fact を持ち ToolCall/stable definition へ書戻しません。
  includes:
    - zh: 纳入已经启动并关联一个 ToolCall、执行器与尝试序号的实际工具执行。
      en: Includes actual tool executions that have started and reference one ToolCall, executor, and attempt number.
      ja: 開始済みで一 ToolCall・executor・attempt number を参照する actual tool execution を含みます。
  excludes:
    - zh: 排除 ToolCall 本身、重试策略、等待批准的请求、ToolResult 和通用 RunOutcome。
      en: Excludes the ToolCall itself, retry policy, approval-pending request, ToolResult, and generic RunOutcome.
      ja: ToolCall 自体・retry policy・approval-pending request・ToolResult・generic RunOutcome を除きます。
  semantic_kind: activity
  aliases: []
