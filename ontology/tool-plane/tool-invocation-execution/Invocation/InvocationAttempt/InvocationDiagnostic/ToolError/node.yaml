      en: A tool result returns is_error=true with CITY_NOT_FOUND, and a non-retryable ToolError tells the caller to correct the city name.
      ja: tool result が is_error=true/CITY_NOT_FOUND を返し non-retryable ToolError が city name correction を示します。
