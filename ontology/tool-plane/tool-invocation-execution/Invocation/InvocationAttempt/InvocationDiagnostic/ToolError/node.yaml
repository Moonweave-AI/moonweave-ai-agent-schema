schema: moonweave.ai/ontology-node/v1
id: ToolError
kind: concept
status: accepted
labels:
  zh: 工具错误诊断
  en: Tool Error Diagnostic
  ja: ツールエラー診断
semantics:
  short_definition:
    zh: 工具错误诊断是解释工具调用尝试为何失败的一种调用诊断。
    en: A Tool Error Diagnostic is an Invocation Diagnostic explaining why a tool-call attempt failed.
    ja: ツールエラー診断は tool-call attempt failure reason を説明する Invocation Diagnostic です。
  definition:
    zh: 工具错误诊断是一种 InvocationDiagnostic，沿用 diagnostic_id 与可选尝试引用，并以错误代码、错误类别、是否可重试及可行动消息为种差；它为调用方或模型提供反馈，但不是工具结果本身。MCP 工具执行失败可以由 is_error=true 的 ToolResult 报告，并由此诊断补充解释。
    en: A Tool Error Diagnostic is an InvocationDiagnostic that retains its diagnostic_id and optional attempt reference and is differentiated by error code, error category, retryability, and an actionable message. It gives the caller or model feedback but is not the Tool Result itself. An MCP tool-execution failure may be reported by a ToolResult with is_error=true and explained by this diagnostic.
    ja: ツールエラー診断は InvocationDiagnostic の diagnostic_id と optional attempt reference を継承し、error code・error category・retryability・actionable message を種差とします。caller/model に feedback を与えますが Tool Result 自体ではなく is_error=true ToolResult を説明できます。
  why_needed:
    zh: 把错误诊断与 ToolResult 分开，可同时保留协议要求的返回记录和结构化错误类别、重试建议。
    en: Separating the diagnostic from ToolResult preserves both the protocol return and structured error category and retry guidance.
    ja: diagnostic と ToolResult を分け protocol return と structured error category/retry guidance を共に保持します。
  includes:
    - zh: 纳入可定位到失败工具尝试并提供错误代码、类别和恢复提示的诊断。
      en: Includes diagnostics locatable to a failed tool attempt with an error code, category, and recovery guidance.
      ja: failed tool attempt へ定位でき error code・category・recovery guidance を持つ diagnostic を含みます。
  excludes:
    - zh: 排除 is_error ToolResult 本身、协议层 JSON-RPC 错误、一般警告和最终 RunOutcome。
      en: Excludes the is_error ToolResult itself, protocol-level JSON-RPC errors, ordinary warnings, and final RunOutcome.
      ja: is_error ToolResult 自体・protocol-level JSON-RPC error・ordinary warning・final RunOutcome を除きます。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: error_code
      labels:
        zh: 错误代码
        en: error code
        ja: error code
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 提供稳定的机器可读错误代码。
        en: Provides a stable machine-readable error code.
        ja: stable machine-readable error code を提供します。
      allowed_values: []
      pattern: null
      example_value: CITY_NOT_FOUND
      source_claims:
        - claim-tool-error-003
        - claim-tool-error-004
    - id: error_category
      labels:
        zh: 错误类别
        en: error category
        ja: error category
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分 validation、authorization、timeout、transport 与 domain 等错误。
        en: Distinguishes validation, authorization, timeout, transport, and domain errors.
        ja: validation・authorization・timeout・transport・domain error を区別します。
      allowed_values: []
      pattern: null
      example_value: invalid-domain-value
      source_claims:
        - claim-tool-error-005
        - claim-tool-error-006
    - id: retryable
      labels:
        zh: 是否可重试
        en: retryable
        ja: 再試行可否
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明相同或修正输入后是否值得建立新尝试。
        en: States whether a new attempt is appropriate with identical or corrected input.
        ja: same/corrected input で new attempt が適切か示します。
      allowed_values: []
      pattern: null
      example_value: false
      source_claims:
        - claim-tool-error-007
        - claim-tool-error-008
    - id: actionable_message
      labels:
        zh: 可行动说明
        en: actionable message
        ja: actionable message
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 给调用方或模型提供可执行的修正提示。
        en: Provides the caller or model with an actionable correction.
        ja: caller/model へ actionable correction を提供します。
      allowed_values: []
      pattern: null
      example_value: Choose a supported city name.
      source_claims:
        - claim-tool-error-009
        - claim-tool-error-010
  constraints: []
  required_relation_constraints: []
