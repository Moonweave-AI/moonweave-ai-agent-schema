sibling_differentiation:
  - sibling_concept_id: ToolWarning
    shared_parent_concept_id: InvocationDiagnostic
    differentia:
      zh: 共享父节点对照：父节点 InvocationDiagnostic：ToolError（semantic kind=information，骨架 ToolError-is_a-InvocationDiagnostic）；ToolWarning（semantic kind=information，骨架 ToolWarning-is_a-InvocationDiagnostic）。双端条件：ToolError 条件：“工具错误诊断是解释工具调用尝试为何失败的一种调用诊断”；ToolWarning 条件：“工具警告诊断是在结果仍可使用时说明降级、弃用或不确定性的一种调用诊断”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent InvocationDiagnostic: ToolError (semantic kind=information, backbone ToolError-is_a-InvocationDiagnostic); ToolWarning (semantic kind=information, backbone ToolWarning-is_a-InvocationDiagnostic). Endpoint conditions: ToolError condition: “A Tool Error Diagnostic is an Invocation Diagnostic explaining why a tool-call attempt failed”; ToolWarning condition: “A Tool Warning Diagnostic is an Invocation Diagnostic explaining degradation, deprecation, or uncertainty while a result remains usable”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 InvocationDiagnostic：ToolError（semantic kind=information、バックボーン ToolError-is_a-InvocationDiagnostic）；ToolWarning（semantic kind=information、バックボーン ToolWarning-is_a-InvocationDiagnostic）。両端条件：ToolError の条件：「ツールエラー診断は tool-call attempt failure reason を説明する Invocation Diagnostic です」；ToolWarning の条件：「ツール警告診断は result が利用可能なまま degradation・deprecation・uncertainty を説明する Invocation Diagnostic です」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-tool-error-015
