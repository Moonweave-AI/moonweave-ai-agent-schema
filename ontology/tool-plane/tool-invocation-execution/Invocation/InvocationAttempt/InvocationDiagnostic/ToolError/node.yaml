      zh: 纳入可定位到失败工具尝试并提供错误代码、类别和恢复提示的诊断。
      en: Includes diagnostics locatable to a failed tool attempt with an error code, category, and recovery guidance.
      ja: failed tool attempt へ定位でき error code・category・recovery guidance を持つ diagnostic を含みます。
