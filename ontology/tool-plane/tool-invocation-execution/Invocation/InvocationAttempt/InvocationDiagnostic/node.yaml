schema: moonweave.ai/ontology-node/v1
id: InvocationDiagnostic
kind: concept
status: review
labels:
  zh: 调用诊断
  en: Invocation Diagnostic
  ja: 呼び出し診断
semantics:
  short_definition:
    zh: 调用诊断是解释一次调用或尝试中异常、风险或降级情况的信息记录。
    en: An Invocation Diagnostic is information explaining an anomaly, risk, or degradation in an invocation or attempt.
    ja: 呼び出し診断は invocation/attempt の anomaly・risk・degradation を説明する information record です。
  definition:
    zh: 调用诊断是一种信息，以 diagnostic_id、关联 invocation_id 或 attempt_id、严重度、代码和观测时刻为身份；它解释失败或警告，但不是返回载荷、执行活动、策略决定或最终 RunOutcome。
    en: An Invocation Diagnostic is information identified by diagnostic_id, related invocation_id or attempt_id, severity, code, and observation time. It explains failure or warning but is not returned payload, execution activity, policy decision, or final RunOutcome.
    ja: 呼び出し診断は diagnostic_id・related invocation_id/attempt_id・severity・code・observation time で識別し failure/warning を説明しますが returned payload・execution activity・policy decision・final RunOutcome ではありません。
  why_needed:
    zh: 诊断上位层把错误与警告按严重度细分，同时避免把所有非成功信息塞进 ToolResult 或 RunOutcome。
    en: The diagnostic upper layer specializes errors and warnings by severity without stuffing every non-success fact into ToolResult or RunOutcome.
    ja: diagnostic upper layer が error/warning を severity で細分化し every non-success fact を ToolResult/RunOutcome へ詰めません。
  includes:
    - zh: 纳入可定位到调用或尝试、具有诊断代码与解释的信息。
      en: Includes information locatable to an invocation or attempt with a diagnostic code and explanation.
      ja: invocation/attempt へ定位でき diagnostic code/explanation を持つ information を含みます。
  excludes:
    - zh: 排除 ToolResult 内容、PolicyDecision、异常发生活动和任务级 Outcome。
      en: Excludes ToolResult content, PolicyDecision, anomaly occurrence activities, and task-level Outcome.
      ja: ToolResult content・PolicyDecision・anomaly occurrence activity・task-level Outcome を除きます。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - diagnostic_id
  fields:
    - id: diagnostic_id
      labels:
        zh: 诊断标识
        en: diagnostic ID
        ja: 診断 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识一条调用诊断。
        en: Uniquely identifies one invocation diagnostic.
        ja: 一 invocation diagnostic を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: diag-tool-timeout-42
      source_claims:
        - claim-invocation-diagnostic-003
        - claim-invocation-diagnostic-004
    - id: invocation_ref
      labels:
        zh: 调用引用
        en: invocation reference
        ja: 呼出し参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向诊断所解释的 Invocation。
        en: References the Invocation explained by the diagnostic.
        ja: diagnostic が説明する Invocation を参照します。
      allowed_values: []
      pattern: null
      example_value: call_weather_0042
      source_claims:
        - claim-invocation-diagnostic-005
        - claim-invocation-diagnostic-006
    - id: attempt_ref
      labels:
        zh: 尝试引用
        en: attempt reference
        ja: 試行参照
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 在诊断针对单次尝试时指向该尝试。
        en: References the specific attempt when the diagnostic is attempt-scoped.
        ja: attempt-scoped diagnostic の場合 specific attempt を参照します。
      allowed_values: []
      pattern: null
      example_value: tool-attempt-0042-1
      source_claims:
        - claim-invocation-diagnostic-007
        - claim-invocation-diagnostic-008
    - id: severity
      labels:
        zh: 严重度
        en: severity
        ja: 重大度
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分 info、warning 与 error 等诊断级别。
        en: Distinguishes diagnostic levels such as info, warning, and error.
        ja: info・warning・error 等 diagnostic level を区別します。
      allowed_values: []
      pattern: null
      example_value: error
      source_claims:
        - claim-invocation-diagnostic-009
        - claim-invocation-diagnostic-010
    - id: diagnostic_code
      labels:
        zh: 诊断代码
        en: diagnostic code
        ja: 診断 code
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 提供可用于聚合和恢复决策的稳定代码。
        en: Provides a stable code for aggregation and recovery decisions.
        ja: aggregation/recovery decision 用 stable code を提供します。
      allowed_values: []
      pattern: null
      example_value: TOOL_TIMEOUT
      source_claims:
        - claim-invocation-diagnostic-011
        - claim-invocation-diagnostic-012
    - id: observed_at
      labels:
        zh: 观测时刻
        en: observed at
        ja: 観測時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录诊断事实被观测或形成的 UTC 时刻。
        en: Records the UTC instant when the diagnostic fact was observed or formed.
        ja: diagnostic fact 観測/形成 UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:30:32Z
      source_claims:
        - claim-invocation-diagnostic-013
        - claim-invocation-diagnostic-014
  constraints: []
  required_relation_constraints: []
examples:
  - id: InvocationDiagnostic-example-positive-manual-001
    kind: positive
    labels:
      zh: 调用诊断正例
      en: Invocation Diagnostic positive case
      ja: 呼び出し診断正例
    scenario_id: null
    descriptions:
      zh: 第一次天气工具尝试超时后生成 TOOL_TIMEOUT 诊断，明确关联 call_id 与 attempt_id。
      en: After the first weather attempt times out, a TOOL_TIMEOUT diagnostic is created with explicit call_id and attempt_id correlation.
      ja: first weather attempt timeout 後 TOOL_TIMEOUT diagnostic が call_id/attempt_id correlation と共に作られます。
    field_values:
      diagnostic_id: diag-tool-timeout-42
      invocation_ref: invocation-weather-0042
      attempt_ref: tool-attempt-0042-1
      severity: error
      diagnostic_code: TOOL_TIMEOUT
      observed_at: 2026-07-16T01:30:32Z
    related_node_ids:
      - InvocationDiagnostic
      - InvocationAttempt
    related_relation_ids:
      - InvocationAttempt-emits-InvocationDiagnostic
    expected_result:
      zh: 建立 InvocationDiagnostic，并保留它与相邻规范、尝试或结果的独立身份。
      en: Create InvocationDiagnostic while preserving its identity from adjacent specifications, attempts, or results.
      ja: InvocationDiagnostic を作成し adjacent specification・attempt・result との separate identity を保持します。
    why_valid_or_invalid:
      zh: 纳入可定位到调用或尝试、具有诊断代码与解释的信息。
      en: Includes information locatable to an invocation or attempt with a diagnostic code and explanation.
      ja: invocation/attempt へ定位でき diagnostic code/explanation を持つ information を含みます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-invocation-diagnostic-015
      - claim-invocation-diagnostic-016
  - id: InvocationDiagnostic-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 调用诊断边界例
      en: Invocation Diagnostic boundary case
      ja: 呼び出し診断境界例
    scenario_id: null
    descriptions:
      zh: ToolResult 中的温度 25°C 是返回载荷，不解释异常或风险，不能分类为 InvocationDiagnostic。
      en: The 25°C value in ToolResult is returned payload and explains no anomaly or risk, so it is not an InvocationDiagnostic.
      ja: ToolResult の 25°C は returned payload で anomaly/risk を説明せず InvocationDiagnostic ではありません。
    field_values:
      diagnostic_id: diag-tool-timeout-42
    related_node_ids:
      - InvocationDiagnostic
    related_relation_ids: []
    expected_result:
      zh: 不建立 InvocationDiagnostic；按边界例所示保留在更准确的概念中。
      en: Do not create InvocationDiagnostic; keep the record in the more accurate concept identified by the boundary.
      ja: InvocationDiagnostic を作らず boundary が示す accurate concept に保持します。
    why_valid_or_invalid:
      zh: 排除 ToolResult 内容、PolicyDecision、异常发生活动和任务级 Outcome。
      en: Excludes ToolResult content, PolicyDecision, anomaly occurrence activities, and task-level Outcome.
      ja: ToolResult content・PolicyDecision・anomaly occurrence activity・task-level Outcome を除きます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-invocation-diagnostic-017
      - claim-invocation-diagnostic-018
