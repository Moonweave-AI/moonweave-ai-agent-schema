parent_relation:
  id: InvocationAttempt-emits-InvocationDiagnostic
  predicate: emits
  direction: source-to-target
  relation_kind: information
  labels:
    zh: 发出调用诊断
    en: emits invocation diagnostic
    ja: 呼び出し診断を発行する
  definitions:
    zh: InvocationAttempt 在执行期间或终止时发出与其 attempt_id 可核对的 InvocationDiagnostic，用于记录错误、警告或异常观测；诊断是解释尝试的信息记录，不是返回载荷，也不自动等于该尝试的最终运行结局。
    en: An InvocationAttempt emits an InvocationDiagnostic during execution or termination when the diagnostic is correlatable to its attempt_id and records an error, warning, or exceptional observation. The diagnostic explains the attempt; it is neither returned payload nor automatically the attempt's final runtime outcome.
    ja: InvocationAttempt は execution 中または termination 時に attempt_id と照合できる error・warning・exception observation を InvocationDiagnostic として emits します。diagnostic は attempt を説明する information record で、returned payload でも final runtime outcome でもありません。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 0
      max: null
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: emitted_by
    labels:
      zh: 由调用尝试发出
      en: emitted by invocation attempt
      ja: 呼び出し試行により発行される
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: InvocationAttempt-emits-InvocationDiagnostic-example-positive-manual-001
      kind: positive
      labels:
        zh: 尝试发出可关联诊断正例
        en: Attempt emits a correlatable diagnostic positive case
        ja: 試行が照合可能な診断を発行する正例
      scenario_id: null
      descriptions:
        zh: attempt-7 调用外部 API 时收到限流错误；观测器以相同 attempt_id 记录 diagnostic-7、错误代码、严重度和观测时刻。
        en: attempt-7 receives a rate-limit failure while calling an external API; the observer records diagnostic-7 with the same attempt_id, error code, severity, and observation time.
        ja: attempt-7 が external API 呼出し中に rate-limit failure を受け、observer が同じ attempt_id・error code・severity・observation time を持つ diagnostic-7 を記録します。
      field_values: {}
      related_node_ids:
        - InvocationAttempt
        - InvocationDiagnostic
      related_relation_ids:
        - InvocationAttempt-emits-InvocationDiagnostic
      expected_result:
        zh: 建立 attempt-7 —emits→ diagnostic-7，并保留诊断与返回记录、运行结局的身份差异。
        en: Assert attempt-7 —emits→ diagnostic-7 while retaining the diagnostic's identity apart from returned records and runtime outcomes.
        ja: attempt-7 —emits→ diagnostic-7 を成立させ、diagnostic を returned record・runtime outcome と別 identity に保ちます。
      why_valid_or_invalid:
        zh: 诊断含有独立标识、诊断事实和明确 attempt_id，满足发出关系所需的来源关联。
        en: The record has its own identity, a diagnostic fact, and an explicit attempt_id, satisfying the provenance required for emits.
        ja: record は独自 identity・diagnostic fact・明示 attempt_id を持ち、emits に必要な provenance を満たします。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-invocation-diagnostic-019
    - id: InvocationAttempt-emits-InvocationDiagnostic-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 未关联日志不是调用诊断边界例
        en: Uncorrelated log is not an invocation diagnostic boundary case
        ja: 未照合ログは呼び出し診断ではない境界例
      scenario_id: null
      descriptions:
        zh: 同一时段出现一条普通服务日志，但没有 diagnostic_id、attempt_id 或能把它归因到该尝试的 trace 上下文。
        en: A generic service log appears in the same time window but has no diagnostic_id, attempt_id, or trace context attributing it to the attempt.
        ja: 同じ時間帯に generic service log があるだけで diagnostic_id・attempt_id・attempt に帰属させる trace context がありません。
      field_values: {}
      related_node_ids:
        - InvocationAttempt
        - InvocationDiagnostic
      related_relation_ids:
        - InvocationAttempt-emits-InvocationDiagnostic
      expected_result:
        zh: 不建立 emits 边；时间邻近和错误词汇不足以证明该日志由此尝试发出。
        en: Do not assert emits; temporal proximity and error wording do not prove that this attempt emitted the log.
        ja: emits edge を成立させません。時間的近接と error wording だけでは当該 attempt からの発行を証明できません。
      why_valid_or_invalid:
        zh: 缺少来源关联时，将日志挂到尝试会制造不可审计的诊断归因。
        en: Without provenance correlation, attaching the log to the attempt would fabricate an unauditable diagnostic attribution.
        ja: provenance correlation がないため log を attempt に接続すると監査不能な diagnostic attribution を捏造します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
      source_claims:
        - claim-invocation-diagnostic-020
  source_claims:
    - claim-invocation-diagnostic-021
  distinct_fact_rationale:
    zh: emits 连接执行活动与可审计诊断记录；它不同于 produces 返回载荷，也不同于 evidences 运行结局。
    en: emits connects execution activity to an auditable diagnostic record; it is distinct from producing returned payload and from evidencing a runtime outcome.
    ja: emits は execution activity と監査可能な diagnostic record を結び、returned payload の produces や runtime outcome の evidences と異なります。
