      zh: 工具警告诊断边界例
      en: Tool Warning Diagnostic boundary case
      ja: ツール警告診断境界例
    scenario_id: null
    descriptions:
      zh: 超时导致没有可用结果且尝试失败，应建立 ToolError，而不是把终止性故障降格为警告。
      en: A timeout leaves no usable result and fails the attempt; create ToolError rather than downgrading a terminating failure to a warning.
      ja: timeout で usable result がなく attempt failure なら ToolError を作り terminating failure を warning にしません。
    field_values:
      diagnostic_id: tool-warning-stale-12
    related_node_ids:
      - ToolWarning
      - InvocationDiagnostic
    related_relation_ids:
      - ToolWarning-is_a-InvocationDiagnostic
    expected_result:
      zh: 不建立 ToolWarning；按边界例所示保留在更准确的概念中。
      en: Do not create ToolWarning; keep the record in the more accurate concept identified by the boundary.
      ja: ToolWarning を作らず boundary が示す accurate concept に保持します。
    why_valid_or_invalid:
      zh: 排除导致尝试失败的 ToolError、定义级弃用通知、普通结果文本和策略拒绝。
      en: Excludes ToolError that failed an attempt, definition-level deprecation notices, ordinary result text, and policy rejection.
      ja: attempt failure の ToolError・definition-level deprecation notice・ordinary result text・policy rejection を除きます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
