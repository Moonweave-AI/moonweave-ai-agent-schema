      zh: 建立 ToolWarning，并保留它与相邻规范、尝试或结果的独立身份。
      en: Create ToolWarning while preserving its identity from adjacent specifications, attempts, or results.
      ja: ToolWarning を作成し adjacent specification・attempt・result との separate identity を保持します。
    why_valid_or_invalid:
      zh: 纳入关联可用 ToolResult、具有稳定 warning_code 且不终止尝试的诊断。
      en: Includes diagnostics attached to a usable ToolResult with a stable warning_code that did not terminate the attempt.
      ja: usable ToolResult に attached し stable warning_code を持ち attempt を terminate しない diagnostic を含みます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
    source_claims:
      - claim-tool-warning-009
      - claim-tool-warning-010
  - id: ToolWarning-example-boundary-manual-001
