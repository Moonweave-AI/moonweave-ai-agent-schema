        ja: 警告 message
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明结果限制及后续使用注意事项。
        en: Explains the result limitation and downstream usage caution.
        ja: result limitation と downstream usage caution を説明します。
      allowed_values: []
      pattern: null
