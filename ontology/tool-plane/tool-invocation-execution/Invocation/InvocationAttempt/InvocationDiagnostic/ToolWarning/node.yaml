        en: warning code
        ja: 警告 code
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 提供机器可读的警告分类。
        en: Provides a machine-readable warning classification.
        ja: machine-readable warning classification を提供します。
