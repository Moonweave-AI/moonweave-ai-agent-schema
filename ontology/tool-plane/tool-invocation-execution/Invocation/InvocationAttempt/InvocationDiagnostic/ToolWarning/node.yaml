      en: Tool Warning Diagnostic positive case
      ja: ツール警告診断正例
    scenario_id: null
    descriptions:
      zh: 天气结果成功返回，但来源比期望旧二十分钟；ToolWarning 附着结果并标注 STALE_SOURCE。
      en: The weather result succeeds, but its source is twenty minutes older than expected; ToolWarning attaches STALE_SOURCE to the result.
      ja: weather result は success ですが source が twenty minutes stale で ToolWarning が STALE_SOURCE を attach します。
    field_values:
      diagnostic_id: tool-warning-stale-12
      invocation_ref: invocation-weather-0042
      severity: warning
      diagnostic_code: STALE_SOURCE
      observed_at: 2026-07-16T01:30:03Z
      result_ref: tool-result-0042-2
      warning_code: STALE_SOURCE
      warning_message: Forecast source is 20 minutes old.
