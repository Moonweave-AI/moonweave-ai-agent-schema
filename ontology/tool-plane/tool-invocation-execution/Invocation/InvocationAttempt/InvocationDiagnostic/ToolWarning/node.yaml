schema: moonweave.ai/ontology-node/v1
id: ToolWarning
kind: concept
status: accepted
labels:
  zh: 工具警告诊断
  en: Tool Warning Diagnostic
  ja: ツール警告診断
semantics:
  short_definition:
    zh: 工具警告诊断是在结果仍可使用时说明降级、弃用或不确定性的一种调用诊断。
    en: A Tool Warning Diagnostic is an Invocation Diagnostic explaining degradation, deprecation, or uncertainty while a result remains usable.
    ja: ツール警告診断は result が利用可能なまま degradation・deprecation・uncertainty を説明する Invocation Diagnostic です。
  definition:
    zh: 工具警告诊断是一种 InvocationDiagnostic，沿用 diagnostic_id 与严重度，并以关联结果、warning_code 和警告消息为种差；它附着于可消费 ToolResult 并说明限制，不把警告升级为失败，也不属于稳定 ToolDeprecationNotice。
    en: A Tool Warning Diagnostic is an InvocationDiagnostic that retains its diagnostic_id and severity and is differentiated by a related result, warning_code, and warning message. It attaches to a consumable ToolResult and explains limitations without turning the warning into failure or becoming stable ToolDeprecationNotice metadata.
    ja: ツール警告診断は InvocationDiagnostic の diagnostic_id と severity を継承し、related result・warning_code・warning message を種差とします。consumable ToolResult に付き limitation を説明し failure や stable ToolDeprecationNotice にはなりません。
  why_needed:
    zh: 警告节点让可用但降级的结果保持成功返回，同时把限制清楚呈现给后续决策。
    en: The warning node preserves a usable degraded result as a return while exposing its limitation to later decisions.
    ja: warning node が usable degraded result を return として保持し limitation を later decision へ示します。
  includes:
    - zh: 纳入关联可用 ToolResult、具有稳定 warning_code 且不终止尝试的诊断。
      en: Includes diagnostics attached to a usable ToolResult with a stable warning_code that did not terminate the attempt.
      ja: usable ToolResult に attached し stable warning_code を持ち attempt を terminate しない diagnostic を含みます。
  excludes:
    - zh: 排除导致尝试失败的 ToolError、定义级弃用通知、普通结果文本和策略拒绝。
      en: Excludes ToolError that failed an attempt, definition-level deprecation notices, ordinary result text, and policy rejection.
      ja: attempt failure の ToolError・definition-level deprecation notice・ordinary result text・policy rejection を除きます。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: result_ref
      labels:
        zh: 结果引用
        en: result reference
        ja: 結果参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向仍可消费但受限制的 ToolResult。
        en: References the usable but limited ToolResult.
        ja: usable but limited ToolResult を参照します。
      allowed_values: []
      pattern: null
      example_value: tool-result-0042-2
      source_claims:
        - claim-tool-warning-003
        - claim-tool-warning-004
    - id: warning_code
