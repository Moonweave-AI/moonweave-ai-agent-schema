relations:
  - id: InvocationAttempt-is_a-RunAttempt
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 属于
      en: is a
      ja: 一種である
    definitions:
      zh: InvocationAttempt 是一种 RunAttempt：两者都表示面向同一逻辑工作的单次有界执行，并以尝试序号和重试谱系区分；InvocationAttempt 进一步要求绑定一个确定 Invocation。该跨域分类边把通用执行尝试语义只继承一次，使 ToolCallAttempt 经 InvocationAttempt 间接继承 RunAttempt，避免并列父级。
      en: "InvocationAttempt is a RunAttempt: both denote one bounded execution toward the same logical job and are distinguished by attempt number and retry lineage, while InvocationAttempt additionally binds a definite Invocation. This cross-domain taxonomic edge inherits generic run-attempt semantics once, so ToolCallAttempt reaches RunAttempt through InvocationAttempt instead of acquiring parallel parents."
      ja: InvocationAttempt は RunAttempt の一種です。両者は同じ論理作業への一回の有界実行を表し、attempt number と retry lineage で区別され、InvocationAttempt はさらに特定 Invocation への binding を要求します。この cross-domain 分類辺により generic run-attempt semantics を一度だけ継承し、ToolCallAttempt は並列親を持たず InvocationAttempt 経由で RunAttempt を継承します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 分类继承不使用实例关系基数。
      en: Taxonomic inheritance does not use instance-relation cardinality.
      ja: 分類継承には instance relation cardinality を使いません。
    inverse_reading:
      predicate: inverse_of_is_a
      labels:
        zh: 反向 is_a
        en: inverse is_a
        ja: 逆 is_a
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
