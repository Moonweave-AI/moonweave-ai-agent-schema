          en: Invocation is the stable call occurrence that may contain several attempts. It lacks one attempt's own attempt_number, retry_of lineage, and termination boundary, so Invocation is not a RunAttempt.
          ja: Invocation は複数 attempt を含み得る安定した呼出し発生で、一 attempt 固有の attempt_number・retry_of・終端境界を持たないため RunAttempt ではありません。
