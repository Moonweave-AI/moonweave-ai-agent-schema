  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_invocation_attempt, labels: {zh: 具有调用尝试, en: has invocation attempt, ja: 呼び出し試行を持つ}}
  conditions: []
