        kind: positive
        labels:
          zh: InvocationAttempt-is_a-RunAttempt 正例
          en: InvocationAttempt-is_a-RunAttempt positive case
          ja: InvocationAttempt-is_a-RunAttempt 正例
        scenario_id: null
        descriptions:
          zh: attempt-weather-0042-2 是 invocation-weather-0042 的第二次有界执行：它在超时的第一次尝试后重新开始、拥有独立开始与结束状态，因此既是 InvocationAttempt，也满足 RunAttempt 的尝试序号、重试谱系和终止边界。
          en: attempt-weather-0042-2 is the second bounded execution of invocation-weather-0042. It starts after the first attempt times out and has its own start and terminal state, so it is an InvocationAttempt that also satisfies RunAttempt's attempt-number, retry-lineage, and termination boundary.
          ja: attempt-weather-0042-2 は invocation-weather-0042 の二回目の有界実行です。一回目の timeout 後に開始し独自の開始・終端状態を持つため、InvocationAttempt であると同時に RunAttempt の attempt number・retry lineage・終端境界を満たします。
