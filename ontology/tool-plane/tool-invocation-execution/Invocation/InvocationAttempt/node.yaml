sources:
  - id: mcp-lifecycle-2025-11-25
    title: Model Context Protocol Specification - Lifecycle
    url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
    source_type: official-specification
    locator: "Timeouts"
    relevance: Defines timeouts, cancellation notification, and maximum timeout behavior.
source_claims:
  - id: mcp-timeout-cancellation
    source: mcp-lifecycle-2025-11-25
    supports: When a request exceeds its timeout, an MCP sender should issue a cancellation notification and stop waiting, while enforcing a maximum timeout even with progress.
    locator: "Timeouts"
    evidence_kind: normative
    confidence: high
  - id: moonweave-invocation-attempt
    source: mcp-lifecycle-2025-11-25
    supports: Moonweave InvocationAttempt is a local temporal component of Invocation used to preserve retry and timeout evidence without redefining native protocol identifiers.
    locator: "Timeouts"
    evidence_kind: design-inference
    confidence: high