schema: moonweave.ai/ontology-node/v1
id: InvocationAttempt
kind: concept
status: review
labels:
  zh: 调用尝试
  en: Invocation Attempt
  ja: 呼び出し試行
semantics:
  short_definition:
    zh: 调用尝试是某次调用在一个确定时间区间内的一次独立执行。
    en: An Invocation Attempt is one independent execution of an invocation during a definite time interval.
    ja: 呼び出し試行は一呼出しを確定時間区間で実行する一回の独立実行です。
  definition:
    zh: 调用尝试是一种 RunAttempt，并沿用该运行尝试的 activity_id、attempt_number 与时间状态；其种差是为一个确定 Invocation 执行一次有界努力。成功、失败、超时、取消、阻断或暂停都会结束该次尝试；每次重试必须建立新的 RunAttempt，而不能改写先前尝试。Invocation —has_attempt→ InvocationAttempt 承担本域显示父级，表达调用对尝试的真实组成；InvocationAttempt —is_a→ RunAttempt 作为次级骨架保留跨域类型继承。
    en: An Invocation Attempt is a RunAttempt and retains that run attempt's activity_id, attempt_number, and temporal state; its differentia is one bounded effort for a definite Invocation. Success, failure, timeout, cancellation, blocking, or pause terminates it; every retry creates a new RunAttempt rather than rewriting a prior attempt. Invocation —has_attempt→ InvocationAttempt is the domain display parent and states genuine composition, while InvocationAttempt —is_a→ RunAttempt retains cross-domain type inheritance as a secondary backbone.
    ja: 呼び出し試行は RunAttempt の一種で、その run attempt の activity_id・attempt_number・時間状態を継承し、特定 Invocation に対する一回の有界な努力を種差とします。success・failure・timeout・cancel・block・pause で終了し、retry ごとに新 RunAttempt を作って prior attempt を上書きしません。Invocation —has_attempt→ InvocationAttempt は本 domain の表示親として真正な composition を表し、InvocationAttempt —is_a→ RunAttempt は cross-domain 型継承を secondary backbone として保持します。
  why_needed:
    zh: 独立尝试身份允许准确表达超时后重试、每次授权和沙箱环境，并防止把后一次成功覆盖前一次失败。
    en: Independent attempt identity records timeout retries, per-attempt authorization and sandbox context, and prevents a later success from overwriting an earlier failure.
    ja: 独立 attempt identity により timeout retry・per-attempt authorization・sandbox context を記録し later success で earlier failure を上書きしません。
  includes:
    - zh: 纳入已有开始时刻和尝试序号的真实执行，包括失败、取消与超时尝试。
      en: Includes actual executions with a start time and attempt number, including failed, cancelled, and timed-out attempts.
      ja: 開始時刻と attempt number を持つ actual execution（failure・cancel・timeout を含む）を含みます。
  excludes:
    - zh: 排除仅声明重试策略的规格、尚未开始的计划、整个 Invocation 和汇总后的 RunOutcome。
      en: Excludes retry-policy specifications, not-yet-started plans, the containing Invocation, and an aggregated RunOutcome.
      ja: retry policy specification、未開始 plan、包含 Invocation、集約 RunOutcome を除きます。
  semantic_kind: activity
  aliases: []
