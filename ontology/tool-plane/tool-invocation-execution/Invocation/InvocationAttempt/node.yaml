          en: Assert InvocationAttempt —is_a→ RunAttempt; ToolCallAttempt inherits that generic semantics indirectly through its direct parent InvocationAttempt.
          ja: InvocationAttempt —is_a→ RunAttempt を成立させ、ToolCallAttempt は直接親 InvocationAttempt を介して generic semantics を間接継承します。
        why_valid_or_invalid:
          zh: 正例同时满足两个端点身份和该谓词的成立条件。
          en: The positive case satisfies both endpoint identities and the predicate's conditions.
