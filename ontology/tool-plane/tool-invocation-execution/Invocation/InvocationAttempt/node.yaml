      en: InvocationAttempt executes in the same Sandbox instance that actually hosted the execution and retains attempt identity, sandbox_id, runtime environment, start and end times, and isolation-enforcement evidence; configuration, a plan, or the parent Invocation alone cannot establish the edge.
      ja: InvocationAttempt は execution を実際に host した同一 Sandbox instance を指し attempt identity・sandbox_id・runtime environment・start/end time・isolation enforcement evidence を保持し configuration・plan・parent Invocation のみでは edge を成立できません。
