schema: moonweave.ai/ontology-node/v1
id: InvocationAttempt
kind: concept
labels:
  zh: 调用尝试
  en: Invocation attempt
  ja: 呼び出し試行
semantics:
  short_definition:
    zh: 构成一次本地 Invocation 的单个可计时、可失败和可重试的执行尝试。
    en: One timed, fallible, and retryable execution attempt that composes a local Invocation.
    ja: 一つのローカル Invocation を構成する、計時・失敗・再試行可能な一回の実行試行。
  definition:
    zh: >-
      InvocationAttempt 是属于一个 Invocation 的本地执行阶段。它记录序号、本地时间戳、结果和可选的原生交换关联；它不是 Invocation 的子类，Invocation 是可包含多个尝试的总体活动，也不是 MCP request id、Responses call_id 或 A2A Task retry 字段。
    en: >
      An InvocationAttempt is a local execution episode belonging to one Invocation. It records its
      ordinal, local timestamps, outcome, and optional correlation to a native exchange. It is not a
      subtype of Invocation: an Invocation is the overarching activity and may contain multiple
      attempts. It is also not an MCP request id, a Responses call_id, or an A2A Task retry field.
    ja: >-
      InvocationAttempt は一つの Invocation に属するローカル実行 episode である。序数、ローカル時刻、結果、任意のネイティブ exchange 相関を記録する。Invocation は複数の attempt を含める上位活動なので Invocation の subtype ではなく、MCP request id、Responses call_id、A2A Task retry field でもない。
  why_needed:
    zh: >-
      必须在不覆盖原始意图的前提下审计重试、取消和超时。组成关系表达尝试构成一个本地调用轨迹，结果、诊断和效果记录则作为独立组成部分或关联附着于尝试。
    en: >
      Retries, cancellation, and timeouts must be auditable without overwriting the original intent.
      Composition expresses that attempts make up one local invocation trace; result, diagnostic, and
      effect records attach to an attempt as separate components or correlations.
    ja: >-
      元の意図を上書きせずに再試行、取消、タイムアウトを監査する必要がある。composition は attempts が一つのローカル invocation trace を構成することを表し、結果、診断、効果の記録は別の構成要素または相関として attempt に付く。
  includes:
    - {zh: 尝试序号、时间和本地结果, en: "Attempt ordinal, times, and local outcome", ja: 試行順序、時刻、ローカル結果}
    - {zh: 对原生交换的可选引用, en: Optional reference to a native exchange, ja: ネイティブ交換への任意参照}
  excludes:
    - {zh: 调用整体身份或协议全局重试字段, en: Invocation-wide identity or a protocol-global retry field, ja: 呼び出し全体の識別子またはプロトコル全体の再試行項目}
    - {zh: 结果、错误或副作用对象本身, en: "A result, error, or side-effect object itself", ja: 結果、エラー、副作用オブジェクトそのもの}
  semantic_kind: activity
  aliases:
    - {language: en, value: execution attempt, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      主机在派发 Invocation 时创建 attempt 1，并且只能依据执行策略创建后续尝试。MCP 请求超过本地超时后，MCP 建议发送方取消并停止等待；本地 attempt 记录该策略结果但不改变原生 JSON-RPC id，Responses 和 A2A 交换仍保留自己的原生标识。
    en: >
      A host creates attempt 1 when it dispatches an invocation and can create later attempts only
      according to its execution policy. For an MCP request that exceeds a local timeout, MCP advises
      a sender to cancel and stop waiting; this local attempt records that policy outcome but does not
      change the native JSON-RPC id. Responses and A2A exchanges retain their own native identifiers.
    ja: >-
      ホストは Invocation を配信すると attempt 1 を作成し、以後の attempt は実行方針に従ってのみ作成できる。MCP 要求がローカル timeout を超えた場合、MCP は送信者に cancel と待機停止を勧める。このローカル attempt は方針結果を記録するがネイティブ JSON-RPC id を変更せず、Responses と A2A exchange は固有 ID を保つ。
  typical_input:
    - description: First local attempt to dispatch a tool call.
      format: '{"local_attempt_id":"attempt-42-1","local_invocation_ref":"inv-42","attempt_index":1,"local_outcome":"running"}'
      source_claims: [moonweave-invocation-attempt]
  typical_output:
    - description: The attempt records a timeout outcome and a correlation to the native request.
      format: '{"local_attempt_id":"attempt-42-1","local_outcome":"timed_out","local_native_exchange_ref":"mcp-session-42#id-2"}'
      source_claims: [mcp-timeout-cancellation, moonweave-invocation-attempt]
  reference_implementations:
    - name: MCP Lifecycle specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/lifecycle
      description: Defines request timeouts and cancellation behavior.
structure:
  identity_keys: [local_attempt_id]
  fields:
    - id: local_attempt_id
      labels: {zh: 本地尝试标识, en: Local attempt ID, ja: ローカル試行 ID}
      definitions: {zh: 主机分配给一次执行尝试的标识, en: A host-assigned identifier for one execution attempt, ja: 一回の実行試行に対するホスト割当て識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: attempt-42-1
      allowed_values: []
      source_claims: [moonweave-invocation-attempt]
    - id: local_invocation_ref
      labels: {zh: 调用引用, en: Invocation reference, ja: 呼び出し参照}
      definitions: {zh: 包含该尝试的本地调用, en: The local invocation that contains this attempt, ja: この試行を含むローカル呼び出し}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: inv-42
      allowed_values: []
      source_claims: [moonweave-invocation-attempt]
    - id: attempt_index
      labels: {zh: 尝试序号, en: Attempt index, ja: 試行番号}
      definitions: {zh: 同一调用中的从一开始的尝试序号, en: One-based ordinal of the attempt within the same invocation, ja: 同じ呼び出し内で一から始まる試行順序}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims: [moonweave-invocation-attempt]
    - id: local_outcome
      labels: {zh: 本地尝试结果, en: Local attempt outcome, ja: ローカル試行結果}
      definitions: {zh: 主机对尝试状态的本地判断，不取代协议错误或远程任务状态, en: "A host's local disposition of the attempt, not a replacement for protocol error or remote task state", ja: ホストによるローカル試行の判断でありプロトコルエラーやリモートタスク状態の置換ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: running
      allowed_values: [running, succeeded, failed, timed_out, cancelled]
      source_claims: [moonweave-invocation-attempt]
    - id: local_started_at
      labels: {zh: 本地开始时间, en: Local started-at time, ja: ローカル開始時刻}
      definitions: {zh: 尝试开始的主机时间戳, en: Host timestamp for the start of the attempt, ja: 試行開始のホスト時刻}
      datatype: date-time
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: "2026-07-19T09:00:00Z"
      allowed_values: []
      source_claims: [moonweave-invocation-attempt]
    - id: local_native_exchange_ref
      labels: {zh: 原生交换引用, en: Native exchange reference, ja: ネイティブ交換参照}
      definitions: {zh: 与该尝试关联的原生消息或 item 引用, en: A reference to the native message or item correlated with this attempt, ja: この試行に相関するネイティブメッセージまたは item への参照}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: mcp-session-42#id-2
      allowed_values: []
      source_claims: [moonweave-invocation-attempt]
  constraints:
    - id: invocation-attempt-positive-index
      severity: error
      expression_language: plain
      expression: attempt_index is a positive integer and is unique within local_invocation_ref.
      explanation:
        zh: attempt_index 必须为正整数并在 local_invocation_ref 内唯一。
        en: attempt_index is a positive integer and unique within local_invocation_ref.
        ja: attempt_index は正の整数で local_invocation_ref 内で一意である。
      source_claims: [moonweave-invocation-attempt]
    - id: invocation-attempt-is-not-native-retry
      severity: error
      expression_language: plain
      expression: local_outcome and attempt_index are host trace fields and do not claim to be MCP, OpenAI Responses, or A2A retry semantics.
      explanation:
        zh: local_outcome 和 attempt_index 是主机轨迹字段，不得声称为 MCP、Responses 或 A2A 重试语义。
        en: local_outcome and attempt_index are host trace fields and do not claim MCP, OpenAI Responses, or A2A retry semantics.
        ja: local_outcome と attempt_index はホスト軌跡項目であり MCP、OpenAI Responses、A2A の再試行意味を主張しない。
      source_claims: [moonweave-invocation-attempt]
  required_relations: []
examples:
  - id: invocation-attempt-positive-first-dispatch

    labels: {zh: 首次派发尝试, en: First dispatch attempt, ja: 最初の配信試行}

    descriptions:
      zh: "ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]；Anthropic content:[{type:\"tool_use\",id:\"toolu_01\",name:\"get_weather\",input:{location:\"Paris\"}}]；Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。"
      en: "ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]; Anthropic content:[{type:\"tool_use\",id:\"toolu_01\",name:\"get_weather\",input:{location:\"Paris\"}}]; Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})."
      ja: "ReAct (Yao 2023) Action: Search[entity]/Lookup[term]/Finish[answer]。Anthropic tool_use。Vercel AI SDK generateText({tools:{weather:tool({execute:async({city})=>...)}})。"
    field_values: {local_attempt_id: attempt-42-1, local_invocation_ref: inv-42, attempt_index: 1, local_outcome: running, local_native_exchange_ref: mcp-session-42#id-2}
    related_node_ids: [InvocationAttempt, Invocation, ToolCallAttempt]
    related_relation_ids: [InvocationAttempt-part_of-Invocation]

    source_claims: [moonweave-invocation-attempt]
  - id: invocation-attempt-counterexample-zero-index

    labels: {zh: 零尝试序号, en: Zero attempt index, ja: ゼロの試行番号}

    descriptions:
      zh: 反例：ReAct Action 无对应 Observation 就继续推理；Anthropic tool_use 缺少配对 tool_result(tool_use_id)；Vercel AI SDK execute 抛错未捕获。
      en: Counterexample: ReAct continues reasoning without Observation for Action; Anthropic tool_use missing paired tool_result(tool_use_id); Vercel AI SDK execute error uncaught.
      ja: 反例：ReAct Action に Observation なしで reasoning 継続。Anthropic tool_use に tool_result ペア欠落。Vercel AI SDK execute エラー未捕捉。
    field_values: {local_attempt_id: attempt-bad, local_invocation_ref: inv-42, attempt_index: 0, local_outcome: failed}
    related_node_ids: [InvocationAttempt]
    related_relation_ids: [InvocationAttempt-part_of-Invocation]

    source_claims: [moonweave-invocation-attempt]
  - id: invocation-attempt-boundary-timeout

    labels: {zh: 本地超时与 MCP 取消边界, en: Local timeout versus MCP cancellation boundary, ja: ローカルタイムアウトと MCP キャンセルの境界}

    descriptions:
      zh: ReAct 文本 Action 标记 vs Anthropic structured tool_use vs Vercel AI SDK Zod schema tool 的 wire 契约边界；本地 Invocation 活动非原生封包。
      en: Wire contract boundary among ReAct text Action markers, Anthropic structured tool_use, Vercel AI SDK Zod schema tools; local Invocation activity is not native envelope.
      ja: ReAct テキスト Action marker、Anthropic structured tool_use、Vercel AI SDK Zod schema tool の wire 契約境界。ローカル Invocation 活動はネイティブ envelope ではない。
    field_values: {local_attempt_id: attempt-42-1, local_invocation_ref: inv-42, attempt_index: 1, local_outcome: timed_out, local_native_exchange_ref: mcp-session-42#id-2}
    related_node_ids: [InvocationAttempt, Invocation]
    related_relation_ids: [InvocationAttempt-part_of-Invocation]

    source_claims: [mcp-timeout-cancellation, moonweave-invocation-attempt]
  - id: invocation-attempt-instance-second-try

    labels: {zh: 第二次尝试实例, en: Second-attempt instance, ja: 二回目試行インスタンス}

    descriptions:
      zh: ReAct HotpotQA 实例：Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup[Arthur's Magazine]→Finish[1850]；Anthropic tool_use_id=toolu_01A09q90qw90 配对 tool_result。
      en: ReAct HotpotQA instance: Thought→Action: Search[Arthur's Magazine]→Observation→Action: Lookup→Finish[1850]; Anthropic tool_use_id=toolu_01A09q90qw90 paired with tool_result.
      ja: ReAct HotpotQA 実例：Thought→Action: Search→Observation→Lookup→Finish[1850]。Anthropic tool_use_id=toolu_01A09q90qw90 が tool_result とペア。
    field_values: {local_attempt_id: attempt-42-2, local_invocation_ref: inv-42, attempt_index: 2, local_outcome: running, local_started_at: "2026-07-19T09:01:00Z"}
    related_node_ids: [InvocationAttempt, Invocation, InvocationDiagnostic]
    related_relation_ids: [InvocationAttempt-part_of-Invocation]

    source_claims: [moonweave-invocation-attempt]
