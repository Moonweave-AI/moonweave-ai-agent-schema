schema: moonweave.ai/ontology-node/v1
id: InvocationExecutionRequest
kind: concept
status: review
labels:
  zh: 调用执行请求
  en: Invocation Execution Request
  ja: 呼び出し実行要求
semantics:
  short_definition:
    zh: 调用执行请求是请求方提交的一份可审计调用意图记录。
    en: An Invocation Execution Request is an auditable intent record submitted by a requester for an invocation.
    ja: 呼び出し実行要求は要求者が提出する監査可能な呼出し意図記録です。
  definition:
    zh: 调用执行请求是一种信息记录，以 request_id、请求方、目标规范、实参和提交时刻为身份；它把可验证输入交给调用边界并请求创建 Invocation，但请求存在不证明执行已经开始，也不等同于稳定 InvocationSpecification。
    en: An Invocation Execution Request is an information record identified by request_id, requester, target specification, arguments, and submission time. It supplies validated inputs and requests creation of an Invocation, but its existence does not prove execution started and it is not the stable InvocationSpecification.
    ja: 呼び出し実行要求は request_id、要求者、対象仕様、引数、提出時刻で識別する情報記録です。検証済み入力を渡し Invocation 作成を要求しますが、存在だけで実行開始を証明せず stable InvocationSpecification でもありません。
  why_needed:
    zh: 请求记录使被拒绝、校验失败或尚待批准的调用意图仍可审计，同时不虚构实际执行。
    en: The request record preserves rejected, validation-failed, or approval-pending intent for audit without fabricating an execution occurrence.
    ja: 拒否・validation failure・approval pending の意図を監査用に保持し execution occurrence を捏造しません。
  includes:
    - zh: 纳入已提交并具有请求方、目标规范和具体实参的调用意图记录。
      en: Includes submitted call-intent records with a requester, target specification, and concrete arguments.
      ja: 要求者・対象仕様・具体引数を持つ提出済み call intent record を含みます。
  excludes:
    - zh: 排除可复用调用规范、已经开始的 Invocation、ToolCallAttempt 和仅供发现的 ToolCandidate。
      en: Excludes a reusable InvocationSpecification, a started Invocation, a ToolCallAttempt, and a discovery-only ToolCandidate.
      ja: reusable InvocationSpecification、開始済み Invocation、ToolCallAttempt、discovery-only ToolCandidate を除きます。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - request_id
  fields:
    - id: request_id
      labels:
        zh: 请求标识
        en: request ID
        ja: 要求 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 唯一标识这份调用意图记录。
        en: Uniquely identifies this call-intent record.
        ja: この call intent record を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: invoke-request-0042
      source_claims:
        - claim-invocation-execution-request-003
        - claim-invocation-execution-request-004
    - id: requester_ref
      labels:
        zh: 请求方引用
        en: requester reference
        ja: 要求者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识提交请求的主体。
        en: Identifies the actor submitting the request.
        ja: 要求提出主体を識別します。
      allowed_values: []
      pattern: null
      example_value: agent:travel-planner
      source_claims:
        - claim-invocation-execution-request-005
        - claim-invocation-execution-request-006
    - id: specification_ref
      labels:
        zh: 规范引用
        en: specification reference
        ja: 仕様参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向被本次实参实例化的 InvocationSpecification。
        en: References the InvocationSpecification instantiated by these arguments.
        ja: この引数で具体化する InvocationSpecification を参照します。
      allowed_values: []
      pattern: null
      example_value: tool-plan:weather-0042
      source_claims:
        - claim-invocation-execution-request-007
        - claim-invocation-execution-request-008
    - id: arguments
      labels:
        zh: 调用实参
        en: invocation arguments
        ja: 呼出し実引数
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存提交给目标能力的结构化实参；敏感字段按披露策略处理。
        en: Stores structured arguments submitted to the target capability, subject to disclosure controls for sensitive fields.
        ja: 対象能力へ渡す structured arguments を保存し sensitive field は disclosure control に従います。
      allowed_values: []
      pattern: null
      example_value:
        city: Hangzhou
      source_claims:
        - claim-invocation-execution-request-009
        - claim-invocation-execution-request-010
    - id: submitted_at
      labels:
        zh: 提交时刻
        en: submitted at
        ja: 提出時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录请求进入调用边界的 UTC 时刻。
        en: Records the UTC instant the request entered the invocation boundary.
        ja: request が invocation boundary へ入った UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:29:59Z
      source_claims:
        - claim-invocation-execution-request-011
        - claim-invocation-execution-request-012
