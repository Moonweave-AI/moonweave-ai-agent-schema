schema: moonweave.ai/ontology-node/v1
id: ShellCommand
kind: concept
labels:
  zh: Shell 命令调用
  en: Shell command invocation
  ja: Shell コマンド呼び出し
semantics:
  short_definition:
    zh: 由明确 shell 解释器解析的本地 Command 子类。
    en: A local Command subtype interpreted by an explicitly named shell executable.
    ja: 明示的に指定された shell 実行ファイルで解釈されるローカル Command の下位型。
  definition:
    zh: >-
      ShellCommand 是刻意以已命名 shell、经审查的命令文本和方言运行的 Command。它是实际的 Command 子类，因为仍表示一次本地进程调用，但增加了 shell 解释风险；它不是原始 MCP tools/call 请求、OpenAI function_call item 或 A2A Message，任何协议都不会使任意 shell 文本变得安全。
    en: >
      A ShellCommand is a Command that deliberately invokes a named shell with reviewed command text
      and dialect. It is a genuine Command subtype because it still represents one local process
      invocation, but it adds shell interpretation risk. It is not a raw MCP tools/call request, an
      OpenAI function_call item, or an A2A Message; no protocol makes arbitrary shell text safe.
    ja: >-
      ShellCommand は名前付き shell、レビュー済み command text、dialect を明示して実行する Command である。一つのローカル process invocation を表すため真の Command subtype だが、shell 解釈のリスクを追加する。生の MCP tools/call 要求、OpenAI function_call item、A2A Message ではなく、どのプロトコルも任意の shell text を安全にはしない。
  why_needed:
    zh: >-
      某些主机工作流需要参数向量 Command 无法表达的管道、重定向或 shell 内置命令。显式建模解释边界，才能要求审查和允许列表，而不是默默将模型提供的文本变成 shell。
    en: >
      Some host workflows require pipes, redirects, or shell built-ins that an argument-vector
      Command cannot express. Explicitly modeling that interpretation boundary makes it possible to
      require review and allowlisting instead of silently turning model-provided text into a shell.
    ja: >-
      一部のホスト workflow には、引数ベクターの Command では表せない pipe、redirect、shell built-in が必要である。解釈境界を明示的にモデル化することで、モデル提供 text を黙って shell 化せず、レビューと allowlist を要求できる。
  includes:
    - {zh: shell 可执行文件、方言和已审查命令文本, en: "Shell executable, dialect, and reviewed command text", ja: shell 実行ファイル、方言、レビュー済みコマンド文字列}
  excludes:
    - {zh: 未审查的模型或用户文本直接执行, en: Direct execution of unreviewed model or user text, ja: 未レビューのモデルまたはユーザー文の直接実行}
    - {zh: MCP、Responses 或 A2A 原生调用消息, en: "Native MCP, Responses, or A2A invocation messages", ja: ネイティブ MCP、Responses、A2A 呼び出しメッセージ}
  semantic_kind: activity
  aliases:
    - {language: en, value: shell process invocation, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      执行器只启动允许列表中的 shell 可执行文件，并通过明确的命令选项传递已审查文本。它记录 shell 方言和审查引用；模型输出未经策略校验不得插入 command_text，stdout、stderr 和退出状态属于 ExecutionResult 而非该活动标识。
    en: >
      The executor starts only an allowlisted shell executable and passes reviewed command text through
      its explicit command option. It records the shell dialect and review reference. Model output is
      never inserted into command_text without policy validation, and stdout/stderr and exit status
      belong to ExecutionResult rather than this activity's identity.
    ja: >-
      executor は allowlist にある shell executable だけを起動し、明示的 command option を通じてレビュー済み text を渡す。shell dialect と review reference を記録する。モデル出力を方針検証なしに command_text に挿入せず、stdout、stderr、終了状態はこの活動 ID ではなく ExecutionResult に属する。
  typical_input:
    - description: An allowlisted PowerShell command launch.
      format: '{"shell_executable":"powershell.exe","shell_dialect":"powershell","command_text":"Get-ChildItem -LiteralPath D:/repo"}'
      source_claims: [moonweave-shell-command]
  typical_output:
    - description: A separate execution result captures process termination.
      format: '{"local_shell_command_id":"shell-1","local_execution_result_ref":"result-shell-1"}'
      source_claims: [moonweave-shell-command]
  reference_implementations:
    - name: MCP Tools specification - Security Considerations
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Requires validation, access control, and user confirmation for sensitive operations.
structure:
  identity_keys: [local_shell_command_id]
  fields:
    - id: local_shell_command_id
      labels: {zh: Shell 命令标识, en: Shell command ID, ja: Shell コマンド ID}
      definitions: {zh: 主机分配给 ShellCommand 的本地标识, en: The host-assigned identifier for the ShellCommand, ja: ShellCommand に対するホスト割当て識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: shell-1
      allowed_values: []
      source_claims: [moonweave-shell-command]
    - id: shell_executable
      labels: {zh: Shell 可执行文件, en: Shell executable, ja: Shell 実行ファイル}
      definitions: {zh: 由主机 allowlist 解析的 shell 解释器, en: The shell interpreter resolved from a host allowlist, ja: ホスト許可リストから解決される shell インタープリター}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: powershell.exe
      allowed_values: [powershell.exe, pwsh, bash, sh]
      source_claims: [moonweave-shell-command]
    - id: shell_dialect
      labels: {zh: Shell 方言, en: Shell dialect, ja: Shell 方言}
      definitions: {zh: 决定命令文本解析规则的明确方言, en: The explicit dialect that determines command-text parsing rules, ja: コマンド文字列解析規則を決める明示的方言}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: powershell
      allowed_values: [powershell, posix-sh, bash]
      source_claims: [moonweave-shell-command]
    - id: command_text
      labels: {zh: 已审查命令文本, en: Reviewed command text, ja: レビュー済みコマンド文字列}
      definitions: {zh: 仅在策略审查后交给明确 shell 的文本, en: Text passed to the explicit shell only after policy review, ja: ポリシーレビュー後にのみ明示 shell に渡す文字列}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Get-ChildItem -LiteralPath D:/repo
      allowed_values: []
      source_claims: [moonweave-shell-command, mcp-tool-safety]
    - id: local_review_reference
      labels: {zh: 本地审查引用, en: Local review reference, ja: ローカルレビュー参照}
      definitions: {zh: 证明主机政策已审查该文本的本地引用，不是协议同意字段, en: "A local reference showing host policy reviewed the text, not a protocol consent field", ja: ホストポリシーが文をレビューしたことを示すローカル参照でありプロトコル同意項目ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: review-001
      allowed_values: []
      source_claims: [moonweave-shell-command, mcp-tool-safety]
    - id: local_command_id
      labels: {zh: 本地命令标识, en: Local command ID, ja: ローカルコマンド ID}
      definitions: {zh: 主机分配给命令调用的本地标识, en: The identifier the host assigns to the command invocation, ja: コマンド呼び出しにホストが割り当てる識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: cmd-1
      allowed_values: []
      source_claims: [moonweave-shell-command]
    - id: program
      labels: {zh: 可执行程序, en: Executable program, ja: 実行プログラム}
      definitions: {zh: 由受控主机解析的程序标识或路径, en: A program identifier or path resolved by the controlled host, ja: 制御されたホストが解決するプログラム識別子またはパス}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: git
      allowed_values: []
      source_claims: [moonweave-shell-command]
    - id: arguments
      labels: {zh: 参数向量, en: Argument vector, ja: 引数ベクター}
      definitions: {zh: 不经过 shell 解释器拼接的有序参数值, en: Ordered argument values passed without shell-string concatenation, ja: shell 文字列連結を経ずに渡す順序付き引数値}
      datatype: string[]
      required: true
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: '["status","--short"]'
      allowed_values: []
      source_claims: [moonweave-shell-command]
    - id: local_invocation_id
      labels: {zh: 本地调用标识, en: Local invocation ID, ja: ローカル呼び出し ID}
      definitions: {zh: 主机为一个本地执行活动分配的稳定标识, en: A stable identifier assigned by the host to one local execution activity, ja: 一つのローカル実行活動にホストが割り当てる安定識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: inv-42
      allowed_values: []
      source_claims: [moonweave-shell-command]
    - id: local_surface
      labels: {zh: 本地来源表面, en: Local source surface, ja: ローカルソース表面}
      definitions: {zh: 主机选择适配器时记录的来源类型，非原生协议字段, en: The source category recorded by the host for adapter selection; not a native protocol field, ja: ホストがアダプター選択に記録するソース分類でありネイティブプロトコル項目ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp_tools_call
      allowed_values: [mcp_tools_call, openai_responses_function, openai_responses_remote_mcp, a2a_send_message, local_command]
      source_claims: [moonweave-shell-command]
    - id: local_target_ref
      labels: {zh: 本地目标引用, en: Local target reference, ja: ローカル対象参照}
      definitions: {zh: 指向要执行目标的本地或已发现引用, en: A local or discovered reference to the target being executed, ja: 実行対象へのローカルまたは発見済み参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp:weather/get_weather
      allowed_values: []
      source_claims: [moonweave-shell-command]
    - id: local_lifecycle_state
      labels: {zh: 本地生命周期状态, en: Local lifecycle state, ja: ローカルライフサイクル状態}
      definitions: {zh: 主机对其本地追踪活动的状态，不重命名远程 TaskStatus, en: The host state of its local trace and not a renamed remote TaskStatus, ja: ホストによるローカル軌跡状態でありリモート TaskStatus の改名ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dispatched
      allowed_values: [planned, dispatched, completed, failed, cancelled]
      source_claims: [moonweave-shell-command]
  constraints:
    - id: shell-command-uses-allowlisted-shell
      severity: error
      expression_language: plain
      expression: shell_executable and shell_dialect are an approved compatible pair in host policy.
      explanation:
        zh: shell_executable 与 shell_dialect 必须是主机策略批准的兼容组合。
        en: shell_executable and shell_dialect are a compatible pair approved by host policy.
        ja: shell_executable と shell_dialect はホストポリシーが承認した互換組である。
      source_claims: [moonweave-shell-command]
    - id: shell-command-requires-reviewed-text
      severity: error
      expression_language: plain
      expression: command_text is dispatched only with local_review_reference and is never direct untrusted model or user interpolation.
      explanation:
        zh: command_text 只能在具有 local_review_reference 时派发，且绝不能直接插入不可信模型或用户文本。
        en: command_text is dispatched only with local_review_reference and is never direct untrusted model or user interpolation.
        ja: command_text は local_review_reference を伴う場合のみ配信し、未信頼のモデルまたはユーザー文を直接補間しない。
      source_claims: [mcp-tool-safety, moonweave-shell-command]
    - id: shell-command-id-same-record-parent-identity
      severity: error
      expression_language: plain
      expression: "local_shell_command_id = local_command_id; both identify the same local Command record and inherited parent fields belong to that one record."
      explanation: {zh: "local_shell_command_id 与 local_command_id 标识同一条本地 Command 记录，继承的父字段属于该同一记录。", en: "The child and parent IDs are equal representations of one local record, not a link to a second parent record.", ja: "local_shell_command_id と local_command_id は同じローカル Command レコードを識別し、継承した親フィールドはその一つのレコードに属する。"}
      source_claims: [moonweave-shell-command]
  required_relations: []
examples:
  - id: shell-command-positive-powershell-list

    labels: {zh: PowerShell 目录枚举, en: PowerShell directory listing, ja: PowerShell ディレクトリ一覧}

    descriptions:
      zh: Claude Computer Use {type:"tool_use",name:"computer",input:{action:"click",coordinate:[100,200]}} 或 action:"type" 键盘输入；OpenAI Assistants tools:[{type:"code_interpreter"}] 沙箱 Python 执行。
      en: Claude Computer Use {type:"tool_use",name:"computer",input:{action:"click",coordinate:[100,200]}} or action:"type" keyboard; OpenAI Assistants tools:[{type:"code_interpreter"}] sandbox Python execution.
      ja: Claude Computer Use action:"click"/"type"。OpenAI Assistants tools:[{type:"code_interpreter"}] sandbox Python 実行。
    field_values: {local_shell_command_id: shell-1, shell_executable: powershell.exe, shell_dialect: powershell, command_text: "Get-ChildItem -LiteralPath D:/repo", local_review_reference: review-001}
    related_node_ids: [ShellCommand, Command, ExecutionResult]
    related_relation_ids: [ShellCommand-is_a-Command]

    source_claims: [moonweave-shell-command]
  - id: shell-command-counterexample-unreviewed-model-text

    labels: {zh: 未审查模型 shell 文本, en: Unreviewed model shell text, ja: 未レビューのモデル shell 文字列}

    descriptions:
      zh: 反例：Computer Use click coordinate 超出 display_width_px:1024 边界；Code Interpreter 执行 os.system 逃逸沙箱（应被阻止）。
      en: Counterexample: Computer Use click coordinate exceeds display_width_px:1024; Code Interpreter os.system escapes sandbox (should be blocked).
      ja: 反例：Computer Use click coordinate が display 境界超過。Code Interpreter os.system sandbox 逃逸。
    field_values: {local_shell_command_id: shell-bad, shell_executable: bash, shell_dialect: bash, command_text: "$(untrusted_input)", local_review_reference: ""}
    related_node_ids: [ShellCommand]
    related_relation_ids: [ShellCommand-is_a-Command]

    source_claims: [mcp-tool-safety, moonweave-shell-command]
  - id: shell-command-boundary-argument-vector

    labels: {zh: Shell 与参数向量命令边界, en: Shell versus argument-vector boundary, ja: Shell と引数ベクターの境界}

    descriptions:
      zh: Claude Browser/Computer Use GUI 交互 vs OpenAI Code Interpreter 代码沙箱 vs 本地 ShellCommand 进程执行的权限边界。
      en: Permission boundary among Claude Browser/Computer Use GUI interaction, OpenAI Code Interpreter code sandbox, local ShellCommand process execution.
      ja: Claude Computer Use GUI 交互、OpenAI Code Interpreter コード sandbox、ローカル ShellCommand プロセス実行の権限境界。
    field_values: {local_shell_command_id: shell-pipe, shell_executable: bash, shell_dialect: bash, command_text: "git status --short | sed -n '1,10p'", local_review_reference: review-002}
    related_node_ids: [ShellCommand, Command]
    related_relation_ids: [ShellCommand-is_a-Command]

    source_claims: [moonweave-shell-command]
  - id: shell-command-instance-report-pipeline

    labels: {zh: 报告管道实例, en: Report pipeline instance, ja: レポートパイプラインインスタンス}

    descriptions:
      zh: Code Interpreter 实例：import pandas as pd; df=pd.read_csv('data.csv'); df.describe() 返回统计摘要；Computer Use 实例：action:"screenshot" 捕获 1024x768 屏幕。
      en: Code Interpreter instance: import pandas; df.describe() returns stats; Computer Use instance: action:"screenshot" captures 1024x768 screen.
      ja: Code Interpreter 実例：pandas df.describe() 統計摘要。Computer Use 実例：action:"screenshot" 1024x768 画面キャプチャ。
    field_values: {local_shell_command_id: shell-report, shell_executable: bash, shell_dialect: bash, command_text: "report-generator --format json | jq . > D:/workspace/report.json", local_review_reference: review-003}
    related_node_ids: [ShellCommand, Command, ToolSideEffect, ExecutionResult]
    related_relation_ids: [ShellCommand-is_a-Command]

    source_claims: [moonweave-shell-command]
parent_relation:
  id: ShellCommand-is_a-Command
  predicate: is_a
  target: concept:Command
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是命令调用的一种, en: is a command-invocation subtype, ja: コマンド呼び出しの下位型である}
  definition: {zh: 每个 ShellCommand 都是由 shell 解释的 Command, en: Every ShellCommand is a Command interpreted by a shell, ja: すべての ShellCommand は shell で解釈される Command である}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_shell_command_subtype, labels: {zh: 具有 Shell 命令子类, en: has shell-command subtype, ja: Shell コマンド下位型を持つ}}
  conditions: []
  temporal_scope: execution
  boundary_context: This subtype edge only adds deliberate shell interpretation; results and effects remain separate associated records.
  constraints: []
  examples: []
  source_claims: [moonweave-shell-command]
  distinct_fact_rationale: Every ShellCommand retains Command's process-invocation contract and adds an explicit interpreter boundary. It uses one same-record identity in which local_shell_command_id identifies the same local Command record, so a second Command reference field is not permitted.
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification - Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-specification
    locator: "Security Considerations"
    relevance: Supplies safety requirements relevant to host-controlled execution adapters.
source_claims:
  - id: mcp-tool-safety
    source: mcp-tools-2025-11-25
    supports: Clients and servers validate inputs, preserve user control for sensitive operations, apply access controls, and sanitize outputs around tool execution.
    locator: "Security Considerations"
    evidence_kind: normative
    confidence: high
  - id: moonweave-shell-command
    source: mcp-tools-2025-11-25
    supports: Moonweave ShellCommand is a local Command subtype for explicitly reviewed shell interpretation and is not a protocol-native invocation message.
    locator: "Security Considerations"
    evidence_kind: design-inference
    confidence: high
