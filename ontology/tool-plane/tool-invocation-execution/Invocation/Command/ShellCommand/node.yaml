        zh: 参数
        en: arguments
        ja: 引数
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按顺序保存传给可执行文件的参数。
        en: Stores ordered arguments passed to the executable.
        ja: executable へ渡す ordered arguments を保存します。
      allowed_values: []
      pattern: null
      example_value:
        - test
        - --runInBand
      source_claims:
        - claim-shell-command-007
        - claim-shell-command-008
    - id: quoting_mode
      labels:
        zh: 引用模式
        en: quoting mode
        ja: quoting mode
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录参数引用与转义规则。
        en: Records argument quoting and escaping rules.
        ja: argument quoting と escaping rule を記録します。
      allowed_values: []
      pattern: null
      example_value: powershell-literal
      source_claims:
        - claim-shell-command-009
        - claim-shell-command-010
    - id: pipeline_allowed
      labels:
        zh: 允许管道
        en: pipeline allowed
        ja: pipeline 許可
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 明确本次 Shell 解析是否允许管道运算符，防止命令向量在未声明时扩展为多阶段执行。
        en: States whether this shell parse permits pipeline operators, preventing an argument vector from expanding into multi-stage execution without an explicit declaration.
        ja: この shell parse が pipeline operator を許すかを明示し、未宣言の multi-stage execution への展開を防ぎます。
      allowed_values: []
      pattern: null
      example_value: false
      source_claims:
        - claim-shell-command-011
  constraints: []
  required_relation_constraints: []
