schema: moonweave.ai/ontology-node/v1
id: ShellCommand
kind: concept
status: review
labels:
  zh: Shell 命令
  en: Shell Command
  ja: Shell コマンド
semantics:
  short_definition:
    zh: Shell 命令是由特定 Shell 解释规则处理的一种命令调用。
    en: A Shell Command is a Command Invocation interpreted under a specific shell's parsing rules.
    ja: Shell コマンドは特定 shell の parsing rule で解釈される Command Invocation です。
  definition:
    zh: Shell 命令是一种 Command，以 shell_family、可执行文件、参数向量、引用方式和是否允许管道为种差；它不把任意代码块、自然语言命令或 ShellTool 的稳定定义当作执行发生。
    en: A Shell Command is a Command differentiated by shell_family, executable, argument vector, quoting mode, and whether pipelines are allowed. It does not treat an arbitrary code block, natural-language imperative, or stable ShellTool definition as an execution occurrence.
    ja: Shell コマンドは shell_family・executable・argument vector・quoting mode・pipeline allowance を種差とする Command です。code block・natural-language imperative・stable ShellTool definition を execution occurrence にしません。
  why_needed:
    zh: 显式 Shell 层可区分 PowerShell、POSIX shell 与 cmd 的引用和管道语义，避免把同一字符串误认为跨环境等价。
    en: An explicit shell layer distinguishes PowerShell, POSIX shell, and cmd quoting and pipeline semantics instead of assuming one string is equivalent everywhere.
    ja: explicit shell layer により PowerShell・POSIX shell・cmd の quoting/pipeline semantics を区別し同一 string の cross-environment equivalence を仮定しません。
  includes:
    - zh: 纳入明确指定 shell_family 并按该解析规则提交的命令调用。
      en: Includes command invocations submitted with an explicit shell_family and its parsing rules.
      ja: explicit shell_family と parsing rule で提出された command invocation を含みます。
  excludes:
    - zh: 排除直接 exec 的无 Shell 参数向量、Markdown 代码块和 ShellTool 能力定义。
      en: Excludes direct-exec argument vectors with no shell, Markdown code blocks, and ShellTool capability definitions.
      ja: shell なし direct-exec argument vector・Markdown code block・ShellTool capability definition を除きます。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: shell_family
      labels:
        zh: Shell 类型
        en: shell family
        ja: shell family
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指定负责解析命令的 Shell 家族。
        en: Specifies the shell family responsible for parsing the command.
        ja: command parsing を担当する shell family を指定します。
      allowed_values: []
      pattern: null
      example_value: powershell
      source_claims:
        - claim-shell-command-003
        - claim-shell-command-004
    - id: executable
      labels:
        zh: 可执行文件
        en: executable
        ja: 実行 file
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录 Shell 最终启动的可执行文件。
        en: Records the executable ultimately launched by the shell.
        ja: shell が最終起動する executable を記録します。
      allowed_values: []
      pattern: null
      example_value: pnpm
      source_claims:
        - claim-shell-command-005
        - claim-shell-command-006
    - id: arguments
