schema: moonweave.ai/ontology-node/v1
id: Command
kind: concept
status: accepted
labels:
  zh: 命令调用
  en: Command Invocation
  ja: コマンド呼び出し
semantics:
  short_definition:
    zh: 命令调用是把命令文本或参数向量交给命令执行器的一种调用。
    en: A Command Invocation is an Invocation that submits command text or an argument vector to a command executor.
    ja: コマンド呼び出しは command text または argument vector を command executor へ渡す Invocation です。
  definition:
    zh: 命令调用是一种 Invocation，沿用该调用的 invocation_id，并以执行器、工作目录、命令向量和环境引用为种差；它描述命令发生，而不是可复用 ShellTool 定义、纯文本建议或其输出记录。
    en: A Command Invocation is an Invocation that retains the invocation_id and is differentiated by its executor, working directory, command vector, and environment reference. It records a command occurrence, not a reusable ShellTool definition, textual advice, or its output record.
    ja: コマンド呼び出しは Invocation の invocation_id を継承し、executor・working directory・command vector・environment reference を種差とします。ShellTool definition・text advice・output record ではありません。
  why_needed:
    zh: 命令分支使工作目录、环境和退出状态保持命令语义，同时复用通用调用—尝试—结果闭环。
    en: The command branch preserves working-directory, environment, and exit semantics while reusing the general invocation-attempt-result loop.
    ja: command branch は working directory・environment・exit semantics を保持し general invocation-attempt-result loop を再利用します。
  includes:
    - zh: 纳入已经提交给明确命令执行器、具有继承调用身份和执行环境的命令活动。
      en: Includes command activities submitted to a definite executor with an inherited invocation identity and execution environment.
      ja: 明確な executor へ提出され inherited invocation identity と execution environment を持つ command activity を含みます。
  excludes:
    - zh: 排除 ShellTool 定义、代码片段建议、尚未批准的命令计划和 ExecutionResult。
      en: Excludes a ShellTool definition, suggested code snippet, unapproved command plan, and ExecutionResult.
      ja: ShellTool definition・suggested code snippet・unapproved command plan・ExecutionResult を除きます。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: executor_ref
      labels:
        zh: 执行器引用
        en: executor reference
        ja: executor 参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识实际接收命令的受控执行器。
        en: Identifies the controlled executor receiving the command.
        ja: command を受け取る controlled executor を識別します。
      allowed_values: []
      pattern: null
      example_value: executor:powershell-workspace
      source_claims:
        - claim-command-003
        - claim-command-004
    - id: command_vector
      labels:
        zh: 命令参数向量
        en: command argument vector
        ja: command argument vector
      datatype: array
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存分词后的可执行文件与参数，避免只依赖显示字符串。
        en: Stores the tokenized executable and arguments rather than relying only on a display string.
        ja: display string だけでなく tokenized executable と arguments を保存します。
      allowed_values: []
      pattern: null
      example_value:
        - pnpm
        - test
      source_claims:
        - claim-command-005
        - claim-command-006
    - id: working_directory
      labels:
        zh: 工作目录
        en: working directory
        ja: 作業 directory
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录执行器解析相对路径时使用的目录。
        en: Records the directory used by the executor to resolve relative paths.
        ja: relative path 解決に使う directory を記録します。
      allowed_values: []
      pattern: null
      example_value: D:/workspace
      source_claims:
        - claim-command-007
        - claim-command-008
    - id: environment_ref
      labels:
        zh: 环境引用
        en: environment reference
        ja: 環境参照
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用受控环境快照，不在节点中复制密钥值。
        en: References a controlled environment snapshot without copying secret values into the node.
        ja: secret value を node へ複製せず controlled environment snapshot を参照します。
      allowed_values: []
      pattern: null
      example_value: env:ci-readonly
      source_claims:
        - claim-command-009
        - claim-command-010
  constraints: []
  required_relation_constraints: []
