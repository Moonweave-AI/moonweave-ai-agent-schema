schema: moonweave.ai/ontology-node/v1
id: Command
kind: concept
labels:
  zh: 命令调用
  en: Command invocation
  ja: コマンド呼び出し
semantics:
  short_definition:
    zh: 以程序路径和参数向本地主机进程执行器派发的本地调用子类。
    en: A local Invocation subtype dispatched to a host process executor with a program path and arguments.
    ja: プログラムパスと引数でホストのプロセス実行器に配信されるローカル Invocation の下位型。
  definition:
    zh: >-
      Command 是目标为主机进程可执行文件及参数向量的本地 Invocation。它记录程序、参数、工作目录和环境允许列表等进程启动意图；它不是 MCP 工具定义或 tools/call 请求、OpenAI function_call item 或 A2A message。主机可经这些协议暴露命令，但协议记录与命令执行仍是不同对象。
    en: >
      A Command is a local Invocation whose target is a host process executable and argument vector.
      It records local process-launch intent such as program, arguments, working directory, and an
      environment allowlist. It is not an MCP tool definition or tools/call request, an OpenAI
      function_call item, or an A2A message. A host may expose a command through one of those
      protocols, but that protocol record and the command execution remain distinct objects.
    ja: >-
      Command は対象がホストプロセスの executable と引数ベクターであるローカル Invocation である。プログラム、引数、作業ディレクトリ、環境 allowlist などの起動意図を記録する。MCP ツール定義または tools/call 要求、OpenAI function_call item、A2A message ではない。ホストはこれらのプロトコルを通じて command を公開できるが、プロトコル記録と command 実行は別の object である。
  why_needed:
    zh: >-
      本地进程执行需要独立于模型或远程服务器的明确审计与安全边界。将 Command 视为 Invocation 子类是恰当的，因为每个 Command 是一次本地执行活动；参数、输出或诊断则不应被建模为其子类。
    en: >
      Local process execution needs explicit audit and safety boundaries independent of a model or
      remote server. Treating the command as an Invocation subtype is appropriate because every
      Command is one local execution activity; treating its arguments, output, or diagnostics as
      subtypes would not be.
    ja: >-
      ローカルのプロセス実行には、モデルやリモートサーバーから独立した明示的な監査および安全境界が必要である。各 Command は一つのローカル実行活動なので Invocation subtype とするのは適切だが、引数、出力、診断をその subtype としてはいけない。
  includes:
    - {zh: 可执行程序、参数向量和工作目录, en: "Executable program, argument vector, and working directory", ja: 実行プログラム、引数ベクター、作業ディレクトリ}
    - {zh: 本地环境白名单和进程运行器引用, en: Local environment allowlist and process-runner reference, ja: ローカル環境許可リストとプロセス実行器参照}
  excludes:
    - {zh: shell 解释器字符串语法, en: Shell-interpreter string syntax, ja: shell インタープリター文字列構文}
    - {zh: MCP 或 OpenAI 原生工具调用载荷, en: Native MCP or OpenAI tool-call payloads, ja: ネイティブ MCP または OpenAI ツール呼び出しペイロード}
  semantic_kind: activity
  aliases:
    - {language: en, value: process invocation, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      主机用程序和参数向量调用进程运行器，而不是拼接不可信的 shell 命令字符串。高层工具适配器收到模型输入时，必须先校验并转换允许值，再创建此本地 Command；stdout、stderr、退出状态和副作用另作结果或效果组成部分。
    en: >
      The host invokes a process runner with a program and argument vector rather than composing an
      untrusted shell command string. If a higher-level tool adapter receives model input, it validates
      and converts allowed values before creating this local Command. Process stdout, stderr, exit
      status, and side effects are represented separately as result or effect components.
    ja: >-
      ホストは信頼できない shell command string を組み立てず、プログラムと引数ベクターで process runner を呼び出す。上位の tool adapter がモデル入力を受ける場合、許可値を検証・変換してからこのローカル Command を作成する。stdout、stderr、終了状態、副作用は別の結果または効果の構成要素として表す。
  typical_input:
    - description: A local process-runner request, not a network protocol payload.
      format: '{"program":"git","arguments":["status","--short"],"working_directory":"D:/repo"}'
      source_claims: [moonweave-command-projection]
  typical_output:
    - description: A process result is recorded separately after the command terminates.
      format: '{"local_command_id":"cmd-1","local_execution_result_ref":"result-cmd-1"}'
      source_claims: [moonweave-command-projection]
  reference_implementations:
    - name: MCP Tools specification - Security Considerations
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Requires validation, access control, rate limits, output sanitation, and user control around tool execution.
structure:
  identity_keys: [local_command_id]
  fields:
    - id: local_command_id
      labels: {zh: 本地命令标识, en: Local command ID, ja: ローカルコマンド ID}
      definitions: {zh: 主机分配给命令调用的本地标识, en: The identifier the host assigns to the command invocation, ja: コマンド呼び出しにホストが割り当てる識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: cmd-1
      allowed_values: []
      source_claims: [moonweave-command-projection]
    - id: program
      labels: {zh: 可执行程序, en: Executable program, ja: 実行プログラム}
      definitions: {zh: 由受控主机解析的程序标识或路径, en: A program identifier or path resolved by the controlled host, ja: 制御されたホストが解決するプログラム識別子またはパス}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: git
      allowed_values: []
      source_claims: [moonweave-command-projection]
    - id: arguments
      labels: {zh: 参数向量, en: Argument vector, ja: 引数ベクター}
      definitions: {zh: 不经过 shell 解释器拼接的有序参数值, en: Ordered argument values passed without shell-string concatenation, ja: shell 文字列連結を経ずに渡す順序付き引数値}
      datatype: string[]
      required: true
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: '["status","--short"]'
      allowed_values: []
      source_claims: [moonweave-command-projection]
    - id: working_directory
      labels: {zh: 工作目录, en: Working directory, ja: 作業ディレクトリ}
      definitions: {zh: 受策略约束的可选本地运行目录, en: An optional policy-constrained local process working directory, ja: ポリシー制約を受ける任意のローカルプロセス作業ディレクトリ}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: D:/repo
      allowed_values: []
      source_claims: [moonweave-command-projection]
    - id: environment_allowlist
      labels: {zh: 环境变量白名单, en: Environment allowlist, ja: 環境許可リスト}
      definitions: {zh: 允许传给子进程的环境变量名称，而不是秘密值, en: Names of environment variables allowed into the child process rather than secret values, ja: 秘密値ではなく子プロセスに許可する環境変数名}
      datatype: string[]
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: '["PATH","LANG"]'
      allowed_values: []
      source_claims: [moonweave-command-projection, mcp-tool-execution-safety]
    - id: local_invocation_id
      labels: {zh: 本地调用标识, en: Local invocation ID, ja: ローカル呼び出し ID}
      definitions: {zh: 主机为一个本地执行活动分配的稳定标识, en: A stable identifier assigned by the host to one local execution activity, ja: 一つのローカル実行活動にホストが割り当てる安定識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: inv-42
      allowed_values: []
      source_claims: [moonweave-command-projection]
    - id: local_surface
      labels: {zh: 本地来源表面, en: Local source surface, ja: ローカルソース表面}
      definitions: {zh: 主机选择适配器时记录的来源类型，非原生协议字段, en: The source category recorded by the host for adapter selection; not a native protocol field, ja: ホストがアダプター選択に記録するソース分類でありネイティブプロトコル項目ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp_tools_call
      allowed_values: [mcp_tools_call, openai_responses_function, openai_responses_remote_mcp, a2a_send_message, local_command]
      source_claims: [moonweave-command-projection]
    - id: local_target_ref
      labels: {zh: 本地目标引用, en: Local target reference, ja: ローカル対象参照}
      definitions: {zh: 指向要执行目标的本地或已发现引用, en: A local or discovered reference to the target being executed, ja: 実行対象へのローカルまたは発見済み参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp:weather/get_weather
      allowed_values: []
      source_claims: [moonweave-command-projection]
    - id: local_lifecycle_state
      labels: {zh: 本地生命周期状态, en: Local lifecycle state, ja: ローカルライフサイクル状態}
      definitions: {zh: 主机对其本地追踪活动的状态，不重命名远程 TaskStatus, en: The host state of its local trace and not a renamed remote TaskStatus, ja: ホストによるローカル軌跡状態でありリモート TaskStatus の改名ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dispatched
      allowed_values: [planned, dispatched, completed, failed, cancelled]
      source_claims: [moonweave-command-projection]
  constraints:
    - id: command-uses-program-and-vector
      severity: error
      expression_language: plain
      expression: program is non-empty and arguments are passed as ordered values rather than one shell-interpreted command string.
      explanation:
        zh: program 必须非空，arguments 必须以有序值传递而非一个 shell 解释字符串。
        en: program is non-empty and arguments are passed as ordered values rather than one shell-interpreted command string.
        ja: program は空でなく、arguments は一つの shell 解釈文字列ではなく順序付き値として渡される。
      source_claims: [moonweave-command-projection]
    - id: command-keeps-secrets-out-of-record
      severity: error
      expression_language: plain
      expression: environment_allowlist contains names only; command records do not store secret environment values or credentials.
      explanation:
        zh: 环境白名单仅包含名称；命令记录不得存储秘密环境值或凭证。
        en: The environment allowlist contains names only; command records do not store secret environment values or credentials.
        ja: 環境許可リストは名前のみを含み、コマンド記録は秘密環境値や資格情報を保存しない。
      source_claims: [mcp-tool-execution-safety, moonweave-command-projection]
    - id: command-id-same-record-parent-identity
      severity: error
      expression_language: plain
      expression: "local_command_id = local_invocation_id; both identify the same local Invocation record and inherited parent fields belong to that one record."
      explanation: {zh: "local_command_id 与 local_invocation_id 标识同一条本地 Invocation 记录，继承的父字段属于该同一记录。", en: "The child and parent IDs are equal representations of one local record, not a link to a second parent record.", ja: "local_command_id と local_invocation_id は同じローカル Invocation レコードを識別し、継承した親フィールドはその一つのレコードに属する。"}
      source_claims: [moonweave-command-projection]
  required_relations: []
examples:
  - id: command-positive-git-status

    labels: {zh: Git 状态命令, en: Git status command, ja: Git status コマンド}

    descriptions:
      zh: "Claude Computer Use {type:\"tool_use\",name:\"computer\",input:{action:\"click\",coordinate:[100,200]}} 或 action:\"type\" 键盘输入；OpenAI Assistants tools:[{type:\"code_interpreter\"}] 沙箱 Python 执行。"
      en: "Claude Computer Use {type:\"tool_use\",name:\"computer\",input:{action:\"click\",coordinate:[100,200]}} or action:\"type\" keyboard; OpenAI Assistants tools:[{type:\"code_interpreter\"}] sandbox Python execution."
      ja: "Claude Computer Use action:\"click\"/\"type\"。OpenAI Assistants tools:[{type:\"code_interpreter\"}] sandbox Python 実行。"
    field_values: {local_command_id: cmd-1, program: git, arguments: '["status","--short"]', working_directory: D:/repo, environment_allowlist: '["PATH","LANG"]'}
    related_node_ids: [Command, Invocation, ExecutionResult]
    related_relation_ids: [Command-is_a-Invocation]

    source_claims: [moonweave-command-projection]
  - id: command-counterexample-shell-injection

    labels: {zh: 拼接的 shell 注入, en: Concatenated shell injection, ja: 連結された shell 注入}

    descriptions:
      zh: 反例：Computer Use click coordinate 超出 display_width_px:1024 边界；Code Interpreter 执行 os.system 逃逸沙箱（应被阻止）。
      en: Counterexample: Computer Use click coordinate exceeds display_width_px:1024; Code Interpreter os.system escapes sandbox (should be blocked).
      ja: 反例：Computer Use click coordinate が display 境界超過。Code Interpreter os.system sandbox 逃逸。
    field_values: {local_command_id: cmd-bad, program: "sh -c", arguments: '["git status; rm -rf /tmp/x"]'}
    related_node_ids: [Command]
    related_relation_ids: [Command-is_a-Invocation]

    source_claims: [moonweave-command-projection]
  - id: command-boundary-mcp-tool

    labels: {zh: 命令与 MCP 工具边界, en: Command versus MCP tool boundary, ja: コマンドと MCP ツールの境界}

    descriptions:
      zh: Claude Browser/Computer Use GUI 交互 vs OpenAI Code Interpreter 代码沙箱 vs 本地 ShellCommand 进程执行的权限边界。
      en: Permission boundary among Claude Browser/Computer Use GUI interaction, OpenAI Code Interpreter code sandbox, local ShellCommand process execution.
      ja: Claude Computer Use GUI 交互、OpenAI Code Interpreter コード sandbox、ローカル ShellCommand プロセス実行の権限境界。
    field_values: {local_command_id: cmd-2, program: git, arguments: '["status"]'}
    related_node_ids: [Command, ToolCall, Invocation]
    related_relation_ids: [Command-is_a-Invocation]

    source_claims: [mcp-tool-execution-safety, moonweave-command-projection]
  - id: command-instance-report-generator

    labels: {zh: 报告生成器命令实例, en: Report-generator command instance, ja: レポート生成コマンドインスタンス}

    descriptions:
      zh: Code Interpreter 实例：import pandas as pd; df=pd.read_csv('data.csv'); df.describe() 返回统计摘要；Computer Use 实例：action:"screenshot" 捕获 1024x768 屏幕。
      en: Code Interpreter instance: import pandas; df.describe() returns stats; Computer Use instance: action:"screenshot" captures 1024x768 screen.
      ja: Code Interpreter 実例：pandas df.describe() 統計摘要。Computer Use 実例：action:"screenshot" 1024x768 画面キャプチャ。
    field_values: {local_command_id: cmd-report, program: report-generator, arguments: '["--format","json"]', working_directory: D:/workspace, environment_allowlist: '["LANG"]'}
    related_node_ids: [Command, Invocation, ExecutionResult]
    related_relation_ids: [Command-is_a-Invocation]

    source_claims: [moonweave-command-projection]
parent_relation:
  id: Command-is_a-Invocation
  predicate: is_a
  target: concept:Invocation
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是调用的一种, en: is an invocation subtype, ja: 呼び出しの下位型である}
  definition: {zh: 每个 Command 都是针对本地进程目标的一次 Invocation, en: Every Command is an Invocation whose target is a local process, ja: すべての Command はローカルプロセスを対象とする Invocation である}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_command_invocation, labels: {zh: 具有命令调用, en: has command invocation, ja: コマンド呼び出しを持つ}}
  conditions: []
  temporal_scope: execution
  boundary_context: This hierarchy classifies a local activity subtype; command results and diagnostics remain composed records.
  constraints: []
  examples: []
  source_claims: [moonweave-command-projection]
  distinct_fact_rationale: A Command genuinely inherits the local Invocation activity contract while adding process-target fields. It uses one same-record identity in which local_command_id identifies the same local Invocation record, so a second Invocation reference field is not permitted.
relations: []
sources:
  - id: mcp-tools-2025-11-25
    title: Model Context Protocol Specification - Tools
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
    source_type: official-specification
    locator: "Security Considerations"
    relevance: Provides execution validation and safety boundaries that local command adapters must preserve.
source_claims:
  - id: mcp-tool-execution-safety
    source: mcp-tools-2025-11-25
    supports: MCP server tool execution requires input validation, access control, rate limiting, and sanitized output, while clients keep user control over sensitive invocations.
    locator: "Security Considerations"
    evidence_kind: normative
    confidence: high
  - id: moonweave-command-projection
    source: mcp-tools-2025-11-25
    supports: Moonweave Command is a local process-execution Invocation subtype that uses a program and argument vector and does not claim to be an MCP, OpenAI, or A2A payload.
    locator: "Security Considerations"
    evidence_kind: design-inference
    confidence: high