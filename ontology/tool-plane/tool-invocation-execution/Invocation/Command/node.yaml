      en: Create Command while preserving its identity from adjacent specifications, attempts, or results.
      ja: Command を作成し adjacent specification・attempt・result との separate identity を保持します。
    why_valid_or_invalid:
      zh: 纳入已经提交给明确命令执行器、具有 command_id 和执行环境的命令活动。
      en: Includes command activities submitted to a definite executor with a command_id and execution environment.
      ja: 明確な executor へ提出され command_id と execution environment を持つ command activity を含みます。
    synthetic: true
