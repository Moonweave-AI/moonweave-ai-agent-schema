schema: moonweave.ai/ontology-node/v1
id: PromptInstantiation
kind: concept
labels: {zh: 提示词实例化记录, en: Prompt instantiation record, ja: プロンプト具体化記録}
semantics:
  short_definition: {zh: 由一次 InvocationAttempt 生成并关联 PromptGetRequest 的提示词消息实体, en: A materialized prompt-message Entity generated by an InvocationAttempt and linked to a PromptGetRequest, ja: InvocationAttempt が生成し PromptGetRequest に関連する具体化済みプロンプトメッセージ Entity}
  definition:
    zh: >-
      PromptInstantiation 是 Moonweave 本地固定方面实体，记录 PromptGetRequest 被 InvocationAttempt 使用后返回的已实例化消息。它引用原生 MCP prompts/get 的 result.messages 集合；它不是该 JSON-RPC 响应、OpenAI Responses message、ToolResult 或请求的独立子类。
    en: >
      A PromptInstantiation is a Moonweave local, fixed-aspect Entity that records materialized messages
      returned after a PromptGetRequest is used by an InvocationAttempt. It references the native MCP prompts/get result.messages
      collection; it is not that JSON-RPC response, an OpenAI Responses message, a ToolResult, or a
      standalone subtype of the request.
    ja: >-
      PromptInstantiation は PromptGetRequest が InvocationAttempt により使用された後に返る具体化済み message を記録する Moonweave のローカル固定側面 Entity である。ネイティブ MCP prompts/get の result.messages collection を参照する。その JSON-RPC response、OpenAI Responses message、ToolResult、request の独立 subtype ではない。
  why_needed:
    zh: >-
      提示词检索成功会返回含 role 和类型化内容的 PromptMessage 对象。跟踪其生成的本地实例化可让主机审计选取和渲染内容，同时保留 MCP 的消息和内容契约。
    en: >
      A prompt retrieval succeeds by returning PromptMessage objects with role and typed content.
      Tracking their generated local materialization lets a host audit what was selected and rendered while
      retaining MCP's message and content contracts.
    ja: >-
      prompt retrieval の成功は role と型付き content を持つ PromptMessage object を返す。生成されたローカル materialization を追跡することで、MCP の message と content contract を保ったまま、ホストは選択・render 内容を監査できる。
  includes:
    - {zh: 本地实例化标识、请求引用、原生 messages 引用和消息数, en: "Local instantiation ID, request reference, native messages reference, and message count", ja: ローカル具体化 ID、要求参照、ネイティブ messages 参照、メッセージ数}
  excludes:
    - {zh: 原生 prompts/get JSON-RPC 响应, en: Native prompts/get JSON-RPC response, ja: ネイティブ prompts/get JSON-RPC 応答}
    - {zh: ToolResult、A2A Artifact 或 OpenAI Responses message, en: "ToolResult, A2A Artifact, or OpenAI Responses message", ja: ToolResult、A2A Artifact、OpenAI Responses message}
  semantic_kind: entity
  aliases:
    - {language: en, value: local prompt materialization, alias_kind: synonym}
engineering:
  explanation:
    zh: >-
      MCP prompts/get 返回 description 与 messages，消息 role 为 user 或 assistant，content 是带类型的 MCP 内容块。该节点仅保存引用和本地审计元数据，格式错误或不可用响应则成为诊断。
    en: >
      MCP prompts/get returns {"description":"Code review prompt","messages":[{"role":"user",
      "content":{"type":"text","text":"Please review this code"}}]}. The returned message role is
      user or assistant and the content is a typed MCP content block. This node stores a reference
      and local audit metadata only; malformed or unavailable responses become diagnostics.
    ja: >-
      MCP prompts/get は description と messages を返し、message role は user または assistant、content は型付き MCP content block である。この node は参照とローカル監査 metadata だけを保存し、不正形式または利用不能な response は diagnostic になる。
  typical_input:
    - description: Native prompts/get success result.
      format: '{"description":"Code review prompt","messages":[{"role":"user","content":{"type":"text","text":"Please review this code"}}]}'
      source_claims: [mcp-prompt-messages]
  typical_output:
    - description: Local materialization record referencing the native messages array.
      format: '{"local_prompt_instantiation_id":"prompt-instance-42","local_prompt_get_request_ref":"prompt-get-42","local_mcp_messages_ref":"mcp-session-42#id-2/result/messages","local_message_count":1,"local_materialization_state":"complete"}'
      source_claims: [moonweave-prompt-instantiation]
  reference_implementations:
    - name: Model Context Protocol Prompts specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
      description: Defines prompts/get response messages and content forms.
structure:
  identity_keys: [local_prompt_instantiation_id]
  fields:
    - id: local_prompt_instantiation_id
      labels: {zh: 本地提示词实例化标识, en: Local prompt-instantiation ID, ja: ローカルプロンプト具体化 ID}
      definitions: {zh: 主机分配给已材料化提示词消息的标识, en: Identifier assigned by the host to materialized prompt messages, ja: 具体化済みプロンプトメッセージにホストが割り当てる識別子}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: prompt-instance-42
      allowed_values: []
      source_claims: [moonweave-prompt-instantiation]
    - id: local_attempt_ref
      labels: {zh: 调用尝试引用, en: Invocation-attempt reference, ja: InvocationAttempt 参照}
      definitions: {zh: 实际接收并材料化该 MCP 提示词消息的 InvocationAttempt, en: InvocationAttempt that actually received and materialized the MCP prompt messages, ja: MCP プロンプトメッセージを実際に受信して材料化した InvocationAttempt}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: attempt-42-1
      allowed_values: []
      source_claims: [moonweave-prompt-instantiation]
    - id: local_prompt_get_request_ref
      labels: {zh: 提示词获取请求引用, en: Prompt-get request reference, ja: PromptGetRequest 参照}
      definitions: {zh: 包含该材料化组件的本地 PromptGetRequest, en: Local PromptGetRequest that contains this materialization component, ja: この材料化構成要素を含むローカル PromptGetRequest}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: prompt-get-42
      allowed_values: []
      source_claims: [moonweave-prompt-instantiation]
    - id: local_mcp_messages_ref
      labels: {zh: MCP messages 引用, en: MCP messages reference, ja: MCP messages 参照}
      definitions: {zh: 指向保留的原生 prompts/get result.messages 数组的不可变本地引用, en: Immutable local reference to the retained native prompts/get result.messages array, ja: 保持されたネイティブ prompts/get result.messages 配列への不変ローカル参照}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: mcp-session-42#id-2/result/messages
      allowed_values: []
      source_claims: [mcp-prompt-messages, moonweave-prompt-instantiation]
    - id: local_message_count
      labels: {zh: 本地消息数量, en: Local message count, ja: ローカルメッセージ数}
      definitions: {zh: 被引用原生 messages 数组的审计计数，不替代数组本身, en: Audit count of the referenced native messages array and not a replacement for that array, ja: 参照するネイティブ messages 配列の監査数であり配列自体の置換ではない}
      datatype: integer
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims: [mcp-prompt-messages, moonweave-prompt-instantiation]
    - id: local_materialization_state
      labels: {zh: 本地材料化状态, en: Local materialization state, ja: ローカル材料化状態}
      definitions: {zh: 主机对消息材料化完备性的局部观察，不是 MCP 响应字段, en: Host-local observation of materialization completeness and not an MCP response field, ja: メッセージ材料化の完全性に関するホストローカル観測であり MCP 応答項目ではない}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: complete
      allowed_values: [complete, partial]
      source_claims: [moonweave-prompt-instantiation]
    - id: local_messages_sha256
      labels: {zh: 本地消息摘要, en: Local messages digest, ja: ローカルメッセージダイジェスト}
      definitions: {zh: 可选的本地完整性摘要，不是 MCP messages 字段, en: Optional local integrity digest and not an MCP messages field, ja: 任意のローカル完全性ダイジェストであり MCP messages 項目ではない}
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: '^sha256:[0-9a-f]{64}$'
      example_value: sha256:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      allowed_values: []
      source_claims: [moonweave-prompt-instantiation]
  constraints:
    - id: prompt-instantiation-references-valid-messages
      severity: error
      expression_language: plain
      expression: local_mcp_messages_ref identifies retained MCP PromptMessage objects with role user or assistant and typed content, and local_message_count equals the referenced array length.
      explanation: {zh: local_mcp_messages_ref 必须指向 role 为 user 或 assistant 且含类型化内容的 MCP PromptMessage；消息数必须一致, en: "local_mcp_messages_ref identifies MCP PromptMessage objects with user or assistant role and typed content, and the message count matches", ja: local_mcp_messages_ref は role が user または assistant で型付き内容を持つ MCP PromptMessage を示しメッセージ数は一致する}
      source_claims: [mcp-prompt-messages, moonweave-prompt-instantiation]
    - id: prompt-instantiation-is-not-native-response
      severity: error
      expression_language: plain
      expression: Local materialization metadata must not be inserted into the native prompts/get result.messages schema.
      explanation: {zh: 本地材料化元数据不得插入原生 prompts/get result.messages schema, en: Local materialization metadata must not be inserted into native prompts/get result.messages schema, ja: ローカル材料化メタデータをネイティブ prompts/get result.messages schema に挿入してはならない}
      source_claims: [mcp-prompt-messages, moonweave-prompt-instantiation]
  required_relations: [PromptInstantiation-was_generated_by-InvocationAttempt]
examples:
  - id: prompt-instantiation-positive-text

    labels: {zh: 文本提示词消息实例化, en: Text prompt-message materialization, ja: テキストプロンプトメッセージ具体化}

    descriptions:
      zh: ReAct Observation 步骤返回环境反馈；Anthropic {type:"tool_result",tool_use_id:"toolu_01",content:"15°C, sunny"}；OpenAI Code Interpreter 沙箱返回 text/image 输出。
      en: ReAct Observation step returns environment feedback; Anthropic {type:"tool_result",tool_use_id:"toolu_01",content:"15°C, sunny"}; OpenAI Code Interpreter sandbox returns text/image output.
      ja: ReAct Observation が環境 feedback を返す。Anthropic tool_result。OpenAI Code Interpreter sandbox が text/image 出力を返す。
    field_values: {local_prompt_instantiation_id: prompt-instance-42, local_attempt_ref: attempt-42-1, local_prompt_get_request_ref: prompt-get-42, local_mcp_messages_ref: mcp-session-42#id-2/result/messages, local_message_count: 1, local_materialization_state: complete}
    related_node_ids: [PromptInstantiation, PromptGetRequest, InvocationAttempt]
    related_relation_ids: [PromptInstantiation-was_generated_by-InvocationAttempt]

    source_claims: [mcp-prompt-messages, moonweave-prompt-instantiation]
  - id: prompt-instantiation-counterexample-tool-result

    labels: {zh: 将提示词消息当作工具结果, en: Prompt message treated as tool result, ja: ツール結果として扱われるプロンプトメッセージ}

    descriptions:
      zh: 反例：Toolformer 执行 [Calculator(350/7)] 后未插入结果 token 50 就继续生成；Anthropic tool_result 的 tool_use_id 与 tool_use 不匹配。
      en: Counterexample: Toolformer continues generation without inserting result token 50 after [Calculator(350/7)]; Anthropic tool_result tool_use_id mismatches tool_use.
      ja: 反例：Toolformer が [Calculator(350/7)] 実行後 result token 50 未挿入で生成継続。Anthropic tool_result tool_use_id 不一致。
    field_values: {local_prompt_instantiation_id: prompt-instance-bad, local_attempt_ref: attempt-43-1, local_prompt_get_request_ref: prompt-get-43, local_mcp_messages_ref: mcp-session-42#id-3/result/messages, local_message_count: 1, local_materialization_state: complete}
    related_node_ids: [PromptInstantiation, ToolResult]
    related_relation_ids: [PromptInstantiation-was_generated_by-InvocationAttempt]

    source_claims: [mcp-prompt-messages, moonweave-prompt-instantiation]
  - id: prompt-instantiation-boundary-native-messages

    labels: {zh: 原生 messages 与本地材料化边界, en: Native messages versus local-materialization boundary, ja: ネイティブ messages とローカル材料化の境界}

    descriptions:
      zh: Vercel AI SDK streamText 流式 tool result delta vs 完整 ToolResult 记录的聚合边界；Code Interpreter 图像输出非 text-only ToolResult。
      en: Boundary between Vercel AI SDK streamText streaming tool-result deltas vs aggregated ToolResult record; Code Interpreter image output is not text-only ToolResult.
      ja: Vercel AI SDK streamText ストリーミング tool result delta と完全 ToolResult 記録の集約境界。Code Interpreter 画像出力は text-only ToolResult ではない。
    field_values: {local_prompt_instantiation_id: prompt-instance-44, local_attempt_ref: attempt-44-1, local_prompt_get_request_ref: prompt-get-44, local_mcp_messages_ref: mcp-session-42#id-4/result/messages, local_message_count: 2, local_materialization_state: partial}
    related_node_ids: [PromptInstantiation, PromptGetRequest, InvocationAttempt]
    related_relation_ids: [PromptInstantiation-was_generated_by-InvocationAttempt]

    source_claims: [mcp-prompt-messages, moonweave-prompt-instantiation]
  - id: prompt-instantiation-instance-embedded-resource

    labels: {zh: 嵌入资源提示词实例, en: Embedded-resource prompt instance, ja: 埋込リソースプロンプト実例}

    descriptions:
      zh: OpenAI Assistants code_interpreter 实例：执行 plt.savefig 返回 image/png base64；Vercel AI SDK execute 返回 {temperature:15,unit:"C"} JSON。
      en: OpenAI Assistants code_interpreter instance: plt.savefig returns image/png base64; Vercel AI SDK execute returns {temperature:15,unit:"C"} JSON.
      ja: OpenAI Assistants code_interpreter 実例：plt.savefig が image/png base64 を返す。Vercel AI SDK execute が {temperature:15,unit:"C"} JSON を返す。
    field_values: {local_prompt_instantiation_id: prompt-instance-resource-1, local_attempt_ref: attempt-resource-1, local_prompt_get_request_ref: prompt-get-resource-1, local_mcp_messages_ref: mcp-session-45#id-9/result/messages, local_message_count: 1, local_materialization_state: complete, local_messages_sha256: sha256:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    related_node_ids: [PromptInstantiation, PromptGetRequest, InvocationAttempt]
    related_relation_ids: [PromptInstantiation-was_generated_by-InvocationAttempt]

    source_claims: [mcp-prompt-messages, moonweave-prompt-instantiation]
parent_relation: null
relations:
  - id: PromptInstantiation-was_generated_by-InvocationAttempt
    predicate: was_generated_by
    target: concept:InvocationAttempt
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 由调用尝试生成, en: was generated by invocation attempt, ja: 呼出し試行により生成された}
    definitions: {zh: 当 local_attempt_ref 指向实际接收并材料化 messages 的 InvocationAttempt 时，该提示词实例化实体由该尝试生成, en: The prompt-instantiation Entity is generated by the InvocationAttempt identified by local_attempt_ref when that attempt actually receives and materializes messages, ja: local_attempt_ref が messages を実際に受信して材料化した InvocationAttempt を指すときプロンプト具体化 Entity はその試行により生成される}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: generated, labels: {zh: 生成提示词实例化, en: generated prompt instantiation, ja: プロンプト具体化を生成した}}
    conditions:
      - id: prompt-instantiation-generation-condition
        severity: error
        expression_language: plain
        expression: Assert only when local_attempt_ref identifies the target attempt, local_prompt_get_request_ref identifies its used request, and retained native messages evidence exists.
        explanation: {zh: 单独的请求草稿不会生成材料化消息实体, en: A request draft alone does not generate a materialized-message Entity, ja: 要求下書きだけでは材料化メッセージ Entity を生成しない}
        source_claims: [prov-entity-activity, moonweave-prompt-instantiation]
    temporal_scope: execution
    boundary_context: This cross-link describes a generated message Entity and does not make result.messages a component or subtype of request data.
    constraints: []
    examples: []
    source_claims: [prov-entity-activity, moonweave-prompt-instantiation]
    distinct_fact_rationale: Materialized prompt messages are a post-activity Entity with a provenance edge, not a child of request data.
    layout_role: cross-link
sources:
  - id: mcp-prompts-2025-11-25
    title: Model Context Protocol Specification - Prompts
    url: https://modelcontextprotocol.io/specification/2025-11-25/server/prompts
    source_type: official-specification
    locator: "Getting a Prompt; PromptMessage; Text Content; Embedded Resources"
    relevance: Defines prompt response messages, roles, and content types.
  - id: prov-o-core
    title: "PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    locator: "prov:Entity; prov:Activity; prov:wasGeneratedBy"
    relevance: Distinguishes materialized message entities from generating activities.
source_claims:
  - id: prov-entity-activity
    source: prov-o-core
    supports: PROV-O distinguishes an Entity from the Activity that generated it and defines prov:wasGeneratedBy for that provenance fact.
    locator: "PROV-O: prov:Entity, prov:Activity, prov:wasGeneratedBy"
    evidence_kind: normative
    confidence: high
  - id: mcp-prompt-messages
    source: mcp-prompts-2025-11-25
    supports: A successful MCP prompts/get response returns messages whose role is user or assistant and whose content is typed text, image, audio, or embedded resource content.
    locator: "Getting a Prompt; PromptMessage; Text Content; Image Content; Audio Content; Embedded Resources"
    evidence_kind: normative
    confidence: high
  - id: moonweave-prompt-instantiation
    source: mcp-prompts-2025-11-25
    supports: Moonweave PromptInstantiation is a local materialization component that references native prompts/get result.messages without taking over their schema.
    locator: "Getting a Prompt"
    evidence_kind: design-inference
    confidence: high
