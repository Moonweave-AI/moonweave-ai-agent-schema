global_constraints:
  - id: global-no-hidden-chain-of-thought
    severity: error
    expression_language: plain
    expression: Canonical information describes observable plans, actions, decisions, summaries, state changes, results, and evidence; it never requires private chain-of-thought.
    explanations:
      zh: canonical 信息不得要求保存私有思维链。
      en: Canonical information must not require private chain-of-thought storage.
      ja: 正規情報は非公開の思考連鎖の保存を要求してはなりません。
    source_claims:
      - claim-agent-system-ontology-003
  - id: AX_adapter_terms_do_not_redefine_core
    severity: error
    expression_language: plain
    expression: Adapter mappings may reference core Concepts but cannot redefine their canonical meaning.
    explanations:
      zh: 适配映射可以引用核心概念，但不能重定义其 canonical 语义。
      en: Adapter mappings may reference core Concepts but cannot redefine their canonical meaning.
      ja: アダプタ写像はコア概念を参照できますが、その canonical な意味を再定義できません。
    source_claims:
      - claim-agent-system-ontology-004
      - claim-agent-system-ontology-005
  - id: AX_no_metadata_terms_in_subject_terms
    severity: error
    expression_language: plain
    expression: Ontology-engineering annotations are artifact metadata and cannot become Agent-system Concepts solely to explain another node.
    explanations:
      zh: 本体工程注解属于产物元数据，不能仅为解释另一节点而成为 Agent 系统概念。
      en: Ontology-engineering annotations are artifact metadata and cannot become Agent-system Concepts solely to explain another node.
      ja: 本体工学注釈は成果物メタデータであり、別ノードを説明するだけの Agent システム概念にはできません。
    source_claims:
      - claim-agent-system-ontology-006
      - claim-agent-system-ontology-007
case_paths:
  - id: software-defect-repair
    labels:
      zh: 软件缺陷修复闭环
      en: Software defect repair loop
      ja: ソフトウェア欠陥修復ループ
    descriptions:
      zh: 缺陷 MWA-217 的唯一主案例：src/lib/ontology-index.ts 遇到缺失关系端点时隐藏有效图谱；案例按 Goal、TaskPlan、TaskStep、ToolCallPlan、ToolCall、ToolCallAttempt、ToolResult、EvaluationRun、Feedback、MemoryWrite、MemoryRecord 的时间顺序完成计划、补丁、回归验证与经验写入。其中记忆交接保持 canonical 方向 MemoryWrite —responds_to→ Feedback，时间顺序不倒置关系主体。
      en: "The single main case for defect MWA-217: src/lib/ontology-index.ts hides the valid graph when a relation endpoint is missing; the case proceeds temporally through Goal, TaskPlan, TaskStep, ToolCallPlan, ToolCall, ToolCallAttempt, ToolResult, EvaluationRun, Feedback, MemoryWrite, and MemoryRecord for planning, patching, regression verification, and memory capture. The memory handoff preserves the canonical direction MemoryWrite —responds_to→ Feedback; temporal order does not reverse relation agency."
      ja: 欠陥 MWA-217 の唯一の主事例です。src/lib/ontology-index.ts が関係端点の欠落時に有効なグラフまで隠す問題を、Goal、TaskPlan、TaskStep、ToolCallPlan、ToolCall、ToolCallAttempt、ToolResult、EvaluationRun、Feedback、MemoryWrite、MemoryRecord の時間順に計画・修正し、回帰検証して記憶へ記録します。記憶の受け渡しは canonical 方向 MemoryWrite —responds_to→ Feedback を保持し、時間順序によって関係主体を反転させません。
    steps:
      - order: 1
        case_fragment_example_id: Goal-case-software-defect-repair-01
        traversal_relation_id: null
      - order: 2
        case_fragment_example_id: TaskPlan-case-software-defect-repair-02
        traversal_relation_id: Goal-elaborated_by-TaskPlan
      - order: 3
        case_fragment_example_id: TaskStep-case-software-defect-repair-03
        traversal_relation_id: TaskPlan-contains_step-TaskStep
      - order: 4
        case_fragment_example_id: ToolCallPlan-case-software-defect-repair-03a
        traversal_relation_id: TaskStep-specifies-ToolCallPlan
      - order: 5
        case_fragment_example_id: ToolCall-case-software-defect-repair-04
        traversal_relation_id: ToolCallPlan-plans-ToolCall
      - order: 6
        case_fragment_example_id: ToolCallAttempt-case-software-defect-repair-05
        traversal_relation_id: ToolCall-has_attempt-ToolCallAttempt
      - order: 7
        case_fragment_example_id: ToolResult-case-software-defect-repair-06
        traversal_relation_id: ToolCallAttempt-produces_result-ToolResult
      - order: 8
        case_fragment_example_id: EvaluationRun-case-software-defect-repair-07
        traversal_relation_id: EvaluationRun-evaluates-ToolResult
      - order: 9
        case_fragment_example_id: Feedback-case-software-defect-repair-08
        traversal_relation_id: EvaluationRun-produces-Feedback
