release:
  version: 2.0.0
  date: 2026-07-17
sources:
  - id: eng-ont-prov-o
    title: "PROV-O: The PROV Ontology"
    publisher: World Wide Web Consortium (W3C)
    url: https://www.w3.org/TR/prov-o/
    version: W3C Recommendation 30 April 2013
    accessed_on: 2026-07-18
    source_type: standard
    relevance: Provides the W3C Agent, Activity, and Entity distinction used only as a boundary check for Moonweave's local concepts.
  - id: eng-proto-a2a-spec
    title: Agent2Agent (A2A) Protocol Specification
    publisher: A2A Protocol Working Group
    url: https://a2a-protocol.org/latest/specification/
    version: 1.0.0
    accessed_on: 2026-07-18
    source_type: official-spec
    relevance: Defines protocol-native Task, TaskStatus, TaskState, Message, Part, and Artifact terms used only where an A2A object is actually present.
  - id: eng-proto-mcp-spec
    title: Model Context Protocol Specification
    publisher: Model Context Protocol
    url: https://modelcontextprotocol.io/specification/2025-11-25
    version: 2025-11-25
    accessed_on: 2026-07-18
    source_type: official-spec
    relevance: Authoritative terminology and protocol boundary for Host, Client, Server, JSON-RPC messages, capability negotiation, Resources, Prompts, Tools, and client features.
source_claims:
  - id: claim-root-ontology-boundary
    source: eng-ont-prov-o
    supports: PROV-O distinguishes Agent, Activity, and Entity. Moonweave uses that distinction as a boundary check when it organizes agent-system concepts; the eight-domain layout itself is a Moonweave design decision, not a PROV-O class hierarchy.
    locator: PROV-O Recommendation — core classes Agent, Activity, and Entity
    evidence_kind: design-inference
    confidence: high
  - id: claim-root-a2a-boundary
    source: eng-proto-a2a-spec
    supports: A2A defines Task, TaskStatus, TaskState, Message, Part, and Artifact as protocol data-model terms. Moonweave therefore reserves those names for A2A-backed objects rather than using them as generic names for every internal plan or execution.
    locator: A2A Specification — Terminology; Protocol Data Model — Task, TaskStatus, TaskState, Message, Part, Artifact
    evidence_kind: normative
    confidence: high
  - id: claim-root-mcp-boundary
    source: eng-proto-mcp-spec
    supports: MCP defines Host, Client, Server, Resources, Prompts, and Tools within its JSON-RPC, stateful-connection, and capability-negotiation architecture. Moonweave cites those names only for real MCP protocol concepts.
    locator: MCP Specification 2025-11-25 — Overview; Base Protocol; Server Features
    evidence_kind: normative
    confidence: high