source_claims:
  - id: claim-agent-system-ontology-001
    source: eng-ont-fibo-viewer
    supports: FIBO Viewer explicitly states that FIBO is a set of ontologies arranged as a hierarchical directory of domains, optional subdomains, modules, and ontologies, and exposes both structure and content through browsing and search. This directly supports Moonweave's single hierarchical presentation surface. FIBO does not define the agent-system concepts, module boundaries, or evidence model used here.
    locator: How to use FIBO Viewer > FIBO structure; FIBO maturity levels
    evidence_kind: official
    confidence: high
    review_status: pending
  - id: claim-agent-system-ontology-002
    source: eng-ont-microsoft-fabric-iq-ontology
    supports: Entity types, properties, constraints, and typed directional relationships form a unified semantic graph.
    locator: Overview > Ontology items, entity types, properties, and relationships
    evidence_kind: official
    confidence: high
    review_status: pending
  - id: claim-agent-system-ontology-003
    source: eng-fw-openai-tracing
    supports: Observable traces can record spans and events without requiring private reasoning text.
    locator: Tracing guide > Traces, spans, and trace processors
    evidence_kind: official
    confidence: high
    review_status: pending
  - id: claim-agent-system-ontology-004
    source: eng-ont-fibo-ontology-guide
    supports: The FIBO Ontology Guide documents a modular ontology architecture in which published ontology modules have stable namespaces, imports, and documented interfaces. That architecture supports extending or aligning with a canonical vocabulary without silently changing the meaning of the imported terms. FIBO does not define Moonweave Adapter, MappingRule, or loss-reporting classes; the prohibition on adapter-owned redefinition is Moonweave's conformance rule.
    locator: FIBO Ontology Guide > Architecture, modular ontologies, namespaces, imports, and published interfaces
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-agent-system-ontology-005
    source: eng-proto-a2a-docs
    supports: A2A assigns protocol-specific semantics and lifecycle rules to Agent Cards, Messages, Tasks, Parts, and Artifacts. Those external identities can be mapped to Moonweave terms, but the protocol does not authorize an adapter to redefine the canonical ontology objects it targets. The exact non-redefinition constraint and its validation behavior are Moonweave design decisions.
    locator: A2A Documentation > Core Concepts > Agent Card, Message, Task, Part, and Artifact
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-agent-system-ontology-006
    source: eng-ont-fibo-ontology-guide
    supports: The FIBO Ontology Guide distinguishes ontology content and imported domain vocabularies from the annotations, provenance, release metadata, and documentation used to manage those ontologies. This supports keeping explanatory metadata attached to subject terms instead of materializing a parallel business-concept graph. Moonweave's exact ban on annotation shadow nodes is a local hygiene constraint, not a FIBO axiom.
    locator: FIBO Ontology Guide > Ontology metadata, annotations, provenance, and release organization
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-agent-system-ontology-007
    source: eng-ont-palantir-core-concepts
    supports: Palantir Foundry Ontology documents objects as represented real-world entities, links as relationships, properties as object attributes, and actions as governed changes. Descriptions and configuration explain those elements rather than becoming additional domain objects. This product model supports Moonweave's inline-information presentation, while the exact exclusion of SourceClaim, Example, Rule, and review records from the subject graph remains a Moonweave rule.
    locator: Foundry Ontology documentation > Core concepts > Objects, properties, links, and actions
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-agent-system-ontology-008
    source: eng-fw-openai-tracing
    supports: OpenAI Agents SDK tracing can record the observable execution portions of this case as a trace containing agent, generation, function-call, handoff, guardrail, and custom spans, with processors exporting the evidence. It does not define Goal, TaskPlan, MemoryWrite, or the eleven-step Moonweave repair sequence, and it does not make private reasoning text part of the path. The complete traversal is a Moonweave worked example over observable facts.
    locator: Tracing guide > Traces and spans; Spans; Higher level traces; Trace processors
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-agent-system-ontology-009
    source: eng-api-openai-evals
    supports: The OpenAI Evals API separates an evaluation definition and testing criteria from a concrete evaluation run and its output items. That separation supports the case's EvaluationRun as a governed activity over a ToolResult rather than treating a score as the execution itself. The API does not prescribe the surrounding plan, patch, feedback, or memory-write steps; their order and canonical relations are Moonweave case design.
    locator: Evals API reference > Create an eval; Runs > Create a run; Run output items
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
