schema: moonweave.ai/ontology-node/v1
id: agent-system-ontology
kind: ontology
status: accepted
labels:
  zh: 智能体系统本体
  en: Agent System Ontology
  ja: エージェントシステム本体
semantics:
  short_definition:
    zh: 将智能体工程中的关键对象、过程和边界放到同一可导航语义图中的本体。
    en: An ontology that places the key objects, activities, and boundaries of agent engineering in one navigable semantic graph.
    ja: エージェント工学の主要な対象、活動、境界を一つの探索可能な意味グラフに置くオントロジー。
  definition:
    en: The Agent System Ontology is Moonweave's canonical semantic model for agent runtime, information, memory, orchestration, tools, safety, observability, and interoperability. It declares concepts and relations together with their data shape, examples, and source evidence so that a reader can determine both what a term means and where its boundary comes from. It is not a protocol specification and does not model private reasoning.
    zh: 智能体系统本体是 Moonweave 对智能体运行时、信息、记忆、编排、工具、安全、可观测性和互操作性的规范语义模型。它把概念和关系与其数据结构、实例说明及来源证据一并声明，使读者既能判断术语含义，也能判断其边界来源。它不是任何协议规范，也不描述私有推理过程。
    ja: エージェントシステム本体は、エージェントのランタイム、情報、メモリ、オーケストレーション、ツール、安全性、可観測性、相互運用性を扱う Moonweave の正規意味モデルです。概念と関係をデータ構造、事例、出典とともに宣言し、用語の意味と境界の根拠を確認できるようにします。これはプロトコル仕様ではなく、非公開の推論過程もモデル化しません。
  why_needed:
    zh: 智能体工程同时涉及协议、运行记录、记忆、工具和安全控制。没有共同词汇时，同一名称会被不同团队赋予不同含义，或把协议对象误当成内部运行对象。本体让工程师可以沿领域和模块找到同一概念的定义、边界、数据形状、实例与来源。
    en: Agent engineering spans protocols, execution records, memory, tools, and safety controls. Without shared vocabulary, teams overload the same word or mistake a protocol object for an internal runtime object. The ontology lets an engineer find a term's definition, boundary, data shape, examples, and sources in one place.
    ja: エージェント工学にはプロトコル、実行記録、メモリ、ツール、安全制御がまたがります。共通語彙がなければ、同じ語を別の意味で使ったり、プロトコルの対象を内部ランタイム対象と誤認したりします。本体は定義、境界、データ形状、事例、出典を一か所で確認できるようにします。
  includes:
    - zh: 八个 Agent 工程领域，以及按能力边界组织、可独立审查的模块、概念和关系。
      en: Eight agent-engineering domains and independently reviewable modules, concepts, and relations organized by capability boundaries.
      ja: 八つのエージェント工学ドメインと、能力境界で編成され独立審査可能なモジュール、概念、関係。
  excludes:
    - zh: 私有思维链、未被规范支持的自造协议术语，以及只为重复解释其他节点而建立的“影子”节点。
      en: Private chain of thought, invented protocol terminology not supported by a specification, and shadow nodes created only to restate another node.
      ja: 非公開の思考連鎖、仕様で裏付けられない自作のプロトコル用語、他のノードを言い換えるだけのシャドーノード。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 本体源以 `ontology/**/node.yaml` 保存。构建器读取该树，解析节点和关系后生成 canonical JSON 与浏览器使用的索引；因此每次术语或边界调整都必须同时保留来源与结构信息。它不把这种本体文件格式冒充为 MCP 或 A2A 的接口。
    en: The ontology source lives in `ontology/**/node.yaml`. The builder reads that tree, resolves nodes and relations, and emits canonical JSON and browser indexes. A terminology or boundary change therefore has to retain both evidence and structure. This local artifact format is not presented as an MCP or A2A API.
    ja: 本体のソースは `ontology/**/node.yaml` に保存されます。ビルダーはその木を読み、ノードと関係を解決して canonical JSON とブラウザー用索引を出力します。したがって用語や境界の変更では、根拠と構造の両方を保つ必要があります。このローカル形式を MCP や A2A の API として扱いません。
  typical_input:
    - description: A reviewed ontology source node with localized semantics, structure, examples, and linked evidence.
      format: |
        schema: moonweave.ai/ontology-node/v1
        id: example-concept
        kind: concept
        semantics:
          short_definition: {en: "A concise meaning."}
          definition: {en: "A scoped formal meaning."}
  typical_output:
    - description: The canonical artifact contains the concept, its structural contract, examples, and resolved source claims.
      format: |
        {"classes":[{"id":"example-concept","structure":{"fields":[]},"source_claims":[]}]}
  reference_implementations:
    - name: Moonweave ontology builder
      url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema/blob/ffbc6ec676728e343f4855db45dfdce8feda217e/scripts/build-agent-ontology.mjs
      description: The repository's reviewed build entry point that compiles the YAML source tree; the immutable commit URL identifies the implementation this node refers to.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 本体标识符, en: Ontology identifier, ja: 本体識別子}
      definitions: {zh: 区分本体版本线的稳定标识符，不是某个运行实例的 ID。, en: Stable identifier for this ontology line; it is not an identifier for a runtime instance., ja: この本体系列を区別する安定識別子であり、実行インスタンスの ID ではありません。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]*$'
      example_value: agent-system-ontology
      allowed_values: []
      source_claims: [claim-root-ontology-boundary]
    - id: domain_ids
      labels: {zh: 领域标识符, en: Domain identifiers, ja: ドメイン識別子}
      definitions: {zh: 本体直接拥有的领域集合；每个领域进一步组织有边界的模块和概念。, en: The domains directly owned by the ontology; each organizes bounded modules and concepts., ja: 本体が直接持つドメイン集合。各ドメインは境界を持つモジュールと概念を編成します。}
      datatype: string[]
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: '["runtime-plane", "memory-plane", "tool-plane"]'
      allowed_values: []
      source_claims: [claim-root-ontology-boundary]
  constraints:
    - id: root-id-is-stable
      severity: error
      expression_language: plain
      expression: The ontology root has one stable identifier and is not duplicated as a descendant concept.
      explanation: {zh: 根标识符用于定位唯一的本体产物，不能同时作为下级概念重复出现。, en: The root identifier locates one ontology artifact and cannot also appear as a descendant concept., ja: ルート識別子は一つの本体成果物を指し、下位概念として重複してはなりません。}
      source_claims: [claim-root-ontology-boundary]
    - id: domain-boundaries-are-explicit
      severity: warning
      expression_language: plain
      expression: A domain may reference another domain but must state its own inclusion and exclusion boundary.
      explanation:
        zh: 跨领域关系是允许的，但不能用重复节点代替边界说明。
        en: >-
          Cross-domain relations are allowed, but duplicate nodes cannot substitute for a stated boundary.
        ja: ドメイン横断の関係は許可されますが、重複ノードを境界説明の代わりにしてはなりません。
      source_claims: [claim-root-ontology-boundary]
  required_relations: []
examples:
examples:
  - id: ontology-openai-agents-sdk-architecture
    labels:
      zh: OpenAI Agents SDK 多层架构
      en: OpenAI Agents SDK multi-layer architecture
      ja: OpenAI Agents SDK マルチレイヤーアーキテクチャ
    descriptions:
      zh: OpenAI Agents SDK 的架构天然映射本体的七域划分。Agent 定义（name, instructions, tools, handoffs）对应编排域中的任务规划与路由；Runner.run(agent, input) 的执行循环（包含 queued→in_progress→completed 状态机）对应运行时域；tool_calls 中的函数调用与 MCP Server 集成对应工具域；model 的 system/user/assistant 角色边界和 needsApproval 审批对应安全域；RunResult.new_items 中的 MessageOutputItem 和 HandoffOutputItem 对应信息域；conversation history 的 thread 管理对应记忆域；evaluator 和 run 指标对应反馈域。
      en: OpenAI Agents SDK architecture naturally maps to the seven domains. Agent definition (name, instructions, tools, handoffs) maps to orchestration; Runner.run() execution loop maps to runtime; tool_calls and MCP integration maps to tool; role boundaries and needsApproval maps to safety; RunResult.new_items maps to info; thread management maps to memory; evaluator metrics maps to feedback.
      ja: OpenAI Agents SDK のアーキテクチャは7ドメインに自然対応。Agent定義はオーケストレーション、Runner.run()はランタイム、tool_callsはツール、ロール境界はセーフティ、RunResultは情報、thread管理はメモリ、evaluatorはフィードバック。
    field_values: {source: "OpenAI Agents SDK", url: "https://openai.github.io/openai-agents-python/"}
    related_node_ids: [runtime-plane, orchestration-plane, tool-plane, safety-plane, info-plane, memory-plane, feedback-plane]
    related_relation_ids: []
    source_claims: [claim-root-ontology-boundary]
  - id: ontology-langchain-langgraph-ecosystem
    labels:
      zh: LangChain/LangGraph 生态系统映射
      en: LangChain/LangGraph ecosystem mapping
      ja: LangChain/LangGraph エコシステムマッピング
    descriptions:
      zh: LangChain/LangGraph 生态中，StateGraph.add_node/add_edge 定义编排图（编排域）；graph.invoke(input, config={"configurable": {"thread_id": "t1"}}) 由 Pregel runtime 驱动（运行时域）；ChatOpenAI 的 bind_tools() 和 ToolNode 处理工具调用（工具域）；MemorySaver/SqliteSaver 跨轮检查点持久化（记忆域）；HumanNode 和 interrupt() 实现人类审批（安全域）；ChatPromptTemplate.from_messages 和 Document 承载信息结构（信息域）；LangSmith RunTree 追踪与评估器提供反馈（反馈域）。
      en: In LangChain/LangGraph, StateGraph defines orchestration; graph.invoke() with Pregel runtime maps to runtime; bind_tools() and ToolNode handle tool calls; MemorySaver provides cross-turn checkpointing; HumanNode and interrupt() implement safety approval; ChatPromptTemplate carries info structure; LangSmith RunTree provides feedback.
      ja: LangChain/LangGraph：StateGraphはオーケストレーション、graph.invoke()はランタイム、bind_tools()はツール、MemorySaverはメモリ、HumanNodeはセーフティ、ChatPromptTemplateは情報、LangSmith RunTreeはフィードバック。
    field_values: {source: "LangChain + LangGraph", url: "https://docs.langchain.com/"}
    related_node_ids: [runtime-plane, orchestration-plane, tool-plane, memory-plane, safety-plane, info-plane, feedback-plane]
    related_relation_ids: []
    source_claims: [claim-root-ontology-boundary]
  - id: ontology-anthropic-claude-system
    labels:
      zh: Anthropic Claude 系统架构
      en: Anthropic Claude system architecture
      ja: Anthropic Claude システムアーキテクチャ
    descriptions:
      zh: Anthropic Claude 的产品架构覆盖各域。Messages API 的 system/user/assistant 角色层级（安全域）；200K token 上下文窗口与 prompt caching 的 cache_control 标记（记忆域）；tool_use/tool_result 消息类型实现工具调用（工具域）；extended thinking 的 thinking content block 展示内部推理（编排域）；content block 的 text/image/tool_use/tool_result 类型系统（信息域）；streaming 事件 content_block_start/delta/stop（运行时域）；Constitutional AI 的 RLAIF 训练反馈循环（反馈域）。
      en: Anthropic Claude architecture covers all domains. Messages API role hierarchy (safety); 200K context window with cache_control (memory); tool_use/tool_result (tool); extended thinking blocks (orchestration); content block types (info); streaming events (runtime); Constitutional AI RLAIF (feedback).
      ja: Anthropic Claude：Messages APIロール階層（安全）、200Kコンテキスト+cache_control（メモリ）、tool_use/tool_result（ツール）、extended thinking（オーケストレーション）、content block型（情報）、streaming（ランタイム）、Constitutional AI（フィードバック）。
    field_values: {source: "Anthropic Claude", url: "https://docs.anthropic.com/"}
    related_node_ids: [runtime-plane, orchestration-plane, tool-plane, safety-plane, info-plane, memory-plane, feedback-plane]
    related_relation_ids: []
    source_claims: [claim-root-ontology-boundary]
  - id: ontology-cursor-ide-agent-system
    labels:
      zh: Cursor IDE 智能体系统
      en: Cursor IDE agent system
      ja: Cursor IDE エージェントシステム
    descriptions:
      zh: Cursor IDE 作为 AI 编程工具的架构映射：Agent/Tab 模式的任务编排由用户查询驱动，模型自主决定工具调用顺序（编排域）；@ 文件引用和 codebase indexing 提供上下文检索（记忆域）；Read/Write/Shell/Grep 等内置工具通过 MCP-like 接口执行操作（工具域）；Auto-review 和 Smart Mode 检查调用安全性（安全域）；streaming 实时输出代码建议（运行时域）；chat 消息和代码 diff 承载信息结构（信息域）；Bugbot 自动代码审查提供反馈（反馈域）。
      en: Cursor IDE agent architecture maps to all domains. Agent/Tab orchestration driven by queries (orchestration); @ references and codebase indexing (memory); Read/Write/Shell/Grep tools via MCP-like interface (tool); Auto-review and Smart Mode (safety); streaming code suggestions (runtime); chat and code diffs (info); Bugbot review (feedback).
      ja: Cursor IDE：Agent/Tabタスク編排（オーケストレーション）、@ファイル参照（メモリ）、Read/Write/Shell/Grepツール（ツール）、Auto-review（安全）、ストリーミング出力（ランタイム）、チャットメッセージ（情報）、Bugbot（フィードバック）。
    field_values: {source: "Cursor IDE", url: "https://cursor.com/"}
    related_node_ids: [runtime-plane, orchestration-plane, tool-plane, safety-plane, info-plane, memory-plane, feedback-plane]
    related_relation_ids: []
    source_claims: [claim-root-ontology-boundary]
parent_relation: null
