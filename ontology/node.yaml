schema: moonweave.ai/ontology-node/v1
id: agent-system-ontology
kind: ontology
status: accepted
labels:
  zh: 智能体系统本体
  en: Agent System Ontology
  ja: エージェントシステム本体
semantics:
  short_definition:
    zh: 为 Agent 构建、运行与治理提供闭环逻辑的一张统一概念图。
    en: One unified concept graph providing closed-loop logic for building, running, and governing agents.
    ja: エージェントの構築、実行、統治に閉ループ論理を提供する一つの統一概念グラフ。
  definition:
    en: Canonical domain for the agent-system ontology family.
    zh: 智能体系统本体是面向智能体运行、信息、记忆、编排、工具、安全、反馈和适配器语义的规范领域本体，用于把概念、关系、字段、公理与证据源组织为可验证的体系。
    ja: エージェントシステム本体は、実行、情報、記憶、オーケストレーション、ツール、安全、フィードバック、アダプタ意味を扱う標準領域本体で、概念、関係、フィールド、公理、出典を検証可能な体系として組織します。
  why_needed:
    zh: 工程师需要沿领域、模块和任意深度逻辑骨架定位 Agent 构件，并在同一节点或关系查看结构、案例、来源和治理信息。
    en: Engineers need to locate agent building blocks along domains, modules, and arbitrary-depth logical backbones while viewing structure, cases, evidence, and governance on the same node or relation.
    ja: エンジニアはドメイン、モジュール、任意深度の論理バックボーンに沿ってエージェント構成要素を特定し、同じノードまたは関係で構造、事例、出典、ガバナンスを確認する必要があります。
  includes:
    - zh: 八个 Agent 工程领域，以及按能力边界组织、可独立审查的模块、概念和关系。
      en: Eight agent-engineering domains and independently reviewable modules, concepts, and relations organized by capability boundaries.
      ja: 八つのエージェント工学ドメインと、能力境界で編成され独立審査可能なモジュール、概念、関係。
  excludes:
    - zh: 私有思维链，以及仅用于解释节点的 Schema、实例、来源或案例影子节点。
      en: Private chain of thought and Schema, instance, source, or case shadow nodes that only explain another node.
      ja: 非公開の思考連鎖と、別ノードを説明するだけのスキーマ、インスタンス、情報源、事例のシャドーノード。
  semantic_kind: null
  aliases: []
structure: null
examples:
  - id: agent-system-ontology-example-unified-graph
    kind: positive
    labels:
      zh: 统一 Agent 构建图谱
      en: Unified agent-building graph
      ja: 統一エージェント構築グラフ
    scenario_id: null
    descriptions:
      zh: 工程师沿领域、模块和概念层级定位 Agent 构件，并在同一节点查看结构、案例与来源。
      en: An engineer follows Domain, Module, and Concept hierarchy and reads structure, cases, and sources on the same node.
      ja: 技術者はドメイン、モジュール、概念階層を辿り、同じノードで構造、事例、情報源を確認します。
    field_values: {}
    related_node_ids: []
    related_relation_ids: []
    expected_result:
      zh: 不需要切换到第二张 Schema、实例或治理图。
      en: No second Schema, instance, or governance graph is needed.
      ja: 第二のスキーマ、インスタンス、ガバナンスグラフへ切り替える必要がありません。
    why_valid_or_invalid:
      zh: 案例复用同一 canonical 节点和边。
      en: The case reuses the same canonical nodes and relations.
      ja: 事例は同じ正規ノードと関係を再利用します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims: []
parent_relation: null
relations: []
