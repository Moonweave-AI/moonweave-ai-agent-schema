id: node.external_action
artifact: NodeClass
label: External Action
label_zh: 外部动作
intra_level: 1
intra_group: action-taxonomy
intra_group_zh: 动作分类
intra_role: action
parent_node: node.action_space
description: 'Any action that produces observable side effects in the environment: tool calls, file operations, network requests,
  or GUI interactions.'
attributes:
  risk_level:
    type: string
    required: false
    values:
    - low
    - medium
    - high
    - critical
    description: Assessed risk of the action
  reversible:
    type: boolean
    required: false
    description: Whether the action can be undone
evidence:
- ref: evidence.paper.cognitive_architecture
layer: tool
plane: tool
required_edges:
  outgoing:
  - predicate: HAS_SIDE_EFFECT
    target: node.side_effect
