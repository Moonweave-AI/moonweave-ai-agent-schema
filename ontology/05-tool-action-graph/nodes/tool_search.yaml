id: node.tool_search
artifact: NodeClass
label: Tool Search
label_zh: 工具搜索
intra_level: 2
intra_group: tool-discovery-plane
intra_group_zh: 工具发现平面
intra_axis: definition-discovery
intra_axis_zh: 工具定义平面 / 工具发现平面
intra_role: process
parent_node: node.tool_registry
description: Query-based matching of tools using lexical, regex, or embedding similarity over tool names, descriptions, and
  schemas.
description_zh: >
  使用词汇、正则表达式或工具名称、描述和模式的嵌入相似性进行基于查询的工具匹配。
attributes:
  search_method:
    type: string
    required: true
    values:
    - keyword
    - regex
    - embedding
    - hybrid
    description: Matching algorithm
  query:
    type: string
    required: true
    description: Search query text
  top_k:
    type: integer
    required: false
    description: Number of matches to return
evidence:
- ref: evidence.paper.cognitive_architecture
layer: tool
plane: tool
