id: node.tool_definition
artifact: NodeClass
label: Tool Definition
label_zh: 工具定义
description: 'Schema and metadata bundle describing a callable tool: its inputs, outputs, behavior description, and operational
  characteristics.'
attributes:
  tool_id:
    type: string
    required: true
    description: Unique tool identifier
  defer_loading:
    type: boolean
    required: false
    description: Whether definition is loaded lazily at selection time
  deprecated:
    type: boolean
    required: false
    description: Whether the tool is marked deprecated
evidence:
- ref: evidence.paper.cognitive_architecture
layer: tool
plane: tool
interfaces:
- ref: contract.invocable
- ref: contract.discoverable
