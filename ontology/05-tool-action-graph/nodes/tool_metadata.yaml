id: node.tool_metadata
artifact: NodeClass
label: Tool Metadata
label_zh: 工具元数据
intra_level: 2
intra_group: tool-definition-plane
intra_group_zh: 工具定义平面
intra_axis: definition-discovery
intra_axis_zh: 工具定义平面 / 工具发现平面
intra_role: metadata
parent_node: node.tool_definition
description: 'Descriptive metadata for a tool: human-readable name, description, version, estimated cost, latency hints, and
  categorization tags.'
description_zh: >
  工具的描述性元数据：人类可读的名称、描述、版本、估计成本、延迟提示和分类标签。
attributes:
  name:
    type: string
    required: true
    description: Human-readable tool name
  description:
    type: string
    required: true
    description: Natural language description of tool purpose
  version:
    type: string
    required: false
    description: Semantic version of the tool
  tags:
    type: array
    required: false
    description: Categorization tags for discovery
  latency_hint_ms:
    type: integer
    required: false
    description: Expected execution latency
evidence:
- ref: evidence.paper.cognitive_architecture
layer: tool
plane: tool
