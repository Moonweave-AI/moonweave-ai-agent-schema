id: node.tool_server
artifact: NodeClass
label: Tool Server
label_zh: 工具服务器
intra_level: 1
intra_group: tool-discovery-plane
intra_group_zh: 工具发现平面
intra_axis: definition-discovery
intra_axis_zh: 工具定义平面 / 工具发现平面
intra_role: server
parent_node: node.action_space
description: Process that serves tool definitions and handles invocation requests, exposing a callable interface to the agent
  runtime.
description_zh: >
  提供工具定义和处理调用请求、向智能体运行时公开可调用接口的进程。
attributes:
  server_id:
    type: string
    required: true
    description: Unique server identifier
  transport:
    type: string
    required: false
    values:
    - stdio
    - http
    - websocket
    - in_process
    description: Communication transport
  health_status:
    type: string
    required: false
    values:
    - healthy
    - degraded
    - unavailable
    description: Current server health
evidence:
- ref: evidence.paper.cognitive_architecture
layer: tool
plane: tool
