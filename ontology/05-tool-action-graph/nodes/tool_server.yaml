id: node.tool_server
artifact: NodeClass
label: Tool Server
label_zh: 工具服务器
description: Process that serves tool definitions and handles invocation requests, exposing a callable interface to the agent
  runtime.
attributes:
  server_id:
    type: string
    required: true
    description: Unique server identifier
  transport:
    type: string
    required: false
    values:
    - stdio
    - http
    - websocket
    - in_process
    description: Communication transport
  health_status:
    type: string
    required: false
    values:
    - healthy
    - degraded
    - unavailable
    description: Current server health
evidence:
- ref: evidence.paper.cognitive_architecture
layer: tool
plane: tool
