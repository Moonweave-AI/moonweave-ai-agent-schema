id: state.tool_call_lifecycle
artifact: StateMachine
label: Tool Call Lifecycle
label_zh: 工具调用生命周期
description: Lifecycle states for a tool call from request through authorization, execution, and completion.
states:
- name: pending
  initial: true
  description: Call created but not yet authorized
- name: authorized
  description: Call passed policy and permission checks
- name: executing
  description: Tool is actively running
- name: streaming
  description: Partial results are being streamed back
- name: completed
  terminal: true
  description: Tool finished successfully
- name: failed
  terminal: true
  description: Tool execution failed with error
- name: denied
  terminal: true
  description: Call rejected by policy before execution
transitions:
- from: pending
  to: authorized
  trigger: policy_approved
- from: pending
  to: denied
  trigger: policy_denied
- from: authorized
  to: executing
  trigger: execution_started
- from: executing
  to: streaming
  trigger: stream_opened
- from: streaming
  to: completed
  trigger: stream_closed
- from: executing
  to: completed
  trigger: execution_finished
- from: executing
  to: failed
  trigger: execution_error
- from: streaming
  to: failed
  trigger: stream_error
