id: state.tool_discovery_lifecycle
artifact: StateMachine
label: Tool Discovery Lifecycle
label_zh: 工具发现生命周期
description: Lifecycle states for the tool discovery process from idle through search, match, and selection.
states:
- name: idle
  initial: true
  description: Discovery not active
- name: searching
  description: Actively querying the tool registry
- name: matched
  description: Candidate tools identified with scores
- name: selected
  terminal: true
  description: Final tool choice made for invocation
transitions:
- from: idle
  to: searching
  trigger: discovery_requested
- from: searching
  to: matched
  trigger: results_returned
- from: matched
  to: selected
  trigger: selection_complete
- from: matched
  to: searching
  trigger: refine_query
- from: searching
  to: idle
  trigger: no_matches
