id: constraint.programmatic_calling_must_use_sandbox
artifact: GraphConstraint
label: Programmatic Calling Must Use Sandbox
label_zh: 程序化调用必须使用沙箱
severity: error
rule: Every ProgrammaticToolCalling instance MUST have an outgoing EXECUTES_CODE edge to a CodeExecutionAction with a non-empty
  sandbox_id, ensuring orchestration code runs isolated.
description: Prevents unconstrained multi-tool code execution outside sandbox boundaries.
applies_to:
  nodes:
  - node.programmatic_tool_calling
  edges:
  - edge.EXECUTES_CODE
