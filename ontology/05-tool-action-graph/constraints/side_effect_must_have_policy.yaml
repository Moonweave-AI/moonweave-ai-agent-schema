id: constraint.side_effect_must_have_policy
artifact: GraphConstraint
label: Side Effect Must Have Policy
label_zh: 副作用必须关联策略
severity: error
rule: Every SideEffect node MUST be connected via HAS_SIDE_EFFECT from an ExternalAction that has a policy binding governing
  authorization, audit, and rollback requirements.
description: Ensures environment-affecting actions are policy-governed.
applies_to:
  nodes:
  - node.side_effect
  - node.external_action
