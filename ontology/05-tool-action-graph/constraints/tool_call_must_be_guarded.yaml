id: constraint.tool_call_must_be_guarded
artifact: GraphConstraint
label: Tool Call Must Be Guarded
label_zh: 工具调用必须受策略保护
severity: error
rule: Every ToolCall node MUST have at least one outgoing GUARDED_BY edge to a PolicyContract in the safety-policy-graph before
  execution may proceed.
description: Ensures all tool invocations pass through authorization and policy enforcement.
applies_to:
  nodes:
  - node.tool_call
