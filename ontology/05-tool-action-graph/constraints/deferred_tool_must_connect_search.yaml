id: constraint.deferred_tool_must_connect_search
artifact: GraphConstraint
label: Deferred Tool Must Connect Search
label_zh: 延迟工具必须连接搜索
severity: error
rule: Every DeferredToolDefinition MUST have at least one MATCHED_BY edge from ToolSearch or be reachable via ToolDiscovery,
  ensuring lazy-loaded tools remain discoverable.
description: Prevents orphaned deferred tools that cannot be found at selection time.
applies_to:
  nodes:
  - node.deferred_tool_definition
  edges:
  - edge.MATCHED_BY
  - edge.DISCOVERED_BY
