id: contract.traceable
artifact: InterfaceContract
label: Traceable
label_zh: 可追踪
description: Interface for execution artifacts that support distributed tracing and audit.
operations:
- name: get_trace_context
  description: Return trace identifiers and span metadata
  input: {}
  output:
    trace_id: string
    span_id: string
    parent_span_id: string
  errors: []
- name: emit_event
  description: Record a trace event during execution
  input:
    event_type: string
    payload: object
  output:
    event_id: string
  errors:
  - trace_closed
