id: contract.invocable
artifact: InterfaceContract
label: Invocable
label_zh: 可调用
description: Interface for tools and execution components that can be invoked with arguments.
operations:
- name: invoke
  description: Execute the tool with given arguments
  input:
    arguments: object
    context: object
  output:
    result: object
    invocation_id: string
  errors:
  - invalid_arguments
  - execution_failed
  - timeout
- name: validate_arguments
  description: Validate arguments against tool schema before invocation
  input:
    arguments: object
  output:
    valid: boolean
    errors: array
  errors: []
