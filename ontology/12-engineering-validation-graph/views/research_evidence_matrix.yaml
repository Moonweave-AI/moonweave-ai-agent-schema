id: view.research_evidence_matrix
artifact: GraphView
label: Research Evidence Matrix
label_zh: 研究证据矩阵
description: >
  Workbench view joining sources, source claims, ontology impacts, supported
  nodes, supported edges, validation status, and unresolved research gaps.
audience: [researcher, ontology-maintainer, reviewer]
view_type: evidence_matrix
diagram_notation: [d3, mermaid, png]
layout: layered
layout_engine: table-plus-graph
source_filters: [theme, year, venue, authority_tier, normative_status]
export_targets: [json, markdown, png]
acceptance_queries:
  - "Every required theme has at least three approved or exemplar sources."
  - "Every normative claim resolves to an approved source."
included_subgraphs: [00-meta-graph, 12-engineering-validation-graph]
status: active
