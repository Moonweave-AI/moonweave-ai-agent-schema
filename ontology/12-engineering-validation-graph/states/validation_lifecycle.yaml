id: state.validation_lifecycle
artifact: StateMachine
label: Validation Lifecycle
label_zh: 验证生命周期
description: >
  Lifecycle states for a validation run from pending through execution to pass, fail, or skip outcomes.
states:
  - name: pending
    initial: true
    description: Validation queued but not yet started
  - name: running
    description: Validation actively executing checks
  - name: passed
    terminal: true
    description: All checks passed at or below configured severity
  - name: failed
    terminal: true
    description: One or more checks failed at blocking severity
  - name: skipped
    terminal: true
    description: Validation skipped due to configuration or preconditions
transitions:
  - from: pending
    to: running
    trigger: start
    description: Begin validation execution
  - from: pending
    to: skipped
    trigger: skip
    description: Skip validation by configuration
  - from: running
    to: passed
    trigger: complete
    guard: no_blocking_findings
    description: All checks passed
  - from: running
    to: failed
    trigger: complete
    guard: has_blocking_findings
    description: Blocking findings detected
  - from: running
    to: failed
    trigger: abort
    description: Validation aborted due to fatal error
status: active
