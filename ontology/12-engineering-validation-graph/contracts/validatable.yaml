id: contract.validatable
artifact: InterfaceContract
label: Validatable
label_zh: 可验证
description: >
  Behavioral contract for artifacts and components that can be validated by graph validators and checkers.
operations:
  - name: validate
    description: Run validation against this artifact or component
    input:
      options:
        type: object
        description: Validation options and severity filters
    output:
      report:
        type: object
        description: Validation report with findings
    errors: [ValidationSetupError]
  - name: get_validation_status
    description: Return current validation lifecycle state
    input: {}
    output:
      status:
        type: string
        description: Current validation state
status: active
