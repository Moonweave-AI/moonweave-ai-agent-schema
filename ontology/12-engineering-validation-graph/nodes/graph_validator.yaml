id: node.graph_validator
artifact: NodeClass
label: Graph Validator
label_zh: 图验证器
layer: validation
description: >
  Top-level validation orchestrator coordinating schema, constraint, coverage, and release gate checks across the ontology graph.
attributes:
  validator_id:
    type: string
    required: true
    description: Unique validator orchestrator identifier
  validation_scope:
    type: array
    required: true
    description: Subgraphs or artifact types included in validation run
  parallel_execution:
    type: boolean
    required: false
    description: Whether sub-validators run in parallel
state_machine:
  ref: state.validation_lifecycle
status: active
