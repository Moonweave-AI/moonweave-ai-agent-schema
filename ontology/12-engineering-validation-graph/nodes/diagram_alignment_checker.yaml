id: node.diagram_alignment_checker
artifact: NodeClass
label: Diagram Alignment Checker
label_zh: 图表对齐检查器
intra_level: 2
intra_group: coverage-validation
intra_group_zh: 覆盖验证
intra_axis: structural-coverage
intra_axis_zh: 结构验证 / 覆盖验证
intra_role: checker
parent_node: node.coverage_checker
layer: validation
description: >
  Verifies that nodes referenced in architecture diagrams exist in the ontology and required edges are present.
description_zh: >
  验证架构图中引用的节点是否存在于本体中并且存在所需的边。
attributes:
  checker_id:
    type: string
    required: true
    description: Unique checker identifier
  severity_default:
    type: enum
    required: false
    values: ['error', 'warning', 'info']
    description: Default severity for findings
  automated:
    type: boolean
    required: false
    description: Whether checker runs without manual intervention
interfaces:
  - ref: contract.validatable
state_machine:
  ref: state.validation_lifecycle
status: active
