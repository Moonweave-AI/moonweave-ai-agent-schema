id: node.orphan_node_checker
artifact: NodeClass
label: Orphan Node Checker
label_zh: 孤立节点检查器
layer: validation
description: >
  Finds node instances with no incoming or outgoing edges that may indicate incomplete graph modeling.
attributes:
  checker_id:
    type: string
    required: true
    description: Unique checker identifier
  severity_default:
    type: enum
    required: false
    values: ['error', 'warning', 'info']
    description: Default severity for findings
  automated:
    type: boolean
    required: false
    description: Whether checker runs without manual intervention
interfaces:
  - ref: contract.validatable
state_machine:
  ref: state.validation_lifecycle
status: active
