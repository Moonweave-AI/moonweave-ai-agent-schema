id: node.responsive_graph_check
artifact: NodeClass
label: Responsive Graph Check
label_zh: 响应式图检查
layer: validation
description: >
  Verifies graph visualization renders correctly on mobile and narrow viewport form factors.
attributes:
  checker_id:
    type: string
    required: true
    description: Unique checker identifier
  severity_default:
    type: enum
    required: false
    values: ['error', 'warning', 'info']
    description: Default severity for findings
  automated:
    type: boolean
    required: false
    description: Whether checker runs without manual intervention
interfaces:
  - ref: contract.validatable
state_machine:
  ref: state.validation_lifecycle
status: active
