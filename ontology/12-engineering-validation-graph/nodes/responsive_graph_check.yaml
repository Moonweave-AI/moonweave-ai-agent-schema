id: node.responsive_graph_check
artifact: NodeClass
label: Responsive Graph Check
label_zh: 响应式图检查
intra_level: 3
intra_group: contract-validation
intra_group_zh: 契约验证
intra_axis: contract-release
intra_axis_zh: 契约验证 / 发布门禁
intra_role: test
parent_node: node.visualization_render_check
layer: validation
description: >
  Verifies graph visualization renders correctly on mobile and narrow viewport form factors.
description_zh: >
  验证图形可视化在移动和窄视口外形尺寸上正确呈现。
attributes:
  checker_id:
    type: string
    required: true
    description: Unique checker identifier
  severity_default:
    type: enum
    required: false
    values: ['error', 'warning', 'info']
    description: Default severity for findings
  automated:
    type: boolean
    required: false
    description: Whether checker runs without manual intervention
interfaces:
  - ref: contract.validatable
state_machine:
  ref: state.validation_lifecycle
status: active
