id: node.required_edge_checker
artifact: NodeClass
label: Required Edge Checker
label_zh: 必需边检查器
layer: validation
description: >
  Verifies that required_edges declared on NodeClass definitions are satisfied by graph instances.
attributes:
  checker_id:
    type: string
    required: true
    description: Unique checker identifier
  severity_default:
    type: enum
    required: false
    values: ['error', 'warning', 'info']
    description: Default severity for findings
  automated:
    type: boolean
    required: false
    description: Whether checker runs without manual intervention
interfaces:
  - ref: contract.validatable
state_machine:
  ref: state.validation_lifecycle
status: active
