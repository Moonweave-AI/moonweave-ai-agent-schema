id: node.visualization_render_check
artifact: NodeClass
label: Visualization Render Check
label_zh: 可视化渲染检查
intra_level: 2
intra_group: coverage-validation
intra_group_zh: 覆盖验证
intra_role: checker
parent_node: node.coverage_checker
layer: validation
description: >
  Verifies ontology graph renders correctly in visualization tools without layout errors or missing nodes.
attributes:
  checker_id:
    type: string
    required: true
    description: Unique checker identifier
  severity_default:
    type: enum
    required: false
    values: ['error', 'warning', 'info']
    description: Default severity for findings
  automated:
    type: boolean
    required: false
    description: Whether checker runs without manual intervention
interfaces:
  - ref: contract.validatable
state_machine:
  ref: state.validation_lifecycle
status: active
