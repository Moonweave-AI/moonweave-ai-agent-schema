id: node.cycle_checker
artifact: NodeClass
label: Cycle Checker
label_zh: 环路检查器
intra_level: 2
intra_group: structural-validation
intra_group_zh: 结构验证
intra_axis: structural-coverage
intra_axis_zh: 结构验证 / 覆盖验证
intra_role: checker
parent_node: node.constraint_validator
layer: validation
description: >
  Detects unwanted cycles in dependency or ownership graphs that violate acyclicity constraints.
attributes:
  checker_id:
    type: string
    required: true
    description: Unique checker identifier
  severity_default:
    type: enum
    required: false
    values: ['error', 'warning', 'info']
    description: Default severity for findings
  automated:
    type: boolean
    required: false
    description: Whether checker runs without manual intervention
interfaces:
  - ref: contract.validatable
state_machine:
  ref: state.validation_lifecycle
status: active
