id: node.schema_validator
artifact: NodeClass
label: Schema Validator
label_zh: 模式验证器
layer: validation
description: >
  Validates ontology YAML artifacts against graph.schema.json ensuring structural correctness and required fields.
attributes:
  checker_id:
    type: string
    required: true
    description: Unique checker identifier
  severity_default:
    type: enum
    required: false
    values: ['error', 'warning', 'info']
    description: Default severity for findings
  automated:
    type: boolean
    required: false
    description: Whether checker runs without manual intervention
interfaces:
  - ref: contract.validatable
state_machine:
  ref: state.validation_lifecycle
status: active
