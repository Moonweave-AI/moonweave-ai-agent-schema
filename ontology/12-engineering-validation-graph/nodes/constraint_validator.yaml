id: node.constraint_validator
artifact: NodeClass
label: Constraint Validator
label_zh: 约束验证器
intra_level: 1
intra_group: structural-validation
intra_group_zh: 结构验证
intra_axis: structural-coverage
intra_axis_zh: 结构验证 / 覆盖验证
intra_role: validator
parent_node: node.graph_validator
layer: validation
description: >
  Checks GraphConstraint rules against live graph instances and reports violations with severity levels.
description_zh: >
  根据实时图形实例检查 GraphConstraint 规则，并报告违规行为的严重程度。
attributes:
  checker_id:
    type: string
    required: true
    description: Unique checker identifier
  severity_default:
    type: enum
    required: false
    values: ['error', 'warning', 'info']
    description: Default severity for findings
  automated:
    type: boolean
    required: false
    description: Whether checker runs without manual intervention
interfaces:
  - ref: contract.validatable
state_machine:
  ref: state.validation_lifecycle
status: active
