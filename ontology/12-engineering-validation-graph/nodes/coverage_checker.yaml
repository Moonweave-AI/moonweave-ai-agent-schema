id: node.coverage_checker
artifact: NodeClass
label: Coverage Checker
label_zh: 覆盖率检查器
intra_level: 1
intra_group: coverage-validation
intra_group_zh: 覆盖验证
intra_axis: structural-coverage
intra_axis_zh: 结构验证 / 覆盖验证
intra_role: checker
parent_node: node.graph_validator
layer: validation
description: >
  Measures node and edge coverage metrics comparing ontology instances against expected subgraph completeness.
description_zh: >
  测量节点和边缘覆盖指标，将本体实例与预期子图完整性进行比较。
attributes:
  checker_id:
    type: string
    required: true
    description: Unique checker identifier
  severity_default:
    type: enum
    required: false
    values: ['error', 'warning', 'info']
    description: Default severity for findings
  automated:
    type: boolean
    required: false
    description: Whether checker runs without manual intervention
interfaces:
  - ref: contract.validatable
state_machine:
  ref: state.validation_lifecycle
status: active
