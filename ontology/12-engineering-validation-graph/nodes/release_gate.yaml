id: node.release_gate
artifact: NodeClass
label: Release Gate
label_zh: 发布门禁
intra_level: 1
intra_group: release-gate
intra_group_zh: 发布门禁
intra_axis: contract-release
intra_axis_zh: 契约验证 / 发布门禁
intra_role: gate
parent_node: node.graph_validator
layer: validation
description: >
  All-or-nothing validation gate that blocks ontology release until all mandatory checks pass at configured severity thresholds.
attributes:
  gate_id:
    type: string
    required: true
    description: Unique release gate identifier
  blocking_severities:
    type: array
    required: true
    values: ['error']
    description: Severity levels that block release
  mandatory_checkers:
    type: array
    required: true
    description: Checker node ids that must pass for release
  target_version:
    type: string
    required: false
    description: Ontology version this gate protects
state_machine:
  ref: state.validation_lifecycle
status: active
