id: node.evidence_checker
artifact: NodeClass
label: Evidence Checker
label_zh: 证据检查器
intra_level: 2
intra_group: coverage-validation
intra_group_zh: 覆盖验证
intra_axis: structural-coverage
intra_axis_zh: 结构验证 / 覆盖验证
intra_role: checker
parent_node: node.coverage_checker
layer: validation
description: >
  Verifies evidence references on normative nodes are complete, resolvable, and cite valid source types.
description_zh: >
  验证规范节点上的证据引用是否完整、可解析，并引用有效的源类型。
attributes:
  checker_id:
    type: string
    required: true
    description: Unique checker identifier
  severity_default:
    type: enum
    required: false
    values: ['error', 'warning', 'info']
    description: Default severity for findings
  automated:
    type: boolean
    required: false
    description: Whether checker runs without manual intervention
interfaces:
  - ref: contract.validatable
state_machine:
  ref: state.validation_lifecycle
status: active
