id: node.runtime_contract_test
artifact: NodeClass
label: Runtime Contract Test
label_zh: 运行时契约测试
intra_level: 2
intra_group: contract-validation
intra_group_zh: 契约验证
intra_axis: contract-release
intra_axis_zh: 契约验证 / 发布门禁
intra_role: test
parent_node: node.graph_validator
layer: validation
description: >
  Validates runtime interface contracts by executing conformance tests against implementing components.
attributes:
  checker_id:
    type: string
    required: true
    description: Unique checker identifier
  severity_default:
