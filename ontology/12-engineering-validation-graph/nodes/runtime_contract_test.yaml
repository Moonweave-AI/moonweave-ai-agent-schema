id: node.runtime_contract_test
artifact: NodeClass
label: Runtime Contract Test
label_zh: 运行时契约测试
layer: validation
description: >
  Validates runtime interface contracts by executing conformance tests against implementing components.
attributes:
  checker_id:
    type: string
    required: true
    description: Unique checker identifier
  severity_default:
    type: enum
    required: false
    values: ['error', 'warning', 'info']
    description: Default severity for findings
  automated:
    type: boolean
    required: false
    description: Whether checker runs without manual intervention
interfaces:
  - ref: contract.validatable
state_machine:
  ref: state.validation_lifecycle
status: active
