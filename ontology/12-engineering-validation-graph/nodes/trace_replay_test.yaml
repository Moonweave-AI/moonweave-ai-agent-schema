id: node.trace_replay_test
artifact: NodeClass
label: Trace Replay Test
label_zh: 追踪重放测试
layer: validation
description: >
  Replays execution traces against expected event sequences to verify runtime consistency and ordering.
attributes:
  checker_id:
    type: string
    required: true
    description: Unique checker identifier
  severity_default:
    type: enum
    required: false
    values: ['error', 'warning', 'info']
    description: Default severity for findings
  automated:
    type: boolean
    required: false
    description: Whether checker runs without manual intervention
interfaces:
  - ref: contract.validatable
state_machine:
  ref: state.validation_lifecycle
status: active
