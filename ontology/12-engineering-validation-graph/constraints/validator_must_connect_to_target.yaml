id: constraint.validator_must_connect_to_target
artifact: GraphConstraint
label: Validator Must Connect To Target
label_zh: 验证器必须连接目标
severity: error
rule: >
  Every specialized checker node MUST be reachable from node.graph_validator via edge.VALIDATES, defining explicit validation scope.
applies_to:
  nodes: [node.graph_validator]
  edges: [edge.VALIDATES]
description: >
  Structural rule ensuring all checkers are orchestrated by the top-level graph validator.
status: active
