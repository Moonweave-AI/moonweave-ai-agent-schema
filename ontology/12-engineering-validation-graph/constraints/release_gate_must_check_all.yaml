id: constraint.release_gate_must_check_all
artifact: GraphConstraint
label: Release Gate Must Check All
label_zh: 发布门禁必须检查全部
severity: error
rule: >
  node.release_gate MUST reference all mandatory_checkers and block release when any mandatory checker reports failed status at blocking severity.
applies_to:
  nodes: [node.release_gate]
  edges: [edge.BLOCKS_RELEASE]
description: >
  Release integrity rule ensuring no mandatory validation is bypassed before ontology release.
status: active
