schema: moonweave.ai/ontology-node/v1
id: CorrectionActivity
kind: concept
status: review
labels:
  zh: 纠正活动
  en: correction activity
  ja: 修正活動
semantics:
  short_definition:
    zh: 纠正活动是按获准提案或修订计划对明确对象执行改变的一次有界活动。
    en: A correction activity is one bounded execution of an approved proposal or revision plan against an identified subject.
    ja: 修正活動は承認済み提案または改訂計画に従い特定対象を変更する一回の有界活動です。
  definition:
    zh: 纠正活动是一种有开始、结束和活动身份的改变过程；它绑定基线对象版本、获准 ChangeProposal 或 RevisionPlan、执行者、差异、结果与回滚点，区别于提案信息和生成的 RevisionArtifact。
    en: A correction activity is a change process with start, end, and activity identity that binds baseline subject version, approved ChangeProposal or RevisionPlan, executor, diff, outcome, and rollback point, unlike proposal information or the generated RevisionArtifact.
    ja: 修正活動は開始・終了・活動 ID を持つ変更過程で、基準対象版、承認済み ChangeProposal または RevisionPlan、実行者、差分、結果、ロールバック点を結び、提案情報や生成 RevisionArtifact と異なります。
  why_needed:
    zh: 用 CorrectionActivity 统一原 Correction 概念，可避免同一动作同时出现名词与活动两套节点。
    en: Using CorrectionActivity as the sole action concept removes duplicate noun and activity nodes for the same change.
    ja: CorrectionActivity を唯一行為概念とし同じ変更に名詞・活動の二重ノードが生じることを防ぎます。
  includes:
    - zh: 包括修改提示、替换产物、应用配置修复、执行恢复或回滚。
      en: Includes prompt edits, artifact replacement, configuration fixes, recovery, and rollback execution.
      ja: プロンプト修正、成果物置換、構成修復、復旧、ロールバック実行を含みます。
  excludes:
    - zh: 不包括仅描述候选差异的 ChangeProposal，也不包括修正后的 RevisionArtifact。
      en: Excludes a ChangeProposal that only describes a candidate diff and the resulting RevisionArtifact.
      ja: 候補差分のみの ChangeProposal と結果 RevisionArtifact は含みません。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - correction_activity_id
  fields:
    - id: correction_activity_id
      labels:
        zh: 纠正活动标识
        en: correction-activity ID
        ja: 修正活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次实际发生、可独立追踪和复验的纠正执行；它不复用计划或产物标识。
        en: Stably identifies one correction execution that actually occurred and can be independently traced and re-evaluated; it does not reuse a plan or artifact ID.
        ja: 実際に発生し独立追跡・再評価できる一回の修正実行を安定識別し、計画や成果物の ID を再利用しません。
      allowed_values: []
      pattern: null
      example_value: correction/c-11
      source_claims:
        - claim-correction-activity-002
    - id: baseline_subject_version_ref
      labels:
        zh: 基线对象版本引用
        en: baseline subject-version reference
        ja: 基準対象版参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次纠正开始时实际读取并施加差异的对象精确版本，用于检测陈旧基线。
        en: References the exact subject version read and changed when the correction began, enabling stale-baseline detection.
        ja: 修正開始時に実際に読み差分を適用した対象の正確な版を参照し、古い基準の検出に用います。
      allowed_values: []
      pattern: null
      example_value: artifact/a-19@3
      source_claims:
        - claim-correction-activity-003
    - id: governing_plan_or_proposal_ref
      labels:
        zh: 治理计划或提案引用
        en: governing plan-or-proposal reference
        ja: 統制計画・提案参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用已经获准且明确规定本次改变范围的 RevisionPlan、RecoveryPlan 或 ChangeProposal 版本。
        en: References the approved RevisionPlan, RecoveryPlan, or ChangeProposal version that explicitly authorizes this change scope.
        ja: この変更範囲を明示的に承認する RevisionPlan・RecoveryPlan・ChangeProposal の版を参照します。
      allowed_values: []
      pattern: null
      example_value: change-proposal/p-8
      source_claims:
        - claim-correction-activity-004
    - id: executor_ref
      labels:
        zh: 执行者引用
        en: executor reference
        ja: 実行者参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际应用改变、对执行权限和结果负责的 Agent、角色或受控运行器。
        en: References the agent, role, or controlled runner that actually applied the change and is accountable for execution authority and outcome.
        ja: 変更を実際に適用し実行権限と結果に責任を持つ agent・role・controlled runner を参照します。
      allowed_values: []
      pattern: null
      example_value: agent/revision-worker-3
      source_claims:
        - claim-correction-activity-005
    - id: applied_diff_ref
      labels:
        zh: 已应用差异引用
        en: applied-diff reference
        ja: 適用済み差分参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际提交的不可变差异记录；不得以提案中的候选差异替代执行后差异。
        en: References the immutable diff actually committed; the proposed candidate diff cannot substitute for the post-execution diff.
        ja: 実際に commit された不変差分記録を参照し、提案中の candidate diff で実行後差分を代替しません。
      allowed_values: []
      pattern: null
      example_value: diff/c-11-applied
      source_claims:
        - claim-correction-activity-006
    - id: rollback_point_ref
      labels:
        zh: 回滚点引用
        en: rollback-point reference
        ja: ロールバック点参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用在改变前冻结、可供恢复的快照、版本或检查点；它是可回退依据而不是回滚已发生的声明。
        en: References the snapshot, version, or checkpoint frozen before the change for possible restoration; it is a rollback basis, not evidence that rollback occurred.
        ja: 変更前に固定した復元可能な snapshot・version・checkpoint を参照し、rollback 発生の証明とはしません。
      allowed_values: []
      pattern: null
      example_value: checkpoint/artifact-a-19-v3
      source_claims:
        - claim-correction-activity-007
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 执行者开始读取已锁定基线并实施已授权差异的 UTC 时间。
        en: UTC instant when the executor began reading the locked baseline and applying the authorized diff.
        ja: 実行者が固定基準を読み承認済み差分を適用し始めた UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T14:25:00.000Z
      source_claims:
        - claim-correction-activity-008
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: 終了時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 纠正提交、失败、取消或回滚完成的 UTC 时间；进行中的活动可以为空。
        en: UTC instant when correction committed, failed, was cancelled, or completed rollback; absent while the activity is in progress.
        ja: 修正の commit・失敗・取消・rollback 完了時の UTC 時刻で、進行中は省略できます。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T14:27:00.000Z
      source_claims:
        - claim-correction-activity-009
    - id: outcome
      labels:
        zh: 纠正结果
        en: correction outcome
        ja: 修正結果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录本次执行处于进行中、成功、失败、已取消或已回滚；结果必须来自执行证据而非计划意图。
        en: Records in-progress, succeeded, failed, cancelled, or rolled-back state; it must come from execution evidence rather than plan intent.
        ja: 進行中・成功・失敗・取消・rollback 済みを記録し、計画意図でなく実行証拠に基づきます。
      allowed_values: []
      pattern: null
      example_value: succeeded
      source_claims:
        - claim-correction-activity-010
  constraints:
    - id: correction-activity-authorized-baseline-and-observed-outcome
      severity: error
      expression_language: plain
      expression: a CorrectionActivity applies only an authorized diff to the referenced baseline version, and a terminal outcome requires ended_at and execution evidence
      explanations:
        zh: 纠正活动只能对所引用基线应用获准差异；终态必须同时有结束时间和执行证据。
        en: A correction activity may apply only an authorized diff to its referenced baseline; a terminal outcome also requires end time and execution evidence.
        ja: 修正活動は参照基準へ承認済み差分だけを適用し、終端結果には終了時刻と実行証拠を要します。
      source_claims:
        - claim-correction-activity-011
  required_relation_constraints: []
examples:
  - id: CorrectionActivity-example-positive-manual-001
    kind: positive
    labels:
      zh: 纠正活动正例
      en: Positive correction activity case
      ja: 修正活動の正例
    scenario_id: null
    descriptions:
      zh: correction c-11 在 14:25–14:27 按 p-8 修改 artifact a-19@3，生成 a-19@4 并保留回滚点。
      en: correction c-11 runs 14:25–14:27 under p-8, changes artifact a-19@3, generates a-19@4, and retains a rollback point.
      ja: correction c-11 は 14:25～14:27 に p-8 に従い artifact a-19@3 を変更し a-19@4 とロールバック点を生成します。
    field_values:
      correction_activity_id: correction/c-11
      baseline_subject_version_ref: artifact/a-19@3
      governing_plan_or_proposal_ref: change-proposal/p-8
      executor_ref: agent/revision-worker-3
      applied_diff_ref: diff/c-11-applied
      rollback_point_ref: checkpoint/artifact-a-19-v3
      started_at: 2026-07-16T14:25:00.000Z
      ended_at: 2026-07-16T14:27:00.000Z
      outcome: succeeded
    related_node_ids:
      - CorrectionActivity
    related_relation_ids: []
    expected_result:
      zh: 该对象是 CorrectionActivity。
      en: The object is a CorrectionActivity.
      ja: この対象は CorrectionActivity です。
    why_valid_or_invalid:
      zh: 它具有发生边界、基线、依据、执行差异和结果。
      en: It has occurrence bounds, baseline, authority, executed diff, and result.
      ja: 発生境界、基準、根拠、実行差分、結果を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-correction-activity-012
  - id: CorrectionActivity-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 纠正活动边界例
      en: Boundary correction activity case
      ja: 修正活動の境界例
    scenario_id: null
    descriptions:
      zh: proposal p-8 描述拟议差异和预期收益，但尚未执行。
      en: proposal p-8 describes a proposed diff and expected benefit but has not executed.
      ja: proposal p-8 は差分と期待利益を記述しますが未実行です。
    field_values: {}
    related_node_ids:
      - CorrectionActivity
    related_relation_ids: []
    expected_result:
      zh: 这是 ChangeProposal，不是 CorrectionActivity。
      en: This is a ChangeProposal, not a CorrectionActivity.
      ja: これは ChangeProposal で CorrectionActivity ではありません。
    why_valid_or_invalid:
      zh: 规范性信息没有活动时间、执行者和实际结果。
      en: Proposal information has no activity time, executor, or actual result.
      ja: 提案情報には活動時刻、実行者、実結果がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-correction-activity-013
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: CorrectionActivity-followed_by-EvaluationRun
    predicate: followed_by
    direction: source-to-target
    relation_kind: temporal
    labels:
      zh: 后续进行复评
      en: followed by evaluation run
      ja: 後続評価実行
    definitions:
      zh: CorrectionActivity 完成后由明确 EvaluationRun 对修订版本复评；目标运行必须引用修订产物而不是仅在时间上随后发生。
      en: CorrectionActivity is followed by an EvaluationRun that re-evaluates the revised version; the target run must reference the revision rather than merely occur later in time.
      ja: CorrectionActivity 後に改訂版を再評価する EvaluationRun が続き、対象実行は時間的後続だけでなく改訂成果物を参照する必要があります。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_followed_by
      labels:
        zh: 反向：后续进行复评
        en: "inverse: followed by evaluation run"
        ja: 逆方向：後続評価実行
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: CorrectionActivity-followed_by-EvaluationRun-example-positive-manual-001
        kind: positive
        labels:
          zh: 后续进行复评正例
          en: Positive case for followed by evaluation run
          ja: 後続評価実行の正例
        scenario_id: null
        descriptions:
          zh: c-11 生成 a-19@4 后，eval-run er-90 以 @4 为 subject_version 开始。
          en: After c-11 generates a-19@4, eval-run er-90 starts with @4 as subject_version.
          ja: c-11 が a-19@4 を生成後 eval-run er-90 は @4 を subject_version として開始します。
        field_values: {}
        related_node_ids:
          - CorrectionActivity
          - EvaluationRun
        related_relation_ids:
          - CorrectionActivity-followed_by-EvaluationRun
        expected_result:
          zh: 应记录 c-11 后续由 er-90 复评。
          en: c-11 is linked to follow-up evaluation er-90.
          ja: c-11 に後続評価 er-90 を結びます。
        why_valid_or_invalid:
          zh: 时间顺序与修订对象引用同时成立。
          en: Temporal order and revision-subject reference both hold.
          ja: 時間順序と改訂対象参照が共に成立します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-correction-activity-014
      - id: CorrectionActivity-followed_by-EvaluationRun-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 后续进行复评边界例
          en: Boundary case for followed by evaluation run
          ja: 後続評価実行の境界例
        scenario_id: null
        descriptions:
          zh: er-91 虽在 c-11 后运行，但评估的是另一 target b-4。
          en: er-91 runs after c-11 but evaluates a different target b-4.
          ja: er-91 は c-11 後に動きますが別 target b-4 を評価します。
        field_values: {}
        related_node_ids:
          - CorrectionActivity
          - EvaluationRun
        related_relation_ids:
          - CorrectionActivity-followed_by-EvaluationRun
        expected_result:
          zh: 不得建立 c-11 followed_by er-91。
          en: No c-11 followed_by er-91 fact is asserted.
          ja: c-11 followed_by er-91 を主張しません。
        why_valid_or_invalid:
          zh: 纯时间先后不足以形成纠正后的复评链。
          en: Temporal succession alone does not form a post-correction re-evaluation chain.
          ja: 時間的後続だけでは修正後再評価連鎖になりません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-correction-activity-015
    source_claims:
      - claim-correction-activity-016
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: pending
    target: concept:EvaluationRun
  - id: CorrectionActivity-uses_as_baseline-Artifact
    predicate: uses_as_baseline
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 使用产物基线
      en: uses artifact as baseline
      ja: 成果物を基準として使用
    definitions:
      zh: CorrectionActivity 以由 artifact_id、version 和内容摘要共同固定的 Artifact 作为修订输入基线；活动读取该版本但不改写其身份，新内容由单独的 RevisionArtifact 表示。
      en: CorrectionActivity uses an Artifact fixed by artifact_id, version, and content digest as its revision input baseline; it reads that version without changing its identity, while new content is represented by a separate RevisionArtifact.
      ja: CorrectionActivity は artifact_id・version・content digest で固定された Artifact を revision input baseline として使用し identity を変更せず読み、新 content は別の RevisionArtifact で表します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该事实数量取决于运行中可核验的实例，不强加跨系统统一基数。
      en: The count depends on verifiable instances in a run, so no universal cross-system cardinality is imposed.
      ja: fact 数は run 内の検証可能 instance に依存し cross-system 共通 cardinality は課しません。
    inverse_reading:
      predicate: is_target_of_uses_as_baseline
      labels:
        zh: 反向：使用产物基线
        en: "inverse: uses artifact as baseline"
        ja: 逆方向：成果物を基準として使用
    conditions:
      - id: CorrectionActivity-uses_as_baseline-Artifact-condition-manual-20260717
        severity: error
        expression_language: plain
        expression: Assert only when the activity pins the same Artifact identity, version, and content digest before execution and consumes it as the diff baseline; an evidence citation or later inspection is insufficient.
        explanations:
          zh: 仅当活动在执行前固定同一 Artifact 的标识、版本与内容摘要，并把它作为差异计算输入时成立；只作证据引用或事后查看不足。
          en: Assert only when the activity pins the same Artifact identity, version, and content digest before execution and consumes it as the diff baseline; an evidence citation or later inspection is insufficient.
          ja: activity が execution 前に同一 Artifact identity・version・content digest を固定し diff baseline として consume した場合のみ成立し、evidence citation や later inspection は不十分です。
        source_claims:
          - claim-correction-activity-017
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: CorrectionActivity-uses_as_baseline-Artifact-example-positive-manual-001
        kind: positive
        labels:
          zh: 使用产物基线正例
          en: uses artifact as baseline positive case
          ja: 成果物を基準として使用の正例
        scenario_id: null
        descriptions:
          zh: c-11 在开始前固定 a-19@3 与摘要，读取该版本计算补丁，并生成 a-19@4。
          en: c-11 pins a-19@3 and its digest before starting, reads it to compute a patch, and generates a-19@4.
          ja: c-11 は開始前に a-19@3 と digest を固定し patch 計算に読み a-19@4 を生成します。
        field_values: {}
        related_node_ids:
          - CorrectionActivity
          - Artifact
        related_relation_ids:
          - CorrectionActivity-uses_as_baseline-Artifact
        expected_result:
          zh: 建立 c-11 uses_as_baseline a-19@3；新版本由 produces-RevisionArtifact 表示。
          en: Assert c-11 uses_as_baseline a-19@3; represent the new version through produces-RevisionArtifact.
          ja: c-11 uses_as_baseline a-19@3 を成立させ new version は produces-RevisionArtifact で表します。
        why_valid_or_invalid:
          zh: 输入版本保持身份，使用与生成角色被明确分开。
          en: The input version keeps its identity, separating usage from generation.
          ja: input version の identity を保持し usage と generation role を分離します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
        source_claims:
          - claim-correction-activity-017
      - id: CorrectionActivity-uses_as_baseline-Artifact-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 使用产物基线边界例
          en: uses artifact as baseline boundary case
          ja: 成果物を基準として使用の境界例
        scenario_id: null
        descriptions:
          zh: c-12 仅在评审说明中引用 a-20@1，没有把它载入修订输入。
          en: c-12 merely cites a-20@1 in a review note and never loads it as revision input.
          ja: c-12 は review note で a-20@1 を引用するだけで revision input に load しません。
        field_values: {}
        related_node_ids:
          - CorrectionActivity
          - Artifact
        related_relation_ids:
          - CorrectionActivity-uses_as_baseline-Artifact
        expected_result:
          zh: 不建立 uses_as_baseline。
          en: Do not assert uses_as_baseline.
          ja: uses_as_baseline を成立させません。
        why_valid_or_invalid:
          zh: 引用不是作为修订基线的实际使用。
          en: Citation is not actual use as a revision baseline.
          ja: citation は revision baseline としての actual use ではありません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.4.0/
        source_claims:
          - claim-correction-activity-017
    source_claims:
      - claim-correction-activity-017
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: pending
    target: concept:Artifact
  - id: CorrectionActivity-produces-RevisionArtifact
    predicate: produces
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 生成修订产物
      en: produces revision artifact
