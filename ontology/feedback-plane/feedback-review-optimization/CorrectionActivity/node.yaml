source_claims:
  - id: claim-correction-activity-001
    source: lit-mech-self-refine
    supports: Self-Refine separates feedback generation from the refinement step that changes the output; Moonweave models that occurrence as CorrectionActivity.
    locator: Sections 2–3 > generator, feedback, and iterative refinement loop
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-correction-activity-002
    source: lit-mech-self-refine
    supports: Self-Refine distinguishes an executed REFINE step from the feedback that precedes it but does not assign an execution identifier. CorrectionActivity.correction_activity_id is Moonweave's traceability identity for one such occurrence.
    locator: Sections 2–3 > generator, feedback, and iterative refinement loop
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-correction-activity-003
    source: lit-mech-self-refine
    supports: Self-Refine applies refinement to the current output. CorrectionActivity.baseline_subject_version_ref is Moonweave's explicit version binding that makes the pre-change state reproducible.
    locator: Sections 2–3 > current output, feedback, and refinement
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-correction-activity-004
    source: lit-mech-self-refine
    supports: Self-Refine uses feedback to guide refinement but does not define approval or plan governance. CorrectionActivity.governing_plan_or_proposal_ref is Moonweave's authorization boundary between proposed guidance and executed change.
    locator: Sections 2–3 > feedback-guided refinement
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-correction-activity-005
    source: lit-mech-self-refine
    supports: Self-Refine describes the generator performing refinement but does not define Moonweave executor provenance. CorrectionActivity.executor_ref records the accountable performer of the change occurrence.
    locator: Sections 2–3 > generator and REFINE operation
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-correction-activity-006
    source: lit-mech-self-refine
    supports: Self-Refine changes an output in the REFINE step but does not expose a durable applied diff. CorrectionActivity.applied_diff_ref is Moonweave's execution-evidence record of what changed.
    locator: Sections 2–3 > REFINE operation
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-correction-activity-007
    source: lit-mech-self-refine
    supports: Self-Refine does not prescribe rollback. CorrectionActivity.rollback_point_ref is a Moonweave operational safeguard that preserves the exact pre-change state around refinement.
    locator: Sections 2–3 > iterative refinement loop
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-correction-activity-008
    source: lit-mech-self-refine
    supports: Self-Refine presents refinement as an operation in an iteration but does not specify timestamps. CorrectionActivity.started_at is Moonweave's lower temporal bound for the occurrence.
    locator: Sections 2–3 > iterative refinement loop
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-correction-activity-009
    source: lit-mech-self-refine
    supports: Self-Refine gives each refinement iteration an operational boundary but no timestamp schema. CorrectionActivity.ended_at is Moonweave's terminal temporal bound and remains absent for an active execution.
    locator: Sections 2–3 > iterative refinement loop
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-correction-activity-010
    source: lit-mech-self-refine
    supports: Self-Refine distinguishes the generated refinement from the feedback that requested it, but does not define execution states. CorrectionActivity.outcome is Moonweave's observed terminal or active status for one refinement occurrence.
    locator: Sections 2–3 > feedback and refinement outputs
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-correction-activity-011
