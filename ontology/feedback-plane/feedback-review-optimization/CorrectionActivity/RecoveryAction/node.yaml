schema: moonweave.ai/ontology-node/v1
id: RecoveryAction
kind: concept
status: accepted
labels:
  zh: 故障恢复活动
  en: recovery activity
  ja: 復旧活動
semantics:
  short_definition:
    zh: 恢复活动是为使失败执行重新达到可用状态而进行的纠正活动。
    en: A recovery activity is a CorrectionActivity restoring a failed execution to a usable state.
    ja: 復旧活動は失敗実行を利用可能状態へ戻す CorrectionActivity です。
  definition:
    zh: 恢复活动是 CorrectionActivity 的子类；它响应已识别 ErrorEvent，按 RecoveryPlan 执行重试后补偿、状态修复或故障切换，并记录是否恢复，而不必撤销所有已完成副作用。
    en: A recovery activity is a CorrectionActivity subtype responding to an identified ErrorEvent under a RecoveryPlan with post-retry compensation, state repair, or failover and recording whether service recovered, without necessarily undoing every completed side effect.
    ja: 復旧活動は識別済み ErrorEvent に RecoveryPlan に従って再試行後補償、状態修復、フェイルオーバーを行い復旧結果を記録する CorrectionActivity 下位型で、全副作用取消しを必須としません。
  why_needed:
    zh: 恢复与回滚分开后，可以表达前向补偿和故障切换，而不是把所有恢复都误解为撤销。
    en: Separating recovery from rollback allows forward compensation and failover instead of treating every recovery as undo.
    ja: 復旧とロールバックを分け、前向き補償やフェイルオーバーを全て取消しと誤解せず表せます。
  includes:
    - zh: 包括切换备用服务、重建会话状态、补偿支付或在重试耗尽后降级。
      en: Includes failover, session-state reconstruction, compensating payment, and degradation after retry exhaustion.
      ja: 予備サービス切替、セッション状態再構築、支払補償、再試行枯渇後縮退を含みます。
  excludes:
    - zh: 不包括自动重试本身，也不包括专门恢复旧版本的 RollbackAction。
      en: Excludes automatic retry itself and RollbackAction specifically restoring a prior version.
      ja: 自動再試行自体と旧版復元専用 RollbackAction は含みません。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: RecoveryAction-example-positive-manual-001
    kind: positive
    labels:
      zh: 恢复活动正例
      en: Positive recovery activity case
      ja: 復旧活動の正例
    scenario_id: null
    descriptions:
      zh: recovery rec-7 在三次重试耗尽后切换备用搜索服务并重建 checkpoint，随后运行继续。
      en: recovery rec-7 switches to a backup search service and rebuilds the checkpoint after three retries are exhausted, then execution continues.
      ja: recovery rec-7 は三再試行枯渇後に予備検索へ切替え checkpoint を再構築し実行を継続します。
    field_values:
      correction_activity_id: recovery-action/rec-7
      baseline_subject_version_ref: checkpoint/search-run-41@retry-exhausted
      governing_plan_or_proposal_ref: recovery-plan/search-upstream-timeout@5
      executor_ref: agent/recovery-controller-2
      applied_diff_ref: recovery-diff/rec-7-failover-and-checkpoint-repair
      rollback_point_ref: checkpoint/search-run-41-before-failover
      started_at: 2026-07-16T15:04:11.000Z
      ended_at: 2026-07-16T15:04:14.000Z
      outcome: succeeded
    related_node_ids:
      - RecoveryAction
    related_relation_ids: []
    expected_result:
      zh: 该活动是 RecoveryAction。
      en: The activity is a RecoveryAction.
      ja: この活動は RecoveryAction です。
    why_valid_or_invalid:
      zh: 它响应具体错误，在重试后执行恢复并记录可用结果。
      en: It responds to a concrete error, executes recovery after retries, and records usable outcome.
      ja: 具体エラーへ応答し再試行後復旧を実行し利用可能結果を記録します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-recovery-action-002
  - id: RecoveryAction-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 恢复活动边界例
      en: Boundary recovery activity case
      ja: 復旧活動の境界例
    scenario_id: null
    descriptions:
      zh: RetryActivity 只按 RetryPolicy 再执行同一节点，没有补偿或状态修复。
      en: RetryActivity only re-executes the same node under RetryPolicy with no compensation or state repair.
      ja: RetryActivity は RetryPolicy で同じノードを再実行するだけで補償や状態修復をしません。
    field_values: {}
    related_node_ids:
      - RecoveryAction
    related_relation_ids: []
    expected_result:
      zh: 这是重试活动，不是 RecoveryAction。
      en: This is retry activity, not RecoveryAction.
      ja: これは再試行活動で RecoveryAction ではありません。
    why_valid_or_invalid:
      zh: 恢复是重试耗尽后的独立处理阶段，不能与重试本身合并。
      en: Recovery is a separate post-exhaustion handling stage and cannot be merged with retry itself.
      ja: 復旧は再試行枯渇後の独立処理段階で再試行自体と統合できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-recovery-action-003
