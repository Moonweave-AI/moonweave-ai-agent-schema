        severity: error
        expression_language: plain
        expression: Assert only when the RollbackAction was actually executed, its target_effect_ref matches the same ToolSideEffect identity, and outcome verification records completion plus any residual effects; a plan, suggestion, or merely scheduled action is insufficient.
