          en: Assert only when the RollbackAction was actually executed, its target_effect_ref matches the same ToolSideEffect identity, and outcome verification records completion plus any residual effects; a plan, suggestion, or merely scheduled action is insufficient.
          ja: RollbackAction が actually executed され target_effect_ref が same ToolSideEffect identity と一致し outcome verification が completion と residual effects を記録する場合のみ成立し plan・suggestion・scheduled action だけでは不十分です。
