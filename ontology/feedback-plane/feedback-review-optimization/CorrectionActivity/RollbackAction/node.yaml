schema: moonweave.ai/ontology-node/v1
id: RollbackAction
kind: concept
status: accepted
labels:
  zh: 回滚活动
  en: rollback activity
  ja: ロールバック活動
semantics:
  short_definition:
    zh: 回滚活动是把目标或副作用恢复到已知先前状态的纠正活动。
    en: A rollback activity is a CorrectionActivity restoring a target or side effect to a known prior state.
    ja: ロールバック活動は対象または副作用を既知の以前状態へ戻す CorrectionActivity です。
  definition:
    zh: 回滚活动是 CorrectionActivity 的子类；它绑定被撤销变更、目标先前版本、逆操作或快照、执行结果与残留副作用，区别于向前补偿的普通 RecoveryAction。
    en: A rollback activity is a CorrectionActivity subtype binding the reverted change, prior target version, inverse operation or snapshot, execution result, and residual side effects, unlike a forward-compensating RecoveryAction.
    ja: ロールバック活動は取消対象変更、以前対象版、逆操作・スナップショット、実行結果、残留副作用を結ぶ CorrectionActivity 下位型で、前向き補償 RecoveryAction と異なります。
  why_needed:
    zh: 回滚必须点名可恢复基线和残留影响，避免把重试或另做补偿错误标记为已经撤销。
    en: Rollback must identify restorable baseline and residual effects, preventing retry or forward compensation from being mislabeled as undo.
    ja: ロールバックは復元基準と残留影響を示し、再試行・前向き補償を取消しと誤標記しません。
  includes:
    - zh: 包括恢复配置快照、撤销事务、回退模型版本或反向工具副作用。
      en: Includes restoring configuration snapshots, reversing transactions, reverting model versions, and compensating tool side effects by inverse operation.
      ja: 構成スナップショット復元、取引取消し、モデル版回退、逆操作によるツール副作用取消しを含みます。
  excludes:
    - zh: 不包括对失败节点的再次执行或切换到新备用服务的前向恢复。
      en: Excludes re-executing a failed node and forward recovery by switching to a new backup service.
      ja: 失敗ノード再実行と新しい予備サービスへの前向き復旧は含みません。
  semantic_kind: activity
  aliases: []
