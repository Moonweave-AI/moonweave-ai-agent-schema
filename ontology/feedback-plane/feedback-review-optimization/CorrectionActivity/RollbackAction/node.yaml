relations:
  - id: RollbackAction-responds_to-ToolSideEffect
    predicate: responds_to
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 响应工具副作用
      en: responds to tool side effect
      ja: ツール副作用に応答
    definitions:
      zh: RollbackAction 指向其实际执行逆操作或补偿所针对的同一个 ToolSideEffect，并保留动作开始与完成、目标效应身份、结果、残留影响和核验证据；执行回滚不保证所有效应均已消除。
      en: RollbackAction responds to the same ToolSideEffect against which its inverse or compensating operation was actually executed and retains action start and completion, target-effect identity, outcome, residual effects, and verification evidence; executing rollback does not guarantee that every effect was removed.
      ja: RollbackAction は inverse/compensating operation を実際に実行した対象と同一 ToolSideEffect を指し action start/completion・target-effect identity・outcome・residual effects・verification evidence を保持し rollback 実行は全 effect 消去を保証しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_responds_to
      labels:
        zh: 反向：响应工具副作用
        en: "inverse: responds to tool side effect"
        ja: 逆方向：ツール副作用に応答
    conditions:
