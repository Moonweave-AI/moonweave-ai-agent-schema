source_claims:
  - id: claim-review-evidence-artifact-001
    source: eng-ont-prov-o
    supports: PROV-O treats generated digital records as Entities with provenance; Moonweave specializes Artifact for persistent review evidence.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-review-evidence-artifact-002
    source: eng-ont-prov-o
    supports: PROV-O defines prov:wasGeneratedBy between an Entity and its generating Activity. ReviewEvidenceArtifact.generated_by_review_activity_ref directly specializes that provenance fact.
    locator: PROV-O Recommendation §3.1 > wasGeneratedBy
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-review-evidence-artifact-003
    source: eng-ont-prov-o
    supports: PROV-O supports qualified derivation and provenance links but does not define review findings. ReviewEvidenceArtifact.supported_finding_refs is Moonweave's explicit evidentiary binding from an Entity's spans to particular finding versions.
    locator: PROV-O Recommendation §3.2 and §5.2 > qualified relations and derivation
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-review-evidence-artifact-004
    source: eng-ont-prov-o
    supports: PROV-O separates a generated Entity, its generating Activity, and other Entities it describes or influences. ReviewEvidenceArtifact-immutable-and-span-supported is Moonweave's reviewed boundary between evidence lineage and subject revision lineage.
    locator: PROV-O Recommendation §3.1 and §5.2 > Entity, Activity, wasGeneratedBy, and derivation
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-review-evidence-artifact-005
    source: eng-ont-prov-o
    supports: PROV-O supports identifying an Entity by generation provenance and stable aspects.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-review-evidence-artifact-006
    source: eng-ont-prov-o
    supports: PROV-O generation alone does not erase the different roles of evidence entity and revised entity.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-review-evidence-artifact-007
    source: eng-ont-prov-o
    supports: PROV-O Entities include persistent digital records generated by Activities.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-review-evidence-artifact-008
    source: eng-ont-prov-o
    supports: PROV-O Entity identity requires fixed aspects beyond an ephemeral utterance.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-review-evidence-artifact-009
    source: eng-ont-prov-o
    supports: PROV-O defines generated digital Entities with persistent identity, supporting review evidence as an Artifact specialization.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
