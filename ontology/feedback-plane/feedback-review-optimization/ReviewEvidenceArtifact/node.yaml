schema: moonweave.ai/ontology-node/v1
id: ReviewEvidenceArtifact
kind: concept
status: review
labels:
  zh: 审查证据产物
  en: review evidence artifact
  ja: 審査証拠成果物
semantics:
  short_definition:
    zh: 审查证据产物是审查活动生成、用于说明发现依据的持久产物。
    en: A review evidence artifact is a persistent Artifact generated by review to explain the basis of findings.
    ja: 審査証拠成果物は審査が生成し所見根拠を説明する持続 Artifact です。
  definition:
    zh: 审查证据产物是 Artifact 的子类；其身份由内容哈希、生成 ReviewActivity、所支持 ReviewFinding 和格式确定，作为证据载体而不是对象修订后的新版本。
    en: A review evidence artifact is an Artifact subtype identified by content hash, generating ReviewActivity, supported ReviewFindings, and format; it carries review evidence rather than a revised subject version.
    ja: 審査証拠成果物は content hash、生成 ReviewActivity、支持 ReviewFinding、形式で同一性が決まる Artifact 下位型で、対象修訂版でなく審査証拠を運びます。
  why_needed:
    zh: 证据产物与修订产物分开后，批评和反思不会被误当作已修改的业务输出。
    en: Separating evidence artifacts from revision artifacts prevents critique or reflection from being mistaken for modified business output.
    ja: 証拠成果物と改訂成果物を分け、批評・反省を修正済み業務出力と誤認しません。
  includes:
    - zh: 包括带引用的批评文档、反思记录、差异分析或审查截图。
      en: Includes cited critique documents, reflection records, diff analyses, and review screenshots.
      ja: 引用付き批評文書、反省記録、差分分析、審査スクリーンショットを含みます。
  excludes:
    - zh: 不包括修正后输出的 RevisionArtifact 或不持久的口头评论。
      en: Excludes a post-correction RevisionArtifact and an ephemeral verbal comment.
      ja: 修正後 RevisionArtifact と非持続的口頭コメントは含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: generated_by_review_activity_ref
      labels:
        zh: 生成审查活动引用
        en: generating review-activity reference
        ja: 生成審査活動参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际生成该证据版本的 ReviewActivity，而不是持久 Review 记录或使用该证据的后续活动。
        en: References the ReviewActivity that actually generated this evidence version, not the persistent Review record or a later activity that consumed it.
        ja: この証拠版を実際に生成した ReviewActivity を参照し、持続 Review record や後続 consumer activity は指しません。
      allowed_values: []
      pattern: null
      example_value: review-activity/ra-42
      source_claims:
        - claim-review-evidence-artifact-002
    - id: supported_finding_refs
      labels:
        zh: 所支持发现引用
        en: supported-finding references
        ja: 支持 finding 参照
      datatype: reference-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出能由该内容中的具体证据片段直接支持的 ReviewFinding 版本；同一审查中共现不足以列入。
        en: Lists ReviewFinding versions directly supported by concrete evidence spans in this content; co-occurrence in the same review is insufficient.
        ja: 内容中の具体的 evidence span が直接裏付ける ReviewFinding 版を列挙し、同一審査での共起だけでは含めません。
      allowed_values: []
      pattern: null
      example_value:
        - review-finding/rf-2@1
      source_claims:
        - claim-review-evidence-artifact-003
  constraints:
    - id: review-evidence-artifact-immutable-and-span-supported
      severity: error
      expression_language: plain
      expression: one ReviewEvidenceArtifact version is immutable, has one generating ReviewActivity, and lists only findings supported by identifiable spans in its content; it is evidence about a subject and not a revised subject version
      explanations:
        zh: 一个审查证据产物版本不可变，仅有一次生成审查活动，只列出由可定位内容片段支持的发现；它是关于对象的证据，不是对象修订版。
        en: One review-evidence artifact version is immutable, has one generating review activity, and lists only findings backed by addressable content spans; it is evidence about a subject, not a revised subject version.
        ja: 一つの review evidence artifact 版は不変で、一つの生成審査活動を持ち、特定可能な内容 span が支える finding だけを列挙し、対象改訂版ではありません。
      source_claims:
        - claim-review-evidence-artifact-004
  required_relation_constraints: []
examples:
  - id: ReviewEvidenceArtifact-example-positive-manual-001
    kind: positive
    labels:
      zh: 审查证据产物正例
      en: Positive review evidence artifact case
      ja: 審査証拠成果物の正例
    scenario_id: null
    descriptions:
      zh: critique c-19 保存引用 span s-8 的逐项分析，content_hash=h7，generated_by=ra-42。
      en: critique c-19 stores itemized analysis citing span s-8 with content_hash=h7 and generated_by=ra-42.
      ja: critique c-19 は span s-8 を引用する分析を content_hash=h7、generated_by=ra-42 で保存します。
    field_values:
      artifact_id: c-19
      version: "1"
      content_digest: sha256:h7
      generated_by_review_activity_ref: review-activity/ra-42
      supported_finding_refs:
        - review-finding/rf-2@1
      media_type: application/json
    related_node_ids:
      - ReviewEvidenceArtifact
    related_relation_ids: []
    expected_result:
      zh: 该对象是 ReviewEvidenceArtifact。
      en: The object is a ReviewEvidenceArtifact.
      ja: この対象は ReviewEvidenceArtifact です。
    why_valid_or_invalid:
      zh: 它是持久产物，具有生成出处并支持具体发现。
      en: It is persistent, has generation provenance, and supports concrete findings.
      ja: 持続成果物で生成出所を持ち具体所見を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-review-evidence-artifact-005
  - id: ReviewEvidenceArtifact-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 审查证据产物边界例
      en: Boundary review evidence artifact case
      ja: 審査証拠成果物の境界例
    scenario_id: null
    descriptions:
      zh: revision artifact a-20 是按修正活动生成的新答案版本。
      en: revision artifact a-20 is a new answer version generated by correction.
      ja: revision artifact a-20 は修正活動が生成した新回答版です。
    field_values: {}
    related_node_ids:
      - ReviewEvidenceArtifact
    related_relation_ids: []
    expected_result:
      zh: 该对象是 RevisionArtifact，不是审查证据产物。
      en: The object is a RevisionArtifact, not review evidence.
      ja: これは RevisionArtifact で審査証拠成果物ではありません。
    why_valid_or_invalid:
      zh: 其角色是被修订业务对象的新版本，而不是说明审查依据。
      en: Its role is a new version of the revised business subject, not evidence explaining review.
      ja: 役割は修訂業務対象の新版で審査根拠説明ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-review-evidence-artifact-006
