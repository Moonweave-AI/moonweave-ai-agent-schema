schema: moonweave.ai/ontology-node/v1
id: ReflectionRecord
kind: concept
status: accepted
labels:
  zh: 反思记录
  en: reflection record
  ja: 反省記録
semantics:
  short_definition:
    zh: 反思记录是从一次或多次尝试中总结可迁移经验的审查证据产物。
    en: A reflection record is review evidence summarizing transferable lessons from one or more attempts.
    ja: 反省記録は一回以上の試行から移転可能な教訓を要約する審査証拠成果物です。
  definition:
    zh: 反思记录是 ReviewEvidenceArtifact 的子类；它绑定所依据的轨迹、反馈和失败，提炼未来决策可用的高层经验，区别于定位当前输出具体缺陷的 CritiqueArtifact。
    en: A reflection record is a ReviewEvidenceArtifact subtype binding source trajectories, feedback, and failures and distilling high-level lessons for future decisions, unlike CritiqueArtifact localized to defects in the current output.
    ja: 反省記録は出所軌跡、Feedback、失敗を結び将来判断向け高水準教訓を抽出する ReviewEvidenceArtifact 下位型で、現出力欠陥へ局在する CritiqueArtifact と異なります。
  why_needed:
    zh: 持久反思记录让经验可被后续尝试检索，同时保留它从哪些失败和反馈得出。
    en: A persistent reflection makes lessons retrievable by later trials while retaining which failures and feedback produced them.
    ja: 持続反省記録は後続試行で教訓を検索可能にし、どの失敗と Feedback から得たかを保持します。
  includes:
    - zh: 包括失败原因总结、后续策略原则和跨轨迹可复用的避免事项。
      en: Includes failure-cause summaries, next-trial strategy principles, and cross-trajectory reusable cautions.
      ja: 失敗原因要約、次試行戦略原則、軌跡横断再利用注意事項を含みます。
  excludes:
    - zh: 不包括只定位一个段落的 CritiqueArtifact 或实际写入记忆的 MemoryWrite。
      en: Excludes a CritiqueArtifact localizing one paragraph and the MemoryWrite that persists the reflection elsewhere.
      ja: 一段落を位置付ける CritiqueArtifact と反省を別途保存する MemoryWrite は含みません。
  semantic_kind: information
  aliases: []
