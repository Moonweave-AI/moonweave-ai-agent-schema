schema: moonweave.ai/ontology-node/v1
id: CritiqueArtifact
kind: concept
status: accepted
labels:
  zh: 批评产物
  en: critique artifact
  ja: 批評成果物
semantics:
  short_definition:
    zh: 批评产物是指出具体缺陷、证据和改进方向的审查证据产物。
    en: A critique artifact is review evidence identifying concrete defects, evidence, and improvement directions.
    ja: 批評成果物は具体的欠陥、証拠、改善方向を示す審査証拠成果物です。
  definition:
    zh: 批评产物是 ReviewEvidenceArtifact 的子类；它按被审内容位置组织问题、依据和建议，面向当前输出的缺陷分析，区别于总结跨尝试经验的 ReflectionRecord。
    en: A critique artifact is a ReviewEvidenceArtifact subtype organizing issues, evidence, and suggestions by locations in the reviewed content and analyzing defects in the current output, unlike a ReflectionRecord summarizing cross-trial lessons.
    ja: 批評成果物は ReviewEvidenceArtifact 下位型で、対象内容位置ごとに問題、根拠、提案を整理し現出力の欠陥を分析し、試行横断教訓をまとめる ReflectionRecord と異なります。
  why_needed:
    zh: 批评作为独立产物可逐条关联发现与修订位置，避免把自由文本意见直接写入新输出。
    en: A separate critique can link each finding to revision locations without writing free-text comments directly into the new output.
    ja: 独立批評により各所見を修訂位置へ結び、自由文意見を新出力へ直接混入しません。
  includes:
    - zh: 包括逐段缺陷分析、代码评审意见和带证据引用的输出批评。
      en: Includes paragraph-level defect analysis, code-review comments, and evidence-cited output critique.
      ja: 段落別欠陥分析、コード審査コメント、証拠引用付き出力批評を含みます。
  excludes:
    - zh: 不包括经过修订的新 Artifact，也不包括只记录未来策略教训的 ReflectionRecord。
      en: Excludes a revised Artifact and a ReflectionRecord containing only future-strategy lessons.
      ja: 修訂済み Artifact と将来戦略教訓のみの ReflectionRecord は含みません。
  semantic_kind: information
  aliases: []
