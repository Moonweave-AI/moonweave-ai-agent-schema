schema: moonweave.ai/ontology-node/v1
id: FeedbackEvent
kind: concept
status: accepted
labels:
  zh: 反馈投递事件
  en: feedback delivery event
  ja: フィードバック配信イベント
semantics:
  short_definition:
    zh: 反馈投递事件是某份反馈被送入路由或交付给接收者的一次瞬时记录。
    en: A feedback delivery event is an instantaneous record of feedback entering routing or reaching a recipient.
    ja: フィードバック配信イベントは Feedback がルーティングへ投入または受信者へ到達した瞬時記録です。
  definition:
    zh: 反馈投递事件是一种事件记录；其身份由 event_id、所携 Feedback、投递时间、通道、发送者与路由结果确定，区别于可持久复用的 Feedback 内容和发生一段时间的 ReviewActivity。
    en: A feedback delivery event is an event record identified by event_id, carried Feedback, delivery time, channel, sender, and routing result, unlike reusable Feedback content or temporally extended ReviewActivity.
    ja: フィードバック配信イベントは event_id、運ぶ Feedback、配信時刻、経路、送信者、ルーティング結果で同一性が決まり、再利用 Feedback 内容や時間幅を持つ ReviewActivity と異なります。
  why_needed:
    zh: 独立投递事件能区分同一反馈的重试、重复或多接收者交付，而不复制反馈内容。
    en: A separate delivery event distinguishes retries, duplicates, and multi-recipient deliveries of the same feedback without copying content.
    ja: 独立配信イベントは同一 Feedback の再試行、重複、複数受信者配信を内容複製なしで区別します。
  includes:
    - zh: 包括提交给 FeedbackRouting、成功送达、失败投递和重试投递事件。
      en: Includes submission to FeedbackRouting, successful delivery, failed delivery, and retry delivery events.
      ja: FeedbackRouting への投入、成功配信、失敗配信、再試行配信イベントを含みます。
  excludes:
    - zh: 不包括 Feedback 文本本身或持续数分钟的 ReviewActivity。
      en: Excludes the Feedback text itself and a ReviewActivity lasting minutes.
      ja: Feedback 文自体と数分続く ReviewActivity は含みません。
  semantic_kind: event
  aliases: []
structure:
  identity_keys:
    - feedback_event_id
  fields:
    - id: feedback_event_id
      labels:
        zh: 反馈投递事件标识
        en: feedback-delivery-event ID
        ja: feedback 配信 event ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次携带特定反馈版本的投递尝试；同一反馈的重投必须使用新的事件标识。
        en: Stably identifies one delivery attempt carrying a particular feedback version; a redelivery of the same feedback receives a new event ID.
        ja: 特定 feedback 版を運ぶ一回の配信試行を安定識別し、同じ feedback の再配信には新しい event ID を付与します。
      allowed_values: []
      pattern: null
      example_value: feedback-event/fe-91
      source_claims:
        - claim-feedback-event-002
    - id: feedback_ref
      labels:
        zh: 反馈版本引用
        en: feedback-version reference
        ja: feedback 版参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次投递实际携带的不可变 Feedback 版本，而不是仅引用主题或接收任务。
        en: References the immutable Feedback version actually carried by this delivery, not merely its topic or receiving task.
        ja: この配信が実際に運ぶ不変 Feedback 版を参照し、topic や受信 task だけを参照しません。
      allowed_values: []
      pattern: null
      example_value: feedback/fb-8@2
      source_claims:
        - claim-feedback-event-003
    - id: occurred_at
      labels:
        zh: 发生时间
        en: occurred at
        ja: 発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 发送端把该反馈版本交给指定通道的 UTC 事件时间，不等同于后续消费时间。
        en: UTC event time when the sender handed this feedback version to the specified channel, distinct from later consumption time.
        ja: sender が指定 channel へ feedback 版を渡した UTC event 時刻で、後続 consumer 時刻とは区別します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T14:21:08.000Z
      source_claims:
        - claim-feedback-event-004
    - id: channel
      labels:
        zh: 投递通道
        en: delivery channel
        ja: 配信 channel
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录本次投递使用的可定位通道实例，如队列主题、回调端点或人工审查收件箱。
        en: Records the addressable channel instance used for this delivery, such as a queue topic, callback endpoint, or human-review inbox.
        ja: queue topic・callback endpoint・human-review inbox など、この配信で使った特定可能な channel instance を記録します。
      allowed_values: []
      pattern: null
      example_value: queue://feedback.high
      source_claims:
        - claim-feedback-event-005
    - id: sender_ref
      labels:
        zh: 发送者引用
        en: sender reference
        ja: 送信者参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际发起该次投递并可追责的 Agent、角色或系统组件。
        en: References the agent, role, or system component that actually initiated this delivery and is accountable for it.
        ja: この配信を実際に開始し説明責任を持つ agent・role・system component を参照します。
      allowed_values: []
      pattern: null
      example_value: agent/review-orchestrator-1
      source_claims:
        - claim-feedback-event-006
    - id: delivery_attempt
      labels:
        zh: 投递尝试序号
        en: delivery-attempt ordinal
        ja: 配信試行番号
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录同一反馈版本面向同一路由目标的第几次投递尝试，从 1 开始；它不代表业务修订轮次。
        en: Records the one-based attempt number for delivering the same Feedback version to the same routing target; it is not a business revision iteration.
        ja: 同じ Feedback 版を同じ routing target へ配信する 1 始まりの試行番号で、business revision iteration ではありません。
      allowed_values: []
      pattern: null
      example_value: 1
      source_claims:
        - claim-feedback-event-007
    - id: routing_outcome
      labels:
        zh: 路由结果
        en: routing outcome
        ja: routing 結果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录发送通道是否接受、拒绝、无法路由或将投递放入死信；不得据此推断接收者已处理反馈。
        en: Records whether the channel accepted, rejected, could not route, or dead-lettered the delivery; it does not imply that a recipient processed the feedback.
        ja: channel が accepted・rejected・unroutable・dead-lettered のいずれかを記録し、recipient が feedback を処理済みとは推論しません。
      allowed_values: []
      pattern: null
      example_value: accepted
      source_claims:
        - claim-feedback-event-008
  constraints:
    - id: feedback-event-one-version-one-attempt
      severity: error
      expression_language: plain
      expression: one FeedbackEvent records exactly one attempt to deliver exactly one immutable Feedback version, and routing_outcome does not imply consumer processing
      explanations:
        zh: 一次反馈事件只记录一个不可变反馈版本的一次投递尝试；路由成功不等于接收者已处理。
        en: One feedback event records one attempt for one immutable feedback version; successful routing is not proof of recipient processing.
        ja: 一つの feedback event は一つの不変 feedback 版への一回の配信試行だけを記録し、routing 成功は受信者処理の証明ではありません。
      source_claims:
        - claim-feedback-event-009
  required_relation_constraints: []
examples:
  - id: FeedbackEvent-example-positive-manual-001
    kind: positive
    labels:
      zh: 反馈投递事件正例
      en: Positive feedback delivery event case
      ja: フィードバック配信イベントの正例
    scenario_id: null
    descriptions:
      zh: event fe-91 在 14:21:08 通过 queue feedback.high 投递 fb-8，delivery_status=accepted。
      en: event fe-91 delivers fb-8 through queue feedback.high at 14:21:08 with delivery_status=accepted.
      ja: event fe-91 は 14:21:08 に queue feedback.high で fb-8 を配信し delivery_status=accepted です。
    field_values:
      feedback_event_id: feedback-event/fe-91
      feedback_ref: feedback/fb-8@2
      occurred_at: 2026-07-16T14:21:08.000Z
      channel: queue://feedback.high
      sender_ref: agent/review-orchestrator-1
      delivery_attempt: 1
      routing_outcome: accepted
    related_node_ids:
      - FeedbackEvent
    related_relation_ids: []
    expected_result:
      zh: 该对象是 FeedbackEvent。
      en: The object is a FeedbackEvent.
      ja: この対象は FeedbackEvent です。
    why_valid_or_invalid:
      zh: 它有事件身份、精确时间、内容引用、通道和投递结果。
      en: It has event identity, exact time, content reference, channel, and delivery result.
      ja: イベント ID、正確な時刻、内容参照、経路、配信結果を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-feedback-event-010
  - id: FeedbackEvent-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 反馈投递事件边界例
      en: Boundary feedback delivery event case
      ja: フィードバック配信イベントの境界例
    scenario_id: null
    descriptions:
      zh: fb-8 的文本可被多次投递，只有内容和有效期，没有一次发送时间。
      en: fb-8 content may be delivered repeatedly and has content and validity period but no one send time.
      ja: fb-8 内容は複数配信可能で内容と有効期間のみを持ち一回の送信時刻がありません。
    field_values: {}
    related_node_ids:
      - FeedbackEvent
    related_relation_ids: []
    expected_result:
      zh: 这是 Feedback，不是投递事件。
      en: This is Feedback, not a delivery event.
      ja: これは Feedback で配信イベントではありません。
    why_valid_or_invalid:
      zh: 持久内容缺少一次投递的时间、通道和结果。
      en: Persistent content lacks one delivery's time, channel, and result.
      ja: 持続内容には一回の配信時刻、経路、結果がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-feedback-event-011
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: FeedbackEvent-informs-FeedbackRouting
    predicate: informs
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 通知反馈路由
      en: informs feedback routing
      ja: フィードバック経路へ通知
    definitions:
      zh: FeedbackEvent 向 FeedbackRouting 提供一次待路由投递及其元数据；具体 Task、WorkerRole 或 Route 目标由路由决策选择，而不在事件上平铺多条 targets 边。
      en: FeedbackEvent supplies one pending delivery and metadata to FeedbackRouting; concrete Task, WorkerRole, or Route targets are selected by routing decisions rather than flattened as multiple event target edges.
      ja: FeedbackEvent は一回の待配信とメタデータを FeedbackRouting へ渡し、具体 Task、WorkerRole、Route はルーティング判断が選びイベントに複数 target 辺を平置きしません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_informs
      labels:
        zh: 反向：通知反馈路由
        en: "inverse: informs feedback routing"
        ja: 逆方向：フィードバック経路へ通知
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: FeedbackEvent-informs-FeedbackRouting-example-positive-manual-001
        kind: positive
        labels:
          zh: 通知反馈路由正例
          en: Positive case for informs feedback routing
          ja: フィードバック経路へ通知の正例
        scenario_id: null
        descriptions:
          zh: fe-91 被 routing-decision fr-18 接收，fr-18 根据 priority 与 recipient_role 选择 worker-3。
          en: fe-91 is consumed by routing decision fr-18, which selects worker-3 from priority and recipient_role.
          ja: fe-91 は routing decision fr-18 に渡され priority と recipient_role から worker-3 が選択されます。
        field_values: {}
        related_node_ids:
          - FeedbackEvent
          - FeedbackRouting
        related_relation_ids:
          - FeedbackEvent-informs-FeedbackRouting
        expected_result:
          zh: 应记录事件通知 FeedbackRouting。
          en: The event-to-routing information fact is recorded.
          ja: イベントが FeedbackRouting へ通知した事実を記録します。
        why_valid_or_invalid:
          zh: 路由输入明确包含事件 ID，目标由决策输出承担。
          en: Routing input contains event ID and the decision output owns target selection.
          ja: ルーティング入力が event ID を含み判断出力が対象選択を所有します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-feedback-event-012
      - id: FeedbackEvent-informs-FeedbackRouting-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 通知反馈路由边界例
          en: Boundary case for informs feedback routing
          ja: フィードバック経路へ通知の境界例
        scenario_id: null
        descriptions:
          zh: fe-92 已直接投递到固定监控队列，没有进入 FeedbackRouting。
          en: fe-92 is delivered directly to a fixed monitoring queue and never enters FeedbackRouting.
          ja: fe-92 は固定監視 queue へ直接配信され FeedbackRouting に入りません。
        field_values: {}
        related_node_ids:
          - FeedbackEvent
          - FeedbackRouting
        related_relation_ids:
          - FeedbackEvent-informs-FeedbackRouting
        expected_result:
          zh: 不得建立 informs-FeedbackRouting。
          en: No informs-FeedbackRouting fact is asserted.
          ja: informs-FeedbackRouting を主張しません。
        why_valid_or_invalid:
          zh: 直接投递与经过路由决策是不同路径。
          en: Direct delivery and routed delivery are distinct paths.
          ja: 直接配信とルーティング判断経由は別経路です。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-feedback-event-013
    source_claims:
      - claim-feedback-event-014
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:FeedbackRouting
  - id: FeedbackEvent-carries-Feedback
    predicate: carries
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 携带反馈内容
      en: carries feedback
      ja: フィードバックを運ぶ
    definitions:
      zh: FeedbackEvent 引用本次投递所携带的 Feedback 内容身份和版本；重试事件可携带同一反馈而保持不同 event_id。
      en: FeedbackEvent references the Feedback identity and version carried by this delivery; retry events may carry the same Feedback while retaining distinct event_ids.
      ja: FeedbackEvent は本配信が運ぶ Feedback ID と版を参照し、再試行イベントは同じ Feedback を運びつつ別 event_id を保持できます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_carries
      labels:
        zh: 反向：携带反馈内容
        en: "inverse: carries feedback"
        ja: 逆方向：フィードバックを運ぶ
    conditions:
      - id: FeedbackEvent-carries-Feedback-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the delivery event records the exact Feedback identity and version as its payload and the payload digest or immutable reference resolves to that Feedback; a timeout, route attempt, or same-recipient event without payload identity is insufficient.
        explanations:
          zh: 仅当投递事件把准确 Feedback 标识与版本记录为载荷，且载荷摘要或不可变引用可解析到该 Feedback 时成立；没有载荷身份的超时、路由尝试或同接收者事件不足以建立此边。
          en: Assert only when the delivery event records the exact Feedback identity and version as its payload and the payload digest or immutable reference resolves to that Feedback; a timeout, route attempt, or same-recipient event without payload identity is insufficient.
          ja: delivery event が正確な Feedback ID・版を payload として記録し、digest または immutable reference がその Feedback に解決するときだけ成立します。payload identity のない timeout・route attempt・同 recipient event では不十分です。
        source_claims:
          - claim-feedback-event-015
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: FeedbackEvent-carries-Feedback-example-positive-manual-001
        kind: positive
        labels:
          zh: 携带反馈内容正例
          en: Positive case for carries feedback
          ja: フィードバックを運ぶの正例
        scenario_id: null
        descriptions:
          zh: fe-91 的 payload_ref=fb-8@1，内容哈希与 Feedback 记录一致。
          en: fe-91 payload_ref is fb-8@1 and content hash matches the Feedback record.
          ja: fe-91 の payload_ref は fb-8@1 で content hash が Feedback 記録と一致します。
        field_values: {}
        related_node_ids:
          - FeedbackEvent
          - Feedback
        related_relation_ids:
          - FeedbackEvent-carries-Feedback
        expected_result:
          zh: 应记录 fe-91 携带 fb-8。
          en: fe-91 is linked as carrying fb-8.
          ja: fe-91 が fb-8 を運ぶと記録します。
        why_valid_or_invalid:
          zh: 投递负载明确引用反馈身份与版本。
          en: Delivery payload explicitly references Feedback identity and version.
          ja: 配信 payload が Feedback ID と版を明示参照します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-feedback-event-016
      - id: FeedbackEvent-carries-Feedback-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 携带反馈内容边界例
          en: Boundary case for carries feedback
          ja: フィードバックを運ぶの境界例
        scenario_id: null
        descriptions:
          zh: fe-92 只包含错误码 delivery_timeout，没有 payload_ref。
          en: fe-92 contains only delivery_timeout and no payload_ref.
          ja: fe-92 は delivery_timeout のみで payload_ref がありません。
        field_values: {}
        related_node_ids:
          - FeedbackEvent
          - Feedback
        related_relation_ids:
          - FeedbackEvent-carries-Feedback
        expected_result:
          zh: 不得推断 fe-92 携带 fb-8。
          en: fe-92 is not inferred to carry fb-8.
          ja: fe-92 が fb-8 を運ぶとは推論しません。
        why_valid_or_invalid:
          zh: 同一队列中的相邻事件不能替代明确内容引用。
          en: Adjacent events in one queue cannot replace an explicit content reference.
          ja: 同一 queue の隣接イベントは明示内容参照の代用になりません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-feedback-event-017
    source_claims:
      - claim-feedback-event-018
    distinct_fact_rationale:
      zh: carries 固定一次投递事件的内容身份与版本；informs 只说明事件向 FeedbackRouting 提供路由信息；supports 连接 Finding 与 Feedback 的证据来源。载荷、路由输入与证据来源不可互换。
      en: carries fixes the content identity and version of one delivery event; informs only states that the event supplies routing information to FeedbackRouting; supports links a Finding to Feedback provenance. Payload, routing input, and evidence source are distinct facts.
      ja: carries は一 delivery event の content ID・版、informs は FeedbackRouting への routing 情報、supports は Finding から Feedback への evidence provenance を示し、相互代替できません。
    layout_role: cross-link
    review_status: accepted
    target: concept:Feedback
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-feedback-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 CI/CD 代码审查、回滚/恢复与结构化反馈模式逐项核验。
    en: Verified against CI/CD code review, rollback/recovery, and structured feedback patterns.
    ja: CI/CD コードレビュー、ロールバック/復旧、構造化フィードバックに照らし確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-feedback-event-001
    source: eng-ont-prov-o
    supports: PROV-O separates instantaneous events and activity lifetimes from persistent Entities; Moonweave uses a delivery event distinct from Feedback content.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-feedback-event-002
    source: eng-ont-prov-o
    supports: PROV-O distinguishes occurrences from persistent Entities but does not define a feedback-delivery identifier. FeedbackEvent.feedback_event_id is Moonweave's identity for one delivery occurrence.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, Agent, and qualified influence
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-feedback-event-003
    source: eng-ont-prov-o
    supports: PROV-O permits an occurrence to use or communicate an Entity while keeping the Entity distinct. FeedbackEvent.feedback_ref directly uses that separation for the carried Feedback version.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and wasInformedBy
    evidence_kind: design-inference
