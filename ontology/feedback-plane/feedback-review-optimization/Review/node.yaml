schema: moonweave.ai/ontology-node/v1
id: Review
kind: concept
status: accepted
labels:
  zh: 审查记录
  en: review record
  ja: 審査記録
semantics:
  short_definition:
    zh: 审查记录是一次审查活动生成的持久结论载体及其发现集合。
    en: A review record is the persistent conclusion carrier and finding set generated by one review activity.
    ja: 審査記録は一回の審査活動が生成する持続的結論媒体と所見集合です。
  definition:
    zh: 审查记录是一种持久信息实体；其身份由 review_id、被审对象版本、生成它的 ReviewActivity、审查状态和 ReviewFinding 成员集合确定，区别于发生的活动和单个发现。
    en: A review record is a persistent information entity identified by review_id, reviewed subject version, generating ReviewActivity, review status, and its ReviewFinding membership, unlike the occurring activity or one finding.
    ja: 審査記録は review_id、対象版、生成 ReviewActivity、審査状態、ReviewFinding 所属集合で同一性が決まる持続情報实体で、発生活動や個別所見と異なります。
  why_needed:
    zh: 持久 Review 使活动结束后仍可查询完整发现集合、签署状态和对象版本。
    en: A persistent Review keeps the finding set, sign-off state, and subject version queryable after activity completion.
    ja: 持続 Review により活動終了後も所見集合、署名状態、対象版を照会できます。
  includes:
    - zh: 包括已完成、草稿或驳回状态的审查记录及其发现目录。
      en: Includes completed, draft, or rejected review records and their finding indexes.
      ja: 完了、草稿、拒否状態の審査記録と所見索引を含みます。
  excludes:
    - zh: 不包括执行审查的 ReviewActivity，也不包括脱离记录的 Feedback 通知。
      en: Excludes the ReviewActivity performing examination and a Feedback notification detached from the record.
      ja: 審査を行う ReviewActivity と記録から独立した Feedback 通知は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - review_id
  fields:
    - id: review_id
      labels:
        zh: 审核记录标识
        en: review ID
        ja: レビュー ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一项审核活动产生的审核记录。
        en: Stable identifier for the review record produced by one review activity.
        ja: 一つのレビュー活動が生成したレビュー記録を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: review-artifact-001
      source_claims:
        - claim-review-002
        - claim-review-003
    - id: subject_version
      labels:
        zh: 被审版本
        en: subject version
        ja: 対象バージョン
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定本次审核所针对对象的不可变版本。
        en: Pins the immutable subject version examined by the review.
        ja: このレビューが検査した不変対象バージョンを固定します。
      allowed_values: []
      pattern: null
      example_value: artifact-report-001@3
      source_claims:
        - claim-review-004
        - claim-review-005
    - id: status
      labels:
        zh: 审核状态
        en: review status
        ja: レビュー状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 审核记录的活动、完成、撤回或替代状态。
        en: Active, completed, withdrawn, or superseded state of the review record.
        ja: レビュー記録の active、completed、withdrawn、superseded 状態です。
      allowed_values: []
      pattern: null
      example_value: completed
      source_claims:
        - claim-review-006
        - claim-review-007
    - id: completed_at
      labels:
        zh: 完成时间
        en: completed at
        ja: 完了時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 审核完成的 UTC 时间；活动审核为空。
        en: UTC instant at which review completed; null while active.
        ja: レビュー完了の UTC 時刻で、実行中は空です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-13T05:05:00.000Z
      source_claims:
        - claim-review-008
        - claim-review-009
  constraints:
    - id: review-subject-version-fixed
      severity: error
      expression_language: plain
      expression: findings and corrections refer to the same immutable subject_version reviewed
      explanations:
        zh: 发现和纠正必须指向本次审核固定的同一被审版本。
        en: Findings and corrections refer to the same immutable subject_version reviewed.
        ja: 所見と修正はレビュー対象として固定された同じ不変 subject_version を参照します。
      source_claims:
        - claim-review-010
        - claim-review-011
  required_relation_constraints:
    - id: review-contains-finding
      direction: outgoing
      predicate: contains_finding
      target_concept_id: ReviewFinding
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 完成的审核至少包含一项明确发现。
        en: A completed review contains at least one explicit finding.
        ja: 完了したレビューには少なくとも一つの明示的な所見が含まれます。
      source_claims:
        - claim-review-012
        - claim-review-013
examples:
  - id: Review-example-positive-manual-001
    kind: positive
    labels:
      zh: 审查记录正例
      en: Positive review record case
      ja: 審査記録の正例
    scenario_id: null
    descriptions:
      zh: review r-42 指向 subject a-19@3、generated_by ra-42，包含 findings rf-1 与 rf-2，并记录签署状态。
      en: review r-42 points to subject a-19@3 and generated_by ra-42, contains findings rf-1 and rf-2, and records sign-off status.
      ja: review r-42 は subject a-19@3、generated_by ra-42、findings rf-1・rf-2、署名状態を記録します。
    field_values:
      review_id: r-42
      subject_version: a-19@3
      status: signed-off
    related_node_ids:
      - Review
    related_relation_ids: []
    expected_result:
      zh: 该对象是具有持久身份和发现集合的审查记录。
      en: The object is a review record with persistent identity and a finding set.
      ja: この対象は持続 ID と所見集合を持つ審査記録です。
    why_valid_or_invalid:
      zh: 持久身份、对象版本、生成活动和发现集合完整。
      en: Persistent identity, subject version, generating activity, and finding set are complete.
      ja: 持続 ID、対象版、生成活動、所見集合が完全です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-review-014
  - id: Review-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 审查记录边界例
      en: Boundary review record case
      ja: 審査記録の境界例
    scenario_id: null
    descriptions:
      zh: ra-42 的开始和结束时间说明一次审查发生，但不保存发现集合。
      en: ra-42 start and end times describe a review occurrence but store no finding set.
      ja: ra-42 の開始終了時刻は審査発生を示しますが所見集合を保存しません。
    field_values: {}
    related_node_ids:
      - Review
    related_relation_ids: []
    expected_result:
      zh: 该对象是 ReviewActivity，不是 Review。
      en: The object is a ReviewActivity, not a Review record.
      ja: これは ReviewActivity で Review ではありません。
    why_valid_or_invalid:
      zh: 活动身份与持久记录身份不可互换。
      en: Activity identity and persistent-record identity are not interchangeable.
      ja: 活動同一性と持続記録同一性は交換できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-review-015
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-feedback-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 CI/CD 代码审查、回滚/恢复与结构化反馈模式逐项核验。
    en: Verified against CI/CD code review, rollback/recovery, and structured feedback patterns.
    ja: CI/CD コードレビュー、ロールバック/復旧、構造化フィードバックに照らし確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-review-001
    source: eng-ont-prov-o
    supports: PROV-O distinguishes an Entity generated by an Activity and remaining available after that activity; Moonweave models Review as that persistent entity.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-review-002
    source: eng-fw-langsmith-docs
    supports: LangSmith human evaluation and annotation queues persist reviewer feedback against runs or experiment outputs. review_id is Moonweave's stable identity for one assembled review record; LangSmith supplies the review/feedback workflow but does not prescribe this ontology field.
    locator: Evaluation concepts > Evaluation techniques > Human; Human feedback collection > Annotation queues
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-003
    source: lit-mech-reflexion
    supports: Reflexion records verbal feedback from a trial in episodic memory so it can guide a later trial. That persistent trial-feedback boundary motivates a separately identifiable Review, while review_id and its exact identity rule remain Moonweave design decisions.
    locator: Sections 3–4 > Reflexion framework and episodic memory
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-004
    source: eng-fw-langsmith-docs
    supports: LangSmith experiments compare application configurations against versioned datasets and retain outputs and evaluator feedback for each example. subject_version is Moonweave's immutable pin that prevents a Review from silently spanning different subject states.
    locator: Evaluation concepts > Experiment; Dataset organization > Versions
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-005
    source: lit-mech-reflexion
    supports: Reflexion separates a trial, the feedback on that trial, and a subsequent trial informed by reflection. Moonweave records subject_version so findings remain attached to the exact reviewed trial output; the paper does not define this field.
    locator: Sections 3–4 > Reflexion framework and episodic memory
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-006
    source: eng-fw-langsmith-docs
    supports: LangSmith supports ongoing human annotation and completed evaluator feedback associated with runs and experiments. Moonweave normalizes the Review record lifecycle as active, completed, withdrawn, or superseded; LangSmith does not define this exact vocabulary.
    locator: Evaluation concepts > Evaluation techniques > Human; Human feedback collection > Annotation queues
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-007
    source: lit-mech-reflexion
    supports: Reflexion uses completed environmental or self-reflective feedback to affect a later trial. It supports distinguishing an available review from an in-progress one, while Moonweave's four Review status values are an operational design choice.
    locator: Sections 3–4 > Reflexion framework and episodic memory
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-008
    source: eng-fw-langsmith-docs
    supports: LangSmith review and evaluation workflows distinguish producing evaluator feedback from later analysis of results. completed_at is Moonweave's UTC completion marker for that review occurrence and remains null while active; the source does not prescribe the field.
    locator: Evaluation workflow > Define evaluators, run an experiment, and analyze results
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-009
    source: lit-mech-reflexion
    supports: A Reflexion feedback episode must be available before it can condition the next trial. completed_at makes that temporal boundary queryable in Moonweave; UTC encoding and null-while-active semantics are not assertions of the paper.
    locator: Sections 3–4 > Reflexion framework and episodic memory
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-010
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluation associates feedback with a specific run or experiment output and supports comparing application versions. Moonweave requires every finding and correction in one Review to refer to the same immutable subject_version so a correction cannot be credited against a different subject.
    locator: Evaluation concepts > Experiment; Evaluator inputs and outputs; Dataset versions
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-011
    source: lit-mech-reflexion
    supports: Reflexion binds feedback to the preceding trial before using it in a subsequent trial. Moonweave's fixed-subject-version constraint makes that trial binding explicit across findings and corrections; the paper does not define the ontology cardinality.
    locator: Sections 3–4 > Reflexion framework and episodic memory
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-012
    source: eng-fw-langsmith-docs
    supports: LangSmith human reviewers and evaluators produce feedback items, including scores, categorical values, and comments, for evaluated outputs. Moonweave assembles each atomic evidenced conclusion as a ReviewFinding contained by its Review; the composition relation is an ontology design inference.
    locator: Evaluation concepts > Evaluators > Evaluator outputs; Evaluation techniques > Human
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-013
    source: lit-mech-reflexion
    supports: Reflexion represents feedback about a trial as information that can be retained and acted on. Moonweave decomposes a Review into one or more individually evidenced ReviewFindings; the source motivates the feedback content but not the required composition relation.
    locator: Sections 3–4 > Reflexion framework and episodic memory
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-014
    source: eng-ont-prov-o
    supports: PROV-O generation links a persistent Entity to the Activity that produced it.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-review-015
    source: eng-ont-prov-o
    supports: PROV-O separates Activities from generated Entities.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: normative
    confidence: high
    review_status: accepted
