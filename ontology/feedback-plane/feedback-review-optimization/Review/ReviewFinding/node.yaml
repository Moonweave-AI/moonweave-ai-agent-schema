source_claims:
  - id: claim-review-finding-001
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluators return feedback with score and optional reasoning for individual runs; Moonweave separates each evidenced conclusion as ReviewFinding within a Review.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-finding-002
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluators return distinct feedback results but do not prescribe a cross-system finding identifier. ReviewFinding.finding_id is Moonweave's stable identity for one independently dispositionable conclusion.
    locator: Evaluation concepts > Evaluators and evaluator outputs
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-review-finding-003
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluation feedback is attached to a particular run, example, or application output. ReviewFinding.reviewed_subject_version_ref is Moonweave's version-exact binding to that evaluated subject.
