schema: moonweave.ai/ontology-node/v1
id: ReviewFinding
kind: concept
status: accepted
labels:
  zh: 审查发现
  en: review finding
  ja: 審査所見
semantics:
  short_definition:
    zh: 审查发现是审查记录中关于一个对象方面的原子结论及其证据。
    en: A review finding is an atomic, evidenced conclusion about one aspect of a reviewed subject.
    ja: 審査所見は対象の一側面に関する原子的な証拠付き結論です。
  definition:
    zh: 审查发现是一种隶属于 Review 的信息部件；其身份由 finding_id、对象或轨迹范围、判断、严重度、证据引用和判据版本共同确定，区别于面向接收者组织的 Feedback。
    en: A review finding is an information part of a Review identified by finding_id, artifact or trace scope, judgment, severity, evidence references, and criterion version, unlike Feedback organized for a recipient.
    ja: 審査所見は Review の情報部品で、finding_id、対象・軌跡範囲、判断、重大度、証拠参照、判定基準版で同一性が決まり、受信者向け Feedback と異なります。
  why_needed:
    zh: 原子发现允许逐条接受、驳回、路由和生成反馈，不必把整个审查记录当成单一结论。
    en: Atomic findings can be accepted, rejected, routed, and converted to feedback individually instead of treating the whole review as one conclusion.
    ja: 原子所見は審査全体を一結論とせず個別に受理、拒否、ルーティング、Feedback 化できます。
  includes:
    - zh: 包括一个具体违规、证据缺口、正确行为或质量缺陷的带出处结论。
      en: Includes an evidenced conclusion about one violation, evidence gap, correct behavior, or quality defect.
      ja: 一つの違反、証拠欠落、正しい行動、品質欠陥に関する出所付き結論を含みます。
  excludes:
    - zh: 不包括整份 Review、发送给工作者的 Feedback 或执行修复的 CorrectionActivity。
      en: Excludes the whole Review, Feedback delivered to a worker, and the CorrectionActivity executing a fix.
      ja: Review 全体、作業者へ送る Feedback、修正実行 CorrectionActivity は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - finding_id
  fields:
    - id: finding_id
      labels:
        zh: 审查发现标识
        en: review-finding ID
        ja: 審査 finding ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一条可独立采纳、驳回、转写或取代的原子审查结论。
        en: Stably identifies one atomic review conclusion that can be independently accepted, rejected, translated, or superseded.
        ja: 独立に accept・reject・translate・supersede できる一つの原子的審査結論を安定識別します。
      allowed_values: []
      pattern: null
      example_value: review-finding/rf-2
      source_claims:
        - claim-review-finding-002
    - id: reviewed_subject_version_ref
      labels:
        zh: 被审对象版本引用
        en: reviewed subject-version reference
        ja: 審査対象版参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该结论实际判断的 Artifact、轨迹或配置精确版本，禁止把发现外推到未审版本。
        en: References the exact Artifact, trace, or configuration version judged by the finding; the conclusion cannot be generalized to an unreviewed version.
        ja: finding が実際に判断した Artifact・trace・configuration の正確な版を参照し、未審査版へ結論を外挿しません。
      allowed_values: []
      pattern: null
      example_value: artifact/a-19@3
      source_claims:
        - claim-review-finding-003
    - id: finding_scope
      labels:
        zh: 发现范围
        en: finding scope
        ja: finding 範囲
      datatype: structured-value
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 定位结论适用的段落、字段、轨迹跨度、行为或判据方面，防止把局部发现当作整体验证结果。
        en: Locates the paragraph, field, trace span, behavior, or criterion aspect to which the conclusion applies, preventing a local finding from becoming a whole-subject verdict.
        ja: 結論が適用される paragraph・field・trace span・behavior・criterion aspect を特定し、局所 finding を対象全体の verdict にしません。
      allowed_values: []
      pattern: null
      example_value:
        path: answer.paragraph[3]
        aspect: internal-identifier-disclosure
      source_claims:
        - claim-review-finding-004
    - id: judgment
      labels:
        zh: 审查判断
        en: review judgment
        ja: 審査判断
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以可核验陈述记录该范围满足、违反或无法判定何项判据，不把后续行动指令混入判断。
        en: Records a verifiable statement that the scope satisfies, violates, or is indeterminate under a criterion, without mixing in downstream action instructions.
        ja: 範囲が criterion を満たす・違反する・判定不能かを検証可能な文で記録し、後続 action instruction を混在させません。
      allowed_values: []
      pattern: null
      example_value: The response exposes an internal identifier prohibited by the disclosure criterion.
      source_claims:
        - claim-review-finding-005
    - id: severity
      labels:
        zh: 发现严重度
        en: finding severity
        ja: finding 重大度
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在所引用判据版本的尺度上记录影响等级；严重度属于发现，不替代证据强度或置信度。
        en: Records impact level on the cited criterion version's scale; finding severity does not substitute for evidence strength or confidence.
        ja: 参照 criterion 版の尺度で impact level を記録し、finding severity で evidence strength・confidence を代替しません。
      allowed_values: []
      pattern: null
      example_value: high
      source_claims:
        - claim-review-finding-006
    - id: criterion_version_ref
      labels:
        zh: 判据版本引用
        en: criterion-version reference
        ja: 判定基準版参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际用于判断与严重度解释的 EvaluationCriterion、rubric 或策略精确版本。
        en: References the exact EvaluationCriterion, rubric, or policy version actually used for judgment and severity interpretation.
        ja: 判断と severity 解釈に実際に用いた EvaluationCriterion・rubric・policy の正確な版を参照します。
      allowed_values: []
      pattern: null
      example_value: policy-criterion/no-internal-id@4
      source_claims:
        - claim-review-finding-007
    - id: evidence_refs
      labels:
        zh: 证据引用
        en: evidence references
        ja: 証拠参照
      datatype: reference-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用直接支持判断的不可变内容片段、轨迹跨度、来源或测量；仅同属一次 Review 不足以成为证据。
        en: References immutable content spans, trace spans, sources, or measurements that directly support the judgment; membership in the same Review alone is insufficient evidence.
        ja: 判断を直接支える不変 content span・trace span・source・measurement を参照し、同一 Review 所属だけでは証拠になりません。
      allowed_values: []
      pattern: null
      example_value:
        - review-evidence/c-19@1#span-s-81
      source_claims:
        - claim-review-finding-008
  constraints:
    - id: review-finding-version-bound-and-evidence-complete
      severity: error
      expression_language: plain
      expression: one ReviewFinding makes one atomic judgment about one frozen subject scope under one criterion version and cites direct evidence; remediation instructions belong to Feedback, not judgment
      explanations:
        zh: 一条审查发现只对一个冻结对象范围按一个判据版本作原子判断并引用直接证据；修复指令属于 Feedback。
        en: One review finding makes one atomic judgment about one frozen subject scope under one criterion version and cites direct evidence; remediation instructions belong to Feedback.
        ja: 一つの ReviewFinding は一つの固定対象範囲を一つの criterion 版で原子的に判断し直接証拠を引用し、修正指示は Feedback に属します。
      source_claims:
        - claim-review-finding-009
  required_relation_constraints:
    - id: review-finding-contained-by-one-review
      direction: incoming
      predicate: contains_finding
      target_concept_id: Review
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每条审查发现必须属于一份生成它的 Review。
        en: Every review finding belongs to exactly one Review that produced it.
        ja: 各 ReviewFinding はそれを生成した一つの Review に属します。
      source_claims:
        - claim-review-finding-010
examples:
  - id: ReviewFinding-example-positive-manual-001
    kind: positive
    labels:
      zh: 审查发现正例
      en: Positive review finding case
      ja: 審査所見の正例
    scenario_id: null
    descriptions:
      zh: finding rf-2 指出 artifact a-19@3 泄露内部 ID，引用 span s-81 与 policy criterion pc-4，严重度 high。
      en: finding rf-2 states artifact a-19@3 exposes an internal ID, cites span s-81 and criterion pc-4, and has severity high.
      ja: finding rf-2 は artifact a-19@3 の内部 ID 漏洩を指摘し span s-81 と criterion pc-4 を引用し重大度 high です。
    field_values:
      finding_id: review-finding/rf-2
      reviewed_subject_version_ref: artifact/a-19@3
      finding_scope:
        path: answer.paragraph[3]
        aspect: internal-identifier-disclosure
      judgment: The response exposes an internal identifier prohibited by the disclosure criterion.
      severity: high
      criterion_version_ref: policy-criterion/no-internal-id@4
      evidence_refs:
        - review-evidence/c-19@1#span-s-81
    related_node_ids:
      - ReviewFinding
    related_relation_ids: []
    expected_result:
      zh: 该对象是可独立处理的 ReviewFinding。
      en: The object is an independently actionable ReviewFinding.
      ja: この対象は独立処理可能な ReviewFinding です。
    why_valid_or_invalid:
      zh: 对象范围、判断、证据、判据和严重度完整。
      en: Subject scope, judgment, evidence, criterion, and severity are complete.
      ja: 対象範囲、判断、証拠、判定基準、重大度が完全です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-review-finding-011
  - id: ReviewFinding-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 审查发现边界例
      en: Boundary review finding case
      ja: 審査所見の境界例
    scenario_id: null
    descriptions:
      zh: feedback fb-8 告诉 worker“删除内部 ID 并重新生成答案”，但没有保留判据与原始证据。
      en: feedback fb-8 tells a worker to remove the internal ID and regenerate the answer but does not retain criterion or original evidence.
      ja: feedback fb-8 は worker に内部 ID 削除と再生成を伝えますが判定基準や元証拠を保持しません。
    field_values: {}
    related_node_ids:
      - ReviewFinding
    related_relation_ids: []
    expected_result:
      zh: 这是面向行动的 Feedback，不是证据完整的 ReviewFinding。
      en: This is action-oriented Feedback, not an evidence-complete ReviewFinding.
      ja: これは行動向け Feedback で証拠完全な ReviewFinding ではありません。
    why_valid_or_invalid:
      zh: 接收者指令与原子审查结论具有不同身份。
      en: A recipient instruction and an atomic review conclusion have different identities.
      ja: 受信者指示と原子審査結論は同一性が異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-review-finding-012
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: Review-contains_finding-ReviewFinding
  predicate: contains_finding
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 包含审查发现
    en: contains review finding
    ja: 審査所見を含む
  definitions:
    zh: Review 把具有独立 finding_id 的 ReviewFinding 纳入其结论集合；移除成员会改变该 Review 的结论内容。
    en: Review contains independently identified ReviewFindings in its conclusion set; removing a member changes the Review's conclusion content.
    ja: Review は独立 finding_id の ReviewFinding を結論集合に含み、成员除去は Review の結論内容を変えます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
    en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
    ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
  inverse_reading:
    predicate: inverse_of_contains_finding
    labels:
      zh: 反向：包含审查发现
      en: "inverse: contains review finding"
      ja: 逆方向：審査所見を含む
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: Review-contains_finding-ReviewFinding-example-positive-manual-001
      kind: positive
      labels:
        zh: 包含审查发现正例
        en: Positive case for contains review finding
        ja: 審査所見を含むの正例
      scenario_id: null
      descriptions:
        zh: review r-42 的 finding_ids 明确列出 rf-1 与 rf-2。
        en: review r-42 finding_ids explicitly list rf-1 and rf-2.
        ja: review r-42 の finding_ids は rf-1 と rf-2 を明示します。
      field_values: {}
      related_node_ids:
        - Review
        - ReviewFinding
      related_relation_ids:
        - Review-contains_finding-ReviewFinding
      expected_result:
        zh: 应建立 r-42 对两个发现的组成关系。
        en: Composition links from r-42 to both findings are present.
        ja: r-42 から両所見への構成関係を確立します。
      why_valid_or_invalid:
        zh: 成员清单与每个 finding.review_id 一致。
        en: Membership list agrees with each finding.review_id.
        ja: 成员一覧と各 finding.review_id が一致します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-review-finding-013
    - id: Review-contains_finding-ReviewFinding-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 包含审查发现边界例
        en: Boundary case for contains review finding
        ja: 審査所見を含むの境界例
      scenario_id: null
      descriptions:
        zh: feedback fb-8 引用 rf-2，但没有作为 r-42 的 finding 成员。
        en: feedback fb-8 cites rf-2 but is not a finding member of r-42.
        ja: feedback fb-8 は rf-2 を引用しますが r-42 の finding 成员ではありません。
      field_values: {}
      related_node_ids:
        - Review
        - ReviewFinding
      related_relation_ids:
        - Review-contains_finding-ReviewFinding
      expected_result:
        zh: 不得把 Feedback 作为 ReviewFinding 组成成员。
        en: Feedback is not a ReviewFinding composition member.
        ja: Feedback を ReviewFinding 構成成员にしません。
      why_valid_or_invalid:
        zh: 反馈是从发现转写的下游信息，不是发现本身。
        en: Feedback is downstream information translated from a finding, not the finding itself.
        ja: Feedback は所見から変換した下流情報で所見自体ではありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-review-finding-014
  source_claims:
    - claim-review-finding-015
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations:
  - id: ReviewFinding-supports-ReviewDerivedFeedback
    predicate: supports
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 支持审查派生反馈
      en: supports review-derived feedback
      ja: 審査派生 feedback を裏付ける
    definitions:
      zh: ReviewFinding supports ReviewDerivedFeedback 表示该派生反馈显式保留此 finding 的判断与证据引用，并将其转写为接收者可行动信息；主题相同或时间接近不足以建立此边。
      en: ReviewFinding supports ReviewDerivedFeedback means the derived feedback explicitly retains that finding's judgment and evidence reference and translates it into recipient-actionable information; shared topic or temporal proximity is insufficient.
      ja: ReviewFinding supports ReviewDerivedFeedback は derived feedback が finding の judgment と evidence reference を明示保持し recipient-actionable information へ転記することを示します。shared topic や temporal proximity だけでは成立しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_supports
      labels:
        zh: 反向：支持反馈内容
        en: "inverse: supports feedback content"
        ja: 逆方向：フィードバック内容を支持
    conditions:
      - id: ReviewFinding-supports-ReviewDerivedFeedback-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the ReviewDerivedFeedback record explicitly lists the ReviewFinding identity and the requested action is traceable to that finding's judgment and evidence; shared artifact, topic, or task membership alone is insufficient.
        explanations:
          zh: 仅当 ReviewDerivedFeedback 明确列出 ReviewFinding 标识，且所请求行动可追溯到该 finding 的判断与证据时成立；仅共享 artifact、主题或任务不足以建立此边。
          en: Assert only when the ReviewDerivedFeedback record explicitly lists the ReviewFinding identity and the requested action is traceable to that finding's judgment and evidence; shared artifact, topic, or task membership alone is insufficient.
          ja: ReviewDerivedFeedback が ReviewFinding ID を明示し、要求 action が finding の judgment と evidence に追跡できるときだけ成立する。artifact、topic、task の共有だけでは不十分である。
        source_claims:
          - claim-review-finding-016
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: ReviewFinding-supports-ReviewDerivedFeedback-example-positive-001
        kind: positive
        labels:
          zh: 支持反馈内容正例
          en: Positive case for supports feedback content
          ja: フィードバック内容を支持の正例
        scenario_id: null
        descriptions:
          zh: finding rf-2 的判据、严重度和证据引用被 rdf-8 保留，并转写为面向 worker-3 的修订要求。
          en: Review-derived feedback rdf-8 retains finding rf-2's criterion, severity, and evidence reference and translates them into a revision request for worker-3.
          ja: review-derived feedback rdf-8 は finding rf-2 の criterion・severity・evidence reference を保持し worker-3 向け revision request へ転記します。
        field_values: {}
        related_node_ids:
          - ReviewFinding
          - ReviewDerivedFeedback
        related_relation_ids:
          - ReviewFinding-supports-ReviewDerivedFeedback
        expected_result:
          zh: 建立 rf-2 supports rdf-8。
          en: Assert rf-2 supports rdf-8.
          ja: rf-2 supports rdf-8 を成立させます。
        why_valid_or_invalid:
          zh: 派生反馈显式保留来源 finding 与证据。
          en: The derived feedback explicitly retains its source finding and evidence.
          ja: derived feedback が source finding と evidence を明示保持します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-review-finding-017
      - id: ReviewFinding-supports-ReviewDerivedFeedback-example-boundary-001
        kind: boundary
        labels:
          zh: 支持反馈内容边界例
          en: Boundary case for supports feedback content
          ja: フィードバック内容を支持の境界例
        scenario_id: null
        descriptions:
          zh: 用户意见 fb-user-3 与 finding rf-2 讨论同一回答，但没有引用该 finding 或其证据。
          en: User comment fb-user-3 discusses the same answer as finding rf-2 but does not reference that finding or its evidence.
          ja: user comment fb-user-3 は finding rf-2 と同じ回答を扱いますが finding/evidence を参照しません。
        field_values: {}
        related_node_ids:
          - ReviewFinding
          - ReviewDerivedFeedback
        related_relation_ids:
          - ReviewFinding-supports-ReviewDerivedFeedback
        expected_result:
          zh: 不建立 supports 边。
          en: Assert no supports edge.
          ja: supports edge を成立させません。
        why_valid_or_invalid:
          zh: 两条记录只讨论同一回答，没有共享 finding 标识、判据或证据引用，因此无法证明该用户意见由 rf-2 派生。
          en: The records concern the same answer but share no finding identity, criterion, or evidence reference, so the user comment cannot be shown to derive from rf-2.
          ja: 両記録は同じ回答を扱うだけで finding ID・判定基準・証拠参照を共有せず、user comment が rf-2 から派生したとは証明できません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-review-finding-018
    source_claims:
      - claim-review-finding-019
    distinct_fact_rationale:
      zh: is_a 表达派生反馈的种属；supports 标识具体来源 finding；carries 标识投递事件携带的反馈版本，三者不可替代。
      en: is_a states the derived-feedback genus, supports identifies a particular source finding, and carries identifies the feedback version delivered by an event; the three facts are not interchangeable.
      ja: is_a は derived-feedback genus、supports は特定 source finding、carries は event が配送する feedback version を示し、三 fact は相互代替できません。
    layout_role: cross-link
    review_status: accepted
    target: concept:ReviewDerivedFeedback
  - id: ReviewFinding-about-Artifact
    predicate: about
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 关于产物
      en: about artifact
      ja: 成果物について
    definitions:
