          en: Record rp-5 addresses upstream-timeout-v2.
          ja: rp-5 addresses upstream-timeout-v2 を記録します。
        why_valid_or_invalid:
          zh: 计划版本、故障模式和处置条件明确绑定。
          en: Plan version, failure mode, and disposition conditions are explicitly bound.
          ja: plan 版、failure mode、処置条件が明示的に結ばれます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-recovery-plan-017
      - id: RecoveryPlan-addresses-FailureMode-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 处置故障模式边界例
          en: Boundary case for addresses failure mode
          ja: 故障モードを処置の境界例
        scenario_id: null
        descriptions:
          zh: err-31 恰好匹配该模式，但 rp-5 未被选择且恢复条件不满足。
          en: err-31 matches the mode, but rp-5 is not selected and recovery preconditions fail.
          ja: err-31 は mode に一致しますが rp-5 は選択されず復旧前提も不成立です。
        field_values: {}
        related_node_ids:
          - RecoveryPlan
          - FailureMode
        related_relation_ids:
          - RecoveryPlan-addresses-FailureMode
        expected_result:
