schema: moonweave.ai/ontology-node/v1
id: RecoveryPlan
kind: concept
status: review
labels:
  zh: 恢复计划
  en: recovery plan
  ja: 復旧計画
semantics:
  short_definition:
    zh: 恢复计划是针对故障类别规定触发条件、恢复步骤与成功验证的可版本化规范。
    en: A recovery plan is a versioned specification of triggers, recovery steps, and success validation for failure classes.
    ja: 復旧計画は故障分類に対する起動条件、復旧手順、成功検証を定める版管理仕様です。
  definition:
    zh: 恢复计划是一种规范；其身份由适用 FailureMode、重试耗尽条件、RecoveryAction 序列、状态前置条件、验证和升级路径共同确定，不是某次已经执行的恢复。
    en: A recovery plan is a specification identified by applicable FailureModes, retry-exhaustion condition, RecoveryAction sequence, state preconditions, validation, and escalation path; it is not an executed recovery occurrence.
    ja: 復旧計画は適用 FailureMode、再試行枯渇条件、RecoveryAction 列、状態前提、検証、エスカレーション経路で同一性が決まる仕様で、実行済み復旧ではありません。
  why_needed:
    zh: 计划使错误处理在执行前可审查，并明确重试、恢复与升级之间的顺序。
    en: A plan makes error handling reviewable before execution and states ordering among retry, recovery, and escalation.
    ja: 計画によりエラー処理を実行前審査でき、再試行、復旧、昇格の順序を明示します。
  includes:
    - zh: 包括备用服务切换、检查点恢复、补偿事务和人工升级的条件化步骤。
      en: Includes conditional steps for failover, checkpoint restoration, compensating transactions, and human escalation.
      ja: フェイルオーバー、チェックポイント復元、補償取引、人手昇格の条件付き手順を含みます。
  excludes:
    - zh: 不包括运行时 ErrorEvent、实际 RecoveryAction 或仅规定自动重试的 RetryPolicy。
      en: Excludes runtime ErrorEvent, executed RecoveryAction, and RetryPolicy that only governs automatic retries.
      ja: 実行時 ErrorEvent、実行 RecoveryAction、自動再試行のみの RetryPolicy は含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - recovery_plan_id
    - version
  fields:
    - id: recovery_plan_id
      labels:
        zh: 恢复计划标识
        en: recovery-plan ID
        ja: 復旧計画 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一条可独立版本化、选择、停用或替换的恢复策略谱系。
        en: Stably identifies one recovery-strategy lineage that can be independently versioned, selected, retired, or replaced.
        ja: 独立に版管理・選択・廃止・置換できる一つの復旧戦略系列を安定識別します。
      allowed_values: []
      pattern: null
      example_value: recovery-plan/search-upstream-timeout
      source_claims:
        - claim-recovery-plan-002
    - id: version
      labels:
        zh: 计划版本
        en: plan version
        ja: 計画版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识故障匹配、耗尽条件、动作顺序、验证或升级语义的一次不可变修订。
        en: Identifies one immutable revision of failure matching, exhaustion condition, action order, validation, or escalation semantics.
        ja: failure matching・exhaustion condition・action order・validation・escalation semantics の不変な一改訂を識別します。
      allowed_values: []
      pattern: null
      example_value: "5"
      source_claims:
        - claim-recovery-plan-003
    - id: failure_mode_refs
      labels:
        zh: 适用故障模式引用
        en: applicable failure-mode references
        ja: 適用 failure mode 参照
      datatype: reference-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出该版本明确处置的 FailureMode 版本；仅观察到一次 ErrorEvent 不会自动建立适用性。
        en: Lists the FailureMode versions explicitly addressed by this plan; observing one ErrorEvent does not automatically establish applicability.
        ja: この版が明示的に扱う FailureMode 版を列挙し、一回の ErrorEvent 観測だけで適用性を成立させません。
      allowed_values: []
      pattern: null
      example_value:
        - failure-mode/upstream-timeout@2
      source_claims:
        - claim-recovery-plan-004
    - id: retry_exhaustion_condition
      labels:
        zh: 重试耗尽条件
        en: retry-exhaustion condition
        ja: 再試行枯渇条件
      datatype: expression
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 精确声明何时停止重试并进入恢复步骤，覆盖尝试次数、超时、错误分类或预算边界。
        en: Precisely declares when retries stop and recovery steps become eligible, covering attempt count, timeout, error class, or budget boundaries.
        ja: 試行数・timeout・error class・budget boundary を含め、再試行を止め復旧 step へ移れる条件を正確に宣言します。
      allowed_values: []
      pattern: null
      example_value: attempt_count >= 3 OR elapsed_ms >= 10000
      source_claims:
        - claim-recovery-plan-005
    - id: recovery_steps
      labels:
        zh: 有序恢复步骤
        en: ordered recovery steps
        ja: 順序付き復旧 step
      datatype: structured-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 按执行顺序列出动作引用、动作前置条件、失败转移和幂等要求；这些是计划内容而非执行记录。
        en: Lists action references, step preconditions, failure transitions, and idempotency requirements in execution order; these are plan contents, not execution records.
        ja: action reference・step precondition・failure transition・idempotency requirement を実行順に列挙し、実行記録ではなく計画内容とします。
      allowed_values: []
      pattern: null
      example_value:
        - order: 1
          action_ref: recovery-action/failover-search
          on_failure: escalate
        - order: 2
          action_ref: recovery-action/rebuild-checkpoint
          on_failure: rollback
      source_claims:
        - claim-recovery-plan-006
    - id: state_preconditions
      labels:
        zh: 状态前置条件
        en: state preconditions
        ja: 状態前提条件
      datatype: structured-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 声明执行恢复前必须成立的检查点完整性、租约、权限和副作用状态，防止在未知状态下盲目补偿。
        en: Declares checkpoint integrity, lease, permission, and side-effect states that must hold before recovery, preventing blind compensation from an unknown state.
        ja: 復旧前に成立すべき checkpoint integrity・lease・permission・side-effect state を宣言し、不明状態からの盲目的補償を防ぎます。
      allowed_values: []
      pattern: null
      example_value:
        - check: checkpoint/search-run-41 exists
          required: true
        - check: failover lease acquired
          required: true
      source_claims:
        - claim-recovery-plan-007
    - id: validation_condition
      labels:
        zh: 恢复验证条件
        en: recovery validation condition
        ja: 復旧検証条件
      datatype: expression
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明哪些可观测状态足以判定服务恢复，并把动作完成与恢复成功明确分开。
        en: Declares which observable state is sufficient to establish recovery, explicitly separating action completion from successful recovery.
        ja: どの observable state で復旧成立と判定するか宣言し、action completion と recovery success を分離します。
      allowed_values: []
      pattern: null
      example_value: backup_health == 'ready' AND checkpoint_replay == 'passed'
      source_claims:
        - claim-recovery-plan-008
    - id: escalation_path_ref
      labels:
        zh: 升级路径引用
        en: escalation-path reference
        ja: escalation path 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用恢复不可执行或验证失败时接管责任的路由、人工值守或安全停止程序。
        en: References the routing, human on-call, or safe-stop procedure that assumes responsibility when recovery is inapplicable or validation fails.
        ja: 復旧不能または検証失敗時に責任を引き継ぐ routing・human on-call・safe-stop procedure を参照します。
      allowed_values: []
      pattern: null
      example_value: escalation/on-call-search-platform@3
      source_claims:
        - claim-recovery-plan-009
  constraints:
    - id: recovery-plan-version-freezes-applicability-and-order
      severity: error
      expression_language: plain
      expression: one RecoveryPlan version freezes failure-mode applicability, retry-exhaustion condition, ordered recovery steps, preconditions, validation, and escalation; execution creates CorrectionActivity records rather than mutating the plan
      explanations:
        zh: 一个恢复计划版本冻结适用故障、耗尽条件、步骤顺序、前置条件、验证与升级；执行产生纠正活动记录而不修改计划。
        en: One recovery-plan version freezes applicability, exhaustion, ordered steps, preconditions, validation, and escalation; execution creates correction-activity records without mutating the plan.
        ja: 一つの復旧計画版は適用故障・枯渇条件・順序付き step・前提・検証・escalation を固定し、実行は計画を変更せず修正活動記録を生成します。
      source_claims:
        - claim-recovery-plan-010
  required_relation_constraints: []
examples:
  - id: RecoveryPlan-example-positive-manual-001
    kind: positive
    labels:
      zh: 恢复计划正例
      en: Positive recovery plan case
      ja: 復旧計画の正例
    scenario_id: null
    descriptions:
      zh: recovery-plan rp-5 对 upstream_timeout 规定三次重试后切换备用端点、验证健康并在失败时升级。
      en: recovery-plan rp-5 specifies failover, health validation, and escalation after three retries for upstream_timeout.
      ja: recovery-plan rp-5 は upstream_timeout に三再試行後の切替、健全性検証、失敗時昇格を規定します。
    field_values:
      recovery_plan_id: recovery-plan/search-upstream-timeout
      version: "5"
      failure_mode_refs:
        - failure-mode/upstream-timeout@2
      retry_exhaustion_condition: attempt_count >= 3 OR elapsed_ms >= 10000
      recovery_steps:
        - order: 1
          action_ref: recovery-action/failover-search
          on_failure: escalate
        - order: 2
          action_ref: recovery-action/rebuild-checkpoint
          on_failure: rollback
      state_preconditions:
        - check: checkpoint/search-run-41 exists
          required: true
        - check: failover lease acquired
          required: true
      validation_condition: backup_health == 'ready' AND checkpoint_replay == 'passed'
      escalation_path_ref: escalation/on-call-search-platform@3
    related_node_ids:
      - RecoveryPlan
    related_relation_ids: []
    expected_result:
      zh: 该对象是 RecoveryPlan。
      en: The object is a RecoveryPlan.
      ja: この対象は RecoveryPlan です。
    why_valid_or_invalid:
      zh: 适用故障、触发顺序、动作、验证和升级均版本化。
      en: Applicable failure, trigger order, actions, validation, and escalation are versioned.
      ja: 適用故障、起動順序、活動、検証、昇格が版管理されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-recovery-plan-011
  - id: RecoveryPlan-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 恢复计划边界例
      en: Boundary recovery plan case
      ja: 復旧計画の境界例
    scenario_id: null
    descriptions:
      zh: recovery rec-7 已在 14:33 实际切换端点并记录结果。
      en: recovery rec-7 actually switches endpoints at 14:33 and records outcome.
      ja: recovery rec-7 は 14:33 に実際に端点を切替え結果を記録します。
    field_values: {}
    related_node_ids:
      - RecoveryPlan
    related_relation_ids: []
    expected_result:
      zh: 这是 RecoveryAction，不是 RecoveryPlan。
      en: This is a RecoveryAction, not a RecoveryPlan.
      ja: これは RecoveryAction で RecoveryPlan ではありません。
    why_valid_or_invalid:
      zh: 发生记录有实际时间和结果，计划描述可重复条件与步骤。
      en: An occurrence has actual time and outcome; a plan describes reusable conditions and steps.
      ja: 発生記録は実時刻と結果を持ち、計画は再利用条件と手順を記述します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-recovery-plan-012
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: RecoveryPlan-specifies-RecoveryAction
    predicate: specifies
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 规定恢复活动
      en: specifies recovery activity
      ja: 復旧活動を規定
    definitions:
      zh: RecoveryPlan 规定在匹配故障与状态条件下可实例化的 RecoveryAction 步骤、顺序与验证；一次活动引用计划版本实现该步骤。
      en: RecoveryPlan specifies RecoveryAction steps, order, and validation instantiable under matching failure and state conditions; an action realizes a referenced plan version.
      ja: RecoveryPlan は適合故障・状態条件下で実体化する RecoveryAction 手順、順序、検証を規定し活動は参照計画版を実現します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_specifies
      labels:
        zh: 反向：规定恢复活动
        en: "inverse: specifies recovery activity"
        ja: 逆方向：復旧活動を規定
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RecoveryPlan-specifies-RecoveryAction-example-positive-manual-001
        kind: positive
        labels:
          zh: 规定恢复活动正例
          en: Positive case for specifies recovery activity
          ja: 復旧活動を規定の正例
        scenario_id: null
        descriptions:
          zh: rp-5 step 2 规定 failover action，rec-7.plan_ref=rp-5@2 且执行同一步骤。
          en: rp-5 step 2 specifies failover and rec-7.plan_ref=rp-5@2 executes that step.
          ja: rp-5 step 2 は failover を規定し rec-7.plan_ref=rp-5@2 が実行します。
        field_values: {}
        related_node_ids:
          - RecoveryPlan
          - RecoveryAction
        related_relation_ids:
          - RecoveryPlan-specifies-RecoveryAction
        expected_result:
          zh: 应记录 rp-5 规定 rec-7。
          en: rp-5 is linked as specifying rec-7.
          ja: rp-5 が rec-7 を規定すると記録します。
        why_valid_or_invalid:
          zh: 活动引用精确计划版本并满足触发条件。
          en: The action references the exact plan version and satisfies trigger conditions.
          ja: 活動が正確な計画版を参照し起動条件を満たします。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-recovery-plan-013
      - id: RecoveryPlan-specifies-RecoveryAction-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 规定恢复活动边界例
          en: Boundary case for specifies recovery activity
          ja: 復旧活動を規定の境界例
        scenario_id: null
        descriptions:
          zh: rec-9 由人工临时处置且没有 rp-5 引用，步骤也不同。
          en: rec-9 is an ad hoc manual action with no rp-5 reference and different steps.
          ja: rec-9 は rp-5 参照なしの臨時人手活動で手順も異なります。
        field_values: {}
        related_node_ids:
          - RecoveryPlan
          - RecoveryAction
        related_relation_ids:
          - RecoveryPlan-specifies-RecoveryAction
        expected_result:
          zh: 不得声称 rp-5 规定 rec-9。
          en: rp-5 is not asserted to specify rec-9.
          ja: rp-5 が rec-9 を規定したとは主張しません。
        why_valid_or_invalid:
          zh: 相同故障类型不足以证明活动实现某一计划。
          en: Same failure type does not prove realization of one plan.
          ja: 同じ故障型だけでは特定計画実現を証明しません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-recovery-plan-014
    source_claims:
      - claim-recovery-plan-015
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: pending
    target: concept:RecoveryAction
  - id: RecoveryPlan-addresses-FailureMode
    predicate: addresses
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 处置故障模式
      en: addresses failure mode
      ja: 故障モードを処置
    definitions:
      zh: RecoveryPlan 声明其适用的 FailureMode、前置状态、恢复步骤与验证条件；计划面向可复用分类，不由一次 ErrorEvent 自动触发。
      en: RecoveryPlan declares the FailureMode, pre-state, recovery steps, and validation conditions it addresses; the plan targets a reusable class and is not automatically triggered by one ErrorEvent.
      ja: RecoveryPlan は対象 FailureMode、前状態、復旧手順、検証条件を宣言し、再利用分類を対象として一 ErrorEvent だけで自動起動されません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
