        en: "inverse: addresses failure mode"
        ja: 逆方向：故障モードを処置
    conditions:
      - id: RecoveryPlan-addresses-FailureMode-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the versioned RecoveryPlan explicitly names the FailureMode or a reviewed matcher for it and declares applicable preconditions, recovery steps, and validation criteria; an observed ErrorEvent or retryable label alone is insufficient.
        explanations:
          zh: 仅当带版本的 RecoveryPlan 明确引用 FailureMode 或经审查的匹配器，并声明适用前置条件、恢复步骤与验证标准时成立；仅观察到 ErrorEvent 或标注 retryable 不足以断言该边。
          en: Assert only when the versioned RecoveryPlan explicitly names the FailureMode or a reviewed matcher for it and declares applicable preconditions, recovery steps, and validation criteria; an observed ErrorEvent or retryable label alone is insufficient.
          ja: 版付き RecoveryPlan が FailureMode または審査済み matcher を明示し、適用前提・復旧手順・検証基準を宣言するときだけ成立し、ErrorEvent の観測や retryable label だけではこの辺を主張できません。
        source_claims:
          - claim-recovery-plan-016
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RecoveryPlan-addresses-FailureMode-example-positive-manual-001
        kind: positive
        labels:
          zh: 处置故障模式正例
          en: Positive case for addresses failure mode
          ja: 故障モードを処置の正例
