schema: moonweave.ai/ontology-node/v1
id: HumanReview
kind: concept
status: accepted
labels:
  zh: 人工审查活动
  en: human review activity
  ja: 人手審査活動
semantics:
  short_definition:
    zh: 人工审查活动是由自然人承担最终判断责任的审查活动。
    en: A human review activity is a ReviewActivity whose final judgment responsibility is borne by a person.
    ja: 人手審査活動は最終判断責任を人が負う ReviewActivity です。
  definition:
    zh: 人工审查活动是 ReviewActivity 的子类；它要求可识别的人类审查者实际检查证据并承担结论责任，即使模型提供了建议，也不同于完全自动审查。
    en: A human review activity is a ReviewActivity subtype requiring an identifiable person to inspect evidence and bear responsibility for conclusions, even when a model supplies recommendations, unlike fully automated review.
    ja: 人手審査活動は識別可能な人が証拠を検査し結論責任を負う ReviewActivity 下位型で、モデル助言があっても完全自動審査と異なります。
  why_needed:
    zh: 明确人的实际参与与责任，可验证人工在环要求而不是把按钮点击误当审查。
    en: Explicit participation and responsibility make human-in-the-loop requirements verifiable rather than treating a button click as review.
    ja: 人の実参加と責任を明示し、ボタン操作を審査と誤認せず human-in-the-loop 要件を検証できます。
  includes:
    - zh: 包括专家阅读轨迹、复核证据并签署或驳回结论的活动。
      en: Includes experts reading traces, checking evidence, and signing or rejecting conclusions.
      ja: 専門家が軌跡を読み証拠を確認し結論を署名・拒否する活動を含みます。
  excludes:
    - zh: 不包括只接收通知而未检查证据的人，也不包括完全由规则执行的 AutomatedReview。
      en: Excludes a person who only receives notification without examining evidence and a fully rule-executed AutomatedReview.
      ja: 証拠を見ず通知だけ受ける人と規則のみの AutomatedReview は含みません。
  semantic_kind: activity
  aliases: []
