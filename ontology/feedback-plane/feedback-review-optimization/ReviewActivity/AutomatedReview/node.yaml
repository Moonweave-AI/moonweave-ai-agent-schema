schema: moonweave.ai/ontology-node/v1
id: AutomatedReview
kind: concept
status: accepted
labels:
  zh: 自动审查活动
  en: automated review activity
  ja: 自動審査活動
semantics:
  short_definition:
    zh: 自动审查活动是由可版本化规则、程序或模型评审器执行的审查活动。
    en: An automated review activity is a ReviewActivity executed by a versioned rule, program, or model evaluator.
    ja: 自動審査活動は版管理された規則、プログラム、モデル評価器が実行する ReviewActivity です。
  definition:
    zh: 自动审查活动是 ReviewActivity 的子类；它绑定可重放的评审器版本、配置和输入证据自动生成 Review，不要求人类逐项检查，但仍须区分执行器与生成的结论。
    en: An automated review activity is a ReviewActivity subtype binding replayable evaluator version, configuration, and input evidence to generate a Review without item-by-item human inspection while keeping executor distinct from conclusions.
    ja: 自動審査活動は再生可能な評価器版、構成、入力証拠を結び Review を自動生成する ReviewActivity 下位型で、人の逐項検査を要せず実行器と結論を分離します。
  why_needed:
    zh: 记录评审器版本与配置能复现自动结论，并避免把模型名称直接当 ReviewFinding。
    en: Recording evaluator version and configuration reproduces automated conclusions and prevents a model name from becoming a ReviewFinding.
    ja: 評価器版と構成を記録して自動結論を再現しモデル名を ReviewFinding と誤認しません。
  includes:
    - zh: 包括代码规则检查、LLM-as-judge 评审和策略验证器审查活动。
      en: Includes code-rule checks, LLM-as-judge reviews, and policy-validator review activities.
      ja: コード規則検査、LLM-as-judge 審査、方針検証器審査活動を含みます。
  excludes:
    - zh: 不包括没有实际执行记录的评审器规范，也不包括人类承担最终判断的 HumanReview。
      en: Excludes an evaluator specification without an execution record and HumanReview with human final responsibility.
      ja: 実行記録のない評価器仕様と人が最終責任を負う HumanReview は含みません。
  semantic_kind: activity
  aliases: []
