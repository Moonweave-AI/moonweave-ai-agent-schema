      ja: この活動は AutomatedReview です。
    why_valid_or_invalid:
      zh: 执行器、版本、配置、输入和输出均可重放。
      en: Executor, version, configuration, input, and output are replayable.
      ja: 実行器、版、構成、入力、出力を再生できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
