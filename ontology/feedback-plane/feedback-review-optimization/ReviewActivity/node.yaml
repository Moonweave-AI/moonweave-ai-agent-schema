source_claims:
  - id: claim-review-activity-001
    source: eng-ont-prov-o
    supports: PROV-O distinguishes an Activity occurring over time from Entities it uses and generates; Moonweave applies that distinction to review occurrence and review record.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-review-activity-002
    source: eng-ont-prov-o
    supports: PROV-O defines Activity as something that occurs over a period of time and acts upon or with Entities, but it does not define a review identity. ReviewActivity.review_activity_id is Moonweave's occurrence key.
    locator: PROV-O Recommendation §3.1 > Activity, Entity, used, and generated
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-review-activity-003
    source: eng-ont-prov-o
    supports: PROV-O represents an Activity using a particular Entity. ReviewActivity.subject_version_ref is Moonweave's version-exact specialization of that used-Entity provenance.
    locator: PROV-O Recommendation §3.1 > used and Entity
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-review-activity-004
    source: eng-ont-prov-o
    supports: PROV-O associates an Activity with responsible Agents. ReviewActivity.reviewer_refs directly uses that provenance pattern while allowing multiple accountable reviewers.
    locator: PROV-O Recommendation §3.1 > Agent and wasAssociatedWith
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-review-activity-005
    source: eng-ont-prov-o
    supports: PROV-O supports qualified provenance but does not define review scope. ReviewActivity.review_scope is Moonweave's explicit validity boundary over what the activity examined.
    locator: PROV-O Recommendation §3.2 > qualified relations and influence
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-review-activity-006
    source: eng-ont-prov-o
    supports: PROV-O permits an Activity to use a plan through qualified association, while the rubric semantics remain domain-specific. ReviewActivity.review_method is Moonweave's versioned method binding.
    locator: PROV-O Recommendation §4.3 > qualifiedAssociation and hadPlan
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-review-activity-007
    source: eng-ont-prov-o
    supports: PROV-O models Entities used by an Activity. ReviewActivity.evidence_refs records the exact evidence Entities used in this review rather than all evidence merely available to the system.
    locator: PROV-O Recommendation §3.1 > Activity used Entity
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-review-activity-008
    source: eng-ont-prov-o
    supports: PROV-O defines prov:startedAtTime for Activities. ReviewActivity.started_at directly uses that activity-lifecycle boundary.
    locator: PROV-O Recommendation §3.2 > startedAtTime
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-review-activity-009
    source: eng-ont-prov-o
    supports: PROV-O defines prov:endedAtTime for Activities. ReviewActivity.ended_at directly uses that boundary and remains absent until the review terminates.
    locator: PROV-O Recommendation §3.2 > endedAtTime
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-review-activity-010
    source: eng-ont-prov-o
    supports: PROV-O supplies activity lifecycle provenance but not a review outcome vocabulary. ReviewActivity.outcome is Moonweave's execution state and is deliberately separate from Review findings and judgments.
    locator: PROV-O Recommendation §3.1–§3.2 > Activity lifecycle and generated Entity
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-review-activity-011
    source: eng-ont-prov-o
    supports: PROV-O separates an Activity, Entities it uses, and Entities it generates. ReviewActivity-version-bound-evidence-and-lifecycle is Moonweave's reviewed specialization that prevents occurrence, evidence, and judgment records from collapsing into one node.
    locator: PROV-O Recommendation §3.1–§3.2 > Activity, used, generated, startedAtTime, and endedAtTime
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-review-activity-012
    source: eng-ont-prov-o
    supports: PROV-O defines Activity as occurring over time and using or generating Entities.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-review-activity-013
    source: eng-ont-prov-o
    supports: PROV-O separates Activities from generated persistent Entities.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-review-activity-014
    source: eng-fw-dspy-docs
    supports: DSPy candidates are evaluated under metrics before being selected or deployed.
    locator: Learn DSPy > Optimizers > metric-driven program optimization
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-activity-015
    source: eng-fw-dspy-docs
    supports: Optimization and evaluation are separable stages in metric-driven program improvement.
    locator: Learn DSPy > Optimizers > metric-driven program optimization
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-activity-016
    source: eng-fw-dspy-docs
    supports: Metric-driven optimization yields candidate programs that can be independently evaluated before adoption; Moonweave models that independent review explicitly.
    locator: Learn DSPy > Optimizers > metric-driven program optimization
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-activity-017
    source: eng-ont-prov-o
    supports: PROV-O defines generated Entities and their generating Activities.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-activity-018
    source: eng-ont-prov-o
    supports: PROV-O generation differs from derivation or citation.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-activity-019
    source: eng-ont-prov-o
    supports: PROV-O generation connects an Activity to the Entity it produces, grounding review-activity to review-record provenance.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-review-activity-020
    source: eng-ont-prov-o
    supports: PROV-O use relates an Activity to the Entity it acts upon; exact entity version preserves provenance.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-activity-021
    source: eng-ont-prov-o
    supports: PROV-O separates the Activity that uses an Entity from the Entity generated as its record.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-activity-022
    source: eng-ont-prov-o
    supports: PROV-O states that an Activity may use an Entity; Moonweave specializes use as examination of a versioned Artifact by ReviewActivity.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-review-activity-023
    source: eng-ont-prov-o
    supports: PROV-O generation applies to a generated Entity and therefore to specialized evidence artifacts.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-activity-024
    source: eng-ont-prov-o
    supports: PROV-O generation is tied to the actual generating Activity, not merely a related workflow stage.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-review-activity-025
    source: eng-ont-prov-o
    supports: PROV-O relates an Activity to generated Entities; Moonweave uses one superclass production relation for all review evidence artifacts.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: normative
    confidence: high
    review_status: accepted
