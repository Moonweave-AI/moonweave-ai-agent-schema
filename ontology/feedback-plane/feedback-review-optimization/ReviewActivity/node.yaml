schema: moonweave.ai/ontology-node/v1
id: ReviewActivity
kind: concept
status: accepted
labels:
  zh: 审查活动
  en: review activity
  ja: 審査活動
semantics:
  short_definition:
    zh: 审查活动是由明确审查者按范围和方法检查对象的一次有界活动。
    en: A review activity is one bounded examination of a subject by identified reviewers under a scope and method.
    ja: 審査活動は特定審査者が範囲と方法に従い対象を検査する一回の有界活動です。
  definition:
    zh: 审查活动是一种有开始、结束和活动身份的发生；它绑定审查者、被审对象版本、审查范围、方法和证据，并生成持久 Review 记录，区别于该记录本身或其 ReviewFinding。
    en: A review activity is an occurrence with start, end, and activity identity that binds reviewers, subject version, scope, method, and evidence and generates a persistent Review record, unlike that record or its ReviewFindings.
    ja: 審査活動は開始・終了・活動 ID を持つ発生で、審査者、対象版、範囲、方法、証拠を結び持続的 Review 記録を生成し、その記録や ReviewFinding と異なります。
  why_needed:
    zh: 采用单一活动发生模型可消除 ReviewEvent 与 ReviewActivity 双轨，并清楚区分发生、记录和结论。
    en: A single occurrence model removes the ReviewEvent/ReviewActivity dual track and separates occurrence, record, and conclusion.
    ja: 単一活動発生モデルで ReviewEvent と ReviewActivity の二重化を除き、発生、記録、結論を分離します。
  includes:
    - zh: 包括人工复核、自动评估后复审、代码或轨迹审查活动。
      en: Includes human examination, post-evaluation automated review, and code or trace review activities.
      ja: 人手確認、自動評価後審査、コード・軌跡審査活動を含みます。
  excludes:
    - zh: 不包括持久 Review 文档、单个 ReviewFinding 或执行修改的 CorrectionActivity。
      en: Excludes the persistent Review document, an individual ReviewFinding, and a CorrectionActivity executing a change.
      ja: 持続 Review 文書、個別 ReviewFinding、変更実行 CorrectionActivity は含みません。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - review_activity_id
  fields:
    - id: review_activity_id
      labels:
        zh: 审查活动标识
        en: review-activity ID
        ja: 審査活動 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次有明确时间边界、参与者和输入版本的审查发生，不复用审查记录或发现标识。
        en: Stably identifies one review occurrence with explicit temporal bounds, participants, and input version; it does not reuse a review-record or finding ID.
        ja: 明示的な時間境界・参加者・入力版を持つ一回の審査発生を安定識別し、review record や finding の ID を再利用しません。
      allowed_values: []
      pattern: null
      example_value: review-activity/ra-42
      source_claims:
        - claim-review-activity-002
    - id: subject_version_ref
      labels:
        zh: 被审对象版本引用
        en: reviewed subject-version reference
        ja: 審査対象版参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次审查实际读取的 Artifact、OptimizationTarget 或运行记录精确版本，禁止只记录无版本名称。
        en: References the exact Artifact, OptimizationTarget, or run-record version actually read during the review; an unversioned name is insufficient.
        ja: 審査で実際に読んだ Artifact・OptimizationTarget・run record の正確な版を参照し、版なし名称だけでは不十分です。
      allowed_values: []
      pattern: null
      example_value: artifact/a-19@3
      source_claims:
        - claim-review-activity-003
    - id: reviewer_refs
      labels:
        zh: 审查者引用
        en: reviewer references
        ja: 審査者参照
      datatype: reference-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用实际执行或对结论负责的人、Agent 或评审器运行实例；角色名称本身不足以证明参与。
        en: References the people, agents, or evaluator-run instances that actually performed the review or owned its conclusions; a role name alone does not prove participation.
        ja: 審査を実行または結論に責任を持った person・agent・evaluator-run instance を参照し、role 名だけでは参加を証明しません。
      allowed_values: []
      pattern: null
      example_value:
        - person/reviewer-7
      source_claims:
        - claim-review-activity-004
    - id: review_scope
      labels:
        zh: 审查范围
        en: review scope
        ja: 審査範囲
      datatype: structured-value
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 冻结本次审查覆盖与明确排除的部分、时间窗或判据集合，防止把局部结论外推到整个对象。
        en: Freezes included and explicitly excluded portions, time windows, or criterion sets, preventing local conclusions from being generalized to the whole subject.
        ja: 審査に含む・明示除外する部分、時間窓、criterion set を固定し、局所結論を対象全体へ外挿しません。
      allowed_values: []
      pattern: null
      example_value:
        included:
          - answer.body
          - citations
        excluded:
          - latency
      source_claims:
        - claim-review-activity-005
    - id: review_method
      labels:
        zh: 审查方法
        en: review method
        ja: 審査方法
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次实际采用的版本化 rubric、评审器、协议或人工程序，使相同输入能够按同一方法复核。
        en: References the versioned rubric, evaluator, protocol, or human procedure actually used, allowing the same input to be checked under the same method.
        ja: 実際に用いた versioned rubric・evaluator・protocol・human procedure を参照し、同じ入力を同じ方法で再確認可能にします。
      allowed_values: []
      pattern: null
      example_value: rubric/safety@4
      source_claims:
        - claim-review-activity-006
    - id: evidence_refs
      labels:
        zh: 输入证据引用
        en: input-evidence references
        ja: 入力証拠参照
      datatype: reference-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用审查者实际检查的轨迹片段、来源、测量或产物内容；未读取的材料不得事后列入。
        en: References trace spans, sources, measurements, or artifact content actually inspected by reviewers; material not read cannot be added retrospectively.
        ja: reviewer が実際に検査した trace span・source・measurement・artifact content を参照し、未読資料を事後追加しません。
      allowed_values: []
      pattern: null
      example_value:
        - trace/t-8/span-19
        - source/citation-4
      source_claims:
        - claim-review-activity-007
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 审查者开始检查冻结对象版本的 UTC 时间。
        en: UTC instant when reviewers began examining the frozen subject version.
        ja: reviewer が固定対象版の検査を開始した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T14:00:00.000Z
      source_claims:
        - claim-review-activity-008
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: 終了時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 审查结束、失败或取消的 UTC 时间；进行中的审查可以为空。
        en: UTC instant when the review completed, failed, or was cancelled; absent for an in-progress review.
        ja: 審査の完了・失敗・取消時の UTC 時刻で、進行中は省略できます。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T14:18:00.000Z
      source_claims:
        - claim-review-activity-009
    - id: outcome
      labels:
        zh: 审查活动结果
        en: review-activity outcome
        ja: 審査活動結果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录活动进行中、已完成、失败或取消；它描述执行状态，不等同于审查对对象作出的通过或不通过结论。
        en: Records in-progress, completed, failed, or cancelled execution state; it is not the review's pass/fail judgment about the subject.
        ja: 進行中・完了・失敗・取消の実行状態を記録し、対象への pass/fail judgment とは異なります。
      allowed_values: []
      pattern: null
      example_value: completed
      source_claims:
        - claim-review-activity-010
  constraints:
    - id: review-activity-version-bound-evidence-and-lifecycle
      severity: error
      expression_language: plain
      expression: one ReviewActivity examines one frozen subject version under one declared method and scope; terminal outcome requires ended_at, while judgments remain in generated Review and ReviewFinding records
      explanations:
        zh: 一次审查活动针对一个冻结对象版本和一个明确方法范围；终态必须有结束时间，而判断保存在生成的 Review 与 ReviewFinding 中。
        en: One review activity examines one frozen subject version under one method and scope; terminal state requires end time, while judgments remain in generated Review and ReviewFinding records.
        ja: 一回の審査活動は一つの固定対象版を一つの方法・範囲で検査し、終端状態には終了時刻を要し、判断は生成 Review・ReviewFinding に保持します。
      source_claims:
        - claim-review-activity-011
  required_relation_constraints: []
examples:
  - id: ReviewActivity-example-positive-manual-001
    kind: positive
    labels:
      zh: 审查活动正例
      en: Positive review activity case
      ja: 審査活動の正例
    scenario_id: null
    descriptions:
      zh: review-activity ra-42 在 14:00–14:18 由 reviewer-7 检查 artifact a-19@3，并使用 rubric safety-v4。
      en: review-activity ra-42 runs 14:00–14:18 with reviewer-7 examining artifact a-19@3 under rubric safety-v4.
      ja: review-activity ra-42 は 14:00～14:18 に reviewer-7 が artifact a-19@3 を rubric safety-v4 で検査します。
    field_values:
      review_activity_id: review-activity/ra-42
      subject_version_ref: artifact/a-19@3
      reviewer_refs:
        - person/reviewer-7
      review_scope:
        included:
          - answer.body
          - citations
        excluded:
          - latency
      review_method: rubric/safety@4
      evidence_refs:
        - trace/t-8/span-19
        - source/citation-4
      started_at: 2026-07-16T14:00:00.000Z
      ended_at: 2026-07-16T14:18:00.000Z
      outcome: completed
    related_node_ids:
      - ReviewActivity
    related_relation_ids: []
    expected_result:
      zh: 该对象是一次具有完整发生身份的审查活动。
      en: The object is one review activity with complete occurrence identity.
      ja: この対象は完全な発生同一性を持つ一回の審査活動です。
    why_valid_or_invalid:
      zh: 它具有时间边界、审查者、对象版本、方法和证据。
      en: It has temporal bounds, reviewer, subject version, method, and evidence.
      ja: 時間境界、審査者、対象版、方法、証拠を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-review-activity-012
  - id: ReviewActivity-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 审查活动边界例
      en: Boundary review activity case
      ja: 審査活動の境界例
    scenario_id: null
    descriptions:
      zh: review record r-42 保存结论和发现，可在活动结束后继续引用。
      en: review record r-42 stores conclusions and findings and remains referenceable after the activity ends.
      ja: review record r-42 は結論と所見を保存し活動終了後も参照できます。
    field_values: {}
    related_node_ids:
      - ReviewActivity
    related_relation_ids: []
    expected_result:
      zh: 这是 Review 信息记录，不是 ReviewActivity。
      en: This is a Review information record, not a ReviewActivity.
      ja: これは Review 情報記録で ReviewActivity ではありません。
    why_valid_or_invalid:
      zh: 持久实体没有活动的开始结束和参与过程身份。
      en: A persistent entity lacks the occurrence identity and participation process of an activity.
      ja: 持続实体には活動の開始終了と参加過程同一性がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-review-activity-013
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: ReviewActivity-evaluates-OptimizationTarget
    predicate: evaluates
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 审查优化目标
      en: reviews optimization target
      ja: 最適化対象を審査
    definitions:
      zh: ReviewActivity 检查 OptimizationTarget 的精确版本、变更边界或候选配置，并生成审查记录；该边不表示执行优化。
      en: ReviewActivity examines an exact OptimizationTarget version, mutable boundary, or candidate configuration and generates a review record; the edge does not perform optimization.
      ja: ReviewActivity は OptimizationTarget の正確な版、可変境界、候補構成を検査して review 記録を生成し、最適化を実行しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_evaluates
      labels:
        zh: 反向：审查优化目标
        en: "inverse: reviews optimization target"
        ja: 逆方向：最適化対象を審査
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: ReviewActivity-evaluates-OptimizationTarget-example-positive-manual-001
        kind: positive
        labels:
          zh: 审查优化目标正例
          en: Positive case for reviews optimization target
          ja: 最適化対象を審査の正例
        scenario_id: null
        descriptions:
          zh: ra-51 检查 target router@13 的提示差异、指标结果和权限不变量。
          en: ra-51 reviews target router@13 prompt diff, metric results, and permission invariants.
          ja: ra-51 は target router@13 の prompt 差分、指標結果、権限不変条件を審査します。
        field_values: {}
        related_node_ids:
          - ReviewActivity
          - OptimizationTarget
        related_relation_ids:
          - ReviewActivity-evaluates-OptimizationTarget
        expected_result:
          zh: 应记录 ra-51 审查该目标版本。
          en: ra-51 is linked to the target version it reviews.
          ja: ra-51 を審査対象版へ結びます。
        why_valid_or_invalid:
          zh: 对象版本和审查范围均明确指向优化目标。
          en: Subject version and review scope explicitly identify the optimization target.
          ja: 対象版と審査範囲が最適化対象を明示します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-review-activity-014
      - id: ReviewActivity-evaluates-OptimizationTarget-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 审查优化目标边界例
          en: Boundary case for reviews optimization target
          ja: 最適化対象を審査の境界例
        scenario_id: null
        descriptions:
          zh: loop-19 搜索候选并生成 p-8，但没有独立审查者或 Review 记录。
          en: loop-19 searches candidates and generates p-8 with no independent reviewer or Review record.
          ja: loop-19 は候補を探索し p-8 を生成しますが独立審査者や Review 記録がありません。
        field_values: {}
        related_node_ids:
          - ReviewActivity
          - OptimizationTarget
        related_relation_ids:
          - ReviewActivity-evaluates-OptimizationTarget
        expected_result:
          zh: OptimizationLoop 不得被当作 ReviewActivity。
          en: OptimizationLoop is not treated as ReviewActivity.
          ja: OptimizationLoop を ReviewActivity として扱いません。
        why_valid_or_invalid:
          zh: 候选搜索与独立审查具有不同目的和责任。
          en: Candidate search and independent review have different purposes and responsibilities.
          ja: 候補探索と独立審査は目的と責任が異なります。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-review-activity-015
    source_claims:
      - claim-review-activity-016
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:OptimizationTarget
  - id: ReviewActivity-produces-Review
    predicate: produces
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 生成审查记录
      en: produces review record
      ja: 審査記録を生成
    definitions:
      zh: ReviewActivity 在结束或保存草稿时生成持久 Review 记录；一个活动发生和它生成的记录保持不同身份。
      en: ReviewActivity generates a persistent Review record when saved or completed; the occurrence and generated record retain different identities.
      ja: ReviewActivity は保存・完了時に持続 Review 記録を生成し、発生と生成記録は別の同一性を保ちます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_produces
      labels:
        zh: 反向：生成审查记录
        en: "inverse: produces review record"
        ja: 逆方向：審査記録を生成
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: ReviewActivity-produces-Review-example-positive-manual-001
        kind: positive
        labels:
          zh: 生成审查记录正例
          en: Positive case for produces review record
          ja: 審査記録を生成の正例
        scenario_id: null
        descriptions:
          zh: ra-42 output_manifest 包含 review r-42，且 r-42.generated_by=ra-42。
          en: ra-42 output_manifest contains review r-42 and r-42.generated_by equals ra-42.
          ja: ra-42 の output_manifest は review r-42 を含み r-42.generated_by=ra-42 です。
        field_values: {}
        related_node_ids:
          - ReviewActivity
          - Review
        related_relation_ids:
          - ReviewActivity-produces-Review
        expected_result:
          zh: 应记录 ra-42 生成 r-42。
          en: The generation fact from ra-42 to r-42 is recorded.
          ja: ra-42 が r-42 を生成した事実を記録します。
        why_valid_or_invalid:
          zh: 审查活动输出清单与 Review 保存的生成出处引用完全一致。
          en: Activity output and record provenance agree.
          ja: 活動出力と記録出所が一致します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-review-activity-017
      - id: ReviewActivity-produces-Review-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 生成审查记录边界例
          en: Boundary case for produces review record
          ja: 審査記録を生成の境界例
        scenario_id: null
        descriptions:
          zh: r-43 引用了 r-42 的发现，但由另一次活动 ra-43 生成。
          en: r-43 cites findings from r-42 but is generated by a different activity ra-43.
          ja: r-43 は r-42 の所見を引用しますが別活動 ra-43 が生成します。
        field_values: {}
        related_node_ids:
          - ReviewActivity
          - Review
        related_relation_ids:
          - ReviewActivity-produces-Review
        expected_result:
          zh: 不得声称 ra-42 生成 r-43。
          en: ra-42 is not asserted to produce r-43.
          ja: ra-42 が r-43 を生成したとは主張しません。
        why_valid_or_invalid:
          zh: 活动仅引用既有 Review 记录并不能证明该记录由此活动生成。
          en: Citing an earlier record is not generation by the earlier activity.
          ja: 旧記録引用は旧活動による生成ではありません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-review-activity-018
    source_claims:
      - claim-review-activity-019
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:Review
  - id: ReviewActivity-reviews-Artifact
    predicate: reviews
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 审查产物
      en: reviews artifact
      ja: 成果物を審査
    definitions:
      zh: ReviewActivity 点名本次实际检查的 Artifact 精确版本；该边表示审查参与对象，不表示 Artifact 是审查者或 Review 记录。
      en: ReviewActivity identifies the exact Artifact version actually examined; the edge states review participation and does not make the Artifact a reviewer or Review record.
      ja: ReviewActivity は実際に検査した Artifact の正確な版を示し、審査参加対象を表しますが Artifact を審査者や Review 記録にはしません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_reviews
      labels:
