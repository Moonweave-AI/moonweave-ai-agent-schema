schema: moonweave.ai/ontology-node/v1
id: RevisionArtifact
kind: concept
status: accepted
labels:
  zh: 修订产物
  en: Revision Artifact
  ja: 改訂成果物
semantics:
  short_definition:
    zh: 由一次 Revision Activity 生成、并可追溯到原产物和反馈依据的新候选产物。
    en: A new candidate artifact generated by one Revision Activity and traceable to its source artifact and feedback basis.
    ja: 一回の Revision Activity が生成し、元の成果物とフィードバック根拠へ追跡可能な新しい候補成果物。
  definition:
    zh: Revision Artifact 是 Revision Activity 生成的、可供后续评估的实体。它保存新产物引用、原始产物引用、所响应 Feedback 引用和生成活动引用。它不是 Revision Activity 本身，不是尚未执行的 ChangeProposal，也不是原始 Diff、Log、Trace 或诊断事件；那些可作为产物内容或证据，但不能替代产生后的可引用实体。
    en: A Revision Artifact is an entity generated by a Revision Activity and available for later evaluation. It retains new-artifact reference, source-artifact reference, feedback references responded to, and generating-activity reference. It is not the Revision Activity itself, an unexecuted ChangeProposal, or a raw diff, log, trace, or diagnostic event; those may be artifact content or evidence but cannot substitute for the generated referencable entity.
    ja: Revision Artifact は Revision Activity が生成し、後続評価に利用できるエンティティである。新成果物参照、元成果物参照、応答した Feedback 参照、生成活動参照を保持する。Revision Activity 自体、未実行の ChangeProposal、生の Diff、Log、Trace、診断イベントではない。それらは成果物内容又は証拠になり得るが、生成された参照可能なエンティティを代替できない。
  why_needed:
    zh: 如果只保存“已修复”的说法，就无法知道修复了哪一版产物、响应了哪些反馈或是否值得再次评估。修订产物让评估—反馈—修订—再评估链条可以被逐步比较和回溯。
    en: If only a statement that something was fixed is retained, no one can tell which artifact version changed, which feedback it answered, or whether it deserves another evaluation. A revision artifact makes the assessment-feedback-revision-reassessment chain comparable and traceable step by step.
    ja: 「修正済み」という記述だけでは、どの成果物版が変わり、どの Feedback に応答し、再評価に値するかを知れない。Revision Artifact は評価、フィードバック、改訂、再評価の連鎖を段階ごとに比較可能かつ追跡可能にする。
  includes:
    - zh: 新产物引用、源产物引用、反馈引用、Revision Activity 引用和变更摘要。
      en: New-artifact reference, source-artifact reference, feedback references, Revision Activity reference, and change summary.
      ja: 新成果物参照、元成果物参照、フィードバック参照、Revision Activity 参照、変更要約。
    - zh: 可被后续 Evaluation Activity 当作候选输入的已生成实体。
      en: A generated entity that a later Evaluation Activity can use as candidate input.
      ja: 後続の Evaluation Activity が候補入力として使用できる生成済みエンティティ。
  excludes:
    - zh: 仅描述拟议修改的 ChangeProposal，或实际执行修改的 Revision Activity。
      en: A ChangeProposal that only describes intended modification or the Revision Activity that executes modification.
      ja: 意図した変更だけを記述する ChangeProposal 又は変更を実行する Revision Activity。
    - zh: 不带反馈和源版本关系的补丁片段、提交日志或运行时输出。
      en: A patch fragment, commit log, or runtime output lacking feedback and source-version relationships.
      ja: Feedback と元版の関係を持たないパッチ断片、コミットログ、又は実行時出力。
  semantic_kind: entity
  aliases: [revised artifact, revision output, 修订结果]
engineering:
  explanation:
    zh: 上游 Revision Activity 使用 Feedback 和源 Artifact 后生成 RevisionArtifact；新的 Evaluation Activity 可再使用它。Responses API 可生成候选内容，但候选响应不能在没有源版本、反馈和活动证据时自动成为 Revision Artifact。PROV-O 的 Entity、Activity、used 和 wasGeneratedBy 保留这些不同事实。
    en: The upstream Revision Activity uses Feedback and a source Artifact and then generates RevisionArtifact; a new Evaluation Activity can use it again. The Responses API can generate candidate content, but a candidate response does not automatically become Revision Artifact without source-version, feedback, and activity evidence. PROV-O Entity, Activity, used, and wasGeneratedBy preserve these distinct facts.
    ja: 上流 Revision Activity は Feedback と元 Artifact を使用して RevisionArtifact を生成し、新しい Evaluation Activity が再び使用できる。Responses API は候補内容を生成できるが、元版、フィードバック、活動証拠なしに候補応答が自動で Revision Artifact になることはない。PROV-O の Entity、Activity、used、wasGeneratedBy はこれらの異なる事実を保持する。
  typical_input:
    - description: Revision activity inputs retained before generating a new candidate.
      format: |
        {
          "source_artifact_ref": "Artifact:answer-104",
          "feedback_refs": ["Feedback:feedback-105"],
          "revision_activity_ref": "RevisionActivity:revise-31"
        }
      source_claims: [claim-revision-artifact-provenance]
    - description: Current candidate-generation request that may contribute content but is not artifact provenance by itself.
      format: |
        POST /v1/responses
        {"model":"gpt-5.6","input":"Rewrite the classification instruction to distinguish hardware power failures from software issues."}
      source_claims: [claim-revision-artifact-responses]
  typical_output:
    - description: Local generated revision-artifact record.
      format: |
        {
          "revision_artifact_id": "revision-105",
          "artifact_ref": "Artifact:answer-105",
          "source_artifact_ref": "Artifact:answer-104",
          "feedback_ref": "Feedback:feedback-105",
          "revision_activity_ref": "RevisionActivity:revise-31",
          "change_summary": "Clarified the Hardware classification rule for power failures."
        }
      source_claims: [claim-revision-artifact-design]
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines Entity, Activity, use, derivation, and generation relationships.
    - name: OpenAI Responses API create reference
      url: https://developers.openai.com/api/reference/resources/responses/methods/create
      description: Current candidate-generation interface that does not replace local revision provenance.
structure:
  identity_keys: [revision_artifact_id]
  fields:
    - id: revision_artifact_id
      labels:
        zh: 修订产物标识
        en: Revision artifact identifier
        ja: 改訂成果物識別子
      definitions:
        zh: 唯一标识一件产生后的可引用修订产物记录。
        en: Uniquely identifies one generated and referencable revision-artifact record.
        ja: 一件の生成済みで参照可能な改訂成果物記録を一意に識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: revision-105
      allowed_values: []
      source_claims: [claim-revision-artifact-design]
    - id: artifact_ref
      labels:
        zh: 新产物引用
        en: New artifact reference
        ja: 新成果物参照
      definitions:
        zh: 指向实际生成且可被后续评估的 Artifact。
        en: Reference to the actual generated Artifact available for later evaluation.
        ja: 後続評価に利用できる実際に生成された Artifact への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Artifact:answer-105
      allowed_values: []
      source_claims: [claim-revision-artifact-provenance, claim-revision-artifact-design]
    - id: source_artifact_ref
      labels:
        zh: 源产物引用
        en: Source artifact reference
        ja: 元成果物参照
      definitions:
        zh: 指向发生改动前被 Revision Activity 使用的 Artifact。
        en: Reference to the Artifact used by Revision Activity before modification.
        ja: 変更前に Revision Activity が使用した Artifact への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Artifact:answer-104
      allowed_values: []
      source_claims: [claim-revision-artifact-provenance]
    - id: feedback_ref
      labels:
        zh: 响应反馈引用
        en: Responded feedback reference
        ja: 応答フィードバック参照
      definitions:
        zh: 指向指导该次修订的一个或多个 Feedback 记录。
        en: Reference to one or more Feedback records that guided this revision.
        ja: この改訂を導いた一つ以上の Feedback 記録への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: Feedback:feedback-105
      allowed_values: []
      source_claims: [claim-revision-artifact-provenance]
    - id: revision_activity_ref
      labels:
        zh: 修订活动引用
        en: Revision activity reference
        ja: 改訂活動参照
      definitions:
        zh: 指向实际生成该新产物的有时间边界 Revision Activity。
        en: Reference to the time-bounded Revision Activity that actually generated the new artifact.
        ja: 新成果物を実際に生成した時間境界を持つ Revision Activity への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: RevisionActivity:revise-31
      allowed_values: []
      source_claims: [claim-revision-artifact-provenance]
    - id: change_summary
      labels:
        zh: 变更摘要
        en: Change summary
        ja: 変更要約
      definitions:
        zh: 对已生成产物相对源产物的简短可读说明，不替代内容差异或活动证据。
        en: Brief readable description of the generated artifact relative to its source and not a substitute for content diff or activity evidence.
        ja: 生成成果物を元成果物と比べた短い可読説明であり、内容差分又は活動証拠の代替ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Clarified the Hardware classification rule for power failures.
      allowed_values: []
      source_claims: [claim-revision-artifact-design]
  constraints:
    - id: revision-artifact-is-generated-not-planned
      severity: error
      expression_language: plain
      expression: revision_activity_ref must identify an occurred RevisionActivity and artifact_ref must resolve to a retained generated Artifact; a proposal alone is insufficient.
      explanation:
        zh: 计划改动和完成改动是不同事实，不能共享一个产物记录。
        en: Planned modification and completed modification are different facts and cannot share one artifact record.
        ja: 計画された変更と完了した変更は異なる事実であり、一つの成果物記録を共有できない。
      source_claims: [claim-revision-artifact-provenance, claim-revision-artifact-design]
    - id: revision-artifact-traces-inputs
      severity: error
      expression_language: plain
      expression: source_artifact_ref and feedback_ref must identify the source and feedback actually used by the generating RevisionActivity.
      explanation:
        zh: 同一项目或名称相似不构成修订因果证据。
        en: Same project membership or similar names do not establish revision causality.
        ja: 同じプロジェクト所属又は似た名前は改訂因果を確立しない。
      source_claims: [claim-revision-artifact-provenance]
  required_relations:
    - id: revision-artifact-was-generated-by-revision-activity
      direction: outgoing
      predicate: was_generated_by
      target_concept_id: RevisionActivity
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每件 RevisionArtifact 必须由恰好一个实际 Revision Activity 生成。
        en: Each RevisionArtifact must be generated by exactly one actual Revision Activity.
        ja: 各 RevisionArtifact はちょうど一つの実際の Revision Activity により生成されなければならない。
      source_claims: [claim-revision-artifact-provenance]
    - id: revision-artifact-is-derived-from-artifact
      direction: outgoing
      predicate: is_derived_from
      target_concept_id: Artifact
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每件 RevisionArtifact 必须指向它所修改的唯一源 Artifact。
        en: Each RevisionArtifact must point to the one source Artifact it modifies.
        ja: 各 RevisionArtifact は変更した一つの元 Artifact を指さなければならない。
      source_claims: [claim-revision-artifact-provenance]
examples:
  - id: revision-artifact-positive-category-fix

    labels:
      zh: Constitutional AI 修订产物
      en: Constitutional AI revision artifact
      ja: Constitutional AI 改訂成果物

    descriptions:
      zh: "Self-Refine (Madaan et al., 2023) Generate->Feedback->Refine loop without external training; RevisionArtifact maps feedback-driven revision artifacts."
      en: "Self-Refine (Madaan et al., 2023) Generate->Feedback->Refine loop without external training; RevisionArtifact maps feedback-driven revision artifacts."
      ja: "Self-Refine Generate->Feedback->Refine; RevisionArtifact revision artifact."
    field_values:
      revision_artifact_id: constitutional-ai-revised-001
      artifact_ref: Artifact:harmless-revised-response
      source_artifact_ref: Artifact:harmful-query-initial-response
      feedback_ref: Feedback:constitutional-self-critique
      revision_activity_ref: RevisionActivity:constitutional-critique-revise
      change_summary: Revised to engage harmful query with constitution-guided harmless explanation.
    related_node_ids: [RevisionArtifact, RevisionActivity, Artifact, Feedback]
    related_relation_ids: [revision-artifact-was-generated-by-revision-activity, revision-artifact-is-derived-from-artifact]

    source_claims: [claim-revision-artifact-provenance, claim-revision-artifact-design]
  - id: revision-artifact-counterexample-proposal-only

    labels:
      zh: 只有修改提议而没有产物
      en: Modification proposal with no artifact
      ja: 成果物のない変更提案

    descriptions:
      zh: "Vague scoring without constitutional principles cannot serve as CAI-style RevisionArtifact."
      en: "Vague scoring without constitutional principles cannot serve as CAI-style RevisionArtifact."
      ja: "Missing principles rejects CAI-style RevisionArtifact."
    field_values:
      revision_artifact_id: null
      artifact_ref: null
      source_artifact_ref: null
      feedback_ref: Feedback:feedback-105
      revision_activity_ref: null
    related_node_ids: [RevisionArtifact, ChangeProposal]
    related_relation_ids: []

    source_claims: [claim-revision-artifact-design]
  - id: revision-artifact-boundary-activity-versus-artifact

    labels:
      zh: 修订活动与修订产物的边界
      en: Boundary between revision activity and revision artifact
      ja: 改訂活動と改訂成果物の境界

    descriptions:
      zh: "Reflexion reflection goes to memory not RewardModelScore; distinguish RevisionArtifact from Score."
      en: "Reflexion reflection goes to memory not RewardModelScore; distinguish RevisionArtifact from Score."
      ja: "Reflexion reflection not Score."
    field_values:
      revision_artifact_id: revision-105
      artifact_ref: Artifact:answer-105
      source_artifact_ref: Artifact:answer-104
      feedback_ref: Feedback:feedback-105
      revision_activity_ref: RevisionActivity:revise-31
      change_summary: Clarified the Hardware classification rule for power failures.
    related_node_ids: [RevisionArtifact, RevisionActivity]
    related_relation_ids: [revision-artifact-was-generated-by-revision-activity]

    source_claims: [claim-revision-artifact-provenance]
  - id: revision-artifact-instance-answer-105

    labels:
      zh: answer-105 的具体修订产物
      en: Concrete revision artifact answer-105
      ja: answer-105 の具体的な改訂成果物

    descriptions:
      zh: "CAI instance: principle->self-critique->revised->RevisionArtifact origin_kind=ai-assisted."
      en: "CAI instance: principle->self-critique->revised->RevisionArtifact origin_kind=ai-assisted."
      ja: "CAI instance maps to RevisionArtifact."
    field_values:
      revision_artifact_id: revision-105
      artifact_ref: Artifact:answer-105
      source_artifact_ref: Artifact:answer-104
      feedback_ref: Feedback:feedback-105
      revision_activity_ref: RevisionActivity:revise-31
      change_summary: Clarified the Hardware classification rule for power failures.
    related_node_ids: [RevisionArtifact, Artifact, Feedback, RevisionActivity, EvaluationActivity]
    related_relation_ids: [revision-artifact-was-generated-by-revision-activity, revision-artifact-is-derived-from-artifact]

    source_claims: [claim-revision-artifact-provenance, claim-revision-artifact-design]
parent_relation: null
relations:
  - id: RevisionArtifact-wasGeneratedBy-RevisionActivity
    predicate: was_generated_by
    target: concept:RevisionActivity
    direction: source-to-target
    relation_kind: provenance
    labels:
      zh: 修订产物由修订活动生成
      en: revision artifact was generated by revision activity
      ja: 改訂成果物が改訂活動により生成される
    definitions:
      zh: 一个发生的 Revision Activity 生成该可引用修订产物。
      en: One occurred Revision Activity generates the referencable revision artifact.
      ja: 一つの発生した Revision Activity が参照可能な改訂成果物を生成する。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: generates
      labels:
        zh: 修订活动生成产物
        en: revision activity generates artifact
        ja: 改訂活動が成果物を生成する
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-revision-artifact-provenance]
    distinct_fact_rationale:
      zh: 该关系区分生成活动与其之后存在的实体产物。
      en: This relation distinguishes generating activity from the entity artifact that exists afterward.
      ja: この関係は生成活動を、その後に存在するエンティティ成果物から区別する。
    layout_role: cross-link
  - id: RevisionArtifact-isDerivedFrom-Artifact
    predicate: is_derived_from
    target: concept:Artifact
    direction: source-to-target
    relation_kind: provenance
    labels:
      zh: 修订产物派生自源产物
      en: revision artifact is derived from artifact
      ja: 改訂成果物が成果物から派生する
    definitions:
      zh: 新产物相对于指定源 Artifact 产生，不能只根据名称相似推断。
      en: New artifact is produced relative to a specified source Artifact and cannot be inferred only from similar naming.
      ja: 新成果物は指定の元 Artifact を基に生成され、似た名前だけから推論してはならない。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_source_for_revision
      labels:
        zh: 源产物用于修订
        en: artifact is source for revision
        ja: 成果物が改訂の元である
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-revision-artifact-provenance]
    distinct_fact_rationale:
      zh: 该关系记录版本来源，不替代 Feedback 的理由关系。
      en: This relation records version provenance and does not replace Feedback rationale relationship.
      ja: この関係は版来歴を記録し、Feedback の理由関係を置き換えない。
    layout_role: cross-link
sources:
  - id: prov-o-revision-artifact
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines Entity, Activity, used, wasGeneratedBy, and derivation relations used for revision provenance.
  - id: openai-responses-revision-artifact
    title: OpenAI Responses API create reference
    url: https://developers.openai.com/api/reference/resources/responses/methods/create
    source_type: official-doc
    relevance: Documents current candidate-generation requests separate from local revision-artifact provenance.
  - id: revision-artifact-design
    title: Revision artifact design inference
    url: https://www.w3.org/TR/prov-o/
    source_type: design-inference
    relevance: Applies provenance semantics to distinguish completed revision output from proposal, activity, and raw operational evidence.
source_claims:
  - id: claim-revision-artifact-provenance
    source: prov-o-revision-artifact
    supports: PROV-O distinguishes entities from activities and defines use, generation, and derivation relationships between them.
    locator: "PROV-O: prov:Entity, prov:Activity, prov:used, prov:wasGeneratedBy, prov:wasDerivedFrom"
    evidence_kind: normative
    confidence: high
  - id: claim-revision-artifact-responses
    source: openai-responses-revision-artifact
    supports: The Responses API can generate candidate content but does not by itself establish local revision provenance.
    locator: "Responses API reference: response creation"
    evidence_kind: official
    confidence: high
  - id: claim-revision-artifact-design
    source: revision-artifact-design
    supports: A revision artifact is a generated entity with source, feedback, and activity traceability distinct from an unexecuted proposal.
    locator: "Local revision artifact boundary"
    evidence_kind: design-inference
    confidence: high


