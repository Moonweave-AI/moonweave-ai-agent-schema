schema: moonweave.ai/ontology-node/v1
id: RevisionArtifact
kind: concept
status: accepted
labels:
  zh: 修订产物
  en: revision artifact
  ja: 改訂成果物
semantics:
  short_definition:
    zh: 修订产物是纠正活动基于明确先前版本生成的新 Artifact 版本。
    en: A revision artifact is a new Artifact version generated by correction from an identified prior version.
    ja: 改訂成果物は修正活動が特定以前版から生成する新 Artifact 版です。
  definition:
    zh: 修订产物是 Artifact 的子类；其身份由 artifact_id、新版本、内容哈希、先前版本、生成 CorrectionActivity 和所处理 Feedback 确定，区别于描述问题的 ReviewEvidenceArtifact。
    en: A revision artifact is an Artifact subtype identified by artifact_id, new version, content hash, prior version, generating CorrectionActivity, and addressed Feedback, unlike a ReviewEvidenceArtifact that explains problems.
    ja: 改訂成果物は artifact_id、新版、content hash、以前版、生成 CorrectionActivity、対象 Feedback で同一性が決まる Artifact 下位型で、問題を説明する ReviewEvidenceArtifact と異なります。
  why_needed:
    zh: 显式版本谱系使修订内容、生成活动和所解决反馈可追溯，也支持后续回滚。
    en: Explicit version lineage traces revised content, generating activity, and addressed feedback and supports later rollback.
    ja: 明示版系譜により修訂内容、生成活動、解決 Feedback を追跡し後続ロールバックを支援します。
  includes:
    - zh: 包括修订后的答案、补丁文件、提示模板版本或配置快照。
      en: Includes revised answers, patch files, prompt-template versions, and configuration snapshots.
      ja: 修訂回答、パッチファイル、プロンプトテンプレート版、構成スナップショットを含みます。
  excludes:
    - zh: 不包括 RevisionPlan、CritiqueArtifact 或没有先前版本谱系的全新 Artifact。
      en: Excludes RevisionPlan, CritiqueArtifact, and a wholly new Artifact with no prior-version lineage.
      ja: RevisionPlan、CritiqueArtifact、以前版系譜のない新規 Artifact は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: previous_version_ref
      labels:
        zh: 先前版本引用
        en: previous-version reference
        ja: 以前版参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次修订直接基于的同谱系前一版本；它不是任意相似产物或更早祖先。
        en: References the immediate prior version in the same lineage on which this revision was based, not an arbitrary similar artifact or distant ancestor.
        ja: この改訂が直接基づく同系列の直前版を参照し、任意の類似成果物や遠い祖先は指しません。
      allowed_values: []
      pattern: null
      example_value: artifact/a-19@3
      source_claims:
        - claim-revision-artifact-002
    - id: generated_by_correction_ref
      labels:
        zh: 生成纠正活动引用
        en: generating correction-activity reference
        ja: 生成修正活動参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用实际产生该版本的 CorrectionActivity；计划、提案或人工意图不能代替生成发生。
        en: References the CorrectionActivity that actually generated this version; a plan, proposal, or human intention cannot substitute for the generating occurrence.
        ja: この版を実際に生成した CorrectionActivity を参照し、計画・提案・人の意図で生成発生を代替しません。
      allowed_values: []
      pattern: null
      example_value: correction/c-11
      source_claims:
        - claim-revision-artifact-003
    - id: addressed_feedback_refs
      labels:
        zh: 已处理反馈引用
        en: addressed-feedback references
        ja: 対応済み feedback 参照
      datatype: reference-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出能够由实际差异逐项证明已回应的 Feedback 版本；仅被计划提及但未落实的反馈不得列入。
        en: Lists Feedback versions whose dispositions can be shown item by item in the applied diff; feedback merely mentioned by a plan but not implemented is excluded.
        ja: 適用差分から項目別に対応を証明できる Feedback 版を列挙し、計画で言及しただけで未実装の feedback は含めません。
      allowed_values: []
      pattern: null
      example_value:
        - feedback/fb-8@2
      source_claims:
        - claim-revision-artifact-004
  constraints:
    - id: revision-artifact-immutable-direct-lineage
      severity: error
      expression_language: plain
      expression: one RevisionArtifact version has immutable content, one direct previous version, one generating CorrectionActivity, and only feedback demonstrably addressed by the applied diff
      explanations:
        zh: 一个修订产物版本的内容不可变，只指向一个直接前版和一次生成纠正活动，并只列出由实际差异证明已处理的反馈。
        en: One revision-artifact version is immutable, has one direct predecessor and generating correction activity, and lists only feedback demonstrably addressed by the applied diff.
        ja: 一つの revision artifact 版は不変で、一つの直前版と生成修正活動を持ち、適用差分で対応を証明できる feedback だけを列挙します。
      source_claims:
        - claim-revision-artifact-005
  required_relation_constraints: []
examples:
  - id: RevisionArtifact-example-positive-manual-001
    kind: positive
    labels:
      zh: 修订产物正例
      en: Positive revision artifact case
      ja: 改訂成果物の正例
    scenario_id: null
    descriptions:
      zh: artifact a-19@4 的 previous_version=@3、generated_by=c-11、content_hash=h9，并列出 addressed_feedback=fb-8。
      en: artifact a-19@4 records previous_version=@3, generated_by=c-11, content_hash=h9, and addressed_feedback=fb-8.
      ja: artifact a-19@4 は previous_version=@3、generated_by=c-11、content_hash=h9、addressed_feedback=fb-8 を記録します。
    field_values:
      artifact_id: a-19
      version: "4"
      content_digest: sha256:h9
      previous_version_ref: artifact/a-19@3
      generated_by_correction_ref: correction/c-11
      addressed_feedback_refs:
        - feedback/fb-8@2
      media_type: application/json
    related_node_ids:
      - RevisionArtifact
    related_relation_ids: []
    expected_result:
      zh: 该对象是 RevisionArtifact。
      en: The object is a RevisionArtifact.
      ja: この対象は RevisionArtifact です。
    why_valid_or_invalid:
      zh: 新版本、内容身份、前版、生成活动和反馈链完整。
      en: New version, content identity, prior version, generating activity, and feedback chain are complete.
      ja: 新版、内容 ID、以前版、生成活動、Feedback 連鎖が完全です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-revision-artifact-006
  - id: RevisionArtifact-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 修订产物边界例
      en: Boundary revision artifact case
      ja: 改訂成果物の境界例
    scenario_id: null
    descriptions:
      zh: critique c-19 引用 a-19@3 并描述问题，但不是该 Artifact 的新业务版本。
      en: critique c-19 cites a-19@3 and describes problems but is not a new business version of that Artifact.
      ja: critique c-19 は a-19@3 を引用し問題を記述しますが当該 Artifact の新版ではありません。
    field_values: {}
    related_node_ids:
      - RevisionArtifact
    related_relation_ids: []
    expected_result:
      zh: 这是 ReviewEvidenceArtifact，不是 RevisionArtifact。
      en: This is ReviewEvidenceArtifact, not RevisionArtifact.
      ja: これは ReviewEvidenceArtifact で RevisionArtifact ではありません。
    why_valid_or_invalid:
      zh: 批评与对象版本谱系不同，不能仅因引用旧版就成为修订版。
      en: Critique has different lineage and does not become a revision merely by citing the prior version.
      ja: 批評は対象版系譜と異なり旧版引用だけで改訂版になりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-revision-artifact-007
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: RevisionArtifact-is_a-Artifact
    predicate: is_a
    direction: source-to-target
    relation_kind: hierarchy
    labels:
      zh: 是一种
      en: is a
      ja: の一種である
    definitions:
      zh: RevisionArtifact 是由纠正活动从明确先前版本派生的新 Artifact 版本。
      en: RevisionArtifact is a new Artifact version derived by correction from an identified prior version.
      ja: RevisionArtifact は修正活動が特定以前版から派生した新 Artifact 版です。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_is_a
      labels:
        zh: 反向：是一种
        en: "inverse: is a"
        ja: 逆方向：の一種である
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: RevisionArtifact-is_a-Artifact-example-positive-manual-001
        kind: positive
        labels:
          zh: 是一种正例
          en: Positive case for is a
          ja: の一種であるの正例
        scenario_id: null
        descriptions:
          zh: a-19@4 有 content_hash、previous_version=@3 与 generated_by=c-11。
          en: a-19@4 has content_hash, previous_version=@3, and generated_by=c-11.
          ja: a-19@4 は content_hash、previous_version=@3、generated_by=c-11 を持ちます。
        field_values: {}
        related_node_ids:
          - RevisionArtifact
          - Artifact
        related_relation_ids:
          - RevisionArtifact-is_a-Artifact
        expected_result:
          zh: a-19@4 同时是 RevisionArtifact 与 Artifact。
          en: a-19@4 is RevisionArtifact and Artifact.
          ja: a-19@4 は RevisionArtifact かつ Artifact です。
        why_valid_or_invalid:
          zh: 它有通用产物身份和明确修订谱系。
          en: It has general artifact identity and explicit revision lineage.
          ja: 一般成果物同一性と明示改訂系譜を持ちます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-revision-artifact-008
      - id: RevisionArtifact-is_a-Artifact-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 是一种边界例
          en: Boundary case for is a
          ja: の一種であるの境界例
        scenario_id: null
        descriptions:
          zh: 全新 artifact b-1 没有先前版本。
          en: New artifact b-1 has no prior version.
          ja: 新規 artifact b-1 は以前版がありません。
        field_values: {}
        related_node_ids:
          - RevisionArtifact
          - Artifact
        related_relation_ids:
          - RevisionArtifact-is_a-Artifact
        expected_result:
          zh: 它是 Artifact，但不是 RevisionArtifact。
          en: It is Artifact but not RevisionArtifact.
          ja: Artifact ですが RevisionArtifact ではありません。
        why_valid_or_invalid:
          zh: 该全新产物缺少从明确先前版本修订派生的必要种差。
          en: It lacks derivation from a prior version.
          ja: 以前版からの改訂という種差がありません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-revision-artifact-009
    source_claims:
      - claim-revision-artifact-010
    distinct_fact_rationale: null
    layout_role: secondary-backbone
    review_status: accepted
    target: concept:Artifact
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-feedback-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 CI/CD 代码审查、回滚/恢复与结构化反馈模式逐项核验。
    en: Verified against CI/CD code review, rollback/recovery, and structured feedback patterns.
    ja: CI/CD コードレビュー、ロールバック/復旧、構造化フィードバックに照らし確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-revision-artifact-001
    source: eng-ont-prov-o
    supports: PROV-O supports derivation and generation provenance among Entities and Activities; Moonweave uses that lineage to identify a revised Artifact version.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-revision-artifact-002
    source: eng-ont-prov-o
    supports: PROV-O defines prov:wasRevisionOf as a derivation relation between a revised Entity and an earlier Entity. RevisionArtifact.previous_version_ref directly records the immediate lineage step.
    locator: PROV-O Recommendation §5.2 > wasRevisionOf
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-revision-artifact-003
    source: eng-ont-prov-o
    supports: PROV-O defines prov:wasGeneratedBy between an Entity and the Activity that produced it. RevisionArtifact.generated_by_correction_ref directly specializes that provenance relation.
    locator: PROV-O Recommendation §3.1 > wasGeneratedBy
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-revision-artifact-004
    source: eng-ont-prov-o
    supports: PROV-O supports derivation lineage but does not define addressed feedback. RevisionArtifact.addressed_feedback_refs is Moonweave's evidence-backed trace from implemented revision content to the Feedback Entities it disposes.
    locator: PROV-O Recommendation §5.2 > Derivation and qualified derivation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-revision-artifact-005
    source: eng-ont-prov-o
    supports: PROV-O distinguishes a generated Entity, its generating Activity, and revision derivation. RevisionArtifact-immutable-direct-lineage is Moonweave's reviewed version-integrity specialization of those provenance facts.
    locator: PROV-O Recommendation §3.1 and §5.2 > wasGeneratedBy, wasDerivedFrom, and wasRevisionOf
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-revision-artifact-006
    source: eng-ont-prov-o
    supports: PROV-O generation and derivation relations support lineage from a prior Entity through an Activity to a new Entity.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-revision-artifact-007
    source: eng-ont-prov-o
    supports: PROV-O citation or usage is distinct from derivation into a revised Entity.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-revision-artifact-008
    source: eng-ont-prov-o
    supports: PROV-O models an Entity generated by an Activity and derived from a prior Entity.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-revision-artifact-009
    source: eng-ont-prov-o
    supports: Generation of a new Entity does not imply derivation from a prior version.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-revision-artifact-010
    source: eng-ont-prov-o
    supports: PROV-O generation and derivation support new Entity lineage from prior Entities through an Activity.
    locator: PROV-O Recommendation §3.1 > Entity, Activity, used, and generated
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
