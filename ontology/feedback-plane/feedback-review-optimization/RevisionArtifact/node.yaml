schema: moonweave.ai/ontology-node/v1
id: RevisionArtifact
kind: concept
labels:
  zh: 修订产物
  en: Revision Artifact
  ja: 改訂成果物
semantics:
  short_definition:
    zh: 由一次已发生 Revision Activity 生成、并可追溯到源产物与反馈依据的新候选产物记录。
    en: A record of a new candidate artifact generated by one occurred Revision Activity and traceable to its source artifact and feedback basis.
    ja: 発生した Revision Activity により生成され、元成果物とフィードバック根拠へ追跡可能な新候補成果物の記録。
  definition:
    zh: RevisionArtifact 是 Revision Activity 实际生成、可供后续 Evaluation Activity 再次评估的实体记录。它保存 revision_artifact_id、artifact_ref（新产物）、source_artifact_ref、feedback_ref 与 revision_activity_ref。它映射 LangSmith correction 后产生的修订 answer、OpenAI Responses API 在 Feedback 驱动下重写后的 candidate、以及 Self-Refine 式 generate→feedback→refine 循环中的 refined output。它不是 Revision Activity 本身、不是未执行的 ChangeProposal，也不是原始 Diff、Log、Trace 或诊断事件；Responses API 候选文本在没有源版本、反馈与活动证据时不能自动成为 RevisionArtifact。
    en: "RevisionArtifact is an entity record actually generated by Revision Activity and available for later Evaluation Activity reassessment. It retains revision_artifact_id, artifact_ref (new artifact), source_artifact_ref, feedback_ref, and revision_activity_ref. It maps to revised answers after LangSmith correction, OpenAI Responses API candidates rewritten under Feedback, and refined outputs in Self-Refine generate→feedback→refine loops. It is not Revision Activity itself, an unexecuted ChangeProposal, or raw diff, log, trace, or diagnostic events; Responses API candidate text cannot automatically become RevisionArtifact without source-version, feedback, and activity evidence."
    ja: RevisionArtifact は Revision Activity が実際に生成し、後続 Evaluation Activity が再評価できるエンティティ記録。revision_artifact_id、artifact_ref（新成果物）、source_artifact_ref、feedback_ref、revision_activity_ref を保持する。LangSmith correction 後の改訂 answer、Feedback 下で OpenAI Responses API が再生成した候補、Self-Refine generate→feedback→refine ループの refined output に写像する。Revision Activity 自体、未実行 ChangeProposal、生 diff/log/trace/診断イベントではない。元版、フィードバック、活動証拠なしに Responses API 候補文本は自動的に RevisionArtifact にならない。
  why_needed:
    zh: 若只保留“已修复”的说法，就无法知道修复了哪一版产物、响应了哪些 Feedback、是否值得再次评估。RevisionArtifact 让评估—反馈—修订—再评估链条可被逐步比较和回溯，并把 LangSmith 人工 correction 与 OpenAI eval 失败后的 prompt 修订结果区分开来。
    en: "If only a statement that something was fixed is retained, no one can tell which artifact version changed, which Feedback it answered, or whether it deserves reassessment. RevisionArtifact makes the assessment-feedback-revision-reassessment chain comparable and traceable, separating LangSmith human corrections from prompt revisions after OpenAI eval failures."
    ja: 「修正済み」という記述だけでは、どの成果物版が変わり、どの Feedback に応答し、再評価に値するかを知れない。RevisionArtifact は評価—フィードバック—改訂—再評価連鎖を段階比較・追跡可能にし、LangSmith 人間 correction と OpenAI eval 失敗後 prompt 改訂結果を区別する。
  includes:
    - zh: revision_artifact_id、artifact_ref、source_artifact_ref、feedback_ref、revision_activity_ref 与 change_summary。
      en: "revision_artifact_id, artifact_ref, source_artifact_ref, feedback_ref, revision_activity_ref, and change_summary."
      ja: revision_artifact_id、artifact_ref、source_artifact_ref、feedback_ref、revision_activity_ref、change_summary。
    - zh: 可被后续 EvaluationRun 或 Evaluation Activity 当作候选输入的已生成实体。
      en: A generated entity that a later EvaluationRun or Evaluation Activity can use as candidate input.
      ja: 後続 EvaluationRun 又は Evaluation Activity が候補入力に使える生成済みエンティティ。
  excludes:
    - zh: 仅描述拟议修改的 ChangeProposal，或实际执行修改的 Revision Activity。
      en: A ChangeProposal describing intended modification only or the Revision Activity executing modification.
      ja: 意図した変更だけを記述する ChangeProposal、又は変更を実行する Revision Activity。
    - zh: 不带 feedback 与 source 版本关系的 patch 片段、commit log、Responses API 裸响应或运行时输出。
      en: A patch fragment, commit log, bare Responses API response, or runtime output lacking feedback and source-version relationships.
      ja: feedback と元版関係を持たない patch 断片、commit log、Responses API 裸応答、実行時出力。
  semantic_kind: entity
  aliases: [revised artifact, revision output, 修订结果]
engineering:
  explanation:
    zh: 新集成应以 LangSmith correction 后持久化的新 run output、OpenAI Responses API rewrite 在 Feedback 引用下的 candidate、Self-Refine refine 步骤输出为可映射 API 形状，再写入 RevisionArtifact 并绑定 source_artifact_ref、feedback_ref、revision_activity_ref。ChangeProposal 只是未执行建议；只有 RevisionActivity 实际生成新 Artifact 后才产生 RevisionArtifact。PROV-O 的 Entity、Activity、used、wasGeneratedBy 保留计划、活动与产物边界。
    en: "New integrations should treat LangSmith-corrected run outputs, OpenAI Responses API rewrite candidates under cited Feedback, and Self-Refine refine-step outputs as mappable API shapes, then write RevisionArtifact binding source_artifact_ref, feedback_ref, and revision_activity_ref. ChangeProposal is only an unexecuted recommendation; RevisionArtifact exists only after RevisionActivity actually generates a new Artifact. PROV-O Entity, Activity, used, and wasGeneratedBy preserve plan, activity, and artifact boundaries."
    ja: LangSmith correction 後の新 run output、Feedback 引用下の OpenAI Responses API rewrite 候補、Self-Refine refine 出力を写像可能 API 形状として扱い、RevisionArtifact に source_artifact_ref、feedback_ref、revision_activity_ref を結び付ける。ChangeProposal は未実行提案のみ。RevisionActivity が新 Artifact を実際に生成した後に RevisionArtifact が存在する。PROV-O Entity/Activity/used/wasGeneratedBy が計画・活動・成果物境界を保持する。
  typical_input:
    - description: Revision activity inputs before generating a new candidate.
      format: |
        {
          "source_artifact_ref": "Artifact:answer-104",
          "feedback_refs": ["Feedback:feedback-105", "HumanFeedback:human-feedback-104"],
          "revision_activity_ref": "RevisionActivity:revise-31"
        }
      source_claims: [claim-revision-artifact-provenance]
    - description: OpenAI Responses API candidate generation that may contribute content but is not provenance alone.
      format: |
        POST /v1/responses
        {"model": "gpt-4.1-mini", "input": "Rewrite classification instructions to distinguish hardware power failures from software issues."}
      source_claims: [claim-revision-artifact-responses]
  typical_output:
    - description: Local generated revision-artifact record.
      format: |
        {
          "revision_artifact_id": "revision-105",
          "artifact_ref": "Artifact:answer-105",
          "source_artifact_ref": "Artifact:answer-104",
          "feedback_ref": "Feedback:feedback-105",
          "revision_activity_ref": "RevisionActivity:revise-31",
          "change_summary": "Clarified the Hardware classification rule for power failures."
        }
      source_claims: [claim-revision-artifact-design]
  reference_implementations:
    - name: LangSmith
      url: https://docs.smith.langchain.com
      description: Human corrections that drive revised candidate outputs after review.
    - name: OpenAI Responses API
      url: https://developers.openai.com/api/reference/resources/responses/methods/create
      description: Candidate generation interface separate from local revision provenance.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Entity, Activity, use, derivation, and generation relationships.
structure:
  identity_keys: [revision_artifact_id]
  fields:
    - id: revision_artifact_id
      labels: {zh: 修订产物标识, en: Revision artifact identifier, ja: 改訂成果物識別子}
      definitions:
        zh: 唯一标识一件产生后的可引用修订产物记录。
        en: Uniquely identifies one generated and referencable revision-artifact record.
        ja: 一件の生成済みで参照可能な改訂成果物記録を一意に識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: revision-105
      allowed_values: []
      source_claims: [claim-revision-artifact-design]
    - id: artifact_ref
      labels: {zh: 新产物引用, en: New artifact reference, ja: 新成果物参照}
      definitions:
        zh: 指向实际生成且可被后续评估的 Artifact。
        en: Reference to the actual generated Artifact available for later evaluation.
        ja: 後続評価に利用できる実際に生成された Artifact への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Artifact:answer-105
      allowed_values: []
      source_claims: [claim-revision-artifact-provenance, claim-revision-artifact-design]
    - id: source_artifact_ref
      labels: {zh: 源产物引用, en: Source artifact reference, ja: 元成果物参照}
      definitions:
        zh: 指向发生改动前被 Revision Activity 使用的 Artifact。
        en: Reference to the Artifact used by Revision Activity before modification.
        ja: 変更前に Revision Activity が使用した Artifact への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Artifact:answer-104
      allowed_values: []
      source_claims: [claim-revision-artifact-provenance]
    - id: feedback_ref
      labels: {zh: 响应反馈引用, en: Responded feedback reference, ja: 応答フィードバック参照}
      definitions:
        zh: 指向指导该次修订的一个或多个 Feedback 或 HumanFeedback 记录。
        en: Reference to one or more Feedback or HumanFeedback records that guided this revision.
        ja: この改訂を導いた Feedback 又は HumanFeedback 記録への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: Feedback:feedback-105
      allowed_values: []
      source_claims: [claim-revision-artifact-provenance]
    - id: revision_activity_ref
      labels: {zh: 修订活动引用, en: Revision activity reference, ja: 改訂活動参照}
      definitions:
        zh: 指向实际生成该新产物的有时间边界 Revision Activity。
        en: Reference to the time-bounded Revision Activity that actually generated the new artifact.
        ja: 新成果物を実際に生成した時間境界を持つ Revision Activity への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: RevisionActivity:revise-31
      allowed_values: []
      source_claims: [claim-revision-artifact-provenance]
    - id: change_summary
      labels: {zh: 变更摘要, en: Change summary, ja: 変更要約}
      definitions:
        zh: 对已生成产物相对源产物的简短可读说明，不替代内容差异或活动证据。
        en: Brief readable description of the generated artifact relative to its source and not a substitute for content diff or activity evidence.
        ja: 生成成果物を元成果物と比べた短い可読説明であり、内容差分又は活動証拠の代替ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Clarified the Hardware classification rule for power failures.
      allowed_values: []
      source_claims: [claim-revision-artifact-design]
  constraints:
    - id: revision-artifact-is-generated-not-planned
      severity: error
      expression_language: plain
      expression: revision_activity_ref must identify an occurred RevisionActivity and artifact_ref must resolve to a retained generated Artifact; a proposal alone is insufficient.
      explanation:
        zh: 计划改动和完成改动是不同事实，不能共享一个产物记录。
        en: Planned modification and completed modification are different facts and cannot share one artifact record.
        ja: 計画された変更と完了した変更は異なる事実であり、一つの成果物記録を共有できない。
      source_claims: [claim-revision-artifact-provenance, claim-revision-artifact-design]
    - id: revision-artifact-traces-inputs
      severity: error
      expression_language: plain
      expression: source_artifact_ref and feedback_ref must identify the source and feedback actually used by the generating RevisionActivity.
      explanation:
        zh: 同一项目或名称相似不构成修订因果证据。
        en: Same project membership or similar names do not establish revision causality.
        ja: 同じプロジェクト所属又は似た名前は改訂因果を確立しない。
      source_claims: [claim-revision-artifact-provenance]
  required_relations:
    - id: revision-artifact-was-generated-by-revision-activity
      direction: outgoing
      predicate: was_generated_by
      target_concept_id: RevisionActivity
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每件 RevisionArtifact 必须由恰好一个实际 Revision Activity 生成。
        en: Each RevisionArtifact must be generated by exactly one actual Revision Activity.
        ja: 各 RevisionArtifact はちょうど一つの実際の Revision Activity により生成されなければならない。
      source_claims: [claim-revision-artifact-provenance]
    - id: revision-artifact-is-derived-from-artifact
      direction: outgoing
      predicate: is_derived_from
      target_concept_id: Artifact
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每件 RevisionArtifact 必须指向它所修改的唯一源 Artifact。
        en: Each RevisionArtifact must point to the one source Artifact it modifies.
        ja: 各 RevisionArtifact は変更した一つの元 Artifact を指さなければならない。
      source_claims: [claim-revision-artifact-provenance]
examples:
  - id: revision-artifact-example-langsmith-correction
    labels:
      zh: LangSmith correction 后的修订产物
      en: Revision artifact after LangSmith correction
      ja: LangSmith correction 後の改訂成果物
    descriptions:
      zh: HumanFeedback human-feedback-104 要求增加 warranty escalation；RevisionActivity revise-31 生成 Artifact:answer-105；RevisionArtifact revision-105 记录 source_artifact_ref=Artifact:answer-104 与 feedback_ref=HumanFeedback:human-feedback-104，供后续 EvaluationRun 再评估。
      en: HumanFeedback human-feedback-104 requests warranty escalation; RevisionActivity revise-31 generates Artifact:answer-105; RevisionArtifact revision-105 records source_artifact_ref=Artifact:answer-104 and feedback_ref=HumanFeedback:human-feedback-104 for later EvaluationRun reassessment.
      ja: HumanFeedback human-feedback-104 が warranty escalation を要求。RevisionActivity revise-31 が Artifact:answer-105 を生成。RevisionArtifact revision-105 が source_artifact_ref=Artifact:answer-104 と feedback_ref=HumanFeedback:human-feedback-104 を記録し後続 EvaluationRun 再評価に供する。
    example_source:
      product: LangSmith
      url: https://docs.smith.langchain.com
      version: human annotation to revision
    field_values:
      revision_artifact_id: revision-105
      artifact_ref: Artifact:answer-105
      source_artifact_ref: Artifact:answer-104
      feedback_ref: HumanFeedback:human-feedback-104
      revision_activity_ref: RevisionActivity:revise-31
      change_summary: Added warranty escalation step after safe troubleshooting.
    related_node_ids: [RevisionArtifact, HumanFeedback, RevisionActivity, Artifact, EvaluationRun]
    related_relation_ids: [revision-artifact-was-generated-by-revision-activity, revision-artifact-is-derived-from-artifact]
    source_claims: [claim-revision-artifact-langsmith, claim-revision-artifact-provenance]
  - id: revision-artifact-example-openai-eval-prompt-fix
    labels:
      zh: OpenAI eval 失败后的 prompt 修订产物
      en: Prompt revision artifact after OpenAI eval failure
      ja: OpenAI eval 失敗後の prompt 改訂成果物
    descriptions:
      zh: Verdict verdict-string-check-fail 驱动 ChangeProposal 建议修改 system prompt；RevisionActivity revise-prompt-17 应用 Feedback openai-eval-grader-fail-001 生成 Artifact:gpt4o-ticket-classification-v2；RevisionArtifact revision-prompt-17 保留完整 provenance。
      en: Verdict verdict-string-check-fail drives ChangeProposal to adjust system prompt; RevisionActivity revise-prompt-17 applies Feedback openai-eval-grader-fail-001 and generates Artifact:gpt4o-ticket-classification-v2; RevisionArtifact revision-prompt-17 retains full provenance.
      ja: Verdict verdict-string-check-fail が ChangeProposal で system prompt 調整を促す。RevisionActivity revise-prompt-17 が Feedback openai-eval-grader-fail-001 を適用し Artifact:gpt4o-ticket-classification-v2 を生成。RevisionArtifact revision-prompt-17 が完全 provenance を保持する。
    example_source:
      product: OpenAI Agent Evals
      url: https://platform.openai.com/docs/guides/evals
      version: grader failure to revision
    field_values:
      revision_artifact_id: revision-prompt-17
      artifact_ref: Artifact:gpt4o-ticket-classification-v2
      source_artifact_ref: Artifact:gpt4o-ticket-classification
      feedback_ref: Feedback:openai-eval-grader-fail-001
      revision_activity_ref: RevisionActivity:revise-prompt-17
      change_summary: Added explicit Hardware power-failure examples to system prompt.
    related_node_ids: [RevisionArtifact, Feedback, Verdict, ChangeProposal, EvaluationRun]
    related_relation_ids: [revision-artifact-was-generated-by-revision-activity]
    source_claims: [claim-revision-artifact-openai-evals, claim-revision-artifact-design]
  - id: revision-artifact-example-self-refine-loop
    labels:
      zh: Self-Refine generate→feedback→refine 产物
      en: Self-Refine generate→feedback→refine artifact
      ja: Self-Refine generate→feedback→refine 成果物
    descriptions:
      zh: 初始 Artifact:draft-221 经 Feedback self-critique-221 批评后，RevisionActivity refine-221 生成 Artifact:draft-221-v2；RevisionArtifact revision-221 记录 change_summary，体现 generate→feedback→refine 闭环，不是未执行提议。
      en: Initial Artifact:draft-221 receives Feedback self-critique-221; RevisionActivity refine-221 generates Artifact:draft-221-v2; RevisionArtifact revision-221 records change_summary for a generate→feedback→refine loop, not an unexecuted proposal.
      ja: 初期 Artifact:draft-221 が Feedback self-critique-221 を受け、RevisionActivity refine-221 が Artifact:draft-221-v2 を生成。RevisionArtifact revision-221 が change_summary を記録し generate→feedback→refine ループを示す。未実行提案ではない。
    example_source:
      product: Self-Refine
      url: https://arxiv.org/abs/2305.08164
      version: generate feedback refine loop
    field_values:
      revision_artifact_id: revision-221
      artifact_ref: Artifact:draft-221-v2
      source_artifact_ref: Artifact:draft-221
      feedback_ref: Feedback:self-critique-221
      revision_activity_ref: RevisionActivity:refine-221
      change_summary: Improved factual grounding and removed unsupported claims.
    related_node_ids: [RevisionArtifact, Feedback, RevisionActivity, Artifact]
    related_relation_ids: [revision-artifact-is-derived-from-artifact]
    source_claims: [claim-revision-artifact-design]
  - id: revision-artifact-counterexample-proposal-only
    labels:
      zh: 只有 ChangeProposal 没有产物
      en: ChangeProposal only with no artifact
      ja: ChangeProposal のみで成果物なし
    descriptions:
      zh: ChangeProposal proposal-105 有 evidence_ref 但 revision_activity_ref 为空且 artifact_ref 未生成；不能登记为 RevisionArtifact，因为修订尚未发生。
      en: ChangeProposal proposal-105 has evidence_ref but revision_activity_ref is empty and artifact_ref was not generated; cannot register as RevisionArtifact because revision has not occurred.
      ja: ChangeProposal proposal-105 に evidence_ref はあるが revision_activity_ref が空で artifact_ref 未生成。改訂未発生のため RevisionArtifact として登録できない。
    example_source:
      product: Moonweave feedback boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: proposal vs artifact boundary
    field_values:
      revision_artifact_id: null
      artifact_ref: null
      source_artifact_ref: Artifact:answer-104
      feedback_ref: Feedback:feedback-105
      revision_activity_ref: null
      change_summary: null
    related_node_ids: [RevisionArtifact, ChangeProposal]
    related_relation_ids: []
    source_claims: [claim-revision-artifact-design]
  - id: revision-artifact-boundary-responses-only
    labels:
      zh: Responses API 裸响应不是修订产物
      en: Bare Responses API response is not revision artifact
      ja: Responses API 裸応答は改訂成果物ではない
    descriptions:
      zh: POST /v1/responses 返回 rewrite 文本但无 source_artifact_ref、feedback_ref、revision_activity_ref；不能登记为 RevisionArtifact，因为缺少 PROV-O 要求的生成与使用证据链。
      en: POST /v1/responses returns rewrite text but lacks source_artifact_ref, feedback_ref, and revision_activity_ref; cannot register as RevisionArtifact because PROV-O generation and use evidence chain is missing.
      ja: POST /v1/responses が rewrite 文本を返すが source_artifact_ref、feedback_ref、revision_activity_ref がない。PROV-O 要求の生成・使用証拠連鎖がないため RevisionArtifact として登録できない。
    example_source:
      product: OpenAI Responses API
      url: https://developers.openai.com/api/reference/resources/responses/methods/create
      version: response without provenance
    field_values:
      revision_artifact_id: null
      artifact_ref: null
      source_artifact_ref: null
      feedback_ref: null
      revision_activity_ref: null
      change_summary: null
    related_node_ids: [RevisionArtifact, RevisionActivity]
    related_relation_ids: []
    source_claims: [claim-revision-artifact-responses, claim-revision-artifact-design]
parent_relation: null
relations:
  - id: RevisionArtifact-isDerivedFrom-Artifact
    predicate: is_derived_from
    target: concept:Artifact
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 修订产物派生自源产物, en: revision artifact is derived from artifact, ja: 改訂成果物が成果物から派生する}
    definitions:
      zh: 新产物相对于指定源 Artifact 产生，不能只根据名称相似推断。
      en: New artifact is produced relative to a specified source Artifact and cannot be inferred only from similar naming.
      ja: 新成果物は指定の元 Artifact を基に生成され、似た名前だけから推論してはならない。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_source_for_revision
      labels: {zh: 源产物用于修订, en: artifact is source for revision, ja: 成果物が改訂の元である}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-revision-artifact-provenance]
    distinct_fact_rationale:
      zh: 该关系记录版本来源，不替代 Feedback 的理由关系。
      en: This relation records version provenance and does not replace Feedback rationale relationship.
      ja: この関係は版来歴を記録し、Feedback の理由関係を置き換えない。
    layout_role: cross-link
sources:
  - id: langsmith-revision-artifact
    title: LangSmith Documentation
    url: https://docs.smith.langchain.com
    source_type: official-doc
    relevance: Human corrections that drive revised outputs after annotation review.
  - id: openai-evals-revision-artifact
    title: OpenAI Agent Evals
    url: https://platform.openai.com/docs/guides/evals
    source_type: official-doc
    relevance: Grader failures as feedback basis for prompt revision artifacts.
  - id: openai-responses-revision-artifact
    title: OpenAI Responses API create reference
    url: https://developers.openai.com/api/reference/resources/responses/methods/create
    source_type: official-doc
    relevance: Candidate generation separate from local revision-artifact provenance.
  - id: prov-o-revision-artifact
    title: W3C PROV-O
