              en: Ontology review confirms that CorrectionActivity-followed_by-EvaluationRun is the only accepted cross-boundary edge for this module pair; the two internal evaluation edges and non-endpoint Score are removed.
              ja: 本体審査によりこの module pair の承認済み境界辺は CorrectionActivity-followed_by-EvaluationRun の一つだけであり、二つの evaluation 内部辺と非 endpoint の Score を除外したことを確認しました。
    - other_module_id: feedback-metrics-evaluation
