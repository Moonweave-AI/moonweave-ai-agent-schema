          zh: ReviewActivity 生成持久 Review 与 ReviewEvidenceArtifact；Review 组成 ReviewFinding，finding 可支持 ReviewDerivedFeedback，CorrectionActivity 另行生成 RevisionArtifact。
          en: ReviewActivity generates persistent Review and ReviewEvidenceArtifact records; Review composes ReviewFindings, a finding may support ReviewDerivedFeedback, and CorrectionActivity separately generates RevisionArtifacts.
          ja: ReviewActivity は持続 Review・ReviewEvidenceArtifact を生成し、Review は ReviewFinding を構成し、finding は ReviewDerivedFeedback を support でき、CorrectionActivity は別途 RevisionArtifact を生成します。
