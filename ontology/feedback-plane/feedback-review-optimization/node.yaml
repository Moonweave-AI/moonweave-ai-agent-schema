schema: moonweave.ai/ontology-node/v1
id: feedback-review-optimization
kind: module
status: accepted
labels:
  zh: 审查、反馈与纠正
  en: Review, feedback, and correction
  ja: 審査・フィードバック・修正
semantics:
  short_definition:
    zh: 将一次审查从发生到纠正组织成可追溯链：ReviewActivity 执行审查，Review 持久保存结论和 ReviewFinding，Feedback 把发现转成面向接收者的行动信息，FeedbackEvent 记录投递，RevisionPlan 或 RecoveryPlan 规定处置，CorrectionActivity 实际执行修改、恢复或回滚。
    en: Organizes one review from occurrence to correction as a traceable chain. ReviewActivity performs the review; Review persists conclusions and ReviewFindings; Feedback turns findings into actionable information for a recipient; FeedbackEvent records delivery; RevisionPlan or RecoveryPlan prescribes remediation; and CorrectionActivity performs a modification, recovery, or rollback.
    ja: 一回の審査を発生から修正まで追跡可能な連鎖として整理します。ReviewActivity が審査を実行し、Review が結論と ReviewFinding を永続化し、Feedback が所見を受領者向け行動情報へ変換し、FeedbackEvent が配信を記録し、RevisionPlan／RecoveryPlan が処置を規定し、CorrectionActivity が修訂・復旧・rollback を実行します。
  definition:
    zh: 本模块严格区分活动、记录、发现、反馈、计划与产物角色。ReviewActivity 和 CorrectionActivity 是有时界的发生；Review 是持久审查记录，ReviewFinding 是其中可独立处置的原子发现；Feedback 是信息内容，FeedbackEvent 是其投递发生；RevisionPlan 与 RecoveryPlan 是尚待执行的规范。ReviewEvidenceArtifact 和 RevisionArtifact 当前作为直属概念存在，但它们的持久身份仍应由 runtime-artifacts 的 Artifact 统一拥有，本模块只声明“作为审查证据”或“作为修订版本”的角色及生成关系，概念层级需后续校正。
    en: This module strictly separates activities, records, findings, feedback, plans, and artifact roles. ReviewActivity and CorrectionActivity are time-bounded occurrences; Review is a persistent review record and ReviewFinding is an independently actionable atomic finding within it; Feedback is information content and FeedbackEvent is its delivery occurrence; RevisionPlan and RecoveryPlan are specifications not yet executed. ReviewEvidenceArtifact and RevisionArtifact currently exist as direct concepts, but persistent identity should remain unified under runtime-artifacts' Artifact; this module should state only their roles as review evidence or revised version and their generation relations, so the concept hierarchy needs later correction.
    ja: 本モジュールは activity・record・finding・feedback・plan・artifact role を厳密に分離します。ReviewActivity と CorrectionActivity は時間範囲を持つ発生、Review は永続審査記録、ReviewFinding は独立処置可能な原子所見、Feedback は情報内容、FeedbackEvent は配信発生、RevisionPlan と RecoveryPlan は未実行仕様です。ReviewEvidenceArtifact と RevisionArtifact は現在直下概念ですが、永続同一性は runtime-artifacts の Artifact が統一所有し、本モジュールは「審査証拠」「修訂版」という役割と生成関係だけを示すべきため、概念階層は後続校正が必要です。
  why_needed:
    zh: 使每项纠正都能追溯到具体审查、原子发现、已投递反馈和获准计划，并避免把批评文本误当成已完成修正、把计划误当成已经执行。
    en: Makes every correction traceable to a concrete review, atomic finding, delivered feedback, and approved plan without mistaking critique text for a completed fix or a plan for executed work.
    ja: 各修正を具体的審査・原子所見・配信済み feedback・承認 plan へ追跡し、批評文を完了修正、plan を実行済み作業と誤認しないために必要です。
  includes:
    - zh: 人工与自动审查活动、审查记录、发现与证据产物。
      en: Human and automated review activities, review records, findings, and evidence artifacts.
      ja: 人手・自動審査活動、審査記録、所見、証拠成果物。
    - zh: 反馈投递、修订与恢复计划、纠正、恢复、回滚及修订产物。
      en: Feedback delivery, revision and recovery plans, correction, recovery, rollback, and revision artifacts.
      ja: Feedback 配信、改訂・復旧計画、修正、復旧、ロールバック、改訂成果物。
  excludes:
    - zh: Metric、Measurement、EvaluationSpecification 与 EvaluationRun；它们属于评估与测量，本模块只引用复评运行及其结论。
      en: Metric, Measurement, EvaluationSpecification, and EvaluationRun; they belong to evaluation and measurement, while this module references re-evaluation runs and conclusions.
      ja: Metric・Measurement・EvaluationSpecification・EvaluationRun。これらは評価と測定に属し、本モジュールは再評価 run と結論を参照します。
    - zh: 跨运行候选搜索、OptimizationTarget、LearningSignal 和 ChangeProposal；它们属于优化与学习，提案被批准执行后才可触发本模块的纠正活动。
      en: Cross-run candidate search, OptimizationTarget, LearningSignal, and ChangeProposal; they belong to optimization and learning, and only an approved proposal may trigger a correction activity here.
      ja: 実行横断 candidate search・OptimizationTarget・LearningSignal・ChangeProposal。これらは最適化と学習に属し、承認済み提案だけが本モジュールの correction activity を起動できます。
    - zh: Artifact 的持久身份、版本和摘要；审查证据与修订版本是 Artifact 在本流程中的角色，不应另造重复身份。
      en: Persistent Artifact identity, revision, and digest; review evidence and revised versions are roles played by Artifacts in this process and should not create duplicate identities.
      ja: Artifact の永続同一性・版・digest。審査証拠と修訂版は本過程で Artifact が担う役割で、重複同一性を作るべきではありません。
  semantic_kind: null
  aliases: []
purpose:
  zh: 使每项纠正都能追溯到具体审查、原子发现、已投递反馈和获准计划，并避免把批评文本误当成已完成修正、把计划误当成已经执行。
  en: Makes every correction traceable to a concrete review, atomic finding, delivered feedback, and approved plan without mistaking critique text for a completed fix or a plan for executed work.
  ja: 各修正を具体的審査・原子所見・配信済み feedback・承認 plan へ追跡し、批評文を完了修正、plan を実行済み作業と誤認しないために必要です。
