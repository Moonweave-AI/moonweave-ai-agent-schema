    related_relation_ids: []

    source_claims: [claim-feedback-revision-module-design]
  - id: feedback-revision-module-boundary-proposal

    labels: {zh: 修改提议与修订产物的边界, en: Boundary between proposal and revision artifact, ja: 提案と改訂成果物の境界}

    descriptions:
      zh: "faithfulness measures grounding; latency is cost; feedback-review-optimization must not treat wall-clock as faithfulness."
      en: "faithfulness measures grounding; latency is cost; feedback-review-optimization must not treat wall-clock as faithfulness."
      ja: "Latency not faithfulness."
    field_values: {id: feedback-review-optimization, execution_boundary: entities-only}
    related_node_ids: [ChangeProposal, RevisionArtifact, RevisionActivity]
    related_relation_ids: []

    source_claims: [claim-feedback-revision-module-provenance]
