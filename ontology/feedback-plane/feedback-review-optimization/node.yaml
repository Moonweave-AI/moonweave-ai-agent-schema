          - CorrectionActivity
          - EvaluationRun
          - RecoveryPlan
          - FailureMode
        relation_ids:
          - Feedback-motivates-CorrectionActivity
          - RevisionPlan-governs-CorrectionActivity
          - CorrectionActivity-followed_by-EvaluationRun
          - RecoveryPlan-addresses-FailureMode
        not_applicable_reason: null
    review:
      review_status: accepted
