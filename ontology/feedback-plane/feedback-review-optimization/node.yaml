      candidate_concept_ids:
        - ChangeProposal
        - LearningSignal
      overlap_reason:
        zh: 两者都可能提出变更，但纠正绑定具体 Finding 和验收条件，优化提案绑定目标趋势和多轮学习信号。 本条仅记录 ChangeProposal、LearningSignal；其 canonical owner 是优化与学习（feedback-optimization-learning），因此 feedback-review-optimization 在此引用这些概念。
        en: Both may propose change, but correction is tied to a specific Finding and acceptance criterion while an optimization proposal is tied to a target trend and multi-round learning signals. This record is limited to ChangeProposal, LearningSignal; their canonical owner is Optimization and learning (feedback-optimization-learning), so feedback-review-optimization references these concepts here.
        ja: どちらも変更を提案し得ますが、修正は特定 Finding と受入基準、最適化提案は目標傾向と複数回の学習信号に結び付きます。 この記録は ChangeProposal、LearningSignal だけを対象とし、canonical owner は最適化と学習（feedback-optimization-learning）です。したがって feedback-review-optimization はここでこれらを参照します。
      disambiguation_test:
        zh: 若完成条件是关闭一条已识别 Finding，则归审查与纠正；若完成条件是改善跨运行目标并需聚合信号，则归优化与学习。
        en: If completion means closing an identified Finding, it belongs to review and correction; if it means improving a cross-run target from aggregated signals, it belongs to optimization and learning.
