      subject_concept_ids:
        - EvaluationRun
      decision: references
      owner_module_id: feedback-metrics-evaluation
      rationale:
        zh: 两个模块之间唯一的 accepted 事实是 CorrectionActivity-followed_by-EvaluationRun，它要求复评运行明确引用被修订版本，而非仅在时间上随后发生。因此评估侧的边界端点只有 EvaluationRun；EvaluationRun-has_result-Measurement 与 Measurement-observation_of-Metric 都是评估模块内部结构，Score 也不是该跨界边端点。
        en: The only accepted fact between these modules is CorrectionActivity-followed_by-EvaluationRun, which requires the reevaluation run to reference the revised version rather than merely occur later. Therefore the sole evaluation-side boundary endpoint is EvaluationRun; EvaluationRun-has_result-Measurement and Measurement-observation_of-Metric are internal evaluation structure, and Score is not an endpoint of the cross-boundary edge.
        ja: 両 module 間の唯一の承認済み事実は CorrectionActivity-followed_by-EvaluationRun であり、再評価 run が単に後続するだけでなく改訂版を明示参照することを要求します。したがって evaluation 側の境界 endpoint は EvaluationRun のみです。EvaluationRun-has_result-Measurement と Measurement-observation_of-Metric は evaluation 内部構造で、Score も境界辺の endpoint ではありません。
