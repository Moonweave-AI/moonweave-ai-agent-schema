              en: Ontology review computes the owner endpoint from the sole accepted edge and obtains exactly CorrectionActivity; internal evaluation relations cannot expand this row.
              ja: 本体審査では唯一の承認済み辺から owner endpoint を算出し、CorrectionActivity のみを得ます。evaluation 内部関係は本行を拡張できません。
