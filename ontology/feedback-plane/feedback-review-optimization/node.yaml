  key_notion:
    zh: 从审查发现到已验证纠正
    en: review finding to verified correction
    ja: 審査所見から検証済み修正まで
  owns_when:
    zh: 当对象是一次审查或纠正活动、审查记录及其原子发现、面向接收者的反馈及投递事件，或针对这些发现的修订/恢复计划时，由本模块拥有。
    en: Own an object when it is a review or correction activity, a review record and its atomic findings, recipient-directed feedback and its delivery event, or a revision or recovery plan addressing those findings.
    ja: 対象が一回の review/correction activity、審査記録と原子所見、受領者向け feedback と配信 event、または所見に対応する revision/recovery plan である場合に所有します。
  references_when:
    zh: 评价运行与测量、跨运行优化、故障分类、实际 Actor 和持久 Artifact 均引用其规范所有者；本模块用关系把它们连接到审查、反馈、计划、纠正和复验链，而不复制同一对象。
    en: Evaluation runs and measurements, cross-run optimization, failure classifications, concrete Actors, and persistent Artifacts reference their canonical owners. This module relates them to the review, feedback, plan, correction, and re-evaluation chain without copying the same object.
    ja: evaluation run/measurement・実行横断 optimization・failure classification・実 Actor・永続 Artifact は正規所有者を参照します。本モジュールは同一対象を複製せず、review・feedback・plan・correction・re-evaluation 連鎖へ関係で接続します。
