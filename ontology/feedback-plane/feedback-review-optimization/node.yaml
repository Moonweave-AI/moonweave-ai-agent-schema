        relation_ids: []
        not_applicable_reason:
          zh: 该本体不负责判定运行失败。优化循环汇总多次审查，或故障诊断引用已验证的纠正结果时，引用这里的 Finding 与处置链。
          en: This ontology does not own runtime-failure adjudication. Optimization loops reference Findings and disposition chains here when aggregating reviews, and diagnostics reference them when citing verified corrective results.
          ja: このオントロジーは実行失敗の判定を所有しません。最適化ループが複数レビューを集約するとき、また診断が検証済み修正結果を引用するとき、ここで定義した Finding と処置連鎖を参照します。
      recovery:
        applicable: true
        description:
          zh: 审查与纠正的恢复面同时区分计划适用性与执行闭环：RecoveryPlan —addresses→ FailureMode 声明可复用计划覆盖的故障分类；Feedback、RevisionPlan、CorrectionActivity 与后续 EvaluationRun 则证明一次具体纠正是否完成并通过复验。
          en: "The recovery facet of review and correction separates plan applicability from execution closure: RecoveryPlan —addresses→ FailureMode declares the failure classification covered by a reusable plan, while Feedback, RevisionPlan, CorrectionActivity, and the following EvaluationRun establish whether a concrete correction completed and passed reevaluation."
          ja: レビューと修正の復旧面は計画適用性と実行閉包を分けます。RecoveryPlan —addresses→ FailureMode は再利用可能な計画が対象とする故障分類を示し、Feedback・RevisionPlan・CorrectionActivity・後続 EvaluationRun は具体的修正の完了と再評価合格を立証します。
