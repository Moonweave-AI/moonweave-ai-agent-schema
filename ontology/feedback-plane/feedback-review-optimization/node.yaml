        - CorrectionActivity
      decision: owns
      owner_module_id: feedback-review-optimization
      rationale:
        zh: 唯一 accepted 跨界边的审查侧端点是 CorrectionActivity：它是具有起止时间、执行者、基线版本、实际差异与回滚点的纠正发生。Feedback 是可复用信息，Correction 是抽象层级；二者均不是 CorrectionActivity-followed_by-EvaluationRun 的端点。
        en: "The review-side endpoint of the only accepted cross-boundary edge is CorrectionActivity: a correction occurrence with time bounds, executor, baseline version, applied diff, and rollback point. Feedback is reusable information and Correction is an abstraction level; neither is an endpoint of CorrectionActivity-followed_by-EvaluationRun."
        ja: 唯一の承認済み境界辺における review 側 endpoint は CorrectionActivity です。これは時間範囲、executor、baseline version、applied diff、rollback point を持つ correction occurrence です。Feedback は再利用情報、Correction は抽象階層であり、いずれも CorrectionActivity-followed_by-EvaluationRun の endpoint ではありません。
