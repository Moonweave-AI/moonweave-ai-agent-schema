              en: Domain review confirms that the reevaluation run itself is owned by feedback-metrics-evaluation; Measurement, Metric, and Score are internal result semantics of that run and do not become endpoints of this boundary row through sequencing.
              ja: ドメイン審査により再評価 run 自体は feedback-metrics-evaluation が所有し、Measurement・Metric・Score は run 内部の結果意味であり、順序関係によって本境界行の endpoint にはならないことを確認しました。
