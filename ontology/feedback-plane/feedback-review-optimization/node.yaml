examples:
  - id: feedback-review-optimization-cq-finding-to-correction-v4-example-positive
    kind: positive
    labels:
      zh: ReviewFinding 支撑哪条审查派生反馈，并由该反馈促成哪次纠正活动？：正例
      en: "Which ReviewDerivedFeedback does a ReviewFinding support, and which CorrectionActivity does that feedback motivate?: positive case"
      ja: ReviewFinding はどの ReviewDerivedFeedback を支援し、その feedback はどの CorrectionActivity を動機付けますか。：正例
    scenario_id: null
    descriptions:
      zh: 审查发现 rf-2 引用 span s-81，并通过 supports 明确支撑带审查出处的反馈 rdfb-8；rdfb-8 作为 Feedback 的下位类型再促成纠正活动 c-11，三者都指向产物 a-19@3。
      en: Review finding rf-2 cites span s-81 and explicitly supports review-derived feedback rdfb-8; rdfb-8 is a Feedback subtype that then motivates correction activity c-11, with all three records scoped to artifact a-19@3.
      ja: レビュー所見 rf-2 は span s-81 を引用して review-derived feedback rdfb-8 を明示的に supports します。Feedback 下位型 rdfb-8 が correction activity c-11 を動機付け、三記録は artifact a-19@3 を対象にします。
    field_values:
      review_finding_id: rf-2
      evidence_span_id: s-81
      reviewed_artifact_id: a-19
      reviewed_artifact_version: "3"
      feedback_id: rdfb-8
      feedback_provenance_kind: review-derived
      correction_activity_id: c-11
      support_relation_id: ReviewFinding-supports-ReviewDerivedFeedback
      motivation_relation_id: Feedback-motivates-CorrectionActivity
    related_node_ids:
      - ReviewFinding
      - ReviewDerivedFeedback
      - Feedback
      - CorrectionActivity
    related_relation_ids:
      - ReviewFinding-supports-ReviewDerivedFeedback
      - ReviewDerivedFeedback-is_a-Feedback
      - Feedback-motivates-CorrectionActivity
    expected_result:
      zh: 查询返回 rf-2 → rdfb-8 → c-11 的完整链，并明确 rdfb-8 是带审查出处的 Feedback，而非任意反馈。
      en: The query returns the complete rf-2 → rdfb-8 → c-11 chain and identifies rdfb-8 as review-derived rather than arbitrary Feedback.
      ja: 照会は rf-2 → rdfb-8 → c-11 の完全な連鎖を返し、rdfb-8 が任意 Feedback ではなく review-derived であることも示します。
    why_valid_or_invalid:
      zh: 发现、审查来源反馈与纠正活动保留三个身份层级；supports 只建立审查出处，is_a 保留类型层级，motivates 才连接到具体纠正活动。
      en: "Finding, review-derived feedback, and correction activity retain three identity levels: supports establishes review provenance, is_a preserves the subtype level, and motivates links the feedback to a concrete correction."
      ja: 所見、review-derived feedback、correction activity は三つの ID 層を保持します。supports は review provenance、is_a は型階層、motivates は具体的 correction への動機付けを表します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-feedback-review-optimization-003
