    descriptions:
      zh: "OpenAI Evals instance: string_check eq Hardware->run completed->feedback-review-optimization eval_id=it-ticket-v1."
      en: "OpenAI Evals instance: string_check eq Hardware->run completed->feedback-review-optimization eval_id=it-ticket-v1."
      ja: "OpenAI Evals instance maps to feedback-review-optimization Run."
    field_values: {id: feedback-review-optimization, execution_boundary: entities-only}
    related_node_ids: [Feedback, HumanFeedback, RevisionArtifact, Verdict]
    related_relation_ids: []

    source_claims: [claim-feedback-revision-module-design]
parent_relation: null
relations: []
