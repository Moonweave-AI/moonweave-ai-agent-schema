      en: "InstructGPT (Ouyang et al., 2022) RLHF: SFT -> human-ranked RM r_theta(x,y) -> PPO; ~13k demos + 33k comparisons; feedback-review-optimization maps supervised/preference data-prep boundary."
      ja: "InstructGPT SFT->RM->PPO; feedback-review-optimization data prep boundary."
    field_values: {id: feedback-review-optimization, execution_boundary: entities-only}
    related_node_ids: [Feedback, RevisionArtifact, EvaluationActivity, RevisionActivity]
    related_relation_ids: []

    source_claims: [claim-feedback-revision-module-provenance]
  - id: feedback-revision-module-counterexample-log-bucket

    labels: {zh: 将日志桶称为反馈模块, en: Calling a log bucket feedback module, ja: ログバケットをフィードバックモジュールと呼ぶ}

    descriptions:
      zh: "Missing environment_id cannot serve as AgentBench-style feedback-review-optimization."
      en: "Missing environment_id cannot serve as AgentBench-style feedback-review-optimization."
      ja: "Missing environment_id rejects AgentBench-style feedback-review-optimization."
    field_values: {id: null, execution_boundary: null}
