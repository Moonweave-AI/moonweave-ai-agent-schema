          en: ReviewActivity examines an exact Artifact version as input; Review records and ReviewFindings are outcomes and cannot act as the reviewing subject.
          ja: ReviewActivity は正確な Artifact 版を入力として検査し Review 記録・ReviewFinding は結果で審査主体にはなりません。
