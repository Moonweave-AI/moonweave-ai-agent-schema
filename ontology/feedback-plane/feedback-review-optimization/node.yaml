    - other_module_id: feedback-optimization-learning
      subject_concept_ids:
        - ChangeProposal
        - LearningSignal
        - OptimizationTarget
      decision: references
      owner_module_id: feedback-optimization-learning
      rationale:
        zh: 完整跨界事实仅有 ChangeProposal-guides-CorrectionActivity、LearningSignal-derived_from-Feedback 与 ReviewActivity-evaluates-OptimizationTarget，因此优化与学习侧端点严格为 ChangeProposal、LearningSignal 与 OptimizationTarget。OptimizationLoop 的 consumes 边是内部流程；FeedbackEvent 的 informs 边通向 orchestration-evaluation，二者均不属于本模块对。
        en: The complete cross-boundary fact set consists only of ChangeProposal-guides-CorrectionActivity, LearningSignal-derived_from-Feedback, and ReviewActivity-evaluates-OptimizationTarget, so the optimization-and-learning endpoints are exactly ChangeProposal, LearningSignal, and OptimizationTarget. OptimizationLoop's consumes edge is internal, while FeedbackEvent's informs edge targets orchestration-evaluation; neither belongs to this module pair.
        ja: 完全な境界事実集合は ChangeProposal-guides-CorrectionActivity、LearningSignal-derived_from-Feedback、ReviewActivity-evaluates-OptimizationTarget のみであり、optimization/learning 側 endpoint は ChangeProposal、LearningSignal、OptimizationTarget に限られます。OptimizationLoop の consumes 辺は内部、FeedbackEvent の informs 辺は orchestration-evaluation 向けであり、どちらも本 module pair には属しません。
      relation_ids:
        - ChangeProposal-guides-CorrectionActivity
        - LearningSignal-derived_from-Feedback
        - ReviewActivity-evaluates-OptimizationTarget
      relation_not_applicable_reason: null
      source_claims:
        - claim-feedback-review-optimization-012
        - claim-feedback-review-optimization-013
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-feedback-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 领域复核确认优化侧跨界端点只有 ChangeProposal、LearningSignal 与 OptimizationTarget；OptimizationLoop 保留为内部活动，FeedbackEvent 保留为通向编排路由的投递事件。
              en: Domain review confirms that the optimization-side boundary endpoints are only ChangeProposal, LearningSignal, and OptimizationTarget; OptimizationLoop remains an internal activity and FeedbackEvent remains a delivery event connected to orchestration routing.
              ja: ドメイン審査により optimization 側の境界 endpoint は ChangeProposal、LearningSignal、OptimizationTarget のみで、OptimizationLoop は内部 activity、FeedbackEvent は orchestration routing に接続する配信 event に留まることを確認しました。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 本体复核确认三条 accepted 边完整且仅跨越当前模块对；内部 OptimizationLoop 边及连接第三模块的 FeedbackEvent 边已明确排除。
              en: Ontology review confirms that the three accepted edges completely and exclusively cross the current module pair; the internal OptimizationLoop edge and the FeedbackEvent edge to a third module are explicitly excluded.
              ja: 本体審査により三つの承認済み辺が現在の module pair を完全かつ排他的に横断し、内部 OptimizationLoop 辺と第三 module への FeedbackEvent 辺を明示的に除外したことを確認しました。
    - other_module_id: feedback-optimization-learning
      subject_concept_ids:
        - CorrectionActivity
        - Feedback
        - ReviewActivity
      decision: owns
      owner_module_id: feedback-review-optimization
      rationale:
        zh: 三条 accepted 跨界事实的审查侧端点并集严格为 CorrectionActivity、Feedback 与 ReviewActivity：提案指导纠正、学习信号派生自反馈、审查活动评审优化目标。FeedbackEvent 不是其中任何一条边的端点，其投递与路由身份不能被泛化为本模块对证据。
        en: "The review-side endpoint union of the three accepted cross-boundary facts is exactly CorrectionActivity, Feedback, and ReviewActivity: a proposal guides correction, a learning signal derives from feedback, and a review activity evaluates an optimization target. FeedbackEvent is not an endpoint of any of those edges, and its delivery/routing identity cannot be generalized into evidence for this module pair."
        ja: 三つの承認済み境界事実における review 側 endpoint 和集合は CorrectionActivity、Feedback、ReviewActivity に厳密に限られます。proposal は correction を導き、learning signal は feedback から導出され、review activity は optimization target を審査します。FeedbackEvent はいずれの辺の endpoint でもなく、その配信・routing identity を本 module pair の証拠へ一般化できません。
      relation_ids:
        - ChangeProposal-guides-CorrectionActivity
        - LearningSignal-derived_from-Feedback
        - ReviewActivity-evaluates-OptimizationTarget
      relation_not_applicable_reason: null
      source_claims:
        - claim-feedback-review-optimization-014
        - claim-feedback-review-optimization-015
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-feedback-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 领域复核确认审查侧完整端点为 CorrectionActivity、Feedback 与 ReviewActivity；FeedbackEvent 的事件身份不由这三条跨界事实定义。
              en: Domain review confirms that the complete review-side endpoints are CorrectionActivity, Feedback, and ReviewActivity; these three cross-boundary facts do not define FeedbackEvent's event identity.
              ja: ドメイン審査により review 側の完全な endpoint は CorrectionActivity、Feedback、ReviewActivity であり、この三つの境界事実は FeedbackEvent の event identity を定義しないことを確認しました。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 本体复核按三条 accepted 跨界边的 owner 端点并集生成本行；任何内部边或连接第三模块的边均不参与。
              en: Ontology review derives this row from the owner-side endpoint union of the three accepted cross-boundary edges; no internal edge or edge to a third module participates.
              ja: 本体審査では三つの承認済み境界辺の owner 側 endpoint 和集合から本行を生成し、内部辺や第三 module への辺は参加しないことを確認しました。
    - other_module_id: feedback-warning-error
      subject_concept_ids:
        - RecoveryAction
        - RecoveryPlan
        - ReviewFinding
      decision: owns
      owner_module_id: feedback-review-optimization
      rationale:
