          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 人工复核确认唯一审查发生为 ReviewActivity；活动检查 Artifact，生成 Review 与证据，发现形成 Feedback，Feedback 再促成受计划治理并接受复评的 CorrectionActivity。
            en: "Manual review confirms ReviewActivity as the sole review occurrence: it examines Artifact, generates Review and evidence, findings support Feedback, and Feedback motivates plan-governed, re-evaluated CorrectionActivity."
            ja: 手動審査は ReviewActivity を唯一審査発生とし Artifact 検査、Review・証拠生成、所見から Feedback、計画統制・再評価付き CorrectionActivity への連鎖を確認しました。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 人工复核确认唯一审查发生为 ReviewActivity；活动检查 Artifact，生成 Review 与证据，发现形成 Feedback，Feedback 再促成受计划治理并接受复评的 CorrectionActivity。
            en: "Manual review confirms ReviewActivity as the sole review occurrence: it examines Artifact, generates Review and evidence, findings support Feedback, and Feedback motivates plan-governed, re-evaluated CorrectionActivity."
            ja: 手動審査は ReviewActivity を唯一審査発生とし Artifact 検査、Review・証拠生成、所見から Feedback、計画統制・再評価付き CorrectionActivity への連鎖を確認しました。
  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - ReviewActivity
    allowed_backbone_predicates:
      - contains_finding
      - is_a
    flat_root_exception_concept_ids:
      - CorrectionActivity
      - Feedback
      - FeedbackEvent
      - RecoveryPlan
      - Review
      - ReviewEvidenceArtifact
      - RevisionArtifact
      - RevisionPlan
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-feedback-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐点核验后，ReviewActivity、Review、Feedback、FeedbackEvent、RevisionPlan、CorrectionActivity、RecoveryPlan、RevisionArtifact 与 ReviewEvidenceArtifact 均按各自发生、记录、内容、规范或制品身份独立组织。Review 通过 contains_finding 构成 ReviewFinding；Feedback、CorrectionActivity 与 ReviewEvidenceArtifact 再通过真实 is_a 展开下位类。produces、carries、governs 与 addresses 仅保留流程事实。
            en: Point-by-point review organizes ReviewActivity, Review, Feedback, FeedbackEvent, RevisionPlan, CorrectionActivity, RecoveryPlan, RevisionArtifact, and ReviewEvidenceArtifact independently by occurrence, record, content, specification, or artifact identity. Review composes ReviewFinding through contains_finding; Feedback, CorrectionActivity, and ReviewEvidenceArtifact expand subtypes through genuine is_a. produces, carries, governs, and addresses remain workflow facts only.
            ja: 個別審査後、ReviewActivity・Review・Feedback・FeedbackEvent・RevisionPlan・CorrectionActivity・RecoveryPlan・RevisionArtifact・ReviewEvidenceArtifact を occurrence・record・content・specification・artifact identity ごとに独立編成します。Review は contains_finding で ReviewFinding を構成し、Feedback・CorrectionActivity・ReviewEvidenceArtifact は真正な is_a で subtype を展開します。produces・carries・governs・addresses は workflow fact だけです。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 结构审查保留多个诚实身份根，不再用活动产出、内容携带、计划治理或反馈寻址制造跨种类父链。主骨架仅包含真实 is_a 与 Review-contains_finding-ReviewFinding；其余关系保持 canonical cross-link，供流程追溯而不塑造社区。
            en: Structure review retains multiple honest identity roots and no longer fabricates cross-kind parent chains from activity output, content carriage, plan governance, or feedback addressing. The primary backbone contains only genuine is_a plus Review-contains_finding-ReviewFinding; all other relations retain canonical cross-link roles for workflow traceability without shaping communities.
            ja: structure review は複数の誠実な identity root を保持し、activity output・content carriage・plan governance・feedback addressing から種別横断親 chain を作りません。primary backbone は真正な is_a と Review-contains_finding-ReviewFinding だけで、他の関係は workflow traceability 用 canonical cross-link とし community を形成しません。
