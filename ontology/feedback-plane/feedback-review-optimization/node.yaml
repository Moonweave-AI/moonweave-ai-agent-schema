schema: moonweave.ai/ontology-node/v1
id: feedback-review-optimization
kind: module
status: accepted
labels:
  zh: 反馈与修订证据
  en: Feedback and Revision Evidence
  ja: フィードバックと改訂証拠
semantics:
  short_definition:
    zh: 组织可追溯的反馈记录、人类反馈和实际修订产物的模块。
    en: Module organizing traceable feedback records, human feedback, and completed revision artifacts.
    ja: 追跡可能なフィードバック記録、人間フィードバック、完了した改訂成果物を組織するモジュール。
  definition:
    zh: 本模块保存评估或人工 Feedback、其 HumanFeedback 来源，以及 Revision Activity 已生成的 RevisionArtifact。它不拥有 Evaluation Activity 或 Revision Activity 这类发生的过程，也不包含自动审查包装、原始日志、诊断、恢复动作、回滚、重试或优化循环。活动归上游编排域，运行时观测归运行时域，安全风险归安全域。
    en: This module retains evaluation or human Feedback, its HumanFeedback source, and RevisionArtifact already generated by Revision Activity. It does not own occurred processes such as Evaluation Activity or Revision Activity, and it contains no automated-review wrappers, raw logs, diagnostics, recovery actions, rollback, retry, or optimization loops. Activities belong to the upstream orchestration domain, runtime observation belongs to the runtime domain, and safety risks belong to the safety domain.
    ja: 本モジュールは評価又は人間 Feedback、その HumanFeedback 発生源、及び Revision Activity がすでに生成した RevisionArtifact を保持する。Evaluation Activity 又は Revision Activity のような発生した過程を所有せず、自動評価ラッパー、生ログ、診断、回復操作、ロールバック、再試行、最適化ループを含まない。活動は上流オーケストレーション領域、実行時観測は実行時領域、安全リスクは安全領域に属する。
  why_needed:
    zh: 团队需要把“为什么修改”和“修改后得到什么”保存为可核对信息，而不是把操作过程、警报和原始痕迹混在一起。清晰模块边界使后续评估能够检查修订是否真正解决了有依据的反馈。
    en: Teams need to retain “why change” and “what resulted after change” as checkable information rather than mixing operational process, alerts, and raw traces together. A clear module boundary lets later evaluation examine whether a revision actually addressed grounded feedback.
    ja: チームは「なぜ変更するか」と「変更後に何が得られたか」を、運用過程、アラート、生トレースと混ぜずに確認可能な情報として保持する必要がある。明確なモジュール境界により、後続評価は改訂が根拠あるフィードバックに実際に応答したかを調べられる。
  includes:
    - zh: Feedback、HumanFeedback 和 RevisionArtifact 及其来源、对象和依据关系。
      en: Feedback, HumanFeedback, RevisionArtifact, and their origin, subject, and basis relationships.
      ja: Feedback、HumanFeedback、RevisionArtifact、及びその発生源、対象、根拠関係。
  excludes:
    - zh: 实际 Evaluation Activity、Revision Activity、运行时事件、日志、追踪、度量、告警和恢复控制。
      en: Actual Evaluation Activity, Revision Activity, runtime events, logs, traces, metrics, alerts, and recovery control.
      ja: 実際の Evaluation Activity、Revision Activity、実行時イベント、ログ、トレース、メトリック、アラート、回復制御。
    - zh: 尚未执行的 ChangeProposal 和训练 LearningSignal。
      en: Unexecuted ChangeProposal and training LearningSignal.
      ja: 未実行の ChangeProposal と訓練 LearningSignal。
  semantic_kind: null
  aliases: [feedback evidence, revision evidence]
engineering:
  explanation:
    zh: Evaluation Activity 生成 Feedback，Revision Activity 使用 Feedback 并生成 RevisionArtifact。此模块只保存这些信息实体。新候选可经 Responses API 生成，但必须由实际活动和来源关系登记为 RevisionArtifact，不能因输出文本存在就自动进入本模块。
    en: Evaluation Activity generates Feedback, and Revision Activity uses Feedback and generates RevisionArtifact. This module stores only those information entities. A new candidate can be generated through the Responses API, but it must be recorded as RevisionArtifact through actual activity and provenance relationships rather than automatically entering this module because output text exists.
    ja: Evaluation Activity は Feedback を生成し、Revision Activity は Feedback を使用して RevisionArtifact を生成する。本モジュールはこれらの情報エンティティだけを保存する。新候補は Responses API で生成できるが、出力テキストが存在するだけで自動的に本モジュールへ入るのでなく、実際の活動と来歴関係により RevisionArtifact として記録されなければならない。
  typical_input:
    - description: Provenance-bound local revision input.
      format: |
        {"source_artifact_ref":"Artifact:answer-104","feedback_ref":"Feedback:feedback-105","revision_activity_ref":"RevisionActivity:revise-31"}
      source_claims: [claim-feedback-revision-module-provenance]
  typical_output:
    - description: Retained direct-feedback and revision evidence references.
      format: |
        {"feedback_id":"human-feedback-104","revision_artifact_id":"revision-105"}
      source_claims: [claim-feedback-revision-module-design]
  reference_implementations:
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines separate entity and activity provenance roles.
    - name: OpenAI Responses API create reference
      url: https://developers.openai.com/api/reference/resources/responses/methods/create
      description: Candidate-generation interface kept separate from revision evidence ownership.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 模块标识, en: Module identifier, ja: モジュール識別子}
      definitions:
        zh: 反馈与修订证据模块的稳定标识，不是单条反馈或修订产物标识。
        en: Stable identifier for the feedback-and-revision-evidence module and not an individual feedback or revision-artifact identifier.
        ja: フィードバックと改訂証拠モジュールの安定識別子であり、個別 Feedback 又は RevisionArtifact の識別子ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^feedback-review-optimization$'
      example_value: feedback-review-optimization
      allowed_values: []
      source_claims: [claim-feedback-revision-module-design]
    - id: execution_boundary
      labels: {zh: 执行边界, en: Execution boundary, ja: 実行境界}
      definitions:
        zh: 说明发生的评估和修订活动位于编排域，而本模块只保存它们产生或使用的信息实体。
        en: States that occurred evaluation and revision activities remain in orchestration while this module retains only information entities they generate or use.
        ja: 発生した評価及び改訂活動はオーケストレーションに残り、本モジュールはそれらが生成又は使用する情報エンティティだけを保持することを示す。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: entities-only
      allowed_values: [entities-only]
      source_claims: [claim-feedback-revision-module-provenance, claim-feedback-revision-module-design]
  constraints:
    - id: feedback-revision-module-excludes-runtime-observability
      severity: error
      expression_language: plain
      expression: Raw logs, traces, spans, metrics, diagnostics, runtime events, and recovery controls must not be modeled as module members merely because they provide evidence.
      explanation:
        zh: 证据引用不改变原始运行时对象的所属域。
        en: An evidence reference does not change the owning domain of a raw runtime object.
        ja: 証拠参照は生の実行時対象の所属領域を変更しない。
      source_claims: [claim-feedback-revision-module-design]
    - id: feedback-revision-module-excludes-unexecuted-change
      severity: error
      expression_language: plain
      expression: A planned change remains ChangeProposal until an occurred RevisionActivity generates a RevisionArtifact.
      explanation:
        zh: 计划、活动和产物必须保留不同时间与事实边界。
        en: Plan, activity, and artifact must retain distinct temporal and factual boundaries.
        ja: 計画、活動、成果物は異なる時間及び事実境界を保持しなければならない。
      source_claims: [claim-feedback-revision-module-provenance, claim-feedback-revision-module-design]
  required_relations:
    - id: feedback-revision-module-organizes-feedback
      direction: outgoing
      predicate: organizes
      target_concept_id: Feedback
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块至少组织一条有依据的 Feedback 记录。
        en: The module organizes at least one grounded Feedback record.
        ja: モジュールは少なくとも一つの根拠ある Feedback 記録を組織する。
      source_claims: [claim-feedback-revision-module-design]
    - id: feedback-revision-module-organizes-revision-artifact
      direction: outgoing
      predicate: organizes
      target_concept_id: RevisionArtifact
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块至少组织一件有来源链的 RevisionArtifact。
        en: The module organizes at least one RevisionArtifact with provenance chain.
        ja: モジュールは来歴連鎖を持つ少なくとも一つの RevisionArtifact を組織する。
      source_claims: [claim-feedback-revision-module-design]
examples:
