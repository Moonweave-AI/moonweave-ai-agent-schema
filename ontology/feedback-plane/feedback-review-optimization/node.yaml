  - id: claim-feedback-review-optimization-001
    source: eng-fw-langsmith-docs
    supports: LangSmith human evaluation and annotation queues let reviewers inspect application outputs and traces and produce feedback, while offline experiments validate fixes. This supports ReviewActivity, persisted review feedback, and reevaluation boundaries; Moonweave's Review, ReviewFinding, CorrectionActivity, and ownership taxonomy are design inferences.
    locator: Evaluation concepts > Evaluation techniques > Human; Human feedback collection > Annotation queues; Evaluation lifecycle > Continuous improvement
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-feedback-review-optimization-002
    source: lit-mech-self-refine
    supports: Self-Refine separates an initial output, feedback about that output, and iterative refinement conditioned on the feedback. That mechanism supports the finding-to-correction loop without treating critique as the correction itself; Moonweave adds stable review records, atomic findings, verification activities, and provenance relations.
    locator: Self-Refine §2 Approach > FEEDBACK and REFINE components; §3 Experimental Setup > iterative feedback-and-refinement loop
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-feedback-review-optimization-003
    source: lit-mech-self-refine
    supports: Self-Refine separates feedback about an output from the subsequent refinement step; the ReviewFinding-to-ReviewDerivedFeedback-to-generic-Feedback-to-CorrectionActivity chain preserves that handoff without collapsing provenance or type levels.
    locator: Self-Refine §2 Approach > FEEDBACK and REFINE components; §3 Experimental Setup > iterative feedback-and-refinement loop
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-feedback-review-optimization-004
    source: lit-mech-self-refine
    supports: Self-Refine uses explicit feedback to guide a subsequent refinement; task co-occurrence alone does not establish that provenance.
    locator: Self-Refine §2 Approach > FEEDBACK precedes REFINE; §3 Experimental Setup > iterative refinement conditioned on explicit feedback
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-feedback-review-optimization-005
    source: eng-fw-langsmith-docs
    supports: LangSmith experiments bind evaluator configuration and results; correction verification requires a subsequent EvaluationRun under the original EvaluationSpecification.
    locator: LangSmith Evaluation > Evaluation workflow > Run an experiment and Analyze results; Evaluation concepts > Experiment captures outputs, evaluator scores, and traces
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-feedback-review-optimization-006
