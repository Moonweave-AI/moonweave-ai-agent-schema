schema: moonweave.ai/ontology-node/v1
id: RevisionPlan
kind: concept
status: accepted
labels:
  zh: 修订计划
  en: revision plan
  ja: 改訂計画
semantics:
  short_definition:
    zh: 修订计划是把反馈转为有序修改步骤、验证与回滚条件的可版本化规范。
    en: A revision plan is a versioned specification translating feedback into ordered edits, validation, and rollback conditions.
    ja: 改訂計画は Feedback を順序付き修正、検証、ロールバック条件へ変換する版管理仕様です。
  definition:
    zh: 修订计划是一种规范；其身份由基线 Artifact 版本、所处理 Feedback、修改步骤、依赖顺序、验证判据和回滚点共同确定，它指导 CorrectionActivity 而不是直接指导生成后的 RevisionArtifact。
    en: A revision plan is a specification identified by baseline Artifact version, addressed Feedback, edit steps, dependency order, validation criteria, and rollback point; it governs CorrectionActivity rather than directly guiding the resulting RevisionArtifact.
    ja: 改訂計画は基準 Artifact 版、対象 Feedback、修正手順、依存順序、検証基準、ロールバック点で同一性が決まる仕様で、結果 RevisionArtifact を直接導くのでなく CorrectionActivity を統制します。
  why_needed:
    zh: 把计划连到活动而非产物，能清楚表达谁按什么顺序修改，以及产物只是活动结果。
    en: Linking the plan to the activity rather than the artifact makes who changed what in which order explicit while the artifact remains an outcome.
    ja: 計画を成果物でなく活動へ結び、誰が何をどの順で変更したかを明示し成果物は活動結果に留めます。
  includes:
    - zh: 包括输出修订、提示改写、代码补丁或配置更正的有序步骤。
      en: Includes ordered steps for output revision, prompt rewrite, code patch, or configuration correction.
      ja: 出力改訂、プロンプト書換え、コードパッチ、構成修正の順序付き手順を含みます。
  excludes:
    - zh: 不包括已执行 CorrectionActivity、结果 RevisionArtifact 或只表达一项建议的 Feedback。
      en: Excludes an executed CorrectionActivity, the resulting RevisionArtifact, and Feedback expressing one request without an ordered plan.
      ja: 実行済み CorrectionActivity、結果 RevisionArtifact、順序計画のない一要求 Feedback は含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - revision_plan_id
    - version
  fields:
    - id: revision_plan_id
      labels:
        zh: 修订计划标识
        en: revision-plan ID
        ja: 改訂計画 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一条可独立评审、批准、执行或取代的修订计划谱系。
        en: Stably identifies one revision-plan lineage that can be independently reviewed, approved, executed, or superseded.
        ja: 独立に review・approve・execute・supersede できる一つの改訂計画系列を安定識別します。
      allowed_values: []
      pattern: null
      example_value: revision-plan/revp-3
      source_claims:
        - claim-revision-plan-002
    - id: version
      labels:
        zh: 计划版本
        en: plan version
        ja: 計画版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识基线、反馈处置、步骤、依赖、验证或回滚语义的一次不可变修订。
        en: Identifies one immutable revision of baseline, feedback disposition, steps, dependencies, validation, or rollback semantics.
        ja: baseline・feedback disposition・step・dependency・validation・rollback semantics の不変な一改訂を識別します。
      allowed_values: []
      pattern: null
      example_value: "3"
      source_claims:
        - claim-revision-plan-003
    - id: baseline_artifact_version_ref
      labels:
        zh: 基线产物版本引用
        en: baseline artifact-version reference
        ja: 基準成果物版参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用计划中所有编辑操作共同针对的 Artifact 精确版本，用于在执行前检测并发改动。
        en: References the exact Artifact version targeted by all edit operations, enabling concurrent-change detection before execution.
        ja: 全 edit operation が対象とする Artifact の正確な版を参照し、実行前に並行変更を検出します。
      allowed_values: []
      pattern: null
      example_value: artifact/a-19@3
      source_claims:
        - claim-revision-plan-004
    - id: addressed_feedback_refs
      labels:
        zh: 计划处理的反馈引用
        en: addressed-feedback references
        ja: 計画対応 feedback 参照
      datatype: reference-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用计划逐项采纳、拒绝或延期处置的 Feedback 版本；每项均须可追溯到步骤或理由。
        en: References Feedback versions dispositioned as accepted, rejected, or deferred by the plan; every item must trace to a step or stated reason.
        ja: 計画が accepted・rejected・deferred と処置した Feedback 版を参照し、各項目を step または理由へ追跡可能にします。
      allowed_values: []
      pattern: null
      example_value:
        - feedback/fb-8@2
        - feedback/review-derived-rf-2@1
      source_claims:
        - claim-revision-plan-005
    - id: ordered_edit_steps
      labels:
        zh: 有序编辑步骤
        en: ordered edit steps
        ja: 順序付き編集 step
      datatype: structured-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 按执行顺序记录每步的稳定标识、目标路径、操作、来源反馈与预期后置状态。
        en: Records each step's stable ID, target path, operation, source feedback, and expected post-state in execution order.
        ja: 各 step の stable ID・target path・operation・source feedback・expected post-state を実行順に記録します。
      allowed_values: []
      pattern: null
      example_value:
        - step_id: remove-id
          order: 1
          path: answer.paragraph[3]
          operation: redact
        - step_id: rewrite-paragraph
          order: 2
          path: answer.paragraph[3]
          operation: replace
        - step_id: reevaluate
          order: 3
          operation: evaluate
      source_claims:
        - claim-revision-plan-006
    - id: dependency_order
      labels:
        zh: 步骤依赖顺序
        en: step dependency order
        ja: step 依存順序
      datatype: structured-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 显式记录步骤间必须先完成的依赖边以及依赖失败时的处置，不能只依赖数组位置暗示。
        en: Explicitly records prerequisite edges between steps and their failure dispositions rather than relying only on array position.
        ja: step 間の prerequisite edge と依存失敗時の disposition を明示し、配列位置だけに依存しません。
      allowed_values: []
      pattern: null
      example_value:
        - before: remove-id
          after: rewrite-paragraph
        - before: rewrite-paragraph
          after: reevaluate
      source_claims:
        - claim-revision-plan-007
    - id: validation_criteria
      labels:
        zh: 修订验证判据
        en: revision validation criteria
        ja: 改訂検証基準
      datatype: structured-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出每项必须通过的版本化判据、阈值和证据要求，以判断修订是否真正解决反馈。
        en: Lists versioned criteria, thresholds, and evidence requirements that must pass to establish that the revision actually resolves the feedback.
        ja: 改訂が feedback を実際に解消したと判定するため、通過必須の versioned criterion・threshold・evidence requirement を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - criterion_ref: policy/no-internal-id@4
          expected: pass
        - criterion_ref: rubric/groundedness@4
          minimum: 0.9
      source_claims:
        - claim-revision-plan-008
    - id: rollback_point_ref
      labels:
        zh: 回滚点引用
        en: rollback-point reference
        ja: rollback point 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用执行前必须保留的基线快照或版本，以便验证失败时恢复；它不是回滚执行记录。
        en: References the baseline snapshot or version that must be retained before execution for restoration after validation failure; it is not a rollback execution record.
        ja: 検証失敗時の復元用に実行前保持すべき baseline snapshot・version を参照し、rollback 実行記録ではありません。
      allowed_values: []
      pattern: null
      example_value: checkpoint/artifact-a-19-v3
      source_claims:
        - claim-revision-plan-009
  constraints:
    - id: revision-plan-version-frozen-and-acyclic
      severity: error
      expression_language: plain
      expression: one RevisionPlan version freezes its baseline, feedback dispositions, ordered steps, dependency graph, validation criteria, and rollback point; dependency_order is acyclic and executing the plan creates CorrectionActivity rather than mutating the plan
      explanations:
        zh: 一个修订计划版本冻结基线、反馈处置、步骤、依赖、验证和回滚；依赖必须无环，执行产生纠正活动而不修改计划。
        en: One revision-plan version freezes baseline, dispositions, steps, dependencies, validation, and rollback; dependencies must be acyclic, and execution creates a correction activity without mutating the plan.
        ja: 一つの改訂計画版は baseline・disposition・step・dependency・validation・rollback を固定し、依存は非循環で、実行は計画を変更せず修正活動を生成します。
      source_claims:
        - claim-revision-plan-010
  required_relation_constraints: []
examples:
  - id: RevisionPlan-example-positive-manual-001
    kind: positive
    labels:
      zh: 修订计划正例
      en: Positive revision plan case
      ja: 改訂計画の正例
    scenario_id: null
    descriptions:
      zh: revision-plan revp-3 以 a-19@3 为基线，按 rf-2 与 fb-8 先删除 ID、再重写段落、最后复评。
      en: revision-plan revp-3 uses a-19@3 as baseline and orders removal of the ID, paragraph rewrite, and re-evaluation from rf-2 and fb-8.
      ja: revision-plan revp-3 は a-19@3 を基準に rf-2 と fb-8 から ID 削除、段落書換え、再評価を順序付けます。
    field_values:
      revision_plan_id: revision-plan/revp-3
      version: "3"
      baseline_artifact_version_ref: artifact/a-19@3
      addressed_feedback_refs:
        - feedback/fb-8@2
        - feedback/review-derived-rf-2@1
      ordered_edit_steps:
        - step_id: remove-id
          order: 1
          path: answer.paragraph[3]
          operation: redact
        - step_id: rewrite-paragraph
          order: 2
          path: answer.paragraph[3]
          operation: replace
        - step_id: reevaluate
          order: 3
          operation: evaluate
      dependency_order:
        - before: remove-id
          after: rewrite-paragraph
        - before: rewrite-paragraph
          after: reevaluate
      validation_criteria:
        - criterion_ref: policy/no-internal-id@4
          expected: pass
        - criterion_ref: rubric/groundedness@4
          minimum: 0.9
      rollback_point_ref: checkpoint/artifact-a-19-v3
    related_node_ids:
      - RevisionPlan
    related_relation_ids: []
    expected_result:
      zh: 该对象是 RevisionPlan。
      en: The object is a RevisionPlan.
      ja: この対象は RevisionPlan です。
    why_valid_or_invalid:
      zh: 基线、反馈、步骤依赖、验证和回滚均明确。
      en: Baseline, feedback, step dependencies, validation, and rollback are explicit.
      ja: 基準、Feedback、手順依存、検証、ロールバックが明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-revision-plan-011
  - id: RevisionPlan-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 修订计划边界例
      en: Boundary revision plan case
      ja: 改訂計画の境界例
    scenario_id: null
    descriptions:
      zh: artifact a-19@4 是执行计划后得到的新答案内容。
      en: artifact a-19@4 is the new answer content after executing the plan.
      ja: artifact a-19@4 は計画実行後の新回答内容です。
    field_values: {}
    related_node_ids:
      - RevisionPlan
    related_relation_ids: []
    expected_result:
      zh: 这是 RevisionArtifact，不是 RevisionPlan。
      en: This is a RevisionArtifact, not a RevisionPlan.
      ja: これは RevisionArtifact で RevisionPlan ではありません。
    why_valid_or_invalid:
      zh: 结果实体没有描述待执行步骤和前置依赖。
      en: The result entity does not describe steps and preconditions to execute.
      ja: 結果实体は実行手順と前提依存を記述しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-revision-plan-012
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: RevisionPlan-governs-CorrectionActivity
    predicate: governs
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 治理纠正活动
      en: governs correction activity
      ja: 修正活動を統制
    definitions:
      zh: RevisionPlan 为 CorrectionActivity 规定基线、步骤顺序、验证和回滚条件；计划治理活动，而不是直接“指导”生成后的 RevisionArtifact。
      en: RevisionPlan governs CorrectionActivity by specifying baseline, step order, validation, and rollback conditions; the plan governs the activity rather than directly guiding the resulting RevisionArtifact.
      ja: RevisionPlan は基準、手順順序、検証、ロールバック条件で CorrectionActivity を統制し、結果 RevisionArtifact を直接導きません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_governs
      labels:
        zh: 反向：治理纠正活动
        en: "inverse: governs correction activity"
        ja: 逆方向：修正活動を統制
    conditions:
      - id: RevisionPlan-governs-CorrectionActivity-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the CorrectionActivity explicitly adopts the same RevisionPlan identity and version and its executed baseline, step order, validation, and rollback conditions can be checked against that plan; a merely related change request is insufficient.
        explanations:
          zh: 仅当 CorrectionActivity 明确采用同一个 RevisionPlan 身份和版本，且已执行的基线、步骤顺序、验证与回滚条件能够对照该计划核实时成立；只有相关改动请求不足。
          en: Assert only when the CorrectionActivity explicitly adopts the same RevisionPlan identity and version and its executed baseline, step order, validation, and rollback conditions can be checked against that plan; a merely related change request is insufficient.
          ja: CorrectionActivity が同一 RevisionPlan ID/version を明示採用し、実行 baseline・step order・validation・rollback condition を plan と照合できる場合だけ成立します。関連 change request だけでは不十分です。
        source_claims:
          - claim-revision-plan-013
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RevisionPlan-governs-CorrectionActivity-example-positive-manual-001
        kind: positive
        labels:
          zh: 治理纠正活动正例
          en: Positive case for governs correction activity
          ja: 修正活動を統制の正例
        scenario_id: null
        descriptions:
          zh: c-11.plan_ref=revp-3@1，执行步骤和验证结果与该计划一致。
          en: c-11.plan_ref is revp-3@1 and executed steps and validation match the plan.
          ja: c-11.plan_ref は revp-3@1 で実行手順と検証が計画に一致します。
        field_values: {}
        related_node_ids:
          - RevisionPlan
          - CorrectionActivity
        related_relation_ids:
          - RevisionPlan-governs-CorrectionActivity
        expected_result:
          zh: 应记录 revp-3 governs c-11。
          en: revp-3 is recorded as governing c-11.
          ja: revp-3 governs c-11 を記録します。
        why_valid_or_invalid:
          zh: 活动明确采用计划版本并遵循其步骤与验证。
          en: The activity adopts the plan version and follows its steps and validation.
          ja: 活動が計画版を採用し手順と検証に従います。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-revision-plan-014
      - id: RevisionPlan-governs-CorrectionActivity-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 治理纠正活动边界例
          en: Boundary case for governs correction activity
          ja: 修正活動を統制の境界例
        scenario_id: null
        descriptions:
          zh: a-19@4 是活动结果，没有执行计划步骤的能力。
          en: a-19@4 is the activity result and cannot execute plan steps.
          ja: a-19@4 は活動結果で計画手順を実行できません。
        field_values: {}
        related_node_ids:
          - RevisionPlan
          - CorrectionActivity
        related_relation_ids:
          - RevisionPlan-governs-CorrectionActivity
        expected_result:
          zh: 不得把 RevisionArtifact 作为 governs 的目标。
          en: RevisionArtifact is not the target of governs.
          ja: RevisionArtifact を governs の対象にしません。
        why_valid_or_invalid:
          zh: 计划规范活动过程，产物只是生成结果。
          en: A plan governs the activity process; an artifact is only its generated result.
          ja: 計画は活動過程を統制し成果物は生成結果にすぎません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-revision-plan-015
    source_claims:
      - claim-revision-plan-016
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:CorrectionActivity
  - id: RevisionPlan-addresses-Feedback
    predicate: addresses
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 针对反馈
      en: addresses
      ja: feedback に対処する
    definitions:
      zh: RevisionPlan addresses Feedback 表示一份可执行修订计划明确引用其要回应的反馈身份、适用版本和已选处置项，并把这些处置转化为后续纠正活动的约束；仅复述反馈文本或同时出现两对象不构成 addresses。
      en: RevisionPlan addresses Feedback means that an executable revision plan explicitly cites the feedback identity, applicable version, and selected dispositions it responds to, turning those dispositions into constraints for later correction activity; merely repeating feedback text or co-occurring with it is not addresses.
      ja: RevisionPlan addresses Feedback は、実行可能な revision plan が応答対象 feedback の identity・適用 version・採用 disposition を明示し、後続 correction activity の制約へ変換することを示します。feedback 文の再掲や共起だけでは成立しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 类级阅读不要求每个计划只处理一条反馈，也不要求每条反馈已经产生计划。
      en: The class-level reading requires neither one feedback item per plan nor that every feedback item already has a plan.
      ja: class-level 読解は一 plan 一 feedback も、全 feedback の plan 作成済み状態も要求しません。
    inverse_reading:
      predicate: addressed_by_plan
      labels:
        zh: 由修订计划处理
        en: addressed by revision plan
        ja: revision plan により対処される
    conditions:
      - id: RevisionPlan-addresses-Feedback-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the RevisionPlan cites the same Feedback identity and evaluated artifact version, records at least one accepted disposition or justified rejection, and is authorized for the planned correction scope.
        explanations:
          zh: 仅当 RevisionPlan 指向同一 Feedback 身份及被评价产物版本，记录至少一项已采纳处置或有理由的拒绝，并获准作用于计划的纠正范围时成立。
          en: Assert only when the RevisionPlan cites the same Feedback identity and evaluated artifact version, records at least one accepted disposition or justified rejection, and is authorized for the planned correction scope.
          ja: RevisionPlan が同一 Feedback ID と評価 artifact version を参照し、一件以上の採用 disposition または理由付き rejection を記録し、planned correction scope への権限を持つ場合だけ成立します。
        source_claims:
          - claim-revision-plan-017
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: RevisionPlan-addresses-Feedback-example-positive-001
        kind: positive
        labels:
          zh: 逐项回应评审发现
          en: Dispositioned review feedback
          ja: review feedback の disposition
        scenario_id: null
        descriptions:
          zh: 计划 `revision/17` 引用反馈 `feedback/92` 和目标提示版本 `router@v7`，采纳“补充失败分支”，拒绝“删除来源校验”并记录理由，随后限定纠正活动范围。
          en: Plan `revision/17` cites feedback `feedback/92` and prompt version `router@v7`, accepts 'add the failure branch', rejects 'remove source validation' with a reason, and bounds the later correction activity.
          ja: plan `revision/17` は feedback `feedback/92` と prompt version `router@v7` を参照し、「failure branch 追加」を採用、「source validation 削除」を理由付きで拒否し、後続 correction activity を限定します。
        field_values: {}
        related_node_ids:
          - RevisionPlan
          - Feedback
        related_relation_ids:
          - RevisionPlan-addresses-Feedback
        expected_result:
          zh: 建立 addresses 边，并可从反馈追溯到处置与纠正范围。
          en: An addresses edge is created and the disposition and correction scope are traceable from the feedback.
          ja: addresses 辺を作成し、feedback から disposition と correction scope を追跡できます。
        why_valid_or_invalid:
          zh: 反馈身份、版本、处置和执行范围全部明确。
          en: Feedback identity, version, dispositions, and execution scope are all explicit.
          ja: feedback identity、version、disposition、execution scope がすべて明示されています。
