schema: moonweave.ai/ontology-node/v1
id: ReviewDerivedFeedback
kind: concept
status: accepted
labels:
  zh: 审查派生反馈
  en: review-derived feedback
  ja: 審査派生フィードバック
semantics:
  short_definition:
    zh: 由一个或多个审查发现转写并面向明确接收者或改进目标的反馈。
    en: Feedback translated from one or more review findings for an identified recipient or improvement target.
    ja: 一つ以上の review finding から明示 recipient または improvement target 向けに転記された feedback です。
  definition:
    zh: ReviewDerivedFeedback 是 Feedback 的信息子类，完整继承 Feedback 的 feedback_id、接收者与陈述身份，不再创建派生反馈专用 ID；其种差是必须引用至少一个来源 ReviewFinding 及其证据，并把审查判断转写为行动或改进指引。没有 ReviewFinding 的用户意见、运行告警或评估提示只属于通用 Feedback。
    en: ReviewDerivedFeedback is an information subtype that inherits Feedback's feedback_id, recipient, and statement identity without creating a derived-feedback-specific ID. Its differentia is mandatory provenance from at least one ReviewFinding and its evidence plus translation of the reviewed judgment into action or improvement guidance. User comments, runtime warnings, and evaluator suggestions without a ReviewFinding remain generic Feedback only.
    ja: ReviewDerivedFeedback は Feedback の feedback_id・recipient・statement identity を継承し、派生 feedback 専用 ID を作らない information subtype です。種差は一つ以上の source ReviewFinding と evidence の必須出所、および reviewed judgment の action・improvement guidance への転記です。ReviewFinding のない user comment・runtime warning・evaluator suggestion は generic Feedback のみです。
  why_needed:
    zh: 专门子类既保留 Feedback 的共性交付关系，又使审查证据来源成为可查询的严格种差。
    en: The subtype retains shared Feedback delivery relations while making review-evidence provenance a queryable strict differentia.
    ja: subtype は Feedback 共通の delivery relation を維持しつつ review-evidence provenance を照会可能な厳密 differentia とします。
  includes:
    - zh: 由审查发现转写的修订要求、复核请求、策略建议或质量改进指引，并保留来源 finding 与证据引用。
      en: Includes revision requests, re-review requests, strategy guidance, or quality-improvement guidance translated from review findings with finding and evidence references retained.
      ja: review finding から転記され finding/evidence reference を保持する revision request・re-review request・strategy guidance・quality-improvement guidance を含みます。
  excludes:
    - zh: 排除没有 ReviewFinding 来源的用户评价、运行信号、评估器提示，以及原始 ReviewFinding、FeedbackEvent 和 CorrectionActivity。
      en: Excludes user comments, runtime signals, or evaluator suggestions without a ReviewFinding source, as well as the original ReviewFinding, FeedbackEvent, and CorrectionActivity.
      ja: ReviewFinding source のない user comment・runtime signal・evaluator suggestion、および元 ReviewFinding・FeedbackEvent・CorrectionActivity を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: ReviewDerivedFeedback-example-positive-001
    kind: positive
    labels:
      zh: 审查派生反馈正例
      en: Positive review-derived feedback case
      ja: review-derived feedback の正例
    scenario_id: null
    descriptions:
      zh: feedback rdf-8 引用 finding rf-2 及其证据范围，面向 worker-3 转写为删除内部 ID、重新生成并在 30 分钟内返回的行动要求。
      en: Feedback rdf-8 cites finding rf-2 and its evidence span and translates it for worker-3 into an action request to remove the internal ID, regenerate, and respond within 30 minutes.
      ja: feedback rdf-8 は finding rf-2 と evidence span を引用し、worker-3 向けに内部 ID 削除・再生成・30 分以内応答の action request へ転記します。
    field_values:
      feedback_id: rdf-8
    related_node_ids:
      - ReviewDerivedFeedback
      - ReviewFinding
      - Feedback
    related_relation_ids:
      - ReviewFinding-supports-ReviewDerivedFeedback
      - ReviewDerivedFeedback-is_a-Feedback
    expected_result:
      zh: 将 rdf-8 分类为 ReviewDerivedFeedback，并保留到 rf-2 的 supports 边。
      en: Classify rdf-8 as ReviewDerivedFeedback and retain the supports edge from rf-2.
      ja: rdf-8 を ReviewDerivedFeedback と分類し rf-2 からの supports edge を保持します。
    why_valid_or_invalid:
      zh: 来源发现、证据引用、接收者与行动转写均明确。
      en: Source finding, evidence reference, recipient, and action translation are explicit.
      ja: source finding・evidence reference・recipient・action translation が明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-review-derived-feedback-001
  - id: ReviewDerivedFeedback-example-boundary-001
    kind: boundary
    labels:
      zh: 非审查来源反馈边界
      en: Non-review-source feedback boundary
      ja: non-review-source feedback の境界
    scenario_id: null
    descriptions:
      zh: 用户在会话后直接提交“回答太长”，该意见有接收目标但没有 ReviewFinding、判据或审查证据。
      en: A user directly submits “the answer is too long” after a session; the comment has an improvement target but no ReviewFinding, criterion, or review evidence.
      ja: user が session 後に「回答が長すぎる」と直接投稿し、improvement target はありますが ReviewFinding・criterion・review evidence はありません。
    field_values: {}
    related_node_ids:
      - ReviewDerivedFeedback
      - Feedback
    related_relation_ids:
      - ReviewDerivedFeedback-is_a-Feedback
    expected_result:
      zh: 只分类为通用 Feedback，不分类为 ReviewDerivedFeedback。
      en: Classify it only as generic Feedback, not ReviewDerivedFeedback.
      ja: generic Feedback のみとし ReviewDerivedFeedback には分類しません。
    why_valid_or_invalid:
      zh: 缺少审查发现来源，不满足派生子类的种差。
      en: It lacks a review-finding source and therefore fails the subtype differentia.
      ja: review-finding source がなく subtype differentia を満たしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-review-derived-feedback-001
