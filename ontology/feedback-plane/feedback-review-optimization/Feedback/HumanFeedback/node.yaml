    source: instructgpt-human-feedback
    supports: InstructGPT uses human demonstrations and ranked comparisons as distinct data inputs for supervised and reward-model training stages.
    locator: "Abstract and methodology: demonstrations, comparison data, reward model, PPO"
    evidence_kind: official
    confidence: high
  - id: claim-human-feedback-design
    source: human-feedback-design
    supports: Human feedback retains provider, subject, time, mode, and original content and is not automatically a training signal.
    locator: "Local human feedback and learning-signal boundary"
    evidence_kind: design-inference
    confidence: high


