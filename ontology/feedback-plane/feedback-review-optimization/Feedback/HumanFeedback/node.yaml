schema: moonweave.ai/ontology-node/v1
id: HumanFeedback
kind: concept
status: accepted
labels:
  zh: 人类反馈
  en: Human Feedback
  ja: 人間フィードバック
semantics:
  short_definition:
    zh: 由可识别的人类提供者针对候选产物提交并直接作为 Feedback 保存的、带提交时间的反馈内容。
    en: Feedback submitted by an identifiable human provider about a candidate artifact, directly retained as Feedback with a recorded submission time.
    ja: 識別可能な人間提供者が候補成果物について提出し、提出時刻とともに Feedback として直接保持される内容。
  definition:
    zh: HumanFeedback 是 Feedback 的人类来源特化，直接保存人类提供者、被评候选、提交时间、反馈类型和原始内容。它可以表达批评、纠正或偏好，但不是 Score、Evaluation Metric、Verdict，也不需要再创建一条 Feedback 把自身作为“依据”。人工意见也不会自动成为训练数据、偏好对或奖励信号；训练用途须由独立 LearningSignal 明确构造和治理。
    en: HumanFeedback is the human-origin specialization of Feedback, directly retaining human provider, assessed candidate, submission time, feedback mode, and original content. It can express critique, correction, or preference, but is not a Score, Evaluation Metric, or Verdict and does not require another Feedback that names it as a basis. Human input also does not automatically become training data, a preference pair, or a reward signal; training use requires a separately constructed and governed LearningSignal.
    ja: HumanFeedback は Feedback の人間発生源特化であり、人間提供者、評価対象候補、提出時刻、フィードバック種別、原文内容を直接保持する。批評、訂正、又は選好を表し得るが、Score、Evaluation Metric、Verdict ではなく、自身を根拠とする別の Feedback を必要としない。人間入力は自動的に訓練データ、選好対、又は報酬信号にもならず、訓練利用には別に構成・管理した LearningSignal が必要である。
  why_needed:
    zh: 人的意见具有来源、时间和适用对象，不能被匿名文本或系统事件替代。单独保留这层信息，才能尊重人的反馈语境，并在需要时审计它是否被恰当地转换为后续评估、修订或训练输入。
    en: Human input has a source, time, and subject that cannot be replaced by anonymous text or a system event. Retaining this layer separately respects the context of a person’s feedback and allows later audit of whether it was appropriately turned into evaluation, revision, or training input.
    ja: 人間入力には、匿名テキスト又はシステムイベントでは代替できない発生源、時刻、対象がある。この層を別に保持することで、人のフィードバック文脈を尊重し、後で評価、改訂、又は訓練入力へ適切に変換されたかを監査できる。
  includes:
    - zh: 人类提供者引用、候选引用、提交时间、内容和批评、纠正或偏好类型。
      en: Human-provider reference, candidate reference, submission time, content, and critique, correction, or preference mode.
      ja: 人間提供者参照、候補参照、提出時刻、内容、及び批評、訂正、又は選好種別。
    - zh: 可由后续流程明确引用的人工观察，而不是无来源的评论摘录。
      en: A human observation that later processes can explicitly cite rather than an unattributed comment excerpt.
      ja: 後続プロセスが明示的に引用できる人間観察であり、出所不明のコメント抜粋ではない。
  excludes:
    - zh: 自动评分、量规数值、质量判定、遥测告警和运行时错误。
      en: Automated score, rubric value, quality verdict, telemetry alert, or runtime error.
      ja: 自動スコア、ルーブリック値、品質判定、テレメトリアラート、又は実行時エラー。
    - zh: 已被整理为 chosen 和 rejected 样本对的 PreferenceExample，或已训练奖励模型实际返回的 RewardModelScore。
      en: A PreferenceExample already curated as chosen and rejected pairs or a RewardModelScore actually returned by a trained reward model.
      ja: chosen と rejected の対に整備済みの PreferenceExample 又は学習済み報酬モデルが実際に返した RewardModelScore。
  semantic_kind: information
  aliases: [human annotation, human critique, 人工意见]
engineering:
  explanation:
    zh: 人工界面或服务端表单应写入 feedback_id、origin_kind=human、provider_ref、subject_ref、submitted_at、mode 和 content。InstructGPT 把人类演示、偏好排序、奖励模型训练和 PPO 分为不同阶段；这条原始人类 Feedback 不是训练样本或奖励模型输出。
    en: A human interface or server form should write feedback_id, origin_kind human, provider_ref, subject_ref, submitted_at, mode, and content. InstructGPT separates human demonstrations, preference rankings, reward-model training, and PPO; this original HumanFeedback is neither a training sample nor a reward-model output.
    ja: 人間インターフェース又はサーバーフォームは feedback_id、origin_kind=human、provider_ref、subject_ref、submitted_at、mode、content を書くべきである。InstructGPT は人間デモ、選好順位、報酬モデル訓練、PPO を別段階に分ける。この原 HumanFeedback は訓練サンプルでも報酬モデル出力でもない。
  typical_input:
    - description: Local human-feedback submission payload.
      format: |
        {
          "provider_ref": "Actor:assessor-42",
          "subject_ref": "Artifact:answer-104",
          "submitted_at": "2026-07-18T13:10:00Z",
          "mode": "correction",
          "content": "Add the warranty escalation option after the safe troubleshooting steps."
        }
      source_claims: [claim-human-feedback-design]
  typical_output:
    - description: Retained human-feedback record.
      format: |
        {
          "feedback_id": "human-feedback-104",
          "origin_kind": "human",
          "provider_ref": "Actor:assessor-42",
          "subject_ref": "Artifact:answer-104",
          "submitted_at": "2026-07-18T13:10:00Z",
          "mode": "correction",
          "content": "Add the warranty escalation option after the safe troubleshooting steps."
        }
      source_claims: [claim-human-feedback-design]
  reference_implementations:
    - name: Training language models to follow instructions with human feedback
      url: https://arxiv.org/abs/2203.02155
      description: Describes human demonstrations and rankings used in distinct supervised and reward-model training stages.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Supports retaining a human-provided information entity separately from activities that later use it.
structure:
  identity_keys: [feedback_id]
  fields:
    - id: feedback_id
      labels: {zh: 反馈标识, en: Feedback identifier, ja: フィードバック識別子}
      definitions:
        zh: 唯一标识一条可被后续活动引用的人类来源 Feedback。
        en: Uniquely identifies one human-origin Feedback that later activities can cite.
        ja: 後続活動が引用できる一件の人間発生源 Feedback を一意に識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: human-feedback-104
      allowed_values: []
      source_claims: [claim-human-feedback-design]
    - id: origin_kind
      labels: {zh: 反馈来源类别, en: Feedback origin kind, ja: フィードバック発生源種別}
      definitions:
        zh: 将 HumanFeedback 固定为人类来源，不允许改写为自动评估或遥测来源。
        en: Fixes HumanFeedback as human origin and does not permit it to be rewritten as automated evaluation or telemetry origin.
        ja: HumanFeedback を人間発生源に固定し、自動評価又はテレメトリ発生源へ書き換えない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: human
      allowed_values: [human]
      source_claims: [claim-human-feedback-design]
    - id: provider_ref
      labels: {zh: 人类提供者引用, en: Human provider reference, ja: 人間提供者参照}
      definitions:
        zh: 指向提供原始反馈的 Actor 的稳定引用，而不是自动评分器或遥测收集器。
        en: Stable reference to the Actor who supplied original feedback rather than an automated grader or telemetry collector.
        ja: 自動採点器又はテレメトリ収集器ではなく、原フィードバックを提供した Actor への安定参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Actor:assessor-42
      allowed_values: []
      source_claims: [claim-human-feedback-design]
    - id: subject_ref
      labels: {zh: 被反馈对象引用, en: Feedback subject reference, ja: フィードバック対象参照}
      definitions:
        zh: 指向人类意见针对的候选 Artifact。
        en: Reference to the candidate Artifact addressed by the human input.
        ja: 人間入力が対象とする候補 Artifact への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Artifact:answer-104
      allowed_values: []
      source_claims: [claim-human-feedback-design]
    - id: submitted_at
      labels: {zh: 提交时间, en: Submission time, ja: 提出時刻}
      definitions:
        zh: 人类提供者提交该原始意见的时间，而不是后续训练或修订时间。
        en: Time the human provider submitted the original input rather than a later training or revision time.
        ja: 人間提供者が原入力を提出した時刻であり、後続の訓練又は改訂時刻ではない。
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '2026-07-18T13:10:00Z'
      allowed_values: []
      source_claims: [claim-human-feedback-design]
    - id: mode
      labels: {zh: 反馈类型, en: Feedback mode, ja: フィードバック種別}
      definitions:
        zh: 指出人类内容主要是批评、纠正还是偏好表达，不推断训练标签。
        en: States whether human content is primarily critique, correction, or preference expression without inferring a training label.
        ja: 訓練ラベルを推論せず、人間内容が主に批評、訂正、又は選好表明のどれかを示す。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: correction
      allowed_values: [critique, correction, preference]
      source_claims: [claim-human-feedback-design]
    - id: content
      labels: {zh: 原始内容, en: Original content, ja: 原文内容}
      definitions:
        zh: 人类提供者的原始或忠实保留的内容，不替换成自动生成的总结。
        en: Original or faithfully retained content from the human provider and not an automatically generated summary.
        ja: 人間提供者からの原文又は忠実に保持した内容であり、自動生成要約ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Add a warranty escalation option after safe troubleshooting steps.
      allowed_values: []
      source_claims: [claim-human-feedback-design]
  constraints:
    - id: human-feedback-has-human-provenance
      severity: error
      expression_language: plain
      expression: provider_ref must resolve to a human Actor and submitted_at must record the original submission time.
      explanation:
        zh: 没有真实人类来源的自动内容不得冒充人类反馈。
        en: Automated content with no real human source must not impersonate human feedback.
        ja: 実在の人間発生源を持たない自動内容は人間フィードバックを装ってはならない。
      source_claims: [claim-human-feedback-design]
    - id: human-feedback-is-not-training-signal
      severity: error
      expression_language: plain
      expression: A HumanFeedback record must not be used as training data, preference pair, or reward target until a separate LearningSignal records the transformation and consent or policy basis.
      explanation:
        zh: 人类意见的存在不等于已获授权或已准备好用于训练。
        en: The existence of human input does not mean it is authorized or prepared for training.
        ja: 人間入力が存在しても、訓練への許可又は準備が整ったことを意味しない。
      source_claims: [claim-human-feedback-instructgpt, claim-human-feedback-design]
  required_relations:
    - id: human-feedback-is-a-feedback
      direction: outgoing
      predicate: is_a
      target_concept_id: Feedback
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每条 HumanFeedback 是具有额外人类来源字段的 Feedback，不是父类的外部依据对象。
        en: Each HumanFeedback is Feedback with additional human-origin fields and not an external basis object of its parent.
        ja: 各 HumanFeedback は追加の人間発生源フィールドを持つ Feedback であり、親の外部根拠オブジェクトではない。
      source_claims: [claim-human-feedback-design]
    - id: human-feedback-is-about-artifact
      direction: outgoing
      predicate: is_about
      target_concept_id: Artifact
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每条 HumanFeedback 必须有一个明确候选对象。
        en: Each HumanFeedback must identify one explicit candidate subject.
        ja: 各 HumanFeedback は一つの明示的な候補対象を特定しなければならない。
      source_claims: [claim-human-feedback-design]
    - id: human-feedback-is-provided-by-actor
      direction: outgoing
      predicate: is_provided_by
      target_concept_id: Actor
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每条 HumanFeedback 必须指向提供它的人类 Actor。
        en: Each HumanFeedback must point to the human Actor who supplied it.
        ja: 各 HumanFeedback は、それを提供した人間 Actor を指さなければならない。
      source_claims: [claim-human-feedback-design]
examples:
  - id: human-feedback-positive-correction

    labels: {zh: InstructGPT 人工 demonstration, en: InstructGPT human demonstration, ja: InstructGPT 人間 demonstration}

    descriptions:
      zh: "InstructGPT (Ouyang et al., 2022) RLHF: SFT -> human-ranked RM r_theta(x,y) -> PPO; ~13k demos + 33k comparisons; HumanFeedback maps supervised/preference data-prep boundary."
      en: "InstructGPT (Ouyang et al., 2022) RLHF: SFT -> human-ranked RM r_theta(x,y) -> PPO; ~13k demos + 33k comparisons; HumanFeedback maps supervised/preference data-prep boundary."
      ja: "InstructGPT SFT->RM->PPO; HumanFeedback data prep boundary."
    field_values: {feedback_id: instructgpt-demonstration-001, origin_kind: human, provider_ref: 'Actor:openai-contractor-labeler', subject_ref: 'Artifact:instructgpt-api-response', submitted_at: '2022-03-01T00:00:00Z', mode: correction, content: 'Add warranty escalation option after safe troubleshooting steps per demonstration labeling.'}
    related_node_ids: [HumanFeedback, Feedback, Actor, Artifact]
    related_relation_ids: [human-feedback-is-a-feedback, human-feedback-is-about-artifact, human-feedback-is-provided-by-actor]

    source_claims: [claim-human-feedback-design]
  - id: human-feedback-counterexample-automated-comment

    labels: {zh: 自动生成评论冒充人工意见, en: Automated comment impersonating human input, ja: 人間入力を装う自動コメント}

    descriptions:
      zh: "Missing model_a/model_b pairing cannot serve as Arena-style HumanFeedback."
      en: "Missing model_a/model_b pairing cannot serve as Arena-style HumanFeedback."
      ja: "Missing pairwise rejects Arena-style HumanFeedback."
    field_values: {feedback_id: null, origin_kind: human, provider_ref: null, subject_ref: 'Artifact:answer-104', submitted_at: null, mode: critique, content: 'The answer needs clarity.'}
    related_node_ids: [HumanFeedback, Feedback]
    related_relation_ids: []

    source_claims: [claim-human-feedback-design]
  - id: human-feedback-boundary-preference-training

    labels: {zh: 人类偏好与训练偏好对的边界, en: Boundary between human preference and training pair, ja: 人間選好と訓練選好対の境界}

    descriptions:
      zh: "CAI principles are Rubric spec; revision is Feedback event; separate HumanFeedback spec from training."
      en: "CAI principles are Rubric spec; revision is Feedback event; separate HumanFeedback spec from training."
      ja: "CAI principles spec; revision event."
    field_values: {feedback_id: human-feedback-105, origin_kind: human, provider_ref: 'Actor:assessor-42', subject_ref: 'Artifact:answer-A', submitted_at: '2026-07-18T13:15:00Z', mode: preference, content: 'I prefer answer-A over answer-B because it states the warranty limit clearly.'}
    related_node_ids: [HumanFeedback, PreferenceExample]
    related_relation_ids: []

    source_claims: [claim-human-feedback-instructgpt, claim-human-feedback-design]
  - id: human-feedback-instance-assessor-42

    labels: {zh: assessor-42 的具体人工反馈, en: Concrete human feedback from assessor-42, ja: assessor-42 の具体的人間フィードバック}

    descriptions:
      zh: "Arena instance: model_a vs model_b->judge picks A->Elo delta->HumanFeedback Verdict outcome=preferred_a."
      en: "Arena instance: model_a vs model_b->judge picks A->Elo delta->HumanFeedback Verdict outcome=preferred_a."
      ja: "Arena instance maps to HumanFeedback Verdict."
    field_values: {feedback_id: human-feedback-104, origin_kind: human, provider_ref: 'Actor:assessor-42', subject_ref: 'Artifact:answer-104', submitted_at: '2026-07-18T13:10:00Z', mode: correction, content: 'Add a warranty escalation option after the safe troubleshooting steps.'}
    related_node_ids: [HumanFeedback, Feedback, Actor, Artifact]
    related_relation_ids: [human-feedback-is-a-feedback, human-feedback-is-about-artifact, human-feedback-is-provided-by-actor]

    source_claims: [claim-human-feedback-design]
parent_relation:
  id: human-feedback-is-a-feedback
  predicate: is_a
  target: concept:Feedback
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是反馈的人类来源特化, en: is human-origin feedback, ja: 人間発生源のフィードバックである}
  definitions:
    zh: HumanFeedback 继承 Feedback 的对象和可引用记录边界，并增加人类来源事实。
    en: HumanFeedback retains Feedback’s subject and referencable-record boundary while adding human-origin facts.
    ja: HumanFeedback は Feedback の対象及び参照可能な記録境界を保持し、人間発生源の事実を追加する。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels: {zh: 有人类反馈子类型, en: has human feedback subtype, ja: 人間フィードバック下位型を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-human-feedback-design]
  distinct_fact_rationale:
    zh: 该层级表达来源特化，不把人类原话和后续训练信号混为同一记录。
    en: This hierarchy expresses origin specialization and does not conflate human original input with a later training signal.
    ja: この階層は発生源特化を表し、人間原入力と後続の訓練信号を同じ記録として混同しない。
  layout_role: primary-backbone
relations:
  - id: human-feedback-is-about-artifact
    predicate: is_about
    target: concept:Artifact
    direction: source-to-target
    relation_kind: semantic
    labels: {zh: 人类反馈关于候选产物, en: human feedback is about artifact, ja: 人間フィードバックが成果物についてである}
    definitions:
      zh: 人类提供者的内容指向一个明确候选 Artifact。
      en: Human-provider content points to one explicit candidate Artifact.
      ja: 人間提供者の内容は一つの明示的な候補 Artifact を指す。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: has_human_feedback
      labels: {zh: 产物有人类反馈, en: artifact has human feedback, ja: 成果物が人間フィードバックを持つ}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-human-feedback-design]
    distinct_fact_rationale:
      zh: 该关系固定人工意见的对象，不声明训练或修订已经发生。
      en: This relation fixes the subject of human input and does not state that training or revision occurred.
      ja: この関係は人間入力の対象を固定し、訓練又は改訂が発生したとは示さない。
    layout_role: cross-link
  - id: human-feedback-is-provided-by-actor
    predicate: is_provided_by
    target: concept:Actor
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 人类反馈由角色提供, en: human feedback is provided by actor, ja: 人間フィードバックが Actor により提供される}
    definitions:
      zh: 一个可识别的 Actor 提交该人类反馈记录。
      en: An identifiable Actor submits the human-feedback record.
      ja: 識別可能な Actor が人間フィードバック記録を提出する。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: provides
      labels: {zh: 角色提供人类反馈, en: actor provides human feedback, ja: Actor が人間フィードバックを提供する}
    conditions: []
