    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-human-feedback-design]
    distinct_fact_rationale:
      zh: 该关系保留人的来源，不把自动化服务主体写成人类提供者。
      en: This relation retains human provenance and does not write an automated service principal as a human provider.
      ja: この関係は人間来歴を保持し、自動サービス主体を人間提供者として記述しない。
    layout_role: cross-link
sources:
  - id: instructgpt-human-feedback
    title: Training language models to follow instructions with human feedback
    url: https://arxiv.org/abs/2203.02155
    source_type: paper
    relevance: Describes distinct human demonstration and preference-ranking data used in later supervised and reward-model training stages.
  - id: prov-o-human-feedback
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Supports keeping a human-provided entity distinct from later activities that use it.
  - id: human-feedback-design
    title: Human feedback design inference
    url: https://www.w3.org/TR/prov-o/
    source_type: design-inference
    relevance: Separates original human input from feedback records, preference datasets, reward signals, and training execution.
