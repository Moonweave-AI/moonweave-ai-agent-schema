schema: moonweave.ai/ontology-node/v1
id: HumanFeedback
kind: concept
labels:
  zh: 人类反馈
  en: Human Feedback
  ja: 人間フィードバック
semantics:
  short_definition:
    zh: 由可识别的人类提供者针对候选产物提交、并直接作为 Feedback 保存的原始意见记录。
    en: Original input submitted by an identifiable human provider about a candidate artifact and retained directly as Feedback.
    ja: 識別可能な人間提供者が候補成果物について提出し、Feedback として直接保持される原文入力の記録。
  definition:
    zh: HumanFeedback 是 Feedback 的人类来源特化，直接保存 provider_ref、subject_ref、submitted_at、mode 与 content，而不需要 evaluation_basis_ref 或另一条 Feedback 作为依据。它映射 LangSmith annotation queue 中的 human annotation/correction、InstructGPT 约 13k SFT demonstration 标注、以及 pairwise 偏好表达（mode=preference）。它不是 Score、EvaluationMetric、Verdict、RewardModelScore，也不会自动成为 PreferenceExample 或 LearningSignal；训练用途须由独立的数据转换与 policy 步骤构造。
    en: "HumanFeedback is the human-origin specialization of Feedback, directly retaining provider_ref, subject_ref, submitted_at, mode, and content without evaluation_basis_ref or another Feedback as basis. It maps to LangSmith annotation-queue human annotation/correction, InstructGPT ~13k SFT demonstration labels, and pairwise preference expressions (mode=preference). It is not Score, EvaluationMetric, Verdict, or RewardModelScore, and does not automatically become PreferenceExample or LearningSignal; training use requires separate data transformation and policy steps."
    ja: HumanFeedback は Feedback の人間発生源特化で、evaluation_basis_ref や別 Feedback 根拠なしに provider_ref、subject_ref、submitted_at、mode、content を直接保持する。LangSmith annotation queue の human annotation/correction、InstructGPT 約 13k SFT demonstration ラベル、pairwise 選好表明（mode=preference）に写像する。Score、EvaluationMetric、Verdict、RewardModelScore ではなく、PreferenceExample や LearningSignal にも自動的にはならない。訓練利用には別のデータ変換と policy 手順が必要。
  why_needed:
    zh: 人的意见具有提供者、时间和适用对象，不能被匿名文本、自动 grader 输出或运行时日志替代。单独保留 HumanFeedback 才能审计 LangSmith 标注员为何修正 category、InstructGPT 演示如何进入 SFT 数据准备，以及该意见是否在授权前被误当作训练样本。
    en: "Human input has a provider, time, and subject that anonymous text, automated grader output, or runtime logs cannot replace. Retaining HumanFeedback separately audits why a LangSmith annotator corrected a category, how an InstructGPT demo enters SFT data prep, and whether the input was mistaken for training data before authorization."
    ja: 人間入力には提供者、時刻、対象があり、匿名テキスト、自動 grader 出力、実行時ログでは代替できない。HumanFeedback を別保持することで、LangSmith 注釈者が category をなぜ修正したか、InstructGPT demo が SFT データ準備へどう入るか、許可前に訓練サンプルと誤認されなかったかを監査できる。
  includes:
    - zh: feedback_id、origin_kind=human、provider_ref、subject_ref、submitted_at、mode（critique/correction/preference）与 content。
      en: "feedback_id, origin_kind=human, provider_ref, subject_ref, submitted_at, mode (critique/correction/preference), and content."
      ja: feedback_id、origin_kind=human、provider_ref、subject_ref、submitted_at、mode（critique/correction/preference）、content。
    - zh: LangSmith annotation queue 修正、InstructGPT SFT demonstration 原文、pairwise 偏好陈述。
      en: "LangSmith annotation-queue corrections, InstructGPT SFT demonstration originals, and pairwise preference statements."
      ja: LangSmith annotation queue 修正、InstructGPT SFT demonstration 原文、pairwise 選好表明。
  excludes:
    - zh: 自动 Score、EvaluationMetric、Verdict、RewardModelScore、原始 Trace/Span/Log Record。
      en: "Automated Score, EvaluationMetric, Verdict, RewardModelScore, and raw Trace/Span/Log Record."
      ja: 自動 Score、EvaluationMetric、Verdict、RewardModelScore、生 Trace/Span/Log Record。
    - zh: 已整理为 chosen/rejected 对的 PreferenceExample，或已执行 RevisionActivity 生成的 RevisionArtifact。
      en: "PreferenceExample curated as chosen/rejected pairs or RevisionArtifact generated by executed RevisionActivity."
      ja: chosen/rejected 対に整備済み PreferenceExample、実行済み RevisionActivity が生成した RevisionArtifact。
  semantic_kind: information
  aliases: [human annotation, human critique, LangSmith correction, 人工意见]
engineering:
  explanation:
    zh: 新集成应以 LangSmith annotation queue 与 POST /feedback、InstructGPT SFT demonstration 采集界面、pairwise 比较 UI 为可映射 API 形状，再写入 feedback_id、origin_kind=human、provider_ref、subject_ref、submitted_at、mode、content。LangSmith 标注员将 category 从 Other 修正为 Hardware 并提交 correction 是典型 HumanFeedback；InstructGPT ~13k demos 是 SFT 数据准备的上游来源，不是 RewardModelScore。不得把 HumanFeedback 直接写成 LearningSignal 或 PreferenceExample。
    en: "New integrations should treat LangSmith annotation queues and POST /feedback, InstructGPT SFT demonstration capture UI, and pairwise comparison UI as mappable API shapes, then write feedback_id, origin_kind=human, provider_ref, subject_ref, submitted_at, mode, and content. A LangSmith annotator correcting category from Other to Hardware is typical HumanFeedback; InstructGPT ~13k demos are upstream SFT data prep, not RewardModelScore. HumanFeedback must not be written directly as LearningSignal or PreferenceExample."
    ja: LangSmith annotation queue と POST /feedback、InstructGPT SFT demonstration 収集 UI、pairwise 比較 UI を写像可能 API 形状として扱い、feedback_id、origin_kind=human、provider_ref、subject_ref、submitted_at、mode、content を書く。LangSmith 注釈者が category を Other から Hardware に修正するのが典型 HumanFeedback。InstructGPT ~13k demos は SFT データ準備の上流であり RewardModelScore ではない。HumanFeedback を直接 LearningSignal や PreferenceExample として書いてはならない。
  typical_input:
    - description: LangSmith annotation queue correction after run review.
      format: |
        {
          "run_id": "run-support-104",
          "annotation_queue": "ticket-quality-review",
          "provider_ref": "Actor:annotator-42",
          "subject_ref": "Artifact:answer-104",
          "mode": "correction",
          "content": "Correct category to Hardware after verifying power-failure symptoms."
        }
      source_claims: [claim-human-feedback-langsmith]
    - description: InstructGPT-style SFT demonstration label capture.
      format: |
        {
          "provider_ref": "Actor:openai-contractor-labeler",
          "subject_ref": "Artifact:instructgpt-demo-completion",
          "mode": "correction",
          "content": "Rewrite completion to follow instruction format and safety policy."
        }
      source_claims: [claim-human-feedback-instructgpt]
  typical_output:
    - description: Local HumanFeedback record retained as Feedback subtype.
      format: |
        {
          "feedback_id": "human-feedback-104",
          "origin_kind": "human",
          "provider_ref": "Actor:assessor-42",
          "subject_ref": "Artifact:answer-104",
          "submitted_at": "2026-07-18T13:10:00Z",
          "mode": "correction",
          "content": "Add warranty escalation option after safe troubleshooting steps."
        }
      source_claims: [claim-human-feedback-design]
  reference_implementations:
    - name: LangSmith
      url: https://docs.smith.langchain.com
      description: Annotation queues, human corrections, and feedback scores on runs.
    - name: InstructGPT RLHF
      url: https://arxiv.org/abs/2203.02155
      description: Human demonstrations and ranked comparisons as distinct RLHF data stages.
structure:
  identity_keys: [feedback_id]
  fields:
    - id: feedback_id
      labels: {zh: 反馈标识, en: Feedback identifier, ja: フィードバック識別子}
      definitions:
        zh: 唯一标识一条可被后续活动引用的人类来源 Feedback。
        en: Uniquely identifies one human-origin Feedback that later activities can cite.
        ja: 後続活動が引用できる一件の人間発生源 Feedback を一意に識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: human-feedback-104
      allowed_values: []
      source_claims: [claim-human-feedback-design]
    - id: origin_kind
      labels: {zh: 反馈来源类别, en: Feedback origin kind, ja: フィードバック発生源種別}
      definitions:
        zh: 将 HumanFeedback 固定为人类来源，不允许改写为 evaluation 或遥测来源。
        en: Fixes HumanFeedback as human origin and does not permit rewriting as evaluation or telemetry origin.
        ja: HumanFeedback を人間発生源に固定し、evaluation やテレメトリ発生源へ書き換えない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: human
      allowed_values: [human]
      source_claims: [claim-human-feedback-design]
    - id: provider_ref
      labels: {zh: 人类提供者引用, en: Human provider reference, ja: 人間提供者参照}
      definitions:
        zh: 指向提供原始反馈的 Actor，而不是自动 grader 或遥测收集器。
        en: Reference to the Actor who supplied original feedback rather than an automated grader or telemetry collector.
        ja: 自動 grader やテレメトリ収集器ではなく、原フィードバックを提供した Actor への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Actor:assessor-42
      allowed_values: []
      source_claims: [claim-human-feedback-design]
    - id: subject_ref
      labels: {zh: 被反馈对象引用, en: Feedback subject reference, ja: フィードバック対象参照}
      definitions:
        zh: 指向人类意见针对的候选 Artifact。
        en: Reference to the candidate Artifact addressed by the human input.
        ja: 人間入力が対象とする候補 Artifact への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Artifact:answer-104
      allowed_values: []
      source_claims: [claim-human-feedback-design]
    - id: submitted_at
      labels: {zh: 提交时间, en: Submission time, ja: 提出時刻}
      definitions:
        zh: 人类提供者提交该原始意见的时间，而不是后续训练或修订时间。
        en: Time the human provider submitted the original input rather than a later training or revision time.
        ja: 人間提供者が原入力を提出した時刻であり、後続の訓練又は改訂時刻ではない。
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '2026-07-18T13:10:00Z'
      allowed_values: []
      source_claims: [claim-human-feedback-design]
    - id: mode
      labels: {zh: 反馈类型, en: Feedback mode, ja: フィードバック種別}
      definitions:
        zh: 指出人类内容主要是批评、纠正还是偏好表达，不推断训练标签。
        en: States whether human content is primarily critique, correction, or preference expression without inferring a training label.
        ja: 訓練ラベルを推論せず、人間内容が主に批評、訂正、又は選好表明のどれかを示す。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: correction
      allowed_values: [critique, correction, preference]
      source_claims: [claim-human-feedback-design]
    - id: content
      labels: {zh: 原始内容, en: Original content, ja: 原文内容}
      definitions:
        zh: 人类提供者的原始或忠实保留的内容，不替换成自动生成的总结。
        en: Original or faithfully retained content from the human provider and not an automatically generated summary.
        ja: 人間提供者からの原文又は忠実に保持した内容であり、自動生成要約ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Add a warranty escalation option after the safe troubleshooting steps.
      allowed_values: []
      source_claims: [claim-human-feedback-design]
  constraints:
    - id: human-feedback-has-human-provenance
      severity: error
      expression_language: plain
      expression: provider_ref must resolve to a human Actor and submitted_at must record the original submission time.
      explanation:
        zh: 没有真实人类来源的自动内容不得冒充人类反馈。
        en: Automated content with no real human source must not impersonate human feedback.
        ja: 実在の人間発生源を持たない自動内容は人間フィードバックを装ってはならない。
      source_claims: [claim-human-feedback-design]
    - id: human-feedback-is-not-training-signal
      severity: error
      expression_language: plain
      expression: A HumanFeedback record must not be used as training data, preference pair, or reward target until a separate LearningSignal records the transformation and consent or policy basis.
      explanation:
        zh: 人类意见的存在不等于已获授权或已准备好用于训练。
        en: The existence of human input does not mean it is authorized or prepared for training.
        ja: 人間入力が存在しても、訓練への許可又は準備が整ったことを意味しない。
      source_claims: [claim-human-feedback-instructgpt, claim-human-feedback-design]
  required_relations:
    - id: human-feedback-is-a-feedback
      direction: outgoing
      predicate: is_a
      target_concept_id: Feedback
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每条 HumanFeedback 是具有额外人类来源字段的 Feedback，不是父类的外部依据对象。
        en: Each HumanFeedback is Feedback with additional human-origin fields and not an external basis object of its parent.
        ja: 各 HumanFeedback は追加の人間発生源フィールドを持つ Feedback であり、親の外部根拠オブジェクトではない。
      source_claims: [claim-human-feedback-design]
    - id: human-feedback-is-about-artifact
      direction: outgoing
      predicate: is_about
      target_concept_id: Artifact
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每条 HumanFeedback 必须有一个明确候选对象。
        en: Each HumanFeedback must identify one explicit candidate subject.
        ja: 各 HumanFeedback は一つの明示的な候補対象を特定しなければならない。
      source_claims: [claim-human-feedback-design]
    - id: human-feedback-is-provided-by-actor
      direction: outgoing
      predicate: is_provided_by
      target_concept_id: Actor
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每条 HumanFeedback 必须指向提供它的人类 Actor。
        en: Each HumanFeedback must point to the human Actor who supplied it.
        ja: 各 HumanFeedback は、それを提供した人間 Actor を指さなければならない。
      source_claims: [claim-human-feedback-design]
examples:
  - id: human-feedback-example-langsmith-correction
    labels:
      zh: LangSmith 标注队列修正
      en: LangSmith annotation queue correction
      ja: LangSmith 注釈キュー修正
    descriptions:
      zh: LangSmith run-support-104 进入 annotation queue ticket-quality-review；标注员 Actor:annotator-42 将 category 从 Other 修正为 Hardware；HumanFeedback human-feedback-104 mode=correction 直接保存原文，无 evaluation_basis_ref。
      en: LangSmith run-support-104 enters annotation queue ticket-quality-review; annotator Actor:annotator-42 corrects category from Other to Hardware; HumanFeedback human-feedback-104 mode=correction retains original text directly with no evaluation_basis_ref.
      ja: LangSmith run-support-104 が annotation queue ticket-quality-review へ。注釈者 Actor:annotator-42 が category を Other から Hardware に修正。HumanFeedback human-feedback-104 mode=correction が原文を直接保持し evaluation_basis_ref はない。
    example_source:
      product: LangSmith
      url: https://docs.smith.langchain.com
      version: annotation queues and feedback
    field_values:
      feedback_id: human-feedback-104
      origin_kind: human
      provider_ref: Actor:annotator-42
      subject_ref: Artifact:answer-104
      submitted_at: '2026-07-18T13:10:00Z'
      mode: correction
      content: Correct category to Hardware after verifying monitor power-failure symptoms.
    related_node_ids: [HumanFeedback, Feedback, Actor, Artifact]
    related_relation_ids: [human-feedback-is-a-feedback, human-feedback-is-about-artifact, human-feedback-is-provided-by-actor]
    source_claims: [claim-human-feedback-langsmith, claim-human-feedback-design]
  - id: human-feedback-example-instructgpt-demo
    labels:
      zh: InstructGPT SFT 演示标注
      en: InstructGPT SFT demonstration label
      ja: InstructGPT SFT デモンストレーションラベル
    descriptions:
      zh: InstructGPT 约 13k SFT demos 中，contractor Actor:openai-contractor-labeler 对 prompt/completion 对提交 mode=correction 的 HumanFeedback；这是 SFT 数据准备上游来源，不是 RM r_θ(x,y) 输出或 PPO 执行记录。
      en: Among InstructGPT ~13k SFT demos, contractor Actor:openai-contractor-labeler submits HumanFeedback mode=correction on a prompt/completion pair; this is upstream SFT data prep, not RM r_θ(x,y) output or PPO execution record.
      ja: InstructGPT 約 13k SFT demos の一つで contractor Actor:openai-contractor-labeler が prompt/completion 対に mode=correction の HumanFeedback を提出。SFT データ準備の上流であり RM r_θ(x,y) 出力や PPO 実行記録ではない。
    example_source:
      product: InstructGPT
      url: https://arxiv.org/abs/2203.02155
      version: SFT demonstrations ~13k
    field_values:
      feedback_id: instructgpt-demo-001
      origin_kind: human
      provider_ref: Actor:openai-contractor-labeler
      subject_ref: Artifact:instructgpt-demo-completion
      submitted_at: '2022-03-01T00:00:00Z'
      mode: correction
      content: Rewrite completion to follow instruction format and safety policy.
    related_node_ids: [HumanFeedback, LearningSignal, PreferenceExample]
    related_relation_ids: [human-feedback-is-a-feedback]
    source_claims: [claim-human-feedback-instructgpt, claim-human-feedback-design]
  - id: human-feedback-example-pairwise-preference
    labels:
      zh: 人类 pairwise 偏好表达
      en: Human pairwise preference expression
      ja: 人間 pairwise 選好表明
    descriptions:
      zh: 标注员 Actor:assessor-42 在同一 ticket 上对 answer-A 与 answer-B 表达 mode=preference 的 HumanFeedback；此记录仍是原始人类意见，不能自动登记为 PreferenceExample，除非后续 policy 构造 chosen/rejected 对。
      en: Annotator Actor:assessor-42 expresses mode=preference HumanFeedback on answer-A versus answer-B for one ticket; this remains raw human input and cannot auto-register as PreferenceExample unless a later policy constructs chosen/rejected pairs.
      ja: 注釈者 Actor:assessor-42 が同一 ticket で answer-A と answer-B に対し mode=preference の HumanFeedback を表明。これは生の人間入力のままで、後続 policy が chosen/rejected 対を構築しない限り PreferenceExample として自動登録できない。
    example_source:
      product: LangSmith
      url: https://docs.smith.langchain.com
      version: pairwise review
    field_values:
      feedback_id: human-feedback-105
      origin_kind: human
      provider_ref: Actor:assessor-42
      subject_ref: Artifact:answer-A
      submitted_at: '2026-07-18T13:15:00Z'
      mode: preference
      content: I prefer answer-A over answer-B because it states the warranty limit clearly.
    related_node_ids: [HumanFeedback, PreferenceExample, Feedback]
    related_relation_ids: [human-feedback-is-provided-by-actor]
    source_claims: [claim-human-feedback-langsmith, claim-human-feedback-design]
  - id: human-feedback-counterexample-automated-grader
    labels:
      zh: 自动 grader 输出不是人类反馈
      en: Automated grader output is not human feedback
      ja: 自動 grader 出力は人間フィードバックではない
    descriptions:
      zh: OpenAI string_check grader 返回 pass/fail 但 provider_ref 为空且 origin_kind 被标为 human；不能登记为 HumanFeedback，因为缺少真实人类 Actor 与 submitted_at。
      en: OpenAI string_check grader returns pass/fail but provider_ref is empty and origin_kind is labeled human; cannot register as HumanFeedback because real human Actor and submitted_at are missing.
      ja: OpenAI string_check grader が pass/fail を返すが provider_ref が空で origin_kind=human。真の人間 Actor と submitted_at がないため HumanFeedback として登録できない。
    example_source:
      product: OpenAI Agent Evals
      url: https://platform.openai.com/docs/guides/evals
      version: grader output boundary
    field_values:
      feedback_id: null
      origin_kind: human
      provider_ref: null
      subject_ref: Artifact:answer-104
      submitted_at: null
      mode: critique
      content: The answer needs clarity.
    related_node_ids: [HumanFeedback, Verdict, Score]
    related_relation_ids: []
    source_claims: [claim-human-feedback-design]
  - id: human-feedback-boundary-learning-signal
    labels:
      zh: 人类反馈与学习信号的边界
      en: Boundary between human feedback and learning signal
      ja: 人間フィードバックと学習信号の境界
    descriptions:
      zh: HumanFeedback human-feedback-104 刚提交时尚无 dataset_ref 与 transformation_policy_ref；LearningSignal learning-signal-104 才记录 SFT 数据准备事实。不能把 LangSmith correction 直接写成 learning_objective=supervised 的 LearningSignal。
      en: HumanFeedback human-feedback-104 just submitted has no dataset_ref or transformation_policy_ref; LearningSignal learning-signal-104 records SFT data-prep fact. A LangSmith correction cannot be written directly as LearningSignal with learning_objective=supervised.
      ja: 提出直後の HumanFeedback human-feedback-104 には dataset_ref と transformation_policy_ref がない。LearningSignal learning-signal-104 が SFT データ準備事実を記録する。LangSmith correction を直接 learning_objective=supervised の LearningSignal として書けない。
    example_source:
      product: Moonweave feedback boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: human feedback vs learning signal
    field_values:
      feedback_id: human-feedback-104
      origin_kind: human
      provider_ref: Actor:assessor-42
      subject_ref: Artifact:answer-104
      submitted_at: '2026-07-18T13:10:00Z'
      mode: correction
      content: Add warranty escalation option after safe troubleshooting steps.
    related_node_ids: [HumanFeedback, LearningSignal, PreferenceExample]
    related_relation_ids: [human-feedback-is-a-feedback]
    source_claims: [claim-human-feedback-instructgpt, claim-human-feedback-design]
parent_relation:
  id: human-feedback-is-a-feedback
  predicate: is_a
  target: concept:Feedback
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是反馈的人类来源特化, en: is human-origin feedback, ja: 人間発生源のフィードバックである}
  definitions:
    zh: HumanFeedback 继承 Feedback 的对象和可引用记录边界，并增加人类来源事实。
    en: HumanFeedback retains Feedback subject and referencable-record boundary while adding human-origin facts.
    ja: HumanFeedback は Feedback の対象及び参照可能な記録境界を保持し、人間発生源の事実を追加する。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading:
    predicate: has_subtype
    labels: {zh: 有人类反馈子类型, en: has human feedback subtype, ja: 人間フィードバック下位型を持つ}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-human-feedback-design]
  distinct_fact_rationale:
    zh: 该层级表达来源特化，不把人类原话和后续训练信号混为同一记录。
    en: This hierarchy expresses origin specialization and does not conflate human original input with a later training signal.
