    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-feedback-002
    source: lit-mech-self-refine
    supports: Self-Refine treats feedback as a distinct information object consumed by a later refinement step. feedback_id is Moonweave's stable identity field for that object and is not prescribed by the paper.
    locator: Sections 2–3 > generator, feedback, and iterative refinement loop
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-feedback-003
