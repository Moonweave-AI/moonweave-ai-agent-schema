schema: moonweave.ai/ontology-node/v1
id: Feedback
kind: concept
status: accepted
labels:
  zh: 反馈记录
  en: Feedback Record
  ja: フィードバック記録
semantics:
  short_definition:
    zh: 针对一个候选产物、带有可追溯依据和来源的评估或人类反馈记录。
    en: An evaluation or human feedback record about one candidate artifact with traceable basis and origin.
    ja: 一つの候補成果物について、追跡可能な根拠と発生源を持つ評価又は人間フィードバック記録。
  definition:
    zh: Feedback 是关于候选产物的可引用质量观察、建议或改进请求记录。评估来源的 Feedback 必须引用 Verdict、Score 或准则绑定的 Evaluation Metric；人类来源的 Feedback 由其 HumanFeedback 子类型直接保存提供者和原文，而不是把另一条 HumanFeedback 当作“依据”。它不是原始 Log Record、Trace、Span、诊断事件、运行状态或实际 Revision Activity。
    en: Feedback is a referencable quality observation, recommendation, or improvement request about a candidate artifact. Evaluation-origin Feedback cites a Verdict, Score, or criterion-bound Evaluation Metric; human-origin Feedback is recorded directly by its HumanFeedback subtype with provider and original content, rather than treating another HumanFeedback as a basis. It is not a raw Log Record, Trace, Span, diagnostic event, execution status, or an actual Revision Activity.
    ja: Feedback は候補成果物に関する参照可能な品質観察、提案、又は改善要求の記録である。評価発生源の Feedback は Verdict、Score、又は基準に結び付く Evaluation Metric を引用し、人間発生源の Feedback は提供者と原文を保持する HumanFeedback 下位型として直接記録する。別の HumanFeedback を根拠として扱わない。生の Log Record、Trace、Span、診断イベント、実行状態、又は実際の Revision Activity ではない。
  why_needed:
    zh: 修订活动和记忆写入需要知道究竟是哪一条评估或人类意见促成了后续动作。标准化反馈记录能让团队复核建议的来源和依据，而不会把收集到的所有遥测误当成改进意见。
    en: Revision activities and memory writes need to know which particular evaluation or human input motivated later work. A standardized feedback record lets a team review the source and basis of a recommendation without treating every collected telemetry signal as an improvement request.
    ja: Revision activities と memory write は、どの評価又は人間入力が後続作業を動機付けたかを知る必要がある。標準化されたフィードバック記録により、収集した全テレメトリを改善要求と扱わずに、提案の発生源と根拠を再確認できる。
  includes:
    - zh: 反馈标识、被评对象引用、来源类别、内容和可选建议；评估来源还保留评价依据引用。
      en: Feedback identifier, subject reference, origin kind, content, optional recommendation, and an evaluation-basis reference only for evaluation origin.
      ja: フィードバック識別子、対象参照、発生源種別、内容、任意の提案、及び評価発生源だけの評価根拠参照。
    - zh: Evaluation Activity 生成的评估反馈，以及作为 Feedback 子类型直接保存的 HumanFeedback。
      en: Evaluation feedback generated by an Evaluation Activity and HumanFeedback retained directly as a Feedback subtype.
      ja: Evaluation Activity が生成する評価 Feedback と、Feedback 下位型として直接保持する HumanFeedback。
  excludes:
    - zh: 任何未由质量依据解释的生产日志、指标流、追踪对象、告警或错误码。
      en: Any production log, metric stream, tracing object, alert, or error code not interpreted through a quality basis.
      ja: 品質根拠で解釈されていない本番ログ、メトリックストリーム、トレーシング対象、アラート、又はエラーコード。
    - zh: 实际改写产物的 Revision Activity 或生成后的 RevisionArtifact。
      en: The Revision Activity that actually changes an artifact or the resulting RevisionArtifact.
      ja: 成果物を実際に変更する Revision Activity 又は生成後の RevisionArtifact。
  semantic_kind: information
  aliases: [assessment feedback, actionable feedback, 反馈]
engineering:
  explanation:
    zh: 上游 Evaluation Activity 可根据 Evaluation Specification 生成 Feedback，Revision Activity 可将 Feedback 用作输入；二者均是发生的活动，而本节点是其可引用信息产物。当前 Responses API 只负责生成候选，独立评估器或人工流程再写入 Feedback 记录。OpenAI 的 Working with evals 文档展示 `/v1/evals`、`data_source_config` 和 `testing_criteria` 契约；这些 API 形状不定义本地 Feedback 写入所有权。
    en: An upstream Evaluation Activity can generate Feedback under an Evaluation Specification and a Revision Activity can use Feedback as input; both are occurred activities while this node is their referencable information product. The current Responses API only generates a candidate, after which an independent evaluator or human process writes a Feedback record. OpenAI’s Working with evals documentation shows the `/v1/evals`, `data_source_config`, and `testing_criteria` contract shapes; those API shapes do not define local Feedback write ownership.
    ja: 上流の Evaluation Activity は Evaluation Specification の下で Feedback を生成でき、Revision Activity は Feedback を入力として使用できる。両者は発生した活動であり、本ノードはその参照可能な情報成果物である。現行 Responses API は候補を生成するだけで、その後に独立した評価器又は人間プロセスが Feedback 記録を書く。OpenAI の Working with evals 文書は `/v1/evals`、`data_source_config`、`testing_criteria` の契約形状を示すが、これらはローカル Feedback 書込みの所有権を定義しない。
  typical_input:
    - description: Current candidate-generation request before independent evaluation.
      format: |
        POST /v1/responses
        {"model":"gpt-5.6","input":"Classify this support ticket as Hardware, Software, or Other."}
      source_claims: [claim-feedback-responses]
    - description: Local feedback basis supplied by an evaluator.
      format: |
        {
          "subject_ref": "Artifact:answer-104",
          "origin_kind": "evaluation",
          "evaluation_basis_ref": "Verdict:verdict-105",
          "content": "Correct the category selection for hardware power failures."
        }
      source_claims: [claim-feedback-design]
  typical_output:
    - description: Local feedback record for later revision work.
      format: |
        {
          "feedback_id": "feedback-105",
          "subject_ref": "Artifact:answer-104",
          "origin_kind": "evaluation",
          "evaluation_basis_ref": "Verdict:verdict-105",
          "content": "The candidate chose Software but the labeled category is Hardware.",
          "recommendation": "Revise the classification instruction and rerun the category criterion."
        }
      source_claims: [claim-feedback-design]
  reference_implementations:
    - name: OpenAI Responses API create reference
      url: https://developers.openai.com/api/reference/resources/responses/methods/create
      description: Current candidate-generation boundary kept separate from feedback record ownership.
    - name: OpenAI Working with evals
      url: https://developers.openai.com/api/docs/guides/evals
      description: Documents `/v1/evals`, `data_source_config`, and `testing_criteria` contract shapes without assigning local Feedback ownership.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines the distinction between generated entities and the activities that use or generate them.
structure:
  identity_keys: [feedback_id]
  fields:
    - id: feedback_id
      labels:
        zh: 反馈标识
        en: Feedback identifier
        ja: フィードバック識別子
      definitions:
        zh: 唯一标识一条可由评估、修订或记忆流程引用的反馈记录。
        en: Uniquely identifies one feedback record that can be cited by assessment, revision, or memory processes.
        ja: 評価、改訂、又は memory プロセスが引用できる一件のフィードバック記録を一意に識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: feedback-105
      allowed_values: []
      source_claims: [claim-feedback-design]
    - id: subject_ref
      labels:
        zh: 被反馈对象引用
        en: Feedback subject reference
        ja: フィードバック対象参照
      definitions:
        zh: 指向被评价或建议修改的候选 Artifact 的稳定引用。
        en: Stable reference to the candidate Artifact assessed or recommended for change.
        ja: 評価又は変更提案の対象となる候補 Artifact への安定参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Artifact:answer-104
      allowed_values: []
      source_claims: [claim-feedback-design]
    - id: origin_kind
      labels:
        zh: 反馈来源类别
        en: Feedback origin kind
        ja: フィードバック発生源種別
      definitions:
        zh: 表示记录来自评估器还是人类提供者，不能用该字段伪装运行时遥测来源。
        en: States whether the record comes from an evaluator or human provider and cannot be used to disguise a runtime telemetry source.
        ja: 記録が評価器又は人間提供者のどちらから来たかを示し、実行時テレメトリ源を偽装するために使えない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: evaluation
      allowed_values: [evaluation, human]
      source_claims: [claim-feedback-design]
    - id: evaluation_basis_ref
      labels:
        zh: 评估依据引用
        en: Evaluation basis reference
        ja: 評価根拠参照
      definitions:
        zh: 仅当 origin_kind 为 evaluation 时，指向支持内容的 Verdict、Score 或准则绑定 Evaluation Metric；HumanFeedback 以自身内容和提供者直接表达来源。
        en: For origin_kind evaluation only, reference to a Verdict, Score, or criterion-bound Evaluation Metric supporting content; HumanFeedback expresses human origin through its own provider and content.
        ja: origin_kind が evaluation の場合だけ内容を支える Verdict、Score、又は基準に結び付く Evaluation Metric への参照。HumanFeedback は自身の提供者と内容で人間発生源を表す。
      datatype: reference
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: Verdict:verdict-105
      allowed_values: []
      source_claims: [claim-feedback-design]
    - id: content
      labels:
        zh: 反馈内容
        en: Feedback content
        ja: フィードバック内容
      definitions:
        zh: 对观察、问题或改进请求的可读说明；评估来源由 evaluation_basis_ref 支持，人类来源由 HumanFeedback 的原文和提供者支持。
        en: Readable observation, issue, or improvement request supported by evaluation_basis_ref for evaluation origin or by a HumanFeedback subtype's original content and provider for human origin.
        ja: 観察、問題、又は改善要求の可読な記述。評価発生源は evaluation_basis_ref、人間発生源は HumanFeedback 下位型の原文と提供者で支える。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: The candidate chose Software but the label is Hardware.
      allowed_values: []
      source_claims: [claim-feedback-design]
    - id: recommendation
      labels:
        zh: 建议
        en: Recommendation
        ja: 提案
      definitions:
        zh: 可选的下一步建议；它不是已经执行的 Revision Activity 或已实现的变更。
        en: Optional next-step recommendation; it is not an executed Revision Activity or an implemented change.
        ja: 任意の次の一手の提案。実行済みの Revision Activity 又は実装済み変更ではない。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: Revise the classification instruction and rerun the criterion.
      allowed_values: []
      source_claims: [claim-feedback-design]
  constraints:
    - id: feedback-evaluation-origin-has-basis
      severity: error
      expression_language: plain
      expression: origin_kind evaluation requires evaluation_basis_ref resolving to a retained Verdict, Score, or criterion-bound EvaluationMetric that supports content.
      explanation:
        zh: 没有评估依据的文字、日志或告警不能登记为评估反馈。
        en: Text, log, or alert without evaluation evidence cannot be registered as evaluation feedback.
        ja: 評価根拠のない文章、ログ、又はアラートは評価 Feedback として登録できない。
      source_claims: [claim-feedback-design]
    - id: feedback-human-origin-is-direct-subtype
      severity: error
      expression_language: plain
      expression: origin_kind human requires a HumanFeedback subtype with human provider and original content and must not use another HumanFeedback as evaluation_basis_ref; runtime telemetry is not a valid origin kind.
      explanation:
        zh: 人类意见是 Feedback 的直接人类来源子类型；不能通过“HumanFeedback 作为依据”把父子关系倒置，遥测也不能改名为人类意见。
        en: Human input is a direct human-origin Feedback subtype; a parent-child relation must not be inverted by using HumanFeedback as a basis, and telemetry cannot be renamed as human input.
        ja: 人間入力は直接の人間発生源 Feedback 下位型である。HumanFeedback を根拠にして親子関係を反転してはならず、テレメトリを人間入力と改名できない。
      source_claims: [claim-feedback-design]
  required_relations:
    - id: feedback-is-about-artifact
      direction: outgoing
      predicate: is_about
      target_concept_id: Artifact
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每条 Feedback 必须有一个明确的候选 Artifact 对象。
        en: Each Feedback must have one explicit candidate Artifact subject.
        ja: 各 Feedback は一つの明示的な候補 Artifact 対象を持たなければならない。
      source_claims: [claim-feedback-design]
examples:
  - id: feedback-positive-category-correction

    labels:
      zh: OpenAI Evals grader 失败反馈
      en: OpenAI Evals grader failure feedback
      ja: OpenAI Evals grader 失敗フィードバック

    descriptions:
      zh: "Self-Refine (Madaan et al., 2023) Generate->Feedback->Refine loop without external training; Feedback maps feedback-driven revision artifacts."
      en: "Self-Refine (Madaan et al., 2023) Generate->Feedback->Refine loop without external training; Feedback maps feedback-driven revision artifacts."
      ja: "Self-Refine Generate->Feedback->Refine; Feedback revision artifact."
    field_values:
      feedback_id: openai-eval-grader-fail-001
      subject_ref: Artifact:gpt4o-ticket-classification
      origin_kind: evaluation
      evaluation_basis_ref: Verdict:verdict-string-check-fail
      content: Model output Software but correct_label is Hardware per string_check grader.
    related_node_ids: [Feedback, Verdict, Artifact, EvaluationActivity]
    related_relation_ids: [feedback-is-about-artifact]

    source_claims: [claim-feedback-design]
  - id: feedback-counterexample-raw-error-log

    labels:
      zh: 原始错误日志不是反馈
      en: Raw error log is not feedback
      ja: 生のエラーログはフィードバックではない

    descriptions:
      zh: "Vague scoring without constitutional principles cannot serve as CAI-style Feedback."
      en: "Vague scoring without constitutional principles cannot serve as CAI-style Feedback."
      ja: "Missing principles rejects CAI-style Feedback."
    field_values:
      feedback_id: null
      subject_ref: null
      origin_kind: null
      evaluation_basis_ref: null
      content: Database timeout.
    related_node_ids: [Feedback]
    related_relation_ids: []

    source_claims: [claim-feedback-design]
  - id: feedback-boundary-human-input

    labels:
      zh: 人类原话与结构化反馈的边界
      en: Boundary between human statement and structured feedback
      ja: 人間の発言と構造化フィードバックの境界

    descriptions:
      zh: "Reflexion reflection goes to memory not RewardModelScore; distinguish Feedback from Score."
      en: "Reflexion reflection goes to memory not RewardModelScore; distinguish Feedback from Score."
      ja: "Reflexion reflection not Score."
    field_values:
      feedback_id: human-feedback-104
      subject_ref: Artifact:answer-104
      origin_kind: human
      evaluation_basis_ref: null
      content: Add a warranty escalation step after the safe troubleshooting steps.
    related_node_ids: [Feedback, HumanFeedback, Artifact]
    related_relation_ids: [feedback-is-about-artifact]

    source_claims: [claim-feedback-design]
  - id: feedback-instance-category-feedback-105

    labels:
      zh: 具体分类反馈 feedback-105
      en: Concrete category feedback feedback-105
      ja: 具体的な分類フィードバック feedback-105

    descriptions:
      zh: "CAI instance: principle->self-critique->revised->Feedback origin_kind=ai-assisted."
      en: "CAI instance: principle->self-critique->revised->Feedback origin_kind=ai-assisted."
      ja: "CAI instance maps to Feedback."
    field_values:
      feedback_id: feedback-105
      subject_ref: Artifact:answer-104
      origin_kind: evaluation
      evaluation_basis_ref: Verdict:verdict-105
      content: The candidate chose Software but the labeled category is Hardware.
    related_node_ids: [Feedback, Verdict, EvaluationActivity, RevisionActivity, RevisionArtifact]
    related_relation_ids: [feedback-is-about-artifact]

    source_claims: [claim-feedback-provenance, claim-feedback-design]
parent_relation: null
relations:
  - id: feedback-is-about-artifact
    predicate: is_about
    target: concept:Artifact
    direction: source-to-target
    relation_kind: semantic
    labels:
      zh: 反馈关于候选产物
      en: feedback is about artifact
      ja: フィードバックが成果物についてである
    definitions:
      zh: Feedback 指向被评估或建议修改的 Artifact，而非泛指整个运行或遥测流。
      en: Feedback points to the Artifact assessed or recommended for change rather than vaguely to a run or telemetry stream.
      ja: Feedback は実行又はテレメトリストリームを曖昧に指すのでなく、評価又は変更提案の対象となる Artifact を指す。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: has_feedback
      labels:
        zh: 产物有反馈
        en: artifact has feedback
        ja: 成果物がフィードバックを持つ
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-feedback-design]
    distinct_fact_rationale:
      zh: 该关系记录反馈对象，不记录产生反馈的活动或其依据。
      en: This relation records feedback subject and not the activity that generated feedback or its basis.
      ja: この関係はフィードバック対象を記録し、フィードバックを生成した活動又はその根拠を記録しない。
    layout_role: cross-link
sources:
  - id: openai-responses-feedback
    title: OpenAI Responses API create reference
    url: https://developers.openai.com/api/reference/resources/responses/methods/create
    source_type: official-doc
    relevance: Documents current response generation that remains separate from local feedback-record ownership.
  - id: openai-evals-feedback
    title: OpenAI Working with evals
    url: https://developers.openai.com/api/docs/guides/evals
    source_type: official-doc
    relevance: Documents `/v1/evals`, `data_source_config`, and `testing_criteria` contract shapes without defining ownership of local Feedback records.
  - id: prov-o-feedback
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines Entity and Activity distinctions and provenance links for generated information and activities that use it.
  - id: feedback-design
    title: Feedback record design inference
    url: https://www.w3.org/TR/prov-o/
    source_type: design-inference
    relevance: Models evaluation-basis-backed Feedback and direct human-origin HumanFeedback separately from raw observability and revision execution.
source_claims:
  - id: claim-feedback-responses
    source: openai-responses-feedback
    supports: The Responses API is a current candidate-generation interface that can be evaluated separately.
    locator: "Responses API reference: response creation"
    evidence_kind: official
    confidence: high
  - id: claim-feedback-evals-contract
    source: openai-evals-feedback
    supports: OpenAI Working with evals documents `/v1/evals`, `data_source_config`, and `testing_criteria` as Evals contract shapes that do not define local Feedback ownership.
    locator: "Working with evals: Create an eval for a task; Run an eval"
    evidence_kind: official
    confidence: high
  - id: claim-feedback-provenance
    source: prov-o-feedback
    supports: PROV-O distinguishes an information Entity from an Activity that generates or uses it.
    locator: "PROV-O: prov:Entity, prov:Activity, prov:used, prov:wasGeneratedBy"
    evidence_kind: normative
    confidence: high
  - id: claim-feedback-design
    source: feedback-design
    supports: Evaluation-origin Feedback is an evaluation-basis-backed information record, while human-origin feedback is represented directly by the HumanFeedback subtype; both remain distinct from raw telemetry, diagnostics, and revision execution.
    locator: "Local feedback record boundary"
    evidence_kind: design-inference
    confidence: high


