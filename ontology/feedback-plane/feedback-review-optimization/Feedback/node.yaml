schema: moonweave.ai/ontology-node/v1
id: Feedback
kind: concept
labels:
  zh: 反馈记录
  en: Feedback Record
  ja: フィードバック記録
semantics:
  short_definition:
    zh: 针对一个候选产物、带有可追溯依据和来源的评估或人类反馈记录。
    en: An evaluation or human feedback record about one candidate artifact with traceable basis and origin.
    ja: 一つの候補成果物について、追跡可能な根拠と発生源を持つ評価又は人間フィードバック記録。
  definition:
    zh: Feedback 是关于候选产物的可引用质量观察、建议或改进请求记录。评估来源的 Feedback 必须引用 Verdict、Score 或准则绑定的 EvaluationMetric；人类来源的 Feedback 由其 HumanFeedback 子类型直接保存提供者和原文。它映射 OpenAI eval grader 失败摘要、LangSmith human annotation/correction、Braintrust review 评论、DeepEval 测试失败说明。它不是原始 Log Record、Trace、Span、诊断事件或实际 Revision Activity。
    en: "Feedback is a referencable quality observation, recommendation, or improvement request about a candidate artifact. Evaluation-origin Feedback cites a Verdict, Score, or criterion-bound EvaluationMetric; human-origin Feedback is recorded directly by its HumanFeedback subtype with provider and original content. It maps to OpenAI eval grader failure summaries, LangSmith human annotation/correction, Braintrust review comments, and DeepEval test failure notes. It is not a raw Log Record, Trace, Span, diagnostic event, or an actual Revision Activity."
    ja: Feedback は候補成果物に関する参照可能な品質観察、提案、又は改善要求の記録。評価発生源は Verdict、Score、基準結合 EvaluationMetric を引用し、人間発生源は HumanFeedback 下位型が提供者と原文を直接保持する。OpenAI eval grader 失敗要約、LangSmith human annotation/correction、Braintrust review コメント、DeepEval テスト失敗説明に写像する。生 Log Record、Trace、Span、診断イベント、実際 Revision Activity ではない。
  why_needed:
    zh: 修订活动和记忆写入需要知道究竟是哪一条评估或人类意见促成了后续动作。标准化反馈记录能让团队复核建议的来源和依据，而不会把 LangSmith trace 或 OpenTelemetry span 误当成改进意见。
    en: "Revision activities and memory writes need to know which evaluation or human input motivated later work. A standardized feedback record lets a team review recommendation source and basis without treating LangSmith traces or OpenTelemetry spans as improvement requests."
    ja: Revision activities と memory write は、どの評価又は人間入力が後続作業を動機付けたかを知る必要がある。LangSmith trace や OpenTelemetry span を改善要求と誤認せず、提案の発生源と根拠を再確認できる。
  includes:
    - zh: 反馈标识、被评对象引用、来源类别、内容和可选建议；评估来源还保留 evaluation_basis_ref。
      en: "Feedback identifier, subject reference, origin kind, content, optional recommendation, and evaluation_basis_ref for evaluation origin."
      ja: フィードバック識別子、対象参照、発生源種別、内容、任意提案、評価発生源の evaluation_basis_ref。
    - zh: Evaluation Activity 生成的评估反馈，以及作为 Feedback 子类型直接保存的 HumanFeedback。
      en: Evaluation feedback generated by Evaluation Activity and HumanFeedback retained directly as a Feedback subtype.
      ja: Evaluation Activity が生成する評価 Feedback と HumanFeedback 下位型として直接保持する人間 Feedback。
  excludes:
    - zh: 任何未由质量依据解释的生产日志、指标流、追踪对象、告警或错误码。
      en: Any production log, metric stream, tracing object, alert, or error code not interpreted through a quality basis.
      ja: 品質根拠で解釈されていない本番ログ、メトリック、トレーシング、アラート、エラーコード。
    - zh: 实际改写产物的 Revision Activity 或生成后的 RevisionArtifact。
      en: The Revision Activity that actually changes an artifact or the resulting RevisionArtifact.
      ja: 成果物を実際に変更する Revision Activity 又は RevisionArtifact。
  semantic_kind: information
  aliases: [assessment feedback, actionable feedback, 反馈]
engineering:
  explanation:
    zh: 新集成应以 OpenAI eval grader 结果、LangSmith POST /feedback 与 annotation、Braintrust experiment review、DeepEval assert_test 失败消息为可映射 API 形状，再写入 Feedback 记录。Responses API 只生成候选；独立评估器或人工流程拥有 Feedback 写入所有权。OpenAI /v1/evals 与 testing_criteria 是评估契约，不自动等于本地 Feedback 对象。
    en: "New integrations should treat OpenAI eval grader results, LangSmith POST /feedback and annotations, Braintrust experiment reviews, and DeepEval assert_test failure messages as mappable API shapes, then write Feedback records. The Responses API only generates candidates; independent evaluators or human processes own Feedback write ownership. OpenAI /v1/evals and testing_criteria are evaluation contracts, not automatically local Feedback objects."
    ja: OpenAI eval grader 結果、LangSmith POST /feedback と annotation、Braintrust experiment review、DeepEval assert_test 失敗メッセージを写像可能 API 形状として扱い Feedback 記録を書く。Responses API は候補生成のみ。OpenAI /v1/evals と testing_criteria は評価契約であり、自動的にローカル Feedback ではない。
  typical_input:
    - description: OpenAI string_check grader failure after eval run.
      format: |
        {
          "subject_ref": "Artifact:gpt4o-ticket-classification",
          "origin_kind": "evaluation",
          "evaluation_basis_ref": "Verdict:verdict-string-check-fail",
          "content": "Model output Software but correct_label is Hardware."
        }
      source_claims: [claim-feedback-openai-evals, claim-feedback-design]
    - description: LangSmith human annotation correction.
      format: |
        {
          "subject_ref": "Artifact:answer-104",
          "origin_kind": "human",
          "content": "Add warranty escalation step after safe troubleshooting.",
          "provider_ref": "Actor:assessor-42"
        }
      source_claims: [claim-feedback-langsmith, claim-feedback-design]
  typical_output:
    - description: Local feedback record for later revision work.
      format: |
        {
          "feedback_id": "feedback-105",
          "subject_ref": "Artifact:answer-104",
          "origin_kind": "evaluation",
          "evaluation_basis_ref": "Verdict:verdict-105",
          "content": "The candidate chose Software but the labeled category is Hardware.",
          "recommendation": "Revise the classification instruction and rerun the category criterion."
        }
      source_claims: [claim-feedback-design]
  reference_implementations:
    - name: OpenAI Agent Evals
      url: https://platform.openai.com/docs/guides/evals
      description: Grader failures as evaluation-origin feedback basis.
    - name: LangSmith
      url: https://docs.smith.langchain.com
      description: Human annotations and feedback scores on runs.
    - name: Braintrust
      url: https://www.braintrust.dev/docs
      description: Experiment review comments and assertion failures.
    - name: DeepEval
      url: https://docs.confident-ai.com
      description: LLMTestCase assertion failures as evaluation feedback evidence.
structure:
  identity_keys: [feedback_id]
  fields:
    - id: feedback_id
      labels: {zh: 反馈标识, en: Feedback identifier, ja: フィードバック識別子}
      definitions:
        zh: 唯一标识一条可由评估、修订或记忆流程引用的反馈记录。
        en: Uniquely identifies one feedback record that can be cited by assessment, revision, or memory processes.
        ja: 評価、改訂、memory プロセスが引用できる一件のフィードバック記録を一意に識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: feedback-105
      allowed_values: []
      source_claims: [claim-feedback-design]
    - id: subject_ref
      labels: {zh: 被反馈对象引用, en: Feedback subject reference, ja: フィードバック対象参照}
      definitions:
        zh: 指向被评价或建议修改的候选 Artifact 的稳定引用。
        en: Stable reference to the candidate Artifact assessed or recommended for change.
        ja: 評価又は変更提案の対象となる候補 Artifact への安定参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Artifact:answer-104
      allowed_values: []
      source_claims: [claim-feedback-design]
    - id: origin_kind
      labels: {zh: 反馈来源类别, en: Feedback origin kind, ja: フィードバック発生源種別}
      definitions:
        zh: 表示记录来自评估器还是人类提供者，不能用该字段伪装运行时遥测来源。
        en: States whether the record comes from an evaluator or human provider and cannot disguise a runtime telemetry source.
        ja: 評価器又は人間提供者のどちらかを示し、実行時テレメトリ源を偽装できない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: evaluation
      allowed_values: [evaluation, human]
      source_claims: [claim-feedback-design]
    - id: evaluation_basis_ref
      labels: {zh: 评估依据引用, en: Evaluation basis reference, ja: 評価根拠参照}
      definitions:
        zh: 仅当 origin_kind 为 evaluation 时，指向支持内容的 Verdict、Score 或准则绑定 EvaluationMetric。
        en: For origin_kind evaluation only, reference to Verdict, Score, or criterion-bound EvaluationMetric supporting content.
        ja: origin_kind が evaluation の場合のみ、Verdict、Score、基準結合 EvaluationMetric への参照。
      datatype: reference
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: Verdict:verdict-105
      allowed_values: []
      source_claims: [claim-feedback-design]
    - id: content
      labels: {zh: 反馈内容, en: Feedback content, ja: フィードバック内容}
      definitions:
        zh: 对观察、问题或改进请求的可读说明；评估来源由 evaluation_basis_ref 支持，人类来源由 HumanFeedback 原文和提供者支持。
        en: Readable observation, issue, or improvement request supported by evaluation_basis_ref for evaluation origin or HumanFeedback original content and provider for human origin.
        ja: 観察、問題、改善要求の可読記述。評価発生源は evaluation_basis_ref、人間発生源は HumanFeedback 原文と提供者で支える。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: The candidate chose Software but the label is Hardware.
      allowed_values: []
      source_claims: [claim-feedback-design]
    - id: recommendation
      labels: {zh: 建议, en: Recommendation, ja: 提案}
      definitions:
        zh: 可选的下一步建议；它不是已经执行的 Revision Activity 或已实现的变更。
        en: Optional next-step recommendation; not an executed Revision Activity or implemented change.
        ja: 任意の次の一手。実行済み Revision Activity 又は実装済み変更ではない。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: Revise the classification instruction and rerun the criterion.
      allowed_values: []
      source_claims: [claim-feedback-design]
  constraints:
    - id: feedback-evaluation-origin-has-basis
      severity: error
      expression_language: plain
      expression: origin_kind evaluation requires evaluation_basis_ref resolving to a retained Verdict, Score, or criterion-bound EvaluationMetric that supports content.
      explanation:
        zh: 没有评估依据的文字、日志或告警不能登记为评估反馈。
        en: Text, log, or alert without evaluation evidence cannot be registered as evaluation feedback.
        ja: 評価根拠のない文章、ログ、アラートは評価 Feedback として登録できない。
      source_claims: [claim-feedback-design]
    - id: feedback-human-origin-is-direct-subtype
      severity: error
      expression_language: plain
      expression: origin_kind human requires a HumanFeedback subtype with human provider and original content and must not use another HumanFeedback as evaluation_basis_ref; runtime telemetry is not a valid origin kind.
      explanation:
        zh: 人类意见是 Feedback 的直接人类来源子类型；遥测也不能改名为人类意见。
        en: Human input is a direct human-origin Feedback subtype; telemetry cannot be renamed as human input.
        ja: 人間入力は直接の人間発生源下位型。テレメトリを人間入力と改名できない。
      source_claims: [claim-feedback-design]
  required_relations:
    - id: feedback-is-about-artifact
      direction: outgoing
      predicate: is_about
      target_concept_id: Artifact
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每条 Feedback 必须有一个明确的候选 Artifact 对象。
        en: Each Feedback must have one explicit candidate Artifact subject.
        ja: 各 Feedback は一つの明示的な候補 Artifact 対象を持つ。
      source_claims: [claim-feedback-design]
examples:
  - id: feedback-example-openai-grader-failure
    labels:
      zh: OpenAI string_check grader 失败反馈
      en: OpenAI string_check grader failure feedback
      ja: OpenAI string_check grader 失敗フィードバック
    descriptions:
      zh: feedback_id=openai-eval-grader-fail-001 origin_kind=evaluation evaluation_basis_ref=Verdict:verdict-string-check-fail content=Model output Software but correct_label is Hardware；OpenAI eval run grader 失败驱动，不是 trace span。
      en: feedback_id=openai-eval-grader-fail-001 origin_kind=evaluation evaluation_basis_ref=Verdict:verdict-string-check-fail; OpenAI eval run grader failure driven, not a trace span.
      ja: OpenAI eval grader 失敗に根拠。trace span ではない。
    example_source:
      product: OpenAI Agent Evals
      url: https://platform.openai.com/docs/guides/evals
      version: string_check grader
    field_values:
      feedback_id: openai-eval-grader-fail-001
      subject_ref: Artifact:gpt4o-ticket-classification
      origin_kind: evaluation
      evaluation_basis_ref: Verdict:verdict-string-check-fail
      content: Model output Software but correct_label is Hardware per string_check grader.
      recommendation: Revise classification prompt and rerun eval on hardware-failure cases.
    related_node_ids: [Feedback, Verdict, Artifact, EvaluationRun]
    related_relation_ids: [feedback-is-about-artifact]
    source_claims: [claim-feedback-openai-evals, claim-feedback-design]
  - id: feedback-example-langsmith-annotation
    labels:
      zh: LangSmith 人工标注反馈
      en: LangSmith human annotation feedback
      ja: LangSmith 人間注釈フィードバック
    descriptions:
      zh: feedback_id=langsmith-annotation-8842 origin_kind=human content=Add warranty escalation after safe troubleshooting；LangSmith human annotation/correction 直接保存为 HumanFeedback 子类型，无 evaluation_basis_ref。
      en: feedback_id=langsmith-annotation-8842 origin_kind=human; LangSmith human annotation/correction retained directly as HumanFeedback subtype without evaluation_basis_ref.
      ja: LangSmith human annotation/correction を HumanFeedback 下位型として直接保持。
    example_source:
      product: LangSmith
      url: https://docs.smith.langchain.com
      version: human annotations
    field_values:
      feedback_id: langsmith-annotation-8842
      subject_ref: Artifact:answer-104
      origin_kind: human
      evaluation_basis_ref: null
      content: Add warranty escalation step after safe troubleshooting steps.
    related_node_ids: [Feedback, HumanFeedback, Artifact]
    related_relation_ids: [feedback-is-about-artifact]
    source_claims: [claim-feedback-langsmith, claim-feedback-design]
  - id: feedback-example-deepeval-failure
    labels:
      zh: DeepEval 断言失败反馈
      en: DeepEval assertion failure feedback
      ja: DeepEval 断言失敗フィードバック
    descriptions:
      zh: feedback_id=deepeval-faithfulness-fail-003 origin_kind=evaluation evaluation_basis_ref=Verdict:deepeval-faithfulness-fail content=Answer contradicts retrieval_context on refund window；DeepEval LLMTestCase 断言失败，不是原始 metric stream。
      en: feedback_id=deepeval-faithfulness-fail-003 origin_kind=evaluation; DeepEval LLMTestCase assertion failure, not raw metric stream.
      ja: DeepEval LLMTestCase 断言失敗。生 metric stream ではない。
    example_source:
      product: DeepEval
      url: https://docs.confident-ai.com
      version: LLMTestCase assertions
    field_values:
      feedback_id: deepeval-faithfulness-fail-003
      subject_ref: Artifact:rag-refund-answer
      origin_kind: evaluation
      evaluation_basis_ref: Verdict:deepeval-faithfulness-fail
      content: Answer contradicts retrieval_context on 30-day refund window.
    related_node_ids: [Feedback, Verdict, EvaluationCriterion]
    related_relation_ids: [feedback-is-about-artifact]
    source_claims: [claim-feedback-deepeval, claim-feedback-design]
  - id: feedback-counterexample-raw-error-log
    labels:
      zh: 原始错误日志不是反馈
      en: Raw error log is not feedback
      ja: 生のエラーログはフィードバックではない
    descriptions:
      zh: 生产日志 Database timeout 无 subject_ref 与 evaluation_basis_ref；不能登记为 Feedback，因为缺少质量依据与候选对象。
      en: Production log Database timeout with no subject_ref or evaluation_basis_ref; cannot register as Feedback because quality basis and candidate subject are missing.
      ja: subject_ref と evaluation_basis_ref なし。Feedback として登録不可。
    example_source:
      product: Moonweave feedback boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: quality basis requirement
    field_values:
      feedback_id: null
      subject_ref: null
      origin_kind: null
      evaluation_basis_ref: null
      content: Database timeout.
    related_node_ids: [Feedback]
    related_relation_ids: []
    source_claims: [claim-feedback-design]
  - id: feedback-example-braintrust-review
    labels:
      zh: Braintrust experiment review 反馈
      en: Braintrust experiment review feedback
      ja: Braintrust experiment review フィードバック
    descriptions:
      zh: feedback_id=braintrust-review-221 origin_kind=evaluation evaluation_basis_ref=Verdict:braintrust-assertion-fail recommendation=Increase faithfulness threshold for refund cases；Braintrust review 评论经 Verdict 绑定后成为评估来源 Feedback。
      en: feedback_id=braintrust-review-221 origin_kind=evaluation; Braintrust review comment bound through Verdict as evaluation-origin Feedback.
      ja: Braintrust review コメントが Verdict 経由で評価発生源 Feedback になる。
    example_source:
      product: Braintrust
      url: https://www.braintrust.dev/docs
      version: experiment review
    field_values:
      feedback_id: braintrust-review-221
      subject_ref: Artifact:rag-answer-221
      origin_kind: evaluation
      evaluation_basis_ref: Verdict:braintrust-assertion-fail
      content: Faithfulness assertion failed on refund-policy case.
      recommendation: Increase faithfulness threshold for refund-policy cases.
    related_node_ids: [Feedback, Verdict, ChangeProposal]
    related_relation_ids: [feedback-is-about-artifact]
    source_claims: [claim-feedback-design]
parent_relation: null
relations:
  - id: feedback-is-about-artifact
    predicate: is_about
    target: concept:Artifact
    direction: source-to-target
    relation_kind: semantic
    labels: {zh: 反馈关于候选产物, en: feedback is about artifact, ja: フィードバックが成果物についてである}
    definitions:
      zh: Feedback 指向被评估或建议修改的 Artifact，而非泛指整个运行或遥测流。
      en: Feedback points to the Artifact assessed or recommended for change rather than vaguely to a run or telemetry stream.
      ja: 実行又はテレメトリストリームではなく、評価又は変更提案対象 Artifact を指す。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: has_feedback, labels: {zh: 产物有反馈, en: artifact has feedback, ja: 成果物がフィードバックを持つ}}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-feedback-design]
    distinct_fact_rationale:
      zh: 该关系记录反馈对象，不记录产生反馈的活动或其依据。
      en: This relation records feedback subject and not the activity that generated feedback or its basis.
      ja: フィードバック対象を記録し、生成活動又は根拠は記録しない。
    layout_role: cross-link
sources:
  - id: openai-evals-feedback
    title: OpenAI Agent Evals
    url: https://platform.openai.com/docs/guides/evals
    source_type: official-doc
    relevance: Grader failures as evaluation-origin feedback evidence.
  - id: langsmith-feedback
    title: LangSmith Documentation
    url: https://docs.smith.langchain.com
    source_type: official-doc
    relevance: Human annotations and feedback on runs.
  - id: deepeval-feedback
    title: DeepEval Documentation
    url: https://docs.confident-ai.com
    source_type: official-doc
    relevance: LLMTestCase assertion failures as evaluation feedback basis.
  - id: prov-o-feedback
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Entity and Activity distinctions for generated information.
  - id: feedback-design
    title: Feedback record design inference
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Evaluation-basis-backed Feedback and HumanFeedback separate from raw observability and revision execution.
source_claims:
  - id: claim-feedback-openai-evals
    source: openai-evals-feedback
    supports: OpenAI eval grader failures provide Verdict-backed evidence for evaluation-origin Feedback records.
    locator: Run grader — failure results
    evidence_kind: official
    confidence: high
  - id: claim-feedback-langsmith
    source: langsmith-feedback
    supports: LangSmith human annotations and corrections can be retained as human-origin Feedback with provider and content.
    locator: Annotations and feedback
    evidence_kind: official
    confidence: high
  - id: claim-feedback-deepeval
    source: deepeval-feedback
    supports: DeepEval LLMTestCase assertion failures provide criterion-bound evaluation evidence for Feedback content.
    locator: LLMTestCase and metrics
    evidence_kind: official
    confidence: high
  - id: claim-feedback-provenance
    source: prov-o-feedback
    supports: PROV-O distinguishes an information Entity from an Activity that generates or uses it.
    locator: "PROV-O: prov:Entity, prov:Activity"
    evidence_kind: normative
    confidence: high
  - id: claim-feedback-design
    source: feedback-design
    supports: Evaluation-origin Feedback is evaluation-basis-backed; human-origin feedback is HumanFeedback subtype; both distinct from raw telemetry and revision execution.
    locator: Local feedback record boundary
    evidence_kind: design-inference
    confidence: high
