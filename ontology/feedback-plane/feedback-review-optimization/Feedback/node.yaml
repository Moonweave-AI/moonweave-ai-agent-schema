schema: moonweave.ai/ontology-node/v1
id: Feedback
kind: concept
status: review
labels:
  zh: 反馈内容
  en: feedback content
  ja: フィードバック内容
semantics:
  short_definition:
    zh: 反馈内容是来自审查、用户、运行或评估来源并面向明确接收者或改进目标的信息。
    en: Feedback content is information from a review, user, runtime, or evaluation source directed to an identified recipient or improvement target.
    ja: フィードバック内容は review・user・runtime・evaluation source から生じ、明示された recipient または improvement target に向けた情報です。
  definition:
    zh: 反馈内容是一种通用信息实体；其身份由 feedback_id 固定，并记录来源种类与引用、接收者或目标、反馈陈述、期望响应和有效期。来源可以是 ReviewFinding、用户意见、运行观测或评估结果；反馈本身不等同于来源事实、发送事件或已执行修正。
    en: Feedback content is a generic information entity identified by feedback_id and described by source kind and reference, recipient or target, feedback statement, expected response, and validity period. It may come from a review, user, runtime, or evaluation source and is neither the source fact, its delivery event, nor an executed correction.
    ja: フィードバック内容は feedback_id で識別し、source kind/reference・recipient/target・feedback statement・expected response・validity period を記録する generic information entity です。review・user・runtime・evaluation source のいずれからも生じ得ますが、source fact・delivery event・実行済み correction そのものではありません。
  why_needed:
    zh: 通用反馈根允许用户意见、运行信号、评估结果和审查派生反馈共享交付与改进关系，同时通过专门子类保留不同来源的身份约束。
    en: A generic feedback root lets user comments, runtime signals, evaluation results, and review-derived feedback share delivery and improvement relations while specialized subtypes preserve source-specific identity constraints.
    ja: generic feedback root により user comment・runtime signal・evaluation result・review-derived feedback が delivery と improvement relation を共有し、specialized subtype が source-specific identity constraint を保持できます。
  includes:
    - zh: 包括审查派生修订要求、用户评价、运行后告警建议、评估器改进提示和人工复核请求。
      en: Includes review-derived revision requests, user comments, post-run warning guidance, evaluator improvement suggestions, and human re-review requests.
      ja: review-derived revision request・user comment・post-run warning guidance・evaluator improvement suggestion・human re-review request を含みます。
  excludes:
    - zh: 不包括作为来源的 ReviewFinding 或 EvaluationResult、FeedbackEvent 发送记录、原始运行日志和 CorrectionActivity。
      en: Excludes the source ReviewFinding or EvaluationResult, the FeedbackEvent delivery record, raw runtime logs, and CorrectionActivity.
      ja: source の ReviewFinding/EvaluationResult、FeedbackEvent delivery record、raw runtime log、CorrectionActivity は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - feedback_id
  fields:
    - id: feedback_id
      labels:
        zh: 反馈标识
        en: feedback ID
        ja: feedback ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一项反馈内容，不因来源类型或投递次数而改变。
        en: Stable identifier for one feedback content object, unchanged by source type or delivery count.
        ja: source type や delivery count によらず一つの feedback content object を安定識別します。
      allowed_values: []
      pattern: null
      example_value: feedback-2026-0716-008
      source_claims:
        - claim-feedback-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: Feedback-example-positive-manual-001
    kind: positive
    labels:
      zh: 反馈内容正例
      en: Positive feedback content case
      ja: フィードバック内容の正例
    scenario_id: null
    descriptions:
      zh: feedback fb-8 引用 finding rf-2，要求 worker-3 删除内部 ID、重新生成并在 30 分钟内返回。
      en: feedback fb-8 cites finding rf-2 and asks worker-3 to remove the internal ID, regenerate, and respond within 30 minutes.
      ja: feedback fb-8 は finding rf-2 を引用し worker-3 に内部 ID 削除、再生成、30 分以内応答を求めます。
    field_values:
      feedback_id: fb-8
    related_node_ids:
      - Feedback
    related_relation_ids: []
    expected_result:
      zh: 该对象是可行动 Feedback。
      en: The object is actionable Feedback.
      ja: この対象は実行可能な Feedback です。
    why_valid_or_invalid:
      zh: 来源发现、接收者、期望响应和时限均明确。
      en: Source finding, recipient, expected response, and deadline are explicit.
      ja: 出所所見、受信者、期待応答、期限が明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-feedback-003
  - id: Feedback-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 反馈内容边界例
      en: Boundary feedback content case
      ja: フィードバック内容の境界例
    scenario_id: null
    descriptions:
      zh: finding rf-2 记录违规证据与严重度，但没有指定接收者或期望动作。
      en: finding rf-2 records violation evidence and severity but names no recipient or expected action.
      ja: finding rf-2 は違反証拠と重大度を記録しますが受信者や期待行動を示しません。
    field_values: {}
    related_node_ids:
      - Feedback
    related_relation_ids: []
    expected_result:
      zh: 这是 ReviewFinding，不是 Feedback 内容。
      en: This is a ReviewFinding, not Feedback content.
      ja: これは ReviewFinding で Feedback 内容ではありません。
    why_valid_or_invalid:
      zh: 证据结论尚未转写为面向接收者的行动信息。
      en: The evidence conclusion has not been translated into recipient-oriented guidance.
      ja: 証拠結論は受信者向け行動情報へ変換されていません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-feedback-004
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: Feedback-motivates-CorrectionActivity
    predicate: motivates
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 促成纠正活动
      en: motivates correction activity
      ja: 修正活動を動機付け
    definitions:
      zh: Feedback 是 CorrectionActivity 的问题与期望响应依据之一；纠正仍须绑定获准提案或修订计划，反馈本身不等于执行授权。
      en: Feedback is one rationale for a CorrectionActivity's problem and expected response; correction still binds an approved proposal or revision plan and Feedback is not execution authorization.
      ja: Feedback は CorrectionActivity の問題と期待応答の根拠の一つですが、修正は承認済み提案・改訂計画を結び Feedback 自体は実行承認ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_motivates
      labels:
        zh: 反向：促成纠正活动
        en: "inverse: motivates correction activity"
        ja: 逆方向：修正活動を動機付け
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: Feedback-motivates-CorrectionActivity-example-positive-manual-001
        kind: positive
        labels:
          zh: 促成纠正活动正例
          en: Positive case for motivates correction activity
          ja: 修正活動を動機付けの正例
        scenario_id: null
        descriptions:
          zh: c-11 的 source_feedback_ids 包含 fb-8，执行的删除内部 ID 与 fb-8 要求一致。
          en: c-11 source_feedback_ids contains fb-8 and its internal-ID removal matches fb-8.
          ja: c-11 の source_feedback_ids は fb-8 を含み内部 ID 削除が要求と一致します。
        field_values: {}
        related_node_ids:
          - Feedback
          - CorrectionActivity
        related_relation_ids:
          - Feedback-motivates-CorrectionActivity
        expected_result:
          zh: 应记录 fb-8 促成 c-11。
          en: fb-8 is recorded as motivating c-11.
          ja: fb-8 が c-11 を動機付けると記録します。
        why_valid_or_invalid:
          zh: 纠正活动显式引用反馈且行动主题一致。
          en: Correction explicitly cites Feedback and action topic matches.
          ja: 修正活動が Feedback を明示参照し行動主題が一致します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-feedback-005
      - id: Feedback-motivates-CorrectionActivity-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 促成纠正活动边界例
          en: Boundary case for motivates correction activity
          ja: 修正活動を動機付けの境界例
        scenario_id: null
        descriptions:
          zh: c-12 修复无关网络超时，没有引用 fb-8。
          en: c-12 fixes an unrelated network timeout and does not cite fb-8.
          ja: c-12 は無関係なネットワーク timeout を修正し fb-8 を参照しません。
        field_values: {}
        related_node_ids:
          - Feedback
          - CorrectionActivity
        related_relation_ids:
          - Feedback-motivates-CorrectionActivity
        expected_result:
          zh: 不得声称 fb-8 促成 c-12。
          en: fb-8 is not asserted to motivate c-12.
          ja: fb-8 が c-12 を動機付けたとは主張しません。
        why_valid_or_invalid:
          zh: 共享同一系统不足以建立问题与行动因果。
          en: Sharing one system is insufficient to establish problem-to-action causality.
          ja: 同一システム共有だけでは問題と行動の因果を成立させません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-feedback-006
    source_claims:
      - claim-feedback-007
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: pending
    target: concept:CorrectionActivity
