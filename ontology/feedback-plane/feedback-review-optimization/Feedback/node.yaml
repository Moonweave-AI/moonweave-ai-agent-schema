    confidence: medium
    review_status: pending
  - id: claim-feedback-004
    source: lit-mech-self-refine
    supports: Self-Refine distinguishes feedback instructions from the evaluation evidence that motivates them.
    locator: Sections 2–3 > generator, feedback, and iterative refinement loop
