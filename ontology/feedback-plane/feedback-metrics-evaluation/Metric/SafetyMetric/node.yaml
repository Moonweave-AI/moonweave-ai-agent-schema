    review_status: accepted
  - id: claim-safety-metric-002
    source: eng-std-opentelemetry-metrics-data-model
    supports: SafetyMetric positive case uses documented Sum point and temporality semantics for a stable rate numerator; the safety event definition, denominator, and severity interpretation are Moonweave design inference.
    locator: Metrics Data Model > Point kinds > Sum; Temporality
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-safety-metric-003
    source: eng-std-opentelemetry-metrics-data-model
    supports: SafetyMetric boundary case uses the documented distinction between event-model observations and aggregated Metric streams; Moonweave does not retype one warning occurrence as a SafetyMetric.
    locator: Metrics Data Model > Model Details > Event model and Metric Stream model
    evidence_kind: normative
    confidence: high
