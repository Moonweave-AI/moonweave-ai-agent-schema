schema: moonweave.ai/ontology-node/v1
id: SafetyMetric
kind: concept
status: accepted
labels:
  zh: 安全指标
  en: safety metric
  ja: 安全指標
semantics:
  short_definition:
    zh: 安全指标是定义安全判据满足、违规发生或风险暴露程度的指标。
    en: A safety metric defines safety-criterion satisfaction, violation incidence, or risk exposure.
    ja: 安全指標は安全基準適合、違反発生、risk exposure を定義する指標です。
  definition:
    zh: 安全指标是 Metric 的专门化；其身份由安全判据版本、受保护对象、事件分母、严重度或风险尺度、评估窗口和聚合方法确定，不等同于单个 Warning 或 ErrorEvent。
    en: A safety metric specializes Metric and is identified by safety-criterion version, protected subject, event denominator, severity or risk scale, evaluation window, and aggregation; it is not one Warning or ErrorEvent.
    ja: 安全指標は Metric 下位型で安全基準版、保護対象、event 分母、重大度・risk 尺度、評価窓、集約法で同一性が決まり、一 Warning・ErrorEvent ではありません。
  why_needed:
    zh: 明确分母、判据和严重度可防止把违规次数、违规率、风险评分和一次告警混为同一安全量。
    en: Explicit denominator, criterion, and severity prevent violation count, violation rate, risk score, and one warning from being conflated.
    ja: 分母、基準、重大度を明示し違反数、違反率、risk score、一 warning の混同を防ぎます。
  includes:
    - zh: 包括越权工具调用率、有害输出率、敏感数据泄露率和安全判据通过率定义。
      en: Includes definitions for unauthorized-tool-call rate, harmful-output rate, sensitive-data leakage rate, and safety pass rate.
      ja: 無権限 tool call 率、有害出力率、機密 data 漏洩率、安全基準 pass 率の定義を含みます。
  excludes:
    - zh: 不包括具体策略决定、一次风险信号或一条已经发生的错误事件。
      en: Excludes a concrete PolicyDecision, one RiskSignal, and one occurred ErrorEvent.
      ja: 具体 PolicyDecision、一 RiskSignal、一発生 ErrorEvent を含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: SafetyMetric-example-positive-manual-001
    kind: positive
    labels:
      zh: 安全指标正例
      en: Positive safety metric case
      ja: 安全指標の正例
    scenario_id: null
    descriptions:
      zh: 定义 unauthorized_tool_call_rate.v3，以全部 tool attempts 为分母，按 policy-v7 判定并按严重度分层。
      en: unauthorized_tool_call_rate.v3 uses all tool attempts as denominator, policy-v7 adjudication, and severity strata.
      ja: unauthorized_tool_call_rate.v3 は全 tool attempts を分母に policy-v7 判定と重大度層を定めます。
    field_values:
      metric_id: metric/unauthorized_tool_call_rate
      version: "3"
      name: agent.safety.unauthorized_tool_call_rate
      measured_quantity: fraction of tool attempts denied as unauthorized
      unit: "1"
      point_kind: gauge
      aggregation_temporality: not-applicable
      permitted_attribute_keys:
        - policy.version
        - severity
    related_node_ids:
      - SafetyMetric
    related_relation_ids: []
    expected_result:
      zh: 该定义是 SafetyMetric。
      en: The definition is SafetyMetric.
      ja: この定義は SafetyMetric です。
    why_valid_or_invalid:
      zh: 安全判据、分母、窗口和聚合身份完整。
      en: Safety criterion, denominator, window, and aggregation identity are complete.
      ja: 安全基準、分母、窓、集約 ID が完全です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-metric-002
  - id: SafetyMetric-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 安全指标边界例
      en: Boundary safety metric case
      ja: 安全指標の境界例
    scenario_id: null
    descriptions:
      zh: attempt-14 发生一次越权 ErrorEvent，但没有评估窗口或分母。
      en: attempt-14 has one unauthorized ErrorEvent with no evaluation window or denominator.
      ja: attempt-14 に一 unauthorized ErrorEvent がありますが評価窓・分母がありません。
    field_values: {}
    related_node_ids:
      - SafetyMetric
    related_relation_ids: []
    expected_result:
      zh: 该对象是错误事件证据，不是 SafetyMetric。
      en: It is error-event evidence, not SafetyMetric.
      ja: これは error event 証拠で SafetyMetric ではありません。
    why_valid_or_invalid:
      zh: 一次事件不能替代安全率指标的可复用定义。
      en: One event cannot replace the reusable definition of a safety-rate metric.
      ja: 一 event は安全率指標の再利用定義を代替できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-safety-metric-003
