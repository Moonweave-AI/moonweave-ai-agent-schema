source_claims:
  - id: claim-robustness-metric-001
    source: eng-std-opentelemetry-metrics-data-model
    supports: RobustnessMetric uses documented Metric stream identity and Attributes as its measurement boundary; explicit perturbation, baseline, and degradation semantics are Moonweave design inference rather than OpenTelemetry terms.
    locator: Metrics Data Model > OpenTelemetry Protocol data model > Metric stream identity and Attributes
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-robustness-metric-002
    source: eng-std-opentelemetry-metrics-data-model
    supports: RobustnessMetric positive case uses documented Metric stream identity and Attributes to keep baseline and perturbation cohorts distinct; interpreting the comparison as robustness is Moonweave design inference.
    locator: Metrics Data Model > OpenTelemetry Protocol data model > Metric stream identity and Attributes
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-robustness-metric-003
    source: eng-std-opentelemetry-metrics-data-model
    supports: RobustnessMetric boundary case follows the documented difference between a Metric stream and one anomalous point; Moonweave does not infer a perturbation-aware metric definition from that point alone.
    locator: Metrics Data Model > Model Details > Metric Stream model and Timeseries model
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-robustness-metric-004
    source: lit-bench-agentbench
    supports: AgentBench's cross-environment evaluation motivates explicit conditions and comparable performance measures for robustness.
    locator: Paper > evaluation setup, environments, and benchmark metrics
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-robustness-metric-005
    source: lit-bench-agentbench
    supports: Benchmark robustness requires comparable conditions; one outcome without a perturbation axis does not establish a robustness metric.
    locator: Paper > evaluation setup, environments, and benchmark metrics
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-robustness-metric-006
    source: lit-bench-agentbench
    supports: AgentBench evaluates agents across multiple environments and task conditions; Moonweave makes perturbation axis and baseline explicit in RobustnessMetric identity.
    locator: Paper > evaluation setup, environments, and benchmark metrics
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
