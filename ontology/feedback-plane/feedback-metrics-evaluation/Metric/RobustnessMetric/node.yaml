      ja: これは失敗観測で RobustnessMetric 定義ではありません。
    why_valid_or_invalid:
      zh: 单例没有定义性能保持量和可复用聚合语义。
      en: One case does not define retention quantity or reusable aggregation semantics.
      ja: 一例は保持量・再利用集約意味を定義しません。
