      en: paraphrase_retention.v1 compares correctness deltas across five paraphrases of each question using paired mean.
      ja: paraphrase_retention.v1 は各質問五言換えの correctness 差を paired mean で比較します。
    field_values:
      metric_id: metric/paraphrase_retention
      version: "1"
      name: agent.eval.paraphrase_retention
      measured_quantity: paired correctness retention under paraphrase perturbation
      unit: "1"
      point_kind: gauge
      aggregation_temporality: not-applicable
      permitted_attribute_keys:
        - perturbation.family
        - perturbation.intensity
    related_node_ids:
      - RobustnessMetric
    related_relation_ids: []
    expected_result:
      zh: 该定义是 RobustnessMetric。
      en: The definition is RobustnessMetric.
      ja: この定義は RobustnessMetric です。
    why_valid_or_invalid:
      zh: 基线、扰动、比较量和聚合方法均稳定。
      en: Baseline, perturbation, compared quantity, and aggregation are stable.
      ja: 基準、摂動、比較量、集約法が安定しています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-robustness-metric-002
  - id: RobustnessMetric-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 稳健性指标边界例
      en: Boundary robustness metric case
      ja: 堅牢性指標の境界例
    scenario_id: null
    descriptions:
      zh: 一次改写使回答错误，但没有定义扰动集合或比较基线。
      en: One paraphrase causes a wrong answer with no perturbation set or comparison baseline.
      ja: 一言換えで誤答しますが摂動集合・比較基準がありません。
    field_values: {}
    related_node_ids:
      - RobustnessMetric
    related_relation_ids: []
