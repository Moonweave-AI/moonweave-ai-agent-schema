schema: moonweave.ai/ontology-node/v1
id: RobustnessMetric
kind: concept
status: accepted
labels:
  zh: 稳健性指标
  en: robustness metric
  ja: 堅牢性指標
semantics:
  short_definition:
    zh: 稳健性指标是定义受控扰动前后性能保持程度的指标。
    en: A robustness metric defines how well performance is retained under controlled perturbation.
    ja: 堅牢性指標は制御摂動前後の性能保持度を定義する指標です。
  definition:
    zh: 稳健性指标是 Metric 的专门化；其身份由基线任务、扰动族与强度、比较性能量、配对或聚合方法和容忍区间确定，不能只用一次失败率命名。
    en: A robustness metric specializes Metric and is identified by baseline task, perturbation family and intensity, compared performance quantity, pairing or aggregation method, and tolerance interval; one failure rate alone does not define it.
    ja: 堅牢性指標は Metric 下位型で基準 task、摂動族・強度、比較性能量、pairing・集約法、許容区間で同一性が決まり、一失敗率だけでは定義できません。
  why_needed:
    zh: 固定扰动与基线可区分模型本身不稳健、数据分布改变和普通准确率下降。
    en: Fixing perturbation and baseline distinguishes model fragility, distribution shift, and ordinary accuracy loss.
    ja: 摂動と基準を固定し model fragility、distribution shift、通常 accuracy 低下を区別します。
  includes:
    - zh: 包括提示改写稳定性、噪声输入性能保持和工具返回扰动敏感度的指标定义。
      en: Includes metric definitions for prompt-paraphrase stability, noisy-input retention, and tool-result perturbation sensitivity.
      ja: prompt 言換え安定性、noise 入力性能保持、tool result 摂動感度の指標定義を含みます。
  excludes:
    - zh: 不包括没有扰动基线的正确率，也不包括一次对抗样本失败事件。
      en: Excludes accuracy without a perturbation baseline and one adversarial-example failure event.
      ja: 摂動基準のない accuracy と一 adversarial example failure event を含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
