  - id: claim-latency-metric-005
    source: eng-std-opentelemetry-metrics-data-model
    supports: LatencyMetric-is_a-Metric boundary case follows the documented separation of timestamped point values from Metric stream identity; Moonweave does not assert LatencyMetric for an untyped duration sample.
    locator: Metrics Data Model > OpenTelemetry Protocol data model > Metric streams and data points
    evidence_kind: design-inference
    confidence: medium
