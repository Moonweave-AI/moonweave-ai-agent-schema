schema: moonweave.ai/ontology-node/v1
id: LatencyMetric
kind: concept
status: accepted
labels:
  zh: 延迟指标
  en: latency metric
  ja: 遅延指標
semantics:
  short_definition:
    zh: 延迟指标是定义操作经过时长及其统计方式的指标。
    en: A latency metric defines elapsed operation duration and its statistical treatment.
    ja: 遅延指標は操作経過時間と統計処理を定義する指標です。
  definition:
    zh: 延迟指标是 Metric 的专门化；其身份由操作边界、时间单位、起止语义、直方图区间或分位方法和允许属性确定，不保存某次运行的实际时长。
    en: A latency metric specializes Metric and is identified by operation boundary, time unit, start/end semantics, histogram buckets or quantile method, and permitted attributes; it stores no one run's observed duration.
    ja: 遅延指標は Metric 下位型で、操作境界、時間単位、開始終了意味、histogram bucket または分位法、許可属性で同一性が決まり、一実行の時長を保存しません。
  why_needed:
    zh: 明确计时边界与聚合方式可避免首令牌延迟、端到端延迟和单工具延迟被放在同一序列中比较。
    en: Explicit timing boundary and aggregation prevent time-to-first-token, end-to-end latency, and one-tool latency from being compared as one series.
    ja: 計時境界と集約法を明示し TTFT、end-to-end latency、単一 tool latency の誤比較を防ぎます。
  includes:
    - zh: 包括端到端响应耗时、首令牌耗时和工具调用耗时的稳定指标定义。
      en: Includes stable definitions for end-to-end, time-to-first-token, and tool-call duration.
      ja: end-to-end、first-token、tool-call 時間の安定指標定義を含みます。
  excludes:
    - zh: 不包括 duration=1.82s 的一次 Measurement，也不包括吞吐量或令牌数量指标。
      en: Excludes one duration=1.82s Measurement and throughput or token-count metrics.
      ja: duration=1.82s の一 Measurement と throughput・token count 指標を含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: LatencyMetric-example-positive-manual-001
    kind: positive
    labels:
      zh: 延迟指标正例
      en: Positive latency metric case
      ja: 遅延指標の正例
    scenario_id: null
    descriptions:
      zh: 定义 agent.tool.duration.v1，单位 s、边界为调用开始至最后响应字节，并固定 Histogram buckets。
      en: agent.tool.duration.v1 defines seconds from call start to final response byte with fixed Histogram buckets.
      ja: agent.tool.duration.v1 は call 開始から最終応答 byte までを秒と固定 Histogram buckets で定義します。
    field_values:
      metric_id: metric/agent.tool.duration
      version: "1"
      name: agent.tool.duration
      measured_quantity: elapsed time from tool-call start to final response byte
      unit: s
      point_kind: histogram
      aggregation_temporality: delta
      permitted_attribute_keys:
        - tool.name
        - tool.system
    related_node_ids:
      - LatencyMetric
    related_relation_ids: []
    expected_result:
      zh: 该定义是 LatencyMetric。
      en: The definition is LatencyMetric.
      ja: この定義は LatencyMetric です。
    why_valid_or_invalid:
      zh: 它具有稳定计时边界、单位、属性和聚合语义。
      en: It has stable timing boundary, unit, attributes, and aggregation semantics.
      ja: 安定計時境界、単位、属性、集約意味を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-latency-metric-002
  - id: LatencyMetric-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 延迟指标边界例
      en: Boundary latency metric case
      ja: 遅延指標の境界例
    scenario_id: null
    descriptions:
      zh: run-7 记录 tool call 实际耗时 1.82 秒与时间戳。
      en: run-7 records one tool call taking 1.82 seconds with a timestamp.
      ja: run-7 は一 tool call の実時長 1.82 秒と時刻を記録します。
    field_values: {}
    related_node_ids:
      - LatencyMetric
    related_relation_ids: []
    expected_result:
      zh: 该对象是 Measurement，不是 LatencyMetric 定义。
      en: It is Measurement, not a LatencyMetric definition.
      ja: これは Measurement で LatencyMetric 定義ではありません。
    why_valid_or_invalid:
      zh: 一次时长值没有可复用指标的计时和聚合身份。
      en: One duration value lacks reusable timing and aggregation identity.
      ja: 一時長値は再利用計時・集約 ID を持ちません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-latency-metric-003
