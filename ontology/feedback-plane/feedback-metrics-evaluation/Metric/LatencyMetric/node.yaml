    locator: Metrics Data Model > OpenTelemetry Protocol data model > Metric identity and point type
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-latency-metric-002
    source: eng-std-opentelemetry-metrics-data-model
    supports: LatencyMetric positive case uses the documented Metric stream unit, Attributes, and Histogram points to represent elapsed duration; the LatencyMetric specialization and threshold semantics are Moonweave design inference.
    locator: Metrics Data Model > Point kinds > Histogram data points
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-latency-metric-003
    source: eng-std-opentelemetry-metrics-data-model
    supports: LatencyMetric boundary case follows the documented separation between an identified Metric stream and its timestamped points; Moonweave does not classify a bare elapsed value as LatencyMetric without stable stream semantics.
    locator: Metrics Data Model > OpenTelemetry Protocol data model > Metric streams and data points
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-latency-metric-004
    source: eng-std-opentelemetry-metrics-data-model
    supports: LatencyMetric-is_a-Metric positive case uses documented Histogram streams, unit, and Attributes for elapsed duration; the duration-specific subtype edge is Moonweave design inference.
