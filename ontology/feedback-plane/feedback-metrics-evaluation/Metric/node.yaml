source_claims:
  - id: claim-metric-001
    source: eng-std-opentelemetry-metrics-data-model
    supports: Metric is grounded in the OpenTelemetry Metric object's Resource, instrumentation Scope, name, data-point type, unit, and intrinsic properties while points remain separate; Moonweave uses this documented stream identity as the reusable Metric specification boundary.
    locator: Metrics Data Model > OpenTelemetry Protocol data model > Metric stream identity and Metric points
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-metric-002
    source: eng-std-opentelemetry-metrics-data-model
    supports: OpenTelemetry identifies Metric streams by Resource, Scope, name, point type, unit, and intrinsic properties but does not prescribe a portable definition ID. Metric.metric_id is Moonweave's registry key over that identity tuple.
    locator: Metrics Data Model > OpenTelemetry Protocol data model > Metric stream identity
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-metric-003
    source: eng-std-opentelemetry-metrics-data-model
    supports: The OpenTelemetry Metrics Data Model treats point type, unit, and intrinsic properties as identifying while description is non-identifying. Metric.version is Moonweave's change-control boundary over those identifying properties.
    locator: Metrics Data Model > OpenTelemetry Protocol data model > identifying and non-identifying properties
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-metric-004
    source: eng-std-opentelemetry-metrics-data-model
    supports: OpenTelemetry explicitly includes the metric stream name in Metric identity. Metric.name directly maps that normative identity property into Moonweave's versioned definition contract.
    locator: Metrics Data Model > OpenTelemetry Protocol data model > Metric stream identity
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-metric-005
    source: eng-std-opentelemetry-metrics-data-model
    supports: OpenTelemetry Metric names, units, descriptions, and point kinds jointly preserve a stream's measurement semantics. Metric.measured_quantity is Moonweave's explicit human-reviewable statement of that semantic quantity.
    locator: Metrics Data Model > OpenTelemetry Protocol data model > Metric properties
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-metric-006
    source: eng-std-opentelemetry-metrics-data-model
    supports: OpenTelemetry treats a Metric stream's unit as an identifying property. Metric.unit directly maps that property into Moonweave's contract and prevents aggregation across incompatible units.
    locator: Metrics Data Model > OpenTelemetry Protocol data model > Metric stream identity
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-metric-007
    source: eng-std-opentelemetry-metrics-data-model
    supports: Metric point kind `gauge` directly maps to the OpenTelemetry Gauge point kind; Moonweave stores it as a definition discriminator.
    locator: Metrics Data Model > Point kinds > Gauge
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-metric-008
    source: eng-std-opentelemetry-metrics-data-model
    supports: Metric point kind `sum` directly maps to the OpenTelemetry Sum point kind; Moonweave stores it as a definition discriminator.
    locator: Metrics Data Model > Point kinds > Sums
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-metric-009
    source: eng-std-opentelemetry-metrics-data-model
    supports: Metric point kind `histogram` directly maps to the OpenTelemetry Histogram point kind; Moonweave stores it as a definition discriminator.
    locator: Metrics Data Model > Point kinds > Histogram
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-metric-010
    source: eng-std-opentelemetry-metrics-data-model
    supports: Metric point kind `exponential-histogram` directly maps to OpenTelemetry ExponentialHistogram; Moonweave normalizes the wire name for its definition contract.
    locator: Metrics Data Model > Point kinds > Exponential Histogram
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-metric-011
    source: eng-std-opentelemetry-metrics-data-model
    supports: Metric point kind `summary` directly maps to OpenTelemetry's legacy Summary type; Moonweave retains the specification's compatibility boundary.
    locator: Metrics Data Model > Point kinds > Summary (Legacy)
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-metric-012
    source: eng-std-opentelemetry-metrics-data-model
    supports: OpenTelemetry defines Gauge, Sum, Histogram, ExponentialHistogram, and compatibility Summary point kinds and treats the data point type as identifying. Metric.point_kind directly uses that taxonomy.
    locator: Metrics Data Model > Point kinds > Gauge, Sum, Histogram, ExponentialHistogram, and Summary
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-metric-013
    source: eng-std-opentelemetry-metrics-data-model
    supports: Metric aggregation temporality `delta` directly maps to OpenTelemetry Delta temporality; Moonweave binds it to a versioned definition.
    locator: Metrics Data Model > Temporality > Delta temporality
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-metric-014
    source: eng-std-opentelemetry-metrics-data-model
    supports: Metric aggregation temporality `cumulative` directly maps to OpenTelemetry Cumulative temporality; Moonweave binds it to a versioned definition.
    locator: Metrics Data Model > Temporality > Cumulative temporality
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-metric-015
    source: eng-std-opentelemetry-metrics-data-model
    supports: OpenTelemetry attaches AggregationTemporality to additive point kinds rather than Gauge. Metric value `not-applicable` is Moonweave's explicit boundary marker for point kinds without that property.
    locator: Metrics Data Model > Temporality > Sum, Histogram, and ExponentialHistogram applicability
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-metric-016
    source: eng-std-opentelemetry-metrics-data-model
    supports: OpenTelemetry defines delta and cumulative aggregation temporality for Sum, Histogram, and ExponentialHistogram points. Metric.aggregation_temporality makes the applicable value, or explicit non-applicability, part of Moonweave's definition contract.
    locator: Metrics Data Model > Temporality > delta and cumulative temporality
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-metric-017
    source: eng-std-opentelemetry-metrics-data-model
    supports: OpenTelemetry identifies individual Metric streams by their Attributes and warns that misidentified streams can violate the Single-Writer principle. Metric.permitted_attribute_keys is Moonweave's cardinality and identity guard over those dimensions.
    locator: Metrics Data Model > Single-Writer > globally unique stream identity and misconfiguration
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-metric-018
    source: eng-std-opentelemetry-metrics-data-model
    supports: OpenTelemetry enumerates identifying properties for Metric streams and requires one logical writer. Metric-version-freezes-identifying-semantics is Moonweave's version-governance constraint over those normative identity properties.
    locator: Metrics Data Model > OpenTelemetry Protocol data model > Metric stream identity; Single-Writer
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-metric-019
    source: eng-std-opentelemetry-metrics-data-model
    supports: Metric positive case uses the OpenTelemetry Metric object's identifying name, Resource, Scope, point type, unit, and intrinsic properties; Moonweave maps that documented stream identity to its reusable Metric concept.
    locator: Metrics Data Model > OpenTelemetry Protocol data model > Metric object and stream identity
    evidence_kind: normative
    confidence: high
    review_status: pending
  - id: claim-metric-020
    source: eng-std-opentelemetry-metrics-data-model
    supports: Metric boundary case uses the documented distinction between event-model observations and identified Metric streams composed of points; Moonweave therefore does not retype one reported observation as Metric.
    locator: Metrics Data Model > Model Details > Event model, Timeseries model, and Metric Stream model
    evidence_kind: normative
    confidence: high
    review_status: pending
