schema: moonweave.ai/ontology-node/v1
id: Metric
kind: concept
status: review
labels:
  zh: 指标定义
  en: metric definition
  ja: 指標定義
semantics:
  short_definition:
    zh: 指标定义是规定被测量量、单位、属性与聚合语义的可复用规范。
    en: A metric definition is a reusable specification of quantity, unit, attributes, and aggregation semantics.
    ja: 指標定義は測定量、単位、属性、集約意味を定める再利用可能な仕様です。
  definition:
    zh: Metric 是可复用的测量定义，由稳定名称、被测量、单位、允许属性、数据点类型与聚合时间性共同识别；它既不承载某一次观察值，也不是带判断含义的 Score。
    en: A Metric is a reusable measurement definition identified by stable name, measured quantity, unit, permitted attributes, point kind, and aggregation temporality; it carries neither a particular observation value nor an interpreted quality Score.
    ja: Metric は stable name、measured quantity、unit、許可 attribute、point kind、aggregation temporality で識別される再利用可能な measurement definition であり、個別 observation value も解釈済み quality Score も保持しません。
  why_needed:
    zh: 分离指标与测量值可以检测单位冲突、跨运行聚合并避免把一次得分当成指标。
    en: Separating definitions from values detects unit conflicts, enables cross-run aggregation, and prevents one score from becoming a metric.
    ja: 定義と値を分離すると単位衝突を検出し、実行横断集約を可能にし、一回のスコアを指標と誤認しません。
  includes:
    - zh: 包括 latency 秒数、token 数量、美元成本、成功率等稳定测量定义。
      en: Includes stable definitions for latency seconds, token counts, monetary cost, and success rate.
      ja: 遅延秒、トークン数、費用、成功率などの安定測定定義を含みます。
  excludes:
    - zh: 不包括带时间戳和值的 Measurement，也不包括按判据解释后的 Score。
      en: Excludes a timestamped Measurement value and a Score interpreted against a criterion.
      ja: 時刻と値を持つ Measurement、および判定基準で解釈された Score は含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - metric_id
    - version
  fields:
    - id: metric_id
      labels:
        zh: 指标标识
        en: metric ID
        ja: metric ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个可复用测量定义，不标识某个带值的数据点。
        en: Stably identifies one reusable measurement definition, not a valued data point.
        ja: 再利用可能な測定定義を安定識別し、値を持つ data point とは区別します。
      allowed_values: []
      pattern: null
      example_value: metric/agent.tool.duration
      source_claims:
        - claim-metric-002
    - id: version
      labels:
        zh: 指标版本
        en: metric version
        ja: metric version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识一组固定测量语义；名称、单位、点类型、暂态性或允许属性变化时必须产生新版本。
        en: Identifies one frozen set of measurement semantics; changing name, unit, point kind, temporality, or permitted attributes requires a new version.
        ja: 固定された測定意味の一組を識別し、name・unit・point kind・temporality・許可 attribute の変更時は新 version を必要とします。
      allowed_values: []
      pattern: null
      example_value: "1"
      source_claims:
        - claim-metric-003
    - id: name
      labels:
        zh: 指标名称
        en: metric name
        ja: metric 名
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在资源和仪表作用域内命名该指标流。
        en: Names the metric stream within its Resource and instrumentation Scope.
        ja: Resource と instrumentation Scope 内で metric stream を命名します。
      allowed_values: []
      pattern: null
      example_value: agent.tool.duration
      source_claims:
        - claim-metric-004
    - id: measured_quantity
      labels:
        zh: 被测量量
        en: measured quantity
        ja: 測定量
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 用领域含义说明观测值代表的量，例如工具调用持续时间、令牌数或违规率。
        en: States the domain quantity represented by observations, such as tool-call duration, token count, or violation rate.
        ja: 観測値が表す domain quantity（tool call duration・token count・violation rate 等）を示します。
      allowed_values: []
      pattern: null
      example_value: elapsed tool-call duration
      source_claims:
        - claim-metric-005
    - id: unit
      labels:
        zh: 测量单位
        en: unit
        ja: 単位
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明数值的测量单位；无量纲量使用 `1`。
        en: Declares the value's unit of measure; dimensionless quantities use `1`.
        ja: 値の測定単位を宣言し、無次元量には `1` を使います。
      allowed_values: []
      pattern: null
      example_value: s
      source_claims:
        - claim-metric-006
    - id: point_kind
      labels:
        zh: 数据点类型
        en: point kind
        ja: data point 種
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明指标使用 Gauge、Sum、Histogram、ExponentialHistogram 或兼容性 Summary 数据点。
        en: Declares Gauge, Sum, Histogram, ExponentialHistogram, or compatibility Summary data points.
        ja: Gauge・Sum・Histogram・ExponentialHistogram・互換 Summary の data point 種を宣言します。
      allowed_values:
        - id: metric-point-kind-gauge
          value: gauge
          labels:
            zh: 仪表值
            en: gauge
            ja: gauge
          definitions:
            zh: 表示在采样时刻有效、不可假定可加的数值。
            en: A sampled value for which additivity cannot be assumed.
            ja: sample 時点で有効で、加法性を仮定できない値です。
          status: accepted
          source_claims:
            - claim-metric-007
        - id: metric-point-kind-sum
          value: sum
          labels:
            zh: 总和
            en: sum
            ja: sum
          definitions:
            zh: 表示具备加法聚合函数并声明单调性与暂态性的数值。
            en: An additively aggregatable value with declared monotonicity and temporality.
            ja: 加法集約可能で monotonicity と temporality を宣言する値です。
          status: accepted
          source_claims:
            - claim-metric-008
        - id: metric-point-kind-histogram
          value: histogram
          labels:
            zh: 直方图
            en: histogram
            ja: histogram
          definitions:
            zh: 以计数、总和与显式桶边界压缩表示一组测量。
            en: A compressed population of measurements using count, sum, and explicit bucket boundaries.
            ja: count・sum・明示 bucket 境界で測定集合を圧縮表現します。
          status: accepted
          source_claims:
            - claim-metric-009
        - id: metric-point-kind-exponential-histogram
          value: exponential-histogram
          labels:
            zh: 指数直方图
            en: exponential histogram
            ja: exponential histogram
          definitions:
            zh: 使用指数尺度桶压缩表示测量分布。
            en: A measurement distribution compressed into exponential-scale buckets.
            ja: 指数 scale bucket で測定分布を圧縮表現します。
          status: accepted
          source_claims:
            - claim-metric-010
        - id: metric-point-kind-summary
          value: summary
          labels:
            zh: 摘要
            en: summary
            ja: summary
          definitions:
            zh: 仅为兼容既有格式保留的分位摘要点类型，不推荐用于新指标。
            en: A quantile-summary point kind retained for compatibility and not recommended for new metrics.
            ja: 既存形式との互換性のために残る quantile summary で、新規 metric には非推奨です。
          status: accepted
          source_claims:
            - claim-metric-011
      pattern: null
      example_value: histogram
      source_claims:
        - claim-metric-012
    - id: aggregation_temporality
      labels:
        zh: 聚合暂态性
        en: aggregation temporality
        ja: aggregation temporality
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明加性点是 delta 或 cumulative；对 Gauge 和 Summary 明确记录 not-applicable。
        en: Declares delta or cumulative temporality for additive points and explicitly records not-applicable for Gauge and Summary.
        ja: 加法的 point では delta または cumulative、Gauge と Summary では not-applicable を明記します。
      allowed_values:
        - id: metric-temporality-delta
          value: delta
          labels:
            zh: 增量
            en: delta
            ja: delta
          definitions:
            zh: 数据点只覆盖自上一报告边界以来的时间区间。
            en: The data point covers only the interval since the preceding reporting boundary.
            ja: data point は直前の reporting boundary 以降の区間だけを対象にします。
          status: accepted
          source_claims:
            - claim-metric-013
        - id: metric-temporality-cumulative
          value: cumulative
          labels:
            zh: 累计
            en: cumulative
            ja: cumulative
          definitions:
            zh: 数据点覆盖从连续序列起点到当前时间的累计区间。
            en: The data point covers the cumulative interval from the unbroken sequence start to the current time.
            ja: data point は連続 sequence の開始から現在までの累積区間を対象にします。
          status: accepted
          source_claims:
            - claim-metric-014
        - id: metric-temporality-not-applicable
          value: not-applicable
          labels:
            zh: 不适用
            en: not applicable
            ja: 適用外
          definitions:
            zh: 该点类型不具备可选择的聚合暂态性，例如 Gauge。
            en: The point kind has no selectable aggregation temporality, as with Gauge.
            ja: Gauge のように point kind が選択可能な aggregation temporality を持ちません。
          status: accepted
          source_claims:
            - claim-metric-015
      pattern: null
      example_value: delta
      source_claims:
        - claim-metric-016
    - id: permitted_attribute_keys
      labels:
        zh: 允许属性键
        en: permitted attribute keys
        ja: 許可 attribute key
      datatype: string-list
      required: false
      cardinality:
        min: 0
        max: null
      definitions:
        zh: 列出允许形成时间序列维度的属性键；未列出的高基数属性不得静默改变流身份。
        en: Lists attribute keys allowed to form timeseries dimensions; unlisted high-cardinality attributes must not silently alter stream identity.
        ja: timeseries 次元を形成できる attribute key を列挙し、未列挙の高 cardinality 属性による stream identity 変更を禁止します。
      allowed_values: []
      pattern: null
      example_value:
        - tool.name
      source_claims:
        - claim-metric-017
  constraints:
    - id: metric-version-freezes-identifying-semantics
      severity: error
      expression_language: plain
      expression: within one Metric version, name, measured quantity, unit, point kind, aggregation temporality, and permitted attribute keys do not change
      explanations:
        zh: 同一指标版本内，名称、被测量量、单位、点类型、聚合暂态性与允许属性键不得改变。
        en: Within one Metric version, name, measured quantity, unit, point kind, aggregation temporality, and permitted attribute keys do not change.
        ja: 同じ Metric version 内では name・測定量・unit・point kind・aggregation temporality・許可 attribute key を変更しません。
      source_claims:
        - claim-metric-018
  required_relation_constraints: []
examples:
  - id: Metric-example-positive-manual-001
    kind: positive
    labels:
      zh: 指标定义正例
      en: Positive metric definition case
      ja: 指標定義の正例
    scenario_id: null
    descriptions:
      zh: metric agent.tool.duration 声明单位 s、Histogram 点类型和允许属性 tool.name。
      en: metric agent.tool.duration declares unit s, Histogram point kind, and permitted attribute tool.name.
      ja: metric agent.tool.duration は単位 s、Histogram 点種、許可属性 tool.name を宣言します。
    field_values:
      metric_id: metric/agent.tool.duration
      version: "1"
      name: agent.tool.duration
      measured_quantity: elapsed tool-call duration
      unit: s
      point_kind: histogram
      aggregation_temporality: delta
      permitted_attribute_keys:
        - tool.name
    related_node_ids:
      - Metric
    related_relation_ids: []
    expected_result:
      zh: 该对象应识别为指标定义。
      en: The object is a metric definition.
      ja: この対象は指標定義です。
    why_valid_or_invalid:
      zh: 稳定名称、单位和点语义定义了可复用的量而非一次值。
      en: Stable name, unit, and point semantics define a reusable quantity rather than one value.
      ja: 安定名、単位、点意味が一回の値でなく再利用可能な量を定義します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-metric-019
  - id: Metric-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 指标定义边界例
      en: Boundary metric definition case
      ja: 指標定義の境界例
    scenario_id: null
    descriptions:
      zh: 观测记录写明 agent.tool.duration=1.82s，时间为 10:03:07，trace_id=t9。
      en: An observation records agent.tool.duration=1.82s at 10:03:07 with trace_id=t9.
      ja: 観測記録は 10:03:07 に agent.tool.duration=1.82s、trace_id=t9 と示します。
    field_values: {}
    related_node_ids:
      - Metric
    related_relation_ids: []
    expected_result:
      zh: 该对象是 Measurement，不是 Metric 定义。
      en: The object is a Measurement, not a Metric definition.
      ja: これは Measurement であり Metric 定義ではありません。
    why_valid_or_invalid:
      zh: 时间戳和值标明一次观察，而不是稳定测量身份。
      en: Timestamp and value identify one observation, not stable measurement identity.
      ja: 時刻と値は一回の観測を示し、安定した測定同一性ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-metric-020
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
