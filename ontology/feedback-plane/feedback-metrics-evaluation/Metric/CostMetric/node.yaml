schema: moonweave.ai/ontology-node/v1
id: CostMetric
kind: concept
status: accepted
labels:
  zh: 成本指标
  en: cost metric
  ja: 費用指標
semantics:
  short_definition:
    zh: 成本指标是定义货币或受限资源消耗及归集边界的指标。
    en: A cost metric defines monetary or constrained-resource consumption and its allocation boundary.
    ja: 費用指標は金銭・制約資源消費と配賦境界を定義する指標です。
  definition:
    zh: 成本指标是 Metric 的专门化；其身份由费用类型、货币或资源单位、计价版本、归集作用域、累计方式和允许属性确定，不保存某次账单值。
    en: A cost metric specializes Metric and is identified by cost type, currency or resource unit, pricing version, allocation scope, accumulation method, and permitted attributes; it stores no one bill value.
    ja: 費用指標は Metric 下位型で、費用種、通貨・資源単位、価格版、配賦範囲、累積法、許可属性で同一性が決まり、一請求値を保存しません。
  why_needed:
    zh: 显式计价版本和归集边界可防止令牌用量、估算美元成本和实际账单成本被误认为同一量。
    en: Explicit pricing version and allocation boundary prevent token use, estimated USD cost, and billed cost from being treated as one quantity.
    ja: 価格版と配賦境界を明示し token 使用、推定 USD 費用、請求費用の混同を防ぎます。
  includes:
    - zh: 包括模型推理美元成本、计算秒成本和外部 API 费用的稳定指标定义。
      en: Includes stable definitions for model-inference currency cost, compute-second cost, and external API charges.
      ja: model inference 通貨費用、compute-second 費用、外部 API 料金の安定指標定義を含みます。
  excludes:
    - zh: 不包括某次调用 cost=0.031 USD 的 Measurement，也不包括纯令牌数量指标。
      en: Excludes one cost=USD 0.031 Measurement and a pure token-count metric.
      ja: 一 call の cost=0.031 USD Measurement と純 token count 指標を含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
