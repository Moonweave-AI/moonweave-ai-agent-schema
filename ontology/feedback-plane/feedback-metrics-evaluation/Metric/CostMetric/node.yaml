      en: agent.run.estimated_cost.v2 defines USD under pricing_version=2026-07 for one Run scope.
      ja: agent.run.estimated_cost.v2 は USD、pricing_version=2026-07、一 Run 範囲を定義します。
    field_values:
      metric_id: metric/agent.run.estimated_cost
      version: "2"
      name: agent.run.estimated_cost
      measured_quantity: estimated monetary cost allocated to one run
      unit: USD
      point_kind: sum
      aggregation_temporality: cumulative
      permitted_attribute_keys:
        - model.name
        - pricing.version
    related_node_ids:
      - CostMetric
    related_relation_ids: []
    expected_result:
      zh: 该定义是 CostMetric。
      en: The definition is CostMetric.
      ja: この定義は CostMetric です。
    why_valid_or_invalid:
      zh: 费用类型、单位、计价版本和归集作用域稳定。
      en: Cost type, unit, pricing version, and allocation scope are stable.
      ja: 費用種、単位、価格版、配賦範囲が安定しています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-cost-metric-002
  - id: CostMetric-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 成本指标边界例
      en: Boundary cost metric case
      ja: 費用指標の境界例
    scenario_id: null
    descriptions:
      zh: run-8 实际估算成本为 0.031 USD，并绑定时间戳。
      en: run-8 has one estimated cost of USD 0.031 with timestamp.
      ja: run-8 は時刻付き推定費用 0.031 USD を記録します。
    field_values: {}
    related_node_ids:
      - CostMetric
    related_relation_ids: []
    expected_result:
      zh: 该对象是成本 Measurement，不是 CostMetric。
      en: It is a cost Measurement, not CostMetric.
      ja: これは費用 Measurement で CostMetric ではありません。
    why_valid_or_invalid:
      zh: 一次费用值没有完整计价和归集定义身份。
      en: One cost value lacks complete pricing and allocation-definition identity.
      ja: 一費用値は完全な価格・配賦定義 ID を持ちません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-cost-metric-003
