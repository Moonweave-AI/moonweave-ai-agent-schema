schema: moonweave.ai/ontology-node/v1
id: EvaluationCostMetric
kind: concept
status: accepted
labels:
  zh: 成本评估度量
  en: Evaluation Cost Metric
  ja: コスト評価メトリック
semantics:
  short_definition:
    zh: 以继承的数值、单位和计算方法表达的、由评估准则解释的货币成本度量。
    en: A monetary cost evaluation metric whose inherited value, unit, and calculation method are interpreted by an evaluation criterion.
    ja: 継承した値、単位、計算方法で表し、評価基準が解釈する貨幣コストの評価メトリック。
  definition:
    zh: Evaluation Cost Metric 是 Evaluation Metric 的货币子类：它保留父类的 metric_id、value、unit、aggregation、criterion_ref 和 evidence_ref；其中 value 是按可追溯定价依据计算的非负货币数额，unit 是 ISO 4217 货币代码，aggregation 明示计算方法。它不是原始 token 用量、Usage API 聚合、账单事件或预算告警；这些是运行时、运营或财务证据，只有在定价规则计算并由准则解释后，才支持该成本度量。
    en: "An Evaluation Cost Metric is the monetary subtype of Evaluation Metric: it retains the parent metric_id, value, unit, aggregation, criterion_ref, and evidence_ref. Its value is a non-negative monetary amount calculated under a traceable pricing basis, its unit is an ISO 4217 currency code, and its aggregation states the calculation method. It is not raw token usage, a Usage API aggregate, a billing event, or a budget alert; those are runtime, operational, or financial evidence that support this cost measurement only after a pricing rule calculates and a criterion interprets it."
    ja: Evaluation Cost Metric は Evaluation Metric の貨幣的な下位型である。親の metric_id、value、unit、aggregation、criterion_ref、evidence_ref を保持する。value は追跡可能な価格根拠の下で計算した非負の貨幣金額、unit は ISO 4217 通貨コード、aggregation は計算方法である。生のトークン使用量、Usage API 集計、請求イベント、予算アラートではない。それらは実行時、運用、又は財務の証拠であり、価格規則が計算し基準が解釈して初めてこのコスト度量を支える。
  why_needed:
    zh: token 数量本身不等于金额，模型价格、缓存计费和时间窗口都会影响成本。保留价格依据和准则，团队才能比较同一门槛下的候选或版本，而不会把一次账单观察误当成反馈结论。
    en: Token counts do not themselves equal money; model pricing, cache billing, and the time window all affect cost. Retaining the pricing basis and criterion lets a team compare candidates or versions under the same threshold without mistaking one billing observation for a feedback conclusion.
    ja: トークン数そのものは金額ではなく、モデル価格、キャッシュ課金、時間窓のすべてがコストに影響する。価格根拠と基準を残すことで、チームは同じ閾値の下で候補又は版を比較でき、一件の請求観測をフィードバック結論と誤認しない。
  includes:
    - zh: 每次评估或已声明窗口的继承 value、继承 unit、继承 aggregation、价格表或合同版本引用、准则引用和证据引用。
      en: Inherited value, unit, and aggregation for one evaluation or declared window, plus a price-sheet or contract-version reference, criterion reference, and evidence reference.
      ja: 一回の評価又は宣言済み窓に対する継承 value、継承 unit、継承 aggregation、価格表又は契約版の参照、基準参照、及び証拠参照。
    - zh: 用于如每次评估成本不得超过某金额的质量或发布约束的度量。
      en: A measurement used for a quality or release constraint such as cost per evaluation must not exceed a stated amount.
      ja: 一回の評価あたりのコストが指定額を超えてはならない、という品質又はリリース制約に使う測定。
  excludes:
    - zh: 单独的 input_tokens、output_tokens、total_tokens 或原始使用量导出。
      en: input_tokens, output_tokens, total_tokens, or a raw usage export by itself.
      ja: input_tokens、output_tokens、total_tokens、又は生の使用量エクスポート単体。
    - zh: 无价格依据、无货币单位或无 Evaluation Criterion 的预算告警、费用日志或账单行。
      en: A budget alert, cost log, or billing line with no pricing basis, explicit currency unit, aggregation, or Evaluation Criterion.
      ja: 価格根拠、通貨、又は Evaluation Criterion を持たない予算アラート、コストログ、又は請求明細行。
  semantic_kind: information
  aliases: [evaluation cost, cost per eval, 成本度量]
engineering:
  explanation:
    zh: Responses API 的完成响应可含 input_tokens、output_tokens 和 total_tokens 等 usage 数据；这些字段是实际 API 输出，但不直接给出不变的货币成本。评估器必须把受保留策略约束的 usage 证据与明确版本或生效日期的价格表相乘，再由成本准则解释结果。价格会变化，因此不得把临时价格常量写入概念定义。
    en: A completed Responses API response can contain usage data such as input_tokens, output_tokens, and total_tokens; these are real API outputs but do not directly provide an immutable monetary cost. An evaluator must combine usage evidence retained under policy with a price sheet that identifies a version or effective date, and then let a cost criterion interpret the result. Prices can change, so a temporary price constant must not be written into this concept definition.
    ja: 完了した Responses API 応答は input_tokens、output_tokens、total_tokens などの usage データを含み得る。これらは実際の API 出力だが、不変の金額を直接提供しない。評価器は保持方針下の usage 証拠と、版又は適用日を識別する価格表を組み合わせ、コスト基準に結果を解釈させなければならない。価格は変わり得るため、一時的な価格定数をこの概念定義に書いてはならない。
  typical_input:
    - description: Responses API usage evidence; runtime evidence rather than an Evaluation Cost Metric by itself.
      format: |
        {
          "usage": {
            "input_tokens": 1200,
            "input_tokens_details": {"cached_tokens": 0},
            "output_tokens": 300,
            "output_tokens_details": {"reasoning_tokens": 0},
            "total_tokens": 1500
          }
        }
      source_claims: [claim-cost-responses-usage]
    - description: Versioned local calculation input for one evaluation window.
      format: |
        {
          "usage_evidence_ref": "response:resp_...:usage",
          "pricing_basis_ref": "pricing:gpt-5.6:2026-07-18",
          "criterion_ref": "EvaluationCriterion:cost-per-evaluation"
        }
      source_claims: [claim-cost-design]
  typical_output:
    - description: Criterion-bound local Evaluation Cost Metric.
      format: |
        {
          "metric_id": "cost-per-evaluation-usd",
          "value": 0.015,
          "unit": "USD",
          "aggregation": "fixed_function",
          "pricing_basis_ref": "pricing:gpt-5.6:2026-07-18",
          "criterion_ref": "EvaluationCriterion:cost-per-evaluation",
          "evidence_ref": "response:resp_...:usage"
        }
      source_claims: [claim-cost-design]
  reference_implementations:
    - name: OpenAI Responses API reference
      url: https://developers.openai.com/api/reference/resources/responses/methods/create
      description: Documents the usage object and its input, output, and total token counts.
    - name: OpenAI API Pricing
      url: https://developers.openai.com/api/docs/pricing
      description: Publishes current per-token pricing used as an input to a locally retained pricing snapshot.
structure:
  identity_keys: [metric_id, criterion_ref, evidence_ref, pricing_basis_ref]
  fields:
    - id: metric_id
      labels:
        zh: 度量标识
        en: Evaluation cost metric identifier
        ja: メトリック識別子
      definitions:
        zh: 标识成本计算口径的稳定名称，而不是供应商账单行或原始用量记录的标识。
        en: Stable name identifying the cost-calculation contract rather than a provider billing line or raw usage record.
        ja: プロバイダー請求明細行又は生の使用量記録ではなく、コスト計算契約を識別する安定名。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: cost-per-evaluation-usd
      allowed_values: []
      source_claims: [claim-cost-design]
    - id: value
      labels:
        zh: 成本度量值
        en: Cost metric value
        ja: コストメトリック値
      definitions:
        zh: 继承自 Evaluation Metric 的 value；在此子类中，它是按 pricing_basis_ref 从声明证据范围计算出的非负货币数额，而不是独立的 amount 字段。
        en: The value inherited from Evaluation Metric; in this subtype it is the non-negative monetary amount calculated from the declared evidence scope under pricing_basis_ref, rather than a separate amount field.
        ja: Evaluation Metric から継承した value。この下位型では pricing_basis_ref の下で宣言した証拠範囲から計算する非負の貨幣金額であり、別個の amount フィールドではない。
      datatype: number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 0.015
      allowed_values: []
      source_claims: [claim-cost-design]
    - id: unit
      labels:
        zh: 货币单位
        en: Currency unit
        ja: 通貨単位
      definitions:
        zh: 继承自 Evaluation Metric 的 unit；在此子类中必须是解释 value 的 ISO 4217 三字母货币代码，不得假定默认货币。
        en: The unit inherited from Evaluation Metric; in this subtype it must be the ISO 4217 three-letter currency code that interprets value, and a default currency must not be assumed.
        ja: Evaluation Metric から継承した unit。この下位型では value を解釈する ISO 4217 の三文字通貨コードでなければならず、既定通貨を仮定してはならない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Z]{3}$'
      example_value: USD
      allowed_values: []
      source_claims: [claim-cost-iso-4217, claim-cost-design]
    - id: aggregation
      labels:
        zh: 成本计算方法
        en: Cost calculation method
        ja: コスト計算方法
      definitions:
        zh: 继承自 Evaluation Metric 的 aggregation；说明 value 如何由 evidence_ref 在 pricing_basis_ref 下得出，例如 fixed_function 表示依照版本化价格规则的确定性计算，sum 表示已声明窗口内的求和。
        en: The aggregation inherited from Evaluation Metric; it states how value is produced from evidence_ref under pricing_basis_ref. For example, fixed_function denotes deterministic calculation under a versioned price rule, while sum denotes a stated-window total.
        ja: Evaluation Metric から継承した aggregation。pricing_basis_ref の下で evidence_ref から value をどう得るかを示す。例えば fixed_function は版管理された価格規則による決定的計算、sum は宣言した窓内の合計を表す。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9_:-]{1,63}$'
      example_value: fixed_function
      allowed_values: [sum, fixed_function]
      source_claims: [claim-cost-design]
    - id: pricing_basis_ref
      labels:
        zh: 定价依据引用
        en: Pricing basis reference
        ja: 価格根拠参照
      definitions:
        zh: 指向包含供应商、模型或资源、计费规则以及版本或生效日期的价格表、合同或内部费率快照。
        en: Reference to a price sheet, contract, or internal rate snapshot that identifies provider, model or resource, billing rule, and version or effective date.
        ja: プロバイダー、モデル又は資源、課金規則、版又は適用日を識別する価格表、契約、又は内部料金スナップショットへの参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: pricing:gpt-5.6:2026-07-18
      allowed_values: []
      source_claims: [claim-cost-model-pricing, claim-cost-design]
    - id: criterion_ref
      labels:
        zh: 评估准则引用
        en: Evaluation criterion reference
        ja: 評価基準参照
      definitions:
        zh: 指向说明继承 value 如何支持或阻止质量结论的 Evaluation Criterion 的引用。
        en: Reference to the Evaluation Criterion that states how inherited value supports or blocks a quality conclusion.
        ja: 継承 value が品質結論をどう支持又は阻止するかを定める Evaluation Criterion への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: EvaluationCriterion:cost-per-evaluation
      allowed_values: []
      source_claims: [claim-cost-design]
    - id: evidence_ref
      labels:
        zh: 用量证据引用
        en: Usage evidence reference
        ja: 使用量証拠参照
      definitions:
        zh: 指向产生继承 value 所用的受保留策略约束的 usage、资源计数或其他可审计证据；该引用不把原始证据迁入反馈域。
        en: Reference to policy-retained usage, resource counts, or other auditable evidence used to calculate inherited value; the reference does not move raw evidence into the feedback domain.
        ja: 継承 value の計算に使った保持方針下の usage、資源カウント、又は他の監査可能な証拠への参照。この参照は生の証拠をフィードバック領域へ移さない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: response:resp_...:usage
      allowed_values: []
      source_claims: [claim-cost-responses-usage, claim-cost-design]
  constraints:
    - id: evaluation-cost-metric-has-pricing-context
      severity: error
      expression_language: plain
      expression: value, unit, aggregation, pricing_basis_ref, and evidence_ref must be present together and describe the same declared evaluation scope.
      explanation:
        zh: 没有货币单位、计算方法、定价规则或证据范围的 value 无法跨时间或供应商被审计和比较。
        en: A value with no currency unit, calculation method, pricing rule, or evidence scope cannot be audited or compared across time or providers.
        ja: 通貨単位、計算方法、価格規則、又は証拠範囲のない value は、時間又はプロバイダーをまたいで監査又は比較できない。
      source_claims: [claim-cost-design]
    - id: evaluation-cost-metric-value-is-non-negative
      severity: error
      expression_language: plain
      expression: value must be a finite number greater than or equal to 0; a negative value is not a monetary cost measurement.
      explanation:
        zh: 成本可以为零，但不能以负数表示；退款、抵扣或预算差额应作为独立财务事实或计算输入，而不是把本成本度量变成负数。
        en: Cost may be zero but cannot be represented by a negative value. A refund, credit, or budget variance belongs to separate financial evidence or calculation input rather than making this cost metric negative.
        ja: コストはゼロになり得るが、負の value では表せない。返金、クレジット、又は予算差異は、このコストメトリックを負にするのではなく、別の財務証拠又は計算入力として扱う。
      source_claims: [claim-cost-design]
    - id: evaluation-cost-metric-unit-is-iso-4217
      severity: error
      expression_language: plain
      expression: unit must match the three-letter pattern and resolve to an ISO 4217 alphabetic currency code in the controlled currency catalog captured with pricing_basis_ref; a syntactically valid but unregistered code is invalid.
      explanation:
        zh: 三个大写字母只能校验格式，不能证明币种存在；必须以定价依据所保留的 ISO 4217 货币目录核验。
        en: Three uppercase letters validate only syntax, not that a currency exists. Validation must use the ISO 4217 currency catalog retained with the pricing basis.
        ja: 三つの大文字は構文だけを検証し、通貨の存在は証明しない。検証には pricing basis とともに保持した ISO 4217 通貨カタログを使わなければならない。
      source_claims: [claim-cost-iso-4217, claim-cost-design]
    - id: evaluation-cost-metric-is-criterion-bound
      severity: error
      expression_language: plain
      expression: criterion_ref must resolve to an EvaluationCriterion that states the cost comparison or threshold; a budget alert alone is insufficient.
      explanation:
        zh: 成本只有在清楚说明与哪一质量或发布约束比较时，才是反馈平面的度量。
        en: Cost is an Evaluation Cost Metric only when it is clearly compared with a quality or release constraint.
        ja: コストは、どの品質又はリリース制約と比較するかが明確な場合にのみ、フィードバック平面のメトリックである。
      source_claims: [claim-cost-design]
    - id: evaluation-cost-metric-does-not-retype-usage
      severity: error
      expression_language: plain
      expression: A token count, raw usage object, billing event, or budget alert must not be asserted as EvaluationCostMetric unless a pricing basis computes value with an explicit aggregation and a criterion interprets it.
      explanation:
        zh: 用量证据与成本结论之间必须保留计算和解释两层边界。
        en: The calculation and interpretation boundaries must remain between usage evidence and a cost conclusion.
        ja: 使用量証拠とコスト結論の間には、計算と解釈の二つの境界を残さなければならない。
      source_claims: [claim-cost-responses-usage, claim-cost-design]
  required_relations:
    - id: evaluation-cost-metric-is-a-evaluation-metric
      direction: outgoing
      predicate: is_a
      target_concept_id: EvaluationMetric
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每个 Evaluation Cost Metric 都是一个保留成本语义的 Evaluation Metric。
        en: Each Evaluation Cost Metric is an Evaluation Metric with retained cost semantics.
        ja: 各 Evaluation Cost Metric はコスト意味論を保持する Evaluation Metric である。
      source_claims: [claim-cost-design]
    - id: evaluation-cost-metric-is-interpreted-by-criterion
      direction: outgoing
      predicate: is_interpreted_by
      target_concept_id: EvaluationCriterion
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每个保留在反馈域的成本度量必须由恰好一个评估准则解释。
        en: Each Evaluation Cost Metric retained in the feedback domain must be interpreted by exactly one evaluation criterion.
        ja: フィードバック領域に保持される各コストメトリックは、ちょうど一つの評価基準で解釈されなければならない。
      source_claims: [claim-cost-design]
examples:
  - id: evaluation-cost-metric-positive-release-budget

    labels:
      zh: OpenAI Evals 运行成本
      en: OpenAI Evals run cost
      ja: OpenAI Evals 実行コスト

    descriptions:
      zh: "W&B wandb.init(project='agent-eval'); wandb.log({'accuracy':0.95,'latency':1.2}); EvaluationCostMetric maps EvaluationMetric/Score/EvaluationCostMetric."
      en: "W&B wandb.init(project='agent-eval'); wandb.log({'accuracy':0.95,'latency':1.2}); EvaluationCostMetric maps EvaluationMetric/Score/EvaluationCostMetric."
      ja: "W&B wandb.log accuracy/latency; EvaluationCostMetric eval telemetry."
    field_values:
      metric_id: cost-per-eval-run-usd
      value: 0.015
      unit: USD
      aggregation: fixed_function
      pricing_basis_ref: 'pricing:gpt-4o:openai-2024'
      criterion_ref: 'EvaluationCriterion:cost-per-evaluation'
      evidence_ref: 'response:eval-run-it-ticket:usage'
    related_node_ids: [EvaluationCostMetric, EvaluationMetric, EvaluationCriterion, EvaluationRun]
    related_relation_ids: [EvaluationCostMetric-is_a-EvaluationMetric, evaluation-cost-metric-is-interpreted-by-criterion]

    source_claims: [claim-cost-responses-usage, claim-cost-design]
