    source_claims: [claim-cost-design]
  - id: evaluation-cost-metric-instance-eval-run-104

    labels:
      zh: eval-run-104 的具体成本度量
      en: Concrete Evaluation Cost Metric for eval-run-104
      ja: eval-run-104 の具体的なコストメトリック

    descriptions:
      zh: "OpenAI Evals instance: string_check eq Hardware->run completed->EvaluationCostMetric eval_id=it-ticket-v1."
      en: "OpenAI Evals instance: string_check eq Hardware->run completed->EvaluationCostMetric eval_id=it-ticket-v1."
      ja: "OpenAI Evals instance maps to EvaluationCostMetric Run."
    field_values:
      metric_id: cost-per-evaluation-usd
      value: 0.015
      unit: USD
      aggregation: fixed_function
