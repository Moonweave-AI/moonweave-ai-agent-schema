    source_claims: [claim-cost-responses-usage, claim-cost-model-pricing, claim-cost-design]
parent_relation:
  id: EvaluationCostMetric-is_a-EvaluationMetric
  predicate: is_a
  target: concept:EvaluationMetric
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是评估度量的一种成本类型
    en: is a cost-valued evaluation metric
    ja: コスト値を持つ評価メトリックである
  definitions:
    zh: Evaluation Cost Metric 保留 Evaluation Metric 的全部必填字段与准则边界，并将其 value、unit 和 aggregation 分别收窄为货币金额、ISO 4217 货币代码和价格计算方法，同时增加定价依据语义。
    en: Evaluation Cost Metric retains every required Evaluation Metric field and criterion boundary, narrowing value, unit, and aggregation to a monetary amount, ISO 4217 currency code, and pricing calculation method while adding pricing-basis semantics.
