schema: moonweave.ai/ontology-node/v1
id: EvaluationCostMetric
kind: concept
labels:
  zh: 成本评估度量
  en: Evaluation Cost Metric
  ja: コスト評価メトリック
semantics:
  short_definition:
    zh: 由评估准则解释的、带货币单位与定价依据的成本类 EvaluationMetric。
    en: A cost-valued EvaluationMetric with currency unit and pricing basis interpreted by an evaluation criterion.
    ja: 評価基準により解釈され、通貨単位と価格根拠を持つコスト型 EvaluationMetric。
  definition:
    zh: EvaluationCostMetric 是 EvaluationMetric 的货币子类：继承 metric_id、value、unit、aggregation、criterion_ref、evidence_ref，并将 value 收窄为非负货币金额、unit 为 ISO 4217 代码、aggregation 为价格计算方法，额外增加 pricing_basis_ref。它不是原始 token 用量、Usage API 聚合或预算告警；这些只有经定价规则计算并由准则解释后才支持该成本度量。常见映射为 eval_cost_usd、cost-per-evaluation 与 OpenAI Responses usage→pricing 计算。
    en: "EvaluationCostMetric is the monetary subtype of EvaluationMetric: it inherits metric_id, value, unit, aggregation, criterion_ref, and evidence_ref, narrows value to a non-negative monetary amount, unit to ISO 4217 codes, aggregation to pricing calculation methods, and adds pricing_basis_ref. It is not raw token usage, Usage API aggregates, or budget alerts; those support this measurement only after pricing calculation and criterion interpretation. Common mappings include eval_cost_usd, cost-per-evaluation, and OpenAI Responses usage→pricing calculation."
    ja: EvaluationCostMetric は EvaluationMetric の貨幣的下位型です。metric_id、value、unit、aggregation、criterion_ref、evidence_ref を継承し、value を非負の貨幣金額、unit を ISO 4217 コード、aggregation を価格計算方法に絞り、pricing_basis_ref を追加します。生トークン使用量、Usage API 集計、予算アラートではありません。価格規則計算と基準解釈後にのみ本測定を支えます。eval_cost_usd、cost-per-evaluation、OpenAI Responses usage→pricing 計算が一般的な写像です。
  why_needed:
    zh: token 数量本身不等于金额，模型价格、缓存计费和时间窗口都会影响成本。保留价格依据和准则，团队才能比较同一门槛下的候选或版本，而不会把一次账单观察误当成反馈结论。
    en: Token counts do not themselves equal money; model pricing, cache billing, and time window all affect cost. Retaining pricing basis and criterion lets teams compare candidates or versions under the same threshold without mistaking one billing observation for a feedback conclusion.
    ja: トークン数そのものは金額ではなく、モデル価格、キャッシュ課金、時間窓がコストに影響します。価格根拠と基準を残すことで、請求観測をフィードバック結論と誤認せず、同じ閾値下で候補や版を比較できます。
  includes:
    - zh: 每次评估或声明窗口的 value、unit（USD 等）、aggregation、pricing_basis_ref、criterion_ref 与 evidence_ref。
      en: "value, unit (e.g. USD), aggregation, pricing_basis_ref, criterion_ref, and evidence_ref for one evaluation or declared window."
      ja: 一回の評価又は宣言窓に対する value、unit（USD 等）、aggregation、pricing_basis_ref、criterion_ref、evidence_ref。
    - zh: 用于“每次评估成本不得超过某金额”等质量或发布约束的度量。
      en: A measurement for quality or release constraints such as cost per evaluation must not exceed a stated amount.
      ja: 「一回の評価コストが指定額を超えてはならない」等の品質又はリリース制約に使う測定。
  excludes:
    - zh: 单独的 input_tokens、output_tokens 或原始 usage 导出。
      en: input_tokens, output_tokens, or raw usage export by itself.
      ja: input_tokens、output_tokens、生 usage エクスポート単体。
    - zh: 无价格依据、无货币单位或无 EvaluationCriterion 的预算告警或账单行。
      en: A budget alert or billing line with no pricing basis, currency unit, or EvaluationCriterion.
      ja: 価格根拠、通貨単位、EvaluationCriterion を持たない予算アラート又は請求明細行。
  semantic_kind: information
  aliases: [evaluation cost, cost per eval, 成本度量]
engineering:
  explanation:
    zh: 新集成应以 OpenAI Responses API usage（input_tokens、output_tokens、cached_tokens）乘以版本化 price sheet、LangSmith/W&B eval_cost_usd 日志形状为可映射 API 输入，再由 EvaluationCriterion cost-per-evaluation 解释结果。不能把 token 数直接标为 EvaluationCostMetric。
    en: "New integrations should treat OpenAI Responses API usage (input_tokens, output_tokens, cached_tokens) multiplied by a versioned price sheet and LangSmith/W&B eval_cost_usd log shapes as mappable API inputs, then let EvaluationCriterion cost-per-evaluation interpret the result. Token counts must not be labeled as EvaluationCostMetric directly."
    ja: 新しい統合では OpenAI Responses API usage（input_tokens、output_tokens、cached_tokens）× 版管理 price sheet、LangSmith/W&B eval_cost_usd ログ形状を写像可能 API 入力として扱い、EvaluationCriterion cost-per-evaluation が結果を解釈します。トークン数を直接 EvaluationCostMetric とラベル付けしてはなりません。
  typical_input:
    - description: OpenAI Responses API usage evidence.
      format: |
        {
          "usage": {
            "input_tokens": 1200,
            "input_tokens_details": {"cached_tokens": 0},
            "output_tokens": 300,
            "total_tokens": 1500
          }
        }
      source_claims: [claim-cost-responses-usage]
    - description: Versioned pricing calculation input.
      format: |
        {
          "usage_evidence_ref": "response:resp_104:usage",
          "pricing_basis_ref": "pricing:gpt-4.1-mini:2026-07-18",
          "criterion_ref": "EvaluationCriterion:cost-per-evaluation"
        }
      source_claims: [claim-cost-design]
  typical_output:
    - description: Criterion-bound EvaluationCostMetric record.
      format: |
        {
          "metric_id": "cost-per-evaluation-usd",
          "value": 0.015,
          "unit": "USD",
          "aggregation": "fixed_function",
          "pricing_basis_ref": "pricing:gpt-4.1-mini:2026-07-18",
          "criterion_ref": "EvaluationCriterion:cost-per-evaluation",
          "evidence_ref": "response:resp_104:usage"
        }
      source_claims: [claim-cost-design]
  reference_implementations:
    - name: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      description: Usage object with input, output, and total token counts.
    - name: OpenAI API Pricing
      url: https://platform.openai.com/docs/pricing
      description: Per-token pricing for cost calculation inputs.
structure:
  identity_keys: [metric_id, criterion_ref, evidence_ref, pricing_basis_ref]
  fields:
    - id: metric_id
      labels: {zh: 度量标识, en: Evaluation cost metric identifier, ja: メトリック識別子}
      definitions:
        zh: 标识成本计算口径的稳定名称，如 cost-per-evaluation-usd。
        en: "Stable name identifying the cost calculation contract, such as cost-per-evaluation-usd."
        ja: cost-per-evaluation-usd など、コスト計算契約を識別する安定名。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: cost-per-evaluation-usd
      allowed_values: []
      source_claims: [claim-cost-design]
    - id: value
      labels: {zh: 成本度量值, en: Cost metric value, ja: コストメトリック値}
      definitions:
        zh: 继承自 EvaluationMetric 的 value；在此子类中是非负货币数额。
        en: value inherited from EvaluationMetric; in this subtype it is a non-negative monetary amount.
        ja: EvaluationMetric から継承した value。この下位型では非負の貨幣金額。
      datatype: number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 0.015
      allowed_values: []
      source_claims: [claim-cost-design]
    - id: unit
      labels: {zh: 货币单位, en: Currency unit, ja: 通貨単位}
      definitions:
        zh: ISO 4217 三字母货币代码，如 USD；不得假定默认货币。
        en: ISO 4217 three-letter currency code such as USD; a default currency must not be assumed.
        ja: USD など ISO 4217 三文字通貨コード。既定通貨を仮定してはなりません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Z]{3}$'
      example_value: USD
      allowed_values: []
      source_claims: [claim-cost-iso-4217, claim-cost-design]
    - id: aggregation
      labels: {zh: 成本计算方法, en: Cost calculation method, ja: コスト計算方法}
      definitions:
        zh: 说明 value 如何由 evidence_ref 在 pricing_basis_ref 下得出，如 fixed_function 或 sum。
        en: "States how value is produced from evidence_ref under pricing_basis_ref, such as fixed_function or sum."
        ja: fixed_function や sum など、pricing_basis_ref 下で evidence_ref から value を得る方法。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9_:-]{1,63}$'
      example_value: fixed_function
      allowed_values: [sum, fixed_function]
      source_claims: [claim-cost-design]
    - id: pricing_basis_ref
      labels: {zh: 定价依据引用, en: Pricing basis reference, ja: 価格根拠参照}
      definitions:
        zh: 指向含模型、计费规则、版本或生效日期的价格表或合同快照。
        en: Reference to a price sheet or contract snapshot identifying model, billing rule, and version or effective date.
        ja: モデル、課金規則、版又は適用日を識別する価格表又は契約スナップショットへの参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: pricing:gpt-4.1-mini:2026-07-18
      allowed_values: []
      source_claims: [claim-cost-model-pricing, claim-cost-design]
    - id: criterion_ref
      labels: {zh: 评估准则引用, en: Evaluation criterion reference, ja: 評価基準参照}
      definitions:
        zh: 指向说明 value 如何与成本质量门槛比较的 EvaluationCriterion。
        en: Reference to the EvaluationCriterion stating how value compares with a cost-quality threshold.
        ja: value がコスト品質閾値とどう比較するかを定める EvaluationCriterion への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: EvaluationCriterion:cost-per-evaluation
      allowed_values: []
      source_claims: [claim-cost-design]
    - id: evidence_ref
      labels: {zh: 用量证据引用, en: Usage evidence reference, ja: 使用量証拠参照}
      definitions:
        zh: 指向产生 value 所用的 usage 或其他可审计证据；引用不迁移原始证据到反馈域。
        en: Reference to usage or other auditable evidence used to calculate value; the reference does not move raw evidence into the feedback domain.
        ja: value 計算に使った usage 又は他の監査可能証拠への参照。参照は生証拠をフィードバック域へ移しません。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: response:resp_104:usage
      allowed_values: []
      source_claims: [claim-cost-responses-usage, claim-cost-design]
  constraints:
    - id: evaluation-cost-metric-has-pricing-context
      severity: error
      expression_language: plain
      expression: value, unit, aggregation, pricing_basis_ref, and evidence_ref must be present together and describe the same declared evaluation scope.
      explanation:
        zh: 没有货币单位、计算方法、定价规则或证据范围的 value 无法跨时间或供应商被审计和比较。
        en: A value without currency unit, calculation method, pricing rule, or evidence scope cannot be audited or compared across time or providers.
        ja: 通貨単位、計算方法、価格規則、証拠範囲のない value は時間又はプロバイダーをまたいで監査・比較できません。
      source_claims: [claim-cost-design]
    - id: evaluation-cost-metric-value-is-non-negative
      severity: error
      expression_language: plain
      expression: value must be a finite number greater than or equal to 0.
      explanation:
        zh: 成本可以为零，但不能以负数表示；退款或预算差额应作为独立财务事实。
        en: Cost may be zero but cannot be negative; refunds or budget variances belong to separate financial facts.
        ja: コストはゼロになり得るが負の value では表せません。返金や予算差異は別の財務事実です。
      source_claims: [claim-cost-design]
    - id: evaluation-cost-metric-does-not-retype-usage
      severity: error
      expression_language: plain
      expression: A token count or raw usage object must not be asserted as EvaluationCostMetric unless a pricing basis computes value with explicit aggregation and a criterion interprets it.
      explanation:
        zh: 用量证据与成本结论之间必须保留计算和解释两层边界。
        en: Calculation and interpretation boundaries must remain between usage evidence and a cost conclusion.
        ja: 使用量証拠とコスト結論の間には計算と解釈の二層境界が必要です。
      source_claims: [claim-cost-responses-usage, claim-cost-design]
  required_relations:
    - id: evaluation-cost-metric-is-a-evaluation-metric
      direction: outgoing
      predicate: is_a
      target_concept_id: EvaluationMetric
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每个 EvaluationCostMetric 都是保留成本语义的 EvaluationMetric。
        en: Each EvaluationCostMetric is an EvaluationMetric with retained cost semantics.
        ja: 各 EvaluationCostMetric はコスト意味論を保持する EvaluationMetric です。
      source_claims: [claim-cost-design]
    - id: evaluation-cost-metric-is-interpreted-by-criterion
      direction: outgoing
      predicate: is_interpreted_by
      target_concept_id: EvaluationCriterion
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每个成本度量必须由恰好一个评估准则解释。
        en: Each cost metric must be interpreted by exactly one evaluation criterion.
        ja: 各コストメトリックはちょうど一つの評価基準で解釈されなければなりません。
      source_claims: [claim-cost-design]
examples:
  - id: evaluation-cost-metric-example-openai-eval
    labels:
      zh: OpenAI eval run 单次成本
      en: OpenAI eval run per-item cost
      ja: OpenAI eval run 単回コスト
    descriptions:
      zh: Responses usage input_tokens=1200 output_tokens=300 乘以 pricing:gpt-4.1-mini:2026-07-18 得 value=0.015 USD；EvaluationCostMetric cost-per-evaluation-usd 绑定 criterion_ref=cost-per-evaluation（阈值 lte 0.020 USD）。
      en: Responses usage input_tokens=1200 output_tokens=300 multiplied by pricing:gpt-4.1-mini:2026-07-18 yields value=0.015 USD; EvaluationCostMetric cost-per-evaluation-usd binds criterion_ref=cost-per-evaluation (threshold lte 0.020 USD).
      ja: Responses usage input_tokens=1200 output_tokens=300 × pricing:gpt-4.1-mini:2026-07-18 で value=0.015 USD。EvaluationCostMetric cost-per-evaluation-usd が criterion_ref=cost-per-evaluation（閾値 lte 0.020 USD）に結び付きます。
    example_source:
      product: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      version: usage object and pricing
    field_values:
      metric_id: cost-per-evaluation-usd
      value: 0.015
      unit: USD
      aggregation: fixed_function
      pricing_basis_ref: pricing:gpt-4.1-mini:2026-07-18
      criterion_ref: EvaluationCriterion:cost-per-evaluation
      evidence_ref: response:resp_104:usage
    related_node_ids: [EvaluationCostMetric, EvaluationMetric, EvaluationCriterion, EvaluationRun]
    related_relation_ids: [evaluation-cost-metric-is-a-evaluation-metric, evaluation-cost-metric-is-interpreted-by-criterion]
    source_claims: [claim-cost-responses-usage, claim-cost-design]
  - id: evaluation-cost-metric-example-wandb-log
    labels:
      zh: W&B eval_cost_usd 日志
      en: W&B eval_cost_usd log
      ja: W&B eval_cost_usd ログ
    descriptions:
      zh: "wandb.log eval_cost_usd=0.042 tokens=1500 经 pricing_basis_ref 解释后写入 EvaluationCostMetric；evidence_ref 指向 eval run usage 快照，不等同于原始 W&B 日志行本身。"
      en: "wandb.log eval_cost_usd=0.042 tokens=1500 interpreted via pricing_basis_ref becomes EvaluationCostMetric; evidence_ref points to eval run usage snapshot, not the raw W&B log line itself."
      ja: "wandb.log eval_cost_usd=0.042 tokens=1500 を pricing_basis_ref で解釈して EvaluationCostMetric に書き込み。evidence_ref は eval run usage スナップショットを指し、生 W&B ログ行自体ではありません。"
    example_source:
      product: Weights & Biases
      url: https://docs.wandb.ai
      version: eval_cost_usd logging pattern
    field_values:
      metric_id: eval-cost-usd
      value: 0.042
      unit: USD
      aggregation: fixed_function
      pricing_basis_ref: pricing:gpt-4o:openai-2024
      criterion_ref: EvaluationCriterion:cost-per-evaluation
      evidence_ref: EvaluationRun:agent-eval-104:usage
    related_node_ids: [EvaluationCostMetric, EvaluationMetric, EvaluationRun]
    related_relation_ids: [evaluation-cost-metric-is-a-evaluation-metric]
    source_claims: [claim-cost-design]
  - id: evaluation-cost-metric-example-batch-sum
    labels:
      zh: 评估窗口成本求和
      en: Evaluation window cost sum
      ja: 評価窓コスト合計
    descriptions:
      zh:  nightly eval 对 50 条样本分别计算 cost 后 aggregation=sum 得 value=0.75 USD；EvaluationCostMetric eval-window-cost-usd 绑定 criterion_ref=release-budget（lte 1.00 USD per nightly run）。
      en: Nightly eval sums per-item costs for 50 samples with aggregation=sum yielding value=0.75 USD; EvaluationCostMetric eval-window-cost-usd binds criterion_ref=release-budget (lte 1.00 USD per nightly run).
      ja: nightly eval が 50 サンプルの個別 cost を aggregation=sum で合計し value=0.75 USD。EvaluationCostMetric eval-window-cost-usd が criterion_ref=release-budget（lte 1.00 USD per nightly run）に結び付きます。
    example_source:
      product: Moonweave evaluation boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: windowed cost aggregation
    field_values:
      metric_id: eval-window-cost-usd
      value: 0.75
      unit: USD
      aggregation: sum
      pricing_basis_ref: pricing:gpt-4.1-mini:2026-07-18
      criterion_ref: EvaluationCriterion:release-budget
      evidence_ref: EvaluationRun:nightly-104
    related_node_ids: [EvaluationCostMetric, EvaluationCriterion, EvaluationRun]
    related_relation_ids: [evaluation-cost-metric-is-interpreted-by-criterion]
    source_claims: [claim-cost-design]
  - id: evaluation-cost-metric-counterexample-token-only
    labels:
      zh: 只有 token 数量
      en: Token count only
      ja: トークン数のみ
    descriptions:
      zh: total_tokens=1500 无 pricing_basis_ref、unit、aggregation；不能登记为 EvaluationCostMetric，因为 token 数不等于货币成本。
      en: total_tokens=1500 without pricing_basis_ref, unit, or aggregation; cannot register as EvaluationCostMetric because token count is not monetary cost.
      ja: total_tokens=1500 に pricing_basis_ref、unit、aggregation がない。トークン数は貨幣コストではないため EvaluationCostMetric として登録できません。
    example_source:
      product: OpenAI Responses API
      url: https://platform.openai.com/docs/api-reference/responses
      version: usage without pricing
    field_values:
      metric_id: null
      value: null
      unit: null
      aggregation: null
      pricing_basis_ref: null
      criterion_ref: null
      evidence_ref: response:resp_104:usage
    related_node_ids: [EvaluationCostMetric]
    related_relation_ids: []
    source_claims: [claim-cost-responses-usage, claim-cost-design]
  - id: evaluation-cost-metric-boundary-latency-not-cost
    labels:
      zh: 延迟不是成本度量
      en: Latency is not a cost metric
      ja: レイテンシはコストメトリックではない
    descriptions:
      zh: p95 latency=612ms 是 EvaluationMetric（unit=ms）；eval_cost_usd=0.015 是 EvaluationCostMetric（unit=USD）。不能把 wall-clock 延迟标为 faithfulness 或 cost。
      en: p95 latency=612ms is EvaluationMetric (unit=ms); eval_cost_usd=0.015 is EvaluationCostMetric (unit=USD). Wall-clock latency must not be labeled as faithfulness or cost.
      ja: p95 latency=612ms は EvaluationMetric（unit=ms）。eval_cost_usd=0.015 は EvaluationCostMetric（unit=USD）。wall-clock レイテンシを faithfulness や cost としてラベル付けしてはなりません。
    example_source:
      product: Moonweave evaluation boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: latency vs cost boundary
    field_values:
      metric_id: cost-per-evaluation-usd
      value: 0.015
      unit: USD
      aggregation: fixed_function
      pricing_basis_ref: pricing:gpt-4.1-mini:2026-07-18
      criterion_ref: EvaluationCriterion:cost-per-evaluation
      evidence_ref: response:resp_104:usage
    related_node_ids: [EvaluationCostMetric, EvaluationMetric]
    related_relation_ids: [evaluation-cost-metric-is-a-evaluation-metric]
    source_claims: [claim-cost-design]
parent_relation:
  id: EvaluationCostMetric-is_a-EvaluationMetric
  predicate: is_a
  target: concept:EvaluationMetric
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是评估度量的成本类型, en: is a cost-valued evaluation metric, ja: コスト値を持つ評価メトリックである}
  definitions:
    zh: EvaluationCostMetric 保留 EvaluationMetric 全部必填字段，将 value/unit/aggregation 收窄为货币语义并增加 pricing_basis_ref。
    en: EvaluationCostMetric retains all required EvaluationMetric fields, narrows value/unit/aggregation to monetary semantics, and adds pricing_basis_ref.
    ja: EvaluationCostMetric は EvaluationMetric の必須フィールドを保持し、value/unit/aggregation を貨幣意味に絞り pricing_basis_ref を追加します。
  cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_subtype, labels: {zh: 有成本子类型, en: has cost-valued subtype, ja: コスト値下位型を持つ}}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-cost-design]
  distinct_fact_rationale:
    zh: 该层级表达成本是带额外货币语义的度量，不表达原始用量事实。
    en: This hierarchy states cost is a metric with extra monetary semantics, not a raw usage fact.
    ja: この階層はコストが追加貨幣意味論を持つメトリックであることを示し、生使用量事実ではありません。
  layout_role: primary-backbone
relations:
  - id: EvaluationCostMetric-isInterpretedBy-EvaluationCriterion
    predicate: is_interpreted_by
    target: concept:EvaluationCriterion
    direction: source-to-target
    relation_kind: semantic
    labels: {zh: 成本度量由评估准则解释, en: cost metric is interpreted by criterion, ja: コストメトリックが基準により解釈される}
    definitions:
      zh: EvaluationCriterion 规定 value、unit、aggregation 与成本质量门槛如何比较。
