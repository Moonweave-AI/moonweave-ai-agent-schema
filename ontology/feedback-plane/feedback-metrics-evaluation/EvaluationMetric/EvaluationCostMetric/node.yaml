      en: "Ad-hoc script without testing_criteria cannot serve as OpenAI Evals-style EvaluationCostMetric."
      ja: "Missing criteria rejects OpenAI Evals-style EvaluationCostMetric."
    field_values:
      metric_id: null
      value: null
      unit: null
      aggregation: null
      pricing_basis_ref: null
