schema: moonweave.ai/ontology-node/v1
id: EvaluationMetric
kind: concept
status: accepted
labels: {zh: 评估度量, en: Evaluation Metric, ja: 評価メトリック}
semantics:
  short_definition: {zh: 与评估准则显式绑定的、有单位和聚合语义的定量测量。, en: A quantitative measurement with unit and aggregation semantics explicitly bound to an evaluation criterion., ja: 評価基準に明示的に結び付けられた、単位及び集約意味論を持つ定量測定。}
  definition: {zh: Evaluation Metric 是一个已命名的定量测量及其单位、聚合或计算语义和证据范围。它只有在 Evaluation Criterion 明确解释该数值时才属于反馈评估平面。Evaluation Metric 不是 Score（按量表给出的判断性数值）、Verdict（类别判断）、Human Feedback，也不是原始 OpenTelemetry Metric、Trace、Span、Log Record 或诊断事件；后者属于运行时可观测性，最多可作为本度量的证据。, en: "An Evaluation Metric is a named quantitative measurement together with its unit, aggregation or calculation semantics, and evidence scope. It belongs to the feedback evaluation plane only when an Evaluation Criterion explicitly interprets the number. An Evaluation Metric is not a Score (a judgmental number assigned on a scale), a Verdict (a categorical judgment), Human Feedback, or a raw OpenTelemetry Metric, Trace, Span, Log Record, or diagnostic event; those belong to runtime observability and may at most serve as evidence for this measurement.", ja: Evaluation Metric は、名称を持つ定量測定と、その単位、集約又は計算意味論、及び証拠範囲から成る。Evaluation Criterion がその数値を明示的に解釈する場合にのみ、フィードバック評価平面に属する。Evaluation Metric は、Score（尺度上で与える判断的数値）、Verdict（カテゴリ判断）、Human Feedback、生の OpenTelemetry Metric、Trace、Span、Log Record、又は診断イベントではない。後者は実行時オブザーバビリティに属し、この測定の証拠となり得るだけである。}
  why_needed: {zh: 数字本身不说明“好不好”。保留单位、聚合和准则引用，才能知道 250 是毫秒、美元还是比例，也才能检验它是否支持某项质量结论，而不会把生产遥测误写成反馈。, en: "A number alone does not say whether something is good. Retaining its unit, aggregation, and criterion reference establishes whether 250 means milliseconds, dollars, or a proportion and whether it supports a quality conclusion, without relabeling production telemetry as feedback.", ja: 数値だけでは良し悪しを示さない。単位、集約、及び基準参照を残すことで、250 がミリ秒、ドル、又は比率のいずれか、また品質結論を支えるかを明確にし、本番テレメトリをフィードバックと誤記しない。}
  includes:
    - {zh: 与一个或多个 Evaluation Criterion 绑定的正确率、拒答率、延迟百分位或成本测量。, en: "Accuracy, refusal rate, latency percentile, or cost measurement bound to one or more Evaluation Criteria.", ja: 一つ以上の Evaluation Criterion に結び付けられた正確率、拒否率、レイテンシ百分位、又はコスト測定。}
    - {zh: 来自保留证据的计算值，例如已导出 OTLP Histogram 的 p95，但证据本身仍是运行时遥测。, en: "A calculated value such as p95 from retained OTLP Histogram evidence, while the evidence itself remains runtime telemetry.", ja: 保持された OTLP Histogram 証拠からの p95 のような計算値。証拠自体は実行時テレメトリのままである。}
  excludes:
    - {zh: 没有 Evaluation Criterion 的裸露生产仪表盘或 OTLP OpenTelemetry Metric 数据流。, en: A bare production dashboard or OTLP OpenTelemetry Metric data stream with no Evaluation Criterion., ja: Evaluation Criterion を持たない生産ダッシュボード又は OTLP OpenTelemetry Metric データ・ストリーム。}
    - {zh: 量表上的 Score、通过/失败 Verdict、自然语言人类评论，或任何原始日志和追踪对象。, en: "A scale Score, pass/fail Verdict, natural-language human comment, or any raw log and tracing object.", ja: 尺度上の Score、合格/不合格 Verdict、自然言語の人間コメント、又は生のログ及びトレーシング対象。}
  semantic_kind: information
  aliases: [evaluation metric, quality metric, 度量]
engineering:
  explanation:
    zh: OTLP 可传输含名称、单位和数据点的 OpenTelemetry Metric 数据；本概念不把该载荷复制到反馈域。独立评估器先保留运行时证据，再以固定算法得到一个有 metric_id、unit、aggregation、criterion_ref 和 evidence_ref 的 Evaluation Metric。
    en: OTLP can transport OpenTelemetry Metric data with a name, unit, and data points; this concept does not copy that payload into the feedback domain. An independent evaluator first retains runtime evidence and then applies a fixed calculation to produce an Evaluation Metric with metric_id, unit, aggregation, criterion_ref, and evidence_ref.
    ja: OTLP は名称、単位、及びデータ点を持つ OpenTelemetry Metric データを転送できるが、本概念はそのペイロードをフィードバック領域に複製しない。独立した評価器がまず実行時証拠を保持し、固定された計算で metric_id、unit、aggregation、criterion_ref、evidence_ref を持つ Evaluation Metric を作る。
  typical_input:
    - description: OTLP OpenTelemetry Metric evidence; a runtime observability payload, not feedback by itself.
      format: |
        {
          "resourceMetrics": [{
            "scopeMetrics": [{
              "metrics": [{
                "name": "http.server.request.duration",
                "unit": "s",
                "histogram": {"dataPoints": [{"count": "500", "sum": 218.7}]}
              }]
            }]
          }]
        }
      source_claims: [claim-metric-otel]
    - description: OpenAI TextSimilarityGrader wire object, whose explicit evaluation_metric selects a similarity calculation rather than a local EvaluationMetric record.
      format: |
        {"type":"text_similarity","name":"answer-similarity","input":"{{ sample.output_text }}","reference":"{{ item.reference_text }}","evaluation_metric":"cosine"}
      source_claims: [claim-metric-openai-grader]
  typical_output:
    - description: Criterion-bound local evaluation metric derived from retained evidence.
      format: |
        {
          "metric_id": "p95-request-latency-ms",
          "value": 612,
          "unit": "ms",
          "aggregation": "percentile_95",
          "criterion_ref": "EvaluationCriterion:interactive-latency",
          "evidence_ref": "otel-metric:http.server.request.duration:run-104"
        }
      source_claims: [claim-metric-design]
  reference_implementations:
    - {name: OpenTelemetry Metrics Data Model, url: https://opentelemetry.io/docs/specs/otel/metrics/data-model/, description: "Normative terminology for metric streams, data points, units, and aggregation."}
    - {name: OpenTelemetry Protocol specification, url: https://opentelemetry.io/docs/specs/otlp/, description: Transport context for retained runtime metric evidence.}
    - {name: OpenAI Graders API, url: https://developers.openai.com/api/reference/resources/graders, description: Documents the TextSimilarityGrader evaluation_metric wire field; it is not a Moonweave EvaluationMetric record.}
structure:
  identity_keys: [metric_id, criterion_ref, evidence_ref]
  fields:
    - id: metric_id
      labels: {zh: 评估度量标识, en: Evaluation metric identifier, ja: 評価メトリック識別子}
      definitions: {zh: 标识度量名称和计算口径的稳定值，不应以显示标签或原始 OTLP 点的临时序列号代替。, en: Stable value identifying the metric name and calculation contract; it must not be replaced by a display label or an ephemeral raw OTLP point sequence number., ja: メトリック名及び計算契約を識別する安定値。表示ラベル又は一時的な生 OTLP 点列番号で代用してはならない。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: p95-request-latency-ms
      allowed_values: []
      source_claims: [claim-metric-design]
    - id: value
      labels: {zh: 测量值, en: Measured value, ja: 測定値}
      definitions: {zh: 按声明的聚合或计算方法得到的定量值；它不是量表评分。, en: Quantitative value obtained by the declared aggregation or calculation; it is not a scale score., ja: 宣言された集約又は計算で得られた定量値であり、尺度スコアではない。}
      datatype: number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 612
      allowed_values: []
      source_claims: [claim-metric-design]
    - id: unit
      labels: {zh: 单位, en: Unit, ja: 単位}
      definitions: {zh: 解释测量值尺度的单位；若无物理单位，必须明确声明为单位 1 或约定比例单位。, en: "Unit that interprets the measurement scale; if there is no physical unit, it must explicitly be declared as unit 1 or an agreed proportion unit.", ja: 測定値の尺度を解釈する単位。物理単位がない場合は単位 1 又は合意済みの比率単位として明示しなければならない。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^.{1,32}$'
      example_value: ms
      allowed_values: []
      source_claims: [claim-metric-otel, claim-metric-design]
    - id: aggregation
      labels: {zh: 聚合或计算方法, en: Aggregation or calculation, ja: 集約又は計算方法}
      definitions: {zh: 说明值如何由证据产生，例如 sum、mean、percentile_95 或固定判定函数；不能省略。, en: "States how the value was produced from evidence, such as sum, mean, percentile_95, or a fixed decision function; it cannot be omitted.", ja: sum、mean、percentile_95、又は固定判定関数など、値を証拠から作った方法を示す。省略してはならない。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9_:-]{1,63}$'
      example_value: percentile_95
      allowed_values: [sum, mean, min, max, percentile_50, percentile_95, percentile_99, fixed_function]
      source_claims: [claim-metric-otel, claim-metric-design]
    - id: criterion_ref
      labels: {zh: 评估准则引用, en: Evaluation criterion reference, ja: 評価基準参照}
      definitions: {zh: 指向解释此数值与质量判断关系的 Evaluation Criterion 的引用。, en: Reference to the Evaluation Criterion that interprets how this number relates to a quality judgment., ja: この数値が品質判断にどう関係するかを解釈する Evaluation Criterion への参照。}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: EvaluationCriterion:interactive-latency
      allowed_values: []
      source_claims: [claim-metric-design]
    - id: evidence_ref
      labels: {zh: 证据引用, en: Evidence reference, ja: 証拠参照}
      definitions: {zh: 指向可审计输入证据的引用，例如受保留策略约束的 OTLP OpenTelemetry Metric、评估产物或样本集；引用不改变证据所属域。, en: "Reference to auditable input evidence, such as an OTLP OpenTelemetry Metric retained under its policy, an evaluation artifact, or a sample set; the reference does not change the evidence’s owning domain.", ja: 保持方針下の OTLP OpenTelemetry Metric、評価成果物、又はサンプル集合など、監査可能な入力証拠への参照。参照しても証拠の所属領域は変わらない。}
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: otel-metric:http.server.request.duration:run-104
      allowed_values: []
      source_claims: [claim-metric-otel, claim-metric-design]
  constraints:
    - id: evaluation-metric-is-criterion-bound
      severity: error
      expression_language: plain
      expression: criterion_ref must resolve to an EvaluationCriterion that defines how this metric’s unit, aggregation, and value support or contradict a quality judgment.
      explanation: {zh: 没有解释准则的数值仍是遥测或业务测量，不应登记为反馈评估度量。, en: A number with no interpreting criterion remains telemetry or a business measurement and must not be registered as a feedback evaluation metric., ja: 解釈する基準のない数値はテレメトリ又は業務測定のままであり、フィードバック評価メトリックとして登録してはならない。}
      source_claims: [claim-metric-design]
    - id: evaluation-metric-retains-measurement-semantics
      severity: error
      expression_language: plain
      expression: unit and aggregation must be present and compatible with the cited evidence; a bare value is invalid.
      explanation: {zh: 同一个数字在毫秒、美元和比例下含义不同，且聚合不同会改变结论。, en: "The same number means different things in milliseconds, dollars, and proportions, and different aggregations can change the conclusion.", ja: 同じ数値でもミリ秒、ドル、比率では意味が異なり、集約の違いで結論も変わり得る。}
      source_claims: [claim-metric-otel, claim-metric-design]
    - id: evaluation-metric-is-not-raw-telemetry
      severity: error
      expression_language: plain
      expression: evidence_ref may cite runtime telemetry, but an OTLP OpenTelemetry Metric, Trace, Span, Log Record, or diagnostic event must not itself be asserted as this EvaluationMetric without the declared criterion interpretation.
      explanation: {zh: 引用遥测证据不等于把遥测对象改名为反馈。, en: Citing telemetry evidence does not rename the telemetry object as feedback., ja: テレメトリ証拠を参照しても、そのテレメトリ対象をフィードバックに改名することにはならない。}
      source_claims: [claim-metric-otel, claim-metric-design]
  required_relations:
    - id: evaluation-metric-is-interpreted-by-criterion
      direction: outgoing
      predicate: is_interpreted_by
      target_concept_id: EvaluationCriterion
      cardinality: {min: 1, max: 1}
      explanations: {zh: 每个反馈平面的度量必须恰由一个准则解释；多种判断应生成多个分别可解释的度量或 Verdict。, en: Each feedback-plane metric must be interpreted by exactly one criterion; multiple judgments should produce separately interpretable metrics or Verdicts., ja: フィードバック平面の各メトリックはちょうど一つの基準で解釈されなければならない。複数の判断は個別に解釈可能な複数のメトリック又は Verdict を生成する。}
      source_claims: [claim-metric-design]
examples:
  - id: evaluation-metric-positive-p95-latency

    labels: {zh: RAGAS faithfulness 评估度量, en: RAGAS faithfulness evaluation metric, ja: RAGAS faithfulness 評価メトリック}

    descriptions: {zh: "RAGAS from ragas.metrics import faithfulness, context_precision, answer_relevancy; evaluate(dataset, metrics=[...]); EvaluationMetric maps RAG quality EvaluationMetric/Score/Run.", en: "RAGAS faithfulness/context_precision/answer_relevancy; evaluate(dataset, metrics=[...]); EvaluationMetric maps RAG quality EvaluationMetric/Score/Run.", ja: "RAGAS faithfulness/context_precision; EvaluationMetric RAG metric."}
    field_values: {metric_id: ragas-faithfulness, value: 0.892, unit: '1', aggregation: mean, criterion_ref: 'EvaluationCriterion:ragas-faithfulness', evidence_ref: 'dataset:ragas-eval-30rows'}
    related_node_ids: [EvaluationMetric, EvaluationCriterion, EvaluationRun]
    related_relation_ids: [evaluation-metric-is-interpreted-by-criterion]

    source_claims: [claim-metric-otel, claim-metric-design]
  - id: evaluation-metric-counterexample-unbound-dashboard

    labels: {zh: 无准则的生产仪表盘数值, en: Production dashboard number without a criterion, ja: 基準のない本番ダッシュボード数値}

    descriptions: {zh: "JSON without task/scores cannot serve as Braintrust-style EvaluationMetric.", en: "JSON without task/scores cannot serve as Braintrust-style EvaluationMetric.", ja: "Missing task/scores rejects Braintrust-style EvaluationMetric."}
    field_values: {metric_id: null, value: 0.61, unit: null, aggregation: null, criterion_ref: null, evidence_ref: null}
    related_node_ids: [EvaluationMetric]
    related_relation_ids: []

    source_claims: [claim-metric-otel, claim-metric-design]
  - id: evaluation-metric-boundary-score-versus-metric

    labels: {zh: 度量与量表评分的边界, en: Boundary between metric and scale score, ja: メトリックと尺度スコアの境界}

    descriptions: {zh: "latency is EvaluationCostMetric; accuracy is Score; EvaluationMetric must state metric_kind.", en: "latency is EvaluationCostMetric; accuracy is Score; EvaluationMetric must state metric_kind.", ja: "Latency cost; accuracy Score."}
    field_values: {metric_id: citation-coverage, value: 0.94, unit: '1', aggregation: mean, criterion_ref: 'EvaluationCriterion:citation-completeness', evidence_ref: 'artifact:citation-audit-104'}
    related_node_ids: [EvaluationMetric, Score, Verdict, EvaluationCriterion]
    related_relation_ids: [evaluation-metric-is-interpreted-by-criterion]

    source_claims: [claim-metric-design]
  - id: evaluation-metric-instance-citation-coverage

    labels: {zh: RAGAS context_precision 具体度量, en: Concrete RAGAS context_precision metric, ja: RAGAS context_precision 具体メトリック}

    descriptions: {zh: "Braintrust instance: Factuality=0.92->EvaluationMetric Score scorer=Factuality.", en: "Braintrust instance: Factuality=0.92->EvaluationMetric Score scorer=Factuality.", ja: "Braintrust instance maps to EvaluationMetric Score."}
    field_values: {metric_id: ragas-context-precision, value: 0.817, unit: '1', aggregation: mean, criterion_ref: 'EvaluationCriterion:ragas-context-precision', evidence_ref: 'dataset:ragas-eval-30rows'}
    related_node_ids: [EvaluationMetric, EvaluationCriterion, EvaluationRun]
    related_relation_ids: [evaluation-metric-is-interpreted-by-criterion]

    source_claims: [claim-metric-design]
parent_relation: null
relations:
  - id: EvaluationMetric-isInterpretedBy-EvaluationCriterion
    predicate: is_interpreted_by
    target: concept:EvaluationCriterion
    direction: source-to-target
    relation_kind: semantic
    labels: {zh: 评估度量由评估准则解释, en: evaluation metric is interpreted by evaluation criterion, ja: 評価メトリックが評価基準により解釈される}
    definitions: {zh: 一个 Evaluation Criterion 规定如何把该 Evaluation Metric 的数值、单位和聚合解释为支持、反驳或无法判定的质量证据。, en: "An Evaluation Criterion states how the Evaluation Metric’s value, unit, and aggregation are interpreted as supporting, contradicting, or insufficient quality evidence.", ja: Evaluation Criterion は、Evaluation Metric の値、単位、及び集約を、品質を支持する、反証する、又は不十分な証拠としてどう解釈するかを定める。}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: interprets, labels: {zh: 准则解释评估度量, en: criterion interprets evaluation metric, ja: 基準が評価メトリックを解釈する}}
    conditions:
      - id: metric-criterion-unit-condition
        severity: error
        expression_language: plain
        expression: Assert only when the criterion documents a rule compatible with the EvaluationMetric's unit and aggregation.
        explanations: {zh: 例如“低于 800ms”不能解释美元或无单位比例。, en: "For example, “below 800ms” cannot interpret dollars or an unqualified proportion.", ja: 例えば「800ms 未満」はドル又は無修飾の比率を解釈できない。}
        source_claims: [claim-metric-design]
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-metric-design]
    distinct_fact_rationale: {zh: 该关系增加质量解释，而不是仅复制原始观测值。, en: This relation adds quality interpretation rather than merely copying an observed value., ja: この関係は観測値を単に複製するのでなく、品質解釈を加える。}
    layout_role: cross-link
sources:
  - id: otel-metrics-data-model
    title: OpenTelemetry Metrics Data Model
    url: https://opentelemetry.io/docs/specs/otel/metrics/data-model/
    source_type: standard
    relevance: Defines metric streams, data points, units, and aggregation semantics used for runtime evidence.
  - id: otlp-protocol
    title: OpenTelemetry Protocol specification
    url: https://opentelemetry.io/docs/specs/otlp/
    source_type: standard
    relevance: Defines the protocol context for transporting runtime metric evidence.
  - id: openai-graders-api
    title: OpenAI Graders API
    url: https://developers.openai.com/api/reference/resources/graders
    source_type: official-doc
    relevance: Documents the TextSimilarityGrader evaluation_metric wire field and its allowed similarity calculations.
  - id: evaluation-metric-design
    title: Evaluation metric design inference
    url: https://opentelemetry.io/docs/specs/otel/metrics/data-model/
    source_type: design-inference
    relevance: Separates criterion-interpreted EvaluationMetric records from raw OpenTelemetry Metric objects using the cited data-model boundary.
source_claims:
  - id: claim-metric-otel
    source: otel-metrics-data-model
    supports: OpenTelemetry defines an OpenTelemetry Metric as a stream of data points with metric names, units, and aggregation-related data-model semantics.
    locator: "Metrics Data Model: metric streams, points, units, and aggregation"
    evidence_kind: normative
    confidence: high
  - id: claim-metric-openai-grader
    source: openai-graders-api
    supports: The OpenAI TextSimilarityGrader wire object uses an evaluation_metric field to select a similarity calculation such as cosine, fuzzy_match, BLEU, or ROUGE; that field is not a Moonweave EvaluationMetric record.
    locator: "Graders API: TextSimilarityGrader.evaluation_metric"
    evidence_kind: official
    confidence: high
  - id: claim-metric-design
    source: evaluation-metric-design
    supports: An EvaluationMetric enters the feedback evaluation plane only through explicit criterion interpretation; a raw OpenTelemetry Metric remains outside that plane.
    locator: "Local criterion-bound metric boundary"
    evidence_kind: design-inference
    confidence: high


