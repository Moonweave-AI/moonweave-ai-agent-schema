schema: moonweave.ai/ontology-node/v1
id: EvaluationMetric
kind: concept
labels:
  zh: 评估度量
  en: Evaluation Metric
  ja: 評価メトリック
semantics:
  short_definition:
    zh: 与评估准则显式绑定的、有单位和聚合语义的定量测量。
    en: A quantitative measurement with unit and aggregation semantics explicitly bound to an evaluation criterion.
    ja: 評価基準に明示的に結び付けられた、単位及び集約意味論を持つ定量測定。
  definition:
    zh: EvaluationMetric 是一个已命名的定量测量及其单位、聚合或计算语义和证据范围。它只有在 EvaluationCriterion 明确解释该数值时才属于反馈评估平面。常见映射包括 accuracy、F1、latency（ms）、cost（USD）与 DeepEval/RAGAS 比例指标。EvaluationMetric 不是 Score（量规数值等级）、Verdict（类别判断）、HumanFeedback，也不是原始 OpenTelemetry Metric、Trace 或 Log Record；后者最多作为本度量的证据。
    en: "EvaluationMetric is a named quantitative measurement together with its unit, aggregation or calculation semantics, and evidence scope. It belongs to the feedback evaluation plane only when an EvaluationCriterion explicitly interprets the number. Common mappings include accuracy, F1, latency (ms), cost (USD), and DeepEval/RAGAS proportion metrics. EvaluationMetric is not a Score (rubric numeric level), Verdict (categorical judgment), HumanFeedback, or raw OpenTelemetry Metric, Trace, or Log Record; those may at most serve as evidence for this measurement."
    ja: EvaluationMetric は、名称を持つ定量測定と、その単位、集約又は計算意味論、証拠範囲から成ります。EvaluationCriterion が数値を明示的に解釈する場合にのみフィードバック評価平面に属します。accuracy、F1、latency（ms）、cost（USD）、DeepEval/RAGAS 比率指標が一般的な写像です。EvaluationMetric は Score（ルーブリック数値段階）、Verdict（カテゴリ判断）、HumanFeedback、生 OpenTelemetry Metric、Trace、Log Record ではありません。後者はせいぜい本測定の証拠となり得ます。
  why_needed:
    zh: 数字本身不说明“好不好”。保留单位、聚合和准则引用，才能知道 250 是毫秒、美元还是比例，也才能检验它是否支持某项质量结论，而不会把生产遥测误写成反馈。
    en: "A number alone does not say whether something is good. Retaining unit, aggregation, and criterion reference establishes whether 250 means milliseconds, dollars, or a proportion and whether it supports a quality conclusion, without relabeling production telemetry as feedback."
    ja: 数値だけでは良し悪しを示しません。単位、集約、基準参照を残すことで、250 がミリ秒、ドル、比率のいずれか、品質結論を支えるかを明確にし、本番テレメトリをフィードバックと誤記しません。
  includes:
    - zh: 与 EvaluationCriterion 绑定的 accuracy、F1、latency 百分位、拒答率或 DeepEval/RAGAS 比例测量。
      en: "Accuracy, F1, latency percentile, refusal rate, or DeepEval/RAGAS proportion measurements bound to an EvaluationCriterion."
      ja: EvaluationCriterion に結び付けられた accuracy、F1、latency 百分位、拒否率、DeepEval/RAGAS 比率測定。
    - zh: 来自保留 OTLP Histogram 或 eval run 汇总的计算值，证据本身仍是运行时或评估运行时对象。
      en: "Calculated values from retained OTLP Histogram or eval-run aggregates, while evidence itself remains runtime or evaluation-runtime objects."
      ja: 保持された OTLP Histogram 又は eval run 集計からの計算値。証拠自体は実行時又は評価実行時オブジェクトのままです。
  excludes:
    - zh: 没有 EvaluationCriterion 的裸露生产仪表盘或 OTLP 数据流。
      en: A bare production dashboard or OTLP data stream with no EvaluationCriterion.
      ja: EvaluationCriterion を持たない生産ダッシュボード又は OTLP データ・ストリーム。
    - zh: 量表上的 Score、pass/fail Verdict、自然语言人类评论。
      en: A scale Score, pass/fail Verdict, or natural-language human comment.
      ja: 尺度上の Score、pass/fail Verdict、自然言語の人間コメント。
  semantic_kind: information
  aliases: [evaluation metric, quality metric, 度量]
engineering:
  explanation:
    zh: 新集成应以 OpenAI eval run 结果计数（accuracy/pass_rate）、DeepEval/RAGAS metric（faithfulness、context_precision）、Braintrust experiment 聚合、OTLP http.server.request.duration p95 为可映射 API 形状，再用 Moonweave 本地 EvaluationMetric 记录 metric_id、value、unit、aggregation、criterion_ref、evidence_ref。OpenAI TextSimilarityGrader 的 evaluation_metric 字段是 wire 配置，不是本地 EvaluationMetric 记录。
    en: "New integrations should treat OpenAI eval run result counts (accuracy/pass_rate), DeepEval/RAGAS metrics (faithfulness, context_precision), Braintrust experiment aggregates, and OTLP http.server.request.duration p95 as mappable API shapes, then persist Moonweave-local EvaluationMetric records with metric_id, value, unit, aggregation, criterion_ref, and evidence_ref. OpenAI TextSimilarityGrader evaluation_metric is a wire field, not a local EvaluationMetric record."
    ja: 新しい統合では OpenAI eval run 結果集計（accuracy/pass_rate）、DeepEval/RAGAS metric（faithfulness、context_precision）、Braintrust experiment 集計、OTLP http.server.request.duration p95 を写像可能 API 形状として扱い、Moonweave ローカル EvaluationMetric で metric_id、value、unit、aggregation、criterion_ref、evidence_ref を保存します。OpenAI TextSimilarityGrader の evaluation_metric フィールドは wire 設定であり、ローカル EvaluationMetric 記録ではありません。
  typical_input:
    - description: OTLP histogram evidence for latency percentile calculation.
      format: |
        {
          "name": "http.server.request.duration",
          "unit": "s",
          "histogram": {"dataPoints": [{"count": "500", "sum": 218.7}]}
        }
      source_claims: [claim-metric-otel]
    - description: DeepEval/RAGAS batch metric aggregate.
      format: |
        {"metric_id": "ragas-faithfulness", "value": 0.892, "unit": "1", "aggregation": "mean", "dataset_ref": "dataset:ragas-eval-30rows"}
      source_claims: [claim-metric-deepeval, claim-metric-design]
  typical_output:
    - description: Criterion-bound local evaluation metric.
      format: |
        {
          "metric_id": "accuracy-ticket-category",
          "value": 0.94,
          "unit": "1",
          "aggregation": "mean",
          "criterion_ref": "EvaluationCriterion:category-match",
          "evidence_ref": "EvaluationRun:nightly-104"
        }
      source_claims: [claim-metric-design]
  reference_implementations:
    - name: OpenTelemetry Metrics Data Model
      url: https://opentelemetry.io/docs/specs/otel/metrics/data-model/
      description: Metric streams, data points, units, and aggregation semantics.
    - name: DeepEval
      url: https://docs.confident-ai.com
      description: 14+ LLM metrics including faithfulness and answer relevancy.
    - name: OpenAI Agent Evals
      url: https://platform.openai.com/docs/guides/evals
      description: Eval run result counts for accuracy-style aggregates.
structure:
  identity_keys: [metric_id, criterion_ref, evidence_ref]
  fields:
    - id: metric_id
      labels: {zh: 评估度量标识, en: Evaluation metric identifier, ja: 評価メトリック識別子}
      definitions:
        zh: 标识度量名称和计算口径的稳定值，如 accuracy、latency-p95、ragas-faithfulness。
        en: "Stable value identifying the metric name and calculation contract, such as accuracy, latency-p95, or ragas-faithfulness."
        ja: accuracy、latency-p95、ragas-faithfulness など、メトリック名と計算契約を識別する安定値。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: accuracy-ticket-category
      allowed_values: []
      source_claims: [claim-metric-design]
    - id: value
      labels: {zh: 测量值, en: Measured value, ja: 測定値}
      definitions:
        zh: 按声明的聚合或计算方法得到的定量值；不是量表评分。
        en: Quantitative value obtained by the declared aggregation or calculation; it is not a scale score.
        ja: 宣言された集約又は計算で得られた定量値であり、尺度スコアではない。
      datatype: number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 0.94
      allowed_values: []
      source_claims: [claim-metric-design]
    - id: unit
      labels: {zh: 单位, en: Unit, ja: 単位}
      definitions:
        zh: 解释测量值尺度的单位；比例指标用 unit=1，延迟用 ms，成本用 ISO 4217 货币代码（EvaluationCostMetric 子类）。
        en: "Unit interpreting the measurement scale; proportions use unit=1, latency uses ms, cost uses ISO 4217 currency codes (EvaluationCostMetric subtype)."
        ja: 測定値尺度を解釈する単位。比率は unit=1、レイテンシは ms、コストは ISO 4217 通貨コード（EvaluationCostMetric 下位型）。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^.{1,32}$'
      example_value: '1'
      allowed_values: []
      source_claims: [claim-metric-otel, claim-metric-design]
    - id: aggregation
      labels: {zh: 聚合或计算方法, en: Aggregation or calculation, ja: 集約又は計算方法}
      definitions:
        zh: 说明值如何由证据产生，例如 mean、percentile_95、fixed_function；不能省略。
        en: "States how the value was produced from evidence, such as mean, percentile_95, or fixed_function; it cannot be omitted."
        ja: mean、percentile_95、fixed_function など、値を証拠から作った方法を示す。省略してはなりません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9_:-]{1,63}$'
      example_value: mean
      allowed_values: [sum, mean, min, max, percentile_50, percentile_95, percentile_99, fixed_function]
      source_claims: [claim-metric-otel, claim-metric-design]
    - id: criterion_ref
      labels: {zh: 评估准则引用, en: Evaluation criterion reference, ja: 評価基準参照}
      definitions:
        zh: 指向解释此数值与质量判断关系的 EvaluationCriterion 的引用。
        en: Reference to the EvaluationCriterion that interprets how this number relates to a quality judgment.
        ja: この数値が品質判断にどう関係するかを解釈する EvaluationCriterion への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: EvaluationCriterion:category-match
      allowed_values: []
      source_claims: [claim-metric-design]
    - id: evidence_ref
      labels: {zh: 证据引用, en: Evidence reference, ja: 証拠参照}
      definitions:
        zh: 指向可审计输入证据的引用，如 OTLP Metric、EvaluationRun 汇总或 DeepEval dataset 批次。
        en: "Reference to auditable input evidence such as OTLP Metric, EvaluationRun aggregate, or DeepEval dataset batch."
        ja: OTLP Metric、EvaluationRun 集計、DeepEval dataset バッチなど監査可能な入力証拠への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: EvaluationRun:nightly-104
      allowed_values: []
      source_claims: [claim-metric-otel, claim-metric-design]
  constraints:
    - id: evaluation-metric-is-criterion-bound
      severity: error
      expression_language: plain
      expression: criterion_ref must resolve to an EvaluationCriterion that defines how this metric's unit, aggregation, and value support or contradict a quality judgment.
      explanation:
        zh: 没有解释准则的数值仍是遥测或业务测量，不应登记为反馈评估度量。
        en: A number with no interpreting criterion remains telemetry or a business measurement and must not be registered as a feedback evaluation metric.
        ja: 解釈する基準のない数値はテレメトリ又は業務測定のままであり、フィードバック評価メトリックとして登録してはなりません。
      source_claims: [claim-metric-design]
    - id: evaluation-metric-retains-measurement-semantics
      severity: error
      expression_language: plain
      expression: unit and aggregation must be present and compatible with the cited evidence; a bare value is invalid.
      explanation:
        zh: 同一个数字在毫秒、美元和比例下含义不同，且聚合不同会改变结论。
        en: "The same number means different things in milliseconds, dollars, and proportions, and different aggregations can change the conclusion."
        ja: 同じ数値でもミリ秒、ドル、比率では意味が異なり、集約の違いで結論も変わり得ます。
      source_claims: [claim-metric-otel, claim-metric-design]
    - id: evaluation-metric-is-not-raw-telemetry
      severity: error
      expression_language: plain
      expression: evidence_ref may cite runtime telemetry, but an OTLP Metric, Trace, Span, or Log Record must not itself be asserted as this EvaluationMetric without criterion interpretation.
      explanation:
        zh: 引用遥测证据不等于把遥测对象改名为反馈。
        en: Citing telemetry evidence does not rename the telemetry object as feedback.
        ja: テレメトリ証拠を参照しても、そのテレメトリ対象をフィードバックに改名することにはなりません。
      source_claims: [claim-metric-otel, claim-metric-design]
  required_relations:
    - id: evaluation-metric-is-interpreted-by-criterion
      direction: outgoing
      predicate: is_interpreted_by
      target_concept_id: EvaluationCriterion
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每个反馈平面的度量必须恰由一个准则解释。
        en: Each feedback-plane metric must be interpreted by exactly one criterion.
        ja: フィードバック平面の各メトリックはちょうど一つの基準で解釈されなければなりません。
      source_claims: [claim-metric-design]
examples:
  - id: evaluation-metric-example-accuracy
    labels:
      zh: OpenAI eval run accuracy 度量
      en: OpenAI eval run accuracy metric
      ja: OpenAI eval run accuracy メトリック
    descriptions:
      zh: EvaluationRun nightly-104 汇总 100 条 ticket 分类样本；94 条 string_check 通过；EvaluationMetric accuracy-ticket-category value=0.94 unit=1 aggregation=mean 绑定 criterion_ref=category-match。
      en: EvaluationRun nightly-104 aggregates 100 ticket classification samples; 94 pass string_check; EvaluationMetric accuracy-ticket-category value=0.94 unit=1 aggregation=mean binds criterion_ref=category-match.
      ja: EvaluationRun nightly-104 が 100 件の ticket 分類サンプルを集計。94 件が string_check 合格。EvaluationMetric accuracy-ticket-category value=0.94 unit=1 aggregation=mean が criterion_ref=category-match に結び付きます。
    example_source:
      product: OpenAI Agent Evals
      url: https://platform.openai.com/docs/guides/evals
      version: eval run result counts
    field_values:
      metric_id: accuracy-ticket-category
      value: 0.94
      unit: '1'
      aggregation: mean
      criterion_ref: EvaluationCriterion:category-match
      evidence_ref: EvaluationRun:nightly-104
    related_node_ids: [EvaluationMetric, EvaluationCriterion, EvaluationRun, Verdict]
    related_relation_ids: [evaluation-metric-is-interpreted-by-criterion]
    source_claims: [claim-metric-openai-evals, claim-metric-design]
  - id: evaluation-metric-example-latency-p95
    labels:
      zh: OTLP latency p95 度量
      en: OTLP latency p95 metric
      ja: OTLP latency p95 メトリック
    descriptions:
      zh: OTLP http.server.request.duration histogram 在 5 分钟窗口计算 p95=612ms；EvaluationMetric latency-p95-ms 绑定 criterion_ref=interactive-latency（success_condition lte 1000ms）供 Verdict 引用。
      en: OTLP http.server.request.duration histogram computes p95=612ms over 5m window; EvaluationMetric latency-p95-ms binds criterion_ref=interactive-latency (success_condition lte 1000ms) for Verdict citation.
      ja: OTLP http.server.request.duration histogram が 5 分窓で p95=612ms を計算。EvaluationMetric latency-p95-ms が criterion_ref=interactive-latency（success_condition lte 1000ms）に結び付き Verdict 引用に供します。
    example_source:
      product: OpenTelemetry Metrics Data Model
      url: https://opentelemetry.io/docs/specs/otel/metrics/data-model/
      version: histogram aggregation
    field_values:
      metric_id: latency-p95-ms
      value: 612
      unit: ms
      aggregation: percentile_95
      criterion_ref: EvaluationCriterion:interactive-latency
      evidence_ref: otel-metric:http.server.request.duration:run-104
    related_node_ids: [EvaluationMetric, EvaluationCriterion, Verdict]
    related_relation_ids: [evaluation-metric-is-interpreted-by-criterion]
    source_claims: [claim-metric-otel, claim-metric-design]
  - id: evaluation-metric-example-deepeval-faithfulness
    labels:
      zh: DeepEval faithfulness 批次度量
      en: DeepEval faithfulness batch metric
      ja: DeepEval faithfulness バッチメトリック
    descriptions:
      zh: DeepEval evaluate() 对 30 行 RAG dataset 运行 FaithfulnessMetric；批次 mean=0.892；EvaluationMetric ragas-faithfulness 记录 unit=1 aggregation=mean 与 evidence_ref=dataset:ragas-eval-30rows。
      en: DeepEval evaluate() runs FaithfulnessMetric on 30-row RAG dataset; batch mean=0.892; EvaluationMetric ragas-faithfulness records unit=1 aggregation=mean and evidence_ref=dataset:ragas-eval-30rows.
      ja: DeepEval evaluate() が 30 行 RAG dataset で FaithfulnessMetric を実行。バッチ mean=0.892。EvaluationMetric ragas-faithfulness が unit=1 aggregation=mean と evidence_ref=dataset:ragas-eval-30rows を記録します。
    example_source:
      product: DeepEval
      url: https://docs.confident-ai.com
      version: FaithfulnessMetric batch evaluation
    field_values:
      metric_id: ragas-faithfulness
      value: 0.892
      unit: '1'
      aggregation: mean
      criterion_ref: EvaluationCriterion:rag-faithfulness
      evidence_ref: dataset:ragas-eval-30rows
    related_node_ids: [EvaluationMetric, EvaluationCriterion, Score]
    related_relation_ids: [evaluation-metric-is-interpreted-by-criterion]
    source_claims: [claim-metric-deepeval, claim-metric-design]
  - id: evaluation-metric-counterexample-unbound-dashboard
    labels:
      zh: 无准则的生产仪表盘数值
      en: Production dashboard number without criterion
      ja: 基準のない本番ダッシュボード数値
    descriptions:
      zh: Grafana 面板显示 0.61 但无 criterion_ref 与 aggregation 声明；不能登记为 EvaluationMetric，因为无法解释该数字如何支持质量判断。
      en: Grafana panel shows 0.61 without criterion_ref and aggregation declaration; cannot register as EvaluationMetric because the number cannot be interpreted for quality judgment.
      ja: Grafana パネルが 0.61 を表示するが criterion_ref と aggregation 宣言がない。品質判断にどう関係するか解釈できないため EvaluationMetric として登録できません。
    example_source:
      product: Moonweave evaluation boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: criterion-bound metric requirement
    field_values:
      metric_id: null
      value: 0.61
      unit: null
      aggregation: null
      criterion_ref: null
      evidence_ref: null
    related_node_ids: [EvaluationMetric]
    related_relation_ids: []
    source_claims: [claim-metric-design]
  - id: evaluation-metric-boundary-score-versus-metric
    labels:
      zh: 度量与量表评分的边界
      en: Boundary between metric and scale score
      ja: メトリックと尺度スコアの境界
    descriptions:
      zh: citation-coverage value=0.94 unit=1 是 EvaluationMetric；helpfulness value=4 在 1-5 Rubric 上是 Score。不能把 F1 比例直接标为 helpfulness 分数。
      en: citation-coverage value=0.94 unit=1 is EvaluationMetric; helpfulness value=4 on 1-5 Rubric is Score. An F1 proportion must not be labeled as a helpfulness score.
      ja: citation-coverage value=0.94 unit=1 は EvaluationMetric。1-5 Rubric 上の helpfulness value=4 は Score。F1 比率を helpfulness スコアとしてラベル付けしてはなりません。
    example_source:
      product: Moonweave evaluation boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: metric vs score boundary
    field_values:
      metric_id: citation-coverage
      value: 0.94
      unit: '1'
      aggregation: mean
      criterion_ref: EvaluationCriterion:citation-completeness
      evidence_ref: artifact:citation-audit-104
    related_node_ids: [EvaluationMetric, Score, Verdict]
    related_relation_ids: [evaluation-metric-is-interpreted-by-criterion]
    source_claims: [claim-metric-design]
parent_relation: null
relations:
  - id: EvaluationMetric-isInterpretedBy-EvaluationCriterion
    predicate: is_interpreted_by
    target: concept:EvaluationCriterion
    direction: source-to-target
    relation_kind: semantic
    labels: {zh: 评估度量由评估准则解释, en: evaluation metric is interpreted by evaluation criterion, ja: 評価メトリックが評価基準により解釈される}
    definitions:
      zh: EvaluationCriterion 规定如何把 EvaluationMetric 的数值、单位和聚合解释为质量证据。
      en: "An EvaluationCriterion states how the EvaluationMetric's value, unit, and aggregation are interpreted as quality evidence."
      ja: EvaluationCriterion は、EvaluationMetric の値、単位、集約を品質証拠としてどう解釈するかを定めます。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: interprets, labels: {zh: 准则解释评估度量, en: criterion interprets evaluation metric, ja: 基準が評価メトリックを解釈する}}
    conditions:
      - id: metric-criterion-unit-condition
        severity: error
        expression_language: plain
        expression: Assert only when the criterion documents a rule compatible with the EvaluationMetric's unit and aggregation.
        explanations:
          zh: 例如“低于 800ms”不能解释美元或无单位比例。
          en: "For example, below 800ms cannot interpret dollars or an unqualified proportion."
          ja: 例えば「800ms 未満」はドル又は無修飾の比率を解釈できません。
        source_claims: [claim-metric-design]
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-metric-design]
    distinct_fact_rationale:
      zh: 该关系增加质量解释，而不是仅复制原始观测值。
      en: This relation adds quality interpretation rather than merely copying an observed value.
      ja: この関係は観測値を単に複製するのでなく、品質解釈を加えます。
    layout_role: cross-link
sources:
  - id: otel-metrics-data-model
    title: OpenTelemetry Metrics Data Model
    url: https://opentelemetry.io/docs/specs/otel/metrics/data-model/
    source_type: standard
    relevance: Metric streams, data points, units, and aggregation semantics.
  - id: deepeval-metrics
    title: DeepEval Documentation
    url: https://docs.confident-ai.com
    source_type: official-doc
    relevance: LLMTestCase metrics producing proportion-style evaluation measurements.
  - id: openai-evals-metrics
    title: OpenAI Agent Evals
    url: https://platform.openai.com/docs/guides/evals
    source_type: official-doc
    relevance: Eval run result counts for accuracy-style aggregates.
  - id: evaluation-metric-design
    title: Moonweave evaluation metric design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Separates criterion-interpreted EvaluationMetric from raw OpenTelemetry objects.
source_claims:
  - id: claim-metric-otel
    source: otel-metrics-data-model
    supports: OpenTelemetry defines Metric streams with names, units, and aggregation-related semantics.
    locator: Metrics Data Model — metric streams and data points
    evidence_kind: normative
    confidence: high
  - id: claim-metric-deepeval
    source: deepeval-metrics
    supports: DeepEval evaluates LLMTestCase batches with named metrics producing aggregate proportion measurements.
    locator: LLMTestCase; Metrics catalog
    evidence_kind: official
    confidence: high
