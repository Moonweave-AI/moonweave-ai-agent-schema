schema: moonweave.ai/ontology-node/v1
id: Score
kind: concept
labels:
  zh: 评分
  en: Score
  ja: スコア
semantics:
  short_definition:
    zh: 按已声明量表或量规对一个评估准则赋予的数值等级。
    en: A numeric level assigned to one evaluation criterion under a declared scale or rubric.
    ja: 宣言された尺度又はルーブリックの下で一つの評価基準に与えられる数値レベル。
  definition:
    zh: Score 是评估者或可复现评分器依据一个 EvaluationCriterion 和 Rubric 对候选或证据赋予的离散或连续数值。它必须保留量表、准则和证据引用。Score 不是 EvaluationMetric（带单位和聚合的测量值，如 accuracy、latency、F1）、不是 Verdict（pass/fail 类别结论）、也不是 HumanFeedback 或原始日志。OpenAI score_model grader、DeepEval metric 输出、LangSmith feedback score 均可映射为本地 Score 记录形状。
    en: "A Score is a discrete or continuous number assigned by an assessor or reproducible grader to a candidate or evidence under one EvaluationCriterion and Rubric. It must retain references to the scale, criterion, and evidence. A Score is not an EvaluationMetric (a measured value with unit and aggregation such as accuracy, latency, or F1), not a Verdict (a categorical pass/fail conclusion), and not HumanFeedback or a raw log. OpenAI score_model grader output, DeepEval metric results, and LangSmith feedback scores are mappable local Score record shapes."
    ja: Score は、評価者又は再現可能な採点器が一つの EvaluationCriterion と Rubric の下で候補又は証拠に与える離散又は連続の数値です。尺度、基準、証拠への参照を保持しなければなりません。Score は EvaluationMetric（accuracy、latency、F1 など単位と集約を持つ測定値）、Verdict（pass/fail カテゴリ結論）、HumanFeedback、生ログではありません。OpenAI score_model grader 出力、DeepEval metric 結果、LangSmith feedback score はローカル Score 記録形状に写像できます。
  why_needed:
    zh: “4”或“0.92”只有在知道使用哪套等级描述和哪条准则时才可解释。独立建模评分可以让团队保留评分依据，并避免把测量值或最终通过判断误写为同一件事。
    en: "4 or 0.92 is interpretable only when the level descriptions and criterion are known. Modeling a score independently retains its grading basis and prevents a measurement value or final pass judgment from being written as the same thing."
    ja: 「4」又は「0.92」は、どの段階説明と基準を用いたかが分かる場合にのみ解釈できます。スコアを独立にモデル化することで採点根拠を保持し、測定値又は最終合格判断を同一物として記述することを防ぎます。
  includes:
    - zh: 评分标识、数值、量表或 Rubric 引用、适用准则、证据引用和可选理由。
      en: Score identifier, value, scale or Rubric reference, applied criterion, evidence reference, and optional rationale.
      ja: スコア識別子、値、尺度又は Rubric 参照、適用基準、証拠参照、任意の理由。
    - zh: 人工评分、OpenAI score_model grader、DeepEval metric 或 LangSmith feedback score 的结构化输出。
      en: Structured output from a human assessor, OpenAI score_model grader, DeepEval metric, or LangSmith feedback score.
      ja: 人間評価者、OpenAI score_model grader、DeepEval metric、LangSmith feedback score からの構造化出力。
  excludes:
    - zh: 有单位和聚合语义的 accuracy、latency、cost 或 F1 测量（EvaluationMetric）。
      en: Accuracy, latency, cost, or F1 measurements with unit and aggregation semantics (EvaluationMetric).
      ja: 単位及び集約意味論を持つ accuracy、latency、cost、F1 測定（EvaluationMetric）。
    - zh: 通过、失败、需要修订等 Verdict，以及未结构化的人类评论。
      en: Pass, fail, or revise Verdicts and unstructured human comments.
      ja: pass、fail、revise などの Verdict、非構造化の人間コメント。
  semantic_kind: information
  aliases: [rating, rubric score, 评级]
engineering:
  explanation:
    zh: 新集成应以 OpenAI Graders POST /v1/fine_tuning/alpha/graders/run（score_model、string_check 数值输出）、DeepEval FaithfulnessMetric/AnswerRelevancyMetric、LangSmith feedback score（POST .../feedback）、Braintrust experiment scores 为可映射 API 形状，再用 Moonweave 本地 Score 记录 rubric_ref、criterion_ref、evidence_ref 与 value。不能把 OTLP 延迟或 accuracy 比例直接标为 Score。
    en: "New integrations should treat OpenAI Graders POST /v1/fine_tuning/alpha/graders/run (score_model, string_check numeric output), DeepEval FaithfulnessMetric/AnswerRelevancyMetric, LangSmith feedback scores (POST .../feedback), and Braintrust experiment scores as mappable API shapes, then persist Moonweave-local Score records with rubric_ref, criterion_ref, evidence_ref, and value. OTLP latency or accuracy proportions must not be labeled as Score directly."
    ja: 新しい統合では OpenAI Graders POST /v1/fine_tuning/alpha/graders/run（score_model、string_check 数値出力）、DeepEval FaithfulnessMetric/AnswerRelevancyMetric、LangSmith feedback score（POST .../feedback）、Braintrust experiment scores を写像可能 API 形状として扱い、Moonweave ローカル Score で rubric_ref、criterion_ref、evidence_ref、value を保存します。OTLP レイテンシや accuracy 比率を直接 Score とラベル付けしてはなりません。
  typical_input:
    - description: OpenAI score_model grader-run request.
      format: |
        POST /v1/fine_tuning/alpha/graders/run
        {
          "grader": {
            "type": "score_model",
            "name": "support-helpfulness",
            "model": "gpt-4.1-mini",
            "range": [0, 5],
            "input": [{"role": "assistant", "content": "Check outlet and cable..."}]
          }
        }
      source_claims: [claim-score-graders-run]
    - description: DeepEval LLMTestCase with faithfulness metric producing a score.
      format: |
        from deepeval import evaluate
        from deepeval.metrics import FaithfulnessMetric
        from deepeval.test_case import LLMTestCase
        test_case = LLMTestCase(input="...", actual_output="...", retrieval_context=[...])
        evaluate([test_case], [FaithfulnessMetric()])
      source_claims: [claim-score-deepeval]
    - description: LangSmith feedback score attachment after human review.
      format: |
        POST .../feedback
        {"run_id": "run-support-104", "key": "correctness", "score": 1.0}
      source_claims: [claim-score-langsmith]
  typical_output:
    - description: Moonweave-local Score record from an independent grader.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "score_id": "score-104",
          "value": 4,
          "rubric_ref": "Rubric:helpfulness:v1",
          "criterion_ref": "EvaluationCriterion:support-helpfulness",
          "evidence_ref": "trace:ticket-104#response-output",
          "rationale": "Provides safe steps but omits warranty escalation."
        }
      source_claims: [claim-score-design]
  reference_implementations:
    - name: OpenAI Run grader API
      url: https://platform.openai.com/docs/guides/evals
      description: score_model and string_check graders with numeric output.
    - name: DeepEval
      url: https://docs.confident-ai.com
      description: LLMTestCase metrics including faithfulness and answer relevancy scores.
    - name: LangSmith
      url: https://docs.smith.langchain.com
      description: Feedback scores attached to runs after annotation.
structure:
  identity_keys: [score_id]
  fields:
    - id: score_id
      labels: {zh: 评分标识, en: Score identifier, ja: スコア識別子}
      definitions:
        zh: 唯一标识一个按特定量表和准则产生的评分记录。
        en: Uniquely identifies one score record produced under a particular scale and criterion.
        ja: 特定の尺度と基準の下で生成された一件のスコア記録を一意に識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: score-104
      allowed_values: []
      source_claims: [claim-score-design]
    - id: value
      labels: {zh: 评分值, en: Score value, ja: スコア値}
      definitions:
        zh: 在 rubric_ref 声明的等级或连续刻度上的数值，不含单位或测量聚合语义。
        en: Numeric value on the ordinal or continuous scale declared by rubric_ref, without unit or measurement-aggregation semantics.
        ja: rubric_ref が宣言する順序又は連続尺度上の数値であり、単位又は測定集約意味論を持たない。
      datatype: number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 4
      allowed_values: []
      source_claims: [claim-score-design]
    - id: rubric_ref
      labels: {zh: 量规引用, en: Rubric reference, ja: ルーブリック参照}
      definitions:
        zh: 指向定义每个可接受分值含义及其版本的 Rubric 的引用。
        en: Reference to the Rubric and version that define what each acceptable score value means.
        ja: 各許容スコア値の意味と版を定義する Rubric への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Rubric:helpfulness:v1
      allowed_values: []
      source_claims: [claim-score-design]
    - id: criterion_ref
      labels: {zh: 评估准则引用, en: Evaluation criterion reference, ja: 評価基準参照}
      definitions:
        zh: 指向说明这次评分评估了哪一项质量要求的 EvaluationCriterion 的引用。
        en: Reference to the EvaluationCriterion that states which quality requirement this score assesses.
        ja: このスコアが評価する品質要件を定める EvaluationCriterion への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: EvaluationCriterion:support-helpfulness
      allowed_values: []
      source_claims: [claim-score-design]
    - id: evidence_ref
      labels: {zh: 评分证据引用, en: Scoring evidence reference, ja: 採点証拠参照}
      definitions:
        zh: 指向候选、样本、人工注释或其他被评分器实际检查的证据。
        en: Reference to the candidate, sample, human annotation, or other evidence actually inspected by the grader.
        ja: 採点器が実際に検査した候補、サンプル、人間注釈、他の証拠への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: artifact:answer-104
      allowed_values: []
      source_claims: [claim-score-design]
    - id: rationale
      labels: {zh: 评分理由, en: Scoring rationale, ja: 採点理由}
      definitions:
        zh: 可选的简短说明，指出证据为何满足或未满足所选等级；不是独立 HumanFeedback 记录。
        en: Optional brief explanation of why evidence met or did not meet the selected level; it is not an independent HumanFeedback record.
        ja: 証拠が選択された段階を満たした又は満たさなかった理由の任意の短い説明。独立した HumanFeedback 記録ではない。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: Includes safe steps but misses warranty escalation.
      allowed_values: []
      source_claims: [claim-score-design]
  constraints:
    - id: score-is-rubric-bounded
      severity: error
      expression_language: plain
      expression: value must be valid under the referenced Rubric version and rubric_ref must identify the scale used by this score.
      explanation:
        zh: 相同的数字在不同量规中可代表完全不同的等级，不能脱离量规保存。
        en: The same number can denote very different levels in different rubrics and cannot be stored without its rubric.
        ja: 同じ数値でも異なるルーブリックでは全く異なる段階を示し得るため、ルーブリックなしに保存できません。
      source_claims: [claim-score-design]
    - id: score-applies-one-criterion
      severity: error
      expression_language: plain
      expression: criterion_ref must resolve to one EvaluationCriterion and evidence_ref must be within that criterion's declared evidence scope.
      explanation:
        zh: 一条评分不能同时含糊地声称评价了多个质量维度。
        en: One score cannot ambiguously claim to assess multiple quality dimensions at once.
        ja: 一つのスコアが複数の品質次元を同時に曖昧に評価したと主張してはならない。
      source_claims: [claim-score-design]
    - id: score-is-not-metric-or-verdict
      severity: error
      expression_language: plain
      expression: A value with a physical unit or aggregation must be represented as EvaluationMetric, and a pass fail revise or inconclusive conclusion must be represented as Verdict.
      explanation:
        zh: 评分等级、测量值和类别结论需要保留不同事实边界。
        en: Grading levels, measured values, and categorical conclusions require distinct fact boundaries.
        ja: 採点段階、測定値、カテゴリ結論には異なる事実境界が必要です。
      source_claims: [claim-score-design]
  required_relations:
    - id: score-is-assigned-under-rubric
      direction: outgoing
      predicate: is_assigned_under
      target_concept_id: Rubric
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每个 Score 必须恰好使用一个版本化量规。
        en: Each Score must use exactly one versioned Rubric.
        ja: 各 Score はちょうど一つの版管理された Rubric を使用しなければなりません。
      source_claims: [claim-score-design]
    - id: score-applies-evaluation-criterion
      direction: outgoing
      predicate: applies
      target_concept_id: EvaluationCriterion
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每个 Score 必须说明它按哪一质量准则被赋值。
        en: Each Score must state the quality criterion under which it was assigned.
        ja: 各 Score は、どの品質基準の下で与えられたかを示さなければなりません。
      source_claims: [claim-score-design]
examples:
  - id: score-example-openai-score-model
    labels:
      zh: OpenAI score_model grader 评分
      en: OpenAI score_model grader score
      ja: OpenAI score_model grader スコア
    descriptions:
      zh: POST /v1/fine_tuning/alpha/graders/run 以 score_model grader support-helpfulness 对 monitor 故障回答评分；range=[0,5] 返回 value=4；Score score-104 保留 rubric_ref、criterion_ref 与 evidence_ref。
      en: POST /v1/fine_tuning/alpha/graders/run applies score_model grader support-helpfulness to a monitor-failure answer; range=[0,5] returns value=4; Score score-104 retains rubric_ref, criterion_ref, and evidence_ref.
      ja: POST /v1/fine_tuning/alpha/graders/run が score_model grader support-helpfulness で monitor 故障回答を採点。range=[0,5] が value=4 を返す。Score score-104 が rubric_ref、criterion_ref、evidence_ref を保持します。
    example_source:
      product: OpenAI Graders
      url: https://platform.openai.com/docs/guides/evals
      version: score_model grader
    field_values:
      score_id: score-104
      value: 4
      rubric_ref: Rubric:helpfulness:v1
      criterion_ref: EvaluationCriterion:support-helpfulness
      evidence_ref: trace:ticket-104#response-output
    related_node_ids: [Score, Rubric, EvaluationCriterion]
    related_relation_ids: [score-is-assigned-under-rubric, score-applies-evaluation-criterion]
    source_claims: [claim-score-graders-run, claim-score-design]
  - id: score-example-deepeval-faithfulness
    labels:
      zh: DeepEval faithfulness 评分
      en: DeepEval faithfulness score
      ja: DeepEval faithfulness スコア
    descriptions:
      zh: DeepEval LLMTestCase 对 refund 摘要用 FaithfulnessMetric 评估；metric 返回 0.92；Score deepeval-faith-104 绑定 criterion_ref=EvaluationCriterion:rag-faithfulness 与 evidence_ref=test_case:refund-104。
      en: DeepEval LLMTestCase evaluates a refund summary with FaithfulnessMetric; metric returns 0.92; Score deepeval-faith-104 binds criterion_ref=EvaluationCriterion:rag-faithfulness and evidence_ref=test_case:refund-104.
      ja: DeepEval LLMTestCase が refund 要約を FaithfulnessMetric で評価。metric が 0.92 を返す。Score deepeval-faith-104 が criterion_ref=EvaluationCriterion:rag-faithfulness と evidence_ref=test_case:refund-104 を結び付けます。
    example_source:
      product: DeepEval
      url: https://docs.confident-ai.com
      version: FaithfulnessMetric
    field_values:
      score_id: deepeval-faith-104
      value: 0.92
      rubric_ref: Rubric:faithfulness-unit-interval:v1
      criterion_ref: EvaluationCriterion:rag-faithfulness
      evidence_ref: test_case:refund-104
    related_node_ids: [Score, EvaluationCriterion, Rubric]
    related_relation_ids: [score-applies-evaluation-criterion]
    source_claims: [claim-score-deepeval, claim-score-design]
  - id: score-example-langsmith-feedback
    labels:
      zh: LangSmith 人工 feedback score
      en: LangSmith human feedback score
      ja: LangSmith 人間 feedback score
    descriptions:
      zh: LangSmith annotation queue 中标注员将 category 从 Other 修正为 Hardware 后提交 feedback score correctness=1.0；Score langsmith-correct-104 引用 rubric_ref 与 criterion_ref human-review。
      en: LangSmith annotator corrects category from Other to Hardware and submits feedback score correctness=1.0; Score langsmith-correct-104 cites rubric_ref and criterion_ref human-review.
      ja: LangSmith 注釈者が category を Other から Hardware に修正し feedback score correctness=1.0 を提出。Score langsmith-correct-104 が rubric_ref と criterion_ref human-review を引用します。
    example_source:
      product: LangSmith
      url: https://docs.smith.langchain.com
      version: feedback scores and annotation queues
    field_values:
      score_id: langsmith-correct-104
      value: 1.0
      rubric_ref: Rubric:binary-correctness:v1
      criterion_ref: EvaluationCriterion:human-review
      evidence_ref: run:support-104
    related_node_ids: [Score, EvaluationCriterion, Rubric]
    related_relation_ids: [score-is-assigned-under-rubric, score-applies-evaluation-criterion]
    source_claims: [claim-score-langsmith, claim-score-design]
  - id: score-counterexample-naked-number
    labels:
      zh: 未说明来源的数字 4
      en: Number four with no basis
      ja: 根拠のない数値 4
    descriptions:
      zh: 仪表盘仅显示 value=4 而无 rubric_ref、criterion_ref、evidence_ref；不能登记为 Score，因为同一数字在不同量规中含义不同。
      en: Dashboard shows value=4 without rubric_ref, criterion_ref, or evidence_ref; cannot register as Score because the same number means different levels in different rubrics.
      ja: ダッシュボードが value=4 のみ表示し rubric_ref、criterion_ref、evidence_ref がない。同じ数値が異なるルーブリックで異なる意味を持つため Score として登録できません。
    example_source:
      product: Moonweave evaluation boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: rubric-bound score requirement
    field_values:
      score_id: null
      value: 4
      rubric_ref: null
      criterion_ref: null
      evidence_ref: null
    related_node_ids: [Score]
    related_relation_ids: []
    source_claims: [claim-score-design]
  - id: score-boundary-metric-versus-score
    labels:
      zh: 测量值与评分等级的边界
      en: Boundary between measured value and score level
      ja: 測定値とスコア段階の境界
    descriptions:
      zh: p95 latency=612ms 是 EvaluationMetric（unit=ms, aggregation=percentile_95）；value=4 在 Rubric helpfulness:v1 上是 Score。不能把 wall-clock 延迟标为 helpfulness 分数。
      en: p95 latency=612ms is EvaluationMetric (unit=ms, aggregation=percentile_95); value=4 on Rubric helpfulness:v1 is Score. Wall-clock latency must not be labeled as a helpfulness score.
      ja: p95 latency=612ms は EvaluationMetric（unit=ms, aggregation=percentile_95）。Rubric helpfulness:v1 上の value=4 は Score。wall-clock レイテンシを helpfulness スコアとしてラベル付けしてはなりません。
    example_source:
      product: OpenTelemetry Metrics Data Model
      url: https://opentelemetry.io/docs/specs/otel/metrics/data-model/
      version: metric vs rubric score boundary
    field_values:
      score_id: score-104
      value: 4
      rubric_ref: Rubric:helpfulness:v1
      criterion_ref: EvaluationCriterion:support-helpfulness
      evidence_ref: artifact:answer-104
    related_node_ids: [Score, EvaluationMetric, Rubric]
    related_relation_ids: [score-is-assigned-under-rubric]
    source_claims: [claim-score-design]
parent_relation: null
relations:
  - id: Score-isAssignedUnder-Rubric
    predicate: is_assigned_under
    target: concept:Rubric
    direction: source-to-target
    relation_kind: semantic
    labels: {zh: 评分按量规赋值, en: score is assigned under rubric, ja: スコアがルーブリックの下で与えられる}
    definitions:
      zh: Rubric 给出可接受评分值的等级描述，Score 记录按该等级给出的数值。
      en: The Rubric gives level descriptions for acceptable score values and the Score records the value assigned under them.
      ja: Rubric は許容スコア値の段階説明を与え、Score はその下で与えられた値を記録します。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: defines_scale_for, labels: {zh: 量规定义评分刻度, en: rubric defines scale for score, ja: ルーブリックがスコアの尺度を定義する}}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-score-design]
    distinct_fact_rationale:
      zh: 该关系保留等级解释，不把 Rubric 误作一次评分。
      en: This relation preserves level interpretation without treating a Rubric as one score occurrence.
      ja: この関係は段階解釈を保持し、Rubric を一件のスコア発生として扱いません。
    layout_role: cross-link
  - id: Score-applies-EvaluationCriterion
    predicate: applies
    target: concept:EvaluationCriterion
    direction: source-to-target
    relation_kind: semantic
    labels: {zh: 评分应用评估准则, en: score applies evaluation criterion, ja: スコアが評価基準を適用する}
    definitions:
      zh: Score 记录它按哪一项质量要求解释所选等级。
      en: Score records which quality requirement interprets the selected level.
      ja: Score は、選択された段階をどの品質要件が解釈するかを記録します。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: governs, labels: {zh: 准则约束评分, en: criterion governs score, ja: 基準がスコアを規定する}}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-score-design]
    distinct_fact_rationale:
      zh: 该关系明确评分的质量维度，不把量规等级当作质量维度本身。
      en: This relation identifies the score's quality dimension without treating a rubric level as the quality dimension itself.
      ja: この関係はスコアの品質次元を特定し、ルーブリック段階を品質次元そのものとして扱いません。
    layout_role: cross-link
sources:
