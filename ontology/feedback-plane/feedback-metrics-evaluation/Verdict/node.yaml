schema: moonweave.ai/ontology-node/v1
id: Verdict
kind: concept
labels:
  zh: 评估判定
  en: Verdict
  ja: 評価判定
semantics:
  short_definition:
    zh: 基于一个评估准则和已声明证据得出的类别质量结论。
    en: A categorical quality conclusion reached from one evaluation criterion and declared evidence.
    ja: 一つの評価基準と宣言された証拠から得られるカテゴリ品質結論。
  definition:
    zh: Verdict 记录某个候选、运行或证据范围在一个 EvaluationCriterion 下的类别结论，例如 pass、fail、revise、inconclusive 或 resolved（基准适配器）。它必须保存所用准则和证据。Verdict 不是 Score（量规数值等级）、不是 EvaluationMetric（带单位的 accuracy/latency/cost/F1 测量）、也不是 HumanFeedback、原始日志、Trace 或运行状态。OpenAI label_model grader、Braintrust assertion、SWE-bench pass_rate 判定均可映射为本地 Verdict 记录形状。
    en: "Verdict records a categorical conclusion for a candidate, run, or evidence scope under one EvaluationCriterion, such as pass, fail, revise, inconclusive, or resolved (benchmark adapter). It must retain the criterion and evidence used. A Verdict is not a Score (numeric rubric level), not an EvaluationMetric (accuracy/latency/cost/F1 with units), and not HumanFeedback, raw logs, Traces, or execution status. OpenAI label_model grader output, Braintrust assertions, and SWE-bench pass_rate judgments are mappable local Verdict record shapes."
    ja: Verdict は、一つの EvaluationCriterion の下で候補、実行、証拠範囲について pass、fail、revise、inconclusive、resolved（ベンチマークアダプター）などのカテゴリ結論を記録します。使用した基準と証拠を保持しなければなりません。Verdict は Score（数値ルーブリック段階）、EvaluationMetric（accuracy/latency/cost/F1 等の単位付き測定）、HumanFeedback、生ログ、Trace、実行状態ではありません。OpenAI label_model grader 出力、Braintrust assertion、SWE-bench pass_rate 判定はローカル Verdict 記録形状に写像できます。
  why_needed:
    zh: 数值和文字说明不足以说明是否满足发布要求。显式判定提供可追溯的行动结论，同时仍可回到准则、评分和测量证据检查该结论是否合理。
    en: Numbers and prose do not by themselves state whether a release requirement is satisfied. An explicit verdict gives a traceable action conclusion while still allowing review of the criterion, score, and measurement evidence behind it.
    ja: 数値と文章だけではリリース要件を満たすかを示せません。明示的な判定は追跡可能な行動結論を与え、その背後の基準、スコア、測定証拠を再確認できます。
  includes:
    - zh: 判定标识、类别结果、适用准则、证据引用和简短理由。
      en: Verdict identifier, categorical outcome, applied criterion, evidence references, and brief rationale.
      ja: 判定識別子、カテゴリ結果、適用基準、証拠参照、短い理由。
    - zh: 由 Score、EvaluationMetric、Braintrust assertion 或 SWE-bench harness 共同支持的 pass、fail、revise 或 resolved 结论。
      en: A pass, fail, revise, or resolved conclusion supported by Score, EvaluationMetric, Braintrust assertion, or SWE-bench harness.
      ja: Score、EvaluationMetric、Braintrust assertion、SWE-bench harness で支えられる pass、fail、revise、resolved 結論。
  excludes:
    - zh: 单独的评分值、指标值、自然语言评论或执行状态 completed、failed、canceled。
      en: A standalone score value, metric value, natural-language comment, or execution status such as completed, failed, or canceled.
      ja: 単独のスコア値、メトリック値、自然言語コメント、completed/failed/canceled などの実行状態。
    - zh: 没有 EvaluationCriterion 和证据引用的“看起来不错”结论。
      en: A looks good conclusion with no EvaluationCriterion or evidence reference.
      ja: EvaluationCriterion 又は証拠参照を持たない「良さそう」結論。
  semantic_kind: information
  aliases: [evaluation verdict, quality conclusion, 判定]
engineering:
  explanation:
    zh: 新集成应以 OpenAI Graders label_model grader（pass/fail labels）、Braintrust assertions（type=eq/not-contains）、DeepEval metric pass/fail、SWE-bench Verified pass_rate=1.0→resolved 为可映射 API 形状，再用 Moonweave 本地 Verdict 记录 outcome、criterion_ref、evidence_ref。EvaluationRun status=completed 不等于 Verdict pass。
    en: "New integrations should treat OpenAI Graders label_model grader (pass/fail labels), Braintrust assertions (type=eq/not-contains), DeepEval metric pass/fail, and SWE-bench Verified pass_rate=1.0→resolved as mappable API shapes, then persist Moonweave-local Verdict records with outcome, criterion_ref, and evidence_ref. EvaluationRun status=completed is not Verdict pass."
    ja: 新しい統合では OpenAI Graders label_model grader（pass/fail labels）、Braintrust assertions（type=eq/not-contains）、DeepEval metric pass/fail、SWE-bench Verified pass_rate=1.0→resolved を写像可能 API 形状として扱い、Moonweave ローカル Verdict で outcome、criterion_ref、evidence_ref を保存します。EvaluationRun status=completed は Verdict pass と同一ではありません。
  typical_input:
    - description: OpenAI label_model grader-run assigning pass or fail.
      format: |
        POST /v1/fine_tuning/alpha/graders/run
        {
          "grader": {
            "type": "label_model",
            "name": "support-answer-safety",
            "labels": ["pass", "fail"],
            "passing_labels": ["pass"]
          }
        }
      source_claims: [claim-verdict-graders-run]
    - description: Braintrust assertion evaluating output against expected.
      format: |
        {"scores": {"exact_match": {"assertion": {"type": "eq", "path": "category", "expected": "Hardware"}}}}
      source_claims: [claim-verdict-braintrust]
  typical_output:
    - description: Moonweave-local Verdict record from grader or assertion result.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "verdict_id": "verdict-104",
          "outcome": "pass",
          "criterion_ref": "EvaluationCriterion:support-answer-safety:v1",
          "evidence_ref": "grader-run:support-answer-safety-104",
          "rationale": "Response provides safe initial power checks."
        }
      source_claims: [claim-verdict-design]
  reference_implementations:
    - name: OpenAI Run grader API
      url: https://platform.openai.com/docs/guides/evals
      description: label_model and string_check graders yielding categorical signals.
    - name: Braintrust
      url: https://www.braintrust.dev/docs
      description: Experiment assertions producing pass/fail scores.
    - name: SWE-bench Verified
      url: https://www.swebench.com/
      description: Test harness pass_rate grounding resolved verdicts.
structure:
  identity_keys: [verdict_id]
  fields:
    - id: verdict_id
      labels: {zh: 判定标识, en: Verdict identifier, ja: 判定識別子}
      definitions:
        zh: 唯一标识一次可引用类别质量结论的稳定值。
        en: Stable value uniquely identifying one referencable categorical quality conclusion.
        ja: 一件の参照可能なカテゴリ品質結論を一意に識別する安定値。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: verdict-104
      allowed_values: []
      source_claims: [claim-verdict-design]
    - id: outcome
      labels: {zh: 判定结果, en: Verdict outcome, ja: 判定結果}
      definitions:
        zh: 由适用准则解释的类别结论，而非运行生命周期状态。
        en: Categorical conclusion interpreted by the applied criterion rather than execution lifecycle status.
        ja: 実行ライフサイクル状態ではなく、適用基準で解釈されるカテゴリ結論。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: pass
      allowed_values: [pass, fail, revise, inconclusive, resolved]
      source_claims: [claim-verdict-design]
    - id: criterion_ref
      labels: {zh: 评估准则引用, en: Evaluation criterion reference, ja: 評価基準参照}
      definitions:
        zh: 指向给出该结论比较规则的 EvaluationCriterion 的引用。
        en: Reference to the EvaluationCriterion that gives the comparison rule for this conclusion.
        ja: この結論の比較規則を与える EvaluationCriterion への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: EvaluationCriterion:category-string-match
      allowed_values: []
      source_claims: [claim-verdict-design]
    - id: evidence_ref
      labels: {zh: 判定证据引用, en: Verdict evidence reference, ja: 判定証拠参照}
      definitions:
        zh: 指向被该准则实际使用的一个或多个 Score、EvaluationMetric、grader 输出或候选证据。
        en: Reference to one or more Scores, EvaluationMetrics, grader outputs, or candidate evidence actually used by the criterion.
        ja: その基準が実際に使用した Score、EvaluationMetric、grader 出力、候補証拠への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: grader:string_check:score-1
      allowed_values: []
      source_claims: [claim-verdict-design]
    - id: rationale
      labels: {zh: 判定理由, en: Verdict rationale, ja: 判定理由}
      definitions:
        zh: 可选简述，说明所引用证据如何满足、违反或无法满足准则条件。
        en: Optional brief statement of how cited evidence satisfies, violates, or cannot establish the criterion condition.
        ja: 引用した証拠が基準条件を満たす、違反する、確立できない方法の任意の短い説明。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: string_check eq passed with reference=Hardware.
      allowed_values: []
      source_claims: [claim-verdict-design]
  constraints:
    - id: verdict-has-criterion-and-evidence
      severity: error
      expression_language: plain
      expression: criterion_ref and evidence_ref must both be present and the cited evidence must be compatible with the criterion success condition.
      explanation:
        zh: 没有规则或证据的通过和失败不能被审计。
        en: A pass or fail with no rule or evidence cannot be audited.
        ja: 規則又は証拠のない pass/fail は監査できません。
      source_claims: [claim-verdict-design]
    - id: verdict-outcome-is-not-run-status
      severity: error
      expression_language: plain
      expression: outcome must use the Verdict vocabulary and must not reuse queued, running, completed, failed, or canceled execution status values.
      explanation:
        zh: 候选质量失败和评估作业失败是不同事实。
        en: Candidate quality failure and evaluation-job failure are different facts.
        ja: 候補の品質失敗と評価ジョブの失敗は異なる事実です。
      source_claims: [claim-verdict-design]
    - id: verdict-is-not-score-or-metric
      severity: error
      expression_language: plain
      expression: A numeric rubric level must remain Score and a unit-bearing aggregate must remain EvaluationMetric even when either supports this Verdict.
      explanation:
        zh: 支持结论的证据类型不能因产生结论而失去自身语义。
        en: Evidence types that support a conclusion do not lose their own semantics because they produce a conclusion.
        ja: 結論を支える証拠型は、結論を生むために自身の意味論を失いません。
      source_claims: [claim-verdict-design]
  required_relations:
    - id: verdict-applies-evaluation-criterion
      direction: outgoing
      predicate: applies
      target_concept_id: EvaluationCriterion
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每个 Verdict 必须恰好适用一条评估准则。
        en: Each Verdict must apply exactly one EvaluationCriterion.
        ja: 各 Verdict はちょうど一つの EvaluationCriterion を適用しなければなりません。
      source_claims: [claim-verdict-design]
examples:
  - id: verdict-example-openai-string-check-pass
    labels:
      zh: OpenAI string_check 通过判定
      en: OpenAI string_check pass verdict
      ja: OpenAI string_check 合格判定
    descriptions:
      zh: string_check grader 以 operation=eq 对比 candidate Hardware 与 reference Hardware；grader 返回 pass；Verdict verdict-pass-104 记录 outcome=pass、criterion_ref=category-string-match、evidence_ref=grader-run:ticket-104。
      en: string_check grader applies operation=eq comparing candidate Hardware to reference Hardware; grader returns pass; Verdict verdict-pass-104 records outcome=pass, criterion_ref=category-string-match, evidence_ref=grader-run:ticket-104.
      ja: string_check grader が operation=eq で candidate Hardware と reference Hardware を比較。grader が pass を返す。Verdict verdict-pass-104 が outcome=pass、criterion_ref=category-string-match、evidence_ref=grader-run:ticket-104 を記録します。
    example_source:
      product: OpenAI Graders
      url: https://platform.openai.com/docs/guides/evals
      version: string_check grader
    field_values:
      verdict_id: verdict-pass-104
      outcome: pass
      criterion_ref: EvaluationCriterion:category-string-match
      evidence_ref: grader-run:ticket-104
    related_node_ids: [Verdict, EvaluationCriterion, Score]
    related_relation_ids: [verdict-applies-evaluation-criterion]
    source_claims: [claim-verdict-graders-run, claim-verdict-design]
  - id: verdict-example-braintrust-assertion-fail
    labels:
      zh: Braintrust assertion 失败判定
      en: Braintrust assertion fail verdict
      ja: Braintrust assertion 不合格判定
    descriptions:
      zh: Braintrust experiment redteam-09 的 assert type=not-contains value=secret 检测到模型输出含 secret；Verdict verdict-fail-09 记录 outcome=fail 与安全准则 criterion_ref=safety-no-leak。
      en: Braintrust experiment redteam-09 assert type=not-contains value=secret detects secret in model output; Verdict verdict-fail-09 records outcome=fail with safety criterion_ref=safety-no-leak.
      ja: Braintrust experiment redteam-09 の assert type=not-contains value=secret がモデル出力に secret を検出。Verdict verdict-fail-09 が outcome=fail と安全基準 criterion_ref=safety-no-leak を記録します。
    example_source:
      product: Braintrust
      url: https://www.braintrust.dev/docs
      version: experiment assertions
    field_values:
      verdict_id: verdict-fail-09
      outcome: fail
      criterion_ref: EvaluationCriterion:safety-no-leak
      evidence_ref: braintrust:assert:redteam-09
    related_node_ids: [Verdict, EvaluationCriterion, EvaluationRun]
    related_relation_ids: [verdict-applies-evaluation-criterion]
    source_claims: [claim-verdict-braintrust, claim-verdict-design]
  - id: verdict-example-swebench-resolved
    labels:
      zh: SWE-bench Verified resolved 判定
      en: SWE-bench Verified resolved verdict
      ja: SWE-bench Verified resolved 判定
    descriptions:
      zh: SWE-bench instance django__django-11099 上 agent patch 通过 test harness；pass_rate=1.0 产生 Verdict outcome=resolved；基准语义保留在适配器，本节点只记录 criterion_ref 与 evidence_ref。
      en: Agent patch passes test harness on SWE-bench instance django__django-11099; pass_rate=1.0 yields Verdict outcome=resolved; benchmark semantics stay in adapter while this node records criterion_ref and evidence_ref only.
      ja: SWE-bench instance django__django-11099 で agent patch が test harness を合格。pass_rate=1.0 が Verdict outcome=resolved を生成。ベンチマーク意味はアダプターに残し、本ノードは criterion_ref と evidence_ref のみ記録します。
    example_source:
      product: SWE-bench Verified
      url: https://www.swebench.com/
      version: verified instances and harness
    field_values:
      verdict_id: verdict-resolved-17
      outcome: resolved
      criterion_ref: EvaluationCriterion:swebench-test-pass
      evidence_ref: harness:agent-patch-17
    related_node_ids: [Verdict, EvaluationRun, EvaluationMetric, Score]
    related_relation_ids: [verdict-applies-evaluation-criterion]
    source_claims: [claim-verdict-swebench, claim-verdict-design]
  - id: verdict-counterexample-looks-good
    labels:
      zh: 没有证据的“看起来不错”
      en: Looks good with no evidence
      ja: 証拠のない「良さそう」
    descriptions:
      zh: 评审者口头说“看起来不错”但无 criterion_ref 与 evidence_ref；不能登记为 Verdict，因为无法审计通过/失败依据。
      en: Reviewer says looks good verbally but without criterion_ref and evidence_ref; cannot register as Verdict because pass/fail basis is not auditable.
      ja: レビュアーが口頭で「良さそう」と言うが criterion_ref と evidence_ref がない。pass/fail 根拠が監査できないため Verdict として登録できません。
    example_source:
      product: Moonweave evaluation boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: criterion-bound verdict requirement
    field_values:
      verdict_id: null
      outcome: null
      criterion_ref: null
      evidence_ref: null
    related_node_ids: [Verdict]
    related_relation_ids: []
    source_claims: [claim-verdict-design]
  - id: verdict-boundary-completed-failed
    labels:
      zh: 运行完成与质量失败的边界
      en: Boundary between completed run and failed quality
      ja: 完了実行と品質不合格の境界
    descriptions:
      zh: EvaluationRun nightly-104 status=completed 但 string_check 判定 category 不匹配产生 Verdict outcome=fail；运行成功完成不等于候选通过质量准则。
      en: EvaluationRun nightly-104 has status=completed but string_check category mismatch yields Verdict outcome=fail; a successfully completed run does not mean the candidate passed the quality criterion.
      ja: EvaluationRun nightly-104 は status=completed だが string_check の category 不一致で Verdict outcome=fail。実行が正常完了しても候補が品質基準を合格したとは限りません。
    example_source:
      product: OpenAI Agent Evals
      url: https://platform.openai.com/docs/guides/evals
      version: run status vs verdict boundary
    field_values:
      verdict_id: verdict-fail-105
      outcome: fail
      criterion_ref: EvaluationCriterion:category-match
      evidence_ref: grader-run:category-105
    related_node_ids: [Verdict, EvaluationRun, EvaluationCriterion]
    related_relation_ids: [verdict-applies-evaluation-criterion]
    source_claims: [claim-verdict-design]
parent_relation: null
relations:
  - id: Verdict-applies-EvaluationCriterion
    predicate: applies
    target: concept:EvaluationCriterion
    direction: source-to-target
    relation_kind: semantic
    labels: {zh: 判定应用评估准则, en: verdict applies evaluation criterion, ja: 判定が評価基準を適用する}
    definitions:
      zh: Verdict 声明其类别结果按哪一条质量规则得出。
      en: Verdict states which quality rule produced its categorical result.
      ja: Verdict は、そのカテゴリ結果をどの品質規則が生んだかを示します。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: governs, labels: {zh: 准则约束判定, en: criterion governs verdict, ja: 基準が判定を規定する}}
    conditions:
      - id: verdict-criterion-evidence-condition
        severity: error
        expression_language: plain
        expression: Assert only when evidence_ref can be evaluated under the cited criterion and its success condition.
        explanations:
          zh: 不能仅因同属一次运行就把任意判定关联到准则。
          en: A verdict cannot be linked to a criterion merely because both occur in one run.
          ja: 判定と基準が同じ実行に現れるだけで結び付けてはならない。
        source_claims: [claim-verdict-design]
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-verdict-design]
    distinct_fact_rationale:
      zh: 该关系记录规则与结论的适用事实，而不是对原始证据做标签替换。
      en: This relation records the application fact between rule and conclusion rather than relabeling raw evidence.
      ja: この関係は規則と結論の適用事実を記録し、生の証拠をラベル変更するものではありません。
    layout_role: cross-link
sources:
  - id: openai-graders-verdict
    title: OpenAI Run grader API
    url: https://platform.openai.com/docs/guides/evals
    source_type: official-doc
    relevance: label_model and string_check graders producing categorical evaluation signals.
  - id: braintrust-verdict
    title: Braintrust Documentation
    url: https://www.braintrust.dev/docs
    source_type: official-doc
    relevance: Experiment assertions yielding pass/fail scores.
  - id: swebench-verdict
    title: SWE-bench Verified
    url: https://www.swebench.com/
    source_type: official-site
    relevance: Test harness pass_rate grounding resolved verdicts.
  - id: verdict-design
    title: Moonweave Verdict design inference
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Separates categorical verdicts from Score, EvaluationMetric, and execution status.
source_claims:
  - id: claim-verdict-graders-run
    source: openai-graders-verdict
    supports: POST /v1/fine_tuning/alpha/graders/run accepts LabelModelGrader with labels and passing_labels to produce categorical signals.
    locator: Run grader — LabelModelGrader
    evidence_kind: official
    confidence: high
  - id: claim-verdict-braintrust
    source: braintrust-verdict
    supports: Braintrust experiments attach assertion-based scores that ground pass/fail verdicts.
    locator: Experiments; Assertions
    evidence_kind: official
    confidence: high
  - id: claim-verdict-swebench
    source: swebench-verdict
    supports: SWE-bench Verified harness pass_rate can ground a resolved Verdict without redefining benchmark semantics in the feedback domain.
    locator: Verified benchmark and evaluation harness
    evidence_kind: official
    confidence: high
  - id: claim-verdict-design
    source: verdict-design
    supports: A Verdict is a criterion-bound categorical conclusion distinct from Score, EvaluationMetric, Feedback, and execution status.
    locator: Verdict boundary
    evidence_kind: design-inference
    confidence: high
