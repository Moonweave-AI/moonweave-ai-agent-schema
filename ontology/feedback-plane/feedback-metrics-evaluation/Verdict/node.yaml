schema: moonweave.ai/ontology-node/v1
id: Verdict
kind: concept
status: accepted
labels:
  zh: 评估判定
  en: Verdict
  ja: 評価判定
semantics:
  short_definition:
    zh: 基于一个评估准则和已声明证据得出的类别质量结论。
    en: A categorical quality conclusion reached from one evaluation criterion and declared evidence.
    ja: 一つの評価基準と宣言された証拠から得られるカテゴリ品質結論。
  definition:
    zh: Verdict 记录某个候选、运行或证据范围在一个 Evaluation Criterion 下的类别结论，例如 pass、fail、revise 或 inconclusive。它必须保存所用准则和证据。Verdict 不是 Score，后者是量规上的数值等级；不是 Evaluation Metric，后者是带单位和聚合语义的测量；也不是 Human Feedback、原始日志、Trace、Span 或运行状态。
    en: A Verdict records a categorical conclusion for a candidate, run, or evidence scope under one Evaluation Criterion, such as pass, fail, revise, or inconclusive. It must retain the criterion and evidence used. A Verdict is not a Score, which is a numeric rubric level; not an Evaluation Metric, which is a measurement with unit and aggregation semantics; and not Human Feedback, a raw log, Trace, Span, or execution status.
    ja: Verdict は、一つの Evaluation Criterion の下で候補、実行、又は証拠範囲について pass、fail、revise、inconclusive などのカテゴリ結論を記録する。使用した基準と証拠を保持しなければならない。Verdict は数値ルーブリック段階である Score、単位と集約意味論を持つ測定である Evaluation Metric、Human Feedback、生ログ、Trace、Span、又は実行状態ではない。
  why_needed:
    zh: 数值和文字说明不足以说明是否满足发布要求。显式判定提供可追溯的行动结论，同时仍可回到准则、评分和测量证据检查该结论是否合理。
    en: Numbers and prose do not by themselves state whether a release requirement is satisfied. An explicit verdict gives a traceable action conclusion while still allowing review of the criterion, score, and measurement evidence behind it.
    ja: 数値と文章だけではリリース要件を満たすかを示せない。明示的な判定は追跡可能な行動結論を与え、その背後の基準、スコア、測定証拠を再確認できる。
  includes:
    - zh: 判定标识、类别结果、适用准则、证据引用和简短理由。
      en: Verdict identifier, categorical outcome, applied criterion, evidence references, and brief rationale.
      ja: 判定識別子、カテゴリ結果、適用基準、証拠参照、及び短い理由。
    - zh: 一个评分、一个度量或多个证据共同支持的通过、失败、修订或无法判定结论。
      en: A pass, fail, revise, or inconclusive conclusion supported by a Score, Evaluation Metric, or several pieces of evidence.
      ja: Score、Evaluation Metric、又は複数の証拠で支えられる pass、fail、revise、又は inconclusive の結論。
  excludes:
    - zh: 单独的评分值、指标值、自然语言评论或执行状态 completed、failed、canceled。
      en: A standalone score value, metric value, natural-language comment, or execution status such as completed, failed, or canceled.
      ja: 単独のスコア値、メトリック値、自然言語コメント、又は completed、failed、canceled などの実行状態。
    - zh: 没有 Evaluation Criterion 和证据引用的“看起来不错”结论。
      en: A “looks good” conclusion with no Evaluation Criterion or evidence reference.
      ja: Evaluation Criterion 又は証拠参照を持たない「良さそう」という結論。
  semantic_kind: information
  aliases: [evaluation verdict, quality conclusion, 判定]
engineering:
  explanation:
    zh: OpenAI 的 Working with evals 文档展示 eval.run 响应中的 passed、failed 和 errored 等结果计数，但该响应形状不定义本地 Verdict 的所有权。当前系统可以让独立评估器消费 Responses API 候选、规范和证据，写入本地 Verdict。执行状态与 Verdict 必须分开，例如一次运行可 completed 但得到 fail 判定。
    en: OpenAI's Working with evals documentation shows result counts such as passed, failed, and errored in an eval.run response, but that response shape does not define ownership of a local Verdict. A current system can have an independent evaluator consume a Responses API candidate, specification, and evidence and write a local Verdict. Execution status and Verdict must stay separate; one run can be completed and still receive a fail verdict.
    ja: OpenAI の Working with evals 文書は eval.run 応答に passed、failed、errored などの結果集計を示すが、その応答形状はローカル Verdict の所有権を定義しない。現在のシステムでは独立した評価器が Responses API の候補、仕様、証拠を消費してローカル Verdict を書き込める。実行状態と Verdict は分離しなければならず、一つの実行は completed でも fail 判定を受け得る。
  typical_input:
    - description: Current grader-run request that assigns pass or fail labels to a candidate using a label-model grader.
      format: |
        POST /v1/fine_tuning/alpha/graders/run
        {
          "grader": {
            "type": "label_model",
            "name": "support-answer-safety",
            "model": "gpt-5.4-mini",
            "labels": ["pass", "fail"],
            "passing_labels": ["pass"],
            "input": [
              {"role": "developer", "content": [{"type": "input_text", "text": "Mark pass only when the answer gives safe, actionable monitor power-on checks."}]},
              {"role": "assistant", "content": [{"type": "output_text", "text": "Check the outlet, cable, power button, and power brick before escalating."}]}
            ]
          }
        }
      source_claims: [claim-verdict-graders-run]
  typical_output:
    - description: Moonweave-local Verdict record produced from a grader result in the trace/dataset/eval-run workflow; it is not an OpenAI wire schema.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "verdict_id": "verdict-104",
          "outcome": "pass",
          "criterion_ref": "EvaluationCriterion:support-answer-safety:v1",
          "trace_ref": "trace:ticket-104",
          "grader_invocation_ref": "grader-run:support-answer-safety-104",
          "rationale": "The response provides safe initial power checks and a clear escalation boundary."
        }
      source_claims: [claim-verdict-agent-evals-workflow, claim-verdict-design]
  reference_implementations:
    - name: OpenAI Evaluate agent workflows
      url: https://developers.openai.com/api/docs/guides/agent-evals
      description: "Documents the current trace, grader, dataset, and eval-run workflow that precedes a local verdict record."
    - name: OpenAI Run grader reference
      url: https://developers.openai.com/api/reference/resources/fine_tuning/subresources/alpha/subresources/graders/methods/run
      description: "Documents the current label-model grader request that can yield a pass/fail evaluation signal."
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: "Provides the provenance vocabulary that keeps activity, evidence, and conclusion distinct."
structure:
  identity_keys: [verdict_id]
  fields:
    - id: verdict_id
      labels:
        zh: 判定标识
        en: Verdict identifier
        ja: 判定識別子
      definitions:
        zh: 唯一标识一次可引用类别质量结论的稳定值。
        en: Stable value uniquely identifying one referencable categorical quality conclusion.
        ja: 一件の参照可能なカテゴリ品質結論を一意に識別する安定値。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: verdict-104
      allowed_values: []
      source_claims: [claim-verdict-design]
    - id: outcome
      labels:
        zh: 判定结果
        en: Verdict outcome
        ja: 判定結果
      definitions:
        zh: 由适用准则解释的类别结论，而非运行生命周期状态。
        en: Categorical conclusion interpreted by the applied criterion rather than execution lifecycle status.
        ja: 実行ライフサイクル状態ではなく、適用基準で解釈されるカテゴリ結論。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: pass
      allowed_values: [pass, fail, revise, inconclusive]
      source_claims: [claim-verdict-design]
    - id: criterion_ref
      labels:
        zh: 评估准则引用
        en: Evaluation criterion reference
        ja: 評価基準参照
      definitions:
        zh: 指向给出该结论比较规则的 Evaluation Criterion 的引用。
        en: Reference to the Evaluation Criterion that gives the comparison rule for this conclusion.
        ja: この結論の比較規則を与える Evaluation Criterion への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: EvaluationCriterion:interactive-latency
      allowed_values: []
      source_claims: [claim-verdict-design]
    - id: evidence_ref
      labels:
        zh: 判定证据引用
        en: Verdict evidence reference
        ja: 判定証拠参照
      definitions:
        zh: 指向被该准则实际使用的一个或多个 Score、Evaluation Metric、人工依据或候选证据。
        en: Reference to one or more Scores, Evaluation Metrics, human bases, or candidate evidence actually used by the criterion.
        ja: その基準が実際に使用した一つ以上の Score、Evaluation Metric、人間根拠、又は候補証拠への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: EvaluationMetric:p95-request-latency-ms
      allowed_values: []
      source_claims: [claim-verdict-design]
    - id: rationale
      labels:
        zh: 判定理由
        en: Verdict rationale
        ja: 判定理由
      definitions:
        zh: 可选简述，说明所引用证据如何满足、违反或无法满足准则条件。
        en: Optional brief statement of how cited evidence satisfies, violates, or cannot establish the criterion condition.
        ja: 引用した証拠が基準条件を満たす、違反する、又は確立できない方法の任意の短い説明。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: Observed p95 is below the threshold.
      allowed_values: []
      source_claims: [claim-verdict-design]
  constraints:
    - id: verdict-has-criterion-and-evidence
      severity: error
      expression_language: plain
      expression: criterion_ref and evidence_ref must both be present and the cited evidence must be compatible with the criterion success condition.
      explanation:
        zh: 没有规则或证据的通过和失败不能被审计。
        en: A pass or fail with no rule or evidence cannot be audited.
        ja: 規則又は証拠のない pass 又は fail は監査できない。
      source_claims: [claim-verdict-design]
    - id: verdict-outcome-is-not-run-status
      severity: error
      expression_language: plain
      expression: outcome must use the Verdict vocabulary and must not reuse queued, running, completed, failed, or canceled execution status values.
      explanation:
        zh: 候选质量失败和评估作业失败是不同事实。
        en: Candidate quality failure and evaluation-job failure are different facts.
        ja: 候補の品質失敗と評価ジョブの失敗は異なる事実である。
      source_claims: [claim-verdict-design]
    - id: verdict-is-not-score-or-metric
      severity: error
      expression_language: plain
      expression: A numeric rubric level must remain Score and a unit-bearing aggregate must remain EvaluationMetric even when either supports this Verdict.
      explanation:
        zh: 支持结论的证据类型不能因产生结论而失去自身语义。
        en: Evidence types that support a conclusion do not lose their own semantics because they produce a conclusion.
        ja: 結論を支える証拠型は、結論を生むために自身の意味論を失わない。
      source_claims: [claim-verdict-design]
  required_relations:
    - id: verdict-applies-evaluation-criterion
      direction: outgoing
      predicate: applies
      target_concept_id: EvaluationCriterion
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每个 Verdict 必须恰好适用一条评估准则。
        en: Each Verdict must apply exactly one Evaluation Criterion.
        ja: 各 Verdict はちょうど一つの Evaluation Criterion を適用しなければならない。
      source_claims: [claim-verdict-design]
examples:
  - id: verdict-positive-latency-pass

    labels:
      zh: OpenAI string_check 通过判定
      en: OpenAI string_check pass verdict
      ja: OpenAI string_check 合格判定

    descriptions:
      zh: "LMSYS Chatbot Arena (Zheng et al., 2023): MT-Bench 80 items GPT-4 judge 1-10; Arena pairwise + Elo; Verdict maps EvaluationRun/Score/Verdict."
      en: "LMSYS Chatbot Arena (Zheng et al., 2023): MT-Bench 80 items GPT-4 judge 1-10; Arena pairwise + Elo; Verdict maps EvaluationRun/Score/Verdict."
      ja: "Chatbot Arena MT-Bench+Elo; Verdict eval evidence."
    field_values:
      verdict_id: verdict-string-check-pass
      outcome: pass
      criterion_ref: EvaluationCriterion:category-string-match
      evidence_ref: grader:string_check:score-1
    related_node_ids: [Verdict, EvaluationCriterion, EvaluationMetric]
    related_relation_ids: [verdict-applies-evaluation-criterion]

    source_claims: [claim-verdict-design]
  - id: verdict-counterexample-looks-good

    labels:
      zh: 没有证据的“看起来不错”
      en: Looks good with no evidence
      ja: 証拠のない「良さそう」

    descriptions:
      zh: "Diff without repo/commit/test_log_ref cannot serve as SWE-bench-style Verdict."
      en: "Diff without repo/commit/test_log_ref cannot serve as SWE-bench-style Verdict."
      ja: "Missing repo/commit rejects SWE-bench-style Verdict."
    field_values:
      verdict_id: null
      outcome: null
      criterion_ref: null
      evidence_ref: null
    related_node_ids: [Verdict]
    related_relation_ids: []

    source_claims: [claim-verdict-design]
  - id: verdict-boundary-completed-failed

    labels:
      zh: 运行完成与质量失败的边界
      en: Boundary between completed run and failed quality
      ja: 完了実行と品質不合格の境界

    descriptions:
      zh: "AgentBench success_rate is aggregate; Verdict records one run not leaderboard."
      en: "AgentBench success_rate is aggregate; Verdict records one run not leaderboard."
      ja: "Leaderboard not single run."
    field_values:
      verdict_id: verdict-105
      outcome: fail
      criterion_ref: EvaluationCriterion:category-match
      evidence_ref: artifact:category-comparison-104
    related_node_ids: [Verdict, EvaluationRun, EvaluationCriterion]
    related_relation_ids: [verdict-applies-evaluation-criterion]

    source_claims: [claim-verdict-evals-contract, claim-verdict-design]
  - id: verdict-instance-category-match

    labels:
      zh: 工单分类的具体失败判定
      en: Concrete ticket-category fail verdict
      ja: チケット分類の具体的な不合格判定

    descriptions:
      zh: "SWE-bench instance: django__django-11099->tests passed->resolved=true->Verdict Score."
      en: "SWE-bench instance: django__django-11099->tests passed->resolved=true->Verdict Score."
      ja: "SWE-bench instance maps to Verdict Score."
    field_values:
      verdict_id: verdict-105
      outcome: fail
      criterion_ref: EvaluationCriterion:category-match
      evidence_ref: artifact:category-comparison-104
    related_node_ids: [Verdict, EvaluationCriterion, Feedback]
    related_relation_ids: [verdict-applies-evaluation-criterion]

    source_claims: [claim-verdict-design]
parent_relation: null
relations:
  - id: Verdict-applies-EvaluationCriterion
    predicate: applies
    target: concept:EvaluationCriterion
    direction: source-to-target
    relation_kind: semantic
    labels:
      zh: 判定应用评估准则
      en: verdict applies evaluation criterion
      ja: 判定が評価基準を適用する
    definitions:
      zh: Verdict 声明其类别结果按哪一条质量规则得出。
      en: Verdict states which quality rule produced its categorical result.
      ja: Verdict は、そのカテゴリ結果をどの品質規則が生んだかを示す。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: governs
      labels:
        zh: 准则约束判定
        en: criterion governs verdict
        ja: 基準が判定を規定する
    conditions:
      - id: verdict-criterion-evidence-condition
        severity: error
        expression_language: plain
        expression: Assert only when evidence_ref can be evaluated under the cited criterion and its success condition.
        explanations:
          zh: 不能仅因同属一次运行就把任意判定关联到准则。
          en: A verdict cannot be linked to a criterion merely because both occur in one run.
          ja: 判定と基準が同じ実行に現れるだけで結び付けてはならない。
        source_claims: [claim-verdict-design]
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-verdict-design]
    distinct_fact_rationale:
      zh: 该关系记录规则与结论的适用事实，而不是对原始证据做标签替换。
      en: This relation records the application fact between rule and conclusion rather than relabeling raw evidence.
      ja: この関係は規則と結論の適用事実を記録し、生の証拠をラベル変更するものではない。
    layout_role: cross-link
sources:
  - id: openai-evals-verdict
    title: Legacy OpenAI Working with evals API
    url: https://developers.openai.com/api/docs/guides/evals
    source_type: official-doc
    relevance: Documents the historical eval.run result-count response shape without defining ownership of local Verdict records.
  - id: openai-agent-evals-verdict
    title: OpenAI Evaluate agent workflows
    url: https://developers.openai.com/api/docs/guides/agent-evals
    source_type: official-doc
    relevance: Documents current graders, datasets, and eval runs for repeatable agent-quality work before a local verdict is recorded.
  - id: openai-graders-verdict
    title: OpenAI Run grader reference
    url: https://developers.openai.com/api/reference/resources/fine_tuning/subresources/alpha/subresources/graders/methods/run
    source_type: official-doc
    relevance: Documents the current grader-run operation and LabelModelGrader request fields used to generate a categorical evaluation signal.
  - id: prov-o-verdict
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Distinguishes a generated information entity from the time-bounded evaluation activity and its evidence.
  - id: verdict-design
    title: Verdict design inference
    url: https://www.w3.org/TR/prov-o/
    source_type: design-inference
    relevance: Separates categorical verdicts from Scores, Evaluation Metrics, feedback records, and execution status in the local evaluation model.
source_claims:
  - id: claim-verdict-agent-evals-workflow
    source: openai-agent-evals-verdict
    supports: Current OpenAI agent-evaluation guidance separates trace and grader work from repeatable dataset and eval-run work.
    locator: "Evaluate agent workflows: trace grading; Move to datasets and eval runs when you need repeatability"
    evidence_kind: official
    confidence: high
  - id: claim-verdict-evals-contract
    source: openai-evals-verdict
    supports: OpenAI Working with evals documents eval.run result counts such as passed, failed, and errored.
    locator: "Working with evals: run results"
    evidence_kind: official
    confidence: high
  - id: claim-verdict-graders-run
    source: openai-graders-verdict
    supports: The current Run grader operation accepts a LabelModelGrader with labels, passing_labels, model, and message inputs to produce a categorical evaluation signal.
    locator: "Run grader: POST /fine_tuning/alpha/graders/run; LabelModelGrader"
    evidence_kind: official
    confidence: high
  - id: claim-verdict-design
    source: verdict-design
    supports: A Verdict is a criterion-bound categorical conclusion distinct from Score, Evaluation Metric, Feedback, and execution status.
    locator: "Local Verdict boundary"
    evidence_kind: design-inference
    confidence: high


