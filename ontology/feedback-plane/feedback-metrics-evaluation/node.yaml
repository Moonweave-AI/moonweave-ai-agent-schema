        not_applicable_reason:
          zh: 本模块只产出可解释的测量与评分，不决定修正、重试或恢复；这些动作必须经过审查、策略和纠正工作流。
          en: This module produces interpretable measurements and scores but does not decide correction, retry, or recovery; those actions require review, policy, and correction workflows.
          ja: 本 module は解釈可能な測定・score を生成しますが修正、再試行、復旧を決定せず review、policy、correction workflow を必要とします。
