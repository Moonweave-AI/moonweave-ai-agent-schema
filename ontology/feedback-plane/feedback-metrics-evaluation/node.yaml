  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - EvaluationSpecification
    allowed_backbone_predicates:
      - contains_criterion
      - contains_rubric
      - contains_scenario
      - is_a
    flat_root_exception_concept_ids:
      - EvaluationRun
      - Measurement
      - Metric
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-feedback-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项复核身份与存在条件后，本域保留四条互补轴：EvaluationSpecification 是可复用评估设计，EvaluationRun 是一次发生，Metric 是可复用测量定义，Measurement 是一次观测记录。uses、has_result 与 observation_of 只连接这些轴，均不代替各自的分类或组成根。
            en: "After reviewing identity and existence conditions, the domain retains four complementary axes: EvaluationSpecification is reusable evaluation design, EvaluationRun is one occurrence, Metric is a reusable measurement definition, and Measurement is one observation record. uses, has_result, and observation_of connect these axes without replacing their own taxonomy or composition roots."
            ja: identity と存在条件の個別審査後、本 domain は四つの補完 axis を保持します。EvaluationSpecification は再利用 evaluation design、EvaluationRun は一回の occurrence、Metric は再利用 measurement definition、Measurement は一回の observation record です。uses・has_result・observation_of は axis を結ぶだけで各 taxonomy/composition root を置換しません。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 结构审查仅让 EvaluationSpecification 通过 contains_* 展开 Criterion、Rubric 与 Scenario，让 Metric 和 Measurement 通过真实 is_a 展开下位类。EvaluationRun、Metric 与 Measurement 均为独立入口；uses、has_result 与 observation_of 保持 canonical cross-link。
            en: Structure review lets EvaluationSpecification expand Criterion, Rubric, and Scenario through contains_* and lets Metric and Measurement expand subtypes through genuine is_a only. EvaluationRun, Metric, and Measurement are independent entries; uses, has_result, and observation_of retain canonical cross-link roles.
            ja: structure review は EvaluationSpecification から contains_* で Criterion・Rubric・Scenario を、Metric と Measurement から真正な is_a で subtype を展開します。EvaluationRun・Metric・Measurement は独立 entry で、uses・has_result・observation_of は canonical cross-link に留めます。
