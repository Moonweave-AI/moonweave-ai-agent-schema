schema: moonweave.ai/ontology-node/v1
id: feedback-metrics-evaluation
kind: module
status: accepted
labels: {zh: 评估与度量, en: Evaluation and Measurement, ja: 評価と測定}
semantics:
  short_definition: {zh: 定义可复现的质量评估及其度量边界。, en: Defines reproducible quality evaluation and its measurement boundary., ja: 再現可能な品質評価と測定の境界を定義する。}
  definition: {zh: 此模块组织评估规范、准则、量规、场景、评估运行、分数、Evaluation Metric 和结论。它把候选产物与明确质量标准连接起来；原始 OpenTelemetry Metric、Log Record、Trace 或 Span 仍是运行时可观测性，只有被准则解释后才可作为评估证据。, en: "This module organizes evaluation specifications, criteria, rubrics, scenarios, evaluation runs, scores, Evaluation Metrics, and verdicts. It connects a candidate artifact to an explicit quality standard; a raw OpenTelemetry Metric, Log Record, Trace, or Span remains runtime observability until a criterion interprets it as evaluation evidence.", ja: このモジュールは評価仕様、基準、ルーブリック、シナリオ、評価実行、スコア、Evaluation Metric、判定を構成する。候補成果物を明示的な品質基準へ結び付けるが、生の OpenTelemetry Metric、Log Record、Trace、Span は基準により評価証拠として解釈されるまで実行時可観測性のままである。}
  why_needed: {zh: 仅有运行日志不能回答一次改动是否提升了质量。固定规范和量规让团队可在版本之间比较结果，并能追溯某个通过或失败结论所用的样本、准则和证据。, en: "Runtime logs alone cannot answer whether a change improved quality. A stable specification and rubric let teams compare versions and trace each pass or failure conclusion to its samples, criterion, and evidence.", ja: 実行ログだけでは変更が品質を改善したか分からない。安定した仕様とルーブリックにより、チームは版間で結果を比較し、各合格・不合格判定をサンプル、基準、証拠へ追跡できる。}
  includes:
    - {zh: 评估规范、准则、量规、场景、评估运行、分数、Evaluation Metric 和判定。, en: "Evaluation specifications, criteria, rubrics, scenarios, evaluation runs, scores, Evaluation Metrics, and verdicts.", ja: 評価仕様、基準、ルーブリック、シナリオ、評価実行、スコア、Evaluation Metric、判定。}
    - {zh: 被明确准则引用的遥测或人工证据。, en: Telemetry or human evidence explicitly referenced by a criterion., ja: 基準が明示的に参照するテレメトリーまたは人間の証拠。}
  excludes:
    - {zh: 未绑定质量准则的 OpenTelemetry Metric、Log Record、Trace、Span 或 Event。, en: "An OpenTelemetry Metric, Log Record, Trace, Span, or Event that is not bound to a quality criterion.", ja: 品質基準に結び付かない OpenTelemetry Metric、Log Record、Trace、Span、Event。}
    - {zh: 实际修订、重试、路由或训练执行；这些活动可使用评估结果，但不由本模块执行。, en: "The actual revision, retry, routing, or training execution; those activities may use evaluation results but are not performed by this module.", ja: 実際の改訂、再試行、ルーティング、訓練実行。これらは評価結果を利用できるが、このモジュールが実行するものではない。}
  semantic_kind: null
  aliases: [evals, quality assessment, benchmark]
engineering:
  explanation: {zh: 新集成应以当前 Responses API 生成候选输出，再由本地或服务端评估器记录规范、准则、证据和结果。现行的 OpenAI Agents 评估指南将 trace、grader、数据集和 eval run 分开使用；旧版 Evals API 中的 `data_source_config` 与 `testing_criteria` 只能作为历史 API 契约形状，不能定义本地评估器或反馈记录的所有权。OTLP OpenTelemetry Metric 流可作为证据输入，绝不能因被导出就自动成为反馈。, en: "New integrations should generate the candidate with the current Responses API and persist the specification, criterion, evidence, and result in a local or service evaluator. Current OpenAI agent-evaluation guidance distinguishes traces, graders, datasets, and eval runs; the legacy Evals API's `data_source_config` and `testing_criteria` are historical public-contract shapes only and do not define ownership of a local evaluator or feedback record. An OTLP OpenTelemetry Metric stream can be evidence input; exporting it never makes it feedback by itself.", ja: 新しい統合では現在の Responses API で候補を生成し、仕様、基準、証拠、結果をローカルまたはサービス評価器へ保存する。現行の OpenAI Agents 評価ガイドは trace、grader、データセット、eval run を区別して扱う。旧 Evals API の `data_source_config` と `testing_criteria` は歴史的な公開契約形状にすぎず、ローカル評価器又はフィードバック記録の所有権を定義しない。OTLP OpenTelemetry Metric ストリームは証拠入力になり得るが、エクスポートしただけでフィードバックにはならない。}
  typical_input:
    - description: Current Responses request that generates one candidate before trace inspection or grading.
      format: |
        POST /v1/responses
        {
          "model": "gpt-5.4-mini",
          "input": [
            {"role": "developer", "content": [{"type": "input_text", "text": "Classify the support ticket as Hardware, Software, or Other."}]},
            {"role": "user", "content": [{"type": "input_text", "text": "My monitor will not turn on."}]}
          ]
        }
      source_claims: [claim-responses-candidate]
    - description: Current grader-run request that compares a candidate label with a dataset label.
      format: |
        POST /v1/fine_tuning/alpha/graders/run
        {
          "grader": {
            "type": "string_check",
            "name": "ticket-category-match",
            "input": "Hardware",
            "reference": "Hardware",
            "operation": "eq"
          }
        }
      source_claims: [claim-graders-run]
  typical_output:
    - description: Moonweave-local workflow projection linking a trace, dataset, grader invocation, and repeatable eval run; this is not an OpenAI wire schema.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "record_kind": "evaluation-workflow",
          "trace_ref": "trace:ticket-104",
          "dataset_item_ref": "dataset:ticket-category-golden-v2#monitor-no-power",
          "response_ref": "resp_104",
          "grader_invocation_ref": "grader-run:ticket-category-match-104",
          "evaluation_run_ref": "EvaluationRun:ticket-category-nightly-104"
        }
      source_claims: [claim-agent-evals-workflow, claim-module-design]
  reference_implementations:
    - {name: OpenAI Evaluate agent workflows, url: https://developers.openai.com/api/docs/guides/agent-evals, description: "Documents the current trace, grader, dataset, and eval-run workflow for agent quality evaluation."}
    - {name: OpenAI Responses API create reference, url: https://developers.openai.com/api/reference/resources/responses/methods/create, description: "Documents the current POST /v1/responses request used to create a candidate response."}
    - {name: OpenAI Run grader reference, url: https://developers.openai.com/api/reference/resources/fine_tuning/subresources/alpha/subresources/graders/methods/run, description: "Documents the current POST /v1/fine_tuning/alpha/graders/run operation and grader request body."}
    - {name: OpenTelemetry Metrics Data Model, url: https://opentelemetry.io/docs/specs/otel/metrics/data-model/, description: "Defines metric streams and data points that remain observability evidence."}
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 模块标识, en: Module identifier, ja: モジュール識別子}
      definitions: {zh: 评估与度量模块的稳定标识，而非某次评估运行的标识。, en: "Stable identifier of the evaluation-and-measurement module, not an evaluation-run identifier.", ja: 評価と測定モジュールの安定識別子であり、評価実行の識別子ではない。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^feedback-metrics-evaluation$'
      example_value: feedback-metrics-evaluation
      allowed_values: []
      source_claims: [claim-module-design]
    - id: evidence_boundary
      labels: {zh: 证据边界, en: Evidence boundary, ja: 証拠境界}
      definitions: {zh: 说明原始遥测何时仅为运行时证据、何时被准则解释为评估证据的声明。, en: Statement explaining when raw telemetry is only runtime evidence and when a criterion interprets it as evaluation evidence., ja: 生テレメトリーが実行時証拠にとどまる場合と、基準が評価証拠として解釈する場合を示す宣言。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: criterion-bound-only
      allowed_values: [criterion-bound-only]
      source_claims: [claim-otel-metric-boundary, claim-module-design]
  constraints:
    - id: criterion-required-for-feedback
      severity: error
      expression_language: plain
      expression: A result may be represented as evaluation-origin Feedback only when it identifies an EvaluationCriterion, Score, Verdict, criterion-bound EvaluationMetric, or Rubric that explains the quality judgment; human-origin feedback is represented directly by the HumanFeedback subtype.
      explanation: {zh: 没有评分或判断依据的数值仍是观测数据，不能被标成反馈。, en: A number without a grading or judgment basis remains an observation and cannot be labelled feedback., ja: 採点または判断根拠のない数値は観測値のままであり、フィードバックと呼べない。}
      source_claims: [claim-agent-evals-workflow, claim-otel-metric-boundary, claim-module-design]
    - id: documented-evals-contract-does-not-own-local-records
      severity: warning
      expression_language: plain
      expression: A local evaluator must not infer ownership of local records from the documented OpenAI Evals API shape; it must record its own specification, criterion, evidence, and result boundaries.
      explanation: {zh: 文档化 API 契约形状可用于互操作审计，但不决定本地记录的所有权。, en: A documented API contract shape supports interoperability audit but does not determine ownership of local records., ja: 文書化された API 契約形状は相互運用監査を支えるが、ローカル記録の所有権を決定しない。}
      source_claims: [claim-evals-contract]
  required_relations:
    - id: evaluation-module-organizes-specification
      direction: outgoing
      predicate: organizes
      target_concept_id: EvaluationSpecification
      cardinality: {min: 1, max: null}
      explanations: {zh: 模块至少组织一个可复用的评估规范。, en: The module organizes at least one reusable evaluation specification., ja: モジュールは少なくとも一つの再利用可能な評価仕様を構成する。}
      source_claims: [claim-module-design]
    - id: evaluation-module-distinguishes-metric-and-verdict
      direction: outgoing
      predicate: distinguishes
      target_concept_id: Verdict
      cardinality: {min: 1, max: null}
      explanations: {zh: 定量指标与质量结论必须保持不同类型和边界。, en: A quantitative metric and a quality conclusion must retain distinct types and boundaries., ja: 定量メトリックと品質判定は別の型と境界を維持しなければならない。}
      source_claims: [claim-otel-metric-boundary, claim-module-design]
examples:
  - id: evaluation-module-positive-release-gate

    labels: {zh: 发布前的准则约束评估, en: Criterion-bound release evaluation, ja: 基準に結び付くリリース評価}

    descriptions: {zh: "InstructGPT (Ouyang et al., 2022) RLHF: SFT -> human-ranked RM r_theta(x,y) -> PPO; ~13k demos + 33k comparisons; feedback-metrics-evaluation maps supervised/preference data-prep boundary.", en: "InstructGPT (Ouyang et al., 2022) RLHF: SFT -> human-ranked RM r_theta(x,y) -> PPO; ~13k demos + 33k comparisons; feedback-metrics-evaluation maps supervised/preference data-prep boundary.", ja: "InstructGPT SFT->RM->PPO; feedback-metrics-evaluation data prep boundary."}
    field_values: {id: feedback-metrics-evaluation, evidence_boundary: criterion-bound-only}
    related_node_ids: [EvaluationSpecification, EvaluationCriterion, Rubric, Score, Verdict]
    related_relation_ids: []

    source_claims: [claim-agent-evals-workflow, claim-module-design]
  - id: evaluation-module-counterexample-raw-latency

    labels: {zh: 未解释的延迟指标, en: Uninterpreted latency metric, ja: 解釈されないレイテンシーメトリック}

    descriptions: {zh: "Missing environment_id cannot serve as AgentBench-style feedback-metrics-evaluation.", en: "Missing environment_id cannot serve as AgentBench-style feedback-metrics-evaluation.", ja: "Missing environment_id rejects AgentBench-style feedback-metrics-evaluation."}
    field_values: {metric_name: agent.response.latency, p95_ms: 1200}
    related_node_ids: []
    related_relation_ids: []

    source_claims: [claim-otel-metric-boundary]
  - id: evaluation-module-boundary-criterion-interprets-latency

    labels: {zh: 延迟从证据到评估证据, en: Latency crossing into evaluation evidence, ja: レイテンシーが評価証拠へ移る境界}

    descriptions: {zh: "faithfulness measures grounding; latency is cost; feedback-metrics-evaluation must not treat wall-clock as faithfulness.", en: "faithfulness measures grounding; latency is cost; feedback-metrics-evaluation must not treat wall-clock as faithfulness.", ja: "Latency not faithfulness."}
    field_values: {criterion_id: interactive-latency, threshold_ms: 1000, observed_p95_ms: 1200}
    related_node_ids: [EvaluationMetric, EvaluationCriterion, Verdict]
    related_relation_ids: []

    source_claims: [claim-otel-metric-boundary, claim-module-design]
  - id: evaluation-module-instance-ticket-category-v2

    labels: {zh: 具体工单分类评估, en: Concrete ticket-category evaluation, ja: 具体的なチケット分類評価}

    descriptions: {zh: "OpenAI Evals instance: string_check eq Hardware->run completed->feedback-metrics-evaluation eval_id=it-ticket-v1.", en: "OpenAI Evals instance: string_check eq Hardware->run completed->feedback-metrics-evaluation eval_id=it-ticket-v1.", ja: "OpenAI Evals instance maps to feedback-metrics-evaluation Run."}
    field_values: {id: feedback-metrics-evaluation, evidence_boundary: criterion-bound-only}
    related_node_ids: [EvaluationSpecification, EvaluationRun, Score, Verdict]
    related_relation_ids: []

    source_claims: [claim-responses-candidate, claim-agent-evals-workflow, claim-module-design]
parent_relation: null
relations: []
sources:
  - id: openai-agent-evals
    title: OpenAI Evaluate agent workflows
    url: https://developers.openai.com/api/docs/guides/agent-evals
    source_type: official-doc
    relevance: Current OpenAI guidance distinguishes trace grading from repeatable datasets and eval runs for agent-quality work.
  - id: openai-evals-guide
    title: Legacy OpenAI Working with evals API
    url: https://developers.openai.com/api/docs/guides/evals
    source_type: official-doc
    relevance: Documents historical Evals API definition and run contract examples; it does not define the current canonical evaluation workflow.
  - id: openai-responses-create
    title: OpenAI Responses API create reference
    url: https://developers.openai.com/api/reference/resources/responses/methods/create
    source_type: official-doc
    relevance: Documents the current POST /v1/responses request fields used for candidate generation before a separate evaluation.
  - id: openai-graders-run
    title: OpenAI Run grader reference
    url: https://developers.openai.com/api/reference/resources/fine_tuning/subresources/alpha/subresources/graders/methods/run
    source_type: official-doc
    relevance: Documents the current grader-run operation and supported grader request configurations.
  - id: otel-metrics-data-model
    title: OpenTelemetry Metrics Data Model
    url: https://opentelemetry.io/docs/specs/otel/metrics/data-model/
    source_type: standard
    relevance: Defines metric streams, aggregation, and metric data points as observability data.
  - id: feedback-module-design
    title: Moonweave evaluation boundary design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Applies the cited standards to distinguish evaluation judgments from raw operational telemetry.
source_claims:
  - id: claim-agent-evals-workflow
    source: openai-agent-evals
    supports: Current OpenAI guidance uses traces and graders while debugging workflow behavior, then datasets and eval runs for repeatable benchmark and regression evaluation.
    locator: "Evaluate agent workflows: trace grading; Move to datasets and eval runs when you need repeatability"
    evidence_kind: official
    confidence: high
  - id: claim-evals-contract
    source: openai-evals-guide
    supports: The legacy OpenAI Evals API documents definitions with data_source_config and testing_criteria as historical API contract fields.
    locator: "Working with evals (legacy API): Create an eval for a task"
    evidence_kind: official
    confidence: high
  - id: claim-responses-candidate
    source: openai-responses-create
    supports: The Responses API create operation accepts model and input fields to generate a response that a separate evaluator may assess.
    locator: "POST /v1/responses: request body model and input"
    evidence_kind: official
    confidence: high
  - id: claim-graders-run
    source: openai-graders-run
    supports: The Run grader operation accepts a grader configuration, including StringCheckGrader input, reference, and operation fields, at the current grader-run endpoint.
    locator: "Run grader: POST /fine_tuning/alpha/graders/run; StringCheckGrader"
    evidence_kind: official
    confidence: high
  - id: claim-otel-metric-boundary
    source: otel-metrics-data-model
    supports: OpenTelemetry defines metrics as metric streams and data points with aggregation and timeseries semantics, not as quality verdicts.
    locator: "Metrics Data Model: Event model; Metric Stream model; Metric Points"
    evidence_kind: normative
    confidence: high
  - id: claim-module-design
    source: feedback-module-design
    supports: Treating criterion-bound evidence and its result as evaluation while preserving raw telemetry in runtime observability is a Moonweave design inference built on the cited specifications.
    locator: "Evaluation and feedback boundary"
    evidence_kind: design-inference
    confidence: high


