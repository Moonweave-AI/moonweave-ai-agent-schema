        en: After removing the EvaluationSpecification, an object belongs to tool invocation and execution if its identity is still fixed by a ToolCall invocation_id, an InvocationAttempt activity_id and attempt_number, or a ToolResult result_id and result payload. A Measurement or Score belongs to evaluation and measurement when its identity requires an EvaluationRun, Metric, data slice, or criterion.
