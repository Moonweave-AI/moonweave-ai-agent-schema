schema: moonweave.ai/ontology-node/v1
id: feedback-metrics-evaluation
kind: module
status: accepted
labels:
  zh: 评估规范、运行与测量
  en: Evaluation specifications, runs, and measurements
  ja: 評価仕様・実行・測定
semantics:
  short_definition:
    zh: 区分“怎么评、评了哪一次、用什么尺度、得到哪个观测值”。EvaluationSpecification 定义对象、数据、判据、量规和场景；EvaluationRun 记录一次实际执行；Metric 定义可复用的测量语义、单位和聚合方式；Measurement 记录在特定对象、时点和运行中得到的值或评分。
    en: Separates how to evaluate, which evaluation occurred, which scale was used, and which observation resulted. EvaluationSpecification defines subject, data, criteria, rubric, and scenarios; EvaluationRun records one execution; Metric defines reusable measurement semantics, unit, and aggregation; Measurement records a value or score observed for a particular subject, time, and run.
    ja: 「どう評価するか、どの評価が発生したか、どの尺度を使ったか、どの観測値を得たか」を分離します。EvaluationSpecification は対象・data・criterion・rubric・scenario、EvaluationRun は一回の実行、Metric は再利用可能な測定意味・単位・集約、Measurement は特定対象・時点・run で得た値または score を表します。
  definition:
    zh: 本模块的四个直属根分别是规范、发生、尺度和观测，彼此不能替代。规范版本可以被多次 EvaluationRun 使用；一次运行可以产生多项 Measurement；每项测量必须引用 Metric、被测对象、观测上下文和产生它的运行。Metric 不是某次得分，Measurement 也不是评价活动。改进循环只决定何时运行或是否再评，不拥有这些评估对象。
    en: The four direct roots are specification, occurrence, scale, and observation and cannot substitute for one another. One specification revision may be used by many EvaluationRuns; one run may produce many Measurements; each measurement must reference its Metric, measured subject, observation context, and producing run. A Metric is not a particular score, and a Measurement is not an evaluation activity. Improvement-loop control decides when to evaluate or re-evaluate but does not own these evaluation objects.
    ja: 四つの直下根は仕様・発生・尺度・観測で、相互代替できません。一つの specification 版を複数 EvaluationRun が利用でき、一 run が複数 Measurement を生成でき、各 measurement は Metric・測定対象・観測文脈・生成 run を参照しなければなりません。Metric は特定 score ではなく、Measurement は評価 activity ではありません。改善 loop は実行・再評価時点だけを制御し、評価対象を所有しません。
  why_needed:
    zh: 使每个数值和评分都能回答“按哪版规范、针对哪个对象、在哪次运行中、依据什么指标和判据产生”，并支持跨运行可比性检查。
    en: Makes every value and score identify the specification revision, subject, run, metric, and criterion that produced it and supports comparability checks across runs.
    ja: 各値・score が「どの仕様版、どの対象、どの run、どの metric と criterion から生成されたか」を答え、run 間比較可能性を検査できるようにします。
  includes:
    - zh: 评估规范及其判据、量规和场景组成。
      en: Evaluation specifications and their criterion, rubric, and scenario parts.
      ja: 評価仕様と判定基準、ルーブリック、シナリオ部品。
    - zh: 评估运行、测量结果、评分结果和可复用指标定义。
      en: Evaluation runs, measurement results, score results, and reusable metric definitions.
      ja: 評価実行、測定結果、スコア結果、再利用指標定義。
  excludes:
    - zh: 评估、反馈与修订的控制顺序和重试策略归改进循环编排所有。
      en: The control order and retry policy for evaluation, feedback, and revision belong to improvement-loop orchestration.
      ja: 評価・フィードバック・改訂の制御順序と再試行方針は改善ループ編成が所有します。
    - zh: 审查发现、纠正活动与恢复结果归审查与纠正所有；优化目标、学习信号和变更提案归优化与学习所有。
      en: Review findings, corrective activities, and recovery results belong to review and correction; optimization targets, learning signals, and change proposals belong to optimization and learning.
      ja: レビュー所見・是正活動・回復結果はレビューと是正が所有し、最適化目標・学習信号・変更提案は最適化と学習が所有します。
    - zh: 日志导出、流位置、遥测传输与保留策略归日志与遥测所有；本模块只拥有被传输的评估语义。
      en: Log export, stream position, telemetry transport, and retention policy belong to logging and telemetry; this module owns only the evaluation semantics being transported.
      ja: ログ出力・ストリーム位置・テレメトリ転送・保持方針はログとテレメトリが所有し、本モジュールは転送対象の評価意味だけを所有します。
  semantic_kind: null
  aliases: []
purpose:
  zh: 使每个数值和评分都能回答“按哪版规范、针对哪个对象、在哪次运行中、依据什么指标和判据产生”，并支持跨运行可比性检查。
  en: Makes every value and score identify the specification revision, subject, run, metric, and criterion that produced it and supports comparability checks across runs.
  ja: 各値・score が「どの仕様版、どの対象、どの run、どの metric と criterion から生成されたか」を答え、run 間比較可能性を検査できるようにします。
structure: null
examples:
  - id: feedback-metrics-evaluation-cq-measurement-provenance-v3-example-positive
    kind: positive
    labels:
      zh: 一个测量值由哪项 Metric、哪次 EvaluationRun、哪个数据切片和哪个被评对象产生？：正例
      en: "Which Metric, EvaluationRun, data slice, and evaluated subject produced a measurement value?: positive case"
      ja: ある測定値は、どの Metric、EvaluationRun、データスライス、評価対象から生成されましたか。：正例
    scenario_id: null
    descriptions:
      zh: evaluation-run er-12 evaluates tool-result tr-9，has_result measurement m-77；m-77 observation_of metric agent.tool.duration@v1。
      en: Evaluation-run er-12 evaluates tool-result tr-9 and has_result measurement m-77; m-77 is observation_of metric agent.tool.duration@v1.
      ja: evaluation-run er-12 は tool-result tr-9 を評価し measurement m-77 を has_result とし m-77 は metric agent.tool.duration@v1 の observation です。
    field_values:
      evaluation_run_id: er-12
      evaluated_subject_type: ToolResult
      evaluated_subject_id: tr-9
      evaluated_subject_task_id: task-41
      measurement_id: m-77
      metric_id: agent.tool.duration
      metric_version: v1
      value: 1.82
      unit: s
      aggregation: histogram
      data_slice: tool=search-api;region=ap-southeast-1
      observation_interval: 2026-07-16T14:30:00Z/2026-07-16T14:30:05Z
    related_node_ids:
      - EvaluationRun
      - Measurement
      - Metric
      - ToolResult
    related_relation_ids:
      - EvaluationRun-has_result-Measurement
      - Measurement-observation_of-Metric
      - EvaluationRun-evaluates-ToolResult
    expected_result:
      zh: 查询返回运行、测量、指标和被评对象的完整四段出处。
      en: The query returns complete provenance across run, measurement, metric, and evaluated subject.
      ja: query は run、measurement、metric、評価対象の完全な四段出所を返します。
    why_valid_or_invalid:
      zh: 三条明确关系绑定同一测量身份、运行身份、指标版本与被评对象。
      en: Three explicit relations bind the same measurement identity, run identity, metric version, and evaluated subject.
      ja: 三明示関係が同じ measurement ID、run ID、metric 版、評価対象を結びます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-feedback-metrics-evaluation-003
  - id: feedback-metrics-evaluation-cq-measurement-provenance-v3-example-counter
    kind: counterexample
    labels:
      zh: 一个测量值由哪项 Metric、哪次 EvaluationRun、哪个数据切片和哪个被评对象产生？：反例
      en: "Which Metric, EvaluationRun, data slice, and evaluated subject produced a measurement value?: counterexample"
      ja: ある測定値は、どの Metric、EvaluationRun、データスライス、評価対象から生成されましたか。：反例
    scenario_id: null
    descriptions:
      zh: measurement m-88 有数值和 metric 名称，但没有 EvaluationRun result 归属，且 tool-result 引用指向另一任务。
      en: Measurement m-88 has a value and metric name but no EvaluationRun result membership, and its tool-result reference points to another task.
      ja: measurement m-88 は値・metric 名を持ちますが EvaluationRun result 所属がなく tool-result 参照も別 task を指します。
    field_values:
      measurement_id: m-88
      metric_id: agent.tool.duration
      metric_version: v1
      value: 1.79
      unit: s
      claimed_subject_id: tr-9
      claimed_subject_task_id: task-41
      actual_subject_task_id: task-42
      present_relations:
        - Measurement-observation_of-Metric
      missing_relation_ids:
        - EvaluationRun-has_result-Measurement
        - EvaluationRun-evaluates-ToolResult
      adjudication: incomplete-provenance
    related_node_ids:
      - EvaluationRun
      - Measurement
      - Metric
      - ToolResult
    related_relation_ids:
      - EvaluationRun-has_result-Measurement
      - Measurement-observation_of-Metric
      - EvaluationRun-evaluates-ToolResult
    expected_result:
      zh: 查询必须报告运行与被评对象出处缺失，而不是补猜关联。
      en: The query must report missing run and subject provenance rather than guessing links.
      ja: query は関係を推測せず run・評価対象出所欠落を報告します。
    why_valid_or_invalid:
      zh: 数值和相似名称不能替代 has_result 与 evaluates 两项身份事实。
      en: A value and similar name cannot replace has_result and evaluates identity facts.
      ja: 値と類似名は has_result・evaluates の ID 事実を代替できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-feedback-metrics-evaluation-004
  - id: feedback-metrics-evaluation-cq-criterion-verdict-v3-example-positive
    kind: positive
    labels:
      zh: 给定一组测量，哪个判据产生通过、失败或不确定结论，阈值如何应用？：正例
      en: "Given a set of measurements, which criterion produces a pass, fail, or indeterminate verdict, and how is its threshold applied?: positive case"
      ja: 一組の測定から、どの判定基準が合格、失敗、不確定を導き、閾値はどう適用されますか。：正例
    scenario_id: null
    descriptions:
      zh: 编排侧 EvaluationAttempt ea-12 只确定评估何时发生；反馈侧 er-12 has_result score s-8，s-8 作为 Measurement 子类 assessed_against success-criterion sc-4，并记录 pass=true 与阈值 0.85。
      en: Orchestration-side EvaluationAttempt ea-12 determines only when evaluation occurs; on the feedback side, er-12 has_result score s-8, and s-8, as a Measurement subtype, is assessed_against success-criterion sc-4 with pass=true and threshold 0.85.
      ja: 編成側の EvaluationAttempt ea-12 は評価時期だけを決めます。フィードバック側では er-12 が score s-8 を has_result とし、Measurement 下位型 s-8 は success-criterion sc-4 で assessed_against され、pass=true と閾値 0.85 を記録します。
    field_values:
      evaluation_attempt_id: ea-12
      evaluation_run_id: er-12
      score_id: s-8
      score_metric_key: groundedness
      score_value: 0.91
      criterion_id: sc-4
      criterion_version: "4"
      operator: ">="
      threshold: 0.85
      verdict: pass
      uncertainty_handling: indeterminate-on-missing-score
    related_node_ids:
      - EvaluationAttempt
      - EvaluationRun
      - Measurement
      - Score
      - SuccessCriterion
    related_relation_ids:
      - EvaluationRun-has_result-Measurement
      - Score-is_a-Measurement
      - Score-assessed_against-SuccessCriterion
    expected_result:
      zh: 查询返回 score、判据版本、阈值和通过结论。
      en: The query returns the score, criterion version, threshold, and pass verdict.
      ja: query は score、判定基準版、閾値、pass 判定を返します。
    why_valid_or_invalid:
      zh: EvaluationAttempt 与结论语义边界清楚；Score 保留 Measurement 出处，并通过 assessed_against 明确绑定判据，而不是从编排完成或裸数值猜测结论。
      en: "The EvaluationAttempt/verdict boundary is explicit: Score retains Measurement provenance and binds the criterion through assessed_against instead of inferring a verdict from orchestration completion or a bare number."
      ja: EvaluationAttempt と判定意味の境界が明確で、Score は Measurement 出所を保持し、編成完了や裸の数値から判定を推測せず assessed_against で基準を結びます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-feedback-metrics-evaluation-005
  - id: feedback-metrics-evaluation-cq-criterion-verdict-v3-example-counter
    kind: counterexample
    labels:
      zh: 给定一组测量，哪个判据产生通过、失败或不确定结论，阈值如何应用？：反例
      en: "Given a set of measurements, which criterion produces a pass, fail, or indeterminate verdict, and how is its threshold applied?: counterexample"
      ja: 一組の測定から、どの判定基準が合格、失敗、不確定を導き、閾値はどう適用されますか。：反例
    scenario_id: null
    descriptions:
      zh: EvaluationAttempt ea-13 已结束，但 measurement latency-9=1.82s 没有 criterion 或 rubric，却被直接标为任务失败。
      en: EvaluationAttempt ea-13 has ended, but Measurement latency-9=1.82s has no criterion or rubric and is nevertheless labeled task failure.
      ja: EvaluationAttempt ea-13 は終了しましたが、measurement latency-9=1.82s には criterion も rubric もなく、それでも task failure と表示されています。
    field_values:
      evaluation_attempt_id: ea-13
      attempt_state: completed
      measurement_id: latency-9
      metric_id: agent.tool.duration
      value: 1.82
      unit: s
      asserted_verdict: task-failure
      missing_fields:
        - score_id
        - criterion_id
        - criterion_version
        - operator
        - threshold
      adjudication: indeterminate
    related_node_ids:
      - EvaluationAttempt
      - Measurement
      - Score
      - SuccessCriterion
    related_relation_ids:
      - Score-is_a-Measurement
      - Score-assessed_against-SuccessCriterion
    expected_result:
      zh: 查询必须返回判据不足或不确定，不得生成失败结论。
      en: The query must return missing criterion or indeterminate rather than emit a failure verdict.
      ja: query は failure 判定を生成せず基準欠落・不確定を返します。
    why_valid_or_invalid:
      zh: 编排尝试结束不产生评估结论；没有 assessed_against 判据的普通 Measurement 不能自动成为 Score。
      en: Finishing an orchestration attempt does not create an evaluation verdict; an ordinary Measurement without an assessed_against criterion cannot automatically become a Score.
      ja: 編成試行の終了は評価判定を生成せず、assessed_against 基準のない通常の Measurement は自動的に Score になりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-feedback-metrics-evaluation-006
  - id: feedback-metrics-evaluation-cq-comparable-runs-v3-example-positive
    kind: positive
    labels:
      zh: 两次评估运行的分数是否可直接比较，还是指标版本、数据切片或聚合方法不同？：正例
      en: "Are scores from two evaluation runs directly comparable, or do metric version, data slice, or aggregation method differ?: positive case"
      ja: 二つの評価実行の得点は直接比較できますか、それとも指標版、データスライス、集約方法が異なりますか。：正例
    scenario_id: null
    descriptions:
      zh: BenchmarkAdapter 只把外部结果字段映射到核心记录；映射后的 er-12 与 er-13 都 uses eval-spec-27@5，结果分别 observation_of success-rate@v2，数据切片和单位完全相同。
      en: BenchmarkAdapter only maps external result fields into core records; after mapping, er-12 and er-13 both use eval-spec-27@5, and their results are observation_of success-rate@v2 with identical data slices and units.
      ja: BenchmarkAdapter は外部結果フィールドを中核記録へ写像するだけです。写像後の er-12 と er-13 は共に eval-spec-27@5 を使い、結果は success-rate@v2 の observation で、data slice と単位が一致します。
    field_values:
      benchmark_adapter_id: benchmark-adapter-ls-v2
      evaluation_run_ids:
        - er-12
        - er-13
      evaluation_specification_id: eval-spec-27
      specification_version: "5"
      metric_id: success-rate
      metric_version: v2
      dataset_slice: support-en-2026q2
      unit: "1"
      aggregation: arithmetic-mean
      observed_values:
        er-12: 0.84
        er-13: 0.86
      adjudication: comparable
    related_node_ids:
      - BenchmarkAdapter
      - EvaluationRun
      - EvaluationSpecification
      - Measurement
      - Metric
    related_relation_ids:
      - EvaluationRun-uses-EvaluationSpecification
      - EvaluationRun-has_result-Measurement
      - Measurement-observation_of-Metric
    expected_result:
      zh: 查询返回 er-12 与 er-13 可直接比较，并列出共同的规范版本、指标版本、切片、单位与聚合方法。
      en: The query finds the same-named measurements from both runs directly comparable.
      ja: query は両 run の同名 measurement を直接比較可能と判定します。
    why_valid_or_invalid:
      zh: 适配器不拥有比较结论；核心规范版本、指标身份、数据范围、单位和聚合方式全部一致，才使两次运行可比较。
      en: The adapter does not own the comparison verdict; the runs are comparable because core specification version, metric identity, data scope, unit, and aggregation all match.
      ja: アダプターは比較判定を所有せず、中核仕様版、指標 ID、data 範囲、単位、集約法が全て一致するため実行を比較できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-feedback-metrics-evaluation-007
  - id: feedback-metrics-evaluation-cq-comparable-runs-v3-example-counter
    kind: counterexample
    labels:
      zh: 两次评估运行的分数是否可直接比较，还是指标版本、数据切片或聚合方法不同？：反例
      en: "Are scores from two evaluation runs directly comparable, or do metric version, data slice, or aggregation method differ?: counterexample"
      ja: 二つの評価実行の得点は直接比較できますか、それとも指標版、データスライス、集約方法が異なりますか。：反例
    scenario_id: null
    descriptions:
      zh: 同一个 BenchmarkAdapter 映射了两个外部结果，但 er-14 使用 success-rate@v3 和不同数据切片，却把 0.81 与 er-12 的 0.84 直接排序。
      en: The same BenchmarkAdapter maps two external results, but er-14 uses success-rate@v3 and a different data slice while directly ranking 0.81 against er-12's 0.84.
      ja: 同じ BenchmarkAdapter が二つの外部結果を写像しますが、er-14 は success-rate@v3 と別 data slice を使うのに er-12 の 0.84 と 0.81 を直接順位付けします。
    field_values:
      benchmark_adapter_id: benchmark-adapter-ls-v2
      left_run:
        evaluation_run_id: er-12
        metric_id: success-rate
        metric_version: v2
        dataset_slice: support-en-2026q2
        value: 0.84
      right_run:
        evaluation_run_id: er-14
        metric_id: success-rate
        metric_version: v3
        dataset_slice: support-multilingual-2026q2
        value: 0.81
      attempted_comparison: rank er-12 above er-14
      mismatch_fields:
        - metric_version
        - dataset_slice
      adjudication: not-comparable
    related_node_ids:
      - BenchmarkAdapter
      - EvaluationRun
      - EvaluationSpecification
      - Measurement
      - Metric
    related_relation_ids:
      - EvaluationRun-uses-EvaluationSpecification
      - EvaluationRun-has_result-Measurement
      - Measurement-observation_of-Metric
    expected_result:
      zh: 查询必须判定不可直接比较，并列出版本与切片差异。
      en: The query must mark the results non-comparable and list version and slice differences.
      ja: query は直接比較不可とし版・slice 差分を列挙します。
    why_valid_or_invalid:
      zh: 共享适配器只说明外部字段经过同一映射，不会消除核心 Metric 版本和数据范围差异，因此不能替代比较条件核验。
      en: Sharing an adapter proves only that external fields used the same mapping; it does not erase core Metric-version or data-scope differences and cannot replace comparability checks.
      ja: 同一アダプターは外部フィールドが同じ写像を使ったことだけを示し、中核 Metric 版や data 範囲の差を消さず、比較条件の検証を置き換えません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-feedback-metrics-evaluation-008
parent_relation: null
relations: []
module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 评估与度量的输入概念族为评估规范、工具结果；责任交接由已接受事实 评估运行 —uses→ 评估规范 (EvaluationRun-uses-EvaluationSpecification)；评估运行 —evaluates→ 工具结果 (EvaluationRun-evaluates-ToolResult) 明确给出。
          en: The input families for Evaluation and measurement are Evaluation Specification, Tool Result; the accepted facts evaluation run —uses→ Evaluation Specification (EvaluationRun-uses-EvaluationSpecification); evaluation run —evaluates→ Tool Result (EvaluationRun-evaluates-ToolResult) make the responsibility handoff explicit.
          ja: 評価と測定の入力概念族は評価仕様、ツール結果です。責任の受け渡しは承認済み事実 評価実行 —uses→ 評価仕様 (EvaluationRun-uses-EvaluationSpecification)；評価実行 —evaluates→ ツール結果 (EvaluationRun-evaluates-ToolResult) により明示されます。
        family_concept_ids:
          - EvaluationSpecification
          - ToolResult
        relation_ids:
          - EvaluationRun-uses-EvaluationSpecification
          - EvaluationRun-evaluates-ToolResult
        not_applicable_reason: null
      output:
        applicable: true
        description:
