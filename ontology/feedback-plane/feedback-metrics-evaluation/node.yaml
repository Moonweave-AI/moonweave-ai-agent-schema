    en: traceable evaluation and measurement
    ja: 追跡可能な評価と測定
  owns_when:
    zh: 当对象是可复用的评估规范或指标定义、一次有界的评估运行，或在明确对象、时点、上下文和指标下产生的测量/评分时，由本模块拥有。
    en: Own an object when it is a reusable evaluation specification or metric definition, one bounded evaluation run, or a measurement or score produced for an explicit subject, time, context, and metric.
    ja: 対象が再利用可能な evaluation specification／metric definition、一回の有界 evaluation run、または明示対象・時点・文脈・metric の下で生成された measurement／score である場合に所有します。
  references_when:
    zh: 改进编排、审查纠正或优化学习在决定下一步、复验发现或汇总趋势时引用这里的规范、运行、指标和测量；日志与遥测只负责运输这些对象，不改变其评估语义或所有权。
    en: Improvement orchestration, review and correction, and optimization learning reference these specifications, runs, metrics, and measurements when deciding next steps, rechecking findings, or aggregating trends. Logging and telemetry transport these objects without changing evaluation semantics or ownership.
    ja: improvement orchestration・review/correction・optimization learning は次段判断・所見再検証・trend 集約時に本仕様・run・metric・measurement を参照します。logging/telemetry は対象を転送するだけで評価意味・所有権を変更しません。
