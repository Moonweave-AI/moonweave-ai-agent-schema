          en: An EvaluationRun owns Measurement results by composition; each Measurement identifies its observed Metric, while Score explicitly identifies its SuccessCriterion through assessed_against without presenting an is_a hierarchy edge as interaction.
          ja: EvaluationRun は構成関係で Measurement 結果を所有し、Measurement は観測 Metric、Score は assessed_against で SuccessCriterion を明示し、is_a hierarchy edge を interaction として扱いません。
        family_concept_ids:
