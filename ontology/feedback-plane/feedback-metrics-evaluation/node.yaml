        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不负责判定运行失败。编排、审查或优化消费评估结论但不重新定义指标和测量过程时，引用这里的规范、运行与结果。
          en: This ontology does not own runtime-failure adjudication. Orchestration, review, or optimization references specifications, runs, and results here when consuming conclusions without redefining metrics or measurement procedures.
          ja: このオントロジーは実行失敗の判定を所有しません。編成、レビュー、最適化が指標や測定手順を再定義せず評価結論を利用するとき、ここで定義した仕様、実行、結果を参照します。
