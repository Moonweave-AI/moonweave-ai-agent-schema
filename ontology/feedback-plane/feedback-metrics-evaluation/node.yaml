review:
  status: accepted
  method: manual-semantic
  reviewer: manual-feedback-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 LangSmith/OpenAI Evals 完成模块级语义核验；规范、运行、指标与测量四轴边界成立。
    en: Module-level semantics verified against LangSmith/OpenAI Evals; specification, run, metric, and measurement axes hold.
    ja: LangSmith/OpenAI Evals に照らし module レベル意味を確認しました。specification・run・metric・measurement 四軸の境界が成立します。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-feedback-metrics-evaluation-001
    source: eng-fw-langsmith-docs
    supports: LangSmith Evaluation distinguishes datasets and examples, evaluators and their criteria, experiments, runs, and evaluator feedback containing scores or categorical values. Those operational distinctions support EvaluationSpecification, EvaluationScenario, EvaluationRun, criterion, rubric, and score boundaries; Moonweave's canonical class hierarchy and ownership rule remain design inferences.
    locator: Evaluation concepts > Experiment, targets, evaluators, evaluator inputs, and evaluator outputs
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-feedback-metrics-evaluation-002
    source: eng-std-opentelemetry-metrics-data-model
    supports: The OpenTelemetry Metrics Data Model defines metric-stream identity, data points, attributes, timestamps, units, aggregation, and temporality, while the Metrics API defines a Measurement as a value reported to the SDK. Moonweave uses those distinctions for Metric versus Measurement and adds evaluation-specific subjects, criteria, scores, and run ownership as design inferences.
    locator: Metrics Data Model > Timeseries Model and OpenTelemetry Protocol data model; Metrics API > Measurement
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-feedback-metrics-evaluation-003
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry separates reported Measurement values from stable Metric stream identity; Moonweave additionally binds the EvaluationRun and evaluated subject.
    locator: Metrics API > Measurement > value and Attributes; Metrics Data Model > OpenTelemetry Protocol data model > Metric identity and data points
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-feedback-metrics-evaluation-004
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry requires explicit point context; an unbound value does not establish run or evaluated-subject provenance.
    locator: Metrics Data Model > OpenTelemetry Protocol data model > Data points, Attributes, timestamps, and Resource context
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-feedback-metrics-evaluation-005
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluator outputs bind a metric key to a score or category; Moonweave makes the applied SuccessCriterion and run-result membership explicit.
    locator: Evaluation concepts > Evaluator outputs, scores, and categorical values
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-feedback-metrics-evaluation-006
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry Measurements include ordinary operational quantities; a value requires a separate evaluation criterion before it is an adjudicative Score.
    locator: Metrics API > Instrument > name, kind, and unit; Measurement > value and Attributes
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-feedback-metrics-evaluation-007
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry metric points are comparable only under compatible stream identity, unit, attributes, and aggregation semantics.
    locator: Metrics Data Model > OpenTelemetry Protocol data model > Metric identity; Timeseries model > data-point streams and temporality
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-feedback-metrics-evaluation-008
    source: eng-std-opentelemetry-spec
    supports: OpenTelemetry treats conflicting metric descriptions or units as semantic errors; version and scope mismatch prevents direct comparison.
    locator: Metrics Data Model > OpenTelemetry Protocol data model > Metric identity; Semantic error handling > conflicting identities
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-feedback-metrics-evaluation-009
