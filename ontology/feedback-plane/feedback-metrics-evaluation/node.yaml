        zh: 两域会引用同一个 ToolResult，但工具调用与执行记录调用返回、尝试状态与工具错误；评估与测量记录 EvaluationSpecification 下由 Metric、数据切片和判据形成的 Measurement 或 Score。evaluates 只连接被评对象与评估活动，不合并两侧身份。
        en: Both domains can reference the same ToolResult, but tool invocation and execution records the call return, attempt state, and tool error, whereas evaluation and measurement records the Measurement or Score produced under an EvaluationSpecification, Metric, data slice, and criterion. evaluates only links the evaluated subject to the evaluation activity and does not merge their identities.
        ja: 両 domain は同じ ToolResult を参照できますが、tool invocation/execution は call return・attempt state・tool error を記録し、evaluation/measurement は EvaluationSpecification・Metric・data slice・criterion に基づく Measurement または Score を記録します。evaluates は評価対象と評価活動を結ぶだけで、両側の identity を統合しません。
