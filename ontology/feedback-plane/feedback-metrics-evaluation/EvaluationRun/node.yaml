schema: moonweave.ai/ontology-node/v1
id: EvaluationRun
kind: concept
status: review
labels:
  zh: 评估运行
  en: evaluation run
  ja: 評価実行
semantics:
  short_definition:
    zh: 评估运行是按某版评估规范对确定对象执行的一次有界活动。
    en: An evaluation run is one bounded activity executing a versioned specification on identified subjects.
    ja: 評価実行は版管理された評価仕様を特定対象へ適用する一回の有界活動です。
  definition:
    zh: 评估运行是一种有开始、结束和运行身份的活动；它绑定评估规范版本、被评对象、场景与执行环境，并拥有本次运行的 Measurement 结果，区别于可复用规范和结果记录。
    en: An evaluation run is an activity with start, end, and run identity that binds a specification version, evaluated subject, scenarios, and execution environment and owns this run's Measurement results, unlike the reusable specification or result records.
    ja: 評価実行は開始・終了・実行 ID を持つ活動で、仕様版、評価対象、シナリオ、実行環境を結び、この実行の Measurement 結果を所有し、再利用仕様や結果記録と異なります。
  why_needed:
    zh: 独立的运行身份使每个分数都能追溯到模型版本、场景、时间与评估器配置。
    en: A distinct run identity lets every score be traced to model version, scenario, time, and evaluator configuration.
    ja: 独立した実行 ID により各スコアをモデル版、シナリオ、時刻、評価器構成へ追跡できます。
  includes:
    - zh: 包括离线实验、在线抽样评估和针对固定版本的回归评估活动。
      en: Includes offline experiments, sampled online evaluations, and regression evaluations of a fixed version.
      ja: オフライン実験、オンライン標本評価、固定版の回帰評価活動を含みます。
  excludes:
    - zh: 不包括 EvaluationSpecification 本身，也不包括脱离运行身份的 Metric 定义。
      en: Excludes the EvaluationSpecification itself and a Metric definition independent of run identity.
      ja: EvaluationSpecification 自体と実行 ID から独立した Metric 定義は含みません。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - evaluation_run_id
  fields:
    - id: evaluation_run_id
      labels:
        zh: 评估运行标识
        en: evaluation-run ID
        ja: 評価実行 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次对固定对象版本的评估运行。
        en: Stable identifier for one evaluation run over a pinned subject version.
        ja: 固定された対象バージョンに対する一回の評価実行を安定して識別します。
      allowed_values: []
      pattern: null
      example_value: evaluation-run-001
      source_claims:
        - claim-evaluation-run-002
        - claim-evaluation-run-003
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 评估运行开始的 UTC 时间。
        en: UTC instant at which the evaluation run started.
        ja: 評価実行が開始した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-13T05:10:00.000Z
      source_claims:
        - claim-evaluation-run-004
        - claim-evaluation-run-005
    - id: evaluator_id
      labels:
        zh: 评估者标识
        en: evaluator ID
        ja: 評価者 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识执行或负责本次评估的主体或系统。
        en: Identifies the actor or system that performed or owned the evaluation.
        ja: 評価を実行または担当した主体またはシステムを識別します。
      allowed_values: []
      pattern: null
      example_value: evaluator-regression-suite
      source_claims:
        - claim-evaluation-run-006
        - claim-evaluation-run-007
    - id: status
      labels:
        zh: 评估状态
        en: evaluation status
        ja: 評価状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 评估运行的排队、活动、完成、失败或取消状态。
        en: Queued, active, completed, failed, or cancelled state of the evaluation run.
        ja: 評価実行の queued、active、completed、failed、cancelled 状態です。
      allowed_values: []
      pattern: null
      example_value: completed
      source_claims:
        - claim-evaluation-run-008
        - claim-evaluation-run-009
    - id: subject_id
      labels:
        zh: 被评对象标识
        en: subject ID
        ja: 評価対象 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识本次评估的对象。
        en: Identifies the subject evaluated by this run.
        ja: この実行が評価する対象を識別します。
      allowed_values: []
      pattern: null
      example_value: tool-result-001
      source_claims:
        - claim-evaluation-run-010
        - claim-evaluation-run-011
    - id: subject_version
      labels:
        zh: 被评版本
        en: subject version
        ja: 評価対象バージョン
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定被评对象的不可变版本或内容摘要。
        en: Pins the immutable version or content digest of the evaluated subject.
        ja: 評価対象の不変バージョンまたは内容ダイジェストを固定します。
      allowed_values: []
      pattern: null
      example_value: tool-result-001@sha256:4c3f
      source_claims:
        - claim-evaluation-run-012
        - claim-evaluation-run-013
  constraints:
    - id: evaluation-run-pinned-inputs
      severity: error
      expression_language: plain
      expression: subject version, scenario, rubric, metric definitions, and evaluator are fixed before measurements are produced
      explanations:
        zh: 产生测量前必须固定被评对象版本、场景、量规、指标定义和评估者。
        en: Subject version, scenario, rubric, metric definitions, and evaluator are fixed before measurements are produced.
        ja: 測定生成前に対象バージョン、シナリオ、ルーブリック、指標定義、評価者を固定します。
      source_claims:
        - claim-evaluation-run-014
        - claim-evaluation-run-015
  required_relation_constraints:
    - id: evaluation-run-produces-measurement
      direction: outgoing
      predicate: produces
      target_concept_id: Measurement
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 评估运行至少产生一项带单位和来源的测量。
        en: An evaluation run produces at least one measurement with unit and provenance.
        ja: 評価実行は単位と来歴を持つ少なくとも一つの測定を生成します。
      source_claims:
        - claim-evaluation-run-016
        - claim-evaluation-run-017
    - id: evaluation-run-applies-rubric
      direction: outgoing
      predicate: applies
      target_concept_id: Rubric
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 评估运行必须固定所用量规。
        en: An evaluation run pins the rubric it applies.
        ja: 評価実行は適用するルーブリックを固定します。
      source_claims:
        - claim-evaluation-run-018
        - claim-evaluation-run-019
    - id: evaluation-run-uses-scenario
      direction: outgoing
      predicate: uses_scenario
      target_concept_id: EvaluationScenario
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 评估运行必须固定所用场景。
        en: An evaluation run pins the scenario it uses.
        ja: 評価実行は使用するシナリオを固定します。
      source_claims:
        - claim-evaluation-run-020
        - claim-evaluation-run-021
examples:
  - id: EvaluationRun-example-positive-manual-001
    kind: positive
    labels:
      zh: 评估运行正例
      en: Positive evaluation run case
      ja: 評価実行の正例
    scenario_id: null
    descriptions:
      zh: evaluation-run-884 在 02:00 使用 eval-spec-27 对 agent-build-91 执行 500 个场景。
      en: evaluation-run-884 starts at 02:00 and applies eval-spec-27 to agent-build-91 over 500 scenarios.
      ja: evaluation-run-884 は 02:00 に eval-spec-27 を agent-build-91 の 500 シナリオへ適用します。
    field_values:
      evaluation_run_id: evaluation-run-884
      started_at: 2026-07-16T02:00:00.000Z
      evaluator_id: evaluator/correctness-v4
      status: running
      subject_id: agent-build-91
      subject_version: agent-build-91@500-scenario-evaluation
    related_node_ids:
      - EvaluationRun
    related_relation_ids: []
    expected_result:
      zh: 该对象是具有身份与时间边界的评估运行。
      en: The object is an evaluation run with identity and temporal bounds.
      ja: この対象は ID と時間境界を持つ評価実行です。
    why_valid_or_invalid:
      zh: 它记录一次实际发生，并明确绑定规范、对象和场景。
      en: It records one occurrence and binds specification, subject, and scenarios.
      ja: 一回の発生を記録し、仕様、対象、シナリオを結びます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-evaluation-run-022
  - id: EvaluationRun-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 评估运行边界例
      en: Boundary evaluation run case
      ja: 評価実行の境界例
    scenario_id: null
    descriptions:
      zh: eval-spec-27 更新了正确性评估器提示，但没有开始时间或被评构建版本。
      en: eval-spec-27 updates the correctness evaluator prompt but has no start time or evaluated build version.
      ja: eval-spec-27 は正確性評価器プロンプトを更新しますが開始時刻や対象ビルド版を持ちません。
    field_values: {}
    related_node_ids:
      - EvaluationRun
    related_relation_ids: []
    expected_result:
      zh: 这是评估规范版本更新，不是评估运行。
      en: This is an evaluation-specification revision, not an evaluation run.
      ja: これは評価仕様の改訂で評価実行ではありません。
    why_valid_or_invalid:
      zh: 只有配置变化而没有实际发生、对象和时间边界。
      en: It changes configuration without an occurrence, subject, or temporal boundary.
      ja: 構成変更のみで、発生、対象、時間境界がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-evaluation-run-023
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: EvaluationRun-applies-Rubric
    predicate: applies
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 应用量规
      en: applies rubric
      ja: ルーブリックを適用
    definitions:
      zh: EvaluationRun 记录本次评分实际应用的 Rubric 版本，使 Score 的等级含义可复现。
      en: EvaluationRun records the Rubric version actually applied so the level semantics of its Scores are reproducible.
      ja: EvaluationRun は実際に適用した Rubric 版を記録し Score の水準意味を再現可能にします。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_applies
      labels:
        zh: 反向：应用量规
        en: "inverse: applies rubric"
        ja: 逆方向：ルーブリックを適用
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: EvaluationRun-applies-Rubric-example-positive-manual-001
        kind: positive
        labels:
          zh: 应用量规正例
          en: Positive case for applies rubric
          ja: ルーブリックを適用の正例
        scenario_id: null
        descriptions:
          zh: run-884 明确应用 rubric tool-quality-v3。
          en: run-884 explicitly applies rubric tool-quality-v3.
          ja: run-884 は rubric tool-quality-v3 を明示的に適用します。
        field_values: {}
        related_node_ids:
          - EvaluationRun
          - Rubric
        related_relation_ids:
          - EvaluationRun-applies-Rubric
        expected_result:
          zh: 应记录该评估运行实际应用此量规版本。
          en: The run-to-rubric fact is recorded.
          ja: 実行からルーブリックへの事実を記録します。
        why_valid_or_invalid:
          zh: 运行元数据给出实际使用的量规版本。
          en: Run metadata gives the rubric version actually used.
          ja: 実行メタデータが実際のルーブリック版を示します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-evaluation-run-024
      - id: EvaluationRun-applies-Rubric-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 应用量规边界例
          en: Boundary case for applies rubric
          ja: ルーブリックを適用の境界例
        scenario_id: null
        descriptions:
          zh: 报告附录列出 rubric v4，但 run-884 的配置锁定为 v3。
          en: A report appendix lists rubric v4 while run-884 configuration is locked to v3.
          ja: 報告付録は rubric v4 を列挙しますが run-884 は v3 に固定されています。
        field_values: {}
        related_node_ids:
          - EvaluationRun
          - Rubric
        related_relation_ids:
          - EvaluationRun-applies-Rubric
        expected_result:
          zh: 不得声称 run-884 应用了 v4。
          en: The run is not asserted to have applied v4.
          ja: run-884 が v4 を適用したとは主張しません。
        why_valid_or_invalid:
          zh: 邻近文档不能证明本次运行实际加载该量规配置。
          en: Nearby documentation is not the actual runtime configuration.
          ja: 近接文書は実際の実行構成ではありません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-evaluation-run-025
    source_claims:
      - claim-evaluation-run-026
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: pending
    target: concept:Rubric
  - id: EvaluationRun-evaluates-OptimizationTarget
    predicate: evaluates
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 评估优化目标
      en: evaluates optimization target
      ja: 最適化対象を評価
    definitions:
      zh: EvaluationRun 声明本次测量用于评估哪个 OptimizationTarget 的当前版本或配置，避免把指标本身误当目标。
      en: EvaluationRun declares which OptimizationTarget version or configuration its measurements assess, preventing the Metric itself from being mistaken for the target.
      ja: EvaluationRun は測定が評価する OptimizationTarget の版または構成を示し、Metric 自体を対象と誤認しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_evaluates
      labels:
        zh: 反向：评估优化目标
        en: "inverse: evaluates optimization target"
        ja: 逆方向：最適化対象を評価
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: EvaluationRun-evaluates-OptimizationTarget-example-positive-manual-001
        kind: positive
        labels:
          zh: 评估优化目标正例
          en: Positive case for evaluates optimization target
          ja: 最適化対象を評価の正例
        scenario_id: null
        descriptions:
          zh: run-884 评估 optimization-target prompt-router@12，并记录该版本的指标结果。
          en: run-884 evaluates optimization-target prompt-router@12 and records metrics for that version.
          ja: run-884 は optimization-target prompt-router@12 を評価し当該版の指標結果を記録します。
        field_values: {}
        related_node_ids:
          - EvaluationRun
          - OptimizationTarget
        related_relation_ids:
          - EvaluationRun-evaluates-OptimizationTarget
        expected_result:
          zh: 应关联运行与被评优化目标版本。
          en: The run is linked to the evaluated target version.
          ja: 実行を評価対象版へ結びます。
        why_valid_or_invalid:
          zh: 配置版本是评估输入而非指标定义。
          en: The configuration version is the evaluated input, not the metric definition.
          ja: 構成版が評価入力で指標定義ではありません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-evaluation-run-027
      - id: EvaluationRun-evaluates-OptimizationTarget-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 评估优化目标边界例
          en: Boundary case for evaluates optimization target
          ja: 最適化対象を評価の境界例
        scenario_id: null
        descriptions:
          zh: metric task.success_rate 被 run-884 使用，但它只是衡量目标表现的口径。
          en: metric task.success_rate is used by run-884 but only defines how target performance is measured.
          ja: metric task.success_rate は run-884 で使用されますが対象性能の測定口径です。
        field_values: {}
        related_node_ids:
          - EvaluationRun
          - OptimizationTarget
        related_relation_ids:
          - EvaluationRun-evaluates-OptimizationTarget
        expected_result:
          zh: Metric 不得作为 evaluates-OptimizationTarget 的目标。
          en: The Metric is not the OptimizationTarget endpoint.
          ja: Metric を evaluates-OptimizationTarget の対象にしません。
        why_valid_or_invalid:
          zh: 评估对象与用于评估对象的尺度是两个不同概念。
          en: The evaluated object and its measurement scale are distinct concepts.
          ja: 評価対象とその測定尺度は異なる概念です。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-evaluation-run-028
    source_claims:
      - claim-evaluation-run-029
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: pending
    target: concept:OptimizationTarget
  - id: EvaluationRun-evaluates-RunAttempt
    predicate: evaluates
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 评估终态运行尝试
      en: evaluates terminal run attempt
      ja: terminal run attempt を評価
    definitions:
      zh: EvaluationRun 把一个已终止 RunAttempt 作为被评对象，以判据评估其产物和行为质量；评分不改写尝试自身的终态事实。
      en: EvaluationRun evaluates the artifacts and behavior of a terminal RunAttempt against criteria; its scores do not rewrite the attempt's terminal-state fact.
      ja: EvaluationRun は terminal RunAttempt の artifact/behavior を criteria で評価し、score は attempt 自身の terminal-state fact を書き換えません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_evaluates
      labels:
        zh: 反向：评估运行结局
        en: "inverse: evaluates run outcome"
        ja: 逆方向：実行結末を評価
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: EvaluationRun-evaluates-RunAttempt-example-positive-manual-001
        kind: positive
        labels:
          zh: 评估运行结局正例
          en: Positive case for evaluates run outcome
          ja: 実行結末を評価の正例
        scenario_id: null
        descriptions:
          zh: run-884 评估 outcome-51 的完成内容与错误信息，但保留 outcome-51 的 failed 状态。
          en: run-884 evaluates outcome-51 content and errors while preserving its failed runtime status.
          ja: run-884 は outcome-51 の内容とエラーを評価し failed 状態を保持します。
        field_values: {}
        related_node_ids:
          - EvaluationRun
          - RunAttempt
        related_relation_ids:
          - EvaluationRun-evaluates-RunAttempt
        expected_result:
          zh: 应记录对该终态 RunAttempt 的评估。
          en: The evaluation of the terminal RunAttempt is recorded.
          ja: terminal RunAttempt の評価を記録します。
        why_valid_or_invalid:
          zh: 评估输入明确引用终局对象，评分与运行状态分开。
          en: The evaluator explicitly references the terminal object and keeps score separate from runtime state.
          ja: 評価入力が終局対象を明示しスコアと実行状態を分離します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-evaluation-run-030
      - id: EvaluationRun-evaluates-RunAttempt-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 评估运行结局边界例
          en: Boundary case for evaluates run outcome
          ja: 実行結末を評価の境界例
        scenario_id: null
        descriptions:
          zh: run-attempt-7 仍处于 running，尚未形成可做终局评估的完整执行证据。
          en: run-attempt-7 remains running and does not yet have complete evidence for terminal evaluation.
          ja: run-attempt-7 は running で terminal evaluation に必要な complete evidence がありません。
        field_values: {}
        related_node_ids:
          - EvaluationRun
          - RunAttempt
        related_relation_ids:
          - EvaluationRun-evaluates-RunAttempt
