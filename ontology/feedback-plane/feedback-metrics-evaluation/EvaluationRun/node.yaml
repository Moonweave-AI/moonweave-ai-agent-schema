schema: moonweave.ai/ontology-node/v1
id: EvaluationRun
kind: concept
status: accepted
labels: {zh: 评估运行记录, en: Evaluation Run, ja: 評価実行記録}
semantics:
  short_definition: {zh: 记录一次评估执行的可追溯运行实体。, en: A traceable run entity that records one evaluation execution., ja: 一回の評価実行を記録する追跡可能な実行エンティティ。}
  definition: {zh: Evaluation Run 是标识一次已提交或已完成评估的持久记录。它固定所用的 Evaluation Specification、数据或样本清单、执行状态和结果摘要，并可由上游的 Evaluation Activity 生成。它不是可复用的评估规范，也不是活动本身、单个 Score、Evaluation Metric、Verdict、Trace、Span 或 Log Record。, en: "An Evaluation Run is a durable record identifying one submitted or completed evaluation. It fixes the Evaluation Specification, data or sample manifest, execution status, and result summary used for that run, and may be generated by the upstream Evaluation Activity. It is neither a reusable evaluation specification nor the activity itself, an individual Score, Evaluation Metric, Verdict, Trace, Span, or Log Record.", ja: 評価実行記録は、送信済み又は完了済みの一回の評価を識別する永続的な記録である。使用した Evaluation Specification、データ又はサンプル・マニフェスト、実行状態及び結果要約を固定し、上流の Evaluation Activity により生成され得る。再利用可能な評価仕様、活動そのもの、個別の Score、Evaluation Metric、Verdict、Trace、Span、又は Log Record ではない。}
  why_needed: {zh: 只有“当前得分”无法说明结果是否可比较。运行记录把何时、以哪一版规范、哪一批数据和哪个执行状态得到结果留存下来，使回归、审计和复现有明确对象可引用。, en: "A “current score” alone cannot establish comparability. A run record preserves when a result was obtained, with which specification version, data batch, and execution status, giving regression analysis, audit, and reproduction a definite referent.", ja: 「現在のスコア」だけでは比較可能性を示せない。実行記録は、いつ、どの仕様版、どのデータ・バッチ、どの実行状態で結果を得たかを残し、回帰分析、監査、再現に明確な参照対象を与える。}
  includes:
    - {zh: 已文档化的旧版 OpenAI Evals API 的 eval.run 资源、CI 中某一已提交的评估作业记录，以及本地评估器生成的版本化运行清单。, en: "A documented legacy OpenAI Evals API eval.run resource, one submitted CI evaluation-job record, or a versioned run manifest produced by a local evaluator.", ja: 旧式 OpenAI Evals API で文書化された eval.run リソース、CI で送信された一件の評価ジョブ記録、又はローカル評価器が生成した版管理された実行マニフェスト。}
    - {zh: 对规范、数据清单、状态和结果摘要的引用。, en: "References to the specification, data manifest, status, and result summary.", ja: 仕様、データ・マニフェスト、状態、及び結果要約への参照。}
  excludes:
    - {zh: Evaluation Specification；它声明应如何评估，而不记录某次已经发生的执行。, en: An Evaluation Specification; it declares how evaluation should be performed and does not record one occurrence., ja: Evaluation Specification。これは評価方法を宣言し、発生済みの一回の実行を記録しない。}
    - {zh: Evaluation Activity；后者是有时间边界的实际执行活动，而本概念是该执行的可引用记录。, en: "An Evaluation Activity; that is the time-bounded actual execution, whereas this concept is its referencable record.", ja: Evaluation Activity。後者は時間境界を持つ実際の実行活動であり、本概念はその参照可能な記録である。}
    - {zh: 未被准则解释的 OpenTelemetry Metric、Trace、Span、Log Record 或运行时诊断。, en: "An OpenTelemetry Metric, Trace, Span, Log Record, or runtime diagnostic that is not interpreted by an evaluation criterion.", ja: 評価基準で解釈されていない OpenTelemetry Metric、Trace、Span、Log Record、又は実行時診断。}
  semantic_kind: entity
  aliases: [eval run, evaluation execution record, 评估运行]
engineering:
  explanation:
    zh: "当前 OpenAI Agent Evals 工作流先用 trace 和 grader 调试行为，再用数据集和 eval run 做可重复的比较。候选由 Responses API 生成，grader 通过当前 Run grader 端点执行。EvaluationRun 是 Moonweave 本地设计的持久记录，不是 OpenAI wire schema；旧 Evals 资料仅保留为迁移兼容的历史来源。"
    en: "The current OpenAI Agent Evals workflow uses traces and graders to debug behavior, then datasets and eval runs for repeatable comparison. Candidates come from the Responses API and graders run through the current Run grader endpoint. EvaluationRun is a Moonweave-local durable record, not an OpenAI wire schema; legacy Evals material remains only as a historical compatibility source."
    ja: "現在の OpenAI Agent Evals ワークフローでは、まず trace と grader で挙動を調べ、その後データセットと eval run で反復可能な比較を行う。候補は Responses API で生成し、grader は現在の Run grader エンドポイントで実行する。EvaluationRun は Moonweave ローカル設計の永続記録であり、OpenAI の wire schema ではない。旧 Evals 資料は移行互換性のための履歴ソースとしてのみ残す。"
  typical_input:
    - description: Current Responses request for one dataset item whose candidate will be evaluated in a run.
      format: |
        POST /v1/responses
        {
          "model": "gpt-5.4-mini",
          "input": [
            {"role": "user", "content": [{"type": "input_text", "text": "Classify this ticket: My monitor will not turn on."}]}
          ]
        }
      source_claims: [claim-run-responses]
    - description: Moonweave-local run kickoff record that selects traces, a dataset snapshot, and graders; it is not an OpenAI wire schema.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "run_id": "ticket-category-nightly-104",
          "trace_refs": ["trace:ticket-104"],
          "dataset_snapshot_ref": "dataset:ticket-category-golden-v2@sha256:6bc1",
          "grader_refs": ["EvaluationCriterion:category-match:v2"],
          "mode": "repeatable-regression"
        }
      source_claims: [claim-run-agent-evals-workflow, claim-run-design]
  typical_output:
    - description: Current grader-run request emitted after the candidate and expected label are available.
      format: |
        {
          "request": "POST /v1/fine_tuning/alpha/graders/run",
          "body": {
            "grader": {
              "type": "text_similarity",
              "name": "ticket-answer-similarity",
              "input": "Hardware",
              "reference": "Hardware",
              "evaluation_metric": "cosine"
            }
          }
        }
      source_claims: [claim-run-graders-run]
    - description: Moonweave-local EvaluationRun record produced by the evaluator after the repeatable workflow; it is not an OpenAI wire schema.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "run_id": "eval-run-104",
          "specification_ref": "EvaluationSpecification:ticket-category:v2",
          "data_manifest_ref": "dataset:ticket-category-golden-v2",
          "activity_ref": "EvaluationActivity:nightly-104",
          "status": "completed",
          "result_summary_ref": "artifact:eval-run-104-summary"
        }
      source_claims: [claim-run-agent-evals-workflow, claim-run-design]
  reference_implementations:
    - {name: OpenAI Responses API create reference, url: https://developers.openai.com/api/reference/resources/responses/methods/create, description: "Documents current candidate-generation requests kept separate from evaluation-record ownership."}
    - {name: OpenAI Run grader reference, url: https://developers.openai.com/api/reference/resources/fine_tuning/subresources/alpha/subresources/graders/methods/run, description: "Documents the current grader-run request used to score a prepared candidate."}
    - {name: OpenAI Evaluate agent workflows, url: https://developers.openai.com/api/docs/guides/agent-evals, description: "Documents current traces, graders, datasets, and eval runs for repeatable agent evaluation."}
structure:
  identity_keys: [run_id]
  fields:
    - id: run_id
      labels: {zh: 运行标识, en: Run identifier, ja: 実行識別子}
      definitions: {zh: 唯一标识一次可引用评估运行记录的稳定值，而非规范标识。, en: Stable value uniquely identifying one referencable evaluation-run record rather than a specification., ja: 仕様ではなく、一件の参照可能な評価実行記録を一意に識別する安定値。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: eval-run-104
      allowed_values: []
      source_claims: [claim-run-design]
    - id: specification_ref
      labels: {zh: 评估规范引用, en: Evaluation specification reference, ja: 評価仕様参照}
      definitions: {zh: 指向本次运行实际使用的 Evaluation Specification 及其版本的引用。, en: Reference to the Evaluation Specification and version actually used by this run., ja: この実行で実際に使用された Evaluation Specification とその版への参照。}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: EvaluationSpecification:ticket-category:v2
      allowed_values: []
      source_claims: [claim-run-design]
    - id: data_manifest_ref
      labels: {zh: 数据清单引用, en: Data manifest reference, ja: データ・マニフェスト参照}
      definitions: {zh: 指向本次运行消费的测试集、样本清单或等价不可变数据版本的引用。, en: "Reference to the test set, sample manifest, or equivalent immutable data version consumed by this run.", ja: この実行が消費したテスト集合、サンプル・マニフェスト、又は同等の不変なデータ版への参照。}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dataset:ticket-category-golden-v2
      allowed_values: []
      source_claims: [claim-run-evals-contract, claim-run-design]
    - id: activity_ref
      labels: {zh: 评估活动引用, en: Evaluation activity reference, ja: 評価活動参照}
      definitions: {zh: 指向生成或执行该记录的有时间边界 Evaluation Activity 的引用。, en: Reference to the time-bounded Evaluation Activity that generated or executed this record., ja: この記録を生成又は実行した時間境界を持つ Evaluation Activity への参照。}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: EvaluationActivity:nightly-104
      allowed_values: []
      source_claims: [claim-run-provenance, claim-run-design]
    - id: status
      labels: {zh: 运行状态, en: Run status, ja: 実行状態}
      definitions: {zh: 服务或本地评估器对该次运行报告的生命周期状态，不是质量 Verdict。, en: Lifecycle state reported by the service or local evaluator for this run; it is not a quality Verdict., ja: サービス又はローカル評価器がこの実行について報告するライフサイクル状態であり、品質 Verdict ではない。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: completed
      allowed_values: [queued, running, completed, failed, canceled]
      source_claims: [claim-run-evals-contract]
    - id: result_summary_ref
      labels: {zh: 结果摘要引用, en: Result summary reference, ja: 結果要約参照}
      definitions: {zh: 指向该次运行产生的计数、Verdict 或其他已解释结果摘要的引用；不能以原始遥测代替。, en: "Reference to counts, Verdicts, or another interpreted result summary produced by the run; raw telemetry cannot substitute for it.", ja: 実行が生成した集計、Verdict、又は他の解釈済み結果要約への参照。生のテレメトリで代用してはならない。}
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: artifact:eval-run-104-summary
      allowed_values: []
      source_claims: [claim-run-evals-contract, claim-run-design]
  constraints:
    - id: evaluation-run-pins-governing-inputs
      severity: error
      expression_language: plain
      expression: specification_ref and data_manifest_ref must identify immutable versions or a retained immutable snapshot for the inputs actually used by the run.
      explanation: {zh: 仅记录“使用最新规范”会破坏历史结果的可复现性。, en: Recording only “use the latest specification” destroys reproducibility of a historical result., ja: 「最新仕様を使用」とだけ記録すると、過去の結果の再現可能性を損なう。}
      source_claims: [claim-run-design]
    - id: evaluation-run-completed-has-interpreted-result
      severity: error
      expression_language: plain
      expression: If status is completed, result_summary_ref must resolve to a retained interpreted result summary or Verdict; a raw Trace, Span, Log Record, or unbound OpenTelemetry Metric is insufficient.
      explanation: {zh: 完成状态必须留下可解释的评估结果，而不是仅留下运行时遥测。, en: A completed status must retain an interpretable evaluation result rather than only runtime telemetry., ja: 完了状態には、実行時テレメトリだけでなく解釈可能な評価結果を残さなければならない。}
      source_claims: [claim-run-design]
    - id: evaluation-run-status-is-not-verdict
      severity: error
      expression_language: plain
      expression: status describes execution lifecycle only and must not be used as pass, fail, safe, or unsafe quality judgment without a criterion-bound Verdict.
      explanation: {zh: “运行失败”与“候选不符合质量准则”是不同事实。, en: “The run failed” and “the candidate did not satisfy a quality criterion” are different facts., ja: 「実行が失敗した」と「候補が品質基準を満たさなかった」は異なる事実である。}
      source_claims: [claim-run-design]
  required_relations:
    - id: evaluation-run-uses-specification
      direction: outgoing
      predicate: uses
      target_concept_id: EvaluationSpecification
      cardinality: {min: 1, max: 1}
      explanations: {zh: 每次运行必须明确引用恰好一版实际采用的评估规范。, en: Each run must explicitly reference exactly one specification version actually used., ja: 各実行は実際に使用した評価仕様版をちょうど一つ明示的に参照しなければならない。}
      source_claims: [claim-run-design]
    - id: evaluation-run-was-generated-by-activity
      direction: outgoing
      predicate: was_generated_by
      target_concept_id: EvaluationActivity
      cardinality: {min: 1, max: 1}
      explanations: {zh: 运行记录由一个有时间边界的 Evaluation Activity 生成，从而不把记录和活动混为一物。, en: "A run record is generated by one time-bounded Evaluation Activity, so the record is not conflated with the activity.", ja: 実行記録は一つの時間境界を持つ Evaluation Activity により生成され、記録と活動を混同しない。}
      source_claims: [claim-run-provenance, claim-run-design]
examples:
  - id: evaluation-run-positive-nightly-regression

    labels: {zh: OpenAI Evals IT 工单分类运行, en: OpenAI Evals IT ticket categorization run, ja: OpenAI Evals IT チケット分類実行}

    descriptions: {zh: "Self-Refine (Madaan et al., 2023) Generate->Feedback->Refine loop without external training; EvaluationRun maps feedback-driven revision artifacts.", en: "Self-Refine (Madaan et al., 2023) Generate->Feedback->Refine loop without external training; EvaluationRun maps feedback-driven revision artifacts.", ja: "Self-Refine Generate->Feedback->Refine; EvaluationRun revision artifact."}
    field_values: {run_id: openai-eval-run-it-ticket, specification_ref: 'EvaluationSpecification:it-ticket-categorization', data_manifest_ref: 'dataset:it-ticket-jsonl', activity_ref: 'EvaluationActivity:openai-eval-run-create', status: completed, result_summary_ref: 'artifact:eval-run-it-ticket-summary'}
    related_node_ids: [EvaluationRun, EvaluationSpecification, EvaluationActivity, Verdict]
    related_relation_ids: [evaluation-run-uses-specification, evaluation-run-was-generated-by-activity]

    source_claims: [claim-run-design]
  - id: evaluation-run-counterexample-current-score-only

    labels: {zh: 只有“当前分数”的仪表盘, en: Dashboard with only a “current score”, ja: 「現在のスコア」だけのダッシュボード}

    descriptions: {zh: "Missing retrieved_contexts cannot run RAGAS-style EvaluationRun context_precision.", en: "Missing retrieved_contexts cannot run RAGAS-style EvaluationRun context_precision.", ja: "Missing retrieved_contexts rejects RAGAS-style EvaluationRun."}
    field_values: {run_id: null, specification_ref: null, data_manifest_ref: null, activity_ref: null, status: null}
    related_node_ids: [EvaluationRun, EvaluationMetric]
    related_relation_ids: []

    source_claims: [claim-run-design]
  - id: evaluation-run-boundary-activity-versus-record

    labels: {zh: 评估活动与运行记录的边界, en: Boundary between evaluation activity and run record, ja: 評価活動と実行記録の境界}

    descriptions: {zh: "testing_criteria is spec; run output is Score; EvaluationRun must separate config from run results.", en: "testing_criteria is spec; run output is Score; EvaluationRun must separate config from run results.", ja: "Criteria spec; run output Score."}
    field_values: {run_id: eval-run-104, activity_ref: 'EvaluationActivity:nightly-104', status: completed}
    related_node_ids: [EvaluationRun, EvaluationActivity]
    related_relation_ids: [evaluation-run-was-generated-by-activity]

    source_claims: [claim-run-provenance, claim-run-design]
  - id: evaluation-run-instance-ticket-category

    labels: {zh: OpenAI Evals 具体运行记录, en: Concrete OpenAI Evals run record, ja: OpenAI Evals 具体実行記録}

    descriptions: {zh: "AgentBench instance: env=web_shopping task_id=ws-042->EvaluationRun EvaluationRun.", en: "AgentBench instance: env=web_shopping task_id=ws-042->EvaluationRun EvaluationRun.", ja: "AgentBench instance maps to EvaluationRun Run."}
    field_values: {run_id: openai-eval-run-it-ticket, specification_ref: 'EvaluationSpecification:it-ticket-categorization', data_manifest_ref: 'dataset:it-ticket-jsonl', activity_ref: 'EvaluationActivity:openai-eval-run-create', status: completed, result_summary_ref: 'artifact:eval-run-it-ticket-summary'}
    related_node_ids: [EvaluationRun, EvaluationSpecification, EvaluationActivity, Verdict]
    related_relation_ids: [evaluation-run-uses-specification, evaluation-run-was-generated-by-activity]

    source_claims: [claim-run-design]
parent_relation: null
relations:
  - id: EvaluationRun-uses-EvaluationSpecification
    predicate: uses
    target: concept:EvaluationSpecification
    direction: source-to-target
    relation_kind: semantic
    labels: {zh: 运行使用评估规范, en: evaluation run uses specification, ja: 評価実行が仕様を使用する}
    definitions: {zh: 该运行记录声明本次执行实际采用的唯一版本化规范。, en: The run record declares the one versioned specification actually applied by that execution., ja: 実行記録は、その実行が実際に適用した一つの版管理された仕様を宣言する。}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: governs, labels: {zh: 规范约束运行, en: specification governs run, ja: 仕様が実行を規定する}}
    conditions:
      - id: run-uses-specification-version-condition
        severity: error
        expression_language: plain
        expression: Link only when specification_ref identifies the exact version applied to this run.
        explanations: {zh: 不得仅因名称相近把运行关联到某一规范。, en: Do not link a run to a specification merely because their names are similar., ja: 名前が似ているだけで実行と仕様を結び付けてはならない。}
        source_claims: [claim-run-design]
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-run-design]
    distinct_fact_rationale: {zh: 该关系把发生过的运行与其被采用的静态规范分开表达。, en: This relation expresses an occurred run separately from the static specification it applied., ja: この関係は、発生した実行を、それが適用した静的仕様と分けて表現する。}
    layout_role: cross-link
sources:
  - id: openai-evals-run
    title: Legacy OpenAI Evals API guide
    url: https://developers.openai.com/api/docs/guides/evals
    source_type: official-doc
    relevance: Documents legacy eval.run creation, retrieval, and response fields used only as a historical external contract boundary; it is not a Moonweave canonical class source.
  - id: openai-responses-run
    title: OpenAI Responses API create reference
    url: https://developers.openai.com/api/reference/resources/responses/methods/create
    source_type: official-doc
    relevance: Documents current model and input fields for candidate generation kept outside local evaluation-record ownership.
  - id: openai-graders-run
    title: OpenAI Run grader reference
    url: https://developers.openai.com/api/reference/resources/fine_tuning/subresources/alpha/subresources/graders/methods/run
    source_type: official-doc
    relevance: Documents the current grader-run operation and TextSimilarityGrader request fields.
  - id: openai-agent-evals-run
    title: OpenAI Evaluate agent workflows
    url: https://developers.openai.com/api/docs/guides/agent-evals
    source_type: official-doc
    relevance: Distinguishes traces, graders, datasets, and eval runs in the current repeatable agent-evaluation workflow.
  - id: prov-o-run
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines the Entity and Activity distinction and the wasGeneratedBy relation used for the record/activity boundary.
  - id: evaluation-run-design
    title: Evaluation run record design inference
    url: https://www.w3.org/TR/prov-o/
    source_type: design-inference
    relevance: Applies the cited API and provenance contracts to a provider-neutral, versioned local run record.
source_claims:
  - id: claim-run-agent-evals-workflow
    source: openai-agent-evals-run
    supports: Current OpenAI agent-evaluation guidance distinguishes trace and grader work from repeatable dataset and eval-run work.
    locator: "Evaluate agent workflows: trace grading; Move to datasets and eval runs when you need repeatability"
    evidence_kind: official
    confidence: high
  - id: claim-run-responses
    source: openai-responses-run
    supports: The Responses create operation accepts model and input to generate a candidate response before a separate evaluation workflow records a local run.
    locator: "POST /v1/responses: request body model and input"
    evidence_kind: official
    confidence: high
  - id: claim-run-evals-contract
    source: openai-evals-run
    supports: The legacy OpenAI Evals API documents eval.run creation and retrieval with an identifier, evaluation identifier, status, model, and result counts.
    locator: "Working with evals (legacy API): run creation, retrieval, and EvalRun object"
    evidence_kind: official
    confidence: high
  - id: claim-run-graders-run
    source: openai-graders-run
    supports: The current Run grader operation accepts a TextSimilarityGrader with input, reference, and evaluation_metric fields.
    locator: "Run grader: POST /fine_tuning/alpha/graders/run; TextSimilarityGrader"
    evidence_kind: official
    confidence: high
  - id: claim-run-provenance
    source: prov-o-run
    supports: PROV-O distinguishes an Entity from a time-bounded Activity and defines prov:wasGeneratedBy between an entity and the activity that generated it.
    locator: "PROV-O: prov:Entity, prov:Activity, prov:wasGeneratedBy"
    evidence_kind: normative
    confidence: high
  - id: claim-run-design
    source: evaluation-run-design
    supports: A provider-neutral evaluation run is a durable record with pinned inputs and a provenance link to the activity that generated it.
    locator: "Local evaluation run record boundary"
    evidence_kind: design-inference
    confidence: high


