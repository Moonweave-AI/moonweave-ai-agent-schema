schema: moonweave.ai/ontology-node/v1
id: EvaluationRun
kind: concept
labels:
  zh: 评估运行记录
  en: Evaluation Run
  ja: 評価実行記録
semantics:
  short_definition:
    zh: 一次已提交或已完成评估的可追溯运行记录。
    en: A traceable run record for one submitted or completed evaluation.
    ja: 一回の送信済み又は完了済み評価の追跡可能な実行記録。
  definition:
    zh: EvaluationRun 是标识一次已提交或已完成评估的持久记录。它固定所用的 EvaluationSpecification、数据或样本清单、执行状态和结果摘要，并可由上游 EvaluationActivity 生成。它不是可复用的评估规范，也不是活动本身、单个 Score、EvaluationMetric、Verdict、Trace、Span 或 Log Record。OpenAI Agent Evals 的 eval run、LangSmith experiment run 与 SWE-bench harness 运行均可映射为本概念的证据形状，但 Moonweave 本地对象保留规范、证据与结果边界。
    en: "EvaluationRun is a durable record identifying one submitted or completed evaluation. It fixes the EvaluationSpecification, data or sample manifest, execution status, and result summary used for that run, and may be generated by the upstream EvaluationActivity. It is neither a reusable evaluation specification nor the activity itself, an individual Score, EvaluationMetric, Verdict, Trace, Span, or Log Record. OpenAI Agent Evals eval runs, LangSmith experiment runs, and SWE-bench harness runs are mappable evidence shapes, but Moonweave-local objects retain specification, evidence, and result boundaries."
    ja: EvaluationRun は、送信済み又は完了済みの一回の評価を識別する永続記録です。使用した EvaluationSpecification、データ又はサンプル・マニフェスト、実行状態、結果要約を固定し、上流の EvaluationActivity により生成され得ます。再利用可能な評価仕様、活動そのもの、個別 Score、EvaluationMetric、Verdict、Trace、Span、Log Record ではありません。OpenAI Agent Evals eval run、LangSmith experiment run、SWE-bench harness 実行は写像可能な証拠形状ですが、Moonweave ローカルオブジェクトは仕様、証拠、結果境界を保持します。
  why_needed:
    zh: 只有“当前得分”无法说明结果是否可比较。运行记录把何时、以哪一版规范、哪一批数据和哪个执行状态得到结果留存下来，使回归、审计和复现有明确对象可引用。
    en: "A current score alone cannot establish comparability. A run record preserves when a result was obtained, with which specification version, data batch, and execution status, giving regression analysis, audit, and reproduction a definite referent."
    ja: 「現在のスコア」だけでは比較可能性を示せません。実行記録は、いつ、どの仕様版、どのデータ・バッチ、どの実行状態で結果を得たかを残し、回帰分析、監査、再現に明確な参照対象を与えます。
  includes:
    - zh: OpenAI eval run 资源、LangSmith experiment 运行记录、SWE-bench harness 运行清单，以及本地评估器生成的版本化运行记录。
      en: "OpenAI eval run resources, LangSmith experiment run records, SWE-bench harness run manifests, and versioned run records produced by local evaluators."
      ja: OpenAI eval run リソース、LangSmith experiment 実行記録、SWE-bench harness 実行マニフェスト、ローカル評価器が生成した版管理実行記録。
    - zh: 对规范、数据清单、状态和结果摘要的引用。
      en: References to the specification, data manifest, status, and result summary.
      ja: 仕様、データ・マニフェスト、状態、結果要約への参照。
  excludes:
    - zh: EvaluationSpecification；它声明应如何评估，而不记录某次已经发生的执行。
      en: An EvaluationSpecification; it declares how evaluation should be performed and does not record one occurrence.
      ja: EvaluationSpecification。これは評価方法を宣言し、発生済みの一回の実行を記録しません。
    - zh: EvaluationActivity；后者是有时间边界的实际执行活动，而本概念是该执行的可引用记录。
      en: "An EvaluationActivity; that is the time-bounded actual execution, whereas this concept is its referencable record."
      ja: EvaluationActivity。後者は時間境界を持つ実際の実行活動であり、本概念はその参照可能な記録です。
    - zh: 未被准则解释的 OpenTelemetry Metric、Trace、Span、Log Record 或运行时诊断。
      en: "An OpenTelemetry Metric, Trace, Span, Log Record, or runtime diagnostic not interpreted by an evaluation criterion."
      ja: 評価基準で解釈されていない OpenTelemetry Metric、Trace、Span、Log Record、実行時診断。
  semantic_kind: entity
  aliases: [eval run, evaluation execution record, 评估运行]
engineering:
  explanation:
    zh: 新集成应以 OpenAI Agent Evals 的 dataset→eval run 流程、LangSmith POST /runs 与 experiment 比较、Braintrust experiment 回归、DeepEval evaluate() 批次、SWE-bench Verified harness 为可映射 API 形状，再用 Moonweave 本地 EvaluationRun 记录规范引用、数据快照、活动引用与结果摘要。trace 调试属于评估证据输入；eval run 属于可复现评估运行记录，但不自动等于 Verdict。
    en: "New integrations should treat OpenAI Agent Evals dataset→eval run flow, LangSmith POST /runs and experiment comparison, Braintrust experiment regression, DeepEval evaluate() batches, and SWE-bench Verified harness as mappable API shapes, then persist Moonweave-local EvaluationRun records with specification reference, data snapshot, activity reference, and result summary. Trace debugging is evaluation-evidence input; an eval run is a reproducible evaluation-run record but does not automatically equal a Verdict."
    ja: 新しい統合では OpenAI Agent Evals dataset→eval run、LangSmith POST /runs と experiment 比較、Braintrust experiment 回帰、DeepEval evaluate() バッチ、SWE-bench Verified harness を写像可能 API 形状として扱い、Moonweave ローカル EvaluationRun で仕様参照、データスナップショット、活動参照、結果要約を保存します。trace デバッグは評価証拠入力、eval run は再現可能評価実行記録ですが、Verdict と自動的には同一になりません。
  typical_input:
    - description: OpenAI eval run kickoff selecting dataset snapshot and graders.
      format: |
        {
          "run_id": "ticket-category-nightly-104",
          "dataset_snapshot_ref": "dataset:ticket-category-golden-v2@sha256:6bc1",
          "grader_refs": ["EvaluationCriterion:category-match:v2"],
          "mode": "repeatable-regression"
        }
      source_claims: [claim-run-agent-evals, claim-run-design]
    - description: LangSmith experiment run creation for regression comparison.
      format: |
        POST https://api.smith.langchain.com/runs
        {
          "name": "ticket-classifier-v3",
          "run_type": "chain",
          "reference_example_id": "monitor-no-power"
        }
      source_claims: [claim-run-langsmith]
  typical_output:
    - description: Moonweave-local EvaluationRun record after repeatable workflow completion.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "run_id": "eval-run-104",
          "specification_ref": "EvaluationSpecification:ticket-category:v2",
          "data_manifest_ref": "dataset:ticket-category-golden-v2",
          "activity_ref": "EvaluationActivity:nightly-104",
          "status": "completed",
          "result_summary_ref": "artifact:eval-run-104-summary"
        }
      source_claims: [claim-run-agent-evals, claim-run-design]
  reference_implementations:
    - name: OpenAI Evaluate agent workflows
      url: https://platform.openai.com/docs/guides/evals
      description: Datasets, graders, and eval runs for repeatable agent evaluation.
    - name: LangSmith
      url: https://docs.smith.langchain.com
      description: POST /runs, experiments, and dataset-backed evaluation runs.
    - name: SWE-bench Verified
      url: https://www.swebench.com/
      description: Verified instances and pass-rate harness runs.
structure:
  identity_keys: [run_id]
  fields:
    - id: run_id
      labels: {zh: 运行标识, en: Run identifier, ja: 実行識別子}
      definitions:
        zh: 唯一标识一次可引用评估运行记录的稳定值，而非规范标识。
        en: Stable value uniquely identifying one referencable evaluation-run record rather than a specification.
        ja: 仕様ではなく、一件の参照可能な評価実行記録を一意に識別する安定値。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: eval-run-104
      allowed_values: []
      source_claims: [claim-run-design]
    - id: specification_ref
      labels: {zh: 评估规范引用, en: Evaluation specification reference, ja: 評価仕様参照}
      definitions:
        zh: 指向本次运行实际使用的 EvaluationSpecification 及其版本的引用。
        en: Reference to the EvaluationSpecification and version actually used by this run.
        ja: この実行で実際に使用された EvaluationSpecification とその版への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: EvaluationSpecification:ticket-category:v2
      allowed_values: []
      source_claims: [claim-run-design]
    - id: data_manifest_ref
      labels: {zh: 数据清单引用, en: Data manifest reference, ja: データ・マニフェスト参照}
      definitions:
        zh: 指向本次运行消费的测试集、样本清单或等价不可变数据版本的引用。
        en: "Reference to the test set, sample manifest, or equivalent immutable data version consumed by this run."
        ja: この実行が消費したテスト集合、サンプル・マニフェスト、同等の不変データ版への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dataset:ticket-category-golden-v2
      allowed_values: []
      source_claims: [claim-run-agent-evals, claim-run-design]
    - id: activity_ref
      labels: {zh: 评估活动引用, en: Evaluation activity reference, ja: 評価活動参照}
      definitions:
        zh: 指向生成或执行该记录的有时间边界 EvaluationActivity 的引用。
        en: Reference to the time-bounded EvaluationActivity that generated or executed this record.
        ja: この記録を生成又は実行した時間境界を持つ EvaluationActivity への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: EvaluationActivity:nightly-104
      allowed_values: []
      source_claims: [claim-run-provenance, claim-run-design]
    - id: status
      labels: {zh: 运行状态, en: Run status, ja: 実行状態}
      definitions:
        zh: 服务或本地评估器对该次运行报告的生命周期状态，不是质量 Verdict。
        en: Lifecycle state reported by the service or local evaluator for this run; it is not a quality Verdict.
        ja: サービス又はローカル評価器がこの実行について報告するライフサイクル状態であり、品質 Verdict ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: completed
      allowed_values: [queued, running, completed, failed, canceled]
      source_claims: [claim-run-agent-evals]
    - id: result_summary_ref
      labels: {zh: 结果摘要引用, en: Result summary reference, ja: 結果要約参照}
      definitions:
        zh: 指向该次运行产生的计数、Verdict 或其他已解释结果摘要的引用；不能以原始遥测代替。
        en: "Reference to counts, Verdicts, or another interpreted result summary produced by the run; raw telemetry cannot substitute for it."
        ja: 実行が生成した集計、Verdict、他の解釈済み結果要約への参照。生テレメトリで代用してはなりません。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: artifact:eval-run-104-summary
      allowed_values: []
      source_claims: [claim-run-agent-evals, claim-run-design]
  constraints:
    - id: evaluation-run-pins-governing-inputs
      severity: error
      expression_language: plain
      expression: specification_ref and data_manifest_ref must identify immutable versions or a retained immutable snapshot for the inputs actually used by the run.
      explanation:
        zh: 仅记录“使用最新规范”会破坏历史结果的可复现性。
        en: Recording only use the latest specification destroys reproducibility of a historical result.
        ja: 「最新仕様を使用」とだけ記録すると、過去の結果の再現可能性を損ないます。
      source_claims: [claim-run-design]
    - id: evaluation-run-completed-has-interpreted-result
      severity: error
      expression_language: plain
      expression: If status is completed, result_summary_ref must resolve to a retained interpreted result summary or Verdict; a raw Trace, Span, Log Record, or unbound OpenTelemetry Metric is insufficient.
      explanation:
        zh: 完成状态必须留下可解释的评估结果，而不是仅留下运行时遥测。
        en: A completed status must retain an interpretable evaluation result rather than only runtime telemetry.
        ja: 完了状態には、実行時テレメトリだけでなく解釈可能な評価結果を残さなければなりません。
      source_claims: [claim-run-design]
    - id: evaluation-run-status-is-not-verdict
      severity: error
      expression_language: plain
      expression: status describes execution lifecycle only and must not be used as pass, fail, safe, or unsafe quality judgment without a criterion-bound Verdict.
      explanation:
        zh: “运行失败”与“候选不符合质量准则”是不同事实。
        en: The run failed and the candidate did not satisfy a quality criterion are different facts.
        ja: 「実行が失敗した」と「候補が品質基準を満たさなかった」は異なる事実です。
      source_claims: [claim-run-design]
  required_relations:
    - id: evaluation-run-uses-specification
      direction: outgoing
      predicate: uses
      target_concept_id: EvaluationSpecification
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每次运行必须明确引用恰好一版实际采用的评估规范。
        en: Each run must explicitly reference exactly one specification version actually used.
        ja: 各実行は実際に使用した評価仕様版をちょうど一つ明示的に参照しなければなりません。
      source_claims: [claim-run-design]
    - id: evaluation-run-was-generated-by-activity
      direction: outgoing
      predicate: was_generated_by
      target_concept_id: EvaluationActivity
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 运行记录由一个有时间边界的 EvaluationActivity 生成，从而不把记录和活动混为一物。
        en: "A run record is generated by one time-bounded EvaluationActivity, so the record is not conflated with the activity."
        ja: 実行記録は一つの時間境界を持つ EvaluationActivity により生成され、記録と活動を混同しません。
      source_claims: [claim-run-provenance, claim-run-design]
examples:
  - id: evaluation-run-example-openai-eval-run
    labels:
      zh: OpenAI Agent Evals eval run
      en: OpenAI Agent Evals eval run
      ja: OpenAI Agent Evals eval run
    descriptions:
      zh: OpenAI dataset ticket-category-golden-v2 上运行 eval run nightly-104；string_check grader 汇总 score 与 Verdict；EvaluationRun 固定 specification_ref、data_manifest_ref 与 result_summary_ref，status=completed 不等于 Verdict pass。
      en: OpenAI eval run nightly-104 on dataset ticket-category-golden-v2; string_check grader aggregates Score and Verdict; EvaluationRun pins specification_ref, data_manifest_ref, and result_summary_ref; status=completed is not the same as Verdict pass.
      ja: OpenAI dataset ticket-category-golden-v2 で eval run nightly-104 を実行。string_check grader が Score と Verdict を集約。EvaluationRun が specification_ref、data_manifest_ref、result_summary_ref を固定。status=completed は Verdict pass と同一ではありません。
    example_source:
      product: OpenAI Agent Evals
      url: https://platform.openai.com/docs/guides/evals
      version: datasets and eval runs
    field_values:
      run_id: nightly-104
      specification_ref: EvaluationSpecification:ticket-category:v2
      data_manifest_ref: dataset:ticket-category-golden-v2
      activity_ref: EvaluationActivity:nightly-104
      status: completed
      result_summary_ref: artifact:eval-run-104-summary
    related_node_ids: [EvaluationRun, EvaluationSpecification, EvaluationActivity, Score, Verdict]
    related_relation_ids: [evaluation-run-uses-specification, evaluation-run-was-generated-by-activity]
    source_claims: [claim-run-agent-evals, claim-run-design]
  - id: evaluation-run-example-langsmith-experiment
    labels:
      zh: LangSmith experiment 回归运行
      en: LangSmith experiment regression run
      ja: LangSmith experiment 回帰実行
    descriptions:
      zh: LangSmith experiment ticket-classifier-v3 对 dataset 中 monitor-no-power 样本运行 classifier；POST /runs 创建 run 后 experiment 比较 baseline 与 candidate；EvaluationRun 记录 data_manifest_ref 与 result_summary_ref 供版间回归。
      en: LangSmith experiment ticket-classifier-v3 runs classifier on monitor-no-power dataset item; POST /runs creates run then experiment compares baseline vs candidate; EvaluationRun records data_manifest_ref and result_summary_ref for version regression.
      ja: LangSmith experiment ticket-classifier-v3 が dataset の monitor-no-power サンプルで classifier を実行。POST /runs で run 作成後 experiment が baseline と candidate を比較。EvaluationRun が data_manifest_ref と result_summary_ref を記録し版間回帰を可能にします。
    example_source:
      product: LangSmith
      url: https://docs.smith.langchain.com
      version: runs API and experiments
    field_values:
      run_id: langsmith-exp-v3-104
      specification_ref: EvaluationSpecification:ticket-classifier:v3
      data_manifest_ref: dataset:langsmith-ticket-golden
      activity_ref: EvaluationActivity:langsmith-exp-v3
      status: completed
      result_summary_ref: artifact:langsmith-exp-v3-summary
    related_node_ids: [EvaluationRun, EvaluationSpecification, Score]
    related_relation_ids: [evaluation-run-uses-specification]
    source_claims: [claim-run-langsmith, claim-run-design]
  - id: evaluation-run-example-swebench-harness
    labels:
      zh: SWE-bench Verified harness 运行
      en: SWE-bench Verified harness run
      ja: SWE-bench Verified harness 実行
    descriptions:
      zh: EvaluationScenario swebench-verified 引用 django__django-11099；agent 生成 patch 后 harness 运行测试；EvaluationRun agent-patch-17 记录 instance_id、pass_rate 摘要与 Verdict resolved 引用；基准语义保留在适配器。
      en: EvaluationScenario swebench-verified cites django__django-11099; harness runs tests on agent patch; EvaluationRun agent-patch-17 records instance_id, pass_rate summary, and Verdict resolved reference; benchmark semantics stay in adapter.
      ja: EvaluationScenario swebench-verified が django__django-11099 を引用。agent patch で harness がテスト実行。EvaluationRun agent-patch-17 が instance_id、pass_rate 要約、Verdict resolved 参照を記録。ベンチマーク意味はアダプターに残ります。
    example_source:
      product: SWE-bench Verified
      url: https://www.swebench.com/
      version: verified instances and harness
    field_values:
      run_id: agent-patch-17
      specification_ref: EvaluationScenario:swebench-verified
      data_manifest_ref: benchmark:swebench-verified#django__django-11099
      activity_ref: EvaluationActivity:agent-patch-17
      status: completed
      result_summary_ref: artifact:swebench-pass-rate-17
    related_node_ids: [EvaluationRun, EvaluationScenario, Score, Verdict]
    related_relation_ids: [evaluation-run-uses-specification]
    source_claims: [claim-run-swebench, claim-run-design]
  - id: evaluation-run-counterexample-status-only
    labels:
      zh: 只有运行状态没有结果摘要
      en: Run status without result summary
      ja: 結果要約のない実行状態
    descriptions:
      zh: status=completed 但 result_summary_ref 为空且仅有 trace span 遥测；不能登记为已完成 EvaluationRun，因为缺少可解释的 Score 或 Verdict 摘要。
      en: status=completed but result_summary_ref is empty with only trace span telemetry; cannot register as completed EvaluationRun because interpretable Score or Verdict summary is missing.
      ja: status=completed だが result_summary_ref が空で trace span テレメトリのみ。解釈可能な Score 又は Verdict 要約がないため完了 EvaluationRun として登録できません。
    example_source:
      product: Moonweave evaluation boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: run status vs verdict boundary
    field_values:
      run_id: null
      specification_ref: null
      data_manifest_ref: null
      activity_ref: null
      status: completed
      result_summary_ref: null
    related_node_ids: [EvaluationRun, Verdict]
    related_relation_ids: []
    source_claims: [claim-run-design]
  - id: evaluation-run-boundary-spec-versus-run
    labels:
      zh: 规范与运行记录的边界
      en: Boundary between specification and run record
      ja: 仕様と実行記録の境界
    descriptions:
      zh: EvaluationSpecification ticket-category:v2 声明 testing_criteria 与 dataset；EvaluationRun nightly-104 才是实际执行记录。静态规范不能冒充已完成运行。
      en: EvaluationSpecification ticket-category:v2 declares testing_criteria and dataset; EvaluationRun nightly-104 is the actual execution record. A static specification cannot impersonate a completed run.
      ja: EvaluationSpecification ticket-category:v2 が testing_criteria と dataset を宣言。EvaluationRun nightly-104 が実際の実行記録。静的仕様は完了実行になりすませません。
    example_source:
      product: OpenAI Agent Evals
      url: https://platform.openai.com/docs/guides/evals
      version: specification vs eval run
    field_values:
      run_id: nightly-104
      specification_ref: EvaluationSpecification:ticket-category:v2
      activity_ref: EvaluationActivity:nightly-104
      status: completed
    related_node_ids: [EvaluationRun, EvaluationSpecification, EvaluationActivity]
    related_relation_ids: [evaluation-run-uses-specification, evaluation-run-was-generated-by-activity]
    source_claims: [claim-run-provenance, claim-run-design]
parent_relation: null
relations:
  - id: EvaluationRun-uses-EvaluationSpecification
    predicate: uses
    target: concept:EvaluationSpecification
    direction: source-to-target
    relation_kind: semantic
    labels: {zh: 运行使用评估规范, en: evaluation run uses specification, ja: 評価実行が仕様を使用する}
    definitions:
      zh: 该运行记录声明本次执行实际采用的唯一版本化规范。
      en: The run record declares the one versioned specification actually applied by that execution.
      ja: 実行記録は、その実行が実際に適用した一つの版管理された仕様を宣言します。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: governs, labels: {zh: 规范约束运行, en: specification governs run, ja: 仕様が実行を規定する}}
    conditions:
      - id: run-uses-specification-version-condition
        severity: error
        expression_language: plain
        expression: Link only when specification_ref identifies the exact version applied to this run.
        explanations:
          zh: 不得仅因名称相近把运行关联到某一规范。
          en: Do not link a run to a specification merely because their names are similar.
          ja: 名前が似ているだけで実行と仕様を結び付けてはならない。
        source_claims: [claim-run-design]
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-run-design]
    distinct_fact_rationale:
