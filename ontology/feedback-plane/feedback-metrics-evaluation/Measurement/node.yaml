source_claims:
  - id: claim-measurement-001
    source: eng-std-opentelemetry-metrics-api
    supports: Measurement is grounded in the OpenTelemetry Metrics API definition of a data point reported to the SDK that encapsulates a value and Attributes; Moonweave models that report as one information record and keeps its identity separate from Metric.
    locator: Metrics API > Measurement > value and Attributes
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-measurement-002
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluator outputs may include numerical scores and explanatory comments, but do not define a universal confidence field for every measurement. Moonweave's confidence scalar records uncertainty about an observed Measurement and is deliberately separate from the measured value and any adjudicative Score.
    locator: "Evaluation concepts > Evaluators > Evaluator outputs: key, score or value, and optional comment"
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-measurement-003
    source: eng-std-opentelemetry-metrics-api
    supports: Measurement positive case directly uses the OpenTelemetry Metrics API definition of a Measurement as one value plus Attributes reported to the SDK; Moonweave adds the record identity used in this example.
    locator: Metrics API > Measurement > value and Attributes
    evidence_kind: normative
    confidence: high
    review_status: accepted
