          zh: latency measurement m-77 的 attempt_id=attempt-3，时间区间落在该尝试内。
          en: latency measurement m-77 has attempt_id=attempt-3 and its interval lies within that attempt.
          ja: latency measurement m-77 は attempt_id=attempt-3 で区間も当該試行内です。
        field_values: {}
