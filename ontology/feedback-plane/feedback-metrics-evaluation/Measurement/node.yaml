schema: moonweave.ai/ontology-node/v1
id: Measurement
kind: concept
status: accepted
labels:
  zh: 测量结果
  en: measurement result
  ja: 測定結果
semantics:
  short_definition:
    zh: 测量结果是一次评估运行中对某项指标得到的带上下文观测记录。
    en: A measurement result is a contextual observation of a metric within one evaluation run.
    ja: 測定結果は一回の評価実行で指標を観測した文脈付き記録です。
  definition:
    zh: Measurement 是一次被观察的数据点信息记录，由所属 EvaluationRun、所遵循的 Metric、被观察对象、时间戳或区间、属性集与数值共同识别；它不同于可复用的 Metric 定义，也不同于经过判定解释的 Score。
    en: A Measurement is an observed data point information record identified by its EvaluationRun, Metric, observed subject, timestamp or interval, attribute set, and value; it is distinct from the reusable Metric definition and from an interpreted Score.
    ja: Measurement は EvaluationRun、Metric、observed subject、timestamp または interval、attribute set、value で識別される observed data point の情報記録であり、再利用可能な Metric 定義や解釈済み Score とは異なります。
  why_needed:
    zh: 完整测量上下文支持重算聚合、排查异常值和防止不同单位的数值被错误比较。
    en: Complete measurement context supports re-aggregation, outlier diagnosis, and prevention of comparisons across incompatible units.
    ja: 完全な測定文脈は再集約、外れ値診断、非互換単位の誤比較を可能にします。
  includes:
    - zh: 包括某次工具调用的延迟点、某次运行的令牌总数和一个时间窗口的成功计数。
      en: Includes a tool-call latency point, a run token total, and a success count for a time window.
      ja: ツール呼出し遅延点、実行トークン総数、時間窓成功数を含みます。
  excludes:
    - zh: 不包括没有观察值的 Metric 定义，也不包括把测量映射为优劣等级的 Score。
      en: Excludes a Metric definition without an observed value and a Score mapping measurements to a quality judgment.
      ja: 観測値のない Metric 定義と、測定を品質判断へ写像する Score は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: confidence
      labels:
        zh: 置信度
        en: Confidence
        ja: 信頼度
      datatype: number
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        en: captures confidence as a number scalar on agent-system artifacts, resources, events, policies, or adapter records.
        zh: 该数据字段记录对应的标量值，用于智能体系统中的产物、资源、事件、策略或适配记录。
        ja: このデータ項目は対応するスカラー値を記録し、エージェントシステム内の成果物、資源、イベント、ポリシー、適配記録で使います。
      allowed_values: []
      pattern: null
      example_value: 0.9
      source_claims:
        - claim-measurement-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: Measurement-example-positive-manual-001
    kind: positive
    labels:
      zh: 测量结果正例
      en: Positive measurement result case
      ja: 測定結果の正例
    scenario_id: null
    descriptions:
      zh: measurement m-77 记录 run-884 中 tool-call-14 的 duration=1.82s、时间戳和 tool.name 属性。
      en: measurement m-77 records duration=1.82s for tool-call-14 in run-884 with timestamp and tool.name.
      ja: measurement m-77 は run-884 の tool-call-14 について duration=1.82s、時刻、tool.name を記録します。
    field_values: {}
    related_node_ids:
      - Measurement
    related_relation_ids: []
    expected_result:
      zh: 该记录应作为 EvaluationRun 的测量结果。
      en: The record is a measurement result of the EvaluationRun.
      ja: この記録は EvaluationRun の測定結果です。
    why_valid_or_invalid:
      zh: 它绑定指标、对象、运行、时间、属性和值。
      en: It binds metric, subject, run, time, attributes, and value.
      ja: 指標、対象、実行、時刻、属性、値を結びます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-measurement-003
  - id: Measurement-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 测量结果边界例
      en: Boundary measurement result case
      ja: 測定結果の境界例
    scenario_id: null
    descriptions:
      zh: 定义 agent.tool.duration 的单位为秒并规定 Histogram 聚合，但没有实际值或时间。
      en: A definition sets seconds and Histogram aggregation for agent.tool.duration but has no value or time.
      ja: agent.tool.duration に秒と Histogram 集約を定めますが実値や時刻がありません。
    field_values: {}
    related_node_ids:
      - Measurement
    related_relation_ids: []
    expected_result:
      zh: 该对象是 Metric 定义，不能作为 Measurement。
      en: The object is a Metric definition and cannot be a Measurement.
      ja: これは Metric 定義で Measurement ではありません。
    why_valid_or_invalid:
      zh: 缺少一次观察所需的值、对象和发生时间。
      en: It lacks the value, subject, and occurrence time required for an observation.
      ja: 一回の観測に必要な値、対象、発生時刻がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-measurement-004
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: Measurement-observes-RunAttempt
    predicate: observes
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 观测运行尝试
      en: observes run attempt
      ja: 実行試行を観測
    definitions:
      zh: Measurement 标明其值在某一具体 RunAttempt 上取得，使重试之间的遥测不会被错误合并。
      en: Measurement identifies the concrete RunAttempt on which its value was observed so telemetry from different retries is not incorrectly merged.
      ja: Measurement は値を観測した具体的 RunAttempt を示し、異なる再試行のテレメトリ誤統合を防ぎます。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_observes
      labels:
        zh: 反向：观测运行尝试
        en: "inverse: observes run attempt"
        ja: 逆方向：実行試行を観測
