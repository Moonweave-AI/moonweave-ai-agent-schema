schema: moonweave.ai/ontology-node/v1
id: Score
kind: concept
status: accepted
labels:
  zh: 评分结果
  en: score result
  ja: 評価スコア
semantics:
  short_definition:
    zh: 评分结果是按评估判据解释后的数值、等级、类别或合否测量结果。
    en: A score result is a measurement interpreted by an evaluation criterion as numeric, ordinal, categorical, or pass/fail.
    ja: 評価スコアは評価判定基準で数値、順序、分類、合否として解釈された測定結果です。
  definition:
    zh: 评分结果是 Measurement 的判定性子类；它在测量身份之外必须绑定所用判据或量规以及评分尺度，表示对质量的判断，而 Metric 只定义被测量量。
    en: A score result is an adjudicative subtype of Measurement that additionally binds the criterion or rubric and scoring scale used to express a quality judgment, whereas Metric only defines the measured quantity.
    ja: 評価スコアは Measurement の判定的下位型で、判定基準またはルーブリックと採点尺度を追加で結び品質判断を表し、Metric は測定量のみを定義します。
  why_needed:
    zh: 将 Score 保持为 Measurement 子类既保留其运行与对象出处，又避免所有遥测值都被误称为评分。
    en: Keeping Score as a Measurement subtype preserves run and subject provenance without calling every telemetry value a score.
    ja: Score を Measurement 下位型にすると実行・対象の出所を保ち、全テレメトリ値をスコアと誤称しません。
  includes:
    - zh: 包括 correctness=0.8、质量等级 B、类别 unsafe 或合否 false。
      en: Includes correctness=0.8, quality grade B, category unsafe, or pass/fail false.
      ja: correctness=0.8、品質 B、unsafe 分類、合否 false を含みます。
  excludes:
    - zh: 不包括未经判据解释的 latency=1.8s，也不包括产生分数的 Rubric。
      en: Excludes uninterpreted latency=1.8s and the Rubric that generated the score.
      ja: 未解釈の latency=1.8s とスコアを生む Rubric は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: value
      labels:
        zh: 分值
        en: Score value
        ja: スコア値
      datatype: number
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        en: captures score as a number scalar on agent-system artifacts, resources, events, policies, or adapter records.
        zh: 该数据字段记录对应的标量值，用于智能体系统中的产物、资源、事件、策略或适配记录。
        ja: このデータ項目は対応するスカラー値を記録し、エージェントシステム内の成果物、資源、イベント、ポリシー、適配記録で使います。
      allowed_values: []
      pattern: null
      example_value: 0.85
      source_claims:
        - claim-score-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: Score-example-positive-manual-001
    kind: positive
    labels:
      zh: 评分结果正例
      en: Positive score result case
      ja: 評価スコアの正例
    scenario_id: null
    descriptions:
      zh: 评估器按 groundedness 量规把回答判为 3/4，并绑定 criterion groundedness-v2。
      en: An evaluator rates an answer 3/4 under the groundedness rubric and binds criterion groundedness-v2.
      ja: 評価器は groundedness ルーブリックで回答を 3/4 とし criterion groundedness-v2 を結びます。
    field_values: {}
    related_node_ids:
      - Score
    related_relation_ids: []
    expected_result:
      zh: 该记录应识别为 Score，且仍保留 Measurement 出处。
      en: The record is a Score while retaining Measurement provenance.
      ja: この記録は Score であり Measurement の出所も保持します。
    why_valid_or_invalid:
      zh: 它是对特定对象按明确判据作出的带尺度判断。
      en: It is a scaled judgment of a subject under an explicit criterion.
      ja: 明示的判定基準による対象の尺度付き判断です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-score-003
  - id: Score-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 评分结果边界例
      en: Boundary score result case
      ja: 評価スコアの境界例
    scenario_id: null
    descriptions:
      zh: 遥测点记录一次调用耗时 1.82 秒，但没有判据、量规或质量尺度。
      en: A telemetry point records latency of 1.82 seconds but has no criterion, rubric, or quality scale.
      ja: テレメトリ点は遅延 1.82 秒を記録しますが判定基準、ルーブリック、品質尺度がありません。
    field_values: {}
    related_node_ids:
      - Score
    related_relation_ids: []
    expected_result:
      zh: 该点是 Measurement，但不是 Score。
      en: The point is a Measurement but not a Score.
      ja: この点は Measurement ですが Score ではありません。
    why_valid_or_invalid:
      zh: 物理或运行量的观测值没有被解释为质量判断。
      en: The observed operational quantity has not been interpreted as a quality judgment.
      ja: 運用量の観測値は品質判断として解釈されていません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-score-004
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: Score-is_a-Measurement
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: Score 是按判据或量规解释过的 Measurement 子类；它保留运行、对象、值和出处，并增加判断尺度。
    en: Score is a Measurement subtype interpreted under a criterion or rubric; it retains run, subject, value, and provenance while adding a judgment scale.
    ja: Score は判定基準またはルーブリックで解釈された Measurement 下位型で、実行、対象、値、出所を保ち判断尺度を加えます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
    en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
    ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：是一种
      en: "inverse: is a"
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: Score-is_a-Measurement-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive case for is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: score s-18 记录 run-884 对 answer-5 的 groundedness=3/4，并引用 rubric-v2。
        en: score s-18 records groundedness=3/4 for answer-5 in run-884 and references rubric-v2.
        ja: score s-18 は run-884 の answer-5 に groundedness=3/4 を記録し rubric-v2 を参照します。
      field_values: {}
      related_node_ids:
        - Score
        - Measurement
      related_relation_ids:
        - Score-is_a-Measurement
      expected_result:
        zh: s-18 同时是 Score 和 Measurement。
        en: s-18 is both Score and Measurement.
        ja: s-18 は Score かつ Measurement です。
      why_valid_or_invalid:
        zh: 它具备测量出处和值，并额外具备判据与评分尺度。
        en: It has measurement provenance and value plus criterion and scoring scale.
        ja: 測定出所と値に加え判定基準と採点尺度を持ちます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-score-005
    - id: Score-is_a-Measurement-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: measurement m-77 仅记录 token_count=1932，没有质量判据。
        en: measurement m-77 only records token_count=1932 and has no quality criterion.
        ja: measurement m-77 は token_count=1932 のみで品質判定基準がありません。
      field_values: {}
      related_node_ids:
        - Score
        - Measurement
      related_relation_ids:
        - Score-is_a-Measurement
      expected_result:
        zh: m-77 是 Measurement，但不得归为 Score。
        en: m-77 is a Measurement but not a Score.
        ja: m-77 は Measurement ですが Score ではありません。
      why_valid_or_invalid:
        zh: 运行量观测没有被判据解释为质量判断。
        en: The operational observation is not interpreted as a quality judgment.
        ja: 運用量観測は品質判断として解釈されていません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-score-006
  source_claims:
    - claim-score-007
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: Score-assessed_against-SuccessCriterion
    predicate: assessed_against
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 按成功判据评定
      en: assessed against success criterion
      ja: 成功基準で判定
    definitions:
      zh: Score 引用把其证据和值解释为通过或未通过的 SuccessCriterion 版本；关系不把成功判据复制为分数。
      en: A Score refers to the SuccessCriterion version that interprets its evidence and value as pass or fail; the relation does not copy the criterion into the score.
      ja: Score は証拠と値を合否へ解釈する SuccessCriterion 版を参照し、成功基準をスコアへ複製しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_assessed_against
      labels:
        zh: 反向：按成功判据评定
        en: "inverse: assessed against success criterion"
        ja: 逆方向：成功基準で判定
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: Score-assessed_against-SuccessCriterion-example-positive-manual-001
        kind: positive
        labels:
          zh: 按成功判据评定正例
          en: Positive case for assessed against success criterion
          ja: 成功基準で判定の正例
        scenario_id: null
        descriptions:
          zh: score pass=false 引用 success-criterion-v4，其阈值为 groundedness>=0.85。
          en: score pass=false references success-criterion-v4 with groundedness threshold 0.85.
          ja: score pass=false は groundedness 閾値 0.85 の success-criterion-v4 を参照します。
        field_values: {}
        related_node_ids:
          - Score
          - SuccessCriterion
        related_relation_ids:
          - Score-assessed_against-SuccessCriterion
        expected_result:
          zh: 应保留 Score 按该成功判据评定的事实。
          en: The Score-to-SuccessCriterion assessment fact is retained.
          ja: Score が当該成功基準で判定された事実を保持します。
        why_valid_or_invalid:
          zh: 明确判据版本后可重算并解释该失败结论。
          en: The criterion version makes the failure reproducible and explainable.
          ja: 判定基準版により失敗結論を再現・説明できます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-score-008
      - id: Score-assessed_against-SuccessCriterion-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 按成功判据评定边界例
          en: Boundary case for assessed against success criterion
          ja: 成功基準で判定の境界例
        scenario_id: null
        descriptions:
          zh: score groundedness=0.81 与 success-criterion-v5 同处一份报告，但运行实际使用 v4。
          en: score groundedness=0.81 co-occurs with success-criterion-v5 in a report, but the run used v4.
          ja: score groundedness=0.81 と v5 が同じ報告にありますが実行は v4 を使用しました。
        field_values: {}
        related_node_ids:
          - Score
          - SuccessCriterion
        related_relation_ids:
          - Score-assessed_against-SuccessCriterion
        expected_result:
          zh: 不得建立 Score assessed_against v5 的关系。
          en: No assessed_against relation to v5 is asserted.
          ja: v5 への assessed_against 関係を主張しません。
        why_valid_or_invalid:
          zh: 报告共现不能替代运行时记录的判据版本。
          en: Report co-occurrence cannot replace the criterion version recorded at run time.
          ja: 報告内共起は実行時の判定基準版記録の代わりになりません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-score-009
    source_claims:
      - claim-score-010
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:SuccessCriterion
review:
