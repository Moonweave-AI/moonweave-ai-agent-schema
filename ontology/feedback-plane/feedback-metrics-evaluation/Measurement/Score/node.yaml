source_claims:
  - id: claim-score-001
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluators return feedback containing metric key and score or categorical value; Moonweave models that adjudicated value as Score, a specialized Measurement.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-score-002
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluators return feedback whose metric key is paired with a numerical score or categorical value and optional reasoning. The Score.value field records that adjudicative result; Moonweave separately binds the criterion, rubric, and scale so the number is not mistaken for a raw Measurement.
    locator: "Evaluation concepts > Evaluators > Evaluator outputs: key, score or value, and optional comment"
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-score-003
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluator outputs explicitly contain metric key and score or categorical value.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-score-004
    source: eng-fw-langsmith-docs
    supports: OpenTelemetry measurements include ordinary numeric observations, while LangSmith scores are evaluator judgments.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-score-005
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluator outputs combine feedback key, score or categorical value, and optional explanation for an evaluated run.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-score-006
    source: eng-fw-langsmith-docs
    supports: OpenTelemetry Measurements cover ordinary observed values, whereas LangSmith Scores are evaluator judgments.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-score-007
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluator feedback attaches a metric key and score or categorical value to an evaluated run, supporting Score as an adjudicated measurement result.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-score-008
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluator outputs are meaningful only relative to evaluator logic and configured scoring criteria.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-score-009
    source: eng-fw-langsmith-docs
    supports: Evaluation reproducibility depends on the actual evaluator configuration used by the experiment, not nearby metadata.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-score-010
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluators apply configured judging logic and return score values; Moonweave records the criterion version used for that judgment.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
