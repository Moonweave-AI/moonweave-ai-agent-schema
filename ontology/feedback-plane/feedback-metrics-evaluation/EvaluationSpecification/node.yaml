    source_type: official-doc
    relevance: Datasets, graders, and eval runs as repeatable evaluation workflow.
  - id: langsmith-spec
    title: LangSmith Documentation
    url: https://docs.smith.langchain.com
    source_type: official-doc
    relevance: Datasets, evaluators, and experiment specifications.
  - id: deepeval-spec
    title: DeepEval Documentation
    url: https://docs.confident-ai.com
    source_type: official-doc
    relevance: Test case suites and metric configurations.
  - id: swebench-spec
    title: SWE-bench Verified
    url: https://www.swebench.com/
    source_type: official-site
    relevance: Benchmark adapter specification for verified instances.
  - id: evaluation-specification-design
    title: Moonweave evaluation specification design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Versioned data-and-criterion declaration as EvaluationSpecification Entity.
source_claims:
  - id: claim-spec-agent-evals
    source: openai-agent-evals-spec
    supports: OpenAI guidance uses datasets and eval runs when repeatability is required.
    locator: Evaluate agent workflows — datasets and eval runs
    evidence_kind: official
    confidence: high
  - id: claim-spec-deepeval
    source: deepeval-spec
    supports: DeepEval organizes LLMTestCase batches with named metrics as repeatable evaluation specifications.
    locator: LLMTestCase; evaluate()
    evidence_kind: official
    confidence: high
  - id: claim-spec-swebench
    source: swebench-spec
    supports: SWE-bench Verified provides verified instances and harness specification shapes for benchmark adapters.
    locator: Verified benchmark instances
    evidence_kind: official
    confidence: high
  - id: claim-spec-graders-run
    source: openai-agent-evals-spec
    supports: OpenAI grader configurations materialize from stored criterion definitions.
    locator: Graders — string_check, model_grader
    evidence_kind: official
    confidence: high
  - id: claim-spec-provenance
    source: evaluation-specification-design
    supports: A versioned specification governs occurred runs through explicit version pinning.
    locator: Specification governs run boundary
    evidence_kind: design-inference
    confidence: high
  - id: claim-spec-design
    source: evaluation-specification-design
    supports: A versioned data-and-criterion declaration is modeled as EvaluationSpecification rather than an occurred activity.
    locator: Evaluation specification boundary
    evidence_kind: design-inference
    confidence: high
