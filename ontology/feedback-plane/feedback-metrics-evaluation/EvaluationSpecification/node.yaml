schema: moonweave.ai/ontology-node/v1
id: EvaluationSpecification
kind: concept
status: review
labels:
  zh: 评估规范
  en: evaluation specification
  ja: 評価仕様
semantics:
  short_definition:
    zh: 评估规范是对评估对象、数据、方法与判定方式的可版本化约定。
    en: An evaluation specification is a versioned agreement on subjects, data, methods, and adjudication.
    ja: 評価仕様は対象、データ、方法、判定方法について版管理された取り決めです。
  definition:
    zh: 评估规范是一种可复用且可版本化的规范；它以评估问题、对象范围、数据切片、评估器配置和判定结构共同确定身份，而不是某次已经发生的评估运行。
    en: An evaluation specification is a reusable, versioned specification identified by its evaluation question, subject scope, data slice, evaluator configuration, and adjudication structure, rather than by one execution that already occurred.
    ja: 評価仕様は再利用・版管理可能な仕様で、評価課題、対象範囲、データ切片、評価器構成、判定構造で同一性が決まり、実際に行われた一回の評価実行ではありません。
  why_needed:
    zh: 把可复用约定与运行记录分开，才能比较同一规范下的模型版本并说明评分为何可复现。
    en: Separating the reusable contract from run records enables version comparisons under one specification and explains why scores are reproducible.
    ja: 再利用可能な契約と実行記録を分けることで、同一仕様下の版比較とスコア再現性を説明できます。
  includes:
    - zh: 包括评估问题、数据范围、评估器选择、量规与成功判据的版本化组合。
      en: Includes versioned combinations of evaluation questions, data scope, evaluator selection, rubrics, and success criteria.
      ja: 評価課題、データ範囲、評価器選択、ルーブリック、成功基準の版管理された組合せを含みます。
  excludes:
    - zh: 不包括 EvaluationRun 的开始结束时间、某次 Measurement 的值或部署后的修正动作。
      en: Excludes EvaluationRun timestamps, a particular Measurement value, and post-evaluation correction actions.
      ja: EvaluationRun の時刻、特定 Measurement の値、評価後の修正行為は含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - evaluation_specification_id
    - version
  fields:
    - id: evaluation_specification_id
      labels:
        zh: 评估规范标识
        en: evaluation-specification ID
        ja: 評価仕様 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识可被多次评估运行复用的一份评估结构。
        en: Stably identifies one evaluation structure that can be reused by multiple evaluation runs.
        ja: 複数の評価実行で再利用できる一つの評価構造を安定識別します。
      allowed_values: []
      pattern: null
      example_value: eval-spec-27
      source_claims:
        - claim-evaluation-specification-002
    - id: version
      labels:
        zh: 规范版本
        en: specification version
        ja: 仕様版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定数据来源、判据和聚合设置的一致版本，避免运行复用时语义漂移。
        en: Pins one coherent version of data-source, criterion, and aggregation settings so reused runs do not drift semantically.
        ja: data source・criterion・aggregation 設定の一貫した版を固定し、再利用実行の意味 drift を防ぎます。
      allowed_values: []
      pattern: null
      example_value: "12"
      source_claims:
        - claim-evaluation-specification-003
    - id: subject_scope
      labels:
        zh: 被评范围
        en: subject scope
        ja: 評価対象範囲
      datatype: expression
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明本规范可评判的模型、智能体、工具链或版本范围。
        en: Declares the model, agent, toolchain, or version range that this specification can judge.
        ja: 本仕様が判定できる model・agent・toolchain・version 範囲を宣言します。
      allowed_values: []
      pattern: null
      example_value: agent-build-* with checkout capability
      source_claims:
        - claim-evaluation-specification-004
    - id: dataset_ref
      labels:
        zh: 数据集引用
        en: dataset reference
        ja: dataset 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定评估输入及可选参考输出所在的数据来源版本。
        en: Pins the data-source version containing evaluation inputs and optional reference outputs.
        ja: 評価入力と任意の reference output を含む data source 版を固定します。
      allowed_values: []
      pattern: null
      example_value: dataset/orders-v12
      source_claims:
        - claim-evaluation-specification-005
    - id: evaluator_configuration_refs
      labels:
        zh: 评估器配置引用
        en: evaluator-configuration references
        ja: evaluator 構成参照
      datatype: reference-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出执行各项判据的代码、模型裁判、人审或复合评估器配置。
        en: Lists code, model-judge, human-review, or composite evaluator configurations that execute the criteria.
        ja: criterion を実行する code・model judge・human review・composite evaluator 構成を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - evaluator/correctness-v4
        - evaluator/safety-v2
      source_claims:
        - claim-evaluation-specification-006
    - id: aggregation_method
      labels:
        zh: 聚合方法
        en: aggregation method
        ja: 集約方法
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 规定多个判据、样本或评分如何合成为规范级结果；缺失时保留逐项结果。
        en: States how criteria, examples, or scores combine into a specification-level result; absence preserves item-level results.
        ja: 複数 criterion・example・score を仕様レベル結果へ集約する方法を定め、未指定なら項目別結果を保持します。
      allowed_values: []
      pattern: null
      example_value: weighted-mean
      source_claims:
        - claim-evaluation-specification-007
    - id: pass_condition
      labels:
        zh: 通过条件
        en: pass condition
        ja: 合格条件
      datatype: expression
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 把一个或多个判据结果解释为通过、失败或需复核的显式条件。
        en: Explicitly interprets one or more criterion results as pass, fail, or review-required.
        ja: 一つ以上の criterion 結果を pass・fail・review-required と解釈する明示条件です。
      allowed_values: []
      pattern: null
      example_value: correctness >= 0.85 and safety = pass
      source_claims:
        - claim-evaluation-specification-008
  constraints: []
  required_relation_constraints: []
examples:
  - id: EvaluationSpecification-example-positive-manual-001
    kind: positive
    labels:
      zh: 评估规范正例
      en: Positive evaluation specification case
      ja: 評価仕様の正例
    scenario_id: null
    descriptions:
      zh: 团队冻结数据集 v12、正确性评估器 v4 与通过阈值 0.85，形成评估规范 eval-spec-27。
      en: The team freezes dataset v12, correctness evaluator v4, and a 0.85 pass threshold as evaluation specification eval-spec-27.
      ja: データセット v12、正確性評価器 v4、合格閾値 0.85 を評価仕様 eval-spec-27 として固定します。
    field_values:
      evaluation_specification_id: eval-spec-27
      version: "12"
      subject_scope: agent-build-* with checkout capability
      dataset_ref: dataset/orders-v12
      evaluator_configuration_refs:
        - evaluator/correctness-v4
        - evaluator/safety-v2
      aggregation_method: weighted-mean
      pass_condition: correctness >= 0.85 and safety = pass
    related_node_ids:
      - EvaluationSpecification
    related_relation_ids: []
    expected_result:
      zh: 该对象应归入评估规范，并可被多次运行引用。
      en: The object is an evaluation specification reusable by multiple runs.
      ja: この対象は複数実行から再利用される評価仕様です。
    why_valid_or_invalid:
      zh: 身份由版本化问题、数据、评估器和判定结构决定，而非运行时间决定。
      en: Its identity comes from versioned question, data, evaluator, and adjudication, not execution time.
      ja: 同一性は実行時刻でなく版管理された課題、データ、評価器、判定で決まります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-evaluation-specification-009
  - id: EvaluationSpecification-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 评估规范边界例
      en: Boundary evaluation specification case
      ja: 評価仕様の境界例
    scenario_id: null
    descriptions:
      zh: 一次评估任务在 10:00 开始并产生 240 条结果，但未记录所用数据集版本和评估器配置。
      en: An evaluation job starts at 10:00 and emits 240 results but records neither dataset version nor evaluator configuration.
      ja: 評価ジョブは 10 時に開始し 240 結果を出しますが、データセット版と評価器構成を記録しません。
    field_values: {}
    related_node_ids:
      - EvaluationSpecification
    related_relation_ids: []
    expected_result:
      zh: 该对象只能作为不完整的 EvaluationRun，不能据此建立评估规范。
      en: It is only an incomplete EvaluationRun and cannot establish an evaluation specification.
      ja: これは不完全な EvaluationRun にすぎず、評価仕様を成立させません。
    why_valid_or_invalid:
      zh: 发生记录缺少可复用规范的身份要素，运行数量也不能替代规范版本。
      en: An occurrence record lacks reusable specification identity; result count cannot substitute for a specification version.
      ja: 発生記録には再利用仕様の同一性要素がなく、結果件数も仕様版の代用になりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-evaluation-specification-010
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: pending
  method: manual-semantic
  reviewer: null
  reviewed_on: null
  note:
    zh: 该节点仅完成了从现行候选数据到唯一 YAML 树的无损转录；尚未逐项完成人工语义核验，不得据此宣称已审定。
    en: This node has only been transcribed without loss from the current candidate data into the sole YAML tree; item-by-item manual semantic review is still pending.
    ja: このノードは現行候補データから唯一の YAML ツリーへ欠落なく転記した段階であり、項目別の手動意味審査は未完了です。
  sections:
    semantics: pending
    hierarchy: pending
    relations: pending
    structure: pending
    examples: pending
    source_claims: []
source_claims:
  - id: claim-evaluation-specification-001
    source: eng-fw-langsmith-docs
    supports: LangSmith separates datasets and evaluators configured before execution from the experiment created by each evaluation call; Moonweave models that reusable contract as EvaluationSpecification.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-evaluation-specification-002
    source: eng-api-openai-evals
    supports: The OpenAI Evals API creates an evaluation structure first and exposes separate run resources afterward. Moonweave assigns that reusable structure a stable specification identifier.
    locator: OpenAI Evals API 2026 > Create eval and Evals > Runs resources
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-evaluation-specification-003
    source: eng-api-openai-evals
    supports: An eval structure is created before runs and can later be updated or run again. Explicit Moonweave versioning is a reproducibility inference rather than an OpenAI API field requirement.
    locator: OpenAI Evals API 2026 > Create, update, retrieve, and run an eval
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-evaluation-specification-004
    source: eng-api-openai-evals
    supports: OpenAI describes an eval as testing a model's performance and runs it on different models and model parameters. Moonweave generalizes that target boundary to agent-system subjects.
    locator: OpenAI Evals API 2026 > Create eval overview and create-run target model parameters
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-evaluation-specification-005
    source: eng-api-openai-evals
    supports: OpenAI requires data_source_config to define the schema and data required when creating an evaluation run. Moonweave records the resolved versioned source as dataset_ref.
    locator: OpenAI Evals API 2026 > Create eval > data_source_config and item_schema
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-evaluation-specification-006
    source: eng-fw-langsmith-docs
    supports: LangSmith defines reusable evaluators and supports human, code, LLM-as-judge, and pairwise techniques. Moonweave stores the exact configuration references used by a specification.
    locator: LangSmith Evaluation concepts 2026 > Evaluators and Evaluation techniques
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-evaluation-specification-007
    source: eng-fw-langsmith-docs
    supports: LangSmith documents composite evaluators that combine multiple scores through weighted averages or sums and summary evaluators that aggregate a complete experiment.
    locator: LangSmith Evaluation types 2026 > Composite evaluators and Summary evaluators
    evidence_kind: official
    confidence: high
    review_status: pending
  - id: claim-evaluation-specification-008
    source: eng-api-openai-evals
    supports: OpenAI grader definitions include passing labels and comparison operations. Moonweave generalizes those grader-level outcomes into an optional specification-level pass condition.
    locator: OpenAI Evals API 2026 > Create eval > testing_criteria > passing_labels and comparison operations
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-evaluation-specification-009
    source: eng-fw-langsmith-docs
    supports: LangSmith documents selecting a dataset and defining evaluators before running an experiment, supporting the reusable-specification boundary.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-evaluation-specification-010
    source: eng-fw-langsmith-docs
    supports: LangSmith treats each evaluate invocation as an experiment and separately requires dataset and evaluator definitions, so a run alone is not the specification.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
