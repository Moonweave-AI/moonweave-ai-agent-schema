schema: moonweave.ai/ontology-node/v1
id: EvaluationSpecification
kind: concept
labels:
  zh: 评估规范
  en: Evaluation Specification
  ja: 評価仕様
semantics:
  short_definition:
    zh: 可复用地声明如何评估候选产物的版本化规范。
    en: A versioned specification that declares how to evaluate candidate artifacts reproducibly.
    ja: 候補成果物を再現可能に評価する方法を宣言する版管理された仕様。
  definition:
    zh: EvaluationSpecification 是静态、版本化的实体，明确测试或采样数据（OpenAI eval dataset、LangSmith dataset、DeepEval test cases）、评估场景、一个或多个 EvaluationCriterion（对应 OpenAI grader/testing_criteria）以及可选 Rubric。它规定评估应如何进行，但不是 EvaluationActivity、EvaluationRun、Score、Verdict 或候选输出本身。
    en: "EvaluationSpecification is a static, versioned entity identifying test or sampled data (OpenAI eval dataset, LangSmith dataset, DeepEval test cases), evaluation scenarios, one or more EvaluationCriteria (mapping to OpenAI grader/testing_criteria), and optional Rubrics. It states how assessment is to be performed; it is not an EvaluationActivity, EvaluationRun, Score, Verdict, or candidate output."
    ja: EvaluationSpecification は、テスト又はサンプルデータ（OpenAI eval dataset、LangSmith dataset、DeepEval test cases）、評価シナリオ、一つ以上の EvaluationCriterion（OpenAI grader/testing_criteria に対応）、任意の Rubric を特定する静的で版管理されたエンティティです。評価方法を定めますが、EvaluationActivity、EvaluationRun、Score、Verdict、候補出力ではありません。
  why_needed:
    zh: 若每次评估临时改变样本或标准，分数无法跨版本比较。规范把可比较性的前提固定下来，使审计者能复现“按什么标准判定”。
    en: "If every evaluation changes samples or standards ad hoc, scores cannot be compared across versions. A specification fixes comparability prerequisites so auditors can reproduce which standard was applied."
    ja: 評価ごとにサンプルや標準を場当たり的に変えると、スコアは版間で比較できません。仕様は比較可能性の前提を固定し、どの基準を適用したか再現できます。
  includes:
    - zh: 规范标识和版本、data_source_ref（dataset/test cases）、criterion_refs、scenario_refs、可选 rubric 引用。
      en: "Specification identifier and version, data_source_ref (dataset/test cases), criterion_refs, scenario_refs, and optional rubric references."
      ja: 仕様識別子と版、data_source_ref（dataset/test cases）、criterion_refs、scenario_refs、任意の rubric 参照。
    - zh: 可引用的质量期望，而非执行日志。
      en: Referencable quality expectations rather than execution logs.
      ja: 実行ログではなく参照可能な品質期待。
  excludes:
    - zh: EvaluationActivity 或 EvaluationRun；前者是发生的活动，后者是某次运行记录。
      en: An EvaluationActivity or EvaluationRun; the former is an occurred activity and the latter is a record of one run.
      ja: EvaluationActivity 又は EvaluationRun。前者は発生した活動、後者は一回の実行記録です。
    - zh: 未经准则解释的 Trace、Span、Log Record 或 OpenTelemetry Metric。
      en: "A Trace, Span, Log Record, or OpenTelemetry Metric not interpreted by a criterion."
      ja: 基準で解釈されていない Trace、Span、Log Record、OpenTelemetry Metric。
  semantic_kind: entity
  aliases: [eval specification, eval definition, test specification]
engineering:
  explanation:
    zh: 新集成应以 OpenAI Agent Evals dataset + testing_criteria、LangSmith dataset + evaluators、Braintrust experiment config、DeepEval test suite、SWE-bench/BFCL/HumanEval 基准适配器为可映射 API 形状，再以版本化 JSON/YAML 保存 data_source_ref、criterion_refs、scenario_refs。旧 Evals API 的 data_source_config 与 testing_criteria 仅作迁移兼容字段。
    en: "New integrations should treat OpenAI Agent Evals dataset + testing_criteria, LangSmith dataset + evaluators, Braintrust experiment config, DeepEval test suites, and SWE-bench/BFCL/HumanEval benchmark adapters as mappable API shapes, then persist versioned JSON/YAML with data_source_ref, criterion_refs, and scenario_refs. Legacy Evals API data_source_config and testing_criteria are migration-compatibility fields only."
    ja: 新しい統合では OpenAI Agent Evals dataset + testing_criteria、LangSmith dataset + evaluators、Braintrust experiment config、DeepEval test suite、SWE-bench/BFCL/HumanEval ベンチマークアダプターを写像可能 API 形状として扱い、版管理 JSON/YAML で data_source_ref、criterion_refs、scenario_refs を保存します。旧 Evals API の data_source_config と testing_criteria は移行互換フィールドに限ります。
  typical_input:
    - description: Moonweave-local versioned evaluation declaration.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "specification_id": "ticket-category",
          "version": "v2",
          "data_source_ref": "dataset:ticket-category-golden-v2@sha256:6bc1",
          "criterion_refs": ["EvaluationCriterion:category-match:v2"],
          "scenario_refs": ["EvaluationScenario:hardware-monitor-no-power:v2"]
        }
      source_claims: [claim-spec-agent-evals, claim-spec-design]
  typical_output:
    - description: OpenAI grader-run materialized from stored criterion after candidate generation.
      format: |
        POST /v1/fine_tuning/alpha/graders/run
        {"grader": {"type": "string_check", "name": "category-match", "input": "Hardware", "reference": "Hardware", "operation": "eq"}}
      source_claims: [claim-spec-graders-run]
  reference_implementations:
    - name: OpenAI Agent Evals
      url: https://platform.openai.com/docs/guides/evals
      description: Datasets, graders, and eval run workflow.
    - name: LangSmith
      url: https://docs.smith.langchain.com
      description: Datasets, evaluators, and experiment specifications.
    - name: DeepEval
      url: https://docs.confident-ai.com
      description: Test case suites and metric configurations.
structure:
  identity_keys: [specification_id, version]
  fields:
    - id: specification_id
      labels: {zh: 规范标识, en: Specification identifier, ja: 仕様識別子}
      definitions:
        zh: 标识一个可引用评估规范的稳定名称，不是运行标识。
        en: "Stable name identifying a referencable evaluation specification, not a run identifier."
        ja: 参照可能な評価仕様を識別する安定名であり、実行識別子ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: ticket-category
      allowed_values: []
      source_claims: [claim-spec-design]
    - id: version
      labels: {zh: 规范版本, en: Specification version, ja: 仕様バージョン}
      definitions:
        zh: 区分准则、数据或量规变更后的不可变规范版本。
        en: "Immutable specification version distinguishing changed criteria, data, or rubrics."
        ja: 基準、データ、ルーブリック変更後を区別する不変仕様版。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._-]+$'
      example_value: v2
      allowed_values: []
      source_claims: [claim-spec-design]
    - id: data_source_ref
      labels: {zh: 数据来源引用, en: Data source reference, ja: データソース参照}
      definitions:
        zh: 指向 OpenAI eval dataset、LangSmith dataset、DeepEval test cases 或版本化样本清单。
        en: "Reference to OpenAI eval dataset, LangSmith dataset, DeepEval test cases, or a versioned sample manifest."
        ja: OpenAI eval dataset、LangSmith dataset、DeepEval test cases、版管理サンプルマニフェストへの参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dataset:ticket-category-golden-v2
      allowed_values: []
      source_claims: [claim-spec-agent-evals, claim-spec-design]
    - id: criterion_refs
      labels: {zh: 评估准则引用集合, en: Evaluation criterion references, ja: 評価基準参照集合}
      definitions:
        zh: 指向本规范版本实际采用的 EvaluationCriterion；至少一条，每条必须可解析到不可变版本。
        en: References to EvaluationCriteria actually used by this specification version; at least one, each resolving to an immutable version.
        ja: この仕様版が実際に使用する EvaluationCriterion への参照。少なくとも一つ、各参照は不変版へ解決可能でなければなりません。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: EvaluationCriterion:category-match:v2
      allowed_values: []
      source_claims: [claim-spec-design]
    - id: scenario_refs
      labels: {zh: 评估场景引用集合, en: Evaluation scenario references, ja: 評価シナリオ参照集合}
      definitions:
        zh: 可选指向本规范管理的 EvaluationScenario，用于声明覆盖范围。
        en: Optional references to EvaluationScenarios managed by this specification for coverage declaration.
        ja: 本仕様が管理する EvaluationScenario への任意参照。カバレッジ宣言用。
      datatype: reference
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: EvaluationScenario:hardware-monitor-no-power:v2
      allowed_values: []
      source_claims: [claim-spec-agent-evals, claim-spec-design]
  constraints:
    - id: evaluation-specification-has-criterion
      severity: error
      expression_language: plain
      expression: An EvaluationSpecification must reference at least one EvaluationCriterion; a dataset alone is not a specification of quality.
      explanation:
        zh: 只有数据而没有判断标准无法说明“好”的含义。
        en: Data without a judgment standard cannot state what good means.
        ja: 判断基準のないデータだけでは「良い」の意味を定められません。
      source_claims: [claim-spec-agent-evals, claim-spec-design]
    - id: evaluation-specification-versioned-inputs
      severity: error
      expression_language: plain
      expression: data_source_ref and criterion references must identify the version used by a run or otherwise be immutable.
      explanation:
        zh: 运行必须能追溯到当时实际使用的规范内容。
        en: A run must be traceable to the specification content actually used at that time.
        ja: 実行はその時点で実際に使用した仕様内容へ追跡できなければなりません。
      source_claims: [claim-spec-design]
  required_relations:
    - id: evaluation-specification-has-criterion
      direction: incoming
      predicate: part_of
      target_concept_id: EvaluationCriterion
      cardinality: {min: 1, max: null}
      explanations:
        zh: 每个规范至少由一个准则组成。
        en: Each specification is composed of at least one criterion.
        ja: 各仕様は少なくとも一つの基準で構成されます。
      source_claims: [claim-spec-design]
examples:
  - id: evaluation-specification-example-openai-dataset
    labels:
      zh: OpenAI eval dataset 规范
      en: OpenAI eval dataset specification
      ja: OpenAI eval dataset 仕様
    descriptions:
      zh: specification_id=ticket-category version=v2；data_source_ref=dataset:ticket-category-golden-v2；criterion_refs 含 string_check grader category-match；对应 OpenAI Agent Evals dataset + testing_criteria 形状。
      en: specification_id=ticket-category version=v2; data_source_ref=dataset:ticket-category-golden-v2; criterion_refs include string_check grader category-match; maps to OpenAI Agent Evals dataset + testing_criteria shape.
      ja: specification_id=ticket-category version=v2。data_source_ref=dataset:ticket-category-golden-v2。criterion_refs に string_check grader category-match。OpenAI Agent Evals dataset + testing_criteria 形状に対応。
    example_source:
      product: OpenAI Agent Evals
      url: https://platform.openai.com/docs/guides/evals
      version: datasets and testing_criteria
    field_values:
      specification_id: ticket-category
      version: v2
      data_source_ref: dataset:ticket-category-golden-v2
      criterion_refs: [EvaluationCriterion:category-match:v2]
      scenario_refs: [EvaluationScenario:hardware-monitor-no-power:v2]
    related_node_ids: [EvaluationSpecification, EvaluationCriterion, Rubric, EvaluationScenario]
    related_relation_ids: []
    source_claims: [claim-spec-agent-evals, claim-spec-design]
  - id: evaluation-specification-example-deepeval-suite
    labels:
      zh: DeepEval test suite 规范
      en: DeepEval test suite specification
      ja: DeepEval test suite 仕様
    descriptions:
      zh: data_source_ref 指向 DeepEval LLMTestCase 集合；criterion_refs 含 faithfulness 与 answer_relevancy；specification_id=rag-quality version=v1 供 evaluate() 批次消费。
      en: data_source_ref points to DeepEval LLMTestCase collection; criterion_refs include faithfulness and answer_relevancy; specification_id=rag-quality version=v1 for evaluate() batches.
      ja: data_source_ref が DeepEval LLMTestCase 集合を指す。criterion_refs に faithfulness と answer_relevancy。specification_id=rag-quality version=v1 が evaluate() バッチ用。
    example_source:
      product: DeepEval
      url: https://docs.confident-ai.com
      version: test case suites and metrics
    field_values:
      specification_id: rag-quality
      version: v1
      data_source_ref: dataset:deepeval-rag-30cases
      criterion_refs: [EvaluationCriterion:rag-faithfulness, EvaluationCriterion:answer-relevancy]
    related_node_ids: [EvaluationSpecification, EvaluationCriterion]
    related_relation_ids: []
    source_claims: [claim-spec-deepeval, claim-spec-design]
  - id: evaluation-specification-example-swebench-benchmark
    labels:
      zh: SWE-bench Verified 基准规范
      en: SWE-bench Verified benchmark specification
      ja: SWE-bench Verified ベンチマーク仕様
    descriptions:
      zh: specification_id=swebench-verified version=v1；data_source_ref=benchmark:swebench-verified；criterion_refs 含 test-pass criterion；scenario_refs 引用 verified instances；基准语义保留在适配器。
      en: specification_id=swebench-verified version=v1; data_source_ref=benchmark:swebench-verified; criterion_refs include test-pass criterion; scenario_refs cite verified instances; benchmark semantics stay in adapter.
      ja: specification_id=swebench-verified version=v1。data_source_ref=benchmark:swebench-verified。criterion_refs に test-pass criterion。scenario_refs が verified instances を引用。ベンチマーク意味はアダプターに残ります。
    example_source:
      product: SWE-bench Verified
      url: https://www.swebench.com/
      version: verified benchmark specification
    field_values:
      specification_id: swebench-verified
      version: v1
      data_source_ref: benchmark:swebench-verified
      criterion_refs: [EvaluationCriterion:swebench-test-pass]
      scenario_refs: [EvaluationScenario:django__django-11099]
    related_node_ids: [EvaluationSpecification, EvaluationScenario, EvaluationCriterion]
    related_relation_ids: []
    source_claims: [claim-spec-swebench, claim-spec-design]
  - id: evaluation-specification-counterexample-unversioned
    labels:
      zh: 无版本的临时检查单
      en: Unversioned ad hoc checklist
      ja: 版のない場当たり的チェックリスト
    descriptions:
      zh: 团队共享一份“记得测硬件故障”的口头清单，无 specification_id、version 或不可变 data_source_ref；不能登记为 EvaluationSpecification。
      en: Team shares a verbal remember-to-test-hardware-failures checklist without specification_id, version, or immutable data_source_ref; cannot register as EvaluationSpecification.
      ja: チームが「hardware 故障をテスト」と口頭共有するだけで specification_id、version、不変 data_source_ref がない。EvaluationSpecification として登録できません。
    example_source:
      product: Moonweave evaluation boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: versioned specification requirement
    field_values:
      specification_id: null
      version: null
    related_node_ids: [EvaluationSpecification]
    related_relation_ids: []
    source_claims: [claim-spec-design]
  - id: evaluation-specification-boundary-run-record
    labels:
      zh: 规范与运行的边界
      en: Boundary between specification and run
      ja: 仕様と実行の境界
    descriptions:
      zh: EvaluationSpecification ticket-category:v2 声明 dataset 与 criteria；EvaluationRun nightly-104 才是实际执行。静态规范不能冒充已完成运行。
      en: EvaluationSpecification ticket-category:v2 declares dataset and criteria; EvaluationRun nightly-104 is the actual execution. A static specification cannot impersonate a completed run.
      ja: EvaluationSpecification ticket-category:v2 が dataset と criteria を宣言。EvaluationRun nightly-104 が実際の実行。静的仕様は完了実行になりすませません。
    example_source:
      product: OpenAI Agent Evals
      url: https://platform.openai.com/docs/guides/evals
      version: specification vs eval run
    field_values:
      specification_id: ticket-category
      version: v2
      run_id: eval-run-104
    related_node_ids: [EvaluationSpecification, EvaluationRun]
    related_relation_ids: [evaluation-specification-governs-run]
    source_claims: [claim-spec-provenance]
parent_relation: null
relations:
  - id: EvaluationSpecification-governs-EvaluationRun
    predicate: governs
    target: concept:EvaluationRun
    direction: target-to-source
    relation_kind: semantic
    labels: {zh: 规范约束运行, en: governs evaluation run, ja: 評価実行を規定する}
    definitions:
      zh: 规范规定运行应使用的场景、准则和量规，而运行记录一次发生的使用。
      en: "The specification states scenarios, criteria, and rubrics a run must use; the run records one occurred use."
      ja: 仕様は実行が使用すべきシナリオ、基準、ルーブリックを定め、実行は一回の発生した使用を記録します。
    cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: uses, labels: {zh: 使用规范, en: uses specification, ja: 仕様を使用する}}
    conditions:
      - id: specification-governs-run-version-condition
        severity: error
        expression_language: plain
        expression: Assert only when the run records this specification_id and version as its governing inputs.
        explanations:
          zh: 不能只因名称相似就链接运行和规范。
          en: A run and specification cannot be linked merely because their names look similar.
          ja: 名前が似ているだけで実行と仕様を結び付けてはならない。
        source_claims: [claim-spec-provenance]
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-spec-provenance]
    distinct_fact_rationale:
      zh: 该关系区别可复用的声明与它的一次实际使用。
      en: This relation distinguishes a reusable declaration from one actual use of it.
      ja: この関係は再利用可能な宣言とその一回の実際の使用を区別します。
    layout_role: cross-link
sources:
