schema: moonweave.ai/ontology-node/v1
id: EvaluationSpecification
kind: concept
status: accepted
labels: {zh: 评估规范, en: Evaluation Specification, ja: 評価仕様}
semantics:
  short_definition: {zh: 可复用地声明如何评估候选产物的规范。, en: A reusable declaration of how to evaluate a candidate artifact., ja: 候補成果物をどのように評価するかを再利用可能に宣言する仕様。}
  definition: {zh: 评估规范是一个静态、版本化的实体，明确测试或采样数据、评估场景、一个或多个评估准则以及可选量规。它规定评估应如何进行，但不是某次发生的评估活动、评分、判定或候选输出。, en: "An Evaluation Specification is a static, versioned entity that identifies test or sampled data, evaluation scenarios, one or more evaluation criteria, and optional rubrics. It states how assessment is to be performed; it is not an occurred evaluation activity, score, verdict, or candidate output.", ja: 評価仕様は、テストまたは抽出データ、評価シナリオ、一つ以上の評価基準、任意のルーブリックを特定する静的で版管理されたエンティティである。評価の方法を定めるが、発生した評価活動、スコア、判定、候補出力ではない。}
  why_needed: {zh: 若每次评估临时改变样本或标准，分数无法跨版本比较。规范把可比较性的前提固定下来，使审计者能复现“按什么标准判定”。, en: "If every evaluation changes samples or standards ad hoc, scores cannot be compared across versions. A specification fixes the prerequisites of comparability and lets an auditor reproduce what standard was applied.", ja: 評価ごとにサンプルや標準を場当たり的に変えると、スコアは版間で比較できない。仕様は比較可能性の前提を固定し、監査者がどの基準を適用したか再現できるようにする。}
  includes:
    - {zh: 规范标识和版本、数据或样本引用、准则、场景、量规和阈值。, en: "Specification identifier and version, data or sample references, criteria, scenarios, rubrics, and thresholds.", ja: 仕様識別子と版、データまたはサンプル参照、基準、シナリオ、ルーブリック、閾値。}
    - {zh: 可引用的质量期望，而非执行日志。, en: Referencable quality expectations rather than execution logs., ja: 実行ログではなく参照可能な品質期待。}
  excludes:
    - {zh: EvaluationActivity 或 Evaluation Run；前者是发生的活动，后者是某次运行记录。, en: An EvaluationActivity or Evaluation Run; the former is an occurred activity and the latter is a record of one run., ja: EvaluationActivity または Evaluation Run。前者は発生した活動で、後者は一回の実行記録である。}
    - {zh: 未经准则解释的 Trace、Span、Log Record 或 OpenTelemetry Metric。, en: "A Trace, Span, Log Record, or OpenTelemetry Metric not interpreted by a criterion.", ja: 基準により解釈されない Trace、Span、Log Record、OpenTelemetry Metric。}
  semantic_kind: entity
  aliases: [eval specification, eval definition, test specification]
engineering:
  explanation: {zh: 现行 OpenAI Agents 评估指南把可重复的评估组织为数据集和 eval run；本地系统应把数据、场景、准则和量规写入版本化 JSON/YAML，再让独立评估器消费该规范。旧 Evals API 的 `data_source_config` 与 `testing_criteria` 是历史公开契约字段，可用于迁移互操作，不定义本地规范的所有权或完整结构。候选可通过当前 Responses create API 生成。, en: "Current OpenAI agent-evaluation guidance organizes repeatable evaluation around datasets and eval runs; a local system should retain data, scenarios, criteria, and rubrics in versioned JSON/YAML for an independent evaluator to consume. The legacy Evals API's `data_source_config` and `testing_criteria` are historical public-contract fields useful for migration interoperability, not the owner or complete structure of a local specification. A candidate can be generated through the current Responses create API.", ja: 現行の OpenAI Agents 評価ガイドは、反復可能な評価をデータセットと eval run を中心に組織する。ローカル・システムはデータ、シナリオ、基準、ルーブリックを版管理された JSON/YAML に保持し、独立評価器が消費する。旧 Evals API の `data_source_config` と `testing_criteria` は移行相互運用に使える歴史的な公開契約フィールドであり、ローカル仕様の所有者又は完全な構造ではない。候補は現行の Responses create API で生成できる。}
  typical_input:
    - description: Moonweave-local, versioned evaluation declaration that selects a dataset, scenarios, and criteria; it is not an OpenAI wire schema.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "specification_id": "ticket-category:v2",
          "dataset_ref": "dataset:ticket-category-golden-v2@sha256:6bc1",
          "scenario_refs": ["EvaluationScenario:hardware-monitor-no-power"],
          "criterion_refs": ["EvaluationCriterion:category-match:v2"],
          "trace_sampling": "representative-failures-and-regressions"
        }
      source_claims: [claim-spec-agent-evals-workflow, claim-spec-design]
  typical_output:
    - description: Current Responses request materialized for a scenario from the stored specification.
      format: |
        POST /v1/responses
        {
          "model": "gpt-5.4-mini",
          "input": "Classify this ticket as Hardware, Software, or Other: My monitor will not turn on."
        }
      source_claims: [claim-spec-responses]
    - description: Current grader-run request materialized from the criterion after the candidate is available.
      format: |
        POST /v1/fine_tuning/alpha/graders/run
        {
          "grader": {
            "type": "string_check",
            "name": "category-match",
            "input": "Hardware",
            "reference": "Hardware",
            "operation": "eq"
          }
        }
      source_claims: [claim-spec-graders-run]
  reference_implementations:
    - {name: OpenAI Evaluate agent workflows, url: https://developers.openai.com/api/docs/guides/agent-evals, description: "Documents current trace, grader, dataset, and eval-run evaluation workflows."}
    - {name: OpenAI Responses create API, url: https://developers.openai.com/api/reference/resources/responses/methods/create, description: "Documents the current candidate-generation request and response contract."}
    - {name: OpenAI Run grader reference, url: https://developers.openai.com/api/reference/resources/fine_tuning/subresources/alpha/subresources/graders/methods/run, description: "Documents the current grader-run request derived from a selected criterion."}
structure:
  identity_keys: [specification_id, version]
  fields:
    - id: specification_id
      labels: {zh: 规范标识, en: Specification identifier, ja: 仕様識別子}
      definitions: {zh: 标识一个可引用评估规范的稳定名称，不是运行标识。, en: "Stable name identifying a referencable evaluation specification, not a run identifier.", ja: 参照可能な評価仕様を識別する安定名であり、実行識別子ではない。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: ticket-category
      allowed_values: []
      source_claims: [claim-spec-design]
    - id: version
      labels: {zh: 规范版本, en: Specification version, ja: 仕様バージョン}
      definitions: {zh: 区分准则、数据或量规变更后的不可变规范版本。, en: "Immutable specification version that distinguishes changed criteria, data, or rubric.", ja: 基準、データ、ルーブリックの変更後を区別する不変の仕様バージョン。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._-]+$'
      example_value: v2
      allowed_values: []
      source_claims: [claim-spec-design]
    - id: data_source_ref
      labels: {zh: 数据来源引用, en: Data source reference, ja: データソース参照}
      definitions: {zh: 指向测试集、抽样规则或已版本化样本清单的引用。, en: "Reference to a test set, sampling rule, or versioned sample manifest.", ja: テストセット、抽出規則、または版管理されたサンプルマニフェストへの参照。}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dataset:ticket-category-golden-v2
      allowed_values: []
      source_claims: [claim-spec-agent-evals-workflow, claim-spec-design]
    - id: criterion_refs
      labels: {zh: 评估准则引用集合, en: Evaluation criterion references, ja: 評価基準参照集合}
      definitions: {zh: 指向本规范版本实际采用的 EvaluationCriterion 引用；至少一条，且每条必须可解析到不可变版本。, en: References to EvaluationCriterion actually used by this specification version; at least one, each resolving to an immutable version., ja: この仕様版が実際に使用する EvaluationCriterion への参照。少なくとも一つ、各参照は不変版へ解決可能でなければならない。}
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: EvaluationCriterion:category-match:v2
      allowed_values: []
      source_claims: [claim-spec-design]
    - id: scenario_refs
      labels: {zh: 评估场景引用集合, en: Evaluation scenario references, ja: 評価シナリオ参照集合}
      definitions: {zh: 可选地指向本规范管理的 EvaluationScenario 引用，用于声明覆盖范围；空集合表示仅依赖 data_source_ref 而不命名场景。, en: Optional references to EvaluationScenario managed by this specification for coverage declaration; an empty collection means relying on data_source_ref only without named scenarios., ja: 本仕様が管理する EvaluationScenario への任意参照。空集合は data_source_ref のみに依存し、名前付きシナリオを宣言しないことを意味する。}
      datatype: reference
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: EvaluationScenario:hardware-monitor-no-power:v2
      allowed_values: []
      source_claims: [claim-spec-agent-evals-workflow, claim-spec-design]
  constraints:
    - id: evaluation-specification-has-criterion
      severity: error
      expression_language: plain
      expression: An EvaluationSpecification must reference at least one EvaluationCriterion; a dataset alone is not a specification of quality.
      explanation: {zh: 只有数据而没有判断标准无法说明“好”的含义。, en: Data without a judgment standard cannot state what good means., ja: 判断基準のないデータだけでは「良い」の意味を定められない。}
      source_claims: [claim-spec-agent-evals-workflow, claim-spec-design]
    - id: evaluation-specification-versioned-inputs
      severity: error
      expression_language: plain
      expression: data_source_ref, criterion references, and rubric references must identify the version used by a run or otherwise be immutable.
      explanation: {zh: 运行必须能追溯到当时实际使用的规范内容。, en: A run must be traceable to the specification content actually used at that time., ja: 実行はその時点で実際に使用した仕様内容へ追跡できなければならない。}
      source_claims: [claim-spec-design]
  required_relations:
    - id: evaluation-specification-has-criterion
      direction: incoming
      predicate: part_of
      target_concept_id: EvaluationCriterion
      cardinality: {min: 1, max: null}
      explanations: {zh: 每个规范至少由一个准则组成。, en: Each specification is composed of at least one criterion., ja: 各仕様は少なくとも一つの基準で構成される。}
      source_claims: [claim-spec-design]
    - id: evaluation-specification-governs-run
      direction: incoming
      predicate: uses
      target_concept_id: EvaluationRun
      cardinality: {min: 0, max: null}
      explanations: {zh: 已发生的运行使用规范；规范本身不等于运行。, en: An occurred run uses the specification; the specification is not itself a run., ja: 発生した実行が仕様を使用し、仕様自体は実行ではない。}
      source_claims: [claim-spec-provenance]
examples:
  - id: evaluation-specification-positive-ticket-category

    labels: {zh: OpenAI Evals IT 工单分类规范, en: OpenAI Evals IT ticket categorization spec, ja: OpenAI Evals IT チケット分類仕様}

    descriptions: {zh: "OpenAI Evals client.evals.create(name, data_source_config, testing_criteria=[string_check, model_graded, text_similarity]); EvaluationSpecification maps EvaluationRun/Criterion/Rubric/Score.", en: "OpenAI Evals client.evals.create with testing_criteria string_check/model_graded/text_similarity; EvaluationSpecification maps EvaluationRun/Criterion/Rubric/Score.", ja: "OpenAI Evals create+graders; EvaluationSpecification eval config."}
    field_values: {specification_id: it-ticket-categorization, version: v1, data_source_ref: dataset:it-ticket-jsonl, criterion_refs: [EvaluationCriterion:category-string-match], scenario_refs: [EvaluationScenario:it-ticket-item]}
    related_node_ids: [EvaluationSpecification, EvaluationCriterion, Rubric, EvaluationScenario]
    related_relation_ids: []

    source_claims: [claim-spec-agent-evals-workflow, claim-spec-design]
  - id: evaluation-specification-counterexample-unversioned-checklist

    labels: {zh: 无版本的临时检查单, en: Unversioned ad hoc checklist, ja: 版のない場当たり的チェックリスト}

    descriptions: {zh: "Diff without repo/commit/test_log_ref cannot serve as SWE-bench-style EvaluationSpecification.", en: "Diff without repo/commit/test_log_ref cannot serve as SWE-bench-style EvaluationSpecification.", ja: "Missing repo/commit rejects SWE-bench-style EvaluationSpecification."}
    field_values: {specification_id: null, version: null}
    related_node_ids: [EvaluationSpecification]
    related_relation_ids: []

    source_claims: [claim-spec-design]
  - id: evaluation-specification-boundary-run-record

    labels: {zh: 规范与一次运行的边界, en: Boundary between specification and one run, ja: 仕様と一回の実行の境界}

    descriptions: {zh: "AgentBench success_rate is aggregate; EvaluationSpecification records one run not leaderboard.", en: "AgentBench success_rate is aggregate; EvaluationSpecification records one run not leaderboard.", ja: "Leaderboard not single run."}
    field_values: {specification_id: ticket-category, version: v2, run_id: eval-run-104}
    related_node_ids: [EvaluationSpecification, EvaluationRun]
    related_relation_ids: [evaluation-specification-governs-run]

    source_claims: [claim-spec-provenance]
  - id: evaluation-specification-instance-ticket-category-v2

    labels: {zh: 具体规范 ticket-category v2, en: Concrete specification ticket-category v2, ja: 具体的な仕様 ticket-category v2}

    descriptions: {zh: "SWE-bench instance: django__django-11099->tests passed->resolved=true->EvaluationSpecification Score.", en: "SWE-bench instance: django__django-11099->tests passed->resolved=true->EvaluationSpecification Score.", ja: "SWE-bench instance maps to EvaluationSpecification Score."}
    field_values: {specification_id: ticket-category, version: v2, data_source_ref: dataset:ticket-category-golden-v2, criterion_refs: [EvaluationCriterion:category-match:v2], scenario_refs: [EvaluationScenario:hardware-monitor-no-power:v2]}
    related_node_ids: [EvaluationSpecification, EvaluationCriterion, Rubric]
    related_relation_ids: []

    source_claims: [claim-spec-agent-evals-workflow, claim-spec-design]
parent_relation: null
relations:
  - id: EvaluationSpecification-governs-EvaluationRun
    predicate: governs
    target: concept:EvaluationRun
    direction: target-to-source
    relation_kind: semantic
    labels: {zh: 规范约束运行, en: governs evaluation run, ja: 評価実行を規定する}
    definitions: {zh: 规范规定运行应使用的场景、准则和量规，而运行记录一次发生的使用。, en: "The specification states the scenarios, criteria, and rubrics a run must use, while the run records one occurred use.", ja: 仕様は実行が使用すべきシナリオ、基準、ルーブリックを定め、実行は一回の発生した使用を記録する。}
    cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: uses, labels: {zh: 使用规范, en: uses specification, ja: 仕様を使用する}}
    conditions:
      - id: specification-governs-run-version-condition
        severity: error
        expression_language: plain
        expression: Assert only when the run records this specification_id and version as its governing inputs.
        explanations: {zh: 不能只因名称相似就链接运行和规范。, en: A run and specification cannot be linked merely because their names look similar., ja: 名前が似ているだけで実行と仕様を結び付けてはならない。}
        source_claims: [claim-spec-provenance]
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-spec-provenance]
    distinct_fact_rationale: {zh: 该关系区别可复用的声明与它的一次实际使用。, en: This relation distinguishes a reusable declaration from one actual use of it., ja: この関係は再利用可能な宣言とその一回の実際の使用を区別する。}
    layout_role: cross-link
sources:
  - id: openai-agent-evals-specification
    title: OpenAI Evaluate agent workflows
    url: https://developers.openai.com/api/docs/guides/agent-evals
    source_type: official-doc
    relevance: Current OpenAI guidance identifies datasets and eval runs as the repeatable evaluation workflow.
  - id: openai-evals-specification
    title: Legacy OpenAI Working with evals API
    url: https://developers.openai.com/api/docs/guides/evals
    source_type: official-doc
    relevance: Documents historical data_source_config and testing_criteria contract fields only.
  - id: openai-responses-specification
    title: OpenAI Responses create API
    url: https://developers.openai.com/api/reference/resources/responses/methods/create
    source_type: official-doc
    relevance: Documents creating candidate outputs independently of an evaluation specification.
  - id: openai-graders-specification
    title: OpenAI Run grader reference
    url: https://developers.openai.com/api/reference/resources/fine_tuning/subresources/alpha/subresources/graders/methods/run
    source_type: official-doc
    relevance: Documents the current grader-run request that a local specification can materialize after candidate generation.
  - id: prov-o-specification
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Distinguishes an Entity from an Activity and supports provenance between a specification and an occurred activity.
  - id: evaluation-specification-design
    title: Evaluation specification design inference
    url: https://www.w3.org/TR/prov-o/
    source_type: design-inference
    relevance: Applies the cited API contracts and PROV distinction to a versioned local specification contract.
source_claims:
  - id: claim-spec-agent-evals-workflow
    source: openai-agent-evals-specification
    supports: Current OpenAI guidance uses datasets and eval runs when a team needs repeatable benchmarks, prompt comparisons, or larger-scale evaluation over time.
    locator: "Evaluate agent workflows: Move to datasets and eval runs when you need repeatability"
    evidence_kind: official
    confidence: high
  - id: claim-spec-evals-contract
    source: openai-evals-specification
    supports: The legacy OpenAI Evals API documents an Evals definition with data_source_config and testing_criteria.
    locator: "Working with evals (legacy API): Create an eval for a task"
    evidence_kind: official
    confidence: high
  - id: claim-spec-responses
    source: openai-responses-specification
    supports: The Responses API is used to create candidate model output separately from a reusable evaluation definition.
    locator: "Responses API reference: Create a model response"
    evidence_kind: official
    confidence: high
  - id: claim-spec-graders-run
    source: openai-graders-specification
    supports: The current Run grader operation accepts a grader configuration for evaluating prepared input and reference values.
    locator: "Run grader: POST /fine_tuning/alpha/graders/run; request body grader"
    evidence_kind: official
    confidence: high
  - id: claim-spec-provenance
    source: prov-o-specification
    supports: PROV-O distinguishes Entities from time-bounded Activities and defines uses and generation relations between them.
    locator: "PROV-O: prov:Entity, prov:Activity, prov:used, prov:wasGeneratedBy"
    evidence_kind: normative
    confidence: high
  - id: claim-spec-design
    source: evaluation-specification-design
    supports: A versioned data-and-criterion declaration is modeled as an EvaluationSpecification Entity rather than an occurred evaluation activity.
    locator: "Local evaluation specification boundary"
    evidence_kind: design-inference
    confidence: high


