schema: moonweave.ai/ontology-node/v1
id: EvaluationCriterion
kind: concept
status: accepted
labels:
  zh: 评估判据
  en: evaluation criterion
  ja: 評価判定基準
semantics:
  short_definition:
    zh: 评估判据是对某一质量维度如何作出判断的可检验规则。
    en: An evaluation criterion is a testable rule for judging one quality dimension.
    ja: 評価判定基準は一つの品質次元を判断する検証可能な規則です。
  definition:
    zh: 评估判据是评估规范中的判定部件；它声明被判断的质量维度、所需证据和判定运算，但不保存某个对象已经得到的分数。
    en: An evaluation criterion is an adjudication component of an evaluation specification that declares the quality dimension, required evidence, and decision operation without storing a score already assigned to a subject.
    ja: 評価判定基準は評価仕様の判定部品で、品質次元、必要証拠、判定演算を宣言し、対象に付与済みのスコアは保持しません。
  why_needed:
    zh: 独立建模判据可以让同一评分值明确说明按哪条规则解释，并避免把规则误当结果。
    en: Modeling criteria explicitly lets a score state which rule interprets it and prevents rules from being mistaken for results.
    ja: 判定基準を明示することで、スコアの解釈規則を示し、規則を結果と誤認することを防げます。
  includes:
    - zh: 包括正确性、一致性、合规性或任务完成度的证据要求与判定运算。
      en: Includes evidence requirements and decision operations for correctness, consistency, compliance, or task completion.
      ja: 正確性、一貫性、適合性、タスク完了度の証拠要件と判定演算を含みます。
  excludes:
    - zh: 不包括展示多个等级描述的 Rubric，也不包括应用判据后产生的 Score。
      en: Excludes a Rubric that presents multiple performance levels and the Score produced after applying a criterion.
      ja: 複数水準を示す Rubric と、判定適用後の Score は含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - criterion_id
  fields:
    - id: criterion_id
      labels:
        zh: 判据标识
        en: criterion ID
        ja: 判定基準 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一项可被量规、规范和运行引用的判定规则。
        en: Stably identifies one judgment rule reusable by rubrics, specifications, and runs.
        ja: rubric・specification・run から再利用参照できる一つの判定 rule を安定識別します。
      allowed_values: []
      pattern: null
      example_value: criterion/order-reference-correctness
      source_claims:
        - claim-evaluation-criterion-002
    - id: quality_dimension
      labels:
        zh: 质量维度
        en: quality dimension
        ja: 品質次元
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指出该判据判断正确性、安全性、鲁棒性、效率或其他单一质量面向。
        en: Names the one quality aspect judged by the criterion, such as correctness, safety, robustness, or efficiency.
        ja: correctness・safety・robustness・efficiency 等、この criterion が判定する一つの品質面を示します。
      allowed_values: []
      pattern: null
      example_value: correctness
      source_claims:
        - claim-evaluation-criterion-003
    - id: evidence_requirement
      labels:
        zh: 证据要求
        en: evidence requirement
        ja: 証拠要件
      datatype: expression
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明判定时必须读取的输入、参考答案、轨迹步骤或外部事实。
        en: Declares the inputs, reference outputs, trajectory steps, or external facts that the judgment must inspect.
        ja: 判定時に読むべき input・reference output・trajectory step・外部 fact を宣言します。
      allowed_values: []
      pattern: null
      example_value: compare cited order_id with reference.order_id
      source_claims:
        - claim-evaluation-criterion-004
    - id: judgment_operator
      labels:
        zh: 判定运算
        en: judgment operator
        ja: 判定演算子
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定如何把证据转为布尔、分类、数值或成对偏好结果。
        en: Specifies how evidence becomes a boolean, categorical, numerical, or pairwise-preference result.
        ja: 証拠を boolean・categorical・numerical・pairwise preference 結果へ変換する方法を定めます。
      allowed_values: []
      pattern: null
      example_value: exact-reference-match
      source_claims:
        - claim-evaluation-criterion-005
    - id: threshold
      labels:
        zh: 阈值
        en: threshold
        ja: 閾値
      datatype: number-or-label-set
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 给出从连续分数或标签集合得到判据结论的边界；纯描述性判据可以不设。
        en: Gives the boundary that converts a continuous score or label set into a criterion outcome; descriptive criteria may omit it.
        ja: 連続 score または label set を criterion outcome へ変換する境界で、記述的 criterion は省略できます。
      allowed_values: []
      pattern: null
      example_value: 0.85
      source_claims:
        - claim-evaluation-criterion-006
  constraints: []
  required_relation_constraints: []
examples:
  - id: EvaluationCriterion-example-positive-manual-001
    kind: positive
    labels:
      zh: 评估判据正例
      en: Positive evaluation criterion case
      ja: 評価判定基準の正例
    scenario_id: null
    descriptions:
      zh: 判据要求答案引用订单号，并把引用与数据库记录逐项比对后才判为正确。
      en: A criterion requires an answer to cite the order ID and compares it with the database record before judging correctness.
      ja: 判定基準は回答の注文 ID 引用とデータベース記録の照合を要求して正確性を判断します。
    field_values:
      criterion_id: criterion/order-reference-correctness
      quality_dimension: correctness
      evidence_requirement: compare cited order_id with reference.order_id
      judgment_operator: exact-reference-match
      threshold: 1
    related_node_ids:
      - EvaluationCriterion
    related_relation_ids: []
    expected_result:
      zh: 该规则应作为评估判据纳入评估规范。
      en: The rule is an evaluation criterion within the specification.
      ja: この規則は評価仕様内の評価判定基準です。
    why_valid_or_invalid:
      zh: 它明确了质量维度、证据和判定操作，没有携带某次得分。
      en: It declares dimension, evidence, and operation without carrying an observed score.
      ja: 品質次元、証拠、演算を宣言し、観測スコアを保持しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-evaluation-criterion-007
  - id: EvaluationCriterion-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 评估判据边界例
      en: Boundary evaluation criterion case
      ja: 評価判定基準の境界例
    scenario_id: null
    descriptions:
      zh: 记录显示该答案 correctness=0.72，但没有说明计算规则或证据要求。
      en: A record says correctness=0.72 without stating computation logic or evidence requirements.
      ja: 記録は correctness=0.72 と示しますが、計算法や証拠要件を示しません。
    field_values: {}
    related_node_ids:
      - EvaluationCriterion
    related_relation_ids: []
    expected_result:
      zh: 该记录是 Score，而不是 EvaluationCriterion。
      en: The record is a Score, not an EvaluationCriterion.
      ja: この記録は Score であり EvaluationCriterion ではありません。
    why_valid_or_invalid:
      zh: 已观察的判定值不能反向充当产生它的规则。
      en: An observed judgment value cannot stand in for the rule that produced it.
      ja: 観測済み判定値は、それを生んだ規則の代わりになりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-evaluation-criterion-008
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: EvaluationScenario
    shared_parent_concept_id: EvaluationSpecification
    differentia:
      zh: 已审查兄弟区分：父节点 EvaluationSpecification：EvaluationCriterion（semantic kind=specification，骨架 EvaluationSpecification-contains_criterion-EvaluationCriterion）；EvaluationScenario（semantic kind=specification，骨架 EvaluationSpecification-contains_scenario-EvaluationScenario）。双端条件：EvaluationCriterion 条件：“评估判据是对某一质量维度如何作出判断的可检验规则”；EvaluationScenario 条件：“评估场景是具有输入、初始状态与预期行为的可重复测试情境”。任一条件成立不推出另一端。
      en: "Reviewed sibling distinction: parent EvaluationSpecification: EvaluationCriterion (semantic kind=specification, backbone EvaluationSpecification-contains_criterion-EvaluationCriterion); EvaluationScenario (semantic kind=specification, backbone EvaluationSpecification-contains_scenario-EvaluationScenario). Endpoint conditions: EvaluationCriterion condition: “An evaluation criterion is a testable rule for judging one quality dimension”; EvaluationScenario condition: “An evaluation scenario is a repeatable test situation with inputs, initial state, and expected behavior”. Either condition leaves the other unproven."
      ja: 審査済み兄弟区別：親 EvaluationSpecification：EvaluationCriterion（semantic kind=specification、バックボーン EvaluationSpecification-contains_criterion-EvaluationCriterion）；EvaluationScenario（semantic kind=specification、バックボーン EvaluationSpecification-contains_scenario-EvaluationScenario）。両端条件：EvaluationCriterion の条件：「評価判定基準は一つの品質次元を判断する検証可能な規則です」；EvaluationScenario の条件：「評価シナリオは入力、初期状態、期待挙動を持つ反復可能な試験状況です」。一方の成立は他方を証明しません。
    source_claims:
      - claim-evaluation-criterion-009
parent_relation:
  id: EvaluationSpecification-contains_criterion-EvaluationCriterion
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 包含判据
    en: contains criterion
    ja: 判定基準を含む
  definitions:
    zh: 评估规范包含作为其版本化判定结构一部分的评估判据；删除或替换判据会改变该规范版本的含义。
    en: An EvaluationSpecification contains an EvaluationCriterion as part of its versioned adjudication structure; removing or replacing the criterion changes that specification version's meaning.
    ja: EvaluationSpecification は版管理された判定構造の一部として EvaluationCriterion を含み、削除・置換は仕様版の意味を変えます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
    en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
    ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：包含判据
      en: "inverse: contains criterion"
      ja: 逆方向：判定基準を含む
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: EvaluationSpecification-contains_criterion-EvaluationCriterion-example-positive-manual-001
      kind: positive
      labels:
        zh: 包含判据正例
        en: Positive case for contains criterion
        ja: 判定基準を含むの正例
      scenario_id: null
      descriptions:
        zh: eval-spec-27 固定 criterion groundedness-v2 作为正确性判定的一部分。
        en: eval-spec-27 fixes criterion groundedness-v2 as part of correctness adjudication.
        ja: eval-spec-27 は groundedness-v2 を正確性判定の一部として固定します。
      field_values: {}
      related_node_ids:
        - EvaluationSpecification
        - EvaluationCriterion
      related_relation_ids:
        - EvaluationSpecification-contains_criterion-EvaluationCriterion
      expected_result:
        zh: 应建立规范包含判据的组成关系。
        en: The specification-to-criterion composition is present.
        ja: 仕様から判定基準への構成関係を確立します。
      why_valid_or_invalid:
        zh: 该判据的版本直接参与确定 eval-spec-27 的含义。
        en: The criterion version directly determines eval-spec-27 semantics.
        ja: 判定基準版が eval-spec-27 の意味を直接決めます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-evaluation-criterion-010
    - id: EvaluationSpecification-contains_criterion-EvaluationCriterion-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 包含判据边界例
        en: Boundary case for contains criterion
        ja: 判定基準を含むの境界例
      scenario_id: null
      descriptions:
        zh: run-884 临时记录某个 evaluator 的耗时，但没有改变 eval-spec-27 的判定规则。
        en: run-884 records one evaluator's latency without changing eval-spec-27 adjudication rules.
        ja: run-884 は評価器の遅延を記録しますが eval-spec-27 の判定規則を変えません。
      field_values: {}
      related_node_ids:
        - EvaluationSpecification
        - EvaluationCriterion
      related_relation_ids:
        - EvaluationSpecification-contains_criterion-EvaluationCriterion
      expected_result:
        zh: 耗时 Measurement 不得成为该规范的 EvaluationCriterion。
        en: The latency Measurement is not a criterion component of the specification.
        ja: 遅延 Measurement は仕様の判定基準部品ではありません。
      why_valid_or_invalid:
        zh: 运行遥测不是判定结构的一部分，删除它不改变规范含义。
        en: Run telemetry is not adjudication structure and deleting it does not change specification meaning.
        ja: 実行テレメトリは判定構造でなく削除しても仕様意味は変わりません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-evaluation-criterion-011
  source_claims:
    - claim-evaluation-criterion-012
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-feedback-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 LangSmith、OpenAI Evals、RAGAS 与 Braintrust 评估框架逐项核验。
    en: Verified against LangSmith, OpenAI Evals, RAGAS, and Braintrust evaluation frameworks.
    ja: LangSmith、OpenAI Evals、RAGAS、Braintrust 評価フレームワークに照らし確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-evaluation-criterion-001
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluators apply explicit judging logic to application outputs and return feedback values; Moonweave isolates that judging rule as EvaluationCriterion.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-evaluation-criterion-002
    source: eng-api-openai-evals
    supports: OpenAI evals contain a list of testing criteria and each grader has a name. Moonweave uses criterion_id as the stable ontology identity across rubric and run references.
    locator: OpenAI Evals API 2026 > Create eval > testing_criteria and grader name
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-evaluation-criterion-003
    source: eng-fw-langsmith-docs
    supports: LangSmith recommends identifying what matters for each application component and defining quality criteria, including correctness, safety, format, clarity, and related dimensions.
    locator: LangSmith Evaluation concepts 2026 > What to evaluate and Reference-free versus reference-based evaluators
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-evaluation-criterion-004
    source: eng-fw-langsmith-docs
    supports: LangSmith distinguishes evaluator inputs for offline examples with references from online runs without references and documents trajectory inspection for agents.
    locator: LangSmith Evaluation concepts 2026 > Evaluator inputs and Reference-free versus reference-based evaluators
    evidence_kind: official
    confidence: high
    review_status: accepted
  - id: claim-evaluation-criterion-005
    source: eng-api-openai-evals
    supports: OpenAI supports label, string-check, text-similarity, score-model, and other grader forms with explicit operations. Moonweave records the selected form as judgment_operator.
    locator: OpenAI Evals API 2026 > Create eval > testing_criteria grader variants and operations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-evaluation-criterion-006
    source: eng-api-openai-evals
    supports: OpenAI grader configurations expose passing labels and score thresholds or comparison operations. Moonweave makes the criterion boundary optional because not every categorical judgment needs a numeric threshold.
    locator: OpenAI Evals API 2026 > Create eval > grader passing_labels, score thresholds, and operations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-evaluation-criterion-007
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluator concepts support explicit code, human, or LLM judging logic applied to outputs.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-evaluation-criterion-008
    source: eng-fw-langsmith-docs
    supports: LangSmith distinguishes evaluator logic from the feedback score or value returned by that evaluator.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-evaluation-criterion-009
    source: eng-fw-langsmith-docs
    supports: "LangSmith Evaluation distinguishes what an evaluator judges from the dataset example or production run supplied to it: evaluator logic and outputs express the criterion, while examples and runs supply repeatable evaluation situations. Moonweave models those two responsibilities as sibling EvaluationCriterion and EvaluationScenario classes under EvaluationSpecification."
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-evaluation-criterion-010
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluators are selected before running an experiment and determine produced feedback scores.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-evaluation-criterion-011
    source: eng-fw-langsmith-docs
    supports: LangSmith separates experiment latency metrics from evaluator definitions used to score outputs.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-evaluation-criterion-012
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluation configuration requires evaluators whose judging rules determine experiment scores; Moonweave makes the criterion a versioned specification part.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
