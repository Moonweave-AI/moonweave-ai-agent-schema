schema: moonweave.ai/ontology-node/v1
id: EvaluationCriterion
kind: concept
labels:
  zh: 评估准则
  en: Evaluation Criterion
  ja: 評価基準
semantics:
  short_definition:
    zh: 在评估规范内声明一条可判定质量要求的比较规则。
    en: A comparison rule in an evaluation specification that states one decidable quality requirement.
    ja: 評価仕様内で判定可能な一つの品質要件を宣言する比較規則。
  definition:
    zh: EvaluationCriterion 把候选、证据选择方式与成功条件连接起来，例如 string_check eq、model_grader 判定、latency lte 1000ms。它对应 OpenAI grader（string_check、model_grader、multi_grader）、Braintrust assertion、DeepEval metric 判定规则。可使用 Rubric 产生 Score 或解释 EvaluationMetric 产生 Verdict；它不是 Rubric、Score、Verdict 或评估活动本身。
    en: "EvaluationCriterion connects a candidate, evidence-selection method, and success condition, for example string_check eq, model_grader judgment, or latency lte 1000ms. It maps to OpenAI graders (string_check, model_grader, multi_grader), Braintrust assertions, and DeepEval metric rules. It may use a Rubric to produce a Score or interpret an EvaluationMetric to produce a Verdict; it is not the Rubric, Score, Verdict, or evaluation activity itself."
    ja: EvaluationCriterion は候補、証拠選択方法、成功条件を結び付けます（string_check eq、model_grader 判定、latency lte 1000ms 等）。OpenAI grader（string_check、model_grader、multi_grader）、Braintrust assertion、DeepEval metric 判定規則に対応します。Rubric で Score を、EvaluationMetric を解釈して Verdict を生み得ますが、Rubric、Score、Verdict、評価活動自体ではありません。
  why_needed:
    zh: “质量好”无法被执行或审计。一个明确准则告诉评分器看什么、如何比较以及何时通过，因此同一候选不会因评估者临场理解不同而得到无法解释的结果。
    en: "Good quality cannot be executed or audited. An explicit criterion tells an evaluator what to inspect, how to compare, and when to pass, preventing unexplained results from ad hoc reviewer interpretation."
    ja: 「品質が良い」は実行も監査もできません。明示的な基準は何を調べ、どう比較し、いつ合格とするかを示し、場当たり的解釈による説明不能な結果を防ぎます。
  includes:
    - zh: 准则标识、evidence_selector、success_condition、可选 grader 类型（string_check、model_grader、multi_grader）。
      en: "Criterion identifier, evidence_selector, success_condition, and optional grader type (string_check, model_grader, multi_grader)."
      ja: 基準識別子、evidence_selector、success_condition、任意 grader 型（string_check、model_grader、multi_grader）。
    - zh: 对 Score、EvaluationMetric 或人工依据的可审计解释规则。
      en: Auditable interpretation rules for Score, EvaluationMetric, or human basis.
      ja: Score、EvaluationMetric、人間根拠を監査可能に解釈する規則。
  excludes:
    - zh: 抽象指标定义“accuracy”；那是 EvaluationMetric，只有被本准则绑定后才判断质量。
      en: The abstract metric definition accuracy; that is EvaluationMetric and judges quality only when bound by this criterion.
      ja: 抽象メトリック定義 accuracy。それは EvaluationMetric で、本基準に結び付く場合にのみ品質を判断します。
    - zh: 1 到 5 分的等级描述；那是 Rubric。
      en: Level descriptions for scores one through five; those are a Rubric.
      ja: 1 から 5 点の段階説明。それは Rubric です。
  semantic_kind: entity
  aliases: [criterion, grading criterion, grader rule]
engineering:
  explanation:
    zh: 新集成应以 OpenAI Graders POST /v1/fine_tuning/alpha/graders/run（StringCheckGrader、ScoreModelGrader、LabelModelGrader、MultiGrader）、Braintrust assertions、DeepEval metric pass thresholds、LangSmith evaluator configs 为可映射 API 形状，再以版本化 criterion 保存 evidence_selector 与 success_condition。引用 OTLP Metric 时必须声明聚合窗口与阈值。
    en: "New integrations should treat OpenAI Graders POST /v1/fine_tuning/alpha/graders/run (StringCheckGrader, ScoreModelGrader, LabelModelGrader, MultiGrader), Braintrust assertions, DeepEval metric pass thresholds, and LangSmith evaluator configs as mappable API shapes, then persist versioned criteria with evidence_selector and success_condition. OpenTelemetry Metric citations must declare aggregation window and threshold."
    ja: 新しい統合では OpenAI Graders POST /v1/fine_tuning/alpha/graders/run（StringCheckGrader、ScoreModelGrader、LabelModelGrader、MultiGrader）、Braintrust assertions、DeepEval metric 合格閾値、LangSmith evaluator config を写像可能 API 形状として扱い、版管理 criterion で evidence_selector と success_condition を保存します。OpenTelemetry Metric 引用時は集約窓と閾値を宣言する必要があります。
  typical_input:
    - description: Moonweave-local criterion with string_check grader mapping.
      format: |
        {
          "criterion_id": "category-match:v2",
          "grader_type": "string_check",
          "evidence_selector": {"candidate_output_path": "output_text"},
          "success_condition": "eq item.correct_label"
        }
      source_claims: [claim-criterion-graders-run, claim-criterion-design]
  typical_output:
    - description: OpenAI grader-run request materialized from criterion.
      format: |
        POST /v1/fine_tuning/alpha/graders/run
        {"grader": {"type": "string_check", "name": "category-match", "input": "{{sample.output_text}}", "reference": "{{item.correct_label}}", "operation": "eq"}}
      source_claims: [claim-criterion-graders-run]
  reference_implementations:
    - name: OpenAI Graders
      url: https://platform.openai.com/docs/guides/evals
      description: string_check, model_grader, multi_grader configurations.
    - name: Braintrust
      url: https://www.braintrust.dev/docs
      description: Assertion-based criterion rules.
    - name: DeepEval
      url: https://docs.confident-ai.com
      description: Metric threshold criteria for LLMTestCase evaluation.
structure:
  identity_keys: [criterion_id]
  fields:
    - id: criterion_id
      labels: {zh: 准则标识, en: Criterion identifier, ja: 基準識別子}
      definitions:
        zh: 在规范版本内唯一标识一个质量比较规则。
        en: Uniquely identifies one quality comparison rule within a specification version.
        ja: 仕様版内の一つの品質比較規則を一意に識別します。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: category-match
      allowed_values: []
      source_claims: [claim-criterion-design]
    - id: evidence_selector
      labels: {zh: 证据选择器, en: Evidence selector, ja: 証拠選択子}
      definitions:
        zh: 说明应从候选、trace、人工标签或 metric 流中取用何种证据的可审计表达式。
        en: "Auditable expression stating what evidence to take from candidate, trace, human label, or metric stream."
        ja: 候補、trace、人間ラベル、metric ストリームからどの証拠を取るかを示す監査可能な式。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '{{ sample.output_text }}'
      allowed_values: []
      source_claims: [claim-criterion-agent-evals, claim-criterion-design]
    - id: success_condition
      labels: {zh: 成功条件, en: Success condition, ja: 成功条件}
      definitions:
        zh: 明确何种比较结果构成通过的操作、阈值或等级条件。
        en: "Explicit operation, threshold, or level condition that constitutes passing."
        ja: 合格を構成する明示的な演算、閾値、段階条件。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: eq item.correct_label
      allowed_values: []
      source_claims: [claim-criterion-agent-evals, claim-criterion-design]
  constraints:
    - id: criterion-has-evidence-and-condition
      severity: error
      expression_language: plain
      expression: evidence_selector and success_condition must both be present; a named quality dimension alone is not an executable criterion.
      explanation:
        zh: 名称如“安全性”不能说明看什么证据或如何得出通过。
        en: A name such as safety does not say what evidence to inspect or how to conclude pass.
        ja: 「安全性」のような名称だけでは、どの証拠を調べ、どう合格と結論するか示せません。
      source_claims: [claim-criterion-design]
    - id: open-telemetry-metric-criterion-declares-window
      severity: error
      expression_language: plain
      expression: If evidence_selector names an OpenTelemetry Metric stream, success_condition must identify aggregation window, aggregation function, and comparison threshold.
      explanation:
        zh: OpenTelemetry Metric 数据点的时间和聚合语义不同；未声明窗口的判断不可复现。
        en: OpenTelemetry Metric data points have temporal and aggregation semantics; a judgment without a declared window is not reproducible.
        ja: OpenTelemetry Metric データ点には時間と集約意味があります。窓を宣言しない判断は再現できません。
      source_claims: [claim-criterion-otel-boundary]
  required_relations:
    - id: evaluation-criterion-part-of-specification
      direction: outgoing
      predicate: part_of
      target_concept_id: EvaluationSpecification
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 准则必须属于一个规范版本，不能孤立地定义评估上下文。
        en: A criterion belongs to one specification version and cannot define evaluation context alone.
        ja: 基準は一つの仕様版に属し、単独で評価文脈を定義できません。
      source_claims: [claim-criterion-design]
examples:
  - id: evaluation-criterion-example-string-check
    labels:
      zh: OpenAI string_check grader 准则
      en: OpenAI string_check grader criterion
      ja: OpenAI string_check grader 基準
    descriptions:
      zh: criterion_id=category-string-match；grader_type=string_check；evidence_selector={{sample.output_text}}；success_condition=eq item.correct_label；对应 OpenAI StringCheckGrader operation=eq。
      en: criterion_id=category-string-match; grader_type=string_check; evidence_selector={{sample.output_text}}; success_condition=eq item.correct_label; maps to OpenAI StringCheckGrader operation=eq.
      ja: criterion_id=category-string-match。grader_type=string_check。evidence_selector={{sample.output_text}}。success_condition=eq item.correct_label。OpenAI StringCheckGrader operation=eq に対応。
    example_source:
      product: OpenAI Graders
      url: https://platform.openai.com/docs/guides/evals
      version: string_check grader
    field_values:
      criterion_id: category-string-match
      evidence_selector: '{{ sample.output_text }}'
      success_condition: eq item.correct_label
    related_node_ids: [EvaluationCriterion, EvaluationSpecification, Verdict, Score]
    related_relation_ids: [evaluation-criterion-part-of-specification]
    source_claims: [claim-criterion-graders-run, claim-criterion-design]
  - id: evaluation-criterion-example-model-grader
    labels:
      zh: OpenAI model_grader 准则
      en: OpenAI model_grader criterion
      ja: OpenAI model_grader 基準
    descriptions:
      zh: criterion_id=support-helpfulness；grader_type=score_model；model=gpt-4.1-mini range=[0,5]；evidence_selector 指向 assistant 回答；success_condition=gte 4 产生 Score 并可能产生 Verdict pass。
      en: criterion_id=support-helpfulness; grader_type=score_model; model=gpt-4.1-mini range=[0,5]; evidence_selector points to assistant answer; success_condition=gte 4 produces Score and may yield Verdict pass.
      ja: criterion_id=support-helpfulness。grader_type=score_model。model=gpt-4.1-mini range=[0,5]。evidence_selector が assistant 回答を指す。success_condition=gte 4 が Score を生み Verdict pass となり得ます。
    example_source:
      product: OpenAI Graders
      url: https://platform.openai.com/docs/guides/evals
      version: score_model grader
    field_values:
      criterion_id: support-helpfulness
      evidence_selector: trace:ticket-104#response-output
      success_condition: gte 4
    related_node_ids: [EvaluationCriterion, Rubric, Score, Verdict]
    related_relation_ids: []
    source_claims: [claim-criterion-graders-run, claim-criterion-design]
  - id: evaluation-criterion-example-braintrust-assertion
    labels:
      zh: Braintrust assertion 准则
      en: Braintrust assertion criterion
      ja: Braintrust assertion 基準
    descriptions:
      zh: criterion_id=exact-match-category；evidence_selector=output.category；success_condition=assertion type=eq expected=Hardware；Braintrust experiment 用 assertion 实现该准则。
      en: criterion_id=exact-match-category; evidence_selector=output.category; success_condition=assertion type=eq expected=Hardware; Braintrust experiment assertion implements this criterion.
      ja: criterion_id=exact-match-category。evidence_selector=output.category。success_condition=assertion type=eq expected=Hardware。Braintrust experiment assertion が本基準を実装します。
    example_source:
      product: Braintrust
      url: https://www.braintrust.dev/docs
      version: experiment assertions
    field_values:
      criterion_id: exact-match-category
      evidence_selector: output.category
      success_condition: assertion eq Hardware
    related_node_ids: [EvaluationCriterion, Verdict, EvaluationRun]
    related_relation_ids: []
    source_claims: [claim-criterion-braintrust, claim-criterion-design]
  - id: evaluation-criterion-counterexample-named-safety
    labels:
      zh: 只有“安全性”名称
      en: Safety named without rule
      ja: 規則のない「安全性」名称
    descriptions:
      zh: criterion_id=safety 但 evidence_selector 与 success_condition 为空；不能登记为 EvaluationCriterion，因为无法执行或审计。
      en: criterion_id=safety but evidence_selector and success_condition are empty; cannot register as EvaluationCriterion because it is not executable or auditable.
      ja: criterion_id=safety だが evidence_selector と success_condition が空。実行・監査できないため EvaluationCriterion として登録できません。
    example_source:
      product: Moonweave evaluation boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: executable criterion requirement
    field_values:
      criterion_id: safety
      evidence_selector: null
      success_condition: null
    related_node_ids: [EvaluationCriterion]
    related_relation_ids: []
    source_claims: [claim-criterion-design]
  - id: evaluation-criterion-example-latency-window
    labels:
      zh: OTLP latency 窗口准则
      en: OTLP latency window criterion
      ja: OTLP latency 窓基準
    descriptions:
      zh: criterion_id=interactive-latency；evidence_selector=otel:agent.response.latency p95/5m；success_condition=lte 1000ms；引用 OpenTelemetry Metric 时必须声明窗口与阈值。
      en: criterion_id=interactive-latency; evidence_selector=otel:agent.response.latency p95/5m; success_condition=lte 1000ms; OpenTelemetry Metric citation requires declared window and threshold.
      ja: criterion_id=interactive-latency。evidence_selector=otel:agent.response.latency p95/5m。success_condition=lte 1000ms。OpenTelemetry Metric 引用時は窓と閾値の宣言が必要です。
    example_source:
      product: OpenTelemetry Metrics Data Model
      url: https://opentelemetry.io/docs/specs/otel/metrics/data-model/
      version: aggregation window semantics
    field_values:
      criterion_id: interactive-latency
      evidence_selector: otel:agent.response.latency p95/5m
      success_condition: lte 1000ms
    related_node_ids: [EvaluationCriterion, EvaluationMetric, Verdict]
    related_relation_ids: []
    source_claims: [claim-criterion-otel-boundary, claim-criterion-design]
parent_relation:
  id: EvaluationCriterion-part-of-EvaluationSpecification
  predicate: part_of
  target: concept:EvaluationSpecification
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 属于评估规范, en: part of evaluation specification, ja: 評価仕様の一部}
  definitions:
    zh: 每个评估准则是其版本化评估规范的组成部分。
    en: Each evaluation criterion is a component of its versioned evaluation specification.
    ja: 各評価基準は版管理された評価仕様の構成要素です。
  cardinality: {source: {min: 1, max: 1}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_criterion, labels: {zh: 包含准则, en: has criterion, ja: 基準を持つ}}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-criterion-design]
  distinct_fact_rationale:
    zh: 该组成关系表达规范包含规则，不表达一次运行的使用。
    en: This composition states the specification contains the rule; it does not state an occurred run's use.
    ja: この構成関係は仕様が規則を含むことを示し、発生した実行の使用を示しません。
  layout_role: primary-backbone
relations:
  - id: EvaluationCriterion-governs-Verdict
    predicate: governs
    target: concept:Verdict
    direction: target-to-source
    relation_kind: semantic
    labels: {zh: 准则约束判定, en: governs verdict, ja: 判定を規定する}
    definitions:
      zh: 判定只有在记录适用准则和比较结果后才表示质量结论。
      en: A verdict represents a quality conclusion only after it records the applied criterion and comparison result.
      ja: 判定は適用基準と比較結果を記録して初めて品質結論を表します。
    cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: applies, labels: {zh: 应用准则, en: applies criterion, ja: 基準を適用する}}
    conditions:
      - id: criterion-governs-verdict-condition
        severity: error
        expression_language: plain
        expression: Assert only when the Verdict records this criterion_id and the observed evidence needed for its success_condition.
        explanations:
          zh: 名称相同或同一运行不足以证明准则确实被应用。
          en: A shared name or run is insufficient evidence that the criterion was actually applied.
          ja: 同じ名前または実行だけでは基準が実際に適用された証拠になりません。
        source_claims: [claim-criterion-design]
    temporal_scope: activity-lifetime
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-criterion-design]
    distinct_fact_rationale:
      zh: 该关系保留规则和其一次结论之间的可审计联系。
      en: This relation preserves the auditable link between a rule and one conclusion under it.
      ja: この関係は規則とその下の一つの結論との監査可能な結び付きを保持します。
    layout_role: cross-link
sources:
  - id: openai-graders-criterion
    title: OpenAI Graders
    url: https://platform.openai.com/docs/guides/evals
    source_type: official-doc
    relevance: string_check, model_grader, multi_grader grader configurations.
  - id: braintrust-criterion
    title: Braintrust Documentation
    url: https://www.braintrust.dev/docs
    source_type: official-doc
    relevance: Assertion-based criterion rules for experiments.
  - id: deepeval-criterion
    title: DeepEval Documentation
    url: https://docs.confident-ai.com
    source_type: official-doc
    relevance: Metric threshold criteria for LLMTestCase evaluation.
  - id: otel-criterion
    title: OpenTelemetry Metrics Data Model
    url: https://opentelemetry.io/docs/specs/otel/metrics/data-model/
    source_type: standard
    relevance: Aggregation and temporal semantics for metric-bound criteria.
  - id: evaluation-criterion-design
    title: Moonweave evaluation criterion design
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Versioned rule mapping evidence and success condition to quality conclusions.
source_claims:
  - id: claim-criterion-agent-evals
    source: openai-graders-criterion
    supports: OpenAI guidance uses graders with structured criteria to score traces and dataset items.
    locator: Evaluate agent workflows — graders
    evidence_kind: official
    confidence: high
  - id: claim-criterion-graders-run
    source: openai-graders-criterion
    supports: POST /v1/fine_tuning/alpha/graders/run accepts StringCheckGrader, ScoreModelGrader, LabelModelGrader with input, reference, and operation fields.
    locator: Run grader — grader types
    evidence_kind: official
    confidence: high
  - id: claim-criterion-braintrust
    source: braintrust-criterion
    supports: Braintrust experiments attach assertion-based rules that ground pass/fail evaluation.
    locator: Experiments; Assertions
    evidence_kind: official
    confidence: high
  - id: claim-criterion-otel-boundary
    source: otel-criterion
    supports: OpenTelemetry metric streams require explicit aggregation and time semantics when cited by quality criteria.
    locator: Metrics Data Model — aggregation and temporality
    evidence_kind: normative
    confidence: high
  - id: claim-criterion-design
    source: evaluation-criterion-design
    supports: A criterion is a versioned rule mapping declared evidence and success condition to later verdicts and scores.
    locator: Evaluation criterion boundary
    evidence_kind: design-inference
    confidence: high
