schema: moonweave.ai/ontology-node/v1
id: EvaluationCriterion
kind: concept
status: accepted
labels: {zh: 评估准则, en: Evaluation Criterion, ja: 評価基準}
semantics:
  short_definition: {zh: 在评估规范内声明一个可判定质量要求的规则。, en: A rule in an evaluation specification that states one decidable quality requirement., ja: 評価仕様内で判定可能な一つの品質要件を宣言する規則。}
  definition: {zh: 评估准则把候选、证据选择方式和成功条件连接起来，例如“分类输出必须与人工标签相等”或“p95 延迟不得超过 1 秒”。它可以使用量规产生 Score，或解释 Evaluation Metric 产生 Verdict；它不是量规、原始 OpenTelemetry Metric、分数、结论、场景或评估活动本身。, en: "An Evaluation Criterion connects a candidate, an evidence-selection method, and a success condition, for example “the category must equal the human label” or “p95 latency must not exceed one second.” It may use a rubric to produce a Score or interpret an Evaluation Metric to produce a Verdict; it is not the rubric, a raw OpenTelemetry Metric, score, verdict, scenario, or evaluation activity itself.", ja: 評価基準は候補、証拠選択方法、成功条件を結び付ける。例えば「分類は人間ラベルと一致しなければならない」や「p95 レイテンシーは1秒を超えてはならない」である。ルーブリックを使って Score を生み、Evaluation Metric を解釈して Verdict を生み得るが、基準自体はルーブリック、生の OpenTelemetry Metric、スコア、判定、シナリオ、評価活動ではない。}
  why_needed: {zh: “质量好”无法被执行或审计。一个明确准则告诉评分器看什么、如何比较以及何时通过，因此同一候选不会因评估者临场理解不同而得到无法解释的结果。, en: "“Good quality” cannot be executed or audited. An explicit criterion tells an evaluator what to inspect, how to compare, and when to pass, preventing unexplained results from a reviewer’s ad hoc interpretation.", ja: 「品質が良い」は実行も監査もできない。明示的な基準は評価器に何を調べ、どう比較し、いつ合格とするかを示し、評価者の場当たり的な解釈による説明不能な結果を防ぐ。}
  includes:
    - {zh: 准则标识、适用对象、证据选择、比较操作、阈值或期望结果。, en: "Criterion identifier, subject, evidence selection, comparison operation, and threshold or expected outcome.", ja: 基準識別子、対象、証拠選択、比較演算、閾値または期待結果。}
    - {zh: 对 Score、Evaluation Metric 或人工依据的可审计解释规则。, en: "Auditable interpretation rules for a Score, Evaluation Metric, or human basis.", ja: Score、Evaluation Metric、または人間の根拠を監査可能に解釈する規則。}
  excludes:
    - {zh: “准确率”这一抽象指标定义；那是 Evaluation Metric，只有被本准则绑定后才判断质量。, en: The abstract metric definition “accuracy”; that is an Evaluation Metric and judges quality only when bound by this criterion., ja: 「accuracy」という抽象メトリック定義。それは Evaluation Metric であり、この基準に結び付く場合にだけ品質を判断する。}
    - {zh: 为 1 到 5 分写出的等级描述；那是 Rubric。, en: Level descriptions written for scores one through five; those are a Rubric., ja: 1から5点のために書かれた段階説明。それは Rubric である。}
  semantic_kind: entity
  aliases: [criterion, grading criterion, acceptance criterion]
engineering:
  explanation: {zh: 现行 OpenAI Agents 评估指南要求 grader 以结构化准则对 trace 评分；本地实现应把候选、证据选择与通过条件保存在版本化规范中，再由评估活动交给比较器。旧 Evals API 的 `testing_criteria`（检查类型、输入、操作和参考值）只可作为历史迁移字段形状。准则引用 OpenTelemetry Metric 时必须同时声明聚合窗口和阈值，避免把任意单点当成质量结论。, en: "Current OpenAI agent-evaluation guidance has graders score traces with structured criteria; a local implementation should retain candidate selection, evidence selection, and pass conditions in a versioned specification before an evaluation activity gives them to a comparator. The legacy Evals API's `testing_criteria` (check type, input, operation, and reference value) is only a historical migration field shape. When a criterion cites an OpenTelemetry Metric, it must also state the aggregation window and threshold so an arbitrary point is not mistaken for a quality conclusion.", ja: 現行の OpenAI Agents 評価ガイドでは grader が構造化基準で trace を採点する。ローカル実装は候補選択、証拠選択、合格条件を版管理された仕様に保持してから、評価活動が比較器に渡す。旧 Evals API の `testing_criteria`（検査型、入力、演算、参照値）は歴史的な移行フィールド形状にすぎない。基準が OpenTelemetry Metric を参照する場合、任意の一点を品質結論と誤認しないよう集約窓と閾値も宣言する必要がある。}
  typical_input:
    - description: Moonweave-local criterion declaration that selects trace evidence and a success condition; it is not an OpenAI wire schema.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "criterion_id": "category-match:v2",
          "evidence_selector": {"trace_ref": "trace:ticket-104", "candidate_output_path": "output_text"},
          "expected_value_ref": "dataset:ticket-category-golden-v2#monitor-no-power.correct_label",
          "pass_condition": "candidate_label equals expected_label"
        }
      source_claims: [claim-criterion-agent-evals, claim-criterion-design]
  typical_output:
    - description: Current grader-run request materialized from the criterion, using the documented string-check fields.
      format: |
        POST /v1/fine_tuning/alpha/graders/run
        {
          "grader": {
            "type": "string_check",
            "name": "category-match",
            "input": "{{sample.output_text}}",
            "reference": "{{item.correct_label}}",
            "operation": "eq"
          }
        }
      source_claims: [claim-criterion-graders-run]
  reference_implementations:
    - {name: OpenAI Evaluate agent workflows, url: https://developers.openai.com/api/docs/guides/agent-evals, description: "Documents current graders that score traces with structured criteria."}
    - {name: OpenAI Run grader reference, url: https://developers.openai.com/api/reference/resources/fine_tuning/subresources/alpha/subresources/graders/methods/run, description: "Documents the current string-check grader request and template-capable input fields."}
    - {name: OpenTelemetry Metrics Data Model, url: https://opentelemetry.io/docs/specs/otel/metrics/data-model/, description: "Defines metric streams and data points that a local criterion may cite as evidence."}
structure:
  identity_keys: [criterion_id]
  fields:
    - id: criterion_id
      labels: {zh: 准则标识, en: Criterion identifier, ja: 基準識別子}
      definitions: {zh: 在规范版本内唯一标识一个质量比较规则。, en: Uniquely identifies one quality comparison rule within a specification version., ja: 仕様バージョン内の一つの品質比較規則を一意に識別する。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: category-match
      allowed_values: []
      source_claims: [claim-criterion-design]
    - id: evidence_selector
      labels: {zh: 证据选择器, en: Evidence selector, ja: 証拠選択子}
      definitions: {zh: 说明应从候选、人工标签、量规或指标流中取用何种证据的可审计表达式。, en: "Auditable expression stating what evidence to take from a candidate, human label, rubric, or metric stream.", ja: 候補、人間ラベル、ルーブリック、メトリックストリームからどの証拠を取るかを示す監査可能な式。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '{{ sample.output_text }}'
      allowed_values: []
      source_claims: [claim-criterion-agent-evals, claim-criterion-design]
    - id: success_condition
      labels: {zh: 成功条件, en: Success condition, ja: 成功条件}
      definitions: {zh: 明确何种比较结果构成通过的操作、阈值或等级条件。, en: "Explicit operation, threshold, or level condition that constitutes passing.", ja: 合格を構成する明示的な演算、閾値、または段階条件。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 'eq item.correct_label'
      allowed_values: []
      source_claims: [claim-criterion-agent-evals, claim-criterion-design]
  constraints:
    - id: criterion-has-evidence-and-condition
      severity: error
      expression_language: plain
      expression: evidence_selector and success_condition must both be present; a named quality dimension alone is not an executable criterion.
      explanation: {zh: 名称如“安全性”不能说明看什么证据或如何得出通过。, en: A name such as “safety” does not say what evidence to inspect or how to conclude pass., ja: 「安全性」のような名称だけでは、どの証拠を調べ、どう合格と結論するか示せない。}
      source_claims: [claim-criterion-design]
    - id: open-telemetry-metric-criterion-declares-window
      severity: error
      expression_language: plain
      expression: If evidence_selector names an OpenTelemetry Metric stream, success_condition must identify the aggregation window, aggregation function, and comparison threshold.
      explanation: {zh: OpenTelemetry Metric 数据点的时间和聚合语义不同；未声明窗口的判断不可复现。, en: OpenTelemetry Metric data points have temporal and aggregation semantics; a judgment without a declared window is not reproducible., ja: OpenTelemetry Metric データ点には時間と集約の意味がある。窓を宣言しない判断は再現できない。}
      source_claims: [claim-criterion-otel-boundary]
  required_relations:
    - id: evaluation-criterion-part-of-specification
      direction: outgoing
      predicate: part_of
      target_concept_id: EvaluationSpecification
      cardinality: {min: 1, max: 1}
      explanations: {zh: 准则必须属于一个规范版本，不能孤立地定义评估上下文。, en: A criterion belongs to one specification version and cannot define evaluation context alone., ja: 基準は一つの仕様バージョンに属し、単独で評価文脈を定義できない。}
      source_claims: [claim-criterion-design]
    - id: evaluation-criterion-governs-verdict
      direction: incoming
      predicate: applies
      target_concept_id: Verdict
      cardinality: {min: 0, max: null}
      explanations: {zh: 已产生的判定必须能指出适用的准则。, en: A produced verdict must be able to identify its applied criterion., ja: 生成された判定は適用した基準を指し示せなければならない。}
      source_claims: [claim-criterion-design]
examples:
  - id: evaluation-criterion-positive-category-match

    labels: {zh: OpenAI string_check 分类准则, en: OpenAI string_check category criterion, ja: OpenAI string_check 分類基準}

    descriptions: {zh: "OpenAI Evals client.evals.create(name, data_source_config, testing_criteria=[string_check, model_graded, text_similarity]); EvaluationCriterion maps EvaluationRun/Criterion/Rubric/Score.", en: "OpenAI Evals client.evals.create with testing_criteria string_check/model_graded/text_similarity; EvaluationCriterion maps EvaluationRun/Criterion/Rubric/Score.", ja: "OpenAI Evals create+graders; EvaluationCriterion eval config."}
    field_values: {criterion_id: category-string-match, evidence_selector: '{{ sample.output_text }}', success_condition: 'eq item.correct_label'}
    related_node_ids: [EvaluationCriterion, EvaluationSpecification, Verdict]
    related_relation_ids: [evaluation-criterion-part-of-specification]

    source_claims: [claim-criterion-agent-evals, claim-criterion-design]
  - id: evaluation-criterion-counterexample-named-safety

    labels: {zh: 只有“安全性”的名称, en: Safety named without a rule, ja: 規則のない「安全性」名称}

    descriptions: {zh: "Vague scoring without constitutional principles cannot serve as CAI-style EvaluationCriterion.", en: "Vague scoring without constitutional principles cannot serve as CAI-style EvaluationCriterion.", ja: "Missing principles rejects CAI-style EvaluationCriterion."}
    field_values: {criterion_id: safety, evidence_selector: null, success_condition: null}
    related_node_ids: [EvaluationCriterion]
    related_relation_ids: []

    source_claims: [claim-criterion-design]
  - id: evaluation-criterion-boundary-latency-window

    labels: {zh: 有窗口的延迟准则, en: Latency criterion with a window, ja: 窓を持つレイテンシー基準}

    descriptions: {zh: "Braintrust scores are scorer output; Criterion is pass/fail rule; EvaluationCriterion must not treat project config as Verdict.", en: "Braintrust scores are scorer output; Criterion is pass/fail rule; EvaluationCriterion must not treat project config as Verdict.", ja: "Project config not Verdict."}
    field_values: {criterion_id: interactive-latency, evidence_selector: 'otel:agent.response.latency p95/5m', success_condition: 'lte 1000ms'}
    related_node_ids: [EvaluationCriterion, EvaluationMetric, Verdict]
    related_relation_ids: []

    source_claims: [claim-criterion-otel-boundary, claim-criterion-design]
  - id: evaluation-criterion-instance-category-match

    labels: {zh: 具体准则 category-match, en: Concrete criterion category-match, ja: 具体的な基準 category-match}

    descriptions: {zh: "CAI instance: principle->self-critique->revised->EvaluationCriterion origin_kind=ai-assisted.", en: "CAI instance: principle->self-critique->revised->EvaluationCriterion origin_kind=ai-assisted.", ja: "CAI instance maps to EvaluationCriterion."}
    field_values: {criterion_id: category-match, evidence_selector: '{{ sample.output_text }}', success_condition: 'eq item.correct_label'}
    related_node_ids: [EvaluationCriterion, EvaluationSpecification, EvaluationRun, Verdict]
    related_relation_ids: [evaluation-criterion-part-of-specification]

    source_claims: [claim-criterion-agent-evals, claim-criterion-design]
parent_relation:
  id: EvaluationCriterion-part-of-EvaluationSpecification
  predicate: part_of
  target: concept:EvaluationSpecification
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 属于评估规范, en: part of evaluation specification, ja: 評価仕様の一部}
  definitions: {zh: 每个评估准则是其版本化评估规范的组成部分。, en: Each evaluation criterion is a component of its versioned evaluation specification., ja: 各評価基準は版管理された評価仕様の構成要素である。}
  cardinality: {source: {min: 1, max: 1}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_criterion, labels: {zh: 包含准则, en: has criterion, ja: 基準を持つ}}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-criterion-design]
  distinct_fact_rationale: {zh: 该组成关系表达规范包含规则，不表达一次运行的使用。, en: This composition states that the specification contains the rule; it does not state an occurred run's use., ja: この構成関係は仕様が規則を含むことを示し、発生した実行の使用を示すものではない。}
  layout_role: primary-backbone
relations:
  - id: EvaluationCriterion-governs-Verdict
    predicate: governs
    target: concept:Verdict
    direction: target-to-source
    relation_kind: semantic
    labels: {zh: 准则约束判定, en: governs verdict, ja: 判定を規定する}
    definitions: {zh: 判定只有在记录适用准则和比较结果后才表示质量结论。, en: A verdict represents a quality conclusion only after it records the applied criterion and comparison result., ja: 判定は適用基準と比較結果を記録して初めて品質結論を表す。}
    cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: applies, labels: {zh: 应用准则, en: applies criterion, ja: 基準を適用する}}
    conditions:
      - id: criterion-governs-verdict-condition
        severity: error
        expression_language: plain
        expression: Assert only when the Verdict records this criterion_id and the observed evidence needed for its success_condition.
        explanations: {zh: 名称相同或同一运行不足以证明准则确实被应用。, en: A shared name or run is insufficient evidence that the criterion was actually applied., ja: 同じ名前または実行だけでは基準が実際に適用された証拠にならない。}
        source_claims: [claim-criterion-design]
    temporal_scope: activity-lifetime
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-criterion-design]
    distinct_fact_rationale: {zh: 该关系保留规则和其一次结论之间的可审计联系。, en: This relation preserves the auditable link between a rule and one conclusion under it., ja: この関係は規則とその下の一つの結論との監査可能な結び付きを保持する。}
    layout_role: cross-link
sources:
  - id: openai-agent-evals-criterion
    title: OpenAI Evaluate agent workflows
    url: https://developers.openai.com/api/docs/guides/agent-evals
    source_type: official-doc
    relevance: Current OpenAI guidance says graders score traces with structured criteria to find regressions and failure modes.
  - id: openai-evals-criterion
    title: Legacy OpenAI Working with evals API
    url: https://developers.openai.com/api/docs/guides/evals
    source_type: official-doc
    relevance: Documents historical testing_criteria structures for typed comparisons only.
  - id: openai-graders-criterion
    title: OpenAI Run grader reference
    url: https://developers.openai.com/api/reference/resources/fine_tuning/subresources/alpha/subresources/graders/methods/run
    source_type: official-doc
    relevance: Documents the current grader-run operation and StringCheckGrader configuration used to materialize a criterion.
  - id: otel-metrics-criterion
    title: OpenTelemetry Metrics Data Model
    url: https://opentelemetry.io/docs/specs/otel/metrics/data-model/
    source_type: standard
    relevance: Defines aggregation and temporal semantics of metric streams that criteria must preserve.
  - id: evaluation-criterion-design
    title: Evaluation criterion design inference
    url: https://www.w3.org/TR/prov-o/
    source_type: design-inference
    relevance: Applies standards to a local rule that maps evidence and a success condition to a quality conclusion.
source_claims:
  - id: claim-criterion-agent-evals
    source: openai-agent-evals-criterion
    supports: Current OpenAI guidance uses graders to score workflow traces with structured criteria.
    locator: "Evaluate agent workflows: Start with traces when you are still debugging behavior"
    evidence_kind: official
    confidence: high
  - id: claim-criterion-evals
    source: openai-evals-criterion
    supports: The legacy OpenAI Evals API testing_criteria include typed checks with input, operation, and reference values.
    locator: "Working with evals (legacy API): testing_criteria parameter"
    evidence_kind: official
    confidence: high
  - id: claim-criterion-graders-run
    source: openai-graders-criterion
    supports: The current Run grader operation accepts a StringCheckGrader with type, name, input, reference, and operation fields, and its input and reference may contain template strings.
    locator: "Run grader: POST /fine_tuning/alpha/graders/run; StringCheckGrader"
    evidence_kind: official
    confidence: high
  - id: claim-criterion-otel-boundary
    source: otel-metrics-criterion
    supports: OpenTelemetry metric streams and data points have explicit aggregation and time semantics, so a quality criterion must preserve those semantics when it cites them.
    locator: "Metrics Data Model: Metric Stream model; Metric Points; Temporality"
    evidence_kind: normative
    confidence: high
  - id: claim-criterion-design
    source: evaluation-criterion-design
    supports: A criterion is a versioned rule that maps declared evidence and a success condition to a later verdict; this is a design inference, not an OTel or OpenAI normative class.
    locator: "Local evaluation criterion boundary"
    evidence_kind: design-inference
    confidence: high


