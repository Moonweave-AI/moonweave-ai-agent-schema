        ja: この対象は SuccessCriterion かつ EvaluationCriterion です。
      why_valid_or_invalid:
        zh: 它继承判据的证据与运算结构，并把结果域限制为二值。
        en: It inherits criterion evidence and operation while restricting the result domain to Boolean.
        ja: 判定基準の証拠と演算を継承し結果域を二値に限定します。
