schema: moonweave.ai/ontology-node/v1
id: SuccessCriterion
kind: concept
status: accepted
labels:
  zh: 成功判据
  en: success criterion
  ja: 成功基準
semantics:
  short_definition:
    zh: 成功判据是把证据归结为通过或未通过的评估判据。
    en: A success criterion is an evaluation criterion that reduces evidence to pass or fail.
    ja: 成功基準は証拠を合格または不合格に帰着する評価判定基準です。
  definition:
    zh: 成功判据是 EvaluationCriterion 的二值判定子类；它明确通过条件、容差和缺失证据的处理方式，不等同于任务规范中的完成条件，也不保存判定结果。
    en: A success criterion is a Boolean subtype of EvaluationCriterion that states pass conditions, tolerances, and treatment of missing evidence; it is neither the task specification's completion condition nor the resulting judgment.
    ja: 成功基準は EvaluationCriterion の二値判定下位型で、合格条件、許容差、欠測証拠の扱いを定め、タスク仕様の完了条件や判定結果とは異なります。
  why_needed:
    zh: 成功判据把“任务何时完成”与“评估是否通过”分开，并使发布门槛可审计。
    en: It separates when a task is complete from whether an evaluation passes and makes release gates auditable.
    ja: タスク完了時点と評価合格を分け、リリース閾値を監査可能にします。
  includes:
    - zh: 包括最低正确率、必须满足的安全条件和允许的失败数量。
      en: Includes minimum correctness, mandatory safety conditions, and allowed failure counts.
      ja: 最低正確率、必須安全条件、許容失敗件数を含みます。
  excludes:
    - zh: 不包括 TaskCompletionCriterion 的业务完成定义，也不包括某次通过或失败的 Score。
      en: Excludes a TaskCompletionCriterion defining business completion and a Score recording one pass or failure.
      ja: 業務完了を定義する TaskCompletionCriterion と一回の合否 Score は含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
  - id: SuccessCriterion-example-positive-manual-001
    kind: positive
    labels:
      zh: 成功判据正例
      en: Positive success criterion case
      ja: 成功基準の正例
    scenario_id: null
    descriptions:
      zh: 发布门规定安全检查全部通过且任务成功率至少为 95%。
      en: A release gate requires every safety check to pass and task success rate to reach at least 95%.
      ja: リリース門は全安全検査合格とタスク成功率 95% 以上を要求します。
    field_values:
      criterion_id: criterion/release-safety-success
      quality_dimension: safety-and-task-success
      evidence_requirement: all safety checks pass and task success rate is measured over the release evaluation set
      judgment_operator: all-of-and-threshold
      threshold: 0.95
    related_node_ids:
      - SuccessCriterion
    related_relation_ids: []
    expected_result:
      zh: 该门槛应建模为成功判据。
      en: The gate is a success criterion.
      ja: この閾値は成功基準です。
    why_valid_or_invalid:
      zh: 它是对评估证据作二值判定的可复用规则。
      en: It is a reusable Boolean rule over evaluation evidence.
      ja: 評価証拠に対する再利用可能な二値規則です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-success-criterion-002
  - id: SuccessCriterion-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 成功判据边界例
      en: Boundary success criterion case
      ja: 成功基準の境界例
    scenario_id: null
    descriptions:
      zh: 任务条件写明“生成发票并发送给客户”但没有质量阈值。
      en: A task condition says to generate and send an invoice but states no quality threshold.
      ja: タスク条件は請求書生成・送信を求めますが品質閾値を持ちません。
    field_values: {}
    related_node_ids:
      - SuccessCriterion
    related_relation_ids: []
    expected_result:
      zh: 这是任务完成条件，不是评估成功判据。
      en: This is a task completion condition, not an evaluation success criterion.
      ja: これはタスク完了条件で評価成功基準ではありません。
    why_valid_or_invalid:
      zh: 业务交付要求没有定义如何从评估证据得出通过结论。
      en: The business deliverable does not define how evaluation evidence yields a pass judgment.
      ja: 業務成果要件は評価証拠から合格を導く方法を定義しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-success-criterion-003
