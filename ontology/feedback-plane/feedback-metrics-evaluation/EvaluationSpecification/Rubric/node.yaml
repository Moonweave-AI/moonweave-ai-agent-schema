schema: moonweave.ai/ontology-node/v1
id: Rubric
kind: concept
labels:
  zh: 评分量规
  en: Rubric
  ja: ルーブリック
semantics:
  short_definition:
    zh: 把质量水平映射为可解释等级的静态评分指南。
    en: A static scoring guide that maps quality levels to explainable descriptions.
    ja: 品質水準を説明可能な段階へ対応付ける静的採点指針。
  definition:
    zh: Rubric 是评估规范中的静态实体，为一个或多个质量维度规定等级、每级表现描述和适用说明。例如 1–5 分或 MT-Bench 1–10 分别代表什么。它用于指导 Score 的产生；不是实际的 Score、Verdict、EvaluationCriterion 或评估活动。OpenAI score_model grader 的 range 与 LangSmith/人工评审量表均可映射为本地 Rubric 版本。
    en: "Rubric is a static entity in an evaluation specification stating levels, performance descriptions at each level, and application notes for one or more quality dimensions. For example, what scores 1–5 or MT-Bench 1–10 mean. It guides production of a Score; it is not the actual Score, Verdict, EvaluationCriterion, or evaluation activity. OpenAI score_model grader range and LangSmith/human review scales map to local Rubric versions."
    ja: Rubric は評価仕様内の静的エンティティで、一つ以上の品質次元について段階、各段階の性能説明、適用注記を定めます。例えば 1–5 点や MT-Bench 1–10 の意味。Score 生成を導きますが、実際の Score、Verdict、EvaluationCriterion、評価活動ではありません。OpenAI score_model grader の range と LangSmith/人間レビュー尺度はローカル Rubric 版に写像できます。
  why_needed:
    zh: 没有等级锚点时，两名评审者都说“不错”却可能给出完全不同的分数。量规把隐含判断写成共享规则，支持复核、校准和更一致的自动评分。
    en: "Without level anchors, two reviewers can both say good yet give very different scores. A rubric turns hidden judgment into a shared rule, supporting review, calibration, and more consistent automated scoring."
    ja: 段階のアンカーがないと、二人の評価者が共に「良い」と言っても全く異なる点数を付け得ます。ルーブリックは隠れた判断を共有規則に変え、再確認、較正、一貫した自動採点を支えます。
  includes:
    - zh: 量规标识、尺度（scale）、等级描述（level_descriptions）、适用准则引用。
      en: "Rubric identifier, scale, level_descriptions, and applicable criterion reference."
      ja: ルーブリック識別子、尺度（scale）、段階説明（level_descriptions）、適用基準参照。
  excludes:
    - zh: 原始候选输出、评审者自由文本意见或实际数值分数（Score）。
      en: "Raw candidate output, reviewer free-text opinion, or the actual numeric score (Score)."
      ja: 生候補出力、評価者の自由記述意見、実際の数値スコア（Score）。
    - zh: 自动或人工的最终通过/失败结论（Verdict）。
      en: An automated or human final pass/fail conclusion (Verdict).
      ja: 自動又は人間の最終合否結論（Verdict）。
  semantic_kind: entity
  aliases: [grading rubric, scoring guide, rating scale]
engineering:
  explanation:
    zh: 新集成应以 OpenAI score_model grader range、LangSmith feedback rubric、MT-Bench 1–10 等级、helpfulness 1–5 等级为可映射 API 形状，再以版本化 JSON 保存 rubric_id、version、scale、level_descriptions。自动 grader 输出 score 时必须同时持久化 rubric_ref 与 criterion_ref。
    en: "New integrations should treat OpenAI score_model grader range, LangSmith feedback rubrics, MT-Bench 1–10 levels, and helpfulness 1–5 levels as mappable API shapes, then persist versioned JSON with rubric_id, version, scale, and level_descriptions. Automated grader score output must also persist rubric_ref and criterion_ref."
    ja: 新しい統合では OpenAI score_model grader range、LangSmith feedback rubric、MT-Bench 1–10 段階、helpfulness 1–5 段階を写像可能 API 形状として扱い、版管理 JSON で rubric_id、version、scale、level_descriptions を保存します。自動 grader の score 出力時は rubric_ref と criterion_ref も永続化する必要があります。
  typical_input:
    - description: OpenAI score_model grader with declared numeric range as rubric scale.
      format: |
        {"grader": {"type": "score_model", "name": "support-helpfulness", "range": [0, 5]}}
      source_claims: [claim-rubric-graders-run]
  typical_output:
    - description: Structured grader result retained with rubric version.
      format: |
        {"rubric_id": "helpfulness", "version": "v1", "score": 4, "rationale": "Correct answer with one omitted recovery step."}
      source_claims: [claim-rubric-design]
  reference_implementations:
    - name: OpenAI Graders
      url: https://platform.openai.com/docs/guides/evals
      description: score_model grader with numeric range configuration.
    - name: LangSmith
      url: https://docs.smith.langchain.com
      description: Human and automated feedback scoring scales.
structure:
  identity_keys: [rubric_id, version]
  fields:
    - id: rubric_id
      labels: {zh: 量规标识, en: Rubric identifier, ja: ルーブリック識別子}
      definitions:
        zh: 稳定标识一套等级描述的名称，而非单次评分标识。
        en: "Stable name for one set of level descriptions, not an individual score identifier."
        ja: 一組の段階説明の安定名であり、個別スコア識別子ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: helpfulness
      allowed_values: []
      source_claims: [claim-rubric-design]
    - id: version
      labels: {zh: 量规版本, en: Rubric version, ja: ルーブリック版}
      definitions:
        zh: 固定等级含义的版本；等级文字改变必须产生新版本。
        en: Version fixing level meanings; changed level text requires a new version.
        ja: 段階の意味を固定する版。段階テキストの変更には新しい版が必要です。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._-]+$'
      example_value: v1
      allowed_values: []
      source_claims: [claim-rubric-design]
    - id: scale
      labels: {zh: 评分尺度, en: Scoring scale, ja: 採点尺度}
      definitions:
        zh: 声明合法等级和顺序的尺度，例如 integer-1-to-5 或 integer-1-to-10。
        en: "Scale declaring legal levels and their order, for example integer-1-to-5 or integer-1-to-10."
        ja: integer-1-to-5 や integer-1-to-10 など、合法段階と順序を宣言する尺度。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: integer-1-to-5
      allowed_values: [integer-1-to-5, integer-1-to-10, binary-pass-fail]
      source_claims: [claim-rubric-design]
    - id: level_descriptions
      labels: {zh: 等级描述, en: Level descriptions, ja: 段階説明}
      definitions:
        zh: 按 scale 声明的每个合法等级及其可接受表现描述；缺失或重复会使同一分值失去稳定含义。
        en: Description of each legal level and acceptable performance under scale; missing or duplicate levels make the same score unstable.
        ja: scale で宣言された各合法段階と許容性能説明。欠落や重複は同じスコアを不安定にします。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '{"1":"Irrelevant or wrong","3":"Partially helpful","5":"Complete and actionable"}'
      allowed_values: []
      source_claims: [claim-rubric-design]
  constraints:
    - id: rubric-complete-level-descriptions
      severity: error
      expression_language: plain
      expression: Every level permitted by scale must have a distinct description, and no description may silently cover an undeclared level.
      explanation:
        zh: 缺失或重复等级会让同一分数失去稳定含义。
        en: Missing or duplicate levels make the meaning of the same score unstable.
        ja: 欠落または重複した段階は同じスコアの意味を不安定にします。
      source_claims: [claim-rubric-design]
    - id: rubric-version-immutable
      severity: error
      expression_language: plain
      expression: A persisted Score must identify the rubric_id and version used; editing level descriptions in place is forbidden.
      explanation:
        zh: 否则历史分数会在事后被重新解释。
        en: Otherwise historical scores can be reinterpreted after the fact.
        ja: そうでないと過去のスコアが事後的に再解釈されます。
      source_claims: [claim-rubric-design]
  required_relations:
    - id: rubric-part-of-specification
      direction: outgoing
      predicate: part_of
      target_concept_id: EvaluationSpecification
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 量规必须在规范中声明其适用范围和版本。
        en: A rubric must declare its scope and version in a specification.
        ja: ルーブリックは仕様内で適用範囲と版を宣言しなければなりません。
      source_claims: [claim-rubric-design]
examples:
  - id: rubric-example-helpfulness-five-level
    labels:
      zh: helpfulness 1–5 量规
      en: helpfulness 1–5 rubric
      ja: helpfulness 1–5 ルーブリック
    descriptions:
      zh: rubric_id=helpfulness version=v1 scale=integer-1-to-5；level_descriptions 定义 1=无关/错误、3=部分有用、5=完整可执行；OpenAI score_model grader range=[0,5] 对应此尺度。
      en: rubric_id=helpfulness version=v1 scale=integer-1-to-5; level_descriptions define 1=irrelevant/wrong, 3=partially helpful, 5=complete/actionable; OpenAI score_model grader range=[0,5] maps to this scale.
      ja: rubric_id=helpfulness version=v1 scale=integer-1-to-5。level_descriptions が 1=無関係/誤り、3=部分的に有用、5=完全で実行可能を定義。OpenAI score_model grader range=[0,5] がこの尺度に対応。
    example_source:
      product: OpenAI Graders
      url: https://platform.openai.com/docs/guides/evals
      version: score_model range
    field_values:
      rubric_id: helpfulness
      version: v1
      scale: integer-1-to-5
      level_descriptions: '{"1":"Irrelevant or wrong","3":"Partially helpful","5":"Complete and actionable"}'
    related_node_ids: [Rubric, Score, EvaluationCriterion]
    related_relation_ids: [rubric-part-of-specification]
    source_claims: [claim-rubric-graders-run, claim-rubric-design]
  - id: rubric-example-mtbench-ten-level
    labels:
      zh: MT-Bench 1–10 量规
      en: MT-Bench 1–10 rubric
      ja: MT-Bench 1–10 ルーブリック
    descriptions:
      zh: rubric_id=mt-bench-1-10 version=v1 scale=integer-1-to-10；GPT-4 judge 对单轮回答评分；Score mtbench-gpt4-judge-81 value=8 必须引用此 rubric 版本才可解释。
      en: rubric_id=mt-bench-1-10 version=v1 scale=integer-1-to-10; GPT-4 judge scores single-turn answers; Score mtbench-gpt4-judge-81 value=8 must cite this rubric version to be interpretable.
      ja: rubric_id=mt-bench-1-10 version=v1 scale=integer-1-to-10。GPT-4 judge が単一ターン回答を採点。Score mtbench-gpt4-judge-81 value=8 は解釈可能にするためこの rubric 版を引用する必要があります。
    example_source:
      product: MT-Bench
      url: https://arxiv.org/abs/2306.05685
      version: GPT-4 judge 1-10 scale
    field_values:
      rubric_id: mt-bench-1-10
      version: v1
      scale: integer-1-to-10
      level_descriptions: '{"1":"Complete failure","5":"Mediocre","10":"Perfect response"}'
    related_node_ids: [Rubric, Score, EvaluationCriterion]
    related_relation_ids: []
    source_claims: [claim-rubric-design]
  - id: rubric-example-langsmith-binary
    labels:
      zh: LangSmith 二元正确性量规
      en: LangSmith binary correctness rubric
      ja: LangSmith 二値正確性ルーブリック
    descriptions:
      zh: rubric_id=binary-correctness version=v1 scale=binary-pass-fail；level_descriptions pass=标注与期望一致 fail=不一致；LangSmith feedback score correctness=1.0 映射 value=1.0 在此尺度上。
      en: rubric_id=binary-correctness version=v1 scale=binary-pass-fail; level_descriptions pass=annotation matches expected fail=mismatch; LangSmith feedback score correctness=1.0 maps to value=1.0 on this scale.
      ja: rubric_id=binary-correctness version=v1 scale=binary-pass-fail。level_descriptions pass=注釈が期待と一致 fail=不一致。LangSmith feedback score correctness=1.0 がこの尺度上の value=1.0 に写像。
    example_source:
      product: LangSmith
      url: https://docs.smith.langchain.com
      version: feedback scores
    field_values:
      rubric_id: binary-correctness
      version: v1
      scale: binary-pass-fail
      level_descriptions: '{"pass":"Annotation matches expected","fail":"Annotation mismatches expected"}'
    related_node_ids: [Rubric, Score, HumanFeedback]
    related_relation_ids: []
    source_claims: [claim-rubric-langsmith, claim-rubric-design]
  - id: rubric-counterexample-vague-rating
    labels:
      zh: 没有等级定义的“给个分”
      en: Give-a-score without levels
      ja: 段階定義のない「点を付ける」
    descriptions:
      zh: 评审表单只有“请打分”而无 scale 与 level_descriptions；不能登记为 Rubric，因为 value=4 无法稳定解释。
      en: Review form says please rate without scale and level_descriptions; cannot register as Rubric because value=4 is not stably interpretable.
      ja: レビューフォームが scale と level_descriptions なしで「採点してください」のみ。value=4 が安定して解釈できないため Rubric として登録できません。
    example_source:
      product: Moonweave evaluation boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: level description requirement
    field_values:
      rubric_id: null
      version: null
      scale: integer-1-to-5
    related_node_ids: [Rubric, Score]
    related_relation_ids: []
    source_claims: [claim-rubric-design]
  - id: rubric-boundary-binary-verdict
    labels:
      zh: 二元量规与判定的边界
      en: Boundary between binary rubric and verdict
      ja: 二値ルーブリックと判定の境界
    descriptions:
      zh: Rubric schema-validity scale=binary-pass-fail 定义等级含义；Verdict outcome=pass/fail 是类别结论。量规指导 Score 赋值，Verdict 还需 criterion_ref 与 evidence_ref，不能把量规等级直接当最终判定。
      en: Rubric schema-validity scale=binary-pass-fail defines level meanings; Verdict outcome=pass/fail is a categorical conclusion. Rubric guides Score assignment; Verdict also needs criterion_ref and evidence_ref—a rubric level cannot directly substitute for a final verdict.
      ja: Rubric schema-validity scale=binary-pass-fail が段階意味を定義。Verdict outcome=pass/fail はカテゴリ結論。Rubric は Score 付与を導き、Verdict には criterion_ref と evidence_ref も必要。ルーブリック段階を最終判定の直接代用にできません。
    example_source:
      product: Moonweave evaluation boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: rubric vs verdict boundary
    field_values:
      rubric_id: schema-validity
      version: v1
      scale: binary-pass-fail
    related_node_ids: [Rubric, Verdict, Score]
    related_relation_ids: []
    source_claims: [claim-rubric-design]
parent_relation:
  id: Rubric-part-of-EvaluationSpecification
  predicate: part_of
  target: concept:EvaluationSpecification
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 属于评估规范, en: part of evaluation specification, ja: 評価仕様の一部}
  definitions:
    zh: 量规是版本化评估规范的一部分，规定其评分等级含义。
    en: A rubric is part of a versioned evaluation specification and states its score-level meanings.
    ja: ルーブリックは版管理された評価仕様の一部であり、スコア段階の意味を定めます。
  cardinality: {source: {min: 1, max: 1}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_rubric, labels: {zh: 包含量规, en: has rubric, ja: ルーブリックを持つ}}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-rubric-design]
  distinct_fact_rationale:
    zh: 此关系表达规范拥有评分指南，而不是任何一次评分。
    en: "This relation states the specification owns the scoring guide, not any scoring occurrence."
    ja: この関係は仕様が採点指針を持つことを示し、採点の発生事象を示しません。
  layout_role: primary-backbone
relations:
  - id: Rubric-guides-Score
    predicate: guides
    target: concept:Score
    direction: target-to-source
    relation_kind: semantic
    labels: {zh: 指导评分, en: guides score, ja: スコアを導く}
    definitions:
      zh: 一个分数遵循量规时，应记录量规标识、版本和符合的等级。
      en: "When a score follows a rubric, it should record the rubric identifier, version, and level satisfied."
      ja: スコアがルーブリックに従う場合、ルーブリック識別子、版、満たした段階を記録します。
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: 1}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: follows, labels: {zh: 遵循量规, en: follows rubric, ja: ルーブリックに従う}}
    conditions:
      - id: rubric-guides-score-version-condition
        severity: error
        expression_language: plain
        expression: Assert only when Score.rubric_ref equals this rubric's identity keys.
        explanations:
          zh: 不能因为尺度相同就假定分数使用了某份量规。
          en: A shared scale does not prove that a score used a particular rubric.
          ja: 同じ尺度であることは、スコアが特定のルーブリックを使用した証拠ではありません。
        source_claims: [claim-rubric-design]
    temporal_scope: activity-lifetime
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-rubric-design]
    distinct_fact_rationale:
      zh: 此关系连接评分指南与一份具体评分，不把二者合并为同一对象。
      en: This relation links a scoring guide to one concrete score without merging them into one object.
      ja: この関係は採点指針と一つの具体的スコアを結び、同一オブジェクトへ統合しません。
    layout_role: cross-link
sources:
  - id: openai-graders-rubric
    title: OpenAI Graders
    url: https://platform.openai.com/docs/guides/evals
    source_type: official-doc
    relevance: score_model grader numeric range as rubric scale configuration.
  - id: langsmith-rubric
    title: LangSmith Documentation
    url: https://docs.smith.langchain.com
    source_type: official-doc
    relevance: Feedback scoring scales for human and automated review.
  - id: rubric-design
    title: Moonweave Rubric design inference
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Separates reusable scoring guide Entity from score and verdict entities.
source_claims:
  - id: claim-rubric-graders-run
    source: openai-graders-rubric
    supports: OpenAI ScoreModelGrader accepts a numeric range that defines the rubric scale for score output.
    locator: Run grader — ScoreModelGrader range
    evidence_kind: official
    confidence: high
  - id: claim-rubric-langsmith
    source: langsmith-rubric
    supports: LangSmith feedback scores attach to runs with named keys that can map to rubric scales.
    locator: Feedback scores
    evidence_kind: official
    confidence: high
  - id: claim-rubric-design
    source: rubric-design
    supports: Separating a reusable level-description Entity from generated score and verdict Entities preserves provenance and versioning.
    locator: Rubric, score, and verdict boundary
    evidence_kind: design-inference
    confidence: high
