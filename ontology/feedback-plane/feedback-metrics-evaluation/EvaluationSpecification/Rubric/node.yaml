schema: moonweave.ai/ontology-node/v1
id: Rubric
kind: concept
status: accepted
labels:
  zh: 评分量规
  en: rubric
  ja: 採点ルーブリック
semantics:
  short_definition:
    zh: 评分量规是把一个判据展开为若干可区分表现等级的评分说明。
    en: A rubric expands a criterion into distinguishable performance levels and scoring guidance.
    ja: 採点ルーブリックは判定基準を区別可能な達成水準と採点指針に展開します。
  definition:
    zh: 评分量规是评估规范中的分级判定部件；它为同一质量维度声明有序或分类等级、每级描述和评分边界，区别于仅表达一个真假条件的成功判据。
    en: A rubric is a graded adjudication component of an evaluation specification that declares ordered or categorical levels, level descriptions, and scoring boundaries for one quality dimension, unlike a single Boolean success criterion.
    ja: 採点ルーブリックは評価仕様の段階判定部品で、一つの品質次元について順序・分類水準、各水準の記述、採点境界を宣言し、単一真偽の成功基準と異なります。
  why_needed:
    zh: 量规让人工与模型评审使用同一等级语义，也使分数的可解释性独立于评审者。
    en: A rubric gives human and model reviewers shared level semantics and makes score interpretation independent of the reviewer.
    ja: ルーブリックは人間とモデルの審査に共通水準を与え、スコア解釈を審査者から独立させます。
  includes:
    - zh: 包括 1–5 级质量描述、类别标签及相邻等级的判别边界。
      en: Includes 1–5 level descriptions, categorical labels, and boundaries between adjacent levels.
      ja: 1～5 段階の記述、分類ラベル、隣接水準の境界を含みます。
  excludes:
    - zh: 不包括应用量规得到的 Score，也不包括承载输入和预期输出的 EvaluationScenario。
      en: Excludes a Score obtained by applying the rubric and an EvaluationScenario carrying inputs and expected outputs.
      ja: 適用後の Score と、入力・期待出力を持つ EvaluationScenario は含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - rubric_id
  fields:
    - id: rubric_id
      labels:
        zh: 量规标识
        en: rubric ID
        ja: rubric ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一套可复用的分级评分说明。
        en: Stably identifies one reusable set of graded scoring instructions.
        ja: 再利用可能な段階別 scoring instruction 一式を安定識別します。
      allowed_values: []
      pattern: null
      example_value: rubric/tool-selection-v3
      source_claims:
        - claim-rubric-002
    - id: criterion_refs
      labels:
        zh: 判据引用
        en: criterion references
        ja: criterion 参照
      datatype: reference-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出由本量规分级解释的 EvaluationCriterion；量规不复制判据身份。
        en: Lists the EvaluationCriteria whose judgments this rubric grades without copying their identities.
        ja: 本 rubric が段階解釈する EvaluationCriterion を列挙し、criterion identity は複製しません。
      allowed_values: []
      pattern: null
      example_value:
        - criterion/tool-choice-quality
      source_claims:
        - claim-rubric-003
    - id: scale_type
      labels:
        zh: 量尺类型
        en: scale type
        ja: 尺度型
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明等级为有序数值、无序类别、二元或成对偏好，决定允许的比较方式。
        en: Declares whether grades are ordinal numeric, nominal categorical, binary, or pairwise, determining valid comparisons.
        ja: grade が ordinal numeric・nominal categorical・binary・pairwise のどれかを示し、有効な比較を決めます。
      allowed_values: []
      pattern: null
      example_value: ordinal
      source_claims:
        - claim-rubric-004
    - id: levels
      labels:
        zh: 评分等级
        en: score levels
        ja: 評価段階
      datatype: structured-list
      required: true
      cardinality:
        min: 2
        max: null
      definitions:
        zh: 给出每个分值或类别的代码、顺序和可观察描述。
        en: Defines the code, ordering where applicable, and observable description for every score or category.
        ja: 各 score または category の code・必要な順序・観測可能な説明を定めます。
      allowed_values: []
      pattern: null
      example_value:
        - code: 1
          description: wrong tool
        - code: 4
          description: optimal and efficient tool
      source_claims:
        - claim-rubric-005
    - id: scoring_instructions
      labels:
        zh: 评分说明
        en: scoring instructions
        ja: 採点指示
      datatype: text-or-expression
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定评审者或评估器如何依据证据在相邻等级之间作出选择。
        en: Tells a reviewer or evaluator how evidence selects among adjacent levels.
        ja: 証拠に基づき隣接 level のどれを選ぶかを reviewer または evaluator に指示します。
      allowed_values: []
      pattern: null
      example_value: Choose 4 only when the selected tool is both optimal and avoids redundant calls.
      source_claims:
        - claim-rubric-006
  constraints: []
  required_relation_constraints: []
examples:
  - id: Rubric-example-positive-manual-001
    kind: positive
    labels:
      zh: 评分量规正例
      en: Positive rubric case
      ja: 採点ルーブリックの正例
    scenario_id: null
    descriptions:
      zh: 量规把工具选择评为 1 至 4 级，并逐级说明错误工具、可行工具、最优工具和最优且高效。
      en: A rubric rates tool selection from 1 to 4 and defines wrong, viable, optimal, and optimal-efficient levels.
      ja: ルーブリックはツール選択を 1～4 で評価し、誤り、実行可能、最適、最適かつ効率的を定義します。
    field_values:
      rubric_id: rubric/tool-selection-v3
      criterion_refs:
        - criterion/tool-choice-quality
      scale_type: ordinal
      levels:
        - code: 1
          description: wrong tool
        - code: 4
          description: optimal and efficient tool
      scoring_instructions: Choose 4 only when the selected tool is both optimal and avoids redundant calls.
    related_node_ids:
      - Rubric
    related_relation_ids: []
    expected_result:
      zh: 该对象应识别为评分量规。
      en: The object is a rubric.
      ja: この対象は採点ルーブリックです。
    why_valid_or_invalid:
      zh: 它具有稳定等级、逐级描述和可判别边界。
      en: It has stable levels, per-level descriptions, and discriminating boundaries.
      ja: 安定した水準、各水準記述、判別境界があります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-rubric-007
  - id: Rubric-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 评分量规边界例
      en: Boundary rubric case
      ja: 採点ルーブリックの境界例
    scenario_id: null
    descriptions:
      zh: 规则仅写明“所有关键步骤均通过则成功”，没有等级或分类描述。
      en: A rule only says success requires all critical steps to pass and provides no levels or categories.
      ja: 規則は全重要手順が合格なら成功とだけ記し、水準や分類を持ちません。
    field_values: {}
    related_node_ids:
      - Rubric
    related_relation_ids: []
    expected_result:
      zh: 该对象是 SuccessCriterion，不是 Rubric。
      en: The object is a SuccessCriterion, not a Rubric.
      ja: これは SuccessCriterion であり Rubric ではありません。
    why_valid_or_invalid:
      zh: 单一通过条件没有量规所需的多级评分结构。
      en: A single pass condition lacks the multi-level scoring structure required by a rubric.
      ja: 単一合格条件にはルーブリックに必要な多段階構造がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-rubric-008
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: EvaluationSpecification-contains_rubric-Rubric
  predicate: contains_rubric
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 包含量规
    en: contains rubric
    ja: ルーブリックを含む
  definitions:
    zh: 评估规范包含作为评分尺度组成部分的 Rubric；量规版本变化会改变该规范下 Score 的解释。
    en: An EvaluationSpecification contains a Rubric as a scoring-scale component; changing its version changes how Scores under that specification are interpreted.
    ja: EvaluationSpecification は採点尺度部品として Rubric を含み、版変更は当該仕様下の Score 解釈を変えます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
    en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
    ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
  inverse_reading:
    predicate: inverse_of_contains_rubric
    labels:
      zh: 反向：包含量规
      en: "inverse: contains rubric"
      ja: 逆方向：ルーブリックを含む
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: EvaluationSpecification-contains_rubric-Rubric-example-positive-manual-001
      kind: positive
      labels:
        zh: 包含量规正例
        en: Positive case for contains rubric
        ja: ルーブリックを含むの正例
      scenario_id: null
      descriptions:
        zh: eval-spec-27 固定 tool-quality-rubric v3 的四级描述。
        en: eval-spec-27 fixes the four levels of tool-quality-rubric v3.
        ja: eval-spec-27 は tool-quality-rubric v3 の四水準を固定します。
      field_values: {}
      related_node_ids:
        - EvaluationSpecification
        - Rubric
      related_relation_ids:
        - EvaluationSpecification-contains_rubric-Rubric
      expected_result:
        zh: 应记录该评估规范包含此量规的精确版本。
        en: The specification contains the rubric.
        ja: 仕様が当該ルーブリックを含むと記録します。
      why_valid_or_invalid:
        zh: 量规版本决定评分含义，是规范不可替代的组成部件。
        en: Rubric version determines score meaning and is a specification component.
        ja: ルーブリック版がスコア意味を決める仕様部品です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-rubric-009
    - id: EvaluationSpecification-contains_rubric-Rubric-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 包含量规边界例
        en: Boundary case for contains rubric
        ja: ルーブリックを含むの境界例
      scenario_id: null
      descriptions:
        zh: ReviewActivity 在运行后写出一段自由文本批评，但它没有稳定等级或规范版本。
        en: A ReviewActivity writes free-text critique after the run with no stable levels or specification version.
        ja: ReviewActivity は実行後に自由文批評を作りますが安定水準や仕様版を持ちません。
      field_values: {}
      related_node_ids:
        - EvaluationSpecification
        - Rubric
      related_relation_ids:
        - EvaluationSpecification-contains_rubric-Rubric
      expected_result:
        zh: 该批评不得作为 Rubric 组成部分。
        en: The critique is not a Rubric component.
        ja: この批評は Rubric 部品ではありません。
      why_valid_or_invalid:
        zh: 运行后证据不是运行前固定的评分尺度。
        en: Post-run evidence is not a scoring scale fixed before execution.
        ja: 実行後証拠は実行前固定の採点尺度ではありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-rubric-010
  source_claims:
    - claim-rubric-011
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: parent-to-child
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-feedback-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 LangSmith、OpenAI Evals、RAGAS 与 Braintrust 评估框架逐项核验。
    en: Verified against LangSmith, OpenAI Evals, RAGAS, and Braintrust evaluation frameworks.
    ja: LangSmith、OpenAI Evals、RAGAS、Braintrust 評価フレームワークに照らし確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-rubric-001
    source: eng-fw-langsmith-docs
    supports: LangSmith documents rubric-based and LLM-as-judge evaluators; Moonweave treats the reusable level descriptions as a specification component.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-rubric-002
    source: eng-fw-langsmith-docs
    supports: LangSmith annotation queues use prescribed rubric items across review work. Moonweave assigns a stable rubric identity so revisions and evaluation runs can cite the exact rubric.
    locator: LangSmith Evaluation concepts 2026 > Human evaluation > annotation queues and rubric items
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-rubric-003
    source: eng-fw-langsmith-docs
    supports: LangSmith describes rubric items and LLM-as-judge criteria as reusable grading instructions. The explicit criterion-reference list is Moonweave's normalization of that composition.
    locator: LangSmith Evaluation concepts 2026 > Human evaluation rubric items and LLM-as-judge criteria
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-rubric-004
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluator outputs may be numerical or categorical, and pairwise evaluators compare alternatives. Moonweave records the intended scale to prevent invalid arithmetic over labels.
    locator: LangSmith Evaluation concepts 2026 > Evaluator outputs and Pairwise evaluation
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-rubric-005
    source: eng-fw-langsmith-docs
    supports: LangSmith supports numerical and categorical feedback and prescribed rubric items. Moonweave requires explicit level descriptions so a grade is interpretable outside one evaluator prompt.
    locator: LangSmith Evaluation concepts 2026 > Evaluator outputs and Human evaluation rubric items
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-rubric-006
    source: eng-fw-langsmith-docs
    supports: LangSmith states that LLM-as-judge grading rules and criteria are typically encoded in a prompt and require review and tuning. Moonweave exposes those rules as scoring_instructions.
    locator: LangSmith Evaluation concepts 2026 > LLM-as-judge grading rules, criteria, and prompt tuning
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-rubric-007
    source: eng-fw-langsmith-docs
    supports: LangSmith supports evaluators whose judging prompts encode rubric criteria and return scores.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-rubric-008
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluator outputs may be Boolean or graded; a Boolean condition does not by itself define a rubric.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-rubric-009
    source: eng-fw-langsmith-docs
    supports: LangSmith LLM-as-judge configurations use rubric instructions to assign scores.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-rubric-010
    source: eng-fw-langsmith-docs
    supports: Evaluation configuration precedes an experiment, while review comments are evaluator outputs.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-rubric-011
    source: eng-fw-langsmith-docs
    supports: LangSmith rubric-based evaluators encode graded judging instructions in evaluation configuration, supporting Rubric as a specification component.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
