schema: moonweave.ai/ontology-node/v1
id: Rubric
kind: concept
status: accepted
labels: {zh: 评分量规, en: Rubric, ja: ルーブリック}
semantics:
  short_definition: {zh: 把质量水平映射为可解释等级的评分指南。, en: A scoring guide that maps quality levels to explainable descriptions., ja: 品質水準を説明可能な段階へ対応付ける採点指針。}
  definition: {zh: 量规是评估规范中的静态实体，为一个或多个质量维度规定等级、每级表现描述和适用说明。例如它可以界定 1、3、5 分分别代表什么。量规用于指导 Score 的产生；它不是实际的 Score、通过/失败 Verdict、准则本身或评估活动。, en: "A Rubric is a static entity in an evaluation specification that states levels, descriptions of performance at each level, and application notes for one or more quality dimensions. For example, it can define what scores 1, 3, and 5 mean. It guides production of a Score; it is not the actual Score, a pass/fail Verdict, the criterion itself, or an evaluation activity.", ja: ルーブリックは評価仕様内の静的エンティティであり、一つ以上の品質次元について段階、各段階の性能説明、適用注記を定める。例えば1、3、5点の意味を定義できる。Score の生成を導くが、実際の Score、合否 Verdict、基準自体、評価活動ではない。}
  why_needed: {zh: 没有等级锚点时，两名评审者都说“不错”却可能给出完全不同的分数。量规把隐含判断写成共享规则，支持复核、校准和更一致的自动评分。, en: "Without level anchors, two reviewers can both say “good” yet give very different scores. A rubric turns hidden judgment into a shared rule, supporting review, calibration, and more consistent automated scoring.", ja: 段階のアンカーがないと、二人の評価者が共に「良い」と言っても全く異なる点数を付け得る。ルーブリックは隠れた判断を共有規則に変え、再確認、較正、一貫した自動採点を支える。}
  includes:
    - {zh: 量规标识、尺度、等级描述、适用准则和评分理由要求。, en: "Rubric identifier, scale, level descriptions, applicable criterion, and scoring-rationale requirement.", ja: ルーブリック識別子、尺度、段階説明、適用基準、採点理由の要件。}
  excludes:
    - {zh: 原始候选输出、评审者的自由文本意见或实际数值分数。, en: "Raw candidate output, a reviewer's free-text opinion, or the actual numeric score.", ja: 生の候補出力、評価者の自由記述意見、実際の数値スコア。}
    - {zh: 自动或人工的最终通过/失败结论；那是 Verdict。, en: An automated or human final pass/fail conclusion; that is a Verdict., ja: 自動または人間の最終合否結論。それは Verdict である。}
  semantic_kind: entity
  aliases: [grading rubric, scoring guide, rating scale]
engineering:
  explanation: {zh: 可将量规作为版本化 JSON 文档保存，并要求自动评审器输出结构化 score、rationale 和 rubric_id。Responses API 支持请求结构化输出；调用方仍必须把返回内容与所用量规版本一起持久化，不能只保留模型文本。量规不是 OpenAI 定义的标准资源，此处的实体边界是设计推断。, en: "A rubric can be stored as a versioned JSON document and an automated grader can be required to output structured score, rationale, and rubric_id. The Responses API supports requesting structured output; the caller must still persist the returned content with the rubric version rather than retaining only model prose. A rubric is not an OpenAI-defined standard resource, so this entity boundary is a design inference.", ja: ルーブリックは版管理された JSON 文書として保存でき、自動評価器には構造化された score、rationale、rubric_id を出力させられる。Responses API は構造化出力を要求できるが、呼び出し側はモデル文だけでなくルーブリック版と共に返却内容を保存しなければならない。Rubric は OpenAI が定義した標準リソースではないため、このエンティティ境界は設計推論である。}
  typical_input:
    - description: Responses API request for a structured rubric assessment.
      format: |
        POST /v1/responses
        {"model":"gpt-5.6","input":"Assess the candidate using rubric helpfulness-v1.","text":{"format":{"type":"json_schema","name":"rubric_assessment","strict":true,"schema":{"type":"object","properties":{"rubric_id":{"type":"string"},"score":{"type":"integer"},"rationale":{"type":"string"}},"required":["rubric_id","score","rationale"],"additionalProperties":false}}}}
      source_claims: [claim-rubric-responses]
  typical_output:
    - description: Structured grader result retained with its rubric version.
      format: |
        {"rubric_id":"helpfulness-v1","score":4,"rationale":"Correct answer with one omitted recovery step."}
      source_claims: [claim-rubric-design]
  reference_implementations:
    - {name: OpenAI Responses API guide, url: https://developers.openai.com/api/docs/guides/responses, description: Documents Responses API requests used to obtain candidate or structured evaluator output.}
    - {name: OpenAI Working with evals, url: https://developers.openai.com/api/docs/guides/evals, description: Documents test criteria and evaluation workflow contract shapes.}
structure:
  identity_keys: [rubric_id, version]
  fields:
    - id: rubric_id
      labels: {zh: 量规标识, en: Rubric identifier, ja: ルーブリック識別子}
      definitions: {zh: 稳定标识一套等级描述的名称，而非单次评分标识。, en: "Stable name for one set of level descriptions, not an individual score identifier.", ja: 一組の段階説明の安定名であり、個別スコアの識別子ではない。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: helpfulness
      allowed_values: []
      source_claims: [claim-rubric-design]
    - id: version
      labels: {zh: 量规版本, en: Rubric version, ja: ルーブリック版}
      definitions: {zh: 固定等级含义的版本；等级文字改变必须产生新版本。, en: Version fixing level meanings; changed level text requires a new version., ja: 段階の意味を固定する版。段階テキストの変更には新しい版が必要である。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._-]+$'
      example_value: v1
      allowed_values: []
      source_claims: [claim-rubric-design]
    - id: scale
      labels: {zh: 评分尺度, en: Scoring scale, ja: 採点尺度}
      definitions: {zh: 声明合法等级和顺序的尺度，例如整数 1 到 5。, en: "Scale declaring legal levels and their order, for example integers one through five.", ja: 例えば1から5の整数のように、合法な段階と順序を宣言する尺度。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: integer-1-to-5
      allowed_values: [integer-1-to-5, binary-pass-fail]
      source_claims: [claim-rubric-design]
    - id: level_descriptions
      labels: {zh: 等级描述, en: Level descriptions, ja: 段階説明}
      definitions: {zh: 按 scale 声明的每个合法等级及其可接受表现描述；缺失、重复或未声明等级会使同一分值失去稳定含义。, en: Description of each legal level and acceptable performance declared under scale; missing, duplicate, or undeclared levels make the same score unstable., ja: scale で宣言された各合法段階と許容される性能説明。欠落、重複、未宣言段階は同じスコアを不安定にする。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '{"1":"Irrelevant or wrong","3":"Partially helpful","5":"Complete and actionable"}'
      allowed_values: []
      source_claims: [claim-rubric-design]
  constraints:
    - id: rubric-complete-level-descriptions
      severity: error
      expression_language: plain
      expression: Every level permitted by scale must have a distinct description, and no description may silently cover an undeclared level.
      explanation: {zh: 缺失或重复等级会让同一分数失去稳定含义。, en: Missing or duplicate levels make the meaning of the same score unstable., ja: 欠落または重複した段階は同じスコアの意味を不安定にする。}
      source_claims: [claim-rubric-design]
    - id: rubric-version-immutable
      severity: error
      expression_language: plain
      expression: A persisted Score must identify the rubric_id and version used; editing level descriptions in place is forbidden.
      explanation: {zh: 否则历史分数会在事后被重新解释。, en: Otherwise historical scores can be reinterpreted after the fact., ja: そうでないと過去のスコアが事後的に再解釈される。}
      source_claims: [claim-rubric-design]
  required_relations:
    - id: rubric-part-of-specification
      direction: outgoing
      predicate: part_of
      target_concept_id: EvaluationSpecification
      cardinality: {min: 1, max: 1}
      explanations: {zh: 量规必须在规范中声明其适用范围和版本。, en: A rubric must declare its scope and version in a specification., ja: ルーブリックは仕様内で適用範囲と版を宣言しなければならない。}
      source_claims: [claim-rubric-design]
    - id: rubric-guides-score
      direction: incoming
      predicate: follows
      target_concept_id: Score
      cardinality: {min: 0, max: null}
      explanations: {zh: 使用量规的分数必须指明所遵循的量规版本。, en: A score using a rubric must identify the rubric version it follows., ja: ルーブリックを使うスコアは従ったルーブリック版を特定しなければならない。}
      source_claims: [claim-rubric-design]
examples:
  - id: rubric-positive-helpfulness-five-level

    labels: {zh: MT-Bench 1–10 量规, en: MT-Bench 1–10 rubric, ja: MT-Bench 1–10 ルーブリック}

    descriptions: {zh: "Constitutional AI (Bai et al., 2022) RLAIF: self-critique/revise->AI preference pairs; Rubric maps principle-driven Rubric/Feedback.", en: "Constitutional AI (Bai et al., 2022) RLAIF: self-critique/revise->AI preference pairs; Rubric maps principle-driven Rubric/Feedback.", ja: "Constitutional AI RLAIF; Rubric principle Rubric."}
    field_values: {rubric_id: mt-bench-1-10, version: v1, scale: integer-1-to-10, level_descriptions: '{"1":"Complete failure","5":"Mediocre","10":"Perfect response"}'}
    related_node_ids: [Rubric, Score, EvaluationCriterion]
    related_relation_ids: [rubric-part-of-specification]

    source_claims: [claim-rubric-design]
  - id: rubric-counterexample-vague-rating

    labels: {zh: 没有等级定义的“给个分”, en: Give-a-score without levels, ja: 段階定義のない「点を付ける」}

    descriptions: {zh: "Missing environment_id cannot serve as AgentBench-style Rubric.", en: "Missing environment_id cannot serve as AgentBench-style Rubric.", ja: "Missing environment_id rejects AgentBench-style Rubric."}
    field_values: {rubric_id: null, version: null, scale: integer-1-to-5}
    related_node_ids: [Rubric, Score]
    related_relation_ids: []

    source_claims: [claim-rubric-design]
  - id: rubric-boundary-binary-verdict

    labels: {zh: 二元量规与判定的边界, en: Boundary between binary rubric and verdict, ja: 二値ルーブリックと判定の境界}

    descriptions: {zh: "testing_criteria is spec; run output is Score; Rubric must separate config from run results.", en: "testing_criteria is spec; run output is Score; Rubric must separate config from run results.", ja: "Criteria spec; run output Score."}
    field_values: {rubric_id: schema-validity, version: v1, scale: binary-pass-fail}
    related_node_ids: [Rubric, Verdict, Score]
    related_relation_ids: []

    source_claims: [claim-rubric-design]
  - id: rubric-instance-helpfulness-v1

    labels: {zh: 具体量规 helpfulness v1, en: Concrete rubric helpfulness v1, ja: 具体的なルーブリック helpfulness v1}

    descriptions: {zh: "AgentBench instance: env=web_shopping task_id=ws-042->Rubric EvaluationRun.", en: "AgentBench instance: env=web_shopping task_id=ws-042->Rubric EvaluationRun.", ja: "AgentBench instance maps to Rubric Run."}
    field_values: {rubric_id: helpfulness, version: v1, scale: integer-1-to-5, level_descriptions: '{"1":"Irrelevant or wrong","3":"Partially helpful","5":"Complete and actionable"}'}
    related_node_ids: [Rubric, EvaluationCriterion, Score]
    related_relation_ids: [rubric-part-of-specification]

    source_claims: [claim-rubric-design]
parent_relation:
  id: Rubric-part-of-EvaluationSpecification
  predicate: part_of
  target: concept:EvaluationSpecification
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 属于评估规范, en: part of evaluation specification, ja: 評価仕様の一部}
  definitions: {zh: 量规是版本化评估规范的一部分，规定其评分等级含义。, en: A rubric is part of a versioned evaluation specification and states its score-level meanings., ja: ルーブリックは版管理された評価仕様の一部であり、そのスコア段階の意味を定める。}
  cardinality: {source: {min: 1, max: 1}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_rubric, labels: {zh: 包含量规, en: has rubric, ja: ルーブリックを持つ}}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-rubric-design]
  distinct_fact_rationale: {zh: 此关系表达规范拥有评分指南，而不是任何一次评分。, en: "This relation states that the specification owns the scoring guide, not any scoring occurrence.", ja: この関係は仕様が採点指針を持つことを示し、採点の発生事象を示すものではない。}
  layout_role: primary-backbone
relations:
  - id: Rubric-guides-Score
    predicate: guides
    target: concept:Score
    direction: target-to-source
    relation_kind: semantic
    labels: {zh: 指导评分, en: guides score, ja: スコアを導く}
    definitions: {zh: 一个分数遵循量规时，应记录量规标识、版本和符合的等级。, en: "When a score follows a rubric, it should record the rubric identifier, version, and level satisfied.", ja: スコアがルーブリックに従う場合、ルーブリック識別子、版、満たした段階を記録する。}
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: 1}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: follows, labels: {zh: 遵循量规, en: follows rubric, ja: ルーブリックに従う}}
    conditions:
      - id: rubric-guides-score-version-condition
        severity: error
        expression_language: plain
        expression: Assert only when Score.rubric_id and Score.rubric_version equal this rubric's identity keys.
        explanations: {zh: 不能因为尺度相同就假定分数使用了某份量规。, en: A shared scale does not prove that a score used a particular rubric., ja: 同じ尺度であることは、スコアが特定のルーブリックを使用した証拠ではない。}
        source_claims: [claim-rubric-design]
    temporal_scope: activity-lifetime
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-rubric-design]
    distinct_fact_rationale: {zh: 此关系连接评分指南与一份具体评分，不把二者合并为同一对象。, en: This relation links a scoring guide to one concrete score without merging them into one object., ja: この関係は採点指針と一つの具体的スコアを結び、同じオブジェクトへ統合しない。}
    layout_role: cross-link
sources:
  - id: openai-responses-rubric
    title: OpenAI Responses API guide
    url: https://developers.openai.com/api/docs/guides/responses
    source_type: official-doc
    relevance: Documents Responses API calls that can produce structured evaluator output.
  - id: openai-evals-rubric
    title: OpenAI Working with evals
    url: https://developers.openai.com/api/docs/guides/evals
    source_type: official-doc
    relevance: Documents evaluation criteria workflow contract shapes.
  - id: rubric-design
    title: Rubric design inference
    url: https://www.w3.org/TR/prov-o/
    source_type: design-inference
    relevance: Supports separating a reusable scoring guide Entity from the score and verdict entities it informs.
source_claims:
  - id: claim-rubric-responses
    source: openai-responses-rubric
    supports: The Responses API supports a request/response workflow suitable for structured evaluator output; the local rubric contract is supplied by the caller.
    locator: "Responses API guide: structured output and create a response"
    evidence_kind: official
    confidence: high
  - id: claim-rubric-design
    source: rubric-design
    supports: Separating a reusable level-description Entity from generated score and verdict Entities is a design inference that preserves provenance and versioning.
    locator: "Local rubric, score, and verdict boundary"
    evidence_kind: design-inference
    confidence: high


