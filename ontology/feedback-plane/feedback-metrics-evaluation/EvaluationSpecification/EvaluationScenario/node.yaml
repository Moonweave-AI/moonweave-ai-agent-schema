schema: moonweave.ai/ontology-node/v1
id: EvaluationScenario
kind: concept
status: accepted
labels: {zh: 评估场景, en: Evaluation Scenario, ja: 評価シナリオ}
semantics:
  short_definition: {zh: 规定应在何种输入和上下文下检验一个或多个准则的可复用情境。, en: A reusable situation specifying the inputs and context in which one or more criteria are tested., ja: 一つ以上の基準をどの入力と文脈で試験するかを定める再利用可能な状況。}
  definition: {zh: 评估场景是评估规范内的静态测试情境，标识输入夹具、相关上下文、预期条件和风险边界。它说明“何时和用什么样的样本测试”，而 EvaluationCriterion 说明“测什么并如何判定”。它不是某个候选、单条原始日志、评估运行或已经得到的结论。, en: "An Evaluation Scenario is a static test situation within an evaluation specification that identifies input fixtures, relevant context, expected conditions, and risk boundaries. It says when and with what sort of sample to test, whereas an Evaluation Criterion says what to assess and how to decide. It is not a candidate, a raw log line, an evaluation run, or a conclusion already reached.", ja: 評価シナリオは評価仕様内の静的テスト状況であり、入力フィクスチャ、関連文脈、期待条件、リスク境界を特定する。「いつ、どのようなサンプルで試験するか」を示し、Evaluation Criterion が「何を評価し、どう判定するか」を示す。候補、生ログ行、評価実行、既に得た結論ではない。}
  why_needed: {zh: 只测普通样本会掩盖在高风险或边界输入上的退化。可命名场景使团队能够明确覆盖常规、失败和边界行为，并知道一次分数究竟代表了什么工作条件。, en: "Testing only ordinary samples hides regressions on risky or boundary inputs. Named scenarios make normal, failure, and edge behavior explicit and show what working conditions a score actually represents.", ja: 通常サンプルだけを試験すると高リスクまたは境界入力での劣化を隠す。名前付きシナリオにより通常、失敗、境界の動作を明示し、スコアがどの作業条件を表すかを示せる。}
  includes:
    - {zh: 场景标识、版本化输入夹具引用、上下文前提和覆盖目标。, en: "Scenario identifier, versioned input-fixture reference, contextual assumptions, and coverage objective.", ja: シナリオ識別子、版管理された入力フィクスチャ参照、文脈上の前提、カバレッジ目標。}
    - {zh: 可被多个评估运行复用的困难、失败和边界条件。, en: "Difficult, failure, and edge conditions reusable by multiple evaluation runs.", ja: 複数の評価実行で再利用できる難しい、失敗、境界の条件。}
  excludes:
    - {zh: 评分方法或阈值；那属于 Evaluation Criterion 或 Rubric。, en: A scoring method or threshold; that belongs to an Evaluation Criterion or Rubric., ja: 採点方法または閾値。それは Evaluation Criterion または Rubric に属する。}
    - {zh: 生产流量中的某一次请求；它可被抽样为场景实例，但不是场景定义。, en: One request in production traffic; it may be sampled as a scenario instance but is not the scenario definition., ja: 本番トラフィックの一回のリクエスト。シナリオ実例として抽出できるが、シナリオ定義ではない。}
  semantic_kind: entity
  aliases: [test scenario, eval case, evaluation case]
engineering:
  explanation: {zh: 现行 OpenAI Agents 评估指南将可重复评估建立在数据集和 eval run 上。新实现可将版本化 JSONL 或数据库夹具作为 `input_fixture_ref`，再以 Responses create API 产生候选；旧 Evals API 的 JSONL `data_source_config` 项目仅是历史格式参考。场景记录输入和上下文，不代替准则或评分器。, en: "Current OpenAI agent-evaluation guidance builds repeatable evaluation around datasets and eval runs. A new implementation can use a versioned JSONL or database fixture as `input_fixture_ref` and generate candidates through the Responses create API; the legacy Evals API's JSONL `data_source_config` items are historical format references only. A scenario records input and context; it does not replace a criterion or grader.", ja: 現行の OpenAI Agents 評価ガイドは反復可能な評価をデータセットと eval run を中心に構成する。新しい実装は版管理された JSONL 又はデータベース・フィクスチャを `input_fixture_ref` として使い、Responses create API で候補を生成できる。旧 Evals API の JSONL `data_source_config` 項目は歴史的な形式参考にすぎない。シナリオは入力と文脈を記録し、基準や評価器を置き換えない。}
  typical_input:
    - description: Moonweave-local scenario fixture selected from a versioned dataset for a repeatable eval run; it is not an OpenAI wire schema.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "scenario_id": "hardware-monitor-no-power",
          "dataset_item_ref": "dataset:ticket-category-golden-v2#monitor-no-power",
          "input_text": "My monitor will not turn on.",
          "expected_label": "Hardware",
          "trace_selection_goal": "representative-hardware-failure"
        }
      source_claims: [claim-scenario-agent-evals, claim-scenario-design]
  typical_output:
    - description: Current Responses request that turns this fixture into a candidate response for later trace grading or a repeatable eval run.
      format: |
        POST /v1/responses
        {
          "model": "gpt-5.4-mini",
          "input": [
            {"role": "developer", "content": [{"type": "input_text", "text": "Classify the support ticket as Hardware, Software, or Other."}]},
            {"role": "user", "content": [{"type": "input_text", "text": "My monitor will not turn on."}]}
          ]
        }
      source_claims: [claim-scenario-responses, claim-scenario-agent-evals]
  reference_implementations:
    - {name: OpenAI Evaluate agent workflows, url: https://developers.openai.com/api/docs/guides/agent-evals, description: "Documents current datasets, traces, graders, and eval runs for repeatable evaluation."}
    - {name: OpenAI Responses create API, url: https://developers.openai.com/api/reference/resources/responses/methods/create, description: "Documents candidate-generation requests for scenario fixture inputs."}
structure:
  identity_keys: [scenario_id, version]
  fields:
    - id: scenario_id
      labels: {zh: 场景标识, en: Scenario identifier, ja: シナリオ識別子}
      definitions: {zh: 在规范中稳定标识一个测试情境的名称。, en: Stable name identifying one test situation in a specification., ja: 仕様内の一つのテスト状況を安定して識別する名称。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: hardware-monitor-no-power
      allowed_values: []
      source_claims: [claim-scenario-design]
    - id: version
      labels: {zh: 场景版本, en: Scenario version, ja: シナリオ版}
      definitions: {zh: 固定输入夹具和上下文假设的版本。, en: Version fixing input fixtures and contextual assumptions., ja: 入力フィクスチャと文脈上の前提を固定する版。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._-]+$'
      example_value: v2
      allowed_values: []
      source_claims: [claim-scenario-design]
    - id: input_fixture_ref
      labels: {zh: 输入夹具引用, en: Input fixture reference, ja: 入力フィクスチャ参照}
      definitions: {zh: 指向此场景所使用的不可变测试输入或已版本化抽样清单。, en: Reference to immutable test input or a versioned sampling manifest used by this scenario., ja: このシナリオで使う不変のテスト入力または版管理された抽出マニフェストへの参照。}
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dataset:ticket-category-golden-v2#line-1
      allowed_values: []
      source_claims: [claim-scenario-agent-evals, claim-scenario-design]
    - id: coverage_objective
      labels: {zh: 覆盖目标, en: Coverage objective, ja: カバレッジ目標}
      definitions: {zh: 声明此场景在规范覆盖范围中代表哪类行为或风险，例如常规失败、边界输入或回归样本；用于解释分数所代表的工作条件，不是评分方法或阈值。, en: Declares what behavior or risk class this scenario represents in the specification's coverage scope, such as a representative failure, edge input, or regression sample; it explains what working conditions a score represents, not a scoring method or threshold., ja: このシナリオが仕様のカバレッジ範囲でどの行動またはリスク類を表すかを宣言する。例えば代表的な失敗、境界入力、回帰サンプル。スコアが表す作業条件を説明するものであり、採点方法や閾値ではない。}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: representative-hardware-failure
      allowed_values: []
      source_claims: [claim-scenario-agent-evals, claim-scenario-design]
  constraints:
    - id: scenario-input-is-versioned
      severity: error
      expression_language: plain
      expression: input_fixture_ref must resolve to immutable content or a versioned manifest; replacing its bytes in place is forbidden.
      explanation: {zh: 同名但不同输入会使历史运行不可比较。, en: Different inputs under the same name make historical runs incomparable., ja: 同じ名前で異なる入力を使うと過去の実行が比較不能になる。}
      source_claims: [claim-scenario-design]
    - id: scenario-does-not-embed-verdict
      severity: error
      expression_language: plain
      expression: A scenario may state expected conditions but must not record the actual pass, fail, score, or verdict of a particular run.
      explanation: {zh: 定义测试情境和记录一次测试结果是不同职责。, en: Defining a test situation and recording one test result are different responsibilities., ja: テスト状況を定義することと一回のテスト結果を記録することは別の責務である。}
      source_claims: [claim-scenario-design]
  required_relations:
    - id: evaluation-scenario-part-of-specification
      direction: outgoing
      predicate: part_of
      target_concept_id: EvaluationSpecification
      cardinality: {min: 1, max: 1}
      explanations: {zh: 场景必须属于一个说明其适用准则的规范。, en: A scenario belongs to a specification that states the criteria applicable to it., ja: シナリオは適用基準を定める一つの仕様に属する。}
      source_claims: [claim-scenario-design]
    - id: evaluation-scenario-exercised-by-run
      direction: incoming
      predicate: exercises
      target_concept_id: EvaluationRun
      cardinality: {min: 0, max: null}
      explanations: {zh: 一次运行可执行零个或多个声明场景；场景定义并不等于运行。, en: One run may exercise zero or more declared scenarios; the scenario definition is not the run., ja: 一回の実行は宣言済みシナリオをゼロ個以上実行できる。シナリオ定義は実行ではない。}
      source_claims: [claim-scenario-design]
examples:
  - id: evaluation-scenario-positive-monitor-no-power

    labels: {zh: OpenAI Evals JSONL 测试项, en: OpenAI Evals JSONL test item, ja: OpenAI Evals JSONL テスト項目}

    descriptions: {zh: "LMSYS Chatbot Arena (Zheng et al., 2023): MT-Bench 80 items GPT-4 judge 1-10; Arena pairwise + Elo; EvaluationScenario maps EvaluationRun/Score/Verdict.", en: "LMSYS Chatbot Arena (Zheng et al., 2023): MT-Bench 80 items GPT-4 judge 1-10; Arena pairwise + Elo; EvaluationScenario maps EvaluationRun/Score/Verdict.", ja: "Chatbot Arena MT-Bench+Elo; EvaluationScenario eval evidence."}
    field_values: {scenario_id: it-ticket-item, version: v1, input_fixture_ref: dataset:it-ticket-jsonl#line-1, coverage_objective: it-ticket-categorization}
    related_node_ids: [EvaluationScenario, EvaluationSpecification, EvaluationCriterion]
    related_relation_ids: [evaluation-scenario-part-of-specification]

    source_claims: [claim-scenario-agent-evals, claim-scenario-design]
  - id: evaluation-scenario-counterexample-live-request

    labels: {zh: 未版本化的线上请求, en: Unversioned live request, ja: 版管理されない本番リクエスト}

    descriptions: {zh: "Diff without repo/commit/test_log_ref cannot serve as SWE-bench-style EvaluationScenario.", en: "Diff without repo/commit/test_log_ref cannot serve as SWE-bench-style EvaluationScenario.", ja: "Missing repo/commit rejects SWE-bench-style EvaluationScenario."}
    field_values: {scenario_id: null, version: null, input_fixture_ref: null}
    related_node_ids: [EvaluationScenario, TelemetryEvent]
    related_relation_ids: []

    source_claims: [claim-scenario-design]
  - id: evaluation-scenario-boundary-production-sample

    labels: {zh: 生产样本成为版本化场景, en: Production sample becomes a versioned scenario, ja: 本番サンプルが版管理シナリオになる境界}

    descriptions: {zh: "AgentBench success_rate is aggregate; EvaluationScenario records one run not leaderboard.", en: "AgentBench success_rate is aggregate; EvaluationScenario records one run not leaderboard.", ja: "Leaderboard not single run."}
    field_values: {scenario_id: sampled-ambiguous-ticket, version: v1, input_fixture_ref: dataset:sampled-support-v1#line-17, coverage_objective: sampled-ambiguous-ticket}
    related_node_ids: [EvaluationScenario, TraceRecord, EvaluationSpecification]
    related_relation_ids: []

    source_claims: [claim-scenario-design]
  - id: evaluation-scenario-instance-hardware-monitor-v2

    labels: {zh: 具体场景 hardware-monitor-no-power v2, en: Concrete scenario hardware-monitor-no-power v2, ja: 具体的なシナリオ hardware-monitor-no-power v2}

    descriptions: {zh: "SWE-bench instance: django__django-11099->tests passed->resolved=true->EvaluationScenario Score.", en: "SWE-bench instance: django__django-11099->tests passed->resolved=true->EvaluationScenario Score.", ja: "SWE-bench instance maps to EvaluationScenario Score."}
    field_values: {scenario_id: hardware-monitor-no-power, version: v2, input_fixture_ref: dataset:ticket-category-golden-v2#line-1, coverage_objective: representative-hardware-failure}
    related_node_ids: [EvaluationScenario, EvaluationSpecification, EvaluationRun]
    related_relation_ids: [evaluation-scenario-part-of-specification]

    source_claims: [claim-scenario-design]
parent_relation:
  id: EvaluationScenario-part-of-EvaluationSpecification
  predicate: part_of
  target: concept:EvaluationSpecification
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 属于评估规范, en: part of evaluation specification, ja: 評価仕様の一部}
  definitions: {zh: 场景提供规范所管理的一类可复用测试情境。, en: A scenario provides one reusable test situation managed by a specification., ja: シナリオは仕様が管理する一つの再利用可能なテスト状況を提供する。}
  cardinality: {source: {min: 1, max: 1}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_scenario, labels: {zh: 包含场景, en: has scenario, ja: シナリオを持つ}}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-scenario-design]
  distinct_fact_rationale: {zh: 组成关系绑定场景到规范，而不表示某次运行已经发生。, en: Composition binds the scenario to the specification and does not state that a run occurred., ja: 構成関係はシナリオを仕様へ結び付け、実行が発生したことを示さない。}
  layout_role: primary-backbone
relations:
  - id: EvaluationScenario-exercised-by-EvaluationRun
    predicate: exercises
    target: concept:EvaluationRun
    direction: target-to-source
    relation_kind: provenance
    labels: {zh: 运行执行场景, en: is exercised by evaluation run, ja: 評価実行により実施される}
    definitions: {zh: 一次运行使用此场景的固定输入和上下文来产生结果。, en: One run uses this scenario's fixed input and context to produce a result., ja: 一回の実行がこのシナリオの固定入力と文脈を使って結果を生成する。}
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: exercises, labels: {zh: 执行场景, en: exercises scenario, ja: シナリオを実施する}}
    conditions:
      - id: scenario-exercised-by-run-fixture-condition
        severity: error
        expression_language: plain
        expression: Assert only when the run records this scenario_id, version, and input_fixture_ref in its immutable input manifest.
        explanations: {zh: 类似输入不足以证明运行执行了同一个版本化场景。, en: Similar input is insufficient proof that a run exercised the same versioned scenario., ja: 類似した入力だけでは、実行が同じ版管理シナリオを実施した証拠にならない。}
        source_claims: [claim-scenario-design]
    temporal_scope: activity-lifetime
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-scenario-design]
    distinct_fact_rationale: {zh: 该关系保存一次运行和静态场景之间的实际使用事实。, en: This relation preserves the actual-use fact between one run and a static scenario., ja: この関係は一回の実行と静的シナリオの間の実際の使用事実を保持する。}
    layout_role: cross-link
sources:
  - id: openai-agent-evals-scenario
    title: OpenAI Evaluate agent workflows
    url: https://developers.openai.com/api/docs/guides/agent-evals
    source_type: official-doc
    relevance: Current OpenAI guidance identifies datasets and eval runs as the repeatable evaluation workflow.
  - id: openai-evals-scenario
    title: Legacy OpenAI Working with evals API
    url: https://developers.openai.com/api/docs/guides/evals
    source_type: official-doc
    relevance: Documents historical data_source_config-compatible JSONL test data only.
  - id: openai-responses-scenario
    title: OpenAI Responses create API
    url: https://developers.openai.com/api/reference/resources/responses/methods/create
    source_type: official-doc
    relevance: Documents candidate-generation requests using fixture inputs.
  - id: evaluation-scenario-design
    title: Evaluation scenario design inference
    url: https://www.w3.org/TR/prov-o/
    source_type: design-inference
    relevance: Separates reusable test-context Entities from occurred evaluation Activities and raw observability evidence.
source_claims:
  - id: claim-scenario-agent-evals
    source: openai-agent-evals-scenario
    supports: Current OpenAI guidance uses datasets and eval runs for repeatable benchmarks, prompt comparisons, and larger-scale evaluation over time.
    locator: "Evaluate agent workflows: Move to datasets and eval runs when you need repeatability"
    evidence_kind: official
    confidence: high
  - id: claim-scenario-evals
    source: openai-evals-scenario
    supports: The legacy OpenAI Evals API documents JSONL test items conforming to an evaluation data schema.
    locator: "Working with evals (legacy API): Uploading test data"
    evidence_kind: official
    confidence: high
  - id: claim-scenario-responses
    source: openai-responses-scenario
    supports: The Responses API accepts fixture input to generate a candidate output for later evaluation.
    locator: "Responses API reference: Create a model response"
    evidence_kind: official
    confidence: high
  - id: claim-scenario-design
    source: evaluation-scenario-design
    supports: A versioned test situation is a reusable Entity distinct from a raw observation and a time-bounded evaluation occurrence.
    locator: "Local scenario and evaluation-activity boundary"
    evidence_kind: design-inference
    confidence: high


