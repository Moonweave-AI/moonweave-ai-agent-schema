    examples: pending
    source_claims: []
source_claims:
  - id: claim-evaluation-scenario-001
    source: eng-fw-langsmith-docs
    supports: LangSmith datasets contain examples used repeatedly by experiments; Moonweave enriches an example with environmental pre-state as EvaluationScenario.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-evaluation-scenario-002
    source: eng-api-openai-evals
    supports: OpenAI eval data sources define rows that are reused when creating runs. Moonweave gives each reusable situation an explicit scenario identifier rather than equating it with one run output item.
    locator: OpenAI Evals API 2026 > Create eval > data_source_config item_schema and run data requirements
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-evaluation-scenario-003
    source: eng-api-openai-evals
    supports: OpenAI custom eval data-source schemas define each row's inputs and grader variable references. Moonweave resolves those inputs through a versioned fixture reference.
    locator: OpenAI Evals API 2026 > Create eval > CustomDataSourceConfig item_schema and grader item variables
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-evaluation-scenario-004
    source: eng-fw-langsmith-docs
    supports: LangSmith offline examples include inputs, reference outputs, and metadata, while agent evaluation may inspect tool trajectories. Moonweave separates a reproducible starting-state reference from the input fixture.
    locator: LangSmith Evaluation concepts 2026 > Examples and agent evaluation targets
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-evaluation-scenario-005
    source: eng-fw-langsmith-docs
    supports: LangSmith identifies correct tool selection, argument formatting, and trajectory as agent evaluation targets. Moonweave records the admissible interaction boundary before execution.
    locator: LangSmith Evaluation concepts 2026 > What to evaluate > agent tool selection and trajectory
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-evaluation-scenario-006
    source: eng-fw-langsmith-docs
    supports: LangSmith dataset examples may include reference outputs, and reference-based evaluators compare actual behavior with that ground truth. Moonweave also permits an invariant or acceptable set for non-deterministic agents.
    locator: LangSmith Evaluation concepts 2026 > Examples and Reference-based evaluators
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-evaluation-scenario-007
    source: eng-api-openai-evals
    supports: OpenAI eval runs can target different models and model parameters. Moonweave broadens this reproducibility boundary to the agent's complete evaluation environment profile.
    locator: OpenAI Evals API 2026 > Create eval overview and create-run model parameters
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-evaluation-scenario-008
    source: eng-fw-langsmith-docs
    supports: LangSmith datasets provide examples repeatedly executed during evaluation experiments.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-evaluation-scenario-009
    source: eng-fw-langsmith-docs
    supports: LangSmith distinguishes dataset examples selected before evaluation from run traces created by the experiment.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-evaluation-scenario-010
    source: eng-fw-langsmith-docs
    supports: LangSmith selects dataset examples as the cases executed by an experiment.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-evaluation-scenario-011
    source: eng-fw-langsmith-docs
    supports: LangSmith distinguishes dataset examples from traces attached to each evaluated example.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-evaluation-scenario-012
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluations execute applications over selected dataset examples; Moonweave models scenario membership as specification composition.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
