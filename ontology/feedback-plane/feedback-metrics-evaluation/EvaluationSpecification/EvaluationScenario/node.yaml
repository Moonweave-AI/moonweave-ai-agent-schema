    locator: Evaluate agent workflows — datasets
    evidence_kind: official
    confidence: high
  - id: claim-scenario-deepeval
    source: deepeval-scenario
    supports: DeepEval LLMTestCase provides input, actual_output, and retrieval_context as scenario fixtures.
    locator: LLMTestCase
    evidence_kind: official
    confidence: high
  - id: claim-scenario-braintrust
    source: braintrust-scenario
    supports: Braintrust experiment rows attach input and expected fields as repeatable scenario fixtures.
    locator: Experiments
    evidence_kind: official
    confidence: high
  - id: claim-scenario-swebench
    source: swebench-scenario
    supports: SWE-bench Verified instances provide immutable benchmark scenario fixtures.
