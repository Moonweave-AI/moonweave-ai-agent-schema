schema: moonweave.ai/ontology-node/v1
id: EvaluationScenario
kind: concept
status: review
labels:
  zh: 评估场景
  en: evaluation scenario
  ja: 評価シナリオ
semantics:
  short_definition:
    zh: 评估场景是具有输入、初始状态与预期行为的可重复测试情境。
    en: An evaluation scenario is a repeatable test situation with inputs, initial state, and expected behavior.
    ja: 評価シナリオは入力、初期状態、期待挙動を持つ反復可能な試験状況です。
  definition:
    zh: 评估场景是评估规范中的测试情境部件；其身份由输入、环境前置状态、允许交互和预期结果共同确定，而不是由某次执行产生的轨迹确定。
    en: An evaluation scenario is a test-situation component of an evaluation specification identified by inputs, environmental pre-state, permitted interactions, and expected outcome rather than by the trajectory generated in one execution.
    ja: 評価シナリオは評価仕様の試験状況部品で、入力、環境の事前状態、許可された相互作用、期待結果で同一性が決まり、一回の実行軌跡では決まりません。
  why_needed:
    zh: 显式场景使失败能够归因到确定的初始条件，并允许不同实现接受同一测试。
    en: Explicit scenarios tie failures to known initial conditions and let different implementations receive the same test.
    ja: 明示的シナリオは失敗を既知の初期条件に結び、異なる実装へ同じ試験を適用できます。
  includes:
    - zh: 包括用户请求、沙箱初态、可用工具、时间限制和预期终态。
      en: Includes user request, sandbox pre-state, available tools, time limit, and expected terminal state.
      ja: ユーザー要求、サンドボックス初期状態、利用可能ツール、時間制限、期待終状態を含みます。
  excludes:
    - zh: 不包括 EvaluationRun 的实际轨迹、耗时和输出，也不包括跨场景通用 Metric。
      en: Excludes the actual trajectory, latency, and output of an EvaluationRun and a Metric reusable across scenarios.
      ja: EvaluationRun の実軌跡、所要時間、出力、およびシナリオ横断 Metric は含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - scenario_id
  fields:
    - id: scenario_id
      labels:
        zh: 场景标识
        en: scenario ID
        ja: scenario ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识可在不同被评版本上重复运行的测试情境。
        en: Stably identifies a test situation repeatable across different subject versions.
        ja: 異なる評価対象版で反復実行できる test situation を安定識別します。
      allowed_values: []
      pattern: null
      example_value: scenario/empty-cart-two-items
      source_claims:
        - claim-evaluation-scenario-002
    - id: input_fixture_ref
      labels:
        zh: 输入夹具引用
        en: input-fixture reference
        ja: 入力 fixture 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定交给被评对象的用户输入、消息或多模态数据。
        en: Pins the user input, messages, or multimodal data supplied to the evaluated subject.
        ja: 評価対象へ渡す user input・message・multimodal data を固定します。
      allowed_values: []
      pattern: null
      example_value: fixture/orders/empty-cart-two-items.json
      source_claims:
        - claim-evaluation-scenario-003
    - id: precondition_state_ref
      labels:
        zh: 前置状态引用
        en: precondition-state reference
        ja: 前提状態参照
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 固定场景开始前必须成立的库存、会话、文件系统或工具状态；无状态测试可省略。
        en: Pins inventory, session, filesystem, or tool state required before the scenario starts; stateless tests may omit it.
        ja: scenario 開始前に必要な inventory・session・filesystem・tool state を固定し、stateless test では省略できます。
      allowed_values: []
      pattern: null
      example_value: state/orders/empty-cart-stock-v7
      source_claims:
        - claim-evaluation-scenario-004
    - id: allowed_interactions
      labels:
        zh: 允许交互
        en: allowed interactions
        ja: 許可 interaction
      datatype: structured-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 声明场景中允许或要求的工具、角色和外部服务交互边界。
        en: Declares the tool, role, and external-service interactions allowed or required in the scenario.
        ja: scenario 内で許可または要求する tool・role・external service interaction 境界を宣言します。
      allowed_values: []
      pattern: null
      example_value:
        - catalog.search
        - cart.add
        - checkout.quote
      source_claims:
        - claim-evaluation-scenario-005
    - id: expected_outcome
      labels:
        zh: 预期结果
        en: expected outcome
        ja: 期待結果
      datatype: structured-value
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 给出供判据读取的参考输出、终态不变量或允许结果集合。
        en: Provides the reference output, terminal-state invariant, or acceptable outcome set consumed by criteria.
        ja: criterion が読む reference output・terminal-state invariant・許容 outcome set を示します。
      allowed_values: []
      pattern: null
      example_value:
        item_count: 2
        total: 41.98
        currency: USD
      source_claims:
        - claim-evaluation-scenario-006
    - id: environment_profile
      labels:
        zh: 环境剖面
        en: environment profile
        ja: 環境 profile
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定影响可重复性的模型、工具、网络、区域和沙箱配置。
        en: Pins model, tool, network, region, and sandbox configuration that affects repeatability.
        ja: 再現性に影響する model・tool・network・region・sandbox 構成を固定します。
      allowed_values: []
      pattern: null
      example_value: environment/eval-sandbox-cn-v5
      source_claims:
        - claim-evaluation-scenario-007
  constraints: []
  required_relation_constraints: []
examples:
  - id: EvaluationScenario-example-positive-manual-001
    kind: positive
    labels:
      zh: 评估场景正例
      en: Positive evaluation scenario case
      ja: 評価シナリオの正例
    scenario_id: null
    descriptions:
      zh: 场景规定空购物车、用户要求两件商品、库存状态和最终订单总价。
      en: A scenario specifies an empty cart, a request for two products, inventory state, and the expected final total.
      ja: シナリオは空のカート、二商品の要求、在庫状態、期待最終金額を規定します。
    field_values:
      scenario_id: scenario/empty-cart-two-items
      input_fixture_ref: fixture/orders/empty-cart-two-items.json
      precondition_state_ref: state/orders/empty-cart-stock-v7
      allowed_interactions:
        - catalog.search
        - cart.add
        - checkout.quote
      expected_outcome:
        item_count: 2
        total: 41.98
        currency: USD
      environment_profile: environment/eval-sandbox-cn-v5
    related_node_ids:
      - EvaluationScenario
    related_relation_ids: []
    expected_result:
      zh: 该记录应作为可重复的评估场景。
      en: The record is a repeatable evaluation scenario.
      ja: この記録は反復可能な評価シナリオです。
    why_valid_or_invalid:
      zh: 其身份在运行前已经由输入、初态与期望结果确定。
      en: Its identity is fixed before execution by inputs, pre-state, and expected outcome.
      ja: 同一性は実行前に入力、事前状態、期待結果で確定します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-evaluation-scenario-008
  - id: EvaluationScenario-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 评估场景边界例
      en: Boundary evaluation scenario case
      ja: 評価シナリオの境界例
    scenario_id: null
    descriptions:
      zh: 一条轨迹记录代理实际调用了 search 和 checkout，并耗时 4.8 秒。
      en: A trajectory records that the agent actually called search and checkout in 4.8 seconds.
      ja: 軌跡はエージェントが実際に search と checkout を呼び 4.8 秒要したと記録します。
    field_values: {}
    related_node_ids:
      - EvaluationScenario
    related_relation_ids: []
    expected_result:
      zh: 该记录属于 EvaluationRun 的执行证据，不是场景本身。
      en: The record is execution evidence for an EvaluationRun, not the scenario itself.
      ja: これは EvaluationRun の実行証拠でありシナリオ自体ではありません。
    why_valid_or_invalid:
      zh: 实际行为与耗时是运行后事实，不能定义运行前的测试情境。
      en: Actual behavior and latency are post-run facts and cannot define the pre-run test situation.
      ja: 実挙動と所要時間は実行後の事実で、実行前の試験状況を定義しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-evaluation-scenario-009
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: EvaluationSpecification-contains_scenario-EvaluationScenario
  predicate: contains_scenario
  direction: source-to-target
  relation_kind: composition
  labels:
    zh: 包含场景
    en: contains scenario
    ja: シナリオを含む
  definitions:
    zh: 评估规范包含其受控测试集合中的 EvaluationScenario；场景输入或初态版本变化会改变规范覆盖范围。
    en: An EvaluationSpecification contains EvaluationScenarios in its controlled test set; changing scenario inputs or pre-state versions changes specification coverage.
    ja: EvaluationSpecification は管理試験集合の EvaluationScenario を含み、入力や初期状態版の変更は仕様の被覆範囲を変えます。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
    en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
    ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
  inverse_reading:
    predicate: inverse_of_contains_scenario
    labels:
      zh: 反向：包含场景
      en: "inverse: contains scenario"
      ja: 逆方向：シナリオを含む
  conditions: []
  temporal_scope: valid-time
  boundary_context: null
  constraints: []
  examples:
    - id: EvaluationSpecification-contains_scenario-EvaluationScenario-example-positive-manual-001
      kind: positive
      labels:
        zh: 包含场景正例
        en: Positive case for contains scenario
        ja: シナリオを含むの正例
      scenario_id: null
      descriptions:
        zh: eval-spec-27 的受控集合列出 scenario cart-008 及其库存快照版本。
        en: eval-spec-27 lists scenario cart-008 and its inventory snapshot version in the controlled set.
        ja: eval-spec-27 は管理集合に scenario cart-008 と在庫スナップショット版を列挙します。
      field_values: {}
      related_node_ids:
        - EvaluationSpecification
        - EvaluationScenario
      related_relation_ids:
        - EvaluationSpecification-contains_scenario-EvaluationScenario
      expected_result:
        zh: 应记录该评估规范包含此场景及其快照版本。
        en: The specification contains that scenario.
        ja: 仕様は当該シナリオを含みます。
      why_valid_or_invalid:
        zh: 场景身份直接决定规范的数据覆盖，属于整体的一部分。
        en: Scenario identity directly determines specification coverage as a whole-part relation.
        ja: シナリオ同一性が仕様被覆を直接決める全体部分関係です。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-evaluation-scenario-010
    - id: EvaluationSpecification-contains_scenario-EvaluationScenario-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 包含场景边界例
        en: Boundary case for contains scenario
        ja: シナリオを含むの境界例
      scenario_id: null
      descriptions:
        zh: run-884 产生 scenario cart-008 的实际轨迹 trace-19。
        en: run-884 produces actual trajectory trace-19 for scenario cart-008.
        ja: run-884 は scenario cart-008 の実軌跡 trace-19 を生成します。
      field_values: {}
      related_node_ids:
        - EvaluationSpecification
        - EvaluationScenario
      related_relation_ids:
        - EvaluationSpecification-contains_scenario-EvaluationScenario
      expected_result:
        zh: trace-19 不得作为 EvaluationScenario 被规范包含。
        en: trace-19 is not an EvaluationScenario contained by the specification.
        ja: trace-19 は仕様に含まれる EvaluationScenario ではありません。
      why_valid_or_invalid:
        zh: 轨迹是运行生成的证据，不是运行前控制的测试情境。
        en: The trajectory is run-generated evidence, not a pre-run controlled test situation.
        ja: 軌跡は実行生成証拠で実行前管理の試験状況ではありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-evaluation-scenario-011
  source_claims:
    - claim-evaluation-scenario-012
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: pending
  endpoint_order: parent-to-child
