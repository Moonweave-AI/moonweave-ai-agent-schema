schema: moonweave.ai/ontology-node/v1
id: EvaluationScenario
kind: concept
labels:
  zh: 评估场景
  en: Evaluation Scenario
  ja: 評価シナリオ
semantics:
  short_definition:
    zh: 规定应在何种输入和上下文下检验准则的可复用测试情境。
    en: A reusable test situation specifying inputs and context in which criteria are tested.
    ja: 基準をどの入力と文脈で試験するかを定める再利用可能なテスト状況。
  definition:
    zh: EvaluationScenario 是评估规范内的静态测试情境，标识输入夹具、相关上下文、预期条件与覆盖目标。它映射 OpenAI eval dataset 条目、DeepEval LLMTestCase、Braintrust experiment row、SWE-bench/HumanEval/BFCL 基准 instance。它说明“何时和用什么样的样本测试”，而 EvaluationCriterion 说明“测什么并如何判定”。它不是候选、单条日志、EvaluationRun 或已得结论。
    en: "EvaluationScenario is a static test situation within an evaluation specification identifying input fixtures, relevant context, expected conditions, and coverage objectives. It maps to OpenAI eval dataset items, DeepEval LLMTestCase, Braintrust experiment rows, and SWE-bench/HumanEval/BFCL benchmark instances. It says when and with what sample to test, whereas EvaluationCriterion says what to assess and how to decide. It is not a candidate, raw log line, EvaluationRun, or conclusion already reached."
    ja: EvaluationScenario は評価仕様内の静的テスト状況で、入力フィクスチャ、関連文脈、期待条件、カバレッジ目標を特定します。OpenAI eval dataset 項目、DeepEval LLMTestCase、Braintrust experiment 行、SWE-bench/HumanEval/BFCL ベンチマーク instance に写像します。「いつ、どのサンプルで試験するか」を示し、EvaluationCriterion が「何をどう判定するか」を示します。候補、生ログ行、EvaluationRun、既得結論ではありません。
  why_needed:
    zh: 只测普通样本会掩盖在高风险或边界输入上的退化。可命名场景使团队能够明确覆盖常规、失败和边界行为，并知道一次分数究竟代表了什么工作条件。
    en: "Testing only ordinary samples hides regressions on risky or boundary inputs. Named scenarios make normal, failure, and edge behavior explicit and show what working conditions a score represents."
    ja: 通常サンプルだけでは高リスク又は境界入力の劣化を隠します。名前付きシナリオにより通常、失敗、境界の動作を明示し、スコアがどの作業条件を表すかを示せます。
  includes:
    - zh: 场景标识、版本化 input_fixture_ref、coverage_objective 与可选预期条件引用。
      en: "Scenario identifier, versioned input_fixture_ref, coverage_objective, and optional expected-condition reference."
      ja: シナリオ識別子、版管理 input_fixture_ref、coverage_objective、任意の期待条件参照。
    - zh: 可被多个 EvaluationRun 复用的困难、失败和边界条件（对应 test case / benchmark instance）。
      en: "Difficult, failure, and edge conditions reusable by multiple EvaluationRuns (mapping to test cases or benchmark instances)."
      ja: 複数 EvaluationRun で再利用できる困難、失敗、境界条件（test case / benchmark instance に対応）。
  excludes:
    - zh: 评分方法或阈值；那属于 EvaluationCriterion 或 Rubric。
      en: A scoring method or threshold; that belongs to EvaluationCriterion or Rubric.
      ja: 採点方法又は閾値。それは EvaluationCriterion 又は Rubric に属します。
    - zh: 生产流量中的某一次请求；它可被抽样为场景实例，但不是场景定义。
      en: One request in production traffic; it may be sampled as a scenario instance but is not the scenario definition.
      ja: 本番トラフィックの一回のリクエスト。シナリオ実例として抽出できますが、シナリオ定義ではありません。
  semantic_kind: entity
  aliases: [test scenario, eval case, test case, benchmark instance]
engineering:
  explanation:
    zh: 新集成应以 OpenAI eval dataset JSONL 条目、DeepEval LLMTestCase、Braintrust experiment input/expected 行、SWE-bench Verified instance、HumanEval task、BFCL function-call case 为可映射 API 形状，再以 input_fixture_ref 与 coverage_objective 保存版本化场景。场景记录输入与上下文，不代替 grader 或 assertion。
    en: "New integrations should treat OpenAI eval dataset JSONL items, DeepEval LLMTestCase, Braintrust experiment input/expected rows, SWE-bench Verified instances, HumanEval tasks, and BFCL function-call cases as mappable API shapes, then persist versioned scenarios with input_fixture_ref and coverage_objective. Scenarios record input and context; they do not replace graders or assertions."
    ja: 新しい統合では OpenAI eval dataset JSONL 項目、DeepEval LLMTestCase、Braintrust experiment input/expected 行、SWE-bench Verified instance、HumanEval task、BFCL function-call case を写像可能 API 形状として扱い、input_fixture_ref と coverage_objective で版管理シナリオを保存します。シナリオは入力と文脈を記録し、grader や assertion を置き換えません。
  typical_input:
    - description: DeepEval LLMTestCase as scenario fixture.
      format: |
        {
          "scenario_id": "refund-summary-faithfulness",
          "input": "Summarize the refund policy",
          "actual_output": "Refunds within 30 days.",
          "retrieval_context": ["Refunds are allowed within 30 days of purchase."]
        }
      source_claims: [claim-scenario-deepeval, claim-scenario-design]
  typical_output:
    - description: Candidate generation request from scenario fixture.
      format: |
        POST /v1/responses
        {"model": "gpt-4.1-mini", "input": "Classify: My monitor will not turn on."}
      source_claims: [claim-scenario-agent-evals]
structure:
  identity_keys: [scenario_id, version]
  fields:
    - id: scenario_id
      labels: {zh: 场景标识, en: Scenario identifier, ja: シナリオ識別子}
      definitions:
        zh: 在规范中稳定标识一个测试情境的名称。
        en: Stable name identifying one test situation in a specification.
        ja: 仕様内の一つのテスト状況を安定して識別する名称。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: hardware-monitor-no-power
      allowed_values: []
      source_claims: [claim-scenario-design]
    - id: version
      labels: {zh: 场景版本, en: Scenario version, ja: シナリオ版}
      definitions:
        zh: 固定输入夹具和上下文假设的版本。
        en: Version fixing input fixtures and contextual assumptions.
        ja: 入力フィクスチャと文脈上の前提を固定する版。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._-]+$'
      example_value: v2
      allowed_values: []
      source_claims: [claim-scenario-design]
    - id: input_fixture_ref
      labels: {zh: 输入夹具引用, en: Input fixture reference, ja: 入力フィクスチャ参照}
      definitions:
        zh: 指向此场景所使用的不可变测试输入、LLMTestCase 或 benchmark instance。
        en: "Reference to immutable test input, LLMTestCase, or benchmark instance used by this scenario."
        ja: このシナリオで使う不変テスト入力、LLMTestCase、benchmark instance への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dataset:ticket-category-golden-v2#line-1
      allowed_values: []
      source_claims: [claim-scenario-agent-evals, claim-scenario-design]
    - id: coverage_objective
      labels: {zh: 覆盖目标, en: Coverage objective, ja: カバレッジ目標}
      definitions:
        zh: 声明此场景代表哪类行为或风险，如常规失败、边界输入、基准 instance 或 red-team 探针。
        en: "Declares what behavior or risk class this scenario represents, such as representative failure, edge input, benchmark instance, or red-team probe."
        ja: 代表的失敗、境界入力、ベンチマーク instance、red-team プローブなど、このシナリオが表す行動又はリスク類。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: representative-hardware-failure
      allowed_values: []
      source_claims: [claim-scenario-agent-evals, claim-scenario-design]
  constraints:
    - id: scenario-input-is-versioned
      severity: error
      expression_language: plain
      expression: input_fixture_ref must resolve to immutable content or a versioned manifest; replacing its bytes in place is forbidden.
      explanation:
        zh: 同名但不同输入会使历史运行不可比较。
        en: Different inputs under the same name make historical runs incomparable.
        ja: 同じ名前で異なる入力を使うと過去の実行が比較不能になります。
      source_claims: [claim-scenario-design]
    - id: scenario-does-not-embed-verdict
      severity: error
      expression_language: plain
      expression: A scenario may state expected conditions but must not record the actual pass, fail, score, or verdict of a particular run.
      explanation:
        zh: 定义测试情境和记录一次测试结果是不同职责。
        en: Defining a test situation and recording one test result are different responsibilities.
        ja: テスト状況を定義することと一回のテスト結果を記録することは別の責務です。
      source_claims: [claim-scenario-design]
  required_relations:
    - id: evaluation-scenario-part-of-specification
      direction: outgoing
      predicate: part_of
      target_concept_id: EvaluationSpecification
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 场景必须属于一个说明其适用准则的规范。
        en: A scenario belongs to a specification that states the criteria applicable to it.
        ja: シナリオは適用基準を定める一つの仕様に属します。
      source_claims: [claim-scenario-design]
examples:
  - id: evaluation-scenario-example-deepeval-testcase
    labels:
      zh: DeepEval LLMTestCase 场景
      en: DeepEval LLMTestCase scenario
      ja: DeepEval LLMTestCase シナリオ
    descriptions:
      zh: scenario_id=refund-faithfulness version=v1；input_fixture_ref=test_case:refund-104；coverage_objective=rag-faithfulness-check；对应 DeepEval LLMTestCase input/actual_output/retrieval_context 三元组。
      en: scenario_id=refund-faithfulness version=v1; input_fixture_ref=test_case:refund-104; coverage_objective=rag-faithfulness-check; maps to DeepEval LLMTestCase input/actual_output/retrieval_context triple.
      ja: scenario_id=refund-faithfulness version=v1。input_fixture_ref=test_case:refund-104。coverage_objective=rag-faithfulness-check。DeepEval LLMTestCase input/actual_output/retrieval_context 三つ組に対応。
    example_source:
      product: DeepEval
      url: https://docs.confident-ai.com
      version: LLMTestCase
    field_values:
      scenario_id: refund-faithfulness
      version: v1
      input_fixture_ref: test_case:refund-104
      coverage_objective: rag-faithfulness-check
    related_node_ids: [EvaluationScenario, EvaluationSpecification, EvaluationCriterion]
    related_relation_ids: [evaluation-scenario-part-of-specification]
    source_claims: [claim-scenario-deepeval, claim-scenario-design]
  - id: evaluation-scenario-example-swebench-instance
    labels:
      zh: SWE-bench Verified instance 场景
      en: SWE-bench Verified instance scenario
      ja: SWE-bench Verified instance シナリオ
    descriptions:
      zh: scenario_id=django-11099 version=v1；input_fixture_ref=benchmark:swebench-verified#django__django-11099；coverage_objective=verified-issue-resolution；基准语义保留在适配器，本节点只记录规范内测试情境。
      en: scenario_id=django-11099 version=v1; input_fixture_ref=benchmark:swebench-verified#django__django-11099; coverage_objective=verified-issue-resolution; benchmark semantics stay in adapter while this node records only the specification test situation.
      ja: scenario_id=django-11099 version=v1。input_fixture_ref=benchmark:swebench-verified#django__django-11099。coverage_objective=verified-issue-resolution。ベンチマーク意味はアダプターに残し、本ノードは仕様内テスト状況のみ記録します。
    example_source:
      product: SWE-bench Verified
      url: https://www.swebench.com/
      version: verified instances
    field_values:
      scenario_id: django-11099
      version: v1
      input_fixture_ref: benchmark:swebench-verified#django__django-11099
      coverage_objective: verified-issue-resolution
    related_node_ids: [EvaluationScenario, EvaluationSpecification, EvaluationRun]
    related_relation_ids: [evaluation-scenario-part-of-specification]
    source_claims: [claim-scenario-swebench, claim-scenario-design]
  - id: evaluation-scenario-example-braintrust-row
    labels:
      zh: Braintrust experiment 行场景
      en: Braintrust experiment row scenario
      ja: Braintrust experiment 行シナリオ
    descriptions:
      zh: scenario_id=monitor-no-power version=v1；input_fixture_ref=braintrust:ticket-classifier-v3#row-1；input ticket="My monitor will not turn on" expected category=Hardware；coverage_objective=representative-hardware-failure。
      en: scenario_id=monitor-no-power version=v1; input_fixture_ref=braintrust:ticket-classifier-v3#row-1; input ticket="My monitor will not turn on" expected category=Hardware; coverage_objective=representative-hardware-failure.
      ja: scenario_id=monitor-no-power version=v1。input_fixture_ref=braintrust:ticket-classifier-v3#row-1。input ticket="My monitor will not turn on" expected category=Hardware。coverage_objective=representative-hardware-failure。
    example_source:
      product: Braintrust
      url: https://www.braintrust.dev/docs
      version: experiment rows
    field_values:
      scenario_id: monitor-no-power
      version: v1
      input_fixture_ref: braintrust:ticket-classifier-v3#row-1
      coverage_objective: representative-hardware-failure
    related_node_ids: [EvaluationScenario, EvaluationSpecification, EvaluationCriterion]
    related_relation_ids: []
    source_claims: [claim-scenario-braintrust, claim-scenario-design]
  - id: evaluation-scenario-counterexample-live-request
    labels:
      zh: 未版本化的线上请求
      en: Unversioned live request
      ja: 版管理されない本番リクエスト
    descriptions:
      zh: 生产 run_id=run-8842 的原始请求未冻结为 input_fixture_ref；不能登记为 EvaluationScenario，因为历史运行无法比较。
      en: Production run_id=run-8842 raw request not frozen as input_fixture_ref; cannot register as EvaluationScenario because historical runs are incomparable.
      ja: 本番 run_id=run-8842 の生リクエストが input_fixture_ref として凍結されていない。履歴実行が比較不能なため EvaluationScenario として登録できません。
    example_source:
      product: Moonweave evaluation boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: versioned fixture requirement
    field_values:
      scenario_id: null
      version: null
      input_fixture_ref: null
    related_node_ids: [EvaluationScenario]
    related_relation_ids: []
    source_claims: [claim-scenario-design]
  - id: evaluation-scenario-example-humaneval-task
    labels:
      zh: HumanEval 编程任务场景
      en: HumanEval coding task scenario
      ja: HumanEval コーディングタスクシナリオ
    descriptions:
      zh: scenario_id=humaneval-0 version=v1；input_fixture_ref=benchmark:humaneval#HumanEval/0；coverage_objective=code-generation-baseline；对应 HumanEval 单题 instance，准则由 pass@k 测试 harness 解释。
      en: scenario_id=humaneval-0 version=v1; input_fixture_ref=benchmark:humaneval#HumanEval/0; coverage_objective=code-generation-baseline; maps to HumanEval single-task instance with pass@k harness criterion.
      ja: scenario_id=humaneval-0 version=v1。input_fixture_ref=benchmark:humaneval#HumanEval/0。coverage_objective=code-generation-baseline。HumanEval 単題 instance に対応し、基準は pass@k test harness が解釈します。
    example_source:
      product: HumanEval
      url: https://github.com/openai/human-eval
      version: coding benchmark tasks
    field_values:
      scenario_id: humaneval-0
      version: v1
      input_fixture_ref: benchmark:humaneval#HumanEval/0
      coverage_objective: code-generation-baseline
    related_node_ids: [EvaluationScenario, EvaluationSpecification, EvaluationCriterion]
    related_relation_ids: []
    source_claims: [claim-scenario-design]
parent_relation:
  id: EvaluationScenario-part-of-EvaluationSpecification
  predicate: part_of
  target: concept:EvaluationSpecification
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: composition
  labels: {zh: 属于评估规范, en: part of evaluation specification, ja: 評価仕様の一部}
  definitions:
    zh: 场景提供规范所管理的一类可复用测试情境。
    en: A scenario provides one reusable test situation managed by a specification.
    ja: シナリオは仕様が管理する一つの再利用可能なテスト状況を提供します。
  cardinality: {source: {min: 1, max: 1}, target: {min: 1, max: 1}}
  cardinality_not_applicable_reason: null
  inverse_reading: {predicate: has_scenario, labels: {zh: 包含场景, en: has scenario, ja: シナリオを持つ}}
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples: []
  source_claims: [claim-scenario-design]
  distinct_fact_rationale:
    zh: 组成关系绑定场景到规范，而不表示某次运行已经发生。
    en: Composition binds the scenario to the specification and does not state that a run occurred.
    ja: 構成関係はシナリオを仕様へ結び付け、実行が発生したことを示しません。
  layout_role: primary-backbone
relations:
  - id: EvaluationScenario-exercised-by-EvaluationRun
    predicate: exercises
    target: concept:EvaluationRun
    direction: target-to-source
    relation_kind: provenance
    labels: {zh: 运行执行场景, en: is exercised by evaluation run, ja: 評価実行により実施される}
    definitions:
      zh: 一次运行使用此场景的固定输入和上下文来产生结果。
      en: One run uses this scenario's fixed input and context to produce a result.
      ja: 一回の実行がこのシナリオの固定入力と文脈を使って結果を生成します。
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading: {predicate: exercises, labels: {zh: 执行场景, en: exercises scenario, ja: シナリオを実施する}}
    conditions:
      - id: scenario-exercised-by-run-fixture-condition
        severity: error
        expression_language: plain
        expression: Assert only when the run records this scenario_id, version, and input_fixture_ref in its immutable input manifest.
        explanations:
          zh: 类似输入不足以证明运行执行了同一个版本化场景。
          en: Similar input is insufficient proof that a run exercised the same versioned scenario.
          ja: 類似入力だけでは、実行が同じ版管理シナリオを実施した証拠になりません。
        source_claims: [claim-scenario-design]
    temporal_scope: activity-lifetime
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-scenario-design]
    distinct_fact_rationale:
      zh: 该关系保存一次运行和静态场景之间的实际使用事实。
      en: This relation preserves the actual-use fact between one run and a static scenario.
      ja: この関係は一回の実行と静的シナリオの間の実際の使用事実を保持します。
    layout_role: cross-link
