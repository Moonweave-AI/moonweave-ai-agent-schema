schema: moonweave.ai/ontology-node/v1
id: feedback-plane
kind: domain
status: accepted
labels:
  en: Observability & Feedback Domain
  zh: 可观测性与反馈域
  ja: 観測可能性とフィードバックドメイン
semantics:
  short_definition:
    en: Observability & Feedback Domain is the operational concern domain for deriving diagnostic, review, metric, telemetry, audit, recovery, and learning signals from observable runtime evidence. It separates raw trace evidence from interpreted feedback, keeps benchmark-specific semantics in adapters, and records how feedback returns to orchestration, memory, tool selection, policy, and optimization loops.
    zh: 可观测性与反馈域是从可观察运行证据中派生诊断、审查、指标、遥测、审计、恢复和学习信号的运行关注域。它区分原始轨迹证据与解释性反馈，将基准专属语义保留在适配器层，并记录反馈如何回流到编排、记忆、工具选择、策略和优化循环。
    ja: 観測可能性とフィードバックドメインは、観測可能な実行証拠から診断、レビュー、指標、テレメトリ、監査、復旧、学習信号を導く運用関心ドメインです。生のトレース証拠と解釈済みフィードバックを分け、ベンチマーク固有の意味はアダプターに残し、フィードバックがオーケストレーション、記憶、ツール選択、ポリシー、最適化ループへ戻る経路を記録します。
  definition:
    en: Observability & Feedback Domain is the operational concern domain for deriving diagnostic, review, metric, telemetry, audit, recovery, and learning signals from observable runtime evidence. It separates raw trace evidence from interpreted feedback, keeps benchmark-specific semantics in adapters, and records how feedback returns to orchestration, memory, tool selection, policy, and optimization loops.
    zh: 可观测性与反馈域是从可观察运行证据中派生诊断、审查、指标、遥测、审计、恢复和学习信号的运行关注域。它区分原始轨迹证据与解释性反馈，将基准专属语义保留在适配器层，并记录反馈如何回流到编排、记忆、工具选择、策略和优化循环。
    ja: 観測可能性とフィードバックドメインは、観測可能な実行証拠から診断、レビュー、指標、テレメトリ、監査、復旧、学習信号を導く運用関心ドメインです。生のトレース証拠と解釈済みフィードバックを分け、ベンチマーク固有の意味はアダプターに残し、フィードバックがオーケストレーション、記憶、ツール選択、ポリシー、最適化ループへ戻る経路を記録します。
  why_needed:
    zh: 把故障、测量、审查、纠正、优化和遥测连接成可追溯改进证据。
    en: Connects failures, measurements, reviews, corrections, optimization, and telemetry into traceable improvement evidence.
    ja: 障害、測定、レビュー、修正、最適化、テレメトリを追跡可能な改善証拠へ接続します。
  includes:
    - zh: "反馈域负责日志与遥测（owner: feedback-logging）以及评估与测量（owner: feedback-metrics-evaluation），把观察记录转成可比较的测量、阈值判定和评价证据。"
      en: "Feedback owns Logging and telemetry (owner: feedback-logging) and evaluation and measurement (owner: feedback-metrics-evaluation), turning observations into comparable measurements, threshold decisions, and evaluation evidence."
      ja: "フィードバックドメインはログとテレメトリ（owner: feedback-logging）および評価と測定（owner: feedback-metrics-evaluation）を所有し、観測記録を比較可能な測定・閾値判断・評価証拠へ変換します。"
    - zh: "反馈域还负责审查与纠正（owner: feedback-review-optimization），根据评价证据确认缺陷、提出修订并验证纠正是否改善了目标结果。"
      en: "Feedback also owns Review and correction (owner: feedback-review-optimization), using evaluation evidence to confirm defects, propose revisions, and verify whether a correction improved the target outcome."
      ja: "フィードバックドメインは審査と修正（owner: feedback-review-optimization）も所有し、評価証拠から欠陥を確認し、修訂を提案し、修正が対象結果を改善したかを検証します。"
  excludes:
    - zh: "运行追踪与状态恢复（owner: runtime-observability）属于运行域，因为它记录具体执行时序、跨度、检查点身份与恢复位置；反馈域消费这些事实形成评价，而不重建运行追踪。"
      en: "Runtime tracing and state recovery (owner: runtime-observability) belongs to Runtime because it records concrete execution chronology, spans, checkpoint identity, and recovery position; Feedback consumes those facts for evaluation without rebuilding runtime traces."
      ja: "実行トレースと状態回復（owner: runtime-observability）は具体的実行時系列・スパン・チェックポイント同一性・回復位置を記録するため実行ドメインに属します。フィードバックは評価に利用しますが追跡を再構築しません。"
    - zh: "改进循环控制（owner: orchestration-evaluation）属于编排域，因为它决定何时评估、修订和停止协作循环；反馈域提供评价与纠正证据，但不拥有循环控制流。"
      en: "Improvement-loop control (owner: orchestration-evaluation) belongs to Orchestration because it decides when a collaboration loop evaluates, revises, and stops; Feedback supplies evaluation and correction evidence without owning loop control flow."
      ja: "改善ループ制御（owner: orchestration-evaluation）は協働ループの評価・修訂・停止時機を決めるため編成ドメインに属します。フィードバックは評価と修正証拠を提供しますが制御フローを所有しません。"
  semantic_kind: null
  aliases: []
purpose:
  zh: 把故障、测量、审查、纠正、优化和遥测连接成可追溯改进证据。
  en: Connects failures, measurements, reviews, corrections, optimization, and telemetry into traceable improvement evidence.
  ja: 障害、測定、レビュー、修正、最適化、テレメトリを追跡可能な改善証拠へ接続します。
structure: null
examples:
  - id: feedback-plane-example-positive-001
    kind: positive
    labels:
      zh: 从运行证据到可执行改进建议
      en: From runtime evidence to an actionable improvement proposal
      ja: runtime evidence から実行可能な改善提案へ
    scenario_id: null
    descriptions:
      zh: trace-retrieval-91 与 log-stream-7 显示 retrieval-run-91 返回 12 个候选并耗时 840 ms。Measurement measurement-latency-91 与 measurement-recall-91 从原始记录计算 P95 延迟和已标注答案召回率；EvaluationRun eval-retrieval-14 按 rubric-retrieval@3 判定 recall 未达标。Review review-14 将失败定位到 reranker@5 的阈值，形成 ParameterChangeProposal proposal-threshold-14，并保留从建议回到测量与轨迹的证据链。
      en: trace-retrieval-91 and log-stream-7 show retrieval-run-91 returning 12 candidates in 840 ms. Measurements measurement-latency-91 and measurement-recall-91 derive P95 latency and labeled-answer recall from the raw records. EvaluationRun eval-retrieval-14 applies rubric-retrieval@3 and finds recall below target. Review review-14 attributes the miss to reranker@5's threshold and creates ParameterChangeProposal proposal-threshold-14 with lineage back to measurements and trace.
      ja: trace-retrieval-91 と log-stream-7 は retrieval-run-91 が 12 candidate を 840ms で返したと示します。measurement-latency-91/recall-91 が raw record から P95 latency と labeled-answer recall を計算し、EvaluationRun eval-retrieval-14 が rubric-retrieval@3 で recall 未達を判定します。review-14 は reranker@5 threshold に原因を特定し、measurement/trace への lineage を持つ proposal-threshold-14 を作ります。
    field_values:
      trace_id: trace-retrieval-91
      log_stream_id: log-stream-7
      retrieval_run_id: retrieval-run-91
      measurement_ids:
        - measurement-latency-91
        - measurement-recall-91
      evaluation_run_id: eval-retrieval-14
      rubric_ref: rubric-retrieval@3
      review_id: review-14
      change_proposal_id: proposal-threshold-14
      target_component: reranker@5
    related_node_ids:
      - feedback-plane
    related_relation_ids: []
    expected_result:
      zh: 查询能区分原始运行记录、派生测量、规范化评估、人工或自动审查和待批准变更，并验证每个解释性结论都有可回查证据。
      en: A query separates raw runtime records, derived measurements, governed evaluation, review, and pending change while verifying that each interpretive conclusion has traceable evidence.
      ja: raw runtime record・derived measurement・governed evaluation・review・pending change を区別し、各解釈結論に追跡可能 evidence があると検証します。
    why_valid_or_invalid:
      zh: 反馈身份来自对可观察证据的计算、判定和解释，以及由此产生的改进信号；它没有把 TraceSpan 本身重命名为反馈，也没有把建议直接当成已生效配置。
      en: Feedback identity arises from calculating, adjudicating, and interpreting observable evidence and producing an improvement signal. It neither renames a TraceSpan as feedback nor treats a proposal as an applied configuration.
      ja: feedback identity は observable evidence の計算・判定・解釈と improvement signal 生成から生じ、TraceSpan を feedback と改名せず proposal を適用済み設定とも扱いません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-feedback-plane-003
  - id: feedback-plane-example-boundary-20260717
    kind: boundary
    labels:
      zh: 未解释的原始跨度不是反馈
      en: An uninterpreted raw span is not feedback
      ja: 未解釈の raw span は feedback ではない
    scenario_id: null
    descriptions:
      zh: trace-span-404 仅记录 model-call-404 的开始时间、结束时间、token 数和 status=completed；没有 Metric、Measurement、EvaluationCriterion、Review、Warning、LearningSignal 或 ChangeProposal。
      en: trace-span-404 records only model-call-404 start time, end time, token count, and status=completed. It has no Metric, Measurement, EvaluationCriterion, Review, Warning, LearningSignal, or ChangeProposal.
      ja: trace-span-404 は model-call-404 の start/end・token count・status=completed だけを記録し、Metric・Measurement・EvaluationCriterion・Review・Warning・LearningSignal・ChangeProposal はありません。
    field_values:
      trace_span_id: trace-span-404
      operation_id: model-call-404
      status: completed
      token_count: 1840
      derived_measurement_count: 0
      review_count: 0
    related_node_ids:
      - feedback-plane
      - runtime-plane
    related_relation_ids: []
    expected_result:
      zh: 把跨度与原始计数留在运行时域；只有当明确的测量或审查活动引用它并生成解释性结果时，才在反馈域增加派生事实。
      en: Keep the span and raw count in Runtime. Add derived Feedback facts only when an explicit measurement or review activity cites it and produces an interpretive result.
      ja: span と raw count は Runtime に置き、明示 measurement/review activity が引用して解釈結果を生成した時だけ Feedback derived fact を追加します。
    why_valid_or_invalid:
      zh: 可观察不等于已经评价；把所有日志和跨度直接塞入反馈社区，会再次混淆原始证据与解释层。
      en: Observable does not mean evaluated. Putting every log and span directly into Feedback would collapse raw evidence and the interpretation layer again.
      ja: observable は evaluated を意味せず、全 log/span を Feedback に置くと raw evidence と interpretation layer を再び混同します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-feedback-plane-004
