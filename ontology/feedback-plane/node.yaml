  - id: openai-evals-guide-2026
    title: Working with evals
    publisher: OpenAI
    url: https://developers.openai.com/api/docs/guides/evals
    version: Documentation page accessed 2026-07-18.
    accessed_on: 2026-07-18
    source_type: official-doc
    relevance: Documents an eval definition with data_source_config and testing_criteria plus the evaluate-analyze-improve workflow used as the external API evidence boundary here.
  - id: otel-specification-1-59
    title: OpenTelemetry Specification 1.59.0
    publisher: OpenTelemetry
    url: https://opentelemetry.io/docs/specs/otel/
    version: 1.59.0
    accessed_on: 2026-07-18
    source_type: standard
    relevance: Defines separate Trace, Metrics, and Logs specifications, supporting the boundary between raw runtime telemetry and an evaluation judgment.
source_claims:
  - id: claim-feedback-openai-evals
    source: openai-evals-guide-2026
    supports: The guide defines evaluation work around task description, test inputs, results analysis, data_source_config, and testing_criteria.
    locator: Working with evals — introduction; three steps; Create an eval
    evidence_kind: documented-api
    confidence: high
  - id: claim-feedback-otel-boundary
    source: otel-specification-1-59
    supports: The OpenTelemetry specification has distinct Trace, Metrics, and Logs specifications; a Moonweave quality judgment is therefore modeled separately from an un-interpreted telemetry signal.
    locator: "OpenTelemetry Specification 1.59.0 — Contents: Trace, Metrics, Logs"
    evidence_kind: design-inference
    confidence: high
  - id: claim-feedback-design-boundary
    source: openai-evals-guide-2026
    supports: Moonweave's separation of an evaluation record, improvement proposal, and later runtime execution is a local design boundary informed by the guide's evaluate-analyze-improve sequence, not a claim that the API defines Moonweave records.
    locator: Working with evals — three steps
    evidence_kind: design-inference
    confidence: medium


