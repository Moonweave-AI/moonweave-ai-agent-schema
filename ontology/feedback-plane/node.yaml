schema: moonweave.ai/ontology-node/v1
id: feedback-plane
kind: domain
labels:
  en: Observability & Feedback Domain
  zh: 可观测性与反馈域
  ja: 観測可能性とフィードバックドメイン
semantics:
  short_definition:
    zh: 可观测性与反馈域把运行证据解释成可比较的测量、判定、审查结论与学习信号，并记录这些信号如何回流到编排与优化。
    en: The observability and feedback domain interprets runtime evidence into comparable measurements, verdicts, review conclusions, and learning signals, and records how those signals return to orchestration and optimization.
    ja: 観測可能性とフィードバックドメインは、実行証拠を比較可能な測定、判定、レビュー結論、学習信号へ解釈し、それらがオーケストレーションと最適化へ戻る経路を記録します。
  definition:
    zh: 可观测性与反馈域拥有从可观察运行事实中派生解释性结论所需的规范与结果对象：评估规范与运行、分数与判定、人类反馈与修订产物、学习数据与变更提议。它把原始 Trace、Log Record 与 OpenTelemetry Metric 留在运行时域，只在明确的测量、准则或审查活动引用后才产生反馈语义。域内子模块分别承载评估与度量（feedback-metrics-evaluation）、学习数据与变更提议（feedback-optimization-learning）、反馈与修订证据（feedback-review-optimization）；域根只声明这些能力的边界以及它们如何被编排改进循环消费。基准专属语义保留在适配器层，本域记录的是可复现的评估契约与可追溯的改进证据链。
    en: "The observability and feedback domain owns the specifications and result objects needed to derive interpretive conclusions from observable runtime facts: evaluation specifications and runs, scores and verdicts, human feedback and revision artifacts, learning data and change proposals. It keeps raw Traces, Log Records, and OpenTelemetry Metrics in the runtime domain and produces feedback semantics only after an explicit measurement, criterion, or review activity cites them. Child modules carry evaluation and measurement (feedback-metrics-evaluation), learning data and change proposals (feedback-optimization-learning), and feedback and revision evidence (feedback-review-optimization); the domain root declares only their boundaries and how orchestration improvement loops consume them. Benchmark-specific semantics remain in adapters; this domain records reproducible evaluation contracts and traceable improvement-evidence chains."
    ja: 観測可能性とフィードバックドメインは、観測可能な実行事実から解釈的結論を導くために必要な仕様と結果オブジェクト—評価仕様と実行、スコアと判定、人間フィードバックと改訂成果物、学習データと変更提案—を所有します。生 Trace、Log Record、OpenTelemetry Metric は実行ドメインに残し、明示的な測定、基準、レビュー活動が引用した後にのみフィードバック意味を生成します。子モジュールが評価と測定（feedback-metrics-evaluation）、学習データと変更提案（feedback-optimization-learning）、フィードバックと改訂証拠（feedback-review-optimization）を担い、ドメイン根は境界とオーケストレーション改善ループによる消費方法だけを宣言します。ベンチマーク固有意味はアダプターに残し、本ドメインは再現可能な評価契約と追跡可能な改善証拠連鎖を記録します。
  why_needed:
    zh: 没有这一域，团队只能看到模型调用和工具日志，无法回答一次改动是否提升了质量、失败结论依据哪条准则、人类标注如何进入训练，或某个提议是否已被执行。
    en: Without this domain, teams only see model calls and tool logs and cannot answer whether a change improved quality, which criterion grounded a failure, how human labels enter training, or whether a proposal was executed.
    ja: このドメインがなければ、チームはモデル呼び出しとツールログしか見えず、変更が品質を改善したか、どの基準が失敗を根拠づけたか、人間ラベルが訓練へどう入るか、提案が実行されたかを答えられません。
  includes:
    - zh: "评估与度量（owner: feedback-metrics-evaluation）、学习数据与变更提议（owner: feedback-optimization-learning）、反馈与修订证据（owner: feedback-review-optimization）。"
      en: "Evaluation and measurement (owner: feedback-metrics-evaluation), learning data and change proposals (owner: feedback-optimization-learning), and feedback and revision evidence (owner: feedback-review-optimization)."
      ja: "評価と測定（owner: feedback-metrics-evaluation）、学習データと変更提案（owner: feedback-optimization-learning）、フィードバックと改訂証拠（owner: feedback-review-optimization）。"
    - zh: 可复用的 EvaluationSpecification、Rubric、EvaluationRun、Score、Verdict，以及 LearningSignal、ChangeProposal、Feedback 等解释性结果与其证据链。
      en: Reusable EvaluationSpecification, Rubric, EvaluationRun, Score, Verdict, plus interpretive results such as LearningSignal, ChangeProposal, and Feedback with their evidence chains.
      ja: 再利用可能な EvaluationSpecification、Rubric、EvaluationRun、Score、Verdict、および LearningSignal、ChangeProposal、Feedback などの解釈結果と証拠連鎖。
  excludes:
    - zh: "运行追踪、跨度时序、检查点与恢复位置（owner: runtime-observability、runtime-plane）；反馈域消费这些事实形成评价，但不重建运行追踪。"
      en: "Runtime tracing, span chronology, checkpoints, and recovery position (owner: runtime-observability, runtime-plane); the feedback domain consumes those facts for evaluation without rebuilding runtime traces."
      ja: "実行トレース、スパン時系列、チェックポイント、回復位置（owner: runtime-observability、runtime-plane）。フィードバックドメインは評価のためにそれらを消費しますが、実行トレースを再構築しません。"
    - zh: "改进循环控制、何时评估/修订/停止（owner: orchestration-evaluation）；反馈域提供评价与纠正证据，但不拥有循环控制流。"
      en: "Improvement-loop control and when to evaluate, revise, or stop (owner: orchestration-evaluation); the feedback domain supplies evaluation and correction evidence without owning loop control flow."
      ja: "改善ループ制御と評価・改訂・停止のタイミング（owner: orchestration-evaluation）。フィードバックドメインは評価と修正証拠を提供しますが、ループ制御フローを所有しません。"
    - zh: 实际 PPO 执行、fine-tuning 作业运行时与模型权重更新；这些属于训练运行时，本域只保留学习数据、分数与未执行提议。
      en: Actual PPO execution, fine-tuning job runtime, and model weight updates belong to training runtime; this domain retains only learning data, scores, and unexecuted proposals.
      ja: 実際の PPO 実行、fine-tuning ジョブ実行時、モデル重み更新は訓練ランタイムに属し、本ドメインは学習データ、スコア、未実行提案だけを保持します。
  semantic_kind: null
  aliases: []
engineering:
  explanation:
    zh: 新集成应把 OpenAI Agent Evals（trace、grader、dataset、eval run）、OpenAI Graders（POST /v1/fine_tuning/alpha/graders/run）、LangSmith（POST /runs、feedback scores、annotation queues）、Braintrust（experiments、assertions、online scoring）、DeepEval（test_case 与 14+ metrics）、Promptfoo（YAML eval 与 red-teaming）视为可映射的评估 API 形状；把 InstructGPT RLHF（SFT → RM r_θ(x,y) → PPO）、DPO（β 加权 log-ratio）、OpenAI fine-tuning（POST /v1/fine_tuning/jobs）视为可映射的学习 API 形状，再用 Moonweave 本地对象记录规范、证据与结果边界。trace 与 grader 调试属于评估证据输入；dataset 与 eval run 属于可复现评估规范；preference pair 与 fine-tuning job 属于学习数据与训练契约，但不自动等于已完成的权重更新。
    en: "New integrations should treat OpenAI Agent Evals (trace, grader, dataset, eval run), OpenAI Graders (POST /v1/fine_tuning/alpha/graders/run), LangSmith (POST /runs, feedback scores, annotation queues), Braintrust (experiments, assertions, online scoring), DeepEval (test_case with 14+ metrics), and Promptfoo (YAML eval and red-teaming) as mappable evaluation API shapes; treat InstructGPT RLHF (SFT → RM r_θ(x,y) → PPO), DPO (β-weighted log-ratio), and OpenAI fine-tuning (POST /v1/fine_tuning/jobs) as mappable learning API shapes, then persist Moonweave-local objects for specification, evidence, and result boundaries. Trace and grader debugging are evaluation-evidence inputs; datasets and eval runs are reproducible evaluation specifications; preference pairs and fine-tuning jobs are learning data and training contracts but do not automatically equal completed weight updates."
    ja: 新しい統合では OpenAI Agent Evals（trace、grader、dataset、eval run）、OpenAI Graders（POST /v1/fine_tuning/alpha/graders/run）、LangSmith（POST /runs、feedback scores、annotation queues）、Braintrust（experiments、assertions、online scoring）、DeepEval（test_case と 14+ metrics）、Promptfoo（YAML eval と red-teaming）を写像可能な評価 API 形状として扱い、InstructGPT RLHF（SFT → RM r_θ(x,y) → PPO）、DPO（β 重み log-ratio）、OpenAI fine-tuning（POST /v1/fine_tuning/jobs）を写像可能な学習 API 形状として扱い、Moonweave ローカルオブジェクトで仕様、証拠、結果境界を保存します。trace と grader デバッグは評価証拠入力、dataset と eval run は再現可能評価仕様、preference pair と fine-tuning job は学習データと訓練契約ですが、完了した重み更新と自動的には同一になりません。
  typical_input:
    - description: OpenAI Agents SDK trace with spans before grader adjudication.
      format: |
        {
          "trace_id": "trace_ticket_104",
          "spans": [
            {"type": "agent", "name": "triage_agent"},
            {"type": "generation", "output": "Hardware"}
          ]
        }
      source_claims: [claim-feedback-openai-agent-evals]
    - description: LangSmith run creation with feedback attachment.
      format: |
        POST https://api.smith.langchain.com/runs
        {
          "name": "support-classifier",
          "run_type": "chain",
          "inputs": {"ticket": "Monitor will not turn on"},
          "outputs": {"category": "Hardware"}
        }
      source_claims: [claim-feedback-langsmith-runs]
    - description: Braintrust experiment row with assertion definitions.
      format: |
        {
          "experiment": "ticket-classifier-v3",
          "input": {"ticket": "Monitor will not turn on"},
          "expected": {"category": "Hardware"},
          "scores": {"exact_match": {"assertion": {"type": "eq", "path": "category"}}}
        }
      source_claims: [claim-feedback-braintrust-experiments]
  typical_output:
    - description: Moonweave-local feedback projection linking evidence, criterion, and interpretive result without collapsing runtime traces.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "evidence_ref": "trace:ticket-104",
          "criterion_ref": "rubric:ticket-category@2",
          "evaluation_run_ref": "EvaluationRun:nightly-104",
          "score_ref": "score-exact-match-104",
          "verdict_ref": "verdict-pass-104"
        }
      source_claims: [claim-feedback-domain-design]
  reference_implementations:
    - name: OpenAI Evaluate agent workflows
      url: https://platform.openai.com/docs/guides/evals
      description: Trace grading, graders, datasets, and eval runs for agent quality evaluation.
    - name: LangSmith
      url: https://docs.smith.langchain.com
      description: Run logging, feedback scores, datasets, and annotation queues for human review.
    - name: Braintrust
      url: https://www.braintrust.dev/docs
      description: Experiments, assertions, online scoring, and regression comparison.
    - name: DeepEval
      url: https://docs.confident-ai.com
      description: test_case evaluation with 14+ LLM metrics for unit-style quality checks.
    - name: InstructGPT RLHF
      url: https://arxiv.org/abs/2203.02155
      description: SFT, reward-model training, and PPO as distinct feedback-to-learning stages.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 域标识, en: Domain identifier, ja: ドメイン識別子}
      definitions:
        zh: 可观测性与反馈域的稳定标识，不是某次 EvaluationRun 或 Feedback 记录的标识。
        en: Stable identifier of the observability and feedback domain, not an EvaluationRun or Feedback record identifier.
        ja: 観測可能性とフィードバックドメインの安定識別子であり、EvaluationRun や Feedback 記録の識別子ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^feedback-plane$'
      example_value: feedback-plane
      allowed_values: []
      source_claims: [claim-feedback-domain-design]
    - id: interpretation_boundary
      labels: {zh: 解释边界, en: Interpretation boundary, ja: 解釈境界}
      definitions:
        zh: 声明反馈域拥有解释性测量、判定与学习信号，而原始运行时追踪、编排控制与训练执行由其他域拥有。
        en: States that the feedback domain owns interpretive measurements, verdicts, and learning signals while raw runtime traces, orchestration control, and training execution belong to other domains.
        ja: フィードバックドメインが解釈的測定、判定、学習信号を所有し、生実行トレース、オーケストレーション制御、訓練実行は他ドメインが所有することを宣言します。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: evidence-to-interpretation-only
      allowed_values: [evidence-to-interpretation-only]
      source_claims: [claim-feedback-domain-design]
  constraints:
    - id: feedback-separates-trace-from-verdict
      severity: error
      expression_language: plain
      expression: A raw TraceSpan, LogRecord, or OpenTelemetry Metric data point must not be asserted as a Score, Verdict, Feedback, or LearningSignal without an explicit criterion, measurement act, or review act that cites it.
      explanation:
        zh: 可观察不等于已经评价；原始跨度不能直接冒充判定结论。
        en: Observable does not mean evaluated; a raw span cannot impersonate a verdict.
        ja: observable は evaluated を意味せず、生 span は判定結論になりすませません。
      source_claims: [claim-feedback-openai-agent-evals, claim-feedback-domain-design]
    - id: feedback-does-not-own-loop-control
      severity: warning
      expression_language: plain
      expression: An evaluation score or change proposal may inform orchestration reroute or retry decisions but must not redefine ImprovementActivity or loop-control ownership.
      explanation:
        zh: 反馈可以驱动改路，但不能把改进循环控制迁入反馈域。
        en: Feedback may drive rerouting but cannot relocate improvement-loop control into the feedback domain.
        ja: フィードバックは経路変更を促せますが、改善ループ制御をフィードバック域へ移せません。
      source_claims: [claim-feedback-domain-design]
  required_relations:
    - id: feedback-domain-organizes-metrics-evaluation
      direction: outgoing
      predicate: organizes
      target_concept_id: feedback-metrics-evaluation
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 域至少组织评估与度量模块以承载 EvaluationSpecification、EvaluationRun、Score 与 Verdict。
        en: The domain organizes the evaluation-and-measurement module to carry EvaluationSpecification, EvaluationRun, Score, and Verdict.
        ja: ドメインは EvaluationSpecification、EvaluationRun、Score、Verdict を担う evaluation モジュールを少なくとも一つ組織します。
      source_claims: [claim-feedback-domain-design]
    - id: feedback-domain-organizes-optimization-learning
      direction: outgoing
      predicate: organizes
      target_concept_id: feedback-optimization-learning
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 域至少组织学习数据与变更提议模块以承载 LearningSignal、PreferenceExample 与 ChangeProposal。
        en: The domain organizes the learning-data-and-proposals module to carry LearningSignal, PreferenceExample, and ChangeProposal.
        ja: ドメインは LearningSignal、PreferenceExample、ChangeProposal を担う optimization-learning モジュールを少なくとも一つ組織します。
      source_claims: [claim-feedback-domain-design]
examples:
  - id: feedback-plane-example-openai-trace-grader-verdict
    labels:
      zh: OpenAI Agent Evals trace→grader→判定链
      en: OpenAI Agent Evals trace→grader→verdict chain
      ja: OpenAI Agent Evals trace→grader→判定連鎖
    descriptions:
      zh: triage_agent 的 trace_ticket_104 含 generation span 输出 Hardware；string_check grader 以 reference=Hardware 判定 eq 通过；EvaluationRun nightly-104 汇总 score 与 Verdict pass，证据链从 trace 经 grader 到判定，不把 span 本身重命名为反馈。
      en: trace_ticket_104 for triage_agent contains a generation span outputting Hardware; a string_check grader with reference=Hardware passes eq; EvaluationRun nightly-104 aggregates the score and Verdict pass with an evidence chain from trace through grader to verdict without renaming the span itself as feedback.
      ja: triage_agent の trace_ticket_104 は generation span が Hardware を出力。string_check grader が reference=Hardware で eq 合格。EvaluationRun nightly-104 が score と Verdict pass を集約し、span 自体を feedback と改名せず trace→grader→判定の証拠連鎖を形成します。
    example_source:
      product: OpenAI Agent Evals
      url: https://platform.openai.com/docs/guides/evals
      version: trace grading, graders, datasets, eval runs
    field_values:
      trace_id: trace_ticket_104
      grader_type: string_check
      grader_operation: eq
      candidate_output: Hardware
      reference_output: Hardware
      evaluation_run_id: nightly-104
      verdict: pass
      moonweave_projection:
        evidence_ref: trace:ticket-104
        criterion_ref: rubric:ticket-category@2
        verdict_ref: verdict-pass-104
    related_node_ids:
      - feedback-plane
      - feedback-metrics-evaluation
      - EvaluationRun
      - Score
      - Verdict
    related_relation_ids: []
    source_claims:
      - claim-feedback-openai-agent-evals
      - claim-feedback-domain-design
  - id: feedback-plane-example-langsmith-annotation-queue
    labels:
      zh: LangSmith 标注队列到人类反馈
      en: LangSmith annotation queue to human feedback
      ja: LangSmith 注釈キューから人間フィードバックへ
    descriptions:
      zh: POST /runs 创建 support-classifier run 后，run 进入 annotation queue；标注员在队列中修正 category 为 Hardware 并提交 feedback score correctness=1.0；HumanFeedback 记录修正依据与 run_id，供后续 RevisionActivity 引用。
      en: After POST /runs creates support-classifier run, the run enters an annotation queue; an annotator corrects category to Hardware and submits feedback score correctness=1.0; HumanFeedback records the correction basis and run_id for later RevisionActivity citation.
      ja: POST /runs で support-classifier run 作成後、run が annotation queue に入り、注釈者が category を Hardware に修正し feedback score correctness=1.0 を提出。HumanFeedback が修正根拠と run_id を記録し、後続 RevisionActivity が引用します。
    example_source:
      product: LangSmith
      url: https://docs.smith.langchain.com
      version: runs API, feedback scores, annotation queues
    field_values:
      run_id: run-support-104
      annotation_queue: ticket-quality-review
      original_output: Other
      corrected_output: Hardware
      feedback_key: correctness
      feedback_score: 1.0
      moonweave_projection:
        human_feedback_id: human-feedback-104
        evidence_ref: run:support-104
    related_node_ids:
      - feedback-plane
      - feedback-review-optimization
      - HumanFeedback
      - Feedback
    related_relation_ids: []
    source_claims:
      - claim-feedback-langsmith-runs
      - claim-feedback-domain-design
  - id: feedback-plane-example-swebench-verified
    labels:
      zh: SWE-bench Verified 作为评估基准
      en: SWE-bench Verified as evaluation benchmark
      ja: SWE-bench Verified を評価ベンチマークとして
    descriptions:
      zh: EvaluationScenario swebench-verified 引用 instance django__django-11099；EvaluationRun agent-patch-17 对候选 patch 运行测试 harness，Score pass_rate=1.0 产生 Verdict resolved；基准语义保留在适配器，本域只记录规范、运行与判定证据。
      en: EvaluationScenario swebench-verified cites instance django__django-11099; EvaluationRun agent-patch-17 runs the test harness on a candidate patch, Score pass_rate=1.0 yields Verdict resolved; benchmark semantics stay in the adapter while this domain records only specification, run, and verdict evidence.
      ja: EvaluationScenario swebench-verified が instance django__django-11099 を引用。EvaluationRun agent-patch-17 が候補 patch で test harness を実行し、Score pass_rate=1.0 が Verdict resolved を生成。ベンチマーク意味はアダプターに残し、本ドメインは仕様、実行、判定証拠だけを記録します。
    example_source:
      product: SWE-bench Verified
      url: https://www.swebench.com/
      version: verified instances and pass-rate harness
    field_values:
      benchmark_adapter: swebench-verified
      instance_id: django__django-11099
      evaluation_run_id: agent-patch-17
      pass_rate: 1.0
      verdict: resolved
      moonweave_projection:
        scenario_ref: scenario:swebench-verified
        evaluation_run_ref: EvaluationRun:agent-patch-17
    related_node_ids:
      - feedback-plane
      - feedback-metrics-evaluation
      - EvaluationScenario
      - EvaluationRun
      - Score
      - Verdict
    related_relation_ids: []
    source_claims:
      - claim-feedback-swebench-verified
      - claim-feedback-domain-design
  - id: feedback-plane-example-instructgpt-rlhf-pipeline
    labels:
      zh: InstructGPT RLHF 全链路反馈到学习
      en: InstructGPT RLHF end-to-end feedback-to-learning
      ja: InstructGPT RLHF 全链路フィードバックから学習へ
    descriptions:
      zh: InstructGPT 先用 ~13k SFT demos 监督微调，再用 ~33k 人类比较训练 RM r_θ(x,y)，最后用 PPO 优化策略；feedback-metrics-evaluation 持有比较数据的评估边界，feedback-optimization-learning 持有 PreferenceExample 与训练契约，PPO 执行本身不在本域。
      en: InstructGPT first SFTs on ~13k demos, trains RM r_θ(x,y) on ~33k human comparisons, then optimizes the policy with PPO; feedback-metrics-evaluation holds the evaluation boundary for comparison data, feedback-optimization-learning holds PreferenceExample and training contracts, while PPO execution itself is outside this domain.
      ja: InstructGPT は ~13k SFT demos で監督 fine-tuning し、~33k 人間比較で RM r_θ(x,y) を訓練し、PPO で方策を最適化。feedback-metrics-evaluation が比較データの評価境界を、feedback-optimization-learning が PreferenceExample と訓練契約を保持し、PPO 実行自体は本ドメイン外です。
    example_source:
      product: InstructGPT
      url: https://arxiv.org/abs/2203.02155
      version: SFT → RM r_θ(x,y) → PPO; ~13k demos + ~33k comparisons
    field_values:
      sft_demo_count: 13000
      comparison_count: 33000
      reward_model: r_theta_x_y
      optimization_method: PPO
      moonweave_projection:
        preference_examples_ref: dataset:instructgpt-comparisons
        learning_signal_ref: LearningSignal:rlhf-preference-v1
    related_node_ids:
      - feedback-plane
      - feedback-metrics-evaluation
      - feedback-optimization-learning
      - PreferenceExample
      - LearningSignal
    related_relation_ids: []
    source_claims:
      - claim-feedback-instructgpt-rlhf
      - claim-feedback-domain-design
  - id: feedback-plane-example-boundary-raw-span
    labels:
      zh: 未解释的原始跨度不是反馈
      en: An uninterpreted raw span is not feedback
