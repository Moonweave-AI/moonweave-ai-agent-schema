source_claims:
  - id: claim-feedback-plane-001
    source: eng-fw-openai-tracing
    supports: OpenAI Agents SDK tracing groups related execution spans into traces and records typed spans for agent runs, generations, function calls, guardrails, handoffs, and custom operations; trace processors consume or export those records. This directly supports raw observable execution evidence as input to feedback analysis. The tracing guide does not turn a span into a Measurement, EvaluationRun, ReviewFinding, Correction, or LearningSignal, so those interpretive feedback objects remain separate Moonweave concepts.
    locator: Tracing guide > Traces and spans; Spans; Higher level traces; Trace processors
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-feedback-plane-002
    source: eng-api-openai-evals
    supports: The OpenAI Evals API separates a reusable evaluation definition—its data-source schema and testing criteria—from an evaluation run and the run's output items. This supports distinct identities for what is being evaluated, the governed evaluation procedure, and the resulting evidence. The API does not define Moonweave's complete measurement, human review, diagnosis, correction, optimization, or learning-feedback loop; those relations remain ontology design inferences.
    locator: Evals API reference > Create an eval; Runs > Create a run; Run output items
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-feedback-plane-003
    source: eng-fw-openai-tracing
    supports: OpenAI tracing exposes traces, spans, and processors as observable execution evidence. Moonweave derives measurements and reviews from those records while retaining their runtime identity and provenance.
    locator: Tracing guide > Traces, spans, and trace processors
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-feedback-plane-004
    source: eng-fw-openai-tracing
    supports: The tracing guide treats spans as recorded execution operations. Moonweave requires an additional measurement or review act before asserting an interpretive feedback object.
    locator: Tracing guide > Traces and spans > Span records and processors
    evidence_kind: design-inference
    confidence: high
    review_status: pending
