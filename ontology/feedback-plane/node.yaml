schema: moonweave.ai/ontology-node/v1
id: feedback-plane
kind: domain
status: accepted
labels:
  zh: 评估与反馈域
  en: Evaluation and Feedback Domain
  ja: 評価とフィードバックドメイン
semantics:
  short_definition:
    zh: 记录质量判断及其后续改进信号的智能体工程领域。
    en: The agent-engineering domain that records quality judgments and the improvement signals derived from them.
    ja: 品質判断と、そこから導かれる改善シグナルを記録するエージェント工学ドメイン。
  definition:
    zh: 评估与反馈域组织对候选输出、工具调用结果或工作流版本所作的有标准判断：评估规范给出数据与评分准则，评估活动产生评分、判定或人工反馈记录，后续活动可据此提出修订或训练建议。它不把原始遥测、运行控制或持久化记忆本身重新定义为“反馈”。
    en: The Evaluation and Feedback Domain organizes criterion-bearing judgments about candidate outputs, tool-call results, or workflow versions. An evaluation specification supplies data and grading criteria; an evaluation activity produces a score, verdict, or human-feedback record; a later activity may use that record to propose a revision or training change. It does not relabel raw telemetry, runtime control, or durable memory itself as feedback.
    ja: 評価とフィードバックドメインは、候補出力、ツール呼出結果、ワークフロー版に対する基準付き判断を編成します。評価仕様がデータと採点基準を与え、評価活動がスコア、判定、または人間のフィードバック記録を生み、後続活動がそれを用いて改訂や学習変更を提案します。生のテレメトリ、ランタイム制御、永続メモリそのものをフィードバックと呼び替えるものではありません。
  why_needed:
    zh: 仅有日志只能说明“发生了什么”，不能说明结果是否符合质量目标。该领域把可比较的标准、一次评估的结果及可追溯的改进依据连接起来，使团队能区分真实回归、尚未判定的观测数据和需要人工处理的反馈。
    en: Logs alone say what happened, not whether an outcome met a quality goal. This domain connects comparable criteria, one evaluation's result, and traceable grounds for improvement so a team can distinguish a real regression from unevaluated observations and from feedback requiring a human decision.
    ja: ログだけでは何が起きたかは分かっても、結果が品質目標を満たしたかは分かりません。このドメインは比較可能な基準、一回の評価結果、改善の追跡可能な根拠を結び、実際の回帰、未評価の観測、人的判断を要するフィードバックを区別できるようにします。
  includes:
    - zh: 评估规范、测试数据、评分准则、评估运行、分数、判定、人工纠正和有依据的改进提案。
      en: Evaluation specifications, test data, grading criteria, evaluation runs, scores, verdicts, human corrections, and evidence-backed improvement proposals.
      ja: 評価仕様、テストデータ、採点基準、評価実行、スコア、判定、人間の訂正、根拠付き改善提案。
    - zh: 将指标或人工反馈解释为质量判断的活动，而不是生成指标原始数据的运行时采集。
      en: Activities that interpret metrics or human feedback as quality judgments, rather than runtime collection that merely produces raw metric data.
      ja: メトリクスや人間のフィードバックを品質判断として解釈する活動。生のメトリクスを生成するだけのランタイム収集は含みません。
  excludes:
    - zh: 未绑定任何质量标准的 Trace、Span、Log Record 或 OpenTelemetry Metric；它们属于运行时可观测性，只有被评估活动解释后才可作为反馈证据。
      en: A Trace, Span, Log Record, or OpenTelemetry Metric that is not tied to a quality criterion; it belongs to runtime observability until an evaluation activity interprets it as evidence.
      ja: 品質基準に結び付かない Trace、Span、Log Record、OpenTelemetry Metric。評価活動が証拠として解釈するまではランタイム可観測性に属します。
    - zh: 直接执行重试、路由或状态变更的运行时控制；反馈可以提出建议，但编排或运行时负责执行该建议。
      en: Runtime control that directly retries, routes, or mutates state; feedback may make a proposal, but orchestration or runtime executes it.
      ja: リトライ、ルーティング、状態変更を直接実行するランタイム制御。フィードバックは提案できますが、その実行はオーケストレーションまたはランタイムの責任です。
  semantic_kind: null
  aliases: [evals, quality evaluation, feedback loop]
engineering:
  explanation:
    zh: 工程上可采用“规范—运行—结果—提案”的链路。OpenAI 当前的 agent-evals 指南区分 trace、grader、数据集和 eval run；旧 Evals API 的 `data_source_config` 与 `testing_criteria` 仅可作为历史接口契约范例。系统应把一次 API 或本地评估的原始响应归一为带 criterion、score、verdict 和证据链接的 EvaluationRecord；只有这种带判断的记录才进入反馈域。原始 Trace、Span、OpenTelemetry Metric 和 Log Record 仍保留在运行时域。
    en: Engineering uses a specification–run–result–proposal chain. OpenAI's current agent-evals guidance distinguishes traces, graders, datasets, and eval runs; the legacy Evals API's `data_source_config` and `testing_criteria` are historical public-contract examples only. A system should normalize an API or local evaluator result into an EvaluationRecord with a criterion, score, verdict, and evidence link; only that judgment-bearing record enters this domain. Raw Trace, Span, OpenTelemetry Metric, and Log Record data remain in the runtime domain.
    ja: 工学的には「仕様—実行—結果—提案」の連鎖を使います。OpenAI の現行 agent-evals ガイドは trace、grader、データセット、eval run を区別し、旧 Evals API の `data_source_config` と `testing_criteria` は歴史的な公開契約例にすぎません。API またはローカル評価器の結果は、criterion、score、verdict、証拠リンクを持つ EvaluationRecord に正規化します。このように判断を含む記録だけが本ドメインに入ります。生の Trace、Span、OpenTelemetry Metric、Log Record はランタイムドメインに置きます。
  typical_input:
    - description: OpenAI Evals evaluation-definition request shape documented by the official guide; shown as an external API contract example.
      format: |
        POST /v1/evals
        {
          "name": "IT Ticket Categorization",
          "data_source_config": {"type": "custom", "item_schema": {"type": "object"}},
          "testing_criteria": [{"type": "string_check", "name": "category"}]
        }
      source_claims: [claim-feedback-openai-evals]
  typical_output:
    - description: Moonweave-local normalized evaluation record; this is an ontology contract, not a claimed OpenAI response body.
      format: |
        {
          "evaluation_record_id": "eval-record-042",
          "criterion_id": "category",
          "score": 0.91,
          "verdict": "pass",
          "evidence_ref": "runtime:trace-7fd"
        }
      source_claims: [claim-feedback-design-boundary]
  reference_implementations:
    - name: OpenAI Working with evals
      url: https://developers.openai.com/api/docs/guides/evals
      description: Documents eval definitions with data_source_config and testing_criteria, evaluation runs, and the evaluate-analyze-improve workflow.
    - name: OpenTelemetry Specification
      url: https://opentelemetry.io/docs/specs/otel/
      description: Defines the separate Trace, OpenTelemetry Metric, and Log specifications used to keep raw telemetry distinct from an evaluation judgment.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 领域标识符, en: Domain identifier, ja: ドメイン識別子}
      definitions:
        zh: 评估与反馈领域的稳定目录标识符，不是一次评估运行的标识符。
        en: Stable directory identifier of the Evaluation and Feedback Domain; it is not an evaluation-run identifier.
        ja: 評価とフィードバックドメインの安定したディレクトリ識別子であり、評価実行の識別子ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^feedback-plane$'
      example_value: feedback-plane
      allowed_values: []
      source_claims: [claim-feedback-design-boundary]
    - id: module_ids
      labels: {zh: 模块标识符, en: Module identifiers, ja: モジュール識別子}
      definitions:
        zh: 该领域直接组织的模块集合；它们分别处理评估与度量、学习信号与有依据的变更提议，以及反馈记录与修订工件。
        en: Modules directly organized by this domain; they separately handle evaluation and metrics, learning signals and evidence-backed change proposals, and feedback records and revision artifacts.
        ja: このドメインが直接編成するモジュール集合。評価とメトリクス、学習シグナルと根拠付き変更提案、フィードバック記録と改訂成果物をそれぞれ扱います。
      datatype: string[]
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: '["feedback-metrics-evaluation", "feedback-optimization-learning", "feedback-review-optimization"]'
      allowed_values:
        - id: metrics-evaluation
          value: feedback-metrics-evaluation
          labels: {zh: 指标与评估, en: Metrics and evaluation, ja: メトリクスと評価}
          definitions:
            zh: 保存评估规范、评分和指标的模块。
            en: "Module for evaluation specifications, scores, and metrics."
            ja: 評価仕様、スコア、メトリクスのモジュール。
          source_claims: [claim-feedback-design-boundary]
        - id: optimization-learning
          value: feedback-optimization-learning
          labels: {zh: 学习信号与变更提议, en: Learning signals and change proposals, ja: 学習シグナルと変更提案}
          definitions:
            zh: 保存偏好或奖励学习信号以及有证据支持的变更提议的模块。
            en: Module for preference or reward learning signals and evidence-backed change proposals.
            ja: 選好または報酬の学習シグナルと、根拠付き変更提案を扱うモジュール。
          source_claims: [claim-feedback-design-boundary]
        - id: review-optimization
          value: feedback-review-optimization
          labels: {zh: 反馈与修订, en: Feedback and revision, ja: フィードバックと改訂}
          definitions:
            zh: 保存有依据的反馈记录和修订工件的模块，而不是执行修订本身。
            en: Module for basis-backed feedback records and revision artifacts, not the execution of a revision itself.
            ja: 根拠付きフィードバック記録と改訂成果物を扱うモジュールであり、改訂そのものを実行するものではありません。
          source_claims: [claim-feedback-design-boundary]
      source_claims: [claim-feedback-design-boundary]
  constraints:
    - id: feedback-requires-a-quality-criterion
      severity: error
      expression_language: plain
      expression: A feedback record must name or link to the criterion, rubric, or human judgment under which the candidate was assessed.
      explanation:
        zh: 没有评分准则、量规或人工判断依据的原始数值不能被标成反馈；它仍只是运行观测。
        en: A raw number without a grading criterion, rubric, or human-judgment basis cannot be labelled feedback; it remains an operational observation.
        ja: 採点基準、ルーブリック、または人間判断の根拠がない生の数値はフィードバックと呼べず、運用上の観測のままです。
      source_claims: [claim-feedback-openai-evals, claim-feedback-otel-boundary]
    - id: feedback-proposal-is-not-runtime-execution
      severity: warning
      expression_language: plain
      expression: An improvement proposal may reference a later revision or routing activity but does not itself assert that the runtime action occurred.
      explanation:
        zh: 改进提案与实际执行必须分开记录，避免把建议误当成已发生的运行时变更。
        en: An improvement proposal and its actual execution must be recorded separately so a recommendation is not mistaken for a completed runtime change.
        ja: 改善提案とその実行は別々に記録し、推奨を完了済みのランタイム変更と取り違えないようにします。
      source_claims: [claim-feedback-design-boundary]
  required_relations: []
examples:
  - id: feedback-plane-positive-domain-modules

    labels: {zh: 由三个职责明确的模块组成的反馈域, en: Feedback domain with three bounded modules, ja: 三つの境界付きモジュールを持つフィードバックドメイン}

    descriptions:
      zh: "InstructGPT (Ouyang et al., 2022) RLHF: SFT -> human-ranked RM r_theta(x,y) -> PPO; ~13k demos + 33k comparisons; feedback-plane maps supervised/preference data-prep boundary."
      en: "InstructGPT (Ouyang et al., 2022) RLHF: SFT -> human-ranked RM r_theta(x,y) -> PPO; ~13k demos + 33k comparisons; feedback-plane maps supervised/preference data-prep boundary."
      ja: "InstructGPT SFT->RM->PPO; feedback-plane data prep boundary."
    field_values: {id: feedback-plane, module_ids: '["feedback-metrics-evaluation", "feedback-optimization-learning", "feedback-review-optimization"]'}
    related_node_ids: [feedback-metrics-evaluation, feedback-optimization-learning, feedback-review-optimization]
    related_relation_ids: []

    source_claims: [claim-feedback-openai-evals]
  - id: feedback-plane-counterexample-uninterpreted-latency

    labels: {zh: 未解释的延迟 Span, en: Uninterpreted latency Span, ja: 解釈されていないレイテンシ Span}

    descriptions:
      zh: "Missing environment_id cannot serve as AgentBench-style feedback-plane."
      en: "Missing environment_id cannot serve as AgentBench-style feedback-plane."
      ja: "Missing environment_id rejects AgentBench-style feedback-plane."
    field_values: {telemetry_type: Span, duration_ms: 2300}
    related_node_ids: [runtime-plane]
    related_relation_ids: []

    source_claims: [claim-feedback-otel-boundary]
  - id: feedback-plane-boundary-user-correction

    labels: {zh: 用户纠正跨入反馈边界, en: User correction crossing the feedback boundary, ja: ユーザー訂正がフィードバック境界を越える場合}

    descriptions:
      zh: "faithfulness measures grounding; latency is cost; feedback-plane must not treat wall-clock as faithfulness."
      en: "faithfulness measures grounding; latency is cost; feedback-plane must not treat wall-clock as faithfulness."
      ja: "Latency not faithfulness."
    field_values: {feedback_kind: correction, review_linked: true}
    related_node_ids: [info-plane, feedback-review-optimization]
    related_relation_ids: []

    source_claims: [claim-feedback-design-boundary]
  - id: feedback-plane-instance-directory

    labels: {zh: 具体领域目录条目 feedback-plane, en: Concrete domain directory entry feedback-plane, ja: 具体的なドメインディレクトリ項目 feedback-plane}

    descriptions:
      zh: "OpenAI Evals instance: string_check eq Hardware->run completed->feedback-plane eval_id=it-ticket-v1."
      en: "OpenAI Evals instance: string_check eq Hardware->run completed->feedback-plane eval_id=it-ticket-v1."
      ja: "OpenAI Evals instance maps to feedback-plane Run."
    field_values: {id: feedback-plane, module_ids: '["feedback-metrics-evaluation", "feedback-optimization-learning", "feedback-review-optimization"]'}
    related_node_ids: [feedback-metrics-evaluation, feedback-optimization-learning, feedback-review-optimization]
    related_relation_ids: []

    source_claims: [claim-feedback-design-boundary]
parent_relation: null
relations: []
