source_claims:
  - id: claim-failure-event-001
    source: eng-std-opentelemetry-recording-errors
    supports: OpenTelemetry defines an operation failure, ERROR span status, and exception-recording boundary; Moonweave uses those facts to define explicitly scoped FailureEvent occurrences, but the source does not define or assert the ontology class.
    locator: Recording errors > What constitutes an error; Recording errors on spans; Recording exceptions
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-failure-event-002
    source: eng-std-opentelemetry-recording-errors
    supports: OpenTelemetry sets ERROR status on the operation that ended unsuccessfully; Moonweave uses the operation boundary as the scope of FailureEvent, a class the source does not define.
    locator: Recording errors > What constitutes an error; Recording errors on spans
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-failure-event-003
    source: eng-std-opentelemetry-recording-errors
    supports: OpenTelemetry requires span status to remain unset when an operation ends without errors; Moonweave uses that criterion to reject a successful attempt as FailureEvent, while the ontology class remains a design inference.
    locator: Recording errors > Recording errors on spans
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-failure-event-004
    source: eng-std-opentelemetry-recording-errors
    supports: OpenTelemetry scopes ERROR status to the operation that ended unsuccessfully; Moonweave uses that boundary to specialize FailureEvent under DiagnosticEvent, a hierarchy the source does not define.
    locator: Recording errors > What constitutes an error; Recording errors on spans
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-failure-event-005
    source: eng-std-opentelemetry-recording-errors
    supports: OpenTelemetry requires status to remain unset when an operation ends without errors; Moonweave therefore rejects a successful diagnostic occurrence as FailureEvent, while the subclass boundary is not asserted by the source.
    locator: Recording errors > Recording errors on spans
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-failure-event-006
    source: eng-std-opentelemetry-recording-errors
    supports: OpenTelemetry defines operation failure and ERROR span status; Moonweave specializes that scoped occurrence as FailureEvent under DiagnosticEvent, but the source does not define or assert this ontology hierarchy.
    locator: Recording errors > What constitutes an error; Recording errors on spans
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
