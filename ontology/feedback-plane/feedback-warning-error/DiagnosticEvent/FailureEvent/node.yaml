schema: moonweave.ai/ontology-node/v1
id: FailureEvent
kind: concept
status: accepted
labels:
  zh: 失败事件
  en: failure event
  ja: 失敗イベント
semantics:
  short_definition:
    zh: 失败事件是使其声明作用域无法满足成功条件的一次诊断事件。
    en: A failure event is a DiagnosticEvent causing its declared scope not to satisfy success conditions.
    ja: 失敗イベントは宣言範囲が成功条件を満たせなくなる DiagnosticEvent です。
  definition:
    zh: 失败事件是 DiagnosticEvent 的子类；它绑定失败作用域、终止或降级时间、失败条件、相关 RunOutcome 和证据，区别于仅提示风险而不改变作用域结果的 WarningEvent。
    en: A failure event is a DiagnosticEvent subtype binding failed scope, termination or degradation time, failed condition, related RunOutcome, and evidence, unlike WarningEvent that reports risk without changing scope outcome.
    ja: 失敗イベントは失敗範囲、終了・縮退時刻、失敗条件、関連 RunOutcome、証拠を結ぶ DiagnosticEvent 下位型で、範囲結果を変えない WarningEvent と異なります。
  why_needed:
    zh: 显式失败作用域可区分一次工具尝试失败与整个任务失败，避免错误向上冒泡。
    en: Explicit failure scope distinguishes one tool-attempt failure from whole-task failure and prevents erroneous upward propagation.
    ja: 失敗範囲を明示し一ツール試行失敗と全タスク失敗を区別し誤上位伝播を防ぎます。
  includes:
    - zh: 包括尝试失败、工具调用失败、评估失败或任务终局失败事件。
      en: Includes attempt, tool-call, evaluation, and task-terminal failure events.
      ja: 試行、ツール呼出し、評価、タスク終局失敗イベントを含みます。
  excludes:
    - zh: 不包括没有改变结果的 WarningEvent 或可复用 FailureMode 分类。
      en: Excludes WarningEvent that does not change outcome and reusable FailureMode classifications.
      ja: 結果を変えない WarningEvent と再利用 FailureMode 分類は含みません。
  semantic_kind: event
  aliases: []
