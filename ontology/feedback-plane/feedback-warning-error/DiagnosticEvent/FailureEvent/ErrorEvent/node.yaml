schema: moonweave.ai/ontology-node/v1
id: ErrorEvent
kind: concept
status: accepted
labels:
  zh: 错误事件
  en: error event
  ja: エラーイベント
semantics:
  short_definition:
    zh: 错误事件是由异常、错误返回或无效状态导致作用域失败的失败事件。
    en: An error event is a FailureEvent caused by an exception, error response, or invalid state.
    ja: エラーイベントは例外、エラー応答、無効状態が範囲失敗を起こす FailureEvent です。
  definition:
    zh: 错误事件是 FailureEvent 的子类，完整继承 DiagnosticEvent 的 diagnostic_event_id、作用域、执行、发生时间、事件类型和出处，不再创建错误专用事件 ID；其种差是稳定 error.type、错误严重度、策略求得的可重试性以及明确的 FailureMode 分类。
    en: An ErrorEvent is a FailureEvent subtype that inherits DiagnosticEvent's diagnostic_event_id, scope, execution, occurrence time, event type, and provenance without creating an error-specific event ID. Its differentia is stable error.type, error severity, policy-evaluated retryability, and explicit FailureMode classification.
    ja: ErrorEvent は DiagnosticEvent の diagnostic_event_id・scope・execution・occurrence time・event type・provenance を継承し、error 専用 event ID を作らない FailureEvent subtype です。種差は安定 error.type・error severity・policy 評価済み retryability・明示 FailureMode 分類です。
  why_needed:
    zh: 把错误发生与 FailureMode 分类分开，同一 timeout 事件可由不同 RetryPolicy 作出不同处置。
    en: Separating error occurrence from FailureMode classification lets the same timeout event receive different dispositions under different RetryPolicies.
    ja: エラー発生と FailureMode 分類を分け同じ timeout event を異なる RetryPolicy で異なる処置にできます。
  includes:
    - zh: 包括未处理异常、RPC 错误、验证错误或工具错误导致的作用域失败。
      en: Includes scope failures caused by unhandled exceptions, RPC errors, validation errors, or tool errors.
      ja: 未処理例外、RPC error、validation error、tool error による範囲失敗を含みます。
  excludes:
    - zh: 不包括仅提示风险的 WarningEvent，也不包括 RetryableFailureMode 等可复用分类。
      en: Excludes WarningEvent that only signals risk and reusable classifications such as RetryableFailureMode.
      ja: リスク提示のみ WarningEvent と RetryableFailureMode など再利用分類は含みません。
  semantic_kind: event
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: error_code
      labels:
        zh: 错误代码
        en: error code
        ja: エラーコード
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 用于稳定分类和聚合错误的机器可读代码。
        en: Machine-readable code for stable error classification and aggregation.
        ja: 安定したエラー分類と集計のための機械可読コードです。
      allowed_values: []
      pattern: null
      example_value: TOOL_TIMEOUT
      source_claims:
        - claim-error-event-005
    - id: severity
      labels:
        zh: 严重度
        en: severity
        ja: 重大度
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明错误影响程度的受控等级。
        en: Controlled level expressing the impact of the error.
        ja: エラー影響度を表す制御レベルです。
      allowed_values: []
      pattern: null
      example_value: error
      source_claims:
        - claim-error-event-006
    - id: retryable
      labels:
        zh: 可重试
        en: retryable
        ja: 再試行可能
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明同等条件下创建新尝试是否是允许的恢复策略。
        en: Whether creating a new attempt under equivalent conditions is an allowed recovery strategy.
        ja: 同等条件で新しい試行を作ることが許可された回復戦略かを示します。
      allowed_values: []
      pattern: null
      example_value: true
      source_claims:
        - claim-error-event-007
  constraints:
    - id: error-event-retry-consistency
      severity: error
      expression_language: plain
      expression: retryable agrees with the linked FailureMode and applicable retry policy
      explanations:
        zh: 可重试标志必须与失败模式和适用重试策略一致。
        en: retryable agrees with the linked FailureMode and applicable retry policy.
        ja: retryable は関連する FailureMode と適用される再試行方針に一致します。
      source_claims:
        - claim-error-event-008
  required_relation_constraints:
    - id: error-event-classified-by-mode
      direction: outgoing
      predicate: classified_by
      target_concept_id: FailureMode
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 错误事件必须由一个明确失败模式分类。
        en: An error event is classified by one explicit failure mode.
        ja: エラーイベントは一つの明示的な失敗モードで分類されます。
      source_claims:
        - claim-error-event-009
        - claim-error-event-010
examples:
  - id: ErrorEvent-example-positive-manual-001
    kind: positive
    labels:
      zh: 错误事件正例
      en: Positive error event case
      ja: エラーイベントの正例
    scenario_id: null
    descriptions:
      zh: err-31 记录 attempt-3 的 upstream timeout，error.type=timeout、occurred_at 和异常引用完整。
      en: err-31 records an upstream timeout for attempt-3 with error.type=timeout, occurrence time, and exception reference.
      ja: err-31 は attempt-3 の upstream timeout を error.type=timeout、発生時刻、例外参照付きで記録します。
    field_values:
      diagnostic_event_id: err-31
      scope_ref: tool-attempt/attempt-3
      execution_ref: run-attempt/attempt-3
      event_type: exception
      provenance_ref: log-record/err-31@sealed
      error_code: UPSTREAM_TIMEOUT
      severity: error
      retryable: true
      occurred_at: 2026-07-16T02:00:31.000Z
    related_node_ids:
      - ErrorEvent
    related_relation_ids: []
    expected_result:
      zh: 该对象是 ErrorEvent。
      en: The object is an ErrorEvent.
      ja: この対象は ErrorEvent です。
    why_valid_or_invalid:
      zh: 具体失败发生、作用域、稳定类型和来源证据完整。
      en: Concrete failure occurrence, scope, stable type, and source evidence are complete.
      ja: 具体失敗発生、範囲、安定 type、出所証拠が完全です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-error-event-011
      - claim-error-event-012
      - claim-error-event-013
  - id: ErrorEvent-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 错误事件边界例
      en: Boundary error event case
      ja: エラーイベントの境界例
    scenario_id: null
    descriptions:
      zh: RetryableFailureMode 定义 timeout 在某策略下允许重试，但没有一次发生时间。
      en: RetryableFailureMode defines timeout as retryable under a policy but has no occurrence time.
      ja: RetryableFailureMode は方針下で timeout を再試行可能と定義しますが発生時刻がありません。
    field_values: {}
    related_node_ids:
      - ErrorEvent
    related_relation_ids: []
    expected_result:
      zh: 这是 FailureMode 分类，不是 ErrorEvent。
      en: This is a FailureMode classification, not ErrorEvent.
      ja: これは FailureMode 分類で ErrorEvent ではありません。
    why_valid_or_invalid:
      zh: 可复用分类没有一次错误发生的事件身份。
      en: A reusable classification has no one-error occurrence identity.
      ja: 再利用分類には一回のエラー発生 ID がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-error-event-014
external_mappings: []
applicability:
  - core
sibling_differentiation: []
