        en: err-31 is both ErrorEvent and FailureEvent.
        ja: err-31 は ErrorEvent かつ FailureEvent です。
      why_valid_or_invalid:
        zh: 错误原因与作用域失败证据均完整。
        en: Both error cause and scoped failure evidence are present.
        ja: エラー原因と範囲失敗証拠が揃っています。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-error-event-015
    - id: ErrorEvent-is_a-FailureEvent-example-boundary-manual-001
      kind: boundary
      labels:
        zh: 是一种边界例
        en: Boundary case for is a
        ja: の一種であるの境界例
      scenario_id: null
      descriptions:
        zh: task 因人工取消而结束，记录失败结果但没有异常、错误响应或无效状态。
        en: A task ends by human cancellation with a failed outcome but no exception, error response, or invalid state.
        ja: task は人手取消で失敗終了しますが例外、エラー応答、無効状態はありません。
      field_values: {}
      related_node_ids:
