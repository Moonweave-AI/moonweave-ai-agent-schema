      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-error-event-016
  source_claims:
    - claim-error-event-017
    - claim-error-event-018
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: ErrorEvent-classified_by-FailureMode
    predicate: classified_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 由故障模式分类
      en: classified by failure mode
      ja: 故障モードで分類
    definitions:
      zh: ErrorEvent 依据稳定错误类型、作用域和证据被某个 FailureMode 版本分类；该边记录诊断判定，不把一次事件与可复用分类合并。
      en: ErrorEvent is classified by a FailureMode version from stable error type, scope, and evidence; the edge records diagnostic adjudication without merging an occurrence with a reusable class.
      ja: ErrorEvent は安定 error type、範囲、証拠により FailureMode 版で分類され、この辺は一回の発生と再利用分類を統合せず診断判定を記録します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_classified_by
      labels:
        zh: 反向：由故障模式分类
        en: "inverse: classified by failure mode"
        ja: 逆方向：故障モードで分類
    conditions:
      - id: ErrorEvent-classified_by-FailureMode-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the ErrorEvent's recorded error type, affected operation, phase, and causal evidence satisfy the named FailureMode definition and version; severity alone or a shared exception class is insufficient.
        explanations:
          zh: 仅当 ErrorEvent 记录的错误类型、受影响操作、阶段和因果证据满足指定 FailureMode 的定义与版本时成立；只有严重度或共享异常类不足。
          en: Assert only when the ErrorEvent's recorded error type, affected operation, phase, and causal evidence satisfy the named FailureMode definition and version; severity alone or a shared exception class is insufficient.
          ja: ErrorEvent の error type・affected operation・phase・causal evidence が指定 FailureMode definition/version を満たす場合だけ成立します。severity だけ、または共通 exception class だけでは不十分です。
        source_claims:
          - claim-error-event-019
          - claim-error-event-020
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: ErrorEvent-classified_by-FailureMode-example-positive-manual-001
        kind: positive
        labels:
          zh: 由故障模式分类正例
          en: Positive case for classified by failure mode
          ja: 故障モードで分類の正例
        scenario_id: null
        descriptions:
          zh: err-31.error_type=timeout 且作用域为 node attempt，匹配 failure-mode upstream-timeout-v2。
          en: err-31 error_type=timeout at node-attempt scope matches failure-mode upstream-timeout-v2.
          ja: err-31 の error_type=timeout と node-attempt 範囲が failure-mode upstream-timeout-v2 に一致します。
        field_values: {}
        related_node_ids:
          - ErrorEvent
          - FailureMode
        related_relation_ids:
          - ErrorEvent-classified_by-FailureMode
        expected_result:
          zh: 应记录 err-31 classified_by upstream-timeout-v2。
          en: Record err-31 classified_by upstream-timeout-v2.
          ja: err-31 classified_by upstream-timeout-v2 を記録します。
        why_valid_or_invalid:
          zh: 类型、作用域和匹配规则均有证据。
          en: Type, scope, and matching rule are evidenced.
          ja: 型、範囲、照合規則に証拠があります。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-error-event-021
      - id: ErrorEvent-classified_by-FailureMode-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 由故障模式分类边界例
          en: Boundary case for classified by failure mode
          ja: 故障モードで分類の境界例
        scenario_id: null
        descriptions:
          zh: err-32 是 authentication_failed，却仅因同一 Execution 被标为 timeout 模式。
          en: err-32 is authentication_failed but is labeled timeout merely because it shares an Execution.
          ja: err-32 は authentication_failed ですが同一 Execution だけで timeout mode とされます。
        field_values: {}
        related_node_ids:
          - ErrorEvent
          - FailureMode
        related_relation_ids:
          - ErrorEvent-classified_by-FailureMode
        expected_result:
          zh: 应拒绝把认证错误事件分类为超时故障模式的关系边。
          en: Reject the classification edge.
          ja: 当該分類辺を拒否します。
        why_valid_or_invalid:
          zh: 共现不能替代错误类型与作用域匹配。
          en: Co-occurrence cannot replace error-type and scope matching.
          ja: 共起は error type と範囲照合の代用になりません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-error-event-022
    source_claims:
      - claim-error-event-023
      - claim-error-event-024
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:FailureMode
  - id: ErrorEvent-conveys-DiagnosticMessage
    predicate: conveys
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 传达诊断消息
      en: conveys diagnostic message
      ja: 診断メッセージを伝達
    definitions:
      zh: ErrorEvent 指向记录该次错误的人类或机器可读 DiagnosticMessage 内容；消息可被日志复用，但事件仍保留独立发生时间与作用域。
      en: ErrorEvent points to human- or machine-readable DiagnosticMessage content for that error; the message may be reused in logs while the event retains independent occurrence time and scope.
      ja: ErrorEvent は当該エラーの人・機械可読 DiagnosticMessage 内容を指し、message は log で再利用されても event は独立発生時刻と範囲を保持します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_conveys
      labels:
        zh: 反向：传达诊断消息
        en: "inverse: conveys diagnostic message"
        ja: 逆方向：診断メッセージを伝達
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: ErrorEvent-conveys-DiagnosticMessage-example-positive-manual-001
        kind: positive
        labels:
          zh: 传达诊断消息正例
          en: Positive case for conveys diagnostic message
          ja: 診断メッセージを伝達の正例
        scenario_id: null
        descriptions:
          zh: err-31.message_ref=dm-31，dm-31 的 error_type 与 attempt 引用和事件一致。
          en: err-31 message_ref is dm-31 and dm-31 error_type and attempt reference match the event.
          ja: err-31.message_ref=dm-31 で dm-31 の error_type と attempt 参照が event に一致します。
        field_values: {}
        related_node_ids:
          - ErrorEvent
          - DiagnosticMessage
        related_relation_ids:
          - ErrorEvent-conveys-DiagnosticMessage
        expected_result:
          zh: 应记录 err-31 conveys dm-31。
          en: Record err-31 conveys dm-31.
          ja: err-31 conveys dm-31 を記録します。
        why_valid_or_invalid:
          zh: 诊断消息内容与事件引用共同明确解释同一次错误发生。
          en: The message explicitly explains the same error occurrence.
          ja: message 内容が同じ error 発生を明示説明します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-error-event-025
      - id: ErrorEvent-conveys-DiagnosticMessage-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 传达诊断消息边界例
          en: Boundary case for conveys diagnostic message
          ja: 診断メッセージを伝達の境界例
        scenario_id: null
        descriptions:
          zh: dm-40 是另一次认证错误消息，仅与 err-31 出现在同一日志批次。
          en: dm-40 describes another authentication error and only shares a log batch with err-31.
          ja: dm-40 は別 authentication error の message で err-31 と同じ log batch にあるだけです。
        field_values: {}
        related_node_ids:
          - ErrorEvent
          - DiagnosticMessage
        related_relation_ids:
          - ErrorEvent-conveys-DiagnosticMessage
        expected_result:
          zh: 不得声称 err-31 conveys dm-40。
          en: Do not assert err-31 conveys dm-40.
          ja: err-31 conveys dm-40 を主張しません。
        why_valid_or_invalid:
          zh: 共享日志批次不能证明该消息内容解释的是同一个错误事件。
          en: A shared batch does not prove the message explains that event.
          ja: 同一 batch は message が event を説明する証拠ではありません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-error-event-026
    source_claims:
      - claim-error-event-027
      - claim-error-event-028
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:DiagnosticMessage
  - id: ErrorEvent-terminates-RunAttempt
    predicate: terminates
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 终止运行尝试
      en: terminates run attempt
      ja: 実行試行を終了
    definitions:
      zh: ErrorEvent 仅在同一个 RunAttempt 因该错误进入不可继续的 failed 终态时终止该尝试，并由匹配的 attempt 标识、失败状态转换、结束时间和错误引用证明；已处理或随后重试的错误事件本身不终止该尝试。
      en: ErrorEvent terminates the same RunAttempt only when that error drives it into a non-continuable terminal failed state, evidenced by matching attempt identity, failed-state transition, end time, and error reference; an error that is handled or retried does not by itself terminate the attempt.
      ja: ErrorEvent は同一 RunAttempt を non-continuable terminal failed state へ移行させた場合のみ terminate し matching attempt identity・failed-state transition・end time・error reference で証明し handled/retried error 自体は attempt を terminate しません。
    cardinality: null
