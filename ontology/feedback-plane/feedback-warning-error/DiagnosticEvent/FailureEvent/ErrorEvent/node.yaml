  definitions:
    zh: 错误事件是由异常、错误响应或无效状态造成作用域失败的失败事件。
    en: ErrorEvent is a FailureEvent whose scoped failure is caused by an exception, error response, or invalid state.
    ja: ErrorEvent は例外、エラー応答、無効状態が範囲失敗を起こした FailureEvent です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
    en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
    ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
  inverse_reading:
    predicate: inverse_of_is_a
    labels:
      zh: 反向：是一种
      en: "inverse: is a"
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ErrorEvent-is_a-FailureEvent-example-positive-manual-001
      kind: positive
      labels:
        zh: 是一种正例
        en: Positive case for is a
        ja: の一種であるの正例
      scenario_id: null
      descriptions:
        zh: err-31 记录 TimeoutError、error.type=timeout，并使 attempt-3 失败。
        en: err-31 records TimeoutError, error.type=timeout, and fails attempt-3.
        ja: err-31 は TimeoutError、error.type=timeout を記録し attempt-3 を失敗させます。
      field_values: {}
      related_node_ids:
        - ErrorEvent
        - FailureEvent
