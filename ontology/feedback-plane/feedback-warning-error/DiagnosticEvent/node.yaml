schema: moonweave.ai/ontology-node/v1
id: DiagnosticEvent
kind: concept
status: accepted
labels:
  zh: 诊断事件
  en: diagnostic event
  ja: 診断イベント
semantics:
  short_definition:
    zh: 诊断事件是运行中值得诊断关注的一次带时间和作用域的发生记录。
    en: A diagnostic event is one timestamped, scoped runtime occurrence warranting diagnostic attention.
    ja: 診断イベントは診断上注目すべき時刻・範囲付き実行発生記録です。
  definition:
    zh: 诊断事件是一种事件；其身份由 event_id、发生时间、作用域、关联执行、事件类型和出处决定，可表示警告或失败发生，区别于持久的 DiagnosticSignal 内容。
    en: A diagnostic event is an event identified by event_id, occurrence time, scope, related execution, event type, and provenance; it may record warning or failure occurrence and differs from persistent DiagnosticSignal content.
    ja: 診断イベントは event_id、発生時刻、範囲、関連実行、event type、出所で同一性が決まり警告・失敗発生を記録し持続 DiagnosticSignal 内容と異なります。
  why_needed:
    zh: 统一诊断事件上位类可让 WarningEvent 与 FailureEvent 共享时间和出处规则，同时保持不同结果语义。
    en: A shared DiagnosticEvent genus gives WarningEvent and FailureEvent common timing and provenance rules while retaining different outcome semantics.
    ja: 共通 DiagnosticEvent 上位型により WarningEvent と FailureEvent が時刻・出所規則を共有し結果意味を分離します。
  includes:
    - zh: 包括警告事件、错误事件和其他失败事件。
      en: Includes warning events, error events, and other failure events.
      ja: 警告イベント、エラーイベント、その他失敗イベントを含みます。
  excludes:
    - zh: 不包括 Warning 或 DiagnosticMessage 的内容，也不包括 FailureMode 分类规范。
      en: Excludes Warning or DiagnosticMessage content and FailureMode classification specifications.
      ja: Warning・DiagnosticMessage 内容と FailureMode 分類仕様は含みません。
  semantic_kind: event
  aliases: []
structure:
  identity_keys:
    - diagnostic_event_id
  fields:
    - id: diagnostic_event_id
      labels:
        zh: 诊断事件标识
        en: diagnostic-event ID
        ja: 診断 event ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次实际发生、具有单一来源时间和执行范围的诊断事件；重放或重复观测不会复用此标识。
        en: Stably identifies one diagnostic occurrence with one source time and execution scope; replay or repeated observation does not reuse this ID.
        ja: 一つの source time と実行範囲を持つ実際の診断発生を安定識別し、replay・再観測では ID を再利用しません。
      allowed_values: []
      pattern: null
      example_value: diagnostic-event/de-8
      source_claims:
        - claim-diagnostic-event-002
    - id: occurred_at
      labels:
        zh: 发生时间
        en: occurred at
        ja: 発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 事件在源组件实际发生的 UTC 时间，使用 source Timestamp 而不是收集端 ObservedTimestamp。
        en: UTC instant when the event actually occurred at the source component, using source Timestamp rather than collector ObservedTimestamp.
        ja: collector の ObservedTimestamp でなく source Timestamp による、source component で event が実際に発生した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T14:30:02.000Z
      source_claims:
        - claim-diagnostic-event-003
    - id: scope_ref
      labels:
        zh: 诊断作用域引用
        en: diagnostic-scope reference
        ja: 診断範囲参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用事件直接改变或限定的最小运行边界，如 span、工具尝试、节点尝试或整个运行。
        en: References the smallest runtime boundary directly changed or qualified by the event, such as a span, tool attempt, node attempt, or whole run.
        ja: event が直接変更・限定する最小 runtime boundary（span・tool attempt・node attempt・run 全体等）を参照します。
      allowed_values: []
      pattern: null
      example_value: span/s-2
      source_claims:
        - claim-diagnostic-event-004
    - id: execution_ref
      labels:
        zh: 关联执行引用
        en: related-execution reference
        ja: 関連実行参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用包含该最小作用域、负责其生命周期的 Execution 或 RunAttempt，便于从局部事件回溯运行。
        en: References the Execution or RunAttempt that contains and owns the lifecycle of the smallest scope, enabling trace from the local event to its run.
        ja: 最小範囲を含み lifecycle を担う Execution・RunAttempt を参照し、局所 event から run へ追跡可能にします。
      allowed_values: []
      pattern: null
      example_value: run-attempt/attempt-3
      source_claims:
        - claim-diagnostic-event-005
    - id: event_type
      labels:
        zh: 事件类型
        en: event type
        ja: event type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录可预测、低基数的诊断事件类，如 exception、warning-threshold 或 operation-failure；不得使用完整消息。
        en: Records a predictable, low-cardinality diagnostic event class such as exception, warning-threshold, or operation-failure; full message text is prohibited.
        ja: exception・warning-threshold・operation-failure 等の予測可能で低 cardinality の診断 event class を記録し、完全 message text を使いません。
      allowed_values: []
      pattern: null
      example_value: exception
      source_claims:
        - claim-diagnostic-event-006
    - id: provenance_ref
      labels:
        zh: 原始出处引用
        en: origin provenance reference
        ja: 原始出所参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用保留原始正文、属性、严重度、资源、插桩范围和时间戳的不可变 LogRecord 或等价记录。
        en: References the immutable LogRecord or equivalent record preserving original body, attributes, severity, Resource, InstrumentationScope, and timestamps.
        ja: 元の body・attributes・severity・Resource・InstrumentationScope・timestamp を保持する不変 LogRecord・同等記録を参照します。
      allowed_values: []
      pattern: null
      example_value: log-record/lr-913@sealed
      source_claims:
        - claim-diagnostic-event-007
  constraints:
    - id: diagnostic-event-one-source-occurrence
      severity: error
      expression_language: plain
      expression: one DiagnosticEvent represents one source occurrence with one occurred_at, smallest affected scope, containing execution, event type, and immutable provenance record; later observations or DiagnosticSignals do not create identity equivalence
      explanations:
        zh: 一个诊断事件只表示一次源发生，绑定一个发生时间、最小作用域、包含执行、事件类型和不可变出处；后续观测或诊断信号不与其身份等同。
        en: One diagnostic event represents one source occurrence with one time, smallest scope, containing execution, type, and immutable provenance; later observations and diagnostic signals are not identity-equivalent.
        ja: 一つの DiagnosticEvent は一回の source occurrence を表し、一つの時刻・最小範囲・包含実行・type・不変出所を結び、後続観測や signal と同一視しません。
      source_claims:
        - claim-diagnostic-event-008
  required_relation_constraints: []
examples:
  - id: DiagnosticEvent-example-positive-manual-001
    kind: positive
    labels:
      zh: 诊断事件正例
      en: Positive diagnostic event case
      ja: 診断イベントの正例
    scenario_id: null
    descriptions:
      zh: event de-8 在 attempt-3 的 span s-2 上 14:30:02 记录 diagnostic.type=exception。
      en: event de-8 records diagnostic.type=exception at 14:30:02 on span s-2 of attempt-3.
      ja: event de-8 は attempt-3 の span s-2 上 14:30:02 に diagnostic.type=exception を記録します。
    field_values:
      diagnostic_event_id: diagnostic-event/de-8
      occurred_at: 2026-07-16T14:30:02.000Z
      scope_ref: span/s-2
      execution_ref: run-attempt/attempt-3
      event_type: exception
      provenance_ref: log-record/lr-913@sealed
    related_node_ids:
      - DiagnosticEvent
    related_relation_ids: []
    expected_result:
      zh: 该对象是 DiagnosticEvent。
      en: The object is a DiagnosticEvent.
      ja: この対象は DiagnosticEvent です。
    why_valid_or_invalid:
      zh: 事件身份、时间、作用域、执行与类型完整。
      en: Event identity, time, scope, execution, and type are complete.
      ja: event ID、時刻、範囲、実行、type が完全です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-diagnostic-event-009
  - id: DiagnosticEvent-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 诊断事件边界例
      en: Boundary diagnostic event case
      ja: 診断イベントの境界例
    scenario_id: null
    descriptions:
      zh: message dm-7 是可反复显示的参数化诊断文本。
      en: message dm-7 is reusable parameterized diagnostic text.
      ja: message dm-7 は反復表示可能なパラメータ化診断文です。
    field_values: {}
    related_node_ids:
      - DiagnosticEvent
    related_relation_ids: []
    expected_result:
      zh: 这是 DiagnosticSignal 信息，不是事件。
      en: This is DiagnosticSignal information, not an event.
      ja: これは DiagnosticSignal 情報でイベントではありません。
    why_valid_or_invalid:
      zh: 消息内容没有一次发生所需的事件时间与执行作用域。
      en: Message content lacks occurrence time and execution scope.
      ja: message 内容には発生時刻と実行範囲がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-diagnostic-event-010
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-feedback-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 Google SRE 错误预算、告警层级与可重试/阻断故障分类逐项核验。
    en: Verified against Google SRE error budgets, alerting severity hierarchy, and retryable/blocking failure taxonomy.
    ja: Google SRE エラーバジェット、警報重大度階層、再試行/阻断故障分類に照らし確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-diagnostic-event-001
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry defines Event LogRecords with Timestamp, trace context, severity, body, attributes, and EventName; Moonweave uses this occurrence evidence to model DiagnosticEvent as a genus, but the data model does not define or assert that ontology class.
    locator: "Logs Data Model > Log and Event Record Definition; Field: EventName"
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-diagnostic-event-002
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry defines occurrence-level LogRecord fields but no universal event identifier. DiagnosticEvent.diagnostic_event_id is Moonweave's stable identity over one source occurrence.
    locator: Logs Data Model > Log and Event Record Definition
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-diagnostic-event-003
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry defines Timestamp as the time the event occurred at the source and separately defines ObservedTimestamp. DiagnosticEvent.occurred_at directly uses Timestamp semantics.
    locator: "Logs Data Model > Field: Timestamp; Field: ObservedTimestamp"
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-diagnostic-event-004
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry LogRecords carry TraceId and SpanId and are associated with Resource and InstrumentationScope. DiagnosticEvent.scope_ref is Moonweave's canonical reference to the smallest affected runtime boundary.
    locator: Logs Data Model > TraceId and SpanId; Resource; InstrumentationScope
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-diagnostic-event-005
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry trace context correlates LogRecords with distributed execution. DiagnosticEvent.execution_ref is Moonweave's ontology reference from that context to the containing execution occurrence.
    locator: Logs Data Model > TraceId and SpanId; Trace Context Fields
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-diagnostic-event-006
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry EventName identifies a class or type of Event and SHOULD uniquely identify that class. DiagnosticEvent.event_type directly uses that bounded classification role.
    locator: "Logs Data Model > Field: EventName"
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-diagnostic-event-007
    source: eng-observe-opentelemetry-logs
    supports: The OpenTelemetry Logs Data Model defines Body, Attributes, Severity, Resource, InstrumentationScope, Timestamp, and trace context as occurrence evidence. DiagnosticEvent.provenance_ref is Moonweave's immutable pointer to that complete record.
    locator: Logs Data Model > Log and Event Record Definition
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-diagnostic-event-008
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry separates Timestamp from ObservedTimestamp and binds an Event LogRecord to trace, Resource, scope, type, body, and attributes. DiagnosticEvent-one-source-occurrence is Moonweave's reviewed event-identity constraint over those fields.
    locator: Logs Data Model > Log and Event Record Definition; Timestamp and ObservedTimestamp; EventName
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-diagnostic-event-009
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry Event LogRecords carry Timestamp, trace context, EventName, body, and attributes; Moonweave uses those occurrence fields for DiagnosticEvent, a genus the data model does not define.
    locator: "Logs Data Model > Log and Event Record Definition; Field: EventName"
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-diagnostic-event-010
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry distinguishes EventName and occurrence-varying Attributes and Body within a LogRecord; Moonweave uses that data shape to keep an occurrence separate from reusable DiagnosticSignal content, but the ontology boundary is not asserted by the source.
    locator: "Logs Data Model > Field: Body; Field: Attributes; Field: EventName"
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
