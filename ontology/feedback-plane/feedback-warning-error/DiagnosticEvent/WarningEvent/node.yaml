      en: The object is a WarningEvent.
      ja: この対象は WarningEvent です。
    why_valid_or_invalid:
      zh: 有实际发生、警告内容和可继续状态。
      en: It has occurrence, warning content, and continuable status.
      ja: 実発生、警告内容、継続可能状態を持ちます。
