source_claims:
  - id: claim-warning-event-001
    source: eng-std-opentelemetry-recording-errors
    supports: OpenTelemetry leaves span status unset when an operation completes without error; Moonweave uses that boundary to model a non-failing diagnostic occurrence as WarningEvent, a class the source does not define.
    locator: Recording errors > Recording errors on spans
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-warning-event-002
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry defines occurrence time, trace context, severity, body, attributes, and EventName and treats a non-empty EventName as an Event; Moonweave specializes a non-error occurrence as WarningEvent, which the data model does not assert.
    locator: "Logs Data Model > Log and Event Record Definition; Field: EventName"
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-warning-event-003
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry defines EventName, Timestamp, severity, body, and attributes and permits non-erroneous records below ERROR; Moonweave maps one such occurrence to WarningEvent, a class the data model does not define.
    locator: "Logs Data Model > Log and Event Record Definition; Error Semantics; Field: EventName"
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-warning-event-004
    source: eng-std-opentelemetry-recording-errors
    supports: OpenTelemetry sets ERROR status on an unsuccessful operation; Moonweave uses this boundary to exclude a failed occurrence from WarningEvent, while the ontology distinction is not asserted by the source.
    locator: Recording errors > Recording errors on spans
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-warning-event-005
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry permits event records below ERROR severity with EventName, body, and attributes; Moonweave maps such a non-failing occurrence to WarningEvent under DiagnosticEvent, a hierarchy the data model does not define.
    locator: "Logs Data Model > Error Semantics; Field: Body; Field: Attributes; Field: EventName"
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-warning-event-006
    source: eng-std-opentelemetry-recording-errors
    supports: OpenTelemetry sets ERROR status for operations ending unsuccessfully; Moonweave uses that boundary to exclude failed occurrences from WarningEvent, while the ontology class split is not asserted by the source.
    locator: Recording errors > Recording errors on spans
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-warning-event-007
    source: eng-std-opentelemetry-recording-errors
    supports: OpenTelemetry leaves span status unset when an operation completes without errors; Moonweave uses that boundary to specialize a non-failing occurrence as WarningEvent, but the source does not define or assert this ontology hierarchy.
    locator: Recording errors > Recording errors on spans
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-warning-event-008
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry defines non-erroneous Event LogRecords with occurrence fields, body, attributes, severity, and EventName; Moonweave maps them to WarningEvent under DiagnosticEvent, while the data model does not define the class relation.
    locator: "Logs Data Model > Log and Event Record Definition; Error Semantics; Field: EventName"
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-warning-event-009
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry Event LogRecords carry EventName, body, attributes, severity, and occurrence context; Moonweave links one non-failing occurrence to Warning content, a raises relation the data model does not define.
    locator: "Logs Data Model > Field: Body; Field: Attributes; Field: EventName; Error Semantics"
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-warning-event-010
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry permits the same severity on many LogRecords and provides trace context, body, attributes, and EventName per occurrence; Moonweave therefore rejects a raises edge based on severity alone, a linkage rule the data model does not assert.
    locator: "Logs Data Model > Trace Context Fields; Field: SeverityNumber; Field: Body; Field: Attributes; Field: EventName"
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-warning-event-011
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry distinguishes occurrence fields, EventName, body, and attributes in an Event LogRecord; Moonweave models WarningEvent-raises-Warning between occurrence and reusable content, but the data model does not define or assert this relation.
    locator: "Logs Data Model > Log and Event Record Definition; Field: EventName"
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
