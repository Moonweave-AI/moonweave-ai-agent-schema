schema: moonweave.ai/ontology-node/v1
id: WarningEvent
kind: concept
status: accepted
labels:
  zh: 警告事件
  en: warning event
  ja: 警告イベント
semantics:
  short_definition:
    zh: 警告事件是产生警告信号但未使当前作用域失败的一次诊断事件。
    en: A warning event is a DiagnosticEvent that raises a warning without failing the current scope.
    ja: 警告イベントは現在範囲を失敗させず警告信号を発する DiagnosticEvent です。
  definition:
    zh: 警告事件是 DiagnosticEvent 的子类；它绑定发生时间、受影响执行和所产生 Warning，并明确当时状态仍可继续，区别于改变作用域为 failed 的 FailureEvent。
    en: A warning event is a DiagnosticEvent subtype binding occurrence time, affected execution, and raised Warning while stating the scope remained continuable, unlike FailureEvent that transitions the scope to failed.
    ja: 警告イベントは発生時刻、対象実行、発した Warning を結び当時継続可能とする DiagnosticEvent 下位型で、範囲を failed にする FailureEvent と異なります。
  why_needed:
    zh: 警告事件保留实际发生时刻，而 Warning 内容可被聚合或重复显示，两者不能合并。
    en: WarningEvent retains occurrence time while Warning content may be aggregated or displayed repeatedly, so they cannot be merged.
    ja: WarningEvent は発生時刻を保持し Warning 内容は集約・反復表示されるため統合できません。
  includes:
    - zh: 包括预算临界、降级提示、低置信升级建议或弃用接口使用事件。
      en: Includes budget-near-limit, degradation notice, low-confidence escalation, and deprecated-interface-use events.
      ja: 予算限界、縮退通知、低信頼昇格、非推奨 interface 使用イベントを含みます。
  excludes:
    - zh: 不包括已经使尝试失败的 ErrorEvent 或没有发生时间的 Warning 内容。
      en: Excludes ErrorEvent that failed an attempt and Warning content without occurrence time.
      ja: 試行を失敗させた ErrorEvent と発生時刻のない Warning 内容は含みません。
  semantic_kind: event
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
