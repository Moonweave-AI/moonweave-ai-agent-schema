schema: moonweave.ai/ontology-node/v1
id: RiskSignal
kind: concept
status: review
labels:
  zh: 风险信号
  en: risk signal
  ja: リスク信号
semantics:
  short_definition:
    zh: 风险信号是关于潜在不利事件概率、影响和暴露对象的诊断信号。
    en: A risk signal is a DiagnosticSignal about probability, impact, and exposure of a potential adverse event.
    ja: リスク信号は潜在的不利事象の確率、影響、曝露対象に関する DiagnosticSignal です。
  definition:
    zh: 风险信号是 DiagnosticSignal 的子类；其身份由风险类型、暴露对象、触发证据、可能性、影响、时间范围和建议控制确定，它表示尚未必然发生的风险而不是已发生 ErrorEvent。
    en: A risk signal is a DiagnosticSignal subtype identified by risk type, exposed subject, trigger evidence, likelihood, impact, time horizon, and recommended control; it represents a potential harm rather than an already occurred ErrorEvent.
    ja: リスク信号はリスク型、曝露対象、起動証拠、可能性、影響、時間範囲、推奨制御で同一性が決まる DiagnosticSignal 下位型で、発生済み ErrorEvent でなく潜在害を表します。
  why_needed:
    zh: 潜在风险与实际失败分开，才能在工具调用前阻断或要求审批，而不伪造错误发生。
    en: Separating potential risk from actual failure enables prevention or approval before a tool call without fabricating an error occurrence.
    ja: 潜在リスクと実失敗を分け、ツール呼出し前に阻止・承認要求しエラー発生を捏造しません。
  includes:
    - zh: 包括提示注入风险、数据外泄风险、不可逆工具副作用风险和高权限调用风险。
      en: Includes prompt-injection, data-exfiltration, irreversible side-effect, and privileged-call risks.
      ja: prompt injection、data exfiltration、不可逆副作用、高権限呼出しリスクを含みます。
  excludes:
    - zh: 不包括实际发生的 ErrorEvent 或已作出的 PolicyDecision。
      en: Excludes an occurred ErrorEvent and an already made PolicyDecision.
      ja: 発生済み ErrorEvent と既決 PolicyDecision は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
