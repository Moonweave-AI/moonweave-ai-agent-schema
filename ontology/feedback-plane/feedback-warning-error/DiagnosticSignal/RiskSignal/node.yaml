          en: Assert only when the evaluation input snapshot contains the same RiskSignal identity, assessment time, subject reference, and evidence digest and is fixed before the decision is produced; a label added afterward is insufficient.
          ja: evaluation input snapshot が同一 RiskSignal identity・assessment time・subject reference・evidence digest を含み decision 生成前に固定された場合のみ成立し、事後 label は不十分です。
