      en: informs policy evaluation
      ja: ポリシー評価に情報を提供
    definitions:
      zh: RiskSignal 为一次已识别的 PolicyEvaluation 提供带时间与主体范围的风险输入；评估仍须结合 AuthorizationRequest 和固定 PolicySpecification 产生自己的 PolicyDecision，信号本身不是决定。
      en: RiskSignal informs an identified PolicyEvaluation with time- and subject-scoped risk input; the evaluation still combines its AuthorizationRequest and fixed PolicySpecification to produce its own PolicyDecision, and the signal is not the decision.
      ja: RiskSignal は identified PolicyEvaluation に time/subject-scoped risk input を提供し evaluation は AuthorizationRequest と fixed PolicySpecification を組み合わせて独自 PolicyDecision を生成し signal 自体は decision ではありません。
