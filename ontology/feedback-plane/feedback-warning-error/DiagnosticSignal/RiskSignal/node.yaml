relations:
  - id: RiskSignal-about-ToolCallAttempt
    predicate: about
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 关于工具调用尝试
      en: is about tool-call attempt
      ja: ツール呼出し試行について
    definitions:
      zh: RiskSignal 指向被评估的同一个 ToolCallAttempt，并保留 attempt 标识、评估时间、风险类型与证据快照；该信息关系不声称风险改变、阻止或终止了尝试。
      en: RiskSignal is about the same ToolCallAttempt that was assessed and retains attempt identity, assessment time, risk type, and evidence snapshot; this information relation does not claim that risk changed, blocked, or terminated the attempt.
      ja: RiskSignal は assessed と同一 ToolCallAttempt を指し attempt identity・assessment time・risk type・evidence snapshot を保持し、risk が attempt を変更・block・terminate したとは主張しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该事实数量取决于运行中可核验的实例，不强加跨系统统一基数。
      en: The count depends on verifiable instances in a run, so no universal cross-system cardinality is imposed.
      ja: fact 数は run 内の検証可能 instance に依存し cross-system 共通 cardinality は課しません。
    inverse_reading:
      predicate: is_target_of_about
      labels:
        zh: 反向：关于工具调用尝试
        en: "inverse: is about tool-call attempt"
        ja: 逆方向：ツール呼出し試行について
