      en: Positive risk signal case
      ja: リスク信号の正例
    scenario_id: null
    descriptions:
      zh: risk rs-5 标记 tool-call delete_all 具有不可逆副作用，likelihood=medium、impact=critical，并建议人工批准。
      en: risk rs-5 flags irreversible side effects for tool-call delete_all with likelihood medium, impact critical, and human-approval control.
      ja: risk rs-5 は tool-call delete_all の不可逆副作用を likelihood=medium、impact=critical、human approval 推奨で示します。
    field_values:
      signal_id: risk-signal/rs-5
      signal_type: risk
      source_ref: risk-assessment/delete-all-call@2
      observed_at: 2026-07-16T15:21:18.000Z
      affected_subject_ref: tool-call/delete-all/proposed-17
      signal_value:
        risk_type: irreversible-side-effect
        likelihood: medium
        impact: critical
        recommended_control: human-approval
      validity_scope:
        subject_version: tool-call/delete-all/proposed-17
