      zh: 该对象是 RiskSignal。
      en: The object is a RiskSignal.
      ja: この対象は RiskSignal です。
    why_valid_or_invalid:
      zh: 风险类型、暴露对象、证据、可能性、影响和控制完整。
      en: Risk type, exposed subject, evidence, likelihood, impact, and control are complete.
      ja: リスク型、曝露対象、証拠、可能性、影響、制御が完全です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-risk-signal-002
  - id: RiskSignal-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 风险信号边界例
      en: Boundary risk signal case
      ja: リスク信号の境界例
    scenario_id: null
    descriptions:
      zh: err-55 记录删除调用已经失败并返回 permission_denied。
      en: err-55 records that the delete call already failed with permission_denied.
      ja: err-55 は delete 呼出しが permission_denied で既に失敗したと記録します。
    field_values: {}
