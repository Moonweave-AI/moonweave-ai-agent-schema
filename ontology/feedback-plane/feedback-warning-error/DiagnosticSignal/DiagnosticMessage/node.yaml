source_claims:
  - id: claim-diagnostic-message-001
    source: eng-std-opentelemetry-error-attributes
    supports: OpenTelemetry defines predictable low-cardinality error.type and warns that human-readable error.message has unbounded cardinality; Moonweave uses that distinction to separate bounded message_code from parameterized text, but the source does not define DiagnosticMessage.
    locator: Error Attributes > error.type; Deprecated Error Attributes > error.message
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-diagnostic-message-002
    source: eng-std-opentelemetry-exception-attributes
    supports: OpenTelemetry defines exception.message as human-readable exception detail; Moonweave reuses that field-level distinction when modeling explanatory message content, while the ontology class remains a design inference the registry does not assert.
    locator: Exception Attributes > exception.message
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-diagnostic-message-003
    source: eng-std-opentelemetry-error-attributes
    supports: OpenTelemetry defines error.type as a predictable low-cardinality class-of-error value; Moonweave maps message_code to the same bounded-code discipline, but the registry does not define DiagnosticMessage.
    locator: Error Attributes > error.type
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-diagnostic-message-004
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluator outputs may carry numeric scores and reasoning; Moonweave uses that evidence to keep a numeric ConfidenceSignal outside DiagnosticMessage, a class boundary the source does not define.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-diagnostic-message-005
    source: eng-std-opentelemetry-exception-attributes
    supports: OpenTelemetry defines exception.message as human-readable detail for one exception; Moonweave uses that content evidence for DiagnosticMessage while keeping the occurrence identity separate, a class hierarchy the registry does not define.
    locator: Exception Attributes > exception.message
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-diagnostic-message-006
    source: eng-std-opentelemetry-exception-attributes
    supports: OpenTelemetry exception.message is one attribute of an exception associated with a span or log; Moonweave therefore does not equate the message value with ErrorEvent identity, an ontology distinction the registry does not assert.
    locator: Exception Attributes > exception.message
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-diagnostic-message-007
    source: eng-std-opentelemetry-exception-attributes
    supports: OpenTelemetry defines exception.message as human-readable exception detail; Moonweave treats reusable explanatory content as DiagnosticMessage under DiagnosticSignal, but the registry does not define or assert that ontology hierarchy.
    locator: Exception Attributes > exception.message
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-diagnostic-message-008
    source: eng-std-opentelemetry-error-attributes
    supports: OpenTelemetry distinguishes predictable error.type from deprecated, unbounded error.message; Moonweave uses that distinction to model bounded codes plus message content, while the source does not define the DiagnosticMessage hierarchy.
    locator: Error Attributes > error.type; Deprecated Error Attributes > error.message
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
