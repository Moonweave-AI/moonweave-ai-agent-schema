schema: moonweave.ai/ontology-node/v1
id: DiagnosticMessage
kind: concept
status: review
labels:
  zh: 诊断消息
  en: diagnostic message
  ja: 診断メッセージ
semantics:
  short_definition:
    zh: 诊断消息是以人类可读说明和机器可读代码解释状况的诊断信号。
    en: A diagnostic message is a DiagnosticSignal explaining a condition with human-readable text and machine-readable code.
    ja: 診断メッセージは人間可読説明と機械可読コードで状態を説明する DiagnosticSignal です。
  definition:
    zh: 诊断消息是 DiagnosticSignal 的子类；它必须包含稳定 message_code、参数化文本、语言和来源引用，错误类型应保持低基数，区别于仅有数值的 ConfidenceSignal。
    en: A diagnostic message is a DiagnosticSignal subtype requiring a stable message_code, parameterized text, locale, and source reference; error type remains low-cardinality, unlike a numeric-only ConfidenceSignal.
    ja: 診断メッセージは安定 message_code、パラメータ化文、言語、出所参照を要する DiagnosticSignal 下位型で、error type は低 cardinality を保ち数値のみ ConfidenceSignal と異なります。
  why_needed:
    zh: 稳定代码与参数化文本支持聚合和本地化，并避免把高基数自由文本当作错误类别。
    en: Stable codes and parameterized text support aggregation and localization without treating high-cardinality prose as error type.
    ja: 安定コードとパラメータ化文で集約・ローカライズし高 cardinality 自由文を error type と誤認しません。
  includes:
    - zh: 包括验证错误说明、工具超时消息、策略拒绝解释或恢复建议。
      en: Includes validation explanations, tool-timeout messages, policy-denial explanations, and recovery hints.
      ja: 検証エラー説明、ツール timeout message、方針拒否説明、復旧ヒントを含みます。
  excludes:
    - zh: 不包括原始堆栈全文作为 error.type，也不包括没有文本语义的置信度数值。
      en: Excludes raw full stack text used as error.type and confidence values without message semantics.
      ja: 生 stack 全文を error.type とするものと text 意味のない信頼値は含みません。
  semantic_kind: information
  aliases: []
