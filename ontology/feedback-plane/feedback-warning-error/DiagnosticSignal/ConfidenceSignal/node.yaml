    source: eng-fw-langsmith-docs
    supports: LangSmith evaluator feedback may include scores and reasoning; Moonweave separately models confidence only when it qualifies a judgment with explicit scale and calibration.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-confidence-signal-002
    source: eng-fw-langsmith-docs
    supports: Evaluation judgments can carry scores and reasoning; confidence must be explicitly distinguished from the judged quality value.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-confidence-signal-003
    source: eng-fw-langsmith-docs
    supports: Evaluator score and confidence in that score are separate semantic quantities.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-confidence-signal-004
    source: eng-std-opentelemetry-metrics-api
    supports: OpenTelemetry defines a Measurement as a value reported to the SDK; Moonweave requires additional calibration context before treating such a value as ConfidenceSignal under DiagnosticSignal, a hierarchy the API does not define.
    locator: Metrics API > Measurement; Metrics Data Model > Metric streams and points
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-confidence-signal-005
    source: eng-std-opentelemetry-metrics-data-model
    supports: OpenTelemetry Metric stream identity includes the metric name, aggregation, attribute keys, and unit, so a numeric range alone does not determine meaning; Moonweave therefore does not infer ConfidenceSignal from a score without calibration context.
    locator: Metrics Data Model > Metric Streams; Metric Points
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-confidence-signal-006
    source: eng-std-opentelemetry-metrics-api
    supports: OpenTelemetry defines Measurement as a reported value; Moonweave uses value plus explicit calibration context to specialize DiagnosticSignal as ConfidenceSignal, but the API does not define or assert that ontology hierarchy.
    locator: Metrics API > Measurement
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-confidence-signal-007
    source: eng-std-opentelemetry-metrics-data-model
    supports: OpenTelemetry defines Metric streams and points with identifying properties and attributes; Moonweave uses those semantics to prevent uncalibrated numeric values from becoming ConfidenceSignal, while the source does not define the class relation.
    locator: Metrics Data Model > Overview; Metric Streams; Metric Points
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-confidence-signal-008
    source: eng-fw-langsmith-docs
    supports: Evaluator score plus explanation can qualify confidence in a concrete review finding.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-confidence-signal-009
    source: eng-fw-langsmith-docs
    supports: Evaluation outputs are bound to the specific example or run they evaluate.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-confidence-signal-010
    source: eng-fw-langsmith-docs
    supports: LangSmith evaluators may output scores and explanations for reviewed results; ConfidenceSignal-qualifies-ReviewFinding records calibrated reliability separately from the finding.
    locator: Evaluation concepts > Evaluators, evaluator outputs, datasets, and experiments
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
