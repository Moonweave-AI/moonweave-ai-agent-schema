    related_relation_ids: []
    expected_result:
      zh: 该对象是 ConfidenceSignal。
      en: The object is a ConfidenceSignal.
      ja: この対象は ConfidenceSignal です。
    why_valid_or_invalid:
      zh: 被限定判断、尺度、值和校准方法完整。
      en: Qualified judgment, scale, value, and calibration method are complete.
      ja: 対象判断、尺度、値、校正法が完全です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-confidence-signal-002
  - id: ConfidenceSignal-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 置信信号边界例
      en: Boundary confidence signal case
      ja: 信頼度信号の境界例
    scenario_id: null
    descriptions:
      zh: score groundedness=0.82 是按量规评出的质量结果，没有置信尺度。
      en: score groundedness=0.82 is a quality result under a rubric with no confidence scale.
      ja: score groundedness=0.82 は rubric による品質結果で信頼尺度がありません。
    field_values: {}
    related_node_ids:
      - ConfidenceSignal
    related_relation_ids: []
    expected_result:
