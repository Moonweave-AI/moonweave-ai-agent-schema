      zh: confidence cs-4 对 finding rf-2 给出 calibrated_probability=0.82、method=temperature-scale-v3。
      en: confidence cs-4 gives calibrated_probability=0.82 for finding rf-2 with method temperature-scale-v3.
      ja: confidence cs-4 は finding rf-2 に calibrated_probability=0.82、method=temperature-scale-v3 を示します。
    field_values:
      signal_id: confidence-signal/cs-4
      signal_type: confidence
      source_ref: evaluator-run/temperature-scale-v3/cs-4
      observed_at: 2026-07-16T13:58:04.000Z
      affected_subject_ref: review-finding/rf-2@1
      signal_value:
        value: 0.82
        scale: calibrated-probability
        calibration_method: temperature-scale@3
