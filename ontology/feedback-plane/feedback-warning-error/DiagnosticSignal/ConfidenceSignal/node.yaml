schema: moonweave.ai/ontology-node/v1
id: ConfidenceSignal
kind: concept
status: accepted
labels:
  zh: 置信信号
  en: confidence signal
  ja: 信頼度信号
semantics:
  short_definition:
    zh: 置信信号是量化某项判断在明确尺度上确定程度的诊断信号。
    en: A confidence signal is a DiagnosticSignal quantifying certainty of a judgment on an explicit scale.
    ja: 信頼度信号は明示尺度上で判断確実性を量化する DiagnosticSignal です。
  definition:
    zh: 置信信号是 DiagnosticSignal 的子类；其身份由被限定判断、数值或区间、尺度、校准方法和生成者确定，它限定 ReviewFinding 而不代替发现的证据与结论。
    en: A confidence signal is a DiagnosticSignal subtype identified by qualified judgment, value or interval, scale, calibration method, and producer; it qualifies a ReviewFinding without replacing its evidence and conclusion.
    ja: 信頼度信号は対象判断、値・区間、尺度、校正法、生成者で同一性が決まる DiagnosticSignal 下位型で、ReviewFinding を限定し証拠・結論を置換しません。
  why_needed:
    zh: 明确尺度和校准可区分 0.8 的概率、评分或任意自报置信，并支持低置信升级。
    en: Explicit scale and calibration distinguish probability, score, and arbitrary self-report at 0.8 and support low-confidence escalation.
    ja: 尺度と校正を明示し 0.8 の確率、score、任意自己報告を区別し低信頼昇格を支援します。
  includes:
    - zh: 包括校准概率、置信区间、模型裁判确定度或人类审查者确信等级。
      en: Includes calibrated probability, confidence interval, model-judge certainty, and human reviewer confidence level.
      ja: 校正確率、信頼区間、model judge 確実度、人手審査者信頼水準を含みます。
  excludes:
    - zh: 不包括没有尺度的形容词或作为质量判定结果的 Score。
      en: Excludes adjectives without a scale and a Score used as quality judgment.
      ja: 尺度のない形容詞と品質判断結果 Score は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
