      ja: これは Score で ConfidenceSignal ではありません。
    why_valid_or_invalid:
      zh: 质量分数与对判断确定度的元判断不同。
      en: A quality score differs from a meta-judgment about certainty.
      ja: 品質 score と判断確実性のメタ判断は異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-confidence-signal-003
