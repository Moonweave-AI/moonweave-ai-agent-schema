schema: moonweave.ai/ontology-node/v1
id: DiagnosticSignal
kind: concept
status: accepted
labels:
  zh: 诊断信号
  en: diagnostic signal
  ja: 診断信号
semantics:
  short_definition:
    zh: 诊断信号是描述运行健康、风险或判断置信度的带上下文信息。
    en: A diagnostic signal is contextual information about runtime health, risk, or judgment confidence.
    ja: 診断信号は実行健全性、リスク、判断信頼度に関する文脈付き情報です。
  definition:
    zh: 诊断信号是一种信息实体；其身份由 signal_id、信号类型、来源事件或记录、时间、作用对象、严重度或置信值和有效范围确定，区别于信号产生时发生的 DiagnosticEvent。
    en: A diagnostic signal is an information entity identified by signal_id, signal type, source event or record, time, affected subject, severity or confidence value, and validity scope, unlike the DiagnosticEvent occurrence that emitted it.
    ja: 診断信号は signal_id、信号型、出所イベント・記録、時刻、対象、重大度・信頼値、有効範囲で同一性が決まる情報实体で、それを発した DiagnosticEvent と異なります。
  why_needed:
    zh: 把信号内容与事件分开可使同一警告被多次投递、聚合或引用，同时保留发生出处。
    en: Separating signal content from event occurrence lets one warning be delivered, aggregated, or cited repeatedly while retaining provenance.
    ja: 信号内容とイベント発生を分け、一つの警告を複数配信・集約・引用しつつ出所を保持できます。
  includes:
    - zh: 包括诊断消息、警告、风险信号和置信信号。
      en: Includes diagnostic messages, warnings, risk signals, and confidence signals.
      ja: 診断メッセージ、警告、リスク信号、信頼度信号を含みます。
  excludes:
    - zh: 不包括 ErrorEvent、WarningEvent 等发生记录，也不包括可复用 FailureMode 分类。
      en: Excludes ErrorEvent and WarningEvent occurrences and reusable FailureMode classifications.
      ja: ErrorEvent・WarningEvent 発生記録と再利用 FailureMode 分類は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - signal_id
  fields:
    - id: signal_id
      labels:
        zh: 诊断信号标识
        en: diagnostic-signal ID
        ja: 診断信号 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一条可独立保存、引用、失效或取代的诊断信息；它不复用产生该信息的事件标识。
        en: Stably identifies one diagnostic information item that can be independently stored, cited, invalidated, or superseded; it does not reuse the emitting event ID.
        ja: 独立保存・引用・失効・置換できる一つの診断情報を安定識別し、生成 event ID を再利用しません。
      allowed_values: []
      pattern: null
      example_value: diagnostic-signal/ds-8
      source_claims:
        - claim-diagnostic-signal-002
    - id: signal_type
      labels:
        zh: 信号类型
        en: signal type
        ja: 信号 type
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明信息是置信、风险、警告、诊断消息或其他受治理类型；类型用于解释值而不表示事件已失败。
        en: Declares whether the information is confidence, risk, warning, diagnostic-message, or another governed type; the type interprets the value without asserting event failure.
        ja: 情報が confidence・risk・warning・diagnostic-message その他の統制型かを宣言し、値を解釈しますが event failure は断言しません。
      allowed_values: []
      pattern: null
      example_value: diagnostic-message
      source_claims:
        - claim-diagnostic-signal-003
    - id: source_ref
      labels:
        zh: 来源记录引用
        en: source-record reference
        ja: 出所記録参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用直接生成或观测该信号的不可变事件、日志、测量或审查证据版本，不以主题相似代替出处。
        en: References the immutable event, log, measurement, or review-evidence version that directly produced or observed the signal; topical similarity is not provenance.
        ja: 信号を直接生成・観測した不変 event・log・measurement・review evidence 版を参照し、topic 類似で出所を代替しません。
      allowed_values: []
      pattern: null
      example_value: error-event/err-31
      source_claims:
        - claim-diagnostic-signal-004
    - id: observed_at
      labels:
        zh: 观测时间
        en: observed at
        ja: 観測時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 收集或推导组件取得该信号的 UTC 时间；它与源事件实际发生时间严格区分。
        en: UTC instant when a collection or derivation component obtained the signal, explicitly distinct from the source event's occurrence time.
        ja: collection・derivation component が信号を取得した UTC 時刻で、source event の発生時刻と明確に区別します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T14:30:02.140Z
      source_claims:
        - claim-diagnostic-signal-005
    - id: affected_subject_ref
      labels:
        zh: 受影响对象引用
        en: affected-subject reference
        ja: 影響対象参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该诊断值所限定的最小对象版本或执行范围，如一次尝试、调用、产物或评审发现。
        en: References the smallest subject version or execution scope qualified by the diagnostic value, such as an attempt, call, artifact, or review finding.
        ja: diagnostic value が限定する最小の対象版・実行範囲（attempt・call・artifact・review finding 等）を参照します。
      allowed_values: []
      pattern: null
      example_value: run-attempt/attempt-3
      source_claims:
        - claim-diagnostic-signal-006
    - id: signal_value
      labels:
        zh: 信号值
        en: signal value
        ja: 信号値
      datatype: structured-value
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存与 signal_type 一致的消息、等级、数值、区间或风险结构，并保留单位或尺度；不得将解释文本当作唯一数值。
        en: Stores a message, level, number, interval, or risk structure consistent with signal_type and preserves unit or scale; explanatory prose alone cannot stand in for a numeric value.
        ja: signal_type に整合する message・level・number・interval・risk structure と unit・scale を保持し、説明文だけで数値を代替しません。
      allowed_values: []
      pattern: null
      example_value:
        severity: error
        message_ref: diagnostic-message/dm-7
      source_claims:
        - claim-diagnostic-signal-007
    - id: validity_scope
      labels:
        zh: 有效范围
        en: validity scope
        ja: 有効範囲
      datatype: structured-value
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明该信号可用于哪些对象版本、执行阶段和时间区间，以及何种新证据会使其失效。
        en: Declares the subject versions, execution phases, and time interval for which the signal is valid and which new evidence invalidates it.
        ja: 信号が有効な対象版・実行 phase・時間区間と、どの新証拠で失効するかを宣言します。
      allowed_values: []
      pattern: null
      example_value:
        subject_version: run-attempt/attempt-3
        until: attempt-terminal-or-superseded
      source_claims:
        - claim-diagnostic-signal-008
  constraints:
    - id: diagnostic-signal-source-bound-information-not-occurrence
      severity: error
      expression_language: plain
      expression: one DiagnosticSignal has one immutable source reference, one affected subject and validity scope, and an observation time; it does not by itself assert that a DiagnosticEvent or failure occurred
      explanations:
        zh: 一个诊断信号绑定一个不可变来源、一个受影响对象及有效范围和观测时间；它本身不证明诊断事件或失败已发生。
        en: One diagnostic signal binds one immutable source, affected subject, validity scope, and observation time; it does not itself prove that a diagnostic event or failure occurred.
        ja: 一つの diagnostic signal は一つの不変出所・影響対象・有効範囲・観測時刻を結び、diagnostic event や failure 発生を単独では証明しません。
      source_claims:
        - claim-diagnostic-signal-009
  required_relation_constraints: []
examples:
  - id: DiagnosticSignal-example-positive-manual-001
    kind: positive
    labels:
      zh: 诊断信号正例
      en: Positive diagnostic signal case
      ja: 診断信号の正例
    scenario_id: null
    descriptions:
      zh: signal ds-8 记录 source_event=err-31、subject=attempt-3、severity=error、valid_until 和消息引用。
      en: signal ds-8 records source_event=err-31, subject=attempt-3, severity=error, validity, and message reference.
      ja: signal ds-8 は source_event=err-31、subject=attempt-3、severity=error、有効期間、message 参照を記録します。
    field_values:
      signal_id: diagnostic-signal/ds-8
      signal_type: diagnostic-message
      source_ref: error-event/err-31
      observed_at: 2026-07-16T14:30:02.140Z
      affected_subject_ref: run-attempt/attempt-3
      signal_value:
        severity: error
        message_ref: diagnostic-message/dm-7
      validity_scope:
        subject_version: run-attempt/attempt-3
        until: attempt-terminal-or-superseded
    related_node_ids:
      - DiagnosticSignal
    related_relation_ids: []
    expected_result:
      zh: 该对象是 DiagnosticSignal。
      en: The object is a DiagnosticSignal.
      ja: この対象は DiagnosticSignal です。
    why_valid_or_invalid:
      zh: 信号身份、来源、对象、值和有效范围完整。
      en: Signal identity, source, subject, value, and validity are complete.
      ja: 信号 ID、出所、対象、値、有効範囲が完全です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-diagnostic-signal-010
  - id: DiagnosticSignal-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 诊断信号边界例
      en: Boundary diagnostic signal case
      ja: 診断信号の境界例
    scenario_id: null
    descriptions:
      zh: err-31 记录异常在 14:30:02 实际发生并终止尝试。
      en: err-31 records that an exception occurred at 14:30:02 and terminated an attempt.
      ja: err-31 は 14:30:02 の例外発生と試行終了を記録します。
    field_values: {}
    related_node_ids:
      - DiagnosticSignal
    related_relation_ids: []
    expected_result:
      zh: 这是 ErrorEvent，不是 DiagnosticSignal 内容。
      en: This is an ErrorEvent, not DiagnosticSignal content.
      ja: これは ErrorEvent で DiagnosticSignal 内容ではありません。
    why_valid_or_invalid:
      zh: 发生身份与可持久引用的诊断信息身份不同。
      en: Occurrence identity differs from persistent diagnostic-information identity.
      ja: 発生同一性と持続参照可能な診断情報同一性は異なります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-diagnostic-signal-011
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-feedback-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 Google SRE 错误预算、告警层级与可重试/阻断故障分类逐项核验。
    en: Verified against Google SRE error budgets, alerting severity hierarchy, and retryable/blocking failure taxonomy.
    ja: Google SRE エラーバジェット、警報重大度階層、再試行/阻断故障分類に照らし確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-diagnostic-signal-001
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry defines LogRecord occurrence fields, body, attributes, trace context, severity, and EventName; Moonweave models reusable diagnostic information as DiagnosticSignal apart from its emitting occurrence, and the data model does not assert that class split.
    locator: Logs Data Model > Log and Event Record Definition
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-diagnostic-signal-002
    source: eng-observe-opentelemetry-logs
    supports: The OpenTelemetry Logs Data Model defines occurrence context but no universal LogRecord or diagnostic-information identifier. DiagnosticSignal.signal_id is Moonweave's stable identity for a reusable information item distinct from its source occurrence.
    locator: Logs Data Model > Log and Event Record Definition
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-diagnostic-signal-003
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry EventName identifies a class or type of event and severity supplies diagnostic class context. DiagnosticSignal.signal_type is Moonweave's information-level discriminator and is not an EventName field alias.
    locator: "Logs Data Model > Field: EventName; Severity Fields"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-diagnostic-signal-004
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry LogRecords preserve trace context, Resource, InstrumentationScope, body, and attributes as source context. DiagnosticSignal.source_ref is Moonweave's explicit provenance pointer to the exact source record.
    locator: Logs Data Model > Log and Event Record Definition; TraceId and SpanId; Resource and InstrumentationScope
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-diagnostic-signal-005
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry defines ObservedTimestamp as the time an event was observed and Timestamp as source occurrence time. DiagnosticSignal.observed_at directly uses the observation side of that distinction.
    locator: "Logs Data Model > Field: Timestamp; Field: ObservedTimestamp"
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-diagnostic-signal-006
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry uses Resource and trace/span context to identify the entity and execution context associated with a LogRecord. DiagnosticSignal.affected_subject_ref is Moonweave's canonical reference to the smallest qualified subject.
    locator: Logs Data Model > Resource; TraceId and SpanId; InstrumentationScope
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-diagnostic-signal-007
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry LogRecords carry Body, SeverityNumber, SeverityText, and Attributes. DiagnosticSignal.signal_value is Moonweave's structured information value over those exact diagnostic payload elements.
    locator: "Logs Data Model > Field: Body; Severity Fields; Field: Attributes"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-diagnostic-signal-008
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry bounds LogRecord interpretation with Resource, InstrumentationScope, trace context, and timestamps but does not define diagnostic validity. DiagnosticSignal.validity_scope is Moonweave's explicit inference boundary over that context.
    locator: Logs Data Model > Resource; InstrumentationScope; Timestamp; TraceId and SpanId
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-diagnostic-signal-009
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry separates event occurrence time, observation time, context, and payload fields. DiagnosticSignal-source-bound-information-not-occurrence is Moonweave's reviewed ontology boundary between persistent diagnostic information and an event occurrence.
    locator: Logs Data Model > Log and Event Record Definition; Timestamp and ObservedTimestamp
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-diagnostic-signal-010
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry LogRecord carries Timestamp, trace context, severity, body, attributes, and EventName; Moonweave interprets such contextual diagnostic information as DiagnosticSignal, a class the data model does not define.
    locator: Logs Data Model > Log and Event Record Definition
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-diagnostic-signal-011
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry distinguishes a LogRecord body and attributes from EventName and occurrence fields; Moonweave uses that representational distinction to reject an occurrence-only record as DiagnosticSignal, but the source does not define this ontology boundary.
    locator: "Logs Data Model > Field: Body; Field: Attributes; Field: EventName"
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
