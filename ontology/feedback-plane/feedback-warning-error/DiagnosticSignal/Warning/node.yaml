      labels:
        zh: 警告代码
        en: Warning code
        ja: 警告コード
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        en: captures warning code as a string scalar on agent-system artifacts, resources, events, policies, or adapter records.
        zh: 该数据字段记录对应的标量值，用于智能体系统中的产物、资源、事件、策略或适配记录。
        ja: このデータ項目は対応するスカラー値を記録し、エージェントシステム内の成果物、資源、イベント、ポリシー、適配記録で使います。
      allowed_values: []
      pattern: null
      example_value: W_RETRY
      source_claims:
        - claim-warning-003
  constraints: []
  required_relation_constraints: []
