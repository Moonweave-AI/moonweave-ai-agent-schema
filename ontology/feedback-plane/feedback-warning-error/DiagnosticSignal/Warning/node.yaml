schema: moonweave.ai/ontology-node/v1
id: Warning
kind: concept
status: review
labels:
  zh: 警告信号
  en: warning signal
  ja: 警告信号
semantics:
  short_definition:
    zh: 警告信号是提示异常或风险但尚未使当前作用域失败的诊断信号。
    en: A warning signal is a DiagnosticSignal reporting anomaly or risk that has not failed the current scope.
    ja: 警告信号は現在範囲を失敗させていない異常・リスクを示す DiagnosticSignal です。
  definition:
    zh: 警告信号是 DiagnosticSignal 的子类；它声明 warning_code、受影响对象、风险说明、建议动作和升级条件，同时明确当前操作仍可继续，区别于 ErrorEvent 所记录的失败发生。
    en: A warning signal is a DiagnosticSignal subtype declaring warning_code, affected subject, risk explanation, recommended action, and escalation condition while stating that the current operation may continue, unlike a failure occurrence recorded by ErrorEvent.
    ja: 警告信号は warning_code、対象、リスク説明、推奨行動、昇格条件を示し現在操作は継続可能とする DiagnosticSignal 下位型で、ErrorEvent の失敗発生と異なります。
  why_needed:
    zh: 警告与错误分开能避免非阻断异常被计为失败，并允许在阈值满足时升级。
    en: Separating warning from error prevents non-blocking anomalies from counting as failures and allows escalation when thresholds are met.
    ja: 警告とエラーを分け非阻断異常を失敗計上せず閾値時に昇格できます。
  includes:
    - zh: 包括接近预算上限、低置信回答、弃用接口或可恢复数据缺失提示。
      en: Includes near-budget limit, low-confidence response, deprecated interface, and recoverable missing-data notices.
      ja: 予算上限接近、低信頼回答、非推奨 interface、回復可能欠測通知を含みます。
  excludes:
    - zh: 不包括已经终止 RunAttempt 的 ErrorEvent 或只定义故障类别的 FailureMode。
      en: Excludes an ErrorEvent that terminated a RunAttempt and a FailureMode that only defines a failure class.
      ja: RunAttempt を終了した ErrorEvent と故障分類のみの FailureMode は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
