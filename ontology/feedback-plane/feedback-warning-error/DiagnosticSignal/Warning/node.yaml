source_claims:
  - id: claim-warning-001
    source: eng-std-opentelemetry-recording-errors
    supports: OpenTelemetry leaves span status unset for operations ending without errors; Moonweave uses that negative boundary for actionable non-failure Warning information, but the source does not define or assert this class.
    locator: Recording errors > Recording errors on spans
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-warning-002
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry defines WARN severity numbers below ERROR and allows body and attributes to carry event detail; Moonweave interprets those fields as Warning content, an ontology identity the data model does not define.
    locator: "Logs Data Model > SeverityNumber ranges; Error Semantics; Field: Body; Field: Attributes"
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-warning-003
    source: eng-observe-opentelemetry-logs
    supports: The OpenTelemetry Logs Data Model defines the WARN severity range as a warning event that is not an error and defines EventName as identifying an event class or type. warning_code is Moonweave's stable string code for that diagnostic class; OpenTelemetry does not prescribe the field name or code vocabulary.
    locator: "Logs Data Model > Severity Fields > WARN range; Log and Event Record Definition > Field: EventName"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-warning-004
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry reserves log severity numbers 13-16 for WARN and describes values below ERROR as non-erroneous; Moonweave maps an actionable non-failure record to Warning, a class the data model does not define.
    locator: Logs Data Model > SeverityNumber ranges; Error Semantics
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-warning-005
    source: eng-std-opentelemetry-recording-errors
    supports: OpenTelemetry sets ERROR status when an operation ends with an error; Moonweave uses that boundary to exclude an actual failed occurrence from Warning, while the source does not define the Warning class.
    locator: Recording errors > Recording errors on spans
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-warning-006
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry defines WARN severity below ERROR and permits body and attributes on a non-erroneous LogRecord; Moonweave maps that non-failing diagnostic information to Warning under DiagnosticSignal, a hierarchy the source does not define.
    locator: "Logs Data Model > SeverityNumber ranges; Error Semantics; Field: Body; Field: Attributes"
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-warning-007
    source: eng-std-opentelemetry-recording-errors
    supports: OpenTelemetry recommends ERROR status when an operation ends with an error; Moonweave uses that boundary to exclude failure occurrences from Warning, while the ontology hierarchy is not asserted by the source.
    locator: Recording errors > Recording errors on spans
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-warning-008
    source: eng-std-opentelemetry-recording-errors
    supports: OpenTelemetry leaves status unset when an operation ends without error and sets ERROR on unsuccessful operations; Moonweave uses that boundary for non-failing Warning information, but the source does not define or assert the Warning hierarchy.
    locator: Recording errors > Recording errors on spans
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-warning-009
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry defines WARN severity values, body, and attributes for diagnostic records below ERROR; Moonweave specializes such information as Warning under DiagnosticSignal, while the data model does not define the ontology hierarchy.
    locator: "Logs Data Model > SeverityNumber ranges; Error Semantics; Field: Body; Field: Attributes"
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
