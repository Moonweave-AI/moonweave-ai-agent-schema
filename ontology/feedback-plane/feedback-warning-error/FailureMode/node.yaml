schema: moonweave.ai/ontology-node/v1
id: FailureMode
kind: concept
status: review
labels:
  zh: 故障模式
  en: failure mode
  ja: 故障モード
semantics:
  short_definition:
    zh: 故障模式是对一类失败的识别条件、作用域和处置属性的可复用分类规范。
    en: A failure mode is a reusable classification specification of failure recognition, scope, and disposition attributes.
    ja: 故障モードは失敗分類の識別条件、範囲、処置属性を定める再利用分類仕様です。
  definition:
    zh: 故障模式是一种分类规范；其身份由稳定 mode_id、匹配错误类型或状态、适用作用域、因果说明和处置元数据确定，它用于分类 ErrorEvent 而不是表示一次失败已发生。
    en: A failure mode is a classification specification identified by stable mode_id, matching error types or states, applicable scope, causal description, and disposition metadata; it classifies ErrorEvents without representing that a failure occurred.
    ja: 故障モードは安定 mode_id、照合 error type・状態、適用範囲、原因説明、処置メタデータで同一性が決まる分類仕様で、ErrorEvent を分類し失敗発生を表しません。
  why_needed:
    zh: 稳定故障模式使错误聚合、恢复计划选择和策略处置可复用，同时避免把模式名称误作事件。
    en: Stable failure modes enable reusable aggregation, recovery-plan selection, and policy disposition without mistaking a mode name for an event.
    ja: 安定故障モードによりエラー集約、復旧計画選択、方針処置を再利用し mode 名を event と誤認しません。
  includes:
    - zh: 包括超时、认证失败、状态冲突、不可恢复数据损坏等可匹配故障分类。
      en: Includes matchable classes such as timeout, authentication failure, state conflict, and unrecoverable data corruption.
      ja: timeout、認証失敗、状態競合、回復不能データ破損など照合可能分類を含みます。
  excludes:
    - zh: 不包括某次 ErrorEvent、DiagnosticMessage 或 RetryPolicy。
      en: Excludes a particular ErrorEvent, DiagnosticMessage, and RetryPolicy.
      ja: 特定 ErrorEvent、DiagnosticMessage、RetryPolicy は含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - failure_mode_id
    - version
  fields:
    - id: failure_mode_id
      labels:
        zh: 故障模式标识
        en: failure-mode ID
        ja: 故障 mode ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一条可复用、可单独版本化和引用的故障分类谱系，而不是某次错误发生。
        en: Stably identifies one reusable, independently versioned and referenced failure-classification lineage rather than an error occurrence.
        ja: 一回の error 発生でなく、再利用・独立版管理・参照可能な一つの故障分類系列を安定識別します。
      allowed_values: []
      pattern: null
      example_value: failure-mode/upstream-timeout
      source_claims:
        - claim-failure-mode-002
    - id: version
      labels:
        zh: 故障模式版本
        en: failure-mode version
        ja: 故障 mode 版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识匹配类型、适用范围、因果说明或默认处置的一次不可变修订。
        en: Identifies one immutable revision of matching types, applicability scope, causal description, or default disposition.
        ja: matching type・applicability scope・causal description・default disposition の不変な一改訂を識別します。
      allowed_values: []
      pattern: null
      example_value: "2"
      source_claims:
        - claim-failure-mode-003
    - id: matching_error_types
      labels:
        zh: 匹配错误类型
        en: matching error types
        ja: 照合 error type
      datatype: string-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出可预测、低基数的异常类、协议错误类或稳定代码；禁止以完整消息文本作为分类键。
        en: Lists predictable, low-cardinality exception classes, protocol error classes, or stable codes; full message text is prohibited as a classification key.
        ja: 予測可能で低 cardinality の exception class・protocol error class・stable code を列挙し、完全 message text を分類 key にしません。
      allowed_values: []
      pattern: null
      example_value:
        - TimeoutError
        - HTTP_504
      source_claims:
        - claim-failure-mode-004
    - id: applicable_scope
      labels:
        zh: 适用作用域
        en: applicable scope
        ja: 適用範囲
      datatype: structured-value
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明匹配规则适用的组件、操作、尝试层级和环境前置条件，防止同一错误类型在不相干边界被误分类。
        en: Declares component, operation, attempt level, and environmental preconditions for matching, preventing the same error type from being misclassified outside its boundary.
        ja: matching rule が適用される component・operation・attempt level・environmental precondition を宣言し、同じ error type の境界外誤分類を防ぎます。
      allowed_values: []
      pattern: null
      example_value:
        component: search-adapter
        operation: query
        level: node-attempt
      source_claims:
        - claim-failure-mode-005
    - id: causal_description
      labels:
        zh: 因果说明
        en: causal description
        ja: 因果説明
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明该模式为何产生、可观察征象与边界条件；它是经复核的分类知识，不得从单次错误消息自动断言根因。
        en: Explains why the mode arises, its observable signs, and boundary conditions; it is reviewed classification knowledge and must not infer root cause from one error message alone.
        ja: mode の発生理由・observable sign・boundary condition を説明する審査済み分類知識で、単一 error message から root cause を自動断言しません。
      allowed_values: []
      pattern: null
      example_value: The upstream search endpoint failed to respond before the adapter deadline while the local attempt remained healthy.
      source_claims:
        - claim-failure-mode-006
    - id: default_disposition
      labels:
        zh: 默认处置
        en: default disposition
        ja: 既定 disposition
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录在适用策略没有更具体覆盖时建议重试、恢复、阻断、升级或忽略；它不是某次事件已执行处置的证据。
        en: Records retry, recover, block, escalate, or ignore as the recommendation when no more specific policy overrides it; it is not evidence that a disposition executed for an event.
        ja: より具体的な policy override がない場合の retry・recover・block・escalate・ignore 推奨を記録し、event で処置実行済みの証拠ではありません。
      allowed_values: []
      pattern: null
      example_value: retry
      source_claims:
        - claim-failure-mode-007
  constraints:
    - id: failure-mode-versioned-classification-not-occurrence
      severity: error
      expression_language: plain
      expression: one FailureMode version freezes its stable match keys, applicability, causal description, and default disposition; matching an ErrorEvent classifies the event but does not mean the mode itself occurred or its default disposition executed
      explanations:
        zh: 一个故障模式版本冻结匹配键、适用范围、因果说明与默认处置；匹配错误事件只完成分类，不表示模式本身发生或默认处置已执行。
        en: One failure-mode version freezes match keys, applicability, causal description, and default disposition; matching an error event classifies it without turning the specification into an occurrence or proving disposition execution.
        ja: 一つの FailureMode 版は match key・applicability・causal description・default disposition を固定し、ErrorEvent matching は分類だけを行い仕様発生や処置実行を証明しません。
      source_claims:
        - claim-failure-mode-008
  required_relation_constraints: []
examples:
  - id: FailureMode-example-positive-manual-001
    kind: positive
    labels:
      zh: 故障模式正例
      en: Positive failure mode case
      ja: 故障モードの正例
    scenario_id: null
    descriptions:
      zh: failure-mode upstream-timeout-v2 匹配 TimeoutError 与 HTTP 504，作用域为单次节点尝试。
      en: failure-mode upstream-timeout-v2 matches TimeoutError and HTTP 504 at node-attempt scope.
      ja: failure-mode upstream-timeout-v2 は TimeoutError と HTTP 504 を node-attempt 範囲で照合します。
    field_values:
      failure_mode_id: failure-mode/upstream-timeout
      version: "2"
      matching_error_types:
        - TimeoutError
        - HTTP_504
      applicable_scope:
        component: search-adapter
        operation: query
        level: node-attempt
      causal_description: The upstream search endpoint failed to respond before the adapter deadline while the local attempt remained healthy.
      default_disposition: retry
    related_node_ids:
      - FailureMode
    related_relation_ids: []
    expected_result:
      zh: 该对象是 FailureMode。
      en: The object is a FailureMode.
      ja: この対象は FailureMode です。
    why_valid_or_invalid:
      zh: 稳定 ID、匹配条件、作用域和处置元数据完整。
      en: Stable ID, matching conditions, scope, and disposition metadata are complete.
      ja: 安定 ID、照合条件、範囲、処置メタデータが完全です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-failure-mode-009
  - id: FailureMode-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 故障模式边界例
      en: Boundary failure mode case
      ja: 故障モードの境界例
    scenario_id: null
    descriptions:
      zh: err-31 是 14:30:02 发生的一次 timeout 错误。
      en: err-31 is one timeout error occurring at 14:30:02.
      ja: err-31 は 14:30:02 に発生した一回の timeout error です。
    field_values: {}
    related_node_ids:
      - FailureMode
    related_relation_ids: []
    expected_result:
      zh: 这是 ErrorEvent 实例，不是 FailureMode。
      en: This is an ErrorEvent occurrence, not FailureMode.
      ja: これは ErrorEvent 発生で FailureMode ではありません。
    why_valid_or_invalid:
      zh: 一次事件不能充当可复用匹配分类。
      en: One occurrence cannot serve as a reusable matching classification.
      ja: 一回の発生は再利用照合分類になりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-failure-mode-010
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
