source_claims:
  - id: claim-failure-mode-001
    source: eng-fw-langgraph-fault-tolerance
    supports: LangGraph RetryPolicy matches exception classes and error handlers run after disposition; Moonweave makes the reusable matching class a FailureMode.
    locator: Fault tolerance > Retries, error handling, and recovery after exhaustion
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-failure-mode-002
    source: eng-fw-langgraph-fault-tolerance
    supports: LangGraph RetryPolicy classifies exceptions for retry disposition but does not define a reusable ontology identity. FailureMode.failure_mode_id is Moonweave's stable lineage key for one reviewed matching specification.
    locator: Fault tolerance > Retry policies; retry_on and exception classification
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-failure-mode-003
    source: eng-fw-langgraph-fault-tolerance
    supports: LangGraph fault disposition changes when retry_on or RetryPolicy configuration changes. FailureMode.version is Moonweave's immutable discriminator for reproducing which classification semantics were applied.
    locator: Fault tolerance > RetryPolicy fields and retry_on
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-failure-mode-004
    source: eng-fw-langgraph-fault-tolerance
    supports: LangGraph retry_on matches exception classes to decide retry behavior. FailureMode.matching_error_types is Moonweave's explicit list of stable match keys for the reusable classification.
    locator: Fault tolerance > Retry policies; retry_on exception classes
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-failure-mode-005
    source: eng-fw-langgraph-fault-tolerance
    supports: LangGraph retry behavior is attached to particular graph tasks or nodes and evaluated in run context. FailureMode.applicable_scope is Moonweave's explicit boundary for where a match is valid.
    locator: Fault tolerance > Configure retry policy for graph tasks and nodes
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-failure-mode-006
    source: eng-fw-langgraph-fault-tolerance
    supports: LangGraph uses exception class for disposition and does not establish root cause. FailureMode.causal_description is Moonweave's reviewed explanation and explicitly remains separate from automatic exception matching.
    locator: Fault tolerance > Retry policies and exception matching
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-failure-mode-007
    source: eng-fw-langgraph-fault-tolerance
    supports: LangGraph distinguishes retryable exceptions from post-exhaustion error handling. FailureMode.default_disposition is Moonweave's reusable recommendation and remains subordinate to the applicable run policy and budget.
    locator: Fault tolerance > Retries and error handling after exhaustion
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-failure-mode-008
    source: eng-fw-langgraph-fault-tolerance
    supports: LangGraph separates configured RetryPolicy matching from a run's actual retry or error-handler execution. FailureMode-versioned-classification-not-occurrence is Moonweave's reviewed ontology boundary over that separation.
    locator: Fault tolerance > Retry policy matching and post-exhaustion error handling
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-failure-mode-009
    source: eng-fw-langgraph-fault-tolerance
    supports: LangGraph retry_on classifies exception types to decide disposition under a policy.
    locator: Fault tolerance > Retries, error handling, and recovery after exhaustion
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-failure-mode-010
    source: eng-fw-langgraph-fault-tolerance
    supports: LangGraph applies reusable exception matching rules to individual failure occurrences.
    locator: Fault tolerance > Retries, error handling, and recovery after exhaustion
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
