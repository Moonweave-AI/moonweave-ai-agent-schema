schema: moonweave.ai/ontology-node/v1
id: BlockingFailureMode
kind: concept
status: review
labels:
  zh: 阻断故障模式
  en: blocking failure mode
  ja: 阻断故障モード
semantics:
  short_definition:
    zh: 阻断故障模式是在声明作用域内不允许继续当前流程的故障模式。
    en: A blocking failure mode is a FailureMode that disallows continuing the current flow in its declared scope.
    ja: 阻断故障モードは宣言範囲内で現在フロー継続を許さない FailureMode です。
  definition:
    zh: 阻断故障模式是 FailureMode 的子类；它明确阻断作用域、终止条件和所需升级或人工处理，但不等同于发生该模式的一次 ErrorEvent，也不必表示全局不可恢复。
    en: A blocking failure mode is a FailureMode subtype declaring blocked scope, termination condition, and required escalation or human handling; it is not an ErrorEvent occurrence and need not be globally unrecoverable.
    ja: 阻断故障モードは阻断範囲、終了条件、必要昇格・人手処理を定める FailureMode 下位型で、ErrorEvent 発生ではなく全局回復不能を意味しません。
  why_needed:
    zh: 明确阻断作用域可防止一次工具失败被误解为整个任务永久失败。
    en: Explicit blocked scope prevents one tool failure from being mistaken for permanent whole-task failure.
    ja: 阻断範囲を明示し一ツール失敗を全タスク永久失敗と誤解しません。
  includes:
    - zh: 包括当前尝试必须终止、需要人工输入或必须切换恢复分支的故障分类。
      en: Includes failure classes requiring current attempt termination, human input, or routing to recovery.
      ja: 現在試行終了、人手入力、復旧分岐を要求する故障分類を含みます。
  excludes:
    - zh: 不包括允许按当前 RetryPolicy 自动再试的 RetryableFailureMode。
      en: Excludes RetryableFailureMode allowed to retry automatically under the current RetryPolicy.
      ja: 現在 RetryPolicy で自動再試行可能な RetryableFailureMode は含みません。
  semantic_kind: specification
  aliases: []
