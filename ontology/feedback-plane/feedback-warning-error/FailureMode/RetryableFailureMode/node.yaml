schema: moonweave.ai/ontology-node/v1
id: RetryableFailureMode
kind: concept
status: accepted
labels:
  zh: 可重试故障模式
  en: retryable failure mode
  ja: 再試行可能故障モード
semantics:
  short_definition:
    zh: 可重试故障模式是在明确 RetryPolicy 与预算下允许再次尝试的故障模式。
    en: A retryable failure mode is a FailureMode eligible for another attempt under an explicit RetryPolicy and budget.
    ja: 再試行可能故障モードは明示 RetryPolicy と予算下で再試行可能な FailureMode です。
  definition:
    zh: 可重试故障模式是 FailureMode 的子类；它声明适用异常类型、所需幂等或补偿条件、最大尝试、退避与禁止重试条件，可重试性由策略上下文决定而不是 ErrorEvent 的固有属性。
    en: A retryable failure mode is a FailureMode subtype declaring applicable exception types, required idempotency or compensation conditions, maximum attempts, backoff, and no-retry conditions; retryability is policy-contextual rather than intrinsic to an ErrorEvent.
    ja: 再試行可能故障モードは適用例外型、冪等・補償条件、最大試行、backoff、再試行禁止条件を定める FailureMode 下位型で、再試行可能性は ErrorEvent 固有でなく方針文脈依存です。
  why_needed:
    zh: 把可重试性放在模式与策略上，能让相同 timeout 在幂等读取中可重试、在非幂等付款中被阻断。
    en: Putting retryability in mode and policy lets the same timeout be retryable for idempotent reads but blocking for non-idempotent payment.
    ja: 再試行可能性を mode と方針に置き同じ timeout を冪等 read では再試行、非冪等 payment では阻断できます。
  includes:
    - zh: 包括临时网络超时、限流或可安全重放的 5xx 分类。
      en: Includes transient network timeout, rate-limit, and safely replayable 5xx classes.
      ja: 一時 network timeout、rate limit、安全再生可能 5xx 分類を含みます。
  excludes:
    - zh: 不包括超过尝试预算、非幂等副作用未知或策略明确禁止重试的故障。
      en: Excludes exhausted attempts, unknown non-idempotent side effects, and failures explicitly denied retry by policy.
      ja: 試行予算枯渇、非冪等副作用不明、方針で再試行禁止の故障は含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
