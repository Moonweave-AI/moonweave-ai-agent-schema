      ja: 再試行可能故障モードの正例
    scenario_id: null
    descriptions:
      zh: mode transient-503 匹配幂等 GET 的 HTTP 503，在 policy rp-2 下 max_attempts=3、指数退避。
      en: mode transient-503 matches HTTP 503 for idempotent GET under policy rp-2 with max_attempts=3 and exponential backoff.
      ja: mode transient-503 は冪等 GET の HTTP 503 を policy rp-2、max_attempts=3、指数 backoff で照合します。
    field_values:
      failure_mode_id: failure-mode/transient-503
      version: "2"
      matching_error_types:
        - HTTP_503
        - ServiceUnavailableError
      applicable_scope:
        component: search-adapter
        operation: idempotent-GET
        level: node-attempt
      causal_description: The upstream service is temporarily unavailable and the request has no committed side effect, so a policy-bounded new attempt may succeed.
      default_disposition: retry
    related_node_ids:
      - RetryableFailureMode
    related_relation_ids: []
    expected_result:
      zh: 该对象是 RetryableFailureMode。
      en: The object is a RetryableFailureMode.
      ja: この対象は RetryableFailureMode です。
    why_valid_or_invalid:
      zh: 匹配类型、幂等条件、策略、预算与退避完整。
      en: Match type, idempotency condition, policy, budget, and backoff are complete.
      ja: 照合型、冪等条件、方針、予算、backoff が完全です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-retryable-failure-mode-002
  - id: RetryableFailureMode-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 可重试故障模式边界例
      en: Boundary retryable failure mode case
      ja: 再試行可能故障モードの境界例
    scenario_id: null
    descriptions:
      zh: payment timeout 后副作用状态未知，策略要求人工对账且禁止自动重试。
      en: After payment timeout the side-effect state is unknown and policy requires reconciliation and forbids automatic retry.
      ja: payment timeout 後の副作用状態が不明で方針は人手照合と自動再試行禁止を要求します。
    field_values: {}
    related_node_ids:
      - RetryableFailureMode
    related_relation_ids: []
    expected_result:
      zh: 该故障不属于当前策略下的 RetryableFailureMode。
      en: The failure is not RetryableFailureMode under the current policy.
      ja: 当該故障は現在方針下の RetryableFailureMode ではありません。
    why_valid_or_invalid:
      zh: 非幂等副作用未知使安全重试条件不成立。
      en: Unknown non-idempotent side effect violates safe-retry conditions.
      ja: 非冪等副作用不明により安全再試行条件が成立しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-retryable-failure-mode-003
