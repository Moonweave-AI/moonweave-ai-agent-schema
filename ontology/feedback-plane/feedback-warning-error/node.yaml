module_contract:
  interaction_contract:
    applicability: mixed
    facets:
      input:
        applicable: true
        description:
          zh: 输入是已发生的 ErrorEvent 或 WarningEvent；前者等待 FailureMode 分类，后者产生独立 Warning 内容。
          en: "Inputs are occurred ErrorEvents or WarningEvents: the former awaits FailureMode classification and the latter raises separate Warning content."
          ja: 入力は発生済み ErrorEvent・WarningEvent で、前者は FailureMode 分類を受け後者は独立 Warning 内容を発します。
        family_concept_ids:
          - ErrorEvent
          - WarningEvent
        relation_ids:
          - ErrorEvent-classified_by-FailureMode
          - WarningEvent-raises-Warning
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 输出是可被日志、审查或策略消费的 DiagnosticMessage 与 Warning 信息，而不是再次输出事件。
          en: Outputs are DiagnosticMessage and Warning information consumable by logging, review, or policy, not another copy of the event.
          ja: 出力は logging、review、policy が消費する DiagnosticMessage・Warning 情報で event の複製ではありません。
        family_concept_ids:
          - DiagnosticMessage
          - Warning
        relation_ids:
          - ErrorEvent-conveys-DiagnosticMessage
          - WarningEvent-raises-Warning
        not_applicable_reason: null
      failure:
        applicable: true
        description:
          zh: 失败面区分具体发生的 ErrorEvent 与复用的 FailureMode：ErrorEvent 可终止 RunAttempt，FailureMode 只负责分类该事件。
          en: "The failure facet separates an occurred ErrorEvent from reusable FailureMode: ErrorEvent may terminate a RunAttempt, while FailureMode only classifies that event."
          ja: failure 面は発生済み ErrorEvent と再利用 FailureMode を分離し、ErrorEvent は RunAttempt を終了でき、FailureMode は event の分類だけを担います。
        family_concept_ids:
          - ErrorEvent
          - FailureMode
        relation_ids:
          - ErrorEvent-classified_by-FailureMode
          - ErrorEvent-terminates-RunAttempt
        not_applicable_reason: null
      recovery:
        applicable: true
        description:
          zh: 恢复面由 RecoveryPlan 预先处置 FailureMode；具体执行仍需策略选择、预算与状态前置条件。
          en: RecoveryPlan addresses a FailureMode in advance; execution still requires policy selection, budget, and state preconditions.
          ja: recovery 面では RecoveryPlan が FailureMode を事前処置し実行には方針選択、予算、状態前提が必要です。
