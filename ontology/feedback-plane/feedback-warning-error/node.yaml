  owns_when:
    zh: 当对象是对异常的结构化诊断内容、一次带作用域和证据的诊断发生，或可跨发生复用的故障机制分类时，由本模块拥有；已验证处置结果不属于本模块。
    en: Own an object when it is structured diagnostic content about an anomaly, a scoped diagnostic occurrence with evidence, or a failure-mechanism classification reusable across occurrences. A verified remediation result is not owned here.
    ja: 対象が異常についての構造化診断内容、範囲と証拠を持つ一回の診断発生、または発生をまたいで再利用可能な障害機構分類である場合に所有します。検証済み処置結果は所有しません。
