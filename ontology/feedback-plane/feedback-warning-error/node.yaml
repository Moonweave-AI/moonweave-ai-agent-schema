schema: moonweave.ai/ontology-node/v1
id: feedback-warning-error
kind: module
status: review
labels:
  zh: 故障与诊断
  en: Failures and diagnostics
  ja: 障害と診断
semantics:
  short_definition:
    zh: 区分“诊断内容、诊断发生和故障类别”三种身份。DiagnosticSignal 承载警告、错误说明、风险或置信信息；DiagnosticEvent 记录这些信息在何时、针对何对象被发出；FailureMode 描述可重复识别的故障机制。原始观测、日志传输和后续处置不在本模块重复建模。
    en: Separates diagnostic content, diagnostic occurrence, and failure classification. DiagnosticSignal carries warnings, error descriptions, risk, or confidence information; DiagnosticEvent records when and for which subject that information was emitted; FailureMode describes a repeatably recognizable failure mechanism. Raw observations, log transport, and subsequent remediation are not re-modeled here.
    ja: 「診断内容・診断発生・障害分類」の三つの同一性を分離します。DiagnosticSignal は警告・エラー説明・リスク・信頼度情報、DiagnosticEvent はそれらがいつどの対象について発行されたか、FailureMode は反復識別可能な障害機構を表します。生観測・ログ転送・後続処置は本モジュールで重複モデル化しません。
  definition:
    zh: 本模块的三个直属根互不替代：DiagnosticSignal 是可引用的信息对象，DiagnosticEvent 是一次有时间与作用域的发生，FailureMode 是对多个发生可复用的分类。只有在观测证据被解释为异常、警告、错误或失败后，才进入本模块；一个异常被捕获或重试，并不自动表示父级执行失败。是否重试由路由策略决定，如何恢复由审查与纠正决定，是否最终成功由运行结果决定。
    en: The three direct roots are not substitutes. DiagnosticSignal is a referenceable information object, DiagnosticEvent is a scoped and time-stamped occurrence, and FailureMode is a reusable classification across occurrences. Evidence enters this module only after it is interpreted as an anomaly, warning, error, or failure. A caught or retried exception does not automatically make the parent execution fail. Routing policy decides whether to retry, review and correction decide how to recover, and runtime outcome decides final success.
    ja: 三つの直下根は相互代替ではありません。DiagnosticSignal は参照可能な情報対象、DiagnosticEvent は時間と範囲を持つ発生、FailureMode は複数発生に再利用できる分類です。観測証拠が異常・警告・エラー・失敗と解釈された後だけ本モジュールへ入ります。捕捉・再試行された例外だけで親実行の失敗とは限りません。再試行可否は routing policy、復旧方法は review/correction、最終成功は runtime outcome が決めます。
  why_needed:
    zh: 让每项异常都能说明具体发生、诊断内容、影响范围和故障分类，并避免把一条日志、一次异常事件、一个故障模式和一项恢复结果混成同一个节点。
    en: Lets every anomaly identify its occurrence, diagnostic content, affected scope, and failure classification without collapsing a log record, exception occurrence, failure mode, and recovery result into one node.
    ja: 各異常について発生・診断内容・影響範囲・障害分類を説明し、ログ一件・例外発生・障害 mode・復旧結果を一ノードへ混同しないために必要です。
  includes:
    - zh: 诊断信号及其警告、消息、置信和风险信息子类。
      en: Diagnostic signals and their warning, message, confidence, and risk information subtypes.
      ja: 診断信号と warning、message、confidence、risk 情報下位型。
    - zh: 诊断事件、警告事件、失败事件、错误事件以及带策略语境的故障模式。
      en: Diagnostic, warning, failure, and error events plus policy-contextual failure modes.
      ja: 診断、warning、failure、error event と方針文脈付き failure mode。
  excludes:
    - zh: LogStream 与 LogRecord 的传输、存储和导出归反馈日志所有；日志内容只有经诊断解释后才进入本域。
      en: LogStream and LogRecord transport, storage, and export belong to feedback logging; log content enters this module only after diagnostic interpretation.
      ja: LogStream・LogRecord の転送、保存、export は feedback logging に属し log 内容は診断解釈後のみ本 module に入ります。
    - zh: ReviewFinding、Feedback、CorrectionActivity 与 RecoveryPlan 的工作流身份属于审查与纠正模块，本模块仅通过明确边引用。
      en: ReviewFinding, Feedback, CorrectionActivity, and RecoveryPlan workflow identity belongs to review and correction and is only referenced here through explicit edges.
      ja: ReviewFinding、Feedback、CorrectionActivity、RecoveryPlan の workflow ID は review/correction に属し本 module は明示辺でのみ参照します。
    - zh: RetryPolicy、RecoveryPlan、CorrectionActivity、验证结果和最终 RunOutcome；故障分类可以被这些对象引用，但不拥有处置或成功结论。
      en: RetryPolicy, RecoveryPlan, CorrectionActivity, verification results, and final RunOutcome; failure classifications may be referenced by them but do not own remediation or success conclusions.
      ja: RetryPolicy・RecoveryPlan・CorrectionActivity・検証結果・最終 RunOutcome。障害分類はこれらから参照されますが、処置や成功結論を所有しません。
  semantic_kind: null
  aliases: []
purpose:
  zh: 让每项异常都能说明具体发生、诊断内容、影响范围和故障分类，并避免把一条日志、一次异常事件、一个故障模式和一项恢复结果混成同一个节点。
  en: Lets every anomaly identify its occurrence, diagnostic content, affected scope, and failure classification without collapsing a log record, exception occurrence, failure mode, and recovery result into one node.
  ja: 各異常について発生・診断内容・影響範囲・障害分類を説明し、ログ一件・例外発生・障害 mode・復旧結果を一ノードへ混同しないために必要です。
