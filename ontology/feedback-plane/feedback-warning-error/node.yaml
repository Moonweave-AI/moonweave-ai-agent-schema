  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - DiagnosticEvent
    allowed_backbone_predicates:
      - is_a
    flat_root_exception_concept_ids:
      - DiagnosticSignal
      - FailureMode
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-feedback-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项核验后，DiagnosticEvent 仍是发生事件主根，DiagnosticSignal 仍是可复用诊断信息入口。FailureMode 是可在任何 ErrorEvent 之前定义并用于多个事件的故障分类规范，因此成为第三个独立入口；classified_by 只连接具体事件与适用规范，不再充当父边。
            en: After point-by-point review, DiagnosticEvent remains the occurrence root and DiagnosticSignal remains the reusable diagnostic-information entry. FailureMode is a classification specification that can exist before any ErrorEvent and apply to many events, so it becomes a third independent entry; classified_by only links an occurrence to an applicable specification and is no longer a parent edge.
            ja: 個別審査後、DiagnosticEvent を occurrence root、DiagnosticSignal を再利用診断情報 entry に維持します。FailureMode は ErrorEvent より前に存在し複数 event に適用できる分類仕様なので第三の独立 entry とし、classified_by は occurrence と適用仕様を結ぶだけの cross-link で親辺にはしません。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 结构审查保留三条诚实的并列主轴：DiagnosticEvent 展开 FailureEvent、ErrorEvent 与 WarningEvent；DiagnosticSignal 展开消息、警告、置信和风险信号；FailureMode 展开 BlockingFailureMode 与 RetryableFailureMode。ErrorEvent classified_by FailureMode 保持 canonical 事实但改为 cross-link，避免让一次事件位于可复用规范的抽象上方。
            en: "Structure review retains three honest peer axes: DiagnosticEvent expands into FailureEvent, ErrorEvent, and WarningEvent; DiagnosticSignal expands into message, warning, confidence, and risk signals; FailureMode expands into BlockingFailureMode and RetryableFailureMode. ErrorEvent classified_by FailureMode remains a canonical fact but becomes a cross-link so an occurrence is not placed above a reusable specification abstraction."
            ja: structure review は三つの正直な並列軸を保持します。DiagnosticEvent は FailureEvent・ErrorEvent・WarningEvent、DiagnosticSignal は message・warning・confidence・risk signal、FailureMode は BlockingFailureMode・RetryableFailureMode を展開します。ErrorEvent classified_by FailureMode は canonical fact のまま cross-link とし、一 occurrence を再利用 specification 抽象の上位に置きません。
