      en: RunAttempt attempt-3 bounds one execution attempt; err-31 is one timeout occurrence within it at 14:30:02, while upstream-timeout-v2 is a cross-run FailureMode reusable by error type and scope.
      ja: RunAttempt attempt-3 は一回の実行試行を区切り、err-31 はその中で 14:30:02 に発生した一回の timeout、upstream-timeout-v2 は error type と scope で実行横断再利用される FailureMode です。
