      en: RunAttempt, ErrorEvent, and FailureMode retain three identity levels—execution attempt, diagnostic occurrence, and reusable classification—and none substitutes for another.
      ja: RunAttempt、ErrorEvent、FailureMode は実行試行、診断発生、再利用分類という三つの同一性階層を保ち、互いを代替しません。
