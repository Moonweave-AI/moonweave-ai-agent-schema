      error_type: upstream.timeout
      exception_type: TimeoutError
      failure_mode_id: upstream-timeout-v2
      failure_mode_version: "2"
      classification_scope: provider=search-api;operation=query
      matching_rule: error.type == upstream.timeout and scope.provider == search-api
    related_node_ids:
      - RunAttempt
      - ErrorEvent
      - FailureMode
    related_relation_ids:
