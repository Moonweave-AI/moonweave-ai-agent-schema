schema: moonweave.ai/ontology-node/v1
id: LogRecord
kind: concept
status: accepted
labels:
  en: log record
  zh: 日志记录
  ja: ログ記録
semantics:
  short_definition:
    zh: 日志记录是带时间、正文、严重度、属性及可选追踪上下文的时间戳记录。
    en: A LogRecord is a timestamped record with a body, severity, attributes, and optional trace context.
    ja: LogRecord は時刻、本文、重大度、属性、任意のトレース文脈を持つ記録です。
  definition:
    zh: 日志记录是一种日志产物；其区别性在于按照统一日志数据模型保存事件发生或观察时间、正文、严重度、资源、检测范围、属性，以及在可用时保存 TraceId 与 SpanId，从而能够传输和关联来自不同日志源的单条记录。
    en: A LogRecord is a timestamped record and LogArtifact distinguished by preserving, under a common log data model, event or observed time, body, severity, resource, instrumentation scope, attributes, and TraceId or SpanId when available so one record from heterogeneous log sources can be transported and correlated.
    ja: LogRecord はログ成果物の一種であり、共通ログ・データモデルに従って発生または観測時刻、本文、重大度、資源、計装範囲、属性、利用可能な場合の TraceId・SpanId を保持し、異種ログ源の一記録を転送・相関できる点で区別されます。
  why_needed:
    zh: 统一的单记录边界让收集器、存储、告警和审计在不丢失原始严重度与追踪关联的前提下处理应用日志、结构化事件和外部系统日志。
    en: A uniform single-record boundary lets collectors, storage, alerts, and audit process application logs, structured events, and external system logs without losing source severity or trace correlation.
    ja: 統一された単一記録境界により、収集器、保存、警報、監査は元の重大度とトレース相関を失わずにアプリ・ログ、構造化イベント、外部システム・ログを処理できます。
  includes:
    - zh: 包括带原始 SeverityText 与规范化 SeverityNumber 的应用日志、具有 EventName 的结构化事件，以及携带 TraceId/SpanId 的错误或工具结果记录。
      en: Includes application logs with original SeverityText and normalized SeverityNumber, structured events with EventName, and error or tool-result records carrying TraceId and SpanId.
      ja: 元の SeverityText と正規化 SeverityNumber を持つアプリ・ログ、EventName 付き構造化イベント、TraceId・SpanId を持つエラーまたはツール結果記録を含みます。
  excludes:
    - zh: 不包括由多条记录组成且具有追加顺序的 LogStream、按工具交互语义组织的 ToolTranscript，也不包括一组记录的 TelemetryExportBatch。
      en: Excludes a LogStream ordered from many records, a ToolTranscript organized around a tool interaction, and a TelemetryExportBatch that transports a set of records.
      ja: 複数記録から成る順序付き LogStream、ツール相互作用を中心に構成された ToolTranscript、記録集合を運ぶ TelemetryExportBatch は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: timestamp
      labels:
        zh: 时间戳
        en: timestamp
        ja: タイムスタンプ
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 日志事件发生或被观测的 UTC 时间。
        en: UTC instant at which the logged event occurred or was observed.
        ja: ログ対象イベントが発生または観測された UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-13T05:12:00.000Z
      source_claims:
        - claim-log-record-002
    - id: severity
      labels:
        zh: 严重度
        en: severity
        ja: 重大度
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 日志记录的受控严重度。
        en: Controlled severity of the log record.
        ja: ログ記録の制御された重大度です。
      allowed_values: []
      pattern: null
      example_value: info
      source_claims:
        - claim-log-record-003
    - id: body
      labels:
        zh: 正文
        en: body
        ja: 本文
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 经适用脱敏处理后的日志正文。
        en: Log body after applicable redaction has been applied.
        ja: 適用される墨消し処理後のログ本文です。
      allowed_values: []
      pattern: null
      example_value: tool call completed
      source_claims:
        - claim-log-record-004
  constraints:
    - id: log-record-immutable-redacted
      severity: error
      expression_language: plain
      expression: a persisted log record is immutable and its body contains no value prohibited by the applicable disclosure policy
      explanations:
        zh: 持久化日志记录不可变，正文不得包含披露策略禁止的值。
        en: A persisted log record is immutable and its body contains no value prohibited by the applicable disclosure policy.
        ja: 永続化ログ記録は不変で、本文に適用開示方針が禁止する値を含めません。
      source_claims:
        - claim-log-record-005
  required_relation_constraints:
    - id: log-record-in-stream
      direction: incoming
      predicate: contains
      target_concept_id: LogStream
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 日志记录必须归属于一个有保留策略的日志流。
        en: A log record belongs to one log stream with a retention policy.
        ja: ログ記録は保持方針を持つ一つのログストリームに属します。
      source_claims:
        - claim-log-record-006
examples:
  - id: LogRecord-example-positive-001
    kind: positive
    labels:
      zh: 带追踪上下文的错误记录
      en: Error record with trace context
      ja: トレース文脈付きエラー記録
    scenario_id: null
    descriptions:
      zh: 一条 LogRecord 保存工具超时的 Timestamp、ObservedTimestamp、SeverityText `ERROR`、结构化 Body、Resource、InstrumentationScope、TraceId 与 SpanId。
      en: One LogRecord stores a tool timeout with Timestamp, ObservedTimestamp, SeverityText `ERROR`, structured Body, Resource, InstrumentationScope, TraceId, and SpanId.
      ja: 一つの LogRecord はツール timeout の Timestamp、ObservedTimestamp、SeverityText `ERROR`、構造化 Body、Resource、InstrumentationScope、TraceId、SpanId を保持します。
    field_values:
      artifact_id: log-artifact/tool-timeout-4113
      content_digest: sha256:97e52f34
      provenance_ref: provenance/worker-3/tool-timeout-4113
      timestamp: 2026-07-13T05:12:00.000Z
      severity: error
      body: tool call timed out after 30 seconds
      severity_text: ERROR
      event_name: tool.timeout
      trace_id: 4bf92f3577b34da6a3ce929d0e0e4736
    related_node_ids:
      - LogRecord
      - LogArtifact
      - TraceRecord
    related_relation_ids:
      - LogRecord-is_a-LogArtifact
    expected_result:
      zh: 记录可按严重度检索并通过 TraceId/SpanId 与产生它的追踪跨度关联。
      en: The record is queryable by severity and correlates to its producing trace span through TraceId and SpanId.
      ja: 記録は重大度で検索でき、TraceId と SpanId により生成元 trace span と相関できます。
    why_valid_or_invalid:
      zh: 它是单条记录，具备日志数据模型的时间、正文、严重度、来源和可选追踪上下文。
      en: It is one record carrying the log data model's time, body, severity, provenance, and optional trace context.
      ja: 単一記録としてログデータモデルの時刻、本文、重大度、来歴、任意 trace 文脈を備えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-log-record-007
  - id: LogRecord-example-boundary-001
    kind: boundary
    labels:
      zh: 日志流边界
      en: Log-stream boundary
      ja: ログストリームの境界
    scenario_id: null
    descriptions:
      zh: "`stream/tool-8` 具有流标识、37 条成员记录与消费游标；即使每个成员都是 LogRecord，承载它们的对象仍是 LogStream 而不是一条 LogRecord。"
      en: "`stream/tool-8` has a stream identity, 37 member records, and a consumer cursor; even though every member is a LogRecord, the containing object is a LogStream rather than one LogRecord."
      ja: "`stream/tool-8` は stream 同一性、37 件の要素記録、consumer cursor を持ちます。全要素が LogRecord でも、包含対象は一つの LogRecord ではなく LogStream です。"
    field_values: {}
    related_node_ids:
      - LogRecord
      - LogStream
    related_relation_ids:
      - LogStream-contains-LogRecord
    expected_result:
      zh: 集合保持 LogStream 类型，只有各成员被识别为 LogRecord。
      en: The collection retains LogStream type and only its individual members are classified as LogRecord.
      ja: 集合は LogStream 型を保持し、個々の要素だけが LogRecord と判定されます。
    why_valid_or_invalid:
      zh: 单记录与有序集合具有不同身份键；成员类型不能赋给包含它们的流。
      en: A single record and an ordered collection have different identity keys; member type does not transfer to the containing stream.
      ja: 単一記録と順序付き集合は同一性キーが異なり、要素型は包含 stream へ移りません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-log-record-008
  - id: LogRecord-example-instance-001
    kind: instance
    labels:
      zh: 权限拒绝记录实例
      en: Permission-denial record instance
      ja: 権限拒否記録のインスタンス
    scenario_id: permission-denial-record-51
    descriptions:
      zh: 实例 `record/51` 在 `2026-07-16T02:31:04Z` 记录 `tool.permission.denied`，SeverityNumber 为 17，Body 指明被拒绝的 `filesystem.write` 权限。
      en: Instance `record/51` records `tool.permission.denied` at `2026-07-16T02:31:04Z`, with SeverityNumber 17 and a Body naming the denied `filesystem.write` permission.
      ja: インスタンス `record/51` は `2026-07-16T02:31:04Z` の `tool.permission.denied`、SeverityNumber 17、拒否された `filesystem.write` 権限を示す Body を保持します。
    field_values:
      record_id: record/51
      event_name: tool.permission.denied
      severity_number: 17
    related_node_ids:
      - LogRecord
      - LogArtifact
    related_relation_ids:
      - LogRecord-is_a-LogArtifact
    expected_result:
      zh: 实例作为一条 ERROR 级 LogRecord 保存，并可由事件名和时间检索。
      en: The instance is stored as one ERROR-level LogRecord and is retrievable by event name and time.
      ja: 一つの ERROR レベル LogRecord として保存され、event name と時刻で検索できます。
    why_valid_or_invalid:
      zh: 事件名、严重度、发生时间与正文属于同一记录身份，而非流级或批次级字段。
      en: Event name, severity, occurrence time, and body belong to one record identity rather than stream-level or batch-level state.
      ja: event name、重大度、発生時刻、本文は一記録の同一性に属し、stream・batch 水準の状態ではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-log-record-009
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: ToolTranscript
    shared_parent_concept_id: LogArtifact
    differentia:
      zh: 共享父节点对照：父节点 LogArtifact：LogRecord（semantic kind=information，骨架 LogRecord-is_a-LogArtifact）；ToolTranscript（semantic kind=information，骨架 ToolTranscript-is_a-LogArtifact）。双端条件：LogRecord 条件：“作为日志产物，日志记录由这一事实区分：它是从轨迹、跨度、事件、诊断消息、警告、错误、工具结果或审计相关观察派生的结构化记录”；ToolTranscript 条件：“工具调用记录是一种日志产物（LogArtifact），按顺序保存工具请求、权限提示、工具调用尝试（ToolCallAttempt）的执行、结果、警告与后续观察”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent LogArtifact: LogRecord (semantic kind=information, backbone LogRecord-is_a-LogArtifact); ToolTranscript (semantic kind=information, backbone ToolTranscript-is_a-LogArtifact). Endpoint conditions: LogRecord condition: “A LogRecord is a LogArtifact that stores a structured record derived from a trace, span, event, diagnostic message, warning, error, tool result, or audit-relevant observation”; ToolTranscript condition: “A ToolTranscript is a LogArtifact that preserves the ordered record of tool requests, permission prompts, ToolCallAttempt executions, results, warnings, and follow-up observations”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 LogArtifact：LogRecord（semantic kind=information、バックボーン LogRecord-is_a-LogArtifact）；ToolTranscript（semantic kind=information、バックボーン ToolTranscript-is_a-LogArtifact）。両端条件：LogRecord の条件：「ログ記録はログ情報成果物として、次の条件により他の対象と区別されます：それは、トレース、スパン、イベント、診断メッセージ、警告、エラー、ツール結果、監査関連観測から派生する構造化記録です」；ToolTranscript の条件：「ツール呼び出し記録はログ情報成果物（LogArtifact）の一種で、ツール要求、権限プロンプト、ツール呼び出し試行（ToolCallAttempt）の実行、結果、警告、後続観測を順序どおり保持します」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-log-record-010
parent_relation:
  id: LogRecord-is_a-LogArtifact
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: LogRecord is_a LogArtifact 表示每条日志记录都继承日志产物的稳定内容、可引用身份和来源条件，并以统一日志数据模型中的单记录字段集合为种差。
    en: LogRecord is_a LogArtifact means that every log record inherits stable content, referential identity, and provenance from LogArtifact and is differentiated by the single-record field set of the common log data model.
    ja: LogRecord is_a LogArtifact は各 log record が LogArtifact の安定内容、参照同一性、来歴を継承し、共通ログ data model の単一記録 field set を種差とすることを示します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: LogRecord-is_a-LogArtifact-example-positive-001
      kind: positive
      labels:
        zh: 结构化日志记录
        en: Structured log record
        ja: 構造化 log record
      scenario_id: null
      descriptions:
        zh: 记录包含 Timestamp、Severity、Body、Resource、InstrumentationScope 和 TraceId，并具有独立 record_id。
        en: A record contains Timestamp, Severity, Body, Resource, InstrumentationScope, and TraceId and has an independent record_id.
        ja: 記録は Timestamp、Severity、Body、Resource、InstrumentationScope、TraceId と独立 record_id を持ちます。
      field_values: {}
      related_node_ids:
        - LogRecord
        - LogArtifact
      related_relation_ids:
        - LogRecord-is_a-LogArtifact
      expected_result:
        zh: 对象同时按 LogRecord 与 LogArtifact 查询。
        en: The object is queryable as both LogRecord and LogArtifact.
        ja: 対象は LogRecord と LogArtifact の両方で検索できます。
      why_valid_or_invalid:
        zh: 单记录种差与上位日志产物条件全部成立。
        en: The single-record differentia and every LogArtifact condition hold.
        ja: 単一記録種差と LogArtifact 条件がすべて成立します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-log-record-011
    - id: LogRecord-is_a-LogArtifact-example-boundary-001
      kind: boundary
      labels:
        zh: 工具调用记录兄弟边界
        en: Tool-transcript sibling boundary
        ja: tool transcript sibling 境界
      scenario_id: null
      descriptions:
        zh: ToolTranscript 聚合一个逻辑工具调用的多次尝试和结果，虽是 LogArtifact，但不是统一数据模型中的单条 LogRecord。
        en: A ToolTranscript aggregates multiple attempts and results for one logical tool call; although it is a LogArtifact, it is not one LogRecord under the common record model.
        ja: ToolTranscript は一論理 tool call の複数試行・結果を集約し LogArtifact ですが共通 model の一 LogRecord ではありません。
      field_values: {}
      related_node_ids:
        - LogRecord
        - LogArtifact
      related_relation_ids:
        - LogRecord-is_a-LogArtifact
      expected_result:
        zh: 保留共同上位类型，只赋予 ToolTranscript 下位类型。
        en: The common supertype is retained and only ToolTranscript is assigned as subtype.
        ja: 共通上位型を保持し ToolTranscript 下位型だけを付与します。
      why_valid_or_invalid:
        zh: 复合记录与单条记录的身份和基数不同，不能因共享内容来源而互换。
        en: Composite and single-record identities and cardinalities differ; shared content provenance does not make them interchangeable.
        ja: 複合記録と単一記録は同一性・基数が異なり、共通来歴だけで交換できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-log-record-012
  source_claims:
    - claim-log-record-013
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: log_record_appended_to_audit_log
    predicate: log_record_appended_to_audit_log
    direction: source-to-target
    relation_kind: information
    labels:
      zh: log record appended to audit log
      en: log record appended to audit log
      ja: log record appended to audit log
    definitions:
      zh: LogRecord appended_to AuditLog 表示一条具有审计相关内容的日志记录被序列化并追加到审计日志流；该跨域边记录写入事件，不把一般 LogRecord 等同于 AuditRecord，成员审计语义仍由 AuditRecord 说明。
      en: LogRecord appended_to AuditLog means that a log record carrying audit-relevant content is serialized and appended to the audit log stream; this cross-domain write edge does not equate every LogRecord with AuditRecord, whose membership carries the audit semantics.
      ja: LogRecord appended_to AuditLog は監査関連内容を持つ log record が直列化され監査 log stream へ追加されたことを示します。この横断書込辺は一般 LogRecord を AuditRecord と同一視せず、監査要素意味は AuditRecord が担います。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_log_record_appended_to_audit_log
      labels:
        zh: 反向：log record appended to audit log
        en: is target of log record appended to audit log
        ja: 逆方向：log record appended to audit log
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: log_record_appended_to_audit_log-example-positive-001
        kind: positive
        labels:
          zh: 授权决定写入审计流
          en: Authorization decision appended
          ja: 認可判断の監査 stream 追加
        scenario_id: null
        descriptions:
          zh: LogRecord `record/auth-12` 包含主体、动作、对象、结果与时间，被转换为 AuditRecord 成员后以序列 44 追加到 `audit/run-12`。
          en: LogRecord `record/auth-12` contains actor, action, object, outcome, and time, is represented as an AuditRecord member, and is appended to `audit/run-12` at sequence 44.
          ja: LogRecord `record/auth-12` は主体、操作、対象、結果、時刻を含み、AuditRecord 要素として表現され `audit/run-12` の連番 44 に追加されます。
        field_values: {}
        related_node_ids:
          - LogRecord
          - AuditLog
        related_relation_ids:
          - log_record_appended_to_audit_log
        expected_result:
          zh: 查询返回写入事件和对应 AuditRecord 成员，同时保留原 LogRecord 身份。
          en: A query returns the append event and corresponding AuditRecord member while preserving the original LogRecord identity.
          ja: 照会は追加 event と対応 AuditRecord 要素を返し、元 LogRecord 同一性を保持します。
        why_valid_or_invalid:
          zh: 写入动作、序列位置和审计表示均明确，没有把跨域表示误写成 is_a。
          en: The write action, sequence position, and audit representation are explicit without miscasting the cross-domain representation as is_a.
          ja: 書込 action、連番位置、監査表現が明示され、横断表現を is_a と誤記していません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-log-record-014
      - id: log_record_appended_to_audit_log-example-boundary-001
        kind: boundary
        labels:
          zh: 普通调试记录边界
          en: Ordinary debug-record boundary
          ja: 通常 debug 記録の境界
        scenario_id: null
        descriptions:
          zh: 一条 DEBUG LogRecord 只有内部缓存大小，没有主体、受控动作或审计写入事件；即使与 AuditLog 同属一个 run，也未 appended_to 审计日志。
