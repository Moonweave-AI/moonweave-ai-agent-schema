source_claims:
  - id: claim-log-record-001
    source: eng-observe-opentelemetry-logs
    supports: The stable OpenTelemetry Logs Data Model defines one LogRecord with event and observation timestamps, trace context, severity, body, Resource, InstrumentationScope, Attributes, and EventName. Moonweave places LogRecord under LogArtifact while preserving that record-level field boundary.
    locator: Logs Data Model > Log and Event Record Definition > complete LogRecord field list
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-log-record-002
    source: eng-observe-opentelemetry-logs
    supports: LogRecord.timestamp follows the OpenTelemetry Logs Data Model distinction between Timestamp, when the event occurred, and ObservedTimestamp, when the collection system observed it. Moonweave's single field selects the event time when present and otherwise the observed time, following the specification's one-timestamp conversion guidance.
    locator: "Logs Data Model > Log and Event Record Definition > Field: Timestamp; Field: ObservedTimestamp"
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-log-record-003
    source: eng-observe-opentelemetry-logs
    supports: LogRecord.severity is grounded in the OpenTelemetry Logs Data Model's normative SeverityText and normalized SeverityNumber ranges from TRACE through FATAL. Moonweave maps that controlled log-level semantics into its severity field rather than treating the value as an evaluation score or business priority.
    locator: "Logs Data Model > Log and Event Record Definition > Field: SeverityText and Field: SeverityNumber; Severity Fields > severity-number ranges"
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-log-record-004
    source: eng-observe-opentelemetry-logs
    supports: LogRecord.body follows the OpenTelemetry Logs Data Model definition of Body as an optional AnyValue that can preserve human-readable or structured event content. Requiring policy-governed redaction before persistence is a Moonweave disclosure constraint; the Logs Data Model supports the body boundary but does not itself require that redaction.
    locator: "Logs Data Model > Log and Event Record Definition > Field: Body"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-log-record-005
    source: eng-std-opentelemetry-logs-sdk
    supports: The Logs SDK permits processors to modify a ReadWriteLogRecord during OnEmit and recommends cloning before asynchronous processing to avoid races. Moonweave therefore places normalization and disclosure filtering before the persisted record boundary; immutability after persistence and policy-complete redaction remain explicit Moonweave constraints, not requirements of the SDK.
    locator: Logs SDK > LogRecordProcessor operations > OnEmit; LoggerProvider > ReadWriteLogRecord cloning
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-record-006
    source: eng-std-opentelemetry-logs-sdk
    supports: The Logs SDK defines ordered processor pipelines and batch processors that pass ReadableLogRecords to a LogRecordExporter. Modeling each persisted LogRecord as a member of one retained LogStream is Moonweave's queryable collection contract; the SDK supports the record-to-pipeline boundary but does not prescribe that one-stream cardinality.
    locator: Logs SDK > LogRecordProcessor; Built-in processors > Batching processor; LogRecordExporter > Export
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-record-007
    source: eng-observe-opentelemetry-logs
    supports: LogRecord-example-positive-001 directly instantiates OpenTelemetry LogRecord fields Timestamp, ObservedTimestamp, SeverityText, Body, Resource, InstrumentationScope, TraceId, and SpanId.
    locator: Logs Data Model > Log and Event Record Definition > complete field list
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-log-record-008
    source: eng-observe-opentelemetry-logs
    supports: LogRecord-example-boundary-001 uses OpenTelemetry's per-record field model to delimit one LogRecord; the explicit collection identity is Moonweave's LogStream design inference.
    locator: Logs Data Model > Log and Event Record Definition > fields of one LogRecord
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-record-009
    source: eng-observe-opentelemetry-logs
    supports: LogRecord-example-instance-001 uses OpenTelemetry EventName, SeverityNumber, Timestamp, Body, and Attributes fields; the permission event vocabulary is Moonweave design inference.
    locator: Logs Data Model > Log and Event Record Definition > EventName, Severity, Timestamp, Body, and Attributes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-record-010
    source: eng-fw-openai-tracing
    supports: OpenAI Agents tracing models a tool call as a span with inputs, outputs, errors, and causal trace context, whereas OpenTelemetry's Logs Data Model defines one generic LogRecord. Moonweave uses that operational difference to separate a multi-entry ToolTranscript from one LogRecord while retaining LogArtifact as their reviewed common genus.
    locator: Tracing guide > Traces, spans, and trace processors
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-record-011
    source: eng-observe-opentelemetry-logs
    supports: LogRecord-is_a-LogArtifact positive case directly uses the OpenTelemetry LogRecord field model; LogArtifact and the hierarchy are Moonweave design inference.
    locator: Logs Data Model > Log and Event Record Definition > complete field list
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-record-012
    source: eng-observe-opentelemetry-logs
    supports: LogRecord-is_a-LogArtifact boundary case uses OpenTelemetry's one-LogRecord field boundary; ToolTranscript aggregation is a separate Moonweave design inference.
    locator: Logs Data Model > Log and Event Record Definition > one LogRecord field set and record semantics
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-record-013
    source: eng-observe-opentelemetry-logs
    supports: LogRecord-is_a-LogArtifact is grounded in the stable OpenTelemetry LogRecord data model. OpenTelemetry does not define Moonweave LogArtifact or this is_a placement; hierarchy direction and the artifact identity conditions are design inference.
    locator: Logs Data Model > Design Notes and Log and Event Record Definition
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-record-014
    source: eng-observe-opentelemetry-logs
    supports: log_record_appended_to_audit_log positive case uses OpenTelemetry LogRecord occurrence time, resource, attributes, and trace context as serializable audit evidence; append sequencing and AuditRecord representation are Moonweave design inference.
    locator: Logs Data Model > Log and Event Record Definition > Timestamp, Resource, Attributes, and trace context
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-record-015
    source: eng-observe-opentelemetry-logs
    supports: log_record_appended_to_audit_log boundary case reflects that OpenTelemetry LogRecord attributes and severity do not themselves assert audit-log membership; Moonweave requires an explicit append event.
    locator: Logs Data Model > Log and Event Record Definition > Severity and Attributes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-record-016
    source: eng-observe-opentelemetry-logs
    supports: log_record_appended_to_audit_log uses OpenTelemetry LogRecord fields as the serializable source record but adds an explicit write event and audit representation. OpenTelemetry does not define AuditLog or this append edge; direction and audit conditions are Moonweave design inference.
    locator: Logs Data Model > Log and Event Record Definition > record fields and provenance
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-record-017
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry defines Body as free-form or structured event content and Attributes as occurrence-specific information, but does not define Moonweave LogRecord-conveys-DiagnosticMessage; the one-record completeness condition is a Moonweave design inference.
    locator: Logs Data Model > Log and Event Record Definition > Body, Severity, Resource, and Attributes
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-log-record-018
    source: eng-observe-opentelemetry-logs
    supports: LogRecord-conveys-DiagnosticMessage positive case uses OpenTelemetry Body and Attributes as content carried by one LogRecord while timestamps and trace context remain record fields. OpenTelemetry does not define the Moonweave DiagnosticMessage identity or conveys edge; that mapping is a Moonweave design inference.
    locator: Logs Data Model > Log and Event Record Definition > Body, Severity, Resource, and Attributes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-record-019
    source: eng-observe-opentelemetry-logs
    supports: LogRecord-conveys-DiagnosticMessage boundary case follows OpenTelemetry's separate LogRecord field sets; it does not define Moonweave multi-record DiagnosticMessage synthesis, so rejecting the arbitrary one-record conveys edge is design inference.
    locator: Logs Data Model > Log and Event Record Definition > Body, Severity, Resource, and Attributes
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-record-020
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry defines a LogRecord with distinct Timestamp, ObservedTimestamp, Severity, Body, Resource, and Attributes fields. It does not define Moonweave DiagnosticMessage or LogRecord-conveys-DiagnosticMessage; mapping diagnostic content already present in one record to a separately identified message is a Moonweave design inference that preserves record identity.
    locator: Logs Data Model > Log and Event Record Definition > Body, Severity, Resource, and Attributes
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
