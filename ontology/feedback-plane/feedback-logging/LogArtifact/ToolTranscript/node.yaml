        en: One LogRecord records a tool result but has no logical-call scope, attempt collection, or transcript_id; it is a LogArtifact but not a ToolTranscript.
        ja: 一 LogRecord は tool result を記録しますが論理呼出し範囲、試行集合、transcript_id がなく、LogArtifact でも ToolTranscript ではありません。
      field_values: {}
      related_node_ids:
