        zh: 记录保存同一 tool_call_id 的授权、超时尝试、重试成功与脱敏结果，并具有独立 transcript_id。
        en: A record preserves authorization, a timed-out attempt, a successful retry, and a redacted result for one tool_call_id under an independent transcript_id.
        ja: 記録は一 tool_call_id の認可、timeout 試行、retry 成功、秘匿結果を独立 transcript_id で保持します。
