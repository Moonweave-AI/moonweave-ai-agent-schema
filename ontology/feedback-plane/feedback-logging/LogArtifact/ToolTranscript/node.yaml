schema: moonweave.ai/ontology-node/v1
id: ToolTranscript
kind: concept
status: review
labels:
  zh: 工具调用记录
  en: Tool Transcript
  ja: ツール呼び出し記録
semantics:
  short_definition:
    zh: 工具调用记录是按顺序保存一次逻辑工具调用及其尝试、结果和诊断的日志产物。
    en: A ToolTranscript is a LogArtifact preserving the ordered attempts, results, and diagnostics of one logical tool call.
    ja: ToolTranscript は一つの論理ツール呼出しの試行、結果、診断を順序保存する LogArtifact です。
  definition:
    zh: 工具调用记录是一种 LogArtifact；其种差是围绕一个逻辑工具调用身份，按因果顺序保存请求参数的可披露部分、权限提示、一个或多个 ToolCallAttempt、工具结果、警告/错误、重试与后续观察。它不是单次尝试本身，也不是包含无关工具调用的完整代理会话记录。
    en: A ToolTranscript is a LogArtifact whose differentia is preserving, around one logical tool-call identity and in causal order, the disclosable request arguments, permission prompts, one or more ToolCallAttempts, tool results, warnings or errors, retries, and follow-up observations. It is neither one attempt itself nor a whole agent-session transcript containing unrelated tool calls.
    ja: ToolTranscript は LogArtifact の一種で、一つの論理 tool-call 同一性を中心に、開示可能な要求引数、権限 prompt、一つ以上の ToolCallAttempt、結果、警告・エラー、retry、後続観測を因果順で保存する点で区別されます。一試行そのものでも、無関係な tool call を含む agent session 全体の記録でもありません。
  why_needed:
    zh: 把多次尝试与一个逻辑调用聚合后，审查者才能区分“调用失败后重试成功”与两个无关调用，同时在同一节点查看参数脱敏和结果证据。
    en: Grouping multiple attempts under one logical call lets reviewers distinguish a retry after failure from two unrelated calls while inspecting argument redaction and result evidence on one node.
    ja: 複数試行を一つの論理呼出しにまとめることで、失敗後の retry と無関係な二呼出しを区別し、引数の秘匿と結果証拠を一ノードで審査できます。
  includes:
    - zh: 纳入具有稳定 tool_call_id、至少一次 ToolCallAttempt、因果顺序以及参数/结果披露状态的记录。
      en: Includes a record with stable tool_call_id, at least one ToolCallAttempt, causal ordering, and disclosure state for arguments and results.
      ja: 安定した tool_call_id、少なくとも一つの ToolCallAttempt、因果順、引数・結果の開示状態を持つ記録を含みます。
  excludes:
    - zh: 排除单个 ToolCallAttempt、只含一条无上下文错误的 LogRecord，以及混合多个无关 tool_call_id 的 AgentTranscript。
      en: Excludes one ToolCallAttempt, a context-free single LogRecord, and an AgentTranscript mixing multiple unrelated tool_call_ids.
      ja: 単一 ToolCallAttempt、文脈のない一 LogRecord、無関係な複数 tool_call_id を混ぜる AgentTranscript を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: tool-transcript-single-logical-call
      severity: error
      expression_language: plain
      expression: all transcript entries share one logical tool_call_id and retain causal attempt order
      explanations:
        zh: 工具调用记录的所有条目必须共享一个逻辑 tool_call_id 并保持尝试因果顺序。
        en: All ToolTranscript entries share one logical tool_call_id and retain causal attempt order.
        ja: ToolTranscript の全項目は一つの論理 tool_call_id を共有し、試行の因果順を保持します。
      source_claims:
        - claim-tool-transcript-002
  required_relation_constraints: []
examples:
  - id: ToolTranscript-example-positive-001
    kind: positive
    labels:
      zh: 重试工具记录
      en: Retried tool transcript
      ja: retry 付きツール記録
    scenario_id: null
    descriptions:
      zh: 记录 `transcript/tool-91` 保存同一 tool_call_id 的授权、第一次超时尝试、退避、第二次成功尝试及已脱敏结果，并按因果顺序连接。
      en: Transcript `transcript/tool-91` preserves authorization, a first timed-out attempt, backoff, a second successful attempt, and a redacted result for one tool_call_id in causal order.
      ja: 記録 `transcript/tool-91` は同一 tool_call_id の認可、最初の timeout、backoff、二回目の成功、秘匿済み結果を因果順で保持します。
    field_values:
      artifact_id: log-artifact/transcript-tool-91
      content_digest: sha256:718f3c90
      provenance_ref: provenance/tool-call-91
      transcript_id: transcript/tool-91
      tool_call_id: call-91
      attempt_count: 2
    related_node_ids:
      - ToolTranscript
      - ToolCallAttempt
      - LogArtifact
    related_relation_ids:
      - ToolTranscript-records-ToolCallAttempt
      - ToolTranscript-is_a-LogArtifact
    expected_result:
      zh: 两次尝试解析为一个逻辑工具调用的成员，且失败与成功结果不会被错误覆盖。
      en: Both attempts resolve as members of one logical tool call, with the failed and successful outcomes retained rather than overwritten.
      ja: 二試行は一つの論理 tool call の要素として解決され、失敗・成功結果はいずれも上書きされず保持されます。
    why_valid_or_invalid:
      zh: 稳定调用身份、尝试成员、因果顺序和披露状态完整，符合复合日志产物的种差。
      en: Stable call identity, attempt membership, causal order, and disclosure state are complete, satisfying the composite LogArtifact differentia.
      ja: 安定した呼出し同一性、試行要素、因果順、開示状態が揃い、複合 LogArtifact の種差を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-transcript-003
  - id: ToolTranscript-example-boundary-001
    kind: boundary
    labels:
      zh: 单次尝试边界
      en: Single-attempt boundary
      ja: 単一試行の境界
    scenario_id: null
    descriptions:
      zh: 对象 `attempt/91-1` 只表示一次工具执行及其超时结果，没有逻辑调用范围、其他尝试或整体披露状态，因此是 ToolCallAttempt 而不是 ToolTranscript。
      en: Object `attempt/91-1` represents only one tool execution and its timeout, with no logical-call scope, other attempts, or transcript-level disclosure state, so it is a ToolCallAttempt rather than a ToolTranscript.
      ja: 対象 `attempt/91-1` は一回のツール実行と timeout だけを表し、論理呼出し範囲、他試行、記録全体の開示状態がないため ToolCallAttempt であり ToolTranscript ではありません。
    field_values: {}
    related_node_ids:
      - ToolTranscript
      - ToolCallAttempt
    related_relation_ids:
      - ToolTranscript-records-ToolCallAttempt
    expected_result:
      zh: 该对象保持 ToolCallAttempt 类型，只有被一个具有独立身份的记录包含时才成为记录成员。
      en: The object retains ToolCallAttempt type and becomes a transcript member only when contained by a separately identified transcript.
      ja: 対象は ToolCallAttempt 型を保持し、独立同一性を持つ transcript に包含された場合だけその要素になります。
    why_valid_or_invalid:
      zh: 成员与复合记录不能同级互换；一次执行事实缺少聚合多阶段证据所需的记录身份。
      en: Member and composite record are not interchangeable peers; one execution fact lacks the record identity needed to aggregate multi-stage evidence.
      ja: 要素と複合記録は交換可能な同格ではなく、一実行事実には多段階証拠を集約する記録同一性がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-transcript-004
  - id: ToolTranscript-example-instance-001
    kind: instance
    labels:
      zh: 文件写入记录实例
      en: File-write transcript instance
      ja: ファイル書込記録のインスタンス
    scenario_id: file-write-transcript-44
    descriptions:
      zh: 实例 `transcript/write-44` 记录路径参数的脱敏形式、权限批准、一次 ToolCallAttempt、写入摘要与最终观察，原始敏感正文未存储。
      en: Instance `transcript/write-44` records redacted path arguments, permission approval, one ToolCallAttempt, a write digest, and final observation while omitting sensitive raw content.
      ja: インスタンス `transcript/write-44` は秘匿済み path 引数、権限承認、一 ToolCallAttempt、書込 digest、最終観測を記録し、機密 raw content は保存しません。
    field_values:
      transcript_id: transcript/write-44
      tool_call_id: write-44
      attempt_count: 1
      redaction_state: applied
    related_node_ids:
      - ToolTranscript
      - ToolCallAttempt
      - LogArtifact
    related_relation_ids:
      - ToolTranscript-records-ToolCallAttempt
      - ToolTranscript-is_a-LogArtifact
    expected_result:
      zh: 实例可重建批准与执行顺序，但无法从记录恢复被脱敏的敏感正文。
      en: The instance reconstructs approval and execution order but cannot recover the redacted sensitive content from the transcript.
      ja: 承認と実行順を再構成できますが、秘匿された機密本文は記録から復元できません。
    why_valid_or_invalid:
      zh: 它保留复核所需的逻辑身份和因果证据，同时遵守敏感数据披露边界。
      en: It preserves logical identity and causal evidence needed for review while respecting the sensitive-data disclosure boundary.
      ja: 審査に必要な論理同一性と因果証拠を保持しつつ、機密データ開示境界を守ります。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-tool-transcript-005
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: LogRecord
    shared_parent_concept_id: LogArtifact
    differentia:
      zh: 正向身份比较：父节点 LogArtifact：ToolTranscript（semantic kind=information，骨架 ToolTranscript-is_a-LogArtifact）；LogRecord（semantic kind=information，骨架 LogRecord-is_a-LogArtifact）。双端条件：ToolTranscript 条件：“工具调用记录是一种日志产物（LogArtifact），按顺序保存工具请求、权限提示、工具调用尝试（ToolCallAttempt）的执行、结果、警告与后续观察”；LogRecord 条件：“作为日志产物，日志记录由这一事实区分：它是从轨迹、跨度、事件、诊断消息、警告、错误、工具结果或审计相关观察派生的结构化记录”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent LogArtifact: ToolTranscript (semantic kind=information, backbone ToolTranscript-is_a-LogArtifact); LogRecord (semantic kind=information, backbone LogRecord-is_a-LogArtifact). Endpoint conditions: ToolTranscript condition: “A ToolTranscript is a LogArtifact that preserves the ordered record of tool requests, permission prompts, ToolCallAttempt executions, results, warnings, and follow-up observations”; LogRecord condition: “A LogRecord is a LogArtifact that stores a structured record derived from a trace, span, event, diagnostic message, warning, error, tool result, or audit-relevant observation”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 LogArtifact：ToolTranscript（semantic kind=information、バックボーン ToolTranscript-is_a-LogArtifact）；LogRecord（semantic kind=information、バックボーン LogRecord-is_a-LogArtifact）。両端条件：ToolTranscript の条件：「ツール呼び出し記録はログ情報成果物（LogArtifact）の一種で、ツール要求、権限プロンプト、ツール呼び出し試行（ToolCallAttempt）の実行、結果、警告、後続観測を順序どおり保持します」；LogRecord の条件：「ログ記録はログ情報成果物として、次の条件により他の対象と区別されます：それは、トレース、スパン、イベント、診断メッセージ、警告、エラー、ツール結果、監査関連観測から派生する構造化記録です」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-tool-transcript-006
