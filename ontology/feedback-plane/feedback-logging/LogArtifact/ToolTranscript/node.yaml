    temporal_scope: timeless
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: ToolTranscript 仍由 feedback-plane 拥有，ToolCallAttempt 仍由 tool-plane 拥有；该 information 事实只建立跨域依赖，不转移规范所有权。运行时授权必须由具体 PolicyDecision、AuthorizationGrant 或协议会话证明。
        en: ToolTranscript remains owned by feedback-plane and ToolCallAttempt by tool-plane; this information fact establishes a cross-Domain dependency without transferring canonical ownership. Runtime authority must be evidenced by a concrete PolicyDecision, AuthorizationGrant, or protocol session.
        ja: ToolTranscript は feedback-plane、ToolCallAttempt は tool-plane に引き続き所有されます。この information 事実は正規所有権を移さずドメイン横断依存だけを表し、実行時権限には具体的な PolicyDecision、AuthorizationGrant、またはプロトコルセッションの証拠が必要です。
      protocol_or_resource_context:
        zh: 查询必须沿 ToolTranscript → ToolCallAttempt 的 canonical ID 与该关系自身的来源主张执行；协议版本、资源标识和信任判定保留在两端节点的信息合同中。
