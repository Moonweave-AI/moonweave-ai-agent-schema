    en: ToolTranscript is_a LogArtifact means that a tool transcript inherits stable content, provenance, and reviewability from LogArtifact and is differentiated by aggregating ordered attempts, results, and diagnostics around one logical tool_call_id.
    ja: ToolTranscript is_a LogArtifact は安定内容、来歴、審査可能性を継承し、一論理 tool_call_id を中心に順序付き試行、結果、診断を集約する点を種差とします。
