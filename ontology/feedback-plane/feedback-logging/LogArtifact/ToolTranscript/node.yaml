        en: A single record lacks the differentia of aggregating multi-stage evidence around one logical call.
        ja: 単一記録には一論理呼出し周りの多段階証拠集約という種差がありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-tool-transcript-008
  source_claims:
