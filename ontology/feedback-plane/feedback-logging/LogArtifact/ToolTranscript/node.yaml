      en: records
      ja: 記録する
    definitions:
      zh: ToolTranscript records ToolCallAttempt 表示一次工具调用尝试作为有序证据成员被记录在对应逻辑调用的 transcript 中；该边要求共享 tool_call_id 与明确尝试顺序，不把 transcript 等同于 attempt。
      en: ToolTranscript records ToolCallAttempt means that one tool-call attempt is preserved as an ordered evidence member of the transcript for its logical call; the edge requires a shared tool_call_id and explicit attempt order and does not equate transcript with attempt.
      ja: ToolTranscript records ToolCallAttempt は一 tool-call attempt が対応する論理呼出し transcript の順序付き証拠要素として保存されたことを示し、共有 tool_call_id と試行順を要求し transcript と attempt を同一視しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_records
      labels:
        zh: 反向：记录
        en: is target of records
        ja: 逆方向：記録する
