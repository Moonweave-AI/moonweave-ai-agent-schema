source_claims:
  - id: claim-log-artifact-001
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry's stable Logs Data Model supports the content and provenance properties of LogArtifact. The LogArtifact genus, its LogRecord and ToolTranscript children, and exclusion of TraceExport are Moonweave design inference consistent with OTLP signal separation.
    locator: Logs Data Model > Design Notes and Log and Event Record Definition
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-log-artifact-002
    source: eng-fw-openai-tracing
    supports: OpenAI tracing records generations, function-tool calls, handoffs, guardrails, and custom events, supplying possible source evidence for LogArtifact. It does not assert Moonweave's LogArtifact taxonomy.
    locator: Tracing guide > Default tracing and Sensitive data
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-log-artifact-003
    source: eng-observe-opentelemetry-logs
    supports: The OpenTelemetry Logs Data Model defines each LogRecord as one coherent record with stable content fields but no portable artifact identifier; LogArtifact.artifact_id is Moonweave's independent persistence and reference key over that record boundary.
    locator: Logs Data Model > Log and Event Record Definition > named top-level fields
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-log-artifact-004
    source: eng-observe-opentelemetry-logs
    supports: The OpenTelemetry Logs Data Model requires semantics-preserving representation of record fields across storage and transport. LogArtifact.content_digest is Moonweave's integrity mechanism for the persisted representation and is not a field asserted by OpenTelemetry.
    locator: Logs Data Model > Design Notes > Requirements
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-log-artifact-005
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry LogRecord Resource and InstrumentationScope identify the observed source and emitting scope. LogArtifact.provenance_ref is Moonweave's reference to the fuller lineage record that preserves those source semantics.
    locator: "Logs Data Model > Log and Event Record Definition > Field: Resource; Field: InstrumentationScope"
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-log-artifact-006
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry LogRecord Resource and InstrumentationScope support provenance for LogArtifact; the artifact genus is Moonweave design inference.
    locator: Logs Data Model > Log and Event Record Definition > Resource and InstrumentationScope
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-log-artifact-007
    source: eng-observe-opentelemetry-logs
    supports: LogArtifact-example-positive-001 uses the OpenTelemetry LogRecord source and content fields; classifying the persisted record as LogArtifact is Moonweave design inference.
    locator: Logs Data Model > Log and Event Record Definition > Resource, InstrumentationScope, Severity, and Body
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-log-artifact-008
    source: eng-fw-openai-tracing
    supports: OpenAI tracing records function-tool inputs and outputs in spans, supporting the evidence source in LogArtifact-example-positive-001 without defining LogArtifact.
    locator: Tracing guide > Default tracing and Sensitive data > function spans
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-log-artifact-009
    source: eng-proto-opentelemetry-otlp
    supports: OTLP defines distinct trace and log export requests, directly supporting the signal boundary in LogArtifact-example-boundary-001; Moonweave maps that boundary into its taxonomy.
    locator: OTLP Specification 1.10.0 > OTLP/gRPC > signal-specific Export service requests; OTLP/HTTP Request > signal paths
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-log-artifact-010
    source: eng-fw-openai-tracing
    supports: OpenAI defines traces as workflows composed of spans, supporting the trace side of LogArtifact-example-boundary-001 but not Moonweave's artifact taxonomy.
    locator: Tracing guide > Traces and spans > trace and span properties
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-log-artifact-011
    source: eng-observe-opentelemetry-logs
    supports: LogArtifact-example-instance-001 uses OpenTelemetry log body, severity, resource, and scope semantics; the artifact identifier is Moonweave design inference.
    locator: Logs Data Model > Log and Event Record Definition
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
