schema: moonweave.ai/ontology-node/v1
id: LogArtifact
kind: concept
status: review
labels:
  zh: 日志产物
  en: Log Artifact
  ja: ログ情報成果物
semantics:
  short_definition:
    zh: 日志产物是一种信息记录；其区分条件是：LogArtifact 是从运行、追踪或诊断证据形成、具有稳定内容和出处的它；单条 LogRecord、复合 TraceExport 和迁入的 ToolTranscript 可专业化它。
    en: As an information record, Log Artifact is distinguished by the fact that it is a provenance-bearing information artifact formed from runtime, trace, or diagnostic evidence; individual LogRecord, composite TraceExport, and migrated ToolTranscript can specialize it.
    ja: 情報記録に属するログ情報成果物は、次の事実を種差とします：LogArtifact は実行・トレース・診断証拠から形成され安定内容と由来を持つ情報成果物で、LogRecord・TraceExport・移管 ToolTranscript が特殊化できる。
  definition:
    zh: 日志产物是一类具有稳定内容、可独立引用并携带来源信息的信息对象；其种差是内容来自运行日志或工具交互记录，可被保存、传输和复核。LogRecord 与 ToolTranscript 是它的下位概念；TraceExport 属于遥测导出批次而非日志产物。
    en: A LogArtifact is an information object with stable content, independent referential identity, and provenance whose differentia is being formed from runtime logging or tool-interaction records for storage, transport, and review. LogRecord and ToolTranscript specialize it; TraceExport instead specializes TelemetryExportBatch.
    ja: LogArtifact は、安定した内容、独立に参照できる同一性、来歴を持つ情報対象であり、実行ログまたはツール対話記録から形成され、保存・転送・審査できる点で区別されます。LogRecord と ToolTranscript が下位概念で、TraceExport は TelemetryExportBatch の下位概念です。
  why_needed:
    zh: 该上位概念统一单条结构化日志和围绕工具交互组织的日志记录，同时保留 OTel 对 logs 与 traces 信号的规范分离。
    en: This genus unifies a structured single log and a tool-centered log transcript while preserving OpenTelemetry's normative separation between logs and traces.
    ja: この上位概念は構造化された単一ログとツール中心のログ記録を統合しつつ、OpenTelemetry の logs と traces の規範的分離を保持します。
  includes:
    - zh: 纳入内容被解释为一条或多条日志或事件记录、且保存来源的信息对象，例如 LogRecord 或工具交互记录。
      en: Includes a provenance-bearing information object whose content is interpreted as one or more log or event records, including a LogRecord or a tool-interaction transcript.
      ja: 一件以上のログまたはイベント記録として解釈される内容と来歴を持つ情報対象を含み、LogRecord やツール対話記録が該当します。
  excludes:
    - zh: 排除 TraceExport 与指标批次、身份依赖持续有序交付的 LogStream，以及执行这些对象导出的活动。
      en: Excludes TraceExport and metric batches, live LogStreams whose identity depends on ordered delivery, and the activity that exports any of those objects.
      ja: TraceExport と指標バッチ、継続的な順序配送で同一化される LogStream、およびそれらを出力する活動を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - artifact_id
  fields:
    - id: artifact_id
      labels:
        zh: 日志产物标识
        en: log-artifact ID
        ja: ログ成果物 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一份可独立引用的日志内容产物；它不等同于流位置或导出批次标识。
        en: Stably identifies one independently referenceable log-content artifact; it is neither a stream position nor an export-batch identifier.
        ja: 独立参照できるログ内容成果物を安定識別し、stream 位置や export batch ID とは区別します。
      allowed_values: []
      pattern: null
      example_value: log-artifact/tool-result-19
      source_claims:
        - claim-log-artifact-003
    - id: content_digest
      labels:
        zh: 内容摘要
        en: content digest
        ja: 内容 digest
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对持久化且已执行适用脱敏的日志内容计算的摘要，用于检验同一产物的内容未被替换。
        en: Digest of the persisted, policy-redacted log content used to verify that the referenced artifact content has not been substituted.
        ja: 永続化され適用方針で墨消しされたログ内容の digest で、参照成果物の内容置換を検出します。
      allowed_values: []
      pattern: null
      example_value: sha256:35c1f6a9
      source_claims:
        - claim-log-artifact-004
    - id: provenance_ref
      labels:
        zh: 来源引用
        en: provenance reference
        ja: 来歴参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用产生或汇集该日志内容的资源、仪表作用域与处理链来源记录。
        en: References the provenance record that binds the resource, instrumentation scope, and processing lineage that produced or assembled the log content.
        ja: ログ内容を生成・編成した Resource、InstrumentationScope、処理 lineage を結ぶ来歴記録を参照します。
      allowed_values: []
      pattern: null
      example_value: provenance/runtime-worker-3/tool-result-19
      source_claims:
        - claim-log-artifact-005
  constraints:
    - id: log-artifact-preserves-log-provenance
      severity: error
      expression_language: plain
      expression: a LogArtifact preserves the source and interpretation context of its log content
      explanations:
        zh: 日志产物必须保留日志内容的来源与解释上下文。
        en: A LogArtifact preserves the source and interpretation context of its log content.
        ja: LogArtifact はログ内容の由来と解釈文脈を保持します。
      source_claims:
        - claim-log-artifact-006
  required_relation_constraints: []
examples:
  - id: LogArtifact-example-positive-001
    kind: positive
    labels:
      zh: 日志产物正例
      en: Positive example of Log Artifact
      ja: ログ情報成果物の正例
    scenario_id: null
    descriptions:
      zh: 在一次评估、纠正与改进决策循环中，系统将日志产物（LogArtifact）记录为 LogRecord is_a LogArtifact 的目标端点。其已审查定义是“日志产物是一种信息记录；其区分条件是：LogArtifact 是从运行、追踪或诊断证据形成、具有稳定内容和出处的它；单条 LogRecord、复合 TraceExport 和迁入的 ToolTranscript 可专业化它”。
      en: A persisted tool-result LogRecord retains its source resource, instrumentation scope, occurrence time, severity, and redacted body, so it is a concrete LogArtifact.
      ja: 評価・修正・改善判断のサイクルでは、システムはログ情報成果物（LogArtifact）を LogRecord is_a LogArtifact の終点として記録します。審査済み定義は「情報記録に属するログ情報成果物は、次の事実を種差とします：LogArtifact は実行・トレース・診断証拠から形成され安定内容と由来を持つ情報成果物で、LogRecord・TraceExport・移管 ToolTranscript が特殊化できる」です。
    field_values:
      artifact_id: log-artifact/tool-result-19
      content_digest: sha256:35c1f6a9
      provenance_ref: provenance/runtime-worker-3/tool-result-19
    related_node_ids:
      - LogArtifact
      - LogRecord
    related_relation_ids:
      - LogRecord-is_a-LogArtifact
    expected_result:
      zh: 该运行可查询 LogArtifact 以及方向保持不变的事实 LogRecord-is_a-LogArtifact。
      en: The run can query LogArtifact together with direction-preserving fact LogRecord-is_a-LogArtifact.
      ja: この実行では LogArtifact と方向を保持した事実 LogRecord-is_a-LogArtifact を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、LogRecord-is_a-LogArtifact 的 canonical 方向、概念定义和可用字段值。
      en: The object carries stable log content and provenance, satisfying the genus independently of its more specific LogRecord type.
      ja: このシナリオは実際の運用文脈、LogRecord-is_a-LogArtifact の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-log-artifact-007
      - claim-log-artifact-008
  - id: LogArtifact-example-boundary-001
    kind: boundary
    labels:
      zh: 日志产物边界例
      en: Boundary case for Log Artifact
      ja: ログ情報成果物の境界例
    scenario_id: null
    descriptions:
      zh: LogRecord 用作LogArtifact的边界对照：两者可见于同一图谱片段，但 LogRecord 的已审查定义是“作为日志产物，日志记录由这一事实区分：它是从轨迹、跨度、事件、诊断消息、警告、错误、工具结果或审计相关观察派生的结构化记录。”。不能因 relation LogRecord-is_a-LogArtifact 而把它归入LogArtifact。
      en: An OTLP trace export containing ResourceSpans and ScopeSpans has provenance but its signal semantics are trace rather than log, so it is a TraceExport and TelemetryExportBatch, not a LogArtifact.
      ja: LogRecord は LogArtifact の境界対照です。同じグラフ断片に現れ得ますが、LogRecord の審査済み定義は「ログ記録はログ情報成果物として、次の条件により他の対象と区別されます：それは、トレース、スパン、イベント、診断メッセージ、警告、エラー、ツール結果、監査関連観測から派生する構造化記録です。」です。relation LogRecord-is_a-LogArtifact だけで LogArtifact にはなりません。
    field_values: {}
    related_node_ids:
      - LogArtifact
      - LogRecord
    related_relation_ids:
      - LogRecord-is_a-LogArtifact
    expected_result:
      zh: LogRecord 保持其原有类型，验证器不得凭关系共现把它提升为 LogArtifact。
      en: LogRecord retains its own type; validation must not promote it to LogArtifact from relation co-occurrence.
      ja: LogRecord は元の型を維持し、関係の共起だけで LogArtifact へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 LogRecord-is_a-LogArtifact 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: "Provenance alone is insufficient: the object's trace-signal payload violates the log-semantic differentia of LogArtifact."
      ja: 境界例は実在する対照ノードを示し、LogRecord-is_a-LogArtifact の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-log-artifact-009
      - claim-log-artifact-010
  - id: LogArtifact-example-instance-001
    kind: instance
    labels:
      zh: 日志产物实例
      en: Log-artifact instance
      ja: ログ成果物のインスタンス
    scenario_id: tool-result-log
    descriptions:
      zh: 实例 `log-artifact/tool-result-19` 保存已脱敏工具结果、发生时间、严重度与来源范围。
      en: Instance `log-artifact/tool-result-19` preserves a redacted tool result together with occurrence time, severity, and source scope.
      ja: インスタンス `log-artifact/tool-result-19` は墨消し済みツール結果、発生時刻、重大度、出典スコープを保持します。
    field_values:
      artifact_id: log-artifact/tool-result-19
      signal: logs
    related_node_ids:
      - LogArtifact
      - LogRecord
    related_relation_ids:
      - LogRecord-is_a-LogArtifact
    expected_result:
      zh: 对象作为 LogArtifact 查询且保留 LogRecord 特化类型。
      en: The object is queryable as LogArtifact while retaining its LogRecord subtype.
      ja: 対象は LogArtifact として検索でき、LogRecord 下位型も保持します。
    why_valid_or_invalid:
      zh: 内容属于日志信号，并具有稳定内容和来源。
      en: Its content belongs to the log signal and has stable content and provenance.
      ja: 内容はログ信号に属し、安定内容と来歴を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-log-artifact-011
