source_claims:
  - id: claim-log-subscription-001
    source: eng-std-opentelemetry-logs-sdk
    supports: LogSubscription is informed by OpenTelemetry LoggerProvider registration and ordering of LogRecordProcessors and the Logger.Enabled filtering hook. OpenTelemetry does not define a durable LogSubscription object; Moonweave introduces that specification as design inference.
    locator: Logs SDK > LoggerProvider > Configuration; LogRecordProcessor > Enabled
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-subscription-002
    source: eng-std-opentelemetry-logs-sdk
    supports: The Logs SDK makes provider configuration independently updateable and applicable to existing loggers. Moonweave therefore gives each durable LogSubscription stream-to-listener configuration its own identifier; OpenTelemetry does not prescribe this identifier.
    locator: Logs SDK 1.59.0 > LoggerProvider > Configuration and configuration updates
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-subscription-003
    source: eng-std-opentelemetry-logs-sdk
    supports: OpenTelemetry separates emitted LogRecords, provider configuration, processor pipelines, and exporters. The explicit LogSubscription.stream_ref is Moonweave's information-source binding derived from that separation.
    locator: Logs SDK 1.59.0 > LoggerProvider; LogRecordProcessor; LogRecordExporter
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-subscription-004
    source: eng-std-opentelemetry-logs-sdk
    supports: The Logs SDK registers LogRecordProcessors as handling hooks in provider-owned pipelines. Moonweave's LogSubscription.listener_ref records which handling role a subscription configures without treating the subscription as that role.
    locator: Logs SDK 1.59.0 > LogRecordProcessor and processor registration on LoggerProvider
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-subscription-005
    source: eng-std-opentelemetry-logs-sdk
    supports: LoggerConfig normatively supports enabled state, minimum severity, and trace-based filtering before record processing. Moonweave generalizes those selectors into one explicit LogSubscription.selection_expression.
    locator: Logs SDK 1.59.0 > Logger > LoggerConfig and filtering before processing
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-log-subscription-006
    source: eng-std-opentelemetry-logs-sdk
    supports: The Logs SDK distinguishes simple immediate processing from batching processors and exporter pipelines. LogSubscription.delivery_mode captures the selected policy; at-least-once terminology is a Moonweave extension, not an OpenTelemetry guarantee.
    locator: Logs SDK 1.59.0 > LogRecordProcessor > Simple processor and Batching processor
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-subscription-007
    source: eng-std-opentelemetry-logs-sdk
    supports: LoggerProvider configuration may be updated, and Shutdown and ForceFlush have explicit lifecycle behavior. Moonweave uses LogSubscription.lifecycle_condition to make the lifetime of one subscription specification explicit.
    locator: Logs SDK 1.59.0 > LoggerProvider > Configuration, Shutdown, and ForceFlush
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
