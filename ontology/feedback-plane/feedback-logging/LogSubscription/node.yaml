schema: moonweave.ai/ontology-node/v1
id: LogSubscription
kind: concept
status: accepted
labels:
  zh: 日志订阅
  en: log subscription
  ja: ログ購読
semantics:
  short_definition:
    zh: 日志订阅是把日志流、监听器、选择条件与交付生命周期绑定起来的规范。
    en: A LogSubscription is a specification binding a log stream, listener, selection rule, and delivery lifecycle.
    ja: LogSubscription はログストリーム、リスナー、選択条件、配送ライフサイクルを結ぶ仕様です。
  definition:
    zh: 日志订阅是一种配置规范；其种差是把一个 LogStream 与一个 LogListener 绑定，并声明记录选择条件、交付模式、激活状态和取消/失效条件。它决定哪些记录触发哪个监听角色，但自身不观察、接收或处理记录。
    en: A LogSubscription is a configuration specification whose differentia is binding one LogStream to one LogListener while declaring record-selection criteria, delivery mode, activation state, and cancellation or expiry conditions. It determines which records activate which listener role but does not itself observe, receive, or process records.
    ja: LogSubscription は構成仕様の一種で、一つの LogStream と一つの LogListener を結び、記録選択条件、配送方式、活性状態、取消・失効条件を宣言する点で区別されます。どの記録がどの listener 役割を起動するかを定めますが、自ら観測・受信・処理はしません。
  why_needed:
    zh: 把订阅作为独立规范可在不改变监听器身份的情况下启停、替换或版本化绑定，并把配置事实与运行时消费行为清楚分开。
    en: Treating subscription as an independent specification permits activation, replacement, and versioning of a binding without changing listener identity, separating configuration facts from runtime consumption behavior.
    ja: 購読を独立仕様にすると listener の同一性を変えずに結合を有効化・置換・版管理でき、構成事実と実行時消費行動を分離できます。
  includes:
    - zh: 纳入明确给出 stream_id、listener_id、选择条件、交付模式与生命周期状态的绑定规范。
      en: Includes a binding specification that states stream_id, listener_id, selection predicate, delivery mode, and lifecycle state.
      ja: stream_id、listener_id、選択条件、配送方式、ライフサイクル状態を明記する結合仕様を含みます。
  excludes:
    - zh: 排除实际执行到达处理的 LogListener、保存有序记录的 LogStream，以及只描述导出端点而不绑定监听器的配置。
      en: Excludes the LogListener that performs arrival handling, the LogStream that stores ordered records, and exporter endpoint configuration that binds no listener.
      ja: 到着処理を行う LogListener、順序付き記録を保持する LogStream、listener を結ばない exporter endpoint 構成を除外します。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - subscription_id
  fields:
    - id: subscription_id
      labels:
        zh: 订阅标识
        en: subscription ID
        ja: 購読 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在重新配置、停用和审计之间稳定标识同一条日志订阅规范。
        en: Stably identifies the same log-subscription specification across reconfiguration, deactivation, and audit.
        ja: 再構成・無効化・監査をまたいで同じ log subscription 仕様を安定識別します。
      allowed_values: []
      pattern: null
      example_value: sub/errors-3
      source_claims:
        - claim-log-subscription-002
    - id: stream_ref
      labels:
        zh: 日志流引用
        en: log-stream reference
        ja: log stream 参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指出被选择记录所在的 LogStream；它不是监听器或导出目的地。
        en: Identifies the LogStream whose records are selected; it is neither the listener nor the export destination.
        ja: 選択対象 record が属する LogStream を示し、listener や export destination とは区別します。
      allowed_values: []
      pattern: null
      example_value: stream/runtime-3
      source_claims:
        - claim-log-subscription-003
    - id: listener_ref
      labels:
        zh: 监听器引用
        en: listener reference
        ja: listener 参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指出满足选择条件时被触发的 LogListener 角色。
        en: Identifies the LogListener role triggered when the selection condition is satisfied.
        ja: 選択条件成立時に起動される LogListener role を示します。
      allowed_values: []
      pattern: null
      example_value: listener/error-3
      source_claims:
        - claim-log-subscription-004
    - id: selection_expression
      labels:
        zh: 选择表达式
        en: selection expression
        ja: 選択式
      datatype: expression
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 对严重度、仪表作用域、属性或追踪采样状态求值，以判断某条记录是否进入该订阅。
        en: Evaluates severity, instrumentation scope, attributes, or trace-sampling state to decide whether a record enters the subscription.
        ja: severity・instrumentation scope・attribute・trace sampling state を評価し record を購読対象にするか決めます。
      allowed_values: []
      pattern: null
      example_value: severity_number >= ERROR
      source_claims:
        - claim-log-subscription-005
    - id: delivery_mode
      labels:
        zh: 交付方式
        en: delivery mode
        ja: 配送方式
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明匹配记录以同步、批量或实现定义的可靠性交给监听角色；不得把它误读为记录严重度。
        en: Declares whether matching records reach the listener synchronously, in batches, or with an implementation-defined reliability mode; it is not record severity.
        ja: 一致 record を同期・batch・実装定義 reliability で listener へ渡すかを示し、record severity とは区別します。
      allowed_values: []
      pattern: null
      example_value: at-least-once
      source_claims:
        - claim-log-subscription-006
    - id: lifecycle_condition
      labels:
        zh: 生命周期条件
        en: lifecycle condition
        ja: ライフサイクル条件
      datatype: expression
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规定订阅何时激活、暂停、取消或随会话终止失效。
        en: States when the subscription activates, pauses, is cancelled, or expires with a session.
        ja: 購読の有効化・一時停止・取消・session 終了時失効を定めます。
      allowed_values: []
      pattern: null
      example_value: active until runtime-session-3 ends
      source_claims:
        - claim-log-subscription-007
  constraints:
    - id: log-subscription-binds-stream-listener
      severity: error
      expression_language: plain
      expression: a LogSubscription binds one LogStream to one LogListener and declares an activation state
      explanations:
        zh: 日志订阅必须绑定一个日志流与一个监听器并声明激活状态。
        en: A LogSubscription binds one LogStream to one LogListener and declares an activation state.
        ja: LogSubscription は一つの LogStream と LogListener を結び、活性状態を宣言します。
      source_claims:
        - claim-log-subscription-008
  required_relation_constraints: []
examples:
  - id: LogSubscription-example-positive-001
    kind: positive
    labels:
      zh: 错误记录订阅
      en: Error-record subscription
      ja: エラー記録購読
    scenario_id: null
    descriptions:
      zh: 订阅 `sub/errors-3` 将 `stream/runtime-3` 绑定至 `listener/error-3`，选择 SeverityNumber ≥ ERROR 的记录，采用 at-least-once 交付，并在运行结束时失效。
      en: Subscription `sub/errors-3` binds `stream/runtime-3` to `listener/error-3`, selects records with SeverityNumber at least ERROR, uses at-least-once delivery, and expires when the run ends.
      ja: 購読 `sub/errors-3` は `stream/runtime-3` と `listener/error-3` を結び、SeverityNumber が ERROR 以上の記録を at-least-once で配送し、実行終了時に失効します。
    field_values:
      subscription_id: sub/errors-3
      stream_ref: stream/runtime-3
      listener_ref: listener/error-3
      selection_expression: severity_number >= ERROR
      delivery_mode: at-least-once
      lifecycle_condition: active until the bound runtime run ends
      state: active
    related_node_ids:
      - LogSubscription
      - LogStream
      - LogListener
      - ErrorListener
    related_relation_ids:
      - log_subscription_registers_listener
      - LogSubscription-configures-LogListener
    expected_result:
      zh: 只有满足严重度条件且订阅有效期间到达的记录被交给目标监听器。
      en: Only records satisfying the severity predicate and arriving while the subscription is active are delivered to the target listener.
      ja: 重大度条件を満たし購読が有効な間に到着した記録だけが対象 listener へ配送されます。
    why_valid_or_invalid:
      zh: 流、监听器、条件、模式和生命周期全部明确，且规范本身不冒充处理角色。
      en: Stream, listener, predicate, mode, and lifecycle are all explicit, and the specification does not masquerade as the processing role.
      ja: stream、listener、条件、方式、ライフサイクルが明示され、仕様自体を処理役割とはしていません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-log-subscription-009
  - id: LogSubscription-example-boundary-001
    kind: boundary
    labels:
      zh: 监听器对象边界
      en: Listener-object boundary
      ja: listener 対象の境界
    scenario_id: null
    descriptions:
      zh: "`listener/error-3` 实现到达处理并持有错误判定逻辑，但若没有独立的流绑定、激活状态和取消条件，该对象是 LogListener 而不是 LogSubscription。"
      en: "`listener/error-3` implements arrival handling and an error predicate, but without a separate stream binding, activation state, and cancellation condition it is a LogListener rather than a LogSubscription."
      ja: "`listener/error-3` は到着処理とエラー条件を実装しますが、別個の stream 結合、活性状態、取消条件がなければ LogListener であり LogSubscription ではありません。"
    field_values:
      subscription_id: sub/errors-3
      stream_ref: stream/runtime-3
      listener_ref: listener/error-3
      selection_expression: severity_number >= ERROR
      delivery_mode: at-least-once
      lifecycle_condition: active until runtime-session-3 ends
    related_node_ids:
      - LogSubscription
      - LogListener
    related_relation_ids:
      - LogSubscription-configures-LogListener
    expected_result:
      zh: 监听器保持角色类型；系统不得从其内部过滤逻辑推造一个订阅规范。
      en: The listener retains its role type; the system must not invent a subscription specification from its internal filtering logic.
      ja: listener は役割型を保持し、内部の絞込みロジックから購読仕様を捏造してはなりません。
    why_valid_or_invalid:
      zh: 处理行为与配置规范具有不同身份条件，内部条件不能替代可管理的绑定和生命周期。
      en: Processing behavior and configuration specification have different identity conditions; an internal predicate does not replace a manageable binding and lifecycle.
      ja: 処理行動と構成仕様は同一性条件が異なり、内部条件は管理可能な結合とライフサイクルの代わりになりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-log-subscription-010
  - id: LogSubscription-example-instance-001
    kind: instance
    labels:
      zh: 工具拒绝订阅实例
      en: Tool-denial subscription instance
      ja: ツール拒否購読のインスタンス
    scenario_id: tool-denial-subscription-12
    descriptions:
      zh: 实例 `sub/tool-denial-12` 绑定工具事件流与安全监听器，匹配 EventName `tool.permission.denied`，状态为 active，取消条件为运行关闭。
      en: Instance `sub/tool-denial-12` binds the tool-event stream to a security listener, matches EventName `tool.permission.denied`, is active, and cancels when the run closes.
      ja: インスタンス `sub/tool-denial-12` はツールイベント stream と security listener を結び、EventName `tool.permission.denied` を選択し、active で実行終了時に取消されます。
    field_values:
      subscription_id: sub/tool-denial-12
      predicate: EventName == tool.permission.denied
      state: active
    related_node_ids:
      - LogSubscription
      - LogStream
      - LogListener
    related_relation_ids:
      - log_subscription_registers_listener
      - log_listener_subscribes_to_stream
    expected_result:
      zh: 运行关闭前匹配记录触发监听器，关闭后到达的同名事件不再由该订阅交付。
      en: Matching records activate the listener before run closure; same-name events arriving afterward are no longer delivered by this subscription.
      ja: 実行終了前は一致記録が listener を起動し、終了後の同名イベントはこの購読から配送されません。
    why_valid_or_invalid:
      zh: 该实例给出可验证的绑定、选择条件、状态和失效时点，完整满足订阅规范。
      en: The instance provides a verifiable binding, selection predicate, state, and expiry point, fully satisfying the subscription specification.
      ja: 検証可能な結合、選択条件、状態、失効時点を備え、購読仕様を完全に満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-log-subscription-011
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: log_subscription_registers_listener
    predicate: log_subscription_registers_listener
    direction: source-to-target
    relation_kind: information
    labels:
      zh: log subscription registers listener
      en: log subscription registers listener
      ja: log subscription registers listener
    definitions:
      zh: LogSubscription registers LogListener 表示订阅规范被运行时激活并把一个监听器实例登记到交付管线；它记录注册生命周期事件，区别于规范长期配置监听器属性。
      en: LogSubscription registers LogListener means that the subscription specification is activated and a listener instance is registered with the delivery pipeline; it records a lifecycle event distinct from the specification's longer-lived configuration of listener behavior.
      ja: LogSubscription registers LogListener は購読仕様が活性化され listener instance が配送 pipeline に登録されたことを示します。listener 行動の長期構成とは別の lifecycle event です。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_log_subscription_registers_listener
      labels:
        zh: 反向：log subscription registers listener
        en: is target of log subscription registers listener
        ja: 逆方向：log subscription registers listener
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: log_subscription_registers_listener-example-positive-001
        kind: positive
        labels:
          zh: 监听器激活注册
          en: Listener activation registration
          ja: listener 活性登録
        scenario_id: null
        descriptions:
          zh: 订阅 `sub/errors-3` 从 pending 变为 active，运行时将 `listener/error-3` 加入处理器链并记录注册时间。
          en: Subscription `sub/errors-3` transitions from pending to active, and the runtime adds `listener/error-3` to the processor chain with a registration time.
          ja: 購読 `sub/errors-3` が pending から active へ移り、runtime が `listener/error-3` を processor chain に登録時刻付きで追加します。
        field_values: {}
        related_node_ids:
          - LogSubscription
          - LogListener
        related_relation_ids:
          - log_subscription_registers_listener
        expected_result:
          zh: 生成一条 registers 边及激活时间，取消订阅时该运行绑定可终止。
          en: A registers edge and activation time are recorded, and the runtime binding may terminate when the subscription is cancelled.
          ja: registers 辺と活性時刻を記録し、購読取消時に実行 binding を終了できます。
        why_valid_or_invalid:
          zh: 存在明确状态转移和运行时登记事实，不只是静态配置。
          en: An explicit state transition and runtime registration fact exist, not merely static configuration.
          ja: 明示状態遷移と runtime 登録事実があり、静的構成だけではありません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-log-subscription-012
      - id: log_subscription_registers_listener-example-boundary-001
        kind: boundary
        labels:
          zh: 未激活配置边界
          en: Inactive-configuration boundary
          ja: 未活性構成の境界
        scenario_id: null
        descriptions:
          zh: 订阅草案列出 `listener/error-3` 的过滤条件，但状态仍为 disabled，运行时处理器链中没有该监听器。
          en: A draft subscription lists filters for `listener/error-3`, but its state remains disabled and the listener is absent from the runtime processor chain.
          ja: 購読 draft は `listener/error-3` の filter を列挙しますが disabled のままで runtime processor chain に listener はありません。
        field_values: {}
        related_node_ids:
          - LogSubscription
          - LogListener
        related_relation_ids:
          - log_subscription_registers_listener
        expected_result:
          zh: 可以保留 configures 关系，但不创建 registers 运行边。
          en: The configures relation may remain, but no runtime registers edge is created.
          ja: configures 関係は保持できますが runtime registers 辺は作りません。
        why_valid_or_invalid:
          zh: 声明配置与实际激活是不同层次，未发生注册状态转移。
          en: Declared configuration and actual activation are different levels, and no registration transition occurred.
          ja: 宣言構成と実際の活性化は別層で、登録遷移が起きていません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-log-subscription-013
    source_claims:
      - claim-log-subscription-014
    distinct_fact_rationale:
      zh: registers_listener 记录监听器加入订阅的成员事实；configures 记录订阅向该监听器施加的过滤、投递或保留配置。
      en: registers_listener records listener membership in the subscription; configures records the filtering, delivery, or retention settings applied to that listener.
      ja: registers_listener は listener の購読参加を、configures はその listener に適用する filter・配信・保持設定を記録します。
    layout_role: cross-link
    review_status: accepted
    target: concept:LogListener
  - id: LogSubscription-configures-LogListener
    predicate: configures
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: configures
      en: configures
      ja: configures
    definitions:
      zh: LogSubscription configures LogListener 表示订阅规范声明监听器应使用的流绑定、选择条件、交付模式与生命周期；该治理边描述规范约束，区别于运行时 registers 激活事件。
      en: LogSubscription configures LogListener means that the subscription specification declares the listener's stream binding, selection predicate, delivery mode, and lifecycle; this governance edge describes normative configuration, distinct from the runtime registers activation event.
      ja: LogSubscription configures LogListener は購読仕様が listener の stream 結合、選択条件、配送方式、lifecycle を宣言することを示し、runtime registers 活性 event とは別の規範構成辺です。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_configures
      labels:
        zh: 反向：configures
        en: is target of configures
        ja: 逆方向：configures
    conditions:
      - id: LogSubscription-configures-LogListener-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the subscription record names the same LogListener identity whose selection, delivery mode, activation state, and cancellation boundary it configures; a listener merely registered in the same provider is insufficient.
        explanations:
          zh: 仅当订阅记录明确指向同一个 LogListener，并为其给出选择条件、交付模式、激活状态与取消边界时成立；仅在同一 provider 中注册过该 listener 不足以建立此边。
          en: Assert only when the subscription record names the same LogListener identity whose selection, delivery mode, activation state, and cancellation boundary it configures; a listener merely registered in the same provider is insufficient.
          ja: subscription record が同じ LogListener ID を明示し、その selection・delivery mode・activation state・cancellation boundary を設定するときだけ成立します。同じ provider に登録されただけの listener には成立しません。
        source_claims:
          - claim-log-subscription-015
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: LogSubscription-configures-LogListener-example-positive-001
        kind: positive
        labels:
          zh: 错误过滤配置
          en: Error-filter configuration
          ja: error filter 構成
        scenario_id: null
        descriptions:
          zh: 订阅 `sub/errors` 为 `listener/errors` 声明 Severity ≥ ERROR、at-least-once 交付和运行结束失效。
          en: Subscription `sub/errors` declares Severity at least ERROR, at-least-once delivery, and run-end expiry for `listener/errors`.
          ja: 購読 `sub/errors` は `listener/errors` に Severity ERROR 以上、at-least-once 配送、run 終了失効を宣言します。
        field_values: {}
        related_node_ids:
          - LogSubscription
          - LogListener
        related_relation_ids:
          - LogSubscription-configures-LogListener
