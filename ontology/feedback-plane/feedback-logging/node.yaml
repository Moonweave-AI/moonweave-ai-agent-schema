  key_notion:
    zh: 记录、流、订阅与导出链
    en: record, stream, subscription, and export chain
    ja: 記録・stream・subscription・export 連鎖
  owns_when:
    zh: 当对象是具有日志格式与出处的持久记录、有序日志流、消费者或订阅关系、一次遥测导出活动、其不可变批次载荷，或流的交付/完整性/留存机制时，由本模块拥有。
    en: Own an object when it is a persistent record with log format and provenance, an ordered log stream, a consumer or subscription relation, one telemetry export activity, its immutable batch payload, or stream delivery, integrity, or retention mechanics.
    ja: 対象がログ形式と来歴を持つ永続記録・順序付き log stream・consumer／subscription relation・一回の telemetry export activity・不変 batch payload・stream delivery／integrity／retention 機構である場合に所有します。
  references_when:
    zh: Trace、Span、Measurement、DiagnosticEvent、AuditEvidence 或运行产物作为被记录、流转或导出的内容时引用其规范所有者；本模块保存成员引用、流位置与传输证据，不复制源对象语义。
    en: When a Trace, Span, Measurement, DiagnosticEvent, AuditEvidence, or runtime Artifact is logged, streamed, or exported, reference its canonical owner. This module preserves membership references, stream position, and transport evidence without copying source semantics.
    ja: Trace・Span・Measurement・DiagnosticEvent・AuditEvidence・runtime Artifact が記録・streaming・export 対象になる場合は正規所有者を参照します。本モジュールは要素参照・stream position・transport evidence を保存し、元意味を複製しません。
  boundary_decisions:
    - other_module_id: runtime-observability
      subject_concept_ids:
        - AuditLog
        - EventSink
        - LogRecord
        - LogStream
        - TraceExportActivity
      decision: owns
      owner_module_id: feedback-logging
      rationale:
        zh: 本边界完整投影五条已接受跨模块事实：AuditLog 收纳 AuditRecord，EventSink 接收 TelemetryEvent，TelemetryEvent 进入 LogStream，TraceEvent 记录为 LogRecord，TraceExportActivity 消费 TraceRecord。两条绕过导出活动的 TraceRecord/TraceSpan 到 TraceExport 直接边已经弃用，因此反馈日志侧的 owner 端点严格为 AuditLog、EventSink、LogRecord、LogStream 与 TraceExportActivity。
        en: "This boundary completely projects five accepted cross-module facts: AuditLog contains AuditRecord, EventSink receives TelemetryEvent, TelemetryEvent is emitted to LogStream, TraceEvent is recorded as LogRecord, and TraceExportActivity consumes TraceRecord. The direct TraceRecord/TraceSpan-to-TraceExport edges that bypassed the export activity are deprecated, so the feedback-logging owner endpoints are exactly AuditLog, EventSink, LogRecord, LogStream, and TraceExportActivity."
        ja: この境界は五つの承認済みモジュール間事実を完全に投影します。AuditLog は AuditRecord を含み、EventSink は TelemetryEvent を受信し、TelemetryEvent は LogStream に出力され、TraceEvent は LogRecord として記録され、TraceExportActivity は TraceRecord を消費します。出力活動を迂回する TraceRecord/TraceSpan から TraceExport への直接辺は廃止済みであり、feedback-logging 側の owner endpoint は AuditLog、EventSink、LogRecord、LogStream、TraceExportActivity に限られます。
      relation_ids:
        - AuditLog-contains-AuditRecord
        - EventSink-receives-TelemetryEvent
        - telemetry_event_emitted_to_log_stream
        - trace_event_recorded_as_log_record
        - TraceExportActivity-consumes-TraceRecord
      relation_not_applicable_reason: null
      source_claims:
        - claim-feedback-logging-009
        - claim-feedback-logging-010
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-feedback-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 领域复核确认反馈日志侧的完整端点集合是 AuditLog、EventSink、LogRecord、LogStream 与 TraceExportActivity；TraceExport 是活动产物，不再由已弃用的直接跨界边带入本行。
              en: Domain review confirms that the complete feedback-logging endpoint set is AuditLog, EventSink, LogRecord, LogStream, and TraceExportActivity; TraceExport is the activity output and is no longer introduced by a deprecated direct boundary edge.
              ja: ドメイン審査により feedback-logging 側の完全な endpoint 集合は AuditLog、EventSink、LogRecord、LogStream、TraceExportActivity と確認されました。TraceExport は活動の成果物であり、廃止済み直接境界辺から本行へ導入しません。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
