      semantic_area:
        zh: 遥测记录与原始运行事件
        en: Telemetry records versus original runtime events
        ja: テレメトリ記録と元の実行イベント
      candidate_concept_ids:
        - AuditLog
        - EventSink
      overlap_reason:
        zh: 两者都携带时间与属性，但 TraceEvent 的身份来自运行发生，LogRecord 的身份来自记录与传输位置。 本条仅记录 AuditLog、EventSink；其 canonical owner 是日志与遥测（feedback-logging），因此 feedback-logging 在此拥有这些概念。
        en: Both carry time and attributes, but TraceEvent identity comes from runtime occurrence while LogRecord identity comes from recording and transport position. This record is limited to AuditLog, EventSink; their canonical owner is Logging and telemetry (feedback-logging), so feedback-logging owns these concepts here.
        ja: どちらも時刻と属性を持ちますが、TraceEvent の同一性は実行発生、LogRecord の同一性は記録・転送位置に由来します。 この記録は AuditLog、EventSink だけを対象とし、canonical owner はログとテレメトリ（feedback-logging）です。したがって feedback-logging はここでこれらを所有します。
      disambiguation_test:
        zh: 若删除流、分区和 Sink 后事实仍是完整的运行发生记录，则归追踪与检查点；若身份依赖记录序列或导出批次，则归日志与遥测。
        en: If removing stream, partition, and sink leaves a complete runtime occurrence, it belongs to tracing and checkpoints; if identity depends on record sequence or export batch, it belongs to logging and telemetry.
        ja: ストリーム、区画、Sink を除いても完全な実行発生記録ならトレースとチェックポイント、同一性が記録列または出力バッチに依存すればログとテレメトリに属します。
