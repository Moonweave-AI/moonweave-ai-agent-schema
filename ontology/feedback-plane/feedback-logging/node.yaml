schema: moonweave.ai/ontology-node/v1
id: feedback-logging
kind: module
status: accepted
labels:
  zh: 日志、遥测传输与留存
  en: Logging, telemetry transport, and retention
  ja: ログ・テレメトリ転送・保持
semantics:
  short_definition:
    zh: 描述运行与治理信息怎样被封装为日志记录、组织成有序流、由消费者订阅，并作为明确批次导出和长期留存。它区分持久日志内容、持续日志流、订阅关系、消费端、导出活动和导出载荷；Trace、Measurement 与诊断事件的原始语义仍由各自模块拥有。
    en: Describes how runtime and governance information is packaged as log records, organized into ordered streams, subscribed to by consumers, exported in explicit batches, and retained. It separates persistent log content, live streams, subscriptions, consumers, export activities, and export payloads; the source semantics of Traces, Measurements, and diagnostic events remain with their owning modules.
    ja: 実行・統制情報をログ記録へ封装し、順序付き stream に編成し、consumer が購読し、明示 batch として出力・長期保持する方法を表します。永続ログ内容・継続 stream・subscription・consumer・export activity・export payload を分離し、Trace・Measurement・diagnostic event の元意味は各所有モジュールに残します。
  definition:
    zh: 六个直属根承担不同职责：LogArtifact 是可独立引用的日志内容，LogStream 是按稳定流身份组织的有序记录集合，LogSubscription 记录消费者对流的过滤、游标和交付约定，LogConsumer 表示接收端，TelemetryExportActivity 是一次有时界的导出发生，TelemetryExportBatch 是该发生提交的不可变载荷。流的保留期限、删除动作与完整性约束属于本模块的留存机制；隐私、脱敏与法律约束引用安全治理。原始 Trace、Span、Measurement 或 DiagnosticEvent 被记录或导出后并不变成日志本体的语义副本。
    en: The six direct roots have distinct responsibilities. LogArtifact is independently referenceable log content; LogStream is an ordered record collection under stable stream identity; LogSubscription records a consumer's filter, cursor, and delivery agreement; LogConsumer is the receiving endpoint; TelemetryExportActivity is a time-bounded export occurrence; and TelemetryExportBatch is its immutable submitted payload. Stream retention periods, deletion actions, and integrity constraints belong to this module's retention mechanics, while privacy, redaction, and legal constraints reference safety governance. A source Trace, Span, Measurement, or DiagnosticEvent does not become a semantic duplicate merely because it is logged or exported.
    ja: 六つの直下根は異なる責務を持ちます。LogArtifact は独立参照可能なログ内容、LogStream は安定 stream 同一性下の順序付き記録集合、LogSubscription は consumer の filter・cursor・delivery 契約、LogConsumer は受信端、TelemetryExportActivity は時間範囲を持つ export 発生、TelemetryExportBatch はその不変送信 payload です。stream の保持期間・削除 action・完全性制約は本モジュールの保持機構、privacy・redaction・法的制約は safety governance を参照します。Trace・Span・Measurement・DiagnosticEvent は記録・出力されても意味的複製にはなりません。
  why_needed:
    zh: 在不改变源对象语义的前提下，可靠保存和传输运行证据，并能回答一条记录来自哪里、位于哪个流、由谁订阅、在哪次导出中发送以及按什么规则留存。
    en: Reliably preserves and transports runtime evidence without changing source semantics and answers where a record came from, which stream contains it, who subscribed, which export sent it, and which retention rules apply.
    ja: 元対象の意味を変えず実行証拠を確実に保存・転送し、記録の出所・所属 stream・購読者・送信 export・適用保持規則を回答します。
  includes:
    - zh: LogArtifact 及 LogRecord、ToolTranscript 等具有稳定内容和出处的日志专门类型。
      en: LogArtifact and log specializations such as LogRecord and ToolTranscript with stable content and provenance.
      ja: 安定内容と来歴を持つ LogArtifact、および LogRecord・ToolTranscript などのログ特殊型。
    - zh: LogStream、AuditLog、LogConsumer、EventSink、LogSubscription，以及流游标、过滤、交付、完整性和留存机制。
      en: LogStream, AuditLog, LogConsumer, EventSink, LogSubscription, and stream cursor, filtering, delivery, integrity, and retention mechanics.
      ja: LogStream・AuditLog・LogConsumer・EventSink・LogSubscription と stream cursor・filter・delivery・integrity・retention 機構。
    - zh: TelemetryExportActivity 与不可变 TelemetryExportBatch，以及批次对 LogRecord、Measurement 或 Trace 数据的成员引用和导出完整性结果。
      en: TelemetryExportActivity and immutable TelemetryExportBatch, together with batch-member references to LogRecord, Measurement, or Trace data and export-integrity results.
      ja: TelemetryExportActivity と不変 TelemetryExportBatch、batch 内 LogRecord・Measurement・Trace data 参照、export integrity result。
  excludes:
    - zh: 原始 Trace、Span、TraceEvent、Snapshot 与 Checkpoint 归追踪与检查点；日志只引用或导出它们。
      en: Raw Trace, Span, TraceEvent, Snapshot, and Checkpoint values belong to tracing and checkpoints; logging only references or exports them.
      ja: 生の Trace、Span、TraceEvent、Snapshot、Checkpoint はトレースとチェックポイントに属し、ログは参照または出力するだけです。
    - zh: Metric 和 Measurement 的定义及评价含义归评估与度量，日志中的数值只保留引用。
      en: Metric and Measurement definitions and evaluative meaning belong to evaluation and measurement; numeric log content retains references only.
      ja: Metric と Measurement の定義・評価意味は評価と測定に属し、ログ中の数値は参照だけを保持します。
    - zh: ErrorEvent、FailureMode 和处置结论归故障诊断或审查纠正；一条含有 error severity 的 LogRecord 不会自动成为诊断事件。
      en: ErrorEvent, FailureMode, and remediation conclusions belong to failure diagnosis or review and correction; a LogRecord with error severity does not automatically become a diagnostic event.
      ja: ErrorEvent・FailureMode・処置結論は failure diagnosis または review/correction に属し、error severity を持つ LogRecord が自動で診断 event になることはありません。
    - zh: 面向参与者可见顺序的 AgentTranscript 归运行观测；ToolTranscript 仅覆盖一个逻辑工具调用的持久日志链，两者不得按关键词合并。
      en: AgentTranscript ordered by participant-visible interaction belongs to runtime observability; ToolTranscript covers the durable log chain of one logical tool call, and the two must not be merged by keyword.
      ja: 参加者可視順の AgentTranscript は runtime observability に属し、ToolTranscript は一つの論理 tool call の永続ログ連鎖だけを扱い、keyword で統合してはなりません。
  semantic_kind: null
  aliases: []
purpose:
  zh: 在不改变源对象语义的前提下，可靠保存和传输运行证据，并能回答一条记录来自哪里、位于哪个流、由谁订阅、在哪次导出中发送以及按什么规则留存。
  en: Reliably preserves and transports runtime evidence without changing source semantics and answers where a record came from, which stream contains it, who subscribed, which export sent it, and which retention rules apply.
  ja: 元対象の意味を変えず実行証拠を確実に保存・転送し、記録の出所・所属 stream・購読者・送信 export・適用保持規則を回答します。
structure: null
examples:
  - id: feedback-logging-cq-record-lineage-v3-example-positive
    kind: positive
    labels:
      zh: 某条审计记录属于哪个审计日志，并经哪个 Sink 完成交付？：正例
      en: "Which audit log contains an audit record, and through which sink was it delivered?: positive case"
      ja: ある監査記録はどの監査ログに属し、どの Sink を経て配送されましたか。：正例
    scenario_id: null
    descriptions:
      zh: AuditRecord `audit-record/44` 以 sequence 44 成为 `audit/run-742` 的成员；该 AuditLog 作为 LogStream 经 `sink/compliance` 交付，分别使用 contains 与 delivered_to 的规范方向。
      en: AuditRecord `audit-record/44` is member 44 of `audit/run-742`; that AuditLog, as a LogStream, is delivered through `sink/compliance`, preserving the canonical contains and delivered_to directions.
      ja: AuditRecord `audit-record/44` は `audit/run-742` の sequence 44 の要素であり、その AuditLog は LogStream として `sink/compliance` へ配送され、contains と delivered_to の正規方向を保ちます。
    field_values:
      record_id: audit-record/44
      audit_log_id: audit/run-742
      sequence: 44
      event_sink_id: sink/compliance
      delivered: true
      delivery_receipt_id: delivery/742/44
    related_node_ids:
      - AuditLog
      - AuditRecord
      - EventSink
    related_relation_ids:
      - AuditLog-contains-AuditRecord
      - log_stream_delivered_to_event_sink
    expected_result:
      zh: 查询返回唯一 AuditLog、记录在该日志中的 sequence，以及该日志到 EventSink 的交付事实；AuditRecord 仍由运行可观测域拥有。
      en: The query returns one AuditLog, the record's sequence in that log, and the log's delivery fact to an EventSink while AuditRecord ownership remains with runtime observability.
      ja: 照会は一つの AuditLog、記録の sequence、EventSink への配送事実を返し、AuditRecord の所有は runtime observability に残します。
    why_valid_or_invalid:
      zh: AuditLog 的 contains 事实给出成员与序号，delivered_to 事实由实际交付回执支持；两条边都不是由同名或共同引用推得。
      en: AuditLog containment supplies membership and sequence, while an actual delivery receipt supports delivered_to; neither edge is inferred from naming or shared citation.
      ja: AuditLog の containment が membership と sequence を与え、実際の delivery receipt が delivered_to を支えます。名称や共通引用から edge を推定していません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-feedback-logging-003
      - claim-feedback-logging-004
  - id: feedback-logging-cq-record-lineage-v3-example-counter
    kind: counterexample
    labels:
      zh: 某条审计记录属于哪个审计日志，并经哪个 Sink 完成交付？：反例
      en: "Which audit log contains an audit record, and through which sink was it delivered?: counterexample"
      ja: ある監査記録はどの監査ログに属し、どの Sink を経て配送されましたか。：反例
    scenario_id: null
    descriptions:
      zh: AuditRecord 与 AuditLog 只在同一 Review 中被引用，且 EventSink 仅配置为潜在目的地；没有 contains 成员位置或实际 delivered_to 事实。
      en: An AuditRecord and AuditLog are merely cited by the same Review, and an EventSink is only configured as a possible destination; neither a contains position nor an actual delivered_to fact exists.
      ja: AuditRecord と AuditLog は同じ Review から参照されるだけで、EventSink も候補宛先として設定されただけです。contains の要素位置も実配送 delivered_to 事実もありません。
    field_values:
      record_id: audit-record/45
      audit_log_id: audit/run-742
      shared_review_id: review/18
      configured_sink_id: sink/compliance
      sequence: null
      contains_fact: false
      delivered_fact: false
    related_node_ids:
      - AuditLog
      - AuditRecord
      - EventSink
    related_relation_ids:
      - AuditLog-contains-AuditRecord
      - log_stream_delivered_to_event_sink
    expected_result:
      zh: 查询返回“成员关系与交付事实均未证实”，不得用共现或配置意图补造实际链路。
      en: The query reports both membership and delivery as unproven and must not turn co-occurrence or configuration intent into an actual path.
      ja: 照会は要素関係と配送事実を未立証として返し、共起や設定意図から実経路を捏造してはなりません。
    why_valid_or_invalid:
      zh: 共同出现在 Review 中不能建立 AuditLog 成员关系，配置过 Sink 也不等于已经交付；缺少两个事实时必须返回未证实。
      en: Co-occurrence in a Review does not establish AuditLog membership, and a configured sink is not completed delivery; both claims remain unproven.
      ja: Review 内の共起は AuditLog membership を作らず、設定済み sink は完了 delivery ではありません。両方の claim は未証明です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-feedback-logging-003
      - claim-feedback-logging-004
  - id: feedback-logging-cq-audit-integrity-v3-example-positive
    kind: positive
    labels:
      zh: 审计日志在指定区间内是否连续且未被篡改，缺口或校验失败在哪里？：正例
      en: "Is an audit log continuous and untampered over a requested interval, and where are any gaps or integrity failures?: positive case"
      ja: 指定区間の監査ログは連続かつ改ざんされておらず、欠落または完全性検証失敗はどこですか。：正例
    scenario_id: null
    descriptions:
      zh: 订阅 sub-audit-9 请求序号 4100–4120；批次 batch-audit-19 含 21 条连续记录，每条 previous_digest 与前条 digest 相接，且无缺口或保留例外。副作用回执仅作边界对照，不参与完整性推断。
      en: Subscription sub-audit-9 requests sequences 4100–4120. Batch batch-audit-19 has 21 continuous records whose previous_digest values chain to the prior digest, with no gap or retention exception. Effect receipts are boundary comparison only.
      ja: subscription sub-audit-9 は sequence 4100–4120 を要求し、batch-audit-19 は previous_digest が前 record の digest へ連なる 21 件を含み gap・retention exception はありません。effect receipt は境界比較だけです。
    field_values:
      subscription_id: sub-audit-9
      batch_id: batch-audit-19
      sequence_start: 4100
      sequence_end: 4120
      expected_count: 21
      observed_count: 21
      digest_chain_valid: true
      gaps: []
      accepted_retention_events: []
    related_node_ids:
      - LogSubscription
      - EffectReceipt
      - TelemetryExportBatch
      - CommitDenial
    related_relation_ids: []
    expected_result:
      zh: 返回 integrity=pass、observed_count=21、gaps=[] 与 digest_chain_valid=true；不得据此声称存在 EffectReceipt 或 CommitDenial。
      en: Return integrity=pass, observed_count=21, gaps=[], and digest_chain_valid=true; do not infer an EffectReceipt or CommitDenial.
      ja: integrity=pass、observed_count=21、gaps=[]、digest_chain_valid=true を返し、EffectReceipt や CommitDenial を推定しません。
    why_valid_or_invalid:
      zh: 请求区间、记录数、序号链和摘要链四项相互一致；安全域对象没有被当成日志完整性的隐含证据。
      en: Requested interval, record count, sequence chain, and digest chain agree; safety-domain objects are not treated as implicit log-integrity evidence.
      ja: requested interval、record count、sequence chain、digest chain が一致し、安全 domain object を暗黙の log-integrity evidence として扱いません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-feedback-logging-005
      - claim-feedback-logging-006
  - id: feedback-logging-cq-audit-integrity-v3-example-counter
    kind: counterexample
    labels:
      zh: 审计日志在指定区间内是否连续且未被篡改，缺口或校验失败在哪里？：反例
      en: "Is an audit log continuous and untampered over a requested interval, and where are any gaps or integrity failures?: counterexample"
      ja: 指定区間の監査ログは連続かつ改ざんされておらず、欠落または完全性検証失敗はどこですか。：反例
    scenario_id: null
    descriptions:
      zh: 同一请求区间缺少序号 4112，记录 4113 的 previous_digest 又不等于 4111 的 digest；没有任何已接受保留事件解释该缺口。
      en: The same interval lacks sequence 4112, and record 4113 has a previous_digest different from record 4111's digest. No accepted retention event explains the gap.
      ja: 同じ interval で sequence 4112 が欠落し、record 4113 の previous_digest は record 4111 の digest と一致せず、gap を説明する accepted retention event もありません。
    field_values:
      subscription_id: sub-audit-9
      batch_id: batch-audit-20
      sequence_start: 4100
      sequence_end: 4120
      missing_sequences:
        - 4112
      digest_mismatch_at: 4113
      accepted_retention_events: []
    related_node_ids:
      - LogSubscription
      - EffectReceipt
      - TelemetryExportBatch
      - CommitDenial
    related_relation_ids: []
    expected_result:
      zh: 返回 integrity=fail、missing_sequences=[4112]、digest_mismatch_at=4113，并说明没有可接受的保留事件。
      en: Return integrity=fail, missing_sequences=[4112], digest_mismatch_at=4113, and state that no accepted retention event exists.
      ja: integrity=fail、missing_sequences=[4112]、digest_mismatch_at=4113 を返し、accepted retention event がないと明示します。
    why_valid_or_invalid:
      zh: 序号连续性和摘要连续性同时失败，且缺口无治理事件解释，因此不能以批次存在或订阅成功替代完整性证明。
      en: Both sequence and digest continuity fail and no governance event explains the gap, so batch existence or subscription success cannot substitute for integrity proof.
      ja: sequence と digest の連続性がともに失敗し governance event も gap を説明しないため、batch 存在や subscription success は integrity proof の代わりになりません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-feedback-logging-005
      - claim-feedback-logging-006
  - id: feedback-logging-cq-export-completeness-v3-example-positive
    kind: positive
    labels:
      zh: 一个遥测导出批次是否包含请求窗口内全部应导出的记录、测量引用和追踪引用？：正例
      en: "Does a telemetry export batch contain every record, measurement reference, and trace reference required for the requested window?: positive case"
      ja: テレメトリ出力バッチは要求窓内の全必須記録、測定参照、トレース参照を含みますか。：正例
    scenario_id: null
    descriptions:
      zh: 导出批次 export-2026-07-16T1405 覆盖 14:00–14:05，过滤器要求三个测量引用 mr-801、mr-802、mr-803；批次恰含三者且分别引用 m-801、m-802、m-803，无重复。
      en: Export batch export-2026-07-16T1405 covers 14:00–14:05. Its filter requires mr-801, mr-802, and mr-803; the batch contains exactly those references to m-801, m-802, and m-803 with no duplicate.
      ja: export batch export-2026-07-16T1405 は 14:00–14:05 を対象とし、filter は mr-801・mr-802・mr-803 を要求します。batch は m-801・m-802・m-803 を参照する三件だけを重複なく含みます。
    field_values:
      batch_id: export-2026-07-16T1405
      window_start: 2026-07-16T14:00:00Z
      window_end: 2026-07-16T14:05:00Z
      expected_reference_ids:
        - mr-801
        - mr-802
        - mr-803
      actual_reference_ids:
        - mr-801
        - mr-802
        - mr-803
      measurement_ids:
        - m-801
        - m-802
        - m-803
      duplicates: []
    related_node_ids:
      - MeasurementReference
      - Measurement
    related_relation_ids:
      - MeasurementReference-references-Measurement
    expected_result:
      zh: 返回 complete=true、missing=[]、duplicates=[]，并保留三条 MeasurementReference 到 Measurement 的正向引用。
      en: Return complete=true, missing=[], and duplicates=[], preserving all three forward MeasurementReference-to-Measurement references.
      ja: complete=true、missing=[]、duplicates=[] を返し、三つの MeasurementReference から Measurement への正方向参照を保持します。
    why_valid_or_invalid:
      zh: 应用已声明过滤器后，期望集合与实际集合完全相等，且每个引用都有唯一目标；完整性不是由批次计数近似判断。
      en: After the declared filter, expected and actual sets are equal and every reference has one target; completeness is not approximated from batch count.
      ja: declared filter 適用後に expected set と actual set が等しく各 reference は一 target を持ち、batch count の近似で completeness を判断していません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-feedback-logging-007
      - claim-feedback-logging-008
  - id: feedback-logging-cq-export-completeness-v3-example-counter
    kind: counterexample
    labels:
      zh: 一个遥测导出批次是否包含请求窗口内全部应导出的记录、测量引用和追踪引用？：反例
      en: "Does a telemetry export batch contain every record, measurement reference, and trace reference required for the requested window?: counterexample"
      ja: テレメトリ出力バッチは要求窓内の全必須記録、測定参照、トレース参照を含みますか。：反例
    scenario_id: null
    descriptions:
      zh: 过滤器仍要求 mr-801、mr-802、mr-803，但批次遗漏 mr-802 并重复写入 mr-803；总条数仍为三，单看 count 会误判完整。
      en: The filter still requires mr-801, mr-802, and mr-803, but the batch omits mr-802 and writes mr-803 twice. Its count is still three, so count-only validation would be wrong.
      ja: filter は mr-801・mr-802・mr-803 を要求しますが、batch は mr-802 を欠き mr-803 を二回書きます。count は三のままで count-only validation は誤ります。
    field_values:
      batch_id: export-2026-07-16T1410
      expected_reference_ids:
        - mr-801
        - mr-802
        - mr-803
      actual_reference_ids:
        - mr-801
        - mr-803
        - mr-803
      missing:
        - mr-802
      duplicates:
        - mr-803
    related_node_ids:
      - MeasurementReference
      - Measurement
    related_relation_ids:
      - MeasurementReference-references-Measurement
    expected_result:
      zh: 返回 complete=false、missing=[mr-802]、duplicates=[mr-803]；不得因 expected_count 与 actual_count 都为 3 而通过。
      en: Return complete=false, missing=[mr-802], and duplicates=[mr-803]; equal expected and actual counts must not pass validation.
      ja: complete=false、missing=[mr-802]、duplicates=[mr-803] を返し、expected count と actual count が同じでも通過させません。
    why_valid_or_invalid:
      zh: 集合不相等且存在重复，计数相等无法证明成员完整；缺失与重复必须分开报告。
      en: Set equality fails and a duplicate exists; equal counts do not prove complete membership, so missing and duplicate members are reported separately.
