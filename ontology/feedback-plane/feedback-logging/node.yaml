  taxonomy_contract:
    applicability: mixed-backbone
    not_applicable_reason: null
    hierarchy_policy: arbitrary-depth-reviewed-backbone
    key_root_concept_ids:
      - LogArtifact
    allowed_backbone_predicates:
      - contains
      - is_a
    flat_root_exception_concept_ids:
      - LogConsumer
      - LogStream
      - LogSubscription
      - TelemetryExportActivity
      - TelemetryExportBatch
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-feedback-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐点核验后，本域保留六条相互关联但身份独立的主轴：LogArtifact 是被保留的记录产物，TelemetryExportActivity 是导出过程，TelemetryExportBatch 是一次导出的信息批次，LogStream 是有稳定身份与顺序的记录集合，LogConsumer 是承担读取责任的角色，LogSubscription 是可先于监听器激活而存在的订阅规范。produces、consumes 与 configures 都只记录可核验运行事实；产物、活动、批次、集合、角色和规范不能互相充当上位概念。
            en: "Point-by-point review retains six related but identity-independent axes: LogArtifact is a retained record artifact; TelemetryExportActivity is an export process; TelemetryExportBatch is an information batch from one export; LogStream is an ordered collection with stable identity; LogConsumer is the responsible reader role; and LogSubscription is a subscription specification that can exist before listener activation. produces, consumes, and configures record auditable operational facts only; artifact, activity, batch, collection, role, and specification cannot serve as one another's superconcepts."
            ja: 個別審査後、本域は相互に関連するが同一性の独立した六軸を保持します。LogArtifact は保持記録成果物、TelemetryExportActivity は出力過程、TelemetryExportBatch は一回の出力情報 batch、LogStream は安定 ID と順序を持つ collection、LogConsumer は読取責任を持つ role、LogSubscription は listener 有効化前にも存在できる購読 specification です。produces・consumes・configures は検証可能な運用 fact だけを記録し、artifact・activity・batch・collection・role・specification を互いの上位概念にはしません。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 结构审查要求父边表达稳定抽象或真实构成。LogStream、LogConsumer、LogSubscription、TelemetryExportActivity 与 TelemetryExportBatch 因身份条件不同而成为独立入口：前两者分别通过 is_a 展开 AuditLog 以及 EventSink、LogListener；TelemetryExportBatch 通过 contains 组织 MeasurementReference。produces、consumes 与 configures 保持 canonical 方向、条件、正反例和来源，但均使用 cross-link，不参与社区骨架。
            en: "Structure review requires a parent edge to express stable abstraction or genuine composition. LogStream, LogConsumer, LogSubscription, TelemetryExportActivity, and TelemetryExportBatch are independent entries because their identity conditions differ: the first two expand through is_a to AuditLog and to EventSink and LogListener, while TelemetryExportBatch organizes MeasurementReference through contains. produces, consumes, and configures retain canonical direction, conditions, cases, and sources but use cross-link layout and do not shape the community backbone."
            ja: 構造審査は親辺が安定 abstraction または真正 composition を表すことを要求します。LogStream・LogConsumer・LogSubscription・TelemetryExportActivity・TelemetryExportBatch は同一性条件が異なるため独立 entry とし、前二者は is_a で AuditLog と EventSink・LogListener を展開し、TelemetryExportBatch は contains で MeasurementReference を編成します。produces・consumes・configures は canonical 方向・条件・事例・出典を保持しつつ cross-link layout とし community backbone を形成しません。
