    supports: The OpenTelemetry Logs Data Model defines the record-level boundary for timestamps, trace context, severity, body, resource, instrumentation scope, attributes, and event name across heterogeneous log sources. Moonweave owns LogRecord and related log artifacts here when identity depends on record format or ordered log membership; stream, audit-chain, and ownership taxonomy are explicit design inferences.
