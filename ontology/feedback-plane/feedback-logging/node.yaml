module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 日志与遥测的输入概念族为遥测事件、日志流、追踪记录；责任交接由已接受事实 事件接收端 —receives→ 遥测事件 (EventSink-receives-TelemetryEvent)；日志消费者 —consumes→ 日志流 (LogConsumer-consumes-LogStream)；轨迹导出活动 —consumes→ 追踪记录 (TraceExportActivity-consumes-TraceRecord) 明确给出。
          en: The input families for Logging and telemetry are telemetry event, log stream, trace record; the accepted facts event sink —receives→ telemetry event (EventSink-receives-TelemetryEvent); Log Consumer —consumes→ log stream (LogConsumer-consumes-LogStream); Trace export activity —consumes→ trace record (TraceExportActivity-consumes-TraceRecord) make the responsibility handoff explicit.
          ja: ログとテレメトリの入力概念族はテレメトリイベント、ログストリーム、トレース記録です。責任の受け渡しは承認済み事実 イベントシンク —receives→ テレメトリイベント (EventSink-receives-TelemetryEvent)；ログ消費者 —consumes→ ログストリーム (LogConsumer-consumes-LogStream)；トレース出力活動 —consumes→ トレース記録 (TraceExportActivity-consumes-TraceRecord) により明示されます。
        family_concept_ids:
          - TelemetryEvent
          - LogStream
          - TraceRecord
        relation_ids:
          - EventSink-receives-TelemetryEvent
          - LogConsumer-consumes-LogStream
          - TraceExportActivity-consumes-TraceRecord
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 日志与遥测的输出还包括日志记录所承载的诊断消息语义：LogRecord —conveys→ DiagnosticMessage 只解释 Body 或 Attributes 中已有的诊断内容；工具调用记录、遥测导出批次与追踪导出仍分别由其已接受关系交付。
          en: "Logging and telemetry output also exposes diagnostic-message semantics carried by a log record: LogRecord —conveys→ DiagnosticMessage interprets diagnostic content already present in Body or Attributes; tool transcripts, telemetry export batches, and trace exports retain their existing delivery relations."
          ja: ログとテレメトリの出力にはログ記録が担う診断メッセージ意味も含まれます。LogRecord —conveys→ DiagnosticMessage は Body または Attributes に既存の診断内容だけを解釈し、ツール記録・テレメトリ出力バッチ・トレース出力は既存の受け渡し関係を保ちます。
        family_concept_ids:
          - ToolTranscript
          - TelemetryExportBatch
          - TraceExport
          - DiagnosticMessage
        relation_ids:
          - ToolTranscript-records-ToolCallAttempt
          - TelemetryExportActivity-produces-TelemetryExportBatch
          - TraceExportActivity-produces-TraceExport
          - LogRecord-conveys-DiagnosticMessage
        not_applicable_reason: null
      failure:
        applicable: true
        description:
          zh: 日志与遥测的失败概念族为错误事件、错误监听器；责任交接由已接受事实 错误监听器 —observes→ 错误事件 (ErrorListener-observes-ErrorEvent)；日志监听器 —routes_failure_to→ 错误监听器 (LogListener-routes_failure_to-ErrorListener) 明确给出。
          en: The failure families for Logging and telemetry are error event, error listener; the accepted facts error listener —observes→ error event (ErrorListener-observes-ErrorEvent); log listener —routes_failure_to→ error listener (LogListener-routes_failure_to-ErrorListener) make the responsibility handoff explicit.
          ja: ログとテレメトリの失敗概念族はエラーイベント、エラーリスナーです。責任の受け渡しは承認済み事実 エラーリスナー —observes→ エラーイベント (ErrorListener-observes-ErrorEvent)；ログリスナー —routes_failure_to→ エラーリスナー (LogListener-routes_failure_to-ErrorListener) により明示されます。
        family_concept_ids:
          - ErrorEvent
          - ErrorListener
        relation_ids:
          - ErrorListener-observes-ErrorEvent
          - LogListener-routes_failure_to-ErrorListener
        not_applicable_reason: null
      recovery:
        applicable: true
        description:
          zh: 日志与遥测的恢复概念族为恢复动作；责任交接由已接受事实 错误监听器 —triggers→ 恢复动作 (ErrorListener-triggers-RecoveryAction) 明确给出。
          en: The recovery families for Logging and telemetry are recovery action; the accepted facts error listener —triggers→ recovery action (ErrorListener-triggers-RecoveryAction) make the responsibility handoff explicit.
          ja: ログとテレメトリの回復概念族は復旧アクションです。責任の受け渡しは承認済み事実 エラーリスナー —triggers→ 復旧アクション (ErrorListener-triggers-RecoveryAction) により明示されます。
        family_concept_ids:
          - RecoveryAction
        relation_ids:
          - ErrorListener-triggers-RecoveryAction
        not_applicable_reason: null
