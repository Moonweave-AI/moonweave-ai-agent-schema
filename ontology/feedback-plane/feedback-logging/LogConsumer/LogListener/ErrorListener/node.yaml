schema: moonweave.ai/ontology-node/v1
id: ErrorListener
kind: concept
status: accepted
labels:
  en: error listener
  zh: 错误监听器
  ja: エラーリスナー
semantics:
  short_definition:
    zh: 错误监听器是一种日志消费者；其区分条件是：它订阅运行、沙箱、工具、协议或日志事件，以检测并路由错误用于诊断。
    en: As a Log Consumer, Error listener is distinguished by the fact that it subscribes to runtime, sandbox, tool, protocol, or log events in order to detect and route errors for diagnosis.
    ja: ログ消費者に属するエラーリスナーは、次の事実を種差とします：それは、実行、サンドボックス、ツール、プロトコル、ログイベントを購読し、診断のためにエラーを検出して経路付けます。
  definition:
    zh: 错误监听器是一种 LogListener；其种差是只选择被严重度、事件名、状态或异常属性判定为错误的 LogRecord/TelemetryEvent，并把命中的记录路由给诊断或恢复处理。它观察错误，不等同于产生错误或执行恢复。
    en: An ErrorListener is a LogListener whose differentia is selecting LogRecords or TelemetryEvents classified as errors by severity, event name, status, or exception attributes and routing matches to diagnosis or recovery handling. It observes errors; it neither causes the error nor performs the recovery itself.
    ja: ErrorListener は LogListener の一種で、重大度、イベント名、状態、例外属性によりエラーと判定された LogRecord または TelemetryEvent だけを選択し、診断・回復処理へ転送する点で区別されます。エラーを観測しますが、エラーの原因や回復実行主体ではありません。
  why_needed:
    zh: 把 ErrorListener 放在 LogListener 下，可复用订阅与路由语义，并阻止图谱把所有 LogConsumer（尤其 EventSink）错误解释为具有错误筛选职责。
    en: Placing ErrorListener below LogListener reuses subscription and routing semantics and prevents every LogConsumer, especially an EventSink, from being interpreted as having error-selection responsibility.
    ja: ErrorListener を LogListener の下位に置くことで購読・転送意味を再利用し、EventSink を含むすべての LogConsumer にエラー選択責務があるという誤解を防ぎます。
  includes:
    - zh: 纳入具有明确错误选择条件、订阅一个日志来源，并把匹配项交给 ErrorEvent 诊断路径的监听角色。
      en: Includes a listener role with an explicit error predicate, a subscribed log source, and routing of matching records into an ErrorEvent diagnostic path.
      ja: 明示的なエラー述語、購読ログ源、適合記録を ErrorEvent 診断経路へ渡す処理を持つリスナー役割を含みます。
  excludes:
    - zh: 排除仅存储全部事件的 EventSink、未设置错误条件的普通 LogListener，以及实际执行重试或回滚的 RecoveryAction。
      en: Excludes an EventSink that stores every event, a general LogListener with no error predicate, and a RecoveryAction that actually performs retry or rollback.
      ja: 全イベントを保存する EventSink、エラー述語を持たない一般 LogListener、再試行・ロールバックを実行する RecoveryAction を除外します。
  semantic_kind: role
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: error-listener-has-error-selection
      severity: error
      expression_language: plain
      expression: an ErrorListener declares an error-selection predicate before routing a record
      explanations:
        zh: 错误监听器在路由记录前必须声明错误选择条件。
        en: An ErrorListener declares an error-selection predicate before routing a record.
        ja: ErrorListener は記録を転送する前にエラー選択述語を宣言します。
      source_claims:
        - claim-error-listener-003
  required_relation_constraints: []
examples:
  - id: ErrorListener-example-positive-001
    kind: positive
    labels:
      zh: 错误监听器正例
      en: Positive example of error listener
      ja: エラーリスナーの正例
    scenario_id: null
    descriptions:
      zh: 在一次评估、纠正与改进决策循环中，系统将错误监听器（ErrorListener）记录为 ErrorListener observes ErrorEvent 的源端点。其已审查定义是“错误监听器是一种日志消费者；其区分条件是：它订阅运行、沙箱、工具、协议或日志事件，以检测并路由错误用于诊断”。
      en: Listener `tool-errors` subscribes to the tool log stream, selects only records at ERROR severity or above, associates one timeout record with an ErrorEvent, and routes it to diagnosis.
      ja: 評価・修正・改善判断のサイクルでは、システムはエラーリスナー（ErrorListener）を ErrorListener observes ErrorEvent の始点として記録します。審査済み定義は「ログ消費者に属するエラーリスナーは、次の事実を種差とします：それは、実行、サンドボックス、ツール、プロトコル、ログイベントを購読し、診断のためにエラーを検出して経路付けます」です。
    field_values:
      consumer_role_id: consumer-role/tool-errors
      bearer_ref: component/tool-errors-listener
      input_scope_ref: stream/tool/logs
      responsibility: select ERROR records and route them to diagnosis
    related_node_ids:
      - ErrorListener
      - ErrorEvent
    related_relation_ids:
      - ErrorListener-observes-ErrorEvent
    expected_result:
      zh: 该运行可查询 ErrorListener 以及方向保持不变的事实 ErrorListener-observes-ErrorEvent。
      en: The run can query ErrorListener together with direction-preserving fact ErrorListener-observes-ErrorEvent.
      ja: この実行では ErrorListener と方向を保持した事実 ErrorListener-observes-ErrorEvent を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、ErrorListener-observes-ErrorEvent 的 canonical 方向、概念定义和可用字段值。
      en: The role has a testable error predicate, subscribed source, and diagnostic route, so it satisfies ErrorListener rather than merely the broader LogConsumer role.
      ja: このシナリオは実際の運用文脈、ErrorListener-observes-ErrorEvent の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-error-listener-004
      - claim-error-listener-005
  - id: ErrorListener-example-boundary-001
    kind: boundary
    labels:
      zh: 错误监听器边界例
      en: Boundary case for error listener
      ja: エラーリスナーの境界例
    scenario_id: null
    descriptions:
      zh: EventSink 用作ErrorListener的边界对照：两者可见于同一图谱片段，但 EventSink 的已审查定义是“事件接收端是以如下事实为区分特征的日志消费者：它是接受日志流、遥测事件、审计记录或轨迹导出的目的地、消费者、接收方或导出目标，用于存储、监控、审查或转发。”。不能因 shared parent LogConsumer 而把它归入ErrorListener。
      en: An object-store destination receives and persists every tool log without an error-selection predicate and neither creates nor routes ErrorEvents; it is an EventSink, not an ErrorListener.
      ja: EventSink は ErrorListener の境界対照です。同じグラフ断片に現れ得ますが、EventSink の審査済み定義は「イベントシンクはログ消費者の一種であり、次の条件で区別されます：それは、ログストリーム、テレメトリイベント、監査記録、トレースエクスポートを受け取り、保存、監視、レビュー、転送に使う宛先、消費者、受信者、エクスポート先です。」です。shared parent LogConsumer だけで ErrorListener にはなりません。
    field_values: {}
    related_node_ids:
      - ErrorListener
      - ErrorEvent
      - EventSink
    related_relation_ids:
      - ErrorListener-observes-ErrorEvent
    expected_result:
      zh: EventSink 保持其原有类型，验证器不得凭关系共现把它提升为 ErrorListener。
      en: EventSink retains its own type; validation must not promote it to ErrorListener from relation co-occurrence.
      ja: EventSink は元の型を維持し、関係の共起だけで ErrorListener へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 ErrorListener-observes-ErrorEvent 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: Receiving and storing are sink responsibilities; ErrorListener requires a listener role that explicitly filters errors and routes matches into diagnosis.
      ja: 境界例は実在する対照ノードを示し、ErrorListener-observes-ErrorEvent の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-error-listener-006
      - claim-error-listener-007
  - id: ErrorListener-example-instance-001
    kind: instance
    labels:
      zh: 错误监听器实例
      en: Error-listener instance
      ja: エラーリスナーのインスタンス
    scenario_id: tool-timeout-diagnosis
    descriptions:
      zh: 实例 `tool-errors` 使用条件 `severity_number >= 17` 订阅 `tools/runtime`，并将命中项路由到 `diagnosis/errors`。
      en: Instance `tool-errors` subscribes to `tools/runtime` with predicate `severity_number >= 17` and routes matches to `diagnosis/errors`.
      ja: インスタンス `tool-errors` は条件 `severity_number >= 17` で `tools/runtime` を購読し、適合項目を `diagnosis/errors` へ転送します。
    field_values:
      listener_id: tool-errors
      predicate: severity_number >= 17
      route: diagnosis/errors
    related_node_ids:
      - ErrorListener
      - LogListener
      - LogStream
      - ErrorEvent
    related_relation_ids:
      - ErrorListener-is_a-LogListener
      - log_listener_subscribes_to_stream
      - ErrorListener-observes-ErrorEvent
    expected_result:
      zh: 仅 ERROR 及以上记录进入诊断路由。
      en: Only ERROR-or-higher records enter the diagnostic route.
      ja: ERROR 以上の記録だけが診断経路へ入ります。
    why_valid_or_invalid:
      zh: 实例明确给出监听身份、日志来源、错误条件和诊断目的地。
      en: The instance explicitly supplies listener identity, log source, error predicate, and diagnostic destination.
      ja: リスナー同一性、ログ源、エラー述語、診断宛先を明示します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-error-listener-008
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: ErrorListener-is_a-LogListener
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: ErrorListener is_a LogListener 表示错误监听器继承日志监听器的订阅、到达观察和非阻塞路由条件，并以只选择错误严重度、状态、事件名或异常属性为种差。
    en: ErrorListener is_a LogListener means that an error listener inherits subscription, arrival observation, and non-blocking routing conditions and is differentiated by selecting only error severity, status, event name, or exception attributes.
    ja: ErrorListener is_a LogListener は購読、到着観測、非ブロッキング routing 条件を継承し、error severity、status、event name、例外属性だけを選ぶ点を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 本关系不对所有运行实例施加统一基数。
    en: This relation does not impose one universal cardinality on every runtime instance.
    ja: この関係は全実行 instance に一律基数を課しません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向 is_a
      en: inverse is_a
      ja: 逆 is_a
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: ErrorListener-is_a-LogListener-example-positive-001
      kind: positive
      labels:
        zh: 工具错误专用监听
        en: Tool-error specialized listener
        ja: tool error 専用 listener
      scenario_id: null
      descriptions:
        zh: "`listener/errors` 通过 LogSubscription 观察日志流，只匹配 ERROR 以上或带 exception.type 的记录并路由诊断。"
        en: "`listener/errors` observes a LogStream through LogSubscription and routes diagnostics only for ERROR-or-higher records or records carrying exception.type."
        ja: "`listener/errors` は LogSubscription 経由で LogStream を観測し ERROR 以上または exception.type 付き記録だけを診断へ送ります。"
      field_values: {}
      related_node_ids:
        - ErrorListener
        - LogListener
      related_relation_ids:
        - ErrorListener-is_a-LogListener
      expected_result:
        zh: 对象同时按 ErrorListener、LogListener 和 LogConsumer 查询。
        en: The object is queryable as ErrorListener, LogListener, and LogConsumer.
        ja: 対象は ErrorListener、LogListener、LogConsumer として検索できます。
      why_valid_or_invalid:
        zh: 监听器全部条件成立，并增加可核实的错误专用选择条件。
        en: All listener conditions hold and an independently verifiable error-specific predicate is added.
        ja: listener 全条件が成立し検証可能 error 固有条件が追加されます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-error-listener-009
    - id: ErrorListener-is_a-LogListener-example-boundary-001
      kind: boundary
      labels:
        zh: 普通警告监听器边界
        en: Ordinary warning listener boundary
        ja: 通常 warning listener 境界
      scenario_id: null
      descriptions:
        zh: "`listener/warn` 监听 WARN 以上性能记录，但没有错误状态或异常条件；它是 LogListener，不自动成为 ErrorListener。"
        en: "`listener/warn` observes WARN-or-higher performance records but has no error status or exception predicate; it is a LogListener and not automatically an ErrorListener."
        ja: "`listener/warn` は WARN 以上の性能記録を観測しますが error status・例外条件がなく、LogListener でも自動的に ErrorListener にはなりません。"
      field_values: {}
      related_node_ids:
        - ErrorListener
        - LogListener
      related_relation_ids:
        - ErrorListener-is_a-LogListener
      expected_result:
        zh: 保留 LogListener 上位类型，不赋予 ErrorListener。
        en: The LogListener supertype remains and ErrorListener is not assigned.
        ja: LogListener 上位型を保持し ErrorListener は付与しません。
      why_valid_or_invalid:
        zh: 严重度阈值可用于一般路由，只有明确错误分类种差才支持专门下位类型。
        en: A severity threshold can serve general routing; only an explicit error-classification differentia supports the specialized subtype.
        ja: severity 閾値は一般 routing に使え、明示 error 分類種差だけが専用下位型を支えます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-error-listener-010
  source_claims:
    - claim-error-listener-011
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: ErrorListener-observes-ErrorEvent
    predicate: observes
    direction: source-to-target
    relation_kind: information
    labels:
      zh: observes
      en: observes
      ja: observes
    definitions:
      zh: ErrorListener observes ErrorEvent 表示错误监听器通过订阅条件接收到并识别一个错误事件；该关系记录观察事实，不表示监听器造成错误或已经执行恢复。
      en: ErrorListener observes ErrorEvent means that an error listener receives and classifies an error event through its subscription predicate; the edge records observation, not causation or completed recovery.
      ja: ErrorListener observes ErrorEvent は error listener が購読条件を通じて error event を受信・識別したことを示し、原因発生や回復完了を意味しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: observed_by_error_listener
      labels:
        zh: 由错误监听器观测
        en: observed by error listener
        ja: エラーリスナーに観測される
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: ErrorListener-observes-ErrorEvent-example-positive-001
        kind: positive
        labels:
          zh: 工具超时观察
          en: Tool-timeout observation
          ja: ツール timeout 観測
        scenario_id: null
        descriptions:
          zh: 监听器 `listener/errors` 收到 EventName `tool.timeout` 且 SeverityNumber 为 ERROR 的事件，并保留其 TraceId。
          en: Listener `listener/errors` receives an event with EventName `tool.timeout`, ERROR SeverityNumber, and its TraceId intact.
          ja: listener `listener/errors` は EventName `tool.timeout`、ERROR SeverityNumber、保持された TraceId を持つ event を受信します。
        field_values: {}
        related_node_ids:
          - ErrorListener
          - ErrorEvent
        related_relation_ids:
          - ErrorListener-observes-ErrorEvent
        expected_result:
          zh: 系统建立从 ErrorListener 到该 ErrorEvent 的 observes 边，并允许按 TraceId 回溯。
          en: The system creates the observes edge from ErrorListener to that ErrorEvent and permits TraceId-based correlation.
          ja: ErrorListener から該当 ErrorEvent への observes 辺を作り、TraceId 相関を可能にします。
        why_valid_or_invalid:
          zh: 事件满足明确错误条件且监听器确实接收，观察事实可独立核实。
          en: The event satisfies an explicit error predicate and was actually received, making the observation independently verifiable.
          ja: event は明示エラー条件を満たし実際に受信され、観測事実を独立検証できます。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-error-listener-012
      - id: ErrorListener-observes-ErrorEvent-example-boundary-001
        kind: boundary
        labels:
          zh: 错误条件未命中
          en: Error predicate not matched
          ja: エラー条件不一致
        scenario_id: null
        descriptions:
          zh: 监听器收到 SeverityNumber 为 INFO 的 `tool.completed` 事件，且没有异常属性；它可被一般 LogListener 观察，但不能建立本错误监听器的 observes 边。
          en: A listener receives an INFO `tool.completed` event with no exception attributes; a general LogListener may observe it, but this ErrorListener observes edge is not established.
          ja: listener は INFO の `tool.completed` event を受信し例外属性もありません。一般 LogListener は観測できますが、この ErrorListener observes 辺は成立しません。
        field_values: {}
        related_node_ids:
          - ErrorListener
          - ErrorEvent
        related_relation_ids:
          - ErrorListener-observes-ErrorEvent
        expected_result:
          zh: 事件保留普通遥测类型，错误订阅不产生匹配记录。
          en: The event retains its ordinary telemetry type and the error subscription produces no match.
          ja: event は通常 telemetry 型を保持し、error 購読は一致を生成しません。
        why_valid_or_invalid:
          zh: 接收本身不足以证明错误观察；还必须满足 ErrorListener 的错误判定条件。
          en: Receipt alone does not prove error observation; the ErrorListener error predicate must also be satisfied.
          ja: 受信だけではエラー観測を証明せず、ErrorListener のエラー条件も満たす必要があります。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-error-listener-013
    source_claims:
      - claim-error-listener-014
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:ErrorEvent
  - id: ErrorListener-triggers-RecoveryAction
    predicate: triggers
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 触发
      en: triggers
      ja: 起動する
    definitions:
      zh: ErrorListener triggers RecoveryAction 表示监听器命中的错误在显式恢复策略允许时启动一个恢复动作；该边要求匹配记录、策略决定和动作实例，错误观察本身不自动触发。
      en: ErrorListener triggers RecoveryAction means that an error matched by the listener starts one recovery action when an explicit recovery policy permits it; the edge requires a matched record, policy decision, and action instance, so observation alone is insufficient.
      ja: ErrorListener triggers RecoveryAction は、listener が一致したエラーについて明示的回復 policy が許可した場合に一回復 action を開始することを示します。一致記録、policy 判断、action instance が必要で、観測だけでは不十分です。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: triggered_by
      labels:
        zh: 反向：触发
        en: triggered by
        ja: 逆方向：起動する
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: ErrorListener-triggers-RecoveryAction-example-positive-001
        kind: positive
        labels:
          zh: 超时重试恢复
          en: Timeout-retry recovery
          ja: timeout retry 回復
        scenario_id: null
        descriptions:
          zh: 错误监听器匹配 `tool.timeout`，恢复策略批准最多一次重试，并创建 RecoveryAction `retry/91-2`。
          en: The error listener matches `tool.timeout`, the recovery policy authorizes at most one retry, and RecoveryAction `retry/91-2` is created.
          ja: error listener が `tool.timeout` に一致し、回復 policy が一回までの retry を認可し、RecoveryAction `retry/91-2` が作成されます。
        field_values: {}
        related_node_ids:
          - ErrorListener
          - RecoveryAction
        related_relation_ids:
          - ErrorListener-triggers-RecoveryAction
        expected_result:
