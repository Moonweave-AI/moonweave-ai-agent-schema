schema: moonweave.ai/ontology-node/v1
id: LogListener
kind: concept
status: accepted
labels:
  zh: 日志监听器
  en: log listener
  ja: ログリスナー
semantics:
  short_definition:
    zh: 日志监听器是订阅日志流并在记录到达时执行选择或路由的日志消费者。
    en: A LogListener is a LogConsumer that subscribes to a log stream and selects or routes records as they arrive.
    ja: LogListener はログストリームを購読し、記録到着時に選択または経路付けを行う LogConsumer です。
  definition:
    zh: 日志监听器是一种 LogConsumer；其种差是通过 LogSubscription 观察一个或多个 LogStream，并在 LogRecord 到达时执行非阻塞的筛选、标注或路由。ErrorListener 是增加错误判定条件的下位监听器；EventSink 是接收目的地而不是观察者。
    en: A LogListener is a LogConsumer whose differentia is observing one or more LogStreams under a LogSubscription and performing non-blocking filtering, annotation, or routing when LogRecords arrive. ErrorListener adds an error predicate below it; EventSink is a receiving destination rather than an observer.
    ja: LogListener は LogConsumer の一種で、LogSubscription に基づき一つ以上の LogStream を観測し、LogRecord 到着時に非ブロッキングの選別・注釈・経路付けを行う点で区別されます。ErrorListener はエラー条件を加えた下位型で、EventSink は観測者ではなく受信先です。
  why_needed:
    zh: 该中间层把一般消费职责与专门错误筛选分开，使 ErrorListener 经由真实的监听器上位概念继承订阅和到达处理语义。
    en: This intermediate level separates general consumption from specialized error filtering, so ErrorListener inherits subscription and arrival-handling semantics through its genuine listener genus.
    ja: この中間層は一般的な消費責任と専用エラー選別を分け、ErrorListener が真の上位概念である listener を通じて購読と到着処理の意味を継承できるようにします。
  includes:
    - zh: 纳入已绑定 LogStream、具有明确到达处理器，并在发射路径上避免无限阻塞的观察角色。
      en: Includes an observer role bound to a LogStream with an explicit arrival handler that does not indefinitely block the emission path.
      ja: LogStream に結び付けられ、明示的な到着ハンドラーを持ち、発行経路を無期限に停止しない観測役割を含みます。
  excludes:
    - zh: 排除只声明绑定关系的 LogSubscription、作为最终接收端的 EventSink，以及按批次排空记录的导出器。
      en: Excludes the LogSubscription that only declares the binding, an EventSink that is a final receiver, and an exporter that drains records by batch.
      ja: 結合だけを宣言する LogSubscription、最終受信先の EventSink、記録をバッチで排出する exporter を除外します。
  semantic_kind: role
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: log-listener-nonblocking-arrival-handler
      severity: error
      expression_language: plain
      expression: a LogListener declares a subscribed LogStream and an arrival handler that does not block emission indefinitely
      explanations:
        zh: 日志监听器必须声明订阅流和不会无限阻塞发射的到达处理器。
        en: A LogListener declares a subscribed LogStream and an arrival handler that does not block emission indefinitely.
        ja: LogListener は購読 LogStream と、発行を無期限に妨げない到着ハンドラーを宣言します。
      source_claims:
        - claim-log-listener-002
  required_relation_constraints: []
examples:
  - id: LogListener-example-positive-001
    kind: positive
    labels:
      zh: 按严重度路由的日志监听器
      en: Severity-routing log listener
      ja: 重大度で経路付けするログリスナー
    scenario_id: null
    descriptions:
      zh: 监听器 `listener/warn` 订阅运行日志流，在每条 LogRecord 到达时读取 SeverityNumber，并把 WARN 以上记录路由至诊断队列，而不阻塞发射线程。
      en: Listener `listener/warn` subscribes to the runtime LogStream, reads SeverityNumber as each LogRecord arrives, and routes WARN-or-higher records to a diagnostic queue without blocking the emission thread.
      ja: リスナー `listener/warn` は実行 LogStream を購読し、各 LogRecord 到着時に SeverityNumber を読み、WARN 以上を発行スレッドを止めず診断キューへ送ります。
    field_values:
      consumer_role_id: consumer-role/listener-warn
      bearer_ref: component/listener-warn
      input_scope_ref: stream/runtime/logs
      responsibility: route WARN-or-higher records to the diagnostic queue without blocking emission
      listener_id: listener/warn
      minimum_severity: WARN
    related_node_ids:
      - LogListener
      - LogStream
      - LogRecord
    related_relation_ids:
      - log_listener_subscribes_to_stream
    expected_result:
      zh: 该角色被识别为 LogListener，低于 WARN 的记录保持在原流中且不会被诊断路由接收。
      en: The role is classified as LogListener; records below WARN remain in the source stream and are not delivered to the diagnostic route.
      ja: この役割は LogListener と判定され、WARN 未満の記録は元のストリームに残り診断経路へ送られません。
    why_valid_or_invalid:
      zh: 它具有订阅、到达时筛选和非阻塞路由三项监听器种差，但没有声明 ErrorListener 所需的错误专用条件。
      en: It has the listener differentia of subscription, arrival-time filtering, and non-blocking routing, without asserting the error-specific predicate required for ErrorListener.
      ja: 購読、到着時選別、非ブロッキング経路付けという listener の種差を満たしますが、ErrorListener 固有のエラー条件は宣言していません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-log-listener-003
  - id: LogListener-example-boundary-001
    kind: boundary
    labels:
      zh: 批量导出器边界
      en: Batch-exporter boundary
      ja: バッチ exporter の境界
    scenario_id: null
    descriptions:
      zh: 一个定时读取队列并把 512 条记录组成 OTLP 请求的组件消费同一 LogStream，但它不在每条记录到达时观察或路由，因此不是 LogListener。
      en: A component periodically drains 512 records from the same LogStream into an OTLP request, but it does not observe or route each record on arrival and therefore is not a LogListener.
      ja: 同じ LogStream から定期的に 512 件を取り出して OTLP 要求にする構成要素は、各記録到着時に観測・経路付けをしないため LogListener ではありません。
    field_values: {}
    related_node_ids:
      - LogListener
      - LogConsumer
      - LogStream
      - TelemetryExportBatch
    related_relation_ids:
      - LogConsumer-consumes-LogStream
    expected_result:
      zh: 该组件按批量消费者或导出器处理，不因消费 LogStream 就被归类为 LogListener。
      en: The component remains a batch consumer or exporter and is not classified as LogListener merely because it consumes a LogStream.
      ja: この構成要素はバッチ consumer または exporter のままで、LogStream を消費するだけでは LogListener に分類されません。
    why_valid_or_invalid:
      zh: 消费是上位职责；只有订阅并在单条记录到达路径上执行观察处理，才满足 LogListener 的种差。
      en: Consumption is the broader responsibility; only subscription plus observation on the per-record arrival path satisfies the LogListener differentia.
      ja: 消費はより広い責任であり、購読と記録単位の到着経路上の観測処理が揃って初めて LogListener の種差を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-log-listener-004
  - id: LogListener-example-instance-001
    kind: instance
    labels:
      zh: 安全告警监听器实例
      en: Security-alert listener instance
      ja: セキュリティ警告リスナーのインスタンス
    scenario_id: security-alert-listener-07
    descriptions:
      zh: 实例 `listener/security-07` 绑定 `stream/runtime-07`，在 event_name 为 `tool.permission.denied` 时将记录复制到安全审查队列。
      en: Instance `listener/security-07` binds to `stream/runtime-07` and copies a record to the security-review queue when event_name equals `tool.permission.denied`.
      ja: インスタンス `listener/security-07` は `stream/runtime-07` に結び付き、event_name が `tool.permission.denied` の記録をセキュリティ審査キューへ複製します。
    field_values:
      listener_id: listener/security-07
      stream_id: stream/runtime-07
      event_name: tool.permission.denied
    related_node_ids:
      - LogListener
      - LogStream
      - LogSubscription
    related_relation_ids:
      - log_listener_subscribes_to_stream
      - log_subscription_registers_listener
    expected_result:
      zh: 实例保留原日志记录并产生一次安全审查路由，不改变源流所有权。
      en: The instance retains the original LogRecord and creates one security-review route without changing ownership of the source stream.
      ja: 元の LogRecord を保持したまま一回のセキュリティ審査経路を作り、元ストリームの所有権を変えません。
    why_valid_or_invalid:
      zh: 绑定、事件条件、到达处理与目标路由均已明确，足以核实该实例的监听器身份。
      en: The binding, event predicate, arrival handler, and destination route are all explicit, which is sufficient to verify the instance as a LogListener.
      ja: 結合、イベント条件、到着ハンドラー、宛先経路が明示されており、LogListener インスタンスと確認できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-log-listener-005
