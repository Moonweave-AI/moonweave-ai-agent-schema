    predicate: receives
    direction: source-to-target
    relation_kind: information
    labels:
      zh: receives
      en: receives
      ja: receives
    definitions:
      zh: EventSink receives TelemetryEvent 表示一个具体遥测事件被交付并由事件接收端接受；关系成立需要交付确认或持久化证据，不等同于接收端仅被配置为目标。
      en: EventSink receives TelemetryEvent means that a concrete telemetry event is delivered to and accepted by the sink; the edge requires delivery acknowledgement or persistence evidence and is not established by destination configuration alone.
      ja: EventSink receives TelemetryEvent は具体的 telemetry event が sink へ配送され受理されたことを示します。配送確認または保存証拠が必要で、宛先設定だけでは成立しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_receives
      labels:
        zh: 反向：receives
        en: is target of receives
        ja: 逆方向：receives
    conditions: []
    temporal_scope: timeless
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: 事件接收端仍由 feedback-logging 唯一拥有，遥测事件仍由 runtime-observability 唯一拥有；receives 只建立跨域事实，不转移定义权。若该事实触发运行操作，还必须引用适用的 PolicyDecision 或 AuthorizationGrant。
        en: event sink remains uniquely owned by feedback-logging and telemetry event by runtime-observability; receives establishes a cross-Domain fact without transferring definitional ownership. If the fact triggers a runtime operation, it must also reference an applicable PolicyDecision or AuthorizationGrant.
        ja: イベントシンクは feedback-logging、テレメトリイベントは runtime-observability に引き続き一意に所有されます。receives は定義所有権を移さずドメイン横断事実だけを確立し、実行操作を起動する場合は適用される PolicyDecision または AuthorizationGrant も参照します。
      protocol_or_resource_context:
        zh: 查询沿 EventSink-receives-TelemetryEvent 的 source→target 方向、端点 canonical ID 与本关系来源主张执行；协议版本、资源身份和信任判定继续附着在原节点或原关系。
        en: Queries follow the source-to-target direction, endpoint canonical IDs, and source claims of EventSink-receives-TelemetryEvent; protocol versions, resource identity, and trust decisions remain attached to the original nodes or relation.
        ja: 照会は EventSink-receives-TelemetryEvent の source→target 方向、端点 canonical ID、当該関係の出典主張に従い、プロトコル版、資源同一性、信頼判断は元のノードまたは関係に保持されます。
