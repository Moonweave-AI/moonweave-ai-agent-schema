schema: moonweave.ai/ontology-node/v1
id: EventSink
kind: concept
status: accepted
labels:
  en: event sink
  zh: 事件接收端
  ja: イベントシンク
semantics:
  short_definition:
    zh: 事件接收端是以如下事实为区分特征的日志消费者：它是接受日志流、遥测事件、审计记录或轨迹导出的目的地、消费者、接收方或导出目标，用于存储、监控、审查或转发。
    en: Event sink is a Log Consumer; its differentiating condition is that it is a destination, consumer, receiver, or export target that accepts log streams, telemetry events, audit records, or trace exports for storage, monitoring, review, or forwarding.
    ja: イベントシンクはログ消費者の一種であり、次の条件で区別されます：それは、ログストリーム、テレメトリイベント、監査記録、トレースエクスポートを受け取り、保存、監視、レビュー、転送に使う宛先、消費者、受信者、エクスポート先です。
  definition:
    zh: 事件接收端是一种 LogConsumer；其种差是作为已配置的目的地接受 TelemetryEvent 或 LogStream，并根据接收合同持久化、显示或继续转发数据。它不因检查错误而成为 ErrorListener，也不等同于执行编码和网络发送的 exporter。
    en: An EventSink is a LogConsumer whose differentia is acting as a configured destination that accepts TelemetryEvents or LogStreams and persists, displays, or forwards them under a receiving contract. Inspecting an error does not make it an ErrorListener, and it is not the exporter activity that encodes and sends data.
    ja: EventSink は LogConsumer の一種で、設定済み宛先として TelemetryEvent または LogStream を受け取り、受信契約に従って保存、表示、転送する点で区別されます。エラーを確認しても ErrorListener にはならず、データを符号化・送信する exporter 活動でもありません。
  why_needed:
    zh: 独立建模接收端，可以查询数据最终进入了哪个目的地、目的地接受哪些信号以及交付是否成功，而不会把目的地和监听/导出活动混为一谈。
    en: A distinct sink role makes destination, supported signal, and delivery outcome queryable without conflating the destination with listener or export activity.
    ja: 独立した sink 役割により、宛先、対応信号、配送結果を照会でき、宛先を listener や export 活動と混同しません。
  includes:
    - zh: 纳入接收合同已明确所接收遥测信号的存储端、监控面板、消息队列或下游采集器。
      en: Includes a configured storage, dashboard, queue, or downstream collector destination whose receiving contract names the telemetry signal it accepts.
      ja: 受信契約で受け入れるテレメトリ信号を明示した保存先、監視ダッシュボード、キュー、下流コレクターを含みます。
  excludes:
    - zh: 排除负责筛选记录的 ErrorListener、声明交付配置的 LogSubscription，以及执行序列化与网络发送的 TelemetryExportActivity。
      en: Excludes an ErrorListener that filters records, a LogSubscription that configures delivery, and a TelemetryExportActivity that performs serialization and transmission.
      ja: 記録を選別する ErrorListener、配送設定を宣言する LogSubscription、直列化とネットワーク送信を実行する TelemetryExportActivity を除外します。
  semantic_kind: role
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: event-sink-declares-supported-signal
      severity: error
      expression_language: plain
      expression: an EventSink declares every telemetry signal accepted by its receiving contract
      explanations:
        zh: 事件接收端必须声明接收合同支持的遥测信号。
        en: An EventSink declares every telemetry signal accepted by its receiving contract.
        ja: EventSink は受信契約が対応する各テレメトリ信号を宣言します。
      source_claims:
        - claim-event-sink-003
  required_relation_constraints: []
examples:
  - id: EventSink-example-positive-001
    kind: positive
    labels:
      zh: 事件接收端正例
      en: Positive example of event sink
      ja: イベントシンクの正例
    scenario_id: null
    descriptions:
      zh: 在一次评估、纠正与改进决策循环中，系统将事件接收端（EventSink）记录为 EventSink receives TelemetryEvent 的源端点。其已审查定义是“事件接收端是以如下事实为区分特征的日志消费者：它是接受日志流、遥测事件、审计记录或轨迹导出的目的地、消费者、接收方或导出目标，用于存储、监控、审查或转发”。
      en: Sink `incident-index` accepts error TelemetryEvents from the diagnostics pipeline and persists their timestamp, body, resource, and trace identifiers for incident search.
      ja: 評価・修正・改善判断のサイクルでは、システムはイベントシンク（EventSink）を EventSink receives TelemetryEvent の始点として記録します。審査済み定義は「イベントシンクはログ消費者の一種であり、次の条件で区別されます：それは、ログストリーム、テレメトリイベント、監査記録、トレースエクスポートを受け取り、保存、監視、レビュー、転送に使う宛先、消費者、受信者、エクスポート先です」です。
    field_values:
      consumer_role_id: consumer-role/incident-index
      bearer_ref: component/incident-index
      input_scope_ref: stream/diagnostics/errors
      responsibility: persist accepted diagnostic events for incident search
    related_node_ids:
      - EventSink
      - TelemetryEvent
    related_relation_ids:
      - EventSink-receives-TelemetryEvent
    expected_result:
      zh: 该运行可查询 EventSink 以及方向保持不变的事实 EventSink-receives-TelemetryEvent。
      en: The run can query EventSink together with direction-preserving fact EventSink-receives-TelemetryEvent.
      ja: この実行では EventSink と方向を保持した事実 EventSink-receives-TelemetryEvent を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、EventSink-receives-TelemetryEvent 的 canonical 方向、概念定义和可用字段值。
      en: The destination has an explicit receiving contract and storage behavior, satisfying EventSink independently of any filtering or export execution.
      ja: このシナリオは実際の運用文脈、EventSink-receives-TelemetryEvent の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-event-sink-004
      - claim-event-sink-005
  - id: EventSink-example-boundary-001
    kind: boundary
    labels:
      zh: 事件接收端边界例
      en: Boundary case for event sink
      ja: イベントシンクの境界例
    scenario_id: null
    descriptions:
      zh: ErrorListener 用作EventSink的边界对照：两者可见于同一图谱片段，但 ErrorListener 的已审查定义是“错误监听器是一种日志消费者；其区分条件是：它订阅运行、沙箱、工具、协议或日志事件，以检测并路由错误用于诊断。”。不能因 shared parent LogConsumer 而把它归入EventSink。
      en: Listener `tool-errors` filters a stream and routes matching records to diagnosis but has no destination storage contract; it is an ErrorListener, not an EventSink.
      ja: ErrorListener は EventSink の境界対照です。同じグラフ断片に現れ得ますが、ErrorListener の審査済み定義は「ログ消費者に属するエラーリスナーは、次の事実を種差とします：それは、実行、サンドボックス、ツール、プロトコル、ログイベントを購読し、診断のためにエラーを検出して経路付けます。」です。shared parent LogConsumer だけで EventSink にはなりません。
    field_values: {}
    related_node_ids:
      - EventSink
      - TelemetryEvent
      - ErrorListener
    related_relation_ids:
      - EventSink-receives-TelemetryEvent
    expected_result:
      zh: ErrorListener 保持其原有类型，验证器不得凭关系共现把它提升为 EventSink。
      en: ErrorListener retains its own type; validation must not promote it to EventSink from relation co-occurrence.
      ja: ErrorListener は元の型を維持し、関係の共起だけで EventSink へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 EventSink-receives-TelemetryEvent 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: Selection and routing identify a listener; EventSink additionally requires the receiving-destination contract that this object lacks.
      ja: 境界例は実在する対照ノードを示し、EventSink-receives-TelemetryEvent の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-event-sink-006
      - claim-event-sink-007
  - id: EventSink-example-instance-001
    kind: instance
    labels:
      zh: 事件接收端实例
      en: Event-sink instance
      ja: イベントシンクのインスタンス
    scenario_id: incident-index-delivery
    descriptions:
      zh: 实例 `incident-index` 接受 logs 信号并写入索引 `agent-incidents-v4`。
      en: Instance `incident-index` accepts the logs signal and writes records to index `agent-incidents-v4`.
      ja: インスタンス `incident-index` は logs 信号を受け取り、`agent-incidents-v4` 索引へ記録します。
    field_values:
      sink_id: incident-index
      signal: logs
      destination: agent-incidents-v4
    related_node_ids:
      - EventSink
      - TelemetryEvent
    related_relation_ids:
      - EventSink-receives-TelemetryEvent
    expected_result:
      zh: 日志事件被该接收端接受并持久化。
      en: Log events are accepted and persisted by the destination.
      ja: ログイベントが宛先に受理・保存されます。
    why_valid_or_invalid:
      zh: 实例给出接收端身份、支持信号与持久化目的地。
      en: The instance supplies sink identity, supported signal, and persistence destination.
      ja: sink 同一性、対応信号、保存宛先を備えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-event-sink-008
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: LogListener
    shared_parent_concept_id: LogConsumer
    differentia:
      zh: 正向身份比较：父节点 LogConsumer：EventSink（semantic kind=role，骨架 EventSink-is_a-LogConsumer）；LogListener（semantic kind=role，骨架 LogListener-is_a-LogConsumer）。双端条件：EventSink 条件：“事件接收端是以如下事实为区分特征的日志消费者：它是接受日志流、遥测事件、审计记录或轨迹导出的目的地、消费者、接收方或导出目标，用于存储、监控、审查或转发”；LogListener 条件：“日志监听器是一种日志消费者；其区分条件是：它是订阅日志流或遥测通道的观察组件，并把记录路由到诊断、审查、指标、审计日志或事件接收端”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent LogConsumer: EventSink (semantic kind=role, backbone EventSink-is_a-LogConsumer); LogListener (semantic kind=role, backbone LogListener-is_a-LogConsumer). Endpoint conditions: EventSink condition: “Event sink is a Log Consumer; its differentiating condition is that it is a destination, consumer, receiver, or export target that accepts log streams, telemetry events, audit records, or trace exports for storage, monitoring, review, or forwarding”; LogListener condition: “As a Log Consumer, Log listener is distinguished by the fact that it is an observer component that subscribes to log streams or telemetry channels and routes records to diagnostics, review, metrics, audit logs, or event sinks”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 LogConsumer：EventSink（semantic kind=role、バックボーン EventSink-is_a-LogConsumer）；LogListener（semantic kind=role、バックボーン LogListener-is_a-LogConsumer）。両端条件：EventSink の条件：「イベントシンクはログ消費者の一種であり、次の条件で区別されます：それは、ログストリーム、テレメトリイベント、監査記録、トレースエクスポートを受け取り、保存、監視、レビュー、転送に使う宛先、消費者、受信者、エクスポート先です」；LogListener の条件：「ログ消費者に属するログリスナーは、次の事実を種差とします：それは、ログストリームまたはテレメトリチャネルを購読し、記録を診断、レビュー、指標、監査ログ、イベントシンクへ経路付ける観測コンポーネントです」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-event-sink-009
parent_relation:
  id: EventSink-is_a-LogConsumer
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: EventSink is_a LogConsumer 表示事件接收端完整继承日志消费者的消费职责，并以作为最终接收、存储或转发目的地为种差；它不是到达时观察者。
    en: EventSink is_a LogConsumer means that an event sink inherits the complete consumption role and is differentiated by serving as a terminal receipt, storage, or forwarding destination rather than an arrival-time observer.
    ja: EventSink is_a LogConsumer は event sink が消費役割全体を継承し、到着時観測者ではなく最終受信・保存・転送先である点を種差とすることを示します。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: has_subtype
    labels:
      zh: 反向：是一种
      en: has subtype
      ja: 逆方向：の一種である
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: EventSink-is_a-LogConsumer-example-positive-001
      kind: positive
      labels:
        zh: 遥测存储接收端
        en: Telemetry-storage sink
        ja: telemetry 保存 sink
      scenario_id: null
      descriptions:
        zh: 对象 `sink/archive` 接收日志与遥测批次、确认写入并按保留策略存储，承担明确的终端消费职责。
        en: Object `sink/archive` receives log and telemetry batches, acknowledges writes, and stores them under a retention policy, bearing an explicit terminal-consumption role.
        ja: 対象 `sink/archive` はログ・telemetry batch を受信し書込を確認して保持 policy に従い保存し、明示的終端消費役割を担います。
      field_values: {}
      related_node_ids:
        - EventSink
        - LogConsumer
      related_relation_ids:
        - EventSink-is_a-LogConsumer
      expected_result:
        zh: 对象同时可按 EventSink 与 LogConsumer 查询，且继承消费关系。
        en: The object is queryable as both EventSink and LogConsumer and inherits consumption relations.
        ja: 対象は EventSink と LogConsumer の両方で検索でき、消費関係を継承します。
      why_valid_or_invalid:
        zh: 它满足全部上位角色条件，并以终端目的地而非监听行为区分。
        en: It satisfies every super-role condition and is differentiated by terminal destination rather than listening behavior.
        ja: 上位役割条件をすべて満たし、listener 行動ではなく終端宛先で区別されます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-event-sink-010
    - id: EventSink-is_a-LogConsumer-example-boundary-001
      kind: boundary
      labels:
        zh: 日志订阅规范边界
        en: Subscription-specification boundary
        ja: 購読仕様の境界
      scenario_id: null
      descriptions:
        zh: LogSubscription 只声明流与监听器绑定，不接收、确认或保存任何记录，因此不能因配置消费者而成为 EventSink。
        en: A LogSubscription only declares a stream-listener binding and receives, acknowledges, or stores no record, so configuring a consumer does not make it an EventSink.
        ja: LogSubscription は stream-listener 結合だけを宣言し、記録を受信・確認・保存しないため consumer を設定しても EventSink にはなりません。
      field_values: {}
      related_node_ids:
        - EventSink
        - LogConsumer
      related_relation_ids:
        - EventSink-is_a-LogConsumer
      expected_result:
        zh: 规范保持 LogSubscription 类型，不获得 LogConsumer 或 EventSink 身份。
        en: The specification remains LogSubscription and gains neither LogConsumer nor EventSink identity.
        ja: 仕様は LogSubscription のままで LogConsumer・EventSink 同一性を得ません。
      why_valid_or_invalid:
        zh: 角色由实际承担的消费职责识别，配置对象与职责承担者不能混为同级。
        en: A role is identified by borne consumption responsibility; a configuration object and its role bearer are not interchangeable peers.
        ja: 役割は実際の消費責任で識別され、構成対象と役割担当者は交換可能な同格ではありません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-event-sink-011
  source_claims:
    - claim-event-sink-012
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
