schema: moonweave.ai/ontology-node/v1
id: LogConsumer
kind: concept
status: accepted
labels:
  zh: 日志消费者
  en: Log Consumer
  ja: ログ消費者
semantics:
  short_definition:
    zh: 日志消费者属于角色，区别于其他同类对象的条件是：LogConsumer 是消费 LogStream、LogArtifact 或 TelemetryEvent 的角色，可监听、路由、存储或转发；订阅是配置消费者的规范，不是消费者本身。
    en: LogConsumer is a role consuming LogStreams, LogArtifacts, or TelemetryEvents to listen, route, store, or forward; a subscription configures a consumer and is not itself a consumer.
    ja: ログ消費者は役割のうち、次の事実を定義条件とする対象です：LogConsumer は LogStream・LogArtifact・TelemetryEvent を消費して監視・ルーティング・保存・転送する役割で、購読は消費者を設定する仕様であり消費者自体ではない。
  definition:
    zh: 日志消费者是一类在遥测管线中读取 LogStream 或 TelemetryEvent 并承担选择、路由、接收、存储或转发职责的角色。其身份来自消费职责而非实现进程；LogListener 与 EventSink 是不同下位角色，LogSubscription 则是配置它们的规范。
    en: A LogConsumer is a role in a telemetry pipeline that reads LogStreams or TelemetryEvents and is responsible for selection, routing, receipt, storage, or forwarding. Its identity comes from the consumption responsibility rather than an implementation process; LogListener and EventSink specialize the role, while LogSubscription configures it.
    ja: LogConsumer は、テレメトリ・パイプラインで LogStream または TelemetryEvent を読み、選択・経路付け・受信・保存・転送を担う役割です。同一性は実装プロセスではなく消費責任に由来し、LogListener と EventSink が下位役割、LogSubscription はそれらを設定する仕様です。
  why_needed:
    zh: 该角色上位概念把“谁处理日志”与“日志是什么、订阅如何配置”分开，并为监听器与接收端提供不跳级的共同父节点。
    en: This role genus separates who processes logs from what the log is and how a subscription is configured, while giving listeners and sinks a genuine common parent.
    ja: この役割上位概念は、ログを処理する主体をログ内容や購読設定から分離し、listener と sink に真正な共通親を与えます。
  includes:
    - zh: 纳入已声明 LogStream 输入并为接收记录定义处理去向的监听器、接收端或兼容处理器角色。
      en: Includes a listener, sink, or compatible processor role with a declared LogStream input and a defined disposition for accepted records.
      ja: LogStream 入力を宣言し、受信記録の処理先を定めた listener、sink、または互換 processor の役割を含みます。
  excludes:
    - zh: 排除被消费的 LogStream、用于配置绑定的 LogSubscription，以及身份属于一次执行而非角色的 TelemetryExportActivity。
      en: Excludes the LogStream being consumed, the LogSubscription specification, and TelemetryExportActivity whose identity is an execution rather than a role.
      ja: 消費対象の LogStream、結合を構成する LogSubscription、役割ではなく一回の実行として同一化される TelemetryExportActivity を除外します。
  semantic_kind: role
  aliases: []
structure:
  identity_keys:
    - consumer_role_id
  fields:
    - id: consumer_role_id
      labels:
        zh: 消费角色标识
        en: consumer-role ID
        ja: consumer role ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一项日志消费责任，而不是承担该责任的进程实例。
        en: Stably identifies one log-consumption responsibility rather than the process instance that bears it.
        ja: ログ消費責任を安定識別し、その責任を担う process instance とは区別します。
      allowed_values: []
      pattern: null
      example_value: consumer-role/diagnostic-router
      source_claims:
        - claim-log-consumer-003
    - id: bearer_ref
      labels:
        zh: 角色承担者引用
        en: role-bearer reference
        ja: role bearer 参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用当前承担该消费责任的组件或运行时主体；重新分配不改变角色本身的语义。
        en: References the component or runtime actor currently bearing the consumption responsibility; reassignment does not change the role semantics.
        ja: 消費責任を現在担う component または runtime actor を参照し、再割当ては role の意味を変更しません。
      allowed_values: []
      pattern: null
      example_value: component/diagnostic-router
      source_claims:
        - claim-log-consumer-004
    - id: input_scope_ref
      labels:
        zh: 输入范围引用
        en: input-scope reference
        ja: 入力 scope 参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该角色获准读取的 LogStream 或遥测输入范围，而不是输出目的地。
        en: References the LogStream or telemetry input scope the role is responsible for reading, not its output destination.
        ja: role が読む責任を持つ LogStream または telemetry 入力範囲を参照し、出力先とは区別します。
      allowed_values: []
      pattern: null
      example_value: stream/runtime/logs
      source_claims:
        - claim-log-consumer-005
    - id: responsibility
      labels:
        zh: 消费责任
        en: consumption responsibility
        ja: 消費責任
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明该角色对被接收记录承担筛选、路由、留存、展示或转发中的哪项可核验责任。
        en: States the auditable selection, routing, retention, display, or forwarding responsibility the role assumes for accepted records.
        ja: 受理 record に対する選択・routing・保持・表示・転送のどの検証可能責任を担うか示します。
      allowed_values: []
      pattern: null
      example_value: route errors to diagnosis and forward remaining logs to archive
      source_claims:
        - claim-log-consumer-006
  constraints:
    - id: log-consumer-declares-input-and-disposition
      severity: error
      expression_language: plain
      expression: a LogConsumer declares its LogStream input and disposition for accepted records
      explanations:
        zh: 日志消费者必须声明日志流输入及记录处理方式。
        en: A LogConsumer declares its LogStream input and disposition for accepted records.
        ja: LogConsumer は LogStream 入力と受理記録の処理方法を宣言します。
      source_claims:
        - claim-log-consumer-007
  required_relation_constraints: []
examples:
  - id: LogConsumer-example-positive-001
    kind: positive
    labels:
      zh: 日志消费者正例
      en: Positive example of Log Consumer
      ja: ログ消費者の正例
    scenario_id: null
    descriptions:
      zh: 在一次评估、纠正与改进决策循环中，系统将日志消费者（LogConsumer）记录为 LogConsumer consumes LogStream 的源端点。其已审查定义是“日志消费者属于角色，区别于其他同类对象的条件是：LogConsumer 是消费 LogStream、LogArtifact 或 TelemetryEvent 的角色，可监听、路由、存储或转发；订阅是配置消费者的规范，不是消费者本身”。
      en: "Component `diagnostic-router` bears a LogConsumer role: it receives `runtime/logs`, retains ERROR records for diagnosis, and forwards the remainder to cold storage."
      ja: 評価・修正・改善判断のサイクルでは、システムはログ消費者（LogConsumer）を LogConsumer consumes LogStream の始点として記録します。審査済み定義は「ログ消費者は役割のうち、次の事実を定義条件とする対象です：LogConsumer は LogStream・LogArtifact・TelemetryEvent を消費して監視・ルーティング・保存・転送する役割で、購読は消費者を設定する仕様であり消費者自体ではない」です。
    field_values:
      consumer_role_id: consumer-role/diagnostic-router
      bearer_ref: component/diagnostic-router
      input_scope_ref: stream/runtime/logs
      responsibility: retain ERROR records for diagnosis and forward remaining records to cold storage
    related_node_ids:
      - LogConsumer
      - LogStream
    related_relation_ids:
      - LogConsumer-consumes-LogStream
    expected_result:
      zh: 该运行可查询 LogConsumer 以及方向保持不变的事实 LogConsumer-consumes-LogStream。
      en: The run can query LogConsumer together with direction-preserving fact LogConsumer-consumes-LogStream.
      ja: この実行では LogConsumer と方向を保持した事実 LogConsumer-consumes-LogStream を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、LogConsumer-consumes-LogStream 的 canonical 方向、概念定义和可用字段值。
      en: The component has an explicit LogStream input and disposition for every accepted record, which are the identity conditions of the consumer role.
      ja: このシナリオは実際の運用文脈、LogConsumer-consumes-LogStream の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-log-consumer-008
      - claim-log-consumer-009
  - id: LogConsumer-example-boundary-001
    kind: boundary
    labels:
      zh: 日志消费者边界例
      en: Boundary case for Log Consumer
      ja: ログ消費者の境界例
    scenario_id: null
    descriptions:
      zh: LogStream 用作LogConsumer的边界对照：两者可见于同一图谱片段，但 LogStream 的已审查定义是“日志流属于集合，区别于其他同类对象的条件是：它是从运行、工具、协议、沙箱或反馈组件投递到监听器或接收端的日志记录或遥测项有序流。”。不能因 relation LogConsumer-consumes-LogStream 而把它归入LogConsumer。
      en: "`runtime/logs` is the ordered collection supplied to `diagnostic-router`; it has stream identity and records but performs no processing, so it is a LogStream rather than a LogConsumer."
      ja: LogStream は LogConsumer の境界対照です。同じグラフ断片に現れ得ますが、LogStream の審査済み定義は「ログストリームは集合のうち、次の事実を定義条件とする対象です：それは、実行、ツール、プロトコル、サンドボックス、フィードバック構成要素からリスナーまたはシンクへ届けられるログ記録またはテレメトリ項目の順序付きストリームです。」です。relation LogConsumer-consumes-LogStream だけで LogConsumer にはなりません。
    field_values: {}
    related_node_ids:
      - LogConsumer
      - LogStream
    related_relation_ids:
      - LogConsumer-consumes-LogStream
    expected_result:
      zh: LogStream 保持其原有类型，验证器不得凭关系共现把它提升为 LogConsumer。
      en: LogStream retains its own type; validation must not promote it to LogConsumer from relation co-occurrence.
      ja: LogStream は元の型を維持し、関係の共起だけで LogConsumer へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 LogConsumer-consumes-LogStream 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: Input data and the role that processes it have different identity conditions; being consumed does not make the stream a consumer.
      ja: 境界例は実在する対照ノードを示し、LogConsumer-consumes-LogStream の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-log-consumer-010
      - claim-log-consumer-011
  - id: LogConsumer-example-instance-001
    kind: instance
    labels:
      zh: 日志消费者实例
      en: Log-consumer instance
      ja: ログ消費者のインスタンス
    scenario_id: diagnostic-router
    descriptions:
      zh: 实例 `diagnostic-router` 消费 `runtime/logs` 并按严重度分别路由到诊断和归档。
      en: Instance `diagnostic-router` consumes `runtime/logs` and routes records by severity to diagnosis or archive.
      ja: インスタンス `diagnostic-router` は `runtime/logs` を消費し、重大度で診断または保管へ転送します。
    field_values:
      consumer_id: diagnostic-router
      input: runtime/logs
    related_node_ids:
      - LogConsumer
      - LogStream
    related_relation_ids:
      - LogConsumer-consumes-LogStream
    expected_result:
      zh: 每条接收记录都有确定处理结果。
      en: Every accepted record has a defined disposition.
      ja: 各受理記録に確定した処理結果があります。
    why_valid_or_invalid:
      zh: 实例声明角色身份、输入流和记录处理规则。
      en: The instance declares role identity, input stream, and record-disposition rules.
      ja: 役割同一性、入力ストリーム、記録処理規則を宣言します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-log-consumer-012
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: LogConsumer-consumes-LogStream
    predicate: consumes
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 消费
      en: consumes
      ja: 消費する
    definitions:
      zh: LogConsumer consumes LogStream 表示一个消费角色依照消费合同读取日志流记录并推进自己的消费位置；它不转移 LogStream 所有权，也不限定消费必须逐条或批量。
      en: LogConsumer consumes LogStream means that a consumption role reads records under a consumption contract and advances its own position in the stream; it does not transfer LogStream ownership and does not require per-record or batch mode.
      ja: LogConsumer consumes LogStream は消費役割が契約に従って記録を読み自身の stream 位置を進めることを示します。LogStream 所有権を移さず、逐次・batch 方式のどちらにも限定しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: consumed_by
      labels:
        zh: 反向：消费
        en: consumed by
        ja: 逆方向：消費する
    conditions:
      - id: LogConsumer-consumes-LogStream-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the same LogConsumer identity reads at least one member record from the named LogStream under a consumption contract and records a consumer-specific position or acknowledgement; metadata inspection alone is insufficient.
        explanations:
          zh: 仅当同一个 LogConsumer 按消费合同从指定 LogStream 实际读取至少一条成员记录，并留下消费者专属位置或确认信息时成立；只查看流名称、积压量或配置不成立。
          en: Assert only when the same LogConsumer identity reads at least one member record from the named LogStream under a consumption contract and records a consumer-specific position or acknowledgement; metadata inspection alone is insufficient.
          ja: 同じ LogConsumer ID が消費契約に従って指定 LogStream の member record を少なくとも一件実読取し、consumer 固有 position または acknowledgement を記録した場合だけ成立します。metadata 閲覧だけでは不十分です。
        source_claims:
          - claim-log-consumer-013
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: LogConsumer-consumes-LogStream-example-positive-001
        kind: positive
        labels:
          zh: 归档消费者推进游标
          en: Archiver advances cursor
          ja: archive consumer の cursor 前進
        scenario_id: null
        descriptions:
          zh: 归档角色从 `stream/runtime` 读取序列 500 至 549，成功持久化后把自己的游标推进到 549。
          en: An archive consumer reads sequences 500 through 549 from `stream/runtime` and advances its own cursor to 549 after successful persistence.
          ja: archive consumer は `stream/runtime` の連番 500〜549 を読み、保存成功後に自身の cursor を 549 へ進めます。
        field_values: {}
        related_node_ids:
          - LogConsumer
          - LogStream
        related_relation_ids:
          - LogConsumer-consumes-LogStream
        expected_result:
          zh: 建立 consumes 边并记录消费者专属游标，流仍可被其他消费者读取。
          en: A consumes edge and consumer-specific cursor are recorded, while the stream remains readable by other consumers.
          ja: consumes 辺と consumer 固有 cursor を記録し、stream は他 consumer も読めます。
        why_valid_or_invalid:
          zh: 读取范围、消费合同和游标推进均可核实，且没有声称独占所有权。
          en: Read range, consumption contract, and cursor advance are verifiable without asserting exclusive ownership.
          ja: 読取範囲、消費契約、cursor 前進を検証でき、排他的所有を主張しません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-log-consumer-014
      - id: LogConsumer-consumes-LogStream-example-boundary-001
        kind: boundary
        labels:
          zh: 只查看元数据边界
          en: Metadata-only inspection boundary
          ja: metadata 閲覧のみの境界
        scenario_id: null
        descriptions:
          zh: 监控面板读取 LogStream 的名称和积压计数，却没有读取任何成员记录或推进消费位置，因此不是 consumes。
          en: A dashboard reads a LogStream name and backlog count but reads no member record and advances no consumption position, so it does not consume the stream.
          ja: dashboard は LogStream 名と backlog 数を読むだけで要素記録を読まず消費位置も進めないため consumes ではありません。
        field_values: {}
        related_node_ids:
          - LogConsumer
          - LogStream
        related_relation_ids:
          - LogConsumer-consumes-LogStream
        expected_result:
          zh: 保留元数据观察，不创建 LogConsumer consumes LogStream 关系。
          en: Metadata observation is retained and no LogConsumer consumes LogStream edge is created.
          ja: metadata 観測を保持し LogConsumer consumes LogStream 辺は作りません。
        why_valid_or_invalid:
          zh: 查看流状态与承担记录消费职责不同，缺少记录读取和消费进度证据。
          en: Inspecting stream state differs from bearing record-consumption responsibility; record reads and progress evidence are absent.
          ja: stream 状態閲覧と記録消費責任は異なり、記録読取・進捗証拠がありません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-log-consumer-015
    source_claims:
      - claim-log-consumer-016
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:LogStream
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-feedback-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OpenTelemetry Logs/Metrics 数据模型、OTLP 导出模式与结构化日志实践逐项核验。
    en: Verified against OpenTelemetry Logs/Metrics data model, OTLP export patterns, and structured logging practices.
    ja: OpenTelemetry Logs/Metrics データモデル、OTLP 出力パターン、構造化ログ実践に照らし確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-log-consumer-001
    source: eng-observe-opentelemetry-collector-components
    supports: OpenTelemetry Collector processors transform, filter, and enrich telemetry while exporters send it to backends, supporting the operational boundary of LogConsumer. The role abstraction, cursor semantics, and LogListener/EventSink hierarchy are Moonweave design inference.
    locator: Collector Components > Component Types > Processors and Exporters
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-consumer-002
    source: eng-fw-openai-tracing
    supports: OpenAI tracing processors receive trace and span callbacks and can push them to additional destinations, supporting the processing role represented by LogConsumer; OpenAI does not assert this ontology class.
    locator: Tracing guide > Custom tracing processors; Processor interface > callbacks
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-consumer-003
    source: eng-observe-opentelemetry-collector-components
    supports: OpenTelemetry Collector separates processors and exporters by pipeline responsibility but does not assign role identities. LogConsumer.consumer_role_id is Moonweave's stable key for one such declared consumption responsibility.
    locator: Collector Components > Component Types > Processors and Exporters
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-consumer-004
    source: eng-observe-opentelemetry-collector-components
    supports: Collector pipelines instantiate configured processors and exporters as components. LogConsumer.bearer_ref is Moonweave's explicit role-to-component binding and is not a Collector field.
    locator: Collector Architecture > Pipelines > Receivers, processors, and exporters
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-consumer-005
    source: eng-observe-opentelemetry-collector-components
    supports: Collector pipelines connect signal-specific receiver outputs through processors to exporters. LogConsumer.input_scope_ref is Moonweave's auditable binding to the consumed side of that pipeline.
    locator: Collector Architecture > Pipelines > Receivers, processors, and exporters
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-log-consumer-006
    source: eng-observe-opentelemetry-collector-components
    supports: Collector processors may filter, transform, enrich, or route telemetry, while exporters send data to backends. LogConsumer.responsibility is Moonweave's explicit statement of which of those responsibilities applies to one role.
    locator: Collector Components > Component Types > Processors and Exporters
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-log-consumer-007
    source: eng-observe-opentelemetry-collector-components
    supports: OpenTelemetry Collector documents processors that transform, filter, and enrich telemetry and exporters that send it to backends; the LogConsumer role abstraction and downstream disposition contract are Moonweave design inference.
    locator: Collector Components > Component Types > Processors and Exporters
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-consumer-008
    source: eng-observe-opentelemetry-collector-components
    supports: LogConsumer-example-positive-001 follows the documented Collector processor role that transforms, filters, or enriches telemetry; naming that configured role LogConsumer and assigning cursor state are Moonweave design inference.
    locator: Collector Components > Component Types > Processors
