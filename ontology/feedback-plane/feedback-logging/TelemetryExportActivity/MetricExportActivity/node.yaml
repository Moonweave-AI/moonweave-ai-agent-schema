schema: moonweave.ai/ontology-node/v1
id: MetricExportActivity
kind: concept
status: review
labels:
  zh: 测量导出活动
  en: Measurement export activity
  ja: 測定出力活動
semantics:
  short_definition:
    zh: 测量导出活动是以如下事实为区分特征的遥测导出活动：它引用评估域拥有的 Measurement，并输出不复制测量语义的引用批次。
    en: Measurement export activity is a Telemetry export activity; its differentiating condition is that it references feedback-owned Measurement records and emits a batch of references without duplicating measurement semantics.
    ja: 測定出力活動はテレメトリ出力活動の一種であり、次の条件で区別されます：それは評価領域所有の Measurement を参照し、測定意味を複製しない参照バッチを出力します。
  definition:
    zh: 指标导出活动是一种 TelemetryExportActivity；其种差是读取反馈域拥有的 Measurement，通过 MeasurementReference 保留其身份，并按照 metric point/temporality 配置形成指标批次。它不复制 Metric 或 Measurement 的规范定义。
    en: A MetricExportActivity is a TelemetryExportActivity whose differentia is reading feedback-owned Measurements, preserving their identity through MeasurementReferences, and forming a metric batch under metric-point and temporality configuration. It does not duplicate the canonical Metric or Measurement definitions.
    ja: MetricExportActivity は TelemetryExportActivity の一種で、feedback 所有の Measurement を読み、MeasurementReference で同一性を保持し、metric point と temporality 設定に従って指標バッチを形成する点で区別されます。Metric や Measurement の標準定義は複製しません。
  why_needed:
    zh: 该活动把评估测量的规范所有权与指标传输表示分开，并记录导出时采用的聚合时间性和引用集合。
    en: This activity separates canonical ownership of evaluation measurements from their metric transport representation and records the aggregation temporality and reference set used for export.
    ja: この活動は評価測定の標準所有権を指標転送表現から分離し、出力時の集約 temporality と参照集合を記録します。
  includes:
    - zh: 纳入选择 Measurement、建立稳定引用，并按已声明聚合时间性导出 metrics 信号批次的一次执行。
      en: Includes an execution that selects Measurements, creates stable references, and exports a metrics-signal batch with declared temporality.
      ja: Measurement を選択して安定参照を作り、宣言済み temporality で metrics 信号バッチを出力する一回の実行を含みます。
  excludes:
    - zh: 排除 LogExportActivity、TraceExportActivity，以及只计算 Measurement 而不执行传输导出的 EvaluationRun。
      en: Excludes LogExportActivity, TraceExportActivity, and an EvaluationRun that computes Measurements but performs no transport export.
      ja: LogExportActivity、TraceExportActivity、および Measurement を計算するだけで転送出力を行わない EvaluationRun を除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: metric-export-preserves-measurement-identity
      severity: error
      expression_language: plain
      expression: a MetricExportActivity preserves each source Measurement identity and declares aggregation temporality
      explanations:
        zh: 指标导出活动必须保留源 Measurement 身份并声明聚合时间性。
        en: A MetricExportActivity preserves each source Measurement identity and declares aggregation temporality.
        ja: MetricExportActivity は各 Measurement の同一性を保持し、集約 temporality を宣言します。
      source_claims:
        - claim-metric-export-activity-003
  required_relation_constraints: []
examples:
  - id: MetricExportActivity-example-positive-001
    kind: positive
    labels:
      zh: 测量导出活动正例
      en: Positive example of Measurement export activity
      ja: 測定出力活動の正例
    scenario_id: null
    descriptions:
      zh: 在一次评估、纠正与改进决策循环中，系统将测量导出活动（MetricExportActivity）记录为 MetricExportActivity consumes Measurement 的源端点。其已审查定义是“测量导出活动是以如下事实为区分特征的遥测导出活动：它引用评估域拥有的 Measurement，并输出不复制测量语义的引用批次”。
      en: Export run `metrics-eval-44` selects latency and safety Measurements from evaluation `eval-44`, creates stable MeasurementReferences, and exports a delta-temporality metrics batch.
      ja: 評価・修正・改善判断のサイクルでは、システムは測定出力活動（MetricExportActivity）を MetricExportActivity consumes Measurement の始点として記録します。審査済み定義は「測定出力活動はテレメトリ出力活動の一種であり、次の条件で区別されます：それは評価領域所有の Measurement を参照し、測定意味を複製しない参照バッチを出力します」です。
    field_values:
      export_activity_id: export/metrics-eval-44
      signal: metrics
      source_scope_ref: measurement-set/eval-44
      exporter_configuration_ref: exporter-config/otlp-metrics-delta@3
      started_at: 2026-07-16T14:40:00.000Z
      ended_at: 2026-07-16T14:40:00.410Z
      outcome: success
    related_node_ids:
      - MetricExportActivity
      - Measurement
    related_relation_ids:
      - MetricExportActivity-consumes-Measurement
    expected_result:
      zh: 该运行可查询 MetricExportActivity 以及方向保持不变的事实 MetricExportActivity-consumes-Measurement。
      en: The run can query MetricExportActivity together with direction-preserving fact MetricExportActivity-consumes-Measurement.
      ja: この実行では MetricExportActivity と方向を保持した事実 MetricExportActivity-consumes-Measurement を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、MetricExportActivity-consumes-Measurement 的 canonical 方向、概念定义和可用字段值。
      en: The execution consumes Measurements, preserves their identities by reference, declares metrics signal and temporality, and therefore satisfies MetricExportActivity.
      ja: このシナリオは実際の運用文脈、MetricExportActivity-consumes-Measurement の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-metric-export-activity-004
      - claim-metric-export-activity-005
  - id: MetricExportActivity-example-boundary-001
    kind: boundary
    labels:
      zh: 测量导出活动边界例
      en: Boundary case for Measurement export activity
      ja: 測定出力活動の境界例
    scenario_id: null
    descriptions:
      zh: LogExportActivity 用作MetricExportActivity的边界对照：两者可见于同一图谱片段，但 LogExportActivity 的已审查定义是“作为遥测导出活动，日志导出活动由这一事实区分：它从一个有界日志流读取记录并形成可传输批次。”。不能因 shared parent TelemetryExportActivity 而把它归入MetricExportActivity。
      en: Export run `logs-eval-44` batches ReadableLogRecords from a LogStream and has no metric points, MeasurementReferences, or temporality; it is LogExportActivity, not MetricExportActivity.
      ja: LogExportActivity は MetricExportActivity の境界対照です。同じグラフ断片に現れ得ますが、LogExportActivity の審査済み定義は「ログ出力活動はテレメトリ出力活動として、次の条件により他の対象と区別されます：それは境界付きログストリームから記録を読み、転送可能なバッチを形成します。」です。shared parent TelemetryExportActivity だけで MetricExportActivity にはなりません。
    field_values: {}
    related_node_ids:
      - MetricExportActivity
      - Measurement
      - LogExportActivity
    related_relation_ids:
      - MetricExportActivity-consumes-Measurement
    expected_result:
      zh: LogExportActivity 保持其原有类型，验证器不得凭关系共现把它提升为 MetricExportActivity。
      en: LogExportActivity retains its own type; validation must not promote it to MetricExportActivity from relation co-occurrence.
      ja: LogExportActivity は元の型を維持し、関係の共起だけで MetricExportActivity へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 MetricExportActivity-consumes-Measurement 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: The metrics subtype requires metric-signal input and temporality; a batch of log records cannot satisfy those conditions.
      ja: 境界例は実在する対照ノードを示し、MetricExportActivity-consumes-Measurement の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-metric-export-activity-006
      - claim-metric-export-activity-007
  - id: MetricExportActivity-example-instance-001
    kind: instance
    labels:
      zh: 指标导出活动实例
      en: Metric-export instance
      ja: 指標出力活動のインスタンス
    scenario_id: evaluation-metric-export
    descriptions:
      zh: 实例 `metrics-eval-44` 导出 12 个 MeasurementReference，采用 delta 时间性。
      en: Instance `metrics-eval-44` exports twelve MeasurementReferences with delta temporality.
      ja: インスタンス `metrics-eval-44` は 12 個の MeasurementReference を delta temporality で出力します。
    field_values:
      activity_id: metrics-eval-44
      signal: metrics
      temporality: delta
      reference_count: 12
    related_node_ids:
      - MetricExportActivity
      - TelemetryExportActivity
      - Measurement
    related_relation_ids:
      - MetricExportActivity-is_a-TelemetryExportActivity
      - MetricExportActivity-consumes-Measurement
    expected_result:
      zh: 导出保持十二条测量的引用身份。
      en: The export preserves the identities of all twelve referenced Measurements.
      ja: 出力は参照する 12 測定の同一性を保持します。
    why_valid_or_invalid:
      zh: 输入为 Measurement、信号为 metrics 且时间性已声明。
      en: Its input is Measurement, its signal is metrics, and temporality is declared.
      ja: 入力が Measurement、信号が metrics、temporality が宣言済みです。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-metric-export-activity-008
