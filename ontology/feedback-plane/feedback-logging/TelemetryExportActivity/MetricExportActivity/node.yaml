sibling_differentiation:
  - sibling_concept_id: TraceExportActivity
    shared_parent_concept_id: TelemetryExportActivity
    differentia:
      zh: 共享父节点对照：父节点 TelemetryExportActivity：MetricExportActivity（semantic kind=activity，骨架 MetricExportActivity-is_a-TelemetryExportActivity）；TraceExportActivity（semantic kind=activity，骨架 TraceExportActivity-is_a-TelemetryExportActivity）。双端条件：MetricExportActivity 条件：“测量导出活动是以如下事实为区分特征的遥测导出活动：它引用评估域拥有的 Measurement，并输出不复制测量语义的引用批次”；TraceExportActivity 条件：“轨迹导出活动属于遥测导出活动，区别于其他同类对象的条件是：它选择并封装 TraceRecord 与跨度证据”。逐端验证；父节点不证明任一身份。
      en: "Shared-parent contrast: parent TelemetryExportActivity: MetricExportActivity (semantic kind=activity, backbone MetricExportActivity-is_a-TelemetryExportActivity); TraceExportActivity (semantic kind=activity, backbone TraceExportActivity-is_a-TelemetryExportActivity). Endpoint conditions: MetricExportActivity condition: “Measurement export activity is a Telemetry export activity; its differentiating condition is that it references feedback-owned Measurement records and emits a batch of references without duplicating measurement semantics”; TraceExportActivity condition: “Trace export activity is a Telemetry export activity whose defining condition is that it selects and packages TraceRecord and span evidence”. Verify each endpoint; the parent proves neither identity."
      ja: 共有親対照：親 TelemetryExportActivity：MetricExportActivity（semantic kind=activity、バックボーン MetricExportActivity-is_a-TelemetryExportActivity）；TraceExportActivity（semantic kind=activity、バックボーン TraceExportActivity-is_a-TelemetryExportActivity）。両端条件：MetricExportActivity の条件：「測定出力活動はテレメトリ出力活動の一種であり、次の条件で区別されます：それは評価領域所有の Measurement を参照し、測定意味を複製しない参照バッチを出力します」；TraceExportActivity の条件：「トレース出力活動はテレメトリ出力活動のうち、次の事実を定義条件とする対象です：それは TraceRecord とスパン証拠を選択して梱包します」。各端を検証し、親だけでは同一性を証明しません。
    source_claims:
      - claim-metric-export-activity-009
