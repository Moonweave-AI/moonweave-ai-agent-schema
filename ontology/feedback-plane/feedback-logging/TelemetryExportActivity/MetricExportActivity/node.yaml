        en: An activity exports only LogRecords to `/v1/logs` and has no points, aggregation, or temporality; it is LogExportActivity, not MetricExportActivity.
        ja: 活動は LogRecord だけを `/v1/logs` へ出力し point、集約、temporality がなく、LogExportActivity であって MetricExportActivity ではありません。
      field_values: {}
