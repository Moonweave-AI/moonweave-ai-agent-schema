schema: moonweave.ai/ontology-node/v1
id: TraceExportActivity
kind: concept
status: accepted
labels:
  zh: 轨迹导出活动
  en: Trace export activity
  ja: トレース出力活動
semantics:
  short_definition:
    zh: 轨迹导出活动属于遥测导出活动，区别于其他同类对象的条件是：它选择并封装 TraceRecord 与跨度证据。
    en: Trace export activity is a Telemetry export activity whose defining condition is that it selects and packages TraceRecord and span evidence.
    ja: トレース出力活動はテレメトリ出力活動のうち、次の事実を定義条件とする対象です：それは TraceRecord とスパン証拠を選択して梱包します。
  definition:
    zh: 追踪导出活动是一种 TelemetryExportActivity；其种差是选择 TraceRecord/Span 及其父子、资源和范围上下文，形成 TraceExport 并通过追踪 exporter 交付。它不把这些 spans 重解释为日志记录。
    en: A TraceExportActivity is a TelemetryExportActivity whose differentia is selecting TraceRecords or spans with parentage, resource, and scope context, forming a TraceExport, and delivering it through a trace exporter. It does not reinterpret those spans as log records.
    ja: TraceExportActivity は TelemetryExportActivity の一種で、親子関係、Resource、Scope 文脈を持つ TraceRecord または span を選択し、TraceExport を形成して trace exporter で配送する点で区別されます。span をログ記録として再解釈しません。
  why_needed:
    zh: 该下位活动保留 span 层级与追踪身份，使追踪导出结果不会与仅含可关联 trace_id 的日志批次混淆。
    en: This subtype preserves span hierarchy and trace identity so a trace export cannot be confused with a log batch that merely carries trace correlation IDs.
    ja: この下位活動は span 階層と trace 同一性を保持し、trace ID を相関用に持つだけのログバッチとの混同を防ぎます。
  includes:
    - zh: 纳入为一个追踪范围选择跨度、保留父子上下文、形成 TraceExport 并调用 traces exporter 的一次执行。
      en: Includes one execution that selects spans for a trace scope, preserves parent-child context, forms TraceExport, and invokes a trace-capable exporter.
      ja: 一つの trace 範囲から span を選択し、親子 context を保持して TraceExport を形成し、trace exporter を呼び出す一回の実行を含みます。
  excludes:
    - zh: 排除 LogExportActivity、MetricExportActivity，以及尚未打包或交付的内存追踪。
      en: Excludes LogExportActivity, MetricExportActivity, and an in-memory trace that has not been packaged or delivered.
      ja: LogExportActivity、MetricExportActivity、および未梱包・未配送のメモリ内 trace を除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: trace-export-preserves-span-hierarchy
      severity: error
      expression_language: plain
      expression: a TraceExportActivity preserves trace identity and span parentage in its output
      explanations:
        zh: 追踪导出活动必须在输出中保留追踪身份与 span 父子关系。
        en: A TraceExportActivity preserves trace identity and span parentage in its output.
        ja: TraceExportActivity は出力で trace 同一性と span 親子関係を保持します。
      source_claims:
        - claim-trace-export-activity-003
  required_relation_constraints: []
examples:
  - id: TraceExportActivity-example-positive-001
    kind: positive
    labels:
      zh: 轨迹导出活动正例
      en: Positive example of Trace export activity
      ja: トレース出力活動の正例
    scenario_id: null
    descriptions:
      zh: 在一次评估、纠正与改进决策循环中，系统将轨迹导出活动（TraceExportActivity）记录为 TraceExportActivity consumes TraceRecord 的源端点。其已审查定义是“轨迹导出活动属于遥测导出活动，区别于其他同类对象的条件是：它选择并封装 TraceRecord 与跨度证据”。
      en: Trace export run `trace-91` selects one completed workflow trace with fourteen spans, preserves each parent_id, groups spans by resource and scope, and sends one trace export.
      ja: 評価・修正・改善判断のサイクルでは、システムはトレース出力活動（TraceExportActivity）を TraceExportActivity consumes TraceRecord の始点として記録します。審査済み定義は「トレース出力活動はテレメトリ出力活動のうち、次の事実を定義条件とする対象です：それは TraceRecord とスパン証拠を選択して梱包します」です。
    field_values:
      export_activity_id: export/trace-91
      signal: traces
      source_scope_ref: trace/workflow-91
      exporter_configuration_ref: exporter-config/otlp-traces@7
      started_at: 2026-07-16T14:42:00.000Z
      ended_at: 2026-07-16T14:42:00.360Z
      outcome: success
    related_node_ids:
      - TraceExportActivity
      - TraceRecord
    related_relation_ids:
      - TraceExportActivity-consumes-TraceRecord
    expected_result:
      zh: 该运行可查询 TraceExportActivity 以及方向保持不变的事实 TraceExportActivity-consumes-TraceRecord。
      en: The run can query TraceExportActivity together with direction-preserving fact TraceExportActivity-consumes-TraceRecord.
      ja: この実行では TraceExportActivity と方向を保持した事実 TraceExportActivity-consumes-TraceRecord を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、TraceExportActivity-consumes-TraceRecord 的 canonical 方向、概念定义和可用字段值。
      en: The run consumes trace records, preserves trace identity and span parentage, and invokes a trace exporter, which jointly establish TraceExportActivity.
      ja: このシナリオは実際の運用文脈、TraceExportActivity-consumes-TraceRecord の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-trace-export-activity-004
      - claim-trace-export-activity-005
  - id: TraceExportActivity-example-boundary-001
    kind: boundary
    labels:
      zh: 轨迹导出活动边界例
      en: Boundary case for Trace export activity
      ja: トレース出力活動の境界例
    scenario_id: null
    descriptions:
      zh: LogExportActivity 用作TraceExportActivity的边界对照：两者可见于同一图谱片段，但 LogExportActivity 的已审查定义是“作为遥测导出活动，日志导出活动由这一事实区分：它从一个有界日志流读取记录并形成可传输批次。”。不能因 shared parent TelemetryExportActivity 而把它归入TraceExportActivity。
      en: A log export contains LogRecords with TraceId correlation fields but no span parentage or trace request payload; it remains LogExportActivity rather than TraceExportActivity.
      ja: LogExportActivity は TraceExportActivity の境界対照です。同じグラフ断片に現れ得ますが、LogExportActivity の審査済み定義は「ログ出力活動はテレメトリ出力活動として、次の条件により他の対象と区別されます：それは境界付きログストリームから記録を読み、転送可能なバッチを形成します。」です。shared parent TelemetryExportActivity だけで TraceExportActivity にはなりません。
    field_values: {}
    related_node_ids:
      - TraceExportActivity
      - TraceRecord
      - LogExportActivity
    related_relation_ids:
      - TraceExportActivity-consumes-TraceRecord
    expected_result:
      zh: LogExportActivity 保持其原有类型，验证器不得凭关系共现把它提升为 TraceExportActivity。
      en: LogExportActivity retains its own type; validation must not promote it to TraceExportActivity from relation co-occurrence.
      ja: LogExportActivity は元の型を維持し、関係の共起だけで TraceExportActivity へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 TraceExportActivity-consumes-TraceRecord 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: Trace correlation on a log does not change its signal; TraceExportActivity requires span hierarchy and trace-signal exporter input.
      ja: 境界例は実在する対照ノードを示し、TraceExportActivity-consumes-TraceRecord の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-trace-export-activity-006
      - claim-trace-export-activity-007
  - id: TraceExportActivity-example-instance-001
    kind: instance
    labels:
      zh: 追踪导出活动实例
      en: Trace-export instance
      ja: トレース出力活動のインスタンス
    scenario_id: workflow-trace-export
    descriptions:
      zh: 实例 `trace-91` 导出一个含 14 个 span 的工作流追踪，并保留所有 parent_id。
      en: Instance `trace-91` exports one workflow trace containing fourteen spans and preserves every parent_id.
      ja: インスタンス `trace-91` は 14 span のワークフロートレースを出力し、全 parent_id を保持します。
    field_values:
      activity_id: trace-91
      signal: traces
      span_count: 14
    related_node_ids:
      - TraceExportActivity
      - TelemetryExportActivity
      - TraceRecord
      - TraceExport
    related_relation_ids:
      - TraceExportActivity-is_a-TelemetryExportActivity
      - TraceExportActivity-consumes-TraceRecord
      - TraceExportActivity-produces-TraceExport
    expected_result:
      zh: 导出结果保留一个完整 span 树。
      en: The export preserves one complete span tree.
      ja: 出力は一つの完全な span 木を保持します。
    why_valid_or_invalid:
      zh: 输入是追踪记录且保留追踪和父子身份。
      en: Its inputs are trace records and both trace and parent identities are retained.
      ja: 入力は trace 記録で、trace と親子の同一性を保持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-trace-export-activity-008
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: LogExportActivity
    shared_parent_concept_id: TelemetryExportActivity
    differentia:
      zh: 正向身份比较：父节点 TelemetryExportActivity：TraceExportActivity（semantic kind=activity，骨架 TraceExportActivity-is_a-TelemetryExportActivity）；LogExportActivity（semantic kind=activity，骨架 LogExportActivity-is_a-TelemetryExportActivity）。双端条件：TraceExportActivity 条件：“轨迹导出活动属于遥测导出活动，区别于其他同类对象的条件是：它选择并封装 TraceRecord 与跨度证据”；LogExportActivity 条件：“作为遥测导出活动，日志导出活动由这一事实区分：它从一个有界日志流读取记录并形成可传输批次”。仅依据各自定义与骨架逐端验证。
      en: "Positive identity comparison: parent TelemetryExportActivity: TraceExportActivity (semantic kind=activity, backbone TraceExportActivity-is_a-TelemetryExportActivity); LogExportActivity (semantic kind=activity, backbone LogExportActivity-is_a-TelemetryExportActivity). Endpoint conditions: TraceExportActivity condition: “Trace export activity is a Telemetry export activity whose defining condition is that it selects and packages TraceRecord and span evidence”; LogExportActivity condition: “Log export activity belongs to the Telemetry export activity category and differs from broader members in that it reads records from a bounded log stream and forms a transportable batch”. Verify each endpoint from its own definition and backbone."
      ja: 正の同一性比較：親 TelemetryExportActivity：TraceExportActivity（semantic kind=activity、バックボーン TraceExportActivity-is_a-TelemetryExportActivity）；LogExportActivity（semantic kind=activity、バックボーン LogExportActivity-is_a-TelemetryExportActivity）。両端条件：TraceExportActivity の条件：「トレース出力活動はテレメトリ出力活動のうち、次の事実を定義条件とする対象です：それは TraceRecord とスパン証拠を選択して梱包します」；LogExportActivity の条件：「ログ出力活動はテレメトリ出力活動として、次の条件により他の対象と区別されます：それは境界付きログストリームから記録を読み、転送可能なバッチを形成します」。各端を固有の定義とバックボーンで検証します。
    source_claims:
      - claim-trace-export-activity-009
parent_relation:
  id: TraceExportActivity-is_a-TelemetryExportActivity
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: TraceExportActivity is_a TelemetryExportActivity 表示轨迹导出继承共同导出活动条件，并以只处理 traces 信号的 TraceRecord、TraceSpan 与父子拓扑为种差。
    en: TraceExportActivity is_a TelemetryExportActivity means that trace export inherits the common export-activity conditions and is differentiated by handling traces-signal TraceRecords, TraceSpans, and parent-child topology only.
    ja: TraceExportActivity is_a TelemetryExportActivity は共通出力活動条件を継承し、traces 信号の TraceRecord、TraceSpan、親子 topology だけを扱う点を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该语义事实不对所有运行实例施加统一基数。
    en: This semantic fact does not impose one universal cardinality on every runtime instance.
    ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: inverse_of_is_a
    labels:
      zh: 反向 is_a
      en: inverse is_a
      ja: 逆 is_a
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: TraceExportActivity-is_a-TelemetryExportActivity-example-positive-001
      kind: positive
      labels:
        zh: OTLP 轨迹导出活动
        en: OTLP trace export activity
        ja: OTLP trace 出力活動
      scenario_id: null
      descriptions:
        zh: 活动选择完整跨度树，构造 ExportTraceServiceRequest 并提交 `/v1/traces`。
        en: The activity selects a complete span tree, constructs ExportTraceServiceRequest, and submits it to `/v1/traces`.
        ja: 活動は完全 span tree を選び ExportTraceServiceRequest を構成して `/v1/traces` へ送ります。
      field_values: {}
      related_node_ids:
        - TraceExportActivity
        - TelemetryExportActivity
      related_relation_ids:
        - TraceExportActivity-is_a-TelemetryExportActivity
      expected_result:
        zh: 活动同时被识别为 TraceExportActivity 与 TelemetryExportActivity。
        en: The activity is classified as both TraceExportActivity and TelemetryExportActivity.
        ja: 活動は TraceExportActivity と TelemetryExportActivity の両方に分類されます。
      why_valid_or_invalid:
        zh: 共同导出活动条件与 traces 专用拓扑种差全部成立。
        en: The common export conditions and traces-specific topology differentia all hold.
        ja: 共通出力条件と traces 固有 topology 種差がすべて成立します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-trace-export-activity-010
    - id: TraceExportActivity-is_a-TelemetryExportActivity-example-boundary-001
      kind: boundary
      labels:
        zh: 日志导出兄弟边界
        en: Logs-export sibling boundary
        ja: logs 出力 sibling 境界
      scenario_id: null
      descriptions:
        zh: 活动只把 LogRecord 构造成 ExportLogsServiceRequest，没有 TraceId 拓扑或 ResourceSpans；它不是 TraceExportActivity。
        en: An activity constructs ExportLogsServiceRequest from LogRecords with no TraceId topology or ResourceSpans; it is not TraceExportActivity.
        ja: 活動は LogRecord から ExportLogsServiceRequest を作り TraceId topology・ResourceSpans がなく、TraceExportActivity ではありません。
      field_values: {}
      related_node_ids:
        - TraceExportActivity
        - TelemetryExportActivity
      related_relation_ids:
        - TraceExportActivity-is_a-TelemetryExportActivity
      expected_result:
        zh: 保留 TelemetryExportActivity 上位类型，只赋予 LogExportActivity 下位类型。
        en: TelemetryExportActivity remains the supertype and only LogExportActivity is assigned as subtype.
        ja: TelemetryExportActivity 上位型を保持し LogExportActivity 下位型だけを付与します。
      why_valid_or_invalid:
        zh: 同属导出活动不等于共享信号种差，logs 与 traces 输入模型不同。
        en: Sharing the export genus does not share signal differentia; logs and traces input models differ.
        ja: 共通出力上位型でも signal 種差は共有せず logs と traces の入力 model は異なります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-trace-export-activity-011
  source_claims:
    - claim-trace-export-activity-012
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
  - id: TraceExportActivity-consumes-TraceRecord
    predicate: consumes
    direction: source-to-target
    relation_kind: information
    labels:
      zh: consumes
      en: consumes
      ja: consumes
    definitions:
      zh: TraceExportActivity consumes TraceRecord 表示一次轨迹导出活动读取一个或多个已选 TraceRecord 及其跨度拓扑作为输入；它不删除原追踪记录，也不表示导出批次已经形成。
      en: TraceExportActivity consumes TraceRecord means that one trace-export activity reads selected TraceRecords and their span topology as input; it neither deletes the original trace records nor claims that an export batch already exists.
      ja: TraceExportActivity consumes TraceRecord は一回の trace 出力活動が選択 TraceRecord と span topology を入力として読むことを示し、元 trace record を削除せず batch 形成済みとも主張しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: inverse_of_consumes
      labels:
        zh: 反向 consumes
        en: inverse consumes
        ja: 逆 consumes
    conditions: []
    temporal_scope: timeless
    boundary_context:
      trust_boundary_concept_id: TrustBoundary
      authority_basis:
        zh: 轨迹导出活动仍由 feedback-logging 唯一拥有，追踪记录仍由 runtime-observability 唯一拥有；consumes 只建立跨域事实，不转移定义权。若该事实触发运行操作，还必须引用适用的 PolicyDecision 或 AuthorizationGrant。
        en: Trace export activity remains uniquely owned by feedback-logging and trace record by runtime-observability; consumes establishes a cross-Domain fact without transferring definitional ownership. If the fact triggers a runtime operation, it must also reference an applicable PolicyDecision or AuthorizationGrant.
        ja: トレース出力活動は feedback-logging、トレース記録は runtime-observability に引き続き一意に所有されます。consumes は定義所有権を移さずドメイン横断事実だけを確立し、実行操作を起動する場合は適用される PolicyDecision または AuthorizationGrant も参照します。
      protocol_or_resource_context:
        zh: 查询沿 TraceExportActivity-consumes-TraceRecord 的 source→target 方向、端点 canonical ID 与本关系来源主张执行；协议版本、资源身份和信任判定继续附着在原节点或原关系。
        en: Queries follow the source-to-target direction, endpoint canonical IDs, and source claims of TraceExportActivity-consumes-TraceRecord; protocol versions, resource identity, and trust decisions remain attached to the original nodes or relation.
        ja: 照会は TraceExportActivity-consumes-TraceRecord の source→target 方向、端点 canonical ID、当該関係の出典主張に従い、プロトコル版、資源同一性、信頼判断は元のノードまたは関係に保持されます。
    constraints: []
    examples:
      - id: TraceExportActivity-consumes-TraceRecord-example-positive-001
        kind: positive
        labels:
          zh: 读取完整代理轨迹
          en: Read complete agent trace
          ja: 完全 agent trace の読取
        scenario_id: null
        descriptions:
          zh: 活动 `export/trace-19` 读取 TraceRecord `trace/run-19` 的根跨度、子跨度、事件和状态，并固定选择范围。
          en: Activity `export/trace-19` reads the root span, child spans, events, and status of TraceRecord `trace/run-19` and fixes the selection scope.
          ja: 活動 `export/trace-19` は TraceRecord `trace/run-19` の root span、child span、event、status を読み選択範囲を固定します。
        field_values: {}
        related_node_ids:
          - TraceExportActivity
          - TraceRecord
        related_relation_ids:
          - TraceExportActivity-consumes-TraceRecord
        expected_result:
          zh: 建立 consumes 边并保留所选跨度范围，原 TraceRecord 继续独立存在。
          en: A consumes edge with selected span scope is recorded while the original TraceRecord remains independently available.
          ja: 選択 span 範囲付き consumes 辺を記録し、元 TraceRecord は独立して残ります。
        why_valid_or_invalid:
          zh: 实际读取与拓扑范围可核实，消费没有改变记录身份。
          en: The actual read and topology scope are verifiable, and consumption does not change record identity.
          ja: 実読取と topology 範囲を検証でき、消費は record 同一性を変えません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-trace-export-activity-013
      - id: TraceExportActivity-consumes-TraceRecord-example-boundary-001
        kind: boundary
        labels:
          zh: 只读取摘要边界
          en: Summary-only read boundary
          ja: summary 読取のみの境界
        scenario_id: null
        descriptions:
          zh: 活动只读取由轨迹生成的 ObservableSummary，没有访问 TraceRecord 或任何跨度；不能建立 consumes TraceRecord。
          en: An activity reads only an ObservableSummary derived from a trace and accesses no TraceRecord or span; consumes TraceRecord is not established.
          ja: 活動は trace 由来 ObservableSummary だけを読み TraceRecord・span にアクセスせず、consumes TraceRecord は成立しません。
        field_values: {}
        related_node_ids:
          - TraceExportActivity
          - TraceRecord
        related_relation_ids:
          - TraceExportActivity-consumes-TraceRecord
        expected_result:
          zh: 保留摘要输入事实，不创建到 TraceRecord 的消费边。
          en: The summary-input fact is retained and no consumption edge to TraceRecord is created.
          ja: summary 入力事実を保持し TraceRecord への消費辺は作りません。
        why_valid_or_invalid:
          zh: 派生摘要与原始轨迹记录具有不同身份，不能沿来源关系反推实际读取。
          en: A derived summary and original trace have different identities; actual reading cannot be inferred backward through provenance.
          ja: 派生 summary と元 trace は同一性が異なり、来歴を逆向きに辿って実読取を推論できません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-trace-export-activity-014
    source_claims:
      - claim-trace-export-activity-015
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:TraceRecord
  - id: TraceExportActivity-produces-TraceExport
    predicate: produces
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: produces
      en: produces
