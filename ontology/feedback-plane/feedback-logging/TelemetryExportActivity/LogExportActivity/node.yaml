      en: LogExportActivity consumes LogStream means that one log-export activity reads an explicitly bounded range of a log stream as input; the edge links an activity to its source stream without asserting stream ownership or successful batch production.
      ja: LogExportActivity consumes LogStream は一回のログ出力活動が log stream の明示的有界範囲を入力として読むことを示します。stream 所有や batch 生成成功は主張しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: inverse_of_consumes
      labels:
        zh: 反向 consumes
        en: inverse consumes
        ja: 逆 consumes
    conditions:
      - id: LogExportActivity-consumes-LogStream-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only for an identified LogExportActivity that has actually read an explicitly bounded LogRecord range from the named LogStream; a scheduled export, exporter configuration, or stream reference without a read is insufficient.
        explanations:
          zh: 仅对已经从指定 LogStream 实际读取明确有界 LogRecord 范围的同一次 LogExportActivity 成立；只有调度计划、exporter 配置或流引用而没有读取事实时不得建立该边。
          en: Assert only for an identified LogExportActivity that has actually read an explicitly bounded LogRecord range from the named LogStream; a scheduled export, exporter configuration, or stream reference without a read is insufficient.
          ja: 特定の LogExportActivity が指定 LogStream から明示的に有界な LogRecord 範囲を実読取した場合だけ成立します。schedule、exporter 構成、または未読取の stream 参照だけでは不十分です。
        source_claims:
          - claim-log-export-activity-013
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
