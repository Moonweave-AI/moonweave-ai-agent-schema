    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-export-activity-012
    source: eng-proto-opentelemetry-otlp
    supports: LogExportActivity-is_a-TelemetryExportActivity is grounded in OTLP's common Export pattern and logs-specific service. OTLP does not define Moonweave's activity genus or is_a edge; hierarchy, direction, and logs-only differentia are design inference.
    locator: OTLP Specification 1.10.0 > OTLP/gRPC > signal-specific Export request messages; OTLP/HTTP Request > /v1/logs
