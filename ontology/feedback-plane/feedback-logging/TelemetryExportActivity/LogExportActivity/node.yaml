          en: Activity `export/logs-71` reads cursors 900 through 949 from `stream/runtime` and marks that range as this export's input.
          ja: 活動 `export/logs-71` は `stream/runtime` の cursor 900〜949 を読み、その範囲を今回出力入力として記録します。
