    confidence: medium
    review_status: accepted
  - id: claim-log-export-activity-006
    source: eng-std-opentelemetry-logs-sdk
    supports: LogExportActivity-example-boundary-001 uses the Logs SDK requirement that LogRecordExporter.Export receives a batch of ReadableLogRecords; Moonweave therefore excludes a metrics-only export from LogExportActivity and supplies the activity taxonomy.
    locator: Logs SDK > LogRecordExporter > Export batch of ReadableLogRecords
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-export-activity-007
    source: eng-fw-openai-tracing
    supports: OpenAI's tracing exporter handles traces and spans rather than logs, reinforcing the signal-specific boundary in LogExportActivity-example-boundary-001 without defining it.
    locator: Tracing guide > Custom tracing processors > BatchTraceProcessor and BackendSpanExporter
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-export-activity-008
