schema: moonweave.ai/ontology-node/v1
id: LogExportActivity
kind: concept
status: accepted
labels:
  zh: 日志导出活动
  en: Log export activity
  ja: ログ出力活動
semantics:
  short_definition:
    zh: 作为遥测导出活动，日志导出活动由这一事实区分：它从一个有界日志流读取记录并形成可传输批次。
    en: Log export activity belongs to the Telemetry export activity category and differs from broader members in that it reads records from a bounded log stream and forms a transportable batch.
    ja: ログ出力活動はテレメトリ出力活動として、次の条件により他の対象と区別されます：それは境界付きログストリームから記録を読み、転送可能なバッチを形成します。
  definition:
    zh: 日志导出活动是一种 TelemetryExportActivity；其种差是从一个有界 LogStream 选择 ReadableLogRecord，依据日志导出配置形成批次并交给日志 exporter。它不消费 metric points 或 spans。
    en: A LogExportActivity is a TelemetryExportActivity whose differentia is selecting ReadableLogRecords from a bounded LogStream, batching them under a log-export configuration, and handing them to a log exporter. It does not consume metric points or spans.
    ja: LogExportActivity は TelemetryExportActivity の一種で、有界 LogStream から ReadableLogRecord を選択し、ログ出力設定でバッチ化してログ exporter へ渡す点で区別されます。metric point や span は消費しません。
  why_needed:
    zh: 该下位活动让系统按信号查询日志导出的输入、批次大小、超时和结果，避免将同一 exporter 动作错误用于指标或追踪。
    en: This subtype makes log input, batch size, timeout, and result queryable by signal and prevents one exporter execution from being mislabeled as metrics or trace export.
    ja: この下位活動により、ログ入力、バッチサイズ、タイムアウト、結果を信号別に照会でき、metrics や trace 出力との誤分類を防ぎます。
  includes:
    - zh: 纳入从有界 LogStream 读取记录，并以 ReadableLogRecord 批次调用 LogRecordExporter 的一次执行。
      en: Includes one execution that reads a bounded LogStream and invokes a LogRecordExporter with a batch of ReadableLogRecords.
      ja: 有界 LogStream から記録を読み、ReadableLogRecord のバッチで LogRecordExporter を呼び出す一回の実行を含みます。
  excludes:
    - zh: 排除 MetricExportActivity、TraceExportActivity，以及从不形成或发送导出批次的持续日志采集。
      en: Excludes MetricExportActivity, TraceExportActivity, and continuous log collection that never forms or sends an export batch.
      ja: MetricExportActivity、TraceExportActivity、および出力バッチを形成・送信しない継続ログ収集を除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: log-export-uses-log-signal
      severity: error
      expression_language: plain
      expression: a LogExportActivity consumes only log-signal input and invokes a log-capable exporter
      explanations:
        zh: 日志导出活动只消费日志信号并调用支持日志的 exporter。
        en: A LogExportActivity consumes only log-signal input and invokes a log-capable exporter.
        ja: LogExportActivity はログ信号だけを消費し、ログ対応 exporter を呼び出します。
      source_claims:
        - claim-log-export-activity-003
  required_relation_constraints: []
examples:
  - id: LogExportActivity-example-positive-001
    kind: positive
    labels:
      zh: 日志导出活动正例
      en: Positive example of Log export activity
      ja: ログ出力活動の正例
    scenario_id: null
    descriptions:
      zh: 在一次评估、纠正与改进决策循环中，系统将日志导出活动（LogExportActivity）记录为 LogExportActivity consumes LogStream 的源端点。其已审查定义是“作为遥测导出活动，日志导出活动由这一事实区分：它从一个有界日志流读取记录并形成可传输批次”。
      en: Export run `logs-20260716-01` drains 320 ReadableLogRecords from `runtime/logs`, batches them in groups of 128, and invokes the OTLP log exporter with a 30-second timeout.
      ja: 評価・修正・改善判断のサイクルでは、システムはログ出力活動（LogExportActivity）を LogExportActivity consumes LogStream の始点として記録します。審査済み定義は「ログ出力活動はテレメトリ出力活動として、次の条件により他の対象と区別されます：それは境界付きログストリームから記録を読み、転送可能なバッチを形成します」です。
    field_values:
      export_activity_id: export/logs-20260716-01
      signal: logs
      source_scope_ref: stream/runtime/logs#records=1..320
      exporter_configuration_ref: exporter-config/otlp-logs@4
      started_at: 2026-07-16T14:35:00.000Z
      ended_at: 2026-07-16T14:35:01.240Z
      outcome: success
    related_node_ids:
      - LogExportActivity
      - LogStream
    related_relation_ids:
      - LogExportActivity-consumes-LogStream
    expected_result:
      zh: 该运行可查询 LogExportActivity 以及方向保持不变的事实 LogExportActivity-consumes-LogStream。
      en: The run can query LogExportActivity together with direction-preserving fact LogExportActivity-consumes-LogStream.
      ja: この実行では LogExportActivity と方向を保持した事実 LogExportActivity-consumes-LogStream を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、LogExportActivity-consumes-LogStream 的 canonical 方向、概念定义和可用字段值。
      en: The execution has log-signal input, bounded batch formation, exporter invocation, timeout, and result, which distinguish LogExportActivity from collection or storage.
      ja: このシナリオは実際の運用文脈、LogExportActivity-consumes-LogStream の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-log-export-activity-004
      - claim-log-export-activity-005
  - id: LogExportActivity-example-boundary-001
    kind: boundary
    labels:
      zh: 日志导出活动边界例
      en: Boundary case for Log export activity
      ja: ログ出力活動の境界例
    scenario_id: null
    descriptions:
      zh: MetricExportActivity 用作LogExportActivity的边界对照：两者可见于同一图谱片段，但 MetricExportActivity 的已审查定义是“测量导出活动是以如下事实为区分特征的遥测导出活动：它引用评估域拥有的 Measurement，并输出不复制测量语义的引用批次。”。不能因 shared parent TelemetryExportActivity 而把它归入LogExportActivity。
      en: Export run `metrics-20260716-01` reads Measurements and declares delta temporality; it never consumes LogStream or invokes LogRecordExporter, so it is MetricExportActivity rather than LogExportActivity.
      ja: MetricExportActivity は LogExportActivity の境界対照です。同じグラフ断片に現れ得ますが、MetricExportActivity の審査済み定義は「測定出力活動はテレメトリ出力活動の一種であり、次の条件で区別されます：それは評価領域所有の Measurement を参照し、測定意味を複製しない参照バッチを出力します。」です。shared parent TelemetryExportActivity だけで LogExportActivity にはなりません。
    field_values: {}
    related_node_ids:
      - LogExportActivity
      - LogStream
      - MetricExportActivity
    related_relation_ids:
      - LogExportActivity-consumes-LogStream
    expected_result:
      zh: MetricExportActivity 保持其原有类型，验证器不得凭关系共现把它提升为 LogExportActivity。
      en: MetricExportActivity retains its own type; validation must not promote it to LogExportActivity from relation co-occurrence.
      ja: MetricExportActivity は元の型を維持し、関係の共起だけで LogExportActivity へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 LogExportActivity-consumes-LogStream 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: Both are exports, but the signal-specific input model and exporter interface differ; metric points cannot satisfy the log-input differentia.
      ja: 境界例は実在する対照ノードを示し、LogExportActivity-consumes-LogStream の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-log-export-activity-006
      - claim-log-export-activity-007
  - id: LogExportActivity-example-instance-001
    kind: instance
    labels:
      zh: 日志导出活动实例
      en: Log-export instance
      ja: ログ出力活動のインスタンス
    scenario_id: otlp-log-export
    descriptions:
      zh: 实例 `logs-20260716-01` 从 `runtime/logs` 导出 320 条记录，最大批次 128。
      en: Instance `logs-20260716-01` exports 320 records from `runtime/logs` with maximum batch size 128.
      ja: インスタンス `logs-20260716-01` は `runtime/logs` から 320 記録を最大 128 件で出力します。
    field_values:
      activity_id: logs-20260716-01
      signal: logs
      record_count: 320
      max_batch_size: 128
    related_node_ids:
      - LogExportActivity
      - TelemetryExportActivity
      - LogStream
    related_relation_ids:
      - LogExportActivity-is_a-TelemetryExportActivity
      - LogExportActivity-consumes-LogStream
    expected_result:
      zh: 导出被分类为日志信号活动并形成三个传输批次。
      en: The run is classified as log-signal export and forms three transport batches.
      ja: 実行は logs 信号出力に分類され、三つの転送バッチを形成します。
    why_valid_or_invalid:
      zh: 输入、信号、批次限制和 exporter 调用均明确。
      en: Input, signal, batch limit, and exporter invocation are explicit.
      ja: 入力、信号、バッチ上限、exporter 呼出が明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-log-export-activity-008
external_mappings: []
applicability:
  - core
sibling_differentiation:
  - sibling_concept_id: MetricExportActivity
    shared_parent_concept_id: TelemetryExportActivity
    differentia:
      zh: 端点特定对照：父节点 TelemetryExportActivity：LogExportActivity（semantic kind=activity，骨架 LogExportActivity-is_a-TelemetryExportActivity）；MetricExportActivity（semantic kind=activity，骨架 MetricExportActivity-is_a-TelemetryExportActivity）。双端条件：LogExportActivity 条件：“作为遥测导出活动，日志导出活动由这一事实区分：它从一个有界日志流读取记录并形成可传输批次”；MetricExportActivity 条件：“测量导出活动是以如下事实为区分特征的遥测导出活动：它引用评估域拥有的 Measurement，并输出不复制测量语义的引用批次”。条件不得互借；各自成立后方可归类。
      en: "Endpoint-specific contrast: parent TelemetryExportActivity: LogExportActivity (semantic kind=activity, backbone LogExportActivity-is_a-TelemetryExportActivity); MetricExportActivity (semantic kind=activity, backbone MetricExportActivity-is_a-TelemetryExportActivity). Endpoint conditions: LogExportActivity condition: “Log export activity belongs to the Telemetry export activity category and differs from broader members in that it reads records from a bounded log stream and forms a transportable batch”; MetricExportActivity condition: “Measurement export activity is a Telemetry export activity; its differentiating condition is that it references feedback-owned Measurement records and emits a batch of references without duplicating measurement semantics”. Conditions cannot be borrowed; classify each endpoint only from its own evidence."
      ja: 端点別対照：親 TelemetryExportActivity：LogExportActivity（semantic kind=activity、バックボーン LogExportActivity-is_a-TelemetryExportActivity）；MetricExportActivity（semantic kind=activity、バックボーン MetricExportActivity-is_a-TelemetryExportActivity）。両端条件：LogExportActivity の条件：「ログ出力活動はテレメトリ出力活動として、次の条件により他の対象と区別されます：それは境界付きログストリームから記録を読み、転送可能なバッチを形成します」；MetricExportActivity の条件：「測定出力活動はテレメトリ出力活動の一種であり、次の条件で区別されます：それは評価領域所有の Measurement を参照し、測定意味を複製しない参照バッチを出力します」。条件を流用せず、各端を固有の証拠で分類します。
    source_claims:
      - claim-log-export-activity-009
parent_relation:
  id: LogExportActivity-is_a-TelemetryExportActivity
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: LogExportActivity is_a TelemetryExportActivity 表示日志导出完整继承遥测导出的输入、范围、格式和批次生产条件，并以只处理 logs 信号的 LogRecord 为种差。
    en: LogExportActivity is_a TelemetryExportActivity means that log export inherits all telemetry-export conditions for input, scope, format, and batch production, with the differentia of handling only logs-signal LogRecords.
    ja: LogExportActivity is_a TelemetryExportActivity は入力、範囲、形式、batch 生成条件をすべて継承し、logs 信号の LogRecord だけを扱う点を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该语义事实不对所有运行实例施加统一基数。
    en: This semantic fact does not impose one universal cardinality on every runtime instance.
    ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: inverse_of_is_a
    labels:
      zh: 反向 is_a
      en: inverse is_a
      ja: 逆 is_a
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: LogExportActivity-is_a-TelemetryExportActivity-example-positive-001
      kind: positive
      labels:
        zh: OTLP 日志导出活动
        en: OTLP logs export activity
        ja: OTLP logs 出力活動
      scenario_id: null
      descriptions:
        zh: 活动从 LogStream 读取 LogRecord，构造 ExportLogsServiceRequest，并提交到 `/v1/logs`，没有混入指标或跨度。
        en: The activity reads LogRecords from a LogStream, constructs an ExportLogsServiceRequest, and submits it to `/v1/logs` without metrics or spans.
        ja: 活動は LogStream から LogRecord を読み ExportLogsServiceRequest を構成し、metrics・span を混ぜず `/v1/logs` へ送ります。
      field_values: {}
      related_node_ids:
        - LogExportActivity
        - TelemetryExportActivity
      related_relation_ids:
        - LogExportActivity-is_a-TelemetryExportActivity
      expected_result:
        zh: 活动同时被识别为 LogExportActivity 与 TelemetryExportActivity。
        en: The activity is classified as both LogExportActivity and TelemetryExportActivity.
        ja: 活動は LogExportActivity と TelemetryExportActivity の両方に分類されます。
      why_valid_or_invalid:
        zh: 它满足上位导出活动全部条件，并由 logs 专用输入和协议服务区分。
        en: It satisfies every export-activity condition and is differentiated by logs-only input and service.
        ja: 上位出力活動の全条件を満たし、logs 専用入力・service で区別されます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-log-export-activity-010
    - id: LogExportActivity-is_a-TelemetryExportActivity-example-boundary-001
      kind: boundary
      labels:
        zh: 指标导出兄弟边界
        en: Metric-export sibling boundary
        ja: metric 出力 sibling 境界
      scenario_id: null
      descriptions:
        zh: 活动构造 ExportMetricsServiceRequest 并提交 `/v1/metrics`；它是 MetricExportActivity，不能因同属遥测导出而成为 LogExportActivity。
        en: An activity constructs ExportMetricsServiceRequest and submits to `/v1/metrics`; it is MetricExportActivity and does not become LogExportActivity merely by sharing the telemetry-export genus.
        ja: 活動は ExportMetricsServiceRequest を構成し `/v1/metrics` へ送り、MetricExportActivity であって共通上位型だけで LogExportActivity にはなりません。
      field_values: {}
      related_node_ids:
        - LogExportActivity
        - TelemetryExportActivity
      related_relation_ids:
        - LogExportActivity-is_a-TelemetryExportActivity
      expected_result:
        zh: 保留共同上位类型，但只赋予 metrics 专用下位类型。
        en: The common supertype is retained while only the metrics-specific subtype is assigned.
        ja: 共通上位型を保持し metrics 専用下位型だけを付与します。
      why_valid_or_invalid:
        zh: 平行信号活动通过输入模型与服务端点互斥区分，不能互借种差。
        en: Parallel signal activities are separated by input model and service endpoint and cannot borrow each other's differentia.
        ja: 平行 signal 活動は入力 model と service endpoint で区別され、種差を相互借用できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-log-export-activity-011
  source_claims:
    - claim-log-export-activity-012
  distinct_fact_rationale: null
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
relations:
