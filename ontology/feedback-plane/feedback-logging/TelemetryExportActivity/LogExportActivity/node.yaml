source_claims:
  - id: claim-log-export-activity-001
    source: eng-std-opentelemetry-logs-sdk
    supports: OpenTelemetry Logs SDK defines batching ReadableLogRecords and invoking LogRecordExporter.Export, directly supporting LogExportActivity behavior. The activity identity and hierarchy are Moonweave design inference.
    locator: Logs SDK > Built-in processors > Batching processor; LogRecordExporter > Export
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-export-activity-002
    source: eng-fw-openai-tracing
    supports: OpenAI documents background batching, force flush, timeout-oriented delivery, and exporters for trace data, supporting the shared export-activity genus but not LogExportActivity's log signal.
    locator: Tracing guide > Long-running workers and immediate exports; Custom tracing processors
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-export-activity-003
    source: eng-std-opentelemetry-logs-sdk
    supports: OpenTelemetry Logs SDK defines batching ReadableLogRecords and LogRecordExporter.Export; Moonweave models one invocation as LogExportActivity.
    locator: Logs SDK > Built-in processors > Batching processor; LogRecordExporter > Export
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-log-export-activity-004
    source: eng-std-opentelemetry-logs-sdk
    supports: LogExportActivity-example-positive-001 instantiates OpenTelemetry's batching LogRecordProcessor and LogRecordExporter.Export parameters; the run identity is Moonweave design inference.
