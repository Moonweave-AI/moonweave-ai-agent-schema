  - id: claim-log-export-activity-009
    source: eng-proto-opentelemetry-otlp
    supports: OTLP defines separate Export service requests and HTTP paths for logs and metrics. The signal-specific request types support distinguishing LogExportActivity from MetricExportActivity even when both share a TelemetryExportActivity genus; the activity taxonomy itself is a Moonweave design inference.
    locator: OTLP Specification 1.10.0 > OTLP/HTTP Request > Default URL paths /v1/logs and /v1/metrics
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-export-activity-010
    source: eng-proto-opentelemetry-otlp
    supports: LogExportActivity-is_a-TelemetryExportActivity positive case follows OTLP LogsService and `/v1/logs`; the Moonweave activity hierarchy is design inference.
    locator: OTLP Specification 1.10.0 > OTLP/gRPC > ExportLogsServiceRequest; OTLP/HTTP Request > /v1/logs
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-export-activity-011
    source: eng-proto-opentelemetry-otlp
    supports: LogExportActivity-is_a-TelemetryExportActivity boundary case uses OTLP's separate LogsService and MetricsService to distinguish sibling export activities; the class taxonomy is Moonweave design inference.
