schema: moonweave.ai/ontology-node/v1
id: TelemetryExportActivity
kind: concept
status: review
labels:
  zh: 遥测导出活动
  en: Telemetry export activity
  ja: テレメトリ出力活動
semantics:
  short_definition:
    zh: 遥测导出活动属于活动，区别于其他同类对象的条件是：它读取运行观测、日志或测量，在固定范围与格式下生成可校验的不可变导出批次；原始事件和测量的所有权不随导出转移。
    en: Telemetry export activity is an activity whose defining condition is that it reads runtime observations, logs, or measurements and creates a verifiable immutable export batch under a fixed scope and format; ownership of original events and measurements does not move with export.
    ja: テレメトリ出力活動は活動のうち、次の事実を定義条件とする対象です：それは、固定された範囲と形式の下で実行観測、ログ、測定を読み、検証可能な不変出力バッチを生成します。
  definition:
    zh: 遥测导出活动是在一个有界执行中选择单一遥测信号的数据、按目标协议编码并尝试交付 TelemetryExportBatch 的活动。其身份由信号、来源范围、exporter 配置、开始/结束时间和结果共同确定；导出不转移源数据的规范所有权。
    en: A TelemetryExportActivity is a bounded execution that selects data for one telemetry signal, encodes it for a target protocol, and attempts delivery of a TelemetryExportBatch. Signal, source scope, exporter configuration, start and end time, and outcome identify the execution; export does not transfer canonical ownership of source data.
    ja: TelemetryExportActivity は一つのテレメトリ信号のデータを選択し、対象プロトコルへ符号化し、TelemetryExportBatch の配送を試みる有界実行です。信号、入力範囲、exporter 設定、開始・終了時刻、結果が同一性を決め、元データの標準所有権は移転しません。
  why_needed:
    zh: 该活动根统一日志、指标和追踪的导出执行字段，同时保持三种信号各自的输入模型和 exporter 合同。
    en: This activity root unifies execution fields for log, metric, and trace export while retaining each signal's distinct input model and exporter contract.
    ja: この活動ルートは logs、metrics、traces の出力実行項目を統一しつつ、各信号固有の入力モデルと exporter 契約を保持します。
  includes:
    - zh: 纳入仅针对 logs、metrics 或 traces 中一种信号的有界导出调用，并明确来源范围、协议、目的地、时间与结果。
      en: Includes a bounded exporter invocation for exactly one of logs, metrics, or traces, with source scope, protocol, destination, timing, and outcome.
      ja: logs、metrics、traces のいずれか一信号だけを対象とし、出典範囲、protocol、宛先、時刻、結果を明示する有界出力呼出しを含みます。
  excludes:
    - zh: 排除作为载荷的 TelemetryExportBatch、没有具体调用的长期 exporter 配置角色，以及从不尝试交付的本地处理。
      en: Excludes the TelemetryExportBatch payload, a continuously configured exporter role with no invocation, and local processing that never attempts delivery.
      ja: payload である TelemetryExportBatch、具体的呼出しを持たない継続 exporter 構成役割、配送を試みないローカル処理を除外します。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - export_activity_id
  fields:
    - id: export_activity_id
      labels:
        zh: 导出活动标识
        en: export-activity ID
        ja: export activity ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次有界导出调用及其请求—响应结果，不等同于被发送的批次。
        en: Stably identifies one bounded export invocation and its request-response outcome, distinct from the batch being sent.
        ja: 一回の有界 export 呼出しと request-response 結果を安定識別し、送信 batch とは区別します。
      allowed_values: []
      pattern: null
      example_value: export/trace-91
      source_claims:
        - claim-telemetry-export-activity-003
    - id: signal
      labels:
        zh: 遥测信号
        en: telemetry signal
        ja: telemetry signal
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明本次活动仅导出日志、指标或追踪中的一种信号。
        en: Declares the single logs, metrics, or traces signal exported by this activity.
        ja: この活動が logs・metrics・traces のうち一つだけを出力することを宣言します。
      allowed_values:
        - id: telemetry-export-signal-logs
          value: logs
          labels:
            zh: 日志
            en: logs
            ja: logs
          definitions:
            zh: 本次活动发送日志信号的 ExportLogsServiceRequest。
            en: The activity sends a logs-signal ExportLogsServiceRequest.
            ja: 活動が logs signal の ExportLogsServiceRequest を送信します。
          status: accepted
          source_claims:
            - claim-telemetry-export-activity-004
        - id: telemetry-export-signal-metrics
          value: metrics
          labels:
            zh: 指标
            en: metrics
            ja: metrics
          definitions:
            zh: 本次活动发送指标信号的 ExportMetricsServiceRequest。
            en: The activity sends a metrics-signal ExportMetricsServiceRequest.
            ja: 活動が metrics signal の ExportMetricsServiceRequest を送信します。
          status: accepted
          source_claims:
            - claim-telemetry-export-activity-005
        - id: telemetry-export-signal-traces
          value: traces
          labels:
            zh: 追踪
            en: traces
            ja: traces
          definitions:
            zh: 本次活动发送追踪信号的 ExportTraceServiceRequest。
            en: The activity sends a traces-signal ExportTraceServiceRequest.
            ja: 活動が traces signal の ExportTraceServiceRequest を送信します。
          status: accepted
          source_claims:
            - claim-telemetry-export-activity-006
      pattern: null
      example_value: traces
      source_claims:
        - claim-telemetry-export-activity-007
    - id: source_scope_ref
      labels:
        zh: 来源范围引用
        en: source-scope reference
        ja: 出典 scope 参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次调用冻结并尝试发送的日志流、测量集合或追踪范围。
        en: References the log-stream, measurement-set, or trace scope frozen and attempted by this invocation.
        ja: この呼出しで固定し送信を試みた log stream・measurement set・trace scope を参照します。
      allowed_values: []
      pattern: null
      example_value: trace/run-742
      source_claims:
        - claim-telemetry-export-activity-008
    - id: exporter_configuration_ref
      labels:
        zh: 导出器配置引用
        en: exporter-configuration reference
        ja: exporter 構成参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用确定传输、编码、端点、超时和鉴权配置的版本化导出器设置。
        en: References the versioned exporter settings that determine transport, encoding, endpoint, timeout, and authentication.
        ja: transport・encoding・endpoint・timeout・認証を定める versioned exporter 設定を参照します。
      allowed_values: []
      pattern: null
      example_value: exporter-config/otlp-primary@7
      source_claims:
        - claim-telemetry-export-activity-009
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 导出器开始处理该冻结输入范围的 UTC 时间。
        en: UTC instant at which the exporter began processing the frozen input scope.
        ja: exporter が固定入力範囲の処理を開始した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T14:32:08.000Z
      source_claims:
        - claim-telemetry-export-activity-010
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: 終了時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 收到响应、耗尽超时或取消调用的 UTC 时间；活动进行中时为空。
        en: UTC instant when a response arrived, the timeout was exhausted, or the invocation was cancelled; absent while in progress.
        ja: 応答受領・timeout 消尽・取消時の UTC 時刻で、進行中は省略します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T14:32:08.820Z
      source_claims:
        - claim-telemetry-export-activity-011
    - id: outcome
      labels:
        zh: 导出结果
        en: export outcome
        ja: export 結果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录整批接受、部分接受、失败或取消；它不由是否创建了批次单独推断。
        en: Records full success, partial success, failure, or cancellation; it is not inferred merely from batch creation.
        ja: full success・partial success・failure・cancellation を記録し、batch 生成だけから推論しません。
      allowed_values:
        - id: telemetry-export-outcome-success
          value: success
          labels:
            zh: 成功
            en: success
            ja: 成功
          definitions:
            zh: 服务端完整接受本次请求中的遥测数据。
            en: The server fully accepted the telemetry data in the request.
            ja: server が request 内の telemetry data をすべて受理しました。
          status: accepted
          source_claims:
            - claim-telemetry-export-activity-012
        - id: telemetry-export-outcome-partial-success
          value: partial-success
          labels:
            zh: 部分成功
            en: partial success
            ja: 部分成功
          definitions:
            zh: 服务端只接受部分数据，或以 partial_success 返回非空警告。
            en: The server accepted only part of the data or returned a non-empty partial_success warning.
            ja: server が一部 data のみを受理するか、非空の partial_success warning を返しました。
          status: accepted
          source_claims:
            - claim-telemetry-export-activity-013
        - id: telemetry-export-outcome-failure
          value: failure
          labels:
            zh: 失败
            en: failure
            ja: 失敗
          definitions:
            zh: 请求以可重试或不可重试错误结束，数据未获完整接受。
            en: The request ended in a retryable or non-retryable error without full acceptance.
            ja: request が retryable または non-retryable error で終了し、完全受理されませんでした。
          status: accepted
          source_claims:
            - claim-telemetry-export-activity-014
        - id: telemetry-export-outcome-cancelled
          value: cancelled
          labels:
            zh: 已取消
            en: cancelled
            ja: 取消済み
          definitions:
            zh: 调用在形成最终协议响应前由运行时取消。
            en: The runtime cancelled the invocation before a terminal protocol response was formed.
            ja: terminal protocol response の形成前に runtime が呼出しを取消しました。
          status: accepted
          source_claims:
            - claim-telemetry-export-activity-015
      pattern: null
      example_value: success
      source_claims:
        - claim-telemetry-export-activity-016
  constraints:
    - id: telemetry-export-one-signal-per-execution
      severity: error
      expression_language: plain
      expression: one TelemetryExportActivity exports exactly one telemetry signal under one exporter configuration
      explanations:
        zh: 一次遥测导出活动只导出一种信号并绑定一个 exporter 配置。
        en: One TelemetryExportActivity exports exactly one signal under one exporter configuration.
        ja: 一つの TelemetryExportActivity は一つの exporter 設定で一つの信号だけを出力します。
      source_claims:
        - claim-telemetry-export-activity-017
  required_relation_constraints: []
examples:
  - id: TelemetryExportActivity-example-positive-001
    kind: positive
    labels:
      zh: 遥测导出活动正例
      en: Positive example of Telemetry export activity
      ja: テレメトリ出力活動の正例
    scenario_id: null
    descriptions:
      zh: 在一次评估、纠正与改进决策循环中，系统将遥测导出活动（TelemetryExportActivity）记录为 TelemetryExportActivity produces TelemetryExportBatch 的源端点。其已审查定义是“遥测导出活动属于活动，区别于其他同类对象的条件是：它读取运行观测、日志或测量，在固定范围与格式下生成可校验的不可变导出批次；原始事件和测量的所有权不随导出转移”。
      en: Export execution `trace-export-91` selects completed spans for one trace scope, encodes one OTLP trace request, sends it to the configured endpoint, and records a successful response.
      ja: 評価・修正・改善判断のサイクルでは、システムはテレメトリ出力活動（TelemetryExportActivity）を TelemetryExportActivity produces TelemetryExportBatch の始点として記録します。審査済み定義は「テレメトリ出力活動は活動のうち、次の事実を定義条件とする対象です：それは、固定された範囲と形式の下で実行観測、ログ、測定を読み、検証可能な不変出力バッチを生成します。 元イベントと測定の所有権は出力によって移動しません」です。
    field_values:
      export_activity_id: export/trace-91
      signal: traces
      source_scope_ref: trace/run-742
      exporter_configuration_ref: exporter-config/otlp-primary@7
      started_at: 2026-07-16T14:32:08.000Z
      ended_at: 2026-07-16T14:32:08.820Z
      outcome: success
    related_node_ids:
      - TelemetryExportActivity
      - TelemetryExportBatch
    related_relation_ids:
      - TelemetryExportActivity-produces-TelemetryExportBatch
    expected_result:
      zh: 该运行可查询 TelemetryExportActivity 以及方向保持不变的事实 TelemetryExportActivity-produces-TelemetryExportBatch。
      en: The run can query TelemetryExportActivity together with direction-preserving fact TelemetryExportActivity-produces-TelemetryExportBatch.
      ja: この実行では TelemetryExportActivity と方向を保持した事実 TelemetryExportActivity-produces-TelemetryExportBatch を共に照会できます。
    why_valid_or_invalid:
      zh: 该场景同时给出真实运行语境、TelemetryExportActivity-produces-TelemetryExportBatch 的 canonical 方向、概念定义和可用字段值。
      en: The execution is bounded by one signal, source scope, exporter configuration, request, and outcome, so it satisfies the activity rather than the payload it produces.
      ja: このシナリオは実際の運用文脈、TelemetryExportActivity-produces-TelemetryExportBatch の canonical 方向、概念定義、利用可能な項目値を組み合わせます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-telemetry-export-activity-018
      - claim-telemetry-export-activity-019
  - id: TelemetryExportActivity-example-boundary-001
    kind: boundary
    labels:
      zh: 遥测导出活动边界例
      en: Boundary case for Telemetry export activity
      ja: テレメトリ出力活動の境界例
    scenario_id: null
    descriptions:
      zh: TelemetryExportBatch 用作TelemetryExportActivity的边界对照：两者可见于同一图谱片段，但 TelemetryExportBatch 的已审查定义是“遥测导出批次是以如下事实为区分特征的信息记录：它是一次导出活动产生的不可变信息集合，固定批次身份、格式、时间范围、来源指纹和成员顺序。”。不能因 relation TelemetryExportActivity-produces-TelemetryExportBatch 而把它归入TelemetryExportActivity。
      en: An encoded ExportTraceServiceRequest contains ResourceSpans and can be retransmitted, but it has no execution start, exporter invocation, or outcome; it is a TelemetryExportBatch, not TelemetryExportActivity.
      ja: TelemetryExportBatch は TelemetryExportActivity の境界対照です。同じグラフ断片に現れ得ますが、TelemetryExportBatch の審査済み定義は「テレメトリ出力バッチは情報記録の一種であり、次の条件で区別されます：それは一回の出力活動が生成する不変情報集合で、バッチ同一性、形式、時間範囲、出典指紋、要素順序を固定します。」です。relation TelemetryExportActivity-produces-TelemetryExportBatch だけで TelemetryExportActivity にはなりません。
    field_values: {}
    related_node_ids:
      - TelemetryExportActivity
      - TelemetryExportBatch
    related_relation_ids:
      - TelemetryExportActivity-produces-TelemetryExportBatch
    expected_result:
      zh: TelemetryExportBatch 保持其原有类型，验证器不得凭关系共现把它提升为 TelemetryExportActivity。
      en: TelemetryExportBatch retains its own type; validation must not promote it to TelemetryExportActivity from relation co-occurrence.
      ja: TelemetryExportBatch は元の型を維持し、関係の共起だけで TelemetryExportActivity へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 边界例点名实际对照节点，并保留 TelemetryExportActivity-produces-TelemetryExportBatch 的方向；只有显式 is_a 或完整种差才支持成员资格。
      en: Payload identity is determined by encoded members and format, while activity identity requires an invocation and outcome; production links but does not merge them.
      ja: 境界例は実在する対照ノードを示し、TelemetryExportActivity-produces-TelemetryExportBatch の方向を保持します。明示的 is_a または完全な種差だけが所属を支持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-telemetry-export-activity-020
      - claim-telemetry-export-activity-021
  - id: TelemetryExportActivity-example-instance-001
    kind: instance
    labels:
      zh: 遥测导出活动实例
      en: Telemetry-export instance
      ja: テレメトリ出力活動のインスタンス
    scenario_id: otlp-trace-export
    descriptions:
      zh: 实例 `trace-export-91` 在 820ms 内向 `/v1/traces` 发送一个追踪批次并收到成功响应。
      en: Instance `trace-export-91` sends one trace batch to `/v1/traces` in 820 ms and receives a successful response.
      ja: インスタンス `trace-export-91` は 820ms で一つの trace バッチを `/v1/traces` へ送り成功応答を受けます。
    field_values:
      activity_id: trace-export-91
      signal: traces
      duration_ms: 820
      outcome: success
    related_node_ids:
      - TelemetryExportActivity
      - TelemetryExportBatch
    related_relation_ids:
      - TelemetryExportActivity-produces-TelemetryExportBatch
    expected_result:
      zh: 活动与其输出批次分别保持可查询身份。
      en: The activity and its output batch retain separately queryable identities.
      ja: 活動と出力バッチは別々に検索可能な同一性を保持します。
    why_valid_or_invalid:
      zh: 信号、请求范围、目标、时间和结果均已给出。
      en: Signal, request scope, destination, timing, and outcome are all present.
      ja: 信号、要求範囲、宛先、時刻、結果がすべて存在します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-telemetry-export-activity-022
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: TelemetryExportActivity-produces-TelemetryExportBatch
    predicate: produces
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: produces
      en: produces
      ja: produces
    definitions:
      zh: TelemetryExportActivity produces TelemetryExportBatch 表示一次导出活动成功冻结输入范围并构造一个具有独立批次身份的单信号载荷；失败且未形成载荷的尝试不建立 produces 边。
      en: TelemetryExportActivity produces TelemetryExportBatch means that one export activity successfully freezes its input scope and constructs a separately identified single-signal payload; an attempt that fails before a payload exists does not establish produces.
      ja: TelemetryExportActivity produces TelemetryExportBatch は一出力活動が入力範囲を固定し独立同一性を持つ単一 signal payload を構成したことを示します。payload 形成前の失敗試行は produces を成立させません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该语义事实不对所有运行实例施加统一基数。
      en: This semantic fact does not impose one universal cardinality on every runtime instance.
      ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: inverse_of_produces
      labels:
        zh: 反向 produces
        en: inverse produces
        ja: 逆 produces
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: TelemetryExportActivity-produces-TelemetryExportBatch-example-positive-001
        kind: positive
        labels:
          zh: 冻结日志导出批次
          en: Frozen logs export batch
          ja: 固定 logs 出力 batch
        scenario_id: null
        descriptions:
          zh: 活动 `export/logs-71` 读取完成后冻结 50 条记录，创建 batch_id `batch/logs-71` 并计算来源指纹。
          en: After reading completes, activity `export/logs-71` freezes 50 records, creates batch_id `batch/logs-71`, and computes a provenance fingerprint.
          ja: 読取完了後、活動 `export/logs-71` は 50 記録を固定し batch_id `batch/logs-71` と来歴 fingerprint を作ります。
        field_values: {}
        related_node_ids:
          - TelemetryExportActivity
          - TelemetryExportBatch
        related_relation_ids:
          - TelemetryExportActivity-produces-TelemetryExportBatch
        expected_result:
          zh: 建立 produces 边，批次可在重试时保持相同成员与身份。
          en: A produces edge is created and the batch can preserve the same membership and identity during retry.
          ja: produces 辺を作り、retry 時も同じ要素・同一性を保持できます。
        why_valid_or_invalid:
          zh: 活动与不可变输出身份均存在，输出范围已从持续输入中分离。
          en: Both activity and immutable output identity exist, and output scope is separated from continuing input.
          ja: 活動と不変出力同一性が存在し、出力範囲は継続入力から分離されています。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-telemetry-export-activity-023
      - id: TelemetryExportActivity-produces-TelemetryExportBatch-example-boundary-001
        kind: boundary
        labels:
          zh: 构造前失败边界
          en: Pre-construction failure boundary
          ja: 構成前失敗の境界
        scenario_id: null
        descriptions:
          zh: 活动在读取输入时因序列化配置错误终止，没有成员集合或 batch_id；它是失败的 TelemetryExportActivity，但未产生批次。
          en: The activity terminates on a serialization-configuration error while reading input, with no member set or batch_id; it is a failed TelemetryExportActivity but produced no batch.
