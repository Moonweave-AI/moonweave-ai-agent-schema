source_claims:
  - id: claim-trace-export-001
    source: eng-proto-opentelemetry-otlp
    supports: TraceExport is grounded in OTLP TraceService Export requests and ResourceSpans/ScopeSpans grouping. Its placement below TelemetryExportBatch and explicit exclusion from LogArtifact are Moonweave design inference consistent with OTLP signal separation.
    locator: OTLP Specification 1.10.0 > OTLP/gRPC > ExportTraceServiceRequest message and linked Protobuf schema
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-trace-export-002
    source: eng-fw-openai-tracing
    supports: TraceExport also uses OpenAI Agents SDK trace/span identifiers, parent relationships, span data, processors, and sensitive-data controls. OpenAI does not assert Moonweave's TraceExport taxonomy or OTLP representation.
    locator: Tracing guide > Traces and spans, Custom trace processors, and Sensitive data
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-trace-export-003
    source: eng-proto-opentelemetry-otlp
    supports: OTLP TraceService defines one Export request containing ResourceSpans and ScopeSpans, supporting the TraceExport single-signal bounded-membership constraint; batch identity is Moonweave design inference.
    locator: OTLP Specification 1.10.0 > OTLP/gRPC > ExportTraceServiceRequest message and linked Protobuf schema
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-trace-export-004
    source: eng-proto-opentelemetry-otlp
    supports: TraceExport-example-positive-001 follows OTLP ExportTraceServiceRequest ResourceSpans and ScopeSpans grouping and the `/v1/traces` path; batch identity and redaction marker are Moonweave design inference.
    locator: OTLP Specification 1.10.0 > OTLP/gRPC > ExportTraceServiceRequest message; OTLP/HTTP Request > /v1/traces
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-trace-export-005
    source: eng-fw-openai-tracing
    supports: TraceExport-example-positive-001 uses OpenAI's trace/span model with trace_id, parent_id, span data, and errors; packaging it as OTLP is Moonweave design inference.
    locator: Tracing guide > Traces and spans > trace and span properties
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-trace-export-006
    source: eng-proto-opentelemetry-otlp
    supports: TraceExport-example-boundary-001 distinguishes one span from the OTLP ExportTraceServiceRequest transport message; treating only the bounded request payload as TraceExport is Moonweave design inference.
    locator: OTLP Specification 1.10.0 > OTLP/gRPC > ExportTraceServiceRequest message
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-trace-export-007
    source: eng-fw-openai-tracing
    supports: TraceExport-example-instance-001 follows OpenAI Agents SDK default agent, function, and handoff spans, BatchTraceProcessor, force flush, and sensitive-data controls; the batch identifier is Moonweave design inference.
    locator: Tracing guide > Default tracing, Higher level traces, Custom trace processors, Force flush, and Sensitive data
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-trace-export-008
    source: eng-proto-opentelemetry-otlp
    supports: TraceExport-is_a-TelemetryExportBatch positive case follows OTLP TraceService request grouping and `/v1/traces`; the common batch hierarchy is Moonweave design inference.
    locator: OTLP Specification 1.10.0 > OTLP/gRPC > ExportTraceServiceRequest; OTLP/HTTP Request > /v1/traces
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-trace-export-009
    source: eng-proto-opentelemetry-otlp
    supports: TraceExport-is_a-TelemetryExportBatch boundary case uses OTLP's separate TraceService and LogsService payloads to distinguish sibling batches; the taxonomy is Moonweave design inference.
    locator: OTLP Specification 1.10.0 > OTLP/gRPC > ExportTraceServiceRequest versus ExportLogsServiceRequest
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-trace-export-010
    source: eng-proto-opentelemetry-otlp
    supports: TraceExport-is_a-TelemetryExportBatch is grounded in OTLP TraceService request grouping and signal-specific Export services. OpenTelemetry does not assert Moonweave's common batch class; is_a direction, batch identity, and traces differentia are design inference.
    locator: OTLP Specification 1.10.0 > OTLP/gRPC > ExportTraceServiceRequest and signal-specific request messages
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
