schema: moonweave.ai/ontology-node/v1
id: TraceExport
kind: concept
status: accepted
labels:
  en: trace export
  zh: 轨迹导出
  ja: トレースエクスポート
semantics:
  short_definition:
    zh: 轨迹导出是包含选定轨迹、跨度与追踪上下文的 traces 信号遥测导出批次。
    en: A TraceExport is a traces-signal TelemetryExportBatch containing selected traces, spans, and trace context.
    ja: TraceExport は選択した trace、span、trace context を含む traces 信号の TelemetryExportBatch です。
  definition:
    zh: 轨迹导出是一种 TelemetryExportBatch；其种差是作为 traces 信号的一次有界导出载荷，按 ResourceSpans 与 ScopeSpans 分组保存选定 TraceRecord/TraceSpan、TraceId/SpanId、父子关系、事件、属性、状态、脱敏状态和来源。它不是 LogArtifact，也不是持续接收跨度的运行时追踪存储。
    en: A TraceExport is a TelemetryExportBatch whose differentia is being one bounded traces-signal export payload grouping selected TraceRecords or TraceSpans by ResourceSpans and ScopeSpans while preserving TraceId and SpanId, parentage, events, attributes, status, redaction state, and provenance. It is not a LogArtifact or a live trace store that continuously receives spans.
    ja: TraceExport は TelemetryExportBatch の一種で、選択した TraceRecord・TraceSpan を ResourceSpans と ScopeSpans でまとめ、TraceId・SpanId、親子関係、event、属性、status、秘匿状態、来歴を保持する一回の有界 traces 信号 payload である点で区別されます。LogArtifact でも span を継続受信する live trace store でもありません。
  why_needed:
    zh: 明确 traces 专用批次可以保留跨跨度拓扑与脱敏状态，并避免把追踪导出错误塞入 LogArtifact 层级或与单条 LogRecord 混淆。
    en: An explicit traces-specific batch preserves cross-span topology and redaction state while preventing trace exports from being placed under LogArtifact or confused with individual LogRecords.
    ja: traces 専用 batch を明示することで span 間 topology と秘匿状態を保持し、trace 出力を LogArtifact 配下へ誤配置したり一 LogRecord と混同したりすることを防ぎます。
  includes:
    - zh: 纳入具有 batch_id、traces 信号、ResourceSpans/ScopeSpans 分组与完整跨度标识关系的有界导出载荷。
      en: Includes a bounded export payload with batch_id, traces signal, ResourceSpans and ScopeSpans grouping, and complete span identifiers and relationships.
      ja: batch_id、traces signal、ResourceSpans・ScopeSpans 組、完全な span 識別関係を持つ有界出力 payload を含みます。
  excludes:
    - zh: 排除 logs 信号的 LogArtifact、只表示一个跨度的 TraceSpan，以及持续追加且没有固定导出成员范围的追踪存储。
      en: Excludes a logs-signal LogArtifact, one TraceSpan, and a continuously appended trace store with no fixed export membership.
      ja: logs 信号の LogArtifact、一つの TraceSpan、固定出力要素範囲を持たない継続追加 trace store を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: trace-export-single-signal-bounded-membership
      severity: error
      expression_language: plain
      expression: a TraceExport contains only traces-signal members from one bounded Export request and preserves span parentage
      explanations:
        zh: 轨迹导出只能包含一次有界 Export 请求中的 traces 信号成员，并必须保留跨度父子关系。
        en: A TraceExport contains only traces-signal members from one bounded Export request and preserves span parentage.
        ja: TraceExport は一回の有界 Export 要求の traces 信号要素だけを含み、span 親子関係を保持します。
      source_claims:
        - claim-trace-export-003
  required_relation_constraints: []
examples:
  - id: TraceExport-example-positive-001
    kind: positive
    labels:
      zh: OTLP 轨迹导出
      en: OTLP trace export
      ja: OTLP トレース出力
    scenario_id: null
    descriptions:
      zh: 批次 `trace-export/run-742` 将一个 agent run 的 26 个 spans 按 ResourceSpans/ScopeSpans 分组，保留 TraceId、父跨度、事件、状态和脱敏标记后提交至 `/v1/traces`。
      en: Batch `trace-export/run-742` groups 26 spans from one agent run into ResourceSpans and ScopeSpans, preserves TraceId, parent spans, events, status, and redaction markers, and submits them to `/v1/traces`.
      ja: バッチ `trace-export/run-742` は一 agent run の 26 span を ResourceSpans・ScopeSpans でまとめ、TraceId、親 span、event、status、秘匿 marker を保持して `/v1/traces` へ送ります。
    field_values:
      batch_id: trace-export/run-742
      signal: traces
      span_count: 26
    related_node_ids:
      - TraceExport
      - TelemetryExportBatch
      - TraceRecord
      - TraceSpan
    related_relation_ids:
      - TraceExport-is_a-TelemetryExportBatch
      - trace_span_exported_by_trace_export
    expected_result:
      zh: 接收端恢复同一追踪树及其跨度状态，不把该载荷解释为日志记录集合。
      en: The receiver reconstructs the same trace tree and span statuses without interpreting the payload as a collection of log records.
      ja: 受信側は同じ trace tree と span status を再構成し、payload をログ記録集合として解釈しません。
    why_valid_or_invalid:
      zh: 单一 traces 信号、有界成员、跨度拓扑与传输端点均明确，满足 TraceExport 的种差。
      en: One traces signal, bounded membership, span topology, and transport endpoint are explicit, satisfying the TraceExport differentia.
      ja: 一つの traces signal、有界要素、span topology、転送 endpoint が明示され TraceExport の種差を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-trace-export-004
      - claim-trace-export-005
  - id: TraceExport-example-boundary-001
    kind: boundary
    labels:
      zh: 单个跨度边界
      en: Single-span boundary
      ja: 単一 span の境界
    scenario_id: null
    descriptions:
      zh: 对象只包含一个仍在运行的 TraceSpan 及其 span_id，没有固定 batch_id、成员范围或 Export 请求；它是运行时跨度，不是 TraceExport。
      en: An object contains only one still-running TraceSpan and its span_id, with no fixed batch_id, member scope, or Export request; it is a runtime span rather than a TraceExport.
      ja: 対象は実行中の一 TraceSpan と span_id だけを持ち、固定 batch_id、要素範囲、Export 要求がないため runtime span であり TraceExport ではありません。
    field_values: {}
    related_node_ids:
      - TraceExport
      - TraceSpan
      - TelemetryExportBatch
    related_relation_ids:
      - trace_span_exported_by_trace_export
    expected_result:
      zh: 跨度保持 TraceSpan 类型，只有进入有界导出请求后才成为 TraceExport 的成员。
      en: The span retains TraceSpan type and becomes a TraceExport member only when included in a bounded export request.
      ja: span は TraceSpan 型を保持し、有界出力要求に含まれた時だけ TraceExport の要素になります。
    why_valid_or_invalid:
      zh: 追踪内容与导出载荷身份不同；一个跨度不能凭潜在可导出性升级为批次。
      en: Trace content and export-payload identity differ; one span cannot be promoted to a batch merely because it could later be exported.
      ja: trace 内容と出力 payload の同一性は異なり、後で出力可能というだけで一 span を batch へ昇格できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-trace-export-006
  - id: TraceExport-example-instance-001
    kind: instance
    labels:
      zh: 脱敏追踪批次实例
      en: Redacted trace-batch instance
      ja: 秘匿済み trace batch のインスタンス
    scenario_id: redacted-trace-export-19
    descriptions:
      zh: 实例 `trace-export/19` 包含根 agent span、两个工具 span 与一个 handoff span；函数输入输出已脱敏，批次通过 BatchTraceProcessor 刷新。
      en: Instance `trace-export/19` contains a root agent span, two tool spans, and one handoff span; function inputs and outputs are redacted and the batch is flushed through a BatchTraceProcessor.
      ja: インスタンス `trace-export/19` は root agent span、二 tool span、一 handoff span を含み、function 入出力は秘匿され BatchTraceProcessor から flush されます。
    field_values:
      batch_id: trace-export/19
      signal: traces
      span_count: 4
      redaction_state: applied
    related_node_ids:
      - TraceExport
      - TraceExportActivity
      - TraceSpan
    related_relation_ids:
      - TraceExportActivity-produces-TraceExport
      - trace_span_exported_by_trace_export
    expected_result:
      zh: 实例保留父子拓扑和跨度类型，且导出内容中不存在被标记为敏感的原始输入输出。
      en: The instance preserves parent-child topology and span types, with no sensitive raw inputs or outputs present in exported content.
      ja: 親子 topology と span 型を保持し、出力内容に機密 raw 入出力は存在しません。
    why_valid_or_invalid:
      zh: 批次身份、成员范围、追踪结构、处理器和脱敏状态均可核实。
      en: Batch identity, membership, trace structure, processor, and redaction state are all verifiable.
      ja: batch 同一性、要素範囲、trace 構造、processor、秘匿状態をすべて検証できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-trace-export-007
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: TraceExport-is_a-TelemetryExportBatch
  predicate: is_a
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: is a
    en: is a
    ja: is a
  definitions:
    zh: TraceExport is_a TelemetryExportBatch 表示每个轨迹导出都继承单信号、有界成员、格式和批次身份条件，并以 traces 载荷中的 ResourceSpans/ScopeSpans 与跨度拓扑为种差。
    en: TraceExport is_a TelemetryExportBatch means that every trace export inherits single-signal, bounded-membership, format, and batch-identity conditions and is differentiated by traces payloads containing ResourceSpans, ScopeSpans, and span topology.
    ja: TraceExport is_a TelemetryExportBatch は単一 signal、有界要素、形式、batch 同一性条件を継承し、ResourceSpans・ScopeSpans・span topology を含む traces payload を種差とします。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该语义事实不对所有运行实例施加统一基数。
    en: This semantic fact does not impose one universal cardinality on every runtime instance.
    ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: inverse_of_is_a
    labels:
      zh: 反向 is_a
      en: inverse is_a
      ja: 逆 is_a
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: TraceExport-is_a-TelemetryExportBatch-example-positive-001
      kind: positive
      labels:
        zh: 轨迹信号批次
        en: Traces-signal batch
        ja: traces signal batch
      scenario_id: null
      descriptions:
        zh: "`trace-export/19` 具有 batch_id、固定 26 个跨度、ResourceSpans/ScopeSpans 分组并通过 `/v1/traces` 发送。"
        en: "`trace-export/19` has a batch_id, fixed membership of 26 spans, ResourceSpans and ScopeSpans grouping, and is sent through `/v1/traces`."
        ja: "`trace-export/19` は batch_id、固定 26 span、ResourceSpans・ScopeSpans 組を持ち `/v1/traces` へ送られます。"
      field_values: {}
      related_node_ids:
        - TraceExport
        - TelemetryExportBatch
      related_relation_ids:
        - TraceExport-is_a-TelemetryExportBatch
      expected_result:
        zh: 对象同时按 TraceExport 与 TelemetryExportBatch 查询。
        en: The object is queryable as both TraceExport and TelemetryExportBatch.
        ja: 対象は TraceExport と TelemetryExportBatch の両方で検索できます。
      why_valid_or_invalid:
        zh: 全部批次上位条件与 traces 专用种差成立。
        en: Every batch supertype condition and the traces-specific differentia hold.
        ja: 全 batch 上位条件と traces 固有種差が成立します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-trace-export-008
    - id: TraceExport-is_a-TelemetryExportBatch-example-boundary-001
      kind: boundary
      labels:
        zh: 日志批次兄弟边界
        en: Logs-batch sibling boundary
        ja: logs batch sibling 境界
      scenario_id: null
      descriptions:
        zh: ExportLogsServiceRequest 具有批次身份但只含 ResourceLogs，没有跨度拓扑；它是 TelemetryExportBatch 但不是 TraceExport。
        en: An ExportLogsServiceRequest has batch identity but contains only ResourceLogs and no span topology; it is a TelemetryExportBatch but not a TraceExport.
        ja: ExportLogsServiceRequest は batch 同一性を持ちますが ResourceLogs だけで span topology がなく、TelemetryExportBatch でも TraceExport ではありません。
      field_values: {}
      related_node_ids:
        - TraceExport
        - TelemetryExportBatch
      related_relation_ids:
        - TraceExport-is_a-TelemetryExportBatch
      expected_result:
        zh: 保留共同批次上位类型，不赋予 TraceExport。
        en: The common batch supertype remains and TraceExport is not assigned.
        ja: 共通 batch 上位型を保持し TraceExport は付与しません。
      why_valid_or_invalid:
        zh: 具体信号种差属于 logs，不能因共享批次结构被提升为 traces 下位类型。
        en: The concrete signal differentia are logs, so shared batch structure cannot promote it to the traces subtype.
        ja: 具体 signal 種差は logs で、共通 batch 構造だけで traces 下位型へ昇格できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-trace-export-009
  source_claims:
    - claim-trace-export-010
  distinct_fact_rationale: null
