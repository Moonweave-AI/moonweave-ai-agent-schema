schema: moonweave.ai/ontology-node/v1
id: TelemetryExportBatch
kind: concept
status: accepted
labels:
  zh: 遥测导出批次
  en: Telemetry export batch
  ja: テレメトリ出力バッチ
semantics:
  short_definition:
    zh: 遥测导出批次是一次导出调用中针对单一遥测信号提交的有界载荷。
    en: A TelemetryExportBatch is a bounded payload submitted for one telemetry signal in one export call.
    ja: TelemetryExportBatch は一回の出力呼出しで一つのテレメトリ信号を送る有界 payload です。
  definition:
    zh: 遥测导出批次是一种不可变信息集合；其种差是由一次 TelemetryExportActivity 为 logs、metrics 或 traces 中的单一信号构造，固定批次身份、传输格式、资源/检测范围、成员顺序或分组、时间范围和来源指纹，并作为一次 Export 请求的载荷。TraceExport 是 traces 信号的下位批次；它不是日志产物上位类。
    en: A TelemetryExportBatch is an immutable information collection whose differentia is being constructed by one TelemetryExportActivity for exactly one of the logs, metrics, or traces signals, fixing batch identity, transport format, resource and instrumentation scope, member order or grouping, time range, and provenance fingerprint as the payload of one Export request. TraceExport specializes the traces case; the batch is not a genus of log artifacts.
    ja: TelemetryExportBatch は不変情報集合の一種で、一回の TelemetryExportActivity が logs・metrics・traces のいずれか一信号向けに構成し、一回の Export 要求 payload として batch 同一性、転送形式、resource・instrumentation scope、要素順序または組、時間範囲、来歴 fingerprint を固定する点で区別されます。TraceExport は traces の下位型で、ログ成果物の上位型ではありません。
  why_needed:
    zh: 导出活动与导出载荷必须分开建模，才能核实重试是否重放同一批次、响应是否确认同一请求，以及信号是否被错误混装。
    en: Export activity and export payload must be distinct so retries can be checked for replaying the same batch, responses can acknowledge the same request, and accidental mixing of signals can be detected.
    ja: 出力活動と payload を分けることで、retry が同じ batch を再送したか、応答が同じ要求を確認したか、信号を誤混載していないか検査できます。
  includes:
    - zh: 纳入具有 batch_id、单一 signal、明确成员范围、传输格式和来源信息的一次 Export 请求载荷。
      en: Includes one Export-request payload with batch_id, one signal, explicit member scope, transport format, and provenance.
      ja: batch_id、一つの signal、明示的要素範囲、転送形式、来歴を持つ一回の Export 要求 payload を含みます。
  excludes:
    - zh: 排除持续变化的 LogStream、执行导出的 TelemetryExportActivity，以及把 logs、metrics 和 traces 混入同一信号请求的无效载荷。
      en: Excludes a continuously changing LogStream, the TelemetryExportActivity performing export, and an invalid payload that mixes logs, metrics, and traces into one signal request.
      ja: 継続変化する LogStream、出力を実行する TelemetryExportActivity、logs・metrics・traces を一信号要求に混ぜる無効 payload を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - batch_id
  fields:
    - id: batch_id
      labels:
        zh: 批次
        en: batch
        ja: バッチ
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该字段唯一标识这条批次记录。
        en: This field uniquely identifies the batch record.
        ja: この項目はバッチ記録を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: telemetry-batch-20260714
      source_claims:
        - claim-telemetry-export-batch-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: TelemetryExportBatch-example-positive-001
    kind: positive
    labels:
      zh: OTLP 日志导出批次
      en: OTLP log export batch
      ja: OTLP ログ出力バッチ
    scenario_id: null
    descriptions:
      zh: 批次 `batch/logs-71` 是一次 ExportLogsServiceRequest，包含两个 ResourceLogs 分组、固定成员范围与来源指纹，并通过 `/v1/logs` 提交。
      en: Batch `batch/logs-71` is one ExportLogsServiceRequest containing two ResourceLogs groups with fixed membership and a provenance fingerprint, submitted through `/v1/logs`.
      ja: バッチ `batch/logs-71` は二つの ResourceLogs 組、固定要素範囲、来歴 fingerprint を含む一回の ExportLogsServiceRequest で、`/v1/logs` へ送られます。
    field_values:
      batch_id: batch/logs-71
      signal: logs
      member_groups: 2
    related_node_ids:
      - TelemetryExportBatch
      - TelemetryExportActivity
    related_relation_ids:
      - TelemetryExportActivity-produces-TelemetryExportBatch
    expected_result:
      zh: 重试沿用同一 batch_id 与成员集合，响应只确认该日志请求。
      en: A retry reuses the same batch_id and member set, and the response acknowledges only this logs request.
      ja: retry は同じ batch_id と要素集合を再利用し、応答はこの logs 要求だけを確認します。
    why_valid_or_invalid:
      zh: 它具有一次活动、单一信号、有界成员和可重放身份，满足传输批次而非持续流的条件。
      en: It has one producing activity, one signal, bounded membership, and replayable identity, satisfying a transport batch rather than a live stream.
      ja: 一回の生成活動、一信号、有界要素、再送可能な同一性を持ち、live stream ではなく転送 batch の条件を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-telemetry-export-batch-003
  - id: TelemetryExportBatch-example-boundary-001
    kind: boundary
    labels:
      zh: 混合信号载荷边界
      en: Mixed-signal payload boundary
      ja: 混合 signal payload の境界
    scenario_id: null
    descriptions:
      zh: 一个对象同时把 ResourceLogs、ResourceMetrics 与 ResourceSpans 放进声称为单次 `/v1/logs` 的请求；OTLP 为三种信号定义不同服务，该对象不是有效的 TelemetryExportBatch。
      en: An object places ResourceLogs, ResourceMetrics, and ResourceSpans into what it claims is one `/v1/logs` request; OTLP defines separate services for the three signals, so this is not a valid TelemetryExportBatch.
      ja: 一つの `/v1/logs` 要求だとする対象に ResourceLogs、ResourceMetrics、ResourceSpans を同時格納しています。OTLP は三信号を別 service とするため有効な TelemetryExportBatch ではありません。
    field_values: {}
    related_node_ids:
      - TelemetryExportBatch
      - LogArtifact
      - TraceExport
    related_relation_ids:
      - TraceExport-is_a-TelemetryExportBatch
    expected_result:
      zh: 验证拒绝混合载荷，并要求拆成 logs、metrics 与 traces 三个独立批次。
      en: Validation rejects the mixed payload and requires separate logs, metrics, and traces batches.
      ja: 検証は混合 payload を拒否し、logs・metrics・traces の独立 batch へ分割を求めます。
    why_valid_or_invalid:
      zh: 批次上位概念覆盖三种信号的平行下位类型，不意味着一个具体批次可以同时属于三种传输服务。
      en: The batch genus covers parallel signal-specific subtypes; it does not permit one concrete batch to inhabit three transport services simultaneously.
      ja: batch 上位概念は信号別の平行下位型を包含しますが、一具体 batch が三つの転送 service を同時に占めることは許しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-telemetry-export-batch-004
  - id: TelemetryExportBatch-example-instance-001
    kind: instance
    labels:
      zh: 指标批次实例
      en: Metric batch instance
      ja: 指標 batch のインスタンス
    scenario_id: metrics-batch-305
    descriptions:
      zh: 实例 `batch/metrics-305` 由一次 MetricExportActivity 产生，包含 18 个 MeasurementReference，时间窗为 60 秒，编码为 OTLP protobuf。
      en: Instance `batch/metrics-305` is produced by one MetricExportActivity, contains 18 MeasurementReferences for a 60-second window, and uses OTLP protobuf encoding.
      ja: インスタンス `batch/metrics-305` は一回の MetricExportActivity が生成し、60 秒窓の 18 MeasurementReference を含み、OTLP protobuf で符号化されます。
    field_values:
      batch_id: batch/metrics-305
      signal: metrics
      member_count: 18
      format: otlp-protobuf
    related_node_ids:
      - TelemetryExportBatch
      - MeasurementReference
      - MetricExportActivity
      - TelemetryExportActivity
    related_relation_ids:
      - TelemetryExportBatch-contains-MeasurementReference
      - TelemetryExportActivity-produces-TelemetryExportBatch
    expected_result:
      zh: 实例按一个 metrics 批次校验，18 个引用均能解析且时间窗一致。
      en: The instance validates as one metrics batch, with all 18 references resolvable and sharing the declared window.
      ja: 一つの metrics batch として検証され、18 参照すべてが解決可能で宣言窓と一致します。
    why_valid_or_invalid:
      zh: 产生活动、信号、成员范围、时间窗和格式均固定，满足不可变批次身份。
      en: Producing activity, signal, member scope, time window, and format are fixed, satisfying immutable batch identity.
      ja: 生成活動、signal、要素範囲、時間窓、形式が固定され、不変 batch 同一性を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-telemetry-export-batch-005
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-feedback-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OpenTelemetry Logs/Metrics 数据模型、OTLP 导出模式与结构化日志实践逐项核验。
    en: Verified against OpenTelemetry Logs/Metrics data model, OTLP export patterns, and structured logging practices.
    ja: OpenTelemetry Logs/Metrics データモデル、OTLP 出力パターン、構造化ログ実践に照らし確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-telemetry-export-batch-001
    source: eng-proto-opentelemetry-otlp
    supports: TelemetryExportBatch is grounded in OTLP's signal-specific Export service requests and HTTP paths plus SDK exporter batch operations. The common batch genus, immutable batch_id, provenance fingerprint, and contained MeasurementReference relation are Moonweave design inference.
    locator: OTLP Specification 1.10.0 > OTLP/gRPC > signal-specific Export request messages; OTLP/HTTP Request > signal paths
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-telemetry-export-batch-002
    source: eng-proto-opentelemetry-otlp
    supports: TelemetryExportBatch.batch_id is grounded in OTLP's bounded Export request and signal-specific request payload groupings. OTLP does not assign a portable batch identifier; the field is Moonweave's stable identity for retry, provenance, and membership queries over one such request payload.
    locator: OTLP Specification 1.10.0 > OTLP/gRPC > Export request and response; signal-specific request messages
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-telemetry-export-batch-003
    source: eng-proto-opentelemetry-otlp
    supports: TelemetryExportBatch-example-positive-001 follows OTLP ExportLogsServiceRequest grouping and the OTLP/HTTP `/v1/logs` default path; batch_id and provenance fingerprint are Moonweave design inference.
    locator: OTLP Specification 1.10.0 > OTLP/gRPC > ExportLogsServiceRequest; OTLP/HTTP Request > /v1/logs
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-telemetry-export-batch-004
    source: eng-proto-opentelemetry-otlp
    supports: TelemetryExportBatch-example-boundary-001 is supported by OTLP's distinct TraceService, MetricsService, and LogsService Export requests and separate HTTP paths; Moonweave turns that protocol separation into a class constraint.
    locator: OTLP Specification 1.10.0 > OTLP/gRPC > signal-specific Export request messages; OTLP/HTTP Request > /v1/traces, /v1/metrics, and /v1/logs
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-telemetry-export-batch-005
    source: eng-proto-opentelemetry-otlp
    supports: TelemetryExportBatch-example-instance-001 follows the OTLP ExportMetricsServiceRequest message and `/v1/metrics` path; batch identity and MeasurementReference membership are Moonweave design inference.
    locator: OTLP Specification 1.10.0 > OTLP/gRPC > ExportMetricsServiceRequest; OTLP/HTTP Request > /v1/metrics
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
