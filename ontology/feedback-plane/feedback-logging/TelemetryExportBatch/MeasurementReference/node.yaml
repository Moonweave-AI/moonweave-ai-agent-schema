schema: moonweave.ai/ontology-node/v1
id: MeasurementReference
kind: concept
status: accepted
labels:
  zh: 测量引用
  en: Measurement reference
  ja: 測定参照
semantics:
  short_definition:
    zh: 测量引用是遥测导出批次中指向一项测量及其导出点的成员记录。
    en: A MeasurementReference is a TelemetryExportBatch member that identifies a measurement and its exported point.
    ja: MeasurementReference は測定とその出力点を識別する TelemetryExportBatch の要素です。
  definition:
    zh: 测量引用是一种批次成员信息；其种差是在一个 TelemetryExportBatch 内以稳定 measurement_id 指向 Measurement，并固定该次导出的时间戳、值或聚合点、属性集、单位以及适用的聚合时间性。它是对测量的批次内引用，不是测量活动本身，也不是整个指标导出请求。
    en: A MeasurementReference is batch-member information whose differentia is identifying a Measurement by stable measurement_id inside one TelemetryExportBatch while fixing the exported timestamp, value or aggregate point, attribute set, unit, and applicable aggregation temporality. It is an in-batch reference to a measurement, not the measurement activity itself or the whole metric export request.
    ja: MeasurementReference はバッチ要素情報の一種で、一つの TelemetryExportBatch 内で安定した measurement_id により Measurement を指し、その出力時刻、値または集約点、属性集合、単位、適用される集約 temporality を固定する点で区別されます。測定活動そのものでも指標出力要求全体でもありません。
  why_needed:
    zh: 批次必须在不复制 Measurement 本体身份的前提下说明具体导出了哪个数据点；显式引用使完整性检查能发现缺失、重复或时间性不一致的测量成员。
    en: A batch must state which data point was exported without duplicating Measurement identity; an explicit reference lets completeness checks detect missing, duplicate, or temporality-inconsistent measurement members.
    ja: バッチは Measurement の同一性を複製せず、どのデータ点を出力したか示す必要があります。明示参照により欠落、重複、temporality 不一致を検出できます。
  includes:
    - zh: 纳入同时给出 measurement_id、数据点时间、数值或聚合、属性与时间性的批次成员。
      en: Includes a batch member that states measurement_id, data-point time, value or aggregation, attributes, and temporality.
      ja: measurement_id、データ点時刻、値または集約、属性、temporality を示すバッチ要素を含みます。
  excludes:
    - zh: 排除 Measurement 活动或事实本身、只有名称而无数据点定位的字符串，以及包含完整指标资源结构的 TelemetryExportBatch。
      en: Excludes the Measurement activity or fact itself, a bare metric-name string with no data-point locator, and the TelemetryExportBatch that contains the complete metric resource structure.
      ja: Measurement 活動・事実そのもの、データ点位置を持たない名称文字列、完全な metric resource 構造を含む TelemetryExportBatch を除外します。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - reference_id
  fields:
    - id: reference_id
      labels:
        zh: 测量引用
        en: measurement reference
        ja: 測定参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该字段唯一标识这条测量引用记录。
        en: This field uniquely identifies the measurement reference record.
        ja: この項目は測定参照記録を一意に識別します。
      allowed_values: []
      pattern: null
      example_value: measurement-ref-042
      source_claims:
        - claim-measurement-reference-002
  constraints: []
  required_relation_constraints: []
examples:
  - id: MeasurementReference-example-positive-001
    kind: positive
    labels:
      zh: 延迟测量引用
      en: Latency measurement reference
      ja: 遅延測定参照
    scenario_id: null
    descriptions:
      zh: 批次成员 `mref/latency-p95/17` 指向 Measurement `latency.p95`，固定时间窗、单位 `ms`、值 842、属性 `model=gpt-x` 与 cumulative temporality。
      en: Batch member `mref/latency-p95/17` identifies Measurement `latency.p95` and fixes its window, unit `ms`, value 842, attribute `model=gpt-x`, and cumulative temporality.
      ja: バッチ要素 `mref/latency-p95/17` は Measurement `latency.p95` を指し、時間窓、単位 `ms`、値 842、属性 `model=gpt-x`、cumulative temporality を固定します。
    field_values:
      reference_id: mref/latency-p95/17
      measurement_id: latency.p95
      unit: ms
      value: 842
    related_node_ids:
      - MeasurementReference
      - Measurement
      - TelemetryExportBatch
    related_relation_ids:
      - MeasurementReference-references-Measurement
      - TelemetryExportBatch-contains-MeasurementReference
    expected_result:
      zh: 完整性检查把该成员解析到唯一测量点，并确认批次所声明的时间性与数据点一致。
      en: Completeness checking resolves the member to one measurement point and confirms that batch temporality agrees with the data point.
      ja: 完全性検査は要素を一つの測定点へ解決し、バッチの temporality とデータ点が一致することを確認します。
    why_valid_or_invalid:
      zh: 引用同时保留测量身份和本次导出的点级上下文，未把整个 Measurement 复制为批次成员。
      en: The reference preserves measurement identity and export-specific point context without copying the entire Measurement as the batch member.
      ja: Measurement の同一性と今回の出力点文脈を保ち、Measurement 全体をバッチ要素として複製していません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-measurement-reference-003
  - id: MeasurementReference-example-boundary-001
    kind: boundary
    labels:
      zh: 指标名称字符串边界
      en: Metric-name string boundary
      ja: metric 名文字列の境界
    scenario_id: null
    descriptions:
      zh: 批次元数据只出现字符串 `latency.p95`，却没有 measurement_id、数据点时间和值；该字符串可作标签，但不足以构成 MeasurementReference。
      en: Batch metadata contains only the string `latency.p95` with no measurement_id, data-point time, or value; it may serve as a label but is insufficient for a MeasurementReference.
      ja: バッチ metadata に文字列 `latency.p95` だけがあり、measurement_id、データ点時刻、値がありません。ラベルにはなりますが MeasurementReference には不十分です。
    field_values: {}
    related_node_ids:
      - MeasurementReference
      - Measurement
    related_relation_ids:
      - MeasurementReference-references-Measurement
    expected_result:
      zh: 系统保留普通标签并报告不可解析引用，不创建指向 Measurement 的关系。
      en: The system retains a plain label, reports an unresolvable reference, and creates no relation to Measurement.
      ja: 単なるラベルとして保持し、解決不能参照を報告して Measurement への関係を作りません。
    why_valid_or_invalid:
      zh: 名称相似不能满足稳定引用与点级上下文条件，否则会把同名但属性或时间窗不同的序列混为一体。
      en: Name similarity does not satisfy stable reference and point-context conditions; otherwise same-name series with different attributes or windows would be conflated.
      ja: 名称一致だけでは安定参照と点文脈を満たさず、属性・時間窓が異なる同名 series を混同します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-measurement-reference-004
  - id: MeasurementReference-example-instance-001
    kind: instance
    labels:
      zh: 令牌计数引用实例
      en: Token-count reference instance
      ja: トークン数参照のインスタンス
    scenario_id: token-count-export-204
    descriptions:
      zh: 实例 `mref/token-output/204` 指向输出令牌 Measurement，记录 delta 值 126、结束时间 `02:42:10Z` 与属性 `run_id=204`。
      en: Instance `mref/token-output/204` refers to the output-token Measurement and records delta value 126, end time `02:42:10Z`, and attribute `run_id=204`.
      ja: インスタンス `mref/token-output/204` は出力 token Measurement を指し、delta 値 126、終了時刻 `02:42:10Z`、属性 `run_id=204` を記録します。
    field_values:
      reference_id: mref/token-output/204
      measurement_id: tokens.output
      value: 126
      temporality: delta
    related_node_ids:
      - MeasurementReference
      - Measurement
      - TelemetryExportBatch
    related_relation_ids:
      - MeasurementReference-references-Measurement
      - TelemetryExportBatch-contains-MeasurementReference
    expected_result:
      zh: 该实例只作为当前批次的成员解析，原 Measurement 身份与其他时间点保持独立。
      en: The instance resolves only as a member of the current batch; the original Measurement identity and other points remain independent.
      ja: 現在バッチの要素としてのみ解決され、元の Measurement 同一性と他時点は独立に保たれます。
    why_valid_or_invalid:
      zh: 稳定引用、点值、时间和时间性完整，能够唯一解释该批次成员。
      en: Stable reference, point value, time, and temporality are complete enough to interpret the batch member unambiguously.
      ja: 安定参照、点値、時刻、temporality が揃い、バッチ要素を一意に解釈できます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-measurement-reference-005
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
