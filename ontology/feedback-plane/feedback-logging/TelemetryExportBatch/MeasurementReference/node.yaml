      expected_result:
        zh: 查询批次返回 18 个引用成员，成员可继续解析到各自 Measurement。
        en: A batch query returns 18 reference members, each still resolvable to its Measurement.
        ja: batch 照会は 18 参照要素を返し、各要素は各 Measurement へ解決できます。
      why_valid_or_invalid:
        zh: 批次身份、成员身份和共享范围明确，组合不吞并被引用测量。
        en: Batch identity, member identity, and shared scope are explicit, and composition does not absorb referenced measurements.
        ja: batch・要素同一性、共有範囲が明示され composition は参照先測定を吸収しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-measurement-reference-006
    - id: TelemetryExportBatch-contains-MeasurementReference-example-boundary-001
      kind: boundary
