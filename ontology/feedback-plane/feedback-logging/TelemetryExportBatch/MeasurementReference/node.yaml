    en: contains
    ja: contains
  definitions:
    zh: TelemetryExportBatch contains MeasurementReference 表示一个指标信号批次把测量引用作为有序或分组成员保存；该组合边决定引用的批次上下文，但不把原 Measurement 包含进批次。
    en: TelemetryExportBatch contains MeasurementReference means that a metrics-signal batch stores a measurement reference as an ordered or grouped member; the composition edge supplies batch context for the reference without containing the original Measurement itself.
    ja: TelemetryExportBatch contains MeasurementReference は metrics 信号 batch が測定参照を順序・組付き要素として保存することを示し、参照に batch 文脈を与えますが元 Measurement 自体は包含しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 该语义事实不对所有运行实例施加统一基数。
    en: This semantic fact does not impose one universal cardinality on every runtime instance.
    ja: この意味事実はすべての実行インスタンスに一律の基数を課しません。
  inverse_reading:
    predicate: inverse_of_contains
    labels:
      zh: 反向 contains
      en: inverse contains
      ja: 逆 contains
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
