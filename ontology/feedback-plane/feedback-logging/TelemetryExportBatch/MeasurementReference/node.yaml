      kind: positive
      labels:
        zh: 指标批次成员
        en: Metrics-batch member
        ja: metrics batch 要素
      scenario_id: null
      descriptions:
        zh: "`batch/metrics-305` 包含 18 个 MeasurementReference，每个成员有唯一 reference_id 并共享批次时间窗。"
        en: "`batch/metrics-305` contains 18 MeasurementReferences, each with a unique reference_id and the batch's shared time window."
        ja: "`batch/metrics-305` は 18 MeasurementReference を含み、各要素は一意 reference_id と共有 batch 時間窓を持ちます。"
      field_values: {}
      related_node_ids:
