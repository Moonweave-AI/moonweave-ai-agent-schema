relations:
  - id: AuditLog-documents-Review
    predicate: documents
    direction: source-to-target
    relation_kind: information
    labels:
      zh: documents
      en: documents
      ja: documents
    definitions:
      zh: AuditLog documents Review 表示审计日志中的一组有序 AuditRecord 为一次 Review 提供可追溯的审查证据；该边不表示 Review 被包含在日志中，也不表示日志自动完成审查。
      en: AuditLog documents Review means that ordered AuditRecords in the audit log provide traceable evidence for one Review; the edge neither contains the Review in the log nor claims that the log performs the review automatically.
      ja: AuditLog documents Review は、監査ログ内の順序付き AuditRecord が一つの Review に追跡可能な証拠を与えることを示します。Review をログ内に包含せず、ログが自動で審査を実行するとも主張しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_documents
