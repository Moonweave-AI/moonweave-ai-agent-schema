        scenario_id: null
        descriptions:
          zh: 审计日志 `audit/run-742` 的授权决定、工具尝试与结果记录被 Review `review/742` 逐条引用，用来判断权限流程是否合规。
          en: Review `review/742` cites the authorization decision, tool attempt, and outcome records in `audit/run-742` to determine whether the permission flow complied with policy.
          ja: Review `review/742` は `audit/run-742` の認可判断、tool 試行、結果記録を項目別に引用し、権限手続の適合性を判断します。
