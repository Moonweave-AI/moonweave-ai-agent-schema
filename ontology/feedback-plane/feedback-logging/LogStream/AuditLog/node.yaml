schema: moonweave.ai/ontology-node/v1
id: AuditLog
kind: concept
status: accepted
labels:
  en: audit log
  zh: 审计日志
  ja: 監査ログ
semantics:
  short_definition:
    zh: 审计日志是按审计目的组织、可按顺序检查审计记录的专门日志流。
    en: An AuditLog is a LogStream organized for ordered inspection of audit-relevant records.
    ja: 監査ログは、監査関連記録を順序付きで検査するために編成されたログストリームです。
  definition:
    zh: 审计日志是一种 LogStream；其种差是为审计、取证或合规复核保留带主体、动作、对象、结果与时间信息的 AuditRecord，并维持记录顺序、来源和适用的完整性/保留约束。它不是单条审计记录，也不是对原始记录的摘要报告。
    en: An AuditLog is a LogStream whose differentia is preserving AuditRecords for audit, forensic, or compliance review with actor, action, object, outcome, and time context, while retaining order, provenance, and applicable integrity or retention controls. It is neither one AuditRecord nor a summary report derived from records.
    ja: 監査ログは LogStream の一種であり、主体・操作・対象・結果・時刻の文脈を持つ AuditRecord を監査、フォレンジック、またはコンプライアンス審査のために保持し、順序、来歴、適用される完全性・保持制約を維持する点で区別されます。単一の AuditRecord や記録から作る要約報告ではありません。
  why_needed:
    zh: 把审计日志建模为 LogStream 的下位概念，可以复用日志流的顺序、消费和交付语义，同时让查询明确区分“包含原始审计记录”与“从记录派生摘要”两种完全不同的事实。
    en: Modeling AuditLog below LogStream reuses ordering, consumption, and delivery semantics while letting queries distinguish containment of original audit records from a separately produced summary or report.
    ja: AuditLog を LogStream の下位に置くことで、順序・消費・配送の意味を再利用しつつ、元の監査記録の包含と、別途生成された要約・報告を問い合わせで明確に区別できます。
  includes:
    - zh: 纳入按一个稳定流标识组织、保存 AuditRecord 顺序与来源，并声明审计或合规用途的日志流。
      en: Includes a log stream with a stable stream identity that preserves AuditRecord order and provenance and declares an audit or compliance purpose.
      ja: 安定したストリーム識別子で編成され、AuditRecord の順序と来歴を保持し、監査またはコンプライアンス用途を宣言するログストリームを含みます。
  excludes:
    - zh: 排除单条 AuditRecord、由审计记录计算出的 Review，以及未保留审计用途与顺序语义的普通遥测批次。
      en: Excludes one AuditRecord, a Review computed from audit evidence, and a generic telemetry batch that carries no audit-purpose and ordering semantics.
      ja: 単一の AuditRecord、監査証拠から算出された Review、監査目的と順序意味を持たない一般テレメトリバッチを除外します。
  semantic_kind: collection
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints:
    - id: audit-log-preserves-entry-order-and-provenance
      severity: error
      expression_language: plain
      expression: an audit log preserves the order and provenance of each contained AuditRecord
      explanations:
        zh: 审计日志必须保留每条 AuditRecord 的顺序与来源。
        en: An audit log preserves the order and provenance of every contained AuditRecord.
        ja: 監査ログは包含する各 AuditRecord の順序と来歴を保持します。
      source_claims:
        - claim-audit-log-003
  required_relation_constraints: []
examples:
  - id: AuditLog-example-positive-001
    kind: positive
    labels:
      zh: 审计日志正例
      en: Positive example of audit log
      ja: 監査ログの正例
    scenario_id: null
    descriptions:
      zh: 代理运行 `run-742` 的审计日志按发生顺序包含授权决定、工具调用尝试与最终结果三条 AuditRecord，并为每条记录保留主体、时间和来源。
      en: The audit log for agent run `run-742` contains, in occurrence order, AuditRecords for an authorization decision, a tool-call attempt, and its outcome, retaining actor, time, and provenance for each entry.
      ja: エージェント実行 `run-742` の監査ログは、認可判断、ツール呼出試行、その結果の AuditRecord を発生順に含み、各項目の主体、時刻、来歴を保持します。
    field_values:
      stream_id: audit/run-742
      source_resource_ref: resource/agent-run-742
      instrumentation_scope: moonweave.audit@2.0.0
      ordering_rule: occurrence_time_then_sequence
      retention_policy_ref: retention/compliance-7y
    related_node_ids:
      - AuditLog
      - LogStream
      - AuditRecord
    related_relation_ids:
      - AuditLog-is_a-LogStream
      - AuditLog-contains-AuditRecord
    expected_result:
      zh: 验证器把该对象识别为 AuditLog，并按原顺序返回其包含的三条 AuditRecord。
      en: Validation classifies the object as AuditLog and returns its three contained AuditRecords in the preserved order.
      ja: 検証器は対象を AuditLog と分類し、包含する三つの AuditRecord を保持順で返します。
    why_valid_or_invalid:
      zh: 该对象同时满足日志流的有序集合条件与审计用途种差，而且使用 contains 表达成员关系而非错误的 derived_from。
      en: The object satisfies both the ordered-stream genus and the audit-purpose differentia, and it uses containment rather than the incorrect derived-from relation for member records.
      ja: 対象は順序付きストリームという類と監査目的という種差を満たし、構成記録には誤った derived-from ではなく包含を用います。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-audit-log-004
  - id: AuditLog-example-boundary-001
    kind: boundary
    labels:
      zh: 审计日志边界例
      en: Boundary case for audit log
      ja: 監査ログの境界例
    scenario_id: null
    descriptions:
      zh: 一条记录了“工具调用获准”的 AuditRecord 具有审计价值，但它没有流标识、成员顺序或保留范围，因此仍是 AuditRecord 而不是 AuditLog。
      en: One AuditRecord stating that a tool call was authorized is audit-relevant, but it has no stream identity, member ordering, or retention scope and therefore remains an AuditRecord rather than an AuditLog.
      ja: ツール呼出が許可されたことを示す一つの AuditRecord は監査上重要ですが、ストリーム識別子、項目順序、保持範囲を持たないため AuditLog ではありません。
    field_values: {}
    related_node_ids:
      - AuditLog
      - AuditRecord
    related_relation_ids:
      - AuditLog-contains-AuditRecord
    expected_result:
      zh: AuditRecord 保持其原有类型，验证器不得凭关系共现把它提升为 AuditLog。
      en: AuditRecord retains its own type; validation must not promote it to AuditLog from relation co-occurrence.
      ja: AuditRecord は元の型を維持し、関係の共起だけで AuditLog へ昇格してはなりません。
    why_valid_or_invalid:
      zh: 成员记录与承载这些记录的有序日志流具有不同身份条件；审计相关性本身不能把单条记录提升为集合。
      en: A member record and the ordered log stream that contains records have different identity conditions; audit relevance alone cannot promote one record into the collection.
      ja: 構成記録とそれらを含む順序付きログストリームは同一性条件が異なり、監査関連性だけで一記録を集合へ昇格できません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-audit-log-005
  - id: AuditLog-example-instance-001
    kind: instance
    labels:
      zh: 审计日志实例
      en: Audit-log instance
      ja: 監査ログのインスタンス
    scenario_id: agent-run-audit-742
    descriptions:
      zh: 实例 `audit/run-742` 保存三条按发生时间排序的 AuditRecord，并声明保留期 90 天与完整性摘要 `sha256:9f…`。
      en: Instance `audit/run-742` preserves three AuditRecords ordered by occurrence time and declares a 90-day retention period plus integrity digest `sha256:9f…`.
      ja: インスタンス `audit/run-742` は発生時刻順の三つの AuditRecord、90 日の保持期間、完全性ダイジェスト `sha256:9f…` を保持します。
    field_values:
      stream_id: audit/run-742
      retention_days: 90
      integrity_digest: sha256:9f…
    related_node_ids:
      - AuditLog
      - LogStream
      - AuditRecord
    related_relation_ids:
      - AuditLog-is_a-LogStream
      - AuditLog-contains-AuditRecord
    expected_result:
      zh: 该实例可作为审计日志查询，且三条成员记录保持原顺序。
      en: The instance is queryable as an AuditLog and its three member records retain their order.
      ja: このインスタンスは AuditLog として検索でき、三つの構成記録は元の順序を保持します。
    why_valid_or_invalid:
      zh: 它具备日志流身份、审计用途、成员记录、顺序、保留范围与完整性信息。
      en: It supplies stream identity, audit purpose, member records, ordering, retention scope, and integrity information.
      ja: ストリーム同一性、監査目的、構成記録、順序、保持範囲、完全性情報を備えます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-audit-log-006
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: AuditLog-is_a-LogStream
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: の一種である
  definitions:
    zh: AuditLog is_a LogStream 表示审计日志继承日志流的稳定身份、有序成员、消费和交付语义，并以审计用途、AuditRecord 成员、完整性和保留约束为种差。
    en: AuditLog is_a LogStream means that an audit log inherits stable stream identity, ordered membership, consumption, and delivery semantics and is differentiated by audit purpose, AuditRecord members, integrity, and retention controls.
    ja: AuditLog is_a LogStream は安定 stream 同一性、順序要素、消費・配送意味を継承し、監査目的、AuditRecord 要素、完全性、保持制約を種差とします。
  cardinality: null
