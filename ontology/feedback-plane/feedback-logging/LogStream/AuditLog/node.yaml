  - id: AuditLog-contains-AuditRecord
    predicate: part_of
    direction: target-to-source
    relation_kind: composition
    labels:
      zh: 包含
      en: contains
      ja: 含む
    definitions:
      zh: AuditLog contains AuditRecord 表示审计记录以明确顺序位置成为审计日志的成员；组合关系保留每条 AuditRecord 的独立身份、来源和时间，取代错误的 derived_from 说法。
      en: AuditLog contains AuditRecord means that an audit record becomes a member of the audit log at an explicit order position; composition preserves each AuditRecord's independent identity, provenance, and time and replaces the incorrect derived_from assertion.
      ja: AuditLog contains AuditRecord は audit record が明示順序位置で監査 log 要素になることを示し、各 AuditRecord の独立同一性、来歴、時刻を保持し誤った derived_from を置換します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 本关系不对所有运行实例施加统一基数。
      en: This relation does not impose one universal cardinality on every runtime instance.
      ja: この関係は全実行 instance に一律基数を課しません。
    inverse_reading:
      predicate: member_of
      labels:
        zh: 反向 contains
        en: inverse contains
        ja: 逆 contains
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: AuditLog-contains-AuditRecord-example-positive-001
        kind: positive
        labels:
          zh: 授权记录成员
          en: Authorization-record member
          ja: 認可記録要素
        scenario_id: null
        descriptions:
          zh: AuditRecord `audit-record/44` 以 sequence 44 加入 `audit/run-742`，记录主体、动作、对象、结果与时间。
          en: AuditRecord `audit-record/44` joins `audit/run-742` at sequence 44 and records actor, action, object, outcome, and time.
          ja: AuditRecord `audit-record/44` は sequence 44 で `audit/run-742` に入り、主体、操作、対象、結果、時刻を記録します。
