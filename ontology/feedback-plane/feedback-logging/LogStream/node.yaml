schema: moonweave.ai/ontology-node/v1
id: LogStream
kind: concept
status: accepted
labels:
  zh: 日志流
  en: log stream
  ja: ログストリーム
semantics:
  short_definition:
    zh: 日志流是按稳定流身份和顺序组织日志记录的集合。
    en: A LogStream is an ordered collection of LogRecords under a stable stream identity.
    ja: LogStream は安定したストリーム同一性の下で LogRecord を順序付けた集合です。
  definition:
    zh: 日志流是一种按共同来源、Resource、InstrumentationScope 与流标识组织 LogRecord 的有序集合；记录按声明的序列号、发生时间或观察时间追加，并可被监听、消费或导出。AuditLog 是增加审计目的、完整性和保留约束的下位日志流。
    en: A LogStream is an ordered collection of LogRecords organized by common source, Resource, InstrumentationScope, and stream identity; records are appended by declared sequence, occurrence time, or observation time and may be listened to, consumed, or exported. AuditLog is the subtype that adds audit purpose, integrity, and retention constraints.
    ja: LogStream は、共通の出典、Resource、InstrumentationScope、ストリーム識別子で LogRecord を編成する順序付き集合です。記録は宣言済み連番、発生時刻、観測時刻で追加され、監視・消費・出力できます。AuditLog は監査目的、完全性、保持制約を加える下位型です。
  why_needed:
    zh: 单条 LogRecord 不能表达连续交付、游标或保留范围；日志流层把记录级语义提升为可订阅和可消费的有序集合，并为 AuditLog 提供真正上位概念。
    en: One LogRecord cannot express continuous delivery, cursor position, or retention scope; LogStream lifts record semantics into an ordered subscribable collection and supplies the genuine genus for AuditLog.
    ja: 一つの LogRecord だけでは連続配送、カーソル位置、保持範囲を表せません。LogStream は記録意味を購読・消費可能な順序付き集合へ引き上げ、AuditLog の真の上位概念になります。
  includes:
    - zh: 纳入具有稳定 stream_id、相容的来源/检测范围以及可解释成员顺序的 LogRecord 集合。
      en: Includes a LogRecord collection with a stable stream_id, compatible provenance and instrumentation scope, and an interpretable member order.
      ja: 安定した stream_id、互換な来歴・計装範囲、解釈可能な要素順序を持つ LogRecord 集合を含みます。
  excludes:
    - zh: 排除单条 LogRecord、无稳定流身份的临时搜索结果，以及以传输请求身份为主的 TelemetryExportBatch。
      en: Excludes one LogRecord, an ad-hoc query result with no stable stream identity, and a TelemetryExportBatch whose identity is a transport request.
      ja: 単一 LogRecord、安定したストリーム識別子を持たない一時検索結果、転送要求として同一化される TelemetryExportBatch を除外します。
  semantic_kind: collection
  aliases: []
structure:
  identity_keys:
    - stream_id
  fields:
    - id: stream_id
      labels:
        zh: 日志流标识
        en: log-stream ID
        ja: ログ stream ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨追加、消费游标和保留操作稳定标识同一有序日志集合。
        en: Stably identifies the same ordered log collection across append, consumer-cursor, and retention operations.
        ja: append・consumer cursor・保持操作をまたいで同じ順序付きログ集合を安定識別します。
      allowed_values: []
      pattern: null
      example_value: stream/agent-42/stdout
      source_claims:
        - claim-log-stream-002
    - id: source_resource_ref
      labels:
        zh: 来源资源引用
        en: source-resource reference
        ja: 出典 Resource 参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用产生该流记录的同一资源语境；多资源查询结果不能借此冒充一个日志流。
        en: References the common Resource context that produced the stream's records; a multi-resource query result cannot thereby masquerade as one LogStream.
        ja: stream の record を生成した共通 Resource 文脈を参照し、複数 Resource の検索結果を一つの LogStream としません。
      allowed_values: []
      pattern: null
      example_value: resource/agent-42
      source_claims:
        - claim-log-stream-003
    - id: instrumentation_scope
      labels:
        zh: 仪表作用域
        en: instrumentation scope
        ja: InstrumentationScope
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该流中记录共有的发出作用域名称与版本。
        en: Records the emitting scope name and version shared by records in the stream.
        ja: stream 内の record が共有する emitting scope の名前と version を記録します。
      allowed_values: []
      pattern: null
      example_value: moonweave.agent.stdout@2.0.0
      source_claims:
        - claim-log-stream-004
    - id: ordering_rule
      labels:
        zh: 排序规则
        en: ordering rule
        ja: 順序規則
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明如何用发生时间、观测时间和流内序号确定成员的可重放顺序。
        en: Declares how occurrence time, observed time, and stream-local sequence determine replayable member order.
        ja: 発生時刻・観測時刻・stream 内 sequence から再現可能な member 順序を決める方法を宣言します。
      allowed_values: []
      pattern: null
      example_value: observed_timestamp_then_sequence
      source_claims:
        - claim-log-stream-005
    - id: retention_policy_ref
      labels:
        zh: 保留策略引用
        en: retention-policy reference
        ja: 保持方針参照
      datatype: concept-reference
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用规定该流成员保存期限、归档和删除条件的策略；未持久化的瞬时流可为空。
        en: References the policy governing member retention, archival, and deletion; it may be absent for an unpersisted transient stream.
        ja: member の保持期間・archive・削除条件を定める方針を参照し、未永続化の一時 stream では省略できます。
      allowed_values: []
      pattern: null
      example_value: retention/runtime-logs-30d
      source_claims:
        - claim-log-stream-006
  constraints:
    - id: log-stream-homogeneous-source-scope
      severity: error
      expression_language: plain
      expression: a LogStream preserves one stream identity and orders records from compatible source and instrumentation scope
      explanations:
        zh: 日志流保持一个流身份，并有序组织来源与检测范围相容的记录。
        en: A LogStream preserves one stream identity and orders records from compatible source and instrumentation scope.
        ja: LogStream は一つの同一性を保持し、互換な出典・計装範囲の記録を順序付けます。
      source_claims:
        - claim-log-stream-007
  required_relation_constraints: []
examples:
  - id: LogStream-example-positive-001
    kind: positive
    labels:
      zh: 按资源组织的运行日志流
      en: Resource-scoped runtime log stream
      ja: リソース単位の実行ログストリーム
    scenario_id: null
    descriptions:
      zh: "`stream/agent-42/stdout` 按 ObservedTimestamp 与单调序列号保存同一 agent resource 和 instrumentation scope 发出的 LogRecord。"
      en: "`stream/agent-42/stdout` retains LogRecords emitted by one agent resource and instrumentation scope, ordered by ObservedTimestamp and a monotonic sequence number."
      ja: "`stream/agent-42/stdout` は同一 agent resource と instrumentation scope が発行した LogRecord を ObservedTimestamp と単調連番で保持します。"
    field_values:
      stream_id: stream/agent-42/stdout
      source_resource_ref: resource/agent-42
      instrumentation_scope: moonweave.agent.stdout@2.0.0
      ordering_rule: observed_timestamp_then_sequence
      retention_policy_ref: retention/runtime-logs-30d
    related_node_ids:
      - LogStream
      - LogRecord
    related_relation_ids:
      - LogStream-contains-LogRecord
    expected_result:
      zh: 查询从给定游标返回后续记录，并保持同一流身份与成员顺序。
      en: A cursor query returns subsequent records while preserving the same stream identity and member order.
      ja: カーソル検索は同じストリーム同一性と要素順序を保って後続記録を返します。
    why_valid_or_invalid:
      zh: 稳定身份、相容来源和明确顺序同时成立，满足日志流而非临时列表的身份条件。
      en: Stable identity, compatible provenance, and explicit ordering all hold, satisfying LogStream rather than an ad-hoc list.
      ja: 安定した同一性、互換な来歴、明示的順序が揃い、一時一覧ではなく LogStream の条件を満たします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-log-stream-008
  - id: LogStream-example-boundary-001
    kind: boundary
    labels:
      zh: 临时检索结果边界
      en: Ad-hoc query-result boundary
      ja: 一時検索結果の境界
    scenario_id: null
    descriptions:
      zh: 一次跨五个服务检索得到的 200 条错误记录按相关性排序，但结果没有持久 stream_id、追加规则或游标，因此只是查询结果而不是 LogStream。
      en: A search across five services returns 200 error records ranked by relevance, but the result has no persistent stream_id, append rule, or cursor and is therefore a query result rather than a LogStream.
      ja: 五つのサービスを横断した検索結果 200 件は関連度順ですが、永続 stream_id、追加規則、カーソルがないため LogStream ではなく検索結果です。
    field_values: {}
    related_node_ids:
      - LogStream
      - LogRecord
    related_relation_ids:
      - LogStream-contains-LogRecord
    expected_result:
      zh: 结果不被赋予 LogStream 类型；其中每条对象仍可保持 LogRecord 类型。
      en: The result is not typed as LogStream, while each member may still retain its LogRecord type.
      ja: 結果全体は LogStream とされず、各要素は LogRecord 型を保持できます。
    why_valid_or_invalid:
      zh: 成员类型与集合身份分离；仅有多条日志记录和排序不能替代稳定流身份与追加语义。
      en: Member type and collection identity are separate; multiple ordered LogRecords do not substitute for stable stream identity and append semantics.
      ja: 要素型と集合同一性は別であり、複数の順序付き LogRecord だけでは安定したストリーム同一性と追加意味を満たしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-log-stream-009
  - id: LogStream-example-instance-001
    kind: instance
    labels:
      zh: 工具运行日志流实例
      en: Tool-run log-stream instance
      ja: ツール実行ログストリームのインスタンス
    scenario_id: tool-run-stream-88
    descriptions:
      zh: 实例 `stream/tool-run-88` 保存序列 1 至 37 的记录，Resource 标识工作进程 `worker-3`，当前消费游标为 29。
      en: Instance `stream/tool-run-88` contains records numbered 1 through 37, identifies worker process `worker-3` as its Resource, and has consumer cursor 29.
      ja: インスタンス `stream/tool-run-88` は連番 1〜37 の記録を保持し、Resource は worker `worker-3`、consumer cursor は 29 です。
    field_values:
      stream_id: stream/tool-run-88
      last_sequence: 37
      consumer_cursor: 29
    related_node_ids:
      - LogStream
      - LogRecord
      - LogConsumer
    related_relation_ids:
      - LogStream-contains-LogRecord
      - LogConsumer-consumes-LogStream
    expected_result:
      zh: 从游标继续消费时返回序列 30 至 37，且不会把游标写入单条 LogRecord。
      en: Resuming consumption returns sequences 30 through 37 and does not attach the cursor to any individual LogRecord.
      ja: 消費再開時は連番 30〜37 を返し、カーソルを個々の LogRecord に付与しません。
    why_valid_or_invalid:
      zh: 序列范围、来源和消费位置属于流级状态，明确了该实例与成员记录的不同身份。
      en: Sequence range, provenance, and consumption position are stream-level state, distinguishing the instance from its member records.
      ja: 連番範囲、来歴、消費位置はストリーム水準の状態であり、要素記録とは異なる同一性を示します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-log-stream-010
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: log_stream_delivered_to_event_sink
    predicate: log_stream_delivered_to_event_sink
    direction: source-to-target
    relation_kind: information
    labels:
      zh: log stream delivered to event sink
      en: log stream delivered to event sink
      ja: log stream delivered to event sink
    definitions:
      zh: LogStream delivered_to EventSink 表示日志流中一个有界范围被交付并由接收端接受；该关系描述范围级传输，不能从单个事件被接收或仅配置目标推出。
      en: LogStream delivered_to EventSink means that a bounded range of a log stream is transferred to and accepted by a sink; the range-level delivery cannot be inferred from one received event or destination configuration alone.
      ja: LogStream delivered_to EventSink は log stream の有界範囲が sink へ転送・受理されたことを示します。一 event の受信や宛先設定だけから範囲配送を推論できません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: is_target_of_log_stream_delivered_to_event_sink
      labels:
        zh: 反向：log stream delivered to event sink
        en: is target of log stream delivered to event sink
        ja: 逆方向：log stream delivered to event sink
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: log_stream_delivered_to_event_sink-example-positive-001
        kind: positive
        labels:
          zh: 游标范围交付
          en: Cursor-range delivery
          ja: cursor 範囲配送
        scenario_id: null
        descriptions:
          zh: "`stream/runtime` 的序列 100 至 149 被发送到 `sink/archive`，接收回执确认同一 stream_id 和结束游标 149。"
          en: Sequences 100 through 149 of `stream/runtime` are sent to `sink/archive`, whose receipt confirms the same stream_id and ending cursor 149.
          ja: "`stream/runtime` の連番 100〜149 を `sink/archive` へ送り、receipt が同じ stream_id と終了 cursor 149 を確認します。"
        field_values: {}
        related_node_ids:
          - LogStream
          - EventSink
        related_relation_ids:
          - log_stream_delivered_to_event_sink
        expected_result:
          zh: 建立范围级 delivered_to 边，并记录起止游标与回执。
          en: A range-level delivered_to edge is created with start cursor, end cursor, and receipt.
          ja: 開始・終了 cursor と receipt を持つ範囲級 delivered_to 辺を作ります。
        why_valid_or_invalid:
          zh: 流身份、有界范围、目标和接受证据齐备，能够重放并核对交付完整性。
          en: Stream identity, bounded range, destination, and acceptance evidence are complete, allowing replay and completeness checks.
          ja: stream 同一性、有界範囲、宛先、受理証拠が揃い、再送と完全性検査が可能です。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-log-stream-011
      - id: log_stream_delivered_to_event_sink-example-boundary-001
        kind: boundary
        labels:
          zh: 单事件接收边界
          en: Single-event receipt boundary
          ja: 単一 event 受信の境界
        scenario_id: null
        descriptions:
          zh: 接收端确认一个 TelemetryEvent，但没有 stream_id 或序列范围；只能建立 receives 事件边，不能声称整个 LogStream 已交付。
          en: The sink acknowledges one TelemetryEvent with no stream_id or sequence range; only an event-level receives edge is justified, not delivery of the whole LogStream.
          ja: sink は一 TelemetryEvent を確認しますが stream_id も連番範囲もありません。event 級 receives だけが成立し LogStream 全体配送は主張できません。
        field_values: {}
        related_node_ids:
          - LogStream
          - EventSink
        related_relation_ids:
          - log_stream_delivered_to_event_sink
        expected_result:
          zh: 保留事件接收事实，不创建 delivered_to 流关系。
          en: The event-receipt fact is retained and no stream delivered_to edge is created.
          ja: event 受信事実を保持し stream delivered_to 辺は作りません。
        why_valid_or_invalid:
          zh: 事件级接受缺少流身份和范围完整性，不能向上提升为集合交付。
          en: Event-level acceptance lacks stream identity and range completeness and cannot be promoted to collection delivery.
          ja: event 級受理には stream 同一性と範囲完全性がなく集合配送へ昇格できません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-log-stream-012
    source_claims:
      - claim-log-stream-013
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:EventSink
  - id: LogStream-contains-LogRecord
    predicate: contains
    direction: source-to-target
    relation_kind: composition
    labels:
      zh: 包含
      en: contains
      ja: 含む
    definitions:
      zh: LogStream contains LogRecord 表示日志记录以明确序列位置成为该流的成员；组合边要求成员可追溯到一个 stream_id，且不会把记录身份并入流身份。
      en: LogStream contains LogRecord means that a log record is a member of the stream at an explicit sequence position; the composition edge requires traceability to one stream_id and does not merge record identity into stream identity.
      ja: LogStream contains LogRecord は log record が明示連番位置で stream 要素になることを示し、一つの stream_id へ追跡可能で record 同一性を stream 同一性へ併合しません。
    cardinality:
      source:
        min: 1
        max: 1
      target:
        min: 0
        max: null
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: part_of
      labels:
        zh: 反向：包含
        en: part of
        ja: 逆方向：含む
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples:
      - id: LogStream-contains-LogRecord-example-positive-001
        kind: positive
        labels:
          zh: 带序列位置的成员
          en: Sequenced stream member
          ja: 連番付き stream 要素
        scenario_id: null
        descriptions:
          zh: LogRecord `record/501` 以 sequence 501 追加到 `stream/runtime`，并保留自身 record_id 与来源字段。
          en: LogRecord `record/501` is appended to `stream/runtime` at sequence 501 while retaining its own record_id and provenance fields.
          ja: LogRecord `record/501` は sequence 501 で `stream/runtime` へ追加され、独自 record_id と来歴 field を保持します。
        field_values: {}
        related_node_ids:
          - LogStream
          - LogRecord
        related_relation_ids:
          - LogStream-contains-LogRecord
        expected_result:
          zh: 查询流成员返回该记录及序列位置，单独查询仍返回同一 record_id。
          en: A stream-membership query returns the record and sequence position, while a direct query returns the same record_id.
          ja: stream 要素照会は記録と連番位置を返し、直接照会も同じ record_id を返します。
        why_valid_or_invalid:
          zh: 流身份、成员身份和顺序位置均明确，符合组合而非类型继承。
          en: Stream identity, member identity, and order position are explicit, satisfying composition rather than inheritance.
          ja: stream 同一性、要素同一性、順序位置が明示され、継承ではなく composition を満たします。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-log-stream-014
      - id: LogStream-contains-LogRecord-example-boundary-001
        kind: boundary
        labels:
          zh: 查询结果非成员边界
          en: Query-result nonmembership boundary
          ja: 検索結果の非要素境界
        scenario_id: null
        descriptions:
          zh: 搜索结果临时展示 `record/501`，但结果对象没有 stream_id 或追加位置；展示不能建立 LogStream contains。
          en: A search result temporarily displays `record/501`, but the result object has no stream_id or append position; display does not establish LogStream contains.
          ja: 検索結果が一時的に `record/501` を表示しても stream_id・追加位置がなく、表示だけでは LogStream contains は成立しません。
        field_values: {}
        related_node_ids:
          - LogStream
          - LogRecord
        related_relation_ids:
          - LogStream-contains-LogRecord
        expected_result:
          zh: 保留检索命中，不创建流成员组合边。
          en: The search hit is retained and no stream-membership composition edge is created.
          ja: 検索 hit を保持し stream 要素 composition 辺は作りません。
        why_valid_or_invalid:
          zh: 关联展示缺少稳定集合身份和成员位置，不能冒充包含事实。
          en: Associated display lacks stable collection identity and member position and cannot substitute for containment.
          ja: 関連表示には安定集合同一性・要素位置がなく包含事実の代わりになりません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-log-stream-015
    source_claims:
      - claim-log-stream-016
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:LogRecord
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-feedback-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OpenTelemetry Logs/Metrics 数据模型、OTLP 导出模式与结构化日志实践逐项核验。
