source_claims:
  - id: claim-log-stream-001
    source: eng-observe-opentelemetry-logs
    supports: LogStream uses OpenTelemetry LogRecord occurrence time, observation time, Resource, and InstrumentationScope to define compatible ordered membership. OpenTelemetry does not assert Moonweave's stream identity, cursor, or AuditLog hierarchy; those are design inference.
    locator: Logs Data Model > Log and Event Record Definition > Timestamp, ObservedTimestamp, Resource, and InstrumentationScope
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-stream-002
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry defines coherent per-record source and time fields but no durable stream identifier. LogStream.stream_id is Moonweave's collection identity for ordered append and consumption over compatible records.
    locator: Logs Data Model > Log and Event Record Definition > Timestamp, ObservedTimestamp, Resource, and InstrumentationScope
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-log-stream-003
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry Resource describes the source of a log and remains common across occurrences from that source. LogStream.source_resource_ref is Moonweave's collection-level normalization of that source context.
    locator: "Logs Data Model > Log and Event Record Definition > Field: Resource"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-log-stream-004
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry InstrumentationScope describes the scope that emitted a LogRecord and may be shared by multiple occurrences. LogStream.instrumentation_scope requires that value at the collection boundary as a Moonweave homogeneity rule.
    locator: "Logs Data Model > Log and Event Record Definition > Field: InstrumentationScope"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-log-stream-005
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry distinguishes source Timestamp from collection ObservedTimestamp and recommends a fallback when only one time can be retained. LogStream.ordering_rule is Moonweave's explicit deterministic ordering contract over those fields and a local sequence.
    locator: "Logs Data Model > Log and Event Record Definition > Field: Timestamp; Field: ObservedTimestamp"
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-log-stream-006
    source: eng-observe-opentelemetry-logs
    supports: The OpenTelemetry Logs Data Model covers data that is recorded, transferred, stored, and interpreted but does not prescribe retention periods. LogStream.retention_policy_ref is Moonweave's explicit governance link for persisted streams.
    locator: Logs Data Model > Design Notes > Requirements
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-stream-007
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry defines Resource, InstrumentationScope, Timestamp, and ObservedTimestamp on individual LogRecords; grouping compatible records into a LogStream with ordering and cursor identity is Moonweave design inference.
    locator: Logs Data Model > Log and Event Record Definition > Timestamp, ObservedTimestamp, Resource, and InstrumentationScope
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-stream-008
    source: eng-observe-opentelemetry-logs
    supports: LogStream-example-positive-001 uses OpenTelemetry LogRecord Resource, InstrumentationScope, and ObservedTimestamp fields; stable stream identity and cursor order are Moonweave design inference.
    locator: Logs Data Model > Log and Event Record Definition > ObservedTimestamp, Resource, and InstrumentationScope
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-stream-009
    source: eng-observe-opentelemetry-logs
    supports: LogStream-example-boundary-001 relies on OpenTelemetry's definition of individual LogRecords while making no claim that arbitrary query results form streams; the collection boundary is Moonweave design inference.
    locator: Logs Data Model > Log and Event Record Definition > one LogRecord field set
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-stream-010
    source: eng-observe-opentelemetry-logs
    supports: LogStream-example-instance-001 applies OpenTelemetry Resource and InstrumentationScope provenance to member records; sequence and cursor state are Moonweave design inference.
    locator: Logs Data Model > Log and Event Record Definition > Resource and InstrumentationScope
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-stream-011
    source: eng-proto-opentelemetry-otlp
    supports: log_stream_delivered_to_event_sink positive case is consistent with OTLP batch request/response and partial-success accounting; stream cursors and the range delivery edge are Moonweave design inference.
    locator: OTLP Specification 1.10.0 > Protocol Details > Export request, response, and Partial Success
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-stream-012
    source: eng-proto-opentelemetry-otlp
    supports: log_stream_delivered_to_event_sink boundary case uses OTLP partial-success granularity to distinguish accepted items from an entire logical stream range; LogStream is Moonweave design inference.
    locator: OTLP Specification 1.10.0 > Protocol Details > Partial Success response semantics
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-stream-013
    source: eng-proto-opentelemetry-otlp
    supports: log_stream_delivered_to_event_sink is informed by OTLP's bounded Export request/response and rejected-item counts. OTLP does not define LogStream cursor ranges or EventSink; the range identity, acceptance requirement, and edge direction are Moonweave design inference.
    locator: OTLP Specification 1.10.0 > Protocol Details > Export request, response, Partial Success, and retry behavior
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-stream-014
    source: eng-observe-opentelemetry-logs
    supports: LogStream-contains-LogRecord positive case uses OpenTelemetry LogRecord provenance and timing fields; stream identity and sequence membership are Moonweave design inference.
    locator: Logs Data Model > Log and Event Record Definition > Timestamp, ObservedTimestamp, Resource, and InstrumentationScope
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-stream-015
    source: eng-observe-opentelemetry-logs
    supports: LogStream-contains-LogRecord boundary case relies on OpenTelemetry's independent LogRecord identity while making no arbitrary query collection a stream; containment is Moonweave design inference.
    locator: Logs Data Model > Log and Event Record Definition > one record identity
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-log-stream-016
    source: eng-observe-opentelemetry-logs
    supports: LogStream-contains-LogRecord uses OpenTelemetry LogRecord time and provenance fields for member compatibility. OpenTelemetry does not define LogStream, stream_id, or sequence membership; the composition edge and canonical direction are Moonweave design inference.
    locator: Logs Data Model > Log and Event Record Definition > timing and provenance fields
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
