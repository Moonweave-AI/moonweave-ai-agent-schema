schema: moonweave.ai/ontology-node/v1
id: PreferenceExample
kind: concept
labels:
  zh: 偏好样本
  en: Preference Example
  ja: 選好例
semantics:
  short_definition:
    zh: 经显式配对、来源记录和转换政策准备的“优选项胜过拒选项”训练数据实体。
    en: A curated preference pair for training data in which one candidate is chosen over another under explicit provenance and transformation policy.
    ja: 明示的対化、来歴記録、変換方針を伴って、一つの候補が別の候補より選好されることを表す学習用データ実体。
  definition:
    zh: PreferenceExample 是 LearningSignal 的严格特化，表示一个已经准备好的偏好样本：在同一 prompt 或上下文中，chosen_ref 指向优选候选，rejected_ref 指向拒选候选。它保留 signal_id、learning_objective=preference、dataset_ref、source_ref 和 transformation_policy_ref，并额外说明 pairing_rationale。它映射 TRL DPOTrainer 的 prompt/chosen/rejected、InstructGPT 约 33k 比较数据、Rafailov 2023 DPO 的 (y_w, y_l) 对。它不是原始 HumanFeedback、RewardModelScore、PPO 梯度步或 DPO 训练运行本身。
    en: "PreferenceExample is a strict specialization of LearningSignal representing one prepared preference sample: within the same prompt or context, chosen_ref identifies the preferred candidate and rejected_ref the dispreferred candidate. It retains signal_id, learning_objective=preference, dataset_ref, source_ref, and transformation_policy_ref plus pairing_rationale. It maps to TRL DPOTrainer prompt/chosen/rejected, InstructGPT ~33k comparisons, and Rafailov 2023 DPO (y_w, y_l) pairs. It is not raw HumanFeedback, RewardModelScore, a PPO gradient step, or a DPO training run itself."
    ja: PreferenceExample は LearningSignal の厳格な特化で、同一 prompt 又は文脈で chosen_ref が優選候補、rejected_ref が拒選候補を指す準備済み選好例を表す。TRL DPOTrainer prompt/chosen/rejected、InstructGPT 約 33k 比較、Rafailov 2023 DPO (y_w, y_l) 対に写像する。生 HumanFeedback、RewardModelScore、PPO 勾配ステップ、DPO 訓練実行そのものではない。
  why_needed:
    zh: “用户喜欢简洁”之类的推断不能替代可审计的训练对。单独建模偏好对使团队能知道哪两个候选被比较、哪个被选择、依据何种来源形成，以及是否具备进入 DPO 或 RM 训练数据集的授权。
    en: "An inference such as the user likes concise answers cannot replace an auditable training pair. Modeling the pair separately shows which candidates were compared, which was selected, what source supports the choice, and whether it is authorized for a DPO or RM training dataset."
    ja: 「利用者は簡潔な回答を好む」といった推測は監査可能な学習対の代わりにならない。対を別にモデル化することで、比較候補、選択、来歴、DPO 又は RM 訓練データセットへの許可を示せる。
  includes:
    - zh: 信号标识、同一上下文中的 chosen 与 rejected 产物引用、数据集引用、来源引用、配对理由和转换政策引用。
      en: "Signal identifier, chosen and rejected Artifact references from one context, dataset reference, provenance reference, pairing rationale, and transformation-policy reference."
      ja: 信号識別子、同一文脈の chosen と rejected Artifact 参照、データセット参照、来歴参照、対化理由、変換方針参照。
  excludes:
    - zh: 未配对的人类评论、单一 Score、Verdict、RewardModelScore 标量和 PPO 或其他训练执行。
      en: "An unpaired human comment, single Score, Verdict, RewardModelScore scalar, or PPO and other training execution."
      ja: 対化されていない人間コメント、単一 Score、Verdict、RewardModelScore スカラー、PPO その他の学習実行。
  semantic_kind: entity
  aliases: [preference pair, chosen-rejected learning datum, PreferencePair, 偏好对训练数据]
engineering:
  explanation:
    zh: 新集成应以 TRL DPOTrainer prompt/chosen/rejected、InstructGPT 比较标注、OpenAI preference fine-tuning 数据集为可映射 API 形状，再以 PreferenceExample 保存 chosen_ref、rejected_ref、pairing_rationale 与 policy。DPO L_DPO = −E[log σ(β·(log π(y_w|x)/π_ref(y_w|x) − log π(y_l|x)/π_ref(y_l|x)))] 在 TrainingRun 中消费这些对；本节点不是 DPOTrainer 批次本身。
    en: "New integrations should treat TRL DPOTrainer prompt/chosen/rejected, InstructGPT comparison labels, and OpenAI preference fine-tuning datasets as mappable API shapes, then persist PreferenceExample with chosen_ref, rejected_ref, pairing_rationale, and policy. DPO L_DPO consumes these pairs in TrainingRun; this node is not the DPOTrainer batch itself."
    ja: TRL DPOTrainer prompt/chosen/rejected、InstructGPT 比較ラベル、OpenAI preference fine-tuning データセットを写像可能 API 形状として扱い、PreferenceExample に chosen_ref、rejected_ref、pairing_rationale、policy を保存する。DPO L_DPO は TrainingRun でこれらの対を消費する。本ノードは DPOTrainer バッチそのものではない。
  typical_input:
    - description: TRL DPOTrainer standard-format preference example.
      format: |
        {"prompt": "How do I reset my password?", "chosen": "Use the verified reset link.", "rejected": "Ignore the account policy."}
      source_claims: [claim-preference-example-dpo]
    - description: Authorized local comparison record for one support-answer prompt.
      format: |
        {
          "learning_objective": "preference",
          "chosen_ref": "Artifact:answer-104-b",
          "rejected_ref": "Artifact:answer-104-a",
          "dataset_ref": "dataset:support-preferences-v1",
          "source_ref": "SourceReference:annotator-batch-7",
          "pairing_rationale": "annotator-selected",
          "transformation_policy_ref": "policy:preference-data-v1"
        }
      source_claims: [claim-preference-example-instructgpt, claim-preference-example-design]
  typical_output:
    - description: Local PreferenceExample record preserving parent LearningSignal fields and pair-specific fields.
      format: |
        {
          "signal_id": "preference-example-104",
          "learning_objective": "preference",
          "chosen_ref": "Artifact:answer-104-b",
          "rejected_ref": "Artifact:answer-104-a",
          "dataset_ref": "dataset:support-preferences-v1",
          "source_ref": "SourceReference:annotator-batch-7",
          "pairing_rationale": "annotator-selected",
          "transformation_policy_ref": "policy:preference-data-v1"
        }
      source_claims: [claim-preference-example-design]
  reference_implementations:
    - name: InstructGPT RLHF
      url: https://arxiv.org/abs/2203.02155
      description: Ranked comparisons of model outputs for reward-model training.
    - name: Direct Preference Optimization
      url: https://arxiv.org/abs/2305.18290
      description: Chosen-rejected pairs optimized with β-weighted log-ratio loss.
    - name: Hugging Face TRL DPOTrainer
      url: https://huggingface.co/docs/trl/en/dpo_trainer
      description: prompt, chosen, and rejected fields for DPO training.
structure:
  identity_keys: [signal_id]
  fields:
    - id: signal_id
      labels: {zh: 学习信号标识, en: Learning signal identifier, ja: 学習信号識別子}
      definitions:
        zh: 继承自 LearningSignal 的 signal_id；唯一标识一条已准备的 chosen-rejected 偏好样本。
        en: The signal_id inherited from LearningSignal; uniquely identifies one prepared chosen-rejected preference example.
        ja: LearningSignal から継承した signal_id。一件の準備済み chosen-rejected 選好例を一意に識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: preference-example-104
      allowed_values: []
      source_claims: [claim-preference-example-design]
    - id: learning_objective
      labels: {zh: 学习目标, en: Learning objective, ja: 学習目的}
      definitions:
        zh: 继承自 LearningSignal；本子类固定为 preference，表示为 DPO 或 RM 训练准备的数据。
        en: Inherited from LearningSignal; fixed to preference for data prepared for DPO or RM training.
        ja: LearningSignal から継承。DPO 又は RM 訓練用データのため preference に固定。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: preference
      allowed_values: [preference]
      source_claims: [claim-preference-example-instructgpt, claim-preference-example-design]
    - id: chosen_ref
      labels: {zh: 被选候选引用, en: Chosen candidate reference, ja: 選択候補参照}
      definitions:
        zh: 指向同一比较上下文中被标为优选的具体 Artifact，对应 DPO 的 y_w 或 chosen completion。
        en: References the concrete Artifact marked preferred in the same comparison context, corresponding to DPO y_w or chosen completion.
        ja: 同一比較文脈で優選とされた Artifact を参照。DPO の y_w 又は chosen completion に対応。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Artifact:answer-104-b
      allowed_values: []
      source_claims: [claim-preference-example-dpo, claim-preference-example-design]
    - id: rejected_ref
      labels: {zh: 未选候选引用, en: Rejected candidate reference, ja: 非選択候補参照}
      definitions:
        zh: 指向与 chosen_ref 处于同一比较上下文但未被选中的具体 Artifact，对应 DPO 的 y_l 或 rejected completion。
        en: References the concrete Artifact not selected over chosen_ref in the same context, corresponding to DPO y_l or rejected completion.
        ja: chosen_ref より選ばれなかった Artifact を参照。DPO の y_l 又は rejected completion に対応。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Artifact:answer-104-a
      allowed_values: []
      source_claims: [claim-preference-example-dpo, claim-preference-example-design]
    - id: dataset_ref
      labels: {zh: 数据集引用, en: Dataset reference, ja: データセット参照}
      definitions:
        zh: 指向包含该已准备偏好对及其版本的可追溯数据集。
        en: References the traceable, versioned dataset containing this prepared preference pair.
        ja: この準備済み選好対と版を含む追跡可能なデータセットを参照する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dataset:support-preferences-v1
      allowed_values: []
      source_claims: [claim-preference-example-design]
    - id: source_ref
      labels: {zh: 来源引用, en: Provenance reference, ja: 来歴参照}
      definitions:
        zh: 指向产生或授权该比较的可追溯 SourceReference，例如 InstructGPT 标注批次或 LangSmith 比较会话。
        en: References a traceable SourceReference that produced or authorized the comparison, such as an InstructGPT labeling batch or LangSmith comparison session.
        ja: InstructGPT ラベリングバッチや LangSmith 比較セッションなど、比較を生成又は許可した SourceReference を参照する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: SourceReference:annotator-batch-7
      allowed_values: []
      source_claims: [claim-preference-example-design]
    - id: pairing_rationale
      labels: {zh: 配对理由, en: Pairing rationale, ja: 対化理由}
      definitions:
        zh: 说明 chosen_ref 如何相对 rejected_ref 被确定为优选的简短、可审计理由。
        en: A short, auditable reason explaining how chosen_ref was determined preferred over rejected_ref.
        ja: chosen_ref が rejected_ref より優選と決められた方法を説明する短い監査可能な理由。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: annotator-selected
      allowed_values: [annotator-selected, user-explicit-choice, policy-approved-derived-pair]
      source_claims: [claim-preference-example-design]
    - id: transformation_policy_ref
      labels: {zh: 转换政策引用, en: Transformation policy reference, ja: 変換方針参照}
      definitions:
        zh: 指向定义并授权清洗、去标识化、配对和写入学习数据集的版本化政策。
        en: References the versioned policy defining and authorizing cleaning, de-identification, pairing, and writing to the learning dataset.
        ja: クリーニング、非識別化、対化、学習データセットへの書込みを定義し許可する版管理方針を参照する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: policy:preference-data-v1
      allowed_values: []
      source_claims: [claim-preference-example-design]
  constraints:
    - id: preference-example-has-distinct-pair
      severity: error
      expression_language: plain
      expression: chosen_ref and rejected_ref must both resolve to Artifact records in the same comparison context and must not be equal.
      explanation:
        zh: 偏好学习至少需要两个不同候选及其共同的比较上下文。
        en: Preference learning requires two different candidates and their shared comparison context.
        ja: 選好学習には異なる二候補と共通の比較文脈が必要。
      source_claims: [claim-preference-example-instructgpt, claim-preference-example-design]
    - id: preference-example-requires-provenance-policy-and-dataset
      severity: error
      expression_language: plain
      expression: dataset_ref, source_ref, pairing_rationale, and transformation_policy_ref must be present before the pair is classified as PreferenceExample.
      explanation:
        zh: 未记录来源、配对依据、数据集和政策的比较不能被视为可训练偏好数据。
        en: A comparison lacking recorded source, pairing basis, dataset, and policy is not trainable preference data.
        ja: 来歴、対化根拠、データセット、方針が記録されていない比較は学習可能な選好データではない。
      source_claims: [claim-preference-example-design]
    - id: preference-example-excludes-reward-model-score
      severity: error
      expression_language: plain
      expression: A scalar reward-model output or generic evaluation score must not be substituted for the chosen-rejected pair; use RewardModelScore or Score as applicable.
      explanation:
        zh: 比较对、奖励模型输出和评估分数是不同数据事实，不能互相重命名。
        en: A comparison pair, reward-model output, and evaluation score are different data facts and cannot be renamed into one another.
        ja: 比較対、報酬モデル出力、評価スコアは異なるデータ事実であり相互改名不可。
      source_claims: [claim-preference-example-instructgpt, claim-preference-example-design]
  required_relations:
    - id: preference-example-is-a-learning-signal
      direction: outgoing
      predicate: is_a
      target_concept_id: LearningSignal
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每条偏好学习信号都是具有额外配对语义和约束的 LearningSignal。
        en: Each preference learning signal is a LearningSignal with additional pair semantics and constraints.
        ja: 各選好学習信号は追加の対意味論と制約を持つ LearningSignal である。
      source_claims: [claim-preference-example-design]
    - id: preference-example-is-about-artifact
      direction: outgoing
      predicate: is_about
      target_concept_id: Artifact
      cardinality: {min: 2, max: 2}
      explanations:
        zh: 每条偏好学习信号恰好涉及两个 Artifact，由 chosen_ref 与 rejected_ref 指明角色。
        en: Each preference learning signal is about exactly two Artifacts with roles assigned by chosen_ref and rejected_ref.
        ja: 各選好学習信号は chosen_ref と rejected_ref が役割を与える二つの Artifact についてのもの。
      source_claims: [claim-preference-example-instructgpt, claim-preference-example-design]
    - id: preference-example-has-provenance-source-reference
      direction: outgoing
      predicate: has_provenance
      target_concept_id: SourceReference
      cardinality: {min: 1, max: null}
      explanations:
        zh: 每条偏好学习信号至少关联一个可追溯来源。
        en: Each preference learning signal has at least one traceable source.
        ja: 各選好学習信号は少なくとも一つの追跡可能な来歴を持つ。
      source_claims: [claim-preference-example-design]
examples:
  - id: preference-example-instructgpt-comparison
    labels:
      zh: InstructGPT 偏好比较对
      en: InstructGPT preference comparison pair
      ja: InstructGPT 選好比較対
    descriptions:
      zh: signal_id=instructgpt-comparison-33152 chosen_ref=Artifact:instructgpt-chosen-completion rejected_ref=Artifact:instructgpt-rejected-completion dataset_ref=dataset:instructgpt-comparisons-33k；Ouyang 2022 约 33k 人工排序比较，用于训练 r_θ(x,y)，不是 RM 推断输出。
      en: signal_id=instructgpt-comparison-33152 maps to Ouyang 2022 ~33k human-ranked comparisons for training r_θ(x,y), not RM inference output.
      ja: Ouyang 2022 約 33k 人間順位付け比較。RM 推論出力ではない。
    example_source:
      product: InstructGPT
      url: https://arxiv.org/abs/2203.02155
      version: comparison data
    field_values:
      signal_id: instructgpt-comparison-33152
      learning_objective: preference
      chosen_ref: Artifact:instructgpt-chosen-completion
      rejected_ref: Artifact:instructgpt-rejected-completion
      dataset_ref: dataset:instructgpt-comparisons-33k
      source_ref: SourceReference:openai-comparison-labelers
      pairing_rationale: annotator-selected
      transformation_policy_ref: policy:instructgpt-rm-v1
    related_node_ids: [PreferenceExample, LearningSignal, Artifact, SourceReference]
    related_relation_ids: [preference-example-is-a-learning-signal, preference-example-is-about-artifact]
    source_claims: [claim-preference-example-instructgpt, claim-preference-example-design]
  - id: preference-example-dpo-trainer-row
    labels:
      zh: TRL DPOTrainer 偏好行
      en: TRL DPOTrainer preference row
      ja: TRL DPOTrainer 選好行
    descriptions:
      zh: signal_id=dpo-password-reset-001 prompt="How do I reset my password?" chosen=Use verified reset link rejected=Share password here；Rafailov 2023 DPO 直接在 (chosen,rejected) 对上优化，无需独立 RM。
      en: signal_id=dpo-password-reset-001 with prompt/chosen/rejected; Rafailov 2023 DPO optimizes directly on (chosen,rejected) pairs without a separate RM.
      ja: Rafailov 2023 DPO は独立 RM なしで (chosen,rejected) 対を直接最適化。
    example_source:
      product: Hugging Face TRL DPOTrainer
      url: https://huggingface.co/docs/trl/en/dpo_trainer
      version: prompt/chosen/rejected
    field_values:
      signal_id: dpo-password-reset-001
      learning_objective: preference
      chosen_ref: Artifact:password-reset-chosen
      rejected_ref: Artifact:password-reset-rejected
      dataset_ref: dataset:preference-v1
      source_ref: SourceReference:dpo-curation-batch-3
      pairing_rationale: policy-approved-derived-pair
      transformation_policy_ref: policy:dpo-pairing-v1
    related_node_ids: [PreferenceExample, LearningSignal]
    related_relation_ids: [preference-example-is-a-learning-signal]
    source_claims: [claim-preference-example-dpo, claim-preference-example-design]
  - id: preference-example-langsmith-pairwise
    labels:
      zh: LangSmith 成对比较偏好对
      en: LangSmith pairwise comparison preference pair
      ja: LangSmith ペアワイズ比較選好対
    descriptions:
      zh: signal_id=langsmith-pair-8842 chosen_ref=Artifact:answer-A rejected_ref=Artifact:answer-B pairing_rationale=user-explicit-choice；LangSmith 标注员在同一 run 上选择 A 优于 B，经 policy 清洗后进入 preference dataset。
      en: signal_id=langsmith-pair-8842 LangSmith annotator selects A over B on same run; after policy cleaning enters preference dataset.
      ja: LangSmith 注釈者が同一 run で A を B より選択。policy 清洗後 preference dataset へ。
    example_source:
      product: LangSmith
      url: https://docs.smith.langchain.com
      version: pairwise annotations
    field_values:
      signal_id: langsmith-pair-8842
      learning_objective: preference
      chosen_ref: Artifact:answer-A
      rejected_ref: Artifact:answer-B
      dataset_ref: dataset:support-preferences-v1
      source_ref: SourceReference:langsmith-session-8842
      pairing_rationale: user-explicit-choice
      transformation_policy_ref: policy:preference-data-v1
    related_node_ids: [PreferenceExample, HumanFeedback, LearningSignal]
    related_relation_ids: []
    source_claims: [claim-preference-example-design]
  - id: preference-example-counterexample-unpaired-comment
    labels:
      zh: 未配对的“更简洁些”评论
      en: Unpaired make-it-more-concise comment
      ja: 対化されていない「もっと簡潔にして」コメント
    descriptions:
      zh: LangSmith correction content="Make it more concise" 无 rejected_ref；不能登记为 PreferenceExample，因为 DPO 需要同一 prompt 下的 chosen/rejected 对。
      en: LangSmith correction content="Make it more concise" with no rejected_ref; cannot register as PreferenceExample because DPO requires chosen/rejected pairs under the same prompt.
      ja: rejected_ref なし。DPO には chosen/rejected 対が必要なため PreferenceExample 不可。
    example_source:
      product: LangSmith
      url: https://docs.smith.langchain.com
      version: correction vs preference pair
    field_values:
      signal_id: null
      learning_objective: null
      chosen_ref: null
      rejected_ref: null
      dataset_ref: null
      source_ref: null
      pairing_rationale: null
      transformation_policy_ref: null
    related_node_ids: [HumanFeedback, PreferenceExample]
    related_relation_ids: []
    source_claims: [claim-preference-example-design]
  - id: preference-example-boundary-score-versus-pair
    labels:
      zh: 单一帮助度分数与偏好对的边界
      en: Boundary between one helpfulness score and a preference pair
      ja: 単一の有用性スコアと選好対の境界
    descriptions:
      zh: OpenAI score_model grader helpfulness=4 是 Score，不是 PreferenceExample；不能把 1–5 分自动改写为 chosen/rejected，除非有明确 pairing_rationale 与 policy 支持的比较对。
      en: OpenAI score_model grader helpfulness=4 is a Score, not PreferenceExample; 1–5 scores cannot auto-convert to chosen/rejected without explicit pairing_rationale and policy-backed comparison pair.
      ja: helpfulness=4 は Score。明示的 pairing_rationale と policy なしに chosen/rejected へ自動変換不可。
    example_source:
      product: OpenAI Graders
      url: https://platform.openai.com/docs/guides/evals
      version: score_model grader
    field_values:
      signal_id: null
      learning_objective: null
      chosen_ref: null
      rejected_ref: null
      dataset_ref: null
      source_ref: null
      pairing_rationale: null
      transformation_policy_ref: null
    related_node_ids: [Score, PreferenceExample, RewardModelScore]
    related_relation_ids: []
    source_claims: [claim-preference-example-instructgpt, claim-preference-example-design]
parent_relation:
  id: PreferenceExample-is-a-LearningSignal
  predicate: is_a
  target: concept:LearningSignal
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
