schema: moonweave.ai/ontology-node/v1
id: PreferenceExample
kind: concept
status: accepted
labels:
  zh: 偏好样本
  en: Preference Example
  ja: 選好例
semantics:
  short_definition:
    zh: 经显式配对、来源记录和转换政策准备的“优选项胜过拒选项”训练数据实体。
    en: A curated preference pair for training data in which one candidate is chosen over another under explicit provenance and transformation policy.
    ja: 明示的対化、来歴記録、変換方針を伴って、一つの候補が別の候補より選好されることを表す学習用データ実体。
  definition:
    zh: PreferenceExample 是 LearningSignal 的严格特化，表示一个已经准备好的偏好样本：在同一任务或上下文中，chosen_ref 指向优选候选，rejected_ref 指向拒选候选。它保留 LearningSignal 的 signal_id、learning_objective=preference、dataset_ref、source_ref 和 transformation_policy_ref，并额外说明配对理由。它不是原始 HumanFeedback、单个评分、用户行为画像、奖励模型输出、RL 奖励或实际训练活动；人类输入只有在明确清洗、配对并记录数据使用政策后才可形成该样本。
    en: >-
      PreferenceExample is a strict specialization of LearningSignal that represents one prepared
      preference example: within the same task or context, chosen_ref identifies the preferred
      candidate and rejected_ref identifies the dispreferred candidate. It retains LearningSignal's
      signal_id, learning_objective=preference, dataset_ref, source_ref, and
      transformation_policy_ref, and additionally records why the pair was made. It is not raw
      HumanFeedback, one score, a user-behavior profile, reward-model output, RL reward, or an
      actual training activity; human input becomes this example only after explicit cleaning,
      pairing, and data-use-policy recording.
    ja: PreferenceExample は LearningSignal の厳格な特化であり、同じタスク又は文脈で chosen_ref が優選候補、rejected_ref が拒選候補を指す、一件の準備済み選好例を表す。LearningSignal の signal_id、learning_objective=preference、dataset_ref、source_ref、transformation_policy_ref を保持し、さらに対化理由を記録する。これは生の HumanFeedback、単一のスコア、利用者行動プロファイル、報酬モデル出力、RL 報酬、又は実際の学習活動ではない。人間入力は、明示的なクリーニング、対化、データ利用方針の記録を経た場合にのみ、この例となる。
  why_needed:
    zh: “用户喜欢简洁”之类的推断不能替代可审计的训练对。单独建模偏好对使团队能知道哪两个候选被比较、哪个被选择、依据何种来源形成，以及是否具备进入偏好学习数据集的授权，而不会把原始反馈或评估分数悄然送入训练。
    en: An inference such as “the user likes concise answers” cannot replace an auditable training pair. Modeling the pair separately shows which candidates were compared, which was selected, what source supports the choice, and whether it is authorized for a preference-learning dataset—without silently sending raw feedback or an evaluation score into training.
    ja: 「利用者は簡潔な回答を好む」といった推測は、監査可能な学習対の代わりにはならない。対を別にモデル化することで、比較された候補、選ばれた候補、選択を裏付ける来歴、選好学習データセットへの利用許可を示し、生のフィードバックや評価スコアを密かに学習へ送らないようにする。
  includes:
    - zh: 信号标识、同一上下文中的 chosen 与 rejected 产物引用、数据集引用、来源引用、配对理由和转换政策引用。
      en: Signal identifier, chosen and rejected Artifact references from one context, dataset reference, provenance reference, pairing rationale, and transformation-policy reference.
      ja: 信号識別子、同一文脈の chosen と rejected の Artifact 参照、データセット参照、来歴参照、対化理由、変換方針参照。
  excludes:
    - zh: 未配对的人类评论、单一 Evaluation Metric 或 Score、通过或失败 Verdict、纯粹推测的用户偏好、奖励模型标量和 PPO 或其他训练执行。
      en: An unpaired human comment, a single Evaluation Metric or Score, a pass-fail Verdict, a merely inferred user preference, reward-model scalar, or PPO and other training execution.
      ja: 対化されていない人間コメント、単一の Evaluation Metric 又は Score、合否 Verdict、推測だけの利用者選好、報酬モデルのスカラー、PPO その他の学習実行。
  semantic_kind: entity
  aliases:
    - preference pair
    - chosen-rejected learning datum
    - 偏好对训练数据
engineering:
  explanation:
    zh: InstructGPT 使用同一提示下的输出比较来训练奖励模型；比较数据、奖励模型训练和 PPO 是不同阶段。TRL DPOTrainer 的标准样本字段是 prompt、chosen 与 rejected。本节点将已经授权、清洗和配对的记录保存为本体局部数据实体，或以 dataset_ref 指向 JSONL/数据集记录；它不是 DPOTrainer 的训练批次，也不能把点击、编辑行为或 1–5 分的 Score 自动改写为 chosen/rejected 偏好样本。
    en: InstructGPT uses comparisons between outputs for the same prompt to train a reward model, with comparison data, reward-model training, and PPO in distinct stages. TRL DPOTrainer's standard example uses prompt, chosen, and rejected fields. This node retains an authorized, cleaned, paired record as a local ontology data entity or points to its JSONL/dataset record with dataset_ref; it is not a DPOTrainer training batch and must not automatically turn a click, edit behavior, or 1–5 Score into a chosen-rejected preference example.
    ja: InstructGPT は同じプロンプトに対する出力比較を報酬モデル学習に用い、比較データ、報酬モデル学習、PPO を別段階として扱う。TRL DPOTrainer の標準例は prompt、chosen、rejected フィールドを用いる。本ノードは、許可、クリーニング、対化済みの記録をローカル本体データ実体として保持するか、dataset_ref で JSONL 又はデータセット記録を指す。これは DPOTrainer の訓練バッチではなく、クリック、編集行動、又は 1–5 の Score を自動的に chosen-rejected 選好例へ変換してはならない。
  typical_input:
    - description: DPOTrainer standard-format preference example.
      format: |
        {"prompt":"How do I reset my password?","chosen":"Use the verified reset link.","rejected":"Ignore the account policy."}
      source_claims:
        - claim-preference-example-dpo
    - description: Authorized local comparison record for one support-answer prompt.
      format: |
        {"learning_objective":"preference","chosen_ref":"Artifact:answer-104-b","rejected_ref":"Artifact:answer-104-a","dataset_ref":"dataset:support-preferences-v1","source_ref":"SourceReference:annotator-batch-7","pairing_rationale":"annotator-selected-b","transformation_policy_ref":"policy:preference-data-v1"}
      source_claims:
        - claim-preference-example-instructgpt
        - claim-preference-example-design
  typical_output:
    - description: Local PreferenceExample record preserving the parent LearningSignal fields and pair-specific fields.
      format: |
        {"signal_id":"preference-example-104","learning_objective":"preference","chosen_ref":"Artifact:answer-104-b","rejected_ref":"Artifact:answer-104-a","dataset_ref":"dataset:support-preferences-v1","source_ref":"SourceReference:annotator-batch-7","pairing_rationale":"annotator-selected","transformation_policy_ref":"policy:preference-data-v1"}
      source_claims:
        - claim-preference-example-design
  reference_implementations:
    - name: Training language models to follow instructions with human feedback
      url: https://arxiv.org/abs/2203.02155
      description: Describes ranked comparisons of model outputs as distinct data used for reward-model training.
    - name: "PROV-O: The PROV Ontology"
      url: https://www.w3.org/TR/prov-o/
      description: Provides a standard vocabulary for expressing entities and provenance relationships.
    - name: Hugging Face TRL DPOTrainer
      url: https://huggingface.co/docs/trl/en/dpo_trainer
      description: Documents prompt, chosen, and rejected fields for a preference example supplied to DPO training.
structure:
  identity_keys:
    - signal_id
  fields:
    - id: signal_id
      labels:
        zh: 学习信号标识
        en: Learning signal identifier
        ja: 学習信号識別子
      definitions:
        zh: 继承自 LearningSignal 的 signal_id；此处唯一标识一条已准备的 chosen-rejected 偏好样本，而不是使用平行的 preference_example_id。
        en: The signal_id inherited from LearningSignal. Here it uniquely identifies one prepared chosen-rejected preference example rather than using a parallel preference_example_id.
        ja: LearningSignal から継承した signal_id。ここでは並行する preference_example_id を使わず、一件の準備済み chosen-rejected 選好例を一意に識別する。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: preference-example-104
      allowed_values: []
      source_claims:
        - claim-preference-example-design
    - id: learning_objective
      labels:
        zh: 学习目标
        en: Learning objective
        ja: 学習目的
      definitions:
        zh: 继承自 LearningSignal 的 learning_objective；本子类固定为 preference，表示该对是为偏好学习或奖励模型训练准备的数据，而不是训练活动名称。
        en: The learning_objective inherited from LearningSignal. This subtype fixes it to preference, meaning that the pair is prepared data for preference learning or reward-model training rather than a training-activity name.
        ja: LearningSignal から継承した learning_objective。この下位型では preference に固定し、対が選好学習又は報酬モデル訓練用の準備済みデータであり、訓練活動名ではないことを示す。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: preference
      allowed_values: [preference]
      source_claims:
        - claim-preference-example-instructgpt
        - claim-preference-example-design
    - id: chosen_ref
      labels:
        zh: 被选候选引用
        en: Chosen candidate reference
        ja: 選択候補参照
      definitions:
        zh: 指向同一比较上下文中被标为优选的具体 Artifact，而不是抽象偏好标签。
        en: References the concrete Artifact marked preferred in the same comparison context, rather than an abstract preference label.
        ja: 抽象的な選好ラベルではなく、同じ比較文脈で優選とされた具体的な Artifact を参照する。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Artifact:answer-104-b
      allowed_values: []
      source_claims:
        - claim-preference-example-instructgpt
        - claim-preference-example-design
    - id: rejected_ref
      labels:
        zh: 未选候选引用
        en: Rejected candidate reference
        ja: 非選択候補参照
      definitions:
        zh: 指向与 chosen_ref 处于同一比较上下文但未被选中的具体 Artifact。
        en: References the concrete Artifact in the same comparison context that was not selected over chosen_ref.
        ja: chosen_ref と同じ比較文脈にあり、chosen_ref より選ばれなかった具体的な Artifact を参照する。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Artifact:answer-104-a
      allowed_values: []
      source_claims:
        - claim-preference-example-instructgpt
        - claim-preference-example-design
    - id: dataset_ref
      labels:
        zh: 数据集引用
        en: Dataset reference
        ja: データセット参照
      definitions:
        zh: 指向包含该已准备偏好对及其版本的可追溯数据集。
        en: References the traceable, versioned dataset containing this prepared preference pair.
        ja: この準備済み選好対とその版を含む、追跡可能なデータセットを参照する。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: dataset:support-preferences-v1
      allowed_values: []
      source_claims:
        - claim-preference-example-design
    - id: source_ref
      labels:
        zh: 来源引用
        en: Provenance reference
        ja: 来歴参照
      definitions:
        zh: 指向产生或授权该比较的可追溯 SourceReference，例如已记录同意的标注批次；它不能是匿名文本或未记录的点击。
        en: References a traceable SourceReference that produced or authorized the comparison, such as a consent-recorded annotation batch; it cannot be anonymous text or an unrecorded click.
        ja: 同意が記録されたアノテーションバッチなど、比較を生成又は許可した追跡可能な SourceReference を参照する。匿名テキスト又は記録されていないクリックではならない。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: null
      pattern: null
      example_value: SourceReference:annotator-batch-7
      allowed_values: []
      source_claims:
        - claim-preference-example-prov
        - claim-preference-example-design
    - id: pairing_rationale
      labels:
        zh: 配对理由
        en: Pairing rationale
        ja: 対化理由
      definitions:
        zh: 说明 chosen_ref 如何相对 rejected_ref 被确定为优选的简短、可审计理由，不是泛化的人格推断。
        en: A short, auditable reason explaining how chosen_ref was determined preferred over rejected_ref, not a generalized personality inference.
        ja: chosen_ref が rejected_ref より優選と決められた方法を説明する短い監査可能な理由であり、一般化された人格推論ではない。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: annotator-selected-b
      allowed_values:
        - annotator-selected
        - user-explicit-choice
        - policy-approved-derived-pair
      source_claims:
        - claim-preference-example-design
    - id: transformation_policy_ref
      labels:
        zh: 转换政策引用
        en: Transformation policy reference
        ja: 変換方針参照
      definitions:
        zh: 指向定义并授权清洗、去标识化、配对和写入学习数据集的版本化政策。
        en: References the versioned policy defining and authorizing cleaning, de-identification, pairing, and writing to the learning dataset.
        ja: クリーニング、非識別化、対化、学習データセットへの書込みを定義し許可する、版管理された方針を参照する。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: policy:preference-data-v1
      allowed_values: []
      source_claims:
        - claim-preference-example-design
  constraints:
    - id: preference-example-has-distinct-pair
      severity: error
      expression_language: plain
      expression: chosen_ref and rejected_ref must both resolve to Artifact records in the same comparison context and must not be equal.
      explanation:
        zh: 偏好学习至少需要两个不同候选及其共同的比较上下文；一个候选不能同时是被选和未选项。
        en: Preference learning requires two different candidates and their shared comparison context; one candidate cannot be both chosen and rejected.
        ja: 選好学習には異なる二候補と共通の比較文脈が必要であり、一候補を chosen と rejected の両方にはできない。
      source_claims:
        - claim-preference-example-instructgpt
        - claim-preference-example-design
    - id: preference-example-requires-provenance-policy-and-dataset
      severity: error
      expression_language: plain
      expression: dataset_ref, source_ref, pairing_rationale, and transformation_policy_ref must be present before the pair is classified as PreferenceExample.
      explanation:
        zh: 未记录来源、配对依据、数据集和政策的比较只能保留为反馈或候选证据，不能被视为可训练偏好数据。
        en: A comparison lacking recorded source, pairing basis, dataset, and policy may remain feedback or candidate evidence but is not trainable preference data.
        ja: 来歴、対化根拠、データセット、方針が記録されていない比較は、フィードバック又は候補証拠として保持できても、学習可能な選好データではない。
      source_claims:
        - claim-preference-example-prov
        - claim-preference-example-design
    - id: preference-example-excludes-reward-model-score
      severity: error
      expression_language: plain
      expression: A scalar reward-model output or generic evaluation score must not be substituted for the chosen-rejected pair; use RewardModelScore or Score as applicable.
      explanation:
        zh: 比较对、奖励模型输出和评估分数是不同数据事实，不能因为都与“质量”有关而互相重命名。
        en: A comparison pair, reward-model output, and evaluation score are different data facts and cannot be renamed into one another merely because each concerns quality.
        ja: 比較対、報酬モデル出力、評価スコアは異なるデータ事実であり、いずれも品質に関係するという理由だけで相互に改名してはならない。
      source_claims:
        - claim-preference-example-instructgpt
        - claim-preference-example-design
  required_relations:
    - id: preference-example-is-a-learning-signal
      direction: outgoing
      predicate: is_a
      target_concept_id: LearningSignal
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每条偏好学习信号都是具有额外配对语义和约束的 LearningSignal。
        en: Each preference learning signal is a LearningSignal with additional pair semantics and constraints.
        ja: 各選好学習信号は、追加の対意味論と制約を持つ LearningSignal である。
      source_claims:
        - claim-preference-example-design
    - id: preference-example-is-about-artifact
      direction: outgoing
      predicate: is_about
      target_concept_id: Artifact
      cardinality:
        min: 2
        max: 2
      explanations:
        zh: 每条偏好学习信号恰好涉及两个 Artifact，并由 chosen_ref 与 rejected_ref 指明二者各自角色。
        en: Each preference learning signal is about exactly two Artifacts, with chosen_ref and rejected_ref assigning their respective roles.
        ja: 各選好学習信号はちょうど二つの Artifact についてのものであり、chosen_ref と rejected_ref がそれぞれの役割を与える。
      source_claims:
        - claim-preference-example-instructgpt
        - claim-preference-example-design
    - id: preference-example-has-provenance-source-reference
      direction: outgoing
      predicate: has_provenance
      target_concept_id: SourceReference
      cardinality:
        min: 1
        max: null
      explanations:
        zh: 每条偏好学习信号至少关联一个可追溯来源，说明该比较从何而来或依据何种授权。
        en: Each preference learning signal has at least one traceable source explaining where the comparison came from or what authorized it.
        ja: 各選好学習信号は、比較の由来又は許可根拠を説明する少なくとも一つの追跡可能な来歴を持つ。
      source_claims:
        - claim-preference-example-prov
        - claim-preference-example-design
examples:
  - id: preference-example-positive-annotated-pair

    labels:
      zh: InstructGPT 偏好比较对
      en: InstructGPT preference comparison pair
      ja: InstructGPT 選好比較対

    descriptions:
      zh: "InstructGPT (Ouyang et al., 2022) RLHF: SFT -> human-ranked RM r_theta(x,y) -> PPO; ~13k demos + 33k comparisons; PreferenceExample maps supervised/preference data-prep boundary."
      en: "InstructGPT (Ouyang et al., 2022) RLHF: SFT -> human-ranked RM r_theta(x,y) -> PPO; ~13k demos + 33k comparisons; PreferenceExample maps supervised/preference data-prep boundary."
      ja: "InstructGPT SFT->RM->PPO; PreferenceExample data prep boundary."
    field_values:
      signal_id: instructgpt-comparison-33152
      learning_objective: preference
      chosen_ref: Artifact:instructgpt-chosen-completion
      rejected_ref: Artifact:instructgpt-rejected-completion
      dataset_ref: dataset:instructgpt-comparisons-33k
      source_ref: SourceReference:openai-comparison-labelers
      pairing_rationale: annotator-selected
      transformation_policy_ref: policy:instructgpt-rm-v1
    related_node_ids:
      - PreferenceExample
      - LearningSignal
      - Artifact
      - SourceReference
    related_relation_ids:
      - preference-example-is-a-learning-signal
      - preference-example-is-about-artifact
      - preference-example-has-provenance-source-reference

    source_claims:
      - claim-preference-example-instructgpt
      - claim-preference-example-design
  - id: preference-example-counterexample-unpaired-comment

    labels:
      zh: 未配对的“更简洁些”评论
      en: Unpaired “make it more concise” comment
      ja: 対化されていない「もっと簡潔にして」コメント

    descriptions:
      zh: "compile() without metric/trainset cannot serve as DSPy-style PreferenceExample ChangeProposal."
      en: "compile() without metric/trainset cannot serve as DSPy-style PreferenceExample ChangeProposal."
      ja: "Missing metric/trainset rejects DSPy-style PreferenceExample."
    field_values:
      signal_id: null
      learning_objective: null
      chosen_ref: null
      rejected_ref: null
      dataset_ref: null
      source_ref: null
      pairing_rationale: null
      transformation_policy_ref: null
    related_node_ids:
      - HumanFeedback
      - PreferenceExample
    related_relation_ids: []

    source_claims:
      - claim-preference-example-design
  - id: preference-example-boundary-score-versus-pair

    labels:
      zh: 单一帮助度分数与偏好对的边界
      en: Boundary between one helpfulness score and a preference pair
      ja: 単一の有用性スコアと選好対の境界

    descriptions:
      zh: "DPO requires learning_objective=preference; cannot auto-convert 1-5 Score to chosen/rejected for PreferenceExample."
      en: "DPO requires learning_objective=preference; cannot auto-convert 1-5 Score to chosen/rejected for PreferenceExample."
      ja: "DPO preference objective required."
    field_values:
      signal_id: null
      learning_objective: null
      chosen_ref: null
      rejected_ref: null
      dataset_ref: null
      source_ref: null
      pairing_rationale: null
      transformation_policy_ref: null
    related_node_ids:
      - Score
      - PreferenceExample
      - Artifact
    related_relation_ids: []

    source_claims:
      - claim-preference-example-instructgpt
      - claim-preference-example-design
  - id: preference-example-instance-104

    labels:
      zh: 具体偏好样本 preference-example-104
      en: Concrete preference example preference-example-104
      ja: 具体的な選好例 preference-example-104

    descriptions:
      zh: "DSPy instance: compiled demos=4->proposal_id=prompt-opt-v3->PreferenceExample ChangeProposal."
      en: "DSPy instance: compiled demos=4->proposal_id=prompt-opt-v3->PreferenceExample ChangeProposal."
      ja: "DSPy instance maps to PreferenceExample ChangeProposal."
    field_values:
      signal_id: preference-example-104
      learning_objective: preference
      chosen_ref: Artifact:answer-104-b
      rejected_ref: Artifact:answer-104-a
      dataset_ref: dataset:support-preferences-v1
      source_ref: SourceReference:annotator-batch-7
      pairing_rationale: annotator-selected
      transformation_policy_ref: policy:preference-data-v1
    related_node_ids:
      - PreferenceExample
      - LearningSignal
      - Artifact
      - SourceReference
    related_relation_ids:
