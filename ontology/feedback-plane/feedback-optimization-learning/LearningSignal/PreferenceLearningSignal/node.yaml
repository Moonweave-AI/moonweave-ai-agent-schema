schema: moonweave.ai/ontology-node/v1
id: PreferenceLearningSignal
kind: concept
status: accepted
labels:
  zh: 偏好学习信号
  en: preference learning signal
  ja: 選好学習信号
semantics:
  short_definition:
    zh: 偏好学习信号是对两个或多个候选输出作相对排序的学习信号。
    en: A preference learning signal is a LearningSignal that ranks two or more candidate outputs relatively.
    ja: 選好学習信号は複数候補出力を相対順位付けする LearningSignal です。
  definition:
    zh: 偏好学习信号是 LearningSignal 的子类；其身份由候选集合、共同上下文、偏好顺序、判断者和判定理由确定，不等同于单候选绝对 Reward。
    en: A preference learning signal is a LearningSignal subtype identified by candidate set, shared context, preference order, judge, and rationale; it is not an absolute Reward for one candidate.
    ja: 選好学習信号は候補集合、共通文脈、選好順序、判断者、理由で同一性が決まる LearningSignal 下位型で、単一候補の絶対 Reward ではありません。
  why_needed:
    zh: 明确共同上下文和候选对，才能防止把不同任务的输出错误比较并保留偏好出处。
    en: Explicit shared context and candidate set prevent comparisons across different tasks and preserve preference provenance.
    ja: 共通文脈と候補集合を明示すると異なるタスク出力の誤比較を防ぎ選好出所を保てます。
  includes:
    - zh: 包括人类 A/B 选择、模型裁判的成对偏好和多候选排序。
      en: Includes human A/B choices, model-judge pairwise preferences, and rankings over multiple candidates.
      ja: 人間 A/B 選択、モデル判定の対選好、複数候補順位を含みます。
  excludes:
    - zh: 不包括单个结果的绝对分数或无共同上下文的两个 Feedback。
      en: Excludes an absolute score for one result and two Feedback records without shared context.
      ja: 単一結果の絶対スコアと共通文脈のない二 Feedback は含みません。
  semantic_kind: information
  aliases: []
