schema: moonweave.ai/ontology-node/v1
id: RewardLearningSignal
kind: concept
status: accepted
labels:
  zh: 奖励学习信号
  en: reward learning signal
  ja: 報酬学習信号
semantics:
  short_definition:
    zh: 奖励学习信号是把一次轨迹或决策映射为标量或向量奖励的学习信号。
    en: A reward learning signal maps a trajectory or decision to a scalar or vector reward.
    ja: 報酬学習信号は軌跡または判断をスカラー・ベクトル報酬へ写像する LearningSignal です。
  definition:
    zh: 奖励学习信号是 LearningSignal 的子类；其身份由被归因轨迹或决策、奖励函数版本、分量值、时间范围和信用分配方法确定，不等同于原始业务 Measurement。
    en: A reward learning signal is a LearningSignal subtype identified by credited trajectory or decision, reward-function version, component values, time scope, and credit-assignment method; it is not a raw business Measurement.
    ja: 報酬学習信号は帰属軌跡または判断、報酬関数版、成分値、時間範囲、信用割当法で同一性が決まる LearningSignal 下位型で、生の業務 Measurement ではありません。
  why_needed:
    zh: 奖励函数版本和信用对象决定信号含义，缺失二者会让优化结果无法解释或复现。
    en: Reward-function version and credited subject determine meaning; without them optimization cannot be explained or reproduced.
    ja: 報酬関数版と帰属対象が意味を決め、欠けると最適化を説明・再現できません。
  includes:
    - zh: 包括任务结果奖励、效率惩罚、安全惩罚及它们的加权向量。
      en: Includes task-outcome rewards, efficiency penalties, safety penalties, and their weighted vectors.
      ja: タスク結果報酬、効率罰、安全罰、その重み付きベクトルを含みます。
  excludes:
    - zh: 不包括原始成本 Measurement 或没有奖励函数版本的任意数字。
      en: Excludes a raw cost Measurement and an arbitrary number without reward-function version.
      ja: 生費用 Measurement と報酬関数版のない任意数値は含みません。
  semantic_kind: information
  aliases: []
