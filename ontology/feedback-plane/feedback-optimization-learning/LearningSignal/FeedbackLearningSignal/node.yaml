schema: moonweave.ai/ontology-node/v1
id: FeedbackLearningSignal
kind: concept
status: accepted
labels:
  zh: 反馈派生学习信号
  en: feedback-derived learning signal
  ja: フィードバック由来学習信号
semantics:
  short_definition:
    zh: 反馈派生学习信号是从明确反馈内容和其证据链提炼的学习信号。
    en: A feedback-derived learning signal is a LearningSignal distilled from explicit feedback and its evidence chain.
    ja: フィードバック由来学習信号は明示 Feedback と証拠連鎖から抽出した LearningSignal です。
  definition:
    zh: 反馈派生学习信号是 LearningSignal 的子类；除通用信号身份外，它必须引用 Feedback、对应 ReviewFinding 及提炼步骤，区别于纯奖励数值或成对偏好。
    en: A feedback-derived learning signal is a LearningSignal subtype that additionally references the Feedback, corresponding ReviewFinding, and extraction step, unlike a bare reward value or pairwise preference.
    ja: フィードバック由来学習信号は LearningSignal 下位型で、Feedback、対応 ReviewFinding、抽出手順を追加で参照し、単純報酬値や対選好と異なります。
  why_needed:
    zh: 该子类使自然语言批评到机器可用更新证据的转换可重放和人工复核。
    en: The subtype makes conversion from natural-language critique to machine-usable update evidence replayable and reviewable.
    ja: 自然言語批評から機械利用可能な更新証拠への変換を再生・人手審査可能にします。
  includes:
    - zh: 包括从审查意见中提取的错误模式、应保留行为和下一轮策略提示。
      en: Includes error patterns, behavior to preserve, and next-trial guidance extracted from review feedback.
      ja: 審査意見から抽出した誤りパターン、保持行動、次試行指針を含みます。
  excludes:
    - zh: 不包括只有标量值的 RewardLearningSignal 或只记录 A 胜过 B 的 PreferenceLearningSignal。
      en: Excludes a scalar-only RewardLearningSignal and a PreferenceLearningSignal that only states A is preferred to B.
      ja: スカラーのみの RewardLearningSignal と A が B より好ましいだけの PreferenceLearningSignal は含みません。
  semantic_kind: information
  aliases: []
