schema: moonweave.ai/ontology-node/v1
id: LearningSignal
kind: concept
status: review
labels:
  zh: 学习信号
  en: learning signal
  ja: 学習信号
semantics:
  short_definition:
    zh: 学习信号是从结果、反馈或偏好中提炼出的可归因更新证据。
    en: A learning signal is attributable update evidence distilled from outcomes, feedback, or preferences.
    ja: 学習信号は結果、フィードバック、選好から抽出した帰属可能な更新証拠です。
  definition:
    zh: 学习信号是一种信息记录；其身份由来源证据、被指派对象、信号类型、方向或值、生成方法和适用目标版本共同确定，它支持 ChangeProposal 但不直接更新记忆、路由或模型。
    en: A learning signal is an information record identified by source evidence, credited subject, signal type, direction or value, derivation method, and applicable target version; it supports a ChangeProposal but does not directly update memory, routing, or a model.
    ja: 学習信号は出所証拠、帰属対象、信号型、方向または値、導出方法、適用対象版で同一性が決まる情報記録で、ChangeProposal を支持しますが記憶、ルーティング、モデルを直接更新しません。
  why_needed:
    zh: 把原始反馈转为有出处的学习信号，可审计信用分配，并阻止一句意见直接改写系统。
    en: Turning raw feedback into attributable learning signals makes credit assignment auditable and prevents one comment from directly rewriting the system.
    ja: 生フィードバックを帰属可能な学習信号へ変換すると信用割当を監査でき、一つの意見が直接システムを書き換えることを防げます。
  includes:
    - zh: 包括奖励、成对偏好、从批评提取的方向性信号和失败轨迹的归因信号。
      en: Includes rewards, pairwise preferences, directional signals extracted from critique, and credit signals from failed trajectories.
      ja: 報酬、対選好、批評から抽出した方向信号、失敗軌跡の帰属信号を含みます。
  excludes:
    - zh: 不包括原始 Feedback 本身、部署变更的 ChangeProposal 或实际 CorrectionActivity。
      en: Excludes raw Feedback itself, a deployment ChangeProposal, and the actual CorrectionActivity.
      ja: 生 Feedback、配備 ChangeProposal、実際の CorrectionActivity は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - learning_signal_id
  fields:
    - id: learning_signal_id
      labels:
        zh: 学习信号标识
        en: learning-signal ID
        ja: learning signal ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一条可被引用、聚合和追溯的派生学习信号。
        en: Stably identifies one derived learning signal that can be referenced, aggregated, and traced.
        ja: 参照・集約・追跡可能な一つの派生 learning signal を安定識別します。
      allowed_values: []
      pattern: null
      example_value: learning-signal/ls-31
      source_claims:
        - claim-learning-signal-002
    - id: signal_type
      labels:
        zh: 信号类型
        en: signal type
        ja: signal 種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 区分反馈派生、偏好、标量或向量奖励等学习语义。
        en: Distinguishes feedback-derived, preference, scalar-reward, and vector-reward semantics.
        ja: feedback-derived・preference・scalar reward・vector reward の learning 意味を区別します。
      allowed_values: []
      pattern: null
      example_value: feedback-derived
      source_claims:
        - claim-learning-signal-003
    - id: source_evidence_refs
      labels:
        zh: 来源证据引用
        en: source-evidence references
        ja: 出典 evidence 参照
      datatype: reference-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用实际反馈、测量、轨迹或评审发现，禁止只保存无出处的结论。
        en: References the actual feedback, measurements, trajectories, or review findings instead of retaining an ungrounded conclusion.
        ja: 実際の feedback・measurement・trajectory・review finding を参照し、出典のない結論だけを保持しません。
      allowed_values: []
      pattern: null
      example_value:
        - review-finding/rf-9
      source_claims:
        - claim-learning-signal-004
    - id: credited_subject_ref
      labels:
        zh: 归因对象引用
        en: credited-subject reference
        ja: credit 対象参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该信号评价或归因的具体轨迹、决策、输出或配置。
        en: References the concrete trajectory, decision, output, or configuration to which the signal assigns credit.
        ja: signal が credit を割り当てる具体 trajectory・decision・output・configuration を参照します。
      allowed_values: []
      pattern: null
      example_value: route-decision/rd-88
      source_claims:
        - claim-learning-signal-005
    - id: target_version_ref
      labels:
        zh: 适用目标版本引用
        en: applicable target-version reference
        ja: 適用 target version 参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用该信号可用于改进的 OptimizationTarget 精确版本。
        en: References the exact OptimizationTarget version to which the signal may apply.
        ja: signal を適用できる OptimizationTarget の正確な version を参照します。
      allowed_values: []
      pattern: null
      example_value: optimization-target/router@12
      source_claims:
        - claim-learning-signal-006
    - id: derivation_method
      labels:
        zh: 派生方法
        en: derivation method
        ja: 導出方法
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明如何从来源证据形成信号，包括评估器、奖励函数或反思器版本。
        en: States how evidence became the signal, including evaluator, reward-function, or reflector version.
        ja: evidence から signal を形成した方法（evaluator・reward function・reflector version）を示します。
      allowed_values: []
      pattern: null
      example_value: review-finding-extractor@4
      source_claims:
        - claim-learning-signal-007
    - id: signal_value
      labels:
        zh: 信号值
        en: signal value
        ja: signal 値
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 保存方向性文本、偏好顺序、标量或命名向量及其尺度。
        en: Stores directional text, a preference order, a scalar, or a named vector together with its scale.
        ja: 方向性 text・preference order・scalar・named vector と scale を保存します。
      allowed_values: []
      pattern: null
      example_value:
        kind: direction
        value: validate date range before routing to search
      source_claims:
        - claim-learning-signal-008
    - id: derived_at
      labels:
        zh: 派生时间
        en: derived at
        ja: 導出時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 信号内容与来源绑定完成的 UTC 时间。
        en: UTC instant when the signal content and evidence binding were completed.
        ja: signal 内容と evidence binding が完了した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T10:18:00.000Z
      source_claims:
        - claim-learning-signal-009
  constraints:
    - id: learning-signal-does-not-apply-change
      severity: error
      expression_language: plain
      expression: a LearningSignal may support a ChangeProposal but never mutates memory, routing, policy, prompt, or model state by itself
      explanations:
        zh: 学习信号只能支持变更提案，不能自行改写系统状态。
        en: A LearningSignal may support a ChangeProposal but cannot rewrite system state by itself.
        ja: LearningSignal は ChangeProposal を支援できますが、単独で system state を変更できません。
      source_claims:
        - claim-learning-signal-010
  required_relation_constraints: []
examples:
  - id: LearningSignal-example-positive-manual-001
    kind: positive
    labels:
      zh: 学习信号正例
      en: Positive learning signal case
      ja: 学習信号の正例
    scenario_id: null
    descriptions:
      zh: signal ls-31 从 finding rf-9 提炼出“路由到搜索前必须先验证日期范围”，并绑定 target router@12。
      en: signal ls-31 derives 'validate date range before routing to search' from finding rf-9 and binds target router@12.
      ja: signal ls-31 は finding rf-9 から「検索ルーティング前に日付範囲を検証」を抽出し target router@12 を結びます。
    field_values:
      learning_signal_id: learning-signal/ls-31
      signal_type: feedback-derived
      source_evidence_refs:
        - review-finding/rf-9
      credited_subject_ref: route-decision/search-routing-44
      target_version_ref: optimization-target/router@12
      derivation_method: review-finding-extractor@4
      signal_value:
        kind: direction
        value: validate date range before routing to search
      derived_at: 2026-07-16T10:18:00.000Z
    related_node_ids:
      - LearningSignal
    related_relation_ids: []
    expected_result:
      zh: 该记录是可归因的 LearningSignal。
      en: The record is an attributable LearningSignal.
      ja: この記録は帰属可能な LearningSignal です。
    why_valid_or_invalid:
      zh: 它保留来源、归因对象、方向与目标版本。
      en: It retains source, credited subject, direction, and target version.
      ja: 出所、帰属対象、方向、対象版を保持します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-learning-signal-011
  - id: LearningSignal-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 学习信号边界例
      en: Boundary learning signal case
      ja: 学習信号の境界例
    scenario_id: null
    descriptions:
      zh: 用户只写下“结果不好”，没有被评对象、理由或适用目标。
      en: A user only writes 'the result is bad' with no evaluated subject, reason, or applicable target.
      ja: ユーザーは「結果が悪い」とだけ書き対象、理由、適用目標を示しません。
    field_values: {}
    related_node_ids:
      - LearningSignal
    related_relation_ids: []
    expected_result:
      zh: 这是未结构化 Feedback，尚不能成为 LearningSignal。
      en: This is unstructured Feedback and not yet a LearningSignal.
      ja: これは未構造 Feedback でまだ LearningSignal ではありません。
    why_valid_or_invalid:
      zh: 缺少可验证来源解释、信用归属和目标版本。
      en: It lacks verifiable derivation, credit assignment, and target version.
      ja: 検証可能な導出、信用割当、対象版がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-learning-signal-012
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: LearningSignal-supports-ChangeProposal
    predicate: supports
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 支持变更提案
      en: supports change proposal
      ja: 変更提案を支持
    definitions:
      zh: LearningSignal 为 ChangeProposal 中某项候选差异提供可追溯理由；支持关系不等于批准或执行提案。
      en: LearningSignal provides traceable rationale for a candidate diff in a ChangeProposal; support is neither approval nor execution.
      ja: LearningSignal は ChangeProposal の候補差分へ追跡可能な理由を提供し、支持は承認や実行ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_supports
      labels:
        zh: 反向：支持变更提案
        en: "inverse: supports change proposal"
        ja: 逆方向：変更提案を支持
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: LearningSignal-supports-ChangeProposal-example-positive-manual-001
        kind: positive
        labels:
          zh: 支持变更提案正例
          en: Positive case for supports change proposal
          ja: 変更提案を支持の正例
        scenario_id: null
        descriptions:
          zh: proposal p-8 的证据清单包含 ls-f-8，并说明该信号支持日期校验差异。
          en: proposal p-8 evidence list includes ls-f-8 and states it supports the date-validation diff.
          ja: proposal p-8 の証拠一覧は ls-f-8 を含み日付検証差分を支持すると示します。
        field_values: {}
        related_node_ids:
          - LearningSignal
          - ChangeProposal
        related_relation_ids:
          - LearningSignal-supports-ChangeProposal
        expected_result:
          zh: 应记录该学习信号为此变更提案提供证据。
          en: The signal-to-proposal support fact is recorded.
          ja: 信号が提案を支持する事実を記録します。
        why_valid_or_invalid:
          zh: 提案中的具体差异与信号内容和目标版本一致。
          en: The specific diff matches signal content and target version.
          ja: 具体差分が信号内容と対象版に一致します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-learning-signal-013
      - id: LearningSignal-supports-ChangeProposal-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 支持变更提案边界例
          en: Boundary case for supports change proposal
          ja: 変更提案を支持の境界例
        scenario_id: null
        descriptions:
          zh: ls-f-8 关于日期校验，但 proposal p-9 只改变模型温度且未引用该信号。
          en: ls-f-8 concerns date validation while proposal p-9 only changes temperature and does not cite it.
          ja: ls-f-8 は日付検証に関する一方 proposal p-9 は温度のみ変更し参照しません。
        field_values: {}
        related_node_ids:
          - LearningSignal
          - ChangeProposal
        related_relation_ids:
          - LearningSignal-supports-ChangeProposal
        expected_result:
          zh: 不得建立 ls-f-8 supports p-9。
          en: No support link from ls-f-8 to p-9 is asserted.
          ja: ls-f-8 から p-9 への支持辺を主張しません。
        why_valid_or_invalid:
          zh: 信号主题与候选差异不匹配，也没有显式证据引用。
          en: Signal topic and candidate diff do not match and no explicit evidence reference exists.
          ja: 信号主題と候補差分が一致せず明示証拠参照もありません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-learning-signal-014
    source_claims:
      - claim-learning-signal-015
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: pending
    target: concept:ChangeProposal
  - id: LearningSignal-derived_from-Feedback
    predicate: derived_from
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 从反馈派生
      en: derived from feedback
      ja: フィードバックから導出
    definitions:
      zh: LearningSignal 引用其内容经明确提炼步骤所来源的 Feedback；该关系要求保留反馈 ID、提炼方法与版本。
      en: LearningSignal references the Feedback from which its content was derived through an explicit extraction step and retains feedback ID, method, and version.
      ja: LearningSignal は明示的抽出手順で内容を導出した Feedback を参照し、feedback ID、方法、版を保持します。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_derived_from
      labels:
        zh: 反向：从反馈派生
        en: "inverse: derived from feedback"
        ja: 逆方向：フィードバックから導出
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: LearningSignal-derived_from-Feedback-example-positive-manual-001
        kind: positive
        labels:
          zh: 从反馈派生正例
          en: Positive case for derived from feedback
          ja: フィードバックから導出の正例
        scenario_id: null
        descriptions:
          zh: ls-f-8 的 source_feedback_id=f-22，并记录 extractor reflection-v3。
          en: ls-f-8 has source_feedback_id=f-22 and extractor reflection-v3.
          ja: ls-f-8 は source_feedback_id=f-22 と extractor reflection-v3 を記録します。
        field_values: {}
        related_node_ids:
          - LearningSignal
          - Feedback
        related_relation_ids:
          - LearningSignal-derived_from-Feedback
        expected_result:
          zh: 应建立学习信号从反馈派生的出处边。
          en: The learning-signal provenance edge is present.
          ja: 学習信号のフィードバック出所辺を確立します。
        why_valid_or_invalid:
          zh: 来源 ID 与可重放提炼步骤均明确。
          en: Source ID and replayable extraction step are explicit.
          ja: 出所 ID と再生可能な抽出手順が明示されています。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-learning-signal-016
      - id: LearningSignal-derived_from-Feedback-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 从反馈派生边界例
          en: Boundary case for derived from feedback
          ja: フィードバックから導出の境界例
        scenario_id: null
        descriptions:
          zh: ls-9 与 f-22 文本相似，但没有来源引用或提炼记录。
          en: ls-9 resembles f-22 in text but has no source reference or extraction record.
          ja: ls-9 は f-22 と文面が似ていますが出所参照や抽出記録がありません。
        field_values: {}
        related_node_ids:
          - LearningSignal
          - Feedback
        related_relation_ids:
          - LearningSignal-derived_from-Feedback
        expected_result:
          zh: 不得仅凭文本相似建立 derived_from。
          en: Text similarity alone does not establish derived_from.
          ja: 文面類似だけで derived_from を成立させません。
        why_valid_or_invalid:
          zh: 语义相似不能替代可验证的生成出处。
          en: Semantic similarity cannot substitute for verifiable derivation provenance.
          ja: 意味類似は検証可能な導出出所の代用になりません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-learning-signal-017
    source_claims:
      - claim-learning-signal-018
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: pending
    target: concept:Feedback
  - id: LearningSignal-applies_to-OptimizationTarget
    predicate: applies_to
    direction: source-to-target
    relation_kind: information
    labels:
      zh: 适用于
      en: applies to
      ja: 適用対象
    definitions:
      zh: LearningSignal applies_to OptimizationTarget 表示一条奖励、偏好或反馈信号明确标识其所评价的优化对象及版本，使优化循环能够把该信号归因到同一个提示、参数或策略目标；只有共同出现而没有目标身份不构成该事实。
      en: LearningSignal applies_to OptimizationTarget means that a reward, preference, or feedback signal explicitly identifies the optimization object and version it evaluates, allowing an optimization loop to attribute the signal to the same prompt, parameter, or policy target; co-occurrence without target identity is insufficient.
      ja: LearningSignal applies_to OptimizationTarget は、reward・preference・feedback signal が評価対象の optimization object と version を明示し、optimization loop が同一 prompt・parameter・policy target へ帰属できることを示します。target identity のない共起だけでは成立しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该类级事实用于组织默认阅读，不要求每个学习信号实例都已绑定目标，也不限制一个目标可接收的信号数量。
      en: This class-level fact organizes the default reading without requiring every learning-signal instance to be bound already or limiting how many signals a target may receive.
      ja: この class-level fact は既定読解を構成しますが、全 LearningSignal instance の結合済み状態や一 target の signal 数を制約しません。
    inverse_reading:
      predicate: evaluated_by_signal
      labels:
        zh: 由学习信号评价
        en: evaluated by learning signal
        ja: 学習信号により評価される
    conditions:
      - id: LearningSignal-applies_to-OptimizationTarget-condition-manual-20260716
        severity: error
        expression_language: plain
        expression: Assert only when the signal record names the same OptimizationTarget identity and evaluated version or immutable digest, and its payload is interpretable under that target's objective; a global reward with no target binding is insufficient.
        explanations:
          zh: 仅当信号记录指向同一个 OptimizationTarget 身份及被评价版本或不可变摘要，且信号载荷能按该目标的优化目标解释时成立；没有目标绑定的全局奖励不足。
          en: Assert only when the signal record names the same OptimizationTarget identity and evaluated version or immutable digest, and its payload is interpretable under that target's objective; a global reward with no target binding is insufficient.
          ja: signal record が同一 OptimizationTarget ID と評価 version または immutable digest を示し、payload が target objective に従って解釈できる場合だけ成立します。target binding のない global reward は不十分です。
        source_claims:
          - claim-learning-signal-019
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: LearningSignal-applies_to-OptimizationTarget-example-positive-001
        kind: positive
        labels:
          zh: 路由提示版本反馈
          en: Router-prompt version feedback
          ja: router prompt version feedback
        scenario_id: null
        descriptions:
          zh: 偏好信号 `signal/pref-44` 指明目标 `prompt/router@sha256:7ac`，并记录该版本在同一评测集上的胜负对。
          en: Preference signal `signal/pref-44` names target `prompt/router@sha256:7ac` and records the winning and losing outputs for that version on the same evaluation set.
