schema: moonweave.ai/ontology-node/v1
id: LearningSignal
kind: concept
labels:
  zh: 学习信号
  en: Learning Signal
  ja: 学習信号
semantics:
  short_definition:
    zh: 经过明确来源、转换和政策约束而准备给学习流程消费的数据实体。
    en: A data entity prepared for a learning process through explicit provenance, transformation, and policy constraints.
    ja: 明示的な来歴、変換、方針制約により学習過程の消費用に準備されたデータエンティティ。
  definition:
    zh: LearningSignal 是为监督学习、偏好学习或奖励模型训练而准备的数据记录，必须标明 learning_objective（最小化 loss、最大化 reward 等训练目标语义）、dataset、来源和转换政策。它不是原始 HumanFeedback、Feedback、Score、EvaluationMetric、Verdict 或 OpenAI fine-tuning 作业运行时本身。InstructGPT 约 13k SFT demos 与 33k 比较数据、OpenAI fine-tuning training_file、DPO 偏好数据集在写入训练批次前都应先映射为本节点的 dataset_ref 与 transformation_policy_ref。
    en: "LearningSignal is a data record prepared for supervised learning, preference learning, or reward-model training and must identify learning_objective (training-goal semantics such as minimize loss or maximize reward), dataset, provenance, and transformation policy. It is not raw HumanFeedback, Feedback, Score, EvaluationMetric, Verdict, or an OpenAI fine-tuning job runtime itself. InstructGPT ~13k SFT demos and ~33k comparisons, OpenAI fine-tuning training_file, and DPO preference datasets should map to dataset_ref and transformation_policy_ref here before entering training batches."
    ja: LearningSignal は教師あり学習、選好学習、報酬モデル訓練用に準備されたデータ記録で、learning_objective（損失最小化、報酬最大化など）、dataset、来歴、変換方針を特定しなければならない。生 HumanFeedback、Feedback、Score、EvaluationMetric、Verdict、OpenAI fine-tuning ジョブ実行時そのものではない。InstructGPT 約 13k SFT demos と 33k 比較、OpenAI fine-tuning training_file、DPO 選好データセットは訓練バッチ前に dataset_ref と transformation_policy_ref へ写像すべきである。
  why_needed:
    zh: 训练数据需要可追溯、可解释和受政策约束。单独建模学习信号能让团队区分“人说了什么”“如何转化为数据”和“OpenAI POST /v1/fine_tuning/jobs 实际上做了什么”，从而避免错误使用或无法重现的训练输入。
    en: "Training data needs traceability, interpretability, and policy constraints. Modeling learning signal separately distinguishes what a person said, how it was transformed into data, and what OpenAI POST /v1/fine_tuning/jobs actually did, preventing incorrect use or irreproducible training input."
    ja: 訓練データには追跡可能性、解釈可能性、方針制約が必要。LearningSignal を別にモデル化することで、人が何を言ったか、どうデータへ変換したか、OpenAI POST /v1/fine_tuning/jobs が実際に何をしたかを区別し、誤用又は再現不能な訓練入力を防ぐ。
  includes:
    - zh: 信号标识、learning_objective、dataset_ref、source_ref 和 transformation_policy_ref。
      en: "Signal identifier, learning_objective, dataset_ref, source_ref, and transformation_policy_ref."
      ja: 信号識別子、learning_objective、dataset_ref、source_ref、transformation_policy_ref。
    - zh: 可被独立 TrainingRun 或 fine-tuning 作业消费的经过整理的数据实体。
      en: "Curated data entity that an independent TrainingRun or fine-tuning job may consume."
      ja: 独立 TrainingRun 又は fine-tuning ジョブが消費し得る整備済みデータエンティティ。
  excludes:
    - zh: 原始人类反馈、自动评分、运行时度量和已发生的 PPO 梯度步或权重更新。
      en: "Raw human feedback, automated score, runtime metric, and occurred PPO gradient step or weight update."
      ja: 生の人間フィードバック、自動スコア、実行時メトリック、発生済み PPO 勾配ステップ又は重み更新。
    - zh: 被重命名为奖励模型分数、但没有已训练模型、版本、候选和尺度来源的一般质量分数。
      en: "A generic quality score relabeled as a reward-model score without trained-model, version, candidate, and scale provenance."
      ja: 学習済みモデル、版、候補、尺度の来歴なしに報酬モデルスコアへ改名された一般品質スコア。
  semantic_kind: entity
  aliases: [training signal, curated training datum, 学习数据]
engineering:
  explanation:
    zh: 新集成应以 InstructGPT SFT demo JSONL、OpenAI fine-tuning training_file、TRL DPOTrainer prompt/chosen/rejected 数据集、RewardTrainer chosen/rejected 对为可映射 API 形状，再以 LearningSignal 保存 signal_id、learning_objective、dataset_ref、source_ref、transformation_policy_ref。不得把采集到的 HumanFeedback 或单个 Score 直接写成训练信号；fine-tuning job 提交记录训练契约，不等于 LearningSignal 本身。
    en: "New integrations should treat InstructGPT SFT demo JSONL, OpenAI fine-tuning training_file, TRL DPOTrainer prompt/chosen/rejected datasets, and RewardTrainer chosen/rejected pairs as mappable API shapes, then persist LearningSignal with signal_id, learning_objective, dataset_ref, source_ref, and transformation_policy_ref. Collected HumanFeedback or one Score must not be written directly as a training signal; a fine-tuning job submission records a training contract, not LearningSignal itself."
    ja: 新しい統合では InstructGPT SFT demo JSONL、OpenAI fine-tuning training_file、TRL DPOTrainer prompt/chosen/rejected データセット、RewardTrainer chosen/rejected 対を写像可能 API 形状として扱い、LearningSignal で signal_id、learning_objective、dataset_ref、source_ref、transformation_policy_ref を保存する。収集 HumanFeedback 又は単一 Score を直接訓練信号として書いてはならない。fine-tuning job 提出は訓練契約であり、LearningSignal そのものではない。
  typical_input:
    - description: InstructGPT-style SFT demonstration batch prepared for supervised fine-tuning.
      format: |
        {
          "dataset_ref": "dataset:instructgpt-sft-13k",
          "source_ref": "SourceReference:openai-api-playground-labelers",
          "transformation_policy_ref": "policy:instructgpt-sft-v1",
          "learning_objective": "supervised"
        }
      source_claims: [claim-learning-signal-instructgpt, claim-learning-signal-design]
    - description: OpenAI fine-tuning training file reference after curation.
      format: |
        POST /v1/fine_tuning/jobs
        {"training_file": "file-sft-demos-v2", "model": "gpt-4.1-mini-2025-04-14"}
      source_claims: [claim-learning-signal-openai-finetuning, claim-learning-signal-design]
  typical_output:
    - description: Local learning-signal record ready for TrainingRun consumption.
      format: |
        {
          "signal_id": "learning-signal-104",
          "learning_objective": "supervised",
          "dataset_ref": "dataset:support-demonstrations-v1",
          "source_ref": "SourceReference:human-feedback-batch-7",
          "transformation_policy_ref": "policy:training-consent-v1"
        }
      source_claims: [claim-learning-signal-design]
  reference_implementations:
    - name: InstructGPT RLHF
      url: https://arxiv.org/abs/2203.02155
      description: Distinct human demonstration and comparison data preparation stages.
    - name: OpenAI Fine-tuning API
      url: https://platform.openai.com/docs/guides/fine-tuning
      description: training_file as curated dataset contract for fine-tuning jobs.
    - name: Direct Preference Optimization
      url: https://arxiv.org/abs/2305.18290
      description: Preference-pair dataset preparation before DPO optimization.
structure:
  identity_keys: [signal_id]
  fields:
    - id: signal_id
      labels: {zh: 信号标识, en: Signal identifier, ja: 信号識別子}
      definitions:
        zh: 唯一标识一条经过准备的学习数据实体。
        en: Uniquely identifies one prepared learning-data entity.
        ja: 一件の準備済み学習データエンティティを一意に識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: learning-signal-104
      allowed_values: []
      source_claims: [claim-learning-signal-design]
    - id: learning_objective
      labels: {zh: 学习目标, en: Learning objective, ja: 学習目的}
      definitions:
        zh: 指出该记录为监督、偏好或奖励建模的哪一种数据准备，对应 minimize loss、maximize reward 等训练目标语义，而不是 TrainingRun 活动名称。
        en: "States whether record preparation serves supervised, preference, or reward modeling with training-goal semantics such as minimize loss or maximize reward, not a TrainingRun activity name."
        ja: 記録準備が教師あり、選好、報酬モデリングのどれに役立つかを示し、損失最小化、報酬最大化などの訓練目標意味論に対応する。TrainingRun 活動名ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: supervised
      allowed_values: [supervised, preference, reward]
      source_claims: [claim-learning-signal-instructgpt, claim-learning-signal-design]
    - id: dataset_ref
      labels: {zh: 数据集引用, en: Dataset reference, ja: データセット参照}
      definitions:
        zh: 指向包含准备后记录及其版本的不可变或可追溯数据集，如 OpenAI training_file 或 JSONL manifest。
        en: "Reference to immutable or traceable dataset containing prepared records and version, such as OpenAI training_file or JSONL manifest."
        ja: OpenAI training_file や JSONL manifest など、準備済み記録と版を含む不変又は追跡可能なデータセットへの参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dataset:support-demonstrations-v1
      allowed_values: []
      source_claims: [claim-learning-signal-design]
    - id: source_ref
      labels: {zh: 来源引用, en: Provenance reference, ja: 来歴参照}
      definitions:
        zh: 指向人类输入、授权数据或其他允许来源的 SourceReference，而非匿名文本。
        en: Reference to SourceReference for human input, authorized data, or another allowed source rather than anonymous text.
        ja: 匿名テキストではなく、人間入力、許可済みデータ、又は他の許容発生源の SourceReference への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: SourceReference:human-feedback-batch-7
      allowed_values: []
      source_claims: [claim-learning-signal-design]
    - id: transformation_policy_ref
      labels: {zh: 转换政策引用, en: Transformation policy reference, ja: 変換方針参照}
      definitions:
        zh: 指向规定如何清洗、筛选、配对或标签化来源数据以供学习使用的版本化政策。
        en: Reference to versioned policy governing how source data is cleaned, filtered, paired, or labeled for learning use.
        ja: 学習利用のために発生源データをどうクリーニング、選別、対化、又はラベル付けするかを規定する版管理方針への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: policy:training-consent-v1
      allowed_values: []
      source_claims: [claim-learning-signal-design]
  constraints:
    - id: learning-signal-has-provenance-and-policy
      severity: error
      expression_language: plain
      expression: dataset_ref, source_ref, and transformation_policy_ref must all resolve before learning signal can be consumed by training.
      explanation:
        zh: 没有来源或转换政策的数据不应被默认为可训练。
        en: Data without provenance or transformation policy must not be presumed trainable.
        ja: 来歴又は変換方針のないデータを訓練可能と推定してはならない。
      source_claims: [claim-learning-signal-design]
    - id: learning-signal-objective-boundary
      severity: error
      expression_language: plain
      expression: learning_objective reward requires a provenance- and policy-bounded training datum, and learning_objective preference requires chosen-rejected pair semantics; RewardModelScore and a generic score are inference or evaluation outputs, not substitutes for either training datum.
      explanation:
        zh: 奖励与偏好训练需要明确的数据准备结构；模型推断分数或普通质量分数都不能替代训练数据。
        en: Reward and preference training require explicit data-preparation structure; neither a model inference score nor a generic quality score can replace training data.
        ja: 報酬及び選好訓練には明示的なデータ準備構造が必要であり、モデル推論スコア又は一般品質スコアで訓練データを代替できない。
      source_claims: [claim-learning-signal-instructgpt, claim-learning-signal-design]
  required_relations:
    - id: learning-signal-has-provenance-source-reference
      direction: outgoing
      predicate: has_provenance
      target_concept_id: SourceReference
      cardinality: {min: 1, max: null}
      explanations:
        zh: 每条 LearningSignal 至少必须有一个可追溯来源引用。
        en: Each LearningSignal must have at least one traceable provenance reference.
        ja: 各 LearningSignal は少なくとも一つの追跡可能な来歴参照を持たなければならない。
      source_claims: [claim-learning-signal-design]
examples:
  - id: learning-signal-example-instructgpt-sft
    labels:
      zh: InstructGPT SFT 演示学习信号
      en: InstructGPT SFT demonstration learning signal
      ja: InstructGPT SFT デモ学習信号
    descriptions:
      zh: signal_id=instructgpt-sft-demonstrations learning_objective=supervised dataset_ref=dataset:instructgpt-sft-13k source_ref=SourceReference:openai-api-playground-labelers transformation_policy_ref=policy:instructgpt-sft-v1；对应 Ouyang 2022 约 13k 人工演示，用于 minimize cross-entropy loss 的 SFT 阶段，不是 PPO 执行记录。
      en: signal_id=instructgpt-sft-demonstrations learning_objective=supervised dataset_ref=dataset:instructgpt-sft-13k; maps to Ouyang 2022 ~13k human demonstrations for SFT minimize cross-entropy loss stage, not a PPO execution record.
      ja: Ouyang 2022 約 13k 人間デモに対応。SFT 段階のデータ準備であり PPO 実行記録ではない。
    example_source:
      product: InstructGPT
      url: https://arxiv.org/abs/2203.02155
      version: SFT demonstrations
    field_values:
      signal_id: instructgpt-sft-demonstrations
      learning_objective: supervised
      dataset_ref: dataset:instructgpt-sft-13k
      source_ref: SourceReference:openai-api-playground-labelers
      transformation_policy_ref: policy:instructgpt-sft-v1
    related_node_ids: [LearningSignal, SourceReference, PreferenceExample]
    related_relation_ids: [learning-signal-has-provenance-source-reference]
    source_claims: [claim-learning-signal-instructgpt, claim-learning-signal-design]
  - id: learning-signal-example-openai-finetuning-file
    labels:
      zh: OpenAI fine-tuning training_file 学习信号
      en: OpenAI fine-tuning training_file learning signal
      ja: OpenAI fine-tuning training_file 学習信号
    descriptions:
      zh: signal_id=openai-sft-file-v2 learning_objective=supervised dataset_ref=file:sft-demos-v2 source_ref=SourceReference:curated-export-2026-07 transformation_policy_ref=policy:customer-consent-v2；POST /v1/fine_tuning/jobs 引用此 training_file，但 LearningSignal 记录的是数据准备事实，不是 job 运行时。
      en: signal_id=openai-sft-file-v2 learning_objective=supervised dataset_ref=file:sft-demos-v2; POST /v1/fine_tuning/jobs references this training_file, but LearningSignal records data-preparation fact, not job runtime.
      ja: fine-tuning job は training_file を参照するが、LearningSignal はデータ準備事実を記録し job 実行時ではない。
    example_source:
      product: OpenAI Fine-tuning API
      url: https://platform.openai.com/docs/guides/fine-tuning
      version: training_file
    field_values:
      signal_id: openai-sft-file-v2
      learning_objective: supervised
      dataset_ref: file:sft-demos-v2
      source_ref: SourceReference:curated-export-2026-07
      transformation_policy_ref: policy:customer-consent-v2
    related_node_ids: [LearningSignal, SourceReference]
    related_relation_ids: [learning-signal-has-provenance-source-reference]
    source_claims: [claim-learning-signal-openai-finetuning, claim-learning-signal-design]
  - id: learning-signal-example-dpo-preference-batch
    labels:
      zh: DPO 偏好数据集学习信号
      en: DPO preference dataset learning signal
      ja: DPO 選好データセット学習信号
    descriptions:
      zh: signal_id=dpo-preference-v1 learning_objective=preference dataset_ref=dataset:preference-v1 transformation_policy_ref=policy:dpo-pairing-v1；Rafailov 2023 DPO 直接在 (chosen,rejected) 对上 minimize −log σ(β·log-ratio)，数据集准备属于 LearningSignal，不是 PolicyUpdate。
      en: signal_id=dpo-preference-v1 learning_objective=preference dataset_ref=dataset:preference-v1; Rafailov 2023 DPO minimizes −log σ(β·log-ratio) on (chosen,rejected) pairs—dataset preparation is LearningSignal, not PolicyUpdate.
      ja: Rafailov 2023 DPO の選好対データ準備。PolicyUpdate ではない。
    example_source:
      product: Direct Preference Optimization
      url: https://arxiv.org/abs/2305.18290
      version: preference dataset
    field_values:
      signal_id: dpo-preference-v1
      learning_objective: preference
      dataset_ref: dataset:preference-v1
      source_ref: SourceReference:annotator-batch-12
      transformation_policy_ref: policy:dpo-pairing-v1
    related_node_ids: [LearningSignal, PreferenceExample]
    related_relation_ids: []
    source_claims: [claim-learning-signal-dpo, claim-learning-signal-design]
  - id: learning-signal-counterexample-raw-feedback
    labels:
      zh: 原始人类反馈直接作为信号
      en: Raw human feedback directly as signal
      ja: 生の人間フィードバックを直接信号にする
    descriptions:
      zh: LangSmith 标注员 correction 刚提交，尚无 dataset_ref 与 transformation_policy_ref；不能登记为 LearningSignal，因为训练数据未经过明确转换与授权。
      en: LangSmith annotator correction just submitted with no dataset_ref or transformation_policy_ref; cannot register as LearningSignal because training data lacks explicit transformation and authorization.
      ja: dataset_ref と transformation_policy_ref がなく、LearningSignal として登録できない。
    example_source:
      product: LangSmith
      url: https://docs.smith.langchain.com
      version: raw annotation boundary
    field_values:
      signal_id: null
      learning_objective: null
      dataset_ref: null
      source_ref: null
      transformation_policy_ref: null
    related_node_ids: [HumanFeedback, LearningSignal]
    related_relation_ids: []
    source_claims: [claim-learning-signal-design]
  - id: learning-signal-boundary-reward-score
    labels:
      zh: 通用评分、训练信号与模型分数的边界
      en: Boundary between generic score, learning signal, and model score
      ja: 一般スコア、学習信号、モデルスコアの境界
    descriptions:
      zh: LangSmith helpfulness Score value=4 不能自动转为 learning_objective=preference 的 LearningSignal；PreferenceExample 需要 chosen/rejected 对，RewardModelScore 需要已训练 RM 输出，三者不可互换。
      en: LangSmith helpfulness Score value=4 cannot automatically become LearningSignal with learning_objective=preference; PreferenceExample needs chosen/rejected pairs and RewardModelScore needs trained RM output—the three are not interchangeable.
      ja: 三者は相互置換不可。
    example_source:
      product: Moonweave optimization boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: score vs learning signal
    field_values:
      signal_id: null
      learning_objective: reward
      dataset_ref: null
      source_ref: null
      transformation_policy_ref: null
    related_node_ids: [LearningSignal, Score, RewardModelScore, PreferenceExample]
    related_relation_ids: []
    source_claims: [claim-learning-signal-instructgpt, claim-learning-signal-design]
parent_relation: null
relations:
  - id: LearningSignal-hasProvenance-SourceReference
    predicate: has_provenance
    target: concept:SourceReference
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 学习信号有来源引用, en: learning signal has provenance source reference, ja: 学習信号が来歴ソース参照を持つ}
    definitions:
      zh: LearningSignal 指向可审计来源，而不是把数据来源隐含在训练脚本中。
      en: LearningSignal points to auditable source rather than leaving data origin implicit in training script.
      ja: LearningSignal は監査可能な発生源を指し、データ起源を訓練スクリプト内に暗黙化しない。
    cardinality: {source: {min: 1, max: null}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_provenance_for
      labels: {zh: 来源用于学习信号, en: source is provenance for learning signal, ja: ソースが学習信号の来歴である}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-learning-signal-design]
    distinct_fact_rationale:
      zh: 该关系记录数据出处，不宣称训练已经消费该数据。
      en: This relation records data origin and does not state that training consumed the data.
      ja: この関係はデータ起源を記録し、訓練がデータを消費したとは示さない。
    layout_role: cross-link
sources:
  - id: instructgpt-learning-signal
    title: Training language models to follow instructions with human feedback
    url: https://arxiv.org/abs/2203.02155
    source_type: paper
    relevance: Describes human data preparation, reward model, and PPO as distinct stages.
  - id: dpo-learning-signal
    title: Direct Preference Optimization
    url: https://arxiv.org/abs/2305.18290
    source_type: paper
    relevance: Preference-pair dataset preparation before DPO optimization.
  - id: openai-finetuning-learning-signal
    title: OpenAI Fine-tuning API
    url: https://platform.openai.com/docs/guides/fine-tuning
    source_type: official-doc
    relevance: training_file as curated dataset contract separate from job runtime.
  - id: learning-signal-design
    title: Learning signal design inference
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Separates provenance-governed prepared data from raw feedback and training execution.
source_claims:
  - id: claim-learning-signal-instructgpt
    source: instructgpt-learning-signal
    supports: InstructGPT uses distinct human demonstration, comparison, reward-model, and PPO stages rather than one undifferentiated feedback object.
    locator: "Abstract and methodology: demonstrations, comparisons, reward model, PPO"
    evidence_kind: official
    confidence: high
  - id: claim-learning-signal-dpo
    source: dpo-learning-signal
    supports: DPO requires prepared preference-pair datasets with explicit chosen-rejected semantics before policy optimization.
    locator: Method — preference dataset and DPO loss
    evidence_kind: research
    confidence: high
  - id: claim-learning-signal-openai-finetuning
    source: openai-finetuning-learning-signal
    supports: OpenAI fine-tuning jobs consume a training_file dataset reference as a training contract distinct from raw feedback.
    locator: Create a fine-tuning job — training_file
    evidence_kind: official
    confidence: high
  - id: claim-learning-signal-design
    source: learning-signal-design
    supports: LearningSignal is explicitly prepared, provenance-governed data distinct from raw human feedback and actual training activity.
    locator: Local learning signal boundary
    evidence_kind: design-inference
    confidence: high
