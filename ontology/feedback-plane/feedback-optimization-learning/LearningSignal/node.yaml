schema: moonweave.ai/ontology-node/v1
id: LearningSignal
kind: concept
status: accepted
labels:
  zh: 学习信号
  en: Learning Signal
  ja: 学習信号
semantics:
  short_definition:
    zh: 经过明确来源、转换和政策约束而准备给学习流程消费的数据实体。
    en: A data entity prepared for a learning process through explicit provenance, transformation, and policy constraints.
    ja: 明示的な来歴、変換、方針制約により学習過程の消費用に準備されたデータエンティティ。
  definition:
    zh: Learning Signal 是为监督学习、偏好学习或真实奖励建模而准备的数据记录，必须标明训练目标、数据集、来源和转换政策。它不是原始 HumanFeedback、Feedback、Score、Evaluation Metric、Verdict 或实际训练活动。一个人工意见只有在明确清洗、配对、标签化并记录政策后才能成为 Learning Signal。
    en: A Learning Signal is a data record prepared for supervised learning, preference learning, or genuine reward modeling and must identify learning objective, dataset, provenance, and transformation policy. It is not raw HumanFeedback, Feedback, Score, Evaluation Metric, Verdict, or actual training activity. A human input becomes Learning Signal only after explicit cleaning, pairing, labeling, and policy recording.
    ja: Learning Signal は、教師あり学習、選好学習、又は真の報酬モデリング用に準備されたデータ記録であり、学習目的、データセット、来歴、変換方針を特定しなければならない。生の HumanFeedback、Feedback、Score、Evaluation Metric、Verdict、又は実際の訓練活動ではない。人間入力は、明示的なクリーニング、対化、ラベル付け、方針記録の後にのみ Learning Signal となる。
  why_needed:
    zh: 训练数据需要可追溯、可解释和受政策约束。单独建模学习信号能让团队区分“人说了什么”“如何转化为数据”和“训练实际上做了什么”，从而避免错误使用或无法重现的训练输入。
    en: Training data needs traceability, interpretability, and policy constraints. Modeling learning signal separately distinguishes what a person said, how it was transformed into data, and what training actually did, preventing incorrect use or irreproducible training input.
    ja: 訓練データには追跡可能性、解釈可能性、方針制約が必要である。Learning Signal を別にモデル化することで、人が何を言ったか、どうデータへ変換したか、訓練が実際に何をしたかを区別し、誤用又は再現不能な訓練入力を防ぐ。
  includes:
    - zh: 信号标识、学习目标、数据集引用、来源引用和转换政策引用。
      en: Signal identifier, learning objective, dataset reference, provenance reference, and transformation-policy reference.
      ja: 信号識別子、学習目的、データセット参照、来歴参照、変換方針参照。
    - zh: 可被独立训练活动消费的经过整理的数据实体。
      en: Curated data entity that a separate training activity may consume.
      ja: 別個の訓練活動が消費し得る整備済みデータエンティティ。
  excludes:
    - zh: 原始人类反馈、自动评分、运行时度量和已发生的训练、PPO 或推理执行。
      en: Raw human feedback, automated score, runtime metric, and occurred training, PPO, or inference execution.
      ja: 生の人間フィードバック、自動スコア、実行時メトリック、発生済みの訓練、PPO、又は推論実行。
    - zh: 被重命名为奖励模型分数、但没有已训练模型、版本、候选和尺度来源的一般质量分数。
      en: A generic quality score relabeled as a reward-model score without trained-model, version, candidate, and scale provenance.
      ja: 学習済みモデル、版、候補、尺度の来歴なしに報酬モデルスコアへ改名された一般品質スコア。
  semantic_kind: entity
  aliases: [training signal, curated training datum, 学习数据]
engineering:
  explanation:
    zh: InstructGPT 将人类演示、比较数据、奖励模型训练和 PPO 分为不同阶段。实现可将整理后的记录以 JSONL 或数据集引用保存为 LearningSignal，并让独立训练工作负载消费它。系统不得把采集到的 HumanFeedback 或单个 Score 直接写成训练信号。
    en: InstructGPT separates human demonstrations, comparison data, reward-model training, and PPO into distinct stages. Implementation can retain curated records as JSONL or dataset references in LearningSignal and let an independent training workload consume them. System must not write collected HumanFeedback or one Score directly as a training signal.
    ja: InstructGPT は人間デモ、比較データ、報酬モデル訓練、PPO を異なる段階に分ける。実装は整備済み記録を JSONL 又はデータセット参照として LearningSignal に保持し、独立した訓練ワークロードに消費させられる。収集した HumanFeedback 又は一つの Score を直接訓練信号として書いてはならない。
  typical_input:
    - description: Local curated supervised-learning record.
      format: |
        {"dataset_ref":"dataset:support-demonstrations-v1","source_ref":"SourceReference:human-feedback-batch-7","transformation_policy_ref":"policy:training-consent-v1","learning_objective":"supervised"}
      source_claims: [claim-learning-signal-instructgpt, claim-learning-signal-design]
  typical_output:
    - description: Local learning-signal record.
      format: |
        {"signal_id":"learning-signal-104","learning_objective":"supervised","dataset_ref":"dataset:support-demonstrations-v1","source_ref":"SourceReference:human-feedback-batch-7","transformation_policy_ref":"policy:training-consent-v1"}
      source_claims: [claim-learning-signal-design]
  reference_implementations:
    - name: Training language models to follow instructions with human feedback
      url: https://arxiv.org/abs/2203.02155
      description: Distinct human-data and training stages motivating the preparation boundary.
    - name: JSON Lines
      url: https://jsonlines.org/
      description: Common line-delimited JSON interchange format for curated dataset records.
structure:
  identity_keys: [signal_id]
  fields:
    - id: signal_id
      labels: {zh: 信号标识, en: Signal identifier, ja: 信号識別子}
      definitions:
        zh: 唯一标识一条经过准备的学习数据实体。
        en: Uniquely identifies one prepared learning-data entity.
        ja: 一件の準備済み学習データエンティティを一意に識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: learning-signal-104
      allowed_values: []
      source_claims: [claim-learning-signal-design]
    - id: learning_objective
      labels: {zh: 学习目标, en: Learning objective, ja: 学習目的}
      definitions:
        zh: 指出该记录为监督、偏好或真实奖励建模的哪一种数据准备，而不是训练活动名称。
        en: States whether record preparation serves supervised, preference, or genuine reward modeling and is not a training-activity name.
        ja: 記録準備が教師あり、選好、真の報酬モデリングのどれに役立つかを示し、訓練活動名ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: supervised
      allowed_values: [supervised, preference, reward]
      source_claims: [claim-learning-signal-instructgpt, claim-learning-signal-design]
    - id: dataset_ref
      labels: {zh: 数据集引用, en: Dataset reference, ja: データセット参照}
      definitions:
        zh: 指向包含准备后记录及其版本的不可变或可追溯数据集。
        en: Reference to immutable or traceable dataset containing prepared records and version.
        ja: 準備済み記録と版を含む不変又は追跡可能なデータセットへの参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: dataset:support-demonstrations-v1
      allowed_values: []
      source_claims: [claim-learning-signal-design]
    - id: source_ref
      labels: {zh: 来源引用, en: Provenance reference, ja: 来歴参照}
      definitions:
        zh: 指向人类输入、授权数据或其他允许来源的 SourceReference，而非匿名文本。
        en: Reference to SourceReference for human input, authorized data, or another allowed source rather than anonymous text.
        ja: 匿名テキストではなく、人間入力、許可済みデータ、又は他の許容発生源の SourceReference への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: SourceReference:human-feedback-batch-7
      allowed_values: []
      source_claims: [claim-learning-signal-design]
    - id: transformation_policy_ref
      labels: {zh: 转换政策引用, en: Transformation policy reference, ja: 変換方針参照}
      definitions:
        zh: 指向规定如何清洗、筛选、配对或标签化来源数据以供学习使用的版本化政策。
        en: Reference to versioned policy governing how source data is cleaned, filtered, paired, or labeled for learning use.
        ja: 学習利用のために発生源データをどうクリーニング、選別、対化、又はラベル付けするかを規定する版管理方針への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: policy:training-consent-v1
      allowed_values: []
      source_claims: [claim-learning-signal-design]
  constraints:
    - id: learning-signal-has-provenance-and-policy
      severity: error
      expression_language: plain
      expression: dataset_ref, source_ref, and transformation_policy_ref must all resolve before learning signal can be consumed by training.
      explanation:
        zh: 没有来源或转换政策的数据不应被默认为可训练。
        en: Data without provenance or transformation policy must not be presumed trainable.
        ja: 来歴又は変換方針のないデータを訓練可能と推定してはならない。
      source_claims: [claim-learning-signal-design]
    - id: learning-signal-objective-boundary
      severity: error
      expression_language: plain
      expression: learning_objective reward requires a provenance- and policy-bounded training datum, and learning_objective preference requires chosen-rejected pair semantics; RewardModelScore and a generic score are inference or evaluation outputs, not substitutes for either training datum.
      explanation:
        zh: 奖励与偏好训练需要明确的数据准备结构；模型推断分数或普通质量分数都不能替代训练数据。
        en: Reward and preference training require explicit data-preparation structure; neither a model inference score nor a generic quality score can replace training data.
        ja: 報酬及び選好訓練には明示的なデータ準備構造が必要であり、モデル推論スコア又は一般品質スコアで訓練データを代替できない。
      source_claims: [claim-learning-signal-instructgpt, claim-learning-signal-design]
  required_relations:
    - id: learning-signal-has-provenance-source-reference
      direction: outgoing
      predicate: has_provenance
      target_concept_id: SourceReference
      cardinality: {min: 1, max: null}
      explanations:
        zh: 每条 LearningSignal 至少必须有一个可追溯来源引用。
        en: Each LearningSignal must have at least one traceable provenance reference.
        ja: 各 LearningSignal は少なくとも一つの追跡可能な来歴参照を持たなければならない。
      source_claims: [claim-learning-signal-design]
examples:
  - id: learning-signal-positive-curated-demonstrations

    labels: {zh: InstructGPT SFT 演示数据, en: InstructGPT SFT demonstration data, ja: InstructGPT SFT デモデータ}

    descriptions:
      zh: "InstructGPT (Ouyang et al., 2022) RLHF: SFT -> human-ranked RM r_theta(x,y) -> PPO; ~13k demos + 33k comparisons; LearningSignal maps supervised/preference data-prep boundary."
      en: "InstructGPT (Ouyang et al., 2022) RLHF: SFT -> human-ranked RM r_theta(x,y) -> PPO; ~13k demos + 33k comparisons; LearningSignal maps supervised/preference data-prep boundary."
      ja: "InstructGPT SFT->RM->PPO; LearningSignal data prep boundary."
    field_values: {signal_id: instructgpt-sft-demonstrations, learning_objective: supervised, dataset_ref: 'dataset:instructgpt-sft-13k', source_ref: 'SourceReference:openai-api-playground-labelers', transformation_policy_ref: 'policy:instructgpt-sft-v1'}
    related_node_ids: [LearningSignal, SourceReference]
    related_relation_ids: [learning-signal-has-provenance-source-reference]

    source_claims: [claim-learning-signal-instructgpt, claim-learning-signal-design]
  - id: learning-signal-counterexample-raw-feedback

    labels: {zh: 原始人类反馈直接作为信号, en: Raw human feedback directly as signal, ja: 生の人間フィードバックを直接信号にする}

    descriptions:
      zh: "Retry without reflect(trajectory) is not Reflexion-style LearningSignal."
      en: "Retry without reflect(trajectory) is not Reflexion-style LearningSignal."
      ja: "No reflect rejects Reflexion-style LearningSignal."
    field_values: {signal_id: null, learning_objective: null, dataset_ref: null, source_ref: null, transformation_policy_ref: null}
    related_node_ids: [HumanFeedback, LearningSignal]
    related_relation_ids: []

    source_claims: [claim-learning-signal-design]
  - id: learning-signal-boundary-reward-score

    labels: {zh: "通用评分、训练信号与模型分数的边界", en: "Boundary between generic score, learning signal, and model score", ja: "一般スコア、学習信号、モデルスコアの境界"}

    descriptions:
      zh: "DPO requires learning_objective=preference; cannot auto-convert 1-5 Score to chosen/rejected for LearningSignal."
      en: "DPO requires learning_objective=preference; cannot auto-convert 1-5 Score to chosen/rejected for LearningSignal."
      ja: "DPO preference objective required."
    field_values: {signal_id: null, learning_objective: reward, dataset_ref: null, source_ref: null, transformation_policy_ref: null}
    related_node_ids: [LearningSignal, Score, RewardModelScore]
    related_relation_ids: []

    source_claims: [claim-learning-signal-instructgpt, claim-learning-signal-design]
  - id: learning-signal-instance-learning-signal-104

    labels: {zh: learning-signal-104 的具体学习信号, en: Concrete learning signal learning-signal-104, ja: 具体的な学習信号 learning-signal-104}

    descriptions:
      zh: "DSPy instance: compiled demos=4->proposal_id=prompt-opt-v3->LearningSignal ChangeProposal."
      en: "DSPy instance: compiled demos=4->proposal_id=prompt-opt-v3->LearningSignal ChangeProposal."
      ja: "DSPy instance maps to LearningSignal ChangeProposal."
    field_values: {signal_id: learning-signal-104, learning_objective: supervised, dataset_ref: 'dataset:support-demonstrations-v1', source_ref: 'SourceReference:human-feedback-batch-7', transformation_policy_ref: 'policy:training-consent-v1'}
    related_node_ids: [LearningSignal, SourceReference, HumanFeedback]
    related_relation_ids: [learning-signal-has-provenance-source-reference]

    source_claims: [claim-learning-signal-design]
parent_relation: null
relations:
  - id: LearningSignal-hasProvenance-SourceReference
    predicate: has_provenance
    target: concept:SourceReference
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 学习信号有来源引用, en: learning signal has provenance source reference, ja: 学習信号が来歴ソース参照を持つ}
    definitions:
      zh: LearningSignal 指向可审计来源，而不是把数据来源隐含在训练脚本中。
      en: LearningSignal points to auditable source rather than leaving data origin implicit in training script.
      ja: LearningSignal は監査可能な発生源を指し、データ起源を訓練スクリプト内に暗黙化しない。
    cardinality: {source: {min: 1, max: null}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: is_provenance_for
      labels: {zh: 来源用于学习信号, en: source is provenance for learning signal, ja: ソースが学習信号の来歴である}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-learning-signal-design]
    distinct_fact_rationale:
      zh: 该关系记录数据出处，不宣称训练已经消费该数据。
      en: This relation records data origin and does not state that training consumed the data.
      ja: この関係はデータ起源を記録し、訓練がデータを消費したとは示さない。
    layout_role: cross-link
sources:
  - id: instructgpt-learning-signal
    title: Training language models to follow instructions with human feedback
    url: https://arxiv.org/abs/2203.02155
    source_type: paper
    relevance: Describes human data preparation, reward model, and PPO as distinct stages.
  - id: json-lines-learning-signal
    title: JSON Lines
    url: https://jsonlines.org/
    source_type: standard
    relevance: Documents common newline-delimited JSON interchange used for curated records.
  - id: learning-signal-design
    title: Learning signal design inference
    url: https://arxiv.org/abs/2203.02155
    source_type: design-inference
    relevance: Separates provenance-governed prepared data from raw feedback and training execution.
source_claims:
  - id: claim-learning-signal-instructgpt
    source: instructgpt-learning-signal
    supports: InstructGPT uses distinct human demonstration, comparison, reward-model, and PPO stages rather than one undifferentiated feedback object.
    locator: "Abstract and methodology: demonstrations, comparisons, reward model, PPO"
    evidence_kind: official
    confidence: high
  - id: claim-learning-signal-design
    source: learning-signal-design
    supports: LearningSignal is explicitly prepared, provenance-governed data distinct from raw human feedback and actual training activity.
    locator: "Local learning signal boundary"
    evidence_kind: design-inference
    confidence: high


