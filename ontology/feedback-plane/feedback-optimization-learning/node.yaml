schema: moonweave.ai/ontology-node/v1
id: feedback-optimization-learning
kind: module
labels:
  zh: 学习数据、模型分数与变更提议
  en: Learning Data, Model Scores, and Change Proposals
  ja: 学習データ、モデルスコア、変更提案
semantics:
  short_definition:
    zh: 本模块组织经过明确转换的学习数据、可追溯的模型分数和未执行的变更提议。
    en: This module organizes explicitly transformed learning data, traceable model scores, and unexecuted change proposals.
    ja: 本モジュールは、明示的に変換された学習データ、追跡可能なモデルスコア、未実行の変更提案を組織します。
  definition:
    zh: 本模块保存 ChangeProposal、为训练明确准备的 LearningSignal 与 PreferenceExample，以及已训练奖励模型产生的 RewardModelScore。训练数据与模型分数是不同事实：前者有 dataset、来源与转换政策，后者有模型版本、候选、尺度与评分时间。InstructGPT RLHF 将 SFT demos、偏好比较、RM r_θ(x,y) 训练与 PPO 分为不同阶段；DPO 用 β 加权 log-ratio 直接在偏好对上优化，无需独立 RM。OpenAI fine-tuning POST /v1/fine_tuning/jobs 是训练契约，但不自动等于已完成权重更新。本模块不拥有 PPO 执行、优化循环、重试、路由或实际修订。
    en: "This module retains ChangeProposal, LearningSignal and PreferenceExample explicitly prepared for training, and RewardModelScore emitted by an already trained reward model. Training data and model scores are different facts: the former has dataset, provenance, and transformation policy, while the latter has model version, candidate, scale, and scoring time. InstructGPT RLHF separates SFT demos, preference comparisons, RM r_θ(x,y) training, and PPO into distinct stages; DPO optimizes directly on preference pairs with a β-weighted log-ratio without a separate RM. OpenAI fine-tuning POST /v1/fine_tuning/jobs is a training contract but does not automatically equal completed weight updates. This module does not own PPO execution, optimization loops, retry, routing, or actual revision."
    ja: 本モジュールは ChangeProposal、訓練用に明示的に準備された LearningSignal と PreferenceExample、及び学習済み報酬モデルが出力した RewardModelScore を保持します。訓練データとモデルスコアは別事実です。前者は dataset、来歴、変換方針を持ち、後者はモデル版、候補、尺度、採点時刻を持ちます。InstructGPT RLHF は SFT demos、選好比較、RM r_θ(x,y) 訓練、PPO を別段階に分け、DPO は独立 RM なしで β 重み log-ratio により選好対を直接最適化します。OpenAI fine-tuning POST /v1/fine_tuning/jobs は訓練契約ですが、完了した重み更新と自動的には同一になりません。本モジュールは PPO 実行、最適化ループ、再試行、ルーティング、実際の改訂を所有しません。
  why_needed:
    zh: 没有清晰边界，未审批的人类意见会被误当成训练数据，偏好对会被误当成模型输出，一个分数或计划性提议会被描述成正在运行的优化系统。
    en: Without a clear boundary, unapproved human input becomes training data by mistake, preference pairs are mistaken for model output, and a score or planned proposal is described as a running optimization system.
    ja: 明確な境界がなければ、未承認の人間入力が誤って訓練データになり、選好対がモデル出力と誤認され、スコアや計画提案が稼働中の最適化システムとして記述されます。
  includes:
    - zh: 有证据依据的 ChangeProposal，以及有 dataset、来源与转换政策的 LearningSignal 与 PreferenceExample。
      en: Evidence-grounded ChangeProposal and LearningSignal or PreferenceExample with dataset, provenance, and transformation policy.
      ja: 証拠に根拠を持つ ChangeProposal と、dataset、来歴、変換方針を持つ LearningSignal、PreferenceExample。
    - zh: 有已训练模型、版本、候选、尺度与时间来源的 RewardModelScore。
      en: RewardModelScore with trained-model, version, candidate, scale, and time provenance.
      ja: 学習済みモデル、版、候補、尺度、時刻の来歴を持つ RewardModelScore。
  excludes:
    - zh: 原始日志、遥测、人类原话、PPO 活动、fine-tuning 作业运行时与优化循环控制。
      en: Raw logs, telemetry, original human statements, PPO activities, fine-tuning job runtime, and optimization-loop control.
      ja: 生ログ、テレメトリ、人間原文、PPO 活動、fine-tuning ジョブ実行時、最適化ループ制御。
    - zh: 已执行的 RevisionActivity 与已生成的 RevisionArtifact。
      en: Executed RevisionActivity and generated RevisionArtifact.
      ja: 実行済み RevisionActivity と生成済み RevisionArtifact。
  semantic_kind: null
  aliases: [training data preparation, proposal evidence]
engineering:
  explanation:
    zh: 新集成应把 InstructGPT RLHF（SFT → RM r_θ(x,y) → PPO）、DPO（β 加权 log-ratio，无独立 RM）、OpenAI fine-tuning POST /v1/fine_tuning/jobs 视为可映射的学习 API 形状，再用 Moonweave 本地对象记录 LearningSignal、PreferenceExample、RewardModelScore 与 ChangeProposal。SFT demo 与 preference pair 是训练数据契约；fine-tuning job 是提交记录；RM logits 或 DPO loss 是模型输出证据，但不自动等于已部署权重或正在运行的 PPO 循环。
    en: "New integrations should treat InstructGPT RLHF (SFT → RM r_θ(x,y) → PPO), DPO (β-weighted log-ratio, no separate RM), and OpenAI fine-tuning POST /v1/fine_tuning/jobs as mappable learning API shapes, then persist Moonweave-local LearningSignal, PreferenceExample, RewardModelScore, and ChangeProposal objects. SFT demos and preference pairs are training-data contracts; a fine-tuning job is a submission record; RM logits or DPO loss are model-output evidence but do not automatically equal deployed weights or a running PPO loop."
    ja: 新しい統合では InstructGPT RLHF（SFT → RM r_θ(x,y) → PPO）、DPO（β 重み log-ratio、独立 RM なし）、OpenAI fine-tuning POST /v1/fine_tuning/jobs を写像可能な学習 API 形状として扱い、Moonweave ローカルの LearningSignal、PreferenceExample、RewardModelScore、ChangeProposal を保存します。SFT demo と preference pair は訓練データ契約、fine-tuning job は提出記録、RM logits や DPO loss はモデル出力証拠ですが、デプロイ済み重みや稼働中 PPO ループと自動的には同一になりません。
  typical_input:
    - description: InstructGPT-style SFT demonstration record for supervised fine-tuning data prep.
      format: |
        {
          "prompt": "Explain photosynthesis simply.",
          "completion": "Plants convert sunlight into chemical energy...",
          "dataset_ref": "dataset:instructgpt-sft-demos",
          "learning_objective": "supervised"
        }
      source_claims: [claim-learning-instructgpt-rlhf]
    - description: DPO preference pair with prompt, chosen, and rejected completions.
      format: |
        {
          "prompt": "How do I reset my password?",
          "chosen": "Use the verified reset link sent to your email.",
          "rejected": "Share your password here and I will reset it.",
          "learning_objective": "preference",
          "dataset_ref": "dataset:preference-v1"
        }
      source_claims: [claim-learning-dpo-preference]
    - description: OpenAI fine-tuning job creation for supervised or preference-trained model.
      format: |
        POST /v1/fine_tuning/jobs
        {
          "model": "gpt-4.1-mini-2025-04-14",
          "training_file": "file-sft-demos-v2",
          "method": {"type": "supervised"}
        }
      source_claims: [claim-learning-openai-finetuning]
    - description: Reward-model classifier output logits after scoring a candidate completion.
      format: |
        {
          "model": "reward-model-r-theta-v3",
          "prompt": "How do I reset my password?",
          "completion": "Use the verified reset link.",
          "logits": [[0.73]]
        }
      source_claims: [claim-learning-rm-output]
  typical_output:
    - description: Moonweave-local learning projection separating preference datum, model score, and unexecuted proposal.
      format: |
        {
          "schema_owner": "moonweave-local-design",
          "preference_example_ref": "PreferenceExample:preference-105",
          "reward_model_score_ref": "RewardModelScore:reward-model-score-104",
          "change_proposal_ref": "ChangeProposal:proposal-threshold-14",
          "fine_tuning_job_ref": null
        }
      source_claims: [claim-learning-module-design]
  reference_implementations:
    - name: InstructGPT RLHF
      url: https://arxiv.org/abs/2203.02155
      description: SFT on ~13k demos, RM r_θ(x,y) on ~33k comparisons, then PPO policy optimization.
    - name: Direct Preference Optimization
      url: https://arxiv.org/abs/2305.18290
      description: β-weighted log-ratio optimization on preference pairs without a separate reward model.
    - name: OpenAI Fine-tuning API
      url: https://platform.openai.com/docs/guides/fine-tuning
      description: POST /v1/fine_tuning/jobs for supervised and preference fine-tuning contracts.
    - name: Hugging Face TRL DPOTrainer
      url: https://huggingface.co/docs/trl/en/dpo_trainer
      description: prompt, chosen, and rejected fields for DPO training data.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 模块标识, en: Module identifier, ja: モジュール識別子}
      definitions:
        zh: 学习数据与变更提议模块的稳定标识，不是单条 PreferenceExample 或 fine-tuning job 标识。
        en: Stable identifier for the learning-data-and-proposals module, not an individual PreferenceExample or fine-tuning job identifier.
        ja: 学習データと変更提案モジュールの安定識別子であり、個別 PreferenceExample や fine-tuning job の識別子ではありません。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^feedback-optimization-learning$'
      example_value: feedback-optimization-learning
      allowed_values: []
      source_claims: [claim-learning-module-design]
    - id: execution_boundary
      labels: {zh: 执行边界, en: Execution boundary, ja: 実行境界}
      definitions:
        zh: 表明本模块只保存数据和提议，不执行训练、奖励建模、PPO 或修订。
        en: States this module retains data and proposals only and does not execute training, reward modeling, PPO, or revision.
        ja: 本モジュールはデータと提案だけを保持し、訓練、報酬モデリング、PPO、改訂を実行しないことを示します。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: data-and-proposals-only
      allowed_values: [data-and-proposals-only]
      source_claims: [claim-learning-instructgpt-rlhf, claim-learning-module-design]
    - id: learning_objective
      labels: {zh: 学习目标, en: Learning objective, ja: 学習目的}
      definitions:
        zh: 声明训练数据契约类型，例如 supervised（SFT demo）或 preference（chosen/rejected 对）。
        en: Declares the training-data contract type, such as supervised (SFT demo) or preference (chosen/rejected pair).
        ja: 訓練データ契約型（supervised SFT demo または preference chosen/rejected 対など）を宣言します。
      datatype: string
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: preference
      allowed_values: [supervised, preference, reward_model, dpo]
      source_claims: [claim-learning-instructgpt-rlhf, claim-learning-dpo-preference]
    - id: dataset_ref
      labels: {zh: 数据集引用, en: Dataset reference, ja: データセット参照}
      definitions:
        zh: 指向承载 LearningSignal 或 PreferenceExample 的数据集或训练文件的稳定引用。
        en: Stable reference to the dataset or training file holding a LearningSignal or PreferenceExample.
        ja: LearningSignal または PreferenceExample を保持する dataset または訓練ファイルへの安定参照。
      datatype: reference
      required: false
      cardinality: {min: 0, max: null}
      pattern: null
      example_value: dataset:instructgpt-comparisons
      allowed_values: []
      source_claims: [claim-learning-instructgpt-rlhf, claim-learning-dpo-preference]
  constraints:
    - id: learning-module-raw-feedback-requires-transformation
      severity: error
      expression_language: plain
      expression: Raw HumanFeedback must not enter this module as training data until a LearningSignal records source, transformation, and policy basis.
      explanation:
        zh: 人类意见的采集与训练数据准备是两个不同的可审计步骤。
        en: Collecting human input and preparing training data are two different auditable steps.
        ja: 人間入力の収集と訓練データ準備は二つの異なる監査可能な手順です。
      source_claims: [claim-learning-instructgpt-rlhf, claim-learning-module-design]
    - id: learning-module-excludes-running-optimization
      severity: error
      expression_language: plain
      expression: No module member may assert an optimization loop, PPO execution, fine-tuning job runtime completion, retry, routing action, or completed revision.
      explanation:
        zh: 这些是时间边界活动或运行时控制，不能由数据模块接管。
        en: These are time-bounded activities or runtime controls and cannot be owned by a data module.
        ja: これらは時間境界を持つ活動又は実行時制御であり、データモジュールが所有できません。
      source_claims: [claim-learning-instructgpt-rlhf, claim-learning-openai-finetuning, claim-learning-module-design]
    - id: learning-module-separates-data-from-score
      severity: error
      expression_language: plain
      expression: A PreferenceExample or SFT demo must not be collapsed with a RewardModelScore; they retain separate identities and provenance.
      explanation:
        zh: 训练数据与模型分数是不同事实，不能混为同一对象。
        en: Training data and model scores are different facts and cannot be collapsed into one object.
        ja: 訓練データとモデルスコアは別事実であり、一オブジェクトに混同できません。
      source_claims: [claim-learning-rm-output, claim-learning-module-design]
  required_relations:
    - id: learning-module-organizes-change-proposal
      direction: outgoing
      predicate: organizes
      target_concept_id: ChangeProposal
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块组织至少一条有依据的未执行提议。
        en: The module organizes at least one grounded unexecuted proposal.
        ja: モジュールは少なくとも一つの根拠ある未実行提案を組織します。
      source_claims: [claim-learning-module-design]
    - id: learning-module-organizes-learning-signal
      direction: outgoing
      predicate: organizes
      target_concept_id: LearningSignal
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块组织至少一条经过明确数据转换的学习信号。
        en: The module organizes at least one learning signal produced by explicit data transformation.
        ja: モジュールは明示的なデータ変換で生成された少なくとも一つの学習信号を組織します。
      source_claims: [claim-learning-module-design]
    - id: learning-module-organizes-reward-model-score
      direction: outgoing
      predicate: organizes
      target_concept_id: RewardModelScore
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块组织至少一条来自已训练奖励模型、且与训练数据保持独立身份的可追溯分数。
        en: The module organizes at least one traceable score from a trained reward model that retains an identity separate from training data.
        ja: モジュールは、訓練データとは別の同一性を保つ、学習済み報酬モデル由来の追跡可能なスコアを少なくとも一つ組織します。
      source_claims: [claim-learning-rm-output, claim-learning-module-design]
examples:
  - id: learning-example-instructgpt-rlhf-pipeline
    labels:
      zh: InstructGPT RLHF 全链路
      en: InstructGPT RLHF full pipeline
      ja: InstructGPT RLHF 全链路
    descriptions:
      zh: InstructGPT 用 ~13k SFT demos 监督微调基座模型，用 ~33k 人类比较训练 RM r_θ(x,y)，再用 PPO 优化策略；本模块保存 SFT demo 与 PreferenceExample 数据集引用及 RewardModelScore，PPO 执行不在本模块。
      en: InstructGPT SFTs the base model on ~13k demos, trains RM r_θ(x,y) on ~33k human comparisons, then optimizes the policy with PPO; this module retains SFT demo and PreferenceExample dataset references and RewardModelScore, while PPO execution is outside this module.
      ja: InstructGPT は ~13k SFT demos で基盤モデルを監督 fine-tuning し、~33k 人間比較で RM r_θ(x,y) を訓練し、PPO で方策を最適化。本モジュールは SFT demo と PreferenceExample の dataset 参照および RewardModelScore を保持し、PPO 実行は本モジュール外です。
    example_source:
      product: InstructGPT
      url: https://arxiv.org/abs/2203.02155
      version: SFT → RM r_θ(x,y) → PPO; ~13k demos + ~33k comparisons
    field_values:
      sft_demo_count: 13000
      comparison_count: 33000
      reward_model: r_theta_x_y
      optimization_method: PPO
      learning_objective: preference
      dataset_ref: dataset:instructgpt-comparisons
      execution_boundary: data-and-proposals-only
    related_node_ids:
      - feedback-optimization-learning
      - LearningSignal
      - PreferenceExample
      - RewardModelScore
    related_relation_ids: []
    source_claims:
      - claim-learning-instructgpt-rlhf
      - claim-learning-module-design
  - id: learning-example-dpo-preference-pair
    labels:
      zh: DPO 偏好对训练
      en: DPO training on preference pairs
      ja: DPO 選好対訓練
    descriptions:
      zh: DPO 直接在 prompt/chosen/rejected 三元组上优化，用 β 加权 log-ratio 最大化 chosen 相对 rejected 的概率，无需独立 RM；PreferenceExample preference-105 记录 learning_objective=preference 与 dataset_ref，不等同于 RewardModelScore。
      en: DPO optimizes directly on prompt/chosen/rejected triples with a β-weighted log-ratio maximizing chosen over rejected probability without a separate RM; PreferenceExample preference-105 records learning_objective=preference and dataset_ref, distinct from RewardModelScore.
      ja: DPO は prompt/chosen/rejected 三つ組を β 重み log-ratio で直接最適化し、独立 RM なしで chosen を rejected より最大化。PreferenceExample preference-105 が learning_objective=preference と dataset_ref を記録し、RewardModelScore とは別です。
    example_source:
      product: Direct Preference Optimization
      url: https://arxiv.org/abs/2305.18290
      version: β-weighted log-ratio; no separate reward model
    field_values:
      prompt: "How do I reset my password?"
      chosen: "Use the verified reset link sent to your email."
      rejected: "Share your password here and I will reset it."
      learning_objective: preference
      optimization_method: DPO
      beta: 0.1
      preference_example_id: preference-105
      dataset_ref: dataset:preference-v1
    related_node_ids:
      - feedback-optimization-learning
      - PreferenceExample
      - LearningSignal
    related_relation_ids: []
    source_claims:
      - claim-learning-dpo-preference
      - claim-learning-module-design
  - id: learning-example-openai-finetuning-job
    labels:
      zh: OpenAI fine-tuning 作业契约
      en: OpenAI fine-tuning job contract
      ja: OpenAI fine-tuning ジョブ契約
    descriptions:
      zh: POST /v1/fine_tuning/jobs 提交 model=gpt-4.1-mini 与 training_file=file-sft-demos-v2；返回 job id=ftjob-abc123 与 status=queued 是训练提交记录，本模块可引用该 job 作为 LearningSignal 来源，但不把 queued 状态等同于已完成权重更新。
      en: POST /v1/fine_tuning/jobs submits model=gpt-4.1-mini and training_file=file-sft-demos-v2; returned job id=ftjob-abc123 and status=queued is a training submission record; this module may cite the job as LearningSignal provenance but does not treat queued status as completed weight updates.
      ja: POST /v1/fine_tuning/jobs が model=gpt-4.1-mini と training_file=file-sft-demos-v2 を提出。返却 job id=ftjob-abc123 と status=queued は訓練提出記録。本モジュールは job を LearningSignal 来歴として引用できますが、queued 状態を完了した重み更新と同一視しません。
    example_source:
      product: OpenAI Fine-tuning API
      url: https://platform.openai.com/docs/guides/fine-tuning
      version: POST /v1/fine_tuning/jobs
    field_values:
      endpoint: /v1/fine_tuning/jobs
      model: gpt-4.1-mini-2025-04-14
      training_file: file-sft-demos-v2
      method_type: supervised
      job_id: ftjob-abc123
      status: queued
      execution_boundary: data-and-proposals-only
    related_node_ids:
      - feedback-optimization-learning
      - LearningSignal
    related_relation_ids: []
    source_claims:
      - claim-learning-openai-finetuning
      - claim-learning-module-design
  - id: learning-example-reward-model-score
    labels:
      zh: 奖励模型分数与训练数据分离
      en: Reward model score separate from training data
      ja: 報酬モデルスコアと訓練データの分離
    descriptions:
      zh: 已训练 RM r_theta_v3 对 prompt/completion 对返回 logits=[[0.73]]；RewardModelScore reward-model-score-104 记录 model_version、scale 与 scoring_time，与 PreferenceExample preference-105 保持独立身份。
      en: Trained RM r_theta_v3 returns logits=[[0.73]] for a prompt/completion pair; RewardModelScore reward-model-score-104 records model_version, scale, and scoring_time with an identity separate from PreferenceExample preference-105.
      ja: 学習済み RM r_theta_v3 が prompt/completion 対に logits=[[0.73]] を返す。RewardModelScore reward-model-score-104 が model_version、scale、scoring_time を記録し、PreferenceExample preference-105 とは独立した同一性を保持します。
    example_source:
      product: InstructGPT Reward Model
      url: https://arxiv.org/abs/2203.02155
      version: r_θ(x,y) scalar score from trained classifier
    field_values:
      model: reward-model-r-theta-v3
      prompt: "How do I reset my password?"
      completion: "Use the verified reset link."
      logits: [[0.73]]
      reward_model_score_id: reward-model-score-104
      preference_example_id: preference-105
    related_node_ids:
      - feedback-optimization-learning
      - RewardModelScore
      - PreferenceExample
    related_relation_ids: []
    source_claims:
      - claim-learning-rm-output
      - claim-learning-module-design
  - id: learning-example-proposal-versus-revision
    labels:
      zh: 变更提议与实际修订的边界
      en: Boundary between proposal and actual revision
      ja: 提案と実際の改訂の境界
    descriptions:
      zh: EvaluationRun eval-retrieval-14 判定 recall 未达标后，ChangeProposal proposal-threshold-14 建议调整 reranker@5 阈值；该提议有 evaluation_run 证据但尚未执行；RevisionActivity 与 RevisionArtifact 属于 feedback-review-optimization，不在本模块。
      en: After EvaluationRun eval-retrieval-14 finds recall below target, ChangeProposal proposal-threshold-14 recommends adjusting reranker@5 threshold; the proposal has evaluation_run evidence but is not executed; RevisionActivity and RevisionArtifact belong to feedback-review-optimization, not this module.
