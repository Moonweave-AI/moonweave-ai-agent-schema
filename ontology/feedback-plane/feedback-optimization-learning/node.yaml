        en: A record whose identity key is proposal_id and that fixes baseline_target_version_ref, candidate_diff, supporting_signal_refs, and expected_metric_changes is a ChangeProposal owned by optimization and learning. A record whose identity key is decision_id and that fixes request_ref, policy_version_ref, determining_rule_refs, and decision_kind is a PolicyDecision owned by permission and policy.
        ja: identity key が proposal_id で、baseline_target_version_ref・candidate_diff・supporting_signal_refs・expected_metric_changes を固定する record は optimization/learning が所有する ChangeProposal です。identity key が decision_id で、request_ref・policy_version_ref・determining_rule_refs・decision_kind を固定する record は permission/policy が所有する PolicyDecision です。
