      en: Loop-19 consumes learning signals ls-f-8, pref-17, and reward r-91, consumes measurement m-77, and uses metric success-rate@v2.
      ja: loop-19 は learning signals ls-f-8、pref-17、reward r-91 と measurement m-77 を consumes し metric success-rate@v2 を uses します。
    field_values:
      optimization_loop_id: loop-19
      optimization_target_id: prompt-router
      target_version: "12"
      aggregation_window: 2026-07-01T00:00:00Z/2026-07-14T23:59:59Z
      learning_signal_ids:
        - ls-f-8
        - pref-17
        - reward-r-91
      measurement_id: m-77
      metric_id: success-rate
      metric_version: v2
      weights:
        ls-f-8: 0.4
        pref-17: 0.35
        reward-r-91: 0.25
      aggregation_method: weighted-mean
      candidate_set_digest: sha256:7b1a4f
    related_node_ids:
      - OptimizationLoop
      - LearningSignal
      - Measurement
      - Metric
    related_relation_ids:
      - OptimizationLoop-consumes-LearningSignal
      - OptimizationLoop-consumes-Measurement
      - OptimizationLoop-uses-Metric
    expected_result:
      zh: 查询返回同一目标版本和窗口下的信号、测量与指标输入。
      en: The query returns signals, measurement, and metric inputs under the same target version and window.
      ja: query は同じ target 版・window 下の signal、measurement、metric input を返します。
    why_valid_or_invalid:
      zh: 循环输入清单固定每项证据身份、目标版本和聚合窗口，允许重放候选比较。
      en: The loop manifest fixes each evidence identity, target version, and aggregation window so candidate comparison is replayable.
      ja: loop manifest が各証拠 ID、target 版、集約 window を固定し候補比較を再生可能にします。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-feedback-optimization-learning-003
