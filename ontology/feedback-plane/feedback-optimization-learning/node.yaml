    flat_root_exception_concept_ids:
      - ChangeProposal
      - LearningSignal
      - OptimizationLoop
    review:
      review_status: accepted
      reviewers:
        - reviewer_id: moonweave-feedback-domain-reviewer
          reviewer_role: domain
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 逐项核验后，本模块区分 OptimizationTarget 规范、OptimizationLoop 活动、LearningSignal 证据信息与 ChangeProposal 提案信息四条身份轴。optimizes、consumes、produces 与 applies_to 保留实际约束和来源，但均为跨轴事实；LearningSignal 与 ChangeProposal 各自通过 is_a 展开下位类型。
            en: "After point-by-point review, the module distinguishes four identity axes: OptimizationTarget specification, OptimizationLoop activity, LearningSignal evidence information, and ChangeProposal proposal information. optimizes, consumes, produces, and applies_to retain their constraints and provenance as cross-axis facts; LearningSignal and ChangeProposal expand their own subtypes through is_a."
            ja: 個別審査後、本 module は OptimizationTarget specification・OptimizationLoop activity・LearningSignal evidence information・ChangeProposal proposal information の四 identity axis を区別します。optimizes・consumes・produces・applies_to は制約と出典を保持する cross-axis fact で、LearningSignal と ChangeProposal は is_a で各 subtype を展開します。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-16
          decision_note:
            zh: 结构审查不再用目标适用、活动产出或信号适用事实伪造父链。OptimizationTarget、OptimizationLoop、LearningSignal 与 ChangeProposal 均是诚实入口；只有 Feedback/Preference/Reward 信号及 Parameter/Policy/Prompt 提案通过真实 is_a 形成内部层级。
            en: Structure review no longer fabricates parent chains from target applicability, activity output, or signal applicability facts. OptimizationTarget, OptimizationLoop, LearningSignal, and ChangeProposal are honest entries; only Feedback/Preference/Reward signals and Parameter/Policy/Prompt proposals form internal hierarchies through genuine is_a.
            ja: structure review は target applicability・activity output・signal applicability fact から親 chain を作りません。OptimizationTarget・OptimizationLoop・LearningSignal・ChangeProposal は誠実な entry で、Feedback/Preference/Reward signal と Parameter/Policy/Prompt proposal だけが真正な is_a で内部階層を形成します。
