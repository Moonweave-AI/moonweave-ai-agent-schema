schema: moonweave.ai/ontology-node/v1
id: feedback-optimization-learning
kind: module
status: accepted
labels:
  zh: 优化与学习
  en: Optimization and learning
  ja: 最適化と学習
semantics:
  short_definition:
    zh: 把多次运行、评估、审查和故障中的证据汇总为可归因的 LearningSignal，并在 OptimizationLoop 中围绕明确的 OptimizationTarget 搜索和比较候选，产出受治理的 ChangeProposal。学习信号说明“证据支持什么变化”，提案说明“建议怎样改”，二者都不等于变更已经生效。
    en: Aggregates evidence from multiple runs, evaluations, reviews, and failures into attributable LearningSignals, then searches and compares candidates around an explicit OptimizationTarget within an OptimizationLoop to produce governed ChangeProposals. A learning signal states what change the evidence supports, and a proposal states how to change; neither means the change is already effective.
    ja: 複数の run・evaluation・review・failure の証拠を帰属可能な LearningSignal へ集約し、OptimizationLoop 内で明示 OptimizationTarget を中心に候補を探索・比較して統制された ChangeProposal を生成します。learning signal は「証拠がどの変化を支持するか」、proposal は「どう変更するか」を示し、どちらも変更済みを意味しません。
  definition:
    zh: 本模块的四个直属根形成跨运行学习链。OptimizationTarget 是待改进对象及允许变更范围的稳定指向；LearningSignal 是由有出处、可比较的证据推导出的学习信息；OptimizationLoop 是搜索、生成、评估和选择候选的优化过程；ChangeProposal 是带依据、预期影响、风险与审批状态的候选变化。一次评估的 Metric/Measurement 仍归评估模块，循环轮次控制仍归编排模块，批准后的部署、验证和回滚仍归纠正模块。
    en: The four direct roots form a cross-run learning chain. OptimizationTarget is a stable pointer to what may improve and the allowed change scope; LearningSignal is learning information derived from attributable and comparable evidence; OptimizationLoop is the process that searches, generates, evaluates, and selects candidates; ChangeProposal is a candidate change with rationale, expected impact, risk, and approval state. Metrics and Measurements from one evaluation remain evaluation-owned, loop-round control remains orchestration-owned, and deployment, verification, and rollback after approval remain correction-owned.
    ja: 四つの直下根は実行横断学習連鎖を形成します。OptimizationTarget は改善対象と許容変更範囲への安定参照、LearningSignal は出所付き比較可能証拠から導く学習情報、OptimizationLoop は候補を探索・生成・評価・選択する過程、ChangeProposal は根拠・期待影響・risk・承認状態を持つ候補変更です。一回評価の Metric/Measurement は評価、loop round 制御は編成、承認後の配備・検証・rollback は修正が所有します。
  why_needed:
    zh: 把跨运行的评估、审查与故障证据汇聚为学习信号和受治理的变更提案，以持续改进明确的优化目标。
    en: Aggregate evaluation, review, and failure evidence across runs into learning signals and governed change proposals that improve explicit optimization targets.
    ja: 複数実行の評価・レビュー・障害証拠を学習信号と統制された変更提案へ集約し、明示された最適化目標を継続的に改善します。
  includes:
    - zh: 带出处、适用范围和聚合窗口的奖励、偏好、评估、审查与故障派生 LearningSignal。
      en: Reward-, preference-, evaluation-, review-, and failure-derived LearningSignals with provenance, applicability scope, and aggregation window.
      ja: 出所・適用範囲・集約 window を持つ reward・preference・evaluation・review・failure 由来 LearningSignal。
    - zh: OptimizationTarget、候选搜索与比较的 OptimizationLoop，以及提示、参数、策略或配置的 ChangeProposal。
      en: OptimizationTargets, OptimizationLoops for candidate search and comparison, and ChangeProposals for prompts, parameters, policies, or configuration.
      ja: OptimizationTarget、候補探索・比較の OptimizationLoop、prompt・parameter・policy・configuration の ChangeProposal。
  excludes:
    - zh: 原始 Metric 定义、Measurement 生成和一次评估运行的判定语义归评估与度量所有。
      en: Raw Metric definitions, Measurement production, and the adjudication semantics of one evaluation run belong to evaluation and measurement.
      ja: 元の Metric 定義・Measurement 生成・一回の評価実行の判定意味は評価と測定が所有します。
    - zh: 实际部署、验证或回滚某项变更的 CorrectionActivity 归审查与纠正所有；提案本身不等于变更已执行。
      en: CorrectionActivity that actually deploys, verifies, or rolls back a change belongs to review and correction; a proposal is not evidence that the change was executed.
      ja: 変更を実際に配備・検証・ロールバックする CorrectionActivity はレビューと是正が所有し、提案自体は変更実行の証拠ではありません。
    - zh: 学习信号不得直接修改核心安全策略、权限或生产配置；具体变更必须经过相应的授权与副作用闸门。
      en: Learning signals must not modify core safety policy, permissions, or production configuration directly; concrete changes require the relevant authorization and side-effect gates.
      ja: 学習信号は中核安全方針・権限・本番設定を直接変更してはならず、具体的変更には対応する認可と副作用ゲートが必要です。
  semantic_kind: null
  aliases: []
purpose:
  zh: 把跨运行证据转化为可解释、可比较、可审批的改进候选，同时保留从原始证据到提案、批准和实际变更之间的清晰边界。
  en: Turns cross-run evidence into explainable, comparable, and approvable improvement candidates while preserving clear boundaries from source evidence to proposal, approval, and actual change.
  ja: 実行横断証拠を説明可能・比較可能・承認可能な改善候補へ変換し、元証拠から proposal・approval・実変更までの境界を明確に保ちます。
