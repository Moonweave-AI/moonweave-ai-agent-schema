      candidate_concept_ids:
        - ChangeProposal
      overlap_reason:
        zh: 两者都可能含有风险与允许继续的信息，但 ChangeProposal 说明候选差异为何值得评审，PolicyDecision 才回答该输入在特定策略版本下是 allow、deny 还是 defer。提案的收益预测不能冒充授权，策略决定也不拥有提案的优化论证。
        en: Both may carry risk and proceed-related information, but ChangeProposal explains why a candidate diff merits review, whereas PolicyDecision answers whether that input is allowed, denied, or deferred under a particular policy revision. Predicted proposal benefit cannot stand in for authorization, and the policy decision does not own the proposal's optimization justification.
        ja: 両者は risk や proceed 情報を含み得ますが、ChangeProposal は candidate diff を審査する理由を、PolicyDecision は特定 policy revision 下で input が allow・deny・defer のどれかを答えます。proposal benefit 予測は authorization を代替せず、policy decision も proposal の optimization justification を所有しません。
      disambiguation_test:
