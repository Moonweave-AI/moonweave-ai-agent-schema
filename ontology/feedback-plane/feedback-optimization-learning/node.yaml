  key_notion:
    en: evidence-to-proposal optimization
    zh: 从证据到提案的优化
    ja: 証拠から提案への最適化
  owns_when:
    zh: 当对象定义可优化的目标与允许范围，汇总多次运行或评审证据形成 LearningSignal，描述一次候选搜索/比较过程，或形成尚待治理的 ChangeProposal 时，由本模块拥有。
    en: Own an object when it defines an optimization target and allowed scope, aggregates evidence across runs or reviews into a LearningSignal, describes a candidate search and comparison process, or forms a ChangeProposal still awaiting governance.
    ja: 対象が最適化対象と許容範囲を定義し、複数 run/review 証拠を LearningSignal へ集約し、候補探索・比較過程を記述し、または統制待ち ChangeProposal を形成する場合に所有します。
  references_when:
    zh: 评估、审查、诊断与运行事实引用各自所有者作为学习证据；策略审批、部署、验证和回滚流程引用这里的目标、信号与提案，但仍由其自身模块记录批准决定和实际变更。
    en: Evaluation, review, diagnostic, and runtime facts reference their canonical owners as learning evidence. Policy approval, deployment, verification, and rollback flows reference targets, signals, and proposals here while their own modules record authorization decisions and actual changes.
    ja: evaluation・review・diagnostic・runtime fact は正規所有者を学習証拠として参照します。policy approval・deployment・verification・rollback は本 target・signal・proposal を参照しますが、承認判断と実変更は各モジュールが記録します。
