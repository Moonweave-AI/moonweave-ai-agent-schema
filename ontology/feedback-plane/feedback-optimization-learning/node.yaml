schema: moonweave.ai/ontology-node/v1
id: feedback-optimization-learning
kind: module
status: accepted
labels:
  zh: 学习数据、模型分数与变更提议
  en: Learning Data, Model Scores, and Change Proposals
  ja: 学習データ、モデルスコア、変更提案
semantics:
  short_definition:
    zh: 组织经过明确转换的学习数据、可追溯的模型分数和有证据依据但未执行的变更提议。
    en: Module organizing explicitly transformed learning data, traceable model scores, and evidence-grounded unexecuted change proposals.
    ja: 明示的に変換された学習データ、追跡可能なモデルスコア、証拠に根拠を持つ未実行変更提案を組織するモジュール。
  definition:
    zh: 本模块保存未经执行的 ChangeProposal、为训练明确准备的 LearningSignal 和 PreferenceExample，以及已训练奖励模型产生的 RewardModelScore。训练数据与模型分数是不同事实：前者有数据集、来源和转换政策，后者有模型版本、候选、尺度和评分时间。本模块不拥有优化循环、模型训练执行、PPO、重试、路由或实际修订；这些时间边界过程分别属于编排、训练运行时或上游活动。原始人类反馈也不自动属于本模块，除非已被独立转换并记录为学习数据。
    en: >-
      This module retains unexecuted ChangeProposal, LearningSignal and PreferenceExample
      explicitly prepared for training, and RewardModelScore emitted by an already trained reward
      model. Training data and model scores are different facts: the former has dataset,
      provenance, and transformation policy, while the latter has model version, candidate, scale,
      and scoring time. The module does not own optimization loops, model-training execution, PPO,
      retry, routing, or actual revision; those time-bounded processes belong respectively to
      orchestration, training runtime, or upstream activities. Raw human feedback does not enter
      this module automatically unless independently transformed and recorded as learning data.
    ja: 本モジュールは、未実行の ChangeProposal、訓練用に明示的に準備された LearningSignal と PreferenceExample、及び学習済み報酬モデルが出力した RewardModelScore を保持する。訓練データとモデルスコアは別事実である。前者はデータセット、来歴、変換方針を持ち、後者はモデル版、候補、尺度、採点時刻を持つ。本モジュールは最適化ループ、モデル訓練実行、PPO、再試行、ルーティング、実際の改訂を所有しない。これらの時間境界を持つ過程は、それぞれオーケストレーション、訓練ランタイム、又は上流活動に属する。生の人間フィードバックは、独立して変換され学習データとして記録されない限り自動的に本モジュールへ入らない。
  why_needed:
    zh: 团队既要区分“可以据此讨论或修订”的反馈和“已经准备好供训练消费”的数据，也要区分训练数据与模型已经返回的分数。清晰边界能防止无授权、无溯源的人类意见变成训练数据，防止偏好对被误当成模型输出，也防止一个分数或计划性提议被描述成正在运行的优化系统。
    en: Teams must distinguish feedback that can inform discussion or revision from data prepared for training, and distinguish training data from a score a model has already returned. This boundary prevents unapproved or untraceable human input from becoming training data, prevents preference pairs from being mistaken for model output, and prevents either a score or a planned proposal from being described as a running optimization system.
    ja: チームは、議論又は改訂に情報を与え得る Feedback と訓練用に準備されたデータを区別し、さらに訓練データとモデルが既に返したスコアを区別しなければならない。この境界は、未承認又は追跡不能な人間入力が訓練データになること、選好対がモデル出力と誤認されること、スコア又は計画提案が稼働中の最適化システムとして記述されることを防ぐ。
  includes:
    - zh: 有证据依据的 ChangeProposal，以及有数据集、来源和转换政策的学习信号。
      en: Evidence-grounded ChangeProposal and learning signals with dataset, provenance, and transformation policy.
      ja: 証拠に根拠を持つ ChangeProposal と、データセット、来歴、変換方針を持つ学習信号。
    - zh: 有已训练模型、版本、候选、尺度与时间来源的 RewardModelScore。
      en: RewardModelScore with trained-model, version, candidate, scale, and time provenance.
      ja: 学習済みモデル、版、候補、尺度、時刻の来歴を持つ RewardModelScore。
  excludes:
    - zh: 原始日志、遥测、人类原话、训练作业、PPO 活动和优化循环控制。
      en: Raw logs, telemetry, original human statements, training jobs, PPO activities, and optimization-loop control.
      ja: 生ログ、テレメトリ、人間原文、訓練ジョブ、PPO 活動、最適化ループ制御。
    - zh: 已执行的 RevisionActivity 和已生成的 RevisionArtifact。
      en: Executed RevisionActivity and generated RevisionArtifact.
      ja: 実行済み RevisionActivity と生成済み RevisionArtifact。
  semantic_kind: null
  aliases: [training data preparation, proposal evidence]
engineering:
  explanation:
    zh: InstructGPT 将人类演示、偏好比较、奖励模型训练与 PPO 作为不同阶段；TRL 的 DPO 与 RewardTrainer 文档分别展示 chosen/rejected 训练对。训练完成后的模型调用可返回 `logits`，本模块仅保存由此映射出的 RewardModelScore 及其来源，而不把框架输出、训练数据或执行活动混为一谈。ChangeProposal 仍只是未执行的建议信息。
    en: InstructGPT treats human demonstrations, preference comparisons, reward-model training, and PPO as distinct stages; TRL DPO and RewardTrainer documentation respectively show chosen-rejected training pairs. A post-training model call can return `logits`; this module retains the RewardModelScore mapped from that output with its provenance, rather than conflating framework output, training data, and executed activity. ChangeProposal remains unexecuted recommendation information.
    ja: InstructGPT は人間デモ、選好比較、報酬モデル訓練、PPO を別段階として扱う。TRL の DPO と RewardTrainer 文書は、それぞれ chosen-rejected 訓練対を示す。訓練後のモデル呼び出しは `logits` を返し得る。本モジュールはフレームワーク出力、訓練データ、実行済み活動を混同せず、その出力から写した RewardModelScore と来歴を保持する。ChangeProposal は未実行の推奨情報のままである。
  typical_input:
    - description: TRL-style preference-training record with a prompt and chosen/rejected completions.
      format: |
        {"prompt":"How do I reset my password?","chosen":"Use the verified reset link.","rejected":"Ignore the account policy.","dataset_ref":"dataset:preference-v1"}
      source_claims: [claim-learning-module-dpo, claim-learning-module-design]
    - description: Classifier-style reward-model output after a model invocation.
      format: |
        {"logits":[[0.73]]}
      source_claims: [claim-learning-module-model-output]
  typical_output:
    - description: Separate identifiers for a preference training datum, a model score, and an unexecuted proposal.
      format: |
        {"signal_id":"preference-example-105","reward_model_score_id":"reward-model-score-104","proposal_id":"proposal-105"}
      source_claims: [claim-learning-module-design]
  reference_implementations:
    - name: Training language models to follow instructions with human feedback
      url: https://arxiv.org/abs/2203.02155
      description: Human data, reward-model, and PPO stages are distinct in the cited training workflow.
    - name: Hugging Face TRL DPOTrainer
      url: https://huggingface.co/docs/trl/en/dpo_trainer
      description: Documents prompt, chosen, and rejected fields for preference-optimization training data.
    - name: Hugging Face Transformers model outputs
      url: https://huggingface.co/docs/transformers/main_classes/output
      description: Documents model invocation and SequenceClassifierOutput with logits.
structure:
  identity_keys: [id]
  fields:
    - id: id
      labels: {zh: 模块标识, en: Module identifier, ja: モジュール識別子}
      definitions:
        zh: 学习信号与变更提议模块的稳定标识。
        en: Stable identifier for the learning-signals-and-proposals module.
        ja: 学習信号と変更提案モジュールの安定識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^feedback-optimization-learning$'
      example_value: feedback-optimization-learning
      allowed_values: []
      source_claims: [claim-learning-module-design]
    - id: execution_boundary
      labels: {zh: 执行边界, en: Execution boundary, ja: 実行境界}
      definitions:
        zh: 表明本模块只保存数据和提议，不执行训练、奖励建模、PPO 或修订。
        en: States this module retains data and proposals only and does not execute training, reward modeling, PPO, or revision.
        ja: 本モジュールはデータと提案だけを保持し、訓練、報酬モデリング、PPO、改訂を実行しないことを示す。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: data-and-proposals-only
      allowed_values: [data-and-proposals-only]
      source_claims: [claim-learning-module-instructgpt, claim-learning-module-design]
  constraints:
    - id: learning-module-raw-feedback-requires-transformation
      severity: error
      expression_language: plain
      expression: Raw HumanFeedback must not enter this module as training data until a LearningSignal records source, transformation, and policy basis.
      explanation:
        zh: 人类意见的采集与训练数据准备是两个不同的可审计步骤。
        en: Collecting human input and preparing training data are two different auditable steps.
        ja: 人間入力の収集と訓練データ準備は二つの異なる監査可能な手順である。
      source_claims: [claim-learning-module-instructgpt, claim-learning-module-design]
    - id: learning-module-excludes-running-optimization
      severity: error
      expression_language: plain
      expression: No module member may assert an optimization loop, PPO execution, retry, routing action, or completed revision.
      explanation:
        zh: 这些是时间边界活动或运行时控制，不能由数据模块接管。
        en: These are time-bounded activities or runtime controls and cannot be owned by a data module.
        ja: これらは時間境界を持つ活動又は実行時制御であり、データモジュールが所有できない。
      source_claims: [claim-learning-module-instructgpt, claim-learning-module-design]
  required_relations:
    - id: learning-module-organizes-change-proposal
      direction: outgoing
      predicate: organizes
      target_concept_id: ChangeProposal
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块组织至少一条有依据的未执行提议。
        en: The module organizes at least one grounded unexecuted proposal.
        ja: モジュールは少なくとも一つの根拠ある未実行提案を組織する。
      source_claims: [claim-learning-module-design]
    - id: learning-module-organizes-learning-signal
      direction: outgoing
      predicate: organizes
      target_concept_id: LearningSignal
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块组织至少一条经过明确数据转换的学习信号。
        en: The module organizes at least one learning signal produced by explicit data transformation.
        ja: モジュールは明示的なデータ変換で生成された少なくとも一つの学習信号を組織する。
      source_claims: [claim-learning-module-design]
    - id: learning-module-organizes-reward-model-score
      direction: outgoing
      predicate: organizes
      target_concept_id: RewardModelScore
      cardinality: {min: 1, max: null}
      explanations:
        zh: 模块组织至少一条来自已训练奖励模型、且与训练数据保持独立身份的可追溯分数。
        en: The module organizes at least one traceable score from a trained reward model that retains an identity separate from training data.
        ja: モジュールは、訓練データとは別の同一性を保つ、学習済み報酬モデル由来の追跡可能なスコアを少なくとも一つ組織する。
      source_claims: [claim-learning-module-model-output, claim-learning-module-design]
examples:
  - id: learning-module-positive-preference-example

    labels: {zh: 已整理的偏好训练对, en: Curated preference training pair, ja: 整備済み選好訓練対}

    descriptions:
      zh: "InstructGPT (Ouyang et al., 2022) RLHF: SFT -> human-ranked RM r_theta(x,y) -> PPO; ~13k demos + 33k comparisons; feedback-optimization-learning maps supervised/preference data-prep boundary."
      en: "InstructGPT (Ouyang et al., 2022) RLHF: SFT -> human-ranked RM r_theta(x,y) -> PPO; ~13k demos + 33k comparisons; feedback-optimization-learning maps supervised/preference data-prep boundary."
      ja: "InstructGPT SFT->RM->PPO; feedback-optimization-learning data prep boundary."
    field_values: {id: feedback-optimization-learning, execution_boundary: data-and-proposals-only}
    related_node_ids: [LearningSignal, PreferenceExample, HumanFeedback, RewardModelScore]
    related_relation_ids: []

    source_claims: [claim-learning-module-instructgpt, claim-learning-module-design]
  - id: learning-module-counterexample-raw-comment

    labels: {zh: 原始人工评论直接进训练, en: Raw human comment directly entering training, ja: 生の人間コメントが直接訓練へ入る}

    descriptions:
      zh: "compile() without metric/trainset cannot serve as DSPy-style feedback-optimization-learning ChangeProposal."
      en: "compile() without metric/trainset cannot serve as DSPy-style feedback-optimization-learning ChangeProposal."
      ja: "Missing metric/trainset rejects DSPy-style feedback-optimization-learning."
    field_values: {id: null, execution_boundary: null}
    related_node_ids: [HumanFeedback, LearningSignal]
    related_relation_ids: []

    source_claims: [claim-learning-module-design]
  - id: learning-module-boundary-proposal-versus-revision

    labels: {zh: 变更提议与实际修订的边界, en: Boundary between proposal and actual revision, ja: 提案と実際の改訂の境界}

    descriptions:
      zh: "DPO requires learning_objective=preference; cannot auto-convert 1-5 Score to chosen/rejected for feedback-optimization-learning."
      en: "DPO requires learning_objective=preference; cannot auto-convert 1-5 Score to chosen/rejected for feedback-optimization-learning."
      ja: "DPO preference objective required."
    field_values: {id: feedback-optimization-learning, execution_boundary: data-and-proposals-only}
    related_node_ids: [ChangeProposal, RevisionActivity, RevisionArtifact]
    related_relation_ids: []

    source_claims: [claim-learning-module-design]
  - id: learning-module-instance-preference-105

    labels: {zh: "preference-example-105 与 reward-model-score-104 的模块归属", en: "Module membership of preference-example-105 and reward-model-score-104", ja: "preference-example-105 と reward-model-score-104 のモジュール所属"}

    descriptions:
      zh: "Reflexion instance: failed->reflect->retry->feedback-optimization-learning Feedback mode=reflection."
      en: "Reflexion instance: failed->reflect->retry->feedback-optimization-learning Feedback mode=reflection."
      ja: "Reflexion instance maps to feedback-optimization-learning."
    field_values: {id: feedback-optimization-learning, execution_boundary: data-and-proposals-only}
    related_node_ids: [PreferenceExample, RewardModelScore, ChangeProposal]
    related_relation_ids: []

    source_claims: [claim-learning-module-design]
parent_relation: null
relations: []
sources:
  - id: instructgpt-learning-module
    title: Training language models to follow instructions with human feedback
    url: https://arxiv.org/abs/2203.02155
    source_type: paper
    relevance: Describes separate demonstration, preference, reward-model, and PPO stages.
  - id: trl-dpo-trainer-learning-module
    title: Hugging Face TRL DPOTrainer
    url: https://huggingface.co/docs/trl/en/dpo_trainer
    source_type: official-doc
    relevance: Documents prompt, chosen, and rejected preference-dataset fields for DPO training.
  - id: transformers-model-outputs-learning-module
    title: Hugging Face Transformers Model Outputs
    url: https://huggingface.co/docs/transformers/main_classes/output
    source_type: official-doc
    relevance: Documents model invocation and SequenceClassifierOutput with logits.
  - id: learning-module-design
    title: Learning signals and proposals design inference
    url: https://arxiv.org/abs/2203.02155
    source_type: design-inference
    relevance: Separates curated learning data and unexecuted proposals from operational training and optimization activities.
source_claims:
  - id: claim-learning-module-instructgpt
    source: instructgpt-learning-module
    supports: InstructGPT distinguishes demonstrations, ranked comparisons, reward-model training, and PPO as separate workflow stages.
    locator: "Abstract and methodology: SFT, comparison data, reward model, PPO"
    evidence_kind: official
    confidence: high
  - id: claim-learning-module-dpo
    source: trl-dpo-trainer-learning-module
    supports: TRL DPOTrainer requires a preference dataset with prompt, chosen, and rejected fields, distinguishing a preference training pair from a model score.
    locator: "Expected dataset format"
    evidence_kind: official
    confidence: high
  - id: claim-learning-module-model-output
    source: transformers-model-outputs-learning-module
    supports: Transformers documents tokenizer input passed to a sequence-classification model and a SequenceClassifierOutput containing logits.
    locator: "Model outputs example and SequenceClassifierOutput"
    evidence_kind: official
    confidence: high
  - id: claim-learning-module-design
    source: learning-module-design
    supports: Learning signals require explicit source transformation and policy, RewardModelScore preserves a separate model-output identity, and ChangeProposal remains unexecuted information.
    locator: "Local learning-data, model-score, and proposal boundary"
    evidence_kind: design-inference
    confidence: high


