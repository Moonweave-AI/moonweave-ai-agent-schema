        zh: 本模块对共有三条 accepted 跨界事实：ChangeProposal 指导 CorrectionActivity，LearningSignal 从 Feedback 派生，ReviewActivity 评审 OptimizationTarget。优化与学习侧的完整端点因此严格为 ChangeProposal、LearningSignal 与 OptimizationTarget；OptimizationLoop-consumes-LearningSignal 是本模块内部流程边，不能伪装成模块边界证据。
        en: "This module pair has exactly three accepted cross-boundary facts: ChangeProposal guides CorrectionActivity, LearningSignal is derived from Feedback, and ReviewActivity evaluates OptimizationTarget. The complete optimization-and-learning endpoint set is therefore exactly ChangeProposal, LearningSignal, and OptimizationTarget; OptimizationLoop-consumes-LearningSignal is an internal process edge and cannot masquerade as module-boundary evidence."
        ja: この module pair には三つの承認済み境界事実があります。ChangeProposal は CorrectionActivity を導き、LearningSignal は Feedback から導出され、ReviewActivity は OptimizationTarget を審査します。したがって optimization/learning 側の完全な endpoint 集合は ChangeProposal、LearningSignal、OptimizationTarget に限られ、OptimizationLoop-consumes-LearningSignal は内部 process 辺であり境界証拠にはできません。
