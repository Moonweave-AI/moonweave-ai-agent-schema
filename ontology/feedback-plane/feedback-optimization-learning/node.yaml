module_contract:
  interaction_contract:
    applicability: operational
    facets:
      input:
        applicable: true
        description:
          zh: 优化与学习的输入概念族为学习信号、指标、测量记录；责任交接由已接受事实 优化循环 —consumes→ 学习信号 (OptimizationLoop-consumes-LearningSignal)；优化循环 —uses→ 指标 (OptimizationLoop-uses-Metric)；优化循环 —consumes→ 测量记录 (OptimizationLoop-consumes-Measurement) 明确给出。
          en: The input families for Optimization and learning are learning signal, metric, Measurement; the accepted facts optimization loop —consumes→ learning signal (OptimizationLoop-consumes-LearningSignal); optimization loop —uses→ metric (OptimizationLoop-uses-Metric); optimization loop —consumes→ Measurement (OptimizationLoop-consumes-Measurement) make the responsibility handoff explicit.
          ja: 最適化と学習の入力概念族は学習信号、指標、測定記録です。責任の受け渡しは承認済み事実 最適化ループ —consumes→ 学習信号 (OptimizationLoop-consumes-LearningSignal)；最適化ループ —uses→ 指標 (OptimizationLoop-uses-Metric)；最適化ループ —consumes→ 測定記録 (OptimizationLoop-consumes-Measurement) により明示されます。
        family_concept_ids:
          - LearningSignal
          - Metric
          - Measurement
        relation_ids:
          - OptimizationLoop-consumes-LearningSignal
          - OptimizationLoop-uses-Metric
          - OptimizationLoop-consumes-Measurement
        not_applicable_reason: null
      output:
        applicable: true
        description:
          zh: 优化与学习的输出概念族为变更提案；责任交接由已接受事实 优化循环 —produces→ 变更提案 (OptimizationLoop-produces-ChangeProposal) 明确给出。
          en: The output families for Optimization and learning are Change proposal; the accepted facts optimization loop —produces→ Change proposal (OptimizationLoop-produces-ChangeProposal) make the responsibility handoff explicit.
          ja: 最適化と学習の出力概念族は変更提案です。責任の受け渡しは承認済み事実 最適化ループ —produces→ 変更提案 (OptimizationLoop-produces-ChangeProposal) により明示されます。
        family_concept_ids:
          - ChangeProposal
        relation_ids:
          - OptimizationLoop-produces-ChangeProposal
        not_applicable_reason: null
      failure:
        applicable: false
        description: null
        family_concept_ids: []
        relation_ids: []
        not_applicable_reason:
          zh: 该本体不负责判定运行失败。审查、策略或部署流程需要消费已汇总趋势和提案，但负责审批或执行具体变更时，引用这里的信号与提案。
          en: This ontology does not own runtime-failure adjudication. Review, policy, or deployment flows reference signals and proposals here when consuming aggregated trends while retaining responsibility for approving or executing concrete changes.
