schema: moonweave.ai/ontology-node/v1
id: OptimizationLoop
kind: concept
status: accepted
labels:
  zh: 优化循环
  en: optimization loop
  ja: 最適化ループ
semantics:
  short_definition:
    zh: 优化循环是基于证据评估候选变更并产出变更提案的有界活动。
    en: An optimization loop is a bounded activity that evaluates evidence and produces change proposals.
    ja: 最適化ループは証拠を評価し変更提案を生成する有界活動です。
  definition:
    zh: 优化循环是一项具有起止时间与循环身份的活动；它绑定一个 OptimizationTarget 版本、Metric、Measurement 与 LearningSignal，评估并比较候选方案，产生可审计的配置变更提案，但不直接把候选修改应用到生产环境。
    en: An OptimizationLoop is an activity with start, end, and loop identity that binds an OptimizationTarget version, Metrics, Measurements, and LearningSignals, evaluates and compares candidates, and produces an auditable configuration change proposal without directly applying that candidate to production.
    ja: OptimizationLoop は開始・終了時刻と loop identity を持つ活動で、OptimizationTarget の版、Metric、Measurement、LearningSignal を結び、候補を評価・比較して監査可能な configuration change proposal を生成しますが、その候補を本番へ直接適用しません。
  why_needed:
    zh: 将证据比较与实际变更分开，可要求独立策略决定、回滚和复评，避免自动优化绕过治理。
    en: Separating evidence comparison from actual change enables independent policy decisions, rollback, and re-evaluation and prevents optimizers from bypassing governance.
    ja: 証拠比較と実変更を分けることで独立方針判断、ロールバック、再評価を要求し、最適化による統制回避を防ぎます。
  includes:
    - zh: 包括候选提示、参数或策略的搜索、比较、选择和提案生成活动。
      en: Includes search, comparison, selection, and proposal generation for candidate prompts, parameters, or policies.
      ja: 候補プロンプト、パラメータ、方針の探索、比較、選択、提案生成活動を含みます。
  excludes:
    - zh: 不包括实际执行修正的 CorrectionActivity，也不包括单个 LearningSignal 信息记录。
      en: Excludes the CorrectionActivity that executes a change and an individual LearningSignal record.
      ja: 変更を実行する CorrectionActivity と単一 LearningSignal 記録は含みません。
  semantic_kind: activity
  aliases: []
structure:
  identity_keys:
    - optimization_loop_id
  fields:
    - id: optimization_loop_id
      labels:
        zh: 优化循环标识
        en: optimization-loop ID
        ja: 最適化 loop ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次有界候选搜索与比较活动。
        en: Stably identifies one bounded candidate-search and comparison activity.
        ja: 一回の有界 candidate search・比較活動を安定識別します。
      allowed_values: []
      pattern: null
      example_value: optimization-loop-19
      source_claims:
        - claim-optimization-loop-002
    - id: target_version_ref
      labels:
        zh: 目标版本引用
        en: target-version reference
        ja: target version 参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本次搜索作为基线的 OptimizationTarget 精确版本。
        en: References the exact OptimizationTarget version used as the search baseline.
        ja: search baseline とする OptimizationTarget の正確な version を参照します。
      allowed_values: []
      pattern: null
      example_value: optimization-target/prompt-router@12
      source_claims:
        - claim-optimization-loop-003
    - id: candidate_refs
      labels:
        zh: 候选引用
        en: candidate references
        ja: candidate 参照
      datatype: reference-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出本次活动实际评估的候选配置版本。
        en: Lists the candidate configuration versions actually evaluated by this activity.
        ja: この活動で実際に評価した candidate configuration version を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - candidate/prompt-router-19-a
        - candidate/prompt-router-19-b
      source_claims:
        - claim-optimization-loop-004
    - id: objective_metric_refs
      labels:
        zh: 目标指标引用
        en: objective-metric references
        ja: objective metric 参照
      datatype: reference-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出比较候选时锁定版本和方向的 Metric 定义。
        en: Lists the versioned Metric definitions and directions locked for candidate comparison.
        ja: candidate 比較に固定した versioned Metric 定義と方向を列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - metric/success_rate@3
        - metric/estimated_cost@2
      source_claims:
        - claim-optimization-loop-005
    - id: evidence_refs
      labels:
        zh: 比较证据引用
        en: comparison-evidence references
        ja: 比較 evidence 参照
      datatype: reference-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用支持候选比较的 Measurements 与 LearningSignals，不复制其内容。
        en: References the Measurements and LearningSignals supporting candidate comparison without copying their content.
        ja: candidate 比較を支える Measurement と LearningSignal を内容複製せず参照します。
      allowed_values: []
      pattern: null
      example_value:
        - measurement/eval-19-success
        - learning-signal/ls-31
      source_claims:
        - claim-optimization-loop-006
    - id: started_at
      labels:
        zh: 开始时间
        en: started at
        ja: 開始時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 本次候选搜索开始的 UTC 时间。
        en: UTC instant when this candidate search began.
        ja: candidate search を開始した UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T09:00:00.000Z
      source_claims:
        - claim-optimization-loop-007
    - id: ended_at
      labels:
        zh: 结束时间
        en: ended at
        ja: 終了時刻
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 候选比较结束、失败或取消的 UTC 时间；运行中为空。
        en: UTC instant when comparison completed, failed, or was cancelled; absent while running.
        ja: 比較が完了・失敗・取消された UTC 時刻で、実行中は省略します。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T09:23:18.000Z
      source_claims:
        - claim-optimization-loop-008
    - id: outcome
      labels:
        zh: 循环结果
        en: loop outcome
        ja: loop 結果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录循环成功、无改进、失败或取消，不等同于候选已获部署批准。
        en: Records success, no improvement, failure, or cancellation without implying deployment approval.
        ja: success・no improvement・failure・cancellation を記録し、deployment 承認を意味しません。
      allowed_values: []
      pattern: null
      example_value: success
      source_claims:
        - claim-optimization-loop-009
  constraints:
    - id: optimization-loop-proposes-without-applying
      severity: error
      expression_language: plain
      expression: an OptimizationLoop may produce a ChangeProposal but does not mutate the target version or authorize deployment
      explanations:
        zh: 优化循环只能形成变更提案，不得原地修改目标或授权部署。
        en: An OptimizationLoop may form a ChangeProposal but cannot mutate the target in place or authorize deployment.
        ja: OptimizationLoop は ChangeProposal を形成できますが、target の直接変更や deployment 承認はできません。
      source_claims:
        - claim-optimization-loop-010
  required_relation_constraints: []
examples:
  - id: OptimizationLoop-example-positive-manual-001
    kind: positive
    labels:
      zh: 优化循环正例
      en: Positive optimization loop case
      ja: 最適化ループの正例
    scenario_id: null
    descriptions:
      zh: optimization-loop-19 对 prompt-router@12 的四个候选提示运行固定数据集，比较 success_rate 与 cost，并输出 proposal-8。
      en: optimization-loop-19 evaluates four prompt candidates for prompt-router@12 on a fixed dataset, compares success_rate and cost, and emits proposal-8.
      ja: optimization-loop-19 は prompt-router@12 の四候補を固定データセットで評価し success_rate と cost を比較して proposal-8 を出します。
    field_values:
      optimization_loop_id: optimization-loop-19
      target_version_ref: optimization-target/prompt-router@12
      candidate_refs:
        - candidate/prompt-router-19-a
        - candidate/prompt-router-19-b
        - candidate/prompt-router-19-c
        - candidate/prompt-router-19-d
      objective_metric_refs:
        - metric/success_rate@3
        - metric/estimated_cost@2
      evidence_refs:
        - measurement/eval-19-success
        - measurement/eval-19-cost
        - learning-signal/ls-31
      started_at: 2026-07-16T09:00:00.000Z
      ended_at: 2026-07-16T09:23:18.000Z
      outcome: success
    related_node_ids:
      - OptimizationLoop
    related_relation_ids: []
    expected_result:
      zh: 该对象是一次有明确边界的优化循环活动。
      en: The object is one bounded optimization-loop activity.
      ja: この対象は明確な境界を持つ一回の最適化ループ活動です。
    why_valid_or_invalid:
      zh: 它具有循环身份、目标版本、输入证据、候选比较和提案输出。
      en: It has loop identity, target version, evidence inputs, candidate comparison, and proposal output.
      ja: ループ ID、対象版、証拠入力、候補比較、提案出力を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-optimization-loop-011
  - id: OptimizationLoop-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 优化循环边界例
      en: Boundary optimization loop case
      ja: 最適化ループの境界例
    scenario_id: null
    descriptions:
      zh: 系统直接把 temperature 从 0.2 改为 0.8，但没有候选评估、指标或提案记录。
      en: The system directly changes temperature from 0.2 to 0.8 with no candidate evaluation, metric, or proposal record.
      ja: システムは候補評価、指標、提案記録なしで temperature を 0.2 から 0.8 へ直接変更します。
    field_values: {}
    related_node_ids:
      - OptimizationLoop
    related_relation_ids: []
    expected_result:
      zh: 这是未经治理的参数修正，不是可审计的 OptimizationLoop。
      en: This is an ungoverned parameter correction, not an auditable OptimizationLoop.
      ja: これは統制されないパラメータ修正で監査可能な OptimizationLoop ではありません。
    why_valid_or_invalid:
      zh: 缺少证据输入、候选比较和独立提案输出。
      en: It lacks evidence inputs, candidate comparison, and a separate proposal output.
      ja: 証拠入力、候補比較、独立提案出力がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-optimization-loop-012
external_mappings: []
