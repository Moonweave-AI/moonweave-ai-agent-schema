source_claims:
  - id: claim-optimization-loop-001
    source: eng-fw-dspy-docs
    supports: DSPy optimizers use a metric to search or tune LM programs; Moonweave represents one bounded optimizer execution as OptimizationLoop and separates its proposal from deployment.
    locator: Learn DSPy > Optimizers > metric-driven program optimization
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-optimization-loop-002
    source: eng-fw-dspy-docs
    supports: DSPy optimizers compile a program against examples and a scoring metric. OptimizationLoop.optimization_loop_id is Moonweave's audit identity for one such bounded optimization execution; DSPy does not define this field.
    locator: Optimizers > compile a program against examples and a metric
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-optimization-loop-003
    source: eng-fw-dspy-docs
    supports: DSPy compiles a concrete program instance and returns an optimized program. OptimizationLoop.target_version_ref is Moonweave's immutable baseline binding and is not asserted by DSPy.
    locator: Optimizers > compile a program and return an optimized program
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-optimization-loop-004
    source: eng-fw-dspy-docs
    supports: DSPy optimizers search over candidate instructions or demonstrations and score candidates on examples. OptimizationLoop.candidate_refs is Moonweave's replayable candidate manifest.
    locator: Optimizers > metric-driven program optimization and candidate search
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-optimization-loop-005
