    supports: DSPy requires a scoring function or metric to optimize a program. OptimizationLoop.objective_metric_refs is Moonweave's version-lock and multi-objective extension over that metric input.
    locator: Optimizers > define a metric and compile
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-optimization-loop-006
    source: eng-fw-dspy-docs
    supports: DSPy evaluates candidates on examples with a metric. OptimizationLoop.evidence_refs is Moonweave's provenance binding to the concrete measurements and attributed learning signals behind that comparison.
