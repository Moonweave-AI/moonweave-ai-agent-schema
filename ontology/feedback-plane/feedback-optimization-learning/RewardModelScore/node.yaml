schema: moonweave.ai/ontology-node/v1
id: RewardModelScore
kind: concept
labels:
  zh: 奖励模型分数
  en: Reward Model Score
  ja: 報酬モデルスコア
semantics:
  short_definition:
    zh: 已训练奖励模型针对一个 prompt 和一个候选产物产生的、带模型版本与时间的标量分数记录。
    en: A scalar score emitted by a trained reward model for one prompt and candidate artifact, recorded with model version and scoring time.
    ja: 学習済み報酬モデルが一つの prompt と候補成果物に対して出力した、モデル版と採点時刻を伴うスカラー値の記録。
  definition:
    zh: RewardModelScore 是一个独立的信息实体，保存已经训练完成的奖励模型 r_θ(x,y) 对一个 (prompt, candidate) 推断所得的分数。它必须标明产生分数的模型及版本、输入 prompt、被评分候选、数值尺度和评分时间。它记录的是模型已返回的输出，不是 PreferenceExample 训练数据、LearningSignal 或 PPO 梯度步；InstructGPT 6B RM 的 logits、Hugging Face Transformers SequenceClassifierOutput 均可映射为本节点，但 potential_consumer_ref 只表示未来可能消费此分数的 PPO 目标，不证明 PPO 已执行。
    en: "RewardModelScore is an independent information entity recording a score inferred by a trained reward model r_θ(x,y) for one (prompt, candidate) pair. It must identify the model and version that emitted the score, input prompt, scored candidate, numeric scale, and scoring time. It records a returned model output, not PreferenceExample training data, LearningSignal, or a PPO gradient step; InstructGPT 6B RM logits and Hugging Face Transformers SequenceClassifierOutput map here, but potential_consumer_ref only names a future PPO objective and does not prove PPO executed."
    ja: RewardModelScore は学習済み報酬モデル r_θ(x,y) が (prompt, candidate) 対に推論したスコアを記録する独立情報実体。モデルと版、prompt、候補、尺度、採点時刻を特定する。PreferenceExample 訓練データ、LearningSignal、PPO 勾配ステップではない。InstructGPT 6B RM logits と Transformers SequenceClassifierOutput が写像対象。potential_consumer_ref は将来 PPO 目的を示すだけで PPO 実行を証明しない。
  why_needed:
    zh: “奖励”一词常同时指偏好样本、训练过程和模型输出。若把它们写成同一种节点，chosen/rejected 训练数据会被误当成单个数值，或一个分数又会被误读为 PPO 已运行。单独记录模型分数，才能回答哪个已训练模型在何时对哪个候选给出了这个值。
    en: "Reward is often used for preference samples, training procedures, and model outputs. Sharing one node lets chosen-rejected training data be mistaken for a scalar, or a scalar be misread as completed PPO. A separate score record answers which trained model assigned the value to which candidate and when."
    ja: 「報酬」は選好サンプル、訓練手順、モデル出力を指し得る。一ノードに混在させると chosen-rejected 訓練データをスカラーと誤認したり、スカラーから PPO 完了を誤認したりする。分数を別記録にすることで、どの学習済みモデルがいつどの候補に値を付けたかを答えられる。
  includes:
    - zh: 一个已训练奖励模型及其版本，对一个明确 prompt 和一个候选产物产生的单个数值输出。
      en: One numeric output from an identified trained reward model and version for one explicit prompt and candidate artifact.
      ja: 特定された学習済み報酬モデルと版が、一つの明示的な prompt と候補成果物に対して出力した一つの数値。
    - zh: 分数的数值尺度、产生时间，以及可选的 PPO 等潜在消费者引用。
      en: "The score numeric scale and emission time, plus an optional reference to a possible future consumer such as PPO."
      ja: スコアの数値尺度と出力時刻、及び PPO など将来の消費者への任意参照。
  excludes:
    - zh: 同一 prompt 的 chosen/rejected 偏好对；它是训练数据，应表示为 PreferenceExample。
      en: A chosen-rejected preference pair for one prompt; it is training data and belongs in PreferenceExample.
      ja: 一 prompt に対する chosen-rejected 選好対。訓練データであり PreferenceExample に属する。
    - zh: RewardTrainer 训练运行、PPO 梯度步、PolicyUpdate 或任何已发生的强化学习活动。
      en: "A RewardTrainer run, PPO gradient step, PolicyUpdate, or any occurred reinforcement-learning activity."
      ja: RewardTrainer 実行、PPO 勾配ステップ、PolicyUpdate、又は既に発生した強化学習活動。
    - zh: 人工量规评分、LangSmith helpfulness Score 或未说明模型、版本、候选和尺度的孤立数字。
      en: "A human rubric score, LangSmith helpfulness Score, or isolated number without model, version, candidate, and scale."
      ja: 人間ルーブリックスコア、LangSmith helpfulness Score、又はモデル、版、候補、尺度を示さない孤立数値。
  semantic_kind: information
  aliases: [reward model output, reward score, r_theta score, 奖励模型输出]
engineering:
  explanation:
    zh: 新集成应以 InstructGPT r_θ(x,y) 分类器输出、Hugging Face Transformers SequenceClassifierOutput.logits、TRL RewardTrainer 训练完成后的 RM 推断为可映射 API 形状，再将一个明确标量映射为 score_value 并持久化 reward_model_ref、reward_model_version、prompt_ref、candidate_artifact_ref、score_scale、scored_at。RewardTrainer 的 chosen/rejected 对用于训练 RM，不能替代本节点的推断输出；PPO 使用 RM 分数作为 reward signal，但 PolicyUpdate 是独立活动。
    en: "New integrations should treat InstructGPT r_θ(x,y) classifier output, Hugging Face Transformers SequenceClassifierOutput.logits, and post-RewardTrainer RM inference as mappable API shapes, then map one explicit scalar to score_value and persist reward_model_ref, reward_model_version, prompt_ref, candidate_artifact_ref, score_scale, and scored_at. RewardTrainer chosen/rejected pairs train the RM and cannot substitute for this node inference output; PPO uses RM scores as reward signals, but PolicyUpdate is a separate activity."
    ja: InstructGPT r_θ(x,y) 分類器出力、Transformers SequenceClassifierOutput.logits、RewardTrainer 後 RM 推論を写像可能 API 形状として扱い、明示スカラーを score_value に写して永続化する。RewardTrainer の chosen/rejected 対は RM 訓練用であり本ノード推論出力の代用不可。PPO は RM スコアを報酬信号に使うが PolicyUpdate は別活動。
  typical_input:
    - description: Hugging Face Transformers sequence-classification invocation after tokenization.
      format: |
        inputs = tokenizer(prompt_and_candidate, return_tensors="pt")
        outputs = reward_model(**inputs)
        outputs.logits
      source_claims: [claim-transformers-sequence-classifier-output]
    - description: Local persistence request binding extracted scalar to prompt, candidate, model identity, and version.
      format: |
        {
          "reward_model_ref": "model:instructgpt-reward-model-6b",
          "reward_model_version": "instructgpt-2022",
          "prompt_ref": "Artifact:prompt-104",
          "candidate_artifact_ref": "Artifact:answer-104",
          "score_value": 0.73,
          "score_scale": "unbounded-logit",
          "scored_at": "2022-03-04T00:00:00Z"
        }
      source_claims: [claim-reward-model-score-design]
  typical_output:
    - description: Local RewardModelScore record with explicit scale mapping.
      format: |
        {
          "reward_model_score_id": "reward-model-score-104",
          "reward_model_ref": "model:reward-rm-v3",
          "reward_model_version": "3.2.1",
          "prompt_ref": "Artifact:prompt-104",
          "candidate_artifact_ref": "Artifact:answer-104",
          "score_value": 0.73,
          "score_scale": "unbounded-logit",
          "scored_at": "2026-07-18T13:20:00Z",
          "potential_consumer_ref": "objective:ppo-helpfulness-v1"
        }
      source_claims: [claim-reward-model-score-design]
  reference_implementations:
    - name: InstructGPT RLHF
      url: https://arxiv.org/abs/2203.02155
      description: Reward model r_θ(x,y) trained on comparisons then used in PPO.
    - name: Hugging Face Transformers Model Outputs
      url: https://huggingface.co/docs/transformers/main_classes/output
      description: SequenceClassifierOutput with logits from classifier-style RM.
    - name: Hugging Face TRL RewardTrainer
      url: https://huggingface.co/docs/trl/en/reward_trainer
      description: chosen-rejected preference data for RM training, distinct from inference score.
structure:
  identity_keys: [reward_model_score_id]
  fields:
    - id: reward_model_score_id
      labels: {zh: 奖励模型分数标识, en: Reward model score identifier, ja: 報酬モデルスコア識別子}
      definitions:
        zh: 唯一标识一条已训练奖励模型产生的分数记录。
        en: Uniquely identifies one score record emitted by an already trained reward model.
        ja: 学習済み報酬モデルが出力した一件のスコア記録を一意に識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^reward-model-score-[a-z0-9-]{1,110}$'
      example_value: reward-model-score-104
      allowed_values: []
      source_claims: [claim-reward-model-score-design]
    - id: reward_model_ref
      labels: {zh: 奖励模型引用, en: Reward model reference, ja: 報酬モデル参照}
      definitions:
        zh: 指向实际产生该分数的已训练模型，如 InstructGPT 6B RM，不指向 RewardTrainer 或训练活动。
        en: References the trained model that emitted the score, such as InstructGPT 6B RM, not a RewardTrainer or training activity.
        ja: InstructGPT 6B RM などスコアを出力した学習済みモデルを参照。RewardTrainer 又は訓練活動ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: model:reward-rm-v3
      allowed_values: []
      source_claims: [claim-reward-model-score-design]
    - id: reward_model_version
      labels: {zh: 奖励模型版本, en: Reward model version, ja: 報酬モデル版}
      definitions:
        zh: 产生该数值的模型版本，用于避免不同模型版本的输出被无依据地混合比较。
        en: Version of the model that emitted the value, preventing ungrounded comparisons across model versions.
        ja: 値を出力したモデル版。異なる版の出力を根拠なく混在比較しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 3.2.1
      allowed_values: []
      source_claims: [claim-reward-model-score-design]
    - id: prompt_ref
      labels: {zh: 提示引用, en: Prompt reference, ja: プロンプト参照}
      definitions:
        zh: 指向与候选一起提供给奖励模型的具体 prompt 或其忠实保留的产物。
        en: References the concrete prompt or faithfully retained artifact supplied to the reward model with the candidate.
        ja: 候補と共に報酬モデルへ与えた prompt 又は忠実保持成果物を参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Artifact:prompt-104
      allowed_values: []
      source_claims: [claim-trl-reward-trainer, claim-reward-model-score-design]
    - id: candidate_artifact_ref
      labels: {zh: 候选产物引用, en: Candidate artifact reference, ja: 候補成果物参照}
      definitions:
        zh: 指向由该模型与 prompt 配对后评分的一个候选产物 y，而不是 chosen/rejected 训练对。
        en: References one candidate artifact y scored with the prompt by the model, not a chosen-rejected training pair.
        ja: モデルが prompt と組にして採点した候補 y を参照。chosen-rejected 訓練対ではない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Artifact:answer-104
      allowed_values: []
      source_claims: [claim-trl-reward-trainer, claim-reward-model-score-design]
    - id: score_value
      labels: {zh: 分数值, en: Score value, ja: スコア値}
      definitions:
        zh: 从该模型输出明确映射出的数值 r_θ(x,y)；不是人工量规分数，也不自动等同于概率。
        en: Numeric value r_θ(x,y) explicitly mapped from this model output; neither a human rubric score nor automatically a probability.
        ja: このモデル出力から明示的に写した r_θ(x,y)。人間ルーブリックでも自動的確率でもない。
      datatype: number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 0.73
      allowed_values: []
      source_claims: [claim-transformers-sequence-classifier-output, claim-reward-model-score-design]
    - id: score_scale
      labels: {zh: 分数尺度, en: Score scale, ja: スコア尺度}
      definitions:
        zh: 声明 score_value 的解释尺度，以防不同 RM 或后处理方式的输出被直接比较。
        en: Declares how score_value is interpreted so outputs from differing RMs or post-processing are not compared directly.
        ja: score_value の解釈尺度。異なる RM 又は後処理出力を直接比較しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: unbounded-logit
      allowed_values: [unbounded-logit, normalized-unit-interval]
      source_claims: [claim-transformers-sequence-classifier-output, claim-reward-model-score-design]
    - id: scored_at
      labels: {zh: 评分时间, en: Scoring time, ja: 採点時刻}
      definitions:
        zh: 模型为该 prompt 和候选产生分数的时间，不是 RM 训练或 PPO 策略优化发生的时间。
        en: Time when the model emitted the score for this prompt and candidate, not RM training or PPO policy-optimization time.
        ja: この prompt と候補にスコアを出力した時刻。RM 訓練又は PPO 最適化時刻ではない。
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '2026-07-18T13:20:00Z'
      allowed_values: []
      source_claims: [claim-reward-model-score-design]
    - id: potential_consumer_ref
      labels: {zh: 潜在消费者引用, en: Potential consumer reference, ja: 潜在的消費者参照}
      definitions:
        zh: 可选地指向未来可能消费此分数的 PPO 目标或分析；该引用不证明 PPO 或 PolicyUpdate 已经运行。
        en: Optionally references a PPO objective or analysis that may later consume this score; the reference does not prove PPO or PolicyUpdate ran.
        ja: 将来このスコアを消費し得る PPO 目的等を任意参照。PPO 又は PolicyUpdate 実行を証明しない。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: objective:ppo-helpfulness-v1
      allowed_values: []
      source_claims: [claim-reward-model-score-design]
  constraints:
    - id: reward-model-score-identifies-one-model-output
      severity: error
      expression_language: plain
      expression: reward_model_ref, reward_model_version, prompt_ref, candidate_artifact_ref, score_value, score_scale, and scored_at must identify one score emitted by an already trained reward model.
      explanation:
        zh: 仅有一个数字不能审计它由哪个模型、在什么输入和时间下产生。
        en: A number alone cannot be audited; these fields jointly identify which trained model emitted the value for which inputs and when.
        ja: 数値だけでは監査できない。これらのフィールドが共同で特定する。
      source_claims: [claim-reward-model-score-design]
    - id: reward-model-score-comparison-requires-shared-basis
      severity: error
      expression_language: plain
      expression: Scores may be directly compared only when reward_model_ref, reward_model_version, and score_scale match, unless a separately recorded calibration establishes another comparison basis.
      explanation:
        zh: 同为数字不代表可比较；模型、版本或尺度不同必须有明确校准依据。
        en: Numeric values are not comparable merely because both are numbers; a changed model, version, or scale requires an explicit calibration basis.
        ja: 両方が数値であるだけでは比較できない。
      source_claims: [claim-reward-model-score-design]
    - id: reward-model-score-excludes-training-pair-and-run
      severity: error
      expression_language: plain
      expression: A record containing chosen and rejected candidates, a preference-training dataset, trainer-run reference, weight update, or optimizer step is not RewardModelScore; represent those facts as PreferenceExample or a separate training Activity.
      explanation:
        zh: 偏好对和训练运行是产生奖励模型之前或期间的不同事实。
        en: A preference pair and a training run are different facts before or during reward-model creation.
        ja: 選好対と訓練実行は RM 作成前又は作成中の別事実。
      source_claims: [claim-trl-reward-trainer, claim-reward-model-score-design]
    - id: reward-model-score-consumer-reference-is-not-execution
      severity: error
      expression_language: plain
      expression: potential_consumer_ref may name a future PPO consumer but must not be used as evidence that PPO or PolicyUpdate executed.
      explanation:
        zh: 可能被使用与已经执行是两个不同的时间事实。
        en: Potential future use and completed execution are different temporal facts.
        ja: 将来利用され得ることと実行済みは異なる時間的事実。
      source_claims: [claim-instructgpt-stages, claim-reward-model-score-design]
  required_relations:
    - id: RewardModelScore-isAbout-CandidateArtifact
      direction: outgoing
      predicate: is_about
      target_concept_id: Artifact
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每条分数必须指向它实际评分的一个候选 Artifact。
        en: Each score must identify the one candidate Artifact it actually evaluates.
        ja: 各スコアは実際に評価した一つの候補 Artifact を特定しなければならない。
      source_claims: [claim-reward-model-score-design]
examples:
  - id: reward-model-score-instructgpt-rm
    labels:
      zh: InstructGPT RM 单候选分数
      en: InstructGPT RM single-candidate score
      ja: InstructGPT RM 単一候補スコア
    descriptions:
      zh: reward_model_score_id=instructgpt-rm-score-sample reward_model_ref=model:instructgpt-reward-model-6b score_value=0.73 score_scale=unbounded-logit；Ouyang 2022 r_θ(x,y) 对单 completion 输出，potential_consumer_ref=objective:instructgpt-ppo-v1 不证明 PPO 已运行。
      en: reward_model_score_id=instructgpt-rm-score-sample maps to Ouyang 2022 r_θ(x,y) on single completion; potential_consumer_ref=objective:instructgpt-ppo-v1 does not prove PPO ran.
      ja: Ouyang 2022 r_θ(x,y) 単一 completion 出力。PPO 実行を証明しない。
    example_source:
      product: InstructGPT
      url: https://arxiv.org/abs/2203.02155
      version: reward model r_θ(x,y)
    field_values:
      reward_model_score_id: instructgpt-rm-score-sample
      reward_model_ref: model:instructgpt-reward-model-6b
      reward_model_version: instructgpt-2022
      prompt_ref: Artifact:instructgpt-api-prompt
      candidate_artifact_ref: Artifact:instructgpt-candidate-completion
      score_value: 0.73
      score_scale: unbounded-logit
      scored_at: '2022-03-04T00:00:00Z'
      potential_consumer_ref: objective:instructgpt-ppo-v1
    related_node_ids: [RewardModelScore, Artifact, PreferenceExample]
    related_relation_ids: [RewardModelScore-isAbout-CandidateArtifact]
    source_claims: [claim-instructgpt-stages, claim-reward-model-score-design]
  - id: reward-model-score-transformers-logits
    labels:
      zh: Transformers RM logits 映射
      en: Transformers RM logits mapping
      ja: Transformers RM logits 写像
    descriptions:
      zh: reward_model_ref=model:reward-rm-v3 score_value=0.73 来自 SequenceClassifierOutput.logits[[0.73]]；score_scale=unbounded-logit 必须显式声明，不能假设 logits 即概率。
      en: reward_model_ref=model:reward-rm-v3 score_value=0.73 from SequenceClassifierOutput.logits[[0.73]]; score_scale=unbounded-logit must be declared explicitly, logits are not automatically probabilities.
      ja: logits から score_value=0.73。score_scale は明示宣言必須。
    example_source:
      product: Hugging Face Transformers
      url: https://huggingface.co/docs/transformers/main_classes/output
      version: SequenceClassifierOutput
    field_values:
      reward_model_score_id: reward-model-score-104
      reward_model_ref: model:reward-rm-v3
      reward_model_version: 3.2.1
      prompt_ref: Artifact:prompt-104
      candidate_artifact_ref: Artifact:answer-104
      score_value: 0.73
      score_scale: unbounded-logit
      scored_at: '2026-07-18T13:20:00Z'
      potential_consumer_ref: objective:ppo-helpfulness-v1
    related_node_ids: [RewardModelScore, Artifact]
    related_relation_ids: [RewardModelScore-isAbout-CandidateArtifact]
    source_claims: [claim-transformers-sequence-classifier-output, claim-reward-model-score-design]
  - id: reward-model-score-ppo-consumer-boundary
    labels:
      zh: PPO 潜在消费者与执行的边界
      en: PPO potential consumer versus execution boundary
      ja: PPO 潜在消費者と実行の境界
    descriptions:
      zh: potential_consumer_ref=objective:ppo-helpfulness-v1 schema-valid 但无 PolicyUpdate 记录；RewardModelScore 只保存 RM 输出，PPO 梯度步属于独立 PolicyUpdate 活动。
      en: potential_consumer_ref=objective:ppo-helpfulness-v1 schema-valid but no PolicyUpdate record; RewardModelScore only retains RM output, PPO gradient step belongs to separate PolicyUpdate activity.
      ja: RM 出力のみ保持。PPO 勾配ステップは別 PolicyUpdate 活動。
    example_source:
      product: InstructGPT
      url: https://arxiv.org/abs/2203.02155
      version: PPO policy optimization
    field_values:
      reward_model_score_id: reward-model-score-104
      reward_model_ref: model:reward-rm-v3
      reward_model_version: 3.2.1
      prompt_ref: Artifact:prompt-104
      candidate_artifact_ref: Artifact:answer-104
      score_value: 0.73
      score_scale: unbounded-logit
      scored_at: '2026-07-18T13:20:00Z'
      potential_consumer_ref: objective:ppo-helpfulness-v1
    related_node_ids: [RewardModelScore]
    related_relation_ids: [RewardModelScore-isAbout-CandidateArtifact]
    source_claims: [claim-instructgpt-stages, claim-reward-model-score-design]
  - id: reward-model-score-counterexample-preference-pair
    labels:
      zh: 偏好对不是模型分数
      en: Preference pair is not a model score
      ja: 選好対はモデルスコアではない
    descriptions:
