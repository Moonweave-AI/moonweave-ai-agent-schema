schema: moonweave.ai/ontology-node/v1
id: RewardModelScore
kind: concept
status: accepted
labels:
  zh: 奖励模型分数
  en: Reward Model Score
  ja: 報酬モデルスコア
semantics:
  short_definition:
    zh: 已训练奖励模型针对一个 prompt 和一个候选产物产生的、带模型版本与时间的标量分数记录。
    en: A scalar score emitted by a trained reward model for one prompt and candidate artifact, recorded with model version and scoring time.
    ja: 学習済み報酬モデルが一つの prompt と候補成果物に対して出力した、モデル版と採点時刻を伴うスカラー値の記録。
  definition:
    zh: >-
      RewardModelScore 是一个独立的信息实体，保存已经训练完成的奖励模型对一个
      `(prompt, candidate)` 推断所得的分数。它必须标明产生分数的模型及版本、输入 prompt、
      被评分候选、数值尺度和评分时间。它记录的是模型已返回的输出，而不是为训练而准备的数据，
      因此不是 LearningSignal 的子类；它也不表示奖励模型训练、PPO 更新或其他强化学习活动已经执行。
    en: >-
      RewardModelScore is an independent information entity that records a score inferred by an
      already trained reward model for one `(prompt, candidate)` pair. It identifies the model and
      version that emitted the score, the input prompt, the scored candidate, numeric scale, and
      scoring time. It records an output the model has returned, not data prepared for training,
      so it is not a subtype of LearningSignal; it also does not represent reward-model training,
      a PPO update, or another executed reinforcement-learning activity.
    ja: >-
      RewardModelScore は、学習済み報酬モデルが一つの `(prompt, candidate)` 対に対して
      推論したスコアを記録する独立した情報実体である。スコアを出力したモデルと版、入力 prompt、
      採点対象の候補、数値尺度、採点時刻を特定する。訓練用に準備したデータではなくモデルが返した
      出力を記録するため LearningSignal の下位型ではなく、報酬モデル訓練、PPO 更新、又は実行済みの
      強化学習活動を表すものでもない。
  why_needed:
    zh: >-
      “奖励”一词常同时指偏好样本、训练过程和模型输出。若把它们写成同一种节点，chosen/rejected
      训练数据会被误当成单个数值，或一个分数又会被误读为训练已经发生。单独记录模型分数，才能回答
      “哪个已训练模型在何时对哪个候选给出了这个值”，并阻止下游把来源不明的数字直接比较或消费。
    en: >-
      “Reward” is often used for preference samples, training procedures, and model outputs. If
      those facts share one node, chosen-rejected training data can be mistaken for a scalar, or a
      scalar can be misread as completed training. A separate score record answers which trained
      model assigned the value to which candidate and when, and prevents downstream systems from
      comparing or consuming an untraceable number.
    ja: >-
      「報酬」は選好サンプル、訓練手順、モデル出力を指し得る。これらを一つのノードにすると、
      chosen-rejected 訓練データをスカラーと誤認したり、スカラーから訓練完了を誤認したりする。
      分数を別記録にすることで、どの学習済みモデルがいつどの候補に値を付けたかを答えられ、
      来歴不明な数値を下流が比較又は消費することを防げる。
  includes:
    - zh: 一个已训练奖励模型及其版本，对一个明确 prompt 和一个候选产物产生的单个数值输出。
      en: One numeric output from an identified trained reward model and version for one explicit prompt and candidate artifact.
      ja: 特定された学習済み報酬モデルと版が、一つの明示的な prompt と候補成果物に対して出力した一つの数値。
    - zh: 分数的数值尺度、产生时间，以及可选的潜在消费者引用。
      en: The score's numeric scale and emission time, plus an optional reference to a possible future consumer.
      ja: スコアの数値尺度と出力時刻、及び任意の将来の消費者への参照。
  excludes:
    - zh: 同一 prompt 的 chosen/rejected 偏好对；它是训练数据，应表示为 PreferenceExample。
      en: A chosen-rejected preference pair for one prompt; it is training data and belongs in PreferenceExample.
      ja: 一つの prompt に対する chosen-rejected 選好対。これは訓練データであり PreferenceExample に属する。
    - zh: RewardTrainer 训练运行、模型权重更新、PPO 更新、优化器步数或任何已发生的强化学习活动。
      en: A RewardTrainer run, model-weight update, PPO update, optimizer step, or any occurred reinforcement-learning activity.
      ja: RewardTrainer 実行、モデル重み更新、PPO 更新、最適化器ステップ、又は既に発生した強化学習活動。
    - zh: 人工量规评分、通用质量指标或未说明模型、版本、候选和尺度的孤立数字。
      en: A human rubric score, generic quality metric, or isolated number without a model, version, candidate, and scale.
      ja: 人間のルーブリックスコア、一般品質指標、又はモデル、版、候補、尺度を示さない孤立した数値。
  semantic_kind: information
  aliases: [reward model output, reward score, reward-model inference score, 奖励模型输出]
engineering:
  explanation:
    zh: >-
      Hugging Face Transformers 的分类模型调用将 tokenizer 的输入传给模型，并返回包含 `logits`
      的 `SequenceClassifierOutput`；本体记录不是该框架对象，而是本地将一个明确的标量映射为
      `score_value` 后的持久化事实。TRL RewardTrainer 所需的 chosen/rejected 对用于训练奖励模型，
      不能作为本节点的输入替代物。InstructGPT 也将比较数据、奖励模型训练和 PPO 分为不同阶段。
    en: >-
      A Hugging Face Transformers sequence-classification call passes tokenizer output to a model
      and returns a `SequenceClassifierOutput` containing `logits`; this ontology record is not
      that framework object, but the local persisted fact after one explicit scalar is mapped to
      `score_value`. The chosen-rejected pairs required by TRL RewardTrainer train a reward model
      and cannot substitute for this node's inference output. InstructGPT likewise separates
      comparison data, reward-model training, and PPO into distinct stages.
    ja: >-
      Hugging Face Transformers の系列分類呼び出しは tokenizer 出力をモデルへ渡し、`logits` を含む
      `SequenceClassifierOutput` を返す。本体記録はそのフレームワークオブジェクトではなく、一つの
      明示的なスカラーを `score_value` に写した後のローカル永続化事実である。TRL RewardTrainer が
      要する chosen-rejected 対は報酬モデルを訓練するものであり、本ノードの推論出力の代用にはならない。
      InstructGPT も比較データ、報酬モデル訓練、PPO を別段階に分けている。
  typical_input:
    - description: Hugging Face Transformers-style sequence-classification invocation after tokenization.
      format: |
        inputs = tokenizer(prompt_and_candidate, return_tensors="pt")
        outputs = reward_model(**inputs)
        outputs.logits
      source_claims: [claim-transformers-sequence-classifier-output]
    - description: Local persistence request that binds an extracted scalar to its prompt, candidate, model identity, and version.
      format: |
        {
          "reward_model_ref": "model:reward-rm-v3",
          "reward_model_version": "3.2.1",
          "prompt_ref": "Artifact:prompt-104",
          "candidate_artifact_ref": "Artifact:answer-104",
          "score_value": 0.73,
          "score_scale": "unbounded-logit",
          "scored_at": "2026-07-18T13:20:00Z"
        }
      source_claims: [claim-reward-model-score-design]
  typical_output:
    - description: Transformers model output shape used by a classifier-style reward-model integration.
      format: |
        {"logits": [[0.73]]}
      source_claims: [claim-transformers-sequence-classifier-output]
    - description: Local RewardModelScore record; the `score_value` mapping and its scale are declared explicitly rather than assumed from the raw model output.
      format: |
        {
          "reward_model_score_id": "reward-model-score-104",
          "reward_model_ref": "model:reward-rm-v3",
          "reward_model_version": "3.2.1",
          "prompt_ref": "Artifact:prompt-104",
          "candidate_artifact_ref": "Artifact:answer-104",
          "score_value": 0.73,
          "score_scale": "unbounded-logit",
          "scored_at": "2026-07-18T13:20:00Z",
          "potential_consumer_ref": "objective:ppo-helpfulness-v1"
        }
      source_claims: [claim-reward-model-score-design]
  reference_implementations:
    - name: Hugging Face Transformers model outputs
      url: https://huggingface.co/docs/transformers/main_classes/output
      description: Demonstrates tokenizer input, model invocation, and SequenceClassifierOutput with logits.
    - name: Hugging Face TRL RewardTrainer
      url: https://huggingface.co/docs/trl/en/reward_trainer
      description: Documents chosen-rejected preference data for reward-model training, which this inference-result record deliberately excludes.
    - name: Training language models to follow instructions with human feedback
      url: https://arxiv.org/abs/2203.02155
      description: Separates comparison data, reward-model training, and PPO policy optimization in an RLHF workflow.
structure:
  identity_keys: [reward_model_score_id]
  fields:
    - id: reward_model_score_id
      labels: {zh: 奖励模型分数标识, en: Reward model score identifier, ja: 報酬モデルスコア識別子}
      definitions:
        zh: 唯一标识一条已训练奖励模型产生的分数记录。
        en: Uniquely identifies one score record emitted by an already trained reward model.
        ja: 学習済み報酬モデルが出力した一件のスコア記録を一意に識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^reward-model-score-[a-z0-9-]{1,110}$'
      example_value: reward-model-score-104
      allowed_values: []
      source_claims: [claim-reward-model-score-design]
    - id: reward_model_ref
      labels: {zh: 奖励模型引用, en: Reward model reference, ja: 報酬モデル参照}
      definitions:
        zh: 指向实际产生该分数的已训练模型，不指向训练器或训练活动。
        en: References the trained model that emitted the score, not a trainer or training activity.
        ja: スコアを出力した学習済みモデルを参照し、trainer 又は訓練活動を参照しない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: model:reward-rm-v3
      allowed_values: []
      source_claims: [claim-reward-model-score-design]
    - id: reward_model_version
      labels: {zh: 奖励模型版本, en: Reward model version, ja: 報酬モデル版}
      definitions:
        zh: 产生该数值的模型版本，用于避免不同模型版本的输出被无依据地混合比较。
        en: Version of the model that emitted the value, preventing ungrounded comparisons across model versions.
        ja: 値を出力したモデル版。異なるモデル版の出力を根拠なく混在比較しないために用いる。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 3.2.1
      allowed_values: []
      source_claims: [claim-reward-model-score-design]
    - id: prompt_ref
      labels: {zh: 提示引用, en: Prompt reference, ja: プロンプト参照}
      definitions:
        zh: 指向与候选一起提供给奖励模型的具体 prompt 或其忠实保留的产物。
        en: References the concrete prompt, or faithfully retained artifact, supplied to the reward model with the candidate.
        ja: 候補と共に報酬モデルへ与えた具体的な prompt、又は忠実に保持した成果物を参照する。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Artifact:prompt-104
      allowed_values: []
      source_claims: [claim-trl-reward-trainer, claim-reward-model-score-design]
    - id: candidate_artifact_ref
      labels: {zh: 候选产物引用, en: Candidate artifact reference, ja: 候補成果物参照}
      definitions:
        zh: 指向由该模型与 prompt 配对后评分的一个候选产物，而不是 chosen/rejected 训练对。
        en: References one candidate artifact scored with the prompt by the model, not a chosen-rejected training pair.
        ja: モデルが prompt と組にして採点した一つの候補成果物を参照し、chosen-rejected 訓練対を参照しない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Artifact:answer-104
      allowed_values: []
      source_claims: [claim-trl-reward-trainer, claim-reward-model-score-design]
    - id: score_value
      labels: {zh: 分数值, en: Score value, ja: スコア値}
      definitions:
        zh: 从该模型输出明确映射出的数值；它不是人工量规分数，也不自动等同于概率。
        en: Numeric value explicitly mapped from this model output; it is neither a human rubric score nor automatically a probability.
        ja: このモデル出力から明示的に写した数値。人間のルーブリックスコアでも自動的に確率でもない。
      datatype: number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 0.73
      allowed_values: []
      source_claims: [claim-transformers-sequence-classifier-output, claim-reward-model-score-design]
    - id: score_scale
      labels: {zh: 分数尺度, en: Score scale, ja: スコア尺度}
      definitions:
        zh: 声明 `score_value` 的解释尺度，以防不同模型或不同后处理方式的输出被直接比较。
        en: Declares how `score_value` is interpreted so outputs from differing models or post-processing are not compared directly.
        ja: "`score_value` の解釈尺度を示し、異なるモデル又は後処理の出力を直接比較しないようにする。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: unbounded-logit
      allowed_values: [unbounded-logit, normalized-unit-interval]
      source_claims: [claim-transformers-sequence-classifier-output, claim-reward-model-score-design]
    - id: scored_at
      labels: {zh: 评分时间, en: Scoring time, ja: 採点時刻}
      definitions:
        zh: 模型为该 prompt 和候选产生分数的时间，不是模型训练或策略优化发生的时间。
        en: Time when the model emitted the score for this prompt and candidate, not a model-training or policy-optimization time.
        ja: モデルがこの prompt と候補にスコアを出力した時刻であり、モデル訓練又は方策最適化の時刻ではない。
      datatype: date-time
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '2026-07-18T13:20:00Z'
      allowed_values: []
      source_claims: [claim-reward-model-score-design]
    - id: potential_consumer_ref
      labels: {zh: 潜在消费者引用, en: Potential consumer reference, ja: 潜在的消費者参照}
      definitions:
        zh: 可选地指向未来可能消费此分数的目标、分析或活动；该引用不证明消费者已经运行。
        en: Optionally references an objective, analysis, or activity that may later consume this score; the reference does not prove the consumer ran.
        ja: 将来このスコアを消費し得る目的、分析、又は活動を任意に参照する。この参照は消費者が実行済みであることを証明しない。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: objective:ppo-helpfulness-v1
      allowed_values: []
      source_claims: [claim-reward-model-score-design]
  constraints:
    - id: reward-model-score-identifies-one-model-output
      severity: error
      expression_language: plain
      expression: reward_model_ref, reward_model_version, prompt_ref, candidate_artifact_ref, score_value, score_scale, and scored_at must identify one score emitted by an already trained reward model.
      explanation:
        zh: 仅有一个数字不能审计它由哪个模型、在什么输入和时间下产生；这些字段共同限定一条可追溯的模型输出。
        en: A number alone cannot be audited; these fields jointly identify which trained model emitted the value for which inputs and when.
        ja: 数値だけでは監査できない。これらのフィールドが、どの学習済みモデルがどの入力に対していつ値を出力したかを共同で特定する。
      source_claims: [claim-reward-model-score-design]
    - id: reward-model-score-comparison-requires-shared-basis
      severity: error
      expression_language: plain
      expression: Scores may be directly compared only when reward_model_ref, reward_model_version, and score_scale match, unless a separately recorded calibration establishes another comparison basis.
      explanation:
        zh: 同为数字不代表可比较；模型、版本或尺度不同必须有明确校准依据。
        en: Numeric values are not comparable merely because both are numbers; a changed model, version, or scale requires an explicit calibration basis.
        ja: 両方が数値であるだけでは比較できない。モデル、版、又は尺度が異なる場合は明示的な校正根拠が必要である。
      source_claims: [claim-reward-model-score-design]
    - id: reward-model-score-excludes-training-pair-and-run
      severity: error
      expression_language: plain
      expression: A record containing chosen and rejected candidates, a preference-training dataset, trainer-run reference, weight update, or optimizer step is not RewardModelScore; represent those facts as PreferenceExample or a separate training Activity.
      explanation:
        zh: 偏好对和训练运行是产生奖励模型之前或期间的不同事实，不能填入一次已训练模型的评分结果。
        en: A preference pair and a training run are different facts before or during reward-model creation and cannot be placed in one trained-model scoring result.
        ja: 選好対と訓練実行は、報酬モデル作成前又は作成中の別事実であり、一件の学習済みモデル採点結果へ入れてはならない。
      source_claims: [claim-trl-reward-trainer, claim-reward-model-score-design]
    - id: reward-model-score-consumer-reference-is-not-execution
      severity: error
      expression_language: plain
      expression: potential_consumer_ref may name a future consumer but must not be used as evidence that PPO or another reinforcement-learning Activity executed.
      explanation:
        zh: 可能被使用与已经执行是两个不同的时间事实。
        en: Potential future use and completed execution are different temporal facts.
        ja: 将来利用され得ることと実行済みであることは異なる時間的事実である。
      source_claims: [claim-instructgpt-stages, claim-reward-model-score-design]
  required_relations:
    - id: RewardModelScore-isAbout-CandidateArtifact
      direction: outgoing
      predicate: is_about
      target_concept_id: Artifact
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每条分数必须指向它实际评分的一个候选 Artifact。
        en: Each score must identify the one candidate Artifact it actually evaluates.
        ja: 各スコアは実際に評価した一つの候補 Artifact を特定しなければならない。
      source_claims: [claim-reward-model-score-design]
examples:
  - id: reward-model-score-positive-single-candidate

    labels: {zh: InstructGPT RM 单候选分数, en: InstructGPT RM single-candidate score, ja: InstructGPT RM 単一候補スコア}

    descriptions:
      zh: "InstructGPT (Ouyang et al., 2022) RLHF: SFT -> human-ranked RM r_theta(x,y) -> PPO; ~13k demos + 33k comparisons; RewardModelScore maps supervised/preference data-prep boundary."
      en: "InstructGPT (Ouyang et al., 2022) RLHF: SFT -> human-ranked RM r_theta(x,y) -> PPO; ~13k demos + 33k comparisons; RewardModelScore maps supervised/preference data-prep boundary."
      ja: "InstructGPT SFT->RM->PPO; RewardModelScore data prep boundary."
    field_values: {reward_model_score_id: instructgpt-rm-score-sample, reward_model_ref: 'model:instructgpt-reward-model-6b', reward_model_version: instructgpt-2022, prompt_ref: 'Artifact:instructgpt-api-prompt', candidate_artifact_ref: 'Artifact:instructgpt-candidate-completion', score_value: 0.73, score_scale: unbounded-logit, scored_at: '2022-03-04T00:00:00Z', potential_consumer_ref: 'objective:instructgpt-ppo-v1'}
    related_node_ids: [RewardModelScore, Artifact]
    related_relation_ids: [RewardModelScore-isAbout-CandidateArtifact]

    source_claims: [claim-transformers-sequence-classifier-output, claim-reward-model-score-design]
  - id: reward-model-score-counterexample-preference-pair

    labels: {zh: 偏好对不是模型分数, en: Preference pair is not a model score, ja: 選好対はモデルスコアではない}

    descriptions:
      zh: "compile() without metric/trainset cannot serve as DSPy-style RewardModelScore ChangeProposal."
      en: "compile() without metric/trainset cannot serve as DSPy-style RewardModelScore ChangeProposal."
      ja: "Missing metric/trainset rejects DSPy-style RewardModelScore."
    field_values: {reward_model_score_id: null, reward_model_ref: null, reward_model_version: null, prompt_ref: 'Artifact:prompt-104', candidate_artifact_ref: null, score_value: null, score_scale: null, scored_at: null, potential_consumer_ref: null}
    related_node_ids: [PreferenceExample, RewardModelScore]
    related_relation_ids: []

    source_claims: [claim-trl-reward-trainer, claim-reward-model-score-design]
  - id: reward-model-score-boundary-consumer-versus-execution

    labels: {zh: 潜在消费者与强化学习执行的边界, en: Boundary between potential consumer and RL execution, ja: 潜在的消費者と RL 実行の境界}

    descriptions:
      zh: "DPO requires learning_objective=preference; cannot auto-convert 1-5 Score to chosen/rejected for RewardModelScore."
      en: "DPO requires learning_objective=preference; cannot auto-convert 1-5 Score to chosen/rejected for RewardModelScore."
      ja: "DPO preference objective required."
    field_values: {reward_model_score_id: reward-model-score-104, reward_model_ref: 'model:reward-rm-v3', reward_model_version: 3.2.1, prompt_ref: 'Artifact:prompt-104', candidate_artifact_ref: 'Artifact:answer-104', score_value: 0.73, score_scale: unbounded-logit, scored_at: '2026-07-18T13:20:00Z', potential_consumer_ref: 'objective:ppo-helpfulness-v1'}
    related_node_ids: [RewardModelScore]
    related_relation_ids: [RewardModelScore-isAbout-CandidateArtifact]

    source_claims: [claim-instructgpt-stages, claim-reward-model-score-design]
  - id: reward-model-score-instance-104

    labels: {zh: 具体模型分数 reward-model-score-104, en: Concrete model score reward-model-score-104, ja: 具体的なモデルスコア reward-model-score-104}

    descriptions:
