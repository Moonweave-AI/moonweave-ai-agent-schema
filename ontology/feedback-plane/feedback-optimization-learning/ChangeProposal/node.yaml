schema: moonweave.ai/ontology-node/v1
id: ChangeProposal
kind: concept
labels:
  zh: 变更提议
  en: Change Proposal
  ja: 変更提案
semantics:
  short_definition:
    zh: 基于反馈和证据、但尚未执行的结构化改进提议。
    en: A structured improvement proposal grounded in feedback and evidence that has not yet been executed.
    ja: フィードバックと証拠に根拠を持つが、まだ実行されていない構造化改善提案。
  definition:
    zh: ChangeProposal 描述建议对一个候选、提示、配置或策略作何种修改，并保存该建议的 Feedback 或 Verdict 依据。它是静态信息实体，不是实际 Revision Activity、已生成的 RevisionArtifact、OpenAI fine-tuning 作业、DPO 训练运行、PPO 梯度步或自动重试。LangSmith 标注员在 review 中提出的 prompt 修改建议、Braintrust 失败 case 的修复草案、OpenAI eval grader 失败后的配置调整建议均可映射为本节点，但只有上游 Revision Activity 真正生成新 Artifact 后才产生 RevisionArtifact。
    en: "ChangeProposal describes what modification is recommended for a candidate, prompt, configuration, or policy and retains the Feedback or Verdict basis for that recommendation. It is a static information entity and not an actual Revision Activity, generated RevisionArtifact, OpenAI fine-tuning job, DPO training run, PPO gradient step, or automatic retry. LangSmith reviewer prompt-change suggestions, Braintrust failure-case fix drafts, and OpenAI eval grader failure configuration adjustments map to this node, but RevisionArtifact exists only after an upstream Revision Activity actually generates a new Artifact."
    ja: ChangeProposal は候補、プロンプト、構成、又は方針にどの変更を勧めるかを記述し、その提案の Feedback 又は Verdict 根拠を保持する。静的な情報エンティティであり、実際の Revision Activity、生成済み RevisionArtifact、OpenAI fine-tuning ジョブ、DPO 訓練実行、PPO 勾配ステップ、自動再試行ではない。LangSmith レビュアーの prompt 変更提案、Braintrust 失敗 case の修正草案、OpenAI eval grader 失敗後の構成調整提案は本ノードに写像できるが、上流 Revision Activity が新 Artifact を実際に生成した後にのみ RevisionArtifact が存在する。
  why_needed:
    zh: 有依据的改进想法需要在执行前被讨论、比较或拒绝。单独保存提议使团队能审计“为什么建议这样做”，而不会把建议误报为已完成修订、已提交 fine-tuning 或把任何失败自动变成控制动作。
    en: "A grounded improvement idea may need discussion, comparison, or rejection before execution. Storing it separately lets a team audit why an action was suggested without reporting it as completed revision, a submitted fine-tuning job, or turning any failure automatically into a control action."
    ja: 根拠ある改善案は実行前に議論、比較、又は却下が必要な場合がある。別に保存することで、完了改訂、提出済み fine-tuning、あらゆる失敗の自動制御操作化として報告せず、なぜその行為が提案されたかを監査できる。
  includes:
    - zh: 提议标识、目标对象、提议类型、建议动作和 Feedback 或 Verdict 依据。
      en: "Proposal identifier, target subject, proposal kind, recommended action, and Feedback or Verdict basis."
      ja: 提案識別子、対象、提案種別、推奨操作、Feedback 又は Verdict 根拠。
    - zh: 提示、参数、配置或策略层面的建议，前提是它们可引用评估或人工证据。
      en: "Prompt, parameter, configuration, or policy recommendations when they can cite evaluation or human evidence."
      ja: 評価又は人間証拠を引用できる場合のプロンプト、パラメータ、構成、又は方針の推奨。
  excludes:
    - zh: 已实施版本、Patch、RevisionArtifact 和执行它们的 Revision Activity。
      en: "Implemented version, patch, RevisionArtifact, and Revision Activity that executes them."
      ja: 実装済み版、パッチ、RevisionArtifact、及びそれらを実行する Revision Activity。
    - zh: 没有 Feedback 或 Verdict 依据的临时想法，或 OpenAI POST /v1/fine_tuning/jobs 提交本身。
      en: "An ad hoc idea with no Feedback or Verdict basis, or an OpenAI POST /v1/fine_tuning/jobs submission by itself."
      ja: Feedback 又は Verdict 根拠のない場当たり的な案、又は OpenAI POST /v1/fine_tuning/jobs 提出そのもの。
  semantic_kind: entity
  aliases: [improvement proposal, revision proposal, 改进提案]
engineering:
  explanation:
    zh: 新集成应以 LangSmith review 评论、Braintrust 失败 case 备注、OpenAI eval grader 失败摘要为可映射 API 形状，再将 Feedback、Verdict 和候选上下文组合成局部 JSON 提议。Responses API 可生成候选文字或建议草案，但响应本身不证明提议已经获采纳或执行；fine-tuning job 提交是训练契约，不是未执行提议的等价物。
    en: "New integrations should treat LangSmith review comments, Braintrust failure-case notes, and OpenAI eval grader failure summaries as mappable API shapes, then combine Feedback, Verdict, and candidate context into a local JSON proposal. The Responses API can generate candidate wording or a draft recommendation, but a response itself does not prove acceptance or execution; a fine-tuning job submission is a training contract, not an equivalent of an unexecuted proposal."
    ja: 新しい統合では LangSmith review コメント、Braintrust 失敗 case 注記、OpenAI eval grader 失敗要約を写像可能 API 形状として扱い、Feedback、Verdict、候補文脈をローカル JSON 提案に組み合わせる。Responses API は候補文言又は推奨草案を生成できるが、応答自体は受け入れ又は実行を証明しない。fine-tuning job 提出は訓練契約であり、未実行提案の同等物ではない。
  typical_input:
    - description: Evidence-bound local proposal after OpenAI string_check grader failure.
      format: |
        {
          "subject_ref": "Artifact:answer-104",
          "proposal_kind": "prompt",
          "evidence_ref": "Verdict:verdict-string-check-fail",
          "recommended_action": "Add explicit Hardware power-failure examples to the system prompt."
        }
      source_claims: [claim-change-proposal-openai-evals, claim-change-proposal-design]
    - description: LangSmith human review comment used as proposal basis.
      format: |
        {
          "subject_ref": "Artifact:answer-104",
          "proposal_kind": "prompt",
          "evidence_ref": "Feedback:langsmith-annotation-8842",
          "recommended_action": "Add warranty escalation step after safe troubleshooting."
        }
      source_claims: [claim-change-proposal-langsmith, claim-change-proposal-design]
  typical_output:
    - description: Local unexecuted proposal record awaiting revision orchestration.
      format: |
        {
          "proposal_id": "proposal-105",
          "subject_ref": "Artifact:answer-104",
          "proposal_kind": "prompt",
          "evidence_ref": "Feedback:feedback-105",
          "recommended_action": "Clarify hardware power-failure classification instructions."
        }
      source_claims: [claim-change-proposal-design]
  reference_implementations:
    - name: OpenAI Agent Evals
      url: https://platform.openai.com/docs/guides/evals
      description: Grader failures and eval run results as evidence for improvement proposals.
    - name: LangSmith
      url: https://docs.smith.langchain.com
      description: Human review annotations and correction comments as proposal basis.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Separates a planned entity from an activity and the artifact it later generates.
structure:
  identity_keys: [proposal_id]
  fields:
    - id: proposal_id
      labels: {zh: 提议标识, en: Proposal identifier, ja: 提案識別子}
      definitions:
        zh: 唯一标识一条尚未执行的结构化变更提议。
        en: Uniquely identifies one unexecuted structured modification proposal.
        ja: 一件の未実行の構造化変更提案を一意に識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: proposal-105
      allowed_values: []
      source_claims: [claim-change-proposal-design]
    - id: subject_ref
      labels: {zh: 目标对象引用, en: Target subject reference, ja: 対象参照}
      definitions:
        zh: 指向建议被修改的候选 Artifact、提示或配置实体的引用。
        en: Reference to candidate Artifact, prompt, or configuration entity recommended for modification.
        ja: 変更を推奨する候補 Artifact、プロンプト、又は構成エンティティへの参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Artifact:answer-104
      allowed_values: []
      source_claims: [claim-change-proposal-design]
    - id: proposal_kind
      labels: {zh: 提议类型, en: Proposal kind, ja: 提案種別}
      definitions:
        zh: 指出建议作用于提示、参数、配置还是策略层，不表示其已经实施。
        en: States whether recommendation concerns prompt, parameter, configuration, or policy layer and does not indicate implementation has occurred.
        ja: 推奨がプロンプト、パラメータ、構成、方針のどの層に関するかを示し、実装済みを意味しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: prompt
      allowed_values: [prompt, parameter, configuration, policy]
      source_claims: [claim-change-proposal-design]
    - id: evidence_ref
      labels: {zh: 提议依据引用, en: Proposal evidence reference, ja: 提案根拠参照}
      definitions:
        zh: 指向支持建议的 Feedback、Verdict 或其他可审计评估证据。
        en: Reference to Feedback, Verdict, or other auditable evaluation evidence supporting recommendation.
        ja: 推奨を支える Feedback、Verdict、又は他の監査可能な評価証拠への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: Feedback:feedback-105
      allowed_values: []
      source_claims: [claim-change-proposal-design]
    - id: recommended_action
      labels: {zh: 建议动作, en: Recommended action, ja: 推奨操作}
      definitions:
        zh: 说明建议修改什么的可读行动描述，不声明动作已经执行。
        en: Readable action description stating what should be modified without asserting it has been executed.
        ja: 何を変更すべきかを示す可読な操作説明であり、実行済みを主張しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Clarify hardware power-failure classification instructions.
      allowed_values: []
      source_claims: [claim-change-proposal-design]
  constraints:
    - id: change-proposal-is-evidence-grounded
      severity: error
      expression_language: plain
      expression: evidence_ref must identify feedback or evaluation evidence that supports recommended_action for subject_ref.
      explanation:
        zh: 无依据的改动建议不能被当作可审计提议。
        en: An unsupported modification suggestion cannot be treated as an auditable proposal.
        ja: 根拠のない変更提案は監査可能な提案として扱えない。
      source_claims: [claim-change-proposal-design]
    - id: change-proposal-is-not-execution
      severity: error
      expression_language: plain
      expression: A ChangeProposal must not assert generated artifact, executed activity, fine-tuning job completion, or completed outcome; those facts belong to RevisionActivity, RevisionArtifact, and separate training records.
      explanation:
        zh: 计划、执行和结果必须由不同实体或活动表达。
        en: Plan, execution, and result must be expressed by different entities or activities.
        ja: 計画、実行、結果は異なるエンティティ又は活動で表現しなければならない。
      source_claims: [claim-change-proposal-provenance, claim-change-proposal-design]
  required_relations:
    - id: change-proposal-is-informed-by-feedback
      direction: outgoing
      predicate: is_informed_by
      target_concept_id: Feedback
      cardinality: {min: 1, max: null}
      explanations:
        zh: 每条 ChangeProposal 至少由一条 Feedback 或等价评估证据提供依据。
        en: Each ChangeProposal must be informed by at least one Feedback or equivalent evaluation evidence record.
        ja: 各 ChangeProposal は少なくとも一つの Feedback 又は同等の評価証拠記録により根拠付けられなければならない。
      source_claims: [claim-change-proposal-design]
    - id: change-proposal-is-about-artifact
      direction: outgoing
      predicate: is_about
      target_concept_id: Artifact
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每条提议必须有一个明确的候选 Artifact 对象。
        en: Each proposal must identify one explicit candidate Artifact subject.
        ja: 各提案は一つの明示的な候補 Artifact 対象を特定しなければならない。
      source_claims: [claim-change-proposal-design]
examples:
  - id: change-proposal-example-openai-grader-failure
    labels:
      zh: OpenAI string_check 失败后的 prompt 提议
      en: Prompt proposal after OpenAI string_check grader failure
      ja: OpenAI string_check 失敗後の prompt 提案
    descriptions:
      zh: proposal_id=openai-grader-prompt-fix-001 subject_ref=Artifact:gpt4o-ticket-classification proposal_kind=prompt evidence_ref=Verdict:verdict-string-check-fail recommended_action=在 system prompt 中加入 Hardware 电源故障示例；依据 OpenAI eval grader 失败，尚未执行修订。
      en: proposal_id=openai-grader-prompt-fix-001 subject_ref=Artifact:gpt4o-ticket-classification proposal_kind=prompt evidence_ref=Verdict:verdict-string-check-fail recommended_action=Add Hardware power-failure examples to system prompt; grounded in OpenAI eval grader failure, revision not yet executed.
      ja: proposal_id=openai-grader-prompt-fix-001。OpenAI eval grader 失敗に根拠し、改訂は未実行。
    example_source:
      product: OpenAI Agent Evals
      url: https://platform.openai.com/docs/guides/evals
      version: string_check grader
    field_values:
      proposal_id: openai-grader-prompt-fix-001
      subject_ref: Artifact:gpt4o-ticket-classification
      proposal_kind: prompt
      evidence_ref: Verdict:verdict-string-check-fail
      recommended_action: Add Hardware power-failure examples to the system prompt.
    related_node_ids: [ChangeProposal, Verdict, Artifact, Feedback]
    related_relation_ids: [change-proposal-is-about-artifact]
    source_claims: [claim-change-proposal-openai-evals, claim-change-proposal-design]
  - id: change-proposal-example-langsmith-review
    labels:
      zh: LangSmith 人工 review 提议
      en: LangSmith human review proposal
      ja: LangSmith 人間 review 提案
    descriptions:
      zh: proposal_id=langsmith-warranty-prompt-002 evidence_ref=Feedback:langsmith-annotation-8842 recommended_action=在安全排障步骤后增加保修升级选项；LangSmith 标注员 correction 作为依据，不是已生成 RevisionArtifact。
      en: proposal_id=langsmith-warranty-prompt-002 evidence_ref=Feedback:langsmith-annotation-8842 recommended_action=Add warranty escalation after safe troubleshooting; LangSmith annotator correction as basis, not a generated RevisionArtifact.
      ja: LangSmith 注釈者 correction を根拠とし、RevisionArtifact ではない。
    example_source:
      product: LangSmith
      url: https://docs.smith.langchain.com
      version: human annotations
    field_values:
      proposal_id: langsmith-warranty-prompt-002
      subject_ref: Artifact:answer-104
      proposal_kind: prompt
      evidence_ref: Feedback:langsmith-annotation-8842
      recommended_action: Add warranty escalation step after safe troubleshooting steps.
    related_node_ids: [ChangeProposal, Feedback, HumanFeedback, Artifact]
    related_relation_ids: [change-proposal-is-informed-by-feedback, change-proposal-is-about-artifact]
    source_claims: [claim-change-proposal-langsmith, claim-change-proposal-design]
  - id: change-proposal-example-braintrust-failure
    labels:
      zh: Braintrust 失败 case 配置提议
      en: Braintrust failure-case configuration proposal
      ja: Braintrust 失敗 case 構成提案
    descriptions:
      zh: proposal_id=braintrust-threshold-003 proposal_kind=configuration evidence_ref=Verdict:braintrust-assertion-fail recommended_action=将 faithfulness 阈值从 0.7 提高到 0.85；Braintrust experiment 断言失败驱动，不是 fine-tuning 提交。
      en: proposal_id=braintrust-threshold-003 proposal_kind=configuration evidence_ref=Verdict:braintrust-assertion-fail recommended_action=Raise faithfulness threshold from 0.7 to 0.85; Braintrust experiment assertion failure driven, not a fine-tuning submission.
      ja: Braintrust experiment 断言失敗に根拠し、fine-tuning 提出ではない。
    example_source:
      product: Braintrust
      url: https://www.braintrust.dev/docs
      version: experiment assertions
    field_values:
      proposal_id: braintrust-threshold-003
      subject_ref: Artifact:rag-answer-221
      proposal_kind: configuration
      evidence_ref: Verdict:braintrust-assertion-fail
      recommended_action: Raise faithfulness threshold from 0.7 to 0.85 for refund-policy cases.
    related_node_ids: [ChangeProposal, Verdict, Artifact]
    related_relation_ids: []
    source_claims: [claim-change-proposal-design]
  - id: change-proposal-counterexample-unbound-idea
    labels:
      zh: 无依据的随意想法
      en: Unbound ad hoc idea
      ja: 根拠のない場当たり的な案
    descriptions:
      zh: 团队口头说“也许该改 prompt”但无 Feedback/Verdict evidence_ref；不能登记为 ChangeProposal，因为无法审计建议来源。
      en: Team verbally says maybe change the prompt with no Feedback/Verdict evidence_ref; cannot register as ChangeProposal because recommendation source is not auditable.
      ja: Feedback/Verdict evidence_ref なし。提案来源が監査不能なため ChangeProposal として登録できない。
    example_source:
      product: Moonweave optimization boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: evidence grounding requirement
    field_values:
      proposal_id: null
      subject_ref: null
      proposal_kind: null
      evidence_ref: null
    related_node_ids: [ChangeProposal]
    related_relation_ids: []
    source_claims: [claim-change-proposal-design]
  - id: change-proposal-boundary-executed-revision
    labels:
      zh: 提议与已执行修订的边界
      en: Boundary between proposal and executed revision
      ja: 提案と実行済み改訂の境界
    descriptions:
      zh: proposal_id=proposal-105 schema-valid 且 RevisionActivity:revise-31 已生成 Artifact:answer-105；ChangeProposal 仍只记录未执行建议，RevisionArtifact revision-105 才是完成事实，二者不可合并。
      en: proposal_id=proposal-105 schema-valid and RevisionActivity:revise-31 already generated Artifact:answer-105; ChangeProposal still records only the unexecuted recommendation while RevisionArtifact revision-105 is the completion fact—they must not merge.
      ja: ChangeProposal は未実行推奨のみ、RevisionArtifact revision-105 が完了事実。統合不可。
    example_source:
      product: Moonweave optimization boundary
      url: https://moonweave.ai/ontology/agent-system/2.0.0/
      version: proposal vs revision artifact
    field_values:
      proposal_id: proposal-105
      subject_ref: Artifact:answer-104
      proposal_kind: prompt
      evidence_ref: Feedback:feedback-105
      recommended_action: Clarify hardware power-failure classification instructions.
    related_node_ids: [ChangeProposal, RevisionActivity, RevisionArtifact]
    related_relation_ids: [change-proposal-is-informed-by-feedback]
    source_claims: [claim-change-proposal-provenance, claim-change-proposal-design]
parent_relation: null
relations:
  - id: ChangeProposal-isInformedBy-Feedback
    predicate: is_informed_by
    target: concept:Feedback
    direction: source-to-target
    relation_kind: semantic
    labels: {zh: 提议由反馈提供依据, en: proposal is informed by feedback, ja: 提案がフィードバックにより根拠付けられる}
    definitions:
      zh: 一条 Feedback 提供为什么建议该动作的依据，但不表示该动作已经发生。
      en: Feedback provides reason for recommended action without stating that the action occurred.
      ja: Feedback は推奨操作の理由を提供するが、その操作が発生したとは示さない。
    cardinality: {source: {min: 1, max: null}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: informs
      labels: {zh: 反馈启发提议, en: feedback informs proposal, ja: フィードバックが提案に根拠を与える}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-change-proposal-design]
    distinct_fact_rationale:
      zh: 该关系保存建议依据，不替代 Revision Activity 的实际使用关系。
      en: This relation preserves recommendation rationale and does not replace actual use relationship of Revision Activity.
      ja: この関係は推奨根拠を保持し、Revision Activity の実際の使用関係を置き換えない。
    layout_role: cross-link
  - id: ChangeProposal-isAbout-Artifact
    predicate: is_about
    target: concept:Artifact
    direction: source-to-target
    relation_kind: semantic
    labels: {zh: 提议关于候选产物, en: proposal is about artifact, ja: 提案が成果物についてである}
    definitions:
      zh: 提议指定应考虑修改的候选 Artifact，而不是将整个运行或遥测流设为对象。
      en: Proposal specifies candidate Artifact considered for modification rather than a whole run or telemetry stream.
      ja: 提案は全体実行又はテレメトリストリームではなく、変更を検討する候補 Artifact を指定する。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: has_proposal
      labels: {zh: 产物有提议, en: artifact has proposal, ja: 成果物が提案を持つ}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-change-proposal-design]
    distinct_fact_rationale:
      zh: 该关系固定提议对象，不表示对象已经改变。
      en: This relation fixes proposal subject and does not state that it has changed.
      ja: この関係は提案対象を固定し、それが変更済みとは示さない。
    layout_role: cross-link
sources:
  - id: openai-evals-change-proposal
    title: OpenAI Agent Evals
    url: https://platform.openai.com/docs/guides/evals
    source_type: official-doc
    relevance: Grader failures as evidence for unexecuted improvement proposals.
  - id: langsmith-change-proposal
    title: LangSmith Documentation
    url: https://docs.smith.langchain.com
    source_type: official-doc
    relevance: Human review annotations as proposal basis.
  - id: prov-o-change-proposal
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Distinguishes planned information entities from actual activities and generated artifacts.
  - id: change-proposal-design
    title: Change proposal design inference
    url: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_type: design-inference
    relevance: Models evidence-grounded unexecuted proposals separately from revision activity and output artifact.
source_claims:
  - id: claim-change-proposal-openai-evals
    source: openai-evals-change-proposal
