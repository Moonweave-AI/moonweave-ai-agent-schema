schema: moonweave.ai/ontology-node/v1
id: ChangeProposal
kind: concept
status: accepted
labels:
  zh: 变更提议
  en: Change Proposal
  ja: 変更提案
semantics:
  short_definition:
    zh: 基于反馈和证据、但尚未执行的结构化改进提议。
    en: A structured improvement proposal grounded in feedback and evidence that has not yet been executed.
    ja: フィードバックと証拠に根拠を持つが、まだ実行されていない構造化改善提案。
  definition:
    zh: Change Proposal 描述建议对一个候选、提示、配置或策略作何种修改，并保存该建议的 Feedback 或 Verdict 依据。它是静态信息实体，不是实际 Revision Activity、已生成的 RevisionArtifact、优化循环、自动重试或路由决策。只有上游 Revision Activity 真正使用输入并生成 Artifact 后，才会产生 RevisionArtifact。
    en: A Change Proposal describes what modification is recommended for a candidate, prompt, configuration, or policy and retains the Feedback or Verdict basis for that recommendation. It is a static information entity and not an actual Revision Activity, generated RevisionArtifact, optimization loop, automatic retry, or routing decision. RevisionArtifact exists only after an upstream Revision Activity actually uses inputs and generates an Artifact.
    ja: Change Proposal は候補、プロンプト、構成、又は方針にどの変更を勧めるかを記述し、その提案の Feedback 又は Verdict 根拠を保持する。静的な情報エンティティであり、実際の Revision Activity、生成済み RevisionArtifact、最適化ループ、自動再試行、又はルーティング決定ではない。上流 Revision Activity が実際に入力を使用して Artifact を生成した後にのみ RevisionArtifact が存在する。
  why_needed:
    zh: 有依据的改进想法需要在执行前被讨论、比较或拒绝。单独保存提议使团队能审计“为什么建议这样做”，而不会把建议误报为已完成修订或把任何失败自动变成控制动作。
    en: A grounded improvement idea may need discussion, comparison, or rejection before execution. Storing it separately lets a team audit why an action was suggested without reporting it as completed revision or turning any failure automatically into a control action.
    ja: 根拠ある改善案は実行前に議論、比較、又は却下が必要な場合がある。別に保存することで、完了改訂として報告したり、あらゆる失敗を自動的に制御操作へ変えたりせずに、なぜその行為が提案されたかを監査できる。
  includes:
    - zh: 提议标识、目标对象、提议类型、建议动作和反馈或判定依据。
      en: Proposal identifier, target subject, proposal kind, recommended action, and feedback or verdict basis.
      ja: 提案識別子、対象、提案種別、推奨操作、フィードバック又は判定根拠。
    - zh: 提示、参数、配置或策略层面的建议，前提是它们可引用证据。
      en: Prompt, parameter, configuration, or policy recommendations when they can cite evidence.
      ja: 証拠を引用できる場合のプロンプト、パラメータ、構成、又は方針の推奨。
  excludes:
    - zh: 已实施版本、Patch、RevisionArtifact 和执行它们的 Revision Activity。
      en: Implemented version, patch, RevisionArtifact, and Revision Activity that executes them.
      ja: 実装済み版、パッチ、RevisionArtifact、及びそれらを実行する Revision Activity。
    - zh: 没有反馈或判定依据的临时想法，或运行时重试和路由控制。
      en: An ad hoc idea with no feedback or verdict basis or runtime retry and routing control.
      ja: Feedback 又は Verdict 根拠のない場当たり的な案、又は実行時再試行とルーティング制御。
  semantic_kind: entity
  aliases: [improvement proposal, revision proposal, 改进提案]
engineering:
  explanation:
    zh: 评估器或人工流程可把 Feedback、Verdict 和候选上下文组合成局部 JSON 提议。Responses API 可以生成候选文字或建议草案，但响应本身不证明提议已经获采纳或执行。提议提交给上游编排后，实际 Revision Activity 才负责使用 Artifact 和 Feedback 并生成 RevisionArtifact。
    en: An evaluator or human process can combine Feedback, Verdict, and candidate context into a local JSON proposal. The Responses API can generate candidate wording or a draft recommendation, but a response itself does not prove that a proposal was accepted or executed. After the proposal goes to upstream orchestration, actual Revision Activity alone uses Artifact and Feedback and generates RevisionArtifact.
    ja: 評価器又は人間プロセスは Feedback、Verdict、候補文脈をローカル JSON 提案に組み合わせられる。Responses API は候補文言又は推奨草案を生成できるが、応答自体は提案が受け入れ又は実行されたことを証明しない。提案が上流オーケストレーションへ渡った後、実際の Revision Activity だけが Artifact と Feedback を使用して RevisionArtifact を生成する。
  typical_input:
    - description: Evidence-bound local proposal input.
      format: |
        {
          "subject_ref": "Artifact:answer-104",
          "proposal_kind": "prompt",
          "evidence_ref": "Feedback:feedback-105",
          "recommended_action": "Clarify hardware power-failure classification instructions."
        }
      source_claims: [claim-change-proposal-design]
    - description: Current candidate text request that may be used to draft but not execute a proposal.
      format: |
        POST /v1/responses
        {"model":"gpt-5.6","input":"Suggest a concise revision to distinguish hardware power failures from software issues."}
      source_claims: [claim-change-proposal-responses]
  typical_output:
    - description: Local unexecuted proposal record.
      format: |
        {
          "proposal_id": "proposal-105",
          "subject_ref": "Artifact:answer-104",
          "proposal_kind": "prompt",
          "evidence_ref": "Feedback:feedback-105",
          "recommended_action": "Clarify hardware power-failure classification instructions."
        }
      source_claims: [claim-change-proposal-design]
  reference_implementations:
    - name: OpenAI Responses API create reference
      url: https://developers.openai.com/api/reference/resources/responses/methods/create
      description: Candidate-text API that does not itself execute or approve a proposal.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Separates a planned entity from an activity and the artifact it later generates.
structure:
  identity_keys: [proposal_id]
  fields:
    - id: proposal_id
      labels: {zh: 提议标识, en: Proposal identifier, ja: 提案識別子}
      definitions:
        zh: 唯一标识一条尚未执行的结构化变更提议。
        en: Uniquely identifies one unexecuted structured modification proposal.
        ja: 一件の未実行の構造化変更提案を一意に識別する。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z][a-z0-9-]{2,127}$'
      example_value: proposal-105
      allowed_values: []
      source_claims: [claim-change-proposal-design]
    - id: subject_ref
      labels: {zh: 目标对象引用, en: Target subject reference, ja: 対象参照}
      definitions:
        zh: 指向建议被修改的候选 Artifact、提示或配置实体的引用。
        en: Reference to candidate Artifact, prompt, or configuration entity recommended for modification.
        ja: 変更を推奨する候補 Artifact、プロンプト、又は構成エンティティへの参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Artifact:answer-104
      allowed_values: []
      source_claims: [claim-change-proposal-design]
    - id: proposal_kind
      labels: {zh: 提议类型, en: Proposal kind, ja: 提案種別}
      definitions:
        zh: 指出建议作用于提示、参数、配置还是策略层，不表示其已经实施。
        en: States whether recommendation concerns prompt, parameter, configuration, or policy layer and does not indicate implementation has occurred.
        ja: 推奨がプロンプト、パラメータ、構成、方針のどの層に関するかを示し、実装済みを意味しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: prompt
      allowed_values: [prompt, parameter, configuration, policy]
      source_claims: [claim-change-proposal-design]
    - id: evidence_ref
      labels: {zh: 提议依据引用, en: Proposal evidence reference, ja: 提案根拠参照}
      definitions:
        zh: 指向支持建议的 Feedback、Verdict 或其他可审计评估证据。
        en: Reference to Feedback, Verdict, or other auditable evaluation evidence supporting recommendation.
        ja: 推奨を支える Feedback、Verdict、又は他の監査可能な評価証拠への参照。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: Feedback:feedback-105
      allowed_values: []
      source_claims: [claim-change-proposal-design]
    - id: recommended_action
      labels: {zh: 建议动作, en: Recommended action, ja: 推奨操作}
      definitions:
        zh: 说明建议修改什么的可读行动描述，不声明动作已经执行。
        en: Readable action description stating what should be modified without asserting it has been executed.
        ja: 何を変更すべきかを示す可読な操作説明であり、実行済みを主張しない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: Clarify hardware power-failure classification instructions.
      allowed_values: []
      source_claims: [claim-change-proposal-design]
  constraints:
    - id: change-proposal-is-evidence-grounded
      severity: error
      expression_language: plain
      expression: evidence_ref must identify feedback or evaluation evidence that supports recommended_action for subject_ref.
      explanation:
        zh: 无依据的改动建议不能被当作可审计提议。
        en: An unsupported modification suggestion cannot be treated as an auditable proposal.
        ja: 根拠のない変更提案は監査可能な提案として扱えない。
      source_claims: [claim-change-proposal-design]
    - id: change-proposal-is-not-execution
      severity: error
      expression_language: plain
      expression: A ChangeProposal must not assert generated artifact, executed activity, or completed outcome; those facts belong to RevisionActivity, RevisionArtifact, and later evaluation.
      explanation:
        zh: 计划、执行和结果必须由不同实体或活动表达。
        en: Plan, execution, and result must be expressed by different entities or activities.
        ja: 計画、実行、結果は異なるエンティティ又は活動で表現しなければならない。
      source_claims: [claim-change-proposal-provenance, claim-change-proposal-design]
  required_relations:
    - id: change-proposal-is-informed-by-feedback
      direction: outgoing
      predicate: is_informed_by
      target_concept_id: Feedback
      cardinality: {min: 1, max: null}
      explanations:
        zh: 每条 ChangeProposal 至少由一条 Feedback 提供依据。
        en: Each ChangeProposal must be informed by at least one Feedback record.
        ja: 各 ChangeProposal は少なくとも一つの Feedback 記録により根拠付けられなければならない。
      source_claims: [claim-change-proposal-design]
    - id: change-proposal-is-about-artifact
      direction: outgoing
      predicate: is_about
      target_concept_id: Artifact
      cardinality: {min: 1, max: 1}
      explanations:
        zh: 每条提议必须有一个明确的候选 Artifact 对象。
        en: Each proposal must identify one explicit candidate Artifact subject.
        ja: 各提案は一つの明示的な候補 Artifact 対象を特定しなければならない。
      source_claims: [claim-change-proposal-design]
examples:
  - id: change-proposal-positive-category-prompt

    labels: {zh: Constitutional AI critique 提议, en: Constitutional AI critique proposal, ja: Constitutional AI critique 提案}

    descriptions:
      zh: "DPO (Rafailov et al., 2023) L_DPO = -E[log sigmoid(beta*(log pi(y_w|x)/pi_ref(y_w|x) - log pi(y_l|x)/pi_ref(y_l|x)))]; TRL DPOTrainer prompt/chosen/rejected; ChangeProposal retains preference records not training batches."
      en: "DPO (Rafailov et al., 2023) L_DPO loss; TRL DPOTrainer prompt/chosen/rejected; ChangeProposal retains preference records not training batches."
      ja: "DPO L_DPO; prompt/chosen/rejected; ChangeProposal not training batch."
    field_values: {proposal_id: constitutional-ai-critique-001, subject_ref: 'Artifact:harmful-query-initial-response', proposal_kind: prompt, evidence_ref: 'Feedback:constitutional-self-critique', recommended_action: 'Revise response to explain objection per constitution principle instead of evading.'}
    related_node_ids: [ChangeProposal, Feedback, Artifact]
    related_relation_ids: [change-proposal-is-informed-by-feedback, change-proposal-is-about-artifact]

    source_claims: [claim-change-proposal-design]
  - id: change-proposal-counterexample-unbound-idea

    labels: {zh: 无依据的随意想法, en: Unbound ad hoc idea, ja: 根拠のない場当たり的な案}

    descriptions:
      zh: "compile() without metric/trainset cannot serve as DSPy-style ChangeProposal ChangeProposal."
      en: "compile() without metric/trainset cannot serve as DSPy-style ChangeProposal ChangeProposal."
      ja: "Missing metric/trainset rejects DSPy-style ChangeProposal."
    field_values: {proposal_id: null, subject_ref: null, proposal_kind: null, evidence_ref: null}
    related_node_ids: [ChangeProposal]
    related_relation_ids: []

    source_claims: [claim-change-proposal-design]
  - id: change-proposal-boundary-executed-revision

    labels: {zh: 提议与已执行修订的边界, en: Boundary between proposal and executed revision, ja: 提案と実行済み改訂の境界}

    descriptions:
      zh: "Self-Refine feedback is runtime self-critique; separate ChangeProposal from Verdict."
      en: "Self-Refine feedback is runtime self-critique; separate ChangeProposal from Verdict."
      ja: "Self-Refine feedback not Verdict."
    field_values: {proposal_id: proposal-105, subject_ref: 'Artifact:answer-104', proposal_kind: prompt, evidence_ref: 'Feedback:feedback-105', recommended_action: 'Clarify hardware power-failure classification instructions.'}
    related_node_ids: [ChangeProposal, RevisionActivity, RevisionArtifact]
    related_relation_ids: [change-proposal-is-informed-by-feedback]

    source_claims: [claim-change-proposal-provenance, claim-change-proposal-design]
  - id: change-proposal-instance-proposal-105

    labels: {zh: 具体提议 proposal-105, en: Concrete proposal proposal-105, ja: 具体的な提案 proposal-105}

    descriptions:
      zh: "DSPy instance: compiled demos=4->proposal_id=prompt-opt-v3->ChangeProposal ChangeProposal."
      en: "DSPy instance: compiled demos=4->proposal_id=prompt-opt-v3->ChangeProposal ChangeProposal."
      ja: "DSPy instance maps to ChangeProposal ChangeProposal."
    field_values: {proposal_id: proposal-105, subject_ref: 'Artifact:answer-104', proposal_kind: prompt, evidence_ref: 'Feedback:feedback-105', recommended_action: 'Clarify hardware power-failure classification instructions.'}
    related_node_ids: [ChangeProposal, Feedback, Verdict, RevisionActivity]
    related_relation_ids: [change-proposal-is-informed-by-feedback, change-proposal-is-about-artifact]

    source_claims: [claim-change-proposal-design]
parent_relation: null
relations:
  - id: ChangeProposal-isInformedBy-Feedback
    predicate: is_informed_by
    target: concept:Feedback
    direction: source-to-target
    relation_kind: semantic
    labels: {zh: 提议由反馈提供依据, en: proposal is informed by feedback, ja: 提案がフィードバックにより根拠付けられる}
    definitions:
      zh: 一条 Feedback 提供为什么建议该动作的依据，但不表示该动作已经发生。
      en: Feedback provides reason for recommended action without stating that the action occurred.
      ja: Feedback は推奨操作の理由を提供するが、その操作が発生したとは示さない。
    cardinality: {source: {min: 1, max: null}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: informs
      labels: {zh: 反馈启发提议, en: feedback informs proposal, ja: フィードバックが提案に根拠を与える}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-change-proposal-design]
    distinct_fact_rationale:
      zh: 该关系保存建议依据，不替代 Revision Activity 的实际使用关系。
      en: This relation preserves recommendation rationale and does not replace actual use relationship of Revision Activity.
      ja: この関係は推奨根拠を保持し、Revision Activity の実際の使用関係を置き換えない。
    layout_role: cross-link
  - id: ChangeProposal-isAbout-Artifact
    predicate: is_about
    target: concept:Artifact
    direction: source-to-target
    relation_kind: semantic
    labels: {zh: 提议关于候选产物, en: proposal is about artifact, ja: 提案が成果物についてである}
    definitions:
      zh: 提议指定应考虑修改的候选 Artifact，而不是将整个运行或遥测流设为对象。
      en: Proposal specifies candidate Artifact considered for modification rather than a whole run or telemetry stream.
      ja: 提案は全体実行又はテレメトリストリームではなく、変更を検討する候補 Artifact を指定する。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: has_proposal
      labels: {zh: 产物有提议, en: artifact has proposal, ja: 成果物が提案を持つ}
    conditions: []
    temporal_scope: timeless
    boundary_context: null
    constraints: []
    examples: []
    source_claims: [claim-change-proposal-design]
    distinct_fact_rationale:
      zh: 该关系固定提议对象，不表示对象已经改变。
      en: This relation fixes proposal subject and does not state that it has changed.
      ja: この関係は提案対象を固定し、それが変更済みとは示さない。
    layout_role: cross-link
sources:
  - id: openai-responses-change-proposal
    title: OpenAI Responses API create reference
    url: https://developers.openai.com/api/reference/resources/responses/methods/create
    source_type: official-doc
    relevance: Documents candidate text generation and does not imply execution or approval of local proposals.
  - id: prov-o-change-proposal
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Distinguishes planned information entities from actual activities and generated artifacts.
  - id: change-proposal-design
    title: Change proposal design inference
    url: https://www.w3.org/TR/prov-o/
    source_type: design-inference
    relevance: Models evidence-grounded unexecuted proposals separately from revision activity and output artifact.
source_claims:
  - id: claim-change-proposal-responses
    source: openai-responses-change-proposal
    supports: Responses API output can supply candidate wording but does not establish proposal approval or execution.
    locator: "Responses API reference: response creation"
    evidence_kind: official
    confidence: high
  - id: claim-change-proposal-provenance
    source: prov-o-change-proposal
    supports: PROV-O distinguishes entities, activities, and generated entities, supporting a plan versus execution boundary.
    locator: "PROV-O: Entity, Activity, wasGeneratedBy"
    evidence_kind: normative
    confidence: high
  - id: claim-change-proposal-design
    source: change-proposal-design
    supports: ChangeProposal is an evidence-grounded unexecuted recommendation distinct from RevisionActivity and RevisionArtifact.
    locator: "Local change proposal boundary"
    evidence_kind: design-inference
    confidence: high


