schema: moonweave.ai/ontology-node/v1
id: ChangeProposal
kind: concept
status: accepted
labels:
  zh: 变更提案
  en: change proposal
  ja: 変更提案
semantics:
  short_definition:
    zh: 变更提案是针对一个优化目标版本提出的可审查差异和预期效果记录。
    en: A change proposal is a reviewable diff and expected-effect record for one optimization-target version.
    ja: 変更提案は一つの最適化対象版に対する審査可能な差分と期待効果の記録です。
  definition:
    zh: 变更提案是一种信息记录；其身份由基线目标版本、候选差异、证据信号、预期指标变化、风险与回滚条件共同确定，它可以指导 CorrectionActivity，但不是已执行的变更。
    en: A change proposal is an information record identified by baseline target version, candidate diff, supporting signals, expected metric changes, risks, and rollback conditions; it may guide a CorrectionActivity but is not an executed change.
    ja: 変更提案は基準対象版、候補差分、支持信号、期待指標変化、リスク、ロールバック条件で同一性が決まる情報記録で、CorrectionActivity を導けますが実行済み変更ではありません。
  why_needed:
    zh: 独立提案对象允许策略审查、审批、拒绝和复现优化理由，并把搜索结果与部署动作隔离。
    en: A separate proposal enables policy review, approval, rejection, and reproduction of optimization rationale while isolating search output from deployment.
    ja: 独立提案により方針審査、承認、拒否、最適化理由再現ができ、探索結果と配備行為を分離します。
  includes:
    - zh: 包括提示差异、参数差异、策略差异及支持这些差异的证据摘要。
      en: Includes prompt, parameter, and policy diffs plus evidence summaries supporting them.
      ja: プロンプト、パラメータ、方針差分と支持証拠要約を含みます。
  excludes:
    - zh: 不包括已经发生的 CorrectionActivity 或没有基线版本的建议文本。
      en: Excludes an already executed CorrectionActivity and advice text without a baseline version.
      ja: 実行済み CorrectionActivity と基準版のない助言文は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys:
    - proposal_id
  fields:
    - id: proposal_id
      labels:
        zh: 变更提案标识
        en: change-proposal ID
        ja: 変更 proposal ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一份可独立评审、批准、拒绝或取代的变更提案。
        en: Stably identifies one change proposal that can be independently reviewed, approved, rejected, or superseded.
        ja: 独立に review・approve・reject・supersede できる変更 proposal を安定識別します。
      allowed_values: []
      pattern: null
      example_value: proposal/p-8
      source_claims:
        - claim-change-proposal-002
    - id: baseline_target_version_ref
      labels:
        zh: 基线目标版本引用
        en: baseline target-version reference
        ja: baseline target version 参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用候选差异所针对的 OptimizationTarget 精确基线版本。
        en: References the exact OptimizationTarget baseline version against which the candidate diff is expressed.
        ja: candidate diff の基準となる OptimizationTarget の正確な baseline version を参照します。
      allowed_values: []
      pattern: null
      example_value: optimization-target/router@12
      source_claims:
        - claim-change-proposal-003
    - id: candidate_diff
      labels:
        zh: 候选差异
        en: candidate diff
        ja: candidate diff
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以结构化操作记录相对基线拟议改变的路径、旧值与新值。
        en: Records proposed paths, old values, and new values as structured operations relative to the baseline.
        ja: baseline に対する変更 path・old value・new value を構造化 operation で記録します。
      allowed_values: []
      pattern: null
      example_value:
        path: prompt.system_instruction
        operation: replace
        candidate_ref: candidate/router-19-b
      source_claims:
        - claim-change-proposal-004
    - id: supporting_signal_refs
      labels:
        zh: 支持信号引用
        en: supporting-signal references
        ja: support signal 参照
      datatype: reference-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用直接支持该候选的 LearningSignals，禁止只凭优化器输出断言理由。
        en: References the LearningSignals directly supporting the candidate instead of asserting rationale from optimizer output alone.
        ja: candidate を直接支える LearningSignal を参照し、optimizer output だけから理由を断言しません。
      allowed_values: []
      pattern: null
      example_value:
        - learning-signal/ls-31
      source_claims:
        - claim-change-proposal-005
    - id: expected_metric_changes
      labels:
        zh: 预期指标变化
        en: expected metric changes
        ja: 予測 metric 変化
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 按 Metric 版本记录候选相对基线的预期变化、方向、区间与证据。
        en: Records expected deltas, directions, intervals, and evidence relative to baseline for versioned Metrics.
        ja: versioned Metric ごとに baseline 比の予測 delta・方向・区間・evidence を記録します。
      allowed_values: []
      pattern: null
      example_value:
        metric/success_rate@3: "+0.04"
        metric/estimated_cost@2: "+0.01"
      source_claims:
        - claim-change-proposal-006
    - id: risk_assessment_ref
      labels:
        zh: 风险评估引用
        en: risk-assessment reference
        ja: risk assessment 参照
      datatype: concept-reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用覆盖安全、权限、可靠性、成本和兼容性影响的独立评估。
        en: References an independent assessment of safety, permission, reliability, cost, and compatibility effects.
        ja: safety・permission・reliability・cost・compatibility 影響の独立 assessment を参照します。
      allowed_values: []
      pattern: null
      example_value: risk-assessment/p-8
      source_claims:
        - claim-change-proposal-007
    - id: rollback_condition
      labels:
        zh: 回滚条件
        en: rollback condition
        ja: rollback 条件
      datatype: expression
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明应用后哪些可观测结果要求恢复到基线版本。
        en: Declares which observable post-application results require restoration of the baseline version.
        ja: 適用後のどの observable result が baseline version への復元を要求するか宣言します。
      allowed_values: []
      pattern: null
      example_value: success_rate < baseline - 0.02 OR policy_violation_count > 0
      source_claims:
        - claim-change-proposal-008
    - id: decision_status
      labels:
        zh: 决策状态
        en: decision status
        ja: decision 状態
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录提案处于待审、已批准、已拒绝或已被取代；只有已批准提案可指导纠正活动。
        en: Records pending, approved, rejected, or superseded status; only an approved proposal may guide correction.
        ja: pending・approved・rejected・superseded を記録し、approved proposal だけが correction を guide できます。
      allowed_values: []
      pattern: null
      example_value: pending
      source_claims:
        - claim-change-proposal-009
  constraints:
    - id: change-proposal-approved-before-correction
      severity: error
      expression_language: plain
      expression: a ChangeProposal guides CorrectionActivity only when decision_status is approved and the baseline target version still matches
      explanations:
        zh: 只有状态为已批准且基线版本仍匹配的提案才能指导纠正活动。
        en: A proposal may guide correction only when approved and its baseline version still matches.
        ja: approved で baseline version が一致する proposal だけが correction を guide できます。
      source_claims:
        - claim-change-proposal-010
  required_relation_constraints: []
examples:
  - id: ChangeProposal-example-positive-manual-001
    kind: positive
    labels:
      zh: 变更提案正例
      en: Positive change proposal case
      ja: 変更提案の正例
    scenario_id: null
    descriptions:
      zh: proposal p-8 以 router@12 为基线，给出提示差异、预计 success_rate +4%、成本 +1% 和回滚阈值。
      en: proposal p-8 uses router@12 as baseline and states prompt diff, expected success_rate +4%, cost +1%, and rollback threshold.
      ja: proposal p-8 は router@12 を基準にプロンプト差分、success_rate +4%、費用 +1%、ロールバック閾値を示します。
    field_values:
      proposal_id: proposal/p-8
      baseline_target_version_ref: optimization-target/router@12
      candidate_diff:
        path: prompt.system_instruction
        operation: replace
        candidate_ref: candidate/router-19-b
      supporting_signal_refs:
        - learning-signal/ls-31
      expected_metric_changes:
        metric/success_rate@3: "+0.04"
        metric/estimated_cost@2: "+0.01"
      risk_assessment_ref: risk-assessment/p-8
      rollback_condition: success_rate < baseline - 0.02 OR policy_violation_count > 0
      decision_status: pending
    related_node_ids:
      - ChangeProposal
    related_relation_ids: []
    expected_result:
      zh: 该记录是完整的 ChangeProposal。
      en: The record is a complete ChangeProposal.
      ja: この記録は完全な ChangeProposal です。
    why_valid_or_invalid:
      zh: 基线、差异、证据、预期效果和回滚条件均明确。
      en: Baseline, diff, evidence, expected effect, and rollback condition are explicit.
      ja: 基準、差分、証拠、期待効果、ロールバック条件が明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-change-proposal-011
  - id: ChangeProposal-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 变更提案边界例
      en: Boundary change proposal case
      ja: 変更提案の境界例
    scenario_id: null
    descriptions:
      zh: CorrectionActivity 已把 router@12 更新为 @13，并记录部署时间。
      en: A CorrectionActivity has already updated router@12 to @13 and records deployment time.
      ja: CorrectionActivity は router@12 を @13 に更新済みで配備時刻を記録します。
    field_values: {}
    related_node_ids:
      - ChangeProposal
    related_relation_ids: []
    expected_result:
      zh: 这是执行活动，不是变更提案。
      en: This is an execution activity, not a change proposal.
      ja: これは実行活動で変更提案ではありません。
    why_valid_or_invalid:
      zh: 已发生动作具有时间边界和结果，提案只描述候选差异。
      en: An executed action has temporal bounds and outcome; a proposal only describes a candidate diff.
      ja: 実行済み行為は時間境界と結果を持ち、提案は候補差分のみを記述します。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-change-proposal-012
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations:
  - id: ChangeProposal-guides-CorrectionActivity
    predicate: guides
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 指导纠正活动
      en: guides correction activity
      ja: 修正活動を導く
    definitions:
      zh: 获准 ChangeProposal 为 CorrectionActivity 提供基线、差异、验证与回滚条件；提案本身不是活动，也不会绕过授权。
      en: An approved ChangeProposal supplies baseline, diff, validation, and rollback conditions to a CorrectionActivity; the proposal is not the activity and does not bypass authorization.
      ja: 承認済み ChangeProposal は CorrectionActivity へ基準、差分、検証、ロールバック条件を提供し、提案自体は活動でなく承認を迂回しません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_guides
      labels:
        zh: 反向：指导纠正活动
        en: "inverse: guides correction activity"
        ja: 逆方向：修正活動を導く
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: ChangeProposal-guides-CorrectionActivity-example-positive-manual-001
        kind: positive
        labels:
          zh: 指导纠正活动正例
          en: Positive case for guides correction activity
          ja: 修正活動を導くの正例
        scenario_id: null
        descriptions:
          zh: correction c-11 的 proposal_ref=p-8，执行差异与 p-8 完全一致并保留批准决定。
          en: correction c-11 has proposal_ref=p-8, executes its exact diff, and retains approval decision.
          ja: correction c-11 は proposal_ref=p-8 で同じ差分を実行し承認判断を保持します。
        field_values: {}
        related_node_ids:
          - ChangeProposal
          - CorrectionActivity
        related_relation_ids:
          - ChangeProposal-guides-CorrectionActivity
        expected_result:
          zh: 应记录 p-8 指导 c-11。
          en: p-8 is recorded as guiding c-11.
          ja: p-8 が c-11 を導くと記録します。
        why_valid_or_invalid:
          zh: 活动明确采用获准提案的基线与差异。
          en: The activity explicitly adopts the approved proposal baseline and diff.
          ja: 活動が承認提案の基準と差分を明示採用します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-change-proposal-013
      - id: ChangeProposal-guides-CorrectionActivity-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 指导纠正活动边界例
          en: Boundary case for guides correction activity
          ja: 修正活動を導くの境界例
        scenario_id: null
        descriptions:
          zh: c-12 执行另一个紧急修复，既不引用 p-8，差异也不同。
          en: c-12 executes another emergency fix, cites no p-8, and has a different diff.
          ja: c-12 は別の緊急修正を実行し p-8 を参照せず差分も異なります。
        field_values: {}
        related_node_ids:
          - ChangeProposal
          - CorrectionActivity
        related_relation_ids:
          - ChangeProposal-guides-CorrectionActivity
        expected_result:
          zh: 不得声称 p-8 指导 c-12。
          en: p-8 is not asserted to guide c-12.
          ja: p-8 が c-12 を導くとは主張しません。
        why_valid_or_invalid:
          zh: 同一目标不足以证明采用了同一提案。
          en: A shared target does not prove adoption of the same proposal.
          ja: 共通対象だけでは同一提案採用を証明しません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-change-proposal-014
    source_claims:
      - claim-change-proposal-015
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:CorrectionActivity
  - id: ChangeProposal-requires-PolicyDecision
    predicate: requires
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 要求策略决定
      en: requires policy decision
      ja: 方針判断を要求
    definitions:
      zh: ChangeProposal 在成为 CorrectionActivity 的依据前要求针对其风险、权限与作用域作出的 PolicyDecision；关系不预设决定是允许。
      en: ChangeProposal requires a PolicyDecision over its risk, permissions, and scope before it can guide CorrectionActivity; the relation does not presume an allow outcome.
      ja: ChangeProposal は CorrectionActivity の根拠となる前にリスク、権限、範囲に関する PolicyDecision を要求し、許可結果を前提としません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该关系的数量取决于被审查的运行或配置，不强加跨系统统一基数。
      en: The count depends on the reviewed run or configuration, so no universal cross-system cardinality is imposed.
      ja: 件数は審査対象の実行または構成に依存するため、システム横断の一律基数を課しません。
    inverse_reading:
      predicate: inverse_of_requires
      labels:
        zh: 反向：要求策略决定
        en: "inverse: requires policy decision"
        ja: 逆方向：方針判断を要求
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: ChangeProposal-requires-PolicyDecision-example-positive-manual-001
        kind: positive
        labels:
          zh: 要求策略决定正例
          en: Positive case for requires policy decision
          ja: 方針判断を要求の正例
        scenario_id: null
        descriptions:
          zh: proposal pol-5 的 gate 要求 policy-decision pd-81，输入包含差异、资源和申请者。
          en: proposal pol-5 gate requires policy-decision pd-81 with diff, resources, and requester as input.
          ja: proposal pol-5 の gate は差分、資源、申請者を入力とする policy-decision pd-81 を要求します。
        field_values: {}
        related_node_ids:
          - ChangeProposal
          - PolicyDecision
        related_relation_ids:
          - ChangeProposal-requires-PolicyDecision
        expected_result:
          zh: 应记录提案要求该策略决定。
          en: The proposal-to-policy-decision requirement is recorded.
          ja: 提案が当該方針判断を要求すると記録します。
        why_valid_or_invalid:
          zh: 治理门明确将提案作为策略输入并保留决定身份。
          en: The governance gate explicitly uses the proposal as policy input and retains decision identity.
          ja: 統制門が提案を方針入力として判断 ID を保持します。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-change-proposal-016
      - id: ChangeProposal-requires-PolicyDecision-example-boundary-manual-001
        kind: boundary
        labels:
          zh: 要求策略决定边界例
          en: Boundary case for requires policy decision
          ja: 方針判断を要求の境界例
        scenario_id: null
        descriptions:
          zh: pd-80 是上一版本提案的决定，输入哈希与 pol-5 不匹配。
          en: pd-80 decides a prior proposal version and its input hash does not match pol-5.
          ja: pd-80 は前提案版の判断で入力ハッシュが pol-5 と一致しません。
        field_values: {}
        related_node_ids:
          - ChangeProposal
          - PolicyDecision
        related_relation_ids:
          - ChangeProposal-requires-PolicyDecision
        expected_result:
          zh: 不得用 pd-80 满足 pol-5 的 requires 关系。
          en: pd-80 does not satisfy pol-5's requirement.
          ja: pd-80 は pol-5 の要求を満たしません。
        why_valid_or_invalid:
          zh: 策略决定必须绑定被审查提案的精确版本和输入。
          en: A policy decision must bind the exact proposal version and input reviewed.
          ja: 方針判断は審査した正確な提案版と入力を結ぶ必要があります。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-change-proposal-017
    source_claims:
      - claim-change-proposal-018
    distinct_fact_rationale: null
    layout_role: cross-link
    review_status: accepted
    target: concept:PolicyDecision
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-feedback-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 RLHF/DPO 文献与 DSPy 优化循环逐项核验。
    en: Verified against RLHF/DPO literature and DSPy optimization-loop patterns.
    ja: RLHF/DPO 文献と DSPy 最適化ループに照らし確認しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-change-proposal-001
    source: eng-fw-dspy-docs
    supports: DSPy optimizers produce an improved program candidate after metric-driven search; Moonweave serializes the candidate diff and evidence as ChangeProposal before deployment.
    locator: Learn DSPy > Optimizers > metric-driven program optimization
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-change-proposal-002
    source: eng-fw-dspy-docs
    supports: DSPy returns an optimized program but does not define a separately governed proposal identity. ChangeProposal.proposal_id is Moonweave's review and decision key for a candidate change.
    locator: Optimizers > compile returns an optimized program
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-change-proposal-003
    source: eng-fw-dspy-docs
    supports: DSPy optimization compiles a supplied program into a candidate program. ChangeProposal.baseline_target_version_ref is Moonweave's explicit before-state binding for reproducible diffs.
    locator: Optimizers > compile a supplied program
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-change-proposal-004
    source: eng-fw-dspy-docs
    supports: DSPy optimizers produce changed instructions or demonstrations. ChangeProposal.candidate_diff is Moonweave's structured, reviewable representation of those differences rather than an opaque optimized blob.
    locator: Optimizers > optimize instructions and demonstrations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-change-proposal-005
    source: eng-fw-dspy-docs
    supports: DSPy uses examples and metric results to guide optimization. ChangeProposal.supporting_signal_refs is Moonweave's explicit evidence lineage from those results and attributed learning signals to one proposal.
    locator: Optimizers > examples, metric, and optimization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-change-proposal-006
    source: eng-fw-dspy-docs
    supports: DSPy evaluates candidate quality with a defined metric. ChangeProposal.expected_metric_changes is Moonweave's versioned forecast and evidence summary, not a guarantee made by DSPy.
    locator: Optimizers > metric-driven program optimization
    evidence_kind: design-inference
    confidence: medium
    review_status: accepted
  - id: claim-change-proposal-007
    source: eng-fw-dspy-docs
