    labels:
      zh: 提示变更提案正例
      en: Positive prompt change proposal case
      ja: プロンプト変更提案の正例
    scenario_id: null
    descriptions:
      zh: proposal pp-4 把 router prompt v12 的日期检查移到工具选择前，并验证所有模板变量仍可绑定。
      en: proposal pp-4 moves date validation before tool selection in router prompt v12 and verifies all template variables remain bindable.
      ja: proposal pp-4 は router prompt v12 の日付検証をツール選択前へ移し全変数の結合可能性を検証します。
    field_values:
      proposal_id: proposal/pp-4
      baseline_target_version_ref: optimization-target/router-prompt@12
      candidate_diff:
        path: prompt.system_instruction.validation_order
        operation: move-before
        before: tool-selection
      supporting_signal_refs:
        - learning-signal/ls-31
      expected_metric_changes:
        metric/invalid_date_route_rate@2: "-0.08"
      risk_assessment_ref: risk-assessment/pp-4
      rollback_condition: template_binding_error_count > 0
      decision_status: pending
    related_node_ids:
      - PromptChangeProposal
    related_relation_ids: []
    expected_result:
      zh: 该记录是 PromptChangeProposal。
      en: The record is a PromptChangeProposal.
      ja: この記録は PromptChangeProposal です。
    why_valid_or_invalid:
      zh: 差异只涉及提示结构，并提供基线和变量兼容证据。
      en: The diff concerns prompt structure and provides baseline and variable-compatibility evidence.
      ja: 差分はプロンプト構造のみで基準と変数互換証拠を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-prompt-change-proposal-002
  - id: PromptChangeProposal-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 提示变更提案边界例
      en: Boundary prompt change proposal case
      ja: プロンプト変更提案の境界例
    scenario_id: null
    descriptions:
      zh: proposal 将 model.temperature 从 0.2 改为 0.4，提示文本不变。
      en: A proposal changes model.temperature from 0.2 to 0.4 while prompt text stays unchanged.
      ja: 提案は prompt を変えず model.temperature を 0.2 から 0.4 へ変更します。
    field_values: {}
    related_node_ids:
      - PromptChangeProposal
    related_relation_ids: []
    expected_result:
      zh: 这是 ParameterChangeProposal，不是提示变更提案。
      en: This is a ParameterChangeProposal, not a prompt change proposal.
      ja: これは ParameterChangeProposal でプロンプト変更提案ではありません。
    why_valid_or_invalid:
      zh: 差异端点是运行参数，不满足提示模板种差。
      en: The diff endpoint is a runtime parameter and does not satisfy prompt-template differentia.
      ja: 差分端点は実行パラメータでプロンプトテンプレートの種差を満たしません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-prompt-change-proposal-003
