schema: moonweave.ai/ontology-node/v1
id: PromptChangeProposal
kind: concept
status: accepted
labels:
  zh: 提示变更提案
  en: prompt change proposal
  ja: プロンプト変更提案
semantics:
  short_definition:
    zh: 提示变更提案是差异对象为提示模板内容或结构的变更提案。
    en: A prompt change proposal is a ChangeProposal whose diff changes prompt-template content or structure.
    ja: プロンプト変更提案はプロンプトテンプレート内容または構造を変更する ChangeProposal です。
  definition:
    zh: 提示变更提案是 ChangeProposal 的子类；它必须给出提示基线版本、结构化差异、变量兼容性和提示级评估证据，不包括模型参数或授权策略的变更。
    en: A prompt change proposal is a ChangeProposal subtype that states prompt baseline version, structured diff, variable compatibility, and prompt-level evaluation evidence and excludes model-parameter or authorization-policy changes.
    ja: プロンプト変更提案は ChangeProposal 下位型で、プロンプト基準版、構造化差分、変数互換性、プロンプト評価証拠を示し、モデルパラメータや認可方針変更を含みません。
  why_needed:
    zh: 提示特有的变量和指令边界必须单独验证，不能与参数或策略变更共用含混差异。
    en: Prompt-specific variables and instruction boundaries need dedicated validation and cannot share an ambiguous diff with parameter or policy changes.
    ja: プロンプト固有変数と指示境界は専用検証が必要で、パラメータ・方針変更と曖昧差分を共有できません。
  includes:
    - zh: 包括 system prompt、few-shot 示例、模板段落和变量插值规则的差异。
      en: Includes diffs to system prompts, few-shot examples, template sections, and variable interpolation rules.
      ja: system prompt、few-shot 例、テンプレート段落、変数補間規則の差分を含みます。
  excludes:
    - zh: 不包括 temperature 数值变化或权限允许/拒绝规则。
      en: Excludes temperature-value changes and permission allow/deny rules.
      ja: temperature 値変更と権限許可・拒否規則は含みません。
  semantic_kind: information
  aliases: []
