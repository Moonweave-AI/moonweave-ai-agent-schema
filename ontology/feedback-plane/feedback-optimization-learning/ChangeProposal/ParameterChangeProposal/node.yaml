      en: Positive parameter change proposal case
      ja: パラメータ変更提案の正例
    scenario_id: null
    descriptions:
      zh: proposal par-7 将 model.temperature 从 0.2 候选改为 0.35，范围 [0,1]，并附三次评估结果。
      en: proposal par-7 suggests model.temperature 0.2 to 0.35 within [0,1] with three evaluation results.
      ja: proposal par-7 は model.temperature を 0.2 から 0.35 へ [0,1] 内で提案し三評価結果を添付します。
    field_values:
      proposal_id: proposal/par-7
      baseline_target_version_ref: optimization-target/model-parameters@5
      candidate_diff:
        path: model.temperature
        operation: replace
        old_value: 0.2
        new_value: 0.35
      supporting_signal_refs:
        - learning-signal/pref-17
        - learning-signal/r-91
      expected_metric_changes:
        metric/task_success@4: "+0.03"
        metric/output_variance@2: "+0.01"
      risk_assessment_ref: risk-assessment/par-7
      rollback_condition: task_success < baseline - 0.01
      decision_status: pending
    related_node_ids:
      - ParameterChangeProposal
    related_relation_ids: []
    expected_result:
      zh: 该记录是 ParameterChangeProposal。
      en: The record is a ParameterChangeProposal.
      ja: この記録は ParameterChangeProposal です。
    why_valid_or_invalid:
      zh: 参数路径、基线、候选值、范围和证据完整。
      en: Parameter path, baseline, candidate, range, and evidence are complete.
      ja: パラメータ経路、基準、候補、範囲、証拠が完全です。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-parameter-change-proposal-002
  - id: ParameterChangeProposal-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 参数变更提案边界例
      en: Boundary parameter change proposal case
      ja: パラメータ変更提案の境界例
    scenario_id: null
    descriptions:
      zh: proposal 把安全策略从 deny 改成 allow，未涉及数值配置。
      en: A proposal changes a safety policy from deny to allow and changes no numeric configuration.
      ja: 提案は安全方針を deny から allow へ変更し数値構成を変更しません。
    field_values: {}
    related_node_ids:
      - ParameterChangeProposal
    related_relation_ids: []
