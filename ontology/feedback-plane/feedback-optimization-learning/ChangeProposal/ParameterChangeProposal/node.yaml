      en: This is a PolicyChangeProposal.
      ja: これは PolicyChangeProposal です。
    why_valid_or_invalid:
      zh: 授权规则的语义不是可调运行参数。
      en: Authorization-rule semantics are not a tunable runtime parameter.
      ja: 認可規則の意味は調整可能な実行パラメータではありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-parameter-change-proposal-003
