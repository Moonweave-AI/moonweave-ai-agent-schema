schema: moonweave.ai/ontology-node/v1
id: ParameterChangeProposal
kind: concept
status: accepted
labels:
  zh: 参数变更提案
  en: parameter change proposal
  ja: パラメータ変更提案
semantics:
  short_definition:
    zh: 参数变更提案是差异对象为模型或运行配置值的变更提案。
    en: A parameter change proposal is a ChangeProposal whose diff changes model or runtime configuration values.
    ja: パラメータ変更提案はモデルまたは実行構成値を変更する ChangeProposal です。
  definition:
    zh: 参数变更提案是 ChangeProposal 的子类；它点名参数路径、基线值、候选值、有效范围和敏感性证据，不改变提示内容或访问控制策略。
    en: A parameter change proposal is a ChangeProposal subtype naming parameter path, baseline value, candidate value, valid range, and sensitivity evidence without changing prompt content or access-control policy.
    ja: パラメータ変更提案は ChangeProposal 下位型で、パラメータ経路、基準値、候補値、有効範囲、感度証拠を示し、プロンプト内容やアクセス制御方針を変更しません。
  why_needed:
    zh: 参数路径、类型和范围必须在执行前验证，避免把一个候选数值写入错误组件。
    en: Parameter path, type, and range must be validated before execution to prevent writing a candidate value to the wrong component.
    ja: パラメータ経路、型、範囲を実行前検証し候補値の誤構成書込みを防ぎます。
  includes:
    - zh: 包括 temperature、top_p、路由权重、超时值或批量大小的候选变化。
      en: Includes candidate changes to temperature, top_p, routing weights, timeouts, or batch size.
      ja: temperature、top_p、ルーティング重み、タイムアウト、バッチサイズの候補変更を含みます。
  excludes:
    - zh: 不包括提示文本差异或允许某主体访问资源的策略规则。
      en: Excludes prompt-text diffs and policy rules allowing a subject to access a resource.
      ja: プロンプト文差分と主体の資源アクセスを許可する方針規則は含みません。
  semantic_kind: information
  aliases: []
