    kind: positive
    labels:
      zh: 策略变更提案正例
      en: Positive policy change proposal case
      ja: 方針変更提案の正例
    scenario_id: null
    descriptions:
      zh: proposal pol-5 基于 policy@8，建议让 reviewer 读取脱敏产物，并列出受影响资源与 deny→allow 差异。
      en: proposal pol-5 is based on policy@8 and proposes reviewer access to redacted artifacts with affected resources and deny-to-allow diff.
      ja: proposal pol-5 は policy@8 を基準に reviewer の脱敏成果物アクセスを deny→allow 差分と影響資源付きで提案します。
    field_values:
      proposal_id: proposal/pol-5
      baseline_target_version_ref: optimization-target/reviewer-access-policy@8
      candidate_diff:
        path: rules.reviewer.read_redacted_artifact
        operation: replace
        old_value: deny
        new_value: allow-with-redaction
      supporting_signal_refs:
        - learning-signal/reviewer-blockage-5
      expected_metric_changes:
        metric/review_completion_rate@2: "+0.06"
        metric/secret_disclosure_rate@4: "0"
      risk_assessment_ref: risk-assessment/pol-5
      rollback_condition: secret_disclosure_rate > 0
      decision_status: pending
    related_node_ids:
      - PolicyChangeProposal
    related_relation_ids: []
    expected_result:
      zh: 该记录是 PolicyChangeProposal。
      en: The record is a PolicyChangeProposal.
      ja: この記録は PolicyChangeProposal です。
    why_valid_or_invalid:
      zh: 规则版本、决策变化和安全影响均明确。
      en: Rule version, decision change, and safety impact are explicit.
      ja: 規則版、判断変化、安全影響が明示されています。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-policy-change-proposal-002
  - id: PolicyChangeProposal-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 策略变更提案边界例
      en: Boundary policy change proposal case
      ja: 方針変更提案の境界例
    scenario_id: null
    descriptions:
      zh: proposal prompt-9 仅改写助手语气，不改变任何允许、拒绝或审批条件。
      en: proposal prompt-9 only changes assistant tone and alters no allow, deny, or approval condition.
      ja: proposal prompt-9 は助手の語調のみを変え許可、拒否、承認条件を変えません。
    field_values: {}
    related_node_ids:
      - PolicyChangeProposal
