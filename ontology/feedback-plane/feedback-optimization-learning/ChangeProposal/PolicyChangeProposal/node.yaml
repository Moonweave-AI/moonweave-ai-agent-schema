schema: moonweave.ai/ontology-node/v1
id: PolicyChangeProposal
kind: concept
status: accepted
labels:
  zh: 策略变更提案
  en: policy change proposal
  ja: 方針変更提案
semantics:
  short_definition:
    zh: 策略变更提案是差异对象为可执行决策规则或其条件的变更提案。
    en: A policy change proposal is a ChangeProposal whose diff changes executable decision rules or conditions.
    ja: 方針変更提案は実行可能な判断規則または条件を変更する ChangeProposal です。
  definition:
    zh: 策略变更提案是 ChangeProposal 的子类；它必须给出策略版本、规则差异、受影响主体与资源、决策变化和安全影响，并在执行前要求 PolicyDecision。
    en: A policy change proposal is a ChangeProposal subtype that states policy version, rule diff, affected subjects and resources, changed decisions, and safety impact and requires a PolicyDecision before execution.
    ja: 方針変更提案は ChangeProposal 下位型で、方針版、規則差分、影響主体・資源、判断変化、安全影響を示し、実行前に PolicyDecision を要求します。
  why_needed:
    zh: 策略变化可能扩大权限或改变治理边界，必须独立于普通参数优化并进行显式授权。
    en: Policy changes can expand permissions or alter governance boundaries and therefore require explicit authorization separate from ordinary tuning.
    ja: 方針変更は権限拡大や統制境界変更を起こすため通常調整と分離し明示承認が必要です。
  includes:
    - zh: 包括允许/拒绝规则、审批条件、数据披露范围和工具访问条件的候选差异。
      en: Includes candidate diffs to allow/deny rules, approval conditions, disclosure scope, and tool-access conditions.
      ja: 許可・拒否規則、承認条件、開示範囲、ツールアクセス条件の候補差分を含みます。
  excludes:
    - zh: 不包括只改变 temperature 的参数提案或不影响规则的提示措辞优化。
      en: Excludes parameter-only temperature changes and prompt wording improvements that do not alter rules.
      ja: temperature のみのパラメータ提案と規則を変えないプロンプト表現改善は含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields: []
  constraints: []
  required_relation_constraints: []
examples:
