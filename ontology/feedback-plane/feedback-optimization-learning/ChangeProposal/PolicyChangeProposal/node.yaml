      en: This is a PromptChangeProposal, not a policy change.
      ja: これは PromptChangeProposal で方針変更ではありません。
    why_valid_or_invalid:
      zh: 文本变化没有改变可执行决策规则。
      en: The text change does not alter executable decision rules.
      ja: 文変更は実行可能な判断規則を変更しません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-policy-change-proposal-003
