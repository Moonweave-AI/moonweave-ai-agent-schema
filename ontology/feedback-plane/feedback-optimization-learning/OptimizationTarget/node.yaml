source_claims:
  - id: claim-optimization-target-001
    source: eng-fw-dspy-docs
    supports: DSPy optimizes a declared LM program and its parameters under metrics; Moonweave makes the candidate program version and mutable boundary explicit as OptimizationTarget.
    locator: Learn DSPy > Optimizers > metric-driven program optimization
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-optimization-target-002
    source: eng-fw-dspy-docs
    supports: DSPy optimizers accept a program to compile but do not prescribe a cross-version target identifier. OptimizationTarget.target_id is Moonweave's stable registry identity for that controlled object.
    locator: Optimizers > compile a program against a metric
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-optimization-target-003
    source: eng-fw-dspy-docs
    supports: DSPy can save an optimized program as a distinct artifact. OptimizationTarget.target_version is Moonweave's explicit baseline version used to avoid comparing or applying changes against drifted content.
    locator: Optimizers > compile, save, and reuse an optimized program
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-optimization-target-004
    source: eng-fw-dspy-docs
    supports: DSPy optimizers tune program instructions and demonstrations, while Moonweave also governs parameter and policy targets. OptimizationTarget.target_kind makes that optimization surface explicit rather than inferring it from names.
    locator: Optimizers > optimize prompts, instructions, and demonstrations
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-optimization-target-005
    source: eng-fw-dspy-docs
    supports: DSPy optimizers operate on defined program surfaces. OptimizationTarget.mutable_component_paths is Moonweave's allowlist that prevents candidate search from silently expanding into adjacent configuration.
    locator: Optimizers > program optimization surface
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-optimization-target-006
    source: eng-fw-dspy-docs
    supports: DSPy optimization maximizes a metric over program candidates but does not define Moonweave safety invariants. OptimizationTarget.invariant_refs supplies the explicit constraints that objective improvement cannot override.
    locator: Optimizers > metric-driven program optimization
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-optimization-target-007
    source: eng-fw-dspy-docs
    supports: DSPy scopes optimization to a supplied program and metric. OptimizationTarget-change-within-declared-boundary is Moonweave's stricter governance rule for mutable paths and invariants.
    locator: Optimizers > compile a supplied program against a metric
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-optimization-target-008
    source: eng-fw-dspy-docs
    supports: DSPy programs and parameters are the candidates optimized under metric-driven procedures.
    locator: Learn DSPy > Optimizers > metric-driven program optimization
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-optimization-target-009
    source: eng-fw-dspy-docs
    supports: DSPy distinguishes the program being optimized from metric values used to evaluate it.
    locator: Learn DSPy > Optimizers > metric-driven program optimization
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
