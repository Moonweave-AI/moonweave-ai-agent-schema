schema: moonweave.ai/ontology-node/v1
id: OptimizationTarget
kind: concept
status: review
labels:
  zh: 优化目标对象
  en: optimization target
  ja: 最適化対象
semantics:
  short_definition:
    zh: 优化目标对象是带版本、可变边界与优化目标的受控配置对象。
    en: An optimization target is a controlled, versioned configuration object with mutable boundaries and objectives.
    ja: 最適化対象は版、可変境界、目的を持つ管理構成対象です。
  definition:
    zh: 优化目标对象是一种受控规范对象；其身份由目标类型、稳定 ID、当前版本、允许变更的组成部分和不可破坏约束共同确定，区别于衡量它的 Metric 和提出修改的 ChangeProposal。
    en: An optimization target is a controlled specification object identified by target type, stable ID, current version, mutable components, and invariants, unlike the Metric that measures it or the ChangeProposal that suggests a modification.
    ja: 最適化対象は対象型、安定 ID、現行版、変更可能部品、不変条件で同一性が決まる管理仕様対象で、測定 Metric や変更を提案する ChangeProposal と異なります。
  why_needed:
    zh: 明确目标版本与可变边界才能防止优化器把邻近配置或安全约束一并修改。
    en: Explicit target version and mutable boundary prevent an optimizer from changing adjacent configuration or safety invariants.
    ja: 対象版と可変境界を明示すると最適化器が隣接構成や安全不変条件まで変更することを防げます。
  includes:
    - zh: 包括可优化的提示模板、路由策略版本、模型参数集或工具选择配置。
      en: Includes optimizable prompt templates, routing-policy versions, model parameter sets, or tool-selection configurations.
      ja: 最適化可能なプロンプトテンプレート、ルーティング方針版、モデルパラメータ集合、ツール選択構成を含みます。
  excludes:
    - zh: 不包括 Measurement 证据、LearningSignal 或尚未批准的 ChangeProposal。
      en: Excludes Measurement evidence, LearningSignals, and unapproved ChangeProposals.
      ja: Measurement 証拠、LearningSignal、未承認 ChangeProposal は含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - target_id
    - target_version
  fields:
    - id: target_id
      labels:
        zh: 优化目标标识
        en: optimization-target ID
        ja: 最適化 target ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨版本稳定标识同一受控优化对象。
        en: Stably identifies the same controlled optimization object across versions.
        ja: version をまたいで同じ controlled optimization object を安定識別します。
      allowed_values: []
      pattern: null
      example_value: optimization-target/prompt-router
      source_claims:
        - claim-optimization-target-002
    - id: target_version
      labels:
        zh: 目标版本
        en: target version
        ja: target version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识当前内容、可变边界与不变量均已冻结的一版目标。
        en: Identifies one target version whose content, mutable boundary, and invariants are frozen.
        ja: 内容・mutable boundary・invariant が固定された target version を識別します。
      allowed_values: []
      pattern: null
      example_value: "12"
      source_claims:
        - claim-optimization-target-003
    - id: target_kind
      labels:
        zh: 目标类型
        en: target kind
        ja: target 種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明目标是提示模板、参数集、路由策略或工具选择配置。
        en: States whether the target is a prompt template, parameter set, routing policy, or tool-selection configuration.
        ja: target が prompt template・parameter set・routing policy・tool selection configuration のどれかを示します。
      allowed_values: []
      pattern: null
      example_value: prompt-template
      source_claims:
        - claim-optimization-target-004
    - id: mutable_component_paths
      labels:
        zh: 可变组件路径
        en: mutable component paths
        ja: 変更可能 component path
      datatype: string-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 精确列出优化器获准提出变更的组件路径。
        en: Precisely lists component paths for which the optimizer may propose changes.
        ja: optimizer が変更を提案できる component path を正確に列挙します。
      allowed_values: []
      pattern: null
      example_value:
        - prompt.system_instruction
      source_claims:
        - claim-optimization-target-005
    - id: invariant_refs
      labels:
        zh: 不变量引用
        en: invariant references
        ja: invariant 参照
      datatype: reference-list
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用任何候选都必须保持的权限、安全、接口与输出契约。
        en: References permission, safety, interface, and output contracts every candidate must preserve.
        ja: 全 candidate が保持すべき permission・safety・interface・output contract を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - invariant/permission-policy-v8
        - invariant/router-output-schema-v4
      source_claims:
        - claim-optimization-target-006
  constraints:
    - id: optimization-target-change-within-declared-boundary
      severity: error
      expression_language: plain
      expression: a candidate changes only mutable_component_paths and satisfies every invariant_ref of the referenced OptimizationTarget version
      explanations:
        zh: 候选只能修改声明的可变路径，并满足该目标版本的全部不变量。
        en: A candidate changes only declared mutable paths and satisfies every invariant of the referenced target version.
        ja: candidate は宣言済み mutable path のみ変更し、参照 target version の全 invariant を満たします。
      source_claims:
        - claim-optimization-target-007
  required_relation_constraints: []
examples:
  - id: OptimizationTarget-example-positive-manual-001
    kind: positive
    labels:
      zh: 优化目标对象正例
      en: Positive optimization target case
      ja: 最適化対象の正例
    scenario_id: null
    descriptions:
      zh: target prompt-router 声明 current_version=12、可变部分为 system prompt、不可变部分为权限策略。
      en: target prompt-router declares current_version=12, mutable system prompt, and immutable permission policy.
      ja: target prompt-router は current_version=12、可変 system prompt、不変 permission policy を宣言します。
    field_values:
      target_id: optimization-target/prompt-router
      target_version: "12"
      target_kind: prompt-template
      mutable_component_paths:
        - prompt.system_instruction
      invariant_refs:
        - invariant/permission-policy-v8
        - invariant/router-output-schema-v4
    related_node_ids:
      - OptimizationTarget
    related_relation_ids: []
    expected_result:
      zh: 该对象是受控的优化目标。
      en: The object is a controlled optimization target.
      ja: この対象は管理された最適化対象です。
    why_valid_or_invalid:
      zh: 它有稳定身份、版本、允许变更范围和不变量。
      en: It has stable identity, version, mutable scope, and invariants.
      ja: 安定 ID、版、可変範囲、不変条件を持ちます。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-optimization-target-008
  - id: OptimizationTarget-example-boundary-manual-001
    kind: boundary
    labels:
      zh: 优化目标对象边界例
      en: Boundary optimization target case
      ja: 最適化対象の境界例
    scenario_id: null
    descriptions:
      zh: measurement success_rate=0.81 只描述 prompt-router@12 的表现。
      en: measurement success_rate=0.81 only describes performance of prompt-router@12.
      ja: measurement success_rate=0.81 は prompt-router@12 の性能のみを記述します。
    field_values: {}
    related_node_ids:
      - OptimizationTarget
    related_relation_ids: []
    expected_result:
      zh: 该记录是目标证据，不是 OptimizationTarget。
      en: The record is evidence about the target, not the OptimizationTarget.
      ja: これは対象に関する証拠で OptimizationTarget ではありません。
    why_valid_or_invalid:
      zh: 观测值没有目标的版本化配置与可变边界。
      en: An observation value has no versioned target configuration or mutable boundary.
      ja: 観測値には版管理された対象構成や可変境界がありません。
    synthetic: true
    verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
    source_claims:
      - claim-optimization-target-009
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
