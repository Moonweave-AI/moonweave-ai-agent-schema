id: node.timeout_policy
artifact: NodeClass
label: Timeout Policy
label_zh: 超时策略
intra_level: 2
intra_group: recovery-policy
intra_group_zh: 恢复策略
intra_axis: budget-recovery
intra_axis_zh: 恢复策略 / 预算控制
intra_role: policy
parent_node: node.execution_harness
layer: runtime
plane: RuntimePlane
description: 'Rules defining maximum wall-clock duration for operations, turns, runs, or sandbox commands before automatic
  cancellation or escalation.

  '
description_zh: >
  定义自动取消或升级之前操作、转弯、运行或沙箱命令的最大挂钟持续时间的规则。
attributes:
  default_timeout_seconds:
    type: integer
    required: false
    description: Default timeout applied when none specified.
  per_operation_overrides:
    type: object
    required: false
    description: Operation-type-specific timeout values.
  on_timeout_action:
    type: enum
    required: true
    values:
    - cancel
    - escalate
    - checkpoint_and_pause
    description: Behavior when timeout elapses.
status: active
