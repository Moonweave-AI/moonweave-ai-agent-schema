id: node.context_reset
artifact: NodeClass
label: Context Reset
label_zh: 上下文重置
layer: runtime
plane: RuntimePlane
description: 'Controlled flush of the ephemeral context window while preserving durable session state, checkpoints, and external
  memory references.

  '
attributes:
  reset_scope:
    type: enum
    required: true
    values:
    - full
    - tool_results
    - system_only
    description: Portion of context cleared.
  preserve_refs:
    type: object
    required: false
    description: Memory and checkpoint references retained after reset.
  trigger_reason:
    type: string
    required: true
    description: Human-readable reason for the reset operation.
status: active
required_edges:
  outgoing:
  - predicate: RESETS_CONTEXT_WITH
    target: node.continuation
