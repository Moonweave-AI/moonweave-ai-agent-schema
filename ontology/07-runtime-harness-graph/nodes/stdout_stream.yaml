id: node.stdout_stream
artifact: NodeClass
label: Stdout Stream
label_zh: 标准输出流
layer: runtime
plane: RuntimePlane
description: 'Standard output data stream capturing process-produced text or binary output for agent consumption.

  '
attributes:
  encoding:
    type: string
    required: true
    description: Character encoding of the stream.
  byte_count:
    type: integer
    required: false
    description: Total bytes captured from stdout.
  truncated:
    type: boolean
    required: false
    description: Whether output was truncated due to size limits.
status: active
required_edges:
  incoming:
  - predicate: STREAMS_TO
    source: node.command
