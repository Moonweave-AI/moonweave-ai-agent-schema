id: node.cost_budget
artifact: NodeClass
label: Cost Budget
label_zh: 成本预算
layer: runtime
plane: RuntimePlane
description: 'Maximum monetary cost allocatable per run or session across model inference, tool usage, and external API calls.

  '
attributes:
  max_cost_units:
    type: object
    required: false
    description: Maximum spend in configured currency or credit units.
  currency:
    type: string
    required: true
    description: Currency or credit denomination.
  alert_threshold_fraction:
    type: object
    required: false
    description: Fraction of budget at which warnings are emitted.
status: active
interfaces:
- ref: contract.budgetable
