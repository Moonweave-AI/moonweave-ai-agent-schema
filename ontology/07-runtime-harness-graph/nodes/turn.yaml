id: node.turn
artifact: NodeClass
label: Turn
label_zh: 轮次
intra_level: 2
intra_group: execution-session
intra_group_zh: 执行会话
intra_axis: session-execution
intra_axis_zh: 执行器与沙箱 / 执行会话
intra_role: state
parent_node: node.run
layer: runtime
plane: RuntimePlane
description: 'One request-response cycle within a run, comprising user or system input, agent reasoning, tool invocations,
  and the resulting assistant output.

  '
description_zh: >
  运行中的一个请求-响应周期，包括用户或系统输入、智能体推理、工具调用以及生成的辅助输出。
attributes:
  turn_index:
    type: integer
    required: false
    description: Zero-based ordinal of this turn within the parent run.
  input_tokens:
    type: integer
    required: false
    description: Token count of input context for this turn.
  output_tokens:
    type: integer
    required: false
    description: Token count of generated output for this turn.
status: active
required_edges:
  outgoing:
  - predicate: EMITS_EVENT
    target: node.event
  incoming:
  - predicate: ADVANCES_TO
    source: node.run
