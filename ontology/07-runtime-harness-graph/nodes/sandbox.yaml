id: node.sandbox
artifact: NodeClass
label: Sandbox
label_zh: 沙箱
intra_level: 1
intra_group: executor-sandbox
intra_group_zh: 执行器与沙箱
intra_axis: session-execution
intra_axis_zh: 执行器与沙箱 / 执行会话
intra_role: boundary
parent_node: node.execution_harness
layer: runtime
plane: RuntimePlane
description: 'Isolated execution environment enforcing resource limits, network policy, and filesystem boundaries for untrusted
  agent-generated actions.

  '
attributes:
  isolation_level:
    type: enum
    required: true
    values:
    - process
    - container
    - vm
    description: Strength of isolation boundary.
  resource_limits:
    type: object
    required: false
    description: CPU, memory, and storage caps enforced in this sandbox.
status: active
interfaces:
- ref: contract.executable
state_machine:
  ref: state.sandbox_lifecycle
required_edges:
  outgoing:
  - predicate: EXECUTES_IN
    target: node.container
  incoming:
  - predicate: EXECUTES_IN
    source: node.executor
