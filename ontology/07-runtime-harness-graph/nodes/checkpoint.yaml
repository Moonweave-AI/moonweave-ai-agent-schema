id: node.checkpoint
artifact: NodeClass
label: Checkpoint
label_zh: 检查点
intra_level: 2
intra_group: state-continuity
intra_group_zh: 状态连续性
intra_axis: continuity-observability
intra_axis_zh: 状态连续性 / 可观测性
intra_role: artifact
parent_node: node.state_store
layer: runtime
plane: RuntimePlane
description: 'Serialized state snapshot enabling resumption of execution after pause, interrupt, or failure.

  '
description_zh: >
  序列化状态快照可在暂停、中断或失败后恢复执行。
attributes:
  checkpoint_id:
    type: string
    required: true
    description: Unique identifier for this snapshot.
  state_blob_ref:
    type: string
    required: true
    description: Storage reference to serialized state payload.
  created_at:
    type: string
    required: true
    description: ISO-8601 timestamp when snapshot was taken.
status: active
interfaces:
- ref: contract.checkpointable
required_edges:
  outgoing:
  - predicate: CHECKPOINTS
    target: node.state_store
