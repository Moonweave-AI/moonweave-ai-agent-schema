id: node.executor
artifact: NodeClass
label: Executor
label_zh: 执行器
intra_level: 1
intra_group: executor-sandbox
intra_group_zh: 执行器与沙箱
intra_axis: session-execution
intra_axis_zh: 执行器与沙箱 / 执行会话
intra_role: executor
parent_node: node.execution_harness
layer: runtime
plane: RuntimePlane
description: 'Runtime component responsible for running actions, commands, and tool invocations within a configured sandbox
  and policy envelope.

  '
attributes:
  executor_type:
    type: enum
    required: true
    values:
    - inline
    - subprocess
    - remote
    description: Execution dispatch model.
  max_concurrent_actions:
    type: integer
    required: false
    description: Upper bound on parallel action executions.
status: active
interfaces:
- ref: contract.executable
required_edges:
  outgoing:
  - predicate: EXECUTES_IN
    target: node.sandbox
  - predicate: EMITS_EVENT
    target: node.event
