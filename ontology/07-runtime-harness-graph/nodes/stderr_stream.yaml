id: node.stderr_stream
artifact: NodeClass
label: Stderr Stream
label_zh: 标准错误流
intra_level: 3
intra_group: executor-sandbox
intra_group_zh: 执行器与沙箱
intra_role: stream
parent_node: node.process
layer: runtime
plane: RuntimePlane
description: 'Standard error data stream capturing diagnostic and error output from sandboxed processes.

  '
attributes:
  encoding:
    type: string
    required: true
    description: Character encoding of the stream.
  byte_count:
    type: integer
    required: false
    description: Total bytes captured from stderr.
  truncated:
    type: boolean
    required: false
    description: Whether output was truncated due to size limits.
status: active
required_edges:
  incoming:
  - predicate: STREAMS_TO
    source: node.command
