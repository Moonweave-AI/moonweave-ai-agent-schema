id: node.retry_policy
artifact: NodeClass
label: Retry Policy
label_zh: 重试策略
intra_level: 2
intra_group: recovery-policy
intra_group_zh: 恢复策略
intra_axis: budget-recovery
intra_axis_zh: 恢复策略 / 预算控制
intra_role: policy
parent_node: node.execution_harness
layer: runtime
plane: RuntimePlane
description: 'Rules governing automatic retry of failed operations including backoff, jitter, maximum attempts, and retriable
  error classification.

  '
attributes:
  max_attempts:
    type: integer
    required: false
    description: Maximum retry attempts including the initial try.
  backoff_strategy:
    type: enum
    required: true
    values:
    - fixed
    - exponential
    - linear
    description: Delay growth between retries.
  retriable_errors:
    type: object
    required: false
    description: Error codes or categories eligible for retry.
status: active
required_edges:
  outgoing:
  - predicate: RETRIES_BY
    target_any_of:
    - node.run
    - node.command
