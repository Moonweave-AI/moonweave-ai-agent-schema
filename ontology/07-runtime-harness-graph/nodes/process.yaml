id: node.process
artifact: NodeClass
label: Process
label_zh: 进程
layer: runtime
plane: RuntimePlane
description: 'A running OS process within a container executing commands on behalf of the agent.

  '
attributes:
  pid:
    type: integer
    required: false
    description: Operating-system process identifier.
  exit_code:
    type: integer
    required: false
    description: Process exit code when terminated.
  started_at:
    type: string
    required: true
    description: ISO-8601 timestamp of process start.
status: active
required_edges:
  outgoing:
  - predicate: EXECUTES_IN
    target: node.command
  incoming:
  - predicate: EXECUTES_IN
    source: node.container
