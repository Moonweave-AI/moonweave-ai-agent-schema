id: node.process
artifact: NodeClass
label: Process
label_zh: 进程
intra_level: 2
intra_group: executor-sandbox
intra_group_zh: 执行器与沙箱
intra_axis: session-execution
intra_axis_zh: 执行器与沙箱 / 执行会话
intra_role: process
parent_node: node.sandbox
layer: runtime
plane: RuntimePlane
description: 'A running OS process within a container executing commands on behalf of the agent.

  '
description_zh: >
  容器内运行的操作系统进程，代表智能体执行命令。
attributes:
  pid:
    type: integer
    required: false
    description: Operating-system process identifier.
  exit_code:
    type: integer
    required: false
    description: Process exit code when terminated.
  started_at:
    type: string
    required: true
    description: ISO-8601 timestamp of process start.
status: active
required_edges:
  outgoing:
  - predicate: EXECUTES_IN
    target: node.command
  incoming:
  - predicate: EXECUTES_IN
    source: node.container
