id: node.session
artifact: NodeClass
label: Session
label_zh: 会话
layer: runtime
plane: RuntimePlane
description: 'Persistent conversational context spanning multiple goal-directed runs, retaining identity, preferences, and
  cross-run state distinct from the ephemeral context window.

  '
attributes:
  session_id:
    type: string
    required: true
    description: Stable identifier for this conversational session.
  created_at:
    type: string
    required: true
    description: ISO-8601 timestamp of session creation.
  participant_refs:
    type: object
    required: false
    description: Human and agent identities associated with the session.
status: active
state_machine:
  ref: state.session_lifecycle
required_edges:
  outgoing:
  - predicate: STARTS
    target: node.run
  incoming:
  - predicate: STARTS
    source: node.execution_harness
