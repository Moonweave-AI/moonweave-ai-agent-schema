id: node.event
artifact: NodeClass
label: Event
label_zh: 事件
layer: runtime
plane: RuntimePlane
description: 'A discrete occurrence in the execution timeline such as tool invocation, policy decision, checkpoint, error,
  or state transition.

  '
attributes:
  event_type:
    type: enum
    required: true
    values:
    - tool_call
    - policy
    - checkpoint
    - error
    - state_change
    - message
    description: Category of occurrence.
  timestamp:
    type: string
    required: true
    description: ISO-8601 timestamp of the event.
  payload:
    type: object
    required: false
    description: Structured event-specific data.
  causal_parent_id:
    type: string
    required: true
    description: Optional reference to the triggering event.
status: active
required_edges:
  incoming:
  - predicate: EMITS_EVENT
    source_any_of:
    - node.turn
    - node.run
    - node.executor
