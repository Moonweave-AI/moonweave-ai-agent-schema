id: node.event
artifact: NodeClass
label: Event
label_zh: 事件
intra_level: 2
intra_group: observability
intra_group_zh: 可观测性
intra_axis: continuity-observability
intra_axis_zh: 状态连续性 / 可观测性
intra_role: event
parent_node: node.trace
layer: runtime
plane: RuntimePlane
description: 'A discrete occurrence in the execution timeline such as tool invocation, policy decision, checkpoint, error,
  or state transition.

  '
description_zh: >
  执行时间线中的离散事件，例如工具调用、策略决策、检查点、错误或状态转换。
attributes:
  event_type:
    type: enum
    required: true
    values:
    - tool_call
    - policy
    - checkpoint
    - error
    - state_change
    - message
    description: Category of occurrence.
  timestamp:
    type: string
    required: true
    description: ISO-8601 timestamp of the event.
  payload:
    type: object
    required: false
    description: Structured event-specific data.
  causal_parent_id:
    type: string
    required: true
    description: Optional reference to the triggering event.
status: active
required_edges:
  incoming:
  - predicate: EMITS_EVENT
    source_any_of:
    - node.turn
    - node.run
    - node.executor
