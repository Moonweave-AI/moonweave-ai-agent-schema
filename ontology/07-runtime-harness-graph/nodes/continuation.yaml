id: node.continuation
artifact: NodeClass
label: Continuation
label_zh: 续跑点
intra_level: 2
intra_group: state-continuity
intra_group_zh: 状态连续性
intra_axis: continuity-observability
intra_axis_zh: 状态连续性 / 可观测性
intra_role: artifact
parent_node: node.state_store
layer: runtime
plane: RuntimePlane
description: 'A resumable execution point referencing a checkpoint from which a paused or interrupted run may proceed.

  '
attributes:
  continuation_token:
    type: string
    required: true
    description: Opaque token identifying the resume point.
  source_checkpoint_id:
    type: string
    required: true
    description: Checkpoint from which continuation derives.
  expires_at:
    type: string
    required: true
    description: Optional expiration after which continuation is invalid.
status: active
required_edges:
  incoming:
  - predicate: RESTORES_FROM
    source: node.state_store
