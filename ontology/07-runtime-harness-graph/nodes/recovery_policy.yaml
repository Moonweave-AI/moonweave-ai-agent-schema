id: node.recovery_policy
artifact: NodeClass
label: Recovery Policy
label_zh: 恢复策略
layer: runtime
plane: RuntimePlane
description: 'Strategy for recovering from failures including checkpoint restore, partial replay, idempotent retry, or graceful
  degradation.

  '
attributes:
  recovery_strategy:
    type: enum
    required: true
    values:
    - checkpoint_restore
    - replay
    - retry
    - degrade
    description: Primary recovery approach.
  max_recovery_attempts:
    type: integer
    required: false
    description: Maximum recovery cycles before terminal failure.
  fallback_action:
    type: string
    required: true
    description: Action taken when recovery is exhausted.
status: active
required_edges:
  outgoing:
  - predicate: RECOVERS_FROM
    target_any_of:
    - node.run
    - node.checkpoint
