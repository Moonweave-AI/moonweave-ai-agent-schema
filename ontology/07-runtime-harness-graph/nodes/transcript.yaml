id: node.transcript
artifact: NodeClass
label: Transcript
label_zh: 转录
intra_level: 2
intra_group: observability
intra_group_zh: 可观测性
intra_role: artifact
parent_node: node.trace
layer: runtime
plane: RuntimePlane
description: 'An ordered record of all turns and messages comprising the session narrative; distinct from durable memory and
  subject to compaction policies.

  '
attributes:
  message_count:
    type: integer
    required: false
    description: Total messages recorded in the transcript.
  compaction_policy_ref:
    type: string
    required: true
    description: Reference to rules governing transcript truncation.
  format_version:
    type: string
    required: true
    description: Schema version of transcript entries.
status: active
required_edges:
  incoming:
  - predicate: APPENDS_TRANSCRIPT
    source: node.run
