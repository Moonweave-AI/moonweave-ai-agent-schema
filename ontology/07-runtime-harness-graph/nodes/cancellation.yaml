id: node.cancellation
artifact: NodeClass
label: Cancellation
label_zh: 取消
intra_level: 3
intra_group: recovery-policy
intra_group_zh: 恢复策略
intra_role: signal
parent_node: node.timeout_policy
layer: runtime
plane: RuntimePlane
description: 'Mechanism for stopping in-progress execution cooperatively or forcibly, propagating termination signals through
  runs, turns, and sandbox processes.

  '
attributes:
  cancellation_type:
    type: enum
    required: true
    values:
    - cooperative
    - forced
    description: Grace level of the stop request.
  propagation_scope:
    type: enum
    required: true
    values:
    - turn
    - run
    - session
    description: Breadth of cancellation propagation.
  reason:
    type: string
    required: true
    description: Human-readable reason for cancellation.
status: active
required_edges:
  outgoing:
  - predicate: CANCELS_BY
    target_any_of:
    - node.run
    - node.process
