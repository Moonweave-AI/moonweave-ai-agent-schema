id: node.run
artifact: NodeClass
label: Run
label_zh: 运行
layer: runtime
plane: RuntimePlane
description: 'A single goal-directed execution within a session, bounded by budgets and policies, producing a transcript and
  trace from initialization through completion or cancellation.

  '
attributes:
  run_id:
    type: string
    required: true
    description: Unique identifier for this execution attempt.
  goal:
    type: string
    required: true
    description: Natural-language or structured objective driving this run.
  parent_session_id:
    type: string
    required: true
    description: Session that owns this run.
status: active
interfaces:
- ref: contract.executable
- ref: contract.checkpointable
- ref: contract.budgetable
state_machine:
  ref: state.run_lifecycle
required_edges:
  outgoing:
  - predicate: ADVANCES_TO
    target: node.turn
  - predicate: APPENDS_TRANSCRIPT
    target: node.transcript
  - predicate: TRACES
    target: node.trace
