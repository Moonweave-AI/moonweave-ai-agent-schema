id: node.container
artifact: NodeClass
label: Container
label_zh: 容器
layer: runtime
plane: RuntimePlane
description: 'OS-level process isolation boundary providing namespace separation, cgroup limits, and lifecycle management
  for sandboxed workloads.

  '
attributes:
  container_id:
    type: string
    required: true
    description: Runtime identifier of the isolated environment.
  image_ref:
    type: string
    required: true
    description: Reference to the base environment image or filesystem snapshot.
status: active
required_edges:
  outgoing:
  - predicate: EXECUTES_IN
    target: node.process
  incoming:
  - predicate: EXECUTES_IN
    source: node.sandbox
