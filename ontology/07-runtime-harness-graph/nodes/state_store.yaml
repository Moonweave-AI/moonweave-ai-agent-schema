id: node.state_store
artifact: NodeClass
label: State Store
label_zh: 状态存储
intra_level: 1
intra_group: state-continuity
intra_group_zh: 状态连续性
intra_role: storage
parent_node: node.execution_harness
layer: runtime
plane: RuntimePlane
description: 'Persistent backend for checkpoint data, continuation tokens, and resumable execution artifacts.

  '
attributes:
  store_type:
    type: enum
    required: true
    values:
    - local
    - remote
    - embedded
    description: Persistence backend category.
  retention_days:
    type: integer
    required: false
    description: Default retention period for stored snapshots.
  encryption_enabled:
    type: boolean
    required: false
    description: Whether stored payloads are encrypted at rest.
status: active
required_edges:
  outgoing:
  - predicate: RESTORES_FROM
    target: node.continuation
  incoming:
  - predicate: CHECKPOINTS
    source: node.checkpoint
