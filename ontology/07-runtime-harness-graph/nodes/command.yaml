id: node.command
artifact: NodeClass
label: Command
label_zh: 命令
layer: runtime
plane: RuntimePlane
description: 'A shell command or executable invocation dispatched to a process within the sandbox.

  '
attributes:
  command_line:
    type: string
    required: true
    description: Full command string or argv array.
  working_directory:
    type: string
    required: true
    description: Directory from which the command executes.
  environment:
    type: object
    required: false
    description: Environment variables supplied to the process.
status: active
required_edges:
  outgoing:
  - predicate: STREAMS_TO
    target: node.stdout_stream
  - predicate: STREAMS_TO
    target: node.stderr_stream
  incoming:
  - predicate: EXECUTES_IN
    source: node.process
