id: node.execution_harness
artifact: NodeClass
label: Execution Harness
label_zh: 执行框架
intra_level: 0
intra_group: runtime-root
intra_group_zh: 运行时根
intra_axis: runtime-foundation
intra_axis_zh: 运行时根
intra_role: anchor
layer: runtime
plane: RuntimePlane
description: 'Top-level runtime container that hosts agent sessions, manages lifecycle policies, and provides the infrastructure
  for runs, tracing, and recovery.

  '
attributes:
  harness_id:
    type: string
    required: true
    description: Unique identifier of this runtime installation.
  supported_features:
    type: object
    required: false
    description: Capability flags for checkpointing, streaming, sandboxing.
  default_policies:
    type: object
    required: false
    description: Default timeout, retry, and budget policy references.
status: active
interfaces:
- ref: contract.executable
required_edges:
  outgoing:
  - predicate: STARTS
    target: node.session
