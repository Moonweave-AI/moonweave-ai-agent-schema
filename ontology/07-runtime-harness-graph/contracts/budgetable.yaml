id: contract.budgetable
artifact: InterfaceContract
label: Budgetable
label_zh: 可预算
description: 'Capability indicating an entity is subject to resource, token, or cost budget enforcement.

  '
operations:
- name: consume_budget
  description: Debit units from an attached budget.
  input:
    amount: object
    category: string
  output:
    remaining: object
  errors:
  - budget_exceeded
- name: get_budget_status
  description: Return current budget utilization.
  input: {}
  output:
    used: object
    limit: object
status: active
