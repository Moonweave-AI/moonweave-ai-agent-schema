id: contract.executable
artifact: InterfaceContract
label: Executable
label_zh: 可执行
description: 'Capability indicating an entity can dispatch and run actions within a runtime harness environment.

  '
operations:
- name: execute
  description: Dispatch an action for execution within the runtime.
  input:
    action: object
    context: object
  output:
    result: object
    events: array
  errors:
  - policy_denied
  - timeout
  - sandbox_unavailable
- name: get_execution_status
  description: Return status of an in-flight or completed execution.
  input:
    execution_id: string
  output:
    status: string
status: active
