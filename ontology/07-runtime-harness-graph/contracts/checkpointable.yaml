id: contract.checkpointable
artifact: InterfaceContract
label: Checkpointable
label_zh: 可检查点
description: 'Capability indicating an entity can serialize its state for later restoration.

  '
operations:
- name: checkpoint
  description: Capture current state as a restorable snapshot.
  input:
    label: string
  output:
    checkpoint_id: string
- name: restore
  description: Restore state from a previously captured checkpoint.
  input:
    checkpoint_id: string
  output:
    restored: boolean
  errors:
  - checkpoint_not_found
  - schema_mismatch
status: active
