id: state.session_lifecycle
artifact: StateMachine
label: Session Lifecycle
label_zh: 会话生命周期
description: 'Lifecycle states for a persistent conversational session.

  '
states:
- name: created
  initial: true
  description: Session record allocated.
- name: active
  description: At least one run is in progress or recently completed.
- name: idle
  description: No active runs; session awaiting new input.
- name: suspended
  description: Session paused; runs cannot start until resumed.
- name: terminated
  terminal: true
  description: Session closed; no further runs permitted.
transitions:
- from: created
  to: active
  trigger: first_run_start
- from: active
  to: idle
  trigger: all_runs_complete
- from: idle
  to: active
  trigger: run_start
- from: active
  to: suspended
  trigger: suspend
- from: idle
  to: suspended
  trigger: suspend
- from: suspended
  to: idle
  trigger: resume
- from: idle
  to: terminated
  trigger: terminate
- from: suspended
  to: terminated
  trigger: terminate
status: active
