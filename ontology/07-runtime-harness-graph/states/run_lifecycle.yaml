id: state.run_lifecycle
artifact: StateMachine
label: Run Lifecycle
label_zh: 运行生命周期
description: 'Lifecycle states for a single goal-directed execution within a session.

  '
states:
- name: initialized
  initial: true
  description: Run allocated but not yet executing.
- name: running
  description: Turns and actions actively executing.
- name: paused
  description: Execution suspended; may resume or checkpoint.
- name: checkpointed
  description: State persisted; awaiting resume or termination.
- name: completed
  terminal: true
  description: Goal achieved or run finished successfully.
- name: failed
  terminal: true
  description: Unrecoverable error terminated the run.
- name: cancelled
  terminal: true
  description: Run stopped by operator or policy.
transitions:
- from: initialized
  to: running
  trigger: start
- from: running
  to: paused
  trigger: pause
- from: paused
  to: running
  trigger: resume
- from: running
  to: checkpointed
  trigger: checkpoint
- from: checkpointed
  to: running
  trigger: resume_from_checkpoint
- from: running
  to: completed
  trigger: complete
- from: running
  to: failed
  trigger: fail
- from: running
  to: cancelled
  trigger: cancel
- from: paused
  to: cancelled
  trigger: cancel
status: active
