id: state.sandbox_lifecycle
artifact: StateMachine
label: Sandbox Lifecycle
label_zh: 沙箱生命周期
description: 'Lifecycle states for an isolated execution environment.

  '
states:
- name: provisioning
  initial: true
  description: Resources being allocated for the sandbox.
- name: ready
  description: Sandbox initialized and accepting commands.
- name: executing
  description: One or more commands running inside the sandbox.
- name: cleaning_up
  description: Tearing down processes and releasing resources.
- name: destroyed
  terminal: true
  description: Sandbox fully removed; no further execution.
transitions:
- from: provisioning
  to: ready
  trigger: provision_complete
- from: ready
  to: executing
  trigger: command_start
- from: executing
  to: ready
  trigger: command_complete
- from: ready
  to: cleaning_up
  trigger: shutdown
- from: executing
  to: cleaning_up
  trigger: shutdown
- from: cleaning_up
  to: destroyed
  trigger: cleanup_complete
status: active
