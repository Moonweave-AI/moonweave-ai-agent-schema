id: constraint.session_is_not_context_window
artifact: GraphConstraint
label: Session Is Not Context Window
label_zh: 会话不是上下文窗口
severity: error
rule: 'node.session MUST NOT be conflated with the ephemeral model context window. Session spans multiple runs; context window
  is per-turn working memory materialized from transcript, retrieval, and instructions.

  '
description: 'Confusing session persistence with context window leads to incorrect compaction and memory architecture.

  '
status: active
applies_to:
  nodes:
  - node.session
