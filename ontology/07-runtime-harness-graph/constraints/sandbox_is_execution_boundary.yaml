id: constraint.sandbox_is_execution_boundary
artifact: GraphConstraint
label: Sandbox Is Execution Boundary
label_zh: 沙箱是执行边界
severity: error
rule: 'All side-effecting environment actions MUST execute within node.sandbox via EXECUTES_IN. Direct host execution outside
  the sandbox boundary is forbidden for untrusted agent actions.

  '
description: 'Sandbox isolation is the primary containment for tool and command execution.

  '
status: active
applies_to:
  nodes:
  - node.sandbox
  - node.executor
