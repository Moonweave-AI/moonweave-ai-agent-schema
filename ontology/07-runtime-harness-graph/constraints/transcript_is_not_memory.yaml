id: constraint.transcript_is_not_memory
artifact: GraphConstraint
label: Transcript Is Not Memory
label_zh: 转录不是记忆
severity: error
rule: 'node.transcript records the ordered narrative of messages and events but MUST NOT serve as the sole long-horizon recall
  mechanism. Durable recall MUST use memory-graph artifacts.

  '
description: 'Transcripts are lossy under compaction; treating them as memory causes recall gaps.

  '
status: active
applies_to:
  nodes:
  - node.transcript
