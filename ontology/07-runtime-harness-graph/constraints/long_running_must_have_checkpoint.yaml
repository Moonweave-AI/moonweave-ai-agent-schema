id: constraint.long_running_must_have_checkpoint
artifact: GraphConstraint
label: Long Running Must Have Checkpoint
label_zh: 长运行必须有检查点
severity: error
rule: 'Any node.run expected to exceed configured duration thresholds MUST attach a node.checkpoint strategy via CHECKPOINTS
  before entering long-running execution.

  '
description: 'Checkpointing enables recovery and prevents total work loss on interruption.

  '
status: active
applies_to:
  nodes:
  - node.run
