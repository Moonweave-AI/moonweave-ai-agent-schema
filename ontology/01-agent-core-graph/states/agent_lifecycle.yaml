id: state.agent_lifecycle
artifact: StateMachine
label: Agent Lifecycle
label_zh: 智能体生命周期
description: >
  Operational lifecycle of an agent instance from idle through planning,
  execution, waiting, to terminal completed or failed states.
states:
  - name: idle
    initial: true
    description: Agent instantiated but not yet executing
  - name: planning
    description: Agent decomposing goals and forming plan
  - name: executing
    description: Agent actively running decision loop iterations
  - name: waiting
    description: Agent blocked awaiting external input, tool, or human
  - name: completed
    terminal: true
    description: Agent achieved goal or stop condition successfully
  - name: failed
    terminal: true
    description: Agent terminated due to unrecoverable error or policy block
transitions:
  - from: idle
    to: planning
    trigger: start
    description: Begin goal-driven execution
  - from: planning
    to: executing
    trigger: plan_ready
    description: Plan formed; enter action loop
  - from: executing
    to: waiting
    trigger: await_external
    description: Pause for tool result, human, or delegate
  - from: waiting
    to: executing
    trigger: resume
    description: External dependency satisfied
  - from: executing
    to: planning
    trigger: replan
    description: Feedback triggers plan revision
  - from: executing
    to: completed
    trigger: goal_satisfied
    description: Success termination
  - from: executing
    to: failed
    trigger: fatal_error
    description: Unrecoverable failure
  - from: waiting
    to: failed
    trigger: timeout
    description: Wait exceeded allowed duration
status: active
