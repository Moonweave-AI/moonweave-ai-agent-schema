id: state.task_lifecycle
artifact: StateMachine
label: Task Lifecycle
label_zh: 任务生命周期
description: >
  Lifecycle states for executable task units from creation through completion,
  failure, or cancellation.
states:
  - name: pending
    initial: true
    description: Task defined but not yet started
  - name: active
    description: Task currently being executed
  - name: blocked
    description: Task waiting on dependency or external event
  - name: completed
    terminal: true
    description: Task finished successfully
  - name: failed
    terminal: true
    description: Task terminated with error
  - name: cancelled
    terminal: true
    description: Task aborted before completion
transitions:
  - from: pending
    to: active
    trigger: assign
    description: Task assigned and execution begins
  - from: active
    to: blocked
    trigger: block
    description: Dependency unsatisfied
  - from: blocked
    to: active
    trigger: unblock
    description: Dependency resolved
  - from: active
    to: completed
    trigger: complete
    description: Deliverable accepted
  - from: active
    to: failed
    trigger: fail
    description: Execution error
  - from: pending
    to: cancelled
    trigger: cancel
    description: Cancelled before start
  - from: active
    to: cancelled
    trigger: cancel
    description: Cancelled during execution
  - from: blocked
    to: cancelled
    trigger: cancel
    description: Cancelled while blocked
status: active
