id: constraint.agent_must_have_decision_loop
artifact: GraphConstraint
label: Agent Must Have Decision Loop
label_zh: 智能体必须有决策循环
severity: error
rule: >
  Every Agent node instance MUST have exactly one outgoing RUNS_DECISION_LOOP
  edge to a DecisionLoop node.
applies_to:
  nodes: [node.agent]
  edges: [edge.RUNS_DECISION_LOOP]
description: >
  Agents without a decision loop cannot execute perceive-reason-act cycles.
  Validators reject incomplete agent definitions.
status: active
