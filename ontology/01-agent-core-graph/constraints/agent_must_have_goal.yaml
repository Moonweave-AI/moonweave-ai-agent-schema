id: constraint.agent_must_have_goal
artifact: GraphConstraint
label: Agent Must Have Goal
label_zh: 智能体必须有目标
severity: error
rule: >
  Every Agent node instance MUST have at least one outgoing PURSUES_GOAL edge
  to a Goal node with non-empty goal_statement.
applies_to:
  nodes: [node.agent]
  edges: [edge.PURSUES_GOAL]
description: >
  Goal-directed behavior is foundational. Agents without goals cannot satisfy
  the goal_driven interface contract.
status: active
