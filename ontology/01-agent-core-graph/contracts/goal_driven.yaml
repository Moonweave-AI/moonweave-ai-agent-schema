id: contract.goal_driven
artifact: InterfaceContract
label: Goal Driven
label_zh: 目标驱动
description: >
  Agent instances must declare at least one pursued goal and orient decision
  loop termination toward goal satisfaction criteria.
operations:
  - name: get_active_goals
    description: Return goals currently pursued by the agent
    input: {}
    output:
      goals:
        type: array
        description: List of Goal node references
    errors: [NoGoalError]
  - name: evaluate_goal_progress
    description: Assess progress toward a specific goal
    input:
      goal_id:
        type: string
    output:
      progress:
        type: float
        description: Normalized progress 0.0–1.0
      satisfied:
        type: boolean
    errors: [GoalNotFoundError]
status: active
