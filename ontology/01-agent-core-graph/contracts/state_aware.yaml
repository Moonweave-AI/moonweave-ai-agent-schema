id: contract.state_aware
artifact: InterfaceContract
label: State Aware
label_zh: 状态感知
description: >
  Agent instances must maintain queryable runtime state updated across decision
  loop iterations with optional checkpoint persistence.
operations:
  - name: get_state
    description: Return current agent state snapshot
    input: {}
    output:
      state:
        type: object
    errors: [StateUnavailableError]
  - name: update_state
    description: Apply partial state update from loop iteration
    input:
      delta:
        type: object
    output:
      revision:
        type: integer
        description: Monotonic state revision number
    errors: [StateConflictError]
  - name: checkpoint_state
    description: Persist state for recovery
    input: {}
    output:
      checkpoint_id:
        type: string
    errors: [CheckpointFailedError]
status: active
