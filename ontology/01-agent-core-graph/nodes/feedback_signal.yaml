id: node.feedback_signal
artifact: NodeClass
label: FeedbackSignal
label_zh: 反馈信号
intra_level: 3
intra_group: decision-control
intra_group_zh: 决策控制
intra_axis: cognition-control
intra_axis_zh: 决策控制 / 认知内核
intra_role: signal
parent_node: node.decision_loop
layer: agent-core
description: >
  Evaluation or observation returned to the agent after an action: tool results,
  human corrections, automated scores, policy denials, or environment observations.
description_zh: >
  操作后返回给智能体的评估或观察：工具结果、人工更正、自动评分、策略拒绝或环境观察。
attributes:
  signal_type:
    type: enum
    required: true
    values: [tool_result, human, evaluator, policy, environment, error]
    description: Origin category of the feedback
  severity:
    type: enum
    required: false
    values: [info, warning, error, critical]
    description: Urgency level for loop adaptation
  payload:
    type: object
    required: false
    description: Structured feedback content
evidence:
  - ref: evidence.effective_agents_workflows
status: active
