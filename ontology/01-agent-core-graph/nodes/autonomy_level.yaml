id: node.autonomy_level
artifact: NodeClass
label: AutonomyLevel
label_zh: 自主级别
intra_level: 2
intra_group: identity-boundary
intra_group_zh: 身份与边界
intra_axis: identity-governance
intra_axis_zh: 身份与边界
intra_role: policy
parent_node: node.agent_boundary
layer: agent-core
description: >
  Degree of independent action permitted without human confirmation, ranging
  from fully supervised to fully autonomous within boundary constraints.
description_zh: >
  无需人工确认即可允许的独立行动程度，范围从完全监督到边界限制内的完全自主。
attributes:
  level:
    type: enum
    required: true
    values: [supervised, semi_autonomous, autonomous, fully_autonomous]
    description: Autonomy classification
  approval_threshold:
    type: enum
    required: false
    values: [never, high_risk, medium_risk, always]
    description: When human approval is required
  max_tool_calls_per_turn:
    type: integer
    required: false
    description: Rate limit on autonomous tool invocations
evidence:
  - ref: evidence.agentic_taxonomy
status: active
