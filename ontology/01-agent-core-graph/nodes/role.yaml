id: node.role
artifact: NodeClass
label: Role
label_zh: 角色
layer: agent-core
description: >
  Functional specialization assigned to an agent defining expected behaviors,
  expertise domain, and interaction patterns within multi-agent systems.
attributes:
  role_name:
    type: string
    required: true
    description: Role identifier (e.g., researcher, reviewer, executor)
  expertise_domain:
    type: string
    required: false
    description: Primary knowledge or task domain
  interaction_style:
    type: enum
    required: false
    values: [collaborative, autonomous, supervisory, reactive]
    description: Default interaction mode with peers and users
evidence:
  - ref: evidence.faos_enterprise_layers
  - ref: evidence.a2a_delegation
status: active
