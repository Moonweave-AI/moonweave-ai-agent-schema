id: node.capability
artifact: NodeClass
label: Capability
label_zh: 能力
intra_level: 2
intra_group: capability-surface
intra_group_zh: 能力表面
intra_role: capability
parent_node: node.agent
layer: agent-core
description: >
  Declared affordance enabling the agent to perform a class of actions such as
  web search, code execution, or document analysis. Maps to tools at runtime.
attributes:
  capability_name:
    type: string
    required: true
    description: Unique capability identifier
  description:
    type: string
    required: true
    description: What the capability enables
  risk_class:
    type: enum
    required: false
    values: [read_only, low, medium, high, critical]
    description: Inherent risk level of exercising this capability
evidence:
  - ref: evidence.xi_brain_perception_action
  - ref: evidence.agentic_taxonomy
  - ref: evidence.progent_least_privilege
status: active
