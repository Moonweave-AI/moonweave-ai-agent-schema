id: node.goal
artifact: NodeClass
label: Goal
label_zh: 目标
intra_level: 1
intra_group: intent-model
intra_group_zh: 意图模型
intra_axis: intent-work
intra_axis_zh: 意图模型
intra_role: objective
parent_node: node.agent
layer: agent-core
description: >
  High-level intended outcome the agent seeks to achieve. Goals drive task
  decomposition, capability selection, and termination conditions.
description_zh: >
  智能体寻求实现的高水平预期结果。目标驱动任务分解、能力选择和终止条件。
attributes:
  goal_statement:
    type: string
    required: true
    description: Natural language or formal statement of desired outcome
  priority:
    type: enum
    required: false
    values: [critical, high, medium, low]
    description: Relative priority among concurrent goals
  success_criteria:
    type: string
    required: false
    description: Measurable conditions defining goal completion
  deadline:
    type: datetime
    required: false
    description: Optional temporal bound for goal achievement
evidence:
  - ref: evidence.coala_goals_tasks
  - ref: evidence.faos_enterprise_layers
status: active
