id: node.persona
artifact: NodeClass
label: Persona
label_zh: 人格
layer: agent-core
description: >
  Communicative and stylistic profile shaping tone, verbosity, and user-facing
  presentation without altering core capabilities or goals.
attributes:
  tone:
    type: enum
    required: false
    values: [formal, casual, technical, empathetic, neutral]
    description: Conversational tone preference
  verbosity:
    type: enum
    required: false
    values: [concise, balanced, detailed]
    description: Default response length preference
  language:
    type: string
    required: false
    description: Primary response language (BCP 47)
evidence:
  - ref: evidence.faos_enterprise_layers
status: active
