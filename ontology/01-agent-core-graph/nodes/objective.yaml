id: node.objective
artifact: NodeClass
label: Objective
label_zh: 目的
layer: agent-core
description: >
  Mid-level milestone bridging strategic goals and executable tasks. Objectives
  organize work into coherent phases with intermediate deliverables.
attributes:
  objective_statement:
    type: string
    required: true
    description: Statement of the intermediate outcome
  order_index:
    type: integer
    required: false
    description: Sequence position among sibling objectives
  measurable_metric:
    type: string
    required: false
    description: KPI or metric indicating objective satisfaction
evidence:
  - ref: evidence.coala_goals_tasks
  - ref: evidence.faos_enterprise_layers
status: active
