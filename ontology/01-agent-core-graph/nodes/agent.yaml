id: node.agent
artifact: NodeClass
label: Agent
label_zh: 智能体
intra_level: 0
intra_group: agent-root
intra_group_zh: 智能体根
intra_axis: agent-foundation
intra_axis_zh: 智能体根
intra_role: anchor
layer: agent-core
description: >
  Autonomous software entity that perceives context, maintains internal state,
  pursues goals through a decision loop, and acts via capabilities within
  defined boundaries. Central node of the agent core subgraph.
description_zh: >
  自主软件实体，感知上下文、维护内部状态、通过决策循环追求目标，并通过定义边界内的功能采取行动。智能体核心子图的中心节点。
attributes:
  agent_name:
    type: string
    required: false
    description: Human-readable agent instance name
  created_at:
    type: datetime
    required: false
    description: Instantiation timestamp
  max_iterations:
    type: integer
    required: false
    description: Maximum decision loop iterations per run
interfaces:
  - ref: contract.goal_driven
  - ref: contract.state_aware
state_machine:
  ref: state.agent_lifecycle
required_edges:
  outgoing:
    - predicate: HAS_IDENTITY
      target: node.agent_identity
    - predicate: PURSUES_GOAL
      target: node.goal
    - predicate: RUNS_DECISION_LOOP
      target: node.decision_loop
    - predicate: BOUNDED_BY
      target: node.agent_boundary
  incoming:
    - predicate: RECEIVES_FEEDBACK
      source: node.feedback_signal
evidence:
  - ref: evidence.coala_decision_loop
  - ref: evidence.xi_brain_perception_action
status: active
