id: node.decision_loop
artifact: NodeClass
label: DecisionLoop
label_zh: 决策循环
intra_level: 1
intra_group: decision-control
intra_group_zh: 决策控制
intra_axis: cognition-control
intra_axis_zh: 决策控制 / 认知内核
intra_role: process
parent_node: node.agent
layer: agent-core
description: >
  Iterative perceive-reason-act cycle governing agent execution. Each iteration
  assembles context, invokes the cognitive core, dispatches actions, ingests
  feedback, and updates state until termination.
description_zh: >
  迭代感知-推理-行动循环控制智能体执行。每次迭代都会组装上下文、调用认知核心、调度操作、获取反馈并更新状态，直到终止。
attributes:
  loop_type:
    type: enum
    required: true
    values: [react, plan_execute, reflexion, custom]
    description: Decision loop pattern
  current_iteration:
    type: integer
    required: false
    description: Running iteration counter
  stop_conditions:
    type: array
    required: false
    description: Conditions triggering loop exit (goal met, max iter, error)
evidence:
  - ref: evidence.coala_decision_loop
  - ref: evidence.effective_agents_workflows
status: active
