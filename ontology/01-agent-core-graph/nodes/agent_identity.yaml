id: node.agent_identity
artifact: NodeClass
label: AgentIdentity
label_zh: 智能体身份
layer: agent-core
description: >
  Stable identifier and metadata distinguishing one agent instance from another
  across sessions, delegations, and protocol interop.
attributes:
  identity_id:
    type: string
    required: true
    description: Unique agent instance identifier
  display_name:
    type: string
    required: false
    description: User-facing agent name
  version:
    type: string
    required: false
    description: Agent configuration or prompt version
  owner:
    type: string
    required: false
    description: Principal or organization owning the agent
evidence:
  - ref: evidence.a2a_delegation
status: active
