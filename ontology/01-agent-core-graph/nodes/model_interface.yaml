description: >
  Abstraction boundary for invoking the cognitive core: request formatting,
  response parsing, streaming, tool-call extraction, and error handling.
description_zh: >
  调用认知核心的抽象边界：请求格式化、响应解析、流式传输、工具调用提取和错误处理。
attributes:
  interface_type:
    type: enum
    required: true
    values: [chat_completion, responses, embeddings, multimodal]
    description: API interaction pattern
  supports_tools:
    type: boolean
    required: true
    description: Whether native tool-use is supported
  supports_streaming:
    type: boolean
    required: false
    description: Whether partial output streaming is available
  max_output_tokens:
    type: integer
    required: false
    description: Configured output token limit per call
evidence:
  - ref: evidence.xi_brain_perception_action
