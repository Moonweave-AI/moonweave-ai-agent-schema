id: node.instruction_stack
artifact: NodeClass
label: InstructionStack
label_zh: 指令栈
intra_level: 2
intra_group: cognition-kernel
intra_group_zh: 认知内核
intra_role: instruction
parent_node: node.cognitive_core
layer: agent-core
description: >
  Ordered layers of behavioral instructions prepended to context: base system
  policy, developer directives, role prompts, and ephemeral run-time additions.
attributes:
  layer_count:
    type: integer
    required: false
    description: Number of instruction layers in the stack
  cache_policy:
    type: enum
    required: false
    values: [none, prefix, full]
    description: Prompt caching strategy for static layers
  precedence:
    type: string
    required: false
    description: Rule for resolving conflicts between layers (later overrides earlier)
evidence:
  - ref: evidence.harness_formalization
status: active
