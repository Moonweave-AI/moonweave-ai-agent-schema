id: node.agent_boundary
artifact: NodeClass
label: AgentBoundary
label_zh: 智能体边界
intra_level: 1
intra_group: identity-boundary
intra_group_zh: 身份与边界
intra_role: boundary
parent_node: node.agent
layer: agent-core
description: >
  Trust and permission envelope constraining what an agent may perceive, invoke,
  and mutate. Encodes sandbox limits, autonomy ceiling, and escalation rules.
attributes:
  trust_tier:
    type: enum
    required: true
    values: [untrusted, constrained, standard, elevated, privileged]
    description: Baseline trust level for autonomous actions
  network_egress:
    type: boolean
    required: false
    description: Whether outbound network is permitted
  filesystem_write:
    type: boolean
    required: false
    description: Whether filesystem mutation is permitted
  human_approval_required:
    type: boolean
    required: false
    description: Whether sensitive actions require human gate
evidence:
  - ref: evidence.harness_formalization
  - ref: evidence.progent_least_privilege
status: active
