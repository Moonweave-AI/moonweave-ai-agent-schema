id: node.cognitive_core
artifact: NodeClass
label: CognitiveCore
label_zh: 认知核心
layer: agent-core
description: >
  Central reasoning substrate—typically a large language model—that performs
  perception over context, deliberation, and action selection within the
  decision loop.
attributes:
  core_type:
    type: enum
    required: true
    values: [llm, neurosymbolic, hybrid, rule_based]
    description: Primary reasoning engine type
  model_family:
    type: string
    required: false
    description: Model family or architecture class (vendor-neutral)
  context_window:
    type: integer
    required: false
    description: Maximum tokens processable per invocation
evidence:
  - ref: evidence.coala_decision_loop
  - ref: evidence.xi_brain_perception_action
status: active
