id: node.task
artifact: NodeClass
label: Task
label_zh: 任务
layer: agent-core
description: >
  Atomic unit of work assigned to an agent or subagent with defined inputs,
  expected outputs, and lifecycle states.
attributes:
  task_description:
    type: string
    required: true
    description: Actionable description of work to perform
  task_type:
    type: enum
    required: false
    values: [research, generation, execution, review, coordination]
    description: Category guiding tool and workflow selection
  assigned_to:
    type: string
    required: false
    description: Agent or subagent id responsible for execution
state_machine:
  ref: state.task_lifecycle
evidence:
  - ref: evidence.coala_goals_tasks
  - ref: evidence.effective_agents_workflows
  - ref: evidence.a2a_delegation
status: active
