id: node.capability_manifest
artifact: NodeClass
label: Capability Manifest
label_zh: 能力清单
intra_level: 1
intra_group: capability-plane
intra_group_zh: 能力平面
intra_axis: capability-auth
intra_axis_zh: 授权平面 / 能力平面
intra_role: artifact
parent_node: node.protocol
layer: protocol
description: >
  Published declaration enumerating tools, resources, prompts, and protocol extensions an endpoint supports, used for discovery and negotiation.
description_zh: >
  已发布的声明枚举端点支持的工具、资源、提示和协议扩展，用于发现和协商。
attributes:
  manifest_version:
    type: string
    required: true
    description: Version of the manifest schema
  published_at:
    type: datetime
    required: false
    description: Timestamp when manifest was last published
  capability_count:
    type: integer
    required: false
    description: Total number of advertised capabilities
  extensions:
    type: array
    required: false
    description: Optional protocol extension identifiers supported
status: active
