id: node.protocol
artifact: NodeClass
label: Protocol
label_zh: 协议
layer: protocol
plane: Tool
description: >
  Abstract specification of a communication protocol defining message formats, lifecycle semantics, capability discovery, and interoperability rules between autonomous participants.
attributes:
  protocol_name:
    type: string
    required: true
    description: Human-readable protocol identifier
  version:
    type: string
    required: true
    description: Semantic version of the protocol specification
  spec_uri:
    type: uri
    required: false
    description: Canonical URI to normative specification document
  transport_profiles:
    type: array
    required: false
    description: Supported transport mechanisms
  message_format:
    type: enum
    required: false
    values: ['json_rpc', 'rest', 'grpc', 'custom']
    description: Primary message serialization and framing style
status: active
