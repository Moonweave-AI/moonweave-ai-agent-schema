id: node.message_part
artifact: NodeClass
label: Message Part
label_zh: 消息片段
intra_level: 3
intra_group: message-plane
intra_group_zh: 消息平面
intra_axis: message-task
intra_axis_zh: 任务平面 / 消息平面
intra_role: artifact
parent_node: node.message_envelope
layer: protocol
description: >
  Individual segment of a multi-part message supporting heterogeneous content types such as text, images, structured data, or file references.
attributes:
  part_index:
    type: integer
    required: true
    description: Zero-based ordering index within parent message
  content_type:
    type: string
    required: true
    description: MIME or protocol-specific content type
  content_ref:
    type: string
    required: true
    description: Reference to inline or external content
  encoding:
    type: enum
    required: false
    values: ['inline', 'base64', 'uri']
    description: How content is encoded
status: active
