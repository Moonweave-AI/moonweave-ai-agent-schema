id: node.task_envelope
artifact: NodeClass
label: Task Envelope
label_zh: 任务信封
intra_level: 2
intra_group: task-plane
intra_group_zh: 任务平面
intra_role: artifact
parent_node: node.protocol
layer: protocol
plane: Orchestration
description: >
  Structured wrapper encapsulating a delegated task including identity, input payload, metadata, correlation identifiers, and delivery expectations.
attributes:
  task_id:
    type: string
    required: true
    description: Globally unique task identifier
  correlation_id:
    type: string
    required: false
    description: Cross-protocol trace correlation identifier
  input_payload_ref:
    type: string
    required: true
    description: Reference to structured task input
  priority:
    type: enum
    required: false
    values: ['low', 'normal', 'high', 'critical']
    description: Relative execution priority
  deadline:
    type: datetime
    required: false
    description: Optional completion deadline
state_machine:
  ref: state.task_protocol_lifecycle
status: active
