id: node.progress_event
artifact: NodeClass
label: Progress Event
label_zh: 进度事件
layer: protocol
description: >
  Status update emitted during long-running operations reporting fractional completion, stage transitions, or intermediate metrics.
attributes:
  event_id:
    type: string
    required: true
    description: Unique progress event identifier
  progress_percent:
    type: number
    required: false
    description: Completion percentage from 0 to 100
  stage:
    type: string
    required: false
    description: Named processing stage currently active
  message:
    type: string
    required: false
    description: Human-readable progress description
status: active
