id: node.error_envelope
artifact: NodeClass
label: Error Envelope
label_zh: 错误信封
layer: protocol
description: >
  Structured error response wrapping protocol-level failures with error codes, messages, retry hints, and optional diagnostic details.
attributes:
  error_code:
    type: string
    required: true
    description: Protocol-defined machine-readable error code
  error_message:
    type: string
    required: true
    description: Human-readable error description
  retryable:
    type: boolean
    required: false
    description: Whether the failed operation may be retried
  details_ref:
    type: string
    required: false
    description: Reference to extended diagnostic payload
status: active
