id: node.error_envelope
artifact: NodeClass
label: Error Envelope
label_zh: 错误信封
intra_level: 3
intra_group: task-plane
intra_group_zh: 任务平面
intra_axis: message-task
intra_axis_zh: 任务平面 / 消息平面
intra_role: error
parent_node: node.message_envelope
layer: protocol
description: >
  Structured error response wrapping protocol-level failures with error codes, messages, retry hints, and optional diagnostic details.
description_zh: >
  结构化错误响应包含错误代码、消息、重试提示和可选诊断详细信息的协议级故障。
attributes:
  error_code:
    type: string
    required: true
    description: Protocol-defined machine-readable error code
  error_message:
    type: string
    required: true
    description: Human-readable error description
  retryable:
    type: boolean
    required: false
    description: Whether the failed operation may be retried
  details_ref:
    type: string
    required: false
    description: Reference to extended diagnostic payload
status: active
