id: node.transport
artifact: NodeClass
label: Transport
label_zh: 传输层
intra_level: 1
intra_group: transport-channel
intra_group_zh: 传输通道
intra_axis: endpoint-transport
intra_axis_zh: 端点平面 / 传输通道
intra_role: channel
parent_node: node.protocol
layer: protocol
description: >
  Communication channel mechanism carrying protocol messages between endpoints, such as stdio, HTTP, WebSocket, or message queue bindings.
attributes:
  transport_type:
    type: enum
    required: true
    values: ['stdio', 'http', 'websocket', 'sse', 'message_queue']
    description: Transport mechanism identifier
  binding_uri:
    type: string
    required: false
    description: Transport-specific binding address or path
  tls_required:
    type: boolean
    required: false
    description: Whether transport requires TLS encryption
  max_message_size:
    type: integer
    required: false
    description: Maximum message size in bytes if bounded
status: active
