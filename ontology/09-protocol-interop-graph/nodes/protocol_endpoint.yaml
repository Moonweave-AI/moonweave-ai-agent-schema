id: node.protocol_endpoint
artifact: NodeClass
label: Protocol Endpoint
label_zh: 协议端点
intra_level: 1
intra_group: endpoint-plane
intra_group_zh: 端点平面
intra_role: endpoint
parent_node: node.protocol
layer: protocol
plane: Tool
description: >
  Addressable service point that implements one or more protocol roles, exposing capabilities, accepting messages, and participating in task lifecycles.
attributes:
  endpoint_uri:
    type: uri
    required: true
    description: Resolvable address for the endpoint
  display_name:
    type: string
    required: false
    description: Human-readable endpoint label
  supported_roles:
    type: array
    required: true
    description: Protocol roles this endpoint can assume
  health_status:
    type: enum
    required: false
    values: ['healthy', 'degraded', 'unavailable']
    description: Current operational health
interfaces:
  - ref: contract.protocol_participant
  - ref: contract.capability_advertiser
state_machine:
  ref: state.connection_lifecycle
required_edges:
  outgoing:
    - predicate: AUTHORIZES_WITH
      target: node.authorization_scheme
status: active
