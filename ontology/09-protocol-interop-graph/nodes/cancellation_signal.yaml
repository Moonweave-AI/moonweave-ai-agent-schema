id: node.cancellation_signal
artifact: NodeClass
label: Cancellation Signal
label_zh: 取消信号
layer: protocol
description: >
  Protocol message requesting abort of an in-progress operation or task, propagating cancellation intent to executing endpoints.
attributes:
  target_task_id:
    type: string
    required: true
    description: Task or operation identifier to cancel
  reason:
    type: string
    required: false
    description: Human-readable cancellation reason
  graceful:
    type: boolean
    required: false
    description: Whether to allow graceful shutdown before hard abort
  issued_at:
    type: datetime
    required: false
    description: Timestamp when cancellation was requested
status: active
