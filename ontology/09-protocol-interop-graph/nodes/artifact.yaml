id: node.artifact
artifact: NodeClass
label: Protocol Artifact
label_zh: 协议产物
intra_level: 3
intra_group: artifact-plane
intra_group_zh: 产物平面
intra_axis: artifact-signal
intra_axis_zh: 产物平面
intra_role: artifact
parent_node: node.protocol
layer: protocol
description: >
  File or structured data produced during task execution and returned to the delegating participant via protocol artifact exchange.
description_zh: >
  任务执行期间生成的文件或结构化数据，并通过协议制品交换返回给委托参与者。
attributes:
  artifact_id:
    type: string
    required: true
    description: Unique artifact identifier within task scope
  artifact_type:
    type: string
    required: true
    description: Protocol-defined artifact type discriminator
  content_ref:
    type: string
    required: true
    description: Reference to artifact payload or storage location
  produced_at:
    type: datetime
    required: false
    description: Timestamp when artifact was produced
status: active
