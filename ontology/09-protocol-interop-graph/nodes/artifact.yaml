id: node.artifact
artifact: NodeClass
label: Protocol Artifact
label_zh: 协议产物
layer: protocol
description: >
  File or structured data produced during task execution and returned to the delegating participant via protocol artifact exchange.
attributes:
  artifact_id:
    type: string
    required: true
    description: Unique artifact identifier within task scope
  artifact_type:
    type: string
    required: true
    description: Protocol-defined artifact type discriminator
  content_ref:
    type: string
    required: true
    description: Reference to artifact payload or storage location
  produced_at:
    type: datetime
    required: false
    description: Timestamp when artifact was produced
status: active
