id: node.prompt_exposure
artifact: NodeClass
label: Prompt Exposure
label_zh: 提示暴露
intra_level: 3
intra_group: capability-plane
intra_group_zh: 能力平面
intra_axis: capability-auth
intra_axis_zh: 授权平面 / 能力平面
intra_role: exposure
parent_node: node.capability_manifest
layer: protocol
plane: Info
description: >
  A parameterized prompt template exposed through a protocol that clients can materialize into messages with supplied arguments.
attributes:
  prompt_name:
    type: string
    required: true
    description: Protocol-visible prompt identifier
  argument_schema_ref:
    type: string
    required: false
    description: Schema for prompt template arguments
  template_ref:
    type: string
    required: true
    description: Reference to underlying prompt template content
  role_hint:
    type: enum
    required: false
    values: ['system', 'user', 'assistant']
    description: Suggested message role for materialized prompt
status: active
