id: node.task_lifecycle
artifact: NodeClass
label: Task Lifecycle
label_zh: 任务生命周期
intra_level: 3
intra_group: task-plane
intra_group_zh: 任务平面
intra_role: state
parent_node: node.task_envelope
layer: protocol
description: >
  Protocol-level state machine governing delegated task progression from submission through completion, failure, or cancellation.
attributes:
  lifecycle_id:
    type: string
    required: true
    description: Identifier for this lifecycle definition
  terminal_states:
    type: array
    required: true
    description: States that terminate task processing
  supports_input_needed:
    type: boolean
    required: false
    description: Whether protocol supports interactive input requests
status: active
