id: node.protocol_role
artifact: NodeClass
label: Protocol Role
label_zh: 协议角色
intra_level: 1
intra_group: endpoint-plane
intra_group_zh: 端点平面
intra_axis: endpoint-transport
intra_axis_zh: 端点平面 / 传输通道
intra_role: role
parent_node: node.protocol
layer: protocol
description: >
  Role a participant plays in a protocol conversation such as client, server, peer, or observer, determining allowed operations and message flow direction.
description_zh: >
  参与者在协议对话中扮演的角色（例如客户端、服务器、对等方或观察者）确定允许的操作和消息流方向。
attributes:
  role_name:
    type: enum
    required: true
    values: ['client', 'server', 'peer', 'observer']
    description: Named role in the protocol interaction
  initiates_connection:
    type: boolean
    required: false
    description: Whether this role may initiate connections
  may_delegate_tasks:
    type: boolean
    required: false
    description: Whether this role can submit delegated work
status: active
