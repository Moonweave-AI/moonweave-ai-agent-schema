id: node.resource_exposure
artifact: NodeClass
label: Resource Exposure
label_zh: 资源暴露
intra_level: 3
intra_group: capability-plane
intra_group_zh: 能力平面
intra_axis: capability-auth
intra_axis_zh: 授权平面 / 能力平面
intra_role: exposure
parent_node: node.capability_manifest
layer: protocol
description: >
  A data resource exposed through a protocol for read or subscription, identified by URI and typed with MIME or schema metadata.
attributes:
  resource_uri:
    type: uri
    required: true
    description: Canonical URI identifying the resource
  mime_type:
    type: string
    required: false
    description: MIME type of resource content
  access_mode:
    type: enum
    required: true
    values: ['read', 'subscribe', 'read_write']
    description: Permitted access pattern
  size_bytes:
    type: integer
    required: false
    description: Approximate resource size if known
status: active
