id: node.tool_exposure
artifact: NodeClass
label: Tool Exposure
label_zh: 工具暴露
intra_level: 3
intra_group: capability-plane
intra_group_zh: 能力平面
intra_axis: capability-auth
intra_axis_zh: 授权平面 / 能力平面
intra_role: exposure
parent_node: node.capability_manifest
layer: protocol
plane: Tool
description: >
  A callable tool made available through a protocol endpoint, including input schema, output schema, and invocation semantics.
attributes:
  tool_name:
    type: string
    required: true
    description: Protocol-visible tool identifier
  input_schema_ref:
    type: string
    required: true
    description: Reference to input parameter schema definition
  output_schema_ref:
    type: string
    required: false
    description: Reference to output schema definition
  description_text:
    type: string
    required: false
    description: Natural language description for discovery
  destructive:
    type: boolean
    required: false
    description: Whether invocation may cause irreversible side effects
status: active
