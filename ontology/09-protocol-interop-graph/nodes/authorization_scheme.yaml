id: node.authorization_scheme
artifact: NodeClass
label: Authorization Scheme
label_zh: 授权方案
layer: protocol
plane: Orchestration
description: >
  Authentication and authorization method required or supported by a protocol endpoint, including credential types and token exchange flows.
attributes:
  scheme_type:
    type: enum
    required: true
    values: ['none', 'api_key', 'bearer_token', 'oauth2', 'mutual_tls', 'custom']
    description: Authorization mechanism type
  required_scopes:
    type: array
    required: false
    description: OAuth or custom scope identifiers required for access
  token_endpoint:
    type: uri
    required: false
    description: Token issuance endpoint if applicable
status: active
