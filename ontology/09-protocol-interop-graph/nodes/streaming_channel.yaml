id: node.streaming_channel
artifact: NodeClass
label: Streaming Channel
label_zh: 流式通道
intra_level: 2
intra_group: transport-channel
intra_group_zh: 传输通道
intra_axis: endpoint-transport
intra_axis_zh: 端点平面 / 传输通道
intra_role: channel
parent_node: node.transport
layer: protocol
description: >
  Real-time unidirectional or bidirectional data stream between endpoints for progress updates, partial results, or continuous event delivery.
description_zh: >
  端点之间的实时单向或双向数据流，用于进度更新、部分结果或连续事件传递。
attributes:
  channel_id:
    type: string
    required: true
    description: Unique stream channel identifier
  direction:
    type: enum
    required: true
    values: ['unidirectional', 'bidirectional']
    description: Stream directionality
  event_types:
    type: array
    required: false
    description: Event types deliverable on this channel
  backpressure_policy:
    type: enum
    required: false
    values: ['drop', 'buffer', 'block']
    description: Behavior when consumer is slow
status: active
