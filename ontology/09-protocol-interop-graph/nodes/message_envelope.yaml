id: node.message_envelope
artifact: NodeClass
label: Message Envelope
label_zh: 消息信封
intra_level: 2
intra_group: message-plane
intra_group_zh: 消息平面
intra_axis: message-task
intra_axis_zh: 任务平面 / 消息平面
intra_role: artifact
parent_node: node.protocol
layer: protocol
plane: Info
description: >
  Structured wrapper for protocol messages carrying headers, routing metadata, correlation identifiers, and typed payload references.
description_zh: >
  用于携带标头、路由元数据、相关标识符和类型化有效负载引用的协议消息的结构化包装器。
attributes:
  message_id:
    type: string
    required: true
    description: Unique message identifier
  message_type:
    type: string
    required: true
    description: Protocol-defined message type discriminator
  timestamp:
    type: datetime
    required: false
    description: Message creation timestamp
  reply_to:
    type: string
    required: false
    description: Message id this message responds to
status: active
