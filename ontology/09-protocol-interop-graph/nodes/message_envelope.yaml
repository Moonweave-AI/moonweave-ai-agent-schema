id: node.message_envelope
artifact: NodeClass
label: Message Envelope
label_zh: 消息信封
layer: protocol
plane: Info
description: >
  Structured wrapper for protocol messages carrying headers, routing metadata, correlation identifiers, and typed payload references.
attributes:
  message_id:
    type: string
    required: true
    description: Unique message identifier
  message_type:
    type: string
    required: true
    description: Protocol-defined message type discriminator
  timestamp:
    type: datetime
    required: false
    description: Message creation timestamp
  reply_to:
    type: string
    required: false
    description: Message id this message responds to
status: active
