id: node.capability_negotiation
artifact: NodeClass
label: Capability Negotiation
label_zh: 能力协商
layer: protocol
description: >
  Process by which protocol participants exchange and agree on supported features, extensions, protocol versions, and operational limits at connect time.
attributes:
  negotiation_id:
    type: string
    required: true
    description: Unique identifier for negotiation session
  requested_capabilities:
    type: array
    required: true
    description: Capabilities requested by initiating party
  agreed_capabilities:
    type: array
    required: false
    description: Capabilities mutually agreed upon
  negotiation_outcome:
    type: enum
    required: false
    values: ['pending', 'accepted', 'partial', 'rejected']
    description: Result of negotiation
status: active
