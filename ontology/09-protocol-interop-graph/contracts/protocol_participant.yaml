id: contract.protocol_participant
artifact: InterfaceContract
label: Protocol Participant
label_zh: 协议参与者
description: >
  Behavioral contract for nodes that can join protocol conversations, send and receive messages, and participate in task delegation.
operations:
  - name: connect
    description: Establish connection to a remote protocol endpoint
    input:
      endpoint_uri:
        type: uri
        description: Target endpoint address
    output:
      session_id:
        type: string
        description: Established session identifier
    errors: [ConnectionFailedError, AuthRequiredError]
  - name: send_message
    description: Transmit a message envelope to a connected peer
    input:
      envelope:
        type: object
        description: Message envelope payload
    output:
      message_id:
        type: string
        description: Assigned message identifier
    errors: [NotConnectedError, MessageRejectedError]
  - name: receive_message
    description: Accept an inbound message from a connected peer
    input:
      timeout_ms:
        type: integer
        description: Optional receive timeout
    output:
      envelope:
        type: object
        description: Received message envelope
    errors: [TimeoutError, ConnectionClosedError]
status: active
