id: contract.capability_advertiser
artifact: InterfaceContract
label: Capability Advertiser
label_zh: 能力发布者
description: >
  Behavioral contract for endpoints that publish capability manifests and respond to discovery and negotiation requests.
operations:
  - name: publish_manifest
    description: Publish or refresh the capability manifest
    input:
      manifest:
        type: object
        description: Capability manifest payload
    output:
      manifest_version:
        type: string
        description: Published manifest version
    errors: [InvalidManifestError]
  - name: list_capabilities
    description: Return enumerated capabilities for discovery
    input:
      filter:
        type: object
        description: Optional capability filter
    output:
      capabilities:
        type: array
        description: List of advertised capabilities
    errors: [NotAdvertisedError]
  - name: negotiate
    description: Participate in capability negotiation with a peer
    input:
      requested:
        type: array
        description: Requested capability identifiers
    output:
      agreed:
        type: array
        description: Mutually agreed capabilities
    errors: [NegotiationRejectedError]
status: active
