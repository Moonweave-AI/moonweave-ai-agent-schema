id: state.task_protocol_lifecycle
artifact: StateMachine
label: Task Protocol Lifecycle
label_zh: 任务协议生命周期
description: >
  Protocol-level task state machine covering submission, acceptance, execution, interactive input, completion, failure, and cancellation.
states:
  - name: submitted
    initial: true
    description: Task envelope received but not yet acknowledged
  - name: accepted
    description: Executor acknowledged task and queued for processing
  - name: working
    description: Task is actively being processed
  - name: input_needed
    description: Executor requires additional input from delegator
  - name: completed
    terminal: true
    description: Task finished successfully with artifacts available
  - name: failed
    terminal: true
    description: Task terminated due to unrecoverable error
  - name: cancelled
    terminal: true
    description: Task aborted by cancellation signal
transitions:
  - from: submitted
    to: accepted
    trigger: accept
    description: Executor accepts delegated task
  - from: submitted
    to: failed
    trigger: reject
    description: Executor rejects task at submission
  - from: accepted
    to: working
    trigger: start
    description: Processing begins
  - from: working
    to: input_needed
    trigger: request_input
    description: Executor needs clarifying input
  - from: input_needed
    to: working
    trigger: provide_input
    description: Delegator supplies requested input
  - from: working
    to: completed
    trigger: complete
    description: Task finishes successfully
  - from: working
    to: failed
    trigger: fail
    description: Unrecoverable error during processing
  - from: accepted
    to: cancelled
    trigger: cancel
    description: Cancel before processing starts
  - from: working
    to: cancelled
    trigger: cancel
    description: Cancel during active processing
  - from: input_needed
    to: cancelled
    trigger: cancel
    description: Cancel while awaiting input
status: active
