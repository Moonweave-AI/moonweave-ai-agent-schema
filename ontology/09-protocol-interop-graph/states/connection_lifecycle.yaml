id: state.connection_lifecycle
artifact: StateMachine
label: Connection Lifecycle
label_zh: 连接生命周期
description: >
  Lifecycle states for a protocol connection from initial connect through capability negotiation, active use, graceful close, and error termination.
states:
  - name: connecting
    initial: true
    description: Transport connection being established
  - name: negotiating
    description: Capability and version negotiation in progress
  - name: open
    description: Connection active and ready for message exchange
  - name: closing
    description: Graceful shutdown in progress
  - name: closed
    terminal: true
    description: Connection terminated cleanly
  - name: error
    terminal: true
    description: Connection terminated due to unrecoverable error
transitions:
  - from: connecting
    to: negotiating
    trigger: transport_ready
    description: Transport established, begin negotiation
  - from: connecting
    to: error
    trigger: connect_failed
    description: Transport connection failed
  - from: negotiating
    to: open
    trigger: negotiation_complete
    description: Capabilities agreed, session open
  - from: negotiating
    to: error
    trigger: negotiation_failed
    description: Capability negotiation rejected or timed out
  - from: open
    to: closing
    trigger: close
    description: Initiate graceful shutdown
  - from: closing
    to: closed
    trigger: close_complete
    description: Shutdown finished
  - from: open
    to: error
    trigger: protocol_error
    description: Unrecoverable protocol error during active session
status: active
