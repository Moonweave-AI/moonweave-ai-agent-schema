id: constraint.tool_exposure_must_reference_definition
artifact: GraphConstraint
label: Tool Exposure Must Reference Definition
label_zh: 工具暴露必须引用定义
severity: error
rule: >
  Every node.tool_exposure MUST reference a valid input_schema_ref and SHOULD reference output_schema_ref linking to a tool definition in the tool-action subgraph.
applies_to:
  nodes: [node.tool_exposure]
description: >
  Interoperability constraint ensuring exposed tools are schema-validated and traceable to canonical tool definitions.
status: active
