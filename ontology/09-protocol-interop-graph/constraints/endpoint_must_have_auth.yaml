id: constraint.endpoint_must_have_auth
artifact: GraphConstraint
label: Endpoint Must Have Auth
label_zh: 端点必须有授权
severity: error
rule: >
  Every node.protocol_endpoint instance MUST have at least one outgoing AUTHORIZES_WITH edge to a node.authorization_scheme, unless scheme_type is explicitly none in a documented public endpoint.
applies_to:
  nodes: [node.protocol_endpoint]
  edges: [edge.AUTHORIZES_WITH]
description: >
  Security integrity rule ensuring all protocol endpoints declare their authentication and authorization requirements.
status: active
