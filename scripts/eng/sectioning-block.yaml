engineering:
  explanation:
    zh: >-
      Sectioning 把 work 分区为 SectionAssignment 部件供并行或顺序执行，LangGraph map 阶段绑定 section part。
      Anthropic orchestrator-worker 的 section 分解在本体中建模为 Sectioning 模式而非独立框架类型。
    en: >-
      Sectioning partitions work into SectionAssignment parts for parallel or sequential execution, binding section
      parts to LangGraph map stages. Anthropic orchestrator-worker section decomposition is modeled here as Sectioning
      rather than as a separate framework type.
    ja: >-
      Sectioning は work を SectionAssignment part に partition し LangGraph map stage に bind する。
  typical_input:
    - description:
        zh: 声明 partition 控制形态与 section 覆盖规则的模式 revision。
        en: Pattern revision declaring partition control shape and section coverage rules.
        ja: partition control shape/section coverage rule を宣言する pattern revision。
      format: |-
        {"composition_specification_id":"report-sectioning","version":"1","control_shape":"partition","coverage_rule":"exactly-once by section_id"}
  typical_output:
    - description:
        zh: 编译后的 section assignment 绑定列表。
        en: Compiled section assignment binding list.
        ja: compiled section assignment binding list。
      format: |-
        {"pattern_ref":"report-sectioning@1","section_assignment_refs":["section-finance","section-ops"]}
  reference_implementations:
    - name: LangGraph workflows and agents
      url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
      description: Documents orchestrator-worker section decomposition patterns.
  source_claims:
    - claim-sectioning-hierarchy
    - claim-sectioning-001
