engineering:
  explanation:
    zh: >-
      ChainStage 是 PromptChain 拓扑中的有序阶段 slot，以 stage_ordinal 与 connection_ports 绑定 LangGraph
      顺序节点。一次 invoke 引用 part revision，运行状态写入 CompositionActivity 而非 part 规范。
    en: >-
      ChainStage is an ordered stage slot in a PromptChain topology, binding stage_ordinal and connection_ports to
      LangGraph sequential nodes. An invoke references a part revision while runtime state belongs to
      CompositionActivity, not the part specification.
    ja: >-
      ChainStage は PromptChain topology 内の ordered stage slot で stage_ordinal/connection_ports を LangGraph
      sequential node に bind する。
  typical_input:
    - description:
        zh: 拓扑 revision 中 chain stage 的位置、序号与端口声明。
        en: Chain stage placement, ordinal, and port declaration in a topology revision.
        ja: topology revision における chain stage placement/ordinal/port 宣言。
      format: |-
        {"composition_part_id":"review-stage","revision":"2","stage_ordinal":2,"topology_ref":"draft-review-revise-topology@1","connection_ports":{"inputs":[{"name":"draft","contract_ref":"draft@2"}],"outputs":[{"name":"reviewed","contract_ref":"reviewed@1"}]}}
  typical_output:
    - description:
        zh: 编译器生成的顺序节点绑定。
        en: Sequential node binding from the compiler.
        ja: compiler が生成する sequential node binding。
      format: |-
        {"part_ref":"review-stage@2","compiled_node":"review","stage_ordinal":2}
  reference_implementations:
    - name: LangGraph workflows and agents
      url: https://docs.langchain.com/oss/python/langgraph/workflows-agents
      description: Documents ordered prompt-chain stages as graph nodes.
  source_claims:
    - claim-chain-stage-hierarchy
    - claim-chain-stage-001
