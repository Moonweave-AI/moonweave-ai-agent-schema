      ja: 外部管理責任評価を持つパートナーサービス境界
    scenario_id: partner-case-processing
    descriptions: {zh: "NIST SP 800-207 定义零信任：不因网络位置隐式信任；访问资源前离散认证与授权。", en: "NIST SP 800-207 defines zero trust: no implicit trust by network location; discrete authentication and authorization before resource access.", ja: "NIST SP 800-207 は network location による implicit trust なし、resource access 前の discrete 認証・認可を定義する。"}
    field_values:
      enforcement_point_ref: egress-policy-proxy
      external_administration_basis_ref: "trust-assessment:partner-services-2026-q3"
      source_zone_ref: customer-data
      target_zone_ref: partner-services
      trust_boundary_id: customer-data-to-partner-service
    related_node_ids: []
    related_relation_ids: []
    expected_result: {zh: "璁板綍涓庣湡瀹炴潵婧愪竴鑷寸殑鍙楁帶缁撴灉銆?, en: "Record a controlled outcome aligned with the cited source.", ja: "寮曠敤銈姐兗銈广仺涓€鑷淬仚銈嬪埗寰＄祼鏋溿倰瑷橀尣銇欍倠銆?}
    why_valid_or_invalid: {zh: "NIST 区分策略引擎（决策）与策略执行点；信任边界映射这一分离。", en: "NIST separates policy engine (decision) from policy enforcement point; trust boundaries map to this split.", ja: "NIST は policy engine と PEP を分離する。trust boundary はこの分離に対応する。"}
    synthetic: false
    source_claims:
      - claim-nist-external-posture
