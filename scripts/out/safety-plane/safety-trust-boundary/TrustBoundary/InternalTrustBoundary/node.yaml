    field_values:
      administrative_scope_ref: "org:moonweave"
      enforcement_point_ref: envoy-customer-ext-authz
      source_zone_ref: sandbox
      target_zone_ref: customer-data
      trust_boundary_id: sandbox-to-customer-data
