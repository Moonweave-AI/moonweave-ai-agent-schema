parent_relation:
  id: InternalTrustBoundary-is_a-TrustBoundary
  predicate: is_a
  target: TrustBoundary
  relation_kind: hierarchy
  labels:
    zh: 是一种信任边界
    en: is a trust boundary
    ja: 信頼境界の一種である
  definitions:
    zh: InternalTrustBoundary 保留 TrustBoundary 的重评估义务，并将两个区的管理范围限定为同一组织或部署。
    en: InternalTrustBoundary retains TrustBoundary's re-evaluation obligation while limiting both zones to one organization or deployment.
    ja: InternalTrustBoundary は TrustBoundary の再評価義務を保持し、両ゾーンを一つの組織又はデプロイメントに限定する。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  conditions:
    - id: internal-trust-boundary-parent-semantics
      severity: error
      expression_language: plain
      expression: The child must satisfy TrustBoundary semantics and add an administrative scope shared by both zones.
      explanation:
        zh: 该子类增加的是组织归属限制，而不是减弱或绕开父类的重评估义务。
        en: The subtype adds a shared administrative scope; it does not weaken or bypass the parent's re-evaluation obligation.
        ja: このサブタイプは共有管理範囲を追加する。親の再評価義務を弱めたり回避したりしない。
      source_claims:
        - claim-nist-no-network-trust
  temporal_scope: timeless
  constraints: []
  source_claims:
    - claim-nist-no-network-trust
relations: []
sources:
  - id: nist-zero-trust
    title: NIST SP 800-207 Zero Trust Architecture
    url: https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-207.pdf
    source_type: official-standard
    relevance: Requires the same security requirements for requests from enterprise-owned networks and per-resource policy evaluation.
  - id: opa-deployment
    title: Open Policy Agent deployment documentation
    url: https://www.openpolicyagent.org/docs/deploy
    source_type: official-open-source-documentation
    relevance: Describes OPA as a policy decision point used by policy enforcement points.
  - id: envoy-ext-authz
    title: Envoy external authorization filter
    url: https://www.envoyproxy.io/docs/envoy/latest/configuration/http/http_filters/ext_authz_filter.html
    source_type: official-open-source-documentation
    relevance: Provides a concrete pre-upstream authorization enforcement interface.
source_claims:
  - id: claim-nist-no-network-trust
    source: nist-zero-trust
    supports: Network location alone does not imply trust, and requests from enterprise-owned network infrastructure must meet the same security requirements as other requests.
    locator: Section 2.1, zero trust tenet 2
    evidence_kind: standard
    confidence: high
  - id: claim-nist-per-resource
    source: nist-zero-trust
    supports: Access to individual enterprise resources is granted per session after evaluating the requester, resource, and dynamic policy inputs with least privilege.
    locator: Section 2.1, zero trust tenets 3 and 4
    evidence_kind: standard
    confidence: high
  - id: claim-opa-pdp
    source: opa-deployment
    supports: OPA is a policy decision point that makes decisions on behalf of applications acting as policy enforcement points.
    locator: How to Deploy OPA, introduction
    evidence_kind: official-documentation
    confidence: high
  - id: claim-envoy-ext-authz
    source: envoy-ext-authz
    supports: Envoy calls an external HTTP or gRPC authorization service to determine whether an incoming request is authorized before it reaches an upstream service.
    locator: External Authorization overview
    evidence_kind: official-api
    confidence: high
