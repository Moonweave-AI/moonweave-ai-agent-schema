source_claims:
  - id: claim-trust-boundary-001
    source: eng-network-nist-zero-trust
    supports: NIST SP 800-207 states that network location alone grants no implicit trust, places enterprise resources beyond policy enforcement points in trust zones, and separates access requests, policy decisions, communication paths, monitoring, and termination; Moonweave uses this to model explicit trust-assumption boundaries and crossing occurrences.
    locator: NIST SP 800-207 Sections 2.1-2.2 and 3.2, trust zones and policy enforcement points
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-trust-boundary-002
    source: eng-security-cisa-zero-trust-maturity-v2
    supports: CISA Zero Trust Maturity Model 2.0 separates identity, device, network, application/workload, and data pillars and requires inventory, categorization, labeling, lifecycle protection, governance, and visibility for data; Moonweave uses these distinctions for versioned DataZone handling profiles.
    locator: CISA Zero Trust Maturity Model 2.0 Section 5 and Table 6, Data pillar
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
