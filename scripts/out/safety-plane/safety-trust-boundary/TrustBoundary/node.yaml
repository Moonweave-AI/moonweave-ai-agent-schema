schema: moonweave.ai/ontology-node/v1
id: TrustBoundary
kind: concept
status: accepted
labels:
  zh: 信任边界
  en: trust boundary
  ja: 信頼境界
semantics:
  short_definition:
    zh: 两个安全区域之间信任、权限、控制或数据处理假设发生变化的版本化边界规范。
    en: A versioned boundary specification where trust, authority, control, or data-handling assumptions change between two security zones.
    ja: 二 security zone 間で trust・authority・control・data handling assumption が変化する versioned boundary specification。
  definition:
    zh: 信任边界是一种规范，以边界标识、版本、受控侧、对侧、内外位置、交互面、信任假设变化、执行点和有效期为身份，声明任何跨越都必须重新验证的安全条件。InternalBoundary 与 ExternalBoundary 按受控系统范围形成互斥子类；network、tool 和 remote-agent 是可并存交互面，不再作为重叠子类。
    en: A TrustBoundary is a specification identified by boundary ID, version, controlled side, counterparty side, internal or external position, interaction surface, changed trust assumptions, enforcement point, and validity interval, declaring security conditions that every crossing must revalidate. InternalBoundary and ExternalBoundary are mutually exclusive relative to the controlled-system scope; network, tool, and remote-agent are coexisting surfaces rather than overlapping subclasses.
    ja: TrustBoundary は boundary ID・version・controlled side・counterparty side・internal/external position・interaction surface・changed trust assumption・enforcement point・validity interval で識別する specification です。Internal/External は controlled-system scope に対し mutually exclusive、network/tool/remote-agent は coexist surface で overlapping subtype ではありません。
  why_needed:
    zh: 把边界位置与交互介质分成不同字段，既消除多重重叠分类，又能让同一外部边界同时声明网络、工具和远程智能体表面。
    en: Separating boundary position from interaction medium removes overlapping taxonomy while allowing one external boundary to declare network, tool, and remote-agent surfaces together.
    ja: boundary position と interaction medium を分け overlapping taxonomy を除き一 external boundary が network/tool/remote-agent surface を同時宣言できます。
  includes:
    - zh: 系统内部信任变化、组织外部边界、远程服务接口、模型—工具执行接口和跨数据处理区边界。
      en: Internal trust changes, organization-external boundaries, remote-service interfaces, model-to-tool execution interfaces, and boundaries between data-handling zones.
      ja: internal trust change・organization external boundary・remote service interface・model-tool execution interface・data handling zone boundary。
  excludes:
    - zh: 区域本身、一次数据传输、授权范围、策略决定、网络路由以及只因产品或框架名称不同而划出的页面分组。
      en: The zone itself, one data transfer, authority scope, policy decision, network route, and page grouping based only on product or framework names.
      ja: zone 自体・一 data transfer・authority scope・policy decision・network route・product/framework name のみの page grouping。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - boundary_id
    - version
  fields:
    - id: boundary_id
      labels:
        zh: 边界标识
        en: boundary ID
        ja: boundary ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 跨版本稳定标识一个信任边界。
        en: Stable logical identifier for a trust boundary across versions.
        ja: version 間で stable な trust boundary ID。
      allowed_values: []
      pattern: null
      example_value: boundary-model-tool
      source_claims:
        - claim-trust-boundary-001
    - id: version
      labels:
        zh: 边界版本
        en: boundary version
        ja: boundary version
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定一组不可原地修改的两侧和信任条件。
        en: Fixes one immutable revision of sides and trust conditions.
        ja: side/trust condition の immutable revision を固定します。
      allowed_values: []
      pattern: null
      example_value: "4"
      source_claims:
        - claim-trust-boundary-001
    - id: controlled_side_ref
      labels:
        zh: 受控侧引用
        en: controlled-side reference
        ja: controlled-side reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用本系统能够直接实施策略与观测的一侧。
        en: References the side where this system can directly enforce policy and observe behavior.
        ja: system が policy enforce/observe できる side。
      allowed_values: []
      pattern: null
      example_value: agent-runtime
      source_claims:
        - claim-trust-boundary-001
    - id: counterparty_side_ref
      labels:
        zh: 对侧引用
        en: counterparty-side reference
        ja: counterparty-side reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用信任条件不同的另一侧区域、服务或执行面。
        en: References the other zone, service, or execution surface with different trust conditions.
        ja: 異なる trust condition の other zone/service/execution surface。
      allowed_values: []
      pattern: null
      example_value: tool-runtime
      source_claims:
        - claim-trust-boundary-001
    - id: boundary_position
      labels:
        zh: 边界位置
        en: boundary position
        ja: boundary position
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 相对于受控系统范围声明 internal 或 external。
        en: Declares internal or external relative to the controlled-system scope.
        ja: controlled-system scope に対する internal/external。
      allowed_values: []
      pattern: null
      example_value: internal
      source_claims:
        - claim-trust-boundary-001
    - id: interaction_surface
      labels:
        zh: 交互面
        en: interaction surface
        ja: interaction surface
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 列出 network、tool、remote-agent、data-store 或 model-context 等可并存表面。
        en: Lists coexisting surfaces such as network, tool, remote-agent, data-store, or model-context.
        ja: network・tool・remote-agent・data-store・model-context 等 coexist surface。
      allowed_values: []
      pattern: null
      example_value:
        - tool
        - model-context
      source_claims:
        - claim-trust-boundary-001
        - claim-trust-boundary-002
    - id: trust_assumption_change
      labels:
        zh: 信任假设变化
        en: trust-assumption change
        ja: trust-assumption change
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明身份、权限、可见性、执行控制、数据处理或问责中哪些条件发生变化。
        en: States which identity, authority, visibility, execution-control, data-handling, or accountability assumptions change.
        ja: identity・authority・visibility・execution control・data handling・accountability の change。
      allowed_values: []
      pattern: null
      example_value:
        - untrusted-output
        - side-effects-possible
      source_claims:
        - claim-trust-boundary-001
        - claim-trust-boundary-002
    - id: enforcement_point_ref
      labels:
        zh: 执行点引用
        en: enforcement-point reference
        ja: enforcement-point reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用对跨越执行允许、拒绝、监控或终止的控制点。
        en: References the control point that allows, denies, monitors, or terminates crossings.
        ja: crossing を allow/deny/monitor/terminate する control point。
      allowed_values: []
      pattern: null
      example_value: tool-gateway-pep
      source_claims:
        - claim-trust-boundary-001
    - id: valid_from
      labels:
        zh: 生效时间
        en: valid from
        ja: valid from
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录该边界版本开始生效的时间。
        en: Records when this boundary revision becomes effective.
        ja: boundary revision effective start time。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T00:00:00Z
      source_claims:
        - claim-trust-boundary-001
    - id: valid_until
      labels:
        zh: 失效时间
        en: valid until
        ja: valid until
      datatype: datetime
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 记录版本停止适用的时间；为空表示尚未计划结束。
        en: Records when the revision stops applying; null means no scheduled end.
        ja: revision stop time、null は scheduled end 無し。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-trust-boundary-001
  constraints: []
  required_relation_constraints: []
