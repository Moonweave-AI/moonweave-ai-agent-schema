schema: moonweave.ai/ontology-node/v1
id: ToolResultRecord
kind: concept
status: accepted
labels:
  zh: 工具结果记录
  en: Tool Result Record
  ja: ツール結果記録
semantics:
  short_definition:
    zh: 在一次副作用尝试后保留返回证据的项目本地记录。
    en: A project-local record that preserves evidence returned after one side-effect attempt.
    ja: 一回の副作用試行後に返された証拠を保持するプロジェクト固有の記録。
  definition:
    zh: 工具结果记录是与一次 SideEffect 关联的项目本地审计记录。它保留选定的 MCP Tool Result 证据，例如外部引用、本地结果和错误标记。它不是 MCP 原生对象、授权授予，也不能追溯性地使被拒绝或未执行的请求成功。
    en: ToolResultRecord is a project-local audit record associated with one SideEffect. It preserves selected evidence from an MCP Tool Result, such as an external reference, local outcome, and error flag. It is not an MCP-native object, an authorization grant, and cannot retroactively make a denied or unexecuted request successful.
    ja: ツール結果記録は、一つの SideEffect に関連するプロジェクト固有の監査記録です。外部参照、ローカルの結果、エラーフラグなど、MCP Tool Result から選択された証拠を保持します。MCP ネイティブのオブジェクトでも認可付与でもなく、拒否または未実行の要求を遡って成功扱いにすることもできません。
  why_needed:
    zh: 外部操作可能失败、超时或被重试。回执为后续控制提供证据，而不是依赖智能体的自然语言断言。
    en: External operations can fail, time out, or be retried. A receipt gives later controls evidence rather than relying on an agent's natural-language assertion.
    ja: 外部操作は失敗、タイムアウト、再試行の対象になり得ます。回執は、エージェントの自然言語による主張に頼らず、後続の制御に証拠を与えます。
  includes:
    - zh: 结果状态、目标引用、结果标识和执行错误证据。
      en: Outcome state, target reference, result identifier, and execution-error evidence.
      ja: 結果状態、対象参照、結果識別子、実行エラーの証拠。
  excludes:
    - zh: 待审批项、未来计划和策略允许决定。
      en: A pending approval, a future plan, and a policy allow decision.
      ja: 保留中の承認、将来の計画、ポリシーによる許可決定。
  semantic_kind: evidence
  aliases:
    - EffectReceipt
    - effect-receipt
    - execution-receipt
    - effect-outcome
engineering:
  explanation:
    zh: 将工具结果的结构化部分与副作用标识一同持久化。MCP 工具结果可以包含 content、structuredContent 和 isError；消费者必须将错误结果解释为执行证据，而非成功回执。
    en: Persist the structured portion of the tool result with the side-effect identity. MCP tool results can carry content, structured content, and isError; consumers must interpret an error result as execution evidence rather than a successful receipt.
    ja: ツール結果の構造化部分を副作用の識別子とともに永続化します。MCP のツール結果には content、structuredContent、isError を含められます。消費者はエラー結果を成功の回執ではなく実行の証拠として解釈しなければなりません。
  typical_input:
    - description:
        zh: 工具结果
        en: Tool result
        ja: ツール結果
      format: '{"structuredContent":{"operation_id":"op-42"},"isError":false}'
      source_claims:
        - claim-mcp-tool-result-shape
  typical_output:
    - description:
        zh: 工具结果记录
        en: Tool result record
        ja: ツール結果記録
      format: '{"tool_result_record_id":"tool-result-42","side_effect_ref":"SideEffect:effect-42","outcome":"succeeded","external_reference":"op-42"}'
      source_claims:
        - claim-mcp-receipt
  reference_implementations:
    - name: MCP Tools
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: Defines structured tool result content and error signaling.
structure:
  identity_keys:
    - tool_result_record_id
  fields:
    - id: tool_result_record_id
      labels:
        zh: 工具结果记录标识
        en: Tool result record ID
        ja: ツール結果記録ID
      definitions:
        zh: 结果证据的稳定标识。
        en: Stable identity for outcome evidence.
        ja: 結果証拠の安定した識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ^[a-z0-9-]+$
      example_value: tool-result-42
      allowed_values: []
      source_claims:
        - claim-mcp-receipt
    - id: outcome
      labels:
        zh: 结果状态
        en: Outcome
        ja: 結果
      definitions:
        zh: 被关联副作用尝试的已报告结果。
        en: Reported result of the linked side-effect attempt.
        ja: 関連する副作用試行について報告された結果。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: succeeded
      allowed_values:
        - succeeded
        - failed
        - timed_out
        - unknown
      source_claims:
        - claim-mcp-receipt
    - id: side_effect_ref
      labels:
        zh: 副作用引用
        en: Side-effect reference
        ja: 副作用参照
      definitions:
        zh: 此工具结果记录所证明的唯一 SideEffect 标识。
        en: Identity of the one SideEffect evidenced by this tool result record.
        ja: このツール結果記録が証拠とする唯一の SideEffect の識別子。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: SideEffect:effect-42
      allowed_values: []
      source_claims:
        - claim-mcp-receipt
    - id: tool_result_is_error
      labels:
        zh: 工具结果错误标记
        en: Tool-result error flag
        ja: ツール結果エラーフラグ
      definitions:
        zh: 保留原始工具结果中的 isError 信号，而不是从自然语言描述推断成功或失败。
        en: Preserved isError signal from the original tool result, rather than an outcome inferred from prose.
        ja: 自然言語から推論せず、元のツール結果の isError シグナルを保持する。
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: false
      allowed_values: []
      source_claims:
        - claim-mcp-receipt
    - id: external_reference
      labels:
        zh: 外部结果引用
        en: External result reference
        ja: 外部結果参照
      definitions:
        zh: 目标系统返回的操作标识、任务标识或其他可追溯引用。
        en: Operation ID, task ID, or other traceable reference returned by the target system.
        ja: 対象システムが返した操作 ID、タスク ID、または追跡可能な参照。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ^[A-Za-z0-9._:/-]{2,256}$
      example_value: op-42
      allowed_values: []
      source_claims:
        - claim-mcp-receipt
    - id: observed_at
      labels:
        zh: 观测时间
        en: Observed at
        ja: 観測時刻
      definitions:
        zh: 接收到或记录该工具结果的 UTC 时间戳。
        en: UTC timestamp at which this tool result was received or recorded.
        ja: このツール結果を受信または記録した UTC 時刻。
      datatype: datetime
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: '2026-07-18T14:02:03Z'
      allowed_values: []
      source_claims:
        - claim-mcp-receipt
  constraints:
    - id: tool-result-record-links-one-effect
      severity: error
      expression_language: plain
      expression: Each ToolResultRecord must identify exactly one attempted SideEffect and must not claim succeeded when the underlying result has isError true.
      explanations:
        zh: 结果证据必须始终关联到真实执行结果。
        en: Outcome evidence must remain tied to the actual execution result.
        ja: 結果証拠は実際の実行結果に結び付いたままでなければなりません。
      explanation:
        zh: 结果证据必须始终关联到真实执行结果。
        en: Outcome evidence must remain tied to the actual execution result.
        ja: 結果証拠は実際の実行結果に結び付いたままでなければなりません。
      source_claims:
        - claim-mcp-receipt
    - id: tool-result-record-outcome-matches-error-signal
      severity: error
      expression_language: plain
      expression: A ToolResultRecord with tool_result_is_error true must not report outcome succeeded; a succeeded outcome requires tool_result_is_error false and a nonempty external_reference.
      explanations:
        zh: 回执的结果状态必须与工具协议的错误信号和目标系统引用一致。
        en: Receipt outcome must agree with the tool protocol error signal and target-system reference.
        ja: 回执の結果状態はツールプロトコルのエラー信号と対象システム参照に一致しなければならない。
      explanation:
        zh: 回执的结果状态必须与工具协议的错误信号和目标系统引用一致。
        en: Receipt outcome must agree with the tool protocol error signal and target-system reference.
        ja: 回执の結果状態はツールプロトコルのエラー信号と対象システム参照に一致しなければならない。
      source_claims:
        - claim-mcp-receipt
  required_relations: []
