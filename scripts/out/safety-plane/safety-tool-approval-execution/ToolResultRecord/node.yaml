      en: A side effect is an external-state attempt and a receipt is subsequent outcome evidence; the two must remain independently existent and auditable.
      ja: SideEffect は外部状態への試行、receipt は後続の結果証拠であり、両者は独立して存在し監査可能でなければならない。
