    synthetic: false
    source_claims:
      - claim-mcp-receipt
parent_relation: null
relations:
  - id: ToolResultRecord-documents_outcome_of-SideEffect
    predicate: documents_outcome_of
    target: concept:SideEffect
    endpoint_order: receipt-to-effect
    direction: source-to-target
    relation_kind: association
    labels:
      zh: 记录副作用结果
      en: documents outcome of side effect
      ja: 副作用の結果を記録する
    definitions:
      zh: ToolResultRecord 是一个独立的结果证据记录，记录一个 SideEffect 的可观察结果；它不组成副作用本身，也不把计划或批准改写为已执行效果。
      en: A ToolResultRecord is an independent outcome-evidence record for one SideEffect. It does not compose the effect itself or turn a plan or approval into an executed effect.
      ja: ToolResultRecord は一つの SideEffect の独立した結果証拠記録である。副作用自体を構成せず、計画または承認を実行済み効果へ変えない。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: 1
    inverse_reading:
      predicate: has_outcome_receipt
      labels:
        zh: 有结果回执
        en: has outcome receipt
        ja: 結果レシートを持つ
    conditions:
      - id: tool-result-record-documents-matched-effect
        severity: error
        expression_language: plain
        expression: Assert documents_outcome_of only when side_effect_ref identifies the target SideEffect and the recorded outcome agrees with the retained tool-result error evidence.
        explanations:
          zh: 证据只能关联其所引用的副作用，且不得以结果文字覆盖工具错误信号。
          en: Evidence can associate only with the effect it references and must not override the retained tool-result error signal.
          ja: 証拠は参照する副作用とのみ association を持て、保持されたツール結果のエラー信号を上書きしてはならない。
        source_claims:
          - claim-mcp-receipt
          - claim-mcp-tool-result-shape
    temporal_scope: transaction-time
    boundary_context: A tool result record retains evidence after an effect attempt and remains independent from the SideEffect record.
    constraints: []
    examples: []
    source_claims:
      - claim-mcp-receipt
      - claim-mcp-tool-result-shape
