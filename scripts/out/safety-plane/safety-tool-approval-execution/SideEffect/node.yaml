    field_values:
      effect_id: effect-42
      effect_target: order/17
      execution_state: succeeded
      pending_tool_call_ref: "PendingToolCall:pending-call-42"
      started_at: "'2026-07-18T14:02:00Z'"
      tool_call_id: call-cancel-order-42
    related_node_ids: []
    related_relation_ids: []
    expected_result: {zh: "璁板綍涓庣湡瀹炴潵婧愪竴鑷寸殑鍙楁帶缁撴灉銆?, en: "Record a controlled outcome aligned with the cited source.", ja: "寮曠敤銈姐兗銈广仺涓€鑷淬仚銈嬪埗寰＄祼鏋溿倰瑷橀尣銇欍倠銆?}
    why_valid_or_invalid: {zh: "HITL 批准解决具体中断；不是 OAuth scope 授予。", en: "HITL approval resolves a concrete interruption; it is not an OAuth scope grant.", ja: "HITL 承認は具体的 interruption を解決する。OAuth scope grant ではない。"}
