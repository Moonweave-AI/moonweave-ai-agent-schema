relations:
  - id: ToolApprovalGate-gates-SideEffect
    predicate: gates
    target: SideEffect
    relation_kind: governance
    labels:
      zh: 把关
      en: gates
      ja: ゲートする
    definitions:
      zh: ToolApprovalGate 控制关联的拟议副作用是否可以继续执行。
      en: The gate controls whether a linked proposed side effect may proceed.
      ja: ToolApprovalGate は、関連付けられた提案済み副作用を進められるかどうかを制御する。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 1
        max: 1
    conditions:
      - id: tool-approval-gate-gates-only-before-execution
        severity: error
        expression_language: plain
        expression: The relation applies only before the SideEffect has an executed receipt.
        explanations:
          zh: 工具审批闸门控制的是待执行副作用，而不是已经完成的历史副作用。
          en: A tool approval gate controls a pending effect, not a completed historical effect.
          ja: ツール承認ゲートが制御するのは保留中の副作用であり、完了済みの履歴副作用ではない。
        source_claims:
          - claim-hitl-gate
    temporal_scope: valid-time
    constraints: []
    source_claims:
      - claim-hitl-gate
