      en: Reject the design; a gate enforces an outcome rather than deciding access.
      ja: この設計は拒否します。ゲートは結果を強制するものであり、アクセスを決定するものではありません。
    why_valid_or_invalid: {zh: "HITL 批准解决具体中断；不是 OAuth scope 授予。", en: "HITL approval resolves a concrete interruption; it is not an OAuth scope grant.", ja: "HITL 承認は具体的 interruption を解決する。OAuth scope grant ではない。"}
    synthetic: false
    source_claims:
      - claim-hitl-gate
  - id: tool-approval-gate-boundary-approval
    kind: boundary
    labels:
      zh: 闸门与批准的边界
      en: Gate versus approval
      ja: ゲートと承認の境界
    descriptions: {zh: "OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。", en: "OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/).", ja: "OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。"}
    field_values:
      tool_approval_gate_id: gate-44
      approval_state: pending_approval
    related_node_ids:
