source_claims:
  - id: claim-hitl-gate
    source: openai-hitl-gate
    supports: This ontology defines ToolApprovalGate as a project-local audit record with tool_approval_gate_id, approval_state, call binding, argument digest, and release semantics; these are not OpenAI SDK API fields.
    locator: Local ontology design boundary; informed by Human-in-the-loop > How the approval flow works
    evidence_kind: design-inference
    confidence: high
  - id: claim-openai-tool-approval-flow
    source: openai-hitl-gate
    supports: The runner evaluates an approval rule for a tool call; if no decision is stored, it pauses with a ToolApprovalItem in interruptions, and state.approve or state.reject resolves that interruption before the run resumes.
    locator: Human-in-the-loop > How the approval flow works
    evidence_kind: official-doc
    confidence: high
