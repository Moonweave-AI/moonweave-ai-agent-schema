schema: moonweave.ai/ontology-node/v1
id: ToolApprovalGate
kind: concept
status: accepted
labels:
  zh: 工具审批闸门
  en: Tool Approval Gate
  ja: ツール承認ゲート
semantics:
  short_definition:
    zh: 对一次重要调用的工具审批暂停及其解决结果的项目本地记录。
    en: A project-local record of a tool-approval pause and its resolution for one consequential call.
    ja: 一回の重要な呼び出しに対するツール承認の停止と、その解決結果を表すプロジェクト固有の記録。
  definition:
    zh: 工具审批闸门是针对一次进入 OpenAI Agents SDK 人在回路流程的状态变更工具调用的项目本地审计模型。它记录围绕 SDK 中断的逐调用待审批、已批准或已拒绝状态；它不是 SDK 对象、策略决定、身份验证或用户批准本身。
    en: Tool Approval Gate is a project-local audit model for one state-changing tool call that enters the OpenAI Agents SDK human-in-the-loop flow. It records call-scoped pending, approved, or rejected state around the SDK interruption; it is not an SDK object, a policy decision, authentication, or user approval itself.
    ja: ツール承認ゲートは、OpenAI Agents SDK のヒューマン・イン・ザ・ループの流れに入る一つの状態変更ツール呼び出しを対象にした、プロジェクト固有の監査モデルです。SDK の中断を中心に、呼び出し単位の保留、承認、拒否の状態を記録します。SDK オブジェクト、ポリシー決定、認証、または利用者の承認そのものではありません。
  why_needed:
    zh: 宽泛的授权可以允许一类操作，但不可逆的具体操作仍应在执行前立即接受检查。
    en: A broad grant can permit a class of actions while an irreversible instance still needs inspection immediately before it executes.
    ja: 広い権限付与は操作の種類を許可できますが、不可逆な個別操作は実行直前にも検査を必要とします。
  includes:
    - zh: 待执行副作用的闸门、中断状态、审批要求与执行放行。
      en: Pending-effect gates, interruption state, approval requirements, and execution release.
      ja: 保留中の副作用に対するゲート、中断状態、承認要件、実行の解放。
  excludes:
    - zh: 策略决定或能力授予。
      en: A policy decision or capability grant.
      ja: ポリシー決定または能力の付与。
    - zh: 批准记录或副作用本身。
      en: An approval record or the side effect itself.
      ja: 承認記録または副作用そのもの。
  semantic_kind: control
  aliases:
    - CommitGate
    - commit-gate
    - effect-gate
    - approval-gate
engineering:
  explanation:
    zh: SDK 运行器会针对拟议工具调用评估 needs_approval。若不存在已保存的决定，它会返回 ToolApprovalItem 中断；显式批准或拒绝会解决闸门，且只有批准才允许运行器恢复该调用。
    en: An SDK runner evaluates needs_approval for the proposed tool call. If no saved decision exists, it returns a ToolApprovalItem interruption; an explicit approve or reject resolves the gate and only approve permits the runner to resume the call.
    ja: SDK ランナーは、提案されたツール呼び出しに対して needs_approval を評価します。保存済みの決定がなければ ToolApprovalItem の中断を返します。明示的な承認または拒否がゲートを解決し、承認だけがランナーによる呼び出しの再開を許可します。
  typical_input:
    - description:
        zh: 待审批的敏感工具调用
        en: Pending sensitive tool call
        ja: 保留中の機微なツール呼び出し
      format: 'result.interruptions[0]  # ToolApprovalItem: tool_name="cancel_order", arguments="{"order_id":17}"'
      source_claims:
        - claim-openai-tool-approval-flow
  typical_output:
    - description:
        zh: 闸门结果
        en: Gate outcome
        ja: ゲートの結果
      format: '{"tool_call_id":"call-42","gate":"paused","interruption":"ToolApprovalItem"}'
      source_claims:
        - claim-hitl-gate
  reference_implementations:
    - name: OpenAI Agents SDK Human-in-the-loop
      url: https://openai.github.io/openai-agents-python/human_in_the_loop/
      description: Defines approval interruptions and resolution for sensitive tool calls.
structure:
  identity_keys:
    - tool_approval_gate_id
  fields:
    - id: tool_approval_gate_id
      labels:
        zh: 工具审批闸门标识
        en: Tool approval gate ID
        ja: ツール承認ゲートID
      definitions:
        zh: 一次工具审批控制实例的稳定标识。
        en: Stable identifier for one tool-approval control instance.
        ja: 一つのツール承認制御インスタンスの安定した識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ^[a-z0-9-]+$
      example_value: gate-42
      allowed_values: []
      source_claims:
        - claim-hitl-gate
    - id: approval_state
      labels:
        zh: 审批状态
        en: Approval state
        ja: 承認状態
      definitions:
        zh: 副作用被放行或拒绝之前的当前执行状态。
        en: Current enforcement state before the effect is released or denied.
        ja: 副作用が解放または拒否される前の現在の強制状態。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: pending_approval
      allowed_values:
        - ready
        - pending_approval
        - approved
        - denied
        - executed
      source_claims:
        - claim-hitl-gate
    - id: tool_call_id
      labels:
        zh: 工具调用标识
        en: Tool call identifier
        ja: ツール呼出し識別子
      definitions:
        zh: 被门控的具体 SDK 调用标识。
        en: Identifier of the concrete SDK call controlled by this gate.
        ja: このゲートが制御する具体的な SDK 呼出しの識別子。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._:-]{3,128}$'
      example_value: call-cancel-order-42
      allowed_values: []
      source_claims: [claim-hitl-gate]
    - id: arguments_digest
      labels:
        zh: 已审阅参数摘要
        en: Reviewed arguments digest
        ja: レビュー済み引数ダイジェスト
      definitions:
        zh: 中断所展示工具参数的 SHA-256 摘要。
        en: SHA-256 digest of the tool arguments displayed in the interruption.
        ja: 中断で表示したツール引数の SHA-256 ダイジェスト。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^sha256:[a-f0-9]{64}$'
      example_value: sha256:9f6a65d7c61893f0c7f72b0c5caf0b0f3fc6f3c6387cad0b2ae9ef85d2a6d794
      allowed_values: []
      source_claims: [claim-hitl-gate]
  constraints:
    - id: tool-approval-gate-no-execution-while-pending
      severity: error
      expression_language: plain
      expression: approval_state pending_approval or denied must not release the linked SideEffect.
      explanations:
        zh: 在具体调用获得批准结果之前，强制执行必须保持暂停。
        en: Enforcement must remain paused until the concrete call receives an approving outcome.
        ja: 具体的な呼び出しが承認結果を得るまで、実行の強制は停止したままでなければなりません。
      explanation:
        zh: 在具体调用获得批准结果之前，强制执行必须保持暂停。
        en: Enforcement must remain paused until the concrete call receives an approving outcome.
        ja: 具体的な呼び出しが承認結果を得るまで、実行の強制は停止したままでなければなりません。
      source_claims:
        - claim-hitl-gate
    - id: tool-approval-gate-releases-only-reviewed-call
      severity: error
      expression_language: plain
      expression: A transition to approved or executed must retain the same tool_call_id and arguments_digest that were present while the gate was pending_approval.
      explanation:
        zh: 门控状态变化不能把已审阅调用替换成不同参数的调用。
        en: A gate transition cannot replace the reviewed call with one using different arguments.
        ja: ゲート遷移はレビュー済み呼出しを異なる引数の呼出しに置き換えてはならない。
      source_claims: [claim-hitl-gate]
  required_relations: []
examples:
  
- id: tool-approval-gate-positive-pause
    kind: positive
    labels:
      zh: 取消前暂停
      en: Pause before cancellation
      ja: キャンセル前の停止
    descriptions: {zh: "OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。", en: "OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/).", ja: "OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。"}
    field_values:
      tool_approval_gate_id: gate-42
      approval_state: pending_approval
      tool_call_id: call-cancel-order-42
      arguments_digest: sha256:9f6a65d7c61893f0c7f72b0c5caf0b0f3fc6f3c6387cad0b2ae9ef85d2a6d794
    related_node_ids:
      - PendingToolCall
    related_relation_ids:
      - ToolApprovalGate-gates-SideEffect
    expected_result:
      zh: 在批准解决闸门之前，不会发生取消操作。
      en: No cancellation occurs until an approval resolves the gate.
      ja: 承認がゲートを解決するまで、キャンセルは実行されません。
    why_valid_or_invalid: {zh: "HITL 批准解决具体中断；不是 OAuth scope 授予。", en: "HITL approval resolves a concrete interruption; it is not an OAuth scope grant.", ja: "HITL 承認は具体的 interruption を解決する。OAuth scope grant ではない。"}
    synthetic: false
    source_claims:
      - claim-hitl-gate
  - id: tool-approval-gate-counter-policy-engine
    kind: counterexample
    labels:
      zh: 闸门充当策略引擎
      en: Gate acting as policy engine
      ja: ポリシーエンジンとして振る舞うゲート
    descriptions: {zh: "OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。", en: "OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/).", ja: "OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。"}
    field_values:
      tool_approval_gate_id: gate-43
      approval_state: ready
    related_node_ids:
