schema: moonweave.ai/ontology-node/v1
id: InboundResponse
kind: concept
status: accepted
labels:
  zh: 入站响应记录
  en: Inbound Response Record
  ja: 受信応答記録
semantics:
  short_definition:
    zh: "受控客户端或代理从远端收到、并与原请求关联的响应消息记录。"
    en: "A response-message record received by a controlled client or proxy and correlated to its originating request."
    ja: "制御対象クライアントまたはプロキシがリモートから受け、元の要求と相関する応答メッセージ記録。"
  definition:
    zh: "InboundResponse 是 NetworkMessage 的特化，表示相对于受控客户端或出口代理进入的协议响应、由 NetworkCall 观察后创建的记录。它保存响应标识、协议状态或回复码以及请求关联；它不是本地策略拒绝、任意入站请求、业务对象的持久化状态，也不是 NetworkCall 活动本身。"
    en: "InboundResponse is a specialization of NetworkMessage representing a record created by NetworkCall after it observes a protocol response entering relative to a controlled client or egress proxy. It retains response identity, protocol status or reply code, and request correlation; it is not a local policy denial, an arbitrary inbound request, persistent state of a business object, or the NetworkCall activity itself."
    ja: "InboundResponse は NetworkMessage の特化であり、制御対象クライアントまたは送信プロキシから見て受信方向に入るプロトコル応答を NetworkCall が観測した後に作成する記録を表す。応答 ID、プロトコルステータスまたは応答コード、要求相関を保持する。ローカルポリシー拒否、任意の受信要求、業務オブジェクトの永続状態、NetworkCall 活動自体ではない。"
  why_needed:
    zh: "远端响应与本地拒绝有不同的来源、信任等级和证据价值。单独记录响应能够正确关联状态码、SOCKS 回复或协议错误，同时允许调用在没有远端响应时仍以拒绝、超时或失败终止。"
    en: "A remote response and local denial have different origins, trust levels, and evidentiary value. A separate response record correctly correlates status codes, SOCKS replies, or protocol errors while allowing a call to terminate as denied, timed out, or failed when no remote response exists."
    ja: "リモート応答とローカル拒否は、出所、信頼水準、証拠価値が異なる。別個の応答記録により、ステータスコード、SOCKS 応答、プロトコルエラーを正しく相関でき、リモート応答がない場合でも呼出しを拒否、タイムアウト、失敗として終了できる。"
  includes:
    - zh: "HTTP 状态响应、SOCKS 回复或其他协议定义的远端结果消息。"
      en: "An HTTP status response, SOCKS reply, or other remote result message defined by the protocol."
      ja: "HTTP ステータス応答、SOCKS 応答、またはプロトコルが定義する他のリモート結果メッセージ。"
    - zh: "与原始 OutboundRequest 和观察远端响应后创建该记录的 NetworkCall 的关联。"
      en: "Correlation to the originating OutboundRequest and the NetworkCall that created this record after observing the remote response."
      ja: "元の OutboundRequest と、リモート応答の観測後にこの記録を作成した NetworkCall への相関。"
  excludes:
    - zh: "出口策略在拨号前作出的拒绝、客户端本地异常或任意入站 API 请求。"
      en: "An egress-policy denial made before dialing, a client-local exception, or an arbitrary inbound API request."
      ja: "ダイヤル前に行う送信ポリシー拒否、クライアントローカル例外、または任意の受信 API 要求。"
    - zh: "回复所表达的业务资源状态，或接收它的调用活动。"
      en: "The business-resource state expressed by the reply or the call activity that receives it."
      ja: "応答が表す業務リソース状態、またはそれを受信する呼出し活動。"
  semantic_kind: entity
  aliases: [received-response, remote-response]
engineering:
  explanation:
    zh: "客户端在收到协议完整的响应后创建该记录，将 status/reply code、关联 ID、时间和受控正文引用写入其中。对于 HTTP，响应应关联请求消息；对于 SOCKS，回复应关联先前协商请求。策略本地拒绝则记录在 NetworkCall 的终态中，不能伪造为 InboundResponse。"
    en: "A client creates this record after receiving a protocol-complete response, storing status or reply code, correlation ID, time, and a controlled body reference. For HTTP, the response correlates to a request message; for SOCKS, the reply correlates to the prior negotiated request. A local policy denial belongs to NetworkCall’s terminal state and must not be fabricated as InboundResponse."
    ja: "クライアントはプロトコルとして完全な応答を受信した後にこの記録を作り、ステータスまたは応答コード、相関 ID、時刻、制御された本文参照を保存する。HTTP では応答は要求メッセージに相関し、SOCKS では応答は先行するネゴシエーション済み要求に相関する。ローカルポリシー拒否は NetworkCall の終端状態に属し、InboundResponse として偽造してはならない。"
  typical_input:
    - description:
        zh: "受控客户端收到的 RFC 9110 HTTP 成功响应；记录层随后补入请求关联。"
        en: "An RFC 9110 HTTP success response received by the controlled client; the recording layer subsequently adds request correlation."
        ja: "制御対象クライアントが受信する RFC 9110 HTTP 成功応答。記録層が後で要求相関を加える。"
      format: |
        HTTP/1.1 202 Accepted
        Content-Length: 0
      source_claims: [claim-rfc9110-response]
  typical_output:
    - description:
        zh: "实体记录通过 PROV 方向指向观察远端响应后创建该记录的调用活动。"
        en: "An entity record whose provenance points, in the PROV direction, to the call activity that created the record after observing the remote response."
        ja: "PROV の方向を用いて、リモート応答の観測後に記録を作成した呼出し活動へ来歴を向ける実体記録。"
      format: |
        {"network_message_id":"resp-801","protocol":"http","message_direction":"inbound","inbound_response_id":"resp-801","status_code":202,"response_to_request_id":"req-801","recorded_by_call_id":"call-801-a1"}
      source_claims: [claim-prov-response-generation]
  reference_implementations:
    - name: RFC 9110 HTTP Semantics
      url: https://www.rfc-editor.org/rfc/rfc9110.html
      description: Defines HTTP responses and their status-code semantics in response to requests.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines entity generation by activity using prov:wasGeneratedBy.
structure:
  identity_keys: [network_message_id, inbound_response_id]
  fields:
    - id: network_message_id
      labels:
        zh: 继承的网络消息标识
        en: Inherited network message ID
        ja: 継承されたネットワークメッセージ ID
      definitions:
        zh: "此 InboundResponse 作为 NetworkMessage 的稳定标识；对同一消息记录，它与 inbound_response_id 表示同一实体。"
        en: "Stable identifier for this InboundResponse as a NetworkMessage; for the same message record it denotes the same entity as inbound_response_id."
        ja: "この InboundResponse が NetworkMessage として持つ安定した識別子。同じメッセージ記録では inbound_response_id と同じ実体を指す。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: resp-801
      allowed_values: []
      source_claims: [claim-rfc9110-response]
    - id: protocol
      labels:
        zh: 继承的消息协议
        en: Inherited message protocol
        ja: 継承されたメッセージプロトコル
      definitions:
        zh: "定义此响应消息状态或回复码语义的协议；HTTP 和 SOCKS5 响应保留相应协议值。"
        en: "Protocol defining this response message’s status or reply-code semantics; HTTP and SOCKS5 responses retain their respective values."
        ja: "この応答メッセージのステータスまたは応答コード意味論を定義するプロトコル。HTTP と SOCKS5 の応答はそれぞれの値を保持する。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: http
      allowed_values: [http, socks5]
      source_claims: [claim-rfc9110-response, claim-rfc1928-reply]
    - id: message_direction
      labels:
        zh: 继承的消息方向
        en: Inherited message direction
        ja: 継承されたメッセージ方向
      definitions:
        zh: "NetworkMessage 的方向；InboundResponse 必须固定为 inbound。"
        en: "Direction inherited from NetworkMessage; InboundResponse fixes it to inbound."
        ja: "NetworkMessage から継承する方向。InboundResponse では inbound に固定される。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: inbound
      allowed_values: [outbound, inbound]
      source_claims: [claim-rfc9110-response]
    - id: inbound_response_id
      labels:
        zh: 入站响应标识
        en: Inbound response ID
        ja: 受信応答 ID
      definitions:
        zh: "一条收到的远端响应记录的稳定标识。"
        en: "Stable identifier for one received remote-response record."
        ja: "一つの受信済みリモート応答記録の安定した識別子。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: resp-801
      allowed_values: []
      source_claims: [claim-rfc9110-response]
    - id: response_status
      labels:
        zh: 响应状态或回复码
        en: Response status or reply code
        ja: 応答ステータスまたは応答コード
      definitions:
        zh: "协议定义的结果值，例如 HTTP 状态码或 SOCKS REP。"
        en: "Protocol-defined outcome value, such as an HTTP status code or SOCKS REP."
        ja: "HTTP ステータスコードや SOCKS REP など、プロトコルが定義する結果値。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[A-Za-z0-9._-]+$'
      example_value: '202'
      allowed_values: []
      source_claims: [claim-rfc9110-response]
    - id: response_to_request_id
      labels:
        zh: 所响应的请求标识
        en: Responded-to request ID
        ja: 応答先要求 ID
      definitions:
        zh: "该响应所关联的 OutboundRequest 标识。"
        en: "OutboundRequest identifier with which this response is correlated."
        ja: "この応答が相関する OutboundRequest 識別子。"
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: req-801
      allowed_values: []
      source_claims: [claim-rfc9110-response]
  constraints:
    - id: inbound-response-correlation-and-provenance
      severity: error
      expression_language: plain
      expression: "An InboundResponse must retain one network_message_id, protocol, and message_direction inbound; network_message_id must denote the same record as inbound_response_id. It must correlate to one existing OutboundRequest and point by was_generated_by to the NetworkCall that observed the remote response and created this record; a local denial must not satisfy this constraint."
      explanation:
        zh: "该约束先保留消息身份、协议和入站方向，再保留远端结果与本地控制结果的来源边界。"
        en: "This constraint first retains message identity, protocol, and inbound direction, then retains the provenance boundary between a remote result and a local control result."
        ja: "この制約はまずメッセージ ID、プロトコル、受信方向を保持し、その上でリモート結果とローカル制御結果の来歴境界を保つ。"
      source_claims: [claim-rfc9110-response, claim-prov-response-generation]
  required_relations: []
