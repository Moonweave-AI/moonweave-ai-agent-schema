schema: moonweave.ai/ontology-node/v1
id: NetworkEndpoint
kind: concept
status: accepted
labels:
  zh: 网络端点
  en: network endpoint
  ja: network endpoint
semantics:
  short_definition:
    zh: 由协议、地址、端口与验证身份共同确定的可寻址通信实体。
    en: An addressable communication Entity determined by protocol, address, port, and verified identity.
    ja: protocol・address・port・verified identity で定まる addressable communication Entity。
  definition:
    zh: 网络端点是一种实体，以端点标识、scheme 或 transport、主机或地址、端口、信任区和身份验证证据为身份，表示通信路径可连接或转发到的具体逻辑端。它不是 URI 指向的业务资源、一次连接事件、操作系统 Socket 句柄或策略允许项。
    en: A NetworkEndpoint is an Entity identified by endpoint ID, scheme or transport, host or address, port, trust zone, and identity-verification evidence, representing a concrete logical end to which a communication path connects or forwards. It is not the business resource named by a URI, a connection event, an operating-system Socket handle, or a policy allowance.
    ja: NetworkEndpoint は endpoint ID・scheme/transport・host/address・port・trust zone・identity-verification evidence で識別する Entity で communication path が connect/forward する concrete logical end です。URI business resource・connection event・OS Socket handle・policy allowance ではありません。
  why_needed:
    zh: 端点身份将请求 authority、DNS 候选和经过 TLS 或服务身份验证的最终目标分开，使策略判断能绑定实际目的地。
    en: Endpoint identity separates requested authority, resolution candidates, and the TLS- or service-verified final target so policy decisions bind the actual destination.
    ja: endpoint identity が requested authority・resolution candidate・TLS/service-verified final target を分離し policy decision を actual destination に結びます。
  includes:
    - zh: 源站服务端点、API 网关端点、HTTP/SOCKS 代理端点，以及带验证证据的 IP/端口目标。
      en: Origin-service endpoints, API-gateway endpoints, HTTP/SOCKS proxy endpoints, and IP/port targets with verification evidence.
      ja: origin service endpoint・API gateway endpoint・HTTP/SOCKS proxy endpoint・verification evidence 付き IP/port target。
  excludes:
    - zh: 本地文件、业务资源正文、DNS 解析记录、调用事件、Socket 文件描述符和仅声明允许目的地的规则。
      en: Local files, business-resource content, DNS resolution records, call events, Socket file descriptors, and rules that merely allow a destination.
      ja: local file・business resource content・DNS resolution record・call event・Socket file descriptor・destination allow rule。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - endpoint_id
    - scheme_or_transport
  fields:
    - id: endpoint_id
      labels:
        zh: 端点标识
        en: endpoint ID
        ja: endpoint ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个逻辑通信端。
        en: Stable identifier for one logical communication end.
        ja: 一 logical communication end の stable identifier。
      allowed_values: []
      pattern: null
      example_value: endpoint-api-example-443
      source_claims:
        - claim-network-endpoint-001
        - claim-network-endpoint-002
    - id: scheme_or_transport
      labels:
        zh: scheme 或 transport
        en: scheme or transport
        ja: scheme or transport
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明解释地址和安全要求所需的协议 scheme 或传输族。
        en: States the protocol scheme or transport family needed to interpret address and security requirements.
        ja: address/security requirement 解釈に必要な protocol scheme/transport family。
      allowed_values: []
      pattern: null
      example_value: https
      source_claims:
        - claim-network-endpoint-002
        - claim-network-endpoint-003
    - id: host_or_address
      labels:
        zh: 主机或地址
        en: host or address
        ja: host or address
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录规范化主机名、IPv4、IPv6 或代理可寻址名称。
        en: Records a normalized host name, IPv4, IPv6, or proxy-addressable name.
        ja: normalized hostname・IPv4・IPv6・proxy-addressable name。
      allowed_values: []
      pattern: null
      example_value: 203.0.113.42
      source_claims:
        - claim-network-endpoint-002
        - claim-network-endpoint-003
    - id: port
      labels:
        zh: 端口
        en: port
        ja: port
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录运输或应用端点端口。
        en: Records the transport or application endpoint port.
        ja: transport/application endpoint port。
      allowed_values: []
      pattern: null
      example_value: 443
      source_claims:
        - claim-network-endpoint-002
        - claim-network-endpoint-003
    - id: trust_zone_ref
      labels:
        zh: 信任区引用
        en: trust-zone reference
        ja: trust-zone reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向拥有或承载端点的安全区域，不以网络位置自动授予信任。
        en: References the security zone owning or hosting the endpoint without granting trust from location alone.
        ja: endpoint を own/host する security zone を参照し location のみで trust を与えません。
      allowed_values: []
      pattern: null
      example_value: zone-external-api
      source_claims:
        - claim-network-endpoint-001
    - id: identity_verification_ref
      labels:
        zh: 身份验证证据引用
        en: identity-verification evidence reference
        ja: identity-verification evidence reference
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指向证书、服务身份或其他将地址绑定到预期端点的证据。
        en: References certificate, service identity, or other evidence binding the address to the intended endpoint.
        ja: address を intended endpoint に bind する certificate/service identity/evidence を参照します。
      allowed_values: []
      pattern: null
      example_value: tls-verification-884
      source_claims:
        - claim-network-endpoint-001
        - claim-network-endpoint-002
  constraints: []
  required_relation_constraints: []
