    - id: HTTPProxy-is_a-Proxy-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: SOCKS 回复不属于 HTTP
        en: SOCKS reply is not HTTP
        ja: SOCKS reply は HTTP ではない
      scenario_id: network-relation-httpproxy-is_a-proxy-boundary
      descriptions:
        zh: 代理使用 SOCKS5 方法协商、ATYP 地址和 REP 回复码，没有 HTTP 请求或状态。
        en: The proxy uses SOCKS5 method negotiation, ATYP addressing, and REP reply codes with no HTTP request or status.
        ja: proxy は SOCKS5 negotiation・ATYP・REP code を使い HTTP request/status はありません。
      field_values: {}
      related_node_ids:
        - HTTPProxy
        - Proxy
        - SOCKSProxy
      related_relation_ids:
        - HTTPProxy-is_a-Proxy
      expected_result:
        zh: 只分类为 SOCKSProxy，不建立 HTTPProxy 成员关系。
        en: Classify only as SOCKSProxy and do not assert HTTPProxy membership.
        ja: SOCKSProxy のみとし HTTPProxy membership を主張しません。
      why_valid_or_invalid:
        zh: 共享代理上位类不消除 HTTP 转发语义这一协议种差。
        en: A shared Proxy genus does not erase protocol differentia.
        ja: shared Proxy genus は protocol differentia を消しません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-http-proxy-001
        - claim-http-proxy-002
  source_claims:
