schema: moonweave.ai/ontology-node/v1
id: Proxy
kind: concept
status: accepted
labels:
  zh: 代理端点
  en: proxy endpoint
  ja: proxy endpoint
semantics:
  short_definition:
    zh: 代表客户端接收并转发通信的可寻址中介端点。
    en: An addressable intermediary endpoint that receives and forwards communication for a client.
    ja: client のため communication を receive/forward する addressable intermediary endpoint。
  definition:
    zh: 代理端点是一种 NetworkEndpoint，其种差是代表客户端接收请求、按确定的转发或隧道语义选择下一跳，并返回响应或连接结果。其身份是可连接的中介端点；实际某次经过代理的路径属于 ProxyRoute，代理配置规则属于 NetworkPolicy。
    en: A Proxy is a NetworkEndpoint distinguished by receiving a client's request, selecting a next hop under defined forwarding or tunnel semantics, and returning a response or connection result. Its identity is the addressable intermediary endpoint; an effective path through it is a ProxyRoute, while rules selecting or allowing it belong to NetworkPolicy.
    ja: Proxy は client request を受け defined forwarding/tunnel semantics で next hop を選び response/connection result を返す NetworkEndpoint です。identity は addressable intermediary endpoint で、実際の path は ProxyRoute、選択/許可 rule は NetworkPolicy です。
  why_needed:
    zh: 将代理服务器本身与一次代理路由和选择规则分开，避免同一节点同时充当实体、路径和策略。
    en: Separating the proxy server from one proxy route and its selection rule prevents one node from simultaneously acting as Entity, path, and policy.
    ja: proxy server を proxy route/selection rule から分離し一 node が Entity・path・policy を同時に担う混同を防ぎます。
  includes:
    - zh: HTTP 正向代理、HTTPS 隧道代理、SOCKS 代理和受控服务网格出口网关。
      en: HTTP forward proxies, HTTPS tunnel proxies, SOCKS proxies, and controlled service-mesh egress gateways.
      ja: HTTP forward proxy・HTTPS tunnel proxy・SOCKS proxy・controlled service-mesh egress gateway。
  excludes:
    - zh: 代理地址配置字符串、实际经过代理的调用路径、反向代理后的源站资源和业务授权决定。
      en: Proxy-address configuration strings, an actual call path through a proxy, origin resources behind a reverse proxy, and business authorization decisions.
      ja: proxy address config string・actual call path・reverse proxy 後の origin resource・business authorization decision。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - forwarding_mode
    - authentication_ref
  fields:
    - id: forwarding_mode
      labels:
        zh: 转发模式
        en: forwarding mode
        ja: forwarding mode
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明代理执行转发、网关、隧道或 UDP 关联的方式。
        en: States whether the proxy performs forwarding, gatewaying, tunneling, or UDP association.
        ja: forwarding・gateway・tunneling・UDP association mode。
      allowed_values: []
      pattern: null
      example_value: tunnel
      source_claims:
        - claim-proxy-002
        - claim-proxy-003
    - id: authentication_ref
      labels:
        zh: 代理认证引用
        en: proxy-authentication reference
        ja: proxy-authentication reference
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用客户端与代理协商或提供的认证方法和结果。
        en: References the authentication method and result negotiated or supplied between client and proxy.
        ja: client/proxy 間で negotiated/supplied された authentication method/result。
      allowed_values: []
      pattern: null
      example_value: proxy-auth-884
      source_claims:
        - claim-proxy-003
        - claim-proxy-002
    - id: policy_enforcement_ref
      labels:
        zh: 策略执行点引用
        en: policy-enforcement reference
        ja: policy-enforcement reference
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 引用代理作为执行点应用的网络策略与决定证据。
        en: References the network-policy and decision evidence applied when the proxy acts as an enforcement point.
        ja: proxy が enforcement point として適用した network policy/decision evidence。
      allowed_values: []
      pattern: null
      example_value: pep-egress-2
      source_claims:
        - claim-proxy-001
  constraints: []
  required_relation_constraints: []
