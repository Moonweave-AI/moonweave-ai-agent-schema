parent_relation:
  id: Proxy-is_a-NetworkEndpoint
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种
    en: is a
    ja: is a
  definitions:
    zh: Proxy 是 NetworkEndpoint 的子类：代理拥有 scheme、地址、端口、信任区和身份验证，并增加代表客户端接收通信、选择下一跳和转发或隧道的中介种差。实际路径仍由 ProxyRoute 表达。
    en: "Proxy is a subtype of NetworkEndpoint: it has scheme, address, port, trust zone, and identity verification, and adds the intermediary differentia of receiving communication for a client, selecting a next hop, and forwarding or tunneling. The effective path remains a ProxyRoute."
    ja: Proxy は NetworkEndpoint subtype で scheme・address・port・trust zone・identity verification に client 代理受信・next hop selection・forward/tunnel differentia を追加します。effective path は ProxyRoute です。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承描述概念包含，不使用实例关系基数。
    en: Taxonomic inheritance describes concept inclusion and does not use instance-relation cardinality.
    ja: taxonomic inheritance は concept inclusion を表し instance relation cardinality を使いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 以 代理端点 为子类
      en: has subtype 代理端点
      ja: 代理端点 を subtype に持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: Proxy-is_a-NetworkEndpoint-example-positive-manual-20260716
      kind: positive
      labels:
        zh: 可寻址出口代理
        en: Addressable egress proxy
        ja: addressable egress proxy
      scenario_id: network-relation-proxy-is_a-networkendpoint-positive
      descriptions:
        zh: proxy-egress-2 具有 HTTPS scheme、proxy.example:8443、企业代理证书和出口区身份，并接收 CONNECT 后转发到目标。
        en: proxy-egress-2 has HTTPS scheme, proxy.example:8443, enterprise-proxy certificate, and egress-zone identity, and forwards after receiving CONNECT.
        ja: proxy-egress-2 は HTTPS scheme・proxy.example:8443・enterprise proxy certificate・egress zone identity を持ち CONNECT 後 forward します。
      field_values: {}
      related_node_ids:
        - Proxy
        - NetworkEndpoint
      related_relation_ids:
        - Proxy-is_a-NetworkEndpoint
      expected_result:
        zh: 断言 Proxy is_a NetworkEndpoint。
        en: Assert Proxy is_a NetworkEndpoint.
        ja: Proxy is_a NetworkEndpoint を主張します。
      why_valid_or_invalid:
        zh: 代理先满足端点可寻址身份，再增加中介行为。
        en: The proxy first satisfies addressable endpoint identity and then adds intermediary behavior.
        ja: proxy は addressable endpoint identity を満たし intermediary behavior を追加します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-proxy-001
        - claim-proxy-002
    - id: Proxy-is_a-NetworkEndpoint-example-boundary-manual-20260716
      kind: boundary
      labels:
        zh: 代理路径不是代理实体
        en: Proxy route is not proxy Entity
        ja: proxy route は proxy Entity ではない
      scenario_id: network-relation-proxy-is_a-networkendpoint-boundary
      descriptions:
        zh: route-884 记录 proxy-egress-2→endpoint-api-example-443 的有序路径、选择时间和结果，但自身没有服务地址或证书身份。
        en: route-884 records an ordered proxy-egress-2 to endpoint-api-example-443 path, selection time, and result but has no service address or certificate identity of its own.
        ja: route-884 は ordered path・selection time・result を記録しますが自身の service address/certificate identity はありません。
      field_values: {}
      related_node_ids:
        - Proxy
        - NetworkEndpoint
        - ProxyRoute
      related_relation_ids:
        - Proxy-is_a-NetworkEndpoint
      expected_result:
        zh: 不得把 ProxyRoute 分类为 Proxy。
        en: Do not classify ProxyRoute as Proxy.
        ja: ProxyRoute を Proxy と分類しません。
      why_valid_or_invalid:
        zh: 路径信息和中介实体具有不同同一性条件。
        en: Route information and intermediary Entity have different identity conditions.
        ja: route information と intermediary Entity は identity condition が異なります。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-proxy-002
  source_claims:
    - claim-proxy-001
    - claim-proxy-002
    - claim-proxy-003
  distinct_fact_rationale:
    zh: Proxy 满足 NetworkEndpoint 的全部身份条件并增加不可替换的种差。
    en: Proxy satisfies every identity condition of NetworkEndpoint and adds a non-substitutable differentia.
    ja: Proxy は NetworkEndpoint の全 identity condition を満たし non-substitutable differentia を追加します。
