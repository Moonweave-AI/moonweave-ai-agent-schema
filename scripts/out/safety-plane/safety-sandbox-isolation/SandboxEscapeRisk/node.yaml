schema: moonweave.ai/ontology-node/v1
id: SandboxEscapeRisk
kind: concept
status: accepted
labels:
  zh: 沙箱逃逸风险
  en: Sandbox Escape Risk
  ja: サンドボックス脱出リスク
semantics:
  short_definition:
    zh: 记录可能使实时环境突破预期隔离契约的配置或运行条件，而非已经发生的逃逸证明。
    en: A record of a configuration or runtime condition that could exceed an intended containment contract, not proof that an escape occurred.
    ja: 意図した containment contract を超え得る configuration または runtime condition の record。escape が起きた証明ではない。
  definition:
    zh: SandboxEscapeRisk 是独立的本地风险 finding，记录某个 IsolationSpecification 或可选的 Sandbox 可能因不可信 extra path grant、路径逃逸、可写主机挂载、特权模式、能力扩张或共享主机命名空间而失去预期限制。它引用具体证据并区分识别、阻断和缓解状态；它不是 Sandbox 的组成部分、不是已确认的主机入侵、不是提示注入检测本身，也不授权或执行任何修复动作。
    en: SandboxEscapeRisk is an independent local risk finding that records how an IsolationSpecification or optional Sandbox could lose intended limits through an untrusted extra path grant, path escape, writable host mount, privileged mode, capability expansion, or shared host namespace. It cites concrete evidence and distinguishes identified, blocked, and mitigated states; it is not a component of Sandbox, a confirmed host compromise, prompt-injection detection itself, or authorization to perform remediation.
    ja: SandboxEscapeRisk は独立した local risk finding であり、untrusted extra path grant、path escape、writable host mount、privileged mode、capability expansion、shared host namespace により IsolationSpecification または任意の Sandbox が意図した limit を失い得る方法を記録する。具体的な evidence を参照し、identified、blocked、mitigated state を区別する。Sandbox の構成要素、確認済み host compromise、prompt-injection detection 自体、remediation を行う authorization ではない。
  why_needed:
    zh: 逃逸风险经常来自“看起来很小”的配置变化：一个额外主机路径、一个可写绑定挂载、privileged 容器或 hostPID。单独记录风险能把应拒绝或缓解的条件留给审计，而不会把尚未执行的提议夸大成已经发生的安全事件。
    en: "Escape risk often comes from a configuration change that looks small: one extra host path, a writable bind mount, a privileged container, or hostPID. Recording risk separately keeps reject-or-mitigate conditions auditable without overstating an unexecuted proposal as a security incident."
    ja: escape risk は一見小さな configuration change から生じることがある。一つの extra host path、writable bind mount、privileged container、hostPID である。risk を別に記録することで、未実行の proposal を security incident と誇張せず、reject-or-mitigate condition を監査可能に保つ。
  includes:
    - zh: 风险向量、受影响的契约或环境引用、具体来源证据和处理状态。
      en: Risk vector, affected contract or environment references, concrete source evidence, and disposition.
      ja: risk vector、affected contract または environment reference、具体的な source evidence、disposition。
    - zh: 对未执行配置提议、特权运行时、主机命名空间或过宽挂载的风险判断。
      en: Risk judgments for unexecuted configuration proposals, privileged runtime, host namespaces, or overbroad mounts.
      ja: 未実行 configuration proposal、privileged runtime、host namespace、overbroad mount に関する risk judgment。
  excludes:
    - zh: 已证实的漏洞利用、主机入侵取证、实际密钥泄露或事件响应执行。
      en: Proven exploitation, host-compromise forensics, actual secret disclosure, or incident-response execution.
      ja: 証明された exploitation、host-compromise forensics、実際の secret disclosure、incident-response execution。
    - zh: 单独的恶意指令内容、用户授权、网络出口决定和工具审批。
      en: Malicious instruction content by itself, user authorization, network-egress decisions, and tool approval.
      ja: 単独の malicious instruction content、user authorization、network-egress decision、tool approval。
  semantic_kind: risk
  aliases: [containment-escape-risk, sandbox-misconfiguration-risk]
engineering:
  explanation:
    zh: 风险评估始于实际配置引用，而非模型建议。OpenAI 要求含 extra_path_grants 的 Manifest 视为可信配置；OCI 可通过 capabilities、noNewPrivileges 和 mounts 表达进程/文件面；Docker 警告 --privileged 不构成安全沙箱；Kubernetes Restricted 标准禁止共享 hostNetwork/hostPID/hostIPC 与 privileged 容器。将条件记录为 finding，并只在有独立事件证据时转交给事件/取证边界。
    en: Risk assessment begins with actual configuration references, not a model suggestion. OpenAI requires Manifests containing extra_path_grants to be trusted configuration; OCI expresses process and filesystem surfaces through capabilities, noNewPrivileges, and mounts; Docker warns that --privileged is not a secure sandbox; Kubernetes Restricted standards disallow shared hostNetwork/hostPID/hostIPC and privileged containers. Record the condition as a finding and hand it to incident or forensic boundaries only when independent incident evidence exists.
    ja: risk assessment は model suggestion ではなく実際の configuration reference から始める。OpenAI は extra_path_grants を含む Manifest を trusted configuration として扱うことを要求する。OCI は capabilities、noNewPrivileges、mounts で process と filesystem surface を表し、Docker は --privileged が secure sandbox ではないと警告する。Kubernetes Restricted standard は shared hostNetwork/hostPID/hostIPC と privileged container を禁止する。condition を finding として記録し、独立した incident evidence がある場合だけ incident または forensic boundary に渡す。
  typical_input:
    - description:
        zh: 来自不可信内容的额外路径提议
        en: Extra-path proposal from untrusted content
        ja: untrusted content からの extra-path proposal
      format: |-
        {"proposed_extra_path_grant":"/host/secrets","origin":"retrieved_content","manifest_ref":"openai:manifest/proposal-17"}
      source_claims: [claim-risk-openai-trusted-grant]
    - description:
        zh: 特权 Docker 运行配置
        en: Privileged Docker run configuration
        ja: privileged Docker run configuration
      format: |-
        docker run --privileged example-image
      source_claims: [claim-risk-docker-privileged]
  typical_output:
    - description:
        zh: 未执行的逃逸风险 finding
        en: Unexecuted escape-risk finding
        ja: unexecuted escape-risk finding
      format: |-
        {"schema_owner":"moonweave-local-design","record_kind":"sandbox_escape_risk","escape_risk_id":"risk-17","risk_vector":"untrusted_extra_path_grant","affected_isolation_spec_ref":"iso:17","evidence_source_refs":["openai:manifest/proposal-17"],"risk_disposition":"blocked"}
      source_claims: [claim-risk-local-finding]
  reference_implementations:
    - name: OpenAI Agents SDK Sandbox concepts
      url: https://openai.github.io/openai-agents-python/sandbox/guide/
      description: States that extra_path_grants are trusted configuration and Manifest entries remain workspace-contained.
    - name: OCI Runtime Specification configuration
      url: https://github.com/opencontainers/runtime-spec/blob/main/config.md
      description: Defines root/mount and process capability/noNewPrivileges controls.
    - name: Docker container run reference
      url: https://docs.docker.com/reference/cli/docker/container/run/
      description: Warns that privileged containers are not securely sandboxed and documents mount exposure.
    - name: Kubernetes Pod Security Standards
      url: https://kubernetes.io/docs/concepts/security/pod-security-standards/
      description: Requires host namespace sharing and privileged containers to be disallowed under Restricted controls.
structure:
  identity_keys: [escape_risk_id]
  fields:
    - id: escape_risk_id
      labels: {zh: 逃逸风险标识, en: Escape-risk ID, ja: escape-risk ID}
      definitions:
        zh: 稳定标识一项本地风险 finding；它不是漏洞编号、Docker container ID 或安全事件编号。
        en: Stably identifies one local risk finding; it is not a vulnerability identifier, Docker container ID, or security-incident number.
        ja: 一つの local risk finding を安定して識別する。vulnerability identifier、Docker container ID、security-incident number ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: ^[a-z0-9-]+$
      example_value: risk-17
      source_claims: [claim-risk-local-finding]
    - id: risk_vector
      labels: {zh: 风险向量, en: Risk vector, ja: risk vector}
      definitions:
        zh: 分类可能扩大隔离范围的具体机制；该分类不是实际利用成功的声明。
        en: Classifies the specific mechanism that may widen containment; this classification is not a claim of successful exploitation.
        ja: containment を広げ得る具体的な mechanism を分類する。この分類は exploitation 成功の主張ではない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [untrusted_extra_path_grant, path_escape, writable_host_mount, privileged_runtime, capability_expansion, shared_host_namespace]
      pattern: null
      example_value: untrusted_extra_path_grant
      source_claims: [claim-risk-openai-trusted-grant, claim-risk-oci-controls, claim-risk-docker-privileged, claim-risk-kubernetes-host-isolation]
    - id: affected_isolation_spec_ref
      labels: {zh: 受影响隔离规范引用, en: Affected isolation-specification reference, ja: affected isolation specification 参照}
      definitions:
        zh: 指向此风险可能违反的静态 containment contract；即使尚未创建 live Sandbox 也必须提供该契约上下文。
        en: Points to the static containment contract the risk may violate; this contract context is required even when no live Sandbox has been created yet.
        ja: risk が違反し得る静的 containment contract を指す。live Sandbox がまだ作成されていない場合でもこの contract context が必要である。
      datatype: reference
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: iso:17
      source_claims: [claim-risk-local-finding]
    - id: affected_sandbox_ref
      labels: {zh: 受影响沙箱引用, en: Affected Sandbox reference, ja: affected Sandbox 参照}
      definitions:
        zh: 可选地指向已经存在的 live Sandbox；对被阻断的创建前提议可为空，不能为了填充字段虚构会话。
        en: Optionally points to an existing live Sandbox; it may be absent for a blocked pre-creation proposal, and a session must not be invented merely to fill the field.
        ja: 既存の live Sandbox を任意で指す。blocked pre-creation proposal では存在しなくてよく、field を埋めるために session を捏造してはならない。
      datatype: reference
      required: false
      cardinality: {min: 0, max: 1}
      pattern: null
      example_value: sandbox:17
      source_claims: [claim-risk-local-finding]
    - id: evidence_source_refs
      labels: {zh: 风险证据来源引用, en: Risk-evidence source references, ja: risk-evidence source 参照}
      definitions:
        zh: 指向实际 Manifest 提议、OCI config、Docker run 参数或 Kubernetes Pod spec 字段；风险不得只凭名称、模型文本或猜测生成。
        en: Points to an actual Manifest proposal, OCI config, Docker run argument, or Kubernetes Pod-spec field; a risk must not be created from a name, model text, or guess alone.
        ja: 実際の Manifest proposal、OCI config、Docker run argument、Kubernetes Pod-spec field を指す。risk を name、model text、guess だけから作ってはならない。
      datatype: reference
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: docker:run/17#privileged
      source_claims: [claim-risk-openai-trusted-grant, claim-risk-oci-controls, claim-risk-docker-privileged, claim-risk-kubernetes-host-isolation]
    - id: risk_disposition
      labels: {zh: 风险处置状态, en: Risk disposition, ja: risk disposition}
      definitions:
        zh: 表示条件已被识别、在应用前阻断或以具体限制缓解；不表示主机已被攻破或事件已关闭。
        en: States whether the condition was identified, blocked before application, or mitigated with a specific limit; it does not state that a host was compromised or an incident is closed.
        ja: condition が identified されたか、適用前に blocked されたか、具体的な limit で mitigated されたかを示す。host が compromise された、または incident が closed されたことを示さない。
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      allowed_values: [identified, blocked, mitigated]
      pattern: null
      example_value: blocked
      source_claims: [claim-risk-local-finding]
  constraints:
    - id: escape-risk-needs-concrete-containment-evidence
      severity: error
      language: plain
      expression: Every SandboxEscapeRisk must retain affected_isolation_spec_ref and evidence_source_refs that identify the risky path grant, mount, privilege, capability, or host-namespace setting; a sandbox name or model suggestion alone is insufficient.
      explanation:
        zh: 风险判断必须能回溯到真实配置和受影响契约，避免将泛化恐惧当作技术证据。
        en: Risk judgment must trace back to actual configuration and the affected contract, rather than treating a generic fear as technical evidence.
        ja: risk judgment は実際の configuration と affected contract に遡れなければならず、一般的な不安を technical evidence として扱わない。
      source_claims: [claim-risk-openai-trusted-grant, claim-risk-oci-controls, claim-risk-docker-privileged, claim-risk-kubernetes-host-isolation, claim-risk-local-finding]
    - id: escape-risk-is-not-breach-proof
      severity: error
      language: plain
      expression: risk_disposition identified, blocked, or mitigated must not assert host_compromise, data_exfiltration_confirmed, escape_executed, or incident_closed; an actual incident requires separate execution and forensic evidence.
      explanation:
        zh: 该概念表达可能突破边界的条件，不表达已经发生的突破或其业务影响。
        en: This concept expresses a condition that may exceed a boundary, not a breach that has happened or its business impact.
        ja: この concept は boundary を超え得る condition を表し、起きた breach またはその business impact を表さない。
      source_claims: [claim-risk-local-finding]
    - id: escape-risk-does-not-authorize-remediation
      severity: error
      language: plain
      expression: SandboxEscapeRisk must not contain approval_granted, credential, user_authorization, network_destination, tool_call, or tool_result fields; blocking or remediation must be represented by the owning policy or execution boundary.
      explanation:
        zh: 风险 finding 是证据，不是权限令牌或执行命令。
        en: A risk finding is evidence, not a permission token or execution command.
        ja: risk finding は evidence であり、permission token または execution command ではない。
      source_claims: [claim-risk-local-finding]
  required_relations: [SandboxEscapeRisk-may_violate-IsolationSpecification]
