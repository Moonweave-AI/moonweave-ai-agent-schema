relations:
  - id: SandboxEscapeRisk-may_violate-IsolationSpecification
    predicate: may_violate
    target: concept:IsolationSpecification
    direction: source-to-target
    relation_kind: association
    labels: {zh: 可能违反隔离规范, en: may violate isolation specification, ja: isolation specification に違反し得る}
    definitions:
      zh: SandboxEscapeRisk 与它可能突破的静态 IsolationSpecification 关联；关联表达潜在不满足，而不是已经发生的逃逸或关系组成。
      en: SandboxEscapeRisk associates with the static IsolationSpecification it may exceed; the association expresses potential nonconformance, not an escape that occurred or a composition relationship.
      ja: SandboxEscapeRisk は突破し得る静的 IsolationSpecification と association を持つ。association は potential nonconformance を表し、発生した escape または composition relationship を表さない。
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: has_potential_escape_risk
      labels: {zh: 存在潜在逃逸风险, en: has potential escape risk, ja: potential escape risk を持つ}
    conditions:
      - id: escape-risk-contract-condition
        severity: error
        expression: Assert may_violate only when affected_isolation_spec_ref and evidence_source_refs identify a concrete condition that conflicts with the contract's filesystem or process limits.
        explanations: {zh: 风险必须有明确契约和配置证据，不能从抽象担忧或一般恶意内容直接推断。, en: Risk requires a concrete contract and configuration evidence and cannot be inferred directly from an abstract concern or generic malicious content., ja: risk には具体的な contract と configuration evidence が必要であり、抽象的な懸念または一般的な malicious content から直接推論できない。}
        source_claims: [claim-risk-local-finding]
    temporal_scope: valid-time
    boundary_context: This association records possible containment nonconformance; confirmed compromise belongs to a separate incident or forensic model.
    constraints: []
    examples: []
    source_claims: [claim-risk-local-finding]
    distinct_fact_rationale:
      zh: 关联保留风险 finding 与静态契约的不同身份，避免把风险误建模成规范或 Sandbox 的组成部分。
      en: The association preserves distinct identities for risk finding and static contract, avoiding a false composition into the specification or Sandbox.
      ja: association は risk finding と static contract の異なる identity を保持し、specification または Sandbox への偽の composition を避ける。
    layout_role: cross-link
  - id: SandboxEscapeRisk-may_affect-Sandbox
    predicate: may_affect
    target: concept:Sandbox
    direction: source-to-target
    relation_kind: association
    labels: {zh: 可能影响沙箱环境, en: may affect Sandbox, ja: Sandbox に影響し得る}
    definitions:
      zh: 当风险已有 affected_sandbox_ref 时，SandboxEscapeRisk 可关联到该 live Sandbox；对创建前被阻断的提议，此关联可以不存在。
      en: When a risk has affected_sandbox_ref, SandboxEscapeRisk may associate with that live Sandbox; the association can be absent for a proposal blocked before creation.
      ja: risk が affected_sandbox_ref を持つとき、SandboxEscapeRisk はその live Sandbox と association を持ち得る。作成前に block された proposal では association は存在しなくてよい。
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: null}}
    cardinality_not_applicable_reason: null
    inverse_reading:
      predicate: may_be_affected_by
      labels: {zh: 可能受风险影响, en: may be affected by risk, ja: risk の影響を受け得る}
    conditions:
      - id: escape-risk-live-sandbox-condition
        severity: error
        expression: Assert may_affect only when affected_sandbox_ref identifies an existing live Sandbox and evidence_source_refs refer to its effective configuration.
        explanations: {zh: 尚未创建的环境只能关联到契约，不能伪造 live session 以建立风险边。, en: A not-yet-created environment can associate only with the contract; do not fabricate a live session to create a risk edge., ja: まだ作成されていない environment は contract とだけ association を持てる。risk edge を作るために live session を捏造しない。}
        source_claims: [claim-risk-local-finding]
    temporal_scope: valid-time
    boundary_context: This association is optional and never proves that the live Sandbox escaped containment.
    constraints: []
    examples: []
    source_claims: [claim-risk-local-finding]
    distinct_fact_rationale:
      zh: 可选关联把实际环境与潜在风险相连，同时保留“风险并非已发生逃逸”的语义。
      en: The optional association links a live environment to potential risk while retaining the meaning that risk is not an executed escape.
      ja: optional association は live environment と potential risk を結び、risk が実行済み escape ではないという意味を保持する。
    layout_role: cross-link
sources:
  - id: moonweave-ontology-design
    title: Moonweave ontology profile design
    publisher: Moonweave
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema
    accessed_on: 2026-07-19
    source_type: design-inference
    relevance: Defines the project-local risk-finding record, its evidence requirements, and its separation from confirmed incidents and remediation actions.
  - id: openai-agents-sdk-sandbox-guide
    title: OpenAI Agents SDK — Sandbox concepts
    url: https://openai.github.io/openai-agents-python/sandbox/guide/
    source_type: official-doc
    relevance: Defines trusted extra_path_grants and workspace-contained Manifest entries.
  - id: oci-runtime-spec-config
    title: OCI Runtime Specification — configuration
    url: https://github.com/opencontainers/runtime-spec/blob/main/config.md
    source_type: official-spec
    relevance: Defines root/mount fields and process capabilities/noNewPrivileges controls that can evidence containment widening.
  - id: docker-container-run-reference
    title: Docker Docs — docker container run
    url: https://docs.docker.com/reference/cli/docker/container/run/
    source_type: official-doc
    relevance: Warns that --privileged is not securely sandboxed and documents mount exposure.
  - id: kubernetes-pod-security-standards
    title: Kubernetes — Pod Security Standards
    url: https://kubernetes.io/docs/concepts/security/pod-security-standards/
    source_type: official-doc
    relevance: Requires Restricted workloads to disallow host namespace sharing and privileged containers.
source_claims:
  - id: claim-risk-openai-trusted-grant
    source: openai-agents-sdk-sandbox-guide
    supports: Manifest entry paths are workspace-relative and cannot escape with `..`; a Manifest containing extra_path_grants is trusted configuration that must not be loaded from untrusted payloads without application approval.
    locator: Concepts — Manifest and extra_path_grants
    evidence_kind: official-doc
    confidence: high
  - id: claim-risk-oci-controls
    source: oci-runtime-spec-config
    supports: OCI separates root and mount configuration and supports process capabilities and noNewPrivileges, providing native evidence for filesystem or process containment changes.
    locator: Configuration — Root, Mounts, and Linux process
    evidence_kind: normative
    confidence: high
  - id: claim-risk-docker-privileged
    source: docker-container-run-reference
    supports: Docker states that --privileged enables broad host-facing privileges and a privileged container is not a securely sandboxed process.
    locator: docker container run — Escalate container privileges (--privileged)
    evidence_kind: official-doc
    confidence: high
  - id: claim-risk-kubernetes-host-isolation
    source: kubernetes-pod-security-standards
    supports: Kubernetes Restricted standards require hostNetwork, hostPID, and hostIPC sharing to be disallowed and require privileged containers to be disallowed.
    locator: Pod Security Standards — Host Namespaces and Privileged Containers
    evidence_kind: official-doc
    confidence: high
  - id: claim-risk-local-finding
    source: moonweave-ontology-design
    supports: escape_risk_id, vector classification, affected-contract and optional live-sandbox references, disposition, and separation from confirmed incident evidence are Moonweave-local risk-modeling inferences.
    locator: ontology/safety-plane/safety-sandbox-isolation/SandboxEscapeRisk/node.yaml — local risk-finding model
    evidence_kind: design-inference
    confidence: high
