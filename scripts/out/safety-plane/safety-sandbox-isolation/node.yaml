source_claims:
  - id: claim-module-openai-manifest
    source: openai-agents-sdk-sandbox-guide
    supports: An OpenAI Manifest describes a fresh sandbox-session workspace, its entries are workspace-relative, and extra_path_grants are trusted configuration that must not be loaded from untrusted payloads without approval.
    locator: Concepts — Manifest and extra_path_grants
    evidence_kind: official-doc
    confidence: high
  - id: claim-module-oci-config
    source: oci-runtime-spec-config
    supports: OCI runtime configuration separately defines root filesystem, mounts, and process configuration, including process rlimits, Linux capabilities, and noNewPrivileges.
    locator: Configuration — Root, Mounts, and Process
    evidence_kind: normative
    confidence: high
  - id: claim-module-docker-runtime
    source: docker-container-run-reference
    supports: Docker documents read-only root filesystems, mount options, PID namespace behavior, capability controls, and warns that privileged containers are not securely sandboxed processes.
    locator: docker container run — read-only filesystem, PID settings, and runtime privilege and Linux capabilities
    evidence_kind: official-doc
    confidence: high
  - id: claim-module-kubernetes-security
    source: kubernetes-security-context
    supports: Kubernetes security context controls privilege and access settings including Linux capabilities, allowPrivilegeEscalation, and readOnlyRootFilesystem.
    locator: Configure a Security Context — security context settings
    evidence_kind: official-doc
    confidence: high
  - id: claim-module-kubernetes-host-isolation
    source: kubernetes-pod-security-standards
    supports: Kubernetes Restricted standards require hostNetwork, hostPID, and hostIPC sharing to be disallowed and require privileged containers to be disallowed.
    locator: Pod Security Standards — Host Namespaces and Privileged Containers
    evidence_kind: official-doc
    confidence: high
  - id: claim-module-local-boundary
    source: moonweave-ontology-design
    supports: Local isolation specifications, sandbox records, filesystem and process policies, and escape-risk findings are Moonweave design inferences that retain native runtime objects and keep authorization, network policy, and execution separate.
    locator: ontology/safety-plane/safety-sandbox-isolation/node.yaml — module boundary and record provenance
    evidence_kind: design-inference
    confidence: high
