source_claims:
  - id: claim-filesystem-openai-paths
    source: openai-agents-sdk-sandbox-guide
    supports: Manifest entry paths are workspace-relative and cannot be absolute or escape with `..`; extra_path_grants are trusted configuration, apply to specified runtime access, and are not durable workspace state.
    locator: Concepts — Manifest and extra_path_grants
    evidence_kind: official-doc
    confidence: high
  - id: claim-filesystem-oci-root-mount
    source: oci-runtime-spec-config
    supports: OCI root.readonly controls the root filesystem while mounts are declared separately with their own destinations and options.
    locator: Configuration — Root and Mounts
    evidence_kind: normative
    confidence: high
  - id: claim-filesystem-docker-readonly-root
    source: docker-container-run-reference
    supports: Docker --read-only mounts the container root filesystem read-only but permits writes through specified volumes or mounts.
    locator: docker container run — Mount volume read-only (--read-only)
    evidence_kind: official-doc
    confidence: high
  - id: claim-filesystem-kubernetes-root
    source: kubernetes-security-context
    supports: Kubernetes readOnlyRootFilesystem mounts the container root filesystem as read-only.
    locator: Configure a Security Context — security context settings
    evidence_kind: official-doc
    confidence: high
  - id: claim-filesystem-local-projection
    source: moonweave-ontology-design
    supports: filesystem_policy_id, workspace_path_rules, source references, and the distinction between static policy and live file activity are Moonweave-local design inferences that retain native root and mount semantics.
    locator: ontology/safety-plane/safety-sandbox-isolation/IsolationSpecification/FilesystemPolicy/node.yaml — local policy projection
    evidence_kind: design-inference
