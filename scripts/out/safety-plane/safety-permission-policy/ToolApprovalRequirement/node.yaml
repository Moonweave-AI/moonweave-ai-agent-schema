  - id: ToolApprovalRequirement-real-instance-4
    kind: instance
    labels: {zh: "ToolApprovalRequirement instance case", en: "ToolApprovalRequirement instance case", ja: "ToolApprovalRequirement instance case"}
    descriptions: {zh: "Amazon Cedar 评估 principal-action-resource-context 请求并返回 Allow 或 Deny 及诊断信息。", en: "Amazon Cedar evaluates principal-action-resource-context requests and returns Allow or Deny with diagnostics (docs.cedarpolicy.com/auth/authorization.html).", ja: "Amazon Cedar は principal-action-resource-context 要求を評価し Allow/Deny と diagnostics を返す。"}
    field_values:
      needs_approval: true
      required_evidence_kind: human-approval
      source_runtime: OpenAI-Agents-SDK
      tool_approval_requirement_id: tool-approval-requirement-1
