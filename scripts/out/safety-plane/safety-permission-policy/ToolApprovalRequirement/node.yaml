schema: moonweave.ai/ontology-node/v1
id: ToolApprovalRequirement
kind: concept
status: accepted
labels: {zh: 工具审批需求, en: Tool Approval Requirement, ja: ツール承認要件}
semantics:
  short_definition: {zh: "附着于一个 ToolDefinition 的 Moonweave 本地静态配置 profile，声明该工具调用前需要哪些控制证据。", en: "A Moonweave-local static configuration profile attached to one ToolDefinition that declares which control evidence is required before calls to that tool.", ja: "一つの ToolDefinition に付属し、そのツール呼出前に必要な制御証拠を宣言する Moonweave ローカル静的設定 profile。"}
  definition: {zh: "ToolApprovalRequirement 是静态工具配置：它以 needs_approval 声明逐调用人工审批需求，并列出其他所需的策略、凭证和安全证据种类。它不是 OpenAI Agents SDK 的 RunToolApprovalItem、一次待决调用、批准/拒绝决定、运行时 gate 状态或工具执行。", en: "ToolApprovalRequirement is static tool configuration: it declares a per-call human-approval requirement with needs_approval and lists other required policy, credential, and safety evidence kinds. It is not an OpenAI Agents SDK RunToolApprovalItem, one pending call, an approve-or-reject decision, runtime gate state, or tool execution.", ja: "ToolApprovalRequirement は静的ツール設定である。needs_approval により呼出単位の人の承認要件を宣言し、必要なポリシー、credential、安全証拠種別を列挙する。OpenAI Agents SDK の RunToolApprovalItem、一つの保留呼出、approve/reject 判断、ランタイム gate 状態、ツール実行ではない。"}
  why_needed: {zh: "将静态需求与运行时中断分离，可避免把 SDK 的单次批准项、授权凭证或安全检查错误地合成为一个含糊 gate。", en: "Separating static requirements from runtime interruptions prevents a single SDK approval item, credential, or safety check from being incorrectly merged into an ambiguous gate.", ja: "静的要件をランタイム中断から分離することで、SDK の一回の承認項目、credential、安全検査を曖昧な gate に誤って統合することを防ぐ。"}
  includes: [{zh: "工具定义引用、needs_approval 标志、来源运行时和所需证据种类。", en: "Tool-definition reference, needs_approval flag, source runtime, and required evidence kinds.", ja: "ツール定義参照、needs_approval フラグ、source runtime、必要証拠種別。"}]
  excludes: [{zh: "具体 tool call ID、参数摘要、审批者、批准时间、运行状态或执行后的效果。", en: "A concrete tool-call ID, argument digest, approver, approval time, runtime state, or post-execution effect.", ja: "具体的 tool-call ID、引数 digest、承認者、承認時刻、ランタイム状態、実行後 effect。"}]
  semantic_kind: local-profile
  aliases: [needs-approval-requirement, static-tool-control-requirement]
engineering:
  explanation: {zh: "当 source_runtime 为 OpenAI-Agents-SDK 时，本地配置将 needs_approval 映射到 SDK 的 needsApproval 工具选项；SDK 之后才可能产生 RunToolApprovalItem。执行前适配器检查此 profile 所列证据种类，但每项运行时证据保持为独立记录，不能写入该静态 profile。", en: "When source_runtime is OpenAI-Agents-SDK, local configuration maps needs_approval to the SDK's needsApproval tool option; only later may the SDK produce a RunToolApprovalItem. A pre-execution adapter checks the evidence kinds listed by this profile, while each runtime evidence record remains separate and cannot be written into this static profile.", ja: "source_runtime が OpenAI-Agents-SDK の場合、ローカル設定は needs_approval を SDK の needsApproval ツールオプションへ対応付ける。その後にのみ SDK が RunToolApprovalItem を生成し得る。実行前 adapter はこの profile が列挙した証拠種別を検査するが、各ランタイム証拠記録は独立したままであり、この静的 profile に書き込めない。"}
  typical_input:
    - description: {zh: "一个声明需要逐调用审批的 Agents SDK 工具定义。", en: "An Agents SDK tool definition declared to require per-call approval.", ja: "呼出単位の承認を必要とすると宣言された Agents SDK ツール定義。"}
      format: '{"tool_definition_id":"deploy-tool","source_runtime":"OpenAI-Agents-SDK","needs_approval":true,"required_evidence_kind":["policy-decision","authorization-credential","human-approval","pre-execution-safety-check"]}'
      source_claims: [claim-openai-needs-approval, claim-local-tool-approval-requirement]
  typical_output:
    - description: {zh: "本地静态审批需求 profile。", en: "A local static approval-requirement profile.", ja: "ローカル静的承認要件 profile。"}
      format: '{"tool_approval_requirement_id":"tool-approval-requirement-1","tool_definition_id":"deploy-tool","source_runtime":"OpenAI-Agents-SDK","needs_approval":true,"required_evidence_kind":["policy-decision","authorization-credential","human-approval","pre-execution-safety-check"]}'
      source_claims: [claim-local-tool-approval-requirement]
  reference_implementations:
    - name: OpenAI Agents SDK Human-in-the-loop
      url: https://openai.github.io/openai-agents-js/guides/human-in-the-loop/
      description: Documents the needsApproval tool option, a pending approval interruption, and approve-or-reject resumption.
    - name: Cedar authorization guide
      url: https://docs.cedarpolicy.com/auth/authorization.html
      description: Documents allow-or-deny policy responses used as an independent evidence category.
    - name: Model Context Protocol Authorization
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/authorization
      description: Documents scope- and resource-bound authorization for MCP HTTP transports.
structure:
  identity_keys: [tool_approval_requirement_id, tool_definition_id]
  fields:
    - id: tool_approval_requirement_id
      labels: {zh: 工具审批需求标识符, en: Tool approval requirement ID, ja: ツール承認要件 ID}
      definitions: {zh: "一项静态本地工具审批需求 profile 的稳定标识符。", en: "Stable identifier for one static local tool-approval requirement profile.", ja: "一つの静的ローカルツール承認要件 profile の安定識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: tool-approval-requirement-1
      allowed_values: []
      source_claims: [claim-local-tool-approval-requirement]
    - id: tool_definition_id
      labels: {zh: 工具定义标识符, en: Tool definition ID, ja: ツール定義 ID}
      definitions: {zh: "此静态需求适用的一个 ToolDefinition profile 标识符。", en: "Identifier of the one ToolDefinition profile to which this static requirement applies.", ja: "この静的要件が適用される一つの ToolDefinition profile の識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: deploy-tool
      allowed_values: []
      source_claims: [claim-local-tool-approval-requirement]
    - id: source_runtime
      labels: {zh: 来源运行时, en: Source runtime, ja: ソース runtime}
      definitions: {zh: "拥有工具审批配置语义的具体运行时表面。", en: "Concrete runtime surface owning the tool-approval configuration semantics.", ja: "ツール承認設定意味論を所有する具体的 runtime surface。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: OpenAI-Agents-SDK
      allowed_values: [OpenAI-Agents-SDK, Moonweave-local]
      source_claims: [claim-openai-needs-approval, claim-local-tool-approval-requirement]
    - id: needs_approval
      labels: {zh: 需要审批, en: Needs approval, ja: 承認が必要}
      definitions: {zh: "声明该工具的每次符合条件调用应先进入审批流程；在 Agents SDK 表面映射到 needsApproval 选项。", en: "Declares that each qualifying call to the tool must first enter an approval flow; on the Agents SDK surface it maps to the needsApproval option.", ja: "このツールへの各対象呼出が最初に承認フローへ入ることを宣言する。Agents SDK surface では needsApproval オプションへ対応付ける。"}
      datatype: boolean
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: true
      allowed_values: [true]
      source_claims: [claim-openai-needs-approval, claim-local-tool-approval-requirement]
    - id: required_evidence_kind
      labels: {zh: 所需证据种类, en: Required evidence kind, ja: 必要証拠種別}
      definitions: {zh: "调用可被本地适配器释放前必须分别验证的证据类别；这些类别不是嵌入此静态 profile 的运行时值。", en: "Evidence categories a local adapter must verify separately before a call may be released; these categories are not runtime values embedded in this static profile.", ja: "呼出をローカル adapter が解放する前に個別に検証しなければならない証拠カテゴリ。これらはこの静的 profile に埋め込まれたランタイム値ではない。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: human-approval
      allowed_values: [policy-decision, authorization-credential, human-approval, pre-execution-safety-check]
      source_claims: [claim-local-tool-approval-requirement]
  constraints:
    - id: tool-approval-requirement-is-static
      severity: error
      expression_language: plain
      expression: A ToolApprovalRequirement must identify one ToolDefinition, source_runtime, needs_approval true, and one or more required_evidence_kind values; it must not contain a pending call ID, approval outcome, runtime gate state, credential instance, safety-check instance, or execution effect.
      explanation: {zh: "静态工具要求只声明所需控制；每次中断、批准、凭证验证和安全检查均是独立运行时事实。", en: "Static tool requirements declare controls only; each interruption, approval, credential validation, and safety check is a separate runtime fact.", ja: "静的ツール要件は制御だけを宣言する。各中断、承認、credential 検証、安全検査は独立したランタイム事実である。"}
      source_claims: [claim-openai-needs-approval, claim-local-tool-approval-requirement]
  required_relations: []
examples:
  
- id: tool-approval-requirement-positive-deploy
    kind: positive
    labels: {zh: 部署工具静态审批需求, en: Deploy-tool static approval requirement, ja: deploy ツール静的承認要件}
    descriptions: {zh: "OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。", en: "OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/).", ja: "OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。"}
    field_values: {tool_approval_requirement_id: tool-approval-requirement-1, tool_definition_id: deploy-tool, source_runtime: OpenAI-Agents-SDK, needs_approval: true, required_evidence_kind: [policy-decision, authorization-credential, human-approval, pre-execution-safety-check]}
    related_node_ids: [ToolDefinition, PolicyDecision, AuthorizationCredential, HumanApproval, PreExecutionSafetyCheck]
    related_relation_ids: [ToolApprovalRequirement-applies_to-ToolDefinition, ToolApprovalRequirement-requires-PolicyDecision, ToolApprovalRequirement-requires-AuthorizationCredential, ToolApprovalRequirement-requires-HumanApproval, ToolApprovalRequirement-requires-PreExecutionSafetyCheck]
    expected_result: {zh: "配置可在运行前声明要求，但不产生任何调用中断或批准记录。", en: "Configuration declares requirements before runtime but creates no call interruption or approval record.", ja: "設定はランタイム前に要件を宣言するが、呼出中断や承認記録を作成しない。"}
    why_valid_or_invalid: {zh: "HITL 批准解决具体中断；不是 OAuth scope 授予。", en: "HITL approval resolves a concrete interruption; it is not an OAuth scope grant.", ja: "HITL 承認は具体的 interruption を解決する。OAuth scope grant ではない。"}
    synthetic: false
    source_claims: [claim-openai-needs-approval, claim-local-tool-approval-requirement]
  - id: tool-approval-requirement-counter-runtime-item
    kind: counterexample
    labels: {zh: 把中断存入静态需求, en: Store interruption in static requirement, ja: 中断を静的要件へ保存する}
    descriptions: {zh: "OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。", en: "OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/).", ja: "OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。"}
    field_values: {tool_approval_requirement_id: tool-approval-requirement-2, tool_definition_id: deploy-tool, source_runtime: OpenAI-Agents-SDK, needs_approval: true, required_evidence_kind: human-approval}
    related_node_ids: [HumanApproval]
    related_relation_ids: [ToolApprovalRequirement-requires-HumanApproval]
    expected_result: {zh: "拒绝；该数据属于独立运行时记录。", en: "Reject it; that data belongs to independent runtime records.", ja: "拒否する。そのデータは独立したランタイム記録に属する。"}
    why_valid_or_invalid: {zh: "HITL 批准解决具体中断；不是 OAuth scope 授予。", en: "HITL approval resolves a concrete interruption; it is not an OAuth scope grant.", ja: "HITL 承認は具体的 interruption を解決する。OAuth scope grant ではない。"}
    synthetic: false
    source_claims: [claim-openai-needs-approval, claim-local-tool-approval-requirement]
  - id: tool-approval-requirement-boundary-policy-decision
    kind: boundary
    labels: {zh: 静态需求与策略决定边界, en: Static requirement and policy-decision boundary, ja: 静的要件とポリシー判断の境界}
    descriptions: {zh: "OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。", en: "OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/).", ja: "OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。"}
    field_values: {tool_approval_requirement_id: tool-approval-requirement-3, tool_definition_id: export-tool, source_runtime: Moonweave-local, needs_approval: true, required_evidence_kind: policy-decision}
    related_node_ids: [ToolDefinition, PolicyDecision]
    related_relation_ids: [ToolApprovalRequirement-applies_to-ToolDefinition, ToolApprovalRequirement-requires-PolicyDecision]
    expected_result: {zh: "运行时适配器在释放前取得独立决定。", en: "The runtime adapter obtains a separate decision before release.", ja: "runtime adapter は解放前に独立した判断を取得する。"}
    why_valid_or_invalid: {zh: "HITL 批准解决具体中断；不是 OAuth scope 授予。", en: "HITL approval resolves a concrete interruption; it is not an OAuth scope grant.", ja: "HITL 承認は具体的 interruption を解決する。OAuth scope grant ではない。"}
    synthetic: false
    source_claims: [claim-local-tool-approval-requirement]
  - id: tool-approval-requirement-instance-safety
    kind: instance
    labels: {zh: 高风险 shell 工具需求, en: High-risk shell-tool requirement, ja: 高リスク shell ツール要件}
    descriptions: {zh: "OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。", en: "OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/).", ja: "OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。"}
    field_values: {tool_approval_requirement_id: tool-approval-requirement-4, tool_definition_id: shell-remove, source_runtime: Moonweave-local, needs_approval: true, required_evidence_kind: [human-approval, pre-execution-safety-check]}
    related_node_ids: [ToolDefinition, PreExecutionSafetyCheck, HumanApproval]
    related_relation_ids: [ToolApprovalRequirement-applies_to-ToolDefinition, ToolApprovalRequirement-requires-PreExecutionSafetyCheck, ToolApprovalRequirement-requires-HumanApproval]
    expected_result: {zh: "配置在调用前要求独立安全和人工记录，但未执行 shell。", en: "Configuration requires separate safety and human records before a call but executes no shell.", ja: "設定は呼出前に独立した安全・人間記録を要求するが、shell を実行しない。"}
    why_valid_or_invalid: {zh: "HITL 批准解决具体中断；不是 OAuth scope 授予。", en: "HITL approval resolves a concrete interruption; it is not an OAuth scope grant.", ja: "HITL 承認は具体的 interruption を解決する。OAuth scope grant ではない。"}
    synthetic: false
    source_claims: [claim-local-tool-approval-requirement]
  - id: ToolApprovalRequirement-real-counterexample-2
    kind: counterexample
    labels: {zh: "ToolApprovalRequirement counterexample case", en: "ToolApprovalRequirement counterexample case", ja: "ToolApprovalRequirement counterexample case"}
    descriptions: {zh: "MCP 规范要求在服务器代表用户调用工具前获得明确用户同意。", en: "MCP specification requires explicit user consent before servers invoke tools on the user behalf (2025-11-25).", ja: "MCP 仕様は user に代わる tool invoke 前に explicit user consent を要求する。"}
    field_values:
      needs_approval: true
      required_evidence_kind: human-approval
      source_runtime: OpenAI-Agents-SDK
      tool_approval_requirement_id: tool-approval-requirement-1
      tool_definition_id: deploy-tool
    related_node_ids: [ToolApprovalRequirement]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "同意是安全控制阶段，与 Markdown 表格格式化不同。", en: "Consent is a safety control phase distinct from markdown table formatting.", ja: "Consent は markdown table formatting とは異なる safety control phase である。"}
    synthetic: false
    source_claims:
      - claim-openai-needs-approval
