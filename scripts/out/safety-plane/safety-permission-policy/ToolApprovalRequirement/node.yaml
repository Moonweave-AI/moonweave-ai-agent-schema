    synthetic: false
    source_claims:
      - claim-openai-needs-approval
parent_relation: null
relations:
  - id: ToolApprovalRequirement-applies_to-ToolDefinition
    predicate: applies_to
    target: concept:ToolDefinition
    endpoint_order: requirement-to-definition
    direction: source-to-target
    relation_kind: association
    labels: {zh: 适用于工具定义, en: applies to tool definition, ja: ツール定義に適用する}
    definitions: {zh: "静态审批需求适用于一个 ToolDefinition profile，而不是一次 ToolCall。", en: "The static approval requirement applies to one ToolDefinition profile, not to one ToolCall.", ja: "静的承認要件は一つの ToolDefinition profile に適用し、一つの ToolCall には適用しない。"}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    source_claims: [claim-local-tool-approval-requirement]
    layout_role: cross-link
  - id: ToolApprovalRequirement-requires-PolicyDecision
    predicate: requires
    target: entity:PolicyDecision
    endpoint_order: requirement-to-evidence-type
    direction: source-to-target
    relation_kind: governance
    labels: {zh: 需要策略决定证据, en: requires policy-decision evidence, ja: ポリシー判断証拠を必要とする}
    definitions: {zh: "当 required_evidence_kind 包含 policy-decision 时，适配器必须单独验证一个 PolicyDecision。", en: "When required_evidence_kind includes policy-decision, an adapter must verify a separate PolicyDecision.", ja: "required_evidence_kind に policy-decision が含まれる場合、adapter は独立した PolicyDecision を検証しなければならない。"}
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: null}}
    conditions:
      - id: tool-approval-requires-policy-decision
        expression_language: plain
        expression: This static relation applies only when required_evidence_kind includes policy-decision; the concrete PolicyDecision remains a separate runtime evidence entity.
        explanation: {zh: "仅在配置列出策略决定种类时才适用该关系。", en: "This relation applies only when configuration lists the policy-decision kind.", ja: "設定が policy-decision 種別を列挙する場合にのみ、この関係が適用される。"}
        source_claims: [claim-local-tool-approval-requirement]
    source_claims: [claim-local-tool-approval-requirement]
    layout_role: cross-link
  - id: ToolApprovalRequirement-requires-AuthorizationCredential
