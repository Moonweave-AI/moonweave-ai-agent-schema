schema: moonweave.ai/ontology-node/v1
id: PermissionResponse
kind: concept
status: accepted
labels:
  zh: 权限响应
  en: permission response
  ja: 権限応答
semantics:
  short_definition:
    zh: 指定响应者针对一个权限提示提交的、带时间和理由的不可变回答记录。
    en: An immutable, timed, reasoned answer submitted by a named responder to one permission prompt.
    ja: 指定応答者が一つの権限提示へ提出した、時刻と理由を持つ不変回答記録です。
  definition:
    zh: 权限响应是 Message 的授权专用子类，继承 element_id 及消息信封身份，不另设 response 身份。它记录原 PermissionPrompt、响应者、approve/deny/defer 结果、响应时间和理由；只有满足响应者资格、提示有效期、请求一致性和策略要求时，才可形成 HumanApproval 证据。
    en: A PermissionResponse is an authorization-specific Message subtype that inherits element_id and the message-envelope identity rather than introducing a separate response identity. It records the original PermissionPrompt, responder, approve/deny/defer outcome, response time, and rationale, and becomes HumanApproval evidence only when eligibility, prompt validity, request consistency, and policy requirements are satisfied.
    ja: PermissionResponse は認可専用 Message 下位型で、element_id と message envelope の同一性を継承し、別の response 同一性を導入しません。元 PermissionPrompt、応答者、approve/deny/defer、応答時刻、理由を記録し、資格・提示有効性・要求整合・方針要件を満たす場合だけ HumanApproval 証拠になります。
  why_needed:
    zh: 响应记录把用户输入与有效审批区分开，使过期、错误审批者或不同请求的回答不会被错误提升为权限。
    en: The response record separates user input from valid approval so expired, ineligible, or wrong-request answers are not promoted to authority.
    ja: 応答記録はユーザー入力と有効承認を分離し、期限切れ・無資格・別要求の回答を権限へ誤昇格させません。
  includes:
    - zh: 包含 Message 信封、响应标识、提示引用、响应者、受控结果、响应时间和理由。
      en: Includes the Message envelope, response identity, prompt reference, responder, controlled outcome, response time, and rationale.
      ja: Message エンベロープ、応答識別子、提示参照、応答者、制御結果、応答時刻、理由を含みます。
  excludes:
    - zh: 不包含提示本身、资格验证、最终 PolicyDecision、AuthorizationGrant 或执行恢复事件。
      en: Excludes the prompt itself, eligibility validation, final PolicyDecision, AuthorizationGrant, or execution-resume event.
      ja: 提示自体、資格検証、最終 PolicyDecision、AuthorizationGrant、実行再開イベントを含みません。
  semantic_kind: information
  aliases: []
structure:
  identity_keys: []
  fields:
    - id: prompt_ref
      labels:
        zh: 提示引用
        en: prompt reference
        ja: 提示参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该回答明确响应的 PermissionPrompt。
        en: PermissionPrompt explicitly answered by the record.
        ja: 記録が明示的に回答する PermissionPrompt です。
      allowed_values: []
      pattern: null
      example_value: prompt-42
      source_claims:
        - claim-permission-response-001
        - claim-permission-response-002
    - id: responder_ref
      labels:
        zh: 响应者引用
        en: responder reference
        ja: 応答者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 提交回答的人类或授权系统主体。
        en: Human or authorized system principal submitting the answer.
        ja: 回答を提出する人間または認可済みシステム主体です。
      allowed_values: []
      pattern: null
      example_value: human:owner-7
      source_claims:
        - claim-permission-response-001
        - claim-permission-response-002
    - id: outcome
      labels:
        zh: 响应结果
        en: response outcome
        ja: 応答結果
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 受控的 approve、deny 或 defer 回答值。
        en: Controlled approve, deny, or defer answer value.
        ja: 制御された approve・deny・defer 回答値です。
      allowed_values: []
      pattern: null
      example_value: approve
      source_claims:
        - claim-permission-response-001
        - claim-permission-response-002
    - id: responded_at
      labels:
        zh: 响应时间
        en: responded at
        ja: 応答時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 回答提交的 UTC 时刻。
        en: UTC instant when the answer was submitted.
        ja: 回答が提出された UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:21:00Z
      source_claims:
        - claim-permission-response-001
        - claim-permission-response-002
    - id: rationale
      labels:
        zh: 响应理由
        en: response rationale
        ja: 応答理由
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 响应者说明决定依据的可审计理由。
        en: Auditable reason given by the responder for the answer.
        ja: 応答者が回答根拠として示す監査可能な理由です。
      allowed_values: []
      pattern: null
      example_value: requested read-only search is expected
      source_claims:
        - claim-permission-response-001
        - claim-permission-response-002
  constraints: []
  required_relation_constraints: []
