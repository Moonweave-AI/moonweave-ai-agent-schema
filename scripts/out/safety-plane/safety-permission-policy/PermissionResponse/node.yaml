sibling_differentiation:
  - sibling_concept_id: PermissionPrompt
    shared_parent_concept_id: Message
    differentia:
      zh: PermissionResponse 回答既有提示并记录响应者、时间与理由；PermissionPrompt 创建待回答呈现并规定允许响应和期限。回答不能反向充当提示。
      en: PermissionResponse answers an existing prompt and records responder, time, and rationale; PermissionPrompt creates the pending presentation and defines allowed answers and expiry. An answer cannot serve as the prompt.
      ja: PermissionResponse は既存提示へ回答し応答者・時刻・理由を記録し、PermissionPrompt は未回答提示を作り許容回答・期限を定めます。回答は提示を代替できません。
    source_claims:
      - claim-permission-response-001
