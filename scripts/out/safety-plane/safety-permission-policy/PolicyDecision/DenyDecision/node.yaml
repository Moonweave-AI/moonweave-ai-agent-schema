schema: moonweave.ai/ontology-node/v1
id: DenyDecision
kind: concept
status: accepted
labels: {zh: 拒绝策略决定, en: Deny Decision, ja: 拒否ポリシー判断}
semantics:
  short_definition: {zh: "效果固定为 deny 的 PolicyDecision 真正子类型。", en: "A true PolicyDecision subtype whose effect is fixed to deny.", ja: "効果が deny に固定された PolicyDecision の真のサブタイプ。"}
  definition: {zh: "DenyDecision 是 PolicyDecision 的真正子类型：它保留 policy_decision_id、authorization_request_id、policy_evaluation_id、policy_specification_id、evaluated_policy_version 和 decision_evidence_reference，并将 decision_effect 固定为 deny；denial_reason_code 说明拒绝原因。它不是传输故障、授权撤销、HumanApproval 或执行效果。", en: "DenyDecision is a true PolicyDecision subtype: it retains policy_decision_id, authorization_request_id, policy_evaluation_id, policy_specification_id, evaluated_policy_version, and decision_evidence_reference while fixing decision_effect to deny; denial_reason_code states why. It is not a transport failure, authorization revocation, HumanApproval, or execution effect.", ja: "DenyDecision は PolicyDecision の真のサブタイプであり、policy_decision_id、authorization_request_id、policy_evaluation_id、policy_specification_id、evaluated_policy_version、decision_evidence_reference を保持し、decision_effect を deny に固定する。denial_reason_code は拒否理由を示す。転送障害、認可撤回、HumanApproval、実行 effect ではない。"}
  why_needed: {zh: "系统必须将规则产生的拒绝结论与技术错误、未处理人工复核或凭证生命周期状态变化区分开来。", en: "Systems must distinguish a rule-derived denial conclusion from technical failure, unresolved human review, or credential lifecycle state change.", ja: "システムは規則由来の拒否結論を、技術障害、未解決の人によるレビュー、credential lifecycle 状態変更と区別しなければならない。"}
  includes: [{zh: "继承的决定身份、请求、评估、策略、版本和证据字段，固定 deny 效果和拒绝原因码。", en: "Inherited decision identity, request, evaluation, policy, version, and evidence fields; a fixed deny effect; and a denial reason code.", ja: "継承した判断 ID、要求、評価、ポリシー、版、証拠フィールド、固定 deny 効果、拒否理由コード。"}]
  excludes: [{zh: "网络超时、对已存在凭证的撤销、可授予访问的凭证、人工批准或工具副作用。", en: "A network timeout, revocation of an existing credential, an access-granting credential, human approval, or a tool side effect.", ja: "ネットワーク timeout、既存 credential の撤回、アクセスを付与する credential、人の承認、ツール side effect。"}]
  semantic_kind: entity
  aliases: [policy-deny-result, authorization-deny-conclusion]
engineering:
  explanation: {zh: "策略评估产生带完整父决定字段的 deny 子类型。适配器应阻止本地释放，但拒绝结论本身不会撤销既有凭证、替代人工复核或记录工具执行。", en: "Policy evaluation produces a deny subtype with the complete parent-decision fields. An adapter should block local release, but the denial conclusion itself does not revoke an existing credential, replace human review, or record tool execution.", ja: "ポリシー評価は完全な親判断フィールドを持つ deny サブタイプを生成する。adapter はローカル解放を阻止すべきだが、拒否結論自体は既存 credential を撤回せず、人のレビューを置き換えず、ツール実行も記録しない。"}
  typical_input:
    - description: {zh: "命中拒绝规则的授权请求和策略版本。", en: "An authorization request matching a deny rule and policy version.", ja: "deny 規則に一致する認可要求とポリシー版。"}
      format: '{"authorization_request_id":"request-etc-write","policy_evaluation_id":"eval-1","policy_specification_id":"policy-12","evaluated_policy_version":"12","decision_evidence_reference":"evidence-deny-1","denial_reason_code":"protected-path"}'
      source_claims: [claim-cedar-allow-deny, claim-local-deny-decision-subtype]
  typical_output:
    - description: {zh: "保留父决定合同的拒绝决定。", en: "A deny decision retaining the parent-decision contract.", ja: "親判断契約を保持する deny decision。"}
      format: '{"policy_decision_id":"deny-1","decision_effect":"deny","authorization_request_id":"request-etc-write","policy_evaluation_id":"eval-1","policy_specification_id":"policy-12","evaluated_policy_version":"12","decision_evidence_reference":"evidence-deny-1","denial_reason_code":"protected-path"}'
      source_claims: [claim-cedar-allow-deny, claim-local-deny-decision-subtype]
  reference_implementations:
    - name: Cedar authorization guide
      url: https://docs.cedarpolicy.com/auth/authorization.html
      description: Documents authorization responses limited to allow or deny with diagnostics.
    - name: Open Policy Agent policy language
      url: https://www.openpolicyagent.org/docs/policy-language
      description: Documents evaluation of policy over structured input and data.
structure:
  identity_keys: [policy_decision_id]
  fields:
    - id: policy_decision_id
      labels: {zh: 策略决定标识符, en: Policy decision ID, ja: ポリシー判断 ID}
      definitions: {zh: "继承的、一次策略结论的稳定标识符。", en: "Inherited stable identifier for one policy conclusion.", ja: "一つのポリシー結論の継承した安定 ID。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: deny-1
      allowed_values: []
      source_claims: [claim-local-deny-decision-subtype]
    - id: decision_effect
      labels: {zh: 决定效果, en: Decision effect, ja: 判断効果}
      definitions: {zh: "继承的决定效果，在此子类型中固定为 deny。", en: "Inherited decision effect, fixed to deny for this subtype.", ja: "継承した判断効果。このサブタイプでは deny に固定される。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: deny
      allowed_values: [deny]
      source_claims: [claim-cedar-allow-deny, claim-local-deny-decision-subtype]
    - id: authorization_request_id
      labels: {zh: 授权请求标识符, en: Authorization request ID, ja: 認可要求 ID}
      definitions: {zh: "继承的、此拒绝决定适用的 AuthorizationRequest 标识符。", en: "Inherited identifier of the AuthorizationRequest to which this deny decision applies.", ja: "この deny decision が適用される AuthorizationRequest の継承 ID。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: request-etc-write
      allowed_values: []
      source_claims: [claim-local-deny-decision-subtype]
    - id: policy_evaluation_id
      labels: {zh: 策略评估标识符, en: Policy evaluation ID, ja: ポリシー評価 ID}
      definitions: {zh: "继承的、生成此拒绝决定的 PolicyEvaluation 标识符。", en: "Inherited identifier of the PolicyEvaluation that generated this deny decision.", ja: "この deny decision を生成した PolicyEvaluation の継承 ID。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: eval-1
      allowed_values: []
      source_claims: [claim-local-deny-decision-subtype]
    - id: policy_specification_id
      labels: {zh: 策略规范标识符, en: Policy specification ID, ja: ポリシー仕様 ID}
      definitions: {zh: "继承的、生成决定时适用的 PolicySpecification 标识符。", en: "Inherited identifier of the PolicySpecification applied to generate this decision.", ja: "この判断の生成に適用された PolicySpecification の継承 ID。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: policy-12
      allowed_values: []
      source_claims: [claim-opa-evaluation, claim-local-deny-decision-subtype]
    - id: evaluated_policy_version
      labels: {zh: 已评估策略版本, en: Evaluated policy version, ja: 評価済みポリシー版}
      definitions: {zh: "继承的、生成此结论时使用的不可变策略修订。", en: "Inherited immutable policy revision used to generate this conclusion.", ja: "この結論の生成に使用された継承した不変ポリシー改訂。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[0-9]+$'
      example_value: '12'
      allowed_values: []
      source_claims: [claim-opa-evaluation, claim-local-deny-decision-subtype]
    - id: decision_evidence_reference
      labels: {zh: 决定证据引用, en: Decision evidence reference, ja: 判断証拠参照}
      definitions: {zh: "继承的、支持 deny 结论的规则、输入和诊断非秘密引用。", en: "Inherited non-secret reference to rule, input, and diagnostics supporting the deny conclusion.", ja: "deny 結論を支持する規則、入力、診断への継承した非秘密参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: evidence-deny-1
      allowed_values: []
      source_claims: [claim-cedar-allow-deny, claim-local-deny-decision-subtype]
    - id: denial_reason_code
      labels: {zh: 拒绝原因码, en: Denial reason code, ja: 拒否理由コード}
      definitions: {zh: "解释规则为何拒绝请求的稳定代码。", en: "Stable code explaining why rules denied the request.", ja: "規則が要求を拒否した理由を説明する安定コード。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: protected-path
      allowed_values: []
      source_claims: [claim-local-deny-decision-subtype]
  constraints:
    - id: deny-decision-retains-parent-contract
      severity: error
      expression_language: plain
      expression: A DenyDecision must retain one policy_decision_id, decision_effect deny, authorization_request_id, policy_evaluation_id, policy_specification_id, evaluated_policy_version, decision_evidence_reference, and denial_reason_code. It is not a network failure, credential revocation, human approval, or execution result.
      explanation: {zh: "拒绝决定是父策略决定的收窄子类型，不能被用作非策略失败的标签。", en: "A deny decision is a narrowed subtype of a policy decision and cannot label a non-policy failure.", ja: "deny decision は policy decision の制限付きサブタイプであり、非ポリシー障害のラベルにはできない。"}
      source_claims: [claim-cedar-allow-deny, claim-local-deny-decision-subtype]
  required_relations: []
examples:
  
- id: deny-decision-positive-protected-path
    kind: positive
    labels: {zh: 拒绝写入受保护路径, en: Deny protected-path write, ja: 保護パス書込みの拒否}
    descriptions: {zh: "Amazon Cedar 评估 principal-action-resource-context 请求并返回 Allow 或 Deny 及诊断信息。", en: "Amazon Cedar evaluates principal-action-resource-context requests and returns Allow or Deny with diagnostics (docs.cedarpolicy.com/auth/authorization.html).", ja: "Amazon Cedar は principal-action-resource-context 要求を評価し Allow/Deny と diagnostics を返す。"}
    field_values: {policy_decision_id: deny-1, decision_effect: deny, authorization_request_id: request-etc-write, policy_evaluation_id: eval-1, policy_specification_id: policy-12, evaluated_policy_version: '12', decision_evidence_reference: evidence-deny-1, denial_reason_code: protected-path}
    related_node_ids: [PolicyDecision, AuthorizationRequest, PolicyEvaluation]
    related_relation_ids: [DenyDecision-is_a-PolicyDecision]
    expected_result: {zh: "产生可审计的拒绝结论。", en: "Produce an auditable denial conclusion.", ja: "監査可能な拒否結論を生成する。"}
    why_valid_or_invalid: {zh: "Cedar 授权与 HumanApproval 记录的用户界面工具批准不同。", en: "Cedar authorization is distinct from UI tool approval recorded by HumanApproval.", ja: "Cedar 認可は HumanApproval が記録する UI ツール承認とは別である。"}
    synthetic: false
    source_claims: [claim-cedar-allow-deny, claim-local-deny-decision-subtype]
  - id: deny-decision-counter-network-timeout
    kind: counterexample
    labels: {zh: 网络超时不是拒绝决定, en: Network timeout is not a deny decision, ja: ネットワーク timeout は deny decision ではない}
    descriptions: {zh: "Amazon Cedar 评估 principal-action-resource-context 请求并返回 Allow 或 Deny 及诊断信息。", en: "Amazon Cedar evaluates principal-action-resource-context requests and returns Allow or Deny with diagnostics (docs.cedarpolicy.com/auth/authorization.html).", ja: "Amazon Cedar は principal-action-resource-context 要求を評価し Allow/Deny と diagnostics を返す。"}
    field_values: {policy_decision_id: missing, decision_effect: deny, authorization_request_id: request-api, policy_evaluation_id: missing, policy_specification_id: missing, evaluated_policy_version: missing, decision_evidence_reference: missing, denial_reason_code: network-timeout}
    related_node_ids: [NetworkInteraction]
    related_relation_ids: []
    expected_result: {zh: "拒绝将技术失败分类为策略拒绝。", en: "Reject classification of technical failure as policy denial.", ja: "技術障害をポリシー拒否として分類することを拒否する。"}
    why_valid_or_invalid: {zh: "Cedar 授权与 HumanApproval 记录的用户界面工具批准不同。", en: "Cedar authorization is distinct from UI tool approval recorded by HumanApproval.", ja: "Cedar 認可は HumanApproval が記録する UI ツール承認とは別である。"}
    synthetic: false
    source_claims: [claim-local-deny-decision-subtype]
  - id: deny-decision-boundary-revocation
    kind: boundary
    labels: {zh: 拒绝与撤销边界, en: Denial and revocation boundary, ja: 拒否と撤回の境界}
    descriptions: {zh: "Amazon Cedar 评估 principal-action-resource-context 请求并返回 Allow 或 Deny 及诊断信息。", en: "Amazon Cedar evaluates principal-action-resource-context requests and returns Allow or Deny with diagnostics (docs.cedarpolicy.com/auth/authorization.html).", ja: "Amazon Cedar は principal-action-resource-context 要求を評価し Allow/Deny と diagnostics を返す。"}
    field_values: {policy_decision_id: deny-2, decision_effect: deny, authorization_request_id: request-egress, policy_evaluation_id: eval-2, policy_specification_id: policy-12, evaluated_policy_version: '12', decision_evidence_reference: evidence-deny-2, denial_reason_code: egress-not-allowed}
    related_node_ids: [AuthorizationRevocation]
    related_relation_ids: []
    expected_result: {zh: "保留两种状态变化为独立事实。", en: "Keep the two state changes as distinct facts.", ja: "二つの状態変更を別の事実として保持する。"}
    why_valid_or_invalid: {zh: "Cedar 授权与 HumanApproval 记录的用户界面工具批准不同。", en: "Cedar authorization is distinct from UI tool approval recorded by HumanApproval.", ja: "Cedar 認可は HumanApproval が記録する UI ツール承認とは別である。"}
    synthetic: false
    source_claims: [claim-local-deny-decision-subtype]
  - id: deny-decision-instance-unapproved-egress
    kind: instance
    labels: {zh: 拒绝未批准网络出口, en: Deny unapproved network egress, ja: 未承認ネットワーク出力の拒否}
    descriptions: {zh: "Amazon Cedar 评估 principal-action-resource-context 请求并返回 Allow 或 Deny 及诊断信息。", en: "Amazon Cedar evaluates principal-action-resource-context requests and returns Allow or Deny with diagnostics (docs.cedarpolicy.com/auth/authorization.html).", ja: "Amazon Cedar は principal-action-resource-context 要求を評価し Allow/Deny と diagnostics を返す。"}
    field_values: {policy_decision_id: deny-3, decision_effect: deny, authorization_request_id: request-egress, policy_evaluation_id: eval-3, policy_specification_id: policy-12, evaluated_policy_version: '12', decision_evidence_reference: evidence-deny-3, denial_reason_code: egress-not-allowed}
    related_node_ids: [NetworkPolicy, NetworkEndpoint]
    related_relation_ids: []
    expected_result: {zh: "产生拒绝结论而不执行网络请求。", en: "Produce a denial conclusion without executing the network request.", ja: "ネットワーク要求を実行せずに拒否結論を生成する。"}
    why_valid_or_invalid: {zh: "Cedar 授权与 HumanApproval 记录的用户界面工具批准不同。", en: "Cedar authorization is distinct from UI tool approval recorded by HumanApproval.", ja: "Cedar 認可は HumanApproval が記録する UI ツール承認とは別である。"}
    synthetic: false
    source_claims: [claim-cedar-allow-deny, claim-local-deny-decision-subtype]
  - id: DenyDecision-real-counterexample-2
    kind: counterexample
    labels: {zh: "DenyDecision counterexample case", en: "DenyDecision counterexample case", ja: "DenyDecision counterexample case"}
    descriptions: {zh: "Open Policy Agent Rego 评估 input 与 data 文档；除非规则显式 allow，否则 default deny。", en: "Open Policy Agent Rego evaluates input and data documents; default deny applies unless a rule explicitly allows (openpolicyagent.org/docs/policy-language).", ja: "Open Policy Agent Rego は input/data 文書を評価し、明示 allow がなければ default deny。"}
    field_values:
      authorization_request_id: request-etc-write
      decision_effect: deny
      decision_evidence_reference: evidence-deny-1
      denial_reason_code: protected-path
      evaluated_policy_version: '12'
      policy_decision_id: deny-1
      policy_evaluation_id: eval-1
      policy_specification_id: policy-12
    related_node_ids: [DenyDecision]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "OPA 产生 allow/deny 决定；不执行沙箱代码。", en: "OPA produces allow/deny decisions; it does not execute sandboxed code.", ja: "OPA は allow/deny 判断を生成する。サンドボックス code は実行しない。"}
    synthetic: false
    source_claims:
      - claim-cedar-allow-deny
  - id: DenyDecision-real-boundary-3
    kind: boundary
    labels: {zh: "DenyDecision boundary case", en: "DenyDecision boundary case", ja: "DenyDecision boundary case"}
    descriptions: {zh: "MCP Authorization（2025-11-25）将访问令牌绑定到 HTTP 传输的预期 resource 参数与所需 scope。", en: "MCP Authorization (2025-11-25) binds access tokens to the intended resource parameter and required scopes for HTTP transports.", ja: "MCP Authorization は HTTP transport の intended resource と required scope に access token を結び付ける。"}
    field_values:
      authorization_request_id: request-etc-write
      decision_effect: deny
      decision_evidence_reference: evidence-deny-1
      denial_reason_code: protected-path
      evaluated_policy_version: '12'
      policy_decision_id: deny-1
      policy_evaluation_id: eval-1
      policy_specification_id: policy-12
    related_node_ids: [DenyDecision]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "认证证明身份；MCP scope 验证是独立的授权步骤。", en: "Authentication proves identity; MCP scope validation is a separate authorization step.", ja: "認証は ID を証明する。MCP scope validation は独立した認可ステップである。"}
    synthetic: false
    source_claims:
      - claim-cedar-allow-deny
  - id: DenyDecision-real-instance-4
    kind: instance
    labels: {zh: "DenyDecision instance case", en: "DenyDecision instance case", ja: "DenyDecision instance case"}
    descriptions: {zh: "NIST SP 800-207 定义零信任：不因网络位置隐式信任；访问资源前离散认证与授权。", en: "NIST SP 800-207 defines zero trust: no implicit trust by network location; discrete authentication and authorization before resource access.", ja: "NIST SP 800-207 は network location による implicit trust なし、resource access 前の discrete 認証・認可を定義する。"}
    field_values:
      authorization_request_id: request-etc-write
      decision_effect: deny
      decision_evidence_reference: evidence-deny-1
      denial_reason_code: protected-path
      evaluated_policy_version: '12'
      policy_decision_id: deny-1
      policy_evaluation_id: eval-1
      policy_specification_id: policy-12
    related_node_ids: [DenyDecision]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "NIST 区分策略引擎（决策）与策略执行点；信任边界映射这一分离。", en: "NIST separates policy engine (decision) from policy enforcement point; trust boundaries map to this split.", ja: "NIST は policy engine と PEP を分離する。trust boundary はこの分離に対応する。"}
    synthetic: false
    source_claims:
      - claim-cedar-allow-deny
parent_relation:
  id: DenyDecision-is_a-PolicyDecision
  predicate: is_a
  target: entity:PolicyDecision
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels: {zh: 是一种策略决定, en: is a policy decision, ja: ポリシー判断である}
  definitions: {zh: "DenyDecision 保留 PolicyDecision 的完整身份和必填合同，并将效果收窄为 deny。", en: "DenyDecision retains the full PolicyDecision identity and required contract while narrowing the effect to deny.", ja: "DenyDecision は PolicyDecision の完全な ID と必須契約を保持し、効果を deny に狭める。"}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  conditions:
    - id: deny-decision-effect-fixed
      expression_language: plain
      expression: The child subtype retains every PolicyDecision required field and fixes decision_effect to deny.
      explanation: {zh: "子类型仅收窄效果值，不能丢失父决定字段。", en: "The subtype only narrows the effect value and cannot omit parent-decision fields.", ja: "サブタイプは効果値だけを狭め、親判断フィールドを省略できない。"}
      source_claims: [claim-cedar-allow-deny, claim-local-deny-decision-subtype]
  temporal_scope: valid-time
  constraints: []
  source_claims: [claim-local-deny-decision-subtype]
relations: []
sources:
  - id: cedar-authorization
    title: Cedar authorization guide
    url: https://docs.cedarpolicy.com/auth/authorization.html
    source_type: official-documentation
    relevance: Documents authorization responses limited to allow or deny with diagnostics.
  - id: opa-policy-language
    title: Open Policy Agent policy language
    url: https://www.openpolicyagent.org/docs/policy-language
    source_type: official-documentation
    relevance: Documents evaluation over structured input and policy data.
  - id: moonweave-local-deny-decision
    title: Moonweave local deny-decision subtype
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema#source-model
    source_type: design-inference
