schema: moonweave.ai/ontology-node/v1
id: HumanApproval
kind: concept
status: accepted
labels: {zh: 人工批准, en: Human Approval, ja: 人による承認}
semantics:
  short_definition: {zh: "由人类审批者对一个明确待决操作作出的、可追溯的批准响应。", en: "A traceable approval response by a human approver for one concrete pending operation.", ja: "人の承認者が一つの具体的な保留操作に対して行う追跡可能な承認応答。"}
  definition: {zh: "HumanApproval 是针对一个明确待决操作的本地、调用级人工批准证据实体。它不是 AuthorizationEvent、PolicyDecision、AuthorizationCredential、CapabilityCredential、用户同意提示或授权策略规则；它不能把被策略拒绝的操作变为已授权能力。", en: "HumanApproval is a local, call-specific human-approval evidence entity for one concrete pending operation. It is not an AuthorizationEvent, PolicyDecision, AuthorizationCredential, CapabilityCredential, user-consent prompt, or authorization policy rule; it cannot turn a policy-denied operation into an authorized capability.", ja: "HumanApproval は一つの具体的な保留操作に対する、ローカルで呼出固有の人の承認証拠エンティティである。AuthorizationEvent、PolicyDecision、AuthorizationCredential、CapabilityCredential、ユーザー同意プロンプト、認可ポリシー規則ではなく、ポリシーで拒否された操作を認可済み能力へ変えることはできない。"}
  why_needed: {zh: "对高影响操作，系统需要能证明谁在看到确切调用和参数后批准了它，并防止批准被重放到其他操作。", en: "For consequential operations, the system needs evidence of who approved the exact call and arguments and must prevent replay of approval to other operations.", ja: "重大な操作では、誰が正確な呼出と引数を確認して承認したかの証拠が必要であり、承認が他の操作へ再利用されるのを防がなければならない。"}
  includes: [{zh: "审批者身份、待决调用或操作、参数摘要、结果、时间和到期。", en: "Approver identity, pending call or operation, argument digest, outcome, time, and expiry.", ja: "承認者識別子、保留呼出または操作、引数要約、結果、時刻、期限。"}]
  excludes: [{zh: "对资源的持久访问许可或策略允许决定。", en: "A standing permission to access a resource or a policy allow decision.", ja: "リソースへ恒久的にアクセスする許可またはポリシー許可決定。"}]
  semantic_kind: entity
  aliases: [call-specific-approval, reviewer-approval]
engineering:
  explanation: {zh: "将批准绑定到中断或待决调用标识及其已检查参数摘要。记录批准者和时间；只有当策略和闸门约束也允许时才恢复未变的调用，并拒绝将其复用于不同调用或已变参数。", en: "Bind approval to the interruption or pending call ID and its reviewed argument digest. Record the approver and time, resume only that unchanged call when policy and gate constraints also permit it, and reject reuse for a different call or changed arguments.", ja: "承認を中断または保留呼出 ID と確認済み引数要約へ結び付ける。承認者と時刻を記録し、ポリシーとゲート制約も許可する場合にのみ変更されていない呼出を再開し、別の呼出や変更済み引数への再利用を拒否する。"}
  typical_input:
    - description: {zh: 待决批准项, en: Pending approval item, ja: 保留承認項目}
      format: '{"human_approval_id":"approval-42","approved_operation_id":"call-42","reviewed_arguments_digest":"sha256:abc","approver":"user-17"}'
      source_claims: [claim-human-approval-evidence-schema]
  typical_output:
    - description: {zh: 批准证据, en: Approval evidence, ja: 承認証拠}
      format: '{"human_approval_id":"approval-42","approved_operation_id":"call-42","reviewed_arguments_digest":"sha256:abc","outcome":"approved","approved_by":"user-17"}'
      source_claims: [claim-human-approval-evidence-schema]
  reference_implementations:
    - name: OpenAI Agents SDK Human-in-the-loop
      url: https://openai.github.io/openai-agents-js/guides/human-in-the-loop/
      description: Documents approve and reject decisions for specific interrupted tool calls.
structure:
  identity_keys: [human_approval_id]
  fields:
    - id: human_approval_id
      labels: {zh: 人工批准标识符, en: Human approval ID, ja: 人による承認 ID}
      definitions: {zh: "一次针对具体待决操作的人工批准记录的稳定标识符。", en: "Stable identifier for one human approval record for a concrete pending operation.", ja: "具体的な保留操作に対する一つの人の承認記録の安定識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: approval-42
      allowed_values: []
      source_claims: [claim-human-approval-evidence-schema]
    - id: approver_reference
      labels: {zh: 审批者引用, en: Approver reference, ja: 承認者参照}
      definitions: {zh: "作出该批准的本地已认证审批者引用；不在此模块中重新建模认证。", en: "Reference to the locally authenticated approver who made this approval; authentication is not remodeled in this module.", ja: "この承認を行ったローカルで認証済みの承認者への参照。このモジュールは認証を再モデル化しない。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: user-17
      allowed_values: []
      source_claims: [claim-human-approval-evidence-schema]
    - id: approved_at
      labels: {zh: 批准时间, en: Approved at, ja: 承認時刻}
      definitions: {zh: "本地记录该审批者解析该精确待决操作的时间。", en: "Time recorded locally when the approver resolved this exact pending operation.", ja: "承認者がこの正確な保留操作を解決した時にローカルで記録された時刻。"}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '2026-07-19T04:00:00Z'
      allowed_values: []
      source_claims: [claim-human-approval-evidence-schema]
    - id: approved_operation_id
      labels: {zh: 已批准操作标识符, en: Approved operation ID, ja: 承認済み操作 ID}
      definitions: {zh: "人工审查并批准的确切待决调用或操作标识。", en: "The exact pending call or operation identifier reviewed and approved by the human.", ja: "人が確認して承認した正確な保留呼出または操作の識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: call-42
      allowed_values: []
      source_claims: [claim-openai-hitl]
    - id: reviewed_arguments_digest
      labels: {zh: 已审查参数摘要, en: Reviewed arguments digest, ja: 確認済み引数ダイジェスト}
      definitions: {zh: "批准者看到并批准的确切待决调用参数的不可变摘要。", en: "Immutable digest of the exact pending-call arguments shown to and approved by the human.", ja: "人が確認して承認した、正確な保留呼出引数の不変ダイジェスト。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sha256:abc
      allowed_values: []
      source_claims: [claim-openai-hitl]
  constraints:
    - id: human-approval-binds-exact-operation
      severity: error
      expression_language: plain
      expression: A HumanApproval must bind one approver, one pending operation, its reviewed argument digest, and approved_at; it must not be reused as a standing authorization credential or for changed arguments.
      explanations: {zh: "批准是调用特定的证据，不是可转让能力。", en: "Approval is call-specific evidence, not a transferable capability.", ja: "承認は呼出固有の証拠であり、移転可能な能力ではない。"}
      explanation: {zh: "批准是调用特定的证据，不是可转让能力。", en: "Approval is call-specific evidence, not a transferable capability.", ja: "承認は呼出固有の証拠であり、移転可能な能力ではない。"}
      source_claims: [claim-human-approval-evidence-schema]
  required_relations: []
examples:
  
- id: human-approval-positive-cancel
    kind: positive
    labels: {zh: 批准确切取消操作, en: Approve exact cancellation, ja: 正確な取消を承認}
    descriptions: {zh: "OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。", en: "OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/).", ja: "OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。"}
    field_values: {human_approval_id: approval-42, approved_operation_id: call-42, reviewed_arguments_digest: sha256:cancel-42}
    related_node_ids: [PermissionPrompt, ToolApprovalRequirement]
    related_relation_ids: []
    expected_result: {zh: "若其他策略检查允许，则只有已检查调用可恢复。", en: "Only the reviewed call may resume if other policy checks permit it.", ja: "他のポリシー検査が許可する場合、確認済み呼出だけが再開できる。"}
    why_valid_or_invalid: {zh: "HITL 批准解决具体中断；不是 OAuth scope 授予。", en: "HITL approval resolves a concrete interruption; it is not an OAuth scope grant.", ja: "HITL 承認は具体的 interruption を解決する。OAuth scope grant ではない。"}
    synthetic: false
    source_claims: [claim-openai-hitl]
  - id: human-approval-counter-standing-grant
    kind: counterexample
    labels: {zh: 批准变为长期授予物, en: Approval becomes standing grant, ja: 承認が継続グラントになる}
    descriptions: {zh: "OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。", en: "OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/).", ja: "OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。"}
    field_values: {human_approval_id: approval-43, approved_operation_id: call-43, reviewed_arguments_digest: sha256:cancel-43}
    related_node_ids: [AuthorizationCredential, CapabilityCredential]
    related_relation_ids: []
    expected_result: {zh: "拒绝将其转换为授予物。", en: "Reject the conversion into a grant.", ja: "グラントへの変換を拒否する。"}
    why_valid_or_invalid: {zh: "HITL 批准解决具体中断；不是 OAuth scope 授予。", en: "HITL approval resolves a concrete interruption; it is not an OAuth scope grant.", ja: "HITL 承認は具体的 interruption を解決する。OAuth scope grant ではない。"}
    synthetic: false
    source_claims: [claim-openai-hitl]
  - id: human-approval-boundary-decision
    kind: boundary
    labels: {zh: 人工批准与策略决定, en: Human approval versus policy decision, ja: 人の承認とポリシー判断}
    descriptions: {zh: "OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。", en: "OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/).", ja: "OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。"}
    field_values: {human_approval_id: approval-44, approved_operation_id: call-44, reviewed_arguments_digest: sha256:transfer-44}
    related_node_ids: [PolicyDecision, DenyDecision]
    related_relation_ids: []
    expected_result: {zh: "将策略授权与人工闸门响应保持分离。", en: "Keep policy authorization and human gate response separate.", ja: "ポリシー認可と人のゲート応答を分離して保持する。"}
    why_valid_or_invalid: {zh: "HITL 批准解决具体中断；不是 OAuth scope 授予。", en: "HITL approval resolves a concrete interruption; it is not an OAuth scope grant.", ja: "HITL 承認は具体的 interruption を解決する。OAuth scope grant ではない。"}
    synthetic: false
    source_claims: [claim-openai-hitl]
  - id: human-approval-instance-data-exposure
    kind: instance
    labels: {zh: 批准特定数据暴露, en: Approve specific data exposure, ja: 特定データ公開を承認}
    descriptions: {zh: "OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。", en: "OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/).", ja: "OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。"}
    field_values: {human_approval_id: profile-approval-45, approved_operation_id: profile-server-exposure-45, reviewed_arguments_digest: sha256:profile-45}
    related_node_ids: [PermissionPrompt, DisclosureControlActivity]
    related_relation_ids: []
    expected_result: {zh: "事件证明一次范围明确的人工响应，不授权无关数据发布。", en: "The event proves one scoped human response and does not authorize unrelated data release.", ja: "イベントは一つの範囲付き人間応答を証明し、無関係なデータ公開を認可しない。"}
    why_valid_or_invalid: {zh: "HITL 批准解决具体中断；不是 OAuth scope 授予。", en: "HITL approval resolves a concrete interruption; it is not an OAuth scope grant.", ja: "HITL 承認は具体的 interruption を解決する。OAuth scope grant ではない。"}
    synthetic: false
    source_claims: [claim-openai-hitl]
  - id: HumanApproval-real-counterexample-2
    kind: counterexample
    labels: {zh: "HumanApproval counterexample case", en: "HumanApproval counterexample case", ja: "HumanApproval counterexample case"}
    descriptions: {zh: "LangGraph interrupt() 暂停图执行供人工审查；Command(resume=...) 在 approve/edit/reject 后继续。", en: "LangGraph interrupt() pauses graph execution for human review; Command(resume=...) continues after approve/edit/reject (docs.langchain.com/langgraph/interrupts).", ja: "LangGraph interrupt() は human review のため graph を pause し Command(resume=...) で再開する。"}
    field_values:
      approved_at: "'2026-07-19T04:00:00Z'"
      approved_operation_id: call-44
      approver_reference: user-17
      human_approval_id: approval-44
      reviewed_arguments_digest: "sha256:abc"
    related_node_ids: [HumanApproval]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "LangGraph interrupt 记录暂停/恢复周期，与 Cedar allow/deny 不同。", en: "LangGraph interrupt records a pause/resume cycle distinct from Cedar allow/deny.", ja: "LangGraph interrupt は pause/resume サイクルを記録し Cedar allow/deny とは異なる。"}
    synthetic: false
    source_claims:
      - claim-openai-hitl
  - id: HumanApproval-real-boundary-3
    kind: boundary
    labels: {zh: "HumanApproval boundary case", en: "HumanApproval boundary case", ja: "HumanApproval boundary case"}
    descriptions: {zh: "MCP 规范要求在服务器代表用户调用工具前获得明确用户同意。", en: "MCP specification requires explicit user consent before servers invoke tools on the user behalf (2025-11-25).", ja: "MCP 仕様は user に代わる tool invoke 前に explicit user consent を要求する。"}
    field_values:
      approved_at: "'2026-07-19T04:00:00Z'"
      approved_operation_id: call-45
      approver_reference: user-17
      human_approval_id: approval-45
      reviewed_arguments_digest: "sha256:abc"
    related_node_ids: [HumanApproval]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "同意是安全控制阶段，与 Markdown 表格格式化不同。", en: "Consent is a safety control phase distinct from markdown table formatting.", ja: "Consent は markdown table formatting とは異なる safety control phase である。"}
    synthetic: false
    source_claims:
      - claim-openai-hitl
  - id: HumanApproval-real-instance-4
    kind: instance
    labels: {zh: "HumanApproval instance case", en: "HumanApproval instance case", ja: "HumanApproval instance case"}
    descriptions: {zh: "Amazon Cedar 评估 principal-action-resource-context 请求并返回 Allow 或 Deny 及诊断信息。", en: "Amazon Cedar evaluates principal-action-resource-context requests and returns Allow or Deny with diagnostics (docs.cedarpolicy.com/auth/authorization.html).", ja: "Amazon Cedar は principal-action-resource-context 要求を評価し Allow/Deny と diagnostics を返す。"}
    field_values:
      approved_at: "'2026-07-19T04:00:00Z'"
      approved_operation_id: call-46
      approver_reference: user-17
      human_approval_id: approval-46
      reviewed_arguments_digest: "sha256:abc"
    related_node_ids: [HumanApproval]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "Cedar 授权与 HumanApproval 记录的用户界面工具批准不同。", en: "Cedar authorization is distinct from UI tool approval recorded by HumanApproval.", ja: "Cedar 認可は HumanApproval が記録する UI ツール承認とは別である。"}
    synthetic: false
    source_claims:
      - claim-openai-hitl
parent_relation: null
relations: []
sources:
  - id: openai-hitl
    title: OpenAI Agents SDK Human-in-the-loop
    url: https://openai.github.io/openai-agents-js/guides/human-in-the-loop/
    source_type: official-doc
    relevance: Documents approve and reject handling for specific interrupted tool calls.
  - id: moonweave-local-approval-evidence
    title: Moonweave local approval-evidence profile
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema#source-model
    source_type: design-inference
    relevance: Defines the local audit fields that bind a human approval to an approver, time, exact operation, and argument digest.
source_claims:
  - id: claim-openai-hitl
    source: openai-hitl
    supports: When a tool invocation needs approval, the SDK records a concrete interruption and does not execute it. The application resolves that exact interruption as approved or rejected in run state before resuming; this local approval evidence must therefore remain call- and argument-specific.
    locator: "Approval flow"
    evidence_kind: official-doc
    confidence: high
  - id: claim-human-approval-evidence-schema
    source: moonweave-local-approval-evidence
    supports: Moonweave design inference records approver_reference and approved_at as local audit evidence while preserving the SDK interruption's exact call and argument binding; these local fields are not OpenAI SDK item fields.
    locator: "Moonweave local approval-evidence profile"
    evidence_kind: design-inference
    confidence: high
