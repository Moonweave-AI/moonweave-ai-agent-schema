sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-safety-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 XACML 3.0、NIST SP 800-162、OAuth/MCP 授权与 Cursor 工具批准模式逐项人工语义核验；三值策略决定与授权闭环成立。
    en: Manually verified against XACML 3.0, NIST SP 800-162, OAuth/MCP authorization, and Cursor-style tool approval; three-valued policy decisions and authorization loop hold.
    ja: XACML 3.0、NIST SP 800-162、OAuth/MCP authorization、Cursor-style tool approval に照らし手動意味審査を完了しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-policy-specification-001
    source: eng-policy-xacml-3
    supports: XACML normatively separates a policy and its rules, targets or conditions, Permit or Deny effects, obligations, decision values, and rule or policy combining algorithms.
    locator: "OASIS XACML 3.0 Core, Sections 3, 5 and 7.11-7.18: policy model, rule evaluation, decisions, obligations, and combining algorithms"
    evidence_kind: normative
    confidence: high
    review_status: accepted
  - id: claim-policy-specification-002
    source: eng-policy-opa
    supports: OPA documents structured input evaluated against policy and data to produce a policy decision, while enforcement remains the caller's responsibility.
    locator: Open Policy Agent documentation > What is OPA? > policy input, evaluation, decision output, and separation from enforcement
    evidence_kind: official
    confidence: high
    review_status: accepted
