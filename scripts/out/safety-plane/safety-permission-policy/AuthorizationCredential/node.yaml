schema: moonweave.ai/ontology-node/v1
id: AuthorizationCredential
kind: concept
status: accepted
labels: {zh: 本地授权凭证 profile, en: Local authorization credential profile, ja: ローカル認可クレデンシャル profile}
semantics:
  short_definition: {zh: "由 Moonweave 本地授权服务签发并可验证的、具有持有者、范围和有效期的访问凭证 profile。", en: "A Moonweave-local, verifiable access-credential profile with a holder, scope, and validity window.", ja: "保持者、範囲、有効期間を持つ、Moonweave ローカルで検証可能なアクセス・クレデンシャル profile。"}
  definition: {zh: "AuthorizationCredential 是 Moonweave 的本地授权凭证 profile：它在有效窗口内把已验证持有者与已授权范围绑定，并保留验证引用。它不是 OAuth 2.0 RFC 6749 的 authorization grant、PolicyDecision、HumanApproval、PermissionResponse 或工具执行。", en: "AuthorizationCredential is a Moonweave-local authorization-credential profile: it binds a verified holder to an authorized scope during an effective window and retains a verification reference. It is not an OAuth 2.0 RFC 6749 authorization grant, PolicyDecision, HumanApproval, PermissionResponse, or tool execution.", ja: "AuthorizationCredential は Moonweave ローカルの認可クレデンシャル profile である。有効期間中に検証済み保持者を認可済み範囲へ結び付け、検証参照を保持する。OAuth 2.0 RFC 6749 の authorization grant、PolicyDecision、HumanApproval、PermissionResponse、ツール実行ではない。"}
  why_needed: {zh: "策略结论之外，资源服务还需要可验证的持有者、范围、生效和到期证据，才能在每次受保护访问前做本地检查。", en: "Beyond a policy conclusion, a resource service needs verifiable holder, scope, effective-time, and expiry evidence before each protected access.", ja: "ポリシー結論に加え、リソースサービスは保護アクセスごとに検査できる検証可能な保持者、範囲、有効開始、失効の証拠を必要とする。"}
  includes: [{zh: "本地凭证标识、持有者、授权范围、生效时间、到期时间、验证引用和签发依据。", en: "Local credential ID, holder, authorized scope, effective time, expiry, verification reference, and issuance basis.", ja: "ローカル credential ID、保持者、認可範囲、有効開始、失効、検証参照、発行根拠。"}]
  excludes: [{zh: "RFC 6749 中用于取得访问令牌的 authorization grant，或允许决定本身。", en: "An RFC 6749 authorization grant used to obtain an access token, or an allow decision itself.", ja: "アクセストークン取得に用いる RFC 6749 authorization grant、または許可判断そのもの。"}]
  semantic_kind: local-profile
  aliases: [local-authorization-credential, local-access-credential]
engineering:
  explanation: {zh: "本地授权服务仅在有效 AllowDecision 及独立身份、范围检查后签发此 profile。资源服务在每次访问时验证 holder_reference、authorized_scope、effective_at、expires_at 和 verification_reference；profile 不能被发送为 OAuth 或 MCP 原生令牌。", en: "A local authorization service issues this profile only after a valid AllowDecision plus independent identity and scope checks. A resource service validates holder_reference, authorized_scope, effective_at, expires_at, and verification_reference on each access; this profile cannot be sent as an OAuth or MCP-native token.", ja: "ローカル認可サービスは有効な AllowDecision と独立した ID・範囲検査の後にだけこの profile を発行する。リソースサービスはアクセスごとに holder_reference、authorized_scope、effective_at、expires_at、verification_reference を検証する。この profile は OAuth または MCP ネイティブ token として送信できない。"}
  typical_input:
    - description: {zh: "有效的策略允许结论及经过验证的本地持有者。", en: "A valid policy allow conclusion and verified local holder.", ja: "有効なポリシー許可結論と検証済みローカル保持者。"}
      format: '{"allow_decision_id":"allow-1","holder_reference":"agent-001","authorized_scope":"workspace.write"}'
      source_claims: [claim-local-authorization-credential-profile]
  typical_output:
    - description: {zh: "带生效、到期和验证引用的本地凭证 profile。", en: "A local credential profile with effective, expiry, and verification references.", ja: "有効開始、失効、検証参照を持つローカル credential profile。"}
      format: '{"authorization_credential_id":"credential-1","holder_reference":"agent-001","authorized_scope":"workspace.write","effective_at":"2026-07-19T04:00:00Z","expires_at":"2026-07-19T04:30:00Z","verification_reference":"authz://credential-1"}'
      source_claims: [claim-local-authorization-credential-profile]
  reference_implementations:
    - name: Model Context Protocol Authorization
      url: https://modelcontextprotocol.io/specification/2025-11-25/basic/authorization
      description: Documents OAuth-based authorization for MCP HTTP transports, including protected-resource and scope constraints.
    - name: NIST SP 800-207 Zero Trust Architecture
      url: https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-207.pdf
      description: Describes dynamically verified access decisions before resource access.
structure:
  identity_keys: [authorization_credential_id]
  fields:
    - id: authorization_credential_id
      labels: {zh: 本地授权凭证标识符, en: Local authorization credential ID, ja: ローカル認可クレデンシャル ID}
      definitions: {zh: "本地 profile 中一个可验证授权凭证的稳定标识符。", en: "Stable identifier for one verifiable authorization credential in the local profile.", ja: "ローカル profile 内の一つの検証可能な認可 credential の安定識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: credential-1
      allowed_values: []
      source_claims: [claim-local-authorization-credential-profile]
    - id: holder_reference
      labels: {zh: 凭证持有者引用, en: Credential holder reference, ja: クレデンシャル保持者参照}
      definitions: {zh: "经外部身份层验证、可使用该本地凭证的主体引用。", en: "Reference to the principal verified by an external identity layer that may use this local credential.", ja: "外部 ID 層で検証され、このローカル credential を利用できる主体への参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: agent-001
      allowed_values: []
      source_claims: [claim-local-authorization-credential-profile]
    - id: authorized_scope
      labels: {zh: 已授权范围, en: Authorized scope, ja: 認可済み範囲}
      definitions: {zh: "该 profile 在有效期内允许持有者使用的最小访问范围。", en: "Least-privilege access scope this profile permits its holder to use during its validity window.", ja: "この profile が有効期間中に保持者へ許可する最小権限アクセス範囲。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: workspace.write
      allowed_values: []
      source_claims: [claim-mcp-scope-boundary, claim-local-authorization-credential-profile]
    - id: effective_at
      labels: {zh: 生效时间, en: Effective at, ja: 有効開始時刻}
      definitions: {zh: "本地资源服务可开始接受该 profile 的时间。", en: "Time from which a local resource service may accept this profile.", ja: "ローカル resource service がこの profile を受け入れ始められる時刻。"}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '2026-07-19T04:00:00Z'
      allowed_values: []
      source_claims: [claim-local-authorization-credential-profile]
    - id: expires_at
      labels: {zh: 到期时间, en: Expires at, ja: 失効時刻}
      definitions: {zh: "本地资源服务不再接受该 profile 的时间。", en: "Time after which a local resource service must no longer accept this profile.", ja: "ローカル resource service がこの profile を受け入れてはならない時刻。"}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '2026-07-19T04:30:00Z'
      allowed_values: []
      source_claims: [claim-local-authorization-credential-profile]
    - id: verification_reference
      labels: {zh: 验证引用, en: Verification reference, ja: 検証参照}
      definitions: {zh: "本地验证器用于检查此凭证的签发状态、撤销状态或密钥材料的非秘密引用。", en: "Non-secret reference a local verifier uses to check issuance, revocation, or key material for this credential.", ja: "ローカル verifier がこの credential の発行状態、撤回状態、鍵素材を検査するために使う非秘密参照。"}
      datatype: uri
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^authz://.+'
      example_value: authz://credential-1
      allowed_values: []
      source_claims: [claim-local-authorization-credential-profile]
    - id: allow_decision_id
      labels: {zh: 允许决定标识符, en: Allow decision ID, ja: 許可判断 ID}
      definitions: {zh: "作为本地凭证签发依据的有效 AllowDecision 标识符。", en: "Identifier of the valid AllowDecision used as this local credential's issuance basis.", ja: "このローカル credential の発行根拠に用いた有効な AllowDecision の識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: allow-1
      allowed_values: []
      source_claims: [claim-local-authorization-credential-profile]
  constraints:
    - id: local-authorization-credential-is-verifiable-and-bounded
      severity: error
      expression_language: plain
      expression: An AuthorizationCredential must identify one holder_reference, non-empty authorized_scope, effective_at, expires_at after effective_at, verification_reference, and issuance-basis allow_decision_id; it is a Moonweave-local profile and must not be represented as an RFC 6749 authorization grant or protocol-native token.
      explanation: {zh: "持有者、范围、有效窗口和验证引用使本地凭证可在访问前复核，而不冒充 OAuth 工件。", en: "Holder, scope, validity window, and verification reference make the local credential checkable before access without impersonating an OAuth artifact.", ja: "保持者、範囲、有効期間、検証参照により、OAuth artifact を装わずにアクセス前にローカル credential を検査できる。"}
      source_claims: [claim-mcp-scope-boundary, claim-local-authorization-credential-profile]
  required_relations: []
examples:
  
- id: local-credential-positive-workspace-write
    kind: positive
    labels: {zh: 有效工作区写入凭证, en: Valid workspace-write credential, ja: 有効なワークスペース書込み credential}
    descriptions: {zh: "MCP Authorization（2025-11-25）将访问令牌绑定到 HTTP 传输的预期 resource 参数与所需 scope。", en: "MCP Authorization (2025-11-25) binds access tokens to the intended resource parameter and required scopes for HTTP transports.", ja: "MCP Authorization は HTTP transport の intended resource と required scope に access token を結び付ける。"}
    field_values: {authorization_credential_id: credential-1, holder_reference: agent-001, authorized_scope: workspace.write, effective_at: '2026-07-19T04:00:00Z', expires_at: '2026-07-19T04:30:00Z', verification_reference: authz://credential-1, allow_decision_id: allow-1}
    related_node_ids: [AllowDecision, AuthorizationCredential]
    related_relation_ids: [AuthorizationCredential-issued-after-AllowDecision]
    expected_result: {zh: "资源服务可在有效窗口内验证并接受该本地 profile。", en: "The resource service can verify and accept the local profile during its effective window.", ja: "resource service は有効期間内にローカル profile を検証して受け入れられる。"}
    why_valid_or_invalid: {zh: "认证证明身份；MCP scope 验证是独立的授权步骤。", en: "Authentication proves identity; MCP scope validation is a separate authorization step.", ja: "認証は ID を証明する。MCP scope validation は独立した認可ステップである。"}
    synthetic: false
    source_claims: [claim-local-authorization-credential-profile]
  - id: local-credential-counter-oauth-grant
    kind: counterexample
    labels: {zh: 把本地凭证称为 OAuth grant, en: Mislabel local credential as OAuth grant, ja: ローカル credential を OAuth grant と誤記する}
    descriptions: {zh: "MCP Authorization（2025-11-25）将访问令牌绑定到 HTTP 传输的预期 resource 参数与所需 scope。", en: "MCP Authorization (2025-11-25) binds access tokens to the intended resource parameter and required scopes for HTTP transports.", ja: "MCP Authorization は HTTP transport の intended resource と required scope に access token を結び付ける。"}
    field_values: {authorization_credential_id: credential-2, holder_reference: agent-002, authorized_scope: workspace.read, effective_at: '2026-07-19T04:00:00Z', expires_at: '2026-07-19T05:00:00Z', verification_reference: authz://credential-2, allow_decision_id: allow-2}
    related_node_ids: [AuthorizationCredential]
    related_relation_ids: []
    expected_result: {zh: "拒绝该术语；该对象是 Moonweave 本地 profile。", en: "Reject the term; the object is a Moonweave-local profile.", ja: "その用語を拒否する。対象は Moonweave ローカル profile である。"}
    why_valid_or_invalid: {zh: "认证证明身份；MCP scope 验证是独立的授权步骤。", en: "Authentication proves identity; MCP scope validation is a separate authorization step.", ja: "認証は ID を証明する。MCP scope validation は独立した認可ステップである。"}
    synthetic: false
    source_claims: [claim-local-authorization-credential-profile]
  - id: local-credential-boundary-allow-decision
    kind: boundary
    labels: {zh: 允许决定与凭证边界, en: Allow-decision credential boundary, ja: 許可判断と credential の境界}
    descriptions: {zh: "MCP Authorization（2025-11-25）将访问令牌绑定到 HTTP 传输的预期 resource 参数与所需 scope。", en: "MCP Authorization (2025-11-25) binds access tokens to the intended resource parameter and required scopes for HTTP transports.", ja: "MCP Authorization は HTTP transport の intended resource と required scope に access token を結び付ける。"}
    field_values: {authorization_credential_id: credential-3, holder_reference: agent-003, authorized_scope: deployment.read, effective_at: '2026-07-19T04:00:00Z', expires_at: '2026-07-19T04:15:00Z', verification_reference: authz://credential-3, allow_decision_id: allow-3}
    related_node_ids: [AllowDecision, PolicyDecision]
    related_relation_ids: [AuthorizationCredential-issued-after-AllowDecision]
    expected_result: {zh: "保留决定和本地凭证两个独立记录。", en: "Keep the decision and local credential as separate records.", ja: "判断とローカル credential を別々の記録として保持する。"}
    why_valid_or_invalid: {zh: "认证证明身份；MCP scope 验证是独立的授权步骤。", en: "Authentication proves identity; MCP scope validation is a separate authorization step.", ja: "認証は ID を証明する。MCP scope validation は独立した認可ステップである。"}
    synthetic: false
    source_claims: [claim-local-authorization-credential-profile]
  - id: local-credential-instance-expired
    kind: instance
    labels: {zh: 已到期本地凭证, en: Expired local credential, ja: 失効済みローカル credential}
    descriptions: {zh: "MCP Authorization（2025-11-25）将访问令牌绑定到 HTTP 传输的预期 resource 参数与所需 scope。", en: "MCP Authorization (2025-11-25) binds access tokens to the intended resource parameter and required scopes for HTTP transports.", ja: "MCP Authorization は HTTP transport の intended resource と required scope に access token を結び付ける。"}
    field_values: {authorization_credential_id: credential-4, holder_reference: agent-004, authorized_scope: export.once, effective_at: '2026-07-19T03:00:00Z', expires_at: '2026-07-19T03:05:00Z', verification_reference: authz://credential-4, allow_decision_id: allow-4}
    related_node_ids: [AuthorizationEvent, AuthorizationCredential]
    related_relation_ids: []
    expected_result: {zh: "过期 profile 不得用于后续受保护访问。", en: "The expired profile must not be used for later protected access.", ja: "失効した profile を後続の保護アクセスに使用してはならない。"}
    why_valid_or_invalid: {zh: "认证证明身份；MCP scope 验证是独立的授权步骤。", en: "Authentication proves identity; MCP scope validation is a separate authorization step.", ja: "認証は ID を証明する。MCP scope validation は独立した認可ステップである。"}
    synthetic: false
    source_claims: [claim-local-authorization-credential-profile]
  - id: AuthorizationCredential-real-counterexample-2
    kind: counterexample
    labels: {zh: "AuthorizationCredential counterexample case", en: "AuthorizationCredential counterexample case", ja: "AuthorizationCredential counterexample case"}
    descriptions: {zh: "Amazon Cedar 评估 principal-action-resource-context 请求并返回 Allow 或 Deny 及诊断信息。", en: "Amazon Cedar evaluates principal-action-resource-context requests and returns Allow or Deny with diagnostics (docs.cedarpolicy.com/auth/authorization.html).", ja: "Amazon Cedar は principal-action-resource-context 要求を評価し Allow/Deny と diagnostics を返す。"}
    field_values:
      allow_decision_id: allow-1
      authorization_credential_id: credential-1
      authorized_scope: workspace.write
      effective_at: "'2026-07-19T04:00:00Z'"
      expires_at: "'2026-07-19T04:30:00Z'"
      holder_reference: agent-001
      verification_reference: "authz://credential-1"
    related_node_ids: [AuthorizationCredential]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "Cedar 授权与 HumanApproval 记录的用户界面工具批准不同。", en: "Cedar authorization is distinct from UI tool approval recorded by HumanApproval.", ja: "Cedar 認可は HumanApproval が記録する UI ツール承認とは別である。"}
    synthetic: false
    source_claims:
      - claim-mcp-scope-boundary
  - id: AuthorizationCredential-real-boundary-3
    kind: boundary
    labels: {zh: "AuthorizationCredential boundary case", en: "AuthorizationCredential boundary case", ja: "AuthorizationCredential boundary case"}
    descriptions: {zh: "NIST SP 800-207 定义零信任：不因网络位置隐式信任；访问资源前离散认证与授权。", en: "NIST SP 800-207 defines zero trust: no implicit trust by network location; discrete authentication and authorization before resource access.", ja: "NIST SP 800-207 は network location による implicit trust なし、resource access 前の discrete 認証・認可を定義する。"}
    field_values:
      allow_decision_id: allow-1
      authorization_credential_id: credential-1
      authorized_scope: workspace.write
      effective_at: "'2026-07-19T04:00:00Z'"
      expires_at: "'2026-07-19T04:30:00Z'"
      holder_reference: agent-001
      verification_reference: "authz://credential-1"
    related_node_ids: [AuthorizationCredential]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "NIST 区分策略引擎（决策）与策略执行点；信任边界映射这一分离。", en: "NIST separates policy engine (decision) from policy enforcement point; trust boundaries map to this split.", ja: "NIST は policy engine と PEP を分離する。trust boundary はこの分離に対応する。"}
    synthetic: false
    source_claims:
      - claim-mcp-scope-boundary
  - id: AuthorizationCredential-real-instance-4
    kind: instance
    labels: {zh: "AuthorizationCredential instance case", en: "AuthorizationCredential instance case", ja: "AuthorizationCredential instance case"}
    descriptions: {zh: "Open Policy Agent Rego 评估 input 与 data 文档；除非规则显式 allow，否则 default deny。", en: "Open Policy Agent Rego evaluates input and data documents; default deny applies unless a rule explicitly allows (openpolicyagent.org/docs/policy-language).", ja: "Open Policy Agent Rego は input/data 文書を評価し、明示 allow がなければ default deny。"}
    field_values:
      allow_decision_id: allow-1
      authorization_credential_id: credential-1
      authorized_scope: workspace.write
      effective_at: "'2026-07-19T04:00:00Z'"
      expires_at: "'2026-07-19T04:30:00Z'"
      holder_reference: agent-001
      verification_reference: "authz://credential-1"
    related_node_ids: [AuthorizationCredential]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "OPA 产生 allow/deny 决定；不执行沙箱代码。", en: "OPA produces allow/deny decisions; it does not execute sandboxed code.", ja: "OPA は allow/deny 判断を生成する。サンドボックス code は実行しない。"}
    synthetic: false
    source_claims:
      - claim-mcp-scope-boundary
parent_relation: null
relations:
  - id: AuthorizationCredential-issued-after-AllowDecision
    predicate: is_issued_after
    target: entity:AllowDecision
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: association
    labels: {zh: 基于允许决定签发, en: is issued after allow decision, ja: 許可判断の後に発行される}
    definitions: {zh: "该本地凭证 profile 记录它在一个有效 AllowDecision 之后被本地服务签发；该关联不把它等同为该决定或 OAuth grant。", en: "This local credential profile records that a local service issued it after a valid AllowDecision; the association does not equate it with that decision or an OAuth grant.", ja: "このローカル credential profile は、有効な AllowDecision の後にローカルサービスが発行したことを記録する。この関連はそれを判断または OAuth grant と同一視しない。"}
    cardinality: {source: {min: 1, max: 1}, target: {min: 0, max: null}}
    source_claims: [claim-local-authorization-credential-profile]
    layout_role: cross-link
sources:
  - id: mcp-authorization-2025
    title: Model Context Protocol Authorization
    url: https://modelcontextprotocol.io/specification/2025-11-25/basic/authorization
    source_type: official-specification
    relevance: Documents protected-resource and scope constraints for OAuth-based MCP HTTP authorization.
  - id: nist-sp800-207
    title: NIST SP 800-207 Zero Trust Architecture
    url: https://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-207.pdf
    source_type: government-publication
    relevance: Describes dynamically verified access decisions before resource access.
  - id: moonweave-local-authorization-credential
    title: Moonweave local authorization-credential profile
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema#source-model
    source_type: design-inference
    relevance: Defines a local credential audit profile and explicitly distinguishes it from OAuth grants and native tokens.
source_claims:
  - id: claim-mcp-scope-boundary
    source: mcp-authorization-2025
    supports: MCP HTTP authorization uses OAuth-based access tokens constrained to intended protected resources and scopes; it does not define Moonweave's local credential profile.
