schema: moonweave.ai/ontology-node/v1
id: PolicyEvaluation
kind: concept
status: accepted
labels: {zh: 策略评估, en: Policy Evaluation, ja: ポリシー評価}
semantics:
  short_definition: {zh: "将 AuthorizationRequest 与版本化 PolicySpecification 进行匹配以产生 PolicyDecision 的计算活动。", en: "A computation activity that matches an AuthorizationRequest against a versioned PolicySpecification to produce a PolicyDecision.", ja: "AuthorizationRequest を版管理された PolicySpecification と照合して PolicyDecision を生成する計算活動。"}
  definition: {zh: "PolicyEvaluation 是基于请求和规则形成 allow 或 deny 授权结论的活动。它不是 AuthorizationRequest、PolicyDecision、AuthorizationCredential 或由运行时适配器实施的副作用。", en: "PolicyEvaluation is the activity that forms an allow-or-deny authorization conclusion from a request and rules. It is not an AuthorizationRequest, PolicyDecision, AuthorizationCredential, or side effect enforced by a runtime adapter.", ja: "PolicyEvaluation は要求と規則から allow/deny の認可結論を形成する活動である。AuthorizationRequest、PolicyDecision、AuthorizationCredential、または runtime adapter が強制する副作用ではない。"}
  why_needed: {zh: "分离评估过程、决策结果和执行可使每一步都可审计，并避免把规则匹配误认为实际授权。", en: "Separating evaluation process, decision result, and execution makes each step auditable and prevents mistaking rule matching for actual authorization.", ja: "評価過程、判断結果、実行を分離すると各段階を監査可能にし、規則照合を実際の認可と誤認するのを防ぐ。"}
  includes: [{zh: "请求引用、策略版本、适用规则、合并算法和评估时间。", en: "Request reference, policy version, applicable rules, combining algorithm, and evaluation time.", ja: "要求参照、ポリシー版、適用規則、結合アルゴリズム、評価時刻。"}]
  excludes: [{zh: "用户同意、本地授权凭证或工具调用的真实执行。", en: "User consent, a local authorization credential, or real execution of a tool call.", ja: "ユーザー同意、ローカル authorization credential、またはツール呼出しの実際の実行。"}]
  semantic_kind: activity
  aliases: [authorization-policy-evaluation]
engineering:
  explanation: {zh: "策略引擎接收结构化请求，装载固定策略版本和合并算法，并生成可追溯的 allow 或 deny 决定。ToolApprovalRequirement 可静态声明运行时还须独立检查的凭证、批准和安全证据。", en: "A policy engine receives structured requests, loads a fixed policy version and combiner, and produces traceable allow-or-deny decisions. ToolApprovalRequirement may statically declare credential, approval, and safety evidence runtime must still check independently.", ja: "ポリシーエンジンは構造化要求を受け、固定ポリシー版と結合器を読み込み、追跡可能な allow/deny 判断を生成する。ToolApprovalRequirement はランタイムが独立して検査すべき credential、承認、安全証拠を静的に宣言できる。"}
  typical_input:
    - description: {zh: "待评估的授权请求和策略版本。", en: "Authorization request and policy version to evaluate.", ja: "評価する認可要求とポリシー版。"}
      format: '{"authorization_request_id":"request-1","policy_specification_id":"policy-12","evaluated_policy_version":"12"}'
      source_claims: [claim-cedar-evaluation-decision, claim-opa-policy-evaluation-inference]
  typical_output:
    - description: {zh: "带适用规则证据的策略决定。", en: "Policy decision with applicable-rule evidence.", ja: "適用規則証拠を持つポリシー判断。"}
      format: '{"policy_evaluation_id":"eval-1","authorization_request_id":"request-1","policy_specification_id":"policy-12","evaluated_policy_version":"12","policy_decision_id":"decision-1","decision_effect":"allow"}'
      source_claims: [claim-cedar-evaluation-decision, claim-opa-policy-evaluation-inference]
  reference_implementations:
    - name: Open Policy Agent policy language
      url: https://www.openpolicyagent.org/docs/policy-language
      description: Documents policy evaluation over structured input.
    - name: Cedar authorization guide
      url: https://docs.cedarpolicy.com/auth/authorization.html
      description: Documents an authorizer evaluating policies for a principal-action-resource-context request and returning an allow or deny response.
structure:
  identity_keys: [policy_evaluation_id]
  fields:
    - id: policy_evaluation_id
      labels: {zh: 策略评估标识符, en: Policy evaluation ID, ja: ポリシー評価 ID}
      definitions: {zh: "一次可重现策略计算的稳定标识符。", en: "Stable identifier for one reproducible policy computation.", ja: "一つの再現可能なポリシー計算の安定した識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: eval-1
      allowed_values: []
      source_claims: [claim-opa-policy-evaluation-inference]
    - id: authorization_request_id
      labels: {zh: 授权请求标识符, en: Authorization request ID, ja: 認可要求 ID}
      definitions: {zh: "本次评估消费的 AuthorizationRequest 标识符。", en: "Identifier of the AuthorizationRequest consumed by this evaluation.", ja: "この評価で消費する AuthorizationRequest の識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: request-1
      allowed_values: []
      source_claims: [claim-cedar-evaluation-decision]
    - id: policy_specification_id
      labels: {zh: 策略规范标识符, en: Policy specification ID, ja: ポリシー仕様 ID}
      definitions: {zh: "本次评估所应用的版本化 PolicySpecification 标识符。", en: "Identifier of the versioned PolicySpecification applied by this evaluation.", ja: "この評価で適用する版管理された PolicySpecification の識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: policy-12
      allowed_values: []
      source_claims: [claim-opa-policy-evaluation-inference]
    - id: evaluated_policy_version
      labels: {zh: 已评估策略版本, en: Evaluated policy version, ja: 評価済みポリシー版}
      definitions: {zh: "用于该次决策的不可变策略修订。", en: "Immutable policy revision used for this decision.", ja: "この判断に使用された不変ポリシー改訂。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[0-9]+$'
      example_value: '12'
      allowed_values: []
      source_claims: [claim-opa-policy-evaluation-inference]
    - id: policy_decision_id
      labels: {zh: 策略决定标识符, en: Policy decision ID, ja: ポリシー判断 ID}
      definitions: {zh: "本次评估生成的独立 PolicyDecision 标识符。", en: "Identifier of the separate PolicyDecision generated by this evaluation.", ja: "この評価が生成する独立した PolicyDecision の識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: decision-1
      allowed_values: []
      source_claims: [claim-cedar-evaluation-decision]
  constraints:
    - id: policy-evaluation-request-version
      severity: error
      expression_language: plain
      expression: A PolicyEvaluation must identify one authorization_request_id, policy_specification_id, immutable evaluated_policy_version, and separate policy_decision_id; it must not grant, collect user response, or execute access.
      explanations: {zh: "评估形成结论，授权工件创建和执行是后续独立步骤。", en: "Evaluation forms a conclusion; grant creation and execution are later independent steps.", ja: "評価は結論を形成し、付与作成と実行は後続の独立段階である。"}
      explanation: {zh: "评估形成结论，授权工件创建和执行是后续独立步骤。", en: "Evaluation forms a conclusion; grant creation and execution are later independent steps.", ja: "評価は結論を形成し、付与作成と実行は後続の独立段階である。"}
      source_claims: [claim-cedar-evaluation-decision, claim-opa-policy-evaluation-inference]
  required_relations: []
examples:
  
- id: evaluation-positive-write
    kind: positive
    labels: {zh: 工作区写入评估, en: Workspace-write evaluation, ja: ワークスペース書込み評価}
    descriptions: {zh: "Open Policy Agent Rego 评估 input 与 data 文档；除非规则显式 allow，否则 default deny。", en: "Open Policy Agent Rego evaluates input and data documents; default deny applies unless a rule explicitly allows (openpolicyagent.org/docs/policy-language).", ja: "Open Policy Agent Rego は input/data 文書を評価し、明示 allow がなければ default deny。"}
    field_values: {policy_evaluation_id: eval-1, authorization_request_id: request-1, policy_specification_id: policy-12, evaluated_policy_version: '12', policy_decision_id: decision-1}
    related_node_ids: [AuthorizationRequest, PolicyDecision]
    related_relation_ids: [PolicyEvaluation-used-PolicySpecification]
    expected_result: {zh: "保存规则和版本证据。", en: "Retain rule and version evidence.", ja: "規則と版の証拠を保持する。"}
    why_valid_or_invalid: {zh: "OPA 产生 allow/deny 决定；不执行沙箱代码。", en: "OPA produces allow/deny decisions; it does not execute sandboxed code.", ja: "OPA は allow/deny 判断を生成する。サンドボックス code は実行しない。"}
    synthetic: false
    source_claims: [claim-cedar-evaluation-decision, claim-opa-policy-evaluation-inference]
  - id: evaluation-counter-gate
    kind: counterexample
    labels: {zh: 工具闸门检查, en: Tool-gate check, ja: ツールゲート検査}
    descriptions: {zh: "Open Policy Agent Rego 评估 input 与 data 文档；除非规则显式 allow，否则 default deny。", en: "Open Policy Agent Rego evaluates input and data documents; default deny applies unless a rule explicitly allows (openpolicyagent.org/docs/policy-language).", ja: "Open Policy Agent Rego は input/data 文書を評価し、明示 allow がなければ default deny。"}
    field_values: {policy_evaluation_id: eval-2, authorization_request_id: request-2, policy_specification_id: policy-12, evaluated_policy_version: '12', policy_decision_id: decision-2}
    related_node_ids: [ToolApprovalRequirement]
    related_relation_ids: []
    expected_result: {zh: "拒绝策略评估分类。", en: "Reject the policy-evaluation classification.", ja: "ポリシー評価分類を拒否する。"}
    why_valid_or_invalid: {zh: "OPA 产生 allow/deny 决定；不执行沙箱代码。", en: "OPA produces allow/deny decisions; it does not execute sandboxed code.", ja: "OPA は allow/deny 判断を生成する。サンドボックス code は実行しない。"}
    synthetic: false
    source_claims: [claim-cedar-evaluation-decision]
  - id: evaluation-boundary-decision
    kind: boundary
    labels: {zh: 评估与决定边界, en: Evaluation-decision boundary, ja: 評価と判断の境界}
    descriptions: {zh: "Open Policy Agent Rego 评估 input 与 data 文档；除非规则显式 allow，否则 default deny。", en: "Open Policy Agent Rego evaluates input and data documents; default deny applies unless a rule explicitly allows (openpolicyagent.org/docs/policy-language).", ja: "Open Policy Agent Rego は input/data 文書を評価し、明示 allow がなければ default deny。"}
    field_values: {policy_evaluation_id: eval-3, authorization_request_id: request-3, policy_specification_id: policy-12, evaluated_policy_version: '12', policy_decision_id: decision-3}
    related_node_ids: [PolicyDecision]
    related_relation_ids: []
    expected_result: {zh: "分别保存过程与结果。", en: "Store process and result separately.", ja: "過程と結果を別々に保存する。"}
    why_valid_or_invalid: {zh: "OPA 产生 allow/deny 决定；不执行沙箱代码。", en: "OPA produces allow/deny decisions; it does not execute sandboxed code.", ja: "OPA は allow/deny 判断を生成する。サンドボックス code は実行しない。"}
    synthetic: false
    source_claims: [claim-cedar-evaluation-decision]
  - id: evaluation-instance-egress
    kind: instance
    labels: {zh: 出口请求评估实例, en: Egress-request evaluation instance, ja: 出口要求評価の実例}
    descriptions: {zh: "Open Policy Agent Rego 评估 input 与 data 文档；除非规则显式 allow，否则 default deny。", en: "Open Policy Agent Rego evaluates input and data documents; default deny applies unless a rule explicitly allows (openpolicyagent.org/docs/policy-language).", ja: "Open Policy Agent Rego は input/data 文書を評価し、明示 allow がなければ default deny。"}
    field_values: {policy_evaluation_id: eval-4, authorization_request_id: request-4, policy_specification_id: policy-12, evaluated_policy_version: '12', policy_decision_id: decision-4}
    related_node_ids: [NetworkPolicy, DenyDecision]
    related_relation_ids: []
    expected_result: {zh: "将拒绝结论交给后续闸门。", en: "Pass the deny conclusion to the later gate.", ja: "拒否結論を後続のゲートへ渡す。"}
    why_valid_or_invalid: {zh: "OPA 产生 allow/deny 决定；不执行沙箱代码。", en: "OPA produces allow/deny decisions; it does not execute sandboxed code.", ja: "OPA は allow/deny 判断を生成する。サンドボックス code は実行しない。"}
    synthetic: false
    source_claims: [claim-cedar-evaluation-decision]
  - id: PolicyEvaluation-real-counterexample-2
    kind: counterexample
    labels: {zh: "PolicyEvaluation counterexample case", en: "PolicyEvaluation counterexample case", ja: "PolicyEvaluation counterexample case"}
    descriptions: {zh: "Amazon Cedar 评估 principal-action-resource-context 请求并返回 Allow 或 Deny 及诊断信息。", en: "Amazon Cedar evaluates principal-action-resource-context requests and returns Allow or Deny with diagnostics (docs.cedarpolicy.com/auth/authorization.html).", ja: "Amazon Cedar は principal-action-resource-context 要求を評価し Allow/Deny と diagnostics を返す。"}
    field_values:
      authorization_request_id: request-1
      evaluated_policy_version: '12'
      policy_decision_id: decision-1
      policy_evaluation_id: eval-1
      policy_specification_id: policy-12
    related_node_ids: [PolicyEvaluation]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "Cedar 授权与 HumanApproval 记录的用户界面工具批准不同。", en: "Cedar authorization is distinct from UI tool approval recorded by HumanApproval.", ja: "Cedar 認可は HumanApproval が記録する UI ツール承認とは別である。"}
    synthetic: false
    source_claims:
      - claim-opa-policy-evaluation-inference
  - id: PolicyEvaluation-real-boundary-3
    kind: boundary
    labels: {zh: "PolicyEvaluation boundary case", en: "PolicyEvaluation boundary case", ja: "PolicyEvaluation boundary case"}
    descriptions: {zh: "Envoy ext_authz 过滤器在上游请求前调用授权服务。", en: "Envoy ext_authz filter calls an authorization service before allowing upstream requests (envoyproxy.io ext_authz documentation).", ja: "Envoy ext_authz filter は upstream request 前に authorization service を呼ぶ。"}
    field_values:
      authorization_request_id: request-1
      evaluated_policy_version: '12'
      policy_decision_id: decision-1
      policy_evaluation_id: eval-1
      policy_specification_id: policy-12
    related_node_ids: [PolicyEvaluation]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "Envoy 在代理边界执行 PEP 决定；策略规则位于上游 OPA/Cedar。", en: "Envoy enforces PEP decisions at the proxy boundary; policy rules live in OPA/Cedar upstream.", ja: "Envoy は proxy boundary で PEP 判断を enforce する。"}
    synthetic: false
    source_claims:
      - claim-opa-policy-evaluation-inference
  - id: PolicyEvaluation-real-instance-4
    kind: instance
    labels: {zh: "PolicyEvaluation instance case", en: "PolicyEvaluation instance case", ja: "PolicyEvaluation instance case"}
    descriptions: {zh: "NIST SP 800-207 定义零信任：不因网络位置隐式信任；访问资源前离散认证与授权。", en: "NIST SP 800-207 defines zero trust: no implicit trust by network location; discrete authentication and authorization before resource access.", ja: "NIST SP 800-207 は network location による implicit trust なし、resource access 前の discrete 認証・認可を定義する。"}
    field_values:
      authorization_request_id: request-1
      evaluated_policy_version: '12'
      policy_decision_id: decision-1
      policy_evaluation_id: eval-1
      policy_specification_id: policy-12
    related_node_ids: [PolicyEvaluation]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "NIST 区分策略引擎（决策）与策略执行点；信任边界映射这一分离。", en: "NIST separates policy engine (decision) from policy enforcement point; trust boundaries map to this split.", ja: "NIST は policy engine と PEP を分離する。trust boundary はこの分離に対応する。"}
    synthetic: false
    source_claims:
      - claim-opa-policy-evaluation-inference
parent_relation: null
relations:
  - id: PolicyEvaluation-used-PolicySpecification
    predicate: used
    target: concept:PolicySpecification
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 使用策略规范, en: uses policy specification, ja: ポリシー仕様を使用する}
    definitions: {zh: "PolicyEvaluation 是使用指定版本 PolicySpecification 对请求形成结论的活动；该 PROV-O used 关联表示使用的规范，而非活动属于规范。", en: "PolicyEvaluation is the activity that uses a versioned PolicySpecification to form a conclusion for a request; this PROV-O used association denotes the specification consumed, not activity membership in the specification.", ja: "PolicyEvaluation は版管理された PolicySpecification を用いて要求の結論を形成する活動であり、この PROV-O used 関連は消費した仕様を表し、活動が仕様に所属することを表さない。"}
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: null}}
    source_claims: [claim-prov-o-use]
    layout_role: cross-link
sources:
  - id: opa-policy-language
    title: Open Policy Agent policy language
    url: https://www.openpolicyagent.org/docs/policy-language
    source_type: official-documentation
    relevance: Documents policy evaluation over structured input.
  - id: cedar-authorization
    title: Cedar authorization guide
    url: https://docs.cedarpolicy.com/auth/authorization.html
    source_type: official-documentation
    relevance: Documents an authorizer evaluating policies for a principal-action-resource-context request and returning allow or deny responses.
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: w3c-recommendation
    relevance: Defines the provenance relation used between an activity and the entity it consumes.
source_claims:
  - id: claim-opa-policy-evaluation-inference
    source: opa-policy-language
    supports: OPA documentation motivates versioned structured policy evaluation; it does not define this internal PolicyEvaluation schema.
    locator: "Policy language overview"
    evidence_kind: design-inference
    confidence: high
  - id: claim-cedar-evaluation-decision
    source: cedar-authorization
    supports: Cedar's Authorizer evaluates policies for a principal, action, resource, and context request and returns an allow or deny response with diagnostics. Moonweave records the evaluation activity and decision entity separately; Cedar does not define this exact internal schema.
    locator: "Authorization requests and responses"
    evidence_kind: design-inference
    confidence: high
  - id: claim-prov-o-use
    source: w3c-prov-o
    supports: PROV-O defines used as a relation in which an activity used an entity, and wasUsedBy as its inverse.
    locator: "Section 3.1.6 used"
    evidence_kind: normative-guidance
    confidence: high
