schema: moonweave.ai/ontology-node/v1
id: AuthorizationRequest
kind: concept
status: accepted
labels: {zh: 授权请求, en: Authorization Request, ja: 認可要求}
semantics:
  short_definition: {zh: "要求对指定主体、动作、资源和范围作出授权结论的结构化输入。", en: "Structured input asking for an authorization conclusion about a specified principal, action, resource, and scope.", ja: "指定主体、アクション、リソース、範囲について認可結論を求める構造化入力。"}
  definition: {zh: "AuthorizationRequest 是 PolicyEvaluation 的输入，表达待评估的访问或工具操作。它不是 PolicyDecision、AuthorizationCredential、用户同意或已执行的操作。", en: "AuthorizationRequest is input to PolicyEvaluation expressing an access or tool operation to assess. It is not a PolicyDecision, an AuthorizationCredential, user consent, or an operation already executed.", ja: "AuthorizationRequest は評価対象のアクセスまたはツール操作を表す PolicyEvaluation への入力である。PolicyDecision、AuthorizationCredential、ユーザー同意、またはすでに実行された操作ではない。"}
  why_needed: {zh: "将请求的主体、动作、资源和上下文结构化，可让策略评估一致且在副作用发生前进行。", en: "Structuring requested principal, action, resource, and context lets policy evaluation be consistent and occur before a side effect.", ja: "要求された主体、アクション、リソース、コンテキストを構造化すると、ポリシー評価を一貫させ副作用前に実行できる。"}
  includes: [{zh: "请求标识、主体引用、动作、资源、范围和请求上下文。", en: "Request ID, principal reference, action, resource, scope, and request context.", ja: "要求ID、主体参照、アクション、リソース、範囲、要求コンテキスト。"}]
  excludes: [{zh: "认证凭据验证、策略结果或能够直接执行的能力令牌。", en: "Authentication credential verification, a policy result, or a capability token usable directly for execution.", ja: "認証資格情報の検証、ポリシー結果、または実行に直接使える能力トークン。"}]
  semantic_kind: request
  aliases: [access-request]
engineering:
  explanation: {zh: "工具编排器在调用前构造请求，绑定已解析主体、目标资源和范围版本。策略引擎只读取请求并返回决定；授权服务随后单独决定是否创建授权工件。", en: "A tool orchestrator constructs a request before a call, binding resolved principal, target resource, and scope version. The policy engine only reads the request and returns a decision; an authorization service separately decides whether to create an artifact.", ja: "ツールオーケストレーターは呼出し前に、解決済み主体、対象リソース、範囲版を結び付けて要求を構築する。ポリシーエンジンは要求を読み判断を返すだけであり、認可サービスが工件を作成するかを別途決める。"}
  typical_input:
    - description: {zh: "调用前的主体、动作和资源信息。", en: "Principal, action, and resource information before a call.", ja: "呼出し前の主体、アクション、リソース情報。"}
      format: '{"principal_reference":"agent-7","requested_action":"file.write","resource_reference":"/workspace/a.txt","permission_scope_reference":"scope-1","request_context_reference":"context-1"}'
      source_claims: [claim-cedar-parc-request]
  typical_output:
    - description: {zh: "供评估服务消费的规范化请求。", en: "Normalized request for consumption by evaluation service.", ja: "評価サービスが消費する正規化要求。"}
      format: '{"authorization_request_id":"request-1","principal_reference":"agent-7","requested_action":"file.write","resource_reference":"/workspace/a.txt","permission_scope_reference":"scope-1","request_context_reference":"context-1"}'
      source_claims: [claim-cedar-parc-request]
  reference_implementations:
    - name: Open Policy Agent policy language
      url: https://www.openpolicyagent.org/docs/policy-language
      description: Documents policy evaluation over structured input.
    - name: Cedar authorization guide
      url: https://docs.cedarpolicy.com/auth/authorization.html
      description: Documents principal, action, resource, and context authorization requests and separate allow/deny responses.
structure:
  identity_keys: [authorization_request_id]
  fields:
    - id: authorization_request_id
      labels: {zh: 授权请求标识符, en: Authorization request ID, ja: 認可要求 ID}
      definitions: {zh: "一次待评估访问请求的稳定标识符。", en: "Stable identifier for one access request awaiting evaluation.", ja: "評価待ちの一つのアクセス要求の安定した識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: request-1
      allowed_values: []
      source_claims: [claim-opa-authorization-request-inference]
    - id: requested_action
      labels: {zh: 请求动作, en: Requested action, ja: 要求アクション}
      definitions: {zh: "主体希望在指定资源上执行的受控动作。", en: "Controlled action the principal seeks to perform on a specified resource.", ja: "主体が指定リソース上で実行しようとする制御されたアクション。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: file.write
      allowed_values: []
      source_claims: [claim-opa-authorization-request-inference]
    - id: principal_reference
      labels: {zh: 主体引用, en: Principal reference, ja: 主体参照}
      definitions: {zh: "已解析且被请求授权的主体引用。", en: "Reference to the resolved principal for which authorization is requested.", ja: "認可が要求される解決済み主体への参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: agent-7
      allowed_values: []
      source_claims: [claim-cedar-parc-request]
    - id: resource_reference
      labels: {zh: 资源引用, en: Resource reference, ja: リソース参照}
      definitions: {zh: "请求动作所针对的已解析资源引用。", en: "Reference to the resolved resource targeted by the requested action.", ja: "要求アクションの対象となる解決済みリソースへの参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: /workspace/a.txt
      allowed_values: []
      source_claims: [claim-cedar-parc-request]
    - id: permission_scope_reference
      labels: {zh: 权限范围引用, en: Permission scope reference, ja: 権限スコープ参照}
      definitions: {zh: "约束该请求可评估动作和资源的范围工件引用。", en: "Reference to the scope artifact constraining actions and resources considered for this request.", ja: "この要求で考慮するアクションとリソースを制約するスコープ成果物への参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: scope-1
      allowed_values: []
      source_claims: [claim-cedar-parc-request]
    - id: request_context_reference
      labels: {zh: 请求上下文引用, en: Request context reference, ja: 要求コンテキスト参照}
      definitions: {zh: "评估时适用的请求上下文证据引用。", en: "Reference to the request-context evidence applicable during evaluation.", ja: "評価時に適用される要求コンテキスト証拠への参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: context-1
      allowed_values: []
      source_claims: [claim-cedar-parc-request]
  constraints:
    - id: authorization-request-before-decision
      severity: error
      expression_language: plain
      expression: An AuthorizationRequest must identify principal_reference, requested_action, resource_reference, permission_scope_reference, and request_context_reference before evaluation; it must not encode a decision, grant, user response, or completed execution.
      explanations: {zh: "请求提出待评估操作，不预先声明授权结果。", en: "A request proposes an operation for evaluation and does not predeclare the authorization result.", ja: "要求は評価対象の操作を提案するものであり、認可結果を事前宣言しない。"}
      explanation: {zh: "请求提出待评估操作，不预先声明授权结果。", en: "A request proposes an operation for evaluation and does not predeclare the authorization result.", ja: "要求は評価対象の操作を提案するものであり、認可結果を事前宣言しない。"}
      source_claims: [claim-cedar-parc-request, claim-opa-authorization-request-inference]
  required_relations: []
examples:
  
- id: request-positive-write
    kind: positive
    labels: {zh: 文件写入请求, en: File-write request, ja: ファイル書込み要求}
    descriptions: {zh: "MCP Authorization（2025-11-25）将访问令牌绑定到 HTTP 传输的预期 resource 参数与所需 scope。", en: "MCP Authorization (2025-11-25) binds access tokens to the intended resource parameter and required scopes for HTTP transports.", ja: "MCP Authorization は HTTP transport の intended resource と required scope に access token を結び付ける。"}
    field_values: {authorization_request_id: request-1, requested_action: file.write, principal_reference: agent-7, resource_reference: /workspace/a.txt, permission_scope_reference: scope-1, request_context_reference: context-1}
    related_node_ids: [PolicyEvaluation, PermissionScope]
    related_relation_ids: [AuthorizationRequest-wasUsedBy-PolicyEvaluation]
    expected_result: {zh: "将请求送入策略评估。", en: "Send the request into policy evaluation.", ja: "要求をポリシー評価へ送る。"}
    why_valid_or_invalid: {zh: "认证证明身份；MCP scope 验证是独立的授权步骤。", en: "Authentication proves identity; MCP scope validation is a separate authorization step.", ja: "認証は ID を証明する。MCP scope validation は独立した認可ステップである。"}
    synthetic: false
    source_claims: [claim-cedar-parc-request, claim-opa-authorization-request-inference]
  - id: request-counter-decision
    kind: counterexample
    labels: {zh: 已产生允许决定, en: Existing allow decision, ja: 既存の許可判断}
    descriptions: {zh: "MCP Authorization（2025-11-25）将访问令牌绑定到 HTTP 传输的预期 resource 参数与所需 scope。", en: "MCP Authorization (2025-11-25) binds access tokens to the intended resource parameter and required scopes for HTTP transports.", ja: "MCP Authorization は HTTP transport の intended resource と required scope に access token を結び付ける。"}
    field_values: {authorization_request_id: request-2, requested_action: file.read, principal_reference: agent-7, resource_reference: /workspace/a.txt, permission_scope_reference: scope-1, request_context_reference: context-2}
    related_node_ids: [AllowDecision]
    related_relation_ids: []
    expected_result: {zh: "拒绝授权请求分类。", en: "Reject the authorization-request classification.", ja: "認可要求分類を拒否する。"}
    why_valid_or_invalid: {zh: "认证证明身份；MCP scope 验证是独立的授权步骤。", en: "Authentication proves identity; MCP scope validation is a separate authorization step.", ja: "認証は ID を証明する。MCP scope validation は独立した認可ステップである。"}
    synthetic: false
    source_claims: [claim-cedar-parc-request]
  - id: request-boundary-authentication
    kind: boundary
    labels: {zh: 认证与授权请求边界, en: Authentication-request boundary, ja: 認証と認可要求の境界}
    descriptions: {zh: "MCP Authorization（2025-11-25）将访问令牌绑定到 HTTP 传输的预期 resource 参数与所需 scope。", en: "MCP Authorization (2025-11-25) binds access tokens to the intended resource parameter and required scopes for HTTP transports.", ja: "MCP Authorization は HTTP transport の intended resource と required scope に access token を結び付ける。"}
    field_values: {authorization_request_id: request-3, requested_action: network.connect, principal_reference: agent-7, resource_reference: api.example.com:443, permission_scope_reference: scope-egress, request_context_reference: context-3}
    related_node_ids: [PolicyDecision]
    related_relation_ids: []
    expected_result: {zh: "保留认证和授权评估的独立证据。", en: "Retain separate evidence for authentication and authorization evaluation.", ja: "認証と認可評価の証拠を別々に保持する。"}
    why_valid_or_invalid: {zh: "认证证明身份；MCP scope 验证是独立的授权步骤。", en: "Authentication proves identity; MCP scope validation is a separate authorization step.", ja: "認証は ID を証明する。MCP scope validation は独立した認可ステップである。"}
    synthetic: false
    source_claims: [claim-cedar-parc-request]
  - id: request-instance-egress
    kind: instance
    labels: {zh: 网络出口请求实例, en: Network-egress request instance, ja: ネットワーク出口要求の実例}
    descriptions: {zh: "MCP Authorization（2025-11-25）将访问令牌绑定到 HTTP 传输的预期 resource 参数与所需 scope。", en: "MCP Authorization (2025-11-25) binds access tokens to the intended resource parameter and required scopes for HTTP transports.", ja: "MCP Authorization は HTTP transport の intended resource と required scope に access token を結び付ける。"}
    field_values: {authorization_request_id: request-4, requested_action: network.connect, principal_reference: agent-7, resource_reference: api.example.com:443, permission_scope_reference: scope-egress, request_context_reference: context-4}
    related_node_ids: [NetworkEndpoint, NetworkPolicy]
    related_relation_ids: []
    expected_result: {zh: "在连接建立前评估请求。", en: "Evaluate the request before connection establishment.", ja: "接続確立前に要求を評価する。"}
    why_valid_or_invalid: {zh: "认证证明身份；MCP scope 验证是独立的授权步骤。", en: "Authentication proves identity; MCP scope validation is a separate authorization step.", ja: "認証は ID を証明する。MCP scope validation は独立した認可ステップである。"}
    synthetic: false
    source_claims: [claim-cedar-parc-request]
  - id: AuthorizationRequest-real-counterexample-2
    kind: counterexample
    labels: {zh: "AuthorizationRequest counterexample case", en: "AuthorizationRequest counterexample case", ja: "AuthorizationRequest counterexample case"}
    descriptions: {zh: "Amazon Cedar 评估 principal-action-resource-context 请求并返回 Allow 或 Deny 及诊断信息。", en: "Amazon Cedar evaluates principal-action-resource-context requests and returns Allow or Deny with diagnostics (docs.cedarpolicy.com/auth/authorization.html).", ja: "Amazon Cedar は principal-action-resource-context 要求を評価し Allow/Deny と diagnostics を返す。"}
    field_values:
      authorization_request_id: request-1
      permission_scope_reference: scope-1
      principal_reference: agent-7
      request_context_reference: context-1
      requested_action: file.write
      resource_reference: "/workspace/a.txt"
    related_node_ids: [AuthorizationRequest]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "Cedar 授权与 HumanApproval 记录的用户界面工具批准不同。", en: "Cedar authorization is distinct from UI tool approval recorded by HumanApproval.", ja: "Cedar 認可は HumanApproval が記録する UI ツール承認とは別である。"}
    synthetic: false
    source_claims:
      - claim-opa-authorization-request-inference
  - id: AuthorizationRequest-real-boundary-3
    kind: boundary
    labels: {zh: "AuthorizationRequest boundary case", en: "AuthorizationRequest boundary case", ja: "AuthorizationRequest boundary case"}
    descriptions: {zh: "Open Policy Agent Rego 评估 input 与 data 文档；除非规则显式 allow，否则 default deny。", en: "Open Policy Agent Rego evaluates input and data documents; default deny applies unless a rule explicitly allows (openpolicyagent.org/docs/policy-language).", ja: "Open Policy Agent Rego は input/data 文書を評価し、明示 allow がなければ default deny。"}
    field_values:
      authorization_request_id: request-1
      permission_scope_reference: scope-1
      principal_reference: agent-7
      request_context_reference: context-1
      requested_action: file.write
      resource_reference: "/workspace/a.txt"
    related_node_ids: [AuthorizationRequest]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "OPA 产生 allow/deny 决定；不执行沙箱代码。", en: "OPA produces allow/deny decisions; it does not execute sandboxed code.", ja: "OPA は allow/deny 判断を生成する。サンドボックス code は実行しない。"}
    synthetic: false
    source_claims:
      - claim-opa-authorization-request-inference
  - id: AuthorizationRequest-real-instance-4
    kind: instance
    labels: {zh: "AuthorizationRequest instance case", en: "AuthorizationRequest instance case", ja: "AuthorizationRequest instance case"}
    descriptions: {zh: "NIST SP 800-207 定义零信任：不因网络位置隐式信任；访问资源前离散认证与授权。", en: "NIST SP 800-207 defines zero trust: no implicit trust by network location; discrete authentication and authorization before resource access.", ja: "NIST SP 800-207 は network location による implicit trust なし、resource access 前の discrete 認証・認可を定義する。"}
    field_values:
      authorization_request_id: request-1
      permission_scope_reference: scope-1
      principal_reference: agent-7
      request_context_reference: context-1
      requested_action: file.write
      resource_reference: "/workspace/a.txt"
    related_node_ids: [AuthorizationRequest]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "NIST 区分策略引擎（决策）与策略执行点；信任边界映射这一分离。", en: "NIST separates policy engine (decision) from policy enforcement point; trust boundaries map to this split.", ja: "NIST は policy engine と PEP を分離する。trust boundary はこの分離に対応する。"}
    synthetic: false
    source_claims:
      - claim-opa-authorization-request-inference
parent_relation: null
relations:
  - id: AuthorizationRequest-wasUsedBy-PolicyEvaluation
    predicate: was_used_by
    target: concept:PolicyEvaluation
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 被策略评估使用, en: was used by policy evaluation, ja: ポリシー評価によって使用される}
    definitions: {zh: "AuthorizationRequest 保持为独立请求记录，并以 PROV-O wasUsedBy 关联保留消费它的 PolicyEvaluation 来历。", en: "An AuthorizationRequest remains an independent request record and uses a PROV-O wasUsedBy association to retain provenance of the PolicyEvaluation that consumed it.", ja: "AuthorizationRequest は独立した要求記録のままであり、それを消費した PolicyEvaluation の来歴を PROV-O wasUsedBy 関連で保持する。"}
    cardinality: {source: {min: 0, max: null}, target: {min: 0, max: null}}
    source_claims: [claim-prov-o-use]
    layout_role: cross-link
sources:
  - id: opa-policy-language
    title: Open Policy Agent policy language
    url: https://www.openpolicyagent.org/docs/policy-language
    source_type: official-documentation
    relevance: Documents policy evaluation over structured input.
  - id: cedar-authorization
    title: Cedar authorization guide
    url: https://docs.cedarpolicy.com/auth/authorization.html
    source_type: official-documentation
    relevance: Defines authorization requests with principal, action, resource, and context, and separate allow or deny responses.
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: w3c-recommendation
    relevance: Defines the provenance relation linking an entity to the activity that used it.
source_claims:
  - id: claim-opa-authorization-request-inference
    source: opa-policy-language
    supports: OPA documentation motivates structured request input to policy evaluation; it does not define this internal AuthorizationRequest schema.
    locator: "Policy language overview"
    evidence_kind: design-inference
    confidence: high
  - id: claim-cedar-parc-request
    source: cedar-authorization
    supports: Cedar authorization requests identify a principal, action, resource, and context. Moonweave records each as a local reference and retains permission scope separately; Cedar does not define this exact internal request schema.
    locator: "Authorization requests"
    evidence_kind: design-inference
    confidence: high
  - id: claim-prov-o-use
    source: w3c-prov-o
    supports: PROV-O defines used as a relation in which an activity used an entity, and wasUsedBy as its inverse.
    locator: "Section 3.1.6 used"
    evidence_kind: normative-guidance
    confidence: high
