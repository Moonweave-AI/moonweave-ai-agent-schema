schema: moonweave.ai/ontology-node/v1
id: ManualReviewRequired
kind: concept
status: accepted
labels: {zh: 需要人工复核, en: Manual Review Required, ja: 手動レビュー要件}
semantics:
  short_definition: {zh: "由一次 PolicyEvaluation 生成的 Moonweave 本地复核要求记录，要求在释放操作前进行人工处理。", en: "A Moonweave-local review-requirement record generated by a PolicyEvaluation that requires human handling before an operation may be released.", ja: "PolicyEvaluation が生成する Moonweave ローカルのレビュー要件記録であり、操作を解放する前に人による処理を要求する。"}
  definition: {zh: "ManualReviewRequired 是 Moonweave 本地升级记录，不是 PolicyDecision 的子类，也不是 Cedar 或 OPA 的第三种 allow/deny 决定。它记录评估为何需要人工复核及其截止时间；它不是 PermissionPrompt、HumanApproval、AuthorizationCredential 或执行许可。", en: "ManualReviewRequired is a Moonweave-local escalation record, not a PolicyDecision subtype or a third Cedar/OPA allow-or-deny decision. It records why an evaluation requires human review and its deadline; it is not a PermissionPrompt, HumanApproval, AuthorizationCredential, or execution permit.", ja: "ManualReviewRequired は Moonweave ローカルのエスカレーション記録であり、PolicyDecision の下位型でも Cedar/OPA の第三の allow/deny 判断でもない。評価が人によるレビューを必要とする理由と期限を記録する。PermissionPrompt、HumanApproval、AuthorizationCredential、実行許可ではない。"}
  why_needed: {zh: "高影响或未分类请求需要可审计的暂停和复核责任，但不能伪造成策略引擎的额外决定效果。", en: "High-impact or unclassified requests need an auditable pause and review responsibility without being fabricated as an extra policy-engine decision effect.", ja: "高影響または未分類の要求には監査可能な停止とレビュー責任が必要だが、追加のポリシーエンジン決定効果として捏造してはならない。"}
  includes: [{zh: "请求引用、生成评估、复核原因、所需复核角色、截止时间和证据引用。", en: "Request reference, generating evaluation, review reason, required reviewer role, deadline, and evidence reference.", ja: "要求参照、生成元評価、レビュー理由、必要なレビュー役割、期限、証拠参照。"}]
  excludes: [{zh: "Cedar allow/deny 响应、用户最终响应、调用级批准证据或工具执行状态。", en: "A Cedar allow-or-deny response, final user response, call-specific approval evidence, or tool execution state.", ja: "Cedar の allow/deny 応答、最終ユーザー応答、呼出固有の承認証拠、ツール実行状態。"}]
  semantic_kind: entity
  aliases: [local-review-requirement, local-escalation-record]
engineering:
  explanation: {zh: "策略评估仍生成 allow 或 deny 结论；若本地风险或控制规则要求人工处理，系统从该评估生成此记录。开放记录阻止本地执行释放；复核完成后系统重新评估或创建一个新的 allow/deny 决定，不能把该记录当作 defer 决定。", en: "Policy evaluation still produces an allow or deny conclusion; when local risk or control rules require human handling, the system generates this record from that evaluation. An open record blocks local execution release; after review, the system re-evaluates or creates a new allow-or-deny decision and cannot treat this record as a defer decision.", ja: "ポリシー評価は引き続き allow または deny の結論を生成する。ローカルリスクまたは制御規則が人による処理を要求する場合、システムはその評価からこの記録を生成する。未解決記録はローカル実行解放を阻止し、レビュー後にシステムは再評価または新しい allow/deny 判断を作成する。この記録を defer 判断として扱えない。"}
  typical_input:
    - description: {zh: "高影响请求的评估与本地复核规则。", en: "An evaluation of a high-impact request and a local review rule.", ja: "高影響要求の評価とローカルレビュー規則。"}
      format: '{"policy_evaluation_id":"eval-1","authorization_request_id":"request-publish","review_reason_code":"high-impact-publication","required_reviewer_role":"release-manager"}'
      source_claims: [claim-local-manual-review-requirement]
  typical_output:
    - description: {zh: "带复核责任和截止时间的本地升级记录。", en: "A local escalation record with review responsibility and deadline.", ja: "レビュー責任と期限を持つローカルエスカレーション記録。"}
      format: '{"manual_review_requirement_id":"review-1","policy_evaluation_id":"eval-1","authorization_request_id":"request-publish","review_reason_code":"high-impact-publication","required_reviewer_role":"release-manager","review_by":"2026-07-19T05:00:00Z","evidence_reference":"evidence:review-1"}'
      source_claims: [claim-local-manual-review-requirement]
  reference_implementations:
    - name: Cedar authorization guide
      url: https://docs.cedarpolicy.com/auth/authorization.html
      description: Documents authorization responses limited to allow or deny with diagnostics.
    - name: W3C PROV-O
      url: https://www.w3.org/TR/prov-o/
      description: Defines the provenance relationship between a generated entity and its generating activity.
structure:
  identity_keys: [manual_review_requirement_id]
  fields:
    - id: manual_review_requirement_id
      labels: {zh: 人工复核要求标识符, en: Manual review requirement ID, ja: 手動レビュー要件 ID}
      definitions: {zh: "一项本地复核要求记录的稳定标识符。", en: "Stable identifier for one local review-requirement record.", ja: "一つのローカルレビュー要件記録の安定識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: review-1
      allowed_values: []
      source_claims: [claim-local-manual-review-requirement]
    - id: authorization_request_id
      labels: {zh: 授权请求标识符, en: Authorization request ID, ja: 認可要求 ID}
      definitions: {zh: "需要人工复核的确切 AuthorizationRequest 标识符。", en: "Identifier of the exact AuthorizationRequest requiring manual review.", ja: "手動レビューを必要とする正確な AuthorizationRequest の識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: request-publish
      allowed_values: []
      source_claims: [claim-local-manual-review-requirement]
    - id: policy_evaluation_id
      labels: {zh: 生成策略评估标识符, en: Generating policy evaluation ID, ja: 生成元ポリシー評価 ID}
      definitions: {zh: "生成此本地复核要求的 PolicyEvaluation 标识符。", en: "Identifier of the PolicyEvaluation that generated this local review requirement.", ja: "このローカルレビュー要件を生成した PolicyEvaluation の識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: eval-1
      allowed_values: []
      source_claims: [claim-local-manual-review-requirement]
    - id: review_reason_code
      labels: {zh: 复核原因码, en: Review reason code, ja: レビュー理由コード}
      definitions: {zh: "说明为何本地控制要求人工处理的稳定代码。", en: "Stable code explaining why local controls require human handling.", ja: "ローカル制御が人による処理を要求する理由を説明する安定コード。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: high-impact-publication
      allowed_values: []
      source_claims: [claim-local-manual-review-requirement]
    - id: required_reviewer_role
      labels: {zh: 所需复核角色, en: Required reviewer role, ja: 必要なレビュー役割}
      definitions: {zh: "可解决该本地复核要求的角色或队列引用。", en: "Reference to the role or queue permitted to resolve this local review requirement.", ja: "このローカルレビュー要件を解決できる役割または queue への参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: release-manager
      allowed_values: []
      source_claims: [claim-local-manual-review-requirement]
    - id: review_by
      labels: {zh: 复核截止时间, en: Review-by deadline, ja: レビュー期限}
      definitions: {zh: "要求必须重新评估、取消或由合格复核者处理的时间。", en: "Time by which the request must be re-evaluated, cancelled, or handled by an eligible reviewer.", ja: "要求を再評価、取消、または適格なレビュー者が処理すべき時刻。"}
      datatype: datetime
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: '2026-07-19T05:00:00Z'
      allowed_values: []
      source_claims: [claim-local-manual-review-requirement]
    - id: evidence_reference
      labels: {zh: 复核证据引用, en: Review evidence reference, ja: レビュー証拠参照}
      definitions: {zh: "支持本地升级原因的规则、诊断或风险证据的非秘密引用。", en: "Non-secret reference to rule, diagnostic, or risk evidence supporting the local escalation reason.", ja: "ローカルエスカレーション理由を支える規則、診断、リスク証拠への非秘密参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: evidence:review-1
      allowed_values: []
      source_claims: [claim-local-manual-review-requirement]
  constraints:
    - id: manual-review-is-not-policy-decision
      severity: error
      expression_language: plain
      expression: A ManualReviewRequired must identify one authorization_request_id, generating policy_evaluation_id, review_reason_code, required_reviewer_role, review_by, and evidence_reference; it must not be emitted as a PolicyDecision effect, authorization credential, approval evidence, or execution permit.
      explanation: {zh: "复核要求是本地控制记录，不改变 Cedar allow/deny 决定空间。", en: "A review requirement is a local control record and does not alter Cedar's allow-or-deny decision space.", ja: "レビュー要件はローカル制御記録であり、Cedar の allow/deny 判断空間を変更しない。"}
      source_claims: [claim-cedar-allow-deny-boundary, claim-local-manual-review-requirement]
  required_relations: []
examples:
  
- id: manual-review-positive-high-impact-publication
    kind: positive
    labels: {zh: 高影响发布需要复核, en: High-impact publication requires review, ja: 高影響公開にはレビューが必要}
    descriptions: {zh: "OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。", en: "OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/).", ja: "OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。"}
    field_values: {manual_review_requirement_id: review-1, authorization_request_id: request-publish, policy_evaluation_id: eval-1, review_reason_code: high-impact-publication, required_reviewer_role: release-manager, review_by: '2026-07-19T05:00:00Z', evidence_reference: evidence:review-1}
    related_node_ids: [PolicyEvaluation, ToolApprovalRequirement]
    related_relation_ids: [ManualReviewRequired-was_generated_by-PolicyEvaluation]
    expected_result: {zh: "本地释放保持阻止，直至复核和后续决定完成。", en: "Local release remains blocked until review and a subsequent decision complete.", ja: "レビューと後続判断が完了するまでローカル解放は阻止されたままである。"}
    why_valid_or_invalid: {zh: "HITL 批准解决具体中断；不是 OAuth scope 授予。", en: "HITL approval resolves a concrete interruption; it is not an OAuth scope grant.", ja: "HITL 承認は具体的 interruption を解決する。OAuth scope grant ではない。"}
    synthetic: false
    source_claims: [claim-local-manual-review-requirement]
  - id: manual-review-counter-defer-decision
    kind: counterexample
    labels: {zh: 伪造 defer 决定, en: Fabricated defer decision, ja: 捏造された defer 判断}
    descriptions: {zh: "OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。", en: "OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/).", ja: "OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。"}
    field_values: {manual_review_requirement_id: review-2, authorization_request_id: request-new-tool, policy_evaluation_id: eval-2, review_reason_code: unclassified-operation, required_reviewer_role: security-reviewer, review_by: '2026-07-19T05:00:00Z', evidence_reference: evidence:review-2}
    related_node_ids: [PolicyDecision]
    related_relation_ids: []
    expected_result: {zh: "拒绝该分类；策略决定只能是 allow 或 deny。", en: "Reject the classification; a policy decision is only allow or deny.", ja: "その分類を拒否する。ポリシー判断は allow または deny のみである。"}
    why_valid_or_invalid: {zh: "HITL 批准解决具体中断；不是 OAuth scope 授予。", en: "HITL approval resolves a concrete interruption; it is not an OAuth scope grant.", ja: "HITL 承認は具体的 interruption を解決する。OAuth scope grant ではない。"}
    synthetic: false
    source_claims: [claim-cedar-allow-deny-boundary, claim-local-manual-review-requirement]
  - id: manual-review-boundary-human-approval
    kind: boundary
    labels: {zh: 复核要求与人工批准边界, en: Review requirement and human-approval boundary, ja: レビュー要件と人の承認の境界}
    descriptions: {zh: "OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。", en: "OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/).", ja: "OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。"}
    field_values: {manual_review_requirement_id: review-3, authorization_request_id: request-transfer, policy_evaluation_id: eval-3, review_reason_code: high-value-transfer, required_reviewer_role: finance-reviewer, review_by: '2026-07-19T05:00:00Z', evidence_reference: evidence:review-3}
    related_node_ids: [HumanApproval, PermissionPrompt]
    related_relation_ids: [ManualReviewRequired-was_generated_by-PolicyEvaluation]
    expected_result: {zh: "保留要求与批准证据的独立记录。", en: "Keep requirement and approval evidence as separate records.", ja: "要件と承認証拠を別々の記録として保持する。"}
    why_valid_or_invalid: {zh: "HITL 批准解决具体中断；不是 OAuth scope 授予。", en: "HITL approval resolves a concrete interruption; it is not an OAuth scope grant.", ja: "HITL 承認は具体的 interruption を解決する。OAuth scope grant ではない。"}
    synthetic: false
    source_claims: [claim-local-manual-review-requirement]
  - id: manual-review-instance-expired
    kind: instance
    labels: {zh: 过期复核要求, en: Expired review requirement, ja: 期限切れレビュー要件}
    descriptions: {zh: "OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。", en: "OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/).", ja: "OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。"}
    field_values: {manual_review_requirement_id: review-4, authorization_request_id: request-export, policy_evaluation_id: eval-4, review_reason_code: regulated-export, required_reviewer_role: compliance-reviewer, review_by: '2026-07-19T03:00:00Z', evidence_reference: evidence:review-4}
    related_node_ids: [AuthorizationRequest, PolicyEvaluation]
    related_relation_ids: [ManualReviewRequired-was_generated_by-PolicyEvaluation]
    expected_result: {zh: "不得把过期记录解释为可执行许可。", en: "The expired record must not be interpreted as execution permission.", ja: "期限切れ記録を実行許可として解釈してはならない。"}
    why_valid_or_invalid: {zh: "HITL 批准解决具体中断；不是 OAuth scope 授予。", en: "HITL approval resolves a concrete interruption; it is not an OAuth scope grant.", ja: "HITL 承認は具体的 interruption を解決する。OAuth scope grant ではない。"}
    synthetic: false
    source_claims: [claim-local-manual-review-requirement]
  - id: ManualReviewRequired-real-counterexample-2
    kind: counterexample
    labels: {zh: "ManualReviewRequired counterexample case", en: "ManualReviewRequired counterexample case", ja: "ManualReviewRequired counterexample case"}
    descriptions: {zh: "LangGraph interrupt() 暂停图执行供人工审查；Command(resume=...) 在 approve/edit/reject 后继续。", en: "LangGraph interrupt() pauses graph execution for human review; Command(resume=...) continues after approve/edit/reject (docs.langchain.com/langgraph/interrupts).", ja: "LangGraph interrupt() は human review のため graph を pause し Command(resume=...) で再開する。"}
    field_values:
      authorization_request_id: request-publish
      evidence_reference: "evidence:review-1"
      manual_review_requirement_id: review-1
      policy_evaluation_id: eval-1
      required_reviewer_role: release-manager
      review_by: "'2026-07-19T05:00:00Z'"
      review_reason_code: high-impact-publication
    related_node_ids: [ManualReviewRequired]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "LangGraph interrupt 记录暂停/恢复周期，与 Cedar allow/deny 不同。", en: "LangGraph interrupt records a pause/resume cycle distinct from Cedar allow/deny.", ja: "LangGraph interrupt は pause/resume サイクルを記録し Cedar allow/deny とは異なる。"}
    synthetic: false
    source_claims:
      - claim-cedar-allow-deny-boundary
  - id: ManualReviewRequired-real-boundary-3
    kind: boundary
    labels: {zh: "ManualReviewRequired boundary case", en: "ManualReviewRequired boundary case", ja: "ManualReviewRequired boundary case"}
    descriptions: {zh: "MCP 规范要求在服务器代表用户调用工具前获得明确用户同意。", en: "MCP specification requires explicit user consent before servers invoke tools on the user behalf (2025-11-25).", ja: "MCP 仕様は user に代わる tool invoke 前に explicit user consent を要求する。"}
    field_values:
      authorization_request_id: request-publish
      evidence_reference: "evidence:review-1"
      manual_review_requirement_id: review-1
      policy_evaluation_id: eval-1
      required_reviewer_role: release-manager
      review_by: "'2026-07-19T05:00:00Z'"
      review_reason_code: high-impact-publication
    related_node_ids: [ManualReviewRequired]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "同意是安全控制阶段，与 Markdown 表格格式化不同。", en: "Consent is a safety control phase distinct from markdown table formatting.", ja: "Consent は markdown table formatting とは異なる safety control phase である。"}
    synthetic: false
    source_claims:
      - claim-cedar-allow-deny-boundary
  - id: ManualReviewRequired-real-instance-4
    kind: instance
    labels: {zh: "ManualReviewRequired instance case", en: "ManualReviewRequired instance case", ja: "ManualReviewRequired instance case"}
    descriptions: {zh: "NIST SP 800-207 定义零信任：不因网络位置隐式信任；访问资源前离散认证与授权。", en: "NIST SP 800-207 defines zero trust: no implicit trust by network location; discrete authentication and authorization before resource access.", ja: "NIST SP 800-207 は network location による implicit trust なし、resource access 前の discrete 認証・認可を定義する。"}
    field_values:
      authorization_request_id: request-publish
      evidence_reference: "evidence:review-1"
      manual_review_requirement_id: review-1
      policy_evaluation_id: eval-1
      required_reviewer_role: release-manager
      review_by: "'2026-07-19T05:00:00Z'"
      review_reason_code: high-impact-publication
    related_node_ids: [ManualReviewRequired]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "NIST 区分策略引擎（决策）与策略执行点；信任边界映射这一分离。", en: "NIST separates policy engine (decision) from policy enforcement point; trust boundaries map to this split.", ja: "NIST は policy engine と PEP を分離する。trust boundary はこの分離に対応する。"}
    synthetic: false
    source_claims:
      - claim-cedar-allow-deny-boundary
parent_relation: null
relations:
  - id: ManualReviewRequired-was_generated_by-PolicyEvaluation
    predicate: was_generated_by
    target: activity:PolicyEvaluation
    endpoint_order: entity-to-activity
    direction: source-to-target
    relation_kind: provenance
    labels: {zh: 由策略评估生成, en: was generated by policy evaluation, ja: ポリシー評価により生成された}
    definitions: {zh: "ManualReviewRequired 是由 PolicyEvaluation 生成的本地实体记录；该 PROV-O 关系不把它变成策略决定。", en: "ManualReviewRequired is a local entity record generated by a PolicyEvaluation; this PROV-O relation does not turn it into a policy decision.", ja: "ManualReviewRequired は PolicyEvaluation により生成されたローカルエンティティ記録である。この PROV-O 関係はそれをポリシー判断に変えない。"}
    cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
    source_claims: [claim-prov-o-generation, claim-local-manual-review-requirement]
    layout_role: cross-link
sources:
  - id: cedar-authorization
    title: Cedar authorization guide
    url: https://docs.cedarpolicy.com/auth/authorization.html
    source_type: official-documentation
    relevance: Documents authorization responses limited to allow or deny with diagnostics.
  - id: w3c-prov-o
    title: "W3C PROV-O: The PROV Ontology"
    url: https://www.w3.org/TR/prov-o/
    source_type: w3c-recommendation
    relevance: Defines wasGeneratedBy between an entity and its generating activity.
  - id: moonweave-local-manual-review
    title: Moonweave local manual-review requirement
    url: https://github.com/Moonweave-AI/moonweave-ai-agent-schema#source-model
    source_type: design-inference
    relevance: Defines a local escalation record outside the policy decision vocabulary.
source_claims:
  - id: claim-cedar-allow-deny-boundary
    source: cedar-authorization
    supports: Cedar's Authorizer returns an allow or deny response with diagnostics; it does not define a defer decision or Moonweave manual-review record.
    locator: "Authorization responses"
    evidence_kind: normative-guidance
    confidence: high
  - id: claim-prov-o-generation
    source: w3c-prov-o
    supports: PROV-O defines wasGeneratedBy as the relation connecting an entity to the activity that generated it.
    locator: "Section 3.1.2 wasGeneratedBy"
    evidence_kind: normative-guidance
    confidence: high
  - id: claim-local-manual-review-requirement
    source: moonweave-local-manual-review
    supports: Moonweave design inference models a manual-review requirement as a local entity generated by a policy evaluation and blocking local release until subsequent handling; it is not a policy decision effect.
    locator: "Moonweave local manual-review requirement"
    evidence_kind: design-inference
    confidence: high
