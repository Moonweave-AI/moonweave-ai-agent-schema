schema: moonweave.ai/ontology-node/v1
id: AuthorizationEvent
kind: concept
status: accepted
labels:
  zh: 授权生命周期事件
  en: authorization lifecycle event
  ja: 認可ライフサイクルイベント
semantics:
  short_definition:
    zh: 在明确时刻由可识别行动者改变某个授权请求或授予状态的事件上位概念。
    en: The event genus for an identified actor changing the state of an authorization request or grant at a stated instant.
    ja: 識別可能な行為者が明示時刻に認可要求または付与の状態を変えるイベント上位概念です。
  definition:
    zh: 授权生命周期事件是 HumanApproval 与 AuthorizationRevocation 的共同上位概念。每个事件具有稳定 event_id、事件种类、发生时间、行动者和被影响的授权对象；它只记录已经发生的授权领域状态变化，不表示长期权限、策略规范、用户界面消息或策略评估活动。
    en: AuthorizationEvent is the shared genus of HumanApproval and AuthorizationRevocation. Each occurrence has a stable event_id, event kind, occurrence time, actor, and affected authorization object. It records an authorization-domain state change that actually occurred; it is not standing authority, a policy specification, a UI message, or a policy-evaluation activity.
    ja: AuthorizationEvent は HumanApproval と AuthorizationRevocation の共通上位概念です。各発生は安定 event_id、種別、発生時刻、行為者、影響対象を持ちます。実際に起きた認可領域の状態変化だけを記録し、継続権限、方針仕様、UI メッセージ、方針評価活動ではありません。
  why_needed:
    zh: 批准与撤销都是真实发生且需要行动者、时间和对象的授权事件；共享上位概念保留共同身份规则，同时让批准和撤销的相反业务效果留在各自子类。
    en: Approval and revocation are both authorization occurrences requiring an actor, time, and object. The shared genus preserves those identity invariants while leaving their opposite business effects in the concrete subtypes.
    ja: 承認と取消はいずれも行為者・時刻・対象を要する認可発生です。共通上位概念は同一性不変条件を保ち、反対の業務効果は各下位型に残します。
  includes:
    - zh: 包含事件标识、事件种类、发生时间、行动者、受影响授权对象和权限依据。
      en: Includes event identity, event kind, occurrence time, actor, affected authorization object, and authority basis.
      ja: イベント識別子、種別、発生時刻、行為者、影響対象、権限根拠を含みます。
  excludes:
    - zh: 不包含提示或响应消息、策略评估运行、策略决定、授权授予本体或一般审计日志。
      en: Excludes prompt or response messages, a policy-evaluation run, policy decision, the grant itself, or a generic audit log.
      ja: 提示・応答メッセージ、方針評価実行、方針判断、付与自体、一般監査ログを含みません。
  semantic_kind: event
  aliases: []
structure:
  identity_keys:
    - event_id
  fields:
    - id: event_id
      labels:
        zh: 事件标识
        en: event ID
        ja: イベントID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定识别一次已经发生的授权状态变化。
        en: Stable identifier for one occurred authorization-state change.
        ja: 一回の発生済み認可状態変化を安定識別します。
      allowed_values: []
      pattern: null
      example_value: authorization-event-42
      source_claims:
        - claim-authorization-event-001
        - claim-authorization-event-002
        - claim-authorization-event-003
    - id: event_kind
      labels:
        zh: 事件种类
        en: event kind
        ja: イベント種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 受控值用于区分批准、撤销等授权事件子类。
        en: Controlled value distinguishing approval, revocation, and other reviewed authorization-event subtypes.
        ja: 承認・取消等の審査済み認可イベント下位型を区別する制御値です。
      allowed_values: []
      pattern: null
      example_value: human_approval
      source_claims:
        - claim-authorization-event-001
        - claim-authorization-event-002
        - claim-authorization-event-003
    - id: occurred_at
      labels:
        zh: 发生时间
        en: occurred at
        ja: 発生時刻
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 事件取得业务效果的 UTC 时刻。
        en: UTC instant when the event acquired its business effect.
        ja: イベントが業務効果を得た UTC 時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-16T01:21:00Z
      source_claims:
        - claim-authorization-event-001
        - claim-authorization-event-002
        - claim-authorization-event-003
    - id: actor_ref
      labels:
        zh: 行动者引用
        en: actor reference
        ja: 行為者参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 实施该状态变化且其资格可被验证的主体。
        en: Principal whose eligibility to enact the state change can be verified.
        ja: 状態変化を行い資格を検証できる主体です。
      allowed_values: []
      pattern: null
      example_value: human:owner-7
      source_claims:
        - claim-authorization-event-001
        - claim-authorization-event-002
        - claim-authorization-event-003
    - id: authorization_object_ref
      labels:
        zh: 授权对象引用
        en: authorization object reference
        ja: 認可対象参照
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 被批准的请求或被撤销的授予等直接受影响对象。
        en: Directly affected object such as an approved request or revoked grant.
        ja: 承認要求または取消付与など直接影響対象です。
      allowed_values: []
      pattern: null
      example_value: request-42
      source_claims:
        - claim-authorization-event-001
        - claim-authorization-event-002
        - claim-authorization-event-003
    - id: authority_basis
      labels:
        zh: 权限依据
        en: authority basis
        ja: 権限根拠
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 证明行动者有权产生该事件业务效果的依据。
        en: Basis proving the actor may create the event's business effect.
        ja: 行為者がイベント効果を生じさせる権限根拠です。
      allowed_values: []
      pattern: null
      example_value: project-owner-policy@3
      source_claims:
        - claim-authorization-event-001
        - claim-authorization-event-002
        - claim-authorization-event-003
  constraints: []
  required_relation_constraints: []
