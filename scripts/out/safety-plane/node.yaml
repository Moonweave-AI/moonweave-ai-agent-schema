source_claims:
  - id: claim-safety-plane-001
    source: eng-fw-openai-guardrails
    supports: OpenAI Agents SDK Guardrails defines input, output, and function-tool validation gates, tripwire outcomes, blocking versus parallel input checks, and tool checks before or after execution. This directly supports runtime validation and stop decisions, but it does not define trust zones, network isolation, prompt-injection taxonomy, commit gates, redaction, or audit disclosure. Those safety-plane concerns require the accompanying security guidance and Moonweave design.
    locator: Guardrails > Input guardrails > Execution modes; Output guardrails; Tool guardrails; Tripwires
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-safety-plane-002
    source: eng-security-mcp-nsa-2026
    supports: NSA's MCP Security Design Considerations identifies dynamic tool invocation, implicit trust relationships, context sharing, input validation, authorization, untrusted content reaching execution, and the need to define separate trust zones for agents, plugins, models, and users. This directly supports a safety domain spanning trust, authority, validation, containment, and audit controls. Moonweave's precise class hierarchy and its commit/redaction workflow remain ontology design inferences.
    locator: NSA MCP Security Design Considerations (May 2026) > Security concerns in MCP design, implementation, and practices; Recommendations > Design for boundaries; Enforce authentication and authorization; Log and monitor MCP activity
    evidence_kind: design-inference
    confidence: medium
    review_status: pending
  - id: claim-safety-plane-003
    source: eng-security-mcp-nsa-2026
    supports: NSA's MCP security guidance emphasizes explicit trust boundaries, authentication and authorization, least privilege, logging, and monitoring. Moonweave combines those controls with sandbox, commit, injection, and disclosure evidence without collapsing them.
    locator: MCP Security Design Considerations > Recommendations > Design for boundaries; Enforce authentication and authorization; Log and monitor MCP activity
    evidence_kind: design-inference
    confidence: high
    review_status: pending
  - id: claim-safety-plane-004
    source: eng-fw-openai-guardrails
    supports: OpenAI guardrails apply explicit input, output, and tool checks with tripwire outcomes. Ordinary output segmentation without such a decision is therefore outside the safety-control identity.
    locator: Guardrails > Input guardrails, output guardrails, tool guardrails, and tripwires
    evidence_kind: design-inference
    confidence: high
    review_status: pending
