            zh: 领域复核确认本模块拥有注入与投毒的检测证据、受污染对象、传播分析和处置活动；普通内容、有效指令与工具执行仍由各自模块拥有。
            en: Domain review confirms this module owns injection and poisoning evidence, contaminated objects, propagation analysis, and mitigation activities; ordinary content, effective instructions, and tool execution remain with their respective modules.
            ja: 領域審査は、本モジュールが注入・汚染証拠、汚染対象、伝播分析、緩和活動を所有し、通常内容、有効指示、ツール実行は各モジュールに残ることを確認しました。
        - reviewer_id: moonweave-ontology-structure-reviewer
          reviewer_role: ontology
          reviewer_kind: automated-agent
          reviewed_on: 2026-07-14
          decision_note:
            zh: 本体复核确认一个检测主根加五个独立结构根：DetectionActivity 统摄检测链；InjectionSignature 是先于运行定义的可复用检测规范；ResourceContentPoisoning 记录投毒发生；SourceSinkFlow 表达有证据的风险源—汇路径；TaintEntity 表达可在传播前由策略或证据赋值的污点承载者；TaintPropagation 记录一次有明确源、目标和转换的传播发生。运行时使用规范、端点关系与跨结构事实均保持 cross-link。
            en: Ontology review confirms one detection key root plus five independent structural roots. DetectionActivity anchors detection; InjectionSignature is a reusable detection specification defined before runtime; ResourceContentPoisoning records poisoning occurrences; SourceSinkFlow represents evidenced risk source-to-sink paths; TaintEntity represents a taint bearer assignable before propagation; and TaintPropagation records one occurrence with explicit source, target, and transformation. Runtime use of specifications, endpoint relations, and cross-structure facts remain cross-links.
            ja: 本体審査は一つの検出主要根と五つの独立構造根を確認しました。DetectionActivity は検出、InjectionSignature は実行前に定義される再利用検出仕様、ResourceContentPoisoning は汚染発生、SourceSinkFlow は証拠付き source-sink 経路、TaintEntity は伝播前にも付与できる担体、TaintPropagation は明示 source・target・変換を持つ一回の発生を表します。仕様の runtime use、端点関係、構造間事実は cross-link に保ちます。
