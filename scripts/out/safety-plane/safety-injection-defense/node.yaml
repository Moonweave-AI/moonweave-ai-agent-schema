schema: moonweave.ai/ontology-node/v1
id: safety-injection-defense
kind: module
status: accepted
labels:
  zh: 内容完整性与注入防御
  en: Content integrity and injection defense
  ja: 内容完全性と注入防御
semantics:
  short_definition:
    zh: 内容完整性与注入防御描述不可信内容如何被检测为提示注入、资源投毒或工具输出污染，威胁影响如何沿来源—接收方路径传播，以及系统如何隔离、降权、拒绝或复检。它只拥有经过安全判定的信号、发现、污点和缓解；普通内容、来源记录和一般指令优先级判断仍归信息域。
    en: Content integrity and injection defense describes how untrusted content is assessed as prompt injection, resource poisoning, or malicious tool output, how its influence propagates along source-to-sink paths, and how the system quarantines, de-prioritizes, rejects, or retests it. It owns only security-assessed signals, findings, taint, and mitigations; ordinary content, provenance records, and general instruction-priority resolution remain in the information domain.
    ja: 内容完全性と注入防御は、不信頼内容をプロンプト注入、資源汚染、悪意あるツール出力として評価し、その影響が発生源から受け手へどう伝播し、隔離、優先度低下、拒否、再検査でどう緩和されるかを記述します。所有するのは安全判断を伴う信号、所見、汚染、緩和だけであり、通常の内容、来歴記録、一般的な指示優先順位の判断は情報領域に残ります。
  definition:
    zh: 内容完整性与注入防御描述不可信内容如何被检测为提示注入、资源投毒或工具输出污染，威胁影响如何沿来源—接收方路径传播，以及系统如何隔离、降权、拒绝或复检。它只拥有经过安全判定的信号、发现、污点和缓解；普通内容、来源记录和一般指令优先级判断仍归信息域。
    en: Content integrity and injection defense describes how untrusted content is assessed as prompt injection, resource poisoning, or malicious tool output, how its influence propagates along source-to-sink paths, and how the system quarantines, de-prioritizes, rejects, or retests it. It owns only security-assessed signals, findings, taint, and mitigations; ordinary content, provenance records, and general instruction-priority resolution remain in the information domain.
    ja: 内容完全性と注入防御は、不信頼内容をプロンプト注入、資源汚染、悪意あるツール出力として評価し、その影響が発生源から受け手へどう伝播し、隔離、優先度低下、拒否、再検査でどう緩和されるかを記述します。所有するのは安全判断を伴う信号、所見、汚染、緩和だけであり、通常の内容、来歴記録、一般的な指示優先順位の判断は情報領域に残ります。
  why_needed:
    zh: 将“内容来自哪里”“内容是否构成威胁”“威胁影响到哪里”“采取了什么处置”分成可验证事实。
    en: Separate where content came from, whether it constitutes a threat, where its influence reached, and what mitigation occurred into verifiable facts.
    ja: 内容の出所、脅威に該当するか、影響がどこまで届いたか、どの緩和を行ったかを、検証可能な別々の事実として保持します。
  includes:
    - zh: 版本化检测特征、检测活动、威胁信号、经过判定的防御发现，以及被确认的投毒内容或工具描述污染。
      en: Versioned detection signatures, detection activities, threat signals, assessed defense findings, and confirmed poisoned content or tool-description poisoning.
      ja: 版管理された検出特徴、検出活動、脅威信号、評価済みの防御所見、確認された汚染内容やツール記述汚染を含みます。
    - zh: 仅在不可信指令与更高权威指令构成安全冲突时的 InstructionConflict，以及污点实体、来源—接收方路径、污点传播和可验证缓解。
      en: InstructionConflict only when an untrusted instruction conflicts with a higher-authority instruction as a security finding, together with taint entities, source-to-sink paths, taint propagation, and verifiable mitigation.
      ja: 不信頼指示と上位権威の指示の不一致が安全所見となる場合の InstructionConflict、汚染対象、発生源―受け手経路、汚染伝播、検証可能な緩和を含みます。
  excludes:
    - zh: PromptTemplate、Instruction、权威层级和一般指令冲突解析归提示与指令；没有不可信来源和安全判定的冲突不是本模块对象。
      en: PromptTemplate, Instruction, authority levels, and general instruction-conflict resolution belong to prompts and instructions; a conflict without an untrusted source and security assessment is not owned here.
      ja: PromptTemplate、Instruction、権威階層、一般的な指示競合の解決はプロンプトと指示に属します。不信頼な出所と安全評価を伴わない競合は本モジュールの対象ではありません。
    - zh: 通用内容块、来源引用、普通工具结果和检索片段归其业务模块；它们只有在获得威胁、污点或缓解身份后才与本模块发生关系。
      en: Generic content blocks, source references, ordinary tool results, and retrieved chunks belong to their business modules; they relate to this module only after receiving a threat, taint, or mitigation identity.
      ja: 一般的な内容ブロック、出典参照、通常のツール結果、検索断片は各業務モジュールに属し、脅威、汚染、緩和の同一性が付与された場合だけ本モジュールと関係します。
  semantic_kind: null
  aliases: []
purpose:
  zh: 为不可信内容从检测、定性、影响传播到缓解复检建立可追溯的安全链路。
  en: Establish a traceable safety chain from detection and threat assessment through influence propagation to mitigation and retesting of untrusted content.
  ja: 不信頼内容について、検出、脅威評価、影響伝播、緩和、再検査までの追跡可能な安全連鎖を確立します。
