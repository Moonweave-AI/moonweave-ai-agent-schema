        ja: injection/poisoning defense は ingested content の ThreatSignal、Taint、PoisonedContent、SourceSinkFlow、MitigationAction を所有し、ingestion は resource loading、normalization、deduplication、source attachment を所有します。 この記録は PatternScan、PoisonedContent だけを対象とし、canonical owner は注入とコンテンツ汚染防御（safety-injection-defense）です。したがって safety-injection-defense はここでこれらを所有します。
