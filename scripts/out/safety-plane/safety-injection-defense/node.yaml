  key_notion:
    zh: 检测活动
    en: detection activity
    ja: 検出活動
  owns_when:
    zh: 当对象必须依赖一次注入/投毒安全判定、污点赋值或传播、来源—接收方风险路径，或针对该威胁的缓解与复检才能识别时，由本模块拥有。
    en: Own an object when it can be identified only through an injection or poisoning security assessment, taint assignment or propagation, a source-to-sink risk path, or mitigation and retesting of that threat.
    ja: 注入・汚染の安全評価、汚染の付与・伝播、発生源―受け手のリスク経路、またはその脅威への緩和・再検査によってのみ識別できる対象を所有します。
  references_when:
    zh: 本模块引用原始内容、来源、指令、工具描述和结果；提示解析、记忆接入、上下文组装、能力调用或输出披露在避开已识别威胁时，引用防御发现、污点与缓解状态。
    en: This module references original content, provenance, instructions, tool descriptions, and results. Prompt resolution, memory ingestion, context assembly, capability invocation, or output disclosure references defense findings, taint, and mitigation state when avoiding an identified threat.
    ja: 本モジュールは元の内容、来歴、指示、ツール記述、結果を参照します。プロンプト解析、記憶取込、コンテキスト組立、能力呼び出し、出力開示は、識別済み脅威を避ける際に防御所見、汚染、緩和状態を参照します。
  boundary_decisions:
    - other_module_id: info-prompts-instructions
      subject_concept_ids:
        - InstructionConflictDetectionActivity
        - InstructionResolutionActivity
      decision: references
      owner_module_id: info-prompts-instructions
      rationale:
        zh: InstructionConflictDetectionActivity 与 InstructionResolutionActivity 是提示与指令域拥有的两次可审计活动；安全域拥有它们检测或解决的 InstructionConflict。InstructionConflictDetectionActivity-detects-InstructionConflict 只确认冲突，InstructionResolutionActivity-resolves-InstructionConflict 才记录已得出处理结论。
        en: InstructionConflictDetectionActivity and InstructionResolutionActivity are auditable occurrences owned by prompts and instructions; safety owns the InstructionConflict they detect or resolve. InstructionConflictDetectionActivity-detects-InstructionConflict only confirms a conflict, while InstructionResolutionActivity-resolves-InstructionConflict records a concluded resolution.
        ja: InstructionConflictDetectionActivity と InstructionResolutionActivity は prompts/instructions 所有の監査可能 activity、safety は検出・解決対象の InstructionConflict を所有します。前者は conflict 確認、後者は結論済み resolution を記録します。
      relation_ids:
        - InstructionConflictDetectionActivity-detects-InstructionConflict
        - InstructionResolutionActivity-resolves-InstructionConflict
      relation_not_applicable_reason: null
      source_claims:
        - claim-safety-injection-defense-021
        - claim-safety-injection-defense-022
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-safety-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 逐项核对确认提示与指令侧只有 InstructionConflictDetectionActivity 和 InstructionResolutionActivity；普通 Instruction 不参与这两条 accepted 边。
              en: Point-by-point review confirms that the prompts-and-instructions side contains only InstructionConflictDetectionActivity and InstructionResolutionActivity; ordinary Instruction is not an endpoint of either accepted edge.
              ja: prompts/instructions 側 endpoint は二つの activity のみで ordinary Instruction は accepted edge に参加しないことを確認しました。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 本体复核确认两条边分别从检测活动和解决活动指向 InstructionConflict；已退役 instruction_flagged_as_prompt_injection 不再作为投影证据。
              en: Ontology review confirms that InstructionConflictDetectionActivity-detects-InstructionConflict and InstructionResolutionActivity-resolves-InstructionConflict point from their respective activities to InstructionConflict; retired instruction_flagged_as_prompt_injection is excluded.
              ja: 二つの activity → InstructionConflict 方向を確認し retired instruction_flagged_as_prompt_injection を除外しました。
    - other_module_id: info-prompts-instructions
      subject_concept_ids:
        - InstructionConflict
      decision: owns
      owner_module_id: safety-injection-defense
      rationale:
        zh: InstructionConflict 是安全域拥有的冲突判定，由适用且作用域重叠的指令之间存在不可同时满足的义务确定。两条 accepted 边都以它为目标；PromptInjectionSignal 属于另一条威胁分类路径。
        en: InstructionConflict is the safety-owned finding identified by mutually unsatisfiable obligations among applicable scope-overlapping instructions. It is the target of both accepted edges; PromptInjectionSignal belongs to a separate threat-classification path.
        ja: InstructionConflict は適用可能で scope-overlap する instruction 間の同時充足不能 obligation で識別する safety-owned finding です。二つの accepted edge はともにこれを target とします。
      relation_ids:
        - InstructionConflictDetectionActivity-detects-InstructionConflict
        - InstructionResolutionActivity-resolves-InstructionConflict
      relation_not_applicable_reason: null
      source_claims:
        - claim-safety-injection-defense-023
        - claim-safety-injection-defense-024
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-safety-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 逐项领域复核确认安全侧端点并集只有 InstructionConflict；检测、解决和恶意注入分类是不同判断。
              en: Point-by-point domain review confirms InstructionConflict as the sole safety-side endpoint; detection, resolution, and malicious-injection classification are distinct judgments.
              ja: safety 側 endpoint 集合は InstructionConflict のみで三種判断を区別することを確認しました。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 结构复核确认两条 accepted 关系共享目标 InstructionConflict，未混入 PromptInjectionSignal 或 Instruction。
              en: Structural review confirms that InstructionConflictDetectionActivity-detects-InstructionConflict and InstructionResolutionActivity-resolves-InstructionConflict share target InstructionConflict, with neither PromptInjectionSignal nor Instruction mixed into the projection.
              ja: 二つの relation が target InstructionConflict を共有し他概念を混入しないことを確認しました。
    - other_module_id: memory-ingestion
      subject_concept_ids:
        - DocumentLoader
        - SourceAttachment
      decision: references
      owner_module_id: memory-ingestion
      rationale:
        zh: 注入与污染防御拥有对摄取内容的 ThreatSignal、Taint、PoisonedContent、SourceSinkFlow 和 MitigationAction；摄取拥有资源加载、规范化、去重和来源附件。 本条仅记录 DocumentLoader、SourceAttachment；其 canonical owner 是记忆接入（memory-ingestion），因此 safety-injection-defense 在此引用这些概念。
        en: Injection and poisoning defense own ThreatSignal, Taint, PoisonedContent, SourceSinkFlow, and MitigationAction over ingested content; ingestion owns resource loading, normalization, deduplication, and source attachments. This record is limited to DocumentLoader, SourceAttachment; their canonical owner is Memory ingestion (memory-ingestion), so safety-injection-defense references these concepts here.
        ja: injection/poisoning defense は ingested content の ThreatSignal、Taint、PoisonedContent、SourceSinkFlow、MitigationAction を所有し、ingestion は resource loading、normalization、deduplication、source attachment を所有します。 この記録は DocumentLoader、SourceAttachment だけを対象とし、canonical owner は記憶取り込み（memory-ingestion）です。したがって safety-injection-defense はここでこれらを参照します。
      relation_ids: []
      relation_not_applicable_reason:
        zh: “注入与内容投毒防御”与“记忆接入”之间没有适用于本 owner 概念组的已接受跨模块事实；该决策只比较明确列出的候选概念，不暗示运行时交互。
        en: There is no accepted cross-module fact applicable to this owner-homogeneous concept group between Injection and content-poisoning defense and Memory ingestion; the decision compares only the named candidates without implying runtime interaction.
        ja: 「注入とコンテンツ汚染防御」と「記憶取り込み」の間には、この owner 単一概念群に適用できる承認済みモジュール間事実がありません。明示候補だけを比較し、実行時相互作用を示唆しません。
      source_claims:
        - claim-safety-injection-defense-025
        - claim-safety-injection-defense-026
      review:
        review_status: accepted
        reviewers:
          - reviewer_id: moonweave-safety-domain-reviewer
            reviewer_role: domain
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 领域复核确认 DocumentLoader 由加载器类型、配置和摄取运行识别，SourceAttachment 由来源 URI、版本、摘要和附件上下文识别；安全扫描不改变二者的摄取身份。当前 accepted 关系没有直接连接它们与 PatternScan/PoisonedContent。
              en: Domain review confirms DocumentLoader identity from loader type, configuration, and ingestion run and SourceAttachment identity from source URI, version, digest, and attachment context. Security scanning does not change their ingestion identity, and no accepted relation directly connects them to PatternScan or PoisonedContent.
              ja: domain review は DocumentLoader が loader type/configuration/ingestion run、SourceAttachment が source URI/version/digest/attachment context で識別され security scan で ingestion identity は変わらず、PatternScan/PoisonedContent への accepted direct relation は無いと確認しました。
          - reviewer_id: moonweave-ontology-structure-reviewer
            reviewer_role: ontology
            reviewer_kind: automated-agent
            reviewed_on: 2026-07-14
            decision_note:
              zh: 结构复核保留 DocumentLoader、SourceAttachment 为 ingestion-owned references 候选并令 relation_ids=N/A；不能把“会被扫描”自动转写为所有加载器/附件与检测活动之间的无条件本体边。
              en: Ontology review retains DocumentLoader and SourceAttachment as ingestion-owned comparison candidates with relation_ids N/A. Being subject to scanning cannot be rewritten automatically as an unconditional ontology edge from every loader or attachment to a detection activity.
              ja: ontology review は DocumentLoader/SourceAttachment を ingestion-owned comparison candidate とし relation_ids=N/A を維持しました。scan 対象になり得ることを全 loader/attachment と detection activity の unconditional ontology edge に変換しません。
