schema: moonweave.ai/ontology-node/v1
id: InjectionSignature
kind: concept
status: accepted
labels:
  zh: 注入特征规范
  en: injection signature specification
  ja: 注入シグネチャ仕様
semantics:
  short_definition:
    zh: 定义可识别注入证据及适用范围的版本化检测规范。
    en: A versioned detection specification for recognizable injection evidence and its applicability conditions.
    ja: 識別可能な注入証拠と適用条件を定める版管理された検出仕様。
  definition:
    zh: 注入特征是一种规范：它声明要匹配的语言、结构、编码、语义或行为模式、适用内容类型、阈值和版本。它供检测活动使用，不是一次匹配事件，也不是已确认的 ThreatSignal。
    en: An InjectionSignature is a specification declaring a linguistic, structural, encoded, semantic, or behavioral pattern, its applicable content types, thresholds, and version. Detection activities use it; it is neither a match event nor a confirmed ThreatSignal.
    ja: 注入署名は、言語的・構造的・符号化・意味的・行動的パターン、適用内容型、閾値、版を宣言する仕様です。検出活動が使用するもので、一致イベントや確認済み ThreatSignal ではありません。
  why_needed:
    zh: 把检测标准版本化，才能解释同一内容为何在不同规则集下得到不同结果。
    en: Versioning the detection criterion explains why the same content receives different results under different rulesets.
    ja: 検出基準を版管理することで、同じ内容が異なる規則集合で別の結果になる理由を説明できます。
  includes:
    - zh: 包含可执行或可评估的模式、适用范围、阈值、版本和预期命中语义。
      en: Includes an evaluable pattern, applicability scope, threshold, version, and stated match meaning.
      ja: 評価可能なパターン、適用範囲、閾値、版、一致の意味を含みます。
  excludes:
    - zh: 不包含某次 PatternScan、扫描结果或未经证据确认的威胁标签。
      en: Excludes a PatternScan run, its result, and threat labels asserted without evidence.
      ja: PatternScan 実行、その結果、証拠なしの脅威ラベルは含みません。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - injection_signature_id
    - revision
  fields:
    - id: injection_signature_id
      labels:
        zh: 注入特征系列标识
        en: injection-signature series ID
        ja: 注入シグネチャ系列 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一个可持续修订的检测特征系列；该字段本身不标识某次扫描或命中事件。
        en: Stably identifies a detection-signature series that may be revised over time; it does not identify a scan or match event.
        ja: 継続的に revision される detection-signature series を安定識別し、scan や match event は識別しません。
      allowed_values: []
      pattern: null
      example_value: SIG-B64
      source_claims:
        - claim-injection-signature-002
    - id: revision
      labels:
        zh: 特征修订版
        en: signature revision
        ja: シグネチャ revision
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 标识模式表达式、阈值、适用范围和匹配含义保持一致的一版规范；任一判定语义改变都必须递增修订版。
        en: Identifies one revision in which expression, threshold, applicability, and match meaning remain fixed; changing any decision semantics requires a new revision.
        ja: expression、threshold、applicability、match meaning が固定された一版を識別し、判定 semantics の変更には新しい revision が必要です。
      allowed_values: []
      pattern: null
      example_value: "3"
      source_claims:
        - claim-injection-signature-003
    - id: pattern_kind
      labels:
        zh: 模式判定层次
        en: pattern decision kind
        ja: パターン判定種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 说明该特征主要在哪一判定层次成立：语言表述、结构、编码、语义意图或跨步骤行为；它不表示威胁严重度。
        en: States the primary decision layer at which the signature holds—linguistic, structural, encoded, semantic, or cross-step behavioral—not threat severity.
        ja: signature が成立する主な判定 layer（linguistic、structural、encoded、semantic、cross-step behavioral）を示し、severity は示しません。
      allowed_values:
        - id: InjectionPatternKindLinguistic
          value: linguistic
          labels:
            zh: 语言表述模式
            en: linguistic
            ja: 言語表現
          definitions:
            zh: 依据词语、句法或指令措辞直接判断，且无需先解码或推断跨步骤行为。
            en: Matches words, syntax, or instruction phrasing directly without first decoding content or inferring cross-step behavior.
            ja: decode や cross-step behavior 推論をせず、語句、構文、指示表現を直接判定します。
          status: accepted
          source_claims:
            - claim-injection-signature-004
        - id: InjectionPatternKindStructural
          value: structural
          labels:
            zh: 结构模式
            en: structural
            ja: 構造パターン
          definitions:
            zh: 依据标记层级、角色边界、参数结构、路径形态或字段组合判断。
            en: Matches markup hierarchy, role boundaries, argument structure, path form, or field combinations.
            ja: markup hierarchy、role boundary、argument structure、path form、field combination を判定します。
          status: accepted
          source_claims:
            - claim-injection-signature-005
        - id: InjectionPatternKindEncoded
          value: encoded
          labels:
            zh: 编码或混淆模式
            en: encoded
            ja: 符号化・難読化
          definitions:
            zh: 只有在明确的解码、反转义或去混淆步骤后，受检内容才满足判定条件。
            en: The inspected content satisfies the criterion only after an explicit decoding, unescaping, or deobfuscation step.
            ja: 明示的な decode、unescape、deobfuscation 後に内容が判定条件を満たします。
          status: accepted
          source_claims:
            - claim-injection-signature-006
        - id: InjectionPatternKindSemantic
          value: semantic
          labels:
            zh: 语义意图模式
            en: semantic
            ja: 意味意図
          definitions:
            zh: 依据内容表达的意图或作用判断，即使其具体用词与已知示例不同也可匹配。
            en: Matches the expressed intent or effect even when wording differs from known examples.
            ja: 既知例と wording が異なっても、表現された intent または effect に基づいて判定します。
          status: accepted
          source_claims:
            - claim-injection-signature-007
        - id: InjectionPatternKindBehavioral
          value: behavioral
          labels:
            zh: 跨步骤行为模式
            en: behavioral
            ja: 跨段階行動
          definitions:
            zh: 依据多个动作、工具调用或信息流步骤的组合行为判断，而不是单个文本片段。
            en: Matches a combination of actions, tool calls, or information-flow steps rather than one text span.
            ja: 単一 text span ではなく、複数 action、tool call、information-flow step の組合せを判定します。
          status: accepted
          source_claims:
            - claim-injection-signature-008
      pattern: null
      example_value: encoded
      source_claims:
        - claim-injection-signature-009
    - id: pattern_expression
      labels:
        zh: 可求值模式表达式
        en: evaluable pattern expression
        ja: 評価可能パターン式
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 以结构化对象声明检测器实际求值的条件、变换步骤和比较目标；不得只保存不可执行的自然语言标题。
        en: Declares the conditions, transformation steps, and comparison target actually evaluated by a detector; a non-executable natural-language title alone is insufficient.
        ja: detector が実際に評価する condition、transformation step、comparison target を構造化 object で宣言し、自然言語 title だけでは不十分です。
      allowed_values: []
      pattern: null
      example_value:
        encoding: base64
        decoded_semantic_condition: contains privilege-escalating tool instruction
      source_claims:
        - claim-injection-signature-010
    - id: applicable_content_types
      labels:
        zh: 适用内容类型
        en: applicable content types
        ja: 適用内容型
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出该表达式经过验证能够处理的内容类别，例如外部文本、工具参数或检索块；不在范围内的内容不得宣称未命中。
        en: Lists content categories for which the expression has been validated, such as external text, tool arguments, or retrieved chunks; out-of-scope content cannot be reported as a non-match.
        ja: expression が検証済みの external text、tool arguments、retrieved chunks などを列挙し、scope 外 content を non-match と報告しません。
      allowed_values: []
      pattern: null
      example_value:
        - external-text
      source_claims:
        - claim-injection-signature-011
    - id: match_threshold
      labels:
        zh: 匹配阈值
        en: match threshold
        ja: 一致閾値
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录归一化检测分数达到何值时才由该规范判为匹配，取值为 0 至 1；阈值不等于一次扫描的实际得分。
        en: Records the normalized detector score from 0 through 1 required for this specification to declare a match; it is not a scan's observed score.
        ja: この specification が match とする 0〜1 の normalized detector score 閾値を記録し、scan の実測 score とは区別します。
      allowed_values: []
      pattern: null
      example_value: 0.8
      source_claims:
        - claim-injection-signature-012
    - id: match_meaning
      labels:
        zh: 匹配所表达的风险含义
        en: match meaning
        ja: 一致のリスク意味
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 用人类可审查的句子说明达到阈值代表什么安全事实；不得把具体阻断或许可动作混入匹配定义。
        en: States in reviewable language what security fact crossing the threshold represents; the definition cannot embed a particular block or allow action.
        ja: threshold 到達が表す security fact を人が review できる文で示し、特定 block/allow action を match 定義へ混ぜません。
      allowed_values: []
      pattern: null
      example_value: decoded content attempts a privileged tool action outside authorized instructions
      source_claims:
        - claim-injection-signature-013
  constraints:
    - id: injection-signature-threshold-range
      severity: error
      expression_language: plain
      expression: match_threshold >= 0 AND match_threshold <= 1
      explanations:
        zh: 匹配阈值必须位于闭区间 [0,1]，以便扫描结果与同一修订版可重复比较。
        en: The match threshold must be in the closed interval [0,1] so scan scores remain reproducibly comparable with the same revision.
        ja: match threshold は閉区間 [0,1] とし、scan score を同じ revision と再現可能に比較します。
      source_claims:
        - claim-injection-signature-014
  required_relation_constraints: []
