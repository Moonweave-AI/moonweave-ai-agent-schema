    labels: {zh: 含隐藏命令的检索片段, en: Retrieved chunk with hidden command, ja: 隠れた命令を持つ取得チャンク}
    descriptions: {zh: "Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。", en: "Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page.", ja: "Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。"}
    field_values: {poisoned_content_id: poisoned-chunk-42, poisoning_mechanism: instruction-insertion, content_revision_reference: retrieved-chunk-42-r3, poisoning_evidence_reference: integrity-diff-42, poisoned_retrieved_chunk_id: poisoned-chunk-42, retrieval_query_id: query-42}
    related_node_ids: [PoisonedContent, IndirectInjectionSignal]
    related_relation_ids: [PoisonedRetrievedChunk-is_a-PoisonedContent]
