    field_values: {poisoned_content_id: tool-description-5, poisoning_mechanism: instruction-insertion, content_revision_reference: tool-description-5-r3, poisoning_evidence_reference: tool-description-diff-5, poisoned_tool_description_id: tool-description-5, description_revision: '3'}
