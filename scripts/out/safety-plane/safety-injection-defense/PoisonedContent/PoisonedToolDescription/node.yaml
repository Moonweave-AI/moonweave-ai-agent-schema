      description_revision: '3'
      poisoned_content_id: tool-description-3
      poisoned_tool_description_id: tool-description-3
      poisoning_evidence_reference: tool-description-diff-3
      poisoning_mechanism: schema-description-tampering
    related_node_ids: [PoisonedToolDescription]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
