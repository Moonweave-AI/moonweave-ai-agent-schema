  - id: malicious-tool-output-instance-report
    kind: instance
    labels: {zh: 报告工具实例, en: Reporting-tool instance, ja: レポートツールの実例}
    descriptions: {zh: "OWASP LLM01 场景 #5 引用 CVE-2024-5184：LLM 邮件助手允许注入提示访问敏感邮件内容。", en: "OWASP LLM01 Scenario #5 cites CVE-2024-5184: an LLM-powered email assistant allowed injected prompts to access sensitive mail content.", ja: "OWASP LLM01 シナリオ #5 は CVE-2024-5184：LLM email assistant が injected prompt で sensitive mail にアクセスした。"}
    field_values: {poisoned_content_id: tool-output-74, poisoning_mechanism: instruction-insertion, content_revision_reference: tool-output-74-r1, poisoning_evidence_reference: tool-output-scan-74, malicious_tool_output_id: tool-output-74, producing_tool_call_id: call-74}
    related_node_ids: [InstructionConflict, PreExecutionSafetyCheck]
