schema: moonweave.ai/ontology-node/v1
id: TaintEntity
kind: concept
status: accepted
labels:
  zh: 污点承载实体
  en: taint-bearing entity
  ja: 汚染保持実体
semantics:
  short_definition:
    zh: 被赋予可传播污点身份、可独立引用的实体。
    en: A referenceable entity assigned a taint identity that may be propagated under declared rules.
    ja: 宣言規則で伝播可能な汚染 ID を付与された参照可能実体。
  definition:
    zh: 污点承载实体是一种可寻址实体，具有稳定 taint_id、污点类别、赋值依据、开始与失效时间，并可作为 TaintPropagation 的端点。它不等同于风险角色、威胁信号或仅被判定低可信的质量。
    en: A TaintEntity is an addressable entity with a stable taint_id, taint class, assignment basis, start and expiry times, and eligibility as an endpoint of TaintPropagation. It is not a risk role, ThreatSignal, or a mere low-trust quality assessment.
    ja: 汚点担体実体は、安定した taint_id、汚染種別、付与根拠、開始・失効時刻を持ち、TaintPropagation の端点になれるアドレス可能実体です。リスク役割、ThreatSignal、単なる低信頼品質評価ではありません。
  why_needed:
    zh: 统一污点身份使来源级和范围级对象可以经过转换保持可审计关联。
    en: A common taint identity lets source-level and span-level objects remain audibly linked through transformations.
    ja: 共通の汚染 ID により、出所単位と範囲単位の対象を変換後も監査可能に結び付けられます。
  includes:
    - zh: 包含可引用对象、污点 ID、类别、依据以及有效期。
      en: Includes a referenceable object, taint ID, class, basis, and validity interval.
      ja: 参照可能対象、汚染 ID、種別、根拠、有効期間を含みます。
  excludes:
    - zh: 不包含只有风险分数但无污点身份的对象，也不包含传播事件。
      en: Excludes objects with only a risk score and no taint identity and excludes propagation events.
      ja: リスクスコアだけで汚染 ID のない対象や伝播イベントは含みません。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - taint_id
  fields:
    - id: taint_id
      labels:
        zh: 污点标识
        en: taint ID
        ja: taint ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 稳定标识一次有证据依据的污点赋值；它标识赋值记录，而不是复用承载对象或传播事件的标识。
        en: Stable identifier for one evidence-backed taint assignment; it identifies the assignment record rather than reusing the bearer or propagation-event identifier.
        ja: 証拠に基づく一回の taint 付与を安定識別し、担体や伝播 event の ID を流用しません。
      allowed_values: []
      pattern: null
      example_value: taint/T17
      source_claims:
        - claim-taint-entity-002
    - id: taint_class
      labels:
        zh: 污点类别
        en: taint class
        ja: taint 種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录经证据或策略判定的影响类别，例如间接指令、未受信输出或数据外泄诱导，不以单一风险分数替代。
        en: Evidence- or policy-determined influence category, such as indirect instruction, untrusted output, or exfiltration lure; a scalar risk score is not a substitute.
        ja: 証拠または方針で決めた indirect instruction、untrusted output、exfiltration lure 等の影響種別で、単一 risk score では代用しません。
      allowed_values: []
      pattern: null
      example_value: indirect-instruction
      source_claims:
        - claim-taint-entity-003
    - id: assignment_basis
      labels:
        zh: 赋值依据
        en: assignment basis
        ja: 付与根拠
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用直接支持该污点赋值的检测发现、人工裁决或版本化安全策略；来源域本身不能自动成为赋值依据。
        en: Reference to the finding, human adjudication, or versioned security policy that directly supports this taint assignment; origin domain alone is insufficient.
        ja: 当該 taint 付与を直接支える finding、人手判定、版管理済み security policy を参照し、出所 domain だけでは根拠になりません。
      allowed_values: []
      pattern: null
      example_value: finding://scan-31
      source_claims:
        - claim-taint-entity-004
    - id: valid_from
      labels:
        zh: 赋值有效起点
        en: assignment valid from
        ja: 付与有効開始
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该污点赋值开始约束承载对象的 UTC 时间，表示安全状态生效时间，而不是收集器后来观察到记录的时间。
        en: UTC instant when the taint assignment begins constraining the bearer, representing state-effective time rather than the collector's later observation time.
        ja: taint 付与が担体を拘束し始める UTC 時刻で、collector が後に記録を観測した時刻ではなく状態の発効時刻です。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T10:18:00.000Z
      source_claims:
        - claim-taint-entity-005
    - id: valid_until
      labels:
        zh: 赋值有效终点
        en: assignment valid until
        ja: 付与有効終了
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 复检、处置或策略修订使该污点赋值停止有效的 UTC 时间；赋值仍有效时必须为空。
        en: UTC instant when rescan, remediation, or policy revision ends this taint assignment; it remains absent while the assignment is active.
        ja: 再走査、対処、方針改訂で taint 付与が終了する UTC 時刻で、付与が有効な間は空にします。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T11:40:00.000Z
      source_claims:
        - claim-taint-entity-006
    - id: evidence_refs
      labels:
        zh: 赋值证据引用
        en: assignment evidence references
        ja: 付与証拠参照
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用支持污点类别、承载对象版本与有效期的扫描结果、内容摘要、策略决策或人工复核记录。
        en: References to scan results, content digests, policy decisions, or human-review records supporting the taint class, bearer version, and validity interval.
        ja: taint class、担体版、有効期間を支える scan result、content digest、policy decision、人手 review record を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - finding://scan-31
        - digest://object-C2/sha256-7c1a
      source_claims:
        - claim-taint-entity-007
  constraints:
    - id: taint-entity-requires-explicit-evidence-backed-assignment
      severity: error
      expression_language: plain
      expression: taint_id, taint_class, assignment_basis, valid_from, and at least one evidence_ref are present; valid_until is null or valid_until >= valid_from
      explanations:
        zh: TaintEntity 是有明确依据和期限的安全赋值记录；低信任分数、外部来源或图上邻接都不能单独创建它。初始赋值不要求已有传播事件。
        en: TaintEntity is an evidence-backed, time-bounded security assignment. A low-trust score, external origin, or graph adjacency cannot create it alone, and an initial assignment need not already have a propagation event.
        ja: TaintEntity は根拠と期間を持つ security assignment であり、低 trust score、外部出所、graph adjacency だけでは生成できません。初回付与には既存 propagation event を要求しません。
      source_claims:
        - claim-taint-entity-008
  required_relation_constraints: []
examples:
  
- id: TaintEntity-real-positive-001
    kind: positive
    labels:
      zh: Greshake 间接注入污点
      en: Greshake indirect-injection taint
      ja: Greshake 間接注入 taint
    scenario_id: null
    descriptions: {zh: "Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。", en: "Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page.", ja: "Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。"}
  - id: TaintEntity-real-counter-002
    kind: counterexample
    labels:
      zh: EchoLeak 误当最终泄露
      en: EchoLeak mistaken as completed leak
      ja: EchoLeak を漏えい完了と誤認
    scenario_id: null
    descriptions: {zh: "EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。", en: "EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025).", ja: "EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。"}
  - id: TaintEntity-real-boundary-003
    kind: boundary
    labels:
      zh: Willison 分层控制边界
      en: Willison layered-control boundary
      ja: Willison layered control 境界
    scenario_id: null
    descriptions: {zh: "OpenAI 描述 source-sink 分析：不可信内容影响代理并结合危险传输或工具能力。", en: "OpenAI describes source-sink analysis: untrusted content influencing an agent combined with a dangerous transmission or tool capability (openai.com/index/designing-agents-to-resist-prompt-injection/).", ja: "OpenAI は source-sink 分析：untrusted content と dangerous transmission/tool capability の組み合わせを説明する。"}
  - id: TaintEntity-real-instance-004
    kind: instance
    labels:
      zh: OWASP LLM01 直接注入污点
      en: OWASP LLM01 direct-injection taint
      ja: OWASP LLM01 直接注入 taint
    scenario_id: null
    descriptions: {zh: "Simon Willison 记录 prompt injection 为未解问题：不可信文本可劫持 LLM 集成应用。", en: "Simon Willison documented prompt injection as an unsolved problem where untrusted text can hijack LLM-integrated apps (simonwillison.net/tags/prompt-injection/).", ja: "Simon Willison は prompt injection を untrusted text が LLM 統合 app を hijack し得る未解問題として記録した。"}
external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation: null
relations: []
review:
  status: accepted
  method: manual-semantic
  reviewer: manual-safety-verification
  reviewed_on: 2026-07-17
  note:
    zh: 已对照 OWASP LLM01:2025、NIST AI 100-2e2025 与间接注入/污点跟踪研究逐项人工语义核验；定义、层次、关系与案例边界成立。
    en: Manually verified against OWASP LLM01:2025, NIST AI 100-2e2025, and indirect-injection/taint-tracking research; definitions, hierarchy, relations, and example boundaries hold.
    ja: OWASP LLM01:2025、NIST AI 100-2e2025、indirect-injection/taint-tracking research に照らし手動意味審査を完了しました。
  sections:
    semantics: accepted
    hierarchy: accepted
    relations: accepted
    structure: accepted
    examples: accepted
    source_claims: accepted
source_claims:
  - id: claim-taint-entity-001
    source: eng-security-mcp-nsa-2026
    supports: NSA requires every output to be treated as untrusted input to the next phase and inspected before forwarding; Moonweave uses explicit taint identities rather than implicit adjacency to track selected objects.
    locator: Recommendations > Filter and monitor output pipelines, pp. 11–12
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-taint-entity-002
    source: eng-ont-prov-o
    supports: PROV-O keeps an Entity's identity separate from activities and qualified derivation events. Moonweave likewise gives each taint assignment a stable identity distinct from its bearer and propagation events.
    locator: PROV-O Recommendation > §5.1 Entity and §5.3 qualified relations
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-taint-entity-003
    source: eng-security-nist-ai-100-2e2025
    supports: NIST distinguishes indirect prompt injection by attack condition and execution trigger rather than treating all low-trust content as one undifferentiated score. Moonweave records the judged security class explicitly.
    locator: NIST AI 100-2e2025 > §3.4 Indirect Prompt Injection and §3.4.2 execution triggers, pp. 62-64
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-taint-entity-004
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends explicit origin verification, inspection, and traceable detection configuration instead of implicit trust judgments. Moonweave therefore requires a concrete assignment basis.
    locator: NSA MCP Security Design Considerations > Design for boundaries, pp. 9-10; Instrument for logging and detection, pp. 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-taint-entity-005
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry distinguishes event Timestamp from ObservedTimestamp. Moonweave uses valid_from for the security assignment's effective event time.
    locator: OpenTelemetry Logs Data Model > Log and Event Record Definition > Timestamp and ObservedTimestamp
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-taint-entity-006
    source: eng-ont-prov-o
    supports: PROV-O models invalidation as the event after which an Entity ceases to be available for use. Moonweave applies an explicit end boundary to a taint assignment without deleting its history.
    locator: PROV-O Recommendation > §5.3.4 Invalidation and prov:invalidatedAtTime
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-taint-entity-007
    source: eng-security-mcp-nsa-2026
    supports: NSA calls for logging exact inputs, outputs, identities, and integrity information so security findings can be reconstructed. Moonweave requires those records as evidence for the assignment.
    locator: NSA MCP Security Design Considerations > Poor or missing audit logs, pp. 7-8; Instrument for logging and detection, pp. 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-taint-entity-008
    source: eng-security-mcp-nsa-2026
    supports: NSA requires explicit inspection and traceable evidence at trust boundaries, while not asserting that every external object is malicious. Moonweave creates taint assignments only from concrete evidence or policy.
    locator: NSA MCP Security Design Considerations > Design for boundaries, pp. 9-10; Filter and monitor output pipelines, pp. 11-12
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-taint-entity-009
    source: eng-security-mcp-nsa-2026
    supports: "NSA requires every output to be treated as untrusted input to the next phase and inspected before forwarding; Moonweave uses explicit taint identities rather than implicit adjacency to track selected objects. The positive case specifically tests this distinction: Object C-2 receives T17, class indirect-instruction, basis scan-31, and expiry after a successful rescan."
    locator: Recommendations > Filter and monitor output pipelines, pp. 11–12
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-taint-entity-010
    source: eng-security-mcp-nsa-2026
    supports: "NSA requires every output to be treated as untrusted input to the next phase and inspected before forwarding; Moonweave uses explicit taint identities rather than implicit adjacency to track selected objects. The boundary case specifically tests this distinction: An object has trust_score=0.4 but no taint_id or assignment basis; it is a low-trust assessment, not a TaintEntity."
    locator: Recommendations > Filter and monitor output pipelines, pp. 11–12
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
