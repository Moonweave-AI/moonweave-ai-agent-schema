schema: moonweave.ai/ontology-node/v1
id: TaintedSource
kind: concept
status: accepted
labels:
  en: taint-marked source object
  zh: 整体污点来源对象
  ja: 全体 taint 付与済み出所対象
semantics:
  short_definition:
    zh: 被赋予污点标识并作为可追踪影响起点的来源实体。
    en: A source entity assigned a taint identity as the traceable origin of an influence.
    ja: 追跡可能な影響起点として汚染 ID を付与された出所実体。
  definition:
    zh: 污点来源是一种 TaintEntity，代表带稳定身份的消息、资源、工具输出、记忆项或其他来源对象，因具体证据或策略被赋予污点类别和起始时间。它不同于流中的 RiskSource 角色，也不同于该来源内部的 TaintedSpan。
    en: A TaintedSource is a TaintEntity representing an identity-bearing message, resource, tool output, memory item, or other source object assigned a taint class and start time by evidence or policy. It differs from the flow-scoped RiskSource role and from a TaintedSpan inside the source.
    ja: 汚点出所は、メッセージ、資源、ツール出力、記憶項目などの同一性を持つ出所対象へ、証拠または方針により汚染種別と開始時刻を付与した TaintEntity です。流内の RiskSource 役割や、出所内部の TaintedSpan とは異なります。
  why_needed:
    zh: 稳定来源身份让多个范围和派生对象共享同一溯源起点，而不把角色当实体。
    en: A stable source identity lets multiple spans and derived objects share one provenance origin without treating a role as an entity.
    ja: 安定した出所同一性により、役割を実体化せず複数範囲と派生対象が同じ来歴起点を共有できます。
  includes:
    - zh: 包含可引用来源对象、污点 ID、污点类别、赋值依据和起始时间。
      en: Includes a referenceable source object, taint ID, taint class, assignment basis, and start time.
      ja: 参照可能な出所対象、汚染 ID、汚染種別、付与根拠、開始時刻を含みます。
  excludes:
    - zh: 不包含只有某个局部范围被标记而整体未赋污点的来源，也不包含流角色。
      en: Excludes a source whose whole identity is not tainted when only one local span is marked, and excludes flow roles.
      ja: 局所範囲だけが標識され全体へ汚染 ID がない出所や、流役割は含みません。
  semantic_kind: entity
  aliases: []
structure:
  identity_keys:
    - taint_id
  fields:
    - id: taint_id
      labels:
        zh: 污点标识
        en: taint ID
        ja: taint ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 继承并复用所属 TaintEntity 的稳定赋值标识，使整个来源对象的污点状态可被独立引用和追踪。
        en: Stable assignment identifier inherited from the owning TaintEntity, making the whole-source taint state independently referenceable and traceable.
        ja: 親 TaintEntity の安定 assignment ID を継承し、出所対象全体の taint 状態を独立参照・追跡可能にします。
      allowed_values: []
      pattern: null
      example_value: taint/T9
      source_claims:
        - claim-tainted-source-002
    - id: bearer_ref
      labels:
        zh: 整体承载对象引用
        en: whole-bearer reference
        ja: 全体担体参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用被整体赋予污点的消息、资源、检索块、工具结果或记忆对象，不引用其中的局部字符范围。
        en: Reference to the message, resource, retrieved chunk, tool result, or memory object tainted as a whole, not to a local character range inside it.
        ja: 全体へ taint を付与した message、resource、retrieved chunk、tool result、memory object を参照し、内部の局所文字範囲は指しません。
      allowed_values: []
      pattern: null
      example_value: tool-result://R-5
      source_claims:
        - claim-tainted-source-003
    - id: bearer_version
      labels:
        zh: 承载对象版本
        en: bearer version
        ja: 担体版
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 固定接受整体污点赋值的对象版本、内容摘要或事件序列，避免赋值无意漂移到后续干净修订。
        en: Version, content digest, or event sequence fixing the object that received the whole-object assignment so it cannot drift to a later clean revision.
        ja: 全体 taint 付与を受けた対象の版、content digest、event sequence を固定し、後の clean revision へ付与がずれないようにします。
      allowed_values: []
      pattern: null
      example_value: sha256:r5-8c7d
      source_claims:
        - claim-tainted-source-004
    - id: whole_object_assignment_basis
      labels:
        zh: 整体赋值依据
        en: whole-object assignment basis
        ja: 全体付与根拠
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用明确说明为何整个固定版本均受影响的发现、策略或裁决；只证明一个局部片段时不得使用本字段。
        en: Reference to the finding, policy, or adjudication explicitly establishing why the entire fixed bearer version is affected; local-span evidence is insufficient.
        ja: 固定担体版の全体が影響対象である理由を明示する finding、policy、adjudication を参照し、局所 span の証拠だけでは使えません。
      allowed_values: []
      pattern: null
      example_value: policy-decision://remote-tool-output/deny-untrusted-origin
      source_claims:
        - claim-tainted-source-005
    - id: taint_class
      labels:
        zh: 整体污点类别
        en: whole-object taint class
        ja: 全体 taint 種別
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录适用于整个承载版本的安全影响类别，并与赋值依据中的判定一致，不把外部来源直接等同于恶意。
        en: Security influence category applying to the complete bearer revision and agreeing with the assignment basis; external origin alone is not equivalent to maliciousness.
        ja: 担体版全体へ適用する security influence 種別で、付与根拠の判定と一致させ、外部出所だけを malicious と同一視しません。
      allowed_values: []
      pattern: null
      example_value: untrusted-output
      source_claims:
        - claim-tainted-source-006
    - id: valid_from
      labels:
        zh: 整体赋值有效起点
        en: whole assignment valid from
        ja: 全体付与有効開始
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 整体污点状态对指定承载版本开始生效的 UTC 时间，不以检测记录后来进入存储的时间替代。
        en: UTC instant when the whole-object taint state becomes effective for the specified bearer revision, distinct from later record-ingestion time.
        ja: 指定担体版への全体 taint 状態が発効する UTC 時刻で、検出記録が後に保存された時刻では代用しません。
      allowed_values: []
      pattern: null
      example_value: 2026-07-14T10:16:30.000Z
      source_claims:
        - claim-tainted-source-007
    - id: valid_until
      labels:
        zh: 整体赋值有效终点
        en: whole assignment valid until
        ja: 全体付与有効終了
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 复核、替换或处置使整个对象版本的污点状态终止的 UTC 时间；仍有效时必须为空。
        en: UTC instant when review, replacement, or remediation ends the taint state for the complete bearer revision; absent while active.
        ja: review、replacement、remediation で担体版全体の taint 状態が終了する UTC 時刻で、有効中は空にします。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-tainted-source-008
    - id: evidence_refs
      labels:
        zh: 整体赋值证据
        en: whole-assignment evidence
        ja: 全体付与証拠
      datatype: array[reference]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 引用证明对象身份、固定版本、全覆盖判定与安全类别的内容摘要、扫描发现和策略决策记录。
        en: References to content digests, scan findings, and policy decisions proving bearer identity, fixed revision, full-object coverage, and security class.
        ja: 担体 identity、固定 revision、全体 coverage、security class を証明する content digest、scan finding、policy decision を参照します。
      allowed_values: []
      pattern: null
      example_value:
        - digest://tool-result-R5/sha256-r5-8c7d
        - finding://remote-origin-policy-9
      source_claims:
        - claim-tainted-source-009
  constraints:
    - id: tainted-source-requires-whole-object-coverage
      severity: error
      expression_language: plain
      expression: bearer_ref and bearer_version identify one complete object revision; whole_object_assignment_basis explicitly covers that entire revision; evidence_refs is non-empty; valid_until is null or valid_until >= valid_from
      explanations:
        zh: 只有当依据覆盖整个固定版本时才实例化 TaintedSource；若证据仅定位局部字符、令牌或结构路径，应实例化 TaintedSpan。
        en: Instantiate TaintedSource only when the basis covers the complete fixed bearer revision. Evidence confined to characters, tokens, or a structural path belongs to TaintedSpan.
        ja: 根拠が固定担体版全体を覆う場合だけ TaintedSource を生成し、文字、token、structural path の局所証拠なら TaintedSpan を生成します。
      source_claims:
        - claim-tainted-source-010
  required_relation_constraints: []
