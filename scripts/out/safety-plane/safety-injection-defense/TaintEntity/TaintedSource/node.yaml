source_claims:
  - id: claim-tainted-source-001
    source: eng-security-mcp-nsa-2026
    supports: NSA requires explicit trust zones and origin verification rather than implicit trust; Moonweave assigns a stable taint identity to a particular source only when evidence or policy warrants tracking.
    locator: Recommendations > Design for boundaries, pp. 9–10; origin verification for dynamic tool discovery
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tainted-source-002
    source: eng-ont-prov-o
    supports: PROV-O specialization preserves traceable identity across a more specific view of an Entity. Moonweave uses the same taint assignment identity for the specialized whole-source record.
    locator: PROV-O Recommendation > §5.5.1 specializationOf and entity identity
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tainted-source-003
    source: eng-security-mcp-nsa-2026
    supports: NSA treats tool outputs and other cross-boundary artifacts as concrete inputs to downstream phases. Moonweave records the exact object whose complete content is under a taint assignment.
    locator: NSA MCP Security Design Considerations > Poisoning output for downstream automation, pp. 7-8; Filter and monitor output pipelines, pp. 11-12
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tainted-source-004
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends retaining exact payload hashes and result identities for chained execution. Moonweave binds the assignment to the evidenced bearer revision.
    locator: NSA MCP Security Design Considerations > Recommendations > Instrument for logging and detection, pp. 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tainted-source-005
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends explicit trust-boundary policy and output inspection. Moonweave requires the decision record that justifies applying the security state to the complete object.
    locator: NSA MCP Security Design Considerations > Recommendations > Design for boundaries, pp. 9-10; Filter and monitor output pipelines, pp. 11-12
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tainted-source-006
    source: eng-security-owasp-llm01-2025
    supports: OWASP distinguishes prompt-injection outcomes such as unauthorized access, command execution, disclosure, and decision manipulation. Moonweave records the adjudicated class rather than a generic bad-content flag.
    locator: OWASP LLM01:2025 Prompt Injection > Description, impacts, and attack scenarios
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tainted-source-007
    source: eng-observe-opentelemetry-logs
    supports: OpenTelemetry distinguishes the time an event occurred from the time it was observed. Moonweave uses the effective assignment time for valid_from.
    locator: OpenTelemetry Logs Data Model > Log and Event Record Definition > Timestamp and ObservedTimestamp
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tainted-source-008
    source: eng-ont-prov-o
    supports: PROV-O invalidation marks the end of availability without erasing prior provenance. Moonweave preserves the historical assignment while recording its end boundary.
    locator: PROV-O Recommendation > §5.3.4 Invalidation and prov:invalidatedAtTime
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tainted-source-009
    source: eng-security-mcp-nsa-2026
    supports: NSA recommends logging exact tool inputs, outputs, identities, hashes, and detection context. Moonweave retains those references for each whole-object assignment.
    locator: NSA MCP Security Design Considerations > Poor or missing audit logs, pp. 7-8; Instrument for logging and detection, pp. 12-13
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tainted-source-010
    source: eng-security-owasp-llm01-2025
    supports: OWASP notes that injected influence may be hidden in a small multimodal or textual portion. Moonweave therefore does not promote a local finding into a whole-object assignment without explicit coverage evidence.
    locator: OWASP LLM01:2025 Prompt Injection > imperceptible inputs, payload splitting, and multimodal injection scenarios
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tainted-source-011
    source: eng-security-mcp-nsa-2026
    supports: "NSA requires explicit trust zones and origin verification rather than implicit trust; Moonweave assigns a stable taint identity to a particular source only when evidence or policy warrants tracking. The positive case specifically tests this distinction: Remote tool result R-5 is assigned taint_id=T9 and class=untrusted-output as the origin for downstream derivation tracking."
    locator: Recommendations > Design for boundaries, pp. 9–10; origin verification for dynamic tool discovery
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tainted-source-012
    source: eng-security-mcp-nsa-2026
    supports: "NSA requires explicit trust zones and origin verification rather than implicit trust; Moonweave assigns a stable taint identity to a particular source only when evidence or policy warrants tracking. The boundary case specifically tests this distinction: Only characters 40–55 of R-6 are hazardous while the rest is trusted and no source-level taint is assigned; instantiate TaintedSpan, not TaintedSource."
    locator: Recommendations > Design for boundaries, pp. 9–10; origin verification for dynamic tool discovery
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tainted-source-013
    source: eng-security-mcp-nsa-2026
    supports: NSA requires each chained output to be treated as untrusted input and inspected for injected prompts or code before it reaches the next phase. Moonweave distinguishes the identity-bearing source object, TaintedSource, from a reproducibly locatable hazardous portion inside it, TaintedSpan, so remediation can preserve clean content. NSA supports inspection and provenance needs but not the exact taint ontology.
    locator: Recommendations > Filter and monitor output pipelines and chained execution (pp. 12-13)
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-tainted-source-014
    source: eng-security-mcp-nsa-2026
    supports: NSA instructs that outputs be treated as untrusted inputs to the next phase. Moonweave represents an entire source object marked untrusted or sensitive as TaintedSource, a specialized TaintEntity carrier.
    locator: NSA MCP Security Design Considerations (May 2026), pp. 9–10, ‘Poisoning output for downstream automation’
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
