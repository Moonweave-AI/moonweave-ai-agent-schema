parent_relation: null
relations:
  - id: DefenseFinding-wasGeneratedBy-DetectionActivity
    predicate: was_generated_by
    target: concept:DetectionActivity
    endpoint_order: source-to-target
    direction: source-to-target
    relation_kind: provenance
    labels:
      zh: 由检测活动生成
      en: was generated by detection activity
      ja: 検出活動によって生成された
    definitions:
      zh: DefenseFinding 是由已发生的 DetectionActivity 生成的实体，并以 PROV-O
        wasGeneratedBy 保留检测来历，而不是作为该活动的结构组成部分。
      en: A DefenseFinding is an entity generated by an occurred DetectionActivity
        and retains detection provenance through PROV-O wasGeneratedBy rather than
        being a structural component of the activity.
      ja: DefenseFinding は発生済み DetectionActivity が生成したエンティティであり、活動の構造要素ではなく
        PROV-O wasGeneratedBy により検出来歴を保持する。
    cardinality:
      source:
        min: 0
        max: null
      target:
        min: 0
        max: null
    source_claims:
      - claim-prov-o-generation
    layout_role: cross-link
sources:
  - id: owasp-llm01-2025
    title: OWASP LLM01 Prompt Injection
    url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
    source_type: security-guidance
    relevance: Explains impacts from untrusted input altering model behavior.
  - id: w3c-prov-o
    title: W3C PROV-O
    url: https://www.w3.org/TR/prov-o/
    source_type: standard
    relevance: Defines Entity, Activity, and wasGeneratedBy relations for output provenance.
source_claims:
  - id: claim-owasp-finding-inference
    source: owasp-llm01-2025
    supports: Injection risk motivates evidence-backed severity and mitigation
      triage; it does not define this internal finding schema.
    locator: Overview and Prevention and Mitigation Strategies
    evidence_kind: design-inference
    confidence: high
  - id: claim-prov-o-generation
    source: w3c-prov-o
    supports: PROV-O defines prov:wasGeneratedBy between an Entity and an Activity. Moonweave uses that relation to record that an occurred DetectionActivity generated this finding; the finding's injection-risk semantics remain a local model informed by OWASP guidance.
    locator: "PROV-O: prov:Entity, prov:Activity, prov:wasGeneratedBy"
    evidence_kind: normative
    confidence: high
