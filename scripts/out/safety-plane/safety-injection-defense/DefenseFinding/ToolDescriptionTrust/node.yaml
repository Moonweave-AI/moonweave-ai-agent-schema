schema: moonweave.ai/ontology-node/v1
id: ToolDescriptionTrust
kind: concept
status: accepted
labels: {zh: 工具描述信任评估, en: Tool Description Trust, ja: ツール説明の信頼評価}
semantics:
  short_definition: {zh: "对工具描述或注释可被用于安全决策的信任基础所作的防护评估。", en: "A defense assessment of the trust basis for using a tool description or annotation in safety decisions.", ja: "安全決定にツール説明または注釈を使う際の信頼根拠に対する防御評価。"}
  definition: {zh: "ToolDescriptionTrust 是一种 DefenseFinding，记录工具描述、注释或元数据的来源、验证基础和可用信任级别。它不是工具本身、工具执行授权、服务器身份认证或允许将不受信任描述升级为指令。", en: "ToolDescriptionTrust is a DefenseFinding recording the source, verification basis, and usable trust level of a tool description, annotation, or metadata. It is not the tool itself, authorization to execute it, server authentication, or permission to elevate an untrusted description into instruction.", ja: "ToolDescriptionTrust はツール説明、注釈、メタデータの情報源、検証根拠、使用可能な信頼度を記録する DefenseFinding である。ツールそのもの、実行認可、サーバー認証、信頼できない説明を指示へ昇格する許可ではない。"}
  why_needed: {zh: "攻击者可通过描述或注释诱导模型，系统必须把服务器提供的声明与独立验证过的信任基础分开。", en: "Attackers can influence models through descriptions or annotations, so the system must distinguish server-provided claims from independently verified trust basis.", ja: "攻撃者は説明や注釈を通じてモデルへ影響できるため、システムはサーバー提供の主張と独立検証済み信頼根拠を区別しなければならない。"}
  includes: [{zh: "工具描述版本、来源服务器、验证基础、评估信任级别和限制。", en: "Tool-description version, source server, verification basis, assessed trust level, and restrictions.", ja: "ツール説明版、提供サーバー、検証根拠、評価信頼度、制限。"}]
  excludes: [{zh: "工具返回的实际结果内容。", en: "The actual result content returned by a tool.", ja: "ツールが返す実際の結果内容。"}]
  semantic_kind: finding
  aliases: [tool-metadata-trust-assessment]
engineering:
  explanation: {zh: "默认将不受信任服务器提供的工具注释视为不受信任数据。只有独立登记、签名或明确受信任的配置可构成信任基础；即使如此，描述也不能直接改变系统指令或策略。", en: "Treat annotations supplied by an untrusted server as untrusted data by default. Only independent registration, signature, or explicitly trusted configuration may establish a trust basis; even then, a description cannot directly change system instructions or policy.", ja: "信頼できないサーバー提供の注釈は既定で信頼できないデータとして扱う。独立登録、署名、明示的な信頼済み構成だけが信頼根拠となり得るが、それでも説明はシステム指示やポリシーを直接変更できない。"}
  typical_input:
    - description: {zh: 工具描述元数据, en: Tool-description metadata, ja: ツール説明メタデータ}
      format: '{"tool_id":"tool-42","server":"untrusted.example","annotation":"safe to run","verification_basis":"server-claim"}'
      source_claims: [claim-mcp-tool-trust-inference]
  typical_output:
    - description: {zh: 信任评估, en: Trust assessment, ja: 信頼評価}
      format: '{"assessment_id":"tool-trust-42","tool_id":"tool-42","trust_level":"untrusted","restriction":"do-not-elevate"}'
      source_claims: [claim-mcp-tool-trust-inference]
  reference_implementations:
    - name: MCP Tools Specification
      url: https://modelcontextprotocol.io/specification/2025-11-25/server/tools
      description: "Requires clients to treat tool annotations from untrusted servers as untrusted."
structure:
  identity_keys: [defense_finding_id, tool_description_trust_id]
  fields:
    - id: defense_finding_id
      labels: {zh: 继承的防护发现标识符, en: Inherited defense finding ID, ja: 継承された防御発見 ID}
      definitions: {zh: 此工具描述信任评估作为 DefenseFinding 的稳定发现身份；它与评估记录标识同一可审查发现。, en: "Stable finding identity for this tool-description trust assessment as a DefenseFinding; it identifies the same reviewable finding as the assessment record.", ja: "このツール説明信頼評価が DefenseFinding として持つ安定した発見 ID。評価記録と同じレビュー可能な発見を識別する。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: tool-trust-42
      allowed_values: []
      source_claims: [claim-mcp-tool-trust-inference]
    - id: severity
      labels: {zh: 严重度, en: Severity, ja: 重大度}
      definitions: {zh: 根据描述的可验证来源、完整性与可执行影响为该评估分配的风险优先级；已验证描述仍可保留 low 结论而非省略发现。, en: "Risk priority assigned from the description's verifiable provenance, integrity, and executable impact; a verified description may retain a low finding rather than omit the assessment.", ja: "説明の検証可能な来歴、完全性、実行上の影響から評価へ割り当てるリスク優先度。検証済み説明も評価を省略せず low の発見として保持できる。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: high
      allowed_values: [low, medium, high, critical]
      source_claims: [claim-mcp-tool-trust-inference]
    - id: evidence_reference
      labels: {zh: 证据引用, en: Evidence reference, ja: 証拠参照}
      definitions: {zh: 支持描述信任等级的签名、来源、架构或审查证据引用。, en: "Signature, provenance, schema, or review evidence reference supporting the description trust level.", ja: "説明の信頼レベルを裏付ける署名、来歴、スキーマ、またはレビュー証拠への参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: tool-description-revision-42
      allowed_values: []
      source_claims: [claim-mcp-tool-trust-inference]
    - id: tool_description_trust_id
      labels: {zh: 工具描述信任标识符, en: Tool description trust ID, ja: ツール説明信頼 ID}
      definitions: {zh: "一次工具描述信任评估的稳定标识符。", en: "Stable identifier for one tool-description trust assessment.", ja: "一つのツール説明信頼評価の安定識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: tool-trust-42
      allowed_values: []
      source_claims: [claim-mcp-tool-trust-inference]
    - id: assessed_trust_level
      labels: {zh: 评估信任级别, en: Assessed trust level, ja: 評価信頼度}
      definitions: {zh: "可用于处理此描述的证据支持信任级别。", en: "The evidence-backed trust level usable for handling this description.", ja: "この説明を扱うために使える証拠に裏付けられた信頼度。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: untrusted
      allowed_values: [untrusted, constrained, verified]
      source_claims: [claim-mcp-tool-trust-inference]
  constraints:
    - id: tool-description-trust-explicit-basis
      severity: error
      expression_language: plain
      expression: A ToolDescriptionTrust assessment must record independent trust basis before assigning verified level; a server-supplied annotation alone is insufficient.
      explanations: {zh: "服务器自我声明不能成为信任提升的唯一证据。", en: "A server self-claim cannot be the sole evidence for trust elevation.", ja: "サーバー自身の主張は信頼昇格の唯一の証拠になれない。"}
      explanation: {zh: "服务器自我声明不能成为信任提升的唯一证据。", en: "A server self-claim cannot be the sole evidence for trust elevation.", ja: "サーバー自身の主張は信頼昇格の唯一の証拠になれない。"}
      source_claims: [claim-mcp-tool-trust-inference]
  required_relations: []
examples:
  
- id: tool-description-trust-positive-untrusted
    kind: positive
    labels: {zh: 不受信任注释评估, en: Untrusted annotation assessment, ja: 信頼できない注釈評価}
    descriptions: {zh: "MCP Authorization（2025-11-25）将访问令牌绑定到 HTTP 传输的预期 resource 参数与所需 scope。", en: "MCP Authorization (2025-11-25) binds access tokens to the intended resource parameter and required scopes for HTTP transports.", ja: "MCP Authorization は HTTP transport の intended resource と required scope に access token を結び付ける。"}
    field_values: {defense_finding_id: tool-trust-42, severity: high, evidence_reference: tool-description-revision-42, tool_description_trust_id: tool-trust-42, assessed_trust_level: untrusted}
    related_node_ids: [ToolStreamInjectionSignal, MaliciousToolOutput]
    related_relation_ids: [ToolDescriptionTrust-is_a-DefenseFinding]
    expected_result: {zh: "描述不会绕过扫描或审批。", en: "The description cannot bypass scanning or approval.", ja: "説明はスキャンや承認を迂回できない。"}
    why_valid_or_invalid: {zh: "认证证明身份；MCP scope 验证是独立的授权步骤。", en: "Authentication proves identity; MCP scope validation is a separate authorization step.", ja: "認証は ID を証明する。MCP scope validation は独立した認可ステップである。"}
    synthetic: false
    source_claims: [claim-mcp-tool-trust-inference]
  - id: tool-description-trust-counter-self-verified
    kind: counterexample
    labels: {zh: 自我声明即已验证, en: Self-claim equals verified, ja: 自己主張を検証済みとする}
    descriptions: {zh: "MCP Authorization（2025-11-25）将访问令牌绑定到 HTTP 传输的预期 resource 参数与所需 scope。", en: "MCP Authorization (2025-11-25) binds access tokens to the intended resource parameter and required scopes for HTTP transports.", ja: "MCP Authorization は HTTP transport の intended resource と required scope に access token を結び付ける。"}
    field_values: {defense_finding_id: tool-trust-43, severity: low, evidence_reference: tool-description-signature-43, tool_description_trust_id: tool-trust-43, assessed_trust_level: verified}
    related_node_ids: [TrustedInstructionOverride, UntrustedInstructionCandidate]
    related_relation_ids: []
    expected_result: {zh: "拒绝信任提升。", en: "Reject the trust elevation.", ja: "信頼昇格を拒否する。"}
    why_valid_or_invalid: {zh: "认证证明身份；MCP scope 验证是独立的授权步骤。", en: "Authentication proves identity; MCP scope validation is a separate authorization step.", ja: "認証は ID を証明する。MCP scope validation は独立した認可ステップである。"}
    synthetic: false
    source_claims: [claim-mcp-tool-trust-inference]
  - id: tool-description-trust-boundary-output
    kind: boundary
    labels: {zh: 描述信任与工具输出, en: Description trust versus tool output, ja: 説明信頼とツール出力}
    descriptions: {zh: "MCP Authorization（2025-11-25）将访问令牌绑定到 HTTP 传输的预期 resource 参数与所需 scope。", en: "MCP Authorization (2025-11-25) binds access tokens to the intended resource parameter and required scopes for HTTP transports.", ja: "MCP Authorization は HTTP transport の intended resource と required scope に access token を結び付ける。"}
    field_values: {defense_finding_id: tool-trust-44, severity: medium, evidence_reference: tool-description-review-44, tool_description_trust_id: tool-trust-44, assessed_trust_level: constrained}
    related_node_ids: [MaliciousToolOutput, InboundResponse]
    related_relation_ids: []
    expected_result: {zh: "对两者分别保留来源和控制。", en: "Retain provenance and controls separately for both.", ja: "両方について来歴と制御を別々に保持する。"}
    why_valid_or_invalid: {zh: "认证证明身份；MCP scope 验证是独立的授权步骤。", en: "Authentication proves identity; MCP scope validation is a separate authorization step.", ja: "認証は ID を証明する。MCP scope validation は独立した認可ステップである。"}
    synthetic: false
    source_claims: [claim-mcp-tool-trust-inference]
  - id: tool-description-trust-instance-registered
    kind: instance
    labels: {zh: 登记工具描述实例, en: Registered tool-description instance, ja: 登録済みツール説明の実例}
    descriptions: {zh: "MCP Authorization（2025-11-25）将访问令牌绑定到 HTTP 传输的预期 resource 参数与所需 scope。", en: "MCP Authorization (2025-11-25) binds access tokens to the intended resource parameter and required scopes for HTTP transports.", ja: "MCP Authorization は HTTP transport の intended resource と required scope に access token を結び付ける。"}
    field_values: {defense_finding_id: tool-trust-45, severity: low, evidence_reference: tool-description-signature-45, tool_description_trust_id: tool-trust-45, assessed_trust_level: verified}
    related_node_ids: [PreExecutionSafetyCheck, UnsafeArgumentPattern]
    related_relation_ids: []
    expected_result: {zh: "已验证描述不会替代参数安全控制。", en: "Verified description does not replace argument safety control.", ja: "検証済み説明は引数安全制御を置き換えない。"}
    why_valid_or_invalid: {zh: "认证证明身份；MCP scope 验证是独立的授权步骤。", en: "Authentication proves identity; MCP scope validation is a separate authorization step.", ja: "認証は ID を証明する。MCP scope validation は独立した認可ステップである。"}
    synthetic: false
    source_claims: [claim-mcp-tool-trust-inference]
  - id: ToolDescriptionTrust-real-counterexample-2
    kind: counterexample
    labels: {zh: "ToolDescriptionTrust counterexample case", en: "ToolDescriptionTrust counterexample case", ja: "ToolDescriptionTrust counterexample case"}
    descriptions: {zh: "Simon Willison 记录 prompt injection 为未解问题：不可信文本可劫持 LLM 集成应用。", en: "Simon Willison documented prompt injection as an unsolved problem where untrusted text can hijack LLM-integrated apps (simonwillison.net/tags/prompt-injection/).", ja: "Simon Willison は prompt injection を untrusted text が LLM 統合 app を hijack し得る未解問題として記録した。"}
    field_values:
      assessed_trust_level: untrusted
      defense_finding_id: tool-trust-44
      evidence_reference: tool-description-revision-44
      severity: high
      tool_description_trust_id: tool-trust-44
    related_node_ids: [ToolDescriptionTrust]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "Willison 强调分层控制，因为仅靠模型级拒绝不足。", en: "Willison emphasizes layered controls because model-level refusal alone is insufficient.", ja: "Willison は model-level refusal だけでは不十分なため layered control を強調する。"}
    synthetic: false
    source_claims:
      - c
  - id: ToolDescriptionTrust-real-boundary-3
    kind: boundary
    labels: {zh: "ToolDescriptionTrust boundary case", en: "ToolDescriptionTrust boundary case", ja: "ToolDescriptionTrust boundary case"}
    descriptions: {zh: "Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。", en: "Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page.", ja: "Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。"}
    field_values:
      assessed_trust_level: untrusted
      defense_finding_id: tool-trust-45
      evidence_reference: tool-description-revision-45
      severity: high
      tool_description_trust_id: tool-trust-45
    related_node_ids: [ToolDescriptionTrust]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "该论文将检索到的网页文本视为不可信数据，不得成为指令权限。", en: "The paper treats retrieved webpage text as untrusted data that must not become instruction authority.", ja: "論文は取得 webpage テキストを命令権限になってはならない untrusted data として扱う。"}
    synthetic: false
    source_claims:
      - c
  - id: ToolDescriptionTrust-real-instance-4
    kind: instance
    labels: {zh: "ToolDescriptionTrust instance case", en: "ToolDescriptionTrust instance case", ja: "ToolDescriptionTrust instance case"}
    descriptions: {zh: "OWASP LLM01:2025 场景 #1：攻击者向客服聊天机器人注入提示，要求其忽略先前准则、查询私有数据存储并发送邮件（genai.owasp.org/llmrisk/llm01-prompt-injection/）。", en: "OWASP LLM01:2025 Scenario #1: an attacker injects a prompt into a customer-support chatbot instructing it to ignore prior guidelines, query private data stores, and send email (genai.owasp.org/llmrisk/llm01-prompt-injection/).", ja: "OWASP LLM01:2025 シナリオ #1：攻撃者がカスタマーサポート chatbot にプロンプトを注入し、以前のガイドラインを無視して private data store を照会しメール送信を指示する。"}
    field_values:
      assessed_trust_level: untrusted
      defense_finding_id: tool-trust-46
      evidence_reference: tool-description-revision-46
      severity: high
      tool_description_trust_id: tool-trust-46
    related_node_ids: [ToolDescriptionTrust]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "OWASP LLM01 将直接注入定义为用户提供的、改变模型行为的输入；信号记录可审查证据，而非已确认泄露。", en: "OWASP LLM01 documents direct injection as user-supplied input that alters model behavior; a signal records reviewable evidence, not a confirmed breach.", ja: "OWASP LLM01 は直接注入をモデル挙動を変えるユーザー供給入力として定義する。"}
    synthetic: false
    source_claims:
      - c
parent_relation:
  id: ToolDescriptionTrust-is_a-DefenseFinding
  predicate: is_a
  relation_kind: hierarchy
  labels: {zh: 是一种, en: is a specialized, ja: 特化された}
  definitions: {zh: "ToolDescriptionTrust 是关于工具元数据来源的 DefenseFinding。", en: "ToolDescriptionTrust is a DefenseFinding about tool-metadata provenance.", ja: "ToolDescriptionTrust はツールメタデータ来歴に関する DefenseFinding である。"}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  conditions:
    - id: tool-description-trust-parent-evidence
      severity: error
      expression_language: plain
      expression: The finding must retain the tool description revision and verification basis used for the assessment.
      explanations: {zh: "信任评估必须可回溯到特定元数据版本。", en: "A trust assessment must trace to a specific metadata revision.", ja: "信頼評価は特定メタデータ版へ追跡できなければならない。"}
      source_claims: [claim-mcp-tool-trust-inference]
  temporal_scope: valid-time
  constraints: []
  source_claims: [claim-mcp-tool-trust-inference]
relations: []
