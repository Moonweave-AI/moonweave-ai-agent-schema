schema: moonweave.ai/ontology-node/v1
id: RiskSource
kind: concept
status: accepted
labels: {zh: 风险来源, en: Risk Source, ja: リスクソース}
semantics:
  short_definition: {zh: "向源汇流引入不受信任或需控制内容的入口端点角色。", en: "A source-endpoint role that introduces untrusted or controlled content into a source-sink flow.", ja: "信頼できない、または制御が必要な内容をソース・シンクフローへ導入するソース端点の役割。"}
  definition: {zh: "RiskSource 是 RiskFlowRole，用于标识内容进入流的来源，例如外部资源、工具输出或持久上下文读取点。它不是内容本身、用户身份、网络地址或授权主体。", en: "RiskSource is a RiskFlowRole identifying where content enters a flow, such as an external resource, tool output, or persistent-context read point. It is not the content itself, a user identity, a network address, or an authorization principal.", ja: "RiskSource は外部リソース、ツール出力、永続コンテキスト読取り点など、内容がフローへ入る場所を識別する RiskFlowRole である。内容自体、ユーザーID、ネットワークアドレス、または認可主体ではない。"}
  why_needed: {zh: "按来源区分不受信任内容，可让系统在内容进入提示、记忆或工具参数前选择适当的检查。", en: "Distinguishing untrusted content by origin lets a system choose appropriate checks before it enters prompts, memory, or tool arguments.", ja: "出所によって信頼できない内容を区別すると、プロンプト、メモリ、ツール引数へ入る前に適切な検査を選べる。"}
  includes:
    - {zh: "关联流、来源端点、来源类别和内容出所引用。", en: "Associated flow, source endpoint, origin class, and content-provenance reference.", ja: "関連フロー、ソース端点、出所区分、内容出所参照。"}
  excludes:
    - {zh: "仅批准操作的人类审批者，或接收内容并影响后续行为的汇点。", en: "A human approver who only approves an operation or a sink that receives content and influences later behavior.", ja: "操作を承認するだけの人間承認者、または内容を受け取り後続の挙動へ影響するシンク。"}
  semantic_kind: role
  aliases: [untrusted-content-origin]
engineering:
  explanation: {zh: "接入层、检索器和工具调用网关为内容来源写入角色记录，并标记来源是否为外部资源、工具输出或持久记忆。安全策略按来源类别决定扫描、净化或隔离。", en: "Ingestion layers, retrievers, and tool-call gateways write role records for content origins and mark whether the origin is an external resource, tool output, or persistent memory. Safety policies select scanning, sanitization, or quarantine by origin class.", ja: "取込み層、リトリーバー、ツール呼出しゲートウェイは内容出所の役割記録を書き、出所が外部リソース、ツール出力、永続メモリのどれかを印付ける。安全ポリシーは出所区分で走査、無害化、隔離を選択する。"}
  typical_input:
    - description: {zh: "为已观察内容流指定来源端点。", en: "Source-endpoint assignment for an observed content flow.", ja: "観測済み内容フローに対するソース端点割当て。"}
      format: '{"flow_id":"flow-91","endpoint":"external-document","origin_class":"external-resource","artifact_id":"doc-17"}'
      source_claims: [claim-owasp-risk-source-inference]
  typical_output:
    - description: {zh: "带来源类别和流引用的风险来源角色。", en: "Risk-source role with origin class and flow reference.", ja: "出所区分とフロー参照を持つリスクソース役割。"}
      format: '{"risk_source_id":"source-91","flow_id":"flow-91","origin_class":"external-resource"}'
      source_claims: [claim-owasp-risk-source-inference]
  reference_implementations:
    - name: OWASP LLM01 Prompt Injection
      url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
      description: Explains prompt-injection risk from untrusted content.
structure:
  identity_keys: [risk_flow_role_id, risk_source_id]
  fields:
    - id: risk_flow_role_id
      labels: {zh: 继承的风险流角色标识符, en: Inherited risk flow role ID, ja: 継承されたリスクフロー役割 ID}
      definitions: {zh: 此风险来源作为 RiskFlowRole 的稳定端点角色身份；它与来源记录标识同一流端点角色分配。, en: "Stable endpoint-role identity for this risk source as a RiskFlowRole; it identifies the same flow-endpoint role assignment as the source record.", ja: "このリスクソースが RiskFlowRole として持つ安定した端点役割 ID。ソース記録と同じフロー端点役割割当てを識別する。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: source-91
      allowed_values: []
      source_claims: [claim-owasp-risk-source-inference]
    - id: role_type
      labels: {zh: 角色类型, en: Role type, ja: 役割型}
      definitions: {zh: 固定为 source，表明该端点将不受信任或受约束内容引入信息流。, en: "Fixed to source, indicating that this endpoint introduces untrusted or constrained content into the information flow.", ja: "source に固定する。この端点が信頼できない、または制約付きの内容を情報フローへ導入することを表す。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: source
      allowed_values: [source, sink]
      source_claims: [claim-owasp-risk-source-inference]
    - id: source_sink_flow_id
      labels: {zh: 源汇流标识符, en: Source-sink flow ID, ja: ソース・シンクフロー ID}
      definitions: {zh: 此来源角色描述的具体内容流记录标识符。, en: "Identifier of the concrete content-flow record described by this source role.", ja: "このソース役割が記述する具体的な内容フロー記録の識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: flow-91
      allowed_values: []
      source_claims: [claim-owasp-risk-source-inference]
    - id: endpoint_reference
      labels: {zh: 端点引用, en: Endpoint reference, ja: 端点参照}
      definitions: {zh: 在该内容流中充当来源的内容产生或引入端点引用。, en: "Reference to the content-producing or content-introducing endpoint that acts as the source in this flow.", ja: "このフローでソースとして振る舞う内容生成または導入端点への参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: external-resource
      allowed_values: []
      source_claims: [claim-owasp-risk-source-inference]
    - id: risk_source_id
      labels: {zh: 风险来源标识符, en: Risk source ID, ja: リスクソース ID}
      definitions: {zh: "一次内容流来源角色分配的稳定标识符。", en: "Stable identifier for one content-flow source-role assignment.", ja: "一つの内容フローソース役割割当ての安定した識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: source-91
      allowed_values: []
      source_claims: [claim-owasp-risk-source-inference]
    - id: origin_class
      labels: {zh: 来源类别, en: Origin class, ja: 出所区分}
      definitions: {zh: "内容进入流时的受控来源类别。", en: "Controlled category of the origin when content enters the flow.", ja: "内容がフローへ入るときの制御された出所区分。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: external-resource
      allowed_values: [external-resource, tool-output, persistent-memory, user-input]
      source_claims: [claim-owasp-risk-source-inference]
  constraints:
    - id: risk-source-provenance
      severity: error
      expression_language: plain
      expression: A RiskSource must reference one SourceSinkFlow, an origin endpoint, and a provenance-bearing origin class; it must not imply authorization trust.
      explanations: {zh: "来源角色表明内容从哪里进入，不表示该来源被授权或可信。", en: "A source role states where content enters; it does not indicate that the origin is authorized or trusted.", ja: "ソース役割は内容がどこから入るかを示すだけで、出所が認可済みまたは信頼済みであることを示さない。"}
      explanation: {zh: "来源角色表明内容从哪里进入，不表示该来源被授权或可信。", en: "A source role states where content enters; it does not indicate that the origin is authorized or trusted.", ja: "ソース役割は内容がどこから入るかを示すだけで、出所が認可済みまたは信頼済みであることを示さない。"}
      source_claims: [claim-owasp-risk-source-inference]
  required_relations: []
examples:
  
- id: risk-source-positive-web
    kind: positive
    labels: {zh: 外部网页来源, en: External webpage source, ja: 外部 Web ページソース}
    descriptions: {zh: "Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。", en: "Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page.", ja: "Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。"}
    field_values: {risk_flow_role_id: source-91, role_type: source, source_sink_flow_id: flow-91, endpoint_reference: external-resource, risk_source_id: source-91, origin_class: external-resource}
    related_node_ids: [RiskFlowRole, SourceSinkFlow]
    related_relation_ids: [RiskSource-is_a-RiskFlowRole]
    expected_result: {zh: "标记为不受信任来源并在消费前扫描。", en: "Mark it as an untrusted source and scan before consumption.", ja: "信頼できないソースとして印付け、消費前に走査する。"}
    why_valid_or_invalid: {zh: "该论文将检索到的网页文本视为不可信数据，不得成为指令权限。", en: "The paper treats retrieved webpage text as untrusted data that must not become instruction authority.", ja: "論文は取得 webpage テキストを命令権限になってはならない untrusted data として扱う。"}
    synthetic: false
    source_claims: [claim-owasp-risk-source-inference]
  - id: risk-source-counter-approver
    kind: counterexample
    labels: {zh: 工具请求审批者, en: Tool-request approver, ja: ツール要求の承認者}
    descriptions: {zh: "Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。", en: "Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page.", ja: "Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。"}
    field_values: {risk_flow_role_id: source-92, role_type: source, source_sink_flow_id: flow-92, endpoint_reference: user-input, risk_source_id: source-92, origin_class: user-input}
    related_node_ids: [HumanApproval]
    related_relation_ids: []
    expected_result: {zh: "拒绝风险来源分类。", en: "Reject the risk-source classification.", ja: "リスクソース分類を拒否する。"}
    why_valid_or_invalid: {zh: "该论文将检索到的网页文本视为不可信数据，不得成为指令权限。", en: "The paper treats retrieved webpage text as untrusted data that must not become instruction authority.", ja: "論文は取得 webpage テキストを命令権限になってはならない untrusted data として扱う。"}
    synthetic: false
    source_claims: [claim-owasp-risk-source-inference]
  - id: risk-source-boundary-memory
    kind: boundary
    labels: {zh: 记忆读取来源边界, en: Memory-read source boundary, ja: メモリ読取りソース境界}
    descriptions: {zh: "Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。", en: "Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page.", ja: "Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。"}
    field_values: {risk_flow_role_id: source-93, role_type: source, source_sink_flow_id: flow-93, endpoint_reference: persistent-memory, risk_source_id: source-93, origin_class: persistent-memory}
    related_node_ids: [PersistentContextRisk, RiskSink]
    related_relation_ids: []
    expected_result: {zh: "按读取流重新评估来源风险。", en: "Reassess origin risk for the read flow.", ja: "読取りフローに対して出所リスクを再評価する。"}
    why_valid_or_invalid: {zh: "该论文将检索到的网页文本视为不可信数据，不得成为指令权限。", en: "The paper treats retrieved webpage text as untrusted data that must not become instruction authority.", ja: "論文は取得 webpage テキストを命令権限になってはならない untrusted data として扱う。"}
    synthetic: false
    source_claims: [claim-owasp-risk-source-inference]
  - id: risk-source-instance-tool-result
    kind: instance
    labels: {zh: 工具结果来源实例, en: Tool-result source instance, ja: ツール結果ソースの実例}
    descriptions: {zh: "Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。", en: "Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page.", ja: "Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。"}
    field_values: {risk_flow_role_id: source-94, role_type: source, source_sink_flow_id: flow-94, endpoint_reference: tool-output, risk_source_id: source-94, origin_class: tool-output}
    related_node_ids: [MaliciousToolOutput, PersistentContextRisk]
    related_relation_ids: []
    expected_result: {zh: "在持久化前要求输出检查。", en: "Require output checking before persistence.", ja: "永続化前に出力検査を要求する。"}
    why_valid_or_invalid: {zh: "该论文将检索到的网页文本视为不可信数据，不得成为指令权限。", en: "The paper treats retrieved webpage text as untrusted data that must not become instruction authority.", ja: "論文は取得 webpage テキストを命令権限になってはならない untrusted data として扱う。"}
    synthetic: false
    source_claims: [claim-owasp-risk-source-inference]
  - id: RiskSource-real-counterexample-2
    kind: counterexample
    labels: {zh: "RiskSource counterexample case", en: "RiskSource counterexample case", ja: "RiskSource counterexample case"}
    descriptions: {zh: "EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。", en: "EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025).", ja: "EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。"}
    field_values:
      endpoint_reference: external-resource
      origin_class: external-resource
      risk_flow_role_id: source-91
      risk_source_id: source-91
      role_type: source
      source_sink_flow_id: flow-91
    related_node_ids: [RiskSource]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "EchoLeak 是通过邮件检索的已记录零点击间接注入，而非普通验证错误。", en: "EchoLeak is a documented zero-click indirect injection via email retrieval, not a generic validation error.", ja: "EchoLeak はメール取得経由の zero-click 間接注入として文書化されている。"}
    synthetic: false
    source_claims:
      - c
  - id: RiskSource-real-boundary-3
    kind: boundary
    labels: {zh: "RiskSource boundary case", en: "RiskSource boundary case", ja: "RiskSource boundary case"}
    descriptions: {zh: "OWASP LLM01:2025 场景 #1：攻击者向客服聊天机器人注入提示，要求其忽略先前准则、查询私有数据存储并发送邮件（genai.owasp.org/llmrisk/llm01-prompt-injection/）。", en: "OWASP LLM01:2025 Scenario #1: an attacker injects a prompt into a customer-support chatbot instructing it to ignore prior guidelines, query private data stores, and send email (genai.owasp.org/llmrisk/llm01-prompt-injection/).", ja: "OWASP LLM01:2025 シナリオ #1：攻撃者がカスタマーサポート chatbot にプロンプトを注入し、以前のガイドラインを無視して private data store を照会しメール送信を指示する。"}
    field_values:
      endpoint_reference: external-resource
      origin_class: external-resource
      risk_flow_role_id: source-91
      risk_source_id: source-91
      role_type: source
      source_sink_flow_id: flow-91
    related_node_ids: [RiskSource]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "OWASP LLM01 将直接注入定义为用户提供的、改变模型行为的输入；信号记录可审查证据，而非已确认泄露。", en: "OWASP LLM01 documents direct injection as user-supplied input that alters model behavior; a signal records reviewable evidence, not a confirmed breach.", ja: "OWASP LLM01 は直接注入をモデル挙動を変えるユーザー供給入力として定義する。"}
    synthetic: false
    source_claims:
      - c
  - id: RiskSource-real-instance-4
    kind: instance
    labels: {zh: "RiskSource instance case", en: "RiskSource instance case", ja: "RiskSource instance case"}
    descriptions: {zh: "OWASP LLM01 场景 #5 引用 CVE-2024-5184：LLM 邮件助手允许注入提示访问敏感邮件内容。", en: "OWASP LLM01 Scenario #5 cites CVE-2024-5184: an LLM-powered email assistant allowed injected prompts to access sensitive mail content.", ja: "OWASP LLM01 シナリオ #5 は CVE-2024-5184：LLM email assistant が injected prompt で sensitive mail にアクセスした。"}
    field_values:
      endpoint_reference: external-resource
      origin_class: external-resource
      risk_flow_role_id: source-91
      risk_source_id: source-91
      role_type: source
      source_sink_flow_id: flow-91
    related_node_ids: [RiskSource]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "携带邮件内容的工具输出是不可信数据，可携带间接注入。", en: "Tool output carrying mail content is untrusted data that can carry indirect injection.", ja: "mail content を含む tool output は indirect injection を含み得る untrusted data である。"}
    synthetic: false
    source_claims:
      - c
parent_relation:
  id: RiskSource-is_a-RiskFlowRole
  predicate: is_a
  relation_kind: hierarchy
  labels: {zh: 是一种, en: is a specialized, ja: 特化された}
  definitions: {zh: "RiskSource 是表示内容进入方向的 RiskFlowRole。", en: "RiskSource is a RiskFlowRole representing the content-entry direction.", ja: "RiskSource は内容流入方向を表す RiskFlowRole である。"}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  conditions:
    - id: risk-source-parent-direction
      severity: error
      expression_language: plain
      expression: The subtype must use role_type source and retain the parent flow reference.
      explanations: {zh: "子类型固定为流入端角色。", en: "The subtype fixes the role to the inbound source end.", ja: "この下位型は役割を流入ソース端へ固定する。"}
      source_claims: [claim-owasp-risk-source-inference]
  temporal_scope: valid-time
  constraints: []
  source_claims: [claim-owasp-risk-source-inference]
relations: []
sources:
  - id: owasp-llm01-2025
    title: OWASP LLM01 Prompt Injection
    url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
    source_type: security-guidance
    relevance: Explains prompt-injection risk from untrusted content.
source_claims:
  - id: claim-owasp-risk-source-inference
    source: owasp-llm01-2025
    supports: Prompt-injection guidance motivates tracking origins of untrusted content; it does not define this internal source-role schema.
    locator: "Overview and Prevention and Mitigation Strategies"
    evidence_kind: design-inference
    confidence: high
