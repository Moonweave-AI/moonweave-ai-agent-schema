schema: moonweave.ai/ontology-node/v1
id: RiskSink
kind: concept
status: accepted
labels: {zh: 风险汇点, en: Risk Sink, ja: リスクシンク}
semantics:
  short_definition: {zh: "在源汇流中接收内容、并可能影响代理解释、持久化或副作用的汇点端点角色。", en: "A sink-endpoint role in a source-sink flow that receives content and can affect agent interpretation, persistence, or side effects.", ja: "内容を受け取り、エージェント解釈、永続化、または副作用に影響し得るソース・シンクフローのシンク端点役割。"}
  definition: {zh: "RiskSink 是 RiskFlowRole，标识提示上下文、工具参数、持久记忆或副作用调用等内容消费点。它不是内容来源、网络目的地、授权决定或执行结果。", en: "RiskSink is a RiskFlowRole identifying a content-consumption point such as prompt context, a tool argument, persistent memory, or a side-effecting call. It is not a content source, network destination, authorization decision, or execution result.", ja: "RiskSink はプロンプトコンテキスト、ツール引数、永続メモリ、副作用を伴う呼出しなどの内容消費点を識別する RiskFlowRole である。内容ソース、ネットワーク宛先、認可判断、または実行結果ではない。"}
  why_needed: {zh: "不同汇点具有不同的危害面；将其显式化可使检查发生在内容获得影响力之前，而不是在副作用之后。", en: "Different sinks have different harm surfaces; making them explicit lets checks occur before content gains influence rather than after a side effect.", ja: "異なるシンクには異なる危害面がある。明示することで、内容が影響力を得る前に検査を行え、副作用の後にはならない。"}
  includes:
    - {zh: "关联流、汇点端点、汇点类别和所需控制。", en: "Associated flow, sink endpoint, sink class, and required control.", ja: "関連フロー、シンク端点、シンク区分、必要な制御。"}
  excludes:
    - {zh: "仅保存连接地址的网络目的地，或允许请求的政策结论。", en: "A network destination that only stores a connection address or a policy conclusion that allows a request.", ja: "接続アドレスだけを保存するネットワーク宛先、または要求を許可するポリシー結論。"}
  semantic_kind: role
  aliases: [content-influence-sink]
engineering:
  explanation: {zh: "编排器在内容将被拼入提示、写入记忆、传给工具参数或用于副作用前标识汇点。控制面依据类别强制扫描、授权检查或人工审批。", en: "An orchestrator identifies sinks before content is assembled into a prompt, written to memory, passed as a tool argument, or used for a side effect. The control plane enforces scanning, authorization checks, or human approval by sink class.", ja: "オーケストレーターは内容がプロンプトへ組み立てられる、メモリへ書かれる、ツール引数として渡される、副作用に使われる前にシンクを識別する。制御プレーンはシンク区分により走査、認可検査、人間承認を強制する。"}
  typical_input:
    - description: {zh: "内容流的目标消费端点。", en: "Target consumption endpoint of a content flow.", ja: "内容フローの対象消費端点。"}
      format: '{"flow_id":"flow-94","endpoint":"deploy.arguments","sink_class":"tool-argument"}'
      source_claims: [claim-owasp-risk-sink-inference]
  typical_output:
    - description: {zh: "带汇点类别和所需控制的风险汇点角色。", en: "Risk-sink role with sink class and required control.", ja: "シンク区分と必要制御を持つリスクシンク役割。"}
      format: '{"risk_sink_id":"sink-94","flow_id":"flow-94","sink_class":"tool-argument","control":"pre-execution-check"}'
      source_claims: [claim-owasp-risk-sink-inference]
  reference_implementations:
    - name: OWASP LLM01 Prompt Injection
      url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
      description: Explains prompt-injection risk from untrusted content.
structure:
  identity_keys: [risk_flow_role_id, risk_sink_id]
  fields:
    - id: risk_flow_role_id
      labels: {zh: 继承的风险流角色标识符, en: Inherited risk flow role ID, ja: 継承されたリスクフロー役割 ID}
      definitions: {zh: 此风险汇点作为 RiskFlowRole 的稳定端点角色身份；它与汇点记录标识同一流端点角色分配。, en: "Stable endpoint-role identity for this risk sink as a RiskFlowRole; it identifies the same flow-endpoint role assignment as the sink record.", ja: "このリスクシンクが RiskFlowRole として持つ安定した端点役割 ID。シンク記録と同じフロー端点役割割当てを識別する。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: sink-94
      allowed_values: []
      source_claims: [claim-owasp-risk-sink-inference]
    - id: role_type
      labels: {zh: 角色类型, en: Role type, ja: 役割型}
      definitions: {zh: 固定为 sink，表明该端点在信息流中消费内容并可能影响解释、持久化或副作用。, en: "Fixed to sink, indicating that this endpoint consumes content in the information flow and can influence interpretation, persistence, or side effects.", ja: "sink に固定する。この端点が情報フローで内容を消費し、解釈、永続化、または副作用へ影響し得ることを表す。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: sink
      allowed_values: [source, sink]
      source_claims: [claim-owasp-risk-sink-inference]
    - id: source_sink_flow_id
      labels: {zh: 源汇流标识符, en: Source-sink flow ID, ja: ソース・シンクフロー ID}
      definitions: {zh: 此汇点角色描述的具体内容流记录标识符。, en: "Identifier of the concrete content-flow record described by this sink role.", ja: "このシンク役割が記述する具体的な内容フロー記録の識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: flow-94
      allowed_values: []
      source_claims: [claim-owasp-risk-sink-inference]
    - id: endpoint_reference
      labels: {zh: 端点引用, en: Endpoint reference, ja: 端点参照}
      definitions: {zh: 在该内容流中充当汇点的内容消费端点引用。, en: "Reference to the content-consuming endpoint that acts as the sink in this flow.", ja: "このフローでシンクとして振る舞う内容消費端点への参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: tool-argument
      allowed_values: []
      source_claims: [claim-owasp-risk-sink-inference]
    - id: risk_sink_id
      labels: {zh: 风险汇点标识符, en: Risk sink ID, ja: リスクシンク ID}
      definitions: {zh: "一次内容流汇点角色分配的稳定标识符。", en: "Stable identifier for one content-flow sink-role assignment.", ja: "一つの内容フローシンク役割割当ての安定した識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: sink-94
      allowed_values: []
      source_claims: [claim-owasp-risk-sink-inference]
    - id: sink_class
      labels: {zh: 汇点类别, en: Sink class, ja: シンク区分}
      definitions: {zh: "内容会在其中被解释、保留或用于行动的消费类别。", en: "Consumption category where content will be interpreted, retained, or used for action.", ja: "内容が解釈、保持、または行動に使用される消費区分。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: tool-argument
      allowed_values: [prompt-context, tool-argument, persistent-memory, side-effect]
      source_claims: [claim-owasp-risk-sink-inference]
  constraints:
    - id: risk-sink-control-before-influence
      severity: error
      expression_language: plain
      expression: A RiskSink must reference one SourceSinkFlow and declare a sink class with a control evaluated before the content gains influence at that sink.
      explanations: {zh: "汇点控制必须发生在内容影响提示、记忆或副作用之前。", en: "Sink control must occur before content influences a prompt, memory, or side effect.", ja: "シンク制御は内容がプロンプト、メモリ、副作用へ影響する前に行わなければならない。"}
      explanation: {zh: "汇点控制必须发生在内容影响提示、记忆或副作用之前。", en: "Sink control must occur before content influences a prompt, memory, or side effect.", ja: "シンク制御は内容がプロンプト、メモリ、副作用へ影響する前に行わなければならない。"}
      source_claims: [claim-owasp-risk-sink-inference]
  required_relations: []
examples:
  
- id: risk-sink-positive-tool-argument
    kind: positive
    labels: {zh: 部署工具参数汇点, en: Deployment-tool argument sink, ja: デプロイツール引数シンク}
    descriptions: {zh: "EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。", en: "EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025).", ja: "EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。"}
    field_values: {risk_flow_role_id: sink-94, role_type: sink, source_sink_flow_id: flow-94, endpoint_reference: tool-argument, risk_sink_id: sink-94, sink_class: tool-argument}
    related_node_ids: [RiskFlowRole, PreExecutionSafetyCheck]
    related_relation_ids: [RiskSink-is_a-RiskFlowRole]
    expected_result: {zh: "调用前要求安全检查和授权评估。", en: "Require a safety check and authorization evaluation before the call.", ja: "呼出し前に安全検査と認可評価を要求する。"}
    why_valid_or_invalid: {zh: "EchoLeak 是通过邮件检索的已记录零点击间接注入，而非普通验证错误。", en: "EchoLeak is a documented zero-click indirect injection via email retrieval, not a generic validation error.", ja: "EchoLeak はメール取得経由の zero-click 間接注入として文書化されている。"}
    synthetic: false
    source_claims: [claim-owasp-risk-sink-inference]
  - id: risk-sink-counter-destination
    kind: counterexample
    labels: {zh: 仅有网络目的地, en: Network destination only, ja: ネットワーク宛先のみ}
    descriptions: {zh: "EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。", en: "EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025).", ja: "EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。"}
    field_values: {risk_flow_role_id: sink-95, role_type: sink, source_sink_flow_id: flow-95, endpoint_reference: prompt-context, risk_sink_id: sink-95, sink_class: prompt-context}
    related_node_ids: [NetworkEndpoint]
    related_relation_ids: []
    expected_result: {zh: "拒绝风险汇点分类。", en: "Reject the risk-sink classification.", ja: "リスクシンク分類を拒否する。"}
    why_valid_or_invalid: {zh: "EchoLeak 是通过邮件检索的已记录零点击间接注入，而非普通验证错误。", en: "EchoLeak is a documented zero-click indirect injection via email retrieval, not a generic validation error.", ja: "EchoLeak はメール取得経由の zero-click 間接注入として文書化されている。"}
    synthetic: false
    source_claims: [claim-owasp-risk-sink-inference]
  - id: risk-sink-boundary-persistence
    kind: boundary
    labels: {zh: 记忆汇点与来源边界, en: Memory sink-source boundary, ja: メモリのシンク・ソース境界}
    descriptions: {zh: "EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。", en: "EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025).", ja: "EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。"}
    field_values: {risk_flow_role_id: sink-96, role_type: sink, source_sink_flow_id: flow-96, endpoint_reference: persistent-memory, risk_sink_id: sink-96, sink_class: persistent-memory}
    related_node_ids: [RiskSource, PersistentContextRisk]
    related_relation_ids: []
    expected_result: {zh: "记录写入控制，并在读取流中重新评估来源。", en: "Record write control and reassess origin in the read flow.", ja: "書込み制御を記録し、読取りフローで出所を再評価する。"}
    why_valid_or_invalid: {zh: "EchoLeak 是通过邮件检索的已记录零点击间接注入，而非普通验证错误。", en: "EchoLeak is a documented zero-click indirect injection via email retrieval, not a generic validation error.", ja: "EchoLeak はメール取得経由の zero-click 間接注入として文書化されている。"}
    synthetic: false
    source_claims: [claim-owasp-risk-sink-inference]
  - id: risk-sink-instance-prompt
    kind: instance
    labels: {zh: 系统提示汇点实例, en: System-prompt sink instance, ja: システムプロンプトシンクの実例}
    descriptions: {zh: "EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。", en: "EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025).", ja: "EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。"}
    field_values: {risk_flow_role_id: sink-97, role_type: sink, source_sink_flow_id: flow-97, endpoint_reference: prompt-context, risk_sink_id: sink-97, sink_class: prompt-context}
    related_node_ids: [PromptInjectionSignal, PatternScan]
    related_relation_ids: []
    expected_result: {zh: "在组装前对片段实施扫描和来源检查。", en: "Apply scanning and provenance checks to the chunk before assembly.", ja: "組立前にチャンクへ走査と出所検査を適用する。"}
    why_valid_or_invalid: {zh: "EchoLeak 是通过邮件检索的已记录零点击间接注入，而非普通验证错误。", en: "EchoLeak is a documented zero-click indirect injection via email retrieval, not a generic validation error.", ja: "EchoLeak はメール取得経由の zero-click 間接注入として文書化されている。"}
    synthetic: false
    source_claims: [claim-owasp-risk-sink-inference]
  - id: RiskSink-real-counterexample-2
    kind: counterexample
    labels: {zh: "RiskSink counterexample case", en: "RiskSink counterexample case", ja: "RiskSink counterexample case"}
    descriptions: {zh: "Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。", en: "Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page.", ja: "Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。"}
    field_values:
      endpoint_reference: tool-argument
      risk_flow_role_id: sink-94
      risk_sink_id: sink-94
      role_type: sink
      sink_class: tool-argument
      source_sink_flow_id: flow-94
    related_node_ids: [RiskSink]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "该论文将检索到的网页文本视为不可信数据，不得成为指令权限。", en: "The paper treats retrieved webpage text as untrusted data that must not become instruction authority.", ja: "論文は取得 webpage テキストを命令権限になってはならない untrusted data として扱う。"}
    synthetic: false
    source_claims:
      - c
  - id: RiskSink-real-boundary-3
    kind: boundary
    labels: {zh: "RiskSink boundary case", en: "RiskSink boundary case", ja: "RiskSink boundary case"}
    descriptions: {zh: "OWASP LLM01 场景 #5 引用 CVE-2024-5184：LLM 邮件助手允许注入提示访问敏感邮件内容。", en: "OWASP LLM01 Scenario #5 cites CVE-2024-5184: an LLM-powered email assistant allowed injected prompts to access sensitive mail content.", ja: "OWASP LLM01 シナリオ #5 は CVE-2024-5184：LLM email assistant が injected prompt で sensitive mail にアクセスした。"}
    field_values:
      endpoint_reference: tool-argument
      risk_flow_role_id: sink-94
      risk_sink_id: sink-94
      role_type: sink
      sink_class: tool-argument
      source_sink_flow_id: flow-94
    related_node_ids: [RiskSink]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "携带邮件内容的工具输出是不可信数据，可携带间接注入。", en: "Tool output carrying mail content is untrusted data that can carry indirect injection.", ja: "mail content を含む tool output は indirect injection を含み得る untrusted data である。"}
    synthetic: false
    source_claims:
      - c
  - id: RiskSink-real-instance-4
    kind: instance
    labels: {zh: "RiskSink instance case", en: "RiskSink instance case", ja: "RiskSink instance case"}
    descriptions: {zh: "OpenAI Agents SDK：cancel_order 设置 needsApproval: true 时运行暂停，result.interruptions 出现 RunToolApprovalItem，直至 state.approve(interruption)。", en: "OpenAI Agents SDK: cancel_order with needsApproval: true pauses the run and surfaces RunToolApprovalItem in result.interruptions until state.approve(interruption) (openai.github.io/openai-agents-js/guides/human-in-the-loop/).", ja: "OpenAI Agents SDK：needsApproval: true の cancel_order は RunToolApprovalItem を返し state.approve まで pause する。"}
    field_values:
      endpoint_reference: tool-argument
      risk_flow_role_id: sink-94
      risk_sink_id: sink-94
      role_type: sink
      sink_class: tool-argument
      source_sink_flow_id: flow-94
    related_node_ids: [RiskSink]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "HITL 批准解决具体中断；不是 OAuth scope 授予。", en: "HITL approval resolves a concrete interruption; it is not an OAuth scope grant.", ja: "HITL 承認は具体的 interruption を解決する。OAuth scope grant ではない。"}
    synthetic: false
    source_claims:
      - c
