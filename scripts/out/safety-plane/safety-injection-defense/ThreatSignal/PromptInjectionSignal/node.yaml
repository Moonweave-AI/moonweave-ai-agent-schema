  definitions: {zh: "PromptInjectionSignal 是关于提示注入模式的 ThreatSignal。", en: "A PromptInjectionSignal is a ThreatSignal about prompt-injection patterns.", ja: "PromptInjectionSignal はプロンプト注入パターンに関する ThreatSignal である。"}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  conditions:
