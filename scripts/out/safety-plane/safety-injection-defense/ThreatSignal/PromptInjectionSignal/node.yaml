      severity: error
      expression_language: plain
      expression: The specialized signal must retain parent threat evidence and identify the prompt-injection pattern observed.
      explanations: {zh: "子类型增加模式类别而不丢失风险证据。", en: "The subtype adds pattern class without losing risk evidence.", ja: "サブタイプはリスク証拠を失わずパターン種別を追加する。"}
      source_claims: [claim-owasp-prompt-signal]
  temporal_scope: valid-time
  constraints: []
  source_claims: [claim-owasp-prompt-signal]
relations: []
