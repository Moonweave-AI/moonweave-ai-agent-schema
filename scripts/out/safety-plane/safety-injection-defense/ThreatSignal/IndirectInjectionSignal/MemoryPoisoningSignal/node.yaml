  definitions: {zh: "MemoryPoisoningSignal 是涉及持久上下文篡改证据的 IndirectInjectionSignal。", en: "MemoryPoisoningSignal is an IndirectInjectionSignal involving evidence of persistent-context alteration.", ja: "MemoryPoisoningSignal は永続コンテキスト改変の証拠を伴う IndirectInjectionSignal である。"}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
