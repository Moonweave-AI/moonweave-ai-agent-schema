    why_valid_or_invalid: {zh: "NeMo Guardrails 在 rail 层缓解注入，不将检测与 OAuth 授权混为一谈。", en: "NeMo Guardrails mitigates injection at the rail layer without conflating detection with OAuth authorization.", ja: "NeMo Guardrails は rail 層で注入を緩和し、検出と OAuth 認可を混同しない。"}
