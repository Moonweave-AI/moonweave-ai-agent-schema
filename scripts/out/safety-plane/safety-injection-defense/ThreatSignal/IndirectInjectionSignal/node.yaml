  definitions: {zh: "IndirectInjectionSignal 是来自外部内容路径的 ThreatSignal。", en: "An IndirectInjectionSignal is a ThreatSignal from an external-content path.", ja: "IndirectInjectionSignal は外部内容経路から来る ThreatSignal である。"}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
