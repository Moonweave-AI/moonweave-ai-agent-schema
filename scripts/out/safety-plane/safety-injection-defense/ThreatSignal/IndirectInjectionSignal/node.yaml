schema: moonweave.ai/ontology-node/v1
id: IndirectInjectionSignal
kind: concept
status: accepted
labels: {zh: 间接注入信号, en: Indirect Injection Signal, ja: 間接注入シグナル}
semantics:
  short_definition: {zh: "表明来自外部内容而非直接提示的潜在注入的威胁信号。", en: "A ThreatSignal indicating potential injection arriving through external content rather than a direct prompt.", ja: "直接プロンプトではなく外部内容から到来する潜在的注入を示す ThreatSignal。"}
  definition: {zh: "IndirectInjectionSignal 是一种 ThreatSignal，表示检索文档、网页、记忆、文件或工具输出等外部内容可能携带了试图影响代理行为的指令。它不是该外部内容本身、直接用户提示注入或已确认的安全事件。", en: "IndirectInjectionSignal is a ThreatSignal indicating that external content such as retrieved documents, webpages, memory, files, or tool output may carry instructions attempting to influence agent behavior. It is not the external content itself, direct user-prompt injection, or a confirmed security event.", ja: "IndirectInjectionSignal は、取得文書、Web ページ、メモリ、ファイル、ツール出力などの外部内容がエージェント挙動に影響しようとする指示を含む可能性を示す ThreatSignal である。外部内容そのもの、直接ユーザープロンプト注入、確定セキュリティ事象ではない。"}
  why_needed: {zh: "间接来源常被误认为数据而绕过指令信任边界，因此其风险需要被明确地表示和处理。", en: "Indirect sources are often mistaken for data and can bypass instruction trust boundaries, so their risk needs explicit representation and handling.", ja: "間接的な情報源はデータと誤認されやすく指示の信頼境界を回避し得るため、リスクを明示的に表し扱う必要がある。"}
  includes: [{zh: "外部来源类型、可疑内容位置、检测证据和受影响的行为表面。", en: "External source type, suspicious-content location, detection evidence, and affected behavior surface.", ja: "外部情報源種別、疑わしい内容位置、検出証拠、影響を受ける行動面。"}]
  excludes: [{zh: "用户在正常受信任交互通道中直接提供的请求。", en: "A direct request supplied by a user through the normal trusted interaction channel.", ja: "通常の信頼済み対話チャネルを通じてユーザーが直接提供する要求。"}]
  semantic_kind: signal
  aliases: [external-content-injection-signal]
engineering:
  explanation: {zh: "显式标记外部来源并保留原始工件引用。在检索、记忆或工具产生的文本改变工具选择、数据披露或系统指令前，将信号交给注入控制。", en: "Label the external origin explicitly and retain the original artifact reference. Pass the signal to injection controls before retrieved, remembered, or tool-produced text can alter tool choice, data disclosure, or system instructions.", ja: "外部出所を明示し、元の工件参照を保持する。取得、記憶、ツール生成テキストがツール選択、データ開示、システム指示を変える前に、シグナルを注入制御へ渡す。"}
  typical_input:
    - description: {zh: 外部内容扫描结果, en: External content scan result, ja: 外部内容走査結果}
      format: '{"content_id":"chunk-42","origin":"retrieved-content","pattern":"call-unrelated-tool","confidence":0.84}'
      source_claims: [claim-owasp-prompt-injection]
  typical_output:
    - description: {zh: 间接信号, en: Indirect signal, ja: 間接シグナル}
      format: '{"signal_id":"indirect-42","origin":"retrieved-content","class":"indirect-injection","confidence":0.84}'
      source_claims: [claim-owasp-prompt-injection]
  reference_implementations:
    - name: OWASP LLM01 Prompt Injection
      url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
      description: Covers direct and indirect prompt-injection risk from untrusted content.
    - name: Anthropic prompt-injection guidance
      url: https://platform.claude.com/docs/en/test-and-evaluate/strengthen-guardrails/mitigate-jailbreaks
      description: Distinguishes direct user-input attacks from indirect injection in third-party content and tool results.
structure:
  identity_keys: [threat_signal_id, indirect_injection_signal_id]
  fields:
    - id: injection_class
      labels: {zh: 注入类别, en: Injection class, ja: 注入区分}
      definitions: {zh: "固定为 indirect，表明该信号针对 OWASP 所称的间接提示注入路径（外部工件中的类指令内容）。", en: "Fixed to indirect, indicating this signal targets the OWASP indirect prompt-injection path (instruction-like content in external artifacts).", ja: "indirect に固定し、このシグナルが OWASP の間接プロンプト注入経路（外部工件内の命令風内容）を対象とすることを示す。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: indirect
      allowed_values: [indirect]
      source_claims: [claim-owasp-prompt-injection]
    - id: threat_signal_id
      labels: {zh: 继承的威胁信号标识符, en: Inherited threat signal ID, ja: 継承された脅威シグナル ID}
      definitions: {zh: 此间接注入信号作为 ThreatSignal 的稳定风险指示身份；它与间接信号记录标识同一已检测风险指示。, en: "Stable risk-indicator identity for this indirect injection signal as a ThreatSignal; it identifies the same detected risk indicator as the indirect-signal record.", ja: "この間接注入シグナルが ThreatSignal として持つ安定したリスク指標 ID。間接シグナル記録と同じ検出済みリスク指標を識別する。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: indirect-42
      allowed_values: []
      source_claims: [claim-owasp-prompt-injection]
    - id: confidence
      labels: {zh: 置信度, en: Confidence, ja: 確信度}
      definitions: {zh: 检测活动对该间接注入风险指示的相对置信度，而非攻击已经成功的概率。, en: "Detection activity relative confidence in this indirect-injection risk indicator, not a probability that an attack already succeeded.", ja: "この間接注入リスク指標に対する検出活動の相対確信度。攻撃が既に成功した確率ではない。"}
      datatype: number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 0.88
      allowed_values: []
      source_claims: [claim-owasp-prompt-injection]
    - id: detection_evidence_reference
      labels: {zh: 检测证据引用, en: Detection evidence reference, ja: 検出証拠参照}
      definitions: {zh: 支持该间接注入信号的内容位置、模式匹配或检测观察引用。, en: "Content-location, pattern-match, or detection-observation reference supporting this indirect-injection signal.", ja: "この間接注入シグナルを裏付ける内容位置、パターン一致、または検出観測への参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: candidate-42
      allowed_values: []
      source_claims: [claim-owasp-prompt-injection]
    - id: indirect_injection_signal_id
      labels: {zh: 间接信号标识符, en: Indirect signal ID, ja: 間接シグナル ID}
      definitions: {zh: "一次外部内容注入风险指示的稳定标识符。", en: "Stable identifier for one external-content injection risk indicator.", ja: "一つの外部内容注入リスク指標の安定識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: indirect-42
      allowed_values: []
      source_claims: [claim-owasp-prompt-injection]
    - id: origin_type
      labels: {zh: 来源类型, en: Origin type, ja: 出所種別}
      definitions: {zh: "携带可疑指令的外部内容类别。", en: "The category of external content carrying the suspicious instruction.", ja: "疑わしい指示を運ぶ外部内容のカテゴリ。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: retrieved-content
      allowed_values: [retrieved-content, tool-output, memory, file, webpage]
      source_claims: [claim-owasp-prompt-injection]
  constraints:
    - id: indirect-signal-external-origin
      severity: error
      expression_language: plain
      expression: An IndirectInjectionSignal must identify an external origin and must not classify direct trusted-system instructions as indirect content.
      explanations: {zh: "间接注入由不受信任内容路径定义，而不只是命令式措辞。", en: "Indirect injection is defined by the untrusted content path, not imperative wording alone.", ja: "間接注入は命令的な文言だけでなく、信頼できない内容経路によって定義される。"}
      explanation: {zh: "间接注入由不受信任内容路径定义，而不只是命令式措辞。", en: "Indirect injection is defined by the untrusted content path, not imperative wording alone.", ja: "間接注入は命令的な文言だけでなく、信頼できない内容経路によって定義される。"}
      source_claims: [claim-owasp-prompt-injection]
  required_relations: []
examples:
  
- id: indirect-signal-positive-retrieved
    kind: positive
    labels: {zh: 检索文档注入信号, en: Retrieved document injection signal, ja: 取得文書の注入シグナル}
    descriptions: {zh: "EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。", en: "EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025).", ja: "EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。"}
    field_values: {threat_signal_id: indirect-42, injection_class: indirect, confidence: 0.88, detection_evidence_reference: candidate-42, indirect_injection_signal_id: indirect-42, origin_type: retrieved-content}
    related_node_ids: [PoisonedRetrievedChunk, UntrustedInstructionCandidate]
    related_relation_ids: [IndirectInjectionSignal-is_a-ThreatSignal]
    expected_result: {zh: "将内容路径标记为需要注入处理。", en: "The content path is marked for injection handling.", ja: "内容経路を注入処理対象として印付ける。"}
    why_valid_or_invalid: {zh: "EchoLeak 是通过邮件检索的已记录零点击间接注入，而非普通验证错误。", en: "EchoLeak is a documented zero-click indirect injection via email retrieval, not a generic validation error.", ja: "EchoLeak はメール取得経由の zero-click 間接注入として文書化されている。"}
    synthetic: false
    source_claims: [claim-owasp-prompt-injection]
  - id: indirect-signal-counter-user-request
    kind: counterexample
    labels: {zh: 被标为间接的直接用户请求, en: Direct user request marked indirect, ja: 間接と印付けられた直接ユーザー要求}
    descriptions: {zh: "EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。", en: "EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025).", ja: "EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。"}
    field_values: {threat_signal_id: indirect-43, confidence: 0.30, detection_evidence_reference: candidate-43, indirect_injection_signal_id: indirect-43, origin_type: user-content}
    related_node_ids: [PromptInjectionSignal]
    related_relation_ids: []
    expected_result: {zh: "不要将其归类为间接注入。", en: "Do not classify it as indirect injection.", ja: "間接注入として分類しない。"}
    why_valid_or_invalid: {zh: "EchoLeak 是通过邮件检索的已记录零点击间接注入，而非普通验证错误。", en: "EchoLeak is a documented zero-click indirect injection via email retrieval, not a generic validation error.", ja: "EchoLeak はメール取得経由の zero-click 間接注入として文書化されている。"}
    synthetic: false
    source_claims: [claim-anthropic-indirect-inference]
  - id: indirect-signal-boundary-tool-output
    kind: boundary
    labels: {zh: 工具输出与信号, en: Tool output versus signal, ja: ツール出力とシグナル}
    descriptions: {zh: "EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。", en: "EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025).", ja: "EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。"}
    field_values: {threat_signal_id: indirect-44, confidence: 0.72, detection_evidence_reference: tool-output-44, indirect_injection_signal_id: indirect-44, origin_type: tool-output}
    related_node_ids: [MaliciousToolOutput, ToolStreamInjectionSignal]
    related_relation_ids: []
    expected_result: {zh: "保持来源工件与风险发现的区别。", en: "Keep source artifact and risk finding distinct.", ja: "ソース工件とリスク検出結果を区別して保持する。"}
    why_valid_or_invalid: {zh: "EchoLeak 是通过邮件检索的已记录零点击间接注入，而非普通验证错误。", en: "EchoLeak is a documented zero-click indirect injection via email retrieval, not a generic validation error.", ja: "EchoLeak はメール取得経由の zero-click 間接注入として文書化されている。"}
    synthetic: false
    source_claims: [claim-owasp-prompt-injection]
  - id: indirect-signal-instance-memory
    kind: instance
    labels: {zh: 记忆来源信号, en: Memory-origin signal, ja: メモリ出所シグナル}
    descriptions: {zh: "EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。", en: "EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025).", ja: "EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。"}
    field_values: {threat_signal_id: indirect-45, confidence: 0.80, detection_evidence_reference: memory-45, indirect_injection_signal_id: indirect-45, origin_type: memory}
    related_node_ids: [MemoryPoisoningSignal, PersistentContextRisk]
    related_relation_ids: []
    expected_result: {zh: "记忆不能悄然变成可信指令来源。", en: "The memory cannot silently become a trusted instruction source.", ja: "メモリが黙って信頼済み指示の出所になることはできない。"}
    why_valid_or_invalid: {zh: "EchoLeak 是通过邮件检索的已记录零点击间接注入，而非普通验证错误。", en: "EchoLeak is a documented zero-click indirect injection via email retrieval, not a generic validation error.", ja: "EchoLeak はメール取得経由の zero-click 間接注入として文書化されている。"}
    synthetic: false
    source_claims: [claim-owasp-prompt-injection]
  - id: IndirectInjectionSignal-real-counterexample-2
    kind: counterexample
    labels: {zh: "IndirectInjectionSignal counterexample case", en: "IndirectInjectionSignal counterexample case", ja: "IndirectInjectionSignal counterexample case"}
    descriptions: {zh: "Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。", en: "Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page.", ja: "Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。"}
    field_values:
      confidence: 0.88
      detection_evidence_reference: candidate-44
      indirect_injection_signal_id: indirect-44
      injection_class: indirect
      origin_type: retrieved-content
      threat_signal_id: indirect-44
    related_node_ids: [IndirectInjectionSignal]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "该论文将检索到的网页文本视为不可信数据，不得成为指令权限。", en: "The paper treats retrieved webpage text as untrusted data that must not become instruction authority.", ja: "論文は取得 webpage テキストを命令権限になってはならない untrusted data として扱う。"}
    synthetic: false
    source_claims:
      - claim-owasp-prompt-injection
  - id: IndirectInjectionSignal-real-boundary-3
    kind: boundary
    labels: {zh: "IndirectInjectionSignal boundary case", en: "IndirectInjectionSignal boundary case", ja: "IndirectInjectionSignal boundary case"}
    descriptions: {zh: "OWASP LLM01 场景 #5 引用 CVE-2024-5184：LLM 邮件助手允许注入提示访问敏感邮件内容。", en: "OWASP LLM01 Scenario #5 cites CVE-2024-5184: an LLM-powered email assistant allowed injected prompts to access sensitive mail content.", ja: "OWASP LLM01 シナリオ #5 は CVE-2024-5184：LLM email assistant が injected prompt で sensitive mail にアクセスした。"}
    field_values:
      confidence: 0.88
      detection_evidence_reference: candidate-45
      indirect_injection_signal_id: indirect-45
      injection_class: indirect
      origin_type: retrieved-content
      threat_signal_id: indirect-45
    related_node_ids: [IndirectInjectionSignal]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "携带邮件内容的工具输出是不可信数据，可携带间接注入。", en: "Tool output carrying mail content is untrusted data that can carry indirect injection.", ja: "mail content を含む tool output は indirect injection を含み得る untrusted data である。"}
    synthetic: false
    source_claims:
      - claim-owasp-prompt-injection
  - id: IndirectInjectionSignal-real-instance-4
    kind: instance
    labels: {zh: "IndirectInjectionSignal instance case", en: "IndirectInjectionSignal instance case", ja: "IndirectInjectionSignal instance case"}
    descriptions: {zh: "OWASP LLM01:2025 场景 #1：攻击者向客服聊天机器人注入提示，要求其忽略先前准则、查询私有数据存储并发送邮件（genai.owasp.org/llmrisk/llm01-prompt-injection/）。", en: "OWASP LLM01:2025 Scenario #1: an attacker injects a prompt into a customer-support chatbot instructing it to ignore prior guidelines, query private data stores, and send email (genai.owasp.org/llmrisk/llm01-prompt-injection/).", ja: "OWASP LLM01:2025 シナリオ #1：攻撃者がカスタマーサポート chatbot にプロンプトを注入し、以前のガイドラインを無視して private data store を照会しメール送信を指示する。"}
    field_values:
      confidence: 0.88
      detection_evidence_reference: candidate-46
      indirect_injection_signal_id: indirect-46
      injection_class: indirect
      origin_type: retrieved-content
      threat_signal_id: indirect-46
    related_node_ids: [IndirectInjectionSignal]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "OWASP LLM01 将直接注入定义为用户提供的、改变模型行为的输入；信号记录可审查证据，而非已确认泄露。", en: "OWASP LLM01 documents direct injection as user-supplied input that alters model behavior; a signal records reviewable evidence, not a confirmed breach.", ja: "OWASP LLM01 は直接注入をモデル挙動を変えるユーザー供給入力として定義する。"}
    synthetic: false
    source_claims:
      - claim-owasp-prompt-injection
