    url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
    source_type: security-guidance
    relevance: Defines prompt-injection risk from untrusted input altering model behavior.
  - id: anthropic-prompt-injection-2026
    title: Mitigate jailbreaks and prompt injections
    url: https://platform.claude.com/docs/en/test-and-evaluate/strengthen-guardrails/mitigate-jailbreaks
    source_type: official-doc
    relevance: Distinguishes direct user-input attacks from indirect injection in third-party content and tool results.
source_claims:
  - id: claim-owasp-prompt-injection
    source: owasp-llm01-2025
    supports: Prompt-injection guidance motivates tracking untrusted external-content paths; it does not define this internal IndirectInjectionSignal schema.
    locator: "Overview and Prevention and Mitigation Strategies"
    evidence_kind: design-inference
    confidence: high
  - id: claim-anthropic-indirect-inference
    source: anthropic-prompt-injection-2026
    supports: Indirect prompt injection has a threat model in which otherwise trusted use processes adversarial third-party content such as web pages, emails, documents, or tool results; the local signal record is a design inference rather than an Anthropic wire object.
    locator: "Mitigate jailbreaks and prompt injections; attack categories"
    evidence_kind: design-inference
    confidence: high
