schema: moonweave.ai/ontology-node/v1
id: PersistentContextRisk
kind: concept
status: accepted
labels: {zh: 持久上下文风险, en: Persistent Context Risk, ja: 永続コンテキストリスク}
semantics:
  short_definition: {zh: "表明不受信任内容可能跨后续交互继续影响代理行为的威胁信号。", en: "A ThreatSignal that untrusted content may continue influencing agent behavior across later interactions.", ja: "信頼できない内容が後続の対話をまたいでエージェント挙動へ影響し続け得ることを示す ThreatSignal。"}
  definition: {zh: "PersistentContextRisk 是一种 ThreatSignal，记录不受信任指令或内容被保留在记忆、会话状态或长期上下文中的风险。它不是具体的 MemoryPoisoningSignal、持久记录本身、授权持久化或已确认攻击结果。", en: "PersistentContextRisk is a ThreatSignal recording risk that untrusted instructions or content remain in memory, session state, or long-lived context. It is not a specific MemoryPoisoningSignal, the persistent record itself, authorization persistence, or a confirmed attack outcome.", ja: "PersistentContextRisk は信頼できない指示または内容がメモリ、セッション状態、長期コンテキストに残るリスクを記録する ThreatSignal である。具体的な MemoryPoisoningSignal、永続記録そのもの、認可の永続化、確定した攻撃結果ではない。"}
  why_needed: {zh: "一次输入的影响可能在未来回合重新出现，因此风险模型必须表达持续时间和重新进入上下文的路径。", en: "The influence of one input can reappear in future turns, so the risk model must express duration and paths back into context.", ja: "一回の入力の影響は将来ターンで再出現し得るため、リスクモデルは期間とコンテキストへ戻る経路を表す必要がある。"}
  includes: [{zh: "持久范围、来源内容、保留机制、风险期限和再进入路径。", en: "Persistence scope, source content, retention mechanism, risk duration, and re-entry path.", ja: "永続範囲、情報源内容、保持機構、リスク期間、再入経路。"}]
  excludes: [{zh: "仅存在于一次模型调用中的瞬态未保存输入。", en: "Transient unsaved input that exists only in one model call.", ja: "一回のモデル呼出にだけ存在する一時的な未保存入力。"}]
  semantic_kind: signal
  aliases: [long-lived-injection-risk]
engineering:
  explanation: {zh: "当不受信任内容被写入记忆、会话摘要或可重用上下文时，记录范围、保留机制和清除或隔离路径。该信号触发审查，不自动断言记录被恶意篡改。", en: "When untrusted content is written into memory, session summary, or reusable context, record scope, retention mechanism, and clearing or quarantine path. The signal triggers review and does not automatically assert the record was maliciously altered.", ja: "信頼できない内容がメモリ、セッション要約、再利用可能コンテキストへ書かれるとき、範囲、保持機構、消去または隔離経路を記録する。シグナルはレビューを起動し、記録が悪意を持って改変されたと自動断言しない。"}
  typical_input:
    - description: {zh: 持久化内容观察, en: Persisted-content observation, ja: 永続内容観測}
      format: '{"signal_id":"context-risk-42","content_id":"memory-42","retention":"cross-session","origin":"tool-output"}'
      source_claims: [claim-owasp-persistent-context-inference]
  typical_output:
    - description: {zh: 上下文风险记录, en: Context-risk record, ja: コンテキストリスク記録}
      format: '{"signal_id":"context-risk-42","risk":"persistent-untrusted-instruction","reentry":"memory-retrieval"}'
      source_claims: [claim-owasp-persistent-context-inference]
  reference_implementations:
    - name: OWASP LLM01 Prompt Injection
      url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
      description: Explains injection risk from untrusted input.
structure:
  identity_keys: [threat_signal_id, persistent_context_risk_id]
  fields:
    - id: threat_signal_id
      labels: {zh: 继承的威胁信号标识符, en: Inherited threat signal ID, ja: 継承された脅威シグナル ID}
      definitions: {zh: 此持久上下文风险作为 ThreatSignal 的稳定风险指示身份；它与持久风险记录标识同一已检测风险指示。, en: "Stable risk-indicator identity for this persistent-context risk as a ThreatSignal; it identifies the same detected risk indicator as the persistent-risk record.", ja: "この永続コンテキストリスクが ThreatSignal として持つ安定したリスク指標 ID。永続リスク記録と同じ検出済みリスク指標を識別する。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: context-risk-42
      allowed_values: []
      source_claims: [claim-owasp-persistent-context-inference]
    - id: confidence
      labels: {zh: 置信度, en: Confidence, ja: 確信度}
      definitions: {zh: 检测活动对该跨上下文持续影响风险指示的相对置信度，而非持续影响已被证实的结论。, en: "Detection activity relative confidence in this cross-context influence risk indicator, not proof that persistent influence has already occurred.", ja: "このコンテキスト横断の影響リスク指標に対する検出活動の相対確信度。持続的影響が既に発生した証明ではない。"}
      datatype: number
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: 0.76
      allowed_values: []
      source_claims: [claim-owasp-persistent-context-inference]
    - id: detection_evidence_reference
      labels: {zh: 检测证据引用, en: Detection evidence reference, ja: 検出証拠参照}
      definitions: {zh: 支持该持久上下文风险信号的记忆、摘要或上下文链证据引用。, en: "Memory, summary, or context-chain evidence reference supporting this persistent-context risk signal.", ja: "この永続コンテキストリスクシグナルを裏付けるメモリ、要約、またはコンテキスト連鎖の証拠参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: null}
      pattern: null
      example_value: memory-42-r3
      allowed_values: []
      source_claims: [claim-owasp-persistent-context-inference]
    - id: persistent_context_risk_id
      labels: {zh: 持久上下文风险标识符, en: Persistent context risk ID, ja: 永続コンテキストリスク ID}
      definitions: {zh: "一次持久内容风险观察的稳定标识符。", en: "Stable identifier for one persisted-content risk observation.", ja: "一つの永続内容リスク観測の安定識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: context-risk-42
      allowed_values: []
      source_claims: [claim-owasp-persistent-context-inference]
    - id: persistence_scope
      labels: {zh: 持久范围, en: Persistence scope, ja: 永続範囲}
      definitions: {zh: "不受信任内容可在其中重新出现的上下文范围。", en: "The context scope in which untrusted content can reappear.", ja: "信頼できない内容が再出現できるコンテキスト範囲。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: cross-session
      allowed_values: [turn, session, cross-session, shared-workspace]
      source_claims: [claim-owasp-persistent-context-inference]
  constraints:
    - id: persistent-context-risk-retention-path
      severity: error
      expression_language: plain
      expression: A PersistentContextRisk must identify a retained content reference and a re-entry or clearing path; it must not assert poisoning without separate evidence.
      explanations: {zh: "持久风险是保留路径风险，不是恶意意图结论。", en: "Persistence risk concerns retention path, not a conclusion of malicious intent.", ja: "永続リスクは保持経路に関するもので、悪意の結論ではない。"}
      explanation: {zh: "持久风险是保留路径风险，不是恶意意图结论。", en: "Persistence risk concerns retention path, not a conclusion of malicious intent.", ja: "永続リスクは保持経路に関するもので、悪意の結論ではない。"}
      source_claims: [claim-owasp-persistent-context-inference]
  required_relations: []
examples:
  
- id: persistent-context-positive-memory
    kind: positive
    labels: {zh: 跨会话工具文本, en: Cross-session tool text, ja: セッション横断ツールテキスト}
    descriptions: {zh: "Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。", en: "Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page.", ja: "Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。"}
    field_values: {threat_signal_id: context-risk-42, confidence: 0.76, detection_evidence_reference: memory-42-r3, persistent_context_risk_id: context-risk-42, persistence_scope: cross-session}
    related_node_ids: [TaintedSpan, MemoryPoisoningSignal]
    related_relation_ids: [PersistentContextRisk-is_a-ThreatSignal]
    expected_result: {zh: "后续检索前需要审查或隔离。", en: "Review or quarantine is required before later retrieval.", ja: "後続取得前にレビューまたは隔離が必要である。"}
    why_valid_or_invalid: {zh: "该论文将检索到的网页文本视为不可信数据，不得成为指令权限。", en: "The paper treats retrieved webpage text as untrusted data that must not become instruction authority.", ja: "論文は取得 webpage テキストを命令権限になってはならない untrusted data として扱う。"}
    synthetic: false
    source_claims: [claim-owasp-persistent-context-inference]
  - id: persistent-context-counter-transient
    kind: counterexample
    labels: {zh: 瞬态输入称为持久风险, en: Transient input called persistent risk, ja: 一時入力を永続リスクと呼ぶ}
    descriptions: {zh: "Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。", en: "Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page.", ja: "Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。"}
    field_values: {threat_signal_id: context-risk-43, confidence: 0.34, detection_evidence_reference: memory-43-r1, persistent_context_risk_id: context-risk-43, persistence_scope: cross-session}
    related_node_ids: [PromptInjectionSignal]
    related_relation_ids: []
    expected_result: {zh: "拒绝持久范围分类。", en: "Reject the persistence-scope classification.", ja: "永続範囲分類を拒否する。"}
    why_valid_or_invalid: {zh: "该论文将检索到的网页文本视为不可信数据，不得成为指令权限。", en: "The paper treats retrieved webpage text as untrusted data that must not become instruction authority.", ja: "論文は取得 webpage テキストを命令権限になってはならない untrusted data として扱う。"}
    synthetic: false
    source_claims: [claim-owasp-persistent-context-inference]
  - id: persistent-context-boundary-poisoning
    kind: boundary
    labels: {zh: 持久风险与记忆污染, en: Persistence risk versus memory poisoning, ja: 永続リスクとメモリ汚染}
    descriptions: {zh: "Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。", en: "Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page.", ja: "Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。"}
    field_values: {threat_signal_id: context-risk-44, confidence: 0.62, detection_evidence_reference: context-44-r2, persistent_context_risk_id: context-risk-44, persistence_scope: session}
    related_node_ids: [MemoryPoisoningSignal, PoisonedContent]
    related_relation_ids: []
    expected_result: {zh: "两种风险判断保留不同证据门槛。", en: "The judgments retain different evidence thresholds.", ja: "判断は異なる証拠閾値を保持する。"}
    why_valid_or_invalid: {zh: "该论文将检索到的网页文本视为不可信数据，不得成为指令权限。", en: "The paper treats retrieved webpage text as untrusted data that must not become instruction authority.", ja: "論文は取得 webpage テキストを命令権限になってはならない untrusted data として扱う。"}
    synthetic: false
    source_claims: [claim-owasp-persistent-context-inference]
  - id: persistent-context-instance-summary
    kind: instance
    labels: {zh: 会话摘要实例, en: Session-summary instance, ja: セッション要約の実例}
    descriptions: {zh: "Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。", en: "Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page.", ja: "Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。"}
    field_values: {threat_signal_id: context-risk-45, confidence: 0.79, detection_evidence_reference: summary-45-r1, persistent_context_risk_id: context-risk-45, persistence_scope: session}
    related_node_ids: [IndirectInjectionSignal, QuarantineAction]
    related_relation_ids: []
    expected_result: {zh: "摘要不能自动作为可信指令使用。", en: "The summary cannot automatically be used as trusted instruction.", ja: "要約は自動的に信頼済み指示として使えない。"}
    why_valid_or_invalid: {zh: "该论文将检索到的网页文本视为不可信数据，不得成为指令权限。", en: "The paper treats retrieved webpage text as untrusted data that must not become instruction authority.", ja: "論文は取得 webpage テキストを命令権限になってはならない untrusted data として扱う。"}
    synthetic: false
    source_claims: [claim-owasp-persistent-context-inference]
  - id: PersistentContextRisk-real-counterexample-2
    kind: counterexample
    labels: {zh: "PersistentContextRisk counterexample case", en: "PersistentContextRisk counterexample case", ja: "PersistentContextRisk counterexample case"}
    descriptions: {zh: "EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。", en: "EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025).", ja: "EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。"}
    field_values:
      confidence: 0.76
      detection_evidence_reference: memory-44-r3
      persistence_scope: cross-session
      persistent_context_risk_id: context-risk-44
      threat_signal_id: context-risk-44
    related_node_ids: [PersistentContextRisk]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "EchoLeak 是通过邮件检索的已记录零点击间接注入，而非普通验证错误。", en: "EchoLeak is a documented zero-click indirect injection via email retrieval, not a generic validation error.", ja: "EchoLeak はメール取得経由の zero-click 間接注入として文書化されている。"}
    synthetic: false
    source_claims:
      - c
  - id: PersistentContextRisk-real-boundary-3
    kind: boundary
    labels: {zh: "PersistentContextRisk boundary case", en: "PersistentContextRisk boundary case", ja: "PersistentContextRisk boundary case"}
    descriptions: {zh: "Simon Willison 记录 prompt injection 为未解问题：不可信文本可劫持 LLM 集成应用。", en: "Simon Willison documented prompt injection as an unsolved problem where untrusted text can hijack LLM-integrated apps (simonwillison.net/tags/prompt-injection/).", ja: "Simon Willison は prompt injection を untrusted text が LLM 統合 app を hijack し得る未解問題として記録した。"}
    field_values:
      confidence: 0.76
      detection_evidence_reference: memory-45-r3
      persistence_scope: cross-session
      persistent_context_risk_id: context-risk-45
      threat_signal_id: context-risk-45
    related_node_ids: [PersistentContextRisk]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "Willison 强调分层控制，因为仅靠模型级拒绝不足。", en: "Willison emphasizes layered controls because model-level refusal alone is insufficient.", ja: "Willison は model-level refusal だけでは不十分なため layered control を強調する。"}
    synthetic: false
    source_claims:
      - c
  - id: PersistentContextRisk-real-instance-4
    kind: instance
    labels: {zh: "PersistentContextRisk instance case", en: "PersistentContextRisk instance case", ja: "PersistentContextRisk instance case"}
    descriptions: {zh: "OWASP LLM01:2025 场景 #1：攻击者向客服聊天机器人注入提示，要求其忽略先前准则、查询私有数据存储并发送邮件（genai.owasp.org/llmrisk/llm01-prompt-injection/）。", en: "OWASP LLM01:2025 Scenario #1: an attacker injects a prompt into a customer-support chatbot instructing it to ignore prior guidelines, query private data stores, and send email (genai.owasp.org/llmrisk/llm01-prompt-injection/).", ja: "OWASP LLM01:2025 シナリオ #1：攻撃者がカスタマーサポート chatbot にプロンプトを注入し、以前のガイドラインを無視して private data store を照会しメール送信を指示する。"}
    field_values:
      confidence: 0.76
      detection_evidence_reference: memory-46-r3
      persistence_scope: cross-session
      persistent_context_risk_id: context-risk-46
      threat_signal_id: context-risk-46
    related_node_ids: [PersistentContextRisk]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "OWASP LLM01 将直接注入定义为用户提供的、改变模型行为的输入；信号记录可审查证据，而非已确认泄露。", en: "OWASP LLM01 documents direct injection as user-supplied input that alters model behavior; a signal records reviewable evidence, not a confirmed breach.", ja: "OWASP LLM01 は直接注入をモデル挙動を変えるユーザー供給入力として定義する。"}
    synthetic: false
    source_claims:
      - c
