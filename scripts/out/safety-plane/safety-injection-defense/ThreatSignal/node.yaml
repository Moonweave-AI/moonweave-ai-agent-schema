schema: moonweave.ai/ontology-node/v1
id: ThreatSignal
kind: concept
status: accepted
labels:
  zh: 威胁信号
  en: Threat Signal
  ja: 脅威シグナル
semantics:
  short_definition:
    zh: 检测活动观察到的、需要进一步安全处理的风险指示。
    en: A risk indicator observed by a detection activity that requires further
      safety handling.
    ja: 検出活動が観測し、追加の安全処理を必要とするリスク指標。
  definition:
    zh: ThreatSignal 是由已发生的 DetectionActivity 生成的可观察风险指示实体，可能来自提示、检索内容、持久记忆或工具流。其输出来历以
      PROV-O wasGeneratedBy 表示，而不是目录组成。它不是攻击结论、策略决策、不受信任内容本身或执行的缓解动作。
    en: ThreatSignal is an observable risk-indicator entity generated by an occurred
      DetectionActivity and may originate in prompts, retrieved content, persistent
      memory, or tool streams. Its output provenance is expressed with PROV-O
      wasGeneratedBy, not directory composition. It is not an attack conclusion,
      policy decision, the untrusted content itself, or an executed mitigation action.
    ja: ThreatSignal は発生済み DetectionActivity が生成する観測可能なリスク指標エンティティであり、プロンプト、取得内容、永続メモリ、ツールストリームに由来し得る。出力来歴は
      ディレクトリ構成ではなく PROV-O wasGeneratedBy で表す。攻撃の結論、ポリシー決定、信頼できない内容そのもの、実行済み緩和行為ではない。
  why_needed:
    zh: 发现必须能表达不确定但有依据的风险，使后续控制可以按风险处理而不把每个可疑文本都断言为已确认攻击。
    en: Findings need to express evidence-backed risk without asserting every
      suspicious text is a confirmed attack, so later controls can handle it
      proportionally.
    ja: 後続制御が比例して扱えるよう、全ての疑わしいテキストを確定攻撃と断定せずに根拠付きリスクを表す必要がある。
  includes:
    - zh: 信号类别、来源、置信度、检测证据和关联内容。
      en: Signal class, origin, confidence, detection evidence, and related content.
      ja: シグナル種別、出所、確信度、検出証拠、関連内容。
  excludes:
    - zh: 对风险的最终处置。
      en: The final disposition of the risk.
      ja: リスクの最終処置。
  semantic_kind: signal
  aliases:
    - security-signal
    - risk-indicator
engineering:
  explanation:
    zh: 当检测规则识别出与注入有关的行为或内容时，发出带来源和置信度的信号。将信号路由到风险分诊或缓解流程，但不把它当作指令或最终安全结论。
    en: Emit a signal with source provenance and confidence whenever detection rules
      identify behavior or content associated with injection. Route the signal
      to risk triage or mitigation without treating it as an instruction or as a
      final security verdict.
    ja: 検出規則が注入に関連する挙動または内容を識別したとき、出所と信頼度を持つシグナルを発行する。シグナルをリスクトリアージまたは緩和へ渡すが、指示または最終的な安全結論として扱わない。
  typical_input:
    - description:
        zh: 检测观测
        en: Detection observation
        ja: 検出観測
      format: '{"activity_id":"scan-42","origin":"retrieved-content","pattern":"ignore-prior-rules","confidence":0.91}'
      source_claims:
        - claim-owasp-prompt-injection
  typical_output:
    - description:
        zh: 威胁信号
        en: Threat signal
        ja: 脅威シグナル
      format: '{"threat_signal_id":"signal-42","class":"prompt-injection","origin":"retrieved-content","confidence":0.91,"detection_evidence_reference":"pattern-match-42"}'
      source_claims:
        - claim-owasp-prompt-injection
  reference_implementations:
    - name: OWASP LLM01 Prompt Injection
      url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
      description: Defines prompt injection as untrusted input altering model behavior.
structure:
  identity_keys:
    - threat_signal_id
  fields:
    - id: threat_signal_id
      labels:
        zh: 威胁信号标识符
        en: Threat signal ID
        ja: 脅威シグナル ID
      definitions:
        zh: 一次检测到的风险指示的稳定标识符。
        en: Stable identifier for one detected risk indicator.
        ja: 一つの検出済みリスク指標の安定識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: ^[a-z0-9-]+$
      example_value: signal-42
      allowed_values: []
      source_claims:
        - claim-owasp-prompt-injection
    - id: confidence
      labels:
        zh: 置信度
        en: Confidence
        ja: 確信度
      definitions:
        zh: 检测活动对该信号的相对置信度。
        en: The detection activity relative confidence in this signal.
        ja: このシグナルに対する検出活動の相対確信度。
      datatype: number
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 0.91
      allowed_values: []
      source_claims:
        - claim-owasp-prompt-injection
    - id: detection_evidence_reference
      labels:
        zh: 检测证据引用
        en: Detection evidence reference
        ja: 検出証拠参照
      definitions:
        zh: 支持该风险信号的检测观察、模式匹配或内容位置引用。
        en: A detection observation, pattern match, or content-location reference supporting this risk signal.
        ja: このリスクシグナルを裏付ける検出観測、パターン一致、または内容位置への参照。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: null
      pattern: null
      example_value: candidate-42
      allowed_values: []
      source_claims:
        - claim-owasp-prompt-injection
  constraints:
    - id: threat-signal-evidence-not-verdict
      severity: error
      expression_language: plain
      expression: A ThreatSignal must retain its detection evidence and confidence and
        must not be represented as a confirmed attack without a separate
        adjudication.
      explanations:
        zh: 信号是携带证据的指标，而不是自动结论。
        en: Signals are evidence-bearing indicators, not automatic conclusions.
        ja: シグナルは証拠を持つ指標であり、自動結論ではない。
      explanation:
        zh: 信号是携带证据的指标，而不是自动结论。
        en: Signals are evidence-bearing indicators, not automatic conclusions.
        ja: シグナルは証拠を持つ指標であり、自動結論ではない。
      source_claims:
        - claim-owasp-prompt-injection
    - id: threat-signal-detection-provenance
      severity: error
      language: plain
      expression: Each ThreatSignal instance must retain a typed was_generated_by
        relation to an occurred DetectionActivity and source evidence; it must not
        be modeled as a child component of the activity.
      explanation:
        zh: A signal is an observed output record, while detection is the activity that
          produced it.
        en: A signal is an observed output record, while detection is the activity that
          produced it.
        ja: A signal is an observed output record, while detection is the activity that
          produced it.
      source_claims:
        - claim-prov-o-generation
  required_relations: []
examples:  
- id: threat-signal-positive-retrieval
    kind: positive
    labels:
      zh: 检索内容注入信号
      en: Retrieved-content injection signal
      ja: 取得内容の注入シグナル
    descriptions: {zh: "OWASP LLM01:2025 场景 #1：攻击者向客服聊天机器人注入提示，要求其忽略先前准则、查询私有数据存储并发送邮件（genai.owasp.org/llmrisk/llm01-prompt-injection/）。", en: "OWASP LLM01:2025 Scenario #1: an attacker injects a prompt into a customer-support chatbot instructing it to ignore prior guidelines, query private data stores, and send email (genai.owasp.org/llmrisk/llm01-prompt-injection/).", ja: "OWASP LLM01:2025 シナリオ #1：攻撃者がカスタマーサポート chatbot にプロンプトを注入し、以前のガイドラインを無視して private data store を照会しメール送信を指示する。"}
    field_values:
      confidence: 0.91
      detection_evidence_reference: candidate-42
      threat_signal_id: signal-42
    related_node_ids: []
    related_relation_ids: []
    expected_result: {zh: "璁板綍涓庣湡瀹炴潵婧愪竴鑷寸殑鍙楁帶缁撴灉銆?, en: "Record a controlled outcome aligned with the cited source.", ja: "寮曠敤銈姐兗銈广仺涓€鑷淬仚銈嬪埗寰＄祼鏋溿倰瑷橀尣銇欍倠銆?}
    why_valid_or_invalid: {zh: "OWASP LLM01 将直接注入定义为用户提供的、改变模型行为的输入；信号记录可审查证据，而非已确认泄露。", en: "OWASP LLM01 documents direct injection as user-supplied input that alters model behavior; a signal records reviewable evidence, not a confirmed breach.", ja: "OWASP LLM01 は直接注入をモデル挙動を変えるユーザー供給入力として定義する。"}
    synthetic: false
    source_claims:
      - claim-owasp-prompt-injection
  - id: threat-signal-counter-attack-verdict
    kind: counterexample
    labels:
      zh: 被断言为攻击的信号
      en: Signal asserted as attack
      ja: 攻撃として断言されたシグナル
    descriptions: {zh: "OWASP LLM01:2025 场景 #1：攻击者向客服聊天机器人注入提示，要求其忽略先前准则、查询私有数据存储并发送邮件（genai.owasp.org/llmrisk/llm01-prompt-injection/）。", en: "OWASP LLM01:2025 Scenario #1: an attacker injects a prompt into a customer-support chatbot instructing it to ignore prior guidelines, query private data stores, and send email (genai.owasp.org/llmrisk/llm01-prompt-injection/).", ja: "OWASP LLM01:2025 シナリオ #1：攻撃者がカスタマーサポート chatbot にプロンプトを注入し、以前のガイドラインを無視して private data store を照会しメール送信を指示する。"}
