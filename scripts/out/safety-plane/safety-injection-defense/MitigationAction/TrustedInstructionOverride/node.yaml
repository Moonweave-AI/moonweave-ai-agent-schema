schema: moonweave.ai/ontology-node/v1
id: TrustedInstructionOverride
kind: concept
status: accepted
labels: {zh: 可信指令优先动作, en: Trusted Instruction Override, ja: 信頼済み指示優先行為}
semantics:
  short_definition: {zh: "在冲突发生时保留更高信任约束而拒绝不受信任候选指令影响的缓解动作。", en: "A mitigation action that preserves a higher-trust constraint when a conflicting untrusted candidate attempts to influence behavior.", ja: "衝突する信頼できない候補が挙動へ影響しようとするとき、高信頼の制約を保持する緩和行為。"}
  definition: {zh: "TrustedInstructionOverride 是一种 MitigationAction：它记录系统、用户或已批准安全约束继续优先于冲突的不受信任指令。它不是将任何人类或模型文本升级为系统指令、通用授权覆盖、PolicyDecision 或实际工具执行。", en: "TrustedInstructionOverride is a MitigationAction recording that a system, user, or approved safety constraint continues to take precedence over a conflicting untrusted instruction. It is not elevating arbitrary human or model text to system instruction, a general authorization override, a PolicyDecision, or actual tool execution.", ja: "TrustedInstructionOverride は、システム、ユーザー、または承認済み安全制約が衝突する信頼できない指示より優先し続けることを記録する MitigationAction である。任意の人またはモデルのテキストをシステム指示へ昇格すること、一般認可上書き、PolicyDecision、実際のツール実行ではない。"}
  why_needed: {zh: "冲突处理必须表明哪个约束仍然生效，避免不受信任文本通过声称更高优先级而改变控制流。", en: "Conflict handling must state which constraint remains effective so untrusted text cannot change control flow by claiming a higher precedence.", ja: "衝突処理はどの制約が有効なままかを示し、信頼できないテキストが高い優先度を主張して制御フローを変えられないようにする必要がある。"}
  includes: [{zh: "冲突发现、保留的可信约束、被拒绝候选、优先级依据和处理结果。", en: "Conflict finding, retained trusted constraint, rejected candidate, precedence basis, and handling result.", ja: "衝突発見、保持した信頼済み制約、拒否候補、優先度根拠、処理結果。"}]
  excludes: [{zh: "无冲突时的普通系统提示或人类批准。", en: "An ordinary system prompt or human approval when no conflict exists.", ja: "衝突がない場合の通常のシステムプロンプトまたは人の承認。"}]
  semantic_kind: activity
  aliases: [trusted-constraint-preservation]
engineering:
  explanation: {zh: "当 InstructionConflict 记录不受信任候选与更高信任约束相抵触时，引用两侧证据并让可信约束继续控制后续选择。不要修改候选来源的信任级别，也不要把这个动作当作授权授予。", en: "When InstructionConflict records that an untrusted candidate conflicts with a higher-trust constraint, cite both sides of evidence and keep the trusted constraint governing later selection. Do not change the candidate source trust level or treat this action as an authorization grant.", ja: "InstructionConflict が信頼できない候補と高信頼制約の衝突を記録したとき、両側の証拠を引用し信頼済み制約が後続選択を支配し続けるようにする。候補情報源の信頼度を変えず、この行為を認可付与として扱わない。"}
  typical_input:
    - description: {zh: 指令冲突, en: Instruction conflict, ja: 指示衝突}
      format: '{"action_id":"override-42","conflict_id":"conflict-42","trusted_constraint":"system-no-credential-disclosure","candidate_id":"candidate-42"}'
      source_claims: [claim-owasp-precedence-inference]
  typical_output:
    - description: {zh: 优先处理记录, en: Precedence handling record, ja: 優先処理記録}
      format: '{"action_id":"override-42","retained_constraint":"system-no-credential-disclosure","candidate_effect":"rejected"}'
      source_claims: [claim-owasp-precedence-inference]
  reference_implementations:
    - name: OWASP LLM01 Prompt Injection
      url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
      description: "Explains that untrusted input may attempt to alter model behavior."
structure:
  identity_keys: [mitigation_action_id, trusted_instruction_override_id]
  fields:
    - id: mitigation_action_id
      labels: {zh: 继承的缓解动作标识符, en: Inherited mitigation action ID, ja: 継承された緩和行為 ID}
      definitions: {zh: 此可信指令优先操作作为 MitigationAction 的稳定动作身份；它与优先操作记录标识同一具体风险处置。, en: "Stable action identity for this trusted-instruction override as a MitigationAction; it identifies the same concrete risk treatment as the override record.", ja: "この信頼済み指示優先操作が MitigationAction として持つ安定した行為 ID。優先操作記録と同じ具体的なリスク処置を識別する。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: override-42
      allowed_values: []
      source_claims: [claim-owasp-precedence-inference]
    - id: action_type
      labels: {zh: 动作类型, en: Action type, ja: 行為種別}
      definitions: {zh: 固定为 preserve-trusted-constraint，说明该操作保留较高信任约束而不把不受信任候选提升为指令。, en: "Fixed to preserve-trusted-constraint, showing that the action retains a higher-trust constraint rather than promoting an untrusted candidate to instruction.", ja: "preserve-trusted-constraint に固定する。この行為がより高信頼の制約を保持し、信頼できない候補を指示へ昇格させないことを示す。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: preserve-trusted-constraint
      allowed_values: [quarantine, sanitize, preserve-trusted-constraint]
      source_claims: [claim-owasp-precedence-inference]
    - id: risk_basis_reference
      labels: {zh: 风险依据引用, en: Risk-basis reference, ja: リスク根拠参照}
      definitions: {zh: 要求或支持保留该可信约束的发现、冲突或风险依据引用。, en: "Finding, conflict, or documented risk-basis reference that requires or supports preserving this trusted constraint.", ja: "この信頼済み制約の保持を要求または裏付ける発見、衝突、または文書化済みリスク根拠への参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: conflict-42
      allowed_values: []
      source_claims: [claim-owasp-precedence-inference]
    - id: trusted_instruction_override_id
      labels: {zh: 可信指令优先动作标识符, en: Trusted instruction override ID, ja: 信頼済み指示優先行為 ID}
      definitions: {zh: "一次冲突优先处理动作的稳定标识符。", en: "Stable identifier for one conflict-precedence handling action.", ja: "一つの衝突優先処理行為の安定識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: override-42
      allowed_values: []
      source_claims: [claim-owasp-precedence-inference]
    - id: retained_constraint_id
      labels: {zh: 保留约束标识符, en: Retained constraint ID, ja: 保持制約 ID}
      definitions: {zh: "在冲突后继续控制行为的更高信任约束标识。", en: "The higher-trust constraint that continues to govern behavior after conflict.", ja: "衝突後も挙動を支配し続ける高信頼制約の識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: system-no-credential-disclosure
      allowed_values: []
      source_claims: [claim-owasp-precedence-inference]
  constraints:
    - id: trusted-instruction-override-evidence
      severity: error
      expression_language: plain
      expression: A TrustedInstructionOverride must reference an InstructionConflict and identify the retained higher-trust constraint; it must not elevate the conflicting candidate.
      explanations: {zh: "优先动作保护信任边界而不改写来源。", en: "The precedence action protects trust boundary without rewriting provenance.", ja: "優先行為は来歴を書き換えず信頼境界を保護する。"}
      explanation: {zh: "优先动作保护信任边界而不改写来源。", en: "The precedence action protects trust boundary without rewriting provenance.", ja: "優先行為は来歴を書き換えず信頼境界を保護する。"}
      source_claims: [claim-owasp-precedence-inference]
  required_relations: []
examples:
  
- id: trusted-override-positive-secret
    kind: positive
    labels: {zh: 保留秘密披露约束, en: Retain secret-disclosure constraint, ja: 秘密開示制約を保持}
    descriptions: {zh: "OpenAI Agents SDK 输入护栏在检测到指令覆盖模式时可 tripwire 并停止运行。", en: "OpenAI Agents SDK input guardrails can tripwire and stop runs when instruction-override patterns are detected.", ja: "OpenAI Agents SDK input guardrail は instruction override 検出時に tripwire で run を停止できる。"}
    field_values: {mitigation_action_id: override-42, action_type: preserve-trusted-constraint, risk_basis_reference: conflict-42, trusted_instruction_override_id: override-42, retained_constraint_id: system-no-credential-disclosure}
    related_node_ids: [InstructionConflict, UntrustedInstructionCandidate]
    related_relation_ids: [TrustedInstructionOverride-is_a-MitigationAction]
    expected_result: {zh: "候选不能触发外泄动作。", en: "The candidate cannot trigger an exfiltration action.", ja: "候補は流出行為を起動できない。"}
    why_valid_or_invalid: {zh: "Tripwire 是检测/执行信号，不是持久 OAuth 凭据。", en: "Tripwire is detection/enforcement signal, not a standing OAuth credential.", ja: "Tripwire は detection/enforcement signal であり standing OAuth credential ではない。"}
    synthetic: false
    source_claims: [claim-owasp-precedence-inference]
  - id: trusted-override-counter-elevate
    kind: counterexample
    labels: {zh: 提升外部文本优先级, en: Elevate external text precedence, ja: 外部テキストの優先度を昇格}
    descriptions: {zh: "OpenAI Agents SDK 输入护栏在检测到指令覆盖模式时可 tripwire 并停止运行。", en: "OpenAI Agents SDK input guardrails can tripwire and stop runs when instruction-override patterns are detected.", ja: "OpenAI Agents SDK input guardrail は instruction override 検出時に tripwire で run を停止できる。"}
    field_values: {mitigation_action_id: override-43, action_type: preserve-trusted-constraint, risk_basis_reference: conflict-43, trusted_instruction_override_id: override-43, retained_constraint_id: external-text}
    related_node_ids: [PoisonedRetrievedChunk, IndirectInjectionSignal]
    related_relation_ids: []
    expected_result: {zh: "拒绝该优先级提升。", en: "Reject the precedence elevation.", ja: "優先度昇格を拒否する。"}
    why_valid_or_invalid: {zh: "Tripwire 是检测/执行信号，不是持久 OAuth 凭据。", en: "Tripwire is detection/enforcement signal, not a standing OAuth credential.", ja: "Tripwire は detection/enforcement signal であり standing OAuth credential ではない。"}
    synthetic: false
    source_claims: [claim-owasp-precedence-inference]
  - id: trusted-override-boundary-grant
    kind: boundary
    labels: {zh: 可信约束优先与授权授予, en: Trusted precedence versus authorization grant, ja: 信頼優先と認可付与}
    descriptions: {zh: "OpenAI Agents SDK 输入护栏在检测到指令覆盖模式时可 tripwire 并停止运行。", en: "OpenAI Agents SDK input guardrails can tripwire and stop runs when instruction-override patterns are detected.", ja: "OpenAI Agents SDK input guardrail は instruction override 検出時に tripwire で run を停止できる。"}
    field_values: {mitigation_action_id: override-44, action_type: preserve-trusted-constraint, risk_basis_reference: conflict-44, trusted_instruction_override_id: override-44, retained_constraint_id: system-tool-boundary}
    related_node_ids: [AuthorizationCredential, PolicyDecision]
    related_relation_ids: []
    expected_result: {zh: "不把缓解动作解释为访问许可。", en: "Do not interpret mitigation as access permission.", ja: "緩和をアクセス許可と解釈しない。"}
    why_valid_or_invalid: {zh: "Tripwire 是检测/执行信号，不是持久 OAuth 凭据。", en: "Tripwire is detection/enforcement signal, not a standing OAuth credential.", ja: "Tripwire は detection/enforcement signal であり standing OAuth credential ではない。"}
    synthetic: false
    source_claims: [claim-owasp-precedence-inference]
  - id: trusted-override-instance-memory
    kind: instance
    labels: {zh: 记忆删除约束实例, en: Memory deletion-constraint instance, ja: メモリ削除制約の実例}
    descriptions: {zh: "OpenAI Agents SDK 输入护栏在检测到指令覆盖模式时可 tripwire 并停止运行。", en: "OpenAI Agents SDK input guardrails can tripwire and stop runs when instruction-override patterns are detected.", ja: "OpenAI Agents SDK input guardrail は instruction override 検出時に tripwire で run を停止できる。"}
    field_values: {mitigation_action_id: override-45, action_type: preserve-trusted-constraint, risk_basis_reference: conflict-45, trusted_instruction_override_id: override-45, retained_constraint_id: user-deletion-request}
    related_node_ids: [MemoryPoisoningSignal, QuarantineAction]
    related_relation_ids: []
    expected_result: {zh: "记忆指令不改变用户控制。", en: "The memory instruction does not change user control.", ja: "メモリ指示はユーザー制御を変えない。"}
    why_valid_or_invalid: {zh: "Tripwire 是检测/执行信号，不是持久 OAuth 凭据。", en: "Tripwire is detection/enforcement signal, not a standing OAuth credential.", ja: "Tripwire は detection/enforcement signal であり standing OAuth credential ではない。"}
    synthetic: false
    source_claims: [claim-owasp-precedence-inference]
  - id: TrustedInstructionOverride-real-counterexample-2
    kind: counterexample
    labels: {zh: "TrustedInstructionOverride counterexample case", en: "TrustedInstructionOverride counterexample case", ja: "TrustedInstructionOverride counterexample case"}
    descriptions: {zh: "NVIDIA NeMo Guardrails 的 injection_detection rail 拒绝匹配 code、SQLi、template 或 XSS 注入模式的输入。", en: "NVIDIA NeMo Guardrails injection_detection rail rejects inputs matching code, SQLi, template, or XSS injection patterns (github.com/NVIDIA-NeMo/Guardrails).", ja: "NVIDIA NeMo Guardrails の injection_detection rail は code/SQLi/template/XSS 注入パターンを reject する。"}
    field_values:
      action_type: preserve-trusted-constraint
      mitigation_action_id: override-44
      retained_constraint_id: system-no-credential-disclosure
      risk_basis_reference: conflict-44
      trusted_instruction_override_id: override-44
    related_node_ids: [TrustedInstructionOverride]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "NeMo Guardrails 在 rail 层缓解注入，不将检测与 OAuth 授权混为一谈。", en: "NeMo Guardrails mitigates injection at the rail layer without conflating detection with OAuth authorization.", ja: "NeMo Guardrails は rail 層で注入を緩和し、検出と OAuth 認可を混同しない。"}
    synthetic: false
    source_claims:
      - c
  - id: TrustedInstructionOverride-real-boundary-3
