    labels:
      zh: mitigates defense finding
      en: mitigates defense finding
      ja: mitigates defense finding
    definitions:
      zh: A MitigationAction may mitigate a separately recorded DefenseFinding; the
        action is not a component subtype of the finding.
      en: A MitigationAction may mitigate a separately recorded DefenseFinding; the
        action is not a component subtype of the finding.
      ja: A MitigationAction may mitigate a separately recorded DefenseFinding; the
        action is not a component subtype of the finding.
    cardinality:
