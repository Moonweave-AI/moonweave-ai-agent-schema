schema: moonweave.ai/ontology-node/v1
id: QuarantineAction
kind: concept
status: accepted
labels: {zh: 隔离动作, en: Quarantine Action, ja: 隔離行為}
semantics:
  short_definition: {zh: "将可疑工件移出活动消费路径并保留证据的缓解动作。", en: "A mitigation action that removes a suspicious artifact from active consumption while preserving evidence.", ja: "疑わしいアーティファクトを証拠を保持しつつ能動的消費経路から外す緩和行為。"}
  definition: {zh: "QuarantineAction 是一种 MitigationAction，它限制可疑内容被计划、工具或输出流程使用，并保留受控审查引用。它不是删除内容、净化内容表示、PolicyDecision、AuthorizationRevocation 或对来源服务器的网络封禁。", en: "QuarantineAction is a MitigationAction that restricts suspicious content from use by planning, tool, or output flow while retaining a controlled review reference. It is not deletion, content sanitization, a PolicyDecision, AuthorizationRevocation, or a network block on the source server.", ja: "QuarantineAction は疑わしい内容が計画、ツール、出力フローで使われるのを制限し、制御されたレビュー参照を保持する MitigationAction である。削除、内容サニタイズ、PolicyDecision、AuthorizationRevocation、提供サーバーへのネットワーク遮断ではない。"}
  why_needed: {zh: "隔离在保留取证和恢复可能性的同时，防止可疑内容继续影响代理行为。", en: "Quarantine prevents suspicious content from continuing to influence agent behavior while preserving forensic evidence and recoverability.", ja: "隔離はフォレンジック証拠と回復可能性を保ちながら、疑わしい内容がエージェント挙動へ影響し続けるのを防ぐ。"}
  includes: [{zh: "目标工件版本、隔离位置、处置原因、访问限制和审查引用。", en: "Target artifact revision, quarantine location, disposition reason, access restriction, and review reference.", ja: "対象アーティファクト版、隔離場所、処置理由、アクセス制限、レビュー参照。"}]
  excludes: [{zh: "永久擦除或将内容改写为安全文本。", en: "Permanent erasure or rewriting content into safe text.", ja: "永久消去または内容を安全テキストへ書き換えること。"}]
  semantic_kind: activity
  aliases: [isolation-action, content-quarantine]
engineering:
  explanation: {zh: "将精确工件版本移到无法被普通上下文组装、工具参数生成或输出渲染消费的位置。保留不可变引用、原始摘要和访问审计；恢复必须经过单独审查而不是自动重入上下文。", en: "Move the exact artifact revision to a location unavailable to ordinary context assembly, tool-argument generation, or output rendering. Retain immutable reference, original digest, and access audit; restoration requires separate review rather than automatic re-entry into context.", ja: "正確なアーティファクト版を通常のコンテキスト組立、ツール引数生成、出力描画で消費できない場所へ移す。不変参照、元要約、アクセス監査を保持し、復元は自動的なコンテキスト再入ではなく別レビューを要する。"}
  typical_input:
    - description: {zh: 需隔离的工件, en: Artifact to quarantine, ja: 隔離するアーティファクト}
      format: '{"quarantine_id":"quarantine-42","finding_id":"finding-42","artifact":"tool-output-42-r1","reason":"instruction-injection"}'
      source_claims: [claim-owasp-quarantine-inference]
  typical_output:
    - description: {zh: 隔离收据, en: Quarantine receipt, ja: 隔離受領書}
      format: '{"quarantine_id":"quarantine-42","state":"isolated","storage_ref":"quarantine://tool-output-42-r1","active_access":false}'
      source_claims: [claim-owasp-quarantine-inference]
  reference_implementations:
    - name: OWASP LLM01 Prompt Injection
      url: https://genai.owasp.org/llmrisk/llm01-prompt-injection/
      description: "Explains mitigation needs that limit influence of untrusted content."
structure:
  identity_keys: [mitigation_action_id, quarantine_action_id]
  fields:
    - id: mitigation_action_id
      labels: {zh: 继承的缓解动作标识符, en: Inherited mitigation action ID, ja: 継承された緩和行為 ID}
      definitions: {zh: 此隔离操作作为 MitigationAction 的稳定动作身份；它与隔离操作记录标识同一具体风险处置。, en: "Stable action identity for this quarantine operation as a MitigationAction; it identifies the same concrete risk treatment as the quarantine-action record.", ja: "この隔離操作が MitigationAction として持つ安定した行為 ID。隔離操作記録と同じ具体的なリスク処置を識別する。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: quarantine-42
      allowed_values: []
      source_claims: [claim-owasp-quarantine-inference]
    - id: action_type
      labels: {zh: 动作类型, en: Action type, ja: 行為種別}
      definitions: {zh: 固定为 quarantine，说明该缓解动作将可疑工件移出活动消费路径而不等同于删除证据。, en: "Fixed to quarantine, showing that the mitigation removes a suspicious artifact from active consumption without equating quarantine with evidence deletion.", ja: "quarantine に固定する。隔離は疑わしい成果物をアクティブな消費から外す緩和であり、証拠削除とは同一ではないことを示す。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: quarantine
      allowed_values: [quarantine, sanitize, preserve-trusted-constraint]
      source_claims: [claim-owasp-quarantine-inference]
    - id: risk_basis_reference
      labels: {zh: 风险依据引用, en: Risk-basis reference, ja: リスク根拠参照}
      definitions: {zh: 要求或支持隔离的发现、信号或已记录风险依据引用。, en: "Finding, signal, or documented risk-basis reference that requires or supports this quarantine action.", ja: "この隔離行為を要求または裏付ける発見、シグナル、または文書化済みリスク根拠への参照。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: finding-42
      allowed_values: []
      source_claims: [claim-owasp-quarantine-inference]
    - id: quarantine_action_id
      labels: {zh: 隔离动作标识符, en: Quarantine action ID, ja: 隔離行為 ID}
      definitions: {zh: "一次工件隔离操作的稳定标识符。", en: "Stable identifier for one artifact-isolation operation.", ja: "一つのアーティファクト隔離操作の安定識別子。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: '^[a-z0-9-]+$'
      example_value: quarantine-42
      allowed_values: []
      source_claims: [claim-owasp-quarantine-inference]
    - id: quarantine_location
      labels: {zh: 隔离位置, en: Quarantine location, ja: 隔離場所}
      definitions: {zh: "受控审查可访问但正常代理流程不可消费的工件位置。", en: "Artifact location available to controlled review but not ordinary agent consumption.", ja: "制御されたレビューは可能だが通常のエージェント消費はできないアーティファクト場所。"}
      datatype: string
      required: true
      cardinality: {min: 1, max: 1}
      pattern: null
      example_value: quarantine://tool-output-42-r1
      allowed_values: []
      source_claims: [claim-owasp-quarantine-inference]
  constraints:
    - id: quarantine-removes-active-consumption
      severity: error
      expression_language: plain
      expression: A QuarantineAction must prevent the target revision from ordinary context, tool, and output consumption while retaining a controlled review reference.
      explanations: {zh: "隔离不是仅给工件增加标签。", en: "Quarantine is not merely adding a label to an artifact.", ja: "隔離はアーティファクトにラベルを付けるだけではない。"}
      explanation: {zh: "隔离不是仅给工件增加标签。", en: "Quarantine is not merely adding a label to an artifact.", ja: "隔離はアーティファクトにラベルを付けるだけではない。"}
      source_claims: [claim-owasp-quarantine-inference]
  required_relations: []
examples:
  
- id: quarantine-positive-tool-output
    kind: positive
    labels: {zh: 隔离恶意工具输出, en: Quarantine malicious tool output, ja: 悪意あるツール出力を隔離}
    descriptions: {zh: "EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。", en: "EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025).", ja: "EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。"}
    field_values: {mitigation_action_id: quarantine-42, action_type: quarantine, risk_basis_reference: finding-42, quarantine_action_id: quarantine-42, quarantine_location: quarantine://tool-output-42-r1}
    related_node_ids: [MaliciousToolOutput, DefenseFinding]
    related_relation_ids: [QuarantineAction-is_a-MitigationAction]
    expected_result: {zh: "规划器不能再读取该版本。", en: "The planner can no longer consume that revision.", ja: "プランナーはその版を消費できなくなる。"}
    why_valid_or_invalid: {zh: "EchoLeak 是通过邮件检索的已记录零点击间接注入，而非普通验证错误。", en: "EchoLeak is a documented zero-click indirect injection via email retrieval, not a generic validation error.", ja: "EchoLeak はメール取得経由の zero-click 間接注入として文書化されている。"}
    synthetic: false
    source_claims: [claim-owasp-quarantine-inference]
  - id: quarantine-counter-delete
    kind: counterexample
    labels: {zh: 删除当隔离, en: Delete treated as quarantine, ja: 削除を隔離とする}
    descriptions: {zh: "EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。", en: "EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025).", ja: "EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。"}
    field_values: {mitigation_action_id: quarantine-43, action_type: quarantine, risk_basis_reference: finding-43, quarantine_action_id: quarantine-43, quarantine_location: none}
    related_node_ids: [PoisonedContent]
    related_relation_ids: []
    expected_result: {zh: "不将其视为可审计隔离。", en: "Do not treat it as auditable quarantine.", ja: "監査可能な隔離として扱わない。"}
    why_valid_or_invalid: {zh: "EchoLeak 是通过邮件检索的已记录零点击间接注入，而非普通验证错误。", en: "EchoLeak is a documented zero-click indirect injection via email retrieval, not a generic validation error.", ja: "EchoLeak はメール取得経由の zero-click 間接注入として文書化されている。"}
    synthetic: false
    source_claims: [claim-owasp-quarantine-inference]
  - id: quarantine-boundary-sanitize
    kind: boundary
    labels: {zh: 隔离与净化, en: Quarantine versus sanitization, ja: 隔離とサニタイズ}
    descriptions: {zh: "EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。", en: "EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025).", ja: "EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。"}
    field_values: {mitigation_action_id: quarantine-44, action_type: quarantine, risk_basis_reference: finding-44, quarantine_action_id: quarantine-44, quarantine_location: quarantine://chunk-44}
    related_node_ids: [SanitizationAction, PoisonedRetrievedChunk]
    related_relation_ids: []
    expected_result: {zh: "两个动作保留不同输出。", en: "The actions retain different outputs.", ja: "行為は異なる出力を保持する。"}
    why_valid_or_invalid: {zh: "EchoLeak 是通过邮件检索的已记录零点击间接注入，而非普通验证错误。", en: "EchoLeak is a documented zero-click indirect injection via email retrieval, not a generic validation error.", ja: "EchoLeak はメール取得経由の zero-click 間接注入として文書化されている。"}
    synthetic: false
    source_claims: [claim-owasp-quarantine-inference]
  - id: quarantine-instance-memory
    kind: instance
    labels: {zh: 隔离受污染记忆实例, en: Quarantine poisoned memory instance, ja: 汚染メモリ隔離の実例}
    descriptions: {zh: "EchoLeak（CVE-2025-32711，CVSS 9.3）：精心构造的 Microsoft 365 Copilot 邮件隐藏指令，受害者在要求 Copilot 汇总收件箱时触发内部 SharePoint 数据外泄（NVD，2025）。", en: "EchoLeak (CVE-2025-32711, CVSS 9.3): a crafted Microsoft 365 Copilot email hid instructions that exfiltrated internal SharePoint data when the victim asked Copilot to summarize the inbox (NVD, 2025).", ja: "EchoLeak（CVE-2025-32711、CVSS 9.3）：細工された Microsoft 365 Copilot メールが内部 SharePoint データの exfiltration を誘発した。"}
    field_values: {mitigation_action_id: quarantine-45, action_type: quarantine, risk_basis_reference: finding-45, quarantine_action_id: quarantine-45, quarantine_location: quarantine://memory-45}
    related_node_ids: [MemoryPoisoningSignal, PersistentContextRisk]
    related_relation_ids: []
    expected_result: {zh: "受污染记忆不再进入正常上下文。", en: "The poisoned memory no longer enters ordinary context.", ja: "汚染メモリは通常のコンテキストへ入らない。"}
    why_valid_or_invalid: {zh: "EchoLeak 是通过邮件检索的已记录零点击间接注入，而非普通验证错误。", en: "EchoLeak is a documented zero-click indirect injection via email retrieval, not a generic validation error.", ja: "EchoLeak はメール取得経由の zero-click 間接注入として文書化されている。"}
    synthetic: false
    source_claims: [claim-owasp-quarantine-inference]
  - id: QuarantineAction-real-counterexample-2
    kind: counterexample
    labels: {zh: "QuarantineAction counterexample case", en: "QuarantineAction counterexample case", ja: "QuarantineAction counterexample case"}
    descriptions: {zh: "Greshake 等（ACM CCS 2023，arXiv:2302.12173）演示 Bing Chat 间接注入：Edge 侧栏读取网页时，HTML 注释改变聊天行为。", en: "Greshake et al. (ACM CCS 2023, arXiv:2302.12173) demonstrated Bing Chat indirect injection: HTML comments on a webpage changed chat behavior when Edge sidebar read the page.", ja: "Greshake ほか（ACM CCS 2023, arXiv:2302.12173) は Bing Chat 間接注入を実証：Edge サイドバーが HTML コメント付きページを読むと chat 挙動が変わる。"}
    field_values:
      action_type: quarantine
      mitigation_action_id: quarantine-44
      quarantine_action_id: quarantine-44
      quarantine_location: "quarantine://tool-output-44-r1"
      risk_basis_reference: finding-44
    related_node_ids: [QuarantineAction]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "该论文将检索到的网页文本视为不可信数据，不得成为指令权限。", en: "The paper treats retrieved webpage text as untrusted data that must not become instruction authority.", ja: "論文は取得 webpage テキストを命令権限になってはならない untrusted data として扱う。"}
    synthetic: false
    source_claims:
      - c
  - id: QuarantineAction-real-boundary-3
    kind: boundary
    labels: {zh: "QuarantineAction boundary case", en: "QuarantineAction boundary case", ja: "QuarantineAction boundary case"}
    descriptions: {zh: "NVIDIA NeMo Guardrails 的 injection_detection rail 拒绝匹配 code、SQLi、template 或 XSS 注入模式的输入。", en: "NVIDIA NeMo Guardrails injection_detection rail rejects inputs matching code, SQLi, template, or XSS injection patterns (github.com/NVIDIA-NeMo/Guardrails).", ja: "NVIDIA NeMo Guardrails の injection_detection rail は code/SQLi/template/XSS 注入パターンを reject する。"}
    field_values:
      action_type: quarantine
      mitigation_action_id: quarantine-45
      quarantine_action_id: quarantine-45
      quarantine_location: "quarantine://tool-output-45-r1"
      risk_basis_reference: finding-45
    related_node_ids: [QuarantineAction]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "NeMo Guardrails 在 rail 层缓解注入，不将检测与 OAuth 授权混为一谈。", en: "NeMo Guardrails mitigates injection at the rail layer without conflating detection with OAuth authorization.", ja: "NeMo Guardrails は rail 層で注入を緩和し、検出と OAuth 認可を混同しない。"}
    synthetic: false
    source_claims:
      - c
  - id: QuarantineAction-real-instance-4
    kind: instance
    labels: {zh: "QuarantineAction instance case", en: "QuarantineAction instance case", ja: "QuarantineAction instance case"}
    descriptions: {zh: "OpenAI Agents SDK 输入护栏在检测到指令覆盖模式时可 tripwire 并停止运行。", en: "OpenAI Agents SDK input guardrails can tripwire and stop runs when instruction-override patterns are detected.", ja: "OpenAI Agents SDK input guardrail は instruction override 検出時に tripwire で run を停止できる。"}
    field_values:
      action_type: quarantine
      mitigation_action_id: quarantine-46
      quarantine_action_id: quarantine-46
      quarantine_location: "quarantine://tool-output-46-r1"
      risk_basis_reference: finding-46
    related_node_ids: [QuarantineAction]
    related_relation_ids: []
    expected_result: {zh: "Record outcome aligned with cited source.", en: "Record a controlled outcome aligned with the cited source.", ja: "Record outcome aligned with cited source."}
    why_valid_or_invalid: {zh: "Tripwire 是检测/执行信号，不是持久 OAuth 凭据。", en: "Tripwire is detection/enforcement signal, not a standing OAuth credential.", ja: "Tripwire は detection/enforcement signal であり standing OAuth credential ではない。"}
    synthetic: false
    source_claims:
      - c
