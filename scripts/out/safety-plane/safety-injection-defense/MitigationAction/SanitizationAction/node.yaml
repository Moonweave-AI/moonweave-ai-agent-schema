  predicate: is_a
  relation_kind: hierarchy
  labels: {zh: 是一种, en: is a specialized, ja: 特化された}
  definitions: {zh: "SanitizationAction 是处理不受信任指令内容的 MitigationAction。", en: "A SanitizationAction is a MitigationAction for untrusted instruction content.", ja: "SanitizationAction は信頼できない指示内容を扱う MitigationAction である。"}
  cardinality: {source: {min: 0, max: null}, target: {min: 1, max: 1}}
  conditions:
    - id: sanitization-parent-finding
      severity: error
      expression_language: plain
      expression: The action must reference the DefenseFinding or signal that justified changing the untrusted content representation.
      explanations: {zh: "缓解必须可追溯到安全发现，而非任意重写。", en: "Mitigation must be traceable to a safety finding rather than arbitrary rewriting.", ja: "緩和は恣意的な書換えではなく、安全発見へ追跡可能でなければならない。"}
      source_claims: [claim-owasp-prompt-injection]
  temporal_scope: valid-time
  constraints: []
  source_claims: [claim-owasp-prompt-injection]
relations: []
