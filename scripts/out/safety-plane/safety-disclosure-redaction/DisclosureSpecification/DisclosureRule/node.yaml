      en: External-support disclosure rule
      ja: 外部サポート開示規則
    scenario_id: null
    descriptions: {zh: "Microsoft Presidio Analyzer 检测 PII 片段；AnonymizerEngine 应用 replace/mask/redact 算子。", en: "Microsoft Presidio Analyzer detects PII spans; AnonymizerEngine applies replace/mask/redact operators (microsoft.github.io/presidio).", ja: "Microsoft Presidio Analyzer は PII span を検出し AnonymizerEngine が replace/mask/redact を適用する。"}
  - id: DisclosureRule-real-coun-2
    kind: counterexample
    labels:
      zh: "DisclosureRule counterexample real case"
      en: "DisclosureRule counterexample real-world case"
      ja: "DisclosureRule counterexample case"
    scenario_id: null
    descriptions: {zh: "Microsoft Presidio Analyzer 检测 PII 片段；AnonymizerEngine 应用 replace/mask/redact 算子。", en: "Microsoft Presidio Analyzer detects PII spans; AnonymizerEngine applies replace/mask/redact operators (microsoft.github.io/presidio).", ja: "Microsoft Presidio Analyzer は PII span を検出し AnonymizerEngine が replace/mask/redact を適用する。"}
    field_values:
      condition_expression: "request.purpose == 'customer_support'"
      disclosure_action: redact
      rule_id: dr-credential-external
      specification_revision_ref: "disclosure/customer-output@3.2.0"
      valid_from: "2026-07-17T00:00:00Z"
    related_node_ids:
      - DisclosureRule
    related_relation_ids: []
