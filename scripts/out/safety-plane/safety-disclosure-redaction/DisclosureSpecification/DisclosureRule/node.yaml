schema: moonweave.ai/ontology-node/v1
id: DisclosureRule
kind: concept
status: accepted
labels:
  zh: 披露规则
  en: disclosure rule
  ja: 開示規則
semantics:
  short_definition:
    zh: 规定哪些信息可向何种接收者披露以及应采取何种处理的规范。
    en: A specification of what information may be disclosed to which recipients and under what handling.
    ja: どの情報をどの受信者へどの処理で開示できるかを定める仕様。
  definition:
    zh: DisclosureRule 是由一个确定 DisclosureSpecification 修订拥有的可复用规范记录，以规则标识、受众选择器、内容选择器、披露动作、可选条件和有效期描述何时允许、抑制、脱敏或渐进披露。它不执行过滤，也不是 SensitiveSpan、输出结果或某次活动使用规则的事实。
    en: DisclosureRule is a reusable normative record owned by exactly one DisclosureSpecification revision. Its rule ID, audience selector, content selector, disclosure action, optional condition, and validity interval state when content is allowed, suppressed, redacted, or progressively disclosed. It does not perform filtering and is not a SensitiveSpan, output result, or activity-to-rule use fact.
    ja: DisclosureRule は一つの DisclosureSpecification revision に所有される再利用規範記録です。rule ID、audience selector、content selector、disclosure action、任意 condition、有効期間で allow、suppress、redact、progressive disclosure の条件を定めます。filter を実行せず、SensitiveSpan、出力結果、活動―規則使用事実でもありません。
  why_needed:
    zh: 规则与执行分开后，同一策略可版本化、评审、测试并由多个控制活动复用，运行记录也能准确说明当时依据哪个版本作出释放或抑制决定。
    en: Separating rule from execution makes one policy versionable, reviewable, testable, and reusable across control activities, while runtime records can identify the exact version behind release or suppression.
    ja: 規則と実行を分離すると、同じ policy を版管理、審査、試験、再利用でき、実行記録は release/suppression の根拠版を特定できます。
  includes:
    - zh: 包含规范修订引用、规则标识、受众与内容选择器、披露动作、条件表达式和有效期；所属修订与规则标识共同构成身份。
      en: Includes owning-specification revision reference, Rule ID, audience and content selectors, disclosure action, condition expression, and validity interval; revision reference and Rule ID jointly form identity.
      ja: 所属仕様 revision 参照、規則 ID、受け手・内容 selector、開示 action、condition expression、有効期間を含み、revision 参照と規則 ID が共同 identity を構成します。
  excludes:
    - zh: 运行中的 DisclosureFilter、只标记一个 SensitiveSpan 的分类结果、实际 Redaction 活动、由 info-output-disclosure 拥有的 SuppressedContext 结果记录及通用访问控制决定。
      en: A running DisclosureFilter, a classification result marking one SensitiveSpan, an actual Redaction activity, a SuppressedContext result record owned by info-output-disclosure, or a general access-control decision.
      ja: 実行中 DisclosureFilter、一つの SensitiveSpan を示す分類結果、実際の Redaction 活動、info-output-disclosure が所有する SuppressedContext 結果記録、一般 access-control 判断。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - specification_revision_ref
    - rule_id
  fields:
    - id: rule_id
      labels:
        zh: 披露规则标识
        en: disclosure rule ID
        ja: 開示規則 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在所属披露规范修订内稳定识别该规则，与运行活动和敏感片段标识分离。
        en: Stable identifier for the rule within its owning disclosure-specification revision, distinct from activity and sensitive-span identifiers.
        ja: 所有開示仕様 revision 内で当該規則を安定識別し、活動・SensitiveSpan ID と分離します。
      allowed_values: []
      pattern: null
      example_value: dr-credential-external
      source_claims:
        - claim-disclosure-rule-002
    - id: specification_revision_ref
      labels:
        zh: 所属规范修订引用
        en: owning specification revision
        ja: 所有仕様 revision 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用唯一包含该规则的 DisclosureSpecification ID 与版本组合，防止规则跨修订漂移。
        en: Reference to the unique DisclosureSpecification ID-and-version pair containing this rule, preventing the rule from drifting across revisions.
        ja: 当該規則を含む唯一の DisclosureSpecification ID・版組を参照し、revision 間 drift を防ぎます。
      allowed_values: []
      pattern: null
      example_value: disclosure/customer-output@3.2.0
      source_claims:
        - claim-disclosure-rule-003
    - id: audience_selector
      labels:
        zh: 受众选择器
        en: audience selector
        ja: 受け手 selector
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明规则适用的接收主体、角色、组织或信任边界，不能只写含糊的“外部用户”。
        en: Selector for recipient principals, roles, organizations, or trust boundaries to which the rule applies; a vague 'external user' label is insufficient.
        ja: 規則が適用される recipient principal、role、organization、trust boundary を宣言し、曖昧な「外部利用者」だけでは不十分です。
      allowed_values: []
      pattern: null
      example_value:
        audience_class: external-customer
        trust_boundary: public-response
      source_claims:
        - claim-disclosure-rule-004
    - id: content_selector
      labels:
        zh: 内容选择器
        en: content selector
        ja: content selector
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明被规则判断的数据类别、媒体类型、来源范围或结构路径，使适用内容可以重现。
        en: Selector for data class, media type, source scope, or structural path evaluated by the rule so applicable content is reproducible.
        ja: 規則が判断する data class、media type、source scope、structural path を宣言し、適用内容を再現可能にします。
      allowed_values: []
      pattern: null
      example_value:
        sensitivity_class: credential
        media_types:
          - text/plain
          - application/json
      source_claims:
        - claim-disclosure-rule-005
    - id: disclosure_action
      labels:
        zh: 披露动作
        en: disclosure action
        ja: 開示 action
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 规则匹配时规定 allow、suppress、redact 或 progressive_disclosure 中唯一一种处置。
        en: "Exactly one handling action prescribed on match: allow, suppress, redact, or progressive_disclosure."
        ja: 規則一致時の処理を allow、suppress、redact、progressive_disclosure の一つに限定します。
      allowed_values: []
      pattern: null
      example_value: redact
      source_claims:
        - claim-disclosure-rule-006
    - id: condition_expression
      labels:
        zh: 附加条件表达式
        en: condition expression
        ja: 追加 condition 式
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 在选择器匹配后仍须满足的可评估条件；没有附加条件时为空而非填写自然语言占位。
        en: Evaluable predicate additionally required after selector match; absent when no extra condition applies rather than filled with natural-language placeholder text.
        ja: selector 一致後に追加で満たす評価可能 predicate で、追加条件なしなら自然言語 placeholder ではなく空にします。
      allowed_values: []
      pattern: null
      example_value: request.purpose == 'customer_support'
      source_claims:
        - claim-disclosure-rule-007
    - id: valid_from
      labels:
        zh: 规则有效起点
        en: rule valid from
        ja: 規則有効開始
      datatype: date-time
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 该规则在所属规范修订中开始适用的 UTC 时间，不得早于规范修订生效时间。
        en: UTC instant when the rule begins applying within its owning revision, no earlier than the specification revision's effective start.
        ja: 所有 revision 内で規則が適用開始する UTC 時刻で、仕様 revision 発効より前にできません。
      allowed_values: []
      pattern: null
      example_value: 2026-07-17T00:00:00Z
      source_claims:
        - claim-disclosure-rule-008
    - id: valid_until
      labels:
        zh: 规则有效终点
        en: rule valid until
        ja: 規則有効終了
      datatype: date-time
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: 该规则停止适用的 UTC 时间；仍在所属修订内有效时为空。
        en: UTC instant when the rule stops applying; absent while it remains active in the owning revision.
        ja: 規則が適用停止する UTC 時刻で、所有 revision 内で有効中は空です。
      allowed_values: []
      pattern: null
      example_value: null
      source_claims:
        - claim-disclosure-rule-009
  constraints:
    - id: disclosure-rule-has-one-action-and-valid-revision-boundary
      severity: error
      expression_language: plain
      expression: disclosure_action is one of allow, suppress, redact, progressive_disclosure; specification_revision_ref matches the owning specification; valid_until is null or valid_until >= valid_from
      explanations:
        zh: 规则必须绑定唯一规范修订、给出一个明确动作并保持有效期有序；自然语言说明不能替代这些字段。
        en: A rule binds one exact specification revision, prescribes one explicit action, and has an ordered validity interval; prose cannot substitute for these fields.
        ja: 規則は一つの正確な仕様 revision に結び、一つの明示 action と順序付けた有効期間を持ち、文章で代用できません。
      source_claims:
        - claim-disclosure-rule-010
  required_relation_constraints:
    - id: disclosure-rule-has-one-owning-specification-revision
      direction: incoming
      predicate: contains
      target_concept_id: DisclosureSpecification
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每条 DisclosureRule 必须且只能属于一个 DisclosureSpecification 修订。
        en: Every DisclosureRule belongs to exactly one DisclosureSpecification revision.
        ja: 各 DisclosureRule は一つだけの DisclosureSpecification revision に属します。
      source_claims:
        - claim-disclosure-rule-011
