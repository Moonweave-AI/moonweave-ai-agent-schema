external_mappings: []
applicability:
  - core
sibling_differentiation: []
parent_relation:
  id: DisclosureSpecification-contains-DisclosureRule
  predicate: part_of
  direction: target-to-source
  relation_kind: composition
  labels:
    zh: 披露规范包含规则
    en: disclosure specification contains rule
    ja: 開示仕様が規則を含む
  definitions:
    zh: 一份确定 ID 与版本的 DisclosureSpecification 通过 contains 拥有其 DisclosureRule；该事实固定规则的发布与修订边界，不表示某次活动已经采用或执行该规则。
    en: A DisclosureSpecification with an exact ID and revision contains its DisclosureRule. The fact fixes the rule's publication and revision boundary and does not assert that any activity has used or executed it.
    ja: 正確な ID・版を持つ DisclosureSpecification が DisclosureRule を contains します。この事実は規則の発行・revision 境界を固定し、活動が使用・実行したことは表しません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 规范可包含多条规则；每条规则恰有一个所属修订的基数由 DisclosureRule 的结构约束声明。
    en: A specification may contain many rules; DisclosureRule's structural constraint declares exactly one owning revision per rule.
    ja: 仕様は複数規則を含み得て、各規則が一つの所有 revision を持つ基数は DisclosureRule の構造制約で宣言します。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：被披露规范包含
      en: contained by disclosure specification
      ja: 逆方向：開示仕様に含まれる
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: DisclosureSpecification-contains-DisclosureRule-example-positive-001
      kind: positive
      labels:
        zh: 规范包含规则正例
        en: Positive specification containment
        ja: 仕様包含の正例
      scenario_id: null
      descriptions:
        zh: 发布清单声明 disclosure/customer-output@3.2.0 包含规则 dr-credential-external，规则记录中的 specification_revision_ref 与之完全一致。
        en: The publication manifest states that disclosure/customer-output@3.2.0 contains rule dr-credential-external, whose specification_revision_ref matches exactly.
        ja: 発行 manifest は disclosure/customer-output@3.2.0 が dr-credential-external を含み、規則の specification_revision_ref が完全一致すると示します。
      field_values: {}
      related_node_ids:
        - DisclosureSpecification
        - DisclosureRule
      related_relation_ids:
        - DisclosureSpecification-contains-DisclosureRule
      expected_result:
        zh: 建立该规范修订 contains 该披露规则的结构事实。
        en: Assert that the specification revision contains the disclosure rule.
        ja: 当該仕様 revision が開示規則を contains する構造事実を記録します。
      why_valid_or_invalid:
        zh: 发布清单与规则反向引用同时证明唯一所属修订。
        en: The publication manifest and the rule's back-reference jointly prove the unique owning revision.
        ja: 発行 manifest と規則の逆参照が唯一の所有 revision を共同で証明します。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-disclosure-rule-015
    - id: DisclosureSpecification-contains-DisclosureRule-example-boundary-001
      kind: boundary
      labels:
        zh: 规范包含规则边界例
        en: Boundary specification containment
        ja: 仕様包含の境界例
      scenario_id: null
      descriptions:
        zh: 某次 DisclosureFilter 运行加载了 dr-credential-external，但没有发布清单证明该规则属于另一修订 3.3.0；运行使用不能推出规范包含。
        en: A DisclosureFilter run loaded dr-credential-external, but no publication manifest places it in revision 3.3.0; runtime use cannot imply specification containment.
        ja: DisclosureFilter 実行が dr-credential-external を読み込んでも、3.3.0 所属を示す発行 manifest がなく、runtime use から仕様包含は推論できません。
      field_values: {}
      related_node_ids:
        - DisclosureSpecification
        - DisclosureRule
        - DisclosureFilter
      related_relation_ids:
        - DisclosureSpecification-contains-DisclosureRule
        - DisclosureFilter-governed_by-DisclosureRule
      expected_result:
        zh: 拒绝建立 3.3.0 contains 该规则的事实。
        en: Do not assert that revision 3.3.0 contains the rule.
        ja: 3.3.0 が当該規則を contains する事実を記録しません。
      why_valid_or_invalid:
        zh: 活动采用规则与规范拥有规则是不同事实，前者不能替代发布证据。
        en: Activity use and specification ownership are distinct facts; use cannot replace publication evidence.
        ja: 活動使用と仕様所有は別事実で、使用は発行証拠を代替できません。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-disclosure-rule-016
  source_claims:
