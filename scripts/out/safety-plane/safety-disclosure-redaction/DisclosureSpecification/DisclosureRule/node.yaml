      - claim-disclosure-rule-001

  - id: DisclosureRule-example-boundary-001
    kind: boundary
    labels:
      zh: 检测结果边界
      en: Detection-result boundary
      ja: 検出結果の境界
    scenario_id: null
    descriptions: {zh: "Microsoft Presidio Analyzer 检测 PII 片段；AnonymizerEngine 应用 replace/mask/redact 算子。", en: "Microsoft Presidio Analyzer detects PII spans; AnonymizerEngine applies replace/mask/redact operators (microsoft.github.io/presidio).", ja: "Microsoft Presidio Analyzer は PII span を検出し AnonymizerEngine が replace/mask/redact を適用する。"}
  - id: DisclosureRule-example-instance-001
    kind: instance
    labels:
      zh: 版本化披露策略
      en: Versioned disclosure policy
      ja: 版管理開示 policy
    scenario_id: null
    descriptions: {zh: "Microsoft Presidio Analyzer 检测 PII 片段；AnonymizerEngine 应用 replace/mask/redact 算子。", en: "Microsoft Presidio Analyzer detects PII spans; AnonymizerEngine applies replace/mask/redact operators (microsoft.github.io/presidio).", ja: "Microsoft Presidio Analyzer は PII span を検出し AnonymizerEngine が replace/mask/redact を適用する。"}
  - id: DisclosureRule-real-counterexample-2
    kind: counterexample
