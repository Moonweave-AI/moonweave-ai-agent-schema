sibling_differentiation: []
parent_relation:
  id: RedactionRule-is_a-DisclosureRule
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种披露规则
    en: is a kind of disclosure rule
    ja: 開示規則の一種
  definitions:
    zh: 每个 RedactionRule 都是 DisclosureRule，其种差是同时规定如何识别目标 SensitiveSpan、采用何种片段变换以及变换后是否允许其余内容披露；仅给出整项允许或拒绝的规则不是 RedactionRule。
    en: Every RedactionRule is a DisclosureRule, distinguished by specifying how target SensitiveSpan instances are detected, which span transformation is applied, and whether the remainder may be disclosed; a whole-item allow-or-deny rule alone is not a RedactionRule.
    ja: すべての RedactionRule は DisclosureRule であり、対象 SensitiveSpan の検出方法、span 変換方法、変換後の残部を公開できるかを同時に規定する点を種差とします。項目全体の許可・拒否だけを定める規則は RedactionRule ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：具有下位类
      en: has subtype
      ja: 逆方向：下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: RedactionRule-is_a-DisclosureRule-example-positive-001
      kind: positive
      labels:
        zh: 付款卡字段脱敏规则
        en: Payment-card redaction rule
        ja: 支払カード field 秘匿規則
      scenario_id: null
      descriptions:
        zh: rr_18 指定付款卡号检测器、保留末四位的掩码变换、外部响应适用边界与变换后允许释放的条件。
        en: rr_18 specifies a payment-card detector, a mask preserving the final four digits, the external-response boundary, and the condition for releasing the transformed remainder.
        ja: rr_18 は支払カード番号 detector、末尾四桁を残す mask 変換、外部応答境界、変換後の残部を公開する条件を規定します。
      field_values: {}
      related_node_ids:
        - RedactionRule
        - DisclosureRule
      related_relation_ids:
        - RedactionRule-is_a-DisclosureRule
      expected_result:
        zh: rr_18 分类为 RedactionRule，并继承 DisclosureRule 的适用与治理语义。
        en: Classify rr_18 as RedactionRule inheriting DisclosureRule applicability and governance semantics.
        ja: rr_18 を RedactionRule に分類し、DisclosureRule の適用・統治意味を継承させます。
      why_valid_or_invalid:
        zh: 它既治理披露决定，又给出目标检测与片段变换这两个种差。
        en: It governs disclosure and adds both target detection and span-transformation differentiae.
        ja: 開示を統治し、target 検出と span 変換の二つの種差を加えます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-redaction-rule-015
    - id: RedactionRule-is_a-DisclosureRule-example-boundary-001
      kind: boundary
      labels:
        zh: 整项禁止规则边界
        en: Whole-item deny-rule boundary
        ja: 項目全体 deny 規則の境界
      scenario_id: null
      descriptions:
        zh: dr_19 规定“未经授权不得向外部发送财务报告”，但没有敏感片段检测器，也没有局部变换方式。
        en: dr_19 states that an unauthorized financial report must not be sent externally, but defines neither a sensitive-span detector nor a local transformation.
        ja: dr_19 は「未認可の財務 report を外部送信しない」と定めますが、機微 span detector も局部変換も定義しません。
      field_values: {}
      related_node_ids:
        - RedactionRule
        - DisclosureRule
      related_relation_ids:
        - RedactionRule-is_a-DisclosureRule
      expected_result:
        zh: 把 dr_19 保留为 DisclosureRule，不分类为 RedactionRule。
        en: Keep dr_19 as DisclosureRule without classifying it as RedactionRule.
        ja: dr_19 を DisclosureRule に留め、RedactionRule には分類しません。
      why_valid_or_invalid:
        zh: 规则只有整项治理结果，缺少 RedactionRule 必需的检测与片段变换种差。
        en: The rule has a whole-item governance outcome but lacks RedactionRule's detection and span-transformation differentiae.
        ja: 規則は項目全体の統治結果だけを持ち、RedactionRule に必要な検出と span 変換の種差を欠きます。
      synthetic: true
      verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
      source_claims:
        - claim-redaction-rule-015
  source_claims:
    - claim-redaction-rule-015
  distinct_fact_rationale:
    zh: 这是 RedactionRule 的真实 genus 边和唯一分类父链。
    en: This is RedactionRule's genuine genus edge and sole taxonomy parent.
    ja: RedactionRule の実在 genus 辺で、唯一の分類親です。
  layout_role: primary-backbone
  review_status: accepted
  endpoint_order: child-to-parent
