schema: moonweave.ai/ontology-node/v1
id: RedactionRule
kind: concept
status: accepted
labels:
  zh: 脱敏规则
  en: redaction rule
  ja: 秘匿化規則
semantics:
  short_definition:
    zh: 规定如何识别并变换特定敏感片段的披露规则。
    en: A disclosure rule specifying how particular sensitive spans are detected and transformed.
    ja: 特定 SensitiveSpan の検出と変換方法を規定する開示規則。
  definition:
    zh: 脱敏规则是一种 DisclosureRule，其种差是为敏感类别定义匹配或分类条件、允许的遮蔽/删除/替换/概括方法、替换标记、上下文保留要求、失败时的抑制或升级动作及版本；它是规范，不是一次 Redaction 活动。
    en: RedactionRule is a DisclosureRule distinguished by defining match or classification conditions for sensitive categories, permitted masking, removal, replacement, or summarization methods, replacement markers, context-retention requirements, fallback suppression or escalation, and version; it is a specification, not one Redaction activity.
    ja: RedactionRule は DisclosureRule の一種で、機密カテゴリの match/classification 条件、許可される mask/remove/replace/summarize 方法、置換記号、文脈保持要件、失敗時 suppression/escalation、版を定義します。仕様であり一回の Redaction 活動ではありません。
  why_needed:
    zh: 专门规则让检测与变换可版本化测试，明确不同敏感类别应保留多少上下文以及无法安全变换时如何处置，避免每次运行临时拼接脱敏逻辑。
    en: A specialized rule makes detection and transformation versionable and testable, states how much context each category retains and what happens when safe transformation fails, and avoids ad hoc redaction logic in every run.
    ja: 専用規則により検出・変換を版管理・試験でき、カテゴリ別文脈保持量と安全変換失敗時の処理を明示し、実行ごとの即席 redaction を避けます。
  includes:
    - zh: 包含规范修订引用、规则标识、敏感性选择器、替换方法与模板、格式保留要求、原因代码和证据要求。
      en: Includes owning-specification revision reference, Rule ID, sensitivity selector, replacement method and template, format-preservation requirement, reason code, and evidence requirements.
      ja: 所属仕様 revision 参照、規則 ID、sensitivity selector、置換方法・template、形式保持要件、reason code、証拠要件を含みます。
  excludes:
    - zh: 通用 DisclosureRule、一次检测出的 SensitiveSpan、实际 Redaction 活动、替换后的文本与完全抑制结果。
      en: A general DisclosureRule, one detected SensitiveSpan, an actual Redaction activity, replaced text, and a full-suppression result.
      ja: 一般 DisclosureRule、一回検出された SensitiveSpan、実際の Redaction 活動、置換後 text、完全 suppression 結果。
  semantic_kind: specification
  aliases: []
structure:
  identity_keys:
    - specification_revision_ref
    - rule_id
  fields:
    - id: rule_id
      labels:
        zh: 脱敏规则标识
        en: redaction rule ID
        ja: 秘匿化規則 ID
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 在所属披露规范修订内稳定识别这条脱敏专用规则，并与实际 Redaction 活动标识分离。
        en: Stable identifier for this redaction-specific rule within its owning disclosure revision, distinct from identifiers of actual Redaction activities.
        ja: 所有開示 revision 内で当該 redaction 専用規則を安定識別し、実際の Redaction 活動 ID と分離します。
      allowed_values: []
      pattern: null
      example_value: rr-mask-credential-external
      source_claims:
        - claim-redaction-rule-002
    - id: specification_revision_ref
      labels:
        zh: 所属规范修订引用
        en: owning specification revision
        ja: 所有仕様 revision 参照
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 引用唯一包含该脱敏规则的 DisclosureSpecification ID 与版本，避免变换要求跨版本漂移。
        en: Reference to the unique DisclosureSpecification ID and version containing this redaction rule, preventing transformation requirements from drifting across versions.
        ja: 当該 redaction 規則を含む唯一の DisclosureSpecification ID・版を参照し、変換要件の版間 drift を防ぎます。
      allowed_values: []
      pattern: null
      example_value: disclosure/customer-output@3.2.0
      source_claims:
        - claim-redaction-rule-003
    - id: sensitivity_selector
      labels:
        zh: 敏感类别选择器
        en: sensitivity selector
        ja: 機微区分 selector
      datatype: object
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 声明需要执行脱敏的数据类别、证据阈值、媒体或结构范围，不能把所有外部内容一律视作敏感。
        en: Selector for data classes, evidence threshold, media, or structural scope requiring redaction; it must not classify all external content as sensitive.
        ja: redaction を要する data class、evidence threshold、media、structural scope を宣言し、全外部内容を一律 sensitive としません。
      allowed_values: []
      pattern: null
      example_value:
        sensitivity_class: credential
        minimum_confidence: 0.9
      source_claims:
        - claim-redaction-rule-004
    - id: replacement_method
      labels:
        zh: 替换方法
        en: replacement method
        ja: 置換方法
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指定 mask、remove、replace、tokenize 或 generalize 中唯一一种不可泄露原值的变换方法。
        en: "Exactly one non-disclosing transformation method: mask, remove, replace, tokenize, or generalize."
        ja: 原値を漏らさない mask、remove、replace、tokenize、generalize の一つを指定します。
      allowed_values: []
      pattern: null
      example_value: mask
      source_claims:
        - claim-redaction-rule-005
    - id: replacement_template
      labels:
        zh: 安全替换模板
        en: safe replacement template
        ja: 安全置換 template
      datatype: string
      required: false
      cardinality:
        min: 0
        max: 1
      definitions:
        zh: mask、replace 或 tokenize 时使用的不含原始秘密的模板；remove 方法可以为空。
        en: Non-secret template used by mask, replace, or tokenize; it may be absent for the remove method.
        ja: mask、replace、tokenize で使う原秘密を含まない template で、remove 方法では空にできます。
      allowed_values: []
      pattern: null
      example_value: "[REDACTED_CREDENTIAL]"
      source_claims:
        - claim-redaction-rule-006
    - id: preserve_format
      labels:
        zh: 是否保留格式
        en: preserve format
        ja: 形式保持
      datatype: boolean
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 指明安全替换是否必须保持字段形状或长度约束，但不得因此重构可推断原值的信息。
        en: Whether safe replacement must preserve field shape or length constraints without reconstructing information from which the original value can be inferred.
        ja: 安全置換が field shape・length 制約を保つ必要があるかを示しますが、原値推定可能な情報を再構成してはいけません。
      allowed_values: []
      pattern: null
      example_value: false
      source_claims:
        - claim-redaction-rule-007
    - id: reason_code
      labels:
        zh: 脱敏原因码
        en: redaction reason code
        ja: 秘匿化理由 code
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      definitions:
        zh: 记录触发该变换要求的稳定敏感类别或治理原因，不存放实际秘密值。
        en: Stable sensitivity or governance reason triggering the transformation requirement, without storing the secret value itself.
        ja: 変換要件を発動する安定 sensitivity・governance 理由を記録し、実秘密値は保存しません。
      allowed_values: []
      pattern: null
      example_value: credential-exposure
      source_claims:
        - claim-redaction-rule-008
    - id: evidence_requirements
      labels:
        zh: 证据要求
        en: evidence requirements
        ja: 証拠要件
      datatype: array[string]
      required: true
      cardinality:
        min: 1
        max: null
      definitions:
        zh: 列出执行前必须存在的定位、分类置信度与来源版本证据，使误脱敏和漏脱敏均可审计。
        en: Required locator, classification-confidence, and source-version evidence before execution, making both over-redaction and missed redaction auditable.
        ja: 実行前に必要な locator、classification confidence、source version 証拠を列挙し、過剰・未 redaction を監査可能にします。
      allowed_values: []
      pattern: null
      example_value:
        - sensitive_span_locator
        - classification_finding
        - source_version
      source_claims:
        - claim-redaction-rule-009
  constraints:
    - id: redaction-rule-method-and-template-are-consistent
      severity: error
      expression_language: plain
      expression: replacement_method is one of mask, remove, replace, tokenize, generalize; mask, replace, and tokenize require a non-secret replacement_template; remove permits no template; evidence_requirements is non-empty
      explanations:
        zh: 方法、模板和证据要求必须可执行且互相一致，模板不得包含或可逆编码原始秘密。
        en: Method, template, and evidence requirements must be executable and mutually consistent, and the template must not contain or reversibly encode the original secret.
        ja: method、template、evidence requirements は実行可能で整合し、template に原秘密または可逆符号を含めません。
      source_claims:
        - claim-redaction-rule-010
  required_relation_constraints:
    - id: redaction-rule-has-one-owning-specification-revision
      direction: incoming
      predicate: contains
      target_concept_id: DisclosureSpecification
      cardinality:
        min: 1
        max: 1
      explanations:
        zh: 每条 RedactionRule 继承 DisclosureRule 的唯一规范修订所有权。
        en: Every RedactionRule inherits DisclosureRule's exactly-one specification-revision ownership.
        ja: 各 RedactionRule は DisclosureRule の唯一仕様 revision 所有を継承します。
      source_claims:
        - claim-redaction-rule-011
