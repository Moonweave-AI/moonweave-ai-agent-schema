        kind: boundary
        labels:
          zh: 局部脱敏后释放
          en: Release after partial redaction
          ja: 部分秘匿後の公開
        scenario_id: null
        descriptions:
          zh: filter_run_45 只掩码邮箱本地部分并向客户释放订单状态与邮箱域名；它产生受控输出，但未整体扣留候选项。
          en: filter_run_45 masks only the email local part and releases the order status and email domain to the customer; it creates controlled output but does not withhold the whole candidate.
          ja: filter_run_45 は email local part のみを mask し、order status と email domain を顧客へ公開します。controlled output は生成しますが候補全体を保留しません。
        field_values: {}
        related_node_ids:
