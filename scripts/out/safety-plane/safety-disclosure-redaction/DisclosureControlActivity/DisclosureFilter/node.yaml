  - id: DisclosureFilter-governed_by-DisclosureRule
    predicate: governed_by
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 受披露规则治理
      en: governed by disclosure rule
      ja: 開示規則により統治
    definitions:
      zh: 披露过滤器受某条 DisclosureRule 治理，表示该规则及其版本实际决定了本次过滤所采用的适用条件、授权要求与释放、脱敏、抑制或升级动作；仅在规则库中存在但未被选择的规则不建立此边。
      en: A DisclosureFilter is governed by a DisclosureRule when that rule revision actually determines the run's applicability, authorization requirements, and release, redaction, suppression, or escalation action; a rule merely present in the catalog creates no edge.
      ja: DisclosureFilter が DisclosureRule により統治されるとは、その規則 revision が当該実行の適用条件、認可要件、公開、秘匿化、抑制、エスカレーション動作を実際に決めたことです。catalog に存在するだけの規則には辺を張りません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
