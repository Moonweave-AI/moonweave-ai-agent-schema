        zh: dr_71 规定哪些字段属于敏感信息，但它没有接收候选项、没有读取授权上下文，也没有产生运行时决定。
        en: dr_71 specifies which fields are sensitive but receives no candidate, reads no authorization context, and produces no runtime decision.
        ja: dr_71 は機微 field を規定しますが、候補を受け取らず、認可文脈を読まず、実行時判断も生成しません。
