schema: moonweave.ai/ontology-node/v1
id: DisclosureFilter
kind: concept
status: accepted
labels:
  en: disclosure filter
  zh: 披露过滤器
  ja: 開示フィルタ
semantics:
  short_definition:
    zh: 逐项判定候选信息应释放、变换、抑制或升级的披露控制活动。
    en: A disclosure-control activity deciding whether each candidate item is released, transformed, suppressed, or escalated.
    ja: 候補情報ごとに release、transform、suppress、escalate を判断する開示制御活動。
  definition:
    zh: 披露过滤器是一种 DisclosureControlActivity，其种差是对候选输出中的项目或片段应用 DisclosureRule，结合接收者与信任边界为每项选择通过、脱敏、完全抑制或人工升级；它是执行活动，不是规则规范或过滤后的输出。
    en: DisclosureFilter is a DisclosureControlActivity distinguished by applying DisclosureRule to items or spans in candidate output and choosing pass, redaction, full suppression, or human escalation for each under the recipient and trust boundary; it is an executing activity, not the rule or filtered output.
    ja: DisclosureFilter は DisclosureControlActivity の一種で、候補出力の item/span に DisclosureRule を適用し、受信者と信頼境界に応じて pass、redaction、full suppression、human escalation を項目ごとに選びます。規則や処理後出力ではなく実行活動です。
  why_needed:
    zh: 显式过滤活动能说明混合内容中哪些片段采取了不同动作，并使规则版本、接收者和审计结果可追溯，避免把整个输出粗暴归为安全或不安全。
    en: An explicit filter explains different actions for spans within mixed content and makes rule version, recipient, and audit outcome traceable, avoiding a coarse safe-or-unsafe classification of the whole output.
    ja: 明示的 filter は混合内容の各 span への異なる動作を説明し、規則版、受信者、監査結果を追跡可能にし、出力全体を単純に安全/危険へ分類しません。
  includes:
    - zh: 在发送、显示、写日志或注入下游上下文前，按规则和接收者逐项检查模型输出、工具结果或记录并产生处理动作的运行活动。
      en: Runtime activities that inspect model output, tool results, or records item by item before sending, display, logging, or downstream context insertion and emit handling actions under a rule and recipient.
      ja: 送信、表示、logging、下流文脈投入前に、規則と受信者に基づきモデル出力、ツール結果、記録を項目単位で検査し処理動作を出す実行活動。
  excludes:
    - zh: 只描述条件的 DisclosureRule、仅检测不作披露决定的分类器、Redaction 单一变换活动，以及最终 OutputWindow。
      en: A DisclosureRule that only specifies conditions, a classifier that detects without a disclosure decision, the single-transform Redaction activity, and the final OutputWindow.
      ja: 条件だけを記述する DisclosureRule、開示判断を行わない detector、単一変換 Redaction 活動、最終 OutputWindow。
  semantic_kind: activity
  aliases: []
