parent_relation:
  id: DisclosureFilter-is_a-DisclosureControlActivity
  predicate: is_a
  direction: target-to-source
  relation_kind: hierarchy
  labels:
    zh: 是一种披露控制活动
    en: is a kind of disclosure-control activity
    ja: 開示制御活動の一種
  definitions:
    zh: 每个 DisclosureFilter 都是 DisclosureControlActivity，其种差是在运行时对一个候选信息项评估规则与授权上下文，并选择释放、脱敏、整项抑制或升级；离线规则定义不是过滤活动。
    en: Every DisclosureFilter is a DisclosureControlActivity, distinguished by evaluating one candidate item against rules and authorization context at runtime and selecting release, redaction, whole-item suppression, or escalation; an offline rule definition is not a filtering activity.
    ja: すべての DisclosureFilter は DisclosureControlActivity であり、実行時に一つの候補情報を規則と認可文脈で評価し、公開、秘匿化、項目全体の抑制、エスカレーションを選ぶ点を種差とします。offline 規則定義は filtering 活動ではありません。
  cardinality: null
  cardinality_not_applicable_reason:
    zh: 分类继承不使用实例关系基数。
    en: Taxonomic inheritance does not use instance-relation cardinality.
    ja: 分類継承にはインスタンス関係の基数を用いません。
  inverse_reading:
    predicate: part_of
    labels:
      zh: 反向：具有下位类
      en: has subtype
      ja: 逆方向：下位型を持つ
  conditions: []
  temporal_scope: timeless
  boundary_context: null
  constraints: []
  examples:
    - id: DisclosureFilter-is_a-DisclosureControlActivity-example-positive-001
      kind: positive
      labels:
        zh: 候选输出运行时评估
        en: Runtime candidate evaluation
        ja: 候補出力の実行時評価
      scenario_id: null
      descriptions:
        zh: df_71 在响应发送前评估 out_71、调用主体权限与规则 revision，并选择 redact 后释放。
        en: Before response delivery, df_71 evaluates out_71, caller authorization, and a rule revision, then selects redact-and-release.
        ja: 応答送信前に df_71 は out_71、caller 認可、規則 revision を評価し、redact 後の公開を選択します。
      field_values: {}
      related_node_ids:
        - DisclosureFilter
        - DisclosureControlActivity
      related_relation_ids:
        - DisclosureFilter-is_a-DisclosureControlActivity
      expected_result:
        zh: df_71 同时分类为 DisclosureFilter 与 DisclosureControlActivity。
        en: Classify df_71 as both DisclosureFilter and DisclosureControlActivity.
        ja: df_71 を DisclosureFilter と DisclosureControlActivity の双方に分類します。
      why_valid_or_invalid:
        zh: 它执行披露边界上的运行时控制，并具有逐候选决策种差。
        en: It performs runtime control at a disclosure boundary with item-wise decision differentia.
        ja: 開示境界で実行時制御を行い、候補単位判断という種差を持ちます。
      synthetic: true
