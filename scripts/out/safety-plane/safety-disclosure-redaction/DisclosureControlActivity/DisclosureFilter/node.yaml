relations:
  - id: DisclosureFilter-may_produce-SuppressedContext
    predicate: may_produce
    direction: source-to-target
    relation_kind: causal
    labels:
      zh: 可能产生扣留上下文
      en: may produce suppressed context
      ja: 抑制コンテキストを生成し得る
    definitions:
      zh: 当 DisclosureFilter 判定整个候选信息不得跨越当前受众或信任边界时，它可能产生由 info-output-disclosure 拥有的 SuppressedContext；局部脱敏后仍释放剩余内容时不建立此边。
      en: A DisclosureFilter may produce the SuppressedContext owned by info-output-disclosure when it decides that an entire candidate must not cross the current audience or trust boundary; redact-and-release decisions do not assert this edge.
      ja: DisclosureFilter が候補全体を現在の audience または trust boundary の外へ出してはならないと判断した場合、info-output-disclosure 所有の SuppressedContext を生成し得ます。部分秘匿後に残部を公開する判断ではこの edge を成立させません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 过滤器运行可释放、脱敏、升级或扣留，且一次批量运行可形成多个按候选与受众区分的结果，因此本体不施加统一基数。
      en: A filter run may release, redact, escalate, or withhold, and one batch run may create several results distinguished by candidate and audience, so the ontology imposes no universal cardinality.
      ja: filter run は release・redact・escalate・withhold のいずれも取り得て、一回の batch run が candidate と audience 別に複数結果を生成できるため、ontology は一律 cardinality を課しません。
    inverse_reading:
      predicate: may_be_produced_by
      labels:
        zh: 可能由披露过滤器产生
        en: may be produced by disclosure filter
        ja: 開示フィルタにより生成され得る
    conditions: []
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples:
      - id: DisclosureFilter-may_produce-SuppressedContext-example-positive-001
        kind: positive
        labels:
          zh: 凭据附件整体扣留
          en: Whole credential attachment withheld
          ja: 資格情報添付全体の保留
        scenario_id: null
        descriptions:
          zh: filter_run_44 依据 disclosure-policy@8 判定 attachment_4 的全部内容不得向 external-user 披露，并创建 suppressed_context_44，记录候选范围、受众、规则、原因与时间。
          en: filter_run_44 applies disclosure-policy@8, decides that no part of attachment_4 may be disclosed to external-user, and creates suppressed_context_44 with candidate extent, audience, rule, reason, and time.
          ja: filter_run_44 は disclosure-policy@8 を適用し、attachment_4 の全内容を external-user へ開示不可と判断して、candidate extent・audience・rule・reason・time を持つ suppressed_context_44 を生成します。
        field_values: {}
        related_node_ids:
          - DisclosureFilter
          - SuppressedContext
        related_relation_ids:
          - DisclosureFilter-may_produce-SuppressedContext
        expected_result:
          zh: 建立 filter_run_44 到 suppressed_context_44 的因果边，并仅创建由 info-output-disclosure 定义的 SuppressedContext 实例。
          en: Assert the causal edge from filter_run_44 to suppressed_context_44 and instantiate only the SuppressedContext defined by info-output-disclosure.
          ja: filter_run_44 から suppressed_context_44 への causal edge を成立させ、info-output-disclosure が定義する SuppressedContext だけを instance 化します。
        why_valid_or_invalid:
          zh: 存在明确过滤执行、完整候选扣留决定和身份完备的 canonical 结果记录。
          en: There is an identified filter execution, a whole-candidate withholding decision, and an identity-complete canonical result record.
          ja: 特定 filter execution、候補全体の withholding decision、identity が完備した canonical result record が存在します。
