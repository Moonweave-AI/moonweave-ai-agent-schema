          - DisclosureFilter-may_produce-SuppressedContext
        expected_result:
          zh: 不建立 may_produce SuppressedContext 边，按 Redaction 与受控输出记录该运行。
          en: Assert no may_produce SuppressedContext edge and record the run through Redaction and controlled output.
          ja: may_produce SuppressedContext edge を成立させず、Redaction と controlled output で run を記録します。
        why_valid_or_invalid:
          zh: 此关系要求完整候选扣留，局部变换并释放其余内容不满足结果边界。
          en: This relation requires whole-candidate withholding; local transformation followed by release of the remainder fails that boundary.
          ja: この relation は候補全体の withholding を要求し、局所変換後に残部を公開する場合は境界を満たしません。
        synthetic: true
        verified_version: https://moonweave.ai/ontology/agent-system/2.0.0/
        source_claims:
          - claim-disclosure-filter-007
    source_claims:
      - claim-disclosure-filter-008
    distinct_fact_rationale:
      zh: suppresses 边标识被阻止的候选信息，而本边标识该过滤决定形成的 canonical 处置结果；对象与结果是两个可独立查询的事实。
      en: The suppresses edge identifies the candidate prevented from crossing the boundary, while this edge identifies the canonical disposition result created by that decision; object and result are independently queryable facts.
      ja: suppresses edge は境界通過を阻止された candidate を特定し、この edge は判断から生成された canonical disposition result を特定するため、object と result は独立して照会可能な fact です。
    layout_role: cross-link
    review_status: accepted
    target: concept:SuppressedContext
  - id: DisclosureFilter-suppresses-OutputInformation
    predicate: suppresses
    direction: source-to-target
    relation_kind: governance
    labels:
      zh: 抑制输出信息
      en: suppresses output information
      ja: 出力情報を抑制
    definitions:
      zh: 披露过滤器抑制某个 OutputInformation，表示整个候选信息被阻止跨越当前披露边界；若仅变换其中的敏感片段并释放其余内容，应建模为 Redaction 而非此边。
      en: A DisclosureFilter suppresses an OutputInformation candidate when it prevents the entire item from crossing the current disclosure boundary; transforming selected sensitive spans while releasing the remainder is Redaction, not this edge.
      ja: DisclosureFilter が OutputInformation を抑制するとは、候補項目全体を現在の開示境界の外へ出さないことです。機微 span のみを変換して残りを公開する場合は Redaction であり、この辺ではありません。
    cardinality: null
    cardinality_not_applicable_reason:
      zh: 该本体关系记录可查询的语义事实，但不对所有运行实例施加统一基数。
      en: This ontology relation records a queryable semantic fact without imposing one universal cardinality on all runtime instances.
      ja: この本体関係は検索可能な意味事実を記録しますが、すべての実行インスタンスに一律の基数を課しません。
    inverse_reading:
      predicate: suppressed_by
      labels:
        zh: 反向：被披露过滤器抑制
        en: suppressed by disclosure filter
        ja: 逆方向：開示フィルタにより抑制
