schema: moonweave.ai/ontology-node/v1
id: StagedDisclosure
kind: concept
status: accepted
labels:
  zh: 分阶段披露
  en: Staged Disclosure
  ja: 段階的開示
semantics:
  short_definition:
    zh: 在披露规则下按可审计阶段产生不同受控消息的运行时控制活动。
    en: A runtime control activity that produces distinct controlled messages in auditable stages under a disclosure rule.
    ja: 開示ルールの下で監査可能な段階ごとに異なる制御済みメッセージを生成する実行時制御活動。
  definition:
    zh: >-
      StagedDisclosure 是 DisclosureControlActivity 的真实子类，保留父类的 control_activity_id、输入和可选输出消息、规范、已应用规则、结果与证据契约，并增加 release_stage、接收方情境、前序消息和一个明确的 DisclosureRule。它把候选 Message 的最小允许内容作为不同的输出 Message 产生；较后阶段可引用先前的受控消息以形成可审计序列。它不是静态披露规则、访问授权、同意记录、分页或滚动窗口，也不是仅重新分段同一消息正文的 UI 行为。术语 StagedDisclosure 是 Moonweave 的本地名称，用来避免把该运行时消息处理活动与“progressive disclosure”这一 UI 控件模式混同。
    en: >-
      StagedDisclosure is a true subtype of DisclosureControlActivity: it retains the parent's control_activity_id, input and optional output message, specification, applied-rule, outcome, and evidence contract, then adds release_stage, recipient context, prior message, and one explicit DisclosureRule. It produces the minimum permitted content from a candidate Message as a distinct output Message; a later stage can reference a prior controlled Message to form an auditable sequence. It is not a progressive-disclosure UI pattern, a static disclosure rule, access authorization, consent record, pagination, or a scrolling window that merely resegments one message body. StagedDisclosure is Moonweave local terminology chosen to avoid conflating this runtime message-handling activity with the UI pattern named “progressive disclosure.”
    ja: >-
      StagedDisclosure は DisclosureControlActivity の真の下位型です。親の control_activity_id、入力および任意の出力メッセージ、仕様、適用ルール、結果、証拠という契約を保持し、release_stage、受信者コンテキスト、前段メッセージ、一つの明示的な DisclosureRule を追加します。候補 Message から許可された最小内容を異なる出力 Message として生成し、後段は前の制御済み Message を参照して監査可能な系列を形成できます。これは静的な開示ルール、アクセス認可、同意記録、ページネーション、スクロールウィンドウ、または一つの本文を再分割するだけの progressive-disclosure UI パターンではありません。StagedDisclosure は、この実行時メッセージ処理活動を UI パターンと混同しないための Moonweave 固有の用語です。
  why_needed:
    zh: >-
      某些接收方情境必须先披露最小可用内容，随后才在确定规则下披露更多内容。每一阶段需要保留独立的活动和消息产物事实，而不是把 UI 视图变化或授权状态误作新的披露。
    en: >-
      Some recipient contexts must receive a minimum useful disclosure before more content can be released under determinate rules. Each stage needs independent activity and message-product facts rather than treating a UI view change or authorization state as a new disclosure.
    ja: >-
      一部の受信者コンテキストでは、決定可能なルールの下で追加内容を開示する前に最小限の有用な内容を開示する必要があります。各段階には、UI 表示の変更や認可状態を新しい開示と誤認しない独立した活動およびメッセージ生成の事実が必要です。
  includes:
    - zh: 保留父类控制活动契约并记录阶段号、接收方情境、前序消息和本阶段规则的受控消息处理。
      en: Controlled-message handling that retains the parent control-activity contract and records stage number, recipient context, prior message, and the rule for that stage.
      ja: 親の制御活動契約を保持し、段階番号、受信者コンテキスト、前段メッセージ、その段階のルールを記録する制御済みメッセージ処理。
  excludes:
    - zh: 只切分不变正文的 OutputWindow、分页状态、静态 DisclosureRule、同意记录或资源权限。
      en: An OutputWindow or pagination state that slices an unchanged body, a static DisclosureRule, a consent record, or a resource permission.
      ja: 変更されない本文を切り出す OutputWindow またはページネーション状態、静的 DisclosureRule、同意記録、リソース権限。
  semantic_kind: activity
  aliases:
    - staged-disclosure-activity
engineering:
  explanation:
    zh: >-
      每一阶段都对相同或版本化的 DisclosureSpecification、DisclosureRule 和接收方情境进行评估，保留父类的活动标识和证据链，并产生不同输出 Message 或明确阻止。后续阶段引用前一受控 Message；实现不得以 UI 页码或同一正文窗口代替真实处理产物。
    en: >-
      Each stage evaluates the same or versioned DisclosureSpecification, DisclosureRule, and recipient context, retains the inherited activity identity and evidence trail, and either produces a distinct output Message or records an explicit block. Later stages reference the prior controlled Message; implementations must not substitute a UI page number or a window over the same body for a real processing product.
    ja: >-
      各段階は同じまたは版管理された DisclosureSpecification、DisclosureRule、受信者コンテキストを評価し、継承した活動識別子と証拠経路を保持して、異なる出力 Message を生成するか明示的なブロックを記録します。後段は前の制御済み Message を参照し、実装は UI のページ番号や同一本文上のウィンドウを実際の処理生成物の代わりにしてはなりません。
  typical_input:
    - description:
        zh: 候选事件消息、接收方情境、阶段号、规范和披露规则。
        en: A candidate incident message, recipient context, stage number, specification, and disclosure rule.
        ja: 候補インシデントメッセージ、受信者コンテキスト、段階番号、仕様、開示ルール。
      format: '{"control_activity_id":"staged-disclosure-61","input_message_ref":"Message:incident-61","specification_ref":"DisclosureSpecification:incident-v1","applied_rule_refs":["DisclosureRule:external-staged-release-v1"],"disclosure_rule_ref":"DisclosureRule:external-staged-release-v1","recipient_context_ref":"RecipientContext:external-reviewer","release_stage":1}'
      source_claims:
        - claim-staged-local-design
  typical_output:
    - description:
        zh: 带有阶段和证据引用的不同受控消息，或无输出消息的明确阻止记录。
        en: A distinct controlled message with stage and evidence references, or an explicit block record with no output message.
        ja: 段階と証拠参照を持つ異なる制御済みメッセージ、または出力メッセージを持たない明示的なブロック記録。
      format: '{"control_activity_id":"staged-disclosure-61","output_message_ref":"Message:incident-61-stage-1","release_stage":1,"control_outcome":"produced","evidence_refs":["Evidence:staged-61"]}'
      source_claims:
        - claim-staged-openai-guardrails
  reference_implementations:
    - name: OpenAI Agents SDK guardrails
      url: https://openai.github.io/openai-agents-python/guardrails/
      description: Documents final-output guardrail boundaries and blocking tripwires.
structure:
  identity_keys:
    - control_activity_id
  fields:
    - id: control_activity_id
      labels:
        zh: 控制活动标识
        en: Control activity identifier
        ja: 制御活動識別子
      definitions:
        zh: 继承自 DisclosureControlActivity 的稳定标识，用于定位一次阶段化披露处理。
        en: The stable identifier inherited from DisclosureControlActivity for one staged-disclosure handling run.
        ja: 一つの段階的開示処理実行を識別する、DisclosureControlActivity から継承した安定識別子。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: '^[a-z0-9-]+$'
      example_value: staged-disclosure-61
      allowed_values: []
      source_claims:
        - claim-staged-local-design
    - id: input_message_ref
      labels:
        zh: 输入消息引用
        en: Input message reference
        ja: 入力メッセージ参照
      definitions:
        zh: 本阶段评估的候选 Message；继承自父控制活动。
        en: The candidate Message evaluated at this stage, inherited from the parent control activity.
        ja: この段階で評価する候補 Message。親の制御活動から継承されます。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: Message:incident-61
      allowed_values: []
      source_claims:
        - claim-staged-local-design
    - id: output_message_ref
      labels:
        zh: 输出消息引用
        en: Output message reference
        ja: 出力メッセージ参照
      definitions:
        zh: 本阶段产生的不同受控 Message；阶段被阻止时为空，继承自父控制活动。
        en: The distinct controlled Message produced at this stage; absent when blocked and inherited from the parent control activity.
        ja: この段階で生成された異なる制御済み Message。ブロック時は存在せず、親の制御活動から継承されます。
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: Message:incident-61-stage-1
      allowed_values: []
      source_claims:
        - claim-staged-local-design
    - id: specification_ref
      labels:
        zh: 披露规范引用
        en: Disclosure specification reference
        ja: 開示仕様参照
      definitions:
        zh: 适用于本次处理的 DisclosureSpecification；继承自父控制活动。
        en: The DisclosureSpecification applicable to this handling run, inherited from the parent control activity.
        ja: この処理実行に適用される DisclosureSpecification。親の制御活動から継承されます。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: DisclosureSpecification:incident-v1
      allowed_values: []
      source_claims:
        - claim-staged-local-design
    - id: applied_rule_refs
      labels:
        zh: 已应用规则引用
        en: Applied rule references
        ja: 適用ルール参照
      definitions:
        zh: 本次控制评估使用的规则集合；其中必须包含 disclosure_rule_ref，继承自父控制活动。
        en: The rules used by this control evaluation; it must include disclosure_rule_ref and is inherited from the parent control activity.
        ja: この制御評価で使用したルール集合。disclosure_rule_ref を含まなければならず、親の制御活動から継承されます。
      datatype: reference-array
      required: true
      cardinality:
        min: 1
        max: null
      pattern: null
      example_value:
        - DisclosureRule:external-staged-release-v1
      allowed_values: []
      source_claims:
        - claim-staged-local-design
    - id: control_outcome
      labels:
        zh: 控制结果
        en: Control outcome
        ja: 制御結果
      definitions:
        zh: 继承自父控制活动，说明本阶段是产生不同消息还是被阻止。
        en: The outcome inherited from the parent control activity, stating whether this stage produced a distinct message or was blocked.
        ja: 親の制御活動から継承した結果であり、この段階が異なるメッセージを生成したかブロックされたかを示します。
      datatype: string
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: produced
      allowed_values:
        - produced
        - blocked
      source_claims:
        - claim-staged-openai-guardrails
    - id: evidence_refs
      labels:
        zh: 证据引用
        en: Evidence references
        ja: 証拠参照
      definitions:
        zh: 支持规范、规则匹配、接收方情境、阶段和结果的证据集合；继承自父控制活动。
        en: Evidence supporting the specification, rule match, recipient context, stage, and outcome, inherited from the parent control activity.
        ja: 仕様、ルール一致、受信者コンテキスト、段階、結果を支える証拠集合。親の制御活動から継承されます。
      datatype: reference-array
      required: true
      cardinality:
        min: 1
        max: null
      pattern: null
      example_value:
        - Evidence:staged-61
      allowed_values: []
      source_claims:
        - claim-staged-local-design
    - id: disclosure_rule_ref
      labels:
        zh: 披露规则引用
        en: Disclosure rule reference
        ja: 開示ルール参照
      definitions:
        zh: 指导本阶段内容选择的明确且版本化的 DisclosureRule。
        en: The explicit versioned DisclosureRule that guides content selection for this stage.
        ja: この段階の内容選択を導く明示的かつ版管理された DisclosureRule。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: DisclosureRule:external-staged-release-v1
      allowed_values: []
      source_claims:
        - claim-staged-local-design
    - id: release_stage
      labels:
        zh: 披露阶段
        en: Release stage
        ja: 開示段階
      definitions:
        zh: 受控披露序列中的正整数阶段号，而非 UI 页码。
        en: The positive integer stage in a controlled disclosure sequence, not a UI page number.
        ja: 制御された開示系列における正の整数段階番号であり、UI のページ番号ではありません。
      datatype: integer
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: 1
      allowed_values: []
      source_claims:
        - claim-staged-local-design
    - id: recipient_context_ref
      labels:
        zh: 接收方情境引用
        en: Recipient-context reference
        ja: 受信者コンテキスト参照
      definitions:
        zh: 用于评估本阶段规则的接收方或交付情境；不授予资源权限。
        en: The recipient or delivery context used to evaluate this stage's rule; it grants no resource permission.
        ja: この段階のルール評価に使用する受信者または配信コンテキストであり、リソース権限は付与しません。
      datatype: reference
      required: true
      cardinality:
        min: 1
        max: 1
      pattern: null
      example_value: RecipientContext:external-reviewer
      allowed_values: []
      source_claims:
        - claim-staged-local-design
    - id: prior_message_ref
      labels:
        zh: 前序消息引用
        en: Prior message reference
        ja: 前段メッセージ参照
      definitions:
        zh: 前一阶段产生的受控 Message；第一阶段为空。
        en: The controlled Message produced by the preceding stage; absent for the first stage.
        ja: 前段で生成された制御済み Message。第一段階では存在しません。
      datatype: reference
      required: false
      cardinality:
        min: 0
        max: 1
      pattern: null
      example_value: Message:incident-61-stage-1
      allowed_values: []
      source_claims:
        - claim-staged-local-design
  constraints:
    - id: staged-disclosure-inherits-control-contract
      severity: error
      expression_language: plain
      expression: A StagedDisclosure must carry the inherited control_activity_id, input_message_ref, specification_ref, applied_rule_refs, control_outcome, and evidence_refs; disclosure_rule_ref must appear in applied_rule_refs.
      explanation:
        zh: 该真子类保留 DisclosureControlActivity 的身份和必填字段契约，并额外明确本阶段规则。
        en: This true subtype retains DisclosureControlActivity's identity and required-field contract while making the stage rule explicit.
        ja: この真の下位型は DisclosureControlActivity の識別子と必須フィールド契約を保持し、段階ルールを明示します。
      source_claims:
        - claim-staged-local-design
    - id: staged-disclosure-preserves-stage-sequence
      severity: error
      expression_language: plain
      expression: For release_stage greater than 1, prior_message_ref must identify the controlled Message from the preceding stage; release_stage 1 must not require a prior message.
      explanation:
        zh: 后续阶段必须可审计地连接到前一受控消息，第一阶段不得虚构前序。
        en: Later stages must be auditably linked to the prior controlled message, while the first stage must not invent a predecessor.
        ja: 後段は前の制御済みメッセージに監査可能に接続され、第一段階は前任者を捏造してはなりません。
      source_claims:
        - claim-staged-local-design
    - id: staged-disclosure-produces-distinct-message
      severity: error
      expression_language: plain
      expression: When control_outcome is produced, output_message_ref must be present and differ from input_message_ref; when blocked, output_message_ref must be absent and a UI window over the input must not be recorded as a product.
      explanation:
        zh: 阶段产物必须是不同消息；被阻止阶段不产生消息，UI 视图也不是产物。
        en: A stage product must be a distinct message; a blocked stage produces none, and a UI view is not a product.
        ja: 段階の生成物は異なるメッセージでなければなりません。ブロックされた段階は生成せず、UI 表示は生成物ではありません。
      source_claims:
        - claim-staged-local-design
  required_relations: []
examples:  
- id: staged-disclosure-positive-initial-release
    kind: positive
    labels:
      zh: 产生第一阶段受控消息
      en: Produce first-stage controlled message
      ja: 第一段階の制御済みメッセージを生成する
    descriptions: {zh: "Microsoft Presidio Analyzer 检测 PII 片段；AnonymizerEngine 应用 replace/mask/redact 算子。", en: "Microsoft Presidio Analyzer detects PII spans; AnonymizerEngine applies replace/mask/redact operators (microsoft.github.io/presidio).", ja: "Microsoft Presidio Analyzer は PII span を検出し AnonymizerEngine が replace/mask/redact を適用する。"}
    field_values:
      control_activity_id: staged-disclosure-61
      control_outcome: produced
      disclosure_rule_ref: "DisclosureRule:external-staged-release-v1"
      input_message_ref: "Message:incident-61"
      output_message_ref: "Message:incident-61-stage-1"
      prior_message_ref: "Message:incident-61-stage-1"
      recipient_context_ref: "RecipientContext:external-reviewer"
      release_stage: 1
      specification_ref: "DisclosureSpecification:incident-v1"
    related_node_ids: []
    related_relation_ids: []
    expected_result: {zh: "璁板綍涓庣湡瀹炴潵婧愪竴鑷寸殑鍙楁帶缁撴灉銆?, en: "Record a controlled outcome aligned with the cited source.", ja: "寮曠敤銈姐兗銈广仺涓€鑷淬仚銈嬪埗寰＄祼鏋溿倰瑷橀尣銇欍倠銆?}
    why_valid_or_invalid: {zh: "Presidio 脱敏是披露控制，不是访问原始数据的授权。", en: "Presidio redaction is disclosure control, not authorization to access raw data.", ja: "Presidio redaction は disclosure control であり raw data へのアクセス認可ではない。"}
    synthetic: false
    source_claims:
      - claim-staged-nist-privacy
  - id: staged-disclosure-counter-ui-page
    kind: counterexample
    labels:
      zh: 将 UI 页码当作披露阶段
      en: Treat a UI page as a disclosure stage
      ja: UI ページを開示段階として扱う
