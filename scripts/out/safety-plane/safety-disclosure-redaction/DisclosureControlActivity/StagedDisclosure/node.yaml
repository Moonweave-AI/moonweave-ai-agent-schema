parent_relation:
  id: StagedDisclosure-is_a-DisclosureControlActivity
  predicate: is_a
  target: concept:DisclosureControlActivity
  endpoint_order: child-to-parent
  direction: source-to-target
  relation_kind: hierarchy
  labels:
    zh: 是一种披露控制活动
    en: is a disclosure control activity
    ja: 開示制御活動である
  definitions:
    zh: StagedDisclosure 保留 DisclosureControlActivity 的身份和字段契约，并以阶段顺序特化其消息处理。
    en: StagedDisclosure retains DisclosureControlActivity's identity and field contract and specializes its message handling with stage ordering.
    ja: StagedDisclosure は DisclosureControlActivity の識別子とフィールド契約を保持し、段階順序でメッセージ処理を特化します。
  cardinality:
    source:
      min: 0
      max: null
    target:
      min: 1
      max: 1
  inverse_reading:
    predicate: has_specialized_activity
    labels:
      zh: 具有专门活动
      en: has specialized activity
      ja: 特化活動を持つ
  conditions:
    - id: staged-disclosure-parent-control-contract
      severity: error
      expression_language: plain
      expression: A StagedDisclosure must retain DisclosureControlActivity's control_activity_id and all required parent fields; it adds stage ordering without replacing the parent identity.
      explanation:
        zh: 选择真子类建模；阶段信息扩展父契约而不替换父身份或必填字段。
        en: "This is a true-subtype choice: stage data extends rather than replaces the parent identity and required fields."
        ja: これは真の下位型という選択です。段階データは親の識別子と必須フィールドを置き換えずに拡張します。
      source_claims:
        - claim-staged-local-design
  temporal_scope: valid-time
  boundary_context: This hierarchy is Moonweave-local and does not identify a subtype in a UI framework, NIST, OWASP, or the OpenAI Agents SDK.
  constraints: []
  examples: []
  source_claims:
    - claim-staged-local-design
  distinct_fact_rationale:
    zh: 层级只表达活动专业化；每个阶段的规则使用和消息产物由独立关联表达。
    en: The hierarchy expresses activity specialization only; each stage's rule use and message product are separate associations.
    ja: この階層は活動の特化だけを表し、各段階のルール使用とメッセージ生成物は別の関連で表します。
relations:
  - id: StagedDisclosure-uses-DisclosureRule
    predicate: uses
    target: concept:DisclosureRule
    direction: source-to-target
    relation_kind: association
    labels:
      zh: 使用披露规则
      en: uses disclosure rule
      ja: 開示ルールを使用する
    definitions:
      zh: StagedDisclosure 使用 DisclosureRule 选择本阶段允许产生的内容。
      en: StagedDisclosure uses a DisclosureRule to select content permitted for the stage.
      ja: StagedDisclosure はその段階で生成を許可された内容を選択するために DisclosureRule を使用します。
    cardinality:
      source:
        min: 1
        max: 1
      target:
        min: 0
        max: null
    inverse_reading:
      predicate: is_applied_by_staged_disclosure
      labels:
        zh: 被分阶段披露应用
        en: is applied by staged disclosure
        ja: 段階的開示に適用される
    conditions:
      - id: staged-disclosure-rule-matches-stage-context
        severity: error
        expression_language: plain
        expression: The DisclosureRule used by a StagedDisclosure must be evaluated for that activity's recipient_context_ref and release_stage before a message is produced.
        explanation:
          zh: 阶段产物必须有与接收方情境和阶段相连的规则依据。
          en: A stage product must have a rule basis tied to its recipient context and stage.
          ja: 段階の生成物には、受信者コンテキストと段階に結び付いたルール根拠が必要です。
        source_claims:
          - claim-staged-local-design
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims:
      - claim-staged-local-design
    distinct_fact_rationale:
      zh: 此关联连接运行时阶段与静态规则，不把规则或授权当作阶段产物。
      en: This association connects a runtime stage to static configuration without treating a rule or authorization as the stage product.
      ja: この関連は実行時段階を静的設定に接続し、ルールまたは認可を段階生成物として扱いません。
    layout_role: cross-link
  - id: StagedDisclosure-produces-Message
    predicate: produces
    target: concept:Message
    direction: source-to-target
    relation_kind: association
    labels:
      zh: 产生阶段消息
      en: produces stage message
      ja: 段階メッセージを生成する
    definitions:
      zh: 成功的 StagedDisclosure 在一个阶段产生不同的受控 Message。
      en: A successful StagedDisclosure produces a distinct controlled Message for one stage.
      ja: 成功した StagedDisclosure は一つの段階に対して異なる制御済み Message を生成します。
    cardinality:
      source:
        min: 0
        max: 1
      target:
        min: 0
        max: null
    inverse_reading:
      predicate: is_produced_by_staged_disclosure
      labels:
        zh: 由分阶段披露产生
        en: is produced by staged disclosure
        ja: 段階的開示により生成される
    conditions:
      - id: staged-disclosure-produces-only-success
        severity: error
        expression_language: plain
        expression: The produces relation exists only when control_outcome is produced and targets output_message_ref distinct from input_message_ref for the recorded release_stage.
        explanation:
          zh: 被阻止阶段不产生消息；成功阶段产生指定的不同消息。
          en: A blocked stage produces no message, while a successful stage produces its specified distinct message.
          ja: ブロックされた段階はメッセージを生成せず、成功した段階は指定された異なるメッセージを生成します。
        source_claims:
          - claim-staged-local-design
    temporal_scope: valid-time
    boundary_context: null
    constraints: []
    examples: []
    source_claims:
      - claim-staged-local-design
    distinct_fact_rationale:
      zh: 此关联记录真实阶段产物，不把 UI 窗口或同一正文片段误作消息产物。
      en: This association records a real stage product, not a UI window or fragment of the same body misrepresented as a message product.
      ja: この関連は実際の段階生成物を記録し、UI ウィンドウまたは同じ本文の断片をメッセージ生成物として誤表現しません。
    layout_role: cross-link
sources:
  - id: nist-privacy-framework
    title: NIST Privacy Framework
    url: https://www.nist.gov/privacy-framework
    source_type: official-guidance
    relevance: Describes a voluntary framework for identifying and managing privacy risk through enterprise risk management.
  - id: owasp-improper-output-handling
    title: OWASP LLM05 Improper Output Handling
    url: https://genai.owasp.org/llmrisk/llm052025-improper-output-handling/
    source_type: security-guidance
    relevance: Recommends validation, sanitization, and context-aware handling before downstream consumption.
  - id: openai-agents-guardrails
    title: OpenAI Agents SDK guardrails
    url: https://openai.github.io/openai-agents-python/guardrails/
    source_type: official-documentation
    relevance: Documents final-output guardrail boundaries and blocking tripwires.
  - id: microsoft-progressive-disclosure-controls
    title: Microsoft Progressive Disclosure Controls
    url: https://learn.microsoft.com/en-us/windows/win32/uxguide/ctrl-progressive-disclosure-controls
    source_type: official-documentation
    relevance: Defines progressive disclosure as a UI control for showing or hiding additional information on demand.
source_claims:
  - id: claim-staged-nist-privacy
    source: nist-privacy-framework
    supports: Modeling an auditable sequence of minimum permitted message releases is a Moonweave local design inference informed by privacy-risk management; it is not a NIST-defined staged-disclosure schema.
    locator: Privacy Framework overview
    evidence_kind: design-inference
    confidence: high
  - id: claim-staged-owasp-output
    source: owasp-improper-output-handling
    supports: OWASP identifies insufficient validation, sanitization, and handling of model output before downstream use as improper output handling.
    locator: LLM05:2025 description and Prevention and Mitigation Strategies
    evidence_kind: direct-documentation
    confidence: high
  - id: claim-staged-openai-guardrails
    source: openai-agents-guardrails
    supports: Output guardrails run after final agent output and a triggered tripwire raises an exception that can halt the flow.
    locator: Output guardrails
    evidence_kind: direct-documentation
    confidence: high
  - id: claim-staged-microsoft-ui
    source: microsoft-progressive-disclosure-controls
    supports: Microsoft describes progressive disclosure controls as UI controls that let users show or hide additional information, data, options, or commands on demand.
    locator: Progressive Disclosure Controls, overview
    evidence_kind: direct-documentation
    confidence: high
  - id: claim-staged-local-design
    source: nist-privacy-framework
    supports: StagedDisclosure, its distinct Message products, and its parent-contract-preserving field shape are Moonweave local design inferences rather than NIST, OWASP, OpenAI, or UI-framework schemas.
    locator: Privacy Framework overview
    evidence_kind: design-inference
    confidence: high
