source_claims:
  - id: claim-sensitive-span-001
    source: eng-security-owasp-llm02-2025
    supports: OWASP identifies credentials, personal, financial, health, legal, and confidential business data as sensitive information. Moonweave represents each addressable occurrence requiring control as SensitiveSpan.
    locator: LLM02:2025 > Sensitive Information Disclosure > risk description and examples
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-sensitive-span-002
    source: eng-security-owasp-llm02-2025
    supports: OWASP identifies concrete sensitive values requiring detection and sanitization. Moonweave gives each addressable occurrence a stable span identity.
    locator: LLM02:2025 > Sensitive Information Disclosure > risk description and examples
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-sensitive-span-003
    source: eng-security-owasp-llm02-2025
    supports: OWASP recommends detecting and sanitizing sensitive output. Moonweave anchors a finding to exact source content instead of duplicating the secret.
    locator: LLM02:2025 > Prevention and Mitigation Strategies > Sanitization
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-sensitive-span-004
    source: eng-security-owasp-llm02-2025
    supports: OWASP recommends targeted sanitization and masking. Moonweave requires an exact locator so transformation stays limited to the detected occurrence.
    locator: LLM02:2025 > Prevention and Mitigation Strategies > Sanitization and Masking
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-sensitive-span-005
    source: eng-security-owasp-llm02-2025
    supports: OWASP explicitly includes security credentials among sensitive information. Moonweave names this category credential.
    locator: LLM02:2025 > Sensitive Information Disclosure > Types of Sensitive Information
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-sensitive-span-006
    source: eng-security-owasp-llm02-2025
