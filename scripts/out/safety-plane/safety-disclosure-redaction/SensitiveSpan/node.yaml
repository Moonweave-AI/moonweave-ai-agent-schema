    locator: LLM02:2025 > Sensitive Information Disclosure > Types of Sensitive Information
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-sensitive-span-007
    source: eng-security-owasp-llm02-2025
    supports: OWASP includes financial details among sensitive information. Moonweave names this category financial.
    locator: LLM02:2025 > Sensitive Information Disclosure > Types of Sensitive Information
    evidence_kind: design-inference
    confidence: high
    review_status: accepted
  - id: claim-sensitive-span-008
    source: eng-security-owasp-llm02-2025
