id: moonweave-agent-ontology
name: "Agent Ontology Schema"
name_zh: "Agent 本体图谱"
version: "1.0.0"
status: active
description: >
  A universal, graph-native agent ontology covering the full stack from
  goals and cognitive cores to runtime harnesses, safety policies,
  protocol interop, SDK abstractions, and environment adapters.

subgraphs:
  - id: meta-graph
    path: ontology/00-meta-graph
    label: "Meta Graph"
    label_zh: "元图"
    description: "Ontology primitives: NodeClass, EdgeClass, GraphConstraint, GraphView, EvidenceRef"

  - id: agent-core-graph
    path: ontology/01-agent-core-graph
    label: "Agent Core Graph"
    label_zh: "智能体核心图"
    description: "Agent identity, goals, tasks, capabilities, decision loop, cognitive core"

  - id: context-info-graph
    path: ontology/02-context-info-graph
    label: "Context & Information Graph"
    label_zh: "上下文与信息图"
    description: "Context sources, messages, instructions, progressive disclosure, indexes"

  - id: memory-graph
    path: ontology/03-memory-graph
    label: "Memory Graph"
    label_zh: "记忆图"
    description: "Working/episodic/semantic/procedural/preference memory, retrieval, compaction"

  - id: reasoning-planning-graph
    path: ontology/04-reasoning-planning-graph
    label: "Reasoning & Planning Graph"
    label_zh: "推理与规划图"
    description: "Reasoning traces, plans, search spaces, reflection, replanning, budgets"

  - id: tool-action-graph
    path: ontology/05-tool-action-graph
    label: "Tool & Action Graph"
    label_zh: "工具与动作图"
    description: "Tool definition/discovery/invocation, computer use, side effects"

  - id: orchestration-graph
    path: ontology/06-orchestration-graph
    label: "Orchestration Graph"
    label_zh: "编排图"
    description: "Workflows, routing, parallelization, multi-agent, delegation, consensus"

  - id: runtime-harness-graph
    path: ontology/07-runtime-harness-graph
    label: "Runtime & Harness Graph"
    label_zh: "运行时与执行框架图"
    description: "Sessions, runs, traces, checkpoints, sandboxes, budgets, recovery"

  - id: safety-policy-graph
    path: ontology/08-safety-policy-graph
    label: "Safety & Policy Graph"
    label_zh: "安全与策略图"
    description: "Trust boundaries, permissions, IFC, prompt injection defense, audit"

  - id: protocol-interop-graph
    path: ontology/09-protocol-interop-graph
    label: "Protocol & Interop Graph"
    label_zh: "协议与互操作图"
    description: "Protocol roles, endpoints, capability manifests, task/message envelopes"

  - id: universal-sdk-graph
    path: ontology/10-universal-sdk-graph
    label: "Universal SDK Graph"
    label_zh: "通用 SDK 图"
    description: "Generic SDK kernel, API families, adapters, extensions, protocol bindings"

  - id: environment-adapter-graph
    path: ontology/11-environment-adapter-graph
    label: "Environment Adapter Graph"
    label_zh: "环境适配图"
    description: "Environment types, observations, actions, risk profiles, permission surfaces"

  - id: engineering-validation-graph
    path: ontology/12-engineering-validation-graph
    label: "Engineering & Validation Graph"
    label_zh: "工程与验证图"
    description: "Graph validators, coverage checkers, release gates"

cross_subgraph_edges:
  - from: agent-core-graph
    to: context-info-graph
    via: [READS_CONTEXT, PROVIDES_CONTEXT_TO]
  - from: agent-core-graph
    to: memory-graph
    via: [RETRIEVES_FROM, WRITES_TO]
  - from: agent-core-graph
    to: reasoning-planning-graph
    via: [USES_REASONING, GENERATES_PLAN]
  - from: reasoning-planning-graph
    to: orchestration-graph
    via: [PRODUCES_WORKFLOW, DELEGATES_TO]
  - from: orchestration-graph
    to: tool-action-graph
    via: [REQUESTS_ACTION, INVOKES]
  - from: tool-action-graph
    to: runtime-harness-graph
    via: [EXECUTES_IN, STREAMS_TO]
  - from: safety-policy-graph
    to: tool-action-graph
    via: [GUARDS, DENIES]
  - from: safety-policy-graph
    to: runtime-harness-graph
    via: [GUARDS, CONSTRAINS]
  - from: protocol-interop-graph
    to: tool-action-graph
    via: [BINDS, EXPOSES_TOOL]
  - from: universal-sdk-graph
    to: agent-core-graph
    via: [EXPOSES_API]
  - from: universal-sdk-graph
    to: runtime-harness-graph
    via: [EXPOSES_API]
  - from: runtime-harness-graph
    to: environment-adapter-graph
    via: [OPERATES_ON, ADAPTS_TO]
  - from: engineering-validation-graph
    to: meta-graph
    via: [VALIDATES, CHECKS_COVERAGE_OF]
