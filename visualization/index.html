<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Ontology Architecture</title>
<script src="vendor/d3.min.js"></script>
<style>

*,*::before,*::after{box-sizing:border-box}
:root,[data-theme="dark"]{
  --ui-font:system-ui,-apple-system,"Segoe UI","Microsoft YaHei","PingFang SC","Noto Sans SC",Arial,sans-serif;
  --mono-font:"SFMono-Regular",Consolas,"Cascadia Mono","Microsoft YaHei Mono","Microsoft YaHei",monospace;
  --bg:#070b14;--bg-grad:rgba(30,50,90,.12);
  --topbar:rgba(12,18,32,.82);--topbar-border:rgba(60,80,120,.35);
  --text:#e8eef5;--muted:#8da0ba;--label:#c8d6e5;
  --block-bg:#0b1220;--block-border:rgba(92,116,154,.58);
  --frame-fill:rgba(8,15,28,.72);--frame-stroke:rgba(142,184,240,.68);
  --frame-stroke-strong:rgba(125,190,255,.88);--frame-glow:rgba(86,145,255,.18);
  --axis-fill:rgba(15,26,46,.62);--axis-stroke:rgba(125,190,255,.50);
  --axis-rule:rgba(125,190,255,.38);--group-fill:rgba(12,21,38,.46);
  --group-stroke:rgba(145,180,230,.42);--guide-stroke:rgba(145,180,230,.26);
  --axis-label:#d4e7ff;--group-label:#8fb8ec;
  --header-border:rgba(60,80,120,.5);
  --input-bg:rgba(20,30,50,.9);--input-border:rgba(60,80,120,.45);
  --detail-bg:rgba(12,18,32,.95);--tooltip-bg:rgba(16,24,42,.94);
  --detail-shadow:0 22px 70px rgba(0,0,0,.46),0 0 0 1px rgba(125,190,255,.10);
  --cross-glow:rgba(100,140,220,.35);--path-color:#5eead4;
  --selected-glow:#69a7ff;--search-glow:#fbbf24;
}
[data-theme="light"]{
  --bg:#f0f4fa;--bg-grad:rgba(100,140,200,.08);
  --topbar:rgba(255,255,255,.88);--topbar-border:rgba(120,140,170,.3);
  --text:#1a2332;--muted:#5a6a80;--label:#2d3a4d;
  --block-bg:#ffffff;--block-border:rgba(120,140,170,.45);
  --frame-fill:rgba(255,255,255,.86);--frame-stroke:rgba(52,87,140,.54);
  --frame-stroke-strong:rgba(37,99,235,.76);--frame-glow:rgba(37,99,235,.12);
  --axis-fill:rgba(232,242,255,.76);--axis-stroke:rgba(37,99,235,.42);
  --axis-rule:rgba(37,99,235,.28);--group-fill:rgba(246,250,255,.68);
  --group-stroke:rgba(66,92,135,.34);--guide-stroke:rgba(66,92,135,.22);
  --axis-label:#244a7d;--group-label:#315f9d;
  --header-border:rgba(120,140,170,.4);
  --input-bg:#fff;--input-border:rgba(120,140,170,.4);
  --detail-bg:rgba(255,255,255,.98);--tooltip-bg:rgba(255,255,255,.96);
  --detail-shadow:0 22px 70px rgba(20,35,60,.20),0 0 0 1px rgba(37,99,235,.10);
  --cross-glow:rgba(60,100,180,.2);--path-color:#0d9488;
  --selected-glow:#2563eb;--search-glow:#d97706;
}
html,body{width:100%;height:100%;margin:0;overflow:hidden;
  background:var(--bg);color:var(--text);
  font-family:var(--ui-font);
  transition:background .2s,color .2s}
#app{height:100%;display:flex;flex-direction:column;position:relative}
.topbar{
  height:54px;flex:none;display:flex;align-items:center;gap:16px;padding:0 18px;
  background:var(--topbar);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--topbar-border);z-index:10}
.brand h1{font-size:15px;font-weight:650;margin:0 0 2px;letter-spacing:0}
.brand p{font-size:11px;margin:0;color:var(--muted)}
.controls{display:flex;align-items:center;gap:8px;margin-left:auto;flex-wrap:wrap}
.controls input,.controls select,.controls button{
  height:32px;border:1px solid var(--input-border);border-radius:8px;
  background:var(--input-bg);color:var(--text);padding:0 10px;font-size:12px;
  transition:border-color .2s,background .2s}
.controls input{width:min(220px,30vw)}
.controls input:focus,.controls select:focus{outline:none;border-color:var(--selected-glow)}
.controls button{cursor:pointer}
.controls button:hover{border-color:var(--selected-glow)}
#status{font-size:11px;color:var(--search-glow);min-width:60px}
.main-area{flex:1;min-height:0;position:relative;overflow:hidden;
  background:
    radial-gradient(circle,rgba(145,165,195,.18) 1px,transparent 1.4px) 0 0/34px 34px,
    radial-gradient(ellipse 80% 50% at 50% 0%,var(--bg-grad),transparent 70%),
    var(--bg)}
#canvas{width:100%;height:100%;display:block;cursor:grab;touch-action:none}
#canvas:active{cursor:grabbing}
.cross-links,.cross-links *,.focus-overlay,.focus-overlay *,.path-overlay,.path-overlay *{pointer-events:none}
.block-bg{fill:var(--block-bg);stroke:var(--frame-stroke);stroke-width:1.75;vector-effect:non-scaling-stroke}
.block-header-line{fill:var(--header-border)}
.header-title{font-size:12px;font-weight:600;fill:var(--text)}
.header-count{font-size:10px;fill:var(--muted)}
.block-zoom-label{font-size:18px;font-weight:700;fill:var(--text);opacity:.85;display:none}
.node{pointer-events:all}
.node-hit{fill:transparent;stroke:none;pointer-events:all}
.node-card{fill:var(--block-bg);stroke:rgba(180,205,238,.30);stroke-width:1;rx:7;pointer-events:none}
.node-dot{stroke:rgba(255,255,255,.7);stroke-width:.9}
.node-label{font-size:10.5px;fill:var(--label);pointer-events:none;font-weight:600}
.node-label-secondary{font-size:8.5px;fill:var(--muted);pointer-events:none}
.block-internal-edges{pointer-events:auto}
.framework-bg{fill:var(--frame-fill);stroke:var(--frame-stroke-strong);stroke-width:1.35;rx:12;vector-effect:non-scaling-stroke}
.framework-plane-bg{fill:var(--frame-fill);stroke:var(--frame-stroke);stroke-width:1.15;rx:10;vector-effect:non-scaling-stroke}
.framework-section-title{font-family:var(--mono-font);font-size:7.5px;fill:var(--muted);pointer-events:none}
.framework-class-band{stroke:var(--guide-stroke);stroke-width:.8;stroke-dasharray:3 5;shape-rendering:crispEdges;vector-effect:non-scaling-stroke}
.framework-branch{fill:none;stroke:rgba(145,165,195,.48);stroke-width:.85;shape-rendering:crispEdges;vector-effect:non-scaling-stroke}
.framework-trunk{fill:none;stroke:rgba(145,165,195,.74);stroke-width:1.3;shape-rendering:crispEdges;vector-effect:non-scaling-stroke}
.relation-class-node{fill:rgba(18,28,48,.96);stroke:rgba(180,205,238,.54);stroke-width:1;rx:8}
.relation-class-text{font-family:var(--mono-font);font-size:8.5px;fill:#cbe2ff;pointer-events:none}
.relation-class-count{font-family:var(--mono-font);font-size:7px;fill:var(--muted);pointer-events:none}
.node-relation-tags{font-family:var(--mono-font);font-size:7px;fill:#a9c8ee;pointer-events:none}
.hierarchy-column-guide{stroke:var(--guide-stroke);stroke-width:.9;stroke-dasharray:4 8;shape-rendering:crispEdges;vector-effect:non-scaling-stroke}
.hierarchy-level-label{font-family:var(--ui-font);font-size:8px;fill:var(--muted);font-weight:700;letter-spacing:0;pointer-events:none}
.hierarchy-axis-box{fill:var(--axis-fill);stroke:var(--axis-stroke);stroke-width:1.25;stroke-dasharray:6 5;rx:10;vector-effect:non-scaling-stroke}
.hierarchy-axis-label{font-family:var(--ui-font);font-size:8.5px;fill:var(--axis-label);font-weight:700;pointer-events:none}
.hierarchy-axis-rule{stroke:var(--axis-rule);stroke-width:1;shape-rendering:crispEdges;vector-effect:non-scaling-stroke}
.hierarchy-group-box{fill:var(--group-fill);stroke:var(--group-stroke);stroke-width:1.05;stroke-dasharray:4 5;rx:8;vector-effect:non-scaling-stroke}
.hierarchy-group-label{font-family:var(--ui-font);font-size:8.2px;fill:var(--group-label);font-weight:650;pointer-events:none}
.hierarchy-parent-link{fill:none;stroke:var(--group-stroke);stroke-width:.95;shape-rendering:crispEdges;pointer-events:none;vector-effect:non-scaling-stroke}
.node.focus-primary .node-card{stroke:var(--selected-glow);stroke-width:1.9}
.node.focus-related .node-card{stroke:rgba(125,190,255,.72);stroke-width:1.2}
.relation-class{cursor:pointer}
.relation-class.relation-focus .relation-class-node{stroke:var(--selected-glow);stroke-width:2}
.relation-class .framework-trunk.trunk-focus{stroke-width:1.8;opacity:1}
.relation-class .framework-branch.branch-focus{stroke-width:2;opacity:1}
.relation-class .framework-branch.branch-muted{opacity:.12}
.relation-class.precise-node-focus .framework-class-band{opacity:.08}
.relation-class.precise-node-focus .framework-trunk{opacity:.04;stroke-width:.8;filter:none}
.relation-class.precise-node-focus .framework-branch{opacity:.025;stroke-width:.7;filter:none}
.relation-class.precise-node-focus .framework-branch.branch-focus{opacity:.08;stroke-width:.9;filter:none}
.relation-class.precise-node-focus .relation-class-count{fill:#d8ecff}
.cross-link.focus-link .cross-path{opacity:1!important;stroke-width:2.4!important}
.cross-link.focus-link .cross-label-bg{stroke:var(--selected-glow)}
.focus-muted{opacity:.08!important}
.relation-muted{opacity:.10!important}
.muted-link{opacity:.10!important}
.cross-path{shape-rendering:crispEdges}
.cross-label-bg{fill:var(--block-bg);stroke:rgba(145,165,195,.38);stroke-width:.8;rx:6}
.cross-label{font-family:var(--mono-font);font-size:9px;fill:var(--muted);pointer-events:none}
.node.selected .node-dot{
  stroke:var(--selected-glow);stroke-width:3}
.node.search-match .node-label{fill:var(--search-glow);font-weight:600}
.node.search-match .node-dot{stroke:var(--search-glow);stroke-width:1.5}
.node.dimmed,.block.dimmed-block{opacity:.18}
.node.path-node .node-dot{stroke:var(--path-color);stroke-width:2}
.cross-link.path-link .cross-path{opacity:1!important;stroke-width:2.5!important}
.path-segment{stroke:var(--path-color);stroke-width:2.5;fill:none;
  pointer-events:none}
.path-marker{fill:none;stroke:var(--path-color);stroke-width:2;pointer-events:none}
.focus-edge{fill:none;stroke:var(--selected-glow);stroke-width:1.35;opacity:.86;
  stroke-linejoin:round;stroke-linecap:round;vector-effect:non-scaling-stroke}
.focus-edge-secondary{stroke:rgba(125,190,255,.66);stroke-width:1.1;opacity:.62}
.focus-edge-label-bg{fill:var(--block-bg);stroke:var(--selected-glow);stroke-width:.9;rx:7}
.focus-edge-label{font-family:ui-monospace,Consolas,monospace;font-size:8px;fill:#d8ecff;
  text-anchor:middle;dominant-baseline:middle}
.focus-endpoint{fill:var(--block-bg);stroke:var(--selected-glow);stroke-width:1.45;
  vector-effect:non-scaling-stroke}
.focus-endpoint-label{font-family:ui-monospace,Consolas,monospace;font-size:7px;font-weight:700;
  fill:#d8ecff;text-anchor:middle;dominant-baseline:middle}
.tooltip{
  position:fixed;pointer-events:none;z-index:100;max-width:280px;padding:10px 12px;
  background:var(--tooltip-bg);backdrop-filter:blur(10px);border:1px solid var(--block-border);
  border-radius:10px;font-size:12px;line-height:1.45;opacity:0;transform:translateY(4px);
  transition:opacity .15s,transform .15s}
.tooltip.visible{opacity:1;transform:translateY(0)}
.tooltip strong{display:block;font-size:13px;margin-bottom:2px}
.tooltip .tt-zh{display:block;color:var(--muted);font-size:11px;margin-bottom:4px}
.tooltip .tt-desc{display:block;color:var(--label);font-size:11px}
.detail{
  position:fixed;top:54px;right:0;bottom:0;width:min(360px,34vw);
  background:var(--detail-bg);border-left:1px solid var(--topbar-border);
  transform:translateX(100%);transition:transform .18s ease,width .18s ease,box-shadow .18s ease;z-index:1000;
  overflow-y:auto;padding:20px 18px 24px;box-shadow:none;will-change:transform,width}
.detail.open{transform:translateX(0)}
.detail.open{box-shadow:var(--detail-shadow)}
.detail.expanded{width:min(620px,46vw)}
.detail-icon-btn{
  position:absolute;top:10px;right:12px;width:32px;height:32px;border:none;
  background:transparent;color:var(--muted);font-size:22px;cursor:pointer;
  border-radius:8px;transition:background .2s,color .2s;line-height:1}
.detail-icon-btn:hover{background:rgba(100,140,200,.15);color:var(--text)}
.detail-size-btn{right:48px;font-size:15px;font-weight:800}
.detail-rail{
  position:fixed;top:68px;right:14px;z-index:1001;height:34px;padding:0 10px 0 12px;
  display:flex;align-items:center;gap:7px;border:1px solid var(--frame-stroke);
  border-radius:999px;background:var(--detail-bg);color:var(--text);box-shadow:var(--detail-shadow);
  cursor:pointer;font-size:12px;font-weight:700;letter-spacing:0;transition:opacity .18s ease,transform .18s ease,border-color .18s ease;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.detail-rail:hover{border-color:var(--frame-stroke-strong);transform:translateX(-2px)}
.detail-rail.hidden{opacity:0;pointer-events:none;transform:translateX(10px)}
.detail-badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:999px;
  border:1px solid;margin-bottom:10px;font-weight:600}
.detail-key{font-family:ui-monospace,Consolas,monospace;font-size:11px;color:var(--muted);
  word-break:break-all;margin-bottom:4px}
.detail-title{font-size:20px;font-weight:700;margin:0 0 4px;line-height:1.2}
.detail-zh{font-size:13px;color:var(--muted);margin:0 0 12px}
.detail-desc{font-size:13px;line-height:1.55;color:var(--label);margin:0 0 10px}
.detail-meta{font-size:11px;color:var(--muted);margin:0 0 16px}
.section-title{font-size:10px;text-transform:uppercase;letter-spacing:.08em;
  color:var(--muted);margin:16px 0 8px;font-weight:600}
.edge-list{list-style:none;margin:0;padding:0;font-size:12px}
.edge-list li{margin:5px 0;line-height:1.4}
.edge-list .pred{font-family:ui-monospace,Consolas,monospace;font-size:10px;
  color:var(--muted);margin-right:4px}
.edge-list .muted,.muted{color:var(--muted)}
.link-btn{background:none;border:none;color:var(--selected-glow);cursor:pointer;
  padding:0;font-size:inherit;text-decoration:underline;text-underline-offset:2px;
  transition:opacity .2s}
.link-btn:hover{opacity:.8}
@media(max-width:768px){
  .detail{width:min(92vw,380px)}
  .detail.expanded{width:96vw}
  .controls input{width:120px}
  .brand p{display:none}
}

</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <h1>Agent Ontology Architecture</h1>
      <p>277 nodes · 13 subgraphs · Interactive schema diagram</p>
    </div>
    <div class="controls">
      <input type="search" id="search" placeholder="Search nodes…" autocomplete="off">
      <span id="status"></span>
      <select id="lang-select" title="Language">
        <option value="both">中 / EN</option>
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
      <select id="path-select">
        <option value="">Trace a path…</option>
      </select>
      <button type="button" id="fit-btn">Fit All</button>
      <button type="button" id="theme-btn" title="Toggle theme">☀</button>
    </div>
  </header>
  <div class="main-area">
    <svg id="canvas"></svg>
    <div class="tooltip" id="tooltip"></div>
  </div>
  <aside class="detail" id="detail">
    <button type="button" class="detail-icon-btn detail-size-btn" id="toggle-detail-size" aria-label="Expand details" title="Expand details">↔</button>
    <button type="button" class="detail-icon-btn close-btn" id="close-detail" aria-label="Close" title="Close">×</button>
    <div id="detail-inner"></div>
  </aside>
  <button type="button" class="detail-rail" id="detail-rail" aria-label="Open details" aria-expanded="false">
    <span id="detail-rail-label">Details</span><span aria-hidden="true">›</span>
  </button>
</div>

间和情境背景，从而实现时间回忆和基于经验的学习。"],["memory_block","Memory Block","记忆分区",3,"Logical partition within a memory store grouping related records by topic, time, tenant, or access policy. Enables scoped retrieval and independent compaction.",2,"memory-data-unit","记忆数据单元","container","memory_store","records-index","记忆数据单元 / 索引存储","内存存储中的逻辑分区，按主题、时间、租户或访问策略对相关记录进行分组。启用范围检索和独立压缩。"],["memory_compactor","Memory Compactor","记忆压缩器",3,"Summarizes, merges, and prunes memory records over time to control storage growth while preserving salient information and retrieval quality.",2,"memory-pipeline","记忆流水线","process","memory_store","memory-operations","记忆流水线","随着时间的推移汇总、合并和修剪内存记录，以控制存储增长，同时保留显着信息和检索质量。"],["memory_forgetting_policy","Memory Forgetting Policy","记忆遗忘策略",3,"Rules governing what memory records to discard, archive, or deprioritize and under what conditions. Implements intentional forgetting to manage capacity and privacy.",3,"memory-pipeline","记忆流水线","policy","memory_compactor","memory-operations","记忆流水线","管理哪些内存记录要丢弃、存档或取消优先级以及在什么条件下进行的规则。实施故意遗忘来管理容量和隐私。"],["memory_record","Memory Record","记忆记录",3,"Individual memory entry with content payload and rich metadata: provenance, timestamps, access counts, relevance\nscores, and lifecycle state.",2,"memory-data-unit","记忆数据单元","artifact","memory_store","records-index","记忆数据单元 / 索引存储","具有内容有效负载和丰富元数据的单独内存条目：出处、时间戳、访问计数、相关性分数和生命周期状态。"],["memory_retriever","Memory Retriever","记忆检索器",3,"Orchestrates the full retrieval pipeline: query formulation, index lookup, rank fusion, reranking, and result\npackaging for downstream consumption.",1,"memory-pipeline","记忆流水线","process","memory_store","memory-operations","记忆流水线","编排完整的检索管道：查询制定、索引查找、排名融合、重新排名和结果打包以供下游使用。"],["memory_store","Memory Store","记忆存储",3,"Abstract persistent storage backend that holds memory records across sessions. May be partitioned into blocks and indexed for retrieval.",0,"memory-root","记忆根","anchor",null,"memory-foundation","记忆根","抽象持久存储后端，保存跨会话的内存记录。可以分为块并建立索引以供检索。"],["memory_writer","Memory Writer","记忆写入器",3,"Processes incoming content, extracts metadata, deduplicates, and persists new memory records to the appropriate store and indexes.",1,"memory-pipeline","记忆流水线","process","memory_store","memory-operations","记忆流水线","处理传入内容、提取元数据、删除重复数据并将新内存记录保存到适当的存储和索引中。"],["preference_memory","Preference Memory","偏好记忆",3,"Learned user and agent preferences, stylistic biases, and default choices accumulated over interactions. Influences response tone, tool selection, and personalization.",1,"memory-kind","记忆类型","memory","memory_store","memory-taxonomy","记忆类型","通过交互积累了了解的用户和智能体偏好、风格偏见和默认选择。影响响应语气、工具选择和个性化。"],["procedural_memory","Procedural Memory","程序性记忆",3,"Stored skills, workflows, action sequences, and tool usage patterns that guide how the agent performs tasks. Encodes how-to knowledge rather than declarative facts.",1,"memory-kind","记忆类型","memory","memory_store","memory-taxonomy","记忆类型","存储的技能、工作流程、操作序列和工具使用模式可指导智能体如何执行任务。编码操作知识而不是声明性事实。"],["rank_fusion","Rank Fusion","排序融合",3,"Component that merges multiple retrieval score lists from heterogeneous indexes into a unified ranking, commonly using reciprocal rank fusion or weighted combination.",3,"retrieval-ranking","检索排序","process","memory_retriever","retrieval-output","检索排序 / 检索输出","将异构索引中的多个检索评分列表合并为统一排名的组件，通常使用倒数排名融合或加权组合。"],["reranker","Reranker","重排序器",3,"Cross-encoder or language-model-based component that re-scores candidate results for query-document relevance after initial retrieval.",3,"retrieval-ranking","检索排序","process","memory_retriever","retrieval-output","检索排序 / 检索输出","跨编码器或基于语言模型的组件，可在初始检索后重新对查询文档相关性的候选结果进行评分。"],["semantic_memory","Semantic Memory","语义记忆",3,"Structured factual knowledge, world models, and concept relations independent of the specific episode in which they were learned. Supports generalization, inference, and cross-session knowledge reuse.",1,"memory-kind","记忆类型","memory","memory_store","memory-taxonomy","记忆类型","结构化的事实知识、世界模型和概念关系独立于学习的具体情节。支持泛化、推理和跨会话知识重用。"],["sparse_index","Sparse Index","稀疏索引",3,"Lexical index supporting keyword matching via TF-IDF, BM25, or related sparse retrieval methods. Complements dense vector search for exact-term recall.",3,"index-store","索引存储","index","memory_store","records-index","记忆数据单元 / 索引存储","支持通过 TF-IDF、BM25 或相关稀疏检索方法进行关键字匹配的词法索引。补充密集向量搜索以实现精确术语召回。"],["vector_index","Vector Index","向量索引",3,"Approximate nearest neighbor index for fast semantic similarity search over embedding vectors. Supports configurable recall-latency tradeoffs.",3,"index-store","索引存储","index","vector_store","records-index","记忆数据单元 / 索引存储","用于对嵌入向量进行快速语义相似性搜索的近似最近邻索引。支持可配置的召回延迟权衡。"],["vector_store","Vector Store","向量存储",3,"Persistent storage layer for embedding vectors with associated metadata and chunk identifiers. Often paired with a vector index for query acceleration.",2,"index-store","索引存储","storage","memory_store","records-index","记忆数据单元 / 索引存储","用于嵌入具有关联元数据和块标识符的向量的持久存储层。通常与向量索引配对以实现查询加速。"],["virtual_context","Virtual Context","虚拟上下文",3,"Reconstructed context assembled on demand from long-term memory when the active working memory window cannot hold all relevant information.",3,"retrieval-output","检索输出","artifact","memory_retriever","retrieval-output","检索排序 / 检索输出","当活动工作记忆窗口无法容纳所有相关信息时，根据需要从长期记忆中组装重建上下文。"],["working_memory","Working Memory","工作记忆",3,"Active, bounded context window holding the agent''s current focus: recent messages, retrieved snippets, and\nin-flight reasoning. Capacity is constrained by token or slot limits and subject to eviction when new information arrives.",1,"memory-kind","记忆类型","memory","memory_store","memory-taxonomy","记忆类型","活动的有界上下文窗口保持智能体的当前焦点：最近的消息、检索到的片段和正在进行的推理。容量受到令牌或插槽限制的限制，并且在新信息到达时会被驱逐。"],["branch_evaluator","Branch Evaluator","分支评估器",4,"Component that scores, ranks, or selects among alternative reasoning branches in a search space based on heuristics, value estimates, or learned models.",2,"search-space","搜索空间","process","search_space","plan-search","搜索空间 / 规划循环","基于启发式、价值估计或学习模型在搜索空间中的替代推理分支中进行评分、排名或选择的组件。"],["confidence_estimate","Confidence Estimate","置信度估计",4,"Quantified confidence score attached to a conclusion, plan step, or prediction, typically on a calibrated probability or ordinal scale.",2,"epistemic-control","认知置信控制","metric","reasoning_process","reflection-epistemic","认知置信控制 / 反思控制","附加到结论、计划步骤或预测的量化置信度得分，通常采用校准概率或序数尺度。"],["plan","Plan","计划",4,"Structured sequence of steps toward achieving a goal, including dependencies, preconditions, expected outcomes, and rollback points.",2,"planning-loop","规划循环","artifact","planning_process","plan-search","搜索空间 / 规划循环","实现目标的结构化步骤序列，包括依赖性、先决条件、预期结果和回滚点。"],["planning_process","Planning Process","规划过程",4,"Goal-directed process that decomposes objectives into structured plans with ordered steps, dependencies, and contingency handling.",1,"planning-loop","规划循环","process","reasoning_process","plan-search","搜索空间 / 规划循环","以目标为导向的流程，将目标分解为具有有序步骤、依赖性和应急处理的结构化计划。"],["plan_step","Plan Step","计划步骤",4,"Individual action or decision within a plan, binding to a concrete action in the action space with preconditions and expected effects.",3,"planning-loop","规划循环","artifact","plan","plan-search","搜索空间 / 规划循环","计划内的个人行动或决定，与行动空间中的具体行动绑定，具有先决条件和预期效果。"],["reasoning_process","Reasoning Process","推理过程",4,"Abstract computation that transforms inputs into conclusions through logical, analogical, or generative inference. May operate within a bounded search space.",0,"reasoning-root","推理根","anchor",null,"reasoning-foundation","推理根","通过逻辑、类比或生成推理将输入转化为结论的抽象计算。可以在有限的搜索空间内操作。"],["reasoning_trace","Reasoning Trace","推理轨迹",4,"Recorded sequence of reasoning steps, intermediate conclusions, and branch decisions enabling audit, replay, and debugging of agent cognition.",3,"reflection-control","反思控制","trace","reasoning_process","reflection-epistemic","认知置信控制 / 反思控制","记录推理步骤、中间结论和分支决策的顺序，以便对智能体认知进行审核、重播和调试。"],["reflection","Reflection","反思",4,"Self-assessment of reasoning quality, output correctness, or plan adequacy performed after a reasoning or action episode.",1,"reflection-control","反思控制","process","reasoning_process","reflection-epistemic","认知置信控制 / 反思控制","在推理或行动事件后对推理质量、输出正确性或计划充分性进行自我评估。"],["replanning_trigger","Replanning Trigger","重规划触发器",4,"Condition or event that forces revision of an active plan, such as step failure, environment change, new information, or self-critique findings.",3,"planning-loop","规划循环","signal","planning_process","plan-search","搜索空间 / 规划循环","迫使修改现行计划的条件或事件，例如步骤失败、环境变化、新信息或自我批评的结果。"],["search_space","Search Space","搜索空间",4,"Tree or graph of possible reasoning branches representing alternative inference paths, hypotheses, or plan variants under exploration.",1,"search-space","搜索空间","container","reasoning_process","plan-search","搜索空间 / 规划循环","可能的推理分支的树或图，表示正在探索的替代推理路径、假设或计划变体。"],["self_critique","Self Critique","自我批评",4,"Explicit identification of errors, weaknesses, gaps, or uncertainties in reasoning output or plan structure, often triggering replanning.",2,"reflection-control","反思控制","process","reflection","reflection-epistemic","认知置信控制 / 反思控制","明确识别推理输出或计划结构中的错误、弱点、差距或不确定性，通常会触发重新计划。"],["stopping_condition","Stopping Condition","停止条件",4,"Criteria for terminating a reasoning or planning process, including success, failure, budget exhaustion, convergence, or timeout.",1,"budget-termination","预算与终止","policy","reasoning_process","budget-stop","预算与终止","终止推理或规划过程的标准，包括成功、失败、预算耗尽、收敛或超时。"],["thinking_budget","Thinking Budget","思考预算",4,"Token, time, or cost limit imposed on reasoning and planning activities to prevent unbounded computation and control resource consumption.",2,"budget-termination","预算与终止","budget","stopping_condition","budget-stop","预算与终止","对推理和规划活动施加令牌、时间或成本限制，以防止无限计算并控制资源消耗。"],["thought_edge","Thought Edge","思维边",4,"Transition between two thought nodes representing a reasoning step, inference rule application, or branch expansion in the search space.",3,"search-space","搜索空间","artifact","thought_node","plan-search","搜索空间 / 规划循环","两个思维节点之间的转       if (a.intraLevel !== b.intraLevel) return a.intraLevel - b.intraLevel;
      const axisOrder = a.intraAxis.localeCompare(b.intraAxis);
      if (axisOrder !== 0) return axisOrder;
      const groupOrder = a.intraGroup.localeCompare(b.intraGroup);
      if (groupOrder !== 0) return groupOrder;
      const ah = hubSet.has(a.i);
      const bh = hubSet.has(b.i);
      if (ah && !bh) return -1;
      if (!ah && bh) return 1;
      if (ah && bh) {
        const dr = (hubRank[a.i] ?? 999) - (hubRank[b.i] ?? 999);
        if (dr !== 0) return dr;
      }
      return a.label.localeCompare(b.label);
    });
  }

  // ─── Layout computation ─────────────────────────────────────────────────────
  const GRID = {
    1: { row: 0, col: "center" },
    2: { row: 1, col: "left" },
    6: { row: 1, col: "center" },
    4: { row: 1, col: "right" },
    3: { row: 2, col: "left" },
    5: { row: 2, col: "right" },
    10: { row: 3, col: "left" },
    7: { row: 3, col: "center" },
    11: { row: 3, col: "right" },
    8: { row: 4, col: "left" },
    9: { row: 4, col: "center" },
    0: { row: 5, col: "left" },
    12: { row: 5, col: "center" },
  };
  const COL_X = { left: 40, center: 3160, right: 6280 };
  const CELL_W = 620;
  const CELL_H = 90;
  const NODE_W = 284;
  const NODE_H = 48;
  const PAD_X = 22;
  const HEADER_H = 44;
  const PAD_Y = 34;
  const RELATION_CLASS_W = 250;
  const RELATION_CLASS_H = 30;
  const RELATION_CLASS_GAP = 64;
  const RELATION_BRANCH_SPREAD = 24;
  const EDGE_ROUTE_SLOT = 7;
  const FRAMEWORK_PLANE_PAD = 34;
  const ROW_GAP = 110;
  const MAX_COL_W = 5 * CELL_W + PAD_X * 2;

  function numCols(n) {
    if (n <= 6) return 2;
    if (n <= 13) return 3;
    if (n <= 20) return 4;
    return 5;
  }

  function predicateGroupsForSubgraph(sgIndex) {
    const groups = new Map();
    edges.forEach((e) => {
      if (nodes[e.source].sg !== sgIndex || nodes[e.target].sg !== sgIndex) return;
      if (!groups.has(e.predicate)) {
        groups.set(e.predicate, {
          predicate: e.predicate,
          sources: new Set(),
          targets: new Set(),
          count: 0,
        });
      }
      const group = groups.get(e.predicate);
      group.sources.add(e.source);
      group.targets.add(e.target);
      group.count++;
    });
    return [...groups.values()]
      .map((g) => ({
        ...g,
        sources: [...g.sources],
        targets: [...g.targets],
      }))
      .sort((a, b) => b.count - a.count || a.predicate.localeCompare(b.predicate))
      .map((g, i) => ({ ...g, rid: `R${i + 1}` }));
  }

  function localEdgesForSubgraph(sgIndex) {
    return edges.filter((e) => nodes[e.source].sg === sgIndex && nodes[e.target].sg === sgIndex);
  }

  function pairEdgesForSubgraph(localEdges, relationGroups) {
    const ridByPredicate = new Map(relationGroups.map((rel) => [rel.predicate, rel.rid]));
    const pairs = new Map();
    localEdges.forEach((e) => {
      const key = `${e.source}->${e.target}`;
      if (!pairs.has(key)) {
        pairs.set(key, {
          source: e.source,
          target: e.target,
          predicates: new Set(),
          rids: new Set(),
          count: 0,
        });
      }
      const pair = pairs.get(key);
      pair.predicates.add(e.predicate);
      pair.rids.add(ridByPredicate.get(e.predicate) || e.predicate);
      pair.count++;
    });
    return [...pairs.values()].sort((a, b) => a.source - b.source || a.target - b.target);
  }

  function hierarchyLayoutForBlock(list) {
    const levels = [...new Set(list.map((node) => node.intraLevel))].sort((a, b) => a - b);
    const columns = levels.map((level, col) => {
      const levelNodes = list.filter((node) => node.intraLevel === level);
      const axisMap = new Map();
      levelNodes.forEach((node) => {
        const axis = axisMap.get(node.intraAxis) || {
          slug: node.intraAxis,
          zh: node.intraAxisZh,
          level,
          col,
          groups: new Map(),
        };
        const group = axis.groups.get(node.intraGroup) || {
          slug: node.intraGroup,
          zh: node.intraGroupZh,
          axis: node.intraAxis,
          axisZh: node.intraAxisZh,
          level,
          col,
          nodes: [],
        };
        group.nodes.push(node);
        axis.groups.set(node.intraGroup, group);
        axisMap.set(node.intraAxis, axis);
      });
      const axes = [...axisMap.values()].sort((a, b) => a.slug.localeCompare(b.slug));
      axes.forEach((axis) => {
        axis.groups = [...axis.groups.values()].sort((a, b) => a.slug.localeCompare(b.slug));
        axis.groups.forEach((group) => {
          group.nodes.sort((a, b) => {
            const ah = hubSet.has(a.i);
            const bh = hubSet.has(b.i);
            if (ah && !bh) return -1;
            if (!ah && bh) return 1;
            return degree[b.i] - degree[a.i] || a.label.localeCompare(b.label);
          });
        });
        axis.height = AXIS_HEADER_H + axis.groups.reduce((sum, group) => {
          return sum + GROUP_HEADER_H + group.nodes.length * CELL_H + GROUP_GAP;
        }, 0);
      });
      const height = LEVEL_TOP_PAD + axes.reduce((sum, axis) => {
        return sum + axis.height + AXIS_GAP;
      }, 0);
      return { level, col, axes, height };
    });
    return {
      levels,
      columns,
      cols: Math.max(1, columns.length),
      height: Math.max(1, ...columns.map((column) => column.height)),
    };
  }

  const AXIS_HEADER_H = 30;
  const AXIS_GAP = 24;
  const GROUP_HEADER_H = 24;
  const GROUP_GAP = 18;
  const LEVEL_TOP_PAD = 64;

  const blocks = {};
  subgraphs.forEach((sg) => {
    const list = sortNodesForBlock(nodesBySg[sg.i] || []);
    const hierarchyLayout = hierarchyLayoutForBlock(list);
    const cols = hierarchyLayout.cols;
    const relationGroups = predicateGroupsForSubgraph(sg.i);
    const localEdges = localEdgesForSubgraph(sg.i);
    const localPairEdges = pairEdgesForSubgraph(localEdges, relationGroups);
    const nodeAreaH = hierarchyLayout.height;
    const w = cols * CELL_W + PAD_X * 2;
    const frameworkStartY = HEADER_H + nodeAreaH + 42;
    const frameworkH = relationGroups.length
      ? FRAMEWORK_PLANE_PAD * 2 + Math.max(1, relationGroups.length) * RELATION_CLASS_GAP
      : 0;
    const h = Math.max(HEADER_H + nodeAreaH + PAD_Y, frameworkStartY + frameworkH + PAD_Y);
    const g = GRID[sg.i];
    const x = COL_X[g.col] + Math.max(0, (MAX_COL_W - w) / 2);
    const y = 0;
    const localNodePositions = {};
    const hierarchyAxes = [];
    const hierarchyGroups = [];
    const parentLinks = [];
    const nodeIndexByKey = new Map(list.map((node) => [node.key, node]));

    hierarchyLayout.columns.forEach((column) => {
      const colX = PAD_X + column.col * CELL_W;
      let cursorY = HEADER_H + LEVEL_TOP_PAD;
      column.axes.forEach((axis) => {
        const axisTop = cursorY;
        cursorY += AXIS_HEADER_H;
        axis.groups.forEach((group) => {
          const groupTop = cursorY;
          cursorY += GROUP_HEADER_H;
          group.nodes.forEach((node, row) => {
            localNodePositions[node.i] = {
              x: colX,
              y: cursorY + row * CELL_H + CELL_H / 2,
              col: column.col,
              row,
              level: node.intraLevel,
              axis: node.intraAxis,
              group: node.intraGroup,
            };
          });
          cursorY += group.nodes.length * CELL_H;
          const groupBottom = cursorY + 8;
          hierarchyGroups.push({
            ...group,
            x: colX - 12,
            y: groupTop - 8,
            w: NODE_W + 24,
            h: Math.max(42, groupBottom - groupTop + 10),
          });
          cursorY += GROUP_GAP;
        });
        const axisBottom = cursorY - GROUP_GAP + 10;
        hierarchyAxes.push({
          ...axis,
          x: colX - 22,
          y: axisTop - 12,
          w: NODE_W + 44,
          h: Math.max(64, axisBottom - axisTop + 20),
        });
        cursorY = axisBottom + AXIS_GAP;
      });
    });

    list.forEach((node) => {
      if (!node.parentKey) return;
      const parent = nodeIndexByKey.get(node.parentKey);
      if (!parent) return;
      const childPos = localNodePositions[node.i];
      const parentPos = localNodePositions[parent.i];
      if (!childPos || !parentPos) return;
      parentLinks.push({ source: parent.i, target: node.i });
    });

    blocks[sg.i] = {
      sg,
      x,
      y,
      w,
      h,
      cols,
      rows: 0,
      list,
      localEdges,
      localPairEdges,
      localNodePositions,
      nodePositions: {},
      relationGroups,
      frameworkStartY,
      frameworkH,
      hierarchyLayout,
      hierarchyAxes,
      hierarchyGroups,
      parentLinks,
      row: g.row,
      col: g.col
    };
  });

  Object.values(blocks).forEach((b) => {
    const membership = new Map();
    b.relationGroups.forEach((rel) => {
      rel.sources.forEach((id) => {
        const entry = membership.get(id) || { source: [], target: [] };
        entry.source.push(rel.rid);
        membership.set(id, entry);
      });
      rel.targets.forEach((id) => {
        const entry = membership.get(id) || { source: [], target: [] };
        entry.target.push(rel.rid);
        membership.set(id, entry);
      });
    });
    b.relationMembership = membership;
  });

  const rowHeights = {};
  Object.values(blocks).forEach((b) => {
    rowHeights[b.row] = Math.max(rowHeights[b.row] || 0, b.h);
  });
  const rowY = {};
  let nextY = 86;
  const maxRow = Math.max(...Object.values(blocks).map((b) => b.row));
  for (let row = 0; row <= maxRow; row++) {
    rowY[row] = nextY;
    nextY += (rowHeights[row] || 0) + ROW_GAP;
  }
  Object.values(blocks).forEach((b) => {
    b.y = rowY[b.row];
    b.nodePositions = {};
    Object.entries(b.localNodePositions).forEach(([idx, p]) => {
      b.nodePositions[idx] = {
        ...p,
        x: b.x + p.x,
        y: b.y + p.y,
      };
    });
  });

  // Center blocks horizontally within column anchor
  Object.values(blocks).forEach((b) => {
    b.cx = b.x + b.w / 2;
    b.cy = b.y + b.h / 2;
  });

  // Cross-SG edge aggregation
  const crossPairs = new Map();
  edges.forEach((e) => {
    const sSg = nodes[e.source].sg;
    const tSg = nodes[e.target].sg;
    if (sSg === tSg) return;
    const key = sSg + "->" + tSg;
    if (!crossPairs.has(key)) {
      crossPairs.set(key, {
        sourceSg: sSg,
        targetSg: tSg,
        count: 0,
        predicates: {},
      });
    }
    const p = crossPairs.get(key);
    p.count++;
    p.predicates[e.predicate] = (p.predicates[e.predicate] || 0) + 1;
  });

  const crossLinks = [...crossPairs.values()].map((p) => {
    const topPred = Object.entries(p.predicates).sort((a, b) => b[1] - a[1])[0][0];
    return { ...p, topPred };
  });

  const columnBounds = {};
  Object.values(blocks).forEach((b) => {
    if (!columnBounds[b.col]) {
      columnBounds[b.col] = { minX: Infinity, maxX: -Infinity };
    }
    columnBounds[b.col].minX = Math.min(columnBounds[b.col].minX, b.x);
    columnBounds[b.col].maxX = Math.max(columnBounds[b.col].maxX, b.x + b.w);
  });

  const colOrder = { left: 0, center: 1, right: 2 };
  const gutterBus = {
    "left-center": (columnBounds.left.maxX + columnBounds.center.minX) / 2,
    "center-right": (columnBounds.center.maxX + columnBounds.right.minX) / 2,
  };

  function busBetween(aCol, bCol) {
    const a = colOrder[aCol];
    const b = colOrder[bCol];
    if (Math.abs(a - b) <= 1) {
      return a < b
        ? gutterBus[`${aCol}-${bCol}`]
        : gutterBus[`${bCol}-${aCol}`];
    }
    return null;
  }

  function sidePort(block, towardCol) {
    const toRight = colOrder[towardCol] > colOrder[block.col];
    return {
      x: toRight ? block.x + block.w : block.x,
      y: block.cy,
    };
  }

  function rowCorridorY(fromBlock, toBlock, ordinal = 0) {
    const a = fromBlock.row;
    const b = toBlock.row;
    const offset = (ordinal % 5 - 2) * 8;
    if (a === b) {
      const below = fromBlock.y + fromBlock.h + ROW_GAP * 0.45 + offset;
      return below;
    }
    const upper = Math.min(a, b);
    return rowY[upper] + rowHeights[upper] + ROW_GAP * 0.5 + offset;
  }

  function pointsToPath(points) {
    return points.map((p, i) => `${i ? "L" : "M"}${Math.round(p.x)},${Math.round(p.y)}`).join(" ");
  }

  function busRoute(link, fromBlock, toBlock) {
    const start = sidePort(fromBlock, toBlock.col);
    const end = sidePort(toBlock, fromBlock.col);
    const sourceOrder = colOrder[fromBlock.col];
    const targetOrder = colOrder[toBlock.col];
    let points;
    if (fromBlock.col === toBlock.col) {
      const side = fromBlock.col === "left"
        ? columnBounds.left.minX - 90
        : fromBlock.col === "right"
          ? columnBounds.right.maxX + 90
          : (fromBlock.row <= toBlock.row ? gutterBus["left-center"] : gutterBus["center-right"]);
      points = [start, { x: side, y: start.y }, { x: side, y: end.y }, end];
    } else if (Math.abs(sourceOrder - targetOrder) === 1) {
      const bus = busBetween(fromBlock.col, toBlock.col);
      points = [start, { x: bus, y: start.y }, { x: bus, y: end.y }, end];
    } else {
      const leftBus = gutterBus["left-center"];
      const rightBus = gutterBus["center-right"];
      const y = rowCorridorY(fromBlock, toBlock, link.ordinal || 0);
      if (sourceOrder < targetOrder) {
        points = [start, { x: leftBus, y: start.y }, { x: leftBus, y }, { x: rightBus, y }, { x: rightBus, y: end.y }, end];
      } else {
        points = [start, { x: rightBus, y: start.y }, { x: rightBus, y }, { x: leftBus, y }, { x: leftBus, y: end.y }, end];
      }
    }
    const mid = points[Math.floor(points.length / 2)];
    return { points, d: pointsToPath(points), label: { x: mid.x, y: mid.y - 8 } };
  }

  // Canvas bounds
  let maxX = 0, maxY = 0;
  Object.values(blocks).forEach((b) => {
    maxX = Math.max(maxX, b.x + b.w + 80);
    maxY = Math.max(maxY, b.y + b.h + 80);
  });

  // ─── State ──────────────────────────────────────────────────────────────────
  const state = {
    selectedNode: null,
    selectedRelation: null,
    selectedSg: null,
    searchQuery: "",
    searchMatches: new Set(),
    pathId: "",
    pathNodes: new Set(),
    lang: "both",
    theme: "dark",
    zoomK: 1,
    detailExpanded: false,
  };

  // ─── DOM refs ───────────────────────────────────────────────────────────────
  const svg = d3.select("#canvas");
  const tooltip = document.getElementById("tooltip");
  const detail = document.getElementById("detail");
  const detailInner = document.getElementById("detail-inner");
  const detailRail = document.getElementById("detail-rail");
  const detailRailLabel = document.getElementById("detail-rail-label");
  const detailSizeBtn = document.getElementById("toggle-detail-size");
  const searchInput = document.getElementById("search");
  const langSelect = document.getElementById("lang-select");
  const pathSelect = document.getElementById("path-select");
  const statusEl = document.getElementById("status");
  document.body.appendChild(detail);
  document.body.appendChild(detailRail);

  // ─── Rendering ──────────────────────────────────────────────────────────────
  const gRoot = svg.append("g").attr("class", "root");
  const gBlocks = gRoot.append("g").attr("class", "blocks");
  const gLinks = gRoot.append("g").attr("class", "cross-links");
  const gPath = gRoot.append("g").attr("class", "path-overlay");
  const gFocus = gRoot.append("g").attr("class", "focus-overlay");
  const gDefs = svg.append("defs");

  const ARROW_MARKER_BASE = {
    local: 6,
    focus: 5,
  };

  const localArrowMarker = gDefs.append("marker")
    .attr("id", "local-arrow")
    .attr("viewBox", "0 -4 8 8")
    .attr("refX", 8)
    .attr("refY", 0)
    .attr("markerUnits", "userSpaceOnUse")
    .attr("markerWidth", 6)
    .attr("markerHeight", 6)
    .attr("orient", "auto")
    .attr("overflow", "visible");
  localArrowMarker.append("path")
    .attr("d", "M0,-4L8,0L0,4")
    .attr("fill", "#8fa3bf");

  const focusArrowMarker = gDefs.append("marker")
    .attr("id", "focus-arrow")
    .attr("viewBox", "0 -4 8 8")
    .attr("refX", 8)
    .attr("refY", 0)
    .attr("markerUnits", "userSpaceOnUse")
    .attr("markerWidth", 5)
    .attr("markerHeight", 5)
    .attr("orient", "auto")
    .attr("overflow", "visible");
  focusArrowMarker.append("path")
    .attr("d", "M0,-4L8,0L0,4")
    .attr("fill", "var(--selected-glow)");

  function scaledArrowMarkerSize(base, k = state.zoomK) {
    const safeK = Math.max(0.08, Number.isFinite(k) ? k : 1);
    return Math.max(1.25, Math.min(base * 1.2, base * Math.sqrt(safeK)));
  }

  function updateArrowMarkers(k = state.zoomK) {
    localArrowMarker
      .attr("markerWidth", scaledArrowMarkerSize(ARROW_MARKER_BASE.local, k))
      .attr("markerHeight", scaledArrowMarkerSize(ARROW_MARKER_BASE.local, k));
    focusArrowMarker
      .attr("markerWidth", scaledArrowMarkerSize(ARROW_MARKER_BASE.focus, k))
      .attr("markerHeight", scaledArrowMarkerSize(ARROW_MARKER_BASE.focus, k));
  }

  // Gradients for cross links
  crossLinks.forEach((link, i) => {
    const id = "grad-" + link.sourceSg + "-" + link.targetSg;
    link.gradId = id;
    const c1 = sgByIndex[link.sourceSg].color;
    const c2 = sgByIndex[link.targetSg].color;
    gDefs
      .append("linearGradient")
      .attr("id", id)
      .attr("gradientUnits", "userSpaceOnUse")
      .selectAll("stop")
      .data([
        { offset: "0%", color: c1 },
        { offset: "100%", color: c2 },
      ])
      .enter()
      .append("stop")
      .attr("offset", (d) => d.offset)
      .attr("stop-color", (d) => d.color);
  });

  // Cross-SG links
  const linkSel = gLinks
    .selectAll("g.cross-link")
    .data(crossLinks)
    .enter()
    .append("g")
    .attr("class", "cross-link")
    .attr("data-source-sg", (d) => d.sourceSg)
    .attr("data-target-sg", (d) => d.targetSg);

  linkSel.each(function (d, i) {
    const g = d3.select(this);
    const fb = blocks[d.sourceSg];
    const tb = blocks[d.targetSg];
    d.ordinal = i;
    const ep = busRoute(d, fb, tb);
    d.ep = ep;
    g.append("path")
      .attr("class", "cross-path")
      .attr("d", ep.d)
      .attr("fill", "none")
      .attr("stroke", `url(#${d.gradId})`)
      .attr("stroke-width", 1.15)
      .attr("opacity", 0.46);
    const label = `${d.count} · ${d.topPred}`;
    const labelW = Math.max(74, Math.min(190, label.length * 6.1 + 18));
    g.append("rect")
      .attr("class", "cross-label-bg")
      .attr("x", ep.label.x - labelW / 2)
      .attr("y", ep.label.y - 13)
      .attr("width", labelW)
      .attr("height", 18);
    g.append("text")
      .attr("class", "cross-label")
      .attr("x", ep.label.x)
      .attr("y", ep.label.y)
      .attr("text-anchor", "middle")
      .text(label);
  });

  function shortenLabel(value, max = 22) {
    const text = String(value || "");
    return text.length > max ? text.slice(0, max - 1) + "…" : text;
  }

  const SG_LABEL_ZH = {

  function displayLabel(node) {
    if (state.lang === "zh") return node.labelZh || node.label;
    if (state.lang === "en") return node.label;
    return node.label;
  }

  function displaySubgraphLabel(sg) {
    const zh = SG_LABEL_ZH[sg.i];
    if (state.lang === "zh") return zh || sg.label;
    if (state.lang === "both" && zh) return `${sg.label} / ${zh}`;
    return sg.label;
  }

  function displaySecondary(node) {
    if (state.lang === "both") return node.labelZh || "";
    return "";
  }

  function ui(key) {
    const pair = UI_TEXT[key] || [key, key];
    if (state.lang === "zh") return pair[1];
    if (state.lang === "both") return `${pair[0]} / ${pair[1]}`;
    return pair[0];
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function predicateZh(predicate) {
    if (PREDICATE_ZH[predicate]) return PREDICATE_ZH[predicate];
    const words = predicate.split("_").map((part) => PREDICATE_TOKEN_ZH[part] || part.toLowerCase());
    return words.join("");
  }

  function predicateLabel(predicate) {
    const zh = predicateZh(predicate);
    if (state.lang === "zh") return zh;
    if (state.lang === "both") return `${predicate} / ${zh}`;
    return predicate;
  }

  function predicateDescription(predicate) {
    const zh = predicateZh(predicate);
    const en = `A typed ontology relation where a source node is connected to a target node by ${predicate}.`;
    const cn = `表示起点节点通过「${zh}」关系连接、约束、生成、调用或影响终点节点。`;
    if (state.lang === "zh") return cn;
    if (state.lang === "both") return `${en}<br>${cn}`;
    return en;
  }

  function nodeChineseDescription(node) {
    return node.descZh || node.desc || `${node.labelZh || node.label} ${ui("description")}`;
  }
  function nodeEnglishDescription(node) {
    return node.desc || `${node.label} is an ontology concept in the ${sgByIndex[node.sg].label} subgraph.`;
  }

  function nodeName(idx) {
    const node = nodes[idx];
    if (state.lang === "zh") return node.labelZh || node.label;
    if (state.lang === "both") return `${node.label} / ${node.labelZh || node.label}`;
    return node.label;
  }

  function edgeSentence(e) {
    const source = nodeName(e.source);
    const target = nodeName(e.target);
    const pred = predicateLabel(e.predicate);
    return `${source} ${state.lang === "en" ? "->" : "→"} ${target} · ${pred}`;
  }

  function pathLabel(path) {
    const zh = PATH_LABEL_ZH[path.id] || path.label;
    if (state.lang === "zh") return zh;
    if (state.lang === "both") return `${path.label} / ${zh}`;
    return path.label;
  }

  function portOffset(index, count) {
    if (count <= 1) return 0;
    const span = Math.min(NODE_H - 10, Math.max(12, count * 3));
    return -span / 2 + span * (index + 0.5) / count;
  }

  function takeCount(map, key) {
    const value = map.get(key) || 0;
    map.set(key, value + 1);
    return value;
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function sortedRelationNodeIds(ids, b) {
    return ids
      .filter((id) => b.localNodePositions[id])
      .sort((a, bId) => {
        const pa = b.localNodePositions[a];
        const pb = b.localNodePositions[bId];
        return pa.col - pb.col || pa.row - pb.row || nodes[a].label.localeCompare(nodes[bId].label);
      });
  }

  function branchY(centerY, index, count) {
    if (count <= 1) return centerY;
    const gap = Math.min(7, RELATION_BRANCH_SPREAD / Math.max(1, count - 1));
    return centerY + (index - (count - 1) / 2) * gap;
  }

  function relationClassX(rel, b) {
    const ids = [...rel.sources, ...rel.targets].filter((id) => b.localNodePositions[id]);
    if (!ids.length) return b.w / 2;
    const avg = ids.reduce((sum, id) => {
      const p = b.localNodePositions[id];
      return sum + p.x + NODE_W / 2;
    }, 0) / ids.length;
    return clamp(avg, PAD_X + RELATION_CLASS_W / 2 + 52, b.w - PAD_X - RELATION_CLASS_W / 2 - 52);
  }

  function relationNodePort(pos, side, portIndex, portCount) {
    return {
      x: side === "right" ? pos.x + NODE_W : pos.x,
      y: pos.y + portOffset(portIndex, portCount),
    };
  }

  function parentHierarchyPath(parentPos, childPos) {
    const sx = parentPos.x + NODE_W;
    const sy = parentPos.y;
    const tx = childPos.x;
    const ty = childPos.y;
    const midX = sx + Math.max(28, (tx - sx) * 0.42);
    return "M" + sx + "," + sy + " H" + midX + " V" + ty + " H" + tx;
  }

  function drawHierarchyScaffold(group, b) {
    b.hierarchyLayout.columns.forEach((column) => {
      const x = PAD_X + column.col * CELL_W;
      group.append("line")
        .attr("class", "hierarchy-column-guide")
        .attr("x1", x + NODE_W + 32)
        .attr("y1", HEADER_H + 12)
        .attr("x2", x + NODE_W + 32)
        .attr("y2", Math.min(b.frameworkStartY - 24, b.h - PAD_Y));
      group.append("text")
        .datum({ level: column.level })
        .attr("class", "hierarchy-level-label")
        .attr("x", x)
        .attr("y", HEADER_H + 18)
        .text(hierarchyLevelLabel(column.level));
    });

    b.hierarchyAxes.forEach((axisInfo) => {
      const axisG = group.append("g").datum(axisInfo);
      axisG.append("rect")

    b.hierarchyGroups.forEach((groupInfo) => {

  function drawUnifiedInternalFramework(group, b) {
    const frameY = HEADER_H + 10;
    const frameH = b.h - HEADER_H - PAD_Y + 10;
    group.append("rect")
      .attr("class", "framework-bg")
      .attr("x", PAD_X - 12)
      .attr("y", frameY)
      .attr("width", b.w - PAD_X * 2 + 24)
      .attr("height", frameH)
      .attr("rx", 12)
      .attr("ry", 12);

    if (!b.localPairEdges.length) return;

    group.append("rect")
      .attr("class", "framework-plane-bg")
      .attr("x", PAD_X - 6)
      .attr("y", b.frameworkStartY - 8)
      .attr("width", b.w - PAD_X * 2 + 12)
      .attr("height", b.frameworkH)
      .attr("rx", 10)
      .attr("ry", 10);
    group.append("text")
      .attr("class", "framework-section-title")
      .attr("x", PAD_X)
      .attr("y", b.frameworkStartY - 14)
      .text(relationSectionTitle());

    const sourceTotals = new Map();
    const targetTotals = new Map();
    b.relationGroups.forEach((rel) => {
      rel.sources.forEach((id) => sourceTotals.set(id, (sourceTotals.get(id) || 0) + 1));
      rel.targets.forEach((id) => targetTotals.set(id, (targetTotals.get(id) || 0) + 1));
    });
    const sourceSeen = new Map();
    const targetSeen = new Map();
    const columnSlots = new Map();
    b.relationClassPositions = {};

    b.relationGroups.forEach((rel, i) => {
      const relG = group.append("g")
        .datum(rel)
        .attr("class", "relation-class")
        .attr("data-sg", b.sg.i)
        .attr("data-predicate", rel.predicate)
        .on("click", (ev) => {
          ev.stopPropagation();
          selectRelation(b.sg.i, rel.predicate);
        });
      const classCenterX = relationClassX(rel, b);
      const classY = b.frameworkStartY + FRAMEWORK_PLANE_PAD + i * RELATION_CLASS_GAP + RELATION_CLASS_H / 2;
      const classX = classCenterX - RELATION_CLASS_W / 2;
      const classLeft = classX;
      const classRight = classX + RELATION_CLASS_W;
      const sourceCollectorX = clamp(classLeft - 42, PAD_X + 16, b.w - PAD_X - 16);
      const targetCollectorX = clamp(classRight + 42, PAD_X + 16, b.w - PAD_X - 16);
      const sources = sortedRelationNodeIds(rel.sources, b);
      const targets = sortedRelationNodeIds(rel.targets, b);
      b.relationClassPositions[rel.predicate] = {
        x: b.x + classCenterX,
        y: b.y + classY,
      };

      relG.append("path")
        .attr("class", "framework-class-band")
        .attr("d", `M${PAD_X},${classY} H${b.w - PAD_X}`);

      if (sources.length) {
        const ys = sources.map((_, idx) => branchY(classY, idx, sources.length));
        relG.append("path")
          .attr("class", "framework-trunk")
          .attr("d", `M${sourceCollectorX},${Math.min(...ys, classY)} V${Math.max(...ys, classY)}`)
          .attr("stroke", b.sg.color);
        sources.forEach((id, idx) => {
          const pos = b.localNodePositions[id];
          const sourceSlot = takeCount(columnSlots, `s-${pos.col}`);
          const sourcePort = takeCount(sourceSeen, id);
          const port = relationNodePort(pos, "right", sourcePort, sourceTotals.get(id) || 1);
          const gutterX = pos.x + NODE_W + 18 + sourceSlot * EDGE_ROUTE_SLOT;
          const y = ys[idx];
          relG.append("path")
            .attr("class", "framework-branch")
            .attr("data-node", id)
            .attr("d", `M${port.x},${port.y} H${gutterX} V${y} H${sourceCollectorX}`)
            .attr("stroke", b.sg.color);
        });
        relG.append("path")
          .attr("class", "framework-trunk")
          .attr("d", `M${sourceCollectorX},${classY} H${classLeft}`)
          .attr("stroke", b.sg.color)
          .attr("marker-end", "url(#local-arrow)");
      }

      if (targets.length) {
        const ys = targets.map((_, idx) => branchY(classY, idx, targets.length));
        relG.append("path")
          .attr("class", "framework-trunk")
          .attr("d", `M${targetCollectorX},${Math.min(...ys, classY)} V${Math.max(...ys, classY)}`)
          .attr("stroke", b.sg.color);
        relG.append("path")
          .attr("class", "framework-trunk")
          .attr("d", `M${classRight},${classY} H${targetCollectorX}`)
          .attr("stroke", b.sg.color);
        targets.forEach((id, idx) => {
          const pos = b.localNodePositions[id];
          const targetSlot = takeCount(columnSlots, `t-${pos.col}`);
          const targetPort = takeCount(targetSeen, id);
          const port = relationNodePort(pos, "right", targetPort, targetTotals.get(id) || 1);
          const gutterX = pos.x + NODE_W + 18 + targetSlot * EDGE_ROUTE_SLOT;
          const y = ys[idx];
          relG.append("path")
            .attr("class", "framework-branch")
            .attr("data-node", id)
            .attr("d", `M${targetCollectorX},${y} H${gutterX} V${port.y} H${port.x}`)
            .attr("stroke", b.sg.color)
            .attr("marker-end", "url(#local-arrow)");
        });
      }

      relG.append("rect")
        .datum(rel)
        .attr("class", "relation-class-node")
        .attr("x", classX)
        .attr("y", classY - RELATION_CLASS_H / 2)
        .attr("width", RELATION_CLASS_W)
        .attr("height", RELATION_CLASS_H)
        .attr("rx", 8)
        .attr("ry", 8);
      relG.append("text")
        .datum(rel)
        .attr("class", "relation-class-text")
        .attr("x", classCenterX)
        .attr("y", classY - 1)
        .attr("text-anchor", "middle")
        .text(shortenLabel(predicateLabel(rel.predicate), 28));
      relG.append("text")
        .datum(rel)
        .attr("class", "relation-class-count")
        .attr("x", classCenterX)
        .attr("y", classY + 10)
        .attr("text-anchor", "middle")
        .text(shortenLabel(relationClassCountText(rel), 34));
    });
  }

      ng.append("rect")

      ng.append("circle")

      ng.append("text")

      setNodeText(ng, node);
      const rels = b.relationMembership.get(node.i);

  // ─── Zoom state ─────────────────────────────────────────────────────────────
  let highlightFrame = null;
  function scheduleHighlightUpdate() {
    if (highlightFrame !== null) return;
    highlightFrame = requestAnimationFrame(() => {
      highlightFrame = null;
      updateHighlights();
    });
  }

  function applySemanticZoom(k) {
    state.zoomK = k;
    updateArrowMarkers(k);
    scheduleHighlightUpdate();
  }

  // ─── Zoom / pan ─────────────────────────────────────────────────────────────
  const zoom = d3
    .zoom()
    .scaleExtent([0.08, 4])
    .on("zoom", (ev) => {
      gRoot.attr("transform", ev.transform);
      applySemanticZoom(ev.transform.k);
    });

  svg.call(zoom).on("click", () => {
    clearSelection();
  });

  function fitAll(duration = 0) {
    const rect = svg.node().getBoundingClientRect();
    const pad = 40;
    const sx = (rect.width - pad * 2) / maxX;
    const sy = (rect.height - pad * 2) / maxY;
    const k = Math.min(sx, sy, 1.2);
    const tx = (rect.width - maxX * k) / 2;
    const ty = (rect.height - maxY * k) / 2;
    const t = d3.zoomIdentity.translate(tx, ty).scale(k);
    if (duration) {
      svg.interrupt();
      svg.transition().duration(duration).ease(d3.easeCubicOut).call(zoom.transform, t);
    } else {
      svg.interrupt();
      svg.call(zoom.transform, t);
    }
  }

  function zoomToBlock(b, duration = 360) {
    const rect = svg.node().getBoundingClientRect();
    const pad = 60;
    const k = Math.min((rect.width - pad) / b.w, (rect.height - pad) / b.h, 2);
    const tx = rect.width / 2 - (b.x + b.w / 2) * k;
    const ty = rect.height / 2 - (b.y + b.h / 2) * k;
    svg.interrupt();
    svg.transition().duration(duration).ease(d3.easeCubicOut).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(k));
  }

  function zoomToNodes(indices, duration = 360) {
    if (!indices.length) return;
    let minX = Infinity, minY = Infinity, maxX2 = -Infinity, maxY2 = -Infinity;
    indices.forEach((idx) => {
      const n = nodes[idx];
      const b = blocks[n.sg];
      const p = b.nodePositions[idx];
      minX = Math.min(minX, p.x - 20);
      minY = Math.min(minY, p.y - 20);
      maxX2 = Math.max(maxX2, p.x + NODE_W + 24);
      maxY2 = Math.max(maxY2, p.y + 20);
    });
    const rect = svg.node().getBoundingClientRect();
    const pad = 80;
    const w = maxX2 - minX;
    const h = maxY2 - minY;
    const k = Math.min((rect.width - pad) / w, (rect.height - pad) / h, 2.5);
    const tx = rect.width / 2 - (minX + w / 2) * k;
    const ty = rect.height / 2 - (minY + h / 2) * k;
    svg.interrupt();
    svg.transition().duration(duration).ease(d3.easeCubicOut).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(Math.max(k, 0.85)));
  }

  // ─── Selection & highlight ──────────────────────────────────────────────────
  function clearSelection() {
    state.selectedNode = null;
    state.selectedRelation = null;
    state.selectedSg = null;
    state.pathId = "";
    state.pathNodes = new Set();
    pathSelect.value = "";
    closeDetail();
    scheduleHighlightUpdate();
    clearPathOverlay();
  }

  function selectNode(idx) {
    state.selectedNode = idx;
    state.selectedRelation = null;
    state.selectedSg = null;
    state.pathId = "";
    state.pathNodes = new Set();
    pathSelect.value = "";
    clearPathOverlay();
    const n = nodes[idx];
    const sg = sgByIndex[n.sg];
    showDetailShell(nodeName(idx), `${sg.label} / ${SG_LABEL_ZH[sg.i] || sg.label}`, sg.color);
    scheduleHighlightUpdate();
    requestAnimationFrame(() => {
      if (state.selectedNode !== idx) return;
      renderDetailSafely(() => showNodeDetail(idx), nodeName(idx));
    });
  }

  function selectRelation(sgIndex, predicate) {
    state.selectedNode = null;
    state.selectedRelation = { sg: sgIndex, predicate };
    state.selectedSg = null;
    state.pathId = "";
    state.pathNodes = new Set();
    pathSelect.value = "";
    clearPathOverlay();
    const sg = sgByIndex[sgIndex];
    showDetailShell(predicateLabel(predicate), `${sg.label} / ${SG_LABEL_ZH[sg.i] || sg.label}`, sg.color);
    scheduleHighlightUpdate();
    requestAnimationFrame(() => {
      if (!state.selectedRelation || state.selectedRelation.sg !== sgIndex || state.selectedRelation.predicate !== predicate) return;
      renderDetailSafely(() => showRelationDetail(sgIndex, predicate), predicateLabel(predicate));
    });
  }

  function relationEdges(sgIndex, predicate) {
    return edges.filter((e) => e.sg === sgIndex && e.predicate === predicate);
  }

  function uniqueNodeButtons(indices) {
    const seen = new Set();
    return indices
      .filter((idx) => {
        if (seen.has(idx)) return false;
        seen.add(idx);
        return true;
      })
      .map((idx) => `<li><button type="button" class="link-btn" data-node="${idx}">${escapeHtml(nodeName(idx))}</button></li>`)
      .join("") || `<li class="muted">${ui("noItems")}</li>`;
  }

  function moreSuffix(total, shown) {
    if (total <= shown) return "";
    return `<li class="muted">+${total - shown} ${ui("more")}</li>`;
  }

  function edgeItemHtml(e, arrow) {
    const relation = escapeHtml(predicateLabel(e.predicate));
    const source = `<button type="button" class="link-btn" data-node="${e.source}">${escapeHtml(nodeName(e.source))}</button>`;
    const target = `<button type="button" class="link-btn" data-node="${e.target}">${escapeHtml(nodeName(e.target))}</button>`;
    return `<li><button type="button" class="link-btn relation-btn pred" data-sg="${e.sg}" data-predicate="${e.predicate}">${relation}</button> ${arrow} ${arrow === "←" ? source : target}</li>`;
  }

  }
