      <h3 class="section-title">${ui("englishExplanation")}</h3>
      <p class="detail-desc">${escapeHtml(nodeEnglishDescription(n))}</p>
      <p class="detail-meta">${degree[idx]} ${ui("connections")} ${hubSet.has(idx) ? "· " + ui("hubNode") : ""}</p>
      ${hierarchyDetailHtml(n)}
      <h3 class="section-title">${ui("incoming")} (${incoming.length})</h3>
      <ul class="edge-list">${incoming.slice(0, 20).map(e =>
        edgeItemHtml(e, "←")
      ).join("")}${moreSuffix(incoming.length, 20)}</ul>
      <h3 class="section-title">${ui("outgoing")} (${outgoing.length})</h3>
      <ul class="edge-list">${outgoing.slice(0, 20).map(e =>
        edgeItemHtml(e, "→")
      ).join("")}${moreSuffix(outgoing.length, 20)}</ul>
    `;
    openDetail();
    bindDetailLinks();
  }

  function showRelationDetail(sgIndex, predicate) {
    const sg = sgByIndex[sgIndex];
    const relEdges = relationEdges(sgIndex, predicate);
    const sources = relEdges.map((e) => e.source);
    const targets = relEdges.map((e) => e.target);
    detailInner.innerHTML = `
      <div class="detail-badge" style="color:${sg.color};border-color:${sg.color}">SG${sgIndex} · ${escapeHtml(displaySubgraphLabel(sg))}</div>
      <div class="detail-key">${escapeHtml(predicate)}</div>
      <h2 class="detail-title">${escapeHtml(predicateLabel(predicate))}</h2>
      <p class="detail-zh">EN: ${escapeHtml(predicate)} · 中文: ${escapeHtml(predicateZh(predicate))}</p>
      <h3 class="section-title">${ui("description")}</h3>
      <p class="detail-desc">${predicateDescription(predicate)}</p>
      <p class="detail-meta">${relEdges.length} ${ui("connectedEdges")}</p>
      <h3 class="section-title">${ui("sources")} (${new Set(sources).size})</h3>
      <ul class="edge-list">${uniqueNodeButtons(sources)}</ul>
      <h3 class="section-title">${ui("targets")} (${new Set(targets).size})</h3>
      <ul class="edge-list">${uniqueNodeButtons(targets)}</ul>
      <h3 class="section-title">${ui("connectedEdges")} (${relEdges.length})</h3>
      <ul class="edge-list">${relEdges.slice(0, 30).map(edgePairHtml).join("")}${moreSuffix(relEdges.length, 30)}</ul>
    `;
    openDetail();
    bindDetailLinks();
  }

  function bindDetailLinks() {
    detailInner.querySelectorAll(".link-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const idx = +btn.dataset.node;
        if (!Number.isFinite(idx)) return;
        selectNode(idx);
        zoomToNodes([idx]);
      });
    });
    detailInner.querySelectorAll(".relation-btn").forEach((btn) => {
      btn.addEventListener("click", (ev) => {
        ev.stopPropagation();
        selectRelation(+btn.dataset.sg, btn.dataset.predicate);
      });
    });
    detailInner.querySelectorAll(".sg-btn").forEach((btn) => {
      btn.addEventListener("click", (ev) => {
        ev.stopPropagation();
        const sgIndex = +btn.dataset.sg;
        if (!Number.isFinite(sgIndex) || !blocks[sgIndex]) return;
        zoomToBlock(blocks[sgIndex]);
        showSgDetail(blocks[sgIndex]);
        scheduleHighlightUpdate();
      });
    });
  }

  function relationKey(sgIndex, predicate) {
    return `${sgIndex}|${predicate}`;
  }

  function rememberRelationEndpoint(focus, key, idx) {
    if (!focus.relationNodes.has(key)) focus.relationNodes.set(key, new Set());
    focus.relationNodes.get(key).add(idx);
  }

  function rememberFocusEdge(focus, seen, e) {
    const key = `${e.sg}|${e.predicate}|${e.source}|${e.target}`;
    if (seen.has(key)) return;
    seen.add(key);
    focus.edges.push(e);
    focus.nodes.add(e.source);
    focus.nodes.add(e.target);
    const relKey = relationKey(e.sg, e.predicate);
    focus.relations.add(relKey);
    rememberRelationEndpoint(focus, relKey, e.source);
    rememberRelationEndpoint(focus, relKey, e.target);
    const sSg = nodes[e.source].sg;
    const tSg = nodes[e.target].sg;
    if (sSg !== tSg) focus.crossPairs.add(`${sSg}->${tSg}`);
  }

  function currentFocus() {
    const focus = {
      active: false,
      scope: "",
      primaryNodes: new Set(),
      nodes: new Set(),
      relations: new Set(),
      relationNodes: new Map(),
      crossPairs: new Set(),
      edges: [],
    };
    const seenEdges = new Set();
    if (state.selectedNode !== null) {
      focus.active = true;
      focus.scope = "node";
      focus.primaryNodes.add(state.selectedNode);
      focus.nodes.add(state.selectedNode);
      edges.forEach((e) => {
        if (e.source !== state.selectedNode && e.target !== state.selectedNode) return;
        rememberFocusEdge(focus, seenEdges, e);
      });
    }
    if (state.selectedRelation) {
      focus.active = true;
      focus.scope = "relation";
      const relEdges = relationEdges(state.selectedRelation.sg, state.selectedRelation.predicate);
      focus.relations.add(relationKey(state.selectedRelation.sg, state.selectedRelation.predicate));
      relEdges.forEach((e) => {
        rememberFocusEdge(focus, seenEdges, e);
      });
    }
    return focus;
  }

  function updateHighlights() {
    const q = state.searchQuery.trim().toLowerCase();
    const searching = q.length > 0;
    const matches = state.searchMatches;
    const pathSet = state.pathNodes;
    const sel = state.selectedNode;
    const focus = currentFocus();

    gBlocks.selectAll(".node").each(function () {
      const idx = +this.getAttribute("data-index");
      const el = d3.select(this);
      el.classed("selected", idx === sel);
      el.classed("focus-primary", focus.primaryNodes.has(idx));
      el.classed("focus-related", focus.active && focus.nodes.has(idx) && !focus.primaryNodes.has(idx));
      el.classed("focus-muted", focus.active && !focus.nodes.has(idx));
      el.classed("path-node", pathSet.has(idx));
      if (searching) {
        el.classed("search-match", matches.has(idx));
        el.classed("dimmed", !matches.has(idx));
      } else {
        el.classed("search-match", false);
        el.classed("dimmed", false);
      }
    });

    gBlocks.selectAll(".relation-class").each(function (rel) {
      const sgIndex = +this.getAttribute("data-sg");
      const predicate = this.getAttribute("data-predicate");
      const key = relationKey(sgIndex, predicate);
      const isFocused = focus.relations.has(key);
      const isPreciseNodeFocus = isFocused && focus.scope === "node";
      const focusedEndpoints = focus.relationNodes.get(key);
      const relSel = d3.select(this);
      relSel
        .classed("relation-focus", isFocused)
        .classed("precise-node-focus", isPreciseNodeFocus)
        .classed("relation-muted", focus.active && !isFocused);
      relSel.selectAll(".framework-trunk")
        .classed("trunk-focus", isFocused && focus.scope === "relation");
      relSel.selectAll(".framework-branch")
        .classed("branch-focus", function () {
          if (!isFocused || !focusedEndpoints) return false;
          return focus.scope === "relation" && focusedEndpoints.has(+this.getAttribute("data-node"));
        })
        .classed("branch-muted", function () {
          if (!isFocused || !focusedEndpoints) return false;
          return focus.scope === "relation" && !focusedEndpoints.has(+this.getAttribute("data-node"));
        });
    });

    gBlocks.selectAll(".block").classed("dimmed-block", function (d) {
      return searching && !d.list.some((n) => matches.has(n.i));
    });

    gLinks.selectAll(".cross-link").classed("path-link", function () {
      if (!pathSet.size) return false;
      const ssg = +this.getAttribute("data-source-sg");
      const tsg = +this.getAttribute("data-target-sg");
      const pathSgs = new Set([...pathSet].map((i) => nodes[i].sg));
      return pathSgs.has(ssg) && pathSgs.has(tsg);
    }).classed("focus-link", function () {
      const ssg = +this.getAttribute("data-source-sg");
      const tsg = +this.getAttribute("data-target-sg");
      return focus.scope === "relation" && focus.crossPairs.has(`${ssg}->${tsg}`);
    }).classed("muted-link", function () {
      const ssg = +this.getAttribute("data-source-sg");
      const tsg = +this.getAttribute("data-target-sg");
      if (!focus.active) return false;
      if (focus.scope === "node") return true;
      return !focus.crossPairs.has(`${ssg}->${tsg}`);
    });

    drawFocusOverlay(focus);
  }

  function clearFocusOverlay() {
    gFocus.selectAll("*").remove();
  }

  function nodeCenterPoint(idx) {
    const n = nodes[idx];
    if (!n) return null;
    const b = blocks[n.sg];
    const p = b && b.nodePositions ? b.nodePositions[idx] : null;
    if (!p) return null;
    return { x: p.x + NODE_W / 2, y: p.y };
  }

  function nodeBounds(idx) {
    const n = nodes[idx];
    if (!n) return null;
    const b = blocks[n.sg];
    const p = b && b.nodePositions ? b.nodePositions[idx] : null;
    if (!p) return null;
    return {
      left: p.x,
      right: p.x + NODE_W,
      top: p.y - NODE_H / 2,
      bottom: p.y + NODE_H / 2,
      cx: p.x + NODE_W / 2,
      cy: p.y,
    };
  }

  function nodeOutsidePort(idx, towardX, gap = 9) {
    const box = nodeBounds(idx);
    if (!box) return null;
    const side = towardX >= box.cx ? "right" : "left";
    return {
      x: side === "right" ? box.right + gap : box.left - gap,
      y: box.cy,
      side,
    };
  }

  function relationClassPoint(e) {
    const b = blocks[e.sg];
    return b && b.relationClassPositions ? b.relationClassPositions[e.predicate] : null;
  }

  function relationSidePort(relPoint, nodePoint) {
    const side = nodePoint.x < relPoint.x ? -1 : 1;
    return {
      x: relPoint.x + side * (RELATION_CLASS_W / 2 + 8),
      y: relPoint.y,
    };
  }

  function focusEdgeGeometry(e, ordinal) {
    const sourceCenter = nodeCenterPoint(e.source);
    const targetCenter = nodeCenterPoint(e.target);
    if (!sourceCenter || !targetCenter) return null;
    const relPoint = relationClassPoint(e);
    if (relPoint) {
      const sourcePort = nodeOutsidePort(e.source, relPoint.x, 9);
      const sourceLane = nodeOutsidePort(e.source, relPoint.x, 28);
      const targetPort = nodeOutsidePort(e.target, relPoint.x, 9);
      const targetLane = nodeOutsidePort(e.target, relPoint.x, 28);
      if (!sourcePort || !sourceLane || !targetPort || !targetLane) return null;
      const relIn = relationSidePort(relPoint, sourcePort);
      const relOut = relationSidePort(relPoint, targetPort);
      const laneOffset = ((ordinal % 5) - 2) * 3.6;
      const laneY = relPoint.y + laneOffset;
      const d = [
        `M${sourcePort.x},${sourcePort.y}`,
        `H${sourceLane.x}`,
        `V${laneY}`,
        `H${relIn.x}`,
        `M${relOut.x},${laneY}`,
        `H${targetLane.x}`,
        `V${targetPort.y}`,
        `H${targetPort.x}`,
      ].join(" ");
      return {
        d,
        sourceCenter,
        targetCenter,
        sourceMarker: sourcePort,
        targetMarker: targetPort,
        arrowStart: targetLane,
        arrowEnd: targetPort,
        label: { x: relPoint.x, y: laneY },
        relPoint,
      };
    }
    const sourcePort = nodeOutsidePort(e.source, targetCenter.x, 9);
    const sourceLane = nodeOutsidePort(e.source, targetCenter.x, 28);
    const targetPort = nodeOutsidePort(e.target, sourceCenter.x, 9);
    const targetLane = nodeOutsidePort(e.target, sourceCenter.x, 28);
    if (!sourcePort || !sourceLane || !targetPort || !targetLane) return null;
    const offset = ((ordinal % 7) - 3) * 12;
    const midX = (sourceLane.x + targetLane.x) / 2 + offset;
    const d = [
      `M${sourcePort.x},${sourcePort.y}`,
      `H${sourceLane.x}`,
      `C${midX},${sourceLane.y} ${midX},${targetLane.y} ${targetLane.x},${targetLane.y}`,
      `H${targetPort.x}`,
    ].join(" ");
    return {
      d,
      sourceCenter,
      targetCenter,
      sourceMarker: sourcePort,
      targetMarker: targetPort,
      arrowStart: targetLane,
      arrowEnd: targetPort,
      label: { x: midX, y: (sourcePort.y + targetPort.y) / 2 },
      relPoint: null,
    };
  }

  function drawFocusArrow(start, end, className) {
    if (!start || !end) return;
    gFocus.append("path")
      .attr("class", className)
      .attr("d", `M${start.x},${start.y} L${end.x},${end.y}`)
      .attr("marker-end", "url(#focus-arrow)");
  }

  function drawFocusOverlay(focus) {
    clearFocusOverlay();
    if (!focus.active || !focus.edges.length) return;

    const endpointMarkers = new Map();
    function addMarker(idx, role, point) {
      if (!point) return;
      const key = `${idx}|${role}|${Math.round(point.x)}|${Math.round(point.y)}`;
      endpointMarkers.set(key, { idx, role, point });
    }

    const labelSeen = new Set();
    const overlayEdges = focus.scope === "node"
      ? focus.edges.slice(0, 18)
      : focus.edges.slice(0, 48);
    overlayEdges.forEach((e, i) => {
      const geom = focusEdgeGeometry(e, i);
      if (!geom) return;
      addMarker(e.source, "S", geom.sourceMarker);
      addMarker(e.target, "T", geom.targetMarker);
      gFocus.append("path")
        .attr("class", `focus-edge${nodes[e.source].sg === nodes[e.target].sg ? "" : " focus-edge-secondary"}`)
        .attr("d", geom.d);
      drawFocusArrow(
        geom.arrowStart,
        geom.arrowEnd,
        `focus-edge${nodes[e.source].sg === nodes[e.target].sg ? "" : " focus-edge-secondary"}`,
      );

      const labelKey = relationKey(e.sg, e.predicate);
      if (!geom.relPoint && !labelSeen.has(labelKey)) {
        labelSeen.add(labelKey);
        const label = shortenLabel(predicateLabel(e.predicate), 30);
        const labelW = Math.max(82, Math.min(220, label.length * 6.2 + 18));
        gFocus.append("rect")
          .attr("class", "focus-edge-label-bg")
          .attr("x", geom.label.x - labelW / 2)
          .attr("y", geom.label.y - 10)
          .attr("width", labelW)
          .attr("height", 20);
        gFocus.append("text")
          .attr("class", "focus-edge-label")
          .attr("x", geom.label.x)
          .attr("y", geom.label.y)
          .text(label);
      }
    });

    endpointMarkers.forEach(({ role, point }) => {
      const ep = gFocus.append("g").attr("transform", `translate(${point.x},${point.y})`);
      ep.append("circle")
        .attr("class", "focus-endpoint")
        .attr("r", 7);
      ep.append("text")
        .attr("class", "focus-endpoint-label")
        .attr("dy", "0.05em")
        .text(role);
    });
  }

  function clearPathOverlay() {
    gPath.selectAll("*").remove();
  }

  function drawPathOverlay(pathNodeIndices) {
    clearPathOverlay();
    if (pathNodeIndices.length < 2) return;
    const pts = pathNodeIndices.map((idx) => {
      const n = nodes[idx];
      const b = blocks[n.sg];
      const p = b.nodePositions[idx];
      return { x: p.x, y: p.y, sg: n.sg, idx };
    });
    const segs = [];
    for (let i = 0; i < pts.length - 1; i++) {
      const a = pts[i];
      const b = pts[i + 1];
      if (a.sg === b.sg) {
        segs.push(`M${a.x},${a.y} L${b.x},${b.y}`);
      } else {
        const midX = (a.x + b.x) / 2;
        segs.push(`M${a.x},${a.y} C${midX},${a.y} ${midX},${b.y} ${b.x},${b.y}`);
      }
    }
    segs.forEach((d) => {
      gPath.append("path").attr("class", "path-segment").attr("d", d).attr("fill", "none");
    });
    pts.forEach((p, i) => {
      const mg = gPath.append("g").attr("transform", `translate(${p.x},${p.y})`);
      mg.append("circle").attr("class", "path-marker").attr("r", 9);
      mg.append("text")
        .attr("text-anchor", "middle")
        .attr("dy", "0.35em")
        .attr("fill", "var(--path-color)")
        .attr("font-size", "8px")
        .attr("font-weight", "700")
        .attr("pointer-events", "none")
        .text(i + 1);
    });
  }

  // ─── Search ─────────────────────────────────────────────────────────────────
  function runSearch() {
    const q = searchInput.value.trim().toLowerCase();
    state.searchQuery = q;
    state.searchMatches = new Set();
    if (q) {
      nodes.forEach((n) => {
        if (
          n.key.toLowerCase().includes(q) ||
          n.label.toLowerCase().includes(q) ||
          n.labelZh.includes(q)
        ) {
          state.searchMatches.add(n.i);
        }
      });
      statusEl.textContent = state.lang === "zh"
        ? `${state.searchMatches.size} 个匹配`
        : state.lang === "both"
          ? `${state.searchMatches.size} matches / ${state.searchMatches.size} 个匹配`
          : `${state.searchMatches.size} match${state.searchMatches.size === 1 ? "" : "es"}`;
    } else {
      statusEl.textContent = "";
    }
    scheduleHighlightUpdate();
  }

  searchInput.addEventListener("input", runSearch);

  // ─── Path select ────────────────────────────────────────────────────────────
  paths.forEach((p) => {
    const opt = document.createElement("option");
    opt.value = p.id;
    opt.textContent = pathLabel(p);
    pathSelect.appendChild(opt);
  });

  pathSelect.addEventListener("change", () => {
    const id = pathSelect.value;
    if (!id) {
      state.selectedNode = null;
      state.selectedRelation = null;
      state.pathNodes = new Set();
      clearPathOverlay();
      scheduleHighlightUpdate();
      return;
    }
    const path = paths.find((p) => p.id === id);
    const valid = (path.nodes || []).filter((i) => i >= 0 && i < nodes.length);
    state.pathNodes = new Set(valid);
    state.pathId = id;
    state.selectedNode = null;
    state.selectedRelation = null;
    drawPathOverlay(valid);
    scheduleHighlightUpdate();
    zoomToNodes(valid);
  });

  // ─── Tooltip ────────────────────────────────────────────────────────────────
  function showTooltip(ev, node) {
    const descEn = nodeEnglishDescription(node);
    const descZh = nodeChineseDescription(node);
    const desc = state.lang === "zh"
      ? escapeHtml(descZh)
      : state.lang === "both"
        ? `${escapeHtml(descEn)}<br>${escapeHtml(descZh)}`
        : escapeHtml(descEn);
    tooltip.innerHTML = `<strong>${escapeHtml(nodeName(node.i))}</strong><span class="tt-zh">EN: ${escapeHtml(node.label)} · 中文: ${escapeHtml(node.labelZh || node.label)}</span><span class="tt-desc">${desc}</span>`;
    tooltip.classList.add("visible");
    moveTooltip(ev);
  }
  function moveTooltip(ev) {
    tooltip.style.left = ev.clientX + 14 + "px";
    tooltip.style.top = ev.clientY + 14 + "px";
  }
  function hideTooltip() {
    tooltip.classList.remove("visible");
  }

  // ─── Theme ──────────────────────────────────────────────────────────────────
  function setTheme(t) {
    state.theme = t;
    document.documentElement.dataset.theme = t;
    document.getElementById("theme-btn").textContent = t === "dark" ? "☀" : "☾";
  }
  document.getElementById("theme-btn").addEventListener("click", () => {
    setTheme(state.theme === "dark" ? "light" : "dark");
  });
  langSelect.addEventListener("change", () => {
    state.lang = langSelect.value;
    refreshLanguage();
    if (state.selectedNode !== null) showNodeDetail(state.selectedNode);
    if (state.selectedRelation) showRelationDetail(state.selectedRelation.sg, state.selectedRelation.predicate);
    if (state.selectedSg !== null) showSgDetail(blocks[state.selectedSg]);
    runSearch();
    scheduleHighlightUpdate();
  });

  document.getElementById("fit-btn").addEventListener("click", () => fitAll(320));
  document.getElementById("close-detail").addEventListener("click", () => {
    closeDetail();
  });
  detailSizeBtn.addEventListener("click", toggleDetailSize);
  detailRail.addEventListener("click", () => {
    if (state.selectedNode !== null) {
      showNodeDetail(state.selectedNode);
    } else if (state.selectedRelation) {
      showRelationDetail(state.selectedRelation.sg, state.selectedRelation.predicate);
    } else if (state.selectedSg !== null && blocks[state.selectedSg]) {
      showSgDetail(blocks[state.selectedSg]);
    } else {
      showOverviewDetail();
    }
  });

  window.addEventListener("resize", () => fitAll(0));

  // ─── Init ───────────────────────────────────────────────────────────────────
  setTheme("dark");
  refreshLanguage();
  fitAll(0);
})();

</script>
</body>
</html>
