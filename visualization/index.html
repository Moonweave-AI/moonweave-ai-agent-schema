<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Ontology Architecture</title>
<script src="vendor/d3.min.js"></script>
<style>

*,*::before,*::after{box-sizing:border-box}
:root,[data-theme="dark"]{
  --bg:#070b14;--bg-grad:rgba(30,50,90,.12);
  --topbar:rgba(12,18,32,.82);--topbar-border:rgba(60,80,120,.35);
  --text:#e8eef5;--muted:#8da0ba;--label:#c8d6e5;
  --block-bg:#0b1220;--block-border:rgba(92,116,154,.58);
  --header-border:rgba(60,80,120,.5);
  --input-bg:rgba(20,30,50,.9);--input-border:rgba(60,80,120,.45);
  --detail-bg:rgba(12,18,32,.95);--tooltip-bg:rgba(16,24,42,.94);
  --cross-glow:rgba(100,140,220,.35);--path-color:#5eead4;
  --selected-glow:#69a7ff;--search-glow:#fbbf24;
}
[data-theme="light"]{
  --bg:#f0f4fa;--bg-grad:rgba(100,140,200,.08);
  --topbar:rgba(255,255,255,.88);--topbar-border:rgba(120,140,170,.3);
  --text:#1a2332;--muted:#5a6a80;--label:#2d3a4d;
  --block-bg:#ffffff;--block-border:rgba(120,140,170,.45);
  --header-border:rgba(120,140,170,.4);
  --input-bg:#fff;--input-border:rgba(120,140,170,.4);
  --detail-bg:rgba(255,255,255,.98);--tooltip-bg:rgba(255,255,255,.96);
  --cross-glow:rgba(60,100,180,.2);--path-color:#0d9488;
  --selected-glow:#2563eb;--search-glow:#d97706;
}
html,body{width:100%;height:100%;margin:0;overflow:hidden;
  background:var(--bg);color:var(--text);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  transition:background .2s,color .2s}
#app{height:100%;display:flex;flex-direction:column;position:relative}
.topbar{
  height:54px;flex:none;display:flex;align-items:center;gap:16px;padding:0 18px;
  background:var(--topbar);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--topbar-border);z-index:10}
.brand h1{font-size:15px;font-weight:650;margin:0 0 2px;letter-spacing:-.01em}
.brand p{font-size:11px;margin:0;color:var(--muted)}
.controls{display:flex;align-items:center;gap:8px;margin-left:auto;flex-wrap:wrap}
.controls input,.controls select,.controls button{
  height:32px;border:1px solid var(--input-border);border-radius:8px;
  background:var(--input-bg);color:var(--text);padding:0 10px;font-size:12px;
  transition:border-color .2s,background .2s}
.controls input{width:min(220px,30vw)}
.controls input:focus,.controls select:focus{outline:none;border-color:var(--selected-glow)}
.controls button{cursor:pointer}
.controls button:hover{border-color:var(--selected-glow)}
#status{font-size:11px;color:var(--search-glow);min-width:60px}
.main-area{flex:1;min-height:0;position:relative;overflow:hidden;
  background:
    radial-gradient(circle,rgba(145,165,195,.18) 1px,transparent 1.4px) 0 0/34px 34px,
    radial-gradient(ellipse 80% 50% at 50% 0%,var(--bg-grad),transparent 70%),
    var(--bg)}
#canvas{width:100%;height:100%;display:block;cursor:grab}
#canvas:active{cursor:grabbing}
.block-bg{fill:var(--block-bg);stroke:var(--block-border);stroke-width:1.15}
.block-header-line{fill:var(--header-border)}
.header-title{font-size:12px;font-weight:600;fill:var(--text)}
.header-count{font-size:10px;fill:var(--muted)}
.block-zoom-label{font-size:18px;font-weight:700;fill:var(--text);opacity:.85;display:none}
.node-card{fill:rgba(8,13,24,.52);stroke:rgba(180,205,238,.26);stroke-width:1;rx:7}
.node-dot{stroke:rgba(255,255,255,.7);stroke-width:.9}
.node-label{font-size:10px;fill:var(--label);pointer-events:none;font-weight:600}
.node-label-secondary{font-size:8px;fill:var(--muted);pointer-events:none}
.block-internal-edges{pointer-events:auto}
.framework-bg{fill:rgba(7,12,22,.32);stroke:rgba(145,165,195,.34);stroke-width:1;rx:12}
.framework-plane-bg{fill:rgba(7,12,22,.52);stroke:rgba(145,165,195,.28);stroke-width:.9;rx:10}
.framework-section-title{font-family:ui-monospace,Consolas,monospace;font-size:7.5px;fill:var(--muted);pointer-events:none}
.framework-class-band{stroke:rgba(145,165,195,.10);stroke-width:.65;stroke-dasharray:3 5;shape-rendering:crispEdges}
.framework-branch{fill:none;stroke:rgba(145,165,195,.42);stroke-width:.75;shape-rendering:crispEdges}
.framework-trunk{fill:none;stroke:rgba(145,165,195,.68);stroke-width:1.2;shape-rendering:crispEdges}
.relation-class-node{fill:rgba(18,28,48,.96);stroke:rgba(180,205,238,.54);stroke-width:1;rx:8}
.relation-class-text{font-family:ui-monospace,Consolas,monospace;font-size:8.5px;fill:#cbe2ff;pointer-events:none}
.relation-class-count{font-family:ui-monospace,Consolas,monospace;font-size:7px;fill:var(--muted);pointer-events:none}
.node-relation-tags{font-family:ui-monospace,Consolas,monospace;font-size:7px;fill:#a9c8ee;pointer-events:none}
.hierarchy-column-guide{stroke:rgba(145,165,195,.14);stroke-width:.8;stroke-dasharray:4 8;shape-rendering:crispEdges}
.hierarchy-level-label{font-family:ui-monospace,Consolas,monospace;font-size:8px;fill:var(--muted);font-weight:700;letter-spacing:.03em;pointer-events:none}
.hierarchy-group-box{fill:rgba(8,13,24,.30);stroke:rgba(145,165,195,.20);stroke-width:.8;stroke-dasharray:3 5;rx:8}
.hierarchy-group-label{font-size:8px;fill:#a9c8ee;font-weight:650;pointer-events:none}
.hierarchy-parent-link{fill:none;stroke:rgba(145,165,195,.25);stroke-width:.85;shape-rendering:crispEdges;pointer-events:none}
.node.focus-primary .node-card{stroke:var(--selected-glow);stroke-width:1.7;filter:drop-shadow(0 0 5px var(--selected-glow))}
.node.focus-related .node-card{stroke:rgba(125,190,255,.72);stroke-width:1.2}
.relation-class{cursor:pointer}
.relation-class.relation-focus .relation-class-node{stroke:var(--selected-glow);stroke-width:2;filter:drop-shadow(0 0 6px var(--selected-glow))}
.relation-class .framework-trunk.trunk-focus{stroke-width:1.8;opacity:1;filter:drop-shadow(0 0 4px var(--selected-glow))}
.relation-class .framework-branch.branch-focus{stroke-width:2;opacity:1;filter:drop-shadow(0 0 4px var(--selected-glow))}
.relation-class .framework-branch.branch-muted{opacity:.12}
.relation-class.precise-node-focus .framework-class-band{opacity:.08}
.relation-class.precise-node-focus .framework-trunk{opacity:.04;stroke-width:.8;filter:none}
.relation-class.precise-node-focus .framework-branch{opacity:.025;stroke-width:.7;filter:none}
.relation-class.precise-node-focus .framework-branch.branch-focus{opacity:.08;stroke-width:.9;filter:none}
.relation-class.precise-node-focus .relation-class-count{fill:#d8ecff}
.cross-link.focus-link .cross-path{opacity:1!important;stroke-width:2.4!important;filter:drop-shadow(0 0 5px var(--selected-glow))}
.cross-link.focus-link .cross-label-bg{stroke:var(--selected-glow)}
.focus-muted{opacity:.08!important}
.relation-muted{opacity:.10!important}
.muted-link{opacity:.10!important}
.cross-path{filter:drop-shadow(0 0 3px var(--cross-glow));shape-rendering:crispEdges}
.cross-label-bg{fill:var(--block-bg);stroke:rgba(145,165,195,.38);stroke-width:.8;rx:6}
.cross-label{font-family:ui-monospace,Consolas,monospace;font-size:9px;fill:var(--muted);pointer-events:none}
.node.selected .node-dot{
  stroke:var(--selected-glow);stroke-width:3;
  filter:drop-shadow(0 0 6px var(--selected-glow))}
.node.search-match .node-label{fill:var(--search-glow);font-weight:600}
.node.search-match .node-dot{filter:drop-shadow(0 0 4px var(--search-glow))}
.node.dimmed,.block.dimmed-block{opacity:.18}
.node.path-node .node-dot{stroke:var(--path-color);stroke-width:2}
.cross-link.path-link .cross-path{opacity:1!important;stroke-width:2.5!important;
  filter:drop-shadow(0 0 5px var(--path-color))}
.path-segment{stroke:var(--path-color);stroke-width:2.5;fill:none;
  filter:drop-shadow(0 0 4px var(--path-color));pointer-events:none}
.path-marker{fill:none;stroke:var(--path-color);stroke-width:2;pointer-events:none}
.focus-overlay{pointer-events:none}
.focus-edge{fill:none;stroke:var(--selected-glow);stroke-width:1.35;opacity:.86;
  filter:drop-shadow(0 0 2px var(--selected-glow));stroke-linejoin:round;stroke-linecap:round}
.focus-edge-secondary{stroke:rgba(125,190,255,.66);stroke-width:1.1;opacity:.62}
.focus-edge-label-bg{fill:var(--block-bg);stroke:var(--selected-glow);stroke-width:.9;rx:7}
.focus-edge-label{font-family:ui-monospace,Consolas,monospace;font-size:8px;fill:#d8ecff;
  text-anchor:middle;dominant-baseline:middle}
.focus-endpoint{fill:var(--block-bg);stroke:var(--selected-glow);stroke-width:1.45;
  filter:drop-shadow(0 0 2px var(--selected-glow))}
.focus-endpoint-label{font-family:ui-monospace,Consolas,monospace;font-size:7px;font-weight:700;
  fill:#d8ecff;text-anchor:middle;dominant-baseline:middle}
.tooltip{
  position:fixed;pointer-events:none;z-index:100;max-width:280px;padding:10px 12px;
  background:var(--tooltip-bg);backdrop-filter:blur(10px);border:1px solid var(--block-border);
  border-radius:10px;font-size:12px;line-height:1.45;opacity:0;transform:translateY(4px);
  transition:opacity .15s,transform .15s}
.tooltip.visible{opacity:1;transform:translateY(0)}
.tooltip strong{display:block;font-size:13px;margin-bottom:2px}
.tooltip .tt-zh{display:block;color:var(--muted);font-size:11px;margin-bottom:4px}
.tooltip .tt-desc{display:block;color:var(--label);font-size:11px}
.detail{
  position:absolute;top:54px;right:0;bottom:0;width:340px;
  background:var(--detail-bg);border-left:1px solid var(--topbar-border);
  transform:translateX(100%);transition:transform .25s ease;z-index:20;
  overflow-y:auto;padding:20px 18px 24px}
.detail.open{transform:translateX(0)}
.close-btn{
  position:absolute;top:10px;right:12px;width:32px;height:32px;border:none;
  background:transparent;color:var(--muted);font-size:22px;cursor:pointer;
  border-radius:8px;transition:background .2s,color .2s;line-height:1}
.close-btn:hover{background:rgba(100,140,200,.15);color:var(--text)}
.detail-badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:999px;
  border:1px solid;margin-bottom:10px;font-weight:600}
.detail-key{font-family:ui-monospace,Consolas,monospace;font-size:11px;color:var(--muted);
  word-break:break-all;margin-bottom:4px}
.detail-title{font-size:20px;font-weight:700;margin:0 0 4px;line-height:1.2}
.detail-zh{font-size:13px;color:var(--muted);margin:0 0 12px}
.detail-desc{font-size:13px;line-height:1.55;color:var(--label);margin:0 0 10px}
.detail-meta{font-size:11px;color:var(--muted);margin:0 0 16px}
.section-title{font-size:10px;text-transform:uppercase;letter-spacing:.08em;
  color:var(--muted);margin:16px 0 8px;font-weight:600}
.edge-list{list-style:none;margin:0;padding:0;font-size:12px}
.edge-list li{margin:5px 0;line-height:1.4}
.edge-list .pred{font-family:ui-monospace,Consolas,monospace;font-size:10px;
  color:var(--muted);margin-right:4px}
.edge-list .muted,.muted{color:var(--muted)}
.link-btn{background:none;border:none;color:var(--selected-glow);cursor:pointer;
  padding:0;font-size:inherit;text-decoration:underline;text-underline-offset:2px;
  transition:opacity .2s}
.link-btn:hover{opacity:.8}
@media(max-width:768px){
  .detail{display:none}
  .controls input{width:120px}
  .brand p{display:none}
}

</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <h1>Agent Ontology Architecture</h1>
      <p>277 nodes · 13 subgraphs · Interactive schema diagram</p>
    </div>
    <div class="controls">
      <input type="search" id="search" placeholder="Search nodes…" autocomplete="off">
      <span id="status"></span>
      <select id="lang-select" title="Language">
        <option value="both">中 / EN</option>
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
      <select id="path-select">
        <option value="">Trace a path…</option>
      </select>
      <button type="button" id="fit-btn">Fit All</button>
      <button type="button" id="theme-btn" title="Toggle theme">☀</button>
    </div>
  </header>
  <div class="main-area">
    <svg id="canvas"></svg>
    <div class="tooltip" id="tooltip"></div>
  </div>
  <aside class="detail" id="detail">
    <button type="button" class="close-btn" id="close-detail" aria-label="Close">×</button>
    <div id="detail-inner"></div>
  </aside>
</div>

    if (!nodesBySg[n.sg]) nodesBySg[n.sg] = [];
    nodesBySg[n.sg].push(n);
  });

  const degree = new Array(nodes.length).fill(0);
  edges.forEach((e) => {
    degree[e.source]++;
    degree[e.target]++;
  });

  const hubRank = Object.fromEntries(topHubOrder.map((idx, r) => [idx, r]));

  const LEVEL_LABELS = [
    ["Anchor", "锚点"],
    ["Primary structures", "一级结构"],
    ["Mechanisms", "机制层"],
    ["Operational units", "执行单元"],
    ["Artifacts and signals", "制品与信号"],
  ];

  function hierarchyLevelLabel(level) {
    const pair = LEVEL_LABELS[level] || ["Level " + level, "第" + level + "层"];
    if (state.lang === "zh") return "L" + level + " · " + pair[1];
    if (state.lang === "both") return "L" + level + " · " + pair[0] + " / " + pair[1];
    return "L" + level + " · " + pair[0];
  }

  function hierarchyGroupLabel(group) {
    if (state.lang === "zh") return group.zh || group.slug;
    if (state.lang === "both") return group.slug + " / " + (group.zh || group.slug);
    return group.slug;
  }

  function sortNodesForBlock(list) {
    return [...list].sort((a, b) => {
      if (a.intraLevel !== b.intraLevel) return a.intraLevel - b.intraLevel;
      const groupOrder = a.intraGroup.localeCompare(b.intraGroup);
      if (groupOrder !== 0) return groupOrder;
      const ah = hubSet.has(a.i);
      const bh = hubSet.has(b.i);
      if (ah && !bh) return -1;
      if (!ah && bh) return 1;
      if (ah && bh) {
        const dr = (hubRank[a.i] ?? 999) - (hubRank[b.i] ?? 999);
        if (dr !== 0) return dr;
      }
      return a.label.localeCompare(b.label);
    });
  }

  // ─── Layout computation ─────────────────────────────────────────────────────
  const GRID = {
    1: { row: 0, col: "center" },
    2: { row: 1, col: "left" },
    6: { row: 1, col: "center" },
    4: { row: 1, col: "right" },
    3: { row: 2, col: "left" },
    5: { row: 2, col: "right" },
    10: { row: 3, col: "left" },
    7: { row: 3, col: "center" },
    11: { row: 3, col: "right" },
    8: { row: 4, col: "left" },
    9: { row: 4, col: "center" },
    0: { row: 5, col: "left" },
    12: { row: 5, col: "center" },
  };
  const COL_X = { left: 40, center: 3160, right: 6280 };
  const CELL_W = 540;
  const CELL_H = 76;
  const NODE_W = 220;
  const NODE_H = 40;
  const PAD_X = 22;
  const HEADER_H = 44;
  const PAD_Y = 34;
  const RELATION_CLASS_W = 250;
  const RELATION_CLASS_H = 30;
  const RELATION_CLASS_GAP = 64;
  const RELATION_BRANCH_SPREAD = 24;
  const EDGE_ROUTE_SLOT = 7;
  const FRAMEWORK_PLANE_PAD = 34;
  const ROW_GAP = 110;
  const MAX_COL_W = 5 * CELL_W + PAD_X * 2;

  function numCols(n) {
    if (n <= 6) return 2;
    if (n <= 13) return 3;
    if (n <= 20) return 4;
    return 5;
  }

  function predicateGroupsForSubgraph(sgIndex) {
    const groups = new Map();
    edges.forEach((e) => {
      if (nodes[e.source].sg !== sgIndex || nodes[e.target].sg !== sgIndex) return;
      if (!groups.has(e.predicate)) {
        groups.set(e.predicate, {
          predicate: e.predicate,
          sources: new Set(),
          targets: new Set(),
          count: 0,
        });
      }
      const group = groups.get(e.predicate);
      group.sources.add(e.source);
      group.targets.add(e.target);
      group.count++;
    });
    return [...groups.values()]
      .map((g) => ({
        ...g,
        sources: [...g.sources],
        targets: [...g.targets],
      }))
      .sort((a, b) => b.count - a.count || a.predicate.localeCompare(b.predicate))
      .map((g, i) => ({ ...g, rid: `R${i + 1}` }));
  }

  function localEdgesForSubgraph(sgIndex) {
    return edges.filter((e) => nodes[e.source].sg === sgIndex && nodes[e.target].sg === sgIndex);
  }

  function pairEdgesForSubgraph(localEdges, relationGroups) {
    const ridByPredicate = new Map(relationGroups.map((rel) => [rel.predicate, rel.rid]));
    const pairs = new Map();
    localEdges.forEach((e) => {
      const key = `${e.source}->${e.target}`;
      if (!pairs.has(key)) {
        pairs.set(key, {
          source: e.source,
          target: e.target,
          predicates: new Set(),
          rids: new Set(),
          count: 0,
        });
      }
      const pair = pairs.get(key);
      pair.predicates.add(e.predicate);
      pair.rids.add(ridByPredicate.get(e.predicate) || e.predicate);
      pair.count++;
    });
    return [...pairs.values()].sort((a, b) => a.source - b.source || a.target - b.target);
  }

  function hierarchyLayoutForBlock(list) {
    const levels = [...new Set(list.map((node) => node.intraLevel))].sort((a, b) => a - b);
    const columns = levels.map((level, col) => {
      const levelNodes = list.filter((node) => node.intraLevel === level);
      const groupMap = new Map();
      levelNodes.forEach((node) => {
        const entry = groupMap.get(node.intraGroup) || {
          slug: node.intraGroup,
          zh: node.intraGroupZh,
          level,
          col,
          nodes: [],
        };
        entry.nodes.push(node);
        groupMap.set(node.intraGroup, entry);
      });
      const groups = [...groupMap.values()].sort((a, b) => a.slug.localeCompare(b.slug));
      groups.forEach((group) => {
        group.nodes.sort((a, b) => {
          const ah = hubSet.has(a.i);
          const bh = hubSet.has(b.i);
          if (ah && !bh) return -1;
          if (!ah && bh) return 1;
          return degree[b.i] - degree[a.i] || a.label.localeCompare(b.label);
        });
      });
      const height = LEVEL_TOP_PAD + groups.reduce((sum, group) => {
        return sum + GROUP_HEADER_H + group.nodes.length * CELL_H + GROUP_GAP;
      }, 0);
      return { level, col, groups, height };
    });
    return {
      levels,
      columns,
      cols: Math.max(1, columns.length),
      height: Math.max(1, ...columns.map((column) => column.height)),
    };
  }

  const GROUP_HEADER_H = 20;
  const GROUP_GAP = 16;
  const LEVEL_TOP_PAD = 30;

  const blocks = {};
  subgraphs.forEach((sg) => {
    const list = sortNodesForBlock(nodesBySg[sg.i] || []);
    const hierarchyLayout = hierarchyLayoutForBlock(list);
    const cols = hierarchyLayout.cols;
    const relationGroups = predicateGroupsForSubgraph(sg.i);
    const localEdges = localEdgesForSubgraph(sg.i);
    const localPairEdges = pairEdgesForSubgraph(localEdges, relationGroups);
    const nodeAreaH = hierarchyLayout.height;
    const w = cols * CELL_W + PAD_X * 2;
    const frameworkStartY = HEADER_H + nodeAreaH + 42;
    const frameworkH = relationGroups.length
      ? FRAMEWORK_PLANE_PAD * 2 + Math.max(1, relationGroups.length) * RELATION_CLASS_GAP
      : 0;
    const h = Math.max(HEADER_H + nodeAreaH + PAD_Y, frameworkStartY + frameworkH + PAD_Y);
    const g = GRID[sg.i];
    const x = COL_X[g.col] + Math.max(0, (MAX_COL_W - w) / 2);
    const y = 0;
    const localNodePositions = {};
    const hierarchyGroups = [];
    const parentLinks = [];
    const nodeIndexByKey = new Map(list.map((node) => [node.key, node]));

    hierarchyLayout.columns.forEach((column) => {
      const colX = PAD_X + column.col * CELL_W;
      let cursorY = HEADER_H + LEVEL_TOP_PAD;
      column.groups.forEach((group) => {
        const groupTop = cursorY;
        cursorY += GROUP_HEADER_H;
        group.nodes.forEach((node, row) => {
          localNodePositions[node.i] = {
            x: colX,
            y: cursorY + row * CELL_H + CELL_H / 2,
            col: column.col,
            row,
            level: node.intraLevel,
            group: node.intraGroup,
          };
        });
        cursorY += group.nodes.length * CELL_H;
        const groupBottom = cursorY + 6;
        hierarchyGroups.push({
          ...group,
          x: colX - 10,
          y: groupTop - 16,
          w: NODE_W + 20,
          h: Math.max(34, groupBottom - groupTop + 14),
        });
        cursorY += GROUP_GAP;
      });
    });

    list.forEach((node) => {
      if (!node.parentKey) return;
      const parent = nodeIndexByKey.get(node.parentKey);
      if (!parent) return;
      const childPos = localNodePositions[node.i];
      const parentPos = localNodePositions[parent.i];
      if (!childPos || !parentPos) return;
      parentLinks.push({ source: parent.i, target: node.i });
    });

    blocks[sg.i] = {
      sg,
      x,
      y,
      w,
      h,
      cols,
      rows: 0,
      list,
      localEdges,
      localPairEdges,
      localNodePositions,
      nodePositions: {},
      relationGroups,
      frameworkStartY,
      frameworkH,
      hierarchyLayout,
      hierarchyGroups,
      parentLinks,
      row: g.row,
      col: g.col
    };
  });

  Object.values(blocks).forEach((b) => {
    const membership = new Map();
    b.relationGroups.forEach((rel) => {
      rel.sources.forEach((id) => {
        const entry = membership.get(id) || { source: [], target: [] };
        entry.source.push(rel.rid);
        membership.set(id, entry);
      });
      rel.targets.forEach((id) => {
        const entry = membership.get(id) || { source: [], target: [] };
        entry.target.push(rel.rid);
        membership.set(id, entry);
      });
    });
    b.relationMembership = membership;
  });

  const rowHeights = {};
  Object.values(blocks).forEach((b) => {
    rowHeights[b.row] = Math.max(rowHeights[b.row] || 0, b.h);
  });
  const rowY = {};
  let nextY = 86;
  const maxRow = Math.max(...Object.values(blocks).map((b) => b.row));
  for (let row = 0; row <= maxRow; row++) {
    rowY[row] = nextY;
    nextY += (rowHeights[row] || 0) + ROW_GAP;
  }
  Object.values(blocks).forEach((b) => {
    b.y = rowY[b.row];
    b.nodePositions = {};
    Object.entries(b.localNodePositions).forEach(([idx, p]) => {
      b.nodePositions[idx] = {
        ...p,
        x: b.x + p.x,
        y: b.y + p.y,
      };
    });
  });

  // Center blocks horizontally within column anchor
  Object.values(blocks).forEach((b) => {
    b.cx = b.x + b.w / 2;
    b.cy = b.y + b.h / 2;
  });

  // Cross-SG edge aggregation
  const crossPairs = new Map();
  edges.forEach((e) => {
    const sSg = nodes[e.source].sg;
    const tSg = nodes[e.target].sg;
    if (sSg === tSg) return;
    const key = sSg + "->" + tSg;
    if (!crossPairs.has(key)) {
      crossPairs.set(key, {
        sourceSg: sSg,
        targetSg: tSg,
        count: 0,
        predicates: {},
      });
    }
    const p = crossPairs.get(key);
    p.count++;
    p.predicates[e.predicate] = (p.predicates[e.predicate] || 0) + 1;
  });

  const crossLinks = [...crossPairs.values()].map((p) => {
    const topPred = Object.entries(p.predicates).sort((a, b) => b[1] - a[1])[0][0];
    return { ...p, topPred };
  });

  const columnBounds = {};
  Object.values(blocks).forEach((b) => {
    if (!columnBounds[b.col]) {
      columnBounds[b.col] = { minX: Infinity, maxX: -Infinity };
    }
    columnBounds[b.col].minX = Math.min(columnBounds[b.col].minX, b.x);
    columnBounds[b.col].maxX = Math.max(columnBounds[b.col].maxX, b.x + b.w);
  });

  const colOrder = { left: 0, center: 1, right: 2 };
  const gutterBus = {
    "left-center": (columnBounds.left.maxX + columnBounds.center.minX) / 2,
    "center-right": (columnBounds.center.maxX + columnBounds.right.minX) / 2,
  };

  function busBetween(aCol, bCol) {
    const a = colOrder[aCol];
    const b = colOrder[bCol];
    if (Math.abs(a - b) <= 1) {
      return a < b
        ? gutterBus[`${aCol}-${bCol}`]
        : gutterBus[`${bCol}-${aCol}`];
    }
    return null;
  }

  function sidePort(block, towardCol) {
    const toRight = colOrder[towardCol] > colOrder[block.col];
    return {
      x: toRight ? block.x + block.w : block.x,
      y: block.cy,
    };
  }

  function rowCorridorY(fromBlock, toBlock, ordinal = 0) {
    const a = fromBlock.row;
    const b = toBlock.row;
    const offset = (ordinal % 5 - 2) * 8;
    if (a === b) {
      const below = fromBlock.y + fromBlock.h + ROW_GAP * 0.45 + offset;
      return below;
    }
    const upper = Math.min(a, b);
    return rowY[upper] + rowHeights[upper] + ROW_GAP * 0.5 + offset;
  }

  function pointsToPath(points) {
    return points.map((p, i) => `${i ? "L" : "M"}${Math.round(p.x)},${Math.round(p.y)}`).join(" ");
  }

  function busRoute(link, fromBlock, toBlock) {
    const start = sidePort(fromBlock, toBlock.col);
    const end = sidePort(toBlock, fromBlock.col);
    const sourceOrder = colOrder[fromBlock.col];
    const targetOrder = colOrder[toBlock.col];
    let points;
    if (fromBlock.col === toBlock.col) {
      const side = fromBlock.col === "left"
        ? columnBounds.left.minX - 90
        : fromBlock.col === "right"
          ? columnBounds.right.maxX + 90
          : (fromBlock.row <= toBlock.row ? gutterBus["left-center"] : gutterBus["center-right"]);
      points = [start, { x: side, y: start.y }, { x: side, y: end.y }, end];
    } else if (Math.abs(sourceOrder - targetOrder) === 1) {
      const bus = busBetween(fromBlock.col, toBlock.col);
      points = [start, { x: bus, y: start.y }, { x: bus, y: end.y }, end];
    } else {
      const leftBus = gutterBus["left-center"];
      const rightBus = gutterBus["center-right"];
      const y = rowCorridorY(fromBlock, toBlock, link.ordinal || 0);
      if (sourceOrder < targetOrder) {
        points = [start, { x: leftBus, y: start.y }, { x: leftBus, y }, { x: rightBus, y }, { x: rightBus, y: end.y }, end];
      } else {
        points = [start, { x: rightBus, y: start.y }, { x: rightBus, y }, { x: leftBus, y }, { x: leftBus, y: end.y }, end];
      }
    }
    const mid = points[Math.floor(points.length / 2)];
    return { points, d: pointsToPath(points), label: { x: mid.x, y: mid.y - 8 } };
  }

  // Canvas bounds
  let maxX = 0, maxY = 0;
  Object.values(blocks).forEach((b) => {
    maxX = Math.max(maxX, b.x + b.w + 80);
    maxY = Math.max(maxY, b.y + b.h + 80);
  });

  // ─── State ──────────────────────────────────────────────────────────────────
  const state = {
    selectedNode: null,
    selectedRelation: null,
    selectedSg: null,
    searchQuery: "",
    searchMatches: new Set(),
    pathId: "",
    pathNodes: new Set(),
    lang: "both",
    theme: "dark",
    zoomK: 1,
  };

  // ─── DOM refs ───────────────────────────────────────────────────────────────
  const svg = d3.select("#canvas");
  const tooltip = document.getElementById("tooltip");
  const detail = document.getElementById("detail");
  const detailInner = document.getElementById("detail-inner");
  const searchInput = document.getElementById("search");
  const langSelect = document.getElementById("lang-select");
  const pathSelect = document.getElementById("path-select");
  const statusEl = document.getElementById("status");

  // ─── Rendering ──────────────────────────────────────────────────────────────
  const gRoot = svg.append("g").attr("class", "root");
  const gBlocks = gRoot.append("g").attr("class", "blocks");
  const gLinks = gRoot.append("g").attr("class", "cross-links");
  const gPath = gRoot.append("g").attr("class", "path-overlay");
  const gFocus = gRoot.append("g").attr("class", "focus-overlay");
  const gDefs = svg.append("defs");

  gDefs.append("marker")
    .attr("id", "local-arrow")
    .attr("viewBox", "0 -4 8 8")
    .attr("refX", 8)
    .attr("refY", 0)
    .attr("markerWidth", 6)
    .attr("markerHeight", 6)
    .attr("orient", "auto")
    .append("path")
    .attr("d", "M0,-4L8,0L0,4")
    .attr("fill", "#8fa3bf");

  gDefs.append("marker")
    .attr("id", "focus-arrow")
    .attr("viewBox", "0 -4 8 8")
    .attr("refX", 8)
    .attr("refY", 0)
    .attr("markerWidth", 5)
    .attr("markerHeight", 5)
    .attr("orient", "auto")
    .append("path")
    .attr("d", "M0,-4L8,0L0,4")
    .attr("fill", "var(--selected-glow)");

  // Gradients for cross links
  crossLinks.forEach((link, i) => {
    const id = "grad-" + link.sourceSg + "-" + link.targetSg;
    link.gradId = id;
    const c1 = sgByIndex[link.sourceSg].color;
    const c2 = sgByIndex[link.targetSg].color;
    gDefs
      .append("linearGradient")
      .attr("id", id)
      .attr("gradientUnits", "userSpaceOnUse")
      .selectAll("stop")
      .data([
        { offset: "0%", color: c1 },
        { offset: "100%", color: c2 },
      ])
      .enter()
      .append("stop")
      .attr("offset", (d) => d.offset)
      .attr("stop-color", (d) => d.color);
  });

  // Cross-SG links
  const linkSel = gLinks
    .selectAll("g.cross-link")
    .data(crossLinks)
    .enter()
    .append("g")
    .attr("class", "cross-link")
    .attr("data-source-sg", (d) => d.sourceSg)
    .attr("data-target-sg", (d) => d.targetSg);

  linkSel.each(function (d, i) {
    const g = d3.select(this);
    const fb = blocks[d.sourceSg];
    const tb = blocks[d.targetSg];
    d.ordinal = i;
    const ep = busRoute(d, fb, tb);
    d.ep = ep;
    g.append("path")
      .attr("class", "cross-path")
      .attr("d", ep.d)
      .attr("fill", "none")
      .attr("stroke", `url(#${d.gradId})`)
      .attr("stroke-width", 1.15)
      .attr("opacity", 0.46);
    const label = `${d.count} · ${d.topPred}`;
    const labelW = Math.max(74, Math.min(190, label.length * 6.1 + 18));
    g.append("rect")
      .attr("class", "cross-label-bg")
      .attr("x", ep.label.x - labelW / 2)
      .attr("y", ep.label.y - 13)
      .attr("width", labelW)
      .attr("height", 18);
    g.append("text")
      .attr("class", "cross-label")
      .attr("x", ep.label.x)
      .attr("y", ep.label.y)
      .attr("text-anchor", "middle")
      .text(label);
  });

  function shortenLabel(value, max = 22) {
    const text = String(value || "");
    return text.length > max ? text.slice(0, max - 1) + "…" : text;
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function predicateZh(predicate) {
    if (PREDICATE_ZH[predicate]) return PREDICATE_ZH[predicate];
    const words = predicate.split("_").map((part) => PREDICATE_TOKEN_ZH[part] || part.toLowerCase());
    return words.join("");
  }

  function predicateLabel(predicate) {
    const zh = predicateZh(predicate);
    if (state.lang === "zh") return zh;
    if (state.lang === "both") return `${predicate} / ${zh}`;
    return predicate;
  }

  function predicateDescription(predicate) {
    const zh = predicateZh(predicate);
    const en = `A typed ontology relation where a source node is connected to a target node by ${predicate}.`;
    const cn = `表示起点节点通过「${zh}」关系连接、约束、生成、调用或影响终点节点。`;
    if (state.lang === "zh") return cn;
    if (state.lang === "both") return `${en}<br>${cn}`;
    return en;
  }

  function portOffset(index, count) {
    if (count <= 1) return 0;
    const span = Math.min(NODE_H - 10, Math.max(12, count * 3));
    return -span / 2 + span * (index + 0.5) / count;
  }

  function takeCount(map, key) {
    const value = map.get(key) || 0;
    map.set(key, value + 1);
    return value;
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function sortedRelationNodeIds(ids, b) {
    return ids
      .filter((id) => b.localNodePositions[id])
      .sort((a, bId) => {
        const pa = b.localNodePositions[a];
        const pb = b.localNodePositions[bId];
        return pa.col - pb.col || pa.row - pb.row || nodes[a].label.localeCompare(nodes[bId].label);
      });
  }

  function branchY(centerY, index, count) {
    if (count <= 1) return centerY;
    const gap = Math.min(7, RELATION_BRANCH_SPREAD / Math.max(1, count - 1));
    return centerY + (index - (count - 1) / 2) * gap;
  }

  function relationClassX(rel, b) {
    const ids = [...rel.sources, ...rel.targets].filter((id) => b.localNodePositions[id]);
    if (!ids.length) return b.w / 2;
    const avg = ids.reduce((sum, id) => {
      const p = b.localNodePositions[id];
      return sum + p.x + NODE_W / 2;
    }, 0) / ids.length;
    return clamp(avg, PAD_X + RELATION_CLASS_W / 2 + 52, b.w - PAD_X - RELATION_CLASS_W / 2 - 52);
  }

  function relationNodePort(pos, side, portIndex, portCount) {
    return {
      x: side === "right" ? pos.x + NODE_W : pos.x,
      y: pos.y + portOffset(portIndex, portCount),
    };
  }

  function parentHierarchyPath(parentPos, childPos) {
    const sx = parentPos.x + NODE_W;
    const sy = parentPos.y;
    const tx = childPos.x;
    const ty = childPos.y;
    const midX = sx + Math.max(28, (tx - sx) * 0.42);
    return "M" + sx + "," + sy + " H" + midX + " V" + ty + " H" + tx;
  }

  function drawHierarchyScaffold(group, b) {
    b.hierarchyLayout.columns.forEach((column) => {
      const x = PAD_X + column.col * CELL_W;
      group.append("line")
        .attr("class", "hierarchy-column-guide")
        .attr("x1", x + NODE_W + 32)
        .attr("y1", HEADER_H + 12)
        .attr("x2", x + NODE_W + 32)
        .attr("y2", Math.min(b.frameworkStartY - 24, b.h - PAD_Y));
      group.append("text")
        .datum({ level: column.level })
        .attr("class", "hierarchy-level-label")
        .attr("x", x)
        .attr("y", HEADER_H + 18)
        .text(hierarchyLevelLabel(column.level));
    });

    b.hierarchyGroups.forEach((groupInfo) => {
      const gg = group.append("g").datum(groupInfo);
      gg.append("rect")
        .attr("class", "hierarchy-group-box")
        .attr("x", groupInfo.x)
        .attr("y", groupInfo.y)
        .attr("width", groupInfo.w)
        .attr("height", groupInfo.h)
        .attr("rx", 8)
        .attr("ry", 8);
      gg.append("text")
        .attr("class", "hierarchy-group-label")
        .attr("x", groupInfo.x + 8)
        .attr("y", groupInfo.y + 11)
        .text(shortenLabel(hierarchyGroupLabel(groupInfo), 28));
    });

    b.parentLinks.forEach((link) => {
      const sp = b.localNodePositions[link.source];
      const tp = b.localNodePositions[link.target];
      if (!sp || !tp) return;
      group.append("path")
        .attr("class", "hierarchy-parent-link")
        .attr("d", parentHierarchyPath(sp, tp));
    });
  }

  function drawUnifiedInternalFramework(group, b) {
    const frameY = HEADER_H + 10;
    const frameH = b.h - HEADER_H - PAD_Y + 10;
    group.append("rect")
      .attr("class", "framework-bg")
      .attr("x", PAD_X - 12)
      .attr("y", frameY)
      .attr("width", b.w - PAD_X * 2 + 24)
      .attr("height", frameH)
      .attr("rx", 12)
      .attr("ry", 12);

    if (!b.localPairEdges.length) return;

    group.append("rect")
      .attr("class", "framework-plane-bg")
      .attr("x", PAD_X - 6)
      .attr("y", b.frameworkStartY - 8)
      .attr("width", b.w - PAD_X * 2 + 12)
      .attr("height", b.frameworkH)
      .attr("rx", 10)
      .attr("ry", 10);
    group.append("text")
      .attr("class", "framework-section-title")
      .attr("x", PAD_X)
      .attr("y", b.frameworkStartY - 14)
      .text(relationSectionTitle());

    const sourceTotals = new Map();
    const targetTotals = new Map();
    b.relationGroups.forEach((rel) => {
      rel.sources.forEach((id) => sourceTotals.set(id, (sourceTotals.get(id) || 0) + 1));
      rel.targets.forEach((id) => targetTotals.set(id, (targetTotals.get(id) || 0) + 1));
    });
    const sourceSeen = new Map();
    const targetSeen = new Map();
    const columnSlots = new Map();
    b.relationClassPositions = {};

    b.relationGroups.forEach((rel, i) => {
      const relG = group.append("g")
        .datum(rel)
        .attr("class", "relation-class")
        .attr("data-sg", b.sg.i)
        .attr("data-predicate", rel.predicate)
        .on("click", (ev) => {
          ev.stopPropagation();
          selectRelation(b.sg.i, rel.predicate);
        });
      const classCenterX = relationClassX(rel, b);
      const classY = b.frameworkStartY + FRAMEWORK_PLANE_PAD + i * RELATION_CLASS_GAP + RELATION_CLASS_H / 2;
      const classX = classCenterX - RELATION_CLASS_W / 2;
      const classLeft = classX;
      const classRight = classX + RELATION_CLASS_W;
      const sourceCollectorX = clamp(classLeft - 42, PAD_X + 16, b.w - PAD_X - 16);
      const targetCollectorX = clamp(classRight + 42, PAD_X + 16, b.w - PAD_X - 16);
      const sources = sortedRelationNodeIds(rel.sources, b);
      const targets = sortedRelationNodeIds(rel.targets, b);
      b.relationClassPositions[rel.predicate] = {
        x: b.x + classCenterX,
        y: b.y + classY,
      };

      relG.append("path")
        .attr("class", "framework-class-band")
        .attr("d", `M${PAD_X},${classY} H${b.w - PAD_X}`);

      if (sources.length) {
        const ys = sources.map((_, idx) => branchY(classY, idx, sources.length));
        relG.append("path")
          .attr("class", "framework-trunk")
          .attr("d", `M${sourceCollectorX},${Math.min(...ys, classY)} V${Math.max(...ys, classY)}`)
          .attr("stroke", b.sg.color);
        sources.forEach((id, idx) => {
          const pos = b.localNodePositions[id];
          const sourceSlot = takeCount(columnSlots, `s-${pos.col}`);
          const sourcePort = takeCount(sourceSeen, id);
          const port = relationNodePort(pos, "right", sourcePort, sourceTotals.get(id) || 1);
          const gutterX = pos.x + NODE_W + 18 + sourceSlot * EDGE_ROUTE_SLOT;
          const y = ys[idx];
          relG.append("path")
            .attr("class", "framework-branch")
            .attr("data-node", id)
            .attr("d", `M${port.x},${port.y} H${gutterX} V${y} H${sourceCollectorX}`)
            .attr("stroke", b.sg.color);
        });
        relG.append("path")
          .attr("class", "framework-trunk")
          .attr("d", `M${sourceCollectorX},${classY} H${classLeft}`)
          .attr("stroke", b.sg.color)
          .attr("marker-end", "url(#local-arrow)");
      }

      if (targets.length) {
        const ys = targets.map((_, idx) => branchY(classY, idx, targets.length));
        relG.append("path")
          .attr("class", "framework-trunk")
          .attr("d", `M${targetCollectorX},${Math.min(...ys, classY)} V${Math.max(...ys, classY)}`)
          .attr("stroke", b.sg.color);
        relG.append("path")
          .attr("class", "framework-trunk")
          .attr("d", `M${classRight},${classY} H${targetCollectorX}`)
          .attr("stroke", b.sg.color);
        targets.forEach((id, idx) => {
          const pos = b.localNodePositions[id];
          const targetSlot = takeCount(columnSlots, `t-${pos.col}`);
          const targetPort = takeCount(targetSeen, id);
          const port = relationNodePort(pos, "right", targetPort, targetTotals.get(id) || 1);
          const gutterX = pos.x + NODE_W + 18 + targetSlot * EDGE_ROUTE_SLOT;
          const y = ys[idx];
          relG.append("path")
            .attr("class", "framework-branch")
            .attr("data-node", id)
            .attr("d", `M${targetCollectorX},${y} H${gutterX} V${port.y} H${port.x}`)
            .attr("stroke", b.sg.color)
            .attr("marker-end", "url(#local-arrow)");
        });
      }

      relG.append("rect")
        .datum(rel)
        .attr("class", "relation-class-node")
        .attr("x", classX)
        .attr("y", classY - RELATION_CLASS_H / 2)
        .attr("width", RELATION_CLASS_W)
        .attr("height", RELATION_CLASS_H)
        .attr("rx", 8)
        .attr("ry", 8);
      relG.append("text")
        .datum(rel)
        .attr("class", "relation-class-text")
        .attr("x", classCenterX)
        .attr("y", classY - 1)
        .attr("text-anchor", "middle")
        .text(shortenLabel(predicateLabel(rel.predicate), 28));
      relG.append("text")
        .datum(rel)
        .attr("class", "relation-class-count")
        .attr("x", classCenterX)
        .attr("y", classY + 10)
        .attr("text-anchor", "middle")
        .text(shortenLabel(relationClassCountText(rel), 34));
    });
  }

  // Blocks

  // Update gradient coords on layout (for userSpaceOnUse)
  function updateGradients() {
    crossLinks.forEach((link) => {

  // ─── Zoom state ─────────────────────────────────────────────────────────────
  function applySemanticZoom(k) {
    state.zoomK = k;
    updateHighlights();
  }

  // ─── Zoom / pan ─────────────────────────────────────────────────────────────
  const zoom = d3
    .zoom()
    .scaleExtent([0.08, 4])
    .on("zoom", (ev) => {
      gRoot.attr("transform", ev.transform);
      applySemanticZoom(ev.transform.k);
    });

  svg.call(zoom).on("click", () => {
    clearSelection();
  });

  function fitAll(duration = 0) {
    const rect = svg.node().getBoundingClientRect();
    const pad = 40;
    const sx = (rect.width - pad * 2) / maxX;
    const sy = (rect.height - pad * 2) / maxY;
    const k = Math.min(sx, sy, 1.2);
    const tx = (rect.width - maxX * k) / 2;
    const ty = (rect.height - maxY * k) / 2;
    const t = d3.zoomIdentity.translate(tx, ty).scale(k);
    if (duration) {
      svg.transition().duration(duration).call(zoom.transform, t);
    } else {
      svg.call(zoom.transform, t);
    }
  }

  function zoomToBlock(b, duration = 500) {
    const rect = svg.node().getBoundingClientRect();
    const pad = 60;
    const k = Math.min((rect.width - pad) / b.w, (rect.height - pad) / b.h, 2);
    const tx = rect.width / 2 - (b.x + b.w / 2) * k;
    const ty = rect.height / 2 - (b.y + b.h / 2) * k;
    svg.transition().duration(duration).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(k));
  }

  function zoomToNodes(indices, duration = 500) {
    if (!indices.length) return;
    let minX = Infinity, minY = Infinity, maxX2 = -Infinity, maxY2 = -Infinity;
    indices.forEach((idx) => {
      const n = nodes[idx];
      const b = blocks[n.sg];
      const p = b.nodePositions[idx];
      minX = Math.min(minX, p.x - 20);
      minY = Math.min(minY, p.y - 20);
      maxX2 = Math.max(maxX2, p.x + NODE_W + 24);
      maxY2 = Math.max(maxY2, p.y + 20);
    });
    const rect = svg.node().getBoundingClientRect();
    const pad = 80;
    const w = maxX2 - minX;
    const h = maxY2 - minY;
    const k = Math.min((rect.width - pad) / w, (rect.height - pad) / h, 2.5);
    const tx = rect.width / 2 - (minX + w / 2) * k;
    const ty = rect.height / 2 - (minY + h / 2) * k;
    svg.transition().duration(duration).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(Math.max(k, 0.85)));
  }

  // ─── Selection & highlight ──────────────────────────────────────────────────
  function clearSelection() {
    state.selectedNode = null;
    state.selectedRelation = null;
    state.selectedSg = null;
    state.pathId = "";
    state.pathNodes = new Set();
    pathSelect.value = "";
    detail.classList.remove("open");
    updateHighlights();
    clearPathOverlay();
  }

  function selectNode(idx) {
    state.selectedNode = idx;
    state.selectedRelation = null;
    state.selectedSg = null;
    state.pathId = "";
    state.pathNodes = new Set();
    pathSelect.value = "";
    showNodeDetail(idx);
    updateHighlights();
    clearPathOverlay();
  }

  function selectRelation(sgIndex, predicate) {
    state.selectedNode = null;
    state.selectedRelation = { sg: sgIndex, predicate };
    state.selectedSg = null;
    state.pathId = "";
    state.pathNodes = new Set();
    pathSelect.value = "";
    showRelationDetail(sgIndex, predicate);
    updateHighlights();
    clearPathOverlay();
  }

  function relationEdges(sgIndex, predicate) {
    return edges.filter((e) => e.sg === sgIndex && e.predicate === predicate);
  }

  function uniqueNodeButtons(indices) {
    const seen = new Set();
    return indices
      .filter((idx) => {
        if (seen.has(idx)) return false;
        seen.add(idx);
        return true;
      })
      .map((idx) => `<li><button type="button" class="link-btn" data-node="${idx}">${escapeHtml(nodeName(idx))}</button></li>`)
      .join("") || `<li class="muted">${ui("noItems")}</li>`;
  }

  function moreSuffix(total, shown) {
    if (total <= shown) return "";
    return `<li class="muted">+${total - shown} ${ui("more")}</li>`;
  }

  function edgeItemHtml(e, arrow) {
    const relation = escapeHtml(predicateLabel(e.predicate));
    const source = `<button type="button" class="link-btn" data-node="${e.source}">${escapeHtml(nodeName(e.source))}</button>`;
    const target = `<button type="button" class="link-btn" data-node="${e.target}">${escapeHtml(nodeName(e.target))}</button>`;
    return `<li><button type="button" class="link-btn relation-btn pred" data-sg="${e.sg}" data-predicate="${e.predicate}">${relation}</button> ${arrow} ${arrow === "←" ? source : target}</li>`;
  }

  function edgePairHtml(e) {
    return `<li><span class="pred">${escapeHtml(predicateLabel(e.predicate))}</span> ${escapeHtml(edgeSentence(e))}</li>`;
  }

  function showSgDetail(b) {
    state.selectedSg = b.sg.i;
    state.selectedNode = null;
    state.selectedRelation = null;
    const sg = b.sg;
    const internal = edges.filter(e => nodes[e.source].sg === sg.i && nodes[e.target].sg === sg.i);
    const hubItems = b.list.filter(n => hubSet.has(n.i)).slice(0, 12).map(n =>
      `<li><button type="button" class="link-btn" data-node="${n.i}">${escapeHtml(nodeName(n.i))}</button> <span class="muted">(${degree[n.i]} ${ui("edges")})</span></li>`
    ).join("") || `<li class="muted">${ui("noItems")}</li>`;
    detailInner.innerHTML = `
      <div class="detail-badge" style="color:${sg.color};border-color:${sg.color}">SG${sg.i} · ${escapeHtml(displaySubgraphLabel(sg))}</div>
      <h2 class="detail-title">${escapeHtml(displaySubgraphLabel(sg))}</h2>
      <p class="detail-meta">${b.list.length} ${ui("nodes")} · ${internal.length} ${ui("internalEdges")}</p>
      <h3 class="section-title">${ui("chineseExplanation")}</h3>
      <p class="detail-desc">「${escapeHtml(SG_LABEL_ZH[sg.i] || sg.label)}」是智能体本体中的模块化板块，负责组织该领域的节点类型、关系类型与工程边界。</p>
      <h3 class="section-title">${ui("englishExplanation")}</h3>
      <p class="detail-desc">The ${escapeHtml(sg.label)} subgraph is a modular ontology partition that groups node types, relation types, and engineering boundaries for this domain.</p>
      <h3 class="section-title">${ui("hubNodes")}</h3>
      <ul class="edge-list">${hubItems}</ul>
    `;
    detail.classList.add("open");
    bindDetailLinks();

  function hierarchyDetailHtml(node) {
    const parent = node.parentKey ? nodeByKey.get(node.parentKey) : null;
    const parentValue = parent
      ? '<button type="button" class="link-btn" data-node="' + parent.i + '">' + escapeHtml(nodeName(parent.i)) + '</button>'
      : '<span class="muted">' + ui("rootNode") + '</span>';
    return `
      <h3 class="section-title">${ui("hierarchy")}</h3>

  function showNodeDetail(idx) {
    const n = nodes[idx];

    const outgoing = edges.filter((e) => e.source === idx);

  function showRelationDetail(sgIndex, predicate) {
    const sg = sgByIndex[sgIndex];
    const relEdges = relationEdges(sgIndex, predicate);
    const sources = relEdges.map((e) => e.source);
    const targets = relEdges.map((e) => e.target);
    detailInner.innerHTML = `
      <div class="detail-badge" style="color:${sg.color};border-color:${sg.color}">SG${sgIndex} · ${escapeHtml(displaySubgraphLabel(sg))}</div>
      <div class="detail-key">${escapeHtml(predicate)}</div>
      <h2 class="detail-title">${escapeHtml(predicateLabel(predicate))}</h2>
      <p class="detail-zh">EN: ${escapeHtml(predicate)} · 中文: ${escapeHtml(predicateZh(predicate))}</p>
      <h3 class="section-title">${ui("description")}</h3>
      <p class="detail-desc">${predicateDescription(predicate)}</p>
      <p class="detail-meta">${relEdges.length} ${ui("connectedEdges")}</p>
      <h3 class="section-title">${ui("sources")} (${new Set(sources).size})</h3>
      <ul class="edge-list">${uniqueNodeButtons(sources)}</ul>
      <h3 class="section-title">${ui("targets")} (${new Set(targets).size})</h3>
      <ul class="edge-list">${uniqueNodeButtons(targets)}</ul>
      <h3 class="section-title">${ui("connectedEdges")} (${relEdges.length})</h3>
      <ul class="edge-list">${relEdges.slice(0, 30).map(edgePairHtml).join("")}${moreSuffix(relEdges.length, 30)}</ul>

  function bindDetailLinks() {
    detailInner.querySelectorAll(".link-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const idx = +btn.dataset.node;
        if (!Number.isFinite(idx)) return;
        selectNode(idx);
        zoomToNodes([idx]);
      });
    });
    detailInner.querySelectorAll(".relation-btn").forEach((btn) => {
      btn.addEventListener("click", (ev) => {
        ev.stopPropagation();
        selectRelation(+btn.dataset.sg, btn.dataset.predicate);
      });
    });
  }

  function relationKey(sgIndex, predicate) {
    return `${sgIndex}|${predicate}`;
  }

  function rememberRelationEndpoint(focus, key, idx) {
    if (!focus.relationNodes.has(key)) focus.relationNodes.set(key, new Set());
    focus.relationNodes.get(key).add(idx);
  }

  function rememberFocusEdge(focus, seen, e) {
    const key = `${e.sg}|${e.predicate}|${e.source}|${e.target}`;
    if (seen.has(key)) return;
    seen.add(key);
    focus.edges.push(e);
    focus.nodes.add(e.source);
    focus.nodes.add(e.target);
    const relKey = relationKey(e.sg, e.predicate);
    focus.relations.add(relKey);
    rememberRelationEndpoint(focus, relKey, e.source);
    rememberRelationEndpoint(focus, relKey, e.target);
    const sSg = nodes[e.source].sg;
    const tSg = nodes[e.target].sg;
    if (sSg !== tSg) focus.crossPairs.add(`${sSg}->${tSg}`);
  }

  function currentFocus() {
    const focus = {
      active: false,
      scope: "",
      primaryNodes: new Set(),
      nodes: new Set(),
      relations: new Set(),
      relationNodes: new Map(),
      crossPairs: new Set(),
      edges: [],
    };
    const seenEdges = new Set();
    if (state.selectedNode !== null) {
      focus.active = true;
      focus.scope = "node";
      focus.primaryNodes.add(state.selectedNode);
      focus.nodes.add(state.selectedNode);
      edges.forEach((e) => {
        if (e.source !== state.selectedNode && e.target !== state.selectedNode) return;
        rememberFocusEdge(focus, seenEdges, e);
      });
    }
    if (state.selectedRelation) {
      focus.active = true;
      focus.scope = "relation";
      const relEdges = relationEdges(state.selectedRelation.sg, state.selectedRelation.predicate);
      focus.relations.add(relationKey(state.selectedRelation.sg, state.selectedRelation.predicate));
      relEdges.forEach((e) => {
        rememberFocusEdge(focus, seenEdges, e);
      });
    }
    return focus;
  }

  function updateHighlights() {
    const q = state.searchQuery.trim().toLowerCase();
    const searching = q.length > 0;
    const matches = state.searchMatches;
    const pathSet = state.pathNodes;
    const sel = state.selectedNode;
    const focus = currentFocus();

    gBlocks.selectAll(".node").each(function () {
      const idx = +this.getAttribute("data-index");
      const el = d3.select(this);
      el.classed("selected", idx === sel);
      el.classed("focus-primary", focus.primaryNodes.has(idx));
      el.classed("focus-related", focus.active && focus.nodes.has(idx) && !focus.primaryNodes.has(idx));
      el.classed("focus-muted", focus.active && !focus.nodes.has(idx));
      el.classed("path-node", pathSet.has(idx));
      if (searching) {
        el.classed("search-match", matches.has(idx));
        el.classed("dimmed", !matches.has(idx));
      } else {
        el.classed("search-match", false);
        el.classed("dimmed", false);
      }
      if (focus.active) {
        el.style("opacity", focus.nodes.has(idx) ? 1 : 0.08);
      } else if (searching) {
        el.style("opacity", matches.has(idx) ? 1 : 0.14);
      } else {
        el.style("opacity", null);
      }
    });

    gBlocks.selectAll(".relation-class").each(function (rel) {
      const sgIndex = +this.getAttribute("data-sg");
      const predicate = this.getAttribute("data-predicate");
      const key = relationKey(sgIndex, predicate);
      const isFocused = focus.relations.has(key);
      const isPreciseNodeFocus = isFocused && focus.scope === "node";
      const focusedEndpoints = focus.relationNodes.get(key);
      const relSel = d3.select(this);
      relSel
        .classed("relation-focus", isFocused)
        .classed("precise-node-focus", isPreciseNodeFocus)
        .classed("relation-muted", focus.active && !isFocused);
      relSel.selectAll(".framework-trunk")
        .classed("trunk-focus", isFocused && focus.scope === "relation");
      relSel.selectAll(".framework-branch")
        .classed("branch-focus", function () {
          if (!isFocused || !focusedEndpoints) return false;
          return focus.scope === "relation" && focusedEndpoints.has(+this.getAttribute("data-node"));
        })
        .classed("branch-muted", function () {
          if (!isFocused || !focusedEndpoints) return false;
          return focus.scope === "relation" && !focusedEndpoints.has(+this.getAttribute("data-node"));
        });
    });

    gBlocks.selectAll(".block").classed("dimmed-block", function (d) {
      return searching && !d.list.some((n) => matches.has(n.i));
    });

    gLinks.selectAll(".cross-link").classed("path-link", function () {
      if (!pathSet.size) return false;
      const ssg = +this.getAttribute("data-source-sg");
      const tsg = +this.getAttribute("data-target-sg");
      const pathSgs = new Set([...pathSet].map((i) => nodes[i].sg));
      return pathSgs.has(ssg) && pathSgs.has(tsg);
    }).classed("focus-link", function () {
      const ssg = +this.getAttribute("data-source-sg");
      const tsg = +this.getAttribute("data-target-sg");
      return focus.scope === "relation" && focus.crossPairs.has(`${ssg}->${tsg}`);
    }).classed("muted-link", function () {
      const ssg = +this.getAttribute("data-source-sg");
      const tsg = +this.getAttribute("data-target-sg");
      if (!focus.active) return false;
      if (focus.scope === "node") return true;
      return !focus.crossPairs.has(`${ssg}->${tsg}`);
    });

    drawFocusOverlay(focus);
  }

  function clearFocusOverlay() {
    gFocus.selectAll("*").remove();
  }

  function nodeCenterPoint(idx) {
    const n = nodes[idx];
    if (!n) return null;
    const b = blocks[n.sg];
    const p = b && b.nodePositions ? b.nodePositions[idx] : null;
    if (!p) return null;
    return { x: p.x + NODE_W / 2, y: p.y };
  }

  function nodeBounds(idx) {
    const n = nodes[idx];
    if (!n) return null;
    const b = blocks[n.sg];
    const p = b && b.nodePositions ? b.nodePositions[idx] : null;
    if (!p) return null;
    return {
      left: p.x,
      right: p.x + NODE_W,
      top: p.y - NODE_H / 2,
      bottom: p.y + NODE_H / 2,
      cx: p.x + NODE_W / 2,
      cy: p.y,
    };
  }

  function nodeOutsidePort(idx, towardX, gap = 9) {
    const box = nodeBounds(idx);
    if (!box) return null;
    const side = towardX >= box.cx ? "right" : "left";
    return {
      x: side === "right" ? box.right + gap : box.left - gap,
      y: box.cy,
      side,
    };
  }

  function relationClassPoint(e) {
    const b = blocks[e.sg];
    return b && b.relationClassPositions ? b.relationClassPositions[e.predicate] : null;
  }

  function relationSidePort(relPoint, nodePoint) {
    const side = nodePoint.x < relPoint.x ? -1 : 1;
    return {
      x: relPoint.x + side * (RELATION_CLASS_W / 2 + 8),
      y: relPoint.y,
    };
  }

  function focusEdgeGeometry(e, ordinal) {
    const sourceCenter = nodeCenterPoint(e.source);
    const targetCenter = nodeCenterPoint(e.target);
    if (!sourceCenter || !targetCenter) return null;
    const relPoint = relationClassPoint(e);
    if (relPoint) {
      const sourcePort = nodeOutsidePort(e.source, relPoint.x, 9);
      const sourceLane = nodeOutsidePort(e.source, relPoint.x, 28);
      const targetPort = nodeOutsidePort(e.target, relPoint.x, 9);
      const targetLane = nodeOutsidePort(e.target, relPoint.x, 28);
      if (!sourcePort || !sourceLane || !targetPort || !targetLane) return null;
      const relIn = relationSidePort(relPoint, sourcePort);
      const relOut = relationSidePort(relPoint, targetPort);
      const laneOffset = ((ordinal % 5) - 2) * 3.6;
      const laneY = relPoint.y + laneOffset;
      const d = [
        `M${sourcePort.x},${sourcePort.y}`,
        `H${sourceLane.x}`,
        `V${laneY}`,
        `H${relIn.x}`,
        `M${relOut.x},${laneY}`,
        `H${targetLane.x}`,
        `V${targetPort.y}`,
        `H${targetPort.x}`,
      ].join(" ");
      return {
        d,
        sourceCenter,
        targetCenter,
        sourceMarker: sourcePort,
        targetMarker: targetPort,
        arrowStart: targetLane,
        arrowEnd: targetPort,
        label: { x: relPoint.x, y: laneY },
        relPoint,
      };
    }
    const sourcePort = nodeOutsidePort(e.source, targetCenter.x, 9);
    const sourceLane = nodeOutsidePort(e.source, targetCenter.x, 28);
    const targetPort = nodeOutsidePort(e.target, sourceCenter.x, 9);
    const targetLane = nodeOutsidePort(e.target, sourceCenter.x, 28);
    if (!sourcePort || !sourceLane || !targetPort || !targetLane) return null;
    const offset = ((ordinal % 7) - 3) * 12;
    const midX = (sourceLane.x + targetLane.x) / 2 + offset;
    const d = [
      `M${sourcePort.x},${sourcePort.y}`,
      `H${sourceLane.x}`,
      `C${midX},${sourceLane.y} ${midX},${targetLane.y} ${targetLane.x},${targetLane.y}`,
      `H${targetPort.x}`,
    ].join(" ");
    return {
      d,
      sourceCenter,
      targetCenter,
      sourceMarker: sourcePort,
      targetMarker: targetPort,
      arrowStart: targetLane,
      arrowEnd: targetPort,
      label: { x: midX, y: (sourcePort.y + targetPort.y) / 2 },
      relPoint: null,
    };
  }

  function drawFocusArrow(start, end, className) {
    if (!start || !end) return;
    gFocus.append("path")
      .attr("class", className)
      .attr("d", `M${start.x},${start.y} L${end.x},${end.y}`)
      .attr("marker-end", "url(#focus-arrow)");
  }

  function drawFocusOverlay(focus) {
    clearFocusOverlay();
    if (!focus.active || !focus.edges.length) return;

    const endpointMarkers = new Map();
    function addMarker(idx, role, point) {
      if (!point) return;
      const key = `${idx}|${role}|${Math.round(point.x)}|${Math.round(point.y)}`;
      endpointMarkers.set(key, { idx, role, point });
    }

    const labelSeen = new Set();
    focus.edges.forEach((e, i) => {
      const geom = focusEdgeGeometry(e, i);
      if (!geom) return;
      addMarker(e.source, "S", geom.sourceMarker);
      addMarker(e.target, "T", geom.targetMarker);
      gFocus.append("path")
        .attr("class", `focus-edge${nodes[e.source].sg === nodes[e.target].sg ? "" : " focus-edge-secondary"}`)
        .attr("d", geom.d);
      drawFocusArrow(
        geom.arrowStart,
        geom.arrowEnd,
        `focus-edge${nodes[e.source].sg === nodes[e.target].sg ? "" : " focus-edge-secondary"}`,
      );

      const labelKey = relationKey(e.sg, e.predicate);
      if (!geom.relPoint && !labelSeen.has(labelKey)) {
        labelSeen.add(labelKey);
        const label = shortenLabel(predicateLabel(e.predicate), 30);
        const labelW = Math.max(82, Math.min(220, label.length * 6.2 + 18));
        gFocus.append("rect")
          .attr("class", "focus-edge-label-bg")
          .attr("x", geom.label.x - labelW / 2)
          .attr("y", geom.label.y - 10)
          .attr("width", labelW)
          .attr("height", 20);
        gFocus.append("text")
          .attr("class", "focus-edge-label")
          .attr("x", geom.label.x)
          .attr("y", geom.label.y)
          .text(label);
      }
    });

    endpointMarkers.forEach(({ role, point }) => {
      const ep = gFocus.append("g").attr("transform", `translate(${point.x},${point.y})`);
      ep.append("circle")
        .attr("class", "focus-endpoint")
        .attr("r", 7);
      ep.append("text")
        .attr("class", "focus-endpoint-label")
        .attr("dy", "0.05em")
        .text(role);
    });
  }

  function clearPathOverlay() {
    gPath.selectAll("*").remove();
  }

  function drawPathOverlay(pathNodeIndices) {
    clearPathOverlay();
    if (pathNodeIndices.length < 2) return;
    const pts = pathNodeIndices.map((idx) => {
      const n = nodes[idx];
      const b = blocks[n.sg];
      const p = b.nodePositions[idx];
      return { x: p.x, y: p.y, sg: n.sg, idx };
    });
    const segs = [];
    for (let i = 0; i < pts.length - 1; i++) {
      const a = pts[i];
      const b = pts[i + 1];
      if (a.sg === b.sg) {
        segs.push(`M${a.x},${a.y} L${b.x},${b.y}`);
      } else {
        const midX = (a.x + b.x) / 2;
        segs.push(`M${a.x},${a.y} C${midX},${a.y} ${midX},${b.y} ${b.x},${b.y}`);
      }
    }
    segs.forEach((d) => {
      gPath.append("path").attr("class", "path-segment").attr("d", d).attr("fill", "none");
    });
    pts.forEach((p, i) => {
      const mg = gPath.append("g").attr("transform", `translate(${p.x},${p.y})`);
      mg.append("circle").attr("class", "path-marker").attr("r", 9);
      mg.append("text")
        .attr("text-anchor", "middle")
        .attr("dy", "0.35em")
        .attr("fill", "var(--path-color)")
        .attr("font-size", "8px")
        .attr("font-weight", "700")
        .attr("pointer-events", "none")
        .text(i + 1);
    });
  }

  // ─── Search ─────────────────────────────────────────────────────────────────
  function runSearch() {
    const q = searchInput.value.trim().toLowerCase();
    state.searchQuery = q;
    state.searchMatches = new Set();
    if (q) {
      nodes.forEach((n) => {
        if (
          n.key.toLowerCase().includes(q) ||
          n.label.toLowerCase().includes(q) ||
          n.labelZh.includes(q)
        ) {
          state.searchMatches.add(n.i);
        }
      });
      statusEl.textContent = state.lang === "zh"
        ? `${state.searchMatches.size} 个匹配`
        : state.lang === "both"
          ? `${state.searchMatches.size} matches / ${state.searchMatches.size} 个匹配`
          : `${state.searchMatches.size} match${state.searchMatches.size === 1 ? "" : "es"}`;
    } else {
      statusEl.textContent = "";
    }
    updateHighlights();
  }

  searchInput.addEventListener("input", runSearch);

  // ─── Path select ────────────────────────────────────────────────────────────
  paths.forEach((p) => {
    const opt = document.createElement("option");
    opt.value = p.id;
    opt.textContent = pathLabel(p);
    pathSelect.appendChild(opt);
  });

  pathSelect.addEventListener("change", () => {
    const id = pathSelect.value;
    if (!id) {
      state.selectedNode = null;
      state.selectedRelation = null;
      state.pathNodes = new Set();
      clearPathOverlay();
      updateHighlights();
      return;
    }
    const path = paths.find((p) => p.id === id);
    const valid = (path.nodes || []).filter((i) => i >= 0 && i < nodes.length);
    state.pathNodes = new Set(valid);
    state.pathId = id;
    state.selectedNode = null;
    state.selectedRelation = null;
    drawPathOverlay(valid);
    updateHighlights();
    zoomToNodes(valid);
  });

  // ─── Tooltip ────────────────────────────────────────────────────────────────
  function showTooltip(ev, node) {
    const descEn = nodeEnglishDescription(node);
    const descZh = nodeChineseDescription(node);
    const desc = state.lang === "zh"
      ? escapeHtml(descZh)
      : state.lang === "both"
        ? `${escapeHtml(descEn)}<br>${escapeHtml(descZh)}`
        : escapeHtml(descEn);
    tooltip.innerHTML = `<strong>${escapeHtml(nodeName(node.i))}</strong><span class="tt-zh">EN: ${escapeHtml(node.label)} · 中文: ${escapeHtml(node.labelZh || node.label)}</span><span class="tt-desc">${desc}</span>`;
    tooltip.classList.add("visible");
    moveTooltip(ev);
  }
  function moveTooltip(ev) {
    tooltip.style.left = ev.clientX + 14 + "px";
    tooltip.style.top = ev.clientY + 14 + "px";
  }
  function hideTooltip() {
    tooltip.classList.remove("visible");
  }

  // ─── Theme ──────────────────────────────────────────────────────────────────
  function setTheme(t) {
    state.theme = t;
    document.documentElement.dataset.theme = t;
    document.getElementById("theme-btn").textContent = t === "dark" ? "☀" : "☾";
  }
  document.getElementById("theme-btn").addEventListener("click", () => {
    setTheme(state.theme === "dark" ? "light" : "dark");
  });
  langSelect.addEventListener("change", () => {
    state.lang = langSelect.value;
    refreshLanguage();
    if (state.selectedNode !== null) showNodeDetail(state.selectedNode);
    if (state.selectedRelation) showRelationDetail(state.selectedRelation.sg, state.selectedRelation.predicate);
    if (state.selectedSg !== null) showSgDetail(blocks[state.selectedSg]);
    runSearch();
    updateHighlights();
  });

  document.getElementById("fit-btn").addEventListener("click", () => fitAll(400));
  document.getElementById("close-detail").addEventListener("click", () => {
    detail.classList.remove("open");
  });

  window.addEventListener("resize", () => fitAll(0));

  // ─── Init ───────────────────────────────────────────────────────────────────
  setTheme("dark");
  refreshLanguage();
  fitAll(0);
})();

</script>
</body>
</html>
