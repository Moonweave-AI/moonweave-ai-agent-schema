schema_version: "2.0"
last_updated: "2026-06-21"
description: >
  Lightweight index for the v2 evidence system. The authoritative source list
  is references/source-catalog.yaml and claim-level ontology mapping is
  references/evidence-matrix.yaml.

authoritative_files:
  source_catalog: references/source-catalog.yaml
  evidence_matrix: references/evidence-matrix.yaml
  bibtex: references/papers.bib
  local_diagram_extract: references/local-diagram-extract.yaml

normative_policy:
  approved_sources: "Only source catalog entries with normative_status approved may support normative claims."
  exemplar_sources: "Exemplar sources inform implementation and adapter patterns but do not override ontology backbone concepts."
  candidate_sources: "Candidate, anonymous, placeholder, or unverifiable sources must not be used for normative ontology claims."

legacy_cleanup:
  removed_placeholder_sources:
    - source.agent_harness_survey_2026
    - source.agentic_ai_taxonomy_2601
    - source.faos_2604
    - source.hierarchical_memory_2603
    - source.parallax_2604
    - source.network_of_thought_2603
  reason: "These entries were not verified to the new source catalog standard and are excluded from normative evidence until re-reviewed."

source_groups:
  research_backbone:
    - source.coala_2024
    - source.react_2022
    - source.reflexion_2023
    - source.toolformer_2023
    - source.tree_of_thoughts_2023
    - source.generative_agents_2023
    - source.agentbench_2024
    - source.swe_agent_2024
  protocol_backbone:
    - source.mcp_spec_2025
    - source.a2a_protocol_2025
  safety_backbone:
    - source.agentdojo_2024
    - source.progent_2025
    - source.fides_ifc_2025
  presentation_backbone:
    - source.c4_model
    - source.bpmn_2_0_2
    - source.graphviz_dot
    - source.mermaid_docs

source_priority:
  normative: "Ontology backbone MUST align with approved source catalog entries and claim mappings."
  exemplar: "Framework exemplars may shape adapters, UI affordances, and validation views."
  candidate: "Candidate sources require explicit review before they can affect node, edge, or constraint definitions."

