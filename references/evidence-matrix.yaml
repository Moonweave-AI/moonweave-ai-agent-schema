schema_version: "2.0"
last_updated: "2026-06-21"
description: "Claim-level mapping from authoritative sources to ontology nodes, edges, constraints, views, and known gaps."
claims:
  - id: claim.coala.decision_loop
    source_id: source.coala_2024
    status: normative
    themes: [cognitive-loop, memory, tool-use]
    claim: "Language agents require a generalized decision process tied to memory and action spaces."
    ontology_impact: "The agent core must model perceive-reason-act state updates instead of a stateless prompt call."
    supports_nodes: [node.agent, node.decision_loop, node.agent_state, node.cognitive_core]
    supports_edges: [edge.RUNS_DECISION_LOOP, edge.UPDATES_STATE]
  - id: claim.coala.memory_taxonomy
    source_id: source.coala_2024
    status: normative
    themes: [memory, cognitive-loop]
    claim: "Agent memory should distinguish working, episodic, semantic, and procedural roles."
    ontology_impact: "Memory subgraph keeps separate memory classes and explicit retrieval/write/compaction operations."
    supports_nodes: [node.working_memory, node.episodic_memory, node.semantic_memory, node.procedural_memory, node.memory_store]
    supports_edges: [edge.STORES, edge.RETRIEVES_FROM]
  - id: claim.react.reason_act
    source_id: source.react_2022
    status: normative
    themes: [planning-reasoning, tool-use]
    claim: "Reasoning traces and external actions should be interleaved so actions can gather facts and reasoning can update plans."
    ontology_impact: "Reasoning trace, tool invocation, feedback, and plan update edges must be inspectable."
    supports_nodes: [node.reasoning_trace, node.tool_invocation, node.feedback_signal, node.plan]
    supports_edges: [edge.INVOKES, edge.RECEIVES_FEEDBACK, edge.UPDATES_STATE]
  - id: claim.reflexion.feedback_memory
    source_id: source.reflexion_2023
    status: normative
    themes: [reflection, memory, evaluation]
    claim: "Verbal feedback and reflective memory can improve future agent decisions without model weight updates."
    ontology_impact: "Reflection, self critique, feedback signal, and episodic memory must be first-class."
    supports_nodes: [node.reflection, node.self_critique, node.feedback_signal, node.episodic_memory]
    supports_edges: [edge.REFLECTS_ON, edge.RECEIVES_FEEDBACK]
  - id: claim.toolformer.api_decision
    source_id: source.toolformer_2023
    status: normative
    themes: [tool-use]
    claim: "Tool-using models need explicit decisions about when to call an API, which API, with which arguments, and how to use results."
    ontology_impact: "Tool schema, selection, invocation, argument declaration, and result handling remain separate nodes."
    supports_nodes: [node.tool_definition, node.tool_schema, node.tool_selection, node.tool_invocation, node.tool_result]
    supports_edges: [edge.DECLARES_SCHEMA, edge.SELECTED_FOR, edge.INVOKES, edge.RETURNS]
  - id: claim.tot.search
    source_id: source.tree_of_thoughts_2023
    status: normative
    themes: [planning-reasoning, reflection, evaluation]
    claim: "Deliberate reasoning can be modeled as search over thought states with branching, evaluation, and backtracking."
    ontology_impact: "Planning view must expose thought nodes, thought edges, branch evaluators, and selected branches."
    supports_nodes: [node.thought_node, node.thought_edge, node.search_space, node.branch_evaluator]
    supports_edges: [edge.EXPANDS_SEARCH_NODE, edge.EVALUATES_BRANCH, edge.SELECTS_BRANCH]
  - id: claim.generative_agents.memory_reflection_plan
    source_id: source.generative_agents_2023
    status: normative
    themes: [memory, reflection, planning-reasoning, multi-agent]
    claim: "Believable agents combine observation, memory retrieval, reflection synthesis, and planning."
    ontology_impact: "Memory and planning graphs must support observed experiences becoming retrievable and reflectable."
    supports_nodes: [node.observation, node.memory_record, node.reflection, node.plan]
    supports_edges: [edge.STORES, edge.RETRIEVES_FROM, edge.REFLECTS_ON, edge.GENERATES_PLAN]
  - id: claim.voyager.skill_library
    source_id: source.voyager_2023
    status: normative
    themes: [memory, tool-use, runtime-state]
    claim: "Long-running embodied agents need reusable skill libraries and execution-feedback-driven improvement."
    ontology_impact: "Procedural memory, skill packages, code execution, and environment feedback must be linkable."
    supports_nodes: [node.procedural_memory, node.skill_package, node.code_execution_action, node.feedback_signal]
    supports_edges: [edge.LOADS_SKILL, edge.EXECUTES_CODE, edge.RECEIVES_FEEDBACK]
  - id: claim.agentbench.evaluation
    source_id: source.agentbench_2024
    status: normative
    themes: [evaluation]
    claim: "Agent evaluation must cover interactive multi-turn environments and failure modes."
    ontology_impact: "Engineering validation needs benchmark, scenario, metric, and release gate concepts."
    supports_nodes: [node.release_gate, node.coverage_checker, node.trace_replay_test, node.runtime_contract_test]
    supports_edges: [edge.CHECKS_COVERAGE_OF, edge.BLOCKS_RELEASE]
  - id: claim.webarena.realistic_environment
    source_id: source.webarena_2024
    status: normative
    themes: [evaluation, runtime-state, tool-use]
    claim: "Realistic self-hostable web environments expose gaps hidden by simplified synthetic agent tasks."
    ontology_impact: "Environment adapters must model observation, actions, state, risk, and benchmark tasks."
    supports_nodes: [node.browser_environment, node.environment_adapter, node.observation, node.environment_action, node.environment_state]
    candidate_nodes: [node.web_benchmark]
    supports_edges: [edge.OBSERVES, edge.ACTS_ON, edge.REPORTS_OBSERVATION]
  - id: claim.swe_bench.real_issue_tests
    source_id: source.swe_bench_2024
    status: normative
    themes: [evaluation, runtime-state]
    claim: "Software-agent evaluation should use real repository issues and executable tests."
    ontology_impact: "Validation layer must bind codebase environments, traces, commands, and release-blocking checks."
    supports_nodes: [node.codebase_environment, node.command, node.trace, node.release_gate]
    supports_edges: [edge.VALIDATES, edge.BLOCKS_RELEASE]
  - id: claim.swe_agent.aci
    source_id: source.swe_agent_2024
    status: normative
    themes: [runtime-state, tool-use, ui-graph-presentation]
    claim: "Agent-computer interface design changes agent behavior and task success."
    ontology_impact: "Workbench UI and environment adapter design must model command surfaces as agent-facing interfaces."
    supports_nodes: [node.command_area, node.terminal_environment, node.file_system_environment, node.codebase_environment]
    supports_edges: [edge.ACTS_ON, edge.READS_WRITES_FILE, edge.EXECUTES_CODE]
  - id: claim.agentdojo.security_eval
    source_id: source.agentdojo_2024
    status: normative
    themes: [safety-security, evaluation, tool-use]
    claim: "Tool results can carry indirect prompt injections and require dynamic attack/defense evaluation."
    ontology_impact: "Safety graph must connect untrusted tool data, prompt injection defense, trust boundaries, and security tests."
    supports_nodes: [node.prompt_injection_defense, node.trust_boundary, node.taint, node.tool_result, node.policy_contract_test]
    supports_edges: [edge.GUARDS, edge.SCANS_FOR, edge.PROPAGATES_TAINT]
  - id: claim.surveys.coverage_axes
    source_id: source.wang_autonomous_agents_survey_2024
    status: normative
    themes: [cognitive-loop, evaluation, multi-agent]
    claim: "Autonomous-agent research should be organized by construction, application, evaluation, and future challenges."
    ontology_impact: "Source matrix and reports must classify every source by construction/evaluation/application impact."
    supports_nodes: [node.agent, node.release_gate, node.coverage_checker]
    supports_views: [view.research_evidence_matrix]
  - id: claim.xi.brain_perception_action
    source_id: source.xi_llm_agent_survey_2023
    status: normative
    themes: [cognitive-loop, tool-use, multi-agent]
    claim: "LLM-based agents can be framed around brain, perception, and action components."
    ontology_impact: "Agent core, context info, and tool action graphs remain separate but cross-linked."
    supports_nodes: [node.cognitive_core, node.context_graph, node.action_space, node.tool_call]
    supports_edges: [edge.PROVIDES_CONTEXT_TO, edge.USES_MODEL_INTERFACE, edge.HAS_CAPABILITY]
  - id: claim.planning_survey.taxonomy
    source_id: source.planning_survey_2024
    status: normative
    themes: [planning-reasoning, reflection, memory]
    claim: "Planning work clusters around task decomposition, plan selection, external modules, reflection, and memory."
    ontology_impact: "Planning subgraph keeps decomposition, selection, external module, reflection, and memory links visible."
    supports_nodes: [node.task, node.plan, node.plan_step, node.reflection, node.memory_retriever]
    supports_edges: [edge.DECOMPOSES_TO_TASK, edge.GENERATES_PLAN, edge.REFLECTS_ON]
  - id: claim.memory_survey.evolution
    source_id: source.memory_survey_2026
    status: normative
    themes: [memory, reflection, runtime-state]
    claim: "Agent memory evolves from storage to reflection to experience abstraction."
    ontology_impact: "Memory graph must track lifecycle, compaction, reflection, and abstraction gaps."
    supports_nodes: [node.memory_record, node.memory_compactor, node.reflection, node.procedural_memory]
    supports_edges: [edge.COMPACTS_TO, edge.REFLECTS_ON, edge.STORES]
  - id: claim.evaluation_survey.taxonomy
    source_id: source.evaluation_survey_2025
    status: normative
    themes: [evaluation, observability]
    claim: "Agent evaluation requires systematic benchmark, metric, scenario, and deployment-readiness taxonomies."
    ontology_impact: "Validation graph needs explicit benchmark references and coverage reports."
    supports_nodes: [node.evidence_checker, node.coverage_checker, node.release_gate, node.visualization_render_check]
    candidate_nodes: [node.benchmark_ref]
    supports_edges: [edge.REQUIRES_EVIDENCE, edge.CHECKS_COVERAGE_OF]
  - id: claim.progent.least_privilege
    source_id: source.progent_2025
    status: normative
    themes: [permissions, safety-security, tool-use]
    claim: "LLM agents should enforce least privilege at the tool-call policy level."
    ontology_impact: "Permission policy, allow/deny decisions, privilege control, and guarded tool calls must remain separable."
    supports_nodes: [node.least_privilege, node.privilege_control, node.permission_policy, node.allow_decision, node.deny_decision]
    supports_edges: [edge.GUARDS, edge.AUTHORIZES, edge.DENIES]
  - id: claim.fides.information_flow
    source_id: source.fides_ifc_2025
    status: normative
    themes: [safety-security, permissions, runtime-state]
    claim: "Information-flow labels and taint tracking can constrain agent planners against prompt injection and leakage."
    ontology_impact: "Safety policy graph must track data labels, taint propagation, secrets, and trust boundaries."
    supports_nodes: [node.information_flow_control, node.data_label, node.taint, node.secret, node.trust_boundary]
    supports_edges: [edge.LABELS_DATA, edge.PROPAGATES_TAINT, edge.GUARDS]
  - id: claim.mcp.capabilities
    source_id: source.mcp_spec_2025
    status: normative
    themes: [protocol-interop, tool-use]
    claim: "MCP servers expose resources, prompts, and tools to clients for model/tool interoperability."
    ontology_impact: "Protocol graph must distinguish tool, resource, prompt exposure and protocol endpoints."
    supports_nodes: [node.protocol_endpoint, node.tool_exposure, node.resource_exposure, node.prompt_exposure, node.capability_manifest]
    supports_edges: [edge.EXPOSES_TOOL, edge.EXPOSES_RESOURCE, edge.EXPOSES_PROMPT, edge.ADVERTISES_CAPABILITY]
  - id: claim.a2a.agent_cards
    source_id: source.a2a_protocol_2025
    status: normative
    themes: [protocol-interop, multi-agent, permissions]
    claim: "A2A enables agents to discover capabilities, communicate tasks, stream progress, and exchange artifacts."
    ontology_impact: "Protocol graph must cover agent cards, task envelopes, streaming channels, auth, and artifacts."
    supports_nodes: [node.capability_manifest, node.task_envelope, node.streaming_channel, node.authorization_scheme, node.artifact]
    supports_edges: [edge.ADVERTISES_CAPABILITY, edge.STARTS_TASK, edge.STREAMS_OVER, edge.AUTHORIZES_WITH, edge.PRODUCES_ARTIFACT]
  - id: claim.openai_agents.runtime
    source_id: source.openai_agents_sdk_2026
    status: normative
    themes: [runtime-state, tool-use, observability, multi-agent]
    claim: "Production agent SDKs need state, tool execution, approvals, handoffs, guardrails, tracing, and orchestration."
    ontology_impact: "Universal SDK and runtime harness graphs must expose agent definition, run, state, trace, tool, policy, and handoff APIs."
    supports_nodes: [node.agent_definition_api, node.run_api, node.state_api, node.trace_api, node.policy_api, node.handoff]
    supports_edges: [edge.EXPOSES_API, edge.HANDOFFS_TO, edge.TRACES]
  - id: claim.anthropic.workflow_patterns
    source_id: source.anthropic_effective_agents_2024
    status: normative
    themes: [multi-agent, planning-reasoning, evaluation]
    claim: "Agentic workflows should use explicit patterns such as routing, parallelization, orchestrator-workers, and evaluator-optimizer."
    ontology_impact: "Orchestration graph must model these patterns as inspectable node/edge classes."
    supports_nodes: [node.router, node.parallelization, node.orchestrator, node.worker, node.evaluator, node.optimizer]
    supports_edges: [edge.ROUTES_TO, edge.FORKS_TO, edge.COORDINATES, edge.OPTIMIZES]
  - id: claim.langgraph.durable_state
    source_id: source.langgraph_docs_2026
    status: exemplar
    themes: [runtime-state, observability, multi-agent]
    claim: "Stateful agent runtimes need durable execution, streaming, and human-in-the-loop control."
    ontology_impact: "Runtime view must expose checkpoints, event streams, state stores, and interrupts."
    supports_nodes: [node.checkpoint, node.state_store, node.event, node.human_review]
    supports_edges: [edge.CHECKPOINTS, edge.EMITS_EVENT, edge.REQUIRES_HUMAN_REVIEW]
  - id: claim.langchain_hitl.review
    source_id: source.langchain_hitl_docs_2026
    status: exemplar
    themes: [permissions, safety-security, tool-use]
    claim: "Risky tool calls can be paused by policy until a human decision is provided."
    ontology_impact: "Approval flow needs interrupt, review, allow, deny, and resume semantics."
    supports_nodes: [node.approval_flow, node.human_review, node.allow_decision, node.deny_decision]
    supports_edges: [edge.REQUIRES_HUMAN_REVIEW, edge.AUTHORIZES, edge.DENIES]
  - id: claim.microsoft_agent_framework.enterprise_runtime
    source_id: source.microsoft_agent_framework_2026
    status: exemplar
    themes: [runtime-state, observability, multi-agent]
    claim: "Enterprise agent frameworks combine graph workflows, typed state, middleware, telemetry, and model/provider support."
    ontology_impact: "SDK graph should model workflow API, state/session APIs, middleware, telemetry, and provider adapters."
    supports_nodes: [node.workflow_api, node.state_api, node.session_api, node.middleware, node.provider_adapter]
    supports_edges: [edge.EXPOSES_API, edge.CONNECTS_PROVIDER, edge.REGISTERS_EXTENSION]
  - id: claim.google_adk.production_surface
    source_id: source.google_adk_2026
    status: exemplar
    themes: [runtime-state, memory, observability, evaluation]
    claim: "Production agent frameworks expose sessions, memory, artifacts, runtime, deployment, observability, and evaluation."
    ontology_impact: "Runtime and validation views must include state, memory, traces, and evaluation as first-class controls."
    supports_nodes: [node.session, node.memory_store, node.artifact, node.trace, node.evaluation_api]
    supports_edges: [edge.STORES, edge.TRACES, edge.EXPOSES_API]
  - id: claim.crewai.multi_agent_operations
    source_id: source.crewai_docs_2026
    status: exemplar
    themes: [multi-agent, memory, observability]
    claim: "Multi-agent systems require role/task orchestration plus memory, knowledge, guardrails, and observability."
    ontology_impact: "Orchestration view should make roles, delegation, shared memory, guardrails, and telemetry visible together."
    supports_nodes: [node.role, node.task, node.delegation_contract, node.memory_store, node.audit_log]
    supports_edges: [edge.HAS_ROLE, edge.DELEGATES_TO, edge.AUDITS]
  - id: claim.pydantic.typed_agent
    source_id: source.pydantic_ai_docs_2026
    status: exemplar
    themes: [tool-use, runtime-state, observability]
    claim: "Typed agent APIs combine instructions, tools/toolsets, structured outputs, and dependency constraints."
    ontology_impact: "SDK graph should support typed tool schemas, structured output, and dependency-bound runtime configuration."
    supports_nodes: [node.agent_definition_api, node.tool_api, node.serialization_format, node.adapter_api]
    supports_edges: [edge.DECLARES_SCHEMA, edge.SERIALIZES_AS, edge.EXPOSES_API]
  - id: claim.llamaindex.memory_tools
    source_id: source.llamaindex_agents_docs_2026
    status: exemplar
    themes: [memory, tool-use, runtime-state]
    claim: "Agents can be framed as systems that use an LLM, memory, and tools to handle outside input."
    ontology_impact: "Memory, tool, and context graphs must remain connected through the agent run surface."
    supports_nodes: [node.model_interface, node.memory_api, node.tool_api, node.context_graph]
    supports_edges: [edge.USES_MODEL_INTERFACE, edge.EXPOSES_API, edge.PROVIDES_CONTEXT_TO]
  - id: claim.c4.hierarchical_views
    source_id: source.c4_model
    status: normative
    themes: [ui-graph-presentation, observability]
    claim: "Architecture presentation should support hierarchical audience-specific abstractions."
    ontology_impact: "Workbench must include context/container/component-style projections for different users."
    supports_views: [view.workbench_architecture, view.research_evidence_matrix]
    candidate_nodes: [node.diagram_view]
  - id: claim.bpmn.process_views
    source_id: source.bpmn_2_0_2
    status: normative
    themes: [ui-graph-presentation, runtime-state, multi-agent]
    claim: "Process diagrams should be stakeholder-readable while precise enough for software process mapping."
    ontology_impact: "Workflow exports must be readable and map cleanly to orchestration/process nodes."
    supports_nodes: [node.workflow, node.workflow_node, node.workflow_edge, node.task_lifecycle]
    supports_edges: [edge.CHAINS_TO, edge.ROUTES_TO, edge.FORKS_TO, edge.JOINS_FROM]
  - id: claim.graphviz.directed_layout
    source_id: source.graphviz_dot
    status: normative
    themes: [ui-graph-presentation, planning-reasoning]
    claim: "Directed graphs benefit from hierarchical/layered layout with same-direction edge flow."
    ontology_impact: "DOT exports should use directed layered layouts for protocol, planning, and dependency views."
    supports_views: [view.protocol_flow, view.runtime_trace_flow]
  - id: claim.mermaid.docs_as_code
    source_id: source.mermaid_docs
    status: normative
    themes: [ui-graph-presentation, protocol-interop, runtime-state]
    claim: "Diagram-as-code syntax enables portable flow, sequence, state, and architecture previews."
    ontology_impact: "Reports must keep Mermaid previews in source control and validate syntax shape."
    supports_views: [view.protocol_flow, view.runtime_trace_flow, view.ui_workbench_flow]
gaps:
  - id: gap.venue_exhaustive_index
    severity: info
    status: resolved
    description: "Venue-by-venue coverage is represented in references/venue-coverage.yaml and expanded by tools/check-venue-coverage.mjs into per-venue/per-year checkpoints."
    required_action: "Keep venue-coverage.yaml current when adding or excluding new conference evidence."
  - id: gap.ontology_view_nodes
    severity: medium
    description: "View ids used by the evidence matrix are planned v2 views and not yet represented as ontology GraphView YAML artifacts."
    required_action: "Add GraphView artifacts after the UI specification gate passes."
  - id: gap.preview_visual_qa
    severity: medium
    description: "Preview PNG assets must be generated and inspected after the workbench UI layer lands."
    required_action: "Run preview generation and screenshot gates."
