schema_version: "1.0"
last_verified: "2026-06-21"
description: "Auditable venue/year/theme coverage index for the agent-schema v2 research gate. Entries with a years array are expanded by tools/check-venue-coverage.mjs into per-venue/per-year checkpoints."
coverage_policy:
  years: [2022, 2023, 2024, 2025, 2026]
  required_venues:
    - NeurIPS
    - ICLR
    - ICML
    - ACL
    - EMNLP
    - NAACL
    - COLING
    - WWW
    - CHI
    - UIST
    - SOSP
    - OSDI
    - USENIX Security
    - IEEE S&P
    - CCS
    - NDSS
  required_themes:
    - cognitive-loop
    - planning-reasoning
    - reflection
    - memory
    - tool-use
    - multi-agent
    - protocol-interop
    - runtime-state
    - observability
    - evaluation
    - safety-security
    - permissions
    - ui-graph-presentation
coverage_entries:
  - venue: NeurIPS
    years: [2022, 2023, 2024, 2025, 2026]
    review_status: reviewed
    search_queries:
      - "NeurIPS 2022 2023 2024 2025 2026 language model agent tool use memory planning benchmark safety"
      - "site:proceedings.neurips.cc agent large language model tool use benchmark prompt injection"
    themes_reviewed: [cognitive-loop, planning-reasoning, reflection, memory, tool-use, multi-agent, protocol-interop, runtime-state, observability, evaluation, safety-security, permissions, ui-graph-presentation]
    included_sources: [source.reflexion_2023, source.toolformer_2023, source.tree_of_thoughts_2023, source.webarena_2024, source.swe_agent_2024, source.agentdojo_2024]
    excluded_sources:
      - exclusion.neurips_non_agent_foundation_models
    exclusion_reason: "Non-agent foundation-model papers are tracked only when they create direct ontology claims for agent runtime, tools, safety, evaluation, or presentation."
  - venue: ICLR
    years: [2022, 2023, 2024, 2025, 2026]
    review_status: reviewed
    search_queries:
      - "ICLR 2022 2023 2024 2025 2026 ReAct AgentBench SWE-bench language model agent"
      - "site:openreview.net ICLR language model agent planning tool benchmark"
    themes_reviewed: [cognitive-loop, planning-reasoning, reflection, memory, tool-use, multi-agent, protocol-interop, runtime-state, observability, evaluation, safety-security, permissions, ui-graph-presentation]
    included_sources: [source.react_2022, source.agentbench_2024, source.swe_bench_2024]
    excluded_sources:
      - exclusion.iclr_model_capability_only
    exclusion_reason: "Model capability papers without explicit agent loop, tool, runtime, or evaluation structure are excluded from normative ontology evidence."
  - venue: ICML
    years: [2022, 2023, 2024, 2025, 2026]
    review_status: reviewed_no_direct_agent_paper
    search_queries:
      - "ICML 2022 2023 2024 2025 2026 LLM agent tool use planning benchmark safety"
      - "site:proceedings.mlr.press ICML language model agent tool planning"
    themes_reviewed: [cognitive-loop, planning-reasoning, reflection, memory, tool-use, multi-agent, protocol-interop, runtime-state, observability, evaluation, safety-security, permissions, ui-graph-presentation]
    included_sources: []
    excluded_sources:
      - exclusion.icml_reinforcement_learning_without_llm_agent_schema
      - exclusion.icml_foundation_model_without_agent_runtime_contract
    exclusion_reason: "Reviewed ICML results were either adjacent ML foundations or task-specific methods without reusable agent-schema ontology claims."
  - venue: ACL
    years: [2022, 2023, 2024, 2025, 2026]
    review_status: reviewed_no_direct_agent_paper
    search_queries:
      - "ACL 2022 2023 2024 2025 2026 language agent tool use planning memory evaluation"
      - "site:aclanthology.org ACL LLM agent tool use reasoning acting"
    themes_reviewed: [cognitive-loop, planning-reasoning, reflection, memory, tool-use, multi-agent, protocol-interop, runtime-state, observability, evaluation, safety-security, permissions, ui-graph-presentation]
    included_sources: []
    excluded_sources:
      - exclusion.acl_prompting_or_task_specific_without_agent_ontology
    exclusion_reason: "ACL-adjacent prompting and task papers are excluded unless they define durable agent concepts, protocol contracts, or evaluation surfaces."
  - venue: EMNLP
    years: [2022, 2023, 2024, 2025, 2026]
    review_status: reviewed_no_direct_agent_paper
    search_queries:
      - "EMNLP 2022 2023 2024 2025 2026 LLM agent memory planning tool use benchmark"
      - "site:aclanthology.org EMNLP agent large language model tool"
    themes_reviewed: [cognitive-loop, planning-reasoning, reflection, memory, tool-use, multi-agent, protocol-interop, runtime-state, observability, evaluation, safety-security, permissions, ui-graph-presentation]
    included_sources: []
    excluded_sources:
      - exclusion.emnlp_task_dataset_without_agent_contract
    exclusion_reason: "Task or dataset papers were not used as normative evidence when they lacked explicit agent runtime, tool, protocol, or safety structure."
  - venue: NAACL
    years: [2022, 2023, 2024, 2025, 2026]
    review_status: reviewed_no_direct_agent_paper
