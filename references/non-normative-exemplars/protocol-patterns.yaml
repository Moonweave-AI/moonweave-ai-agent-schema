# Non-normative protocol interaction patterns
schema_version: "1.0"
kind: non_normative_exemplar
scope: protocol-interop-graph
provenance: [mcp, a2a, acp]

patterns:
  - id: exemplar.mcp_tool_discovery
    label: MCP Tool Discovery
    description: >
      Client lists server tools via initialize handshake; tools expose name,
      description, and JSON Schema input.
    maps_to:
      nodes: [node.tool_info_source, node.light_index]
      edges: [edge.INDEXES, edge.DISCLOSES_ON_DEMAND]
    protocol_instances:
      - protocol: mcp
        operation: tools/list

  - id: exemplar.mcp_resource_read
    label: MCP Resource Read
    description: >
      Client reads URI-identified resources (files, records) from server for context.
    maps_to:
      nodes: [node.file_system_source, node.memory_file_source]
      edges: [edge.LOADS_FROM]
    protocol_instances:
      - protocol: mcp
        operation: resources/read

  - id: exemplar.mcp_prompt_template
    label: MCP Prompt Template
    description: >
      Server exposes parameterized prompt templates client materializes into messages.
    maps_to:
      nodes: [node.system_instruction, node.few_shot_example]
      edges: [edge.PROVIDES_CONTEXT_TO]
    protocol_instances:
      - protocol: mcp
        operation: prompts/get

  - id: exemplar.mcp_tool_invoke
    label: MCP Tool Invoke
    description: >
      Client sends tools/call with name and arguments; server returns content or error.
    maps_to:
      nodes: [node.capability]
      edges: [edge.HAS_CAPABILITY]
    protocol_instances:
      - protocol: mcp
        operation: tools/call

  - id: exemplar.a2a_agent_card
    label: A2A Agent Card
    description: >
      Well-known URL serves JSON agent card describing skills, endpoints, auth.
    maps_to:
      nodes: [node.agent_identity, node.role, node.capability]
      edges: [edge.HAS_IDENTITY, edge.HAS_CAPABILITY]
    protocol_instances:
      - protocol: a2a
        artifact: AgentCard

  - id: exemplar.a2a_task_delegation
    label: A2A Task Delegation
    description: >
      Client sends Task with message parts; remote agent streams status and artifacts.
    maps_to:
      nodes: [node.task, node.agent_message]
      edges: [edge.DECOMPOSES_TO_TASK]
    protocol_instances:
      - protocol: a2a
        operation: tasks/send

  - id: exemplar.a2a_artifact_exchange
    label: A2A Artifact Exchange
    description: >
      Completed work returned as typed artifacts (files, data) attached to task.
    maps_to:
      nodes: [node.output_chunk, node.storage_area]
      edges: [edge.CHUNKS_TO]
    protocol_instances:
      - protocol: a2a
        artifact: TaskArtifact

  - id: exemplar.acp_session_channel
    label: ACP Session Channel
    description: >
      Bidirectional session over WebSocket or SSE for agent message exchange.
    maps_to:
      nodes: [node.message, node.message_history]
      edges: [edge.PROVIDES_CONTEXT_TO]
    protocol_instances:
      - protocol: acp
        construct: SessionChannel

  - id: exemplar.acp_capability_negotiation
    label: ACP Capability Negotiation
    description: >
      Peers exchange supported message types, tools, and extensions at connect time.
    maps_to:
      nodes: [node.capability, node.autonomy_level]
      edges: [edge.HAS_CAPABILITY]
    protocol_instances:
      - protocol: acp
        construct: Hello / CapabilitySet

  - id: exemplar.cross_protocol_tool_bridge
    label: Cross-Protocol Tool Bridge
    description: >
      Adapter exposing MCP tools to A2A agent or vice versa via normalized envelope.
    maps_to:
      nodes: [node.tool_info_source]
      edges: [edge.INDEXES, edge.LOADS_FROM]
    protocol_instances:
      - protocol: mcp
        role: server
      - protocol: a2a
        role: client
