# Non-normative runtime and harness patterns
schema_version: "1.0"
kind: non_normative_exemplar
scope: runtime-harness-graph
provenance: [various_agent_runtimes, harness_implementations]

patterns:
  - id: exemplar.session_run_trace
    label: Session-Run-Trace Hierarchy
    description: >
      Session spans multiple runs; each run produces trace spans for LLM, tool,
      and policy events with correlation ids.
    maps_to:
      nodes: [node.agent_state, node.decision_loop, node.feedback_signal]
      edges: [edge.UPDATES_STATE, edge.RUNS_DECISION_LOOP]

  - id: exemplar.sandboxed_execution
    label: Sandboxed Execution Envelope
    description: >
      Tool and code execution inside container or VM with cgroup, network, and
      filesystem namespaces.
    maps_to:
      nodes: [node.agent_boundary, node.capability]
      edges: [edge.BOUNDED_BY]

  - id: exemplar.budget_guards
    label: Token and Step Budget Guards
    description: >
      Hard caps on model tokens, tool calls, wall time; terminate or summarize on exceed.
    maps_to:
      nodes: [node.chunk_policy, node.autonomy_level]
      edges: [edge.TRUNCATES_BY, edge.BOUNDED_BY]

  - id: exemplar.durable_execution
    label: Durable Execution with Replay
    description: >
      Persist run events for crash recovery and deterministic replay of tool side effects.
    maps_to:
      nodes: [node.agent_state]
      edges: [edge.UPDATES_STATE]

  - id: exemplar.stream_multiplexing
    label: Stream Multiplexing
    description: >
      Multiplex model tokens, tool progress, and log lines on single client stream.
    maps_to:
      nodes: [node.output_chunk, node.feedback_signal]
      edges: [edge.RECEIVES_FEEDBACK]

  - id: exemplar.warm_cold_start
    label: Warm vs Cold Tool Start
    description: >
      Lazy MCP server spawn on first tool use vs pre-warmed connection pool.
    maps_to:
      nodes: [node.progressive_disclosure, node.tool_info_source]
      edges: [edge.DISCLOSES_ON_DEMAND]

  - id: exemplar.context_compaction
    label: Context Compaction on Pressure
    description: >
      Summarize or prune message history when approaching context window limit.
    maps_to:
      nodes: [node.message_history, node.chunk_policy]
      edges: [edge.TRUNCATES_BY, edge.SUMMARIZES_TO]

  - id: exemplar.idempotent_tool_retry
    label: Idempotent Tool Retry
    description: >
      Retry failed tool calls with same idempotency key when operation is safe to repeat.
    maps_to:
      nodes: [node.feedback_signal, node.decision_loop]
      edges: [edge.RECEIVES_FEEDBACK]

  - id: exemplar.observability_hooks
    label: Observability Hooks
    description: >
      OpenTelemetry-style spans around model, retrieval, tool, and policy stages.
    maps_to:
      nodes: [node.decision_loop]
      edges: [edge.RUNS_DECISION_LOOP]

  - id: exemplar.graceful_cancellation
    label: Graceful Cancellation
    description: >
      Propagate cancel signal to in-flight model and tool operations with cleanup.
    maps_to:
      nodes: [node.agent_state, node.task]
      edges: [edge.UPDATES_STATE]
