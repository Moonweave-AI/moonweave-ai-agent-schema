# Non-normative SDK patterns abstracted from popular agent SDKs
# Vendor names appear only as provenance tags, not in ontology IDs
schema_version: "1.0"
kind: non_normative_exemplar
scope: universal-sdk-graph
provenance: [langchain, crewai, autogen, anthropic_sdk, openai_sdk]

patterns:
  - id: exemplar.agent_run_loop
    label: Agent Run Loop
    description: >
      Iterative cycle: assemble messages → call model → parse tool calls →
      execute tools → append results → repeat until stop condition.
    maps_to:
      nodes: [node.agent, node.decision_loop, node.model_interface]
      edges: [edge.RUNS_DECISION_LOOP, edge.USES_MODEL_INTERFACE]
    sdk_instances:
      - vendor: langchain
        construct: AgentExecutor / create_react_agent
      - vendor: openai_sdk
        construct: Runner.run loop with tool dispatch
      - vendor: anthropic_sdk
        construct: messages.create with tool_use blocks

  - id: exemplar.tool_schema_binding
    label: Tool Schema Binding
    description: >
      Python or JSON-schema functions bound to model-visible tool definitions
      with name, description, and parameter schema.
    maps_to:
      nodes: [node.capability, node.tool_info_source]
      edges: [edge.HAS_CAPABILITY]
    sdk_instances:
      - vendor: openai_sdk
        construct: function / tool parameter schema
      - vendor: anthropic_sdk
        construct: tools[] with input_schema
      - vendor: langchain
        construct: @tool decorator / StructuredTool

  - id: exemplar.message_role_typing
    label: Message Role Typing
    description: >
      Discriminated message roles (system, user, assistant, tool) in transcript.
    maps_to:
      nodes: [node.message, node.user_message, node.agent_message, node.system_instruction]
      edges: [edge.PROVIDES_CONTEXT_TO]
    sdk_instances:
      - vendor: openai_sdk
        construct: ChatCompletionMessageParam roles
      - vendor: anthropic_sdk
        construct: MessageParam with role field
      - vendor: autogen
        construct: ConversableAgent chat messages

  - id: exemplar.streaming_callbacks
    label: Streaming Callbacks
    description: >
      Token or event streaming hooks for partial output and tool progress.
    maps_to:
      nodes: [node.output_chunk, node.feedback_signal]
      edges: [edge.RECEIVES_FEEDBACK]
    sdk_instances:
      - vendor: langchain
        construct: AsyncCallbackHandler / on_llm_new_token
      - vendor: openai_sdk
        construct: stream=True with event iterator
      - vendor: anthropic_sdk
        construct: messages.stream()

  - id: exemplar.memory_buffer
    label: Conversation Memory Buffer
    description: >
      Sliding window or summary buffer retaining recent turns for context.
    maps_to:
      nodes: [node.message_history, node.chunk_policy]
      edges: [edge.TRUNCATES_BY, edge.CHUNKS_TO]
    sdk_instances:
      - vendor: langchain
        construct: ConversationBufferWindowMemory
      - vendor: autogen
        construct: agent chat history list

  - id: exemplar.structured_output
    label: Structured Output Parsing
    description: >
      Constrain model output to JSON or Pydantic schema via parser or API mode.
    maps_to:
      nodes: [node.model_interface, node.output_chunk]
      edges: [edge.USES_MODEL_INTERFACE]
    sdk_instances:
      - vendor: openai_sdk
        construct: response_format json_schema
      - vendor: langchain
        construct: PydanticOutputParser
      - vendor: anthropic_sdk
        construct: tool_choice forced schema

  - id: exemplar.multi_agent_chat
    label: Multi-Agent Chat Group
    description: >
      Multiple agent instances exchanging messages in shared or routed conversation.
    maps_to:
      nodes: [node.agent, node.role, node.task]
      edges: [edge.HAS_ROLE, edge.DECOMPOSES_TO_TASK]
    sdk_instances:
      - vendor: autogen
        construct: GroupChat / GroupChatManager
      - vendor: crewai
        construct: Crew with sequential/hierarchical process

  - id: exemplar.handoff_delegation
    label: Agent Handoff
    description: >
      Transfer conversation control to specialized agent with context carryover.
    maps_to:
      nodes: [node.task, node.agent_boundary]
      edges: [edge.DECOMPOSES_TO_TASK, edge.BOUNDED_BY]
    sdk_instances:
      - vendor: openai_sdk
        construct: handoff in Agents SDK
      - vendor: crewai
        construct: Agent delegation in hierarchical process

  - id: exemplar.system_prompt_layers
    label: Layered System Instructions
    description: >
      Stack of system-level instructions: base policy, developer overrides, per-run additions.
    maps_to:
      nodes: [node.instruction_stack, node.system_instruction, node.developer_instruction]
      edges: [edge.HAS_INSTRUCTION_STACK]
    sdk_instances:
      - vendor: anthropic_sdk
        construct: system parameter + cache_control
      - vendor: openai_sdk
        construct: instructions in Responses API

  - id: exemplar.retry_with_backoff
    label: Retry with Backoff
    description: >
      Automatic retry on rate limits and transient failures with exponential backoff.
    maps_to:
      nodes: [node.feedback_signal, node.decision_loop]
      edges: [edge.RECEIVES_FEEDBACK]
    sdk_instances:
      - vendor: openai_sdk
        construct: max_retries on client
      - vendor: langchain
        construct: RetryOutputParser / tenacity wrappers
