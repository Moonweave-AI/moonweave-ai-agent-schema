# Non-normative safety and containment patterns
schema_version: "1.0"
kind: non_normative_exemplar
scope: safety-policy-graph
provenance: [parallax, progent, fides, containment_approaches]

patterns:
  - id: exemplar.think_act_separation
    label: Think-Act Separation (Parallax)
    description: >
      Deliberation model proposes actions; separate policy engine approves before
      execution model or runtime acts.
    maps_to:
      nodes: [node.cognitive_core, node.decision_loop, node.agent_boundary]
      edges: [edge.RUNS_DECISION_LOOP, edge.BOUNDED_BY]
    source: parallax2026thinkact

  - id: exemplar.two_stage_permission
    label: Two-Stage Permission Gate
    description: >
      Stage 1 defaults toward deny on ambiguity; Stage 2 deep deliberation for
      borderline tool requests.
    maps_to:
      nodes: [node.agent_boundary, node.capability]
      edges: [edge.BOUNDED_BY]
    source: agent_structure_graph

  - id: exemplar.smt_least_privilege
    label: SMT Least-Privilege Synthesis (Progent)
    description: >
      Encode task spec and tool semantics in SMT; synthesize minimal allow set.
    maps_to:
      nodes: [node.capability, node.task]
      edges: [edge.HAS_CAPABILITY]
    source: progent2025leastprivilege

  - id: exemplar.ifc_label_propagation
    label: Information Flow Control Labels (FIDES)
    description: >
      Tag context chunks and tool I/O with sensitivity labels; enforce flow rules
      at composition boundaries.
    maps_to:
      nodes: [node.file_system_source, node.network_source, node.container_context]
      edges: [edge.LOADS_FROM, edge.PROVIDES_CONTEXT_TO]
    source: fides2024ifc

  - id: exemplar.injection_pattern_scan
    label: Prompt Injection Pattern Scan
    description: >
      Scan tool inputs/outputs for known injection signatures before merging into context.
    maps_to:
      nodes: [node.message, node.chunk_policy]
      edges: [edge.TRUNCATES_BY]
    source: agent_structure_graph

  - id: exemplar.deny_escalate_human
    label: Deny-and-Escalate with Human Prompt
    description: >
      Block high-risk action and surface permission prompt to human operator with rationale.
    maps_to:
      nodes: [node.agent_boundary, node.feedback_signal]
      edges: [edge.BOUNDED_BY, edge.RECEIVES_FEEDBACK]

  - id: exemplar.retry_with_reason
    label: Deny with Reason and Bounded Retries
    description: >
      Return structured denial reason; agent may revise and retry up to configured limit.
    maps_to:
      nodes: [node.feedback_signal, node.decision_loop]
      edges: [edge.RECEIVES_FEEDBACK]

  - id: exemplar.tool_result_warning
    label: Flagged Tool Result Warnings
    description: >
      Attach warning metadata to tool results when content matches policy flags.
    maps_to:
      nodes: [node.agent_message, node.output_chunk]
      edges: [edge.CHUNKS_TO]

  - id: exemplar.network_egress_allowlist
    label: Network Egress Allowlist
    description: >
      HTTP/SOCKS proxy enforcing domain and port allowlists for sandbox egress.
    maps_to:
      nodes: [node.network_source, node.agent_boundary]
      edges: [edge.LOADS_FROM, edge.BOUNDED_BY]

  - id: exemplar.filesystem_path_policy
    label: Filesystem Path Policy
    description: >
      Distinguish permitted write paths from quarantined or system-critical paths.
    maps_to:
      nodes: [node.file_system_source, node.storage_area]
      edges: [edge.LOADS_FROM]

  - id: exemplar.audit_log_immutability
    label: Immutable Audit Log
    description: >
      Append-only log of tool calls, policy decisions, and data accesses for forensics.
    maps_to:
      nodes: [node.agent_state]
      edges: [edge.UPDATES_STATE]

  - id: exemplar.capability_attestation
    label: Capability Attestation
    description: >
      Cryptographic attestation of sandbox environment before executing sensitive tools.
    maps_to:
      nodes: [node.agent_boundary]
      edges: [edge.BOUNDED_BY]
