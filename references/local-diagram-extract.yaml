# Extract from Agent Structure Graph (local PDF/VSDX)
# Four-plane architecture: InfoPlane, OrchestrationPlane, MemoryPlane, ToolPlane
# Plus cross-cutting concepts spanning multiple planes

schema_version: "1.0"
source:
  id: evidence.agent_structure_graph
  name: "Agent Structure Graph"
  format: [pdf, vsdx]
  extraction_date: "2026-06-17"

planes:
  - id: InfoPlane
    label: "Information Plane"
    label_zh: "信息平面"
    description: >
      Manages context assembly, indexing, retrieval, ranking, and generative
      synthesis. Covers transcript materialization, chunking policies, sparse
      and dense retrieval, fusion, reranking, and response generation.

  - id: OrchestrationPlane
    label: "Orchestration Plane"
    label_zh: "编排平面"
    description: >
      Coordinates multi-step agent workflows: decomposition, routing,
      parallelization, subagent delegation, feedback loops, and
      evaluator-optimizer patterns.

  - id: MemoryPlane
    label: "Memory Plane"
    label_zh: "记忆平面"
    description: >
      Long-horizon recall and preference surfaces that feed context assembly
      and decision-making outside the immediate transcript window.

  - id: ToolPlane
    label: "Tool Plane"
    label_zh: "工具平面"
    description: >
      Tool discovery, invocation, sandboxed execution, network and filesystem
      access controls, permission escalation, and result feedback to the agent.

nodes:
  # --- InfoPlane ---
  - id: diagram.progressive_disclosure
    plane: InfoPlane
    label: Progressive Disclosure
    description: >
      On-demand context loading strategy that defers full materialization until
      retrieval or user/agent request, reducing upfront token cost.

  - id: diagram.agent_transcript
    plane: InfoPlane
    label: Agent Transcript
    description: >
      Canonical ordered record of user, agent, system, and tool messages
      comprising the running session narrative.

  - id: diagram.chunks
    plane: InfoPlane
    label: Chunks
    description: >
      Segmented units of text or structured content derived from sources or
      transcript for indexing and retrieval.

  - id: diagram.context
    plane: InfoPlane
    label: Context
    description: >
      Assembled working set of messages, instructions, retrieved chunks, and
      tool results presented to the generative model per turn.

  - id: diagram.embedding_model
    plane: InfoPlane
    label: Embedding Model
    description: >
      Dense vector encoder mapping text spans to semantic embedding space for
      similarity search.

  - id: diagram.tfidf
    plane: InfoPlane
    label: TF-IDF
    description: >
      Term frequency-inverse document frequency weighting scheme for sparse
      lexical relevance scoring.

  - id: diagram.vector_database
    plane: InfoPlane
    label: Vector Database
    description: >
      Storage and query engine for dense embedding vectors with approximate
      nearest-neighbor search.

  - id: diagram.tfidf_index
    plane: InfoPlane
    label: TF-IDF Index
    description: >
      Inverted index supporting sparse lexical retrieval over chunked corpus.

  - id: diagram.embeddings
    plane: InfoPlane
    label: Embeddings
    description: >
      Dense vector representations of text spans produced by an embedding model.

  - id: diagram.tfidf_vectors
    plane: InfoPlane
    label: TF-IDF Vectors
    description: >
      Sparse vector representations of documents or chunks under TF-IDF weighting.

  - id: diagram.rank_fusion
    plane: InfoPlane
    label: Rank Fusion
    description: >
      Combines ranked lists from multiple retrievers (sparse, dense, graph) into
      a unified candidate ordering.

  - id: diagram.reranker
    plane: InfoPlane
    label: Reranker
    description: >
      Cross-encoder or late-interaction model that re-scores fused candidates
      for final context inclusion.

  - id: diagram.generative_model
    plane: InfoPlane
    label: Generative Model
    description: >
      Large language model consuming assembled context to produce agent
      responses and tool-use decisions.

  - id: diagram.query
    plane: InfoPlane
    label: Query
    description: >
      Retrieval or generation input derived from user message, agent plan, or
      tool-triggered lookup.

  - id: diagram.response
    plane: InfoPlane
    label: Response
    description: >
      Model output text or structured payload returned to the orchestration layer.

  - id: diagram.text
    plane: InfoPlane
    label: Text
    description: >
      Raw or normalized textual content flowing through chunking, indexing, and
      context assembly pipelines.

  - id: diagram.light_index
    plane: InfoPlane
    label: Light Index
    description: >
      Lightweight discovery index (metadata, summaries, tags) enabling progressive
      disclosure without full content load.

  - id: diagram.graph
    plane: InfoPlane
    label: Graph
    description: >
      Structured knowledge graph used for relational retrieval and context
      expansion beyond flat chunk similarity.

  - id: diagram.text_embedding
    plane: InfoPlane
    label: Text Embedding
    description: >
      Operation mapping a text span to its dense vector via an embedding model.

  - id: diagram.output_chunk
    plane: InfoPlane
    label: OutputChunk
    description: >
      Bounded segment of model output for streaming, truncation, or downstream
      tool consumption.

  - id: diagram.length_limit
    plane: InfoPlane
    label: LengthLimit
    description: >
      Hard or soft cap on token or character count applied during context or
      output assembly.

  - id: diagram.keep_head_and_tail
    plane: InfoPlane
    label: KeepHeadAndTail
    description: >
      Truncation policy preserving leading and trailing segments while eliding
      middle content under length pressure.

  # --- OrchestrationPlane ---
  - id: diagram.orchestrator_workers
    plane: OrchestrationPlane
    label: Orchestrator-workers
    description: >
      Central coordinator dispatching subtasks to worker agents or tools and
      aggregating results.

  - id: diagram.gate
    plane: OrchestrationPlane
    label: Gate
    description: >
      Conditional checkpoint in a workflow that permits, blocks, or reroutes
      execution based on predicates or policy.

  - id: diagram.prompt_chain
    plane: OrchestrationPlane
    label: PromptChain
    description: >
      Sequential composition of prompts where each stage output feeds the next.

  - id: diagram.route
    plane: OrchestrationPlane
    label: Route / Routing
    description: >
      Dynamic selection of downstream handler, tool, or subagent based on
      classification of current task state.

  - id: diagram.chain_decomposition
    plane: OrchestrationPlane
    label: Chain for Task Decomposition
    description: >
      Linear prompt chain specialized for breaking a goal into ordered subtasks.

  - id: diagram.route_downstream
    plane: OrchestrationPlane
    label: Route for Downstream Operation
    description: >
      Router directing work to the appropriate executor, tool, or specialist
      agent after decomposition or classification.

  - id: diagram.parallelization
    plane: OrchestrationPlane
    label: Parallelization
    description: >
      Concurrent execution of independent subtasks with later aggregation.

  - id: diagram.sectioning
    plane: OrchestrationPlane
    label: Sectioning
    description: >
      Parallelization pattern partitioning input or problem space into
      non-overlapping sections processed concurrently.

  - id: diagram.voting
    plane: OrchestrationPlane
    label: Voting
    description: >
      Parallelization pattern running multiple attempts and selecting outcome
      via vote or consensus.

  - id: diagram.subagent
    plane: OrchestrationPlane
    label: Subagent
    description: >
      Delegated agent instance with scoped goal, tools, and context boundary.

  - id: diagram.task_distribute
    plane: OrchestrationPlane
    label: Task Distribute
    description: >
      Operation assigning subtasks to workers or subagents according to a
      distribution policy.

  - id: diagram.feedback_orchestration
    plane: OrchestrationPlane
    label: Feedback
    description: >
      Loop carrying evaluation signals back to planner or orchestrator for
      revision or continuation decisions.

  - id: diagram.evaluator_optimizer
    plane: OrchestrationPlane
    label: Evaluator-optimizer
    description: >
      Dual-role pattern where one component scores output and another revises
      until quality threshold met.

  - id: diagram.review
    plane: OrchestrationPlane
    label: Review
    description: >
      Explicit critique or verification step before accepting or publishing
      intermediate results.

  - id: diagram.think_as_tool
    plane: OrchestrationPlane
    label: ThinkAsTool
    description: >
      Internal reasoning exposed as invocable tool for staged deliberation
      separate from final action tools.

  # --- MemoryPlane ---
  - id: diagram.memory_retrieve
    plane: MemoryPlane
    label: Memory Retrieve
    description: >
      Fetch of stored memories by query, key, or associative retrieval into
      working context.

  - id: diagram.memory_preference
    plane: MemoryPlane
    label: Memory Preference
    description: >
      Durable user or agent preference records influencing defaults and
      personalization.

  # --- ToolPlane ---
  - id: diagram.client_server
    plane: ToolPlane
    label: Client Server
    description: >
      Request-response architecture separating tool host from remote capability
      provider.

  - id: diagram.mcp
    plane: ToolPlane
    label: MCP
    description: >
      Model Context Protocol for standardized tool, resource, and prompt
      discovery and invocation.

  - id: diagram.tool_call
    plane: ToolPlane
    label: Tool Call
    description: >
      Structured invocation request from agent to external capability with
      arguments and correlation id.

  - id: diagram.sandbox
    plane: ToolPlane
    label: Sandbox
    description: >
      Isolated execution environment constraining filesystem, network, and
      process capabilities.

  - id: diagram.run_bash
    plane: ToolPlane
    label: Run (bash)
    description: >
      Shell command execution tool operating within sandbox policy.

  - id: diagram.socat_domain_socket
    plane: ToolPlane
    label: Socat Domain Socket
    description: >
      Unix domain socket bridge for controlled inter-process communication
      inside sandbox.

  - id: diagram.socat
    plane: ToolPlane
    label: Socat
    description: >
      Stream relay utility enabling socket, TCP, or pipe forwarding under
      policy.

  - id: diagram.deny
    plane: ToolPlane
    label: Deny
    description: >
      Policy outcome blocking requested operation without escalation.

  - id: diagram.allow
    plane: ToolPlane
    label: Allow
    description: >
      Policy outcome permitting requested operation within granted scope.

  - id: diagram.write_file_policy
    plane: ToolPlane
    label: Write bad_File / good_File
    description: >
      Filesystem write policy distinguishing permitted paths from blocked or
      quarantined targets.

  - id: diagram.http
    plane: ToolPlane
    label: HTTP
    description: >
      Hypertext transfer protocol access for outbound or inbound tool traffic.

  - id: diagram.network_call
    plane: ToolPlane
    label: Network Call
    description: >
      Generic outbound connectivity request subject to network policy.

  - id: diagram.log_listener
    plane: ToolPlane
    label: Log listener
    description: >
      Observability sink capturing tool and runtime events for audit and debug.

  - id: diagram.socks_proxy
    plane: ToolPlane
    label: SOCKS proxy
    description: >
      Socket-level proxy mediating outbound connections with policy enforcement.

  - id: diagram.http_proxy
    plane: ToolPlane
    label: HTTP proxy
    description: >
      Application-layer proxy for HTTP(S) egress with filtering and logging.

  - id: diagram.error
    plane: ToolPlane
    label: Error
    description: >
      Failure outcome from tool execution including policy denial, timeout, or
      runtime exception.

  - id: diagram.streamed
    plane: ToolPlane
    label: Streamed
    description: >
      Incremental delivery of tool output tokens or chunks to the agent.

  - id: diagram.udp_ssh_etc
    plane: ToolPlane
    label: UDP / SSH / etc
    description: >
      Additional network protocols governed by allowlists and sandbox rules.

  - id: diagram.https
    plane: ToolPlane
    label: HTTP(s)
    description: >
      TLS-wrapped HTTP traffic subject to certificate and domain policy.

  - id: diagram.stage1_blocking
    plane: ToolPlane
    label: Stage1 (err towards blocking)
    description: >
      First permission stage defaulting toward deny on ambiguous or high-risk
      requests.

  - id: diagram.stage2_deep_think
    plane: ToolPlane
    label: Stage2 (think deeply)
    description: >
      Secondary deliberation stage for borderline permission decisions requiring
      extended reasoning.

  - id: diagram.execute
    plane: ToolPlane
    label: Execute
    description: >
      Approved transition from policy check to actual tool runtime invocation.

  - id: diagram.allowed_list
    plane: ToolPlane
    label: Allowed List
    description: >
      Explicit enumeration of permitted tools, hosts, paths, or commands.

  - id: diagram.permission_prompt
    plane: ToolPlane
    label: Permission prompt
    description: >
      Human-in-the-loop confirmation for operations exceeding autonomous grant.

  - id: diagram.dependent
    plane: ToolPlane
    label: Dependent
    description: >
      Tool or action requiring prior successful invocation or resource state.

  - id: diagram.deny_and_escalate
    plane: ToolPlane
    label: Deny and Escalate
    description: >
      Block operation and elevate to higher trust tier or human reviewer.

  - id: diagram.reason_allow_retries
    plane: ToolPlane
    label: Provide Reason & Allow Retries up to limit
    description: >
      Policy path returning denial rationale with bounded retry allowance after
      agent revision.

  - id: diagram.agent_sees_result
    plane: ToolPlane
    label: Agent sees result (+warning)
    description: >
      Tool outcome delivered to agent transcript with optional safety warnings.

  - id: diagram.pattern_scan
    plane: ToolPlane
    label: Pattern scan (injection signatures)
    description: >
      Content inspection for prompt-injection or exfiltration signatures in
      tool inputs and outputs.

  - id: diagram.transcript_tool_result
    plane: ToolPlane
    label: Transcript + tool result
    description: >
      Coupling of conversational history with structured tool return for next
      model turn.

  - id: diagram.result_warning_flagged
    plane: ToolPlane
    label: Result (+warning-if-flagged)
    description: >
      Normalized tool result envelope with conditional warning metadata.

  - id: diagram.feedback_tool
    plane: ToolPlane
    label: Feedback
    description: >
      Post-execution signal (success, quality, policy) returned to orchestrator
      or evaluator.

  # --- Cross-cutting / multi-plane ---
  - id: diagram.tool_search_tool
    plane: [InfoPlane, ToolPlane]
    label: Tool Search Tool
    description: >
      Meta-tool enabling dynamic discovery of other tools from a catalog or index.

  - id: diagram.programmatic_tool_calling
    plane: ToolPlane
    label: Programmatic Tool Calling
    description: >
      Agent emits executable code that orchestrates multiple tool invocations
      in a single sandboxed program.

  - id: diagram.defer_loading
    plane: InfoPlane
    label: defer_loading
    description: >
      Lazy attachment of full tool schemas until discovery or selection reduces
      context footprint.

  - id: diagram.tool_matching
    plane: InfoPlane
    label: Tool Matching (regex / BM25 / Embedding)
    description: >
      Multi-strategy retrieval ranking tools by name, description, or semantic
      similarity to current intent.

  - id: diagram.tool_response
    plane: ToolPlane
    label: Tool Response
    description: >
      Structured payload returned from invoked tool to agent runtime.

  - id: diagram.code_execution_tool
    plane: ToolPlane
    label: code_execution tool
    description: >
      Sandboxed interpreter executing agent-authored code with tool bindings.

  - id: diagram.allowed_callers
    plane: ToolPlane
    label: allowed_callers
    description: >
      Declarative restriction of which agents or tools may invoke a given tool.

  - id: diagram.container
    plane: [InfoPlane, ToolPlane]
    label: Container
    description: >
      Bounded context envelope grouping command area, storage area, and attached
      sources.

  - id: diagram.command_area
    plane: InfoPlane
    label: Command Area
    description: >
      Active instruction and control surface within container context.

  - id: diagram.storage_area
    plane: InfoPlane
    label: Storage Area
    description: >
      Durable or session-scoped artifact store referenced by agent operations.

  - id: diagram.file_systems
    plane: InfoPlane
    label: File Systems
    description: >
      Filesystem-backed context and action surface.

  - id: diagram.databases
    plane: InfoPlane
    label: DataBases
    description: >
      Structured datastore sources for retrieval and tool-backed queries.

  - id: diagram.skills
    plane: InfoPlane
    label: Skills
    description: >
      Packaged capability modules combining instructions, tools, and examples.

  - id: diagram.network
    plane: [InfoPlane, ToolPlane]
    label: Network
    description: >
      External connectivity surface for retrieval and tool egress.

  - id: diagram.memory_file
    plane: MemoryPlane
    label: Memory File
    description: >
      File-backed persistent memory store outside the live transcript.

  - id: diagram.tool
    plane: ToolPlane
    label: Tool
    description: >
      Declarative capability definition with schema, policy hooks, and handler.

  - id: diagram.tool_info
    plane: InfoPlane
    label: Tool Info
    description: >
      Metadata and summary records about tools indexed for discovery.

  - id: diagram.feedback_general
    plane: [OrchestrationPlane, ToolPlane]
    label: Feedback
    description: >
      General evaluation or correction signal across orchestration and tool loops.

  - id: diagram.instruct
    plane: InfoPlane
    label: Instruct
    description: >
      Directive content shaping agent behavior (system, developer, or tool).

  - id: diagram.message
    plane: InfoPlane
    label: Message
    description: >
      Typed conversational unit in transcript (user, agent, system, tool).

  - id: diagram.system_prompt
    plane: InfoPlane
    label: System Prompt
    description: >
      Foundational behavioral and safety instructions prepended to context.

  - id: diagram.few_shot
    plane: InfoPlane
    label: Few-Shot
    description: >
      Example input-output pairs demonstrating desired task behavior.

  - id: diagram.message_history
    plane: InfoPlane
    label: Message History
    description: >
      Ordered prior messages retained in context per retention policy.

  - id: diagram.user_agent_message
    plane: InfoPlane
    label: User / Agent Message
    description: >
      Turn-taking messages from human user or autonomous agent participant.

edges:
  # InfoPlane retrieval pipeline
  - predicate: MATERIALIZES
    source: diagram.agent_transcript
    target: diagram.chunks
    description: Transcript segments are chunked for indexing.

  - predicate: ASSEMBLES
    source: diagram.chunks
    target: diagram.context
    description: Selected chunks join instructions and history in working context.

  - predicate: INDEXES_SPARSE
    source: diagram.chunks
    target: diagram.tfidf_index
    description: Chunks indexed for TF-IDF retrieval.

  - predicate: INDEXES_DENSE
    source: diagram.text
    target: diagram.embeddings
    description: Text encoded to dense vectors via embedding model.

  - predicate: STORES
    source: diagram.embeddings
    target: diagram.vector_database
    description: Embeddings persisted in vector store.

  - predicate: PRODUCED_BY
    source: diagram.embeddings
    target: diagram.embedding_model
    description: Embedding model generates vector representations.

  - predicate: PRODUCED_BY
    source: diagram.tfidf_vectors
    target: diagram.tfidf
    description: TF-IDF weighting produces sparse vectors.

  - predicate: RETRIEVES
    source: diagram.query
    target: [diagram.tfidf_index, diagram.vector_database, diagram.graph]
    description: Query fans out to sparse, dense, and graph retrievers.

  - predicate: FUSES
    source: [diagram.tfidf_index, diagram.vector_database]
    target: diagram.rank_fusion
    description: Multiple ranked lists combined.

  - predicate: RERANKS
    source: diagram.rank_fusion
    target: diagram.reranker
    description: Fused candidates rescored for precision.

  - predicate: FEEDS
    source: diagram.reranker
    target: diagram.context
    description: Top passages injected into generative context.

  - predicate: GENERATES
    source: diagram.generative_model
    target: diagram.response
    description: Model produces response from assembled context.

  - predicate: SEGMENTS
    source: diagram.response
    target: diagram.output_chunk
    description: Long responses split into output chunks.

  - predicate: CONSTRAINED_BY
    source: diagram.context
    target: diagram.length_limit
    description: Context size bounded by length policy.

  - predicate: TRUNCATES_VIA
    source: diagram.length_limit
    target: diagram.keep_head_and_tail
    description: Overflow handled by head-tail preservation.

  - predicate: DISCLOSES
    source: diagram.progressive_disclosure
    target: diagram.light_index
    description: Light index enables on-demand full load.

  - predicate: SUMMARIZES_TO
    source: diagram.tool_info
    target: diagram.light_index
    description: Tool metadata summarized in discovery index.

  # OrchestrationPlane workflow
  - predicate: DECOMPOSES_VIA
    source: diagram.orchestrator_workers
    target: diagram.chain_decomposition
    description: Orchestrator uses chain for task breakdown.

  - predicate: ROUTES_VIA
    source: diagram.orchestrator_workers
    target: diagram.route_downstream
    description: Orchestrator selects downstream handler.

  - predicate: COMPOSES
    source: diagram.prompt_chain
    target: diagram.chain_decomposition
    description: Prompt chain implements decomposition pattern.

  - predicate: PARALLELIZES
    source: diagram.parallelization
    target: [diagram.sectioning, diagram.voting]
    description: Parallelization uses sectioning or voting subpatterns.

  - predicate: DELEGATES_TO
    source: diagram.task_distribute
    target: diagram.subagent
    description: Subtasks assigned to subagents.

  - predicate: GATED_BY
    source: diagram.route
    target: diagram.gate
    description: Routing passes through conditional gates.

  - predicate: OPTIMIZES_VIA
    source: diagram.evaluator_optimizer
    target: diagram.review
    description: Evaluator-optimizer includes review step.

  - predicate: LOOPS
    source: diagram.feedback_orchestration
    target: diagram.orchestrator_workers
    description: Feedback returns to orchestrator for replanning.

  - predicate: INVOKES
    source: diagram.think_as_tool
    target: diagram.generative_model
    description: Think-as-tool triggers deliberation generation.

  # MemoryPlane
  - predicate: RECALLS
    source: diagram.memory_retrieve
    target: diagram.context
    description: Retrieved memories merge into context.

  - predicate: INFLUENCES
    source: diagram.memory_preference
    target: diagram.context
    description: Preferences bias defaults in context assembly.

  - predicate: BACKED_BY
    source: diagram.memory_retrieve
    target: diagram.memory_file
    description: Long-term memory may persist in memory files.

  # ToolPlane execution and policy
  - predicate: INVOKES
    source: diagram.tool_call
    target: diagram.tool
    description: Agent issues call against tool definition.

  - predicate: EXECUTES_IN
    source: diagram.tool_call
    target: diagram.sandbox
    description: Invocation runs inside sandbox boundary.

  - predicate: RUNS
    source: diagram.sandbox
    target: diagram.run_bash
    description: Sandbox permits controlled shell execution.

  - predicate: BRIDGES
    source: diagram.socat
    target: diagram.socat_domain_socket
    description: Socat relays domain socket traffic under policy.

  - predicate: EVALUATES
    source: diagram.stage1_blocking
    target: diagram.tool_call
    description: Stage1 policy screens tool requests.

  - predicate: ESCALATES_TO
    source: diagram.stage1_blocking
    target: diagram.stage2_deep_think
    description: Ambiguous cases escalate to deep deliberation.

  - predicate: PERMITS
    source: diagram.allow
    target: diagram.execute
    description: Allow decision leads to execution.

  - predicate: BLOCKS
    source: diagram.deny
    target: diagram.error
    description: Deny produces error outcome.

  - predicate: CHECKS
    source: diagram.allowed_list
    target: diagram.tool_call
    description: Allowlist constrains invocable tools and targets.

  - predicate: PROMPTS_HUMAN
    source: diagram.permission_prompt
    target: diagram.deny_and_escalate
    description: Escalation may require human permission prompt.

  - predicate: RETRIES_WITH
    source: diagram.reason_allow_retries
    target: diagram.tool_call
    description: Agent may retry after receiving denial reason.

  - predicate: SCANS
    source: diagram.pattern_scan
    target: diagram.transcript_tool_result
    description: Injection scan applied to transcript and tool results.

  - predicate: DELIVERS
    source: diagram.execute
    target: diagram.agent_sees_result
    description: Execution outcome surfaced to agent with optional warnings.

  - predicate: RECORDS
    source: diagram.agent_sees_result
    target: diagram.transcript_tool_result
    description: Results appended to transcript.

  - predicate: PROXIES
    source: [diagram.socks_proxy, diagram.http_proxy]
    target: diagram.network_call
    description: Outbound calls mediated by proxies.

  - predicate: EMITS
    source: diagram.network_call
    target: [diagram.http, diagram.https, diagram.udp_ssh_etc]
    description: Network call uses specific protocol transport.

  - predicate: STREAMS
    source: diagram.streamed
    target: diagram.tool_response
    description: Tool response may stream incrementally.

  - predicate: LOGS_TO
    source: diagram.tool_call
    target: diagram.log_listener
    description: Invocations logged for audit.

  - predicate: HOSTS
    source: diagram.client_server
    target: diagram.mcp
    description: MCP implements client-server tool hosting.

  # Cross-plane tool discovery
  - predicate: DISCOVERS
    source: diagram.tool_search_tool
    target: diagram.tool_matching
    description: Tool search applies matching strategies.

  - predicate: MATCHES_VIA
    source: diagram.tool_matching
    target: [diagram.tfidf, diagram.embeddings]
    description: Matching uses regex, BM25, or embedding similarity.

  - predicate: DEFERS
    source: diagram.defer_loading
    target: diagram.tool_info
    description: Full schemas loaded only after selection.

  - predicate: BINDS
    source: diagram.programmatic_tool_calling
    target: diagram.code_execution_tool
    description: Programmatic calling uses code execution sandbox.

  - predicate: RESTRICTS
    source: diagram.allowed_callers
    target: diagram.tool
    description: Caller allowlist on tool definition.

  - predicate: WRITES_UNDER
    source: diagram.write_file_policy
    target: diagram.file_systems
    description: Filesystem writes governed by good/bad path policy.

  # Container and context sources
  - predicate: CONTAINS
    source: diagram.container
    target: [diagram.command_area, diagram.storage_area]
    description: Container groups command and storage areas.

  - predicate: LOADS_FROM
    source: diagram.context
    target: [diagram.file_systems, diagram.databases, diagram.skills, diagram.network]
    description: Context assembled from diverse sources.

  - predicate: INSTRUCTS_VIA
    source: diagram.instruct
    target: [diagram.system_prompt, diagram.few_shot]
    description: Instruction types include system prompt and few-shot.

  - predicate: COMPOSES
    source: diagram.message_history
    target: diagram.message
    description: History is ordered sequence of messages.

  - predicate: TYPED_AS
    source: diagram.message
    target: diagram.user_agent_message
    description: Messages classified as user or agent origin.

  - predicate: FEEDBACK_TO
    source: diagram.feedback_general
    target: [diagram.feedback_orchestration, diagram.feedback_tool]
    description: Feedback connects orchestration and tool planes.

