# Evidence references linking diagram concepts and papers to ontology nodes
schema_version: "1.0"
description: >
  Cross-reference index mapping source evidence to ontology NodeClass and
  EdgeClass identifiers. Used by validators and visualization overlays.

evidence_entries:
  # --- Diagram-derived evidence ---
  - id: evidence.progressive_disclosure_diagram
    artifact: EvidenceRef
    source_type: diagram
    source_name: Agent Structure Graph
    location: references/local-diagram-extract.yaml#diagram.progressive_disclosure
    description: >
      InfoPlane progressive disclosure pattern linking light index to on-demand
      context materialization.
    supports_nodes: [node.progressive_disclosure, node.light_index, node.context_graph]
    supports_edges: [edge.DISCLOSES_ON_DEMAND, edge.INDEXES]

  - id: evidence.retrieval_pipeline_diagram
    artifact: EvidenceRef
    source_type: diagram
    source_name: Agent Structure Graph
    location: references/local-diagram-extract.yaml#InfoPlane
    description: >
      Sparse-dense-graph retrieval fusion pipeline from query through rank
      fusion and reranker to context.
    supports_nodes: [node.embedding_source, node.graph_source, node.output_chunk]
    supports_edges: [edge.INDEXES, edge.SUMMARIZES_TO]

  - id: evidence.orchestration_patterns_diagram
    artifact: EvidenceRef
    source_type: diagram
    source_name: Agent Structure Graph
    location: references/local-diagram-extract.yaml#OrchestrationPlane
    description: >
      Orchestrator-workers, prompt chains, routing, parallelization, and
      evaluator-optimizer workflow topology.
    supports_nodes:
      - node.decision_loop
      - node.task
      - node.workflow
      - node.workflow_node
      - node.workflow_edge
      - node.prompt_chain
      - node.router
      - node.route
      - node.parallelization
      - node.orchestrator
      - node.worker
      - node.evaluator
      - node.optimizer
      - node.gate
      - node.feedback
      - node.review
      - node.task_distribution
      - node.handoff
      - node.delegation_contract
      - node.subagent
      - node.blackboard
      - node.group_conversation
      - node.voting
      - node.consensus_policy
      - node.sectioning
      - node.think_as_tool
    supports_edges:
      - edge.DECOMPOSES_TO_TASK
      - edge.CHAINS_TO
      - edge.ROUTES_TO
      - edge.FORKS_TO
      - edge.JOINS_FROM
      - edge.COORDINATES
      - edge.DELEGATES_TO
      - edge.HANDOFFS_TO
      - edge.GATES
      - edge.REVIEWS
      - edge.OPTIMIZES
      - edge.VOTES_ON

  - id: evidence.tool_policy_diagram
    artifact: EvidenceRef
    source_type: diagram
    source_name: Agent Structure Graph
    location: references/local-diagram-extract.yaml#ToolPlane
    description: >
      Two-stage permission model, sandbox execution, proxy egress, and
      injection scanning on tool results.
    supports_nodes:
      - node.container_context
      - node.tool_info_source
      - node.permission_policy
      - node.sandbox_policy
      - node.policy_contract
      - node.approval_flow
      - node.human_review
      - node.audit_log
      - node.rollback
      - node.prompt_injection_defense
      - node.pattern_scan
      - node.credential_proxy
      - node.warning
    supports_edges:
      - edge.LOADS_FROM
      - edge.GUARDS
      - edge.AUTHORIZES
      - edge.REQUIRES_HUMAN_REVIEW
      - edge.AUDITS
      - edge.ROLLS_BACK

  - id: evidence.container_context_diagram
    artifact: EvidenceRef
    source_type: diagram
    source_name: Agent Structure Graph
    location: references/local-diagram-extract.yaml#diagram.container
    description: >
      Container grouping command area, storage area, and attached source planes.
    supports_nodes: [node.container_context, node.command_area, node.storage_area]
    supports_edges: [edge.PROVIDES_CONTEXT_TO, edge.LOADS_FROM]

  - id: evidence.message_assembly_diagram
    artifact: EvidenceRef
    source_type: diagram
    source_name: Agent Structure Graph
    location: references/local-diagram-extract.yaml#diagram.message
    description: >
      Message history, system prompt, few-shot, and user/agent message typing.
    supports_nodes:
      - node.message
      - node.user_message
      - node.agent_message
      - node.system_instruction
      - node.few_shot_example
      - node.message_history
    supports_edges: [edge.CHUNKS_TO, edge.TRUNCATES_BY]

  # --- Paper-derived evidence ---
  - id: evidence.coala_decision_loop
    artifact: EvidenceRef
    source_type: paper
    source_name: CoALA (Sumers et al., 2024)
    location: references/papers.bib#sumers2024coala
    description: >
      CoALA decision loop: perceive, retrieve memory, reason, select action,
      execute, update memory.
    supports_nodes: [node.agent, node.decision_loop, node.agent_state, node.cognitive_core]
    supports_edges: [edge.RUNS_DECISION_LOOP, edge.UPDATES_STATE]

  - id: evidence.coala_goals_tasks
    artifact: EvidenceRef
    source_type: paper
    source_name: CoALA (Sumers et al., 2024)
    location: references/papers.bib#sumers2024coala
    description: >
      Goal-directed behavior with hierarchical task decomposition in language agents.
    supports_nodes: [node.goal, node.objective, node.task]
    supports_edges: [edge.PURSUES_GOAL, edge.DECOMPOSES_TO_TASK]

  - id: evidence.xi_brain_perception_action
    artifact: EvidenceRef
    source_type: paper
    source_name: Xi et al. LLM Agent Survey
    location: references/papers.bib#xi2023llmagent
    description: >
      Brain (LLM core), perception (context input), action (tool use) tripartite split.
    supports_nodes: [node.cognitive_core, node.model_interface, node.capability]
    supports_edges: [edge.USES_MODEL_INTERFACE, edge.HAS_CAPABILITY]

  - id: evidence.harness_formalization
    artifact: EvidenceRef
    source_type: paper
    source_name: Agent Harness Survey (Meng 2026)
    location: references/papers.bib#meng2026agentharness
    description: >
      Harness tuple H=(E,T,C,S,L,V) maps to runtime envelope components.
    supports_nodes:
      - node.agent_boundary
      - node.instruction_stack
      - node.execution_harness
      - node.session
      - node.run
      - node.turn
      - node.event
      - node.transcript
      - node.trace
      - node.checkpoint
      - node.executor
      - node.sandbox
      - node.container
      - node.command
      - node.process
      - node.stdout_stream
      - node.stderr_stream
      - node.state_store
      - node.continuation
      - node.context_reset
      - node.cancellation
      - node.recovery_policy
      - node.retry_policy
      - node.timeout_policy
      - node.token_budget
      - node.cost_budget
      - node.resource_budget
      - node.handoff_artifact
    supports_edges:
      - edge.BOUNDED_BY
      - edge.HAS_INSTRUCTION_STACK
      - edge.STARTS
      - edge.ADVANCES_TO
      - edge.APPENDS_TRANSCRIPT
      - edge.TRACES
      - edge.EXECUTES_IN
      - edge.CHECKPOINTS
      - edge.RESTORES_FROM
      - edge.BOUNDED_BY_BUDGET

  - id: evidence.hierarchical_memory
    artifact: EvidenceRef
    source_type: paper
    source_name: Hierarchical Memory Theory (arXiv 2603.21564)
    location: references/papers.bib#hierarchical2026memory
    description: >
      (α, C, τ) parameters for memory retention, capacity, and temporal decay.
    supports_nodes: [node.memory_file_source, node.context_graph]
    supports_edges: [edge.LOADS_FROM, edge.PRIORITIZES]

  - id: evidence.parallax_stages
    artifact: EvidenceRef
    source_type: paper
    source_name: Parallax (arXiv 2604.12986)
    location: references/papers.bib#parallax2026thinkact
    description: >
      Think-act separation with stage-1 blocking bias and stage-2 deep deliberation.
    supports_nodes:
      - node.chunk_policy
      - node.progressive_disclosure
      - node.cognitive_executive_separation
      - node.trust_boundary
      - node.escalation
      - node.allow_decision
      - node.deny_decision
    supports_edges:
      - edge.DISCLOSES_ON_DEMAND
      - edge.SEPARATES_REASONING_FROM_EXECUTION
      - edge.ESCALATES
      - edge.AUTHORIZES
      - edge.DENIES

  - id: evidence.progent_least_privilege
    artifact: EvidenceRef
    source_type: paper
    source_name: Progent (arXiv 2504.11703)
    location: references/papers.bib#progent2025leastprivilege
    description: >
      SMT-synthesized minimal permission sets for tool invocation.
    supports_nodes:
      - node.agent_boundary
      - node.capability
      - node.least_privilege
      - node.privilege_control
      - node.allowed_list
      - node.denied_list
      - node.file_policy
      - node.network_policy
    supports_edges:
      - edge.BOUNDED_BY
      - edge.GUARDS

  - id: evidence.fides_ifc
    artifact: EvidenceRef
    source_type: paper
    source_name: FIDES Information Flow Control
    location: references/papers.bib#fides2024ifc
    description: >
      Label-based propagation rules for context and tool result boundaries.
    supports_nodes:
      - node.file_system_source
      - node.network_source
      - node.database_source
      - node.information_flow_control
      - node.data_label
      - node.taint
      - node.secret
    supports_edges:
      - edge.LOADS_FROM
      - edge.REFERENCES
      - edge.LABELS_DATA
      - edge.PROPAGATES_TAINT

  - id: evidence.network_of_thought
    artifact: EvidenceRef
    source_type: paper
    source_name: Network-of-Thought (arXiv 2603.20730)
    location: references/papers.bib#not2026graphreasoning
    description: >
      Graph-structured reasoning topology for multi-hop deliberation.
    supports_nodes: [node.context_graph, node.graph_source]
    supports_edges: [edge.INDEXES, edge.REFERENCES]

  - id: evidence.mcp_tool_protocol
    artifact: EvidenceRef
    source_type: protocol_spec
    source_name: MCP Specification
    location: references/papers.bib#mcp2024spec
    description: >
      Standard tool discovery, resource access, and prompt template protocol.
    supports_nodes: [node.tool_info_source, node.skill_source]
    supports_edges: [edge.INDEXES, edge.LOADS_FROM]

  - id: evidence.a2a_delegation
    artifact: EvidenceRef
    source_type: protocol_spec
    source_name: A2A Protocol
    location: references/papers.bib#a2a2025protocol
    description: >
      Agent-to-agent task envelopes and capability card discovery.
    supports_nodes: [node.task, node.role, node.agent_identity]
    supports_edges: [edge.DECOMPOSES_TO_TASK, edge.HAS_IDENTITY]

  - id: evidence.effective_agents_workflows
    artifact: EvidenceRef
    source_type: blog
    source_name: Building Effective Agents (Anthropic 2024)
    location: references/papers.bib#anthropic2024effectiveagents
    description: >
      Canonical workflow patterns for production agent systems.
    supports_nodes:
      - node.decision_loop
      - node.feedback_signal
      - node.task
      - node.workflow
      - node.prompt_chain
      - node.router
      - node.parallelization
      - node.orchestrator
      - node.worker
      - node.evaluator
      - node.optimizer
    supports_edges:
      - edge.RECEIVES_FEEDBACK
      - edge.DECOMPOSES_TO_TASK
      - edge.ROUTES_TO
      - edge.FORKS_TO
      - edge.OPTIMIZES

  - id: evidence.faos_enterprise_layers
    artifact: EvidenceRef
    source_type: paper
    source_name: FAOS (arXiv 2604.00555)
    location: references/papers.bib#faos2026enterprise
    description: >
      Three-layer enterprise ontology informing agent role and goal hierarchy.
    supports_nodes: [node.role, node.objective, node.goal, node.persona]
    supports_edges: [edge.HAS_ROLE, edge.PURSUES_GOAL]

  - id: evidence.agentic_taxonomy
    artifact: EvidenceRef
    source_type: paper
    source_name: Agentic AI Taxonomy (arXiv 2601.12560)
    location: references/papers.bib#agentic2026taxonomy
    description: >
      Six-dimension classification axes for agent capability and autonomy.
    supports_nodes: [node.autonomy_level, node.capability]
    supports_edges: [edge.HAS_CAPABILITY]

  # --- Meta-graph evidence ---
  - id: evidence.ontology_self_description
    artifact: EvidenceRef
    source_type: standard
    source_name: Agent Ontology Schema (this repository)
    location: ontology-manifest.yaml
    description: >
      Meta-graph defines primitives used to describe all other subgraphs.
    supports_nodes:
      - node.ontology_graph
      - node.node_class
      - node.edge_class
      - node.graph_constraint
      - node.evidence_ref
    supports_edges:
      - edge.CONTAINS
      - edge.DEFINES
      - edge.EVIDENCED_BY

node_evidence_index:
  node.agent:
    - evidence.coala_decision_loop
    - evidence.xi_brain_perception_action
  node.decision_loop:
    - evidence.coala_decision_loop
    - evidence.effective_agents_workflows
  node.goal:
    - evidence.coala_goals_tasks
    - evidence.faos_enterprise_layers
  node.progressive_disclosure:
    - evidence.progressive_disclosure_diagram
    - evidence.parallax_stages
  node.light_index:
    - evidence.progressive_disclosure_diagram
  node.context_graph:
    - evidence.retrieval_pipeline_diagram
    - evidence.network_of_thought
  node.container_context:
    - evidence.container_context_diagram
  node.message:
    - evidence.message_assembly_diagram
  node.tool_info_source:
    - evidence.tool_policy_diagram
    - evidence.mcp_tool_protocol
